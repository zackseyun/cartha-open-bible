base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/045/007.yaml
  text: Or were Hananiah and Azariah and Mishael cast down into a furnace of fire by those who practiced the magnificent and glorious religion of the Most High? May this never be! Who then were the ones who did these things? The hateful[a], and those full of every evil, were stirred up to such a pitch of wrath that they subjected to abuse those who served God in a holy and blameless purpose, not knowing that the Most High is the champion and defender of those who worship his all-virtuous name with a pure conscience—to whom be the glory forever and ever. Amen.
  footnotes:
  - marker: a
    text: Or 'brought down into a furnace of fire'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:22Z'
    unchanged: false
    changes_summary: Changed 'shut up' to 'cast down' for better lexical fit with κατείρχθησαν, and added 'the' before 'champion and defender' for more natural formal English. Kept the rest substantially unchanged.
translation:
  language: es
  text: ¿O acaso Ananías, Azarías y Misael fueron confinados[a] en un horno de fuego por los que practicaban la magnífica y gloriosa religión del Altísimo? ¡Que esto no suceda jamás! ¿Quiénes fueron entonces los que hicieron estas cosas? Los detestables, llenos de toda maldad, se encendieron en tanta ira que sometieron a maltratos a los que servían a Dios con un propósito santo e irreprochable, sin saber que el Altísimo es defensor y protector de los que adoran su nombre lleno de toda virtud con conciencia pura; a él sea la gloria por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron encerrados en un horno de fuego». El verbo griego expresa ser confinados o encerrados, no simplemente arrojados.
    reason: Aclara la mejor lectura léxica de κατείρχθησαν sin reproducir una nota inglesa conflictiva.
lexical_decisions:
- source_word: κατείρχθησαν
  english_pob_choice: cast down into a furnace of fire
  chosen_spanish: fueron encerrados en un horno de fuego
  alternatives_spanish:
  - fueron arrojados en un horno de fuego
  - fueron echados en un horno de fuego
  lexicon: κατείργω
  rationale: El verbo griego significa 'encerrar, confinar, mantener dentro'; la revisión inglesa corrigió el error de 'brought down'. En español, 'fueron encerrados' conserva el valor de confinamiento mejor que una mera idea de caída o traslado.
- source_word: θρησκευόντων τὴν μεγαλοπρεπῆ καὶ ἔνδοξον θρησκείαν
  english_pob_choice: those who practiced the magnificent and glorious religion of the Most High
  chosen_spanish: los que practicaban la magnífica y gloriosa religión del Altísimo
  alternatives_spanish:
  - los que rendían culto a la magnífica y gloriosa religión del Altísimo
  - los que seguían la magnífica y gloriosa religión del Altísimo
  lexicon: θρησκεία
  rationale: Se mantiene 'religión' para θρησκεία, como en la base inglesa, sin sustituirlo por términos eclesiásticos más estrechos. 'Practicaban' refleja el participio verbal de manera natural en español.
- source_word: ὑπὸ τῶν θρησκευόντων
  english_pob_choice: by those who practiced
  chosen_spanish: por los que practicaban
  alternatives_spanish:
  - por quienes practicaban
  - por los que rendían culto
  lexicon: ὑπό + genitivo
  rationale: La preposición marca agente; 'por los que practicaban' conserva la relación causal/agencial sin añadir matices no presentes en el griego.
- source_word: τὸν ὕψιστον
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: ὕψιστος
  rationale: '''Altísimo'' es la forma española estable y fiel para el título divino, sin necesidad de añadir ''Dios'' cuando el contexto ya identifica al sujeto.'
- source_word: οἱ στυγητοὶ
  english_pob_choice: The hateful
  chosen_spanish: Los odiosos
  alternatives_spanish:
  - Los detestables
  - Los aborrecibles
  lexicon: στυγητός
  rationale: El adjetivo expresa ser objeto de odio/detestación; 'odiosos' transmite la carga moral y retórica del texto. 'Los odiados' sería más pasivo y no seguiría tan bien el tono acusatorio del pasaje.
- source_word: εἰς αἰκίαν περιβαλεῖν
  english_pob_choice: subjected to abuse
  chosen_spanish: sometieron a abuso
  alternatives_spanish:
  - los cubrieron de abuso
  - los maltrataron
  lexicon: αἰκία
  rationale: La construcción sugiere infligir trato abusivo/vejatorio. 'Sometieron a abuso' conserva la dureza formal del original y evita suavizarlo excesivamente.
- source_word: λατρευόντων
  english_pob_choice: those who worship
  chosen_spanish: los que adoran
  alternatives_spanish:
  - los que rinden culto
  - los que sirven en adoración
  lexicon: λατρεύω
  rationale: '''Adoran'' funciona naturalmente con ''nombre'' en español y mantiene el sentido cultual de λατρεύω en este contexto.'
- source_word: τῷ παναρέτῳ ὀνόματι αὐτοῦ
  english_pob_choice: his all-virtuous name
  chosen_spanish: su nombre todo-virtuoso
  alternatives_spanish:
  - su nombre enteramente virtuoso
  - su nombre de toda virtud
  lexicon: παναρέτος
  rationale: Se conserva la fuerza compuesta del adjetivo con una solución transparente en español. 'Todo-virtuoso' evita diluir el énfasis moral del griego.
- source_word: ὁ ὕψιστος ὑπέρμαχος καὶ ὑπερασπιστής ἐστιν
  english_pob_choice: the Most High is the champion and defender
  chosen_spanish: el Altísimo es defensor y protector
  alternatives_spanish:
  - el Altísimo es campeón y defensor
  - el Altísimo es paladín y defensor
  lexicon: ὑπέρμαχος / ὑπερασπιστής
  rationale: '''Defensor y protector'' reproduce la doble imagen con registro natural en español. ''Campeón'' suena menos idiomático aquí y puede debilitar la dignidad del título.'
theological_decisions:
- issue: Identidad y reverencia del Altísimo
  english_pob_reading: Most High / his all-virtuous name
  chosen_spanish_reading: el Altísimo / su nombre todo-virtuoso
  alternative_spanish_readings:
  - el Dios Altísimo / su nombre plenamente virtuoso
  - el Altísimo / su santo nombre
  rationale: Se preserva el lenguaje elevado del original sin reemplazarlo por fórmulas eclesiásticas posteriores. 'Todo-virtuoso' mantiene la tensión retórica del griego, aunque sea una construcción poco común en español.
  doctrine_reference: Teología del nombre divino y doxología; fidelidad al lenguaje doxológico del texto
- issue: Carácter del trato infligido a los fieles
  english_pob_reading: subjected to abuse those who served God in a holy and blameless purpose
  chosen_spanish_reading: sometieron a abuso a los que servían a Dios con un propósito santo e irreprochable
  alternative_spanish_readings:
  - maltrataron a los que servían a Dios con un propósito santo e irreprochable
  - afrentaron a los que servían a Dios con un propósito santo e irreprochable
  rationale: El griego enfatiza trato vejatorio como consecuencia de una ira extrema; 'sometieron a abuso' retiene el matiz formal y evita reducirlo a mera agresión física.
  doctrine_reference: Ética del sufrimiento de los justos; perseverancia en conciencia limpia
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión del inglés auditado: el verbo griego κατείρχθησαν fue corregido desde una lectura errónea de ''brought down''/''shut up'' hacia ''cast down into a furnace of fire'' como traducción inglesa de sentido general, pero el valor léxico preciso del griego apunta a ''encerrar/confinar''. Por eso el español adopta ''fueron encerrados'' y no reproduce la imagen de descenso como sentido principal. También se mantuvo la formulación elevada de la doxología final y la lectura de ''the Most High'' con artículo implícito en español.'
  spanish_consistency_notes:
  - Se preservó 'Altísimo' para ὕψιστος, en consonancia con el estándar del proyecto.
  - Se mantuvo 'Dios' para θεός y 'adoran' para λατρευόντων, evitando reemplazos litúrgicos no necesarios.
  - Se optó por 'esclavo' no porque aparezca aquí, sino para dejar constancia de que no fue necesario aplicar ese default en este pasaje.
  - 'La doxología final se tradujo con cadencia formal: ''a él sea la gloria por los siglos de los siglos. Amén.'''
