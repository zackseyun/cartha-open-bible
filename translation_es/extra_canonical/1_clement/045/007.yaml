review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en la estructura general, en títulos como «el Altísimo» y en la doxología final. Sin embargo, no preserva bien el estado auditado del verbo κατείρχθησαν: la nota introduce como alternativa «arrojados» y afirma que la revisión inglesa corrigió hacia «encerrados», cuando el historial inglés está internamente conflictivo y el griego favorece confinamiento/encierro. También hay varias elecciones poco naturales o algo infieles en español: «sometieron a abuso» es duro pero torpe; «conciencia limpia» reduce innecesariamente el matiz de καθαρᾷ συνειδήσει; y «nombre todo-virtuoso» suena demasiado calco.'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero contiene expresiones poco idiomáticas para español eclesial general: «fueron encerrados» puede mejorarse con «fueron confinados» o mantenerse sin nota conflictiva; «sometieron a abuso» debe cambiarse por una formulación natural; «nombre todo-virtuoso» es comprensible pero rígido; «conciencia limpia» funciona, aunque «conciencia pura» refleja mejor el registro. Se recomienda una revisión pequeña pero real para naturalidad y fidelidad.'
  glossary_alignment: No hay conflicto con términos de proyecto mayores como Yahvé/Mesías. «Altísimo», «Dios», «adoran» y la doxología están alineados. La decisión sobre κατείρχθησαν y la nota asociada sí desalinean el registro auditado y la evidencia griega. «Defensor y protector» es aceptable para ὑπέρμαχος καὶ ὑπερασπιστής, aunque «defensor y amparador» también sería válido.
  issues:
  - severity: high
    issue: La nota al pie sobre κατείρχθησαν contradice la evidencia griega presentada y confunde el historial de revisión.
    rationale: El borrador principal dice «fueron encerrados», lo cual encaja bien con κατείργω, pero la nota ofrece «arrojados» como alternativa y explica erróneamente que la revisión inglesa corrigió una lectura previa hacia «encerrados». Eso no debe trasladarse al español como si fuera decisión estable.
  - severity: medium
    issue: «Sometieron a abuso» es poco natural en español.
    rationale: Aunque intenta reflejar εἰς αἰκίαν περιβαλεῖν, la expresión no suena idiomática. «Sometieron a maltratos» o «los maltrataron» preserva mejor el sentido vejatorio sin sonar mecánico.
  - severity: medium
    issue: «Conciencia limpia» debilita ligeramente el matiz formal de καθαρᾷ συνειδήσει.
    rationale: «Conciencia pura» es más cercano al registro doxológico y al adjetivo griego καθαρά.
  - severity: low
    issue: «Nombre todo-virtuoso» es demasiado calcado.
    rationale: Es defendible, pero en español suena rígido. «Su nombre lleno de toda virtud» conserva el énfasis sin opacidad excesiva.
