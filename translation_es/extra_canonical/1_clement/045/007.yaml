revisions:
- from: ¿O acaso Ananías, Azarías y Misael fueron[a] encerrados en un horno de fuego por los que practicaban la magnífica y gloriosa religión del Altísimo? ¡Que esto no suceda jamás! ¿Quiénes fueron entonces los que hicieron estas cosas? Los odiosos y los llenos de toda maldad se encendieron en tanta ira, que sometieron a abuso a los que servían a Dios con un propósito santo e irreprochable, sin saber que el Altísimo es defensor y protector de los que adoran su nombre todo-virtuoso con conciencia limpia; a él sea la gloria por los siglos de los siglos. Amén.
  to: ¿O acaso Ananías, Azarías y Misael fueron confinados[a] en un horno de fuego por los que practicaban la magnífica y gloriosa religión del Altísimo? ¡Que esto no suceda jamás! ¿Quiénes fueron entonces los que hicieron estas cosas? Los detestables, llenos de toda maldad, se encendieron en tanta ira que sometieron a maltratos a los que servían a Dios con un propósito santo e irreprochable, sin saber que el Altísimo es defensor y protector de los que adoran su nombre lleno de toda virtud con conciencia pura; a él sea la gloria por los siglos de los siglos. Amén.
  rationale: 'Se corrige la nota y se ajustan varias expresiones para reflejar mejor el griego y sonar naturales en español: «confinados» para κατείρχθησαν, una nota coherente con el valor de encierro; «sometieron a maltratos» para εἰς αἰκίαν περιβαλεῖν; «conciencia pura» para καθαρᾷ συνειδήσει; y una solución más idiomática para παναρέτῳ ὀνόματι.'
