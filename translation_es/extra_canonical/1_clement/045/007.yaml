  revised_footnotes:
  - marker: a
    text: O «fueron encerrados en un horno de fuego». El verbo griego expresa ser confinados o encerrados, no simplemente arrojados.
    reason: Aclara la mejor lectura léxica de κατείρχθησαν sin reproducir una nota inglesa conflictiva.
  revision_rationale: 'Se corrige la nota y se ajustan varias expresiones para reflejar mejor el griego y sonar naturales en español: «confinados» para κατείρχθησαν, una nota coherente con el valor de encierro; «sometieron a maltratos» para εἰς αἰκίαν περιβαλεῖν; «conciencia pura» para καθαρᾷ συνειδήσει; y una solución más idiomática para παναρέτῳ ὀνόματι.'
