lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - tales cosas
  lexicon: demonstrative pronoun / adjective
  rationale: «Estas cosas» sigue de cerca el deíctico plural griego y corresponde bien al inglés POB «these things» sin añadir contenido no presente en el texto.
- source_word: πάσχοντες
  english_pob_choice: suffering
  chosen_spanish: padecían
  alternatives_spanish:
  - sufrían
  - estaban padeciendo
  lexicon: present active participle of πάσχω
  rationale: «Padecían» comunica el acto de sufrir con un tono más natural y digno en español, manteniendo el valor durativo del participio.
- source_word: εὐκλεῶς
  english_pob_choice: nobly
  chosen_spanish: noblemente
  alternatives_spanish:
  - honrosamente
  - gloriosamente
  lexicon: adverb of manner
  rationale: «Noblemente» reproduce directamente el adverbio de manera del griego y coincide con la elección del POB en inglés.
- source_word: ἤνεγκαν
  english_pob_choice: they endured
  chosen_spanish: las soportaron
  alternatives_spanish:
  - las sufrieron
  - las aguantaron
  lexicon: aorist active of φέρω in this context as endure/bear
  rationale: «Las soportaron» expresa bien el sentido de resistir o sobrellevar pruebas en español y preserva el matiz de endurance del inglés POB.
theological_decisions:
- issue: Matiz de la resistencia en el sufrimiento
  english_pob_reading: While suffering these things, they endured nobly.
  chosen_spanish_reading: Mientras padecían estas cosas, las soportaron noblemente.
  alternative_spanish_readings:
  - Mientras sufrían estas cosas, las soportaron noblemente.
  - Al padecer estas cosas, las soportaron noblemente.
  rationale: El texto no introduce una interpretación doctrinal específica; solo describe una conducta ejemplar en medio del sufrimiento. La redacción española conserva ese carácter descriptivo sin intensificarlo ni moralizarlo más allá del griego.
  doctrine_reference: No aplica; descripción narrativa/parenética sin término doctrinal explícito.
translation_notes:
  revision_awareness: Se revisó el texto griego normalizado («ταῦτα πάσχοντες εὐκλεῶς ἤνεγκαν») y el POB inglés. No se requieren notas porque no hay variante textual ni ambigüedad teológica documentada que deba preservarse en el español.
  spanish_consistency_notes:
  - 'Se evita el calco rígido de «while suffering» con una estructura natural en español: «Mientras padecían».'
  - Se mantiene el plural deíctico «estas cosas» para reflejar ταῦτα.
  - «Noblemente» conserva el adverbio de modo sin introducir una valoración ajena al texto.
