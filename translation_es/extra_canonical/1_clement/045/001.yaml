translation:
  language: es
  text: 'Son pendencieros, hermanos, y celosos por las cosas que pertenecen a la salvación. Han mirado con atención las santas Escrituras, las verdaderas Escrituras, las dadas por medio del Espíritu Santo. Saben que en ellas no se ha escrito nada injusto ni falsificado; no encontrarán a justos desechados por hombres santos. Los justos fueron perseguidos, pero por los sin ley; fueron encarcelados, pero por los impíos; fueron apedreados por los que quebrantan la ley; fueron muertos por quienes estaban contaminados e injustos, por una envidia intolerable. Al padecer estas cosas, las soportaron noblemente.


    Pues ¿qué diremos, hermanos? ¿Fue Daniel arrojado a un foso de leones por los que temían a Dios? ¿O fueron Ananías, Azarías y Misael bajados a un horno de fuego por los que practicaban la magnífica y gloriosa religión del Altísimo? ¡De ningún modo! ¿Quiénes fueron entonces los que hicieron estas cosas? Los aborrecibles y llenos de toda maldad se encendieron hasta tal punto de ira que sometieron a maltratos a los que servían a Dios con un propósito santo e irreprochable, sin saber que el Altísimo es campeón y defensor de los que adoran su nombre[a] todo-virtuoso con conciencia pura, a quien sea la gloria por los siglos de los siglos. Amén.


    Pero los que perseveraron con confianza heredaron gloria y honor, y fueron exaltados, y quedaron inscritos por Dios en su memorial por los siglos de los siglos. Amén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Todo-virtuoso'' traduce el raro adjetivo παναρέτῳ y conserva su intensidad acumulativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Φιλόνεικοί
  english_pob_choice: contentious
  chosen_spanish: contendientes
  alternatives_spanish:
  - pendencieros
  - querellosos
  lexicon: LSJ
  rationale: El griego expresa afición a la disputa o rivalidad. En español, 'contendientes' conserva el tono de reprensión sin sonar tan coloquial como 'pendencieros', y evita una paráfrasis excesiva.
- source_word: ζηλωταί
  english_pob_choice: zealous
  chosen_spanish: celosos
  alternatives_spanish:
  - zelosos
  - fervientes
  - diligentes
  lexicon: BDAG
  rationale: Aquí la idea es de intensa dedicación; 'celosos' mantiene la fuerza y permite que el complemento ('de las cosas que pertenecen a la salvación') delimite su objeto.
- source_word: τῶν ἀνηκόντων εἰς σωτηρίαν
  english_pob_choice: the things that pertain to salvation
  chosen_spanish: de las cosas que pertenecen a la salvación
  alternatives_spanish:
  - de los asuntos que pertenecen a la salvación
  - de lo que conviene para la salvación
  lexicon: LSJ
  rationale: Conserva la relación de pertenencia/tendencia hacia la salvación sin volverla más abstracta de lo que exige el griego.
- source_word: ἐνεκύψατε
  english_pob_choice: have looked intently into
  chosen_spanish: habéis mirado con atención
  alternatives_spanish:
  - habéis contemplado con detenimiento
  - os habéis inclinado para examinar
  lexicon: BDAG
  rationale: El verbo sugiere inclinarse o mirar cuidadosamente. En español, 'mirado con atención' transmite la inspección diligente sin sonar forzado.
- source_word: ἱερὰς γραφάς
  english_pob_choice: holy Scriptures
  chosen_spanish: las santas Escrituras
  alternatives_spanish:
  - las Sagradas Escrituras
  - las santas escrituras
  lexicon: BDAG
  rationale: '''Santas Escrituras'' conserva el registro eclesial y la cualidad sagrada, sin depender de una fórmula tradicional fija.'
- source_word: ἀληθεῖς
  english_pob_choice: 'true'
  chosen_spanish: verdaderas
  alternatives_spanish:
  - verdaderas y fieles
  - auténticas
  lexicon: LSJ
  rationale: '''Verdaderas'' comunica la afirmación de confiabilidad y realidad de la Escritura sin expandir el sentido.'
- source_word: παρεπεποιημένον
  english_pob_choice: falsified
  chosen_spanish: falsificado
  alternatives_spanish:
  - corrompido
  - alterado
  - forjado
  lexicon: LSJ
  rationale: Preserva la idea de algo adulterado o manipulado; es más preciso que un simple 'corrupto'.
- source_word: ἀποβεβλημένους
  english_pob_choice: cast off
  chosen_spanish: desechados
  alternatives_spanish:
  - rechazados
  - expulsados
  lexicon: BDAG
  rationale: '''Desechados'' mantiene la fuerza de exclusión sin añadir un matiz institucional que el griego no exige.'
- source_word: ἀνόμων
  english_pob_choice: the lawless
  chosen_spanish: los sin ley
  alternatives_spanish:
  - los impíos
  - los malvados
  lexicon: BDAG
  rationale: '''Sin ley'' reproduce con transparencia el carácter jurídico-moral del término y evita suavizarlo.'
- source_word: ἀνοσίων
  english_pob_choice: the unholy
  chosen_spanish: los impíos
  alternatives_spanish:
  - los profanos
  - los irreverentes
  lexicon: LSJ
  rationale: Aquí el contraste con los justos pide un término moral fuerte; 'impíos' es idiomático y adecuado en español.
- source_word: παρανόμων
  english_pob_choice: the lawbreakers
  chosen_spanish: los que quebrantan la ley
  alternatives_spanish:
  - los transgresores
  - los infractores
  lexicon: LSJ
  rationale: Mantiene explícita la idea de violación de la ley y evita un sustantivo demasiado técnico o ambiguo.
- source_word: ζήλῳ ἀνεκτρίστῳ
  english_pob_choice: through intolerable jealousy
  chosen_spanish: a causa de una envidia intolerable
  alternatives_spanish:
  - por una envidia insoportable
  - por celo intolerable
  lexicon: LSJ
  rationale: En este contexto ζῆλος tiene matiz negativo, cercano a envidia o rivalidad celosa. 'Envidia intolerable' preserva la carga moral negativa.
- source_word: εὐκλεῶς
  english_pob_choice: nobly
  chosen_spanish: noblemente
  alternatives_spanish:
  - con honor
  - gloriosamente
  lexicon: LSJ
  rationale: Es la correspondencia natural en español y conserva la dignidad del sufrimiento soportado.
- source_word: θρησκευόντων ... θρησκείαν
  english_pob_choice: practiced ... religion
  chosen_spanish: practicaban ... religión
  alternatives_spanish:
  - observaban ... religión
  - rendían culto ... culto
  lexicon: BDAG
  rationale: La repetición del verbo y el sustantivo se conserva para reflejar el juego retórico del griego. 'Religión' aquí designa práctica devota/cultual, no solo creencia interior.
- source_word: κατείρχθησαν
  english_pob_choice: were brought down
  chosen_spanish: fueron llevados
  alternatives_spanish:
  - fueron arrojados
  - fueron descendidos
  lexicon: LSJ
  rationale: La imagen es descendente hacia el horno. 'Fueron llevados' es natural en español y conserva el movimiento hacia abajo.
- source_word: μηδὲ ταῦτα τοῦτο γένοιτο
  english_pob_choice: May this never be!
  chosen_spanish: ¡Que esto nunca suceda!
  alternatives_spanish:
  - ¡De ningún modo!
  - ¡Nunca sea así!
  lexicon: BDAG
  rationale: Reproduce la fuerza de rechazo enfático del giro griego sin sonar artificial.
- source_word: στυγητοί
  english_pob_choice: the hateful
  chosen_spanish: los aborrecibles
  alternatives_spanish:
  - los odiosos
  - los detestables
  lexicon: LSJ
  rationale: '''Aborrecibles'' expresa la cualidad moral repulsiva del término sin confundirlo con el sentimiento de otros hacia ellos.'
- source_word: ἐξήρισαν θυμοῦ
  english_pob_choice: were stirred up to such a pitch of wrath
  chosen_spanish: fueron excitados hasta tal punto de ira
  alternatives_spanish:
  - fueron inflamados hasta tal punto de ira
  - se encendieron hasta tal punto de ira
  lexicon: LSJ
  rationale: Conserva la intensificación emocional. 'Excitados' aquí tiene el sentido de agitados/impulsados, no sexual ni moderno coloquial.
- source_word: εἰς αἰκίαν περιβαλεῖν
  english_pob_choice: subjected to abuse
  chosen_spanish: sometieron a abuso
  alternatives_spanish:
  - los envolvieron en maltrato
  - los expusieron a vejaciones
  lexicon: LSJ
  rationale: Es una forma compacta de traducir la imposición de ultraje/maltrato. Mantiene la dureza del griego sin desbordarse en una paráfrasis.
- source_word: προθέσει
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - intención
  - resolución
  lexicon: BDAG
  rationale: '''Propósito'' refleja bien la disposición interna y el fin moral del servicio a Dios.'
- source_word: ὑπέρμαχος καὶ ὑπερασπιστής
  english_pob_choice: champion and defender
  chosen_spanish: campeón y defensor
  alternatives_spanish:
  - protector y defensor
  - abogado y defensor
  lexicon: LSJ
  rationale: 'Preserva el par de imágenes: una forense y otra combativa. ''Campeón'' traduce la fuerza de ὑπέρμαχος mejor que un término más débil.'
- source_word: παναρέτῳ
  english_pob_choice: all-virtuous
  chosen_spanish: todo-virtuoso
  alternatives_spanish:
  - perfectamente virtuoso
  - absolutamente virtuoso
  lexicon: LSJ
  rationale: La forma compuesta es rara y enfática. 'Todo-virtuoso' conserva esa rareza y totalidad mejor que una adaptación más normalizada.
- source_word: ὑπομένοντες ἐν πεποιθήσει
  english_pob_choice: endured in confidence
  chosen_spanish: perseveran con confianza
  alternatives_spanish:
  - perseveraron con confianza
  - permanecen con confianza
  lexicon: BDAG
  rationale: '''Perseverar con confianza'' comunica bien la continuidad firme del verbo y el sustantivo de convicción.'
- source_word: ἐκληρονόμησαν
  english_pob_choice: inherited
  chosen_spanish: heredaron
  alternatives_spanish:
  - recibieron como herencia
  - obtuvieron
  lexicon: BDAG
  rationale: Conserva la metáfora bíblica de la herencia.
- source_word: ἔγγραφοι ἐγένοντο
  english_pob_choice: became enrolled
  chosen_spanish: quedaron inscritos
  alternatives_spanish:
  - fueron inscritos
  - pasaron a figurar
  lexicon: LSJ
  rationale: La imagen es de registro formal; 'quedaron inscritos' suena natural y retiene la pasividad resultativa.
- source_word: ἐν τῷ μνημοσύνῳ αὐτῶν
  english_pob_choice: in their memorial
  chosen_spanish: en su memorial
  alternatives_spanish:
  - en su recordatorio
  - en su libro de memoria
  lexicon: LSJ
  rationale: El griego habla de memorial/recuerdo, sin decir explícitamente 'libro'. 'Memorial' conserva la ambigüedad productiva del original.
theological_decisions:
- issue: Carácter y fiabilidad de las Escrituras
  english_pob_reading: nothing unjust or falsified has been written in them
  chosen_spanish_reading: en ellas no ha sido escrito nada injusto ni falsificado
  alternative_spanish_readings:
  - no se ha escrito en ellas nada corrupto
  - en ellas no hay nada incorrecto
  rationale: El español mantiene la tensión entre justicia moral ('injusto') y alteración textual ('falsificado'), sin imponer una formulación técnica posterior sobre la inspiración.
  doctrine_reference: Alta valoración de la Escritura en 1 Clemente; evitar resolver la cuestión con categorías dogmáticas posteriores.
- issue: θρησκεία aplicada a los tres jóvenes hebreos
  english_pob_reading: those who practiced the magnificent and glorious religion of the Most High
  chosen_spanish_reading: los que practicaban la magnífica y gloriosa religión del Altísimo
  alternative_spanish_readings:
  - los que rendían culto magnífico y glorioso al Altísimo
  - los que observaban la espléndida religión del Altísimo
  rationale: '''Religión'' conserva el sustantivo del griego y el contraste retórico: quienes de verdad practicaban la devoción al Altísimo no habrían cometido tales actos.'
  doctrine_reference: Lenguaje de culto y piedad sin modernizarlo a un concepto privado de religión.
- issue: Imagen de memoria final
  english_pob_reading: became enrolled by God in their memorial forever and ever
  chosen_spanish_reading: quedaron inscritos por Dios en su memorial por los siglos de los siglos
  alternative_spanish_readings:
  - fueron inscritos por Dios en su memoria
  - fueron registrados por Dios en el libro de su memoria
  rationale: Se conserva la imagen de inscripción divina sin añadir 'libro' en el cuerpo principal, ya que el griego sólo menciona memorial/recuerdo.
  doctrine_reference: Primacía del texto original sobre ampliaciones tradicionales.
translation_notes:
  revision_awareness: 'Seguí la línea del último pase inglés, especialmente en ἐνεκύψατε (''mirado con atención'') y en el cierre con ''quedaron inscritos''. A la vez, ajusté el español para que no dependa mecánicamente del inglés: mantuve la oposición moral de ἄδικον/παρεπεποιημένον con ''injusto ni falsificado'', preservé el juego θρησκευόντων/θρησκείαν con ''practicaban... religión'', y respeté la rareza enfática de παναρέτῳ mediante una solución marcada en español. También conservé la estructura retórica larga del original sin fragmentarla en exceso.'
  spanish_consistency_notes:
  - Usé 'Yahvé' sólo cuando aparece el nombre divino explícito; aquí el texto dice 'Dios' y 'Altísimo', así que no corresponde.
  - Mantuve 'santas Escrituras' / 'verdaderas Escrituras' con mayúsculas iniciales por tratarse de un uso reverencial en español eclesial.
  - 'Preferí ''los sin ley'', ''los impíos'' y ''los que quebrantan la ley'' para distinguir los tres términos griegos distintos: ἀνόμων, ἀνοσίων y παρανόμων.'
  - Conservé 'memorial' en lugar de 'libro de memoria' para no añadir una imagen no explícita en el griego.
  - Evité 'siervo' para δοῦλος porque aquí no aparece; el texto habla de servir a Dios con propósito santo y requiere 'servían'.
