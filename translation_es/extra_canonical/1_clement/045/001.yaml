  text: Φιλόνεικοί ἐστε, ἀδελφοί, καὶ ζηλωταὶ περὶ τῶν ἀνηκόντων εἰς σωτηρίαν. 2. ἐνεκύψατε εἰς τὰς ἱερὰς γραφάς, τὰς ἀληθεῖς, τὰς διὰ τοῦ πνεύματος τοῦ ἁγίου. 3. ἐπίστασθε, ὅτι οὐδὲν ἄδικον οὐδὲ παρεπεποιημένον γέγραπται ἐν αὐταῖς· οὐχ εὑρήσετε δικαίους ἀποβεβλημένους ἀπὸ ὁσίων ἀνδρῶν. 4. ἐδιώχθησαν δίκαιοι, ἀλλ᾽ ὑπὸ ἀνόμων, ἐφυλακίσθησαν, ἀλλ᾽ ὑπὸ ἀνοσίων· ἐλιθοβόλησαν ὑπὸ παρανόμων· ἀπεκτείνθησαν ὑπὸ τῶν μιαρῶν καὶ ἀδίκων ζήλῳ ἀνεκτρίστῳ. 5. ταῦτα πάσχοντες εὐκλεῶς ἤνεγκαν.. 6. τί γὰρ εἴπωμεν, ἀδελφοί; Δανιὴλ ὑπὸ τῶν φοβουμένων τὸν θεὸν ἐβλήθη εἰς λάκκον λεόντων; 7. ἢ Ἀνανίας καὶ Ἀζαρίας καὶ Μισαὴλ ὑπὸ τῶν θρησκευόντων τὴν μεγαλοπρεπῆ καὶ ἔνδοξον θρησκείαν τοῦ ὑψίστου κατείρχθησαν εἰς κάμινον πυρός, μηδὲ ταῦτα τοῦτο γένοιτο. τίνες οὖν οἱ ταῦτα δράσαντες; οἱ στυγητοὶ καὶ πάσης κακίας πλήρεις εἰς τοσοῦτο ἐξήρισαν θυμοῦ, ὥστε τοὺς ἐν ὁσίᾳ καὶ ἀμώμῳ προθέσει δουλεύοντας τῷ θεῷ εἰς αἰκίαν περιβαλεῖν, μὴ εἰδότες, ὅτι ὁ ὕψιστος ὑπέρμαχος καὶ ὑπερασπιστής ἐστιν τῶν ἐν καθαρᾷ συνειδήσει λατρευόντων
    τῷ παναρέτῳ ὀνόματι αὐτοῦ· ᾧ ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν. 8. οἱ δὲ ὑπομένοντες ἐν πεποιθήσει δόξαν καὶ τιμὴν ἐκληρονόμησαν, ἐπήρθησάν τε καὶ ἔγγραφοι ἐγένοντο ἀπὸ τοῦ θεοῦ ἐν τῷ μνημοσύνῳ αὐτῶν εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
