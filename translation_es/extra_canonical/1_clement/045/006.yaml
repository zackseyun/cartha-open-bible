translation:
  language: es
  text: ¿Pues qué diremos, hermanos? ¿Fue Daniel arrojado a un foso de leones por los que temían a Dios?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τί γὰρ εἴπωμεν, ἀδελφοί;
  english_pob_choice: For what shall we say, brothers?
  chosen_spanish: ¿Pues qué diremos, hermanos?
  alternatives_spanish:
  - ¿Qué diremos, hermanos?
  - ¿Qué, pues, diremos, hermanos?
  lexicon: τί; γάρ; εἴπωμεν; ἀδελφοί
  rationale: Se conserva la pregunta retórica y el vocativo fraternal. «Pues» refleja bien γάρ en una transición discursiva natural en español, sin sobrecargar el orden de palabras.
- source_word: Δανιὴλ
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  alternatives_spanish:
  - Daniel
  lexicon: Δανιήλ
  rationale: Nombre propio bíblico establecido en español.
- source_word: ὑπὸ τῶν φοβουμένων τὸν θεὸν
  english_pob_choice: by those who feared God
  chosen_spanish: por los que temían a Dios
  alternatives_spanish:
  - por los que temían a Dios
  - por quienes temían a Dios
  lexicon: ὑπό + genitivo; φοβέομαι; θεός
  rationale: Se mantiene la voz pasiva con «por» y el participio como relativa natural en español. «Temían a Dios» conserva el matiz reverente del participio sin convertirlo en una etiqueta doctrinal más fuerte de lo que el griego dice.
- source_word: ἐβλήθη εἰς λάκκον λεόντων
  english_pob_choice: Was Daniel thrown into a den of lions?
  chosen_spanish: ¿Fue Daniel arrojado en un foso de leones?
  alternatives_spanish:
  - ¿Fue Daniel echado en un foso de leones?
  - ¿Fue Daniel arrojado a un foso de leones?
  lexicon: βάλλω; λάκκος; λέων
  rationale: «Arrojado» conserva la fuerza de ἐβλήθη; «foso» reproduce λάκκος con claridad bíblica y naturalidad en español. «De leones» sigue el genitivo de contenido sin necesidad de ampliar.
theological_decisions:
- issue: Referencia reverente a Dios sin sustitución por un título velado
  english_pob_reading: those who feared God
  chosen_spanish_reading: los que temían a Dios
  alternative_spanish_readings:
  - los que temían al Dios verdadero
  - los piadosos
  rationale: El texto griego usa θεόν sin ambigüedad. Se mantiene «Dios» en español, evitando cualquier sustitución litúrgica que atenúe la referencia directa.
  doctrine_reference: Teología bíblica del temor de Dios; fidelidad referencial al texto
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios y el cotejo de control reportó alta concordancia (1.0). Se mantiene esa lectura sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
