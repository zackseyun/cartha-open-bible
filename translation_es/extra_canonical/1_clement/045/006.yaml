    issue: Preposición de movimiento en «arrojado en un foso»
    rationale: El griego ἐβλήθη εἰς λάκκον expresa dirección/entrada («fue arrojado a/dentro de un foso»). En español, «arrojado a un foso» preserva mejor ese valor que «en un foso», que puede sonar más estático o menos idiomático.
  revised_spanish_text: ¿Pues qué diremos, hermanos? ¿Fue Daniel arrojado a un foso de leones por los que temían a Dios?
  revision_rationale: 'Se hace una reparación mínima para reflejar con más precisión εἰς en la frase de movimiento: «arrojado a un foso» en lugar de «arrojado en un foso». No se requieren notas al pie.'
