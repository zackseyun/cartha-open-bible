source:
  edition: Funk 1901 (normalized OCR)
  text: οἱ δὲ ὑπομένοντες ἐν πεποιθήσει δόξαν καὶ τιμὴν ἐκληρονόμησαν, ἐπήρθησάν τε καὶ ἔγγραφοι ἐγένοντο ἀπὸ τοῦ θεοῦ ἐν τῷ μνημοσύνῳ αὐτῶν εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/045/008.yaml
  text: But those who endured in confidence inherited glory and honor[a], and were exalted, and were enrolled by God in their memorial forever and ever[b]. Amen.
  footnotes:
  - marker: a
    text: Or 'those who endure'.
    reason: previous_rendering
  - marker: b
    text: Or 'became enrolled by God in their memorial'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:52Z'
    unchanged: false
    changes_summary: Replaced the semicolon with a comma for smoother coordination; changed 'they were enrolled by God in his remembrance of them' to 'were enrolled by God in their memorial' to reflect ἐν τῷ μνημοσύνῳ αὐτῶν more directly and naturally without interpretive expansion.
translation:
  language: es
  text: Pero los que perseveraron con confianza heredaron gloria y honor[a], y fueron exaltados, y fueron inscritos por Dios en su registro memorial para siempre jamás[b]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “los que perseveran”.'
    reason: alternative_reading
  - marker: b
    text: 'O: “fueron inscritos por Dios en su memorial”.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπομένοντες
  english_pob_choice: those who endured
  chosen_spanish: los que perseveraron
  alternatives_spanish:
  - los que endurecieron
  - los que soportaron
  lexicon: ὑπομένω
  rationale: El participio sustantivado expresa perseverancia bajo prueba; en español, “perseveraron” comunica bien la continuidad fiel que el contexto narra, sin perder el matiz de resistencia. “Soportaron” puede sonar más pasivo, y “endurecieron” es menos natural aquí.
- source_word: ἐν πεποιθήσει
  english_pob_choice: in confidence
  chosen_spanish: con confianza
  alternatives_spanish:
  - en confianza
  - en plena confianza
  lexicon: πεποίθησις
  rationale: La confianza es el contenido natural de πεποίθησις; en español, la construcción “con confianza” resulta más idiomática que una calca rígida, y conserva el sentido de firme seguridad.
- source_word: δόξαν καὶ τιμήν
  english_pob_choice: glory and honor
  chosen_spanish: gloria y honor
  alternatives_spanish:
  - honra y gloria
  - gloria y dignidad
  lexicon: δόξα / τιμή
  rationale: Se mantiene la pareja establecida por el griego y por el POB en inglés. “Gloria y honor” es la correspondencia más directa y eclesialmente inteligible en español.
- source_word: ἐπήρθησαν
  english_pob_choice: were exalted
  chosen_spanish: fueron exaltados
  alternatives_spanish:
  - fueron levantados
  - fueron enaltecidos
  lexicon: ἐπαίρω
  rationale: El pasivo aoristo indica elevación o exaltación otorgada por Dios; “fueron exaltados” preserva esa voz pasiva y el resultado honorífico. “Enaltecidos” es posible, pero menos directo al paralelo con el griego.
- source_word: ἔγγραφοι ἐγένοντο
  english_pob_choice: were enrolled
  chosen_spanish: fueron inscritos
  alternatives_spanish:
  - quedaron inscritos
  - fueron registrados
  lexicon: ἔγγραφος / γράφω
  rationale: La imagen es la de quedar formalmente registrados. “Fueron inscritos” es natural en español y mantiene la fuerza administrativa/recordatoria del griego sin explicar de más.
- source_word: μνημοσύνον
  english_pob_choice: their memorial
  chosen_spanish: su memorial
  alternatives_spanish:
  - su recuerdo
  - su memoria
  lexicon: μνημόσυνον
  rationale: El sustantivo puede referirse a un memorial o recordatorio registrado. “Memorial” preserva la idea de un registro con valor conmemorativo, evitando reducirlo a mera memoria subjetiva.
- source_word: αὐτῶν
  english_pob_choice: their memorial
  chosen_spanish: su memorial
  alternatives_spanish:
  - memorial de ellos
  - memorial de su persona
  lexicon: αὐτῶν
  rationale: 'Aquí el genitivo funciona de manera objetiva: el memorial/recuerdo es de ellos ante Dios. En español, “su memorial” mantiene la relación sin añadir una paráfrasis interpretativa.'
theological_decisions:
- issue: La relación entre el registro de Dios y el “memorial” de los fieles
  english_pob_reading: were enrolled by God in their memorial
  chosen_spanish_reading: fueron inscritos por Dios en su memorial
  alternative_spanish_readings:
  - fueron inscritos por Dios en el memorial de ellos
  - fueron inscritos por Dios para ser recordados por él
  rationale: 'El griego permite entender un acto de inscripción ligado al recordatorio divino. La formulación española conserva la ambigüedad controlada del texto: no convierte el memorial en un monumento humano, pero tampoco explicita más de lo que el original dice.'
  doctrine_reference: memoria/recordación divina; preservación del sentido del juicio y recompensa de Dios
translation_notes:
  revision_awareness: 'El inglés audit trail revisó “those who endure” a “those who endured” por el tiempo narrativo del contexto, y aclaró que ἔγγραφοι ἐγένοντο se entiende mejor como “were enrolled” y μνημόσυνον como un memorial/recordatorio de ellos ante Dios. La versión española sigue esas revisiones: usa pretérito (“perseveraron”, “fueron exaltados”, “fueron inscritos”) y conserva el valor de registro conmemorativo en “memorial”, sin expandirlo a una paráfrasis interpretativa.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” solo cuando el texto lo exija; aquí el griego dice θεοῦ, por lo que corresponde “Dios”.
  - “Gloria y honor” conserva la pareja léxica tradicional y el paralelo con el griego.
  - Se prefirió “inscritos” a “registrados” por mayor naturalidad bíblica en español y por la imagen de inscripción formal.
  - “Memorial” se usa con sentido de recuerdo/registro con valor conmemorativo, coherente con el análisis del POB en inglés.
