revisions:
- from: Pero los que perseveraron con confianza heredaron gloria y honor[a], y fueron exaltados, y fueron inscritos por Dios en su memorial para siempre jamás[b]. Amén.
  to: Pero los que perseveraron con confianza heredaron gloria y honor[a], y fueron exaltados, y fueron inscritos por Dios en su registro memorial para siempre jamás[b]. Amén.
  rationale: Se conserva el sentido del griego y del POB auditado, pero se reemplaza 'en su memorial' por 'en su registro memorial' para que la construcción con 'fueron inscritos' sea más natural y transparente en español, manteniendo a la vez la imagen de un memorial/recordatorio formal. La nota b preserva la formulación más literal como alternativa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:04:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del griego: contraste con δὲ, participio sustantivado pasado por el contexto narrativo (''los que perseveraron''), ἐν πεποιθήσει como confianza, herencia de gloria y honor, exaltación, e inscripción por parte de Dios. La principal dificultad está en ἐν τῷ μνημοσύνῳ αὐτῶν: ''en su memorial'' es posible como calco del inglés POB, pero en español suena ambiguo y menos natural; además, la nota alternativa actual (''en su memoria'') no resuelve bien la relación del genitivo.'
  spanish_quality_summary: El español es claro y digno, pero 'memorial' en este contexto suena algo opaco para lectores generales. 'Registro memorial' mejora la legibilidad sin apartarse del sentido de inscripción/recordación. También conviene ajustar la nota b para reflejar una alternativa más fiel a la ambigüedad del griego y más natural en español.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Las decisiones principales ('perseveraron', 'confianza', 'gloria y honor', 'fueron exaltados', 'fueron inscritos') son adecuadas. La única revisión léxica recomendada es μνημόσυνον/αὐτῶν, donde 'registro memorial' expresa mejor en español la idea de recordatorio inscrito.
  issues:
  - severity: medium
    issue: La expresión 'en su memorial' resulta poco natural en español contemporáneo.
    rationale: Aunque reproduce de cerca el inglés POB y puede defenderse léxicamente, en español 'memorial' suele evocar un monumento o escrito formal, no tanto un registro de recordación. El contexto con 'fueron inscritos' pide una formulación que preserve la imagen de inscripción.
  - severity: low
    issue: La nota b ('en su memoria') no es la mejor alternativa española.
    rationale: '''Memoria'' puede sonar demasiado psicológica o interna, y no refleja bien el matiz de μνημόσυνον como recordatorio/memorial registrado. Una alternativa como ''en su memorial'' o ''para su memoria'' funciona mejor si el texto principal se revisa.'
  revised_spanish_text: Pero los que perseveraron con confianza heredaron gloria y honor[a], y fueron exaltados, y fueron inscritos por Dios en su registro memorial para siempre jamás[b]. Amén.
  revised_footnotes:
  - marker: a
    text: 'O: “los que perseveran”.'
    reason: alternative_reading
  - marker: b
    text: 'O: “fueron inscritos por Dios en su memorial”.'
    reason: alternative_reading
  revision_rationale: Se conserva el sentido del griego y del POB auditado, pero se reemplaza 'en su memorial' por 'en su registro memorial' para que la construcción con 'fueron inscritos' sea más natural y transparente en español, manteniendo a la vez la imagen de un memorial/recordatorio formal. La nota b preserva la formulación más literal como alternativa.
