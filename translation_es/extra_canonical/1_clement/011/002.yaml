id: 1CLEM.11.2
reference: 1 Clement 11:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: συνεξελθούσης γὰρ αὐτῷ τῆς γυναικὸς ἑτερογνώμονος ὑπάρχουσης καὶ οὐκ ἐν ὁμονοίᾳ, εἰς τοῦτο σημεῖον ἐτέθη, ὥστε γενέσθαι αὐτὴν στήλην ἁλὸς ἕως τῆς ἡμέρας ταύτης, εἰς τὸ γνωστὸν εἶναι πᾶσιν, ὅτι οἱ δίψυχοι καὶ οἱ διστάζοντες περὶ τῆς τοῦ θεοῦ δυνάμεως εἰς κρίμα καὶ εἰς σημείωσιν πάσαις ταῖς γενεαῖς γίγονται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/011/002.yaml
  text: For when his wife went out with him[a], being of a different mind and not in agreement, she was made a sign for this reason, so that she became a pillar of salt to this very day[c][b], in order that it might be known to all that the double-minded and those who doubt the power of God become a judgment and a warning to all generations.
  footnotes:
  - marker: a
    text: Or 'she was set forth as a sign'.
    reason: previous_rendering
  - marker: b
    text: Or 'harmony'.
    reason: previous_rendering
  - marker: c
    text: Or 'come to judgment and become a warning'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:12Z'
    unchanged: false
    changes_summary: Revised 'not in concord' to 'not in agreement' for more natural formal English, and adjusted 'for this reason she was set as a sign' to 'she was made a sign for this reason' to better reflect the Greek word order and idiom.
translation:
  language: es
  text: Porque cuando su esposa salió con él[a], siendo de diferente parecer y no estando en concordia[b], fue puesta como señal por esta razón, de modo que llegó a ser una columna de sal hasta el día de hoy, para que fuera conocido por todos que los de doble ánimo y los que dudan del poder de Dios llegan a ser un juicio y una advertencia[c] para todas las generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'salió junto con él'.
    reason: alternative_reading
  - marker: b
    text: O 'de acuerdo'.
    reason: alternative_reading
  - marker: c
    text: O 'llegan a juicio y llegan a ser una advertencia'.
    reason: previous_rendering
lexical_decisions:
- source_word: συνεξελθούσης ... αὐτῷ τῆς γυναικός
  english_pob_choice: when his wife went out with him
  chosen_spanish: cuando su esposa salió con él
  alternatives_spanish:
  - cuando su mujer salió con él
  - cuando su esposa salió junto con él
  lexicon: συνεξέρχομαι
  rationale: Conserva la idea de salir junto con él sin añadir matices narrativos no presentes. 'Esposa' mantiene claridad moderna y dignidad; 'salió con él' refleja el movimiento conjunto.
- source_word: ἑτερογνώμονος ὑπάρχουσης
  english_pob_choice: being of a different mind
  chosen_spanish: siendo de diferente parecer
  alternatives_spanish:
  - siendo de otra mente
  - teniendo otra opinión
  lexicon: ἑτερογνώμων
  rationale: '''Diferente parecer'' comunica la discrepancia de juicio sin sonar mecánico. Respeta el matiz de desacuerdo interior o de criterio, sin convertirlo en una paráfrasis psicológica excesiva.'
- source_word: οὐκ ἐν ὁμονοίᾳ
  english_pob_choice: not in agreement
  chosen_spanish: no estando en concordia
  alternatives_spanish:
  - no estando de acuerdo
  - no viviendo en armonía
  lexicon: ὁμόνοια
  rationale: '''Concordia'' preserva mejor el registro programático de 1 Clement que ''armonía'', y evita reducir el término a una mera amabilidad relacional. Se mantiene el contraste con desunión o desacuerdo.'
- source_word: εἰς τοῦτο σημεῖον ἐτέθη
  english_pob_choice: she was made a sign for this reason
  chosen_spanish: fue puesta como señal por esta razón
  alternatives_spanish:
  - fue hecha señal por esta razón
  - fue puesta como señal para este fin
  lexicon: σημεῖον / τίθημι
  rationale: Se conserva explícitamente la conexión causal 'por esta razón', que el audit trail inglés restauró desde εἰς τοῦτο. 'Puesta como señal' refleja la pasiva y el carácter resultativo del giro.
- source_word: στήλην ἁλός
  english_pob_choice: pillar of salt
  chosen_spanish: una columna de sal
  alternatives_spanish:
  - una estatua de sal
  - un pilar de sal
  lexicon: στήλη ἁλός
  rationale: '''Columna de sal'' es natural en español y mantiene el vínculo con la tradición bíblica sin forzar un término más interpretativo. ''Pilar'' también sería posible, pero ''columna'' resulta más sobrio y directo.'
- source_word: οἱ δίψυχοι καὶ οἱ διστάζοντες
  english_pob_choice: the double-minded and those who doubt
  chosen_spanish: los de doble ánimo y los que dudan
  alternatives_spanish:
  - los vacilantes y los que dudan
  - los de ánimo dividido y los que vacilan
  lexicon: δίψυχος / διστάζω
  rationale: '''De doble ánimo'' conserva la fuerza idiomática tradicional del compuesto, y ''los que dudan'' traduce el verbo con naturalidad. Juntos mantienen la pareja retórica del original.'
- source_word: περὶ τῆς τοῦ θεοῦ δυνάμεως
  english_pob_choice: the power of God
  chosen_spanish: del poder de Dios
  alternatives_spanish:
  - de la potencia de Dios
  - acerca del poder de Dios
  lexicon: δύναμις θεοῦ
  rationale: '''Poder de Dios'' es la equivalencia más clara y fiel en español. ''Del'' mantiene la relación genitiva sin cargar la frase con artificio.'
- source_word: εἰς κρίμα καὶ εἰς σημείωσιν
  english_pob_choice: become a judgment and a warning
  chosen_spanish: llegan a ser un juicio y un aviso
  alternatives_spanish:
  - se vuelven juicio y advertencia
  - llegan a ser juicio y señal
  lexicon: κρίμα / σημείωσις
  rationale: La revisión inglesa subraya que un solo verbo gobierna ambos complementos; en español se conserva con 'llegan a ser'. 'Aviso' mantiene la función amonestadora de σημείωσις sin intensificarla más allá de lo requerido.
theological_decisions:
- issue: Relación causal entre la desobediencia y la señal dada a la esposa
  english_pob_reading: she was made a sign for this reason
  chosen_spanish_reading: fue puesta como señal por esta razón
  alternative_spanish_readings:
  - fue puesta como señal
  - fue hecha señal para este fin
  rationale: Se mantiene la causalidad explícita porque la revisión del griego insistió en εἰς τοῦτο. No se suaviza a una simple consecutividad narrativa; la señal expresa juicio ligado a su desacuerdo.
  doctrine_reference: Didáctica moral en 1 Clement; disciplina divina y ejemplaridad del juicio.
- issue: Tensión entre 'juicio' y 'aviso' como dos resultados paralelos
  english_pob_reading: become a judgment and a warning
  chosen_spanish_reading: llegan a ser un juicio y un aviso
  alternative_spanish_readings:
  - se convierten en juicio y advertencia
  - llegan a ser un juicio y una advertencia
  rationale: 'Se conserva el paralelismo del griego y del inglés corregido: no se separan los complementos ni se fuerza una sola idea. ''Aviso'' mantiene el valor exhortativo sin borrar el peso judicial de κρίμα.'
  doctrine_reference: Responsabilidad comunitaria y función ejemplar de los juicios divinos.
- issue: ὁμόνοια como término programático de concordia comunitaria
  english_pob_reading: not in agreement / harmony
  chosen_spanish_reading: no estando en concordia
  alternative_spanish_readings:
  - no estando de acuerdo
  - no viviendo en armonía
  rationale: '''Concordia'' preserva el registro ético-político de 1 Clement y evita trivializar ὁμόνοια como mera afinidad emocional. En español permite oír tanto la dimensión relacional como la comunitaria.'
  doctrine_reference: Énfasis clementino en unidad, orden y ausencia de facción.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del inglés, especialmente la restauración de εἰς τοῦτο ('por esta razón') y la preferencia por un solo verbo que gobierne ambos complementos en 'juicio' y 'aviso'. También reflejé la preferencia por un equivalente más cercano a 'not in agreement' mediante 'no estando en concordia', y mantuve la secuencia narrativa sin añadir material interpretativo.
  spanish_consistency_notes:
  - He usado 'señal' para σημεῖον y 'columna de sal' para la imagen fija del relato, evitando sustituciones más libres.
  - '''Concordia'' se reserva aquí para ὁμόνοια, en coherencia con el registro de 1 Clement.'
  - '''De doble ánimo'' conserva la carga idiomática de δίψυχοι; no lo neutralicé a simple indecisión.'
  - No introduje 'Cristo' ni vocabulario eclesiástico ajeno al texto; el pasaje trata del juicio ejemplar y la advertencia a las generaciones.
