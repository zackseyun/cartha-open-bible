translation:
  language: es
  text: 'Porque por la hospitalidad y la piedad Lot fue salvo de Sodoma, cuando toda la región circundante fue juzgada por fuego y azufre. En esto el Soberano dejó claro que no abandona a los que esperan en él, sino que destina al castigo y al tormento a los que se desvían.


    Porque cuando su esposa salió con él, siendo de diferente parecer y no estando en armonía, fue puesta como señal[a] con este propósito: que llegó a ser columna de sal hasta el día de hoy, para que todos sepan que los de doble ánimo y los que dudan del poder de Dios vienen a juicio y se convierten en advertencia[b] para todas las generaciones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Señal'' traduce σημεῖον como marcador visible con función didáctica; no significa solo ''ejemplo''.'
    reason: lexical_alternative
  - marker: b
    text: '''Advertencia'' recoge σημείωσιν en su función de aviso permanente para las generaciones posteriores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλοξενίαν
  english_pob_choice: hospitality
  chosen_spanish: hospitalidad
  alternatives_spanish:
  - amor por los extraños
  - acogida hospitalaria
  lexicon: LSJ
  rationale: '''Hospitalidad'' es el equivalente idiomático natural en español y conserva la idea ética de recibir bien a otros sin expandir innecesariamente el sentido.'
- source_word: εὐσέβειαν
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción a Dios
  - religiosidad
  lexicon: LSJ
  rationale: En español, 'piedad' comunica la devoción reverente y el tono exhortativo del pasaje; evita que 'piadoso' suene demasiado estrecho o sentimental.
- source_word: περιχώρου
  english_pob_choice: surrounding region
  chosen_spanish: región circundante
  alternatives_spanish:
  - distrito alrededor
  - país vecino
  lexicon: LSJ
  rationale: La frase describe el área alrededor de Sodoma, no solo la ciudad; 'región circundante' mantiene amplitud geográfica clara y natural.
- source_word: κριθείσης
  english_pob_choice: was judged
  chosen_spanish: fue juzgada
  alternatives_spanish:
  - fue condenada
  - cayó bajo juicio
  lexicon: LSJ
  rationale: El participio subraya un acto de juicio divino; 'fue juzgada' preserva ese marco teológico mejor que una simple referencia a destrucción.
- source_word: δεσπότης
  english_pob_choice: the Master
  chosen_spanish: el Maestro
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: LSJ
  rationale: '''Maestro'' preserva la fuerza de δεσπότης como autoridad absoluta sin borrar la distinción lexical respecto de κύριος.'
- source_word: ἐλπίζοντας ἐπʼ αὐτόν
  english_pob_choice: those who hope in him
  chosen_spanish: los que esperan en él
  alternatives_spanish:
  - los que ponen su esperanza en él
  - los que confían en él
  lexicon: LSJ
  rationale: '''Esperan en él'' expresa naturalmente la dependencia confiada del original y funciona bien en el registro bíblico español.'
- source_word: ἑτεροκλινεῖς
  english_pob_choice: those who turn aside
  chosen_spanish: los que se desvían
  alternatives_spanish:
  - los descarriados
  - los desviados
  lexicon: LSJ
  rationale: La idea es de apartarse del camino recto; 'se desvían' conserva el movimiento moral implícito sin cargar de tecnicismo.
- source_word: κόλασιν
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - pena
  - punición
  lexicon: LSJ
  rationale: En este contexto de juicio, 'castigo' es el equivalente más claro y natural en español para la consecuencia punitiva.
- source_word: αἰκισμὸν
  english_pob_choice: torment
  chosen_spanish: tormento
  alternatives_spanish:
  - maltrato
  - aflicción
  lexicon: LSJ
  rationale: '''Tormento'' transmite la intensidad agravada del término y conserva el efecto de advertencia severa del pasaje.'
- source_word: ἑτερογνώμονος
  english_pob_choice: of a different mind
  chosen_spanish: de diferente parecer
  alternatives_spanish:
  - de otra mente
  - de distinto juicio
  lexicon: LSJ
  rationale: En español, 'de diferente parecer' suena más natural que una traducción demasiado literal y sigue marcando la divergencia interior de la esposa de Lot.
- source_word: ὁμονοίᾳ
  english_pob_choice: in harmony
  chosen_spanish: en armonía
  alternatives_spanish:
  - de acuerdo
  - en unidad de pensamiento
  lexicon: LSJ
  rationale: '''En armonía'' refleja la unidad de ánimo y de propósito sin sonar rígido; preserva el contraste con ''de diferente parecer''.'
- source_word: σημεῖον
  english_pob_choice: a sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - indicio
  lexicon: LSJ
  rationale: '''Señal'' es la forma más natural en español y mantiene el valor visible y didáctico del término.'
- source_word: δίψυχοι
  english_pob_choice: the double-minded
  chosen_spanish: los de doble ánimo
  alternatives_spanish:
  - los de ánimo dividido
  - los vacilantes
  lexicon: LSJ
  rationale: '''De doble ánimo'' es una expresión estable en español bíblico y transmite bien la división interior moral del término.'
- source_word: διστάζοντες
  english_pob_choice: those who doubt
  chosen_spanish: los que dudan
  alternatives_spanish:
  - los que vacilan
  - los indecisos
  lexicon: LSJ
  rationale: '''Dudan'' capta la incertidumbre respecto del poder de Dios que el contexto subraya, sin añadir matices no presentes.'
- source_word: σημείωσιν
  english_pob_choice: a warning
  chosen_spanish: advertencia
  alternatives_spanish:
  - aviso
  - señal de amonestación
  lexicon: LSJ
  rationale: Aquí el sentido es ejemplar y preventivo; 'advertencia' expresa mejor esa función para las generaciones posteriores que un simple 'signo'.
theological_decisions:
- issue: Distinción de δεσπότης frente a κύριος
  english_pob_reading: the Master
  chosen_spanish_reading: el Maestro
  alternative_spanish_readings:
  - el Señor
  - el Soberano
  rationale: Se conserva la diferencia lexical del griego, que subraya autoridad absoluta y dominio judicial; 'Maestro' evita homogeneizarlo con el uso habitual de 'Señor'.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
- issue: Fuerza moral de ἑτεροκλινεῖς
  english_pob_reading: those who turn aside
  chosen_spanish_reading: los que se desvían
  alternative_spanish_readings:
  - los apóstatas
  - los desviados
  - los que se apartan
  rationale: El término señala desviación del camino recto sin imponer un tecnicismo posterior como 'apóstatas'.
  doctrine_reference: 'DOCTRINE.md: key-term consistency'
- issue: Advertencia ejemplar de la esposa de Lot
  english_pob_reading: she became a pillar of salt ... that the double-minded and those who doubt the power of God come to judgment and become a warning
  chosen_spanish_reading: llegó a ser columna de sal ... para que todos supieran que los de doble ánimo y los que dudan del poder de Dios vienen a juicio y se convierten en advertencia
  alternative_spanish_readings:
  - llegó a ser un ejemplo
  - quedó como señal
  - sirve de advertencia
  rationale: La construcción mantiene tanto el juicio como la función didáctica permanente del episodio, sin reducirlo a mera narración histórica.
  doctrine_reference: 'DOCTRINE.md: paraenesis and exemplary judgment'
translation_notes:
  revision_awareness: El contexto inglés y el griego concuerdan de manera alta; no se requieren revisiones sustantivas respecto del audit trail existente. La redacción española sigue de cerca las decisiones léxicas documentadas, ajustándolas a un español natural y eclesialmente claro.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; aquí el pasaje usa θεός y δεσπότης, por lo que se traduce 'Dios' y 'el Maestro'.
  - Se conserva la distinción entre 'castigo' y 'tormento' para reflejar la intensificación del griego.
  - '''Los de doble ánimo'' y ''los que dudan'' se mantienen como pares paralelos para reproducir el paralelismo exhortativo del original.'
  - No se suaviza la tensión moral de ἑτεροκλινεῖς; 'se desvían' conserva la idea de apartarse del camino correcto.
