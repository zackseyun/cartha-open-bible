base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/011/001.yaml
  text: 'Because of hospitality and godliness, Lot was saved from Sodom, when the whole surrounding region was judged by fire and sulfur. In this the Master made it plain that he does not abandon those who hope in him, but appoints those who turn aside to punishment and torment.


    For when his wife went out with him, being of a different mind and not in harmony, she was set forth as a sign to this end, so that she became a pillar of salt to this very day, in order that it might be known to all that the double-minded and those who doubt the power of God come to judgment and become a warning to all generations.'
