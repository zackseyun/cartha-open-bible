revisions:
- from: 'Porque por la hospitalidad y la piedad Lot fue salvo de Sodoma, cuando toda la región circundante fue juzgada con fuego y azufre. En esto el Maestro dejó claro que no abandona a los que esperan en él, sino que destina al castigo y al tormento a los que se desvían.


