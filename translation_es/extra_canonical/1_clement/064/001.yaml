base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/064/001.yaml
  text: Finally, may the all-seeing God and Master of spirits and Lord of all flesh, who chose the Lord Jesus Messiah and us through him for a people of his own possession, grant to every soul that has called upon his magnificent and holy name faith, fear, peace, endurance and longsuffering, self-control, purity, and sound judgment, for pleasing his name through our high priest and protector Jesus Messiah, through whom be glory and majesty to him, might and honor, both now and through all the ages of ages. Amen.
