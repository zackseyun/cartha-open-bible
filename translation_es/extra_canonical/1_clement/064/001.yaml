revisions:
- from: Por lo demás, el Dios que todo lo ve y Señor de los espíritus y Señor de toda carne, que escogió al Señor Jesús Mesías y a nosotros por medio de él como pueblo de su propiedad exclusiva, conceda a toda alma que ha invocado su nombre magnífico y santo fe, temor, paz, perseverancia y longanimidad, dominio propio, pureza y sano juicio, para agradar a su nombre por medio de nuestro sumo sacerdote y protector Jesús Mesías, por quien sean la gloria y la majestad, el poder y el honor, ahora y por todos los siglos de los siglos. Amén.
  to: Por lo demás, que el Dios que todo lo ve, Soberano de los espíritus y Señor de toda carne, que escogió al Señor Jesús Mesías y a nosotros por medio de él para ser un pueblo de su propia posesión, conceda a toda alma llamada[a] por su nombre magnífico y santo fe, temor, paz, perseverancia y longanimidad, dominio propio, pureza y sano juicio, para agradar a su nombre por medio de nuestro sumo sacerdote y protector Jesús Mesías, por quien sean a él la gloria y la majestad, el poder y el honor, ahora y por todos los siglos de los siglos. Amén.
  rationale: Se revisó δεσπότης a 'Soberano' para conservar la distinción con κύριος ('Señor'). Se corrigió ἐπικεκλημένῃ a 'llamada por' con nota para preservar el sentido pasivo de pertenencia/designación por el nombre. Se suavizó 'propiedad exclusiva' a 'su propia posesión' por mayor fidelidad pactal y mejor español. Se añadió 'a él' en la doxología para reflejar αὐτῷ sin cerrar la tensión teológica documentada.
  reviewer_model: gpt-5.4
