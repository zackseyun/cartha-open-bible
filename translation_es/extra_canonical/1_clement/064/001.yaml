source:
  edition: Funk 1901 (normalized OCR)
  text: Λοιπὸν ὁ παντεπόπτης θεὸς καὶ δεσπότης τῶν πνευμάτων καὶ κύριος πάσης σαρκός, ὁ ἐκλεξάμενος τὸν κύριον Ἰησοῦν Χριστὸν καὶ ἡμᾶς διʼ αὐτοῦ εἰς λαὸν περιούσιον, δῴη πάσῃ ψυχῇ ἐπικεκλημένῃ τὸ μεγαλοπρεπὲς καὶ ἅγιον ὄνομα αὐτοῦ πίστιν, φόβον, εἰρήνην, ὑπομονὴν καὶ μακροθυμίαν, ἐγκράτειαν, ἁγνείαν καὶ σωφροσύνην, εἰς εὐαρέστησιν τῷ ὀνόματι αὐτοῦ διὰ τοῦ ἀρχιερέως καὶ προστάτου ἡμῶν Ἰησοῦ Χριστοῦ, διʼ οὗ αὐτῷ δόξα καὶ μεγαλωσύνη, κράτος καὶ τιμή, καὶ νῦν καὶ εἰς πάντας τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
