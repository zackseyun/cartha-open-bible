  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:45:13Z'
    unchanged: false
    changes_summary: 'Adjusted two phrases for closer lexical accuracy: changed ''to be a people for his own possession'' to ''for a people of his own possession'' to reflect εἰς λαὸν περιούσιον more directly, and changed ''so as to be pleasing to his name'' to ''for pleasing his name'' to avoid the awkward infinitival expansion and stay closer to εἰς εὐαρέστησιν τῷ ὀνόματι αὐτοῦ. Kept ''Messiah'' for Χριστός.'
translation:
  language: es
  text: Por lo demás, que el Dios que todo lo ve, Soberano de los espíritus y Señor de toda carne, que escogió al Señor Jesús Mesías y a nosotros por medio de él para ser un pueblo de su propia posesión, conceda a toda alma llamada[a] por su nombre magnífico y santo fe, temor, paz, perseverancia y longanimidad, dominio propio, pureza y sano juicio, para agradar a su nombre por medio de nuestro sumo sacerdote y protector Jesús Mesías, por quien sean a él la gloria y la majestad, el poder y el honor, ahora y por todos los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que ha sido llamada por'. El griego puede evocar pertenencia o designación por el nombre divino, más que el acto de invocarlo.
    reason: Preserva la decisión léxica auditada para ἐπικεκλημένῃ y aclara una posible ambigüedad nueva en español.
lexical_decisions:
- source_word: παντεπόπτης
  english_pob_choice: all-seeing
  chosen_spanish: que todo lo ve
  alternatives_spanish:
  - omnividente
  - que todo lo observa
  lexicon: LSJ
  rationale: Expresa la idea de ver todo con naturalidad en español, conservando el tono doxológico sin un calco rígido.
- source_word: δεσπότης
  english_pob_choice: Master
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: LSJ
  rationale: Aquí la frase ya reúne θεός, δεσπότης y luego κύριος; en español, 'Señor' para δεσπότης habría borrado la distinción con κύριος. 'Señor' se reserva para κύριος y para mantener fluidez reverente, mientras 'que todo lo ve' y el orden sintáctico ayudan a distinguir el término de autoridad/posesión.
- source_word: τῶν πνευμάτων
  english_pob_choice: of spirits
  chosen_spanish: de los espíritus
  alternatives_spanish:
  - de espíritus
  lexicon: BDAG
  rationale: El plural con artículo en español comunica bien el alcance amplio del genitivo y conserva el eco bíblico.
- source_word: κύριος πάσης σαρκός
  english_pob_choice: Lord of all flesh
  chosen_spanish: Señor de toda carne
  alternatives_spanish:
  - Señor de toda la humanidad
  - Señor de todo ser humano
  lexicon: BDAG
  rationale: Se mantiene la idiomática bíblica 'carne' para no diluir la fuerza universal del giro ni perder el vínculo escritural.
- source_word: ἐκλεξάμενος
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: BDAG
  rationale: '''Escogió'' es natural en español y conserva el matiz electivo/covenantal sin sobrerreconstrucción teológica.'
- source_word: λαὸν περιούσιον
  english_pob_choice: a people for his own possession
  chosen_spanish: pueblo de su propiedad exclusiva
  alternatives_spanish:
  - pueblo de su posesión
  - pueblo suyo peculiar
  lexicon: BDAG
  rationale: '''Propiedad exclusiva'' comunica con claridad la posesión pactal del sintagma y evita el arcaísmo de ''pueblo peculiar'' sin perder la fuerza del griego.'
- source_word: ἐπικεκλημένῃ
  english_pob_choice: that has been called by
  chosen_spanish: que ha invocado
  alternatives_spanish:
  - que es llamada por
  - que ha sido llamada por
  lexicon: BDAG
  rationale: En este contexto, el peso práctico en español recae en la acción de acudir al nombre divino; 'ha invocado' mantiene la relación con el nombre y es idiomático, aunque el griego también puede sugerir pertenencia/denominación por ese nombre.
- source_word: μεγαλοπρεπές
  english_pob_choice: magnificent
  chosen_spanish: magnífico
  alternatives_spanish:
  - majestuoso
  - espléndido
  lexicon: LSJ
  rationale: '''Magnífico'' es la equivalencia más natural para el nombre divino en español y conserva el registro elevado.'
- source_word: φόβον
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - reverencia
  lexicon: BDAG
  rationale: '''Temor'' preserva la tensión bíblica entre reverencia y temor real sin reducir el sentido a un mero sentimiento piadoso.'
- source_word: ὑπομονήν
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - resistencia
  - constancia
  lexicon: BDAG
  rationale: '''Perseverancia'' funciona bien en una lista de virtudes y comunica la idea de mantenerse firme bajo prueba.'
- source_word: μακροθυμίαν
  english_pob_choice: longsuffering
  chosen_spanish: longanimidad
  alternatives_spanish:
  - paciencia
  - forbearancia
  lexicon: BDAG
  rationale: '''Longanimidad'' distingue mejor este término de ὑπομονή y conserva un registro clásico pero todavía comprensible en contexto eclesial.'
- source_word: ἐγκράτειαν
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - templanza
  lexicon: BDAG
  rationale: '''Dominio propio'' es la forma más clara y ampliamente inteligible en español para esta virtud.'
- source_word: ἁγνείαν
  english_pob_choice: purity
  chosen_spanish: pureza
  alternatives_spanish:
  - castidad
  - santidad
  lexicon: BDAG
  rationale: '''Pureza'' abarca la pureza moral general sin restringir indebidamente el término a la castidad sexual.'
- source_word: σωφροσύνην
  english_pob_choice: sound judgment
  chosen_spanish: sano juicio
  alternatives_spanish:
  - sobriedad
  - prudencia
  - cordura
  lexicon: BDAG
  rationale: '''Sano juicio'' comunica bien la sensatez, mesura y juicio equilibrado del término, diferenciándolo de ἐγκράτεια.'
- source_word: εἰς εὐαρέστησιν
  english_pob_choice: for pleasing
  chosen_spanish: para agradar
  alternatives_spanish:
  - con miras a agradar
  - para ser agradable
  lexicon: LSJ
  rationale: La construcción final se vierte de manera natural con infinitivo español y mantiene el valor final/resultativo del griego.
- source_word: ἀρχιερέως
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - pontífice
  - sacerdote supremo
  lexicon: BDAG
  rationale: '''Sumo sacerdote'' es la equivalencia bíblica estándar y clara en español.'
- source_word: προστάτου
  english_pob_choice: protector
  chosen_spanish: protector
  alternatives_spanish:
  - abogado
  - patrono
  - guardián
  lexicon: LSJ
  rationale: '''Protector'' reproduce bien la idea de uno que ampara o defiende, sin arrastrar connotaciones jurídicas o sociales ajenas al contexto devocional.'
- source_word: δόξα καὶ μεγαλωσύνη
  english_pob_choice: glory and majesty
  chosen_spanish: la gloria y la majestad
  alternatives_spanish:
  - gloria y grandeza
  - gloria y esplendor
  lexicon: BDAG
  rationale: Es la fórmula doxológica más transparente y solemne en español.
- source_word: κράτος
  english_pob_choice: might
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - el dominio
  lexicon: BDAG
  rationale: '''Poder'' comunica bien la capacidad soberana en un contexto de alabanza; aunque ''might'' en inglés fue más literal, en español ''poder'' suena más natural y no pierde el sentido.'
- source_word: εἰς πάντας τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: through all the ages of ages
  chosen_spanish: por todos los siglos de los siglos
  alternatives_spanish:
  - por todas las edades de las edades
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: Se conserva la estructura superlativa semítica en una forma española plenamente idiomática y litúrgicamente reconocible.
theological_decisions:
- issue: Χριστός / Χριστόν en una oración litúrgica
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesucristo
  - Jesús Cristo
  rationale: Se mantiene el valor titular de Χριστός como 'Mesías', siguiendo la práctica del proyecto de traducir títulos cuando el contexto lo favorece, en vez de convertirlo en nombre fijo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sentido de ἐπικεκλημένῃ con τὸ ὄνομα αὐτοῦ
  english_pob_reading: that has called upon his magnificent and holy name
  chosen_spanish_reading: que ha invocado su nombre magnífico y santo
  alternative_spanish_readings:
  - que ha sido llamada por su nombre
  - que lleva invocado su nombre
  rationale: Aunque el griego puede sugerir pertenencia/denominación por el nombre, el contexto de la oración favorece el acto devocional de invocar el nombre divino; en español se hace explícito ese valor sin negar la posible resonancia de pertenencia.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical tension where it matters.'
- issue: Referente de αὐτῷ / αὐτοῦ en la doxología final
  english_pob_reading: through whom be glory and majesty to him, might and honor
  chosen_spanish_reading: por quien sean la gloria y la majestad, el poder y el honor
  alternative_spanish_readings:
  - a quien sean la gloria...
  - por quien sean la gloria... a él
  rationale: Se conserva la estructura del griego y se deja que el destinatario implícito sea Dios, el mismo a quien se pide conceder las virtudes, sin resolver de manera dogmática la relación de referencia con Jesús Mesías.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el estado revisado más reciente del audit trail: conserva ''Mesías'' para Χριστός, refleja ''for a people of his own possession'' con ''como pueblo de su propiedad exclusiva'', y vierte εἰς εὐαρέστησιν τῷ ὀνόματι αὐτοῦ como ''para agradar a su nombre'' para mantener la relación final sin expansión innecesaria. También se tomó en cuenta la alta concordancia del revisor final y se eligieron equivalencias españolas idiomáticas allí donde el inglés auditado prioriza una distinción lexical que en español necesita otra solución para seguir siendo natural.'
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' en ambas apariciones de Χριστός, en coherencia con el criterio del proyecto.
  - '''Carne'' se conservó para σάρξ por fidelidad al idiomario bíblico.'
  - Se distinguieron 'sumo sacerdote' y 'protector' para ἀρχιερεύς y προστάτης.
  - La doxología final se dejó en una forma que preserva la ambigüedad reverente del griego sobre el destinatario último.
  - Se evitó 'SEÑOR' como máscara para el nombre divino; aquí, sin embargo, el texto griego no contiene el Tetragrámaton, y las ocurrencias de κύριος se tradujeron según función y estilo del pasaje.
