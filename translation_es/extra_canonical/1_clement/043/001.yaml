translation:
  language: es
  text: '¿Y qué tiene de extraordinario si los que fueron encomendados en Mesías por Dios[a] nombraron a los antes mencionados para tal obra? Porque también el bienaventurado y fiel asistente Moisés, en toda su casa, registró en los libros sagrados todo lo que le fue mandado; y los demás profetas lo siguieron, dando testimonio junto con él de las ordenanzas establecidas por él. Pues cuando surgieron celos respecto del sacerdocio y las tribus estaban divididas en facciones sobre cuál de ellas estaba adornada con el nombre glorioso, ordenó que los doce jefes de tribu le trajeran varas, cada una inscrita con el nombre de su tribu. Y tomándolas, las ató y las selló con los anillos de los jefes de tribu, y las puso en la tienda del testimonio sobre la mesa de Dios. Y después de cerrar la tienda, selló las llaves del mismo modo que había sellado las varas, y les dijo: «Hombres, hermanos, la tribu cuya vara brote, a esa la ha escogido Dios para ejercer el sacerdocio y ministrarle».


    Cuando llegó la mañana, reunió a todo Israel, los seiscientos mil hombres, y mostró los sellos a los jefes de tribu; y abrió la tienda del testimonio y sacó las varas. Y se halló que la vara de Aarón no solo había brotado, sino que además estaba dando fruto. ¿Qué piensan, amados? ¿No sabía Moisés de antemano que esto iba a suceder? Claro que lo sabía. Pero para que no hubiera desorden en Israel, actuó así, para que el nombre del Dios verdadero y único fuera glorificado; a él sea la gloria por los siglos de los siglos. Amén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Encomendados en Mesías por Dios» refleja el pasivo griego πιστευθέντες παρὰ θεοῦ como encargo o comisión divina, no como simple «creyeron».
    reason: theological_note
lexical_decisions:
- source_word: πιστευθέντες
  english_pob_choice: entrusted
  chosen_spanish: fueron confiados
  alternatives_spanish:
  - fueron encomendados
  - fueron confiados / fueron encomendados
  - creyeron
  lexicon: LSJ
  rationale: El pasivo con παρὰ θεοῦ apunta aquí a comisión o encargo divino, no al acto de creer. En español, «fueron confiados» comunica bien esa idea de haber recibido una tarea o encargo de parte de Dios.
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - tarea
  - oficio
  lexicon: LSJ
  rationale: En el contexto, se trata de una función o encargo. «Obra» mantiene amplitud y funciona con naturalidad en español sin reducir demasiado el matiz.
- source_word: θεράπων
  english_pob_choice: attendant
  chosen_spanish: asistente
  alternatives_spanish:
  - servidor
  - ministro
  - ayudante
  lexicon: LSJ
  rationale: θεράπων es un término de servicio distinguido, no el siervo genérico. «Asistente» conserva la idea de servicio personal y honorífico sin introducir un tecnicismo eclesiástico no presente en el griego.
- source_word: ἐσημειώσατο
  english_pob_choice: recorded
  chosen_spanish: registró
  alternatives_spanish:
  - anotó
  - escribió
  - dejó por escrito
  lexicon: LSJ
  rationale: En el marco de «los libros sagrados», el verbo pide un sentido de consignar por escrito. «Registró» es claro y fiel a ese uso.
- source_word: συνεπιμαρτυροῦντες
  english_pob_choice: bearing witness together with
  chosen_spanish: dando testimonio juntamente
  alternatives_spanish:
  - atestiguando juntamente
  - dando testimonio junto con
  - corroborando
  lexicon: LSJ
  rationale: El compuesto subraya testimonio concurrente y corroborante. La formulación española preserva esa cooperación sin perder fluidez.
- source_word: νενομοθετημένοις
  english_pob_choice: the ordinances laid down by him
  chosen_spanish: las ordenanzas establecidas por él
  alternatives_spanish:
  - las leyes dadas por él
  - lo legislado por él
  - las disposiciones fijadas por él
  lexicon: LSJ
  rationale: El participio perfecto conserva el resultado de una acción legislativa ya establecida. «Ordenanzas establecidas» mantiene el tono jurídico y el vínculo con la legislación de Moisés.
- source_word: ζήλου
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - celos / envidia
  - celo
  - envidia
  lexicon: LSJ
  rationale: Aquí el conflicto gira en torno al sacerdocio y a la rivalidad entre tribus, por lo que «celos» comunica mejor la tensión competitiva que «celo».
- source_word: στασιαζουσῶν
  english_pob_choice: were in faction
  chosen_spanish: estaban en facción
  alternatives_spanish:
  - estaban en rebelión
  - estaban en discordia
  - estaban en sedición
  lexicon: LSJ
  rationale: El participio expresa división faccional o sediciosa. «En facción» conserva la aspereza política del griego y coincide con el sentido de contienda comunitaria.
- source_word: κεκοσμημένη
  english_pob_choice: was adorned
  chosen_spanish: sería adornada
  alternatives_spanish:
  - estaba adornada
  - sería honrada
  - sería investida
  lexicon: LSJ
  rationale: El perfecto participial expresa un estado de estar adornada o embellecida. En español, «sería adornada» reproduce ese carácter dentro del discurso indirecto sobre la tribu favorecida.
- source_word: φυλάρχους
  english_pob_choice: tribal leaders
  chosen_spanish: jefes de tribu
  alternatives_spanish:
  - caudillos de las tribus
  - jefes tribales
  - príncipes de las tribus
  lexicon: LSJ
  rationale: «Jefes de tribu» es natural en español moderno y conserva la función representativa de cada tribu.
- source_word: σκηνὴν τοῦ μαρτυρίου
  english_pob_choice: tent of witness
  chosen_spanish: tienda del testimonio
  alternatives_spanish:
  - tienda del testimonio / tienda del testigo
  - tabernáculo del testimonio
  - tienda del testimonio
  lexicon: LSJ
  rationale: Se mantiene la versión transparente «tienda del testimonio», equivalente al giro bíblico y más accesible que «tabernáculo» para lectores actuales.
- source_word: λειτουργεῖν
  english_pob_choice: to minister
  chosen_spanish: ministrarle
  alternatives_spanish:
  - servirle
  - realizar servicio sagrado
  - ejercer su ministerio
  lexicon: LSJ
  rationale: El verbo conserva un sentido de servicio cultual distinto de ἱερατεύειν. «Ministrarle» mantiene esa distinción y suena natural en español eclesial.
- source_word: ἱερατεύειν
  english_pob_choice: to serve as priest
  chosen_spanish: ejercer el sacerdocio
  alternatives_spanish:
  - ser sacerdote
  - desempeñar el sacerdocio
  - oficiar como sacerdote
  lexicon: LSJ
  rationale: La expresión distingue con claridad el oficio sacerdotal del servicio general del verbo siguiente. «Ejercer el sacerdocio» preserva ese contraste.
- source_word: προεῖλεν
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - trajo afuera
  - presentó
  - extrajo
  lexicon: LSJ
  rationale: Para la acción pública de sacar las varas del recinto, «sacó» es la opción más natural y directa en español.
- source_word: βεβλαστηκυῖα
  english_pob_choice: to have sprouted
  chosen_spanish: había brotado
  alternatives_spanish:
  - había retoñado
  - había germinado
  - había echado brotes
  lexicon: LSJ
  rationale: El participio perfecto indica un brote visible ya realizado. «Había brotado» conserva bien el resultado y es comprensible.
- source_word: ἀκαταστασία
  english_pob_choice: disorder
  chosen_spanish: desorden
  alternatives_spanish:
  - confusión
  - desorden / tumulto
  - inestabilidad
  lexicon: LSJ
  rationale: Término clave en 1 Clement para la falta de orden comunitario. «Desorden» es conciso y reproduce el valor paraenético del pasaje.
theological_decisions:
- issue: Renderizado de ἐν Χριστῷ
  english_pob_reading: in Messiah
  chosen_spanish_reading: en Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: Se conserva el título mesiánico como tal, siguiendo la pauta del proyecto. En este contexto argumental, la referencia es funcionalmente titulativa más que un nombre fijo.
  doctrine_reference: Translate titles; transliterate names.
- issue: Sentido de πιστευθέντες παρὰ θεοῦ
  english_pob_reading: those entrusted in Messiah by God
  chosen_spanish_reading: los que fueron confiados en Mesías por Dios
  alternative_spanish_readings:
  - los que creyeron en Mesías por Dios
  - los que fueron encomendados por Dios en Mesías
  rationale: El pasivo con παρὰ θεοῦ favorece una lectura de comisión o encargo divino, no de fe subjetiva. La formulación española mantiene esa idea de encargo recibido.
  doctrine_reference: Lexical and syntactic context in the Greek passive construction.
- issue: Analogía eclesial de Moisés y el orden ministerial
  english_pob_reading: retain explicit priestly and ministerial terminology
  chosen_spanish_reading: mantener la distinción entre sacerdocio y ministerio
  alternative_spanish_readings:
  - generalizar a servicio religioso
  - fusionar ambos verbos en una sola idea
  rationale: La sección apoya su argumentación en la diferenciación de ἱερατεύειν y λειτουργεῖν. Conservar ambos matices evita debilitar la lógica del pasaje.
  doctrine_reference: Ecclesial order and priestly analogy in 1 Clement.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés fueron contrastados para evitar una traducción meramente mecánica. Se siguió la revisión más reciente que coloca la cláusula inicial como una pregunta retórica sobre los que fueron confiados en Mesías por Dios, y se preservó la distinción entre el sacerdocio de ἱερατεύειν y el ministerio de λειτουργεῖν. También se evitó esconder el nombre divino, manteniendo «Dios» donde el griego dice θεός y sin introducir sustituciones litúrgicas no justificadas.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστῷ conforme a la política del proyecto.
  - Se usó «tienda del testimonio» de manera consistente para σκηνὴν τοῦ μαρτυρίου.
  - «Jefes de tribu» y «jefes de tribu» en plural mantienen el registro claro y uniforme.
  - Se conservó la diferencia entre «ejercer el sacerdocio» y «ministrarle» para reflejar los dos verbos griegos distintos.
  - Se evitó el lenguaje de máscara para el nombre divino; «Dios» se usó donde corresponde al griego θεός.
