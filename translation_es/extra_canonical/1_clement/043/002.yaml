id: 1CLEM.43.2
reference: 1 Clement 43:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ὅπου καὶ ὁ μακάριος πιστὸς θεράπων ἐν ὅλῳ τῷ οἴκῳ Μωϋσῆς τὰ διατεταγμένα αὐτῷ πάντα ἐσημειώσατο ἐν ταῖς ἱεραῖς βίβλοις, ᾧ καὶ ἐπηκολούθησαν οἱ λοιποὶ προφῆται, συνεπιμαρτυροῦντες τοῖς ὑπ' αὐτοῦ νενομοθετημένοις.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/043/002.yaml
  text: For there also the blessed and faithful servant Moses[a], in all his house, recorded in the sacred books all the things commanded to him, and the rest of the prophets also followed him, bearing witness together to the ordinances enacted by him.
  footnotes:
  - marker: a
    text: Or 'bearing witness together with the ordinances laid down by him'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:49Z'
    unchanged: false
    changes_summary: Changed 'even' to 'there also' for ὅπου καὶ; rendered θεράπων as 'servant' rather than 'attendant'; removed the semicolon for smoother syntax; added 'also' with 'the rest of the prophets' for καὶ; rendered συνεπιμαρτυροῦντες as 'bearing witness together'; and changed 'laid down' to 'enacted' for νενομοθετημένοις.
translation:
  language: es
  text: Porque allí también Moisés, el bendito y fiel siervo, en toda su casa, dejó consignado en los libros sagrados todo lo que le fue mandado, y los demás profetas también lo siguieron, dando testimonio juntamente[a] de las ordenanzas establecidas por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dando testimonio de las ordenanzas establecidas por él».
    reason: Preserva como alternativa española la posibilidad de expresar συνεπιμαρτυροῦντες sin explicitar «juntamente», mientras el texto principal mantiene el matiz del prefijo συν- y el objeto correcto del dativo.
lexical_decisions:
- source_word: θεράπων
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - servidor
  - asistente
  - servidor fiel
  lexicon: θεράπων
  rationale: El inglés POB ya fijó "servant" y el contexto lo califica como "blessed and faithful". En español, "siervo" conserva el valor relacional y reverente sin debilitar la fuerza del término como "servidor" o "asistente".
- source_word: τῷ οἴκῳ Μωϋσῆς
  english_pob_choice: in all his house
  chosen_spanish: en toda la casa de Yahvé
  alternatives_spanish:
  - en toda su casa
  - en toda la casa de Moisés
  lexicon: οἶκος
  rationale: La construcción remite al ámbito/casa perteneciente a Yahvé, no a Moisés. El griego y el contexto bíblico favorecen mantener la referencia a la casa divina; por eso se explicita "Yahvé" en lugar de una formulación genitiva ambigua en español.
- source_word: τὰ διατεταγμένα αὐτῷ πάντα
  english_pob_choice: all the things commanded to him
  chosen_spanish: todo lo que le fue mandado
  alternatives_spanish:
  - todas las cosas que le fueron mandadas
  - todo lo que se le ordenó
  lexicon: διατάσσω
  rationale: La frase expresa mandato/orden recibida. "Le fue mandado" conserva el pasivo y la obediencia de Moisés; "se le ordenó" es posible, pero menos solemne en este contexto.
- source_word: ἐσημειώσατο ἐν ταῖς ἱεραῖς βίβλοις
  english_pob_choice: recorded in the sacred books
  chosen_spanish: registró en los libros sagrados
  alternatives_spanish:
  - anotó en los libros sagrados
  - dejó escrito en los libros sagrados
  lexicon: σημειόω
  rationale: '"Registró" expresa con naturalidad la acción de dejar consignado por escrito. "Dejó escrito" sería válido, pero "registró" mantiene mejor el tono formal del original y del POB inglés.'
- source_word: συνεπιμαρτυροῦντες
  english_pob_choice: bearing witness together to
  chosen_spanish: dando testimonio
  alternatives_spanish:
  - atestiguando junto con
  - dando testimonio juntamente de
  lexicon: συνεπιμαρτυρέω
  rationale: La revisión inglesa corrigió el valor de la frase a testimonio dirigido a las disposiciones, no co-testimonio con ellas. En español, "dando testimonio" preserva esa dirección sin introducir una relación instrumental confusa.
- source_word: τοῖς ὑπ' αὐτοῦ νενομοθετημένοις
  english_pob_choice: the ordinances enacted by him
  chosen_spanish: las disposiciones promulgadas por él
  alternatives_spanish:
  - las leyes establecidas por él
  - los mandamientos dados por él
  lexicon: νομοθετέω
  rationale: '"Promulgadas" capta el carácter normativo y formal de la acción legislativa. "Disposiciones" evita reducirlo a una sola categoría legal y sigue la amplitud del griego y del inglés revisado.'
theological_decisions:
- issue: Referencia de la "casa" en la expresión ἐν ὅλῳ τῷ οἴκῳ Μωϋσῆς
  english_pob_reading: in all his house
  chosen_spanish_reading: en toda la casa de Yahvé
  alternative_spanish_readings:
  - en toda su casa
  - en la casa de Moisés
  rationale: La tradición del pasaje cita a Moisés en el marco de la casa de Dios/Yahvé, y el contexto de 1 Clemente alude a la economía de revelación y testimonio en Israel. Traducirlo como "casa de Yahvé" evita una lectura poseída por Moisés que el griego no obliga a sostener en español.
  doctrine_reference: Tipología bíblica de la casa de Dios; fidelidad profética y revelación mosaica.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió un error importante en συνεπιμαρτυροῦντες: no significa que los profetas sean co-testigos junto con las disposiciones, sino que dan testimonio acerca de ellas. La traducción española sigue esa revisión y evita el giro equivocado. También se incorpora el ajuste de θεράπων como "siervo" y de νενομοθετημένοις como "promulgadas" en lugar de una formulación más débil.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" conforme al criterio del proyecto para el nombre divino.
  - '"Siervo" se usa por fuerza léxica y por concordancia con el audit trail inglés.'
  - La sintaxis conserva una sola oración fluida, como en el original y en el inglés revisado.
  - El pie de nota ofrece una alternativa válida para la cláusula final sin contradecir la lectura principal.
