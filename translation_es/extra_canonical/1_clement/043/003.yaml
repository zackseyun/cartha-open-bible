id: 1CLEM.43.3
reference: 1 Clement 43:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἐκεῖνος γάρ, ζήλου ἐμπεσόντος περὶ τῆς ἱερωσύνης καὶ στασιαζουσῶν τῶν φυλῶν, ὁποία αὐτῶν εἴη τῷ ἐνδόξῳ ὀνόματι κεκοσμημένη, ἐκέλευσεν τοὺς δώδεκα φυλάρχους προσενεγκεῖν αὐτῷ ῥάβδους ἐπιγεγραμμένας ἑκάστης φυλῆς κατ' ὄνομα· καὶ λαβὼν αὐτὰς ἔδησεν καὶ ἐσφράγισεν τοῖς δακτυλίοις τῶν φυλάρχων, καὶ ἀπέθετο αὐτὰς εἰς τὴν σκηνὴν τοῦ μαρτυρίου ἐπὶ τὴν τράπεζαν τοῦ θεοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/043/003.yaml
  text: For when jealousy arose concerning the priesthood and the tribes were engaged in factional strife over which of them was adorned with the glorious name[a], he ordered the twelve tribal leaders to bring him staffs, each inscribed according to the name of its tribe. And taking them, he bound them and sealed them with the rings of the tribal leaders, and placed them in the tent of witness upon the table of God.
  footnotes:
  - marker: a
    text: Or 'were in faction'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Porque cuando surgió la envidia respecto del sacerdocio y las tribus estaban envueltas en contienda facciosa[a] sobre cuál de ellas estaba adornada con el nombre glorioso, ordenó a los doce jefes de las tribus que le trajeran varas, cada una inscrita según el nombre de su tribu. Y, tomándolas, las ató y las selló con los anillos de los jefes de las tribus, y las colocó en la tienda del testimonio, sobre la mesa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaban en facción».'
    reason: alternative_reading
lexical_decisions:
- source_word: ζήλου
  english_pob_choice: jealousy arose
  chosen_spanish: surgió la envidia
  alternatives_spanish:
  - apareció el celo
  - brotó la celosía
  lexicon: ζῆλος
  rationale: En este contexto narrativo y polémico, el griego puede expresar rivalidad/envidia más que celo positivo; 'envidia' comunica mejor el conflicto alrededor del sacerdocio. 'Celo' sería posible, pero en español puede sonar demasiado laudatorio y debilitar la tensión.
- source_word: στασιαζουσῶν
  english_pob_choice: were engaged in factional strife
  chosen_spanish: estaban en contienda facciosa
  alternatives_spanish:
  - estaban en rebelión
  - estaban en facción
  lexicon: στασιάζω
  rationale: El participio tiene fuerza activa de discordia/rebelión civil; 'contienda facciosa' preserva el campo semántico de στάσις sin sonar artificial. Se evita la simple traducción 'en facción', que en español no expresa bien la acción.
- source_word: τῆς ἱερωσύνης
  english_pob_choice: the priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - el ministerio sacerdotal
  - la dignidad sacerdotal
  lexicon: ἱερωσύνη
  rationale: '''Sacerdocio'' es la equivalencia natural y exacta en español para el oficio sacerdotal en este pasaje.'
- source_word: ὁποία αὐτῶν εἴη
  english_pob_choice: which of them was adorned with
  chosen_spanish: cuál de ellas estaba adornada con
  alternatives_spanish:
  - cuál de ellas era honrada con
  - cuál de ellas llevaba
  lexicon: ὁποῖος
  rationale: La construcción interrogativa selecciona a una tribu que porta/distinguida por un nombre; 'adornada con' sigue de cerca el griego y mantiene la imagen honorífica.
- source_word: τῷ ἐνδόξῳ ὀνόματι κεκοσμημένη
  english_pob_choice: adorned with the glorious name
  chosen_spanish: adornada con el nombre glorioso
  alternatives_spanish:
  - ornamentada con el nombre glorioso
  - honrada con el nombre glorioso
  lexicon: κοσμέω
  rationale: '''Adornada'' refleja bien κεκοσμημένη y conserva el lenguaje honorífico del original. ''Nombre glorioso'' sigue la fórmula del texto sin añadir identificación interpretativa.'
- source_word: ῥάβδους
  english_pob_choice: staffs
  chosen_spanish: varas
  alternatives_spanish:
  - bastones
  - báculos
  lexicon: ῥάβδος
  rationale: '''Varas'' es idiomático en español bíblico y suficientemente literal para el objeto ritual.'
- source_word: προσενεγκεῖν
  english_pob_choice: to bring
  chosen_spanish: que le trajeran
  alternatives_spanish:
  - que le presentaran
  - que le llevaran
  lexicon: προσφέρω
  rationale: '''Trajeran'' funciona bien en español y mantiene el movimiento hacia el líder sin sobrecargar la frase.'
- source_word: ἐπιγεγραμμένας
  english_pob_choice: inscribed
  chosen_spanish: inscrita
  alternatives_spanish:
  - escrita
  - grabada
  lexicon: ἐπιγράφω
  rationale: '''Inscrita'' conserva el sentido formal de marcar con un nombre sobre el objeto.'
- source_word: ἑκάστης φυλῆς κατ' ὄνομα
  english_pob_choice: according to the name of its tribe
  chosen_spanish: según el nombre de su tribu
  alternatives_spanish:
  - por el nombre de su tribu
  - con el nombre de su tribu
  lexicon: κατὰ ὄνομα
  rationale: '''Según el nombre'' es la manera más clara y fiel de expresar la distribución nominativa del griego.'
- source_word: ἔδησεν
  english_pob_choice: he bound them
  chosen_spanish: las ató
  alternatives_spanish:
  - las unió
  - las sujetó
  lexicon: δέω
  rationale: '''Ató'' es directo y conserva la acción concreta del texto.'
- source_word: ἐσφράγισεν
  english_pob_choice: sealed them
  chosen_spanish: las selló
  alternatives_spanish:
  - las marcó con sello
  - las cerró con sello
  lexicon: σφραγίζω
  rationale: '''Selló'' es la equivalencia usual y precisa para el acto de autenticar/proteger con sello.'
- source_word: τοῖς δακτυλίοις τῶν φυλάρχων
  english_pob_choice: with the rings of the tribal leaders
  chosen_spanish: con los anillos de los jefes de las tribus
  alternatives_spanish:
  - con los sellos de los jefes de las tribus
  - con los anillos de los líderes tribales
  lexicon: δακτύλιος
  rationale: '''Anillos'' sigue el objeto material mencionado por el griego y respeta la escena ceremonial; ''jefes de las tribus'' es más natural en español que ''tribal leaders'' literalmente.'
- source_word: τὴν σκηνὴν τοῦ μαρτυρίου
  english_pob_choice: the tent of witness
  chosen_spanish: la tienda del testimonio
  alternatives_spanish:
  - la tienda del testimonio/videncia
  - el tabernáculo del testimonio
  lexicon: σκηνή
  rationale: Se preserva la fórmula bíblica sin forzar una denominación confesional posterior; 'tienda' corresponde al griego y 'del testimonio' mantiene el sentido jurídico-cultual.
- source_word: ἐπὶ τὴν τράπεζαν τοῦ θεοῦ
  english_pob_choice: upon the table of God
  chosen_spanish: sobre la mesa de Dios
  alternatives_spanish:
  - sobre la mesa de Dios/ante Dios
  - encima de la mesa de Dios
  lexicon: τράπεζα
  rationale: '''Mesa'' es la traducción directa y clara. El genitivo ''de Dios'' se conserva sin sustituirlo por un término litúrgico no explicitado por el texto.'
theological_decisions:
- issue: Valor de ζῆλος en el conflicto por el sacerdocio
  english_pob_reading: jealousy arose
  chosen_spanish_reading: surgió la envidia
  alternative_spanish_readings:
  - surgió el celo
  - surgió la rivalidad
  rationale: El pasaje describe disputa por prerrogativa sagrada; 'envidia' deja ver la dimensión competitiva que impulsa la crisis. 'Celo' puede sonar positivo en español y ocultar el matiz conflictivo.
  doctrine_reference: uso contextual del léxico griego; no doctrinal
- issue: στασιάζω y el registro de conflicto tribal
  english_pob_reading: were engaged in factional strife
  chosen_spanish_reading: estaban en contienda facciosa
  alternative_spanish_readings:
  - estaban en rebelión
  - estaban divididas en facciones
  rationale: Se conserva el peso político-social de στάσις sin convertir el texto en una paráfrasis. 'Contienda facciosa' mantiene la idea de división activa entre tribus.
  doctrine_reference: ninguna doctrina específica; decisión semántica
- issue: '''Nombre glorioso'' como designación honorífica'
  english_pob_reading: adorned with the glorious name
  chosen_spanish_reading: adornada con el nombre glorioso
  alternative_spanish_readings:
  - honrada con el nombre glorioso
  - dotada del nombre glorioso
  rationale: 'No se explicita más de lo que el texto dice: la tribu distinguida por un nombre glorioso. Se evita identificar ese nombre con una tradición posterior sin base en este verso.'
  doctrine_reference: principio de prudencia exegética en textos extra-canónicos
- issue: '''Tienda del testimonio'' y ''mesa de Dios'' como fórmulas cultuales'
  english_pob_reading: the tent of witness ... the table of God
  chosen_spanish_reading: la tienda del testimonio ... la mesa de Dios
  alternative_spanish_readings:
  - el tabernáculo del testimonio ... la mesa de Dios
  - la tienda del testimonio ... la mesa divina
  rationale: Se mantiene la formulación cultual del texto griego sin reemplazarla por equivalentes litúrgicos tradicionales que puedan oscurecer la correspondencia textual.
  doctrine_reference: fidelidad terminológica a fuentes extra-canónicas
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés que corrigió ''were in faction'' a ''were engaged in factional strife''; por eso el español evita una fórmula estática y usa una expresión activa de conflicto. No se siguió una traducción mecánica del inglés: se volvió al griego para decidir ζῆλος, στασιαζουσῶν, κεκοσμημένη, ἐσφράγισεν y la fórmula cultual final.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando corresponda a YHWH; en este versículo no aparece.
  - Se usa 'Dios' para θεοῦ, no 'Señor', porque el griego no lo exige aquí.
  - '''Mesa'' y ''tienda del testimonio'' conservan el registro cultual sin introducir terminología eclesiástica posterior.'
  - El marcador [a] aparece junto a 'contienda facciosa' porque ahí está la lectura alternativa relevante.
