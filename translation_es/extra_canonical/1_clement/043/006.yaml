translation:
  language: es
  text: ¿Qué les parece, amados? ¿No sabía de antemano Moisés que esto iba a suceder? Sin duda lo sabía. Pero para que no surgiera desorden en Israel, actuó así, a fin de que fuera glorificado el nombre del Dios verdadero y único, y a él sea la gloria por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados míos
  - queridos
  lexicon: ἀγαπητός
  rationale: ‘Amados’ reproduce el tono afectuoso y comunitario del vocativo sin introducir una cercanía excesiva; mantiene un registro eclesial natural en español.
- source_word: προῄδει
  english_pob_choice: know beforehand
  chosen_spanish: sabía de antemano
  alternatives_spanish:
  - conocía de antemano
  - sabía previamente
  lexicon: προοἶδα
  rationale: La construcción expresa claramente conocimiento previo sin forzar una traducción mecánica; ‘de antemano’ conserva la previsión implícita en el verbo.
- source_word: ἀκαταστασία
  english_pob_choice: disorder
  chosen_spanish: desorden
  alternatives_spanish:
  - confusión
  - desordenamiento
  lexicon: ἀκαταστασία
  rationale: ‘Desorden’ es el equivalente más natural y suficientemente amplio para la falta de orden o disturbio comunitario que el contexto sugiere.
- source_word: δοξασθῆναι
  english_pob_choice: glorified
  chosen_spanish: fuera glorificado
  alternatives_spanish:
  - recibiera gloria
  - fuera exaltado
  lexicon: δοξάζω
  rationale: Se preserva la pasiva teológica con ‘fuera glorificado’, que refleja bien la finalidad del griego y el lenguaje de la POB en inglés.
- source_word: τὸ ὄνομα τοῦ ἀληθινοῦ καὶ μόνου θεοῦ
  english_pob_choice: the name of the true and only God
  chosen_spanish: el nombre del Dios verdadero y único
  alternatives_spanish:
  - el nombre del único y verdadero Dios
  - el nombre del Dios único y verdadero
  lexicon: ὄνομα / ἀληθινός / μόνος / θεός
  rationale: Se conserva ‘nombre’ de forma literal y se traduce θεός como ‘Dios’; el orden ‘verdadero y único’ suena natural en español sin perder la doble cualidad exclusiva.
- source_word: ᾧ ἡ δόξα
  english_pob_choice: to whom be the glory
  chosen_spanish: a quien sea la gloria
  alternatives_spanish:
  - de quien sea la gloria
  - para quien sea la gloria
  lexicon: δοξα
  rationale: La dativa de destinatario se expresa con ‘a quien sea la gloria’, fórmula reverente y idiomática que mantiene el sentido doxológico.
theological_decisions:
- issue: Referencia al Dios único frente a posibles formulaciones cristológicas posteriores
  english_pob_reading: the name of the true and only God
  chosen_spanish_reading: el nombre del Dios verdadero y único
  alternative_spanish_readings:
  - el nombre del único y verdadero Dios
  - el nombre del Dios único y verdadero
  rationale: Se mantiene la afirmación explícita de unicidad divina presente en el griego, sin introducir títulos adicionales ni suavizar la exclusividad del lenguaje.
  doctrine_reference: Monoteísmo bíblico / doxología
- issue: Fórmula final de gloria eterna
  english_pob_reading: to whom be the glory forever and ever. Amen.
  chosen_spanish_reading: a quien sea la gloria por los siglos de los siglos. Amén.
  alternative_spanish_readings:
  - de quien sea la gloria por los siglos de los siglos. Amén.
  - para quien sea la gloria por los siglos de los siglos. Amén.
  rationale: La doxología se conserva como bendición litúrgica tradicional y transparente; ‘por los siglos de los siglos’ corresponde bien al plural intensivo del griego.
  doctrine_reference: Doxología litúrgica
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa POB coinciden de manera alta; no se detectaron revisiones aplicadas. La versión española sigue de cerca la sintaxis y las decisiones léxicas confirmadas por el audit trail inglés, sin introducir cambios textuales no sustentados.
  spanish_consistency_notes:
  - Se mantiene ‘Moisés’ y ‘Israel’ como nombres propios estándar.
  - Se traduce θεός consistentemente como ‘Dios’.
  - Se conserva el registro doxológico con ‘Amén’ final.
  - ‘Amados’ replica el vocativo plural afectivo de manera natural en español.
