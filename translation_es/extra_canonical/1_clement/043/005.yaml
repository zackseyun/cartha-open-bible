  - Se usa «tienda del testimonio» en lugar de «tabernáculo» para respetar la literalidad del griego y la decisión auditada en inglés.
  - El tono es solemne pero claro, adecuado para publicación y lectura eclesial.
  - No se añadieron notas al pie porque el pasaje no presenta variantes textuales ni alternativas de traducción obligatorias en el audit trail.
