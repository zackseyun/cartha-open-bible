translation:
  language: es
  text: Y cuando amaneció, reunió a todo Israel, los seiscientos mil varones, y mostró los sellos a los jefes de las tribus; abrió la tienda del testimonio y sacó las varas. Y se halló que la vara de Aarón no solo había brotado, sino que incluso tenía fruto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρωΐας δὲ γενομένης
  english_pob_choice: Then when morning came
  chosen_spanish: Y cuando amaneció
  alternatives_spanish:
  - Y al llegar la mañana
  - Y cuando llegó la mañana
  lexicon: πρωΐα
  rationale: La fórmula marca el inicio de la acción al despuntar el día; «cuando amaneció» transmite el valor temporal de forma natural y breve en español, sin forzar un calco.
- source_word: συνεκάλεσεν πάντα τὸν Ἰσραήλ
  english_pob_choice: he called together all Israel
  chosen_spanish: reunió a todo Israel
  alternatives_spanish:
  - convocó a todo Israel
  - llamó a reunirse a todo Israel
  lexicon: συνακαλέω
  rationale: El verbo implica convocar/reunir a una asamblea; «reunió» conserva el sentido de congregar al pueblo en un acto público, con español fluido.
- source_word: τὰς ἑξακοσίας χιλιάδας τῶν ἀνδρῶν
  english_pob_choice: the six hundred thousand men
  chosen_spanish: los seiscientos mil varones
  alternatives_spanish:
  - los seiscientos mil hombres
  - las seiscientas mil personas
  lexicon: ἄνδρες
  rationale: Se mantiene la referencia numérica y el matiz de varones/ hombres adultos. «Varones» es fiel y relativamente sobrio en español bíblico sin ser arcaizante en exceso.
- source_word: ἐπεδείξατο τοῖς φυλάρχοις τὰς σφραγῖδας
  english_pob_choice: showed the seals to the tribal leaders
  chosen_spanish: mostró los sellos a los jefes de las tribus
  alternatives_spanish:
  - enseñó los sellos a los jefes de las tribus
  - presentó los sellos a los jefes de las tribus
  lexicon: σφραγίς
  rationale: «Sellos» conserva el objeto identificado en el relato. «Jefes de las tribus» explicita φυλάρχοις de modo inteligible en español, alineado con el valor de líderes tribales.
- source_word: ἤνοιξεν τὴν σκηνὴν τοῦ μαρτυρίου
  english_pob_choice: he opened the tent of witness
  chosen_spanish: abrió la tienda del testimonio
  alternatives_spanish:
  - abrió el tabernáculo del testimonio
  - abrió la tienda del testimonio
  lexicon: σκηνή τοῦ μαρτυρίου
  rationale: «Tienda del testimonio» sigue de cerca la expresión griega y evita introducir el término litúrgico tradicional «tabernáculo» donde el texto habla literalmente de tienda; se conserva la imagen cultual sin sobretraducir.
- source_word: προεῖλεν τὰς ῥάβδους
  english_pob_choice: brought out the staffs
  chosen_spanish: sacó las varas
  alternatives_spanish:
  - sacó los bastones
  - trajo fuera las varas
  lexicon: ῥάβδος
  rationale: «Varas» es el equivalente más natural para ῥάβδοι en este contexto narrativo; «sacó» reproduce el movimiento de extraerlas de la tienda.
- source_word: ἡ ῥάβδος Ἀαρὼν
  english_pob_choice: the staff of Aaron
  chosen_spanish: la vara de Aarón
  alternatives_spanish:
  - el bastón de Aarón
  - la vara de Aarón
  lexicon: ῥάβδος
  rationale: Se conserva la misma designación narrativa que en el resto del pasaje. «Vara» es más consistente con el milagro de reverdecer y dar fruto que «bastón».
- source_word: βεβλαστηκυῖα
  english_pob_choice: to have sprouted
  chosen_spanish: había reverdecido
  alternatives_spanish:
  - había brotado
  - había retoñado
  lexicon: βλαστάνω
  rationale: 'El participio perfecto expresa un estado resultante: la vara ya estaba en condición de brotar. «Reverdecer» comunica bien la imagen de vida vegetal manifestada en la vara, sin limitarla solo al inicio del brote.'
- source_word: καρπὸν ἔχουσα
  english_pob_choice: bearing fruit
  chosen_spanish: tenía fruto
  alternatives_spanish:
  - llevaba fruto
  - estaba dando fruto
  lexicon: καρπός
  rationale: «Tenía fruto» refleja el estado observado en la vara con sobriedad y sin añadir progresividad no explicitada por el griego.
theological_decisions:
- issue: Presentación pública de la prueba de elección divina
  english_pob_reading: he showed the seals to the tribal leaders; and he opened the tent of witness and brought out the staffs
  chosen_spanish_reading: mostró los sellos a los jefes de las tribus; abrió la tienda del testimonio y sacó las varas
  alternative_spanish_readings:
  - enseñó los sellos a los líderes tribales; abrió el tabernáculo del testimonio y sacó las varas
  rationale: El texto relata una validación pública y verificable ante los representantes del pueblo. La traducción conserva ese carácter probatorio sin suavizarlo ni interpretarlo más allá del relato.
  doctrine_reference: No doctrinal expansion; historical/narrative public verification
- issue: Señal milagrosa de la vara de Aarón
  english_pob_reading: was found not only to have sprouted, but even to be bearing fruit
  chosen_spanish_reading: no solo había reverdecido, sino que incluso tenía fruto
  alternative_spanish_readings:
  - no solo había brotado, sino que incluso tenía fruto
  - no solo había retoñado, sino que incluso estaba dando fruto
  rationale: 'Se preserva la doble intensificación del milagro: primero vida vegetal, luego fruto. La formulación evita explicar el fenómeno, manteniendo el asombro narrativo del original.'
  doctrine_reference: Divine sign/confirmation of Aaronic authority within the narrative
translation_notes:
  revision_awareness: The latest revision pass reported no changes needed and cross-check status was high agreement with the English POB text. This Spanish draft follows the same verse structure and preserves the same narrative sequence without introducing alternate readings or textual variants.
  spanish_consistency_notes:
