  revised_spanish_text: Y cuando amaneció, reunió a todo Israel, los seiscientos mil varones, y mostró los sellos a los jefes de las tribus; abrió la tienda del testimonio y sacó las varas. Y se halló que la vara de Aarón no solo había brotado, sino que incluso tenía fruto.
  revision_rationale: 'Se sustituye «había reverdecido» por «había brotado» para reflejar con mayor precisión βεβλαστηκυῖα y mantener mejor la intensificación del milagro: la vara no solo echó brotes, sino que además tenía fruto.'
