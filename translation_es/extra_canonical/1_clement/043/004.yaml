base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/043/004.yaml
  text: And after shutting the tent[a], he sealed the staffs in the same way, and said to them, “Brothers, the tribe whose staff shall sprout—this one God has chosen to serve as priest and to minister to him.”
  footnotes:
  - marker: a
    text: Or 'Men, brothers'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:49Z'
    unchanged: false
    changes_summary: Removed 'the keys,' which does not fit the context here; κλεῖδας appears to refer to the staffs/rods being sealed, and the verse naturally reads as sealing the staffs likewise. Otherwise retained the wording.
translation:
  language: es
  text: 'Y después de cerrar la tienda, selló de la misma manera las varas, y les dijo: «Hermanos[a], la tribu cuya vara retoñe, esa es la que Dios ha escogido para ejercer el sacerdocio y ministrarle».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «varones, hermanos».
    reason: Alternativa más literal para Ἄνδρες ἀδελφοί; el texto principal usa la forma más natural en español.
lexical_decisions:
- source_word: σκηνήν
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - el tabernáculo
  - la tienda de reunión
  lexicon: σκηνή
  rationale: En este pasaje la imagen es la de una tienda/toldilla cerrada; ‘tienda’ conserva el sentido concreto sin introducir una terminología cultual más técnica que el griego no exige aquí. ‘Tabernáculo’ sería posible, pero en español puede sonar más interpretativo y menos directo para esta escena narrativa.
- source_word: ἐσφράγισεν τὰς κλεῖδας ... καὶ τὰς ῥάβδους
  english_pob_choice: he sealed the staffs in the same way
  chosen_spanish: selló de la misma manera los bastones
  alternatives_spanish:
  - selló de la misma manera las varas
  - los selló de la misma manera, junto con los bastones
  lexicon: σφραγίζω; ῥάβδος
  rationale: El contexto y la revisión inglesa muestran que κλεῖδας no debe leerse como ‘llaves’ aquí, sino como parte del conjunto a ser sellado; por eso el español evita ‘llaves’ y sigue la lectura contextual de ‘los bastones’. ‘Bastones’ mantiene la referencia física más simple; ‘varas’ también sería viable, pero ‘bastones’ suena más natural en español contemporáneo.
- source_word: Ἄνδρες ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hombres, hermanos
  - Varones, hermanos
  lexicon: ἄνδρες ἀδελφοί
  rationale: El audit trail inglés ya resolvió que la expresión funciona como un saludo respetuoso y no como un literal ‘hombres’. En español, ‘Hermanos’ comunica ese registro sin cargar una fórmula dura o extraña; la alternativa literal quedaría poco natural y no añade precisión.
- source_word: βλαστήσῃ
  english_pob_choice: shall sprout
  chosen_spanish: retoñe
  alternatives_spanish:
  - brotará
  - florecerá
  - echará brotes
  lexicon: βλαστάνω
  rationale: ‘Retoñe’ conserva la imagen vegetal de un bastón que produce vida/señal divina y, en español bíblico, suena suficientemente natural. ‘Brotará’ también sería posible, pero ‘retoñar’ mantiene mejor la metáfora del nuevo crecimiento visible.
- source_word: ἐκλέλεκται ὁ θεὸς εἰς τὸ ἱερατεύειν καὶ λειτουργεῖν αὐτῷ
  english_pob_choice: God has chosen to serve as priest and to minister to him
  chosen_spanish: Dios ha elegido para servir como sacerdote y ministrarle
  alternatives_spanish:
  - Dios ha escogido para ejercer el sacerdocio y ministrarle
  - Dios lo ha elegido para ser sacerdote y servirle
  lexicon: ἐκλέγομαι; ἱερατεύω; λειτουργέω
  rationale: ‘Ha elegido’ reproduce bien la acción divina de selección; ‘servir como sacerdote’ mantiene el matiz funcional de ἱερατεύειν sin forzar una perífrasis más pesada. ‘Ministrarle’ conserva el segundo verbo con un registro reverente y útil para el contexto litúrgico; ‘servirle’ sería más llano, pero menos distinguido respecto del primer verbo.
theological_decisions:
- issue: Elección divina para el sacerdocio
  english_pob_reading: this one God has chosen to serve as priest and to minister to him
  chosen_spanish_reading: ésta es la que Dios ha elegido para servir como sacerdote y ministrarle
  alternative_spanish_readings:
  - éste es el que Dios ha elegido para servir como sacerdote y ministrarle
  - ésta es la tribu que Dios ha elegido para ejercer el sacerdocio y ministrarle
  rationale: El punto teológico es la elección divina de una tribu/señal para el servicio sacerdotal. El español mantiene ese énfasis sin añadir explicaciones doctrinales ajenas al texto. Se conserva la indeterminación del referente inmediato (‘ésta’) porque en español puede apuntar a ‘la tribu’ de forma natural, siguiendo la sintaxis del griego y del inglés revisado.
  doctrine_reference: Elección divina / sacerdocio (tema narrativo y tipológico, sin formulación doctrinal sistemática en este versículo)
translation_notes:
  revision_awareness: La base inglesa fue revisada para eliminar «keys», porque no encaja con el contexto; el griego también sugiere que κλεῖδας no debe leerse literalmente como ‘llaves’ en esta escena. La traducción española sigue esa lectura contextual y no reintroduce el error corregido. También se tomó en cuenta que el saludo Ἄνδρες ἀδελφοί es un vocativo respetuoso, por lo que no se traduce de manera rígidamente literal.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino; aparece ‘Dios’ y se traduce así.
  - Se prefirió ‘bastones’ para ῥάβδοι por coherencia con la escena y por naturalidad en español, sin perder la imagen del objeto ritual.
  - No se empleó ‘Cristo’ ni terminología confesional adicional; el pasaje se limita al lenguaje narrativo de elección y servicio sacerdotal.
