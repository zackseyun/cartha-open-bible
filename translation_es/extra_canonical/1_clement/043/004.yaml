  text: καὶ κλείσας τὴν σκηνὴν ἐσφράγισεν τὰς κλεῖδας ὡσαύτως καὶ τὰς ῥάβδους, καὶ εἶπεν αὐτοῖς· Ἄνδρες ἀδελφοί, ἧς ἂν φυλῆς ἡ ῥάβδος βλαστήσῃ, ταύτην ἐκλέλεκται ὁ θεὸς εἰς τὸ ἱερατεύειν καὶ λειτουργεῖν αὐτῷ.
