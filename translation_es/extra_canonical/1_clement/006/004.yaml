translation:
  language: es
  text: A causa de la envidia y la contienda, grandes ciudades han sido derribadas y grandes naciones desarraigadas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ φθόνον καὶ ἔριν
  english_pob_choice: Because of jealousy and strife
  chosen_spanish: Porque, a causa de la envidia y de la contienda
  alternatives_spanish:
  - Por la envidia y la contienda
  - A causa de los celos y la discordia
  lexicon: διὰ + acusativo; φθόνος; ἔρις
  rationale: Conservo la causalidad explícita de «Because of» y traduzco φθόνος como «envidia», que es el equivalente más directo y sobrio en español. Ἔρις se rinde mejor como «contienda» que como «discordia», porque mantiene la idea de disputa activa sin suavizarla.
- source_word: κατεστράφησαν
  english_pob_choice: have been overthrown
  chosen_spanish: han sido derribadas
  alternatives_spanish:
  - han sido destruidas
  - han sido derribadas / arrasadas
  lexicon: καταστρέφω
  rationale: Opto por «han sido derribadas» para reflejar el pasivo y la imagen de caída/derrocamiento aplicada a ciudades. Aunque «overthrown» puede sugerir «derrocadas», en español para ciudades suena más natural «derribadas»; «destruidas» sería más fuerte de lo que exige el contexto.
- source_word: ἔθνη μεγάλα
  english_pob_choice: great nations
  chosen_spanish: grandes naciones
  alternatives_spanish:
  - naciones poderosas
  - pueblos grandes
  lexicon: ἔθνος; μέγας
  rationale: Mantengo «grandes naciones» porque el inglés POB conserva el paralelismo con «great cities» y «great nations». «Grandes» aquí comunica tamaño/importancia sin introducir una interpretación política adicional.
- source_word: ἐκριζώθησαν
  english_pob_choice: uprooted
  chosen_spanish: desarraigadas
  alternatives_spanish:
  - arrancadas de raíz
  - exterminadas
  lexicon: ἐκριζόω
  rationale: «Desarraigadas» reproduce bien la metáfora agrícola de arrancar de raíz y funciona naturalmente con «naciones» en español. «Arrancadas de raíz» es más literal, pero suena menos idiomático en este enunciado breve.
theological_decisions:
- issue: Causalidad moral de los desastres colectivos
  english_pob_reading: Because of jealousy and strife, great cities have been overthrown and great nations uprooted.
  chosen_spanish_reading: Porque, a causa de la envidia y de la contienda, grandes ciudades han sido derribadas y grandes naciones desarraigadas.
  alternative_spanish_readings:
  - Por la envidia y la contienda, grandes ciudades han sido derribadas y grandes naciones desarraigadas.
  - A causa de los celos y la discordia, grandes ciudades han sido destruidas y grandes naciones arrancadas de raíz.
  rationale: Sigo la lectura causal explícita del texto auditado y no la atenúo. El versículo presenta la envidia y la contienda como causa de ruina histórica; por eso mantengo la estructura causal y el pasivo verbal sin convertirlo en una simple observación moral general.
  doctrine_reference: Lectura ética-histórica del texto, sin implicación doctrinal adicional; preserva la causalidad del ejemplo admonitorio.
translation_notes:
  revision_awareness: La versión inglesa revisada añadió explícitamente «Because of» para reflejar διὰ y cambió a voz pasiva con «have been overthrown / uprooted». La traducción española conserva esa causalidad y esa pasividad con «Porque, a causa de… han sido derribadas / desarraigadas», sin introducir notas textuales adicionales porque el sentido es directo y no requiere variantes ancilares.
  spanish_consistency_notes:
  - He mantenido paralelismo léxico entre «grandes ciudades» y «grandes naciones» para reflejar el ritmo del original y del POB inglés.
  - He evitado «celos» porque en español puede sugerir posesividad interpersonal más estrecha que φθόνος; «envidia» es más exacto aquí.
  - He evitado «discordia» como término principal porque ἔρις apunta a contienda/disputa activa, no solo desavenencia pasiva.
  - La estructura pasiva en español («han sido derribadas», «han sido desarraigadas») refleja la revisión inglesa y el probable pasivo griego.
