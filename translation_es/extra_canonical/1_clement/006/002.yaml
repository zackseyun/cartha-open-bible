revisions:
- from: A causa de los celos, las mujeres fueron perseguidas como las Dánaides y las Dircas; después de sufrir ultrajes terribles e impíos, alcanzaron con seguridad la meta de la fe y recibieron una noble recompensa, aunque débiles en el cuerpo.
  to: A causa de los celos, las mujeres fueron perseguidas como las Dánaides y las Dircas; después de sufrir ultrajes terribles e impíos, llegaron a salvo a la meta de la fe y recibieron una noble recompensa, aunque débiles en el cuerpo.
  rationale: Se hace una reparación menor de naturalidad en español al sustituir «alcanzaron con seguridad» por «llegaron a salvo», que comunica mejor el sentido del griego según la auditoría inglesa. Se conserva el resto de las decisiones léxicas, incluido el registro de los nombres mitológicos y el contraste entre debilidad corporal y recompensa final.
