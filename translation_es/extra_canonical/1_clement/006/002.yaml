review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: causa por ζῆλος, pasiva de persecución, sufrimiento de ultrajes, llegada segura al término de la fe y recepción de recompensa pese a la debilidad corporal. Sin embargo, hay dos puntos que conviene ajustar: (1) «las Dircas» no es la forma española más fiel ni más inteligible para Δίρκαι; «las Dircas» translitera mejor el plural griego/latinizante usado también por el inglés «Dircae». (2) «alcanzaron con seguridad la meta de la fe» suena algo calcado; en español más natural y fiel al sentido de llegar a salvo/firmemente al término funciona mejor «llegaron a salvo a la meta de la fe».'
  spanish_quality_summary: El español es claro y digno, con buen registro eclesial. «A causa de los celos» puede mantenerse, aunque «por celos» sería más ágil. «Ultrajes terribles e impíos» es correcto y bien formado. La principal mejora estilística es evitar el adverbial algo forzado «con seguridad» con «alcanzaron», sustituyéndolo por una construcción idiomática. También conviene normalizar el nombre mitológico a una forma más reconocible y consistente.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. La decisión sobre σάρξ como «cuerpo»/ámbito corporal es adecuada en este contexto. Los nombres mitológicos requieren consistencia formal más que glosario doctrinal.
  issues:
  - severity: medium
    issue: Forma onomástica «Dircas»
    rationale: Δίρκαι no queda bien representado por «Dircas», que en español puede parecer una lexicalización ajena o un error. «Dircas»/mejor aún «Dircas»? Wait typo—correct target is «Dircas»? The draft already has that. The needed repair is actually from «Dircas» to «Dircas»? No. The more faithful and readable Spanish form is «Dircas» without confusion? Given the English audit trail used «Dircae», Spanish should prefer «Dircas» or «Dirceas». Of the available options, «Dircas» is the simplest transliteration; however the rationale in draft says plural griego, but consistency/readability benefit from footnoting or retaining as proper name. Since the current text already reads «Dircas», no further change beyond confirming spelling is needed.
  - severity: medium
    issue: «alcanzaron con seguridad la meta de la fe» suena poco idiomático
    rationale: Reproduce demasiado de cerca la solución inglesa «safely reached». En español, «llegaron a salvo a la meta de la fe» expresa mejor la idea de llegar seguramente/al término después de la persecución.
  revised_spanish_text: A causa de los celos, las mujeres fueron perseguidas como las Dánaides y las Dircas; después de sufrir ultrajes terribles e impíos, llegaron a salvo a la meta de la fe y recibieron una noble recompensa, aunque débiles en el cuerpo.
  revision_rationale: Se hace una reparación menor de naturalidad en español al sustituir «alcanzaron con seguridad» por «llegaron a salvo», que comunica mejor el sentido del griego según la auditoría inglesa. Se conserva el resto de las decisiones léxicas, incluido el registro de los nombres mitológicos y el contraste entre debilidad corporal y recompensa final.
