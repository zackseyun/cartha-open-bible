  text: Because of jealousy, women were persecuted as Danaids and Dircae; after suffering terrible and unholy outrages, they safely reached the goal of the faith and received a noble reward, though weak in body.
  revision_pass:
    model: gpt-5
    timestamp: '2026-05-03T05:04:55Z'
    unchanged: false
    changes_summary: 'Improved naturalness and lexical precision: added “were” to complete the clause; changed “Dirces” to the Greek plural “Dircae”; replaced “sure course of faith” with “safely reached the goal of the faith”; and rendered “impious abuses” as the more idiomatic “unholy outrages.” Punctuation adjusted for clarity.'
translation:
  language: es
  text: A causa de los celos, las mujeres fueron perseguidas como las Dánaides y las Dircas; después de sufrir ultrajes terribles e impíos, llegaron a salvo a la meta de la fe y recibieron una noble recompensa, aunque débiles en el cuerpo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ζήλος / jealousy
  english_pob_choice: Because of jealousy
  chosen_spanish: A causa de los celos
  alternatives_spanish:
  - Por celos
  - Debido a la envidia
  lexicon: ζήλος
  rationale: El contexto pide una causa personal y hostil; «celos» conserva la ambigüedad posible del griego y el tono del texto, mientras que «envidia» estrecharía demasiado el campo semántico.
- source_word: γυναῖκες / women
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - mujeres
  lexicon: γυνή
  rationale: La referencia general en plural se expresa de forma natural con «las mujeres».
- source_word: ἐδιώχθησαν / persecuted
  english_pob_choice: were persecuted
  chosen_spanish: fueron perseguidas
  alternatives_spanish:
  - fueron acosadas
  - fueron hostigadas
  lexicon: διώκω
  rationale: «Perseguidas» mantiene la fuerza pasiva del verbo y la lectura histórica del pasaje.
- source_word: Δαναΐδες / Danaids
  english_pob_choice: Danaids
  chosen_spanish: las Dánaides
  alternatives_spanish:
  - las Danaides
  lexicon: Δαναΐδες
  rationale: Se translitera el nombre mitológico en una forma reconocible y cercana al español culto; se conserva el plural femenino del original.
- source_word: Δίρκαι / Dircae
  english_pob_choice: Dircae
  chosen_spanish: las Dircas
  alternatives_spanish:
  - las Dirceas
  lexicon: Δίρκαι
  rationale: Se conserva el plural griego como nombre propio mitológico, siguiendo la decisión inglesa de no normalizarlo a una traducción explicativa.
- source_word: ὑβρισθεῖσαι / after suffering terrible and unholy outrages
  english_pob_choice: after suffering terrible and unholy outrages
  chosen_spanish: después de sufrir ultrajes terribles e impíos
  alternatives_spanish:
  - después de padecer ultrajes terribles e impíos
  - tras sufrir atrocidades terribles e impías
  lexicon: ὕβρις / ὑβρίζω
  rationale: «Ultrajes» reproduce bien la idea de violencia/deshonra indebida, y «impíos» preserva el matiz moral-religioso de ἀσεβής sin volverlo más fuerte de lo que el pasaje exige.
- source_word: τὸν τῆς πίστεως δρόμον / the goal of the faith
  english_pob_choice: the goal of the faith
  chosen_spanish: la meta de la fe
  alternatives_spanish:
  - el fin de la fe
  - la carrera de la fe
  lexicon: δρόμος
  rationale: La revisión inglesa entiende el término como meta final más que como carrera; «meta» comunica ese resultado alcanzado sin introducir imagen atlética no explicitada en el inglés revisado.
- source_word: ἔλαβον εὐγενῆ μισθὸν / received a noble reward
  english_pob_choice: received a noble reward
  chosen_spanish: recibieron una noble recompensa
  alternatives_spanish:
  - recibieron un noble premio
  - obtuvieron una noble recompensa
  lexicon: μισθός
  rationale: «Recompensa» es el equivalente más natural de μισθός en este contexto moral; «noble» conserva el valor cualitativo del adjetivo.
- source_word: κατὰ σάρκα ἀσθενεῖς / though weak in body
  english_pob_choice: though weak in body
  chosen_spanish: aunque débiles en el cuerpo
  alternatives_spanish:
  - aunque débiles físicamente
  - aunque frágiles en el cuerpo
  lexicon: σάρξ
  rationale: «En el cuerpo» preserva la referencia corporal concreta sin abstraerla a «físicamente», y mantiene la oposición entre debilidad corporal y recompensa recibida.
theological_decisions:
- issue: Relación entre el sufrimiento injusto y la recompensa de fe
  english_pob_reading: they safely reached the goal of the faith and received a noble reward, though weak in body
  chosen_spanish_reading: alcanzaron con seguridad la meta de la fe y recibieron una noble recompensa, aunque débiles en el cuerpo
  alternative_spanish_readings:
  - llegaron sanas y salvas al fin de la fe y recibieron una noble recompensa, aunque débiles en el cuerpo
  - obtuvieron la recompensa noble de la fe, aunque débiles en el cuerpo
  rationale: 'La formulación mantiene la estructura de contraste: padecimiento violento, perseverancia segura y recompensa final. No se añade contenido doctrinal ajeno al texto, pero sí se conserva la tensión entre fragilidad corporal y vindicación final.'
  doctrine_reference: Perseverancia y recompensa escatológica por la fe, sin convertir el pasaje en una formulación técnica de mérito
- issue: Tratamiento de nombres mitológicos como Dánaides y Dircas
  english_pob_reading: Danaids and Dircae
  chosen_spanish_reading: las Dánaides y las Dircas
  alternative_spanish_readings:
  - las Danaides y las Dirceas
  - las Dánaides y las Dirceas
  rationale: No se sustituye el referente cultural por una explicación interpretativa; el texto funciona por alusión histórica/mitológica y la traducción debe conservar esa alusión.
  doctrine_reference: Respeto al referente cultural del texto sin neutralizarlo con paráfrasis
translation_notes:
  revision_awareness: 'Se incorporó la revisión inglesa más reciente: se completó la cláusula pasiva con «fueron», se mantuvieron los nombres mitológicos en plural («Dánaides», «Dircas»), se reflejó la idea de «reached the goal of the faith» como «alcanzaron con seguridad la meta de la fe», y se optó por «ultrajes terribles e impíos» como equivalente idiomático de «unholy outrages».'
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y público del POB en español.
  - Se evita el calco de «SEÑOR» u otras sustituciones no presentes en este pasaje.
  - Los nombres propios mitológicos se conservan de manera reconocible y consistente con la decisión inglesa.
  - No se introdujeron notas al pie porque el texto español no requiere desambiguación adicional anclada.
