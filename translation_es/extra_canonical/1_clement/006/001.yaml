translation:
  language: es
  text: 'A estos hombres, que habían vivido en santidad, se les reunió una gran multitud de los elegidos, quienes, habiendo sufrido muchos ultrajes y torturas por causa de los celos, llegaron a ser entre nosotros un ejemplo excelentísimo.


    2. Por causa de los celos, mujeres, perseguidas como Danaides y Dirces[a], después de sufrir abusos terribles e impíos[b], llegaron al firme camino de la fe y recibieron una noble recompensa, aunque débiles en el cuerpo.


    3. Los celos alejaron a las esposas de sus maridos y alteraron lo dicho por nuestro padre Adán: «Esto ahora es hueso de mis huesos y carne de mi carne».


    4. Los celos y la contienda han derribado grandes ciudades y arrancado de raíz grandes naciones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alusión mitológica griega retenida sin explicación en el cuerpo del texto, para no añadir una paráfrasis interpretativa que no está explícita en el original.
    reason: cultural_note
  - marker: b
    text: '«Impíos» traduce la fuerza religiosa de ἀνόσια: no solo abusos crueles, sino abusos contrarios a lo santo.'
    reason: theological_note
lexical_decisions:
- source_word: ὁσίως πολιτευσαμενοις
  english_pob_choice: who had lived in holiness
  chosen_spanish: que habían vivido en santidad
  alternatives_spanish:
  - que se habían conducido en santidad
  - que habían vivido piadosamente
  lexicon: LSJ
  rationale: Preservo el sentido ético-religioso de ὁσίως con «santidad», y el matiz de conducta pública/vida con «habían vivido», que en español resulta natural y fiel al valor del participio.
- source_word: ἐκλεκτῶν
  english_pob_choice: the elect
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los electos
  - los elegidos
  lexicon: LSJ
  rationale: «Escogidos» comunica el sentido del término sin forzar una terminología eclesial más técnica de «electos»; mantiene el valor comunitario del grupo sin perder claridad en español.
- source_word: αἰκίαις
  english_pob_choice: outrages
  chosen_spanish: ultrajes
  alternatives_spanish:
  - abusos
  - vejaciones
  lexicon: LSJ
  rationale: «Ultrajes» conserva la fuerza de trato violento y vergonzoso que tiene el término, y suena más solemne que «abusos» en este contexto.
- source_word: βασάνοις
  english_pob_choice: tortures
  chosen_spanish: torturas
  alternatives_spanish:
  - tormentos
  lexicon: LSJ
  rationale: «Torturas» es la equivalencia directa y mantiene la intensidad coercitiva del griego.
- source_word: ὑπόδειγμα κάλλιστον
  english_pob_choice: a most excellent example
  chosen_spanish: un ejemplo sumamente excelente
  alternatives_spanish:
  - un ejemplo hermosísimo
  - un modelo sumamente noble
  lexicon: LSJ
  rationale: El griego combina «ejemplo/modelo» con un superlativo de belleza o excelencia. En español, «sumamente excelente» preserva la valoración intensiva sin introducir una imagen demasiado extraña para el lector.
- source_word: Δαναΐδες καὶ Δίρκαι
  english_pob_choice: Danaids and Dirces
  chosen_spanish: Danaides y Dirces
  alternatives_spanish:
  - mujeres como Danaides y Dirce
  - las Danaides y Dirce
  lexicon: LSJ
  rationale: Conservo la alusión mitológica transliterada para no añadir una paráfrasis interpretativa que el texto no explicita. En español, la forma plural y el contexto requieren retener el nombre propio como referencia literaria.
- source_word: αἰκίσματα δεινὰ καὶ ἀνόσια
  english_pob_choice: terrible and unholy abuses
  chosen_spanish: abusos terribles e impíos
  alternatives_spanish:
  - vejaciones terribles y profanas
  - abusos espantosos e impíos
  lexicon: LSJ
  rationale: «Impíos» recoge ἀνόσια con su carga religiosa, mejor que «inmorales» o «vergonzosos». «Abusos terribles» mantiene el énfasis de δεινά.
- source_word: τὸν τῆς πίστεως βέβαιον δρόμον
  english_pob_choice: the sure course of faith
  chosen_spanish: el seguro curso de la fe
  alternatives_spanish:
  - el firme camino de la fe
  - la segura carrera de la fe
  lexicon: LSJ
  rationale: «Curso» conserva la metáfora de δρόμος sin forzar la imagen atlética; «seguro» traduce βέβαιον con precisión.
- source_word: γέρας γενναῖον
  english_pob_choice: a noble reward
  chosen_spanish: una noble recompensa
  alternatives_spanish:
  - un noble premio
  - una recompensa gloriosa
  lexicon: LSJ
  rationale: «Recompensa» es natural en español y mantiene el sentido de premio recibido; «noble» conserva la dignidad del adjetivo γενναῖον.
- source_word: ἀσθενεῖς τῷ σώματι
  english_pob_choice: though weak in body
  chosen_spanish: aunque débiles en el cuerpo
  alternatives_spanish:
  - aunque débiles corporalmente
  - siendo débiles en el cuerpo
  lexicon: LSJ
  rationale: La concesiva «aunque» expresa bien el contraste del griego; «en el cuerpo» mantiene el matiz corporal concreto sin abstracciones innecesarias.
- source_word: ἀπηλλοτρίωσεν
  english_pob_choice: estranged
  chosen_spanish: apartaron
  alternatives_spanish:
  - enajenaron
  - alejaron
  lexicon: LSJ
  rationale: En la relación marital, «apartaron» resulta natural y comunica la ruptura relacional; «enajenaron» sería más técnico y menos transparente para el lector general.
- source_word: ἠλλοίωσεν
  english_pob_choice: altered
  chosen_spanish: alteraron
  alternatives_spanish:
  - cambiaron
  - distorsionaron
  lexicon: LSJ
  rationale: «Alteraron» sigue de cerca el griego y conserva el paralelismo con la acción anterior sin cargar el texto con una interpretación más fuerte que la fuente.
- source_word: ἔρις
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - discordia
  - riña
  lexicon: LSJ
  rationale: «Contienda» es una equivalencia sobria que retiene el sentido de conflicto divisivo y su tono moral.
- source_word: ἐξερίζωσεν
  english_pob_choice: uprooted
  chosen_spanish: arrancado de raíz
  alternatives_spanish:
  - desarraigado
  - uprootado
  lexicon: LSJ
  rationale: «Arrancado de raíz» preserva la metáfora agrícola con fuerza idiomática en español; así no se atenúa la imagen del griego.
theological_decisions:
- issue: Referencia de «los escogidos»
  english_pob_reading: the elect
  chosen_spanish_reading: los escogidos
  alternative_spanish_readings:
  - los electos
  - los elegidos
  rationale: El texto mantiene la resonancia comunitaria y teológica del grupo sin imponer una terminología más técnica que podría sonar menos natural en español. «Escogidos» conserva tanto la idea de elección como la legibilidad.
  doctrine_reference: Elección / ecclesiología primitiva
- issue: Alusión mitológica «Danaides y Dirces»
  english_pob_reading: The phrase is retained as a mythological allusion in transliteration rather than converted into an explanatory paraphrase.
  chosen_spanish_reading: Se conserva la alusión mitológica transliterada.
  alternative_spanish_readings:
  - mujeres tratadas como Danaides y Dirce
  - mujeres vestidas como Danaides y Dirce
  rationale: La frase es comprimida y alusiva; el español no debe resolver la ambigüedad con una explicación no presente en el texto. La transliteración preserva la textura literaria y deja la aclaración fuera del versículo.
  doctrine_reference: Primacía del texto fuente; preservación de ambigüedad genuina
- issue: Carga moral de ἀνόσια
  english_pob_reading: Rendered 'unholy' rather than merely 'shameful' or omitted.
  chosen_spanish_reading: «impíos»
  alternative_spanish_readings:
  - profanos
  - inicuos
  rationale: La palabra no solo describe crueldad, sino también violación de lo santo. «Impíos» conserva esa dimensión religiosa mejor que un término meramente social o emocional.
  doctrine_reference: Registro teológico del texto; santidad frente a impiedad
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente, que aclaró la relación de «Danaides y Dirces» con las mujeres perseguidas y reforzó la fuerza de ἀνόσια. Frente a la versión inglesa auditada, se optó por una formulación española natural pero todavía cercana al griego, manteniendo los paralelismos retóricos del pasaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo donde la fuente lo exigiera; aquí no aparece el nombre divino.
  - Se conservó la metáfora de δρόμος como «curso», evitando reducirla a un simple «camino» sin necesidad.
  - 'Se evitó suavizar αἰκίαις/βασάνοις: «ultrajes» y «torturas» preservan la intensidad del sufrimiento.'
  - Se mantuvo un tono literario y eclesial acorde con la carta, sin recurrir a fórmulas arcaizantes innecesarias.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto donde se requiere explicación.
