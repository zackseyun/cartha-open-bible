  to: 'A estos hombres, que habían vivido en santidad, se les reunió una gran multitud de los elegidos, quienes, habiendo sufrido muchos ultrajes y torturas por causa de los celos, llegaron a ser entre nosotros un ejemplo excelentísimo.


