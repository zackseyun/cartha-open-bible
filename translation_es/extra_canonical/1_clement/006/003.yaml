    issue: «alejaron» es aceptable pero más débil que el sentido relacional de estrangement
    rationale: El contexto habla de la ruptura del vínculo matrimonial; «separaron» comunica mejor el resultado que «alejaron», que puede sonar espacial o emocionalmente difuso.
  - severity: medium
    issue: «alteraron lo que fue dicho por nuestro padre Adán» es poco natural en español
    rationale: La construcción pasiva «lo que fue dicho por» suena calcada y pesada. Una formulación como «alteraron las palabras de nuestro padre Adán» preserva mejor el sentido con español más idiomático.
  revised_spanish_text: 'Los celos separaron a las esposas de sus maridos y alteraron las palabras de nuestro padre Adán: «Ahora esto es hueso de mis huesos y carne de mi carne».'
  revision_rationale: Se ajusta «alejaron» a «separaron» para reflejar con más fuerza la ruptura conyugal implícita en el griego y en el English POB. También se sustituye la pasiva rígida «lo que fue dicho por nuestro padre Adán» por «las palabras de nuestro padre Adán», que conserva la procedencia de la cita y mejora claramente la naturalidad del español sin perder sentido.
