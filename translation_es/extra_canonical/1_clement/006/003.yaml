  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del English POB: ζῆλος como fuerza destructiva, ἀπῴκισεν con idea de distanciamiento conyugal, y la cita de Génesis preservada. Sin embargo, en español la frase «alteraron lo que fue dicho por nuestro padre Adán» suena innecesariamente pasiva y menos natural que una formulación que mantenga la procedencia de la cita sin rigidez.'
  spanish_quality_summary: El español es claro y comprensible, pero puede mejorarse en naturalidad y dignidad eclesial. «Alejaron a las esposas de sus maridos» funciona, aunque «separaron» expresa mejor el rompimiento relacional implicado por estranged. La secuencia «lo que fue dicho por nuestro padre Adán» conviene pulirse a «las palabras de nuestro padre Adán» o equivalente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Celos», «Adán», «carne» y la cita bíblica son adecuados. La principal mejora es estilística y de precisión relacional, no terminológica.
  issues:
