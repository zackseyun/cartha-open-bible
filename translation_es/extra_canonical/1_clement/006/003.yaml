translation:
  language: es
  text: 'Los celos separaron a las esposas de sus maridos y alteraron las palabras de nuestro padre Adán: «Ahora esto es hueso de mis huesos y carne de mi carne».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ζῆλος / jealousy
  english_pob_choice: Jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - rivalidad
  lexicon: ζῆλος
  rationale: El contexto exige la fuerza relacional de la pasión posesiva o celosa que rompe vínculos; «celos» comunica mejor el efecto narrado que «envidia», que suele apuntar más al deseo de lo ajeno en general.
- source_word: ἀπῴκισεν / estranged
  english_pob_choice: estranged
  chosen_spanish: alejaron
  alternatives_spanish:
  - separaron
  - desarraigaron
  lexicon: ἀποικίζω
  rationale: El verbo griego expresa apartar o hacer vivir lejos; en español, «alejaron» mantiene el efecto de distanciamiento con una construcción natural y fluida.
- source_word: γυναῖκας ἀπὸ τῶν ἀνδρῶν αὐτῶν / wives from their husbands
  english_pob_choice: wives from their husbands
  chosen_spanish: las esposas de sus maridos
  alternatives_spanish:
  - las mujeres de sus hombres
  - las mujeres de sus maridos
  lexicon: γυνή / ἀνήρ
  rationale: «Esposas» y «maridos» conservan la relación conyugal explícita del griego y resultan más claros en español actual que una repetición demasiado literal de «mujeres» y «hombres».
- source_word: παρὰ τὸν πατέρα ἡμῶν Ἀδὰμ / by our father Adam
  english_pob_choice: by our father Adam
  chosen_spanish: por nuestro padre Adán
  alternatives_spanish:
  - de nuestro padre Adán
  - nuestro padre Adán
  lexicon: πατήρ
  rationale: La preposición griega introduce la autoridad o procedencia de la cita; «por» funciona naturalmente en español para señalar que lo dicho procede de Adán.
- source_word: ὀστοῦν ἐκ τῶν ὀστέων μου καὶ σὰρξ ἐκ τῆς σαρκός μου / bone from my bones and flesh from my flesh
  english_pob_choice: bone from my bones and flesh from my flesh
  chosen_spanish: hueso de mis huesos y carne de mi carne
  alternatives_spanish:
  - hueso de mis huesos y carne de mi carne propia
  - un hueso de mis huesos y una carne de mi carne
  lexicon: ὀστοῦν / σάρξ
  rationale: Se conserva la fórmula bíblica tradicional y el paralelismo hebraico reflejado en griego. «Carne» mantiene el valor corporal y relacional de σάρξ sin sustituirlo por una paráfrasis interpretativa.
theological_decisions:
- issue: La frase dice que los celos «alejaron» a las esposas de sus maridos; el matiz es causal y relacional, no meramente emocional.
  english_pob_reading: Jealousy estranged wives from their husbands
  chosen_spanish_reading: Los celos alejaron a las esposas de sus maridos
  alternative_spanish_readings:
  - Los celos separaron a las esposas de sus maridos
  - Los celos enajenaron a las esposas de sus maridos
  rationale: Se mantiene la idea de una fuerza destructiva que rompe el vínculo matrimonial. «Alejaron» evita intensificar sin necesidad y conserva bien el resultado de la acción.
  doctrine_reference: 1 Clement 6:3; narración exhortativa sobre los daños de los celos en la comunidad.
- issue: La cita de Adán funciona como apoyo escritural tradicional; no se introduce una lectura doctrinal adicional más allá de la cita.
  english_pob_reading: This now is bone from my bones and flesh from my flesh.
  chosen_spanish_reading: Ahora esto es hueso de mis huesos y carne de mi carne
  alternative_spanish_readings:
  - Esto ahora es hueso de mis huesos y carne de mi carne
  - Ahora esto es un hueso de mis huesos y carne de mi carne
  rationale: Se conserva la cita como formulación reconocible y directa, sin añadir artículos o ajustes que alteren el paralelismo original.
  doctrine_reference: Génesis 2:23; citación patrística en 1 Clemente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo cruzado mostró alta concordancia; por ello, el borrador español sigue de cerca la estructura y el sentido del texto auditado sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de YHWH fuera de este versículo porque no aparece en el texto griego citado aquí.
  - «Carne» se conserva para σάρξ por fidelidad léxica y por su clara inteligibilidad en español bíblico.
  - La puntuación reproduce una sola cita directa y no añade notas textuales porque el paquete auditado no documenta variantes o tensiones adicionales.
