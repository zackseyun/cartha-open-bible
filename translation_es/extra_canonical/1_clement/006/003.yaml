  rationale: Se ajusta «alejaron» a «separaron» para reflejar con más fuerza la ruptura conyugal implícita en el griego y en el English POB. También se sustituye la pasiva rígida «lo que fue dicho por nuestro padre Adán» por «las palabras de nuestro padre Adán», que conserva la procedencia de la cita y mejora claramente la naturalidad del español sin perder sentido.
