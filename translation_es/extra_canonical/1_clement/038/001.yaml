translation:
  language: es
  text: Por tanto, esté unido todo nuestro cuerpo en Mesías Jesús, y sométase cada uno a su prójimo, tal como fue asignado en su propio don. 2. El fuerte cuide del débil, y el débil respete al fuerte. El rico provea al pobre, y el pobre dé gracias a Dios, porque le dio a alguien por medio de quien pueda suplirse lo que le falta[a]. El sabio muestre su sabiduría no en palabras, sino en buenas obras. El humilde de mente no dé testimonio de sí mismo, sino que deje que otro dé testimonio de él. El que es puro en la carne no se jacte, sabiendo que es otro el que le suministra el dominio propio. 3. Consideremos, pues, hermanos, de qué material fuimos hechos, qué y quiénes éramos cuando entramos en el mundo, de qué tumba y oscuridad el que nos formó y creó nos introdujo en su mundo, habiendo preparado sus buenos dones[b] antes de que naciéramos. 4. Así pues, teniendo todas estas cosas de él, debemos en todo darle gracias, a quien sea la gloria por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad: “su necesidad”, en lugar de “lo que le falta”.'
    reason: lexical_alternative
  - marker: b
    text: Aquí εὐεργεσίας puede entenderse como “beneficios” o “buenos dones”; se eligió “buenos dones” porque suena más natural en español y refleja mejor la provisión benéfica de Dios preparada de antemano.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνξέσθω
  english_pob_choice: be held together
  chosen_spanish: sea mantenido unido
  alternatives_spanish:
  - sea unido
  - permanezca unido
  - sea sostenido junto
  lexicon: LSJ
  rationale: Conserva la imagen corporativa y pasiva del cuerpo, sin perder naturalidad en español. 'Mantenido unido' expresa bien la cohesión orgánica del conjunto.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - comunidad
  - asamblea
  lexicon: BDAG
  rationale: La metáfora corporal debe mantenerse literal para no aplanar el lenguaje eclesial del griego.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se preserva el valor titular de Χριστός como 'Mesías', conforme al criterio del proyecto.
- source_word: ὑποτασσέσθω
  english_pob_choice: be subject to
  chosen_spanish: sométase
  alternatives_spanish:
  - esté sujeto a
  - subdéjese a
  lexicon: BDAG
  rationale: '''Sométase'' reproduce la exhortación imperativa y mantiene la relación ordenada entre miembros sin exagerar el matiz.'
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  - fellow
  lexicon: BDAG
  rationale: '''Prójimo'' es el equivalente bíblico natural en español y conserva la fuerza ética y comunitaria del término.'
- source_word: ἐτέθη
  english_pob_choice: was appointed
  chosen_spanish: fue puesto
  alternatives_spanish:
  - fue establecido
  - fue asignado
  lexicon: BDAG
  rationale: '''Fue puesto'' mantiene la pasividad y el sentido de designación en una formulación sobria; el contexto de dones/funciones admite este giro.'
- source_word: χάρισμα
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - regalo
  - carisma
  lexicon: BDAG
  rationale: '''Don'' evita la reducción a ''regalo'' y conserva el registro eclesial del término sin forzar la transliteración técnica.'
- source_word: ἐπιμελείσθω
  english_pob_choice: take care of
  chosen_spanish: cuide de
  alternatives_spanish:
  - atienda a
  - tome cuidado de
  lexicon: BDAG
  rationale: '''Cuidar de'' expresa responsabilidad activa y es idiomático en español.'
- source_word: ἐντρεπέσθω
  english_pob_choice: respect
  chosen_spanish: respete
  alternatives_spanish:
  - tenga respeto por
  - deferencia a
  lexicon: BDAG
  rationale: El verbo pide reconocimiento reverente o consideración; 'respete' es directo y claro.
- source_word: ἐπιχορηγείτω
  english_pob_choice: supply
  chosen_spanish: provea
  alternatives_spanish:
  - suministre
  - supla generosamente
  lexicon: BDAG
  rationale: '''Provea'' comunica el acto de abastecer o facilitar lo necesario y suena natural en exhortación moral.'
- source_word: ἀναπληρωθῇ ... τὸ ὑστέρημα
  english_pob_choice: his lack may be filled up
  chosen_spanish: su falta pueda ser suplida
  alternatives_spanish:
  - su necesidad pueda ser llenada
  - lo que le falta pueda completarse
  lexicon: BDAG
  rationale: '''Suplida'' conserva la idea de llenado/provisión y evita un giro demasiado interpretativo.'
- source_word: ἐνδεικνύσθω
  english_pob_choice: show
  chosen_spanish: muestre
  alternatives_spanish:
  - demuestre
  - manifieste
  lexicon: BDAG
  rationale: '''Mostrar'' mantiene la oposición entre discurso y obras sin añadir matiz ajeno.'
- source_word: ταπεινοφρονῶν
  english_pob_choice: the humble-minded
  chosen_spanish: el humilde de mente
  alternatives_spanish:
  - el humilde
  - el de mente humilde
  lexicon: BDAG
  rationale: La forma compuesta en español reproduce mejor la disposición interior del término que un simple adjetivo social.
- source_word: μαρτυρείτω
  english_pob_choice: bear witness to
  chosen_spanish: dé testimonio de
  alternatives_spanish:
  - testifique de
  - sea testificado por
  lexicon: BDAG
  rationale: '''Dar testimonio de sí mismo'' conserva la imagen de autocomendación que el griego niega; ''dar testimonio de él'' refleja la pasiva/medio idea de recibir validación de otro.'
- source_word: ἁγνὸς ἐν τῇ σαρκί
  english_pob_choice: pure in the flesh
  chosen_spanish: puro en la carne
  alternatives_spanish:
  - casto en el cuerpo
  - sexualmente puro
  lexicon: BDAG
  rationale: Se mantiene la referencia corporal literal y la posible tensión ascética sin estrecharla innecesariamente a una sola esfera.
- source_word: ἀλαζονευέσθω
  english_pob_choice: boast
  chosen_spanish: se jacte
  alternatives_spanish:
  - se gloríe
  - sea arrogante
  lexicon: BDAG
  rationale: '''Jactarse'' preserva el tono de exhibición orgullosa mejor que una paráfrasis abstracta.'
- source_word: ἐγκράτεια
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - continencia
  lexicon: BDAG
  rationale: '''Dominio propio'' es una expresión bíblica y clara en español para la virtud de contención personal.'
- source_word: ἀναλογισώμεθα
  english_pob_choice: let us consider
  chosen_spanish: consideremos
  alternatives_spanish:
  - reflexionemos
  - razonemos
  lexicon: BDAG
  rationale: Conserva el tono exhortativo y reflexivo del pasaje.
- source_word: ἐκ ποίας ὕλης
  english_pob_choice: from what material
  chosen_spanish: de qué material
  alternatives_spanish:
  - de qué materia
  - de qué sustancia
  lexicon: LSJ
  rationale: '''Material'' reproduce la concreción creatural de ὕλη sin sonar técnico.'
- source_word: τάφου καὶ σκότους
  english_pob_choice: tomb and darkness
  chosen_spanish: tumba y oscuridad
  alternatives_spanish:
  - sepulcro y oscuridad
  - gruta y tinieblas
  lexicon: BDAG
  rationale: La imagen debe sonar sobria y fuerte; 'tumba y oscuridad' conserva el contraste retórico.
- source_word: πλάσας ... δημιουργήσας
  english_pob_choice: formed ... created
  chosen_spanish: nos formó y creó
  alternatives_spanish:
  - nos modeló y creó
  - nos plasmó y creó
  lexicon: BDAG
  rationale: La pareja verbal en español refleja la doble acción griega sin perder claridad.
- source_word: εὐεργεσίας
  english_pob_choice: good gifts
  chosen_spanish: buenos beneficios
  alternatives_spanish:
  - buenos dones
  - beneficios
  lexicon: BDAG
  rationale: '''Beneficios'' mantiene la idea de actos benéficos ya dispuestos; ''buenos dones'' habría acercado demasiado el término a χάρισμα.'
- source_word: κατὰ πάντα
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - por completo
  lexicon: BDAG
  rationale: '''En todo'' expresa la obligación integral de gratitud de forma natural en español.'
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: for the ages of ages
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por las edades de las edades
  - por los siglos eternos
  lexicon: BDAG
  rationale: Se adopta la fórmula doxológica tradicional en español por su fidelidad idiomática y solemnidad litúrgica.
theological_decisions:
- issue: Χριστῷ Ἰησοῦ como título o nombre fijo
  english_pob_reading: in Messiah Jesus
  chosen_spanish_reading: en Mesías Jesús
  alternative_spanish_readings:
  - en Cristo Jesús
  rationale: Se conserva el valor titular de Χριστός y la lectura doctrinal del proyecto para traducir títulos cuando el contexto lo permite.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: ἁγνὸς ἐν τῇ σαρκί y su posible alcance moral/bodily
  english_pob_reading: the one who is pure in the flesh
  chosen_spanish_reading: el que es puro en la carne
  alternative_spanish_readings:
  - el casto en el cuerpo
  - el sexualmente puro
  rationale: La frase griega es corporal y relativamente amplia; la traducción mantiene esa tensión en vez de resolverla a una sola esfera moral.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: ὅτι ἔδωκεν αὐτῷ, ᾧ οὐ ἀναπληρωθῇ αὐτοῦ τὸ ὑστέρημα
  english_pob_reading: because he gave him one through whom his lack may be filled up
  chosen_spanish_reading: porque le dio a uno por medio de quien su falta pueda ser suplida
  alternative_spanish_readings:
  - porque Dios le dio al rico por medio del cual se supla la necesidad del pobre
  - porque le dio los medios para llenar su falta
  rationale: La sintaxis es compacta y admite más de una orientación referencial. Se mantiene una formulación cercana al griego y suficientemente abierta para no borrar la tensión sintáctica.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se revisó el auditable inglés POB y el griego normalizado de Funk 1901. La versión publicada en español sigue de cerca la sintaxis y las distinciones léxicas relevantes (cuerpo/don/prójimo, gratitud y doxología), sin depender mecánicamente del inglés. Se mantuvo la ambigüedad donde el griego es comprimido o teológicamente denso, especialmente en la cláusula sobre el pobre y en la pureza en la carne.
  spanish_consistency_notes:
  - Se conserva 'Mesías' para Χριστός conforme al criterio del proyecto y para distinguir título de nombre fijo.
  - Se mantiene el contraste entre 'don' (χάρισμα) y 'beneficios' (εὐεργεσίας).
  - '''Prójimo'' se usa para πλησίον por ser el equivalente ético-bíblico más natural en español.'
  - La doxología final adopta la fórmula tradicional española por claridad litúrgica, aunque el griego es más literal.
