  text: Συνξέσϑω οὖν ἡμῶν ὅλον τὸ σῶμα ἐν Χριστῷ Ἰησοῦ, καὶ ὑποτασσέσϑω ἕκαστος τῷ πλησίον αὐτοῦ, καϑὼς ἐτέϑη ἐν τῷ χαρίσματι αὐτοῦ. 2. ὁ ἰσχυρὸς ἐπιμελείσϑω τὸν ἀσϑενῆ, ὁ δὲ ἀσϑενὴς ἐντρεπέσϑω τὸν ἰσχυρόν· ὁ πλούσιος ἐπιχορηγείτω τῷ πτωχῷ, ὁ δὲ πτωχὸς εὐχαριστείτω τῷ ϑεῷ, ὅτι ἔδωκεν αὐτῷ, ᾧ οὐ ἀναπληρωθῇ αὐτοῦ τὸ ὑστέρημα· ὁ σοφὸς ἐνδεικνύσθω τὴν σοφίαν αὐτοῦ μὴ ἐν λόγοις, ἀλλʼ ἐν ἔργοις ἀγαθοῖς· ὁ ταπεινοφρονῶν μὴ ἑαυτῷ μαρτυρείτω, ἀλλʼ ἔατω ὑφʼ ἑτέρου ἑαυτὸν μαρτυρεῖσθαι· ὁ ἁγνὸς ἐν τῇ σαρκὶ μὴ ἀλαζονευέσθω, γινώσκων, ὅτι ἕτερός ἐστιν ὁ ἐπιχορηγῶν αὐτῷ τὴν ἐγκράτειαν. 3. ἀναλογισώμεθα οὖν, ἀδελφοί, ἐκ ποίας ὕλης ἐγενήθημεν, ποῖοι καὶ τίνες εἰσῆλθομεν εἰς τὸν κόσμον, ἐκ ποίου τάφου καὶ σκότους ὁ πλάσας ἡμᾶς καὶ δημιουργήσας εἰσήγαγεν εἰς τὸν κόσμον αὐτοῦ, προετοιμάσας τὰς εὐεργεσίας αὐτοῦ, πρὶν ἡμᾶς γεννηθῆναι. 4. ταῦτα οὖν πάντα ἐξ αὐτοῦ ἔχοντες, ὀφείλομεν κατὰ πάντα εὐχαριστεῖν αὐτῷ· ᾧ ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
