source:
  edition: Funk 1901 (normalized OCR)
  text: ὁ ἰσχυρὸς ἐπιμελείσϑω τὸν ἀσϑενῆ, ὁ δὲ ἀσϑενὴς ἐντρεπέσϑω τὸν ἰσχυρόν· ὁ πλούσιος ἐπιχορηγείτω τῷ πτωχῷ, ὁ δὲ πτωχὸς εὐχαριστείτω τῷ ϑεῷ, ὅτι ἔδωκεν αὐτῷ, ᾧ οὐ ἀναπληρωθῇ αὐτοῦ τὸ ὑστέρημα· ὁ σοφὸς ἐνδεικνύσθω τὴν σοφίαν αὐτοῦ μὴ ἐν λόγοις, ἀλλʼ ἐν ἔργοις ἀγαθοῖς· ὁ ταπεινοφρονῶν μὴ ἑαυτῷ μαρτυρείτω, ἀλλʼ ἔατω ὑφʼ ἑτέρου ἑαυτὸν μαρτυρεῖσθαι· ὁ ἁγνὸς ἐν τῇ σαρκὶ μὴ ἀλαζονευέσθω, γινώσκων, ὅτι ἕτερός ἐστιν ὁ ἐπιχορηγῶν αὐτῷ τὴν ἐγκράτειαν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/038/002.yaml
  text: Let the strong care for the weak[a], and let the weak respect the strong. Let the rich provide for the poor, and let the poor give thanks to God, because he has given him one through whom his need may be supplied. Let the wise show his wisdom not in words, but in good works. Let the humble-minded not testify concerning himself, but let him allow himself to be testified to by another. Let the one who is pure in the flesh not boast[b], knowing that it is another who supplies him with self-control.
  footnotes:
  - marker: a
    text: Or 'but let him allow himself to be borne witness to by another'.
    reason: previous_rendering
  - marker: b
    text: Or 'supplies him self-control'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:38Z'
    unchanged: false
    changes_summary: 'Refined several phrases for lexical accuracy and natural English: changed ''take care of'' to ''care for''; ''supply the poor'' to ''provide for the poor''; clarified the δύσκολη clause as ''he has given him one through whom his need may be supplied''; and adjusted ''bear witness to himself'' to ''testify concerning himself ... be testified to by another'' to reflect the Greek more closely.'
translation:
  language: es
  text: Que el fuerte cuide[a] al débil, y que el débil respete al fuerte. Que el rico provea para el pobre, y que el pobre dé gracias a Dios, porque le ha dado a uno por medio de quien su necesidad pueda ser suplida. Que el sabio muestre su sabiduría no en palabras, sino en buenas obras. Que el humilde de mente no dé testimonio de sí mismo, sino que permita que otro dé testimonio de él. Que el que es puro en la carne no se gloríe[b], sabiendo que es otro quien le concede dominio propio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atienda»; el griego expresa cuidado diligente, no solo simpatía.
    reason: alternative_reading
  - marker: b
    text: O «no se jacte»; el verbo apunta a la autoexaltación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἰσχυρός / τὸν ἀσθενῆ
  english_pob_choice: the strong care for the weak
  chosen_spanish: el fuerte cuide al débil
  alternatives_spanish:
  - el fuerte se ocupe del débil
  - el fuerte atienda al débil
  lexicon: ἰσχυρός; ἀσθενής
  rationale: Conservo la oposición lexical fuerte/débil sin suavizarla. «Cuide de» es natural en español y mantiene la obligación práctica del griego ἐπιμελείσθω; «del débil» se expresa como «al débil» por el régimen verbal en español.
- source_word: ἐπιχορηγείτω τῷ πτωχῷ
  english_pob_choice: Let the rich provide for the poor
  chosen_spanish: que el rico provea al pobre
  alternatives_spanish:
  - que el rico provea para el pobre
  - que el rico suministre al pobre
  lexicon: πλούσιος; πτωχός; ἐπιχορηγέω
  rationale: «Provea» refleja bien el suministro material exigido por ἐπιχορηγείτω sin introducir una connotación técnica ajena. Evito «suministre» por ser más frío y menos idiomático.
- source_word: εὐχαριστείτω τῷ θεῷ
  english_pob_choice: let the poor give thanks to God
  chosen_spanish: que el pobre dé gracias a Dios
  alternatives_spanish:
  - que el pobre agradezca a Dios
  - que el pobre dé gracias al Dios
  lexicon: εὐχαριστέω; θεός
  rationale: «Dé gracias a Dios» conserva la fórmula bíblica común y el valor de acción de gracias. No se añade artículo ante «Dios» porque en español no hace falta para la referencia.
- source_word: ὅτι ἔδωκεν αὐτῷ, ᾧ οὐ ἀναπληρωθῇ αὐτοῦ τὸ ὑστέρημα
  english_pob_choice: because he has given him one through whom his need may be supplied
  chosen_spanish: porque le ha dado uno por quien su necesidad pueda ser suplida
  alternatives_spanish:
  - porque le ha dado uno mediante quien se complete su carencia
  - porque le ha dado uno por medio de quien se cubra su falta
  lexicon: ἀναπληρόω; ὑστέρημα
  rationale: 'Mantengo la ambigüedad deliberada del griego: la provisión llega «por quien»/«mediante quien», no por una paráfrasis más explicativa. «Necesidad» comunica ὑστέρημα de forma comprensible sin perder la idea de carencia.'
- source_word: ὁ σοφός ... μὴ ἐν λόγοις, ἀλλʼ ἐν ἔργοις ἀγαθοῖς
  english_pob_choice: Let the wise show his wisdom not in words, but in good works
  chosen_spanish: que el sabio muestre su sabiduría no en palabras, sino en buenas obras
  alternatives_spanish:
  - que el sabio demuestre su sabiduría no con palabras, sino con buenas obras
  - que el sabio manifieste su sabiduría no en discurso, sino en obras buenas
  lexicon: σοφός; σοφία; λόγοι; ἔργα ἀγαθά
  rationale: «Muestre su sabiduría» conserva el sentido de exhibición/verificación práctica. «Buenas obras» sigue el contraste del texto y es idiomático en español eclesial sin ser arcaico.
- source_word: ὁ ταπεινοφρονῶν ... μαρτυρείτω / μαρτυρεῖσθαι
  english_pob_choice: Let the humble-minded not testify concerning himself, but let him allow himself to be testified to by another
  chosen_spanish: que el humilde de mente no dé testimonio de sí mismo, sino que permita que otro dé testimonio de él
  alternatives_spanish:
  - que el de mente humilde no dé testimonio sobre sí mismo, sino que deje que otro dé testimonio de él
  - que el humilde no se testimonie a sí mismo, sino que permita a otro testimoniar acerca de él
  lexicon: ταπεινοφρονέω; μαρτυρέω
  rationale: 'Sigo de cerca la paralelía griega: el primer miembro es activo («dar testimonio de sí mismo») y el segundo mantiene el contraste con otro como testigo. Evito una pasiva poco natural en español y conservo la tensión entre autoevaluación y reconocimiento ajeno.'
- source_word: ὁ ἁγνὸς ἐν τῇ σαρκὶ
  english_pob_choice: the one who is pure in the flesh
  chosen_spanish: el que es puro en la carne
  alternatives_spanish:
  - el que es puro en su carne
  - el que es casto en la carne
  lexicon: ἁγνός; σάρξ
  rationale: Conservo «carne» para σάρξ, porque el texto habla de pureza en la esfera corporal/encarnada y no justifica reemplazarlo por «naturaleza humana». «Puro» mantiene la amplitud de ἁγνός sin restringirlo a pureza ritual.
- source_word: μὴ ἀλαζονευέσθω
  english_pob_choice: not boast
  chosen_spanish: no se gloríe
  alternatives_spanish:
  - no se jacte
  - no sea arrogante
  lexicon: ἀλαζονεύομαι
  rationale: «No se gloríe» comunica mejor la autoexaltación del verbo que «jactarse» en este contexto moral. Evito «arrogante» porque describe actitud más que el acto verbal/gestual del texto.
- source_word: ὅτι ἕτερός ἐστιν ὁ ἐπιχορηγῶν αὐτῷ τὴν ἐγκράτειαν
  english_pob_choice: knowing that it is another who supplies him with self-control
  chosen_spanish: sabiendo que es otro quien le concede dominio propio
  alternatives_spanish:
  - sabiendo que es otro quien le suministra dominio propio
  - sabiendo que es otro quien le otorga autocontrol
  lexicon: ἐγκράτεια; ἐπιχορηγέω; ἕτερος
  rationale: «Dominio propio» es el equivalente bíblico y eclesial más natural para ἐγκράτεια. «Concede» preserva la idea de provisión activa sin forzar el español con «suministra»; «otro» mantiene la alteridad explícita del griego.
theological_decisions:
- issue: Forma de apelación y exhortación comunitaria
  english_pob_reading: The sentence is a series of moral exhortations addressed to members of the community.
  chosen_spanish_reading: 'La serie se traduce como exhortaciones directas en subjuntivo exhortativo: «que...», manteniendo el carácter comunitario y parenético.'
  alternative_spanish_readings:
  - imperativos directos en segunda persona plural
  - infinitivos exhortativos
  rationale: El griego usa formas exhortativas generales; en español, el subjuntivo con «que» transmite la exhortación sin añadir un sujeto específico inexistente en el original. Esto preserva el tono comunitario de la instrucción.
  doctrine_reference: Ética cristiana comunitaria; parénesis apostólica.
- issue: Identidad y alcance de «uno por quien su necesidad pueda ser suplida»
  english_pob_reading: The poor should thank God because he has given him one through whom his need may be supplied.
  chosen_spanish_reading: «uno por quien su necesidad pueda ser suplida» conserva la referencia indefinida sin convertirla en una explicación concreta no presente en el texto.
  alternative_spanish_readings:
  - «un benefactor»
  - «una persona que lo ayude»
  rationale: El griego no identifica la relación exacta más allá de la mediación de otro. La traducción evita especificar «benefactor» o equivalentes que estrecharían el sentido y borrarían la ambigüedad preservada por la POB inglesa.
  doctrine_reference: Providencia de Dios y mediaciones humanas en la ayuda al necesitado.
- issue: «Puro en la carne» y la pureza corporal
  english_pob_reading: The one who is pure in the flesh should not boast, because another supplies self-control.
  chosen_spanish_reading: Mantener «carne» evita diluir la concreción corporal del texto y no convierte la frase en un comentario moral abstracto.
  alternative_spanish_readings:
  - «casto»
  - «puro de conducta»
  rationale: El texto vincula pureza y ἐγκράτεια con la esfera de la carne; traducirlo con «casto» o «puro de conducta» reduciría el campo semántico. «Carne» conserva la tensión antropológica sin resolverla de antemano.
  doctrine_reference: Antropología bíblica; disciplina del cuerpo; santidad práctica.
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión inglesa más reciente, que afinó varias expresiones por naturalidad y precisión («care for», «provide for», «through whom his need may be supplied», y la construcción sobre el testimonio). La versión española sigue esas correcciones, pero no copia la redacción inglesa: vuelve al griego para conservar el paralelismo entre testimonio propio y ajeno, y mantiene la ambigüedad de ὑστέρημα/ἀναπληρωθῇ sin sobreexplicarla.'
  spanish_consistency_notes:
  - Usé «Dios» y no «el Dios» salvo donde el español exigiría aclaración; aquí no la exige.
  - Mantuve «carne» para σάρξ por consistencia con la terminología antropológica del proyecto.
  - Preferí «dominio propio» para ἐγκράτεια, en línea con el uso bíblico estable en español.
  - Conservé la alternancia fuerte/débil y rico/pobre como pares léxicos simétricos.
  - Las notas al pie solo señalan alternativas reales del griego o del español, no paráfrasis interpretativas.
