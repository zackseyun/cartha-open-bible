revisions:
- from: Que el fuerte cuide al débil[a], y que el débil respete al fuerte. Que el rico provea al pobre, y que el pobre dé gracias a Dios, porque le ha dado uno por quien su necesidad pueda ser suplida. Que el sabio muestre su sabiduría no en palabras, sino en buenas obras. Que el humilde de mente no dé testimonio de sí mismo, sino que permita que otro dé testimonio de él. Que el que es puro en la carne no se gloríe[b], sabiendo que es otro quien le concede dominio propio.
  to: Que el fuerte cuide[a] al débil, y que el débil respete al fuerte. Que el rico provea para el pobre, y que el pobre dé gracias a Dios, porque le ha dado a uno por medio de quien su necesidad pueda ser suplida. Que el sabio muestre su sabiduría no en palabras, sino en buenas obras. Que el humilde de mente no dé testimonio de sí mismo, sino que permita que otro dé testimonio de él. Que el que es puro en la carne no se gloríe[b], sabiendo que es otro quien le concede dominio propio.
  rationale: Se corrige el anclaje de la nota [a] para que caiga sobre el verbo correspondiente. Se mejora la naturalidad de la cláusula de provisión con «por medio de quien», que conserva la mediación del griego sin sonar calcada. También se ajusta «provea al pobre» a «provea para el pobre», más idiomático en español amplio. No se requieren cambios doctrinales ni una relectura compleja del texto fuente.
