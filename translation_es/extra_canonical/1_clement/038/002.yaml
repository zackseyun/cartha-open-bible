review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca la estructura exhortativa y la mayoría de las correspondencias léxicas del griego: fuerte/débil, rico/pobre, sabio/sabiduría, testimonio, pureza en la carne y dominio propio. También preserva bien la referencia indefinida en «uno por quien...». Sin embargo, «provea al pobre» es menos idiomático que «provea para el pobre» o mejor «provea para el pobre / provea al pobre de lo necesario», y sobre todo «le ha dado uno por quien» suena poco natural en español para el sentido instrumental/mediador del relativo ᾧ. Además, la nota [a] está mal anclada: el texto marca «débil[a]», pero la nota comenta una alternativa para ἐπιμελείσθω («cuide/atienda»), que corresponde al verbo, no a «débil».'
  spanish_quality_summary: 'El español es generalmente claro, digno y legible. No obstante, hay dos puntos de mejora de naturalidad: «porque le ha dado uno por quien su necesidad pueda ser suplida» suena calcado; «por medio de quien» expresa mejor la mediación. También «se gloríe» funciona, pero «se jacte» es más natural en español actual para ἀλαζονεύομαι; aquí, sin embargo, la elección principal aún es defendible y puede mantenerse como texto con nota alternativa. La sintaxis general es buena.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «carne» y «dominio propio» están bien alineados. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión de conservar «carne» para σάρξ y «dominio propio» para ἐγκράτεια es adecuada.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota [a] explica una alternativa para el verbo ἐπιμελείσθω («cuide/atienda»), pero el marcador está colocado en «débil», lo que desinforma al lector sobre qué palabra se está anotando.
  - severity: medium
    issue: «uno por quien» suena poco natural en español
    rationale: Aunque formalmente posible, «por quien» con antecedente indefinido personal aquí resulta rígido y ambiguo en español. «Por medio de quien» conserva la mediación del griego y mejora la legibilidad sin añadir interpretación.
  - severity: low
    issue: «provea al pobre» es algo forzado
    rationale: En español general, «proveer» suele construirse como «proveer para» o «proveer de». «Provea para el pobre» o una reformulación equivalente sería más idiomática; sin embargo, el sentido es entendible.
  revised_spanish_text: Que el fuerte cuide[a] al débil, y que el débil respete al fuerte. Que el rico provea para el pobre, y que el pobre dé gracias a Dios, porque le ha dado a uno por medio de quien su necesidad pueda ser suplida. Que el sabio muestre su sabiduría no en palabras, sino en buenas obras. Que el humilde de mente no dé testimonio de sí mismo, sino que permita que otro dé testimonio de él. Que el que es puro en la carne no se gloríe[b], sabiendo que es otro quien le concede dominio propio.
  revised_footnotes:
