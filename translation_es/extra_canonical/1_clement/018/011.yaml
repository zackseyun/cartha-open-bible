translation:
  language: es
  text: 'No me eches fuera de tu presencia,

    y no retires de mí tu Espíritu Santo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴ ἀπορίψῃς με ἀπὸ τοῦ προσώπου σου
  english_pob_choice: Do not cast me away from your presence
  chosen_spanish: No me eches fuera de tu presencia
  alternatives_spanish:
  - No me arrojes lejos de tu presencia
  - No me apartes de tu presencia
  lexicon: ἀπορίπτω
  rationale: ‘Echar fuera’ comunica con claridad la idea de expulsión/rechazo sin endurecer innecesariamente el castellano. ‘Arrojar lejos’ es posible, pero suena más literal y menos natural; ‘apartar’ debilita la imagen de expulsión.
- source_word: τὸ πνεῦμα τὸ ἅγιόν σου
  english_pob_choice: your Holy Spirit
  chosen_spanish: tu Espíritu Santo
  alternatives_spanish:
  - tu santo Espíritu
  - tu Espíritu santo
  lexicon: πνεῦμα ἅγιον
  rationale: Se conserva la mayúscula en ‘Espíritu’ por tratarse del Espíritu Santo, conforme al uso reverente y a la referencia teológica del texto. ‘Tu santo Espíritu’ es posible, pero menos idiomático en español bíblico actual.
- source_word: μὴ ἀντανέλῃς ἀπʼ ἐμοῦ
  english_pob_choice: do not take your Holy Spirit from me
  chosen_spanish: no retires de mí
  alternatives_spanish:
  - no quites de mí
  - no apartes de mí
  - no me alejes de
  lexicon: ἀνταναιρέω
  rationale: ‘Retirar’ expresa bien la acción de quitar o remover sin introducir la idea de ‘devolver’ o ‘tomar de vuelta’, que la revisión inglesa explícitamente descartó. ‘Quitar’ o ‘apartar’ también son válidas, pero ‘retirar’ mantiene dignidad y precisión.
theological_decisions:
- issue: Referencia al Espíritu Santo en una cita/eco veterotestamentario retomada en 1 Clemente
  english_pob_reading: your Holy Spirit
  chosen_spanish_reading: tu Espíritu Santo
  alternative_spanish_readings:
  - tu santo Espíritu
  - tu Espíritu
  rationale: El texto mantiene la formulación explícita ‘Espíritu Santo’ porque la tradición del pasaje y la redacción griega lo sostienen; no se suaviza a un mero ‘espíritu’, ya que eso perdería la carga pneumatológica.
  doctrine_reference: Pneumatología bíblica; continuidad entre la oración de David y la recepción cristiana del texto en 1 Clemente
- issue: Relación entre expulsión y remoción en el paralelismo
  english_pob_reading: Do not cast me away ... and do not take your Holy Spirit from me
  chosen_spanish_reading: No me eches fuera ... y no retires de mí tu Espíritu Santo
  alternative_spanish_readings:
  - No me rechaces ... y no quites de mí tu Espíritu Santo
  - No me apartes ... y no alejes de mí tu Espíritu Santo
  rationale: 'Se preserva el paralelismo con dos verbos distintos: uno de expulsión (‘eches fuera’) y otro de remoción (‘retires’). Esto refleja mejor la tensión lexical del griego que una sola familia verbal.'
  doctrine_reference: Salmo 51:11 / tradición citada en 1 Clemente; paralelismo poético y respeto al matiz verbal
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó ‘back’ de ‘take back’ para ajustarse al griego, que dice remover/quitar y no ‘tomar de vuelta’. La versión española adopta desde el inicio un verbo de remoción (‘retires’) sin sugerir restitución o reversión.
  spanish_consistency_notes:
  - Se usa ‘Espíritu Santo’ con mayúscula en sentido personal y reverente.
  - Se evita ‘SEÑOR’ o perífrasis de sustitución porque el texto aquí no contiene el Tetragrámaton explícito, sino una cita/eco que habla de ‘tu’ presencia y ‘tu’ Espíritu.
  - ‘No me eches fuera’ y ‘no retires de mí’ preservan dos imágenes distintas del original griego.
