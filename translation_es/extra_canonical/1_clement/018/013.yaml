base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/018/013.yaml
  text: 'I will teach the lawless your ways,

    and the ungodly will turn to you.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:00Z'
    unchanged: false
    changes_summary: Changed 'turn back to you' to 'turn to you' for closer alignment with ἐπιστρέψουσιν ἐπὶ σέ, which does not explicitly include 'back.'
translation:
  language: es
  text: Yo enseñaré a los [a] inicuos tus caminos, y los impíos se volverán a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin ley».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνόμους
  english_pob_choice: lawless
  chosen_spanish: inicuos
  alternatives_spanish:
  - sin ley
  - impíos
  - desobedientes
  lexicon: BDAG ἄνομος; Louw-Nida 88.289
  rationale: ἀνόμους describe a quienes carecen de ley o viven al margen de ella. En español, «inicuos» comunica bien esa cualidad moral y mantiene un registro bíblico sin reducirlo solo a una ausencia jurídica. «Sin ley» sería demasiado literal y áspero; «impíos» se reserva aquí para ἀσεβεῖς.
- source_word: τὰς ὁδούς σου
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tus sendas
  - tus caminos de vida
  lexicon: BDAG ὁδός; Louw-Nida 15.18
  rationale: La expresión es idiomática y en español «caminos» es la correspondencia natural y fiel. Mantiene la imagen de conducta o modo de proceder sin añadir explicaciones.
- source_word: ἀσεβεῖς
  english_pob_choice: ungodly
  chosen_spanish: impíos
  alternatives_spanish:
  - sin Dios
  - irreverentes
  - malvados
  lexicon: BDAG ἀσεβής; Louw-Nida 88.88
  rationale: «Impíos» reproduce bien la falta de reverencia o piedad implicada por ἀσεβεῖς y conserva la simetría bíblica con «inicuos». «Sin Dios» sería más interpretativo; «irreverentes» suena más técnico y menos natural.
- source_word: ἐπιστρέψουσιν ἐπὶ σέ
  english_pob_choice: will turn to you
  chosen_spanish: se volverán a ti
  alternatives_spanish:
  - volverán a ti
  - se convertirán a ti
  - regresarán a ti
  lexicon: BDAG ἐπιστρέφω; Louw-Nida 15.45
  rationale: La revisión inglesa eliminó «back» para no añadir explícitamente un matiz que no está en el griego. En español, «se volverán a ti» conserva el movimiento de orientación hacia Dios y puede sugerir tanto retorno como conversión sin sobrecargar el texto. «Volverán a ti» es posible, pero «se volverán a ti» refleja mejor el valor medio del verbo.
theological_decisions:
- issue: Relación entre ἀσεβεῖς / ἐπιστρέψουσιν y la idea de conversión
  english_pob_reading: the ungodly will turn to you
  chosen_spanish_reading: los impíos se volverán a ti
  alternative_spanish_readings:
  - los impíos volverán a ti
  - los impíos se convertirán a ti
  rationale: 'El griego permite una orientación moral y religiosa hacia Dios sin explicitar plenamente el proceso de conversión. «Se volverán a ti» mantiene esa apertura: puede leerse como retorno, giro o conversión, sin imponer una formulación doctrinal más fuerte de lo que el texto dice.'
  doctrine_reference: Conversión/arrepentimiento en lenguaje bíblico; cf. uso amplio de ἐπιστρέφω
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «turn back to you» por «turn to you» para ajustarse mejor a ἐπιστρέψουσιν ἐπὶ σέ, que no expresa explícitamente «de vuelta». La versión española sigue esa misma decisión al evitar un «de regreso» o «otra vez».
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparece el nombre divino en el texto fuente; aquí no aparece ningún sustituto del nombre divino.
  - «Impíos» se usa para ἀσεβεῖς y «inicuos» para ἀνόμους, manteniendo distinción semántica.
  - Se evita «convertirán» para no forzar un tecnicismo soteriológico que el griego no explicita.
