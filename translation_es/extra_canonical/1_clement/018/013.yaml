review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido básico del griego: διδάξω = «enseñaré», τὰς ὁδούς σου = «tus caminos», ἀσεβεῖς = «impíos», ἐπιστρέψουσιν ἐπὶ σέ = «se volverán a ti». Sin embargo, ἀνόμους se alinea mejor con «sin ley» o «transgresores» que con «inicuos», porque el término griego conserva un matiz más específico de estar fuera de la ley o actuar contra ella; «inicuos» desplaza el énfasis hacia maldad general.'
  spanish_quality_summary: El español es claro y legible, pero la construcción «a los inicuos» suena algo más pesada y menos precisa que una opción más directa. El resto del versículo fluye naturalmente y mantiene un registro bíblico digno. La nota actual ayuda, pero la alternativa debería subir al texto principal para reflejar mejor el matiz léxico del original.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La decisión clave es léxica: para ἀνόμους, «sin ley» refleja mejor la evidencia fuente y el English POB («lawless») que «inicuos». «Impíos» para ἀσεβεῖς y «se volverán a ti» para ἐπιστρέψουσιν ἐπὶ σέ están bien alineados con el expediente auditado.'
  issues:
  - severity: medium
    issue: «inicuos» para ἀνόμους debilita el matiz de «lawless»
    rationale: ἀνόμους no solo describe maldad general, sino condición o conducta contraria a la ley. Dado que el English POB fijó «lawless», el español principal debería conservar ese eje semántico con mayor precisión.
  revised_spanish_text: Yo enseñaré a los sin ley tus caminos, y los impíos se volverán a ti.
  revision_rationale: Se reemplaza «inicuos» por «sin ley» para reflejar con mayor fidelidad ἀνόμους y la decisión inglesa «lawless». Se mantiene «impíos» para ἀσεβεῖς y «se volverán a ti» para ἐπιστρέψουσιν ἐπὶ σέ, que ya estaban bien resueltos. No hace falta nota, porque la redacción revisada elimina la principal tensión léxica en lugar de relegarla a alternativa.
