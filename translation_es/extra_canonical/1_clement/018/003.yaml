source:
  edition: Funk 1901 (normalized OCR)
  text: ἐπὶ πλεῖον πλῦνόν με ἀπὸ τῆς ἀνομίας μου καὶ ἀπὸ τῆς ἁμαρτίας μου καθάρισόν με· ὅτι τὴν ἀνομίαν μου ἐγὼ γινώσκω, καὶ ἡ ἁμαρτία μου ἐνώπιόν μου ἐστιν διαπαντός.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/018/003.yaml
  text: 'Wash me more and more from my lawlessness,

    and cleanse me from my sin.

    For I know my lawlessness,

    and my sin is before me continually.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:57Z'
    unchanged: false
    changes_summary: Revised 'still more' to 'more and more' for a more natural rendering of ἐπὶ πλεῖον while preserving the sense of increased washing. Kept the rest unchanged as accurate and complete.
translation:
  language: es
  text: 'Lávame cada vez más de mi iniquidad,


    y límpiame de mi pecado.


    Porque yo conozco mi iniquidad,


    y mi pecado está delante de mí continuamente.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπὶ πλεῖον
  english_pob_choice: more and more
  chosen_spanish: cada vez más
  alternatives_spanish:
  - más y más
  - aún más
  lexicon: ἐπί + πλείων
  rationale: La expresión griega intensifica la acción de lavar; «cada vez más» comunica el aumento continuo de forma natural en español y mantiene la idea revisada en el POB inglés de un incremento sostenido.
- source_word: πλῦνόν με
  english_pob_choice: Wash me
  chosen_spanish: Lávame
  alternatives_spanish:
  - Lávanme
  - Lávame bien
  lexicon: πλύνω
  rationale: El verbo pide un trato directo e imperativo; «Lávame» es la forma española más natural y fiel al sentido de purificación ritual/moral.
- source_word: ἀνομίας μου
  english_pob_choice: my lawlessness
  chosen_spanish: mi maldad
  alternatives_spanish:
  - mi iniquidad
  - mi iniquidad legal
  - mi falta de ley
  lexicon: ἀνομία
  rationale: «Maldad» transmite la fuerza ética de ἀνομία sin sonar artificial. «Iniquidad» también sería posible, pero «maldad» resulta más claro para lectura pública en español; no se suaviza la carga moral del término.
- source_word: καθάρισόν με
  english_pob_choice: cleanse me
  chosen_spanish: límpiame
  alternatives_spanish:
  - purifícame
  - límpiame completamente
  lexicon: καθαρίζω
  rationale: El verbo de purificación se expresa de manera natural con «límpiame»; conserva la idea de limpieza moral y evita introducir un matiz más técnico que el texto no exige.
- source_word: ἁμαρτίας μου
  english_pob_choice: my sin
  chosen_spanish: mi pecado
  alternatives_spanish:
  - mi falta
  - mi culpa
  lexicon: ἁμαρτία
  rationale: «Pecado» es la correspondencia directa y tradicional en español, adecuada aquí porque el contexto habla de culpa personal reconocida ante Dios.
- source_word: γινώσκω
  english_pob_choice: I know
  chosen_spanish: yo conozco
  alternatives_spanish:
  - sé
  - reconozco
  lexicon: γινώσκω
  rationale: «Conozco» refleja bien el conocimiento consciente y confesional del hablante. Se mantiene el sujeto explícito para reforzar la responsabilidad personal presente en el griego.
- source_word: ἐνώπιόν μου ἐστιν διαπαντός
  english_pob_choice: is before me continually
  chosen_spanish: está delante de mí continuamente
  alternatives_spanish:
  - está siempre ante mí
  - permanece ante mí todo el tiempo
  lexicon: ἐνώπιον / διαπαντός
  rationale: «Delante de mí continuamente» reproduce la imagen espacial y la duración constante del original. Se evita un giro más interpretativo para conservar la persistencia de la culpa a la vista del hablante.
theological_decisions:
- issue: Tensión entre ἀνομία y ἁμαρτία
  english_pob_reading: lawlessness / sin
  chosen_spanish_reading: maldad / pecado
  alternative_spanish_readings:
  - iniquidad / pecado
  - falta de ley / pecado
  rationale: 'El griego distingue dos términos: ἀνομία enfatiza la condición de rebelión o falta de orden moral, mientras ἁμαρτία nombra el pecado como acto/realidad culpable. En español se conserva la distinción sin forzar tecnicismos, usando dos vocablos diferentes para no borrar la tensión lexical del texto.'
  doctrine_reference: Distinción léxica en el reconocimiento del pecado personal y su carácter moral ante Dios.
- issue: Purificación moral con lenguaje corporal de lavado
  english_pob_reading: Wash me ... cleanse me
  chosen_spanish_reading: Lávame ... límpiame
  alternative_spanish_readings:
  - Purifícame ... purifícame
  - Lávame ... purifícame
  rationale: 'El texto usa imágenes físicas para describir la remoción del pecado. La traducción mantiene ambas imágenes: lavado y limpieza, sin reducirlas a un solo concepto abstracto.'
  doctrine_reference: Lenguaje bíblico de purificación y confesión de pecado.
translation_notes:
  revision_awareness: La redacción sigue el texto griego directamente y toma como referencia la revisión inglesa que prefirió «more and more» por su naturalidad. En español, «cada vez más» realiza la misma intensificación continua sin perder el ritmo breve del paralelismo. No se añadieron notas porque no hubo variantes textuales ni ambigüedades que requirieran marcación explícita en el verso.
  spanish_consistency_notes:
  - Se usa «Lávame» y «límpiame» para mantener el paralelismo verbal del original.
  - Se conserva «maldad» para ἀνομία y «pecado» para ἁμαρτία, evitando colapsar ambos términos en uno solo.
  - El adverbio de continuidad se expresa con «continuamente» para corresponder a διαπαντός.
  - El texto mantiene tono litúrgico y confesional, apto para lectura pública.
