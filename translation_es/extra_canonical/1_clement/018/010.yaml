base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/018/010.yaml
  text: 'Create in me a clean heart, O God,

    and renew a right spirit within me.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:59Z'
    unchanged: false
    changes_summary: Replaced 'in my inward parts' with 'within me' for more natural English and to reflect the idiomatic sense of the Greek while preserving the formal tone.
translation:
  language: es
  text: 'Crea en mí un corazón limpio, oh Dios,

    y renueva un espíritu recto dentro de mí.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καρδίαν καθαρὰν
  english_pob_choice: clean heart
  chosen_spanish: corazón limpio
  alternatives_spanish:
  - corazón puro
  - corazón limpio y puro
  lexicon: καρδία
  rationale: «Corazón» es la equivalencia directa de καρδία. «Limpio» conserva la idea moral y cultual de καθαρὰν sin agregar una interpretación más fuerte que el griego; «puro» sería posible, pero «limpio» mantiene mejor el paralelo con la petición de renovación.
- source_word: κτίσον
  english_pob_choice: Create
  chosen_spanish: Crea
  alternatives_spanish:
  - Créame
  - Crea en mí
  lexicon: κτίζω
  rationale: El imperativo de κτίσον pide una acción creadora. «Crea» refleja con precisión el verbo y mantiene la fuerza del ruego. Se conserva la construcción «en mí» para seguir el griego ἐν ἐμοί.
- source_word: πνεῦμα εὐθὲς
  english_pob_choice: a right spirit
  chosen_spanish: un espíritu recto
  alternatives_spanish:
  - un espíritu justo
  - un espíritu firme
  lexicon: πνεῦμα
  rationale: «Espíritu» traduce πνεῦμα según el contexto interior del verso. «Recto» expresa εὐθὲς con la idea de rectitud o integridad moral; «justo» y «firme» son posibles, pero menos precisos aquí.
- source_word: ἐγκαίνισον
  english_pob_choice: renew
  chosen_spanish: renueva
  alternatives_spanish:
  - restaura
  - haz nuevo
  lexicon: ἐγκαινίζω
  rationale: «Renueva» sigue el valor de hacer nuevo o renovar que la tradición inglesa POB ya fijó. «Restaura» desplaza el sentido hacia reparación, mientras que «haz nuevo» suena menos natural en español.
- source_word: ἐν τοῖς ἐγκάτοις μου
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mis entrañas
  - en lo íntimo de mí
  lexicon: ἐγκάτα
  rationale: El griego literalmente alude a las partes internas/entrañas. Dado que el inglés POB revisó de «in my inward parts» a «within me», «dentro de mí» conserva la naturalidad idiomática y el sentido interior sin perder la imagen de interioridad.
theological_decisions:
- issue: Interioridad moral y cultual del cambio pedido
  english_pob_reading: Create in me a clean heart ... and renew a right spirit within me.
  chosen_spanish_reading: Crea en mí un corazón limpio ... y renueva un espíritu recto dentro de mí.
  alternative_spanish_readings:
  - Crea en mí un corazón puro ...
  - '... y renueva un espíritu justo dentro de mí.'
  rationale: El verso pide una transformación interna, no solo conducta externa. La traducción mantiene la tensión entre la metáfora del «corazón» y el interior corporal/espiritual sugerido por ἐν τοῖς ἐγκάτοις μου, sin explicitar más de lo que el texto dice.
  doctrine_reference: Salmo 51:10; lenguaje de renovación interior en la piedad bíblica
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «in my inward parts» a «within me» para sonar más natural sin perder el valor idiomático del griego. La versión española sigue esa decisión con «dentro de mí», evitando una calca demasiado anatómica y manteniendo la referencia al interior personal.
  spanish_consistency_notes:
  - Se usó «Dios» para ὁ θεός, conforme al estándar del proyecto.
  - Se mantuvo el tono orante e imperativo en segunda persona singular.
  - No se introdujo «Señor» ni otra sustitución para el nombre divino, porque el texto griego dice explícitamente ὁ θεός.
  - «Corazón» y «espíritu» se conservaron como imágenes antropológicas distintas, sin fusionarlas.
