    issue: «no te agradarás en holocaustos» es una traducción inadecuada de εὐδοκήσεις
    rationale: εὐδοκέω aquí expresa complacencia/deleite, no un reflexivo como «agradarse». La forma propuesta no es español natural y distorsiona ligeramente el sentido.
  - severity: low
