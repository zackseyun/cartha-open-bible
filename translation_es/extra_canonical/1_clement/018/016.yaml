translation:
  language: es
  text: 'Porque si hubieras deseado sacrificio, lo habría dado;

    en holocaustos[a] no te deleitarás.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Holocaustos» traduce el griego ὁλοκαυτώματα, sacrificios totalmente quemados; en español moderno la palabra puede evocar otros usos históricos posteriores, pero aquí conserva su sentido bíblico literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: θυσίαν
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  - víctima sacrificial
  lexicon: θυσία
  rationale: La forma griega pide un término general para acto/ofrenda sacrificial. «Sacrificio» conserva el valor culto general que la POB inglesa mantiene con «sacrifice» sin volverlo más específico de lo que el texto dice.
- source_word: ὁλοκαυτώματα
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas totalmente quemadas
  - holocausto[s]
  lexicon: ὁλοκαύτωμα
  rationale: El término griego designa sacrificios íntegramente quemados. «Holocaustos» es el equivalente tradicional y semánticamente preciso en español bíblico; se evita una explicación más larga en el texto principal, aunque se reconoce la posible ambigüedad moderna del término.
- source_word: εὐδοκήσεις
  english_pob_choice: you will not delight
  chosen_spanish: te agradarás
  alternatives_spanish:
  - te deleitarás
  - hallarás placer
  lexicon: εὐδοκέω
  rationale: El verbo expresa deleite o complacencia. «Agradarás» mantiene la idea de complacencia/diversión de gusto; se usa en forma media/reflexiva para seguir de cerca la construcción sin imponer una paráfrasis doctrinal.
theological_decisions:
- issue: Relación entre sacrificio exterior y voluntad divina
  english_pob_reading: If God had desired sacrifice, it would have been given; but he does not delight in whole burnt offerings.
  chosen_spanish_reading: Si hubieras deseado sacrificio, lo habría dado; no te agradarás en holocaustos.
  alternative_spanish_readings:
  - Si hubieras querido sacrificio, lo habría dado; en holocaustos no te deleitarás.
  - Si hubieras deseado sacrificio, lo habría ofrecido; en holocaustos no te complaces.
  rationale: 'La línea mantiene la tensión del original: el hablante reconoce la posibilidad hipotética de ofrecer sacrificio, pero afirma la falta de deleite divino en los holocaustos. No se suaviza la afirmación ni se la convierte en una generalización moral distinta.'
  doctrine_reference: Salmo 40:6-8; Hebreos 10:5-8 (eco temático sobre sacrificio y obediencia)
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto griego suministrado y con la POB inglesa; no hay revisiones aplicadas ni variantes textuales relevantes en el expediente auditado.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo sintáctico del griego y del inglés POB: condición hipotética seguida de segunda línea negativa.'
  - Se conserva el tono litúrgico y bíblico sin recurrir a «Señor» o a formulaciones interpretativas no presentes en el fuente.
  - La traducción usa «sacrificio» y «holocaustos» como términos cultuales técnicos, coherentes con el valor del original.
