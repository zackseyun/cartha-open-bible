source:
  edition: Funk 1901 (normalized OCR)
  text: ἀλλὰ καὶ αὐτὸς λέγει πρὸς τὸν θεόν· Ἐλέησόν με, ὁ θεός, κατὰ τὸ μέγα ἔλεός σου, καὶ κατὰ τὸ πλῆθος τῶν οἰκτιρμῶν σου ἐξάλειψον τὸ ἀνόμημά μου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/018/002.yaml
  text: 'But he himself also says to God:


    Have mercy on me[a], O God, according to your great mercy,

    and according to the abundance of your compassions blot out my lawlessness.'
  footnotes:
  - marker: a
    text: Or 'But he too says to God:\n\n“Have mercy'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:57Z'
    unchanged: false
    changes_summary: Changed 'my lawless deed' to 'my lawlessness' for closer lexical accuracy to the singular abstract noun ἀνόμημα. Kept the rest unchanged.
translation:
  language: es
  text: 'Pero él mismo también le dice a Dios:


    Ten piedad de mí[a], oh Dios, conforme a tu gran misericordia,

    y conforme a la abundancia de tus compasiones borra mi iniquidad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero él también le dice a Dios: Ten piedad...».'
    reason: Preserva la alternativa documentada en el rastro de auditoría inglés para el arranque sin el énfasis pleno de «él mismo».
lexical_decisions:
- source_word: καὶ αὐτός
  english_pob_choice: But he himself also
  chosen_spanish: Pero él mismo también
  alternatives_spanish:
  - Pero él también
  - Y él mismo también
  lexicon: καὶ, αὐτός
  rationale: Conservo tanto la suma de καὶ como el énfasis de αὐτός. En español, «él mismo también» refleja mejor la reciprocidad destacada en la revisión inglesa que el simple «él también».
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - ante Dios
  - para con Dios
  lexicon: πρός + acusativo
  rationale: El movimiento relacional de πρὸς τὸν θεόν se expresa de forma natural y fiel con «a Dios» en este contexto de habla directa.
- source_word: Ἐλέησόν με
  english_pob_choice: Have mercy on me
  chosen_spanish: Ten misericordia de mí
  alternatives_spanish:
  - Apiádate de mí
  - Muéstrate misericordioso conmigo
  lexicon: ἐλεέω
  rationale: «Ten misericordia de mí» es la equivalencia más estable y digna en español bíblico, y preserva el ruego directo del imperativo.
- source_word: τὸ μέγα ἔλεός σου
  english_pob_choice: your great mercy
  chosen_spanish: tu gran misericordia
  alternatives_spanish:
  - tu inmensa misericordia
  - tu gran piedad
  lexicon: ἔλεος
  rationale: «Misericordia» mantiene la correspondencia básica con ἔλεος; «gran» reproduce μέγα sin intensificar más de lo que el griego permite.
- source_word: τὸ πλῆθος τῶν οἰκτιρμῶν σου
  english_pob_choice: the abundance of your compassions
  chosen_spanish: la abundancia de tus compasiones
  alternatives_spanish:
  - la multitud de tus compasiones
  - la abundancia de tus misericordias
  lexicon: πλῆθος, οἰκτιρμοί
  rationale: «Abundancia» conserva πλῆθος y «compasiones» refleja οἰκτιρμοί sin sustituirlo por un término más abstracto. La pluralidad se mantiene en español.
- source_word: ἐξάλειψον
  english_pob_choice: blot out
  chosen_spanish: borra
  alternatives_spanish:
  - desvanece
  - borra por completo
  lexicon: ἐξαλείφω
  rationale: «Borra» comunica el acto de eliminar o cancelar con suficiente fuerza, sin sobreexplicar. En este contexto de perdón, la imagen se entiende de manera natural.
- source_word: τὸ ἀνόμημά μου
  english_pob_choice: my lawlessness
  chosen_spanish: mi iniquidad
  alternatives_spanish:
  - mi impiedad
  - mi falta de ley
  lexicon: ἀνόμημα
  rationale: Aunque el inglés revisado preserva «lawlessness», en español «iniquidad» transmite bien la cualidad de violación moral/contra la ley divina sin sonar artificial. Se evita «acto sin ley» por ser poco idiomático; «iniquidad» mantiene la carga ética y bíblica del término abstracto singular.
theological_decisions:
- issue: Énfasis de αὐτός en la reciprocidad entre Dios y el orante
  english_pob_reading: But he himself also says to God
  chosen_spanish_reading: Pero él mismo también dice a Dios
  alternative_spanish_readings:
  - Pero él también dice a Dios
  - Pero también él dice a Dios
  rationale: 'La revisión inglesa subraya que αὐτός intensifica el contraste: Dios habló a David y David, por su parte, habla a Dios. «Él mismo también» conserva ese eco enfático sin volverlo artificial.'
  doctrine_reference: Retórica bíblica de contraste y reciprocidad en la oración
- issue: ἀνόμημα como abstracción singular de culpa/iniquidad
  english_pob_reading: my lawlessness
  chosen_spanish_reading: mi iniquidad
  alternative_spanish_readings:
  - mi falta de ley
  - mi maldad
  rationale: El griego usa un sustantivo abstracto singular, no un simple acto concreto. «Iniquidad» preserva esa abstracción y su peso moral; evita reducirlo a un solo hecho puntual.
  doctrine_reference: Lenguaje bíblico de pecado e iniquidad
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente del inglés: se mantuvo el valor enfático de καὶ αὐτός con «él mismo también» y se conservó la actualización de ἀνόμημα como una abstracción singular, no como un simple «acto ilegal». La puntuación y el formato se ajustan a una cita en bloque sin comillas iniciales, conforme al audit trail más reciente.'
  spanish_consistency_notes:
  - Se usó «Dios» para θεόν por tratarse del destinatario directo de la oración.
  - Se eligió «misericordia/compasiones» para mantener la distinción entre ἔλεος y οἰκτιρμοί.
  - «Iniquidad» preserva el registro bíblico y la abstracción del singular griego.
  - El tono es reverente y contemporáneo, sin depender de fórmulas eclesiásticas opacas.
