    text: 'O: «Pero él también le dice a Dios: Ten piedad...».'
    reason: Preserva la alternativa documentada en el rastro de auditoría inglés para el arranque sin el énfasis pleno de «él mismo».
  revision_rationale: 'Se hicieron solo reparaciones menores: se cambió «Ten misericordia de mí» por «Ten piedad de mí» para mayor naturalidad y dignidad en español bíblico; se añadió «le» en «le dice a Dios» para mejor fluidez; y se simplificó la nota al pie para reflejar claramente la alternativa inglesa auditada sin puntuación confusa. El resto del contenido se mantiene fiel al griego y al expediente POB.'
