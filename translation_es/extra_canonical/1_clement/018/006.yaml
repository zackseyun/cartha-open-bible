revisions:
- from: Porque, mira, amaste la verdad; las cosas ocultas y secretas de tu sabiduría me las hiciste conocer.
  to: Porque amaste la verdad; las cosas ocultas y secretas de tu sabiduría me las diste a conocer.
  rationale: Se ajusta el texto para lograr un español más natural y digno sin perder ningún elemento semántico del griego ni del English POB. Se elimina «mira» por sonar innecesariamente forzado en esta línea, y se sustituye «me las hiciste conocer» por «me las diste a conocer», que expresa mejor en español el valor de δηλόω.
