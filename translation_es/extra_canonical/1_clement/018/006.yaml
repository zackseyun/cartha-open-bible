translation:
  language: es
  text: Porque amaste la verdad; las cosas ocultas y secretas de tu sabiduría me las diste a conocer.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: For behold
  chosen_spanish: Porque, mira,
  alternatives_spanish:
  - He aquí,
  - Pues mira,
  lexicon: ἰδοὺ
  rationale: La partícula introduce énfasis y llamada de atención. En español, «mira» conserva el tono exhortativo/atencional sin sonar arcaico; se mantiene «Porque» para reflejar la conexión explicativa del verso dentro de la cita.
- source_word: ἀλήθειαν
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad plena
  - la realidad
  lexicon: ἀλήθεια
  rationale: El sustantivo corresponde de manera directa a «verdad». No hay indicio de que deba ampliarse a «verdad plena» ni reducirse a «realidad» en este contexto.
- source_word: ἠγάπησας
  english_pob_choice: you loved
  chosen_spanish: amaste
  alternatives_spanish:
  - has amado
  - amaste profundamente
  lexicon: ἀγαπάω
  rationale: El aoristo expresa una acción afirmada como hecha; «amaste» es natural y fiel. «Has amado» introduciría una matiz aspectual no exigida por el griego.
- source_word: τὰ ἄδηλα
  english_pob_choice: the hidden things
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - las cosas invisibles
  - las cosas no manifiestas
  lexicon: ἄδηλος
  rationale: El adjetivo señala lo no visible o no patente; «ocultas» transmite bien el sentido en español. «Las cosas ocultas» conserva el plural neutro griego con naturalidad.
- source_word: τὰ κρύφια
  english_pob_choice: and secret things
  chosen_spanish: y secretas
  alternatives_spanish:
  - y escondidas
  - y misteriosas
  lexicon: κρύφιος
  rationale: «Secretas» distingue el matiz de algo reservado o no revelado. Unirlo a «ocultas» reproduce la duplicación enfática del griego sin sobreinterpretarla.
- source_word: τῆς σοφίας σου
  english_pob_choice: of your wisdom
  chosen_spanish: de tu sabiduría
  alternatives_spanish:
  - de tu prudencia
  - de tu sabiduría divina
  lexicon: σοφία
  rationale: «Sabiduría» es la correspondencia directa y suficiente. No se añade «divina» porque el contexto ya atribuye la sabiduría a Dios por el pronombre posesivo.
- source_word: ἐδήλωσάς μοι
  english_pob_choice: you made known to me
  chosen_spanish: me las hiciste conocer
  alternatives_spanish:
  - me las revelaste
  - me las diste a conocer
  lexicon: δηλόω
  rationale: «Hiciste conocer» conserva la idea de hacer manifiesto sin introducir el vocabulario teológico más fuerte de «revelar», que el griego no exige explícitamente. El pronombre «las» retoma las cosas ocultas y secretas.
theological_decisions:
- issue: Relación entre conocimiento y revelación
  english_pob_reading: you made known to me
  chosen_spanish_reading: me las hiciste conocer
  alternative_spanish_readings:
  - me las revelaste
  - me las diste a conocer
  rationale: El griego δηλόω indica hacer evidente o conocido. «Hiciste conocer» mantiene el acto divino de comunicación sin cargarlo de un matiz técnico de revelación que el texto no exige de forma directa.
  doctrine_reference: Salmo 51:6 (LXX/MT); principio de revelación divina en la sabiduría de Dios
- issue: Doble descripción de lo oculto
  english_pob_reading: the hidden and secret things
  chosen_spanish_reading: las cosas ocultas y secretas
  alternative_spanish_readings:
  - lo oculto y lo secreto
  - las cosas escondidas y secretas
  rationale: La duplicación se conserva para respetar el paralelismo y la intensificación semítica/poética. No se fusionan los dos términos para no perder la tensión retórica del texto.
  doctrine_reference: Paralelismo poético bíblico; preservación del énfasis de la cita
translation_notes:
  revision_awareness: El texto inglés POB ya había sido revisado y quedó sin cambios, con acuerdo alto entre el texto fuente griego y la traducción inglesa. Esta versión española sigue esa lectura estable, sin introducir variantes textuales ni notas críticas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma editorial de POB solo cuando aparezca el tetragrámaton; aquí no aparece.
  - Se usa «sabiduría» y no un equivalente más interpretativo, para conservar el paralelismo del verso.
  - Se evita «revelaste» para no sobretraducir δηλόω; la redacción elegida equilibra naturalidad y fidelidad.
  - La estructura de dos cola poéticos se conserva en español con un punto y coma para reflejar la pausa del original.
