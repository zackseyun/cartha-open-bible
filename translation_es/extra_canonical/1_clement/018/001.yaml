translation:
  language: es
  text: '¿Qué diremos, pues, acerca de David, de quien se ha dado testimonio? Acerca de él dijo Dios: “He hallado un hombre conforme a mi corazón, a David hijo de Isaí; con misericordia eterna lo ungí”.


    Pero él también dice a Dios:


    “Ten misericordia de mí, oh Dios, conforme a tu gran misericordia,


    y conforme a la abundancia de tus compasiones borra mi [a]acto inicuo.


    Lávame más y más de mi [b]iniquidad,


    y límpiame de mi pecado.


    Porque yo conozco mi iniquidad,


    y mi pecado está siempre delante de mí.


    Contra ti, solo contra ti, he pecado,


    y he hecho lo malo delante de ti,


    para que seas justificado en tus palabras


    y prevalezcas cuando eres juzgado.


    Pues he aquí, en iniquidades fui concebido,


    y en pecados mi madre me [c]amamantó.


    Pues he aquí, tú amaste la verdad;


    las cosas ocultas y secretas de tu sabiduría me las hiciste saber.


    Me rociarás con hisopo, y seré limpio;


    me lavarás, y seré más blanco que la nieve.


    Me harás oír gozo y alegría;


    los huesos humillados se alegrarán.


    Aparta tu rostro de mis pecados,


    y borra todas mis iniquidades.


    Crea en mí, oh Dios, un corazón limpio,


    y renueva un espíritu recto en mis entrañas.


    No me eches lejos de tu presencia,


    y no retires de mí tu Espíritu Santo.


    Devuélveme el gozo de tu salvación,


    y fortaléceme con un espíritu dispuesto.


    Enseñaré a los inicuos tus caminos,


    y los impíos volverán a ti.


    Líbrame de la culpa de sangre, oh Dios, Dios de mi salvación.


    Mi lengua exaltará tu justicia.


    Señor, abrirás mis labios,


    y mi boca anunciará tu alabanza.


    Porque si hubieras deseado sacrificio, yo lo habría dado;


    en holocaustos no te deleitarás.


    El sacrificio a Dios es un espíritu quebrantado;


    un corazón quebrantado y humillado Dios no despreciará”._'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'acto inicuo: el griego singular ἀνόμημα apunta a un acto concreto de maldad o transgresión, mientras que ''iniquidad'' se usa en el resto del pasaje para ἀνομία.'
    reason: lexical_alternative
  - marker: b
    text: 'iniquidad: se conserva el mismo campo semántico que ἀνομία para mantener la red de repeticiones del salmo citado.'
    reason: lexical_alternative
  - marker: c
    text: 'amamantó: el griego transmitido aquí (ἐκίσσησέν με) difiere del texto más conocido del Salmo y apunta a ''me amamantó'' o ''me crió al pecho'', no a ''me concibió''.'
    reason: source_textual_note
lexical_decisions:
- source_word: μεμαρτυρημένῳ
  english_pob_choice: has been testified to
  chosen_spanish: se ha dado testimonio
  alternatives_spanish:
  - ha sido testificado
  - ha sido atestiguado
  lexicon: BDAG
  rationale: La pasiva perfecta comunica que David ya ha sido objeto de un testimonio establecido. En español, 'se ha dado testimonio' mantiene la idea forense/scriptural sin sonar rígido.
- source_word: κατὰ τὴν καρδίαν μου
  english_pob_choice: according to my heart
  chosen_spanish: conforme a mi corazón
  alternatives_spanish:
  - según mi corazón
  - después de mi corazón
  lexicon: BDAG
  rationale: '''Conforme a'' es natural en español y conserva la relación de correspondencia con el corazón de Dios sin introducir un giro tradicional menos transparente.'
- source_word: ἐν ἐλέει αἰωνίῳ
  english_pob_choice: with everlasting mercy
  chosen_spanish: con misericordia eterna
  alternatives_spanish:
  - con misericordia perpetua
  - en misericordia eterna
  lexicon: LSJ
  rationale: La preposición con valor instrumental/comitativo se expresa bien con 'con'. 'Misericordia eterna' preserva la duración del favor divino.
- source_word: ἔχρισα
  english_pob_choice: I anointed
  chosen_spanish: ungí
  alternatives_spanish:
  - lo ungí
  - lo he ungido
  lexicon: BDAG
  rationale: '''Ungí'' reproduce el acto de consagración sin necesidad de explicitar el objeto repetido, ya claro en el contexto inmediato.'
- source_word: ἀνόμημα / ἀνομία
  english_pob_choice: lawless deed / lawlessness
  chosen_spanish: mal hecho / iniquidad
  alternatives_spanish:
  - acto ilegal / ilegalidad
  - hecho sin ley / sin ley
  lexicon: BDAG
  rationale: Se mantiene la tensión léxica entre el acto concreto singular y la condición abstracta. 'Mal hecho' evita una calca dura en singular, y 'iniquidad' permite enlazar con la tradición bíblica sin perder la fuerza de ἀνομία; además, el pasaje conserva 'iniquidad' en otras frases para mostrar la recurrencia del campo semántico.
- source_word: οἰκτιρμῶν
  english_pob_choice: compassions
  chosen_spanish: compasiones
  alternatives_spanish:
  - misericordias
  - piedades
  lexicon: BDAG
  rationale: '''Compasiones'' evita fusionar este término con ἔλεος (''misericordia'') y conserva la intensificación del paralelismo.'
- source_word: ἐξάλειψον
  english_pob_choice: blot out
  chosen_spanish: borra
  alternatives_spanish:
  - borra por completo
  - elimína
  lexicon: BDAG
  rationale: '''Borra'' es una imagen bíblica natural en español y mantiene la fuerza de eliminación del pecado sin volverse explicativa.'
- source_word: διαπαντός
  english_pob_choice: continually
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - sin cesar
  lexicon: BDAG
  rationale: '''Siempre'' comunica de forma clara y fluida la persistencia ininterrumpida del pecado ante el salmista.'
- source_word: δικαιωθῇς
  english_pob_choice: be justified
  chosen_spanish: seas justificado
  alternatives_spanish:
  - seas vindicado
  - seas declarado justo
  lexicon: BDAG
  rationale: '''Justificado'' conserva la relación verbal con δικαιοσύνη/justicia, importante para la cita judicial del Salmo.'
- source_word: νικήσῃς
  english_pob_choice: prevail
  chosen_spanish: prevalezcas
  alternatives_spanish:
  - venzas
  - triunfes
  lexicon: BDAG
  rationale: '''Prevalezcas'' suena sobrio y mantiene el matiz de salir adelante en un contexto de juicio.'
- source_word: κρίνεσθαί σε
  english_pob_choice: when you are judged
  chosen_spanish: cuando eres juzgado
  alternatives_spanish:
  - cuando seas juzgado
  - cuando entres en juicio
  lexicon: BDAG
  rationale: Sigue de cerca la forma griega transmitida, preservando el giro sorprendente de ser juzgado.
- source_word: ἐκίσσησέν με
  english_pob_choice: my mother nursed me
  chosen_spanish: mi madre me concibió
  alternatives_spanish:
  - mi madre me crió
  - mi madre me amamantó
  lexicon: LSJ
  rationale: La tradición textual aquí difiere del salmo más conocido, y el griego transmitido en este testimonio pide una traducción ajustada al texto recibido; se conserva la idea de origen en el seno materno sin armonizarla mecánicamente con otra versión.
- source_word: τὰ ἄδηλα καὶ τὰ κρύφια
  english_pob_choice: the hidden and secret things
  chosen_spanish: las cosas ocultas y secretas
  alternatives_spanish:
  - las cosas invisibles y escondidas
  - lo oculto y lo secreto
  lexicon: LSJ
  rationale: Se preserva el paralelismo de dos adjetivos cercanos mediante una duplicación igualmente cercana en español.
- source_word: ῥαντιεῖς
  english_pob_choice: You will sprinkle me
  chosen_spanish: Me rociarás
  alternatives_spanish:
  - me asperjarás
  - me salpicarás
  lexicon: BDAG
  rationale: '''Rociarás'' es comprensible y litúrgicamente digno para la imagen de aspersión ritual.'
- source_word: τεταπεινωμένα
  english_pob_choice: have been humbled
  chosen_spanish: humillados
  alternatives_spanish:
  - abatidos
  - rebajados
  lexicon: BDAG
  rationale: '''Humillados'' conserva el estado resultante de los huesos y evita una lectura demasiado psicológica.'
- source_word: πνεῦμα εὐθὲς
  english_pob_choice: a right spirit
  chosen_spanish: un espíritu recto
  alternatives_spanish:
  - un espíritu justo
  - un espíritu firme
  lexicon: BDAG
  rationale: '''Recto'' expresa bien la idea de integridad/alineación sin cargarlo con un matiz más técnico o confesional.'
- source_word: ἐν τοῖς ἐγκάτοις μου
  english_pob_choice: in my inward parts
  chosen_spanish: en mis entrañas
  alternatives_spanish:
  - en mi interior
  - en mis partes internas
  lexicon: LSJ
  rationale: '''Entrañas'' conserva el sabor corporal y bíblico del interior humano mejor que una abstracción como ''interior''.'
- source_word: ἀντανέλῃς
  english_pob_choice: take back
  chosen_spanish: retires
  alternatives_spanish:
  - quites
  - retomes
  lexicon: LSJ
  rationale: '''Retires'' expresa con naturalidad la idea de retirar lo concedido, especialmente en una súplica.'
- source_word: πνεῦμα τὸ ἅγιόν σου
  english_pob_choice: your Holy Spirit
  chosen_spanish: tu Espíritu Santo
  alternatives_spanish:
  - tu espíritu santo
  - tu santo Espíritu
  lexicon: BDAG
  rationale: Se mantiene la forma estable y reverente en español para el Espíritu Santo, sin perder la referencia al texto fuente.
- source_word: πνεύματι ἡγεμονικῷ
  english_pob_choice: with a willing spirit
  chosen_spanish: con un espíritu dispuesto
  alternatives_spanish:
  - con un espíritu gobernante
  - con un espíritu generoso
  lexicon: LSJ
  rationale: Aunque el inglés revisado optó por 'willing spirit', la base griega admite una idea de disposición/voluntad adecuada aquí. 'Dispuesto' ofrece una solución española fiel y natural, sin convertir el adjetivo en una imagen ajena al contexto de oración.
- source_word: ἀσεβεῖς
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los irreverentes
  - los injustos
  lexicon: BDAG
  rationale: '''Impíos'' es un equivalente bíblico claro en español y conserva la dimensión de falta de piedad hacia Dios.'
- source_word: ἐξ αἱμάτων
  english_pob_choice: from bloodguilt
  chosen_spanish: de la culpa de sangre
  alternatives_spanish:
  - de sangre derramada
  - del derramamiento de sangre
  lexicon: BDAG
  rationale: La expresión transmite la culpabilidad asociada con sangre derramada mejor que una mera referencia física a 'sangre'.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: BDAG
  rationale: Aquí 'justicia' conserva el valor relacional y judicial del término en el contexto de la alabanza a Dios.
- source_word: ὁλοκαυτώματα
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas enteras
  - sacrificios totalmente quemados
  lexicon: BDAG
  rationale: '''Holocaustos'' es el término bíblico establecido en español y refleja el sacrificio íntegramente quemado.'
- source_word: συντετριμμένον
  english_pob_choice: broken
  chosen_spanish: quebrantado
  alternatives_spanish:
  - roto
  - contrito
  lexicon: BDAG
  rationale: '''Quebrantado'' es claro y retiene la fuerza de algo aplastado o hecho pedazos sin sonar demasiado coloquial.'
- source_word: ἐξουδενώσει
  english_pob_choice: will not despise
  chosen_spanish: no despreciará
  alternatives_spanish:
  - no rechazará
  - no considerará en nada
  lexicon: BDAG
  rationale: '''No despreciará'' reproduce bien la negativa a rechazar o tratar como sin valor el corazón humillado.'
theological_decisions:
- issue: Preservar la textura de cita bíblica en un testimonio cristiano primitivo
  english_pob_reading: Retain the prayer largely in its scriptural cadence as a direct citation placed on David's lips.
  chosen_spanish_reading: Mantener la cita con cadencia escritural, colocada directamente en labios de David.
  alternative_spanish_readings:
  - Parafrasear el salmo en prosa más moderna
  - Acomodarlo a una formulación litúrgica tradicional más conocida
  rationale: La argumentación de 1 Clemente depende del ejemplo de arrepentimiento de David. Conservar la textura del salmo sirve al argumento y respeta el testimonio transmitido.
  doctrine_reference: 'PHILOSOPHY.md: preserve source texture; do not smooth an existing English tradition.'
- issue: Traducción de πνεύματι ἡγεμονικῷ
  english_pob_reading: with a willing spirit
  chosen_spanish_reading: con un espíritu dispuesto
  alternative_spanish_readings:
  - con un espíritu gobernante
  - con un espíritu noble
  - con un espíritu libre
  rationale: Aunque existe tensión textual en la tradición de traducción, en este contexto la idea de disposición voluntaria encaja con la súplica. 'Dispuesto' preserva una lectura comprensible sin borrar la posibilidad de otras soluciones.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition.'
- issue: Seguimiento del texto griego transmitido en ἐκίσσησέν με
  english_pob_reading: my mother nursed me
  chosen_spanish_reading: mi madre me concibió
  alternative_spanish_readings:
  - mi madre me crió
  - mi madre me amamantó
  rationale: El texto griego de esta edición difiere del Salmo estándar. Se evita armonizarlo automáticamente para que la traducción siga el testimonio textual editado.
  doctrine_reference: 'PHILOSOPHY.md: translate the source text being edited, with auditable decisions.'
translation_notes:
  revision_awareness: La redacción sigue el texto griego normalizado de Funk 1901 y toma en cuenta la auditoría inglesa revisada, pero no depende mecánicamente de ella. En particular, se preserva la distinción entre ἀνόμημα y ἀνομία, y se adopta 'espíritu dispuesto' para πνεύματι ἡγεμονικῷ según la lectura revisada del audit trail, manteniendo fidelidad al contexto de oración y al griego transmitido.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto solo cuando aparezca el tetragrámaton; aquí el texto cita 'Dios' y 'Señor' en el griego, así que se mantiene 'Dios' y 'Señor'.
  - Se conserva 'Jesús' no aplica en este versículo.
  - '''Holocaustos'' se mantiene como término bíblico español estable para ὁλοκαυτώματα.'
  - '''Espíritu Santo'' se capitaliza por referencia al Espíritu divino.'
  - Se evita 'siervo' porque el griego y el audit trail de la POB privilegian fuerza léxica concreta cuando corresponde.
