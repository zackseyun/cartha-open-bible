translation:
  language: es
  text: 'Contra ti solo pequé,


    y hice lo malo delante de ti,


    para que seas justificado en tus palabras


    y prevalezcas cuando juzgues[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y prevalezcas cuando seas juzgado».'
    reason: alternative_rendering_preserved_from_english_audit_trail
lexical_decisions:
- source_word: σοὶ μόνῳ ἥμαρτον
  english_pob_choice: Against you only I sinned
  chosen_spanish: Contra ti solo pequé
  alternatives_spanish:
  - Contra ti solamente pequé
  - Solo contra ti pequé
  lexicon: ἁμαρτάνω → pecar; σοὶ μόνῳ → contra ti solo / solamente
  rationale: Mantiene el valor exclusivo de μόνῳ y el verbo de pecado con forma natural en español. 'Contra ti' conserva la relación directa del hebreo/greco-psálmico de ofensa dirigida a Dios.
- source_word: τὸ πονηρὸν ἐνώπιόν σου ἐποίησα
  english_pob_choice: and I did what is evil before you
  chosen_spanish: y hice lo malo delante de ti
  alternatives_spanish:
  - y hice el mal delante de ti
  - y obré mal ante ti
  lexicon: πονηρός → malo / mal; ἐνώπιόν σου → delante de ti
  rationale: '''Lo malo'' expresa la cualidad moral sin introducir abstracción innecesaria. ''Delante de ti'' refleja ἐνώπιόν σου con registro bíblico claro y natural en español.'
- source_word: ὅπως ἂν δικαιωθῇς ἐν τοῖς λόγοις σου
  english_pob_choice: so that you may be justified in your words
  chosen_spanish: para que seas justificado en tus palabras
  alternatives_spanish:
  - para que quedes justificado en tus palabras
  - para que resultes justificado en tus palabras
  lexicon: δικαιόω → justificar / declarar justo; λόγοι → palabras
  rationale: '''Ser justificado'' preserva la pasiva del griego y la fuerza judicial/forense de δικαιόω. ''En tus palabras'' sigue el plural λόγοι sin reducirlo a una sola ''palabra''.'
- source_word: νικήσῃς ἐν τῷ κρίνεσθαί σε
  english_pob_choice: and prevail when you are judged
  chosen_spanish: y prevalezcas cuando seas juzgado
  alternatives_spanish:
  - y prevalezcas cuando seas sometido a juicio
  - y prevalezcas al ser juzgado
  lexicon: νικάω → prevalecer / vencer; κρίνεσθαί σε → ser juzgado
  rationale: La revisión del audit trail favorece una lectura pasiva de κρίνεσθαί σε; por eso se traduce 'cuando seas juzgado'. 'Prevalezcas' conserva el matiz de victoria/triunfo sin sonar triunfalista.
theological_decisions:
- issue: Relación entre la confesión de pecado y la vindicación divina en el juicio
  english_pob_reading: so that you may be justified in your words and prevail when you are judged.
  chosen_spanish_reading: para que seas justificado en tus palabras y prevalezcas cuando seas juzgado.
  alternative_spanish_readings:
  - para que te reconozcan justo en tus palabras y prevalezcas cuando seas juzgado
  - para que seas vindicado en tus palabras y prevalezcas cuando seas juzgado
  rationale: 'La formulación mantiene la tensión bíblica: Dios no es corregido por el humano, sino vindicado como justo en sus declaraciones y en el juicio. ''Ser justificado'' conserva la ambigüedad forense sin diluirla en una paráfrasis devocional.'
  doctrine_reference: Salmo 51:4; Romanos 3:4
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante en la cláusula final: de ''when you judge'' a ''when you are judged''. La versión española sigue la lectura revisada y refleja el pasivo de κρίνεσθαί σε. No se adoptó la lectura obsoleta del pasivo en sentido activo.'
  spanish_consistency_notes:
  - Se conserva el tono bíblico directo y sobrio, sin sustituir el lenguaje forense por expresiones más explicativas.
  - '''Lo malo'' y ''ser justificado'' mantienen la relación entre pecado humano y vindicación divina sin suavizarla.'
  - La nota al pie marca la alternativa textual/gramatical documentada en el audit trail inglés.
