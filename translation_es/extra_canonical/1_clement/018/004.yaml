review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del versículo está bien alineada con el griego: σοὶ μόνῳ ἥμαρτον = «Contra ti solo pequé», τὸ πονηρὸν ἐνώπιόν σου ἐποίησα = «hice lo malo delante de ti», y δικαιωθῇς ἐν τοῖς λόγοις σου = «seas justificado en tus palabras». El punto crítico es ἐν τῷ κρίνεσθαί σε. Aunque el último pase del English POB volvió a la lectura pasiva, el propio audit trail documenta de manera fuerte y específica que aquí el infinitivo debe entenderse como medio/activo de sentido «cuando juzgas / cuando entras en juicio», en línea con Sal 51:4 LXX y su trasfondo hebreo. La versión española actual preserva el inglés revisado más reciente, pero no la mejor justificación fuente-auditoría.'
  spanish_quality_summary: El español es claro, bíblico y natural. «Contra ti solo pequé», «hice lo malo delante de ti» y «para que seas justificado en tus palabras» son lecturas dignas y comprensibles. Sin embargo, «cuando seas juzgado» introduce una imagen teológica y sintáctica menos natural en este contexto y más difícil de leer como cita salmódica. Además, la nota al pie actual repite exactamente el mismo texto que el cuerpo, por lo que no cumple una función útil.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los términos clave «pequé», «lo malo», «justificado» y «palabras» están bien elegidos. El único ajuste necesario es en κρίνεσθαί σε, donde conviene «cuando juzgues» para reflejar mejor la decisión léxico-teológica documentada en la auditoría y evitar un pasivo teológicamente equívoco.
  issues:
  - severity: high
    issue: κρίνεσθαί σε se tradujo como pasivo («cuando seas juzgado»)
    rationale: El expediente de revisión documenta ampliamente que aquí el infinitivo debe leerse con sujeto divino que juzga, no como Dios siendo juzgado. La versión pasiva altera la escena jurídica del texto y se aparta de la mejor evidencia presentada.
  - severity: medium
    issue: La nota [a] repite el texto principal y no preserva la alternativa significativa
    rationale: Si se mantiene nota, debe registrar la alternativa relevante. La nota actual dice exactamente lo mismo que el cuerpo y además la clasifica como textual_variant sin base mostrada; no ayuda al lector ni refleja el historial de traducción.
  revised_spanish_text: 'Contra ti solo pequé,


    y hice lo malo delante de ti,


    para que seas justificado en tus palabras


    y prevalezcas cuando juzgues[a].'
  revised_footnotes:
