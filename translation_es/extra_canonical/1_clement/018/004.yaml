    text: 'O: «y prevalezcas cuando seas juzgado».'
    reason: alternative_rendering_preserved_from_english_audit_trail
  revision_rationale: Se corrige la cláusula final para reflejar mejor la evidencia fuente y la justificación léxica documentada para κρίνεσθαί σε como «cuando juzgues». Se conserva en nota la alternativa pasiva porque el English POB la ha transmitido en su historial, pero ya no se la presenta como texto principal. El resto del versículo se mantiene por ser fiel y natural en español.
