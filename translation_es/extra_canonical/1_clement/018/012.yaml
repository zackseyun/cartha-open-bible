    changes_summary: Changed 'gladness' to 'joy' for more natural rendering of ἀγαλλίασιν, and revised 'strengthen me with a guiding spirit' to 'uphold me with a willing spirit' to better reflect πνεύματι ἡγεμονικῷ and the sense of στήριξόν με.
translation:
  language: es
  text: 'Restáurame el gozo[a] de tu salvación,


    y sostenme con un espíritu dispuesto[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el regocijo».
    reason: alternative_reading
  - marker: b
    text: O «un espíritu que guía» o «gobernante».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπόδος μοι
  english_pob_choice: Restore to me
  chosen_spanish: Restáurame
  alternatives_spanish:
  - Devuélveme
  - Restitúyeme
  lexicon: ἀποδίδωμι
  rationale: El griego pide la idea de devolver o restaurar algo que falta; en español, «restáurame» conserva esa fuerza de restitución y suena natural en una súplica bíblica.
- source_word: τὴν ἀγαλλίασιν
  english_pob_choice: the joy
  chosen_spanish: el gozo
  alternatives_spanish:
  - la alegría
  - el regocijo
  lexicon: ἀγαλλίασις
  rationale: La revisión inglesa pasó de «gladness» a «joy»; en español, «gozo» comunica bien la intensidad jubilosa de ἀγαλλίασις y mantiene un registro bíblico claro.
- source_word: τοῦ σωτηρίου σου
  english_pob_choice: of your salvation
  chosen_spanish: de tu salvación
  alternatives_spanish:
  - de tu rescate
  - de tu liberación
  lexicon: σωτήριον
  rationale: El sustantivo en este contexto remite a la acción salvadora de Dios; «salvación» es la opción más directa y fiel en español.
- source_word: πνεύματι ἡγεμονικῷ
  english_pob_choice: with a willing spirit
  chosen_spanish: con un espíritu dispuesto
  alternatives_spanish:
  - con un espíritu dirigente
  - con un espíritu gobernante
  - con un espíritu de guía
  lexicon: ἡγεμονικός
  rationale: La evidencia del audit trail favorece «willing spirit» frente a «ruling spirit» o «guiding spirit». En español, «espíritu dispuesto» expresa una disposición interior obediente y voluntaria, sin forzar la idea de dominio o de liderazgo técnico.
- source_word: στήριξόν με
  english_pob_choice: uphold me
  chosen_spanish: sostenme
  alternatives_spanish:
  - afírmame
  - fortaléceme
  - apóyame
  lexicon: στηρίζω
  rationale: «Sosténme»/«sostenme» reproduce bien la idea de apoyo firme y continuo de στηρίζω; en español moderno «sostenme» es natural y conserva el sentido de ser mantenido en pie.
theological_decisions:
- issue: Sentido de πνεύματι ἡγεμονικῷ en la cita del salmo
  english_pob_reading: with a willing spirit; prior note allowed 'a ruling spirit' and later revision preferred 'a guiding spirit'
  chosen_spanish_reading: con un espíritu dispuesto
  alternative_spanish_readings:
  - con un espíritu que guía
  - con un espíritu gobernante
  rationale: La frase puede evocar cualidades de dirección o gobierno, pero el contexto orante del salmo pide una disposición interior recta antes que una función de mando. «Espíritu dispuesto» preserva la tensión sin imponer una lectura más técnica de lo que el contexto requiere.
  doctrine_reference: Salmo 51:12/LXX 50:14; 1 Clemente 18:12
translation_notes:
  revision_awareness: El texto inglés más reciente volvió a «joy» y «a willing spirit», tras una etapa intermedia con «gladness» y «guiding spirit». La versión española sigue esa revisión final, pero conserva en nota la ambigüedad histórica de ἀγαλλίασις y la discusión de πνεύματι ἡγεμονικῷ reflejada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene un estilo bíblico sobrio y publicable, evitando calcos innecesarios.
  - «Gozo» se usa como equivalente principal de ἀγαλλίασις; «alegría» queda como alternativa.
  - «Espíritu» se escribe en minúscula porque no hay señal textual aquí de que se refiera al Espíritu Santo, sino a la disposición interior.
  - «Sostenme» refleja mejor στήριξόν με que «fortaléceme» en este contexto de apoyo continuo.
