  text: ἀκουτιεῖς με ἀγαλλίασιν καὶ εὐφροσύνην, ἀγαλλιάσονται ὀστᾶ τεταπεινωμένα.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/018/008.yaml
  text: 'You will make me hear gladness and joy;

    the bones that have been humbled will rejoice.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:59Z'
    unchanged: false
    changes_summary: Revised 'rejoicing' to 'joy' for a more natural and distinct rendering of εὐφροσύνην alongside ἀγαλλίασιν, while preserving the formal sense of the verse.
translation:
  language: es
  text: 'Me harás oír alegría y gozo;

    los huesos que han sido humillados se alegrarán.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀκουτιεῖς με
  english_pob_choice: You will make me hear
  chosen_spanish: Me harás oír
  alternatives_spanish:
  - Me harás escuchar
  - Harás que oiga
  lexicon: ἀκουτίζω
  rationale: La forma griega expresa causación de audición; por eso se traduce con una construcción causal natural en español. ‘Me harás oír’ conserva el valor activo/causativo sin añadir matices ajenos.
- source_word: ἀγαλλίασιν
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - júbilo
  lexicon: ἀγαλλίασις
  rationale: El sustantivo apunta a una alegría intensa, pero en español ‘alegría’ es claro y digno en paralelo con εὐφροσύνην, permitiendo distinguir ambos términos sin forzar un tecnicismo.
- source_word: εὐφροσύνην
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - júbilo
  lexicon: εὐφροσύνη
  rationale: La revisión inglesa separó este término de ἀγαλλίασις para mantener dos matices distintos; en español ‘gozo’ funciona bien como segundo miembro paralelo y conserva una alegría gozosa/distintiva.
- source_word: ὀστᾶ τεταπεινωμένα
  english_pob_choice: the bones that have been humbled
  chosen_spanish: los huesos que han sido humillados
  alternatives_spanish:
  - los huesos abatidos
  - los huesos afligidos
  lexicon: ταπεινόω
  rationale: Se mantiene la imagen corporal y el pasivo resultativo de ‘humillados’, que refleja bien el lenguaje bíblico de abatimiento. ‘Abatidos’ suavizaría la tensión lexical y perdería la relación con el verbo de humillar.
theological_decisions:
- issue: Persona y tono del verbo causativo en la primera línea
  english_pob_reading: You will make me hear gladness and joy
  chosen_spanish_reading: Me harás oír alegría y gozo
  alternative_spanish_readings:
  - Oirás en mí alegría y gozo
  - Harás que escuche alegría y gozo
  rationale: El texto no presenta un contenido doctrinal complejo, pero sí una acción divina de restauración. La forma escogida preserva la dependencia del sujeto y la intervención causativa de Dios sin añadir explicaciones.
  doctrine_reference: Salmo 51:8 / restauración y gozo concedidos por Dios
translation_notes:
  revision_awareness: La versión inglesa fue revisada de ‘rejoicing’ a ‘joy’ para distinguir mejor εὐφροσύνην de ἀγαλλίασιν. La traducción española refleja esa distinción con ‘alegría’ y ‘gozo’, manteniendo el paralelismo y la diferencia léxica sin sobreinterpretar.
  spanish_consistency_notes:
  - Se evita ‘Cristo’/‘Mesías’ porque el verso no contiene esa terminología.
  - Se conserva la imagen de ‘huesos’ y el pasivo ‘han sido humillados’ para respetar la metáfora corporal del original.
  - Se usa puntuación de dos miembros poéticos separados por punto y coma para reproducir el paralelismo del griego.
