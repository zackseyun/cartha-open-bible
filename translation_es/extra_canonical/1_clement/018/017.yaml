review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego de 1 Clemente 18:17 y refleja adecuadamente el paralelismo de la cita: θυσία τῷ θεῷ / πνεῦμα συντετριμμένον; καρδίαν συντετριμμένην καὶ τεταπεινωμένην / ὁ θεὸς οὐκ ἐξουδενώσει. Sin embargo, «Un sacrificio para Dios es...» suena menos natural en español para una oración nominal de cita poética; «El sacrificio de Dios es...» sería incorrecto, pero «El sacrificio para Dios es...» tampoco es idiomático. La mejor reparación mínima y fiel es «Un sacrificio[a] para Dios es...», con nota que explique que el griego es una construcción nominal elíptica, o preferiblemente reordenar a «Un espíritu quebrantado es sacrificio para Dios», pero eso se aparta más del orden del POB inglés. También conviene ajustar «no despreciará» a «no desprecia» o mantener futuro según el inglés; el griego οὐκ ἐξουδενώσει es futuro, así que el futuro español es defendible.'
  spanish_quality_summary: 'La redacción es clara y comprensible, pero «Un sacrificio para Dios es un espíritu quebrantado» suena algo calcada y poco natural en español litúrgico o bíblico. El resto del versículo fluye bien: «un corazón quebrantado y humillado Dios no despreciará». Un ajuste menor mejora naturalidad sin perder fidelidad.'
  glossary_alignment: 'La terminología está bien alineada con el proyecto: θεός -> «Dios», πνεῦμα -> «espíritu», y no hay conflictos con Yahvé/Mesías/etc. Las decisiones léxicas sobre «quebrantado» y «despreciará» son razonables y fieles al griego y al inglés POB.'
  issues:
  - severity: medium
    issue: La frase «Un sacrificio para Dios es...» es poco idiomática en español.
    rationale: Aunque refleja el orden del inglés y del original nominal, en español suena forzada. Una leve reparación estilística mejora la legibilidad sin alterar el sentido.
  revised_spanish_text: 'Un sacrificio[a] para Dios es un espíritu quebrantado;


    un corazón quebrantado y humillado Dios no despreciará.'
