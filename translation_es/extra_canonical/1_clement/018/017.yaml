translation:
  language: es
  text: 'Un sacrificio[a] para Dios es un espíritu quebrantado;


    un corazón quebrantado y humillado Dios no despreciará.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O con un orden más natural en español: «Un espíritu quebrantado es sacrificio para Dios». El griego es una construcción nominal breve y poética.'
    reason: Aclara una posible rigidez sintáctica del español sin cambiar el sentido principal ni el orden adoptado por el POB inglés.
lexical_decisions:
- source_word: θυσία
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  - sacrificio ritual
  lexicon: θυσία
  rationale: «Sacrificio» conserva el valor cultual del griego y coincide con la elección inglesa; «ofrenda» sería más general y perdería precisión, mientras que «sacrificio ritual» añade un matiz no explícito en el texto.
- source_word: πνεῦμα συντετριμμένον
  english_pob_choice: a broken spirit
  chosen_spanish: un espíritu quebrantado
  alternatives_spanish:
  - un espíritu roto
  - un espíritu contrito
  lexicon: πνεῦμα; συντετριμμένος
  rationale: «Espíritu quebrantado» reproduce la imagen de algo golpeado o roto interiormente sin forzar una paráfrasis. «Contrito» es posible, pero en español puede sonar más interpretativo y menos transparente respecto del adjetivo griego.
- source_word: καρδίαν συντετριμμένην καὶ τεταπεινωμένην
  english_pob_choice: a broken and humbled heart
  chosen_spanish: un corazón quebrantado y humillado
  alternatives_spanish:
  - un corazón roto y humillado
  - un corazón contrito y humillado
  lexicon: καρδία; συντετριμμένος; ταπεινόω
  rationale: «Corazón quebrantado y humillado» mantiene el paralelismo con la primera línea y refleja tanto la ruptura interior como la condición de abatimiento. Se evita «contrito» por ser más eclesiástico y menos directo para este contexto.
- source_word: ὁ θεὸς οὐκ ἐξουδενώσει
  english_pob_choice: God will not despise
  chosen_spanish: Dios no despreciará
  alternatives_spanish:
  - Dios no tendrá en poco
  - Dios no rechazará
  lexicon: ἐξουδενόω
  rationale: «Despreciará» sigue de cerca la fuerza de menospreciar o tener en nada, y armoniza con el inglés POB. «Rechazará» traslada el sentido posible, pero atenúa la idea de valoración negativa expresa.
theological_decisions:
- issue: How to render the divine title in a citation that names God directly
  english_pob_reading: A sacrifice to God... God will not despise
  chosen_spanish_reading: para Dios... Dios no despreciará
  alternative_spanish_readings:
  - a Dios... Dios no despreciará
  - para el Señor... el Señor no despreciará
  rationale: El griego dice explícitamente τῷ θεῷ y ὁ θεός, por lo que se traduce «Dios» de forma directa. No se usa «Señor» porque aquí no hay κύριος en el texto base ni una necesidad de enmascarar el nombre divino.
  doctrine_reference: Uso directo de θεός en la cita; fidelidad léxica y teológica al texto griego.
translation_notes:
  revision_awareness: La revisión más reciente dejó el pasaje sin cambios necesarios; el borrador español sigue de cerca la lectura inglesa aprobada y el griego normalizado, sin introducir variantes textuales ni ajustes doctrinales.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y litúrgicamente inteligible, sin calco rígido.
  - Se conserva el paralelismo sintáctico del original griego en dos miembros coordinados.
  - No se introduce puntuación interpretativa adicional ni notas, porque el pasaje no presenta variantes textuales relevantes en el material provisto.
