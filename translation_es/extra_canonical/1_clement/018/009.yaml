translation:
  language: es
  text: 'Aparta tu rostro de mis pecados,

    y borra todas mis iniquidades.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπόστρεψον τὸ πρόσωπόν σου
  english_pob_choice: Turn your face away from my sins
  chosen_spanish: Aparta tu rostro de mis pecados
  alternatives_spanish:
  - Vuelve tu rostro de mis pecados
  - Aparta tu faz de mis pecados
  lexicon: ἀποστρέφω; πρόσωπον
  rationale: El imperativo expresa apartar la mirada o retirar el rostro; «aparta tu rostro» conserva la imagen hebreo-greca y es natural en español. «Rostro» mantiene un registro más actual que «faz» sin perder dignidad.
- source_word: ἁμαρτιῶν
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  lexicon: ἁμαρτία
  rationale: «Pecados» es la correspondencia más directa y clara en español para el término moral-religioso general. Se evita estrecharlo a una sola categoría como «faltas».
- source_word: ἐξάλειψον
  english_pob_choice: blot out
  chosen_spanish: borra
  alternatives_spanish:
  - suprime
  - haz desaparecer
  - rae
  lexicon: ἐξαλείφω
  rationale: «Borra» comunica bien la imagen de eliminar por completo un registro o una culpa, con buena naturalidad en español y fidelidad al verbo griego.
- source_word: ἀνομίας
  english_pob_choice: lawless deeds
  chosen_spanish: iniquidades
  alternatives_spanish:
  - actos de rebeldía
  - maldades
  - ilegalidades
  lexicon: ἀνομία
  rationale: La elección inglesa «lawless deeds» recoge la fuerza de vivir sin ley. En español, «iniquidades» preserva el tono bíblico y el alcance moral sin reducirlo a simple infracción jurídica. Se evita «ilegalidades» por sonar demasiado moderno y restrictivo.
theological_decisions:
- issue: Cómo traducir ἀνομίας sin perder la fuerza ética y de pacto del término
  english_pob_reading: all my lawless deeds
  chosen_spanish_reading: todas mis iniquidades
  alternative_spanish_readings:
  - todos mis actos de rebeldía
  - todas mis maldades
  rationale: El contexto de súplica por perdón exige una palabra que abarque culpa moral y ruptura con la voluntad de Dios. «Iniquidades» mantiene esa densidad teológica mejor que un giro puramente descriptivo.
  doctrine_reference: Arrepentimiento y perdón divino en lenguaje penitencial bíblico
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador conserva el sentido y la estructura del texto griego con equivalencia óptima en español.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de dos miembros, como en el griego y en la traducción inglesa auditada.
  - Se conserva el tono de oración penitencial breve y directo.
  - No se introducen títulos eclesiásticos ni ampliaciones devocionales ajenas al texto.
