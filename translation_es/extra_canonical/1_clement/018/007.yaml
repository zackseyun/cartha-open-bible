    rationale: Aunque reproduce de cerca el inglés auditado, en español suena forzado. El griego λευκανθήσομαι expresa resultado pasivo («seré emblanquecido / quedaré blanco»). «Quedaré más blanco que la nieve» comunica el mismo sentido con mejor naturalidad y dignidad literaria.
