  text: 'Me rociarás con hisopo, y seré purificado;


    me lavarás, y quedaré más blanco que la nieve.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ῥαντιεῖς με
  english_pob_choice: You will sprinkle me
  chosen_spanish: Me rociarás
  alternatives_spanish:
  - Me salpicarás
  - Me asperjarás
  lexicon: ῥαντίζω
  rationale: El verbo griego expresa rociar o asperjar con propósito ritual. «Rociarás» comunica bien la acción en español contemporáneo y mantiene el sentido ceremonial sin sonar técnico en exceso. «Asperjarás» es más preciso cultualmente, pero menos natural para lectura pública.
- source_word: ὑσσώπῳ
  english_pob_choice: with hyssop
  chosen_spanish: con hisopo
  alternatives_spanish:
  - con hisopo de purificación
  lexicon: ὕσσωπος
  rationale: «Hisopo» es la correspondencia directa y reconocible en español bíblico. No se añade glosa porque el texto no la requiere y la imagen ritual ya queda clara por el contexto.
- source_word: καθαρισθήσομαι
  english_pob_choice: I will be cleansed
  chosen_spanish: seré purificado
  alternatives_spanish:
  - seré limpiado
  - seré purificado ritualmente
  lexicon: καθαρίζω
  rationale: El verbo apunta a limpieza/purificación; en este contexto cultual, «purificado» conserva mejor la fuerza ritual que «limpiado», que puede sonar solo higiénico. La forma pasiva mantiene la dependencia del sujeto respecto de la acción ajena.
- source_word: πλυνεῖς με
  english_pob_choice: you will wash me
  chosen_spanish: me lavarás
  alternatives_spanish:
  - me bañarás
  - me limpiarás
  lexicon: πλύνω
  rationale: «Lavarás» es la correspondencia natural y fiel para πλύνω. Mantiene la sencillez del paralelo con el primer hemistiquio.
- source_word: ὑπὲρ χιόνα λευκανθήσομαι
  english_pob_choice: I will be made whiter than snow
  chosen_spanish: seré hecho más blanco que la nieve
  alternatives_spanish:
  - quedaré más blanco que la nieve
  - seré blanqueado más que la nieve
  lexicon: λευκαίνω
  rationale: «Seré hecho más blanco» sigue de cerca la forma pasiva del griego y preserva la comparación absoluta «más que la nieve». «Hecho» evita una lectura demasiado idiomática que perdería el valor resultativo del verbo.
theological_decisions:
- issue: Limpieza ritual y purificación moral
  english_pob_reading: I will be cleansed / I will be made whiter than snow
  chosen_spanish_reading: seré purificado / seré hecho más blanco que la nieve
  alternative_spanish_readings:
  - seré limpiado / seré más blanco que la nieve
  rationale: El griego usa lenguaje de purificación y blanqueamiento en un registro cultual que, en la tradición bíblica, puede abarcar tanto limpieza ritual como renovación moral. El español conserva esa tensión sin explicitar una sola lectura reductiva.
  doctrine_reference: Salmos 51:7; Números 19:18-19
translation_notes:
  revision_awareness: La fuente griega y la traducción inglesa están en alto acuerdo; no se detectaron revisiones aplicadas ni variantes textuales relevantes para esta línea. La redacción española sigue de cerca el paralelismo del original sin introducir glosas.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando la sustitución de términos rituales por equivalentes demasiado cotidianos.
  - Se preservó el paralelismo sintáctico de dos miembros con primera persona pasiva/resultativa en ambos versos.
  - No se usó puntuación o mayúsculas especiales más allá de la norma española; el encabalgamiento reproduce la cadencia del original.
