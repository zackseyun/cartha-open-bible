translation:
  language: es
  text: Líbrame de la culpa de sangre, oh Dios, el Dios de mi salvación.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ῥῦσαί με
  english_pob_choice: Deliver me
  chosen_spanish: Líbrame
  alternatives_spanish:
  - Sálvame
  - Rescátame
  lexicon: ῥύομαι
  rationale: El verbo griego expresa librar o rescatar de un peligro o culpa; «líbrame» conserva la fuerza imperativa-suplicante del original y encaja con el tono litúrgico del verso.
- source_word: ἐξ αἱμάτων
  english_pob_choice: bloodguilt
  chosen_spanish: de la culpa de sangre
  alternatives_spanish:
  - de sangre
  - de sangre derramada
  - de culpabilidad de sangre
  lexicon: αἷμα
  rationale: Aunque la expresión griega dice literalmente «de sangres», el sentido en contexto es una culpa vinculada a derramamiento de sangre. «Culpa de sangre» mantiene el valor moral/judicial sin perder la imagen semítica subyacente.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: θεός
  rationale: Se conserva la invocación directa y vocativa del griego con una forma natural en español.
- source_word: ὁ θεὸς τῆς σωτηρίας μου
  english_pob_choice: the God of my salvation
  chosen_spanish: el Dios de mi salvación
  alternatives_spanish:
  - el Dios que me salva
  - el Dios de mi rescate
  lexicon: θεός / σωτηρία
  rationale: «Salvación» reproduce el sustantivo abstracto del original y coincide con la formulación confesional del texto griego; «Dios de mi salvación» mantiene el genitivo sin suavizarlo demasiado.
theological_decisions:
- issue: Sentido de αἱμάτων como responsabilidad por derramamiento de sangre
  english_pob_reading: bloodguilt
  chosen_spanish_reading: culpa de sangre
  alternative_spanish_readings:
  - sangre
  - culpa por sangre derramada
  rationale: La traducción evita reducir la expresión a un mero dato físico («sangre») y conserva la carga ética y judicial implícita en el griego y en la tradición bíblica de lenguaje de sangre.
  doctrine_reference: Responsabilidad moral por derramamiento de sangre; lenguaje bíblico de culpa
- issue: Título divino final como relación de pertenencia
  english_pob_reading: the God of my salvation
  chosen_spanish_reading: el Dios de mi salvación
  alternative_spanish_readings:
  - el Dios que me salva
  - mi Dios salvador
  rationale: La forma posesiva conserva la relación personal expresada por el genitivo y la resonancia confesional del original, sin introducir una paráfrasis explicativa.
  doctrine_reference: Dios como salvador personal
translation_notes:
  revision_awareness: La versión inglesa reciente permanece sin cambios y muestra alta concordancia con el griego; no se detectan revisiones que requieran ajustes textuales o notas críticas adicionales en español.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se usa «salvación» para σωτηρία y no un equivalente más interpretativo, para preservar la fórmula confesional.
  - No se introduce «SEÑOR» ni «Cristo», ya que el texto no los contiene.
