translation:
  language: es
  text: 'Mi lengua se alegrará en tu justicia.

    Señor, abrirás mi boca,

    y mis labios anunciarán tu alabanza.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγαλλιάσεται ἡ γλῶσσά μου
  english_pob_choice: My tongue will rejoice
  chosen_spanish: Mi lengua se alegrará
  alternatives_spanish:
  - Mi lengua se regocijará
  - Mi lengua saltará de gozo
  lexicon: ἀγαλλιάομαι; γλῶσσα
  rationale: El griego expresa alegría intensa, no solo un estado mental neutro. «Se alegrará» comunica bien ese júbilo en español sin volverlo demasiado ornamental; «lengua» conserva el órgano concreto como en el original y como en la POB inglesa.
- source_word: τὴν δικαιοσύνην σου
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu justicia recta
  lexicon: δικαιοσύνη
  rationale: «Justicia» es la equivalencia más natural y fiel aquí. Mantiene el sentido moral/covenantal del término sin debilitarlo. «Rectitud» sería posible, pero en este contexto resulta menos directo en español.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  - Señor mío
  lexicon: κύριος
  rationale: Aunque el término puede reflejar el nombre divino, en esta cita del salmo la forma vocativa está integrada en la tradición textual griega. En el texto español principal, «Señor» conserva la oración directa y la cadencia del poema; «Yahvé» se habría justificado solo con una identificación explícita aquí, que no se documenta en el audit trail.
- source_word: τὸ στόμα μου ἀνοίξεις
  english_pob_choice: you will open my mouth
  chosen_spanish: abrirás mi boca
  alternatives_spanish:
  - tú abrirás mi boca
  - abrirás mi boca para
  lexicon: στόμα; ἀνοίγω
  rationale: El futuro directo mantiene la acción divina sobre la boca del hablante. Se omite el pronombre explícito «tú» porque el verbo español ya lo marca y la concisión del poema lo favorece.
- source_word: τὰ χείλη μου ἀναγγελεῖ τὴν αἴνεσίν σου
  english_pob_choice: my lips will declare your praise
  chosen_spanish: mis labios anunciarán tu alabanza
  alternatives_spanish:
  - mis labios proclamarán tu alabanza
  - mis labios declararán tu alabanza
  lexicon: χείλη; ἀναγγέλλω; αἴνεσις
  rationale: «Anunciarán» reproduce con naturalidad el valor de comunicar/proclamar de ἀναγγέλλω. «Alabanza» es el equivalente más directo de αἴνεσις y encaja bien con el paralelismo del versículo.
theological_decisions:
- issue: Relación entre κύριε y la referencia al nombre divino en la cita
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Señor (con nota sobre el posible trasfondo del nombre divino)
  rationale: La fuente griega ofrece κύριε en vocativo, y la POB inglesa lo traduce «Lord» sin nota. Para mantener fidelidad al texto recibido y evitar introducir una identificación no explicitada en el audit trail, el texto principal usa «Señor».
  doctrine_reference: Cita poética del Salmo; no se añade una afirmación doctrinal nueva
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia entre la versión inglesa POB y el griego normalizado: no hubo revisiones aplicadas y el control de calidad final indicó acuerdo total. Por eso la redacción española sigue de cerca la estructura del original, con ajustes mínimos de naturalidad.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético en dos miembros, como en el griego y en la POB inglesa.
  - Se conserva «justicia» para δικαιοσύνη y «alabanza» para αἴνεσις, evitando suavizar el lenguaje.
  - No se introduce «Yahvé» en el cuerpo del texto porque la evidencia de audit trail para esta cita concreta favorece la traducción vocativa simple de κύριε como «Señor».
