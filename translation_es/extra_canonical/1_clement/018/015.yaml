  glossary_alignment: El borrador sigue bien las preferencias del proyecto salvo la cuestión contextual de κύριε. Aquí «Señor» es defendible porque la fuente inmediata es griega y el audit trail inglés usa «Lord» sin nota; no hace falta forzar «Yahvé» en el texto principal en esta cita. No hay otros conflictos terminológicos relevantes.
