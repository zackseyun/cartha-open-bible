translation:
  language: es
  text: Porque, he aquí, en iniquidades fui concebido, y en pecados mi madre me dio a luz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me amamantó».
    reason: previous_rendering
lexical_decisions:
- source_word: ἀνομίαις
  english_pob_choice: lawless deeds
  chosen_spanish: iniquidades
  alternatives_spanish:
  - actos ilícitos
  - obras de iniquidad
  - maldades
  lexicon: ἀνομία
  rationale: El griego apunta a la condición o práctica de violar la ley; «iniquidades» conserva bien el peso moral y bíblico sin sonar más estrecho que «actos ilícitos».
- source_word: συνελήμφθην
  english_pob_choice: I was conceived
  chosen_spanish: fui concebido
  alternatives_spanish:
  - fui engendrado
  - fui gestado
  lexicon: συλλαμβάνω
  rationale: La revisión inglesa corrigió un error previo y fijó el sentido de concepción; en español «fui concebido» expresa con claridad el mismo valor pasivo.
- source_word: ἐκίσσησέν με
  english_pob_choice: my mother bore me
  chosen_spanish: me dio a luz
  alternatives_spanish:
  - me parió
  - me alumbró
  lexicon: κισσάω
  rationale: El seguimiento del audio-tajo inglés distingue este verbo del primero y evita repetir «concebido»; «dio a luz» refleja el nacimiento sin reducir el matiz a lactancia, que fue descartada por la revisión textual.
- source_word: μήτηρ μου
  english_pob_choice: my mother
  chosen_spanish: mi madre
  alternatives_spanish:
  - mi madre
  lexicon: μήτηρ
  rationale: Correspondencia directa y natural en español.
theological_decisions:
- issue: Cita de un salmo penitencial aplicada en 1 Clemente
  english_pob_reading: For behold, in lawless deeds I was conceived, and in sins my mother bore me.
  chosen_spanish_reading: Porque, he aquí, en iniquidades fui concebido, y en pecados me dio a luz mi madre.
  alternative_spanish_readings:
  - Pues he aquí, en maldad fui concebido, y en pecado me dio a luz mi madre.
  - He aquí que en iniquidades fui concebido, y en pecados me dio a luz mi madre.
  rationale: Se mantiene el valor de confesión moral del texto sin suavizar la tensión sobre la condición humana desde el origen. No se introduce lenguaje doctrinal ajeno al griego ni se borra el paralelismo poético.
  doctrine_reference: Salmo 50:7 (LXX); 1 Clemente 18:5
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió el primer verbo desde un falso sentido de «nursed me» a «conceived me», y luego distinguió el segundo verbo como «bore me» para no colapsar dos verbos griegos diferentes. La versión española sigue esa distinción con «fui concebido» / «me dio a luz».
  spanish_consistency_notes:
  - Se conserva el registro bíblico y sobrio sin caer en arcaísmos innecesarios.
  - «Iniquidades» reproduce mejor la carga ética de ἀνομίαις que una traducción demasiado general como «maldades».
  - La nota de pie se limita a una alternativa léxica real y no reabre la corrección ya establecida por la revisión textual.
