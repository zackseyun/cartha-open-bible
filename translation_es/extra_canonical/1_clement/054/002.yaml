- from: 'Que diga[a]: «Si por causa de mí hay facción, contienda y divisiones, me retiro, me aparto adonde quieran, y haré lo que mande la multitud. Solo que el rebaño de Cristo[b] viva en paz con los presbíteros establecidos[c]».'
  to: 'Que diga: «Si por causa de mí hay facción, contienda y divisiones, me retiro, me aparto adonde quieran, y haré lo que mande la multitud. Solo que el rebaño del Mesías viva en paz con los presbíteros establecidos[a]».'
  rationale: Se cambió 'Cristo' por 'Mesías' para ajustarse a la terminología del proyecto y al rastro inglés auditado. Se eliminaron las notas mal ancladas y se conservó una sola nota, anclada correctamente al sintagma final, para preservar la alternativa documentada por el inglés. El resto del español se mantuvo por ser fiel y natural.
