review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: la exhortación de tercera persona, la triple descripción del conflicto, la doble retirada, la sumisión a lo que ordene la multitud y el deseo de paz del rebaño con los presbíteros. Sin embargo, no preserva adecuadamente la decisión terminológica del proyecto para Χριστός, ya que el inglés auditado terminó en ''Messiah'' y la política española pide normalmente ''Mesías'' cuando el término es título.'
  spanish_quality_summary: 'El español es claro y legible. ''Que diga'' y ''viva en paz'' son naturales. ''Me retiro, me aparto'' funciona, aunque ''me voy'' sería más directo; no es necesario cambiarlo. El principal problema de calidad/proyecto está en las notas: las marcas están mal ancladas y las notas no corresponden a los lugares correctos del texto. Además, poner nota alternativa en ''Cristo'' para ''del Mesías'' invierte la prioridad terminológica del proyecto.'
  glossary_alignment: 'Desalineado en Χριστός: debe ir ''Mesías'' en el texto principal en este contexto, no ''Cristo'', salvo carve-out documentado, que aquí no existe; de hecho el rastro inglés corrigió de nuevo a ''Messiah''. ''Presbíteros'' para πρεσβυτέρων es adecuado. ''Establecidos'' para καθεσταμένων es aceptable, aunque ''designados'' o ''nombrados'' sería algo más transparente; no exige cambio. No hay otros choques importantes con el glosario del proyecto.'
  issues:
  - severity: high
    issue: Χριστός se tradujo como 'Cristo' en vez de 'Mesías'.
    rationale: La política del proyecto indica usar normalmente 'Mesías' cuando el original usa el título Χριστός. El historial inglés restauró explícitamente 'Messiah' por política doctrinal. La justificación del borrador afirma erróneamente que el inglés final volvió a 'Cristo'.
  - severity: high
    issue: Las notas al pie están mal vinculadas a las marcas del texto.
    rationale: La marca [a] está en 'Que diga', pero la nota a habla de 'Con los presbíteros que han sido establecidos'. La marca [b] está en 'Cristo', y la c está en 'establecidos'; por tanto las notas deben corresponder a esos anclajes exactos y en orden único.
  - severity: medium
    issue: La nota sobre 'presbíteros establecidos' no refleja con precisión la razón de la nota inglesa.
    rationale: La nota inglesa preserva una formulación alternativa completa para el sintagma 'with the elders who have been appointed'. En español conviene anclar la nota al sintagma de los presbíteros, no a 'Que diga'.
  revised_spanish_text: 'Que diga: «Si por causa de mí hay facción, contienda y divisiones, me retiro, me aparto adonde quieran, y haré lo que mande la multitud. Solo que el rebaño del Mesías viva en paz con los presbíteros establecidos[a]».'
  revised_footnotes:
  - marker: a
    text: 'O: «con los presbíteros que han sido establecidos».'
    reason: previous_rendering
  revision_rationale: Se cambió 'Cristo' por 'Mesías' para ajustarse a la terminología del proyecto y al rastro inglés auditado. Se eliminaron las notas mal ancladas y se conservó una sola nota, anclada correctamente al sintagma final, para preservar la alternativa documentada por el inglés. El resto del español se mantuvo por ser fiel y natural.
