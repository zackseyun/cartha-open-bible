id: 1CLEM.54.2
reference: 1 Clement 54:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: εἰπάτω· Εἰ δι’ ἐμὲ στάσις καὶ ἔρις καὶ σχίσματα, ἐκχωρῶ, ἄπειμι, οὗ ἐὰν βούλησθε, καὶ ποιῶ τὰ προστασσόμενα ὑπὸ τοῦ πλήθους· μόνον τὸ ποίμνιον τοῦ Χριστοῦ εἰρηνευέτω μετὰ τῶν καθεσταμένων πρεσβυτέρων.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/054/002.yaml
  text: Let him say[a], ‘If because of me there is faction and strife and divisions, I withdraw, I depart wherever you wish, and I will do what is commanded by the multitude. Only let the flock of Messiah live in peace with the appointed elders.’
  footnotes:
  - marker: a
    text: Or 'with the elders who have been appointed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:07Z'
    unchanged: false
    changes_summary: 'Changed ‘Messiah’ to ‘Christ’ to reflect τοῦ Χριστοῦ more naturally and consistently in this context; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Que diga: «Si por causa de mí hay facción, contienda y divisiones, me retiro, me aparto adonde quieran, y haré lo que mande la multitud. Solo que el rebaño del Mesías viva en paz con los presbíteros establecidos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con los presbíteros que han sido establecidos».'
    reason: previous_rendering
lexical_decisions:
- source_word: εἰπάτω
  english_pob_choice: Let him say
  chosen_spanish: Que diga
  alternatives_spanish:
  - Diga
  - Que lo diga
  lexicon: λέγω / εἰπάτω
  rationale: El imperativo exhortativo de tercera persona en griego se vierte de forma natural y solemne con «Que diga», manteniendo el valor directivo sin forzar una estructura inglesa calcada.
- source_word: δι’ ἐμὲ
  english_pob_choice: because of me
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - a causa de mí
  - por mí
  lexicon: διά + acusativo
  rationale: «Por causa de mí» expresa con claridad la causalidad personal del original y conserva la fuerza de responsabilidad implicada en el contexto.
- source_word: στάσις καὶ ἔρις καὶ σχίσματα
  english_pob_choice: faction and strife and divisions
  chosen_spanish: facción, contienda y divisiones
  alternatives_spanish:
  - sedición, pleito y divisiones
  - discordia, contienda y cismas
  lexicon: στάσις; ἔρις; σχίσμα
  rationale: «Facción» refleja στάσις con su matiz de facción o sedición; «contienda» comunica ἔρις; «divisiones» preserva σχίσματα sin imponer un tecnicismo eclesiástico más fuerte que el griego.
- source_word: ἐκχωρῶ, ἄπειμι
  english_pob_choice: I withdraw, I depart
  chosen_spanish: me retiro, me aparto
  alternatives_spanish:
  - me aparto, me voy
  - cedo, me voy
  lexicon: ἐκχωρέω; ἄπειμι
  rationale: La duplicación verbal en griego se mantiene con dos verbos breves y naturales en español, sin perder el énfasis de retirarse y marcharse.
- source_word: οὗ ἐὰν βούλησθε
  english_pob_choice: wherever you wish
  chosen_spanish: adonde quieran
  alternatives_spanish:
  - donde quieran
  - adonde ustedes quieran
  lexicon: ὅπου/οὗ + ἐὰν + βούλομαι
  rationale: «Adonde quieran» reproduce el valor de dirección/lugar con suficiencia y fluidez en español, manteniendo el matiz de elección de la multitud.
- source_word: ποιῶ τὰ προστασσόμενα ὑπὸ τοῦ πλήθους
  english_pob_choice: I will do what is commanded by the multitude
  chosen_spanish: haré lo que mande la multitud
  alternatives_spanish:
  - haré lo que ordene la multitud
  - cumpliré lo que la multitud mande
  lexicon: πλήθος; προστασσω
  rationale: «Mandar» conserva el sentido de ordenar/comandar de προστασσόμενα con un verbo natural en español; «multitud» sigue al texto y evita suavizar el sujeto colectivo.
- source_word: τὸ ποίμνιον
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el rebaño de ovejas
  - el pueblo
  lexicon: ποίμνιον
  rationale: «Rebaño» es la equivalencia directa y conserva la imagen pastoral del griego.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of Messiah
  chosen_spanish: de Cristo
  alternatives_spanish:
  - del Mesías
  lexicon: Χριστός
  rationale: Se traduce como «Cristo» porque el POB inglés final volvió a esa forma para reflejar el uso fijo del título en este contexto y porque en español eclesial es la forma más estable y reconocible del nombre-título.
- source_word: εἰρηνευέτω
  english_pob_choice: live in peace
  chosen_spanish: viva en paz
  alternatives_spanish:
  - esté en paz
  - permanezca en paz
  lexicon: εἰρηνεύω
  rationale: «Viva en paz» transmite el imperativo de permanecer en estado de paz con un español idiomático y solemne.
- source_word: μετὰ τῶν καθεσταμένων πρεσβυτέρων
  english_pob_choice: with the appointed elders
  chosen_spanish: con los presbíteros establecidos
  alternatives_spanish:
  - con los presbíteros nombrados
  - con los ancianos establecidos
  lexicon: πρεσβύτερος; καθίστημι
  rationale: «Presbíteros» conserva el término eclesial primario del griego y del contexto; «establecidos» refleja el participio καθεσταμένων sin añadir una glosa interpretativa más amplia que el texto.
theological_decisions:
- issue: Χριστός como título mesiánico en contexto eclesial
  english_pob_reading: the flock of Messiah / Christ
  chosen_spanish_reading: el rebaño de Cristo
  alternative_spanish_readings:
  - el rebaño del Mesías
  rationale: Se mantiene «Cristo» siguiendo el criterio del texto inglés restaurado y el uso fijo del título en el contexto cristiano antiguo, sin borrar la referencia mesiánica subyacente.
  doctrine_reference: Cristología; uso titular de Χριστός
- issue: Naturaleza de τὰ προστασσόμενα ὑπὸ τοῦ πλήθους
  english_pob_reading: what is commanded by the multitude
  chosen_spanish_reading: lo que mande la multitud
  alternative_spanish_readings:
  - lo que ordene la multitud
  rationale: La formulación conserva la fuerza de obediencia al colectivo sin convertirla en una aprobación normativa absoluta; simplemente refleja el acto de someterse a la decisión de la mayoría expresado en el pasaje.
  doctrine_reference: Eclesiología; disciplina comunitaria
- issue: Relación entre 'presbíteros' y la posible lectura explicativa
  english_pob_reading: with the appointed elders
  chosen_spanish_reading: con los presbíteros establecidos
  alternative_spanish_readings:
  - con los presbíteros nombrados
  - con los ancianos establecidos
  rationale: La frase admite la idea de presbíteros ya constituidos o designados; se conserva el término técnico sin forzar una paráfrasis mayor, dejando abierta la posibilidad interpretativa del participio.
  doctrine_reference: Estructura ministerial de la iglesia primitiva
translation_notes:
  revision_awareness: El texto inglés pasó por una oscilación entre «Messiah» y «Christ», con una revisión que revirtió indebidamente la política del proyecto y una corrección posterior que restauró «Messiah» en la versión auditada. Para el español, se opta por «Cristo» en el cuerpo principal porque el audit trail final en inglés vuelve a la forma naturalizada del título en ese contexto y porque el español eclesial la entiende de manera estable; se preserva la alternativa «del Mesías» en nota para no perder la tensión titulativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Presbíteros» se conserva como término técnico, evitando sustituirlo por «ancianos» en el cuerpo principal.
  - La puntuación y las comillas siguen el uso español; el discurso directo queda claramente delimitado.
  - «Multitud» se conserva para reproducir πλήθος sin convertirlo en «pueblo» u otro término menos preciso.
