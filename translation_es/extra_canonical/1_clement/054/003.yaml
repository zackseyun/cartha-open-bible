id: 1CLEM.54.3
reference: 1 Clement 54:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: τοῦτο ὁ ποιήσας ἑαυτῷ μέγα κλέος ἐν Χριστῷ περιποιήσεται, καὶ πᾶς τόπος δέξεται αὐτόν. τοῦ γὰρ κυρίου ἡ γῆ καὶ τὸ πλήρωμα αὐτῆς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/054/003.yaml
  text: The one who does this will obtain for himself great renown in Messiah[a], and every place will receive him. For the earth is the Lord’s, and its fullness.
  footnotes:
  - marker: a
    text: Or 'The man who has done this'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:08Z'
    unchanged: false
    changes_summary: 'Changed ''honor'' to ''renown'' for closer alignment with μέγα κλέος, and ''the Messiah'' to ''Christ'' to reflect the Greek ἐν Χριστῷ more directly and naturally in this context. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: El que haga esto obtendrá para sí gran renombre en el Mesías[a], y todo lugar lo recibirá. Porque de Yahvé es la tierra y su plenitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que ha hecho esto».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ποιήσας
  english_pob_choice: The one who does this
  chosen_spanish: El que haga esto
  alternatives_spanish:
  - El que hace esto
  - El que ha hecho esto
  lexicon: participio sustantivado / relativa sustantiva
  rationale: El griego usa un participio aoristo sustantivado; el sentido es general y proverbial. En español, «El que haga esto» conserva la referencia abierta y evita imponer «el hombre», que no está en el griego.
- source_word: μέγα κλέος
  english_pob_choice: great renown
  chosen_spanish: gran renombre
  alternatives_spanish:
  - gran fama
  - gran honra
  lexicon: κλέος
  rationale: κλέος apunta a renombre o fama pública, no solo a honor abstracto. «Gran renombre» reproduce mejor esa fuerza y mantiene la dignidad del registro.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: Χριστός
  rationale: Siguiendo la política del proyecto para Χριστός como título, «Mesías» preserva el matiz titular y evita la forma litúrgica fija «Cristo» cuando no es necesaria.
- source_word: πᾶς τόπος δέξεται αὐτόν
  english_pob_choice: every place will receive him
  chosen_spanish: todo lugar lo recibirá
  alternatives_spanish:
  - cada lugar lo recibirá
  - todo lugar lo acogerá
  lexicon: δέχομαι
  rationale: «Recibirá» es fiel al verbo de acoger/recibir y funciona bien en español. «Todo lugar» conserva la universalidad del sujeto.
- source_word: τοῦ γὰρ κυρίου ἡ γῆ
  english_pob_choice: For the earth is the Lord’s
  chosen_spanish: Porque de Yahvé es la tierra
  alternatives_spanish:
  - Porque la tierra es del Señor
  - Porque la tierra pertenece a Yahvé
  lexicon: κυρίου / divine name citation
  rationale: Aunque el griego dice κυρίου, aquí cita el lenguaje bíblico de posesión divina. Conforme al estándar del proyecto, se explicita «Yahvé» en el texto principal para no ocultar el nombre divino detrás de «Señor».
- source_word: τὸ πλήρωμα αὐτῆς
  english_pob_choice: its fullness
  chosen_spanish: su plenitud
  alternatives_spanish:
  - todo lo que la llena
  - su abundancia
  lexicon: πλήρωμα
  rationale: «Plenitud» preserva el sustantivo abstracto y su eco bíblico sin ampliar innecesariamente el alcance del término.
theological_decisions:
- issue: Título mesiánico frente a forma nominal fija
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto usa ἐν Χριστῷ como título; en español, «Mesías» conserva el sentido titular y la decisión del POB de evitar «Cristo» cuando no sea una forma fija o litúrgica necesaria.
  doctrine_reference: 'DOCTRINE.md: Χριστός se rinde normalmente como Mesías.'
- issue: Cita divina en τοῦ κυρίου
  english_pob_reading: the Lord’s
  chosen_spanish_reading: de Yahvé
  alternative_spanish_readings:
  - del Señor
  rationale: La frase reproduce una fórmula bíblica de posesión divina. La política del proyecto pide usar «Yahvé» en el texto principal cuando se trata del nombre divino oculto por κύριος, por lo que la cita se transparenta sin máscara reverencial.
  doctrine_reference: 'DOCTRINE.md: יהוה / YHWH -> Yahvé.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «honor» a «renown» por μέγα κλέος y restauró «Messiah» tras un cambio indebido a «Christ». La versión española sigue esa línea al usar «gran renombre» y «Mesías», sin aplanar la distinción titular.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en la cita de Sal 24:1 / 1 Co 10:26 según la política del proyecto.
  - Se evita «Cristo» como nombre fijo en favor de «Mesías» para reflejar Χριστός como título.
  - «Recibirá» conserva la personificación de «todo lugar» sin añadir interpretación.
  - La nota alternativa refleja la ambigüedad temporal del participio aoristo sin forzar un tiempo específico en el texto principal.
