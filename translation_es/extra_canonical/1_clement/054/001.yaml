revisions:
- from: '¿Quién, pues, entre ustedes es noble[a]? ¿Quién es compasivo? ¿Quién está lleno de amor? Que diga: «Si por causa de mí hay facción, contienda y divisiones, me aparto, me voy adonde ustedes quieran, y haré lo que mande la multitud. Solo que el rebaño del Mesías permanezca en paz con los ancianos que han sido establecidos[b]». El que haga esto obtendrá para sí gran honor en el Mesías, y todo lugar lo recibirá. Porque de Yahvé es la tierra y su plenitud. Estas cosas las hicieron y las harán quienes viven la forma de vida de Dios que no deja arrepentimiento[c].'
  to: '¿Quién, pues, entre ustedes es noble[a]? ¿Quién es compasivo? ¿Quién está colmado de amor? Que diga: «Si por causa de mí hay facción, contienda y divisiones, me aparto, me voy a donde ustedes quieran, y haré lo que mande la multitud. Solo que el rebaño del Mesías viva en paz con los ancianos que han sido nombrados[b]». Quien haya hecho esto obtendrá para sí gran honor en Mesías, y todo lugar lo recibirá. Porque de Yahvé es la tierra y su plenitud. Estas cosas las hicieron y las harán quienes viven la manera de vida de Dios que no trae pesar[c].'
  rationale: 'Se ajusta el texto para mayor fidelidad y mejor español: «colmado de amor» expresa mejor πεπληροφορημένος ἀγάπης; «nombrados» comunica naturalmente καθεσταμένων; «Quien haya hecho esto» refleja mejor el participio aoristo; «viva en paz» reproduce mejor el valor durativo de εἰρηνευέτω; y la cláusula final se rehace para conservar la dificultad de ἀμεταμέλητον πολιτείαν τοῦ θεοῦ sin caer en una formulación confusa o poco idiomática.'
