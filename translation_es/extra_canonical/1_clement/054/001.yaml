base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/054/001.yaml
  text: Who then among you is noble? Who is compassionate? Who is full of love? Let him say, ‘If because of me there is faction and strife and divisions, I withdraw, I depart wherever you wish, and I will do what is commanded by the multitude. Only let the flock of the Messiah live in peace with the elders who have been appointed.’ The one who has done this will obtain for himself great honor in Messiah, and every place will receive him. For the earth is the Lord’s, and its fullness. These things those who live the unregretted way of life of God have done and will do.
