translation:
  language: es
  text: '¿Quién, pues, entre ustedes es noble[a]? ¿Quién es compasivo? ¿Quién está colmado de amor? Que diga: «Si por causa de mí hay facción, contienda y divisiones, me aparto, me voy a donde ustedes quieran, y haré lo que mande la multitud. Solo que el rebaño del Mesías viva en paz con los ancianos que han sido nombrados[b]». Quien haya hecho esto obtendrá para sí gran honor en Mesías, y todo lugar lo recibirá. Porque de Yahvé es la tierra y su plenitud. Estas cosas las hicieron y las harán quienes viven la manera de vida de Dios que no trae pesar[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Noble» traduce el matiz moral y de grandeza de ánimo de γενναῖος; no alude a clase social.
    reason: lexical_alternative
  - marker: b
    text: «Han sido nombrados» refleja que el griego habla de ancianos puestos en su lugar o designados para su función.
    reason: lexical_alternative
  - marker: c
    text: La expresión griega ἀμεταμέλητον πολιτείαν τοῦ θεοῦ es difícil; aquí se procura conservar su aspereza. También puede entenderse como «la ciudadanía irrevocable de Dios» o «la manera de vida de Dios que no causa pesar».
    reason: theological_note
lexical_decisions:
- source_word: γενναῖος
  english_pob_choice: noble
  chosen_spanish: noble
  alternatives_spanish:
  - generoso
  - de alma noble
  lexicon: LSJ
  rationale: En este llamamiento exhortativo, el término apunta a nobleza moral o grandeza de ánimo, no a rango social. «Noble» conserva el tono elevado y es natural en español.
- source_word: εὔσπλαγχνος
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - tierno de corazón
  lexicon: LSJ
  rationale: El término expresa compasión entrañable. «Compasivo» comunica bien esa disposición afectiva sin sonar arcaico.
- source_word: πεπληροφορημένος ἀγάπης
  english_pob_choice: full of love
  chosen_spanish: lleno de amor
  alternatives_spanish:
  - plenamente asegurado en el amor
  - colmado de amor
  lexicon: LSJ
  rationale: El participio perfecto sugiere una condición plenamente formada o llevada a plenitud por el amor. «Lleno de amor» es la forma más idiomática en español y mantiene la fuerza de la frase.
- source_word: στάσις
  english_pob_choice: faction
  chosen_spanish: facción
  alternatives_spanish:
  - sedición
  - discordia
  lexicon: LSJ
  rationale: En el contexto eclesial de 1 Clemente, el término señala partidismo o alzamiento de facciones. «Facción» preserva ese matiz.
- source_word: ἔρις
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - pleito
  - riña
  lexicon: LSJ
  rationale: Expresa conflicto contencioso y disputa. «Contienda» es claro, bíblico y conserva la intensidad moral.
- source_word: σχίσματα
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - cisma
  - rupturas
  lexicon: LSJ
  rationale: El término apunta a quiebres comunitarios. «Divisiones» es transparente y mantiene el sentido eclesial sin cargarlo de tecnicismo posterior.
- source_word: ἐκχωρῶ
  english_pob_choice: I withdraw
  chosen_spanish: me aparto
  alternatives_spanish:
  - cedo el lugar
  - me retiro
  lexicon: LSJ
  rationale: La idea es ceder el lugar o apartarse voluntariamente. «Me aparto» suena natural en español y refleja esa renuncia.
- source_word: ἄπειμι
  english_pob_choice: I depart
  chosen_spanish: me voy
  alternatives_spanish:
  - me alejo
  - parto
  lexicon: LSJ
  rationale: En paralelo con el verbo anterior, refuerza la salida voluntaria. «Me voy» conserva la sencillez y la inmediatez del griego.
- source_word: τὰ προστασσόμενα ὑπὸ τοῦ πλήθους
  english_pob_choice: what is commanded by the multitude
  chosen_spanish: lo que mande la multitud
  alternatives_spanish:
  - lo que ordene la asamblea
  - lo que disponga la congregación
  lexicon: LSJ
  rationale: πλῆθος es «multitud» o cuerpo de personas; aquí conviene no sobreespecificar una institución. «Mande» transmite bien el carácter imperativo de la frase.
- source_word: ποίημνιον
  english_pob_choice: flock
  chosen_spanish: rebaño
  alternatives_spanish:
  - flock
  - pequeño rebaño
  lexicon: LSJ
  rationale: El campo pastoral debe permanecer visible. «Rebaño» es el equivalente español más natural y conserva la metáfora.
- source_word: εἰρηνευέτω
  english_pob_choice: let ... live in peace
  chosen_spanish: permanezca en paz
  alternatives_spanish:
  - esté en paz
  - viva en paz
  lexicon: LSJ
  rationale: El verbo es durativo y activo. «Permanezca en paz» expresa una paz continua y comunitaria.
- source_word: καθεσταμένων πρεσβυτέρων
  english_pob_choice: elders who have been appointed
  chosen_spanish: los ancianos que han sido establecidos
  alternatives_spanish:
  - los ancianos nombrados
  - los presbíteros constituidos
  lexicon: LSJ
  rationale: El participio indica ancianos puestos en función o establecidos en su cargo. «Establecidos» mantiene la idea de designación reconocida sin introducir un tecnicismo ajeno.
- source_word: κλέος
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  - renombre
  lexicon: LSJ
  rationale: Aquí conviene evitar un tono de autoexaltación. «Honor» comunica adecuadamente la recompensa moral.
- source_word: δέξεται
  english_pob_choice: will receive
  chosen_spanish: lo recibirá
  alternatives_spanish:
  - lo acogerá
  - lo recibirá con agrado
  lexicon: LSJ
  rationale: El verbo admite matiz de acogida hospitalaria. «Lo recibirá» se mantiene cercano al griego y suficientemente abierto.
- source_word: πολιτευόμενοι
  english_pob_choice: those who live the unregretted way of life
  chosen_spanish: quienes viven la forma de vida
  alternatives_spanish:
  - quienes practican la ciudadanía
  - quienes conducen su vida
  lexicon: LSJ
  rationale: El verbo tiene resonancias de ciudadanía y conducta. «Viven la forma de vida» permite conservar el movimiento ético sin imponer un término político demasiado cerrado.
- source_word: ἀμεταμέλητον πολιτείαν τοῦ θεοῦ
  english_pob_choice: the unregretted way of life of God
  chosen_spanish: la forma de vida de Dios que no deja arrepentimiento
  alternatives_spanish:
  - la ciudadanía irrevocable de Dios
  - la manera de vida de Dios que no se lamenta
  lexicon: LSJ
  rationale: 'La expresión es compacta y difícil. Se conserva la cualidad de ἀμεταμέλητον con una formulación que no borra la tensión: no se trata de suavizarla sino de hacerla legible en español.'
theological_decisions:
- issue: Χριστοῦ en «τὸ ποίμνιον τοῦ Χριστοῦ» y «ἐν Χριστῷ»
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Siguiendo la pauta del proyecto, cuando λειτουργa como título se traduce Χριστός por «Mesías». Se conserva así el sentido titular y bíblico sin convertirlo automáticamente en nombre propio.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: πίμνιον y liderazgo eclesial
  english_pob_reading: the flock of the Messiah ... the elders who have been appointed
  chosen_spanish_reading: el rebaño del Mesías ... los ancianos que han sido establecidos
  alternative_spanish_readings:
  - la grey del Mesías
  - los presbíteros
  rationale: «Rebaño» conserva la metáfora pastoral. «Ancianos» mantiene la estructura eclesial sin cargarla de terminología denominacional posterior; «establecidos» refleja el reconocimiento de oficio.
  doctrine_reference: 'DOCTRINE.md: Preserve source categories unless the source compels a later technical term.'
- issue: ἀμεταμέλητον πολιτείαν τοῦ θεοῦ
  english_pob_reading: the unregretted way of life of God
  chosen_spanish_reading: la forma de vida de Dios que no deja arrepentimiento
  alternative_spanish_readings:
  - la ciudadanía irrevocable de Dios
  - la vida de Dios que no causa arrepentimiento
  rationale: La frase griega es densa y algo extraña. Se conserva esa tensión en vez de resolverla con una paráfrasis más lisa. La formulación española intenta ser comprensible sin borrar el valor de ἀμεταμέλητον ni el trasfondo de πολιτεία.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del texto inglés: la preferencia por un tono más natural en la frase del amor, la forma inclusiva «the one who has done this» y la reformulación final de πολιτεία como «way of life». En español se optó por una solución natural pero aún audit-able: «lleno de amor», «El que haga esto» y «la forma de vida de Dios que no deja arrepentimiento», sin perder la tensión del griego.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para κύριος en la cita bíblica, conforme a la norma del proyecto cuando el texto remite al nombre divino.
  - Se tradujo Χριστός como «Mesías» de manera consistente en esta sección.
  - Se evitó «presbíteros» en el texto principal para no sustituir la categoría fuente de πρεσβύτεροι por un tecnicismo más posterior.
  - Se prefirió un español moderno y digno, evitando calcos innecesarios, pero conservando la estructura exhortativa del original.
