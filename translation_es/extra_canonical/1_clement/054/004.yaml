  text: ταῦτα οἱ πολιτευόμενοι τὴν ἀμεταμέλητον πολιτείαν τοῦ θεοῦ ἐποίησαν καὶ ποιήσουσιν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/054/004.yaml
  text: These things those who live in God's unrepented way of life have done and will do[a].
  footnotes:
  - marker: a
    text: Or 'live out the unrepented citizenship'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:09Z'
    unchanged: false
    changes_summary: 'Revised awkward and inaccurate phrasing: rendered πολιτευόμενοι as ''live in,'' moved ''God''s'' to a more natural possessive position, and replaced ''unregretted'' with ''unrepented'' for ἀμεταμέλητον.'
translation:
  language: es
  text: Estas cosas las hicieron y las harán los que viven según el modo de vida[a] de Dios, del que no hay que arrepentirse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conducta». El griego πολιτεία aquí se refiere a la manera de vivir o conducirse, no necesariamente a «ciudadanía» en sentido político.'
    reason: alternative_reading
lexical_decisions:
- source_word: πολιτευόμενοι
  english_pob_choice: those who live in
  chosen_spanish: los que viven en
  alternatives_spanish:
  - los que se conducen en
  - los que llevan una vida
  lexicon: πολιτεύομαι
  rationale: El contexto y la revisión inglesa indican una idea de conducta o modo de vivir, no de ciudadanía política estricta. «Viven en» conserva la construcción participial con naturalidad en español y evita introducir un sentido institucional ajeno al pasaje.
- source_word: ἀμεταμέλητον
  english_pob_choice: unrepented / unregretted
  chosen_spanish: que no deja arrepentimiento
  alternatives_spanish:
  - irreprochable
  - sin arrepentimiento
  - de la que no hay que arrepentirse
  lexicon: ἀμεταμέλητος
  rationale: La revisión inglesa corrigió el falso «unrepented» y recuperó la idea de algo que no se lamenta ni se lamentará. En español, «que no deja arrepentimiento» expresa con claridad que esa conducta no produce remordimiento o arrepentimiento posterior.
- source_word: πολιτείαν
  english_pob_choice: way of life
  chosen_spanish: conducta
  alternatives_spanish:
  - modo de vida
  - vida
  - ciudadanía
  lexicon: πολιτεία
  rationale: La nota de revisión indica que el valor aquí es «way of life» o conducta, no «citizenship» en sentido político. «Conducta» es breve, natural y mantiene el matiz de comportamiento observable.
- source_word: τοῦ θεοῦ
  english_pob_choice: God's
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  - divina
  lexicon: θεός
  rationale: Se mantiene el genitivo posesivo simple porque el griego lo permite y el contexto habla de una forma de vivir vinculada a Dios. No se requiere una paráfrasis adicional.
- source_word: ταῦτα ... ἐποίησαν καὶ ποιήσουσιν
  english_pob_choice: These things ... have done and will do
  chosen_spanish: Estas cosas las hicieron y las harán
  alternatives_spanish:
  - Estas cosas hicieron y harán
  - Esto es lo que hicieron y harán
  lexicon: ταῦτα / ἐποίησαν / ποιήσουσιν
  rationale: 'La repetición de tiempo verbal se conserva para reflejar el paralelismo del griego: una acción ya realizada y otra que continuará. «Las hicieron y las harán» mantiene el objeto explícito sin sobrecargar la sintaxis.'
theological_decisions:
- issue: Sentido moral positivo de ἀμεταμέλητος
  english_pob_reading: live in God's unrepented way of life / unregretted way of life
  chosen_spanish_reading: conducta de Dios que no deja arrepentimiento
  alternative_spanish_readings:
  - conducta de Dios de la que no hay que arrepentirse
  - conducta divina sin arrepentimiento
  rationale: Se evita la lectura invertida «sin arrepentimiento» aplicada a una vida de pecado. El griego describe una forma de vida que no produce pesar ni arrepentimiento; la formulación elegida conserva ese valor positivo sin suavizarlo.
  doctrine_reference: BDAG s.v. ἀμεταμέλητος; revisión auditable del texto inglés
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió dos puntos decisivos: ἀμεταμέλητον no significa «unrepented» en el sentido moral negativo, y πολιτεία aquí no debe traducirse como «citizenship» político. La versión española sigue esa adjudicación y evita calcar la lectura anterior rechazada.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y se conserva «Dios» como en el griego fuente.
  - Se prefiere «conducta» frente a «ciudadanía» por la revisión textual y semántica del pasaje.
  - La nota [a] está anclada en el texto para sostener la ambigüedad léxica de πολιτεία sin introducir una glosa no marcada.
