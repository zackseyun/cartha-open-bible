review_pass:
  verdict: revise
  source_alignment_summary: 'El griego dice literalmente: «Estas cosas hicieron y harán los que llevan/viven la πολιτεία de Dios, ἀμεταμέλητον». El borrador capta bien πολιτεία como conducta/modo de vida y conserva el paralelismo verbal. Sin embargo, «que no deja arrepentimiento» suena poco natural y puede sugerir el sentido equivocado de ‘sin arrepentirse’, mientras que ἀμεταμέλητον aquí expresa ‘de la que no hay que arrepentirse / sin pesar’, es decir, un modo de vida no lamentable.'
  spanish_quality_summary: El español es en general claro, pero «viven en la conducta de Dios» resulta algo forzado, y la separación con nota antes de «conducta» empeora la fluidez. «Modo de vida» o «conducta» funcionan; en esta construcción, «viven según el modo de vida de Dios» o «viven la conducta…» sería más natural. También conviene expresar ἀμεταμέλητον con una formulación idiomática en español.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Dios» está bien. La decisión sobre πολιτεία como «modo de vida/conducta» concuerda con la evidencia fuente y con la nota inglesa que rechaza «ciudadanía» como sentido principal aquí. La clave es ajustar ἀμεταμέλητον a un español fiel y natural: «del que no hay que arrepentirse».'
  issues:
  - severity: medium
    issue: «que no deja arrepentimiento» es una formulación poco idiomática para ἀμεταμέλητον
    rationale: Aunque intenta reflejar el sentido positivo, en español suena extraña y no reproduce bien la idea de ‘no lamentable / del que no hay que arrepentirse’.
  - severity: medium
    issue: «viven en la conducta de Dios» es una construcción algo forzada
    rationale: La combinación «vivir en la conducta» no es natural en español. Con πολιτευόμενοι + πολιτείαν, una solución como «viven según el modo de vida de Dios» comunica mejor la idea de conducta continua.
  - severity: low
    issue: La nota al pie debe anclarse a la expresión revisada
    rationale: Si se conserva una nota léxica sobre πολιτεία, el marcador debe colocarse en la frase exacta del texto revisado y los marcadores deben corresponder exactamente.
  revised_spanish_text: Estas cosas las hicieron y las harán los que viven según el modo de vida[a] de Dios, del que no hay que arrepentirse.
  revised_footnotes:
  - marker: a
    text: 'O: «conducta». El griego πολιτεία aquí se refiere a la manera de vivir o conducirse, no necesariamente a «ciudadanía» en sentido político.'
    reason: alternative_reading
