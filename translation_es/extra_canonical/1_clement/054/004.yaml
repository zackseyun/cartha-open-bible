- from: Estas cosas las hicieron y las harán los que viven en la [a]conducta de Dios que no deja arrepentimiento.
  to: Estas cosas las hicieron y las harán los que viven según el modo de vida[a] de Dios, del que no hay que arrepentirse.
  rationale: Se revisa para expresar ἀμεταμέλητον con una frase española natural y fiel («del que no hay que arrepentirse») y para mejorar la sintaxis de πολιτευόμενοι... πολιτείαν («viven según el modo de vida de Dios»). Se mantiene la nota léxica sobre πολιτεία, anclada correctamente al texto.
