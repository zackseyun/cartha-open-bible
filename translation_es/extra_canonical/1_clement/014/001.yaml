translation:
  language: es
  text: 'Es justo, pues, y santo, hermanos, que lleguemos a ser obedientes a Dios antes que seguir a los que, en arrogancia y desorden, son líderes de celos odiosos. Porque no sufriremos un daño común, sino más bien un gran peligro, si temerariamente nos entregamos a los propósitos de los hombres, que caen en pleitos y facciones, para apartarnos de lo que es bueno. Mostrémonos bondadosos con nosotros mismos, conforme a la compasión y la gentileza de Aquel que nos hizo. Porque está escrito: «Los bondadosos habitarán la tierra, y los inocentes quedarán sobre ella; pero los que quebrantan la ley serán destruidos de ella». Y otra vez dice: «Vi al impío muy exaltado y levantado como los cedros del Líbano; y pasé, y he aquí, no estaba allí; busqué su lugar, y no lo hallé. Guarda la inocencia y observa la rectitud, porque hay un remanente[a] para un hombre pacífico».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Remanente» conserva la ambigüedad del griego ἐγκατάλειμμα: puede sugerir lo que queda, una posteridad o un resto preservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: Δίκαιον
  english_pob_choice: right
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - adecuado
  lexicon: LSJ
  rationale: En la fórmula exhortativa con ὅσιον, «justo» conserva la evaluación ética sin volverla técnica. «Recto» también sería posible, pero suena menos natural en español aquí.
- source_word: ὅσιον
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - piadoso
  - devoto
  lexicon: LSJ
  rationale: «Santo» preserva el registro religioso y moral de la exhortación. «Piadoso» es viable, pero en español moderno resulta menos directo en este paralelismo.
- source_word: ἄνδρες ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos, hombres
  lexicon: LSJ
  rationale: Se mantiene la forma fraternal masculina del vocativo griego, como en la decisión inglesa, sin expandirla más allá del texto base.
- source_word: ὑπηκόους ... γενέσθαι
  english_pob_choice: to become obedient
  chosen_spanish: que lleguemos a ser obedientes
  alternatives_spanish:
  - que seamos sumisos
  - que lleguemos a ser sujetos
  lexicon: BDAG
  rationale: «Obedientes» refleja bien ὑπήκοος en este contexto exhortativo. La construcción «lleguemos a ser» conserva el matiz de llegar a una condición.
- source_word: ἀλαζονείᾳ
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - jactancia
  - presunción
  lexicon: LSJ
  rationale: «Arrogancia» es natural y comunica la autoexaltación orgullosa condenada por el pasaje.
- source_word: ἀκαταστασίᾳ
  english_pob_choice: disorder
  chosen_spanish: desorden
  alternatives_spanish:
  - inestabilidad
  - tumulto
  lexicon: BDAG
  rationale: «Desorden» transmite bien la perturbación comunitaria y es idiomático en español eclesial.
- source_word: μυσεροῦ ζήλους
  english_pob_choice: hateful jealousy
  chosen_spanish: celo odioso
  alternatives_spanish:
  - celos odiosos
  - celo detestable
  lexicon: LSJ
  rationale: 'Se conserva la tensión del original: ζῆλος puede ser positivo, pero aquí está cargado negativamente por μυσερός. «Celo odioso» reproduce esa fuerza sin suavizarla; «celos» correría el riesgo de fijar solo envidia.'
- source_word: ἀρχηγοῖς
  english_pob_choice: leaders
  chosen_spanish: guías
  alternatives_spanish:
  - líderes
  - cabecillas
  lexicon: BDAG
  rationale: «Guías» mantiene una palabra relativamente neutra y comprensible. En este contexto, el tono negativo ya viene dado por la descripción adjunta.
- source_word: βλάβην
  english_pob_choice: harm
  chosen_spanish: daño
  alternatives_spanish:
  - perjuicio
  - lesión
  lexicon: LSJ
  rationale: «Daño» es breve, claro y suficientemente fuerte para el contraste con el «gran peligro» que sigue.
- source_word: κίνδυνον μέγαν
  english_pob_choice: great danger
  chosen_spanish: un gran peligro
  alternatives_spanish:
  - grave peligro
  - gran riesgo
  lexicon: BDAG
  rationale: Se conserva el aumento retórico desde «daño» hasta «gran peligro». «Peligro» es más natural que «riesgo» en esta advertencia.
- source_word: ῥιψοκινδύνως
  english_pob_choice: recklessly
  chosen_spanish: temerariamente
  alternatives_spanish:
  - irreflexivamente
  - a la ligera
  lexicon: LSJ
  rationale: «Temerariamente» expresa bien la idea de exponerse al peligro sin cautela.
- source_word: ἐπιδῶμεν ἑαυτοὺς
  english_pob_choice: hand ourselves over
  chosen_spanish: nos entregamos
  alternatives_spanish:
  - nos damos
  - nos ponemos
  lexicon: LSJ
  rationale: «Nos entregamos» conserva la entrega voluntaria del giro idiomático. El reflexivo «nos» refleja con precisión ἑαυτούς.
- source_word: θελήμασιν
  english_pob_choice: purposes
  chosen_spanish: voluntades
  alternatives_spanish:
  - deseos
  - propósitos
  lexicon: BDAG
  rationale: Se sigue de cerca la decisión inglesa con «voluntades», manteniendo la referencia a la intención activa de los hombres. «Propósitos» sería una alternativa más interpretativa.
- source_word: ἔριν καὶ στάσεις
  english_pob_choice: strife and factions
  chosen_spanish: pleitos y facciones
  alternatives_spanish:
  - contiendas y divisiones
  - disputas y bandos
  lexicon: BDAG
  rationale: «Pleitos» comunica el conflicto interpersonal; «facciones» conserva el matiz de división comunitaria o facciosa. Juntos reproducen el doble alcance del griego.
- source_word: ἀπαλλοτριῶσαι
  english_pob_choice: to estrange
  chosen_spanish: para apartarnos
  alternatives_spanish:
  - para alejarnos
  - para enajenarnos
  lexicon: LSJ
  rationale: «Apartarnos» expresa separación relacional de forma natural en español. «Enajenarnos» sería más literal pero demasiado técnico o ambiguo.
- source_word: τοῦ καλοῦ ἔχοντος
  english_pob_choice: what is good
  chosen_spanish: lo que es bueno
  alternatives_spanish:
  - el bien
  - lo bueno
  lexicon: LSJ
  rationale: Se conserva la formulación moral general sin sobreespecificar la frase griega condensada.
- source_word: χρηστευσώμεθα
  english_pob_choice: Let us show kindness
  chosen_spanish: Mostrémonos bondadosos
  alternatives_spanish:
  - Mostremos bondad
  - Seamos bondadosos
  lexicon: BDAG
  rationale: El medio reflexivo sugiere un acto que recae sobre nosotros mismos. «Mostrémonos bondadosos» preserva la fuerza verbal y el matiz reflexivo sin perder naturalidad.
- source_word: εὐσπλαγχνίαν
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - misericordia entrañable
  - tierno misericordia
  lexicon: BDAG
  rationale: «Compasión» es claro y digno; evita una glosa excesiva, pero mantiene el contenido afectivo de la palabra.
- source_word: γλυκύτητα
  english_pob_choice: gentleness
  chosen_spanish: dulzura
  alternatives_spanish:
  - amabilidad
  - suavidad
  lexicon: LSJ
  rationale: Aunque «dulzura» es más literal que «gentileza», aquí preserva mejor la textura moral del par con εὐσπλαγχνίαν. Es un término bíblico y comprensible en español.
- source_word: Χρηστοὶ
  english_pob_choice: The kind
  chosen_spanish: Los bondadosos
  alternatives_spanish:
  - Los buenos
  - Los benignos
  lexicon: LSJ
  rationale: Se mantiene la conexión léxica con χρηστευσώμεθα mediante «bondadosos», un equivalente natural de χρηστός en este contexto moral.
- source_word: ἄκακοι
  english_pob_choice: the innocent
  chosen_spanish: los inocentes
  alternatives_spanish:
  - los sin malicia
  - los irreprensibles
  lexicon: BDAG
  rationale: «Inocentes» es breve y conserva bien el contraste moral del salmo citado.
- source_word: παρανομοῦντες
  english_pob_choice: those who transgress the law
  chosen_spanish: los que quebrantan la ley
  alternatives_spanish:
  - los transgresores de la ley
  - los que actúan contra la ley
  lexicon: BDAG
  rationale: La frase explicita el sentido verbal de violar la ley sin reducirlo a un adjetivo sustantivado.
- source_word: ἀσεβῆ
  english_pob_choice: the ungodly
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el irreligioso
  lexicon: BDAG
  rationale: «Impío» preserva el componente religioso de falta de reverencia, tal como lo hace la opción inglesa.
- source_word: ὑπερυψούμενον καὶ ἐπαιρόμενον
  english_pob_choice: highly exalted and lifted up
  chosen_spanish: altamente exaltado y levantado
  alternatives_spanish:
  - en gran manera exaltado y levantado
  - ensalzado y elevado
  lexicon: LSJ
  rationale: Se conserva la duplicación enfática del griego. «Altamente exaltado y levantado» mantiene el tono retórico del pasaje.
- source_word: ἀκακίαν
  english_pob_choice: innocence
  chosen_spanish: la inocencia
  alternatives_spanish:
  - la blamelessness
  - la guilelessness
  lexicon: BDAG
  rationale: Se alinea con ἄκακοι y mantiene coherencia léxica dentro de la cita.
- source_word: εὐθύτητα
  english_pob_choice: uprightness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la integridad
  - lo recto
  lexicon: LSJ
  rationale: «Rectitud» es el equivalente moral más natural en español para la exhortación sapiencial.
- source_word: ἐγκατάλειμμα
  english_pob_choice: a remnant
  chosen_spanish: un remanente
  alternatives_spanish:
  - lo que queda
  - una posteridad
  lexicon: LSJ
  rationale: «Remanente» conserva la resonancia bíblica y la ambigüedad controlada del término, sin decidir demasiado entre ‘lo que queda’ y ‘posteridad’.
- source_word: εἰρηνικῷ
  english_pob_choice: peaceable
  chosen_spanish: pacífico
  alternatives_spanish:
  - de paz
  - pacificador
  lexicon: BDAG
  rationale: «Pacífico» describe el carácter de la persona y funciona bien en el cierre proverbial; «pacificador» añadiría una idea no explícita.
theological_decisions:
- issue: Vocativo fraternal masculino en ἄνδρες ἀδελφοί
  english_pob_reading: Rendered as 'brothers' in the main text
  chosen_spanish_reading: Renderizado como «hermanos»
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: El griego usa una fórmula fraternal masculina. Siguiendo la política de precisión de género del proyecto, se mantiene esa forma sin expandirla más allá del texto fuente.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Sentido de ἐγκατάλειμμα en la cita del salmo
  english_pob_reading: Rendered as 'there is a remnant for a peaceable man'
  chosen_spanish_reading: «hay un remanente para un hombre pacífico»
  alternative_spanish_readings:
  - hay una posteridad para un hombre pacífico
  - hay lo que queda para un hombre pacífico
  rationale: El término puede sugerir ‘lo que queda’ o ‘remanente’. Se conserva una traducción literal y bíblicamente resonante, manteniendo abierta la ambigüedad que el texto griego permite.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 3
- issue: γλυκύτητα como cualidad moral
  english_pob_reading: gentleness
  chosen_spanish_reading: dulzura
  alternative_spanish_readings:
  - amabilidad
  - suavidad
  rationale: Aunque ‘dulzura’ puede sonar menos abstracta, reproduce con fidelidad el valor ético-relacional del par junto con εὐσπλαγχνίαν y evita un giro demasiado interpretativo.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 2
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión inglesa, que ajustó tres puntos clave para mayor precisión: ‘leaders of hateful jealousy’, ‘fall into strife and factions’ y el reflexivo ‘ourselves’. La redacción española refleja esos ajustes con «guías de un celo odioso», «caen en pleitos y facciones» y «Mostrémonos bondadosos para con nosotros mismos».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiera; aquí no aparece.
  - Se mantuvo un registro bíblico formal pero natural, evitando calcos rígidos.
  - 'Se conservaron pares léxicos coherentes: χρηστευσώμεθα / Χρηστοὶ con «bondadosos», ἄκακοι / ἀκακίαν con «inocentes / inocencia».'
  - Se evitó sustituir términos cargados por formulaciones eclesiales tradicionales no sustentadas por el griego.
