  text: Δίκαιον οὖν καὶ ὅσιον, ἄνδρες ἀδελφοί, ὑπηκόους ἡμᾶς μᾶλλον γενέσθαι τῷ θεῷ ἢ τοῖς ἐν ἀλαζονείᾳ καὶ ἀκαταστασίᾳ μυσεροῦ ζήλους ἀρχηγοῖς ἐξακολουθεῖν. 2. βλάβην γὰρ οὐ τὴν τυχοῦσαν, μᾶλλον δὲ κίνδυνον ὑποίσομεν μέγαν, ἐὰν ῥιψοκινδύνως ἐπιδῶμεν ἑαυτοὺς τοῖς θελήμασιν τῶν ἀνθρώπων, οἵτινες ἔχουσιν πίπτουσιν εἰς ἔριν καὶ στάσεις, εἰς τὸ ἀπαλλοτριῶσαι ἡμᾶς τοῦ καλοῦ ἔχοντος. 3. χρηστευσώμεθα ἑαυτοῖς κατὰ τὴν εὐσπλαγχνίαν καὶ γλυκύτητα τοῦ ποιήσαντος ἡμᾶς. 4. γέγραπται γάρ· Χρηστοὶ ἔσονται οἰκήτορες γῆς, ἄκακοι δὲ ὑπολειφθήσονται ἐπ’ αὐτῆς· οἱ δὲ παρανομοῦντες ἐξολεθρευθήσονται ἀπ᾽ αὐτῆς. 5. καὶ πάλιν λέγει· Εἶδον ἀσεβῆ ὑπερυψούμενον καὶ ἐπαιρόμενον ὡς τὰς κέδρους τοῦ Λιβάνου· καὶ παρῆλθον καὶ ἰδοὺ, οὐκ ἦν, καὶ ἐξεζήτησα τὸν τόπον αὐτοῦ, καὶ οὐχ εὗρον. φύλασσε ἀκακίαν καὶ ἴδε εὐθύτητα, ὅτι ἐστὶν ἐγκατάλειμμα ἀνθρώπῳ εἰρηνικῷ.
