revisions:
- from: 'Es justo, pues, y santo, hermanos, que lleguemos a ser obedientes a Dios antes que seguir a los que, en arrogancia y desorden, son guías de un celo odioso. Porque no sufriremos un daño común, sino más bien un gran peligro, si temerariamente nos entregamos a las voluntades de los hombres, que caen en pleitos y facciones, para apartarnos de lo que es bueno. Mostrémonos bondadosos para con nosotros mismos, conforme a la compasión y la dulzura de Aquel que nos hizo. Porque está escrito: «Los bondadosos habitarán la tierra, y los inocentes quedarán sobre ella; pero los que quebrantan la ley serán destruidos de ella». Y otra vez dice: «Vi al impío altamente exaltado y levantado como los cedros del Líbano; y pasé, y he aquí, no estaba allí; busqué su lugar, y no lo hallé. Guarda la inocencia y observa la rectitud, porque hay un remanente[a] para un hombre pacífico».'
  to: 'Es justo, pues, y santo, hermanos, que lleguemos a ser obedientes a Dios antes que seguir a los que, en arrogancia y desorden, son líderes de celos odiosos. Porque no sufriremos un daño común, sino más bien un gran peligro, si temerariamente nos entregamos a los propósitos de los hombres, que caen en pleitos y facciones, para apartarnos de lo que es bueno. Mostrémonos bondadosos con nosotros mismos, conforme a la compasión y la gentileza de Aquel que nos hizo. Porque está escrito: «Los bondadosos habitarán la tierra, y los inocentes quedarán sobre ella; pero los que quebrantan la ley serán destruidos de ella». Y otra vez dice: «Vi al impío muy exaltado y levantado como los cedros del Líbano; y pasé, y he aquí, no estaba allí; busqué su lugar, y no lo hallé. Guarda la inocencia y observa la rectitud, porque hay un remanente[a] para un hombre pacífico».'
  rationale: 'Se hicieron ajustes menores pero convenientes para mayor fidelidad contextual y mejor español: «líderes de celos odiosos» refleja mejor ἀρχηγοῖς μυσεροῦ ζήλους; «propósitos» comunica mejor θελήμασιν según la justificación auditada; «gentileza» expresa con más claridad la cualidad moral de γλυκύτητα; y «muy exaltado» mejora la naturalidad de la cita sin perder énfasis. No se requieren cambios doctrinales ni adjudicación especial.'
  reviewer_model: gpt-5.4
