review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego y del POB inglés: conserva la exhortación ética inicial, el contraste entre obedecer a Dios y seguir a cabecillas facciosos, la advertencia sobre daño y peligro, el matiz reflexivo de ἑαυτοῖς, y la secuencia de citas escriturarias. Sin embargo, hay algunos puntos mejorables para fidelidad léxica y claridad: «guías de un celo odioso» suena menos natural y algo impreciso para ἀρχηγοῖς μυσεροῦ ζήλους; «voluntades» no refleja tan bien como «propósitos» la intención hostil de θελήμασιν según la decisión auditada; y «dulzura» para γλυκύτητα, aunque defendible, resulta menos claro que «gentileza» o «mansedumbre» en español eclesial moderno.'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero presenta algunos giros algo duros o poco idiomáticos: «guías de un celo odioso», «altamente exaltado», y en menor grado «Mostrémonos bondadosos para con nosotros mismos». La redacción puede afinarse para sonar más natural sin perder precisión. El resto del pasaje funciona bien en registro eclesial neutro y moderno.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. «Dios» y el resto del vocabulario teológico están bien. Las decisiones que requieren ajuste son más léxicas/estilísticas que doctrinales: preferir «líderes» frente a «guías», «propósitos» frente a «voluntades», y una opción más clara que «dulzura» para γλυκύτητα dentro del binomio ético.'
  issues:
  - severity: medium
    issue: «guías de un celo odioso» para ἀρχηγοῖς μυσεροῦ ζήλους
    rationale: Aunque no es incorrecto, «guías» suena menos natural aquí que «líderes», y «celo odioso» resulta más áspero en español que «celos odiosos». El griego expresa que son líderes/instigadores de unos celos detestables; conviene una formulación más idiomática.
  - severity: medium
    issue: «voluntades» para θελήμασιν
    rationale: La auditoría inglesa justificó «purposes» por el matiz de intención hostil. En español, «voluntades» es posible, pero suena abstracto y menos idiomático aquí. «Propósitos» transmite mejor el sentido contextual.
  - severity: low
    issue: «dulzura» para γλυκύτητα
    rationale: Es bastante literal y defendible, pero en español moderno puede sonar sentimental o menos preciso en este contexto moral. «Gentileza» comunica mejor la cualidad ética junto a «compasión» y se alinea con la decisión inglesa «gentleness».
  - severity: low
    issue: «altamente exaltado»
    rationale: Reproduce de forma muy cercana el inglés, pero en español suena redundante. «Muy exaltado» o «sumamente exaltado» conserva el énfasis con mejor fluidez.
  revised_spanish_text: 'Es justo, pues, y santo, hermanos, que lleguemos a ser obedientes a Dios antes que seguir a los que, en arrogancia y desorden, son líderes de celos odiosos. Porque no sufriremos un daño común, sino más bien un gran peligro, si temerariamente nos entregamos a los propósitos de los hombres, que caen en pleitos y facciones, para apartarnos de lo que es bueno. Mostrémonos bondadosos con nosotros mismos, conforme a la compasión y la gentileza de Aquel que nos hizo. Porque está escrito: «Los bondadosos habitarán la tierra, y los inocentes quedarán sobre ella; pero los que quebrantan la ley serán destruidos de ella». Y otra vez dice: «Vi al impío muy exaltado y levantado como los cedros del Líbano; y pasé, y he aquí, no estaba allí; busqué su lugar, y no lo hallé. Guarda la inocencia y observa la rectitud, porque hay un remanente[a] para un hombre pacífico».'
