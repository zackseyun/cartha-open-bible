base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/014/001.yaml
  text: 'It is right, then, and holy, brothers, for us to become obedient to God rather than to follow those who, in arrogance and disorder, are leaders of hateful jealousy. For we will incur no ordinary harm, but rather great danger, if we recklessly hand ourselves over to the purposes of men who fall into strife and factions, so as to estrange us from what is good. Let us show kindness to ourselves according to the compassion and gentleness of the One who made us. For it is written: “The kind will inhabit the land, and the innocent will be left upon it; but those who transgress the law will be destroyed from it.” And again he says: “I saw the ungodly highly exalted and lifted up like the cedars of Lebanon; and I passed by, and behold, he was not there, and I sought his place, and I did not find it. Keep innocence and observe uprightness, because there is a remnant for a peaceable man.”'
