review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la mayor parte del sentido del griego: χρηστοὶ → «rectos», οἰκήτορες γῆς → «habitarán la tierra», ἄκακοι → «inocentes», y ὑπολειφθήσονται → «quedarán» son opciones fieles y naturales. El principal problema está en la cláusula final: «serán destruidos de ella» suena poco idiomático en español para ἐξολεθρευθήσονται ἀπ᾽ αὐτῆς. El sentido de separación/exclusión del lugar debe conservarse con una formulación más natural.'
  spanish_quality_summary: El español es en general claro, digno y legible, pero la combinación «obran sin ley» y «serán destruidos de ella» resulta algo rígida. «Obran sin ley» es comprensible, aunque menos natural que «actúan sin ley» o «actúan perversamente/ilegalmente»; no obstante, el problema realmente necesario de corregir es «destruidos de ella», que en español bíblico moderno suena forzado. «Exterminados de la tierra» o «eliminados de ella» transmiten mejor el juicio y la separación.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Rectos», «inocentes» y «la tierra» están bien alineados con la evidencia y el registro. La nota al pie conserva la alternativa de παρανομοῦντες, pero conviene armonizarla con una formulación española más natural. No se detectan problemas teológicos sensibles.
  issues:
  - severity: medium
    issue: «serán destruidos de ella» es poco idiomático en español
    rationale: Aunque refleja literalmente ἐξολεθρευθήσονται ἀπ᾽ αὐτῆς, en español «destruir de» una tierra no suena natural. El griego expresa destrucción con remoción de la tierra; en español conviene una formulación como «serán exterminados de la tierra» o «serán eliminados de ella».
  - severity: low
    issue: La nota al pie usa la misma construcción forzada
    rationale: «serán destruidos de ella» en la alternativa repite la misma torpeza estilística del texto principal; debe ajustarse para mantener naturalidad y coherencia.
  revised_spanish_text: 'Porque está escrito: «Los rectos habitarán la tierra[a], y los inocentes quedarán sobre ella; pero los que obran sin ley serán exterminados de la tierra».'
  revised_footnotes:
  - marker: a
    text: O «los que transgreden la ley serán exterminados de la tierra».
    reason: Conserva la alternativa para παρανομοῦντες, pero con una formulación española natural y coherente con la revisión del texto principal.
  revision_rationale: 'Se hizo una reparación pequeña pero necesaria para naturalidad y fidelidad funcional en español: «serán destruidos de ella» se cambió por «serán exterminados de la tierra», que transmite mejor ἐξολεθρευθήσονται ἀπ᾽ αὐτῆς sin calco extraño. Se mantuvieron las demás decisiones léxicas, que son sólidas. La nota al pie se actualizó para reflejar la misma mejora estilística.'
