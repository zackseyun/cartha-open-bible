revisions:
- from: 'Porque está escrito: «Los rectos habitarán la tierra[a], y los inocentes quedarán sobre ella; pero los que obran sin ley serán destruidos de ella».'
  to: 'Porque está escrito: «Los rectos habitarán la tierra[a], y los inocentes quedarán sobre ella; pero los que obran sin ley serán exterminados de la tierra».'
  rationale: 'Se hizo una reparación pequeña pero necesaria para naturalidad y fidelidad funcional en español: «serán destruidos de ella» se cambió por «serán exterminados de la tierra», que transmite mejor ἐξολεθρευθήσονται ἀπ᾽ αὐτῆς sin calco extraño. Se mantuvieron las demás decisiones léxicas, que son sólidas. La nota al pie se actualizó para reflejar la misma mejora estilística.'
