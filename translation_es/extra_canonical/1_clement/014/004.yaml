id: 1CLEM.14.4
reference: 1 Clement 14:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: γέγραπται γάρ· Χρηστοὶ ἔσονται οἰκήτορες γῆς, ἄκακοι δὲ ὑπολειφθήσονται ἐπ’ αὐτῆς· οἱ δὲ παρανομοῦντες ἐξολεθρευθήσονται ἀπ᾽ αὐτῆς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/014/004.yaml
  text: 'For it is written: “The upright will inhabit the land[a], and the innocent will be left upon it; but those who act lawlessly will be destroyed from it.”'
  footnotes:
  - marker: a
    text: Or 'those who transgress the law will be destroyed from it'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:16Z'
    unchanged: false
    changes_summary: Revised 'kind' to 'upright' for better lexical fit of χρηστοί in this context, and changed 'the transgressors will be rooted out' to 'those who act lawlessly will be destroyed' to reflect παρανομοῦντες and ἐξολεθρευθήσονται more directly and naturally.
translation:
  language: es
  text: 'Porque está escrito: «Los rectos habitarán la tierra[a], y los inocentes quedarán sobre ella; pero los que obran sin ley serán exterminados de la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que transgreden la ley serán exterminados de la tierra».
    reason: Conserva la alternativa para παρανομοῦντες, pero con una formulación española natural y coherente con la revisión del texto principal.
lexical_decisions:
- source_word: Χρηστοὶ
  english_pob_choice: upright
  chosen_spanish: rectos
  alternatives_spanish:
  - upright
  - buenos
  - benignos
  lexicon: χρηστός
  rationale: En este dicho proverbial, χρηστοί describe personas moralmente rectas y aptas para la convivencia; «rectos» conserva esa fuerza ética en español con un registro natural y bíblico, sin reducirlo a mera amabilidad.
- source_word: οἰκήτορες
  english_pob_choice: inhabit
  chosen_spanish: habitarán
  alternatives_spanish:
  - morarán
  - vivirán
  lexicon: οἰκήτωρ
  rationale: El sustantivo se expresa bien con el verbo español «habitar», que mantiene la imagen estable de residencia en la tierra.
- source_word: γῆς
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: γῆ
  rationale: «La tierra» preserva la amplitud del término sin sobreespecificar; en este contexto puede oírse también con resonancias bíblicas de la tierra habitada o prometida, pero el griego no exige una restricción mayor.
- source_word: ἄκακοι
  english_pob_choice: the innocent
  chosen_spanish: los inocentes
  alternatives_spanish:
  - los sin culpa
  - los íntegros
  lexicon: ἄκακος
  rationale: «Inocentes» comunica bien la ausencia de malicia o culpa que sugiere ἄκακος, y mantiene el paralelismo proverbial con «los rectos».
- source_word: ὑπολειφθήσονται
  english_pob_choice: will be left
  chosen_spanish: quedarán
  alternatives_spanish:
  - serán dejados
  - permanecerán
  lexicon: ὑπολείπω
  rationale: En español, «quedarán» expresa de manera natural el sentido pasivo de permanecer o ser dejados en el lugar, sin forzar una construcción más pesada.
- source_word: παρανομοῦντες
  english_pob_choice: those who act lawlessly
  chosen_spanish: los que obran sin ley
  alternatives_spanish:
  - los transgresores
  - los que quebrantan la ley
  - los que actúan contra la ley
  lexicon: παρανομέω
  rationale: La opción «obran sin ley» reproduce la cualidad adjetival/substantiva del participio griego y conserva el matiz de conducta contraria a la norma; evita una paraphrase excesiva y deja visible la tensión entre falta de ley y transgresión.
- source_word: ἐξολεθρευθήσονται
  english_pob_choice: will be destroyed
  chosen_spanish: serán destruidos
  alternatives_spanish:
  - serán exterminados
  - serán eliminados por completo
  - serán arrancados de raíz
  lexicon: ἐξολεθρεύω
  rationale: «Serán destruidos» es una traducción directa y solemne del verbo de aniquilación; en español mantiene la gravedad del juicio sin añadir una imagen no presente en el griego.
- source_word: ἀπ᾽ αὐτῆς
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de allí
  - fuera de ella
  lexicon: ἀπό
  rationale: «De ella» preserva el pronombre femenino referido a la tierra y corresponde naturalmente al complemento de separación en español.
theological_decisions:
- issue: Resonancia bíblica de «la tierra»
  english_pob_reading: The upright will inhabit the land; the innocent will be left upon it.
  chosen_spanish_reading: Los rectos habitarán la tierra; y los inocentes quedarán sobre ella.
  alternative_spanish_readings:
  - los rectos habitarán el país
  - los rectos heredarán la tierra
  rationale: El texto griego y el inglés POB mantienen «land/γῆ» sin aclaración. En español, «tierra» conserva la resonancia bíblica y permite al lector percibir la continuidad proverbial sin introducir una interpretación territorial más estrecha que la fuente.
  doctrine_reference: Continuidad escritural del lenguaje sapiencial y de juicio; no requiere una determinación doctrinal adicional.
- issue: Fórmula de juicio sobre los impíos
  english_pob_reading: those who act lawlessly will be destroyed from it
  chosen_spanish_reading: los que obran sin ley serán destruidos de ella
  alternative_spanish_readings:
  - los transgresores serán destruidos de ella
  - los que quebrantan la ley serán destruidos de ella
  rationale: La fuente griega usa un participio sustantivado y un verbo fuerte de destrucción. La traducción mantiene ambos elementos sin suavizar el juicio ni reemplazarlo por una lectura moralizante menos precisa.
  doctrine_reference: Lenguaje profético/sapiencial de retribución; juicio divino sobre la impiedad.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB: se prefirió ''upright'' sobre ''kind'' para χρηστοί y se evitó ''rooted out'' para ἐξολεθρευθήσονται, optando por una formulación española que refleje más directamente la destrucción judicial expresada por el griego. También se mantuvo el equivalente proverbial breve para οἱ παρανομοῦντες, sin convertirlo en una cláusula relativa larga.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el nombre divino.
  - Se usó «sin ley» para conservar el peso semántico de παρανομέω sin imponer una fórmula eclesiástica fija.
  - Se conservó el paralelismo de dos miembros positivos seguidos por un contraste de juicio, acorde con el tono proverbial del griego.
