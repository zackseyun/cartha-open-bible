translation:
  language: es
  text: Seamos bondadosos unos con otros, conforme a la compasión y la mansedumbre del que nos hizo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mostremos bondad hacia nosotros mismos».
    reason: 'Preserva la alternativa previa del POB inglés para ἑαυτοῖς, aunque el sentido principal en contexto es recíproco: «unos con otros».'
lexical_decisions:
- source_word: χρηστευσώμεθα
  english_pob_choice: be kind
  chosen_spanish: Hagámonos bondadosos
  alternatives_spanish:
  - Seamos bondadosos
  - Seamos amables
  - Tengamos bondad
  lexicon: χρηστεύομαι
  rationale: El verbo exhortativo pide una acción comunitaria y práctica de benevolencia. «Bondadosos» comunica bien el valor de χρηστεύομαι sin sonar tan débil o meramente afectivo como «amables».
- source_word: ἑαυτοῖς
  english_pob_choice: to one another
  chosen_spanish: unos con otros
  alternatives_spanish:
  - entre nosotros
  - los unos a los otros
  lexicon: ἑαυτοῖς
  rationale: En este contexto exhortativo, el reflexivo plural funciona con fuerza recíproca. «Unos con otros» expresa la reciprocidad que el análisis del texto exige.
- source_word: κατὰ τὴν εὐσπλαγχνίαν
  english_pob_choice: according to the compassion
  chosen_spanish: conforme a la compasión
  alternatives_spanish:
  - según la compasión
  - de acuerdo con la compasión
  lexicon: εὐσπλαγχνία
  rationale: «Conforme a» mantiene la idea normativa de medida o patrón que introduce κατά. «Compasión» es el equivalente natural en español para εὐσπλαγχνία.
- source_word: καὶ γλυκύτητα
  english_pob_choice: and gentleness
  chosen_spanish: y la mansedumbre
  alternatives_spanish:
  - y la dulzura
  - y la suavidad
  lexicon: γλυκύτης
  rationale: Aunque γλυκύτης puede sugerir «dulzura», en español «mansedumbre» mejor conserva la cualidad relacional y ética del contexto exhortativo. Se mantiene una segunda virtud paralela a la compasión.
- source_word: τοῦ ποιήσαντος ἡμᾶς
  english_pob_choice: the One who made us
  chosen_spanish: del que nos hizo
  alternatives_spanish:
  - del que nos creó
  - del que nos hizo a nosotros
  lexicon: ποιέω
  rationale: «Hizo» sigue de cerca el participio aoristo y evita añadir una explicitación teológica no exigida por la forma griega. «Del que nos hizo» es sobrio y fiel al original.
theological_decisions:
- issue: Alcance recíproco de ἑαυτοῖς
  english_pob_reading: be kind to one another
  chosen_spanish_reading: unos con otros
  alternative_spanish_readings:
  - a nosotros mismos
  - entre nosotros
  rationale: La revisión del texto muestra que el plural reflexivo debe entenderse recíprocamente en este llamado a la concordia comunitaria, no como auto-bondad. Por eso la traducción española evita una lectura introspectiva y preserva la exhortación mutua.
  doctrine_reference: Unidad y caridad fraterna en la comunidad cristiana
- issue: Naturaleza del patrón ético
  english_pob_reading: according to the compassion and gentleness of the One who made us
  chosen_spanish_reading: conforme a la compasión y la mansedumbre del que nos hizo
  alternative_spanish_readings:
  - según la compasión y la dulzura del que nos hizo
  - de acuerdo con la compasión y la gentileza del que nos hizo
  rationale: La frase establece que la conducta comunitaria debe corresponder al carácter del Creador. «Compasión» y «mansedumbre» preservan el tono moral y relacional del original sin suavizarlo en exceso.
  doctrine_reference: Imitación del carácter de Dios/creador
translation_notes:
  revision_awareness: La revisión auditada corrige una lectura anterior que entendía ἑαυτοῖς como «to ourselves». La presente versión adopta la lectura recíproca validada por la revisión fuente-griega y alinea el español con esa decisión.
  spanish_consistency_notes:
  - Se evita «Cristo» o terminología cristológica porque el versículo no la contiene.
  - Se conserva un registro sobrio y comunitario, adecuado para una exhortación moral breve.
  - No se usa nota al pie porque el español ya expresa la lectura recíproca sin ambigüedad residual.
