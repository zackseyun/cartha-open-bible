id: 1CLEM.14.2
reference: 1 Clement 14:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: βλάβην γὰρ οὐ τὴν τυχοῦσαν, μᾶλλον δὲ κίνδυνον ὑποίσομεν μέγαν, ἐὰν ῥιψοκινδύνως ἐπιδῶμεν ἑαυτοὺς τοῖς θελήμασιν τῶν ἀνθρώπων, οἵτινες ἔχουσιν πίπτουσιν εἰς ἔριν καὶ στάσεις, εἰς τὸ ἀπαλλοτριῶσαι ἡμᾶς τοῦ καλοῦ ἔχοντος.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/014/002.yaml
  text: For we will incur no ordinary harm[a], but rather great danger, if we recklessly hand ourselves over to the desires of men who fall into strife and factions, so as to estrange us from what is good.
  footnotes:
  - marker: a
    text: Or 'who are bent on plunging us into strife and factions'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:15Z'
    unchanged: false
    changes_summary: Changed 'purposes' to 'desires' for θελήμασιν, and 'plunge into' to 'fall into' to reflect πίπτουσιν more directly. Retained the rest as accurate and natural.
translation:
  language: es
  text: Porque no sufriremos un daño cualquiera, sino más bien un gran peligro, si temerariamente nos entregamos a los deseos de los hombres que caen en contiendas y facciones, para apartarnos de lo que es bueno.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βλάβην ... οὐ τὴν τυχοῦσαν
  english_pob_choice: no ordinary harm
  chosen_spanish: un daño cualquiera
  alternatives_spanish:
  - un daño ordinario
  - un daño común
  lexicon: βλάβη
  rationale: «Daño» comunica bien la idea de perjuicio o lesión. «Cualquiera» mantiene el contraste enfático con la negación, equivalente al giro idiomático «no ordinary». No se sobretraduce con términos técnicos que no añade el griego.
- source_word: κίνδυνον ... μέγαν
  english_pob_choice: great danger
  chosen_spanish: un gran peligro
  alternatives_spanish:
  - un peligro grande
  - un gran riesgo
  lexicon: κίνδυνος
  rationale: «Peligro» es natural en español y conserva la seriedad del sustantivo griego. «Gran» refleja directamente μέγαν y encaja mejor que una construcción más pesada.
- source_word: ῥιψοκινδύνως
  english_pob_choice: recklessly
  chosen_spanish: temerariamente
  alternatives_spanish:
  - irresponsablemente
  - a la ligera
  - sin prudencia
  lexicon: ῥιψοκινδύνως
  rationale: El adverbio expresa actuar con osadía imprudente. «Temerariamente» conserva el matiz de riesgo voluntario y suena digno en español eclesiástico.
- source_word: ἐπιδῶμεν ἑαυτοὺς
  english_pob_choice: hand ourselves over
  chosen_spanish: nos entregamos
  alternatives_spanish:
  - nos ponemos a disposición
  - nos abandonamos
  lexicon: ἐπιδίδωμι
  rationale: La idea es de cederse o entregarse a algo. «Nos entregamos» es idiomático y suficientemente fuerte sin añadir una imagen ajena al texto.
- source_word: τοῖς θελήμασιν τῶν ἀνθρώπων
  english_pob_choice: the desires of men
  chosen_spanish: los deseos de los hombres
  alternatives_spanish:
  - las voluntades de los hombres
  - los deseos humanos
  lexicon: θέλημα
  rationale: Aunque θέλημα puede ser «voluntad», el propio audit trail inglés ya fijó «desires» como lectura revisada. En español, «deseos» sigue esa decisión y evita sonar demasiado filosófico o técnico.
- source_word: πίπτουσιν εἰς ἔριν καὶ στάσεις
  english_pob_choice: who fall into strife and factions
  chosen_spanish: que caen en contiendas y facciones
  alternatives_spanish:
  - que caen en pleitos y divisiones
  - que incurren en contiendas y facciones
  lexicon: πίπτω + ἔρις + στάσις
  rationale: «Caen en» reproduce el movimiento verbal directo del griego y respeta la revisión que corrigió una lectura causal incorrecta. «Contiendas y facciones» mantiene el par lexical y la fuerza comunitaria/política del original.
- source_word: εἰς τὸ ἀπαλλοτριῶσαι ἡμᾶς τοῦ καλοῦ ἔχοντος
  english_pob_choice: so as to estrange us from what is good
  chosen_spanish: para apartarnos de lo bueno
  alternatives_spanish:
  - para alejarnos de lo bueno
  - para enajenarnos de lo bueno
  lexicon: ἀπαλλοτριόω
  rationale: El verbo puede sugerir extrañar, alejar o enajenar. «Apartarnos de lo bueno» es claro y no introduce un tecnicismo jurídico poco natural. Mantiene la finalidad negativa del infinitivo griego.
translation_notes:
  revision_awareness: La redacción española sigue la corrección auditada que entiende πίπτουσιν como acción intransitiva de los hombres («caen en contiendas y facciones»), y no como algo que hacen caer a otros. También refleja la revisión de θελήμασιν como «deseos» y no «propósitos».
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y eclesial sin arcaísmos innecesarios.
  - No se usa ‘Cristo’, ‘SEÑOR’ ni otros términos no presentes en el verso.
  - La estructura concesiva y final del griego se conserva con ‘si... para...’.
