  to: Porque no sufriremos un daño cualquiera, sino más bien un gran peligro, si temerariamente nos entregamos a los deseos de los hombres que caen en contiendas y facciones, para apartarnos de lo que es bueno.
  rationale: Se conserva casi todo el borrador por ser fiel y natural. Solo se ajusta el cierre de «de lo bueno» a «de lo que es bueno» para reflejar con más precisión el audit trail inglés y mejorar la claridad idiomática en español.
