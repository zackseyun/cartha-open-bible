base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/014/005.yaml
  text: 'And again he says: “I saw the ungodly highly exalted and lifted up like the cedars of Lebanon; and I passed by, and behold, he was not there, and I sought his place, and I did not find it. Keep innocence and observe uprightness, because there is a remnant for a peaceable man.”'
