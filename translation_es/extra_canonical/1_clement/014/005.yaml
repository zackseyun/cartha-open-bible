  text: καὶ πάλιν λέγει· Εἶδον ἀσεβῆ ὑπερυψούμενον καὶ ἐπαιρόμενον ὡς τὰς κέδρους τοῦ Λιβάνου· καὶ παρῆλθον καὶ ἰδοὺ, οὐκ ἦν, καὶ ἐξεζήτησα τὸν τόπον αὐτοῦ, καὶ οὐχ εὗρον. φύλασσε ἀκακίαν καὶ ἴδε εὐθύτητα, ὅτι ἐστὶν ἐγκατάλειμμα ἀνθρώπῳ εἰρηνικῷ.
