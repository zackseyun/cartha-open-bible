translation:
  language: es
  text: 'Y de nuevo dice: «Vi al impío muy exaltado y enaltecido como los cedros del Líbano; y pasé, y he aquí, no estaba; busqué su lugar, y no lo hallé. Guarda la inocencia y observa la rectitud, porque hay un remanente para el hombre de paz».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀσεβῆ
  english_pob_choice: the ungodly
  chosen_spanish: el impío
  alternatives_spanish:
  - el injusto
  - el irreverente
  lexicon: ἀσεβής
  rationale: El griego describe a quien carece de piedad o reverencia; en español bíblico y contemporáneo, «impío» comunica bien esa falta de reverencia sin suavizar el término.
- source_word: ὑπερυψούμενον / ἐπαιρόμενον
  english_pob_choice: highly exalted and lifted up
  chosen_spanish: muy exaltado y enaltecido
  alternatives_spanish:
  - sobremanera exaltado y levantado
  - altamente ensalzado y levantado
  lexicon: ὑπερυψόω / ἐπαίρω
  rationale: Mantengo la duplicación intensificadora del griego con dos verbos próximos en sentido, preservando la imagen de elevación extrema.
- source_word: κέδρους τοῦ Λιβάνου
  english_pob_choice: the cedars of Lebanon
  chosen_spanish: los cedros del Líbano
  alternatives_spanish:
  - los cedros del Líbano
  lexicon: κέδρος / Λιβάνου
  rationale: Es una referencia estable y clara en español; no requiere adaptación adicional.
- source_word: ἀκακίαν
  english_pob_choice: innocence
  chosen_spanish: la inocencia
  alternatives_spanish:
  - la integridad
  - la pureza
  lexicon: ἀκακία
  rationale: El término puede abarcar inocencia, sencillez o ausencia de malicia. «Inocencia» refleja bien la virtud moral exigida sin introducir una noción demasiado técnica.
- source_word: εὐθύτητα
  english_pob_choice: uprightness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la integridad
  - la honestidad
  lexicon: εὐθύτης
  rationale: «Rectitud» conserva el sentido moral de conducta derecha y mantiene un paralelo natural con «inocencia».
- source_word: ἐγκατάλειμμα
  english_pob_choice: a remnant
  chosen_spanish: un remanente
  alternatives_spanish:
  - un resto
  - una porción que queda
  lexicon: ἐγκατάλειμμα
  rationale: «Remanente» es la forma más estable en español bíblico para un grupo que permanece o queda, y preserva la fuerza comunitaria del término.
- source_word: ἀνθρώπῳ εἰρηνικῷ
  english_pob_choice: for a peaceable man
  chosen_spanish: para el hombre pacífico
  alternatives_spanish:
  - para el hombre de paz
  - para el hombre apacible
  lexicon: ἄνθρωπος / εἰρηνικός
  rationale: «Pacífico» transmite la cualidad de ser amante de la paz y encaja con el paralelismo sapiencial del pasaje.
theological_decisions:
- issue: Tratamiento del impío exaltado que luego desaparece
  english_pob_reading: A moral reversal is described without additional doctrinal expansion.
  chosen_spanish_reading: 'Se conserva la reversión moral: el impío parece elevado, pero finalmente desaparece.'
  alternative_spanish_readings:
  - Se diluye la imagen de reversión moral al parafrasear excesivamente.
  - Se transforma en una afirmación doctrinal ajena al texto.
  rationale: El texto cita una máxima sapiencial para advertir sobre la prosperidad aparente del impío; la traducción debe dejar intacta esa tensión sin moralizarla ni explicarla más allá de lo escrito.
  doctrine_reference: Sabiduría moral / justicia retributiva implícita en la cita
- issue: «Guarda la inocencia y observa la rectitud» como exhortación ética
  english_pob_reading: Keep innocence and observe uprightness.
  chosen_spanish_reading: Se mantiene una exhortación ética directa y breve.
  alternative_spanish_readings:
  - Conserva una formulación más interpretativa que cambie el mandato por comentario.
  - Añade matices pastorales no presentes en el griego.
  rationale: El imperativo debe conservarse como mandato sapiencial; no hay base para convertirlo en exhortación explicativa o devocional.
  doctrine_reference: Ética de conducta recta en contexto sapiencial
- issue: «Hay un remanente para el hombre pacífico»
  english_pob_reading: because there is a remnant for a peaceable man.
  chosen_spanish_reading: Porque hay un remanente para el hombre pacífico.
  alternative_spanish_readings:
  - Porque queda un resto para el hombre pacífico.
  - Porque existe una recompensa para el hombre pacífico.
  rationale: «Remanente» sigue de cerca el griego ἐγκατάλειμμα y evita sustituir la idea por «recompensa»; se preserva así la ambigüedad entre lo que queda y lo destinado al justo.
  doctrine_reference: Preservación del valor léxico de ἐγκατάλειμμα
- issue: Cita bíblica dentro de 1 Clemente
  english_pob_reading: 'And again he says: ...'
  chosen_spanish_reading: 'Y de nuevo dice: ...'
  alternative_spanish_readings:
  - 'Y otra vez dice: ...'
  - 'Y dice de nuevo: ...'
  rationale: La fórmula introductoria es una cita directa y debe sonar natural en español sin perder el carácter de reiteración citacional.
  doctrine_reference: Uso patrístico de citas escriturales
translation_notes:
  revision_awareness: La versión inglesa POB y el control de revisión indican que no hubo cambios necesarios; el griego y la traducción inglesa están altamente acordes, así que la propuesta española sigue de cerca el sentido ya estabilizado sin introducir notas por variantes inexistentes en este pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se usa «impío» para ἀσεβής y no se suaviza a un término meramente social o político.
  - Se conserva «remanente» para ἐγκατάλειμμα por coherencia con el léxico bíblico del proyecto.
  - No se añaden notas al pie porque el texto fuente y la traducción inglesa no documentan variantes textuales o lecturas alternativas relevantes en este pasaje.
