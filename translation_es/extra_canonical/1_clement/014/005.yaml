revisions:
- from: 'Y de nuevo dice: “Vi al impío muy exaltado y enaltecido como los cedros del Líbano; y pasé, y he aquí, ya no estaba; busqué su lugar, y no lo hallé. Guarda la inocencia y observa la rectitud, porque hay un remanente para el hombre pacífico.”'
