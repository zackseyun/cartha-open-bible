  spanish_consistency_notes:
  - Se usa 'arrepentimiento' para μετάνοια en este contexto exhortativo, conforme al valor habitual de llamado moral.
  - Se mantiene 'salvados' en voz pasiva para reflejar ἐσώθησαν sin reinterpretar el sujeto agente.
  - No se emplea 'Mesías', 'Yahvé' ni otras terminologías de proyecto porque no aparecen en este versículo.
