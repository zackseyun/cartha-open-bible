lexical_decisions:
- source_word: Νῶε
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: N/A
  rationale: Nombre propio bíblico estándar en español, correspondiente directamente al griego Νῶε.
- source_word: ἐκήρυξεν μετάνοιαν
  english_pob_choice: proclaimed repentance
  chosen_spanish: proclamó arrepentimiento
  alternatives_spanish:
  - predicó arrepentimiento
  - anunció arrepentimiento
  lexicon: N/A
  rationale: ἐκήρυξεν expresa proclamación pública; μετάνοια aquí conserva su sentido de llamado al arrepentimiento, más natural en español que un calco como 'cambio de mente' en este contexto exhortativo.
- source_word: οἱ ὑπακούσαντες
  english_pob_choice: those who obeyed
  chosen_spanish: los que obedecieron
  alternatives_spanish:
  - quienes obedecieron
  - los obedientes
  lexicon: N/A
  rationale: ὑπακούσαντες es el participio aoristo de obedecer/escuchar obedientemente; 'los que obedecieron' reproduce con claridad la relación causal y el matiz de respuesta a la proclamación.
- source_word: ἐσώθησαν
  english_pob_choice: were saved
  chosen_spanish: fueron salvados
  alternatives_spanish:
  - fueron rescatados
  - obtuvieron salvación
  lexicon: N/A
  rationale: El pasivo aoristo indica que recibieron salvación; 'fueron salvados' mantiene la voz pasiva y el valor soteriológico sin introducir una formulación más interpretativa.
theological_decisions:
- issue: Relación entre proclamación de arrepentimiento y salvación
  english_pob_reading: Noah proclaimed repentance, and those who obeyed were saved.
  chosen_spanish_reading: Noé proclamó arrepentimiento, y fueron salvados los que obedecieron.
  alternative_spanish_readings:
  - Noé predicó arrepentimiento, y los que obedecieron fueron salvados.
  - Noé anunció arrepentimiento, y los obedientes fueron salvados.
  rationale: El texto vincula obediencia a la proclamación con salvación sin desarrollar el mecanismo. La redacción española conserva esa relación directa sin añadir explicaciones doctrinales no presentes en el griego.
  doctrine_reference: Soteriología bíblica; obediencia a la advertencia divina como respuesta a la proclamación.
