  text: διὸ ἀπολίπωμεν τὰς κενὰς καὶ ματαίας φροντίδας, καὶ ἔλθωμεν ἐπὶ τὸν εὐκλεῆ καὶ σεμνὸν τῆς παραδόσεως ἡμῶν κανόνα.
