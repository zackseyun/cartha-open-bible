translation:
  language: es
  text: Por tanto, dejemos atrás las preocupaciones vacías y vanas, y vengamos a la norma gloriosa y venerable[a] de nuestra tradición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «solemne».
    reason: Alternativa léxica tradicional para σεμνός preservada en el rastro de auditoría inglés, aunque «venerable» es la opción preferida.
lexical_decisions:
- source_word: ἀπολίπωμεν
  english_pob_choice: let us leave behind
  chosen_spanish: dejemos atrás
  alternatives_spanish:
  - abandonemos
  - dejemos
  lexicon: ἀπολείπω
  rationale: Expresa la exhortación inclusiva del aoristo subjuntivo en primera persona plural con un giro natural en español que conserva la idea de apartarse de algo.
- source_word: κενὰς καὶ ματαίας φροντίδας
  english_pob_choice: empty and futile concerns
  chosen_spanish: las preocupaciones vacías y vanas
  alternatives_spanish:
  - las preocupaciones vacías e inútiles
  - las inquietudes vacías y vanas
  lexicon: κενός; μάταιος; φροντίς
  rationale: '''Vacías'' y ''vanas'' reproduce bien el doble matiz de inutilidad/insustancialidad del griego y mantiene el paralelismo retórico del original.'
- source_word: εὐκλεῆ
  english_pob_choice: glorious
  chosen_spanish: gloriosa
  alternatives_spanish:
  - ilustre
  - famosa
  lexicon: εὐκλεής
  rationale: En este contexto la referencia no es a gloria en sentido abstracto, sino a una cualidad distinguida y honorable; 'gloriosa' preserva la fuerza encomiástica del término.
- source_word: σεμνὸν
  english_pob_choice: venerable
  chosen_spanish: venerable
  alternatives_spanish:
  - solemne
  - augusta
  - digna de reverencia
  lexicon: σεμνός
  rationale: Se eligió 'venerable' porque en español comunica la dignidad reverente que el griego sugiere, y evita la reducción de 'solemne' a mero tono serio o ceremonioso.
- source_word: τῆς παραδόσεως ἡμῶν κανόνα
  english_pob_choice: rule of our tradition
  chosen_spanish: la norma de nuestra tradición
  alternatives_spanish:
  - el canon de nuestra tradición
  - la regla de nuestra tradición
  lexicon: κανών; παράδοσις
  rationale: '''Norma'' expresa el sentido de guía autoritativa de κανών en español contemporáneo sin cargarlo innecesariamente con asociaciones técnicas eclesiales. ''Tradición'' mantiene el vínculo con παράδοσις tal como aparece en el griego.'
theological_decisions:
- issue: Autoridad de la tradición
  english_pob_reading: the glorious and venerable rule of our tradition
  chosen_spanish_reading: la norma gloriosa y venerable de nuestra tradición
  alternative_spanish_readings:
  - el canon de nuestra tradición
  - la regla de nuestra tradición
  rationale: Se conserva la afirmación positiva de una tradición normativa, sin suavizarla ni convertirla en mero hábito humano. 'Norma' deja abierta la idea de estándar vinculante que el griego canónica y retóricamente comunica.
  doctrine_reference: Patrística / eclesiología primitiva
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'solemn' por 'venerable' para reflejar mejor σεμνός; la versión española adopta directamente 'venerable', por lo que no requiere nota alternativa. No se añadieron notas sin anclaje textual.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y eclesialmente legible sin recurrir a arcaísmos innecesarios.
  - '''Norma'' se usa como equivalente funcional de κανών en este contexto, evitando la ambigüedad técnica de ''canon'' si no se desea una lectura especializada.'
  - La coordinación 'vacías y vanas' reproduce la duplicación enfática del griego.
