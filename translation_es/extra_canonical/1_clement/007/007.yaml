reference: 1 Clement 7:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: Ἰωνᾶς Νινευίταις καταστροφὴν ἐκήρυξεν· οἱ δὲ μετανοήσαντες ἐπὶ τοῖς ἁμαρτήμασιν αὐτῶν ἐξιλάσαντο τὸν θεὸν ἱκετεύσαντες καὶ ἔλαβον σωτηρίαν, καίπερ ἀλλότριοι τοῦ θεοῦ ὄντες.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/007/007.yaml
  text: Jonah proclaimed destruction to the Ninevites; but they[a], having repented of their sins, made atonement to God by their supplication and received salvation, though they were strangers to God.
  footnotes:
  - marker: a
    text: Or 'made atonement before God'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:40Z'
    unchanged: false
    changes_summary: Updated 'Yonah' to the standard English form 'Jonah'; rendered the participles more closely with 'having repented' and 'by their supplication'; replaced 'appeased God' with 'made atonement to God' to reflect ἐξιλάσαντο more accurately while keeping formal register.
translation:
  language: es
  text: Jonás proclamó destrucción contra los ninivitas; pero ellos, habiéndose arrepentido de sus pecados, propiciaron a Dios[a] con su súplica y recibieron salvación, aunque eran extraños a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aplacaron a Dios»; el griego expresa directamente a Dios como objeto del verbo ἐξιλάσαντο.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰωνᾶς
  english_pob_choice: Jonah
  chosen_spanish: Jonás
  alternatives_spanish:
  - Yonás
  lexicon: Nombre propio bíblico
  rationale: Se adopta la forma española estable y reconocible del nombre del profeta. La revisión inglesa ya corrigió una forma menos estándar, y el griego aquí identifica claramente a Jonás.
- source_word: Νινευίταις
  english_pob_choice: the Ninevites
  chosen_spanish: los ninivitas
  alternatives_spanish:
  - los de Nínive
  lexicon: gentilicio/nombre étnico
  rationale: El dativo plural griego se vierte de manera natural como gentilicio plural en español. 'Ninivitas' conserva el referente colectivo de los habitantes de Nínive.
- source_word: καταστροφὴν ἐκήρυξεν
  english_pob_choice: proclaimed destruction
  chosen_spanish: proclamó destrucción
  alternatives_spanish:
  - anunció destrucción
  - predicó destrucción
  lexicon: κήρυσσω
  rationale: '''Proclamó'' mantiene el valor de anuncio público y solemne del verbo sin añadir matices no presentes. ''Destrucción'' corresponde directamente a καταστροφή.'
- source_word: μετανοήσαντες ἐπὶ τοῖς ἁμαρτήμασιν αὐτῶν
  english_pob_choice: having repented of their sins
  chosen_spanish: habiéndose arrepentido de sus pecados
  alternatives_spanish:
  - después de arrepentirse de sus pecados
  - arrepentidos de sus pecados
  lexicon: μετανοέω
  rationale: Se conserva el sentido moral de conversión/arrepentimiento, que en este contexto es claramente penitencial. La forma participial española refleja la anterioridad del acto respecto de lo que sigue.
- source_word: ἐξιλάσαντο τὸν θεὸν
  english_pob_choice: made atonement to God
  chosen_spanish: aplacaron a Dios
  alternatives_spanish:
  - propiciaron a Dios
  - hicieron expiación ante Dios
  lexicon: ἐξιλάσκομαι
  rationale: El griego toma a Dios como objeto directo, por lo que el español debe mantener la relación directa de propiciación/apaciguamiento. 'Aplacaron a Dios' conserva la fuerza relacional sin introducir una formulación litúrgica más técnica que podría sonar menos natural; la nota explica la alternativa más literal.
- source_word: ἱκετεύσαντες
  english_pob_choice: by their supplication
  chosen_spanish: con su súplica
  alternatives_spanish:
  - por su súplica
  - mediante su súplica
  lexicon: ἱκετεύω
  rationale: La construcción instrumental se expresa de manera breve y clara en español. 'Con su súplica' mantiene que la súplica es el medio por el cual se presenta la petición a Dios.
- source_word: ἔλαβον σωτηρίαν
  english_pob_choice: received salvation
  chosen_spanish: recibieron salvación
  alternatives_spanish:
  - obtuvieron salvación
  - alcanzaron salvación
  lexicon: σωτηρία
  rationale: '''Recibieron salvación'' sigue de cerca el verbo de recepción y conserva el carácter de don recibido. No se fuerza una interpretación doctrinal más específica que el texto no explicita.'
- source_word: καίπερ ἀλλότριοι τοῦ θεοῦ ὄντες
  english_pob_choice: though they were strangers to God
  chosen_spanish: aunque eran extraños a Dios
  alternatives_spanish:
  - aunque eran ajenos a Dios
  - aunque estaban lejos de Dios
  lexicon: ἀλλότριος
  rationale: '''Extraños a Dios'' conserva la idea de pertenencia ajena o no relación propia con Dios, muy cercana al inglés auditado. ''Ajenos a Dios'' sería posible, pero ''extraños'' mantiene la literalidad y la transparencia del vínculo roto.'
theological_decisions:
- issue: 'ἐξιλάσαντο τὸν θεόν: propiciación/apaciguamiento de Dios'
  english_pob_reading: made atonement to God
  chosen_spanish_reading: aplacaron a Dios
  alternative_spanish_readings:
  - propiciaron a Dios
  - hicieron expiación ante Dios
  rationale: El griego presenta a Dios como objeto directo del verbo, de modo que la traducción no debe desviar la acción hacia una mera postura 'ante' Dios. 'Aplacaron a Dios' refleja la idea de propiciación sin ocultar la tensión teológica de que la misericordia divina responde a la súplica penitente.
  doctrine_reference: Propiciación / penitencia en lenguaje de expiación
- issue: Relación entre arrepentimiento, súplica y salvación
  english_pob_reading: having repented ... by their supplication and received salvation
  chosen_spanish_reading: habiéndose arrepentido ... con su súplica y recibieron salvación
  alternative_spanish_readings:
  - después de arrepentirse ... mediante su súplica y recibieron salvación
  - arrepentidos ... por su súplica y recibieron salvación
  rationale: 'Se preserva la secuencia causal y temporal del texto: arrepentimiento, súplica, salvación. El español mantiene la estructura de medios sin convertirla en un esquema doctrinal más elaborado que el testimonio del pasaje.'
  doctrine_reference: Arrepentimiento, intercesión y salvación
- issue: Descripción de los ninivitas como 'extraños a Dios'
  english_pob_reading: though they were strangers to God
  chosen_spanish_reading: aunque eran extraños a Dios
  alternative_spanish_readings:
  - aunque eran ajenos a Dios
  - aunque no pertenecían a Dios
  rationale: 'La frase conserva la distancia relacional del original sin sustituirla por una categoría eclesial posterior. No se suaviza el contraste: los ninivitas, pese a su condición de extraños, reciben salvación.'
  doctrine_reference: Gentiles/forasteros y misericordia divina
translation_notes:
  revision_awareness: 'La versión inglesa pasó por una corrección lexical relevante: se rechazó ''made atonement before God'' por alterar la sintaxis griega y se volvió a una formulación con objeto directo de Dios. La presente redacción española refleja esa decisión manteniendo la relación directa del verbo con Dios y conservando la secuencia participial ''habiéndose arrepentido... con su súplica''.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός según la norma del proyecto.
  - '''Jonás'' se usa como forma española estándar del nombre propio.'
  - '''Ninivitas'' es el gentilicio natural para los habitantes de Nínive.'
  - Se evita 'SEÑOR' porque el texto griego usa θεός, no κύριος.
  - La nota de a pie señala la alternativa 'propiciaron a Dios' para preservar la tensión lexical del verbo ἐξιλάσαντο.
