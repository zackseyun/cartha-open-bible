revisions:
- from: Jonás proclamó destrucción a los ninivitas; pero ellos, habiéndose arrepentido de sus pecados, aplacaron a Dios[a] con su súplica y recibieron salvación, aunque eran extraños a Dios.
  to: Jonás proclamó destrucción contra los ninivitas; pero ellos, habiéndose arrepentido de sus pecados, propiciaron a Dios[a] con su súplica y recibieron salvación, aunque eran extraños a Dios.
  rationale: Se ajusta ἐξιλάσαντο τὸν θεόν a 'propiciaron a Dios' para reflejar mejor el valor expiatorio/propiciatorio del verbo con Dios como objeto directo, manteniendo en nota la alternativa más idiomática 'aplacaron a Dios'. También se mejora la naturalidad de la primera cláusula con 'contra los ninivitas'.
  reviewer_model: gpt-5.4
