review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el sentido general del griego: Jonás anuncia destrucción; los ninivitas se arrepienten de sus pecados; su súplica se relaciona con ἐξιλάσαντο τὸν θεόν; reciben salvación; y todo esto ocurre aunque eran ἀλλότριοι τοῦ θεοῦ. Sin embargo, la expresión española ''apla caron a Dios'' introduce un matiz de ira calmada que puede sonar más coloquial y más psicológico que el valor cultual/propiciatorio de ἐξιλάσαντο. Además, ''proclamó destrucción a los ninivitas'' es entendible pero menos natural en español que ''proclamó destrucción contra los ninivitas'' o ''anunció destrucción a los ninivitas''.'
  spanish_quality_summary: El español es claro y bastante legible, pero requiere un ajuste menor para mayor fidelidad semántica y mejor registro. 'Propiciaron a Dios' es más preciso que 'aplacaron a Dios' en un contexto de expiación/propiciación, y evita un tono demasiado llano. También conviene mejorar la preposición con 'contra los ninivitas' para sonar más natural sin apartarse del original.
  glossary_alignment: 'No hay choques con los términos troncales del proyecto. ''Dios'', ''arrepentido'', ''salvación'' y ''Jonás'' están bien. La principal decisión léxica discutible es ἐξιλάσαντο: el borrador reconoce correctamente que Dios es objeto directo, pero la opción principal debería reflejar mejor la fuerza propiciatoria documentada; la alternativa puede conservarse en nota.'
  issues:
  - severity: medium
    issue: '''apla caron a Dios'' para ἐξιλάσαντο τὸν θεόν'
    rationale: Aunque mantiene a Dios como objeto directo, 'aplacar' en español moderno suena más emocional/coloquial y menos apto para un contexto de propiciación o expiación. 'Propiciaron a Dios' preserva mejor la fuerza léxica y el registro digno.
  - severity: low
    issue: '''proclamó destrucción a los ninivitas'''
    rationale: Es comprensible, pero en español suena más natural 'proclamó destrucción contra los ninivitas' al expresar el contenido adversativo del anuncio.
  - severity: low
    issue: La nota actual presenta como alternativa lo que debería ser la lectura principal
    rationale: Si se adopta 'propiciaron a Dios' en el texto principal, la nota puede reservar la alternativa menos técnica 'aplacaron a Dios' como opción explicativa.
  revised_spanish_text: Jonás proclamó destrucción contra los ninivitas; pero ellos, habiéndose arrepentido de sus pecados, propiciaron a Dios[a] con su súplica y recibieron salvación, aunque eran extraños a Dios.
  revised_footnotes:
  - marker: a
    text: 'O: «aplacaron a Dios»; el griego expresa directamente a Dios como objeto del verbo ἐξιλάσαντο.'
    reason: lexical_alternative
  revision_rationale: Se ajusta ἐξιλάσαντο τὸν θεόν a 'propiciaron a Dios' para reflejar mejor el valor expiatorio/propiciatorio del verbo con Dios como objeto directo, manteniendo en nota la alternativa más idiomática 'aplacaron a Dios'. También se mejora la naturalidad de la primera cláusula con 'contra los ninivitas'.
