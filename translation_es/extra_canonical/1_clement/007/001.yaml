translation:
  language: es
  text: Estas cosas, amados, las hemos escrito no solo para amonestarles, sino también para recordarnos a nosotros mismos; pues estamos en el mismo estadio, y el mismo combate se nos presenta delante. Por tanto, dejemos atrás las preocupaciones vacías y vanas, y acerquémonos a la gloriosa y solemne regla de nuestra tradición. Y veamos qué es bueno, qué es agradable y qué es aceptable para el que nos hizo. Fijemos la mirada en la sangre del Mesías y entendamos cuán preciosa es para Dios y su Padre, porque, derramada para nuestra salvación, trajo al mundo entero la gracia del arrepentimiento[a]. Recorramos todas las generaciones y aprendamos cuidadosamente que, generación tras generación, el Soberano dio un lugar para el arrepentimiento[b] a quienes querían volver a él. Noé proclamó arrepentimiento, y los que obedecieron fueron salvados. Jonás proclamó destrucción a los ninivitas; pero los que se arrepintieron de sus pecados hicieron expiación ante Dios[c] al suplicarle y recibieron salvación,
    aunque eran extraños a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa más literal: «la gracia para arrepentirse». Se prefiere «la gracia del arrepentimiento» porque conserva mejor la construcción y la tensión teológica del original.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «un lugar de arrepentimiento». Se mantiene «un lugar para el arrepentimiento» porque conserva la imagen espacial del griego en un español más natural.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «aplacaron a Dios». El griego puede expresar una idea propiciatoria más fuerte; aquí se prefiere «hicieron expiación ante Dios» por claridad y para mantener el contexto penitencial sin estrechar demasiado el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκάμματι
  english_pob_choice: arena
  chosen_spanish: estadio
  alternatives_spanish:
  - arena
  - pista
  - campo de competencia
  lexicon: LSJ
  rationale: En español, 'estadio' conserva la imagen de un lugar público de competencia y suena natural en un registro digno; 'arena' también sería posible, pero puede sonar más figurado o ambiguo. Mantiene el paralelo con ἀγών.
- source_word: ἀγών
  english_pob_choice: struggle
  chosen_spanish: combate
  alternatives_spanish:
  - lucha
  - contienda
  - competencia
  lexicon: BDAG
  rationale: El término implica una contienda real de esfuerzo y prueba. 'Combate' transmite mejor la fuerza paraénetica del pasaje en español que 'lucha', sin perder el matiz de desafío compartido.
- source_word: φροντίδας
  english_pob_choice: concerns
  chosen_spanish: preocupaciones
  alternatives_spanish:
  - cuidados
  - ansiedades
  - ocupaciones
  lexicon: LSJ
  rationale: Con los adjetivos 'vacías' y 'vanas', 'preocupaciones' comunica bien el sentido de ocupaciones mentales improductivas o fútiles, y es claro en español actual.
- source_word: κανόνα
  english_pob_choice: rule
  chosen_spanish: regla
  alternatives_spanish:
  - norma
  - medida
  - criterio
  lexicon: BDAG
  rationale: '''Regla'' conserva la idea de un estándar normativo y encaja con el lenguaje eclesial del pasaje sin sonar excesivamente técnico.'
- source_word: παραδόσεως
  english_pob_choice: tradition
  chosen_spanish: tradición
  alternatives_spanish:
  - enseñanza transmitida
  - lo transmitido
  lexicon: BDAG
  rationale: '''Tradición'' refleja con fidelidad lo heredado y transmitido, que es precisamente la fuerza del término en este contexto comunitario.'
- source_word: σεμνὸν
  english_pob_choice: solemn
  chosen_spanish: solemne
  alternatives_spanish:
  - venerable
  - digno
  - reverente
  lexicon: LSJ
  rationale: '''Solemne'' reproduce bien el tono elevado y serio del original y combina de manera natural con ''gloriosa''.'
- source_word: ἀτενίσωμεν
  english_pob_choice: let us fix our gaze on
  chosen_spanish: Fijemos la mirada en
  alternatives_spanish:
  - Miremos atentamente
  - Concentremos la vista en
  - Contemplemos
  lexicon: BDAG
  rationale: La expresión preserva la idea de mirar con atención sostenida y suena natural en español bíblico contemporáneo.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se mantiene 'Mesías' conforme al criterio del proyecto para Χριστός cuando funciona como título. En español, esta opción evita convertirlo sin más en un nombre fijo litúrgico.
- source_word: τίμιον
  english_pob_choice: precious
  chosen_spanish: preciosa
  alternatives_spanish:
  - valiosa
  - estimada
  - honrada
  lexicon: BDAG
  rationale: '''Preciosa'' conserva el valor reverente y la idea de gran estima ante Dios, como en el inglés auditado.'
- source_word: μετανοίας χάριν
  english_pob_choice: the grace of repentance
  chosen_spanish: la gracia del arrepentimiento
  alternatives_spanish:
  - una oportunidad de arrepentimiento
  - el favor del arrepentimiento
  - la gracia para arrepentirse
  lexicon: BDAG
  rationale: '''Gracia del arrepentimiento'' conserva la tensión teológica del griego y del audit trail inglés: no es solo una ocasión, sino un don gracioso relacionado con el arrepentirse.'
- source_word: διήνεγκεν
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - llevó
  - aportó
  - condujo
  lexicon: LSJ
  rationale: '''Trajo'' es simple, fiel y suficientemente fuerte para expresar que la sangre extendió esa gracia al mundo entero.'
- source_word: μετανοίας τόπον
  english_pob_choice: a place for repentance
  chosen_spanish: lugar al arrepentimiento
  alternatives_spanish:
  - lugar para el arrepentimiento
  - espacio para arrepentirse
  - oportunidad de arrepentimiento
  lexicon: BDAG
  rationale: Se conserva la metáfora concreta de 'lugar', pero en español la preposición 'al' expresa con naturalidad el acceso concedido. Una nota mantiene la alternativa más literal.
- source_word: ἐπιστρέψαι
  english_pob_choice: to turn back
  chosen_spanish: volver
  alternatives_spanish:
  - regresar
  - volver atrás
  - volver a él
  lexicon: BDAG
  rationale: En este contexto, 'volver' comunica de forma natural el movimiento de retorno hacia Dios; el complemento 'a él' deja claro el referente.
- source_word: ἱκετεύσαντες
  english_pob_choice: by their supplication
  chosen_spanish: suplicándolo
  alternatives_spanish:
  - suplicándole
  - por medio de súplicas
  - rogándole
  lexicon: BDAG
  rationale: El participio se vierte de manera adverbial para conservar la relación de medio/acompañamiento del acto de implorar. 'Suplicándolo' mantiene el objeto y el tono elevado.
- source_word: ἐξιλάσαντο
  english_pob_choice: made atonement before God
  chosen_spanish: aplacaron a Dios
  alternatives_spanish:
  - hicieron expiación ante Dios
  - propiciaron a Dios
  - obtuvieron reconciliación con Dios
  lexicon: LSJ
  rationale: Aquí se conserva la fuerza propiciatoria que el inglés auditado también preserva en su alternativa más directa ('appeased God'). 'Aplacaron a Dios' expresa esa idea de manera clara y sobria en español, sin introducir formulaciones más técnicas de lo que el contexto exige.
- source_word: ἀλλότριοι τοῦ θεοῦ
  english_pob_choice: strangers to God
  chosen_spanish: extraños a Dios
  alternatives_spanish:
  - ajenos a Dios
  - lejanos de Dios
  - sin relación con Dios
  lexicon: BDAG
  rationale: '''Extraños a Dios'' es natural en español y conserva la distancia relacional/covenantal del griego y del inglés auditado.'
theological_decisions:
- issue: Renderización de Χριστός
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: 'Se sigue la política del proyecto: όταν Χριστός funciona como título, se traduce como ''Mesías'' para preservar el sentido semántico y no solo la forma heredada.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sentido de μετανοίας χάριν διήνεγκεν
  english_pob_reading: it brought the grace of repentance to the whole world
  chosen_spanish_reading: trajo al mundo entero la gracia del arrepentimiento
  alternative_spanish_readings:
  - trajo al mundo entero una oportunidad de arrepentimiento
  - trajo al mundo entero el favor del arrepentimiento
  rationale: La frase se entiende como una comunicación universal de un don gracioso relacionado con el arrepentimiento. Se evita reducirla a mera oportunidad o suavizar el peso teológico del don.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Función de ἐξιλάσαντο τὸν θεόν
  english_pob_reading: they made atonement before God by their supplication
  chosen_spanish_reading: aplaquaron a Dios y recibieron salvación
  alternative_spanish_readings:
  - hicieron expiación ante Dios
  - propiciaron a Dios
  rationale: El contexto penitencial permite una traducción sobria que mantenga la dimensión propiciatoria sin sobrecargar el pasaje con tecnicismos. Se conserva la relación entre súplica, arrepentimiento y salvación.
  doctrine_reference: 'DOCTRINE.md: Readable modern Spanish, not archaic or academic.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión inglesa, que afinó dos puntos: la coordinación “to God and his Father” y el participio “by supplicating him”. En español se reflejó la coordinación con “para Dios y para su Padre” y el medio participial con “suplicándolo”, manteniendo la misma precisión del auditable trail.'
  spanish_consistency_notes:
  - Se usó 'Mesías' en lugar de 'Cristo' para Χριστός, de acuerdo con la terminología del proyecto.
  - Se evitó usar 'SEÑOR' como máscara para el nombre divino; aquí 'el Señor' traduce δεσπότης del griego del contexto, no el Tetragrámaton.
  - '''Arrepentimiento'' se mantuvo para μετάνοια/μετανοίας por corresponder al sentido penitencial del pasaje.'
  - Se conservó el tono parenético elevado con 'solemne', 'gloriosa' y 'suplicándolo', evitando arcaísmos innecesarios.
