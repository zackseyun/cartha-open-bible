base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/007/001.yaml
  text: These things, beloved, we have written not only to admonish you, but also to remind ourselves; for we are in the same arena, and the same struggle lies before us. Therefore let us leave behind empty and futile concerns, and let us come to the glorious and solemn rule of our tradition. And let us see what is good, and what is pleasing, and what is acceptable to the one who made us. Let us fix our gaze on the blood of the Messiah and understand how precious it is to God and his Father, because, having been poured out for our salvation, it brought the grace of repentance to the whole world. Let us pass through all the generations and learn carefully that in generation after generation the Master gave a place for repentance to those willing to turn back to him. Noah proclaimed repentance, and those who obeyed were saved. Jonah proclaimed destruction to the Ninevites; but those who repented of their sins appeased God by supplicating him and received salvation, though they were strangers
    to God.
