  - severity: high
    issue: «suplicándolo» es gramaticalmente incorrecto
    rationale: Con objeto personal masculino singular en español estándar corresponde «suplicándole», no «suplicándolo». El borrador actual suena incorrecto y afecta la legibilidad.
  - severity: medium
