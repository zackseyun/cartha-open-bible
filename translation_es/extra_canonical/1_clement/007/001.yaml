  text: Ταῦτα, ἀγαπητοί, οὐ μόνον ὑμᾶς νουθετοῦντες ἐπεστέλλομεν, ἀλλὰ καὶ ἑαυτοὺς ὑπομιμνήσκοντες· ἐν γὰρ τῷ αὐτῷ ἐσμὲν σκάμματι, καὶ ὁ αὐτὸς ἡμῖν ἀγὼν ἐπίκειται. 2. διὸ ἀπολίπωμεν τὰς κενὰς καὶ ματαίας φροντίδας, καὶ ἔλθωμεν ἐπὶ τὸν εὐκλεῆ καὶ σεμνὸν τῆς παραδόσεως ἡμῶν κανόνα. 3. καὶ ἴδωμεν, τί καλὸν καὶ τί τερπνὸν καὶ τί προσδεκτὸν τῷ ποιήσαντι ἡμᾶς. . ἀτενίσωμεν εἰς τὸ αἷμα τοῦ Χριστοῦ καὶ γνῶμεν, ὡς ἔστιν τίμιον τῷ θεῷ καὶ πατρὶ αὐτοῦ, ὅτι διὰ τὴν ἡμετέραν σωτηρίαν ἐκχυθὲν παντὶ τῷ κόσμῳ μετανοίας χάριν διήνεγκεν. 5. διέλθωμεν εἰς τὰς γενεὰς πάσας καὶ καταμάθωμεν, ὅτι ἐν γενεᾷ καὶ γενεᾷ μετανοίας τόπον ἔδωκεν ὁ δεσπότης τοῖς βουλομένοις ἐπιστρέψαι ἐπ᾽ αὐτόν. 6. Νῶε ἐκήρυξεν μετάνοιαν, καὶ οἱ ὑπακούσαντες ἐσώθησαν. 7. Ἰωνᾶς Νινευίταις καταστροφὴν ἐκήρυξεν· οἱ δὲ μετανοήσαντες ἐπὶ τοῖς ἁμαρτήμασιν αὐτῶν ἐξιλάσαντο τὸν θεὸν ἱκετεύσαντες καὶ ἔλαβον σωτηρίαν, καίπερ ἀλλότριοι τοῦ θεοῦ ὄντες.
