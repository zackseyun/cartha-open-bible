  to: Estas cosas, amados, las hemos escrito no solo para amonestarles, sino también para recordarnos a nosotros mismos; pues estamos en el mismo estadio, y el mismo combate se nos presenta delante. Por tanto, dejemos atrás las preocupaciones vacías y vanas, y acerquémonos a la gloriosa y solemne regla de nuestra tradición. Y veamos qué es bueno, qué es agradable y qué es aceptable para el que nos hizo. Fijemos la mirada en la sangre del Mesías y entendamos cuán preciosa es para Dios y su Padre, porque, derramada para nuestra salvación, trajo al mundo entero la gracia del arrepentimiento[a]. Recorramos todas las generaciones y aprendamos cuidadosamente que, generación tras generación, el Soberano dio un lugar para el arrepentimiento[b] a quienes querían volver a él. Noé proclamó arrepentimiento, y los que obedecieron fueron salvados. Jonás proclamó destrucción a los ninivitas; pero los que se arrepintieron de sus pecados hicieron expiación ante Dios[c] al suplicarle y recibieron salvación,
