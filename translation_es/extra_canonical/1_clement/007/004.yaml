review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y la auditoría inglesa: conserva la exhortación hortativa, el valor sacrificial de «sangre», el título «Mesías», la relación explícita «su Dios y Padre», el participio causal de ἐκχυθέν y el alcance universal de παντὶ τῷ κόσμῳ. La única corrección necesaria es idiomática y terminológica en «la gracia del arrepentimiento», que en español suena menos natural y puede sugerir una relación posesiva ambigua; el sentido se expresa mejor como gracia ofrecida para arrepentirse.'
  spanish_quality_summary: El texto es claro y digno, pero «la sangre de Mesías» suena incompleto en español eclesial general; «la sangre del Mesías» es más natural y sigue siendo fiel al carácter titular de Χριστοῦ. Además, «la gracia del arrepentimiento» conviene ajustar a «la gracia para el arrepentimiento», que comunica mejor la función de χάρις en este contexto sin perder fidelidad. El resto del español es fluido y bien puntuado.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: Χριστός se mantiene como «Mesías», θεός como «Dios», χάρις como «gracia» y μετάνοια como «arrepentimiento». La revisión propuesta conserva esas decisiones y solo mejora la idiomaticidad española.'
  issues:
  - severity: medium
    issue: «de Mesías» suena poco natural en español
    rationale: Aunque no es incorrecto, en español general el título se articula con más naturalidad como «del Mesías» cuando no funciona como nombre propio fijo. Esto mejora la legibilidad sin alterar la política de traducir Χριστός como «Mesías».
  - severity: medium
    issue: «la gracia del arrepentimiento» es menos claro en español
    rationale: El griego μετανοίας χάριν puede expresarse literalmente, pero en español esa construcción puede sonar rígida o ambigua. «La gracia para el arrepentimiento» preserva χάρις y aclara que la gracia conduce/provee arrepentimiento, coherente con el contexto y con la traducción inglesa.
  revised_spanish_text: Fijemos la mirada en la sangre del Mesías y entendamos cuán preciosa es para su Dios y Padre[a], porque, habiendo sido derramada para nuestra salvación, trajo la gracia para el arrepentimiento a todo el mundo.
  revised_footnotes:
  - marker: a
    text: 'O: «a Dios, su Padre». La construcción griega favorece «su Dios y Padre».'
    reason: alternative_rendering
  revision_rationale: Se ajusta «de Mesías» a «del Mesías» por naturalidad del español y «la gracia del arrepentimiento» a «la gracia para el arrepentimiento» para expresar con mayor claridad el sentido de χάρις en español, sin cambiar el contenido teológico ni la terminología principal del proyecto.
