reference: 1 Clement 7:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἀτενίσωμεν εἰς τὸ αἷμα τοῦ Χριστοῦ καὶ γνῶμεν, ὡς ἔστιν τίμιον τῷ θεῷ καὶ πατρὶ αὐτοῦ, ὅτι διὰ τὴν ἡμετέραν σωτηρίαν ἐκχυθὲν παντὶ τῷ κόσμῳ μετανοίας χάριν διήνεγκεν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/007/004.yaml
  text: Let us fix our gaze on the blood of Messiah and understand how precious it is to his God and Father[a], because, having been poured out for our salvation, it brought the grace of repentance to the whole world.
  footnotes:
  - marker: a
    text: Or 'to God, his Father'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:39Z'
    unchanged: false
    changes_summary: 'Changed ''Messiah'' to ''Christ'' for more natural rendering and consistency with the Greek Χριστοῦ in this context; otherwise retained the draft as accurate and complete. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Fijemos la mirada en la sangre del Mesías y entendamos cuán preciosa es para su Dios y Padre[a], porque, habiendo sido derramada para nuestra salvación, trajo la gracia para el arrepentimiento a todo el mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a Dios, su Padre». La construcción griega favorece «su Dios y Padre».'
    reason: alternative_rendering
lexical_decisions:
- source_word: ἀτενίσωμεν
  english_pob_choice: Let us fix our gaze
  chosen_spanish: Fijemos la mirada
  alternatives_spanish:
  - Fijemos la vista
  - Miremos fijamente
  lexicon: ἀτενίζω
  rationale: El verbo expresa mirar con atención sostenida. «Fijemos la mirada» conserva la fuerza exhortativa y evita un calco áspero; «mirar fijamente» es posible, pero suena menos natural en este registro.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: αἷμα
  rationale: «Sangre» es la equivalencia directa y conserva el valor sacrificial del pasaje sin añadir más de lo que el griego dice. La idea de derramamiento aparece después en «habiendo sido derramada».
- source_word: Χριστοῦ
  english_pob_choice: Christ/Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: Χριστός
  rationale: Se sigue el criterio del proyecto de usar «Mesías» para Χριστός cuando el contexto no exige la forma litúrgica fija. Aquí funciona como título y mantiene la terminología de la auditoría revisada.
- source_word: τῷ θεῷ καὶ πατρὶ αὐτοῦ
  english_pob_choice: his God and Father
  chosen_spanish: su Dios y Padre
  alternatives_spanish:
  - Dios, su Padre
  - su Dios, y su Padre
  lexicon: θεός
  rationale: La construcción griega con un solo artículo y el pronombre posesivo permite y favorece «su Dios y Padre». Esta opción preserva la relación explícita de Dios como Dios de Cristo, que la revisión inglesa corrigió frente a una formulación menos precisa.
- source_word: ἐκχυθὲν
  english_pob_choice: having been poured out
  chosen_spanish: habiendo sido derramada
  alternatives_spanish:
  - derramada
  - siendo derramada
  lexicon: ἐκχέω
  rationale: En español, «derramada» aplica naturalmente a «sangre»; el participio perifrástico «habiendo sido derramada» conserva el matiz de acción previa y causal del griego.
- source_word: μετανοίας χάριν
  english_pob_choice: the grace of repentance
  chosen_spanish: la gracia del arrepentimiento
  alternatives_spanish:
  - la gracia para el arrepentimiento
  - el don del arrepentimiento
  lexicon: χάρις
  rationale: «Gracia» mantiene el valor de χάρις, y el genitivo «del arrepentimiento» sigue la relación del original. «Para el arrepentimiento» explicaría la finalidad, pero suavizaría la estructura del griego.
theological_decisions:
- issue: Relación entre Cristo y Dios el Padre
  english_pob_reading: his God and Father
  chosen_spanish_reading: su Dios y Padre
  alternative_spanish_readings:
  - Dios, su Padre
  - su Padre y Dios
  rationale: 'La decisión preserva la tensión teológica del griego: el Padre es presentado como Dios de Cristo. No se atenúa con una formulación que pueda sugerir identidad indiferenciada o un simple vocativo.'
  doctrine_reference: Cristología del Nuevo Testamento; subordinación relacional del Hijo al Padre en expresiones bíblicas
- issue: Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene el título mesiánico, coherente con la política terminológica del proyecto. En este contexto no hay razón para convertirlo en nombre propio litúrgico.
  doctrine_reference: Uso bíblico de Χριστός como título del Ungido
- issue: Alcance universal de la afirmación
  english_pob_reading: it brought the grace of repentance to the whole world
  chosen_spanish_reading: trajo la gracia del arrepentimiento a todo el mundo
  alternative_spanish_readings:
  - llevó la gracia del arrepentimiento al mundo entero
  - condujo la gracia del arrepentimiento a todo el mundo
  rationale: «A todo el mundo» refleja παντὶ τῷ κόσμῳ con naturalidad y mantiene el alcance universal sin introducir una interpretación más restrictiva o más expansiva.
  doctrine_reference: Universalidad del llamado al arrepentimiento
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail que restaura «Mesías» para Χριστός y conserva «su Dios y Padre» como reflejo más preciso de τῷ θεῷ καὶ πατρὶ αὐτοῦ. También toma en cuenta la corrección respecto de la versión inglesa anterior que decía «to God, his Father».
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός según la política terminológica del proyecto.
  - Se evita «SEÑOR» como sustituto de Yahvé porque este versículo no contiene el tetragrámaton.
  - «Gracia» se mantiene para χάρις; el contexto de arrepentimiento no exige «favor».
  - «Habiendo sido derramada» conserva el aspecto participial sin forzar una paráfrasis.
  - La puntuación reproduce el flujo causal del original con una coma antes de «porque».
