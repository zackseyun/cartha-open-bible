revisions:
- from: Fijemos la mirada en la sangre de Mesías y entendamos cuán preciosa es para su Dios y Padre[a], porque, habiendo sido derramada para nuestra salvación, trajo la gracia del arrepentimiento a todo el mundo.
  to: Fijemos la mirada en la sangre del Mesías y entendamos cuán preciosa es para su Dios y Padre[a], porque, habiendo sido derramada para nuestra salvación, trajo la gracia para el arrepentimiento a todo el mundo.
  rationale: Se ajusta «de Mesías» a «del Mesías» por naturalidad del español y «la gracia del arrepentimiento» a «la gracia para el arrepentimiento» para expresar con mayor claridad el sentido de χάρις en español, sin cambiar el contenido teológico ni la terminología principal del proyecto.
