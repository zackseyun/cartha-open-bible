revisions:
- from: Pasemos por todas las generaciones y aprendamos cuidadosamente que, en generación tras generación, el Dueño dio lugar al arrepentimiento[a] a los que querían volverse a él.
  to: Recorramos todas las generaciones y aprendamos con cuidado que, de generación en generación, el Amo dio lugar al arrepentimiento[a] a los que estaban dispuestos a volverse a él.
  rationale: Se ajusta δεσπότης a «el Amo» para conservar mejor la fuerza léxica y el registro digno; se cambia τοῖς βουλομένοις a «los que estaban dispuestos» para reflejar voluntad/disposición más fielmente; y se mejora la naturalidad de καταμάθωμεν con «aprendamos con cuidado». También se usa «de generación en generación», que es más idiomático en español y preserva la repetición temporal del original.
