revisions:
- from: De esto surgieron los celos y la envidia, las contiendas y la facción, la persecución y el desorden, la guerra y el cautiverio. Así, los deshonrados se levantaron contra los honrados, los innobles contra los nobles, los necios contra los prudentes, los jóvenes contra los ancianos. Por causa de esto, la justicia y la paz se alejaron mucho, porque cada uno abandonó el temor de Dios y se volvió corto de vista en la fe en él, sin andar en los caminos legítimos de sus mandamientos ni conducirse de una manera digna del Mesías, sino siguiendo cada uno los deseos de su corazón malo, habiendo tomado celos injustos e impíos, por los cuales también la muerte entró en el mundo.
  to: De esto surgieron los celos y la envidia, las contiendas y la facción, la persecución y el desorden, la guerra y el cautiverio. Así, los deshonrados se levantaron contra los honrados, los sin gloria contra los gloriosos, los necios contra los prudentes, los jóvenes contra los ancianos. Por causa de esto, la justicia y la paz se alejaron mucho, porque cada uno abandonó el temor de Dios y se hizo corto de vista en su fe en él, sin andar en los caminos legítimos de sus mandamientos ni conducirse de una manera digna del Mesías, sino siguiendo cada uno los deseos de su corazón malo, habiendo abrazado unos celos injustos e impíos, por medio de ellos también la muerte entró en el mundo.
  rationale: 'La revisión corrige una desviación semántica importante («innobles/nobles») para conservar el contraste de gloria del original y del POB inglés, y además pule dos expresiones para mejorar la naturalidad del español sin cambiar el sentido: la metáfora de la vista/fe y la cláusula final sobre los celos como medio por el cual entró la muerte. No se requieren notas al pie nuevas.'
