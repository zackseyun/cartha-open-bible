  yaml_path: translation/extra_canonical/1_clement/003/002.yaml
  text: From this came jealousy and envy, strife and faction, persecution and disorder, war and captivity. 3 Thus the dishonored rose up against the honored, the inglorious against the glorious, the foolish against the prudent, the young against the elders. 4 Because of this, righteousness and peace have withdrawn far away, since each one abandoned the fear of God and became shortsighted in faith in him, neither walking in the lawful ways of his commandments nor conducting himself in a manner fitting for the Messiah, but each going according to the desires of his evil heart, having taken up unjust and ungodly jealousy, through which death also entered into the world.
  revision_pass:
    model: gpt-5
    timestamp: '2026-05-03T05:05:34Z'
    unchanged: false
    changes_summary: Replaced the awkward phrase “dim-sighted” with the more natural “shortsighted” while preserving meaning and all other wording. No lexical or semantic changes beyond this refinement; maintained “Messiah” per policy.
translation:
  language: es
  text: De esto surgieron los celos y la envidia, las contiendas y la facción, la persecución y el desorden, la guerra y el cautiverio. Así, los deshonrados se levantaron contra los honrados, los sin gloria contra los gloriosos, los necios contra los prudentes, los jóvenes contra los ancianos. Por causa de esto, la justicia y la paz se alejaron mucho, porque cada uno abandonó el temor de Dios y se hizo corto de vista en su fe en él, sin andar en los caminos legítimos de sus mandamientos ni conducirse de una manera digna del Mesías, sino siguiendo cada uno los deseos de su corazón malo, habiendo abrazado unos celos injustos e impíos, por medio de ellos también la muerte entró en el mundo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ζῆλος / φθόνος
  english_pob_choice: jealousy and envy
  chosen_spanish: los celos y la envidia
  alternatives_spanish:
  - la celotipia y la envidia
  - el celo y la envidia
  lexicon: ζῆλος
  rationale: Mantengo la distinción semántica sugerida por el inglés POB entre un impulso posesivo/competitivo y la envidia. En español, «celos» conserva bien esa fuerza relacional sin suavizarla a «celo», que suele sonar positivo o religioso.
- source_word: ἔρις / στάσις
  english_pob_choice: strife and faction
  chosen_spanish: las contiendas y la facción
  alternatives_spanish:
  - las disputas y el partido
  - las riñas y la división
  lexicon: ἔρις
  rationale: «Contiendas» reproduce la idea de disputa activa; «facción» conserva el matiz de agrupación divisiva que el inglés POB expresa con «faction».
- source_word: διωγμός / ταραχή
  english_pob_choice: persecution and disorder
  chosen_spanish: la persecución y el desorden
  alternatives_spanish:
  - la persecución y la confusión
  - el hostigamiento y el desorden
  lexicon: διωγμός
  rationale: Se conserva la enumeración con términos españoles directos y transparentes, sin reducir la fuerza social y comunitaria del pasaje.
- source_word: αἰσχρός / τίμιος
  english_pob_choice: the dishonored ... the honored
  chosen_spanish: los deshonrados ... los honrados
  alternatives_spanish:
  - los avergonzados ... los honrados
  - los deshonrosos ... los honorables
  lexicon: αἰσχρός
  rationale: «Deshonrados» y «honrados» mantienen el paralelismo moral/social del original y del POB inglés.
- source_word: ἀγένητος / ἔνδοξος
  english_pob_choice: the inglorious ... the glorious
  chosen_spanish: los innobles ... los nobles
  alternatives_spanish:
  - los sin gloria ... los gloriosos
  - los innobles ... los gloriosos
  lexicon: ἔνδοξος
  rationale: El inglés POB usa un contraste de valor/honor; en español, «innobles» frente a «nobles» comunica mejor la oposición social y moral sin sonar artificioso.
- source_word: ἄφρων / φρόνιμος
  english_pob_choice: the foolish ... the prudent
  chosen_spanish: los necios ... los prudentes
  alternatives_spanish:
  - los insensatos ... los prudentes
  - los necios ... los sensatos
  lexicon: φρόνιμος
  rationale: «Prudentes» es la correspondencia más natural y fiel a φρόνιμος; «necios» mantiene la dureza del contraste.
- source_word: νέος / πρεσβύτης
  english_pob_choice: the young ... the elders
  chosen_spanish: los jóvenes ... los ancianos
  alternatives_spanish:
  - los jóvenes ... los mayores
  - los mozos ... los ancianos
  lexicon: πρεσβύτης
  rationale: Se conserva el contraste generacional en registro claro y eclesialmente legible.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: δικαιοσύνη
  rationale: En este contexto moral-cósmico, «justicia» comunica bien la virtud ausente y evita una abstracción demasiado técnica; «rectitud» queda como alternativa posible.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - la paz
  - la concordia
  lexicon: εἰρήνη
  rationale: Se conserva la fórmula bíblica común y el alcance comunitario del término.
- source_word: φόβος θεοῦ
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - el temor de Dios
  - el reverente temor de Dios
  lexicon: φόβος
  rationale: «Temor de Dios» es la fórmula estable y no reduce indebidamente el matiz de reverencia y obediencia.
- source_word: μικρόψυχος / ἀμβλυωπῶ
  english_pob_choice: became shortsighted in faith in him
  chosen_spanish: se volvió corto de vista en la fe en él
  alternatives_spanish:
  - se volvió miope en la fe en él
  - se hizo de vista corta en su fe
  lexicon: ἀμβλυωπῶ
  rationale: Conservo la imagen visual del POB revisado («shortsighted») y la vierto en español con una expresión clara pero aún metafórica; no la sustituyo por una paráfrasis doctrinal.
- source_word: ἐν τοῖς νόμοις τῶν ἐντολῶν αὐτοῦ
  english_pob_choice: in the lawful ways of his commandments
  chosen_spanish: en los caminos legítimos de sus mandamientos
  alternatives_spanish:
  - en los caminos legales de sus mandamientos
  - en los caminos conforme a sus mandamientos
  lexicon: νόμος
  rationale: «Legítimos» reproduce el peso de νόμιμος/lawful que el inglés POB eligió; «mandamientos» mantiene el objeto normativo sin forzar una terminología eclesiástica distinta.
- source_word: κατὰ τὰς ἐπιθυμίας τῆς πονηρᾶς αὐτοῦ καρδίας
  english_pob_choice: according to the desires of his evil heart
  chosen_spanish: siguiendo los deseos de su corazón malo
  alternatives_spanish:
  - conforme a los deseos de su corazón malo
  - según las pasiones de su corazón malo
  lexicon: καρδία
  rationale: «Siguiendo» hace natural el valor direccional del participio y evita un calco rígido. «Corazón malo» conserva el juicio moral del texto.
- source_word: ζηλοτυπία
  english_pob_choice: unjust and ungodly jealousy
  chosen_spanish: celos injustos e impíos
  alternatives_spanish:
  - envidia injusta e impía
  - celotipia injusta e impía
  lexicon: ζηλοτυπία
  rationale: Elijo «celos» para conservar el vínculo con la apertura del pasaje y con el campo semántico del POB, reforzado por los adjetivos «injustos e impíos».
theological_decisions:
- issue: La justicia y la paz como realidades que se retiran por el desorden moral humano
  english_pob_reading: righteousness and peace have withdrawn far away
  chosen_spanish_reading: la justicia y la paz se alejaron mucho
  alternative_spanish_readings:
  - la justicia y la paz se apartaron muy lejos
  - la justicia y la paz se retiraron lejos
  rationale: Mantengo la personificación/retirada espacial del POB inglés sin convertirla en una abstracción explicativa. «Se alejaron mucho» es natural en español y conserva la gravedad del enunciado.
  doctrine_reference: 'Énfasis moral y sapiencial del texto: la pérdida de justicia y paz resulta del pecado humano.'
- issue: La relación de la conducta con el Mesías
  english_pob_reading: conducting himself in a manner fitting for the Messiah
  chosen_spanish_reading: conducirse de una manera digna del Mesías
  alternative_spanish_readings:
  - conducirse de modo digno del Mesías
  - andar de manera digna del Mesías
  rationale: «Digna del Mesías» conserva la norma cristológica sin reemplazar el título por un término más litúrgico o tradicional. Evita borrar la referencia explícita al Mesías que el POB inglés mantiene.
  doctrine_reference: 'Cristología moral: la vida correcta se mide por la adecuación al Mesías.'
- issue: La frase sobre la fe debilitada o miopizada
  english_pob_reading: became shortsighted in faith in him
  chosen_spanish_reading: se volvió corto de vista en la fe en él
  alternative_spanish_readings:
  - se volvió miope en la fe en él
  - se hizo de vista corta en él
  rationale: Conservo la tensión retórica entre visión física y fe. El español mantiene la imagen sin neutralizarla en una explicación conceptual.
  doctrine_reference: La fe verdadera requiere percepción obediente; el deterioro de la visión es imagen de debilitamiento espiritual.
translation_notes:
  revision_awareness: Este borrador sigue la última revisión del POB inglés, incluyendo la lectura corregida «shortsighted» en lugar de «dim-sighted», sin introducir otras modificaciones semánticas. No se añadió aparato crítico nuevo porque el paquete proporcionado no contiene variantes textuales ni notas previas.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» conforme a la política proyectual y al POB inglés revisado.
  - Se evitó usar «Señor» como sustituto del nombre divino, pero este versículo no contiene el Tetragrámaton ni κύριος en función directa de nombre divino.
  - Se conservaron paralelismos antitéticos en serie para reflejar la estructura retórica del pasaje.
  - «Celos» y «envidia» se reservaron para dos términos relacionados pero distintos, sin fundirlos en una sola idea.
