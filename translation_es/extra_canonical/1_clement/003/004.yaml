source:
  edition: Funk 1901 (normalized OCR)
  text: διὰ τοῦτο πόρρω ἀπέστη ἡ δικαιοσύνη καὶ εἰρήνη, ἐν τῷ ἀπολιπεῖν ἕκαστον τὸν φόβον τοῦ θεοῦ καὶ ἐν τῇ πίστει αὐτοῦ ἀμβλυωπῆσαι, μηδὲ ἐν τοῖς νομίμοις τῶν προσταγμάτων αὐτοῦ πορεύεσθαι μηδὲ πολιτεύεσθαι κατὰ τὸ καλῆκον τῷ Χριστῷ, ἀλλὰ ἕκαστον βαδίζειν κατὰ τὰς ἐπιθυμίας τῆς καρδίας αὐτοῦ τῆς πονηρᾶς, ζῆλον ἄδικον καὶ ἀσεβῆ ἀνειληφότας, δι' οὗ καὶ θάνατος εἰσῆλθεν εἰς τὸν κόσμον.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/003/004.yaml
  text: Because of this[a], righteousness and peace have withdrawn far away, since each one abandoned the fear of God and became dim-sighted in faith in him, neither walking in the ordinances of his commandments nor conducting himself in a manner fitting for Christ, but each going according to the desires of his evil heart, having taken up unjust and ungodly jealousy[c][b], through which death also entered into the world.
  footnotes:
