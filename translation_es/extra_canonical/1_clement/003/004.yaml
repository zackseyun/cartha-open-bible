    text: Or 'the lawful ways'.
    reason: previous_rendering
  - marker: b
    text: Or 'his faith in him'.
    reason: previous_rendering
  - marker: c
    text: Or 'the Messiah'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:29Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Por esto, la justicia y la paz se alejaron mucho, porque cada uno abandonó el temor de Dios y se enturbió en la fe en él, sin andar en las ordenanzas[a] de sus mandamientos ni conducirse de un modo digno de Cristo, sino que cada uno caminó según los deseos de su corazón malo, habiendo tomado un celo injusto e impío[b][c], por el cual también la muerte entró en el mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las vías lícitas».
    reason: textual_variant
  - marker: b
    text: O «su fe en él».
    reason: lexical_alternative
  - marker: c
    text: O «el Mesías».
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: δικαιοσύνη
  rationale: En este contexto, la pareja con εἰρήνη pide un término moral y relacional amplio. 'Justicia' es el equivalente más natural y eclesialmente claro en español; 'rectitud' queda como alternativa válida, pero menos directa para el binomio tradicional.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz
  lexicon: εἰρήνη
  rationale: '''Paz'' comunica adecuadamente el sentido bíblico y patrístico sin necesidad de glosa.'
- source_word: τὰ νομίμα τῶν προσταγμάτων
  english_pob_choice: the ordinances of his commandments
  chosen_spanish: las ordenanzas de sus mandamientos
  alternatives_spanish:
  - las reglas de sus mandamientos
  - las disposiciones de sus mandamientos
  lexicon: νόμιμος / προσταγή
  rationale: La revisión inglesa favorece 'ordinances' frente a 'lawful ways', y el griego sustantivado τὰ νομίμα apunta a reglamentos u ordenanzas establecidas. 'Ordenanzas' preserva el registro formal y evita suavizar el valor normativo del sintagma.
- source_word: ἐν τῇ πίστει αὐτοῦ
  english_pob_choice: became dim-sighted in faith in him
  chosen_spanish: se enturbió en la fe en él
  alternatives_spanish:
  - se debilitaron en la fe en él
  - se cegó en su fe en él
  lexicon: πίστις
  rationale: 'El audit trail corrige el problema de doble posesivo en inglés y favorece una sola referencia objetiva: ''faith in him''. En español, ''en la fe en él'' conserva la relación objetiva, y ''se enturbió'' intenta reproducir la imagen de deterioro visual/del juicio sin alargar demasiado la frase.'
- source_word: τῷ Χριστῷ
  english_pob_choice: Christ
  chosen_spanish: Cristo
  alternatives_spanish:
  - el Mesías
  lexicon: Χριστός
  rationale: En 1 Clemente, el uso ya funciona como designación cristiana establecida; en español, 'Cristo' conserva ese registro epistolar y patrístico. 'El Mesías' introduciría una resonancia explicativa menos adecuada al contexto romano-corintio.
- source_word: δι' οὗ
  english_pob_choice: through which
  chosen_spanish: por el cual
  alternatives_spanish:
  - por la cual
  lexicon: διά + relativo
  rationale: El relativo retoma 'celo' (ζῆλον) de manera natural en español. 'Por el cual' mantiene la referencia causal instrumental sin añadir interpretación.
- source_word: ζῆλον ἄδικον καὶ ἀσεβῆ
  english_pob_choice: unjust and ungodly jealousy
  chosen_spanish: un celo injusto e impío
  alternatives_spanish:
  - una envidia injusta e impía
  - un celo injusto y sin piedad
  lexicon: ζῆλος
  rationale: '''Celo'' refleja mejor la ambivalencia del término griego que ''envidia'' y permite conservar la tensión ética: un celo desviado, no solo resentimiento. ''Impío'' traduce ἀσεβής con fidelidad religiosa.'
- source_word: ἀπολιπεῖν ... ἀμβλυωπῆσαι
  english_pob_choice: abandoned ... became dim-sighted
  chosen_spanish: abandonó ... y se enturbió
  alternatives_spanish:
  - dejó ... y se cegó
  - abandonó ... y perdió agudeza
  lexicon: ἀπολείπω / ἀμβλυωπέω
  rationale: '''Abandonó'' sigue de cerca ἀπολιπεῖν. Para ἀμβλυωπῆσαι, una traducción estrictamente óptica como ''se cegó'' sería más fuerte de lo que permite el contexto; ''se enturbió'' comunica debilitamiento de la percepción espiritual con sobriedad.'
theological_decisions:
- issue: Relación entre 'justicia y paz' y su alejamiento
  english_pob_reading: righteousness and peace have withdrawn far away
  chosen_spanish_reading: la justicia y la paz se alejaron mucho
  alternative_spanish_readings:
  - la justicia y la paz se retiraron lejos
  - la justicia y la paz se apartaron mucho
  rationale: Se conserva la imagen de alejamiento espacial como metáfora de pérdida comunitaria y moral, sin convertirla en una abstracción moderna.
  doctrine_reference: ética comunitaria y lenguaje profético de ruptura
- issue: Referencia de 'faith in him'
  english_pob_reading: faith in him
  chosen_spanish_reading: la fe en él
  alternative_spanish_readings:
  - su fe en él
  - la fe de él
  rationale: La corrección revisada evita atribuir dos veces el mismo pronombre. 'La fe en él' mantiene la lectura objetiva y es la forma más natural en español.
  doctrine_reference: gramática y referencia pronominal
- issue: Sentido de Χριστός
  english_pob_reading: Christ
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - el Mesías
  rationale: En el marco de 1 Clemente, el término ya opera como título/nombre cristiano fijo; traducirlo como 'el Mesías' movería el texto hacia una explicación que el griego aquí no desarrolla.
  doctrine_reference: cristología primitiva y uso eclesial del título
- issue: Función causal de la frase final
  english_pob_reading: through which death also entered into the world
  chosen_spanish_reading: por el cual también la muerte entró en el mundo
  alternative_spanish_readings:
  - por el cual la muerte también entró en el mundo
  - a causa del cual también la muerte entró en el mundo
  rationale: '''Por el cual'' conserva la causalidad instrumental del griego δι'' οὗ y mantiene el enlace con el ''celo'' precedente como agente mediador de la entrada de la muerte.'
  doctrine_reference: origen de la muerte mediante el pecado y la pasión desordenada
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'the lawful ways' a 'the ordinances' para acercarse al plural sustantivado griego τὰ νομίμα, y corrigió el doble valor pronominal de αὐτοῦ en ἐν τῇ πίστει αὐτοῦ, favoreciendo 'faith in him'. También mantuvo 'Christ' frente a 'the Messiah' por el registro epistolar de 1 Clemente. La versión española sigue esas decisiones y adapta el estilo para que suene natural y publicable en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo para el Tetragrámaton; aquí el texto dice θεός y por eso se traduce 'Dios'.
  - '''Cristo'' se usa como título/nombre fijo en este contexto, coherente con el audit trail en inglés.'
  - '''Ordenanzas'' preserva el matiz normativo de νόμιμα sin caer en una paráfrasis débil.'
  - La construcción 'fe en él' evita duplicar el posesivo y el objeto del pronombre griego.
  - '''Celo'' conserva la ambivalencia del griego ζῆλος y no lo reduce a ''envidia''.'
