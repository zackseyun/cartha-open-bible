translation:
  language: es
  text: 'Toda gloria y abundancia les fue dada, y se cumplió lo que está escrito: «Comió y bebió, engordó y se puso lustroso, y el amado dio coces».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: LSJ / uso bíblico
  rationale: «Gloria» conserva el campo semántico de honor y resplandor en paralelo con el contraste posterior entre lo honroso y lo deshonroso.
- source_word: πλατυσμός
  english_pob_choice: abundance
  chosen_spanish: abundancia
  alternatives_spanish:
  - prosperidad
  - ensanchamiento
  - expansión
  lexicon: LSJ
  rationale: En el contexto del pasaje y su alusión a Deuteronomio 32:15, el término apunta a prosperidad/abundancia más que a anchura literal.
- source_word: ἐτελέσθη
  english_pob_choice: was fulfilled
  chosen_spanish: se cumplió
  alternatives_spanish:
  - se realizó
  - quedó cumplido
  lexicon: uso bíblico
  rationale: «Se cumplió» es la forma natural y reverente en español para fórmulas de cumplimiento escritural.
- source_word: ἐπλατύνθη
  english_pob_choice: became fat and sleek / became broad
  chosen_spanish: se puso lustroso
  alternatives_spanish:
  - engordó
  - se ensanchó
  - se hizo ancho
  lexicon: LSJ
  rationale: El verbo en la cita apunta a una imagen de prosperidad corpórea y de complacencia. «Se puso lustroso» permite conservar el matiz de brillo/engrosamiento sin introducir una repetición poco natural en español; «engordó» queda implícito por el contexto inmediato.
- source_word: ἐπαχύνθη
  english_pob_choice: became fat
  chosen_spanish: se engordó
  alternatives_spanish:
  - engrosó
  - se volvió gordo
  lexicon: LSJ
  rationale: Es la correspondencia directa y clara para el verbo de volverse gordo/fofo, manteniendo el contraste con el otro verbo de la misma cita.
- source_word: ἀπελάκτισεν
  english_pob_choice: kicked
  chosen_spanish: pateó
  alternatives_spanish:
  - coceó
  - dio coces
  lexicon: LSJ
  rationale: «Pateó» comunica de manera natural la imagen de rechazo y recalcitrancia del animal/persona aludido en la cita.
theological_decisions:
- issue: Rendering of the allusive quotation from Deuteronomy 32:15
  english_pob_reading: He ate and drank, and became fat and sleek, and the beloved one kicked.
  chosen_spanish_reading: Comió y bebió, y se engordó y se puso lustroso, y pateó el amado.
  alternative_spanish_readings:
  - Comió y bebió, y engordó y se puso grueso, y el amado coceó.
  - Comió y bebió, y se hizo gordo y lustroso, y el amado dio coces.
  rationale: La formulación mantiene la cadencia escritural y la imagen de la cita, evitando suavizar la fuerza figurada del rechazo final. La combinación de verbos preserva la acumulación semántica del original.
  doctrine_reference: 'DOCTRINE.md: Preserve source imagery and allusive texture.'
translation_notes:
  revision_awareness: 'La redacción refleja la revisión auditada más reciente: se mantuvo la formulación breve de la cita, con el orden natural en español, y se evitó expandir innecesariamente el sentido de los verbos de engorde y del gesto final de rechazo.'
  spanish_consistency_notes:
  - Se usó «gloria» para δόξα y «abundancia» para πλατυσμός, en coherencia con el paralelismo del pasaje.
  - Se evitó «Cristo» en favor de la lógica titulada del texto fuente, pero esta sección no contiene Χριστός en la cita principal.
  - La cita bíblica se tradujo con ritmo breve y directo, apto para lectura pública.
