  text: Πᾶσα δόξα καὶ πλατυσμὸς ἐδόθη ὑμῖν καὶ ἐτελέσθη τὸ γεγραμμένον· Ἔφαγεν καὶ ἔπιεν, καὶ ἐπλατύνθη καὶ ἐπαχύνθη, καὶ ἀπελάκτισεν ὁ ἠγαπημένος. 2. Ἐκ τούτου ζῆλος καὶ φθόνος, ἔρις καὶ στάσις, διωγμὸς καὶ ἀκαταστασία, πόλεμος καὶ αἰχμαλωσία. 3. οὕτως ἐπηγέρθησαν οἱ ἄτιμοι ἐπὶ τοὺς ἐντίμους, οἱ ἄδοξοι ἐπὶ τοὺς ἐνδόξους, οἱ ἄφρονες ἐπὶ τοὺς φρονίμους, οἱ νέοι ἐπὶ τοὺς πρεσβυτέρους. 4. διὰ τοῦτο πόρρω ἀπέστη ἡ δικαιοσύνη καὶ εἰρήνη, ἐν τῷ ἀπολιπεῖν ἕκαστον τὸν φόβον τοῦ θεοῦ καὶ ἐν τῇ πίστει αὐτοῦ ἀμβλυωπῆσαι, μηδὲ ἐν τοῖς νομίμοις τῶν προσταγμάτων αὐτοῦ πορεύεσθαι μηδὲ πολιτεύεσθαι κατὰ τὸ καλῆκον τῷ Χριστῷ, ἀλλὰ ἕκαστον βαδίζειν κατὰ τὰς ἐπιθυμίας τῆς καρδίας αὐτοῦ τῆς πονηρᾶς, ζῆλον ἄδικον καὶ ἀσεβῆ ἀνειληφότας, δι' οὗ καὶ θάνατος εἰσῆλθεν εἰς τὸν κόσμον.
