source:
  edition: Funk 1901 (normalized OCR)
  text: οὕτως ἐπηγέρθησαν οἱ ἄτιμοι ἐπὶ τοὺς ἐντίμους, οἱ ἄδοξοι ἐπὶ τοὺς ἐνδόξους, οἱ ἄφρονες ἐπὶ τοὺς φρονίμους, οἱ νέοι ἐπὶ τοὺς πρεσβυτέρους.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/003/003.yaml
  text: So the dishonored rose up against the honored, the inglorious against the glorious, the foolish against the prudent, the young against the elders.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:27Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Así se levantaron los deshonrados contra los honrados, los sin gloria contra los gloriosos, los necios contra los prudentes, los jóvenes contra los ancianos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ ἄτιμοι
  english_pob_choice: the dishonored
  chosen_spanish: los deshonrados
  alternatives_spanish:
  - los deshonrados en honra
  - los deshonrados
  lexicon: ἄτιμος
  rationale: La idea es de carencia de honor, no simplemente de vergüenza personal. "Deshonrados" conserva la oposición directa con "honrados" y funciona con naturalidad en español.
- source_word: οἱ ἐντίμοι
  english_pob_choice: the honored
  chosen_spanish: los honrados
  alternatives_spanish:
  - los honorables
  - los honrados
  lexicon: ἔντιμος
  rationale: '"Honrados" transmite la dignidad o estima social del término sin introducir una connotación moral ajena al contraste del pasaje.'
- source_word: οἱ ἄδοξοι
  english_pob_choice: the inglorious
  chosen_spanish: los sin gloria
  alternatives_spanish:
  - los sin gloria
  - los ignominiosos
  lexicon: ἄδοξος
  rationale: Se conserva la antítesis con "gloriosos" evitando una palabra más pesada o menos transparente. "Sin gloria" reproduce bien la falta de gloria expresada por el griego.
- source_word: οἱ ἐνδόξοι
  english_pob_choice: the glorious
  chosen_spanish: los gloriosos
  alternatives_spanish:
  - los gloriosos
  - los ilustres
  lexicon: ἔνδοξος
  rationale: '"Gloriosos" mantiene el paralelismo con "sin gloria" y sigue de cerca el sentido de tener gloria o honra pública.'
- source_word: οἱ ἄφρονες
  english_pob_choice: the foolish
  chosen_spanish: los necios
  alternatives_spanish:
  - los necios
  - los insensatos
  lexicon: ἄφρων
  rationale: '"Necios" es una equivalencia estable y breve para la falta de prudencia o entendimiento. Conserva el tono proverbial del contraste.'
- source_word: οἱ φρονίμοι
  english_pob_choice: the prudent
  chosen_spanish: los prudentes
  alternatives_spanish:
  - los prudentes
  - los sensatos
  lexicon: φρόνιμος
  rationale: '"Prudentes" corresponde bien al término de sabiduría práctica y mantiene la pareja clásica necios/prudentes.'
- source_word: οἱ νέοι
  english_pob_choice: the young
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los jóvenes
  - los de menor edad
  lexicon: νέος
  rationale: '"Jóvenes" es la forma natural en español para edad menor y conserva la simple oposición generacional.'
- source_word: οἱ πρεσβύτεροι
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los ancianos
  - los mayores
  lexicon: πρεσβύτερος
  rationale: Aquí el contraste es de edad, no de oficio eclesial. Por eso se usa "ancianos" y no el valor técnico "presbíteros"; la decisión está apoyada por el paralelo con "los jóvenes".
theological_decisions:
- issue: Contraste generacional versus cargo eclesial en πρεσβύτεροι
  english_pob_reading: the elders
  chosen_spanish_reading: los ancianos
  alternative_spanish_readings:
  - los presbíteros
  - los mayores
  rationale: El contexto inmediato empareja a πρεσβύτεροι con νέοι, lo que favorece la referencia a edad/estatus generacional. Traducir "presbíteros" introduciría un sentido eclesiástico no señalado por el pasaje.
  doctrine_reference: Lexical context; no doctrinal claim
translation_notes:
  revision_awareness: La versión inglesa POB y la revisión más reciente coinciden sin cambios; el griego también presenta un paralelismo directo y estable. No se introdujeron notas porque no hubo variantes textuales ni ambigüedades que el español exigiera destacar adicionalmente.
  spanish_consistency_notes:
  - Se mantuvo la estructura paralelística de cuatro miembros con repetición de "los... contra los..." para reproducir el ritmo del original.
  - Se evitó "presbíteros" en favor de "ancianos" por fidelidad contextual y para no cargar el verso con un sentido técnico ajeno.
  - El registro es sobrio y bíblico, pero con español contemporáneo natural.
