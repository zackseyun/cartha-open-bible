source:
  edition: Funk 1901 (normalized OCR)
  text: πολλῶν οὖν πυλῶν ἀνεῳγυιῶν ἡ ἐν δικαιοσύνῃ αὕτη ἡ ἐστὶν ἡ ἐν Χριστῷ, ἐν ᾗ μακάριοι πάντες οἱ εἰσελθόντες καὶ κατευθύνοντες τὴν πορείαν αὐτῶν ἐν ὁσιότητι καὶ δικαιοσύνῃ, ἀταράχως πάντα ἐπιτελοῦντες.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/048/004.yaml
  text: Therefore[a], though many gates stand open, this gate in righteousness is the one in Christ, in which all who have entered and are directing their course in holiness and righteousness, accomplishing all things without disturbance[b], are blessed.
  footnotes:
  - marker: a
    text: Or 'this is the gate in righteousness—the one in the Messiah'.
    reason: previous_rendering
  - marker: b
    text: Or 'who entered through it and who direct'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:58Z'
    unchanged: false
    changes_summary: 'Recast the sentence to preserve the Greek structure with ''in which'' referring to the gate, retained both participles more explicitly (''have entered'' / ''are directing''), and revised the final phrase to a more formal rendering: ''accomplishing all things without disturbance.'''
translation:
  language: es
  text: Por tanto[a], aunque muchas puertas están abiertas, esta puerta en justicia es la puerta que está en Cristo, en la cual todos los que han entrado y dirigen su camino en santidad y justicia, llevando a cabo todo sin perturbación[b], son bienaventurados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque».'
    reason: alternative_reading
  - marker: b
    text: 'O: «sin trastorno» o «sin turbación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλῶν οὖν πυλῶν ἀνεῳγυιῶν
  english_pob_choice: though many gates stand open
  chosen_spanish: aunque muchas puertas están abiertas
  alternatives_spanish:
  - aunque muchas puertas permanecen abiertas
  - aunque muchas entradas están abiertas
  lexicon: πύλη / ἀνοίγω
  rationale: Se conserva la imagen de «gates» con «puertas», que es natural y bíblicamente transparente en español. «Están abiertas» expresa el estado resultante del perfecto participial griego sin volverlo más dinámico de lo necesario.
- source_word: ἡ ἐν δικαιοσύνῃ αὕτη ἡ ἐστὶν ἡ ἐν Χριστῷ
  english_pob_choice: this gate in righteousness is the one in Christ
  chosen_spanish: esta puerta en justicia es la que está en Cristo
  alternatives_spanish:
  - esta puerta en rectitud es la que está en Cristo
  - esta puerta de justicia es la que está en Cristo
  lexicon: δικαιοσύνη / ἐν Χριστῷ
  rationale: «Justicia» mantiene el alcance ético/covenantal del término sin sustituirlo por una paráfrasis. Se conserva «en Cristo» como fórmula fija ya establecida en el uso cristiano y en el propio griego, en lugar de forzar «Mesías» aquí.
- source_word: μακάριοι
  english_pob_choice: are blessed
  chosen_spanish: son bienaventurados
  alternatives_spanish:
  - son dichosos
  - son felices
  lexicon: μακάριος
  rationale: «Bienaventurados» reproduce el valor tradicional y solemnemente positivo de μακάριοι, más preciso que «felices» y más eclesialmente reconocible que «dichosos».
- source_word: οἱ εἰσελθόντες καὶ κατευθύνοντες τὴν πορείαν αὐτῶν
  english_pob_choice: who have entered and are directing their course
  chosen_spanish: los que han entrado y van dirigiendo su camino
  alternatives_spanish:
  - los que han entrado y dirigen su curso
  - los que entraron y dirigen su camino
  lexicon: εἰσελθόντες / κατευθύνοντες / πορεία
  rationale: El aoristo participial queda mejor con «han entrado», preservando la acción previa; el participio presente con «van dirigiendo» expresa proceso continuo. «Camino» comunica πορεία con fluidez en español, sin perder el sentido de trayectoria.
- source_word: ἐν ὁσιότητι καὶ δικαιοσύνῃ
  english_pob_choice: in holiness and righteousness
  chosen_spanish: en santidad y justicia
  alternatives_spanish:
  - en santidad y rectitud
  - con santidad y justicia
  lexicon: ὁσιότης / δικαιοσύνη
  rationale: «Santidad» es la correspondencia estable de ὁσιότης. Se mantiene «justicia» para δικαιοσύνη para no desplazar el término hacia una sola acepción moral estrecha.
- source_word: ἀταράχως πάντα ἐπιτελοῦντες
  english_pob_choice: accomplishing all things without disturbance
  chosen_spanish: realizando todas las cosas sin perturbación
  alternatives_spanish:
  - cumpliendo todas las cosas sin trastorno
  - llevando a cabo todas las cosas sin perturbación
  lexicon: ἀτάραχος / ἐπιτελέω
  rationale: «Sin perturbación» refleja el adverbio con un registro sobrio y formal, cercano a la calma/ausencia de turbación del griego. «Realizando» evita la excesiva interpretación de «cumpliendo» y conserva la idea de llevar a término.
theological_decisions:
- issue: 'Χριστῷ: ¿«Cristo» o «Mesías»?'
  english_pob_reading: the one in Christ
  chosen_spanish_reading: la que está en Cristo
  alternative_spanish_readings:
  - la que está en el Mesías
  - la que es del Mesías
  rationale: Aunque el título griego procede de «ungido/Mesías», el audit trail revisado señala que aquí λειτουργa ya como forma nominal fija dentro de la fórmula ἐν Χριστῷ. En español, «Cristo» conserva esa fórmula estable sin sobreexplicitar la etimología.
  doctrine_reference: Uso cristológico tradicional de la fórmula paulina «en Cristo»; distinción entre título etimológico y nombre/forma fija.
- issue: 'δικαιοσύνη: ¿«justicia» o «rectitud»?'
  english_pob_reading: in righteousness
  chosen_spanish_reading: en justicia
  alternative_spanish_readings:
  - en rectitud
  - en justicia y rectitud
  rationale: La versión inglesa mantiene «righteousness» dos veces; en español, «justicia» permite conservar esa repetición y su peso teológico. «Rectitud» sería posible, pero podría atenuar el eco jurídico/covenantal.
  doctrine_reference: Semántica bíblica de δικαιοσύνη como justicia/rectitud en sentido moral y relacional.
- issue: 'μακάριοι: tono de bendición escatológica o simple felicidad'
  english_pob_reading: are blessed
  chosen_spanish_reading: son bienaventurados
  alternative_spanish_readings:
  - son benditos
  - son felices
  rationale: «Bienaventurados» conserva el tono declarativo de bendición reconocida, evitando reducir el término a bienestar emocional. Es la forma española más fiel al registro bíblico solemne.
  doctrine_reference: Uso bíblico de μακάριος en las bienaventuranzas y fórmulas de dicha bendita.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés auditable: conserva la relación sintáctica de «en la cual» implícita en el griego mediante «y en ella», mantiene el paralelismo de los participios («han entrado» / «van dirigiendo»), y refleja el cierre formal de «without disturbance» con «sin perturbación». No se adoptó la lectura previa «Mesías» porque el último pase revisado la corrigió a «Cristo» por motivos sintácticos y de uso establecido.'
  spanish_consistency_notes:
  - Se preserva la fórmula cristológica estable «en Cristo» de modo consistente con el auditable English POB.
  - «Justicia» se usa de manera uniforme para δικαιοσύνη en este pasaje, sin alternar con «rectitud» dentro del mismo período.
  - «Bienaventurados» mantiene el registro bíblico solemne y evita una banalización afectiva.
  - La referencia anafórica «en ella» mantiene claro que el antecedente es la puerta, en línea con la estructura del griego.
