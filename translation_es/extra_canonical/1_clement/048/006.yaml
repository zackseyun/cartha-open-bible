    issue: «cuanto más parece ser mayor» es gramaticalmente posible pero poco natural en español
    rationale: La secuencia duplica comparativos de manera torpe. «cuanto mayor parece ser» expresa mejor δοκεῖ μᾶλλον μείζων εἶναι sin pérdida de sentido.
  - severity: medium
    issue: «y no lo que es suyo» puede leerse demasiado como posesión material
    rationale: En contexto, μὴ τὸ ἑαυτοῦ contrasta interés propio con bien común. «y no lo suyo propio» o «y no lo propio» comunica mejor la exhortación ética, manteniendo la brevedad del griego.
  - severity: low
    issue: La nota alternativa actual tiene puntuación algo artificiosa
    rationale: «Porque debe, tanto más, ser humilde...» suena menos natural. Puede simplificarse sin perder el valor de alternativa de orden.
