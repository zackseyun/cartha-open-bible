translation:
  language: es
  text: Que uno sea fiel; que uno sea capaz de exponer el conocimiento; que uno sea sabio en el discernimiento de palabras; que uno sea puro en obras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τις
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - alguien
  - una persona
  - un hombre
  lexicon: indefinite pronoun
  rationale: El griego usa un indefinido impersonal. «Uno» conserva el tono exhortativo general sin introducir género masculino específico ni suavizar la forma paralela del mandato.
- source_word: πιστός
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - leal
  - creyente
  lexicon: faithful
  rationale: «Fiel» es la correspondencia más directa y natural en español para πιστός en una exhortación de carácter moral y comunitario.
- source_word: δυνατός
  english_pob_choice: able
  chosen_spanish: capaz
  alternatives_spanish:
  - apto
  - poderoso
  - hábil
  lexicon: able
  rationale: «Capaz» transmite con claridad la aptitud requerida por el texto sin sobrecargar el matiz con fuerza física o autoridad.
- source_word: γνῶσιν ἐξεπεῖν
  english_pob_choice: to expound knowledge
  chosen_spanish: exponer el conocimiento
  alternatives_spanish:
  - expresar el conocimiento
  - explicar el conocimiento
  - declarar el conocimiento
  lexicon: expound knowledge
  rationale: «Exponer» conserva la idea de poner el conocimiento en forma articulada o explicada, acorde con el valor de ἐξεπεῖν. Se mantiene «el conocimiento» como objeto directo explícito, siguiendo la estructura del original y de la versión inglesa.
- source_word: διακρίσει λόγων
  english_pob_choice: discerning words
  chosen_spanish: discernir palabras
  alternatives_spanish:
  - discernir razones
  - discernir discursos
  - distinguir palabras
  lexicon: discerning words
  rationale: «Discernir palabras» refleja de manera directa la relación genitiva del griego y preserva la tensión entre distinguir, juzgar y valorar las palabras. No se especifica más para no estrechar indebidamente el alcance del texto.
- source_word: ἁγνὸς ἐν ἔργοις
  english_pob_choice: pure in works
  chosen_spanish: puro en obras
  alternatives_spanish:
  - limpio en obras
  - casto en obras
  - puro en hechos
  lexicon: pure in works
  rationale: «Puro en obras» sigue de cerca el griego y la formulación inglesa. «Obras» mantiene el ámbito concreto de la conducta, y «puro» conserva el valor ético general de ἁγνός sin reducirlo solo a castidad.
theological_decisions:
- issue: Carácter impersonal y exhortativo de las cadenas con ἤτω
  english_pob_reading: Let one be...; let one be...
  chosen_spanish_reading: Sea uno...; sea uno...
  alternative_spanish_readings:
  - Que uno sea...
  - Sea alguien...
  rationale: La serie de imperativos en subjuntivo reproduce una norma general para cualquier persona en el rol descrito. «Sea uno» mantiene la repetición paralela y el carácter exhortativo sin convertir el texto en una orden dirigida a un individuo concreto.
  doctrine_reference: No aplica una doctrina específica; se trata de una decisión sintáctica y retórica sobre el valor general del mandato.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'a man' y los repetidos 'him' por 'one' para reflejar con más precisión el indefinido griego τις. La traducción española sigue esa revisión con 'uno' y conserva la estructura paralela del pasaje.
  spanish_consistency_notes:
  - Se evita el masculino genérico «hombre» para no introducir una limitación no presente en el griego.
  - Se conserva la repetición anafórica de «sea uno» para reflejar el ritmo exhortativo del original.
  - No se añaden notas textuales porque el testimonio fuente y la versión inglesa presentan acuerdo alto y no hay variantes relevantes en el paquete dado.
