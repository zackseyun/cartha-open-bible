review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura exhortativa repetida de ἤτω y refleja adecuadamente τις como forma impersonal. También conserva con fidelidad πιστός, δυνατός, γνῶσιν ἐξεπεῖν y ἁγνὸς ἐν ἔργοις. La principal debilidad está en «sabio en discernir palabras», porque el griego ἐν διακρίσει λόγων expresa más naturalmente una cualidad de juicio o discernimiento respecto de las palabras/discursos, no una construcción infinitiva algo forzada en español.
  spanish_quality_summary: 'El español es claro, pero «Sea uno...» suena algo rígido y «sabio en discernir palabras» resulta poco idiomático. Una leve mejora mantiene el paralelismo y aumenta la naturalidad: «Que uno sea...» y «sabio en el discernimiento de palabras». El resto es legible y digno.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «fiel», «capaz», «exponer el conocimiento» y «puro en obras» son compatibles con el texto griego y con el rastro de auditoría inglés. Se justifica ajustar la expresión de διακρίσει λόγων para mejor español sin apartarse del sentido fuente.
  issues:
