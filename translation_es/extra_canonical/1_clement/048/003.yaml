translation:
  language: es
  text: «Esta es la puerta del Señor; los justos entrarán por ella».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αὕτη
  english_pob_choice: This
  chosen_spanish: Esta
  alternatives_spanish:
  - Ésta
  lexicon: demostrativo femenino singular
  rationale: El demostrativo deíctico se vierte de forma natural y directa con «Esta», conservando el señalamiento enfático del original sin añadir matices.
- source_word: ἡ πύλη
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de acceso
  - la entrada
  lexicon: πύλη
  rationale: «Puerta» reproduce de manera clara y publicable el sentido de acceso/entrada de πύλη en español, manteniendo el tono bíblico sin forzar un calco demasiado técnico.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  lexicon: κύριος
  rationale: Aquí el griego κυρίου refleja una fórmula bíblica de posesión/título divino; en español, «Señor» es la forma más fiel y natural en una expresión litúrgica establecida. Aunque el proyecto prefiere «Yahvé» para יהוה, en esta cita griega breve el término funciona como título reverencial ya fijado por el texto fuente y la tradición del enunciado.
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justificados
  lexicon: δίκαιος
  rationale: «Justos» conserva el valor moral y relacional de δίκαιοι y coincide con el uso bíblico común en español sin convertirlo indebidamente en una lectura meramente forense.
- source_word: εἰσελεύσονται
  english_pob_choice: will enter
  chosen_spanish: entrarán
  alternatives_spanish:
  - entrarán a
  - ingresarán
  lexicon: εἰσέρχομαι
  rationale: El futuro simple español expresa con naturalidad la acción futura del verbo griego, manteniendo la promesa sin añadir un objeto implícito.
- source_word: ἐν αὐτῇ
  english_pob_choice: through it
  chosen_spanish: por ella
  alternatives_spanish:
  - en ella
  - a través de ella
  lexicon: ἐν + pronombre
  rationale: La preposición ἐν con idea instrumental/local se traduce mejor aquí con «por ella», que comunica el medio o el acceso a través de la puerta. «A través de ella» sería más explícito pero menos sobrio; «en ella» podría sonar menos idiomático en español.
theological_decisions:
- issue: Designación divina en una cita griega breve
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: Aunque el proyecto usa «Yahvé» para יהוה, el texto dado es griego y emplea κύριος. La forma «el Señor» respeta la cita tal como está recibida y evita introducir una identificación más fuerte de la que el segmento aislado explicita.
  doctrine_reference: Uso reverencial del título divino en citas bíblicas griegas; distinción entre nombre divino y título.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que el acuerdo con la fuente fue alto; por ello se mantiene una formulación breve, directa y sin notas.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y público, sin modernizar en exceso el enunciado.
  - Se evita añadir puntuación explicativa o glosas que el griego no exige.
  - «Señor» se conserva como título divino en esta cita griega breve, en coherencia con el texto fuente y la lectura inglesa auditada.
