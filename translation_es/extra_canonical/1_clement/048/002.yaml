reference: 1 Clement 48:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: πύλη γὰρ δικαίσύνης ἀνεῳγυῖα εἰς ζωὴν αὐτὴ, καθὼς γέγραπται· Ἀνοίξατέ μοι πύλας δικαιοσύνης· εἰσελθὼν ἐν αὐταῖς ἐξομολογήσομαι τῷ κυρίῳ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/048/002.yaml
  text: 'For this is the gate of righteousness[a], opened unto life itself, just as it is written: “Open to me the gates of righteousness; entering through them, I will give thanks to the Lord.”'
  footnotes:
  - marker: a
    text: Or 'For a gate of righteousness has been opened—this very gate into life—'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:55Z'
    unchanged: false
    changes_summary: Adjusted word order and punctuation for natural English, rendered αὐτή with 'itself' for completeness, and changed 'as it is written' to 'just as it is written.'
translation:
  language: es
  text: 'Porque esta es la puerta de la justicia[a], abierta a la vida misma, tal como está escrito: «Ábranme las puertas de la justicia; al entrar por ellas, daré gracias al Señor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque una puerta de justicia ha sido abierta, esta misma puerta a la vida».'
    reason: Lectura alternativa basada en una formulación anterior del inglés auditado; se ajusta para mayor naturalidad en español.
lexical_decisions:
- source_word: πύλη
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portal
  - portón
  lexicon: πύλη
  rationale: En español, «puerta» comunica de modo natural el acceso figurado del pasaje. «Portal» suena más literario y «portón» agrega una imagen física más específica que el griego no exige.
- source_word: δικαίσύνης / δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: δικαιοσύνη
  rationale: «Justicia» es el equivalente más estable y bíblicamente comprensible en español. «Rectitud» sería posible, pero aquí el contexto de una puerta/entrada y la cita escritural favorecen el matiz de acceso justo o conforme a Dios.
- source_word: ἀνεῳγυῖα
  english_pob_choice: opened
  chosen_spanish: abierta
  alternatives_spanish:
  - abierta de par en par
  - que ha sido abierta
  lexicon: ἀνοίγω
  rationale: La forma participial se expresa de manera natural con «abierta». La pasiva «que ha sido abierta» sería más explícita pero menos fluida en esta construcción identificativa.
- source_word: εἰς ζωὴν
  english_pob_choice: unto life
  chosen_spanish: hacia la vida misma
  alternatives_spanish:
  - para la vida
  - a la vida
  lexicon: ζωή
  rationale: «Hacia la vida misma» conserva la idea direccional de εἰς y refleja el énfasis del inglés revisado «unto life itself», sin volverlo excesivamente interpretativo. «Para la vida» es posible, pero menos marcado.
- source_word: ἐξομολογήσομαι τῷ κυρίῳ
  english_pob_choice: I will give thanks to the Lord
  chosen_spanish: daré gracias al Señor
  alternatives_spanish:
  - confesaré al Señor
  - alabaré al Señor
  lexicon: ἐξομολογέομαι
  rationale: En este contexto de cita bíblica, el verbo puede significar dar gracias/pregonar alabanza. «Daré gracias» reproduce bien la opción del English POB y es idiomático en español. «Confesaré» sería demasiado estrecho para el efecto del pasaje.
- source_word: καθὼς γέγραπται
  english_pob_choice: just as it is written
  chosen_spanish: tal como está escrito
  alternatives_spanish:
  - como está escrito
  - justo como está escrito
  lexicon: γράφω
  rationale: «Tal como está escrito» mantiene fidelidad y claridad sin sonar forzado. El matiz de solemnidad se conserva sin necesidad de sobretraducir «just».
- source_word: τῷ κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  - Yahvé
  lexicon: κύριος
  rationale: Aquí el griego cita una fórmula bíblica estable en la que English POB conserva «the Lord». En español, «el Señor» corresponde mejor a la cita litúrgica y evita una doble identificación que el texto griego no explicita en esta línea.
theological_decisions:
- issue: Identidad de la puerta como acceso soteriológico
  english_pob_reading: For this is the gate of righteousness, opened unto life itself
  chosen_spanish_reading: Porque esta es la puerta de la justicia, abierta hacia la vida misma
  alternative_spanish_readings:
  - Porque una puerta de justicia ha sido abierta hacia la vida
  - Porque esta puerta de la justicia se ha abierto a la vida
  rationale: 'El griego y la revisión inglesa apuntan a una identificación: «esta es la puerta». La formulación española preserva esa lectura sin convertirla en un mero estado impersonal.'
  doctrine_reference: Imagen bíblica del acceso a la vida por medio del camino justo de Dios
- issue: Valor doxológico de ἐξομολογέομαι
  english_pob_reading: I will give thanks to the Lord
  chosen_spanish_reading: daré gracias al Señor
  alternative_spanish_readings:
  - confesaré al Señor
  - lo alabaré al Señor
  rationale: El contexto de cita de Salmos permite el sentido de acción de gracias. «Daré gracias» conserva el carácter cultual/doxológico sin forzar una confesión verbalizada que el español podría asociar primariamente a admisión de culpa.
  doctrine_reference: Uso bíblico de agradecimiento/alabanza como respuesta litúrgica a Dios
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió una lectura previa más paraprástica («a gate ... has been opened—this very gate into life—») hacia una cláusula identificativa más cercana al griego («this is the gate of righteousness, opened unto life itself»). La traducción española sigue esa revisión, manteniendo la identificación de la puerta y el matiz direccional de εἰς ζωήν.
  spanish_consistency_notes:
  - Se mantiene «justicia» para δικαιοσύνη, siguiendo el valor jurídico/covenantal habitual en este tipo de contexto.
  - Se conserva «Señor» para τῷ κυρίῳ dentro de la cita, por ser la forma española natural y estable en textos bíblicos.
  - La nota al pie ofrece la alternativa que corresponde a la lectura previa y a la ambigüedad identificativa de la frase griega.
