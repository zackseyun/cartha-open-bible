base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/048/001.yaml
  text: 'Let us therefore put this away quickly, and let us fall down before the Master and weep, imploring him that, having become gracious, he may be reconciled to us and restore us to the solemn and pure conduct of our brotherly love.


    For a gate of righteousness has been opened—this very gate into life—as it is written: “Open to me the gates of righteousness; entering through them, I will give thanks to the Lord.” “This is the gate of the Lord; the righteous will enter through it.”


    Therefore, though many gates stand open, this is the gate in righteousness—the one in the Messiah. Blessed are all who have entered through it and who direct their course in holiness and righteousness, carrying out all things without turmoil.


    Let a man be faithful; let him be able to expound knowledge; let him be wise in discerning words; let him be pure in works. For by so much the more he ought to be humble, by as much as he seems to be greater, and to seek what benefits all, and not what is his own.'
