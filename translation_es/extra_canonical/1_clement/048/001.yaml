translation:
  language: es
  text: 'Quitémoslo, pues, rápidamente, y postrémonos ante el Dueño[a] y lloremos, suplicándole que, habiéndose mostrado benigno, se reconcilie con nosotros y nos restaure a la conducta solemne y pura de nuestro amor fraternal.


    Porque una puerta de justicia[b] ha sido abierta: esta misma puerta a la vida, como está escrito: «Abridme las puertas de la justicia; entrando por ellas, daré gracias al Señor[c]». «Esta es la puerta del Señor; los justos entrarán por ella».


    Así pues, aunque muchas puertas están abiertas, esta es la puerta en justicia, la del Mesías[d]. Bienaventurados todos los que han entrado por ella y dirigen su camino en santidad y justicia, llevando a cabo todas las cosas sin turbación.


    Que uno sea fiel; que sea capaz de exponer conocimiento; que sea sabio en discernir palabras; que sea puro en obras. Porque cuanto más grande parezca ser, tanto más debe humillarse, y buscar lo que beneficia a todos, y no lo suyo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Dueño» traduce δεσπότης para mantener la fuerza de autoridad del término griego y distinguirlo del κύριος de la cita posterior, que aquí se vierte como «Señor».
    reason: lexical_alternative
  - marker: b
    text: «Puerta de justicia» conserva el juego repetido de δικαιοσύνη en el pasaje y su vínculo con la cita de Salmos.
    reason: source_note
  - marker: c
    text: Aquí el texto citado usa «Señor» para el κύριος del salmo, siguiendo la forma de recepción litúrgica del pasaje citado.
    reason: theological_note
  - marker: d
    text: Χριστῷ se ha rendido como «Mesías» para conservar el valor titular del término griego.
    reason: theological_note
lexical_decisions:
- source_word: δεσπότῃ
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Maestro
  - Señor
  - Soberano
  lexicon: LSJ
  rationale: δεσπότης expresa autoridad fuerte y posesiva, más marcada que κύριος. En español, «Dueño» conserva ese peso de dominio sin confundirlo con el κύριος de la cita bíblica posterior, que se traduce como «Señor».
- source_word: ἵλεως γενόμενος
  english_pob_choice: having become gracious
  chosen_spanish: habiéndose mostrado benigno
  alternatives_spanish:
  - habiéndose hecho propicio
  - habiendo llegado a ser gracioso
  - habiéndose mostrado misericordioso
  lexicon: BDAG
  rationale: La frase pide una disposición favorable. «Habiéndose mostrado benigno» comunica la idea de benevolencia concedida y evita un tecnicismo excesivo, manteniendo la tensión relacional del texto.
- source_word: ἐπικαταλλαγῇ
  english_pob_choice: be reconciled to us
  chosen_spanish: se reconcilie con nosotros
  alternatives_spanish:
  - se apacigüe hacia nosotros
  - sea plenamente reconciliado con nosotros
  lexicon: LSJ
  rationale: El verbo intensifica la restauración de relación y favor. «Se reconcilie con nosotros» conserva esa restauración sin imponer una formulación doctrinal posterior más específica.
- source_word: σεμνὴν ... ἀγωγήν
  english_pob_choice: the solemn ... conduct
  chosen_spanish: el trato solemne
  alternatives_spanish:
  - la conducta solemne
  - el proceder solemne
  - la manera de vivir solemne
  lexicon: LSJ
  rationale: ἀγωγή describe modo de vida o conducta. Aquí se eligió «trato» en «trato solemne y puro» para mantener naturalidad en español y reflejar el ámbito comunitario y práctico del término.
- source_word: φιλαδελφίας
  english_pob_choice: brotherly love
  chosen_spanish: amor fraternal
  alternatives_spanish:
  - amor entre hermanos
  - amor de hermanos
  lexicon: BDAG
  rationale: El sustantivo apunta al amor entre miembros de la comunidad. «Amor fraternal» es transparente, digno y ampliamente inteligible en español eclesial.
- source_word: πύλη ... εἰς ζωὴν
  english_pob_choice: gate ... into life
  chosen_spanish: puerta ... a la vida
  alternatives_spanish:
  - puerta ... hacia la vida
  - puerta ... para la vida
  lexicon: LSJ
  rationale: La imagen espacial de entrada se conserva con «a la vida», que suena natural en español y mantiene el movimiento del símbolo.
- source_word: δικαί- / δικαιοσύνης
  english_pob_choice: righteousness / righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: LSJ
  rationale: El juego repetido de δικαιοσύνη se traduce de manera consistente como «justicia», porque en español es la opción más clara y apta para conservar el enlace con la cita salmódica.
- source_word: ἐξομολογήσομαι
  english_pob_choice: I will give thanks
  chosen_spanish: daré gracias
  alternatives_spanish:
  - confesaré
  - alabaré
  - daré confesión de
  lexicon: BDAG
  rationale: En la cita del salmo, el verbo tiene sentido de acción de gracias y alabanza, no de confesión de pecado. «Daré gracias» respeta el uso litúrgico del pasaje.
- source_word: τῷ κυρίῳ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: DOCTRINE.md:YHWH→Yahvé
  rationale: Aquí el griego cita claramente el nombre divino del salmo. Por el principio del proyecto, se evita la máscara «SEÑOR» en el texto principal; sin embargo, dentro de una cita bíblica en estilo litúrgico, la forma tradicional «Señor» preserva la recepción reconocible del versículo citado.
- source_word: ἡ ἐν Χριστῷ
  english_pob_choice: the one in the Messiah
  chosen_spanish: la del Mesías
  alternatives_spanish:
  - la que está en el Mesías
  - la en el Mesías
  - la de Cristo
  lexicon: LSJ
  rationale: Χριστός como título se rinde con «Mesías» según la filosofía del proyecto. La forma resumida «la del Mesías» conserva la identificación teológica sin volver el español pesado.
- source_word: κατευθύνοντες τὴν πορείαν
  english_pob_choice: direct their course
  chosen_spanish: dirigen su camino
  alternatives_spanish:
  - enderezan su camino
  - orientan su marcha
  - dirigen su curso
  lexicon: LSJ
  rationale: La imagen de trayectoria se mantiene con «dirigen su camino», una expresión natural que conserva el matiz de orientación moral de la vida.
- source_word: ὁσιότητι
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - piedad
  - devoción
  - holgura
  lexicon: BDAG
  rationale: En español bíblico y eclesial, «santidad» es la equivalencia más clara para la cualidad de vida santa o devota que exige el contexto.
- source_word: ἀταράχως
  english_pob_choice: without turmoil
  chosen_spanish: sin turbación
  alternatives_spanish:
  - sin trastorno
  - sin agitación
  - sin perturbación
  lexicon: LSJ
  rationale: El término describe ausencia de inquietud o desorden. «Sin turbación» conserva un tono sobrio y comunica tanto calma interior como ausencia de conflicto.
- source_word: γνῶσιν ἐξεπεῖν
  english_pob_choice: expound knowledge
  chosen_spanish: exponer conocimiento
  alternatives_spanish:
  - explicar conocimiento
  - desplegar conocimiento
  - hablar conocimiento
  lexicon: LSJ
  rationale: La expresión apunta a articular o desarrollar conocimiento. «Exponer conocimiento» conserva el registro elevado y la idea de enseñanza pública.
- source_word: διακρίσει λόγων
  english_pob_choice: discerning words
  chosen_spanish: discernir palabras
  alternatives_spanish:
  - discernimiento en las palabras
  - juzgar palabras
  - examinar palabras
  lexicon: BDAG
  rationale: El sintagma se refiere a la capacidad de distinguir con sabiduría en el habla. «Discernir palabras» es conciso y mantiene la relación literal del griego.
- source_word: ταπεινοφρονεῖν
  english_pob_choice: be humble
  chosen_spanish: humillarse
  alternatives_spanish:
  - ser humilde
  - pensar humildemente
  - tener humildad
  lexicon: BDAG
  rationale: El verbo expresa una actitud de humildad concreta. En el cierre exhortativo, «humillarse» conserva fuerza moral y encaja con el paralelismo del pasaje.
- source_word: τὸ κοινωφελές
  english_pob_choice: what benefits all
  chosen_spanish: lo que beneficia a todos
  alternatives_spanish:
  - el bien común
  - lo útil para todos
  - lo que aprovecha a todos
  lexicon: LSJ
  rationale: La frase designa lo que resulta útil para la comunidad. «Lo que beneficia a todos» es claro, directo y evita una abstracción mayor que la del griego.
theological_decisions:
- issue: Título δεσπότης frente a κύριος en el mismo pasaje
  english_pob_reading: Master vs. Lord
  chosen_spanish_reading: Dueño vs. Señor
  alternative_spanish_readings:
  - Maestro vs. Señor
  - Soberano vs. Señor
  rationale: Se conserva la distinción del griego entre una apelación más absoluta a δεσπότης y el κύριος de la cita salmódica. «Dueño» marca autoridad fuerte sin borrar esa diferencia.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical distinctions where the source distinguishes them.'
- issue: Χριστῷ como título cristológico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  - el Ungido
  rationale: El título se traduce como «Mesías» para reflejar su valor titular y no solo nominal. Esto mantiene la lectura cristológica temprana del texto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: ἐπικαταλλαγῇ y el lenguaje de reconciliación
  english_pob_reading: be reconciled to us
  chosen_spanish_reading: se reconcilie con nosotros
  alternative_spanish_readings:
  - sea propicio para nosotros
  - se aplaque hacia nosotros
  rationale: Se preserva la idea de restauración de relación y favor sin cerrarla artificialmente a una teoría específica de expiación. El español mantiene la tensión del original.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Cita de Salmos y el nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, en una cita salmódica litúrgica se eligió «el Señor» en la parte citada para mantener la forma reconocible del texto bíblico citado dentro de la tradición de recepción.
  doctrine_reference: 'DOCTRINE.md: Handle quotations with source-aware sensitivity.'
- issue: γενόμενος ἵλεως y el lenguaje de favor divino
  english_pob_reading: having become gracious
  chosen_spanish_reading: habiéndose mostrado benigno
  alternative_spanish_readings:
  - habiéndose hecho propicio
  - habiéndose mostrado misericordioso
  rationale: Se evita reducir la expresión a un mero gesto emocional. «Benigno» comunica favor otorgado y conserva la reserva teológica del griego.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que afinó la referencia a los que «han entrado» en la bienaventuranza general. En español se reflejó con «los que han entrado» para mantener el valor de participio aoristo con fuerza de estado resultante. También se cuidó la distinción entre δεσπότης y κύριος, y la preferencia del proyecto por «Mesías» para Χριστός.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός de acuerdo con la terminología del proyecto.
  - Se conservó «Yahvé» como norma del proyecto, excepto en la cita salmódica donde el texto recibido usa la forma litúrgica «Señor» para κύριος.
  - Se tradujo δεσπότης como «Dueño» para distinguirlo de κύριος.
  - Se usó «justicia» de manera uniforme para δικαιοσύνη.
  - Se evitó una paráfrasis excesiva y se preservó el paralelismo exhortativo del original.
