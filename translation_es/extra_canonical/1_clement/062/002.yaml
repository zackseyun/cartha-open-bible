id: 1CLEM.62.2
reference: 1 Clement 62:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: περὶ γὰρ πίστεως καὶ μετανοίας καὶ γνησίας ἀγάπης καὶ ἐγκρατείας καὶ σωφροσύνης καὶ ὑπομονῆς πάντα τόπον ἐψηλαφήσαμεν, ὑπομιμνήσκοντες δεῖν ὑμᾶς ἐν δικαιοσύνῃ καὶ ἀληθείᾳ καὶ μακροθυμίᾳ τῷ παντοκράτορι θεῷ ὁσίως εὐαρεστεῖν, ὁμονοοῦντας ἀμνησικάκως ἐν ἀγάπῃ καὶ εἰρήνῃ μετὰ ἐκτενοῦς ἐπιεικείας, καθὼς καὶ οἱ προδεδηλωμένοι πατέρες ἡμῶν εὐηρέστησαν ταπεινοφρονοῦντες τὰ πρὸς τὸν πατέρα καὶ θεὸν καὶ κτίστην καὶ πάντας ἀνθρώπους.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/062/002.yaml
  text: For concerning faith and repentance and genuine love and self-control and sound-mindedness and endurance[a], we have touched on every point, reminding you that you ought to please Almighty God devoutly in righteousness and truth and longsuffering, being of one mind, free from resentment, in love and peace with earnest gentleness, just as also our fathers, who were spoken of before, were well-pleasing to him, humbling themselves before the Father and God and Creator and all people.
  footnotes:
  - marker: a
    text: Or 'please the Almighty God in holiness, in righteousness and truth and longsuffering'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:54Z'
    unchanged: false
    changes_summary: Adjusted word order for more natural English ('please Almighty God devoutly'). Revised the final clause from 'in what concerns' to 'before' to better reflect the sense of humbling oneself before the Father and God and Creator and all people.
translation:
  language: es
  text: Porque en cuanto a la fe y el arrepentimiento y el amor genuino y el dominio propio y la sensatez y la perseverancia, hemos tratado cada punto, recordándoles que deben agradar[a] a Dios Todopoderoso piadosamente en justicia y verdad y longanimidad, siendo de un mismo sentir, sin resentimiento, en amor y paz, con sincera gentileza, así como también nuestros padres, de quienes se habló antes, le agradaron, humillándose delante del Padre y Dios y Creador y de todas las personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agradar al Dios Todopoderoso en santidad, en justicia y verdad y longanimidad».
    reason: 'Alternativa preservada del historial inglés: una traducción anterior entendía ὁσίως como «en santidad» en vez de como adverbio que modifica «agradar».'
lexical_decisions:
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  lexicon: πίστις
  rationale: ‘Fe’ es la equivalencia natural y eclesialmente transparente para πίστεως; ‘confianza’ sería posible en algunos contextos, pero aquí la serie de virtudes conserva el valor más amplio de fe/creencia/fidelidad sin reducirlo.
- source_word: μετανοίας
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - conversión
  lexicon: μετάνοια
  rationale: El contexto exhorta a una respuesta moral y espiritual; ‘arrepentimiento’ comunica mejor que un calco cognitivo. ‘Conversión’ sería más interpretativo.
- source_word: γνησίας ἀγάπης
  english_pob_choice: genuine love
  chosen_spanish: amor genuino
  alternatives_spanish:
  - amor verdadero
  - amor sincero
  lexicon: ἀγάπη
  rationale: ‘Genuino’ preserva el contraste de autenticidad del adjetivo γνησίας sin añadir matices no pedidos; ‘amor sincero’ también sería viable, pero ‘genuino’ evita sonar emocionalista.
- source_word: ἐγκρατείας
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - templanza
  - autocontrol
  lexicon: ἐγκράτεια
  rationale: ‘Dominio propio’ es claro en español contemporáneo y corresponde al valor moral de ἐγκρατεία. ‘Templanza’ es más tradicional, pero puede sonar menos inmediato.
- source_word: σωφροσύνης
  english_pob_choice: sound-mindedness
  chosen_spanish: sensatez
  alternatives_spanish:
  - cordura
  - sobriedad mental
  lexicon: σωφροσύνη
  rationale: El inglés POB opta por una cualidad mental-moral. ‘Sensatez’ mantiene esa amplitud sin forzar una sola noción técnica; ‘cordura’ podría sonar más clínica.
- source_word: ὑπομονῆς
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - resistencia
  - constancia
  lexicon: ὑπομονή
  rationale: ‘Perseverancia’ comunica continuidad fiel bajo prueba. Aunque ‘resistencia’ es literal en algunos contextos, aquí ‘perseverancia’ suena más natural y éticamente completo.
- source_word: ἐψηλαφήσαμεν
  english_pob_choice: we have touched on every point
  chosen_spanish: lo hemos tratado en todo punto
  alternatives_spanish:
  - hemos examinado todos los puntos
  - hemos recorrido cada punto
  lexicon: ψηλαφάω
  rationale: La imagen de ‘palpar’ en griego se usa figuradamente; ‘lo hemos tratado en todo punto’ conserva la idea de abarcar exhaustivamente sin una metáfora extraña en español.
- source_word: εὐαρεστεῖν
  english_pob_choice: please
  chosen_spanish: agradar
  alternatives_spanish:
  - complacer
  - ser agradables a
  lexicon: εὐαρεστέω
  rationale: ‘Agradar’ reproduce la relación personal y moral del verbo mejor que ‘complacer’, que en español puede sonar más psicológico o doméstico.
- source_word: ὁσίως
  english_pob_choice: devoutly
  chosen_spanish: devotamente
  alternatives_spanish:
  - piadosamente
  - santamente
  lexicon: ὁσίως
  rationale: 'La adverbialidad es importante: modifica a ‘agradar’ y no a la lista siguiente. ‘Devotamente’ refleja el matiz de piedad reverente sin duplicar ‘justicia’.},{'
theological_decisions:
- issue: ὁσίως modifying εὐαρεστεῖν rather than the following ethical list
  english_pob_reading: please Almighty God devoutly in righteousness and truth and longsuffering
  chosen_spanish_reading: deben agradar a Dios Todopoderoso devotamente en justicia y verdad y longanimidad
  alternative_spanish_readings:
  - deben agradar devotamente a Dios Todopoderoso en justicia y verdad y longanimidad
  - deben agradar a Dios Todopoderoso en santidad, justicia y verdad y longanimidad
  rationale: La sintaxis griega permite ver ὁσίως como adverbio de εὐαρεστεῖν. Por eso ‘devotamente’ se coloca junto a ‘agradar’, evitando convertirlo en una cualidad adicional de la lista y respetando la distinción ya observada en la revisión inglesa.
  doctrine_reference: Greek syntax of adverbial modifier ὁσίως; POB audit revision on word order
- issue: τῷ παντοκράτορι θεῷ as divine title
  english_pob_reading: Almighty God
  chosen_spanish_reading: Dios Todopoderoso
  alternative_spanish_readings:
  - el Dios Todopoderoso
  - Al Dios Todopoderoso
  rationale: ‘Dios Todopoderoso’ reproduce el título sin perder la fuerza del dativo destinatario. Mantengo mayúscula reverencial estándar en español.
  doctrine_reference: Title of God; παντοκράτωρ as omnipotent/almighty
- issue: τὰ πρὸς τὸν πατέρα καὶ θεὸν καὶ κτίστην καὶ πάντας ἀνθρώπους
  english_pob_reading: before the Father and God and Creator and all people
  chosen_spanish_reading: delante del Padre y Dios y Creador y de todos los hombres
  alternative_spanish_readings:
  - ante el Padre y Dios y Creador y de todos los hombres
  - delante del Padre, Dios y Creador, y de todos los hombres
  rationale: La preposición ‘delante de’ refleja el matiz relacional de humillarse ante alguien. Conservo la acumulación ‘Padre y Dios y Creador’ sin suavizarla para no borrar la triple designación que el texto presenta.
  doctrine_reference: Humbling oneself before God and humans; referential accumulation in Greek
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente en el orden natural de ‘agradar a Dios Todopoderoso devotamente’ y evita trasladar la lectura anterior ‘en santidad’ a la lista ética, porque el griego separa ὁσίως como adverbio. También conserva la final ‘delante del Padre y Dios y Creador’ según el ajuste de la última revisión inglesa.
  spanish_consistency_notes:
  - Se mantiene ‘Dios Todopoderoso’ para παντοκράτωρ, coherente con el español bíblico sin ocultar el título.
  - ‘Longanimidad’ conserva el valor de μακροθυμία y evita rebajarla a simple paciencia.
  - ‘De un mismo sentir’ y ‘sin resentimiento’ reproducen ὁμονοοῦντας y ἀμνησικάκως sin reinterpretarlos.
  - Se evita ‘Señor’ para θεός; aquí el griego dice explícitamente ‘Dios’.
  - La triple designación final se conserva sin reordenarla, porque el texto acumulativo tiene peso retórico.
