revisions:
- from: Y hemos recordado estas cosas aún más[a], puesto que sabíamos claramente que escribíamos a hombres fieles y muy estimados, que han sido profundamente instruidos en las palabras de la instrucción de Dios.
  to: Y hemos traído estas cosas a su memoria aún más[a], puesto que sabíamos claramente que escribíamos a hombres fieles y muy estimados, que han sido profundamente instruidos en los dichos de la instrucción de Dios.
  rationale: Se revisa la frase principal para expresar claramente el sentido de ‘recordar a otros’ que tiene el verbo griego según el rastro de auditoría. También se mejora levemente la naturalidad de la cláusula final sin abandonar ‘instrucción’ para παιδεία. La nota al pie se simplifica y se centra en la alternativa de traducción pertinente.
