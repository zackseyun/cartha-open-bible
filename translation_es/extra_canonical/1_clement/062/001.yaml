base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/062/001.yaml
  text: Now concerning the matters that pertain to our religion and are most beneficial for a virtuous life to those who desire to direct their way in piety and righteousness, we have written to you sufficiently, brothers. For concerning faith and repentance and genuine love and self-control and soundness of mind and endurance, we have touched on every point, reminding you that you ought to please the Almighty God in holiness, righteousness, truth, and longsuffering, being of one mind, free from resentment, in love and peace with earnest gentleness, just as also our fathers, who were spoken of before, were well-pleasing, humbling themselves before the Father and God and Creator and all people. And we have urged these things all the more because we clearly knew that we were writing to faithful and highly esteemed men who have deeply absorbed the sayings of God's instruction.
