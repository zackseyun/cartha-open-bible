translation:
  language: es
  text: En cuanto a los asuntos que pertenecen a nuestra religión y que son muy provechosos para una vida virtuosa para quienes desean encaminar su andar en piedad y justicia, les hemos escrito suficientemente, hermanos. Porque acerca de la fe, el arrepentimiento, el amor genuino, el dominio propio, la sensatez[a] y la perseverancia, hemos tratado cada punto, recordándoles que deben agradar al Dios Todopoderoso en santidad, justicia, verdad y longanimidad, siendo de un mismo sentir, libres de resentimiento, en amor y paz con ferviente gentileza, así como también nuestros padres, de quienes se habló antes, fueron agradables, humillándose ante el Padre y Dios y Creador, y ante todos los hombres. Y hemos insistido en estas cosas tanto más cuanto claramente sabíamos que estábamos escribiendo a hombres fieles y muy estimados, que han absorbido profundamente[b] los dichos de la instrucción de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: σωφροσύνη puede entenderse también como «cordura», «prudencia» o «sobriedad»; aquí se eligió «sensatez» por su claridad en español.
    reason: lexical_alternative
  - marker: b
    text: El griego también puede sugerir la imagen de estar «empapados» o «saturados» de las enseñanzas; «han absorbido profundamente» intenta conservar esa idea sin volver áspera la redacción.
    reason: lexical_alternative
lexical_decisions:
- source_word: θρησκεία
  english_pob_choice: religion
  chosen_spanish: religión
  alternatives_spanish:
  - adoración
  - devoción
  lexicon: BDAG
  rationale: En este contexto, el término abarca la esfera pública y comunitaria de la vida religiosa; «religión» preserva ese alcance sin reducirlo a culto litúrgico.
- source_word: ἐνάρετος βίος
  english_pob_choice: virtuous life
  chosen_spanish: vida virtuosa
  alternatives_spanish:
  - vida excelente
  - vida de virtud
  lexicon: LSJ
  rationale: La frase describe una conducta moralmente excelente; «vida virtuosa» es natural en español y conserva el énfasis ético.
- source_word: διευθύνειν
  english_pob_choice: to order their way
  chosen_spanish: encaminar su andar
  alternatives_spanish:
  - dirigir su camino
  - guiar su curso
  - ordenar su camino
  lexicon: LSJ
  rationale: El verbo sugiere enderezar o dirigir el curso de la vida. «Encaminar su andar» transmite el sentido moral y práctico con fluidez en español.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: En la lista de virtudes, «fe» es la equivalencia más estable y natural; el contexto no exige matizar hacia «fidelidad».
- source_word: μετάνοια
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - volver atrás
  lexicon: BDAG
  rationale: Es el término cristiano ético-religioso estándar; «arrepentimiento» conserva tanto la fuerza moral como la teológica.
- source_word: γνησία ἀγάπη
  english_pob_choice: genuine love
  chosen_spanish: amor genuino
  alternatives_spanish:
  - amor sincero
  - amor verdadero
  lexicon: BDAG
  rationale: «Genuino» expresa la autenticidad del amor sin suavizar el matiz de sinceridad que marca el adjetivo.
- source_word: ἐγκράτεια
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - templanza
  lexicon: BDAG
  rationale: En español bíblico actual, «dominio propio» comunica con claridad la idea de disciplina interior y restricción de los impulsos.
- source_word: σωφροσύνη
  english_pob_choice: sound-mindedness
  chosen_spanish: sensatez
  alternatives_spanish:
  - prudencia
  - sobriedad
  - cordura
  lexicon: BDAG
  rationale: El término incluye juicio sobrio y equilibrio. «Sensatez» es el equivalente más claro y natural en español para esa amplitud de sentido.
- source_word: ὑπομονή
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - paciencia
  - constancia
  lexicon: BDAG
  rationale: El contexto de virtudes sostenidas favorece «perseverancia», que en español conserva el matiz de resistencia continua.
- source_word: ἐψηλαφήσαμεν πάντα τόπον
  english_pob_choice: we have touched on every point
  chosen_spanish: lo hemos examinado todo
  alternatives_spanish:
  - hemos tratado cada punto
  - hemos explorado cada aspecto
  lexicon: LSJ
  rationale: La imagen idiomática indica abarcar exhaustivamente el tema. «Lo hemos examinado todo» comunica esa cobertura completa sin resultar literal ni pesada.
- source_word: ὁσίως εὐαρεστεῖν
  english_pob_choice: to please ... in holiness
  chosen_spanish: agradar ... en santidad
  alternatives_spanish:
  - complacer ... piadosamente
  - ser agradables ... en santidad
  lexicon: BDAG
  rationale: «Agrada[r] ... en santidad» preserva el matiz devoto del verbo y la manera pía de agradar a Dios.
- source_word: ὁμονοοῦντας
  english_pob_choice: being of one mind
  chosen_spanish: siendo de un mismo sentir
  alternatives_spanish:
  - viviendo en armonía
  - pensando de común acuerdo
  lexicon: BDAG
  rationale: La exhortación subraya la unidad interior y comunitaria; «de un mismo sentir» es una fórmula idiomática clara y fiel.
- source_word: ἀμνησικάκως
  english_pob_choice: free from resentment
  chosen_spanish: libres de resentimiento
  alternatives_spanish:
  - sin rencor
  - sin guardar agravios
  - sin resentirse
  lexicon: LSJ
  rationale: El adverbio expresa no retener ofensas. «Libres de resentimiento» conserva el sentido ético con naturalidad.
- source_word: ἐκτενοῦς ἐπιεικείας
  english_pob_choice: earnest gentleness
  chosen_spanish: sincera gentileza
  alternatives_spanish:
  - gentileza ferviente
  - mansedumbre fervorosa
  - afable y constante
  lexicon: BDAG
  rationale: La combinación es poco usual en español. «Sincera gentileza» mantiene la cualidad seria y considerada del conjunto, aunque con menor choque sintáctico que una calca.
- source_word: εὐηρέστησαν
  english_pob_choice: were well-pleasing
  chosen_spanish: agradaron bien
  alternatives_spanish:
  - fueron del agrado de Dios
  - fueron agradables
  lexicon: BDAG
  rationale: El compuesto tiene un tono religioso formal; «agradaron bien» reproduce la idea de aceptación favorable con sobriedad. La ausencia de objeto explícito se conserva como en el griego.
- source_word: ταπεινοφρονοῦντες
  english_pob_choice: humbling themselves
  chosen_spanish: humillándose
  alternatives_spanish:
  - mostrándose humildes
  - rebajándose
  lexicon: BDAG
  rationale: El participio expresa una actitud activa de humildad. «Humillándose» preserva la fuerza verbal sin sobreexplicar el matiz.
- source_word: λόγια
  english_pob_choice: sayings
  chosen_spanish: dichos
  alternatives_spanish:
  - oráculos
  - palabras
  lexicon: BDAG
  rationale: «Dichos» mantiene un registro sobrio y suficientemente cercano al griego, sin la opacidad que puede tener «oráculos» en español moderno.
- source_word: παιδεία
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - formación
  lexicon: BDAG
  rationale: Aquí el término apunta al contenido formativo de la enseñanza divina. «Instrucción» conserva esa amplitud y es claro en español.
- source_word: ἐγκεχυφόσιν εἰς
  english_pob_choice: have deeply absorbed in
  chosen_spanish: han sido profundamente instruidos en
  alternatives_spanish:
  - están empapados en
  - han bebido profundamente de
  lexicon: LSJ
  rationale: La expresión sugiere estar saturados o plenamente impregnados de las enseñanzas. «Profundamente instruidos» comunica el resultado con un español digno y comprensible.
theological_decisions:
- issue: Renderización de θρησκεία en una auto-descripción cristiana temprana
  english_pob_reading: our religion
  chosen_spanish_reading: nuestra religión
  alternative_spanish_readings:
  - nuestra adoración
  - nuestra devoción
  rationale: El griego se refiere a la esfera amplia de la práctica y vida religiosa. «Religión» conserva ese alcance comunitario y ético sin reducirlo al acto litúrgico.
  doctrine_reference: Primacía del original; evitar estrechar indebidamente el campo semántico
- issue: Lista de virtudes con μετάνοια y σωφροσύνη
  english_pob_reading: faith and repentance and genuine love and self-control and soundness of mind and endurance
  chosen_spanish_reading: fe, arrepentimiento, amor genuino, dominio propio, sensatez y perseverancia
  alternative_spanish_readings:
  - fe, cambio de mente, amor sincero, autocontrol, cordura y constancia
  rationale: Se preserva la secuencia de virtudes sin normalizarla a un lenguaje eclesiástico fijo. «Sensatez» refleja la amplitud de σωφροσύνη mejor que un término más técnico.
  doctrine_reference: Mantener la tensión léxica y moral del listado virtuosista
- issue: ἀμνησικάκως en la exhortación comunitaria
  english_pob_reading: free from resentment
  chosen_spanish_reading: libres de resentimiento
  alternative_spanish_readings:
  - sin rencor
  - sin guardar agravios
  rationale: La idea central es no retener ofensas. «Libres de resentimiento» preserva tanto la dimensión interior como la comunitaria del mandato.
  doctrine_reference: Ética comunitaria de reconciliación
- issue: λόγια τῆς παιδείας τοῦ θεοῦ
  english_pob_reading: the sayings of God's instruction
  chosen_spanish_reading: los dichos de la instrucción de Dios
  alternative_spanish_readings:
  - los oráculos de la instrucción de Dios
  - las palabras de la disciplina de Dios
  rationale: Se conserva la estructura densa del genitivo sin resolverla en una sola paráfrasis. «Instrucción» traduce παιδεία y permite la lectura formativa sin perder el contenido verbal de λόγια.
  doctrine_reference: Preservar la tensión entre contenido dicho y formación recibida
translation_notes:
  revision_awareness: Se tuvo en cuenta el último pase de revisión inglesa, que afinó σωφροσύνη como «soundness of mind», suprimió un «to him» no explícito y volvió más natural «deeply absorbed/instructed». La versión española conserva esa precisión sin forzar equivalentes demasiado técnicos, y mantiene la ausencia de objeto donde el griego no lo expresa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» sólo cuando el texto fuente lo exija explícitamente; aquí el pasaje usa θεός, por lo que se traduce «Dios» y no se introduce el nombre divino.
  - Se preserva el registro exhortativo y comunitario sin neutralizar los masculinos explícitos de ἄνδρες/ἀνδράσιν.
  - «Genuino», «dominio propio» y «perseverancia» mantienen consistencia con el proyecto POB para γνησία ἀγάπη, ἐγκράτεια y ὑπομονή.
  - La lista de virtudes se vierte con términos corrientes y eclesialmente legibles, evitando tecnicismos innecesarios que oscurecerían el paralelismo griego.
  - Se conserva la cadena de títulos «Padre, Dios, Creador» sin introducir artículos que alteren el ritmo acumulativo del original.
