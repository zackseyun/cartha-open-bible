  to: En cuanto a los asuntos que pertenecen a nuestra religión y que son muy provechosos para una vida virtuosa para quienes desean encaminar su andar en piedad y justicia, les hemos escrito suficientemente, hermanos. Porque acerca de la fe, el arrepentimiento, el amor genuino, el dominio propio, la sensatez[a] y la perseverancia, hemos tratado cada punto, recordándoles que deben agradar al Dios Todopoderoso en santidad, justicia, verdad y longanimidad, siendo de un mismo sentir, libres de resentimiento, en amor y paz con ferviente gentileza, así como también nuestros padres, de quienes se habló antes, fueron agradables, humillándose ante el Padre y Dios y Creador, y ante todos los hombres. Y hemos insistido en estas cosas tanto más cuanto claramente sabíamos que estábamos escribiendo a hombres fieles y muy estimados, que han absorbido profundamente[b] los dichos de la instrucción de Dios.
  rationale: 'Se hicieron ajustes puntuales para mejorar fidelidad y naturalidad: se suavizó el orden inicial a «les hemos escrito suficientemente»; se cambió «lo hemos examinado todo» por «hemos tratado cada punto» para reflejar mejor ἐψηλαφήσαμεν πάντα τόπον; se reemplazó «sincera gentileza» por «ferviente gentileza» para acercarse a ἐκτενοῦς; se sustituyó «agradaron bien» por «fueron agradables», evitando una construcción poco idiomática; se aclaró la coordinación en «ante el Padre y Dios y Creador, y ante todos los hombres»; y se reforzó el matiz de ἐγκεχυφόσιν εἰς con «han absorbido profundamente».'
