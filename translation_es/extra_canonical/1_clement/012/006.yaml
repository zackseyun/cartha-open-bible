base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/012/006.yaml
  text: And they said to her, “It shall be so, as you have spoken to us. But when you know that we are coming, you shall gather all your people under your roof, and they will be preserved; for as many as are found outside the house will perish.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:42Z'
    unchanged: false
    changes_summary: Changed 'arriving' to 'coming' for a more natural rendering of παραγινομένους while preserving the sense. No other changes needed.
translation:
  language: es
  text: 'Y dijeron a ella: «Así será, como nos has dicho. Pero cuando sepas que venimos, reunirás a todos los tuyos bajo tu techo[a], y serán preservados; porque todos los que sean hallados fuera de la casa perecerán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Techo» traduce el valor doméstico de στέγος; puede entenderse también como «cubierta» o «techo de la casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπαν αὐτῇ
  english_pob_choice: And they said to her
  chosen_spanish: Y dijeron a ella
  alternatives_spanish:
  - Y le dijeron
  - Entonces le dijeron
  lexicon: καὶ / λέγω + dativo
  rationale: Conservo la coordinación narrativa y el destinatario explícito. «A ella» refleja el dativo griego de forma transparente; «le dijeron» sería más idiomático, pero menos explícito sobre el objeto directo indirecto del griego.
- source_word: Ἔσται οὕτως
  english_pob_choice: It shall be so
  chosen_spanish: Así será
  alternatives_spanish:
  - Será así
  - Sea así
  lexicon: ἔσται + οὕτως
  rationale: «Así será» mantiene el valor futurativo y la respuesta afirmativa solemne sin sonar artificial en español.
- source_word: ὡς ἐλάλησας ἡμῖν
  english_pob_choice: as you have spoken to us
  chosen_spanish: como nos has dicho
  alternatives_spanish:
  - como nos hablaste
  - tal como nos has hablado
  lexicon: λαλέω
  rationale: En español, «nos has dicho» comunica la idea de hablar comunicando instrucciones con naturalidad; «hablado» preserva más literalmente el verbo, pero suena menos directo en este contexto.
- source_word: παραγινομένους ἡμᾶς
  english_pob_choice: when you know that we are coming
  chosen_spanish: cuando sepas que venimos
  alternatives_spanish:
  - cuando sepas que estamos llegando
  - cuando sepas que nos acercamos
  lexicon: παραγίνομαι
  rationale: Sigo la revisión inglesa que optó por «coming» frente a «arriving», porque «venimos» es más natural en español y preserva el movimiento hacia la casa sin forzar un matiz de llegada consumada.
- source_word: συνάξεις πάντας τοὺς σοὺς ὑπὸ τὸ στέγος σου
  english_pob_choice: you shall gather all your people under your roof
  chosen_spanish: reunirás a todos los tuyos bajo tu techo
  alternatives_spanish:
  - juntarás a todos los tuyos bajo tu techo
  - reunirás a toda tu familia bajo tu techo
  lexicon: συνάγω + πάντας τοὺς σοὺς + στέγος
  rationale: «Los tuyos» preserva la referencia colectiva amplia del griego mejor que «familia»; «techo» reproduce la imagen doméstica de στέγος de manera natural en español.
- source_word: διασωθήσονται
  english_pob_choice: they will be preserved
  chosen_spanish: serán preservados
  alternatives_spanish:
  - serán salvados
  - serán librados
  lexicon: διασῴζω
  rationale: «Preservados» sigue la elección POB y conserva la pasividad sin introducir interpretaciones más soteriológicas que el contexto inmediato no exige.
- source_word: ὅσοι γὰρ ἐὰν εὑρεθῶσιν ἔξω τῆς οἰκίας
  english_pob_choice: for as many as are found outside the house
  chosen_spanish: porque todos los que sean hallados fuera de la casa
  alternatives_spanish:
  - porque cuantos sean hallados fuera de la casa
  - pues los que se encuentren fuera de la casa
  lexicon: ὅσοι / εὑρίσκω / οἰκία
  rationale: Mantengo la estructura distributiva de ὅσοι con «todos los que», que es clara y fiel. «Fuera de la casa» conserva la imagen espacial concreta del griego.
- source_word: ἀπολοῦνται
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - se perderán
  - morirán
  lexicon: ἀπόλλυμι
  rationale: «Perecerán» es el equivalente español más directo para la destrucción o pérdida final implicada por el contexto; evita reducirlo indebidamente a simple muerte física.
theological_decisions:
- issue: Alcance de διασωθήσονται
  english_pob_reading: they will be preserved
  chosen_spanish_reading: serán preservados
  alternative_spanish_readings:
  - serán salvados
  - serán librados
  rationale: La forma pasiva permite varias asociaciones, pero el contexto inmediato trata de quedar a salvo dentro de la casa. «Preservados» conserva la ambigüedad útil del original y evita cargar el texto con un matiz doctrinal más fuerte que el griego exige.
  doctrine_reference: soteriology / divine preservation
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «arriving» por «coming» para reflejar mejor παραγινομένους. La redacción española sigue esa revisión con «venimos», que mantiene el movimiento inminente sin hacer énfasis excesivo en la llegada consumada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero no aparece aquí porque el texto no contiene el nombre divino.
  - Se conservó «preservados» en vez de «salvos» para seguir la decisión auditada del inglés y no sobreteologizar διασωθήσονται.
  - No se usó «Cristo/Mesías» porque no hay título cristológico en el pasaje.
  - La secuencia narrativa respeta la estructura de mandato-condición-consecuencia del griego, con puntuación española natural.
