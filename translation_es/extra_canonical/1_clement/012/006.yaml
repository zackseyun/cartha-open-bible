review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: afirmación de acuerdo, condición temporal al saber de la venida, reunión de todos los suyos dentro de la protección doméstica, preservación de los reunidos y destrucción de los que queden fuera. No hay desvíos teológicos relevantes. Sin embargo, hay dos puntos mejorables para mayor fidelidad idiomática y precisión: «Y dijeron a ella» calca innecesariamente el dativo griego y suena poco natural en español; «bajo tu techo» es comprensible, pero en este contexto de refugio doméstico «bajo tu techo» puede mantenerse sin nota, o mejor aún «dentro de tu casa» si se priorizara claridad; como el inglés POB conserva “under your roof”, conviene mantener la imagen.'
  spanish_quality_summary: 'El texto es claro y digno, pero contiene un giro poco natural: «Y dijeron a ella» debería ser «Y le dijeron». También «serán preservados» es fiel al POB, aunque algo menos idiomático que «quedarán a salvo»; dado el rastro auditado, puede mantenerse. La nota sobre «techo» explica algo que el español ya entiende y termina introduciendo una glosa menos natural («cubierta»), por lo que no hace falta.'
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión «preservados» concuerda con el POB auditado para διασωθήσονται. «Los tuyos» representa bien πάντας τοὺς σοὺς. Se recomienda ajustar solo la sintaxis española en el inicio y eliminar la nota léxica innecesaria.
  issues:
  - severity: medium
    issue: «Y dijeron a ella» suena calcado del griego
    rationale: Aunque refleja el dativo αὐτῇ, en español bíblico natural y moderno corresponde «Y le dijeron». Mantiene exactamente el sentido con mejor legibilidad.
  - severity: low
    issue: La nota [a] sobre «techo» es innecesaria
    rationale: «Bajo tu techo» es una expresión española comprensible y suficientemente fiel a ὑπὸ τὸ στέγος σου. La nota no resuelve una ambigüedad real y añade una alternativa menos natural.
  revised_spanish_text: 'Y le dijeron: «Así será, como nos has dicho. Pero cuando sepas que venimos, reunirás a todos los tuyos bajo tu techo, y serán preservados; porque todos los que sean hallados fuera de la casa perecerán».'
  revision_rationale: Se corrige el inicio a «Y le dijeron» para lograr español natural sin pérdida de sentido. Se elimina la nota sobre «techo» por innecesaria, manteniendo la imagen doméstica del griego y del inglés POB.
