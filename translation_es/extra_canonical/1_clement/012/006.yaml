  text: καὶ εἶπαν αὐτῇ· Ἔσται οὕτως, ὡς ἐλάλησας ἡμῖν. ὡς δʼ ἂν γνῷς παραγινομένους ἡμᾶς, συνάξεις πάντας τοὺς σοὺς ὑπὸ τὸ στέγος σου, καὶ διασωθήσονται· ὅσοι γὰρ ἐὰν εὑρεθῶσιν ἔξω τῆς οἰκίας, ἀπολοῦνται.
