review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la secuencia y el sentido general del griego: Josué hijo de Nun envía espías a Jericó; el rey se entera, manda hombres para prenderlos, y procura su muerte tras capturarlos. También preserva bien la distinción contextual de Ἰησοῦ como Josué. Sin embargo, ἐκπεμφθέντων es pasivo (''habiendo sido enviados'' / ''fueron enviados''), mientras que el español actual lo vuelve activo (''había enviado''), y θανατωθῶσιν se expresa de manera algo poco natural en español con ''fueran muertos''.'
  spanish_quality_summary: El texto es claro y legible, pero requiere un ajuste menor para mayor fidelidad y mejor español eclesial moderno. 'Porque cuando ... había enviado' suena algo pesado, y 'fueran muertos' resulta torpe en español contemporáneo. 'Fueran condenados a muerte' sería más interpretativo; mejor 'se les diera muerte', que conserva la pasiva de resultado sin juridizar el texto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Josué', 'Jericó', 'espías' y 'tierra' están bien elegidos. La coherencia entre 'rey de la tierra' y 'su tierra' está bien preservada según la revisión inglesa sobre 'land'.
  issues:
  - severity: medium
    issue: La pasiva participial ἐκπεμφθέντων se volvió activa en español
    rationale: El griego dice literalmente que los espías 'habían sido enviados', no que Josué 'había enviado' en forma activa. Aunque el sentido global se conserva, la voz cambia innecesariamente.
  - severity: medium
    issue: '''fueran muertos'' suena antinatural en español actual'
    rationale: Aunque intenta reflejar la pasiva de θανατωθῶσιν, la frase no es idiomática en español bíblico moderno. 'Se les diera muerte' mantiene el sentido y la dignidad del registro sin añadir matiz jurídico.
  revised_spanish_text: Porque cuando espías habían sido enviados por Josué hijo de Nun a Jericó, el rey de la tierra supo que habían venido para espiar su tierra, y envió hombres para prenderlos, a fin de que, una vez capturados, se les diera muerte.
  revision_rationale: Se ajusta la voz pasiva de ἐκπεμφθέντων para reflejar con más precisión el original griego y se reemplaza 'fueran muertos' por la formulación más natural y fiel 'se les diera muerte'. No se requieren notas.
