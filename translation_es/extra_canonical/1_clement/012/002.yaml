revisions:
- from: Porque cuando Josué hijo de Nun había enviado espías a Jericó, el rey de la tierra supo que habían venido para espiar su tierra, y envió hombres para prenderlos, a fin de que, una vez capturados, fueran muertos.
  to: Porque cuando espías habían sido enviados por Josué hijo de Nun a Jericó, el rey de la tierra supo que habían venido para espiar su tierra, y envió hombres para prenderlos, a fin de que, una vez capturados, se les diera muerte.
  rationale: Se ajusta la voz pasiva de ἐκπεμφθέντων para reflejar con más precisión el original griego y se reemplaza 'fueran muertos' por la formulación más natural y fiel 'se les diera muerte'. No se requieren notas.
  reviewer_model: gpt-5.4
