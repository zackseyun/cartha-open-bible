id: 1CLEM.12.2
reference: 1 Clement 12:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἐκπεμφθέντων γὰρ ὑπὸ Ἰησοῦ τοῦ τοῦ Ναυὴ κατασκόπων εἰς τὴν Ἰεριχώ, ἔγνω ὁ βασιλεὺς τῆς γῆς, ὅτι ἥκασιν κατασκοπεῦσαι τὴν χώραν αὐτῶν, καὶ ἐξέπεμψεν ἄνδρας τοὺς συλλημψομένους αὐτούς, ὅπως συλληφθέντες θανατωθῶσιν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/012/002.yaml
  text: For when spies had been sent out by Joshua son of Nun to Jericho, the king of the land learned that they had come to spy out their land, and he sent men to seize them, so that, once captured, they might be put to death.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:42Z'
    unchanged: false
    changes_summary: Changed 'their country' to 'their land' for closer lexical correspondence to χώραν and consistency with 'the king of the land.'
translation:
  language: es
  text: Porque cuando espías habían sido enviados por Josué hijo de Nun a Jericó, el rey de la tierra supo que habían venido para espiar su tierra, y envió hombres para prenderlos, a fin de que, una vez capturados, se les diera muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἰησοῦ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Jesús
  lexicon: —
  rationale: El griego Ἰησοῦς corresponde aquí a Josué, hijo de Nun; el contexto narrativo excluye a Jesús. Se mantiene el nombre bíblico usual en español.
- source_word: τοῦ τοῦ Ναυὴ
  english_pob_choice: son of Nun
  chosen_spanish: hijo de Nun
  alternatives_spanish:
  - hijo de Nava
  - hijo de Naue
  lexicon: —
  rationale: La construcción identifica a Josué por filiación. En español, 'hijo de Nun' es claro, fiel y tradicionalmente inteligible.
- source_word: κατασκόπων
  english_pob_choice: spies
  chosen_spanish: espías
  alternatives_spanish:
  - exploradores
  lexicon: —
  rationale: El sustantivo designa agentes enviados a reconocer en secreto. 'Espías' conserva esa fuerza y coincide con el uso del contexto.
- source_word: ἐκπεμφθέντων
  english_pob_choice: had been sent out
  chosen_spanish: había enviado
  alternatives_spanish:
  - fueron enviados
  - habiendo sido enviados
  lexicon: —
  rationale: La pasiva participial griega se vuelve una subordinada temporal fluida en español, manteniendo la relación anterior al resto de la acción.
- source_word: τὴν Ἰεριχώ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  lexicon: —
  rationale: Nombre propio bíblico establecido en español.
- source_word: ὁ βασιλεὺς τῆς γῆς
  english_pob_choice: the king of the land
  chosen_spanish: el rey de la tierra
  alternatives_spanish:
  - el rey del país
  - el rey del territorio
  lexicon: —
  rationale: Se conserva 'tierra' para reproducir χώρα/γῆ sin suavizarlo a 'país'. La forma coincide con la revisión inglesa que reforzó 'land'.
- source_word: ἔγνω
  english_pob_choice: learned
  chosen_spanish: supo
  alternatives_spanish:
  - se enteró
  - conoció
  lexicon: —
  rationale: '''Supo'' expresa conocimiento adquirido de manera breve y natural, sin añadir un matiz más interpretativo que ''se enteró''.'
- source_word: ἥκασιν κατασκοπεῦσαι
  english_pob_choice: they had come to spy out
  chosen_spanish: habían venido para espiar
  alternatives_spanish:
  - habían venido a reconocer
  - habían llegado para espiar
  lexicon: —
  rationale: '''Espiar'' reproduce el verbo de finalidad del griego y enlaza con ''espías'' del comienzo.'
- source_word: τὴν χώραν αὐτῶν
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: —
  rationale: '''Tierra'' mantiene la correspondencia con χώραν y sigue la revisión inglesa que prefirió ''land'' frente a ''country''.'
- source_word: ἐξέπεμψεν ἄνδρας
  english_pob_choice: he sent men
  chosen_spanish: envió hombres
  alternatives_spanish:
  - mandó hombres
  - despachó hombres
  lexicon: —
  rationale: Verbo simple y directo; 'envió' conserva la acción narrativa sin sobrecargarla.
- source_word: τοὺς συλλημψομένους αὐτούς
  english_pob_choice: to seize them
  chosen_spanish: para prenderlos
  alternatives_spanish:
  - para apresarlos
  - para capturarlos
  lexicon: —
  rationale: '''Prender'' comunica el intento de arresto/captura con fuerza narrativa. ''Capturar'' queda reservado para el participio siguiente.'
- source_word: συλληφθέντες
  english_pob_choice: once captured
  chosen_spanish: una vez capturados
  alternatives_spanish:
  - cuando fueran capturados
  - después de ser apresados
  lexicon: —
  rationale: Reproduce la idea temporal/pasiva del participio sin perder fluidez en español.
- source_word: θανατωθῶσιν
  english_pob_choice: might be put to death
  chosen_spanish: fueran muertos
  alternatives_spanish:
  - fueran ejecutados
  - se les diera muerte
  lexicon: —
  rationale: '''Fueran muertos'' es literal respecto a la pasiva verbal y preserva la crudeza del texto. ''Ejecutados'' introduce una precisión jurídica que no está explícita en el griego.'
theological_decisions:
- issue: Identificación de Jesús/Josué en el griego Ἰησοῦ
  english_pob_reading: Joshua son of Nun
  chosen_spanish_reading: Josué hijo de Nun
  alternative_spanish_readings:
  - Jesús hijo de Nun
  rationale: Aunque el nombre griego es el mismo, el referente histórico es Josué. Mantenerlo evita una confusión cristológica ajena al pasaje.
  doctrine_reference: Identificación contextual de nombres bíblicos; no cristología
- issue: Naturaleza de la expresión 'king of the land' y 'their land'
  english_pob_reading: the king of the land ... their land
  chosen_spanish_reading: el rey de la tierra ... su tierra
  alternative_spanish_readings:
  - el rey del país ... su país
  - el rey del territorio ... su territorio
  rationale: Se conserva la repetición de 'tierra' para reflejar la cohesión léxica del griego con γῆ / χώρα y la revisión inglesa que reforzó 'land'.
  doctrine_reference: Fidelidad léxica y consistencia semántica
- issue: Finalidad de muerte tras captura
  english_pob_reading: so that, once captured, they might be put to death
  chosen_spanish_reading: a fin de que, una vez capturados, fueran muertos
  alternative_spanish_readings:
  - para que, una vez capturados, fueran ejecutados
  - a fin de que, capturados, murieran
  rationale: La construcción mantiene la finalidad y la pasiva del texto sin introducir una explicación legal o moral no presente en el original.
  doctrine_reference: Precisión narrativa; evitar sobreinterpretación
translation_notes:
  revision_awareness: Se siguió el pasaje griego directo y se tuvo en cuenta la revisión inglesa más reciente, especialmente el cambio de 'country' a 'land' para χώραν, manteniendo la coherencia con 'the king of the land'. No se añadieron notas porque el español permite una traducción directa y estable sin ambigüedades adicionales.
  spanish_consistency_notes:
  - Se emplea 'tierra' de forma consistente para γῆ/χώρα.
  - Se evita 'Cristo' o 'Jesús' para el referente de Josué, porque el contexto histórico exige 'Josué'.
  - Se mantiene un registro bíblico sobrio, sin arcaísmos innecesarios.
  - La pasiva final ('fueran muertos') conserva la crudeza del original sin reinterpretarla.
