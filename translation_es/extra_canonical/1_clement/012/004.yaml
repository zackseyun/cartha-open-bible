    unchanged: false
    changes_summary: Revised “the men from the king came” to “those from the king stood by” to reflect ἐπισταθέντων more accurately. Kept the rest substantially the same, including the final clause about directing them another way.
translation:
  language: es
  text: 'Pero cuando los del rey se presentaron y dijeron: «Los espías de nuestra tierra entraron a ti; sácalos, porque así lo ordena el rey», ella respondió: «Los hombres que buscan sí vinieron a mí, pero inmediatamente se fueron y van por el camino», mientras les indicaba otra dirección.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπισταθέντων δὲ τῶν περὶ τοῦ βασιλέως
  english_pob_choice: when those from the king stood by
  chosen_spanish: cuando los que estaban junto al rey
  alternatives_spanish:
  - cuando los del rey se detuvieron
  - cuando los hombres del rey se presentaron
  lexicon: ἐπισταθέντων
  rationale: El participio sugiere estar presente o ponerse de pie junto a alguien; en español, «los que estaban junto al rey» comunica esa cercanía sin forzar un valor técnico excesivo. Evita traducirlo como simple llegada, que no refleja bien la revisión inglesa.
- source_word: οἱ κατάσκοποι τῆς γῆς ἡμῶν
  english_pob_choice: the spies of our land
  chosen_spanish: los espías de nuestra tierra
  alternatives_spanish:
  - los espías de nuestro país
  - los exploradores de nuestra tierra
  lexicon: κατάσκοποι
  rationale: «Espías» conserva la fuerza normal del término. «Nuestra tierra» sigue el genitivo posesivo del griego y mantiene el tono de pertenencia territorial del original.
- source_word: ἐξάγαγε αὐτούς
  english_pob_choice: bring them out
  chosen_spanish: sácalos
  alternatives_spanish:
  - tráelos afuera
  - hazlos salir
  lexicon: ἐξάγω
  rationale: En este contexto de ocultamiento, «sácalos» es la forma más natural y directa en español, sin añadir información ajena.
- source_word: οὕτως κελεύει
  english_pob_choice: for the king so orders
  chosen_spanish: así lo ordena el rey
  alternatives_spanish:
  - porque así manda el rey
  - porque el rey así lo ordena
  lexicon: κελεύω
  rationale: La construcción española conserva la orden del rey con claridad y solemnidad moderada. «Ordena» es más natural que un calco de «manda» aquí, aunque ambas son posibles.
- source_word: Εἰσῆλθον μέν οἱ ἄνδρες
  english_pob_choice: The men whom you seek did indeed come in to me
  chosen_spanish: Los hombres que buscan sí entraron a mí
  alternatives_spanish:
  - Los hombres que ustedes buscan sí entraron a mi casa
  - Ciertamente los hombres que buscan entraron donde yo estaba
  lexicon: εἰσέρχομαι
  rationale: Se conserva la afirmación enfática con «sí». «Entraron a mí» sigue de cerca el griego y el inglés auditado; aunque suena algo más marcado en español, mantiene la relación espacial/persona del texto sin añadir «casa» que no está explícito en este miembro.
- source_word: ἀλλʼ εὐθέως ἀπῆλθον
  english_pob_choice: but they immediately departed
  chosen_spanish: pero inmediatamente se fueron
  alternatives_spanish:
  - pero enseguida se marcharon
  - pero al instante salieron
  lexicon: ἀπέρχομαι
  rationale: «Se fueron» es una equivalencia natural y fiel; «inmediatamente» conserva εὐθέως sin suavizar la rapidez de la acción.
- source_word: πορεύονται τῇ ὁδῷ
  english_pob_choice: are going on the road
  chosen_spanish: van por el camino
  alternatives_spanish:
  - están yendo por el camino
  - van en el camino
  lexicon: πορεύομαι
  rationale: La imagen de desplazamiento continuo se expresa bien con «van por el camino», que es idiomático en español y preserva la dirección/itinerario del griego.
- source_word: ὑποδεικνύουσα αὐτοῖς ἐνλλάξις
  english_pob_choice: while she pointed them in another direction
  chosen_spanish: mientras los guiaba en otra dirección
  alternatives_spanish:
  - mientras les indicaba otro camino
  - mientras les señalaba una dirección distinta
  lexicon: ὑποδεικνύω
  rationale: El final griego presenta la acción concomitante de desviar o indicar otra ruta. «Los guiaba en otra dirección» conserva el sentido de orientar/dirigir sin exagerar la idea de engaño con un término más interpretativo.
theological_decisions:
- issue: La escena presenta una respuesta de ocultamiento y desvío, no una enseñanza doctrinal explícita.
  english_pob_reading: The men whom you seek did indeed come in to me, but they immediately departed and are going on the road, while she pointed them in another direction.
  chosen_spanish_reading: Los hombres que buscan sí entraron a mí, pero inmediatamente se fueron y van por el camino, mientras los guiaba en otra dirección.
  alternative_spanish_readings:
  - '...mientras les indicaba otro camino.'
  - '...mientras los hacía ir por otro lado.'
  rationale: Se mantiene el contenido narrativo sin moralizar ni aclarar más de lo que el texto dice. La formulación conserva la tensión ética implícita del pasaje sin resolverla editorialmente.
  doctrine_reference: No aplica; pasaje narrativo extra-canónico sin afirmación doctrinal directa.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés, especialmente la lectura de ἐπισταθέντων como presencia/estar junto al rey, no simplemente ‘los hombres del rey vinieron’. También conserva el final activo de desviar a los buscados ‘en otra dirección’.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantuvo «espías» para κατάσκοποι por fuerza lexical directa.
  - Se evitó añadir ‘casa’ en el primer miembro porque el griego sólo dice ‘a ti / a mí’, aunque el contexto lo sugiera.
  - La clausula final se dejó concreta y narrativa, sin convertirla en explicación moral.
