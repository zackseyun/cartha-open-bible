review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta en general la secuencia narrativa y varias elecciones léxicas son fieles al griego y al rastro inglés. Sin embargo, falla en dos puntos importantes de alineación: «los que estaban junto al rey» interpreta mal τῶν περὶ τοῦ βασιλέως, que aquí significa los del rey / los enviados del rey, no personas físicamente junto al rey; y «entraron a mí» es español poco natural para πρὸς με, donde conviene «vinieron a mí» o «entraron donde yo estaba». Además, el complemento «a tu casa» añade una especificación no presente en el griego.'
  spanish_quality_summary: 'El texto es mayormente claro, pero contiene giros poco idiomáticos: «entraron a mí» suena incorrecto en español estándar, y «los que estaban junto al rey» sugiere una escena distinta. «Mientras los guiaba en otra dirección» comunica bien el desvío, aunque «les indicaba otra dirección» refleja mejor la acción de señalar que la de acompañar físicamente.'
  glossary_alignment: No hay términos teológicos del glosario principal en juego. Las decisiones narrativas deben priorizar fidelidad al griego y español natural. Conviene mantener «espías», «tierra», «sácalos» y «así lo ordena el rey».
  issues:
  - severity: high
    issue: «los que estaban junto al rey» traduce mal τῶν περὶ τοῦ βασιλέως
    rationale: La expresión se refiere a los del rey / enviados del rey, no a personas colocadas junto al rey. La revisión inglesa «those from the king stood by» ya evitó «came», pero no implica cercanía física al rey.
  - severity: high
    issue: «sí entraron a mí» es español antinatural y no reproduce bien πρὸς με
    rationale: En español bíblico moderno, «vinieron a mí» o «entraron donde yo estaba» comunica el sentido sin calco extraño. El griego combina llegada a la persona, no exige el giro literal impropio.
  - severity: medium
    issue: «a tu casa» en el discurso directo agrega información no explícita
    rationale: El griego dice «entraron a ti», no menciona casa en esa cláusula. Es mejor no añadir ese detalle.
  - severity: low
    issue: «los guiaba en otra dirección» puede sobreactuar ὑποδεικνύουσα
    rationale: El participio apunta a indicar o señalar otra ruta/dirección; «les indicaba otra dirección» es más preciso que «guiaba», que puede sugerir acompañamiento físico.
  revised_spanish_text: 'Pero cuando los del rey se presentaron y dijeron: «Los espías de nuestra tierra entraron a ti; sácalos, porque así lo ordena el rey», ella respondió: «Los hombres que buscan sí vinieron a mí, pero inmediatamente se fueron y van por el camino», mientras les indicaba otra dirección.'
  revision_rationale: 'Se corrigen dos problemas principales: la referencia a los agentes del rey y el giro antinatural «entraron a mí». También se evita añadir «casa» y se afina el participio final para reflejar mejor la idea de señalar otra dirección sin sobreinterpretar.'
