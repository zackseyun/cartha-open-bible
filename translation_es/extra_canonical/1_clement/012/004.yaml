  text: ἐπισταθέντων δὲ τῶν περὶ τοῦ βασιλέως καὶ λεγόντων· Πρὸς σὲ εἰσῆλθον οἱ κατάσκοποι τῆς γῆς ἡμῶν· ἐξάγαγε αὐτούς, ὁ γὰρ βασιλεὺς οὕτως κελεύει, ἥδε ἀπεκρίθη· Εἰσῆλθον μέν οἱ ἄνδρες, οὓς ζητεῖτε, πρὸς με, ἀλλʼ εὐθέως ἀπῆλθον καὶ πορεύονται τῇ ὁδῷ ὑποδεικνύουσα αὐτοῖς ἐνλλάξις.
