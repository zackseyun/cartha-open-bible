base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/012/004.yaml
  text: But when those from the king stood by and said, “The spies of our land came in to you; bring them out, for the king so orders,” she answered, “The men whom you seek did indeed come in to me, but they immediately departed and are going on the road,” while she pointed them in another direction.
