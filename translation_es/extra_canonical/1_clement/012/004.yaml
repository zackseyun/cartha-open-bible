revisions:
- from: 'Pero cuando los que estaban junto al rey dijeron: «Los espías de nuestra tierra han entrado a tu casa; sácalos, porque así lo ordena el rey», ella respondió: «Los hombres que buscan sí entraron a mí, pero inmediatamente se fueron y van por el camino», mientras los guiaba en otra dirección.'
  to: 'Pero cuando los del rey se presentaron y dijeron: «Los espías de nuestra tierra entraron a ti; sácalos, porque así lo ordena el rey», ella respondió: «Los hombres que buscan sí vinieron a mí, pero inmediatamente se fueron y van por el camino», mientras les indicaba otra dirección.'
  rationale: 'Se corrigen dos problemas principales: la referencia a los agentes del rey y el giro antinatural «entraron a mí». También se evita añadir «casa» y se afina el participio final para reflejar mejor la idea de señalar otra dirección sin sobreinterpretar.'
