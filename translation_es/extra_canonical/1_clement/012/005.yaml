translation:
  language: es
  text: 'Y ella dijo a los hombres: «Sé con certeza que Yahvé Dios les está dando esta tierra, porque el temor y el pavor de ustedes han caído sobre los que la habitan. Por tanto, cuando ustedes la tomen, presérvenme a mí y a la casa de mi padre».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κύριος ὁ θεός
  english_pob_choice: the Lord God
  chosen_spanish: el Señor Dios
  alternatives_spanish:
  - Yahvé Dios
  - el Dios Señor
  lexicon: κύριος; θεός
  rationale: El texto griego usa una expresión reverente fija, y el audit trail inglés la vierte como 'the Lord God'. En español, 'el Señor Dios' reproduce esa fórmula con naturalidad y mantiene la relación semántica sin forzar una sustitución por el nombre propio divino, ya que aquí el contexto es una cita narrativa donde la fórmula funciona como apelación reconocible.
- source_word: παραδίδωσιν
  english_pob_choice: is giving
  chosen_spanish: está dando
  alternatives_spanish:
  - da
  - entrega
  - está entregando
  lexicon: παραδίδωμι
  rationale: El presente progresivo inglés expresa acción en curso y la disponibilidad cierta de la tierra. 'Está dando' conserva ese matiz aspectual sin introducir un valor más técnico o militar de 'entregar' que el contexto no exige.
- source_word: τὴν γῆν ταύτην
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta región
  - esta posesión
  lexicon: γῆ
  rationale: '''Tierra'' es la correspondencia más directa y bíblicamente natural para γῆ en este pasaje. ''Región'' debilitaría el vínculo con la promesa territorial; ''posesión'' añadiría una interpretación no explicitada.'
- source_word: ὁ φόβος καὶ ὁ τρόμος
  english_pob_choice: the fear and dread
  chosen_spanish: el temor y el pavor
  alternatives_spanish:
  - el miedo y el terror
  - el temor y el terror
  lexicon: φόβος; τρόμος
  rationale: Conserva la duplicación retórica del griego y la distinción intensiva entre los dos sustantivos. 'Pavor' y 'temor' son dignos y distinguen mejor el par que una opción más coloquial como 'miedo'.
- source_word: διασώσατέ με
  english_pob_choice: preserve me
  chosen_spanish: preservadme
  alternatives_spanish:
  - salvadme
  - protegedme
  - conservadme
  lexicon: διασῴζω
  rationale: El inglés POB eligió 'preserve' en lugar de 'save' para no cargar el verbo con un matiz exclusivamente soteriológico. 'Preservadme' reproduce esa prudencia y mantiene la petición de protección/aseguramiento de supervivencia.
- source_word: καὶ τὸν οἶκον τοῦ πατρός μου
  english_pob_choice: my father’s house
  chosen_spanish: y a la casa de mi padre
  alternatives_spanish:
  - y a la casa de mi padre
  - y a la familia de mi padre
  - y al linaje de mi padre
  lexicon: οἶκος
  rationale: Se conserva la fórmula concreta de parentesco y pertenencia doméstica. 'Casa' en español mantiene el posible alcance de hogar, familia y línea doméstica, sin cerrar indebidamente el sentido.
theological_decisions:
- issue: Tratamiento del nombre divino en una cita narrativa de fuente griega
  english_pob_reading: the Lord God
  chosen_spanish_reading: el Señor Dios
  alternative_spanish_readings:
  - Yahvé Dios
  - Dios, el Señor
  rationale: Aunque la política general del proyecto favorece 'Yahvé' para יהוה, aquí el texto fuente es griego y la forma citada aparece como κύριος ὁ θεός. Sin un ancla explícita al Tetragrámaton en el pasaje, mantener 'el Señor Dios' evita sobreespecificar el nombre propio y respeta el nivel de referencia del original griego y del audit trail inglés.
  doctrine_reference: Nombre divino y citación indirecta de fuentes bíblicas/para-bíblicas
- issue: Intensidad de la protección solicitada
  english_pob_reading: preserve me
  chosen_spanish_reading: preservadme
  alternative_spanish_readings:
  - salvadme
  - guardadme
  - protegedme
  rationale: La petición no es una formulación doctrinal de salvación, sino una solicitud concreta de protección durante la toma de la ciudad. 'Preservadme' conserva esa tensión sin convertirla en lenguaje exclusivamente soteriológico.
  doctrine_reference: Soteriología y lenguaje de preservación/protección
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el texto griego normalizado y la traducción inglesa POB; no hay revisiones aplicadas ni notas previas. La versión española sigue la solución inglesa en los puntos de mayor carga semántica, especialmente la fórmula divina, el aspecto de παραδίδωμι y el verbo de protección final.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - Se conservó la segunda persona plural en 'os' y 'preservadme' para reflejar el discurso directo del original.
  - Se evitaron calcos rígidos cuando el español exigía una construcción más natural, pero sin añadir contenido interpretativo.
