revisions:
- from: 'Y ella dijo a los hombres: «Sé con certeza que el Señor Dios os está dando esta tierra, porque el temor y el pavor de vosotros han caído sobre los que la habitan. Por tanto, cuando llegue a suceder que la toméis, preservadme a mí y a la casa de mi padre».'
  to: 'Y ella dijo a los hombres: «Sé con certeza que Yahvé Dios les está dando esta tierra, porque el temor y el pavor de ustedes han caído sobre los que la habitan. Por tanto, cuando ustedes la tomen, presérvenme a mí y a la casa de mi padre».'
  rationale: Se revisa el nombre divino para alinearlo con la terminología del proyecto («Yahvé»), se sustituyen las formas peninsulares por español neutral latinoamericano, y se aligera una construcción verbal demasiado rígida sin perder el sentido del griego ni del audit trail inglés.
