review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el audit trail inglés en la estructura global y en la mayoría de las elecciones léxicas: certeza enfática, donación de la tierra, temor/pavor sobre los habitantes y petición de preservación para ella y la casa de su padre. Sin embargo, hay dos desajustes relevantes: (1) κύριος ὁ θεός se ha vertido como «el Señor Dios», lo cual choca con la política terminológica del proyecto; dado que este pasaje de Rahab alude claramente a la fórmula bíblica del Dios de Israel, conviene «Yahvé Dios». (2) «vosotros / os / preservadme / la toméis» rompe el objetivo de español neutral latinoamericano y debe regularizarse a «ustedes / les / presérvenme / la tomen».'
  spanish_quality_summary: El texto es legible y digno, pero el voseo/vosotros peninsular no es apropiado para el registro meta pedido. También «cuando llegue a suceder que» suena más pesado de lo necesario; «cuando suceda que» o mejor «cuando tomen»/«cuando llegue el momento de tomarla» sería más natural sin perder fidelidad. «Presérvenme» es más idiomático que «preservadme» en el registro meta.
  glossary_alignment: Se requiere ajustar la terminología del nombre divino a «Yahvé» conforme a la pauta del proyecto. No hay conflicto con Mesías/Cristo ni otros términos de glosario. «Preservar» puede mantenerse como reflejo de διασῴζω y del inglés POB «preserve».
  issues:
  - severity: high
    issue: Uso de «el Señor Dios» en lugar de «Yahvé Dios»
    rationale: La política del proyecto pide «Yahvé» para el nombre divino en el texto principal. Aunque el origen inmediato es griego κύριος ὁ θεός, el pasaje reproduce la confesión sobre el Dios de Israel en un contexto claramente ligado al nombre divino; «el Señor Dios» introduce la convención de enmascaramiento que el proyecto evita.
  - severity: high
    issue: Uso de formas peninsulares «os / vosotros / preservadme / la toméis»
    rationale: El objetivo explícito es español neutral latinoamericano / ampliamente legible en iglesia. Estas formas reducen la adecuación estilística y deben cambiarse a formas con «ustedes».
  - severity: medium
    issue: «cuando llegue a suceder que» es innecesariamente pesado
    rationale: Aunque intenta reflejar ὡς ἐὰν οὖν γένηται, en español suena forzado. «Por tanto, cuando ustedes la tomen» transmite bien el sentido prospectivo sin sobrecarga.
  revised_spanish_text: 'Y ella dijo a los hombres: «Sé con certeza que Yahvé Dios les está dando esta tierra, porque el temor y el pavor de ustedes han caído sobre los que la habitan. Por tanto, cuando ustedes la tomen, presérvenme a mí y a la casa de mi padre».'
  revision_rationale: Se revisa el nombre divino para alinearlo con la terminología del proyecto («Yahvé»), se sustituyen las formas peninsulares por español neutral latinoamericano, y se aligera una construcción verbal demasiado rígida sin perder el sentido del griego ni del audit trail inglés.
