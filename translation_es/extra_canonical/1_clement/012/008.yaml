    rationale: El griego es segunda persona plural. «Ves» es singular y crea discordancia con «amados». Debe usarse una forma plural natural, por ejemplo «Vean».
  - severity: medium
    issue: «llegó a estar en la mujer» es poco natural
    rationale: Aunque intenta reflejar γέγονεν, en español suena forzado. «Ha llegado a haber en la mujer» conserva mejor el matiz de llegar a ser/presencia resultante con lectura más natural.
  - severity: medium
    issue: La nota al pie no preserva la alternativa real
    rationale: 'La nota actual repite prácticamente el texto principal. El rastro inglés conserva como alternativa la inversión del orden: «en la mujer llegó a haber...». Esa es la variante que debe reflejarse si se mantiene una nota.'
