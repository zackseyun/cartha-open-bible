    unchanged: false
    changes_summary: Replaced 'was found in the woman' with 'came to be in the woman' to more directly reflect γέγονεν while preserving the formal sense and avoiding the interpretive nuance of 'was found.'
translation:
  language: es
  text: Vean[a], amados, que no solo la fe, sino también la profecía ha llegado a haber en la mujer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vean, amados, que en la mujer ha llegado a haber no solo fe, sino también profecía».'
    reason: Preserva la alternativa de orden sintáctico documentada en el rastro inglés.
lexical_decisions:
- source_word: ὁρᾶτε
  english_pob_choice: You see
  chosen_spanish: Ves
  alternatives_spanish:
  - Veis
  - Ustedes ven
  lexicon: ὁράω
  rationale: El imperativo plural en español puede expresarse de forma natural como «Ves» en estilo de exhortación directa, pero «Veis» resulta más marcado regionalmente; «Ustedes ven» aclara el sujeto pero pesa más. Dado el tono vivo de la exhortación, se mantiene una forma breve y directa.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados míos
  - queridos
  lexicon: ἀγαπητός
  rationale: «Amados» conserva el registro eclesial sin volverlo arcaico, y reproduce la fuerza fraternal del vocativo mejor que «queridos», que en español puede sonar más débil.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - fe
  lexicon: πίστις
  rationale: Se mantiene «fe» por su correspondencia directa y porque aquí no hay indicio de un matiz alternativo que requiera «fidelidad» o una paráfrasis.
- source_word: προφητεία
  english_pob_choice: prophecy
  chosen_spanish: la profecía
  alternatives_spanish:
  - profecía
  lexicon: προφητεία
  rationale: «Profecía» es la equivalencia estable y transparente en español; conserva el paralelo con «fe» sin añadir explicación interpretativa.
- source_word: γέγονεν
  english_pob_choice: came to be
  chosen_spanish: llegó a estar
  alternatives_spanish:
  - vino a estar
  - se hizo presente
  lexicon: γίνομαι
  rationale: El perfecto de γίνομαι puede expresar presencia o estado resultante. En español, «llegó a estar» intenta conservar el valor de devenir/presencia sin forzar el calco «vino a ser», y sin introducir la interpretación más fuerte de «fue hallada».
- source_word: ἐν τῇ γυναικί
  english_pob_choice: in the woman
  chosen_spanish: en la mujer
  alternatives_spanish:
  - dentro de la mujer
  - en esa mujer
  lexicon: ἐν + dativo
  rationale: Se conserva la localización relacional del texto con «en la mujer». La construcción es algo marcada, pero refleja de cerca el griego y mantiene abierta la tensión sobre si se trata de presencia, pertenencia o manifestación en ella.
theological_decisions:
- issue: Relación entre fe y profecía en la mujer
  english_pob_reading: not only faith, but also prophecy came to be in the woman
  chosen_spanish_reading: no solo la fe, sino también la profecía llegó a estar en la mujer
  alternative_spanish_readings:
  - no solo la fe, sino también la profecía vino a estar en la mujer
  - no solo la fe, sino también la profecía estuvo en la mujer
  rationale: Se conserva la coordinación paralela y la idea de que ambas cualidades aparecen presentes en la mujer. No se suaviza a «se encontró» porque la revisión inglesa decidió evitar ese matiz interpretativo; tampoco se reduce a una simple posesión estática, para no perder el valor del perfecto de γίνομαι.
  doctrine_reference: No doctrinal controversy; lexical-theological nuance only.
translation_notes:
  revision_awareness: El inglés audit trail pasó por una revisión que rechazó «was found in the woman» y volvió a «came to be in the woman» para reflejar γέγονεν con más cercanía formal. La versión española evita tanto la interpretación estática de «fue hallada» como la reducción a un simple pasado perfecto, y conserva el movimiento de surgimiento/presencia con «llegó a estar».
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda; aquí no aplica.
  - Se preserva un registro bíblico moderno, evitando calcos rígidos salvo donde el griego exige la tensión.
  - 'La puntuación sigue el orden retórico del original: vocativo, contenido de la exhortación y cláusula explicativa.'
  - La nota a pie de página marca la alternativa más literal posible dentro del español, manteniendo la ambigüedad del griego.
