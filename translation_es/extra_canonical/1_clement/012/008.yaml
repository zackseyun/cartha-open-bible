revisions:
- from: Ves[a], amados, que no solo la fe, sino también la profecía llegó a estar en la mujer.
  to: Vean[a], amados, que no solo la fe, sino también la profecía ha llegado a haber en la mujer.
  rationale: Se corrige la persona verbal al plural para corresponder a ὁρᾶτε y concordar con el vocativo «amados». Se reemplaza «llegó a estar» por «ha llegado a haber», que sigue de cerca el perfecto γέγονεν con un español más natural y formal, sin introducir el matiz interpretativo de «se encontró» o «fue hallada». La nota al pie se rehace para reflejar la alternativa sintáctica auténtica preservada por el POB inglés.
