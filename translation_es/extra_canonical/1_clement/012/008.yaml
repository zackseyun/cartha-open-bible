  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: un llamado vocativo seguido de la afirmación de que en la mujer hubo no solo fe sino también profecía. Sin embargo, «Ves» no corresponde al imperativo plural ὁρᾶτε, y la nota al pie actual no preserva la alternativa documentada en el rastro inglés sino que repite esencialmente el mismo texto. Además, «llegó a estar» suena poco natural en español para γέγονεν.'
  spanish_quality_summary: El texto es comprensible, pero «Ves, amados» mezcla singular con plural y resulta gramaticalmente impropio. «Llegó a estar en la mujer» es demasiado calcado y poco idiomático. Una formulación como «ha llegado a haber en la mujer» mantiene mejor el valor resultativo/formal de γέγονεν sin introducir la interpretación de «fue hallada».
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Amados», «fe» y «profecía» están bien. La principal corrección es sintáctica y de naturalidad verbal: ajustar ὁρᾶτε al plural y mejorar γέγονεν en español. También conviene alinear la nota con la alternativa inglesa documentada.'
  issues:
