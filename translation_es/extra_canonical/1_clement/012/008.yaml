base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/012/008.yaml
  text: You see[a], beloved, that not only faith, but also prophecy came to be in the woman.
  footnotes:
  - marker: a
    text: Or 'in the woman there came to be not only faith, but also prophecy'.
    reason: previous_rendering
  revision_pass:
