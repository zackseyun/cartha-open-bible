translation:
  language: es
  text: Así pues, la hospitalaria Rahab los recibió y los escondió en el aposento alto, bajo los tallos de lino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Rahab, siendo hospitalaria».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἡ οὖν φιλόξενος Ῥαὰβ
  english_pob_choice: the hospitable Rahab
  chosen_spanish: Rahab, la hospitalaria
  alternatives_spanish:
  - la hospitalaria Rahab
  - Rahab, siendo hospitalaria
  lexicon: φιλόξενος
  rationale: El griego usa un adjetivo atributivo con artículo, funcionando como epíteto. En español, «la hospitalaria» conserva mejor ese rasgo que una cláusula explicativa como «siendo hospitalaria», que debilita el efecto estilístico observado en el audit trail inglés.
- source_word: εἰσδεξαμένη
  english_pob_choice: welcomed
  chosen_spanish: los recibió
  alternatives_spanish:
  - los acogió
  - les dio acogida
  lexicon: εἰσδέχομαι
  rationale: El verbo expresa recibir y dar entrada/acogida. «Los recibió» es natural y suficientemente amplio en español; mantiene la idea de hospitalidad sin añadir matices excesivos.
- source_word: ἔκρυψεν
  english_pob_choice: hid
  chosen_spanish: los escondió
  alternatives_spanish:
  - los ocultó
  lexicon: κρύπτω
  rationale: «Escondió» comunica de forma directa la acción de ocultar a los enviados. «Ocultó» sería posible, pero suena un poco más formal y menos inmediato en este contexto narrativo.
- source_word: εἰς τὸ ὑπερῷον
  english_pob_choice: in the upper room
  chosen_spanish: en el aposento alto
  alternatives_spanish:
  - en la habitación de arriba
  - en el cuarto alto
  lexicon: ὑπερῷον
  rationale: «Aposento alto» es una forma tradicional y entendible en español bíblico, y refleja bien el espacio elevado al que alude el griego. «Habitación de arriba» sería más descriptiva pero menos estable como término bíblico.
- source_word: ὑπὸ τὴν λινοκαλάμην
  english_pob_choice: under the stalks of flax
  chosen_spanish: bajo los tallos de lino
  alternatives_spanish:
  - debajo del lino
  - bajo las cañas de lino
  lexicon: λινοκαλάμη
  rationale: La expresión designa los tallos o cañas de lino. «Tallos de lino» mantiene la referencia botánica sin sobreinterpretar el material; «cañas de lino» sería posible, pero «tallos» es más transparente para el lector moderno.
theological_decisions:
- issue: Título atributivo de Rahab como rasgo narrativo y no comentario moralizante
  english_pob_reading: the hospitable Rahab
  chosen_spanish_reading: Rahab, la hospitalaria
  alternative_spanish_readings:
  - Rahab, siendo hospitalaria
  - la hospitalaria Rahab
  rationale: El texto griego presenta a Rahab con un adjetivo atributivo que funciona casi como epíteto. La opción elegida conserva ese perfil retórico sin convertirlo en una explicación causal.
  doctrine_reference: Retórica del pasaje; contraste narrativo con la caracterización previa de Rahab.
translation_notes:
  revision_awareness: El audit trail inglés fue revisado y dejó estable la solución «the hospitable Rahab»; la versión española sigue ese ajuste, preservando el valor atributivo del adjetivo y evitando la paráfrasis explicativa anterior.
  spanish_consistency_notes:
  - Se mantiene «Rahab» como forma del nombre propio, en continuidad con el texto base y el uso habitual del proyecto.
  - Se conserva «aposento alto» por consistencia con registro bíblico en español, sin forzar un giro más moderno que altere la imaginería del original.
  - La nota al pie refleja la alternativa inglesa documentada y una opción española equivalente, sin introducir nuevas ambigüedades.
