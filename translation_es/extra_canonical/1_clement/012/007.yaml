source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ προσέθεντο αὐτῇ δοῦναι σημεῖον, ὅπως ἐκκρεμάσῃ ἐκ τοῦ οἴκου αὐτῆς κόκκινον, πρόδηλον ποιοῦντες, ὅτι διὰ τοῦ αἵματος τοῦ κυρίου λύτρωσις ἔσται πᾶσι τοῖς πιστεύουσιν καὶ ἐλπίζουσιν ἐπὶ τὸν θεόν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/012/007.yaml
  text: And they gave her a sign[a], that she should hang scarlet from her house, making it clear that through the blood of the Lord there will be redemption for all who believe and hope in God.
  footnotes:
  - marker: a
    text: Or 'And they added that they would give her a sign'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:13Z'
    unchanged: false
    changes_summary: Replaced 'proceeded to give' with the more direct 'gave' for προσέθεντο. Removed 'cord' because κόκκινον is simply 'scarlet' here and the object is not explicit in the Greek.
translation:
  language: es
  text: 'Y le dieron una señal[a]: que colgara de su casa algo de color escarlata, dejando claro que por la sangre del Señor habrá redención para todos los que creen y esperan en Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y añadieron que le darían una señal». El griego usa un giro semítico que también puede entenderse como «procedieron a darle una señal», pero el sentido narrativo aquí es que efectivamente se la dieron.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσέθεντο αὐτῇ δοῦναι
  english_pob_choice: they gave her a sign
  chosen_spanish: le dieron una señal
  alternatives_spanish:
  - le añadieron que le darían una señal
  - se dispusieron a darle una señal
  - procedieron a darle una señal
  lexicon: προστίθημι + infinitivo
  rationale: La construcción griega con προσέθεντο + infinitivo sigue un giro semítico que en el contexto narrativo expresa que efectivamente le dieron la señal; por eso en español conviene la fórmula directa «le dieron una señal», sin introducir una promesa futura ni una paráfrasis explicativa innecesaria.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - indicio
  lexicon: σημεῖον
  rationale: «Señal» es el equivalente natural y claro en español para el sentido narrativo de un acto identificador o convenido. «Signo» también es posible, pero suena más abstracto; «indicio» debilita la idea de señal pactada.
- source_word: ἐκκρεμάσῃ ἐκ τοῦ οἴκου αὐτῆς κόκκινον
  english_pob_choice: she should hang scarlet from her house
  chosen_spanish: colgara de su casa algo escarlata
  alternatives_spanish:
  - colgara escarlata de su casa
  - colgara un objeto escarlata de su casa
  - colgara un paño escarlata de su casa
  lexicon: ἐκκρεμάω + κόκκινον
  rationale: El griego dice literalmente «colgar escarlata», sin nombrar el objeto. En español debe evitarse añadir «cordón» o «cuerda» sin base textual. «Algo escarlata» conserva la indeterminación del original y mantiene legible la instrucción.
- source_word: πρόδηλον ποιοῦντες
  english_pob_choice: making it clear
  chosen_spanish: dejando claro
  alternatives_spanish:
  - haciendo evidente
  - dejándolo claro
  - manifestando
  lexicon: πρόδηλος / ποιέω
  rationale: La expresión comunica la finalidad explicativa del gesto. «Dejando claro» es natural, mantiene el matiz de hacer patente algo y no sobretraduce con un tecnicismo.
- source_word: διὰ τοῦ αἵματος τοῦ κυρίου
  english_pob_choice: through the blood of the Lord
  chosen_spanish: por la sangre del Señor
  alternatives_spanish:
  - por medio de la sangre del Señor
  - a través de la sangre del Señor
  lexicon: διά + genitivo; αἷμα; κύριος
  rationale: «Por» expresa bien el medio o instrumento en español. Se conserva «Señor» porque el texto griego usa κύριος en una referencia reverente al Señor, y en este contexto la fórmula cristológica funciona naturalmente sin sustituirla por un equivalente más técnico.
- source_word: λύτρωσις
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - rescate
  - liberación
  lexicon: λύτρωσις
  rationale: «Redención» es la equivalencia más estable para λύτρωσις en un contexto soteriológico; «rescate» sería posible pero desplaza el registro hacia el precio o acto de rescate, y «liberación» pierde la densidad redentora.
- source_word: πᾶσι τοῖς πιστεύουσιν καὶ ἐλπίζουσιν ἐπὶ τὸν θεόν
  english_pob_choice: for all who believe and hope in God
  chosen_spanish: para todos los que creen y esperan en Dios
  alternatives_spanish:
  - para todos los que creen y ponen su esperanza en Dios
  - para todos los que creen y confían en Dios
  lexicon: πιστεύω; ἐλπίζω ἐπί; θεός
  rationale: «Creen y esperan en Dios» reproduce el paralelismo verbal del griego sin cargarlo con una explicación doctrinal extra. «Esperan en Dios» conserva el sentido de confiar/esperar apoyándose en Dios, suficiente en español bíblico contemporáneo.
theological_decisions:
- issue: Referencia a 'la sangre del Señor' y su valor redentor
  english_pob_reading: through the blood of the Lord there will be redemption for all who believe and hope in God
  chosen_spanish_reading: por la sangre del Señor habrá redención para todos los que creen y esperan en Dios
  alternative_spanish_readings:
  - por la sangre del Señor habrá rescate para todos los que creen y esperan en Dios
  - por la sangre del Señor habrá liberación para todos los que creen y esperan en Dios
  rationale: Se mantiene la formulación redentora sin atenuarla. «Redención» preserva el peso soteriológico del texto y evita reducir el sentido a mera liberación general.
  doctrine_reference: Soteriología; valor expiatorio/redentor de la sangre del Señor
- issue: Cristológico-divino del título κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Jesús
  rationale: Aunque el proyecto normalmente usa «Yahvé» para el nombre divino, aquí el griego κύριος aparece dentro de una fórmula cristológica narrativa y no hay base suficiente para sustituirlo por un nombre propio. «El Señor» preserva la reverencia y la ambigüedad heredada del texto griego.
  doctrine_reference: Cristología; uso contextual de κύριος en literatura cristiana primitiva
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail, que corrigió la lectura anterior de προσέθεντο para evitar un futuro/condicional inexistente y eliminó la adición de «cord» porque κόκκινον solo significa «escarlata» en el texto griego. La versión española refleja esa misma cautela: usa una acción directa («le dieron una señal») y mantiene la indeterminación del objeto colgado («algo escarlata»).'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, coherente con la lectura cristológica del pasaje y con el contexto narrativo.
  - Se evita añadir «cordón» o «cuerda», porque el griego no lo explicita.
  - «Redención» se conserva como término soteriológico fuerte, acorde con el audit trail inglés.
  - «Algo escarlata» preserva la indefinición del original y evita precisar el objeto sin base textual.
