review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido general del griego y del audit trail inglés: fe/hospitalidad, envío de espías por Josué hijo de Nun, intento de captura y muerte, acogida y ocultamiento de Rahab, su engaño a los emisarios del rey, su confesión sobre el Señor Dios, la preservación de su casa, la señal escarlata y la lectura tipológica sobre la sangre del Señor, y la conclusión sobre fe y profecía. Sin embargo, hay varios desajustes puntuales de fidelidad y forma: en v.4 el español tiene construcciones incorrectas (''donde ti'', ''donde mí'') y omite el matiz de ''a ti / a mí''; ''los hombres que buscan'' debería ser ''los hombres que buscan ustedes''; y en v.7 el griego/inglés dice que ''añadieron que le darían una señal'', no simplemente ''le dieron una señal''.'
  spanish_quality_summary: 'La legibilidad general es buena y el registro es apropiado, pero hay errores gramaticales serios en v.4 que impiden aprobar el texto tal como está. También conviene mejorar algunas opciones de naturalidad: ''fueran muertos'' suena torpe; ''preservados'' funciona pero puede mantenerse por coherencia léxica; ''resérvenme la vida'' es inteligible pero más idiomático sería ''presérvenme a mí y a la casa de mi padre'' o ''consérvenme con vida''. Se conserva bien el tono digno y la dimensión teológica.'
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: πίστις -> ''fe'', φιλοξενία -> ''hospitalidad'', πόρνη -> ''prostituta'', λύτρωσις -> ''redención'', προφητεία -> ''profecía''. La principal observación de glosario es κύριος ὁ θεός: el borrador usa ''el Señor Dios'', siguiendo el audit trail inglés, pero esto constituye una excepción al valor por defecto del proyecto (''Yahvé'' para el nombre divino). Dado que aquí la fuente inmediata es griega con κύριος, no es necesario forzar ''Yahvé'', pero la decisión debe justificarse como traducción del griego recibido, no solo por dependencia del inglés.'
  issues:
  - severity: high
    issue: 'Errores gramaticales en v.4: ''han entrado donde ti'' y ''entraron donde mí'''
    rationale: En español estándar debe ser 'entraron a tu casa' / 'vinieron a ti' y 'entraron a mi casa' / 'vinieron a mí'. Las formas actuales son incorrectas y afectan seriamente la calidad.
  - severity: medium
    issue: V.4 'Los hombres que buscan' omite el sujeto explícito implícito en español
    rationale: Mejor 'Los hombres que ustedes buscan' para reflejar claramente οὓς ζητεῖτε y evitar ambigüedad.
  - severity: medium
    issue: V.7 'le dieron una señal' adelanta indebidamente la acción
    rationale: El griego προσέθεντο ... δοῦναι y el inglés auditado indican que añadieron que le darían una señal, no necesariamente que ya se la dieron en ese momento.
  - severity: low
    issue: '''fueran muertos'' es poco natural'
    rationale: '''fueran ejecutados'' o ''les dieran muerte'' suena mejor en español sin cambiar el sentido.'
  - severity: low
