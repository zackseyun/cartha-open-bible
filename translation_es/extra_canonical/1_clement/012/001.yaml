translation:
  language: es
  text: 'Por la fe y la hospitalidad, Rahab la prostituta fue salvada. 2 Pues, cuando Josué hijo de Nun envió espías a Jericó, el rey de la tierra supo que habían venido a espiar su tierra, y envió hombres para apresarlos, a fin de que, una vez capturados, les dieran muerte. 3 Así que Rahab, siendo hospitalaria, los recibió y los escondió en el aposento alto, debajo de los tallos de lino. 4 Pero cuando los hombres del rey llegaron y dijeron: «Los espías de nuestra tierra vinieron a ti; sácalos, porque así lo ordena el rey», ella respondió: «Los hombres que ustedes buscan sí vinieron a mí, pero enseguida se fueron y van por el camino», mientras los desviaba hacia otro rumbo. 5 Y dijo a los hombres: «Sé con certeza que el Señor Dios les está entregando esta tierra, porque el temor y el espanto de ustedes han caído sobre los que habitan en ella. Por tanto, cuando suceda que la tomen, presérvenme[a] a mí y a la casa de mi padre». 6 Y ellos le dijeron: «Así será, como nos has hablado. Pero cuando
    sepas que llegamos, reunirás a todos los tuyos bajo tu techo, y serán preservados; porque todos los que sean hallados fuera de la casa perecerán». 7 Y añadieron que le darían una señal, para que colgara de su casa algo escarlata[b], dejando en claro que por la sangre del Señor habrá redención para todos los que creen y esperan en Dios. 8 Vean, amados, que en la mujer no solo hubo fe, sino también profecía.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego intensifica la idea de rescate o preservación; aquí se traduce 'presérvenme a mí' para mantener ese matiz sin perder naturalidad en español.
    reason: lexical_alternative
  - marker: b
    text: El griego no nombra explícitamente 'cordón' ni otro objeto específico en esta revisión; por eso el texto principal conserva la referencia abierta como 'algo escarlata'.
    reason: textual_variant
lexical_decisions:
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: «Fe» conserva la virtud paraenética central y la conexión con el uso cristiano amplio, sin desplazar el sentido hacia mera lealtad ética o solo confianza emocional.
- source_word: φιλοξενίαν / φιλόξενος
  english_pob_choice: hospitality / being hospitable
  chosen_spanish: hospitalidad / siendo hospitalaria
  alternatives_spanish:
  - amor a los extraños
  - acogida
  - siendo acogedora
  lexicon: BDAG
  rationale: «Hospitalidad» mantiene el vínculo léxico entre el sustantivo y el adjetivo, y expresa la virtud que Clemente enfatiza sin sobreexplicarla.
- source_word: πόρνη
  english_pob_choice: prostitute
  chosen_spanish: prostituta
  alternatives_spanish:
  - ramera
  - mujer prostituta
  lexicon: BDAG
  rationale: «Prostituta» es el equivalente moderno claro y fiel; evita arcaísmos y conserva la dureza del término griego.
- source_word: ἐσώθη
  english_pob_choice: was saved
  chosen_spanish: fue salvada
  alternatives_spanish:
  - fue librada
  - fue rescatada
  lexicon: BDAG
  rationale: Se conserva el lenguaje de salvación, que en Clemente tiene peso narrativo y teológico, no solo físico.
- source_word: κατάσκοποι / κατασκοπεῦσαι
  english_pob_choice: spies / to spy out
  chosen_spanish: espías / espiar
  alternatives_spanish:
  - exploradores / explorar
  - reconocer
  lexicon: BDAG
  rationale: «Espías» y «espiar» reflejan de forma natural el sentido militar de vigilancia y reconocimiento del pasaje.
- source_word: συλλημψομένους
  english_pob_choice: to seize
  chosen_spanish: apresarlos
  alternatives_spanish:
  - capturarlos
  - arrestarlos
  lexicon: BDAG
  rationale: «Apresar» transmite una acción hostil de captura sin cargarla con matiz jurídico moderno ni suavizarla demasiado.
- source_word: ὑπερῷον
  english_pob_choice: upper room
  chosen_spanish: aposento alto
  alternatives_spanish:
  - cuarto alto
  - habitación superior
  lexicon: BDAG
  rationale: «Aposento alto» es idiomático y fiel en español eclesial, y conserva la idea de una estancia elevada de la casa.
- source_word: λινοκαλάμη
  english_pob_choice: stalks of flax
  chosen_spanish: tallos de lino
  alternatives_spanish:
  - pajas de lino
  - cañas de lino
  lexicon: LSJ
  rationale: «Tallos de lino» reproduce el material vegetal de modo concreto y comprensible, sin añadir detalles no presentes en el griego.
- source_word: ἐνλλάξις
  english_pob_choice: in another direction
  chosen_spanish: hacia otro rumbo
  alternatives_spanish:
  - por otro camino
  - en otra dirección
  lexicon: LSJ
  rationale: La forma es textual y lexicográficamente incierta; «hacia otro rumbo» comunica con naturalidad la maniobra de desviar a los perseguidores sin afirmar más de lo que el texto permite.
- source_word: Γινώσκουσα γινώσκω
  english_pob_choice: I know for certain
  chosen_spanish: Sé con certeza
  alternatives_spanish:
  - sé perfectamente
  - sé de cierto
  lexicon: BDAG
  rationale: Reproduce la intensidad del idiomático duplicado cognitivo con una fórmula natural en español.
- source_word: κύριος ὁ θεός
  english_pob_choice: the Lord God
  chosen_spanish: el Señor Dios
  alternatives_spanish:
  - el Señor, Dios
  - Yahvé Dios
  lexicon: BDAG
  rationale: Se mantiene la combinación reverencial «Señor Dios» como equivalente de κύριος ὁ θεός en este contexto narrativo; no se introduce «Yahvé» porque el audit trail inglés conserva «Lord» como forma fija aquí.
- source_word: διασώσατέ / διασωθήσονται
  english_pob_choice: preserve me / they will be preserved
  chosen_spanish: resérvenme la vida / serán preservados
  alternatives_spanish:
  - sálvenme / serán salvados
  - líbrenme / serán librados
  lexicon: BDAG
  rationale: Se diferencia del simple ἐσώθη inicial y se busca un español natural que preserve la idea de protección vital. «Resérvenme la vida» traduce la petición de no ser destruida sin exagerar el alcance.
- source_word: κόκκινον
  english_pob_choice: something scarlet
  chosen_spanish: algo escarlata
  alternatives_spanish:
  - una cinta escarlata
  - un objeto escarlata
  lexicon: LSJ
  rationale: La revisión inglesa corrigió «cord» por no estar explícito en el griego; por eso el español no nombra un sustantivo no asegurado y deja la referencia abierta como «algo escarlata».
- source_word: λύτρωσις
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: «Redención» preserva el peso soteriológico y tipológico que Clemente atribuye al signo escarlata y a la sangre del Señor.
- source_word: προφητεία
  english_pob_choice: prophecy
  chosen_spanish: profecía
  alternatives_spanish:
  - anuncio profético
  - vaticinio
  lexicon: BDAG
  rationale: «Profecía» mantiene la afirmación directa de Clemente sobre la dimensión profética de la mujer, sin rebajarla a mera previsión.
theological_decisions:
- issue: Lectura tipológica de la señal escarlata
  english_pob_reading: through the blood of the Lord there will be redemption for all who believe and hope in God
  chosen_spanish_reading: por la sangre del Señor habrá redención para todos los que creen y esperan en Dios
  alternative_spanish_readings:
  - la señal solo indica salvación narrativa
  - por la sangre del Señor habrá liberación para todos
  rationale: La frase griega introduce explícitamente una interpretación teológica de Clemente, no solo un detalle narrativo. La traducción conserva esa lectura tipológica y cristológica sin suavizarla.
  doctrine_reference: Tipología cristológica y lectura patrística de Josué/Rahab; mantener la tensión entre relato histórico y significado salvífico.
- issue: Lenguaje de salvación aplicado a Rahab
  english_pob_reading: was saved / redemption
  chosen_spanish_reading: fue salvada / redención
  alternative_spanish_readings:
  - fue librada / liberación
  - fue rescatada / rescate
  rationale: Clemente usa el episodio para exhortación de fe; por eso conviene mantener vocabulario de salvación además del rescate histórico. «Salvada» y «redención» preservan esa densidad.
  doctrine_reference: Soteriología bíblica y uso exhortativo de ejemplos veterotestamentarios en literatura cristiana primitiva.
- issue: κύριος ὁ θεός en un contexto que alude al Dios de Israel
  english_pob_reading: the Lord God
  chosen_spanish_reading: el Señor Dios
  alternative_spanish_readings:
  - Yahvé Dios
  - el Señor, Dios
  rationale: Aunque el proyecto suele usar «Yahvé» para el Tetragrámaton, aquí el audit trail inglés fija la frase como título bíblico «the Lord God». «Señor Dios» mantiene esa forma reverencial sin introducir una decisión no documentada para esta cita clementina.
  doctrine_reference: Criterio de equivalencia contextual y cautela en títulos divinos dentro de citas/eco bíblicos.
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió dos puntos relevantes: (1) χώραν se mantuvo como «their land» y no «their country»; el español sigue «su tierra». (2) κόκκινον no se traduce como «cordón escarlata» porque la revisión advirtió que el griego no especifica «cord»; por eso el español dice «algo escarlata» y deja abierta la forma exacta mediante nota. También se conservó la fuerza tipológica añadida por Clemente en la frase sobre la sangre del Señor.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y eclesial, sin arcaísmos innecesarios.
  - «Señor Dios» se usa como título reverencial coherente con la cita bíblica en este contexto.
  - Se evitó introducir «Cristo» porque el texto griego y el audit trail inglés hablan de «el Señor».
  - La traducción distingue entre ἐσώθη («fue salvada») y διασώζω («resérvenme la vida / serán preservados») para no homogeneizar dos verbos distintos.
  - Se respetó la tensión entre narración histórica y lectura teológica patrística sin resolverla interpretativamente en exceso.
