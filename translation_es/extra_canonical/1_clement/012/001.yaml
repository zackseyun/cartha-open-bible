  yaml_path: translation/extra_canonical/1_clement/012/001.yaml
  text: Because of faith and hospitality, Rahab the prostitute was saved. 2 For when spies had been sent out by Joshua son of Nun to Jericho, the king of the land learned that they had come to spy out their land, and he sent men to seize them, so that, once captured, they might be put to death. 3 So Rahab, being hospitable, welcomed them and hid them in the upper room under the stalks of flax. 4 But when the men from the king came and said, “The spies of our land came in to you; bring them out, for the king so orders,” she answered, “The men whom you seek did indeed come in to me, but they immediately departed and are going on the road,” while she pointed them in another direction. 5 And she said to the men, “I know for certain that the Lord God is giving this land to you, for the fear and dread of you has fallen upon those who dwell in it. Therefore, when it comes about that you take it, preserve me and my father’s house.” 6 And they said to her, “It shall be so, as you have spoken to us.
    But when you know that we are arriving, you shall gather all your people under your roof, and they will be preserved; for as many as are found outside the house will perish.” 7 And they added that they would give her a sign, that she should hang something scarlet from her house, making it clear that through the blood of the Lord there will be redemption for all who believe and hope in God. 8 You see, beloved, that in the woman not only faith, but also prophecy was present.
