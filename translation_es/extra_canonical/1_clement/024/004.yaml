translation:
  language: es
  text: 'Tomemos los frutos como ejemplo: ¿cómo y de qué manera llega a existir la semilla?[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿cómo y de qué manera llega a existir la semilla?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λάβωμεν
  english_pob_choice: Let us take as an example
  chosen_spanish: Tomemos como ejemplo
  alternatives_spanish:
  - Tomemos
  - Consideremos como ejemplo
  lexicon: λαμβάνω
  rationale: El imperativo exhortativo de primera persona plural se expresa naturalmente en español con «Tomemos». Añadí «como ejemplo» para reflejar el valor ilustrativo del contexto, siguiendo el sentido del inglés POB.
- source_word: τοὺς καρπούς
  english_pob_choice: the fruits
  chosen_spanish: los frutos
  alternatives_spanish:
  - los productos
  - las cosechas
  lexicon: καρπός
  rationale: «Frutos» es la correspondencia más directa y mantiene la imagen agrícola. «Cosechas» o «productos» serían más interpretativos y menos cercanos al griego.
- source_word: ὁ σπόρος
  english_pob_choice: the seed
  chosen_spanish: la semilla
  alternatives_spanish:
  - la siembra
  - la semilla sembrada
  lexicon: σπόρος
  rationale: Aunque el auditor inglés discutió si σπόρος podía referirse al acto de sembrar, en este verso el sintagma con artículo funciona de forma natural en español como «la semilla». La decisión evita una paráfrasis excesiva y conserva la imagen que el texto desarrolla inmediatamente en el contexto cercano.
- source_word: πῶς καὶ τίνα τρόπον
  english_pob_choice: how and in what way
  chosen_spanish: cómo y de qué manera
  alternatives_spanish:
  - cómo y de qué modo
  - cómo exactamente
  lexicon: πῶς / τίνα τρόπον
  rationale: 'La doble pregunta retórica se reproduce con una redundancia equivalente y fluida en español: «cómo y de qué manera». Mantiene el énfasis sin sonar artificial.'
- source_word: γίνεται
  english_pob_choice: does the seed come to be
  chosen_spanish: llega a existir
  alternatives_spanish:
  - se produce
  - se hace
  lexicon: γίνομαι
  rationale: Dado que el inglés POB volvió a una lectura más ontológica que eventiva, opté por «llega a existir», que comunica devenir sin imponer solo el sentido de acontecimiento. Es más idiomático que un calco como «viene a ser» y conserva la tensión de la formulación griega.
theological_decisions:
- issue: Valor de γίνομαι en una pregunta retórica sobre la semilla
  english_pob_reading: does the seed come to be
  chosen_spanish_reading: llega a existir la semilla
  alternative_spanish_readings:
  - se produce la semilla
  - ocurre la semilla
  rationale: El griego permite un matiz de devenir/venir a ser. En español, «llega a existir» preserva la idea de generación sin reducirla a mera ocurrencia. No se introduce doctrina específica; solo se conserva la ambigüedad filosófica del original.
  doctrine_reference: No aplica; cuestión semántica, no doctrinal
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre leer σπόρος como «sowing» (acto) y luego volver a «seed». Para este verso, la versión española sigue la revisión más reciente del inglés POB en la superficie textual («frutos», «semilla») y conserva en nota la posibilidad alternativa de formular la pregunta con mayor literalidad semántica. No se traslada al español la lectura eventiva de «siembra» porque el texto final inglés ya la abandonó.
  spanish_consistency_notes:
  - Se mantuvo «frutos» para καρπούς por coherencia con la revisión final inglesa.
  - Se evitó «SEÑOR» u այլ terminología no pertinente; no hay vocabulario divino en este versículo.
  - «Llega a existir» conserva mejor el matiz de γίνομαι que un simple «se hace» y es más claro para lectores bíblicos en español.
