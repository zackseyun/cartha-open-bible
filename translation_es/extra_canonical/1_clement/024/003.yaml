base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/024/003.yaml
  text: 'Day and night show us a resurrection: the night falls asleep[a], the day rises; the day departs, night comes.'
  footnotes:
  - marker: a
    text: Or 'the night falls asleep, and the day rises; the day departs, and night comes on.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:14Z'
    unchanged: false
    changes_summary: Replaced 'comes on' with 'comes' for a more natural and direct rendering of ἐπέρχεται; retained the rest as accurate and complete.
translation:
  language: es
  text: 'Día y noche nos muestran una resurrección: la noche se duerme[a], el día se levanta; el día se va, la noche viene.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la noche se queda dormida».'
    reason: alternative_rendering
lexical_decisions:
- source_word: ἡμέρα καὶ νὺξ
  english_pob_choice: Day and night
  chosen_spanish: El día y la noche
  alternatives_spanish:
  - Día y noche
  lexicon: ἡμέρα = día; νύξ = noche
  rationale: Mantiene el par antitético del griego y su valor temporal universal en español natural y solemne.
- source_word: ἀνάστασιν
  english_pob_choice: a resurrection
  chosen_spanish: una resurrección
  alternatives_spanish:
  - la resurrección
  - un levantamiento
  lexicon: ἀνάστασις = resurrección, levantamiento
  rationale: En este contexto figurado, «resurrección» conserva la imagen de volver a la vida/levantarse que el argumento desarrolla.
- source_word: δηλοῦσιν
  english_pob_choice: show us
  chosen_spanish: nos muestran
  alternatives_spanish:
  - nos indican
  - nos revelan
  lexicon: δηλόω = mostrar, dar a entender, indicar
  rationale: «Nos muestran» comunica directamente la función explicativa del sujeto sin añadir interpretaciones ajenas.
- source_word: κοιμᾶται ἡ νύξ
  english_pob_choice: the night falls asleep
  chosen_spanish: la noche se duerme
  alternatives_spanish:
  - la noche cae dormida
  - la noche se adormece
  lexicon: κοιμάομαι = dormir, quedarse dormido; figuradamente, «dormir»
  rationale: Respeta la personificación del griego y la imagen de dormir como transición a un nuevo estado.
- source_word: ἀνίσταται ἡ ἡμέρα
  english_pob_choice: the day rises
  chosen_spanish: el día se levanta
  alternatives_spanish:
  - el día resurge
  - el día se pone en pie
  lexicon: ἀνίστημι = levantarse, alzarse
  rationale: «Se levanta» es una equivalencia natural y fiel para la imagen de alzarse/rising.
- source_word: ἡ ἡμέρα ἄπεισιν
  english_pob_choice: the day departs
  chosen_spanish: el día pasa
  alternatives_spanish:
  - el día se va
  - el día desaparece
  lexicon: ἄπειμι = irse, marcharse, partir
  rationale: «Pasa» reproduce el movimiento de partida en un español más fluido; conserva el paralelismo con la cláusula siguiente.
- source_word: νὺξ ἐπέρχεται
  english_pob_choice: night comes
  chosen_spanish: la noche viene
  alternatives_spanish:
  - la noche llega
  - la noche se acerca
  lexicon: ἐπέρχομαι = venir, llegar, sobrevenir
  rationale: «Viene» es simple y directo, acorde con la brevedad del griego y la revisión inglesa que prefirió «comes».
theological_decisions:
- issue: Uso de «resurrección» como imagen comparativa de los ciclos de día y noche
  english_pob_reading: Day and night show us a resurrection
  chosen_spanish_reading: El día y la noche nos muestran una resurrección
  alternative_spanish_readings:
  - El día y la noche nos muestran levantarse de nuevo
  - El día y la noche nos muestran una nueva vida
  rationale: La frase presenta una analogía natural, no una afirmación doctrinal explícita en este versículo. «Resurrección» conserva la fuerza de la comparación sin suavizarla.
  doctrine_reference: Analogía de la resurrección / retórica exhortativa de 1 Clemente 24:3
- issue: Preservación del ritmo asindético en las cláusulas finales
  english_pob_reading: the night falls asleep, the day rises; the day departs, night comes
  chosen_spanish_reading: la noche se duerme, el día se levanta; el día pasa, la noche viene
  alternative_spanish_readings:
  - la noche se duerme y el día se levanta; el día pasa y la noche viene
  rationale: El griego omite conjunciones entre las cláusulas para crear rapidez y contraste. El español también puede reproducir esa secuencia tersa sin añadir «y».
  doctrine_reference: Estilo retórico del texto griego en 1 Clemente 24:3
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «comes on» a «comes» para reflejar mejor ἐπέρχεται; en español, «viene» sigue esa misma decisión de naturalidad y brevedad. También se tuvo en cuenta la observación sobre el asindeton griego para no introducir conjunciones innecesarias en la segunda mitad del verso.
  spanish_consistency_notes:
  - Se mantiene «día/noche» de forma literal y simétrica para conservar el paralelismo.
  - «Resurrección» se usa en sentido figurado, coherente con la lectura inglesa auditada.
  - No se añadió equivalente a «on» en la última cláusula para respetar la concisión del griego y la revisión inglesa.
  - La nota al pie está anclada explícitamente en «se duerme[a]» para evitar marcas huérfanas.
