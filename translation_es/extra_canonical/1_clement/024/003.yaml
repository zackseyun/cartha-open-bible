  text: ἡμέρα καὶ νὺξ ἀνάστασιν ἡμῖν δηλοῦσιν· κοιμᾶται ἡ νύξ, ἀνίσταται ἡ ἡμέρα· ἡ ἡμέρα ἄπεισιν, νὺξ ἐπέρχεται.
