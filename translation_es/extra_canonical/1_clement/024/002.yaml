translation:
  language: es
  text: Consideremos, amados, la resurrección que ocurre en el tiempo debido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἴδωμεν
  english_pob_choice: Let us observe
  chosen_spanish: Consideremos
  alternatives_spanish:
  - Miremos
  - Observemos
  lexicon: ἴδωμεν
  rationale: La forma exhortativa plural pide una invitación a atender o considerar; «Consideremos» comunica con naturalidad ese matiz exhortativo sin reducirlo a mera visión física.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - queridos
  - amados hermanos
  lexicon: ἀγαπητοί
  rationale: «Amados» conserva el tono afectuoso y eclesial del vocativo sin añadir un sustantivo no presente en el griego.
- source_word: ἀνάστασιν
  english_pob_choice: the resurrection
  chosen_spanish: la resurrección
  alternatives_spanish:
  - el levantamiento
  - la resurrección de los muertos
  lexicon: ἀνάστασις
  rationale: El sustantivo admite el sentido técnico de resurrección; se mantiene la forma tradicional y precisa para no debilitar la referencia escatológica.
- source_word: κατὰ καιρόν / γινομένην
  english_pob_choice: that takes place in due season
  chosen_spanish: que ocurre en su debido tiempo
  alternatives_spanish:
  - que sucede en el tiempo debido
  - que tiene lugar a su debido tiempo
  lexicon: κατὰ καιρόν
  rationale: La revisión inglesa evitó añadir posesivo ajeno al griego. En español, «en su debido tiempo» expresa de manera idiomática la idea de tiempo oportuno sin imponer una referencia posesiva fuerte; «ocurre» recoge γινομένην con sencillez.
theological_decisions:
- issue: Temporalidad de la resurrección
  english_pob_reading: the resurrection that takes place in due season
  chosen_spanish_reading: la resurrección que ocurre en su debido tiempo
  alternative_spanish_readings:
  - la resurrección que ocurre en el tiempo debido
  - la resurrección que ocurre a su debido tiempo
  rationale: El texto subraya que la resurrección no es arbitraria sino oportunamente ordenada. La formulación española conserva esa tensión sin introducir una cronología especulativa ni un determinismo que el griego no exige.
  doctrine_reference: Escatología cristiana; resurrección en el tiempo señalado por Dios
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail que corrigió la idea de «its appointed season» a «due season», evitando un posesivo no presente en el griego y manteniendo κατὰ καιρόν como temporalidad oportuna.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y eclesial, acorde con la brevedad exhortativa del original.
  - No se empleó «Señor» ni otra terminología de sustitución, porque el versículo no contiene el nombre divino.
  - «Resurrección» se conservó sin expansión interpretativa para respetar el valor escatológico habitual del término.
