revisions:
- from: El sembrador salió y echó cada una de las semillas en la tierra; estas[a], cuando caen en la tierra, secas y desnudas, se descomponen. Entonces, de esa descomposición, la grandeza de la providencia del Dueño las levanta, y de una aumenta muchas y produce fruto.
  to: El sembrador salió y echó cada una de las semillas en la tierra; estas, cuando caen en la tierra, secas y desnudas, se descomponen. Entonces, de esa descomposición, la grandeza de la providencia del Dueño las levanta, y de una, muchas crecen y dan fruto.[a]
  rationale: 'Se revisa la cláusula final para hacerla fiel al sentido agrícola y comprensible en español: el resultado es que de una semilla salen muchas y estas dan fruto. Se conserva «Dueño» por coherencia con δεσπότης. Se reemplaza la nota por una que sí documenta la alternativa más literal y explica por qué el español requiere explicitación sintáctica.'
