id: 1CLEM.24.5
reference: 1 Clement 24:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἐξῆλθεν ὁ σπείρων καὶ ἔβαλεν εἰς τὴν γῆν ἕκαστον τῶν σπερμάτων, ἅτινα πεσόντα εἰς τὴν γῆν ξηρὰ καὶ γυμνὰ διαλύεται· εἶτʼ ἐκ τῆς διαλύσεως ἡ μεγαλειότης τῆς προνοίας τοῦ δεσπότου ἀνίστησιν αὐτά, καὶ ἐκ τοῦ ἑνὸς πλείονα αὔξει καὶ ἐκφέρει καρπόν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/024/005.yaml
  text: The sower went out and cast each of the seeds into the ground; these[a], when they fall into the ground, dry and bare, decay. Then from that decay the greatness of the Master's providence raises them up, and from one it increases many and brings forth fruit.
  footnotes:
  - marker: a
    text: Or 'from one he increases many and brings forth fruit'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:16Z'
    unchanged: false
    changes_summary: Adjusted the syntax to better reflect the Greek relative clause and sequence; changed 'when they fall' to 'these, when they fall' for clarity; rendered αὔξει with 'it increases many' rather than 'many grow' to match the singular subject; and smoothed punctuation for more natural formal English.
translation:
  language: es
  text: El sembrador salió y echó cada una de las semillas en la tierra; estas, cuando caen en la tierra, secas y desnudas, se descomponen. Entonces, de esa descomposición, la grandeza de la providencia del Dueño las levanta, y de una, muchas crecen y dan fruto.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «de una aumenta muchas y produce fruto»; el griego de esta cláusula final es sintácticamente compacto, y en español se explicita que de una semilla surgen muchas que luego dan fruto.'
    reason: Preservar la alternativa más literal registrada en el audit trail inglés, a la vez que se ofrece una redacción española clara y fiel.
lexical_decisions:
- source_word: σπείρων
  english_pob_choice: the sower
  chosen_spanish: el sembrador
  alternatives_spanish:
  - el que siembra
  - el sembrador
  lexicon: σπείρω
  rationale: ‘Sembrador’ conserva el sustantivo agente natural en español y corresponde bien al sujeto identificado por el contexto; evita una paráfrasis innecesaria.
- source_word: τὴν γῆν
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la tierra
  lexicon: γῆ
  rationale: ‘La tierra’ es la opción más natural y suficientemente literal para γῆ en este contexto agrícola.
- source_word: ἕκαστον τῶν σπερμάτων
  english_pob_choice: each of the seeds
  chosen_spanish: cada una de las semillas
  alternatives_spanish:
  - cada semilla
  - cada una de las semillas
  lexicon: ἕκαστος / σπέρμα
  rationale: La expresión enfatiza la individualidad de cada semilla; ‘cada una de las semillas’ conserva ese matiz y evita perder el distributivo.
- source_word: πεσόντα εἰς τὴν γῆν
  english_pob_choice: when they fall into the ground
  chosen_spanish: cuando caen en la tierra
  alternatives_spanish:
  - cuando caen en la tierra
  - al caer en la tierra
  lexicon: πίπτω
  rationale: Se conserva la idea de caída al suelo/tierra con una construcción natural en español, manteniendo el valor circunstancial del participio.
- source_word: ξηρὰ καὶ γυμνὰ
  english_pob_choice: dry and bare
  chosen_spanish: secas y desnudas
  alternatives_spanish:
  - secas y desnudas
  - secas y vacías
  lexicon: ξηρός / γυμνός
  rationale: ‘Desnudas’ reproduce la imagen de despojo/exposición de γυμνός; ‘vacías’ suaviza demasiado la metáfora.
- source_word: διαλύεται
  english_pob_choice: decay
  chosen_spanish: se descomponen
  alternatives_spanish:
  - se descomponen
  - se disuelven
  - perecen
  lexicon: διαλύω
  rationale: ‘Se descomponen’ expresa bien la disolución/desintegración física implícita en el contexto de semillas que mueren en la tierra.
- source_word: ἡ μεγαλειότης τῆς προνοίας τοῦ δεσπότου
  english_pob_choice: the greatness of the Master's providence
  chosen_spanish: la grandeza de la providencia del Dueño
  alternatives_spanish:
  - la grandeza de la providencia del Dueño
  - la grandeza de la providencia del Señor
  lexicon: μεγαλειότης / πρόνοια / δεσπότης
  rationale: ‘Dueño’ mantiene la fuerza de δεσπότης como ‘amo/señor absoluto’ sin introducir ‘Señor’ como equivalente devocional que podría borrar la tensión léxica documentada.
- source_word: ἀνίστησιν αὐτά
  english_pob_choice: raises them up
  chosen_spanish: las levanta
  alternatives_spanish:
  - las levanta
  - las hace levantarse
  - las resucita
  lexicon: ἀνίστημι
  rationale: ‘Las levanta’ reproduce la acción de levantar/restaurar sin cargarlo con una formulación más teológica de lo que el pasaje agrícola exige por sí mismo.
- source_word: ἐκ τοῦ ἑνὸς πλείονα αὔξει
  english_pob_choice: from one it increases many
  chosen_spanish: y de una aumenta muchas
  alternatives_spanish:
  - y de una aumenta muchas
  - y de una hace crecer muchas
  lexicon: εἷς / πλείων / αὔξω
  rationale: Se conserva el contraste singular-plural y el sujeto singular implícito de αὔξει; ‘aumenta muchas’ sigue de cerca la revisión inglesa que corrigió la gramática para que ‘many’ sea el objeto/sujeto resultado, no el agente.
- source_word: ἐκφέρει καρπόν
  english_pob_choice: brings forth fruit
  chosen_spanish: y produce fruto
  alternatives_spanish:
  - y produce fruto
  - y da fruto
  - y trae fruto
  lexicon: ἐκφέρω / καρπός
  rationale: ‘Produce fruto’ es idiomático y fiel al sentido de dar a luz/traer al exterior el fruto.
theological_decisions:
- issue: La fuerza de δεσπότης en una frase sobre providencia
  english_pob_reading: the Master's providence
  chosen_spanish_reading: la providencia del Dueño
  alternative_spanish_readings:
  - la providencia del Dueño
  - la providencia del Señor
  rationale: Se mantiene la relación posesiva y la autoridad implícita sin sustituir δεσπότης por el término litúrgico estándar ‘Señor’, porque el audit trail inglés preserva ‘Master’ y eso señala una tensión léxica relevante.
  doctrine_reference: κύριος / δεσπότης distinction; lexical-theological transparency
- issue: El sujeto de αύξει y ἐκφέρει en la cláusula final
  english_pob_reading: from one it increases many and brings forth fruit
  chosen_spanish_reading: de una aumenta muchas y produce fruto
  alternative_spanish_readings:
  - de una aumenta muchas y produce fruto
  - de una muchas crecen y dan fruto
  rationale: 'Se sigue la corrección revisada: el sujeto gramatical es implícito y el resultado son ‘muchas’ que aumentan y fructifican, no el sembrador ni el Maestro. La versión española conserva esa relación sin añadir un sujeto no marcado.'
  doctrine_reference: Greek grammar of neuter plural with singular verb; source-bound syntax
- issue: Imagen de muerte/descomposición seguida de restauración
  english_pob_reading: decay ... the greatness of the Master's providence raises them up
  chosen_spanish_reading: se descomponen ... la providencia del Dueño las levanta
  alternative_spanish_readings:
  - se descomponen ... las levanta
  - perecen ... las levanta
  rationale: No se suaviza la secuencia de descomposición y elevación; la tensión entre corrupción y restauración es parte del argumento del texto y debe permanecer visible en español.
  doctrine_reference: Providence and resurrection imagery in early Christian paraenesis
translation_notes:
  revision_awareness: 'Se integró la corrección tardía del audit trail inglés que ajusta el sujeto y la relación sintáctica de la cláusula final: el resultado es ‘de una aumenta muchas y produce fruto’, no una lectura que introduzca un sujeto explícito como ‘él’ o ‘las’. También se mantuvo la secuencia relativa con ‘estas, cuando caen...’ para reflejar mejor el griego.'
  spanish_consistency_notes:
  - Se prefirió ‘tierra’ en lugar de ‘suelo’ para mantener la cadencia bíblica y el paralelismo con el griego.
  - ‘Dueño’ se usó de manera consistente para δεσπότης a fin de preservar la fuerza de autoridad sin ocultarla bajo un término devocional tradicional.
  - La última cláusula conserva el contraste ‘de una / muchas’ para reflejar ἐκ τοῦ ἑνός / πλείονα.
  - El marcador de nota [a] aparece anclado en el texto y corresponde a una alternativa de traducción, no a una aclaración doctrinal.
