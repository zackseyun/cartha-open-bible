translation:
  language: es
  text: 'Consideremos, amados, cómo el Dueño nos muestra continuamente que la resurrección venidera ha de acontecer, de la cual hizo primicias al Señor Jesús Mesías al resucitarlo de entre los muertos. Veamos, amados, la resurrección que acontece en su tiempo señalado. El día y la noche nos lo muestran: la noche se duerme, y el día se levanta; el día se va, y la noche llega. Tomemos las primicias[a] como ejemplo: ¿cómo y de qué manera llega a ser la semilla? El sembrador salió y echó cada una de las semillas en la tierra, y cuando caen en la tierra, secas y desnudas, se deshacen; entonces, de ese deshacerse, la grandeza de la providencia del Dueño las levanta, y de una brotan muchas y dan fruto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Primicias» traduce el mismo campo semántico de ἀπαρχή y enlaza con el argumento de resurrección; aquí funciona a la vez como imagen agrícola y término con resonancia cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσπότης
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: BDAG
  rationale: Se evita confundir δεσπότης con κύριος, que en el mismo pasaje se traduce con otro valor. «Dueño» conserva la idea de posesión y autoridad absoluta sin borrar la distinción léxica documentada por el POB inglés.
- source_word: διηνεκῶς
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - constantemente
  - sin cesar
  lexicon: LSJ
  rationale: Expresa una acción repetida y sostenida en español natural, manteniendo el valor durativo del griego.
- source_word: μέλλουσαν ἀνάστασιν ἔσεσθαι
  english_pob_choice: the coming resurrection will take place
  chosen_spanish: la resurrección venidera ha de acontecer
  alternatives_spanish:
  - la resurrección futura ocurrirá
  - la resurrección que viene sucederá
  lexicon: BDAG
  rationale: La construcción griega es enfática y algo pleonástica; se conserva la certeza futura sin suavizarla a una formulación más plana.
- source_word: ἀπαρχή
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primera porción
  - ofrenda de primicias
  lexicon: BDAG
  rationale: «Primicias» es el equivalente bíblico establecido en español y conserva la carga teológica e intertextual del término en contexto de resurrección.
- source_word: κύριον Ἰησοῦν Χριστόν
  english_pob_choice: the Lord Jesus Messiah
  chosen_spanish: el Señor Jesús Mesías
  alternatives_spanish:
  - el Señor Jesús Cristo
  - el Señor Jesús el Mesías
  lexicon: BDAG
  rationale: Se mantiene «Señor» para κύριος y «Mesías» para Χριστός conforme al criterio del proyecto, preservando el valor titulal y evitando la transliteración tradicional donde no es necesaria.
- source_word: κατὰ καιρόν
  english_pob_choice: in its appointed season
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - a su debido tiempo
  - en el tiempo oportuno
  lexicon: LSJ
  rationale: La expresión española conserva la idea de tiempo fijado o apropiado, adecuada para el argumento del ciclo natural.
- source_word: κοιμᾶται
  english_pob_choice: falls asleep
  chosen_spanish: se duerme
  alternatives_spanish:
  - duerme
  - se acuesta
  lexicon: BDAG
  rationale: Mantiene la metáfora del sueño sin reducirla a un mero estado físico; en español «se duerme» suena natural y conserva la imagen.
- source_word: ἀνίσταται
  english_pob_choice: rises
  chosen_spanish: se levanta
  alternatives_spanish:
  - se alza
  - se pone en pie
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la resurrección y el movimiento de levantarse, sin perder claridad en el ciclo día/noche.
- source_word: καρποί
  english_pob_choice: fruits
  chosen_spanish: primicias
  alternatives_spanish:
  - frutos
  - productos
  lexicon: LSJ
  rationale: Aunque el inglés POB revisó «crops» a «fruits», el contexto inmediato «Tomemos las primicias como ejemplo» hace que en español convenga vincular καρποί con el campo semántico cultual y agrícola de «primicias», que además conecta con el comienzo del argumento sobre la semilla y el fruto.
- source_word: σπόρος / σπερμάτων
  english_pob_choice: seed / seeds
  chosen_spanish: semilla / semillas
  alternatives_spanish:
  - grano / granos
  - simiente / simientes
  lexicon: BDAG
  rationale: «Semilla» es el término agrícola claro y natural en español, y permite mantener el contraste singular-plural del griego.
- source_word: ξηρὰ καὶ γυμνά
  english_pob_choice: dry and bare
  chosen_spanish: secas y desnudas
  alternatives_spanish:
  - secas y vacías
  - secas y descubiertas
  lexicon: LSJ
  rationale: «Desnudas» conserva la imagen de algo sin cobertura ni protección; en español sigue siendo comprensible en un registro elevado sin volverse técnico.
- source_word: διαλύεται
  english_pob_choice: they decay
  chosen_spanish: se deshacen
  alternatives_spanish:
  - se descomponen
  - se disuelven
  lexicon: BDAG
  rationale: La forma española comunica la desintegración aparente de la semilla en la tierra y deja visible el contraste retórico con la acción vivificadora posterior.
- source_word: μεγαλειότης
  english_pob_choice: the greatness
  chosen_spanish: la grandeza
  alternatives_spanish:
  - la majestad
  - la magnificencia
  lexicon: LSJ
  rationale: «Grandeza» mantiene un tono elevado pero claro, sin introducir una solemnidad más ornamental de la que el griego exige.
- source_word: πρόνοια
  english_pob_choice: providence
  chosen_spanish: providencia
  alternatives_spanish:
  - cuidado
  - previsión
  lexicon: BDAG
  rationale: «Providencia» es el equivalente teológico habitual y adecuado para el obrar ordenado y sustentador de Dios en esta analogía.
- source_word: ἀνίστησιν
  english_pob_choice: raises them up
  chosen_spanish: las levanta
  alternatives_spanish:
  - las resucita
  - las hace levantarse
  lexicon: BDAG
  rationale: Se conserva el verbo de elevación/levantamiento, que en la lógica del pasaje remite a la resurrección sin forzar una paráfrasis demasiado explícita.
- source_word: ἐκφέρει καρπόν
  english_pob_choice: brings forth fruit
  chosen_spanish: dan fruto
  alternatives_spanish:
  - producen fruto
  - llevan fruto
  lexicon: LSJ
  rationale: «Dan fruto» es una fórmula española natural y fiel a la imagen agrícola final.
theological_decisions:
- issue: Cómo traducir Χριστός en un texto cristiano antiguo sin borrar el valor titular
  english_pob_reading: the Lord Jesus Messiah
  chosen_spanish_reading: el Señor Jesús Mesías
  alternative_spanish_readings:
  - el Señor Jesús Cristo
  - el Señor Jesús el Cristo
  rationale: Se sigue el criterio del proyecto de traducir títulos cuando funcionan como título y no como nombre fijo. «Mesías» mantiene el contenido teológico hebreo del término.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Preservar la fuerza argumental de la resurrección en los ciclos naturales
  english_pob_reading: night falls asleep, and the day rises; ... raises them up
  chosen_spanish_reading: la noche se duerme, y el día se levanta; ... las levanta
  alternative_spanish_readings:
  - la noche duerme, y el día resucita; ... las resucita
  - la noche se apaga, y el día surge; ... las hace surgir
  rationale: El argumento de Clemente depende de que el ciclo natural siga hablando en lenguaje de resurrección. Por eso se conservan verbos de levantarse/ser levantado en lugar de neutralizarlos.
  doctrine_reference: Analogía resurreccional en la argumentación patrística
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para acercar más καρπούς a «fruits» y para ajustar la pregunta sobre ὁ σπόρος ... γίνεται. En español se reflejan esas decisiones manteniendo la progresión: primicias → semilla → desintegración aparente → levantamiento providencial → fruto. También se preserva la distinción deliberada entre δεσπότης y κύριος, evitando uniformar ambos como «Señor».'
  spanish_consistency_notes:
  - Se mantiene «Dueño» para δεσπότης y «Señor» para κύριος, de acuerdo con la distinción léxica del expediente.
  - «Mesías» se usa para Χριστός conforme al estándar del proyecto, no como transliteración tradicional automática.
  - «Primicias» aparece con nota porque en español puede leerse tanto como imagen agrícola como término cultual; ambas lecturas son pertinentes aquí.
  - Se conserva un registro sobrio y eclesial sin arcaísmos innecesarios.
