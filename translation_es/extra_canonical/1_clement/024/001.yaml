  text: Κατανοήσωμεν, ἀγαπητοί, πῶς ὁ δεσπότης ἐπιδείκνυται διηνεκῶς ἡμῖν τὴν μέλλουσαν ἀνάστασιν ἔσεσθαι, ἧς τὴν ἀπαρχὴν ἐποιήσατο τὸν κύριον Ἰησοῦν Χριστὸν ἐκ νεκρῶν ἀναστήσας. . ἴδωμεν, ἀγαπητοί, τὴν κατὰ καιρὸν γινομένην ἀνάστασιν. . ἡμέρα καὶ νὺξ ἀνάστασιν ἡμῖν δηλοῦσιν· κοιμᾶται ἡ νύξ, ἀνίσταται ἡ ἡμέρα· ἡ ἡμέρα ἄπεισιν, νὺξ ἐπέρχεται. 4. λάβωμεν τοὺς καρπούς· ὁ σπόρος πῶς καὶ τίνα τρόπον γίνεται; 5. ἐξῆλθεν ὁ σπείρων καὶ ἔβαλεν εἰς τὴν γῆν ἕκαστον τῶν σπερμάτων, ἅτινα πεσόντα εἰς τὴν γῆν ξηρὰ καὶ γυμνὰ διαλύεται· εἶτʼ ἐκ τῆς διαλύσεως ἡ μεγαλειότης τῆς προνοίας τοῦ δεσπότου ἀνίστησιν αὐτά, καὶ ἐκ τοῦ ἑνὸς πλείονα αὔξει καὶ ἐκφέρει καρπόν.
