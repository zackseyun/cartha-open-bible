translation:
  language: es
  text: Consideremos la señal sorprendente que tiene lugar en las regiones orientales, es decir, en las zonas alrededor de Arabia. Porque hay un ave llamada fénix. Esta criatura, siendo la única de su especie, vive quinientos años; y cuando ya se acerca al fin de su vida, se hace un nido para sí con franquincienso, mirra y las demás especias aromáticas. Cuando el tiempo se ha cumplido, entra en él y muere. Pero cuando su carne se descompone, nace cierto gusano, y, alimentándose de la humedad del animal muerto, le salen alas. Luego, cuando se ha fortalecido, levanta aquel nido en el que están los huesos del que existió antes y, llevándolos, viaja desde la tierra de Arabia hasta Egipto, hasta la ciudad llamada Heliópolis. Y de día, a la vista de todos, vuela al altar del sol y los pone allí, y así emprende de nuevo el regreso. Entonces los sacerdotes examinan los registros de los tiempos y hallan que llegó cuando se había cumplido el año quingentésimo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παράδοξον σημεῖον
  english_pob_choice: remarkable sign
  chosen_spanish: señal sorprendente
  alternatives_spanish:
  - señal maravillosa
  - señal extraña
  - señal portentosa
  lexicon: LSJ
  rationale: ‘Sorprendente’ transmite lo extraordinario sin convertir la expresión en lenguaje técnico de milagro; ‘señal’ conserva el valor de σημεῖον y mantiene el tono retórico de Clemente.
- source_word: γινόμενον
  english_pob_choice: takes place
  chosen_spanish: se produce
  alternatives_spanish:
  - acontece
  - ocurre
  - tiene lugar
  lexicon: LSJ
  rationale: ‘Se produce’ es natural en español para un fenómeno descrito de forma narrativa y preserva la idea de un suceso que acontece.
- source_word: μονογενές
  english_pob_choice: the only one of its kind
  chosen_spanish: la única de su especie
  alternatives_spanish:
  - única
  - la única de su clase
  - singular
  lexicon: LSJ
  rationale: En este contexto zoológico, la referencia es a unicidad de especie, no a ‘unigénito’; ‘de su especie’ evita una resonancia teológica ajena al pasaje.
- source_word: ἀπόλυσιν τοῦ ἀποθανεῖν
  english_pob_choice: the end of its life
  chosen_spanish: el momento de su partida en la muerte
  alternatives_spanish:
  - el fin de su vida
  - su salida hacia la muerte
  - su acercamiento al morir
  lexicon: LSJ
  rationale: La perífrasis griega es algo torpe; en español conviene una formulación fluida que conserve la cercanía de la muerte sin perder el matiz de desprendimiento.
- source_word: σηκόν
  english_pob_choice: nest
  chosen_spanish: nido
  alternatives_spanish:
  - recinto
  - cámara
  - morada
  lexicon: LSJ
  rationale: En la tradición del fénix, el término designa la estructura que el ave construye para sí; ‘nido’ es el equivalente más transparente y fiel a la imagen.
- source_word: λίβανος
  english_pob_choice: frankincense
  chosen_spanish: incienso
  alternatives_spanish:
  - franquincienso
  lexicon: LSJ
  rationale: En español, ‘incienso’ comunica el material aromático de forma clara; aunque ‘franquincienso’ es más específico, suena menos natural para lectores generales.
- source_word: σμύρνης
  english_pob_choice: myrrh
  chosen_spanish: mirra
  alternatives_spanish:
  - mirra aromática
  lexicon: LSJ
  rationale: ‘Mirra’ es el equivalente normal en español y conserva la concreción botánica/aromática del original.
- source_word: ἀρώματα
  english_pob_choice: spices
  chosen_spanish: aromas
  alternatives_spanish:
  - especias
  - sustancias aromáticas
  lexicon: LSJ
  rationale: ‘Aromas’ sigue de cerca la familia léxica del griego y funciona bien junto con ‘incienso’ y ‘mirra’; puede abarcar sustancias olorosas sin obligar a un inventario más técnico.
- source_word: ἰκμάς
  english_pob_choice: moisture
  chosen_spanish: humedad
  alternatives_spanish:
  - rocío
  - fluido
  - humor
  lexicon: LSJ
  rationale: ‘Humedad’ comunica de modo directo la idea de una sustancia húmeda de la que se alimenta el gusano, sin introducir una interpretación médica innecesaria.
- source_word: πτεροφυεῖ
  english_pob_choice: it grows wings
  chosen_spanish: le salen alas
  alternatives_spanish:
  - crece y toma alas
  - desarrolla alas
  - echa alas
  lexicon: LSJ
  rationale: ‘Le salen alas’ es idiomático en español y conserva la imagen de aparición del vuelo sin alterar el proceso narrado.
- source_word: γενναῖος γενόμενος
  english_pob_choice: when it has become strong
  chosen_spanish: cuando se ha fortalecido
  alternatives_spanish:
  - cuando ha madurado
  - cuando se ha hecho vigoroso
  - cuando se ha vuelto fuerte
  lexicon: LSJ
  rationale: El contexto describe capacidad física para cargar el nido; ‘se ha fortalecido’ expresa bien la maduración de fuerza requerida.
- source_word: διανύει
  english_pob_choice: it travels
  chosen_spanish: recorre el camino
  alternatives_spanish:
  - viaja
  - se dirige
  - atraviesa
  lexicon: LSJ
  rationale: ‘Recorre el camino’ preserva la idea de trayecto extenso y encaja con la tonalidad narrativa del pasaje.
- source_word: βλεπόντων πάντων
  english_pob_choice: in the sight of all
  chosen_spanish: a la vista de todos
  alternatives_spanish:
  - ante todos
  - mientras todos miran
  lexicon: LSJ
  rationale: La frase mantiene el carácter público y observado del hecho, con un giro natural en español.
- source_word: ἀφορμᾷ
  english_pob_choice: sets out back again
  chosen_spanish: emprende de nuevo el regreso
  alternatives_spanish:
  - parte de nuevo
  - vuelve a partir
  - retoma el vuelo
  lexicon: LSJ
  rationale: ‘Emprende de nuevo el regreso’ conserva tanto la idea de partida como la de retorno, sin reducir el verbo a un simple ‘volver’.
- source_word: ἀναγραφὰς τῶν χρόνων
  english_pob_choice: the records of the times
  chosen_spanish: los registros de los tiempos
  alternatives_spanish:
  - los anales de los tiempos
  - los registros cronológicos
  - las crónicas de los años
  lexicon: LSJ
  rationale: La fórmula mantiene el tono archivístico y solemne del original, sin hacerla más técnica de lo necesario.
- source_word: πεντακοσιοστοῦ ἔτους πεπληρωμένου
  english_pob_choice: when the five hundredth year has been completed
  chosen_spanish: cuando se había cumplido el año quinientos
  alternatives_spanish:
  - al cumplirse el año quinientos
  - cuando se completó el año quinientos
  - al cabo del año quinientos
  lexicon: LSJ
  rationale: La construcción española refleja el sentido de tiempo cumplido y el valor del genitivo absoluto con una expresión natural y precisa.
theological_decisions:
- issue: Tratamiento del relato del fénix
  english_pob_reading: Translate the narrative straightforwardly as Clement's illustrative example without endorsing or debunking its historical accuracy in the main text.
  chosen_spanish_reading: Traducir el relato de manera directa como ejemplo retórico de Clemente, sin añadir fórmulas de distancia ni escepticismo en el texto principal.
  alternative_spanish_readings:
  - ‘se dice que’ repetido
  - ‘según la leyenda’
  - marcas de duda explícita
  rationale: El griego presenta el episodio como una ‘señal’ extraordinaria dentro del argumento de Clemente. La traducción debe conservar esa fuerza retórica y dejar la evaluación histórica para notas o comentario, no introducirla en la redacción.
  doctrine_reference: 'PHILOSOPHY.md: primacía del idioma original; preservar la fuerza retórica'
translation_notes:
  revision_awareness: Se siguió el pasaje griego normalizado de Funk 1901 y el hilo auditado en inglés; no hubo revisiones posteriores que alteraran el sentido, y el consenso de revisión indicó acuerdo total con la versión inglesa.
  spanish_consistency_notes:
  - Se mantuvo un registro formal, pero fluido, adecuado para lectura eclesial amplia.
  - Se prefirió ‘fénix’ como transliteración asentada en español.
  - ‘Incienso’ y ‘mirra’ se conservaron como equivalentes transparentes y tradicionales, sin introducir tecnicismos innecesarios.
  - Se evitó ‘Señor’ u otras sustituciones teológicas no presentes en el texto.
  - La sintaxis larga se conservó en la medida en que el griego desarrolla un relato encadenado de manera continua.
