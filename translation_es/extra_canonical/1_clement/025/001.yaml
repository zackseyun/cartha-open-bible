revisions:
- from: Consideremos la señal sorprendente que se produce en las regiones orientales, es decir, en las zonas cercanas a Arabia. Porque hay un ave llamada fénix. Esta criatura, siendo la única de su especie, vive quinientos años; y cuando ya se ha acercado el momento de su partida en la muerte, se hace un nido para sí con incienso, mirra y los demás aromas. Cuando el tiempo se ha cumplido, entra en él y muere. Pero cuando su carne se descompone, nace cierto gusano, y, alimentándose de la humedad del animal muerto, le salen alas. Luego, cuando se ha fortalecido, levanta aquel nido en el que están los huesos del que le precedió y, llevándolos, recorre el camino desde la tierra de Arabia hasta Egipto, hasta la ciudad llamada Heliopolis. Y de día, a la vista de todos, vuela al altar del sol y los deposita allí, y así emprende de nuevo el regreso. Entonces los sacerdotes examinan los registros de los tiempos y hallan que llegó cuando se había cumplido el año quinientos.
  to: Consideremos la señal sorprendente que tiene lugar en las regiones orientales, es decir, en las zonas alrededor de Arabia. Porque hay un ave llamada fénix. Esta criatura, siendo la única de su especie, vive quinientos años; y cuando ya se acerca al fin de su vida, se hace un nido para sí con franquincienso, mirra y las demás especias aromáticas. Cuando el tiempo se ha cumplido, entra en él y muere. Pero cuando su carne se descompone, nace cierto gusano, y, alimentándose de la humedad del animal muerto, le salen alas. Luego, cuando se ha fortalecido, levanta aquel nido en el que están los huesos del que existió antes y, llevándolos, viaja desde la tierra de Arabia hasta Egipto, hasta la ciudad llamada Heliópolis. Y de día, a la vista de todos, vuela al altar del sol y los pone allí, y así emprende de nuevo el regreso. Entonces los sacerdotes examinan los registros de los tiempos y hallan que llegó cuando se había cumplido el año quingentésimo.
  rationale: La revisión es menor pero necesaria para afinar fidelidad léxica al griego y al expediente inglés (‘franquincienso’, ‘especias aromáticas’), corregir la forma española ‘Heliópolis’, evitar una adición innecesaria (‘camino’) y mejorar la naturalidad y precisión temporal del cierre. No se requieren notas al pie nuevas.
