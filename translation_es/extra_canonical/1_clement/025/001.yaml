base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/025/001.yaml
  text: Let us consider the remarkable sign that takes place in the eastern regions, that is, in the areas around Arabia. For there is a bird that is called the phoenix. This creature, being the only one of its kind, lives for five hundred years; and when it has now come near to its departure in death, it makes for itself a nest from frankincense and myrrh and the other spices. When the time has been fulfilled, it enters into it and dies. But as its flesh decays, a certain worm is produced, and being nourished from the moisture of the dead creature, it grows wings. Then, when it has become strong, it lifts up that nest in which are the bones of the one that came before, and carrying them it travels from the land of Arabia as far as Egypt, to the city called Heliopolis. And in daytime, in the sight of all, it flies to the altar of the sun and places them there, and so sets out back again. So then the priests inspect the records of the times, and they find that it has come when the five hundredth
    year has been completed.
