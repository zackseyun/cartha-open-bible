source:
  edition: Funk 1901 (normalized OCR)
  text: ὄρνεον γάρ ἐστιν, ὃ προσονομάζεται φοῖνιξ· τοῦτο μονογενὲς ὑπάρχον ζῇ ἔτη πεντακόσια, γενόμενόν τε ἤδη πρὸς ἀπόλυσιν τοῦ ἀποθανεῖν αὐτό, σηκὸν ἑαυτῷ ποιεῖ ἐκ λιβάνου καὶ σμύρνης καὶ τῶν λοιπῶν ἀρωμάτων, εἰς ὃν πληρωθέντος τοῦ χρόνου εἰσέρχεται καὶ τελευτᾷ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/025/002.yaml
  text: For there is a bird that is called the phoenix. This creature[a], being the only one of its kind, lives for five hundred years; and when it has now come near to the time of its death, it makes for itself a nest from frankincense and myrrh and the other spices. When the time has been fulfilled, it enters into it and dies.
  footnotes:
  - marker: a
    text: Or 'the end of its life'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:15Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Pues hay un ave llamada fénix[a]. Este ser, siendo único[b], vive quinientos años; y cuando ya ha llegado al tiempo de su muerte[c], se hace un nido de incienso, mirra y los demás aromas. Cuando se ha cumplido el tiempo, entra en él y muere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el final de su vida». El griego, sin embargo, expresa con más fuerza la proximidad de la muerte.
    reason: lexical_alternative
  - marker: b
    text: O «siendo el único de su clase».
    reason: lexical_alternative
  - marker: c
    text: La frase griega no solo habla del término de la vida, sino del acercamiento a la muerte misma.
    reason: theological_note
lexical_decisions:
- source_word: ὄρνεον
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  lexicon: ὄρνεον
  rationale: «Ave» mantiene el registro más amplio y natural en español para un animal alado, sin reducir el sentido a una mascota o ave pequeña. Es equivalente al inglés «bird» y funciona bien en un relato ejemplar.
- source_word: προσονομάζεται φοῖνιξ
  english_pob_choice: is called the phoenix
  chosen_spanish: llamada fénix
  alternatives_spanish:
  - que se llama fénix
  - denominada fénix
  lexicon: προσονομάζεται + φοῖνιξ
  rationale: «Llamada fénix» reproduce la designación nominal de forma clara y natural. «Fénix» es el equivalente español estable del nombre propio del ave.
- source_word: μονογενὲς ὑπάρχον
  english_pob_choice: being the only one of its kind
  chosen_spanish: siendo único
  alternatives_spanish:
  - siendo el único de su clase
  - siendo el único de su especie
  lexicon: μονογενής + ὑπάρχω
  rationale: La frase griega expresa singularidad de clase o especie. «Siendo único» conserva esa fuerza sin sobrecargar el español; las alternativas precisan la idea de manera más explícita.
- source_word: ζῇ ἔτη πεντακόσια
  english_pob_choice: lives for five hundred years
  chosen_spanish: vive quinientos años
  alternatives_spanish:
  - vive durante quinientos años
  lexicon: ζάω + πεντακόσια ἔτη
  rationale: La traducción es directa y fiel; el español admite bien el dativo de duración con «vive quinientos años».
- source_word: γενόμενόν τε ἤδη πρὸς ἀπόλυσιν τοῦ ἀποθανεῖν αὐτό
  english_pob_choice: when it has now come near to the time of its death
  chosen_spanish: cuando ya ha llegado al tiempo de su muerte
  alternatives_spanish:
  - cuando ya se ha acercado al momento de morir
  - cuando ya está cerca de morir
  lexicon: γίνομαι + πρὸς ἀπόλυσιν + τοῦ ἀποθανεῖν
  rationale: 'La revisión inglesa corrigió una atenuación: el griego vincula ἀπόλυσις con la muerte explícita, no solo con un «final de vida». «Al tiempo de su muerte» preserva esa referencia sin sonar forzado. Se evita una paráfrasis más libre para no borrar la tensión del texto.'
- source_word: σηκὸν ἑαυτῷ ποιεῖ
  english_pob_choice: it makes for itself a nest
  chosen_spanish: se hace un nido
  alternatives_spanish:
  - se construye un nido
  - se fabrica un nido para sí
  lexicon: ποιέω + σηκός
  rationale: «Se hace un nido» es idiomático y conserva el reflexivo del griego. «Nido» corresponde directamente a σηκός en el contexto del ave.
- source_word: ἐκ λιβάνου καὶ σμύρνης καὶ τῶν λοιπῶν ἀρωμάτων
  english_pob_choice: from frankincense and myrrh and the other spices
  chosen_spanish: de incienso, mirra y los demás aromas
  alternatives_spanish:
  - de incienso, mirra y los demás perfumes
  - de olíbano, mirra y los demás aromas
  lexicon: λίβανος + σμύρνα + ἀρώματα
  rationale: «Incienso» es el equivalente más transparente para λιβάνου; «aromas» mantiene el sentido amplio de ἀρώματα, aunque «perfumes» es posible. Se evita «olíbano» porque puede sonar menos accesible y no aporta más precisión aquí.
- source_word: εἰς ὃν πληρωθέντος τοῦ χρόνου εἰσέρχεται καὶ τελευτᾷ
  english_pob_choice: When the time has been fulfilled, it enters into it and dies
  chosen_spanish: Cuando se ha cumplido el tiempo, entra en él y muere
  alternatives_spanish:
  - Cuando se cumple el tiempo, entra en él y muere
  - Al cumplirse el tiempo, entra en él y muere
  lexicon: πληρόω + εἰσέρχομαι + τελευτάω
  rationale: «Se ha cumplido el tiempo» conserva el carácter de tiempo ya completado. «Entra en él y muere» traduce sin rodeos el cierre narrativo del griego, manteniendo la muerte explícita como en la revisión auditada.
theological_decisions:
- issue: Referencia a la muerte explícita en lugar de un eufemismo de final de vida
  english_pob_reading: when it has now come near to the time of its death
  chosen_spanish_reading: cuando ya ha llegado al tiempo de su muerte
  alternative_spanish_readings:
  - cuando ya se ha acercado al momento de morir
  - cuando ya está cerca de morir
  rationale: 'La revisión auditada indica que el griego dice más que un simple «final de vida»: ἀπόλυσις combinado con τοῦ ἀποθανεῖν conserva lenguaje directo sobre morir. La versión española debe sostener esa explicitud y no suavizarla.'
  doctrine_reference: Fidelidad semántica al texto fuente; no aplica doctrina cristiana específica
translation_notes:
  revision_awareness: 'He tomado en cuenta la revisión aplicada que corrigió la suavización de «the end of its life» hacia una referencia más explícita a la muerte. Por eso el español evita un eufemismo y mantiene la secuencia narrativa del griego: singularidad, larga duración, cercanía de la muerte, construcción del nido y entrada final en él.'
  spanish_consistency_notes:
  - Se usa «fénix» como nombre propio establecido en español.
  - Se mantiene «incienso» y «mirra» para los aromas principales, con «aromas» para τῶν λοιπῶν ἀρωμάτων.
  - El registro es solemne pero legible; no se introducen tecnicismos innecesarios.
  - La frase final conserva «muere» para reflejar τελευτᾷ con la claridad que exige el contexto auditado.
