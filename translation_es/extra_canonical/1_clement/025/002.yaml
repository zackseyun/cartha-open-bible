review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido global del griego y sigue la revisión inglesa al mantener la referencia explícita a la muerte. Sin embargo, añade notas ancladas donde no hacen falta y una de ellas queda mal ubicada: la nota [a] está puesta en «fénix» pero comenta una alternativa para la frase sobre la muerte, no para el nombre del ave. Además, «los demás aromas» suena algo menos natural que una opción más clara en español eclesial general.'
  spanish_quality_summary: El texto es mayormente claro y digno. «Ave», «fénix», «vive quinientos años» y «entra en él y muere» son naturales. Conviene ajustar la frase de materiales a «las demás especias aromáticas» para reflejar mejor ἀρώματα y mejorar la naturalidad. También deben eliminarse o reubicarse las notas para evitar confusión y sobreanotación.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son fieles: ὄρνεον -> «ave», μονογενές -> «el único de su clase»/«único», y la cláusula de muerte mantiene la explicitud requerida por la auditoría inglesa. La nota clasificada como theological_note no corresponde realmente a una cuestión teológica sino léxica/semántica.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en «fénix» pero explica una alternativa para la expresión sobre la muerte.
    rationale: 'Esto rompe la disciplina de notas: el marcador debe aparecer en la palabra o frase pertinente. Tal como está, induce al lector a pensar que la nota comenta «fénix».'
  - severity: medium
    issue: Hay sobreanotación en [b] y [c] para matices que el español principal ya puede expresar adecuadamente.
    rationale: Las notas no preservan una alternativa necesaria del original ni resuelven una ambigüedad nueva en español; más bien cargan el texto sin necesidad.
  - severity: low
    issue: «los demás aromas» es comprensible pero menos idiomático y algo impreciso para ἀρώματα en este contexto.
    rationale: «Las demás especias aromáticas» o «los demás perfumes» comunica mejor materiales fragantes usados en el nido.
  - severity: low
    issue: «siendo único» puede sonar algo absoluto en español sin explicitar la clase.
    rationale: El griego μονογενὲς ὑπάρχον aquí apunta a ser el único de su clase; una formulación levemente más explícita mejora la precisión sin perder fluidez.
  revised_spanish_text: Pues hay un ave llamada fénix. Este ser, siendo el único de su clase, vive quinientos años; y cuando ya ha llegado al tiempo de su muerte, se hace un nido de incienso, mirra y las demás especias aromáticas. Cuando se ha cumplido el tiempo, entra en él y muere.
  revision_rationale: Se elimina la anotación incorrectamente anclada y las notas innecesarias, porque el español puede expresar el sentido con claridad en el cuerpo del texto. Se ajusta «siendo único» a «siendo el único de su clase» para reflejar mejor μονογενές en este contexto, y «los demás aromas» a «las demás especias aromáticas» para una equivalencia más natural y precisa de ἀρώματα.
