id: 1CLEM.25.3
reference: 1 Clement 25:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: σηπομένης δὲ τῆς σαρκὸς σκώληξ τις γεννᾶται, ὃς ἐκ τῆς ἰκμάδος τοῦ τετελευτηκότος ζώου ἀνατρεφόμενος πτεροφυεῖ· εἶτα γενναῖος γενόμενος αἴρει τὸν σηκὸν ἐκεῖνον, ὅπου τὰ ὀστᾶ τοῦ προγεγονότος ἐστίν, καὶ ταῦτα βαστάζων διανύει ἀπὸ τῆς Ἀραβικῆς χώρας ἕως τῆς Αἰγύπτου εἰς τὴν λεγομένην Ἡλιούπολιν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/025/003.yaml
  text: But as its flesh decays[a], a certain worm is produced, which, being nourished from the moisture of the dead creature, grows wings. Then, when it has become strong, it lifts up that nest in which are the bones of the one that came before, and carrying them it travels from the land of Arabia as far as Egypt, to the city called Heliopolis.
  footnotes:
  - marker: a
    text: Or 'and being nourished from the moisture of the dead creature, it grows wings'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:16Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Pero, al descomponerse su carne, nace un cierto gusano, que, alimentándose de la humedad del animal muerto, le nacen alas[a]. Luego, cuando ha llegado a ser fuerte, levanta aquel nido en el que están los huesos del que vino antes, y llevándolos recorre desde la tierra de Arabia hasta Egipto, a la ciudad llamada Heliópolis.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y, alimentándose de la humedad del animal muerto, le nacen alas».'
    reason: Preserva la alternativa documentada en la auditoría inglesa sobre una redacción más coordinada del segmento participial/verbal, y la ancla en la frase pertinente.
lexical_decisions:
- source_word: σηπομένης ... τῆς σαρκὸς
  english_pob_choice: as its flesh decays
  chosen_spanish: al descomponerse su carne
  alternatives_spanish:
  - cuando su carne se pudre
  - mientras su carne se va descomponiendo
  lexicon: σάξ / carne; σηπομένης from σήπω, decay/rot
  rationale: La idea básica es descomposición/corrupción de la carne; en español, "descomponerse" comunica bien el proceso sin forzar una imagen demasiado cruda ni perder el sentido de deterioro físico.
- source_word: σκώληξ τις
  english_pob_choice: a certain worm
  chosen_spanish: un cierto gusano
  alternatives_spanish:
  - un gusano
  - un cierto verme
  lexicon: σκώληξ
  rationale: '"Gusano" es el equivalente natural y comprensible en español; "verme" sería más técnico y menos idiomático. Se conserva "cierto" para reflejar τις y la indefinición del original.'
- source_word: ἀνατρεφόμενος
  english_pob_choice: being nourished
  chosen_spanish: alimentándose
  alternatives_spanish:
  - siendo alimentado
  - nutriéndose
  lexicon: ἀνατρέφω
  rationale: El participio indica que el gusano recibe alimento de la humedad del animal muerto; "alimentándose" transmite la acción continua con naturalidad en español.
- source_word: ἰκμάδος τοῦ τετελευτηκότος ζώου
  english_pob_choice: the moisture of the dead creature
  chosen_spanish: la humedad del animal muerto
  alternatives_spanish:
  - la humedad del ser muerto
  - el líquido del animal muerto
  lexicon: ἰκμάς; τετελευτηκότος; ζῷον
  rationale: '"Humedad" reproduce bien ἰκμάς; "animal" es más neutral que "criatura" en español y mantiene la referencia a un ser viviente ya muerto. "Animal muerto" evita una interpretación demasiado amplia.'
- source_word: πτεροφυεῖ
  english_pob_choice: grows wings
  chosen_spanish: se cubre de alas
  alternatives_spanish:
  - le nacen alas
  - desarrolla alas
  lexicon: πτεροφυέω
  rationale: El verbo sugiere literalmente "echar alas"; "se cubre de alas" conserva la imagen de un desarrollo extraordinario sin sonar demasiado literal o extraño en español.
- source_word: γενναῖος γενόμενος
  english_pob_choice: when it has become strong
  chosen_spanish: cuando ha llegado a ser fuerte
  alternatives_spanish:
  - cuando se ha fortalecido
  - cuando ha madurado
  lexicon: γενναῖος
  rationale: Aquí el adjetivo califica al sujeto como vigoroso/fuerte; la perífrasis española evita una traducción engañosa por "noble" y conserva la idea de robustez.
- source_word: αἴρει τὸν σηκὸν ἐκεῖνον
  english_pob_choice: it lifts up that nest
  chosen_spanish: levanta aquel nido
  alternatives_spanish:
  - alza aquel nido
  - toma aquel nido
  lexicon: σηκός
  rationale: Se mantiene "nido" siguiendo la lectura del inglés POB y la imagen del texto; "levanta" reproduce el acto de alzar/cargar.
- source_word: ταῦτα βαστάζων
  english_pob_choice: carrying them
  chosen_spanish: llevándolos
  alternatives_spanish:
  - cargándolos
  - portándolos
  lexicon: βαστάζω
  rationale: '"Llevándolos" es natural y preciso; mantiene el gerundio de acción concomitante sin endurecer el ritmo español.'
- source_word: ἀπὸ τῆς Ἀραβικῆς χώρας ἕως τῆς Αἰγύπτου
  english_pob_choice: from the land of Arabia as far as Egypt
  chosen_spanish: desde la tierra de Arabia hasta Egipto
  alternatives_spanish:
  - desde la región de Arabia hasta Egipto
  - de Arabia hasta Egipto
  lexicon: Ἀραβικὴ χώρα; Αἴγυπτος
  rationale: '"Tierra de Arabia" conserva la amplitud geográfica y el paralelismo preposicional del original, en línea con el inglés auditado.'
- source_word: εἰς τὴν λεγομένην Ἡλιούπολιν
  english_pob_choice: to the city called Heliopolis
  chosen_spanish: a la ciudad llamada Heliópolis
  alternatives_spanish:
  - hasta la ciudad llamada Heliópolis
  - a la llamada Heliópolis
  lexicon: λεγομένην; Ἡλιούπολις
  rationale: '"Ciudad llamada Heliópolis" reproduce la designación nominal del texto con un registro claro y bíblicamente legible.'
theological_decisions:
- issue: No doctrinal claim beyond illustrative natural-history imagery
  english_pob_reading: The verse is rendered as a descriptive marvel story, without adding allegory or doctrinal interpretation.
  chosen_spanish_reading: El versículo se presenta como relato descriptivo de un prodigio natural, sin introducir alegoría ni interpretación doctrinal.
  alternative_spanish_readings:
  - leerlo como alegoría espiritual
  - explicitar una lección moral
  rationale: El griego y el contexto disponible describen una secuencia narrativa; la traducción no debe cargar el texto con una lectura teológica no documentada.
  doctrine_reference: Principio de sobriedad exegética; evitar sobreinterpretación
- issue: Relative clause preserved in the worm description
  english_pob_reading: The revised English audit confirms that the nourishing/growing-wings phrase modifies the worm as a relative clause.
  chosen_spanish_reading: 'Se preserva una subordinada relativa que modifica al gusano: «que, alimentándose..., se cubre de alas».'
  alternative_spanish_readings:
  - coordinar dos acciones independientes
  - reformular como inciso explicativo
  rationale: La sintaxis griega con ὃς exige mantener la dependencia relativa para no perder el flujo del original.
  doctrine_reference: Fidelidad sintáctica al texto fuente
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión griega que corrigió la relación sintáctica de ὃς: la cláusula relativa se preservó en español. El texto inglés ya adoptó esa lectura, y no se introdujeron cambios adicionales tras el último pase de revisión.'
  spanish_consistency_notes:
  - Se mantuvo «Heliópolis» como topónimo transliterado estándar.
  - Se prefirió «gusano» por claridad moderna, sin perder el matiz de σκώληξ.
  - «Carne» se conservó para σηπόμενης τῆς σαρκός, sin sustituirla por «cuerpo» o «materia».
  - La estructura con gerundios y subordinadas intenta reflejar el encadenamiento narrativo del griego sin sonar forzada en español.
