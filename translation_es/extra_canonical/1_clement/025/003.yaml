revisions:
- from: Pero, al descomponerse su carne, nace un cierto gusano[a], que, alimentándose de la humedad del animal muerto, se cubre de alas. Luego, cuando ha llegado a ser fuerte, levanta aquel nido en el que están los huesos del que vino antes, y, llevándolos, recorre desde la tierra de Arabia hasta Egipto, a la ciudad llamada Heliópolis.
  to: Pero, al descomponerse su carne, nace un cierto gusano, que, alimentándose de la humedad del animal muerto, le nacen alas[a]. Luego, cuando ha llegado a ser fuerte, levanta aquel nido en el que están los huesos del que vino antes, y llevándolos recorre desde la tierra de Arabia hasta Egipto, a la ciudad llamada Heliópolis.
  rationale: Se corrige la ubicación y el contenido de la nota para que refleje la variante auditada, y se ajusta πτεροφυεῖ a una expresión española más cercana al sentido de ‘desarrollar/le nacen alas’. No se requieren cambios doctrinales ni de estructura mayor.
