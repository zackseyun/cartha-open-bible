review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general la estructura del griego: οἱ οὖν ἱερεῖς → «los sacerdotes»; ἐπισκέπτονται → «examinan»; τὰς ἀναγραφὰς τῶν χρόνων → «los registros de los tiempos»; y εὑρίσκουσιν ... ἐληλυθέναι → «hallan que ... ocurrió». Sin embargo, πεντακοσιοστοῦ ἔτους πεπληρωμένου expresa específicamente «el año quingentésimo / el año número quinientos al completarse», y «el año quinientos» en español suena más como designación de año calendario que como ordinal del cómputo. Conviene ajustar esa frase para reflejar mejor el ordinal.'
  spanish_quality_summary: El español es claro y natural, pero «cuando se completó el año quinientos» resulta algo tosco y potencialmente ambiguo. «Al cumplirse el año quingentésimo» o «cuando se cumplió el año quingentésimo» suena más idiomático y más preciso. La nota sobre «registros de los tiempos» es aceptable, aunque no es indispensable.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. «Sacerdotes» es correcto para ἱερεῖς. «Registros de los tiempos» preserva bien el valor documental de ἀναγραφαί τῶν χρόνων. La principal corrección léxica necesaria es representar πεντακοσιοστοῦ como ordinal español («quingentésimo») en vez de «año quinientos».
  issues:
  - severity: medium
    issue: «el año quinientos» no refleja bien el ordinal griego πεντακοσιοστοῦ
    rationale: El griego habla del «año quingentésimo» completado, no de un año designado simplemente como 500. En español bíblico y formal, «año quingentésimo» evita ambigüedad y conserva mejor la referencia temporal del original.
  - severity: low
    issue: La construcción temporal puede sonar más idiomática
    rationale: «cuando se completó el año quinientos» es comprensible, pero «cuando se cumplió el año quingentésimo» o «al cumplirse el año quingentésimo» fluye mejor en español digno y natural.
  revised_spanish_text: Así pues, los sacerdotes examinan los registros de los tiempos[a], y hallan que esto ocurrió cuando se cumplió el año quingentésimo.
  revised_footnotes:
  - marker: a
    text: 'O: «los registros cronológicos» o «los archivos de los tiempos».'
    reason: alternative_reading
  revision_rationale: 'Se revisa únicamente la expresión de πεντακοσιοστοῦ ἔτους πεπληρωμένου para reflejar con precisión el ordinal griego y mejorar la naturalidad del español: «cuando se cumplió el año quingentésimo». El resto del versículo preserva adecuadamente el sentido del original y la línea del POB en inglés.'
