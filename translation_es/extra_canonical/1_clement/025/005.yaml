base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/025/005.yaml
  text: So then the priests inspect the records of the times[a], and they find that it came when the five-hundredth year was completed.
  footnotes:
  - marker: a
    text: Or 'when the five hundredth year has been completed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:16Z'
    unchanged: false
    changes_summary: Revised 'it has come' to 'it came' to better reflect the infinitive ἐληλυθέναι in reported speech, and rendered πεπληρωμένου more naturally as 'was completed' while preserving the sense of the five-hundredth year reaching completion.
translation:
  language: es
  text: Así pues, los sacerdotes examinan los registros de los tiempos[a], y hallan que esto ocurrió cuando se cumplió el año quingentésimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los registros cronológicos» o «los archivos de los tiempos».'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ οὖν ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes, pues
  - entonces los sacerdotes
  lexicon: ἱερεῖς
  rationale: «Sacerdotes» reproduce el oficio religioso designado por el griego y mantiene el sentido institucional del pasaje. «Los sacerdotes» es natural en español y suficientemente preciso; el οὖν se expresa con «así pues» al inicio.
- source_word: ἐπισκέπτονται
  english_pob_choice: inspect
  chosen_spanish: examinan
  alternatives_spanish:
  - inspeccionan
  - revisan
  lexicon: ἐπισκέπτομαι
  rationale: El verbo implica revisar cuidadosamente; «examinan» comunica bien la acción de consultar y verificar los documentos sin sonar mecánico.
- source_word: τὰς ἀναγραφὰς τῶν χρόνων
  english_pob_choice: the records of the times
  chosen_spanish: los registros de los tiempos
  alternatives_spanish:
  - los registros cronológicos
  - las listas de los tiempos
  lexicon: ἀναγραφή
  rationale: «Registros» conserva la idea documental de ἀναγραφάς; «de los tiempos» refleja literalmente τῶν χρόνων y preserva la referencia temporal del archivo. Se evita modernizarlo demasiado para no perder el tono archivístico.
- source_word: πεντακοσιοστοῦ ἔτους πεπληρωμένου
  english_pob_choice: when the five-hundredth year was completed
  chosen_spanish: cuando se completó el año quinientos
  alternatives_spanish:
  - al completarse el año quinientos
  - cuando el año quinientos fue completado
  lexicon: πεντακοσιοστοῦ ἔτους πεπληρωμένου
  rationale: Se mantiene la noción de un año que llega a su plenitud/completitud. «Se completó» suena natural en español y conserva la relación temporal del genitivo absoluto. «Año quinientos» evita una construcción pesada y transmite el ordinal con claridad.
- source_word: ἐληλυθέναι
  english_pob_choice: it came
  chosen_spanish: esto ocurrió
  alternatives_spanish:
  - vino
  - llegó
  lexicon: ἐλήλυθεν / ἐληλυθέναι
  rationale: En el contexto de un suceso, «esto ocurrió» comunica el hecho reportado sin forzar una imagen espacial de «venir» o «llegar». Se conserva el carácter de acontecimiento narrado indirectamente.
theological_decisions:
- issue: Referencia a un acontecimiento fechado por registros sacerdotales
  english_pob_reading: the priests inspect the records of the times, and they find that it came when the five-hundredth year was completed
  chosen_spanish_reading: los sacerdotes examinan los registros de los tiempos, y hallan que esto ocurrió cuando se completó el año quinientos
  alternative_spanish_readings:
  - los sacerdotes examinan los registros de los tiempos, y hallan que llegó al completarse el año quinientos
  - los sacerdotes examinan los registros de los tiempos, y hallan que vino cuando se completó el año quinientos
  rationale: 'No hay una tensión doctrinal aquí, pero sí una decisión de tono: el texto presenta una datación apoyada por archivo sacerdotal. «Esto ocurrió» mantiene la neutralidad histórica del griego y evita introducir una lectura cristológica o interpretativa no expresada en el versículo.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa, que prefirió una redacción temporal más fluida («when the five-hundredth year was completed») y un pasado narrativo para ἐληλυθέναι; en español se reflejó esa relación temporal con «cuando se completó el año quinientos» y un verbo de acontecimiento («ocurrió»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca, aunque este versículo no lo contiene.
  - Se conserva un registro sobrio y eclesial sin recurrir a fórmulas litúrgicas añadidas.
  - La nota[a] se ancla en «de los tiempos» porque ahí está la posible oscilación entre «tiempos» y «cronológicos».
