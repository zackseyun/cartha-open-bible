- from: Así pues, los sacerdotes examinan los registros de los tiempos[a], y hallan que esto ocurrió cuando se completó el año quinientos.
  to: Así pues, los sacerdotes examinan los registros de los tiempos[a], y hallan que esto ocurrió cuando se cumplió el año quingentésimo.
  rationale: 'Se revisa únicamente la expresión de πεντακοσιοστοῦ ἔτους πεπληρωμένου para reflejar con precisión el ordinal griego y mejorar la naturalidad del español: «cuando se cumplió el año quingentésimo». El resto del versículo preserva adecuadamente el sentido del original y la línea del POB en inglés.'
