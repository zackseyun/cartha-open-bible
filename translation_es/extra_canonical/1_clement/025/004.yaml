translation:
  language: es
  text: Y de día[a], a la vista de todos, vuela al altar del sol, las deposita allí, y así emprende el regreso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y en pleno día, a la vista de todos, vuela al altar del sol y las deposita allí, y así se pone en camino de regreso».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἡμέρας
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - en pleno día
  - durante el día
  lexicon: ἡμέρα
  rationale: El genitivo de tiempo expresa aquí una circunstancia temporal; «de día» reproduce con naturalidad la idea de acción diurna sin sobrecargar el texto.
- source_word: βλεπόντων πάντων
  english_pob_choice: in the sight of all
  chosen_spanish: a la vista de todos
  alternatives_spanish:
  - ante la mirada de todos
  - en presencia de todos
  lexicon: βλέπω
  rationale: La frase subraya visibilidad pública. «A la vista de todos» conserva el valor observacional del griego y suena natural en español.
- source_word: ἐπιπτὰς ἐπὶ τὸν τοῦ ἡλίου βωμὸν
  english_pob_choice: it flies to the altar of the sun
  chosen_spanish: vuela al altar del sol
  alternatives_spanish:
  - se abalanza al altar del sol
  - cae sobre el altar del sol
  lexicon: ἐπιπίπτω
  rationale: El participio describe un movimiento súbito hacia el altar; «vuela» mantiene la imagen dinámica que la versión inglesa ya decidió preservar.
- source_word: βωμός
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - sacrificio
  - ara
  lexicon: βωμός
  rationale: «Altar» es el equivalente directo y transparente en español para el lugar de culto mencionado por el texto.
- source_word: τίθησιν αὐτὰ
  english_pob_choice: places them there
  chosen_spanish: las deposita allí
  alternatives_spanish:
  - las pone allí
  - las deja allí
  lexicon: τίθημι
  rationale: El verbo indica colocar objetos en un lugar. «Deposita» da un matiz un poco más formal y concreto que «pone», sin añadir contenido.
- source_word: εἰς τοὐπίσω ἀφορμᾷ
  english_pob_choice: starts back
  chosen_spanish: emprende el regreso
  alternatives_spanish:
  - se vuelve atrás
  - parte de regreso
  lexicon: ἀφορμάω
  rationale: La expresión final comunica salida o arranque hacia atrás/retorno. «Emprende el regreso» expresa bien el valor de retorno sin sonar forzado en español.
theological_decisions:
- issue: Referencia al altar del sol sin suavizar la imagen religiosa pagana
  english_pob_reading: altar of the sun
  chosen_spanish_reading: altar del sol
  alternative_spanish_readings:
  - altar solar
  - altar del dios sol
  rationale: No hay indicio en el griego de una reinterpretación alegórica; conviene conservar la referencia literal al culto solar.
  doctrine_reference: Descripción histórica/cultual, no afirmación doctrinal
translation_notes:
  revision_awareness: La versión inglesa revisada simplificó «by day» desde una formulación más torpe («in daytime») y ajustó «sets out back again» a «starts back». La redacción española sigue esa mejora con una forma idiomática equivalente, sin perder el matiz de retorno del griego.
  spanish_consistency_notes:
  - Se mantiene «altar» para βωμός por coherencia con el léxico cultual habitual del proyecto cuando no hay razón para otra opción.
  - Se conserva el singular «sol» y el pronombre plural «las» según el objeto implícito del contexto inmediato, tal como refleja la versión inglesa.
