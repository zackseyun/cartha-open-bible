  text: Τὴν τοσούτων οὖν καὶ τοιούτων οὕτως μεμαρτυρημένων τε ταπεινοφρόνων καὶ τὸ ὑποδεὲς διὰ τῆς ὑπακοῆς οὐ μόνον ἡμᾶς, ἀλλὰ καὶ τὰς πρὸ ἡμῶν γενεὰς βελτίους ἐποίησεν, τούς τε καταδεξαμένους τὰ λόγια αὐτοῦ ἐν ὁσίῳ καὶ ἀληθείᾳ. 2. πολλῶν οὖν καὶ μεγάλων καὶ ἐνδόξων μετασχόντες πράξεων ἐκτελέσωμεν ἐπὶ τὸν ἐξ ἀρχῆς παραδεδομένον ἡμῖν τῆς εἰρήνης σκοπόν, καὶ ἀτενίσωμεν εἰς τὸν πατέρα καὶ κτίστην τοῦ σύμπαντος κόσμου καὶ ταῖς μεγαλοπρεπέσι καὶ ὑπερβαλλούσαις αὐτοῦ δωρεαῖς τῆς εἰρήνης εὐεργεσίαις τε κολληθῶμεν. 3. ἴδωμεν αὐτὸν κατὰ διάνοῶν καὶ ἐμβλέψωμεν τοῖς ὄμμασιν τῆς ψυχῆς εἰς τὸ μακρόθυμον αὐτοῦ βούλημα· νοήσωμεν, πῶς ἀόργητος ὑπάρχει πρὸς πᾶσαν τὴν κτίσιν αὐτοῦ.
