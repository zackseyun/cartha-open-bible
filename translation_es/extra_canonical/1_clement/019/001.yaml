translation:
  language: es
  text: 'Por tanto, la humildad y la condición humilde[a] de tantos y tan grandes hombres, tan bien atestiguadas, por medio de la obediencia nos han hecho mejores no solo a nosotros, sino también a las generaciones que nos precedieron, que recibieron sus oráculos en santidad y verdad.


    2. Habiendo, pues, participado en muchas obras grandes, gloriosas y notables,[b] prosigamos hacia la meta de la paz que nos fue transmitida desde el principio, y fijemos la mirada en el Padre y Creador de todo el mundo, y nos aferremos a sus magníficos y sobreabundantes dones y beneficios de paz.


    3. Miremos a él en nuestro pensamiento, y contemplemos con los ojos del alma su paciente propósito. Entendamos cuán libre de ira es para con toda su creación.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «humildad» o «bajo estado». El griego τὸ ὑποδεές expresa una postura de humildad o condición baja, no «bajeza» en el sentido de vileza moral.
    reason: lexical_clarification
  - marker: b
    text: El griego dice literalmente «muchas obras grandes y gloriosas». «Notables» hace explícito el peso encomiástico de la acumulación sin cambiar el sentido.
    reason: style_clarity
lexical_decisions:
- source_word: ταπεινοφρόνων
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - bajeza
  - humildad de ánimo
  lexicon: LSJ
  rationale: El griego apunta a una actitud interior de humildad más que a mera condición social; «humildad» es el equivalente más natural y fiel en español.
- source_word: τὸ ὑποδεές
  english_pob_choice: lowliness
  chosen_spanish: bajeza
  alternatives_spanish:
  - humildad
  - bajamiento
  - condición humilde
  lexicon: LSJ
  rationale: El término añade el matiz de pequeñez o humildad de condición. «Bajeza» conserva ese tono de abatimiento/insignificancia sin suavizarlo demasiado.
- source_word: ὑπακοῆς
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - sumisión
  - acatamiento
  lexicon: BDAG
  rationale: Es el término moral y relacional más directo; preserva tanto la escucha como la respuesta obediente implícitas en el griego.
- source_word: καταδεξαμένους
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - acogieron
  - aceptaron
  lexicon: LSJ
  rationale: En este contexto reverente, «recibieron» reproduce de modo natural la recepción de palabras divinas sin introducir una paráfrasis interpretativa.
- source_word: τὰ λόγια αὐτοῦ
  english_pob_choice: his oracles
  chosen_spanish: sus oráculos
  alternatives_spanish:
  - sus palabras
  - sus dichos
  lexicon: BDAG
  rationale: «Oráculos» mantiene el registro sacro y la fuerza de λόγια como palabras divinas, no mera conversación.
- source_word: ἐν ὁσίῳ καὶ ἀληθείᾳ
  english_pob_choice: in holiness and truth
  chosen_spanish: en santidad y verdad
  alternatives_spanish:
  - con piedad y verdad
  - en un modo santo y verdadero
  lexicon: LSJ
  rationale: La pareja conserva el peso religioso-moral del original y evita banalizar el estilo exhortativo.
- source_word: μετασχόντες πράξεων
  english_pob_choice: have shared in ... deeds
  chosen_spanish: partícipes de muchas obras grandes y gloriosas
  alternatives_spanish:
  - habiendo participado en muchas acciones grandes y gloriosas
  - habiendo compartido muchas obras grandes y gloriosas
  lexicon: LSJ
  rationale: El participio expresa participación en realidades/acciones notables; «partícipes de» comunica bien esa idea en español y suena natural en el contexto hortativo.
- source_word: ἐκτελέσωμεν
  english_pob_choice: let us press on
  chosen_spanish: prosigamos
  alternatives_spanish:
  - proyectémonos
  - llevemos adelante
  - cumplamos
  lexicon: LSJ
  rationale: En exhortación, el verbo marca avance decidido hacia un objetivo; «prosigamos» conserva el impulso sin volverlo demasiado idiomático o interpretativo.
- source_word: σκοπόν
  english_pob_choice: goal
  chosen_spanish: meta
  alternatives_spanish:
  - objetivo
  - blanco
  lexicon: BDAG
  rationale: La imagen es teleológica y direccional; «meta» es clara y preserva la idea de una finalidad hacia la que se avanza.
- source_word: κολληθῶμεν
  english_pob_choice: cling
  chosen_spanish: nos aferremos
  alternatives_spanish:
  - nos adheramos
  - nos peguemos
  - nos unamos
  lexicon: LSJ
  rationale: El verbo es fuerte y relacional; «nos aferremos» conserva la intensidad de adhesión y dependencia sin suavizarla.
- source_word: δωρεαῖς τῆς εἰρήνης εὐεργεσίαις
  english_pob_choice: gifts and benefits of peace
  chosen_spanish: magníficos y sobreabundantes dones y beneficios de paz
  alternatives_spanish:
  - dones de paz y beneficios
  - regalos y beneficios de paz
  lexicon: LSJ
  rationale: La doble acumulación del griego se refleja con «dones y beneficios», manteniendo ambos sustantivos; «de paz» conserva su vínculo con εἰρήνης.
- source_word: κατὰ διάνοιαν
  english_pob_choice: in our mind
  chosen_spanish: en nuestro pensamiento
  alternatives_spanish:
  - en nuestra mente
  - con la mente
  lexicon: LSJ
  rationale: «Pensamiento» expresa bien la interioridad contemplativa y suena más natural en español bíblico actual que una calca demasiado rígida.
- source_word: τοῖς ὄμμασιν τῆς ψυχῆς
  english_pob_choice: with the eyes of the soul
  chosen_spanish: con los ojos del alma
  alternatives_spanish:
  - con los ojos de la alma
  - con la mirada interior
  lexicon: LSJ
  rationale: La metáfora debe conservarse. «Ojos del alma» reproduce la imagen sin neutralizarla en una abstracción.
- source_word: μακρόθυμον ... βούλημα
  english_pob_choice: patient purpose
  chosen_spanish: paciente propósito
  alternatives_spanish:
  - voluntad paciente
  - propósito longánime
  - intención paciente
  lexicon: LSJ
  rationale: La combinación resume la paciencia/longanimidad del querer divino sin perder el matiz de voluntad o designio.
- source_word: ἀόργητος
  english_pob_choice: free from anger
  chosen_spanish: libre de ira
  alternatives_spanish:
  - sin ira
  - ajeno a la ira
  - no airado
  lexicon: LSJ
  rationale: La expresión conserva la afirmación fuerte del griego y, en español, permite la tensión teológica entre paciencia divina y juicio sin resolverla de antemano.
- source_word: κτίσιν
  english_pob_choice: creation
  chosen_spanish: creación
  alternatives_spanish:
  - criatura
  - lo creado
  - orden creado
  lexicon: BDAG
  rationale: El sentido colectivo es el de todo lo creado; «creación» es la forma más clara y abarcadora en español.
theological_decisions:
- issue: Referencia de «sus oráculos» (αὐτοῦ)
  english_pob_reading: God is the referent
  chosen_spanish_reading: Dios es el referente implícito de «sus oráculos»
  alternative_spanish_readings:
  - podría referirse a un antecedente inmediato en la cadena de ejemplares
  rationale: El contexto inmediato culmina en «el Padre y Creador de todo el mundo», por lo que la referencia a Dios es la lectura más coherente; se conserva, no obstante, la referencia pronominal sin explicitarla en el texto.
  doctrine_reference: Primacía del texto original y coherencia teológica sin sobreexplicar ambigüedades.
- issue: Fuerza de ἀόργητος respecto de Dios
  english_pob_reading: A statement of God's patient restraint toward creation, not a denial of all divine judgment
  chosen_spanish_reading: Afirmación de la paciencia y contención de Dios hacia su creación, no negación de su juicio
  alternative_spanish_readings:
  - incapacidad absoluta para la ira
  - simplemente «tardo para la ira»
  rationale: El pasaje está enmarcado por la contemplación del «propósito paciente» de Dios; por eso la traducción debe preservar su longanimidad sin convertirla en una tesis metafísica exhaustiva.
  doctrine_reference: Preservar la tensión teológica del texto, no resolverla artificialmente.
translation_notes:
  revision_awareness: 'Tomé como base la última revisión auditada, que ajustó el final de v. 2 para reflejar mejor la doble acumulación δωρεαῖς / εὐεργεσίαις. En español mantengo esa duplicidad como «dones y beneficios». También preservé la tensión entre ταπεινοφρόνων y τὸ ὑποδεές mediante dos términos distintos: «humildad» y «bajeza», sin fusionarlos. La elección de «libre de ira» sigue la lectura revisada de ἀόργητος como paciencia divina hacia la creación, sin convertirla en una formulación doctrinal más fuerte de lo que exige el texto.'
  spanish_consistency_notes:
  - Conservo «Yahvé» solo cuando el texto lo exige explícitamente; aquí no aparece el tetragrámaton, por lo que se usan «Dios», «Padre» y referencias pronominales.
  - Mantengo «oráculos» para λόγια, conforme al registro sacro del original y del audit trail inglés.
  - Uso «creación» para κτίσις de forma colectiva, como en el inglés auditado.
  - Evito «Cristo/Mesías» porque este pasaje no los contiene.
  - La metáfora de los «ojos del alma» se conserva sin racionalizarla, para respetar el estilo contemplativo del original.
