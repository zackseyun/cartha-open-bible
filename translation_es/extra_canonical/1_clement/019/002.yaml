base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/019/002.yaml
  text: Since, then, we have been deemed worthy of many great and glorious things, let us press on toward the goal of peace that has been handed down to us from the beginning, and let us fix our gaze on the Father and Creator of the whole world, and cling to his magnificent and surpassing gifts and benefits of peace.
  revision_pass:
    model: gpt-5
    timestamp: '2026-05-03T05:05:06Z'
    unchanged: false
    changes_summary: Replaced “have shared in many great and glorious deeds” with “have been deemed worthy of many great and glorious things” to reflect the likely sense of ἠξιώθημεν and avoid implying our deeds; retained the rest for accuracy and naturalness.
translation:
  language: es
  text: Así pues, ya que hemos sido considerados dignos de muchas cosas grandes y gloriosas, avancemos hacia la meta de la paz que nos fue transmitida desde el principio, y fijemos la mirada en el Padre y Creador del mundo entero, y aférrémonos a sus magníficos y excelentes dones y beneficios de paz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠξιώθημεν
  english_pob_choice: we have been deemed worthy
  chosen_spanish: hemos sido considerados dignos
  alternatives_spanish:
  - hemos sido tenidos por dignos
  - hemos sido hechos dignos
  lexicon: ἠξιόω
  rationale: El griego pasivo expresa que la dignidad es concedida o reconocida, no lograda por mérito propio. «Considerados dignos» conserva esa pasividad y evita atribuir las «cosas grandes y gloriosas» a nuestras obras.
- source_word: τῶν πολλῶν καὶ μεγάλων καὶ λαμπρῶν
  english_pob_choice: many great and glorious things
  chosen_spanish: muchas cosas grandes y gloriosas
  alternatives_spanish:
  - muchos hechos grandes y gloriosos
  - muchas realidades grandes y gloriosas
  lexicon: πολύς / μέγας / λαμπρός
  rationale: «Cosas» sigue el alcance amplio del griego sin limitarlo a acciones; «grandes y gloriosas» mantiene la triple acumulación evaluativa del original y del POB inglés.
- source_word: προκοπῶμεν εἰς τὸν σκοπὸν τῆς εἰρήνης
  english_pob_choice: press on toward the goal of peace
  chosen_spanish: avancemos hacia la meta de la paz
  alternatives_spanish:
  - prosigamos hacia la meta de la paz
  - corramos hacia el objetivo de la paz
  lexicon: προκόπτω / σκοπός / εἰρήνη
  rationale: «Avancemos» comunica el impulso exhortativo de προκόπτω en un español natural. «Meta» traduce σκοπός como objetivo final, y «paz» conserva el término constante del pasaje.
- source_word: παραδοθείσης ἡμῖν ἀπ’ ἀρχῆς
  english_pob_choice: that has been handed down to us from the beginning
  chosen_spanish: que nos fue transmitida desde el principio
  alternatives_spanish:
  - que se nos entregó desde el principio
  - que nos fue confiada desde el principio
  lexicon: παραδίδωμι
  rationale: «Transmitida» refleja la idea de entrega recibida y preservada; «desde el principio» conserva la expresión temporal del griego y la continuidad heredada.
- source_word: πατρός τε καὶ δημιουργοῦ τοῦ παντὸς κόσμου
  english_pob_choice: the Father and Creator of the whole world
  chosen_spanish: el Padre y Creador de todo el mundo
  alternatives_spanish:
  - el Padre y Creador del universo
  - el Padre y Hacedor de todo el mundo
  lexicon: πατήρ / δημιουργός / κόσμος
  rationale: «Creador» es el equivalente natural y fiel de δημιουργός en este contexto. «Todo el mundo» reproduce el alcance de τοῦ παντὸς κόσμου sin introducir una expansión innecesaria.
- source_word: προσέχω
  english_pob_choice: fix our gaze on
  chosen_spanish: fijemos la mirada en
  alternatives_spanish:
  - pongamos los ojos en
  - miremos atentamente a
  lexicon: προσέχω
  rationale: La imagen visual del griego y del inglés POB se conserva con una fórmula clara y idiomática en español.
- source_word: ἀγαθῶν δωρεῶν καὶ ἐπιτηδευμάτων
  english_pob_choice: his magnificent and surpassing gifts and benefits of peace
  chosen_spanish: sus magníficos y supereminentes dones y beneficios de paz
  alternatives_spanish:
  - sus magníficos dones y beneficios incomparables de paz
  - sus excelentes y sobreabundantes dones y beneficios de paz
  lexicon: δωρεά / ἐπιτήδευμα
  rationale: Se preserva la acumulación semántica del original y la elección del POB inglés, manteniendo el tono elevado. «Supereminentes» traduce el matiz de superioridad/trascendencia sin rebajar la fuerza del texto.
theological_decisions:
- issue: La base de la exhortación es una dignidad concedida, no un logro humano.
  english_pob_reading: we have been deemed worthy of many great and glorious things
  chosen_spanish_reading: hemos sido considerados dignos de muchas cosas grandes y gloriosas
  alternative_spanish_readings:
  - hemos conseguido muchas cosas grandes y gloriosas
  - hemos participado en muchas obras grandes y gloriosas
  rationale: La revisión inglesa corrige una lectura que podía sugerir mérito por obras. El español sigue esa corrección para evitar que el sujeto aparezca como autor de los dones recibidos.
  doctrine_reference: Gracia y recepción no meritoria; coherencia con la lógica de don recibido en el pasaje.
- issue: La paz aparece como una realidad heredada desde el principio, no una invención reciente.
  english_pob_reading: peace that has been handed down to us from the beginning
  chosen_spanish_reading: la paz que nos fue transmitida desde el principio
  alternative_spanish_readings:
  - la paz que nos fue entregada desde el principio
  - la paz que nos fue confiada desde el principio
  rationale: «Transmitida» conserva el sentido de tradición recibida y mantenida, importante en el marco eclesial del texto, sin imponer un tecnicismo que el griego no exige.
  doctrine_reference: Tradición recibida y continuidad comunitaria.
- issue: La doxología apunta al Padre como origen y artífice de la creación total.
  english_pob_reading: the Father and Creator of the whole world
  chosen_spanish_reading: el Padre y Creador de todo el mundo
  alternative_spanish_readings:
  - el Padre y Creador del universo
  - el Padre y Hacedor de todo el mundo
  rationale: Se preserva la doble referencia a paternidad y creación universal sin expandirla a categorías doctrinales no presentes en el versículo.
  doctrine_reference: Paternidad de Dios y creación universal.
translation_notes:
  revision_awareness: Se incorporó la corrección de la revisión inglesa que reemplaza una idea de participación en hechos por una de ser considerados dignos de realidades grandes y gloriosas. El resto de la cláusula se mantuvo conforme al texto inglés auditado y al griego subyacente.
  spanish_consistency_notes:
  - Se mantuvo «paz» de forma uniforme para εἰρήνη.
  - Se evitó «SEÑOR» o máscaras reverenciales porque el texto no usa κύριος aquí.
  - «Creador» se usó de manera consistente para δημιουργός, y «Padre» se conservó como relación, no como título litúrgico expandido.
  - El tono permanece elevado pero idiomático, sin calco mecánico del inglés.
