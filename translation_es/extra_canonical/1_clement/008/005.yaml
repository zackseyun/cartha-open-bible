source:
  edition: Funk 1901 (normalized OCR)
  text: πάντας οὖν τοὺς ἀγαπητοὺς αὐτοῦ βουλόμενος μετανοίας μετασχεῖν ἐστήριξεν τῷ παντοκρατορικῷ βουλήματι αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/008/005.yaml
  text: Therefore[a], desiring all his beloved ones to share in repentance, he established it by his almighty will.
  footnotes:
  - marker: a
    text: Or 'established it'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:40Z'
    unchanged: false
    changes_summary: Removed the causal 'since' to reflect the participial construction more directly, changed 'confirmed' to 'established' for ἐστήριξεν, and rendered παντοκρατορικῷ βουλήματι as 'almighty will' for more natural formal English.
translation:
  language: es
  text: Por tanto, deseando que todos sus amados participen en el arrepentimiento, lo estableció[a] por su voluntad todopoderosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo confirmó».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντας οὖν τοὺς ἀγαπητοὺς αὐτοῦ
  english_pob_choice: all his beloved ones
  chosen_spanish: todos sus amados
  alternatives_spanish:
  - todos los que él ama
  - todos sus amados seres
  lexicon: πάντας / ἀγαπητούς
  rationale: παντας expresa totalidad y ἀγαπητοὺς indica los amados o queridos; «sus amados» conserva la relación posesiva y el matiz afectivo sin introducir una perífrasis más larga.
- source_word: βουλόμενος μετανοίας μετασχεῖν
  english_pob_choice: desiring ... to share in repentance
  chosen_spanish: deseando ... participen del arrepentimiento
  alternatives_spanish:
  - queriendo ... participen en el arrepentimiento
  - deseando ... tengan parte en el arrepentimiento
  lexicon: βουλόμενος / μετασχεῖν / μετανοίας
  rationale: El participio βουλόμενος expresa voluntad/deseo; «deseando» sigue de cerca la construcción participial. μετασχεῖν significa tener parte o participar; en este contexto, «participen del arrepentimiento» comunica la idea de compartir esa realidad sin perder el valor concreto de μετανοίας.
- source_word: ἐστήριξεν
  english_pob_choice: established it / confirmed it
  chosen_spanish: lo confirmó
  alternatives_spanish:
  - lo estableció
  - lo afirmó
  - lo ratificó
  lexicon: στηρίζω
  rationale: El audit trail inglés corrigió la oscilación entre «established» y «confirmed» para reflejar στηρίζω como confirmar, hacer firme o ratificar. En español, «lo confirmó» conserva esa idea de hacer firme una disposición previa y evita una formulación demasiado abstracta.
- source_word: τῷ παντοκρατορικῷ βουλήματι αὐτοῦ
  english_pob_choice: by his almighty will
  chosen_spanish: por su voluntad todopoderosa
  alternatives_spanish:
  - por su voluntad omnipotente
  - por su designio todopoderoso
  lexicon: παντοκρατορικῷ / βούλημα
  rationale: παντοκρατορικός alude a lo todopoderoso o soberano; βούλημα es voluntad, propósito o designio. «Voluntad todopoderosa» mantiene el paralelismo con la redacción inglesa y su fuerza teológica, sin forzar un tecnicismo adicional.
theological_decisions:
- issue: Alcance de μετανοίας μετασχεῖν
  english_pob_reading: share in repentance
  chosen_spanish_reading: participen del arrepentimiento
  alternative_spanish_readings:
  - tengan parte en el arrepentimiento
  - compartan el arrepentimiento
  rationale: La expresión no debe suavizarse a una mera disposición interna; la idea es que los amados de Dios entren en la realidad del arrepentimiento como participación concedida. «Participen del arrepentimiento» conserva esa dimensión de don y participación.
  doctrine_reference: Arrepentimiento como respuesta concedida y convocada por Dios, no solo como acto meramente voluntario humano.
- issue: Fuerza de ἐστήριξεν en relación con la promesa/divino decreto previo
  english_pob_reading: he established it / he confirmed it
  chosen_spanish_reading: lo confirmó
  alternative_spanish_readings:
  - lo estableció
  - lo ratificó
  rationale: En el contexto inmediato de las promesas previas sobre el arrepentimiento, στηρίζω apunta a hacer firme o ratificar lo ya dicho. «Lo confirmó» refleja mejor esa relación que una simple fundación abstracta.
  doctrine_reference: Firmeza y ratificación del propósito divino conforme a su voluntad soberana.
translation_notes:
  revision_awareness: El texto inglés más reciente volvió de «confirmed it» a «established it» para reflejar mejor ἐστήριξεν y mantuvo «almighty will» para παντοκρατορικῷ βουλήματι. La versión española refleja esa tensión con «lo confirmó», que conserva la fuerza de ratificación del contexto y sigue la nota de variante alternativa con «lo estableció».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el pasaje no contiene el Tetragrámaton ni κύριος en función de nombre divino.
  - Se prefirió «arrepentimiento» frente a una paráfrasis cognitiva, porque μετανοίας aquí tiene sentido de participación en una realidad moral/espiritual concreta.
  - «Todopoderosa» conserva la correspondencia de παντοκρατορικῷ con el estilo teológico del POB y es natural en español bíblico contemporáneo.
