revisions:
- from: '«Arrepiéntanse, casa de Israel, de su iniquidad. Les dije a los hijos de mi pueblo: “Si sus pecados fueran de la tierra hasta el cielo, y si fueran más rojos que la escarlata y más negros que el cilicio, y se vuelven a mí de todo corazón y dicen: ‘Padre’, los escucharé como a un pueblo santo”».'
  to: '«Arrepiéntanse, casa de Israel, de su iniquidad. Les dije a los hijos de mi pueblo: “Si sus pecados llegaran de la tierra al cielo, y si fueran más rojos que la escarlata y más negros que el cilicio, y se volvieran a mí de todo corazón y dijeran: ‘Padre’, los escucharé como a un pueblo santo”».'
  rationale: Se corrige la sintaxis condicional para que el español mantenga una serie verbal coherente y natural, y se reemplaza el calco rígido «fueran de la tierra hasta el cielo» por «llegaran de la tierra al cielo», que preserva la hipérbole del griego sin añadir interpretación teológica. No se requieren notas al pie.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:51:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y la revisión inglesa: imperativo de arrepentimiento, verbo pasado explícito «dije», condiciones sobre los pecados, retorno a Dios, invocación «Padre» y promesa de escucha. Sin embargo, hay un desajuste importante de modo/tiempo en la secuencia condicional: «si sus pecados fueran… y si fueran… y se vuelven… y dicen» mezcla imperfecto de subjuntivo con presente, cuando el griego mantiene una serie condicional coordinada más uniforme. También conviene suavizar «los hijos de mi pueblo» a «a los hijos de mi pueblo» tras «Les dije», y hacer más natural «si llegan de la tierra al cielo» o equivalente en vez de «si fueran de la tierra hasta el cielo», que es demasiado calcado.'
  spanish_quality_summary: El español es generalmente claro y digno, con buena sonoridad bíblica. «Arrepiéntanse», «casa de Israel», «iniquidad» y «pueblo santo» funcionan bien. No obstante, la frase central suena algo rígida por el calco «si sus pecados fueran de la tierra hasta el cielo» y por la mezcla verbal interna. Una revisión menor mejora naturalidad y cohesión sintáctica sin apartarse del original.
  glossary_alignment: 'La terminología clave está bien alineada con las pautas del proyecto: μετάνοια/μετανοέω -> «Arrepiéntanse»; ἀνομία -> «iniquidad»; οἶκος Ἰσραήλ -> «casa de Israel»; ἁμαρτίαι -> «pecados»; ἐπιστραφῆτε -> «se vuelvan a mí»; Πάτερ -> «Padre»; λαοῦ ἁγίου -> «pueblo santo». No hay conflicto con los glosarios mayores del proyecto.'
  issues:
  - severity: medium
    issue: Mezcla inconsistente de modos verbales en la cláusula condicional
    rationale: '«Si sus pecados fueran… y si fueran… y se vuelven… y dicen…» rompe la concordancia interna. En español bíblico natural, debe mantenerse la serie en subjuntivo: «si… fueran… y si… fueran… y se vuelven» no funciona tan bien como «si… fueran… y si… fueran… y se volvieran… y dijeran» o, mejor, una solución presente coherente.'
  - severity: medium
    issue: Calco poco natural en «si sus pecados fueran de la tierra hasta el cielo»
    rationale: Aunque intenta seguir de cerca «from the earth to heaven», en español «fueran de la tierra hasta el cielo» suena extraño. «llegaran de la tierra al cielo» conserva la hipérbole y mejora la legibilidad.
  - severity: low
    issue: Falta la preposición explícita antes de «los hijos de mi pueblo» en el tramo citado en decisiones léxicas
    rationale: El texto principal sí dice «Les dije a los hijos de mi pueblo», lo cual es correcto; conviene mantener esa precisión en la revisión final para evitar ambigüedad sintáctica.
  revised_spanish_text: '«Arrepiéntanse, casa de Israel, de su iniquidad. Les dije a los hijos de mi pueblo: “Si sus pecados llegaran de la tierra al cielo, y si fueran más rojos que la escarlata y más negros que el cilicio, y se volvieran a mí de todo corazón y dijeran: ‘Padre’, los escucharé como a un pueblo santo”».'
  revision_rationale: Se corrige la sintaxis condicional para que el español mantenga una serie verbal coherente y natural, y se reemplaza el calco rígido «fueran de la tierra hasta el cielo» por «llegaran de la tierra al cielo», que preserva la hipérbole del griego sin añadir interpretación teológica. No se requieren notas al pie.
