source:
  edition: Funk 1901 (normalized OCR)
  text: Μετανοήσατε, οἶκος Ἰσραήλ, ἀπὸ τῆς ἀνομίας ὑμῶν· εἶπον τοῖς υἱοῖς τοῦ λαοῦ μου· Ἐὰν ὦσιν αἱ ἁμαρτίαι ὑμῶν ἀπὸ τῆς γῆς ἕως τοῦ οὐρανοῦ καὶ ἐὰν ὦσιν πυρρότεραι κόκκου καὶ μελανώτεραι σάκκου, καὶ ἐπιστραφῆτε πρὸς με ἐξ ὅλης τῆς καρδίας καὶ εἴπητε· Πάτερ, ἐπακούσομαι ὑμῶν ὡς λαοῦ ἁγίου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/008/003.yaml
  text: “Repent, O house of Israel, of your lawlessness. I said to the sons of my people, ‘If your sins should be from the earth to heaven, and if they are redder than scarlet and blacker than sackcloth, and you turn to me with your whole heart and say, “Father,” I will listen to you as to a holy people.’”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:41Z'
    unchanged: false
    changes_summary: Restored the explicit past verb 'I said' instead of 'Say' for lexical accuracy, adjusted 'Even if' to 'If' to reflect the conditional structure more directly, and simplified 'should reach from the earth to heaven' to 'should be from the earth to heaven' to stay closer to the Greek without added interpretation.
translation:
  language: es
  text: '«Arrepiéntanse, casa de Israel, de su iniquidad. Les dije a los hijos de mi pueblo: “Si sus pecados llegaran de la tierra al cielo, y si fueran más rojos que la escarlata y más negros que el cilicio, y se volvieran a mí de todo corazón y dijeran: ‘Padre’, los escucharé como a un pueblo santo”».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μετανοήσατε
  english_pob_choice: Repent
  chosen_spanish: Arrepiéntanse
  alternatives_spanish:
  - Arrepiéntanse de su pecado
  - Cambien de actitud
  - Hagan arrepentimiento
  lexicon: μετανοέω
  rationale: El imperativo apunta al llamado profético a cambiar de rumbo y volverse a Dios; en español, «arrepiéntanse» comunica bien esa exigencia sin volverla demasiado técnica ni desviarla hacia un mero cambio intelectual.
- source_word: ἀνομία
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - falta de ley
  - desobediencia
  lexicon: ἀνομία
  rationale: «Iniquidad» conserva el peso moral y bíblico del término sin sonar artificial en español. «Ilegalidad» sería demasiado jurídico y «falta de ley» demasiado literal para este contexto exhortativo.
- source_word: οἶκος Ἰσραήλ
  english_pob_choice: house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel
  - Israel
  - familia de Israel
  lexicon: οἶκος
  rationale: «Casa de Israel» reproduce con naturalidad la expresión bíblica y mantiene la imagen corporativa del pueblo como una casa, no solo como una nación abstracta.
- source_word: εἶπον
  english_pob_choice: I said
  chosen_spanish: Les dije
  alternatives_spanish:
  - Dije
  - Les había dicho
  lexicon: λέγω
  rationale: La revisión inglesa restauró explícitamente el pasado «I said»; en español, «Les dije» refleja ese verbo pasado y conserva la transición hacia la cita directa sin añadir matices temporales no garantizados.
- source_word: υἱοῖς τοῦ λαοῦ μου
  english_pob_choice: the sons of my people
  chosen_spanish: los hijos de mi pueblo
  alternatives_spanish:
  - los hijos de mi pueblo
  - los hijos de mi gente
  - los descendientes de mi pueblo
  lexicon: υἱοί
  rationale: Se mantiene la imagen filial del original. «Pueblo» sigue el tono corporativo de la frase, y «hijos» evita suavizar el lenguaje de parentesco que está presente en el griego.
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - pecados
  - faltas
  - culpas
  lexicon: ἁμαρτία
  rationale: «Pecados» es el equivalente más directo y reconocido en español eclesial para ἁμαρτίαι en este contexto moral y de llamado al arrepentimiento.
- source_word: ἀπὸ τῆς γῆς ἕως τοῦ οὐρανοῦ
  english_pob_choice: from the earth to heaven
  chosen_spanish: de la tierra hasta el cielo
  alternatives_spanish:
  - de la tierra hasta el cielo
  - de la tierra al cielo
  - desde la tierra hasta el cielo
  lexicon: γῆ / οὐρανός
  rationale: La frase expresa la extrema magnitud de los pecados. «Hasta el cielo» es la forma más natural en español y mantiene la hipérbole espacial del original sin explicarla.
- source_word: πυρρότεραι κόκκου
  english_pob_choice: redder than scarlet
  chosen_spanish: más rojos que la escarlata
  alternatives_spanish:
  - más rojos que la escarlata
  - más rojos que el carmesí
  - más escarlatas que la escarlata
  lexicon: κόκκος
  rationale: «Escarlata» corresponde bien al color intenso del término griego y conserva la comparación tradicional. «Más rojos» sigue la estructura comparativa del original.
- source_word: μελανώτεραι σάκκου
  english_pob_choice: blacker than sackcloth
  chosen_spanish: más negros que el cilicio
  alternatives_spanish:
  - más negros que el cilicio
  - más negros que el saco
  - más oscuros que el cilicio
  lexicon: σάκκος
  rationale: «Cilicio» es una opción bíblica reconocible en español para el saco áspero de duelo/penitencia. Mantiene el contraste cromático con «escarlata» y evita una explicación perifrástica.
- source_word: ἐπιστραφῆτε πρὸς με
  english_pob_choice: you turn to me
  chosen_spanish: se vuelven a mí
  alternatives_spanish:
  - se vuelven a mí
  - se convierten a mí
  - se regresan a mí
  lexicon: ἐπιστρέφω
  rationale: «Volverse a mí» conserva el movimiento relacional del verbo griego y es natural en español. «Convertirse» podría sonar demasiado técnico o eclesiástico en este punto.
- source_word: ἐξ ὅλης τῆς καρδίας
  english_pob_choice: with your whole heart
  chosen_spanish: de todo corazón
  alternatives_spanish:
  - de todo corazón
  - con todo su corazón
  - con plena entrega
  lexicon: καρδία
  rationale: «De todo corazón» es idiomático y transmite la totalidad interior exigida por el texto, sin perder el valor volitivo/afectivo de καρδία.
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Padre
  - ¡Padre!
  lexicon: πατήρ
  rationale: Se conserva la forma de apelación filial directa. No se añade un artículo ni se convierte en un título litúrgico; el vocativo simple es suficiente y fiel.
- source_word: ἐπακούσομαι
  english_pob_choice: I will listen to you
  chosen_spanish: los escucharé
  alternatives_spanish:
  - los escucharé
  - les responderé
  - los oiré
  lexicon: ἐπακούω
  rationale: El verbo griego implica escuchar con respuesta favorable; «los escucharé» reproduce esa promesa de atención sin explicitar más de lo que el texto dice.
- source_word: ὡς λαοῦ ἁγίου
  english_pob_choice: as to a holy people
  chosen_spanish: como a un pueblo santo
  alternatives_spanish:
  - como a un pueblo santo
  - como a un pueblo consagrado
  - como a un pueblo santo y apartado
  lexicon: λαός / ἅγιος
  rationale: «Pueblo santo» es la equivalencia más directa y bíblicamente reconocible para λαοῦ ἁγίου. «Como a» conserva el matiz comparativo del original.
theological_decisions:
- issue: Llamado al arrepentimiento y retorno del pueblo
  english_pob_reading: Repent, O house of Israel, of your lawlessness ... and you turn to me with your whole heart
  chosen_spanish_reading: Arrepiéntanse, casa de Israel, de su iniquidad ... y se vuelven a mí de todo corazón
  alternative_spanish_readings:
  - Conviértanse, casa de Israel, de su iniquidad ... y se vuelven a mí de todo corazón
  - Arrepiéntanse, casa de Israel, de su iniquidad ... y se convierten a mí de todo corazón
  rationale: El pasaje une arrepentimiento con retorno efectivo a Dios. En español, «arrepiéntanse» y «se vuelven a mí» preservan ambas dimensiones sin sustituir una por la otra.
  doctrine_reference: Arrepentimiento y conversión en la llamada profética
- issue: Relación filial con Dios en la invocación 'Father'
  english_pob_reading: say, “Father,” I will listen to you
  chosen_spanish_reading: 'y dicen: ‘Padre’, los escucharé'
  alternative_spanish_readings:
  - 'y dicen: ‘Padre’, los escucharé'
  - 'y digan: ‘Padre’, los escucharé'
  rationale: El texto presenta una respuesta favorable cuando el pueblo se dirige a Dios como Padre. Se conserva la sencillez filial del vocativo sin convertirlo en fórmula dogmática adicional.
  doctrine_reference: Paternidad divina y acceso del pueblo penitente
- issue: Hipérbole moral sobre la gravedad del pecado
  english_pob_reading: if your sins should be from the earth to heaven, and if they are redder than scarlet and blacker than sackcloth
  chosen_spanish_reading: Si sus pecados fueran de la tierra hasta el cielo, y si fueran más rojos que la escarlata y más negros que el cilicio
  alternative_spanish_readings:
  - Si sus pecados llegaran de la tierra hasta el cielo, y si fueran más rojos que la escarlata y más negros que el cilicio
  - Aunque sus pecados fueran de la tierra hasta el cielo, y aunque fueran más rojos que la escarlata y más negros que el cilicio
  rationale: Se mantiene la hipérbole sin intensificarla ni suavizarla. La estructura condicional refleja la revisión inglesa más cercana al griego y preserva la tensión retórica del texto.
  doctrine_reference: Gravedad del pecado y alcance de la misericordia
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que restauró el pasado explícito de 'I said' y ajustó la lógica condicional a 'If' en lugar de 'Even if'. Por eso el español evita una lectura concesiva fuerte y conserva una sintaxis condicional directa. También se mantuvo la hipérbole de 'from the earth to heaven' como comparación espacial extrema sin convertirla en explicación interpretativa.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» cuando no aparece el Tetragrámaton en este versículo; por tanto, no se introduce aquí.
  - Se conservó «pueblo santo» como frase bíblica estable y transparente.
  - Se evitó «SEÑOR» para no enmascarar nombres divinos; el texto no lo requiere en este pasaje.
  - «Cilicio» se usa como término eclesial comprensible para el saco de duelo/penitencia, manteniendo el contraste con «escarlata».
