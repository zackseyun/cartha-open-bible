revisions:
- from: 'Y el mismo Dueño de todas las cosas habló también acerca del arrepentimiento con juramento: «Porque vivo yo, dice el Señor, no deseo la muerte del pecador tanto como su arrepentimiento», añadiendo también una buena sentencia[a]:'
