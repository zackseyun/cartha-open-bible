  rationale: Se ajustó «Dueño» a «Soberano» por mejor registro bíblico en español; «el Señor» a «Yahvé» para alinearse con la terminología del proyecto en una fórmula profética divina; y «una buena sentencia» a «un buen juicio» para reflejar mejor γνώμην ἀγαθήν y evitar una connotación judicial demasiado estrecha. Se conserva la nota alternativa sobre «intención» porque sigue siendo una posibilidad léxica secundaria documentable.
