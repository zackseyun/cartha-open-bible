base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/008/002.yaml
  text: 'And the Master of all things himself also spoke concerning repentance with an oath: “For as I live,” says the Lord[b][a], “I do not desire the death of the sinner so much as his repentance,” adding also a good judgment:'
  footnotes:
