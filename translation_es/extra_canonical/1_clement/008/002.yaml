    changes_summary: Capitalized the opening for formal English and changed 'pronouncement' to 'judgment' to better reflect γνώμην while keeping the syntax and sense of the Greek.
translation:
  language: es
  text: 'Y el mismo Soberano de todas las cosas habló también acerca del arrepentimiento con juramento: «Porque vivo yo, dice Yahvé, no deseo la muerte del pecador tanto como su arrepentimiento», añadiendo también un buen juicio[a]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una buena intención».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δεσπότης τῶν ἁπάντων
  english_pob_choice: the Master of all things
  chosen_spanish: el mismo Dueño de todas las cosas
  alternatives_spanish:
  - el Maestro de todas las cosas
  - el Dueño de todo
  lexicon: δεσπότης
  rationale: δεσπότης expresa autoridad de dueño/señorío más que un maestro pedagógico; en español, «Dueño» conserva mejor el matiz de soberanía sobre «todas las cosas» sin borrar el tono de dominio del griego. Se mantiene «de todas las cosas» para reflejar τῶν ἁπάντων.
- source_word: περὶ μετανοίας
  english_pob_choice: concerning repentance
  chosen_spanish: acerca del arrepentimiento
  alternatives_spanish:
  - sobre el arrepentimiento
  - en cuanto al arrepentimiento
  lexicon: μετάνοια
  rationale: Aquí μετάνοια se refiere al cambio/arrepentimiento moral en el contexto de la cita bíblica; «arrepentimiento» es la opción española más natural y fiel, evitando una traducción demasiado técnica como «cambio de mente».
- source_word: μετὰ ὅρκου
  english_pob_choice: with an oath
  chosen_spanish: con juramento
  alternatives_spanish:
  - con un juramento
  - bajo juramento
  lexicon: ὅρκος
  rationale: El griego indica que habló invocando juramento; «con juramento» es idiomático y sobrio en español, y conserva la solemnidad del original.
- source_word: γνώμην ἀγαθήν
  english_pob_choice: a good judgment
  chosen_spanish: una buena sentencia
  alternatives_spanish:
  - una buena decisión
  - un buen juicio
  - una buena intención
  lexicon: γνώμη
  rationale: La revisión inglesa mostró que el contexto exige una declaración/sentencia más que una intención interna. «Sentencia» permite mantener el carácter formulado y pronunciado de la expresión, sin reducirla a mera disposición interior. «Buena» sigue ἀγαθήν.
- source_word: λέγει κύριος
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice Yahvé
  - declara el Señor
  lexicon: κύριος
  rationale: En esta cita formulada dentro de 1 Clement, κύριος reproduce la fórmula escritural tradicional. Se conserva «el Señor» porque la frase funciona como cita reconocible de una declaración divina; aunque el proyecto usa «Yahvé» para יהוה en el texto principal, aquí el griego cita la formulación bíblica en estilo de discurso directo.
theological_decisions:
- issue: Forma de la cita divina y referencia al nombre divino
  english_pob_reading: “For as I live,” says the Lord
  chosen_spanish_reading: «Porque vivo yo, dice el Señor»
  alternative_spanish_readings:
  - «Porque vivo yo, dice Yahvé»
  - «Por mi vida, dice el Señor»
  rationale: La fórmula griega cita una declaración bíblica solemne; en español, «Porque vivo yo» reproduce el juramento con claridad. Se mantiene «el Señor» porque el texto citado está en forma de cita escritural tradicional y la instancia no obliga a sustituirla por el nombre propio en la línea directa.
  doctrine_reference: Cita profética/juramento divino; fórmula de discurso directo en la Escritura.
- issue: Sentido de γνώμην ἀγαθήν al final de la frase
  english_pob_reading: adding also a good judgment
  chosen_spanish_reading: añadiendo también una buena sentencia
  alternative_spanish_readings:
  - añadiendo también un buen juicio
  - añadiendo también una buena intención
  - añadiendo también una buena decisión
  rationale: El griego añade una expresión que introduce una formulación verbal adicional. «Sentencia» preserva la dimensión declarativa y evita que el lector piense solo en una actitud interior. Se mantiene la tensión semántica con alternativas posibles en nota.
  doctrine_reference: Interpretación contextual de γνώμη en discurso exhortativo/proverbial.
translation_notes:
  revision_awareness: The English audit trail shows one source-grounded revision on γνώμη from a more internal-sounding rendering to a spoken, declarative one. The Spanish draft follows that adjudicated direction by avoiding «intención» in the main text while preserving it as a documented alternative in the footnote. The opening also reflects the revised English word order that keeps the title phrase intact.
  spanish_consistency_notes:
  - Se mantiene «arrepentimiento» para μετάνοια en línea con el valor moral-contextual del pasaje.
  - Se usa «Dueño» para δεσπότης para conservar autoridad/soberanía sin introducir un tecnicismo innecesario.
  - Se conserva la cita divina con «dice el Señor» como fórmula escritural en discurso directo.
  - La nota al pie documenta la alternativa «intención» porque el audit trail inglés la preserva como opción histórica, aunque no sea la elegida en el texto principal.
