review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la mayor parte del contenido griego y conserva la frase corregida «de sus almas». Sin embargo, hay dos problemas de fidelidad/léxico: (1) «de delante de mis ojos, de sus almas» suena desordenado en español y no refleja de la mejor manera la relación de ἀπὸ τῶν ψυχῶν ὑμῶν ἀπέναντι τῶν ὀφθαλμῶν μου; conviene reordenarlo naturalmente como «de sus almas, de delante de mis ojos» manteniendo ambos complementos. (2) δικαιώσατε χήραν se acerca más a «hagan justicia a la viuda» que a «defiendan a la viuda»; el borrador atenúa innecesariamente la fuerza judicial paralela a «hagan justicia al huérfano».'
  spanish_quality_summary: El texto es generalmente claro, digno y legible. No obstante, «háganse limpios» resulta algo tosco; «queden limpios» suena más natural en español sin perder el valor resultativo. Además, el orden «de delante de mis ojos, de sus almas» dificulta la lectura y parece arrastrado por el inglés; conviene ajustar la sintaxis al español.
  glossary_alignment: La elección de «Señor» para κύριος en esta cita griega puede sostenerse como excepción documentada, aunque el proyecto normalmente usa «Yahvé» para el nombre divino hebreo. El resto del vocabulario clave está mayormente alineado. Se recomienda conservar el paralelismo judicial con «hagan justicia» tanto para huérfano como para viuda.
  issues:
  - severity: medium
    issue: Orden poco natural de los complementos en «de delante de mis ojos, de sus almas»
    rationale: Aunque intenta seguir el orden revisado en inglés, en español ese orden resulta torpe y puede oscurecer que las malas obras deben quitarse tanto de las almas como de delante de los ojos del Señor.
  - severity: medium
    issue: «Defiendan a la viuda» debilita el matiz judicial de δικαιώσατε
    rationale: El pasaje presenta una serie de imperativos forenses/sociales; «hagan justicia a la viuda» preserva mejor el paralelismo con «hagan justicia al huérfano» y con el griego/inglés auditado.
  - severity: low
    issue: «Háganse limpios» suena poco idiomático
    rationale: «Queden limpios» o «purifíquense» sería más natural. «Queden limpios» mantiene bien la estructura cercana al original sin añadir interpretación.
  revised_spanish_text: 'Y en otro lugar dice así: «Lávense y queden limpios; aparten sus malas obras de sus almas, de delante de mis ojos[a]; dejen sus perversidades, aprendan a hacer el bien, busquen justicia, libren al oprimido, hagan justicia al huérfano y hagan justicia a la viuda. Y vengan, y razonemos juntos», dice el Señor. «Aunque sus pecados sean como grana, los emblanqueceré como la nieve; y si son como carmesí, los emblanqueceré como la lana. Pero si quieren y me escuchan, comerán lo bueno de la tierra; pero si no quieren ni me escuchan, la espada los devorará; porque la boca del Señor ha hablado estas cosas».'
  revised_footnotes:
