revisions:
- from: 'Y en otro lugar dice así: «Lávense y háganse limpios; aparten sus malas obras de delante de mis ojos[a], de sus almas; dejen sus perversidades, aprendan a hacer el bien, busquen justicia, libren al oprimido, hagan justicia al huérfano y defiendan a la viuda. Y vengan, razonemos juntos», dice el Señor. «Aunque sus pecados sean como grana, los emblanqueceré como la nieve; aunque sean rojos como el carmesí, los emblanqueceré como la lana. Pero si quieren y me escuchan, comerán lo mejor de la tierra; pero si no quieren ni me escuchan, la espada los devorará; porque la boca del Señor ha hablado estas cosas».'
  to: 'Y en otro lugar dice así: «Lávense y queden limpios; aparten sus malas obras de sus almas, de delante de mis ojos[a]; dejen sus perversidades, aprendan a hacer el bien, busquen justicia, libren al oprimido, hagan justicia al huérfano y hagan justicia a la viuda. Y vengan, y razonemos juntos», dice el Señor. «Aunque sus pecados sean como grana, los emblanqueceré como la nieve; y si son como carmesí, los emblanqueceré como la lana. Pero si quieren y me escuchan, comerán lo bueno de la tierra; pero si no quieren ni me escuchan, la espada los devorará; porque la boca del Señor ha hablado estas cosas».'
