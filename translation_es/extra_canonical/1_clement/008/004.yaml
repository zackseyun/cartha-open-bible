    text: O «aparten sus malas obras de delante de mis ojos, de sus almas».
    reason: Preserva el orden alternativo más cercano al inglés auditado y al griego, mientras el texto principal usa un orden más natural en español.
  revision_rationale: 'Se hicieron ajustes menores pero importantes para mejorar fidelidad y español natural: «queden limpios» en lugar de «háganse limpios»; reordenamiento de «de sus almas, de delante de mis ojos» para claridad; restauración del paralelismo judicial con «hagan justicia a la viuda»; y leves mejoras de fluidez en la cita profética sin apartarse del sentido fuente.'
