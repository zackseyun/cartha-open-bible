source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ ἐν ἑτέρῳ τόπῳ λέγει οὕτως· Λούσασθε καὶ καθαροὶ γένεσθε, ἀφέλεσθε τὰς πονηρίας ἀπὸ τῶν ψυχῶν ὑμῶν ἀπέναντι τῶν ὀφθαλμῶν μου· παύσασθε ἀπὸ τῶν πονηριῶν ὑμῶν, μάθετε καλὸν ποιεῖν, ἐκζητήσατε κρίσιν, ῥύσασθε ἀδικούμενον, κρίνατε ὀρφανῷ καὶ δικαιώσατε χήραν· καὶ δεῦτε καὶ διελεγχθῶμεν, λέγει κύριος· καὶ ἐὰν ὦσιν αἱ ἁμαρτίαι ὑμῶν ὡς φοινικοῦν, ὡς χιόνα λευκανῶ· ἐὰν δὲ ὦσιν ὡς κόκκινον, ὡς ἔριον λευκανῶ· καὶ ἐὰν θέλητε καὶ εἰσακούσητέ μου, τὰ ἀγαθὰ τῆς γῆς φάγεσθε· ἐὰν δὲ μὴ θέλητε μηδὲ εἰσακούσητέ μου, μάχαιρα ὑμᾶς κατέδεται· τὸ γὰρ στόμα κυρίου ἐλάλησεν ταῦτα.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/008/004.yaml
  text: 'And in another place he says thus: “Wash and become clean; remove your wicked deeds from before my eyes[a], from your souls; cease from your wickednesses, learn to do good, seek justice, rescue the one being wronged, judge for the orphan, and give justice to the widow. And come, and let us reason together,” says the Lord. “Even if your sins are like crimson, I will whiten them like snow; and if they are like scarlet, I will whiten them like wool. But if you are willing and listen to me, you shall eat the good things of the land; but if you are not willing and do not listen to me, a sword will devour you; for the mouth of the Lord has spoken these things.”'
  footnotes:
  - marker: a
    text: Or 'remove your wicked deeds from before my eyes'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:41Z'
    unchanged: false
    changes_summary: 'Adjusted the placement of ''from before my eyes'' to reflect the Greek order more accurately: the wicked deeds are to be removed from before the Lord''s eyes, with ''from your souls'' retained separately. No other changes needed.'
translation:
  language: es
  text: 'Y en otro lugar dice así: «Lávense y queden limpios; aparten sus malas obras de sus almas, de delante de mis ojos[a]; dejen sus perversidades, aprendan a hacer el bien, busquen justicia, libren al oprimido, hagan justicia al huérfano y hagan justicia a la viuda. Y vengan, y razonemos juntos», dice el Señor. «Aunque sus pecados sean como grana, los emblanqueceré como la nieve; y si son como carmesí, los emblanqueceré como la lana. Pero si quieren y me escuchan, comerán lo bueno de la tierra; pero si no quieren ni me escuchan, la espada los devorará; porque la boca del Señor ha hablado estas cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aparten sus malas obras de delante de mis ojos, de sus almas».
    reason: Preserva el orden alternativo más cercano al inglés auditado y al griego, mientras el texto principal usa un orden más natural en español.
lexical_decisions:
- source_word: Λούσασθε καὶ καθαροὶ γένεσθε
  english_pob_choice: Wash and become clean
  chosen_spanish: Lávense y háganse limpios
  alternatives_spanish:
  - Lávense y queden limpios
  - Lávense y vuelvan limpios
  lexicon: λούω / καθαρός
  rationale: Conserva el paralelismo de dos imperativos y el sentido ritual-moral de la invitación. «Háganse limpios» refleja el valor resultativo sin añadir una paráfrasis interpretativa.
- source_word: ἀφέλεσθε τὰς πονηρίας
  english_pob_choice: remove your wicked deeds
  chosen_spanish: aparten sus malas obras
  alternatives_spanish:
  - quiten sus perversidades
  - eliminen sus actos perversos
  lexicon: ἀφαιρέω / πονηρία
  rationale: La revisión inglesa corrigió la omisión de la frase siguiente sobre las almas; en español se mantiene una expresión natural y moralmente concreta. «Malas obras» evita forzar «wicked deeds» como un tecnicismo excesivo.
- source_word: ἀπὸ τῶν ψυχῶν ὑμῶν ἀπέναντι τῶν ὀφθαλμῶν μου
  english_pob_choice: from your souls, before my eyes
  chosen_spanish: de delante de mis ojos, de sus almas
  alternatives_spanish:
  - de sus almas, de delante de mis ojos
  - de sus almas, ante mis ojos
  lexicon: ψυχή / ὀφθαλμός
  rationale: 'Sigue la corrección revisada del orden griego: primero la referencia al juicio visible de Dios, luego la esfera interior de las personas. «Almas» preserva la terminología bíblica sin reducirla a mera psicología.'
- source_word: παύσασθε ἀπὸ τῶν πονηριῶν ὑμῶν
  english_pob_choice: cease from your wickednesses
  chosen_spanish: dejen sus perversidades
  alternatives_spanish:
  - cesen de sus perversidades
  - abandonen sus maldades
  lexicon: παύω / πονηρία
  rationale: «Dejen» conserva la fuerza imperativa de abandono continuo y mantiene continuidad con la línea anterior. «Perversidades» reproduce el plural intensivo del griego con un tono suficientemente fuerte para el contexto profético.
- source_word: ἐκζητήσατε κρίσιν
  english_pob_choice: seek justice
  chosen_spanish: busquen justicia
  alternatives_spanish:
  - busquen juicio
  - procuren justicia
  lexicon: ἐκζητέω / κρίσις
  rationale: «Justicia» es la opción más clara y fiel en español para el valor judicial/ético de κρίσις en este pasaje, siguiendo el POB inglés.
- source_word: ῥύσασθε ἀδικούμενον
  english_pob_choice: rescue the one being wronged
  chosen_spanish: libren al oprimido
  alternatives_spanish:
  - rescaten al que es agraviado
  - libren al que sufre injusticia
  lexicon: ῥύομαι / ἀδικέω
  rationale: El participio pasivo pide una persona afectada por injusticia; «oprimido» comunica bien el efecto social sin perder el sentido de rescate activo.
- source_word: κρίνατε ὀρφανῷ
  english_pob_choice: judge for the orphan
  chosen_spanish: hagan justicia al huérfano
  alternatives_spanish:
  - juzguen al huérfano
  - fallen sentencia en favor del huérfano
  lexicon: κρίνω / ὀρφανός
  rationale: En español, «juzguen al huérfano» suena ambiguo o duro; la función judicial favorable se expresa mejor como «hagan justicia al huérfano».
- source_word: δικαιώσατε χήραν
  english_pob_choice: give justice to the widow
  chosen_spanish: defiendan a la viuda
  alternatives_spanish:
  - hagan justicia a la viuda
  - declaren justa a la viuda
  lexicon: δικαιόω / χήρα
  rationale: «Defiendan» preserva la idea de vindicación práctica hacia la viuda vulnerable y evita una formulación excesivamente jurídica en español. Mantiene el impulso social del pasaje.
- source_word: διελεγχθῶμεν
  english_pob_choice: let us reason together
  chosen_spanish: razonemos juntos
  alternatives_spanish:
  - discutamos juntos
  - conversemos juntos
  lexicon: ἐλέγχω
  rationale: Sostiene la lectura tradicional de diálogo judicial/argumentativo sin caer en «reprender», que no corresponde al contexto del llamado divino a deliberar.
- source_word: φοινικοῦν
  english_pob_choice: crimson
  chosen_spanish: grana
  alternatives_spanish:
  - carmesí
  - rojo intenso
  lexicon: φοινικοῦς
  rationale: «Grana» es una equivalencia bíblica natural para el tinte rojo profundo y conserva el paralelismo con «carmesí» en la siguiente cola.
- source_word: χιόνα
  english_pob_choice: snow
  chosen_spanish: nieve
  alternatives_spanish:
  - la nieve
  - nieve fresca
  lexicon: χιών
  rationale: Mantiene el contraste visual directo del texto fuente sin añadir matices ajenos.
- source_word: κόκκινον
  english_pob_choice: scarlet
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - rojo escarlata
  lexicon: κόκκινος
  rationale: «Carmesí» conserva el registro bíblico y el paralelismo con «grana», como en la tradición de Isaías.
- source_word: ἔριον
  english_pob_choice: wool
  chosen_spanish: lana
  alternatives_spanish:
  - vellón
  - lana de oveja
  lexicon: ἔριον
  rationale: La palabra española simple y exacta es «lana»; no requiere ampliación.
- source_word: μάχαιρα ὑμᾶς κατέδεται
  english_pob_choice: a sword will devour you
  chosen_spanish: la espada los devorará
  alternatives_spanish:
  - la espada los consumirá
  - una espada los devorará
  lexicon: μάχαιρα / κατεσθίω
  rationale: Respeta la imagen profética de destrucción personificada. «Los devorará» conserva la violencia metafórica sin explicarla.
- source_word: τὸ γὰρ στόμα κυρίου ἐλάλησεν ταῦτα
  english_pob_choice: for the mouth of the Lord has spoken these things
  chosen_spanish: porque la boca del Señor ha hablado estas cosas
  alternatives_spanish:
  - porque la boca del Señor habló estas cosas
  - porque esto lo ha dicho el Señor
  lexicon: στόμα / κύριος
  rationale: Se mantiene la personificación semítica de «la boca del Señor» tal como en el POB inglés. «Señor» refleja el κύριος citado en el oráculo reproducido por Clemente.
theological_decisions:
- issue: Cita profética con lenguaje de mandato moral e interioridad
  english_pob_reading: remove your wicked deeds from before my eyes, from your souls
  chosen_spanish_reading: aparten sus malas obras de delante de mis ojos, de sus almas
  alternative_spanish_readings:
  - aparten sus malas obras de sus almas, de delante de mis ojos
  - eliminen sus malas obras ante mis ojos, de sus almas
  rationale: 'La revisión del texto inglés muestra que la frase sobre las almas no debe omitirse. En español se conserva la doble relación: el juicio visible ante Dios y la dimensión interior del pecado.'
  doctrine_reference: Isaías 1:16; 1 Clemente 8:4; LXX de Isaías
- issue: «Razonemos juntos» como invitación divina
  english_pob_reading: let us reason together
  chosen_spanish_reading: razonemos juntos
  alternative_spanish_readings:
  - discutamos juntos
  - entremos en razón juntos
  rationale: La expresión mantiene el carácter forense y dialogal del oráculo sin convertirlo en una reprensión unilateral. La invitación procede del propio Señor.
  doctrine_reference: Isaías 1:18; 1 Clemente 8:4
- issue: «El Señor» en la cita de Clemente
  english_pob_reading: says the Lord / the mouth of the Lord
  chosen_spanish_reading: dice el Señor / la boca del Señor
  alternative_spanish_readings:
  - dice Yahvé / la boca de Yahvé
  rationale: Aunque el proyecto usa «Yahvé» para יהוה en la voz principal, aquí la cláusula está en una cita griega de κύριος integrada por Clemente y la tradición POB la vierte como «Señor». Se preserva así la forma citada y su intertexto con Isaías en la transmisión griega.
  doctrine_reference: Citación bíblica en 1 Clemente; Isaías 1:16-20
- issue: Vindicación de huérfano y viuda
  english_pob_reading: judge for the orphan, and give justice to the widow
  chosen_spanish_reading: hagan justicia al huérfano y defiendan a la viuda
  alternative_spanish_readings:
  - juzguen por el huérfano y hagan justicia a la viuda
  - hagan justicia al huérfano y hagan justicia a la viuda
  rationale: El español requiere expresar la función judicial con mayor claridad para evitar ambigüedad. «Defiendan» recoge la dimensión de protección y vindicación presente en δικαιώσατε.
  doctrine_reference: Isaías 1:17; 1 Clemente 8:4
translation_notes:
  revision_awareness: 'Se incorporó la corrección del inglés POB revisado: la frase correspondiente a ἀπὸ τῶν ψυχῶν ὑμῶν no se omite y se mantiene separada de ‘de delante de mis ojos’. La puntuación y el orden en español siguen de cerca el orden revisado del griego.'
  spanish_consistency_notes:
  - Se mantiene «Señor» en la cita porque el texto de Clemente reproduce un oráculo griego con κύριος y la tradición POB inglesa así lo vierte en este pasaje.
  - Se usa «almas» para ψυχῶν sin convertirlo en ‘conciencias’ o ‘vidas’, a fin de conservar la amplitud antropológica bíblica.
  - «Justicia» se conserva para κρίσις en el marco profético, mientras que «defiendan» explicita la función de δικαιώσατε sin perder el sentido de vindicación.
  - La nota al pie solo cubre la alternativa léxica de ‘remove your wicked deeds’; no se añaden notas textuales porque el paquete de fuente no reporta variantes manuscritas adicionales.
