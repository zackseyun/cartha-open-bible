  to: 'Los ministros de la gracia de Dios hablaron por medio del Espíritu Santo acerca del arrepentimiento, y el Dueño de todas las cosas habló también acerca del arrepentimiento con juramento: «Vivo yo, dice el Señor, que no quiero la muerte del pecador tanto como su arrepentimiento», añadiendo también una buena intención: «Arrepiéntanse, casa de Israel, de su [a] iniquidad. Digan a los hijos de mi pueblo: “Aunque sus pecados llegaran de la tierra hasta el cielo, y aunque fueran más rojos que el carmesí y más negros que el cilicio, aun si se vuelven a mí con todo su corazón y dicen: ‘Padre’, los escucharé como a un pueblo santo”». Y en otro lugar dice así: «Lávense y sean limpios; quiten de sus almas sus maldades delante de mis ojos; dejen sus maldades, aprendan a hacer el bien, busquen la justicia, rescaten al que es agraviado, hagan justicia al huérfano y den justicia a la viuda; y vengan, y razonemos juntos, dice el Señor. Aunque sus pecados sean como el carmesí, los emblanqueceré como
