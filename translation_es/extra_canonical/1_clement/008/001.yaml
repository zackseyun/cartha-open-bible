  text: Οἱ λειτουργοὶ τῆς χάριτος τοῦ θεοῦ διὰ πνεύματος ἁγίου περὶ μετανοίας ἐλάλησαν, 2. καὶ αὐτὸς δὲ ὁ δεσπότης τῶν ἁπάντων περὶ μετανοίας ἐλάλησεν μετὰ ὅρκου· Ζῶ γὰρ ἐγώ, λέγει κύριος, οὐ βούλομαι τὸν θάνατον τοῦ ἁμαρτωλοῦ ὡς τὴν μετάνοιαν, προστιθεὶς καὶ γνώμην ἀγαθήν. 3. Μετανοήσατε, οἶκος Ἰσραήλ, ἀπὸ τῆς ἀνομίας ὑμῶν· εἶπον τοῖς υἱοῖς τοῦ λαοῦ μου· Ἐὰν ὦσιν αἱ ἁμαρτίαι ὑμῶν ἀπὸ τῆς γῆς ἕως τοῦ οὐρανοῦ καὶ ἐὰν ὦσιν πυρρότεραι κόκκου καὶ μελανώτεραι σάκκου, καὶ ἐπιστραφῆτε πρὸς με ἐξ ὅλης τῆς καρδίας καὶ εἴπητε· Πάτερ, ἐπακούσομαι ὑμῶν ὡς λαοῦ ἁγίου. 4. καὶ ἐν ἑτέρῳ τόπῳ λέγει οὕτως· Λούσασθε καὶ καθαροὶ γένεσθε, ἀφέλεσθε τὰς πονηρίας ἀπὸ τῶν ψυχῶν ὑμῶν ἀπέναντι τῶν ὀφθαλμῶν μου· παύσασθε ἀπὸ τῶν πονηριῶν ὑμῶν, μάθετε καλὸν ποιεῖν, ἐκζητήσατε κρίσιν, ῥύσασθε ἀδικούμενον, κρίνατε ὀρφανῷ καὶ δικαιώσατε χήραν· καὶ δεῦτε καὶ διελεγχθῶμεν, λέγει κύριος· καὶ ἐὰν ὦσιν αἱ ἁμαρτίαι ὑμῶν ὡς φοινικοῦν, ὡς χιόνα λευκανῶ· ἐὰν δὲ ὦσιν ὡς κόκκινον, ὡς ἔριον λευκανῶ· καὶ ἐὰν θέλητε καὶ εἰσακούσητέ
    μου, τὰ ἀγαθὰ τῆς γῆς φάγεσθε· ἐὰν δὲ μὴ θέλητε μηδὲ εἰσακούσητέ μου, μάχαιρα ὑμᾶς κατέδεται· τὸ γὰρ στόμα κυρίου ἐλάλησεν ταῦτα. 5. πάντας οὖν τοὺς ἀγαπητοὺς αὐτοῦ βουλόμενος μετανοίας μετασχεῖν ἐστήριξεν τῷ παντοκρατορικῷ βουλήματι αὐτοῦ.
