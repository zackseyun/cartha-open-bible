base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/008/001.yaml
  text: 'The ministers of the grace of God spoke through the Holy Spirit concerning repentance, and the Master of all things himself also spoke concerning repentance with an oath: “For as I live,” says the Lord, “I do not desire the death of the sinner so much as his repentance,” adding also a good declaration: “Repent, O house of Israel, of your lawlessness. Say to the sons of my people, ‘Even if your sins should reach from the earth to heaven, and even if they are redder than scarlet and blacker than sackcloth, yet if you turn to me with your whole heart and say, “Father,” I will listen to you as to a holy people.’” And in another place he says thus: “Wash and become clean; remove your wicked deeds from your souls before my eyes, cease from your wickednesses, learn to do good, seek justice, rescue the one being wronged, judge for the orphan, and give justice to the widow. And come, and let us reason together,” says the Lord. “Even if your sins are like crimson, I will whiten them like
    snow; and if they are like scarlet, I will whiten them like wool. But if you are willing and listen to me, you shall eat the good things of the land; but if you are not willing and do not listen to me, a sword will devour you; for the mouth of the Lord has spoken these things.” Therefore, since he desires all his beloved ones to share in repentance, he established it by his all-sovereign purpose.'
