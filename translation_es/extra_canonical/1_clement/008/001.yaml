translation:
  language: es
  text: 'Los ministros de la gracia de Dios hablaron por medio del Espíritu Santo acerca del arrepentimiento, y el Dueño de todas las cosas habló también acerca del arrepentimiento con juramento: «Vivo yo, dice el Señor, que no quiero la muerte del pecador tanto como su arrepentimiento», añadiendo también una buena intención: «Arrepiéntanse, casa de Israel, de su [a] iniquidad. Digan a los hijos de mi pueblo: “Aunque sus pecados llegaran de la tierra hasta el cielo, y aunque fueran más rojos que el carmesí y más negros que el cilicio, aun si se vuelven a mí con todo su corazón y dicen: ‘Padre’, los escucharé como a un pueblo santo”». Y en otro lugar dice así: «Lávense y sean limpios; quiten de sus almas sus maldades delante de mis ojos; dejen sus maldades, aprendan a hacer el bien, busquen la justicia, rescaten al que es agraviado, hagan justicia al huérfano y den justicia a la viuda; y vengan, y razonemos juntos, dice el Señor. Aunque sus pecados sean como el carmesí, los emblanqueceré
    como nieve; y si son como la escarlata, los emblanqueceré como lana. Pero si quieren y me escuchan, comerán los bienes de la tierra; pero si no quieren ni me escuchan, la espada los devorará, porque la boca del Señor ha hablado estas cosas». Por tanto, queriendo que todos sus amados participen en el arrepentimiento, lo estableció por su propósito todopoderoso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Iniquidad’ traduce ἀνομία con un término bíblico español que conserva el sentido de ruptura con el orden de Dios; también podría leerse ‘maldad’ o ‘ilegalidad’, pero esas opciones pierden parte de la fuerza del término.
    reason: lexical_alternative
lexical_decisions:
- source_word: λειτουργοὶ
  english_pob_choice: ministers
  chosen_spanish: ministros
  alternatives_spanish:
  - siervos
  - ministros litúrgicos
  lexicon: LSJ
  rationale: ‘Ministros’ conserva la idea de personas comisionadas para servir en la obra de Dios sin volver explícito un oficio cultual que el contexto no exige. En español suena natural y mantiene la dignidad del término.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: LSJ
  rationale: ‘Gracia’ preserva el peso teológico de la benevolencia divina y es el equivalente cristiano más claro y estable en español.
- source_word: δεσπότης
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: LSJ
  rationale: Se eligió ‘Dueño’ para conservar la fuerza de autoridad absoluta y la diferencia con κύριος, que después se traduce ‘Señor’. En español, ‘Dueño’ comunica propiedad y dominio con mayor transparencia que ‘Señor’ en este contraste.
- source_word: μετάνοια / μετανοέω
  english_pob_choice: repentance / repent
  chosen_spanish: arrepentimiento / arrepiéntanse
  alternatives_spanish:
  - cambio de mente
  - conversión
  lexicon: LSJ
  rationale: En este contexto exhortativo y profético, ‘arrepentimiento’ y ‘arrepiéntanse’ transmiten mejor la carga moral y espiritual que una traducción meramente cognitiva como ‘cambio de mente’.
- source_word: γνώμην ἀγαθήν
  english_pob_choice: a good declaration
  chosen_spanish: una buena declaración
  alternatives_spanish:
  - un buen propósito
  - un buen consejo
  lexicon: LSJ
  rationale: Se mantiene la formulación pública y adjetival del original con ‘declaración’, evitando sobreinterpretar la frase como si fuera principalmente una disposición interna.
- source_word: ἀνομία
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - maldad
  lexicon: LSJ
  rationale: ‘Iniquidad’ preserva el peso bíblico de oposición al orden de Dios y resulta más natural que ‘ilegalidad’ en un registro eclesial en español.
- source_word: ἐπιστραφῆτε
  english_pob_choice: turn
  chosen_spanish: se vuelven
  alternatives_spanish:
  - se vuelvan
  - vuelvan
  - se convierten
  lexicon: LSJ
  rationale: ‘Se vuelven’ expresa el giro de retorno al Señor con fluidez en la cláusula condicional, manteniendo el valor de volver hacia Dios.
- source_word: ἐπακούσομαι
  english_pob_choice: I will listen to you
  chosen_spanish: los escucharé
  alternatives_spanish:
  - los oiré
  - los atenderé
  lexicon: LSJ
  rationale: ‘Escucharé’ comunica una respuesta relacional, no sólo la percepción auditiva, y corresponde bien al matiz de escuchar con atención y favor.
- source_word: διελεγχθῶμεν
  english_pob_choice: let us reason together
  chosen_spanish: razonemos juntos
  alternatives_spanish:
  - hablemos para resolverlo
  - discutamos
  lexicon: LSJ
  rationale: ‘Razonemos juntos’ conserva el tono dialogal y judicial del hebraísmo subyacente sin introducir una disputa agresiva.
- source_word: ἐκζητήσατε κρίσιν
  english_pob_choice: seek justice
  chosen_spanish: busquen la justicia
  alternatives_spanish:
  - busquen juicio
  - busquen lo recto
  lexicon: LSJ
  rationale: Aquí κρίσις se entiende éticamente como justicia; ‘busquen la justicia’ resulta fiel y claro para el lector español.
- source_word: ῥύσασθε ἀδικούμενον
  english_pob_choice: rescue the one being wronged
  chosen_spanish: rescaten al que es agraviado
  alternatives_spanish:
  - liberen al oprimido
  - salven al que sufre injusticia
  lexicon: LSJ
  rationale: ‘Agraviado’ recoge el sentido de alguien que padece daño o injusticia sin forzar un matiz político no explícito en el griego.
- source_word: κρίνατε ὀρφανῷ
  english_pob_choice: judge for the orphan
  chosen_spanish: hagan justicia al huérfano
  alternatives_spanish:
  - defiendan al huérfano
  - juzguen al huérfano
  lexicon: LSJ
  rationale: Aunque el griego conserva una textura judicial, en español ‘hagan justicia al huérfano’ comunica mejor la acción en favor del vulnerable sin perder la esfera legal.
- source_word: δικαιώσατε χήραν
  english_pob_choice: give justice to the widow
  chosen_spanish: den justicia a la viuda
  alternatives_spanish:
  - vindiquen a la viuda
  - justifiquen a la viuda
  lexicon: LSJ
  rationale: ‘Den justicia’ evita el posible equívoco doctrinal de ‘justificar’ y retiene la idea vindicativa/legal del verbo.
- source_word: φοινικοῦν / κόκκινον
  english_pob_choice: crimson / scarlet
  chosen_spanish: carmesí / escarlata
  alternatives_spanish:
  - rojo intenso
  - rojo oscuro
  lexicon: LSJ
  rationale: Se preserva la imaginería vívida del texto profético con términos cromáticos clásicos y entendibles en español.
- source_word: λευκανῶ
  english_pob_choice: I will whiten
  chosen_spanish: los emblanqueceré
  alternatives_spanish:
  - los haré blancos
  - los blanquearé
  lexicon: LSJ
  rationale: ‘Emblanqueceré’ mantiene la acción verbal divina y la imagen de transformación de color con naturalidad en español.
- source_word: παντοκρατορικῷ βουλήματι
  english_pob_choice: his all-sovereign purpose
  chosen_spanish: su propósito todopoderoso
  alternatives_spanish:
  - su voluntad omnipotente
  - su propósito soberano
  lexicon: LSJ
  rationale: ‘Propósito todopoderoso’ intenta conservar tanto la idea de voluntad/plan como la amplitud de παντοκρατορικός, sin reducirla sólo a poder o sólo a consejo.
- source_word: μετασχεῖν
  english_pob_choice: to share in repentance
  chosen_spanish: participen en el arrepentimiento
  alternatives_spanish:
  - tomen parte en el arrepentimiento
  - participen de arrepentimiento
  lexicon: LSJ
  rationale: ‘Participen en el arrepentimiento’ conserva el matiz de compartir o tener parte en algo, evitando reducir el verbo a un simple mandato verbal.
theological_decisions:
- issue: Distinguir δεσπότης de κύριος
  english_pob_reading: Different English titles are maintained
  chosen_spanish_reading: Se distinguen ‘Dueño’ y ‘Señor’
  alternative_spanish_readings:
  - traducir ambos como ‘Señor’
  - usar ‘Soberano’ para δεσπότης
  rationale: El griego usa títulos distintos. Mantener la diferencia ayuda a transparentar la retórica de Clemente y evita borrar la transición entre la voz de autoridad absoluta y la cita bíblica.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source-text plain sense.'
- issue: El cierre sobre la participación en el arrepentimiento
  english_pob_reading: he desires all his beloved ones to share in repentance
  chosen_spanish_reading: quiere que todos sus amados participen en el arrepentimiento
  alternative_spanish_readings:
  - quiere que todos sus amados se arrepientan
  - quiere darles oportunidad de arrepentirse
  rationale: ‘Participen en el arrepentimiento’ preserva el valor de μετασχεῖν como participación real. No se neutraliza la tensión teológica entre mandato y don, sino que se deja visible en una formulación participativa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se revisó el texto contra el griego normalizado de Funk 1901 y el audit trail inglés. No se detectaron cambios editoriales pendientes; la redacción española refleja las decisiones léxicas y teológicas ya estabilizadas en el antecedente inglés, con adaptación idiomática natural al español.
  spanish_consistency_notes:
  - Se mantiene ‘gracia’ para χάρις y ‘Espíritu Santo’ para πνεύματος ἁγίου.
  - Se distingue ‘Dueño’ de ‘Señor’ para preservar la diferencia entre δεσπότης y κύριος.
  - Se conserva el patrón profético-jurídico con ‘busquen la justicia’, ‘den justicia’ y ‘hagan justicia’.
  - Se evita ‘Cristo’ porque el pasaje no contiene Χριστός ni un título equivalente en esta sección.
  - La puntuación reproduce el encadenamiento de citas con comillas españolas y dos puntos de introducción, sin añadir división versicular artificial.
