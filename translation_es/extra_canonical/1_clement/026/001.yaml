review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del audit trail inglés: conserva «Hacedor» para δημιουργός, mantiene la agencia divina en la resurrección, preserva el indefinido «un ave» con nota adecuada, y retiene «carne» para σάρξ. Las citas también reflejan correctamente el argumento de Clemente. Sin embargo, hay pequeños puntos de ajuste: «cuando aun por medio de un ave» suena menos natural que una construcción con «cuando incluso...», y «tú estabas conmigo» debilita levemente el presente griego εἶ frente a «estás conmigo».'
  spanish_quality_summary: El español es generalmente claro y digno, pero tiene cierta rigidez en «cosa grande y admirable» y especialmente en «con la confianza de una fe buena», que aunque defendible lexicalmente suena poco idiomático. Puede mejorarse sin perder la doble capa semántica del griego. También conviene pulir la fluidez de la pregunta retórica inicial.
  glossary_alignment: 'Buena alineación con la terminología del proyecto y con las decisiones auditadas: δημιουργός -> «Hacedor», σάρξ -> «carne», ἐξομολογήσομαί -> «te daré gracias», δι᾿ ὀρνέου -> «por medio de un ave» con nota. No hay conflicto con los defaults mayores del proyecto.'
  issues:
  - severity: medium
    issue: Frase inicial algo rígida y poco idiomática
    rationale: «consideramos que es cosa grande y admirable» reproduce el sentido, pero suena más forzado en español contemporáneo digno que «consideramos que es algo grande y admirable» o similar.
  - severity: medium
    issue: Construcción torpe en «cuando aun por medio de un ave»
    rationale: La secuencia es comprensible, pero poco natural. «cuando incluso por medio de un ave» o «cuando aun por medio de un ave» con tilde correcta no resuelve del todo la fluidez; «incluso» encaja mejor en español moderno.
  - severity: low
    issue: Tiempo verbal debilitado en la cita «porque tú estabas conmigo»
    rationale: El griego εἶ es presente («estás»). El imperfecto español no destruye el sentido, pero pierde precisión formal en una cita escrituraria.
  - severity: medium
    issue: «con la confianza de una fe buena» conserva el griego, pero suena poco natural
    rationale: La formulación mantiene πεποίθησις + πίστις, pero «fe buena» resulta áspera en español. «con la confianza de una buena fe» conserva mejor ambas capas y mejora la legibilidad.
