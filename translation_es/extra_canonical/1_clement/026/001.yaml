translation:
  language: es
  text: 'Por tanto, consideramos que es algo grande y admirable si el Hacedor de todas las cosas realizará la resurrección de los que le han servido en santidad, con la confianza de una buena fe, cuando incluso por medio de un ave nos muestra la grandeza de su promesa[a]. 2. Porque en algún lugar dice: «Y tú me levantarás, y yo te daré gracias»; y: «Me acosté y dormí; desperté, porque tú estás conmigo». 3. Y de nuevo Job dice: «Y levantarás esta carne mía, que ha soportado todas estas cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice solo «por medio de un ave»; la identificación con el ave fénix pertenece al trasfondo tradicional, no al término explícito del texto.
    reason: source_note
lexical_decisions:
- source_word: δημιουργός
  english_pob_choice: Maker
  chosen_spanish: Hacedor
  alternatives_spanish:
  - Creador
  - Artífice
  lexicon: LSJ
  rationale: «Hacedor» conserva el tono elevado y agentivo del griego, como en la opción inglesa «Maker», sin forzar un término más técnico como «Creador» si el pasaje subraya al que produce y dispone todas las cosas.
- source_word: ἀνάστασιν ποιήσεται
  english_pob_choice: will bring about the resurrection
  chosen_spanish: realizará la resurrección
  alternatives_spanish:
  - hará la resurrección
  - llevará a cabo la resurrección
  lexicon: LSJ
  rationale: La construcción causativa se vierte con un verbo natural en español que conserve la agencia divina y el valor futuro, sin diluir la idea de resurrección como acto producido por Dios.
- source_word: ὁσίως
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - piadosamente
  - devotamente
  - de manera santa
  lexicon: LSJ
  rationale: «En santidad» reproduce el sentido ético-cultual del adverbio y mantiene la sencillez del original.
- source_word: δουλευσάντων
  english_pob_choice: have served
  chosen_spanish: han servido
  alternatives_spanish:
  - han sido esclavos de
  - han rendido servicio a
  lexicon: LSJ
  rationale: Aquí el énfasis está en el servicio reverente a Dios, no en el estatus social; por eso «han servido» sigue la decisión auditada del inglés sin introducir dureza innecesaria.
- source_word: ἐν πεποιθήσει πίστεως ἀγαθῆς
  english_pob_choice: in the confidence of good faith
  chosen_spanish: con la confianza de una fe buena
  alternatives_spanish:
  - con la seguridad de una buena fe
  - en la confianza de una fe buena
  lexicon: LSJ
  rationale: Se conserva la doble capa semántica de πεποίθησις y πίστις con una solución española que suena natural, aunque menos idiomática que otras opciones, para no perder la reiteración del griego.
- source_word: δι᾿ ὀρνέου
  english_pob_choice: through a bird
  chosen_spanish: por medio de un ave
  alternatives_spanish:
  - a través de un ave
  - por medio de un pájaro
  lexicon: LSJ
  rationale: «Ave» mantiene el referente indefinido del griego y evita precisar más de lo que el texto dice; la formulación «por medio de» deja claro el valor instrumental.
- source_word: τὸ μεγαλεῖον
  english_pob_choice: the greatness
  chosen_spanish: la grandeza
  alternatives_spanish:
  - la majestad
  - la magnificencia
  lexicon: LSJ
  rationale: «Grandeza» es la equivalencia más directa y adecuada para el sustantivo, en paralelo con el inglés auditado.
- source_word: ἐπαγγελίας
  english_pob_choice: promise
  chosen_spanish: promesa
  alternatives_spanish:
  - promesa jurada
  - compromiso
  lexicon: LSJ
  rationale: «Promesa» conserva la resonancia bíblica y el valor confiable del término sin añadir matices no presentes en el griego.
- source_word: ἐξομολογήσομαί
  english_pob_choice: I will give thanks
  chosen_spanish: te daré gracias
  alternatives_spanish:
  - te confesaré
  - te alabaré abiertamente
  lexicon: LSJ
  rationale: En una cita salmódica, el verbo se entiende como acción de agradecimiento/praza dirigida a Dios; «daré gracias» reproduce bien esa lectura litúrgica.
- source_word: ἐξηγέρθην
  english_pob_choice: I awoke
  chosen_spanish: desperté
  alternatives_spanish:
  - fui levantado
  - me levanté
  lexicon: LSJ
  rationale: La imagen inmediata es la de salir del sueño; «desperté» preserva ese sentido y, por el contexto, funciona como figura de resurrección.
- source_word: σάρκα
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  lexicon: LSJ
  rationale: Se mantiene la elección del proyecto para σάρξ en contextos literales, preservando la concreción material del argumento sobre la resurrección corporal.
- source_word: ἀναντλήσασαν
  english_pob_choice: has endured
  chosen_spanish: ha soportado
  alternatives_spanish:
  - ha sufrido
  - ha resistido
  lexicon: LSJ
  rationale: El participio raro apunta a haber pasado por cargas o pruebas; «ha soportado» expresa esa idea con claridad sin sobreinterpretar el detalle léxico.
theological_decisions:
- issue: Agency of God in resurrection
  english_pob_reading: will bring about the resurrection
  chosen_spanish_reading: realizará la resurrección
  alternative_spanish_readings:
  - hará la resurrección
  - levantará a los muertos
  rationale: La formulación española mantiene explícita la acción divina y evita reducir la resurrección a una mera metáfora o a una pasiva impersonal.
  doctrine_reference: DOCTRINE.md Translation philosophy 1, 5
- issue: Allusion through a bird / phoenix tradition
  english_pob_reading: through a bird
  chosen_spanish_reading: por medio de un ave
  alternative_spanish_readings:
  - a través de un ave
  - por medio del ave
  rationale: El griego no nombra el ave; la traducción conserva esa reserva y deja la identificación tradicional para la nota, sin imponerla en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy 1, 3
- issue: σάρξ in the Job citation
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - cuerpo
  - naturaleza humana
  rationale: «Carne» preserva la materialidad del argumento y la tensión bíblica sobre la resurrección corporal; «cuerpo» suavizaría esa fuerza y «naturaleza humana» iría más allá del texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustanciales; el pasaje mantiene alta concordancia con el audit trail inglés y no requiere ajustes adicionales de sentido.
  spanish_consistency_notes:
  - Se mantiene «carne» para σάρξ en sentido literal, conforme al criterio del proyecto.
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí el pasaje habla de Dios de forma genérica, por lo que no se introduce el tetragrámaton.
  - Se conserva un registro bíblico-doxológico sin arcaísmos innecesarios, pero con sintaxis suficientemente solemne para lectura eclesial.
