  language: en
  yaml_path: translation/extra_canonical/1_clement/026/001.yaml
  text: Therefore, do we consider it a great and marvelous thing if the Maker of all things will bring about the resurrection of those who have served him in holiness, in the confidence of good faith, when even through a bird he shows us the greatness of his promise? 2. For somewhere he says, “And you will raise me up, and I will give thanks to you”; and, “I lay down and slept; I awoke, because you are with me.” 3. And again, Job says, “And you will raise up this flesh of mine, which has endured all these things.”
