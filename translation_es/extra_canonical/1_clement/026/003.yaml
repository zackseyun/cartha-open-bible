lexical_decisions:
- source_word: καὶ πάλιν
  english_pob_choice: And again
  chosen_spanish: Y de nuevo
  alternatives_spanish:
  - Y otra vez
  - Y nuevamente
  lexicon: καὶ πάλιν
  rationale: Expresa la repetición del testimonio de manera natural en español y conserva la función discursiva del griego sin añadir matiz interpretativo.
- source_word: Ἰὼβ
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - Iob
  lexicon: Ἰὼβ
  rationale: Se usa la forma bíblica habitual en español para el personaje, siguiendo el criterio de la revisión inglesa que prefirió 'Job' sobre una transliteración cruda.
- source_word: ἀναστήσεις
  english_pob_choice: you will raise up
  chosen_spanish: levantarás
  alternatives_spanish:
  - resucitarás
  - alzarás
  lexicon: ἀναστήσεις
  rationale: En este contexto, el verbo puede traducirse de modo amplio como 'levantarás'; evita forzar de entrada una lectura más técnica de resurrección si el contexto no la explicita por sí mismo.
- source_word: τὴν σάρκα μου ταύτην
  english_pob_choice: this flesh of mine
  chosen_spanish: esta carne mía
  alternatives_spanish:
  - mi carne esta
  - este cuerpo mío
  lexicon: σάρξ
  rationale: '''carne'' mantiene la fuerza concreta del griego σάρξ, y el posesivo pospuesto suena natural en español sin perder la cercanía del original.'
- source_word: τὴν ἀναντλήσασαν ταῦτα πάντα
  english_pob_choice: which has borne all these things
  chosen_spanish: la cual ha soportado todas estas cosas
  alternatives_spanish:
  - que ha llevado todas estas cosas
  - que ha aguantado todo esto
  lexicon: ἀναντλήσασαν
  rationale: '''ha soportado'' reproduce bien la idea de cargar/sufrir/sostener implicada por el participio, en un español digno y claro; ''ha borne'' en inglés POB pide un equivalente no demasiado interpretativo pero tampoco arcaico.'
theological_decisions:
- issue: Sentido de 'levantarás' en relación con la carne
  english_pob_reading: And you will raise up this flesh of mine
  chosen_spanish_reading: Y levantarás esta carne mía
  alternative_spanish_readings:
  - Y resucitarás esta carne mía
  - Y alzarás esta carne mía
  rationale: El griego permite una referencia fuerte a restauración o resurrección, pero la formulación directa 'levantarás' conserva la amplitud semántica sin decidir prematuramente el matiz teológico.
  doctrine_reference: Resurrección/restauración del cuerpo; lenguaje bíblico de levantamiento corporal
- issue: Identidad de la carne como realidad sufriente
  english_pob_reading: this flesh of mine, which has borne all these things
  chosen_spanish_reading: esta carne mía, la cual ha soportado todas estas cosas
  alternative_spanish_readings:
  - este cuerpo mío, que ha sufrido todo esto
  - mi carne, que ha pasado por todo esto
  rationale: Se mantiene la referencia concreta a 'carne' para no suavizar el lenguaje antropológico del texto ni sustituirlo por una paráfrasis más abstracta.
  doctrine_reference: Antropología bíblica; sufrimiento corporal y continuidad personal
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó 'has endured' a 'has borne' para acercarse más al participio griego, y normalizó el nombre a 'Job'. La versión española sigue esa decisión nominal y refleja el matiz de carga/soporte con 'ha soportado', sin borrar la posibilidad de sufrimiento implícita.
  spanish_consistency_notes:
  - Se mantiene 'carne' para σάρξ, en línea con la terminología POB y con el registro concreto del texto.
  - '''Job'' se escribe con la forma española estándar; la nota conserva la alternativa transliterada del audit trail.'
  - No se añade mayúscula a 'carne' porque no se trata del Espíritu Santo ni de un nombre propio.
  - La sintaxis mantiene una cadencia formal y bíblica, sin calcos innecesarios del inglés.
