translation:
  language: es
  text: 'Porque en algún lugar dice: «Y me levantarás, y te daré gracias»; y: «Me acosté y dormí; desperté, porque tú estás conmigo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγει γάρ που
  english_pob_choice: For somewhere he says
  chosen_spanish: Porque en algún lugar dice
  alternatives_spanish:
  - Pues en alguna parte dice
  - Porque dice en algún lugar
  lexicon: λέγω; που
  rationale: Conserva la referencia indefinida de που con «en algún lugar», como en la traducción inglesa, sin forzar una cita exacta. «Porque» reproduce el valor causal/explicativo de γάρ en este contexto de introducción de cita.
- source_word: ἐξαναστήσεις με
  english_pob_choice: you will raise me up
  chosen_spanish: me levantarás
  alternatives_spanish:
  - me resucitarás
  - me alzarás
  lexicon: ἐξαναστήσεις
  rationale: La forma verbal admite la idea de levantar/poner en pie; «me levantarás» mantiene la imagen verbal amplia que deja abierta la fuerza contextual sin añadir de modo explícito una lectura doctrinal más específica que la del texto citado.
- source_word: ἐξομολογήσομαί σοι
  english_pob_choice: I will give thanks to you
  chosen_spanish: te daré gracias
  alternatives_spanish:
  - te confesaré
  - te alabaré
  lexicon: ἐξομολογήσομαι
  rationale: En este contexto de cita de salmo, la expresión se traduce como acción de gratitud. «Te daré gracias» preserva el valor contextual que la edición inglesa ya adoptó.
- source_word: Ἐκοιμήθην καὶ ὕπνωσα, ἐξηγέρθην
  english_pob_choice: I lay down and slept; I awoke
  chosen_spanish: Me acosté y dormí; desperté
  alternatives_spanish:
  - Me eché y dormí; me desperté
  - Me dormí y desperté
  lexicon: κοιμάομαι; ὑπνόω; ἐγείρω
  rationale: La secuencia griega expresa acostarse/dormir y luego despertar. «Me acosté y dormí; desperté» sigue de cerca la progresión verbal sin añadir elementos ajenos.
- source_word: ὅτι σὺ μετ᾿ ἐμοῦ εἶ
  english_pob_choice: because you are with me
  chosen_spanish: porque tú estás conmigo
  alternatives_spanish:
  - porque tú estás con yo
  - pues tú estás conmigo
  lexicon: μετά + gen.; εἰμί
  rationale: «Estás conmigo» reproduce el sentido relacional natural en español y conserva el contraste causal de ὅτι. No se introduce una formulación más litúrgica que oscurezca la sencillez del hebraísmo/grecismo.
theological_decisions:
- issue: Tipo de “raise up” en la cita
  english_pob_reading: you will raise me up
  chosen_spanish_reading: me levantarás
  alternative_spanish_readings:
  - me resucitarás
  - me alzarás
  rationale: El texto griego citado en 1 Clement no explicita aquí una terminología doctrinal precisa de resurrección; la forma española mantiene la amplitud semántica sin cerrar prematuramente la interpretación.
  doctrine_reference: Resurrección / restauración
- issue: Valor de ἐξομολογέομαι en contexto de salmo
  english_pob_reading: I will give thanks to you
  chosen_spanish_reading: te daré gracias
  alternative_spanish_readings:
  - te confesaré
  - te alabaré
  rationale: En este entorno bíblico la acción es doxológica y de gratitud; «dar gracias» evita cargar el verbo con un matiz confesional que el contexto inmediato no exige.
  doctrine_reference: Acción de gracias / alabanza
translation_notes:
  revision_awareness: The latest audit pass reported no changes needed and high agreement with the source; the Spanish draft follows that stable reading closely, preserving the indefinite citation formula, the sleep/wake sequence, and the causal clause.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto solo cuando aparezca el nombre divino; aquí no aparece, por lo que no se aplica.
  - Se evitó «Cristo» porque no hay Χριστός ni equivalente en este versículo.
  - Se conservó un registro bíblico sobrio, sin arcaísmos innecesarios, pero con sintaxis natural en español.
  - No se añadieron notas al pie porque el griego y la traducción inglesa no mostraron variantes textuales o alternativas que exigieran anclaje en el texto.
