translation:
  language: es
  text: Y Dios miró con agrado a Abel y a sus ofrendas, pero a Caín y a sus sacrificios[a] no les prestó atención.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero sobre Caín y sobre sus sacrificios no puso atención».'
    reason: Preserva en español la alternativa documentada en el audit trail inglés para la segunda cláusula, anclada en el lugar correcto.
lexical_decisions:
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Yahvé
  lexicon: θεός
  rationale: El griego tiene θεός sin artículo en una construcción narrativa normal; en español, «Dios» comunica de forma natural y fiel. No se introduce «Yahvé» porque el texto fuente dice θεός y no el nombre divino.
- source_word: εἶδεν ἐπὶ
  english_pob_choice: looked upon
  chosen_spanish: miró a
  alternatives_spanish:
  - miró sobre
  - vio a
  - se fijó en
  lexicon: ὁράω
  rationale: El verbo aquí expresa observar/considerar favorablemente en contexto narrativo. «Miró a» conserva la imagen y suena natural en español; «vio a» perdería el matiz relacional y «se fijó en» sería más interpretativo.
- source_word: δῶρα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - ofrendas
  - regalos
  lexicon: δῶρον
  rationale: Aunque «gifts» puede traducirse como «regalos», el contexto sacrificial de Génesis y la construcción paralela con θυσίαι favorecen «dones» como término más amplio y reverente, manteniendo la tensión entre don y ofrenda.
- source_word: θυσίαις
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas
  - sacrificios rituales
  lexicon: θυσία
  rationale: «Sacrificios» es la correspondencia directa y conserva el lenguaje cultual del pasaje. «Ofrendas» suavizaría la fuerza sacrificial del término.
- source_word: οὐ προσέσχεν
  english_pob_choice: he paid no heed
  chosen_spanish: no les prestó atención
  alternatives_spanish:
  - no hizo caso
  - no les hizo caso
  - no les prestó oído
  lexicon: προσέχω
  rationale: El audit trail inglés corrigió el giro para reflejar mejor προσέχω como «prestar atención / dar heed». En español, «no les prestó atención» reproduce con claridad el valor de desatender o no considerar favorablemente.
theological_decisions:
- issue: La conducta divina frente a Abel y Caín en una cita veterotestamentaria
  english_pob_reading: And God looked upon Abel and upon his gifts, but to Cain and to his sacrifices he paid no heed.
  chosen_spanish_reading: Y Dios miró a Abel y a sus dones, pero a Caín y a sus sacrificios no les prestó atención.
  alternative_spanish_readings:
  - Y Dios miró a Abel y a sus dones, pero a Caín y a sus sacrificios no hizo caso.
  - Y Dios se fijó en Abel y en sus dones, pero a Caín y a sus sacrificios no les hizo caso.
  rationale: 'La frase conserva la asimetría del texto griego: una mirada favorable hacia Abel y una falta de atención hacia Caín y su sacrificio. No se suaviza la diferencia ni se agrega explicación interpretativa sobre mérito o rechazo, porque el texto no la explicita aquí.'
  doctrine_reference: Génesis 4:4-5; Hebreos 11:4
- issue: Relación entre 'dones' y 'sacrificios'
  english_pob_reading: his gifts ... his sacrifices
  chosen_spanish_reading: sus dones ... sus sacrificios
  alternative_spanish_readings:
  - sus ofrendas ... sus sacrificios
  - sus regalos ... sus sacrificios
  rationale: Se mantiene la distinción léxica del griego entre δῶρα y θυσίαι, preservando el paralelismo sin fusionar ambos términos. «Dones» permite una amplitud semántica útil y no reduce el primer elemento a un tecnicismo sacrificial inexistente en el griego.
  doctrine_reference: LXX/Génesis 4:4-5
translation_notes:
  revision_awareness: 'El texto inglés fue revisado en el audit trail para evitar el calco poco natural «did not pay attention upon» y sustituirlo por «paid no heed». La versión española sigue esa decisión con una construcción idiomática equivalente: «no les prestó atención». No se detectaron cambios posteriores en la última pasada de revisión.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, sin sustituirlo por una convención de máscara como «SEÑOR».
  - Se conserva el paralelismo nominal «Abel / Caín» y «sus dones / sus sacrificios» para reflejar la asimetría del original.
  - El verbo principal en español usa un régimen natural con objeto indirecto («les prestó atención») para reflejar προσέσχεν sin forzar la sintaxis.
