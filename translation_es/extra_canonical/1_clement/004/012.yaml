review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: ζῆλος como causa, descenso vivo al Hades, rebelión contra Moisés, y θεράπων τοῦ θεοῦ como título honorífico. Sin embargo, la nota al pie propuesta no preserva fielmente la alternativa inglesa auditada, y «atendiente» no es una opción natural ni adecuada en español e incluso desdibuja la decisión teológica ya documentada.'
  spanish_quality_summary: 'El texto principal es claro y legible en español eclesial neutral. «La envidia hizo bajar vivos a Datán y Abirón al Hades» suena algo más mecánico que «hizo descender», pero sigue siendo aceptable. El problema principal de calidad está en la nota: «atendiente» es poco idiomático y torpe. Conviene reemplazarla por una alternativa natural que refleje el matiz de ‘attendant’ sin introducir una forma extraña.'
  glossary_alignment: No hay conflicto con los términos base del proyecto. «Hades» se mantiene correctamente. «Siervo de Dios» concuerda con la revisión teológica documentada para θεράπων. Los nombres propios están bien. La excepción necesaria es corregir la nota alternativa para que no contradiga ni debilite la rationale auditada.
  issues:
  - severity: medium
    issue: La nota al pie usa «atendiente de Dios».
    rationale: La alternativa inglesa era “attendant of God”, pero en español «atendiente» no es una forma natural ni digna en este registro. Además, la rationale auditada ya determinó que el texto principal debe conservar el título honorífico «siervo de Dios»; si se mantiene una nota alternativa, debe expresarse en español idiomático, por ejemplo «servidor de Dios», no con una forma extraña.
  - severity: low
    issue: La nota no reproduce con precisión la estructura de la alternativa inglesa.
    rationale: 'El inglés dice “Or ''Moses, the attendant of God.''”. En español conviene mantener la aposición completa: «O “Moisés, el servidor de Dios”», no solo una frase nominal aislada menos clara.'
  revised_spanish_text: La envidia hizo bajar vivos a Datán y Abirón al Hades, porque se rebelaron contra Moisés[a], el siervo de Dios.
  revised_footnotes:
  - marker: a
    text: O «Moisés, el servidor de Dios».
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel al griego y a la decisión auditada sobre θεράπων como título honorífico. Solo se corrige la nota al pie para usar un español natural y digno, y para reflejar mejor la alternativa inglesa previa sin introducir el poco idiomático «atendiente».
