base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/004/012.yaml
  text: Jealousy brought Dathan and Abiram down alive into Hades because they rebelled against Moses[a], the servant of God.
  footnotes:
  - marker: a
    text: Or 'Moses, the attendant of God.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:34Z'
    unchanged: false
    changes_summary: Reordered the final phrase to more natural English while preserving the Greek sense; retained 'Jealousy,' 'alive,' and 'Hades' as accurate renderings.
translation:
  language: es
  text: La envidia hizo bajar vivos a Datán y Abirón al Hades, porque se rebelaron contra Moisés[a], el siervo de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Moisés, el atendiente de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ζῆλος
  english_pob_choice: Jealousy
  chosen_spanish: la envidia
  alternatives_spanish:
  - los celos
  - la celotipia
  lexicon: ζῆλος
  rationale: En este contexto narrativo, ζῆλος expresa la pasión rival que impulsa la rebelión; en español, «envidia» comunica mejor esa fuerza hostil que «celos», que suele sonar más relacional o sentimental. Se mantiene el sustantivo abstracto para conservar el efecto causal del griego.
- source_word: ζῶντας κατήγαγεν εἰς ᾅδου
  english_pob_choice: brought ... down alive into Hades
  chosen_spanish: hizo bajar vivos ... al Hades
  alternatives_spanish:
  - los hizo descender vivos al Hades
  - los llevó vivos al Hades
  lexicon: ζῶντας / κατήγαγεν / ᾅδης
  rationale: «Hizo bajar» reproduce el movimiento descendente del verbo y «vivos» conserva ζῶντας de manera directa. Se conserva «Hades» como equivalente auditado del inglés POB, sin sustituirlo por un término interpretativo como «sepulcro» o «infierno».
- source_word: διὰ τὸ στασιάσαι αὐτοὺς πρὸς
  english_pob_choice: because they rebelled against
  chosen_spanish: porque se rebelaron contra
  alternatives_spanish:
  - porque se alzaron contra
  - porque se sublevaron contra
  lexicon: στασιάζω
  rationale: El verbo expresa insurrección o facción contra autoridad. «Rebelaron contra» es claro, idiomático y preserva el peso político-relacional del griego sin suavizarlo.
- source_word: θεράποντα τοῦ θεοῦ
  english_pob_choice: the servant of God
  chosen_spanish: el siervo de Dios
  alternatives_spanish:
  - el servidor de Dios
  - el atendiente de Dios
  lexicon: θεράπων
  rationale: El audit trail inglés revisó «attendant» por «servant of God» para recuperar el valor honorífico bíblico de θεράπων. En español, «siervo de Dios» conserva mejor ese registro y evita una palabra demasiado técnica o extraña como «atendente/atendiente».
- source_word: Μωυσῆν
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés,
  - 'Moisés:'
  lexicon: Μωυσῆς
  rationale: Se mantiene el nombre propio sin marcación especial; en español la aposición final fluye naturalmente después del objeto de la rebelión.
theological_decisions:
- issue: 'Título de honor aplicado a Moisés: θεράπων τοῦ θεοῦ'
  english_pob_reading: the servant of God, Moses
  chosen_spanish_reading: Moisés, el siervo de Dios
  alternative_spanish_readings:
  - Moisés, el atendiente de Dios
  - Moisés, el servidor de Dios
  rationale: La revisión inglesa subrayó que θεράπων en la tradición de Moisés tiene peso honorífico y eco bíblico. «Siervo de Dios» mantiene esa dignidad y refleja mejor el trasfondo de Num 12:7 y Heb 3:5 que una traducción más débil o meramente funcional.
  doctrine_reference: Números 12:7; Hebreos 3:5
translation_notes:
  revision_awareness: La versión inglesa pasó de «the attendant of God» a «the servant of God» y luego reordenó la aposición a «Moses, the servant of God». La presente traducción sigue esa lectura revisada, conservando el valor honorífico de θεράπων y el orden natural español.
  spanish_consistency_notes:
  - Se conservan «Hades» y no se sustituye por equivalentes doctrinalmente cargados.
  - Se prefiere «siervo de Dios» como fórmula de honor para θεράπων, coherente con la revisión auditada.
  - «Envidia» se usa aquí por la fuerza causal hostil del sustantivo griego; no se emplea como juicio moral general ajeno al contexto.
  - La puntuación reproduce una sola cláusula causal, en estilo bíblico claro y publicable.
