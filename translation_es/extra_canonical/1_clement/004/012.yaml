  text: ζῆλος Δαθὰν καὶ Ἀβειρὼν ζῶντας κατήγαγεν εἰς ᾅδου διὰ τὸ στασιάσαι αὐτοὺς πρὸς τὸν θεράποντα τοῦ θεοῦ Μωυσῆν.
