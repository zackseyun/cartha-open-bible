translation:
  language: es
  text: A causa de los celos, Aarón y Miriam acamparon fuera del campamento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ ζῆλος
  english_pob_choice: Because of jealousy
  chosen_spanish: A causa de los celos
  alternatives_spanish:
  - Por los celos
  - Debido a los celos
  lexicon: διὰ + acusativo; ζῆλος
  rationale: Conservo la relación causal explícita del griego con una expresión natural en español. «Celos» reproduce la carga afectiva y conflictiva de ζῆλος en este contexto, coherente con la elección inglesa de «jealousy».
- source_word: ἔξω τῆς παρεμβολῆς
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - al exterior del campamento
  lexicon: ἔξω + genitivo; παρεμβολή
  rationale: «Fuera del campamento» es la equivalencia idiomática más clara y fiel en español. Mantiene el valor locativo sin sobretraducir la imagen del campamento.
- source_word: ηὐλίσθησαν
  english_pob_choice: lodged
  chosen_spanish: acamparon
  alternatives_spanish:
  - pasaron la noche
  - se alojaron
  lexicon: αὐλίζομαι
  rationale: El verbo griego indica pernoctar o pasar la noche en un lugar. «Acamparon» comunica de forma directa la permanencia nocturna y conserva mejor la imagen concreta que «se alojaron».
- source_word: Ἀαρὼν καὶ Μαριὰμ
  english_pob_choice: Aaron and Miriam
  chosen_spanish: Aarón y Miriam
  alternatives_spanish:
  - Aaron y Miriam
  lexicon: Ἀαρών; Μαριάμ
  rationale: Nombres propios bíblicos usualmente se conservan en su forma española estándar. «Miriam» preserva la forma más cercana al hebreo/griego y es inteligible en español bíblico.
theological_decisions:
- issue: La frase causal expresa motivo de exclusión o apartamiento, no simplemente emoción interna.
  english_pob_reading: Because of jealousy Aaron and Miriam lodged outside the camp.
  chosen_spanish_reading: A causa de los celos, Aarón y Miriam acamparon fuera del campamento.
  alternative_spanish_readings:
  - Por los celos, Aarón y Miriam se alojaron fuera del campamento.
  - Debido a los celos, Aarón y Miriam pasaron la noche fuera del campamento.
  rationale: Mantengo el vínculo entre el celo/los celos y la situación resultante, sin añadir detalles narrativos ausentes en el texto. La redacción española conserva la causalidad y la localización externa al campamento tal como lo hace la versión inglesa auditada.
  doctrine_reference: No doctrinal issue; contextual narrative statement.
translation_notes:
  revision_awareness: El contexto auditado muestra alto acuerdo y ningún cambio necesario en la revisión más reciente; por ello, la versión española sigue de cerca el sentido del griego y la traducción inglesa aprobada, sin introducir notas textuales o variantes.
  spanish_consistency_notes:
  - Se conserva el orden natural del español sin alterar el contenido causal.
  - «Campamento» traduce de manera consistente παρεμβολή en contexto de comunidad en marcha.
  - No se introduce terminología eclesiástica o doctrinal ajena al pasaje.
