review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: ζῆλος como causa hostil, la huida de Moisés de la presencia de Faraón, la procedencia de la objeción de un ὁμόφυλος, la doble formulación jurídica κριτήν ἢ δικαστήν, y la referencia al egipcio muerto el día anterior. Sin embargo, «envidia» no es la mejor equivalencia para ζῆλος aquí; en este contexto de 1 Clemente, el patrón reiterado es «celos/jealousy» como pasión rival y hostil, no «envy» en sentido más estrecho. Además, la nota [a] sobre «de la presencia de» no preserva una alternativa significativa del original ni del audit trail inglés; resulta innecesaria y algo intrusiva.'
  spanish_quality_summary: El español es claro, digno y generalmente natural. «De la presencia de Faraón, rey de Egipto» funciona bien, y «juez o magistrado» respeta la revisión inglesa documentada. La principal mejora estilística y semántica es cambiar «envidia» por «celos», que encaja mejor con el uso de ζῆλος en la cadena retórica del pasaje y con el registro eclesial. También conviene suprimir la nota lexical sobre «presencia», porque el texto principal ya está bien resuelto y la nota no aporta una alternativa necesaria para el lector español.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión clave es léxica: ζῆλος debe renderizarse mejor como «celos» que como «envidia» para alinearse con el English POB («Jealousy») y con el uso contextual en 1 Clemente. La conservación de «juez o magistrado» está correctamente alineada con el audit trail y evita armonizar con Éxodo.'
  issues:
  - severity: medium
    issue: ζῆλος traducido como «envidia»
    rationale: El English POB fijó «Jealousy», y en 1 Clemente ζῆλος funciona como pasión de rivalidad/celos hostiles. «Envidia» estrecha indebidamente el campo semántico y puede desalinearse con la cadena temática del contexto.
  - severity: low
    issue: Nota [a] innecesaria sobre «de la presencia de»
    rationale: El español principal ya expresa bien ἀπὸ προσώπου. La nota no preserva una variante relevante del POB ni resuelve una ambigüedad real en español; añade ruido más que claridad.
  revised_spanish_text: 'Los celos obligaron a Moisés a huir de la presencia de Faraón, rey de Egipto, al oír de su compatriota: «¿Quién te ha puesto como juez o magistrado sobre nosotros? ¿Quieres matarme, como mataste ayer al egipcio?»'
  revision_rationale: Se reemplaza «envidia» por «celos» para reflejar con más precisión ζῆλος y alinearse con «Jealousy» del POB inglés y con el uso contextual en 1 Clemente. Se elimina la nota [a] porque no conserva una alternativa significativa ni es necesaria para la claridad del español. El resto del texto se mantiene por ser fiel, natural y terminológicamente sólido.
