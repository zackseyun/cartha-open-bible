id: 1CLEM.4.10
reference: 1 Clement 4:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ζῆλος φυγεῖν ἠνάγκασεν Μωυσῆν ἀπὸ προσώπου Φαραὼ βασιλέως Αἰγύπτου ἐν τῷ ἀκοῦσαι αὐτὸν ἀπὸ τοῦ ὁμοφύλου· Τίς σε κατέστησεν κριτὴν ἢ δικαστὴν ἐφʼ ἡμῶν; μὴ ἀνελεῖν με σὺ θέλεις, ὃν τρόπον ἀνεῖλες ἐχθὲς τὸν Αἰγύπτιον;
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/004/010.yaml
  text: Jealousy compelled Moses to flee from the presence of Pharaoh king of Egypt[a], when he heard from his fellow tribesman, ‘Who appointed you judge or magistrate over us? Do you want to kill me, as you killed the Egyptian yesterday?’
  footnotes:
  - marker: a
    text: Or 'ruler or judge'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:32Z'
    unchanged: false
    changes_summary: Changed ‘from the face of Pharaoh’ to the more natural formal English ‘from the presence of Pharaoh.’
translation:
  language: es
  text: 'La envidia obligó a Moisés a huir de la presencia de Faraón, rey de Egipto[a], al oír de su compatriota: «¿Quién te ha puesto como juez o magistrado sobre nosotros? ¿Quieres matarme, como mataste ayer al egipcio?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de»; el griego dice literalmente «de la presencia de».
    reason: lexical_alternative
lexical_decisions:
- source_word: ζῆλος
  english_pob_choice: Jealousy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  - zelo
  lexicon: ζῆλος
  rationale: En este contexto narrativo la palabra describe el impulso hostil que lleva a Moisés a huir; en español, «envidia» comunica mejor esa fuerza afectiva que «celos», mientras que «zelo» sería más técnico y menos natural para lectura pública. Mantiene la tensión semántica sin suavizarla.
- source_word: φυγεῖν ἠνάγκασεν
  english_pob_choice: compelled ... to flee
  chosen_spanish: obligó ... a huir
  alternatives_spanish:
  - forzó ... a huir
  - lo impulsó a huir
  lexicon: ἀναγκάζω
  rationale: «Obligó» preserva la idea de constricción causal sin añadir matices más intensos de violencia que el griego no exige. Es fluido en español y conserva el valor de necesidad causada.
- source_word: ἀπὸ προσώπου
  english_pob_choice: from the presence of
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de delante de
  - de la vista de
  lexicon: πρόσωπον
  rationale: El audit trail inglés ya corrigió la lectura literal torpe «from the face of» hacia «from the presence of». En español, «de la presencia de» es la equivalencia natural y formal; evita calco y mantiene el sentido relacional.
- source_word: Φαραὼ βασιλέως Αἰγύπτου
  english_pob_choice: Pharaoh king of Egypt
  chosen_spanish: Faraón, rey de Egipto
  alternatives_spanish:
  - Faraón, rey egipcio
  lexicon: Φαραώ / βασιλεύς / Αἴγυπτος
  rationale: Se conserva el nombre-título «Faraón» y la aposición «rey de Egipto» para reflejar el griego y el estilo del POB inglés. La estructura es idiomática en español y no pierde la referencia política.
- source_word: ἀπὸ τοῦ ὁμοφύλου
  english_pob_choice: from his fellow tribesman
  chosen_spanish: de su compatriota
  alternatives_spanish:
  - de su mismo pueblo
  - de su tribu
  lexicon: ὁμόφυλος
  rationale: «Compatriota» transmite la relación de pertenencia al mismo grupo étnico/pueblo sin forzar una precisión tribal que el término griego puede admitir. «Mismo pueblo» es posible, pero menos compacto; «tribu» sería demasiado restrictivo.
- source_word: Τίς σε κατέστησεν κριτὴν ἢ δικαστὴν ἐφʼ ἡμῶν;
  english_pob_choice: Who appointed you judge or magistrate over us?
  chosen_spanish: ¿Quién te ha puesto como juez o magistrado sobre nosotros?
  alternatives_spanish:
  - ¿Quién te puso como juez o magistrado sobre nosotros?
  - ¿Quién te ha nombrado juez o magistrado sobre nosotros?
  lexicon: καθίστημι / κριτής / δικαστής
  rationale: 'Se mantiene la doble designación jurídica del texto de Clemente: «juez o magistrado». «Puesto» refleja bien «appointed» y resulta natural en español bíblico contemporáneo; «nombrado» también sería viable, pero «puesto» conserva mejor la idea de establecer en una función.'
- source_word: μὴ ἀνελεῖν με σὺ θέλεις
  english_pob_choice: Do you want to kill me
  chosen_spanish: ¿Quieres matarme?
  alternatives_spanish:
  - ¿Acaso quieres matarme?
  - ¿Pretendes matarme?
  lexicon: ἀναιρεῖν
  rationale: El verbo griego es claro en el sentido de matar/quitar la vida; «matarme» es la traducción directa y sobria. No se añade intensificación innecesaria.
- source_word: ὃν τρόπον ἀνεῖλες ἐχθὲς τὸν Αἰγύπτιον
  english_pob_choice: as you killed the Egyptian yesterday
  chosen_spanish: como mataste ayer al egipcio
  alternatives_spanish:
  - como mataste al egipcio ayer
  - del mismo modo que mataste ayer al egipcio
  lexicon: ὃν τρόπον / ἐχθές
  rationale: «Como» reproduce la comparación directa; «ayer» se coloca al final para un orden más natural en español sin alterar el contenido. Se mantiene «el egipcio» como identificador sustantivado, conforme al griego.
theological_decisions:
- issue: Relación con la cita tradicional de Éxodo 2:14 y la variante de Clemente
  english_pob_reading: Who appointed you judge or magistrate over us?
  chosen_spanish_reading: ¿Quién te ha puesto como juez o magistrado sobre nosotros?
  alternative_spanish_readings:
  - ¿Quién te puso como juez o magistrado sobre nosotros?
  - ¿Quién te ha nombrado juez o magistrado sobre nosotros?
  rationale: El texto de Clemente no reproduce exactamente la formulación más conocida de Éxodo en la LXX; usa dos términos jurídicos específicos, `κριτὴν ἢ δικαστὴν`. La versión española conserva esa diferencia para no armonizarla con la cita bíblica más familiar y así respetar la forma textual de Clemente.
  doctrine_reference: Crítica textual y fidelidad a la forma de la cita en 1 Clemente 4:10
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail inglés que corrigió la expresión literal «from the face of» a «from the presence of», y también la adjudicación que exige traducir `κριτὴν ἢ δικαστὴν` como «judge or magistrate» en vez de reinsertar la lectura de Éxodo «ruler». La versión española refleja ambas correcciones y no armoniza con la formulación lXX estándar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología de proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se conserva la dupla jurídica «juez o magistrado» para reflejar la variación interna del texto griego.
  - Se usa «Egipto» y «egipcio» de modo consistente con el antecedente histórico del relato.
  - El registro es sobrio y bíblico, sin arcaísmos innecesarios, pero sin perder la cadencia solemne requerida.
