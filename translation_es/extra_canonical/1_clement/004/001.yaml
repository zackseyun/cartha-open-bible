  text: Γέγραπται γὰρ οὕτως· Καὶ ἐγένετο μεθ' ἡμέρας, ἤνεγκεν Κάϊν ἀπὸ τῶν καρπῶν τῆς γῆς θυσίαν τῷ θεῷ, καὶ Ἄβελ ἤνεγκεν καὶ αὐτὸς ἀπὸ τῶν πρωτοτόκων τῶν προβάτων καὶ ἀπὸ τῶν στεάτων αὐτῶν. 2. καὶ εἶδεν ὁ θεὸς ἐπὶ Ἄβελ καὶ ἐπὶ τοῖς δώροις αὐτοῦ, ἐπὶ δὲ Κάϊν καὶ ἐπὶ ταῖς θυσίαις αὐτοῦ οὐ προσέσχεν. 3. καὶ ἐλυπήθη Κάϊν λίαν καὶ συνέπεσεν τῷ προσώπῳ αὐτοῦ. 4. καὶ εἶπεν ὁ θεὸς πρὸς Κάϊν· Ἱνατί περίλυπος ἐγένου, καὶ ἱνατί συνέπεσεν τὸ πρόσωπόν σου; οὐκ ἐὰν ὀρθῶς προσενέγκῃς, ὀρθῶς δὲ μὴ διέλῃς, ἥμαρτες; . ἡσύχασον· πρὸς δὲ ἡ ἀποστροφὴ αὐτοῦ, καὶ σὺ ἄρξεις αὐτοῦ. 6. καὶ εἶπεν Κάϊν πρὸς Ἄβελ τὸν ἀδελφὸν αὐτοῦ· Διέλθωμεν εἰς τὸ πεδίον. καὶ ἐγένετο ἐν τῷ εἶναι αὐτοὺς ἐν τῷ πεδίῳ, ἀνέστη Κάϊν ἐπʼ Ἄβελ τὸν ἀδελφὸν αὐτοῦ καὶ ἀπέκτεινεν αὐτόν. 7. ὁρᾶτε, ἀδελφοί, ζῆλος καὶ φθόνος ἀδελφοκτονίαν κατειργάσατο. 8. διὰ ζῆλος ὁ πατὴρ ἡμῶν Ἰακὼβ ἀπέδρα ἀπὸ προσώπου Ἠσαῦ τοῦ ἀδελφοῦ αὐτοῦ. 9. ζῆλος ἐποίησεν Ἰωσὴφ μέχρι θανάτου διωχθῆναι καὶ μέχρι δουλείας εἰσελθεῖν. 10. ζῆλος φυγεῖν ἠνάγκασεν Μωυσῆν ἀπὸ προσώπου
    Φαραὼ βασιλέως Αἰγύπτου ἐν τῷ ἀκοῦσαι αὐτὸν ἀπὸ τοῦ ὁμοφύλου· Τίς σε κατέστησεν κριτὴν ἢ δικαστὴν ἐφʼ ἡμῶν; μὴ ἀνελεῖν με σὺ θέλεις, ὃν τρόπον ἀνεῖλες ἐχθὲς τὸν Αἰγύπτιον; 11. διὰ ζῆλος Ἀαρὼν καὶ Μαριὰμ ἔξω τῆς παρεμβολῆς ηὐλίσθησαν. 12. ζῆλος Δαθὰν καὶ Ἀβειρὼν ζῶντας κατήγαγεν εἰς ᾅδου διὰ τὸ στασιάσαι αὐτοὺς πρὸς τὸν θεράποντα τοῦ θεοῦ Μωυσῆν. 13. διὰ ζῆλος Δαυὶδ φθόνον ἔσχεν οὐ μόνον ὑπὸ τῶν ἀλλοφύλων, ἀλλὰ καὶ ὑπὸ Σαοὺλ βασιλέως Ἰσραὴλ ἐδιώχθη.
