base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/004/001.yaml
  text: 'For it is written thus: “And it came to pass after some days that Cain brought from the fruits of the earth an offering to God, and Abel also brought from the firstborn of the sheep and from their fat portions. And God looked upon Abel and upon his gifts, but to Cain and to his sacrifices he paid no attention. And Cain was greatly grieved, and his face fell. And God said to Cain, ‘Why have you become deeply grieved, and why has your face fallen? If you offer rightly, but do not divide rightly, have you not sinned? Be still; his turning is toward you, and you shall rule over him.’ And Cain said to Abel his brother, ‘Let us go out into the field.’ And it came to pass, while they were in the field, Cain rose up against Abel his brother and killed him.” You see, brothers, jealousy and envy brought about brother-murder. Because of jealousy our father Jacob fled from the face of Esau his brother. Jealousy caused Joseph to be persecuted even to death and to come even into slavery. Jealousy
    compelled Moses to flee from the face of Pharaoh king of Egypt, when he heard from his fellow tribesman, ‘Who appointed you judge or magistrate over us? Do you want to kill me, as you killed the Egyptian yesterday?’ Because of jealousy Aaron and Miriam lodged outside the camp. Jealousy brought Dathan and Abiram down alive into Hades because they rebelled against Moses, the attendant of God. Because of jealousy David incurred envy not only from the foreigners, but was also persecuted by Saul king of Israel.'
