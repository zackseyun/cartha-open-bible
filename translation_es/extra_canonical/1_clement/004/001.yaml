translation:
  language: es
  text: 'Porque está escrito así: «Y sucedió que, después de algunos días, Caín llevó de los frutos de la tierra una ofrenda a Dios, y Abel también llevó de los primogénitos de las ovejas y de sus porciones de grasa. Y Dios miró a Abel y a sus dones, pero a Caín y a sus sacrificios no prestó atención. Y Caín se entristeció mucho, y decayó su rostro. Y Dios dijo a Caín: “¿Por qué te has entristecido profundamente, y por qué ha decaído tu rostro? Si ofreces rectamente, pero no divides rectamente, ¿no has pecado? Quédate quieto; su inclinación está hacia ti, y tú gobernarás sobre él”.» Y Caín dijo a Abel su hermano: «Salgamos al campo». Y sucedió que, mientras estaban en el campo, Caín se levantó contra Abel su hermano y lo mató. Ustedes ven, hermanos, que los celos y la envidia produjeron fratricidio. Por causa de los celos nuestro padre Jacob huyó de la presencia de Esaú su hermano. Los celos hicieron que José fuera perseguido hasta la muerte y llegara incluso a la esclavitud. Los celos obligaron
    a Moisés a huir de la presencia de Faraón, rey de Egipto, cuando oyó de su compatriota: «¿Quién te puso por juez o magistrado sobre nosotros? ¿Quieres matarme, como mataste ayer al egipcio?» Por causa de los celos Aarón y María se alojaron fuera del campamento. Los celos hicieron que Datán y Abiram descendieran vivos al Hades porque se rebelaron contra Moisés, el asistente de Dios. Por causa de los celos David incurrió en la envidia no solo de los extranjeros, sino que también fue perseguido por Saúl, rey de Israel.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θυσίαν
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - sacrificio
  - ofrecimiento
  lexicon: LSJ
  rationale: En el relato de Génesis, θυσία puede ser ‘sacrificio’, pero ‘ofrenda’ reproduce bien el acto de presentar frutos sin perder el sentido cultual.
- source_word: πρωτοτόκων
  english_pob_choice: firstborn
  chosen_spanish: primogénitos
  alternatives_spanish:
  - primeros nacidos
  - primicias
  lexicon: LSJ
  rationale: ‘Primogénitos’ es claro en español y conserva la prioridad sacrificial de la ofrenda de Abel.
- source_word: στεάτων
  english_pob_choice: fat portions
  chosen_spanish: porciones de grasa
  alternatives_spanish:
  - grasa
  - partes grasas
  lexicon: LSJ
  rationale: La expresión apunta a porciones concretas del sacrificio; ‘porciones de grasa’ es natural en español y precisa.
- source_word: δώροις
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - ofrendas
  - regalos
  lexicon: LSJ
  rationale: Mantiene la distinción entre los ‘dones’ de Abel y los ‘sacrificios’ de Caín, como en el audit trail inglés.
- source_word: οὐ προσέσχεν
  english_pob_choice: did not pay attention
  chosen_spanish: no prestó atención
  alternatives_spanish:
  - no miró con favor
  - no consideró
  lexicon: LSJ
  rationale: Expresa de forma idiomática la falta de consideración divina sin añadir interpretación ajena.
- source_word: ἐλυπήθη ... λίαν
  english_pob_choice: was greatly grieved
  chosen_spanish: se entristeció mucho
  alternatives_spanish:
  - se angustió mucho
  - quedó muy afligido
  lexicon: LSJ
  rationale: Preserva la intensidad de λίαν y el matiz afectivo de λύπη en español corriente y digno.
- source_word: συνέπεσεν τῷ προσώπῳ
  english_pob_choice: his face fell
  chosen_spanish: su rostro cayó
  alternatives_spanish:
  - se le cayó el rostro
  - su semblante cayó
  lexicon: LSJ
  rationale: Sigue de cerca la imagen del griego; aunque menos idiomática que en inglés, la construcción es comprensible y transparente.
- source_word: ὀρθῶς προσενέγκῃς
  english_pob_choice: offer rightly
  chosen_spanish: ofreces rectamente
  alternatives_spanish:
  - presentas rectamente
  - ofreces correctamente
  lexicon: LSJ
  rationale: Conserva la fuerza cultual y moral de ὀρθῶς con una forma natural en español.
- source_word: μὴ διέλῃς
  english_pob_choice: do not divide rightly
  chosen_spanish: no divides rectamente
  alternatives_spanish:
  - no repartes rectamente
  - no distingues rectamente
  lexicon: LSJ
  rationale: Se mantiene la ambigüedad difícil del griego sin resolverla interpretativamente; ‘divides’ reproduce el paralelismo formal.
- source_word: ἡσύχασον
  english_pob_choice: Be still
  chosen_spanish: Calla
  alternatives_spanish:
  - Guarda silencio
  - Estate quieto
  lexicon: LSJ
  rationale: En contexto funciona como una orden breve y enérgica; ‘Calla’ conserva concisión y fuerza.
- source_word: ἀποστροφὴ
  english_pob_choice: turning
  chosen_spanish: inclinación
  alternatives_spanish:
  - giro
  - vuelta
  - turno
  lexicon: LSJ
  rationale: La frase es difícil; ‘inclinación’ preserva la orientación relacional sin forzar una interpretación más estrecha de la que el texto permite.
- source_word: ἄρξεις
  english_pob_choice: you shall rule
  chosen_spanish: lo dominarás
  alternatives_spanish:
  - reinarás sobre él
  - gobernarás sobre él
  lexicon: LSJ
  rationale: En español, ‘dominar’ comunica bien el sentido de señorío/predominio del futuro griego en este contexto.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - zelos
  - emulación
  lexicon: BDAG
  rationale: En esta sección predomina el sentido vicioso e interpersonal; ‘celos’ es la opción más natural y fiel para el lector español.
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  - rencor
  lexicon: BDAG
  rationale: ‘Envidia’ distingue bien este término del ζῆλος anterior y preserva la pareja retórica del texto.
- source_word: ἀδελφοκτονίαν
  english_pob_choice: brother-murder
  chosen_spanish: hermano-muerte
  alternatives_spanish:
  - fratricidio
  - muerte de un hermano
  lexicon: LSJ
  rationale: Se busca conservar el impacto del compuesto con una forma transparente en español, sin convertirlo en un tecnicismo latinizante.
- source_word: ἀπὸ προσώπου
  english_pob_choice: from the face of
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de delante de
  - de la faz de
  lexicon: LSJ
  rationale: La expresión hebraica se vierte en español bíblico claro; ‘presencia’ comunica el sentido relacional sin sonar artificial.
- source_word: ὁμοφύλου
  english_pob_choice: fellow tribesman
  chosen_spanish: compatriota
  alternatives_spanish:
  - pariente
  - hombre de su mismo pueblo
  lexicon: LSJ
  rationale: ‘Compatriota’ recoge la idea de pertenencia al mismo pueblo o grupo sin cargarla con un matiz étnico demasiado estrecho.
- source_word: ηὐλίσθησαν
  english_pob_choice: lodged
  chosen_spanish: acamparon
  alternatives_spanish:
  - se alojaron
  - se hospedaron
  lexicon: LSJ
  rationale: En el contexto del campamento, ‘acamparon’ comunica bien la idea de quedar fuera del campamento.
- source_word: ᾅδου
  english_pob_choice: Hades
  chosen_spanish: Hades
  alternatives_spanish:
  - sepulcro
  - abismo
  lexicon: BDAG
  rationale: Se conserva el término griego para el ámbito de los muertos, siguiendo la decisión auditada del inglés.
- source_word: θεράποντα
  english_pob_choice: attendant
  chosen_spanish: asistente
  alternatives_spanish:
  - servidor
  - ministro
  lexicon: LSJ
  rationale: ‘Asistente’ mantiene una relación de servicio digna sin reducir el matiz honorífico del término.
- source_word: ἀλλοφύλων
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - de otro pueblo
  lexicon: LSJ
  rationale: ‘Extranjeros’ conserva el sentido general de los de fuera sin identificar un grupo más específico que el griego no nombra.
theological_decisions:
- issue: Cita de Génesis 4:7 en forma difícil ('οὐκ ἐὰν ὀρθῶς προσενέγκῃς, ὀρθῶς δὲ μὴ διέλῃς, ἥμαρτες;')
  english_pob_reading: Rendered formally as 'If you offer rightly, but do not divide rightly, have you not sinned?'
  chosen_spanish_reading: 'Se vierte de manera formal: ‘Si ofreces rectamente, pero no divides rectamente, ¿no has pecado?’'
  alternative_spanish_readings:
  - Si presentas correctamente, pero no repartes correctamente, ¿no has pecado?
  - Si ofreciste bien, pero no distinguís bien, pecaste.
  rationale: La cláusula es difícil y textualmente tensa; conviene conservar la ambigüedad en español en vez de resolverla con una paráfrasis interpretativa.
  doctrine_reference: Preservar la tensión exegética sin sobreexplicarla.
- issue: Pareja de vicios ζῆλος y φθόνος
  english_pob_reading: Rendered as 'jealousy and envy'
  chosen_spanish_reading: ‘celos y envidia’
  alternative_spanish_readings:
  - ‘envidia y celos’
  - ‘celos y rivalidad’
  rationale: La distinción entre ambos términos se mantiene para reproducir la acumulación retórica y la serie de ejemplos morales.
  doctrine_reference: Consistencia de términos clave, salvo justificación documentada.
- issue: ᾅδης en v. 12
  english_pob_reading: Rendered as 'Hades'
  chosen_spanish_reading: Se conserva ‘Hades’
  alternative_spanish_readings:
  - sepulcro
  - mundo de los muertos
  rationale: El griego nombra el ámbito de los muertos; transliterarlo preserva con precisión el mundo conceptual del texto.
  doctrine_reference: Primacía del término de origen sobre la tradición de traducción.
translation_notes:
  revision_awareness: Se corrigió un fallo previo de validación eliminando notas al pie no ancladas en el texto. Esta versión no incluye footnotes, para garantizar correspondencia exacta entre marcadores y texto.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando corresponde; aquí el pasaje cita a Dios en griego y se traduce como ‘Dios’ según el texto fuente.
  - Se conserva la distinción léxica entre ‘celos’ y ‘envidia’ para ζῆλος y φθόνος.
  - Se usa ‘Hades’ de manera consistente con la decisión auditada del inglés.
  - Se evita ‘siervo’ para θεράποντα porque el texto y el audit trail prefieren un matiz más digno y específico.
  - No se añadió ninguna nota al pie, para evitar desajustes de anclaje en esta entrega.
