source:
  edition: Funk 1901 (normalized OCR)
  text: ζῆλος ἐποίησεν Ἰωσὴφ μέχρι θανάτου διωχθῆναι καὶ μέχρι δουλείας εἰσελθεῖν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/004/009.yaml
  text: Jealousy caused Joseph to be persecuted even to death and to enter into slavery[a].
  footnotes:
  - marker: a
    text: Or 'persecuted even to death and to come even into slavery'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:32Z'
    unchanged: false
    changes_summary: Replaced 'to the point of death' with 'even to death' for a more direct and natural rendering of μέχρι θανάτου, while retaining the structure and meaning of the verse.
translation:
  language: es
  text: La envidia hizo que José fuera perseguido[a] hasta quedar al borde de la muerte y que entrara en la esclavitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «perseguido hasta la muerte y que entrara en la esclavitud».'
    reason: Alternativa más literal para μέχρι θανάτου, aunque en español puede sonar más como muerte efectiva.
lexical_decisions:
- source_word: ζῆλος
  english_pob_choice: Jealousy
  chosen_spanish: la envidia
  alternatives_spanish:
  - los celos
  - la celosía
  lexicon: ζῆλος
  rationale: En este contexto el agente causal no es el celo positivo sino la pasión rival que impulsa la persecución. «Envidia» comunica mejor el resentimiento destructivo que lleva a dañar a otro.
- source_word: ἐποίησεν ... διωχθῆναι
  english_pob_choice: caused Joseph to be persecuted
  chosen_spanish: hizo que José fuera perseguido
  alternatives_spanish:
  - causó que José fuera perseguido
  - provocó que José fuera perseguido
  lexicon: ποιέω + διώκω
  rationale: La estructura causal se conserva de forma natural en español con «hizo que». «Perseguido» mantiene el sentido pasivo del aoristo pasivo griego sin añadir interpretación.
- source_word: μέχρι θανάτου
  english_pob_choice: even to death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - al punto de muerte
  - hasta el punto de muerte
  lexicon: μέχρι + θάνατος
  rationale: El griego marca límite/extensión. En español, «hasta la muerte» es una forma fiel y natural que conserva la tensión sin implicar necesariamente que José muriera.
- source_word: δουλείας
  english_pob_choice: slavery
  chosen_spanish: esclavitud
  alternatives_spanish:
  - servidumbre
  - esclavización
  lexicon: δουλεία
  rationale: El sustantivo abstracto griego corresponde directamente a «esclavitud». Se evita «servidumbre» por ser menos fuerte y menos preciso para la fuerza léxica del término.
- source_word: εἰσελθεῖν
  english_pob_choice: to enter into
  chosen_spanish: entrara
  alternatives_spanish:
  - entrase
  - ingresara
  lexicon: εἰσέρχομαι
  rationale: «Entrara» reproduce la idea de ingreso a una condición o estado. En español, la preposición implícita se expresa bien con «entrar en esclavitud».
theological_decisions:
- issue: 'Alcance de μέχρι θανάτου: límite, no resultado fatal'
  english_pob_reading: to the point of death / even to death
  chosen_spanish_reading: hasta la muerte
  alternative_spanish_readings:
  - hasta el punto de muerte
  - al borde de la muerte
  rationale: La frase señala el extremo de la persecución, no que José muriera. La traducción debe conservar esa tensión sin convertirla en una afirmación de muerte efectiva.
  doctrine_reference: Coherencia narrativa con Génesis 37–50 y precisión aspectual del límite expresado por μέχρι.
translation_notes:
  revision_awareness: El contexto inglés pasó por una revisión que aclaró que μέχρι θανάτου expresa límite/extensión y no necesariamente muerte efectiva. La redacción española adopta esa precisión con una formulación natural («hasta la muerte») y evita añadir intensificadores como «incluso» o «al punto de», salvo si el contexto lo requiriera.
  spanish_consistency_notes:
  - Se mantiene «José» como forma española estable para Ἰωσὴφ.
  - Se usa «esclavitud» en vez de «siervitud» o «servidumbre» para conservar la fuerza léxica de δουλεία.
  - La sintaxis evita calcos rígidos y conserva la relación causal del original.
  - No se introduce mayúscula en «envidia» porque no se trata de un nombre propio ni de una personificación explícita.
