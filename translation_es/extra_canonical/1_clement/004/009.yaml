    rationale: Aunque puede funcionar, en español esta expresión normalmente suena más resultativa que el griego μέχρι θανάτου, que aquí marca intensidad/límite de la persecución. Conviene una formulación que preserve el extremo sin contradecir la historia de José.
  - severity: low
    issue: Falta de artículo en «entrara en esclavitud»
    rationale: No es incorrecto, pero «entrara en la esclavitud» suena más natural y definido en español eclesial general.
  - severity: medium
    issue: Nota al pie actual es torpe y no preserva bien la alternativa
    rationale: '«O: “perseguido hasta la muerte y a entrar en esclavitud”» no es español natural. Si se conserva una nota, debe ofrecer una alternativa legible y realmente útil.'
  revised_spanish_text: La envidia hizo que José fuera perseguido[a] hasta quedar al borde de la muerte y que entrara en la esclavitud.
