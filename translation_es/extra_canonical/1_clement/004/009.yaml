  rationale: Se ajusta μέχρι θανάτου a «hasta quedar al borde de la muerte» para expresar mejor el límite extremo de la persecución sin sugerir que José murió. Se añade el artículo en «la esclavitud» para mayor naturalidad. La nota al pie se rehace en español idiomático y preserva la alternativa más literal documentada en el historial inglés.
