review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico del griego: ὁρᾶτε es un imperativo exhortativo, ἀδελφοί es vocativo comunitario, y ζῆλος καὶ φθόνος son presentados como causas de ἀδελφοκτονίαν. Sin embargo, la sintaxis española actual hace que «el celo y la envidia» parezcan sujeto pospuesto de «Vean», produciendo una lectura torpe. Además, aunque «el asesinato de un hermano» está justificado por la repetición retórica con «hermanos», en español «celo» en singular suena menos natural aquí que «celos».'
  spanish_quality_summary: 'La frase necesita un ajuste menor de legibilidad y naturalidad: «Miren, hermanos: los celos y la envidia produjeron el asesinato de un hermano[a]». El cambio de puntuación resuelve la ambigüedad sintáctica, «Miren» suena más idiomático en exhortación directa, y «los celos» expresa mejor el vicio en español contemporáneo eclesial general. El resto mantiene tono digno y claridad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión sobre ἀδελφοκτονίαν puede mantenerse como «el asesinato de un hermano» con nota «O “fratricidio”», porque preserva la repetición retórica de ἀδελφοί … ἀδελφοκτονίαν. La única mejora léxica recomendada es ζῆλος -> «celos» en este contexto moral, más natural que «celo» singular.
  issues:
  - severity: medium
    issue: Ambigüedad/torpeza sintáctica en «Vean, hermanos, el celo y la envidia produjeron...»
    rationale: Sin una pausa fuerte, el lector puede procesar «el celo y la envidia» como objeto de «Vean» antes de reanalizar la oración. Unos dos puntos o reordenamiento resuelven el problema.
  - severity: low
    issue: «celo» en singular suena poco natural en este contexto de vicios emparejados
    rationale: Aunque semánticamente posible, en español bíblico y general «celos y envidia» es la pareja más idiomática para expresar ζῆλος καὶ φθόνος en un contexto negativo.
  revised_spanish_text: 'Miren, hermanos: los celos y la envidia produjeron el asesinato de un hermano[a].'
  revised_footnotes:
  - marker: a
    text: O «fratricidio».
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis para evitar una lectura enredada y se sustituye «celo» por «celos» para mayor naturalidad y claridad en español, sin alterar el sentido del griego ni la motivación auditada de conservar la repetición de «hermano» mediante «el asesinato de un hermano».
