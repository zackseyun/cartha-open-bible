translation:
  language: es
  text: 'Miren, hermanos: los celos y la envidia produjeron el asesinato de un hermano[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fratricidio».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁρᾶτε
  english_pob_choice: See
  chosen_spanish: Vean
  alternatives_spanish:
  - Vean, hermanos
  - Miren
  - Consideren
  lexicon: ὁράω
  rationale: El imperativo plural llama a la atención de los oyentes; «Vean» conserva la fuerza directa de «See» sin sonar excesivamente literal en español.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - amados hermanos
  lexicon: ἀδελφοί
  rationale: «Hermanos» reproduce el vocativo comunitario masculino genérico habitual en este registro y mantiene la concisión del original.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: celo
  alternatives_spanish:
  - celos
  - envidia ardiente
  lexicon: ζῆλος
  rationale: En combinación con φθόνος, ζῆλος puede abarcar el celo posesivo o la rivalidad; «celo» evita duplicar «envidia» y deja espacio para la tensión semántica del par.
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  - rivalidad
  lexicon: φθόνος
  rationale: «Envidia» es el equivalente más directo y claro para φθόνος en español y encaja con el paralelismo del texto.
- source_word: ἀδελφοκτονίαν
  english_pob_choice: fratricide
  chosen_spanish: el asesinato de un hermano
  alternatives_spanish:
  - fratricidio
  - muerte de un hermano
  lexicon: ἀδελφοκτονία
  rationale: Aunque «fratricidio» es preciso, «el asesinato de un hermano» conserva en español la repetición retórica de «hermano» que el texto griego refuerza con el vocativo ἀδελφοί; la nota recoge la alternativa más técnica.
- source_word: κατειργάσατο
  english_pob_choice: brought about
  chosen_spanish: produjeron
  alternatives_spanish:
  - causaron
  - acarrearon
  lexicon: κατεργάζομαι
  rationale: El verbo indica resultado efectivo; en plural concuerda con el sujeto compuesto «el celo y la envidia» y expresa adecuadamente la idea de que esos vicios llevaron al resultado violento.
theological_decisions:
- issue: Relación entre el pecado interno y la violencia fraterna
  english_pob_reading: jealousy and envy brought about fratricide
  chosen_spanish_reading: el celo y la envidia produjeron el asesinato de un hermano
  alternative_spanish_readings:
  - la envidia y los celos produjeron fratricidio
  - el celo y la envidia causaron la muerte de un hermano
  rationale: 'El texto presenta una causalidad moral directa: afectos desordenados conducen al derramamiento de sangre entre hermanos. La redacción española mantiene esa relación sin suavizarla.'
  doctrine_reference: Sabiduría moral y pecado como causa de violencia fraterna en la tradición cristiana primitiva
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «fratricide» por su precisión; la versión española conserva la precisión semántica en el cuerpo mediante «el asesinato de un hermano» para no perder la repetición de «hermano», y registra «fratricidio» como alternativa técnica en nota. La decisión sigue el mismo principio de equilibrio entre exactitud y naturalidad observado en el historial de revisión.
  spanish_consistency_notes:
  - Se mantuvo el vocativo directo en plural («Vean, hermanos») como equivalente natural de ὁρᾶτε, alineado con el tono exhortativo del pasaje.
  - Se evitó «SEÑOR» u otra terminología de máscara porque no aparece material divino en este versículo.
  - Se preservó la repetición de la raíz «hermano» en el cuerpo y en la nota para reflejar la carga retórica del griego.
  - Se prefirió «celo» en vez de repetir dos veces «envidia» para no aplanar la diferencia semántica entre ζῆλος y φθόνος.
