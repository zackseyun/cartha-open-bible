base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/004/006.yaml
  text: And Cain said to Abel his brother[a], ‘Let us go into the field.’ And it came to pass, while they were in the field, Cain rose up against Abel his brother and killed him.
  footnotes:
