    changes_summary: Changed ‘go out into the field’ to ‘go into the field’ for closer lexical alignment with εἰς τὸ πεδίον; removed the mismatched closing quotation mark. No other changes needed.
translation:
  language: es
  text: 'Y Caín dijo a Abel, su hermano: «Vayamos al campo[a]». Y aconteció que, estando ellos en el campo, Caín se levantó contra Abel, su hermano, y lo mató.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «Pasemos al campo». El sentido en este contexto es movimiento hacia el campo, no atravesarlo.
    reason: Aclaración léxica contextual para Διέλθωμεν εἰς τὸ πεδίον; evita la alternativa engañosa 'a través del campo'.
lexical_decisions:
- source_word: Διέλθωμεν εἰς τὸ πεδίον
  english_pob_choice: Let us go into the field.
  chosen_spanish: Vayamos al campo.
  alternatives_spanish:
  - Vayamos dentro del campo.
  - Pasemos al campo.
  - Vayamos a través del campo.
  lexicon: διέρχομαι + εἰς / πεδίον
  rationale: El griego expresa movimiento hacia el campo, no la idea de atravesarlo como destino principal. «Vayamos al campo» mantiene el valor direccional de εἰς τὸ πεδίον y evita el matiz incorrecto de «atravesar».
- source_word: καὶ ἐγένετο ἐν τῷ εἶναι αὐτοὺς ἐν τῷ πεδίῳ
  english_pob_choice: And it came to pass, while they were in the field,
  chosen_spanish: Y aconteció que, estando ellos en el campo,
  alternatives_spanish:
  - Y sucedió que, mientras estaban en el campo,
  - Y ocurrió que, cuando estaban en el campo,
  lexicon: καὶ ἐγένετο + infinitivo con ἐν τῷ
  rationale: «Y aconteció que» conserva el giro narrativo bíblico y el arranque aspectual del griego. «Estando ellos en el campo» reproduce el sentido temporal de la construcción sin sobrecargarla.
- source_word: ἀνέστη Κάϊν ἐπʼ Ἄβελ
  english_pob_choice: Cain rose up against Abel
  chosen_spanish: Caín se levantó contra Abel
  alternatives_spanish:
  - Caín se alzó contra Abel
  - Caín se puso contra Abel
  lexicon: ἀνίστημι ἐπί
  rationale: La combinación con ἐπί expresa ataque o agresión. «Se levantó contra» es una solución natural en español que mantiene la fuerza hostil del verbo sin suavizarla.
- source_word: ἀπέκτεινεν αὐτόν
  english_pob_choice: and killed him
  chosen_spanish: y lo mató
  alternatives_spanish:
  - y lo asesinó
  - y le dio muerte
  lexicon: ἀποκτείνω
  rationale: «Lo mató» es directo y fiel al acto narrado. «Asesinó» añade una valoración legal más explícita que el texto griego no desarrolla en esta línea.
- source_word: Ἄβελ τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: Abel his brother
  chosen_spanish: Abel, su hermano
  alternatives_spanish:
  - Abel, su hermano
  - Abel, el hermano de él
  lexicon: apposition + possessive
  rationale: Se conserva la aposición fraterna como en el griego. En español, «su hermano» suena más natural que repetir el nombre, sin perder la relación familiar subrayada por el texto.
theological_decisions:
- issue: Seguimiento de la cita de Génesis y su forma narrativa
  english_pob_reading: The verse is rendered as a straightforward narrative quotation without added interpretive language.
  chosen_spanish_reading: La línea se traduce como narración directa, sin ampliar la motivación ni introducir comentarios.
  alternative_spanish_readings:
  - Añadir una nota explicativa sobre la referencia a Génesis.
  - Parafrasear para destacar la malicia de Caín.
  rationale: El texto de Clemente reproduce la escena de Génesis 4:8 con finalidad ejemplar, pero la traducción no debe insertar interpretación moral adicional en el cuerpo del versículo. La fuerza teológica queda en la cita misma.
  doctrine_reference: Génesis 4:8; 1 Clemente 4:6
- issue: Conservación de la violencia narrativa sin atenuación
  english_pob_reading: Cain rose up against Abel his brother and killed him.
  chosen_spanish_reading: Caín se levantó contra Abel, su hermano, y lo mató.
  alternative_spanish_readings:
  - Caín atacó a Abel, su hermano, y lo mató.
  - Caín se alzó contra Abel, su hermano, y lo asesinó.
  rationale: La frase conserva la agresión explícita de ἀνέστη ἐπʼ y la muerte final sin suavizarla. No se añade un término más jurídico o más interpretativo que el griego no exige.
  doctrine_reference: Narrativa de pecado y homicidio en Génesis 4
- issue: Marcas textuales y comillas
  english_pob_reading: English audit notes only a prior quotation-mark mismatch revision.
  chosen_spanish_reading: Se usan comillas angulares españolas de apertura para el discurso directo, sin cerrar con comillas innecesarias al final del segmento.
  alternative_spanish_readings:
  - Usar comillas dobles rectas.
  - Cerrar el discurso con comillas al final del verso.
  rationale: La revisión inglesa eliminó una comilla de cierre desajustada. En español, la presentación más clara es abrir el discurso directo con comillas angulares y dejar que el cierre del registro editorial sea coherente con el formato de la obra.
  doctrine_reference: Norma editorial / presentación tipográfica
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se descartó «go out into the field» por no ajustarse a εἰς τὸ πεδίον, y se mantuvo la lectura direccional simple «go into the field». La versión española refleja ese ajuste con «Vayamos al campo», evitando un matiz de atravesar el campo que el griego no pide.'
  spanish_consistency_notes:
  - Se mantiene «Caín» y «Abel» como nombres propios estándar en español.
  - 'Se traduce el tiempo narrativo con fórmulas bíblicas naturales: «Y aconteció que».'
  - No se introduce «Cristo», «Señor» ni otras equivalencias no presentes en el texto.
  - El pronombre objeto directo se expresa como «lo» para una referencia masculina singular clara y natural.
