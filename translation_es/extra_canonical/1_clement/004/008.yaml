translation:
  language: es
  text: A causa de los celos, nuestro padre Jacob huyó de la presencia de Esaú, su hermano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ ζῆλος
  english_pob_choice: Because of jealousy
  chosen_spanish: A causa de los celos
  alternatives_spanish:
  - Por celos
  - A causa de la envidia
  lexicon: ζῆλος
  rationale: El contexto pide una causa de hostilidad familiar; «celos» conserva el valor de ζῆλος y coincide bien con el sentido de rivalidad que refleja la traducción inglesa. «Envidia» sería posible, pero estrecha el campo semántico y no es la opción principal del texto base.
- source_word: ὁ πατὴρ ἡμῶν Ἰακώβ
  english_pob_choice: our father Jacob
  chosen_spanish: nuestro padre Jacob
  alternatives_spanish:
  - nuestro antepasado Jacob
  - nuestro padre, Jacob
  lexicon: patēr
  rationale: Se conserva el tono respetuoso y comunitario de «our father» con la fórmula natural «nuestro padre Jacob», sin añadir explicaciones no presentes en el griego.
- source_word: ἀπέδρα
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - se retiró huyendo
  lexicon: apodrā
  rationale: «Huyó» reproduce de forma directa el verbo de escape/huida del griego y mantiene la concisión del original.
- source_word: ἀπὸ προσώπου
  english_pob_choice: from the face of
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de delante de
  - ante
  lexicon: prosōpon
  rationale: En español, «de la presencia de» comunica naturalmente la idea semítica de apartarse «del rostro de» alguien, sin sonar mecánico.
- source_word: Ἠσαῦ τοῦ ἀδελφοῦ αὐτοῦ
  english_pob_choice: Esau his brother
  chosen_spanish: Esaú, su hermano
  alternatives_spanish:
  - Esaú, su hermano mayor
  - Esaú, hermano suyo
  lexicon: Esau / adelphos
  rationale: Se mantiene el identificador relacional básico del texto, «su hermano», tal como la traducción inglesa, sin añadir el matiz de orden de nacimiento que no aparece aquí.
theological_decisions:
- issue: Relación causal entre ζῆλος y la huida de Jacob
  english_pob_reading: Because of jealousy our father Jacob fled...
  chosen_spanish_reading: A causa de los celos, nuestro padre Jacob huyó...
  alternative_spanish_readings:
  - Por celos, nuestro padre Jacob huyó...
  - Debido a los celos, nuestro padre Jacob huyó...
  rationale: No se suaviza la relación causal ni se interpreta moralmente más allá del texto. La frase española conserva la misma conexión directa entre la emoción/hostilidad y la acción de huir.
  doctrine_reference: Narración ejemplar de conflicto fraternal; sin formulación doctrinal explícita en este versículo.
translation_notes:
  revision_awareness: La versión inglesa auditada fue marcada como sin cambios tras revisión reciente y con alto acuerdo; por eso la redacción española sigue de cerca el sentido del griego y la solución inglesa, sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se usa «Jacob» y «Esaú» con ortografía habitual en español.
  - Se evita «SEÑOR» o terminología litúrgica no pertinente, porque el versículo no contiene el nombre divino.
  - «Presencia» se eligió para reflejar el hebraísmo subyacente en ἀπὸ προσώπου sin calco rígido.
