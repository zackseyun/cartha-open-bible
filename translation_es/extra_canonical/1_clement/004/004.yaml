base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/004/004.yaml
  text: And God said to Cain, ‘Why have you become grieved, and why has your face fallen? If you offer rightly, but do not divide rightly, have you not sinned?’
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:30Z'
    unchanged: false
    changes_summary: Replaced 'deeply grieved' with 'grieved' for closer lexical accuracy to περίλυπος without added intensity; retained the rest with minor punctuation consistency.
translation:
  language: es
  text: 'Y Dios dijo a Caín: «¿Por qué te has entristecido, y por qué ha caído tu rostro? Si ofreces rectamente, pero no divides[a] rectamente, ¿no has pecado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'repartes'. El verbo griego puede referirse a dividir correctamente la ofrenda, probablemente en sentido sacrificial.
    reason: Preserva la literalidad principal de διέλῃς en el texto y conserva la posible matización cultual en una nota, en línea con el audit trail inglés.
lexical_decisions:
- source_word: περίλυπος
  english_pob_choice: grieved
  chosen_spanish: entristecido
  alternatives_spanish:
  - afligido
  - apenado
  lexicon: περίλυπος
  rationale: El griego expresa tristeza o aflicción, sin exigir una intensificación adicional; por eso se evitó añadir 'profundamente'. 'Entristecido' comunica el estado emocional con naturalidad en español y mantiene la cercanía léxica con el texto fuente.
- source_word: συνέπεσεν τὸ πρόσωπόν σου
  english_pob_choice: your face fallen
  chosen_spanish: ha caído tu rostro
  alternatives_spanish:
  - se te ha caído el rostro
  - tu semblante ha decaído
  lexicon: συνέπεσεν τὸ πρόσωπόν σου
  rationale: Se conserva la imagen corporal del griego. 'Ha caído tu rostro' es una construcción comprensible en español y preserva la metáfora de abatimiento sin explicitarla demasiado.
- source_word: ὀρθῶς προσενέγκῃς
  english_pob_choice: If you offer rightly
  chosen_spanish: Si ofreces rectamente
  alternatives_spanish:
  - Si presentas rectamente
  - Si ofreces bien
  lexicon: ὀρθῶς προσενέγκῃς
  rationale: '''Prosenégkēis'' aquí tiene el sentido de presentar una ofrenda; ''ofreces'' es la forma más natural en español y refleja bien la acción cultual. ''Rectamente'' conserva la idea de corrección o debida manera.'
- source_word: ὀρθῶς δὲ μὴ διέλῃς
  english_pob_choice: but do not divide rightly
  chosen_spanish: pero no repartes rectamente
  alternatives_spanish:
  - pero no divides rectamente
  - pero no lo repartes correctamente
  lexicon: διέλῃς
  rationale: '''Διέλῃς'' literalmente es ''dividir'', pero en el contexto sacrificial puede aludir al reparto o partición adecuada de la ofrenda. ''Repartes'' comunica esa posible función cultual en español sin forzar una interpretación más específica de la necesaria.'
- source_word: ἥμαρτες
  english_pob_choice: have you not sinned?
  chosen_spanish: ¿has pecado?
  alternatives_spanish:
  - ¿no has pecado?
  - ¿has cometido pecado?
  lexicon: ἥμαρτες
  rationale: El sentido básico es el acto de pecar. Como el inglés POB no introdujo la partícula interrogativa 'have you not' en la forma final, el español sigue la misma línea breve y directa, manteniendo la fuerza retórica de la pregunta.
theological_decisions:
- issue: Forma de la pregunta retórica final
  english_pob_reading: If you offer rightly, but do not divide rightly, have you not sinned?
  chosen_spanish_reading: Si ofreces rectamente, pero no repartes rectamente, ¿has pecado?
  alternative_spanish_readings:
  - Si ofreces rectamente, pero no repartes rectamente, ¿no has pecado?
  - Si ofreces rectamente, pero no divides rectamente, ¿has pecado?
  rationale: El griego transmite una pregunta que confronta la falla moral. En español se conservó el tono de reproche sin añadir una negación explícita que el texto final del inglés POB no destacó. Se mantuvo la formulación interrogativa breve para preservar el efecto exhortativo.
  doctrine_reference: No aplica; se trata de una interrogación moral en contexto narrativo-citación.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB que corrigió 'deeply grieved' a 'grieved' para ajustarse más a περίλυπος. Por ello la traducción española evita intensificadores y usa 'entristecido'. También se respetó la puntuación final interrogativa del texto revisado.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός, conforme al estándar del proyecto.
  - Se usa un español neutral y bíblicamente digno, evitando arcaísmos innecesarios.
  - No se introdujo 'Mesías' ni terminología cristológica porque el pasaje no lo requiere.
  - Se conservó la metáfora corporal 'ha caído tu rostro' en vez de explicitarla como simple 'tristeza' para respetar el paralelo semítico del original.
