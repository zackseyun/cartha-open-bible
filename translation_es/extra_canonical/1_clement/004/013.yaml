  text: διὰ ζῆλος Δαυὶδ φθόνον ἔσχεν οὐ μόνον ὑπὸ τῶν ἀλλοφύλων, ἀλλὰ καὶ ὑπὸ Σαοὺλ βασιλέως Ἰσραὴλ ἐδιώχθη.
