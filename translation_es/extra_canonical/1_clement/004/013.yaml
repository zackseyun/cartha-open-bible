base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/004/013.yaml
  text: Because of jealousy David incurred envy not only from the foreigners[a], but was also persecuted by Saul king of Israel.
  footnotes:
  - marker: a
    text: Or 'incurred envy not only from the foreigners'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:34Z'
    unchanged: false
    changes_summary: Revised 'was envied' to 'incurred envy' to reflect ἔσχεν φθόνον more naturally and accurately, while retaining the contrast with subsequent persecution.
translation:
  language: es
  text: Por causa de los celos, David fue objeto de envidia no solo por parte de los extranjeros[a], sino que también fue perseguido por Saúl, rey de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «incurrió en envidia no solo por parte de los extranjeros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ ζῆλος
  english_pob_choice: Because of jealousy
  chosen_spanish: Por causa de los celos
  alternatives_spanish:
  - A causa de los celos
  - Debido a los celos
  lexicon: διά + acusativo; ζῆλος
  rationale: Se conserva la relación causal explícita del griego. 'Celos' comunica bien ζῆλος en este contexto de rivalidad y hostilidad.
- source_word: φθόνον ἔσχεν
  english_pob_choice: incurred envy
  chosen_spanish: fue objeto de envidia
  alternatives_spanish:
  - incurrió en envidia
  - recibió envidia
  lexicon: φθόνος; ἔχω + acusativo
  rationale: El español natural requiere una construcción pasiva/relacional; 'fue objeto de envidia' conserva la idea de ser el blanco de φθόνος sin forzar un calco como 'incurrió en envidia'.
- source_word: ὑπὸ τῶν ἀλλοφύλων
  english_pob_choice: from the foreigners
  chosen_spanish: por parte de los extranjeros
  alternatives_spanish:
  - por los extranjeros
  - de los extranjeros
  lexicon: ὑπό + genitivo; ἀλλόφυλος
  rationale: Se mantiene la agencia implícita de ὑπό con un español claro. 'Extranjeros' sigue el valor básico de ἀλλόφυλοι y conserva la tensión étnica del término.
- source_word: Σαοὺλ βασιλέως Ἰσραὴλ
  english_pob_choice: Saul king of Israel
  chosen_spanish: Saúl, rey de Israel
  alternatives_spanish:
  - Saúl, el rey de Israel
  - Saúl, rey de Israel
  lexicon: Σαούλ; βασιλεύς; Ἰσραήλ
  rationale: La aposición se reproduce de forma natural en español. No se añade artículo para no sobrecargar el texto y para conservar la sobriedad del original.
theological_decisions:
- issue: Relación entre ζῆλος y φθόνος
  english_pob_reading: Because of jealousy David incurred envy ...
  chosen_spanish_reading: Por causa de los celos, David fue objeto de envidia ...
  alternative_spanish_readings:
  - Por causa de los celos, David incurrió en envidia ...
  - Por causa de los celos, David fue envidiado ...
  rationale: El griego distingue la causa ('celos') del efecto ('envidia'). La versión española conserva esa distinción sin convertirla en una afirmación psicológica sobre David mismo.
  doctrine_reference: No doctrinal issue; lexical distinction in the source text.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió la primera cláusula inglesa de ''was envied'' a ''incurred envy'' para reflejar mejor φθόνον ἔσχεν. La traducción española sigue esa decisión semántica con una construcción equivalente y natural: ''fue objeto de envidia''.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o equivalentes de reemplazo porque el texto no contiene el nombre divino.
  - '''Extranjeros'' se mantiene como traducción neutral de ἀλλόφυλοι; no se suaviza a ''gentiles'' ni se especifica una nación no presente en el griego.'
  - La puntuación conserva la aposición 'Saúl, rey de Israel' y el contraste entre las dos cláusulas.
