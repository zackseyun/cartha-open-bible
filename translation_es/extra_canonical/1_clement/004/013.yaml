review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura causal del griego y la oposición entre ser objeto de φθόνος y luego ser perseguido por Saúl. Sin embargo, la frase española 'no solo por parte de los extranjeros' suena algo pesada tras 'fue objeto de envidia', y la nota alternativa conserva una opción menos natural y menos fiel en español. El sentido fuente se preserva mejor con 'fue envidiado ... por los extranjeros'.
  spanish_quality_summary: El texto es claro y digno, pero puede hacerse más natural y directo en español sin perder precisión. 'Fue objeto de envidia' es correcto, aunque algo nominal; 'fue envidiado' suena más idiomático y mantiene el sentido. También conviene simplificar 'por parte de los extranjeros' a 'por los extranjeros'.
  glossary_alignment: No hay términos del glosario principal en disputa. 'Celos' para ζῆλος y 'envidia' para φθόνος distinguen adecuadamente los dos vocablos. 'Extranjeros' es aceptable para ἀλλόφυλοι en este contexto.
  issues:
  - severity: medium
    issue: 'Expresión algo forzada: ''fue objeto de envidia no solo por parte de los extranjeros'''
    rationale: Aunque comprensible, esta formulación es menos natural que una verbal simple en español. El griego idiomático φθόνον ἔσχεν ὑπό expresa que David fue envidiado por otros; el español puede decirlo de forma directa.
  - severity: low
    issue: 'Nota al pie con alternativa débil: ''incurrió en envidia'''
    rationale: La propia historia de revisión inglesa muestra vacilación, pero en español 'incurrió en envidia' suena poco idiomático y puede sugerir que David cayó en envidia, no que la despertó en otros. No aporta una alternativa útil para el lector español.
  revised_spanish_text: Por causa de los celos, David fue envidiado no solo por los extranjeros, sino que también fue perseguido por Saúl, rey de Israel.
  revision_rationale: Se reemplaza la construcción nominal 'fue objeto de envidia ... por parte de' por la forma más natural y directa 'fue envidiado ... por', que conserva el sentido del griego y mejora la legibilidad. Se elimina la nota al pie porque la alternativa propuesta no ayuda en español y puede introducir ambigüedad.
