translation:
  language: es
  text: Y Caín se entristeció mucho, y se le cayó el semblante.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλυπήθη
  english_pob_choice: was greatly grieved
  chosen_spanish: se entristeció mucho
  alternatives_spanish:
  - se apesadumbró mucho
  - sintió gran pena
  lexicon: λυπέω
  rationale: El griego expresa tristeza/aflicción; «se entristeció mucho» conserva el valor afectivo sin añadir más contenido del que exige el texto. «Grievied» en inglés POB se vierte mejor como tristeza profunda que como mera molestia.
- source_word: λίαν
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - sumamente
  lexicon: λίαν
  rationale: Adverbio de intensificación. «Mucho» es natural en español y mantiene la fuerza enfática sin sonar arcaico.
- source_word: συνέπεσεν τῷ προσώπῳ αὐτοῦ
  english_pob_choice: his face fell
  chosen_spanish: se le cayó el semblante
  alternatives_spanish:
  - se le descompuso el rostro
  - bajó el rostro
  lexicon: συνπίπτω + πρόσωπον
  rationale: La imagen idiomática de «su rostro cayó» se expresa en español con «se le cayó el semblante», que conserva el efecto visible de abatimiento. «Semblante» evita una literalidad extraña y sigue siendo fiel a la metáfora facial del griego.
theological_decisions:
- issue: La reacción de Caín se presenta como aflicción interior visible en el rostro, no como una enseñanza doctrinal explícita.
  english_pob_reading: And Cain was greatly grieved, and his face fell.
  chosen_spanish_reading: Y Caín se entristeció mucho, y se le cayó el semblante.
  alternative_spanish_readings:
  - Y Caín se llenó de ira, y su rostro decayó.
  - Y Caín quedó muy afligido, y bajó el rostro.
  rationale: El texto griego de este versículo habla de tristeza/aflicción y del abatimiento del semblante. No introduce aquí el motivo de ira; por fidelidad al pasaje, la traducción evita proyectarlo desde contextos cercanos.
  doctrine_reference: No aplica; observación narrativa/psicológica del relato.
translation_notes:
  revision_awareness: El contexto auditado indica alta concordancia y ningún cambio necesario respecto de la versión inglesa POB. Esta propuesta mantiene el sentido del original griego con una solución española natural y no introduce notas porque no hay variante textual ni alternativa doctrinal relevante en el versículo.
  spanish_consistency_notes:
  - Se usa «Caín» con ortografía española estándar.
  - Se mantiene el tiempo pasado simple para la narración.
  - No se emplea «SEÑOR» ni terminología doctrinal ajena, porque el versículo no contiene vocabulario divino explícito.
