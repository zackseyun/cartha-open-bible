translation:
  language: es
  text: Quédate quieto; su vuelta es hacia ti, y tú gobernarás sobre él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡσύχασον
  english_pob_choice: Be still
  chosen_spanish: Calla
  alternatives_spanish:
  - Guarda silencio
  - Estate quieto
  lexicon: ἡσυχάζω
  rationale: El mandato comunica quietud y cese de reacción. «Calla» es breve, natural en español y conserva el tono imperativo del original mejor que una formulación explicativa.
- source_word: πρὸς δὲ ἡ ἀποστροφὴ αὐτοῦ
  english_pob_choice: his turning is toward you
  chosen_spanish: su vuelta es hacia ti
  alternatives_spanish:
  - su retorno es hacia ti
  - su apartarse es hacia ti
  lexicon: ἀποστροφή
  rationale: ἀποστροφή puede expresar giro, vuelta o desviación. Dado el contexto y el paralelismo con la frase inglesa auditada, «vuelta» transmite el movimiento relacional sin forzar una explicación interpretativa.
- source_word: ἄρξεις αὐτοῦ
  english_pob_choice: you shall rule over him
  chosen_spanish: reinarás sobre él
  alternatives_spanish:
  - dominarás sobre él
  - gobernarás sobre él
  lexicon: ἄρχω
  rationale: ἄρχω aquí se entiende como ejercer dominio o gobierno. «Reinarás» mantiene la fuerza soberana y la cadencia bíblica sin reducir el verbo a mera administración.
theological_decisions:
- issue: Relación entre el sujeto implícito y el mandato/aseveración final
  english_pob_reading: Be still; his turning is toward you, and you shall rule over him.
  chosen_spanish_reading: Calla; porque su vuelta es hacia ti, y tú reinarás sobre él.
  alternative_spanish_readings:
  - Calla; porque su giro está hacia ti, y dominarás sobre él.
  - Guarda silencio; su vuelta es hacia ti, y tú gobernarás sobre él.
  rationale: El texto presenta una exhortación seguida de una afirmación sobre el destino o relación de dominio. La traducción conserva ese contraste sin introducir sujetos o referencias doctrinales ajenas al griego.
  doctrine_reference: 1 Clement 4:5; eco narrativo de Génesis 4:7
translation_notes:
  revision_awareness: Se revisó el intento anterior y se eliminó toda nota no anclada en el texto. No hay cambios respecto al sentido base del audit trail inglés; la versión española mantiene la lectura aprobada y evita añadir explicaciones no requeridas.
  spanish_consistency_notes:
