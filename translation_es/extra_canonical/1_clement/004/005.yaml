- from: Calla; porque su vuelta es hacia ti, y tú reinarás sobre él.
  to: Quédate quieto; su vuelta es hacia ti, y tú gobernarás sobre él.
  rationale: Se elimina «porque» para no añadir causalidad ausente del griego; se cambia «reinarás» por «gobernarás» para corresponder mejor a ἄρξεις / ‘rule’; y se ajusta «Calla» a «Quédate quieto» para reflejar mejor ἡσύχασον y el inglés auditado ‘Be still’. Se conserva «su vuelta es hacia ti» como formulación suficientemente fiel al audit trail sin introducir una interpretación más libre.
