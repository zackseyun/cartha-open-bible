review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en líneas generales el sentido del griego y del inglés auditado: un imperativo seguido por dos afirmaciones, con eco claro de Génesis 4:7. Sin embargo, introduce «porque», que no está en el griego ni en el inglés POB, y «reinarás» sobredimensiona ἄρξεις αὐτοῦ frente al sentido más general de ‘gobernar/dominar/rule’.'
  spanish_quality_summary: El español es comprensible y digno, pero «Calla» estrecha ἡσύχασον a silencio verbal y puede perder la idea de aquietarse. «Su vuelta» suena algo torpe en español bíblico moderno; «su giro» o «su volver» serían posibles, pero la opción más conservadora aquí es mantener la estructura auditada con mínima intervención. La reparación principal necesaria es quitar «porque» y ajustar el verbo final para mayor fidelidad semántica.
  glossary_alignment: 'No hay términos del glosario principal especialmente activados aquí. La decisión clave es ἄρχω: mejor «gobernarás sobre él» que «reinarás sobre él», porque el inglés auditado usa ‘rule’ y no hay base suficiente para intensificar a realeza. Para ἡσύχασον, «Quédate quieto» o «Estate quieto» captarían mejor el griego, pero dado el carácter de reparación mínima y el tono, «Calla» puede tolerarse si se corrigen los demás puntos; aun así, la versión revisada mejora también ese imperativo.'
  issues:
  - severity: medium
    issue: Inserción de «porque» sin apoyo textual
    rationale: 'El griego dice ἡσύχασον· πρὸς δὲ ἡ ἀποστροφὴ αὐτοῦ..., y el inglés POB: ‘Be still; his turning is toward you...’. «Porque» añade una relación causal explícita no presente en la evidencia.'
  - severity: medium
    issue: «Reinarás» intensifica ἄρξεις
    rationale: ἄρχω en este contexto corresponde bien a ‘rule over’. «Reinarás» añade matiz monárquico no exigido por el original y menos natural en este eco de Génesis 4:7 que «gobernarás» o «dominarás».
  - severity: low
    issue: «Calla» reduce ἡσύχασον a silencio verbal
    rationale: ἡσύχασον apunta más ampliamente a estar quieto, aquietarse o permanecer calmado. «Calla» no es imposible, pero es más estrecho que el inglés auditado ‘Be still’ y que el valor probable del griego.
  revised_spanish_text: Quédate quieto; su vuelta es hacia ti, y tú gobernarás sobre él.
  revision_rationale: Se elimina «porque» para no añadir causalidad ausente del griego; se cambia «reinarás» por «gobernarás» para corresponder mejor a ἄρξεις / ‘rule’; y se ajusta «Calla» a «Quédate quieto» para reflejar mejor ἡσύχασον y el inglés auditado ‘Be still’. Se conserva «su vuelta es hacia ti» como formulación suficientemente fiel al audit trail sin introducir una interpretación más libre.
