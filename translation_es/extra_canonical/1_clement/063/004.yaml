review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general: ἐποιήσαμεν = «hemos hecho esto», γέγονεν καὶ ἔστιν = «ha sido, y es», y εἰρηνεῦσαι se entiende correctamente como «estar en paz», no como pasivo. Sin embargo, «hacia que» no es español natural para reflejar εἰς τὸ + infinitivo; aquí una formulación como «orientada a que» o simplemente «a que» preserva mejor el sentido direccional sin sonar calcada. Además, la nota alternativa «ser restablecidos en paz» contradice la revisión inglesa auditada, que precisamente descartó el pasivo.'
  spanish_quality_summary: La frase es comprensible, pero «hacia que ustedes estén pronto en paz» suena poco idiomática y algo forzada. «Toda nuestra preocupación» es aceptable, aunque «todo nuestro interés» o «toda nuestra solicitud» serían posibles; no es necesario cambiarlo si el resto se corrige. La nota también necesita ajuste para no introducir un español extraño («en paz» tras «restablecidos») ni una alternativa desaconsejada por la evidencia griega.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. La decisión clave correcta es mantener εἰρηνεῦσαι como «estar en paz» y no «ser restablecidos».
  issues:
  - severity: medium
    issue: «hacia que» es poco natural en español
    rationale: Aunque intenta reflejar la fuerza direccional de εἰς τό, en español resulta torpe. «orientada a que ustedes pronto estén en paz» conserva el sentido sin calco impropio.
  - severity: medium
    issue: La nota al pie propone una alternativa pasiva descartada por la auditoría inglesa
    rationale: La revisión documentada estableció que εἰρηνεῦσαι es infinitivo activo y que «be restored to peace» desplaza la agencia. Mantener esa alternativa en español debilita la fidelidad al griego.
  revised_spanish_text: Y hemos hecho esto para que sepan que toda nuestra preocupación ha sido, y es, orientada a que ustedes pronto estén en paz.
  revision_rationale: Se reemplaza «hacia que» por «orientada a que» para lograr un español natural que todavía conserva la idea de dirección/meta presente en εἰς τὸ. Se elimina la nota porque la alternativa pasiva «ser restablecidos en paz» no es fiel a la decisión gramatical ya auditada sobre εἰρηνεῦσαι.
