  text: τοῦτο δὲ ἐποιήσαμεν, ἵνα εἰδῆτε, ὅτι πᾶσα ἡμῶν φροντὶς καὶ γέγονεν καὶ ἔστιν εἰς τὸ ἐν τάχει ὑμᾶς εἰρηνεῦσαι.
