    changes_summary: Replaced 'care' with 'concern' for more natural formal English, and revised the final clause to more closely reflect the Greek infinitive construction ('toward your being quickly at peace') without adding 'for this:'.
translation:
  language: es
  text: Y hemos hecho esto para que sepan que toda nuestra preocupación ha sido, y es, orientada a que ustedes pronto estén en paz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐποιήσαμεν
  english_pob_choice: we have done this
  chosen_spanish: hemos hecho esto
  alternatives_spanish:
  - hemos obrado así
  - hemos hecho esto mismo
  lexicon: ποιέω
  rationale: El aoristo/resultado en contexto se expresa naturalmente con «hemos hecho esto», sin añadir matices inexistentes. Mantiene la referencia deíctica a la acción mencionada previamente.
- source_word: φροντίς
  english_pob_choice: concern
  chosen_spanish: preocupación
  alternatives_spanish:
  - cuidado
  - solicitud
  lexicon: φροντίς
  rationale: «Preocupación» comunica bien en español la idea de atención diligente e interés sostenido. Evita «cuidado» por posible ambigüedad afectiva, y respeta la intención formal del texto.
- source_word: γέγονεν καὶ ἔστιν
  english_pob_choice: has been, and is
  chosen_spanish: ha sido, y es
  alternatives_spanish:
  - ha estado, y está
  - ha sido y sigue siendo
  lexicon: γίνομαι / εἰμί
  rationale: La construcción contrasta una realidad pasada y presente. «Ha sido, y es» conserva esa duplicidad con un estilo sobrio y publicable.
- source_word: εἰς τὸ ... ὑμᾶς εἰρηνεῦσαι
  english_pob_choice: toward your being quickly at peace
  chosen_spanish: hacia que ustedes estén pronto en paz
  alternatives_spanish:
  - para que ustedes estén pronto en paz
  - con miras a que ustedes estén pronto en paz
  lexicon: εἰρηνεύω
  rationale: 'El infinitivo activo pide una rendición activa: «estar en paz», no «ser restaurados». «Hacia que» refleja la fuerza direccional de εἰς τό sin convertirla en una finalidad demasiado idiomática que borre la sintaxis griega.'
theological_decisions:
- issue: Estado de paz como meta pastoral
  english_pob_reading: toward your being quickly at peace
  chosen_spanish_reading: hacia que ustedes estén pronto en paz
  alternative_spanish_readings:
  - para que ustedes estén pronto en paz
  - para que pronto sean restablecidos a la paz
  rationale: El griego presenta la paz como el estado deseado para los destinatarios. Se evita «restablecidos» porque introduce pasividad y una agencia no marcada por el infinitivo activo εἰρηνεῦσαι.
  doctrine_reference: εἰρηνεύω en construcción infinitiva
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió una pasiva implícita (''be restored to peace'') hacia una lectura activa (''be at peace''). La versión española sigue esa corrección con una construcción activa: «estén pronto en paz», evitando una pasiva no sustentada por el griego.'
  spanish_consistency_notes:
  - Se mantiene «Jesús»/«Dios» por norma del proyecto, aunque este versículo no los contiene.
  - Se usa un registro formal pero natural en español latinoamericano.
  - La nota [a] queda anclada explícitamente en «en paz» dentro del texto para cumplir la trazabilidad editorial.
