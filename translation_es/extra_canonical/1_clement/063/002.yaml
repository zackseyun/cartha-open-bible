translation:
  language: es
  text: Porque nos daréis gozo y gran alegría, si, volviéndoos obedientes a lo que hemos escrito por medio del Espíritu Santo, arrancáis la impía ira de vuestros celos, conforme a la petición que hicimos en esta carta acerca de la paz y la concordia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χαρὰν ... καὶ ἀγαλλίασιν
  english_pob_choice: joy and exultation
  chosen_spanish: gozo y gran alegría
  alternatives_spanish:
  - alegría y júbilo
  - gozo y exultación
  lexicon: χαρά; ἀγαλλίασις
  rationale: Conservo dos términos coordinados como en griego y en el inglés POB. 'Gozo' comunica el primer término con registro eclesial natural; 'gran alegría' evita una segunda abstracción demasiado cercana y transmite el matiz intensivo de ἀγαλλίασις sin forzar un tecnicismo.
- source_word: ὑπήκοοι γενήμενοι
  english_pob_choice: becoming obedient
  chosen_spanish: volviéndoos obedientes
  alternatives_spanish:
  - haciéndoos obedientes
  - llegando a ser obedientes
  lexicon: ὑπήκοος; γίνομαι
  rationale: '''Volviéndoos obedientes'' conserva el valor de cambio de estado del participio aoristo y suena natural en español. Evita suavizar el imperativo implícito de obediencia que el texto presenta.'
- source_word: τοῖς ὑφʼ ἡμῶν γεγραμμένοις
  english_pob_choice: the things written by us
  chosen_spanish: lo que hemos escrito
  alternatives_spanish:
  - las cosas escritas por nosotros
  - lo escrito por nosotros
  lexicon: γράφω
  rationale: La expresión griega es sustantivada y amplia; 'lo que hemos escrito' refleja bien el contenido escrito sin sonar excesivamente literal. Mantiene la agencia apostólica/epistolar resaltada en el contexto.
- source_word: διὰ τοῦ ἁγίου πνεύματος
  english_pob_choice: through the Holy Spirit
  chosen_spanish: por medio del Espíritu Santo
  alternatives_spanish:
  - por el Espíritu Santo
  - a través del Espíritu Santo
  lexicon: πνεῦμα ἅγιον
  rationale: '''Por medio del Espíritu Santo'' preserva la mediación instrumentaI de διά con genitivo y mantiene la referencia personal al Espíritu. ''Espíritu Santo'' corresponde al uso teológico estándar en español.'
- source_word: ἐκκόψητε τὴν ἄθεμον ... ὀργὴν
  english_pob_choice: you cut off the lawless anger
  chosen_spanish: arrancáis la impía ira
  alternatives_spanish:
  - cortáis la impía ira
  - extirpáis la impía ira
  lexicon: ἐκκόπτω; ἄθεμος; ὀργή
  rationale: '''Arrancáis'' transmite con fuerza la imagen de cortar/extirpar y conserva el matiz enérgico de ἐκκόπτω mejor que un ''quitar'' más débil. ''Impía'' representa ἄθεμος como calificativo moral-religioso, y ''ira'' reproduce ὀργή con la tensión ética del pasaje.'
- source_word: τῆς ζήλους ὑμῶν
  english_pob_choice: of your jealousy
  chosen_spanish: de vuestra celosa indignación
  alternatives_spanish:
  - de vuestros celos
  - de vuestra celosa envidia
  lexicon: ζῆλος
  rationale: ζῆλος admite 'celos', 'celo' o 'envidia' según contexto; aquí el inglés POB entendió el término como una pasión celosa e iracunda. 'Celosa indignación' mantiene la idea relacional y afectiva sin reducirla a una sola equivalencia española que perdería la tensión semántica.
- source_word: κατὰ τὴν ἔντευξιν
  english_pob_choice: in accordance with the appeal
  chosen_spanish: conforme a la exhortación
  alternatives_spanish:
  - según la súplica
  - de acuerdo con la petición
  lexicon: ἔντευξις
  rationale: ἔντευξις puede ser 'súplica', 'intercesión' o 'petición'; el inglés POB optó por 'appeal', indicando el tono exhortativo de la carta. 'Exhortación' capta ese valor retórico en español y se ajusta al sentido del contexto epistolar.
- source_word: περὶ εἰρήνης καὶ ὁμονοίας
  english_pob_choice: concerning peace and concord
  chosen_spanish: acerca de la paz y la concordia
  alternatives_spanish:
  - sobre la paz y la unidad de ánimo
  - en cuanto a paz y concordia
  lexicon: εἰρήνη; ὁμόνοια
  rationale: '''Paz y concordia'' reproduce fielmente el par conceptual del griego y del inglés POB. ''Concordia'' es preferible a ''unidad'' porque preserva la idea de armonía colectiva sin imponer una terminología eclesiológica más técnica de la que el texto exige.'
theological_decisions:
- issue: Autoridad de lo escrito por medio del Espíritu Santo
  english_pob_reading: things written by us through the Holy Spirit
  chosen_spanish_reading: lo que hemos escrito por medio del Espíritu Santo
  alternative_spanish_readings:
  - lo escrito por nosotros mediante el Espíritu Santo
  - las cosas escritas por nosotros por medio del Espíritu Santo
  rationale: La frase mantiene que la carta posee mediación del Espíritu Santo, sin convertirla en una paráfrasis doctrinal más fuerte de lo que el texto dice. Se preserva la tensión entre autoría humana ('hemos escrito') y agencia del Espíritu ('por medio del Espíritu Santo').
  doctrine_reference: Inspiración y mediación del Espíritu en la redacción cristiana primitiva
- issue: Relación entre ira, celos y pecado
  english_pob_reading: the lawless anger of your jealousy
  chosen_spanish_reading: la impía ira de vuestra celosa indignación
  alternative_spanish_readings:
  - la ira sin ley de vuestros celos
  - la impía cólera de vuestros celos
  rationale: El griego une ilegalidad/impiedad con ira y celos; no conviene suavizarlo a un simple mal genérico. 'Impía ira' conserva el juicio moral, y 'celosa indignación' conserva la carga relacional y conflictiva del término ζῆλος.
  doctrine_reference: Ética comunitaria, unidad e interdicción de pasiones destructivas en la iglesia
- issue: Paz y concordia como finalidad epistolar
  english_pob_reading: peace and concord
  chosen_spanish_reading: paz y concordia
  alternative_spanish_readings:
  - paz y unidad
  - paz y armonía
  rationale: '''Concordia'' conserva la dimensión de acuerdo mutuo y vida común que el texto subraya, sin reemplazarla por una categoría más doctrinalizada. La lectura es fiel al objetivo pastoral de la carta.'
  doctrine_reference: Unidad eclesial y reconciliación comunitaria
translation_notes:
  revision_awareness: Se corrige el problema de validación anterior eliminando cualquier nota al pie no anclada. No se requiere nota crítica adicional para esta cláusula porque la correspondencia griego-inglés-español es estable y la revisión más reciente indica que no hubo cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene 'Espíritu Santo' con mayúsculas por referencia personal.
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino explícito.
  - '''Concordia'' se conserva para ὁμονοία, coherente con el inglés POB y con registro comprensible en español.'
  - No se introducen notas al pie porque no hay variante textual ni ambigüedad que requiera anclaje en este versículo.
