revisions:
- from: Porque nos daréis gozo y gran alegría, si, volviéndoos obedientes a lo que hemos escrito por medio del Espíritu Santo, arrancáis la impía ira de vuestra celosa indignación, conforme a la exhortación que hicimos en esta carta acerca de la paz y la concordia.
  to: Porque nos daréis gozo y gran alegría, si, volviéndoos obedientes a lo que hemos escrito por medio del Espíritu Santo, arrancáis la impía ira de vuestros celos, conforme a la petición que hicimos en esta carta acerca de la paz y la concordia.
  rationale: 'Se corrigen dos puntos para ajustar el español al griego y al English POB: ''de vuestros celos'' restablece la relación entre ζῆλος y ὀργή, y ''petición'' refleja mejor ἔντευξις que ''exhortación''. Se conserva el resto del phrasing porque ya es fiel y legible en español eclesial moderno.'
