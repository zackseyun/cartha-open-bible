  text: χαρὰν γὰρ καὶ ἀγαλλίασιν ἡμῖν παρέξετε, ἐὰν ὑπήκοοι γενήμενοι τοῖς ὑφʼ ἡμῶν γεγραμμένοις διὰ τοῦ ἁγίου πνεύματος ἐκκόψητε τὴν ἄθεμον τῆς ζήλους ὑμῶν ὀργὴν κατὰ τὴν ἔντευξιν, ἣν ἐποιησάμεθα περὶ εἰρήνης καὶ ὁμονοίας ἐν τῇδε τῇ ἐπιστολῇ.
