review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la sintaxis y el sentido general del griego y del English POB: alegría/gozo, obediencia a lo escrito por mediación del Espíritu Santo, cortar la ira asociada con los celos, y la referencia a la petición hecha por paz y concordia. Sin embargo, dos elecciones importantes se desvían: (1) τῆς ζήλους ὑμῶν se ha convertido en ''vuestra celosa indignación'', que duplica y desplaza ὀργή; el griego distingue la ira como núcleo y los celos como su fuente/posesión. (2) ἔντευξις se aproxima mejor a ''petición'' o ''súplica/apelación'' que a ''exhortación'', ya que el sustantivo señala la solicitud hecha en la carta, no solo su tono exhortativo.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'vuestra celosa indignación' suena rebuscado y semánticamente confuso. También 'arrancáis' funciona, aunque 'extirpáis' o 'cortáis de raíz' reflejaría mejor ἐκκόπτω; no es imprescindible cambiarlo. La revisión propuesta mejora naturalidad y precisión sin volverse rígida.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. 'Espíritu Santo' está bien. No aparecen términos como Yahvé/Mesías/esclavo que exijan intervención. La principal cuestión léxica es representar ζῆλος como 'celos' aquí, en línea con el English POB ('jealousy'), y ἔντευξις como 'petición'/'apelación' más que 'exhortación'.
  issues:
  - severity: high
    issue: ζήλους se tradujo como 'celosa indignación'
    rationale: El griego dice literalmente 'la ira impía de vuestros celos/jealousy'. El borrador hace que 'indignación' repita la idea de ὀργή ('ira') y convierte ζῆλος en un adjetivo ('celosa'), alterando la relación entre los términos.
  - severity: medium
    issue: ἔντευξιν se tradujo como 'exhortación'
    rationale: Aunque el contexto es exhortativo, ἔντευξις apunta más concretamente a una petición, súplica o apelación hecha por los autores. 'Exhortación' desplaza el foco desde la solicitud a la mera amonestación.
  - severity: low
    issue: '''gran alegría'' para ἀγαλλίασις es aceptable pero menos preciso que una forma de júbilo/exultación'
    rationale: No es un error grave, pero ἀγαλλίασις tiene matiz más intenso que simple 'gran alegría'. Puede mantenerse por naturalidad si el resto se corrige.
  revised_spanish_text: Porque nos daréis gozo y gran alegría, si, volviéndoos obedientes a lo que hemos escrito por medio del Espíritu Santo, arrancáis la impía ira de vuestros celos, conforme a la petición que hicimos en esta carta acerca de la paz y la concordia.
  revision_rationale: 'Se corrigen dos puntos para ajustar el español al griego y al English POB: ''de vuestros celos'' restablece la relación entre ζῆλος y ὀργή, y ''petición'' refleja mejor ἔντευξις que ''exhortación''. Se conserva el resto del phrasing porque ya es fiel y legible en español eclesial moderno.'
