base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/063/001.yaml
  text: 'Therefore it is fitting that, having come near to such and so many examples, we should submit ourselves and, laying aside arrogant and boastful stubbornness and anger, attain the goal set before us in truth, without any blemish. 2. For you will give us joy and exultation if, becoming obedient to the things written by us through the Holy Spirit, you cut off the lawless anger of your jealousy, in accordance with the appeal that we made in this letter concerning peace and concord. 3. And we have sent faithful and prudent men, who from youth until old age have conducted themselves blamelessly among us; these also will be witnesses between you and us. 4. And we have done this so that you may know that all our care has been, and is, for this: that you may quickly be at peace.'
