translation:
  language: es
  text: 'Por tanto, es conveniente que, habiéndonos acercado a tales y tantos ejemplos, nos sometamos y, dejando de lado la obstinación arrogante y jactanciosa, alcancemos la meta puesta delante de nosotros en verdad, sin ninguna mancha. 2. Pues nos daréis gozo y exultación si, haciéndoos obedientes a las cosas escritas por nosotros por medio del Espíritu Santo, cortáis la ira ilícita de vuestros celos, conforme a la apelación que hicimos en esta carta acerca de la paz y la concordia. 3. Y hemos enviado hombres fieles y prudentes, que desde la juventud hasta la vejez se han conducido sin reproche entre nosotros; estos también serán testigos entre vosotros y nosotros. 4. Y hemos hecho esto para que sepáis que toda nuestra solicitud ha sido, y es, esta: que pronto estéis en paz.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Θεμιτόν
  english_pob_choice: it is fitting
  chosen_spanish: es conveniente
  alternatives_spanish:
  - es justo
  - es apropiado
  - es lícito
  lexicon: LSJ
  rationale: «Conveniente» expresa adecuación moral y retórica sin reducir el término a mera legalidad.
- source_word: ὑποδείγμασιν
  english_pob_choice: examples
  chosen_spanish: ejemplos
  alternatives_spanish:
  - modelos
  - patrones
  lexicon: LSJ
  rationale: «Ejemplos» comunica de manera natural la fuerza ejemplar de los precedentes citados.
- source_word: ὑποθεῖναι τὸν τράχηλον
  english_pob_choice: bow the neck
  chosen_spanish: nos sometamos
  alternatives_spanish:
  - doblemos el cuello
  - pongamos el cuello bajo
  - inclinemos el cuello
  lexicon: LSJ
  rationale: El español mantiene la idea de sumisión sin forzar una imagen corporal poco natural en la frase completa.
- source_word: ὑπακοή
  english_pob_choice: obedience
  chosen_spanish: obedientes
  alternatives_spanish:
  - obediencia
  - sumisión
  - cumplimiento
  lexicon: BDAG
  rationale: En este contexto, el adjetivo verbal fluye mejor en español y conserva el matiz de respuesta obediente a lo escrito.
- source_word: σκοπός
  english_pob_choice: goal
  chosen_spanish: meta
  alternatives_spanish:
  - objetivo
  - fin
  - blanco
  lexicon: BDAG
  rationale: «Meta» transmite con claridad la imagen teleológica de un punto al que se avanza.
- source_word: δίχα παντὸς μώμου
  english_pob_choice: without any blemish
  chosen_spanish: sin ninguna mancha
  alternatives_spanish:
  - sin ningún defecto
  - sin reproche
  - sin mancha alguna
  lexicon: LSJ
  rationale: «Sin ninguna mancha» preserva el tono moral y casi cultual del griego, como en el auditable «blemish» inglés.
- source_word: ἀγαλλίασιν
  english_pob_choice: exultation
  chosen_spanish: exultación
  alternatives_spanish:
  - gozo intenso
  - alegría
  - regocijo
  lexicon: BDAG
  rationale: Se distingue de χαρά con un término más elevado e intenso, siguiendo la decisión inglesa.
- source_word: τοῖς ὑφʼ ἡμῶν γεγραμμένοις διὰ τοῦ ἁγίου πνεύματος
  english_pob_choice: the things written by us through the Holy Spirit
  chosen_spanish: las cosas escritas por nosotros por medio del Espíritu Santo
  alternatives_spanish:
  - lo escrito por nosotros por medio del Espíritu Santo
  - las cosas que hemos escrito por medio del Espíritu Santo
  lexicon: BDAG
  rationale: Conserva la afirmación fuerte de mediación del Espíritu sin suavizarla ni convertirla en mera asistencia inspiracional.
- source_word: ἐκκόψητε
  english_pob_choice: you cut off
  chosen_spanish: cortáis
  alternatives_spanish:
  - arrancáis
  - cortáis de raíz
  - elimináis
  lexicon: LSJ
  rationale: El verbo español mantiene la imagen decisiva y violenta de separación marcada por el griego.
- source_word: ἄθεμον
  english_pob_choice: lawless
  chosen_spanish: sin ley
  alternatives_spanish:
  - impía
  - inicua
  - ilegal
  lexicon: LSJ
  rationale: «Sin ley» conserva la raíz de la transgresión de un orden normativo; en combinación con «ira» resulta claro y auditable.
- source_word: ζήλους
  english_pob_choice: jealousy
  chosen_spanish: celo
  alternatives_spanish:
  - celos
  - envidia
  - zelos
  lexicon: BDAG
  rationale: Aquí se opta por «celo» para mantener la ambivalencia del término y evitar una psicologización excesiva; el contexto negativo lo califica como ira «sin ley».
- source_word: ἔντευξιν
  english_pob_choice: appeal
  chosen_spanish: apelación
  alternatives_spanish:
  - súplica
  - ruego
  - intercesión
  lexicon: BDAG
  rationale: «Apelación» conserva el carácter formal y exhortativo de la petición hecha en la carta.
- source_word: ὁμονοίας
  english_pob_choice: concord
  chosen_spanish: concordia
  alternatives_spanish:
  - unidad
  - armonía
  lexicon: LSJ
  rationale: «Concordia» mantiene el registro eclesial y retórico, distinguiéndolo de «paz».
- source_word: σώφρονας
  english_pob_choice: prudent
  chosen_spanish: prudentes
  alternatives_spanish:
  - sensatos
  - mesurados
  - juiciosos
  lexicon: BDAG
  rationale: «Prudentes» expresa juicio maduro y aptitud para actuar como emisarios confiables.
- source_word: ἀναστραφέντας
  english_pob_choice: have conducted themselves
  chosen_spanish: se han conducido
  alternatives_spanish:
  - han vivido
  - se han comportado
  lexicon: BDAG
  rationale: La forma reflexiva española reproduce bien la idea de modo de vida o conducta sostenida.
- source_word: ἀμέμπτως
  english_pob_choice: blamelessly
  chosen_spanish: sin reproche
  alternatives_spanish:
  - irreprochablemente
  - sin culpa
  - intachablemente
  lexicon: BDAG
  rationale: «Sin reproche» es claro y reproduce la valoración moral pública del término.
- source_word: μάρτυρες
  english_pob_choice: witnesses
  chosen_spanish: testigos
  alternatives_spanish:
  - testificadores
  - atestiguadores
  lexicon: BDAG
  rationale: «Testigos» es el equivalente natural para quienes pueden dar fe entre ambas partes.
- source_word: φροντίς
  english_pob_choice: care
  chosen_spanish: solicitud
  alternatives_spanish:
  - cuidado
  - preocupación
  - atención
  lexicon: BDAG
  rationale: «Solicitud» comunica atención diligente y pastoral sin reducirla a mera inquietud emocional.
- source_word: εἰρηνεῦσαι
  english_pob_choice: be at peace
  chosen_spanish: estéis en paz
  alternatives_spanish:
  - os reconciliéis
  - lleguéis a la paz
  - seáis pacificados
  lexicon: LSJ
  rationale: La forma «estéis en paz» sigue de cerca la lectura inglesa revisada y evita sobreinterpretar una pasiva explícita.
theological_decisions:
- issue: Autoridad de la escritura por medio del Espíritu Santo
  english_pob_reading: the things written by us through the Holy Spirit
  chosen_spanish_reading: las cosas escritas por nosotros por medio del Espíritu Santo
  alternative_spanish_readings:
  - lo escrito por nosotros por medio del Espíritu Santo
  - las cosas que hemos escrito por medio del Espíritu Santo
  rationale: Se conserva la afirmación directa de mediación pneumatológica sin suavizarla ni transformarla en mera inspiración general.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: ζήλους en contexto de conflicto comunitario
  english_pob_reading: the lawless anger of your jealousy
  chosen_spanish_reading: la ira sin ley de vuestro celo
  alternative_spanish_readings:
  - la ira sin ley de vuestros celos
  - la ira ilícita de vuestra envidia
  rationale: Aunque «celo» puede ser positivo, aquí el contexto de contienda y enojo lo vuelve negativo; la traducción mantiene esa ambivalencia sin eliminarla.
  doctrine_reference: Lexical ambiguity should remain visible when context does not require full disambiguation.
- issue: εἰρηνεῦσαι en el cierre pastoral
  english_pob_reading: that you may quickly be at peace
  chosen_spanish_reading: que pronto estéis en paz
  alternative_spanish_readings:
  - que pronto se os conceda la paz
  - que pronto lleguéis a la paz
  rationale: El cierre apunta a una condición relacional de paz; el español conserva la sencillez pastoral del griego y la revisión inglesa.
  doctrine_reference: Translate the pastoral aim plainly without introducing a doctrinally loaded passive not required by the source.
translation_notes:
  revision_awareness: This draft follows the latest English revision that removed unsupported phrases from verse 1 and simplified verse 4 from a restoration-like formulation to the direct 'be at peace' reading. The Spanish reflects that revision by avoiding any extra imagery such as leaders of souls, resting from sedition, or an explicit restoration passive.
  spanish_consistency_notes:
  - Use 'Espíritu Santo' consistently for ἅγιον πνεῦμα.
  - Prefer 'paz' + 'concordia' as a paired distinction, not synonyms.
  - Keep moral/legal ambiguity in 'sin ley' and 'celo' visible rather than collapsing it into 'envidia' or 'impiedad' unless context forces it.
  - Maintain 'sin reproche' for ἀμέμπτως across this record.
