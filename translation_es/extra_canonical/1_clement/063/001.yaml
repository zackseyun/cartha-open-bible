  text: Θεμιτὸν οὖν ἐστὶν τοῖς τοιούτοις καὶ τοσούτοις ὑποδείγμασιν προσεληλυθότας ὑποθεῖναι τὸν τράχηλον καὶ τὸν τῆς ὑπακατὰ τὸν προκείμενον ἡμῖν ἐν ἀληθείᾳ σκοπὸν δίχα παντὸς μώμου καταντήσωμεν. 2. χαρὰν γὰρ καὶ ἀγαλλίασιν ἡμῖν παρέξετε, ἐὰν ὑπήκοοι γενήμενοι τοῖς ὑφʼ ἡμῶν γεγραμμένοις διὰ τοῦ ἁγίου πνεύματος ἐκκόψητε τὴν ἄθεμον τῆς ζήλους ὑμῶν ὀργὴν κατὰ τὴν ἔντευξιν, ἣν ἐποιησάμεθα περὶ εἰρήνης καὶ ὁμονοίας ἐν τῇδε τῇ ἐπιστολῇ. 3. ἐπέμψαμεν δὲ ἄνδρας πιστοὺς καὶ σώφρονας ἀπὸ νεότητος ἀναστραφέντας ἕως γήρους ἀμέμπτως ἐν ἡμῖν, οἵτινες καὶ μάρτυρες ἔσονται μεταξὺ ὑμῶν καὶ ἡμῶν. 4. τοῦτο δὲ ἐποιήσαμεν, ἵνα εἰδῆτε, ὅτι πᾶσα ἡμῶν φροντὶς καὶ γέγονεν καὶ ἔστιν εἰς τὸ ἐν τάχει ὑμᾶς εἰρηνεῦσαι.
