  to: 'Por tanto, es conveniente que, habiéndonos acercado a tales y tantos ejemplos, nos sometamos y, dejando de lado la obstinación arrogante y jactanciosa, alcancemos la meta puesta delante de nosotros en verdad, sin ninguna mancha. 2. Pues nos daréis gozo y exultación si, haciéndoos obedientes a las cosas escritas por nosotros por medio del Espíritu Santo, cortáis la ira ilícita de vuestros celos, conforme a la apelación que hicimos en esta carta acerca de la paz y la concordia. 3. Y hemos enviado hombres fieles y prudentes, que desde la juventud hasta la vejez se han conducido sin reproche entre nosotros; estos también serán testigos entre vosotros y nosotros. 4. Y hemos hecho esto para que sepáis que toda nuestra solicitud ha sido, y es, esta: que pronto estéis en paz.'
