base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/063/003.yaml
  text: And we have sent faithful and prudent men, who from youth until old age have conducted themselves blamelessly among us; these will also be witnesses between you and us.
  revision_pass:
