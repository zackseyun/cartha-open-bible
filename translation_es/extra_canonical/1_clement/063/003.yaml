translation:
  language: es
  text: Y hemos enviado hombres fieles y prudentes, que desde la juventud hasta la vejez se han conducido irreprochablemente entre nosotros; estos también serán testigos entre ustedes y nosotros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πιστοὺς
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - leales
  - fidedignos
  lexicon: πιστός
  rationale: «Fieles» conserva la idea de confiabilidad y constancia en sentido moral y relacional, y funciona de manera natural en español eclesial. «Leales» estrecha demasiado el matiz hacia la fidelidad política o de adhesión personal.
- source_word: σώφρονας
  english_pob_choice: prudent
  chosen_spanish: prudentes
  alternatives_spanish:
  - sensatos
  - templanates
  lexicon: σώφρων
  rationale: La traducción tradicional y precisa para el juicio recto y sobrio de σώφρων es «prudentes». Mantiene el matiz de sensatez disciplinada sin reducirlo sólo a inteligencia o moderación.
- source_word: ἀπὸ νεότητος ἀναστραφέντας ἕως γήρους
  english_pob_choice: who from youth until old age have conducted themselves
  chosen_spanish: que desde la juventud hasta la vejez se han conducido
  alternatives_spanish:
  - que desde jóvenes hasta la ancianidad han vivido
  - que desde su juventud hasta su vejez han actuado
  lexicon: ἀναστρέφω
  rationale: «Se han conducido» refleja bien el sentido de conducta habitual o manera de vivir, más que un simple movimiento físico. «Desde la juventud hasta la vejez» reproduce la extensión temporal del griego con claridad natural en español.
- source_word: ἀμέμπτως
  english_pob_choice: blamelessly
  chosen_spanish: irreprochablemente
  alternatives_spanish:
  - sin culpa
  - sin reproche
  lexicon: ἀμέμπτως
  rationale: «Irreprochablemente» conserva el valor ético de ausencia de motivo legítimo de reproche. Es más idiomático y formal que «sin culpa», que podría sonar absolutizante o forense en español.
- source_word: μάρτυρες
  english_pob_choice: witnesses
  chosen_spanish: testigos
  alternatives_spanish:
  - testigos presenciales
  - atestiguadores
  lexicon: μάρτυς
  rationale: «Testigos» es la equivalencia directa y comunicable. Aquí no conviene cargar de antemano el sentido posterior de «mártir», aunque la palabra griega está emparentada con esa evolución semántica.
theological_decisions:
- issue: Relación entre «entre ustedes y nosotros» y el valor comunitario del testimonio
  english_pob_reading: these will also be witnesses between you and us
  chosen_spanish_reading: estos también serán testigos entre ustedes y nosotros
  alternative_spanish_readings:
  - estos también serán testigos entre vosotros y nosotros
  - estos serán también testigos entre ustedes y nosotros
  rationale: Se mantiene la estructura de reciprocidad del testimonio como mediación entre dos comunidades. «Entre ustedes y nosotros» es claro en español neutral y conserva el valor relacional del original.
  doctrine_reference: Testimonio eclesial y verificación comunitaria en contextos de apelación moral.
translation_notes:
  revision_awareness: La revisión más reciente indica acuerdo alto y ningún cambio necesario; por eso el borrador sigue de cerca la traducción inglesa POB, pero ajusta la sintaxis al español natural y conserva el contenido semántico del griego sin añadir ampliaciones.
  spanish_consistency_notes:
  - Se usa «fieles» para πιστοὺς y «prudentes» para σώφρονας, en línea con un registro eclesial claro.
  - «Testigos» se mantiene sin desarrollar el parentesco con «mártir», porque el contexto inmediato es probatorio, no hagiográfico.
  - Se evita «SEÑOR» o terminología divina porque el versículo no contiene referencias al nombre divino ni a κύριος en sentido teológico.
