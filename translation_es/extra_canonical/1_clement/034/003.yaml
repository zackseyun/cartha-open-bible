translation:
  language: es
  text: 'Porque[a] nos dice de antemano: «He aquí el Señor, y su recompensa está delante de él, para retribuir a cada uno según su obra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque nos lo anuncia de antemano».'
    reason: alternative_rendering_of_προλέγει
lexical_decisions:
- source_word: προλέγει
  english_pob_choice: says beforehand
  chosen_spanish: nos lo anuncia de antemano
  alternatives_spanish:
  - nos lo dice antes
  - lo anuncia previamente
  - nos forewarns
  lexicon: προλέγω
  rationale: La idea central es decir/manifestar con anticipación. «Anuncia de antemano» conserva la anticipación sin añadir necesariamente la intensidad admonitoria de «advertir», y funciona mejor en español que un calco como «dice antes». El objeto implícito se expresa con «nos lo» por claridad natural en español.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Kyrios
  - Yahvé
  lexicon: κύριος
  rationale: Aquí el texto griego cita una formulación bíblica reverente donde κύριος remite al título divino; en español, la forma establecida y más fiel al registro bíblico es «el Señor». No se reemplaza por «Yahvé» porque el eco de cita en griego mantiene la forma titulada más que la pronunciación del nombre.
- source_word: ὁ μισθὸς αὐτοῦ
  english_pob_choice: his reward
  chosen_spanish: su recompensa
  alternatives_spanish:
  - su salario
  - su paga
  - su retribución
  lexicon: μισθός
  rationale: «Recompensa» preserva el sentido de retribución debida y mantiene el tono escritural. «Salario» o «paga» sonarían demasiado laborales; «retribución» es posible, pero en español eclesial resulta más técnico y menos transparente.
- source_word: πρὸ προσώπου αὐτοῦ
  english_pob_choice: is before him
  chosen_spanish: está delante de él
  alternatives_spanish:
  - está ante su rostro
  - está delante de su rostro
  - está en su presencia
  lexicon: πρὸ προσώπου
  rationale: La expresión literal significa «delante de su rostro», pero en español eso suena duro y poco natural. «Está delante de él» conserva la imagen de presencia inmediata sin perder la relación espacial del griego.
- source_word: ἀποδοῦναι
  english_pob_choice: to repay
  chosen_spanish: para retribuir
  alternatives_spanish:
  - para pagar
  - para dar a cada uno
  - para recompensar
  lexicon: ἀποδίδωμι
  rationale: El verbo expresa devolver o dar correspondientemente. «Retribuir» mantiene la correspondencia justa del acto divino y su tono formal; «pagar» sería más concreto pero menos adecuado para este contexto.
- source_word: ἑκάστῳ
  english_pob_choice: each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada cual
  - a todos
  lexicon: ἕκαστος
  rationale: «A cada uno» es la formulación más natural y exacta en español para la distribución individual del juicio/recompensa.
- source_word: κατὰ τὸ ἔργον αὐτοῦ
  english_pob_choice: according to his work
  chosen_spanish: según su obra
  alternatives_spanish:
  - conforme a su obra
  - de acuerdo con sus obras
  - según sus obras
  lexicon: ἔργον
  rationale: En singular, el griego habla de «su obra». «Según su obra» respeta la singularidad y el paralelismo bíblico; «según sus obras» introduciría pluralidad no presente en el texto.
theological_decisions:
- issue: Retribución divina individual según la obra
  english_pob_reading: to repay each one according to his work
  chosen_spanish_reading: para retribuir a cada uno según su obra
  alternative_spanish_readings:
  - para pagar a cada uno según sus obras
  - para recompensar a cada uno conforme a lo que haya hecho
  rationale: El texto presenta una retribución individual y proporcional. «Retribuir» conserva la idea de correspondencia moral sin suavizarla. Se mantiene el singular «obra» para no desplazar el peso del original.
  doctrine_reference: principio bíblico de juicio y recompensa según las obras; cf. Romanos 2:6; Apocalipsis 22:12
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del inglés POB al mantener la estructura de cita y la cláusula final de retribución, pero adapta al español la preferencia revisada por una forma más literal de προλέγει sin introducir la carga de «advertir». También conserva la relación espacial de πρὸ προσώπου αὐτοῦ con una solución idiomática natural.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en una cita bíblica reverente, coherente con el registro del pasaje.
  - Se mantiene «recompensa» y «retribuir» para conservar la idea de correspondencia justa, sin diluirla en lenguaje meramente moral.
  - Se conserva el singular «obra» porque el griego es singular.
  - La cita se presenta con comillas angulares y puntuación española publicable.
