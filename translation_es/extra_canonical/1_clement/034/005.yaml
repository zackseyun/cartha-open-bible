translation:
  language: es
  text: Que nuestro motivo de gloria[a] y nuestra confianza estén en él. Sométamonos a su voluntad. Consideremos la multitud entera de sus ángeles, cómo están delante de él y sirven conforme a su voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ‘nuestra jactancia’ o ‘nuestro gloriarnos’; gr. καύχημα, aquí en sentido positivo: aquello en lo que uno se gloria, centrado en Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ καύχημα
  english_pob_choice: boasting
  chosen_spanish: jactarnos
  alternatives_spanish:
  - gloriarnos
  - nuestro motivo de jactancia
  lexicon: καύχημα
  rationale: En este contexto, la idea no es mera vanagloria, sino aquello de lo que uno se jacta o en lo que se gloria. En español, ‘jactarnos’ conserva el matiz de ‘boasting’ con naturalidad; ‘gloriarnos’ es posible, pero puede sonar más marcado por tradición bíblica. Se eligió una formulación personal porque el griego funciona de manera inclusiva en exhortación.
- source_word: ἡ παρρησία
  english_pob_choice: boldness
  chosen_spanish: confianza
  alternatives_spanish:
  - denuedo
  - valentía
  lexicon: παρρησία
  rationale: παρρησία puede significar franqueza, libertad de palabra o audacia confiada. Aquí, junto a ‘boasting’, la POB inglesa resalta la seguridad/valor del creyente ante Dios. ‘Confianza’ comunica bien esa seguridad reverente en español; ‘denuedo’ sería una alternativa más literal pero más eclesiástica.
- source_word: ὑποτασσώμεθα τῷ θελήματι αὐτοῦ
  english_pob_choice: submit ourselves to his will
  chosen_spanish: Sométamonos a su voluntad
  alternatives_spanish:
  - sujetémonos a su voluntad
  - entreguémonos a su voluntad
  lexicon: ὑποτάσσω; θέλημα
  rationale: El verbo medio exhortativo pide una forma inclusiva de primera persona plural en español. ‘Sométamonos’ reproduce de modo directo la fuerza de la exhortación. ‘Voluntad’ es el equivalente normal de θέλημα y mantiene el sentido de obediencia divina.
- source_word: κατανοήσωμεν
  english_pob_choice: let us consider
  chosen_spanish: Consideremos
  alternatives_spanish:
  - tomemos en cuenta
  - reflexionemos sobre
  lexicon: κατανοέω
  rationale: El verbo implica observar con atención, comprender o considerar detenidamente. ‘Consideremos’ preserva bien la llamada a una atención reflexiva sin sobreinterpretar.
- source_word: τὸ πᾶν πλῆθος τῶν ἀγγέλων αὐτοῦ
  english_pob_choice: the whole multitude of his angels
  chosen_spanish: la multitud entera de sus ángeles
  alternatives_spanish:
  - todo el ejército de sus ángeles
  - la totalidad de sus ángeles
  lexicon: πᾶν πλῆθος; ἄγγελος
  rationale: ‘Multitud entera’ sigue de cerca el griego y mantiene la idea de totalidad colectiva. ‘Ejército’ introduciría una metáfora no explicitada en el texto.
- source_word: πῶς ... λειτουργοῦσιν παρεστῶτες
  english_pob_choice: how they stand by and minister
  chosen_spanish: cómo están de pie y ministran
  alternatives_spanish:
  - cómo permanecen y sirven
  - cómo están presentes y sirven litúrgicamente
  lexicon: λειτουργέω; παρίστημι
  rationale: El griego describe a los ángeles como presentes ante Dios y ejerciendo servicio. ‘Están de pie’ conserva παρεστῶτες; ‘ministran’ reproduce λειτουργοῦσιν sin reducirlo a un servicio meramente eclesiástico. Se prefirió no añadir ‘litúrgicamente’ porque el texto no lo exige.
theological_decisions:
- issue: Sede de la jactancia/confianza en Dios
  english_pob_reading: Let our boasting and our boldness be in him.
  chosen_spanish_reading: Nuestro jactarnos y nuestra confianza sean en él.
  alternative_spanish_readings:
  - Nuestro motivo de jactancia y nuestra confianza sean en él.
  - Nuestra gloria y nuestro denuedo estén en él.
  rationale: La frase conserva el contraste entre una jactancia legítima y una seguridad reverente, ambas centradas en Dios. Se evita neutralizar el posible matiz positivo de καύχημα, que en contexto no es orgullo pecaminoso sino dependencia en Dios.
  doctrine_reference: 1 Co 1:31; 2 Co 3:4-5
- issue: Obediencia a la voluntad divina
  english_pob_reading: Let us submit ourselves to his will.
  chosen_spanish_reading: Sométamonos a su voluntad.
  alternative_spanish_readings:
  - Sujetémonos a su voluntad.
  - Entreguémonos a su voluntad.
  rationale: La exhortación no es meramente aceptación pasiva, sino reconocimiento práctico de la autoridad de Dios. ‘Sométamonos’ expresa bien esa subordinación voluntaria.
  doctrine_reference: Mt 6:10; Ro 12:1-2
- issue: Los ángeles como modelo de servicio
  english_pob_reading: how they stand by and minister to his will.
  chosen_spanish_reading: cómo están de pie y ministran a su voluntad.
  alternative_spanish_readings:
  - cómo permanecen y sirven a su voluntad.
  - cómo están presentes y le sirven.
  rationale: Se mantiene la imagen de presencia reverente y servicio continuo. No se suaviza ‘ministran’, porque el texto presenta a los ángeles como servidores obedientes ante Dios.
  doctrine_reference: Sal 103:20-21; Heb 1:14
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto griego normalizado y con la traducción inglesa auditada; no se registran revisiones aplicadas, y el estado final fue confirmado como sin cambios en la pasada más reciente.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma predeterminada para el nombre divino cuando corresponde; aquí el texto usa ὁ θεός/αὐτοῦ y se traduce naturalmente con ‘él/su’ sin necesidad de nombrarlo explícitamente.
  - Se conserva un registro sobrio y eclesial, evitando calcos excesivamente literales donde el español requiere fluidez.
  - ‘Ministrar’ se usa en sentido amplio de servicio reverente, no limitado a uso litúrgico institucional.
