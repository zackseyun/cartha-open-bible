review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura exhortativa del griego y conserva la secuencia principal: jactancia/parresía en él, sumisión a su voluntad, y consideración del servicio angélico. Sin embargo, dos puntos necesitan ajuste para reflejar mejor el sentido fuente: (1) τὸ καύχημα ἡμῶν se expresa mejor como un sustantivo nominalizado (''nuestro motivo de gloria/jactancia'') que como el infinitivo ''nuestro jactarnos''; y (2) λειτουργοῦσιν παρεστῶτες no se vierte con naturalidad como ''están de pie y ministran a su voluntad''. El griego describe a los ángeles como estando presentes/delante de él mientras sirven a su voluntad.'
  spanish_quality_summary: El español es comprensible, pero 'Nuestro jactarnos' suena forzado y poco natural en registro bíblico moderno, y 'ministran a su voluntad' resulta extraño en español. Una reparación menor mejora naturalidad y dignidad sin alejarse del original.
  glossary_alignment: No hay conflictos con los términos de proyecto mayores. 'él' para Dios es aceptable por contexto. 'Ministran' puede mantenerse, pero requiere una construcción española más natural ('cumplen su servicio delante de él' o 'le ministran'). 'Confianza' para παρρησία es posible, aunque 'denuedo' o 'audacia' serían más cercanos; no es necesario forzar cambio si se conserva el sentido de seguridad valiente.
  issues:
  - severity: medium
    issue: '''Nuestro jactarnos'' suena poco natural para τὸ καύχημα ἡμῶν'
    rationale: καύχημα aquí es sustantivo ('boasting', 'ground of boasting'), no tanto una acción verbal. En español, 'nuestro motivo de gloria' o 'nuestra jactancia' fluye mejor y refleja mejor la forma fuente.
  - severity: medium
    issue: '''ministran a su voluntad'' es una construcción española poco idiomática'
    rationale: λειτουργοῦσιν τῷ θελήματι αὐτοῦ significa servir/ministrar conforme a su voluntad o a su disposición, no que la voluntad sea el destinatario directo en español. Conviene una formulación como 'sirven conforme a su voluntad' o 'cumplen su servicio delante de él'.
  - severity: low
    issue: '''están de pie'' es demasiado literal para παρεστῶτες en este contexto'
    rationale: La idea es de estar presentes/delante de Dios, asistirle. 'Están delante de él' o 'están a su lado' comunica mejor la función reverente sin perder la imagen.
  revised_spanish_text: Que nuestro motivo de gloria[a] y nuestra confianza estén en él. Sométamonos a su voluntad. Consideremos la multitud entera de sus ángeles, cómo están delante de él y sirven conforme a su voluntad.
  revised_footnotes:
  - marker: a
    text: 'O ‘nuestra jactancia’ o ‘nuestro gloriarnos’; gr. καύχημα, aquí en sentido positivo: aquello en lo que uno se gloria, centrado en Dios.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos giros poco naturales o menos fieles al griego: se sustituye ''Nuestro jactarnos'' por ''nuestro motivo de gloria'' para reflejar mejor el sustantivo καύχημα, y se rehace la cláusula angélica para expresar con español natural la combinación παρεστῶτες + λειτουργοῦσιν, evitando el extraño ''ministran a su voluntad''. Se mantiene ''confianza'' como opción defendible para παρρησία.'
