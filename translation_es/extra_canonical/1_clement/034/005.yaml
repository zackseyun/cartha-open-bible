  text: τὸ καύχημα ἡμῶν καὶ ἡ παρρησία ἔστω ἐν αὐτῷ· ὑποτασσώμεθα τῷ θελήματι αὐτοῦ· κατανοήσωμεν τὸ πᾶν πλῆθος τῶν ἀγγέλων αὐτοῦ, πῶς τῷ θελήματι αὐτοῦ λειτουργοῦσιν παρεστῶτες.
