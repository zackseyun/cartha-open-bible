revisions:
- from: Nuestro jactarnos y nuestra confianza[a] sean en él. Sométamonos a su voluntad. Consideremos la multitud entera de sus ángeles, cómo están de pie y ministran a su voluntad.
  to: Que nuestro motivo de gloria[a] y nuestra confianza estén en él. Sométamonos a su voluntad. Consideremos la multitud entera de sus ángeles, cómo están delante de él y sirven conforme a su voluntad.
  rationale: 'Se corrigen dos giros poco naturales o menos fieles al griego: se sustituye ''Nuestro jactarnos'' por ''nuestro motivo de gloria'' para reflejar mejor el sustantivo καύχημα, y se rehace la cláusula angélica para expresar con español natural la combinación παρεστῶτες + λειτουργοῦσιν, evitando el extraño ''ministran a su voluntad''. Se mantiene ''confianza'' como opción defendible para παρρησία.'
  reviewer_model: gpt-5.4
