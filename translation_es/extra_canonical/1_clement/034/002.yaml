  text: δεῖν οὖν ἐστὶ προθύμους ἡμᾶς εἶναι εἰς ἀγαθοποιΐαν· ἐξ αὐτοῦ γάρ ἐστιν τὰ πάντα.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/034/002.yaml
  text: Therefore we must be eager for doing good[a], for from him are all things.
  footnotes:
  - marker: a
    text: Or 'eager for doing good'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
