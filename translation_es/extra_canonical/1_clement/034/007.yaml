review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido global del griego: exhortación comunitaria, reunión en concordia, clamor intenso a Dios y propósito de llegar a ser partícipes de sus promesas. Sin embargo, la nota al pie [a] no preserva fielmente el rastro auditado en inglés. La alternativa documentada se refiere a ἐπὶ τὸ αὐτό como «juntos / en un mismo lugar», no a una finalidad «para estar en un mismo lugar», que altera la sintaxis y el sentido.'
  spanish_quality_summary: El texto es claro, natural y eclesialmente legible. «Con un solo ánimo» suena bien en español y representa adecuadamente la decisión auditada de evitar «conciencia» en este contexto. «Como de una sola boca» es fiel, aunque algo literal; sigue siendo inteligible y conserva la imagen del original. La única reparación necesaria es la nota al pie.
  glossary_alignment: 'No hay conflictos con la terminología marco del proyecto. Las decisiones léxicas principales son apropiadas: «concordia» para ὁμονοίᾳ, «con un solo ánimo» para τῇ συνειδήσει según la auditoría inglesa, «partícipes» para μετόχους y «promesas» para ἐπαγγελιῶν. La representación de ὡς ἐξ ἑνὸς στόματος como «como de una sola boca» preserva la metáfora fuente.'
  issues:
  - severity: medium
    issue: La nota al pie [a] traduce mal la alternativa auditada
    rationale: El inglés preserva como alternativa «gathered together in concord to the same place», es decir, una posibilidad ligada a «reunidos ... en un mismo lugar». El borrador español dice «para estar en un mismo lugar», que convierte una alternativa adverbial/locativa en una cláusula final y cambia el sentido.
  revised_spanish_text: Así pues[a], reunidos también nosotros en concordia, con un solo ánimo, clamemos a él con insistencia, como de una sola boca, para que lleguemos a ser partícipes de sus grandes y gloriosas promesas.
  revised_footnotes:
  - marker: a
    text: 'O: «Así pues, reunidos también nosotros en concordia en un mismo lugar»'
    reason: Preserva correctamente la alternativa documentada para ἐπὶ τὸ αὐτό sin introducir una finalidad inexistente.
  revision_rationale: El texto principal puede mantenerse. Se corrige únicamente la nota al pie para reflejar con fidelidad la alternativa auditada sobre ἐπὶ τὸ αὐτό.
