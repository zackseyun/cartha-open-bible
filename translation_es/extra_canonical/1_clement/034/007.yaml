id: 1CLEM.34.7
reference: 1 Clement 34:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ ἡμεῖς οὖν ἐν ὁμονοίᾳ ἐπὶ τὸ αὐτὸ συναχθέντες τῇ συνειδήσει, ὡς ἐξ ἑνὸς στόματος βοήσωμεν πρὸς αὐτὸν ἐκτενῶς εἰς τὸ μετόχους ἡμᾶς γενέσθαι τῶν μεγάλων καὶ ἐνδόξων ἐπαγγελιῶν αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/034/007.yaml
  text: So then[a], let us also, having been gathered together in concord with one mind, cry out to him earnestly as from one mouth, so that we may become sharers in his great and glorious promises.
  footnotes:
  - marker: a
    text: Or 'gathered together in concord to the same place'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:28Z'
    unchanged: false
    changes_summary: Revised 'in one place' to 'having been gathered together' to reflect συναχθέντες without adding location; changed 'with one conscience' to 'with one mind' for τῇ συνειδήσει in this context; adjusted word order for more natural English while preserving 'as from one mouth' and the purpose clause.
translation:
  language: es
  text: Así pues[a], reunidos también nosotros en concordia, con un solo ánimo, clamemos a él con insistencia, como de una sola boca, para que lleguemos a ser partícipes de sus grandes y gloriosas promesas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: «Así pues, reunidos también nosotros en concordia, para estar en un mismo lugar».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ὁμονοίᾳ
  english_pob_choice: in concord
  chosen_spanish: en concordia
  alternatives_spanish:
  - unidos
  - en unanimidad
  lexicon: ὁμονοία
  rationale: «Concordia» conserva la idea de unidad armoniosa sin volverla meramente emocional; encaja bien en español eclesial sin perder el matiz comunitario.
- source_word: ἐπὶ τὸ αὐτὸ
  english_pob_choice: having been gathered together
  chosen_spanish: reunidos
  alternatives_spanish:
  - juntos
  - en un mismo lugar
  lexicon: ἐπὶ τὸ αὐτὸ
  rationale: El giro griego marca reunión conjunta sin exigir explícitamente lugar; «reunidos» refleja la acción sin añadir localización, como hizo la revisión inglesa.
- source_word: τῇ συνειδήσει
  english_pob_choice: with one mind
  chosen_spanish: con un solo ánimo
  alternatives_spanish:
  - con una sola conciencia
  - con una sola mente
  lexicon: συνείδησις
  rationale: Aunque el término puede ser «conciencia», en este contexto el contexto auditado inglés favorece una unidad interior de intención; «ánimo» comunica esa convergencia sin sonar forzado en español.
- source_word: ὡς ἐξ ἑνὸς στόματος
  english_pob_choice: as from one mouth
  chosen_spanish: como de una sola boca
  alternatives_spanish:
  - como si fuera una sola voz
  - como desde una sola boca
  lexicon: στόμα
  rationale: Se conserva la imagen corporal de la expresión idiomática griega, que subraya unanimidad en la súplica y no solo similitud de contenido.
- source_word: μετόχους
  english_pob_choice: sharers
  chosen_spanish: partícipes
  alternatives_spanish:
  - participantes
  - copartícipes
  lexicon: μέτοχος
  rationale: «Partícipes» es un equivalente natural y preciso para la idea de compartir una realidad prometida; mantiene el valor relacional del término.
- source_word: ἐπαγγελιῶν
  english_pob_choice: promises
  chosen_spanish: promesas
  alternatives_spanish:
  - promesas hechas
  - promesas divinas
  lexicon: ἐπαγγελία
  rationale: «Promesas» traduce de forma directa y sobria; el contexto ya hace claro que proceden de Dios, por lo que no se requiere explicitarlo en el texto principal.
theological_decisions:
- issue: Unidad comunitaria como condición de la súplica
  english_pob_reading: having been gathered together in concord with one mind
  chosen_spanish_reading: reunidos también nosotros en concordia, con un solo ánimo
  alternative_spanish_readings:
  - reunidos en un mismo lugar
  - unidos en una sola conciencia
  rationale: La cláusula expresa una reunión corporativa caracterizada por concordia interior; «un solo ánimo» preserva la unidad interior sin reducirla a mera ubicación física.
  doctrine_reference: Eclesiología de la comunión; unidad visible de la asamblea
- issue: Tensión semántica de συνείδησις
  english_pob_reading: with one mind
  chosen_spanish_reading: con un solo ánimo
  alternative_spanish_readings:
  - con una sola conciencia
  - con una sola mente
  rationale: La audiencia española puede leer «conciencia» como culpa o moralidad individual. Aquí el contexto favorece un sentido de disposición interior compartida; por eso se elige «ánimo», manteniendo la tensión semántica sin banalizarla.
  doctrine_reference: Antropología bíblica; vida comunitaria unificada
- issue: 'Finalidad de la reunión: heredar promesas'
  english_pob_reading: so that we may become sharers in his great and glorious promises
  chosen_spanish_reading: para que lleguemos a ser partícipes de sus grandes y gloriosas promesas
  alternative_spanish_readings:
  - para ser partícipes
  - a fin de participar en sus promesas
  rationale: 'Se conserva el propósito explícito: la reunión y la súplica tienen como fin la participación en las promesas; no se suaviza a una mera esperanza abstracta.'
  doctrine_reference: Promesa divina; participación en los bienes prometidos
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que aclaró ἐπὶ τὸ αὐτὸ como reunión conjunta sin imponer «mismo lugar» en el cuerpo principal, y la decisión de traducir τῇ συνειδήσει como «with one mind»; la versión española sigue esa línea con «reunidos» y «con un solo ánimo», manteniendo además la imagen idiomática «como de una sola boca».
  spanish_consistency_notes:
  - Se preservó un registro sobrio y litúrgico sin recurrir a fórmulas eclesiásticas más tradicionales que el griego no exige.
  - No se introdujo «Cristo» ni terminología cristológica porque el versículo no la contiene.
  - La nota alternativa de la reunión en un mismo lugar quedó anclada en el texto con [a] para evitar una nota huérfana.
