revisions:
- from: 'Porque la Escritura dice: «Miríadas de miríadas estaban de pie delante de él, y millares de millares le servían; y clamaban: “Santo, santo, santo es el Señor Sabaot; toda la creación está llena de su gloria”».'
  to: 'Porque la Escritura dice: «Miríadas de miríadas estaban junto a él, y millares de millares le servían», y clamaban: «Santo, santo, santo es Yahvé Sabaot; toda la creación está llena de su gloria».'
  rationale: Se ajusta παρειστήκεισαν a «estaban junto a él» para reflejar mejor presencia ante él sin sobreespecificar postura física. Se cambia «el Señor Sabaot» por «Yahvé Sabaot» para alinearse con la terminología principal del proyecto respecto del nombre divino en una cita escritural, manteniendo la transliteración tradicional de «Sabaot». También se pule la puntuación de las citas para mayor naturalidad en español.
