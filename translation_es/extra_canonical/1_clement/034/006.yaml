base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/034/006.yaml
  text: For the Scripture says, “Myriads of myriads stood by him, and thousands of thousands ministered to him,” and they cried out, “Holy, holy, holy is the Lord Sabaoth; all creation is full of his glory.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:28Z'
    unchanged: false
    changes_summary: Revised “Ten thousand times ten thousand” to “Myriads of myriads” for a more direct and formal rendering of μύριαι μυριάδες. Kept the rest substantially unchanged as accurate and natural.
translation:
  language: es
  text: 'Porque la Escritura dice: «Miríadas de miríadas estaban junto a él, y millares de millares le servían», y clamaban: «Santo, santo, santo es Yahvé Sabaot; toda la creación está llena de su gloria».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μύριαι μυριάδες
  english_pob_choice: Myriads of myriads
  chosen_spanish: Miríadas de miríadas
  alternatives_spanish:
  - Diez mil veces diez mil
  - Decenas de miles por decenas de miles
  lexicon: μυριάς
  rationale: El griego usa una expresión enfática de innumerabilidad/innumerables multitudes; «miríadas de miríadas» conserva la forma intensiva del original y sigue la revisión inglesa más directa y formal.
- source_word: παρειστήκεισαν
  english_pob_choice: stood by him
  chosen_spanish: estaban de pie delante de él
  alternatives_spanish:
  - estaban junto a él
  - estaban presentes ante él
  lexicon: παρίστημι
  rationale: La idea es de estar en presencia o junto a alguien en actitud de servicio. «Delante de él» mantiene la escena de corte/presencia sin añadir cercanía física indebida.
- source_word: ἐλειτούργουν
  english_pob_choice: ministered to him
  chosen_spanish: le servían
  alternatives_spanish:
  - le ministraban
  - le prestaban servicio
  lexicon: λειτουργέω
  rationale: En español, «ministrar» puede sonar técnico o eclesiástico; «servían» comunica el servicio litúrgico o cortesano sin perder la fuerza funcional del verbo griego.
- source_word: κύριος σαβαώθ
  english_pob_choice: the Lord Sabaoth
  chosen_spanish: el Señor Sabaot
  alternatives_spanish:
  - el Señor de los ejércitos
  - el Señor Sabaoth
  lexicon: κύριος
  rationale: Se conserva el título transliterado «Sabaot», como en la tradición textual y en la POB inglesa, para no sustituirlo por una explicación interpretativa que el texto griego no desarrolla aquí.
- source_word: πᾶσα ἡ κτίσις
  english_pob_choice: all creation
  chosen_spanish: toda la creación
  alternatives_spanish:
  - toda criatura
  - todo lo creado
  lexicon: κτίσις
  rationale: El sentido abarca el conjunto de lo creado, no solo seres personales. «Toda la creación» mantiene esa amplitud y la concordancia natural con el resto de la frase.
- source_word: δόξης αὐτοῦ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - la gloria de él
  - su resplandor
  lexicon: δόξα
  rationale: «Gloria» es la equivalencia estable y fiel para δόξα en este contexto doxológico; «su gloria» mantiene la referencia pronominal del griego.
theological_decisions:
- issue: Título divino κύριος σαβαώθ
  english_pob_reading: the Lord Sabaoth
  chosen_spanish_reading: el Señor Sabaot
  alternative_spanish_readings:
  - el Señor de los ejércitos
  - el Señor Sabaoth
  rationale: El texto cita una fórmula litúrgica/scriptural que conserva el título semítico. Traducirlo como «de los ejércitos» aclararía el sentido para algunos lectores, pero debilitaría la reproducción del título tal como aparece en la tradición textual y en el audit trail inglés.
  doctrine_reference: Isaías 6:3; Apocalipsis 4:8
- issue: πᾶσα ἡ κτίσις y el alcance cósmico de la doxología
  english_pob_reading: all creation is full of his glory
  chosen_spanish_reading: toda la creación está llena de su gloria
  alternative_spanish_readings:
  - toda la creación rebosa de su gloria
  - todo lo creado está lleno de su gloria
  rationale: La redacción expresa una plenitud cósmica. «Está llena de su gloria» reproduce el enunciado sin estrecharlo a solo seres vivos ni cambiar la imagen de plenitud.
  doctrine_reference: Salmo 19:1; Isaías 6:3
- issue: Función de los verbos de presencia y servicio en la escena celestial
  english_pob_reading: stood by him, and thousands of thousands ministered to him
  chosen_spanish_reading: estaban de pie delante de él, y millares de millares le servían
  alternative_spanish_readings:
  - estaban junto a él, y millares de millares le ministraban
  - se mantenían ante él, y millares de millares le prestaban servicio
  rationale: La escena combina honor y servicio ordenado. La versión elegida preserva ambas dimensiones sin forzar un tecnicismo litúrgico ni volverla meramente decorativa.
  doctrine_reference: Daniel 7:10
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «Ten thousand times ten thousand» por «Myriads of myriads» para reflejar mejor μύριαι μυριάδες. Esta traducción española sigue esa decisión con «Miríadas de miríadas», manteniendo también la estructura paralela con «millares de millares».
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en la doxología, coherente con la cita bíblica y con el uso habitual en español cuando el título está fijado por la fórmula.
  - Se usa «gloria» para δόξα por consistencia con la doxología y el registro bíblico.
  - No se introduce puntuación interpretativa adicional; la frase sigue de cerca la cadencia del original griego y del texto inglés auditado.
