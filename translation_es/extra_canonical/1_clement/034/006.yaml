  text: λέγει γὰρ ἡ γραφή· Μύριαι μυριάδες παρειστήκεισαν αὐτῷ, καὶ χίλιαι χιλιάδες ἐλειτούργουν αὐτῷ, καὶ ἐκέκραγον· Ἅγιος, ἅγιος, ἅγιος κύριος σαβαώθ, πλήρης πᾶσα ἡ κτίσις τῆς δόξης αὐτοῦ.
