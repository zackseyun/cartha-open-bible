review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y sigue de cerca el audit trail inglés: «Miríadas de miríadas», el servicio celestial y la triple aclamación están bien conservados. Sin embargo, hay dos puntos mejorables para mayor fidelidad y consistencia terminológica: παρειστήκεισαν se acerca mejor a «estaban junto a él» o «estaban ante él» que a «estaban de pie delante de él», y κύριος σαβαώθ no conviene verterlo como «Señor» sin más dado el criterio del proyecto sobre el nombre divino; aquí el griego transmite una fórmula titulada tradicional, por lo que «el Señor Sabaot» también resulta menos alineado con la preferencia de «Yahvé» cuando κύριος representa el nombre divino en una cita escritural.'
  spanish_quality_summary: El español es claro, digno y legible. «Miríadas de miríadas» suena natural en registro elevado. La frase, no obstante, mejora en fluidez si se simplifica «estaban de pie delante de él» a «estaban junto a él», que evita pesadez. También conviene normalizar las comillas y la puntuación de la cita para una presentación más limpia.
  glossary_alignment: 'Alineación parcial. «Miríadas», «creación» y «gloria» están bien. El punto principal es κύριος σαβαώθ: por tratarse de una aclamación escritural que probablemente refleja el nombre divino, la revisión más coherente con la política del proyecto es «Yahvé Sabaot», manteniendo «Sabaot» transliterado. No hace falta nota adicional porque no se introduce ambigüedad nueva.'
  issues:
  - severity: medium
    issue: «estaban de pie delante de él» sobretraduce παρειστήκεισαν
    rationale: El verbo expresa estar presente/junto a alguien en su presencia; «de pie» añade una explicitación no necesaria y «delante de» puede sonar más espacial que relacional. «Estaban junto a él» o «estaban ante él» reproduce mejor la escena.
  - severity: medium
    issue: «el Señor Sabaot» queda menos alineado con la convención del proyecto para el nombre divino
    rationale: Aunque el griego dice κύριος σαβαώθ y la transliteración de «Sabaot» es adecuada, la política del proyecto pide «Yahvé» en el texto principal cuando κύριος representa el nombre divino en cita/allusión escritural. En esta fórmula litúrgica, «Yahvé Sabaot» preserva mejor la identidad divina sin parafrasear a «de los ejércitos».
  revised_spanish_text: 'Porque la Escritura dice: «Miríadas de miríadas estaban junto a él, y millares de millares le servían», y clamaban: «Santo, santo, santo es Yahvé Sabaot; toda la creación está llena de su gloria».'
  revision_rationale: Se ajusta παρειστήκεισαν a «estaban junto a él» para reflejar mejor presencia ante él sin sobreespecificar postura física. Se cambia «el Señor Sabaot» por «Yahvé Sabaot» para alinearse con la terminología principal del proyecto respecto del nombre divino en una cita escritural, manteniendo la transliteración tradicional de «Sabaot». También se pule la puntuación de las citas para mayor naturalidad en español.
