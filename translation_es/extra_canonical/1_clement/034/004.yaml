review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: προτρέπεται = exhortación, πιστεύοντας ἐπ᾽ αὐτῷ = creer en él, ἐξ ὅλης τῆς καρδίας = con todo el corazón, y μὴ ἀργοὺς μηδὲ παρειμένους = no ser ociosos ni negligentes. Sin embargo, la construcción final ἐπὶ πᾶν ἔργον ἀγαθόν no suena natural en español como «en toda obra buena» después de «ociosos ni negligentes»; el sentido es de diligencia respecto de toda buena obra, mejor expresado con «para toda buena obra».'
  spanish_quality_summary: El español es claro y digno, pero «nos exhorta a nosotros» resulta algo redundante y «en toda obra buena» suena poco idiomático en esta sintaxis. Una pequeña reparación mejora fluidez y naturalidad sin apartarse del original.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Creemos en él» concuerda con la decisión auditada para πιστεύοντας ἐπ᾽ αὐτῷ. «Exhorta» y «obra buena» son adecuados. La única mejora propuesta es sintáctica/preposicional, no terminológica.
  issues:
  - severity: low
    issue: Redundancia en «nos exhorta a nosotros»
    rationale: El griego incluye ἡμᾶς, pero en español el clítico «nos» ya expresa el objeto; añadir «a nosotros» no es incorrecto, pero suena innecesariamente pesado aquí.
  - severity: medium
    issue: «En toda obra buena» es poco natural tras «ociosos ni negligentes»
    rationale: La preposición ἐπὶ aquí expresa orientación o disposición respecto de toda buena obra. En español, «para toda buena obra» comunica mejor la idea de estar listos/diligentes para toda clase de buena obra, mientras que «en toda obra buena» suena forzado.
  revised_spanish_text: Por tanto, nos exhorta, los que creemos en él con todo el corazón, a no ser ociosos ni negligentes para toda buena obra.
  revision_rationale: Se eliminó la redundancia de «a nosotros» y se ajustó la preposición final a una formulación más natural en español («para toda buena obra») que sigue reflejando la orientación distributiva de ἐπὶ πᾶν ἔργον ἀγαθόν. El resto del texto se mantiene por su fidelidad al griego y al rastro de auditoría en inglés.
