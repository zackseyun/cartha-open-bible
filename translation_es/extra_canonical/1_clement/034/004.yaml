  text: προτρέπεται οὖν ἡμᾶς πιστεύοντας ἐξ ὅλης τῆς καρδίας ἐπ᾽ αὐτῷ, μὴ ἀργοὺς μηδὲ παρειμένους εἶναι ἐπὶ πᾶν ἔργον ἀγαθόν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/034/004.yaml
  text: Therefore he urges us, who believe in him with our whole heart, not to be idle or negligent in every good work.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:27Z'
    unchanged: false
    changes_summary: Changed 'believe on him' to the more natural and accurate 'believe in him,' and changed 'in any good work' to 'in every good work' to reflect πᾶν more precisely.
translation:
  language: es
  text: Por tanto, nos exhorta, los que creemos en él con todo el corazón, a no ser ociosos ni negligentes para toda buena obra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προτρέπεται
  english_pob_choice: he urges us
  chosen_spanish: nos exhorta
  alternatives_spanish:
  - nos urge
  - nos anima
  lexicon: προτρέπω
  rationale: «Exhorta» conserva el tono persuasivo y moral del verbo griego sin volverlo demasiado fuerte o demasiado débil en español. «Urge» sería posible, pero puede sonar más apremiante de lo que el contexto exige; «anima» suaviza demasiado la fuerza exhortativa.
- source_word: πιστεύοντας ἐπ᾽ αὐτῷ
  english_pob_choice: who believe in him
  chosen_spanish: que creemos en él
  alternatives_spanish:
  - que creemos sobre él
  - que confiamos en él
  lexicon: πιστεύω + ἐπί
  rationale: La revisión inglesa ya decidió «believe in him» como la lectura más natural y precisa. En español, «creer en él» transmite bien la confianza/adhesión personal implicada por ἐπ᾽ αὐτῷ. «Confiamos en él» capta el sentido relacional, pero «creemos en él» sigue de cerca el campo léxico de πιστεύω.
- source_word: ἐξ ὅλης τῆς καρδίας
  english_pob_choice: with our whole heart
  chosen_spanish: con todo el corazón
  alternatives_spanish:
  - de todo corazón
  - con el corazón entero
  lexicon: καρδία
  rationale: «Con todo el corazón» es idiomático en español y refleja la idea de integridad total. «De todo corazón» puede sonar más afectivo que integral; «con el corazón entero» es comprensible pero menos natural.
- source_word: μὴ ἀργοὺς μηδὲ παρειμένους εἶναι
  english_pob_choice: not to be idle or negligent
  chosen_spanish: a no ser ociosos ni negligentes
  alternatives_spanish:
  - a no estar ociosos ni descuidados
  - a no ser inactivos ni flojos
  lexicon: ἀργός; παρειμένος
  rationale: «Ociosos» corresponde bien a ἀργούς y mantiene la idea de falta de actividad. «Negligentes» preserva la debilidad o relajamiento de παρειμένους sin convertirlo en un matiz moral distinto. La combinación evita perder la doble censura del original.
- source_word: ἐπὶ πᾶν ἔργον ἀγαθόν
  english_pob_choice: in every good work
  chosen_spanish: en toda obra buena
  alternatives_spanish:
  - en cada buena obra
  - para toda obra buena
  lexicon: πᾶν ἔργον ἀγαθόν
  rationale: La revisión inglesa fijó «every good work» para reflejar πᾶν con precisión. En español, «toda obra buena» comunica distribución total sin sonar rígido. «Cada buena obra» es posible, pero en singular colectivo «toda obra buena» suena más natural y conserva la extensión universal.
theological_decisions:
- issue: Fe perseverante que debe producir diligencia moral
  english_pob_reading: who believe in him with our whole heart ... not to be idle or negligent in every good work
  chosen_spanish_reading: que creemos en él con todo el corazón ... a no ser ociosos ni negligentes en toda obra buena
  alternative_spanish_readings:
  - que confiamos en él con todo el corazón ... a no ser ociosos ni negligentes en toda obra buena
  - que creemos en él de todo corazón ... a no ser ociosos ni negligentes en cada buena obra
  rationale: 'El griego une la fe íntegra con la exhortación práctica. La redacción española mantiene ese vínculo: la fe «con todo el corazón» se expresa como disposición total, y la conducta resultante se formula como rechazo de la ociosidad y la negligencia en toda obra buena.'
  doctrine_reference: ética cristiana; fe y obras en Clemente
- issue: Alcance de πᾶν
  english_pob_reading: every good work
  chosen_spanish_reading: toda obra buena
  alternative_spanish_readings:
  - cada buena obra
  - en cualquier obra buena
  rationale: Se conserva el alcance distributivo y total de πᾶν sin diluirlo en un indefinido. «Toda obra buena» permite leer la exhortación como abarcando la totalidad del obrar bueno.
  doctrine_reference: exhortación moral general
translation_notes:
  revision_awareness: Se tomó como punto de referencia la revisión inglesa que ajustó «believe on him» a «believe in him» y «any good work» a «every good work». La versión española refleja ambos ajustes con «creemos en él» y «toda obra buena».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el texto no contiene el nombre divino.
  - Se mantuvo «él» en minúscula por referirse al antecedente masculino inmediato del contexto inglés, sin introducir mayor identificación no explicitada en este versículo.
  - Se eligió una estructura infinitiva natural en español («a no ser...») para reproducir la finalidad exhortativa del griego sin calco torpe.
