translation:
  language: es
  text: 'El buen obrero recibe con denuedo el pan de su trabajo, pero el perezoso y negligente no puede mirar a los ojos a su empleador.


    Por tanto, debemos estar dispuestos a hacer el bien, porque de él son todas las cosas. Pues nos dice de antemano: «He aquí, el Señor, y su recompensa está delante de él, para dar a cada uno según su obra».


    Por eso nos exhorta a nosotros, que creemos en él con todo el corazón, a no ser ociosos ni negligentes en ninguna buena obra. Que nuestro motivo de gloria y nuestro denuedo estén en él. Sométamonos a su voluntad. Consideremos toda la multitud de sus ángeles: cómo están en pie y le ministran[a] según su voluntad. Porque la Escritura dice: «Diez mil veces diez mil estaban en pie junto a él, y miles de miles le ministraban, y gritaban: “Santo, santo, santo es el Señor Sabaot; toda la creación está llena de su gloria”».


    Así pues, también nosotros, reunidos en concordia con una sola conciencia, clamemos a él con fervor, como de una sola boca, para que lleguemos a ser partícipes de sus grandes y gloriosas promesas. Porque dice: «El ojo no ha visto, ni el oído ha oído, ni ha subido al corazón humano, las cosas que preparó para los que lo esperan[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Le ministran» conserva el matiz de servicio sagrado del verbo griego; también puede entenderse como «le sirven».
    reason: lexical_alternative
  - marker: b
    text: El verbo griego también puede llevar la idea de perseverar o soportar; aquí se traduce «los que lo esperan» por la resonancia escrituraria de espera confiada.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρρησίας
  english_pob_choice: with boldness
  chosen_spanish: con denuedo
  alternatives_spanish:
  - con confianza
  - con franqueza
  lexicon: BDAG
  rationale: «Denuedo» conserva la valentía confiada del griego y mantiene el enlace retórico con la repetición posterior de παρρησία. Evita reducir el término a mera franqueza verbal.
- source_word: ἄρτον τοῦ ἔργου αὐτοῦ
  english_pob_choice: the bread of his labor
  chosen_spanish: el pan de su trabajo
  alternatives_spanish:
  - el pan ganado por su trabajo
  - el salario de su trabajo
  lexicon: LSJ
  rationale: Se conserva la imagen concreta de «pan» en vez de abstraerla como salario. «Trabajo» comunica bien el valor objetivo del esfuerzo sin perder la metáfora.
- source_word: νωθρὸς καὶ παρειμένος
  english_pob_choice: sluggish and negligent
  chosen_spanish: perezoso y negligente
  alternatives_spanish:
  - tardo y flojo
  - ocioso y descuidado
  lexicon: BDAG / LSJ
  rationale: En español, «perezoso y negligente» comunica con claridad la doble censura moral y práctica. Aunque «perezoso» es más común que «lento», aquí mantiene suficientemente la idea de apatía activa.
- source_word: ἀντοφθαλμεῖ
  english_pob_choice: look his employer in the eye
  chosen_spanish: mirar a los ojos a su empleador
  alternatives_spanish:
  - enfrentar la mirada de su empleador
  - sostener la mirada de su empleador
  lexicon: LSJ
  rationale: La imagen visual y de vergüenza se conserva de manera natural en español. «A los ojos» evita una calca rígida y mantiene la fuerza idiomática.
- source_word: προθύμους
  english_pob_choice: eager
  chosen_spanish: diligentes
  alternatives_spanish:
  - prontos
  - dispuestos
  lexicon: BDAG
  rationale: Aunque el griego expresa disposición entusiasta, en este contexto exhortativo «diligentes» fluye con naturalidad y enlaza con la antítesis frente a la ociosidad.
- source_word: ἀγαθοποιΐαν
  english_pob_choice: doing good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - buenas obras
  - beneficencia
  lexicon: BDAG
  rationale: Se verbaliza el sustantivo abstracto para una lectura natural en español, preservando el énfasis ético del pasaje.
- source_word: ἐξ αὐτοῦ γάρ ἐστιν τὰ πάντα
  english_pob_choice: for from him are all things
  chosen_spanish: porque de él son todas las cosas
  alternatives_spanish:
  - porque todas las cosas proceden de él
  - porque de él proviene todo
  lexicon: BDAG
  rationale: «De él son todas las cosas» conserva el tono elevado y la amplitud teológica del griego, sin forzar una paráfrasis explicativa.
- source_word: μισθός
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - galardón
  - pago
  lexicon: BDAG
  rationale: «Recompensa» es el equivalente natural en español para la retribución divina del contexto bíblico, y mantiene la relación con la obra de cada uno.
- source_word: πιστεύοντας ἐπ᾽ αὐτῷ
  english_pob_choice: who believe in him
  chosen_spanish: que creemos en él
  alternatives_spanish:
  - que confiamos en él
  - que creemos sobre él
  lexicon: BDAG
  rationale: La construcción española más natural es «creer en él». Se conserva el valor relacional de la fe sin introducir una calca artificial.
- source_word: ἀργούς
  english_pob_choice: idle
  chosen_spanish: ociosos
  alternatives_spanish:
  - inactivos
  - perezosos
  lexicon: BDAG
  rationale: «Ociosos» funciona bien junto a «negligentes» y conserva la idea de improductividad; evita repetir demasiado el campo semántico de «perezoso».
- source_word: καύχημα
  english_pob_choice: boasting
  chosen_spanish: motivo de gloria
  alternatives_spanish:
  - gloriarnos
  - orgullo
  lexicon: BDAG
  rationale: El sustantivo no siempre exige un matiz negativo; aquí se refiere a aquello en que se puede gloriar uno. «Motivo de gloria» conserva esa ambivalencia mejor que «boasting» en español llano.
- source_word: ὑποτασσώμεθα
  english_pob_choice: Let us submit ourselves
  chosen_spanish: Sométamonos
  alternatives_spanish:
  - Sujetémonos
  - Entreguémonos
  lexicon: BDAG
  rationale: La forma media exhortativa se expresa de modo natural con el imperativo inclusivo «Sométamonos», sin perder el matiz de rendición voluntaria.
- source_word: λειτουργοῦσιν
  english_pob_choice: minister
  chosen_spanish: ministran
  alternatives_spanish:
  - sirven
  - ejercen su ministerio
  lexicon: BDAG
  rationale: «Ministran» conserva el tono culto y sacral del servicio angelical, y refleja mejor el registro del texto que un simple «sirven».
- source_word: κύριος σαβαώθ
  english_pob_choice: the Lord Sabaoth
  chosen_spanish: el Señor Sabaot
  alternatives_spanish:
  - el Señor de los ejércitos
  - el Señor Sabaoth
  lexicon: LSJ
  rationale: Se conserva el título transliterado en la forma que funciona en español bíblico, pero sin traducirlo por un equivalente interpretativo. Esto refleja el griego que preserva σαβαώθ como título.
- source_word: ὁμονοίᾳ
  english_pob_choice: in concord
  chosen_spanish: en concordia
  alternatives_spanish:
  - en armonía
  - unánimemente
  lexicon: BDAG
  rationale: «Concordia» reproduce la unidad comunitaria con un registro dignificado y eclesial, apropiado para la exhortación de Clemente.
- source_word: τῇ συνειδήσει
  english_pob_choice: with one conscience
  chosen_spanish: con una sola conciencia
  alternatives_spanish:
  - con una conciencia unida
  - con una misma conciencia
  lexicon: BDAG
  rationale: La singularidad de «conciencia» se mantiene porque el griego usa singular y enfatiza una unidad moral compartida. «Una sola conciencia» conserva la tensión sin volverla plana.
- source_word: ἐκτενῶς
  english_pob_choice: earnestly
  chosen_spanish: con fervor
  alternatives_spanish:
  - ardientemente
  - insistentemente
  lexicon: BDAG
  rationale: «Con fervor» refleja la intensidad orante del adverbio y suena natural en español litúrgico sin exagerar el tono.
- source_word: μετόχους
  english_pob_choice: sharers
  chosen_spanish: partícipes
  alternatives_spanish:
  - participantes
  - copartícipes
  lexicon: BDAG
  rationale: «Partícipes» reproduce bien la idea de participación real en promesas divinas y encaja con el registro bíblico.
- source_word: ὑπομένουσιν
  english_pob_choice: those who wait for him
  chosen_spanish: los que esperan en él
  alternatives_spanish:
  - los que perseveran en él
  - los que lo aguardan
  lexicon: BDAG
  rationale: Se prioriza el sentido de espera confiada que la cita bíblica exige en este contexto, sin eliminar la posible resonancia de perseverancia.
theological_decisions:
- issue: Tratamiento de κύριος σαβαώθ en la cita angelical
  english_pob_reading: the Lord Sabaoth
  chosen_spanish_reading: el Señor Sabaot
  alternative_spanish_readings:
  - el Señor de los ejércitos
  - el Señor Sabaoth
  rationale: El griego conserva el título transliterado σαβαώθ, por lo que se retiene una forma transliterada en español. Se evita sustituirlo por una traducción interpretativa que borre la huella textual del título preservado.
  doctrine_reference: Conservar títulos fuente cuando el texto los transmite en forma transliterada y la cadencia litúrgica forma parte del argumento.
- issue: Relación entre πίστευοντας ἐπ᾽ αὐτῷ y la exhortación eclesial
  english_pob_reading: who believe in him with our whole heart
  chosen_spanish_reading: que creemos en él con todo el corazón
  alternative_spanish_readings:
  - que creemos en él de todo corazón
  - que confiamos en él con todo el corazón
  rationale: La fe se expresa como relación total del creyente con Dios. «Con todo el corazón» conserva la intensidad totalizante del griego y de la versión inglesa sin añadir doctrina ajena.
  doctrine_reference: Mantener el sentido bíblico de fe integral y obediente, no meramente intelectual.
- issue: Ἐκτενῶς y el tono de súplica comunitaria
  english_pob_reading: cry out to him earnestly as from one mouth
  chosen_spanish_reading: clamemos a él con fervor, como de una sola boca
  alternative_spanish_readings:
  - clamemos a él con insistencia, como de una sola boca
  - clamemos unánimemente a él
  rationale: La frase conserva la imagen de unidad vocal y la intensidad devocional. «Como de una sola boca» reproduce la metáfora sin aclararla en exceso.
  doctrine_reference: Preservar la imaginería eclesial de una oración unida y corporativa.
translation_notes:
  revision_awareness: Se incorporó la observación del repaso final del inglés auditado, especialmente en la cláusula de creencia total del corazón, la unidad de conciencia y el ajuste del orden de algunas imágenes para mayor naturalidad. En español, se optó por mantener la metáfora del pan, el título transliterado Sabaot y la unidad comunitaria de la cita final, sin suavizar las tensiones léxicas del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino explícito; aquí el texto cita κύριος y el título preservado σαβαώθ, por lo que se conservó «Señor».
  - Se mantiene una distinción entre «concordia» (unidad comunitaria) y «una sola conciencia» (unidad moral compartida).
  - «Denuedo» y «con fervor» evitan repetir mecánicamente «confianza», preservando dos matices distintos de παρρησία y ἐκτενῶς.
  - Se prefirió «partícipes» en lugar de «participantes» por su registro bíblico y su cercanía al lenguaje de promesas divinas.
  - La cita final se traduce de forma inclusiva como «ser humano» para no encubrir el paralelismo poético del original, aunque el griego usa ἄνθρωπος en singular genérico.
