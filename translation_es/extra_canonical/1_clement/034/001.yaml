review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido global del griego y del POB inglés: conserva la imagen de «pan», la vergüenza de no poder mirar al empleador, la exhortación a las buenas obras, el servicio angelical y la cita final sobre lo preparado para los que esperan. Sin embargo, hay varios puntos donde no refleja con suficiente precisión decisiones auditadas: προθύμους es más bien «dispuestos/solícitos» que «diligentes»; «Mira» debilita Ἰδοὺ; «ministran a su voluntad» expresa menos naturalmente λειτουργοῦσιν τῷ θελήματι αὐτοῦ que «ministran en servicio a su voluntad» o más sencillamente «sirven a su voluntad»; y «esperan en él» cambia el objeto directo del griego αὐτόν y de la traducción inglesa «wait for him».'
  spanish_quality_summary: El español es en general claro, digno y eclesialmente legible. No obstante, «con denuedo» suena algo marcado pero aceptable; «Mira» en cita profética suena demasiado coloquial; «como de una sola boca» es fiel pero puede mantenerse; «ministran a su voluntad» resulta torpe en español; y «el corazón del ser humano» añade una nota innecesaria donde «del hombre» o «humano» puede resolverse mejor sin nota. La fluidez mejora con ajustes menores.
  glossary_alignment: No hay conflictos con términos de proyecto mayores, pues no aparece Yahvé ni Mesías. La conservación de «Señor Sabaot» es defendible por la decisión auditada sobre σαβαώθ. Aun así, conviene mantener más estrechamente la decisión inglesa sobre ὑπομένουσιν con «los que lo esperan» o «los que esperan por él», y alinear προθύμους con una idea de prontitud/disposición más que de mera diligencia.
  issues:
  - severity: medium
    issue: «debemos ser diligentes en hacer el bien» para προθύμους εἶναι εἰς ἀγαθοποιΐαν
    rationale: πρόθυμος enfatiza disposición pronta/eagerness. «Diligentes» no es falso, pero desplaza el matiz hacia esmero constante y se aleja de la decisión auditada.
  - severity: medium
    issue: «Mira, el Señor» para Ἰδοὺ ὁ κύριος
    rationale: «Mira» suena coloquial en registro bíblico; «He aquí» o «Miren» según estilo sería más adecuado. Dado el tono del pasaje, «He aquí» preserva mejor la deixis solemne.
  - severity: medium
    issue: «ministran[a] a su voluntad»
    rationale: En español esa construcción es poco natural. El griego expresa que los ángeles sirven/ministran en relación con su voluntad. «sirven a su voluntad» o «ministran en cumplimiento de su voluntad» comunica mejor.
  - severity: medium
    issue: «los que esperan en él» para τοῖς ὑπομένουσιν αὐτόν
    rationale: La auditoría inglesa escogió «those who wait for him». «Esperar en él» introduce la preposición interpretativa «en», más propia de confianza que de espera del objeto personal.
  - severity: low
    issue: Nota [b] sobre «ser humano» es innecesaria y distrae
    rationale: La expresión «corazón humano» o «corazón del hombre» puede resolver el español sin crear ambigüedad relevante que requiera nota.
  revised_spanish_text: 'El buen obrero recibe con denuedo el pan de su trabajo, pero el perezoso y negligente no puede mirar a los ojos a su empleador.


    Por tanto, debemos estar dispuestos a hacer el bien, porque de él son todas las cosas. Pues nos dice de antemano: «He aquí, el Señor, y su recompensa está delante de él, para dar a cada uno según su obra».


    Por eso nos exhorta a nosotros, que creemos en él con todo el corazón, a no ser ociosos ni negligentes en ninguna buena obra. Que nuestro motivo de gloria y nuestro denuedo estén en él. Sométamonos a su voluntad. Consideremos toda la multitud de sus ángeles: cómo están en pie y le ministran[a] según su voluntad. Porque la Escritura dice: «Diez mil veces diez mil estaban en pie junto a él, y miles de miles le ministraban, y gritaban: “Santo, santo, santo es el Señor Sabaot; toda la creación está llena de su gloria”».


    Así pues, también nosotros, reunidos en concordia con una sola conciencia, clamemos a él con fervor, como de una sola boca, para que lleguemos a ser partícipes de sus grandes y gloriosas promesas. Porque dice: «El ojo no ha visto, ni el oído ha oído, ni ha subido al corazón humano, las cosas que preparó para los que lo esperan[b]».'
