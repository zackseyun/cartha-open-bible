base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/034/001.yaml
  text: 'The good worker receives the bread of his labor with boldness, but the sluggish and negligent man cannot look his employer in the eye.


    Therefore we must be eager for doing good, for from him are all things. For he says beforehand to us, “Behold, the Lord, and his reward is before him, to repay each one according to his work.” Therefore he urges us, who believe in him with our whole heart, not to be idle or negligent in any good work.


    Let our boasting and our boldness be in him. Let us submit ourselves to his will. Let us consider the whole multitude of his angels, how they stand by and minister to his will. For the Scripture says, “Ten thousand times ten thousand stood by him, and thousands of thousands ministered to him,” and they cried out, “Holy, holy, holy is the Lord Sabaoth; all creation is full of his glory.”


    So then, let us also, gathered together in concord with one conscience, cry out to him earnestly as from one mouth, so that we may become sharers in his great and glorious promises. For he says, “Eye has not seen, and ear has not heard, and it has not arisen upon the heart of man, the things that he prepared for those who wait for him.”'
