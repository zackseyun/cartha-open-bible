base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/034/008.yaml
  text: For he says[a], “Eye has not seen, and ear has not heard, and it has not entered into the heart of man, the things that he prepared for those who wait for him.”
  footnotes:
  - marker: a
    text: Or 'it has not arisen upon the heart of man'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:28Z'
    unchanged: false
    changes_summary: Added 'into' after 'entered' to more naturally reflect ἐπὶ καρδίαν in formal English; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: 'Porque dice: «El ojo no ha visto, ni el oído ha oído, ni ha entrado en el corazón del hombre[a] las cosas que preparó para los que lo esperan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni ha subido al corazón del hombre».'
    reason: alternative_literal_rendering
lexical_decisions:
- source_word: λέγει
  english_pob_choice: For he says
  chosen_spanish: Porque dice
  alternatives_spanish:
  - Pues dice
  - Porque él dice
  lexicon: λέγω
  rationale: Se mantiene el valor introductorio y citacional del verbo, con una formulación natural en español. «Porque dice» reproduce bien la conexión causal/expositiva del contexto sin añadir contenido.
- source_word: Ὀφθαλμὸς οὐκ εἶδεν
  english_pob_choice: Eye has not seen
  chosen_spanish: El ojo no ha visto
  alternatives_spanish:
  - Ningún ojo ha visto
  - El ojo no ha visto nada
  lexicon: ὀφθαλμός
  rationale: Se conserva el singular colectivo de la expresión griega y su fuerza proverbial. «El ojo» suena más cercano al original que una generalización explicativa.
- source_word: καὶ οὖς οὐκ ἤκουσεν
  english_pob_choice: and ear has not heard
  chosen_spanish: ni el oído ha oído
  alternatives_spanish:
  - ni el oído lo ha escuchado
  - y el oído no ha escuchado
  lexicon: οὖς
  rationale: «Oído» expresa el órgano/sentido de manera natural en español y mantiene el paralelo retórico con «ojo». Se evita «escuchado» para no suavizar la simple capacidad perceptiva que el griego subraya.
- source_word: ἐπὶ καρδίαν ἀνθρώπου οὐκ ἀνέβη
  english_pob_choice: it has not entered into the heart of man
  chosen_spanish: no ha subido al corazón del hombre
  alternatives_spanish:
  - no ha entrado en el corazón del hombre
  - no ha llegado al corazón del hombre
  lexicon: καρδία / ἀναβαίνω
  rationale: Se preserva la imagen semítica de «subir» que está en el griego y detrás del hebraísmo, aunque en español suene menos idiomática. Esto evita borrar la tensión lexical documentada por el audit trail; la nota permite la lectura idiomática alternativa.
- source_word: ὅσα
  english_pob_choice: the things
  chosen_spanish: las cosas
  alternatives_spanish:
  - todo lo que
  - las cosas que
  lexicon: ὅσος
  rationale: El relativo partitivo se vierte con una frase natural que conserva el referente indefinido de la promesa divina. «Las cosas» es suficiente y fiel sin sobreespecificar.
- source_word: ἡτοίμασεν
  english_pob_choice: he prepared
  chosen_spanish: preparó
  alternatives_spanish:
  - ha preparado
  - dispuso
  lexicon: ἑτοιμάζω
  rationale: El aoristo se expresa de forma simple y directa. «Preparó» coincide con el valor verbal básico y mantiene el énfasis en la acción divina ya realizada.
- source_word: τοῖς ὑπομένουσιν αὐτόν
  english_pob_choice: for those who wait for him
  chosen_spanish: para los que esperan en él
  alternatives_spanish:
  - para los que perseveran en él
  - para los que lo esperan
  lexicon: ὑπομένω
  rationale: «Esperan en él» recoge el sentido de espera perseverante que ὑπομένω puede implicar en contexto bíblico, sin perder la dirección personal del objeto. La preposición «en» ayuda a expresar confianza/adhesión en español.
theological_decisions:
- issue: La promesa de lo preparado por Dios permanece oculta a la percepción humana ordinaria.
  english_pob_reading: Eye has not seen, and ear has not heard, and it has not entered into the heart of man, the things that he prepared for those who wait for him.
  chosen_spanish_reading: El texto conserva la triple negación y la idea de que la realidad preparada por Dios excede la percepción y el pensamiento humanos.
  alternative_spanish_readings:
  - El ojo no ha visto, ni el oído ha oído, ni ha venido al corazón del hombre...
  - '...no ha entrado en el corazón del hombre...'
  rationale: 'Se mantiene la estructura acumulativa para preservar el énfasis teológico: lo preparado por Dios no procede de la capacidad humana de descubrirlo. La forma «subido al corazón» conserva la imagen bíblica sin ocultar el sentido.'
  doctrine_reference: Revelación divina / límites del conocimiento humano
translation_notes:
  revision_awareness: El audit trail inglés corrigió una calca incómoda de 'arisen upon the heart' a 'entered into the heart of man', pero también mantuvo la imagen idiomática de ἐπὶ καρδίαν. En español se optó por conservar la metáfora semítica 'subido al corazón' para no perder el eco del original, ofreciendo en nota la lectura idiomática 'entrado en el corazón'.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exija; aquí el referente es αὐτόν ('él'), por lo que se mantuvo «él» sin introducir el nombre divino.
  - Se mantuvo un registro reverente pero claro, evitando el lenguaje eclesiástico tradicional no requerido por el original.
  - La nota de alternativa se ancla en la frase verbal afectada por la tensión idiomática del griego y del audit trail inglés.
