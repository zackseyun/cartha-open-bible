translation:
  language: es
  text: ¿Quién puede describir[a] el vínculo del amor de Dios?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «explicar».
    reason: alternative_reading
lexical_decisions:
- source_word: τὸν δεσμὸν
  english_pob_choice: the bond
  chosen_spanish: el vínculo
  alternatives_spanish:
  - el lazo
  - el nudo
  - la ligadura
  lexicon: δεσμός
  rationale: «Vínculo» conserva la idea de unión o atadura sin sonar tan físico como «ligadura» ni tan artificial como «nudo» en español moderno. Mantiene el valor retórico de la frase.
- source_word: τῆς ἀγάπης
  english_pob_choice: of God's love
  chosen_spanish: del amor
  alternatives_spanish:
  - de la amorosa disposición
  - de la caridad
  lexicon: ἀγάπη
  rationale: «Amor» es la equivalencia directa y natural en español. «Caridad» introduciría un matiz eclesiástico no requerido por el griego en este contexto.
- source_word: τοῦ θεοῦ
  english_pob_choice: God's
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  - del Señor
  lexicon: θεός
  rationale: El griego usa θεοῦ, por lo que «Dios» es la traducción directa y adecuada; no hay base aquí para sustituirlo por «Yahvé».
- source_word: ἐξηγήσασθαι
  english_pob_choice: describe
  chosen_spanish: describir
  alternatives_spanish:
  - explicar
  - relatar
  - declarar
  lexicon: ἐξηγέομαι
  rationale: La revisión del texto en inglés favorece «describe» frente a «explain» por el tono retórico de alabanza. En español, «describir» mantiene ese registro de expresar o exponer con amplitud, sin restringir indebidamente el verbo a una explicación técnica.
theological_decisions:
- issue: Alcance retórico de ἐξηγήσασθαι en una pregunta de alabanza
  english_pob_reading: Who is able to describe the bond of God's love?
  chosen_spanish_reading: ¿Quién puede describir el vínculo del amor de Dios?
  alternative_spanish_readings:
  - ¿Quién puede explicar el vínculo del amor de Dios?
  - ¿Quién puede relatar el vínculo del amor de Dios?
  rationale: El audit trail inglés corrigió «explain» a «describe» para reflejar mejor la cadena retórica del contexto. La versión española sigue esa lectura para no rebajar el efecto de alabanza a una mera aclaración intelectual.
  doctrine_reference: Uso retórico del lenguaje de exhortación/alabanza; no hay afirmación doctrinal disputada en el versículo.
translation_notes:
  revision_awareness: La revisión reciente del POB inglés cambió la solución de «explain» a «describe» para captar mejor el registro retórico de ἐξηγήσασθαι y su relación con el campo semántico de «decir/relatar» en los versículos siguientes. La traducción española adopta deliberadamente «describir» para alinearse con esa decisión auditada.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente de «Dios» conforme al griego θεοῦ.
  - Se evita «caridad» para ἀγάπη porque el contexto no exige un término eclesiástico especializado.
  - La pregunta se conserva en forma directa y retórica, sin intensificarla ni suavizarla.
