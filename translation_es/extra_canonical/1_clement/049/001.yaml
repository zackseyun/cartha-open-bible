translation:
  language: es
  text: 'Quien tiene amor en el Mesías, que cumpla los mandamientos del Mesías. ¿Quién puede explicar el vínculo del amor de Dios? ¿Quién es suficiente para expresar la grandeza de su belleza? La altura a la cual el amor nos eleva es imposible de expresar. El amor nos une a Dios; el amor cubre multitud de pecados; el amor lo soporta todo, tiene paciencia en todo. No hay nada grosero en el amor, nada arrogante. El amor no tiene cisma; el amor no fomenta facciones; el amor hace todo en concordia. En el amor fueron hechos completos todos los elegidos de Dios; fuera del amor, nada es agradable a Dios. Con amor nos recibió el Maestro: por el amor que tuvo hacia nosotros, Jesús Mesías, nuestro Señor, dio su sangre por nosotros conforme a la voluntad de Dios, y su carne por nuestra carne y su vida por nuestras vidas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν Χριστῷ
  english_pob_choice: in the Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como nombre fijo; 'Mesías' preserva el sentido titulativo en español y sigue la política del proyecto.
- source_word: παραγγέλματα
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - instrucciones
  lexicon: BDAG
  rationale: La palabra denota instrucciones éticas con autoridad; 'mandamientos' conserva el peso exhortativo y eclesial del pasaje.
- source_word: δεσμός
  english_pob_choice: bond
  chosen_spanish: vínculo
  alternatives_spanish:
  - lazo
  - unión
  lexicon: BDAG
  rationale: La imagen es de unión relacional, no de coerción; 'vínculo' reproduce bien la metáfora en español.
- source_word: ἐξηγήσασθαι
  english_pob_choice: explain
  chosen_spanish: explicar
  alternatives_spanish:
  - exponer
  - desplegar
  lexicon: BDAG
  rationale: El verbo pide articular plenamente algo difícil de expresar; 'explicar' es natural y suficientemente fiel.
- source_word: μεγαλεῖον
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - magnificencia
  - majestad
  lexicon: LSJ
  rationale: En la construcción 'la grandeza de su belleza', 'grandeza' mantiene el paralelismo con 'altura' y el tono retórico elevado.
- source_word: καλλονή
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - hermosura
  - beldad
  lexicon: BDAG
  rationale: '''Belleza'' es la equivalencia más directa y digna para la cualidad elogiada.'
- source_word: ἀνεκδιήγητον
  english_pob_choice: beyond telling
  chosen_spanish: imposible de expresar
  alternatives_spanish:
  - indescriptible
  - inexpresable
  lexicon: BDAG
  rationale: La idea es que no se puede narrar plenamente; esta formulación transmite la imposibilidad retórica en español sin sonar forzada.
- source_word: κολλᾷ
  english_pob_choice: joins
  chosen_spanish: nos une
  alternatives_spanish:
  - nos liga
  - se pega a
  lexicon: BDAG
  rationale: El verbo puede expresar unión estrecha; 'nos une' comunica la relación con Dios de forma clara y reverente.
- source_word: πλῆθος
  english_pob_choice: a multitude
  chosen_spanish: multitud
  alternatives_spanish:
  - gran cantidad
  - muchos
  lexicon: BDAG
  rationale: Se conserva la amplitud cuantitativa del término y su resonancia escritural.
- source_word: ἀνέχεται
  english_pob_choice: endures all things
  chosen_spanish: lo soporta todo
  alternatives_spanish:
  - lo aguanta todo
  - lo sobrelleva todo
  lexicon: BDAG
  rationale: '''Soportar'' transmite la firmeza perseverante del verbo sin rebajarlo a coloquialidad.'
- source_word: μακροθυμεῖ
  english_pob_choice: is patient in all things
  chosen_spanish: tiene paciencia en todo
  alternatives_spanish:
  - es paciente en todo
  - es longánime en todo
  lexicon: BDAG
  rationale: La paciencia activa y sostenida se expresa de manera clara en español contemporáneo.
- source_word: βάναυσον
  english_pob_choice: coarse
  chosen_spanish: grosero
  alternatives_spanish:
  - vulgar
  - basto
  - tosco
  lexicon: LSJ
  rationale: El adjetivo apunta a lo burdo o no refinado; 'grosero' comunica bien la falta de nobleza moral y estilística.
- source_word: ὑπερήφανον
  english_pob_choice: arrogant
  chosen_spanish: arrogante
  alternatives_spanish:
  - soberbio
  - altivo
  lexicon: BDAG
  rationale: '''Arrogante'' reproduce con precisión el orgullo desmedido que el griego rechaza.'
- source_word: σχίσμα
  english_pob_choice: schism
  chosen_spanish: cisma
  alternatives_spanish:
  - división
  - ruptura
  lexicon: BDAG
  rationale: En el contexto eclesial de 1 Clemente, 'cisma' conserva el sentido comunitario y doctrinal fuerte del término.
- source_word: στασιάζει
  english_pob_choice: does not engage in faction
  chosen_spanish: no fomenta facciones
  alternatives_spanish:
  - no se subleva
  - no crea bandos
  - no se faccionaliza
  lexicon: BDAG
  rationale: El verbo apunta a agitación facciosa; 'fomenta facciones' explicita en español la fuerza comunitaria del contraste.
- source_word: ὁμονοίᾳ
  english_pob_choice: concord
  chosen_spanish: concordia
  alternatives_spanish:
  - armonía
  - unidad
  lexicon: BDAG
  rationale: '''Concordia'' preserva el tono elevado y el matiz de unanimidad comunitaria.'
- source_word: ἐτελειώθησαν
  english_pob_choice: were made complete
  chosen_spanish: fueron hechos completos
  alternatives_spanish:
  - fueron perfeccionados
  - alcanzaron plenitud
  lexicon: BDAG
  rationale: La pasiva indica ser llevados a la completitud; esta opción evita importar una perfección moral técnica ajena al contexto.
- source_word: ἐκλεκτοί
  english_pob_choice: the elect
  chosen_spanish: los elegidos
  alternatives_spanish:
  - los escogidos
  - los electos
  lexicon: BDAG
  rationale: '''Elegidos'' mantiene el registro teológico y es perfectamente natural en español.'
- source_word: εὐάρεστον
  english_pob_choice: pleasing
  chosen_spanish: agradable
  alternatives_spanish:
  - aceptable
  - bien visto
  lexicon: BDAG
  rationale: '''Agradable a Dios'' es idiomático y conserva el juicio divino del texto.'
- source_word: δεσπότης
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: BDAG
  rationale: Se mantiene la distinción con κύριος más adelante; 'Maestro' preserva el valor relacional y de autoridad sin confundir el término con el título divino habitual.
- source_word: προσελάβετο
  english_pob_choice: received us
  chosen_spanish: nos recibió
  alternatives_spanish:
  - nos acogió
  - nos tomó para sí
  lexicon: BDAG
  rationale: El medio puede expresar recibir/acoger a alguien; 'nos recibió' es fiel y sobrio.
- source_word: ἐν θελήματι θεοῦ
  english_pob_choice: by the will of God
  chosen_spanish: conforme a la voluntad de Dios
  alternatives_spanish:
  - por la voluntad de Dios
  - según la voluntad de Dios
  lexicon: BDAG
  rationale: '''Conforme a'' preserva el ajuste al querer divino y suena natural en español.'
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  lexicon: BDAG
  rationale: En el paralelismo sacrificial, 'carne' mantiene la concreción corporal del griego y evita suavizar el término.
- source_word: ψυχή
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  lexicon: BDAG
  rationale: En la fórmula de intercambio, ψυχή aquí expresa vida concreta entregada; 'vida' evita introducir una dualidad alma/cuerpo que el contexto no exige.
theological_decisions:
- issue: Renderizado de Χριστός como título
  english_pob_reading: Messiah in both occurrences
  chosen_spanish_reading: Mesías en ambas ocurrencias
  alternative_spanish_readings:
  - Cristo
  rationale: Se preserva el sentido titular vivo de Χριστός, conforme a la política del proyecto y al contexto exhortativo del pasaje.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Referencia de αὐτοῦ en τὸ μεγαλεῖον τῆς καλλονῆς αὐτοῦ
  english_pob_reading: its beauty, referring to love
  chosen_spanish_reading: su belleza, refiriéndose al amor
  alternative_spanish_readings:
  - su belleza, refiriéndose a Dios
  rationale: La secuencia inmediata está dominada por ἀγάπη; el antecedente conceptual más cercano es el amor mismo, no un cambio abrupto a Dios.
  doctrine_reference: 'DOCTRINE.md: Preserve the immediate semantic flow unless source evidence requires otherwise.'
- issue: Sentido de ψυχή en la cláusula final
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  rationale: El paralelismo con sangre y carne indica autoentrega concreta; 'vida' evita sobreinterpretar una antropología dualista.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa auditada no contiene notas al pie ni revisiones textuales aplicadas; la traducción española sigue el pasaje griego normalizado de Funk 1901 con equivalencias consistentes y sin introducir marcadores no anclados.
  spanish_consistency_notes:
  - Se traduce ἀγάπη de manera uniforme como 'amor' por coherencia con el registro devocional y exhortativo del capítulo.
  - Se conserva 'Mesías' para Χριστός en todo el pasaje, manteniendo la distinción con 'Jesús' como nombre propio.
  - '''Carne'' y ''vida'' se mantienen en el paralelismo final para respetar la concreción sacrificial del texto griego.'
  - '''Cisma'', ''facciones'' y ''concordia'' preservan el tono eclesial y comunitario de 1 Clemente.'
