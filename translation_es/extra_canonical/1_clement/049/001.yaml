  text: Ὁ ἔχων ἀγάπην ἐν Χριστῷ ποιησάτω τὰ τοῦ Χριστοῦ παραγγέλματα. 2. τὸν δεσμὸν τῆς ἀγάπης τοῦ θεοῦ τίς δύναται ἐξηγήσασθαι; 3. τὸ μεγαλεῖον τῆς καλλονῆς αὐτοῦ τίς ἀρκετὸς ἐξειπεῖν; 4. τὸ ὕψος, εἰς ὃ ἀνάγει ἡ ἀγάπη, ἀνεκδιήγητόν ἐστιν. . ἀγάπη κολλᾷ ἡμᾶς τῷ θεῷ, ἀγάπη καλύπτει πλῆθος ἁμαρτιῶν, ἀγάπη πάντα ἀνέχεται, πάντα μακροθυμεῖ· οὐδὲν βάναυσον ἐν ἀγάπῃ, οὐδὲν ὑπερήφανον· ἀγάπη σχίσμα οὐκ ἔχει, ἀγάπη οὐ στασιάζει, ἀγάπη πάντα ποιεῖ ἐν ὁμονοίᾳ· ἐν τῇ ἀγάπῃ ἐτελειώθησαν πάντες ἐκλεκτοὶ τοῦ θεοῦ, δίχα ἀγάπης οὐδὲν εὐάρεστόν ἐστιν τῷ θεῷ. 6. ἐν ἀγάπῃ προσελάβετο ἡμᾶς ὁ δεσπότης· διὰ τὴν ἀγάπην, ἣν ἔσχεν πρὸς ἡμᾶς, τὸ αἷμα αὐτοῦ ἔδωκεν ὑπὲρ ἡμῶν Ἰησοῦς Χριστὸς ὁ κύριος ἡμῶν ἐν θελήματι θεοῦ, καὶ τὴν σάρκα ὑπὲρ τῆς σαρκὸς ἡμῶν καὶ τὴν ψυχὴν ὑπὲρ τῶν ψυχῶν ἡμῶν.
