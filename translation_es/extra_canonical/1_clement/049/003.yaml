translation:
  language: es
  text: ¿Quién es capaz de expresar la majestad de su hermosura?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expresar la grandeza».
    reason: Ajusta la alternativa documentada en el rastro inglés («tell the greatness») a un español más natural y cercano al sentido de ἐξειπεῖν.
lexical_decisions:
- source_word: τὸ μεγαλεῖον
  english_pob_choice: the majesty
  chosen_spanish: la majestad
  alternatives_spanish:
  - la grandeza
  - la magnificencia
  lexicon: μεγαλεῖον
  rationale: El contexto retórico elevado y la revisión inglesa que corrigió 'greatness' a 'majesty' favorecen 'majestad' en español, porque transmite mejor la idea de grandeza sublime y regia sin perder naturalidad.
- source_word: τῆς καλλονῆς
  english_pob_choice: of his beauty
  chosen_spanish: de su hermosura
  alternatives_spanish:
  - de su belleza
  - de su esplendor
  lexicon: καλλονή
  rationale: '''Hermosura'' conserva un matiz más literario y solemne que ''belleza'', acorde con el tono doxológico del pasaje, y permite reflejar la solemnidad de la combinación con ''majestad''.'
- source_word: τίς ἀρκετὸς ἐξειπεῖν
  english_pob_choice: Who is sufficient to declare
  chosen_spanish: ¿Quién es suficiente para declarar
  alternatives_spanish:
  - ¿Quién puede expresar
  - ¿Quién basta para proclamar
  lexicon: ἀρκετός / ἐξειπεῖν
  rationale: '''Suficiente para declarar'' reproduce bien la pregunta retórica de capacidad y el verbo de expresión exteriorizada (''ἐξειπεῖν'' = declarar, expresar plenamente), manteniendo el registro formal del original.'
theological_decisions:
- issue: Pronombre posesivo masculino singular aplicado a una referencia personal implícita
  english_pob_reading: his beauty
  chosen_spanish_reading: su hermosura
  alternative_spanish_readings:
  - su belleza
  - su esplendor
  rationale: El griego αὐτοῦ exige un posesivo singular masculino en referencia personal. En español, 'su' preserva esa referencia sin introducir aclaraciones innecesarias; no se explicita 'de él' porque el contexto ya sostiene la referencia.
  doctrine_reference: Referencia pronominal griega αὐτοῦ; revisión auditada del texto inglés que corrigió 'its' a 'his'.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'tell the greatness' a 'declare the majesty' y de 'its' a 'his'. La traducción española sigue esa revisión, reflejando tanto la elevación retórica de μεγαλεῖον como el posesivo masculino singular de αὐτοῦ.
  spanish_consistency_notes:
  - Se mantiene un registro solemne y conciso, propio de una sentencia retórica.
  - '''Majestad'' se usa en lugar de ''grandeza'' para seguir la revisión auditada y el peso semántico del griego.'
  - '''Hermosura'' evita el término más plano ''belleza'' sin abandonar la claridad.'
  - La nota al pie conserva una alternativa de sentido legítima en español sin debilitar la lectura principal.
