review_pass:
  verdict: revise
  source_alignment_summary: 'El griego dice literalmente: «La altura hacia la cual conduce el amor es indecible/está más allá de toda expresión». La estructura principal del borrador refleja bien τὸ ὕψος … ἀνάγει … ἀνεκδιήγητόν ἐστιν, y acierta en no añadir un objeto como «nos». Sin embargo, la elección de «caridad» para ἡ ἀγάπη no sigue el inglés auditado («love») ni el uso español más claro y natural aquí; además introduce un matiz técnico-virtud que el texto no exige.'
  spanish_quality_summary: La frase es comprensible y digna, pero «la caridad conduce» suena menos natural que «el amor conduce». «Indescriptible» funciona, aunque «más allá de toda descripción» o «indecible» se acercan más a «beyond telling»; no obstante, no es un error grave. La revisión propuesta mejora fidelidad léxica y legibilidad sin perder solemnidad.
  glossary_alignment: No hay términos del glosario principal en juego salvo ἀγάπη. Dado que el English POB escogió «love» y no hay justificación documentada para un tecnicismo eclesial, corresponde «amor» en español. «Altura» para ὕψος y «conduce» para ἀνάγει están bien alineados con la auditoría.
  issues:
  - severity: medium
    issue: «caridad» para ἀγάπη
    rationale: Aunque posible en contexto eclesial, aquí el original y la auditoría inglesa favorecen el sentido amplio y directo «amor». «Caridad» añade un matiz virtuoso-técnico no exigido por el griego ni por el rastro de revisión.
  - severity: low
    issue: Nota al pie innecesaria sobre «caridad»/«amor»
    rationale: Si se adopta «amor», desaparece la tensión léxica creada por la opción marcada; no hace falta conservar una nota que defiende una elección menos fiel al audit trail.
  revised_spanish_text: La altura a la que el amor conduce es indescriptible.
  revision_rationale: Se sustituye «caridad» por «amor» para reflejar con mayor fidelidad ἀγάπη según el original y el English POB auditado, y para usar el español más claro y natural en este contexto. Se elimina la nota porque deja de ser necesaria. Se mantienen «altura», «conduce» e «indescriptible», que comunican adecuadamente la imagen y la fuerza del griego sin añadir elementos ausentes.
