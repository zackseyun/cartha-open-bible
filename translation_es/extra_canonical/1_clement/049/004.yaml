translation:
  language: es
  text: La altura a la que el amor conduce es indescriptible.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ ὕψος
  english_pob_choice: The height
  chosen_spanish: La altura
  alternatives_spanish:
  - La elevación
  - La grandeza
  lexicon: ὕψος
  rationale: «Altura» reproduce con naturalidad la imagen espacial de «height» y conserva el valor metafórico sin añadir matices no presentes en el griego.
- source_word: ἀνάγει
  english_pob_choice: leads
  chosen_spanish: conduce
  alternatives_spanish:
  - lleva
  - guía
  lexicon: ἀνάγω
  rationale: «Conduce» expresa dirección y resultado de manera fiel a «leads», evitando añadir la idea de elevación física que la revisión inglesa descartó al preferir «leads» sobre «lifts us».
- source_word: ἡ ἀγάπη
  english_pob_choice: love
  chosen_spanish: la caridad[a]
  alternatives_spanish:
  - el amor
  - el amor cristiano
  lexicon: ἀγάπη
  rationale: Se eligió «caridad» para mantener el matiz clásico y eclesial que en español puede reflejar una virtud activa y ordenada, aunque «amor» sigue siendo una alternativa posible. La nota preserva la tensión semántica porque el griego puede abarcar amor, benevolencia o caridad según contexto.
- source_word: ἀνεκδιήγητόν ἐστιν
  english_pob_choice: is beyond telling
  chosen_spanish: es indescriptible
  alternatives_spanish:
  - no se puede expresar
  - es inefable
  lexicon: ἀνεκδιήγητος
  rationale: «Indescriptible» comunica de forma clara que no puede narrarse o explicarse plenamente, equivalente funcional de «beyond telling» sin sobrerreformular el intensivo griego.
theological_decisions:
- issue: ἀγάπη como virtud divina o humana
  english_pob_reading: love
  chosen_spanish_reading: la caridad[a]
  alternative_spanish_readings:
  - el amor
  - la caridad cristiana
  rationale: El texto no especifica sujeto ni objeto; por ello no se fuerza una lectura dogmática. «Caridad» deja abierta la amplitud de ἀγάπη y encaja bien en un contexto moral/eclesial de 1 Clemente, mientras la nota conserva la alternativa «amor».
  doctrine_reference: virtud de la caridad / amor cristiano
- issue: Relación entre 'altura' y 'conduce'
  english_pob_reading: The height to which love leads
  chosen_spanish_reading: La altura a la que la caridad conduce
  alternative_spanish_readings:
  - La altura a la que el amor lleva
  - La altura a la que la caridad guía
  rationale: Se mantiene la relación espacial-metafórica del original sin introducir explícitamente destinatarios de la acción. La formulación evita añadir «nos» o un objeto implícito que el griego no expresa.
  doctrine_reference: retórica moral de elevación/consumación
- issue: Intensidad de ἀνεκδιήγητον
  english_pob_reading: beyond telling
  chosen_spanish_reading: indescriptible
  alternative_spanish_readings:
  - inefable
  - no se puede expresar
  rationale: «Indescriptible» conserva la idea de imposibilidad verbal sin elevarla innecesariamente a una categoría filosófica más fuerte que la del inglés auditado.
  doctrine_reference: lenguaje sobre lo inefable
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió «lifts us» por «leads» para reflejar más directamente ἀνάγει y quitar el pronombre implícito «us». La traducción española sigue esa revisión: usa un verbo directivo sin añadir destinatario explícito y evita imágenes de alzamiento físico no expresadas en el griego.'
  spanish_consistency_notes:
  - Se mantuvo un registro formal y claro, apto para lectura pública.
  - No se introdujo ningún pronombre de primera persona ni un objeto implícito para respetar el griego.
  - «Indescriptible» funciona bien en español contemporáneo y preserva la estructura copulativa del original.
