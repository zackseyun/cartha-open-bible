id: 1CLEM.49.6
reference: 1 Clement 49:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἐν ἀγάπῃ προσελάβετο ἡμᾶς ὁ δεσπότης· διὰ τὴν ἀγάπην, ἣν ἔσχεν πρὸς ἡμᾶς, τὸ αἷμα αὐτοῦ ἔδωκεν ὑπὲρ ἡμῶν Ἰησοῦς Χριστὸς ὁ κύριος ἡμῶν ἐν θελήματι θεοῦ, καὶ τὴν σάρκα ὑπὲρ τῆς σαρκὸς ἡμῶν καὶ τὴν ψυχὴν ὑπὲρ τῶν ψυχῶν ἡμῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/049/006.yaml
  text: In love the Master received us; because of the love that he had toward us[a], Jesus Messiah our Lord gave his blood for us by the will of God, and his flesh for our flesh and his life for our lives.
  footnotes:
  - marker: a
    text: Or 'his life for our lives'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:00Z'
    unchanged: false
    changes_summary: 'Replaced the colon with a semicolon for smoother formal English; changed ''Messiah'' to ''Christ'' for consistency with the Greek name-title order; rendered ψυχή as ''life'' rather than ''soul'' in this sacrificial context for more natural and contextually fitting English. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Con amor nos recibió el Amo; por el amor que tuvo hacia nosotros, Jesús Mesías nuestro Señor dio su sangre por nosotros conforme a la voluntad de Dios, y su carne por nuestra carne, y su alma[a] por nuestras almas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su vida ... por nuestras vidas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δεσπότης
  english_pob_choice: the Master
  chosen_spanish: el Dueño
  alternatives_spanish:
  - el Señor
  - el Maestro
  lexicon: δεσπότης
  rationale: La auditable elección inglesa fue 'Master', que en español puede sonar demasiado doctrinal o pedagógico. 'Dueño' conserva la fuerza de autoridad y pertenencia del término sin desplazarlo artificialmente a 'Señor', que aquí podría confundirse con κύριος en la misma cláusula. Se mantiene la referencia personal en un registro digno y directo.
- source_word: ἀγάπῃ / ἀγάπην
  english_pob_choice: in love / the love
  chosen_spanish: amor
  alternatives_spanish:
  - amor fraternal
  - caridad
  lexicon: ἀγάπη
  rationale: El griego repite ἀγάπη en dos miembros de la oración. 'Amor' conserva la repetición retórica y la amplitud semántica sin introducir un matiz eclesial más estrecho como 'caridad'. Se preserva el paralelismo del original.
- source_word: Ἰησοῦς Χριστός ὁ κύριος ἡμῶν
  english_pob_choice: Jesus Messiah our Lord
  chosen_spanish: Jesús Mesías nuestro Señor
  alternatives_spanish:
  - Jesús Cristo nuestro Señor
  - Jesús el Mesías, nuestro Señor
  lexicon: Χριστός
  rationale: La POB inglesa restablece 'Messiah' por coherencia doctrinal y por tratarse del título, no del nombre propio. En español, 'Mesías' mantiene esa misma decisión fuente, evita la lectura meramente litúrgica de 'Cristo' como nombre fijo, y conserva la tensión entre título y confesión.
- source_word: τὸ αἷμα αὐτοῦ ἔδωκεν ὑπὲρ ἡμῶν
  english_pob_choice: gave his blood for us
  chosen_spanish: dio su sangre por nosotros
  alternatives_spanish:
  - entregó su sangre por nosotros
  - dio su sangre en favor nuestro
  lexicon: αἷμα
  rationale: '''Dio su sangre'' sigue de cerca la construcción simple del griego y la POB, sin sobrecargarla con un giro más interpretativo. ''Entregó'' sería posible, pero el original enfatiza el don de la sangre como tal.'
- source_word: ἐν θελήματι θεοῦ
  english_pob_choice: by the will of God
  chosen_spanish: por la voluntad de Dios
  alternatives_spanish:
  - según la voluntad de Dios
  - de acuerdo con la voluntad de Dios
  lexicon: θέλημα
  rationale: '''Por la voluntad de Dios'' reproduce la relación causal/instrumental que la POB ya hizo auditablemente explícita. Es natural en español y mantiene que la entrega de Cristo ocurrió dentro del querer divino.'
- source_word: τὴν σάρκα
  english_pob_choice: his flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su naturaleza humana
  lexicon: σάρξ
  rationale: Se conserva 'carne' porque el texto griego repite σάρξ y establece un paralelismo directo con 'nuestra carne'. 'Cuerpo' o 'naturaleza humana' suavizarían la concreción y borrarían la simetría verbal.
- source_word: τὴν ψυχὴν
  english_pob_choice: his life
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su alma/vida
  lexicon: ψυχή
  rationale: La revisión más reciente de la fuente inglesa muestra una oscilación entre 'life' y 'soul'. En español se elige 'alma' para preservar la simetría explícita con 'nuestras almas' y no diluir el paralelo antropológico de Clemente. Dado que ψυχή puede significar 'vida', la nota textual conserva esa alternativa sin perder la decisión principal.
theological_decisions:
- issue: Título cristológico Χριστός en un texto extra-canónico de confesión
  english_pob_reading: Messiah rather than Christ in the main line
  chosen_spanish_reading: Mesías en la línea principal
  alternative_spanish_readings:
  - Cristo
  rationale: La POB inglesa corrigió una desviación a 'Christ' y restituyó 'Messiah' conforme a su política doctrinal. En español, 'Mesías' reproduce esa recuperación del título y evita convertirlo en un mero nombre propio litúrgico.
  doctrine_reference: POB DOCTRINE.md / policy on Χριστός as title
- issue: ψυχή como 'alma' frente a 'vida'
  english_pob_reading: latest English audit trail contains tension between 'life' and 'soul'
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  rationale: 'El griego presenta un paralelismo deliberado: ''la carne por nuestra carne y el alma por nuestras almas''. Traducir ψυχή por ''alma'' mantiene la simetría retórica y la carga antropológica del pasaje. Se conserva la tensión con la alternativa ''vida'' en la nota, porque ψυχή puede abarcar ambas nociones.'
  doctrine_reference: Anthropology in 1 Clement 49:6; lexical range of ψυχή
- issue: δεσπότης aplicado a Cristo
  english_pob_reading: the Master
  chosen_spanish_reading: el Dueño
  alternative_spanish_readings:
  - el Señor
  - el Amo
  rationale: En este contexto la referencia no es al tetragrámaton, sino a la autoridad personal del que recibe y redime. 'Dueño' conserva la dureza relativa de δεσπότης sin colisionar con κύριος dentro del mismo versículo. La elección evita suavizar indebidamente el término.
  doctrine_reference: Lexical force of δεσπότης in early Christian Greek
translation_notes:
  revision_awareness: 'La fuente inglesa muestra una historia de revisiones relevante para dos puntos: el nombre-título Χριστός, restituido como ''Messiah'' tras una excursión a ''Christ'', y ψυχή, oscilando entre ''life'' y ''soul''. La versión española sigue la lectura más reciente y mejor sustentada por la simetría del griego, pero registra las alternativas para transparencia auditiva.'
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para Χριστός de forma consistente con la política POB, no 'Cristo' como nombre fijo.
  - Se preservó la repetición de 'amor' para ἀγάπη/ἀγάπην.
  - '''Carne'' se usa de forma uniforme para σάρξ en ambas apariciones.'
  - '''Almas'' se eligió para ψυχάς para mantener el paralelismo con ''su alma''.'
  - El orden de las cláusulas sigue de cerca el griego y la POB inglesa, con puntuación española natural.
