review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: amor repetido, δεσπότης diferenciado de κύριος, Mesías para Χριστός, y el paralelismo carne/carne y alma/almas. Sin embargo, la nota existente no corresponde al punto de mayor ambigüedad fuente. La única nota del inglés auditado está mal trasladada: no era alternativa para δεσπότης, sino para ψυχή (''life''/''soul''). Además, en español ''el Dueño'' suena menos natural y más posesivo/material que la fuerza personal de δεσπότης.'
  spanish_quality_summary: El texto es legible, pero 'En amor' suena calcado; 'Con amor' o 'En amor' ambos son posibles, pero 'Con amor' lee mejor en español. 'El Dueño' resulta poco idiomático en registro eclesial general; 'el Amo' preserva mejor la fuerza léxica de δεσπότης, aunque sigue siendo duro. También conviene reubicar 'por la voluntad de Dios' para evitar una pausa torpe.
  glossary_alignment: 'Alinea bien con la política de ''Mesías'' para Χριστός. No hay conflicto con Yahvé. Mantiene ''carne'' para σάρξ, lo cual es correcto. Para ψυχή, el español principal ''alma'' es defendible por la simetría griega, pero debe conservarse la alternativa ''vida'' en nota, que es donde realmente existe la variación auditada. La glosa de δεσπότης debe ajustarse: ''Dueño'' no es la mejor realización española del inglés ''Master''.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a δεσπότης, pero la ambigüedad auditada relevante pertenece a ψυχή.
    rationale: El rastro inglés conserva una alternativa para 'life/soul', no para 'Master'. Mantener la nota en 'Dueño/Señor' distorsiona la evidencia y omite la ambigüedad real del pasaje.
  - severity: medium
    issue: '''el Dueño'' suena poco natural y semánticamente desviado en español bíblico.'
    rationale: Aunque intenta evitar confusión con κύριος, 'Dueño' suele evocar propiedad material más que señorío personal. 'Amo' reproduce mejor δεσπότης y su contraste con 'Señor'.
  - severity: low
    issue: '''En amor'' es algo calcado en español.'
    rationale: La preposición instrumental o modal 'Con amor' comunica naturalmente ἐν ἀγάπῃ sin pérdida de sentido.
  - severity: low
    issue: La colocación de 'por la voluntad de Dios' interrumpe la fluidez.
    rationale: '''Dio su sangre por nosotros por la voluntad de Dios'' es entendible, pero ''dio su sangre por nosotros conforme a la voluntad de Dios'' o mover la frase mejora la lectura formal.'
  revised_spanish_text: Con amor nos recibió el Amo; por el amor que tuvo hacia nosotros, Jesús Mesías nuestro Señor dio su sangre por nosotros conforme a la voluntad de Dios, y su carne por nuestra carne, y su alma[a] por nuestras almas.
  revised_footnotes:
