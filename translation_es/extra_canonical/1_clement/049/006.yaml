  revision_rationale: Se corrige la nota para reflejar la ambigüedad real de ψυχή, preservando en el texto principal 'alma' por la simetría retórica del griego. Se cambia 'el Dueño' por 'el Amo' para representar mejor δεσπότης en español y mantener su contraste con 'nuestro Señor'. Se ajusta la redacción a un español más natural con 'Con amor' y 'conforme a la voluntad de Dios'.
