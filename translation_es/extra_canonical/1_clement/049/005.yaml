  text: Love joins us to God; love covers a multitude of sins; love endures all things, is patient in all things. There is nothing coarse in love, nothing arrogant. Love has no schism; love does not stir up faction; love does all things in concord. In love all the elect of God were made complete; apart from love, nothing is pleasing to God.
