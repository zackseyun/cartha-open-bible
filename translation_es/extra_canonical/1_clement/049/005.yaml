translation:
  language: es
  text: El amor nos une a Dios; el amor cubre una multitud de pecados; el amor todo lo soporta, es paciente en todo. No hay nada grosero en el amor, nada arrogante. El amor no tiene cisma; el amor no provoca facción; el amor lo hace todo en concordia. En el amor todos los elegidos de Dios fueron llevados a la plenitud; aparte del amor, nada es agradable a Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγάπη
  english_pob_choice: Love
  chosen_spanish: el amor
  alternatives_spanish:
  - amor
  - caridad
  lexicon: ἀγάπη
  rationale: Se conserva la noción central de amor como virtud activa y relacional. En español, «amor» es la equivalencia más natural y fiel al uso repetido del texto; «caridad» introduciría una tonalidad más eclesiástica y menos directa.
- source_word: κολλᾷ ἡμᾶς τῷ θεῷ
  english_pob_choice: joins us to God
  chosen_spanish: nos une a Dios
  alternatives_spanish:
  - nos adhiere a Dios
  - nos liga a Dios
  lexicon: κολλάω
  rationale: El verbo expresa unión/adhesión estrecha. «Une» comunica bien la relación resultante sin forzar un calco poco natural en español; «adhiere» o «liga» serían más literales pero menos fluidas.
- source_word: καλύπτει πλῆθος ἁμαρτιῶν
  english_pob_choice: covers a multitude of sins
  chosen_spanish: cubre una multitud de pecados
  alternatives_spanish:
  - cubre multitud de pecados
  - cubre gran cantidad de pecados
  lexicon: καλύπτω + πλῆθος + ἁμαρτιῶν
  rationale: Se mantiene la fórmula tradicional y el valor semántico de cubrir/ocultar. «Una multitud» refleja con claridad el sustantivo πλῆθος sin perder naturalidad.
- source_word: πάντα ἀνέχεται
  english_pob_choice: endures all things
  chosen_spanish: todo lo soporta
  alternatives_spanish:
  - todo lo aguanta
  - lo soporta todo
  lexicon: ἀνέχομαι
  rationale: El verbo pide una idea de resistencia/soporte perseverante. «Todo lo soporta» es idiomático y conserva la fuerza del original.
- source_word: μακροθυμεῖ
  english_pob_choice: is patient in all things
  chosen_spanish: es paciente en todo
  alternatives_spanish:
  - tiene paciencia en todo
  - persevera con paciencia en todo
  lexicon: μακροθυμέω
  rationale: La paciencia perseverante se expresa de modo claro con «es paciente en todo». La traducción evita duplicar demasiado la idea de soportar, pero mantiene la segunda cualidad en paralelo.
- source_word: βάναυσον
  english_pob_choice: coarse
  chosen_spanish: grosero
  alternatives_spanish:
  - basto
  - vulgar
  - tosco
  lexicon: βάναυσος
  rationale: El término denota algo rudo, inculto o sin refinamiento moral. «Grosero» comunica bien la falta de delicadeza moral en español moderno; «tosco» sería también viable.
- source_word: ὑπερήφανον
  english_pob_choice: arrogant
  chosen_spanish: arrogante
  alternatives_spanish:
  - altanero
  - orgulloso
  lexicon: ὑπερήφανος
  rationale: «Arrogante» preserva directamente la idea de soberbia visible en conducta y actitud. Es el equivalente más claro y ampliamente inteligible.
- source_word: σχίσμα
  english_pob_choice: schism
  chosen_spanish: cisma
  alternatives_spanish:
  - división
  - ruptura
  lexicon: σχίσμα
  rationale: «Cisma» mantiene el vínculo lexical y eclesial del término, además de la fuerza técnica que el texto sugiere.
- source_word: στασιάζει
  english_pob_choice: stir up faction
  chosen_spanish: promueve facción
  alternatives_spanish:
  - incita a facción
  - provoca rebelión
  lexicon: στασιάζω
  rationale: La frase busca expresar el sentido de promover discordia o facción. «Promueve facción» es sobria y cercana al valor del verbo en este contexto.
- source_word: ἐν ὁμονοίᾳ
  english_pob_choice: in concord
  chosen_spanish: en concordia
  alternatives_spanish:
  - en armonía
  - en unanimidad
  lexicon: ὁμόνοια
  rationale: «Concordia» es un sustantivo español culto y preciso para unidad de mente y acción. Evita reducir el matiz comunitario a simple armonía superficial.
- source_word: ἐτελειώθησαν
  english_pob_choice: were made complete
  chosen_spanish: fueron perfeccionados
  alternatives_spanish:
  - fueron completados
  - alcanzaron la plenitud
  lexicon: τελειόω
  rationale: «Fueron perfeccionados» refleja la idea de llegar a su meta o completitud. Aunque «completados» es más literal, suena menos natural y pierde la dimensión teleológica.
- source_word: ἐκλεκτοὶ τοῦ θεοῦ
  english_pob_choice: the elect of God
  chosen_spanish: los elegidos de Dios
  alternatives_spanish:
  - los escogidos de Dios
  - los electos de Dios
  lexicon: ἐκλεκτός
  rationale: «Elegidos» es natural en español y conserva el sentido de selección divina. «Escogidos» es cercana, pero «elegidos» encaja mejor en el registro del texto.
- source_word: εὐάρεστόν ἐστιν τῷ θεῷ
  english_pob_choice: is pleasing to God
  chosen_spanish: es agradable a Dios
  alternatives_spanish:
  - es aceptable para Dios
  - le agrada a Dios
  lexicon: εὐάρεστος
  rationale: «Agradable a Dios» conserva la construcción del POB inglés y la relación de agrado/aceptación divina sin introducir términos más interpretativos.
theological_decisions:
- issue: La capacidad unificadora y purificadora del amor
  english_pob_reading: Love joins us to God; love covers a multitude of sins
  chosen_spanish_reading: El amor nos une a Dios; el amor cubre una multitud de pecados
  alternative_spanish_readings:
  - El amor nos adhiere a Dios; el amor cubre multitud de pecados
  - El amor nos vincula a Dios; el amor perdona una multitud de pecados
  rationale: Se preserva la afirmación fuerte de que el amor une al creyente con Dios y que también cubre una gran cantidad de pecados. No se sustituye «cubre» por «perdona» porque el texto no dice explícitamente perdonar; mantiene la tensión entre cobertura y remisión implícita sin resolverla artificialmente.
  doctrine_reference: Relación entre amor, comunión con Dios y remisión/encubrimiento de pecados en clave sapiencial y comunitaria.
- issue: La cláusula sobre los elegidos y la perfección en el amor
  english_pob_reading: In love all the elect of God were made complete
  chosen_spanish_reading: En el amor todos los elegidos de Dios fueron perfeccionados
  alternative_spanish_readings:
  - En el amor todos los elegidos de Dios fueron completados
  - En el amor todos los elegidos de Dios alcanzaron la plenitud
  rationale: 'Se mantiene la lectura teleológica: el amor conduce a la meta o madurez de los elegidos. «Perfeccionados» conserva esa culminación sin reducirla a impecabilidad moral absoluta.'
  doctrine_reference: Santificación / maduración de los elegidos en la vida de amor comunitario.
- issue: La incompatibilidad del amor con la facción y la soberbia
  english_pob_reading: There is nothing coarse in love, nothing arrogant. Love has no schism; love does not stir up faction; love does all things in concord.
  chosen_spanish_reading: No hay nada grosero en el amor, nada arrogante. El amor no tiene cisma; el amor no promueve facción; el amor hace todas las cosas en concordia.
  alternative_spanish_readings:
  - No hay nada tosco en el amor, nada altanero. El amor no tiene división; el amor no provoca rebelión; el amor hace todas las cosas en armonía.
  rationale: 'Se mantiene la serie de negaciones como una ética comunitaria concreta: el amor excluye rudeza, soberbia, división y faccionalismo. «Cisma» se conserva por su peso eclesial, y «facción» por su fuerza política/comunitaria.'
  doctrine_reference: Ética eclesial de unidad, humildad y paz comunitaria.
translation_notes:
  revision_awareness: La revisión más reciente mantuvo el texto sin cambios; además, el control cruzado informó alta concordancia (1.0). Por eso esta versión sigue de cerca el inglés POB auditado y no introduce variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantuvo «amor» de forma uniforme para ἀγάπη en todo el pasaje.
  - Se preservó la secuencia paralelística del griego y del POB inglés con oraciones breves y coordinadas.
  - Se usó «Dios» para θεός en ambas apariciones, sin añadir mayúsculas litúrgicas ni sustituciones por «Señor».
  - Se evitó diluir «cisma» y «facción», porque ambos términos aportan matices distintos de división comunitaria.
  - No se añadieron notas al pie porque no había una ambigüedad textual que requiriera marcadores en el cuerpo del español.
