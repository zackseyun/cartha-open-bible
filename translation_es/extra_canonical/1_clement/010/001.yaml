review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido global del griego y del English POB: mantiene la designación honorífica de Abraham como «el amigo», conserva la relación entre fidelidad y obediencia, reproduce «tribus» en vez de armonizar con Génesis, y retiene «simiente» para σπέρμα. También preserva la estructura acumulativa de fe, hospitalidad y obediencia en el v. 7.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero presenta varios giros poco naturales o mejorables en español eclesial moderno: «fue hallado fiel en que», «hacia la tierra» en una cita de mandato, «serás bendito» donde «serás bendecido» suena más idiomático, y especialmente «le fue contado por justicia», que no refleja bien la construcción teológica estable en español bíblico. También conviene ajustar la puntuación del discurso citado en v. 6.'
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: «Dios», «simiente», «justicia», «hospitalidad» y «obediencia» están bien encaminados. No hay conflicto con los defaults mayores. La principal corrección léxica necesaria es «le fue contado como justicia», que se ajusta mejor a εἰς δικαιοσύνην y a la formulación bíblica reconocible en español.'
  issues:
  - severity: medium
    issue: «fue hallado fiel en que llegó a ser obediente» suena forzado en español
    rationale: La construcción intenta calcar el inglés y el infinitivo griego, pero en español resulta poco natural. «por hacerse obediente» o «al hacerse obediente» conserva el sentido explicativo de ὑπήκοον γενέσθαι con mejor fluidez.
  - severity: low
    issue: «hacia la tierra que te mostraré» es menos natural que «a la tierra»
    rationale: εἰς τὴν γῆν expresa destino. En español bíblico y natural, «a la tierra que te mostraré» reproduce mejor la idea.
  - severity: low
    issue: «serás bendito» es comprensible pero menos idiomático aquí
    rationale: Como pasivo/futuro de bendecir, «serás bendecido» comunica con más claridad el valor verbal de ἔσῃ εὐλογημένος sin sonar arcaizante.
  - severity: medium
    issue: «le fue contado por justicia» no expresa bien εἰς δικαιοσύνην
    rationale: La fórmula bíblica estable y más fiel en español es «le fue contado como justicia» o «por justicia» solo en contextos muy marcados. Aquí «como justicia» conserva mejor la relación de imputación/reconocimiento.
  - severity: low
    issue: Puntuación mejorable en la cita del v. 6
    rationale: 'Conviene colocar el punto final dentro de la cita completa de forma consistente en español: «…así será tu simiente». Y Abraham…'
