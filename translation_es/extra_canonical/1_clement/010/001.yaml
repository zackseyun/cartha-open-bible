revisions:
- from: 'Abraham, llamado el amigo, fue hallado fiel en que llegó a ser obediente a las palabras de Dios. 2 Y en obediencia salió de su tierra y de su parentela y de la casa de su padre, para que, dejando atrás una tierra pequeña y una parentela débil y una casa pequeña, heredara las promesas de Dios. Porque le dice: 3 “Sal de tu tierra y de tu parentela y de la casa de tu padre, hacia la tierra que te mostraré; y haré de ti una nación grande, y te bendeciré y engrandeceré tu nombre, y serás bendito. Y bendeciré a los que te bendigan, y maldeciré a los que te maldigan, y en ti serán benditas todas las tribus de la tierra.” 4 Y otra vez, cuando se separó de Lot, Dios le dijo: “Levanta tus ojos y mira desde el lugar donde ahora estás, hacia el norte y el sur y el oriente y el mar, porque toda la tierra que ves, te la daré a ti y a tu simiente para siempre. 5 Y haré tu simiente como la arena de la tierra; si alguien puede contar la arena de la tierra, también tu simiente será contada.” 6 Y
    otra vez dice: “Dios sacó a Abraham y le dijo: ‘Mira al cielo y cuenta las estrellas, si puedes contarlas; así será tu simiente’”. Y Abraham creyó a Dios, y le fue contado por justicia. 7 Por fe y hospitalidad le fue dado un hijo en su vejez, y por obediencia lo ofreció como sacrificio a Dios en uno de los montes que le mostró.'
  to: 'Abraham, llamado el amigo, fue hallado fiel por hacerse obediente a las palabras de Dios. 2 Y en obediencia salió de su tierra, de su parentela y de la casa de su padre, para que, dejando atrás una tierra pequeña, una parentela débil y una casa pequeña, heredara las promesas de Dios. Porque le dice: 3 «Sal de tu tierra, de tu parentela y de la casa de tu padre a la tierra que te mostraré; y haré de ti una nación grande, y te bendeciré y engrandeceré tu nombre, y serás bendecido. Y bendeciré a los que te bendigan, y maldeciré a los que te maldigan, y en ti serán benditas todas las tribus de la tierra». 4 Y otra vez, cuando se separó de Lot, Dios le dijo: «Levanta tus ojos y mira desde el lugar donde ahora estás, hacia el norte, el sur, el oriente y el mar, porque toda la tierra que ves te la daré a ti y a tu simiente para siempre. 5 Y haré tu simiente como la arena de la tierra; si alguien puede contar la arena de la tierra, también tu simiente será contada». 6 Y otra vez dice: «Dios
    sacó a Abraham y le dijo: “Mira al cielo y cuenta las estrellas, si puedes contarlas; así será tu simiente”». Y Abraham creyó a Dios, y le fue contado como justicia. 7 Por fe y hospitalidad le fue dado un hijo en su vejez, y por obediencia lo ofreció como sacrificio a Dios en uno de los montes que le mostró.'
  rationale: Las revisiones son menores pero necesarias para mejorar la fidelidad idiomática al griego y la legibilidad del español. Se suaviza una construcción calcada («fue hallado fiel en que…»), se corrigen dos expresiones menos naturales en la cita patriarcal («a la tierra», «serás bendecido»), y se ajusta la fórmula teológica a la expresión bíblica española más fiel («le fue contado como justicia»). No se requieren notas nuevas.
