    otra vez dice: «Dios sacó a Abraham y le dijo: “Mira al cielo y cuenta las estrellas, si puedes contarlas; así será tu simiente”». Y Abraham creyó a Dios, y le fue contado como justicia. 7 Por fe y hospitalidad le fue dado un hijo en su vejez, y por obediencia lo ofreció como sacrificio a Dios en uno de los montes que le mostró.'
