translation:
  language: es
  text: 'Abraham, llamado el amigo, fue hallado fiel por hacerse obediente a las palabras de Dios. 2 Y en obediencia salió de su tierra, de su parentela y de la casa de su padre, para que, dejando atrás una tierra pequeña, una parentela débil y una casa pequeña, heredara las promesas de Dios. Porque le dice: 3 «Sal de tu tierra, de tu parentela y de la casa de tu padre a la tierra que te mostraré; y haré de ti una nación grande, y te bendeciré y engrandeceré tu nombre, y serás bendecido. Y bendeciré a los que te bendigan, y maldeciré a los que te maldigan, y en ti serán benditas todas las tribus de la tierra». 4 Y otra vez, cuando se separó de Lot, Dios le dijo: «Levanta tus ojos y mira desde el lugar donde ahora estás, hacia el norte, el sur, el oriente y el mar, porque toda la tierra que ves te la daré a ti y a tu simiente para siempre. 5 Y haré tu simiente como la arena de la tierra; si alguien puede contar la arena de la tierra, también tu simiente será contada». 6 Y otra vez dice: «Dios
    sacó a Abraham y le dijo: “Mira al cielo y cuenta las estrellas, si puedes contarlas; así será tu simiente”». Y Abraham creyó a Dios, y le fue contado como justicia. 7 Por fe y hospitalidad le fue dado un hijo en su vejez, y por obediencia lo ofreció como sacrificio a Dios en uno de los montes que le mostró.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φίλος
  english_pob_choice: the friend
  chosen_spanish: el amigo
  alternatives_spanish:
  - amigo
  - el amigo amado
  lexicon: BDAG
  rationale: La forma con artículo en Clemente funciona como designación honorífica de Abraham. «El amigo» conserva ese valor titular y evita añadir contenido no explícito; «el amigo amado» sería interpretativo.
- source_word: πιστός
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - creyente
  - digno de confianza
  lexicon: BDAG
  rationale: En este contexto, la cualidad se muestra en la obediencia concreta de Abraham. «Fiel» reproduce bien el sentido relacional y moral de πιστός sin reducirlo solo a creer intelectualmente.
- source_word: ὑπήκοον γενέσθαι
  english_pob_choice: he became obedient
  chosen_spanish: llegó a ser obediente
  alternatives_spanish:
  - se hizo obediente
  - se mostró obediente
  lexicon: BDAG
  rationale: La construcción infinitiva explica cómo fue hallado fiel. «Llegó a ser obediente» conserva el matiz de proceso/resultado y evita que el español suene demasiado estático.
- source_word: ῥήμασιν
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - mandatos
  lexicon: BDAG
  rationale: El plural abarca las declaraciones y órdenes divinas. «Palabras» es la opción más transparente y no estrecha el sentido a mandatos solamente.
- source_word: ὑπακοῇ
  english_pob_choice: in obedience
  chosen_spanish: en obediencia
  alternatives_spanish:
  - por obediencia
  - mediante obediencia
  lexicon: BDAG
  rationale: El dativo expresa modo o medio. «En obediencia» suena natural en español y mantiene la conexión directa entre salir y obedecer.
- source_word: συγγένεια
  english_pob_choice: kindred
  chosen_spanish: parentela
  alternatives_spanish:
  - parientes
  - clan
  lexicon: BDAG
  rationale: «Parentela» conserva mejor el tejido familiar-corporativo que «parientes» y se ajusta al registro elevado del pasaje.
- source_word: ἀσθενῆ
  english_pob_choice: weak
  chosen_spanish: débil
  alternatives_spanish:
  - endeble
  - insignificante
  lexicon: BDAG
  rationale: El adjetivo resalta la debilidad o falta de peso de lo que Abraham dejó atrás. «Débil» mantiene la fuerza léxica sin sobreinterpretar.
- source_word: ἐπαγγελίας
  english_pob_choice: promises
  chosen_spanish: promesas
  alternatives_spanish:
  - promesas pactales
  - juramentos
  lexicon: BDAG
  rationale: Es lenguaje de promesa con trasfondo pactual. «Promesas» es claro y fiel al uso bíblico sin añadir matices no presentes en el texto.
- source_word: μεγαλυνῶ
  english_pob_choice: magnify
  chosen_spanish: engrandeceré
  alternatives_spanish:
  - magnificaré
  - exaltaré
  lexicon: BDAG
  rationale: El verbo significa hacer grande. «Engrandeceré tu nombre» es idiomático en español y conserva el tono bíblico elevado.
- source_word: φυλαὶ
  english_pob_choice: tribes
  chosen_spanish: tribus
  alternatives_spanish:
  - familias
  - pueblos
  lexicon: BDAG
  rationale: El griego citado en Clemente dice «tribus», y la traducción debe seguir esa forma en vez de armonizarla con fórmulas más conocidas de Génesis.
- source_word: σπέρμα
  english_pob_choice: seed
  chosen_spanish: simiente
  alternatives_spanish:
  - descendencia
  - linaje
  lexicon: BDAG
  rationale: «Simiente» preserva el singular colectivo y la resonancia escrituraria del término, como lo hace «seed» en el inglés POB. Aunque es menos usual que «descendencia», aquí resulta más auditable y precisa.
- source_word: ἕως αἰῶνος
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - hasta el siglo
  lexicon: BDAG
  rationale: En este contexto de promesa, el sentido idiomático es durativo. «Para siempre» es la forma natural y solemne en español.
- source_word: ἐλογίσθη αὐτῷ εἰς δικαιοσύνην
  english_pob_choice: it was counted to him for righteousness
  chosen_spanish: le fue contado por justicia
  alternatives_spanish:
  - le fue contado como justicia
  - le fue acreditado para justicia
  lexicon: BDAG
  rationale: Se conserva la fórmula reconocible y la tensión teológica del texto, sin convertir δικαιοσύνη en una mera «rectitud» ni suavizar el verbo contable.
- source_word: φιλοξενίαν
  english_pob_choice: hospitality
  chosen_spanish: hospitalidad
  alternatives_spanish:
  - acogida
  - amor a los extranjeros
  lexicon: BDAG
  rationale: El término designa la recepción generosa de otros. «Hospitalidad» es la equivalencia estándar y funciona bien en el argumento exhortativo de Clemente.
- source_word: ἐν γήρᾳ
  english_pob_choice: in old age
  chosen_spanish: en su vejez
  alternatives_spanish:
  - en la vejez
  - cuando era anciano
  lexicon: BDAG
  rationale: La frase marca el carácter sorprendente del nacimiento de Isaac. «En su vejez» es natural, claro y fiel al contexto.
- source_word: προσήνεγκεν
  english_pob_choice: he offered
  chosen_spanish: lo ofreció
  alternatives_spanish:
  - lo presentó
  - lo llevó como ofrenda
  lexicon: BDAG
  rationale: En contexto sacrificial, «ofreció» es la traducción más precisa y directa.
theological_decisions:
- issue: Relación entre fe, obediencia y hospitalidad en Abraham
  english_pob_reading: 'The translation preserves Clement''s cumulative presentation: Abraham is found faithful in obedience; a son is given because of faith and hospitality; Isaac is offered through obedience.'
  chosen_spanish_reading: 'La traducción conserva la presentación acumulativa de Clemente: Abraham es hallado fiel en la obediencia; se le da un hijo por la fe y la hospitalidad; e Isaac es ofrecido por obediencia.'
  alternative_spanish_readings:
  - Reducir hospitalidad a un simple rasgo secundario
  - Suavizar la causalidad para evitar tensión doctrinal
  rationale: Clemente no reduce a Abraham a una sola virtud, sino que acumula fe, obediencia y hospitalidad. La traducción mantiene esas relaciones explícitas sin resolver tensiones interpretativas que el texto deja abiertas.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Valor del singular colectivo σπέρμα
  english_pob_reading: seed
  chosen_spanish_reading: simiente
  alternative_spanish_readings:
  - descendencia
  - hijos
  rationale: El singular colectivo tiene peso intertextual y teológico en la tradición bíblica. «Simiente» mantiene esa carga y evita desdibujar la forma del texto.
  doctrine_reference: Consistencia de términos clave, o excepción documentada.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo estable en la última pasada; no hay revisiones aplicadas ni cambios pendientes que afecten la tradición textual o las decisiones léxicas principales.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός en todo el pasaje.
  - Se traduce ἐπαγγελία/ἐπαγγελίας como «promesas» para conservar coherencia temática.
  - Se usa «simiente» de manera consistente para σπέρμα, siguiendo la decisión auditada del inglés.
  - Se preserva «hospitalidad» como término técnico-ético en la sección final.
  - Se conserva el registro solemne y parenético propio de Clemente sin modernizar en exceso el discurso bíblico citado.
