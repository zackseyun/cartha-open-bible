translation:
  language: es
  text: «Y haré tu descendencia como la arena de la tierra; si alguien puede contar la arena de la tierra, también tu descendencia será contada.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σπέρμα
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - semilla
  lexicon: σπέρμα
  rationale: En español, «descendencia» comunica mejor el sentido colectivo y genealógico del término en esta promesa. «Semilla» suena demasiado botánico en este contexto, y «simiente» es más arcaico. La POB inglesa mantuvo «seed»; aquí se explicita el valor colectivo que el griego permite y que el contexto exige.
- source_word: ἄμμον τῆς γῆς
  english_pob_choice: the sand of the earth
  chosen_spanish: la arena de la tierra
  alternatives_spanish:
  - la arena de la tierra
  - la arena de la tierra
  lexicon: ἄμμος
  rationale: Se conserva la imagen literal del griego y de la POB inglesa. En español, «arena de la tierra» suena algo más natural que un giro más rígido, sin perder la hipérbole bíblica.
- source_word: ἐξαριθμηθήσεται
  english_pob_choice: will be counted
  chosen_spanish: será contada
  alternatives_spanish:
  - podrá ser contada
  - será numerada
  lexicon: ἐξαριθμέω
  rationale: El verbo pasivo en español se rinde con «será contada», que mantiene la idea de ser objeto de cómputo. «Será numerada» es posible, pero menos idiomática; «podrá ser contada» añade una modalidad que el griego no exige.
theological_decisions:
- issue: Promesa de descendencia innumerable
  english_pob_reading: your seed also will be counted
  chosen_spanish_reading: también tu descendencia será contada
  alternative_spanish_readings:
  - también tu descendencia será numerada
  - también tu simiente será contada
  rationale: La frase conserva la tensión semítica de una descendencia tan abundante que sólo puede quedar incluida en una comparación hiperbólica con la arena. No se suaviza ni se explica alegóricamente; se mantiene la promesa como promesa de multiplicación enorme.
  doctrine_reference: Génesis 22:17; Romanos 4:18
- issue: Cita/promesa divina en primera persona
  english_pob_reading: And I will make
  chosen_spanish_reading: Y haré
  alternative_spanish_readings:
  - Y haré que
  - Y yo haré
  rationale: Se mantiene la primera persona divina de la fuente sin añadidos interpretativos. La formulación breve en español reproduce bien el peso solemne de la promesa.
  doctrine_reference: Génesis 22:17
translation_notes:
  revision_awareness: La revisión más reciente indicó que el texto inglés no requería cambios; por eso la versión española sigue de cerca la formulación establecida, con ajustes naturales de léxico para que la imagen genealógica de σπέρμα sea inteligible en español.
  spanish_consistency_notes:
  - Se usa «descendencia» para σπέρμα en sentido colectivo, coherente con el contexto de promesa patriarcal.
  - 'Se mantiene el orden y la simetría del paralelismo griego: promesa de multiplicación seguida de comparación hiperbólica y cláusula condicional.'
  - No se introduce terminología eclesiástica ni teológica ajena al texto.
