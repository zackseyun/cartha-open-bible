base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/010/005.yaml
  text: And I will make your seed like the sand of the earth; if anyone is able to count the sand of the earth, your seed also will be counted.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:40Z'
    unchanged: true
