    timestamp: '2026-04-23T11:34:12Z'
    unchanged: false
    changes_summary: Changed 'when he separated from Lot' to 'when he was separated from Lot' to reflect the passive infinitive διαχωρισθῆναι more closely. Removed the comma after 'see' for smoother English. No other changes needed.
translation:
  language: es
  text: 'Y otra vez, cuando se separó de Lot, Dios le dijo: «Levanta tus ojos y mira desde el lugar donde ahora estás, hacia el norte, el sur, el oriente y el mar, porque toda la tierra que ves te la daré a ti y a tu descendencia para siempre».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διαχωρισθῆναι αὐτὸν ἀπὸ Λὼτ
  english_pob_choice: when he was separated from Lot
  chosen_spanish: cuando se separó de Lot
  alternatives_spanish:
  - cuando fue separado de Lot
  - cuando quedó separado de Lot
  lexicon: διαχωρίζω
  rationale: 'El griego admite aquí un sentido intransitivo o cuasi medio: Abraham partió de Lot / se apartó de Lot. En español, «se separó de Lot» conserva esa idea sin sugerir indebidamente una acción pasiva externa ejercida sobre él.'
- source_word: ἴδε
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira hacia
  - ve
  lexicon: ὁράω
  rationale: La forma imperativa seguida por indicaciones direccionales funciona naturalmente como «mira» en español; «ve» sonaría más a captar con la vista que a dirigir la mirada.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: θεός
  rationale: Se mantiene «Dios» como equivalente directo y natural para el referente divino del texto.
- source_word: ἕως αἰῶνος
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - para la eternidad
  lexicon: αἰών
  rationale: «Para siempre» comunica bien la duración indefinida del griego sin introducir una formulación más litúrgica que la que exige el contexto.
theological_decisions:
- issue: La promesa de la tierra y de la descendencia
  english_pob_reading: all the land that you see I will give to you and to your seed forever
  chosen_spanish_reading: toda la tierra que ves te la daré a ti y a tu descendencia para siempre
  alternative_spanish_readings:
  - toda la tierra que ves la daré a ti y a tu simiente para siempre
  - toda la tierra que ves te la daré a ti y a tu posteridad para siempre
  rationale: Se conserva la fuerza promesal y el vínculo pactal del texto. «Descendencia» es el modo más claro y bíblico en español para σπέρμα sin perder la referencia al linaje prometido.
  doctrine_reference: Génesis 13:14–17; lenguaje pactal de la promesa a Abraham
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la lectura de 'when he separated from Lot' a 'when he was separated from Lot' para reflejar mejor el infinitivo griego διαχωρισθῆναι, y cambió 'see' a 'look'. La presente versión española sigue esa corrección con 'cuando se separó de Lot' y 'mira'.
  spanish_consistency_notes:
  - Se usó «descendencia» para σπέρμα de manera consistente con el registro bíblico en español.
  - No se introdujo «Mesías» ni otros términos cristológicos porque el pasaje no los contiene.
  - Se mantuvo «tierra» para γῆ y no «país» o «territorio», porque el contexto de promesa abrahámica es más amplio que una delimitación política.
