base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/010/004.yaml
  text: And again[a], when he was separated from Lot, God said to him, “Lift up your eyes and look from the place where you now are, toward the north and the south and the east and the sea, because all the land that you see I will give to you and to your seed forever.”
