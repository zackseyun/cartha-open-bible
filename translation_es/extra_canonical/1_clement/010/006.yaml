- from: 'Y otra vez dice[a]: «Dios sacó a Abraham y le dijo: “Mira hacia el cielo y cuenta las estrellas, si puedes contarlas; así será tu descendencia”. Abraham creyó a Dios, y le fue contado como justicia».'
  to: 'Y otra vez dice[a]: «Dios sacó a Abraham y le dijo: “Mira hacia el cielo y cuenta las estrellas, si puedes contarlas; así será tu descendencia”. Y Abraham creyó a Dios, y eso le fue contado por justicia».'
  rationale: Se conserva el sentido del griego y la cita continua de Génesis 15:5–6, pero se mejora la puntuación de la cita anidada y se sustituye «le fue contado como justicia» por la formulación más natural y bíblicamente idiomática «eso le fue contado por justicia». No hace falta adjudicación adicional.
