id: 1CLEM.10.6
reference: 1 Clement 10:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ πάλιν λέγει· Ἐξήγαγεν ὁ θεὸς τὸν Ἀβραὰμ καὶ εἶπεν αὐτῷ· Ἀνάβλεψον εἰς τὸν οὐρανὸν καὶ ἀρίθμησον τοὺς ἀστέρας, εἰ δυνήσῃ ἐξαριθμῆσαι αὐτούς· οὕτως ἔσται τὸ σπέρμα σου. ἐπίστευσεν δὲ Ἀβραὰμ τῷ θεῷ, καὶ ἐλογίσθη αὐτῷ εἰς δικαιοσύνην.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/010/006.yaml
  text: And again he says[a], “God brought Abraham out and said to him, ‘Look up to heaven and count the stars, if you are able to count them; so will your offspring be.’ And Abraham believed God, and it was counted to him as righteousness.”
  footnotes:
  - marker: a
    text: Or 'so will your seed be.’” And Abraham believed God, and it was counted to him for righteousness.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:42Z'
    unchanged: false
    changes_summary: Replaced 'seed' with 'offspring' for more natural English while preserving the singular collective sense of σπέρμα, and changed 'for righteousness' to 'as righteousness' to reflect εἰς δικαιοσύνην more idiomatically in English.
translation:
  language: es
  text: 'Y otra vez dice[a]: «Dios sacó a Abraham y le dijo: “Mira hacia el cielo y cuenta las estrellas, si puedes contarlas; así será tu descendencia”. Y Abraham creyó a Dios, y eso le fue contado por justicia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y de nuevo dice».'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ πάλιν λέγει
  english_pob_choice: And again he says
  chosen_spanish: Y otra vez dice
  alternatives_spanish:
  - Y de nuevo dice
  - Y otra vez afirma
  lexicon: λέγω
  rationale: Conserva la fórmula introductoria de cita continua sin sobrecargar el español. «Dice» mantiene el presente de cita del texto y «otra vez» reproduce bien καὶ πάλιν.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Dios verdadero
  lexicon: θεός
  rationale: El referente es el Dios de la promesa en la cita de Génesis; en español basta «Dios» sin artículo para una referencia natural y reverente.
- source_word: Ἐξήγαγεν...τὸν Ἀβραὰμ
  english_pob_choice: God brought Abraham out
  chosen_spanish: Dios sacó a Abraham
  alternatives_spanish:
  - Dios condujo a Abraham fuera
  - Dios sacó fuera a Abraham
  lexicon: ἐξάγω
  rationale: «Sacó» expresa con naturalidad la acción de llevar fuera; evita una calca pesada y conserva el movimiento espacial del verbo.
- source_word: Ἀνάβλεψον εἰς τὸν οὐρανόν
  english_pob_choice: Look up to heaven
  chosen_spanish: Mira hacia el cielo
  alternatives_spanish:
  - Levanta la vista al cielo
  - Mira al cielo
  lexicon: ἀναβλέπω
  rationale: «Mira hacia el cielo» comunica la instrucción visual de manera clara y solemne; «cielo» es el equivalente más idiomático del contexto bíblico.
- source_word: ἀρίθμησον τοὺς ἀστέρας
  english_pob_choice: count the stars
  chosen_spanish: cuenta las estrellas
  alternatives_spanish:
  - enumera las estrellas
  - numera las estrellas
  lexicon: ἀριθμέω
  rationale: Verbo directo y transparente en español, adecuado al imperativo y al registro bíblico.
- source_word: σπέρμα
  english_pob_choice: offspring / seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - semilla
  - linaje
  lexicon: σπέρμα
  rationale: «Descendencia» preserva el sentido colectivo y genealógico del término sin introducir la ambigüedad moderna de «semilla». Mantiene la tensión bíblica entre singularidad colectiva y multiplicidad.
- source_word: ἐπίστευσεν δὲ Ἀβραὰμ τῷ θεῷ
  english_pob_choice: And Abraham believed God
  chosen_spanish: Abraham creyó a Dios
  alternatives_spanish:
  - Abraham creyó en Dios
  - Abraham confió en Dios
  lexicon: πιστεύω + dativo
  rationale: El dativo con πιστεύω permite el valor de confiar/creer a alguien; «creyó a Dios» mantiene la relación personal y la fidelidad al giro griego, aunque suene más bíblico que coloquial.
- source_word: ἐλογίσθη αὐτῷ εἰς δικαιοσύνην
  english_pob_choice: it was counted to him as righteousness
  chosen_spanish: le fue contado como justicia
  alternatives_spanish:
  - le fue considerado para justicia
  - le fue contado para justicia
  lexicon: λογίζομαι + εἰς δικαιοσύνην
  rationale: «Le fue contado como justicia» refleja el pasivo y la valoración resultante de εἰς δικαιοσύνην; «como» ayuda al español a sonar natural sin perder el juicio declarativo.
theological_decisions:
- issue: 'Alcance de la cita: Génesis 15:5–6 como una sola unidad'
  english_pob_reading: The quotation remains continuous after 'And again he says,' with the Abraham-believed clause inside the same scriptural citation.
  chosen_spanish_reading: La cita permanece continua después de «Y otra vez dice», incluyendo la cláusula sobre Abraham como parte de la misma cita bíblica.
  alternative_spanish_readings:
  - Cerrar la cita antes de «Abraham creyó a Dios»
  - Tratar la segunda cláusula como narración de Clemente
  rationale: El griego presenta una sola cita introducida por καὶ πάλιν λέγει; por eso la puntuación española debe conservar la continuidad y no aislar la cláusula final como narración independiente.
  doctrine_reference: Citación escrituraria continua; fidelidad textual a Génesis 15:5–6
- issue: Valor semántico de σπέρμα
  english_pob_reading: offspring / seed
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - simiente
  - semilla
  rationale: «Descendencia» mantiene la referencia colectiva y genealógica sin reducir el término a una imagen vegetal en español contemporáneo. Evita perder la tensión entre promesa a un linaje y multitud innumerable.
  doctrine_reference: Promesa patriarcal de la descendencia de Abraham (Génesis 15:5)
translation_notes:
  revision_awareness: El texto griego y la revisión auditada coinciden en que la cita de Génesis 15:5–6 es continua; por eso se mantuvo una sola cita entre comillas dobles externas, con la cláusula final dentro de la misma unidad. La revisión inglesa también confirmó el valor de σπέρμα como sentido colectivo ('offspring/seed'); en español se optó por «descendencia» por claridad y fidelidad semántica.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y no se introdujo «SEÑOR», ya que el texto cita directamente Génesis sin sustitución del nombre divino en este verso.
  - Se preservó el presente de cita «dice» para reflejar la fórmula introductoria del original.
  - La relación πιστεύω + dativo se vertió como «creyó a Dios» para conservar el matiz de confianza dirigida a Dios.
