revisions:
- from: «Sal de tu tierra y de tu parentela y de la casa de tu padre, a la tierra que te mostraré; y te haré una gran nación, y te bendeciré y engrandeceré tu nombre, y serás bendito[a]; y bendeciré a los que te bendigan, y maldeciré a los que te maldigan, y en ti serán bendecidas todas las tribus de la tierra.»
  to: «Vete de tu tierra[a] y de tu parentela y de la casa de tu padre, a la tierra que te mostraré; y te haré una gran nación, y te bendeciré y engrandeceré tu nombre, y serás bendecido; y bendeciré a los que te bendigan, y maldeciré a los que te maldigan, y en ti serán bendecidas todas las tribus de la tierra.»
  rationale: Se ajusta el mandato inicial a «Vete» para reflejar mejor Ἄπελθε según la revisión léxica ya documentada en inglés («Depart», no «Go out») y se cambia «serás bendito» por «serás bendecido» para mayor naturalidad y claridad en español contemporáneo, manteniendo intacto el sentido del pasaje. La nota al pie se conserva como alternativa léxica válida para el imperativo inicial.
