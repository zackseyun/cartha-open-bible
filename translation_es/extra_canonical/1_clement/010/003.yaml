review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego de 1 Clemente 10:3: mandato de partir, destino «a la tierra», promesa de hacer una gran nación, bendición, engrandecimiento del nombre, reciprocidad de bendición/maldición y bendición final para todas las tribus de la tierra. Sin embargo, «Sal» no preserva tan bien como debería el matiz de Ἄπελθε (‘parte’, ‘vete’, ‘apártate’) frente al tradicional «sal», y «serás bendito» suena menos natural y menos claro en español contemporáneo que «serás bendecido» para ἔσῃ εὐλογημένος.'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero tiene dos puntos mejorables para español e idiolecto bíblico neutral: «Sal de tu tierra» suena más físico/local que de partida general, y «serás bendito» resulta algo rígido o arcaizante en este contexto. «Parentela», «engrandeceré tu nombre» y «tribus» son aceptables y fieles.'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Las decisiones para συγγενείας, μεγαλυνῶ τὸ ὄνομά σου y φυλαὶ son razonables. Conviene alinear mejor Ἄπελθε con la revisión inglesa documentada («Depart») usando «Vete» o «Parte» en español; «Vete» es la opción más natural y clara aquí. Para ἔσῃ εὐλογημένος, «serás bendecido» comunica mejor el pasivo resultativo en español actual que «serás bendito».
  issues:
  - severity: medium
    issue: «Sal de tu tierra» no reproduce de la mejor manera Ἄπελθε
    rationale: El expediente inglés documenta que Clemente usa Ἄπελθε, no Ἔξελθε. «Sal» en español tiende a evocar ‘salir de dentro’, mientras que ἄπελθε expresa partir/irse. «Vete de tu tierra» o «Parte de tu tierra» preservan mejor la variación léxica y suenan naturales.
  - severity: medium
    issue: «serás bendito» es menos natural que «serás bendecido»
    rationale: Aunque «bendito» puede defenderse formalmente, en español actual aplicado a una persona dentro de una promesa verbal suena más marcado/arcaizante. «Serás bendecido» expresa con claridad el valor pasivo de ἔσῃ εὐλογημένος sin pérdida de fidelidad.
  - severity: low
    issue: La nota al pie actual para Ἄπελθε deja como principal una opción menos recomendable
    rationale: Si se revisa el texto principal a «Vete», la alternativa útil sería «Sal», explicando que el griego también puede expresarse así, pero que aquí se prefirió una forma que refleje mejor ‘partir/irse’.
  revised_spanish_text: «Vete de tu tierra[a] y de tu parentela y de la casa de tu padre, a la tierra que te mostraré; y te haré una gran nación, y te bendeciré y engrandeceré tu nombre, y serás bendecido; y bendeciré a los que te bendigan, y maldeciré a los que te maldigan, y en ti serán bendecidas todas las tribus de la tierra.»
  revised_footnotes:
  - marker: a
    text: O «Sal»; el griego Ἄπελθε también puede expresarse así.
    reason: lexical_alternative
