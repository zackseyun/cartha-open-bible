  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: Ἄπελθε ἐκ τῆς γῆς σου καὶ ἐκ τῆς συγγενείας σου καὶ ἐκ τοῦ οἴκου τοῦ πατρός σου εἰς τὴν γῆν, ἣν ἄν σοι δείξω· καὶ ποιήσω σε εἰς ἔθνος μέγα καὶ εὐλογήσω σε καὶ μεγαλυνῶ τὸ ὄνομά σου, καὶ ἔσῃ εὐλογημένος· καὶ εὐλογήσω τοὺς εὐλογοῦντάς σε καὶ καταράσομαι τοὺς καταρωμένους σε, καὶ εὐλογηθήσονται ἐν σοὶ πᾶσαι αἱ φυλαὶ τῆς γῆς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/010/003.yaml
  text: “Depart from your land and from your kindred and from your father’s house to the land that I will show you; and I will make you into a great nation[a], and I will bless you and magnify your name, and you will be blessed. And I will bless those who bless you, and I will curse those who curse you, and in you all the tribes of the earth will be blessed.”
  footnotes:
  - marker: a
    text: Or 'Go out'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:41Z'
    unchanged: false
    changes_summary: Changed 'into the land' to 'to the land' for more natural English and a more precise rendering of εἰς with ἄπελθε in this context. No other changes needed.
translation:
  language: es
  text: «Vete de tu tierra[a] y de tu parentela y de la casa de tu padre, a la tierra que te mostraré; y te haré una gran nación, y te bendeciré y engrandeceré tu nombre, y serás bendecido; y bendeciré a los que te bendigan, y maldeciré a los que te maldigan, y en ti serán bendecidas todas las tribus de la tierra.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Sal»; el griego Ἄπελθε también puede expresarse así.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄπελθε
  english_pob_choice: Depart
  chosen_spanish: Sal
  alternatives_spanish:
  - Depart
  - Vete
  lexicon: ἀπέρχομαι
  rationale: El griego usa el imperativo aoristo Ἄπελθε, que en este contexto pide salir/alejarse. En español, «Sal» reproduce con naturalidad el mandato breve y mantiene el eco bíblico sin imponer una traducción más interpretativa que el original.
- source_word: εἰς τὴν γῆν
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra
  - hacia la tierra
  lexicon: γῆ
  rationale: La revisión inglesa prefirió «to the land» frente a «into the land» por precisión con εἰς. En español, «a la tierra» conserva esa dirección sin sobrecargar el movimiento con una lectura espacial más fuerte de la que el griego exige.
- source_word: συγγενείας
  english_pob_choice: kindred
  chosen_spanish: parentela
  alternatives_spanish:
  - familia
  - parientes
  lexicon: συγγένεια
  rationale: «Parentela» transmite el conjunto de parientes de manera más sobria y cercana al registro bíblico que «familia», que puede sonar demasiado general, o «parientes», que pierde el tono colectivo.
- source_word: εὐλογήσω
  english_pob_choice: I will bless
  chosen_spanish: te bendeciré
  alternatives_spanish:
  - te colmaré de bendición
  - te favoreceré
  lexicon: εὐλογέω
  rationale: Se conserva «bendecir» porque es el equivalente asentado y fiel al verbo griego, manteniendo la repetición del pasaje y su estructura de promesa.
- source_word: μεγαλυνῶ τὸ ὄνομά σου
  english_pob_choice: magnify your name
  chosen_spanish: engrandeceré tu nombre
  alternatives_spanish:
  - haré grande tu nombre
  - exaltaré tu nombre
  lexicon: μεγαλύνω
  rationale: «Engrandeceré tu nombre» reproduce bien el valor semítico del verbo y mantiene el paralelismo con la formulación bíblica heredada, sin perder el matiz de hacer ilustre el nombre.
- source_word: ἔσῃ εὐλογημένος
  english_pob_choice: you will be blessed
  chosen_spanish: serás bendito
  alternatives_spanish:
  - serás bendecido
  - estarás bendito
  lexicon: εὐλογημένος
  rationale: Opto por «bendito» para reflejar el adjetivo pasivo del griego y conservar la forma concisa del enunciado. «Bendecido» es posible, pero «bendito» suena más directo en este contexto formulaico.
- source_word: φυλαὶ
  english_pob_choice: tribes
  chosen_spanish: tribus
  alternatives_spanish:
  - linajes
  - clanes
  lexicon: φυλή
  rationale: «Tribus» sigue el valor usual del término y preserva el eco veterotestamentario del texto fuente.
theological_decisions:
- issue: 'Forma del mandato inicial: «Depart» frente al eco tradicional «Go out»'
  english_pob_reading: Depart from your land...
  chosen_spanish_reading: Sal de tu tierra...
  alternative_spanish_readings:
  - Depart de tu tierra...
  - Vete de tu tierra...
  rationale: El griego de Clemente usa Ἄπελθε, no el Ἔξελθε de Génesis 12:1 en la LXX. «Sal» comunica el mandato de partir/alejarse sin fingir una coincidencia verbal con la forma tradicional de Génesis cuando el texto de Clemente es ligeramente distinto.
  doctrine_reference: Génesis 12:1; cita de Abraham en 1 Clemente 10:3
- issue: 'Validez de la promesa: «all the tribes of the earth will be blessed»'
  english_pob_reading: in you all the tribes of the earth will be blessed
  chosen_spanish_reading: en ti serán bendecidas todas las tribus de la tierra
  alternative_spanish_readings:
  - en ti serán benditas...
  - por medio de ti serán bendecidas...
  rationale: Se conserva la pasiva «serán bendecidas» porque refleja el verbo griego εὐλογηθήσονται y mantiene la apertura de la formulación, sin introducir de manera innecesaria una mediación causal explícita que el texto no expresa aquí.
  doctrine_reference: Promesa abrahámica; eco de Génesis 12:3
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al usar «a la tierra» en lugar de una expresión equivalente a «dentro de la tierra», por ajustarse mejor a εἰς con Ἄπελθε. También toma en cuenta el cambio de «Go out» a «Depart», reflejándolo en español con «Sal»/«Vete» en vez de una formulación que implicara simplemente salir hacia afuera.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se conserva el registro bíblico con repeticiones estructurales del original, evitando simplificar la cadena de promesas.
  - «Bendito» se usa como traducción directa del adjetivo pasivo εὐλογημένος, mientras que «bendecidas» reproduce εὐλογηθήσονται en la clausula final.
