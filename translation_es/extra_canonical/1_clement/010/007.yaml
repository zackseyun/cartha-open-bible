review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: διὰ πίστιν καὶ φιλοξενίαν = «Por la fe y la hospitalidad»; ἐδόθη αὐτῷ υἱὸς ἐν γήρᾳ = «le fue dado un hijo en su vejez»; διʼ ὑπακοῆς προσήνεγκεν αὐτὸν θυσίαν τῷ θεῷ = «y por la obediencia lo ofreció como sacrificio a Dios»; πρὸς ἓν τῶν ὀρέων ὧν ἔδειξεν αὐτῷ = «en uno de los montes que le había mostrado» es aceptable como clarificación temporal. No obstante, la única nota heredada del inglés está mal colocada en español: la variante «que le mostró / que le había mostrado» pertenece a la cláusula final, no a «en su vejez».'
  spanish_quality_summary: El español es claro y digno. La sintaxis es natural y no cae en calcos innecesarios. «Le fue dado un hijo» suena algo más formal, pero sigue siendo plenamente legible. El problema principal es de aparato crítico/nota, no de redacción principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» para θεῷ, «fe», «hospitalidad», «obediencia» y «sacrificio» están bien resueltos. No hay términos teológicos sensibles mal manejados.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «vejez» pero su contenido se refiere a la cláusula «que le había mostrado».
    rationale: El audit trail inglés conserva una alternativa para ἔδειξεν («showed / had shown»). En español, esa nota debe ir junto a «que le había mostrado[a]», no junto a «su vejez[a]», porque de otro modo induce una relación falsa entre la nota y el sintagma temporal.
  - severity: low
    issue: El texto de la nota usa «O:» cuando la relación es más bien una variante de traducción previa concreta.
    rationale: 'Puede mantenerse una formulación simple y clara: «O: «que le mostró».» Esto refleja exactamente la alternativa preservada por el inglés y evita ambigüedad.'
  revised_spanish_text: Por la fe y la hospitalidad le fue dado un hijo en su vejez, y por la obediencia lo ofreció como sacrificio a Dios en uno de los montes que le había mostrado[a].
  revised_footnotes:
  - marker: a
    text: 'O: «que le mostró».'
    reason: previous_rendering
  revision_rationale: Se conserva íntegramente la redacción principal, pero se corrige la ubicación de la nota para que corresponda al verbo ἔδειξεν / «había mostrado», que es donde existe la alternativa documentada en el audit trail inglés. También se ajusta el texto de la nota para reflejar con precisión esa variante.
