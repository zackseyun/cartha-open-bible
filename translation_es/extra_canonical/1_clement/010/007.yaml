translation:
  language: es
  text: Por la fe y la hospitalidad le fue dado un hijo en su vejez, y por la obediencia lo ofreció como sacrificio a Dios en uno de los montes que le había mostrado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que le mostró».'
    reason: previous_rendering
lexical_decisions:
- source_word: διὰ πίστιν
  english_pob_choice: Because of faith
  chosen_spanish: Por la fe
  alternatives_spanish:
  - A causa de la fe
  - Debido a la fe
  lexicon: πίστις
  rationale: «Por la fe» conserva la relación causal del griego διὰ con acusativo y mantiene la formulación breve y bíblica sin añadir matices no presentes en el texto.
- source_word: φιλοξενίαν
  english_pob_choice: hospitality
  chosen_spanish: hospitalidad
  alternatives_spanish:
  - acogida
  - amor al extranjero
  lexicon: φιλοξενία
  rationale: «Hospitalidad» es el equivalente natural y transparente en español para φιλοξενία; «acogida» es posible, pero menos explícita sobre la virtud encomiada por el término griego.
- source_word: ἐδόθη αὐτῷ υἱὸς
  english_pob_choice: a son was given to him
  chosen_spanish: le fue dado un hijo
  alternatives_spanish:
  - se le dio un hijo
  - un hijo le fue dado
  lexicon: δίδωμι
  rationale: La pasiva impersonal «le fue dado un hijo» conserva el carácter de don recibido y fluye con naturalidad en español.
- source_word: ἐν γήρᾳ
  english_pob_choice: in old age
  chosen_spanish: en su vejez
  alternatives_spanish:
  - en la vejez
  - siendo ya anciano
  lexicon: γῆρας
  rationale: «En su vejez» expresa la edad avanzada de manera idiomática y mantiene la referencia personal implícita en el contexto.
- source_word: διʼ ὑπακοῆς
  english_pob_choice: through obedience
  chosen_spanish: por la obediencia
  alternatives_spanish:
  - mediante la obediencia
  - a causa de la obediencia
  lexicon: ὑπακοή
  rationale: «Por la obediencia» reproduce bien la instrumentalidad del griego y deja claro que la acción de Abraham se realizó obedeciendo.
- source_word: προσήνεγκεν αὐτὸν θυσίαν
  english_pob_choice: he offered him as a sacrifice
  chosen_spanish: lo ofreció como sacrificio
  alternatives_spanish:
  - lo presentó en sacrificio
  - lo inmoló
  lexicon: προσφέρω; θυσία
  rationale: «Lo ofreció como sacrificio» mantiene el sentido sacrificial sin introducir un verbo más técnico o más interpretativo que el griego no exige.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - al Dios
  lexicon: θεός
  rationale: «A Dios» es la traducción directa y sobria de dativo de destinatario; evita sobrecargar la frase con explicaciones ajenas al texto.
- source_word: πρὸς ἓν τῶν ὀρέων
  english_pob_choice: on one of the mountains
  chosen_spanish: en uno de los montes
  alternatives_spanish:
  - sobre uno de los montes
  - hacia uno de los montes
  lexicon: ὄρος
  rationale: «En uno de los montes» preserva la localización general del original y suena natural en español.
- source_word: ὧν ἔδειξεν αὐτῷ
  english_pob_choice: that he had shown him
  chosen_spanish: que le había mostrado
  alternatives_spanish:
  - que le mostró
  - que le había enseñado
  lexicon: δείκνυμι
  rationale: Se adopta el pluperfecto para clarificar la anterioridad temporal respecto de «lo ofreció», siguiendo la revisión del audit trail en inglés y sin añadir explícitamente el sujeto donde el griego lo deja implícito.
theological_decisions:
- issue: Relación entre obediencia y sacrificio de Isaac
  english_pob_reading: through obedience he offered him as a sacrifice to God
  chosen_spanish_reading: por la obediencia lo ofreció como sacrificio a Dios
  alternative_spanish_readings:
  - obedeciendo lo ofreció como sacrificio a Dios
  - por obediencia ofreció a Dios a su hijo como sacrificio
  rationale: 'La frase conserva la tensión narrativa: el acto es sacrificial y está motivado/mediado por obediencia. No se suaviza ni se explica más allá de lo que dice el texto.'
  doctrine_reference: Génesis 22; Hebreos 11:17-19
- issue: Referencia implícita al sujeto de ἔδειξεν
  english_pob_reading: that he had shown him
  chosen_spanish_reading: que le había mostrado
  alternative_spanish_readings:
  - que le mostró
  - que Dios le había mostrado
  rationale: Se mantiene el sujeto implícito como en el griego y como en la revisión inglesa, evitando insertar «Dios» en el texto principal. El pluperfecto resuelve la relación temporal sin alterar la forma del original.
  doctrine_reference: Génesis 22:2, 14
- issue: Don recibido en la vejez
  english_pob_reading: a son was given to him in old age
  chosen_spanish_reading: le fue dado un hijo en su vejez
  alternative_spanish_readings:
  - se le dio un hijo en su vejez
  - un hijo le fue dado en su vejez
  rationale: La pasiva destaca que el hijo es un don y no una mera biografía; esto encaja con la lectura bíblica de promesa y favor divino sin añadir material interpretativo.
  doctrine_reference: Génesis 21:1-3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa reciente que pasó de «that he showed him» a «that he had shown him» para aclarar la anterioridad temporal; la versión española adopta directamente esa resolución con el pluscuamperfecto «había mostrado». No se añadieron glosas innecesarias ni se modificó el sujeto implícito del original.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se conserva un registro sobrio y eclesial, sin arcaísmos innecesarios.
  - La nota textual se limita a la variante de traducción; no introduce una variante manuscrita.
  - «Hospitalidad» se usa como equivalente estable de φιλοξενία en este contexto.
