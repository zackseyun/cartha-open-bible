  rationale: Se conserva íntegramente la redacción principal, pero se corrige la ubicación de la nota para que corresponda al verbo ἔδειξεν / «había mostrado», que es donde existe la alternativa documentada en el audit trail inglés. También se ajusta el texto de la nota para reflejar con precisión esa variante.
