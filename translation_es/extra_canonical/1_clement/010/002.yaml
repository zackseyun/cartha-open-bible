    changes_summary: Adjusted 'small land' to 'little land' and 'little house' to 'small house' for closer consistency with ὀλίγην / μικρόν and more natural formal English.
translation:
  language: es
  text: 'Y en obediencia salió de su tierra, de su parentela y de la casa de su padre, a fin de que, dejando atrás un poco de tierra, una parentela débil y una casa pequeña, heredara las promesas de Dios. Porque le dice:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπακοῇ
  english_pob_choice: in obedience
  chosen_spanish: en obediencia
  alternatives_spanish:
  - obedeciendo
  - por obediencia
  lexicon: Sin entrada lexical específica inventada; adverbial dative of manner
  rationale: La forma griega expresa el modo de salir de Abraham. «En obediencia» conserva el valor adverbial y el sustantivo de la frase inglesa POB sin volverla demasiado interpretativa.
- source_word: ἐξῆλθεν
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  - partió
  lexicon: Sin entrada lexical específica inventada; aoristo de ἐξέρχομαι
  rationale: «Salió» es el equivalente más natural y directo en español para el movimiento de salida indicado por el verbo griego.
- source_word: γῆν ὀλίγην
  english_pob_choice: a little land
  chosen_spanish: una tierra pequeña
  alternatives_spanish:
  - una poca tierra
  - una tierra escasa
  lexicon: Sin entrada lexical específica inventada; acusativo con adjetivo de cantidad/escasez
  rationale: Se mantiene la tensión de cantidad/escasez con «pequeña», en línea con la revisión inglesa que prefirió «little land» como formulación más cercana a ὀλίγην y más natural.
- source_word: συγγένειαν ἀσθενῆ
  english_pob_choice: a weak kindred
  chosen_spanish: una parentela débil
  alternatives_spanish:
  - una parentela frágil
  - un linaje débil
  lexicon: Sin entrada lexical específica inventada; sintagma nominal con adjetivo
  rationale: «Parentela» conserva la idea de grupo de parientes sin modernizarla en exceso; «débil» preserva la imagen de insuficiencia/fragilidad del adjetivo griego y del inglés POB.
- source_word: οἶκον μικρὸν
  english_pob_choice: a small house
  chosen_spanish: una casa pequeña
  alternatives_spanish:
  - un hogar pequeño
  - una casa reducida
  lexicon: Sin entrada lexical específica inventada; sustantivo + adjetivo
  rationale: «Casa» mantiene la referencia al ámbito doméstico/familiar de la frase bíblica; «pequeña» sigue de cerca la revisión inglesa que distinguió este adjetivo de ὀλίγην.
- source_word: κληρονομήσῃ
  english_pob_choice: he might inherit
  chosen_spanish: heredara
  alternatives_spanish:
  - herede
  - pudiera heredar
  lexicon: Sin entrada lexical específica inventada; subjuntivo de finalidad
  rationale: El subjuntivo imperfecto español expresa bien la finalidad de ὅπως + subjuntivo griego, manteniendo la relación lógica del texto.
- source_word: τὰς ἐπαγγελίας τοῦ θεοῦ
  english_pob_choice: the promises of God
  chosen_spanish: las promesas de Dios
  alternatives_spanish:
  - las promesas de Dios
  - las promesas divinas
  lexicon: Sin entrada lexical específica inventada; sintagma teológico común
  rationale: Se conserva la formulación directa y transparente «las promesas de Dios», sin ampliar ni interpretar el contenido de las promesas.
theological_decisions:
- issue: Salida de Abraham como acto de obediencia
  english_pob_reading: And in obedience he went out
  chosen_spanish_reading: Y en obediencia salió
  alternative_spanish_readings:
  - Y obedeciendo salió
  - Salió en obediencia
  rationale: La frase griega enfatiza que la salida estuvo marcada por obediencia. «En obediencia» conserva ese acento sin convertir la obediencia en una explicación adicional.
  doctrine_reference: Génesis 12:1-4; Hebreos 11:8
- issue: Referencia a Dios como dador de promesas
  english_pob_reading: the promises of God
  chosen_spanish_reading: las promesas de Dios
  alternative_spanish_readings:
  - las promesas divinas
  - las promesas de Yahvé
  rationale: El texto griego dice θεοῦ, por lo que «Dios» es la rendición directa. No se introduce «Yahvé» porque aquí no aparece el nombre divino ni una cita explícita del tetragrámaton.
  doctrine_reference: Génesis 12:2-3; Romanos 4:20-21
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó las equivalencias de tamaño de 'small land' a 'little land' y de 'little house' a 'small house' para reflejar mejor ὀλίγην y μικρόν; la versión española conserva esa distinción con 'pequeña' en ambos miembros, porque en español el contraste entre ὀλίγην y μικρόν no requiere forzosamente dos adjetivos distintos para comunicar con fidelidad la idea de escasez y pequeñez en un registro natural.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al criterio del proyecto.
  - Se conserva «parentela» para συγγένεια para evitar diluir el matiz de grupo familiar amplio.
  - No se introduce «Mesías» ni vocabulario cristológico, porque el versículo no contiene Χριστός/Μεσías.
  - El orden de la frase sigue de cerca la estructura griega y la del inglés auditado, pero con sintaxis española fluida y publicable.
