source:
  edition: Funk 1901 (normalized OCR)
  text: οὗτος δὲ ὑπακοῇ ἐξῆλθεν ἐκ τῆς γῆς αὐτοῦ καὶ ἐκ τῆς συγγενείας αὐτοῦ καὶ ἐκ τοῦ οἴκου τοῦ πατρὸς αὐτοῦ, ὅπως γῆν ὀλίγην καὶ συγγένειαν ἀσθενῆ καὶ οἶκον μικρὸν καταλιπὼν κληρονομήσῃ τὰς ἐπαγγελίας τοῦ θεοῦ. λέγει γὰρ αὐτῷ·
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/010/002.yaml
  text: And in obedience he went out from his land and from his kindred and from his father’s house, so that, leaving behind a little land and a weak kindred and a small house, he might inherit the promises of God. For he says to him,
  revision_pass:
    model: gpt-5.4
