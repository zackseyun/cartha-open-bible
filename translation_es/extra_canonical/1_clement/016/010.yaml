review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el griego y el inglés auditado: «en lugar de su sepultura / de su muerte», «los impíos / los ricos», y «el Señor quiere purificarlo de la aflicción» son defensables. Sin embargo, hay un error grave de polaridad en la segunda línea negativa: οὐδὲ εὑρέθη δόλος ἐν τῷ στόματι αὐτοῦ significa «ni se halló engaño en su boca», pero el español omitió el «no», invirtiendo el sentido.'
  spanish_quality_summary: El español es claro y de registro bíblico moderno. «Sepultura», «iniquidad» y «aflicción» suenan naturales y dignos. La única reparación necesaria en el texto es restituir la negación omitida. Conviene además ajustar la justificación léxica correspondiente, pues la alternativa correcta ya estaba listada pero no fue elegida en el texto.
  glossary_alignment: No hay conflicto importante con la terminología del proyecto. El uso de «el Señor» para κύριος puede aceptarse aquí como cita griega no explícitamente marcada con el tetragrámaton, y no requiere cambio en el texto principal. «Iniquidad» para ἀνομία es aceptable en este contexto.
  issues:
  - severity: high
    issue: Falta la negación en «ni se halló engaño en su boca»
    rationale: 'El griego tiene οὐδὲ εὑρέθη δόλος, y el inglés auditado: «nor was deceit found in his mouth». El borrador dice «ni se halló engaño en su boca» en el texto principal, pero su propia decisión léxica registró erróneamente «se halló engaño en su boca». Sin el «no», se invierte el sentido y se contradice la fuente.'
  - severity: low
    issue: Inconsistencia interna en la decisión léxica de εὑρέθη δόλος
    rationale: La explicación reconoce el valor pasivo y hasta ofrece «no se halló engaño en su boca» como alternativa, pero el campo elegido omite la negación. Aunque esto no afecta el formato de salida final si se corrige el texto, conviene dejar constancia de la inconsistencia.
  revised_spanish_text: 'Y daré a los impíos en lugar de su sepultura,


    y a los ricos en lugar de su muerte;


    porque no cometió ninguna iniquidad,


    ni se halló engaño en su boca.


    Y el Señor quiere purificarlo de la aflicción.'
  revision_rationale: 'Se corrige una omisión crítica: se restituye la negación en la cláusula sobre el engaño para reflejar fielmente οὐδὲ εὑρέθη δόλος ἐν τῷ στόματι αὐτοῦ. No hacen falta notas adicionales, porque el sentido queda claro en español y el resto del versículo ya era fiel y legible.'
