id: 1CLEM.16.10
reference: 1 Clement 16:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ δώσω τοὺς πονηροὺς ἀντὶ τῆς ταφῆς αὐτοῦ καὶ τοὺς πλουσίους ἀντὶ τοῦ θανάτου αὐτοῦ· ὅτι ἀνομίαν οὐκ ἐποίησεν, οὐδὲ εὑρέθη δόλος ἐν τῷ στόματι αὐτοῦ. καὶ κύριος βούλεται καθαρίσαι αὐτὸν τῆς πληγῆς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/016/010.yaml
  text: 'And I will give the wicked in place of his burial,

    and the rich in place of his death;

    because he committed no lawlessness,

    nor was deceit found in his mouth.

    And the Lord wills to cleanse him from the affliction.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:51Z'
    unchanged: false
    changes_summary: Revised 'did no lawless deed' to 'committed no lawlessness' for closer lexical correspondence to ἀνομίαν ἐποίησεν, and changed 'from the blow' to 'from the affliction' as a more natural and suitably broad rendering of τῆς πληγῆς.
translation:
  language: es
  text: 'Y daré a los impíos en lugar de su sepultura,


    y a los ricos en lugar de su muerte;


    porque no cometió ninguna iniquidad,


    ni se halló engaño en su boca.


    Y el Señor quiere purificarlo de la aflicción.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοὺς πονηροὺς
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malos
  - los malvados
  lexicon: πονηρός
  rationale: «Impíos» conserva el matiz moral y religioso de personas perversas o malvadas, y encaja con el paralelismo poético sin sonar excesivamente idiomático en español.
- source_word: ἀντὶ τῆς ταφῆς αὐτοῦ
  english_pob_choice: in place of his burial
  chosen_spanish: en lugar de su sepultura
  alternatives_spanish:
  - en vez de su sepultura
  - a cambio de su sepultura
  lexicon: ἀντί
  rationale: «En lugar de» reproduce con claridad la idea sustitutiva de ἀντί. «Sepultura» es más natural que una opción más literal como «entierro» en este contexto poético.
- source_word: τοὺς πλουσίους
  english_pob_choice: the rich
  chosen_spanish: los ricos
  alternatives_spanish:
  - los poderosos
  - los adinerados
  lexicon: πλούσιος
  rationale: Se mantiene el término básico y transparente del original. «Los ricos» conserva el paralelo directo con «los impíos».
- source_word: ἀντὶ τοῦ θανάτου αὐτοῦ
  english_pob_choice: in place of his death
  chosen_spanish: en lugar de su muerte
  alternatives_spanish:
  - en vez de su muerte
  - a cambio de su muerte
  lexicon: ἀντί
  rationale: La misma construcción sustitutiva se conserva para mantener el paralelismo del verso y la relación formal con el texto griego.
- source_word: ἀνομίαν οὐκ ἐποίησεν
  english_pob_choice: he committed no lawlessness
  chosen_spanish: no cometió ninguna iniquidad
  alternatives_spanish:
  - no cometió ninguna leylessness
  - no hizo ninguna maldad
  lexicon: ἀνομία
  rationale: «Iniquidad» transmite bien la falta moral grave y suena más natural en español bíblico que un calco como «ilegalidad»; se conserva la negación total del giro griego mediante «ninguna».
- source_word: εὑρέθη δόλος ἐν τῷ στόματι αὐτοῦ
  english_pob_choice: deceit was found in his mouth
  chosen_spanish: se halló engaño en su boca
  alternatives_spanish:
  - se encontró engaño en su boca
  - no se halló engaño en su boca
  lexicon: δόλος
  rationale: «Engaño» captura el valor de δόλος y mantiene la imagen semítica de la «boca» como sede del habla. Se prefiere «se halló» para reflejar el pasivo del original.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Yahvé
  lexicon: κύριος
  rationale: Aquí κύριος funciona como cita/alusión al lenguaje bíblico griego tradicional que en español suele leerse como «el Señor». Dado que el texto no explicita el tetragrámaton y la formulación auditada del inglés usa «the Lord», se mantiene «el Señor» para no forzar una decisión de nombre divino no marcada en este verso.
- source_word: βούλεται καθαρίσαι αὐτὸν τῆς πληγῆς
  english_pob_choice: wills to cleanse him from the affliction
  chosen_spanish: quiere purificarlo de la aflicción
  alternatives_spanish:
  - quiere limpiarlo de la aflicción
  - quiere purificarlo del golpe
  lexicon: καθαρίσαι
  rationale: «Purificar» conserva el sentido de limpieza/restauración sin reducirlo a higiene. «De la aflicción» sigue la revisión auditada del inglés que amplió «blow» a un término más amplio y natural para τῆς πληγῆς.
theological_decisions:
- issue: Tratamiento del título divino κύριος en una cita bíblica griega
  english_pob_reading: And the Lord wills to cleanse him from the affliction.
  chosen_spanish_reading: Y el Señor quiere purificarlo de la aflicción.
  alternative_spanish_readings:
  - Y Yahvé quiere purificarlo de la aflicción.
  - Y el Señor Yahvé quiere purificarlo de la aflicción.
  rationale: Se evita imponer «Yahvé» donde el griego conserva κύριος y el contexto de 1 Clemente cita lenguaje bíblico sin marcar explícitamente el nombre propio. En una nota de traducción podría discutirse la posible referencia subyacente, pero el texto principal mantiene la forma de lectura más segura y natural en español.
  doctrine_reference: Nombre divino en citas de la Septuaginta / uso de κύριος en literatura cristiana primitiva
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del inglés POB: mantiene «committed no lawlessness» como «no cometió ninguna iniquidad» y «from the affliction» como «de la aflicción», evitando el anterior «hecho sin ley»/«golpe». No se añaden notas textuales porque el expediente no aporta variantes ni tensiones textuales adicionales.'
  spanish_consistency_notes:
  - Se preserva el paralelismo poético de dos hemistiquios con «en lugar de... / en lugar de...».
  - Se mantiene un registro bíblico sobrio, pero con español actual comprensible.
  - No se usa «Cristo» ni otros términos no presentes en el verso.
  - La elección de «sepultura» y «aflicción» busca amplitud semántica sin salir del campo del original.
