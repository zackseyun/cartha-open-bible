translation:
  language: es
  text: ¿Quién describirá su generación? Porque su vida es quitada de la tierra. A causa de las iniquidades de mi pueblo llegó a la muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γενεὰν
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - linaje
  - descendencia
  lexicon: γενεά
  rationale: «Generación» conserva la pregunta sobre el grupo o linaje de pertenencia de la figura, como en la traducción inglesa auditada, y es natural en español bíblico actual.
- source_word: διηγήσεται
  english_pob_choice: describe
  chosen_spanish: contará
  alternatives_spanish:
  - relatará
  - describirá
  lexicon: διηγέομαι
  rationale: El verbo griego puede abarcar narrar/relatar; «contará» mantiene una formulación idiomática y cercana a la pregunta retórica del texto sin añadir precisión no garantizada.
- source_word: αἴρεται ἀπὸ τῆς γῆς ἡ ζωὴ αὐτοῦ
  english_pob_choice: his life is taken from the earth
  chosen_spanish: su vida es quitada de la tierra
  alternatives_spanish:
  - su vida es removida de la tierra
  - su vida es tomada de la tierra
  lexicon: αἴρω + ἀπό + γῆ + ζωή
  rationale: «Quitada» reproduce bien la pasiva y la idea de remoción desde la tierra; evita reinterpretar el destino de la vida más allá del griego y coincide con la lectura auditada en inglés.
- source_word: ἀπὸ τῶν ἀνομιῶν τοῦ λαοῦ μου
  english_pob_choice: Because of the lawless deeds of my people
  chosen_spanish: a causa de las obras injustas de mi pueblo
  alternatives_spanish:
  - por las iniquidades de mi pueblo
  - a causa de las iniquidades de mi pueblo
  lexicon: ἀνομία
  rationale: Se prefirió «obras injustas» para preservar el sentido moral/legal de ἀνομία sin imponer un tecnicismo fijo; mantiene la relación causal explícita del original y la línea inglesa.
- source_word: ἤκει εἰς θάνατον
  english_pob_choice: he came to death
  chosen_spanish: llegó a la muerte
  alternatives_spanish:
  - vino a la muerte
  - fue entregado a la muerte
  lexicon: ἥκω + εἰς θάνατον
  rationale: «Llegó a la muerte» refleja el movimiento/arribo del verbo y evita suavizar la expresión. Conserva la ambigüedad del griego y del audit trail inglés, sin introducir una explicación adicional.
theological_decisions:
- issue: Relación causal entre los pecados del pueblo y la muerte del justo/siervo
  english_pob_reading: Because of the lawless deeds of my people he came to death.
  chosen_spanish_reading: A causa de las obras injustas de mi pueblo llegó a la muerte.
  alternative_spanish_readings:
  - por las obras injustas de mi pueblo llegó a la muerte
  - a causa de las iniquidades de mi pueblo llegó a la muerte
  rationale: Se mantiene la causalidad directa tal como la expresa el griego y la versión inglesa auditada. No se explicita aquí una teoría de expiación o martirio; el texto solo afirma el vínculo causal.
  doctrine_reference: Isaías 53:8; 1 Clement 16:8
translation_notes:
  revision_awareness: No se requieren revisiones respecto del pasaje fuente ni del audit trail inglés; la validación previa solo indicó un problema técnico de anclaje de nota al pie, resuelto al omitir notas.
  spanish_consistency_notes:
  - Se mantuvo un registro léxico sobrio y bíblico, evitando términos eclesiásticos que no aporta el griego.
  - «Mi pueblo» conserva el posesivo de primera persona presente en el texto griego.
  - La frase final usa una construcción natural en español que sigue de cerca la sintaxis del original sin calco excesivo.
