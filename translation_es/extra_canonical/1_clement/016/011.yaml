    rationale: En español, «dar para el pecado» puede entenderse como finalidad o promoción del pecado. El griego aquí, aunque se mantenga literal, apunta a «por el pecado» y puede oírse con matiz sacrificial. «Para» no preserva fielmente esa relación.
  - severity: low
    issue: La nota alternativa está bien encaminada, pero depende de una frase principal defectuosa
    rationale: La nota explica correctamente la posibilidad sacrificial, pero el texto base debe ser primero inteligible y fiel por sí mismo.
