review_pass:
  verdict: revise
  source_alignment_summary: 'La segunda mitad está bien alineada: ἡ ψυχὴ ὑμῶν = «vuestra alma» y σπέρμα μακρόβιον = «descendencia de larga vida» preserva bien el sentido genealógico y la cualidad de larga vida. El problema principal está en ἐὰν δῶτε περὶ ἁμαρτίας: «si dais para el pecado» no reproduce de manera fiel ni idiomática el valor de περὶ en esta construcción y en español puede sugerir finalidad («para pecar» / «a favor del pecado»), distorsionando el sentido.'
  spanish_quality_summary: El borrador es legible en la segunda cláusula, pero «dais para el pecado» suena antinatural y potencialmente equívoco en español eclesial general. Un ajuste pequeño a «si dais por el pecado» conserva la literalidad relativa del inglés auditado y mejora mucho la inteligibilidad. También conviene armonizar el registro verbal con español ampliamente legible; «dais»/«vuestra» es posible, pero la frase revisada sigue siendo digna y clara.
  glossary_alignment: 'No hay conflictos con los términos de proyecto principales. La decisión relevante es léxica-sintáctica: περὶ ἁμαρτίας no debe volverse «para el pecado». La nota alternativa sobre el posible giro sacrificial puede mantenerse, pero anclada a una forma española no equívoca.'
  issues:
