translation:
  language: es
  text: Si dais por el pecado[a], vuestra alma verá descendencia de larga vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si ofrecéis por el pecado». El griego también puede oírse como un giro sacrificial equivalente a «ofrenda por el pecado», aunque aquí se mantiene una traducción más literal.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν δῶτε περὶ ἁμαρτίας
  english_pob_choice: If you give for sin,
  chosen_spanish: Si dais para el pecado[a],
  alternatives_spanish:
  - Si ofrecéis por el pecado[a],
  - Si dais una ofrenda por el pecado[a],
  lexicon: ἐὰν + subjuntivo; δίδωμι; περὶ ἁμαρτίας
  rationale: El griego tiene la construcción general 'dar' con περὶ ἁμαρτίας. El audit trail inglés volvió a una forma más literal ('give for sin') tras una revisión que había explicitado 'offering'. En español, 'dar para el pecado' conserva la literalidad y deja abierta la lectura sacrificial sin añadir un sustantivo inexistente en el texto.
- source_word: ἡ ψυχὴ ὑμῶν
  english_pob_choice: your soul
  chosen_spanish: vuestra alma
  alternatives_spanish:
  - vuestra alma
  - su alma
  lexicon: ψυχή
  rationale: ψυχή se traduce de manera natural por 'alma' en este contexto. Se mantiene el posesivo plural de segunda persona para corresponder a ὑμῶν.
- source_word: σπέρμα μακρόβιον
  english_pob_choice: long-lived offspring
  chosen_spanish: descendencia de larga vida
  alternatives_spanish:
  - descendencia longeva
  - linaje de larga vida
  - descendencia larga
  lexicon: σπέρμα; μακρόβιος
  rationale: σπέρμα en este dicho no se vierte como 'semilla' sino como 'descendencia', porque el sentido es genealógico/persona y no agrícola. μακρόβιος se expresa como 'de larga vida' para no introducir una formulación más interpretativa que 'longeva' y para sonar natural en español bíblico.
theological_decisions:
- issue: Posible alusión a ofrenda por el pecado en περὶ ἁμαρτίας
  english_pob_reading: If you give for sin,
  chosen_spanish_reading: Si dais para el pecado[a],
  alternative_spanish_readings:
  - Si ofrecéis por el pecado[a],
  - Si dais una ofrenda por el pecado[a],
  rationale: La tradición textual y el uso de la LXX permiten oír un trasfondo sacrificial, pero la revisión inglesa reciente decidió no explicitar 'offering' porque no está dicho de forma expresa en el griego. La versión española conserva esa tensión sin resolverla con una expansión, aunque deja una alternativa de lectura posible mediante la nota.
  doctrine_reference: Lectura idiomática sacrificial de περὶ ἁμαρτίας en el marco de la Septuaginta y ecos del sacrificio por el pecado.
translation_notes:
  revision_awareness: La revisión más reciente del inglés volvió desde 'If you give an offering for sin' a 'If you give for sin' por fidelidad al griego, retirando un sustantivo no explícito. La frase final española sigue esa revisión y evita añadir 'ofrenda' en el texto principal, pero conserva en nota la lectura sacrificial reconocida por el audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino explícito; aquí no aparece.
  - Se usa 'alma' para ψυχή y 'descendencia' para σπέρμα, evitando traducciones más tradicionales que oscurezcan el sentido.
  - La puntuación reproduce la estructura breve del original sin añadir conectores explicativos.
