translation:
  language: es
  text: Y él mismo llevó los pecados de muchos, y fue entregado a causa de sus pecados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἁμαρτίας πολλῶν
  english_pob_choice: the sins of many
  chosen_spanish: los pecados de muchos
  alternatives_spanish:
  - los pecados de una multitud
  - los pecados de muchos hombres
  lexicon: ἁμαρτία
  rationale: Conservo el sustantivo concreto «pecados» para reflejar el contenido moral/jurídico del griego y la formulación inglesa. «De muchos» reproduce la extensión indefinida de πολλῶν sin añadir precisión no presente en la fuente.
- source_word: ἀνήνεγκε
  english_pob_choice: he bore
  chosen_spanish: llevó
  alternatives_spanish:
  - cargó con
  - soportó
  lexicon: ἀναφέρω
  rationale: En este contexto sacrificial/sustitutivo, «llevó» comunica de forma natural en español la idea de cargar con culpa o pecado. Mantiene la fuerza del verbo sin volverlo más interpretativo de lo que exige el griego.
- source_word: παρεδόθη
  english_pob_choice: was given over
  chosen_spanish: fue entregado
  alternatives_spanish:
  - fue entregado
  - fue entregado en manos de otros
  - fue cedido
  lexicon: παραδίδωμι
  rationale: «Fue entregado» es la equivalencia más directa y transparente en español para παρεδόθη. Aunque la redacción inglesa usa «given over», el sentido pasivo de entrega/abandono queda bien representado sin introducir un agente que el texto no menciona.
theological_decisions:
- issue: Relación causal en la segunda cláusula
  english_pob_reading: was given over because of their sins
  chosen_spanish_reading: fue entregado a causa de sus pecados
  alternative_spanish_readings:
  - fue entregado por causa de sus pecados
  - fue entregado debido a sus pecados
  rationale: La preposición διὰ con acusativo expresa causalidad; «a causa de» preserva esa relación de modo claro y natural. La redacción evita atribuir más de lo que el griego dice y mantiene la conexión directa entre los pecados y la entrega.
  doctrine_reference: causalidad textual; pasaje de tono soteriológico/sacrificial
translation_notes:
  revision_awareness: La revisión inglesa reciente reordenó la segunda cláusula para hacer más natural el inglés, pero conservó el valor causal de διὰ y la pasiva de παρεδόθη. La versión española sigue ese mismo contenido sin depender del orden inglés.
  spanish_consistency_notes:
  - Se usa «llevó» para ἀνήνεγκε, manteniendo una equivalencia sobria y comprensible en español.
  - Se usa «fue entregado» para παρεδόθη, evitando la máscara eufemística y conservando la pasiva del griego.
  - No se introducen mayúsculas teológicas innecesarias; el texto no contiene referencia explícita a YHWH ni al título Mesías.
