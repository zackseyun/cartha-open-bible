- from: Este mismo lleva nuestros pecados y sufre por nosotros[a], y nosotros lo tuvimos por en dolor y bajo un golpe y en aflicción.
  to: Este mismo lleva nuestros pecados y sufre por nosotros[a], y nosotros consideramos que estaba en dolor y bajo un golpe y en aflicción.
  rationale: Se corrige una falla sintáctica importante en la cláusula final para expresar naturalmente ἐλογισάμεθα αὐτὸν εἶναι sin perder la estructura ni el sentido del griego. También se ajusta la nota para que conserve la alternativa inglesa documentada en un español correcto y fluido.
