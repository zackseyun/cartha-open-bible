translation:
  language: es
  text: Este mismo lleva nuestros pecados y sufre por nosotros[a], y nosotros consideramos que estaba en dolor y bajo un golpe y en aflicción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este mismo lleva nuestros pecados y sufre dolor por nosotros, y nosotros consideramos que estaba en dolor y bajo un golpe y en aflicción».'
    reason: previous_rendering
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: This one
  chosen_spanish: Este mismo
  alternatives_spanish:
  - Este
  - Él
  lexicon: οὗτος
  rationale: Se mantiene el demostrativo enfático del griego y del inglés POB; en español, «este mismo» conserva la referencia personal y el énfasis sin volver la frase torpe.
- source_word: τὰς ἁμαρτίας ἡμῶν
  english_pob_choice: our sins
  chosen_spanish: nuestros pecados
  alternatives_spanish:
  - nuestras faltas
  - nuestras transgresiones
  lexicon: ἁμαρτία
  rationale: «Pecados» es la correspondencia directa y más natural para el plural de ἁμαρτία en este contexto de Isaías 53 citado por 1 Clemente.
- source_word: φέρει
  english_pob_choice: bears
  chosen_spanish: lleva
  alternatives_spanish:
  - carga con
  - porta
  lexicon: φέρω
  rationale: «Llevar» conserva la idea de cargar/soportar sobre sí, sin perder la imagen sacrificial y vicaria presente en el pasaje.
- source_word: ὀδυνᾶται
  english_pob_choice: suffers
  chosen_spanish: sufre
  alternatives_spanish:
  - padece
  - está dolido
  lexicon: ὀδυνάομαι
  rationale: El verbo expresa sufrimiento real; «sufre» reproduce la decisión inglesa reciente y es idiomático en español sin añadir detalles no explícitos.
- source_word: ἐν πόνῳ
  english_pob_choice: in pain
  chosen_spanish: en dolor
  alternatives_spanish:
  - con dolor
  - en sufrimiento
  lexicon: πόνος
  rationale: Se conserva la correspondencia lexical con πόνος como dolor/pena; «en dolor» suena algo más literal y mantiene el paralelo preposicional del griego.
- source_word: ἐν πληγῇ
  english_pob_choice: under a blow
  chosen_spanish: bajo un golpe
  alternatives_spanish:
  - bajo un azote
  - herido
  lexicon: πληγή
  rationale: La revisión inglesa precisó que πληγή aquí no es «plague» sino una herida/golpe físico; «bajo un golpe» conserva la imagen de ser herido o golpeado.
- source_word: ἐν κακώσει
  english_pob_choice: in affliction
  chosen_spanish: en aflicción
  alternatives_spanish:
  - en humillación
  - en miseria
  lexicon: κακωσις
  rationale: «Aflicción» es una correspondencia formal y comprensible para κακωσις, manteniendo el tono de sufrimiento del conjunto.
theological_decisions:
- issue: Sufrimiento vicario/por nosotros
  english_pob_reading: suffers on our behalf
  chosen_spanish_reading: sufre por nosotros
  alternative_spanish_readings:
  - padece por nosotros
  - sufre en favor nuestro
  rationale: Se conserva la noción vicaria del texto y del eco de Isaías 53; «por nosotros» es la forma más natural y claramente sustitutiva en español.
  doctrine_reference: Isaías 53:4; 1 Clemente 16:4
translation_notes:
  revision_awareness: La versión inglesa final unificó las líneas y dejó «suffers on our behalf» como lectura principal, con nota alternativa que conserva una forma más literal; en español se sigue la línea final inglesa y se mantiene una nota alternativa breve para reflejar la variante auditada sin introducir un calco excesivo.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente aquí, sino como norma del proyecto; en este versículo no se aplica de manera directa.
  - Se evitó «Mesías»/«Cristo» porque el versículo no contiene ese término.
  - Se mantuvo el paralelismo de preposiciones del griego («en dolor», «bajo un golpe», «en aflicción») para no diluir la estructura retórica de la cita.
