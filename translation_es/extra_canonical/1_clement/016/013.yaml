source:
  edition: Funk 1901 (normalized OCR)
  text: διὰ τοῦτο αὐτὸς κληρονομήσει πολλοὺς καὶ τῶν ἰσχυρῶν μεριεῖ σκῦλα ἀνθ’ ὧν παρεδόθη εἰς θάνατον ἡ ψυχὴ αὐτοῦ, καὶ ἐν τοῖς ἀνόμοις ἐλογίσθη·
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/016/013.yaml
  text: 'Because of this he will inherit many,

    and he will divide the spoils of the strong,

    because his soul was given over to death,

    and he was counted among the lawless;'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:52Z'
    unchanged: false
    changes_summary: Changed the final punctuation from a period to a semicolon to better reflect the Greek punctuation and preserve the verse’s formal flow. No wording changes needed.
translation:
  language: es
  text: 'Por esto él heredará a muchos,


    y repartirá los despojos de los fuertes,


    porque su alma fue entregada a la muerte,


    y fue contado entre los sin ley;'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κληρονομήσει πολλοὺς
  english_pob_choice: he will inherit many
  chosen_spanish: heredará a muchos
  alternatives_spanish:
  - heredará muchos
  - recibirá en herencia a muchos
  lexicon: κληρονομέω
  rationale: Conservo el valor de herencia/posesión futura del verbo, y en español ‘heredará a muchos’ mantiene la relación verbal sin añadir explicaciones. Evito ‘ganará’ o ‘obtendrá’, que debilitan la imagen hereditaria del texto.
- source_word: μεριεῖ σκῦλα
  english_pob_choice: he will divide the spoils
  chosen_spanish: repartirá los despojos
  alternatives_spanish:
  - dividirá los despojos
  - repartirá el botín
  lexicon: μερίζω; σκῦλα
  rationale: ‘Repartirá’ comunica el acto distributivo de μεριεῖ y ‘despojos’ preserva el matiz militar de σκῦλα. ‘Botín’ sería posible, pero ‘despojos’ refleja mejor el registro bíblico y la violencia implícita del término.
- source_word: ἀνθ’ ὧν παρεδόθη εἰς θάνατον ἡ ψυχὴ αὐτοῦ
  english_pob_choice: because his soul was given over to death
  chosen_spanish: porque su alma fue entregada a la muerte
  alternatives_spanish:
  - porque su alma fue entregada a la muerte
  - porque su vida fue entregada a la muerte
  lexicon: παραδίδωμι; ψυχή; θάνατος
  rationale: 'Sigo de cerca la imagen del griego: la ‘alma’ es ‘entregada’ y el destino es ‘la muerte’. ‘Vida’ aclararía el sentido en español, pero suavizaría la formulación literal y reduciría la fuerza de ψυχή en esta cita poética.'
- source_word: ἐν τοῖς ἀνόμοις ἐλογίσθη
  english_pob_choice: he was counted among the lawless
  chosen_spanish: y fue contado entre los impíos
  alternatives_spanish:
  - y fue contado entre los sin ley
  - y fue contado entre los injustos
  lexicon: λογίζομαι; ἄνομος
  rationale: ‘Contado entre’ reproduce el juicio/inclusión del verbo. Para ἀνόμοις, ‘impíos’ es la opción más natural y bíblica en español, aunque ‘sin ley’ conserva más literalmente el prefijo privativo. La elijo porque en este contexto la carga moral es central y el español lector entiende de inmediato la acusación.
theological_decisions:
- issue: Cómo traducir ἀνόμοις en una cita mesiánica/poética sin perder la tensión entre legalidad y moralidad
  english_pob_reading: lawless
  chosen_spanish_reading: impíos
  alternative_spanish_readings:
  - sin ley
  - ilegales
  rationale: La POB inglesa opta por ‘lawless’, que en este contexto funciona más como categoría moral que como simple falta jurídica. ‘Impíos’ comunica esa fuerza en español sin borrar por completo la idea de desviación de la ley divina. ‘Sin ley’ queda como alternativa más literal, pero suena menos natural y puede oscurecer la acusación ética.
  doctrine_reference: Isaías 53:12; lenguaje de siervo sufriente y juicio vicario
translation_notes:
  revision_awareness: La revisión inglesa solo ajustó la puntuación final de un punto a punto y coma para reflejar mejor el flujo formal del griego. La versión española imita ese cierre con punto y coma final y conserva el paralelismo lineal sin añadir notas textuales.
  spanish_consistency_notes:
  - He mantenido un registro bíblico sobrio y paralelo al griego, con líneas breves que reflejan la estructura poética de la cita.
  - No introduje ‘Cristo’ ni ‘Mesías’ porque el texto citado no contiene esos títulos explícitos en esta cláusula.
  - Usé ‘Yahvé’ no corresponde aquí, pues el pasaje no incluye el nombre divino.
  - La puntuación final en punto y coma sigue la decisión revisada del texto inglés y el cierre del griego.
