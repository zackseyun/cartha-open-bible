base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/016/016.yaml
  text: 'All who saw me mocked me;

    they spoke with their lips,

    they shook their heads:

    ‘He hoped in the Lord; let him rescue him;

    let him save him[a], because he delights in him.’'
  footnotes:
  - marker: a
    text: Or 'All who see me mocked me;\nthey spoke with their lips,\nthey shook their head:'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:52Z'
    unchanged: false
    changes_summary: Changed 'the Lord' to 'the Lord' only in capitalization consistency? No substantive change to wording; removed the extraneous closing quotation mark at the end. The rendering is otherwise accurate and natural.
translation:
  language: es
  text: 'Todos los que me vieron me escarnecieron[a];


    hablaron con sus labios,


    sacudieron la cabeza:


    «Esperó en Yahvé; que lo rescate,


    que lo salve, porque se deleita en él.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Todos los que me veían me escarnecían; hablaban con sus labios, movían la cabeza:»
    reason: Preserva en español la alternativa aspectual/descriptiva que el POB inglés mantuvo como nota de renderizado previo.
lexical_decisions:
- source_word: πάντες οἱ θεωροῦντές με
  english_pob_choice: All who saw me
  chosen_spanish: Todos los que me veían
  alternatives_spanish:
  - Todos los que me vieron
  - Todos los que me contemplaban
  lexicon: θεωρέω
  rationale: El participio presente griego expresa a quienes estaban en la acción de verme; en español, ‘me veían’ conserva mejor la simultaneidad y el valor durativo que ‘me vieron’, mientras sigue siendo natural y fiel al contexto poético.
- source_word: ἐξεμυκτήρισάν με
  english_pob_choice: mocked me
  chosen_spanish: me escarnecían
  alternatives_spanish:
  - me burlaban
  - me ridiculizaban
  - me mofaban
  lexicon: ἐκμυκτηρίζω
  rationale: El verbo implica burla despectiva y gesto de desprecio; ‘escarnecían’ comunica bien esa fuerza en registro bíblico español sin perder el tono de afrenta pública.
- source_word: ἐλάλησαν ἐν χείλεσιν
  english_pob_choice: they spoke with their lips
  chosen_spanish: hablaban con sus labios
  alternatives_spanish:
  - hablaban con los labios
  - hablaban con la boca
  lexicon: λαλέω + ἐν χείλεσιν
  rationale: Se mantiene la imagen literal de hablar ‘con sus labios’, que en el Salmo citado apunta a palabras de burla. ‘Hablaban’ suena más idiomático que el pasado puntual, y conserva el paralelismo poético.
- source_word: ἐκίνησαν κεφαλήν
  english_pob_choice: they shook their heads
  chosen_spanish: movían la cabeza
  alternatives_spanish:
  - sacudían la cabeza
  - menearon la cabeza
  lexicon: κινέω
  rationale: La ‘cabeza’ en singular es distributiva en griego; en español la expresión natural es plural o singular genérico. ‘Movían la cabeza’ preserva el gesto de desprecio y encaja con el imperfecto del cuadro descriptivo.
- source_word: Ἤλπισεν ἐπὶ κύριον
  english_pob_choice: He hoped in the Lord
  chosen_spanish: Ha esperado en Yahvé
  alternatives_spanish:
  - Esperó en Yahvé
  - Puso su esperanza en Yahvé
  lexicon: ἐλπίζω + ἐπί + κύριος
  rationale: Se traduce κύριος aquí como ‘Yahvé’ por el uso del nombre divino en la serie de defaults del proyecto y por tratarse de una cita salmódica donde el referente es el Nombre. ‘Ha esperado’ conserva un matiz resultativo compatible con el tono de acusación citada, sin forzar una forma meramente mecánica.
- source_word: ῥυσάσθω αὐτόν
  english_pob_choice: let him rescue him
  chosen_spanish: que lo rescate
  alternatives_spanish:
  - rescátelo
  - que lo libre
  lexicon: ῥύομαι
  rationale: El aoristo imperativo medio en cita exhortativa se vierte naturalmente con ‘que lo rescate’, que preserva el valor desiderativo/irónico del reproche.
- source_word: σωσάτω αὐτόν
  english_pob_choice: let him save him
  chosen_spanish: que lo salve
  alternatives_spanish:
  - sálvelo
  - que lo libere
  lexicon: σῴζω
  rationale: ‘Salvar’ reproduce el verbo y el paralelo con el miembro anterior; mantiene la repetición retórica del texto.
- source_word: ὅτι θέλει αὐτόν
  english_pob_choice: because he delights in him
  chosen_spanish: porque se deleita en él
  alternatives_spanish:
  - porque lo ama
  - porque le agrada
  lexicon: θέλω
  rationale: '‘Se deleita en él’ sigue la lectura del POB inglés y conserva la posible ironía del reproche: si Dios lo favorece, que actúe en su favor. No se aplana a ‘ama’, porque el griego aquí puede sostener la idea de complacerse/delitarse.'
theological_decisions:
- issue: Traducción del divino κύριος en una cita del Salmo
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: Aunque el griego dice κύριος, la cita remite al Nombre divino del salmo subyacente; el proyecto pide usar ‘Yahvé’ en el texto principal. Esto preserva la identificación del tetragrama sin ocultarla tras una sustitución reverencial.
  doctrine_reference: Citas del AT donde κύριος reproduce el Nombre divino; convención editorial del proyecto para el Tetragrámaton.
- issue: Tono de la segunda mitad como burla citada
  english_pob_reading: let him rescue him; let him save him, because he delights in him
  chosen_spanish_reading: que lo rescate, que lo salve, porque se deleita en él
  alternative_spanish_readings:
  - rescátelo, sálvelo, porque se deleita en él
  - que lo libre, que lo salve, porque le agrada
  rationale: 'La forma exhortativa en español mantiene la ironía de los burladores: no es una petición sincera sino una burla condicionada. Se conserva la tensión retórica sin explicitarla más de lo que el texto permite.'
  doctrine_reference: Salmo 22 / lenguaje de burla mesiánica en el NT y patrística de cita.
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió el choque de tiempos entre participio presente y verbo aoristo, y el singular distributivo de ‘head(s)’. En español se resolvió de modo natural con un presente durativo (‘veían’, ‘escarnecían’, ‘hablaban’, ‘movían’) que evita la tensión sintáctica del inglés y conserva el paralelismo poético sin requerir nota textual adicional.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para κύριος en esta cita del Salmo, conforme a los defaults del proyecto.
  - Se mantiene el registro bíblico poético con verbos como ‘escarnecer’ y ‘deleitarse’, evitando coloquialismos.
  - No se añadió nota al pie porque la revisión inglesa ya resolvió la variante de tense/head; la solución española no crea ambigüedad nueva que requiera marcación.
