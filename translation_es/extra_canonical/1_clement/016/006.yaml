translation:
  language: es
  text: Todos nos extraviamos como ovejas[a]; cada uno se extravió por su propio camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Todos nosotros, como ovejas, nos extraviamos»
    reason: Preservar en español la alternativa de formulación documentada en el English POB.
lexical_decisions:
- source_word: πάντες
  english_pob_choice: We all
  chosen_spanish: Todos
  alternatives_spanish:
  - Todos nosotros
  - Nosotros todos
  lexicon: πάντες
  rationale: El griego antepone el énfasis de totalidad; en español, «Todos» transmite de forma natural que el sujeto incluye a todos sin añadir una estructura forzada.
- source_word: ὡς πρόβατα
  english_pob_choice: like sheep
  chosen_spanish: como ovejas
  alternatives_spanish:
  - como rebaño
  - cual ovejas
  lexicon: ὡς + πρόβατα
  rationale: La comparación directa con «ovejas» reproduce bien la imagen pastoral del original y suena natural en español bíblico contemporáneo.
- source_word: ἐπλανήθημεν
  english_pob_choice: went astray
  chosen_spanish: nos descarriamos
  alternatives_spanish:
  - nos extraviamos
  - anduvimos errantes
  lexicon: ἐπλανήθημεν
  rationale: «Descarriamos» conserva la idea de apartarse del camino recto y funciona con el matiz moral de la imagen. «Extraviamos» es posible, pero puede sonar más general o menos relacional.
- source_word: ἄνθρωπος
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: ἄνθρωπος
  rationale: Aunque literalmente es «hombre», en este contexto el sentido distributivo es cada individuo; «cada uno» evita un masculino genérico innecesario y preserva el alcance universal.
- source_word: τῇ ὁδῷ αὐτοῦ
  english_pob_choice: in his own way
  chosen_spanish: por su propio camino
  alternatives_spanish:
  - en su propio camino
  - por su propio rumbo
  lexicon: ὁδός
  rationale: La preposición y la imagen de camino se expresan con naturalidad en español con «por su propio camino», manteniendo el valor figurado de conducta o dirección personal.
- source_word: ἐπλανήθη
  english_pob_choice: went astray
  chosen_spanish: se descarrió
  alternatives_spanish:
  - se extravió
  - anduvo errante
  lexicon: ἐπλανήθη
  rationale: 'Repite el verbo con una forma adaptada al singular para preservar el paralelismo del griego: primero el grupo, luego cada individuo.'
theological_decisions:
- issue: Universalidad del desvío humano
  english_pob_reading: We all went astray like sheep; each man went astray in his own way.
  chosen_spanish_reading: Todos nos descarriamos como ovejas; cada uno se descarrió por su propio camino.
  alternative_spanish_readings:
  - Todos estábamos descarriados como ovejas; cada uno anduvo por su propio camino.
  - Todos nos extraviamos como ovejas; cada uno siguió su propio camino.
  rationale: 'El texto enfatiza que el desvío es universal y personal a la vez. La traducción conserva ambos niveles: la primera cláusula abarca a todos; la segunda distribuye la culpa/condición a cada individuo, sin suavizar el matiz moral del original.'
  doctrine_reference: Antropología bíblica; universalidad del pecado o del extravío humano
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión estilística menor: se prefirió «We all went astray like sheep» sobre la formulación más arcaica «All we like sheep went astray». La versión española adopta directamente una construcción natural y moderna sin perder el paralelismo del original griego.'
  spanish_consistency_notes:
  - Se mantiene el campo semántico de «camino» para ὁδός.
  - Se evita «SEÑOR» o terminología litúrgica no pertinente porque el versículo no contiene un referente divino explícito.
  - La repetición de «descarriarse» en ambas cláusulas preserva la cohesión retórica del griego.
