base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/016/007.yaml
  text: 'And the Lord gave him over for our sins,

    and he[a], because of being afflicted,

    does not open his mouth.

    Like a sheep he was led to slaughter,

    and as a lamb before its shearer is voiceless,

    so he does not open his mouth.

    In his humiliation his judgment was taken away.'
  footnotes:
  - marker: a
    text: Or 'and like a lamb before the one shearing it is voiceless'.
    reason: previous_rendering
  revision_pass:
