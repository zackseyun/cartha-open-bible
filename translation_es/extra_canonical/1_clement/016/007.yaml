  - severity: medium
    issue: La frase «ante el que lo esquila, sin voz» suena poco natural
    rationale: Aunque fiel en lo léxico, la combinación queda rígida en español. «Como un cordero ante su esquilador, mudo» comunica mejor el sentido de ἄφωνος en esta construcción.
  - severity: low
    issue: La nota [a] no ofrece una variante significativa
    rationale: La nota repite prácticamente la misma formulación del texto principal, por lo que no ayuda al lector ni preserva una alternativa auditada útil.
