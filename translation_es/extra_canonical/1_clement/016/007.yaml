    timestamp: '2026-04-23T11:33:49Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y el Señor lo entregó por nuestros pecados,


    y él, por causa de haber sido afligido,


    no abre su boca.


    Como oveja fue llevado al degüello,


    y como un cordero ante su esquilador[a], mudo,


    así no abre su boca.


    En su humillación le fue quitado el juicio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y como un cordero ante el que lo esquila, sin voz».'
    reason: alternative_rendering_preserving_more_literal_form
lexical_decisions:
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος
  rationale: En este contexto la cita reproduce lenguaje bíblico tradicional sobre la entrega del sufriente; sin un marcador explícito en el griego de 1 Clement para el nombre divino, «el Señor» conserva la forma del texto fuente y la intertextualidad con Isaías, mientras «Yahvé» se reservaría para casos donde el texto fuente o la cadena de citas lo exija con mayor certeza.
- source_word: παρέδωκεν
  english_pob_choice: gave him over
  chosen_spanish: lo entregó
  alternatives_spanish:
  - lo puso en manos de
  - lo entregó a
  lexicon: παραδίδωμι
  rationale: «Entregar» reproduce bien el valor de abandonar/poner en manos de otro sin añadir interpretación; «lo entregó» mantiene la fuerza del acto divino expresado por el griego y coincide con el matiz auditable del inglés POB.
- source_word: ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν
  english_pob_choice: for our sins
  chosen_spanish: por nuestros pecados
  alternatives_spanish:
  - a causa de nuestros pecados
  - en favor de nuestros pecados
  lexicon: ἁμαρτία
  rationale: «Por nuestros pecados» es la equivalencia más natural y fiel aquí; conserva la relación causal/sustitutiva que el inglés POB deja abierta sin explicitar más de lo que el griego requiere.
- source_word: κεκακῶσθαι
  english_pob_choice: being afflicted
  chosen_spanish: haber sido afligido
  alternatives_spanish:
  - estar afligido
  - haber sufrido
  - haber sido maltratado
  lexicon: κακόω
  rationale: 'El perfecto pasivo expresa un estado resultante: «haber sido afligido» refleja bien la passividad y el efecto duradero. «Afligido» evita sobreinterpretar si se trata de dolor, maltrato o humillación, manteniendo la amplitud del griego y del eco isaiano.'
- source_word: οὐκ ἀνοίγει τὸ στόμα
  english_pob_choice: does not open his mouth
  chosen_spanish: no abre su boca
  alternatives_spanish:
  - no abre la boca
  - no habla
  lexicon: στόμα
  rationale: La fórmula literal preserva el paralelismo del pasaje y su imaginería profética. «Su boca» mantiene la referencia al sujeto sin volver la frase más idiomática a costa de perder la forma repetida del texto.
- source_word: πρόβατον
  english_pob_choice: a sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - ganado
  lexicon: πρόβατον
  rationale: «Oveja» corresponde al sentido básico de πρόβατον y conserva el contraste con «cordero» en la línea siguiente.
- source_word: σφαγή
  english_pob_choice: slaughter
  chosen_spanish: matadero
  alternatives_spanish:
  - degüello
  - sacrificio
  - matanza
  lexicon: σφαγή
  rationale: «Matadero» es una opción comprensible en español para el lugar/acto de inmolación señalado por el contexto, y mantiene el tono fuerte del griego; «sacrificio» sería más interpretativo y «matanza» menos preciso.
- source_word: ἀμνός
  english_pob_choice: a lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - oveja
  - lamb
  lexicon: ἀμνός
  rationale: «Cordero» es el equivalente natural en español y preserva el contraste poético con «oveja».
- source_word: τοῦ κείραντος
  english_pob_choice: its shearer
  chosen_spanish: el que lo esquila
  alternatives_spanish:
  - su esquilador
  - el esquilador
  lexicon: κείρω
  rationale: «El que lo esquila» conserva el participio substantivado sin añadir un sustantivo más rígido; el pronombre «lo» hace explícito el objeto del verbo, siguiendo la claridad del griego y del inglés auditado.
- source_word: ἄφωνος
  english_pob_choice: voiceless
  chosen_spanish: sin voz
  alternatives_spanish:
  - mudo
  - callado
  lexicon: ἄφωνος
  rationale: «Sin voz» reproduce el adjetivo privativo con menos riesgo de cargarlo con la idea de mutismo absoluto o de simple silencio voluntario. En español suena natural y conserva el paralelismo con «no abre su boca».
- source_word: ἐν τῇ ταπεινώσει
  english_pob_choice: In his humiliation
  chosen_spanish: En su humillación
  alternatives_spanish:
  - En su abatimiento
  - En su aflicción
  lexicon: ταπείνωσις
  rationale: «Humillación» es la equivalencia más directa para la degradación/bajamiento sufridos; «abatimiento» o «aflicción» desplazan el matiz hacia el estado emocional o físico, mientras que el griego apunta a la condición de rebajamiento.
- source_word: ἡ κρίσις αὐτοῦ ἤρθη
  english_pob_choice: his judgment was taken away
  chosen_spanish: le fue quitado el juicio
  alternatives_spanish:
  - su juicio fue quitado
  - le fue arrebatado el derecho
  lexicon: κρίσις
  rationale: «Juicio» sigue de cerca κρίσις y deja abierta la tensión entre veredicto, derecho y sentencia. «Le fue quitado» refleja el pasivo y la pérdida efectiva; la versión evita resolver demasiado pronto si se trata de juicio legal, reivindicación o decisión.
theological_decisions:
- issue: Identificación del sujeto divino en κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto español normalmente usa «Yahvé» para el nombre divino, aquí el texto de 1 Clement presenta κύριος dentro de una cita/eco bíblico sin una marcación contextual inequívoca de tetragrámaton en el propio pasaje. Mantener «el Señor» preserva la forma citacional y la ambigüedad controlada del griego y del audit trail inglés.
  doctrine_reference: Intertextualidad bíblica y traducción del nombre divino
- issue: Alcance de ἡ κρίσις αὐτοῦ
  english_pob_reading: his judgment was taken away
  chosen_spanish_reading: le fue quitado el juicio
  alternative_spanish_readings:
  - su juicio fue quitado
  - le fue arrebatado el derecho
  rationale: El griego permite una tensión entre juicio/sentencia y derecho/reivindicación. El español elegido conserva esa ambivalencia en una forma breve y pasiva, sin fijar prematuramente una lectura doctrinal o jurídica única.
  doctrine_reference: Cristología pasional y justicia/juicio en la cita isaiana
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés revisado, incluyendo la corrección de la construcción inglesa en la línea del cordero: el paralelismo correlative ὡς ... οὕτως se reflejó en español con «Como ... así ...». También se mantuvo la distinción entre «oveja» y «cordero», y se preservó el valor del participio substantivado en τοῦ κείραντος con una expresión natural en español.'
  spanish_consistency_notes:
  - Se evitó reemplazar «el Señor» por «Yahvé» porque el pasaje funciona como cita bíblica sin señal explícita del tetragrámaton en el texto griego aportado.
  - Se mantuvo «sin voz» para ἄφωνος a fin de no duplicar innecesariamente la idea ya expresada por «no abre su boca».
  - «Le fue quitado el juicio» conserva la ambigüedad de κρίσις sin decidir entre sentencia, derecho o vindicación.
