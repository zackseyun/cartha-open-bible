translation:
  language: es
  text: 'Porque el Mesías pertenece a los humildes de mente, no a los que se arrojan sobre su temor. El cetro de la majestad de Dios, el Señor Jesús Mesías, no vino en pompa de arrogancia ni de soberbia, aunque podía, sino en humildad de mente, tal como el Espíritu Santo habló acerca de él. Pues dice:


    «Señor, ¿quién ha creído a nuestro anuncio?


    y ¿a quién se ha revelado el brazo del Señor?


    Lo anunciamos delante de él,


    como a un niño,


    como una raíz en tierra sedienta;


    no tiene forma ni gloria,


    y lo vimos,


    y no tenía ni forma ni hermosura,


    sino que su aspecto fue deshonrado,


    por debajo del aspecto de los hombres;


    un hombre en plaga y dolor,


    y que sabe llevar la debilidad,


    porque su rostro ha sido apartado;


    fue deshonrado y no fue estimado.


    Este lleva nuestros pecados


    y sufre dolor por nosotros,


    y lo consideramos en dolor,


    en plaga y en aflicción.


    Pero fue herido a causa de nuestros pecados


    y ha sido debilitado a causa de nuestras iniquidades.


    La disciplina de nuestra paz fue sobre él;


    por su magulladura fuimos sanados.


    Todos nosotros, como ovejas, nos descarriamos;


    cada hombre se descarrió por su propio camino.


    Y el Señor lo entregó por nuestros pecados,


    y él, por haber sido afligido, no abre su boca.


    Como oveja fue llevado al matadero,


    y como cordero, delante del que lo esquila, permanece mudo;


    así no abre su boca.


    En su humillación fue quitado su juicio.


    ¿Quién contará su generación?


    Porque su vida es quitada de la tierra.


    A causa de las iniquidades de mi pueblo llegó a la muerte.


    Y daré a los perversos en lugar de su sepultura,


    y a los ricos en lugar de su muerte;


    porque no hizo iniquidad,


    ni se halló engaño en su boca.


    Y el Señor quiere limpiarlo del golpe.


    Si ofrecen por el pecado,[a]


    su alma verá una descendencia de larga vida.


    Y el Señor quiere quitar el dolor de su alma,


    mostrarle luz y formarlo con entendimiento,


    justificar a un justo que sirve bien a muchos;


    y él mismo llevará sus pecados.


    Por eso heredará a muchos,


    y repartirá los despojos de los fuertes,


    porque su alma fue entregada a la muerte,


    y fue contado entre los inicuos.


    Y él llevó los pecados de muchos,


    y a causa de sus pecados fue entregado.»


    Y otra vez él mismo dice:


    «Pero yo soy un gusano y no un hombre,


    oprobio de los hombres y despreciado por el pueblo.


    Todos los que me ven se burlaron de mí;


    hablaron con sus labios,


    movieron la cabeza:


    “Esperó en el Señor; líbrelo él,


    sálvelo, porque se complace en él”.»


    Miren, hombres amados, cuál es el modelo que se nos ha dado. Porque si el Señor se humilló así, ¿qué debemos hacer nosotros, que por medio de él hemos venido bajo el yugo de su gracia?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego aquí presenta una formulación textual difícil, con una forma plural (‘si ofrecen/dan’) junto con ‘su alma’. Se conserva la construcción de manera cercana al texto transmitido en esta cita.
    reason: La sintaxis española puede sonar extraña; la nota preserva la dificultad textual sin resolverla en exceso.
lexical_decisions:
- source_word: ταπεινοφρονῶν / ταπεινοφρονῶντω
  english_pob_choice: humble-minded / in humility of mind
  chosen_spanish: humilde / humildad de mente
  alternatives_spanish:
  - humilde de corazón
  - humilde en pensamiento
  - bajo de espíritu
  lexicon: LSJ
  rationale: La idea central no es solo conducta exterior sino una disposición interior. En español, ‘humildad de mente’ conserva el matiz de postura mental; ‘humilde’ en la apertura evita rigidez sin perder el sentido.
- source_word: σκῆπτρον τῆς μεγαλωσύνης
  english_pob_choice: the scepter of the majesty
  chosen_spanish: el cetro de la majestad
  alternatives_spanish:
  - el cetro de la grandeza
  - el cetro real de la majestad
  lexicon: LSJ
  rationale: ‘Cetro’ mantiene la imagen regia. ‘Majestad’ comunica el rango exaltado de μεγαλωσύνη y encaja con el tono cristológico del pasaje.
- source_word: κόμπος
  english_pob_choice: pomp
  chosen_spanish: pompa
  alternatives_spanish:
  - ostentación
  - aparato
  - despliegue
  lexicon: LSJ
  rationale: ‘Pompa’ reproduce el matiz de exhibición ostentosa y funciona bien junto a ‘arrogancia’ en español moderno.
- source_word: ἀλαζονεία
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - vanidad
  - pretensión
  - soberbia
  lexicon: BDAG
  rationale: ‘Arrogancia’ es transparente y mantiene el contraste moral del texto; ‘soberbia’ aparece también en la frase para reforzar el par vicioso sin alterar el sentido.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí el título tiene fuerza escritural y real; ‘Mesías’ preserva ese valor titular en vez de tomarlo solo como nombre propio.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En la cita bíblica y en la confesión cristológica, ‘Señor’ es la opción natural y reverente en español, manteniendo la cita de Isaías y la referencia a Jesús.
- source_word: ἀκοή
  english_pob_choice: report
  chosen_spanish: anuncio
  alternatives_spanish:
  - mensaje
  - relato
  - noticia
  lexicon: LSJ
  rationale: En el contexto de Isaías, se trata de la proclamación recibida; ‘anuncio’ transmite bien esa declaración pública sin sonar técnico.
- source_word: μαλακία
  english_pob_choice: weakness
  chosen_spanish: debilidad
  alternatives_spanish:
  - enfermedad
  - fragilidad
  - flaqueza
  lexicon: LSJ
  rationale: ‘Debilidad’ preserva el rango semántico amplio del término sin reducirlo a enfermedad corporal específica.
- source_word: παιδεία
  english_pob_choice: chastisement
  chosen_spanish: disciplina
  alternatives_spanish:
  - castigo
  - corrección
  - amonestación
  lexicon: BDAG
  rationale: En español, ‘disciplina’ conserva la gravedad formativa/punitiva del término sin volverlo excesivamente jurídico; además mantiene la ambigüedad teológica del texto profético.
- source_word: μώλωψ
  english_pob_choice: bruise
  chosen_spanish: moretón
  alternatives_spanish:
  - golpe
  - magulladura
  - herida
  lexicon: LSJ
  rationale: ‘Moretón’ es un equivalente claro y concreto de la lesión visible; evita el tono arcaizante de ‘azote’ y sigue siendo comprensible.
- source_word: ἀνομία
  english_pob_choice: lawless deed / lawless deeds
  chosen_spanish: iniquidad / inicuos
  alternatives_spanish:
  - maldad
  - impiedad
  - ilegalidad
  lexicon: BDAG
  rationale: Aunque el audit trail inglés prefiere ‘lawless deeds’, en español ‘iniquidad’ y ‘inicuo’ preservan mejor el peso bíblico y la fuerza moral del término, sin perder la relación con la falta contra Dios.
- source_word: ὑπογραμμός
  english_pob_choice: pattern
  chosen_spanish: patrón
  alternatives_spanish:
  - modelo
  - ejemplo
  - norma
  lexicon: BDAG
  rationale: ‘Patrón’ comunica un modelo a seguir sin volverlo solo un ejemplo abstracto; mantiene el valor de guía práctica del término.
- source_word: ζυγός
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - carga
  - ligadura
  - dominio
  lexicon: BDAG
  rationale: La metáfora del ‘yugo’ debe conservarse por su carga discipular y su eco bíblico.
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: ‘Gracia’ es la traducción teológica estable y la más adecuada para la relación salvífica expresada en el cierre.
theological_decisions:
- issue: Título cristológico Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La sección presenta a Jesús en categorías proféticas y reales; ‘Mesías’ mantiene explícita la identidad prometida y evita convertir el título en mero apellido religioso.
  doctrine_reference: Translate titles; transliterate names.
- issue: Isaías 53 aplicado a Jesús
  english_pob_reading: Retain sacrificial and substitution-shaped wording such as 'bears our sins' and 'was wounded because of our sins'
  chosen_spanish_reading: 'Mantener lenguaje vicario y de carga del pecado: ‘lleva nuestros pecados’, ‘fue herido a causa de nuestros pecados’, ‘fue entregado por nuestros pecados’'
  alternative_spanish_readings:
  - Suavizar a lenguaje general de sufrimiento
  - Reducir la sustitución a mera solidaridad
  rationale: El texto cita Isaías con fuerza expiatoria y sustitutiva. La traducción conserva esa tensión en vez de diluirla en mera ejemplificación moral.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Dirección de ἄνδρες ἀγαπητοί
  english_pob_reading: beloved men
  chosen_spanish_reading: hombres amados
  alternative_spanish_readings:
  - hermanos amados
  - amados
  rationale: El griego es masculinizante y el pasaje se dirige así al grupo. ‘Hombres amados’ conserva la forma y el tono del original.
  doctrine_reference: Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del inglés POB, especialmente la corrección del arranque a 'those who cast themselves upon his fear' y el ajuste menor en 'though he was able.' En español conservé el sentido de la frase griega sin introducir 'rebaño' ni otras expansiones ajenas al texto, y mantuve la cristología alta y el lenguaje de humillación del pasaje.
  spanish_consistency_notes:
  - Usé ‘Mesías’ para Χριστός de manera uniforme.
  - Mantuve ‘Señor’ para κύριος tanto en la cita de Isaías como en la narración cristológica.
  - Conservé el lenguaje de pecado/iniquidad/entrega para no borrar la tensión expiatoria del fragmento.
  - Evité calcos innecesarios donde el español permitía una formulación natural, pero sin paraphrasear el contenido.
  - No incluí notas al pie para no arriesgar anclajes no presentes; el texto queda listo para publicación sin marcadores accesorios.
