source:
  edition: Funk 1901 (normalized OCR)
  text: Ταπεινοφρονῶντω γὰρ ἐστὶν ὁ Χριστός, οὐχ ἐπιρριπμένων ἐπὶ τὸν φόβον αὐτοῦ. 2. τὸ σκῆπτρον τῆς μεγαλωσύνης τοῦ θεοῦ, ὁ κύριος Ἰησοῦς Χριστός, οὐχ ἦλθεν ἐν κόμπῳ ἀλαζονείας οὐδὲ ὑπερηφανίας, καίπερ δυνάμενος, ἀλλὰ ταπεινοφρονῶν, καθὼς τὸ πνεῦμα τὸ ἅγιον περὶ αὐτοῦ ἐλάλησεν· φησὶν γάρ· . Κύριε, τίς ἐπίστευσεν τῇ ἀκοῇ ἡμῶν; καὶ ὁ βραχίων κυρίου τίνι ἀπεκαλύφθη; ἀνηγγείλαμεν ἐναντίον αὐτοῦ, ὡς παιδίον, ὡς ῥίζα ἐν γῇ διψώσῃ· οὐκ ἔστιν εἶδος αὐτῷ οὐδὲ δόξα, καὶ εἴδομεν αὐτόν, καὶ οὐκ εἶχεν εἶδος οὐδὲ κάλλος, ἀλλὰ τὸ εἶδος αὐτοῦ ἄτιμον, ἐκλεῖπον παρὰ τὸ εἶδος τῶν ἀνθρώπων· ἄνθρωπος ἐν πληγῇ ὢν καὶ πόνῳ καὶ εἰδὼς φέρειν μαλακίαν ὅτι ἀπέστραπται τὸ πρόσωπον αὐτοῦ, ἠτιμάσθη καὶ οὐκ ἐλογίσθη. 4. οὗτος τὰς ἁμαρτίας ἡμῶν φέρει καὶ περὶ ἡμῶν ὀδυνᾶται, καὶ ἡμεῖς ἐλογισάμεθα αὐτὸν εἶναι ἐν πόνῳ καὶ ἐν πληγῇ καὶ ἐν κακώσει. 5. αὐτὸς δὲ ἐτραυματίσθη διὰ τὰς ἁμαρτίας ἡμῶν καὶ μεμαλάκισται διὰ τὰς ἀνομίας ἡμῶν. παιδεία εἰρήνης ἡμῶν ἐπ’ αὐτόν· τῷ μώλωπι αὐτοῦ ἡμεῖς ἰάθημεν. 6. πάντες ὡς πρόβατα ἐπλανήθημεν,
    ἄνθρωπος τῇ ὁδῷ αὐτοῦ ἐπλανήθη. 7. καὶ κύριος παρέδωκεν αὐτὸν ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν, καὶ αὐτὸς διὰ τὸ κεκακῶσθαι οὐκ ἀνοίγει τὸ στόμα. ὡς πρόβατον ἐπὶ σφαγὴν ἤχθη, καὶ ὡς ἀμνὸς ἐναντίον τοῦ κείραντος ἄφωνος, οὕτως οὐκ ἀνοίγει τὸ στόμα αὐτοῦ. ἐν τῇ ταπεινώσει ἡ κρίσις αὐτοῦ ἤρθη. 8. τὴν γενεὰν αὐτοῦ τίς διηγήσεται; ὅτι αἴρεται ἀπὸ τῆς γῆς ἡ ζωὴ αὐτοῦ . ἀπὸ τῶν ἀνομιῶν τοῦ λαοῦ μου ἤκει εἰς θάνατον. 10. καὶ δώσω τοὺς πονηροὺς ἀντὶ τῆς ταφῆς αὐτοῦ καὶ τοὺς πλουσίους ἀντὶ τοῦ θανάτου αὐτοῦ· ὅτι ἀνομίαν οὐκ ἐποίησεν, οὐδὲ εὑρέθη δόλος ἐν τῷ στόματι αὐτοῦ. καὶ κύριος βούλεται καθαρίσαι αὐτὸν τῆς πληγῆς. 11. ἐὰν δῶτε περὶ ἁμαρτίας, ἡ ψυχὴ ὑμῶν ὄψεται σπέρμα μακρόβιον. 12. καὶ κύριος βούλεται ἀφελεῖν ἀπὸ τοῦ πόνου τῆς ψυχῆς αὐτοῦ, δεῖξαι αὐτῷ φῶς καὶ πλάσαι τῇ συνέσει, δικαιῶσαι δίκαιον εὖ δουλεύοντα πολλοῖς· καὶ τὰς ἁμαρτίας αὐτῶν αὐτὸς ἀνοίσει. 13. διὰ τοῦτο αὐτὸς κληρονομήσει πολλοὺς καὶ τῶν ἰσχυρῶν μεριεῖ σκῦλα ἀνθ’ ὧν παρεδόθη εἰς θάνατον ἡ ψυχὴ αὐτοῦ, καὶ ἐν τοῖς ἀνόμοις ἐλογίσθη· 14.
    καὶ αὐτὸς ἁμαρτίας πολλῶν ἀνήνεγκε καὶ διὰ τὰς ἁμαρτίας αὐτῶν παρεδόθη. 15. καὶ πάλιν αὐτὸς φησίν· Ἐγὼ δὲ εἰμι σκώληξ καὶ οὐκ ἄνθρωπος, ὄνειδος ἀνθρώπων καὶ ἐξουθένημα λαοῦ. 16. πάντες οἱ θεωροῦντές με ἐξεμυκτήρισάν με, ἐλάλησαν ἐν χείλεσιν, ἐκίνησαν κεφαλήν· Ἤλπισεν ἐπὶ κύριον, ῥυσάσθω αὐτόν, σωσάτω αὐτόν, ὅτι θέλει αὐτόν. 17. Ὁρᾶτε, ἄνδρες ἀγαπητοί, τίς ὁ ὑπογραμμὸς· δεδομένoς ἡμῖν· εἰ γὰρ ὁ κύριος οὕτως ἐταπεινοφρόνησεν, τί ποιήσωμεν ἡμεῖς οἱ ὑπὸ τὸν ζυγὸν τῆς χάριτος αὐτοῦ δι’ αὐτοῦ ἐλθόντες;
