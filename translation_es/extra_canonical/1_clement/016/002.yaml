source:
  edition: Funk 1901 (normalized OCR)
  text: τὸ σκῆπτρον τῆς μεγαλωσύνης τοῦ θεοῦ, ὁ κύριος Ἰησοῦς Χριστός, οὐχ ἦλθεν ἐν κόμπῳ ἀλαζονείας οὐδὲ ὑπερηφανίας, καίπερ δυνάμενος, ἀλλὰ ταπεινοφρονῶν, καθὼς τὸ πνεῦμα τὸ ἅγιον περὶ αὐτοῦ ἐλάλησεν· φησὶν γάρ· . Κύριε, τίς ἐπίστευσεν τῇ ἀκοῇ ἡμῶν; καὶ ὁ βραχίων κυρίου τίνι ἀπεκαλύφθη; ἀνηγγείλαμεν ἐναντίον αὐτοῦ, ὡς παιδίον, ὡς ῥίζα ἐν γῇ διψώσῃ· οὐκ ἔστιν εἶδος αὐτῷ οὐδὲ δόξα, καὶ εἴδομεν αὐτόν, καὶ οὐκ εἶχεν εἶδος οὐδὲ κάλλος, ἀλλὰ τὸ εἶδος αὐτοῦ ἄτιμον, ἐκλεῖπον παρὰ τὸ εἶδος τῶν ἀνθρώπων· ἄνθρωπος ἐν πληγῇ ὢν καὶ πόνῳ καὶ εἰδὼς φέρειν μαλακίαν ὅτι ἀπέστραπται τὸ πρόσωπον αὐτοῦ, ἠτιμάσθη καὶ οὐκ ἐλογίσθη.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/016/002.yaml
  text: 'The scepter of the majesty of God[a], the Lord Jesus Messiah, did not come in the pomp of arrogance or pride, though being able, but in humility, just as the Holy Spirit spoke concerning him. For it says:


    “Lord, who has believed our report?

    and to whom has the arm of the Lord been revealed?

    We announced him before him,

    like a child,

    like a root in thirsty ground.

    He has no form nor glory,

    and we saw him,

    and he had neither form nor beauty,

    but his appearance was dishonored,

    lacking beyond the appearance of men;

    a man being in affliction and toil

    and knowing how to bear weakness,

    because his face is turned away[c][b];

    he was dishonored and not esteemed.”'
  footnotes:
  - marker: a
    text: Or 'failing beyond the appearance of men;'.
    reason: previous_rendering
  - marker: b
    text: Or 'a man being in plague and toil'.
    reason: previous_rendering
  - marker: c
    text: Or 'We announced him before him,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:44:27Z'
    unchanged: false
    changes_summary: Changed 'Christ' to 'Messiah' per POB policy. Made a small adjustment from 'though he was able' to 'though being able' to reflect the participial construction more closely. Kept the rest substantially intact, with one slight tightening of 'lacking the appearance of men' to 'lacking beyond the appearance of men' to better reflect the Greek phrasing.
translation:
  language: es
  text: 'El cetro de la majestad[a] de Dios, el Señor Jesús Mesías, no vino en la pompa de la arrogancia ni del orgullo, aunque podía, sino con humildad, tal como el Espíritu Santo habló acerca de él. Porque dice:


    «Señor, ¿quién ha creído a nuestro mensaje?


    y ¿a quién se ha revelado el brazo del Señor?


    Anunciamos delante de él[c],


    como un niño,


    como una raíz en tierra sedienta.


    No tiene forma ni gloria,


    y lo vimos,


    y no tenía forma ni belleza,


    pero su apariencia fue deshonrada,


    quedando por debajo de la apariencia de los hombres[b];


    un hombre en sufrimiento y dolor


    y que sabe llevar la debilidad,


    porque su rostro está apartado;


    fue deshonrado y no estimado.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la grandeza»; el griego μεγαλωσύνη admite un matiz de grandeza/exaltación, aunque «majestad» preserva mejor el tono regio.
    reason: lexical_alternative
  - marker: b
    text: O «siendo inferior a la apariencia de los hombres»; la construcción comparativa subraya la inferioridad respecto de la apariencia humana.
    reason: lexical_alternative
  - marker: c
    text: O «Proclamamos antes de él»; el griego ἐναντίον αὐτοῦ admite un matiz de presencia/delante de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ σκῆπτρον τῆς μεγαλωσύνης
  english_pob_choice: The scepter of the majesty
  chosen_spanish: El cetro de la majestad
  alternatives_spanish:
  - El cetro de la grandeza
  - El bastón de la majestad
  lexicon: σκῆπτρον; μεγαλωσύνη
  rationale: Mantengo el valor regio y solemne de σκῆπτρον con «cetro». Para μεγαλωσύνη, «majestad» conserva el registro elevado y funciona bien en español eclesial; «grandeza» sería posible, pero pierde algo de la resonancia real.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  lexicon: θεός
  rationale: Aquí el griego dice θεοῦ, no el nombre divino explícito. En español, «Dios» es la correspondencia directa y evita introducir una identificación más precisa que el texto griego de este segmento no marca de forma explícita.
- source_word: ὁ κύριος Ἰησοῦς Χριστός
  english_pob_choice: the Lord Jesus Messiah
  chosen_spanish: el Señor Jesús Mesías
  alternatives_spanish:
  - el Señor Jesús Cristo
  - el Señor Jesús el Mesías
  lexicon: κύριος; Ἰησοῦς; Χριστός
  rationale: Sigo la decisión POB de usar «Mesías» para Χριστός cuando funciona como título. «Señor Jesús Mesías» conserva la secuencia titular del griego sin convertirlo en una fórmula litúrgica tradicional menos transparente.
- source_word: οὐχ ἦλθεν
  english_pob_choice: did not come
  chosen_spanish: no vino
  alternatives_spanish:
  - no llegó
  - no apareció
  lexicon: ἔρχομαι
  rationale: «Vino» es la forma natural y fiel para expresar el movimiento/venida del sujeto en español.
- source_word: ἐν κόμπῳ ἀλαζονείας οὐδὲ ὑπερηφανίας
  english_pob_choice: in the pomp of arrogance or pride
  chosen_spanish: en la pompa de la arrogancia ni del orgullo
  alternatives_spanish:
  - con ostentación de arrogancia ni de orgullo
  - en el boato de la arrogancia ni del orgullo
  lexicon: κόμπος; ἀλαζονεία; ὑπερηφανία
  rationale: «Pompa» conserva el matiz de ostentación; «arrogancia» y «orgullo» distinguen bien los dos sustantivos griegos emparentados pero no idénticos. Evito un estilo demasiado ornamental.
- source_word: καίπερ δυνάμενος
  english_pob_choice: though being able
  chosen_spanish: aunque podía
  alternatives_spanish:
  - aunque pudiendo
  - siendo capaz
  lexicon: δύναμαι
  rationale: La forma española más natural y clara es «aunque podía». Conserva la concesiva del participio sin sonar forzada.
- source_word: ταπεινοφρονῶν
  english_pob_choice: in humility
  chosen_spanish: con humildad
  alternatives_spanish:
  - humillándose
  - con actitud humilde
  lexicon: ταπεινοφρονέω
  rationale: «Con humildad» mantiene el valor adverbial y el tono sobrio. «Humillándose» sería más fuerte y sugeriría una acción reflexiva no requerida por el griego.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el espíritu santo
  lexicon: πνεῦμα; ἅγιος
  rationale: La mayúscula es apropiada aquí por la referencia personal al Espíritu Santo. El contexto lo exige claramente.
- source_word: ἀνηγγείλαμεν ἐναντίον αὐτοῦ
  english_pob_choice: We announced him before him
  chosen_spanish: Anunciamos delante de él
  alternatives_spanish:
  - Proclamamos ante él
  - Hicimos anuncio ante él
  lexicon: ἀναγγέλλω; ἐναντίον
  rationale: Sigo la revisión auditada que elimina el objeto implícito añadido en inglés. «Delante de él» respeta ἐναντίον y evita forzar una relación sintáctica que el griego no explicita.
- source_word: ὡς παιδίον
  english_pob_choice: like a child
  chosen_spanish: como un niño
  alternatives_spanish:
  - como un niño pequeño
  - como un infante
  lexicon: παιδίον
  rationale: «Niño» es la correspondencia natural y clara en español; conserva la imagen de pequeñez/fragilidad.
- source_word: ὡς ῥίζα ἐν γῇ διψώσῃ
  english_pob_choice: like a root in thirsty ground
  chosen_spanish: como una raíz en tierra sedienta
  alternatives_spanish:
  - como una raíz en suelo sediento
  - como una raíz en tierra seca
  lexicon: ῥίζα; διψάω
  rationale: «Tierra sedienta» traduce bien la personificación de la tierra que «tiene sed» y mantiene el paralelismo poético.
- source_word: οὐκ ἔστιν εἶδος αὐτῷ οὐδὲ δόξα
  english_pob_choice: He has no form nor glory
  chosen_spanish: No tiene forma ni gloria
  alternatives_spanish:
  - No tiene apariencia ni gloria
  - No tiene forma ni esplendor
  lexicon: εἶδος; δόξα
  rationale: «Forma» conserva la concreción del término griego y «gloria» mantiene el campo semántico de δόξα sin desplazarlo hacia «esplendor» necesariamente.
- source_word: οὐκ εἶχεν εἶδος οὐδὲ κάλλος
  english_pob_choice: he had neither form nor beauty
  chosen_spanish: no tenía forma ni belleza
  alternatives_spanish:
  - no tenía apariencia ni belleza
  - no tenía forma ni hermosura
  lexicon: εἶδος; κάλλος
  rationale: «Belleza» es la equivalencia directa y clara para κάλλος.
- source_word: τὸ εἶδος αὐτοῦ ἄτιμον
  english_pob_choice: his appearance was dishonored
  chosen_spanish: su apariencia fue deshonrada
  alternatives_spanish:
  - su aspecto fue deshonrado
  - su apariencia fue despreciada
  lexicon: εἶδος; ἄτιμος
  rationale: «Deshonrada» reproduce bien ἄτιμον y preserva la idea de pérdida de honor más que simple fealdad.
- source_word: ἐκλεῖπον παρὰ τὸ εἶδος τῶν ἀνθρώπων
  english_pob_choice: lacking beyond the appearance of men
  chosen_spanish: quedando por debajo de la apariencia de los hombres[b]
  alternatives_spanish:
  - quedando por debajo de la apariencia humana
  - siendo inferior a la apariencia de los hombres
  lexicon: ἐκλείπω; παρά; εἶδος; ἄνθρωπος
  rationale: La revisión auditada favorece la idea de «quedar por debajo de / ser inferior a» en sentido comparativo. «Quedando por debajo» comunica la comparación en español sin la rareza de un calco como «faltando más allá de».
- source_word: ἄνθρωπος ἐν πληγῇ ὢν καὶ πόνῳ
  english_pob_choice: a man being in affliction and toil
  chosen_spanish: un hombre en sufrimiento y trabajo
  alternatives_spanish:
  - un hombre en aflicción y trabajo
  - un hombre en dolor y fatiga
  lexicon: ἄνθρωπος; πληγή; πόνος
  rationale: Sigo la corrección auditada que evita «plaga». «Sufrimiento» recoge el sentido contextual de πληγή en este eco de Isaías; «trabajo» mantiene πόνος como esfuerzo/fatiga.
- source_word: εἰδὼς φέρειν μαλακίαν
  english_pob_choice: knowing how to bear weakness
  chosen_spanish: y que sabe llevar la debilidad
  alternatives_spanish:
  - y sabiendo soportar la debilidad
  - y que sabe soportar la debilidad
  lexicon: οἶδα; φέρω; μαλακία
  rationale: «Sabe llevar» suena natural en español y conserva la idea de capacidad para soportar. «Debilidad» es adecuada para μαλακία en este contexto.
- source_word: ὅτι ἀπέστραπται τὸ πρόσωπον αὐτοῦ
  english_pob_choice: because his face is turned away
  chosen_spanish: porque su rostro está apartado
  alternatives_spanish:
  - porque su rostro se ha apartado
  - porque su rostro ha sido desviado
  lexicon: ἀποστρέφω; πρόσωπον
  rationale: «Está apartado» mantiene el sentido pasivo/resultado sin introducir una forma demasiado literal o extraña. La frase retiene la imagen del rostro vuelto lejos.
- source_word: ἠτιμάσθη καὶ οὐκ ἐλογίσθη
  english_pob_choice: he was dishonored and not esteemed
  chosen_spanish: fue deshonrado y no estimado
  alternatives_spanish:
  - fue deshonrado y no fue contado
  - fue deshonrado y no considerado
  lexicon: ἀτιμάζω; λογίζομαι
  rationale: «No estimado» es la correspondencia más natural en español para la idea de no ser tenido en cuenta/considerado con honor.
theological_decisions:
- issue: Título cristológico Χριστός en un texto extra-canónico temprano
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesús el Mesías
  rationale: La política POB documentada prefiere «Mesías» para Χριστός cuando el término funciona como título. Esto conserva la transparencia del trasfondo judío del texto y evita una lectura automática de nombre propio fijo donde el griego funciona todavía como título.
  doctrine_reference: Cristología; uso titular de Χριστός
- issue: Referencia al divino nombre en τῆς μεγαλωσύνης τοῦ θεοῦ
  english_pob_reading: the majesty of God
  chosen_spanish_reading: la majestad de Dios
  alternative_spanish_readings:
  - la majestad de Yahvé
  rationale: No hay un YHWH explícito aquí, así que no se introduce «Yahvé» por inferencia. Mantener «Dios» sigue el griego y evita sobreespecificar la referencia.
  doctrine_reference: Teología bíblica del nombre divino; respeto del alcance del texto base
- issue: Imágenes de Isaías 53 y el sentido de πληγή
  english_pob_reading: a man being in affliction and toil
  chosen_spanish_reading: un hombre en sufrimiento y trabajo
  alternative_spanish_readings:
  - un hombre en aflicción y fatiga
  - un hombre en dolor y trabajo
  rationale: El contexto citacional de Isaías 53 favorece un valor de aflicción/sufrimiento, no «plaga» en sentido moderno. La traducción conserva la fuerza del siervo sufriente sin distorsión epidemiológica.
  doctrine_reference: Tipología del Siervo Sufriente; semántica contextual
translation_notes:
  revision_awareness: 'He incorporado las revisiones auditablemente registradas: ἐκλεῖπον παρὰ τὸ εἶδος τῶν ἀνθρώπων se entiende comparativamente como inferioridad («quedando por debajo»), πληγή en este contexto se traduce por «sufrimiento» y no «plaga», y ἀνηγγείλαμεν se vierte sin añadir un objeto directo inexistente en el griego. También reflejé la revisión final que reemplaza «Cristo» por «Mesías».'
  spanish_consistency_notes:
  - Mantengo «Mesías» para Χριστός, de acuerdo con la convención POB en contextos titulares.
  - Uso «Dios» para θεός y no introduzco «Yahvé» donde el texto griego no contiene explícitamente el nombre divino.
  - Conservo el registro solemne del pasaje con sintaxis clara y poética, evitando arcaísmos innecesarios.
  - He usado notas solo donde el texto español abre una alternativa real o donde la revisión auditada introduce una decisión semántica importante.
