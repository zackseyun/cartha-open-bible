translation:
  language: es
  text: Vean, hombres amados, cuál es el modelo[a] que se nos ha dado. Porque si el Señor se humilló así, ¿qué debemos hacer nosotros, que por medio de él hemos llegado a estar bajo el yugo de su gracia?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Modelo» traduce el sentido normativo de ὑπογραμμὸς; también puede entenderse como «patrón» o «ejemplo». Otra posibilidad de traducción para la primera cláusula es: «Ustedes ven, hombres amados, cuál es el modelo que se nos ha dado».'
    reason: lexical_alternative_and_previous_rendering
lexical_decisions:
- source_word: Ὁρᾶτε
  english_pob_choice: See
  chosen_spanish: Vean
  alternatives_spanish:
  - Miren
  - Vean ustedes
  lexicon: ὁράω
  rationale: 'El griego está en imperativo presente plural y funciona exhortativamente. «Vean» conserva mejor la fuerza directiva que un indicativo como «Ustedes ven». '
- source_word: ἄνδρες ἀγαπητοί
  english_pob_choice: beloved men
  chosen_spanish: hombres amados
  alternatives_spanish:
  - amados hermanos
  - varones amados
  lexicon: ἀνήρ
  rationale: «Hombres» mantiene el valor literal de ἄνδρες y evita suavizarlo indebidamente; «amados» transmite ἀγαπητοί con un registro natural y reverente en español.
- source_word: ὑπογραμμὸς
  english_pob_choice: pattern
  chosen_spanish: modelo
  alternatives_spanish:
  - patrón
  - ejemplo
  lexicon: ὑπογραμμός
  rationale: El término puede referirse a una pauta o modelo a seguir. «Modelo» suena natural en español y conserva la idea normativa sin reducirla solo a un ejemplo descriptivo.
- source_word: δεδομένoς ἡμῖν
  english_pob_choice: given to us
  chosen_spanish: que se nos ha dado
  alternatives_spanish:
  - dado a nosotros
  - entregado a nosotros
  lexicon: δίδωμι
  rationale: La pasiva perifrástica española expresa bien el estado resultante del don y evita la dureza de un participio literal.
- source_word: ἐταπεινοφρόνησεν
  english_pob_choice: humbled himself
  chosen_spanish: se humilló
  alternatives_spanish:
  - se hizo humilde
  - se abajó
  lexicon: ταπεινοφρονέω
  rationale: «Se humilló» es la correspondencia más directa y transparente para el verbo, sin añadir matices que el griego no exige aquí.
- source_word: ὑπὸ τὸν ζυγὸν
  english_pob_choice: under the yoke
  chosen_spanish: bajo el yugo
  alternatives_spanish:
  - bajo el yugo de
  - sometidos al yugo
  lexicon: ζυγός
  rationale: La imagen agrícola de subordinación se conserva literalmente porque es central en la frase y en la metáfora de sumisión benevolente.
- source_word: τῆς χάριτος αὐτοῦ
  english_pob_choice: of his grace
  chosen_spanish: de su gracia
  alternatives_spanish:
  - de su favor
  - de su benevolencia
  lexicon: χάρις
  rationale: «Gracia» es el término teológico estándar y fiel al sentido del texto, que presenta la relación como una gracia bajo la cual se entra.
- source_word: δι’ αὐτοῦ ἐλθόντες
  english_pob_choice: through him have come
  chosen_spanish: por medio de él hemos venido
  alternatives_spanish:
  - hemos llegado por él
  - por él hemos entrado
  lexicon: διά + genitivo; ἔρχομαι
  rationale: «Por medio de él hemos venido» conserva la mediación personal del griego y el movimiento de acceso implicado por ἐλθόντες. La alternativa «hemos llegado» sería más idiomática, pero menos cercana a la forma verbal.
theological_decisions:
- issue: El referente de ὁ κύριος y su traducción en un texto que puede aludir al Señor exaltado sin eludir el uso de κύριος.
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Jesús
  - el Señor exaltado
  rationale: El pasaje habla de la humillación del Señor y el contexto cristológico permite mantener «el Señor» sin añadir una identificación que el griego no explicita en esta cláusula.
  doctrine_reference: Cristología; uso reverente de κύριος en textos cristianos primitivos
- issue: La expresión «yugo de su gracia» puede sonar extraña en español, pero la metáfora debe preservarse.
  english_pob_reading: the yoke of his grace
  chosen_spanish_reading: el yugo de su gracia
  alternative_spanish_readings:
  - la carga de su gracia
  - la disciplina de su gracia
  rationale: Se mantiene la imagen de yugo porque es parte integral de la exhortación y no debe ser domesticada. En español, «yugo de su gracia» conserva la tensión entre sometimiento e inmerecido favor.
  doctrine_reference: Soteriología; disciplina y señorío de la gracia
translation_notes:
  revision_awareness: La revisión reciente corrigió la fuerza de Ὁρᾶτε, pasando de una lectura indicativa a una exhortativa. La versión española adopta explícitamente el imperativo plural «Vean» para reflejar ese ajuste y mantiene la estructura retórica del original. No se introducen cambios adicionales donde el consenso de revisión es alto y no hay variantes textuales relevantes.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica porque el texto griego usa κύριος.
  - Se evita «Cristo» porque el texto fuente no lo dice en esta cláusula.
  - Se mantiene «gracia» y «yugo» como términos teológicos/metafóricos estables, sin sustituirlos por equivalentes explicativos más libres.
  - El registro es eclesial pero contemporáneo; «hombres amados» conserva la literalidad de ἄνδρες sin caer en formulaciones demasiado modernas que diluyan el vocativo.
