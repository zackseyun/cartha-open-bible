id: 1CLEM.16.12
reference: 1 Clement 16:12
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ κύριος βούλεται ἀφελεῖν ἀπὸ τοῦ πόνου τῆς ψυχῆς αὐτοῦ, δεῖξαι αὐτῷ φῶς καὶ πλάσαι τῇ συνέσει, δικαιῶσαι δίκαιον εὖ δουλεύοντα πολλοῖς· καὶ τὰς ἁμαρτίας αὐτῶν αὐτὸς ἀνοίσει.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/016/012.yaml
  text: 'And the Lord wills to remove the anguish of his soul,

    to show him light and to form him with understanding,

    to justify the righteous one who serves many well;

    and he himself will bear their sins[a].'
  footnotes:
  - marker: a
    text: Or 'who serves well many'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:53Z'
    unchanged: false
    changes_summary: Changed 'take away from the toil' to 'remove the anguish' for a more natural and accurate rendering of ἀφελεῖν ἀπὸ τοῦ πόνου; changed 'a righteous one' to 'the righteous one' to reflect the anarthrous singular used generically/titularly in context. Other wording retained.
translation:
  language: es
  text: 'Y el Señor quiere quitar la angustia de su alma,


    mostrarle luz y formarlo con entendimiento,


    justificar al justo que sirve bien a muchos[a];


    y él mismo llevará sus pecados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que sirve a muchos bien».'
    reason: preservar la alternativa de orden documentada en el POB inglés para εὖ δουλεύοντα πολλοῖς
lexical_decisions:
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος
  rationale: En este pasaje del Testamento de Clemente, la forma griega κύριος refleja el título/denominación del texto fuente y el POB inglés mantiene 'the Lord'. En español, 'el Señor' es la correspondencia natural y fiel para este uso sin forzar la convención de sustituirlo por 'Yahvé' cuando el propio texto griego no expone explícitamente el nombre hebreo.
- source_word: ἀφελεῖν ἀπὸ τοῦ πόνου τῆς ψυχῆς αὐτοῦ
  english_pob_choice: to remove the anguish of his soul
  chosen_spanish: quitar la angustia de su alma
  alternatives_spanish:
  - remover el dolor de su alma
  - alejar de su alma la angustia
  lexicon: ἀφαιρέω; πόνος; ψυχή
  rationale: '''Angustia'' expresa bien el sentido de ''pain/anguish'' en español bíblico moderno y evita el calco ''trabajo'' o ''fatiga''. ''Quitar'' conserva el valor de ἀφελεῖν como retirar/eliminar algo de alguien, y ''de su alma'' mantiene ψυχή como el interior personal, no solo ''vida''.'
- source_word: δεῖξαι αὐτῷ φῶς
  english_pob_choice: to show him light
  chosen_spanish: mostrarle luz
  alternatives_spanish:
  - hacerle ver la luz
  - mostrarle la luz
  lexicon: δείκνυμι; φῶς
  rationale: '''Mostrarle luz'' reproduce la estructura breve del griego y la elección inglesa, sin ampliar el objeto con un artículo que podría sugerir una referencia distinta. ''Luz'' mantiene el valor simbólico de revelación, guía y restauración.'
- source_word: καὶ πλάσαι τῇ συνέσει
  english_pob_choice: and to form him with understanding
  chosen_spanish: y formarlo con entendimiento
  alternatives_spanish:
  - y moldearlo con entendimiento
  - y formarlo por medio del entendimiento
  lexicon: πλάσσω; σύνεσις
  rationale: '''Formarlo'' conserva el sentido de modelar/dar forma que tiene πλάσαι. ''Con entendimiento'' sigue de cerca τῇ συνέσει y su valor de discernimiento/insight, preferido aquí sobre ''inteligencia'' por su tono más bíblico y relacional.'
- source_word: δικαιῶσαι δίκαιον
  english_pob_choice: to justify the righteous one
  chosen_spanish: justificar al justo
  alternatives_spanish:
  - vindicar al justo
  - declarar justo al justo
  lexicon: δικαιόω; δίκαιος
  rationale: '''Justificar'' es la correspondencia directa de δικαιῶσαι, y ''al justo'' expresa δίκαιον de modo natural en español. Aunque ''vindicar'' es posible, ''justificar'' conserva mejor la conexión técnico-bíblica del verbo sin añadir matiz forense no explícito en el contexto.'
- source_word: εὖ δουλεύοντα πολλοῖς
  english_pob_choice: who serves many well
  chosen_spanish: que sirve bien a muchos
  alternatives_spanish:
  - que sirve a muchos bien
  - que sirve a muchos con excelencia
  lexicon: δουλεύω; πολλοί; εὖ
  rationale: Se mantiene el orden natural del español 'sirve bien a muchos', alineado con la revisión inglesa que corrigió el orden a 'who serves many well'. 'Sirve' conserva el verbo de servicio sin introducir 'siervo' o 'esclavo', porque aquí el contexto es participial y funcional más que nominal.
- source_word: καὶ τὰς ἁμαρτίας αὐτῶν αὐτὸς ἀνοίσει
  english_pob_choice: and he himself will bear their sins
  chosen_spanish: y él mismo llevará sus pecados
  alternatives_spanish:
  - y él mismo cargará con sus pecados
  - y él mismo soportará sus pecados
  lexicon: ἀναφέρω; ἁμαρτία
  rationale: '''Llevará'' reproduce el valor sacrificial/portador de ἀνοίσει dentro de un español claro y sobrio. ''Pecados'' traduce ἁμαρτίας de manera directa; el posesivo ''sus'' conserva la referencia de la versión inglesa y puede entenderse colectivamente, tal como en el contexto del texto.'
theological_decisions:
- issue: Titulatura divina de κύριος en una obra griega cristiana antigua
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto suele usar 'Yahvé' para יהוה, aquí la fuente inmediata es κύριος en un texto griego patrístico, y el POB inglés no documenta una reasignación al nombre divino hebreo. Por fidelidad al testimonio griego y al audit trail inglés, se mantiene 'el Señor'.
  doctrine_reference: Uso cristológico/teológico del título κύριος en literatura patrística; no se trata de una cita directa del tetragrámaton en este verso.
- issue: Justificación del 'justo' en singular genérico o titular
  english_pob_reading: the righteous one
  chosen_spanish_reading: al justo
  alternative_spanish_readings:
  - a un justo
  - al hombre justo
  rationale: La revisión inglesa cambió de 'a righteous one' a 'the righteous one' para reflejar mejor el singular anarthrous del griego con valor genérico/titular. En español, 'al justo' conserva esa ambigüedad sin añadir indefinición innecesaria; suena natural y mantiene la posible fuerza ejemplar o representativa del término.
  doctrine_reference: Justicia/rectitud como cualidad de la persona justa en lenguaje bíblico; no requiere una identificación dogmática adicional en esta línea.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que ajustó 'remove the anguish of his soul' y 'the righteous one who serves many well'. La presente versión española sigue esa última lectura, conservando la estructura paralela del original griego y manteniendo el orden natural del español en 'sirve bien a muchos'.
  spanish_consistency_notes:
  - Se mantiene 'el Señor' para κύριος en concordancia con la fuente griega inmediata; no se usa 'Yahvé' porque aquí no hay un tetragrámaton hebreo explícito.
  - Se conserva 'justo' y 'justificar' para la familia δικαι- sin sustituirla por giros interpretativos.
  - Se evita 'esclavo' porque el verbo δουλεύω aquí funciona verbalmente en sentido de servicio; 'sirve' preserva el paralelismo y la claridad.
  - La nota al pie se coloca solo en la frase con posible inversión de orden entre 'bien' y 'muchos', que fue la única alternativa textual destacada en el audit trail.
