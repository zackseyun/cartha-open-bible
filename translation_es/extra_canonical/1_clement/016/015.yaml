source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ πάλιν αὐτὸς φησίν· Ἐγὼ δὲ εἰμι σκώληξ καὶ οὐκ ἄνθρωπος, ὄνειδος ἀνθρώπων καὶ ἐξουθένημα λαοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/016/015.yaml
  text: 'And again he himself says,

    “But I am a worm and not a man,

    a reproach of men and despised by the people[a].'
  footnotes:
  - marker: a
    text: Or 'despised by the people'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:52Z'
    unchanged: false
    changes_summary: Revised the final clause from 'the scorn of the people' to 'despised by the people' to more directly reflect ἐξουθένημα λαοῦ. Also changed 'a man' to 'man' for more natural formal English.
translation:
  language: es
  text: 'Y otra vez él mismo dice:


    «Pero yo soy un gusano y no un hombre,

    objeto de oprobio[a] para los hombres y desprecio del pueblo.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «objeto de desprecio».
    reason: alternative_reading
lexical_decisions:
- source_word: σκώληξ
  english_pob_choice: worm
  chosen_spanish: gusano
  alternatives_spanish:
  - lombriz
  - gusano de tierra
  lexicon: σκώληξ
  rationale: El griego designa literalmente un gusano; «gusano» es la equivalencia directa y natural en español, sin suavizar la humillación del texto.
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - persona
  lexicon: ἄνθρωπος
  rationale: La construcción negativa «no un hombre» se conserva con «no un hombre», que reproduce bien el contraste poético y la fuerza antropológica del original.
- source_word: ὄνειδος
  english_pob_choice: a reproach of men
  chosen_spanish: objeto de oprobio
  alternatives_spanish:
  - reproche de los hombres
  - vergüenza de los hombres
  - afrenta de los hombres
  lexicon: ὄνειδος
  rationale: ὄνειδος funciona como sustantivo predicativo; «objeto de oprobio» conserva la idea de deshonra/afrenta y mantiene el paralelo nominal con el miembro siguiente.
- source_word: ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: para los hombres
  alternatives_spanish:
  - de los hombres
  - ante los hombres
  lexicon: ἀνθρώπων
  rationale: Aunque «de los hombres» es más literal, «para los hombres» en español expresa con más naturalidad la relación de vergüenza/afrenta dirigida hacia ellos, sin perder el sentido relacional del genitivo.
- source_word: ἐξουθένημα
  english_pob_choice: despised
  chosen_spanish: desprecio
  alternatives_spanish:
  - objeto de desprecio
  - desechado
  - menosprecio
  lexicon: ἐξουθένημα
  rationale: El audit trail inglés reconoce que el término es un sustantivo paralelo, no un participio. «Desprecio» preserva la forma nominal; al unirlo con «del pueblo» se mantiene el balance poético del griego.
- source_word: λαοῦ
  english_pob_choice: the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - del pueblo entero
  - de la gente
  lexicon: λαός
  rationale: «Pueblo» corresponde bien a λαός y mantiene el registro bíblico y colectivo del sustantivo.
theological_decisions:
- issue: Paralelismo nominal en la última línea
  english_pob_reading: despised by the people
  chosen_spanish_reading: desprecio del pueblo
  alternative_spanish_readings:
  - desprecio del pueblo
  - objeto de desprecio para el pueblo
  rationale: La revisión inglesa corrige el participio por un sustantivo para reflejar ἐξουθένημα. En español, «desprecio del pueblo» conserva ese valor nominal y el paralelismo con «objeto de oprobio».
  doctrine_reference: Poética bíblica / fidelidad retórica al texto fuente
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «the scorn of the people» a «despised by the people» para reflejar mejor el sustantivo ἐξουθένημα; la versión española sigue esa corrección manteniendo una construcción nominal. También se conservó el paralelismo entre ὄνειδος y ἐξουθένημα.
  spanish_consistency_notes:
  - Se mantuvo «Y otra vez él mismo dice» para reflejar καὶ πάλιν αὐτὸς φησίν sin sobretraducir.
  - Se preservó el tono de cita poética con comillas españolas y salto de línea.
  - No se usó «Cristo» ni terminología cristológica, porque el pasaje es una cita descriptiva sin ese término explícito.
  - La nota [a] está anclada exactamente en «oprobio[a]» y ofrece la alternativa nominal pertinente.
