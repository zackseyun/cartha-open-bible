source:
  edition: Funk 1901 (normalized OCR)
  text: αὐτὸς δὲ ἐτραυματίσθη διὰ τὰς ἁμαρτίας ἡμῶν καὶ μεμαλάκισται διὰ τὰς ἀνομίας ἡμῶν. παιδεία εἰρήνης ἡμῶν ἐπ’ αὐτόν· τῷ μώλωπι αὐτοῦ ἡμεῖς ἰάθημεν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/016/005.yaml
  text: 'But he was wounded because of our sins

    and was afflicted because of our lawless deeds.

    The chastisement of our peace was upon him;

    by his bruise we were healed.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:50Z'
    unchanged: false
    changes_summary: Changed 'has been weakened' to 'was afflicted' to better reflect μεμαλάκισται in this context and to keep the tense/aspect more natural and parallel with the surrounding clauses. Kept the rest unchanged.
translation:
  language: es
  text: 'Pero él fue herido a causa de nuestros pecados;

    y fue afligido a causa de nuestras iniquidades.

    El castigo de nuestra paz estuvo sobre él;

    por su herida fuimos sanados.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐτραυματίσθη
  english_pob_choice: was wounded
  chosen_spanish: fue herido
  alternatives_spanish:
  - fue lastimado
  - fue lesionado
  lexicon: τραυματίζω
  rationale: Herido reproduce bien el valor pasivo de la forma verbal y mantiene el paralelismo bíblico sin sonar arcaico en español.
- source_word: διὰ τὰς ἁμαρτίας ἡμῶν
  english_pob_choice: because of our sins
  chosen_spanish: por causa de nuestros pecados
  alternatives_spanish:
  - a causa de nuestros pecados
  - por nuestros pecados
  lexicon: ἁμαρτία
  rationale: Por causa de expresa de modo claro la relación causal sin convertirla en mera agencia ni suavizar el motivo del padecimiento.
- source_word: μεμαλάκισται
  english_pob_choice: was afflicted
  chosen_spanish: fue afligido
  alternatives_spanish:
  - fue debilitado
  - fue abatido
  lexicon: μαλακίζω
  rationale: La revisión inglesa decidió 'was afflicted' para reflejar mejor el contexto; afligido conserva el pasivo y el tono sufrido sin imponer una interpretación médica excesiva.
- source_word: ἀνομίας
  english_pob_choice: lawless deeds
  chosen_spanish: iniquidades
  alternatives_spanish:
  - actos de iniquidad
  - hechos de maldad
  - faltas contra la ley
  lexicon: ἀνομία
  rationale: Iniquidades comunica la culpa moral y legal implícita en ἀνομία de manera natural en español, aunque es menos literal que 'sin ley'.},{
theological_decisions:
- issue: La relación causal del sufrimiento del siervo con los pecados e iniquidades del pueblo
  english_pob_reading: because of our sins / because of our lawless deeds
  chosen_spanish_reading: por causa de nuestros pecados / por causa de nuestras iniquidades
  alternative_spanish_readings:
  - a causa de nuestros pecados / a causa de nuestras iniquidades
  - por nuestros pecados / por nuestras iniquidades
  rationale: El texto conserva la causalidad explícita del griego sin reemplazarla por una lectura más vaga de simple correspondencia temática.
  doctrine_reference: Isaías 53:5; 1 Pedro 2:24
- issue: El sentido de παιδεία εἰρήνης ἡμῶν
  english_pob_reading: The chastisement of our peace
  chosen_spanish_reading: El castigo de nuestra paz
  alternative_spanish_readings:
  - La disciplina de nuestra paz
  - El castigo para nuestra paz
  rationale: 'Se mantiene la tensión expresiva del sintagma original: παιδεία puede implicar castigo o disciplina, y el genitivo ''de nuestra paz'' se conserva sin explicarlo demasiado para no borrar la ambigüedad teológica.'
  doctrine_reference: Isaías 53:5
- issue: τῷ μώλωπι αὐτοῦ
  english_pob_reading: by his bruise
  chosen_spanish_reading: por su herida
  alternative_spanish_readings:
  - por su contusión
  - por su magulladura
  rationale: Herida es idiomático y suficientemente amplio para μώλωψ, preservando la idea de una marca sufrida sin sobreespecificar el tipo de lesión.
  doctrine_reference: Isaías 53:5
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que corrigió la traducción de μεμαλάκισται de 'has been weakened' a 'was afflicted'; por eso el español usa 'fue afligido' para mantener el tiempo y la paralelidad del pasaje.
  spanish_consistency_notes:
  - Se mantuvo un registro solemne y bíblico sin depender de fórmulas eclesiásticas tradicionales que no aparecen en el griego.
  - No se usó 'Cristo' ni 'SEÑOR' porque este pasaje del 1 Clemente cita la profecía con lenguaje descriptivo y no requiere esas sustituciones.
  - Se conservó la secuencia de cuatro cláusulas con paralelismo claro para reflejar la cadencia del original griego.
