revisions:
- from: 'Pero él fue herido por causa de nuestros pecados


    y fue afligido por causa de nuestras iniquidades.


    El castigo de nuestra paz cayó sobre él;


    por su herida fuimos sanados.'
  to: 'Pero él fue herido a causa de nuestros pecados;

    y fue afligido a causa de nuestras iniquidades.

    El castigo de nuestra paz estuvo sobre él;

    por su herida fuimos sanados.'
  rationale: Se corrige «cayó sobre él» a «estuvo sobre él» para evitar añadir un verbo no expresado en el griego. También se aligera la repetición con «a causa de», manteniendo la fuerza causal del original. No se requieren notas adicionales.
  reviewer_model: gpt-5.4
