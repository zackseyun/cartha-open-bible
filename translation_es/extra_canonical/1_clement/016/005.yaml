review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y la traducción inglesa auditada: ἐτραυματίσθη = «fue herido», μεμαλάκισται = «fue afligido», y la estructura causal con διὰ se preserva bien. También mantiene la formulación compacta de παιδεία εἰρήνης ἡμῶν y el resultado sanador de τῷ μώλωπι αὐτοῦ ἡμεῖς ἰάθημεν. Sin embargo, «cayó sobre él» no corresponde al texto, que solo dice «sobre él»; conviene mantener una cópula explícita en español para no introducir un verbo ausente.'
  spanish_quality_summary: El español es claro, digno y legible. «Por causa de» es correcto, aunque algo pesado en repetición; puede simplificarse a «a causa de» sin pérdida. El principal ajuste de estilo y fidelidad es cambiar «cayó sobre él» por «estuvo sobre él», que suena natural y evita añadir dinamismo no expresado en el griego.
  glossary_alignment: No hay términos del glosario principal en conflicto. «Pecados», «iniquidades», «afligido» y «sanados» son adecuados. «Castigo» para παιδεία es defendible en este contexto. «Herida» para μώλωψ es aceptable e idiomático, aunque menos específico que «moretón/contusión»; no requiere nota.
  issues:
  - severity: medium
    issue: «cayó sobre él» añade un verbo dinámico no presente en el griego
    rationale: παιδεία εἰρήνης ἡμῶν ἐπ’ αὐτόν corresponde más literalmente a «el castigo de nuestra paz estuvo/sobre él», no a «cayó sobre él». La redacción actual introduce una imagen de descenso o impacto que el original no explicita.
  - severity: low
    issue: Repetición de «por causa de» en dos líneas consecutivas
    rationale: Es fiel, pero algo pesada en español poético. «A causa de» fluye mejor y conserva la causalidad explícita del griego y del POB inglés.
  revised_spanish_text: 'Pero él fue herido a causa de nuestros pecados;

    y fue afligido a causa de nuestras iniquidades.

    El castigo de nuestra paz estuvo sobre él;

    por su herida fuimos sanados.'
  revision_rationale: Se corrige «cayó sobre él» a «estuvo sobre él» para evitar añadir un verbo no expresado en el griego. También se aligera la repetición con «a causa de», manteniendo la fuerza causal del original. No se requieren notas adicionales.
