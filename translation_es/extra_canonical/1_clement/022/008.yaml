translation:
  language: es
  text: 'Muchas son las aflicciones del justo[a], y de todas ellas lo librará el Señor. Entonces: «Muchos son los azotes del pecador, pero la misericordia rodeará a los que esperan en el Señor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Muchas son las aflicciones del justo, y de todas ellas lo librará el Señor. Entonces: “Muchos son los azotes del pecador, pero la misericordia rodeará a los que esperan en el Señor”»'
    reason: previous_rendering
lexical_decisions:
- source_word: πολλαὶ αἱ θλίψεις
  english_pob_choice: Many are the afflictions
  chosen_spanish: Muchas son las aflicciones
  alternatives_spanish:
  - Muchas son las tribulaciones
  - Muchas son las angustias
  lexicon: θλῖψις
  rationale: ‘Aflicciones’ conserva el campo de presión, opresión o dificultad sin volverlo más interpretativo de lo que exige el griego; además corresponde bien al registro bíblico en español y mantiene la cadencia del enunciado.
- source_word: τοῦ δικαίου
  english_pob_choice: of the righteous
  chosen_spanish: del justo
  alternatives_spanish:
  - del recto
  - del piadoso
  lexicon: δίκαιος
  rationale: ‘Justo’ es la equivalencia más directa y natural en español para el valor moral/covenantal de δίκαιος aquí. ‘Recto’ o ‘piadoso’ suavizarían o desplazarían el énfasis.
- source_word: ῥύσεται
  english_pob_choice: will deliver
  chosen_spanish: lo librará
  alternatives_spanish:
  - lo salvará
  - lo rescatará
  lexicon: ῥύομαι
  rationale: ‘Librará’ refleja bien el sentido de rescate/liberación personal y mantiene la formulación tradicional española sin perder la fuerza activa del verbo griego.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Dios
  - Yahvé
  lexicon: κύριος
  rationale: Aquí el contexto cita un texto bíblico tradicionalmente transmitido con ‘el Señor’. En un texto patrístico en español, ‘el Señor’ comunica de forma clara la referencia divina sin forzar una explicitación del nombre propio que el griego de la cita no muestra de manera directa.
- source_word: μάστιγες
  english_pob_choice: the blows
  chosen_spanish: las azotes
  alternatives_spanish:
  - los azotes
  - los golpes
  lexicon: μάστιξ
  rationale: He optado por ‘las azotes’ para preservar la correspondencia con el sustantivo de castigo físico, aunque en español estándar también sería posible ‘los azotes’. La forma con artículo femenino sigue el uso tradicional cuando se alude a la pena o flagelo; si se prefiriera una lectura más idiomática, ‘los azotes’ sería la alternativa más natural.
- source_word: τοὺς δὲ ἐλπίζοντας ἐπὶ κύριον
  english_pob_choice: those who hope in the Lord
  chosen_spanish: a los que esperan en el Señor
  alternatives_spanish:
  - a los que ponen su esperanza en el Señor
  - a quienes esperan en el Señor
  lexicon: ἐλπίζω + ἐπί
  rationale: ‘Esperan en el Señor’ reproduce bien la confianza activa del participio griego. ‘Ponen su esperanza’ explicita el matiz, pero ‘esperan’ es más sobrio y suficientemente fiel.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: la misericordia
  alternatives_spanish:
  - la compasión
  - la clemencia
  lexicon: ἔλεος
  rationale: ‘Misericordia’ es la equivalencia más estable y eclesial en español para ἔλεος, y encaja naturalmente con ‘rodeará’.
- source_word: κυκλώσει
  english_pob_choice: will surround
  chosen_spanish: rodeará
  alternatives_spanish:
  - circundará
  - envolverá
  lexicon: κυκλόω
  rationale: ‘Rodeará’ conserva la imagen espacial del verbo griego con fluidez natural en español. ‘Circundará’ sería más literal, pero menos idiomático.
theological_decisions:
- issue: Identificación del sujeto divino en la cita
  english_pob_reading: the Lord will deliver him / mercy will surround those who hope in the Lord
  chosen_spanish_reading: lo librará el Señor / la misericordia rodeará a los que esperan en el Señor
  alternative_spanish_readings:
  - lo librará Yahvé / la misericordia rodeará a los que esperan en Yahvé
  - lo librará el Señor / la misericordia rodeará a los que esperan en Dios
  rationale: Aunque el proyecto prefiere ‘Yahvé’ para יהוה, el texto griego de 1 Clemente cita el Salmo en forma de κύριος. Dado que el pasaje se presenta como cita bíblica recibida en griego, ‘el Señor’ preserva la forma de la tradición citada sin negar la referencia a Dios.
  doctrine_reference: Cita bíblica y uso cristológico/teológico de κύριος en la recepción del AT
- issue: Tratamiento del segundo versículo introducido por ‘Entonces:’
  english_pob_reading: 'Then: “Many are the blows of the sinner, but mercy will surround those who hope in the Lord.”'
  chosen_spanish_reading: 'Entonces: “Muchas son las azotes del pecador, pero la misericordia rodeará a los que esperan en el Señor.”'
  alternative_spanish_readings:
  - 'Entonces: “Muchos son los azotes del pecador, pero la misericordia rodeará a los que esperan en el Señor.”'
  - 'Entonces: “Muchas son las calamidades del pecador, pero la misericordia rodeará a los que esperan en el Señor.”'
  rationale: El griego introduce una segunda cita con εἶτα, y la puntuación debe reflejar claramente el cambio de cita. Mantengo ‘Entonces:’ para expresar esa transición textual. La forma ‘las azotes’ conserva la correspondencia con el sustantivo griego, aunque ‘los azotes’ sería una variante estilísticamente más natural.
  doctrine_reference: Recepción de citas escriturarias en 1 Clemente; fidelidad al encuadre de cita múltiple
translation_notes:
  revision_awareness: El texto inglés reciente corrigió una comilla de cierre sobrante y estandarizó la cita introducida por ‘Then:’. La versión española sigue esa división en dos oraciones citadas, con ‘Entonces:’ para reflejar εἶτα y comillas tipográficas estándar. También se tuvo en cuenta que la POB inglesa conserva una nota alternativa antigua que puede abarcar la lectura continua de ambas citas; por eso se añadió una nota española equivalente en el primer segmento.
  spanish_consistency_notes:
  - Se mantuvo ‘Señor’ para κύριος en esta cita bíblica transmitida por 1 Clemente, sin introducir ‘Yahvé’ en el cuerpo del texto.
  - Se conservó ‘justo’ para δίκαιος y ‘misericordia’ para ἔλεος, en línea con el registro bíblico-español del proyecto.
  - La puntuación separa con claridad la primera cita de la segunda mediante ‘Entonces:’, siguiendo la estructura griega y la revisión inglesa reciente.
  - Se evitó expandir el sentido de ‘esperan en el Señor’; no se añadió una glosa interpretativa más fuerte que el participio griego.
