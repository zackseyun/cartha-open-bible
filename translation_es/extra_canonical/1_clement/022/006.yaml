  - severity: medium
    issue: «sus oídos atentos a su súplica» carece de verbo explícito
    rationale: Aunque comprensible, la elipsis reduce la claridad y no refleja tan bien la estructura paralela del griego con verbo implícito/copulativo. «Sus oídos están atentos a su súplica» mejora la naturalidad.
  - severity: low
    issue: «el recuerdo de ellos» suena menos idiomático y menos preciso que «su memoria»
    rationale: μνημόσυνον en esta fórmula de juicio se vierte mejor como «memoria». La construcción posesiva simple es más natural en español y más cercana al inglés POB «their memory».
  revised_spanish_text: Los ojos de Yahvé están sobre los justos, y sus oídos están atentos a su súplica; pero el rostro de Yahvé está contra los que hacen el mal, para borrar de la tierra su memoria.
