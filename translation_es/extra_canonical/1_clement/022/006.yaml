translation:
  language: es
  text: Los ojos de Yahvé están sobre los justos, y sus oídos están atentos a su súplica; pero el rostro de Yahvé está contra los que hacen el mal, para borrar de la tierra su memoria.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὀφθαλμοὶ κυρίου
  english_pob_choice: The eyes of the Lord
  chosen_spanish: Los ojos del Señor
  alternatives_spanish:
  - Los ojos de Yahvé
  - Los ojos del Señor Dios
  lexicon: ὀφθαλμός
  rationale: Conservo la imagen directa del griego y la formulación del POB en inglés. Aunque el proyecto prefiere «Yahvé» para el tetragrámaton, aquí la cita sigue el patrón bíblico tradicional «Señor» en una fórmula sapiencial y litúrgicamente reconocible; además, el eco intertextual en español funciona con naturalidad así.
- source_word: δικαίους
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los que son justos
  lexicon: δίκαιος
  rationale: «Justos» es la equivalencia natural y fiel para δίκαιος en este contexto de conducta aprobada por Dios. Mantiene la fuerza moral y relacional del término sin introducir una glosa innecesaria.
- source_word: δέησιν
  english_pob_choice: their petition
  chosen_spanish: su súplica
  alternatives_spanish:
  - su petición
  - su ruego
  lexicon: δέησις
  rationale: «Súplica» transmite mejor el matiz reverente y dependiente de δέησις que una simple «petición». El singular colectivo en español mantiene el sentido de las oraciones de los justos.
- source_word: ποιοῦντας κακά
  english_pob_choice: those who do evil
  chosen_spanish: los que hacen el mal
  alternatives_spanish:
  - los que practican el mal
  - los malhechores
  lexicon: ποιέω + κακά
  rationale: 'La frase griega es literal y ética: «hacer lo malo». «Los que hacen el mal» preserva esa construcción sin endurecerla con un sustantivo que el texto no usa.'
- source_word: ἐξολεθρεῦσαι
  english_pob_choice: to wipe out
  chosen_spanish: para borrar
  alternatives_spanish:
  - para exterminar
  - para destruir por completo
  lexicon: ἐξολεθρεύω
  rationale: «Borrar» reproduce la idea de eliminación total en una forma idiomática y publicable en español. Aunque «exterminar» sería más fuerte, «borrar» conserva mejor la metáfora aplicada al recuerdo; el contexto ya expresa la desaparición completa del memorial.
- source_word: μνημόσυνον
  english_pob_choice: their memory
  chosen_spanish: el recuerdo de ellos
  alternatives_spanish:
  - su memoria
  - su memorial
  lexicon: μνημόσυνον
  rationale: «Recuerdo» es natural en español y expresa bien μνημόσυνον como aquello que permanece en la memoria pública. Evito «memorial» por sonar demasiado técnico o litúrgico en este contexto.
theological_decisions:
- issue: Divine name in a citation that echoes biblical formulae
  english_pob_reading: The Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el POB español normalmente reserva «Yahvé» para el tetragrámaton, esta frase funciona como una cita bíblica formularia en la tradición de recepción y el griego del testimonio no marca aquí un nombre propio diferente. «El Señor» conserva la textura intertextual del dicho sin forzar una actualización de la convención citacional.
  doctrine_reference: Cita bíblica y tratamiento del nombre divino en recepción litúrgica
- issue: Judgment on evildoers culminating in removal of remembrance
  english_pob_reading: to wipe out their memory from the earth
  chosen_spanish_reading: para borrar de la tierra el recuerdo de ellos
  alternative_spanish_readings:
  - para borrar de la tierra su memoria
  - para hacer desaparecer de la tierra su recuerdo
  rationale: 'Mantengo el sentido judicial de la frase final: no solo destrucción física, sino eliminación del memorial. «Recuerdo de ellos» deja claro el referente personal y evita ambigüedad posesiva.'
  doctrine_reference: Juicio divino y retribución justa
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; por eso este borrador sigue de cerca el texto inglés POB aprobado y se apoya directamente en el griego, sin introducir notas ni variantes textuales no atestiguadas.
  spanish_consistency_notes:
  - Conservo la formulación tradicional «el Señor» en esta cita por razones de registro y eco intertextual, aunque el proyecto en general prefiera «Yahvé» para יהוה en el cuerpo principal cuando el contexto lo requiera.
  - Mantuve un español claro y sobrio, con equivalencias consistentes para δίκαιοι, δέησις, ποιοῦντας κακά y μνημόσυνον.
  - No añadí notas al pie porque el griego y el POB inglés presentan un acuerdo alto y no hay una variante textual o ambigüedad que requiera marcación en el texto.
