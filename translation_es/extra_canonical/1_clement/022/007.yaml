translation:
  language: es
  text: El justo clamó, y Yahvé lo escuchó y lo libró de todas sus aflicciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ δίκαιος
  english_pob_choice: The righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el recto
  lexicon: δίκαιος
  rationale: El griego presenta un sustantivo/adjetivo substantivado que designa al justo en sentido moral y relacional. En español, «el justo» comunica bien el valor bíblico sin añadir «hombre», que no está explícito en el original.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Yahvé
  lexicon: κύριος
  rationale: En este contexto, κύριος reproduce la referencia al nombre divino del Salmo aludido/citado. Conforme al criterio del proyecto, se evita el enmascaramiento con «el Señor» y se expresa el nombre divino como «Yahvé».
- source_word: εἰσήκουσεν
  english_pob_choice: heard
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  - prestó oído a
  lexicon: εἰσακούω
  rationale: El verbo implica atender favorablemente a un clamor, no solo percibir sonido. «Escuchó» conserva esa atención personal en español sin volverla demasiado interpretativa.
- source_word: ἐῤῥύσατο
  english_pob_choice: delivered
  chosen_spanish: lo libró
  alternatives_spanish:
  - lo rescató
  - lo salvó
  lexicon: ῥύομαι
  rationale: El verbo expresa liberación efectiva de un peligro o aflicción. «Libró» mantiene el sentido de rescate/liberación en un registro bíblico natural.
- source_word: θλίψεων
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - angustias
  lexicon: θλῖψις
  rationale: «Aflicciones» reproduce con fidelidad el campo semántico de presión, opresión o sufrimiento, y coincide bien con el uso bíblico en español.
theological_decisions:
- issue: Referencia divina en κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: La cláusula corresponde a una cita bíblica donde κύριος funciona como sustituto de la referencia al nombre divino. Dado el estándar del proyecto, se hace explícito «Yahvé» en lugar de una sustitución reverencial.
  doctrine_reference: Nombre divino / fidelidad textual al referente del Tetragrámaton
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y ningún cambio necesario; este borrador sigue esa lectura sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de tres miembros del griego: clamor, escucha, liberación.'
  - «El justo» conserva el sustantivo en singular, como en el original.
  - No se añaden explicaciones interpretativas ni notas textuales porque el pasaje y el audit trail muestran acuerdo alto.
