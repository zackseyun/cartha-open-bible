- source_word: ποίησον ἀγαθόν
  english_pob_choice: do good
  chosen_spanish: haz el bien
  alternatives_spanish:
  - haz lo bueno
  - practica el bien
  lexicon: ἀγαθός
  rationale: «Haz el bien» reproduce de forma idiomática el imperativo de practicar lo bueno, sin perder el paralelismo con la primera mitad del verso.
