base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/022/001.yaml
  text: 'And faith in the Messiah confirms all these things. For he himself also, through the Holy Spirit, thus calls to us: “Come, children, listen to me; I will teach you the fear of the Lord. Who is the man who desires life, loving to see good days? Keep your tongue from evil, and your lips from speaking deceit. Turn away from evil and do good. Seek peace and pursue it. The eyes of the Lord are upon the righteous, and his ears are toward their petition; but the face of the Lord is against those who do evil, to wipe out their memory from the earth. The righteous cried out, and the Lord heard them and delivered them from all their afflictions.” Then: “Many are the afflictions of the righteous, and from all of them the Lord will deliver him. Many are the blows of the sinner, but mercy will surround those who hope in the Lord.”'
