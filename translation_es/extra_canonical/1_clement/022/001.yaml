translation:
  language: es
  text: 'Y la fe en el Mesías confirma todo esto. Porque él mismo también, por medio del Espíritu Santo, nos llama así: «Vengan, hijos, escúchenme; les enseñaré el temor de Yahvé. ¿Quién es el hombre que desea la vida, que ama ver días buenos? Aparta tu lengua del mal, y tus labios de hablar engaño. Apártate del mal y haz el bien. Busca la paz y persíguela. Los ojos de Yahvé están sobre los justos, y sus oídos atentos a su súplica; pero el rostro de Yahvé está contra los que hacen el mal, para borrar de la tierra su memoria. Los justos clamaron, y Yahvé los oyó y los libró de todas sus aflicciones». Luego: «Muchas son las aflicciones del justo, y de todas ellas Yahvé lo librará. Muchos son los golpes del pecador, pero la misericordia rodeará a los que esperan en Yahvé».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡ ἐν Χριστῷ πίστις
  english_pob_choice: faith in the Messiah
  chosen_spanish: la fe en el Mesías
  alternatives_spanish:
  - la fe del Mesías
  - la fidelidad del Mesías
  lexicon: BDAG / contexto auditado
  rationale: Mantiene la lectura más natural del sintagma como fe centrada en el Mesías, sin resolver indebidamente la posible tensión hacia fidelidad. Se traduce Χριστός como Mesías según la política del proyecto.
- source_word: βεβαιοῖ
  english_pob_choice: confirms
  chosen_spanish: confirma
  alternatives_spanish:
  - establece
  - hace firmes
  lexicon: LSJ
  rationale: Conserva el valor de fortalecer/ratificar, con verbo español directo y publicable.
- source_word: πνεύματος τοῦ ἁγίου
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el espíritu santo
  - por el Espíritu Santo
  lexicon: BDAG
  rationale: La mayúscula refleja el referente personal del Espíritu Santo en este contexto; se conserva la mediación instrumental con 'por medio de'.
- source_word: προσκαλεῖται
  english_pob_choice: calls to us
  chosen_spanish: nos llama
  alternatives_spanish:
  - nos invita
  - nos convoca
  lexicon: LSJ
  rationale: '''Nos llama'' conserva el tono directo de convocatoria exhortativa sin sobrecargarlo.'
- source_word: φόβον κυρίου
  english_pob_choice: the fear of the Lord
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor del Señor
  - la reverencia a Yahvé
  lexicon: BDAG
  rationale: Se mantiene la fórmula bíblica 'temor' por su densidad teológica; se usa Yahvé conforme a la terminología del proyecto para el nombre divino.
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: BDAG
  rationale: Se conserva el singular representativo y el tono bíblico del interrogante sapiencial.
- source_word: παῦσον
  english_pob_choice: Stop
  chosen_spanish: Detén
  alternatives_spanish:
  - Refrena
  - Aparta
  lexicon: LSJ
  rationale: Imperativo breve y natural en español, conservando el mandato de restringir la lengua.
- source_word: δόλον
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - fraude
  - astucia
  lexicon: BDAG
  rationale: '''Engaño'' es idiomático y mantiene la carga moral sin perder claridad.'
- source_word: ἔκκλινον
  english_pob_choice: Turn away
  chosen_spanish: Apártate
  alternatives_spanish:
  - Desvía tu camino
  - Aléjate
  lexicon: LSJ
  rationale: Expresa el giro moral decidido del verbo con naturalidad en español.
- source_word: ζήτησον εἰρήνην καὶ δίωξον αὐτήν
  english_pob_choice: Seek peace and pursue it
  chosen_spanish: Busca la paz y persíguela
  alternatives_spanish:
  - Procura la paz y síguela
  - Busca la paz y ve tras ella
  lexicon: BDAG
  rationale: Conserva la cadencia bíblica y el paralelismo de la exhortación.
- source_word: δέησιν
  english_pob_choice: petition
  chosen_spanish: petición
  alternatives_spanish:
  - súplica
  - ruego
  lexicon: BDAG
  rationale: '''Petición'' recoge el sentido de ruego dirigido y es claro en español contemporáneo.'
- source_word: τοῦ ἐξολεθρεῦσαι
  english_pob_choice: to wipe out
  chosen_spanish: para borrar
  alternatives_spanish:
  - para destruir por completo
  - para extirpar
  lexicon: LSJ
  rationale: Aquí 'borrar' reproduce bien la imagen de eliminar el recuerdo/memoria de la tierra sin sobrecargarla con una formulación más dura que el español puede interpretar de modo distinto.
- source_word: μνημόσυνον
  english_pob_choice: memory
  chosen_spanish: memoria
  alternatives_spanish:
  - recuerdo
  - memorial
  lexicon: BDAG
  rationale: '''Memoria'' funciona de forma natural en la expresión bíblica sobre el nombre o recuerdo duradero de una persona.'
- source_word: ἐκέκραξεν
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron el clamor
  lexicon: BDAG
  rationale: Se ajusta al plural del texto griego revisado y conserva la intensidad del clamor.
- source_word: ἐῤῥύσατο
  english_pob_choice: delivered
  chosen_spanish: los libró
  alternatives_spanish:
  - los rescató
  - los salvó
  lexicon: BDAG
  rationale: '''Libró'' es bíblico y transparente para la acción de rescate frente a la aflicción.'
- source_word: θλίψεων
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - angustias
  lexicon: BDAG
  rationale: Mantiene el peso de sufrimiento y presión del término griego.
- source_word: μάστιγες
  english_pob_choice: blows
  chosen_spanish: golpes
  alternatives_spanish:
  - azotes
  - látigos
  lexicon: LSJ
  rationale: '''Golpes'' es amplio y no fuerza una especificidad corporal que el contexto no exige.'
- source_word: ἁμαρτωλοῦ
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - el impío
  - el malvado
  lexicon: BDAG
  rationale: Equivale de forma directa al singular moral del pasaje y conserva el registro bíblico.
- source_word: ἐλπίζοντας ἐπὶ κύριον
  english_pob_choice: those who hope in the Lord
  chosen_spanish: los que esperan en Yahvé
  alternatives_spanish:
  - los que confían en Yahvé
  - los que esperan en el Señor
  lexicon: BDAG
  rationale: '''Esperan'' preserva la imagen de esperanza activa; se usa Yahvé por consistencia terminológica.'
- source_word: ἔλεος κυκλώσει
  english_pob_choice: mercy will surround
  chosen_spanish: la misericordia rodeará
  alternatives_spanish:
  - la misericordia envolverá
  - la misericordia los cercará
  lexicon: BDAG
  rationale: '''Rodeará'' conserva la imagen espacial del verbo sin perder naturalidad en español.'
theological_decisions:
- issue: Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se traduce el título para preservar el sentido semántico y la política del proyecto; no se conserva como nombre litúrgico salvo necesidad idiomática.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: φόβον κυρίου y el nombre divino
  english_pob_reading: the fear of the Lord
  chosen_spanish_reading: el temor de Yahvé
  alternative_spanish_readings:
  - el temor del Señor
  - la reverencia a Yahvé
  rationale: Dado que el contexto griego cita lenguaje bíblico que remite al nombre divino, se explicita Yahvé en lugar de una máscara reverencial, conforme a la norma del proyecto.
  doctrine_reference: Project terminology defaults for יהוה / YHWH
- issue: ἡ ἐν Χριστῷ πίστις
  english_pob_reading: the faith that is in the Messiah
  chosen_spanish_reading: la fe en el Mesías
  alternative_spanish_readings:
  - la fe del Mesías
  - la fidelidad del Mesías
  rationale: La frase conserva la tensión entre fe-adhesión y posible sentido de fidelidad sin resolverla artificialmente; el español elegido es el más sobrio y auditable.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del audit trail: mantuve el plural griego en ''los justos clamaron... los libró de todas sus aflicciones'' y coloqué ''Luego:'' antes de la segunda cita, de modo que ''Muchas son las aflicciones de los justos...'' quede dentro del bloque de cita previo. También ajusté la puntuación para reflejar la secuencia de citas del original normalizado.'
  spanish_consistency_notes:
  - Usé 'Yahvé' de manera uniforme para κύριος en este pasaje, coherente con el default del proyecto cuando el texto cita lenguaje bíblico del nombre divino.
  - Mantengo 'Mesías' para Χριστός en la primera cláusula, según la política del proyecto.
  - Conservé el registro de cita bíblica con imperativos breves y paralelismo claro, sin suavizar el tono exhortativo.
