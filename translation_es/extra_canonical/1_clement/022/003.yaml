translation:
  language: es
  text: Refrena[a] tu lengua del mal, y que tus labios no hablen engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Refrena» refleja el valor de cesar o contener del verbo griego; también puede traducirse «Detén tu lengua».
    reason: alternative_reading
lexical_decisions:
- source_word: παῦσον
  english_pob_choice: Keep your tongue from evil
  chosen_spanish: Refrena tu lengua del mal
  alternatives_spanish:
  - Detén tu lengua del mal
  - Suelta tu lengua del mal
  lexicon: παύω
  rationale: El griego imperativo pide cesar o contener la acción. En español, «refrena» comunica mejor la idea de poner freno a la lengua que un calco como «detén», y mantiene el tono exhortativo sin suavizar la fuerza del mandato.
- source_word: τὴν γλῶσσάν σου
  english_pob_choice: your tongue
  chosen_spanish: tu lengua
  alternatives_spanish:
  - tu lengua
  - tu lengua habladora
  lexicon: γλῶσσα
  rationale: «Lengua» es el equivalente natural y fiel en español para el órgano de habla. Conserva la imagen corporal y su valor moral en el texto bíblico.
- source_word: ἀπὸ κακοῦ
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de lo malo
  - del mal
  lexicon: κακός
  rationale: «Mal» reproduce la abstracción ética del griego con naturalidad en español. «De lo malo» sería más explicativo, pero menos directo y menos solemne.
- source_word: τοῦ μὴ λαλῆσαι δόλον
  english_pob_choice: from speaking deceit
  chosen_spanish: de hablar engaño
  alternatives_spanish:
  - de hablar con engaño
  - de decir engaño
  lexicon: δόλος
  rationale: 'La construcción griega expresa finalidad o resultado: impedir que los labios hablen dolosamente. «Hablar engaño» conserva la brevedad y la dureza del giro original; «hablar con engaño» es más idiomático, pero añade una preposición no presente de modo explícito.'
- source_word: χείλη σου
  english_pob_choice: your lips
  chosen_spanish: tus labios
  alternatives_spanish:
  - tus labios
  - tu boca
  lexicon: χεῖλος
  rationale: «Labios» es la correspondencia más directa y mantiene el paralelismo poético con «lengua».
theological_decisions:
- issue: Mandato moral sobre el habla
  english_pob_reading: Keep your tongue from evil, and your lips from speaking deceit.
  chosen_spanish_reading: Refrena tu lengua del mal, y tus labios de hablar engaño.
  alternative_spanish_readings:
  - Guarda tu lengua del mal, y tus labios de hablar engaño.
  - Mantén tu lengua apartada del mal, y tus labios de hablar engaño.
  rationale: El versículo exhorta a la disciplina moral del habla, no a una mera observación. «Refrena» preserva el valor ético y exhortativo del texto sin introducir una teología ajena.
  doctrine_reference: Ética bíblica del habla; cf. Sal 34:13.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «Stop your tongue» por «Keep your tongue» para expresar con más naturalidad la contención. En español, «refrena» ya transmite esa contención de forma idiomática y conserva la fuerza del imperativo.
  spanish_consistency_notes:
  - Se mantuvo «lengua» y «labios» para conservar el paralelismo corporal del griego.
  - Se eligió «mal» para κακοῦ y no una paráfrasis como «lo malo», a fin de preservar la abstracción moral.
  - Se evitó «siervo» o vocabulario eclesiástico tradicional ajeno al texto; el versículo trata del control del habla.
