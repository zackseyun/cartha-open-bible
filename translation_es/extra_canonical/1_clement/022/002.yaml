translation:
  language: es
  text: ¿Quién es el hombre que desea la vida, que ama ver días felices?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τίς ἐστιν ἄνθρωπος
  english_pob_choice: Who is the man
  chosen_spanish: ¿Quién es el hombre
  alternatives_spanish:
  - ¿Quién es el ser humano
  - ¿Quién es la persona
  lexicon: τίς / ἄνθρωπος
  rationale: Conserva la pregunta retórica y el sustantivo genérico masculino singular del griego, que en este dicho proverbial funciona de manera inclusiva y proverbial. "El hombre" reproduce la forma tradicional y directa sin forzar una paráfrasis.
- source_word: ὁ θέλων ζωὴν
  english_pob_choice: who desires life
  chosen_spanish: que desea la vida
  alternatives_spanish:
  - que quiere la vida
  - que anhela la vida
  lexicon: θέλω / ζωή
  rationale: '"Desea" mantiene el valor volitivo de θέλων de manera natural en español y refleja bien el matiz general del texto. "Vida" traduce ζωή de forma directa, sin añadir especificaciones que el griego no ofrece.'
- source_word: ἀγαπῶν ἡμέρας ἰδεῖν ἀγαθάς
  english_pob_choice: who loves to see good days
  chosen_spanish: que ama ver días buenos
  alternatives_spanish:
  - que desea ver días buenos
  - que ama contemplar días buenos
  lexicon: ἀγαπάω / ἡμέραι ἀγαθαί
  rationale: Se conserva la estructura participial con un relativo en español, como ya refleja la revisión inglesa. "Ama ver" sigue de cerca ἀγαπῶν ... ἰδεῖν sin perder naturalidad. "Días buenos" reproduce el adjetivo ἀγαθάς de forma literal y transparente.
theological_decisions:
- issue: Valor proverbial de la pregunta retórica
  english_pob_reading: Who is the man who desires life, who loves to see good days?
  chosen_spanish_reading: ¿Quién es el hombre que desea la vida, que ama ver días buenos?
  alternative_spanish_readings:
  - ¿Quién es el hombre que desea vivir, que ama ver días buenos?
  - ¿Quién es el hombre que anhela la vida, que ama ver días buenos?
  rationale: El griego presenta una fórmula interrogativa proverbial que introduce una exhortación posterior. La traducción española conserva la formulación abierta y no explicita aún el contenido exhortativo para no adelantar lo que el versículo no dice en sí mismo.
  doctrine_reference: Uso proverbial y retórico del texto, sin carga doctrinal específica en este hemistiquio.
translation_notes:
  revision_awareness: 'La redacción inglesa fue revisada desde "loving to see" a "who loves to see" para hacer más natural y formal el inglés, preservando el sentido participial griego. La versión española sigue esa misma decisión estructural con una cláusula relativa natural: "que ama ver".'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y legible, sin recurrir a giros arcaizantes innecesarios.
  - No se introduce "Cristo", "Señor" ni otros términos no presentes en el griego.
  - La pregunta retórica se conserva con puntuación española estándar y sin amplificación interpretativa.
