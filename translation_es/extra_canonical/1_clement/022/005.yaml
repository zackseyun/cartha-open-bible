lexical_decisions:
- source_word: ζήτησον
  english_pob_choice: Seek
  chosen_spanish: Busca
  alternatives_spanish:
  - Procura
  - Busca con empeño
  lexicon: ζητέω
  rationale: El imperativo expresa una acción deliberada de buscar; «busca» conserva la fuerza directa y natural del mandato en español, sin añadir interpretación.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - paz
  - la paz
  lexicon: εἰρήνη
  rationale: «Paz» es el equivalente más claro y fiel; se usa con artículo por fluidez natural en español, sin cambiar el sustantivo de sentido.
- source_word: δίωξον
  english_pob_choice: pursue
  chosen_spanish: síguela
  alternatives_spanish:
  - persíguela
  - búscala con constancia
  lexicon: διώκω
  rationale: Aunque el verbo puede significar «perseguir», en este contexto el sentido es perseverar tras la paz. «Síguela» comunica bien la idea de perseguir algo de manera activa y constante en español, manteniendo la tensión de diligencia sin sonar agresivo de forma indebida.
- source_word: αὐτήν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - la
  lexicon: αὐτός
  rationale: El pronombre retoma «la paz»; «la» es la referencia más natural y compacta en español.
theological_decisions:
- issue: Matiz de διώκω aplicado a la paz
  english_pob_reading: pursue it
  chosen_spanish_reading: síguela
  alternative_spanish_readings:
  - persíguela
  - procúrala
  rationale: 'No hay tensión doctrinal fuerte, pero sí una decisión semántica: el mandato no describe hostilidad, sino una búsqueda tenaz de la paz. «Síguela» evita que el español sugiera violencia y conserva la exigencia ética del texto.'
  doctrine_reference: Ética cristiana de la paz en la literatura apostólica
translation_notes:
  revision_awareness: 'El texto griego y la traducción inglesa coinciden plenamente en sentido general: ζήτησον εἰρήνην καὶ δίωξον αὐτήν → Seek peace and pursue it. No se registran revisiones ni variantes textuales relevantes en el expediente proporcionado.'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y eclesialmente legible, sin depender de fórmulas tradicionales ajenas al griego.
  - Se evita «perseguir» en español por su posible carga de agresión, aunque el griego διώκω puede abarcar persecución intensiva; aquí el contexto favorece la perseverancia en la paz.
  - No se introduce mayúscula devocional en «paz» porque el término no designa un nombre propio ni una figura divina.
