review_pass:
  verdict: revise
  source_alignment_summary: El griego ζήτησον εἰρήνην καὶ δίωξον αὐτήν significa literalmente «busca la paz y persíguela». La primera mitad del borrador es fiel. La segunda mitad, «síguela», atenúa demasiado la fuerza de δίωξον, que en este contexto ético conserva la idea de perseguir con empeño, como en la formulación conocida de Sal 34:14/1 Pe 3:11. «Persíguela» preserva mejor el paralelismo y la intensidad del original y del English POB «pursue it».
  spanish_quality_summary: El borrador es claro y natural, pero «síguela» suena más débil que el mandato griego y que «pursue». «Busca la paz y persíguela» sigue siendo plenamente idiomático y de registro digno en español eclesial moderno. No se requieren notas.
  glossary_alignment: 'No hay términos del glosario mayor directamente implicados. La decisión relevante es διώκω: conviene mantener su fuerza léxica con «persigue/persíguela» en vez de un verbo más suave como «sigue».'
  issues:
  - severity: medium
    issue: «síguela» debilita δίωξον
    rationale: διώκω en este contexto exhortativo no es solo «seguir», sino «perseguir/ir tras algo con empeño». El español puede expresar esto naturalmente con «persíguela» sin introducir hostilidad literal indebida.
  revised_spanish_text: Busca la paz y persíguela.
  revision_rationale: Se reemplaza «síguela» por «persíguela» para reflejar con mayor precisión la fuerza de δίωξον y alinearse mejor con el English POB «pursue it», manteniendo un español natural y claro.
