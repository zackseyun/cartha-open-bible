base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/030/008.yaml
  text: Insolence and arrogance and recklessness belong to those cursed by God[a]; but gentleness and humility and meekness are found among those blessed by God.
  footnotes:
  - marker: a
    text: Or 'Boldness'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:20Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: La insolencia, la arrogancia y la temeridad pertenecen a los malditos por Dios[a]; pero la gentileza, la humildad y la mansedumbre se hallan entre los bendecidos por Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «osadía». En griego, θράσος puede significar una audacia negativa, no «valentía».
    reason: lexical_alternative
lexical_decisions:
- source_word: θράσος
  english_pob_choice: Insolence
  chosen_spanish: insolencia
  alternatives_spanish:
  - osadía
  - presunción
  - atrevimiento
  lexicon: LSJ / BDAG
  rationale: En este listado de vicios, θράσος no expresa valentía neutra, sino audacia irreverente y ofensiva. «Insolencia» conserva ese valor negativo y sigue de cerca la revisión inglesa que descartó «boldness» por ser engañosamente positiva.
- source_word: αὐθάδεια
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - soberbia
  - autosuficiencia
  - presunción
  lexicon: BDAG
  rationale: El término comunica una actitud obstinada y autosatisfecha. «Arrogancia» es natural en español y mantiene el tono moral del catálogo de vicios.
- source_word: τόλμα
  english_pob_choice: recklessness
  chosen_spanish: temeridad
  alternatives_spanish:
  - audacia
  - imprudencia
  - atrevimiento
  lexicon: LSJ / BDAG
  rationale: Aquí la idea es arrojo sin freno ni prudencia. «Temeridad» captura mejor la carga negativa que «audacia», que en español puede ser positiva.
- source_word: ἐπιείκεια
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - benignidad
  - amabilidad
  - gentileza
  lexicon: BDAG
  rationale: Aunque el inglés usó «gentleness», en español «mansedumbre» reproduce mejor la virtud contraria a la violencia interior y al orgullo, sin perder dignidad bíblica.
- source_word: ταπεινοφροσύνη
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - modestia
  - humillación
  - bajeza
  lexicon: BDAG
  rationale: El término apunta a una disposición interior baja de sí misma ante Dios y los demás. «Humildad» es el equivalente directo y más claro.
- source_word: πραΰτης
  english_pob_choice: meekness
  chosen_spanish: suavidad
  alternatives_spanish:
  - mansedumbre
  - dulzura
  - apacibilidad
  lexicon: BDAG / LSJ
  rationale: Se distinguió de ἐπιείκεια para evitar colapsar dos virtudes en un solo término. «Suavidad» preserva la idea de trato apacible y benigno, aunque puede rozar una ambigüedad estilística menor.
- source_word: κατηραμένοις
  english_pob_choice: cursed
  chosen_spanish: malditos
  alternatives_spanish:
  - maldecidos
  - maldichos
  lexicon: BDAG
  rationale: La forma pasiva expresa estar bajo maldición divina. «Malditos» es la opción más directa y solemne en español, y mantiene el paralelismo con «bendecidos».
- source_word: ηὐλογημένοις
  english_pob_choice: blessed
  chosen_spanish: bendecidos
  alternatives_spanish:
  - bienaventurados
  - benditos
  lexicon: BDAG
  rationale: «Bendecidos» traduce con transparencia el participio pasivo y conserva el contraste con «malditos» en la misma estructura sintáctica.
theological_decisions:
- issue: Contraste moral entre dos grupos definidos por Dios
  english_pob_reading: those cursed by God / those blessed by God
  chosen_spanish_reading: los malditos por Dios / los bendecidos por Dios
  alternative_spanish_readings:
  - los que están bajo maldición de Dios / los que están bajo bendición de Dios
  - los maldecidos por Dios / los bendecidos por Dios
  rationale: El griego usa participios pasivos que describen un estado resultante. Mantener «por Dios» preserva la agencia divina sin suavizar la antítesis ética del pasaje.
  doctrine_reference: Maldición y bendición divinas como estados relacionales y judiciales, no meramente emocionales.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió «boldness» a «insolence» para θράσος. La traducción española evita un término potencialmente positivo y conserva el matiz peyorativo del catálogo de vicios.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo retórico de la cláusula: tres vicios frente a tres virtudes.'
  - Se distinguieron ἐπιείκεια y πραΰτης con dos soluciones españolas cercanas pero no idénticas para no borrar la posible diferencia semántica.
  - Se prefirió un registro bíblico claro y contemporáneo, sin recurrir a una fórmula eclesiástica tradicional que ocultara el sentido léxico.
