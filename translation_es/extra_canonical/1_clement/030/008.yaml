  text: θράσος καὶ αὐθάδεια καὶ τόλμα τοῖς κατηραμένοις ὑπὸ τοῦ θεοῦ· ἐπιείκεια καὶ ταπεινοφροσύνη καὶ πραΰτης παρὰ τοῖς ηὐλογημένοις ὑπὸ τοῦ θεοῦ.
