  - severity: low
    issue: Elección de «orgullosos» frente a «soberbios»
    rationale: «Orgullosos» no es incorrecto, pero en esta cita bíblica «soberbios» transmite mejor ὑπερηφάνοις y se alinea con el registro bíblico tradicional ampliamente reconocible en español.
