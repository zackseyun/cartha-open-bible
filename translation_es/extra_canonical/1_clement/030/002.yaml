translation:
  language: es
  text: 'Porque dice[a]: «Dios se opone a los soberbios, pero da gracia a los humildes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque Dios, dice, se opone a los soberbios, pero da gracia a los humildes».'
    reason: alternative_reading
lexical_decisions:
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: θεός
  rationale: Se mantiene el referente divino con el término normal y transparente en español bíblico. No hace falta especificar artículo por tratarse de una cita proverbial bien conocida.
- source_word: φησίν
  english_pob_choice: it says
  chosen_spanish: dice
  alternatives_spanish:
  - dice él
  - está diciendo
  lexicon: φημί
  rationale: El griego funciona como fórmula parentética de cita escritural. En español, «dice» reproduce con naturalidad esa introducción impersonal sin atribuir innecesariamente el decir a una persona determinada.
- source_word: ὑπερηφάνοις
  english_pob_choice: the proud
  chosen_spanish: los orgullosos
  alternatives_spanish:
  - los soberbios
  - los altivos
  lexicon: ὑπερήφανος
  rationale: «Orgullosos» comunica bien la actitud de autosuficiencia y elevación personal. «Soberbios» también sería posible, pero «orgullosos» resulta más claro y natural para el lector general.
- source_word: ἀντιτάσσεται
  english_pob_choice: opposes
  chosen_spanish: se opone a
  alternatives_spanish:
  - resiste a
  - se enfrenta a
  lexicon: ἀντιτάσσομαι
  rationale: La idea es de resistencia hostil o contraposición activa. «Se opone a» conserva el sentido relacional y evita una dureza innecesaria en español.
- source_word: ταπεινοῖς
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los mansos
  - los abatidos
  lexicon: ταπεινός
  rationale: En este contexto ético, «humildes» es la equivalencia más directa y estable. «Mansos» o «abatidos» introducirían matices no garantizados por el texto.
- source_word: δίδωσιν χάριν
  english_pob_choice: gives grace
  chosen_spanish: da gracia
  alternatives_spanish:
  - concede gracia
  - otorga gracia
  lexicon: χάρις
  rationale: «Da gracia» preserva la formulación bíblica tradicional y mantiene el valor de χάρις como favor divino inmerecido. «Concede gracia» sería posible, pero menos concisa.
theological_decisions:
- issue: Fórmula de cita impersonal en φησίν
  english_pob_reading: For it says
  chosen_spanish_reading: Porque, dice
  alternative_spanish_readings:
  - Porque dice él
  - Pues dice
  rationale: Se refleja la función introductoria impersonal del verbo en este pasaje, alineada con la revisión auditada del inglés POB. La coma después de «Porque» mantiene la parentética del giro citacional.
  doctrine_reference: Uso escritural de citas en contexto patrístico; cf. fórmula de introducción de la Escritura en Proverbios 3:34.
- issue: Relación entre Dios y la cita bíblica
  english_pob_reading: God opposes the proud, but gives grace to the humble.
  chosen_spanish_reading: Dios se opone a los orgullosos, pero da gracia a los humildes.
  alternative_spanish_readings:
  - Dios resiste a los soberbios, pero da gracia a los humildes.
  rationale: Se conserva el contenido teológico sin suavizar la oposición divina ni el don de gracia. «Se opone a» evita elevar «resiste» como única opción cuando el griego admite una contraposición activa y clara.
  doctrine_reference: Proverbios 3:34; recepción en Santiago 4:6 y 1 Pedro 5:5.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrige la fórmula de cita de «he says» a una introducción impersonal («it says»). La puntuación y las comillas se ajustan para reflejar la cita directa en español sin perder la función parentética del griego.
  spanish_consistency_notes:
  - Se mantiene «Dios» como término divino estándar y «gracia» para χάρις, conforme al glosario del proyecto.
  - «Orgullosos» se eligió por claridad idiomática; «soberbios» queda registrado como alternativa válida.
  - La cita se presenta con comillas españolas y marca de nota anclada exactamente en el verbo introductorio, para reflejar el matiz de la fórmula escritural.
