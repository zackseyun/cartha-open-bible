translation:
  language: es
  text: 'Por tanto, ya que somos una porción santa, hagamos todas las cosas de la santificación, huyendo de las calumnias, de los enredos inmundos e impuros, de las borracheras, de las sediciones, de los deseos abominables, del adulterio repugnante y de la soberbia detestable.



    Porque Dios, dice, resiste a los soberbios, pero da gracia a los humildes.



    Adhirámonos, pues, a aquellos a quienes Dios ha dado gracia. Revistámonos de concordia, siendo humildes de mente y con dominio propio, manteniéndonos lejos de todo murmullo y calumnia, siendo justificados por las obras y no por las palabras.



    Porque dice: «El que dice muchas cosas también oirá respuesta». ¿O acaso el de palabra fácil cree ser justo?



    «Bienaventurado el de vida breve, nacido de mujer. No te hagas excesivo en palabras».



    Que nuestra alabanza esté en Dios y no provenga de nosotros mismos, porque Dios aborrece a los que se alaban a sí mismos.



    Que el testimonio de nuestra buena conducta sea dado por otros, como fue dado a nuestros padres justos.



    La osadía, la arrogancia y la temeridad pertenecen a los malditos por Dios; pero la gentileza, la humildad y la mansedumbre se hallan entre los benditos por Dios.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἅγια οὖν μερὶς
  english_pob_choice: a holy portion
  chosen_spanish: una porción santa
  alternatives_spanish:
  - una parte santa
  - un pueblo santo
  lexicon: LSJ
  rationale: Conserva la imagen partitiva de μερὶς sin convertirla en una paráfrasis eclesial más explícita. «Porción» mantiene la idea de pertenencia y «santa» reproduce el valor de Ἅγια.
- source_word: τὰ τοῦ ἁγιασμοῦ
  english_pob_choice: the things of sanctification
  chosen_spanish: las cosas de la santificación
  alternatives_spanish:
  - las cosas que pertenecen a la santificación
  - las obras de santidad
  lexicon: BDAG
  rationale: Se conserva el sustantivo abstracto ἁγιασμός como «santificación» y se mantiene la construcción genitiva de manera idiomática en español.
- source_word: καταλαλιάς
  english_pob_choice: slander
  chosen_spanish: calumnias
  alternatives_spanish:
  - murmuraciones
  - habladurías
  lexicon: BDAG
  rationale: «Calumnias» comunica el habla maliciosa y pública en un registro claro y natural; en este contexto de vicios de lengua funciona bien junto a «murmullo».
- source_word: συμπλοκὰς
  english_pob_choice: entanglements
  chosen_spanish: uniones
  alternatives_spanish:
  - enredos
  - complicaciones
  lexicon: LSJ
  rationale: El término sugiere relaciones o mezclas moralmente comprometedoras. «Uniones» conserva amplitud semántica, y la adición «inmundas y no puras» mantiene la fuerza moral del pasaje.
- source_word: μιαράς τε καὶ ἀνάγνους
  english_pob_choice: foul and unclean
  chosen_spanish: inmundas y no puras
  alternatives_spanish:
  - sucias e impuras
  - viles e impuras
  lexicon: LSJ
  rationale: La doble expresión se traduce con un par igualmente doble para preservar el énfasis retórico de repulsión moral.
- source_word: νεωτεροποιΐας
  english_pob_choice: seditions
  chosen_spanish: sediciones
  alternatives_spanish:
  - innovaciones
  - faccionalismos
  lexicon: LSJ
  rationale: En este contexto paraenético la idea es de desorden comunitario y facciones, no de novedad neutral. «Sediciones» refleja mejor esa carga social negativa.
- source_word: βδελυκτὰς ἐπιθυμίας
  english_pob_choice: detestable desires
  chosen_spanish: deseos abominables
  alternatives_spanish:
  - apetitos abominables
  - deseos detestables
  lexicon: BDAG
  rationale: «Abominables» mantiene la fuerza de repulsión de βδελυκτός en un español solemne y comprensible.
- source_word: μυσερὰν μοιχείαν
  english_pob_choice: loathsome adultery
  chosen_spanish: adulterio repugnante
  alternatives_spanish:
  - adulterio detestable
  - adulterio asqueroso
  lexicon: LSJ
  rationale: Se preserva la condena moral fuerte de μοιχεία con un adjetivo de rechazo fuerte pero publicable.
- source_word: ὑπερηφανίαν
  english_pob_choice: detestable pride
  chosen_spanish: soberbia detestable
  alternatives_spanish:
  - orgullo detestable
  - arrogancia detestable
  lexicon: BDAG
  rationale: «Soberbia» capta el matiz de orgullo levantado contra Dios y armoniza con la cita siguiente sobre «los soberbios».
- source_word: κολληθῶμεν
  english_pob_choice: cling to
  chosen_spanish: unámonos a
  alternatives_spanish:
  - adhirámonos a
  - apeguémonos a
  lexicon: BDAG
  rationale: El verbo incluye adhesión y cercanía. En español, «unámonos a» comunica vínculo relacional sin perder el impulso exhortativo.
- source_word: ὁμόνοιαν
  english_pob_choice: concord
  chosen_spanish: concordia
  alternatives_spanish:
  - armonía
  - unidad
  lexicon: LSJ
  rationale: «Concordia» conserva el tono colectivo y elevado del término, adecuado al contexto comunitario.
- source_word: ταπεινοφρονοῦντες
  english_pob_choice: being humble-minded
  chosen_spanish: siendo humildes de mente
  alternatives_spanish:
  - pensando humildemente
  - siendo de ánimo humilde
  lexicon: BDAG
  rationale: Se preserva explícitamente la dimensión interior/mental del participio, no solo la actitud externa.
- source_word: ἐγκρατευόμενοι
  english_pob_choice: self-controlled
  chosen_spanish: dueños de nosotros mismos
  alternatives_spanish:
  - templados
  - sobrios
  lexicon: BDAG
  rationale: La idea principal es autocontrol moral; la expresión española evita una lectura meramente psicológica y comunica dominio propio.
- source_word: ψιθυρισμοῦ καὶ καταλαλιᾶς
  english_pob_choice: whispering and slander
  chosen_spanish: murmullo y calumnia
  alternatives_spanish:
  - susurro y calumnia
  - murmuración y calumnia
  lexicon: BDAG
  rationale: «Murmullo» conserva la imagen de habla baja y secreta, complementando «calumnia».
- source_word: ἔργοις δικαιούμενοι καὶ μὴ λόγοις
  english_pob_choice: being justified by works and not by words
  chosen_spanish: siendo justificados por las obras y no por las palabras
  alternatives_spanish:
  - siendo declarados justos por las obras y no por las palabras
  - siendo vindicados por las obras y no por las palabras
  lexicon: BDAG
  rationale: Se mantiene el verbo «justificar» para transparencia lexical, mientras el contraste con «palabras» impide una lectura técnico-dogmática ajena al contexto exhortativo.
- source_word: ἡ μαρτυρία τῆς ἀγαθῆς πράξεως
  english_pob_choice: the testimony of our good conduct
  chosen_spanish: el testimonio de nuestra buena conducta
  alternatives_spanish:
  - la evidencia de nuestra buena conducta
  - el testimonio de nuestra buena acción
  lexicon: BDAG
  rationale: «Testimonio» preserva la dimensión pública del reconocimiento externo, y «conducta» recoge el sentido amplio de πράξις en contexto moral.
- source_word: θράσος καὶ αὐθάδεια καὶ τόλμα
  english_pob_choice: boldness and arrogance and recklessness
  chosen_spanish: la osadía, la arrogancia y la temeridad
  alternatives_spanish:
  - la insolencia, la autosuficiencia y la audacia
  - la presunción, la terquedad y el atrevimiento
  lexicon: LSJ
  rationale: La terna española reproduce la escalada retórica de rasgos culpables sin suavizar el juicio del texto.
- source_word: ἐπιείκεια καὶ ταπεινοφροσύνη καὶ πραΰτης
  english_pob_choice: gentleness and humility and meekness
  chosen_spanish: la mansedumbre, la humildad y la dulzura
  alternatives_spanish:
  - la benignidad, la humildad y la mansedumbre
  - la indulgencia, la humildad y la mansedumbre
  lexicon: BDAG
  rationale: «Mansedumbre» y «humildad» son términos estables; «dulzura» rinde πραΰτης en un español natural y positivo, aunque con cierta amplitud semántica.
theological_decisions:
- issue: δικαιούμενοι in a paraenetic, non-Pauline context
  english_pob_reading: being justified by works and not by words
  chosen_spanish_reading: siendo justificados por las obras y no por las palabras
  alternative_spanish_readings:
  - siendo declarados justos por las obras y no por las palabras
  - siendo vindicados por las obras y no por las palabras
  rationale: Se conserva la forma verbal de δικαιόω por transparencia lexical, pero el contexto exhortativo y el contraste con «palabras» señalan una justicia demostrada en la conducta, no una discusión paulina técnica.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: νεωτεροποιΐαι as social-ecclesial vice
  english_pob_reading: seditions
  chosen_spanish_reading: sediciones
  alternative_spanish_readings:
  - innovaciones
  - faccionalismos
  rationale: El contexto sugiere desorden comunitario y división, así que se evita una lectura neutral de ‘novedad’. «Sediciones» mantiene la fuerza social y eclesial del término.
  doctrine_reference: Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: 'La revisión más reciente afinó dos puntos del inglés de referencia: ‘a holy portion’ para alinearlo mejor con Ἅγια...μερὶς, y ‘detestable pride’ para mantener la coherencia con el campo semántico de βδελυκτός. La versión española sigue esa orientación mediante ‘porción santa’ y ‘soberbia detestable’, sin abrir nuevas interpretaciones no sustentadas por el griego.'
  spanish_consistency_notes:
  - 'Se mantuvo una terminología moral fuerte y uniforme: calumnias, inmundas/no puras, sediciones, deseos abominables, adulterio repugnante, soberbia detestable.'
  - No se sustituyó el léxico de ‘justificar’ por una paráfrasis doctrinal; la formulación conserva la tensión lexical del original.
  - Se evitó ‘Cristo’ porque este pasaje no lo requiere; tampoco hay nombres divinos que exijan una nota sobre Yahvé en esta sección.
  - La traducción busca un español bíblico actual, pero no arcaizante, con paralelismo y cadencia aptos para lectura pública.
