review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido global del griego y del POB inglés: conserva «porción santa», «santificación», la lista de vicios, la cita sobre Dios que resiste a los soberbios, la exhortación a la concordia, y la tensión léxica de «justificados por las obras y no por las palabras». Sin embargo, varias elecciones debilitan o vuelven menos naturales el sentido: «uniones inmundas y no puras» no refleja bien συμπλοκάς ni la doble adjetivación; «unámonos a» atenúa κολληθῶμεν; «debida de parte de Dios» sería mejor como «de Dios» o «por Dios»; «hablador fácil»/«se opone»/«dulzura» pueden mejorarse para mayor precisión y dignidad.'
  spanish_quality_summary: 'El texto es generalmente legible y de registro eclesial adecuado, pero tiene giros poco naturales o débiles para español bíblico actual: «no puras» suena torpe, «dueños de nosotros mismos» es más pesado que «con dominio propio», y «dulzura» no encaja bien en la tríada de virtudes frente a ἐπιείκεια ... πραΰτης. También conviene afinar la cohesión retórica con formulaciones más idiomáticas y solemnes sin alejarse del original.'
  glossary_alignment: No hay conflictos con la terminología de proyecto principal. «Gracia», «Dios», «justificados», «concordia», «soberbia» y «mansedumbre» están en línea. La principal cuestión léxica es mejorar συμπλοκάς a «enredos» y ἐπιείκεια a «gentileza» o «benignidad», además de reforzar κολληθῶμεν con «adhirámonos» o «apeguémonos».
  issues:
  - severity: medium
    issue: «uniones inmundas y no puras» para μιαράς τε καὶ ἀνάγνους συμπλοκὰς
    rationale: «Uniones» es demasiado plano y «no puras» suena antinatural. El griego apunta a enredos o implicaciones moralmente comprometedoras; «enredos inmundos e impuros» conserva mejor amplitud y fuerza retórica.
  - severity: medium
    issue: «Unámonos» para κολληθῶμεν
    rationale: El verbo griego implica adherirse, apegarse, pegarse a alguien. «Unámonos» comunica asociación, pero debilita la imagen exhortativa. «Adhirámonos» preserva mejor el valor léxico.
  - severity: low
    issue: «a quienes la gracia les ha sido dada de parte de Dios»
    rationale: La construcción con doblado pronominal es pesada. «a quienes Dios ha dado gracia» o «a quienes la gracia les ha sido dada por Dios» es más natural.
  - severity: medium
    issue: «dueños de nosotros mismos» para ἐγκρατευόμενοι
    rationale: Aunque comprensible, es una perífrasis pesada. «con dominio propio» o «ejerciendo dominio propio» es más claro y natural en registro bíblico.
  - severity: medium
    issue: «el hablador fácil» para εὐλάλος
    rationale: La expresión suena coloquial e incluso ambigua. «el de palabra fácil» conserva la idea de facilidad de habla con mejor dignidad.
  - severity: medium
    issue: «la mansedumbre, la humildad y la dulzura» para ἐπιείκεια καὶ ταπεινοφροσύνη καὶ πραΰτης
    rationale: Aquí se pierden las distinciones de la tríada. «Dulzura» no rinde bien πραΰτης en contexto teológico; además ἐπιείκεια queda absorbido. «La gentileza, la humildad y la mansedumbre» preserva mejor la secuencia.
