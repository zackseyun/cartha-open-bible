revisions:
- from: Que el testimonio de nuestras buenas acciones sea dado por otros[a], así como fue dado a nuestros padres justos.
  to: Que el testimonio de nuestra buena obra[a] sea dado por otros, así como fue dado a nuestros padres justos.
  rationale: Se cambia «nuestras buenas acciones» por «nuestra buena obra» para respetar el singular griego y mantener una correspondencia léxica más estrecha. La nota al pie se rehace para ofrecer una alternativa real y útil en español («buen proceder»), reflejando el posible sentido más general de πρᾶξις que quedó documentado en la auditoría inglesa.
