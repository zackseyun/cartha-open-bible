  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἡ μαρτυρία τῆς ἀγαθῆς πράξεἡμῶν διδόσθω ὑπ’ ἄλλων, καθὼς ἐδόθη τοῖς πατράσιν ἡμῶν τοῖς δικαίοις.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/030/007.yaml
  text: Let the testimony of our good deeds be given by others[a], just as it was given to our righteous fathers.
  footnotes:
  - marker: a
    text: Or 'good deed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:20Z'
    unchanged: false
    changes_summary: Changed 'good conduct' to 'good deeds' for closer lexical correspondence to ἀγαθῆς πράξεως ('good action/deed').
translation:
  language: es
  text: Que el testimonio de nuestra buena obra[a] sea dado por otros, así como fue dado a nuestros padres justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «buen proceder»; el griego puede referirse también a la conducta buena en general.
    reason: Preservar el matiz alternativo de πρᾶξις sin perder el singular del texto principal.
lexical_decisions:
- source_word: ἡ μαρτυρία
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - la evidencia
  - el testimonio público
  lexicon: μαρτυρία
  rationale: «Testimonio» reproduce bien la idea de una declaración o valoración reconocida por otros, y es el equivalente natural en español para mantener la fuerza pública del sustantivo.
- source_word: τῆς ἀγαθῆς πράξεἡμῶν / ἀγαθῆς πράξεως
  english_pob_choice: our good deeds
  chosen_spanish: nuestras buenas acciones
  alternatives_spanish:
  - nuestras buenas obras
  - nuestras buenas conductas
  lexicon: πρᾶξις
  rationale: La revisión inglesa osciló entre «good conduct» y «good deeds». En español, «buenas acciones» conserva la correspondencia léxica con πράξις como acto/acción, sin sonar tan aislado como «obra» ni tan abstracto como «conducta».
- source_word: διδόσθω
  english_pob_choice: be given
  chosen_spanish: sea dado
  alternatives_spanish:
  - sea concedido
  - sea otorgado
  lexicon: δίδωμι
  rationale: El imperativo pasivo exhortativo se expresa de manera directa con «sea dado», que preserva la pasividad del griego y la idea de que el testimonio proviene de otros.
- source_word: ὑπ’ ἄλλων
  english_pob_choice: by others
  chosen_spanish: por otros
  alternatives_spanish:
  - por los demás
  - por otras personas
  lexicon: ἄλλος
  rationale: «Por otros» es la forma más breve y fiel para mantener el contraste entre quien actúa y quien da testimonio.
- source_word: τοῖς δικαίοις
  english_pob_choice: our righteous fathers
  chosen_spanish: a nuestros padres justos
  alternatives_spanish:
  - a nuestros padres rectos
  - a nuestros padres piadosos
  lexicon: δίκαιος
  rationale: «Justos» conserva la raíz ética/jurídica de δίκαιος y mantiene la conexión con la santidad reconocida de los antepasados, sin sustituirla por un término más devocional que el texto no exige.
theological_decisions:
- issue: Valor de la memoria ejemplar de los antepasados
  english_pob_reading: just as it was given to our righteous fathers
  chosen_spanish_reading: así como fue dado a nuestros padres justos
  alternative_spanish_readings:
  - tal como se dio a nuestros padres justos
  - igual que fue concedido a nuestros padres justos
  rationale: La frase conserva la continuidad moral entre la comunidad presente y los padres antiguos, sin introducir una noción más fuerte de mérito que el griego no explicita.
  doctrine_reference: Ejemplaridad de los antepasados justos en la tradición cristiana primitiva
- issue: Evaluación ética de la vida cristiana
  english_pob_reading: our good deeds
  chosen_spanish_reading: nuestras buenas acciones
  alternative_spanish_readings:
  - nuestras buenas obras
  - nuestro buen proceder
  rationale: «Buenas acciones» deja abierta la referencia tanto a actos concretos como a una vida entera de obrar rectamente, respetando la tensión lexical observada en la revisión del texto inglés.
  doctrine_reference: Ética cristiana visible y reconocible por testimonio externo
translation_notes:
  revision_awareness: 'La última revisión inglesa volvió de «good conduct» a «good deeds» para acercarse más a ἀγαθῆς πράξεως, mientras que el análisis previo reconocía el valor de «conducta» como sentido posible del singular. El español «buenas acciones» intenta mantener esa tensión: suena a actos concretos, pero no excluye una conducta general.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término predeterminado para el nombre divino, aunque este versículo no lo contiene.
  - Se usa un registro eclesial sobrio y moderno, evitando arcaísmos innecesarios.
  - La nota textual en español refleja la oscilación entre acto singular y conducta general documentada en el audit trail inglés.
