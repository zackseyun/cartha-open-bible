base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/030/004.yaml
  text: For he says[a], “He who speaks many things will also hear in reply; or does the eloquent man think himself righteous?”
  footnotes:
  - marker: a
    text: Or '“He who says many things shall also hear in reply.” Or does the ready speaker think himself righteous?'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:20Z'
    unchanged: false
    changes_summary: Revised 'says many things' to 'speaks many things' for more natural formal English, and 'ready speaker' to 'eloquent man' to better reflect εὐλάλος. Added a semicolon before 'or' for smoother quotation punctuation.
translation:
  language: es
  text: 'Porque dice[a]: «El que habla mucho también oirá en respuesta; ¿o piensa el hombre elocuente que es justo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que dice muchas cosas también oirá en respuesta; ¿o piensa el hombre elocuente que es justo?»'
    reason: alternative_rendering
lexical_decisions:
- source_word: λέγει γάρ
  english_pob_choice: For he says
  chosen_spanish: Porque dice
  alternatives_spanish:
  - Pues dice
  - Porque afirma
  lexicon: λέγω
  rationale: Se conserva la introducción citativa breve y directa. «Porque dice» reproduce bien la función causal/explicativa de γάρ y mantiene el tono de cita scriptural o proverbial.
- source_word: Ὁ ἰὰ πολλὰ λέγων
  english_pob_choice: He who speaks many things
  chosen_spanish: El que habla muchas cosas
  alternatives_spanish:
  - El que dice muchas cosas
  - Quien habla mucho
  lexicon: λέγω
  rationale: «Habla muchas cosas» sigue de cerca el griego y el audit trail inglés, manteniendo el matiz de abundancia verbal sin convertirlo en una paráfrasis más libre como «habla mucho».
- source_word: καὶ ἀντακουσεται
  english_pob_choice: will also hear in reply
  chosen_spanish: también oirá en respuesta
  alternatives_spanish:
  - también será respondido
  - también escuchará en réplica
  lexicon: ἀντακούω
  rationale: La idea central es recibir respuesta en el intercambio verbal. «Oirá en respuesta» conserva esa reciprocidad sin forzar una construcción pasiva menos natural en español.
- source_word: ὁ εὐλάλος
  english_pob_choice: the eloquent man / the ready speaker
  chosen_spanish: el hombre elocuente
  alternatives_spanish:
  - el hablador
  - el orador elocuente
  lexicon: εὐλάλος
  rationale: El inglés revisado optó por «eloquent man» para reflejar εὐλάλος. En español, «el hombre elocuente» es una forma natural y digna que conserva la valoración de facilidad o habilidad verbal, sin bajar el tono a «hablador».
- source_word: οἴεται εἶναι δίκαιος
  english_pob_choice: think himself righteous
  chosen_spanish: piensa que es justo
  alternatives_spanish:
  - se cree justo
  - piensa que es recto
  lexicon: δίκαιος
  rationale: «Justo» mantiene la correspondencia con δίκαιος y conserva la tensión moral/judicial. «Piensa que es justo» expresa la autopercepción del sujeto sin añadir más interpretación que el griego.
theological_decisions:
- issue: Sentido de la cita sapiencial/proverbial sobre la abundancia de palabras
  english_pob_reading: He who speaks many things will also hear in reply; or does the eloquent man think himself righteous?
  chosen_spanish_reading: El que habla muchas cosas también oirá en respuesta; ¿o piensa el hombre elocuente que es justo?
  alternative_spanish_readings:
  - El que habla mucho también oirá en respuesta; ¿o piensa el hombre elocuente que es justo?
  - El que dice muchas cosas también oirá en respuesta; ¿o cree el hombre elocuente que es justo?
  rationale: No se suaviza la fuerza proverbial ni se convierte en explicación libre. La forma elegida conserva la observación moral sobre la abundancia de palabras y la ironía de la pregunta retórica final.
  doctrine_reference: sabiduría proverbial; Job 11:2 (cita aludida)
translation_notes:
  revision_awareness: La revisión inglesa aclaró que la cita continúa sin cerrar prematuramente después de la primera cláusula. La redacción española mantiene una sola cita continua, con punto y coma interno equivalente para separar las dos mitades del dicho sin sugerir cambio de voz.
  spanish_consistency_notes:
  - Se usa «justo» para δίκαιος en sentido moral, en coherencia con el registro bíblico del pasaje.
  - Se conserva «el hombre elocuente» en lugar de un equivalente más coloquial para respetar la revisión inglesa de εὐλάλος.
  - La cita se cierra una sola vez al final, siguiendo la observación de la revisión sobre la continuidad del texto citado.
