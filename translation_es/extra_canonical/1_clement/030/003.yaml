  language: en
  yaml_path: translation/extra_canonical/1_clement/030/003.yaml
  text: Let us therefore cling to those to whom grace has been given from God. Let us clothe ourselves with concord, being humble-minded and self-controlled, keeping ourselves far from every whispering and slander, being justified by works and not by words.
