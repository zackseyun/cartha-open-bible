translation:
  language: es
  text: Adhirámonos, pues, a aquellos a quienes Dios ha dado gracia. Revistámonos de concordia, siendo humildes de mente y con dominio propio, manteniéndonos lejos de toda murmuración y maledicencia, siendo justificados por obras y no por palabras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κολληθῶμεν οὖν ἐκείνοις
  english_pob_choice: Let us therefore cling to those
  chosen_spanish: Unámonos, pues, a aquellos
  alternatives_spanish:
  - Aferrémonos, pues, a aquellos
  - Adhirámonos, pues, a aquellos
  lexicon: κολλάω
  rationale: El griego expresa unión o adhesión estrecha. En español, 'unámonos' conserva la idea de adherirse/comportarse en estrecha unión de manera natural y eclesial, sin sonar mecánico. 'Aferrémonos' sería más intenso pero menos fluido aquí.
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: χάρις
  rationale: La equivalencia estándar y teológicamente estable en este contexto es 'gracia'. 'Favor' podría capturar el matiz, pero debilita el término técnico ya presente en la tradición y en el texto POB.
- source_word: ἐνδυσώμεθα τὴν ὁμόνοιαν
  english_pob_choice: Let us clothe ourselves with concord
  chosen_spanish: Revistámonos de la concordia
  alternatives_spanish:
  - Vistámonos de concordia
  - Pongámonos la concordia
  lexicon: ἐνδύω / ὁμόνοια
  rationale: '''Revistámonos'' reproduce la imagen de vestirse con una cualidad; ''concordia'' comunica bien ὁμόνοια en español eclesial. ''Unanimidad'' sería más literal etimológicamente pero menos natural y más restringido.'
- source_word: ταπεινοφρονοῦντες
  english_pob_choice: being humble-minded
  chosen_spanish: siendo humildes de mente
  alternatives_spanish:
  - siendo humildes de pensamiento
  - con humildad de mente
  lexicon: ταπεινοφρονέω
  rationale: La forma POB 'humble-minded' apunta al estado interior de la mente. 'Humildes de mente' mantiene el paralelismo y la fuerza descriptiva, sin reducirlo a mera conducta externa.
- source_word: ἐγκρατευόμενοι
  english_pob_choice: self-controlled
  chosen_spanish: dueños de nosotros mismos
  alternatives_spanish:
  - templados
  - dominio propio
  lexicon: ἐγκρατεύομαι
  rationale: '''Dueños de nosotros mismos'' expresa el autocontrol de manera viva y comprensible. ''Dominio propio'' es posible, pero suena más abstracto; ''templados'' no siempre comunica el control interior.'
- source_word: ψιθυρισμοῦ καὶ καταλαλιᾶς
  english_pob_choice: whispering and slander
  chosen_spanish: murmuración y calumnia
  alternatives_spanish:
  - susurro y difamación
  - murmullos y habladuría maliciosa
  lexicon: ψιθυρισμός / καταλαλιά
  rationale: '''Murmuración y calumnia'' recoge bien la combinación de habla secreta/insidiosa y habla dañina contra otros. ''Calumnia'' puede ser más fuerte que el griego en algunos contextos, pero aquí corresponde al efecto polémico del par.'
- source_word: ἔργοις δικαιούμενοι καὶ μὴ λόγοις
  english_pob_choice: being justified by works and not by words
  chosen_spanish: siendo justificados por las obras y no por las palabras
  alternatives_spanish:
  - siendo vindicados por las obras y no por las palabras
  - siendo declarados justos por obras y no por palabras
  lexicon: δικαιόω
  rationale: '''Justificados'' sigue la elección POB y conserva la tensión teológica/legal del verbo. ''Vindicados'' interpretaría más estrechamente la idea; ''declarados justos'' explicita demasiado el sentido.'
theological_decisions:
- issue: La relación entre 'gracia' y la conducta comunitaria
  english_pob_reading: grace has been given from God; therefore cling to those who possess it
  chosen_spanish_reading: la gracia ha sido concedida por Dios; por tanto, unirnos a quienes la han recibido
  alternative_spanish_readings:
  - la gracia ha sido dada por Dios; por tanto, adherirnos a ellos
  - el favor ha sido concedido por Dios; por tanto, unirnos a ellos
  rationale: El texto vincula don divino y solidaridad comunitaria. Mantener 'gracia' evita diluir el motivo teológico central y preserva el nexo causal implícito del 'pues'.
  doctrine_reference: gracia divina y comunión de los creyentes
- issue: '''Justificados por obras'' sin armonización doctrinal externa'
  english_pob_reading: being justified by works and not by words
  chosen_spanish_reading: siendo justificados por las obras y no por las palabras
  alternative_spanish_readings:
  - siendo vindicados por las obras y no por las palabras
  - siendo considerados justos por las obras y no por las palabras
  rationale: Se conserva la formulación fuerte del griego y del POB, sin suavizarla hacia categorías que resolverían la tensión con otras tradiciones. La tarea exige no borrar una tensión léxica/teológica documentada.
  doctrine_reference: justificación/vindicación por obras en el enunciado del texto
- issue: Énfasis moral comunitario en vez de mero interiorismo
  english_pob_reading: with concord, humble-minded, self-controlled, far from whispering and slander
  chosen_spanish_reading: concordia, humildad de mente, dominio propio, lejos de murmuración y calumnia
  alternative_spanish_readings:
  - unidad, humildad, autocontrol, lejos de chismes y difamación
  rationale: El pasaje combina virtud interior, orden comunitario y control del habla. 'Concordia' y 'murmuración/calumnia' conservan ese tejido moral sin modernizarlo excesivamente.
  doctrine_reference: ética comunitaria cristiana
- issue: '''λόγοις'' como ''palabras'''
  english_pob_reading: not by words
  chosen_spanish_reading: no por las palabras
  alternative_spanish_readings:
  - no por discursos
  - no por meras palabras
  rationale: '''Palabras'' mantiene la oposición directa del texto. Añadir ''meras'' introduciría un matiz interpretativo no explícito.'
  doctrine_reference: primacía de obras sobre discurso vacío
translation_notes:
  revision_awareness: La revisión más reciente informó high_agreement (1.0) y ninguna modificación necesaria; el draft español sigue esa lectura estable y no introduce cambios textuales ni interpretativos más allá de la adaptación idiomática al español.
  spanish_consistency_notes:
  - Se mantiene 'gracia' para χάρις y no 'favor', conforme al valor teológico central del pasaje.
  - '''Revistámonos'' conserva la metáfora de vestirse con una virtud colectiva.'
  - '''Justificados por las obras y no por las palabras'' reproduce la tensión del original sin resolverla mediante paráfrasis doctrinal.'
  - Se usa vocabulario eclesial claro pero no arcaizante, en línea con un español bíblico moderno y digno.
