  text: κολληθῶμεν οὖν ἐκείνοις, οἷς ἡ χάρις ἀπὸ τοῦ θεοῦ δεδοται· ἐνδυσώμεθα τὴν ὁμόνοιαν ταπεινοφρονοῦντες, ἐγκρατευόμενοι, ἀπὸ παντὸς ψιθυρισμοῦ καὶ καταλαλιᾶς πόρρω ἑαυτοὺς ποιοῦντες, ἔργοις δικαιούμενοι καὶ μὴ λόγοις.
