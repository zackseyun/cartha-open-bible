translation:
  language: es
  text: Que nuestra alabanza esté en Dios y no de nosotros mismos, porque Dios aborrece a los que se alaban a sí mismos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ἔπαινος ἡμῶν
  english_pob_choice: our praise
  chosen_spanish: nuestra alabanza
  alternatives_spanish:
  - nuestro elogio
  - nuestra gloria
  lexicon: ἔπαινος
  rationale: El sustantivo denota alabanza/elogio; en este contexto exhortativo, "alabanza" es el equivalente más natural en español y conserva el sentido de honra dirigida a Dios.
- source_word: ἔστω
  english_pob_choice: Let ... be
  chosen_spanish: esté
  alternatives_spanish:
  - sea
  - permanezca
  lexicon: εἰμί
  rationale: La forma imperativa de deseo se expresa con naturalidad en español como "esté"; mantiene la fuerza exhortativa sin añadir contenido.
- source_word: ἐν θεῷ
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - en Yahvé
  - ante Dios
  lexicon: θεός
  rationale: El griego usa θεός de manera directa; aquí el referente es Dios en sentido general, por lo que "Dios" es la equivalencia natural y fiel.
- source_word: μὴ ἐξ αὐτῶν
  english_pob_choice: not from ourselves
  chosen_spanish: no en nosotros mismos
  alternatives_spanish:
  - no de nosotros
  - no proceda de nosotros
  lexicon: ἐκ + pronombre
  rationale: La construcción contrasta el origen de la alabanza. En español, "no en nosotros mismos" reproduce la oposición retórica entre estar "en Dios" y no tener su fuente en uno mismo, conservando la idea de procedencia sin volverla rígida.
- source_word: αὐτεπανέτους
  english_pob_choice: those who praise themselves
  chosen_spanish: a los que se alaban a sí mismos
  alternatives_spanish:
  - a los autosuficientes en su alabanza
  - a los autoelogiosos
  lexicon: αὐτεπαινέτος
  rationale: El adjetivo es rarísimo y significa literalmente algo como "autoalabado". En español, la perífrasis "los que se alaban a sí mismos" comunica el valor léxico con claridad y evita un neologismo opaco.
- source_word: μισεῖ
  english_pob_choice: hates
  chosen_spanish: aborrece
  alternatives_spanish:
  - odia
  - rechaza
  lexicon: μισέω
  rationale: '"Aborrece" conserva la fuerza ética del verbo sin sonar excesivamente coloquial; en registro bíblico español comunica rechazo fuerte y personal.'
theological_decisions:
- issue: Fuente y dirección correcta de la alabanza
  english_pob_reading: Let our praise be in God and not from ourselves
  chosen_spanish_reading: Que nuestra alabanza esté en Dios y no en nosotros mismos
  alternative_spanish_readings:
  - Que nuestra alabanza sea de Dios y no nuestra
  - Que nuestra alabanza provenga de Dios y no de nosotros
  rationale: 'El griego contrapone dos orígenes/ámbitos: Dios como esfera o fundamento de la alabanza, frente al yo como fuente autónoma. La redacción española mantiene esa tensión sin convertirla en una afirmación dogmática más fuerte que el texto.'
  doctrine_reference: Humildad delante de Dios; rechazo de la autoexaltación
- issue: Sentido moral de la advertencia final
  english_pob_reading: God hates those who praise themselves
  chosen_spanish_reading: porque Dios aborrece a los que se alaban a sí mismos
  alternative_spanish_readings:
  - porque Dios odia a los que se elogian a sí mismos
  - porque Dios rechaza a los autoelogiosos
  rationale: 'El participio sustantivado tiene un matiz caracterológico: no es una vez aislada de jactancia, sino una disposición de autoalabanza. La traducción conserva ese alcance sin exagerar más allá de lo que el griego expresa.'
  doctrine_reference: Proverbial wisdom against orgullo y jactancia
translation_notes:
  revision_awareness: La revisión más reciente indica high_agreement y no registró cambios; por ello, el borrador español sigue de cerca el sentido confirmado por la tradición auditada inglesa y el griego normalizado.
  spanish_consistency_notes:
  - Se mantuvo "Dios" para θεός conforme al estándar del proyecto y al contexto general del enunciado.
  - Se evitó "SEÑOR" porque el texto griego usa θεός, no κύριος.
  - Se conservó un registro bíblico natural en español, sin calcos innecesarios ni terminología eclesiástica ajena al original.
