review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: una exhortación a que la alabanza tenga su referencia en Dios y no en el yo, seguida por la razón de que Dios detesta a los autoelogiosos. Sin embargo, la frase española ''no en nosotros mismos'' debilita y desplaza el contraste de ἐν θεῷ ... μὴ ἐξ αὐτῶν, que opone ''en Dios'' a ''de nosotros mismos''.'
  spanish_quality_summary: El español es claro y digno, pero la coordinación 'en Dios y no en nosotros mismos' suena menos precisa que 'en Dios y no de nosotros mismos' o una reformulación equivalente. El resto del verso es natural y legible. 'Aborrece' funciona bien en registro bíblico.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: θεός se traduce correctamente como ''Dios''. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La principal cuestión es sintáctico-semántica, no de glosario.'
  issues:
  - severity: medium
    issue: La traducción de μὴ ἐξ αὐτῶν como 'no en nosotros mismos' no preserva con suficiente fidelidad el valor de ἐξ ('de, desde, procedente de').
    rationale: El griego contrasta esfera/fundamento ('en Dios') con procedencia ('no de nosotros mismos'). Repetir 'en' en español homogeneiza dos preposiciones distintas y puede sugerir solo ubicación o enfoque, no origen/autofuente.
  revised_spanish_text: Que nuestra alabanza esté en Dios y no de nosotros mismos, porque Dios aborrece a los que se alaban a sí mismos.
  revision_rationale: Se ajusta 'no en nosotros mismos' a 'no de nosotros mismos' para reflejar mejor ἐξ αὐτῶν y conservar el contraste original entre Dios como referencia/fundamento y el yo como fuente de autoalabanza. No se requieren notas.
