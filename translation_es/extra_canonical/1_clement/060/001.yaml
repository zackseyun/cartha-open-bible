  to: Porque tú has manifestado el orden eterno del mundo mediante tus obras. Tú, Señor, creaste la tierra habitada, fiel en todas las generaciones, justo en tus juicios, admirable en poder y majestad, sabio al crear y entendido al establecer las cosas que han llegado a ser, bueno en lo visible y fiel para con los que han puesto su confianza en ti, misericordioso y compasivo. Perdónanos nuestras obras de iniquidad, nuestros actos de injusticia, nuestras transgresiones y nuestras faltas. 2 No tomes en cuenta todo pecado de tus esclavos[a] y esclavas[b], sino purifícanos con la purificación de tu verdad, y endereza nuestros pasos para andar en santidad de corazón y hacer lo que es bueno y agradable delante de ti y delante de nuestros gobernantes. 3 Sí, Soberano, haz resplandecer tu rostro sobre nosotros para bien, en paz, para que seamos cubiertos por tu mano poderosa y librados de todo pecado por tu brazo levantado; y rescátanos de los que nos odian injustamente. 4 Danos armonía y paz a nosotros
