source:
  edition: Funk 1901 (normalized OCR)
  text: Σὺ γὰρ τὴν ἀέναον τοῦ κόσμου σύστασιν διὰ τῶν ἐνεργουμένων ἐφανεροποίησας· σύ, κύριε, τὴν οἰκουμένην ἔκτισας, ὁ πιστὸς ἐν πάσαις ταῖς γενεαῖς, δίκαιος ἐν τοῖς κρίμασιν, θαυμαστὸς ἐν ἰσχύϊ καὶ μεγαλοπρεπείᾳ, ὁ σοφὸς ἐν τῷ κτίζειν καὶ συνετὸς ἐν τῷ τὰ γενόμενα ἑδράσαι, ὁ ἀγαθὸς ἐν τοῖς ὁρωμένοις καὶ πιστὸς ἐν τοῖς πεποιθόσιν ἐπὶ σέ, ἐλεῆμον καὶ οἰκτίρμον, ἄφες ἡμῖν τὰς ἀνομίας ἡμῶν καὶ τὰς ἀδικίας καὶ τὰ παραπτώματα καὶ πλημμελείας. 2. μὴ λογίσῃ πᾶσαν ἁμαρτίαν δούλων σου καὶ παιδισκῶν, ἀλλὰ καθάρισον ἡμᾶς τὸν καθαρισμὸν τῆς σῆς ἀληθείας, καὶ κατεύθυνον τὰ διαβήματα ἡμῶν ἐν ὁσιότητι καρδίας πορεύεσθαι καὶ ποιεῖν τὰ καλὰ καὶ εὐάρεστα ἐνώπιόν σου καὶ ἐνώπιον τῶν ἀρχόντων ἡμῶν. 3. ναί, δέσποτα, ἐπίφανον τὸ πρόσωπών σου ἐφ’ ἡμᾶς εἰς ἀγαθὰ ἐν εἰρήνῃ, εἰς τὸ σκεπασθῆναι ἡμᾶς τῇ χειρί σου τῇ κραταιᾷ καὶ ῥυσθῆναι ἀπὸ πάσης ἁμαρτίας τῷ βραχίονί σου τῷ ὑψηλῷ, καὶ ῥῦσαι ἡμᾶς ἀπὸ τῶν μισούντων ἡμᾶς ἀδίκως. 4. δὸς ὁμόνοιαν καὶ εἰρήνην ἡμῖν τε καὶ πᾶσιν τοῖς κατοικοῦσιν τὴν γῆν, καθὼς ἔδωκας τοῖς
    πατράσιν ἡμῶν, ἐπικαλουμένων σε αὐτῶν ὁσίως ἐν πίστει καὶ ἀληθείᾳ, ὑπηκόους γινομένους τῷ παντοκράτορι καὶ παναρέτῳ ὀνόματί σου, τοῖς τε ἄρχουσιν καὶ ἡγουμένοις ἡμῶν ἐπὶ τῆς γῆς.
