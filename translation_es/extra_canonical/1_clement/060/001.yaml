translation:
  language: es
  text: Porque tú has manifestado el orden eterno del mundo mediante tus obras. Tú, Señor, creaste la tierra habitada, fiel en todas las generaciones, justo en tus juicios, admirable en poder y majestad, sabio al crear y entendido al establecer las cosas que han llegado a ser, bueno en lo visible y fiel para con los que han puesto su confianza en ti, misericordioso y compasivo. Perdónanos nuestras obras de iniquidad, nuestros actos de injusticia, nuestras transgresiones y nuestras faltas. 2 No tomes en cuenta todo pecado de tus esclavos[a] y esclavas[b], sino purifícanos con la purificación de tu verdad, y endereza nuestros pasos para andar en santidad de corazón y hacer lo que es bueno y agradable delante de ti y delante de nuestros gobernantes. 3 Sí, Soberano, haz resplandecer tu rostro sobre nosotros para bien, en paz, para que seamos cubiertos por tu mano poderosa y librados de todo pecado por tu brazo levantado; y rescátanos de los que nos odian injustamente. 4 Danos armonía y paz a
    nosotros y a todos los que habitan la tierra, como la diste a nuestros padres cuando te invocaban en santidad, en fe y verdad, siendo obedientes a tu nombre todopoderoso y plenamente virtuoso, y a nuestros gobernantes y líderes sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''esclavos'' traduce aquí δούλων como término de condición social real, no como simple ''siervos''.'
    reason: lexical_alternative
  - marker: b
    text: '''esclavas'' reproduce el paralelo femenino explícito de παιδισκῶν y mantiene la simetría del griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀέναον
  english_pob_choice: everlasting
  chosen_spanish: eterno
  alternatives_spanish:
  - perpetuo
  - sin fin
  lexicon: LSJ
  rationale: El griego indica continuidad duradera e incesante; en español 'eterno' comunica bien esa permanencia del orden del mundo sin añadir una afirmación filosófica más fuerte de la necesaria.
- source_word: σύστασιν
  english_pob_choice: order
  chosen_spanish: orden
  alternatives_spanish:
  - constitución
  - estructura
  - establecimiento
  lexicon: LSJ
  rationale: En el contexto cósmico, 'orden' transmite la disposición y consistencia del mundo de manera natural en español y conserva el sentido creacional.
- source_word: ἐνεργουμένων
  english_pob_choice: your workings
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus operaciones
  - tus actos obrantes
  - las cosas que haces
  lexicon: LSJ
  rationale: La idea es que Dios hace visible la constitución del mundo mediante su acción eficaz; 'tus obras' es una equivalencia sobria y clara en español, adecuada al registro doxológico.
- source_word: οἰκουμένην
  english_pob_choice: the inhabited earth
  chosen_spanish: la tierra habitada
  alternatives_spanish:
  - el mundo habitado
  - el mundo
  lexicon: LSJ
  rationale: Mantiene el matiz concreto de la tierra poblada, no solo 'mundo' en sentido abstracto.
- source_word: κρίμασιν
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - decisiones
  - actos de juicio
  lexicon: LSJ
  rationale: '''Juicios'' conserva el peso judicial y moral del término en una alabanza a la justicia divina.'
- source_word: ἑδράσαι
  english_pob_choice: establishing
  chosen_spanish: establecer
  alternatives_spanish:
  - afirmar
  - hacer firmes
  - asentar
  lexicon: LSJ
  rationale: El verbo expresa hacer firmes o asentar las cosas creadas; 'establecer' funciona bien en español y mantiene la imagen de consolidación.
- source_word: πεποιθόσιν
  english_pob_choice: those who have put their trust in you
  chosen_spanish: los que han puesto su confianza en ti
  alternatives_spanish:
  - los que confían en ti
  - los que están confiados en ti
  lexicon: LSJ
  rationale: El participio perfecto sugiere una confianza ya asumida y persistente; esta formulación preserva ese matiz mejor que un presente simple.
- source_word: ἐλεῆμον καὶ οἰκτίρμον
  english_pob_choice: merciful and compassionate
  chosen_spanish: misericordioso y compasivo
  alternatives_spanish:
  - lleno de misericordia y compasión
  - misericordioso y piadoso
  lexicon: LSJ
  rationale: Es una pareja natural en español que conserva las dos cualidades divinas sin sobrecargar el estilo.
- source_word: ἀνομίας
  english_pob_choice: lawless deeds
  chosen_spanish: obras de iniquidad
  alternatives_spanish:
  - actos de impiedad
  - obras sin ley
  - iniquidades
  lexicon: LSJ
  rationale: El plural señala actos concretos de ruptura con el orden de Dios; 'obras de iniquidad' conserva esa fuerza y un registro penitencial adecuado.
- source_word: ἀδικίας
  english_pob_choice: unrighteous acts
  chosen_spanish: actos de injusticia
  alternatives_spanish:
  - injusticias
  - obras injustas
  lexicon: LSJ
  rationale: Distingue este término de ἀνομίας y mantiene su carga moral y forense.
- source_word: παραπτώματα
  english_pob_choice: trespasses
  chosen_spanish: transgresiones
  alternatives_spanish:
  - faltas
  - desvíos
  - traspiés
  lexicon: LSJ
  rationale: '''Transgresiones'' es claro, tradicional y fiel al registro de una oración penitencial.'
- source_word: πλημμελείας
  english_pob_choice: failings
  chosen_spanish: faltas
  alternatives_spanish:
  - fallos
  - errores
  - deslices
  lexicon: LSJ
  rationale: Captura la idea de fallos o negligencias, distinta de las transgresiones anteriores.
- source_word: μὴ λογίσῃ
  english_pob_choice: do not count ... against
  chosen_spanish: no tomes en cuenta
  alternatives_spanish:
  - no imputes
  - no recuentes
  - no consideres
  lexicon: LSJ
  rationale: Expresa bien la metáfora contable/judicial en español contemporáneo sin perder el sentido forense.
- source_word: δούλων σου καὶ παιδισκῶν
  english_pob_choice: slaves and female slaves
  chosen_spanish: esclavos y esclavas
  alternatives_spanish:
  - siervos y siervas
  - criados y criadas
  lexicon: LSJ
  rationale: Los términos griegos designan personas en condición de esclavitud/dependencia; el español 'esclavos y esclavas' conserva la fuerza social y la precisión de género que el texto requiere.
- source_word: καθάρισον ἡμᾶς τὸν καθαρισμὸν τῆς σῆς ἀληθείας
  english_pob_choice: cleanse us with the cleansing of your truth
  chosen_spanish: purifícanos con la purificación de tu verdad
  alternatives_spanish:
  - límpianos con la limpieza de tu verdad
  - purifícanos por la purificación de tu verdad
  lexicon: LSJ
  rationale: La repetición enfática del griego se conserva en español; 'purificación de tu verdad' mantiene el paralelismo retórico sin suavizarlo.
- source_word: κατεύθυνον τὰ διαβήματα ἡμῶν
  english_pob_choice: direct our steps
  chosen_spanish: endereza nuestros pasos
  alternatives_spanish:
  - guía nuestros pasos
  - dirige nuestros pasos
  lexicon: LSJ
  rationale: '''Endereza'' expresa con más viveza la idea de orientar rectamente el caminar, conservando la metáfora bíblica.'
- source_word: ὁσιότητι καρδίας
  english_pob_choice: holiness of heart
  chosen_spanish: santidad de corazón
  alternatives_spanish:
  - piedad de corazón
  - pureza de corazón
  lexicon: LSJ
  rationale: '''Santidad'' conserva el matiz de ὁσιότης como devoción y rectitud cultual-moral interior.'
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Soberano
  alternatives_spanish:
  - Señor
  - Dueño
  - Maestro
  lexicon: LSJ
  rationale: La oración distingue este vocativo de κύριε; 'Soberano' conserva reverencia y la noción de autoridad absoluta sin repetir exactamente 'Señor'.
- source_word: ἐπίφανον τὸ πρόσωπόν σου
  english_pob_choice: make your face shine
  chosen_spanish: haz resplandecer tu rostro
  alternatives_spanish:
  - haz brillar tu faz
  - muestra tu rostro resplandeciente
  lexicon: LSJ
  rationale: Recoge el idioma bíblico del rostro/faz que resplandece como bendición y favor.
- source_word: σκεπασθῆναι
  english_pob_choice: be sheltered
  chosen_spanish: seamos cubiertos
  alternatives_spanish:
  - seamos resguardados
  - seamos protegidos
  lexicon: LSJ
  rationale: La imagen es de ser cubiertos por la mano divina; 'cubiertos' preserva esa metáfora más directamente que un término abstracto.
- source_word: ῥυσθῆναι
  english_pob_choice: be delivered
  chosen_spanish: librados
  alternatives_spanish:
  - rescatados
  - liberados
  lexicon: LSJ
  rationale: En el paralelismo de protección y auxilio, 'librados' expresa adecuadamente la liberación de peligro o mal.
- source_word: ὁμόνοιαν
  english_pob_choice: harmony
  chosen_spanish: armonía
  alternatives_spanish:
  - unidad
  - concordia
  lexicon: LSJ
  rationale: Es un término importante en 1 Clemente; 'armonía' comunica bien la cohesión relacional sin reducirla a uniformidad.
- source_word: ὁσίως
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - piadosamente
  - con devoción
  lexicon: LSJ
  rationale: Mantiene continuidad léxica con ὁσιότητι y su sentido de devoción/rectitud ante Dios.
- source_word: παναρέτῳ
  english_pob_choice: all-virtuous
  chosen_spanish: plenamente virtuoso
  alternatives_spanish:
  - todopoderoso y todo virtuoso
  - de toda virtud
  lexicon: LSJ
  rationale: El compuesto intensifica la excelencia moral total; 'plenamente virtuoso' conserva la idea sin sonar artificial en español.
- source_word: ἄρχουσιν καὶ ἡγουμένοις
  english_pob_choice: rulers and leaders
  chosen_spanish: gobernantes y líderes
  alternatives_spanish:
  - autoridades y jefes
  - príncipes y dirigentes
  lexicon: LSJ
  rationale: Reproduce el par de términos cívicos de forma clara y no demasiado técnica para el español actual.
theological_decisions:
- issue: Distinción entre κύριε y δέσποτα
  english_pob_reading: Render κύριε as 'Lord' and δέσποτα as 'Master'
  chosen_spanish_reading: Traducir κύριε como 'Señor' y δέσποτα como 'Soberano'
  alternative_spanish_readings:
  - Traducir ambos como 'Señor'
  - Traducir δέσποτα como 'Maestro'
  rationale: El griego varía el tratamiento a Dios y conviene preservar esa diferencia retórica. 'Soberano' comunica autoridad reverente sin borrar la distinción.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve meaning and distinctions where context supports.'
- issue: Lenguaje de esclavitud para δούλων / παιδισκῶν
  english_pob_reading: Use 'slaves and female slaves'
  chosen_spanish_reading: Usar 'esclavos y esclavas'
  alternative_spanish_readings:
  - siervos y siervas
  - servidores y servidoras
  rationale: El texto griego es socialmente fuerte y de género explícito; el español debe conservar esa fuerza y no suavizarla eclesiásticamente sin base textual.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; gender-accurate over gender-neutral.'
- issue: Petición por los gobernantes civiles
  english_pob_reading: Retain explicit prayer for 'our rulers and leaders upon the earth'
  chosen_spanish_reading: Mantener la oración explícita por 'nuestros gobernantes y líderes sobre la tierra'
  alternative_spanish_readings:
  - nuestras autoridades
  - nuestros magistrados
  rationale: La oración de 1 Clemente incluye claramente a las autoridades civiles; la traducción debe conservar ese alcance para no diluir su textura política y eclesial.
  doctrine_reference: 'DOCTRINE.md: Preserve paraenetic and civic scope where the source does.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail en inglés, que ajustó el segmento de δούλων para mantener mayor cercanía léxica. En español se optó por conservar la fuerza social y el género explícito con 'esclavos y esclavas', alineado con la intención revisada y con la terminología POB de precisión social.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριε y 'Soberano' para δέσποτα, preservando la distinción del vocativo griego.
  - Se usó 'la tierra habitada' para οἰκουμένην por ser más concreto y natural en español.
  - Se conservó la repetición enfática 'purifícanos con la purificación de tu verdad' como rasgo retórico del original.
  - Se evitó 'SEÑOR' como máscara tipográfica y se empleó 'Señor' en español corriente, conforme al criterio de nombre/título.
  - Se mantuvo el lenguaje fuerte de esclavitud sin sustituciones eclesiásticas suavizantes.
