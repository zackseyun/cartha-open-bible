base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/060/001.yaml
  text: For you have made manifest the everlasting order of the world through your workings. You, Lord, created the inhabited earth, faithful throughout all generations, righteous in your judgments, marvelous in might and majesty, wise in creating and understanding in establishing the things that have come to be, good in the things that are seen and faithful toward those who have put their trust in you, merciful and compassionate. Forgive us our lawless deeds and our unrighteous acts and our trespasses and failings. 2 Do not count every sin of your slaves and female slaves, but cleanse us with the cleansing of your truth, and direct our steps to walk in holiness of heart and to do the things that are good and pleasing before you and before our rulers. 3 Yes, Master, make your face shine upon us for good in peace, so that we may be sheltered by your mighty hand and delivered from every sin by your uplifted arm; and rescue us from those who hate us unjustly. 4 Give harmony and peace to us
    and to all who dwell on the earth, just as you gave them to our fathers when they called upon you in holiness, in faith and truth, becoming obedient to your almighty and all-virtuous name, and to our rulers and leaders upon the earth.
