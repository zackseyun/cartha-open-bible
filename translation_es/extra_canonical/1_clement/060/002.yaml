id: 1CLEM.60.2
reference: 1 Clement 60:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: μὴ λογίσῃ πᾶσαν ἁμαρτίαν δούλων σου καὶ παιδισκῶν, ἀλλὰ καθάρισον ἡμᾶς τὸν καθαρισμὸν τῆς σῆς ἀληθείας, καὶ κατεύθυνον τὰ διαβήματα ἡμῶν ἐν ὁσιότητι καρδίας πορεύεσθαι καὶ ποιεῖν τὰ καλὰ καὶ εὐάρεστα ἐνώπιόν σου καὶ ἐνώπιον τῶν ἀρχόντων ἡμῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/060/002.yaml
  text: Do not count every sin of your servants and maidservants[a], but cleanse us with the cleansing of your truth, and direct our steps to walk in holiness of heart and to do the things that are good and pleasing before you and before our rulers.
  footnotes:
  - marker: a
    text: Or 'Do not count every sin of your male slaves and female slaves against them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:20Z'
    unchanged: false
    changes_summary: Changed 'any sin' to 'every sin' to more closely reflect πᾶσαν ἁμαρτίαν ('every sin/all sin').
translation:
  language: es
  text: No tomes en cuenta ningún pecado de tus siervos y siervas[a], sino límpianos con la purificación de tu verdad, y dirige nuestros pasos para que andemos en santidad de corazón y hagamos lo bueno y agradable delante de ti y delante de nuestros gobernantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''de tus esclavos y esclavas''.'
    reason: alternative_literal_rendering
lexical_decisions:
- source_word: μὴ λογίσῃ πᾶσαν ἁμαρτίαν
  english_pob_choice: Do not count every sin
  chosen_spanish: No tomes en cuenta ningún pecado
  alternatives_spanish:
  - No cuentes ningún pecado
  - No imputes ningún pecado
  - No consideres ningún pecado
  lexicon: λογίζομαι; πᾶς; ἁμαρτία
  rationale: 'El griego usa la negación idiomática μὴ con πᾶσαν ἁμαρτίαν, que en este contexto pide sentido totalizador: no contar ningún pecado. En español, ''ningún pecado'' comunica mejor la fuerza del ruego que ''cada pecado'' o ''todo pecado'', y evita la ambigüedad de contar algunos pecados sí y otros no.'
- source_word: δούλων σου καὶ παιδισκῶν
  english_pob_choice: your servants and maidservants
  chosen_spanish: tus siervos y siervas
  alternatives_spanish:
  - tus esclavos y esclavas
  - tus servidores y servidoras
  lexicon: δοῦλος; παιδίσκη
  rationale: El audit trail inglés ya corrigió la lectura demasiado literal de 'male slaves and female slaves' hacia el registro litúrgico 'servants and maidservants'. En español, 'siervos y siervas' conserva ese tono bíblico y evita la aspereza de 'esclavos', aunque 'siervo' no sea el valor léxico más fuerte en otros contextos.
- source_word: καθάρισον ἡμᾶς τὸν καθαρισμὸν τῆς σῆς ἀληθείας
  english_pob_choice: cleanse us with the cleansing of your truth
  chosen_spanish: límpianos con la purificación de tu verdad
  alternatives_spanish:
  - límpianos con la limpieza de tu verdad
  - purifícanos con la purificación de tu verdad
  lexicon: καθαρίζω; καθαρισμός; ἀλήθεια
  rationale: La duplicación 'cleanse us with the cleansing' debe mantenerse como construcción enfática, no simplificarse a una sola idea. 'Purificación de tu verdad' reproduce mejor el sustantivo καθαρισμός y deja visible la relación entre limpieza y verdad.
- source_word: κατεύθυνον τὰ διαβήματα ἡμῶν
  english_pob_choice: direct our steps
  chosen_spanish: dirige nuestros pasos
  alternatives_spanish:
  - endereza nuestros pasos
  - guía nuestros pasos
  lexicon: κατευθύνω; διαβήματα
  rationale: '''Dirige nuestros pasos'' es el equivalente natural y fiel para la petición de orientación moral y práctica. ''Endereza'' sugiere corrección de desvío, pero aquí el foco principal es la conducción de la conducta.'
- source_word: ὁσιότητι καρδίας
  english_pob_choice: holiness of heart
  chosen_spanish: santidad de corazón
  alternatives_spanish:
  - piedad de corazón
  - pureza de corazón
  lexicon: ὁσιότης; καρδία
  rationale: '''Santidad de corazón'' conserva el sustantivo de cualidad moral-religiosa sin reducirlo a limpieza ritual. ''Pureza'' podría sonar solo a ausencia de mancha; ''santidad'' transmite mejor la consagración interior.'
- source_word: τὰ καλὰ καὶ εὐάρεστα
  english_pob_choice: the things that are good and pleasing
  chosen_spanish: lo bueno y agradable
  alternatives_spanish:
  - las cosas buenas y agradables
  - lo que es bueno y agradable
  lexicon: καλός; εὐάρεστος
  rationale: 'La expresión funciona naturalmente en español como una sustantivación neutra: ''lo bueno y agradable''. Así se evita sobrecargar con ''cosas'' donde el griego puede ser más general.'
theological_decisions:
- issue: ¿'siervos y siervas' o 'esclavos y esclavas' para δοῦλοι/παιδίσκαι?
  english_pob_reading: your servants and maidservants
  chosen_spanish_reading: tus siervos y siervas
  alternative_spanish_readings:
  - tus esclavos y esclavas
  rationale: El propio historial inglés abandonó la formulación 'male slaves and female slaves against them' por una lectura litúrgica y semítica más natural. En español, 'siervos y siervas' conserva esa tradición de súplica comunitaria sin introducir un registro excesivamente duro que no parece buscado en esta oración.
  doctrine_reference: Uso litúrgico de lenguaje de súplica; recepción de fórmulas de origen LXX sin forzar una traducción socialmente más agresiva de lo que el contexto requiere.
- issue: ¿Cómo reflejar la relación entre verdad y purificación?
  english_pob_reading: cleanse us with the cleansing of your truth
  chosen_spanish_reading: límpianos con la purificación de tu verdad
  alternative_spanish_readings:
  - límpianos con la limpieza de tu verdad
  - purifícanos con la purificación de tu verdad
  rationale: La frase conserva la redundancia enfática del original sin convertirla en paráfrasis. 'Tu verdad' no se abstrae en una mera 'verdad' impersonal, porque el posesivo hace de la verdad un atributo y medio de la acción divina en la oración.
  doctrine_reference: Relación entre verdad divina y santificación/purificación en lenguaje de oración bíblica.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante sobre μὴ λογίσῃ πᾶσαν ἁμαρτίαν: se corrigió la idea errónea de ''not every sin'' por el sentido idiomático totalizador. La traducción española sigue esa revisión y evita una lectura distributiva. También se respetó el ajuste inglés de ''servants and maidservants'' frente a la formulación más dura de ''slaves'', tomando en cuenta el registro litúrgico de la petición.'
  spanish_consistency_notes:
  - Se preserva un tono de oración comunitaria solemne y bíblico, sin arcaísmos innecesarios.
  - '''Yahvé'' no aparece porque el texto griego aquí usa construcciones de segunda persona sin el tetragrámaton explícito.'
  - Se mantiene 'verdad' y 'purificación' con sustantivos afines para reflejar la estructura enfática del original.
  - '''Lo bueno y agradable'' se deja en forma neutra para no añadir ''cosas'' si el español puede entender la sustantivación naturalmente.'
