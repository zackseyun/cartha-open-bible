source:
  edition: Funk 1901 (normalized OCR)
  text: δὸς ὁμόνοιαν καὶ εἰρήνην ἡμῖν τε καὶ πᾶσιν τοῖς κατοικοῦσιν τὴν γῆν, καθὼς ἔδωκας τοῖς πατράσιν ἡμῶν, ἐπικαλουμένων σε αὐτῶν ὁσίως ἐν πίστει καὶ ἀληθείᾳ, ὑπηκόους γινομένους τῷ παντοκράτορι καὶ παναρέτῳ ὀνόματί σου, τοῖς τε ἄρχουσιν καὶ ἡγουμένοις ἡμῶν ἐπὶ τῆς γῆς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/060/004.yaml
  text: Give harmony and peace to us and to all who dwell on the earth[a], just as you gave them to our fathers when they called upon you in holiness, in faith and truth, becoming obedient to your almighty and all-virtuous name, and to our rulers and leaders upon the earth.
  footnotes:
  - marker: a
    text: Or 'Give harmony and peace to us and to all who dwell on the earth, just as you gave them to our fathers when they called upon you in holiness, in faith and truth, becoming obedient to your almighty and all-virtuous name, and to our rulers and leaders upon the earth.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:22Z'
    unchanged: false
    changes_summary: Replaced 'concord' with the more natural 'harmony.' Changed 'as we become obedient' to 'becoming obedient' to match the participial construction referring to 'our fathers,' not 'us.' Removed em dashes for smoother formal style.
translation:
  language: es
  text: Danos concordia y paz a nosotros y a todos los que habitan la tierra, así como se las diste a nuestros padres cuando te invocaban en santidad, en fe y en verdad, mientras nosotros nos hacemos obedientes a tu nombre todopoderoso y lleno de toda virtud, y a nuestros gobernantes y líderes sobre la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁμόνοια
  english_pob_choice: harmony
  chosen_spanish: concordia
  alternatives_spanish:
  - armonía
  - harmony
  lexicon: ὁμόνοια
  rationale: En 1 Clemente, el término tiene un matiz cívico y comunitario fuerte, cercano a unidad de ánimo/consenso; 'concordia' conserva mejor ese valor que 'armonía', que en español puede sonar más estético o musical.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz
  lexicon: εἰρήνη
  rationale: '''Paz'' es el equivalente natural y directo en español para εἰρήνη y mantiene el sentido relacional y comunitario del texto.'
- source_word: κατοικοῦσιν τὴν γῆν
  english_pob_choice: who dwell on the earth
  chosen_spanish: los que habitan la tierra
  alternatives_spanish:
  - los que viven en la tierra
  - los habitantes de la tierra
  lexicon: κατοικέω
  rationale: '''Habitan'' reproduce bien el participio de residencia y su tono bíblico sin volverse arcaizante.'
- source_word: ἐπικαλουμένων σε
  english_pob_choice: when they called upon you
  chosen_spanish: cuando te invocaban
  alternatives_spanish:
  - cuando te llamaban
  - al invocarte
  lexicon: ἐπικαλέομαι
  rationale: '''Invocar'' expresa con precisión el acto religioso de dirigirse a Dios; además conserva el registro solemne del original.'
- source_word: ὁσίως
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - piadosamente
  - con piedad
  lexicon: ὁσίως
  rationale: '''En santidad'' es la equivalencia más fiel y transparente para el adverbio, manteniendo el carácter moral/cultual de la expresión.'
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fe
  - fidelidad
  lexicon: πίστις
  rationale: En este contexto litúrgico de oración, 'fe' es la lectura más natural; 'fidelidad' podría sugerir un matiz más activo, pero no es necesario aquí.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - verdad
  lexicon: ἀλήθεια
  rationale: '''Verdad'' es la equivalencia directa y clara para ἀλήθεια.'
- source_word: ὑπηκόους γινομένους
  english_pob_choice: becoming obedient
  chosen_spanish: haciéndose obedientes
  alternatives_spanish:
  - llegando a ser obedientes
  - volviéndose obedientes
  lexicon: ὑπήκοος
  rationale: El participio debe referirse a los peticionarios en el flujo del ruego; 'haciéndose obedientes' conserva el carácter progresivo del participio y evita el error sintáctico señalado en la revisión.
- source_word: τῷ παντοκράτορι καὶ παναρέτῳ ὀνόματί σου
  english_pob_choice: your almighty and all-virtuous name
  chosen_spanish: tu nombre todopoderoso y lleno de toda virtud
  alternatives_spanish:
  - tu nombre omnipotente y enteramente virtuoso
  - tu nombre todopoderoso y de toda virtud
  lexicon: παντοκράτωρ; παναρετός
  rationale: '''Todopoderoso'' es el equivalente natural de παντοκράτωρ. Para παναρέτῳ, ''lleno de toda virtud'' mantiene el sentido de plenitud moral sin forzar un adjetivo poco idiomático como ''virtuoso'' aplicado a un nombre.'
- source_word: ἄρχουσιν καὶ ἡγουμένοις
  english_pob_choice: rulers and leaders
  chosen_spanish: gobernantes y líderes
  alternatives_spanish:
  - autoridades y dirigentes
  - príncipes y jefes
  lexicon: ἄρχων; ἡγούμενος
  rationale: '''Gobernantes y líderes'' reproduce el binomio con claridad en español contemporáneo y evita cargar ''príncipes'' o ''jefes'' con connotaciones no requeridas.'
theological_decisions:
- issue: Alcance de la petición de concordia y paz
  english_pob_reading: Give harmony and peace to us and to all who dwell on the earth
  chosen_spanish_reading: Da concordia y paz a nosotros y a todos los que habitan la tierra
  alternative_spanish_readings:
  - Da armonía y paz...
  - Da paz y concordia...
  rationale: La oración abarca tanto a la comunidad como a todos los habitantes de la tierra; 'concordia' destaca el aspecto comunitario y evita diluir la fuerza civil del término.
  doctrine_reference: Eclesiología y ética comunitaria en la oración intercesora
- issue: Relación sintáctica del participio ὑπηκόους γινομένους
  english_pob_reading: becoming obedient to your almighty and all-virtuous name
  chosen_spanish_reading: haciéndose obedientes a tu nombre todopoderoso y lleno de toda virtud
  alternative_spanish_readings:
  - siendo obedientes a tu nombre...
  - mientras se hacen obedientes...
  rationale: La revisión textual indica que el participio modifica a los peticionarios, no a 'nuestros padres'. La formulación española debe preservar esa relación y no introducir una subordinación temporal ajena.
  doctrine_reference: Gramática del texto y dirección correcta de la súplica
translation_notes:
  revision_awareness: 'El borrador fue revisado a partir de una evaluación que señaló un problema mayor en la sintaxis del participio griego ὑπηκόους γινομένους: debe referirse a los suplicantes (''nosotros''), no a ''nuestros padres''. La versión española evita ese error y conserva la estructura parentética del recuerdo a los padres. También se tuvo en cuenta la preferencia revisada de ''harmony'' a ''concord'', pero en español se eligió ''concordia'' por ser la mejor equivalencia semántica y estilística del término griego en 1 Clemente.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito en la segunda persona sin añadir fórmulas ajenas al texto.
  - '''Concordia'' se usa de manera consistente para ὁμόνοια en contexto cívico-eclesial.'
  - '''Haciéndose obedientes'' conserva el valor participial y evita una lectura que atribuya la obediencia a los padres.'
  - Se evita 'SEÑOR' por no aparecer el tetragrámaton ni κύριος en el versículo.
  - El registro busca ser bíblico y litúrgico sin depender de formulaciones tradicionales que oscurezcan la fuente griega.
