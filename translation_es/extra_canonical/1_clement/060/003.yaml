source:
  edition: Funk 1901 (normalized OCR)
  text: ναί, δέσποτα, ἐπίφανον τὸ πρόσωπών σου ἐφ’ ἡμᾶς εἰς ἀγαθὰ ἐν εἰρήνῃ, εἰς τὸ σκεπασθῆναι ἡμᾶς τῇ χειρί σου τῇ κραταιᾷ καὶ ῥυσθῆναι ἀπὸ πάσης ἁμαρτίας τῷ βραχίονί σου τῷ ὑψηλῷ, καὶ ῥῦσαι ἡμᾶς ἀπὸ τῶν μισούντων ἡμᾶς ἀδίκως.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/060/003.yaml
  text: Yes, Master, make your face shine upon us for good in peace, so that we may be sheltered by your mighty hand and delivered from every sin by your exalted arm, and rescue us from those who hate us unjustly.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:21Z'
    unchanged: false
    changes_summary: Changed 'uplifted arm' to 'exalted arm' for a more natural and accurate rendering of τῷ ὑψηλῷ; removed the semicolon for smoother syntax. All source elements are retained.
translation:
  language: es
  text: Sí, Soberano, haz resplandecer tu rostro sobre nosotros para bien, en paz, para que seamos amparados por tu mano poderosa y librados de todo pecado por tu brazo exaltado, y líbranos de los que nos odian injustamente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Soberano
  - Maestro
  lexicon: δεσπότης
  rationale: En español, «Señor» conserva el tono de autoridad suprema y oración directa del vocativo griego. «Dueño» o «Soberano» serían posibles, pero suenan menos naturales en una invocación litúrgica; «Maestro» debilita la fuerza de dominio del término.
- source_word: ἐπίφανον τὸ πρόσωπών σου ἐφ’ ἡμᾶς
  english_pob_choice: make your face shine upon us
  chosen_spanish: haz resplandecer tu rostro sobre nosotros
  alternatives_spanish:
  - haz brillar tu rostro sobre nosotros
  - haz que tu rostro resplandezca sobre nosotros
  lexicon: ἐπιφαίνω + πρόσωπον
  rationale: «Haz resplandecer» sigue de cerca la metáfora bíblica de luz favorable sobre el pueblo y mantiene la imagen del rostro divino sin endurecer el español.
- source_word: εἰς ἀγαθὰ ἐν εἰρήνῃ
  english_pob_choice: for good in peace
  chosen_spanish: para bien en paz
  alternatives_spanish:
  - para bienes en paz
  - para nuestro bien en paz
  lexicon: ἀγαθά + εἰρήνη
  rationale: «Para bien» reproduce el sentido teleológico del griego y es idiomático en español. Se evita pluralizar innecesariamente «ἀγαθά» porque el contexto favorece una finalidad general de beneficio.
- source_word: σκεπασθῆναι
  english_pob_choice: be sheltered
  chosen_spanish: seamos cubiertos
  alternatives_spanish:
  - seamos protegidos
  - seamos resguardados
  lexicon: σκεπάζω
  rationale: La idea de ser «cubiertos» conserva la imagen corporal del verbo griego y la relación con la mano divina. «Protegidos» explicita la función, pero pierde la metáfora.
- source_word: τῇ χειρί σου τῇ κραταιᾷ
  english_pob_choice: your mighty hand
  chosen_spanish: tu mano poderosa
  alternatives_spanish:
  - tu mano fuerte
  - tu mano poderosa y firme
  lexicon: χείρ + κραταιός
  rationale: «Poderosa» expresa la fuerza activa de κραταιά y es natural en español. «Fuerte» es posible, pero menos solemne; se mantiene el singular de «mano» conforme al texto.
- source_word: ῥυσθῆναι ἀπὸ πάσης ἁμαρτίας
  english_pob_choice: delivered from every sin
  chosen_spanish: librados de todo pecado
  alternatives_spanish:
  - rescatados de todo pecado
  - liberados de todo pecado
  lexicon: ῥύομαι + ἁμαρτία
  rationale: «Librados» sigue el valor de rescate/liberación de ῥύομαι y mantiene la formulación breve del POB. «Pecado» traduce ἁμαρτία de modo directo y claro en castellano.
- source_word: τῷ βραχίονί σου τῷ ὑψηλῷ
  english_pob_choice: your exalted arm
  chosen_spanish: tu brazo exaltado
  alternatives_spanish:
  - tu brazo encumbrado
  - tu brazo elevado
  lexicon: βραχίων + ὑψηλός
  rationale: Se conserva «brazo» como imagen bíblica de poder. «Exaltado» refleja mejor que «elevado» la valoración de ὑψηλός aquí, en línea con la revisión inglesa que prefirió «exalted arm».
- source_word: μισούντων ἡμᾶς ἀδίκως
  english_pob_choice: those who hate us unjustly
  chosen_spanish: los que nos odian injustamente
  alternatives_spanish:
  - los que nos aborrecen injustamente
  - quienes nos odian sin causa
  lexicon: μισέω + ἀδίκως
  rationale: «Odiar» es la correspondencia directa de μισέω y «injustamente» reproduce ἀδίκως sin introducir «sin causa», que sería una interpretación más específica.
theological_decisions:
- issue: Petición de la manifestación del rostro divino como favor protector
  english_pob_reading: make your face shine upon us for good in peace
  chosen_spanish_reading: haz resplandecer tu rostro sobre nosotros para bien en paz
  alternative_spanish_readings:
  - haz brillar tu rostro sobre nosotros para bien en paz
  - haz que tu rostro resplandezca sobre nosotros para bien en paz
  rationale: La frase conserva la súplica por la presencia favorable de Dios sin reducirla a una mera bendición abstracta. El lenguaje mantiene el trasfondo bíblico de favor y protección.
  doctrine_reference: Bendición divina y presencia favorable de Dios
- issue: Liberación del pecado junto con protección contra enemigos
  english_pob_reading: be sheltered by your mighty hand and delivered from every sin by your exalted arm, and rescue us from those who hate us unjustly
  chosen_spanish_reading: seamos cubiertos por tu mano poderosa y librados de todo pecado por tu brazo exaltado, y líbranos de los que nos odian injustamente
  alternative_spanish_readings:
  - seamos protegidos por tu mano poderosa y rescatados de todo pecado por tu brazo exaltado, y líbranos de los que nos odian injustamente
  - seamos cubiertos por tu mano poderosa y liberados de todo pecado por tu brazo exaltado, y rescátanos de los que nos odian injustamente
  rationale: 'El texto une dos ámbitos de salvación: preservación bajo la mano divina y liberación del pecado. Se conserva esa tensión sin convertirla en una sola idea espiritualizada.'
  doctrine_reference: Providencia divina, santificación y liberación del mal
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que sustituyó «uplifted arm» por «exalted arm» y eliminó el punto y coma por una sintaxis más fluida. El español refleja esa decisión con «brazo exaltado» y una única oración coordinada, manteniendo todos los elementos del griego.
  spanish_consistency_notes:
  - Se conserva un registro litúrgico sobrio y directo, apto para lectura eclesial.
  - No se usa «SEÑOR» como máscara del Tetragrámaton porque aquí el vocativo griego es δέσποτα, no una cita de יהוה.
  - «Librados» se mantiene para ῥύομαι por coherencia con el tono de rescate y liberación.
  - No se introduce vocabulario interpretativo adicional como «sin causa» para ἀδίκως.
