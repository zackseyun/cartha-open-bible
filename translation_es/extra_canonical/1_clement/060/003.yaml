review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y del POB inglés: invocación vocativa, petición de que el rostro divino resplandezca, propósito de ser amparados por la mano poderosa, liberados de todo pecado por el brazo exaltado, y rescatados de enemigos que odian injustamente. No hay omisiones mayores. Sin embargo, δέσποτα corresponde mejor a «Soberano» o «Dueño» que a «Señor», porque el inglés auditado fijó «Master» y el proyecto evita aplanar matices de señorío/dominio. Además, «ser cubiertos» para σκεπασθῆναι suena menos natural en español que una opción como «ser amparados», que conserva la idea de abrigo/protección sin calco duro.'
  spanish_quality_summary: El texto es claro y digno, pero «Sí, Señor» introduce una resonancia litúrgica muy común que aquí diluye el matiz específico de δέσποτα. También «para bien en paz» es fiel, aunque algo rígido; «para bien, en paz» mejora la lectura con puntuación mínima. «Seamos cubiertos» es comprensible, pero poco idiomático en español eclesial general; «seamos amparados» lee mejor y mantiene la imagen protectora. El resto del verso suena natural y fiel.
  glossary_alignment: 'No hay choque con los términos troncales del glosario (no aparecen Yahvé, Mesías, etc.). El punto relevante es δέσποτα: «Señor» no es incorrecto en abstracto, pero no preserva tan bien el matiz de δεσπότης ni la elección inglesa «Master». «Soberano» encaja mejor con la fuerza semántica y sigue siendo legible en una oración dirigida a Dios.'
  issues:
  - severity: medium
    issue: «Señor» para δέσποτα reduce el matiz específico del vocativo.
    rationale: δεσπότης denota señorío absoluto/amo/soberano. El POB inglés eligió «Master», no «Lord». En español, «Soberano» preserva mejor esa fuerza que «Señor», especialmente para evitar neutralizar un matiz léxico distinguible.
  - severity: low
    issue: «Seamos cubiertos» es un calco algo torpe para σκεπασθῆναι.
    rationale: Aunque refleja la imagen literal de cubrir, en español suena menos natural en oración pública. «Seamos amparados» conserva el sentido de abrigo y protección bajo la mano divina con mejor fluidez.
  - severity: low
    issue: La secuencia «para bien en paz» agradece una puntuación menor.
    rationale: Una coma en «para bien, en paz» mejora la legibilidad sin alterar el sentido del griego ni del inglés auditado.
  revised_spanish_text: Sí, Soberano, haz resplandecer tu rostro sobre nosotros para bien, en paz, para que seamos amparados por tu mano poderosa y librados de todo pecado por tu brazo exaltado, y líbranos de los que nos odian injustamente.
  revision_rationale: Se revisa «Señor» a «Soberano» para preservar mejor δέσποτα / «Master»; «seamos cubiertos» a «seamos amparados» para un español más natural sin pérdida semántica; y se añade puntuación menor en «para bien, en paz» para mejorar la lectura.
