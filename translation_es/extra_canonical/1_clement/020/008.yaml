  text: ὠκεανὸς ἀπέραντος ἀνθρώποις καὶ οἱ μετ᾽ αὐτὸν κόσμοι ταγαῖς τοῦ δεσπότου διευθύνονται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/020/008.yaml
  text: The ocean, impassable to men, and the worlds beyond it are directed by the ordinances of the Master.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:06Z'
    unchanged: false
    changes_summary: Replaced 'decrees' with 'ordinances' to more naturally reflect ταγαῖς as ordered arrangements/ordinances while preserving the formal register. Kept the rest unchanged.
translation:
  language: es
  text: El océano, infranqueable para los seres humanos, y los mundos que están más allá de él son dirigidos por las disposiciones del Soberano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὠκεανός
  english_pob_choice: the ocean
  chosen_spanish: el océano
  alternatives_spanish:
  - el mar océano
  - el océano marino
  lexicon: ἠ / ὠκεανός
  rationale: «Océano» reproduce con naturalidad el referente geográfico de una gran masa de agua y corresponde bien al inglés auditado. No hay indicio en el texto de un sentido metafórico que requiera otra imagen.
- source_word: ἀπέραντος ἀνθρώποις
  english_pob_choice: impassable to men
  chosen_spanish: infranqueable para los seres humanos
  alternatives_spanish:
  - inaccesible para los hombres
  - impenetrable para los seres humanos
  lexicon: ἀπέραντος
  rationale: El adjetivo griego expresa la idea de algo que no puede atravesarse o recorrerse; «infranqueable» conserva ese valor con un registro digno. «Para los seres humanos» explicita el dativo de referencia sin sonar marcadamente sexista como «hombres».
- source_word: οἱ μετ᾽ αὐτὸν κόσμοι
  english_pob_choice: the worlds beyond it
  chosen_spanish: los mundos que están más allá de él
  alternatives_spanish:
  - los mundos más allá de él
  - los mundos que lo siguen
  lexicon: κόσμος
  rationale: El plural «mundos» sigue el inglés POB y mantiene la audacia cosmológica del griego. «Que están más allá de él» preserva la relación espacial de μετ᾽ αὐτόν sin añadir interpretaciones cosmográficas ajenas al texto.
- source_word: ταγαῖς
  english_pob_choice: ordinances
  chosen_spanish: las disposiciones
  alternatives_spanish:
  - las ordenanzas
  - los reglamentos
  - las ordinaciones
  lexicon: ταγή
  rationale: La revisión inglesa prefirió «ordinances» por reflejar con más naturalidad la idea de arreglos u ordenamientos fijados. «Disposiciones» en español conserva ese campo semántico de orden establecido sin forzar un término eclesiástico moderno como «ordenanzas».
- source_word: τοῦ δεσπότου
  english_pob_choice: of the Master
  chosen_spanish: del Dueño
  alternatives_spanish:
  - del Maestro
  - del Señor
  lexicon: δεσπότης
  rationale: «Dueño» conserva la fuerza de autoridad y posesión de δεσπότης de manera más directa que «Señor», que en español suele cargarse de uso litúrgico. «Maestro» sería posible, pero diluye la relación de dominio/autoridad que el término puede llevar aquí.
- source_word: διευθύνονται
  english_pob_choice: are directed
  chosen_spanish: son gobernados
  alternatives_spanish:
  - son dirigidos
  - son regidos
  lexicon: διευθύνω
  rationale: El verbo puede implicar dirigir, ordenar o conducir con autoridad. «Son gobernados» recoge la idea de control efectivo y encaja con el paralelismo de una creación sometida a disposiciones divinas; «son dirigidos» resulta más débil en español.
theological_decisions:
- issue: Cómo renderizar δεσπότης sin perder la relación de autoridad
  english_pob_reading: Master
  chosen_spanish_reading: Dueño
  alternative_spanish_readings:
  - Maestro
  - Señor
  rationale: La lectura inglesa evita el título cristianizado «Lord» y mantiene un matiz de autoridad soberana. En español, «Dueño» preserva mejor la relación de dominio/posesión que el contexto cosmológico sugiere sin introducir una fórmula devocional no presente en el griego.
  doctrine_reference: Autoridad soberana de Dios sobre la creación
- issue: Valor de κόσμος en plural
  english_pob_reading: the worlds beyond it
  chosen_spanish_reading: los mundos que están más allá de él
  alternative_spanish_readings:
  - los mundos más allá de él
  - los órdenes del mundo más allá de él
  rationale: Se conserva el plural del griego y de la traducción inglesa, aun cuando resulte menos habitual en español, porque el texto presenta una visión cósmica deliberada. No se reduce a «el mundo» para no borrar la distinción explícita entre el océano y los mundos posteriores.
  doctrine_reference: Cosmología antigua y orden providencial de la creación
translation_notes:
  revision_awareness: La versión inglesa más reciente reemplazó «decrees» por «ordinances» para reflejar mejor ταγαῖς como arreglos u ordenamientos. La propuesta española sigue esa revisión con «disposiciones», evitando tanto un legalismo fuerte como una paráfrasis general.
  spanish_consistency_notes:
  - Se mantuvo el plural «mundos» para seguir el audit trail y no homogeneizar el término a «mundo» singular.
  - Se evitó «SEÑOR» para δεσπότης y se prefirió «Dueño» por fidelidad al matiz de autoridad del griego y coherencia con la traducción inglesa auditada.
  - «Infranqueable» se eligió para conservar la imposibilidad de paso implícita en ἀπέραντος sin sonar demasiado técnico.
