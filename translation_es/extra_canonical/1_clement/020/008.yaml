revisions:
- from: El océano, infranqueable para los seres humanos, y los mundos que están más allá de él son gobernados por las disposiciones del Dueño.
  to: El océano, infranqueable para los seres humanos, y los mundos que están más allá de él son dirigidos por las disposiciones del Soberano.
  rationale: Se ajusta δεσπότου a «del Soberano» para reflejar mejor el registro elevado y la autoridad cósmica del griego y del inglés «the Master», evitando el tono cotidiano de «Dueño». Se cambia «son gobernados» por «son dirigidos» para alinearse con διευθύνονται y con la traducción auditada «are directed», sin intensificar indebidamente el sentido.
