review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: ὠκεανὸς... καὶ οἱ μετ᾽ αὐτὸν κόσμοι ... διευθύνονται. Conserva correctamente «océano», el plural «mundos» y la idea de orden impuesto por el δεσπότης. Sin embargo, dos elecciones se apartan del matiz fuente/POB: «Dueño» suena demasiado posesivo y doméstico para δεσπότου en este contexto elevado, donde «Soberano» o «Señor soberano» reflejaría mejor autoridad cósmica; y «son gobernados» intensifica más de la cuenta διευθύνονται, que aquí es mejor «son dirigidos» o «son regidos».'
  spanish_quality_summary: El español es claro y natural, con registro digno. «Infranqueable para los seres humanos» funciona bien, aunque algo más largo que el original. «Los mundos que están más allá de él» es comprensible. El principal problema de legibilidad/registro está en «del Dueño», que en español bíblico general resulta poco idiomático y puede distraer por su tono cotidiano. «Son gobernados» también desplaza la imagen de orden/encauzamiento hacia gobierno político.
  glossary_alignment: No hay términos del glosario principal directamente implicados salvo el tratamiento de δεσπότης. Aunque el inglés auditado usa «Master», en español «Dueño» no es la mejor equivalencia en un contexto cosmológico y teológico; «Soberano» preserva autoridad sin introducir el liturgicismo de «Señor» solo. «Disposiciones» es aceptable para ταγαῖς, aunque «ordenanzas» estaría más cerca de «ordinances»; no exige cambio obligatorio.
  issues:
  - severity: high
    issue: «del Dueño» para τοῦ δεσπότου
    rationale: δεσπότης aquí señala autoridad suprema del gobernante de la creación. «Dueño» en español contemporáneo suena demasiado cotidiano y centrado en posesión, con pérdida del registro elevado y del matiz soberano del contexto.
  - severity: medium
    issue: «son gobernados» para διευθύνονται
    rationale: El verbo griego apunta a ser dirigidos, encauzados o regidos. «Gobernados» sobreinterpreta hacia gobierno político y es más fuerte que el inglés POB «are directed».
  revised_spanish_text: El océano, infranqueable para los seres humanos, y los mundos que están más allá de él son dirigidos por las disposiciones del Soberano.
  revision_rationale: Se ajusta δεσπότου a «del Soberano» para reflejar mejor el registro elevado y la autoridad cósmica del griego y del inglés «the Master», evitando el tono cotidiano de «Dueño». Se cambia «son gobernados» por «son dirigidos» para alinearse con διευθύνονται y con la traducción auditada «are directed», sin intensificar indebidamente el sentido.
