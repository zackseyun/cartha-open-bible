id: 1CLEM.20.11
reference: 1 Clement 20:11
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ταῦτα πάντα ὁ μέγας, διμιουργὸς καὶ δεσπότης τῶν ἁπάντων ἐν εἰρήνῃ καὶ ὁμονοίᾳ προσέταξεν εἶναι, εὐεργετῶν τὰ πάντα, ὑπερεκπερισσῶς δὲ ἡμᾶς τοὺς προσπεφευγότας τοῖς οἰκτιρμοῖς αὐτοῦ διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ,
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/020/011.yaml
  text: All these things the great Creator and Master of all has appointed to be in peace and harmony, doing good to all things, but exceedingly more to us who have fled for refuge to his mercies through our Lord Jesus Messiah,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:09Z'
    unchanged: false
    changes_summary: 'Changed ''to exist'' to ''to be'' for a more direct rendering of εἶναι; changed ''far beyond measure'' to ''exceedingly more'' to reflect ὑπερεκπερισσῶς more naturally; changed ''Jesus Messiah'' to ''Jesus Christ'' for standard formal rendering of Ἰησοῦ Χριστοῦ. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Todas estas cosas el gran Creador y Dueño de todo ha dispuesto que estén en paz y armonía, haciendo bien a todo, pero muchísimo más a nosotros, que hemos buscado refugio en sus misericordias por medio de nuestro Señor Jesús Mesías.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ μέγας, διμιουργὸς καὶ δεσπότης τῶν ἁπάντων
  english_pob_choice: the great Creator and Master of all
  chosen_spanish: el gran Creador y Dueño de todo
  alternatives_spanish:
  - el gran Creador y Señor de todo
  - el grande Artífice y Dueño de todo
  lexicon: μέγας; δημιουργός; δεσπότης
  rationale: «Creador» reproduce δημιουργός con transparencia; «Dueño» comunica la relación de dominio de δεσπότης sin adoptar automáticamente el tono litúrgico de «Señor», que en español puede confundirse con κύριος cuando aquí el griego distingue un título de soberanía creado/administrativo.
- source_word: ἐν εἰρήνῃ καὶ ὁμονοίᾳ
  english_pob_choice: in peace and harmony
  chosen_spanish: en paz y armonía
  alternatives_spanish:
  - en paz y concordia
  - en paz y unánime acuerdo
  lexicon: εἰρήνη; ὁμόνοια
  rationale: «Paz y armonía» mantiene el paralelismo natural en español y refleja tanto la ausencia de conflicto como la concordia ordenada que sugiere ὁμόνοια.
- source_word: εὐεργετῶν τὰ πάντα
  english_pob_choice: doing good to all things
  chosen_spanish: haciendo el bien a todas las cosas
  alternatives_spanish:
  - beneficiando a todas las cosas
  - haciendo bien a todo
  lexicon: εὐεργετέω; τὰ πάντα
  rationale: «Haciendo el bien» conserva el valor verbal de εὐεργετῶν y evita sobrecargar con un término más técnico; «a todas las cosas» sigue de cerca τὰ πάντα, aunque suena menos idiomático que «a todo», por lo que se mantiene la forma más transparente.
- source_word: ὑπερεκπερισσῶς
  english_pob_choice: exceedingly more
  chosen_spanish: muchísimo más
  alternatives_spanish:
  - sobremanera más
  - excesivamente más
  lexicon: ὑπερεκπερισσῶς
  rationale: La intensificación extrema del adverbio griego se expresa de forma natural en español con «muchísimo más», evitando una construcción torpe como «excedidamente más» y preservando la idea de abundancia superlativa.
- source_word: τοὺς προσπεφευγότας
  english_pob_choice: who have fled for refuge
  chosen_spanish: que hemos huido para refugiarnos
  alternatives_spanish:
  - que hemos acudido a refugio
  - que hemos buscado refugio
  lexicon: προσφεύγω
  rationale: 'El perfecto participial expresa un estado alcanzado: quienes han corrido al refugio y permanecen en esa condición. «Hemos huido para refugiarnos» conserva el matiz de movimiento hacia refugio y mantiene la primera persona plural del texto.'
- source_word: τοῖς οἰκτιρμοῖς αὐτοῦ
  english_pob_choice: his mercies
  chosen_spanish: sus misericordias
  alternatives_spanish:
  - sus compasiones
  - sus entrañas de misericordia
  lexicon: οἰκτιρμός
  rationale: «Misericordias» es el equivalente más natural y reverente en español e integra bien el plural intensivo del griego, sin perder el tono de compasión abundante.
- source_word: διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: through our Lord Jesus Messiah
  chosen_spanish: por medio de nuestro Señor Jesús Mesías
  alternatives_spanish:
  - por medio de nuestro Señor Jesucristo
  - a través de nuestro Señor Jesús el Mesías
  lexicon: κύριος; Ἰησοῦς; Χριστός
  rationale: Se mantiene «Mesías» para Χριστός conforme a la norma del proyecto y al valor titulado del término; «por medio de» traduce διὰ con claridad mediadora; «Señor» refleja κύριος en fórmula cristológica establecida.
theological_decisions:
- issue: Título cristológico Χριστός / Χρισto en una doxología cristiana
  english_pob_reading: our Lord Jesus Messiah
  chosen_spanish_reading: nuestro Señor Jesús Mesías
  alternative_spanish_readings:
  - nuestro Señor Jesucristo
  - nuestro Señor Jesús el Mesías
  rationale: La política del proyecto favorece «Mesías» para Χριστός cuando funciona como título. En español, «Jesucristo» suena más fijado litúrgicamente, pero aquí se preserva la titulación transparente «Jesús Mesías» sin borrar el sentido mesiánico del original.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías salvo excepciones documentadas'
- issue: Relación entre ἁπάντων / τὰ πάντα y la universalidad del benevolente orden divino
  english_pob_reading: all things
  chosen_spanish_reading: todas las cosas
  alternative_spanish_readings:
  - todo
  - todas las criaturas
  rationale: «Todas las cosas» conserva la amplitud cósmica del griego y evita restringir indebidamente el alcance a seres personales o solo a la creación animada.
  doctrine_reference: Semántica de τὰ πάντα en contexto cósmico
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente que estabiliza εἶναι como «estar»/«ser» en sentido de estado ordenado; la redacción española sigue la lectura final del audit trail con Χριστός restaurado como «Mesías» y conserva la intensificación de ὑπερεκπερισσῶς sin suavizarla. No se adoptó «Cristo» porque la revisión regresiva fue corregida explícitamente por la auditoría posterior.
  spanish_consistency_notes:
  - Se mantiene el registro reverente pero moderno, apto para lectura eclesial amplia.
  - Se evita «SEÑOR» como máscara de YHWH porque aquí no aparece el tetragrámaton; κύριος se traduce en su valor cristológico habitual como «Señor».
  - La formulación «Dueño de todo» preserva la fuerza de δεσπότης sin forzar una equivalencia idéntica a κύριος.
  - No se añadieron notas al pie porque el texto no presenta una ambigüedad que requiera anclaje explícito en español y el record previo falló por marcadores sin anclaje.
