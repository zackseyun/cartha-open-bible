base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/020/007.yaml
  text: For he said, “Thus far you shall come, and your waves shall be broken within you.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:06Z'
    unchanged: false
    changes_summary: Changed 'Up to this point' to 'Thus far' for a more natural and formal rendering of Ἕως ὧδε, while preserving the sense. No other changes needed.
translation:
  language: es
  text: 'Porque dijo: «Hasta aquí llegarás, y tus olas serán quebradas dentro de ti».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἶπεν γάρ
  english_pob_choice: For he said
  chosen_spanish: Porque dijo
  alternatives_spanish:
  - Pues dijo
  - Porque él dijo
  lexicon: γάρ
  rationale: Se conserva la relación causal/explicativa de γάρ con «Porque», y el verbo «dijo» reproduce de forma natural el pasaje citado en español sin sobrecargar el tono.
- source_word: Ἕως ὧδε
  english_pob_choice: Thus far
  chosen_spanish: Hasta aquí
  alternatives_spanish:
  - Hasta este punto
  - Así de lejos
  lexicon: ἕως ὧδε
  rationale: «Hasta aquí» expresa con claridad y sobriedad el límite señalado por el griego, manteniendo el matiz formal de «Thus far» en el audit trail inglés.
- source_word: ἥξεις
  english_pob_choice: you shall come
  chosen_spanish: llegarás
  alternatives_spanish:
  - vendrás
  - alcanzarás
  lexicon: ἥκω
  rationale: «Llegarás» comunica la idea de arribar o alcanzar un límite de manera natural en español y preserva el futuro de segunda persona singular.
- source_word: τὰ κύματά σου
  english_pob_choice: your waves
  chosen_spanish: tus olas
  alternatives_spanish:
  - tus ondas
  - tus marejadas
  lexicon: κῦμα
  rationale: «Olas» es el equivalente directo y más transparente en español para κύματα, sin introducir una imagen más técnica o poética de la que pide el texto.
- source_word: ἐν σοὶ
  english_pob_choice: within you
  chosen_spanish: dentro de ti
  alternatives_spanish:
  - en ti
  - dentro de vos
  lexicon: ἐν + pronombre
  rationale: «Dentro de ti» conserva la interioridad espacial del griego y suena más idiomático en español que una traducción demasiado literal de «en ti» en este contexto.
- source_word: συντριβήσεται
  english_pob_choice: shall be broken
  chosen_spanish: serán quebradas
  alternatives_spanish:
  - serán rotas
  - serán destruidas
  lexicon: συντρίβω
  rationale: «Serán quebradas» mantiene el valor de ruptura/fractura del verbo griego y refleja bien la imagen de las olas que se rompen; «quebradas» es un español bíblico claro y fiel.
theological_decisions:
- issue: Imagery of the waves being broken inside the addressee
  english_pob_reading: your waves shall be broken within you
  chosen_spanish_reading: tus olas serán quebradas dentro de ti
  alternative_spanish_readings:
  - tus olas se romperán dentro de ti
  - tus olas serán destrozadas dentro de ti
  rationale: Se mantiene la imagen marítima y la tensión retórica del original sin suavizarla. «Serán quebradas» preserva la idea de fractura/derrota más que una simple desintegración, y evita intensificar indebidamente con «destrozadas».
  doctrine_reference: No doctrinal change; figurative language preserved from the source.
translation_notes:
  revision_awareness: 'The English audit trail shows one revision only: ''Up to this point'' -> ''Thus far'' for Ἕως ὧδε. The Spanish draft follows that final sense with a formal, natural equivalent (''Hasta aquí'') and otherwise aligns directly with the stabilized English and Greek source.'
  spanish_consistency_notes:
  - Mantengo «Dios/Yahvé» fuera del texto porque este versículo no contiene el nombre divino.
  - Uso futuro simple en segunda persona singular para conservar el tono profético/citatorio del griego.
  - Conservo una sintaxis breve y citacional, adecuada para un registro bíblico legible en español.
