id: 1CLEM.20.10
reference: 1 Clement 20:10
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἀνέμων σταθμοὶ κατὰ τὸν ἴδιον καιρὸν τὴν λειτουργίαν αὐτῶν ἀπροσκόπως ἐπιτελοῦσιν· ἀέναοί τε πηγαί, πρὸς ἀπόλαυσιν καὶ ὑγείαν δημιουργηθεῖσαι, δίχα ἐλλείψεως παρέχονται τοῖς πρὸς ζωὴν ἀνθρώποις μαζούς· τά τε ἐλάχιστα τῶν ζῴων τὰς συνελεύσεις αὐτῶν ἐν ὁμονοίᾳ καὶ εἰρήνῃ ποιοῦνται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/020/010.yaml
  text: The courses of the winds[a], each in its own season, fulfill their service without hindrance; and the ever-flowing springs, created for enjoyment and health, without fail provide their breasts for the life of men[b]. And the smallest of living creatures hold their gatherings in harmony and peace.
  footnotes:
  - marker: a
    text: Or 'without stumbling'.
    reason: previous_rendering
  - marker: b
    text: Or 'Even the smallest'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:08Z'
    unchanged: false
    changes_summary: Changed 'stations' to 'courses' for more natural rendering of σταθμοί in context; adjusted 'supply their breasts to men for life' to 'provide their breasts for the life of men' to reflect πρὸς ζωὴν more naturally while preserving the metaphor. Other wording retained.
translation:
  language: es
  text: Los cursos de los vientos, en su propia estación, cumplen su servicio sin impedimento[a]; y las fuentes perennes, creadas para deleite y salud, sin mengua ofrecen sus pechos a los seres humanos para la vida. Y[b] los más pequeños de los seres vivos celebran sus reuniones en armonía y paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin tropiezo». El adverbio griego ἀπροσκόπως deriva de προσκόπτω (tropezar contra algo); BDAG lo glosa sin embargo como «sin hindrance / sin obstáculo» para este pasaje. La revisión POB adoptó esta lectura funcional sobre la etimológica, por resultar torpe aplicar «tropezar» al movimiento de los vientos.
    reason: lexical_alternative
  - marker: b
    text: O «Incluso los más pequeños». La partícula griega τε tiene aquí valor simplemente continuativo, coordinando los tres elementos cósmicos (vientos, fuentes, criaturas pequeñas) sin añadir énfasis ascensivo. La revisión POB corrigió expresamente una lectura anterior «Even» (Incluso) que introducía un realce no presente en el texto.
    reason: alternative_reading
lexical_decisions:
- source_word: σταθμοί (ἀνέμων σταθμοί)
  english_pob_choice: courses
  chosen_spanish: cursos
  alternatives_spanish:
  - estaciones
  - rutas
  - trayectorias
  - rumbos
  lexicon: LSJ s.v. σταθμός; POB revision audit (2026-04-23)
  rationale: 'El POB inglés pasó de ''stations'' a ''courses'' en la revisión final, por ser más natural para el movimiento del viento. El español ''cursos'' (pl. de ''curso'') es paralelo exacto: designa el recorrido o trayectoria de los vientos sin el sentido de ''parada'' que tendría ''estaciones''. ''Rutas'' o ''trayectorias'' son alternativas válidas pero más largas; ''rumbos'' es demasiado náutico. Se mantiene ''cursos'' en alineación con la elección POB definitiva.'
- source_word: λειτουργίαν
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - oficio
  - ministerio
  - función
  lexicon: BDAG s.v. λειτουργία
  rationale: λειτουργία designa aquí la función/tarea cósmica de los vientos, no un acto litúrgico o cultual. 'Servicio' es el equivalente español natural en contexto no eclesiástico. 'Ministerio' añadiría connotación religiosa no justificada; 'función' es neutro pero pierde el matiz de cumplimiento de un deber ordenado.
- source_word: ἀπροσκόπως
  english_pob_choice: without hindrance
  chosen_spanish: sin impedimento
  alternatives_spanish:
  - sin tropiezo
  - sin obstáculo
  - sin estorbo
  lexicon: BDAG s.v. ἀπρόσκοπος; POB revision (2026-04-22, tier 3)
  rationale: BDAG glosa ἀπροσκόπως en 1 Clem 20:10 como 'without hindrance / smoothly'. La revisión POB rechazó 'without stumbling' (etimológico, de προσκόπτω) por ser torpe aplicado a los vientos. 'Sin impedimento' es el equivalente español más natural para movimiento no obstaculizado. 'Sin tropiezo' refleja la etimología pero fue descartado por las mismas razones que en inglés.
- source_word: ἀέναοί (ἀέναοί πηγαί)
  english_pob_choice: ever-flowing
  chosen_spanish: perennes
  alternatives_spanish:
  - que fluyen sin cesar
  - inagotables
  - imperecederas
  lexicon: LSJ s.v. ἀέναος
  rationale: ἀέναος = siempre fluyente, perenne. El español 'perenne' (del latín perennis) es el término técnico y literario estándar para manantiales que fluyen todo el año, sin quiebra. 'Inagotables' enfatiza la cantidad más que la continuidad; 'que fluyen sin cesar' es exacto pero prolijo. 'Fuentes perennes' es la expresión más económica y elegante.
- source_word: ἀπόλαυσιν
  english_pob_choice: enjoyment
  chosen_spanish: deleite
  alternatives_spanish:
  - disfrute
  - gozo
  - placer
  - recreo
  lexicon: LSJ s.v. ἀπόλαυσις
  rationale: ἀπόλαυσις = disfrute, provecho placentero de algo. 'Deleite' es digno y captura el beneficio gozoso sin los matices coloquiales de 'disfrute' ni la carga emocional/religiosa de 'gozo'. Conviene al registro elevado de este catálogo de orden cósmico.
- source_word: δίχα ἐλλείψεως
  english_pob_choice: without fail
  chosen_spanish: sin mengua
  alternatives_spanish:
  - sin falta
  - sin escasez
  - sin deficiencia
  lexicon: LSJ s.v. ἔλλειψις
  rationale: δίχα = sin; ἔλλειψις = deficiencia, mengua, falta. El inglés 'without fail' es más idiomático que literal. El español 'sin mengua' (sin disminución/merma) está más cerca del griego ἔλλειψις, que apunta a que las fuentes nunca merman ni cesan. 'Sin falta' es idiomáticamente equivalente al inglés pero menos preciso respecto al original. 'Sin escasez' es válido.
- source_word: μαζούς
  english_pob_choice: breasts
  chosen_spanish: pechos
  alternatives_spanish:
  - senos
  - mamas
  lexicon: LSJ s.v. μαζός
  rationale: 'μαζός designa específicamente el pecho materno, en particular el pecho que amamanta. La metáfora es deliberada y vivida: las fuentes ''ofrecen sus pechos'' como una madre nodriza a la humanidad. El POB inglés preserva ''breasts'' literalmente; el español ''pechos'' es el término más natural para esta imagen de lactancia. No se suaviza la metáfora con ''agua'' o ''sustento''. ''Senos'' es igualmente válido; ''mamas'' es demasiado técnico.'
- source_word: τοῖς πρὸς ζωὴν ἀνθρώποις
  english_pob_choice: for the life of men
  chosen_spanish: a los seres humanos para la vida
  alternatives_spanish:
  - a los hombres para la vida
  - para la vida de los hombres
  - a la humanidad para la vida
  lexicon: LSJ s.v. ἄνθρωπος
  rationale: ἄνθρωπος es el término griego genérico para ser humano (no específicamente varón). El español 'seres humanos' captura esta generalidad sin ambigüedad de género. El inglés 'men' es genérico en POB pero el español 'hombres' puede leerse como masculino específico; 'seres humanos' es más fiel al alcance del griego. La estructura 'a los seres humanos para la vida' sigue el dativo griego (τοῖς ἀνθρώποις) más πρὸς ζωήν.
- source_word: συνελεύσεις
  english_pob_choice: gatherings
  chosen_spanish: reuniones
  alternatives_spanish:
  - asambleas
  - congregaciones
  - juntas
  lexicon: LSJ s.v. συνέλευσις
  rationale: συνέλευσις = reunión, asamblea, congregación (de syn- + erchomai). 'Reuniones' es el equivalente más natural en español para el comportamiento gregario de los animales más pequeños. 'Asambleas' es exacto pero de registro político-formal; 'congregaciones' tiene resonancias eclesiásticas inadecuadas al contexto.
- source_word: ὁμονοίᾳ
  english_pob_choice: harmony
  chosen_spanish: armonía
  alternatives_spanish:
  - concordia
  - unanimidad
  - acuerdo
  lexicon: LSJ s.v. ὁμόνοια
  rationale: ὁμόνοια = unanimidad de pensamiento, concordia, armonía (literalmente 'una sola mente'). Es un término central en 1 Clemente y en el pensamiento político-estoico como ideal de convivencia ordenada. 'Armonía' es el equivalente más accesible y frecuente en español. 'Concordia' tiene registro más clásico y sería también válido; se prefiere 'armonía' por mayor legibilidad sin pérdida de sentido.
translation_notes:
  revision_awareness: 'Dos revisiones adjudicadas (nivel 3) informan directamente este borrador. (1) ἀπροσκόπως: la revisión de 2026-04-22 (confianza 0,97) cambió «without stumbling» a «without hindrance», citando BDAG. El español adopta «sin impedimento» en lugar de «sin tropiezo» por las mismas razones: la imagen del tropiezo es inadecuada para el movimiento de los vientos, y BDAG avala el sentido de movimiento no obstaculizado. (2) τά τε ἐλάχιστα: la revisión de 2026-04-22 (confianza 0,94) corrigió «Even the smallest» a «And the smallest», argumentando que τε es simplemente coordinativo en la serie de tres ejemplos. El español traduce «Y» (coordinación simple) y rechaza «Incluso» (ascensivo). La revisión de pase de 2026-04-23 (gpt-5.4) afectó σταθμοί («stations» → «courses») y la construcción de μαζούς; el español «cursos» y «ofrecen sus pechos a los seres humanos para la vida» siguen esa versión definitiva.'
  spanish_consistency_notes:
  - 'μαζούς → «pechos»: preserva literalmente la metáfora del pecho nodrizo (manantiales como madre que amamanta). No sustituir por «agua», «sustento» u otro eufemismo en revisiones futuras sin una justificación basada en el texto fuente.'
  - ἄνθρωπος → «seres humanos» (genérico, sin marca de género). Preferir esta forma sobre «los hombres» para referencias genéricas a ἄνθρωπος a lo largo de 1 Clemente.
  - 'ἀέναοί → «perennes»: término técnico y literario estándar en español para fuentes o corrientes de flujo continuo. Mantener en todo el texto.'
  - 'ὁμόνοια → «armonía»: en 1 Clemente este término es teológico-político de primer orden (argumento central de la carta). «Concordia» es alternativa clásica aceptable; en contextos donde el matiz de unanimidad de pensamiento sea relevante, considerar nota.'
  - λειτουργία en contexto cósmico → «servicio», no «ministerio» ni «liturgia», para evitar anacronismo eclesiástico en pasajes sobre el orden natural.
