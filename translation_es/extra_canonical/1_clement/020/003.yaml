id: 1CLEM.20.3
reference: 1 Clement 20:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἥλιός τε καὶ σελήνη, ἀστέρων τε χοροὶ κατὰ τὴν διαταγὴν αὐτοῦ ἐν ὁμονοίᾳ δίχα πάσης παρεκβάσεως ἐξελίσσουσιν τοὺς ἐπιτεταγμένους αὐτοῖς ὁρισμούς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/020/003.yaml
  text: The sun and the moon and the choirs of stars[a], according to his ordinance, move in concord, without any deviation, along the courses assigned to them.
  footnotes:
  - marker: a
    text: Or 'move in harmony, without any deviation, within the bounds assigned to them.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:04Z'
    unchanged: false
    changes_summary: Removed the accidental duplicated phrase at the beginning. Revised 'within the bounds assigned to them' to 'along the courses assigned to them' to better reflect ἐξελίσσουσιν ... ὁρισμούς ('move/proceed' along appointed limits/courses) in natural formal English.
translation:
  language: es
  text: El sol y la luna y los coros de las estrellas[a], conforme a su ordenanza, avanzan en concordia, sin desviación alguna, por los cursos que les han sido asignados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se mueven en armonía, sin desviación alguna, dentro de los límites que les han sido asignados».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἥλιός τε καὶ σελήνη
  english_pob_choice: The sun and the moon
  chosen_spanish: El sol y la luna
  alternatives_spanish:
  - El Sol y la Luna
  lexicon: ἥλιος; σελήνη
  rationale: Se mantiene la referencia astronómica directa y el artículo simple en español fluye de manera natural sin añadir solemnidad innecesaria.
- source_word: ἀστέρων τε χοροὶ
  english_pob_choice: the choirs of stars
  chosen_spanish: los coros de las estrellas
  alternatives_spanish:
  - las huestes de estrellas
  - los coros estelares
  lexicon: ἀστήρ; χορός
  rationale: Se conserva 'coros' para reflejar la imagen de orden concertado del griego y del audit trail inglés, evitando suavizarla a una expresión más genérica.
- source_word: κατὰ τὴν διαταγὴν αὐτοῦ
  english_pob_choice: according to his ordinance
  chosen_spanish: conforme a su ordenanza
  alternatives_spanish:
  - según su orden
  - de acuerdo con su decreto
  lexicon: διαταγή
  rationale: '''Ordenanza'' comunica una disposición establecida y normativa; ''conforme a'' sigue bien la relación causal/rectora del griego.'
- source_word: ἐν ὁμονοίᾳ
  english_pob_choice: in concord
  chosen_spanish: en concordia
  alternatives_spanish:
  - en armonía
  - en unanimidad
  lexicon: ὁμόνοια
  rationale: '''Concordia'' preserva el valor retórico de ὁμόνοια, que en 1 Clemente es un término programático y no solo una imagen estética.'
- source_word: δίχα πάσης παρεκβάσεως
  english_pob_choice: without any deviation
  chosen_spanish: sin desviación alguna
  alternatives_spanish:
  - sin ninguna desviación
  - sin apartarse en nada
  lexicon: παρέκβασις
  rationale: '''Desviación'' expresa bien la idea de apartarse del curso señalado; ''alguna'' refuerza el alcance total del negativo del griego.'
- source_word: ἐξελίσσουσιν
  english_pob_choice: move
  chosen_spanish: avanzan
  alternatives_spanish:
  - se mueven
  - prosiguen
  lexicon: ἐξελίσσω
  rationale: '''Avanzan'' es idiomático en español y conserva el sentido de movimiento/progresión de los cuerpos celestes sin forzar una imagen técnica.'
- source_word: τοὺς ἐπιτεταγμένους αὐτοῖς ὁρισμούς
  english_pob_choice: the courses assigned to them
  chosen_spanish: los cursos que les han sido asignados
  alternatives_spanish:
  - las rutas que les han sido asignadas
  - los límites que les han sido fijados
  lexicon: ὁρισμός; ἐπιτάσσω
  rationale: '''Cursos'' sigue la revisión inglesa y permite mantener la idea de trayectorias asignadas; ''les han sido asignados'' expresa la pasiva implícita del griego de forma natural en español.'
theological_decisions:
- issue: Orden cósmico bajo mandato divino
  english_pob_reading: according to his ordinance; move in concord, without any deviation, along the courses assigned to them
  chosen_spanish_reading: conforme a su ordenanza, avanzan en concordia, sin desviación alguna, por los cursos que les han sido asignados
  alternative_spanish_readings:
  - según su decreto
  - en armonía
  rationale: La línea describe la obediencia regular del cosmos a la disposición divina. 'Ordenanza' y 'concordia' mantienen la fuerza normativa y comunitaria del pasaje, sin convertirlo en una mera descripción poética.
  doctrine_reference: Providencia divina y orden de la creación; tema retórico de 1 Clemente sobre concordia
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa al preferir una formulación natural para ἐξελίσσουσιν y al conservar el cierre sobre los cursos asignados; también preserva la lectura adjudicada de ἐν ὁμονοίᾳ como 'concordia' en vez de suavizarla a 'armonía'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque el texto griego usa pronombres posesivos y no el nombre divino.
  - '''Concordia'' se usa con valor técnico-retórico, coherente con 1 Clemente y con la sensibilidad del audit trail inglés.'
  - El pie de nota se ancla en 'estrellas[a]' para corresponder a la alternativa de movimiento y contención indicada por la tradición de traducción inglesa.
