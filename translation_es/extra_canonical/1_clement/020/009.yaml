lexical_decisions:
- source_word: καιροὶ
  english_pob_choice: The seasons
  chosen_spanish: Las estaciones
  alternatives_spanish:
  - Los tiempos
  - Los momentos
  lexicon: καιρός
  rationale: En este contexto la serie con primavera, verano, otoño e invierno exige el sentido de estaciones del año, no el de momentos o tiempos generales.
- source_word: ἐαρινοὶ καὶ θερινοὶ καὶ μετοπωρινοὶ καὶ χειμερινοὶ
  english_pob_choice: spring and summer and autumn and winter
  chosen_spanish: primavera, verano, otoño e invierno
  alternatives_spanish:
  - estaciones primaverales, veraniegas, otoñales e invernales
  - la primavera, el verano, el otoño y el invierno
  lexicon: adjetivos estacionales
  rationale: Se conserva la enumeración de las cuatro estaciones, naturalizando la estructura en español con sustantivos estacionales equivalentes.
- source_word: μεταπαραδιδόασιν ἀλλήλοις
  english_pob_choice: give way to one another
  chosen_spanish: se ceden unas a otras
  alternatives_spanish:
  - se entregan unas a otras
  - se dan paso unas a otras
  lexicon: μεταπαραδίδωμι
  rationale: La idea central es de ceder el turno o el paso mutuamente; 'se ceden' expresa bien la reciprocidad sin introducir matices excesivos de entrega o transmisión.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - en paz y armonía
  - pacíficamente
  lexicon: εἰρήνη
  rationale: '''En paz'' es la forma más directa y fiel; mantiene el carácter relacional y sereno de la expresión griega.'
theological_decisions:
- issue: Orden armonioso de la creación
  english_pob_reading: The seasons ... give way to one another in peace.
  chosen_spanish_reading: Las estaciones ... se ceden unas a otras en paz.
  alternative_spanish_readings:
  - Las estaciones ... se suceden unas a otras en paz.
  - Las estaciones ... pasan una a otra en paz.
  rationale: El griego presenta una sucesión ordenada y mutua; 'se ceden' conserva mejor la idea de deferencia recíproca que solo 'se suceden'.
  doctrine_reference: Providencia y orden de la creación
translation_notes:
