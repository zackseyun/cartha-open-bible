base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/020/001.yaml
  text: The heavens, moved by his governance, submit to him in peace. Day and night complete the course appointed by him, hindering one another in nothing. The sun and the moon and the choirs of stars, according to his ordinance, move in harmony, without any deviation, in the bounds assigned to them. The earth, bearing fruit according to his will, brings forth at the proper seasons abundant food for men and beasts and for all living things upon it, neither hesitating nor altering anything of what has been decreed by him. The unsearchable depths of the abysses and the indescribable realms of the world below are constrained by the same ordinances. The mass of the boundless sea, formed by his creation into its gathering places, does not pass beyond the barriers set around it, but as he ordered it, so it does. For he said, “Up to this point you shall come, and your waves shall be broken within you.” The ocean, impassable to men, and the worlds beyond it are directed by the decrees of the Master.
    The seasons of spring and summer and autumn and winter give way to one another in peace. The stations of the winds, each in its own season, fulfill their service without hindrance; and the ever-flowing springs, created for enjoyment and health, without fail supply their breasts to men for life. Even the smallest of living creatures hold their gatherings in harmony and peace. All these things the great Creator and Master of all has appointed to exist in peace and harmony, doing good to all things, but far beyond measure to us who have fled for refuge to his mercies through our Lord Jesus Messiah, to whom be the glory and the majesty forever and ever. Amen.
