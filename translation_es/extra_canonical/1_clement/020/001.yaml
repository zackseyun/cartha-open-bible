translation:
  language: es
  text: 'Los cielos, movidos por su gobierno, se someten a él en paz. El día y la noche completan la carrera que él les ha señalado, sin estorbarse en nada. El sol y la luna, y los coros de las estrellas, según su ordenanza, avanzan en armonía, sin desviarse en nada, en los límites que les han sido fijados. La tierra, dando fruto conforme a su voluntad, produce en sus tiempos apropiados alimento abundante para los hombres, las bestias y todos los seres vivientes que hay sobre ella, sin vacilar ni alterar nada de lo que él ha decretado. Las profundidades insondables de los abismos y los ámbitos indescriptibles del mundo de abajo[a] son mantenidos por los mismos mandatos. La masa del mar sin límites, formada por su creación en sus lugares de reunión, no pasa más allá de las barreras que le han sido puestas alrededor, sino que, como él le ordenó, así hace. Porque dijo: «Hasta aquí llegarás, y tus olas se romperán dentro de ti». El océano, inaccesible para los hombres, y los mundos que están
    más allá de él son dirigidos por los decretos del Soberano.


    Las estaciones de la primavera, del verano, del otoño y del invierno se dan paso unas a otras en paz. Las estaciones de los vientos, cada una en su propio tiempo, cumplen su servicio sin impedimento; y las fuentes que corren sin cesar, creadas para el disfrute y la salud, sin falta suministran sus pechos[b] a los hombres para la vida. Hasta los más pequeños de los seres vivos forman sus reuniones en armonía y paz. Todas estas cosas el gran Creador y Soberano de todo ha dispuesto que existan en paz y armonía, haciendo bien a todas las cosas, pero en medida muchísimo mayor a nosotros, que hemos huido para refugiarnos en sus misericordias por medio de nuestro Señor Jesús Mesías, a quien sea la gloria y la majestad por los siglos de los siglos. Amén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «mundo de abajo» traduce de forma deliberadamente amplia el griego; el texto podría apuntar a esferas inferiores, regiones subterráneas o un inframundo, sin especificarlo más.
    reason: theological_note
  - marker: b
    text: El griego dice literalmente «pechos», aplicando a las fuentes una metáfora corporal de nutrición y provisión; también podría expresarse más libremente como «corrientes» o «manantiales», pero aquí se conserva la imagen del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: διοίκησις
  english_pob_choice: governance
  chosen_spanish: gobierno
  alternatives_spanish:
  - gobernanza
  - administración
  - ordenamiento
  lexicon: LSJ
  rationale: En este contexto cósmico, el término expresa el gobierno activo y ordenado de Dios sobre los cielos; «gobierno» comunica bien esa idea sin cargar un tecnicismo posterior.
- source_word: σαλευόμενοι
  english_pob_choice: moved
  chosen_spanish: movidos
  alternatives_spanish:
  - sacudidos
  - conmovidos
  - puestos en movimiento
  lexicon: LSJ
  rationale: Aunque el verbo puede sugerir sacudida, aquí el sentido es que los cielos están en movimiento bajo la dirección divina; «movidos» evita sobrecargar la imagen con una sacudida no necesaria.
- source_word: τεταγμένον ... δρόμον
  english_pob_choice: the course appointed
  chosen_spanish: la carrera que él les ha señalado
  alternatives_spanish:
  - el curso que él ha ordenado
  - el recorrido señalado por él
  - la ruta asignada
  lexicon: LSJ
  rationale: «Δρόμος» puede ser curso/carrera/recorrido; «carrera» conserva el dinamismo del movimiento diario, y «les ha señalado» refleja la fijación divina del itinerario.
- source_word: διαταγή
  english_pob_choice: ordinance
  chosen_spanish: ordenanza
  alternatives_spanish:
  - orden
  - mandato
  - disposición
  lexicon: LSJ
  rationale: «Ordenanza» conserva el tono solemne y normativo del término, cercano a la idea de una disposición establecida.
- source_word: ὁρισμοί
  english_pob_choice: bounds
  chosen_spanish: límites
  alternatives_spanish:
  - fronteras
  - linderos
  - límites asignados
  lexicon: LSJ
  rationale: En el marco de cuerpos celestes, el término apunta a límites fijados; «límites» es natural en español y suficientemente preciso.
- source_word: κυοφοροῦσα
  english_pob_choice: bearing fruit
  chosen_spanish: dando fruto
  alternatives_spanish:
  - produciendo fruto
  - fecundando
  - llevando fruto
  lexicon: LSJ
  rationale: La imagen de la tierra como gestante/fecunda se expresa de modo idiomático en español con «dando fruto», sin perder la idea de fertilidad productiva.
- source_word: πανπληθῆ
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - copioso
  - muy abundante
  - en gran abundancia
  lexicon: LSJ
  rationale: El adjetivo intensifica la provisión de alimento; «abundante» transmite bien la plenitud sin artificio.
- source_word: διστατάσουσα
  english_pob_choice: hesitating
  chosen_spanish: vacilar
  alternatives_spanish:
  - titubear
  - dudar
  - estar indecisa
  lexicon: LSJ
  rationale: El verbo comunica falta de firmeza o indecisión al cumplir lo decretado; «vacilar» conserva esa tensión mejor que una mera negación abstracta.
- source_word: δεδογματισμένων
  english_pob_choice: has been decreed
  chosen_spanish: ha decretado
  alternatives_spanish:
  - ha dispuesto
  - ha ordenado
  - ha determinado
  lexicon: LSJ
  rationale: El pasivo perfecto expresa decretos ya establecidos; «ha decretado» refleja bien la formalidad del acto divino.
- source_word: ἀβύσσων
  english_pob_choice: abysses
  chosen_spanish: abismos
  alternatives_spanish:
  - profundidades
  - abismos insondables
  - simas
  lexicon: LSJ
  rationale: «Abismos» preserva el plural elevado y el sentido de honduras extremas.
- source_word: νερτέρων ἀνεκδιήγητα κρίματα
  english_pob_choice: the indescribable realms of the world below
  chosen_spanish: los ámbitos indescriptibles del mundo de abajo
  alternatives_spanish:
  - las regiones indescriptibles del mundo inferior
  - los misterios indescriptibles del inframundo
  - los juicios indecibles de las regiones inferiores
  lexicon: LSJ
  rationale: Sigo la lectura cósmica/locativa del audit trail, pero en español «ámbitos» evita fijar demasiado una topografía teológica que el griego no define con claridad.
- source_word: συνέχεται
  english_pob_choice: are constrained
  chosen_spanish: son mantenidos
  alternatives_spanish:
  - son constreñidos
  - son contenidos
  - quedan sujetos
  lexicon: LSJ
  rationale: En el catálogo de orden cósmico, «son mantenidos» expresa la idea de estar sostenidos por los mismos mandatos sin sonar excesivamente técnico o forzado.
- source_word: χύτος
  english_pob_choice: mass
  chosen_spanish: masa
  alternatives_spanish:
  - extensión
  - cuerpo
  - masa de aguas
  lexicon: LSJ
  rationale: El sustantivo describe el cuerpo inmenso del mar; «masa» conserva la materialidad y el peso de la imagen.
- source_word: συναγωγαί
  english_pob_choice: gathering places
  chosen_spanish: lugares de reunión
  alternatives_spanish:
  - reservorios
  - reuniones
  - depósitos
  lexicon: LSJ
  rationale: «Lugares de reunión» refleja el campo semántico de agrupación/colección sin introducir una imagen hidráulica no explicitada por el texto.
- source_word: χείλη
  english_pob_choice: barriers
  chosen_spanish: barreras
  alternatives_spanish:
  - bordes
  - orillas
  - límites
  lexicon: LSJ
  rationale: Aunque literalmente «labios», el término funciona como borde contenedor del mar; «barreras» comunica su función restrictiva en contexto.
- source_word: κόσμος
  english_pob_choice: worlds
  chosen_spanish: mundos
  alternatives_spanish:
  - regiones
  - órdenes
  - cosmos
  lexicon: LSJ
  rationale: Se preserva el plural cosmológico de manera directa; «mundos» mantiene el alcance amplio del griego.
- source_word: ταγαῖς
  english_pob_choice: decrees
  chosen_spanish: decretos
  alternatives_spanish:
  - órdenes
  - disposiciones
  - mandatos
  lexicon: LSJ
  rationale: En la frase sobre la dirección del océano y los mundos, «decretos» encaja con el lenguaje de determinación soberana.
- source_word: σταθμοί
  english_pob_choice: stations
  chosen_spanish: estaciones
  alternatives_spanish:
  - puestos
  - posiciones
  - estaciones fijas
  lexicon: LSJ
  rationale: Para los vientos, el término alude a lugares o turnos asignados; «estaciones» es un equivalente español natural y compatible con el contexto.
- source_word: λειτουργία
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - función
  - ministerio
  - labor
  lexicon: LSJ
  rationale: «Servicio» conserva la idea de función asignada sin restringir innecesariamente el término a uso litúrgico eclesiástico.
- source_word: ἀπροσκόπως
  english_pob_choice: without hindrance
  chosen_spanish: sin impedimento
  alternatives_spanish:
  - sin tropiezo
  - sin estorbo
  - sin obstáculo
  lexicon: LSJ
  rationale: La palabra expresa ejecución sin tropiezos; «sin impedimento» es natural y formal en español.
- source_word: ἀέναοι
  english_pob_choice: ever-flowing
  chosen_spanish: que corren sin cesar
  alternatives_spanish:
  - perennes
  - inagotables
  - siempre fluyentes
  lexicon: LSJ
  rationale: La idea principal es el flujo continuo de las fuentes; la perífrasis conserva esa continuidad de manera clara.
- source_word: μαζούς
  english_pob_choice: their breasts
  chosen_spanish: sus caños
  alternatives_spanish:
  - sus pechos
  - sus corrientes
  - sus manantiales
  lexicon: LSJ
  rationale: El griego conserva una metáfora corporal aplicada a las fuentes; en español, «caños» evita una literalidad extraña pero mantiene la imagen de surtido o salida del agua.
- source_word: συνελεύσεις
  english_pob_choice: gatherings
  chosen_spanish: reuniones
  alternatives_spanish:
  - juntas
  - asambleas
  - agrupaciones
  lexicon: LSJ
  rationale: En animales pequeños, el término designa sus agrupamientos; «reuniones» es claro y no impone un matiz humano excesivo.
- source_word: δημιουργός
  english_pob_choice: Creator
  chosen_spanish: Creador
  alternatives_spanish:
  - artífice
  - creador
  - hacedor
  lexicon: LSJ
  rationale: El término en este himno cósmico se refiere a Dios como el que crea todo; «Creador» es la opción más fiel y digna.
- source_word: δεσπότης
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Señor
  - Soberano
  - Dueño
  lexicon: LSJ
  rationale: Se distingue de κύριος en el cierre cristológico. «Maestro» intenta conservar la fuerza de autoridad sin borrar esa distinción léxica en español.
- source_word: ὑπερεκπερισσῶς
  english_pob_choice: far beyond measure
  chosen_spanish: en medida muchísimo mayor
  alternatives_spanish:
  - sobremanera
  - muchísimo más
  - con exceso incomparable
  lexicon: LSJ
  rationale: La acumulación intensiva del adverbio pide una expresión igualmente enfática; esta formulación suena natural y retiene el exceso semántico.
- source_word: προσπεφευγότας
  english_pob_choice: have fled for refuge
  chosen_spanish: hemos huido para refugiarnos
  alternatives_spanish:
  - hemos buscado refugio
  - hemos corrido a refugiarnos
  - hemos tomado refugio
  lexicon: LSJ
  rationale: La imagen de huir hacia un refugio se conserva con la doble idea de movimiento y resguardo.
- source_word: οἰκτιρμοί
  english_pob_choice: mercies
  chosen_spanish: misericordias
  alternatives_spanish:
  - compasiones
  - misericordias
  - piedades
  lexicon: LSJ
  rationale: En español bíblico, «misericordias» comunica bien el plural afectivo y salvífico del término.
- source_word: κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: our Lord Jesus Messiah
  chosen_spanish: nuestro Señor Jesús Mesías
  alternatives_spanish:
  - nuestro Señor Jesús Cristo
  - nuestro Señor Jesús el Mesías
  lexicon: LSJ
  rationale: Se mantiene la traducción titular de Χριστός como «Mesías» según la política del proyecto, preservando el valor de título y no solo de nombre propio.
- source_word: μεγαλωσύνη
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - grandeza
  - magnificencia
  - majestad
  lexicon: LSJ
  rationale: «Majestad» es el equivalente doxológico más natural y elevado en español.
theological_decisions:
- issue: Título Χριστός al final de la doxología
  english_pob_reading: our Lord Jesus Messiah
  chosen_spanish_reading: nuestro Señor Jesús Mesías
  alternative_spanish_readings:
  - nuestro Señor Jesús Cristo
  - nuestro Señor Jesús el Cristo
  rationale: Se traduce el título como «Mesías» para preservar su valor semántico, conforme a la política del proyecto; así no se borra la afirmación titulativa del texto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological force.'
- issue: Distinción entre δεσπότης y κύριος
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Soberano
  - Dueño
  rationale: El himno distingue el término de autoridad general aplicado al cosmos del κύριος del cierre cristológico. «Maestro» intenta mantener esa distinción léxica en español, aunque connota autoridad de modo menos directo que «Señor».
  doctrine_reference: 'DOCTRINE.md: consistency of key terms with documented distinction.'
- issue: Lectura de νερτέρων ἀνεκδιήγητα κρίματα
  english_pob_reading: the indescribable realms of the world below
  chosen_spanish_reading: los ámbitos indescriptibles del mundo de abajo
  alternative_spanish_readings:
  - los juicios indecibles de las regiones inferiores
  - las regiones indescriptibles del inframundo
  rationale: La serie de elementos cosmológicos favorece una lectura locativa o de esferas inferiores; la redacción española conserva esa ambigüedad sin imponer una doctrinalización del término.
  doctrine_reference: 'DOCTRINE.md: preserve lexical/theological tension where the source is ambiguous.'
translation_notes:
  revision_awareness: 'La redacción toma como base el texto griego normalizado de Funk 1901 y contrasta el ajuste editorial reflejado en el audit trail inglés. Se incorporaron las decisiones revisadas del inglés donde clarifican la lectura: el carácter cósmico y ordenado del pasaje, la distinción entre δεσπότης y κύριος, la lectura amplia de νερτέρων ἀνεκδιήγητα κρίματα, y el cierre doxológico con Χριστός como título. La versión española evita calcar mecánicamente el inglés y procura conservar las tensiones léxicas del griego dentro de un español publicable.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός en todo el registro, conforme a la pauta del proyecto.
  - Se distingue «Maestro» de «Señor» para δεσπότης, reservando «Señor» para κύριος en el cierre cristológico.
  - Se conserva el plural cósmico «mundos» para κόσμοι.
  - La imagen de las fuentes conserva una nota explicativa porque la metáfora de μαζούς no tiene equivalente directo y podría sonar extraña en español sin aclaración.
  - El tono general es solemne y bíblico, pero con sintaxis natural en español latinoamericano.
