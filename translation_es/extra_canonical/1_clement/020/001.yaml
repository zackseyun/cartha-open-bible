- from: 'Los cielos, movidos por su gobierno, se someten a él en paz. El día y la noche completan la carrera que él les ha señalado, sin estorbarse en nada uno a otra. El sol y la luna, y los coros de las estrellas, según su ordenanza, avanzan en armonía, sin desviarse en nada, dentro de los límites que les han sido fijados. La tierra, dando fruto conforme a su voluntad, produce en sus estaciones apropiadas alimento abundante para los hombres, las bestias y todos los seres vivientes que hay sobre ella, sin vacilar ni alterar nada de lo que él ha decretado. Las profundidades insondables de los abismos y los ámbitos indescriptibles del mundo de abajo[a] son mantenidos por los mismos mandatos. La masa del mar sin límites, formada por su creación en sus lugares de reunión, no pasa más allá de las barreras que le han sido puestas alrededor, sino que, como él la ordenó, así hace. Porque dijo: «Hasta aquí llegarás, y tus olas se romperán dentro de ti». El océano, inaccesible para los hombres, y
    los mundos que están más allá de él son dirigidos por los decretos del Maestro.

    Las estaciones de la primavera, del verano, del otoño y del invierno se ceden unas a otras en paz. Las estaciones de los vientos, cada una en su propio tiempo, cumplen su servicio sin impedimento; y las fuentes que corren sin cesar, creadas para el disfrute y la salud, sin falta suministran sus caños[b] a los hombres para la vida. Hasta los más pequeños de los seres vivos forman sus reuniones en armonía y paz. Todas estas cosas el gran Creador y Maestro de todo ha dispuesto que existan en paz y armonía, haciendo bien a todas las cosas, pero en medida muchísimo mayor a nosotros, que hemos huido para refugiarnos en sus misericordias por medio de nuestro Señor Jesús Mesías, a quien sea la gloria y la majestad por los siglos de los siglos. Amén.'
  to: 'Los cielos, movidos por su gobierno, se someten a él en paz. El día y la noche completan la carrera que él les ha señalado, sin estorbarse en nada. El sol y la luna, y los coros de las estrellas, según su ordenanza, avanzan en armonía, sin desviarse en nada, en los límites que les han sido fijados. La tierra, dando fruto conforme a su voluntad, produce en sus tiempos apropiados alimento abundante para los hombres, las bestias y todos los seres vivientes que hay sobre ella, sin vacilar ni alterar nada de lo que él ha decretado. Las profundidades insondables de los abismos y los ámbitos indescriptibles del mundo de abajo[a] son mantenidos por los mismos mandatos. La masa del mar sin límites, formada por su creación en sus lugares de reunión, no pasa más allá de las barreras que le han sido puestas alrededor, sino que, como él le ordenó, así hace. Porque dijo: «Hasta aquí llegarás, y tus olas se romperán dentro de ti». El océano, inaccesible para los hombres, y los mundos que están más
    allá de él son dirigidos por los decretos del Soberano.


    Las estaciones de la primavera, del verano, del otoño y del invierno se dan paso unas a otras en paz. Las estaciones de los vientos, cada una en su propio tiempo, cumplen su servicio sin impedimento; y las fuentes que corren sin cesar, creadas para el disfrute y la salud, sin falta suministran sus pechos[b] a los hombres para la vida. Hasta los más pequeños de los seres vivos forman sus reuniones en armonía y paz. Todas estas cosas el gran Creador y Soberano de todo ha dispuesto que existan en paz y armonía, haciendo bien a todas las cosas, pero en medida muchísimo mayor a nosotros, que hemos huido para refugiarnos en sus misericordias por medio de nuestro Señor Jesús Mesías, a quien sea la gloria y la majestad por los siglos de los siglos. Amén.'
  rationale: 'La revisión mantiene casi todo el contenido del borrador, pero corrige tres puntos clave para mayor fidelidad y mejor español: (1) δεσπότης pasa de «Maestro» a «Soberano», preservando autoridad fuerte y distinción respecto de «Señor»; (2) μαζούς pasa de «caños» a «pechos», porque el original conserva una metáfora corporal que no debe borrarse con un término coloquial; (3) se pulen algunos giros para naturalidad y dignidad («sin estorbarse en nada», «se dan paso unas a otras», «en sus tiempos apropiados», «como él le ordenó»). No se requiere adjudicación adicional porque los cambios son claros a la luz del griego y del audit trail inglés.'
