revisions:
- from: Día y noche completan la carrera asignada por él, sin estorbarse en nada.
  to: Día y noche recorren el curso señalado por él, sin estorbarse en nada.
  rationale: Se sustituye «completan la carrera asignada» por «recorren el curso señalado» para expresar con más naturalidad en español la idea de un trayecto establecido que día y noche cumplen sin interferirse. No cambia el sentido, pero mejora la fidelidad idiomática al griego y al inglés POB.
