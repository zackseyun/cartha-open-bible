translation:
  language: es
  text: Día y noche recorren el curso señalado por él, sin estorbarse en nada.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡμέρα τε καὶ νὺξ
  english_pob_choice: Day and night
  chosen_spanish: Día y noche
  alternatives_spanish:
  - El día y la noche
  - De día y de noche
  lexicon: ἡμέρα; νύξ
  rationale: La coordinación simple «Día y noche» reproduce el paralelismo breve del griego y el inglés POB sin añadir matices no presentes. «De día y de noche» sería más idiomático en algunos contextos, pero aquí el sustantivo desnudo conserva mejor la fuerza poética.
- source_word: τὸν τεταγμένον ... δρόμον
  english_pob_choice: the course appointed by him
  chosen_spanish: la carrera asignada por él
  alternatives_spanish:
  - el curso señalado por él
  - el recorrido ordenado por él
  lexicon: τεταγμένος; δρόμος
  rationale: «Dρόμος» puede ser «carrera» o «curso/recorrido». Opto por «carrera» para mantener la imagen de una trayectoria fijada y ejecutada, mientras que «asignada por él» conserva el sentido de orden/disposición del participio pasivo. «Curso» era posible, pero en español puede sonar más abstracto que la imagen griega.
- source_word: ὑπ᾽ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por él mismo
  - por él/por Dios
  lexicon: αὐτός
  rationale: El pronombre griego remite al agente que dispone la carrera. «Por él» reproduce la relación agente-acción sin explicitar más de lo que el texto da.
- source_word: μηδὲν ἀλλήλαις ἐμποδίζοντα
  english_pob_choice: hindering one another in nothing
  chosen_spanish: sin estorbarse en nada
  alternatives_spanish:
  - sin estorbarse mutuamente en nada
  - no estorbándose en nada
  lexicon: ἐμποδίζω; ἀλλήλαις
  rationale: «ἐμποδίζω» es impedir, poner estorbo. «Estorbarse» comunica bien la reciprocidad de «ἀλλήλαις» y evita una frase demasiado literal. «En nada» refleja «μηδέν» con naturalidad española y mantiene la negación absoluta del original.
theological_decisions:
- issue: Referencia del agente implícito en "por él"
  english_pob_reading: by him
  chosen_spanish_reading: por él
  alternative_spanish_readings:
  - por Yahvé
  - por Dios
  rationale: El griego usa un pronombre; no nombra explícitamente al agente. Mantengo la referencia pronominal y no inserto «Yahvé» o «Dios» en el texto principal para no añadir una identificación que el verso no formula de manera explícita, aunque el contexto literario pueda sugerirla.
  doctrine_reference: Respeto de la referencia implícita y de la economía del texto
translation_notes:
  revision_awareness: El pasaje coincide con la traducción inglesa POB ya revisada y sin cambios; no hay notas textuales ni variantes reportadas en el paquete fuente. La versión española sigue el mismo sentido con ajuste idiomático mínimo.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y eclesiásticamente legible.
  - Se conserva la imagen de trayectoria/carrera para δρόμος.
  - No se introduce «SEÑOR» como sustituto del agente porque el griego aquí no usa κύριος.
