translation:
  language: es
  text: a quien sean la gloria y la majestad por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ᾧ
  english_pob_choice: to whom
  chosen_spanish: a quien
  alternatives_spanish:
  - para quien
  - a él
  lexicon: ὅς (dativo relativo)
  rationale: El dativo relativo se expresa de forma natural en español con la preposición «a» seguida de relativo personal. «Para quien» insinuaría finalidad; «a él» perdería la conexión relativa.
- source_word: ἡ δόξα
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - la honra
  - el honor
  lexicon: δόξα
  rationale: «Gloria» es el equivalente directo y estándar en español bíblico para δόξα, manteniendo el valor de honor/majestad/peso sin desplazar el sentido.
- source_word: ἡ μεγαλωσύνη
  english_pob_choice: the majesty
  chosen_spanish: la majestad
  alternatives_spanish:
  - la grandeza
  - la magnificencia
  lexicon: μεγαλωσύνη
  rationale: «Majestad» captura bien la dignidad soberana y coincide con el uso tradicional en español para este sustantivo. «Grandeza» es posible, pero debilita la nota regia del término.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - por siempre jamás
  lexicon: αἰών
  rationale: La fórmula idiomática «por los siglos de los siglos» reproduce la superlación temporal del griego y conserva el registro bíblico sin sonar mecánica ni reducir la intensidad.
theological_decisions:
- issue: Doxología final dirigida a Dios sin nombrarlo explícitamente
  english_pob_reading: to whom be the glory and the majesty forever and ever. Amen.
  chosen_spanish_reading: a quien sean la gloria y la majestad por los siglos de los siglos. Amén.
  alternative_spanish_readings:
  - a quien pertenecen la gloria y la majestad por los siglos de los siglos. Amén.
  - a quien sea la gloria y la majestad por los siglos de los siglos. Amén.
  rationale: El griego contiene una doxología indirecta en dativo relativo. En español, «sean» preserva el giro litúrgico y la referencia implícita sin añadir un verbo de posesión que el texto no expresa. «Pertenecen» explicita demasiado la relación; «sea» suena menos natural con dos sujetos coordinados en plural.
  doctrine_reference: Doxología / atribución de gloria a Dios (cf. fórmulas litúrgicas bíblicas)
translation_notes:
  revision_awareness: La versión inglesa auditada fue ligeramente ajustada en una revisión de ortografía («for ever» -> «forever») sin alterar el sentido. No hay notas léxicas o textuales añadidas en el audit trail; la propuesta española sigue directamente el griego normalizado y mantiene la misma claridad doxológica.
  spanish_consistency_notes:
  - Se usa «Amén» con mayúscula inicial por ser fórmula litúrgica final.
  - No se emplea «SEÑOR» ni «Cristo» porque el texto griego no los contiene.
  - La elección de «gloria» y «majestad» mantiene el paralelismo semántico del original sin introducir comentarios interpretativos.
