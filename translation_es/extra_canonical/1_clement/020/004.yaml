source:
  edition: Funk 1901 (normalized OCR)
  text: γῆ κυοφοροῦσα κατὰ τὸ θέλημα αὐτοῦ τοῖς ἰδίοις καιροῖς τὴν πανπληθῆ ἀνθρώποις τε καὶ θηρίοις καὶ πᾶσι τοῖς οὖσιν ἐπ᾽ αὐτῆς ζῶσιν ἀνατέλλει τροφήν, μήτε διστατάσουσα μηδὲ ἀλλοιοῦσά τι τῶν δεδογματισμένων ὑπ᾽ αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/020/004.yaml
  text: The earth, bearing according to his will at its proper seasons abundant food for men and beasts and all living things upon it, brings it forth, neither wavering nor altering anything of what has been decreed by him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:06Z'
    unchanged: false
    changes_summary: 'Adjusted the syntax to reflect more closely the Greek order and sense: removed the interpretive ''fruit'' from κυοφοροῦσα (''bearing''), rendered τοῖς ἰδίοις καιροῖς as ''at its proper seasons,'' and preserved ἀνατέλλει as ''brings it forth'' with the object ''abundant food.'''
translation:
  language: es
  text: La tierra, [a]conforme a su voluntad y en sus tiempos propios, hace brotar abundante alimento para hombres y bestias y para todos los seres que viven sobre ella, sin vacilar ni alterar nada de lo que ha sido decretado por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Conforme a» conserva mejor el matiz normativo de κατὰ que una simple traducción causal como «por».
    reason: lexical_alternative
lexical_decisions:
- source_word: γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  - la creación
  lexicon: γῆ
  rationale: '«La tierra» conserva el referente amplio del texto: el mundo habitado como proveedor de alimento, no solo el suelo agrícola.'
- source_word: κυοφοροῦσα
  english_pob_choice: bearing
  chosen_spanish: hace brotar
  alternatives_spanish:
  - dando fruto
  - llevando en su seno
  - produciendo
  lexicon: κυοφορέω
  rationale: La POB inglesa evita imponer «fruit» y conserva la idea de la tierra como portadora/productora. En español, «hace brotar» comunica esa fecundidad sin añadir un objeto inexistente en el griego.
- source_word: κατὰ τὸ θέλημα αὐτοῦ
  english_pob_choice: according to his will
  chosen_spanish: conforme a su voluntad
  alternatives_spanish:
  - según su voluntad
  - de acuerdo con su voluntad
  lexicon: κατά + θέλημα
  rationale: «Conforme a su voluntad» reproduce bien el matiz normativo del griego y mantiene un registro digno y bíblico.
- source_word: τοῖς ἰδίοις καιροῖς
  english_pob_choice: at its proper seasons
  chosen_spanish: en sus tiempos propios
  alternatives_spanish:
  - a sus tiempos propios
  - en los tiempos fijados
  lexicon: καιρός
  rationale: «Tiempos propios» sigue de cerca la expresión de la POB y del griego, sin forzar una explicación agrícola excesiva.
- source_word: τὴν πανπληθῆ
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - copioso
  - en gran abundancia
  lexicon: πανπληθής
  rationale: El adjetivo expresa abundancia plena; «abundante» es natural en español y conserva el énfasis cuantitativo.
- source_word: ἀνατέλλει
  english_pob_choice: brings it forth
  chosen_spanish: hace brotar
  alternatives_spanish:
  - lo hace surgir
  - lo produce
  lexicon: ἀνατέλλω
  rationale: La imagen de «hacer brotar» refleja el surgimiento/levantarse de la provisión y evita introducir el sustantivo «alimento» como sujeto.
- source_word: μήτε διστατάσουσα
  english_pob_choice: neither wavering
  chosen_spanish: sin vacilar
  alternatives_spanish:
  - sin titubear
  - sin desviarse
  lexicon: διστατάζω
  rationale: «Sin vacilar» conserva la negación de inestabilidad o duda que expresa la POB, en español idiomático.
- source_word: μηδὲ ἀλλοιοῦσά τι
  english_pob_choice: nor altering anything
  chosen_spanish: ni alterar nada
  alternatives_spanish:
  - ni cambiar nada
  - ni modificar cosa alguna
  lexicon: ἀλλοιόω
  rationale: «Alterar» mantiene la fuerza verbal de la POB y el sentido de no introducir cambio alguno.
- source_word: τῶν δεδογματισμένων ὑπ᾽ αὐτοῦ
  english_pob_choice: of what has been decreed by him
  chosen_spanish: de lo que ha sido decretado por él
  alternatives_spanish:
  - de lo que él ha decretado
  - de las cosas establecidas por él
  lexicon: δογματίζω
  rationale: «Decretado» refleja el valor de decisión fijada/establecida del verbo, y evita un término demasiado eclesiástico como «dogmatizado».
theological_decisions:
- issue: Providencia divina en la fecundidad de la tierra
  english_pob_reading: The earth ... according to his will ... brings it forth
  chosen_spanish_reading: La tierra ... conforme a su voluntad ... hace brotar
  alternative_spanish_readings:
  - La tierra ... según su voluntad ... produce
  - La tierra ... de acuerdo con su voluntad ... hace surgir
  rationale: La formulación preserva que la provisión de alimento acontece bajo la voluntad divina, sin convertir la frase en una mera observación natural.
  doctrine_reference: Providencia divina / creación como instrumento de provisión
- issue: Inmutabilidad respecto del decreto divino
  english_pob_reading: neither wavering nor altering anything of what has been decreed by him
  chosen_spanish_reading: sin vacilar ni alterar nada de lo que ha sido decretado por él
  alternative_spanish_readings:
  - sin desviarse ni cambiar nada de lo decretado por él
  - sin titubear ni modificar nada de lo establecido por él
  rationale: 'Se conserva la tensión de obediencia ordenada de la creación: la tierra no se aparta ni modifica el decreto divino.'
  doctrine_reference: Soberanía de Dios / orden de la creación
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió una interpretación anterior que añadía «fruit» y reordenó la sintaxis para seguir más de cerca el griego: la tierra no «da fruto» aquí, sino que, como portadora fecunda, «hace brotar» alimento en sus tiempos propios. La traducción española sigue esa revisión y evita añadir contenido no atestiguado por el texto fuente.'
  spanish_consistency_notes:
  - Se mantiene «Dios»/pronombre implícito del referente divino del texto sin añadir títulos no presentes.
  - Se conserva el registro solemne y la imagen de provisión creada, evitando una paráfrasis devocional.
  - «Alimento» queda como la provisión explícita resultante, en línea con la POB inglesa y el griego.
