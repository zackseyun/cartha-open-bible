id: 1CLEM.20.6
reference: 1 Clement 20:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: τὸ χύτος τῆς ἀπείρου θαλάσσης κατὰ τὴν δημιουργίαν αὐτοῦ συσταθὲν εἰς τὰς συναγωγὰς οὐ παρεκβαίνει τὰ περιτεθειμένα αὐτῇ χείλη, ἀλλὰ καθὼς διετάξεν αὐτῇ, οὕτως ποιεῖ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/020/006.yaml
  text: The mass of the boundless sea[a], gathered together according to his creation into its basins, does not pass beyond the bounds set around it, but as he commanded it, so it does.
  footnotes:
  - marker: a
    text: Or 'The basin'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:06Z'
    unchanged: false
    changes_summary: Revised 'by his workmanship' to 'according to his creation' for closer lexical alignment with δημιουργία; changed 'reservoirs' to 'basins' for συναγωγαί; changed 'barriers' to 'bounds' for a more natural rendering of the set limits; and changed 'ordered' to 'commanded' for διετάξεν.
translation:
  language: es
  text: La masa[a] del mar sin límites, reunida conforme a su creación en sus cuencas, no traspasa los límites puestos alrededor de ella, sino que, tal como él le ordenó, así lo hace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «La cuenca».'
    reason: alternative_rendering_for_χύτος
lexical_decisions:
- source_word: τὸ χύτος
  english_pob_choice: The mass
  chosen_spanish: la masa
  alternatives_spanish:
  - el volumen
  - la masa de agua
  lexicon: χύτος
  rationale: El griego designa la masa o volumen de agua, no un recipiente. «La masa» conserva la corrección semántica y el paralelismo con la revisión inglesa.
- source_word: τῆς ἀπείρου θαλάσσης
  english_pob_choice: of the boundless sea
  chosen_spanish: del mar sin límites
  alternatives_spanish:
  - del mar inmenso
  - del mar ilimitado
  lexicon: ἄπειρος / θάλασσα
  rationale: «Sin límites» expresa el valor de ἀπείρου de forma natural en español y mantiene la imagen del mar como realidad no contenida.
- source_word: κατὰ τὴν δημιουργίαν αὐτοῦ
  english_pob_choice: according to his creation
  chosen_spanish: conforme a su creación
  alternatives_spanish:
  - según su creación
  - de acuerdo con su creación
  lexicon: δημιουργία
  rationale: La preposición κατὰ pide una relación de conformidad; «conforme a» evita que «creación» suene aquí como acto abstracto sin relación con la disposición del agua.
- source_word: εἰς τὰς συναγωγὰς
  english_pob_choice: into its basins
  chosen_spanish: en sus cuencas
  alternatives_spanish:
  - en sus estanques
  - en sus reservorios
  lexicon: συναγωγή
  rationale: El término apunta aquí a agrupaciones o receptáculos de agua. «Cuencas» es una opción sobria y fiel; «estanques» y «reservorios» son posibles pero menos exactos o más técnicos.
- source_word: τὰ περιτεθειμένα αὐτῇ χείλη
  english_pob_choice: the bounds set around it
  chosen_spanish: los límites puestos alrededor de ella
  alternatives_spanish:
  - los bordes puestos alrededor de ella
  - las orillas puestas alrededor de ella
  lexicon: χείλος
  rationale: χείλη puede referirse a bordes o límites. «Límites» conserva la idea de restricción, coherente con la lectura inglesa revisada a «bounds».
- source_word: διετάξεν αὐτῇ
  english_pob_choice: he commanded it
  chosen_spanish: él le ordenó
  alternatives_spanish:
  - él le mandó
  - él lo dispuso
  lexicon: διατάσσω
  rationale: El verbo expresa mandato/disposición con autoridad; «ordenó» reproduce bien la fuerza imperativa reflejada en la revisión inglesa «commanded».
theological_decisions:
- issue: La personificación del mar obedeciendo el mandato divino
  english_pob_reading: but as he commanded it, so it does
  chosen_spanish_reading: sino que, tal como él le ordenó, así lo hace
  alternative_spanish_readings:
  - sino que, tal como él se lo ordenó, así lo hace
  - sino que, como él mandó, así procede
  rationale: El griego presenta una obediencia cósmica al mandato de Dios. Se conserva la personificación sin suavizarla, porque el texto quiere resaltar el orden creado bajo autoridad divina.
  doctrine_reference: Providencia y soberanía creadora de Dios
translation_notes:
  revision_awareness: 'Se siguió la lectura revisada del inglés POB, que corrigió un error previo en χύτος: no es «cuenca/basin» sino «masa». También se reflejó el ajuste de «barriers» a «bounds» y de «ordered» a «commanded» con equivalentes naturales en español.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí porque el texto no usa el nombre divino explícito.
  - Se evitó «Cristo» o terminología cristológica porque el pasaje es una descripción de la creación y el orden del mar.
  - «Cuencas» se eligió para captar la lectura alternativa del inglés antiguo «The basin», pero el texto principal sigue la corrección a la masa del mar.
  - Se prefirió un registro sobrio y bíblico, sin arcaísmos innecesarios, para preservar la inteligibilidad pública.
