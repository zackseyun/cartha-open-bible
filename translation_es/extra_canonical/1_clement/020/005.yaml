    text: O «las regiones inferiores indescriptibles».
    reason: Aclara una alternativa natural para νερτέρων sin introducir ambigüedad.
  - marker: b
    text: O «son mantenidas juntas».
    reason: Preserva la alternativa documentada en el audit trail inglés para συνέχεται.
  revision_rationale: Se corrige el error semántico principal al sustituir «juicios ... de lo subterráneo» por «las regiones indescriptibles de abajo», en línea con νερτέρων ... κρίματα y con el English POB. También se mejora la naturalidad y fidelidad de συνέχεται ... προστάξεσιν con «están sostenidas por las mismas ordenanzas», evitando el añadido artificial «dentro de los mismos mandatos». Se conservan notas breves para la alternativa espacial y para la alternativa verbal documentada.
