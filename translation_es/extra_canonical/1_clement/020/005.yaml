  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/020/005.yaml
  text: The unsearchable depths of the abysses and the indescribable regions below are held together by the same ordinances[a].
  footnotes:
  - marker: a
    text: Or 'are held together'.
    reason: previous_rendering
  revision_pass:
