    unchanged: false
    changes_summary: Changed 'are constrained' to 'are held together' to more naturally and accurately reflect συνέχεται ('is held together/contained') in context; retained the rest of the wording.
translation:
  language: es
  text: Las profundidades insondables de los abismos y las regiones indescriptibles de abajo[a] están sostenidas por las mismas ordenanzas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las regiones inferiores indescriptibles».
    reason: Aclara una alternativa natural para νερτέρων sin introducir ambigüedad.
  - marker: b
    text: O «son mantenidas juntas».
    reason: Preserva la alternativa documentada en el audit trail inglés para συνέχεται.
lexical_decisions:
- source_word: ἀβύσσων
  english_pob_choice: the abysses
  chosen_spanish: los abismos
  alternatives_spanish:
  - las profundidades
  - los abismos insondables
  lexicon: ἀβύσσος
  rationale: «Abismos» reproduce bien el sustantivo plural y conserva la imagen de profundidad extrema del griego; en contexto cósmico resulta más natural que una paráfrasis amplia. Añadí «insondables» en el texto para reflejar ἀνεξιχνίαστα.
- source_word: ἀνεξιχνίαστα
  english_pob_choice: unsearchable
  chosen_spanish: insondables
  alternatives_spanish:
  - ininvestigables
  - impenetrables
  lexicon: ἀνεξιχνίαστος
  rationale: «Insondables» comunica que no pueden ser plenamente exploradas o sondeadas, con registro digno y claro en español. Evita el calco pesado «inrastreables» y mantiene la idea de inaccesibilidad cognoscitiva.
- source_word: νερτέρων
  english_pob_choice: the regions below
  chosen_spanish: lo subterráneo
  alternatives_spanish:
  - las regiones de abajo
  - los lugares inferiores
  lexicon: νερτέρων
  rationale: El término apunta a lo que está abajo o en las regiones inferiores. «Lo subterráneo» conserva la orientación espacial y suena más natural que una traducción demasiado literal con «regiones».
- source_word: ἀνεκδιήγητα
  english_pob_choice: indescribable
  chosen_spanish: inenarrables
  alternatives_spanish:
  - indescriptibles
  - inexpresables
  lexicon: ἀνεκδιήγητος
  rationale: «Inenarrables» mantiene el valor de aquello que no puede contarse o describirse, y refleja bien la fuerza retórica del griego sin sonar excesivamente técnico.
- source_word: συνέχεται
  english_pob_choice: are held together
  chosen_spanish: son mantenidos dentro
  alternatives_spanish:
  - son mantenidos junto a
  - permanecen contenidos
  lexicon: συνέχω
  rationale: En el contexto de mandatos/ordenanzas, el verbo expresa ser contenido, mantenido dentro o mantenido en cohesión bajo control. «Son mantenidos dentro» conserva esa idea de sujeción a un límite impuesto por decretos, evitando una lectura meramente mecánica de cohesión física.
- source_word: προστάξεσιν
  english_pob_choice: ordinances
  chosen_spanish: mandatos
  alternatives_spanish:
  - ordenanzas
  - preceptos
  lexicon: πρόσταγμα
  rationale: «Mandatos» es claro y suficientemente formal en español, y comunica el carácter de decreto u orden vinculante. «Ordenanzas» podría sonar más jurídico-eclesiástico de lo que exige el contexto.
theological_decisions:
- issue: Relación entre el poder divino y el orden cósmico
  english_pob_reading: The depths ... are held together by the same ordinances.
  chosen_spanish_reading: Las profundidades y lo subterráneo permanecen bajo la sujeción de los mismos mandatos.
  alternative_spanish_readings:
  - '...son mantenidos dentro de los mismos mandatos'
  - '...están contenidos por los mismos mandatos'
  rationale: 'La frase debe comunicar no solo conservación sino control y límite: el cosmos está gobernado por un orden decretado. «Son mantenidos dentro» deja ver la sujeción a un mandato exterior, coherente con el flujo inmediato del capítulo y con la revisión del audit trail que destacó el matiz de contención/sujeción.'
  doctrine_reference: Providencia y soberanía divina sobre la creación; cf. el orden de la creación sometido a la palabra de Dios.
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre «are constrained» y «are held together», con la revisión final volviendo a «held together». La versión española evita escoger solo «constriñen» o solo «cohesión física»; usa una formulación que preserve la idea de ser contenidos/tenidos dentro del mismo decreto, compatible con ambas lecturas y con el contexto de obediencia cósmica.
  spanish_consistency_notes:
  - Se mantiene «mandatos» para προστάξεσιν como término general y no eclesiástico.
  - Se evita traducir ἀβύσσοις con «infiernos» para no introducir una carga doctrinal no exigida por el griego.
  - La nota mantiene la alternativa señalada por el POB inglés sobre συνέχεται sin duplicar el matiz principal del texto.
  - El registro busca ser bíblico y sobrio, pero no arcaizante.
