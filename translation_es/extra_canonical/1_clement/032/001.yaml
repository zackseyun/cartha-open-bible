review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro auditado en inglés en casi todo: conserva la reflexión distributiva inicial, la enumeración genealógica/cultual, «según la carne», la oposición entre obras y voluntad divina, y «somos justificados… sino por la fe». También respeta bien la decisión de «Mesías Jesús». Sin embargo, hay un desajuste semántico importante en ἀπ’ αἰῶνος: «han existido desde el comienzo» añade la idea de existencia continuada, mientras que el griego/inglés dice más sencillamente «los que [han sido] desde el principio/comienzo».'
  spanish_quality_summary: El texto es mayormente natural y digno en español eclesial. «Ministran», «según la carne», «obras de justicia» y «santidad de corazón» funcionan bien. La frase «no están en poca gloria» es algo marcada, pero aceptable por fidelidad retórica. El punto menos idiomático y más problemático es «todos los que han existido desde el comienzo», que suena pesado y sobreinterpreta. Conviene simplificarlo a «todos los que han sido desde el principio» o equivalente.
  glossary_alignment: 'Buena alineación con los términos del proyecto: Χριστῷ -> «Mesías», δικαιούμεθα -> «somos justificados», πίστεως -> «la fe», παντοκράτωρ -> «Todopoderoso», σάρξ -> «carne». No hay conflicto con Yahvé en este pasaje. «Piedad» para εὐσεβείας es apropiado. La única corrección necesaria es léxico-sintáctica para ἀπ’ αἰῶνος.'
  issues:
  - severity: medium
    issue: «han existido desde el comienzo» sobretraduce ἀπ’ αἰῶνος
    rationale: El griego, reflejado por el inglés POB «all who have been from the beginning», no enfatiza la duración existencial continua sino el alcance temporal «desde el principio/de antiguo». «Han existido» introduce una matización adicional y resulta menos natural en este contexto.
  revised_spanish_text: 'Si alguien considera sinceramente cada cosa una por una, reconocerá la grandeza de los dones dados por él. Porque de él son los sacerdotes y los levitas, todos los que ministran en el altar de Dios; de él es el Señor Jesús según la carne; de él son reyes y gobernantes y líderes según Judá; y sus tribus restantes no están en poca gloria, tal como Dios prometió, diciendo: «Tu descendencia será como las estrellas del cielo». Por tanto, todos fueron glorificados y engrandecidos, no por sí mismos ni por sus obras ni por las obras de justicia que realizaron, sino por su voluntad. Y así también nosotros, llamados por su voluntad en el Mesías Jesús, no somos justificados por nosotros mismos, ni por nuestra propia sabiduría o entendimiento o piedad o por obras que hemos hecho en santidad de corazón, sino por la fe, por medio de la cual el Dios Todopoderoso justificó a todos los que han sido desde el principio. A él sea la gloria por los siglos de los siglos. Amén.'
  revision_rationale: Se mantiene la traducción casi intacta porque es fiel al griego y al audit trail inglés. Solo se corrige «han existido desde el comienzo» a «han sido desde el principio» para reflejar mejor ἀπ’ αἰῶνος y evitar una sobreinterpretación existencial en español.
