revisions:
- from: 'Si alguien considera sinceramente cada cosa una por una, reconocerá la grandeza de los dones dados por él. Porque de él son los sacerdotes y los levitas, todos los que ministran en el altar de Dios; de él es el Señor Jesús según la carne; de él son reyes y gobernantes y líderes según Judá; y sus tribus restantes no están en poca gloria, tal como Dios prometió, diciendo: «Tu descendencia será como las estrellas del cielo». Por tanto, todos fueron glorificados y engrandecidos, no por sí mismos ni por sus obras ni por las obras de justicia que realizaron, sino por su voluntad. Y así también nosotros, llamados por su voluntad en el Mesías Jesús, no somos justificados por nosotros mismos, ni por nuestra propia sabiduría o entendimiento o piedad o por obras que hemos hecho en santidad de corazón, sino por la fe, por medio de la cual el Dios Todopoderoso justificó a todos los que han existido desde el comienzo. A él sea la gloria por los siglos de los siglos. Amén.'
  to: 'Si alguien considera sinceramente cada cosa una por una, reconocerá la grandeza de los dones dados por él. Porque de él son los sacerdotes y los levitas, todos los que ministran en el altar de Dios; de él es el Señor Jesús según la carne; de él son reyes y gobernantes y líderes según Judá; y sus tribus restantes no están en poca gloria, tal como Dios prometió, diciendo: «Tu descendencia será como las estrellas del cielo». Por tanto, todos fueron glorificados y engrandecidos, no por sí mismos ni por sus obras ni por las obras de justicia que realizaron, sino por su voluntad. Y así también nosotros, llamados por su voluntad en el Mesías Jesús, no somos justificados por nosotros mismos, ni por nuestra propia sabiduría o entendimiento o piedad o por obras que hemos hecho en santidad de corazón, sino por la fe, por medio de la cual el Dios Todopoderoso justificó a todos los que han sido desde el principio. A él sea la gloria por los siglos de los siglos. Amén.'
  rationale: Se mantiene la traducción casi intacta porque es fiel al griego y al audit trail inglés. Solo se corrige «han existido desde el comienzo» a «han sido desde el principio» para reflejar mejor ἀπ’ αἰῶνος y evitar una sobreinterpretación existencial en español.
