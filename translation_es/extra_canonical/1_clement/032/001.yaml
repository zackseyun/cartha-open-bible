translation:
  language: es
  text: 'Si alguien considera sinceramente cada cosa una por una, reconocerá la grandeza de los dones dados por él. Porque de él son los sacerdotes y los levitas, todos los que ministran en el altar de Dios; de él es el Señor Jesús según la carne; de él son reyes y gobernantes y líderes según Judá; y sus tribus restantes no están en poca gloria, tal como Dios prometió, diciendo: «Tu descendencia será como las estrellas del cielo». Por tanto, todos fueron glorificados y engrandecidos, no por sí mismos ni por sus obras ni por las obras de justicia que realizaron, sino por su voluntad. Y así también nosotros, llamados por su voluntad en el Mesías Jesús, no somos justificados por nosotros mismos, ni por nuestra propia sabiduría o entendimiento o piedad o por obras que hemos hecho en santidad de corazón, sino por la fe, por medio de la cual el Dios Todopoderoso justificó a todos los que han sido desde el principio. A él sea la gloria por los siglos de los siglos. Amén.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθ’ ἓν ἕκαστον
  english_pob_choice: each thing one by one
  chosen_spanish: cada cosa una por una
  alternatives_spanish:
  - cada uno en particular
  - una por una
  lexicon: LSJ / BDAG
  rationale: La frase griega pide una acumulación distributiva. «Cada cosa una por una» conserva la idea de examen detallado sin volverla pesada o meramente técnica.
- source_word: εἰλικρινῶς
  english_pob_choice: sincerely
  chosen_spanish: sinceramente
  alternatives_spanish:
  - con pureza
  - con rectitud
  lexicon: LSJ
  rationale: Expresa con naturalidad la honestidad interior y el tono exhortativo del contexto.
- source_word: κατανοήσῃ
  english_pob_choice: considers
  chosen_spanish: considera
  alternatives_spanish:
  - examina
  - percibe
  lexicon: BDAG
  rationale: «Considera» mantiene la reflexión deliberada que exige el verbo, sin reducirlo a simple comprensión mental.
- source_word: μεγαλεῖα
  english_pob_choice: the greatness
  chosen_spanish: la grandeza
  alternatives_spanish:
  - las grandes cosas
  - las maravillas
  lexicon: LSJ
  rationale: Aquí el foco está en la magnitud del don, no en actos aislados; «la grandeza» reproduce bien ese valor colectivo.
- source_word: δωρεῶν
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - dádivas
  lexicon: BDAG
  rationale: «Dones» suena natural en español eclesial y conserva el carácter de lo concedido gratuitamente.
- source_word: λειτουργοῦντες
  english_pob_choice: minister
  chosen_spanish: ministran
  alternatives_spanish:
  - sirven
  - realizan servicio sagrado
  lexicon: BDAG
  rationale: «Ministran» preserva la textura cultual del verbo mejor que «sirven», especialmente junto al altar.
- source_word: θυσιαστηρίῳ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: BDAG
  rationale: La palabra española «altar» es suficiente y clara en este contexto sacerdotal judío.
- source_word: τὸ κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - con respecto a la carne
  - según su humanidad
  lexicon: BDAG
  rationale: Se conserva la formulación tradicional y su resonancia intertextual. «Según la carne» mantiene la tensión entre descendencia y lenguaje cristológico temprano.
- source_word: ἡγούμενοι
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - dirigentes
  - jefes
  lexicon: BDAG
  rationale: Es un término amplio de gobierno o autoridad; «líderes» resulta comprensible sin especificar más de lo que el texto da.
- source_word: σκῆπτρα
  english_pob_choice: tribes
  chosen_spanish: tribus
  alternatives_spanish:
  - cetros
  - casas gobernantes
  lexicon: LSJ
  rationale: El contexto genealógico y la mención de Judá favorecen «tribus». Literalmente «cetros» oscurecería la lógica de la enumeración.
- source_word: οὐκ ἐν μικρᾷ δόξῃ
  english_pob_choice: are not in small glory
  chosen_spanish: no están en poca gloria
  alternatives_spanish:
  - no están en escasa gloria
  - no carecen de gran honor
  lexicon: BDAG
  rationale: La traducción conserva la litotes griega sin neutralizarla. Aunque algo marcada, «en poca gloria» refleja fielmente el giro retórico.
- source_word: ἐδοξάσθησαν καὶ ἐμεγαλύνθησαν
  english_pob_choice: were glorified and made great
  chosen_spanish: fueron glorificados y engrandecidos
  alternatives_spanish:
  - fueron honrados y exaltados
  - fueron glorificados y exaltados
  lexicon: BDAG
  rationale: Mantiene el doble pasivo y el énfasis en la acción recibida, no autooriginada.
- source_word: δικαιοπραγίας
  english_pob_choice: righteous deeds
  chosen_spanish: obras de justicia
  alternatives_spanish:
  - acciones justas
  - obras justas
  lexicon: LSJ
  rationale: «Obras de justicia» comunica de forma clara la referencia a actos rectos sin perder el peso ético del término.
- source_word: δικαιούμεθα
  english_pob_choice: are justified
  chosen_spanish: somos justificados
  alternatives_spanish:
  - somos declarados justos
  - somos hechos justos
  lexicon: BDAG
  rationale: Se conserva el término teológico de la tradición cristiana y la fuerza forense del verbo.
- source_word: εὐσεβείας
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - temor de Dios
  lexicon: BDAG
  rationale: «Piedad» es idiomático en español bíblico y preserva la dimensión religiosa-ética del vocablo.
- source_word: ὁσιότητι καρδίας
  english_pob_choice: holiness of heart
  chosen_spanish: santidad de corazón
  alternatives_spanish:
  - pureza de corazón
  - devoción del corazón
  lexicon: BDAG
  rationale: «Santidad de corazón» mantiene el énfasis interior sin volverlo abstracto o moralizante.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se mantiene el valor soteriológico de πίστις con el término habitual «fe», conforme al criterio del proyecto.
- source_word: ἀπ’ αἰῶνος
  english_pob_choice: from the beginning
  chosen_spanish: desde el comienzo
  alternatives_spanish:
  - desde el principio
  - desde hace siglos
  lexicon: BDAG
  rationale: «Desde el comienzo» es natural en español y conserva la amplitud temporal sin cargar una lectura metafísica no exigida por el contexto.
- source_word: παντοκράτωρ
  english_pob_choice: Almighty
  chosen_spanish: Todopoderoso
  alternatives_spanish:
  - Omnipotente
  - Soberano de todo
  lexicon: BDAG
  rationale: «Todopoderoso» es la equivalencia bíblica más estable y transparente en español.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se usa «Mesías» para conservar el sentido titular y evitar tratarlo como nombre fijo cuando el contexto sigue siendo claramente mesiánico.
theological_decisions:
- issue: Relación entre obras y justificación en 1 Clemente 32:3–4
  english_pob_reading: El autor afirma que los patriarcas y también «nosotros» somos glorificados y justificados no por nosotros mismos ni por nuestras obras, sino por la voluntad de Dios, y en el caso de los creyentes, por la fe.
  chosen_spanish_reading: El texto deja una oposición clara entre autosuficiencia, obras y la voluntad de Dios; además, para los creyentes, la justificación ocurre «por la fe».
  alternative_spanish_readings:
  - Solo es una exhortación moral a la humildad
  - Aquí πίστις podría significar fidelidad más que fe
  rationale: La secuencia argumental es demasiado explícita para reducirla a mera ética. Se conserva «fe» para πίστις, sin eliminar la posibilidad de que implique una fe activa y obediente en la discusión doctrinal posterior.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension without erasing lexical force.'
- issue: Renderización de τὸ κατὰ σάρκα respecto de Jesús
  english_pob_reading: “according to the flesh” preserves incarnational and genealogical nuance.
  chosen_spanish_reading: «Según la carne» conserva tanto la posible referencia genealógica como la resonancia cristológica antigua.
  alternative_spanish_readings:
  - según su humanidad
  - en cuanto a su linaje
  rationale: No se debe resolver prematuramente la tensión entre descendencia davídico-judía y lenguaje cristológico de la encarnación; la forma tradicional permite ambas dimensiones.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión en inglés que afinó καθ’ ἓν ἕκαστον como “each thing one by one”, ajustó la relación con Judá a “according to Judah” y prefirió “through which” para διὰ. La versión española intenta reflejar esos tres ajustes con «cada cosa una por una», «según Judá» y «por medio de la cual».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el nombre divino; en este pasaje aparece θεός como «Dios» y παντοκράτωρ como «Todopoderoso».
  - Se tradujo Χριστός como «Mesías» conforme a la preferencia del proyecto cuando funciona como título.
  - Se mantuvo «según la carne» para τὸ κατὰ σάρκα por su valor teológico y genealógico.
  - Se preservó la litotes de οὐκ ἐν μικρᾷ δόξῃ con una forma española equivalente aunque marcada.
  - «Por medio de la cual» se eligió para mantener la relación instrumental de διὰ con πίστεως.
