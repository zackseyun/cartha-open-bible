base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/032/001.yaml
  text: If anyone sincerely considers each thing one by one, he will recognize the greatness of the gifts given by him. For from him are priests and Levites, all who minister at the altar of God; from him is the Lord Jesus according to the flesh; from him are kings and rulers and leaders according to Judah; and his remaining tribes are not in small glory, just as God promised, saying, “Your seed will be as the stars of heaven.” Therefore all were glorified and made great, not through themselves or through their works or through the righteous deeds that they accomplished, but through his will. And so we also, having been called through his will in Messiah Jesus, are not justified through ourselves, nor through our own wisdom or understanding or godliness or works that we have done in holiness of heart, but through faith, through which the Almighty God justified all who have been from the beginning. To him be the glory forever and ever. Amen.
