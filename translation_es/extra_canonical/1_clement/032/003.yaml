review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: todos fueron glorificados y engrandecidos, no por sí mismos, ni por sus obras, ni por sus actos justos, sino por la voluntad de Dios. Sin embargo, «por medio de» repetido tres veces suena más instrumental de lo que exige διὰ aquí; en español, «por» comunica mejor la negación causal sin perder fidelidad. Además, «obras justas» es aceptable, pero «actos justos» evita la repetición inmediata de «obras» y representa con más precisión δικαιοπραγία como práctica de justicia.'
  spanish_quality_summary: El texto es claro y digno, pero algo pesado por la repetición de «por medio de». La revisión propuesta mejora la fluidez y mantiene el paralelismo. «Engrandecidos» es una buena solución idiomática para ἐμεγαλύνθησαν y «glorificados» conserva el pasivo con naturalidad eclesial.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «Mesías», «Yahvé», etc., no aparecen aquí. La elección de «actos justos» para δικαιοπραγία preserva la fuerza moral sin introducir terminología extraña.
  issues:
  - severity: medium
    issue: Repetición excesiva de «por medio de»
    rationale: Aunque διὰ puede expresar medio, en esta cadena negativa española «por» suena más natural y conserva bien el valor causal/instrumental del original sin rigidez innecesaria.
  - severity: low
    issue: «obras justas» repite demasiado «obras»
    rationale: El griego distingue τῶν ἔργων αὐτῶν de τῆς δικαιοπραγίας. «Actos justos» mantiene la diferencia léxica con mejor estilo en español.
  revised_spanish_text: Por tanto, todos fueron glorificados y engrandecidos, no por sí mismos, ni por sus obras, ni por los actos justos que hicieron, sino por su voluntad.
  revision_rationale: Se aligera la sintaxis sustituyendo «por medio de» por «por», que en español expresa con naturalidad la negación de causa o medio. También se cambia «obras justas» por «actos justos» para evitar repetición innecesaria y reflejar mejor la distinción del griego entre «obras» en general y «prácticas justas» en particular.
