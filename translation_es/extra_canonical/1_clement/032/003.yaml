id: 1CLEM.32.3
reference: 1 Clement 32:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: πάντες οὖν ἐδοξάσθησαν καὶ ἐμεγαλύνθησαν οὐ δι’ αὑτῶν ἢ τῶν ἔργων αὐτῶν ἢ τῆς δικαιοπραγίας ἧς κατειργάσαντο, ἀλλὰ διὰ τοῦ θελήματος αὐτοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/032/003.yaml
  text: Therefore all were glorified and magnified, not through themselves or through their works or through the righteous deeds that they did, but through his will.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:22Z'
    unchanged: false
    changes_summary: Changed 'made great' to 'magnified' for closer correspondence to ἐμεγαλύνθησαν, and simplified 'that they accomplished' to 'that they did' for a more natural rendering of κατειργάσαντο while preserving the sense.
translation:
  language: es
  text: Por tanto, todos fueron glorificados y engrandecidos, no por sí mismos, ni por sus obras, ni por los actos justos que hicieron, sino por su voluntad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐδοξάσθησαν
  english_pob_choice: were glorified
  chosen_spanish: fueron glorificados
  alternatives_spanish:
  - fueron honrados
  - recibieron gloria
  lexicon: δοξάζω
  rationale: Se conserva el sentido pasivo de recibir gloria, siguiendo de cerca el POB inglés y evitando una paráfrasis más libre.
- source_word: ἐμεγαλύνθησαν
  english_pob_choice: magnified
  chosen_spanish: engrandecidos
  alternatives_spanish:
  - magnificados
  - hechos grandes
  lexicon: μεγαλύνω
  rationale: «Engrandecidos» comunica bien en español la idea de ser hechos grandes/exaltados; «magnificados» sería más literal pero menos natural para lectura pública.
- source_word: οὐ δι’ αὑτῶν
  english_pob_choice: not through themselves
  chosen_spanish: no por medio de sí mismos
  alternatives_spanish:
  - no por sí mismos
  - no por sus propios medios
  lexicon: διά + genitivo
  rationale: La preposición expresa causa o medio; «por medio de» mantiene explícita la mediación negada por el griego y por el inglés POB.
- source_word: ἢ τῶν ἔργων αὐτῶν
  english_pob_choice: or through their works
  chosen_spanish: ni por medio de sus obras
  alternatives_spanish:
  - ni por sus obras
  - ni a causa de sus obras
  lexicon: ἔργον
  rationale: «Obras» es el equivalente directo y conserva la repetición retórica del texto.
- source_word: τῆς δικαιοπραγίας ἧς κατειργάσαντο
  english_pob_choice: the righteous deeds that they did
  chosen_spanish: las obras justas que hicieron
  alternatives_spanish:
  - la rectitud que practicaron
  - los actos de justicia que realizaron
  lexicon: δικαιοπραγία
  rationale: El término compuesto apunta a acciones justas o rectas; «obras justas» conserva el paralelismo con «obras» y la carga moral sin introducir un tecnicismo raro.
- source_word: διὰ τοῦ θελήματος αὐτοῦ
  english_pob_choice: through his will
  chosen_spanish: por medio de su voluntad
  alternatives_spanish:
  - por su voluntad
  - a través de su voluntad
  lexicon: θέλημα
  rationale: Se mantiene la noción causal/instrumental de διὰ; «por medio de» refleja mejor el griego y el POB inglés que un simple «por».
theological_decisions:
- issue: Fuente del honor y la exaltación no humana
  english_pob_reading: not through themselves or through their works ... but through his will
  chosen_spanish_reading: no por medio de sí mismos, ni por medio de sus obras ... sino por medio de su voluntad
  alternative_spanish_readings:
  - no por sí mismos... sino por su voluntad
  - no por sus méritos... sino por su voluntad
  rationale: 'Se preserva la tensión teológica: la gloria y el engrandecimiento no proceden de méritos humanos sino de la voluntad divina. Evito «méritos», porque el griego habla de obras y del obrar justo, no de una categoría latina posterior.'
  doctrine_reference: gracia y dependencia de la voluntad divina
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: ''magnified'' y ''that they did''. En español se refleja esa actualización con ''engrandecidos'' y ''que hicieron'', manteniendo una equivalencia más cercana al griego ἐμεγαλύνθησαν y a κατειργάσαντο sin perder naturalidad.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' no aparece en el versículo; se conserva la referencia pronominal 'su voluntad' como en el original.
  - Se usa una cadena paralela de 'por medio de' para reproducir la repetición enfática del texto griego y del POB inglés.
  - '''Obras justas'' traduce δικαιοπραγία sin imponer terminología doctrinal más técnica que el pasaje no exige.'
