id: 1CLEM.32.2
reference: 1 Clement 32:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἐξ αὐτοῦ γὰρ ἱερεῖς καὶ λευῖται πάντες οἱ λειτουργοῦντες τῷ θυσιαστηρίῳ τοῦ θεοῦ· ἐξ αὐτοῦ ὁ κύριος Ἰησοῦς τὸ κατὰ σάρκα· ἐξ αὐτοῦ βασιλεῖς καὶ ἄρχοντες καὶ ἡγούμενοι κατὰ τὸν Ἰούδαν· τὰ δὲ λοιπὰ σκῆπτρα αὐτοῦ οὐκ ἐν μικρᾷ δόξῃ ὑπάρχουσιν, ὡς ἐπαγγειλαμένου τοῦ θεοῦ, ὅτι ἔσται τὸ σπέρμα σου ὡς οἱ ἀστέρες τοῦ οὐρανοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/032/002.yaml
  text: For from him are priests and Levites[a], all who minister at the altar of God; from him is the Lord Jesus according to the flesh; from him are kings and rulers and leaders according to Judah; and his remaining scepters are in no small glory, just as God promised, saying, “Your seed will be as the stars of heaven.”
  footnotes:
  - marker: a
    text: Or 'are not in small glory'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:22Z'
    unchanged: false
    changes_summary: Changed “tribes” to “scepters” to reflect σκῆπτρα and avoid omitting the source term; retained the rest as accurate and natural.
translation:
  language: es
  text: 'Porque de él son los sacerdotes y los levitas, todos los que ministran ante el altar de Dios; de él es el Señor Jesús según la carne; de él son los reyes, los gobernantes y los líderes según Judá; y sus cetros restantes gozan de no poca gloria[a], tal como Dios prometió, diciendo: «Tu descendencia será como las estrellas del cielo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no están en poca gloria».
    reason: lexical_alternative para la litotes οὐκ ἐν μικρᾷ δόξῃ
lexical_decisions:
- source_word: ἐξ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - provenientes de él
  - proceden de él
  lexicon: source phrase
  rationale: Mantiene la repetición enfática del griego y la relación de origen o procedencia sin añadir interpretación.
- source_word: ἱερεῖς καὶ λευῖται
  english_pob_choice: priests and Levites
  chosen_spanish: sacerdotes y levitas
  alternatives_spanish:
  - presbíteros y levitas
  - sacerdotes y levíticos
  lexicon: source phrase
  rationale: «Levitas» es el equivalente directo y estándar para λευῖται; «sacerdotes» conserva ἱερεῖς sin desplazar el paralelo con los levitas.
- source_word: λειτουργοῦντες τῷ θυσιαστηρίῳ τοῦ θεοῦ
  english_pob_choice: all who minister at the altar of God
  chosen_spanish: todos los que ministran en el altar de Dios
  alternatives_spanish:
  - todos los que sirven en el altar de Dios
  - todos los que ofician ante el altar de Dios
  lexicon: source phrase
  rationale: «Ministrar» refleja bien λειτουργεῖν en un registro eclesial sin perder el sentido de servicio litúrgico; «altar de Dios» traduce literalmente τῷ θυσιαστηρίῳ τοῦ θεοῦ.
- source_word: ὁ κύριος Ἰησοῦς
  english_pob_choice: the Lord Jesus
  chosen_spanish: el Señor Jesús
  alternatives_spanish:
  - el Señor, Jesús
  - Jesús el Señor
  lexicon: source phrase
  rationale: Conserva el nombre-título tal como aparece en el griego y en el POB inglés; no se sustituye por una formulación menos directa.
- source_word: τὸ κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - en cuanto a la carne
  - de acuerdo con la carne
  lexicon: σάρξ
  rationale: «Carne» respeta la terminología paulina y patrística del griego; «según» reproduce la preposición de ámbito sin convertirla en una paráfrasis doctrinal.
- source_word: βασιλεῖς καὶ ἄρχοντες καὶ ἡγούμενοι
  english_pob_choice: kings and rulers and leaders
  chosen_spanish: los reyes, los gobernantes y los líderes
  alternatives_spanish:
  - reyes, magistrados y jefes
  - reyes, príncipes y gobernantes
  lexicon: source phrase
  rationale: «Gobernantes» y «líderes» son opciones amplias y comprensibles en español contemporáneo; se mantiene la triple serie del original sin colapsarla en un solo término.
- source_word: κατὰ τὸν Ἰούδαν
  english_pob_choice: according to Judah
  chosen_spanish: según Judá
  alternatives_spanish:
  - de acuerdo con Judá
  - en la línea de Judá
  lexicon: source phrase
  rationale: «Según Judá» conserva la referencia tribal y la misma construcción de ámbito que el griego y el inglés POB.
- source_word: τὰ δὲ λοιπὰ σκῆπτρα αὐτοῦ
  english_pob_choice: his remaining scepters
  chosen_spanish: sus cetros restantes
  alternatives_spanish:
  - sus cetros que quedan
  - las demás varas de su cetro
  lexicon: σκῆπτρα
  rationale: «Cetros» refleja σκῆπτρα con claridad y mantiene la imagen real/tribal del texto; «restantes» sigue la idea de lo que permanece o queda.
- source_word: οὐκ ἐν μικρᾷ δόξῃ
  english_pob_choice: in no small glory
  chosen_spanish: en no poca gloria
  alternatives_spanish:
  - con no poca gloria
  - en gran gloria
  lexicon: source phrase
  rationale: Reproduce la litotes del griego y del inglés POB sin neutralizarla; «en gran gloria» explicitaría demasiado el efecto retórico.
- source_word: ὡς ἐπαγγειλαμένου τοῦ θεοῦ
  english_pob_choice: just as God promised
  chosen_spanish: tal como Dios prometió
  alternatives_spanish:
  - como Dios prometió
  - según había prometido Dios
  lexicon: source phrase
  rationale: Expresa con naturalidad la cláusula de comparación y promesa sin perder el sujeto explícito «Dios».
- source_word: ὅτι ἔσται τὸ σπέρμα σου ὡς οἱ ἀστέρες τοῦ οὐρανοῦ
  english_pob_choice: saying, “Your seed will be as the stars of heaven.”
  chosen_spanish: 'diciendo: «Tu descendencia será como las estrellas del cielo».'
  alternatives_spanish:
  - 'diciendo: «Tu simiente será como las estrellas del cielo»'
  - 'diciendo: «Tu descendencia será como las estrellas del firmamento»'
  lexicon: σπέρμα
  rationale: «Descendencia» es una opción clara y bíblica en español para σπέρμα; se evita «simiente» por posible arcaísmo y ambigüedad biológica, salvo que el contexto requiriera mayor literalidad.
theological_decisions:
- issue: Referencia a Jesús dentro de una lista de procedencias genealógicas/tribales
  english_pob_reading: from him is the Lord Jesus according to the flesh
  chosen_spanish_reading: de él es el Señor Jesús según la carne
  alternative_spanish_readings:
  - de él es el Señor Jesús en cuanto a la carne
  - de él es el Señor Jesús como hombre
  rationale: 'Se conserva la afirmación cristológica sin suavizarla: Jesús pertenece, según su dimensión carnal/terrenal, a la línea de procedencia mencionada. «Según la carne» preserva la fórmula tradicional y la tensión entre origen davídico y señorío de Jesús.'
  doctrine_reference: Cristología encarnacional; linaje davídico en la confesión cristiana primitiva
- issue: Litotes de honra para los «cetros restantes»
  english_pob_reading: his remaining scepters are in no small glory
  chosen_spanish_reading: sus cetros restantes están en no poca gloria
  alternative_spanish_readings:
  - sus cetros restantes están en gran gloria
  - sus cetros restantes no están en poca gloria
  rationale: Se preserva la litotes del griego, importante para el tono retórico del pasaje. Traducirla como «gran gloria» perdería el recurso estilístico señalado por el texto.
  doctrine_reference: Retórica bíblica; valoración honorífica de la línea de Judá
translation_notes:
  revision_awareness: El inglés auditado pasó de una formulación poco natural («are not in small glory») a «are in no small glory», y luego de «tribes» a «scepters» para reflejar σκῆπτρα. La versión española sigue esa revisión y mantiene la litotes con «en no poca gloria», además de conservar «cetros» para evitar perder el término fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en este proyecto, pero aquí el griego usa θεός y por eso se traduce «Dios».
  - Se conserva «Señor Jesús» como forma estable del título cristológico.
  - Se usa «según la carne» de manera consistente con el valor de σάρξ sin expandirlo a una paráfrasis explicativa.
