review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue bien la estructura repetitiva de ἐξ αὐτοῦ, mantiene correctamente «sacerdotes y levitas», «el Señor Jesús según la carne», y preserva la litotes de οὐκ ἐν μικρᾷ δόξῃ. Sin embargo, «todos los que ministran en el altar de Dios» traduce de forma menos precisa λειτουργοῦντες τῷ θυσιαστηρίῳ, donde el dativo se expresa mejor en español como servicio en relación con el altar («ante» o «en servicio del»), no tanto ubicación física. Además, la nota al pie existente no corresponde al lugar donde debería anclarse y omite un posible punto de ambigüedad real del español.
  spanish_quality_summary: El español es claro y de registro eclesial legible. No obstante, «están en no poca gloria» suena algo forzado en español; «gozan de no poca gloria» conserva la litotes con mejor naturalidad. También conviene anclar la nota a la frase de litotes, no a «levitas», ya que la nota actual explica una alternativa para esa cláusula, no para λευῖται.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Señor Jesús», «carne», «Dios», «descendencia». No hay conflictos con Yahvé/Mesías/etc. Se mantiene adecuadamente σκῆπτρα como «cetros». La única mejora léxica necesaria es afinar λειτουργοῦντες τῷ θυσιαστηρίῳ y la formulación idiomática de la litotes.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «levitas» pero su contenido trata la cláusula «en no poca gloria».
    rationale: Esto rompe la correspondencia obligatoria entre marcador y palabra/frase explicada, y puede confundir al lector.
  - severity: medium
    issue: «Ministran en el altar de Dios» es menos preciso para λειτουργοῦντες τῷ θυσιαστηρίῳ.
    rationale: El griego expresa servicio litúrgico respecto del altar, no simplemente actividad sobre él; «ante el altar» o similar suena más natural y fiel en español.
  - severity: low
    issue: «Están en no poca gloria» resulta algo rígido en español.
    rationale: La litotes debe conservarse, pero puede expresarse con una formulación más idiomática como «gozan de no poca gloria».
  revised_spanish_text: 'Porque de él son los sacerdotes y los levitas, todos los que ministran ante el altar de Dios; de él es el Señor Jesús según la carne; de él son los reyes, los gobernantes y los líderes según Judá; y sus cetros restantes gozan de no poca gloria[a], tal como Dios prometió, diciendo: «Tu descendencia será como las estrellas del cielo».'
  revised_footnotes:
  - marker: a
    text: O «no están en poca gloria».
    reason: lexical_alternative para la litotes οὐκ ἐν μικρᾷ δόξῃ
  revision_rationale: Se reubica la nota al pie para que corresponda a la cláusula que realmente explica. Se ajusta «ministran en el altar» a «ministran ante el altar» para reflejar mejor el valor de λειτουργοῦντες τῷ θυσιαστηρίῳ en español natural. Se mejora la fluidez de la litotes con «gozan de no poca gloria», preservando el recurso retórico y el sentido del griego.
