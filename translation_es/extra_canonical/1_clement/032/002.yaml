revisions:
- from: 'Porque de él son los sacerdotes y los levitas[a], todos los que ministran en el altar de Dios; de él es el Señor Jesús según la carne; de él son los reyes, los gobernantes y los líderes según Judá; y sus cetros restantes están en no poca gloria, tal como Dios prometió, diciendo: «Tu descendencia será como las estrellas del cielo».'
  to: 'Porque de él son los sacerdotes y los levitas, todos los que ministran ante el altar de Dios; de él es el Señor Jesús según la carne; de él son los reyes, los gobernantes y los líderes según Judá; y sus cetros restantes gozan de no poca gloria[a], tal como Dios prometió, diciendo: «Tu descendencia será como las estrellas del cielo».'
  rationale: Se reubica la nota al pie para que corresponda a la cláusula que realmente explica. Se ajusta «ministran en el altar» a «ministran ante el altar» para reflejar mejor el valor de λειτουργοῦντες τῷ θυσιαστηρίῳ en español natural. Se mejora la fluidez de la litotes con «gozan de no poca gloria», preservando el recurso retórico y el sentido del griego.
