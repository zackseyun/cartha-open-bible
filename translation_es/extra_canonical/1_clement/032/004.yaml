id: 1CLEM.32.4
reference: 1 Clement 32:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ ἡμεῖς οὖν, διὰ θελήματος αὐτοῦ ἐν Χριστῷ Ἰησοῦ κληθέντες, οὐ δι’ ἑαυτῶν δικαιούμεθα οὐδὲ διὰ τῆς ἡμετέρας σοφίας ἢ συνέσεως ἢ εὐσεβείας ἢ ἔργων ὧν κατειργασάμεθα ἐν ὁσιότητι καρδίας, ἀλλὰ διὰ τῆς πίστεως, δ’ ἧς πάντας τοὺς ἀπ’ αἰῶνος ὁ παντοκράτωρ θεὸς ἐδικαίωσεν· ᾧ ἔστω ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/032/004.yaml
  text: And so we also[a], having been called through his will in Christ Jesus, are not justified by ourselves, nor by our own wisdom or understanding or godliness or works that we have done in holiness of heart, but through faith, by which the Almighty God has justified all who have been from the beginning. To him be the glory forever and ever[b]. Amen.
  footnotes:
  - marker: a
    text: Or 'Messiah Jesus'.
    reason: previous_rendering
  - marker: b
    text: Or 'works that we have done'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:23Z'
    unchanged: false
    changes_summary: Adjusted 'through ourselves' to 'by ourselves' for more natural rendering of δι’ ἑαυτῶν; changed 'accomplished' to 'done' for simpler, more natural English; changed 'justified' to 'has justified' to better reflect the Greek perfective sense in context.
translation:
  language: es
  text: Y así también nosotros, habiendo sido llamados por su voluntad en Cristo Jesús, no somos justificados por nosotros mismos, ni por nuestra propia sabiduría, o entendimiento, o piedad, ni por obras que hemos hecho en santidad de corazón, sino por la fe, por la cual el Dios Todopoderoso ha justificado a todos los que han sido desde el principio. A él sea la gloria por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Christ Jesus
  chosen_spanish: en Cristo Jesús
  alternatives_spanish:
  - en Mesías Jesús
  lexicon: Χριστός
  rationale: La revisión auditada favorece «Christ Jesus» como fórmula cristiana fija en este contexto tardío de 1 Clemente; en español, «Cristo Jesús» mantiene ese valor formulístico y evita forzar «Mesías» donde la tradición griega funciona como título/nombre estable.
- source_word: δικαιούμεθα / ἐδικαίωσεν
  english_pob_choice: are justified / has justified
  chosen_spanish: somos justificados / ha justificado
  alternatives_spanish:
  - somos declarados justos / ha declarado justos
  lexicon: δικαιόω
  rationale: Se conserva el lenguaje forense de δικαιόω con «justificar», que es el equivalente español más directo y auditado para la decisión inglesa; «declarar justos» explica el sentido, pero no sustituye la forma verbal principal del texto.
- source_word: δι’ ἑαυτῶν
  english_pob_choice: by ourselves
  chosen_spanish: por nosotros mismos
  alternatives_spanish:
  - a través de nosotros mismos
  lexicon: διά + pronombre reflexivo
  rationale: «Por nosotros mismos» reproduce naturalmente la idea de medio o agencia excluida en español y evita el calco menos idiomático «a través de nosotros mismos».
- source_word: σοφίας ἢ συνέσεως ἢ εὐσεβείας
  english_pob_choice: wisdom or understanding or godliness
  chosen_spanish: sabiduría o entendimiento o piedad
  alternatives_spanish:
  - sabiduría o inteligencia o devoción
  lexicon: σοφία / σύνεσις / εὐσέβεια
  rationale: «Entendimiento» conserva la dimensión de comprensión/discernimiento de σύνεσις sin sobreintelectualizarla; «piedad» mantiene el valor religioso de εὐσέβεια en un registro bíblico natural para el español.
- source_word: ἔργων ὧν κατειργασάμεθα ἐν ὁσιότητι καρδίας
  english_pob_choice: works that we have done in holiness of heart
  chosen_spanish: obras que hemos hecho en santidad de corazón
  alternatives_spanish:
  - obras que hemos realizado en santidad de corazón
  - obras que hemos llevado a cabo en santidad de corazón
  lexicon: ἔργα / κατεργάζομαι / ὁσιότης
  rationale: Se mantiene «obras» para ἔργα y «hemos hecho» como equivalente sobrio y claro de κατειργασάμεθα; «santidad de corazón» conserva la construcción del original sin suavizar la relación entre la esfera interior y las obras.
- source_word: διὰ τῆς πίστεως
  english_pob_choice: through faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - mediante la fe
  lexicon: πίστις
  rationale: «Por la fe» es la manera española más directa y fluida para expresar el medio instrumental de la frase, manteniendo la concisión del original.
- source_word: ὁ παντοκράτωρ θεός
  english_pob_choice: the Almighty God
  chosen_spanish: el Dios Todopoderoso
  alternatives_spanish:
  - el Dios Omnipotente
  lexicon: παντοκράτωρ
  rationale: «Todopoderoso» es la designación más estable y ampliamente inteligible en español para παντοκράτωρ, y preserva el tono doxológico del cierre.
theological_decisions:
- issue: Función de Χριστός en la fórmula ἐν Χριστῷ Ἰησοῦ
  english_pob_reading: Christ Jesus rather than Messiah Jesus in this late first-century ecclesial formula
  chosen_spanish_reading: Cristo Jesús
  alternative_spanish_readings:
  - Mesías Jesús
  rationale: La evidencia revisada indica que en esta fórmula epistolar temprana Χριστός actúa como título/nombre cristiano convencional, no como una aclaración semítica que el oyente griego deba percibir primariamente. Por eso se conserva «Cristo Jesús» en español.
  doctrine_reference: Cristología y uso titular temprano de Χριστός en la Iglesia primitiva
- issue: Valor de δικαιούμεθα / ἐδικαίωσεν en relación con la obra humana
  english_pob_reading: not justified by ourselves ... but through faith, by which the Almighty God has justified all who have been from the beginning
  chosen_spanish_reading: no somos justificados por nosotros mismos ... sino por la fe, por la cual el Dios Todopoderoso ha justificado a todos los que han existido desde el principio
  alternative_spanish_readings:
  - no nos declaramos justos por nosotros mismos ... sino por la fe, por la cual Dios ha declarado justos a todos
  rationale: 'Se conserva el contraste del texto: exclusión de mérito humano y afirmación de justificación divina mediante la fe. El lenguaje de «justificar» deja visible la tensión teológica y el léxico forense del pasaje.'
  doctrine_reference: Justificación por gracia mediante la fe, en contraste con obras humanas
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el paquete de revisión más reciente, que prefirió «Christ Jesus» sobre «Messiah Jesus», simplificó el verbo de obras a una forma más natural y mantuvo el perfecto de «has justified». La presente versión sigue esas decisiones: usa «Cristo Jesús», «obras que hemos hecho» y «ha justificado», sin añadir notas innecesarias.'
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo negativo del griego: «no somos justificados por nosotros mismos, ni por ... ni por ... ni por ...».'
  - «A él sea la gloria» conserva el tono doxológico directo del cierre.
  - No se introduce «SEÑOR» para θεός/κύριος, ya que aquí el texto dice explícitamente «Dios Todopoderoso».
  - No se usa «Mesías» en el cuerpo porque la revisión auditada favorece la forma titulizante fija «Cristo Jesús» en este contexto.
