revisions:
- from: Y así también nosotros, habiendo sido llamados por su voluntad en Cristo Jesús, no somos justificados por nosotros mismos, ni por nuestra propia sabiduría o entendimiento o piedad o por obras que hemos hecho en santidad de corazón, sino por la fe, por la cual el Dios Todopoderoso ha justificado a todos los que han existido desde el principio. A él sea la gloria por los siglos de los siglos. Amén.
  to: Y así también nosotros, habiendo sido llamados por su voluntad en Cristo Jesús, no somos justificados por nosotros mismos, ni por nuestra propia sabiduría, o entendimiento, o piedad, ni por obras que hemos hecho en santidad de corazón, sino por la fe, por la cual el Dios Todopoderoso ha justificado a todos los que han sido desde el principio. A él sea la gloria por los siglos de los siglos. Amén.
