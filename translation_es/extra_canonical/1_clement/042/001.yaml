base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/042/001.yaml
  text: The apostles were given the good news for us from the Lord Jesus Messiah, and Jesus the Messiah was sent out from God. So then the Messiah is from God, and the apostles are from the Messiah; therefore both came about in good order from the will of God. Therefore, after receiving instructions, and having been fully assured through the resurrection of our Lord Jesus Messiah, and having been confirmed in the word of God, they went out with the full assurance of the Holy Spirit, proclaiming the good news that the kingdom of God is about to come. So, preaching through regions and cities, they would appoint their firstfruits, after testing them by the Spirit, to be overseers and deacons for those who were going to believe. And this was not something new, for indeed it had been written about overseers and deacons from very ancient times. For somewhere the Scripture says, “I will appoint their overseers in righteousness, and their deacons in faith.”
