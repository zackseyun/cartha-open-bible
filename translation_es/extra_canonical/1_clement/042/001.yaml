translation:
  language: es
  text: 'Los apóstoles recibieron la buena noticia para nosotros de parte del Señor Jesús Mesías, y Jesús el Mesías fue enviado de parte de Dios. Así pues, el Mesías viene de parte de Dios, y los apóstoles, de parte del Mesías; por tanto, ambos sucedieron en buen orden, conforme a la voluntad de Dios. Por eso, después de recibir instrucciones, y de haber llegado a plena certeza por medio de la resurrección de nuestro Señor Jesús Mesías, y de haber sido confirmados en la palabra de Dios, salieron proclamando la buena noticia, con la plena certeza que da el Espíritu Santo, de que el reino de Dios está por venir. Así, predicando por regiones y ciudades, nombraban a sus primicias[a], después de probarlas por el Espíritu, como supervisores y diáconos de los que iban a creer. Y esto no era algo nuevo, porque desde tiempos muy antiguos ya se había escrito acerca de supervisores y diáconos. Pues en algún lugar la Escritura dice: «Pondré a sus supervisores en justicia y a sus diáconos en fe».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Primicias’ mantiene la metáfora cultual del griego; aquí designa a los primeros seleccionados de una comunidad, no solo ‘primeros convertidos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐηγγελίσθησαν
  english_pob_choice: were given the good news for us
  chosen_spanish: nos anunciaron las buenas nuevas
  alternatives_spanish:
  - nos evangelizaron
  - recibimos el evangelio
  lexicon: BDAG
  rationale: El pasivo griego con ἡμῖν expresa beneficio para ‘nosotros’; en español, ‘nos anunciaron las buenas nuevas’ conserva el sentido evangélico y la dirección hacia los receptores sin sonar forzado.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός, conforme a la decisión POB de traducir el título cuando funciona como designación, no como nombre fijo.
- source_word: ἐξεπέμφθη
  english_pob_choice: was sent out
  chosen_spanish: fue enviado
  alternatives_spanish:
  - fue enviado fuera
  - fue comisionado
  lexicon: BDAG
  rationale: ‘Fue enviado’ comunica bien la fuerza missional del verbo en español; el matiz de envío desde Dios queda claro por el contexto inmediato.
- source_word: εὐτάκτως
  english_pob_choice: in good order
  chosen_spanish: en buen orden
  alternatives_spanish:
  - ordenadamente
  - de manera ordenada
  lexicon: BDAG
  rationale: La frase española conserva la idea de arreglo correcto y orden divinamente establecido, sin añadir matices eclesiásticos ajenos.
- source_word: παραγγελίας
  english_pob_choice: instructions
  chosen_spanish: instrucciones
  alternatives_spanish:
  - mandatos
  - encargos
  lexicon: BDAG
  rationale: ‘Instrucciones’ transmite una comisión autorizada de modo claro y natural en español.
- source_word: πληροφορηθέντες
  english_pob_choice: having been fully assured
  chosen_spanish: habiendo sido plenamente asegurados
  alternatives_spanish:
  - habiendo sido plenamente convencidos
  - habiendo llegado a plena certeza
  lexicon: BDAG
  rationale: Se conserva la idea de certeza plena vinculada a la resurrección; ‘asegurados’ permite una construcción fluida y refleja la plenitud de convicción.
- source_word: πιστωθέντες
  english_pob_choice: having been confirmed
  chosen_spanish: habiendo sido confirmados
  alternatives_spanish:
  - habiendo sido establecidos
  - habiendo sido afirmados
  lexicon: BDAG
  rationale: En este contexto, el verbo apunta a ser fortalecidos/establecidos en la palabra de Dios; ‘confirmados’ mantiene esa idea sin añadir contenido técnico.
- source_word: πληροφορίας
  english_pob_choice: full assurance
  chosen_spanish: plena certeza
  alternatives_spanish:
  - plena convicción
  - plena confianza
  lexicon: BDAG
  rationale: ‘Plena certeza’ conserva la fuerza de seguridad total y enlaza con el verbo anterior sin repetir mecánicamente la misma raíz.
- source_word: μέλλειν ἔρχεσθαι
  english_pob_choice: is about to come
  chosen_spanish: está por venir
  alternatives_spanish:
  - está a punto de venir
  - va a venir pronto
  lexicon: BDAG
  rationale: La expresión española preserva la inminencia del anuncio escatológico y su tono urgente.
- source_word: κατὰ χώρας καὶ πόλεις
  english_pob_choice: through regions and cities
  chosen_spanish: por regiones y ciudades
  alternatives_spanish:
  - a través de regiones y ciudades
  - por aldeas y ciudades
  lexicon: BDAG
  rationale: ‘Por regiones y ciudades’ reproduce el sentido distributivo de la frase con una cadencia natural en español.
- source_word: ἀπαρχὰς
  english_pob_choice: their firstfruits
  chosen_spanish: sus primicias
  alternatives_spanish:
  - los primeros frutos
  - sus primeros convertidos
  lexicon: BDAG
  rationale: Se conserva la metáfora cultual de ‘primicias’, que el contexto eclesial de Clemente aprovecha para hablar de los primeros elegidos o nombrados.
- source_word: δοκιμάσαντες τῷ πνεύματι
  english_pob_choice: after testing them by the Spirit
  chosen_spanish: después de probarlas por el Espíritu
  alternatives_spanish:
  - después de examinarlas por el Espíritu
  - después de discernirlas por el Espíritu
  lexicon: BDAG
  rationale: ‘Probarlas por el Espíritu’ mantiene el participio y el papel del Espíritu en el discernimiento. Se usa femenino plural para concordar con ‘primicias’.
- source_word: ἐπισκόπους
  english_pob_choice: overseers
  chosen_spanish: supervisores
  alternatives_spanish:
  - obispos
  lexicon: BDAG
  rationale: ‘Supervisores’ traduce el oficio de forma transparente y evita importar sin necesidad estructuras eclesiásticas posteriores asociadas a ‘obispos’.
- source_word: διακόνους
  english_pob_choice: deacons
  chosen_spanish: diáconos
  alternatives_spanish:
  - servidores
  - ministros
  lexicon: BDAG
  rationale: Aquí el término ya funciona como cargo eclesial; ‘diáconos’ preserva su fuerza técnica.
- source_word: οὐ καινῶς
  english_pob_choice: was not something new
  chosen_spanish: no era algo nuevo
  alternatives_spanish:
  - no era una novedad
  - no era nuevo
  lexicon: BDAG
  rationale: La frase española comunica la idea de continuidad con la Escritura sin volverla demasiado literal.
- source_word: ἐγέγραπτο
  english_pob_choice: it had been written
  chosen_spanish: se había escrito
  alternatives_spanish:
  - había sido escrito
  - estaba escrito
  lexicon: BDAG
  rationale: El pluscuamperfecto español expresa la anterioridad duradera que Clemente destaca al apelar al testimonio escrito.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  lexicon: BDAG
  rationale: Se mantiene la preferencia del proyecto por ‘justicia’ para δικαιοσύνη, conservando su peso moral y covenantal.
- source_word: ἐν πίστει
  english_pob_choice: in faith
  chosen_spanish: en fe
  alternatives_spanish:
  - en fidelidad
  lexicon: BDAG
  rationale: ‘En fe’ sigue el uso principal del término; ‘fidelidad’ queda como posible matiz semántico si el contexto lo sugiere.
theological_decisions:
- issue: Terminología de los oficios eclesiales ἐπισκόπους y διακόνους
  english_pob_reading: Translate as 'overseers and deacons'
  chosen_spanish_reading: ‘supervisores y diáconos’
  alternative_spanish_readings:
  - ‘obispos y diáconos’
  - ‘dirigentes y servidores’
  rationale: ‘Supervisores’ preserva el valor funcional de ἐπίσκοπος sin proyectar de inmediato el desarrollo posterior del episcopado monárquico; ‘diáconos’ mantiene el término técnico ya consolidado.
  doctrine_reference: Consistencia terminológica POB; claridad histórica y eclesial
- issue: Título cristológico Χριστός
  english_pob_reading: Use 'Messiah' throughout the chapter
  chosen_spanish_reading: ‘Mesías’
  alternative_spanish_readings:
  - ‘Cristo’
  rationale: El texto griego usa Χριστός como título repetido dentro de una cadena de envío; ‘Mesías’ en español conserva mejor ese valor titular.
  doctrine_reference: 'POB: traducir títulos cristológicos cuando el contexto los presenta como título'
- issue: Proximidad escatológica de τὴν βασιλείαν τοῦ θεοῦ μέλλειν ἔρχεσθαι
  english_pob_reading: '''the kingdom of God is about to come'''
  chosen_spanish_reading: ‘el reino de Dios está por venir’
  alternative_spanish_readings:
  - ‘el reino de Dios está a punto de venir’
  - ‘el reino de Dios va a venir pronto’
  rationale: La expresión española retiene la inminencia proclamada por el texto sin suavizarla hacia una expectativa genérica.
  doctrine_reference: Lectura escatológica del anuncio apostólico
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego normalizado de Funk 1901 y el trazado auditado en inglés POB. Se conservaron la cadena de envío, la inminencia escatológica, la metáfora de las primicias y la terminología ministerial. No se registraron revisiones posteriores en el contexto proporcionado.
  spanish_consistency_notes:
  - Se usa ‘Mesías’ de manera uniforme para Χριστός en este pasaje.
  - Se evita ‘SEÑOR’ para κύριος; el nombre divino no aparece aquí como יהוה y el texto griego habla del Señor Jesús.
  - ‘Supervisores’ se emplea como término funcional, no como equivalencia confesional posterior de ‘obispos’.
  - ‘Justicia’ y ‘fe’ siguen los valores principales de δικαιοσύνη y πίστις, respetando el estilo bíblico del pasaje.
