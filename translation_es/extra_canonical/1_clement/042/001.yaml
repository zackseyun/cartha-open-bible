  text: Οἱ ἀπόστολοι ἡμῖν εὐηγγελίσθησαν ἀπὸ τοῦ κυρίου Ἰησοῦ Χριστοῦ, Ἰησοῦς ὁ Χριστὸς ἀπὸ τοῦ θεοῦ ἐξεπέμφθη. ὁ Χριστὸς οὖν ἀπὸ τοῦ θεοῦ καὶ οἱ ἀπόστολοι ἀπὸ τοῦ Χριστοῦ· ἐγένοντο οὖν ἀμφότερα εὐτάκτως ἐκ θελήματος θεοῦ. παραγγελίας οὖν λαβόντες καὶ πληροφορηθέντες διὰ τῆς ἀναστάσεως τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ καὶ πιστωθέντες ἐν τῷ λόγῳ τοῦ θεοῦ, μετὰ πληροφορίας πνεύματος ἁγίου ἐξῆλθον εὐαγγελιζόμενοι, τὴν βασιλείαν τοῦ θεοῦ μέλλειν ἔρχεσθαι. κατὰ χώρας οὖν καὶ πόλεις κηρύσσοντες καθίστανον τὰς ἀπαρχὰς αὐτῶν, δοκιμάσαντες τῷ πνεύματι, εἰς ἐπισκόπους καὶ διακόνους τῶν μελλόντων πιστεύειν. καὶ τοῦτο οὐ καινῶς· ἐκ γὰρ δὴ πολλῶν χρόνων ἐγέγραπτο περὶ ἐπισκόπων καὶ διακόνων. οὕτως γάρ που λέγει ἡ γραφή· Καταστήσω τοὺς ἐπισκόπους αὐτῶν ἐν δικαιοσύνῃ καὶ τοὺς διακόνους αὐτῶν ἐν πίστει.
