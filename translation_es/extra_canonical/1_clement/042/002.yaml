source:
  edition: Funk 1901 (normalized OCR)
  text: ὁ Χριστὸς οὖν ἀπὸ τοῦ θεοῦ καὶ οἱ ἀπόστολοι ἀπὸ τοῦ Χριστοῦ· ἐγένοντο οὖν ἀμφότερα εὐτάκτως ἐκ θελήματος θεοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/042/002.yaml
  text: So then Messiah is from God[a], and the apostles are from Messiah; therefore both came about in good order by the will of God.
  footnotes:
  - marker: a
    text: Or 'from the will of God'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:45Z'
    unchanged: false
    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' for closer lexical correspondence and consistency with the Greek title Χριστός in this context; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Así pues, el Mesías proviene de Dios[a], y los apóstoles provienen del Mesías; por tanto, ambos se dieron ordenadamente por la voluntad de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la voluntad de Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ Χριστός
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: Χριστός
  rationale: Se conserva el valor titular y mesiánico de Χριστός con «Mesías», que en español expresa mejor el título sin convertirlo en un nombre litúrgico fijo. La auditoría inglesa restauró «Messiah» frente a «Christ», así que sigo esa decisión.
- source_word: ἀπὸ τοῦ θεοῦ
  english_pob_choice: is from God
  chosen_spanish: proviene de Dios
  alternatives_spanish:
  - viene de Dios
  - es de Dios
  lexicon: ἀπό + genitivo
  rationale: «Proviene de» comunica con naturalidad el origen/derivación que marca ἀπό, sin perder la relación de fuente. «Es de Dios» sería más abstracto y menos explícito.
- source_word: οἱ ἀπόστολοι
  english_pob_choice: the apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - los enviados
  lexicon: ἀπόστολος
  rationale: En este contexto el término ya funciona como designación estable del grupo; «apóstoles» es la forma española clara y reconocible.
- source_word: ἀπὸ τοῦ Χριστοῦ
  english_pob_choice: are from Messiah
  chosen_spanish: provienen del Mesías
  alternatives_spanish:
  - vienen del Mesías
  - proceden del Mesías
  lexicon: ἀπό + genitivo
  rationale: Mantiene el mismo patrón de origen que en la primera cola y hace visible la secuencia jerárquica del texto.
- source_word: ἐγένοντο
  english_pob_choice: came about
  chosen_spanish: llegaron a existir
  alternatives_spanish:
  - se hicieron
  - sucedieron
  lexicon: γίνομαι
  rationale: El verbo griego aquí señala llegada a la realidad/constitución, no solo ocurrencia. «Llegaron a existir» es una equivalencia más precisa que un simple «fueron».
- source_word: εὐτάκτως
  english_pob_choice: in good order
  chosen_spanish: en buen orden
  alternatives_spanish:
  - ordenadamente
  - con buen orden
  lexicon: εὐτάκτως
  rationale: Se conserva la idea de orden bien dispuesto, evitando una paráfrasis más libre. «En buen orden» reproduce bien la expresión y su tono.
- source_word: ἐκ θελήματος θεοῦ
  english_pob_choice: by the will of God
  chosen_spanish: por la voluntad de Dios
  alternatives_spanish:
  - a causa de la voluntad de Dios
  - desde la voluntad de Dios
  lexicon: ἐκ + genitivo; θέλημα
  rationale: La revisión inglesa prefirió «by the will of God» para evitar un calco torpe de «from the will». En español, «por la voluntad de Dios» comunica la misma relación causal/instrumental sin forzar la sintaxis.
theological_decisions:
- issue: Título cristológico Χριστός en este contexto
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La auditoría textual restauró «Messiah» como reflejo del título griego. En español, «Mesías» preserva ese carácter titular y evita introducir un nombre eclesial que podría ocultar la carga semítica del término.
  doctrine_reference: DOCTRINE.md title policy for Χριστός / Messiah language
- issue: Relación de origen entre Mesías, apóstoles y Dios
  english_pob_reading: is from God; are from Messiah; by the will of God
  chosen_spanish_reading: proviene de Dios; provienen del Mesías; por la voluntad de Dios
  alternative_spanish_readings:
  - viene de Dios; vienen del Mesías; según la voluntad de Dios
  rationale: 'La formulación española conserva la cadena de procedencia y subordinación del texto: Dios como fuente última, el Mesías como mediación de los apóstoles, y todo el orden bajo la voluntad divina. No se atenúa la secuencia de origen que el griego presenta con ἀπό y ἐκ.'
  doctrine_reference: Christology and divine will in 1 Clement 42:2
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente restauró «Messiah» frente a «Christ» y aclaró «by the will of God» para evitar un inglés forzado. El español sigue ambas decisiones: usa «Mesías» y «por la voluntad de Dios», manteniendo la relación causal/originaria de ἐκ θελήματος θεοῦ sin calco rígido.'
  spanish_consistency_notes:
  - Mantengo «Mesías» en lugar de «Cristo» para seguir la restauración de la auditoría inglesa y la política de título cristológico.
  - Uso «proviene de» de forma consistente para ambas cláusulas con ἀπό, de modo que la relación de fuente no se pierda.
  - Conservo «en buen orden» como reflejo directo de εὐτάκτως, sin añadir matices ajenos al texto.
  - La nota al pie ofrece la alternativa «de la voluntad de Dios» porque el griego permite leer ἐκ + genitivo con valor de origen/fuente.
