translation:
  language: es
  text: Así que, predicando por regiones y ciudades, nombraron a sus primicias[a], después de ponerlas a prueba por el Espíritu, para ser obispos y diáconos para los que habían de creer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Primicias» conserva la metáfora sacrificial y representativa del griego. También podría traducirse «primeros frutos», pero en español bíblico «primicias» mantiene mejor la imagen original.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ χώρας οὖν καὶ πόλεις
  english_pob_choice: through regions and cities
  chosen_spanish: por regiones y ciudades
  alternatives_spanish:
  - a través de regiones y ciudades
  - por las regiones y las ciudades
  lexicon: κατά + acusativo; χώρα; πόλις
  rationale: Conservo el valor distributivo/geográfico del griego sin sobrecargar el español. «Por regiones y ciudades» comunica la extensión de la predicación de manera natural y cercana al inglés POB.
- source_word: κηρύσσοντες
  english_pob_choice: preaching
  chosen_spanish: predicando
  alternatives_spanish:
  - proclamando
  - anunciando
  lexicon: κηρύσσω
  rationale: «Predicando» mantiene el matiz de proclamación pública y oficial del verbo griego, concordando bien con el participio circunstancial.
- source_word: καθίστανον
  english_pob_choice: they appointed
  chosen_spanish: establecieron
  alternatives_spanish:
  - nombraron
  - designaron
  - constituyeron
  lexicon: καθίστημι
  rationale: El verbo puede significar nombrar o establecer en un cargo. «Establecieron» conserva la idea institucional sin forzar un tecnicismo eclesiástico único; «nombraron» sería también posible, pero menos amplio.
- source_word: τὰς ἀπαρχὰς αὐτῶν
  english_pob_choice: their firstfruits
  chosen_spanish: como sus primicias
  alternatives_spanish:
  - a sus primicias
  - sus primeros frutos
  lexicon: ἀπαρχή
  rationale: Conservo la imagen sacrificial/representativa de «primicias», que es el equivalente bíblico más directo y preserva la tensión entre metáfora y función representativa. Añadir «como» en español ayuda a reflejar el predicativo implícito del griego.
- source_word: δοκιμάσαντες τῷ πνεύματι
  english_pob_choice: after testing them by the Spirit
  chosen_spanish: después de probarlas por el Espíritu
  alternatives_spanish:
  - después de examinarlas por el Espíritu
  - habiéndolas probado por el Espíritu
  lexicon: δοκιμάζω; πνεῦμα
  rationale: «Probar» reproduce el examen de autenticidad. Mantengo «por el Espíritu» porque el dativo puede expresar instrumento o esfera; el español permite esa ambigüedad sin aclararla en exceso. El pronombre femenino plural concuerda con «primicias» entendido colectivamente.
- source_word: εἰς ἐπισκόπους καὶ διακόνους
  english_pob_choice: to be overseers and deacons
  chosen_spanish: como obispos y diáconos
  alternatives_spanish:
  - para ser obispos y diáconos
  - en obispos y diáconos
  lexicon: ἐπίσκοπος; διάκονος
  rationale: «Obispos y diáconos» sigue la terminología eclesial tradicional, que aquí ya está lexicalizada en español y corresponde al inglés POB. «Como» reproduce el valor de destino/resultado del εἰς con una construcción natural.
- source_word: τῶν μελλόντων πιστεύειν
  english_pob_choice: for those who were going to believe
  chosen_spanish: de los que habían de creer
  alternatives_spanish:
  - de los que iban a creer
  - para los que creerían
  lexicon: μέλλω + infinitivo; πιστεύω
  rationale: «Habían de creer» conserva la expectativa futura y el tono más solemne del participio futuro implícito, a la vez que suena natural en español bíblico. Evita reducir la frase a simple futuro inmediato.
theological_decisions:
- issue: Sentido de «primicias» aplicado a personas
  english_pob_reading: their firstfruits
  chosen_spanish_reading: sus primicias
  alternative_spanish_readings:
  - sus primeros frutos
  - los primeros convertidos
  rationale: Mantengo la metáfora original sin explicarla. En este contexto, «primicias» no es solo cronología, sino representación de los primeros escogidos/establecidos; traducirlo como «primeros convertidos» borraría la carga cultual y simbólica del término.
  doctrine_reference: representación cultual y eclesial; lenguaje de primicias en tradición bíblica (cf. Ex 23:19; Stg 1:18)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios (high_agreement, acuerdo 1.0). Esta versión sigue de cerca el texto griego y el audit trail inglés sin introducir variaciones sustantivas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se conserva la terminología eclesial «obispos» y «diáconos» por ser el equivalente español consolidado de ἐπίσκοποι y διάκονοι en este contexto.
  - Se evita modernizar «creer» o «predicar» con perífrasis más explicativas para no diluir la sintaxis y el paralelismo del griego.
