source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ τοῦτο οὐ καινῶς· ἐκ γὰρ δὴ πολλῶν χρόνων ἐγέγραπτο περὶ ἐπισκόπων καὶ διακόνων. οὕτως γάρ που λέγει ἡ γραφή· Καταστήσω τοὺς ἐπισκόπους αὐτῶν ἐν δικαιοσύνῃ καὶ τοὺς διακόνους αὐτῶν ἐν πίστει.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/042/005.yaml
  text: And this was not something new[a], for indeed it had been written about overseers and deacons from many ages ago. For thus the Scripture says somewhere, “I will appoint their overseers in righteousness, and their deacons in faith.”
  footnotes:
  - marker: a
    text: Or 'For somewhere the Scripture says,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:47Z'
    unchanged: false
    changes_summary: Revised 'from very ancient times' to 'from many ages ago' for closer correspondence to ἐκ...πολλῶν χρόνων while keeping natural formal English. No other changes needed.
translation:
  language: es
  text: 'Y esto no fue algo nuevo[a], pues ya hacía mucho tiempo que se había escrito acerca de los encargados y de los diáconos. Porque así dice la Escritura en alguna parte: «Estableceré a sus encargados en justicia y a sus diáconos en fe».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque en alguna parte la Escritura dice así».'
    reason: alternativa de orden sintáctico que refleja la misma construcción griega
lexical_decisions:
- source_word: καινῶς
  english_pob_choice: something new
  chosen_spanish: algo nuevo
  alternatives_spanish:
  - una novedad
  - algo reciente
  lexicon: καινός
  rationale: Mantiene la idea de novedad sin intensificar más de lo que permite el griego. «Algo nuevo» es natural en español y conserva el contraste con la antigüedad afirmada después.
- source_word: ἐκ γὰρ δὴ πολλῶν χρόνων
  english_pob_choice: from many ages ago
  chosen_spanish: ya hacía mucho tiempo
  alternatives_spanish:
  - desde muchos años atrás
  - desde hacía muchos tiempos
  lexicon: ἐκ ... πολλῶν χρόνων
  rationale: La frase griega expresa un lapso prolongado; «ya hacía mucho tiempo» suena más natural que un calco y preserva la distancia temporal sin exagerar con «antiguísimo».
- source_word: ἐπισκόπων
  english_pob_choice: overseers
  chosen_spanish: supervisores
  alternatives_spanish:
  - obispos
  - inspectores
  lexicon: ἐπίσκοπος
  rationale: Se conserva el valor funcional del término sin adoptar automáticamente el cargo eclesiástico posterior de «obispos», que podría cargar una lectura histórica no explícita en este texto.
- source_word: διακόνων
  english_pob_choice: deacons
  chosen_spanish: diáconos
  alternatives_spanish:
  - servidores
  - ministros
  lexicon: διάκονος
  rationale: Aquí el contexto eclesial y la traducción inglesa favorecen la forma tradicional transliterada, pero en español «diáconos» sigue siendo claro y reconocible.
- source_word: ἡ γραφή
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - la Escritura santa
  - la Escritura Sagrada
  lexicon: γραφή
  rationale: «La Escritura» corresponde de forma directa al referente bíblico y mantiene el tono reverente sin añadir formulaciones ajenas al texto.
- source_word: οὕτως ... που λέγει
  english_pob_choice: For thus the Scripture says somewhere
  chosen_spanish: Porque así dice la Escritura en alguna parte
  alternatives_spanish:
  - Porque de esta manera dice la Escritura en algún lugar
  - Porque así dice la Escritura, en alguna parte
  lexicon: οὕτως ... που λέγει
  rationale: Se preserva el matiz de modo («así») y la vaguedad de fuente («en alguna parte»), que el contexto auditado indica que debía recuperarse explícitamente.
- source_word: Καταστήσω
  english_pob_choice: I will appoint
  chosen_spanish: Pondré
  alternatives_spanish:
  - Estableceré
  - Nombraré
  lexicon: καθίστημι
  rationale: «Pondré» comunica establecimiento/colocación de manera breve y fiel al futuro activo del verbo, sin forzar una técnica administrativa moderna.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - con justicia
  - en rectitud
  lexicon: δικαιοσύνη
  rationale: «Justicia» conserva el peso moral y relacional del término; «en» sigue el griego y mantiene el paralelo con «en fe».
- source_word: ἐν πίστει
  english_pob_choice: in faith
  chosen_spanish: en fe
  alternatives_spanish:
  - con fidelidad
  - en fidelidad
  lexicon: πίστις
  rationale: «Fe» es la correspondencia más directa y deja abierta la resonancia de confianza/fidelidad sin imponer una interpretación más estrecha.
theological_decisions:
- issue: Valor eclesial de ἐπίσκοποι y διακόνοι
  english_pob_reading: overseers and deacons
  chosen_spanish_reading: supervisores y diáconos
  alternative_spanish_readings:
  - obispos y diáconos
  - superintendentes y servidores
  rationale: Se evita cargar ἐπίσκοπος con la institución episcopal posterior si el pasaje solo requiere la función de supervisión. «Diáconos» se mantiene por su claridad histórica y eclesial en español.
  doctrine_reference: ecclesiology; historical semantics of church offices
- issue: Forma de la cita escritural y su vaguedad
  english_pob_reading: For thus the Scripture says somewhere
  chosen_spanish_reading: Porque así dice la Escritura en alguna parte
  alternative_spanish_readings:
  - Porque la Escritura dice así en algún lugar
  - Porque de este modo dice la Escritura en alguna parte
  rationale: Se conserva la vaguedad retórica de la fuente citada; no se precisa una localización que el texto no da. La palabra «así» recupera el οὕτως omitido en una pasada inglesa, conforme al griego.
  doctrine_reference: scripture citation practice; textual fidelity
- issue: Temporalidad de «from many ages ago»
  english_pob_reading: it had been written ... from many ages ago
  chosen_spanish_reading: ya hacía mucho tiempo que se había escrito
  alternative_spanish_readings:
  - desde hacía muchos años se había escrito
  - hacía mucho tiempo que estaba escrito
  rationale: El griego enfatiza un período prolongado, no una antigüedad absoluta. La formulación elegida suena natural y mantiene la antelación histórica sin endurecerla.
  doctrine_reference: historical continuity of scripture
translation_notes:
  revision_awareness: 'La versión española incorpora la corrección auditada del inglés revisado: la fórmula de cita conserva explícitamente «así» para reflejar οὕτως, y mantiene la referencia temporal amplia de πολλῶν χρόνων con una expresión natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; aquí el pasaje usa ἡ γραφή, por lo que corresponde «la Escritura».
  - Se evita «SEÑOR» porque no hay aquí un equivalente de κύριος o una cita del nombre divino.
  - «Diáconos» se conserva como término eclesial transparente en español; «supervisores» traduce el valor funcional de ἐπίσκοποι sin imponer un título posterior.
