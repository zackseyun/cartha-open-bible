    issue: «supervisores» para ἐπισκόπων suena demasiado administrativo
    rationale: Aunque transmite supervisión, en español eclesial general resulta menos natural y menos digno que una alternativa funcional como «encargados». Además, el objetivo documentado es evitar el anacronismo de «obispos», no introducir un registro burocrático moderno.
  - severity: low
    issue: «Pondré» para Καταστήσω es menos preciso que «estableceré»
    rationale: El verbo griego en la cita comunica designar/establecer. «Pondré» no es incorrecto, pero «estableceré» refleja mejor la fuerza institucional y el tono formal de la cita escritural.
