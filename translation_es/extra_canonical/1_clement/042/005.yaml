revisions:
- from: 'Y esto no fue algo nuevo[a], pues ya hacía mucho tiempo que se había escrito acerca de los supervisores y de los diáconos. Porque así dice la Escritura en alguna parte: «Pondré a sus supervisores en justicia y a sus diáconos en fe».'
  to: 'Y esto no fue algo nuevo[a], pues ya hacía mucho tiempo que se había escrito acerca de los encargados y de los diáconos. Porque así dice la Escritura en alguna parte: «Estableceré a sus encargados en justicia y a sus diáconos en fe».'
  rationale: Se ajusta ἐπίσκοποι a «encargados» para preservar el valor funcional de «overseers» sin el tono burocrático de «supervisores» ni el posible anacronismo de «obispos». Se cambia «Pondré» por «Estableceré» para reflejar mejor Καταστήσω y elevar la naturalidad formal de la cita. El resto del borrador es fiel y claro, incluida la conservación de «así ... en alguna parte».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:08:29Z'
