revisions:
- from: Por tanto[a], después de recibir instrucciones y de haber sido plenamente asegurados por la resurrección de nuestro Señor Jesús Mesías, y de haber sido confirmados en la palabra de Dios, salieron con la plena seguridad del Espíritu Santo, anunciando la buena noticia de que el reino de Dios estaba por venir.
  to: Por tanto[a], después de recibir instrucciones y de haber sido plenamente convencidos por la resurrección de nuestro Señor Jesús Mesías, y de haber sido confirmados en la palabra de Dios, salieron con la plena convicción del Espíritu Santo, proclamando la buena noticia de que el reino de Dios estaba por venir.
  rationale: Se propone una revisión menor para mejorar la naturalidad y precisión del español sin cambiar el sentido fuente ni las decisiones teológicas del proyecto. «Plenamente convencidos» y «plena convicción» reflejan mejor πληροφορηθέντες / πληροφορίας en español actual; «proclamando» ajusta mejor el matiz de εὐαγγελιζόμενοι. La nota sobre «está por venir» debe conservarse porque el inglés auditado mantuvo esa alternativa.
  reviewer_model: gpt-5.4
