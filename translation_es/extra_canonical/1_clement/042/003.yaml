review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: recepción de instrucciones, plena certeza por la resurrección, confirmación en la palabra de Dios, salida a proclamar, e inminencia del reino. También preserva correctamente «Jesús Mesías» para Ἰησοῦ Χριστοῦ y mantiene la nota alternativa sobre el tiempo verbal de μέλλειν ἔρχεσθαι. Sin embargo, «plenamente asegurados» y «plena seguridad» suenan algo calcados y menos naturales en español para πληροφορηθέντες / πληροφορίας; además, «anunciando la buena noticia» es aceptable, pero «proclamando la buena noticia» refleja mejor el matiz público de εὐαγγελιζόμενοι y armoniza mejor con el tono del pasaje.'
  spanish_quality_summary: El texto es claro y fiel, pero necesita un pequeño pulido de idiomaticidad y registro. «Plenamente convencidos» y «plena convicción» suenan más naturales y precisos en español eclesial moderno que «asegurados/seguridad» en este contexto. También conviene evitar una acumulación pesada de «de haber sido... y de haber sido...» si puede aligerarse sin perder fidelidad. La legibilidad general es buena.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Jesús Mesías», «palabra de Dios», «Espíritu Santo» y «reino de Dios» son adecuados. No hay conflicto con los términos doctrinales base. El ajuste propuesto no altera la política terminológica, solo mejora la realización española de πληροφορέω / πληροφορία y de εὐαγγελίζω.'
  issues:
  - severity: medium
    issue: «haber sido plenamente asegurados» suena poco idiomático para πληροφορηθέντες
    rationale: Aunque es defendible semánticamente, en español «ser asegurado» suele sugerir protección o garantía externa más que convicción plena. «Plenamente convencidos» o «plenamente persuadidos» comunica mejor la certeza recibida por la resurrección.
  - severity: medium
    issue: «plena seguridad del Espíritu Santo» es algo rígido y menos natural que «plena convicción del Espíritu Santo»
    rationale: πληροφορία aquí apunta a certeza/convicción plena. «Seguridad» no es incorrecto, pero en español puede sonar abstracto o ambiguo; «convicción» preserva mejor el sentido interno y el registro religioso natural.
  - severity: low
    issue: «anunciando la buena noticia» podría afinarse a «proclamando la buena noticia»
    rationale: εὐαγγελιζόμενοι tiene un matiz proclamativo y público. «Anunciar» sirve, pero «proclamar» encaja mejor con el tono elevado del pasaje sin caer en tecnicismo.
