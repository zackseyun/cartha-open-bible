id: 1CLEM.42.3
reference: 1 Clement 42:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: παραγγελίας οὖν λαβόντες καὶ πληροφορηθέντες διὰ τῆς ἀναστάσεως τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ καὶ πιστωθέντες ἐν τῷ λόγῳ τοῦ θεοῦ, μετὰ πληροφορίας πνεύματος ἁγίου ἐξῆλθον εὐαγγελιζόμενοι, τὴν βασιλείαν τοῦ θεοῦ μέλλειν ἔρχεσθαι.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/042/003.yaml
  text: Therefore[a], after receiving instructions and being fully assured through the resurrection of our Lord Jesus Messiah, and being confirmed in the word of God, they went out with the full assurance of the Holy Spirit, proclaiming the good news that the kingdom of God was about to come.
  footnotes:
  - marker: a
    text: Or 'is about to come'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:46Z'
    unchanged: false
    changes_summary: 'Removed an unnecessary comma for smoother English and changed ''Jesus Messiah'' to ''Jesus Christ'' for standard formal rendering of Ἰησοῦ Χριστοῦ in this context. No substantive change to meaning. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Por tanto[a], después de recibir instrucciones y de haber sido plenamente convencidos por la resurrección de nuestro Señor Jesús Mesías, y de haber sido confirmados en la palabra de Dios, salieron con la plena convicción del Espíritu Santo, proclamando la buena noticia de que el reino de Dios estaba por venir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «está por venir».
    reason: alternativa de tiempo verbal preservada del rastro de auditoría inglés
lexical_decisions:
- source_word: παραγγελίας
  english_pob_choice: instructions
  chosen_spanish: instrucciones
  alternatives_spanish:
  - mandatos
  - órdenes
  - encargos
  lexicon: παραγγελία
  rationale: «Instrucciones» conserva el sentido de directiva recibida sin introducir un matiz militar o jerárquico más fuerte que el griego en este contexto.
- source_word: πληροφορηθέντες
  english_pob_choice: being fully assured
  chosen_spanish: haber sido plenamente asegurados
  alternatives_spanish:
  - haber sido completamente convencidos
  - haber sido plenamente persuadidos
  - haber quedado plenamente seguros
  lexicon: πληροφορέω
  rationale: La forma pasiva sugiere una convicción recibida o establecida; «plenamente asegurados» conserva la idea de certeza plena sin reducirla solo a un acto mental.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús Cristo
  lexicon: Ἰησοῦς / Χριστός
  rationale: Se mantiene «Mesías» para Χριστός conforme al criterio del proyecto, evitando la forma litúrgica fusionada cuando el texto puede leerse con el título mesiánico explícito.
- source_word: πιστωθέντες
  english_pob_choice: being confirmed
  chosen_spanish: haber sido confirmados
  alternatives_spanish:
  - haber sido acreditados
  - haber sido afirmados
  - haber sido establecidos
  lexicon: πιστόω
  rationale: «Confirmados» expresa la idea de quedar firmes o ratificados por la palabra de Dios sin sobretraducir a un lenguaje técnico ajeno al pasaje.
- source_word: ἐν τῷ λόγῳ τοῦ θεοῦ
  english_pob_choice: in the word of God
  chosen_spanish: en la palabra de Dios
  alternatives_spanish:
  - en el mensaje de Dios
  - por la palabra de Dios
  lexicon: λόγος / θεός
  rationale: La equivalencia directa mantiene la formulación bíblica común y refleja la base objetiva de la confirmación recibida.
- source_word: μετὰ πληροφορίας πνεύματος ἁγίου
  english_pob_choice: with the full assurance of the Holy Spirit
  chosen_spanish: con la plena seguridad del Espíritu Santo
  alternatives_spanish:
  - con la plena certeza del Espíritu Santo
  - con la plena convicción del Espíritu Santo
  lexicon: πληροφορία / πνεῦμα ἅγιον
  rationale: «Plena seguridad» conserva el valor de certeza/convicción de πληροφορίας, y «Espíritu Santo» mantiene la referencia personal y reconocible del texto.
- source_word: εὐαγγελιζόμενοι
  english_pob_choice: proclaiming the good news
  chosen_spanish: anunciando la buena noticia
  alternatives_spanish:
  - evangelizando
  - proclamando el evangelio
  - predicando la buena noticia
  lexicon: εὐαγγελίζω
  rationale: «Anunciando la buena noticia» transmite el verbo sin imponer un tecnicismo eclesiástico innecesario; conserva el carácter proclamativo del participio.
- source_word: μέλλειν ἔρχεσθαι
  english_pob_choice: was about to come
  chosen_spanish: estaba por venir
  alternatives_spanish:
  - estaba a punto de venir
  - iba a venir pronto
  lexicon: μέλλω + ἔρχομαι
  rationale: «Estaba por venir» refleja bien la inminencia de futuro desde la perspectiva del discurso indirecto en español natural, sin volverlo más concluyente de lo que el griego exige.
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - la realeza de Dios
  - el gobierno de Dios
  lexicon: βασιλεία
  rationale: «Reino de Dios» es la forma más fiel y natural en español eclesial para este sintagma fijo, manteniendo su sentido escatológico.
theological_decisions:
- issue: Título cristológico Χριστός en un escrito apostólico patrístico temprano
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesucristo
  - Jesús Cristo
  rationale: Se conserva el valor de título mesiánico en lugar de tratar Χριστός como mero apellido devocional. Eso respeta la política del proyecto y la transparencia del término original.
  doctrine_reference: Cristología; uso titulado de Χριστός
- issue: Tense in reported proclamation about the kingdom
  english_pob_reading: was about to come
  chosen_spanish_reading: estaba por venir
  alternative_spanish_readings:
  - está por venir
  - iba a venir
  rationale: El griego usa infinitivo presente en discurso indirecto, pero el verbo rector está en pasado; en español narrativo fluido se preserva la inminencia con imperfecto perifrástico sin forzar un presente anacrónico.
  doctrine_reference: Gramática del discurso indirecto; escatología
- issue: Agency of the Holy Spirit in the clause μετὰ πληροφορίας πνεύματος ἁγίου
  english_pob_reading: with the full assurance of the Holy Spirit
  chosen_spanish_reading: con la plena seguridad del Espíritu Santo
  alternative_spanish_readings:
  - con la plena convicción del Espíritu Santo
  - con la seguridad plena del Espíritu Santo
  rationale: La construcción puede entenderse como compañía/esfera o como fuente de la seguridad. La formulación elegida conserva la ambigüedad útil sin decidir más de lo que el texto dice.
  doctrine_reference: Neumatología; ambigüedad sintáctica
- issue: Nature of the gospel proclamation
  english_pob_reading: proclaiming the good news
  chosen_spanish_reading: anunciando la buena noticia
  alternative_spanish_readings:
  - predicando el evangelio
  - evangelizando
  rationale: La expresión evita cargar el texto con terminología ministerial posterior; mantiene el foco en la proclamación del contenido de la noticia.
  doctrine_reference: Misión y proclamación
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que ajustó la traducción inglesa de la cláusula final de «is about to come» a «was about to come» por el valor del discurso indirecto en griego. En español se resolvió con «estaba por venir», que conserva la inminencia y la concordancia narrativa sin perder la tensión escatológica.
  spanish_consistency_notes:
  - Se usó «Jesús Mesías» para Χριστός de acuerdo con la política del proyecto y la revisión que restablece Mesías frente a Cristo como forma no documentada aquí.
  - Se evitó «SEÑOR» para κυρίου, manteniendo «Señor» en el sintagma fijo «nuestro Señor Jesús Mesías» por ser una formulación cristológica estable del pasaje, no una sustitución del nombre divino.
  - «Espíritu Santo» se capitaliza por referencia personal; «espíritu» no aplica aquí porque el contexto es claramente pneumatológico.
  - «Reino de Dios» se mantuvo como sintagma establecido en español bíblico y por fidelidad al sustantivo βασιλεία.
