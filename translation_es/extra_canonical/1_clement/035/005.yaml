id: 1CLEM.35.5
reference: 1 Clement 35:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: πῶς δὲ ἔσται τοῦτο, ἀγαπητοί; ἐὰν ἐστηργιμένῃ ἢ ἡ διάνοια ἡμῶν πιστῶς πρὸς τὸν θεόν, ἐὰν ἐκζητήσωμεν τὰ εὐάρεστα καὶ εὐπρόσδεκτα αὐτῷ, ἐὰν ἐπιτελέσωμεν τὰ ἀνήκοντα τῇ ἀμώμῳ βουλήσει αὐτοῦ καὶ ἀκολουθήσωμεν τῇ ὁδῷ τῆς ἀληθείας, ἀπορρίψαντες ἀφ’ ἑαυτῶν πᾶσαν ἀδικίαν καὶ πονηρίαν, πλεονεξίαν, ἔρεις, κακοηθείας τε καὶ δόλους, ψιθυρισμούς τε καὶ καταλαλιάς, θεοστυγίαν, ὑπερηφανίαν τε καὶ ἀλαζονείαν, κενοδοξίαν τε καὶ ἀφιλοξενίαν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/035/005.yaml
  text: But how will this be[a], beloved? If our mind is firmly fixed on God in faithfulness, if we seek the things pleasing and acceptable to him, if we do the things that are fitting for his blameless will and follow the way of truth, having cast away from ourselves all unrighteousness and wickedness, greed, strife, malice and deceit, whisperings and slanders, hatred of God, pride and arrogance[c][b], vainglory and inhospitality.
  footnotes:
  - marker: a
    text: Or 'has been fixed'.
    reason: previous_rendering
  - marker: b
    text: Or 'belong to his blameless purpose'.
    reason: previous_rendering
  - marker: c
    text: Or 'malicious habits and deceits, whisperings and slanders, hatred of God, pride and arrogance, empty glory and lack of hospitality'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:31Z'
    unchanged: false
    changes_summary: 'Refined several phrases for accuracy and naturalness: changed ''is fixed faithfully on God'' to ''is firmly fixed on God in faithfulness''; simplified ''seek out'' to ''seek''; changed ''accomplish'' to ''do''; rendered singular ''deceit'' instead of ''deceits''; and adjusted ''casting away'' to ''having cast away'' to reflect the participial sense more naturally.'
translation:
  language: es
  text: ¿Pero cómo será esto, amados? Si nuestra mente está firmemente fijada en Dios con fidelidad, si buscamos las cosas que le son agradables y aceptables, si hacemos lo que conviene a su voluntad sin mancha y sigamos el camino de la verdad, habiendo desechado de nosotros toda injusticia y maldad, avaricia, contiendas, malicia y engaño, murmuraciones y calumnias, odio a Dios, soberbia y arrogancia, vanagloria y falta de hospitalidad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πῶς δὲ ἔσται τοῦτο
  english_pob_choice: But how will this be
  chosen_spanish: ¿Pero cómo será esto?
  alternatives_spanish:
  - ¿Y cómo será esto?
  - ¿Cómo será esto entonces?
  lexicon: N/A
  rationale: Interrogación directa y natural en español; 'pero' conserva el giro discursivo de δέ sin sobrecargar el tono.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados hermanos
  - queridos
  lexicon: N/A
  rationale: '''Amados'' mantiene el vocativo afectivo y eclesial sin añadir elementos no presentes en el griego.'
- source_word: ἐστηριγμένη ᾖ / ἐστηργιμένῃ ἢ
  english_pob_choice: is firmly fixed
  chosen_spanish: está firmemente fijada
  alternatives_spanish:
  - está fijada firmemente
  - esté firmemente fijada
  lexicon: N/A
  rationale: Refleja el estado resultante de la forma perfecta perifrástica, con valor actual y duradero.
- source_word: ἡ διάνοια ἡμῶν
  english_pob_choice: our mind
  chosen_spanish: nuestra mente
  alternatives_spanish:
  - nuestro pensamiento
  - nuestro entendimiento
  lexicon: N/A
  rationale: '''Mente'' comunica bien διάνοια en este contexto moral y exhortativo; evita una restricción excesivamente intelectual.'
- source_word: πιστῶς πρὸς τὸν θεόν
  english_pob_choice: in faithfulness ... on God
  chosen_spanish: con fidelidad ... en Dios
  alternatives_spanish:
  - fielmente ... hacia Dios
  - en fidelidad ... hacia Dios
  lexicon: N/A
  rationale: '''Con fidelidad'' conserva la cualidad adverbial de πιστῶς; ''en Dios'' expresa la orientación establecida por la construcción griega sin forzar un calco.'
- source_word: τὰ εὐάρεστα καὶ εὐπρόσδεκτα αὐτῷ
  english_pob_choice: the things pleasing and acceptable to him
  chosen_spanish: las cosas que le son agradables y aceptables
  alternatives_spanish:
  - las cosas agradables y aceptables para él
  - lo que le agrada y recibe
  lexicon: N/A
  rationale: Mantiene la duplicación semántica del griego con dos adjetivos coordinados, preservando la claridad de 'le son'.
- source_word: τὰ ἀνήκοντα τῇ ἀμώμῳ βουλήσει αὐτοῦ
  english_pob_choice: the things that are fitting for his blameless will
  chosen_spanish: las cosas que convienen a su voluntad sin mancha
  alternatives_spanish:
  - las cosas que son aptas para su voluntad sin mancha
  - las cosas que corresponden a su voluntad impecable
  lexicon: N/A
  rationale: '''Convienen a'' traduce bien ἀνήκοντα como ''fitting/proper''; ''voluntad sin mancha'' sigue ἀμώμῳ and keeps the ethical force of the phrase.'
- source_word: ἀκολουθήσωμεν τῇ ὁδῷ τῆς ἀληθείας
  english_pob_choice: follow the way of truth
  chosen_spanish: seguimos el camino de la verdad
  alternatives_spanish:
  - sigamos el camino de la verdad
  - sigamos la senda de la verdad
  lexicon: N/A
  rationale: '''Seguir el camino de la verdad'' es idiomático y faithful; se eligió la forma narrativa-conjuntiva del español para mantener fluidez dentro de la larga exhortación.'
- source_word: ἀπορρίψαντες ἀφ’ ἑαυτῶν
  english_pob_choice: having cast away from ourselves
  chosen_spanish: después de haber arrojado de nosotros
  alternatives_spanish:
  - habiendo arrojado de nosotros
  - después de desechar de nosotros
  lexicon: N/A
  rationale: '''Después de haber arrojado'' expresa naturalmente el valor participial anterior sin perder el sentido de despojo moral.'
- source_word: πᾶσαν ἀδικίαν
  english_pob_choice: all unrighteousness
  chosen_spanish: toda injusticia
  alternatives_spanish:
  - toda maldad
  - toda iniquidad
  lexicon: N/A
  rationale: '''Injusticia'' es la opción más directa para ἀδικία, manteniendo el contraste con la justicia.'
- source_word: καὶ πονηρίαν
  english_pob_choice: and wickedness
  chosen_spanish: y maldad
  alternatives_spanish:
  - y perversidad
  - y malignidad
  lexicon: N/A
  rationale: '''Maldad'' comunica el campo semántico general de πονηρία en un registro claro y bíblico.'
- source_word: πλεονεξίαν
  english_pob_choice: greed
  chosen_spanish: avaricia
  alternatives_spanish:
  - codicia
  - ambición desordenada
  lexicon: N/A
  rationale: '''Avaricia'' es la equivalencia más estable para πλεονεξία en español eclesial y ético.'
- source_word: ἔρεις
  english_pob_choice: strife
  chosen_spanish: contiendas
  alternatives_spanish:
  - disputas
  - pleitos
  lexicon: N/A
  rationale: Plural español para conservar la lista viciosa y la fuerza conflictiva del término.
- source_word: κακοηθείας
  english_pob_choice: malice
  chosen_spanish: malicia
  alternatives_spanish:
  - maldad de carácter
  - malevolencia
  lexicon: N/A
  rationale: '''Malicia'' es una correspondencia natural y breve para κακοήθεια/κακοηθεία en listado moral.'
- source_word: δόλους
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - engaños
  - astucia
  lexicon: N/A
  rationale: '''Engaño'' captura el valor de deceit sin introducir una pluralidad innecesaria en español.'
- source_word: ψιθυρισμούς τε καὶ καταλαλιάς
  english_pob_choice: whisperings and slanders
  chosen_spanish: murmuraciones y calumnias
  alternatives_spanish:
  - susurros y calumnias
  - chismes y calumnias
  lexicon: N/A
  rationale: '''Murmuraciones'' y ''calumnias'' son términos claros y tradicionales para los vicios sociales del pasaje.'
- source_word: θεοστυγίαν
  english_pob_choice: hatred of God
  chosen_spanish: odio a Dios
  alternatives_spanish:
  - aborrecimiento de Dios
  - enemistad con Dios
  lexicon: N/A
  rationale: Traducción directa y transparente del compuesto, sin suavizar la fuerza teológica.
- source_word: ὑπερηφανίαν τε καὶ ἀλαζονείαν
  english_pob_choice: pride and arrogance
  chosen_spanish: soberbia y arrogancia
  alternatives_spanish:
  - orgullo y arrogancia
  - altivez y arrogancia
  lexicon: N/A
  rationale: Conserva la distinción de dos vicios afines sin recurrir a un solo término genérico.
- source_word: κενοδοξίαν
  english_pob_choice: vainglory
  chosen_spanish: vanagloria
  alternatives_spanish:
  - gloria vana
  - falsa gloria
  lexicon: N/A
  rationale: '''Vanagloria'' es la forma española estable y exacta para κενοδοξία; evita el calco ''gloria vacía''.'
- source_word: ἀφιλοξενίαν
  english_pob_choice: inhospitality
  chosen_spanish: falta de hospitalidad
  alternatives_spanish:
  - inhospitalidad
  - ausencia de hospitalidad
  lexicon: N/A
  rationale: '''Falta de hospitalidad'' es más natural y transparente en español actual que el término abstracto ''inhospitalidad''.'
theological_decisions:
- issue: Estado actual de la mente orientada a Dios
  english_pob_reading: our mind is firmly fixed on God in faithfulness
  chosen_spanish_reading: nuestra mente está firmemente fijada en Dios con fidelidad
  alternative_spanish_readings:
  - nuestra mente ha sido firmemente fijada en Dios con fidelidad
  - nuestra mente permanece firmemente fijada en Dios con fidelidad
  rationale: La gramática griega expresa un estado presente resultante; el español 'está firmemente fijada' comunica ese estado sin perder la idea de estabilidad adquirida.
  doctrine_reference: N/A
- issue: ἀνήκοντα y ἀμώμῳ βουλήσει
  english_pob_reading: the things that are fitting for his blameless will
  chosen_spanish_reading: las cosas que convienen a su voluntad sin mancha
  alternative_spanish_readings:
  - las cosas que pertenecen a su voluntad sin mancha
  - las cosas que son propias de su voluntad sin mancha
  rationale: Se preserva el sentido ético de 'lo que conviene' y la pureza moral de la voluntad divina; no se reduce a mera pertenencia.
  doctrine_reference: N/A
- issue: Lista de vicios como despojo moral
  english_pob_reading: having cast away from ourselves all unrighteousness and wickedness ...
  chosen_spanish_reading: después de haber arrojado de nosotros toda injusticia y maldad ...
  alternative_spanish_readings:
  - habiendo arrojado de nosotros toda injusticia y maldad ...
  - despojándonos de toda injusticia y maldad ...
  rationale: El participio aoristo subraya una acción previa y decisiva; 'después de haber arrojado' lo preserva sin introducir una implicación devocional no explícita.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción se ajusta a las revisiones finales del audit trail: ''is firmly fixed'' se reflejó como ''está firmemente fijada''; ''are fitting for his blameless will'' como ''convienen a su voluntad sin mancha''; y ''vainglory and inhospitality'' se resolvió como ''vanagloria y falta de hospitalidad'' para mantener naturalidad española sin perder la fuerza del original.'
  spanish_consistency_notes:
  - Se mantuvo 'Dios' sin sustituir por 'Señor', conforme al texto griego θεόν.
  - Se tradujo πνεῦμα/רוּחַ no aplicable aquí; no hay términos de 'Espíritu' en el versículo.
  - Se evitó 'Cristo' por no aparecer Χριστός en el pasaje.
  - Se conservó la lista de vicios como serie moral continua, sin fusionar términos distintos del griego.
  - Se prefirió un español claro y eclesial, sin arcaísmos innecesarios ni calcos pesados.
