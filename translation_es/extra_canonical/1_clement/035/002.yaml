revisions:
- from: vida en inmortalidad, esplendor en justicia, verdad en denuedo, fe en confianza, dominio propio en santidad; y todas estas cosas quedan bajo nuestro entendimiento.
  to: vida en inmortalidad, esplendor en justicia, verdad en franqueza, fe en confianza, dominio propio en santidad; y todas estas cosas caen bajo nuestro entendimiento.
  rationale: 'Se hicieron dos reparaciones menores: ‘franqueza’ en lugar de ‘denuedo’ para expresar παρρησία con mayor claridad y naturalidad en español contemporáneo, y ‘caen bajo nuestro entendimiento’ en lugar de ‘quedan bajo nuestro entendimiento’ para reflejar más de cerca el giro verbal del griego y de la revisión inglesa auditada. El resto del texto se conserva porque representa fielmente el paralelismo y el contenido del original.'
