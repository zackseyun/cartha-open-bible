id: 1CLEM.35.2
reference: 1 Clement 35:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ζωὴ ἐν ἀθανασίᾳ, λαμπρότης ἐν δικαιοσύνῃ, ἀλήθεια ἐν παρρησίᾳ, πίστις ἐν πεποιθήσει, ἐγκράτεια ἐν ἁγιασμῷ· καὶ ταῦτα ὑπέπεπτεν πάντα τῇ διανοίᾳ ἡμῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/035/002.yaml
  text: life in immortality, splendor in righteousness, truth in boldness, faith in confidence, self-control in holiness; and all these things fall under our understanding.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:30Z'
    unchanged: false
    changes_summary: Adjusted the final clause from 'fall within the grasp of our understanding' to the more literal and formal 'fall under our understanding,' reflecting ὑπέπεπτεν without interpretive expansion. Also changed the period to a semicolon for smoother connection to the preceding list.
translation:
  language: es
  text: vida en inmortalidad, esplendor en justicia, verdad en franqueza, fe en confianza, dominio propio en santidad; y todas estas cosas caen bajo nuestro entendimiento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ζωή
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida
  lexicon: ζωή
  rationale: ‘Vida’ es el equivalente directo y natural en español, sin añadir matices que el griego no exige aquí.
- source_word: ἀθανασία
  english_pob_choice: immortality
  chosen_spanish: inmortalidad
  alternatives_spanish:
  - incorrupción
  - vida inmortal
  lexicon: ἀθανασία
  rationale: ‘Inmortalidad’ conserva el valor sustantivo abstracto de ἀθανασία y sigue de cerca la elección inglesa de POB.
- source_word: λαμπρότης
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - resplandor
  - brillo
  lexicon: λαμπρότης
  rationale: ‘Esplendor’ reproduce bien el carácter de brillo glorioso del término griego y mantiene el paralelo retórico con los miembros anteriores y siguientes.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: δικαιοσύνη
  rationale: En este contexto adjetival/abstracto, ‘justicia’ preserva la fuerza moral y covenantal de δικαιοσύνη sin introducir una formulación técnica innecesaria.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - verdad
  - veracidad
  lexicon: ἀλήθεια
  rationale: ‘Verdad’ es la correspondencia natural y fiel del sustantivo griego.
- source_word: παρρησία
  english_pob_choice: boldness
  chosen_spanish: denuedo
  alternatives_spanish:
  - valentía
  - franqueza
  - audacia
  lexicon: παρρησία
  rationale: ‘Denuedo’ reproduce el valor de libertad valiente/franca asociado a παρρησία, evitando reducirlo solo a ‘valentía’ o solo a ‘franqueza’.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fe
  - confianza
  lexicon: πίστις
  rationale: ‘Fe’ es la equivalencia principal; se conserva la relación interna con ‘confianza’ porque el sintagma griego usa ἐν πεποιθήσει y la línea busca paralelismo de cualidades.
- source_word: πεποίθησις
  english_pob_choice: confidence
  chosen_spanish: confianza
  alternatives_spanish:
  - confianza
  - convicción
  - seguridad
  lexicon: πεποίθησις
  rationale: ‘Confianza’ refleja bien el sentido de seguridad confiada del término y mantiene el paralelo sonoro y semántico con ‘fe’.
- source_word: ἐγκράτεια
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - templanza
  - autocontrol
  lexicon: ἐγκράτεια
  rationale: ‘Dominio propio’ es idiomático en español bíblico contemporáneo y comunica la idea de dominio sobre uno mismo sin perder claridad.
- source_word: ἁγιασμός
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - santificación
  - consagración
  lexicon: ἁγιασμός
  rationale: ‘Santidad’ sigue la lectura inglesa y funciona bien en el paralelismo nominal del pasaje; ‘santificación’ introduciría un matiz más procesual que no es necesario aquí.
- source_word: ὑπέπεπτεν πάντα τῇ διανοίᾳ ἡμῶν
  english_pob_choice: all these things fall under our understanding
  chosen_spanish: todas estas cosas quedan bajo nuestro entendimiento
  alternatives_spanish:
  - todas estas cosas caen bajo nuestro entendimiento
  - todas estas cosas están bajo nuestro entendimiento
  - todas estas cosas se someten a nuestro entendimiento
  lexicon: ὑπέπεπτεν; διανοία
  rationale: ‘Quedan bajo nuestro entendimiento’ conserva la idea de estar comprendidas o subsumidas bajo la capacidad de comprender, sin expandir ὑπέπεπτεν más allá de lo que el audit trail permite.
theological_decisions:
- issue: Relación entre ‘verdad en denuedo’ y el valor pragmático de παρρησία
  english_pob_reading: truth in boldness
  chosen_spanish_reading: verdad en denuedo
  alternative_spanish_readings:
  - verdad con franqueza
  - verdad en valentía
  rationale: 'Se mantiene la tensión del original: no solo ‘verdad’ abstracta, sino verdad expresada con libertad y valentía. ‘Denuedo’ permite conservar esa amplitud sin disolverla en una sola noción.'
  doctrine_reference: Uso semántico de παρρησία en literatura cristiana primitiva; no se trata de una doctrina sistemática específica.
- issue: Final clause with ὑπέπεπτεν and the scope of understanding
  english_pob_reading: all these things fall under our understanding
  chosen_spanish_reading: todas estas cosas quedan bajo nuestro entendimiento
  alternative_spanish_readings:
  - todas estas cosas caen bajo nuestro entendimiento
  - todas estas cosas están bajo nuestro entendimiento
  rationale: La formulación evita interpretar más de la cuenta. ‘Quedan bajo’ transmite subordinación o inclusión en el ámbito del entendimiento, acorde con la revisión inglesa que prefirió una formulación más literal y formal.
  doctrine_reference: Anthropology of understanding; no doctrinal expansion beyond the text.
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó la cláusula final de ‘fall within the grasp of our understanding’ a ‘fall under our understanding’ para reflejar ὑπέπεπτεν sin expansión interpretativa, y unió la lista con punto y coma. La versión española sigue esa línea más literal y formal con ‘quedan bajo nuestro entendimiento’ y también usa punto y coma antes de la cláusula final.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico y sobrio, con términos abstractos paralelos.
  - Se evitó ‘SEÑOR’ u այլ masking conventions porque el versículo no contiene el nombre divino.
  - No se añadieron notas de pie porque el texto griego y la POB inglesa no exigen una variante textual o lectora adicional en español.
