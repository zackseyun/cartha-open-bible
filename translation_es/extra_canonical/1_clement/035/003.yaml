    issue: La nota [b] está anclada a «santísimo» pero glosa «los que perseveran con paciencia».
    rationale: Esto desaline­a el aparato crítico con el texto y puede hacer creer erróneamente que la alternativa pertenece a πανάγιος en vez de ὑπομένουσιν.
  - severity: low
    issue: «¿Qué son... las cosas preparadas?» suena menos natural que «¿Cuáles son...?» en español.
    rationale: Ambas son posibles, pero «cuáles son» se ajusta mejor a una pregunta por identidad de elementos plurales ya presupuestos.
  - severity: low
    issue: «el santísimo mismo» debería capitalizarse como título divino sustantivado.
    rationale: «El Santísimo» en mayúscula mejora la legibilidad reverente y evita que parezca solo un adjetivo común.
