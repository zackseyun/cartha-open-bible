translation:
  language: es
  text: ¿Cuáles son, pues, las cosas preparadas para los que perseveran[a]? El Creador y Padre de los siglos[b], el Santísimo mismo, conoce su medida y su belleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que perseveran con paciencia».'
    reason: alternative_reading
  - marker: b
    text: 'O: «El Creador y Padre de las edades».'
    reason: alternative_reading
lexical_decisions:
- source_word: τίνα οὖν ἄρα ἐστὶν
  english_pob_choice: What then are
  chosen_spanish: ¿Qué son, pues,
  alternatives_spanish:
  - ¿Cuáles son, entonces,
  - ¿Qué, pues, son
  lexicon: τίς; οὖν; ἄρα
  rationale: La pregunta griega introduce una inferencia retórica. «¿Qué son, pues,» conserva el tono interrogativo conclusivo sin redundancia en español y evita añadir un matiz temporal que el griego no exige.
- source_word: τὰ ἑτοιμασμένα
  english_pob_choice: the things prepared
  chosen_spanish: las cosas preparadas
  alternatives_spanish:
  - las cosas dispuestas
  - lo preparado
  lexicon: ἑτοιμάζω
  rationale: «Preparadas» mantiene el sentido de lo ya dispuesto de antemano. «Cosas» refleja el neutro plural con una formulación natural en español; «lo preparado» sería más abstracto de lo que permite el contexto.
- source_word: τοῖς ὑπομένουσιν
  english_pob_choice: for those who patiently endure
  chosen_spanish: para los que perseveran
  alternatives_spanish:
  - para los que soportan con paciencia
  - para los que esperan con paciencia
  lexicon: ὑπομένω
  rationale: El verbo puede expresar permanecer, soportar y perseverar con paciencia. «Perseveran» conserva la firmeza sostenida del término sin sobrecargar el español con una perífrasis más larga; la paciencia está implícita en el contexto de la obra.
- source_word: ὁ δημιουργὸς καὶ πατὴρ τῶν αἰώνων
  english_pob_choice: The Creator and Father of the ages
  chosen_spanish: El Creador y Padre de los siglos
  alternatives_spanish:
  - El Creador y Padre de las edades
  - El Artífice y Padre de los siglos
  lexicon: δημιουργός; πατήρ; αἰών
  rationale: «Creador» respeta δημιουργός en un registro bíblico claro. «Padre de los siglos» conserva la construcción genitiva y el alcance temporal/cósmico del original; «edades» también es viable, pero «siglos» comunica mejor la solemnidad tradicional sin perder sentido.
- source_word: ὁ πανάγιος αὐτὸς
  english_pob_choice: the all-holy one himself
  chosen_spanish: el santísimo mismo
  alternatives_spanish:
  - el totalmente santo mismo
  - el santísimo él mismo
  lexicon: πανάγιος; αὐτός
  rationale: «Santísimo» reproduce el intensificador absoluto de πανάγιος de forma idiomática y reverente. «Mismo» refleja αὐτός como énfasis, sin convertirlo en una aclaración explicativa ajena al griego.
- source_word: γινώσκει
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - reconoce
  lexicon: γινώσκω
  rationale: «Conoce» expresa conocimiento pleno y personal, más acorde con el tono teológico del pasaje que un mero «sabe».
- source_word: τὴν ποσότητα καὶ τὴν καλλονὴν αὐτῶν
  english_pob_choice: their measure and their beauty
  chosen_spanish: su medida y su belleza
  alternatives_spanish:
  - su cantidad y su hermosura
  - su proporción y su belleza
  lexicon: ποσότης; καλλονή
  rationale: «Medida» transmite tanto cantidad como proporción, mientras que «belleza» conserva καλλονή sin trivializarlo. La pareja mantiene el paralelismo del griego y su valor apreciativo.
theological_decisions:
- issue: Título divino «the Creator and Father of the ages»
  english_pob_reading: The Creator and Father of the ages
  chosen_spanish_reading: El Creador y Padre de los siglos
  alternative_spanish_readings:
  - El Creador y Padre de las edades
  - El Creador y Padre de los tiempos
  rationale: La frase atribuye a Dios soberanía sobre la totalidad del orden temporal. «Siglos» conserva la amplitud cósmica/temporal y el registro solemne del texto, sin suavizar la fuerte designación paternal-escatológica.
  doctrine_reference: Dios como Creador soberano sobre el tiempo y la historia; cf. uso doxológico de lenguaje temporal en literatura cristiana primitiva.
- issue: Sentido de quienes «endure/hold out patiently»
  english_pob_reading: those who patiently endure
  chosen_spanish_reading: los que perseveran
  alternative_spanish_readings:
  - los que soportan con paciencia
  - los que esperan con paciencia
  rationale: El griego ὑπομένουσιν puede abarcar resistencia fiel, constancia y espera paciente. «Perseveran» resume esa firmeza sin introducir un objeto ausente en el texto; evita la adición no sustentada de «por él» o similar.
  doctrine_reference: Perseverancia fiel en la espera de la recompensa de Dios; coherente con la ética de resistencia en 1 Clemente.
translation_notes:
  revision_awareness: 'El audit trail inglés corrigió dos puntos relevantes: eliminó la redundancia de «then, therefore» y rechazó la adición no sustentada «for him» en la frase sobre los que perseveran. La redacción española refleja esas correcciones: usa una sola partícula inferencial («pues») y no introduce ningún complemento inexistente en el griego. No se detectaron cambios ulteriores en la última revisión inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Creador» para δημιουργός y «Padre de los siglos» para αἰώνων, siguiendo el registro solemne del original.
  - Se traduce πανάγιος como «santísimo» para conservar el superlativo intensivo sin inflar el texto.
  - «Perseveran» se usa como solución compacta para ὑπομένουσιν; la nota ofrece la alternativa más explícita sobre paciencia.
  - No se emplea «SEÑOR» ni «Cristo», porque este versículo no contiene esos términos.
