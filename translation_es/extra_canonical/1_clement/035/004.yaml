id: 1CLEM.35.4
reference: 1 Clement 35:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἡμεῖς οὖν ἀγωνιζώμεθα εὑρεθῆναι ἐν τῷ ἀριθμῷ τῶν ὑπομενόντων αὐτόν, ὅπως μεταλάβωμεν τῶν ἐπηγγελμένων δωρεῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/035/004.yaml
  text: Therefore let us strive to be found among the number of those who wait for him[a], so that we may share in the promised gifts.
  footnotes:
  - marker: a
    text: Or 'patiently endure him'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:30Z'
    unchanged: false
    changes_summary: Adjusted 'in the number' to the more natural 'among the number'; streamlined 'the gifts that have been promised' to 'the promised gifts' while preserving the sense. Kept 'wait for him' as a suitable rendering of ὑπομενόντων αὐτόν in context.
translation:
  language: es
  text: Por tanto, esforcémonos por ser hallados entre el número de los que lo esperan[a], para que participemos de los dones prometidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aguardan pacientemente».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγωνιζώμεθα
  english_pob_choice: let us strive
  chosen_spanish: esforcémonos
  alternatives_spanish:
  - luchamos
  - compitamos
  - afanémonos
  lexicon: ἀγωνίζομαι
  rationale: Expresa un esfuerzo intenso y deliberado. En español, «esforcémonos» conserva el llamado exhortativo sin forzar un matiz deportivo o belicista que no resulta necesario aquí.
- source_word: εὑρεθῆναι
  english_pob_choice: to be found
  chosen_spanish: ser hallados
  alternatives_spanish:
  - ser encontrados
  - resultar hallados
  lexicon: εὑρίσκω
  rationale: «Ser hallados» mantiene la pasiva y el sentido evaluativo del verbo, frecuente en contexto escatológico o de juicio.
- source_word: ἐν τῷ ἀριθμῷ
  english_pob_choice: among the number
  chosen_spanish: entre el número
  alternatives_spanish:
  - en el número
  - dentro del número
  lexicon: ἀριθμός
  rationale: «Entre el número» reproduce la idea de pertenencia a un grupo contado, y suena natural en español.
- source_word: ὑπομενόντων αὐτόν
  english_pob_choice: those who wait for him
  chosen_spanish: los que lo esperan
  alternatives_spanish:
  - los que perseveran en esperarlo
  - los que le aguardan
  lexicon: ὑπομένω
  rationale: 'Sigo la revisión aplicada al inglés: aquí ὑπομένω con objeto personal apunta a «esperar/aguardar» a Dios, no a «soportarlo». «Lo esperan» conserva el objeto personal y el matiz de aguardar confiadamente.'
- source_word: τῶν ἐπηγγελμένων δωρεῶν
  english_pob_choice: the promised gifts
  chosen_spanish: los dones prometidos
  alternatives_spanish:
  - los regalos prometidos
  - los dones que han sido prometidos
  lexicon: δωρεά
  rationale: «Dones» refleja mejor el término de don gratuito que «regalos», y «prometidos» mantiene la cualidad pasiva sin añadir más de lo que el griego dice.
theological_decisions:
- issue: Sentido de ὑπομενόντων αὐτόν aplicado a Dios
  english_pob_reading: wait for him
  chosen_spanish_reading: lo esperan
  alternative_spanish_readings:
  - lo soportan
  - lo sufren con paciencia
  rationale: Se evita un sentido de «soportar a Dios» que el contexto y la revisión auditada descartaron. La lectura correcta es de espera confiada en Dios.
  doctrine_reference: esperanza perseverante / confianza en Dios
- issue: Relación entre esfuerzo humano y dones prometidos
  english_pob_reading: let us strive ... so that we may share in the promised gifts
  chosen_spanish_reading: esforcémonos ... para que participemos de los dones prometidos
  alternative_spanish_readings:
  - trabajemos ... para recibir los dones prometidos
  - esforcémonos ... a fin de obtener los dones prometidos
  rationale: «Participemos» conserva la idea de compartir/entrar en posesión con otros, sin convertir la frase en una fórmula meramente adquisitiva; mantiene la relación entre la exhortación y la gracia de los dones prometidos.
  doctrine_reference: exhortación y participación en las promesas
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del texto inglés: se confirmó el valor de ὑπομενόντων αὐτόν como «wait for him» y se prefirió «among the number» y «the promised gifts». La versión española sigue esa lectura revisada y evita el antiguo matiz de «soportarlo» o cualquier formulación que sugiera sufrimiento pasivo respecto de Dios.'
  spanish_consistency_notes:
  - Mantengo «dones» para δωρεαί en coherencia con un registro bíblico y porque el plural apunta a beneficios prometidos, no a un solo don abstracto.
  - Uso «esperan» como traducción principal de ὑπομένω con objeto personal, dejando una nota de alternativa para preservar la tensión léxica.
  - La construcción «entre el número de» conserva el valor colectivo de ἐν τῷ ἀριθμῷ sin sonar arcaica en español.
