translation:
  language: es
  text: Porque los que hacen estas cosas son aborrecibles[a] para Dios; y no solo los que las hacen, sino también los que las aprueban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Aborrecibles» traduce el valor fuerte de στυγητοὶ; también puede entenderse como «odiosos» o «detestables», pero «aborrecibles» expresa bien la repulsión moral en español claro.
    reason: lexical_alternative
lexical_decisions:
- source_word: στυγητοὶ
  english_pob_choice: hateful
  chosen_spanish: aborrecibles
  alternatives_spanish:
  - odiados
  - detestables
  lexicon: στυγητός
  rationale: El griego expresa algo que provoca repulsión o aborrecimiento; en español, «aborrecibles» comunica bien la fuerza sin introducir la pasiva personal de «odiados» ni suavizar demasiado con «detestables».
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  - delante de Dios
  lexicon: θεός
  rationale: La preposición griega con el adjetivo pasivo se entiende naturalmente como relación de valoración o afecto divino; «para Dios» conserva el sentido del juicio divino en español bíblico claro.
- source_word: οἱ πράσσοντες
  english_pob_choice: those who practice
  chosen_spanish: los que hacen
  alternatives_spanish:
  - los que practican
  - los que cometen
  lexicon: πράσσω
  rationale: El verbo puede significar hacer, practicar o llevar a cabo. Aquí el contexto de actos morales favorece «los que hacen» como opción natural y suficientemente amplia.
- source_word: συνευδοκοῦντες
  english_pob_choice: those who approve of
  chosen_spanish: los que aprueban de
  alternatives_spanish:
  - los que consienten en
  - los que están de acuerdo con
  lexicon: συνευδοκέω
  rationale: El compuesto expresa aprobación o asentimiento moral. Se mantiene «aprueban» para reflejar la decisión de la POB inglesa; «aprueban de» conserva el régimen idiomático tradicional en español bíblico, aunque hoy suena algo arcaizante.
theological_decisions:
- issue: Alcance moral de la condena
  english_pob_reading: those who practice these things are hateful to God; and not only those who practice them, but also those who approve of them
  chosen_spanish_reading: los que hacen estas cosas son aborrecibles para Dios; y no solo los que las hacen, sino también los que aprueban de ellas
  alternative_spanish_readings:
  - los que practican estas cosas son aborrecibles para Dios; y no solo los que las practican, sino también los que aprueban de ellas
  - los que hacen estas cosas son detestables para Dios; y no solo los que las hacen, sino también los que consienten en ellas
  rationale: 'Se mantiene la extensión moral del dicho: no solo quien realiza los actos, sino también quien los aprueba comparte la culpabilidad o rechazo divino. La formulación evita rebajar la condena y conserva la duplicación enfática del griego.'
  doctrine_reference: Ética bíblica sobre complicidad moral y asentimiento al mal
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada coinciden sustancialmente y no muestran revisiones textuales relevantes; se siguió el sentido directo sin introducir variantes.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton ni κύριος.
  - Se mantuvo un registro bíblico claro y contemporáneo, con un leve sabor tradicional en «aprueban de» para conservar la construcción del griego y la huella de la POB inglesa.
