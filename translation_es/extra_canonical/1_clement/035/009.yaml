translation:
  language: es
  text: Estas cosas hiciste, y guardé silencio; pensaste, inicuo, que sería como tú.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: These things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Esto
  - Tales cosas
  lexicon: ταῦτα
  rationale: El demostrativo neutro plural se expresa naturalmente como «estas cosas», manteniendo el referente acumulado del contexto sin añadir ni quitar contenido.
- source_word: ἐποίήσας
  english_pob_choice: you did
  chosen_spanish: hiciste
  alternatives_spanish:
  - realizaste
  - cometiste
  lexicon: ποιέω
  rationale: «Hiciste» conserva la acción directa y general del verbo griego. «Cometiste» añadiría una valoración más específica que el texto no explicita aquí.
- source_word: ἐσίγησα
  english_pob_choice: I kept silent
  chosen_spanish: guardé silencio
  alternatives_spanish:
  - callé
  - me quedé callado
  lexicon: σιγάω
  rationale: «Guardé silencio» reproduce bien la idea de cesar de hablar y mantiene un tono sobrio y publicable en español.
- source_word: ἄνομε
  english_pob_choice: lawless one
  chosen_spanish: hombre inicuo
  alternatives_spanish:
  - impío
  - sin ley
  lexicon: ἄνομος
  rationale: «Inicuo» preserva el juicio moral fuerte del vocativo sin sonar tan técnico como «sin ley» en español actual. Se evita suavizar la fuerza acusatoria del original.
- source_word: ἔσομαι ὅμοιος σοι
  english_pob_choice: I would be like you
  chosen_spanish: sería como tú
  alternatives_spanish:
  - seré como tú
  - me parecería a ti
  lexicon: ὅμοιος
  rationale: El futuro con matiz de eventualidad en el discurso indirecto se refleja naturalmente con «sería». «Como tú» conserva la comparación directa del griego.
theological_decisions:
- issue: Tono judicial y acusatorio del vocativo ἄνομε
  english_pob_reading: lawless one
  chosen_spanish_reading: hombre inicuo
  alternative_spanish_readings:
  - impío
  - sin ley
  rationale: La frase funciona como reproche profético/judicial. «Hombre inicuo» comunica la censura moral sin diluirla ni convertirla en un término demasiado literal que suene artificial en español.
  doctrine_reference: Sal 50:21-22 LXX / juicio divino y denuncia del mal
- issue: Cita de tono divino con silencio previo
  english_pob_reading: I kept silent
  chosen_spanish_reading: guardé silencio
  alternative_spanish_readings:
  - callé
  rationale: «Guardé silencio» respeta el valor retórico de paciencia o tolerancia previa que el texto comunica antes del juicio implícito.
  doctrine_reference: Tema bíblico del silencio paciente de Dios antes de la retribución
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y que no eran necesarios cambios; esta versión mantiene el sentido del texto griego normalizado y la lectura óptima ya validada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene un registro formal y bíblico, pero con sintaxis natural en español.
  - No se introduce terminología eclesiástica tradicional no respaldada por el texto.
  - Se conserva la fuerza moral de ἄνομος sin reemplazarla por un eufemismo.
  - La estructura paralela «hiciste / guardé silencio / pensaste» sigue de cerca el orden argumental del griego y del inglés auditado.
