    issue: El vocativo ἄνομε se expandió a 'hombre inicuo'.
    rationale: El griego tiene solo el vocativo singular 'ἄνομε' ('inicuo', 'sin ley', 'malvado' según contexto). Añadir 'hombre' introduce un sustantivo ausente y debilita la concisión del reproche.
  revised_spanish_text: Estas cosas hiciste, y guardé silencio; pensaste, inicuo, que sería como tú.
