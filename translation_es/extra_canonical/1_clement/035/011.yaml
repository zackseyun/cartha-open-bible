translation:
  language: es
  text: Comprendan, pues, estas cosas[a], ustedes que olvidan a Dios, no sea que los arrebate como un león, y no haya quien los rescate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no sea que los arrebate como un león».'
    reason: alternative_reading
lexical_decisions:
- source_word: σύνετε
  english_pob_choice: Understand
  chosen_spanish: Comprendan
  alternatives_spanish:
  - Entiendan
  - Consideren
  lexicon: συνίημι
  rationale: El imperativo pide captar el sentido con diligencia; «comprendan» conserva el valor exhortativo y suena natural en español bíblico contemporáneo.
- source_word: δὴ
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - ahora
  lexicon: δὴ
  rationale: Partícula enfática que introduce la exhortación; «pues» comunica bien el matiz discursivo sin volver la frase rígida.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: οὗτος
  rationale: La referencia es a la advertencia inmediata; «estas cosas» mantiene cercanía al griego y al inglés auditado.
- source_word: οἱ ἐπιλανθανόμενοι τοῦ θεοῦ
  english_pob_choice: you who forget God
  chosen_spanish: ustedes que olvidan a Dios
  alternatives_spanish:
  - ustedes que se olvidan de Dios
  - los que olvidan a Dios
  lexicon: ἐπιλανθάνομαι
  rationale: Se preserva el participio con valor descriptivo/admonitorio. «Olvidan a Dios» reproduce la acusación moral sin suavizarla.
- source_word: ἁρπάσῃ
  english_pob_choice: seize you
  chosen_spanish: los arrebate
  alternatives_spanish:
  - los agarre
  - los atrape
  - los arrebate a ustedes
  lexicon: ἁρπάζω
  rationale: «Arrebatar» expresa el acto súbito y violento de ἁρπάζω mejor que un verbo más débil; el objeto se explicita en español por claridad, como hizo la revisión inglesa.
- source_word: ὡς λέων
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - cual león
  - cual un león
  lexicon: ὡς
  rationale: Comparación directa y transparente; no requiere ajuste interpretativo en español.
- source_word: ὁ ῥυόμενος
  english_pob_choice: there be no one to rescue
  chosen_spanish: no haya quien los rescate
  alternatives_spanish:
  - no haya quien los libere
  - no exista quien los salve
  lexicon: ῥύομαι
  rationale: «Rescatar» preserva el sentido de librar de peligro o captura; el subjuntivo impersonal mantiene la fuerza de la advertencia.
theological_decisions:
- issue: Imagen de juicio/divina captura en el símil del león
  english_pob_reading: lest he seize you like a lion, and there be no one to rescue
  chosen_spanish_reading: no sea que los arrebate como un león, y no haya quien los rescate
  alternative_spanish_readings:
  - no sea que los atrape como un león
  - no sea que los tome como un león
  rationale: 'El griego presenta una amenaza real y viva: el olvido de Dios expone al oyente a una captura devastadora. «Arrebate» conserva esa intensidad sin introducir una teología ajena al texto.'
  doctrine_reference: Advertencia profética y responsabilidad humana ante el juicio divino.
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo aclaró que «seize» requiere objeto explícito en inglés; el griego sigue dejando el objeto implícito en la construcción. En español se optó por explicitarlo («los arrebate») por claridad natural, sin alterar el sentido del original.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ según el estándar del proyecto.
  - Se traduce ἁρπάζω con un verbo de fuerza («arrebate») y ῥύομαι con «rescate», preservando la tensión entre amenaza y posibilidad de liberación.
  - El tono es exhortativo y sobrio, adecuado para una sección extra canónica de lectura pública.
