  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: σύνετε δὴ ταῦτα = «Comprendan, pues, estas cosas»; οἱ ἐπιλανθανόμενοι τοῦ θεοῦ = «ustedes que olvidan a Dios»; ἁρπάσῃ ὡς λέων = «los arrebate como un león»; καὶ μὴ ᾖ ὁ ῥυόμενος = «y no haya quien los rescate». La advertencia y la imagen de juicio se preservan fielmente.'
  spanish_quality_summary: 'El español es claro y natural. La única reparación necesaria es la nota al pie: en el inglés POB la nota registra la alternativa previa «lest he seize like a lion», mientras que la nota española actual repite exactamente la lectura principal y por eso no preserva correctamente el historial auditado. Conviene reflejar en español la alternativa correspondiente: «O: “no sea que arrebate como un león”».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» es correcto para θεοῦ. «Rescate» para ῥύομαι funciona bien en contexto. «Arrebate» conserva la fuerza de ἁρπάζω y es preferible a opciones más débiles.
  issues:
  - severity: medium
    issue: La nota al pie [a] no representa la alternativa inglesa auditada.
    rationale: 'La nota actual dice «O: “no sea que los arrebate como un león”», que repite el texto principal en vez de registrar la variante histórica sin objeto expreso. Debe corresponder al audit trail: «O: “no sea que arrebate como un león”».'
  revised_spanish_text: Comprendan, pues, estas cosas[a], ustedes que olvidan a Dios, no sea que los arrebate como un león, y no haya quien los rescate.
  revised_footnotes:
  - marker: a
