id: 1CLEM.35.8
reference: 1 Clement 35:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: σὺ δὲ ἐμίσησας παιδείαν καὶ ἐξέβαλες τοὺς λόγους μου εἰς τὰ ὀπίσω. εἰ ἐθεώρεις κλέπτην, συνέτρεχες αὐτῷ, καὶ μετὰ μοιχοῦ τὴν μερίδα σου ἐτίθεις. τὸ στόμα σου ἐπλεόνασεν κακίαν, καὶ ἡ γλῶσσά σου περιέπλεκεν δολιότητα. καθήμενος κατὰ τοῦ ἀδελφοῦ σου κατελάλεις, καὶ κατὰ τοῦ υἱοῦ τῆς μητρός σου ἐτίθεις σκάνδαλον.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/035/008.yaml
  text: Yet you hated discipline[a], and cast my words behind you. If you saw a thief, you ran with him, and you placed your share with adulterers. Your mouth overflowed with evil, and your tongue was weaving deceit. Sitting, you were slandering your brother[b], and against your mother's son you were laying a stumbling block.
  footnotes:
  - marker: a
    text: Or 'adulterers'.
    reason: previous_rendering
  - marker: b
    text: Or 'kept weaving deceit. Sitting down, you were slandering your brother, and against the son of your mother you were laying'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:31Z'
    unchanged: false
    changes_summary: Changed 'an adulterer' to 'adulterers' to reflect the generic singular μοιχοῦ in natural English, and revised 'Seated' to 'Sitting' and 'the son of your mother' to 'your mother's son' for more natural formal English while preserving the source sense.
translation:
  language: es
  text: Pero tú odiaste la disciplina[a], y echaste mis palabras detrás de ti. Si veías a un ladrón, corrías con él, y ponías tu parte con un adúltero. Tu boca se desbordó con maldad, y tu lengua tejía engaño[b]. Sentado, hablabas mal de tu hermano, y contra el hijo de tu madre ponías una piedra de tropiezo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «corrección» o «instrucción».
    reason: alternative_reading
  - marker: b
    text: O «tu lengua iba tejiendo engaño».
    reason: alternative_reading
lexical_decisions:
- source_word: παιδείαν
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - disciplina formativa
  lexicon: παιδεία
  rationale: El término griego puede abarcar formación correctiva y disciplina moral; «disciplina» conserva bien esa amplitud y la fuerza de reprensión del contexto.
- source_word: ἐξέβαλες τοὺς λόγους μου εἰς τὰ ὀπίσω
  english_pob_choice: cast my words behind you
  chosen_spanish: echaste mis palabras tras de ti
  alternatives_spanish:
  - arrojaste mis palabras a tus espaldas
  - echaste mis palabras detrás de ti
  lexicon: ἐκβάλλω + λόγοι
  rationale: La imagen es espacial y de desprecio; «tras de ti» reproduce con naturalidad la metáfora de poner las palabras fuera de consideración.
- source_word: κλέπτην
  english_pob_choice: a thief
  chosen_spanish: a un ladrón
  alternatives_spanish:
  - a un ladrón
  - a un robador
  lexicon: κλέπτης
  rationale: «Ladrón» es el equivalente moderno claro y exacto para el sustantivo griego.
- source_word: μετὰ μοιχοῦ
  english_pob_choice: with an adulterer
  chosen_spanish: con un adúltero
  alternatives_spanish:
  - con adúlteros
  - con una persona adúltera
  lexicon: μοιχός
  rationale: La revisión del inglés muestra que el griego es singular genitivo; por eso el español debe reflejar «un adúltero», manteniendo el valor genérico sin pluralizar indebidamente.
- source_word: τὸ στόμα σου ἐπλεόνασεν κακίαν
  english_pob_choice: Your mouth overflowed with evil
  chosen_spanish: Tu boca se desbordó con maldad
  alternatives_spanish:
  - Tu boca rebosó de maldad
  - Tu boca abundó en maldad
  lexicon: πλεονάζω + κακία
  rationale: «Se desbordó» comunica la imagen de abundancia excesiva sin perder el matiz vívido del verbo.
- source_word: ἡ γλῶσσά σου περιέπλεκεν δολιότητα
  english_pob_choice: your tongue was weaving deceit
  chosen_spanish: tu lengua tejía engaño
  alternatives_spanish:
  - tu lengua entretejía engaño
  - tu lengua iba tejiendo engaño
  lexicon: περιπλέκω + δολιότης
  rationale: El verbo literalmente sugiere entrelazar o tejer alrededor; «tejía engaño» preserva la metáfora y su tono continuo.
- source_word: καθήμενος
  english_pob_choice: Sitting
  chosen_spanish: Sentado
  alternatives_spanish:
  - Sentado
  - Estando sentado
  lexicon: κάθημαι
  rationale: El participio indica una postura asentada; «Sentado» es la forma más directa y natural en español.
- source_word: κατελάλεις
  english_pob_choice: were slandering
  chosen_spanish: murmurabas contra
  alternatives_spanish:
  - calumniabas a
  - hablabas mal de
  lexicon: καταλαλέω
  rationale: El verbo puede cubrir hablar mal o difamar; aquí «murmurabas contra» conserva la idea de habla hostil en un registro bíblico sobrio, sin cargarlo más allá de lo atestiguado.
- source_word: υἱοῦ τῆς μητρός σου
  english_pob_choice: your mother's son
  chosen_spanish: el hijo de tu madre
  alternatives_spanish:
  - el hijo de tu madre
  - tu hermano materno
  lexicon: υἱός + μήτηρ
  rationale: La locución semítica enfatiza la relación de sangre; «el hijo de tu madre» mantiene la formulación del original y su fuerza poética.
theological_decisions:
- issue: Cómo traducir παιδεία en un contexto de reprensión moral
  english_pob_reading: discipline
  chosen_spanish_reading: disciplina
  alternative_spanish_readings:
  - instrucción
  - corrección
  - formación disciplinaria
  rationale: No se reduce a mera educación intelectual; el contexto acusa rechazo a la corrección divina o moral, por lo que «disciplina» preserva esa dimensión normativa.
  doctrine_reference: Sabiduría bíblica / reprensión moral
- issue: Valor genérico de μοιχοῦ en μετά μοιχοῦ
  english_pob_reading: with an adulterer
  chosen_spanish_reading: con un adúltero
  alternative_spanish_readings:
  - con adúlteros
  rationale: La morfología griega es singular, y el español debe reflejar esa forma sin convertirla en plural. El singular puede funcionar genéricamente en español.
  doctrine_reference: Precisión morfológica del texto griego
- issue: matiz de κατελάλεις contra el hermano
  english_pob_reading: you were slandering your brother
  chosen_spanish_reading: murmurabas contra tu hermano
  alternative_spanish_readings:
  - calumniabas a tu hermano
  - hablabas mal de tu hermano
  rationale: El pasaje enumera pecados de habla; «murmurabas contra» mantiene la hostilidad verbal sin exigir el matiz técnico-jurídico de «calumniar».
  doctrine_reference: Ética del habla / pecado de la lengua
translation_notes:
  revision_awareness: Se incorporó la corrección revisada de μοιχοῦ como singular genitivo (por eso «un adúltero»), y se evitó la lectura plural anterior. También se siguió la revisión que prefiere una formulación más natural para καθήμενος/κατελάλεις sin perder el aspecto continuo del griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito solo donde el texto lo exige; aquí no aparece el nombre divino explícito, por lo que no se introdujo.
  - 'Se conservó la imaginería corporal y espacial del original: «tras de ti», «se desbordó», «tejía», «Sentado».'
  - Se evitó el lenguaje eclesiástico tradicional que suaviza el léxico de reprensión; el tono sigue siendo moral y acusatorio como en el griego.
