review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y conserva bien la secuencia de acusaciones: rechazo de la disciplina, desprecio de las palabras, asociación con el ladrón y el adúltero, maldad verbal y ataque al hermano. Sin embargo, hay un desajuste importante en κατελάλεις: «murmurabas contra» debilita demasiado el sentido de hablar mal/difamar/slandering que el inglés POB documenta. También «ponías un tropiezo» es comprensible, pero «tendías una trampa» o «ponías una piedra de tropiezo» reflejaría mejor σκάνδαλον; aun así, «ponías un tropiezo» no es gravemente infiel.'
  spanish_quality_summary: 'El español es en general claro y digno, pero tiene algunos giros algo calcados o menos naturales: «echaste mis palabras tras de ti» suena más rígido que «echaste mis palabras detrás de ti» o «a tus espaldas»; «Sentado» funciona, aunque «Sentado allí» no hace falta. El problema principal de calidad y fidelidad es «murmurabas contra tu hermano», que en español eclesial suele sugerir queja o murmuración más leve que difamación. «Hablabas mal de tu hermano» o «difamabas a tu hermano» serían más fieles y naturales.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «disciplina», «ladrón», «adúltero», «maldad» y «engaño» están bien elegidos. La decisión léxica sobre μοιχοῦ como singular está correctamente preservada en español. La nota [a] es útil; la nota [b] es aceptable pero no necesaria. La principal corrección léxica requerida es καταλαλέω -> no «murmurar contra», sino una forma más cercana a «hablar mal de / difamar».
  issues:
  - severity: medium
    issue: «murmurabas contra tu hermano» debilita κατελάλεις
    rationale: καταλαλέω en este contexto de denuncia moral corresponde mejor a «hablar mal de», «difamar» o «calumniar» que a «murmurar», que en español suele sonar menos grave y menos directo que «slandering».
  - severity: low
    issue: «echaste mis palabras tras de ti» suena algo rígido
    rationale: Es fiel a la imagen, pero «detrás de ti» o «a tus espaldas» es más natural en español contemporáneo sin perder sentido.
  - severity: low
    issue: «ponías un tropiezo» es entendible pero algo áspero
    rationale: σκάνδαλον aquí puede expresarse más naturalmente como «ponías una piedra de tropiezo»; aun así, la forma actual no constituye error grave.
  revised_spanish_text: Pero tú odiaste la disciplina[a], y echaste mis palabras detrás de ti. Si veías a un ladrón, corrías con él, y ponías tu parte con un adúltero. Tu boca se desbordó con maldad, y tu lengua tejía engaño[b]. Sentado, hablabas mal de tu hermano, y contra el hijo de tu madre ponías una piedra de tropiezo.
  revised_footnotes:
  - marker: a
    text: O «corrección» o «instrucción».
    reason: alternative_reading
  - marker: b
    text: O «tu lengua iba tejiendo engaño».
    reason: alternative_reading
  revision_rationale: Se corrige principalmente καταλαλέω a «hablabas mal de» para reflejar mejor el sentido de difamación/slander del griego y del inglés POB. También se suaviza «tras de ti» a «detrás de ti» por mayor naturalidad, y se explicita σκάνδαλον como «piedra de tropiezo» para un español más claro y más cercano a la imagen del original.
