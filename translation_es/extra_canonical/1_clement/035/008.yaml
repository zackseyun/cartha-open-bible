revisions:
- from: Pero tú odiaste la disciplina[a], y echaste mis palabras tras de ti. Si veías a un ladrón, corrías con él, y ponías tu parte con un adúltero. Tu boca se desbordó con maldad, y tu lengua tejía engaño[b]. Sentado, murmurabas contra tu hermano, y contra el hijo de tu madre ponías un tropiezo.
  to: Pero tú odiaste la disciplina[a], y echaste mis palabras detrás de ti. Si veías a un ladrón, corrías con él, y ponías tu parte con un adúltero. Tu boca se desbordó con maldad, y tu lengua tejía engaño[b]. Sentado, hablabas mal de tu hermano, y contra el hijo de tu madre ponías una piedra de tropiezo.
  rationale: Se corrige principalmente καταλαλέω a «hablabas mal de» para reflejar mejor el sentido de difamación/slander del griego y del inglés POB. También se suaviza «tras de ti» a «detrás de ti» por mayor naturalidad, y se explicita σκάνδαλον como «piedra de tropiezo» para un español más claro y más cercano a la imagen del original.
  reviewer_model: gpt-5.4
