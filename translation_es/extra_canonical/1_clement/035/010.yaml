translation:
  language: es
  text: Te reprenderé y lo pondré delante de tu rostro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλέγξω
  english_pob_choice: I will rebuke you
  chosen_spanish: Te reprenderé
  alternatives_spanish:
  - Te reprenderé con severidad
  - Te censuraré
  lexicon: ἐλέγχω
  rationale: El verbo griego puede abarcar reprender, amonestar o convencer de culpa. Dado el contexto polémico y el paralelo inglés auditado, «reprenderé» comunica bien la reprensión directa sin añadir más carga interpretativa que «censuraré».
- source_word: παραστήσω
  english_pob_choice: set it before your face
  chosen_spanish: lo pondré delante de tu rostro
  alternatives_spanish:
  - lo presentaré delante de tu rostro
  - lo pondré ante tu rostro
  lexicon: παρίστημι
  rationale: La acción es colocar o presentar algo ante alguien. «Lo pondré delante de tu rostro» conserva el objeto implícito de la revisión inglesa y mantiene la imagen literal de exposición frontal.
- source_word: κατὰ πρόσωπόν σου
  english_pob_choice: before your face
  chosen_spanish: delante de tu rostro
  alternatives_spanish:
  - ante tu rostro
  - frente a ti
  lexicon: κατὰ πρόσωπον
  rationale: La expresión idiomática señala presencia directa y confrontación visual. «Rostro» conserva la fuerza semítica y suena digno en español; «delante de tu rostro» mantiene la redundancia enfática del griego.
theological_decisions:
- issue: Fuerza de amonestación judicial en ἐλέγχω
  english_pob_reading: I will rebuke you
  chosen_spanish_reading: Te reprenderé
  alternative_spanish_readings:
  - Te convenceré de culpa
  - Te amonestaré
  rationale: En este contexto no se requiere desarrollar la dimensión forense completa; sin embargo, «reprenderé» deja abierta la censura moral implícita sin borrar la tensión del término griego entre reprensión y convicción.
  doctrine_reference: Disciplina y corrección moral en el lenguaje bíblico de amonestación.
translation_notes:
  revision_awareness: La revisión inglesa añadió el objeto implícito «it» para reflejar con más completitud el objeto de παραστήσω. La versión española lo conserva explícitamente como «lo» para no perder la referencia y para mantener la naturalidad sintáctica.
  spanish_consistency_notes:
  - Se mantiene tratamiento en segunda persona singular («te», «tu») conforme al texto fuente.
  - Se evita «SEÑOR» u otra sustitución porque el versículo no contiene el nombre divino.
  - Se conserva un registro sobrio y literal, adecuado para un dicho de reprensión directa.
