  - severity: medium
    issue: ‘franqueza’ para παρρησία queda algo corto para el matiz de denuedo
    rationale: Aunque posible, en una lista de virtudes ‘valentía’ o ‘audacia’ refleja mejor el hablar/verdad con intrepidez que la mera sinceridad o llaneza.
  - severity: high
