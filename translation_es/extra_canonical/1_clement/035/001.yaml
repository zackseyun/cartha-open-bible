base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/035/001.yaml
  text: 'How blessed and marvelous are the gifts of God, beloved: life in immortality, splendor in righteousness, truth in boldness, faith in confidence, self-control in holiness. And all these things fall within the grasp of our understanding. What then, indeed, are the things prepared for those who patiently endure? The Creator and Father of the ages, the all-holy one himself, knows their measure and their beauty. Therefore let us strive to be found in the number of those who patiently endure him, so that we may share in the promised gifts. But how will this be, beloved? If our mind has been firmly fixed faithfully on God, if we seek out the things pleasing and acceptable to him, if we accomplish the things that belong to his blameless purpose and follow the way of truth, having cast away from ourselves all unrighteousness and wickedness, greed, strife, maliciousness and deceit, whisperings and slanders, hatred of God, pride and arrogance, empty glory and lack of hospitality. For those
    who practice these things are hateful to God; and not only those who practice them, but also those who approve of them. For the Scripture says, “But to the sinner God said, Why do you recount my righteous requirements, and take up my covenant upon your mouth? Yet you hated discipline, and cast my words behind you. If you saw a thief, you ran with him, and you placed your share with an adulterer. Your mouth overflowed with evil, and your tongue kept weaving deceit. Sitting down, you were slandering your brother, and against the son of your mother you were laying a stumbling block. These things you did, and I kept silent; you supposed, lawless one, that I would be like you. I will rebuke you and set you before your face. Understand these things, then, you who forget God, lest he seize like a lion, and there be no one to rescue. A sacrifice of praise will glorify me, and there is the way by which I will show him the salvation of God.”'
