    rationale: 'El verbo ‘aprobar’ aquí rige objeto directo simple: ‘las aprueban’ o ‘aprueban esas cosas’.'
  - severity: medium
    issue: ‘ha sido firmemente fijada’ suena poco idiomático en español
    rationale: Preserva el pasivo, pero como calco resulta duro. ‘ha quedado firmemente fija’ o ‘ha sido afirmada firmemente’ comunica mejor la idea de estado establecido.
  - severity: low
