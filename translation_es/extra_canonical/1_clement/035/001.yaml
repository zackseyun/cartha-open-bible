  text: Ὡς μακάρια καὶ θαυμαστὰ τὰ δῶρα τοῦ θεοῦ, ἀγαπητοί. 2. ζωὴ ἐν ἀθανασίᾳ, λαμπρότης ἐν δικαιοσύνῃ, ἀλήθεια ἐν παρρησίᾳ, πίστις ἐν πεποιθήσει, ἐγκράτεια ἐν ἁγιασμῷ· καὶ ταῦτα ὑπέπεπτεν πάντα τῇ διανοίᾳ ἡμῶν. 3. τίνα οὖν ἄρα ἐστὶν τὰ ἑτοιμασμένα τοῖς ὑπομένουσιν; ὁ δημιουργὸς καὶ πατὴρ τῶν αἰώνων ὁ πανάγιος αὐτὸς γινώσκει τὴν ποσότητα καὶ τὴν καλλονὴν αὐτῶν. 4. ἡμεῖς οὖν ἀγωνιζώμεθα εὑρεθῆναι ἐν τῷ ἀριθμῷ τῶν ὑπομενόντων αὐτόν, ὅπως μεταλάβωμεν τῶν ἐπηγγελμένων δωρεῶν. 5. πῶς δὲ ἔσται τοῦτο, ἀγαπητοί; ἐὰν ἐστηργιμένῃ ἢ ἡ διάνοια ἡμῶν πιστῶς πρὸς τὸν θεόν, ἐὰν ἐκζητήσωμεν τὰ εὐάρεστα καὶ εὐπρόσδεκτα αὐτῷ, ἐὰν ἐπιτελέσωμεν τὰ ἀνήκοντα τῇ ἀμώμῳ βουλήσει αὐτοῦ καὶ ἀκολουθήσωμεν τῇ ὁδῷ τῆς ἀληθείας, ἀπορρίψαντες ἀφ’ ἑαυτῶν πᾶσαν ἀδικίαν καὶ πονηρίαν, πλεονεξίαν, ἔρεις, κακοηθείας τε καὶ δόλους, ψιθυρισμούς τε καὶ καταλαλιάς, θεοστυγίαν, ὑπερηφανίαν τε καὶ ἀλαζονείαν, κενοδοξίαν τε καὶ ἀφιλοξενίαν. 6. ταῦτα γὰρ οἱ πράσσοντες στυγητοὶ τῷ θεῷ ὑπάρχουσιν· οὐ μόνον δὲ οἱ πράσσοντες αὐτά, ἀλλὰ
    καὶ οἱ συνευδοκοῦντες αὐτοῖς. 7. λέγει γὰρ ἡ γραφή· Τί δὲ ἀπαγγέλλεις εἰπεῖν ὁ θεός· Ἱνατί σὺ διηγεῖ τὰ δικαιώματά μου, καὶ ἀναλαμβάνεις τὴν διαθήκην μου ἐπὶ στόματός σου; 8. σὺ δὲ ἐμίσησας παιδείαν καὶ ἐξέβαλες τοὺς λόγους μου εἰς τὰ ὀπίσω. εἰ ἐθεώρεις κλέπτην, συνέτρεχες αὐτῷ, καὶ μετὰ μοιχοῦ τὴν μερίδα σου ἐτίθεις. τὸ στόμα σου ἐπλεόνασεν κακίαν, καὶ ἡ γλῶσσά σου περιέπλεκεν δολιότητα. καθήμενος κατὰ τοῦ ἀδελφοῦ σου κατελάλεις, καὶ κατὰ τοῦ υἱοῦ τῆς μητρός σου ἐτίθεις σκάνδαλον. 9. ταῦτα ἐποίήσας, καὶ ἐσίγησα· ὑπέλαβες, ἄνομε, ὅτι ἔσομαι ὅμοιος σοι. 10. ἐλέγξω σε καὶ παραστήσω σε κατὰ πρόσωπόν σου. 11. σύνετε δὴ ταῦτα, οἱ ἐπιλανθανόμενοι τοῦ θεοῦ, μήποτε ἁρπάσῃ ὡς λέων, καὶ μὴ ᾖ ὁ ῥυόμενος. 12. θυσία αἰνέσεως δοξάσει με, καὶ ἐκεῖ ὁδός, ἣν δείξω αὐτῷ τὸ σωτήριον τοῦ θεοῦ.
