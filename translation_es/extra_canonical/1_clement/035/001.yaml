revisions:
- from: '¡Cuán dichosos y maravillosos son los dones de Dios, amados: vida en inmortalidad, resplandor en justicia, verdad en franqueza, fe en confianza, dominio propio en santidad. Y todas estas cosas caen dentro del alcance de nuestro entendimiento. ¿Cuáles, pues, son en realidad las cosas preparadas para los que perseveran[a]?


    El Creador y Padre de las eras, el Santísimo mismo, conoce su medida y su belleza. Así que esforcémonos por ser hallados en el número de los que perseveran en él, para que participemos de los dones prometidos.


    Pero ¿cómo será esto, amados? Si nuestra mente ha sido firmemente fijada[b] en Dios con fidelidad, si buscamos las cosas que le son agradables y aceptables, si cumplimos las cosas que corresponden a su propósito irreprochable y seguimos el camino de la verdad, habiendo arrojado de nosotros toda injusticia y maldad, avaricia, contienda, malicia[c] y engaño, murmuraciones y calumnias, odio a Dios, soberbia y arrogancia, vana gloria y falta de hospitalidad. Porque los que practican estas cosas son aborrecibles a Dios; y no solo los que las practican, sino también los que aprueban de ellas.


    Porque la Escritura dice: “Pero al pecador Dios le dijo: ‘¿Por qué relatas mis justas exigencias y tomas mi pacto sobre tu boca? Sin embargo, tú aborreciste la disciplina y echaste mis palabras a tus espaldas. Si veías a un ladrón, corrías con él, y con un adúltero ponías tu parte. Tu boca se desbordó de maldad, y tu lengua siguió trenzando engaño. Sentado, hablabas mal de tu hermano, y contra el hijo de tu madre ponías tropiezo. Estas cosas hiciste, y yo callé; pensaste, hombre inicuo, que yo sería como tú. Te reprenderé y te pondré delante de tu rostro. Entiendan estas cosas, pues, ustedes que se olvidan de Dios, no sea que los arrebate como león y no haya quien rescate. Un sacrificio de alabanza me glorificará, y allí está el camino por el cual le mostraré la salvación de Dios’”'
  to: '¡Cuán dichosos y maravillosos son los dones de Dios, amados: vida en inmortalidad, esplendor en justicia, verdad en valentía, fe en confianza, dominio propio en santidad! Y todas estas cosas están al alcance de nuestro entendimiento. ¿Cuáles, pues, son entonces las cosas preparadas para los que perseveran con paciencia[a]?


