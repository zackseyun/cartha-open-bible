translation:
  language: es
  text: '¡Cuán dichosos y maravillosos son los dones de Dios, amados: vida en inmortalidad, esplendor en justicia, verdad en valentía, fe en confianza, dominio propio en santidad! Y todas estas cosas están al alcance de nuestro entendimiento. ¿Cuáles, pues, son entonces las cosas preparadas para los que perseveran con paciencia[a]?


    El Creador y Padre de los siglos, el Santísimo mismo, conoce su medida y su belleza. Así que esforcémonos por ser hallados en el número de los que lo soportan con paciencia[a], para que participemos de los dones prometidos.


    Pero ¿cómo será esto, amados? Si nuestra mente ha quedado firmemente fija[b] en Dios, con fidelidad; si buscamos las cosas que le son agradables y aceptables; si cumplimos las cosas que corresponden a su propósito irreprochable y seguimos el camino de la verdad, habiendo arrojado de nosotros toda injusticia y maldad, avaricia, contienda, malicia[c] y engaño, murmuraciones y calumnias, odio a Dios, soberbia y arrogancia, vanagloria y falta de hospitalidad. Porque los que practican estas cosas son aborrecibles a Dios; y no solo los que las practican, sino también los que las aprueban.


    Porque la Escritura dice: «Pero al pecador Dios le dijo: “¿Por qué relatas mis justas exigencias y tomas mi pacto en tu boca? Sin embargo, tú aborreciste la disciplina y echaste mis palabras a tus espaldas. Si veías a un ladrón, corrías con él, y con un adúltero ponías tu parte. Tu boca rebosó de maldad, y tu lengua siguió trenzando engaño. Sentado, hablabas mal de tu hermano, y contra el hijo de tu madre ponías tropiezo. Estas cosas hiciste, y yo callé; pensaste, inicuo, que yo sería como tú. Te reprenderé y te pondré delante de tu rostro. Entiendan estas cosas, pues, ustedes que se olvidan de Dios, no sea que él los arrebate como león y no haya quien rescate. Un sacrificio de alabanza me glorificará, y allí está el camino por el cual le mostraré la salvación de Dios”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ὑπομένουσιν/ὑπομενόντων αὐτόν tiene un matiz compacto de resistencia o aguante paciente. En español se explicita de dos maneras cercanas para conservar tanto la paciencia como la relación algo áspera con el objeto.
    reason: lexical_alternative
  - marker: b
    text: ‘Ha quedado firmemente fija’ busca conservar el valor estable de ἐστηργιμένῃ sin sonar demasiado calcado en español.
    reason: lexical_alternative
  - marker: c
    text: ‘Malicia’ traduce κακοηθείας de forma breve y natural; también podría expresarse como ‘maldad’ o ‘malignidad’, según cuánto se quiera resaltar el carácter vicioso asentado.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάρια
  english_pob_choice: blessed
  chosen_spanish: dichosos
  alternatives_spanish:
  - bienaventurados
  - benditos
  lexicon: LSJ
  rationale: ‘Dichosos’ conserva el tono laudatorio y religioso sin sonar demasiado eclesiástico o arcaizante; funciona bien junto a ‘maravillosos’ en español.
- source_word: θαυμαστά
  english_pob_choice: marvelous
  chosen_spanish: maravillosos
  alternatives_spanish:
  - asombrosos
  - admirables
  lexicon: LSJ
  rationale: Mantiene el sentido de maravilla y el paralelismo retórico con ‘dichosos’.
- source_word: δῶρα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - beneficios
  lexicon: LSJ
  rationale: ‘Dones’ es más elevado y teológicamente natural en español para dones divinos que ‘regalos’.
- source_word: λαμπρότης
  english_pob_choice: splendor
  chosen_spanish: resplandor
  alternatives_spanish:
  - brillo
  - esplendor
  lexicon: LSJ
  rationale: Se eligió ‘resplandor’ para conservar la imagen luminosa sin forzar un sustantivo demasiado abstracto.
- source_word: παρρησία
  english_pob_choice: boldness
  chosen_spanish: franqueza
  alternatives_spanish:
  - audacia
  - valentía
  - confianza
  lexicon: BDAG
  rationale: En esta lista de virtudes, ‘franqueza’ refleja mejor la apertura valiente para hablar con libertad; ‘confianza’ queda reservada para πεποίθησις.
- source_word: πεποίθησις
  english_pob_choice: confidence
  chosen_spanish: confianza
  alternatives_spanish:
  - seguridad
  - plena certeza
  lexicon: BDAG
  rationale: Distingue bien esta virtud de πίστις y conserva el matiz de seguridad asentada.
- source_word: ἐγκράτεια
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - temperancia
  lexicon: BDAG
  rationale: ‘Dominio propio’ es idiomático y preciso en español bíblico contemporáneo.
- source_word: ἁγιασμός
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - consagración
  - santificación
  lexicon: BDAG
  rationale: ‘Santidad’ comunica la cualidad moral requerida en la lista de virtudes con mayor claridad que el tecnicismo ‘santificación’.
- source_word: ὑπέπεπτεν...τῇ διανοίᾳ
  english_pob_choice: fall within the grasp of our understanding
  chosen_spanish: caen dentro del alcance de nuestro entendimiento
  alternatives_spanish:
  - quedan al alcance de nuestro entendimiento
  - se hallan al alcance de nuestra mente
  lexicon: LSJ
  rationale: La frase mantiene el sentido de que estas realidades sí pueden ser comprendidas, aunque quedan por debajo de las cosas aún más grandes preparadas por Dios.
- source_word: ὑπομένουσιν / ὑπομενόντων
  english_pob_choice: patiently endure
  chosen_spanish: perseveran
  alternatives_spanish:
  - resisten con paciencia
  - perseveran con paciencia
  lexicon: BDAG
  rationale: En español, ‘perseverar’ comunica bien el permanecer firme; se conserva el matiz de resistencia paciente en la nota de traducción para no sobrecargar el texto principal.
- source_word: δημιουργός
  english_pob_choice: Creator
  chosen_spanish: Creador
  alternatives_spanish:
  - Hacedor
  - Artífice
  lexicon: LSJ
  rationale: Es el equivalente natural y teológicamente transparente para el término griego.
- source_word: πατὴρ τῶν αἰώνων
  english_pob_choice: Father of the ages
  chosen_spanish: Padre de las eras
  alternatives_spanish:
  - Padre de los siglos
  - Padre de la eternidad
  lexicon: LSJ
  rationale: ‘Eras’ conserva el plural de αἰώνων y evita reducirlo a una abstracción singular.
- source_word: ποσότης
  english_pob_choice: measure
  chosen_spanish: medida
  alternatives_spanish:
  - cantidad
  - proporción
  lexicon: LSJ
  rationale: Mantiene la pareja semántica ‘medida y belleza’ sin sobrerinterpretar el término.
- source_word: καλλονή
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - hermosura
  - esplendor
  lexicon: LSJ
  rationale: ‘Belleza’ es la correspondencia directa y clara en español.
- source_word: ἐστηργιμένῃ
  english_pob_choice: has been firmly fixed
  chosen_spanish: ha sido firmemente fijada
  alternatives_spanish:
  - ha sido establecida firmemente
  - está firmemente puesta
  lexicon: LSJ
  rationale: Recoge el estado pasivo y la estabilidad interior de la mente dirigida a Dios.
- source_word: εὐάρεστα καὶ εὐπρόσδεκτα
  english_pob_choice: pleasing and acceptable
  chosen_spanish: agradables y aceptables
  alternatives_spanish:
  - bien agradables y bien recibidas
  - gratas y aceptables
  lexicon: BDAG
  rationale: Es una pareja natural en español y conserva la doble expresión del griego.
- source_word: ἀμώμῳ βουλήσει
  english_pob_choice: blameless purpose
  chosen_spanish: propósito irreprochable
  alternatives_spanish:
  - voluntad irreprochable
  - designio sin mancha
  lexicon: BDAG
  rationale: ‘Propósito’ expresa bien βουλή en este contexto paraenético, y ‘irreprochable’ conserva la pureza moral.
- source_word: ἀδικίαν
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - iniquidad
  - maldad
  lexicon: BDAG
  rationale: Se prefirió ‘injusticia’ para mantener la relación con ‘justicia’ en el versículo inicial.
- source_word: κακοηθείας
  english_pob_choice: maliciousness
  chosen_spanish: malicia
  alternatives_spanish:
  - maldad
  - malignidad
  lexicon: LSJ
  rationale: La lista de vicios admite ‘malicia’ como equivalente conciso y natural en español.
- source_word: ψιθυρισμούς
  english_pob_choice: whisperings
  chosen_spanish: murmuraciones
  alternatives_spanish:
  - susurros
  - chismes
  lexicon: LSJ
  rationale: ‘Murmuraciones’ conserva la idea de habla oculta y descontento o intriga.
- source_word: καταλαλιάς
  english_pob_choice: slanders
  chosen_spanish: calumnias
  alternatives_spanish:
  - difamaciones
  - habladurías
  lexicon: BDAG
  rationale: ‘Calumnias’ nombra con precisión el habla destructiva contra el prójimo.
- source_word: θεοστυγίαν
  english_pob_choice: hatred of God
  chosen_spanish: odio a Dios
  alternatives_spanish:
  - hostilidad contra Dios
  - aborrecimiento de Dios
  lexicon: LSJ
  rationale: Preserva la fuerza teológica directa del raro término.
- source_word: κενοδοξίαν
  english_pob_choice: empty glory
  chosen_spanish: vana gloria
  alternatives_spanish:
  - gloria vacía
  - vanagloria
  lexicon: BDAG
  rationale: ‘Vana gloria’ mantiene la expresión bíblica tradicional y el sentido de gloria hueca.
- source_word: ἀφιλοξενίαν
  english_pob_choice: lack of hospitality
  chosen_spanish: falta de hospitalidad
  alternatives_spanish:
  - inhospitalidad
  - falta de acogida
  lexicon: LSJ
  rationale: La expresión es clara y fiel, aunque menos técnica que ‘inhospitalidad’.
- source_word: στυγητοὶ
  english_pob_choice: hateful to God
  chosen_spanish: aborrecibles a Dios
  alternatives_spanish:
  - detestables para Dios
  - odiosos a Dios
  lexicon: LSJ
  rationale: ‘Aborrecibles’ comunica bien la severidad del juicio divino sin sonar excesivamente coloquial.
- source_word: συνευδοκοῦντες
  english_pob_choice: approve of
  chosen_spanish: aprueban
  alternatives_spanish:
  - consienten en
  - se complacen en
  lexicon: BDAG
  rationale: ‘Aprueban’ reproduce el sentido moral de dar asentimiento a las obras malas.
- source_word: δικαιώματα
  english_pob_choice: righteous requirements
  chosen_spanish: justas exigencias
  alternatives_spanish:
  - estatutos justos
  - mandatos justos
  lexicon: BDAG
  rationale: ‘Exigencias’ preserva el carácter ético-demandante del término en esta cita del salmo, y ‘justas’ hace eco de δικαιώματα.
- source_word: διαθήκην
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: BDAG
  rationale: ‘Pacto’ es el equivalente bíblico más natural y auditable en español para διαθήκη.
- source_word: παιδεία
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - corrección
  - instrucción
  lexicon: BDAG
  rationale: ‘Disciplina’ conserva la formación correctiva y la reprensión que el contexto exige.
- source_word: περιέπλεκεν
  english_pob_choice: kept weaving
  chosen_spanish: siguió trenzando
  alternatives_spanish:
  - sigió tejiendo
  - enredó
  lexicon: LSJ
  rationale: ‘Trenzando’ conserva la metáfora de un engaño trabajado con cuidado y persistencia.
- source_word: σκάνδαλον
  english_pob_choice: a stumbling block
  chosen_spanish: tropiezo
  alternatives_spanish:
  - escándalo
  - ocasión de caída
  lexicon: BDAG
  rationale: ‘Tropiezo’ es la forma más natural en español para conservar la metáfora sin perder claridad.
- source_word: ἄνομε
  english_pob_choice: lawless one
  chosen_spanish: hombre inicuo
  alternatives_spanish:
  - inicuo
  - impío
  lexicon: BDAG
  rationale: Se optó por ‘hombre inicuo’ para mantener el tono vocativo y personal del pasaje, aunque ‘inicuo’ solo también sería posible.
- source_word: παραστήσω σε κατὰ πρόσωπόν σου
  english_pob_choice: set you before your face
  chosen_spanish: te pondré delante de tu rostro
  alternatives_spanish:
  - te confrontaré cara a cara
  - te pondré delante de ti
  lexicon: LSJ
  rationale: Se mantiene la imaginería judicial bastante literal para no resolver el giro griego con una paráfrasis excesiva.
- source_word: ῥυόμενος
  english_pob_choice: to rescue
  chosen_spanish: rescate
  alternatives_spanish:
  - libere
  - salve
  lexicon: BDAG
  rationale: ‘Rescate’ expresa bien la acción de librar del peligro en español bíblico.
- source_word: σωτήριον
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - salvamento
  lexicon: BDAG
  rationale: En la cita final, ‘salvación’ es la traducción más natural y teológicamente estable.
theological_decisions:
- issue: 'ὑπομενόντων αὐτόν: relación entre perseverancia y el objeto del verbo'
  english_pob_reading: those who patiently endure him
  chosen_spanish_reading: los que perseveran en él
  alternative_spanish_readings:
  - los que lo perseveran
  - los que lo soportan con paciencia
  rationale: El griego es compacto y algo difícil. En español, ‘perseverar en él’ comunica la relación de fidelidad sostenida a Dios sin forzar una construcción extraña, pero se conserva la nota lexical de que el verbo tiene fuerza de endurance/paciencia.
  doctrine_reference: Preserve theological tension rather than flattening the Greek relation.
- issue: 'Lista de virtudes y vicios: mantener el contraste moral sin modernizar en exceso'
  english_pob_reading: virtue catalogue and vice list rendered with direct ethical terms
  chosen_spanish_reading: virtudes y vicios con vocabulario moral directo
  alternative_spanish_readings:
  - más estilizado y devocional
  - más técnico y literal
  rationale: Se buscó un español público y eclesialmente legible, pero sin suavizar la fuerza moral de la enumeración.
  doctrine_reference: Ethical paraenesis should remain forceful and public.
- issue: Cita salmódica según la forma usada por 1 Clement, no armonizada con una versión bíblica tradicional
  english_pob_reading: translated directly from the Greek form cited in 1 Clement
  chosen_spanish_reading: traducida desde la forma griega citada por 1 Clemente
  alternative_spanish_readings:
  - armonizada con el Salmo 50/51 litúrgico
  - acomodada a una cita bíblica más familiar
  rationale: La fidelidad auditada exige respetar la forma de la cita tal como aparece en Clemente, incluso cuando difiera de una memoria bíblica habitual.
  doctrine_reference: Original-language primacy over translation tradition.
- issue: 'θεοστυγίαν: preservar la fuerza extrema del término'
  english_pob_reading: hatred of God
  chosen_spanish_reading: odio a Dios
  alternative_spanish_readings:
  - hostilidad contra Dios
  - aborrecimiento de Dios
  rationale: La expresión es deliberadamente severa y debe mantenerse sin atenuación.
  doctrine_reference: Do not erase lexical/theological severity.
translation_notes:
  revision_awareness: 'This draft follows the latest English revision that tightened several phrases for lexical accuracy: ὑπομενόντων αὐτόν was read as endurance ‘in/for him’ rather than mere waiting; ‘promised gifts’ remained direct; ἐστηργιμένῃ was strengthened to a firmly fixed state; and the vice-list wording was kept as a moral-ethical catalogue rather than smoothing its severity. The Spanish aims to reflect those audited choices while remaining publication-readable.'
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para θεός y ‘Creador’/‘Padre de las eras’ sin masking litúrgico.
  - ‘Cristo’ no aparece en este pasaje; se conserva el vocabulario del original sin cristianizarlo innecesariamente.
  - Se usa ‘pacto’ para διαθήκη y ‘salvación’ para σωτήριον, en coherencia con el registro bíblico del texto citado.
  - Se evita ‘siervo’ para δοῦλος porque no aparece aquí; los términos de virtud y vicio se mantienen moralmente fuertes y directos.
  - Se prefirió ‘santidad’ para ἁγιασμός y ‘justicia’ para δικαιοσύνη, manteniendo la distinción listada por el autor.
