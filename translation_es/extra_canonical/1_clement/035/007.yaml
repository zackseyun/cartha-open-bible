reference: 1 Clement 35:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: λέγει γὰρ ἡ γραφή· Τί δὲ ἀπαγγέλλεις εἰπεῖν ὁ θεός· Ἱνατί σὺ διηγεῖ τὰ δικαιώματά μου, καὶ ἀναλαμβάνεις τὴν διαθήκην μου ἐπὶ στόματός σου;
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/035/007.yaml
  text: For the Scripture says, “But to the wicked God says, Why do you recount my statutes, and take up my covenant on your lips?
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:31Z'
    unchanged: false
    changes_summary: Updated 'the sinner' to 'the wicked' for closer lexical accuracy, changed present/past to 'God says' to match the citation formula, rendered δικαιώματά as 'statutes' instead of 'righteous requirements,' and replaced 'upon your mouth' with the more natural formal English 'on your lips.'
translation:
  language: es
  text: 'Porque la Escritura dice: «Pero al impío Dios dice: ¿Por qué recitas mis estatutos y tomas mi pacto en tus labios?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡ γραφή
  english_pob_choice: For the Scripture says
  chosen_spanish: la Escritura dice
  alternatives_spanish:
  - la Escritura afirma
  - dice la Escritura
  lexicon: γραφή
  rationale: Mantiene la fórmula escritural estándar sin añadir interpretación; «dice» conserva el valor de cita viva del texto bíblico.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: θεός
  rationale: «Dios» es la equivalencia directa y natural en español; no se requiere artículo en este contexto de cita.
- source_word: Ἱνατί
  english_pob_choice: Why do you
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué viene
  lexicon: ἵνα τί
  rationale: Expresa la pregunta retórica de reproche de forma natural y fiel.
- source_word: σὺ διηγεῖ
  english_pob_choice: you recount
  chosen_spanish: recitas
  alternatives_spanish:
  - relatas
  - enumeras
  - repites
  lexicon: διηγεῖ
  rationale: El verbo griego comunica el acto de declarar o referir de manera sostenida; «recitas» conserva la idea de verbalizar de memoria o de forma formal, coherente con el contexto de labios y pacto.
- source_word: τὰ δικαιώματά μου
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis mandamientos
  - mis justas ordenanzas
  lexicon: δικαίωμα
  rationale: La revisión inglesa fijó «statutes»; en español, «estatutos» preserva el carácter normativo/legal del término mejor que una paráfrasis explicativa.
- source_word: ἀναλαμβάνεις τὴν διαθήκην μου
  english_pob_choice: take up my covenant
  chosen_spanish: tomas mi pacto
  alternatives_spanish:
  - asumes mi pacto
  - llevas mi pacto
  - recoges mi pacto
  lexicon: διαθήκη
  rationale: «Tomas» sigue de cerca el gesto verbal de asumir o portar lo que se menciona, sin forzar un giro idiomático ajeno al texto.
- source_word: ἐπὶ στόματός σου
  english_pob_choice: on your lips
  chosen_spanish: en tus labios
  alternatives_spanish:
  - sobre tus labios
  - en tu boca
  lexicon: στόμα
  rationale: La revisión inglesa prefirió «on your lips» por naturalidad; en español, «en tus labios» conserva el mismo registro y evita una calca menos idiomática.
theological_decisions:
- issue: Tensión entre el hebraísmo/jurídico de δικαιώματα y una posible lectura de «righteous requirements»
  english_pob_reading: statutes
  chosen_spanish_reading: estatutos
  alternative_spanish_readings:
  - requisitos justos
  - decretos justos
  - ordenanzas justas
  rationale: Se mantiene el valor normativo-jurídico preferido por la revisión inglesa. «Estatutos» conserva la carga de normas establecidas sin suavizar el tono de reprensión.
  doctrine_reference: Uso escritural del lenguaje legal/covenantal en cita profética
- issue: El sujeto reprendido es ὁ θεός dice / habla a «el impío», no a un concepto genérico
  english_pob_reading: the wicked
  chosen_spanish_reading: el impío
  alternative_spanish_readings:
  - el malvado
  - el inicuo
  - el perverso
  rationale: «Impío» preserva el matiz moral y bíblico de oposición a Dios, sin exagerar psicologismos ni moralismos modernos.
  doctrine_reference: Antítesis bíblica entre el justo y el impío
- issue: Metonimia de la boca/labios en la cita final
  english_pob_reading: on your lips
  chosen_spanish_reading: en tus labios
  alternative_spanish_readings:
  - sobre tus labios
  - en tu boca
  rationale: «Labios» conserva la imagen corporal y el carácter de mera profesión verbal, importante para la denuncia del uso hipócrita del lenguaje sagrado.
  doctrine_reference: Condena bíblica de la confesión vacía sin obediencia
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente, especialmente: «the wicked» en lugar de «the sinner», presente «God says» en vez de pasado, «statutes» para δικαιώματα y «on your lips» por naturalidad idiomática. El español refleja esas decisiones sin reintroducir lecturas anteriores.'
  spanish_consistency_notes:
  - Se mantiene «Escritura» como fórmula de cita bíblica.
  - Se usa «Dios» sin artículo por ser el sujeto de la cita.
  - «Impío» traduce la carga moral de ὁ θεός en este contexto.
  - «Pacto» se conserva como término bíblico estable para διαθήκη.
  - No se introduce paráfrasis explicativa; la oración sigue la estructura retórica del original.
