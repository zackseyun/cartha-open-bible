    issue: «Recitas» es algo más estrecho que el griego διηγεῖ
    rationale: El verbo griego sugiere contar, referir o enumerar; «recitas» sigue siendo defendible en contexto cultual y no distorsiona el sentido, aunque «relatas» o «enumeras» serían opciones algo más amplias.
