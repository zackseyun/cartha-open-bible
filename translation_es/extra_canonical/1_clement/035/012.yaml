translation:
  language: es
  text: Un sacrificio de alabanza me glorificará, y allí está el camino por el cual le mostraré la salvación de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θυσία αἰνέσεως
  english_pob_choice: A sacrifice of praise
  chosen_spanish: Un sacrificio de alabanza
  alternatives_spanish:
  - Un sacrificio de acción de gracias
  - Un sacrificio de loor
  lexicon: θυσία + αἴνεσις
  rationale: Mantiene la construcción nominal del griego y la equivalencia auditada del inglés. 'Alabanza' comunica con naturalidad la idea de praise en español bíblico sin desplazar el valor sacrificial del sintagma.
- source_word: δοξάσει με
  english_pob_choice: will glorify me
  chosen_spanish: me glorificará
  alternatives_spanish:
  - me dará gloria
  - me honrará
  lexicon: δοξάζω
  rationale: '''Glorificará'' preserva el verbo causativo del griego y el paralelismo con el inglés POB. ''Honrará'' sería posible, pero debilita la fuerza doxológica del verbo.'
- source_word: ἐκεῖ ὁδός
  english_pob_choice: and there is the way
  chosen_spanish: y allí está el camino
  alternatives_spanish:
  - y allí hay un camino
  - y allí está la senda
  lexicon: ὁδός
  rationale: '''Camino'' es la equivalencia más directa y bíblicamente transparente. ''Está'' conserva la presentación existencial del griego y del inglés, sin añadir explicaciones.'
- source_word: ὃν δείξω αὐτῷ
  english_pob_choice: by which I will show him
  chosen_spanish: que le mostraré
  alternatives_spanish:
  - por el cual le mostraré
  - que le indicaré
  lexicon: δείκνυμι
  rationale: En español, la cláusula relativa 'que le mostraré' suena más natural y sigue la relación funcional del griego, donde el camino es lo mostrado. 'Indicaré' sería posible, pero menos fuerte y menos cercano al inglés auditado.
- source_word: τὸ σωτήριον τοῦ θεοῦ
  english_pob_choice: the salvation of God
  chosen_spanish: la salvación de Dios
  alternatives_spanish:
  - la liberación de Dios
  - el rescate de Dios
  lexicon: σωτήριον + θεός
  rationale: Se conserva la formulación posesiva genitiva del griego y la decisión del inglés POB. 'Salvación' es el término más estable y abarcador en español para σωτήριον en este contexto.
theological_decisions:
- issue: Genitivo de origen o posesión en 'τὸ σωτήριον τοῦ θεοῦ'
  english_pob_reading: the salvation of God
  chosen_spanish_reading: la salvación de Dios
  alternative_spanish_readings:
  - la salvación que viene de Dios
  - la liberación de Dios
  rationale: 'La frase española conserva la ambigüedad reverente del genitivo del griego: puede entenderse como la salvación perteneciente a Dios, procedente de Dios o realizada por Dios. No se especifica más de lo que el texto exige.'
  doctrine_reference: Soteriología bíblica; genitivo de origen/posesión
translation_notes:
  revision_awareness: El texto fuente griego y la traducción inglesa auditada están en alto acuerdo; no hay revisiones aplicadas y la versión revisada más reciente permaneció sin cambios. Por eso el español sigue de cerca la estructura y el léxico ya validados, sin introducir notas textuales innecesarias.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ según el estándar del proyecto.
  - Se usa 'alabanza' y no 'Cristo' ni terminología eclesiástica ajena al griego.
  - La puntuación reproduce la coordinación simple del original sin ampliar el sentido.
