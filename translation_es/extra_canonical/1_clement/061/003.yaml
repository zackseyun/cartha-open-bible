id: 1CLEM.61.3
reference: 1 Clement 61:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ὁ μόνος δυνάμενος ποιῆσαι ταῦτα καὶ περισσότερα ἀγαθὰ μεθ’ ἡμῶν, σοὶ ἐξομολογούμεθα διὰ τοῦ ἀρχιερέως καὶ προστάτου τῶν ψυχῶν ἡμῶν Ἰησοῦ Χριστοῦ, δι’ οὗ σοι ἡ δόξα καὶ ἡ μεγαλωσύνη καὶ νῦν καὶ εἰς γενεὰν γενεῶν καὶ εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/061/003.yaml
  text: To you[a], who alone are able to do these and greater good things among us, we give thanks through the high priest and guardian of our souls, Jesus Christ, through whom be the glory and the majesty to you both now and from generation to generation and unto the ages of ages[b]. Amen.
  footnotes:
  - marker: a
    text: Or 'Jesus the Messiah'.
    reason: previous_rendering
  - marker: b
    text: Or 'You alone are able to do these things and greater good things for us; to you we give thanks'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:23Z'
    unchanged: false
    changes_summary: Changed “for us” to “among us” to more closely reflect μεθ’ ἡμῶν. No other changes needed.
translation:
  language: es
  text: A ti[a], el único capaz de hacer estas cosas y cosas todavía mejores entre nosotros, te damos gracias por medio del sumo sacerdote y guardián de nuestras almas, Jesucristo, por medio de quien sean la gloria y la majestad, ahora y de generación en generación y por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesús el Mesías».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ μόνος δυνάμενος ποιῆσαι ταῦτα καὶ περισσότερα ἀγαθὰ μεθ’ ἡμῶν
  english_pob_choice: who alone are able to do these and greater good things among us
  chosen_spanish: el único capaz de hacer estas cosas y cosas todavía mejores entre nosotros
  alternatives_spanish:
  - el único que puede hacer estas cosas y cosas mayores entre nosotros
  - el único capaz de hacer estas cosas y mayores bienes con nosotros
  lexicon: μόνος; δύναμαι; ποιέω; περισσότερος; ἀγαθός; μετά + gen.
  rationale: Conservo la estructura de participio atributivo con valor de apelación y la idea de capacidad/posibilidad con "capaz" para sonar natural en español sin perder la fuerza del griego. "Entre nosotros" refleja mejor μεθ’ ἡμῶν que "para nosotros", siguiendo la revisión auditada del inglés. "Cosas todavía mejores" mantiene el comparativo intensificador sin volverlo idiomáticamente plano.
- source_word: ἐξομολογούμεθα
  english_pob_choice: we give thanks
  chosen_spanish: te damos gracias
  alternatives_spanish:
  - te confesamos
  - te damos acción de gracias
  lexicon: ἐξομολογέομαι
  rationale: Aquí el contexto doxológico favorece la acepción de acción de gracias, no la confesión de pecados. En español, "te damos gracias" es la forma más directa y litúrgicamente clara, conservando el valor de agradecimiento que la POB inglesa ya eligió.
- source_word: ἀρχιερέως
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - gran sacerdote
  - pontífice
  lexicon: ἀρχιερεύς
  rationale: '"Sumo sacerdote" es la equivalencia española más estable y fiel, y evita el registro eclesiástico romano de "pontífice", que introduciría una carga ajena al texto.'
- source_word: προστάτου
  english_pob_choice: guardian
  chosen_spanish: guardián
  alternatives_spanish:
  - protector
  - defensor
  lexicon: προστάτης
  rationale: '"Guardián" mantiene la imagen de custodia y tutela del original, y corresponde bien al paralelismo con "nuestras almas". "Protector" es posible, pero menos cercano al matiz de vigilancia/cuidado personal.'
- source_word: τῶν ψυχῶν ἡμῶν
  english_pob_choice: our souls
  chosen_spanish: de nuestras almas
  alternatives_spanish:
  - de nuestras vidas
  - de nuestras personas
  lexicon: ψυχή
  rationale: '"Almas" preserva el término antropológico del texto; no lo sustituyo por "vidas" porque el griego no se limita a la existencia biológica.'
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Christ
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Cristo
  - Jesús el Mesías
  lexicon: Ἰησοῦς; Χριστός
  rationale: 'Sigo la revisión auditada: en esta fórmula doxológica tardía, Χριστός funciona como nombre/título fijo y no conviene sobretraducirlo como "Mesías". En español eclesial, "Jesucristo" comunica con naturalidad el valor nominal-litúrgico del sintagma.'
- source_word: ἡ δόξα καὶ ἡ μεγαλωσύνη
  english_pob_choice: the glory and the majesty
  chosen_spanish: la gloria y la majestad
  alternatives_spanish:
  - la gloria y la grandeza soberana
  - la gloria y la magnificencia
  lexicon: δόξα; μεγαλωσύνη
  rationale: Mantengo la pareja tradicional y transparente, que corresponde bien al tono doxológico. "Majestad" conserva el registro elevado sin introducir una paráfrasis interpretativa.
- source_word: εἰς γενεὰν γενεῶν καὶ εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: from generation to generation and unto the ages of ages
  chosen_spanish: de generación en generación y por los siglos de los siglos
  alternatives_spanish:
  - por generación de generaciones y por los siglos de los siglos
  - de generación en generación y hasta los siglos de los siglos
  lexicon: γενεά; αἰών
  rationale: '"Por los siglos de los siglos" es la fórmula española más natural y reconocible para el superlativo temporal del griego. "De generación en generación" mantiene el primer miembro sin forzar una construcción extraña.'
theological_decisions:
- issue: Tratamiento de Χριστός en una fórmula doxológica temprana
  english_pob_reading: Jesus Christ, with prior footnote allowing 'Jesus the Messiah'
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús el Mesías
  - Jesús Cristo
  rationale: La revisión auditada concluye que, en este contexto litúrgico formal del siglo I, Χριστός funciona de manera prácticamente fija como nombre/título. Traducirlo como "el Mesías" introduciría una explicitación semántica que el griego aquí no exige y alteraría el registro doxológico.
  doctrine_reference: Cristología; uso titular de Χριστός en fórmulas litúrgicas primitivas
- issue: Sentido de ἐξομολογούμεθα en una oración de alabanza
  english_pob_reading: we give thanks
  chosen_spanish_reading: te damos gracias
  alternative_spanish_readings:
  - te confesamos
  - te hacemos confesión
  rationale: Aunque ἐξομολογέομαι puede incluir confesión, el marco de esta oración es claramente eucarístico/doxológico. En español, "te damos gracias" preserva el sentido de agradecimiento que el contexto pide y evita una asociación penitencial impropia.
  doctrine_reference: Oración de acción de gracias; doxología
translation_notes:
  revision_awareness: Seguí la revisión auditada que corrigió la relación sintáctica de ὁ μόνος δυνάμενος... con σοὶ ἐξομολογούμεθα, evitando separar la frase en dos oraciones independientes. También incorporé el cambio revisado de "for us" a "among us" mediante "entre nosotros" para reflejar μεθ’ ἡμῶν.
  spanish_consistency_notes:
  - Conservo "Yahvé" como norma general del proyecto, pero este verso no contiene el Tetragrámaton ni κύριος con valor de reemplazo divino.
  - Mantengo "Jesucristo" por la revisión específica del expediente para esta fórmula.
  - Uso "sumo sacerdote", "guardián", "alma" y "gloria/majestad" de modo consistente con el registro elevado y el sentido antropológico del texto.
  - No añadí notas sobre variantes textuales porque el expediente no presenta una variante griega sustantiva para esta unidad.
