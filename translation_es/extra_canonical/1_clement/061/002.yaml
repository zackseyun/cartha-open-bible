id: 1CLEM.61.2
reference: 1 Clement 61:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: σὺ γάρ, δέσποτα, ἐπουράνιε βασιλεῦ τῶν αἰώνων, δίδως τοῖς υἱοῖς τῶν ἀνθρώπων δόξαν καὶ τιμὴν καὶ ἐξουσίαν τῶν ἐπὶ τῆς γῆς ὑπαρχόντων· σὺ, κύριε, διεύθυνον τὴν βουλὴν αὐτῶν κατὰ τὸ καλὸν καὶ εὐάρεστον ἐνώπιον σου, ὅπως διέποντες ἐν εἰρήνῃ καὶ πραΰτητι εὐσεβῶς τὴν ὑπὸ σοῦ αὐτοῖς δεδομένην ἐξουσίαν θεοῦ σου τυγχάνωσιν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/061/002.yaml
  text: For you[a], Master, heavenly King of the ages, give glory and honor and authority to the sons of men over those who are on the earth. You, Lord, direct their counsel according to what is good and pleasing before you, so that, governing in peace and gentleness, and with godliness, the authority you have given them, they may obtain your favor.
  footnotes:
  - marker: a
    text: Or 'You, Lord, direct their counsel'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:54Z'
    unchanged: false
    changes_summary: 'Adjusted word order and phrasing for accuracy and natural English: rendered τῶν ἐπὶ τῆς γῆς ὑπαρχόντων as ''over those who are on the earth'' rather than ''over the things on earth''; changed ''administering'' to ''governing''; added ''and with godliness'' for εὐσεβῶς; and smoothed the sentence while preserving the original sense.'
translation:
  language: es
  text: Porque tú, Soberano, Rey celestial de los siglos, das gloria, honor y autoridad a los hijos de los hombres sobre los que están en la tierra. Señor[a], dirige su consejo conforme a lo bueno y agradable delante de ti, para que, gobernando con la autoridad que tú les has dado, en paz, mansedumbre y piedad, obtengan tu favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú, Señor, dirige su consejo». El griego tiene un imperativo, de modo que la frase es una petición, no una afirmación.'
    reason: previous_rendering
lexical_decisions:
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Soberano
  alternatives_spanish:
  - Dueño
  - Señor
  lexicon: δέσποτα
  rationale: Conserva la fuerza de autoridad absoluta de δέσποτα sin confundirlo con κύριε, que aparece de inmediato después. “Soberano” comunica dominio y dignidad en español sin reducirse a una forma meramente devocional.
- source_word: ἐπουράνιε βασιλεῦ τῶν αἰώνων
  english_pob_choice: heavenly King of the ages
  chosen_spanish: Rey celestial de los siglos
  alternatives_spanish:
  - Rey de los siglos en los cielos
  - Rey celestial de las edades
  lexicon: ἐπουράνιος / βασιλεύς / αἰών
  rationale: “Celestial” mantiene el valor de ἐπουράνιος; “de los siglos” reproduce el genitivo de αἰώνων con el sentido temporal y solemne que el inglés POB conserva con “of the ages”.
- source_word: δίδως
  english_pob_choice: give
  chosen_spanish: das
  alternatives_spanish:
  - concedes
  - otorgas
  lexicon: δίδωμι
  rationale: Preserva el presente verbal y el tono de afirmación litúrgica de la invocación dirigida a Dios.
- source_word: δόξαν καὶ τιμὴν καὶ ἐξουσίαν
  english_pob_choice: glory and honor and authority
  chosen_spanish: gloria, honor y autoridad
  alternatives_spanish:
  - gloria, honra y poder
  - gloria, honor y potestad
  lexicon: δόξα / τιμή / ἐξουσία
  rationale: “Autoridad” conserva ἐξουσία con fuerza jurídica y de gobierno; “honor” es más natural y fiel que “honra” en este registro, y “gloria” mantiene el primer término sin alterar la tríada.
- source_word: τοῖς υἱοῖς τῶν ἀνθρώπων
  english_pob_choice: the sons of men
  chosen_spanish: a los hijos de los hombres
  alternatives_spanish:
  - a los hijos del hombre
  - a los seres humanos
  lexicon: υἱοὶ τῶν ἀνθρώπων
  rationale: Se conserva la fórmula semítica y su resonancia tradicional, en lugar de suavizarla a un equivalente genérico que perdería el patrón del original.
- source_word: τῶν ἐπὶ τῆς γῆς ὑπαρχόντων
  english_pob_choice: over those who are on the earth
  chosen_spanish: sobre los que están en la tierra
  alternatives_spanish:
  - sobre los que existen en la tierra
  - sobre los que pertenecen a la tierra
  lexicon: ὑπάρχω
  rationale: “Los que están en la tierra” refleja con naturalidad el participio sustantivado y evita la dureza de una traducción más literal de “los que existen”. En español, el referente humano queda claro por el contexto.
- source_word: διεύθυνον
  english_pob_choice: direct
  chosen_spanish: dirige
  alternatives_spanish:
  - guía
  - endereza
  lexicon: διευθύνω
  rationale: El imperativo tiene fuerza de ruego/petición. “Dirige” conserva la dirección moral y administrativa del verbo, y respeta el ajuste de la revisión inglesa que aclaró el modo imperativo.
- source_word: τὴν βουλὴν αὐτῶν
  english_pob_choice: their counsel
  chosen_spanish: su consejo
  alternatives_spanish:
  - sus planes
  - su decisión
  lexicon: βουλή
  rationale: “Consejo” mantiene la amplitud de intención, deliberación y plan, sin limitarlo solo a “planes” ni a la facultad de aconsejar.
- source_word: κατὰ τὸ καλὸν καὶ εὐάρεστον ἐνώπιον σου
  english_pob_choice: according to what is good and pleasing before you
  chosen_spanish: conforme a lo bueno y agradable delante de ti
  alternatives_spanish:
  - según lo bueno y agradable ante ti
  - de acuerdo con lo que es bueno y agradable en tu presencia
  lexicon: καλός / εὐάρεστος / ἐνώπιον
  rationale: “Conforme a” suena más jurídico y fiel que una simple paráfrasis; “delante de ti” mantiene la imagen relacional de ἐνώπιόν σου.
- source_word: διέποντες
  english_pob_choice: governing
  chosen_spanish: gobernando
  alternatives_spanish:
  - administrando
  - regiendo
  lexicon: διέπω
  rationale: “Gobernando” reproduce el sentido de ejercer dirección u orden sobre otros y sigue la revisión inglesa que prefirió “governing” por claridad.
- source_word: ἐν εἰρήνῃ καὶ πραΰτητι
  english_pob_choice: in peace and gentleness
  chosen_spanish: en paz y mansedumbre
  alternatives_spanish:
  - en paz y suavidad
  - en paz y humildad
  lexicon: εἰρήνη / πραΰτης
  rationale: “Mansedumbre” es el equivalente más preciso de πραΰτης en un contexto ético y comunitario; “gentileza” sería más débil y moderno, y “suavidad” sería menos exacto.
- source_word: εὐσεβῶς
  english_pob_choice: with godliness
  chosen_spanish: con piedad
  alternatives_spanish:
  - piadosamente
  - con devoción
  lexicon: εὐσεβῶς
  rationale: “Con piedad” conserva el adverbio de conducta reverente y evita que “piadosamente” suene excesivamente adverbial o devocional en español contemporáneo.
- source_word: τὴν ὑπὸ σοῦ αὐτοῖς δεδομένην ἐξουσίαν
  english_pob_choice: the authority you have given them
  chosen_spanish: la autoridad que tú les has dado
  alternatives_spanish:
  - la potestad que tú les has concedido
  - la autoridad otorgada por ti
  lexicon: ἐξουσία / δίδωμι
  rationale: Se mantiene la relación directa entre el dador y el don, con “autoridad” como término principal y el perfecto español que expresa un don ya conferido.
- source_word: θεοῦ σου τυγχάνωσιν
  english_pob_choice: they may obtain your favor
  chosen_spanish: obtengan tu favor
  alternatives_spanish:
  - alcancen tu favor
  - reciban tu favor
  lexicon: τυγχάνω
  rationale: La frase final del griego es textualmente difícil y el inglés POB la interpreta como “obtain your favor”. En español se conserva esa lectura sin forzar una paráfrasis doctrinalmente cargada.
theological_decisions:
- issue: Modo imperativo en la segunda oración
  english_pob_reading: You, Lord, direct their counsel
  chosen_spanish_reading: Tú, Señor, dirige su consejo
  alternative_spanish_readings:
  - Señor, dirige su consejo
  - Tú, Señor, dirige su consejo
  rationale: La revisión inglesa advirtió que διεύθυνον es imperativo, no indicativo. En español, “Tú, Señor, dirige” conserva el valor de petición y la segunda persona explícita sin sonar como afirmación descriptiva.
  doctrine_reference: Liturgical petition; imperative force in prayer
- issue: Relación entre autoridad humana y favor divino
  english_pob_reading: that authority you have given them, they may obtain your favor
  chosen_spanish_reading: la autoridad que tú les has dado, obtengan tu favor
  alternative_spanish_readings:
  - que, usando la autoridad que tú les has dado, obtengan tu favor
  - para que reciban tu favor al ejercer la autoridad
  rationale: 'Se preserva la conexión causal del texto: la autoridad viene de Dios y el ejercicio correcto de esa autoridad culmina en el favor divino. No se explicita una recompensa meritoria que el griego no exige.'
  doctrine_reference: Providence and accountable governance
- issue: Reverencia y lenguaje de gobierno divino
  english_pob_reading: Master, heavenly King of the ages
  chosen_spanish_reading: Soberano, Rey celestial de los siglos
  alternative_spanish_readings:
  - Señor, Rey celestial de los siglos
  - Dueño, Rey celestial de los siglos
  rationale: “Soberano” expresa con precisión la majestad de δέσποτα, manteniendo además la diferencia conceptual con “Señor” para κύριε. Esto ayuda a no borrar una distinción retórica del original.
  doctrine_reference: Divine sovereignty and prayer address
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió la fuerza gramatical de διεύθυνον como imperativo y ajustó la relación de τῶν ἐπὶ τῆς γῆς ὑπαρχόντων a seres humanos sobre la tierra. La traducción española sigue esas revisiones: convierte la segunda oración en petición explícita y traduce el complemento final como referencia a quienes están en la tierra, no a cosas de la tierra. También incorpora la adición de εὐσεβῶς como ''con piedad'', coherente con la última revisión inglesa.'
  spanish_consistency_notes:
  - Se distingue δέσποτα como «Soberano» y κύριε como «Señor» para preservar la doble forma de invocación.
  - Se mantiene «autoridad» para ἐξουσία en ambos casos, evitando alternar con «poder» o «potestad» sin motivo.
  - «Paz y mansedumbre» y «con piedad» conservan el tono ético de la cláusula participial sin sobrerinterpretarla.
  - 'La nota [a] marca la variante sintáctica importante: lectura de petición frente a posible lectura de afirmación.'
