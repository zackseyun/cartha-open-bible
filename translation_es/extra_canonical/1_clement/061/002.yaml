revisions:
- from: Porque tú, Soberano, Rey celestial de los siglos, das gloria, honor y autoridad a los hijos de los hombres sobre los que están en la tierra. Tú, Señor, dirige[a] su consejo conforme a lo bueno y agradable delante de ti, para que, gobernando en paz y mansedumbre, y con piedad, la autoridad que tú les has dado, obtengan tu favor.
  to: Porque tú, Soberano, Rey celestial de los siglos, das gloria, honor y autoridad a los hijos de los hombres sobre los que están en la tierra. Señor[a], dirige su consejo conforme a lo bueno y agradable delante de ti, para que, gobernando con la autoridad que tú les has dado, en paz, mansedumbre y piedad, obtengan tu favor.
  rationale: Se ajusta la segunda oración para que el imperativo suene natural en español (‘Señor, dirige’) y para que la cláusula final exprese con claridad que los gobernantes ejercen la autoridad dada por Dios de manera pacífica, mansa y piadosa, con el fin de obtener su favor. La nota se conserva como referencia al renderizado alterno documentado, pero se ancla correctamente a la frase vocativa.
