  text: Σύ, δέσποτα, ἔδωκας τὴν ἐξουσίαν τῆς βασιλείας αὐτοῖς διὰ τοῦ μεγαλοπρεποῦς καὶ ἀνεκδιηγήτου κράτους σου, εἰς τὸ γινώσκοντας ἡμᾶς τὴν ὑπὸ σοῦ αὐτοῖς δεδομένην δόξαν καὶ τιμὴν ὑποτάσσεσθαι αὐτοῖς, μηδὲν ἐναντιουμένους τῷ θελήματί σου· οἷς δός, κύριε, ὑγίειαν, εἰρήνην, ὁμόνοιαν, εὐστάθειαν, εἰς τὸ διέπειν αὐτοὺς τὴν ὑπὸ σοῦ δεδομένην αὐτοῖς ἡγεμονίαν ἀπροσκόπως. . σὺ γάρ, δέσποτα, ἐπουράνιε βασιλεῦ τῶν αἰώνων, δίδως τοῖς υἱοῖς τῶν ἀνθρώπων δόξαν καὶ τιμὴν καὶ ἐξουσίαν τῶν ἐπὶ τῆς γῆς ὑπαρχόντων· σὺ, κύριε, διεύθυνον τὴν βουλὴν αὐτῶν κατὰ τὸ καλὸν καὶ εὐάρεστον ἐνώπιον σου, ὅπως διέποντες ἐν εἰρήνῃ καὶ πραΰτητι εὐσεβῶς τὴν ὑπὸ σοῦ αὐτοῖς δεδομένην ἐξουσίαν θεοῦ σου τυγχάνωσιν. 3. ὁ μόνος δυνάμενος ποιῆσαι ταῦτα καὶ περισσότερα ἀγαθὰ μεθ’ ἡμῶν, σοὶ ἐξομολογούμεθα διὰ τοῦ ἀρχιερέως καὶ προστάτου τῶν ψυχῶν ἡμῶν Ἰησοῦ Χριστοῦ, δι’ οὗ σοι ἡ δόξα καὶ ἡ μεγαλωσύνη καὶ νῦν καὶ εἰς γενεὰν γενεῶν καὶ εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
