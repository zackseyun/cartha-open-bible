translation:
  language: es
  text: Tú, Soberano, les diste la autoridad de gobierno por medio de tu magnífico e indescriptible poder, para que, al conocer la gloria y el honor que les has dado, nos sometamos a ellos, sin oponernos en nada a tu voluntad. Concédeles, Señor, salud, paz, concordia y estabilidad, para que administren sin tropiezo[a] el gobierno que les has dado. Porque tú, Soberano, Rey celestial de los siglos, das gloria y honor y autoridad sobre las cosas de la tierra a los hijos de los hombres. Tú, Señor, dirige su consejo conforme a lo bueno y agradable delante de ti, para que, administrando en paz y mansedumbre, de manera piadosa, la autoridad que les has dado, obtengan tu favor. A ti, que solo eres capaz de hacer estas cosas y aun cosas mejores para nosotros, damos gracias por medio del sumo sacerdote y guardián de nuestras almas, Jesús Mesías, por quien sea la gloria y la majestad para ti, ahora y por todas las generaciones y por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sin tropiezo» traduce ἀπροσκόπως y conserva la idea de una administración sin fallas ni tropiezos, y también puede sugerir que no cause tropiezo a otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Soberano
  alternatives_spanish:
  - Señor
  - Dueño
  lexicon: BDAG
  rationale: El griego distingue δέσποτα de κύριε más adelante. «Soberano» conserva la idea de autoridad absoluta sin repetir «Señor» donde el texto griego usa dos títulos distintos.
- source_word: ἐξουσίαν τῆς βασιλείας
  english_pob_choice: the authority of rule
  chosen_spanish: la autoridad de reinar
  alternatives_spanish:
  - la autoridad real
  - la autoridad del reino
  - la autoridad de gobierno
  lexicon: LSJ
  rationale: La frase une autoridad y realeza/gobierno. «La autoridad de reinar» comunica esa combinación sin introducir un tecnicismo más duro que el español actual.
- source_word: κράτους
  english_pob_choice: might
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  - dominio
  lexicon: BDAG
  rationale: En este contexto doxológico, «poder» funciona naturalmente en español y mantiene la relación con la autoridad recién mencionada.
- source_word: ὑποτάσσεσθαι
  english_pob_choice: submit ourselves
  chosen_spanish: nos sometamos
  alternatives_spanish:
  - nos sujetemos
  - nos sometamos a ellos
  lexicon: BDAG
  rationale: El infinitivo medio pide fuerza reflexiva. «Nos sometamos» expresa esa postura voluntaria y evita una formulación demasiado literal y pesada.
- source_word: μηδὲν ἐναντιουμένους
  english_pob_choice: opposing ... in nothing
  chosen_spanish: sin oponernos en nada
  alternatives_spanish:
  - sin resistir en nada
  - sin contrariar en nada
  lexicon: LSJ
  rationale: Reproduce la negación total de μηδέν con una construcción natural en español y conserva el matiz de resistencia/oposición.
- source_word: ὑγίειαν
  english_pob_choice: health
  chosen_spanish: salud
  alternatives_spanish:
  - sanidad
  - bienestar
  lexicon: BDAG
  rationale: «Salud» es la equivalencia más directa y comprensible en una oración por gobernantes.
- source_word: ὁμόνοιαν
  english_pob_choice: concord
  chosen_spanish: concordia
  alternatives_spanish:
  - unidad
  - armonía
  lexicon: BDAG
  rationale: «Concordia» conserva el tono formal del elenco de peticiones y el sentido de concordancia pública y relacional.
- source_word: εὐστάθειαν
  english_pob_choice: stability
  chosen_spanish: estabilidad
  alternatives_spanish:
  - firmeza
  - seguridad
  lexicon: LSJ
  rationale: «Estabilidad» es el equivalente más transparente para la idea de firme permanencia en el gobierno.
- source_word: διέπειν
  english_pob_choice: administer
  chosen_spanish: administren
  alternatives_spanish:
  - gobiernen
  - dirijan
  lexicon: BDAG
  rationale: En el contexto de una oración por autoridades, «administren» expresa el ejercicio ordenado del cargo sin sobredeterminar el tipo de régimen.
- source_word: ἡγεμονίαν
  english_pob_choice: leadership
  chosen_spanish: autoridad
  alternatives_spanish:
  - gobierno
  - mando
  - liderazgo
  lexicon: LSJ
  rationale: Aquí ἡγεμονία se refiere al ejercicio de mando/conducción ya confiado por Dios. «Autoridad» permite enlazarlo con ἐξουσία sin perder la idea de función gobernante.
- source_word: ἀπροσκόπως
  english_pob_choice: without stumbling
  chosen_spanish: sin tropiezo
  alternatives_spanish:
  - sin obstáculo
  - sin caer
  - sin escándalo
  lexicon: BDAG
  rationale: «Sin tropiezo» es una equivalencia idiomática y clásica para la idea de una administración sin fallas o sin causar tropiezo.
- source_word: τοῖς υἱοῖς τῶν ἀνθρώπων
  english_pob_choice: the sons of men
  chosen_spanish: a los hijos de los hombres
  alternatives_spanish:
  - a la humanidad
  - a los seres humanos
  lexicon: BDAG
  rationale: Se conserva la cadencia bíblica de la expresión, que el texto usa de forma solemne y tradicional.
- source_word: διεύθυνον τὴν βουλὴν αὐτῶν
  english_pob_choice: direct their counsel
  chosen_spanish: dirige su consejo
  alternatives_spanish:
  - guía sus planes
  - endereza su propósito
  lexicon: LSJ
  rationale: «Consejo» captura la deliberación gobernante; «dirige» mantiene el ruego directo a Dios para ordenar sus decisiones.
- source_word: κατὰ τὸ καλὸν καὶ εὐάρεστον ἐνώπιον σου
  english_pob_choice: according to what is good and pleasing before you
  chosen_spanish: conforme a lo bueno y agradable delante de ti
  alternatives_spanish:
  - según lo bueno y agradable ante ti
  - de acuerdo con lo bueno y agradable en tu presencia
  lexicon: BDAG
  rationale: La fórmula preserva el estándar moral centrado en Dios y el giro bíblico «delante de ti»/«ante ti».
- source_word: πραΰτητι
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - gentileza
  - suavidad
  lexicon: BDAG
  rationale: «Mansedumbre» conserva mejor el registro bíblico y moral que una palabra más coloquial.
- source_word: εὐσεβῶς
  english_pob_choice: in a godly way
  chosen_spanish: en forma piadosa
  alternatives_spanish:
  - piadosamente
  - de manera piadosa
  - en forma goda
  lexicon: BDAG
  rationale: «En forma piadosa» traduce el adverbio sin sonar arcaico y mantiene la referencia explícita a la reverencia hacia Dios.
- source_word: θεοῦ σου τυγχάνωσιν
  english_pob_choice: they may obtain your favor
  chosen_spanish: obtengan tu favor
  alternatives_spanish:
  - reciban tu favor
  - alcancen tu aprobación
  - obtengan tu benevolencia
  lexicon: LSJ
  rationale: El giro griego sugiere alcanzar/obtener algo de Dios como respuesta a su gobierno. «Tu favor» conserva esa amplitud sin especificar más de lo que el texto da.
- source_word: ἐξομολογούμεθα
  english_pob_choice: we give thanks
  chosen_spanish: damos gracias
  alternatives_spanish:
  - confesamos
  - te alabamos
  - te damos gracias
  lexicon: BDAG
  rationale: En una conclusión litúrgica, «damos gracias» es el equivalente natural que recoge el sentido de reconocimiento agradecido del verbo.
- source_word: ἀρχιερέως
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - gran sacerdote
  - alto sacerdote
  lexicon: BDAG
  rationale: «Sumo sacerdote» es la equivalencia estándar y más clara en español para el título sacerdotal.
- source_word: προστάτου
  english_pob_choice: guardian
  chosen_spanish: guardián
  alternatives_spanish:
  - protector
  - amparo
  - patrono
  lexicon: LSJ
  rationale: «Guardián» preserva la idea de protección y custodia de las almas sin introducir connotaciones ajenas.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se traduce Χριστός como «Mesías» conforme a la política del proyecto para el título, manteniendo transparencia semántica.
- source_word: μεγαλωσύνη
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - grandeza
  - magnificencia
  lexicon: BDAG
  rationale: «Majestad» empareja bien con «gloria» en el cierre doxológico y refleja el registro elevado del original.
- source_word: εἰς γενεὰν γενεῶν ... εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: to all generations and unto the ages of ages
  chosen_spanish: por todas las generaciones y por los siglos de los siglos
  alternatives_spanish:
  - de generación en generación y por los siglos de los siglos
  - por todas las generaciones y para siempre
  lexicon: BDAG
  rationale: Se preserva el paralelismo enfático de las dos fórmulas temporales sin aplanarlas en un simple «para siempre».
theological_decisions:
- issue: Distinción entre δέσποτα y κύριε
  english_pob_reading: Master ... Lord
  chosen_spanish_reading: Soberano ... Señor
  alternative_spanish_readings:
  - Señor ... Señor
  - Soberano ... Soberano
  rationale: El griego usa dos títulos distintos. Mantener dos formas diferentes en español evita borrar esa distinción de reverencia y autoridad.
  doctrine_reference: Principio POB de transparencia léxica frente a títulos divinos distintos.
- issue: Traducción de Χριστός como título y no como nombre fijo
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: En este cierre litúrgico Χριστός funciona como título cristológico. «Mesías» conserva el valor semántico del término y responde a la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sentido de θεοῦ σου τυγχάνωσιν
  english_pob_reading: they may obtain your favor
  chosen_spanish_reading: obtengan tu favor
  alternative_spanish_readings:
  - reciban tu favor
  - alcancen tu aprobación
  - obtengan tu benevolencia
  rationale: La frase pide que los gobernantes reciban de Dios una respuesta favorable a su recto ejercicio. «Favor» es amplio y no fuerza una noción más específica que el griego no exige.
  doctrine_reference: Principio de no sobreinterpretar la petición con una sola noción teológica.
translation_notes:
  revision_awareness: 'El borrador incorpora la revisión final del audit trail en dos puntos clave: ἀπροσκόπως se traduce aquí como «sin tropiezo», y θεοῦ σου τυγχάνωσιν como «obtengan tu favor». También se mantiene la decisión revisada de traducir Χριστός como «Mesías» para conservar la transparencia del título.'
  spanish_consistency_notes:
  - Se ha conservado la distinción de títulos divinos usando «Soberano» para δέσποτα y «Señor» para κύριε.
  - «Mesías» se usa para Χριστός conforme a la política del proyecto y de manera consistente con el valor titular del término.
  - El registro litúrgico se mantiene elevado pero en español natural, con fórmulas como «damos gracias», «sumo sacerdote» y «por los siglos de los siglos».
