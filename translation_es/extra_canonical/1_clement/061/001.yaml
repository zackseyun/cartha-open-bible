    issue: «la autoridad de reinar» suena poco idiomático para ἐξουσίαν τῆς βασιλείας
    rationale: Aunque semánticamente apunta al gobierno/reinado, en español resulta más natural «la autoridad de gobierno» o «la autoridad para gobernar», sin perder el matiz del original.
  - severity: medium
    issue: ἡγεμονίαν se tradujo «autoridad», igual que ἐξουσία
    rationale: El audit trail inglés procura distinguir ἡγεμονίαν de ἐξουσία. En español, repetir «autoridad» borra la diferencia entre la potestad concedida y el ejercicio/esfera de gobierno. «Gobierno» o «mando» mantiene mejor el contraste.
  - severity: low
    issue: «en forma piadosa» es menos natural que alternativas más fluidas
    rationale: No es incorrecto, pero «piadosamente» o «de manera piadosa» encaja mejor con el tono solemne y con el adverbio εὐσεβῶς.
