base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/061/001.yaml
  text: You, Master, gave them the authority of rule through your magnificent and indescribable might, so that, knowing the glory and honor given to them by you, we might submit ourselves to them, opposing your will in nothing. Grant to them, Lord, health, peace, concord, and stability, so that they may administer without stumbling the leadership you have given them. For you, Master, heavenly King of the ages, give glory and honor and authority over the things on earth to the sons of men. You, Lord, direct their counsel according to what is good and pleasing before you, so that, administering in peace and gentleness, in a godly way, the authority you have given them, they may obtain your favor. To you, who alone are able to do these things and greater good things for us, we give thanks through the high priest and guardian of our souls, Jesus Messiah, through whom be the glory and the majesty to you both now and to all generations and unto the ages of ages. Amen.
