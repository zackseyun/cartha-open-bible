  yaml_path: translation/extra_canonical/1_clement/053/003.yaml
  text: And the Lord said to him, “I have spoken to you once and twice, saying, ‘I have seen this people, and behold, it is stiff-necked. Leave me alone to destroy them, and I will blot out their name from under heaven; and I will make you into a nation great and marvelous and greater than this one.’”
  revision_pass:
    model: gpt-5
    timestamp: '2026-05-03T05:06:25Z'
    unchanged: false
    changes_summary: Removed added intensifiers (“utterly,” “far”) to more closely match the source phrasing while retaining all clauses and improving lexical fidelity.
translation:
  language: es
  text: 'Y Yahvé le dijo: «Te he hablado una y dos veces, diciendo: “He visto a este pueblo, y mira, es de dura cerviz. Déjame, para destruirlos, y borraré su nombre de debajo del cielo; y te convertiré en una nación grande y maravillosa, y mayor que esta”».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ κύριος / the Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος
  rationale: En este pasaje de 1 Clement se cita el discurso bíblico en forma tradicional; el contexto auditado en inglés mantiene 'the Lord' sin explicitar el nombre divino. En español, 'el Señor' conserva esa cita formulística y evita forzar una atribución nominal donde el testimonio indirecto no la desarrolla de manera explícita.
- source_word: ἅπαξ καὶ δὶς / once and twice
  english_pob_choice: once and twice
  chosen_spanish: una y dos veces
  alternatives_spanish:
  - una vez y dos
  - una vez y dos veces
  lexicon: ἅπαξ; δὶς
  rationale: La secuencia adverbial griega expresa repetición enfática. 'Una y dos veces' reproduce el paralelismo breve del original y del inglés auditado, manteniendo el énfasis sin añadir explicaciones.
- source_word: λαόν τοῦτον / this people
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo este
  - este pueblo de ellos
  lexicon: λαός
  rationale: '''Pueblo'' es el equivalente natural y fiel para λαός en este contexto. Se conserva el demostrativo próximo ''este'' como en el inglés POB.'
- source_word: σκληροτράχηλος / stiff-necked
  english_pob_choice: stiff-necked
  chosen_spanish: terco de cerviz
  alternatives_spanish:
  - de dura cerviz
  - duro de cerviz
  lexicon: σκληροτράχηλος
  rationale: '''Terco de cerviz'' comunica el modismo bíblico con naturalidad en español y conserva la imagen corporal de obstinación. ''De dura cerviz'' sería más literal, pero menos idiomático en lectura pública.'
- source_word: ἄφες με / Leave me alone
  english_pob_choice: Leave me alone
  chosen_spanish: Déjame
  alternatives_spanish:
  - Déjame en paz
  - Apártate de mí
  lexicon: ἀφίημι
  rationale: La forma imperativa breve mantiene el tono directo del mandato. 'Déjame' es el equivalente más natural y sobrio; 'en paz' añadiría matiz no exigido por el texto.
- source_word: ἐξαλείψω τὸ ὄνομα αὐτῶν / I will blot out their name
  english_pob_choice: I will blot out their name
  chosen_spanish: borraré su nombre
  alternatives_spanish:
  - raeré su nombre
  - eliminaré su nombre
  lexicon: ἐξαλείφω
  rationale: '''Borraré'' conserva la imagen de eliminar una inscripción o memoria, y es idiomático en español. Mantiene la fuerza de ἐξαλείφω sin volverlo técnico ni suavizarlo.'
- source_word: ὑποκάτω τοῦ οὐρανοῦ / from under heaven
  english_pob_choice: from under heaven
  chosen_spanish: de debajo del cielo
  alternatives_spanish:
  - de bajo el cielo
  - de la tierra
  lexicon: ὑποκάτω; οὐρανός
  rationale: '''Debajo del cielo'' transmite la fórmula semítica de alcance total. ''De debajo del cielo'' sigue más de cerca la estructura del inglés auditado y preserva el registro bíblico.'
- source_word: ἔθνος μέγα καὶ θαυμαστὸν / a nation great and marvelous
  english_pob_choice: a nation great and marvelous
  chosen_spanish: una nación grande y admirable
  alternatives_spanish:
  - una nación grande y maravillosa
  - una nación grande y portentosa
  lexicon: ἔθνος; θαυμαστός
  rationale: '''Admirable'' conserva el valor de asombro/singularidad de θαυμαστός con una palabra natural en español bíblico. ''Maravillosa'' sería posible, pero en español actual puede sonar más afectiva que descriptiva.'
- source_word: καὶ μείζονα τούτου / and greater than this one
  english_pob_choice: and greater than this one
  chosen_spanish: y mayor que ésta
  alternatives_spanish:
  - y más grande que ésta
  - y superior a ésta
  lexicon: μείζων
  rationale: '''Mayor que ésta'' respeta el comparativo del original y del inglés auditado sin recargarlo. Se usa el demostrativo femenino ''ésta'' para concordar con ''nación''.'
theological_decisions:
- issue: Modo de presentar la cita divina dentro de 1 Clement
  english_pob_reading: the Lord said to him
  chosen_spanish_reading: Y el Señor le dijo
  alternative_spanish_readings:
  - Y Yahvé le dijo
  - Y el Señor Dios le dijo
  rationale: El texto de 1 Clement cita una escena bíblica conocida; el inglés POB no introduce un nombre divino explícito. En esta sección, 'el Señor' preserva la forma de cita usada en el audit trail sin añadir una identificación que el contexto inmediato no obliga a explicitar.
  doctrine_reference: Cita indirecta del discurso divino en la Escritura; prudencia en el nombramiento del referente cuando el testimonio textual es mediado.
- issue: Intensificación de la destrucción
  english_pob_reading: to destroy them
  chosen_spanish_reading: para destruirlo
  alternative_spanish_readings:
  - para destruirlos
  - para aniquilarlos
  rationale: La revisión auditada eliminó intensificadores añadidos en inglés. En español, 'destruirlo' sigue la línea austera del texto y evita agregar el matiz totalizante de 'aniquilar'. Se mantiene la singularidad gramatical por referencia colectiva al pueblo.
  doctrine_reference: Fidelidad al grado de intensidad del juicio en el texto fuente, sin amplificación interpretativa.
translation_notes:
  revision_awareness: 'Se siguió la versión revisada más reciente del audit trail en inglés, que removió los intensificadores añadidos (''utterly'', ''far'') para acercarse más al griego. La redacción española refleja esa misma cautela: conserva todas las cláusulas, mantiene el paralelismo y evita añadir dureza o distancia no presentes en la fuente.'
  spanish_consistency_notes:
  - Se usa 'Señor' de forma consistente para κύριος en esta cita indirecta.
  - Se conserva el registro bíblico de fórmulas como 'una y dos veces', 'de debajo del cielo' y 'terco de cerviz'.
  - Se mantiene 'destruir' sin intensificadores añadidos, en coherencia con la revisión auditada.
  - '''Nación'' se traduce con femenino en la comparación final para concordar con ''ésta''.'
