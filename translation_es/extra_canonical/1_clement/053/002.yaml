revisions:
- from: 'Porque cuando Moisés había subido al monte y había pasado cuarenta días y cuarenta noches en ayuno y humillación, Dios le dijo: «Moisés, Moisés, baja pronto de aquí, porque tu pueblo, que tú sacaste de la tierra de Egipto, ha obrado ilegalmente. Se han apartado enseguida del camino que les ordené; se han hecho imágenes fundidas para sí mismos».'
  to: 'Porque cuando Moisés subió al monte y pasó cuarenta días y cuarenta noches en ayuno y humillación, Dios le dijo: «Moisés, Moisés, baja pronto de aquí, porque tu pueblo, que sacaste de la tierra de Egipto, ha obrado sin ley. Rápidamente se apartaron del camino que les mandé; se han hecho imágenes fundidas para sí mismos».'
  rationale: 'Se ajusta el español para reflejar mejor el griego y el inglés POB: «ha obrado sin ley» en lugar de «ilegalmente» preserva la fuerza moral-pactual de ἀνόμως; «rápidamente» mejora la precisión de ταχέως; y el trasfondo narrativo gana naturalidad con «subió / pasó». No se requieren notas.'
