    timestamp: '2026-05-03T05:06:02Z'
    unchanged: false
    changes_summary: 'Minor English smoothing: changed “gone up onto the mountain” to the more natural “gone up the mountain.” All other wording retained for lexical accuracy and completeness.'
translation:
  language: es
  text: 'Porque cuando Moisés subió al monte y pasó cuarenta días y cuarenta noches en ayuno y humillación, Dios le dijo: «Moisés, Moisés, baja pronto de aquí, porque tu pueblo, que sacaste de la tierra de Egipto, ha obrado sin ley. Rápidamente se apartaron del camino que les mandé; se han hecho imágenes fundidas para sí mismos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναβὰς εἰς τὸ ὄρος
  english_pob_choice: had gone up the mountain
  chosen_spanish: había subido al monte
  alternatives_spanish:
  - había subido a la montaña
  - había ascendido al monte
  lexicon: ἀναβαίνω; ὄρος
  rationale: «Subido al monte» conserva el movimiento ascendente y el registro bíblico natural en español, sin calcar innecesariamente la sintaxis inglesa.
- source_word: νηστεύσας καὶ ταπεινωθείς
  english_pob_choice: in fasting and self-abasement
  chosen_spanish: en ayuno y humillación
  alternatives_spanish:
  - ayunando y humillándose
  - en ayuno y abatimiento
  lexicon: νηστεύω; ταπεινόω
  rationale: El griego expresa ayuno y humillación/abatimiento. «Humillación» mantiene la idea de auto-bajamiento sin introducir una paráfrasis más amplia que el texto.
- source_word: ἀνόμως ἔπραξαν
  english_pob_choice: have acted lawlessly
  chosen_spanish: ha obrado ilegalmente
  alternatives_spanish:
  - han obrado sin ley
  - han actuado sin ley
  lexicon: ἀνόμως; πράσσω
  rationale: Se conserva la fuerza de transgresión normativa del adverbio griego. «Ilegalmente» es una opción sobria en español para la idea de obrar contra la ley, aunque no elimina del todo la resonancia moral.
- source_word: παρετράπησαν ταχέως ἀπὸ τῆς ὁδοῦ
  english_pob_choice: They have quickly turned aside from the way
  chosen_spanish: Se han apartado enseguida del camino
  alternatives_spanish:
  - Se desviaron rápidamente del camino
  - Se han apartado rápidamente del camino
  lexicon: παρατρέπω; ὁδός
  rationale: «Apartarse del camino» reproduce bien la imagen de desviación moral y pactal. «Enseguida» refleja el sentido de rapidez del adverbio χωρίς forzar una duplicación adverbial.
- source_word: χωνευτοὺς ποιήσαντες
  english_pob_choice: they have made molten images
  chosen_spanish: se han hecho imágenes fundidas
  alternatives_spanish:
  - han hecho ídolos fundidos
  - se han hecho imágenes de fundición
  lexicon: χωνευτός; ποιέω
  rationale: «Imágenes fundidas» mantiene el sentido de metal derretido/moldeado y evita sustituirlo por «ídolos», que estrecharía el referente más de lo que el griego exige.
theological_decisions:
- issue: Referencia al pueblo de Israel sacado de Egipto y su rebelión
  english_pob_reading: your people, whom you brought out of the land of Egypt, have acted lawlessly
  chosen_spanish_reading: tu pueblo, que tú sacaste de la tierra de Egipto, ha obrado ilegalmente
  alternative_spanish_readings:
  - tu pueblo, que tú sacaste de la tierra de Egipto, ha obrado sin ley
  - tu pueblo, que tú sacaste de la tierra de Egipto, ha cometido transgresión
  rationale: Se conserva el reproche divino directo y la responsabilidad histórica de Israel, sin suavizar la acusación ni convertirla en una formulación más interpretativa.
  doctrine_reference: Éxodo 32:7-8; Hechos 7:40-41
- issue: Humillación como práctica ascética de Moisés
  english_pob_reading: fasting and self-abasement
  chosen_spanish_reading: ayuno y humillación
  alternative_spanish_readings:
  - ayuno y abatimiento
  - ayuno y auto-humillación
  rationale: 'La fórmula mantiene la doble dimensión ascética del texto: privación de alimento y acto de humillación. «Humillación» es suficiente y más idiomática que un compuesto explicativo.'
  doctrine_reference: Éxodo 34:28; Deuteronomio 9:9
- issue: Imágenes fundidas sin añadir un juicio terminológico extra
  english_pob_reading: molten images
  chosen_spanish_reading: imágenes fundidas
  alternative_spanish_readings:
  - imágenes de fundición
  - imágenes fundidas para sí
  rationale: Se preserva el tipo de objeto idolátrico sin imponer el término «ídolos» como traducción obligatoria, ya que el adjetivo griego destaca el material/proceso.
  doctrine_reference: Éxodo 32:4; Salmo 106:19
translation_notes:
  revision_awareness: La redacción inglesa revisada suavizó «gone up onto the mountain» a «gone up the mountain» por naturalidad, y la versión española sigue esa misma naturalidad con «subido al monte» sin añadir matices no presentes. No se reflejan cambios textuales adicionales en el español porque el contenido sustantivo del versículo se mantuvo estable en el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, sin introducir «SEÑOR».
  - Se usa «monte» en registro bíblico natural y coherente con el pasaje.
  - No se emplea «Cristo» ni terminología cristológica ajena al versículo.
  - «Images fundidas» conserva la concreción material del griego sin sobrerinterpretar el término.
  - La construcción verbal en perfecto compuesto mantiene el valor de acción consumada con relevancia presente, como en la traducción inglesa auditada.
