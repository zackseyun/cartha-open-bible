  text: Ἐπίστασθε γὰρ καὶ καλῶς ἐπίστασθε τὰς ἱερὰς γραφάς, ἀγαπητοί, καὶ ἐγκεκύφατε εἰς τὰ λόγια τοῦ θεοῦ. πρὸς ἀνάμνησιν οὖν ταῦτα γράφομεν. 2. Μωϋσέως γὰρ ἀναβάντος εἰς τὸ ὄρος καὶ ποιήσαντος τεσσαράκοντα ἡμέρας καὶ τεσσαράκοντα νύκτας ἐν νηστείᾳ καὶ ταπεινώσει, εἶπεν πρὸς αὐτὸν ὁ θεός· Μωϋσῆ Μωϋσῆ, κατάβηθι τὸ τάχος ἐντεῦθεν, ὅτι ἠνόμησεν ὁ λαός σου, οὓς ἐξήγαγες ἐκ γῆς Αἰγύπτου· παρεβήσαν ταχὺ ἐκ τῆς ὁδοῦ ἧς ἐνετείλω αὐτοῖς, ἐποίησαν ἑαυτοῖς χωνευτά. 3. καὶ εἶπεν κύριος πρὸς αὐτόν· Λελάληκα πρὸς σε ἅπαξ καὶ δὶς λέγων· Ἑώρακα τὸν λαὸν τοῦτον, καὶ ἰδοὺ ἐστιν σκληροτράχηλος· ἔασόν με ἐξολεθρεῦσαι αὐτούς, καὶ ἐξαλείψω τὸ ὄνομα αὐτῶν ὑποκάτωθεν τοῦ οὐρανοῦ, καὶ ποιήσω σε εἰς ἔθνος μέγα καὶ θαυμαστὸν καὶ πολὺ μᾶλλον ἢ τοῦτο. 4. καὶ εἶπεν Μωϋσῆς· Μηδαμῶς, κύριε· ἄφες τὴν ἁμαρτίαν τῷ λαῷ τούτῳ, ἢ κἂν ἐξάλειψόν με ἐκ βίβλου ζώντων. 5. ὦ μεγάλης ἀγάπης, ὦ τελειότητος ἀνυπερβλήτου. παρρησιάζεται θεράπων πρὸς κύριον, αἰτεῖται ἄφεσιν τῷ πλήθει, ἢ καὶ ἑαυτὸν ἐξαλειφθῆναι μετ’ αὐτῶν ἀξιοῖ.
