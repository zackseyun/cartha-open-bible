translation:
  language: es
  text: 'Porque ustedes conocen las Sagradas Escrituras —y muy bien las conocen, amados—, y se han inclinado atentamente[a] sobre las palabras de Dios. Por eso escribimos estas cosas como recordatorio.


    2. Pues cuando Moisés subió al monte y pasó cuarenta días y cuarenta noches en ayuno y humillación, Dios le dijo: «Moisés, Moisés, baja rápidamente de aquí, porque tu pueblo, a quienes sacaste de la tierra de Egipto, ha obrado sin ley; pronto se han apartado del camino que yo les mandé; se han hecho para sí imágenes fundidas».


    3. Y el Señor le dijo: «He hablado contigo una vez y dos veces, diciendo: “He visto a este pueblo, y he aquí que es de cerviz dura. Déjame[b] destruirlos por completo, y borraré su nombre de debajo del cielo; y te haré una nación grande y maravillosa, y mucho mayor que esta”».


    4. Y Moisés dijo: «De ningún modo, Señor. Perdona el pecado de este pueblo, o, si no, bórrame a mí del libro de los vivientes».


    5. ¡Oh gran amor! ¡Oh perfección incomparable! Un siervo habla con valentía ante su Señor, pide perdón por la multitud, o incluso ruega ser borrado con ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «se han inclinado / se han agachado sobre»; el verbo expresa la imagen física de inclinarse atentamente sobre un texto.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «déjame»; la frase introduce de forma abrupta el permiso para destruirlos, y en español conviene conservar esa brevedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίστασθε ... καὶ καλῶς ἐπίστασθε
  english_pob_choice: you know ... and know them well
  chosen_spanish: ustedes conocen ... y muy bien las conocen
  alternatives_spanish:
  - saben ... y las saben bien
  - conocen ... y las conocen bien
  lexicon: contextual Greek usage
  rationale: Mantiene la repetición enfática del griego sin volverla torpe en español, y conserva el tono de apelación directa a los destinatarios.
- source_word: ἱερὰς γραφάς
  english_pob_choice: the holy Scriptures
  chosen_spanish: las Sagradas Escrituras
  alternatives_spanish:
  - las santas Escrituras
  - las Escrituras santas
  lexicon: biblical register / established Spanish usage
  rationale: ‘Sagradas Escrituras’ comunica la solemnidad del sintagma y suena natural en español eclesial.
- source_word: ἐγκεκύφατε
  english_pob_choice: you have bent closely over
  chosen_spanish: han inclinado el oído[a]
  alternatives_spanish:
  - se han inclinado con atención
  - se han asomado con cuidado
  lexicon: LSJ
  rationale: El griego presenta una imagen física de inclinarse o asomarse atentamente. En español, ‘han inclinado el oído’ conserva la atención intensa y la imagen corporal sin sonar forzado; el pie explica que es una decisión figurativa de proximidad al texto.
- source_word: λόγια τοῦ θεοῦ
  english_pob_choice: the sayings of God
  chosen_spanish: las palabras de Dios
  alternatives_spanish:
  - los dichos de Dios
  - los oráculos de Dios
  lexicon: BDAG
  rationale: ‘Palabras de Dios’ es claro y fiel al contenido de λόγια como dichos/utterances divinos, sin introducir un tecnicismo excesivo.
- source_word: πρὸς ἀνάμνησιν
  english_pob_choice: for remembrance
  chosen_spanish: para recuerdo
  alternatives_spanish:
  - como recordatorio
  - para que recuerden
  lexicon: BDAG
  rationale: Conserva el valor nominal de la construcción y el tono exhortativo breve del texto. ‘Para recuerdo’ es conciso, aunque algo más formal que ‘como recordatorio’.
- source_word: ταπεινώσει
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - humildad
  - abatimiento
  lexicon: LSJ
  rationale: En el contexto de ayuno y preparación ascética, ‘humillación’ preserva el matiz de autoabatimiento concreto mejor que ‘humildad’.
- source_word: ἠνόμησεν
  english_pob_choice: have acted lawlessly
  chosen_spanish: ha actuado con ilegalidad
  alternatives_spanish:
  - ha obrado sin ley
  - ha quebrantado la ley
  lexicon: BDAG
  rationale: El verbo expresa transgresión contra el orden o la ley. ‘Actuado con ilegalidad’ reproduce la fuerza jurídica sin suavizarla a ‘pecado’, aunque suena menos idiomático que otras opciones.
- source_word: παρεβήσαν ταχὺ ἐκ τῆς ὁδοῦ
  english_pob_choice: They have quickly turned aside from the way
  chosen_spanish: se han apartado pronto del camino
  alternatives_spanish:
  - se desviaron rápidamente del camino
  - pronto se apartaron del camino
  lexicon: contextual Greek usage
  rationale: ‘Apartado pronto del camino’ mantiene el verbo de desviación y la rapidez del alejamiento, con castellano natural.
- source_word: χωνευτά
  english_pob_choice: molten images
  chosen_spanish: imágenes fundidas
  alternatives_spanish:
  - imágenes de fundición
  - ídolos fundidos
  lexicon: LSJ
  rationale: ‘Imágenes fundidas’ sigue de cerca el griego y conserva la referencia a objetos hechos por fundición sin añadir ‘ídolos’ donde el texto no lo dice explícitamente.
- source_word: ἔασόν με
  english_pob_choice: Leave me alone
  chosen_spanish: Déjame[b]
  alternatives_spanish:
  - Permíteme
  - Déjame solo
  lexicon: BDAG
  rationale: La forma breve preserva la fuerza imperativa dirigida por Dios a Moisés. En español, ‘Déjame’ puede funcionar como ‘déjame obrar / deja que siga’, y el pie aclara la referencia verbal implícita.
- source_word: ἐξολεθρεῦσαι
  english_pob_choice: utterly destroy
  chosen_spanish: destruirlos por completo
  alternatives_spanish:
  - aniquilarlos
  - exterminarlos
  lexicon: LSJ
  rationale: Conserva el énfasis intensivo del compuesto sin recurrir a una dicción más dura de la necesaria para el registro litúrgico.
- source_word: ἐξαλείψω
  english_pob_choice: blot out
  chosen_spanish: borraré
  alternatives_spanish:
  - extinguiré
  - eliminaré
  lexicon: BDAG
  rationale: ‘Borraré’ es el equivalente español más natural para el acto de suprimir un nombre, aunque el verbo también permite conservar el eco bíblico de ‘borrar del libro’.
- source_word: βίβλου ζώντων
  english_pob_choice: the book of the living
  chosen_spanish: el libro de los vivientes
  alternatives_spanish:
  - el libro de la vida
  - el libro de los vivos
  lexicon: LSJ
  rationale: Sigue de cerca la forma griega literal y mantiene la tensión con la expresión bíblica más familiar ‘libro de la vida’.
- source_word: τελειότητος ἀνυπερβλήτου
  english_pob_choice: unsurpassable perfection
  chosen_spanish: perfección incomparable
  alternatives_spanish:
  - perfección sin igual
  - perfección insuperable
  lexicon: LSJ
  rationale: ‘Incomparable’ recoge el valor de ‘no superable / no sobrepasable’ en español natural y culto.
- source_word: παρρησιάζεται
  english_pob_choice: speaks boldly
  chosen_spanish: habla con valentía
  alternatives_spanish:
  - habla con franqueza
  - se expresa con audacia
  lexicon: BDAG
  rationale: La idea central es la franqueza valiente ante una autoridad superior; ‘habla con valentía’ comunica bien ese matiz.
- source_word: θεράπων
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - servidor
  - ministro
  lexicon: BDAG
  rationale: En español ‘siervo’ conserva el contraste reverente entre servidor y Señor, y evita la dureza social de ‘esclavo’ que no es necesaria aquí.
- source_word: τῷ πλήθει
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - el pueblo
  - la muchedumbre
  lexicon: LSJ
  rationale: ‘Multitud’ mantiene el registro elevado y reproduce el alcance colectivo del término.
- source_word: ἀξιοῖ
  english_pob_choice: pleads
  chosen_spanish: ruega
  alternatives_spanish:
  - pide
  - suplica
  lexicon: BDAG
  rationale: En la conclusión, el verbo expresa petición intensa e intercesora. ‘Ruega’ es adecuado y natural en español devocional.
theological_decisions:
- issue: Relación entre λόγια τοῦ θεοῦ y ‘Sagradas Escrituras’
  english_pob_reading: the holy Scriptures ... the sayings of God
  chosen_spanish_reading: las Sagradas Escrituras ... las palabras de Dios
  alternative_spanish_readings:
  - las Santas Escrituras ... los oráculos de Dios
  - las Escrituras santas ... los dichos de Dios
  rationale: La traducción mantiene ambos miembros como expresiones paralelas pero no idénticas. ‘Palabras de Dios’ evita reducir λόγια a un tecnicismo, mientras que ‘Sagradas Escrituras’ conserva el peso canónico.
  doctrine_reference: Primacía del texto fuente y preservación de paralelismo retórico.
- issue: ἔασόν με en la cita divina
  english_pob_reading: Leave me alone
  chosen_spanish_reading: Déjame
  alternative_spanish_readings:
  - Déjame obrar
  - Permíteme
  rationale: El griego es una orden breve y enérgica. En español, la forma más breve conserva mejor la aspereza dramática; el contexto muestra que la frase introduce permiso para destruir, no una petición coloquial.
  doctrine_reference: Preservar tensión retórica sin domesticar el discurso divino.
- issue: βίβλου ζώντων
  english_pob_reading: the book of the living
  chosen_spanish_reading: el libro de los vivientes
  alternative_spanish_readings:
  - el libro de la vida
  rationale: Se conserva la literalidad del sintagma griego y su posible resonancia bíblica conocida, sin resolverla al equivalente tradicional más fijado.
  doctrine_reference: Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: 'Tomé en cuenta la pasada de revisión más reciente: incorporé la idea de ‘I commanded them’ en la cláusula del camino, mantuve el ‘Leave me alone’ de ἔασόν με en forma breve, y preservé la literalidad de ‘book of the living’ en español. También ajusté el final para expresar la petición intensa con ‘ruega’ en vez de un verbo más neutro.'
  spanish_consistency_notes:
  - Usé ‘Yahvé’ solo cuando aparece el nombre divino en la pauta general; en este pasaje, el texto griego usa θεός / κύριος y por eso traduje ‘Dios’ / ‘Señor’ según el contexto.
  - Mantuve ‘imágenes fundidas’ para χωνευτά, sin añadir ‘ídolos’, porque el griego no lo especifica aquí.
  - Elegí ‘siervo’ para θεράπων porque el contexto es de servicio reverente; no requería ‘esclavo’.
  - Conservé ‘multitud’ para τῷ πλήθει para sostener el registro elevado del cierre retórico.
  - La alternancia entre ‘Dios’ y ‘Señor’ sigue el griego θεός / κύριος y no intenta armonizar artificialmente los términos.
