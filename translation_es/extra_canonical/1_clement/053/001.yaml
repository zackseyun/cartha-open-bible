review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general y conserva varias decisiones clave del POB: «Sagradas Escrituras», «humillación», «imágenes fundidas», «déjame», «libro de los vivientes». Sin embargo, hay un desajuste importante en ἐγκεκύφατε: «han inclinado el oído» cambia la metáfora física de inclinarse sobre un texto por una imagen auditiva ajena al griego. También hay formulaciones españolas poco idiomáticas o semánticamente inadecuadas, sobre todo «ha actuado con ilegalidad» para ἠνόμησεν, que suena jurídico-moderno y poco natural en registro bíblico. El resto requiere pulido menor de estilo y puntuación.'
  spanish_quality_summary: 'La lectura es generalmente clara y digna, pero con algunos giros poco naturales: «inclinado el oído», «ha actuado con ilegalidad», y en menor medida «para recuerdo». Conviene mejorar fluidez sin perder literalidad: «se han inclinado atentamente sobre», «ha obrado sin ley», «para que lo recuerden» o «como recordatorio». También puede afinarse «habla con valentía ante su Señor» a una formulación más directa y solemne.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto; «Señor» aparece por κύριος y «Dios» por θεός, lo cual es correcto aquí. «Siervo» para θεράπων es una excepción contextual bien justificada. «Libro de los vivientes» preserva la decisión teológica documentada. La principal corrección léxica necesaria es reemplazar la imagen no fiel «inclinado el oído» por una que mantenga el gesto de inclinarse sobre las palabras de Dios.
  issues:
  - severity: high
    issue: «han inclinado el oído[a]» para ἐγκεκύφατε
    rationale: El griego describe inclinarse o agacharse sobre algo con atención, no escuchar con el oído. La imagen auditiva altera la metáfora del estudio cuidadoso de un texto.
  - severity: medium
    issue: «ha actuado con ilegalidad» para ἠνόμησεν
    rationale: Aunque intenta conservar el matiz legal, en español suena forzado y demasiado jurídico-moderno. «Ha obrado sin ley» preserva mejor el matiz de transgresión contra el orden divino.
  - severity: medium
    issue: «para recuerdo» suena poco idiomático en español actual
    rationale: Refleja el sustantivo griego, pero en español eclesial amplio resulta más natural «como recordatorio» o «para que lo recuerden» sin perder el valor exhortativo.
  - severity: low
    issue: Puntuación y fluidez en la primera oración
    rationale: Puede simplificarse la puntuación con rayas parentéticas estándar y evitar la coma tras la segunda raya para una lectura más natural.
  - severity: low
    issue: «habla con valentía ante su Señor» puede afinarse
    rationale: No es incorrecto, pero «habla con atrevimiento ante el Señor» o «habla con franqueza ante su Señor» refleja mejor παρρησιάζεται. Aun así, «con valentía» es aceptable.
