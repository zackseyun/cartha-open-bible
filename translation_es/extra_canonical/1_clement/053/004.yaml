translation:
  language: es
  text: 'Y dijo Moisés: «Si perdonas su pecado, perdona; pero si no, bórrame también a mí del libro de los vivientes».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄφες / ἄφες αὐτῶν τὴν ἁμαρτίαν
  english_pob_choice: forgive their sin / forgive
  chosen_spanish: perdonar su pecado / perdona
  alternatives_spanish:
  - perdonar su pecado
  - absolver su pecado
  - perdona
  lexicon: ἁμαρτία
  rationale: Conservo el sentido de perdón del pecado con un verbo natural en español. La repetición breve de «perdona» refleja la concisión del griego y la forma condicional del texto, sin añadir una exhortación extra.
- source_word: ἐξάλειψόν με
  english_pob_choice: blot me out
  chosen_spanish: bórrame
  alternatives_spanish:
  - elimíname
  - rae mi nombre
  lexicon: ἐξαλείφω
  rationale: «Borrar» reproduce bien la imagen de ser quitado o cancelado de un registro. «Eliminar» suena más técnico; «raer mi nombre» sería más interpretativo que el source warrant.
- source_word: βίβλου τῶν ζώντων
  english_pob_choice: book of the living
  chosen_spanish: libro de los vivientes
  alternatives_spanish:
  - libro de los vivos
  - libro de la vida
  lexicon: βίβλος
  rationale: Mantengo «de los vivientes» para conservar la literalidad y el matiz de un registro de los que viven. «Libro de la vida» sería una asociación bíblica fuerte, pero aquí el griego y la POB inglesa hablan de «the living», no de una fórmula ya fijada.
- source_word: καί
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  lexicon: καί
  rationale: «También» reproduce de forma directa la adición de εἰ μή y la revisión inglesa que añadió ‘also’ para completar el sentido. En español preserva esa inclusión sin sobrecargar la frase.
theological_decisions:
- issue: Forma condicional de la cita de Moisés
  english_pob_reading: If you will forgive their sin, forgive; but if not, blot me also out of the book of the living.
  chosen_spanish_reading: Si has de perdonar su pecado, perdona; pero si no, bórrame también a mí del libro de los vivientes.
  alternative_spanish_readings:
  - Perdona su pecado, o si no, bórrame también a mí del libro de los vivientes.
  - Si perdonas su pecado, perdona; si no, bórrame también a mí del libro de los vivientes.
  rationale: 'La revisión inglesa corrigió una expansión no sustentada y dejó una estructura condicional. En español conservo esa tensión: la primera cláusula queda como condición real o asumida, y la segunda mantiene el contraste amenazado, sin convertirlo en una petición menos precisa.'
  doctrine_reference: Éxodo 32:32; intercesión de Moisés
translation_notes:
  revision_awareness: The English POB was revised from an expanded, more interpretive rendering (“By no means, Lord. Forgive the sin of this people—or else blot me out from the book of the living.”) to a tighter conditional form. The Spanish draft follows the revised, source-proximate structure and preserves the added completeness of “also” with también.
  spanish_consistency_notes:
  - Usar «libro de los vivientes» de manera consistente para βίβλου τῶν ζώντων en este registro, evitando la habitualización prematura en «libro de la vida».
  - Mantener la voz imperativa breve «perdona» para reflejar la concisión del griego y la estructura de la cita.
  - Conservar «Moisés» y no introducir un vocativo («Señor») que la revisión inglesa eliminó por no estar sustentado en esta forma del texto.
