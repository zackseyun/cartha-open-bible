translation:
  language: es
  text: ¡Oh, gran amor! ¡Oh, perfección incomparable! Un esclavo[a] habla con osadía a su Señor, pide perdón por la multitud, o incluso pide ser borrado con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Esclavo" mantiene la fuerza de δοῦλος; "siervo" sería una alternativa más suavizada, pero menos precisa lexicalmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: δοῦλος
  rationale: En el griego, δοῦλος conserva fuerza de dependencia y pertenencia; el español "esclavo" reproduce mejor esa carga que "siervo". Aunque el inglés POB traduce "servant" en una formulación devocional, el equivalente español más fiel al valor lexical es "esclavo".
- source_word: παρρησιάζεται
  english_pob_choice: speaks boldly
  chosen_spanish: habla con osadía
  alternatives_spanish:
  - habla con confianza
  - habla libremente
  lexicon: παρρησιάζομαι
  rationale: La idea central es hablar con franqueza y audacia ante una autoridad superior. "Habla con osadía" conserva la audacia sin añadir solemnidad innecesaria.
- source_word: δεσπότης
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Soberano
  lexicon: δεσπότης
  rationale: Aquí el término expresa la relación entre esclavo y amo. "Señor" es la forma más natural en español y mantiene la reverencia del contraste, sin perder la idea de autoridad.
- source_word: πλῆθος
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - la muchedumbre
  - la multitud de ellos
  lexicon: πλῆθος
  rationale: La traducción directa "la multitud" es natural en español y conserva el sentido colectivo del original.
- source_word: ἐξαλειφθῆναι
  english_pob_choice: to be blotted out
  chosen_spanish: ser borrado
  alternatives_spanish:
  - ser borrado del libro
  - ser eliminado
  lexicon: ἐξαλείφω
  rationale: El verbo griego significa borrar o limpiar, y aquí funciona figuradamente para desaparición/aniquilación junto con otros. "Ser borrado" preserva la metáfora sin introducir un objeto no explícito en el texto conservado.
theological_decisions:
- issue: Tono de admiración ante la audacia del esclavo
  english_pob_reading: O great love! O unsurpassable perfection! A servant speaks boldly to his Lord...
  chosen_spanish_reading: ¡Oh, gran amor! ¡Oh, perfección incomparable! Un esclavo habla con osadía a su Señor...
  alternative_spanish_readings:
  - ¡Oh, grande amor! ¡Oh, perfección inigualable!
  - Un siervo habla valerosamente a su Señor...
  rationale: Se mantiene el tono de asombro y elogio del original, sin suavizar la tensión retórica entre la condición del esclavo y su audacia ante el Señor.
  doctrine_reference: Retórica de admiración y humildad en la tradición parenética cristiana primitiva
- issue: Peticiones extremas por la multitud
  english_pob_reading: asks forgiveness for the multitude, or even asks to be blotted out with them
  chosen_spanish_reading: pide perdón por la multitud, o incluso pide ser borrado con ellos
  alternative_spanish_readings:
  - pide perdón por la multitud, o incluso ser borrado con ellos
  - pide perdón por muchos, o aun ser borrado con ellos
  rationale: 'La formulación conserva la posibilidad extrema expresada por el original: interceder por otros y hasta aceptar la propia exclusión con ellos. "Perdón" traduce el valor de petición de gracia/remisión que el pasaje sugiere en contexto.'
  doctrine_reference: Intercesión vicaria y lenguaje de solidaridad extrema en la literatura cristiana primitiva
translation_notes:
  revision_awareness: La revisión más reciente marcó el pasaje como sin cambios necesarios; por ello, el español se ajusta directamente al texto griego y al tenor estable del audit trail inglés, sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se conserva "Yahvé" como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '"Señor" se usa aquí por el valor relacional de δεσπότης, no como sustituto litúrgico del nombre divino.'
  - Se mantiene la distinción entre "amor", "perfección", "osadía" y "borrado" para no diluir la intensidad retórica del pasaje.
