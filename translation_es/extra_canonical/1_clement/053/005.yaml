review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura retórica del griego y sigue de cerca el sentido del inglés POB: exclamaciones admirativas, el contraste entre la condición servil y la audacia ante el superior, la petición de perdón por la multitud y la disposición a ser borrado con ellos. Sin embargo, hay un ajuste léxico importante: para δεσπότης, en esta relación con δοῦλος, ''amo'' expresa mejor el vínculo amo-esclavo que ''Señor'', que en español puede sonar demasiado teológico o litúrgico y diluir el contraste social concreto del original.'
  spanish_quality_summary: El español es claro y digno, pero 'habla con osadía a su Señor' suena algo rígido y menos natural que 'se atreve a hablar con franqueza ante su amo'. También conviene armonizar el sujeto con el inglés POB y con la fuerza retórica del pasaje sin sobrecargarlo con una nota innecesaria sobre 'esclavo'.
  glossary_alignment: La elección de 'esclavo' para δοῦλος sí coincide con las pautas del proyecto cuando se desea preservar la fuerza lexical. No hay términos del glosario mayor que requieran corrección. La excepción recomendada es δεσπότης -> 'amo' en este contexto particular, por precisión semántica relacional.
  issues:
  - severity: medium
    issue: δεσπότης traducido como 'Señor'
    rationale: Aunque 'Señor' puede ser posible, aquí el contraste con δοῦλος pide una relación social amo-esclavo más explícita. 'Amo' conserva mejor el sentido de δεσπότης y evita una lectura excesivamente litúrgica.
  - severity: low
    issue: παρρησιάζεται como 'habla con osadía'
    rationale: Es comprensible, pero en español suena algo tieso. 'Se atreve a hablar con franqueza' o 'habla con franqueza' transmite mejor la audacia verbal del verbo.
  - severity: low
    issue: Nota al pie sobre 'esclavo' innecesaria
    rationale: La decisión lexical es defendible directamente en el texto y la nota no preserva una alternativa del original ni resuelve una ambigüedad nueva en español. Puede omitirse para una lectura más limpia.
  revised_spanish_text: ¡Oh, gran amor! ¡Oh, perfección incomparable! Un esclavo se atreve a hablar con franqueza ante su amo, pide perdón por la multitud, o incluso pide ser borrado con ellos.
  revision_rationale: Se revisa 'Señor' a 'amo' para reflejar mejor δεσπότης en contraste con δοῦλος, se mejora la naturalidad de παρρησιάζεται con 'se atreve a hablar con franqueza', y se elimina una nota al pie no necesaria.
