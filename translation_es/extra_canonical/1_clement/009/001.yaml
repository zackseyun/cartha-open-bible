translation:
  language: es
  text: 'Por tanto, obedezcamos su designio majestuoso y glorioso; y, haciéndonos suplicantes[a] de su misericordia y bondad, postrémonos delante de él y volvámonos a sus compasiones, dejando atrás la labor infructuosa, así como la contienda y los celos que conducen a la muerte.


    Fijemos la mirada en los que ministraron[b] perfectamente a su gloria majestuosa.


    Tomemos a Enoc, que, habiendo sido hallado justo en obediencia, fue trasladado, y no se encontró su muerte.


    Noé, habiendo sido hallado fiel, por su ministerio proclamó regeneración al mundo, y por medio de él el Soberano salvó a los seres vivientes que entraron en el arca por parejas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Suplicantes» conserva el matiz reverente y formal del griego ἱκέται, mejor que una palabra más plana como «peticionarios».
    reason: lexical_alternative
  - marker: b
    text: «Ministraron» reproduce el carácter de λειτουργήσαντας, con resonancia de servicio solemne o cultual que se perdería en «sirvieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλήσει
  english_pob_choice: purpose
  chosen_spanish: designio
  alternatives_spanish:
  - propósito
  - plan
  - voluntad
  lexicon: LSJ
  rationale: βουλή puede expresar consejo, resolución o propósito. «Designio» conserva la idea de intención deliberada y da un tono digno sin sonar forzado en español.
- source_word: ἱκέται
  english_pob_choice: suppliants
  chosen_spanish: suplicantes
  alternatives_spanish:
  - peticionarios
  - mendicantes
  lexicon: LSJ
  rationale: El término describe a quienes imploran favor desde una postura de dependencia reverente. «Suplicantes» mantiene ese valor elevado y funciona de modo natural en español.
- source_word: προσπέσωμεν
  english_pob_choice: let us fall before him
  chosen_spanish: postrémonos delante de él
  alternatives_spanish:
  - caigamos delante de él
  - postrémonos ante él
  lexicon: LSJ
  rationale: El griego implica caer delante de alguien en ruego. «Postrémonos» conserva la fuerza corporal y reverencial con buena inteligibilidad en español.
- source_word: ἐπιστρέψωμεν ἐπὶ τοὺς οἰκτιρμοὺς αὐτοῦ
  english_pob_choice: turn to his compassions
  chosen_spanish: volvámonos a sus compasiones
  alternatives_spanish:
  - volvamos a sus misericordias
  - volvámonos a su piedad
  lexicon: BDAG
  rationale: οἰκτιρμοί es plural y afectivo; «compasiones» preserva ese plural y el matiz concreto mejor que una abstracción como «misericordia» en singular.
- source_word: ματαιοπονίαν
  english_pob_choice: fruitless toil
  chosen_spanish: labor infructuosa
  alternatives_spanish:
  - vano trabajo
  - futilidad
  lexicon: LSJ
  rationale: El compuesto alude a esfuerzo que no produce resultado. «Labor infructuosa» conserva la idea de trabajo y su falta de fruto, en un español sobrio.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - celo
  lexicon: BDAG
  rationale: En este contexto moral, el sentido negativo es el pertinente. «Celos» transmite bien la advertencia y evita la ambigüedad de «celo».
- source_word: τελείως λειτουργήσαντας
  english_pob_choice: ministered perfectly
  chosen_spanish: ministraron perfectamente
  alternatives_spanish:
  - sirvieron plenamente
  - realizaron su servicio por completo
  lexicon: LSJ
  rationale: λειτουργέω conserva un matiz de servicio con resonancia cultual o pública. «Ministrar» mantiene esa textura eclesial; «perfectamente» refleja τελείως sin ampliar el texto.
- source_word: δόξῃ
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: BDAG
  rationale: «Gloria» es el equivalente teológico normal y conserva el tono elevado del pasaje.
- source_word: μετετέθη
  english_pob_choice: was transferred
  chosen_spanish: fue trasladado
  alternatives_spanish:
  - fue tomado
  - fue removido
  lexicon: BDAG
  rationale: El verbo significa trasladar o mover de lugar/estado. «Fue trasladado» sigue de cerca el griego y evita especificar más de lo que el texto dice.
- source_word: οὐχ εὑρέθη αὐτοῦ θάνατος
  english_pob_choice: his death was not found
  chosen_spanish: no se encontró su muerte
  alternatives_spanish:
  - no se halló su muerte
  - no experimentó la muerte
  lexicon: LSJ
  rationale: La formulación griega es inusual y conviene conservar su extrañeza. «No se encontró su muerte» respeta la cadencia y no resuelve interpretativamente la frase.
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - leal
  - confiable
  lexicon: BDAG
  rationale: Para Noé, «fiel» expresa confiabilidad obediente dentro de un marco de alianza sin limitarlo a una mera disposición interior.
- source_word: λειτουργίας
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  - servicio sagrado
  lexicon: BDAG
  rationale: El sustantivo comparte con el verbo anterior un campo de servicio con posible resonancia cultual. «Ministerio» mantiene esa continuidad léxica en español.
- source_word: παλιγγενεσίαν
  english_pob_choice: regeneration
  chosen_spanish: regeneración
  alternatives_spanish:
  - renovación
  - nuevo nacimiento
  - rehacimiento
  lexicon: BDAG
  rationale: El término es teológicamente denso y puede apuntar a renovación del mundo tras el juicio. «Regeneración» preserva esa carga y deja abierta la precisión del alcance.
- source_word: δεσπότης
  english_pob_choice: the Master
  chosen_spanish: el Dueño
  alternatives_spanish:
  - el Maestro
  - el Soberano
  lexicon: BDAG
  rationale: δεσπότης no es simplemente κύριος; denota autoridad plena y posesiva. «Dueño» conserva esa diferencia léxica sin confundirlo con el título litúrgico «Señor».
- source_word: ἐν ὁμοίᾳ ζῷα
  english_pob_choice: the living creatures that entered the ark in harmony, two by two
  chosen_spanish: los seres vivientes que entraron en el arca en concordia
  alternatives_spanish:
  - los animales que entraron en parejas
  - las criaturas que entraron de modo semejante
  lexicon: LSJ
  rationale: La expresión es comprimida y alude a la entrada ordenada de los animales. «En concordia» conserva la idea de acuerdo/igualdad subyacente a ὁμοίᾳ sin introducir detalles no presentes en el griego.
theological_decisions:
- issue: Sentido de παλιγγενεσίαν κόσμῳ ἐκήρυξεν en la cláusula de Noé
  english_pob_reading: Noah proclaimed regeneration to the world
  chosen_spanish_reading: Noé proclamó regeneración al mundo
  alternative_spanish_readings:
  - Noé proclamó un nuevo comienzo al mundo
  - Noé anunció renovación para el mundo
  rationale: El griego usa παλιγγενεσία, término teológicamente cargado. Mantener «regeneración» preserva la transparencia léxica y deja visible la tensión entre renovación cósmica, nuevo inicio tras el juicio, o un motivo teológico más amplio.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla demasiado pronto.
- issue: Alcance de μετετέθη aplicado a Enoc
  english_pob_reading: was transferred
  chosen_spanish_reading: fue trasladado
  alternative_spanish_readings:
  - fue llevado
  - fue tomado
  rationale: El texto alude a Enoc sin explicitar el modo. Una traducción no interpretativa conserva mejor la reserva del original y evita importar una tradición explicativa concreta.
  doctrine_reference: Primacía del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La redacción sigue el texto griego normalizado de Funk 1901 y está alineada con la solución inglesa POB de equivalencia óptima; no hubo revisiones posteriores en el paquete, y el control cruzado reportó alta concordancia con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando corresponda, pero este pasaje no contiene el tetragrámaton ni un equivalente directo.
  - Se conserva la distinción entre «ministerio/ministraron» y vocabulario general de servicio para reflejar λειτουργ- con su posible resonancia cultual.
  - «Regeneración» y «trasladado» se dejan deliberadamente abiertos para respetar la tensión interpretativa del original griego.
