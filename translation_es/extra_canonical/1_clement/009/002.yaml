base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/009/002.yaml
  text: Let us fix our gaze on those who served perfectly in his majestic glory.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:39Z'
    unchanged: false
    changes_summary: Changed 'ministered' to 'served' for more natural rendering of λειτουργήσαντας, and revised 'to his majestic glory' to 'in his majestic glory' to better reflect the dative construction without awkwardness.
translation:
  language: es
  text: Fijemos la mirada en quienes sirvieron perfectamente en su majestuosa gloria.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀτενίσωμεν
  english_pob_choice: Let us fix our gaze
  chosen_spanish: Fijemos la mirada
  alternatives_spanish:
  - Fijemos nuestros ojos
  - Miremos fijamente
  lexicon: ἀτενίζω
  rationale: El verbo griego expresa mirar con atención sostenida; en español, «fijar la mirada» conserva la fuerza exhortativa y la dirección del acto sin sonar forzado.
- source_word: τοὺς τελείως λειτουργήσαντας
  english_pob_choice: those who served perfectly
  chosen_spanish: quienes sirvieron perfectamente
  alternatives_spanish:
  - quienes ministraron perfectamente
  - quienes desempeñaron perfectamente su servicio
  lexicon: λειτουργέω
  rationale: Se eligió «sirvieron» porque el repaso inglés ya decidió evitar «ministered» por ser menos natural; en español, «ministrar» puede sonar eclesiástico y menos directo. «Perfectamente» conserva el adverbio τελείως sin añadir un sentido moralizante que el contexto no exige.
- source_word: τῇ μεγαλοπρεπεῖ δόξῃ αὐτοῦ
  english_pob_choice: in his majestic glory
  chosen_spanish: en su gloriosa majestad
  alternatives_spanish:
  - en su majestuosa gloria
  - en su majestad gloriosa
  lexicon: δόξα / μεγαλοπρεπής
  rationale: El inglés revisado usa «in his majestic glory» para reflejar mejor el dativo; en español, «en su gloriosa majestad» mantiene la construcción locativa y concentra la idea de gloria regia y esplendor sin duplicar torpemente adjetivos.
theological_decisions:
- issue: Referencia de la gloria y del poseedor implícito
  english_pob_reading: his majestic glory
  chosen_spanish_reading: su gloriosa majestad
  alternative_spanish_readings:
  - la gloriosa majestad de él
  - su majestuosa gloria
  rationale: El pronombre posesivo se conserva como referencia a Dios en el contexto de 1 Clemente, pero sin introducir una mayúscula interpretativa que el griego no marca. «Majestad» y «gloria» se mantienen unidos para reflejar el tono doxológico del pasaje.
  doctrine_reference: Doxología / gloria divina
translation_notes:
  revision_awareness: 'El texto inglés base fue revisado de «ministered» a «served» y de «to his majestic glory» a «in his majestic glory» para una correspondencia más natural con el griego. La propuesta española sigue esa revisión: evita «ministraron» y usa una construcción locativa con «en», sin perder la carga reverencial del dativo.'
  spanish_consistency_notes:
  - Se mantiene un registro solemne y eclesial, pero con español natural.
  - No se introduce terminología doctrinal ajena al verso.
  - «Sirvieron» conserva la elección auditada del inglés frente a «ministraron».
  - «Fijemos la mirada» reproduce la exhortación inclusiva del aoristo exhortativo griego de manera idiomática.
