translation:
  language: es
  text: Tomemos a Enoc[a], el cual, hallado justo en obediencia, fue llevado arriba[b], y no se halló su muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue trasladado».'
    reason: alternative_reading_preserved_from_english_audit
  - marker: b
    text: 'O: «fue trasladado».'
    reason: μετετέθη también puede traducirse literalmente «fue trasladado», pero aquí se expresa como remoción/asunción de Enoc, en línea con Génesis 5:24 y Hebreos 11:5.
lexical_decisions:
- source_word: Ἐνώχ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Enoch
  lexicon: nombre propio
  rationale: El nombre bíblico se adapta a la forma usual en español bíblico, «Enoc», sin alterar la referencia al personaje del Génesis y Hebreos.
- source_word: ἐν ὑπακοῇ
  english_pob_choice: in obedience
  chosen_spanish: en obediencia
  alternatives_spanish:
  - obedeciendo
  - con obediencia
  lexicon: ὑπακοή
  rationale: La preposición y el sustantivo conservan la idea de una esfera o condición de obediencia; «en obediencia» es natural en español y mantiene la fuerza del original.
- source_word: δικαίως εὑρεθεὶς
  english_pob_choice: having been found righteous
  chosen_spanish: habiendo sido hallado justo
  alternatives_spanish:
  - hallado recto
  - encontrado justo
  lexicon: δίκαιος / εὑρίσκω
  rationale: «Justo» preserva el valor moral-forense de δικαίως, mientras que «hallado» refleja el participio pasivo de εὑρεθεὶς sin añadir interpretación.
- source_word: μετετέθη
  english_pob_choice: was taken up
  chosen_spanish: fue tomado
  alternatives_spanish:
  - fue llevado
  - fue trasladado
  - fue tomado arriba
  lexicon: μετατίθημι
  rationale: El contexto de Enoc en la tradición de Génesis 5:24 y Hebreos 11:5 favorece una remoción sobrenatural. «Fue tomado» deja abierta esa carga bíblica; la nota aclara la alternativa de «trasladado».
- source_word: οὐχ εὑρέθη αὐτοῦ θάνατος
  english_pob_choice: his death was not found
  chosen_spanish: no se halló su muerte
  alternatives_spanish:
  - no fue hallada su muerte
  - no se encontró su muerte
  - no se halló que muriera
  lexicon: εὑρίσκω + θάνατος
  rationale: La frase mantiene el giro semítico-griego del original. «No se halló su muerte» reproduce la rareza del enunciado sin suavizarlo en exceso; la tradición interpretativa entiende que no experimentó la muerte.
theological_decisions:
- issue: La relación entre μετετέθη y la tradición de Enoc como arrebatado/trasladado
  english_pob_reading: 'was taken up, with a footnote: Or ''was transferred''.'
  chosen_spanish_reading: 'fue tomado, con nota: «O: “fue trasladado”».'
  alternative_spanish_readings:
  - fue trasladado
  - fue arrebatado
  rationale: El ajuste inglés abandona «transferred» por su connotación burocrática moderna y prefiere «taken up» por el trasfondo de Génesis 5:24 y Hebreos 11:5. En español, «fue tomado» preserva la amplitud del evento sin imponer un término técnico único; la nota ofrece «trasladado» como alternativa literal y tradicional.
  doctrine_reference: Génesis 5:24; Hebreos 11:5
translation_notes:
  revision_awareness: El audit trail muestra una revisión de alto acuerdo que cambió la antigua propuesta «was transferred» por «was taken up» para reflejar mejor el sentido de μετετέθη en la tradición de Enoc. La redacción española sigue esa decisión y evita tanto el tecnicismo administrativo como una paráfrasis que borre la referencia bíblica.
  spanish_consistency_notes:
  - Se conserva la estructura participial del original para mantener el tono exhortativo y escritural del pasaje.
  - «Justo» se usa con valor ético-forense, no como mero sinónimo de «recto» estilístico.
  - La nota al pie marca la alternativa textual/lexical relevante sin introducir interpretaciones no sustentadas.
