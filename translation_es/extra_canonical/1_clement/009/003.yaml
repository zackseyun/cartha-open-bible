revisions:
- from: Tomemos a Enoc[a], quien, habiendo sido hallado justo en obediencia, fue tomado, y no se halló su muerte.
  to: Tomemos a Enoc[a], el cual, hallado justo en obediencia, fue llevado arriba[b], y no se halló su muerte.
  rationale: Se revisa principalmente μετετέθη para reflejar la decisión auditada «was taken up» con una expresión española que comunique remoción sobrenatural. Se aligera además la sintaxis para mejorar legibilidad sin perder fidelidad. La nota alternativa sobre «trasladado» se conserva vinculada al verbo pertinente; se elimina su anclaje indebido en «Enoc».
