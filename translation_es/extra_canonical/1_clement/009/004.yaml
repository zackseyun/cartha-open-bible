id: 1CLEM.9.4
reference: 1 Clement 9:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: Νῶε πιστὸς εὑρεθεὶς διὰ τῆς λειτουργίας αὐτοῦ παλιγγενεσίαν κόσμῳ ἐκήρυξεν, καὶ διέσωσεν δι’ αὐτοῦ ὁ δεσπότης τὰ εἰσελθόντα ἐν ὁμοίᾳ ζῷα εἰς τὴν κιβωτόν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/009/004.yaml
  text: Noah[a], having been found faithful, through his ministry proclaimed regeneration to the world, and through him the Master preserved the animals that entered the ark in pairs.
  footnotes:
  - marker: a
    text: Or 'in harmony, two by two'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:40Z'
    unchanged: false
    changes_summary: Changed 'saved the living creatures' to 'preserved the animals' for more natural and contextually precise wording, and changed 'in harmony' to 'in pairs' to reflect ἐν ὁμοίᾳ more accurately in the ark-entry context.
translation:
  language: es
  text: Noé, hallado fiel, por medio de su ministerio proclamó regeneración al mundo, y por medio de él el Soberano preservó a los animales que entraron en el arca en concordia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «en pares»; la frase griega es discutida, y en este contexto puede entenderse como una disposición armoniosa o emparejada de los animales.
    reason: alternative_reading
lexical_decisions:
- source_word: Νῶε
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: nombre propio
  rationale: El nombre bíblico estándar en español es «Noé»; conserva la referencia inequívoca al patriarca.
- source_word: πιστὸς εὑρεθεὶς
  english_pob_choice: having been found faithful
  chosen_spanish: hallado fiel
  alternatives_spanish:
  - encontrado fiel
  - siendo hallado fiel
  lexicon: πίστις / πιστός
  rationale: «Hallado fiel» reproduce la pasiva del participio y mantiene la valoración de fidelidad sin añadir matices no presentes en el griego.
- source_word: διὰ τῆς λειτουργίας αὐτοῦ
  english_pob_choice: through his ministry
  chosen_spanish: por medio de su ministerio
  alternatives_spanish:
  - mediante su servicio
  - a través de su ministerio
  lexicon: λειτουργία
  rationale: «Ministerio» es el equivalente más natural en español para λειτουργία en este contexto eclesial/servicial; «por medio de» conserva la mediación expresada por διά.
- source_word: παλιγγενεσίαν
  english_pob_choice: regeneration
  chosen_spanish: regeneración
  alternatives_spanish:
  - nuevo nacimiento
  - renovación
  lexicon: παλιγγενεσία
  rationale: Se conserva el término técnico «regeneración», que el griego y la tradición cristiana emplean para esta idea; evita diluir el concepto con una paráfrasis.
- source_word: κόσμῳ
  english_pob_choice: to the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - para el mundo
  - al universo
  lexicon: κόσμος
  rationale: «Al mundo» sigue de cerca el dativo y es suficientemente amplio para el alcance universal de la proclamación.
- source_word: ὁ δεσπότης
  english_pob_choice: the Master
  chosen_spanish: el Dueño
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: δεσπότης
  rationale: Se mantiene «el Dueño» porque el POB en inglés eligió «Master» para distinguir δεσπότης de κύριος; «Señor» borraría esa distinción y podría sobrecargar el título con resonancias distintas.
- source_word: διέσωσεν
  english_pob_choice: preserved
  chosen_spanish: preservó
  alternatives_spanish:
  - salvó
  - guardó
  lexicon: διασῴζω
  rationale: «Preservó» refleja mejor la acción de conservar con vida/proteger en el contexto del arca y coincide con la revisión inglesa más reciente.
- source_word: τὰ εἰσελθόντα ... ζῷα
  english_pob_choice: the animals that entered the ark
  chosen_spanish: a los animales que entraron en el arca
  alternatives_spanish:
  - a los seres vivientes que entraron en el arca
  - a los animales que habían entrado en el arca
  lexicon: ζῷα
  rationale: «Animales» traduce de forma natural ζῷα aquí, donde el contexto del arca identifica claramente a las criaturas vivientes; la preposición y el relativo mantienen la relación de entrada.
- source_word: ἐν ὁμοίᾳ
  english_pob_choice: in pairs
  chosen_spanish: en pares
  alternatives_spanish:
  - en pareja
  - en concordia
  lexicon: ὁμοία / ὁμοίως
  rationale: La revisión inglesa reciente optó por «in pairs» para reflejar la indicación de la entrada agrupada de los animales; en español «en pares» conserva esa lectura sin introducir «dos y dos» como dato explícito no presente en este versículo.
- source_word: κιβωτόν
  english_pob_choice: ark
  chosen_spanish: arca
  alternatives_spanish:
  - arca de Noé
  - barca
  lexicon: κιβωτός
  rationale: «Arca» es el equivalente bíblico habitual y exacto para κιβωτός; evita la imagen errónea de una barca ordinaria.
theological_decisions:
- issue: Título δεσπότης y distinción respecto de κύριος
  english_pob_reading: the Master
  chosen_spanish_reading: el Dueño
  alternative_spanish_readings:
  - el Señor
  - el Soberano
  rationale: La fuente griega usa δεσπότης, no κύριος. Traducirlo como «el Dueño» preserva la fuerza de dominio/propiedad y evita confundirlo con el uso más cargado de «Señor» para κύριος o para el nombre divino.
  doctrine_reference: Distinción léxica entre δεσπότης y κύριος; consistencia terminológica POB
- issue: παλιγγενεσία como anuncio de renovación universal
  english_pob_reading: proclaimed regeneration to the world
  chosen_spanish_reading: proclamó regeneración al mundo
  alternative_spanish_readings:
  - proclamó un nuevo nacimiento al mundo
  - anunció renovación al mundo
  rationale: Se conserva «regeneración» para no atenuar el sentido teológico fuerte del término. En este contexto no se reduce a simple reforma moral, sino a una renovación de alcance mundial.
  doctrine_reference: Paliggenesia / renovación escatológica o salvífica en uso cristiano temprano
- issue: Preservación de los animales en el arca
  english_pob_reading: preserved the animals that entered the ark in pairs
  chosen_spanish_reading: preservó a los animales que entraron en el arca en pares
  alternative_spanish_readings:
  - salvó a los animales que entraron en el arca en pares
  - guardó a los animales que entraron en el arca
  rationale: «Preservó» mantiene la idea de conservación providencial y evita añadir un matiz soteriológico que podría sonar excesivo para los animales; «en pares» sigue la revisión textual inglesa y no introduce una formulación ausente en el griego.
  doctrine_reference: Providencia divina en el relato del diluvio; precisión textual sobre ἐν ὁμοίᾳ
translation_notes:
  revision_awareness: La versión inglesa auditada fue corregida desde una lectura que añadía «in harmony» y luego pasó a «in pairs» para ajustarse al griego ἐν ὁμοίᾳ en el contexto de la entrada al arca. La redacción española sigue la última revisión inglesa en «en pares» y mantiene «preservó» como opción más natural y precisa que «salvó».
  spanish_consistency_notes:
  - Se mantiene «Noé» como forma española estándar del nombre propio.
  - Se preserva la distinción POB entre δεσπότης («el Dueño») y κύριος («el Señor»).
  - «Regeneración» se conserva como término técnico y no se sustituye por una paráfrasis.
  - «En pares» refleja la revisión textual más reciente y evita añadir «dos por dos» sin base explícita en este versículo.
