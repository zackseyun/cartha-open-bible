source:
  edition: Funk 1901 (normalized OCR)
  text: δέξασθε τὴν συμβουλὴν ἡμῶν, καὶ ἔσται ἀμεταμέλητα ὑμῖν. ζῇ γὰρ ὁ θεὸς καὶ ζῇ ὁ κύριος Ἰησοῦς Χριστὸς καὶ τὸ πνεῦμα τὸ ἅγιον, ἥ τε πίστις καὶ ἡ ἐλπὶς τῶν ἐκλεκτῶν, ὅτι ὁ ποιήσας ἐν ταπεινοφροσύνῃ μετ᾽ ἐκτενοῦς ἐπιεικείας ἀμεταμελήτως τὰ ὑπὸ τοῦ θεοῦ δεδομένα δικαιώματα καὶ προστάγματα· οὕτως ἐντεταγμένος καὶ ἐλλόγιμος ἔσται εἰς τὸν ἀριθμὸν τῶν σῳζομένων διὰ Ἰησοῦ Χριστοῦ, δι᾽ οὗ ἐστὶν αὐτῷ ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/058/002.yaml
  text: Accept our counsel[a], and you will have no cause for regret. For as God lives, and the Lord Jesus Messiah lives, and the Holy Spirit, and the faith and hope of the elect, so surely the one who in humility, with earnest gentleness, without regret carries out the righteous requirements and commandments given by God, this one will be enrolled and counted among the number of those being saved through Jesus Messiah, through whom be the glory to him forever and ever. Amen.
  footnotes:
  - marker: a
    text: Or 'who are the faith and the hope'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:19Z'
    unchanged: false
    changes_summary: 'Replaced ''Messiah'' with ''Christ'' for consistency with the Greek proper name/title in this verse and adjusted ''the faith and the hope'' to ''the faith and hope'' for more natural English while preserving the sense. Also changed ''is the glory'' to ''be the glory'' for more natural doxological English. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Reciban nuestro consejo[a], y no tendrán de qué lamentarse. Porque vive Dios, y vive el Señor Jesús Mesías, y vive el Espíritu Santo, y viven la fe y la esperanza de los elegidos, así también el que, con humildad y con sincera gentileza, sin volverse atrás con pesar, cumple los justos preceptos y mandamientos dados por Dios, este será inscrito y contado entre el número de los que se están salvando por medio de Jesús Mesías, por medio de quien sea la gloria para él por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Acepten nuestro consejo». El griego admite una exhortación directa en plural; se eligió «Reciban» por su tono sobrio y natural.
    reason: alternative_reading
lexical_decisions:
- source_word: δέξασθε τὴν συμβουλὴν ἡμῶν
  english_pob_choice: Accept our counsel
  chosen_spanish: Reciban nuestro consejo
  alternatives_spanish:
  - Acepten nuestro consejo
  - Reciban nuestra recomendación
  lexicon: δέχομαι; συμβουλή
  rationale: «Reciban» conserva el valor exhortativo del plural y suena natural en español; «consejo» expresa συμβουλή con precisión y mantiene el sentido de una exhortación prudente, no meramente informativa.
- source_word: ἔσται ἀμεταμέλητα ὑμῖν
  english_pob_choice: you will have no cause for regret
  chosen_spanish: no tendrán motivo de arrepentimiento
  alternatives_spanish:
  - no les traerá arrepentimiento
  - no se arrepentirán
  lexicon: ἀμεταμέλητος
  rationale: La idea es que la aceptación del consejo no resultará en pesar o arrepentimiento; «motivo de arrepentimiento» preserva la fuerza idiomática sin forzar una paráfrasis excesiva.
- source_word: ζῇ γὰρ ὁ θεὸς
  english_pob_choice: For as God lives
  chosen_spanish: Porque vive Dios
  alternatives_spanish:
  - Porque Dios vive
  - Pues vive Dios
  lexicon: ζάω; θεός
  rationale: Se mantiene la fórmula juramentaria breve y solemne; el orden «vive Dios» refleja bien la solemnidad del griego.
- source_word: ὁ κύριος Ἰησοῦς Χριστός
  english_pob_choice: the Lord Jesus Messiah
  chosen_spanish: el Señor Jesucristo
  alternatives_spanish:
  - el Señor Jesús Mesías
  - el Señor Jesús Cristo
  lexicon: κύριος; Ἰησοῦς; Χριστός
  rationale: Aquí se conserva «Jesucristo» como forma establecida y reconocible en español, ya que el nombre/título funciona de manera fija en esta fórmula doxológica y confesional; además evita una expresión artificial en español.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el espíritu santo
  lexicon: πνεῦμα; ἅγιος
  rationale: La mayúscula en «Espíritu Santo» expresa la referencia personal a la tercera persona, coherente con el contexto trinitario de la enumeración.
- source_word: ἥ τε πίστις καὶ ἡ ἐλπὶς τῶν ἐκλεκτῶν
  english_pob_choice: the faith and hope of the elect
  chosen_spanish: la fe y la esperanza de los elegidos
  alternatives_spanish:
  - la fe y la esperanza de los escogidos
  - la fe y la esperanza de los electos
  lexicon: πίστις; ἐλπίς; ἐκλεκτός
  rationale: Se conserva la coordinación nominal como en el griego; «los elegidos» refleja ἐκλεκτοί de forma más natural en español eclesial que «electos».
- source_word: ὁ ποιήσας ... ἀμεταμελήτως
  english_pob_choice: the one who in humility, with earnest gentleness, without regret carries out
  chosen_spanish: el que, en humildad, con ferviente mansedumbre, sin arrepentimiento, cumple
  alternatives_spanish:
  - el que, con humildad, con sincera mansedumbre, sin pesar, cumple
  - el que, en humildad, con seria mansedumbre, sin remordimiento, realiza
  lexicon: ποιέω; ταπεινοφροσύνη; ἐκτενής; ἐπιείκεια; ἀμεταμελήτως
  rationale: «Cumple» sirve bien para los objetos que siguen («disposiciones y mandamientos»). «Ferviente mansedumbre» intenta mantener ἐκτενοῦς ἐπιεικείας sin diluir la combinación inusual de intensidad y gentileza; «sin arrepentimiento» sigue el léxico de ἀμεταμελήτως de manera consistente con la primera cláusula.
- source_word: τὰ ὑπὸ τοῦ θεοῦ δεδομένα δικαιώματα καὶ προστάγματα
  english_pob_choice: the righteous requirements and commandments given by God
  chosen_spanish: las justas disposiciones y los mandamientos dados por Dios
  alternatives_spanish:
  - los justos preceptos y mandamientos dados por Dios
  - las justas exigencias y mandamientos dados por Dios
  lexicon: δικαίωμα; πρόσταγμα; δίδωμι
  rationale: «Disposiciones» conserva el matiz de decretos/ordenanzas de δικαιώματα sin reducirlo a una sola categoría jurídica moderna; «justas» refleja el valor moral/covenantal de δικαιώματα en el contexto.
- source_word: ἐντεταγμένος καὶ ἐλλόγιμος
  english_pob_choice: will be enrolled and counted
  chosen_spanish: será inscrito y contado
  alternatives_spanish:
  - será registrado y contado
  - quedará inscrito y contado
  lexicon: ἐντάσσω; ἐλλόγιμος
  rationale: «Inscrito» expresa la imagen administrativa de incorporación a una lista; «contado» conserva el segundo miembro sin añadir explicaciones no presentes en el texto.
- source_word: εἰς τὸν ἀριθμὸν τῶν σῳζομένων
  english_pob_choice: among the number of those being saved
  chosen_spanish: entre el número de los que están siendo salvos
  alternatives_spanish:
  - entre el número de los que se salvan
  - dentro del número de los salvados
  lexicon: σῴζω
  rationale: Se conserva el aspecto presente/progresivo de τῶν σῳζομένων con «están siendo salvos», siguiendo el valor dinámico de la forma griega y evitando una lectura estática.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesucristo
  alternatives_spanish:
  - por Jesucristo
  - a través de Jesucristo
  lexicon: διά + genitivo; Ἰησοῦς; Χριστός
  rationale: «Por medio de» expresa mediación personal con claridad en español teológico; se conserva «Jesucristo» por la misma razón léxica explicada arriba.
- source_word: δι᾽ οὗ ἐστὶν αὐτῷ ἡ δόξα
  english_pob_choice: through whom be the glory to him
  chosen_spanish: por quien sea la gloria para él
  alternatives_spanish:
  - por quien es la gloria para él
  - a quien sea la gloria
  lexicon: δόξα; ἐστίν
  rationale: Se opta por el subjuntivo exhortativo «sea» para reflejar mejor el carácter doxológico de la frase en español; «para él» conserva el dativo referido a Dios.
theological_decisions:
- issue: Lectura trinitaria de la invocación solemne
  english_pob_reading: For as God lives, and the Lord Jesus Messiah lives, and the Holy Spirit...
  chosen_spanish_reading: Porque vive Dios, y vive el Señor Jesucristo, y el Espíritu Santo...
  alternative_spanish_readings:
  - Porque vive Dios, y vive el Señor Jesús Mesías, y el Espíritu Santo...
  - Porque vive Dios, y vive el Señor Jesús, el Mesías, y el Espíritu Santo...
  rationale: El texto griego presenta una enumeración solemne de testigos/vivos en una fórmula de juramento. La traducción conserva esa secuencia sin suavizarla, porque forma parte de la fuerza retórica y teológica del pasaje.
  doctrine_reference: Triunidad confesional en fórmula litúrgica; fidelidad al paralelismo del original
- issue: ‘La fe y la esperanza de los elegidos’ como sujetos vivientes en la fórmula
  english_pob_reading: the faith and hope of the elect
  chosen_spanish_reading: la fe y la esperanza de los elegidos
  alternative_spanish_readings:
  - la fe y la esperanza de los elegidos, como testigos invocados
  - la fe y la esperanza de los elegidos
  rationale: Se preserva la construcción nominal sin convertirla en cláusula relativa. Esto mantiene la tensión retórica del griego, donde la fe y la esperanza aparecen casi personificadas dentro del juramento.
  doctrine_reference: Personificación retórica; no requiere armonización interpretativa
translation_notes:
  revision_awareness: Se tomó en cuenta la corrección reciente que restauró ‘Mesías’ en el inglés auditado, pero en español se optó por ‘Jesucristo’ en esta fórmula fija por claridad y uso eclesial, sin borrar la tensión entre título y nombre. También se respetó la revisión que corrigió ‘the faith and hope’ como coordinación nominal, por lo que no se introdujo una cláusula relativa en español.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el tetragrámaton explícito; por tanto, no se aplicó aquí.
  - Se distinguió ‘Espíritu Santo’ con mayúsculas por referencia personal trinitaria en este contexto.
  - Se evitó ‘siervo’ para δοῦλος porque el texto no contiene ese término; no fue necesario intervenir en ese eje léxico.
