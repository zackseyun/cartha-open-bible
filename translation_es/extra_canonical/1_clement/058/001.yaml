revisions:
- from: 'Submetámonos, pues, a su nombre santísimo y glorioso, huyendo de las amenazas dichas de antemano, por medio de la sabiduría, contra los desobedientes, para que habitemos seguros, habiendo puesto nuestra confianza en el nombre santísimo de su majestad.


    Reciban nuestro consejo, y no tendrán motivo de arrepentimiento. Porque vive Dios, y vive el Señor Jesús Mesías, y el Espíritu Santo[a], que son la fe y la esperanza de los elegidos[b]; así también, el que con humildad, con ferviente mansedumbre, sin arrepentirse[c], cumple los justos mandamientos y preceptos dados por Dios, será así inscrito y contado entre el número de los que son salvados por medio de Jesús Mesías, por quien es la gloria para él por los siglos de los siglos. Amén.'
  to: 'Sometámonos, pues, a su nombre santísimo y glorioso, huyendo de las amenazas dichas de antemano por medio de la sabiduría contra los desobedientes, para que habitemos seguros, habiendo puesto nuestra confianza en el nombre santísimo de su majestad.


    Reciban nuestro consejo, y no tendrán motivo de pesar.[a] Porque vive Dios, y vive el Señor Jesús Mesías, y el Espíritu Santo,[b] que son la fe y la esperanza de los elegidos,[c] así también el que con humildad, con ferviente mansedumbre, sin lamentarlo, cumple los justos requisitos y mandamientos dados por Dios, será así inscrito y contado entre el número de los que son salvados por medio de Jesús Mesías, por quien es la gloria para él por los siglos de los siglos. Amén.'
  rationale: Se corrige la forma verbal inicial a un español estándar ('Sometámonos'), se ajusta ἀμεταμέλητα para evitar el falso matiz de 'arrepentimiento' y se reubica la nota correspondiente al lugar correcto. También se mejora ἀμεταμελήτως con 'sin lamentarlo', se restaura mejor la distinción entre δικαιώματα y προστάγματα con 'justos requisitos y mandamientos', y se suaviza la puntuación para una lectura más natural y fiel.
  reviewer_model: gpt-5.4
