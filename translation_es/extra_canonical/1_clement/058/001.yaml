review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido general del griego y del POB inglés: mantiene la exhortación a someterse, el motivo de huir de las amenazas, la confianza en el nombre, la fórmula de juramento triádica, la referencia a Jesús como Mesías, y el cierre doxológico. Sin embargo, hay varios desajustes léxicos y sintácticos que conviene corregir: ''Submetámonos'' no es la forma natural estándar en español; ''motivo de arrepentimiento'' introduce un matiz de metanoia más que de pesar; la nota [c] está anclada en la segunda cláusula aunque el participio relevante posterior significa ''sin pesar/sin lamentarlo''; ''justos mandamientos y preceptos'' invierte y difumina la distinción entre δικαιώματα y προστάγματα; y la puntuación alrededor de la aseveración ''así también'' no refleja bien el valor de ''so surely''.'
  spanish_quality_summary: El texto es legible y digno, pero presenta cierta rigidez y algunas elecciones poco idiomáticas o engañosas para un lector hispano. 'Sometámonos' es claramente preferible. 'Dichas de antemano, por medio de la sabiduría' suena algo trabado pero aceptable; el ajuste principal es en la segunda mitad, donde conviene mejorar naturalidad y precisión con 'no tendrán de qué arrepentirse' o mejor 'no tendrán motivo de pesar', 'sin lamentarlo', y 'los justos requisitos y mandamientos'. También conviene eliminar notas innecesarias que no añaden claridad al lector español.
  glossary_alignment: Alinea bien con las políticas clave del proyecto en 'Mesías', 'Jesús', 'Dios', 'Espíritu Santo' y el mantenimiento de 'nombre'. No hay ocurrencia de Yahvé. El punto más importante de glosario es que δικαιώματα no debería absorberse como 'mandamientos'; conviene reservar 'mandamientos' para προστάγματα y dar a δικαιώματα algo como 'requisitos justos' o 'decretos justos'.
  issues:
  - severity: medium
    issue: '''Submetámonos'' es forma poco natural/no estándar en español general.'
    rationale: Para Ὑποταχθῶμεν, 'sometámonos' preserva la exhortación con español claro y ampliamente legible.
  - severity: medium
    issue: '''No tendrán motivo de arrepentimiento'' desplaza ἀμεταμέλητα hacia lenguaje de conversión moral.'
    rationale: Aquí el sentido es 'sin pesar / sin motivo de lamentarlo', no 'arrepentimiento' en sentido teológico principal. En español eso puede confundir con μετάνοια.
  - severity: high
    issue: La nota [c] está mal ubicada semánticamente y crea confusión.
    rationale: La nota explica ἀμεταμέλητα de la cláusula 'Reciban nuestro consejo...', pero el anclaje [c] está puesto en 'sin arrepentirse', que corresponde al adverbio posterior ἀμεταμελήτως. Además, en ese lugar 'sin arrepentirse' también es una mala opción léxica; debe ser 'sin lamentarlo' o equivalente.
  - severity: medium
    issue: La pareja 'justos mandamientos y preceptos' no refleja bien δικαιώματα καὶ προστάγματα.
    rationale: Según el rastro POB, δικαιώματα = 'righteous requirements' y προστάγματα = 'commandments'. En español conviene 'los justos requisitos y mandamientos' o 'los requisitos justos y mandamientos'.
  - severity: low
    issue: La puntuación con 'así también' debilita la fuerza aseverativa.
    rationale: La construcción funciona mejor como '... de los elegidos, así de cierto el que...' o '... así también el que...', sin coma innecesaria tras la locución.
  revised_spanish_text: 'Sometámonos, pues, a su nombre santísimo y glorioso, huyendo de las amenazas dichas de antemano por medio de la sabiduría contra los desobedientes, para que habitemos seguros, habiendo puesto nuestra confianza en el nombre santísimo de su majestad.


    Reciban nuestro consejo, y no tendrán motivo de pesar.[a] Porque vive Dios, y vive el Señor Jesús Mesías, y el Espíritu Santo,[b] que son la fe y la esperanza de los elegidos,[c] así también el que con humildad, con ferviente mansedumbre, sin lamentarlo, cumple los justos requisitos y mandamientos dados por Dios, será así inscrito y contado entre el número de los que son salvados por medio de Jesús Mesías, por quien es la gloria para él por los siglos de los siglos. Amén.'
  revised_footnotes:
  - marker: a
    text: El griego ἀμεταμέλητα expresa aquí la idea de no tener causa de pesar o remordimiento posterior; no se refiere primariamente al arrepentimiento en el sentido de conversión.
