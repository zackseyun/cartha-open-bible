translation:
  language: es
  text: 'Sometámonos, pues, a su nombre santísimo y glorioso, huyendo de las amenazas dichas de antemano por medio de la sabiduría contra los desobedientes, para que habitemos seguros, habiendo puesto nuestra confianza en el nombre santísimo de su majestad.


    Reciban nuestro consejo, y no tendrán motivo de pesar.[a] Porque vive Dios, y vive el Señor Jesús Mesías, y el Espíritu Santo,[b] que son la fe y la esperanza de los elegidos,[c] así también el que con humildad, con ferviente mansedumbre, sin lamentarlo, cumple los justos requisitos y mandamientos dados por Dios, será así inscrito y contado entre el número de los que son salvados por medio de Jesús Mesías, por quien es la gloria para él por los siglos de los siglos. Amén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἀμεταμέλητα expresa aquí la idea de no tener causa de pesar o remordimiento posterior; no se refiere primariamente al arrepentimiento en el sentido de conversión.
    reason: lexical_clarification
  - marker: b
    text: El griego puede entenderse como referencia personal al Espíritu Santo dentro de una fórmula confesional triádica; por eso se mantiene la mayúscula tradicional.
    reason: theological_note
  - marker: c
    text: 'La cláusula griega es sintácticamente densa: puede leerse como una designación conjunta de los testigos divinos o como un giro predicativo unido a la tríada. Se conserva la lectura amplia del POB.'
    reason: theological_note
lexical_decisions:
- source_word: Ὑποταχθῶμεν
  english_pob_choice: Let us therefore submit ourselves
  chosen_spanish: Submetámonos, pues
  alternatives_spanish:
  - sometámonos
  - submetámonos a nosotros mismos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo pasivo/reflexivo se expresa con naturalidad en español como una exhortación inclusiva. 'Submetámonos' conserva el valor paraenético sin perder solemnidad.
- source_word: παναγίῳ
  english_pob_choice: all-holy
  chosen_spanish: santísimo
  alternatives_spanish:
  - santo en sumo grado
  - todo santo
  lexicon: LSJ
  rationale: El compuesto intensifica la santidad; 'santísimo' es idiomático en español bíblico y mantiene la elevación del tono.
- source_word: ὀνόματι
  english_pob_choice: name
  chosen_spanish: nombre
  lexicon: BDAG
  rationale: Se conserva literalmente porque 'nombre' porta la carga teológica de autoridad, carácter y refugio.
- source_word: φυγόντες
  english_pob_choice: fleeing
  chosen_spanish: huyendo
  alternatives_spanish:
  - escapando
  - evitando
  lexicon: BDAG
  rationale: El participio transmite urgencia moral; 'huyendo' conserva mejor la fuerza exhortativa que una forma más débil.
- source_word: ἀπειλάς
  english_pob_choice: threats
  chosen_spanish: amenazas
  alternatives_spanish:
  - advertencias
  - conminaciones
  lexicon: BDAG
  rationale: '''Amenazas'' reproduce el sentido de juicio o castigo anunciado y suena natural en español solemne.'
- source_word: διὰ τῆς σοφίας
  english_pob_choice: through wisdom
  chosen_spanish: por medio de la sabiduría
  alternatives_spanish:
  - por sabiduría
  - mediante la sabiduría
  lexicon: LSJ
  rationale: La preposición compuesta se vierte de forma transparente como medio o instrumento. 'Por medio de' evita ambigüedad y conserva la relación causal/instrumental.
- source_word: τοῖς ἀπειθοῦσιν
  english_pob_choice: the disobedient
  chosen_spanish: contra los desobedientes
  alternatives_spanish:
  - a los desobedientes
  - para los desobedientes
  lexicon: BDAG
  rationale: La relación con 'amenazas' requiere en español una construcción clara de dirección; 'contra' expresa bien el valor hostil implícito en el contexto paraenético.
- source_word: κατασκηνώσωμεν
  english_pob_choice: we may dwell secure
  chosen_spanish: habitemos seguros
  alternatives_spanish:
  - habitemos con seguridad
  - nos establezcamos seguros
  lexicon: LSJ
  rationale: El verbo sugiere asentarse o morar; en español 'habitemos seguros' conserva la idea de residencia con seguridad sin sonar forzado.
- source_word: πεποιθότες
  english_pob_choice: having placed our confidence
  chosen_spanish: habiendo puesto nuestra confianza
  alternatives_spanish:
  - confiando
  - estando confiados
  lexicon: BDAG
  rationale: El participio perfecto expresa una confianza ya asumida; 'habiendo puesto nuestra confianza' conserva ese estado resultante.
- source_word: μεγαλωσύνης
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - grandeza
  - magnificencia
  lexicon: BDAG
  rationale: '''Majestad'' reproduce el registro doxológico y la dignidad elevada del sintagma.'
- source_word: συμβουλήν
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - counsel
  - instrucción
  lexicon: BDAG
  rationale: '''Consejo'' es el equivalente español natural que conserva el tono pastoral y exhortativo.'
- source_word: ἀμεταμέλητα
  english_pob_choice: no cause for regret
  chosen_spanish: no tendrán motivo de arrepentimiento
  alternatives_spanish:
  - no serán motivo de arrepentimiento
  - no les pesará
  lexicon: BDAG
  rationale: La idea idiomática se expresa en el efecto para los destinatarios; 'no tendrán motivo de arrepentimiento' comunica fielmente la ausencia de pesar/regret.
- source_word: ζῇ γὰρ ὁ θεὸς ...
  english_pob_choice: For as God lives ... so surely
  chosen_spanish: Porque vive Dios ... así también
  alternatives_spanish:
  - Pues vive Dios ...
  - Porque Dios vive ...
  lexicon: BDAG
  rationale: La fórmula de juramento o aseveración se reproduce con una expresión española solemne y reconocible.
- source_word: κύριος Ἰησοῦς Χριστός
  english_pob_choice: Lord Jesus Messiah
  chosen_spanish: Señor Jesús Mesías
  alternatives_spanish:
  - Señor Jesús Cristo
  - el Señor Jesús Mesías
  lexicon: BDAG
  rationale: Se traduce Χριστός como 'Mesías' conforme a la política del proyecto, preservando el valor de título y su transparencia semántica.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el santo Espíritu
  lexicon: BDAG
  rationale: La fórmula confesional usual en español comunica mejor la referencia personal del texto triádico.
- source_word: ἥ τε πίστις καὶ ἡ ἐλπὶς τῶν ἐκλεκτῶν
  english_pob_choice: who are the faith and the hope of the elect
  chosen_spanish: que son la fe y la esperanza de los elegidos
  alternatives_spanish:
  - que son la fe y la esperanza de los escogidos
  - la fe y la esperanza de los elegidos
  lexicon: BDAG
  rationale: Se conserva la construcción relativa y el predicado teológico sin suavizar la frase ni reducirla a una sola persona.
- source_word: ταπεινοφροσύνῃ
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - humillación
  - mansedumbre de ánimo
  lexicon: BDAG
  rationale: '''Humildad'' es claro, digno y fiel al valor moral del término.'
- source_word: ἐκτενοῦς ἐπιεικείας
  english_pob_choice: earnest gentleness
  chosen_spanish: ferviente mansedumbre
  alternatives_spanish:
  - constante mansedumbre
  - amplia benignidad
  lexicon: BDAG
  rationale: La combinación expresa intensidad y suavidad; 'ferviente mansedumbre' intenta retener ambos matices en español sin caer en un calco tosco.
- source_word: δικαιώματα
  english_pob_choice: righteous requirements
  chosen_spanish: justos mandamientos
  alternatives_spanish:
  - justos requisitos
  - preceptos justos
  lexicon: BDAG
  rationale: Aunque puede tener un matiz más técnico, el contexto parenético permite 'mandamientos' como forma clara, manteniendo la normatividad divina.
- source_word: προστάγματα
  english_pob_choice: commandments
  chosen_spanish: preceptos
  alternatives_spanish:
  - mandamientos
  - instrucciones
  lexicon: BDAG
  rationale: '''Preceptos'' preserva el matiz normativo y evita redundancia excesiva con ''mandamientos'' en la misma cláusula.'
- source_word: ἐντεταγμένος
  english_pob_choice: enrolled
  chosen_spanish: inscrito
  alternatives_spanish:
  - registrado
  - inscrito en el número
  lexicon: LSJ
  rationale: En el contexto de un número ordenado, 'inscrito' comunica pertenencia a una lista o registro.
- source_word: ἐλλόγιμος
  english_pob_choice: counted
  chosen_spanish: contado
  alternatives_spanish:
  - tenido por
  - considerado
  lexicon: LSJ
  rationale: La idea contable o registral se conserva con 'contado', especialmente en paralelo con 'inscrito'.
- source_word: τῶν σῳζομένων
  english_pob_choice: those being saved
  chosen_spanish: los que son salvados
  alternatives_spanish:
  - los salvados
  - los que se están salvando
  lexicon: BDAG
  rationale: Se mantiene el participio presente con una forma española clara y procesual.
- source_word: δι᾽ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesús Mesías
  alternatives_spanish:
  - por Jesús Mesías
  - por medio de Cristo
  lexicon: BDAG
  rationale: '''Por medio de'' conserva la mediación instrumental, y ''Mesías'' mantiene la traducción del título.'
- source_word: δι᾽ οὗ ἐστὶν αὐτῷ ἡ δόξα
  english_pob_choice: through whom is the glory to him
  chosen_spanish: por quien es la gloria para él
  alternatives_spanish:
  - por quien le sea la gloria
  - por quien es la gloria a él
  lexicon: BDAG
  rationale: Se conserva la formulación doxológica comprimida sin resolver innecesariamente la referencia del pronombre.
theological_decisions:
- issue: Renderización de Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la política del proyecto de traducir el título cuando funciona como título vivo y no como nombre fijo litúrgico.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Relación de 'ἥ τε πίστις καὶ ἡ ἐλπὶς τῶν ἐκλεκτῶν' con la tríada
  english_pob_reading: who are the faith and the hope of the elect
  chosen_spanish_reading: que son la fe y la esperanza de los elegidos
  alternative_spanish_readings:
  - la fe y la esperanza de los elegidos
  - que es la fe y la esperanza de los elegidos
  rationale: Se preserva la frase como predicado relativo unido al encadenamiento anterior, sin reducirla a una mención exclusiva del Espíritu ni separarla del juramento.
  doctrine_reference: 'POB syntax decision: keep compressed confessional syntax visible'
- issue: Naturaleza de 'τὸ πνεῦμα τὸ ἅγιον'
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el santo Espíritu
  rationale: La forma confesional española estándar mejor comunica la referencia personal y trinitaria en este contexto solemne.
  doctrine_reference: Trinitarian confession in early Christian text
- issue: Valor de 'ἀμεταμέλητα'
  english_pob_reading: no cause for regret
  chosen_spanish_reading: no tendrán motivo de arrepentimiento
  alternative_spanish_readings:
  - sin arrepentimiento
  - no les pesará
  rationale: El sustantivo abstracto en español debe expresar el efecto práctico para los oyentes, no una mera negación adjetival.
  doctrine_reference: Pastoral exhortation / idiomatic equivalence
translation_notes:
  revision_awareness: Tomé en cuenta la revisión final del audit trail en inglés, que solo suprimió una coma innecesaria antes de 'will thus be enrolled'. No altera la sintaxis ni la decisión léxica de fondo; por eso la versión española mantiene una puntuación fluida y no añade marcas interpretativas ajenas al texto.
  spanish_consistency_notes:
  - Usé 'Mesías' para Χριστός en toda la sección, conforme a la política del proyecto y al audit trail inglés.
  - Mantuve 'Yahvé' fuera de esta perícopa porque el texto griego aquí dice θεός y κύριος, no el nombre divino explícito.
  - Conservé el tono doxológico elevado con 'santísimo', 'majestad', 'gloria' y 'Amén'.
  - Evité 'siervo' para δοῦλος porque este pasaje no contiene ese término y no correspondía introducirlo.
  - La puntuación española separa claramente la exhortación inicial, la invitación al consejo y la fórmula juramentaria posterior, sin perder el encadenamiento retórico del original.
