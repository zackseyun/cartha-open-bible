id: 1CLEM.33.3
reference: 1 Clement 33:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: τῷ γὰρ παμμεγεθεστάτῳ αὐτοῦ κράτει οὐρανοὺς ἐστήριξεν καὶ τῇ ἀκαταλήπτῳ αὐτοῦ συνέσει διεκύβευσεν αὐτούς· τὴν τε γῆν διεχώρισεν ἀπὸ τοῦ περιέχοντος αὐτὴν ὕδατος καὶ ἔδρασεν ἐπὶ τὸν ἀσφαλῆ τοῦ ἰδίου βουλήματος θεμέλιον· τὰ τε ἐν αὐτῇ ζῷα φοιτώντα τῇ ἑαυτοῦ διατάξει ἐκέλευσεν εἶναι· τὴν θάλασσαν καὶ τὰ ἐν αὐτῇ ζῷα προετοιμάσας ἐνέκλεισεν τῇ ἑαυτοῦ δυνάμει.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/033/003.yaml
  text: For by his exceedingly great might he established the heavens[a], and by his incomprehensible understanding he ordered them. He also separated the earth from the water that surrounds it and fixed it upon the secure foundation of his own purpose. And the living creatures that move about on it he commanded to exist by his own ordinance. Having prepared the sea and the living creatures in it, he enclosed it by his own power.
  footnotes:
  - marker: a
    text: Or 'he enclosed it'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:25Z'
    unchanged: false
    changes_summary: Changed the final clause from 'he enclosed the sea by his own power' to 'he enclosed it by his own power' to reflect the Greek object more naturally after 'Having prepared the sea and the living creatures in it,' while preserving the sense. All other wording retained.
translation:
  language: es
  text: Porque por su poder sumamente grande estableció los cielos, y por su entendimiento insondable los ordenó. También separó la tierra del agua que la rodea y la asentó sobre el fundamento seguro de su propio propósito. Y a los seres vivientes que se mueven en ella les mandó existir por su propia ordenanza. Después de preparar el mar y a los seres vivientes en él, lo encerró[a] por su propio poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «encerró el mar».'
    reason: El pronombre «lo» puede explicitarse como referencia al mar para evitar ambigüedad; esta es la variante documentada en el audit trail inglés y debe anclarse en la cláusula final.
lexical_decisions:
- source_word: παμμεγεθεστάτῳ... κράτει
  english_pob_choice: exceedingly great might
  chosen_spanish: poder sumamente grande
  alternatives_spanish:
  - grandísimo poder
  - poder sobremanera grande
  lexicon: κράτος
  rationale: El griego destaca la potencia soberana de Dios; en español, "poder sumamente grande" conserva la fuerza superlativa sin sonar arcaico ni redundante. "Poder" comunica bien el ámbito de fuerza activa mejor que un calco más pesado.
- source_word: ἀκαταλήπτῳ... συνέσει
  english_pob_choice: incomprehensible understanding
  chosen_spanish: entendimiento insondable
  alternatives_spanish:
  - entendimiento incomprensible
  - comprensión insondable
  lexicon: σύνεσις
  rationale: '"Insondable" mantiene la idea de algo que no puede abarcarse o sondearse, muy cercana al énfasis del inglés POB y del griego. "Entendimiento" reproduce el campo semántico intelectual sin forzar una terminología demasiado filosófica.'
- source_word: διεκύβευσεν αὐτούς
  english_pob_choice: he ordered them
  chosen_spanish: los ordenó
  alternatives_spanish:
  - los dispuso
  - los reguló
  lexicon: κυβεύω
  rationale: Aunque el verbo griego es raro, el contexto de creación y el audit trail inglés lo toman como ordenar/disponer los cielos. "Los ordenó" conserva la lectura establecida por el POB y suena natural en español.
- source_word: ἔδρασεν ἐπὶ τὸν ἀσφαλῆ... θεμέλιον
  english_pob_choice: fixed it upon the secure foundation of his own purpose
  chosen_spanish: la asentó sobre el fundamento seguro de su propio propósito
  alternatives_spanish:
  - la fijó sobre el fundamento seguro de su propia voluntad
  - la estableció sobre el fundamento firme de su propósito
  lexicon: θεμέλιον
  rationale: '"Asentó" transmite la imagen de poner firmemente en su base. "Propósito" sigue el inglés POB y refleja βουλήματος con un matiz de designio/plan, sin introducir una doctrina ajena.'
- source_word: τῇ ἑαυτοῦ διατάξει
  english_pob_choice: by his own ordinance
  chosen_spanish: por su propia ordenanza
  alternatives_spanish:
  - por su propia disposición
  - por su propio decreto
  lexicon: διάταξις
  rationale: '"Ordenanza" conserva un tono formal y normativo acorde al acto creador divino. Es preferible a "decreto" porque no carga de manera excesiva una connotación jurídica moderna.'
- source_word: ἐνέκλεισεν
  english_pob_choice: he enclosed it
  chosen_spanish: lo encerró
  alternatives_spanish:
  - lo rodeó
  - lo confinó
  lexicon: ἐνκλείω
  rationale: El inglés POB, tras la revisión, mantiene el objeto implícito del cierre final; en español "lo encerró" preserva esa referencia al mar/las aguas y la idea de limitarlo. Evita explicitar innecesariamente un objeto distinto que el griego no formula en esa posición.
theological_decisions:
- issue: Referencia al nombre divino y acción creadora soberana
  english_pob_reading: The passage attributes creation and ordering to God’s power, understanding, purpose, ordinance, and power again.
  chosen_spanish_reading: El pasaje atribuye la creación y el ordenamiento a la acción soberana de Dios mediante su poder, entendimiento, propósito y ordenanza.
  alternative_spanish_readings:
  - El pasaje presenta una descripción poética de la creación sin énfasis explícito en la soberanía divina.
  - El pasaje habla solo de una acción ordenadora general, no de autoridad soberana.
  rationale: El texto griego y el POB presentan una cadena de atributos divinos que subraya agencia soberana, no simple descripción cosmológica. La traducción española conserva esa fuerza teológica sin sobreexplicar.
  doctrine_reference: Creación providente y soberanía divina
- issue: Objeto final del verbo de cierre
  english_pob_reading: he enclosed it by his own power
  chosen_spanish_reading: lo encerró por su propio poder
  alternative_spanish_readings:
  - encerró el mar por su propio poder
  - lo encerró con su propio poder
  rationale: La revisión inglesa conserva el pronombre final por cercanía al griego, pero el contexto inmediato incluye el mar y los seres vivientes en él. El español puede mantener el pronombre y dejar que el antecedente contextual sea el mar/las aguas, sin perder la ambigüedad auditada.
  doctrine_reference: Límites establecidos por Dios para el mar
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que aclaró la cláusula final manteniendo el pronombre («it») por cercanía al griego, después de mencionar el mar y los seres vivientes en él. El español conserva esa misma referencia pronominal y no introduce una explicitación que el texto griego no exige.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma base para יהוה cuando aparezca en el proyecto; en este verso no aparece el tetragrámaton.
  - Se prefirió «poder», «entendimiento», «propósito» y «ordenanza» para conservar la cadencia conceptual del original sin recurrir a terminología eclesiástica innecesaria.
  - Se evitó una paráfrasis amplia en la cláusula final para respetar la ambigüedad controlada presente en la tradición de trabajo del POB.
