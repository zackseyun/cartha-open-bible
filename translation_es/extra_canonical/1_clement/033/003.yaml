  to: Porque por su poder sumamente grande estableció los cielos, y por su entendimiento insondable los ordenó. También separó la tierra del agua que la rodea y la asentó sobre el fundamento seguro de su propio propósito. Y a los seres vivientes que se mueven en ella les mandó existir por su propia ordenanza. Después de preparar el mar y a los seres vivientes en él, lo encerró[a] por su propio poder.
