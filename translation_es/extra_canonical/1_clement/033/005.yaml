translation:
  language: es
  text: 'Porque así dice Dios: «Hagamos al ser humano[a] conforme a nuestra imagen y conforme a nuestra semejanza». Y Dios hizo al ser humano; varón y mujer los hizo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “ser humano” traduce el valor genérico de ἄνθρωπον sin restringirlo a varón adulto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: el ser humano
  alternatives_spanish:
  - el hombre
  - la humanidad
  lexicon: ἄνθρωπος
  rationale: El griego usa ἄνθρωπον en sentido genérico, como en el inglés POB “man”, pero en español contemporáneo “el hombre” puede sonar masculino específico. “El ser humano” comunica el valor genérico sin perder la referencia a la humanidad como tal.
- source_word: κατ’ εἰκόνα καὶ καθ’ ὁμοίωσιν ἡμετέραν
  english_pob_choice: according to our image and according to our likeness
  chosen_spanish: conforme a nuestra imagen y conforme a nuestra semejanza
  alternatives_spanish:
  - a nuestra imagen y a nuestra semejanza
  - según nuestra imagen y según nuestra semejanza
  lexicon: εἰκών / ὁμοίωσις
  rationale: “Conforme a” conserva la relación normativa o de correspondencia del griego mejor que una equivalencia demasiado libre. “Imagen” y “semejanza” mantienen la distinción lexical tradicional que también respeta el POB inglés.
- source_word: ἄρσεν καὶ θῆλυ
  english_pob_choice: male and female
  chosen_spanish: varón y mujer
  alternatives_spanish:
  - masculino y femenino
  - macho y hembra
  lexicon: ἄρσην / θῆλυ
  rationale: En este contexto antropológico, “varón y mujer” es natural en español y mantiene la referencia humana del texto. “Macho y hembra” sería demasiado zoológico; “masculino y femenino” sería más abstracto que el original.
theological_decisions:
- issue: La forma plural divina en «Hagamos» dentro de la creación del ser humano.
  english_pob_reading: “Let us make man according to our image and according to our likeness.”
  chosen_spanish_reading: «Hagamos al ser humano conforme a nuestra imagen y conforme a nuestra semejanza».
  alternative_spanish_readings:
  - Hagamos al hombre...
  - Hagamos a la humanidad...
  rationale: Se conserva el plural verbal y posesivo sin resolverlo interpretativamente, porque el griego y el POB inglés mantienen esa tensión. El texto no explica quiénes incluye el plural; la traducción debe respetar esa apertura.
  doctrine_reference: Génesis 1:26; doctrina de la creación y del lenguaje divino plural sin explicitación dogmática en el pasaje.
- issue: El paralelismo entre la creación del ser humano y la diferenciación sexual.
  english_pob_reading: “And God made man; male and female he made them.”
  chosen_spanish_reading: «Y Dios hizo al ser humano; varón y mujer los hizo».
  alternative_spanish_readings:
  - Y Dios hizo al hombre; varón y mujer los hizo.
  - Y Dios los hizo varón y mujer.
  rationale: Se preserva el contraste entre el singular genérico y el plural final, tal como lo hace el griego y el inglés POB. No se introduce una armonización interpretativa que borre la estructura del texto.
  doctrine_reference: Génesis 1:27; antropología bíblica y creación de los sexos.
translation_notes:
  revision_awareness: No se aplicaron revisiones recientes; el estado de alta concordancia confirma que la formulación inglesa ya reflejaba adecuadamente el griego normalizado, así que el español se ha construido directamente desde el texto fuente con atención a los mismos valores léxicos y sintácticos.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός en todo el segmento.
  - Se conserva el doble paralelismo «conforme a… y conforme a…» para reflejar la estructura del griego.
  - Se evita «SEÑOR» porque el texto fuente dice θεός, no κύριος.
  - Se usa puntuación española con comillas angulares para la cita directa.
