base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/033/001.yaml
  text: What then shall we do, brothers? Shall we grow idle in doing good and abandon love? May the Master never allow this to happen among us. Rather, let us hasten with earnestness and eagerness to accomplish every good work. For the Creator and Master of all himself rejoices in his works. For by his exceedingly great might he established the heavens, and by his incomprehensible understanding he ordered them. He also separated the earth from the water that surrounds it and fixed it upon the secure foundation of his own purpose. And the living creatures that move about on it he commanded to exist by his own ordinance. Having prepared the sea and the living creatures in it, he enclosed it by his own power. Above all, with his holy and undefiled hands he formed man, the most excellent and truly great being in understanding, as the imprint of his own image. For thus God says, “Let us make man according to our image and according to our likeness.” And God made man; male and female he made them.
    So then, when he had finished all these things, he praised them and blessed them and said, “Increase and multiply.” Let us see that all the righteous were adorned with good works, and that the Lord himself, adorning himself with good works, rejoiced. Having, then, this pattern, let us come without hesitation to his will. With all our strength let us work the work of righteousness.
