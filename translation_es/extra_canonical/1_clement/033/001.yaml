  text: Τί οὖν ποιήσωμεν, ἀδελφοί; ἀργήσωμεν ἀπὸ τῆς ἀγαθοποιΐας καὶ ἐγκαταλίπωμεν τὴν ἀγάπην; μηδαμῶς τοῦτό ἐάσει ὁ δεσπότης ἐφ’ ἡμῖν γε γενηθῆναι, ἀλλὰ σπεύσωμεν μετὰ ἐκτενείας καὶ προθυμίας πᾶν ἔργον ἀγαθὸν ἐπιτελεῖν. 2. αὐτὸς γὰρ ὁ δημιουργὸς καὶ δεσπότης τῶν ἁπάντων ἐπὶ τοῖς ἔργοις αὐτοῦ ἀγάλλεται. 3. τῷ γὰρ παμμεγεθεστάτῳ αὐτοῦ κράτει οὐρανοὺς ἐστήριξεν καὶ τῇ ἀκαταλήπτῳ αὐτοῦ συνέσει διεκύβευσεν αὐτούς· τὴν τε γῆν διεχώρισεν ἀπὸ τοῦ περιέχοντος αὐτὴν ὕδατος καὶ ἔδρασεν ἐπὶ τὸν ἀσφαλῆ τοῦ ἰδίου βουλήματος θεμέλιον· τὰ τε ἐν αὐτῇ ζῷα φοιτώντα τῇ ἑαυτοῦ διατάξει ἐκέλευσεν εἶναι· τὴν θάλασσαν καὶ τὰ ἐν αὐτῇ ζῷα προετοιμάσας ἐνέκλεισεν τῇ ἑαυτοῦ δυνάμει. . ἐπὶ πᾶσι τὸ ἐξοχώτατον καὶ παμμέγεθες κατὰ διάνοιαν, ἄνθρωπον, ταῖς ἱεραῖς καὶ ἀμιάντοις χερσὶν ἔπλασεν τῆς ἑαυτοῦ εἰκόνος χαρακτῆρα. 5. οὕτως γὰρ φησὶν ὁ θεός· Ποιήσωμεν ἄνθρωπον κατ’ εἰκόνα καὶ καθ’ ὁμοίωσιν ἡμετέραν· καὶ ἐποίησεν ὁ θεὸς τὸν ἄνθρωπον, ἄρσεν καὶ θῆλυ ἐποίησεν αὐτούς. . ταῦτα οὖν πάντα τελειώσας ἐπῄνεσεν αὐτὰ καὶ ηὐλόγησεν
    καὶ εἶπεν· Αὐξάνεσθε καὶ πληθύνεσθε. 7. ἴδωμεν, ὅτι ἐν ἔργοις ἀγαθοῖς πάντες ἐκοσμήθησαν οἱ δίκαιοι, καὶ αὐτὸς δὲ ὁ κύριος ἔργοις ἀγαθοῖς ἑαυτὸν κοσμήσας ἐχάρη. 8. ἔχοντες οὖν τοῦτον τὸν ὑπογραμμὸν ἀόκνως προσέλθωμεν τῷ θελήματι αὐτοῦ· ἐξ ὅλης τῆς ἰσχύος ἡμῶν ἐργασώμεθα ἔργον δικαιοσύνης.
