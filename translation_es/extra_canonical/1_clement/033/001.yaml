translation:
  language: es
  text: '¿Qué, pues, haremos, hermanos? ¿Nos volveremos perezosos[a] en hacer el bien y abandonaremos el amor? De ningún modo permita el Dueño que esto llegue a sucedernos. Antes bien, apresurémonos con diligencia y con prontitud a cumplir toda buena obra. Porque el Creador y Dueño de todas las cosas se deleita en sus obras. Pues por su poder sumamente grande estableció los cielos y, por su entendimiento insondable, los ordenó; también separó la tierra del agua que la rodea y la fijó sobre el seguro fundamento de su propio propósito. Y a los seres vivientes que se mueven sobre ella les mandó existir conforme a su ordenanza. Y, habiendo preparado el mar y los seres vivientes que hay en él, lo encerró con su propio poder. Por encima de todo, con sus manos santas e inmaculadas[b] formó al hombre, el ser más excelente y verdaderamente grande en entendimiento, como la impronta de su propia imagen. Porque así dice Dios: «Hagamos al hombre conforme a nuestra imagen y conforme a nuestra semejanza».

    Y Dios hizo al hombre; varón y mujer los hizo.


    Así pues, cuando hubo terminado todas estas cosas, las elogió y las bendijo, y dijo: «Crezcan y multiplíquense». Veamos que todos los justos fueron adornados con buenas obras, y que el mismo Señor, adornándose con buenas obras, se alegró. Teniendo, pues, este modelo, acerquémonos sin vacilar a su voluntad; con todas nuestras fuerzas, trabajemos la obra de rectitud.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Perezosos» traduce el matiz de volverse inactivos o flojos en la tarea del bien; no implica simplemente dejar de hacer algo una vez.
    reason: lexical_alternative
  - marker: b
    text: «Inmaculadas» refleja el griego ἀμιάντοις, con el sentido de pureza ritual y moral; también podría decirse «sin mancha» o «puras».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀργήσωμεν
  english_pob_choice: shall we grow idle
  chosen_spanish: ¿nos volveremos perezosos?
  alternatives_spanish:
  - ¿nos haremos negligentes?
  - ¿cesaremos?
  lexicon: LSJ
  rationale: La pregunta exhortativa pide un matiz de volverse inactivo o descuidado, no solo de parar. «Volvernos perezosos» conserva esa idea sin sonar forzado en español.
- source_word: ἀγαθοποιΐας
  english_pob_choice: doing good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - beneficencia
  - hacer cosas buenas
  lexicon: LSJ
  rationale: Expresa la acción ética de manera natural y fiel al sustantivo de actividad.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - la caridad
  lexicon: BDAG
  rationale: Se mantiene el término central de la virtud cristiana con el sustantivo más transparente y natural en español.
- source_word: δεσπότης
  english_pob_choice: Master
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: LSJ
  rationale: Aunque el audit trail distingue δεσπότης de κύριος, en español «el Señor» comunica la autoridad soberana con naturalidad. Aquí se conserva la distinción del tono mediante el contexto, no mediante una palabra extraña; el pasaje siguiente usa «Señor» para κύριος, por lo que la repetición no borra la referencia divina en esta cita, pero sí la integra al registro eclesial del texto.
- source_word: σπεύσωμεν
  english_pob_choice: let us hasten
  chosen_spanish: apresurémonos
  alternatives_spanish:
  - démonos prisa
  - acelerémonos
  lexicon: LSJ
  rationale: Conserva la urgencia exhortativa y el impulso voluntario.
- source_word: ἐκτενείας
  english_pob_choice: earnestness
  chosen_spanish: diligencia
  alternatives_spanish:
  - ardor
  - fervor
  - intensidad
  lexicon: LSJ
  rationale: En español, «diligencia» expresa esfuerzo sostenido y serio, compatible con la idea de tensión aplicada del término griego.
- source_word: προθυμίας
  english_pob_choice: eagerness
  chosen_spanish: prontitud
  alternatives_spanish:
  - disposición
  - voluntad
  lexicon: BDAG
  rationale: «Prontitud» añade la nota de disposición rápida y favorable, complementando «diligencia».
- source_word: ἐπιτελεῖν
  english_pob_choice: to accomplish
  chosen_spanish: cumplir
  alternatives_spanish:
  - realizar
  - llevar a cabo
  - completar
  lexicon: BDAG
  rationale: Aquí «cumplir» comunica bien la idea de llevar una obra hasta su realización completa.
- source_word: δημιουργὸς
  english_pob_choice: Creator
  chosen_spanish: Creador
  alternatives_spanish:
  - artífice
  - hacedor
  lexicon: LSJ
  rationale: En el marco cosmológico, «Creador» es la equivalencia natural y más clara.
- source_word: ἀγάλλεται
  english_pob_choice: rejoices
  chosen_spanish: se deleita
  alternatives_spanish:
  - se alegra
  - exulta
  lexicon: BDAG
  rationale: Expresa el gozo positivo y contemplativo del sujeto en sus obras.
- source_word: παμμεγεθεστάτῳ
  english_pob_choice: exceedingly great
  chosen_spanish: sumamente grande
  alternatives_spanish:
  - en extremo grande
  - grandísimo
  lexicon: LSJ
  rationale: Reproduce el superlativo enfático sin forzar una construcción poco natural.
- source_word: κράτει
  english_pob_choice: might
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - mando
  lexicon: BDAG
  rationale: En un contexto de creación cósmica, «poder» es claro y sobrio.
- source_word: διεκύβευσεν
  english_pob_choice: ordered
  chosen_spanish: los ordenó
  alternatives_spanish:
  - los dispuso
  - los reguló
  lexicon: LSJ
  rationale: El verbo es difícil; «ordenó» sigue la solución inglesa y mantiene el sentido general de disposición cósmica sin sobreinterpretarlo.
- source_word: ἔδρασεν
  english_pob_choice: fixed
  chosen_spanish: la fijó
  alternatives_spanish:
  - la estableció
  - la asentó firmemente
  lexicon: LSJ
  rationale: Evoca con precisión la idea de dar firmeza sobre un fundamento.
- source_word: βουλήματος
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - voluntad
  - designio
  - consejo
  lexicon: BDAG
  rationale: «Propósito» conserva la intencionalidad de la imagen de fundamento y evita oscurecerla.
- source_word: διατάξει
  english_pob_choice: ordinance
  chosen_spanish: ordenanza
  alternatives_spanish:
  - orden
  - disposición
  - mandato
  lexicon: BDAG
  rationale: «Ordenanza» refleja el sentido de disposición normativa u orden dada por autoridad.
- source_word: ἐνέκλεισεν
  english_pob_choice: enclosed
  chosen_spanish: encerró
  alternatives_spanish:
  - encerró dentro
  - confinó
  lexicon: LSJ
  rationale: Mantiene la imagen de poner límites al mar por poder divino.
- source_word: τὸ ἐξοχώτατον καὶ παμμέγεθες κατὰ διάνοιαν
  english_pob_choice: the most excellent and truly great being in understanding
  chosen_spanish: el ser más excelente y verdaderamente grande en entendimiento
  alternatives_spanish:
  - el más excelso y verdaderamente grande en mente
  - el más sobresaliente y grande en inteligencia
  lexicon: LSJ
  rationale: Preserva la construcción elevada y la cualidad intelectual expresada por κατὰ διάνοιαν sin reducirla a una sola dimensión moderna.
- source_word: ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - al ser humano
  lexicon: BDAG
  rationale: Se mantiene la vinculación con la cita de Génesis y con el contraste inmediato «varón y mujer». En este contexto, el singular tiene valor representativo y textual.
- source_word: ἀμιάντοις
  english_pob_choice: undefiled
  chosen_spanish: inmaculadas
  alternatives_spanish:
  - sin mancha
  - puras
  - sin contaminar
  lexicon: BDAG
  rationale: «Inmaculadas» conserva la idea de pureza ritual/moral con un tono elevado y natural.
- source_word: χαρακτῆρα
  english_pob_choice: imprint
  chosen_spanish: impronta
  alternatives_spanish:
  - estampa
  - marca
  - imagen exacta
  lexicon: BDAG
  rationale: «Impronta» mantiene la metáfora de sello o huella sin cargarla con tecnicismos doctrinales posteriores.
- source_word: ἐκοσμήθησαν
  english_pob_choice: were adorned
  chosen_spanish: fueron adornados
  alternatives_spanish:
  - fueron engalanados
  - fueron embellecidos
  lexicon: LSJ
  rationale: Conserva el motivo retórico del adorno por buenas obras.
- source_word: ὑπογραμμὸν
  english_pob_choice: pattern
  chosen_spanish: modelo
  alternatives_spanish:
  - patrón
  - ejemplo
  lexicon: BDAG
  rationale: «Modelo» comunica bien la idea de algo a seguir.
- source_word: ἀόκνως
  english_pob_choice: eagerly / without hesitation
  chosen_spanish: sin vacilar
  alternatives_spanish:
  - sin dudar
  - sin titubear
  lexicon: LSJ
  rationale: Refleja la prontitud y la falta de retraimiento al acercarse a la voluntad de Dios.
- source_word: ἔργον δικαιοσύνης
  english_pob_choice: the work of righteousness
  chosen_spanish: la obra de justicia
  alternatives_spanish:
  - la obra de rectitud
  - la obra justa
  lexicon: BDAG
  rationale: En español, «justicia» puede conservar mejor el alcance moral y relacional del término sin perder el peso práctico de la expresión final.
theological_decisions:
- issue: Distinción entre δεσπότης y κύριος
  english_pob_reading: δεσπότης rendered 'Master'; κύριος rendered 'Lord'
  chosen_spanish_reading: δεσπότης se vierte aquí como «Señor», mientras que κύριος también aparece como «Señor» más adelante
  alternative_spanish_readings:
  - δεσπότης = Dueño
  - δεσπότης = Maestro
  rationale: La diferencia léxica del griego es real, pero en español ninguna opción mantiene simultáneamente naturalidad, reverencia y contraste sin introducir dureza o extrañeza. Se privilegia la fluidez eclesial del pasaje, dejando la distinción como nota lexical implícita en el audit trail.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
- issue: ἄνθρωπον en la cita de creación
  english_pob_reading: Rendered 'man' in the Genesis citation and surrounding allusion
  chosen_spanish_reading: «al hombre»
  alternative_spanish_readings:
  - al ser humano
  - a la humanidad
  rationale: La cita está anclada en Génesis y se completa con «varón y mujer los hizo», por lo que el singular representativo preserva mejor la intertextualidad.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral'
- issue: ἔργον δικαιοσύνης en la exhortación final
  english_pob_reading: Rendered 'the work of righteousness'
  chosen_spanish_reading: «la obra de justicia»
  alternative_spanish_readings:
  - la obra de rectitud
  - la obra de justicia y rectitud
  rationale: Aquí la exhortación apunta a una praxis moral concreta; «justicia» permite oír también el trasfondo de rectitud activa sin desdibujar el énfasis ético.
  doctrine_reference: 'DOCTRINE.md: contested terms table'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última pasada revisada (sin cambios) y el informe de concordancia moderada con observaciones menores. La principal tensión de traducción es la distinción de títulos divinos y la opción final para δικαιοσύνη; ambas se resolvieron con decisiones explícitas en español. No se aplicaron revisiones textuales adicionales al contenido fuente.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico-eclesial, pero con español moderno y legible.
  - Se conserva el paralelismo de las listas y la progresión exhortativa del original griego.
  - Se evita traducir mecánicamente desde el inglés cuando el español exige ajustes sintácticos.
  - Se usa «Señor» de forma consistente para la referencia divina principal, aunque el audit trail distingue el valor de δεσπότης y κύριος.
  - Se preserva la tensión entre «justicia» y «rectitud» en la final exhortación, sin cerrar artificialmente el campo semántico.
