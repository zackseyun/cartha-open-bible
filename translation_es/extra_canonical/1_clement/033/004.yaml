base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/033/004.yaml
  text: Above all[a], with his holy and undefiled hands he formed man, the most excellent and exceedingly great work according to his mind, as the imprint of his own image.
  footnotes:
  - marker: a
    text: Or 'the most excellent and truly great being in understanding'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:24Z'
    unchanged: false
    changes_summary: Replaced 'of his intelligence' with 'according to his mind' to reflect κατὰ διάνοιαν more directly and formally, while preserving the rest of the verse.
translation:
  language: es
  text: Por encima de todo[a], con sus santas e incontaminadas manos formó al hombre, la obra más excelente y extraordinariamente grande según su mente, como el sello de su propia imagen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la obra más excelente y verdaderamente grande en entendimiento».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπὶ πᾶσι
  english_pob_choice: Above all
  chosen_spanish: Por encima de todo
  alternatives_spanish:
  - Sobre todo
  - Ante todo
  lexicon: ἐπί + πᾶς
  rationale: La frase expresa prioridad o preeminencia; «Por encima de todo» conserva el matiz de supremacía sin volverla mecánica.
- source_word: ἱεραῖς καὶ ἀμιάντοις χερσὶν
  english_pob_choice: with his holy and undefiled hands
  chosen_spanish: con sus santas e incontaminadas manos
  alternatives_spanish:
  - con sus manos santas y puras
  - con sus manos sagradas e incontaminadas
  lexicon: ἱερός, ἀμίαντος, χείρ
  rationale: «Santas» mantiene el valor reverente de ἱεραῖς; «incontaminadas» preserva el sentido fuerte de ἀμιάντοις mejor que un simple «puras».
- source_word: ἔπλασεν
  english_pob_choice: he formed
  chosen_spanish: formó
  alternatives_spanish:
  - moldeó
  - plasmó
  lexicon: πλάσσω
  rationale: «Formó» es directo y suficientemente fiel al acto creador descrito por πλάσσω sin agregar imágenes no atestiguadas.
- source_word: ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al ser humano
  - al hombre humano
  lexicon: ἄνθρωπος
  rationale: Aquí el singular genérico se refiere a la humanidad representada en el hombre; «al hombre» es la forma más natural y tradicional para este contexto.
- source_word: τὸ ἐξοχώτατον καὶ παμμέγεθες
  english_pob_choice: the most excellent and exceedingly great
  chosen_spanish: la obra más excelente y extraordinariamente grande
  alternatives_spanish:
  - lo más excelente y sumamente grande
  - la realidad más excelente y sumamente grande
  lexicon: ἐξοχώτατος, παμμέγεθος
  rationale: La revisión inglesa entendió los neutros como cualificadores del hombre como obra producida; en español conviene explicitar «obra» para que el referente sea claro y mantener el doble superlativo con «extraordinariamente grande».
- source_word: κατὰ διάνοιαν
  english_pob_choice: according to his mind
  chosen_spanish: según su mente
  alternatives_spanish:
  - según su pensamiento
  - conforme a su mente
  lexicon: διάνοια
  rationale: La revisión auditada descartó referir διάνοια al entendimiento del hombre y la aplica al designio/mente de Dios; «según su mente» conserva ese sentido sin sobreexplicar.
- source_word: τῆς ἑαυτοῦ εἰκόνος χαρακτῆρα
  english_pob_choice: as the imprint of his own image
  chosen_spanish: como el sello de su propia imagen
  alternatives_spanish:
  - como la impronta de su propia imagen
  - como la marca de su propia imagen
  lexicon: χαρακτήρ, εἰκών
  rationale: «Sello» comunica bien la idea de impronta o marca visible derivada de χαρακτήρ; «de su propia imagen» conserva εἰκών y el vínculo con la semejanza original.
theological_decisions:
- issue: Si διάνοια describe la mente de Dios o el entendimiento del hombre
  english_pob_reading: according to his mind
  chosen_spanish_reading: según su mente
  alternative_spanish_readings:
  - según el entendimiento del hombre
  - según su inteligencia
  rationale: La corrección textual y contextual del audit trail muestra que διάνοια se refiere a la mente/designio de Dios en el acto creador, no a una cualidad del hombre; la redacción española sigue esa lectura.
  doctrine_reference: Doctrina de la creación; antropología teológica de la imagen de Dios
- issue: Cómo traducir la relación entre εἰκών y χαρακτήρ
  english_pob_reading: as the imprint of his own image
  chosen_spanish_reading: como el sello de su propia imagen
  alternative_spanish_readings:
  - como la impronta de su propia imagen
  - como la marca de su propia imagen
  rationale: El griego junta la idea de imagen con la de una marca/impronta producida por ella; «sello» reproduce esa relación sin borrar la tensión entre imagen y huella.
  doctrine_reference: Imago Dei; creación del ser humano como reflejo de Dios
translation_notes:
  revision_awareness: 'He tomado en cuenta la cadena de revisiones auditadas: la corrección que rechazó atribuir διάνοια al ser humano y la posterior formulación inglesa final «according to his mind». Por eso la españolización evita «entendimiento del hombre» y conserva una lectura teológica centrada en la mente/designio de Dios. También he mantenido el valor fuerte de παμμέγεθες con una expresión que no lo suaviza.'
  spanish_consistency_notes:
  - He mantenido «Yahvé» como forma por defecto cuando aparezca el nombre divino; aquí no aparece, así que no se aplica.
  - He usado «imagen» y «sello» de modo coherente con el paralelismo del texto, sin introducir lenguaje litúrgico ajeno.
  - La nota a pie marca la alternativa heredada por la tradición inglesa, pero la línea principal sigue la lectura revisada del audit trail.
