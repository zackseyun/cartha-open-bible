  text: ἐπὶ πᾶσι τὸ ἐξοχώτατον καὶ παμμέγεθες κατὰ διάνοιαν, ἄνθρωπον, ταῖς ἱεραῖς καὶ ἀμιάντοις χερσὶν ἔπλασεν τῆς ἑαυτοῦ εἰκόνος χαρακτῆρα.
