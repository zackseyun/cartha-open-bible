review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: ἔχοντες οὖν τοῦτον τὸν ὑπογραμμὸν = «Teniendo, pues, este modelo»; ἀόκνως = «sin vacilar»; προσέλθωμεν τῷ θελήματι αὐτοῦ = «acerquémonos a su voluntad»; ἐξ ὅλης τῆς ἰσχύος ἡμῶν = «con todas nuestras fuerzas». La principal desviación está en ἐργασώμεθα ἔργον δικαιοσύνης, donde «hagamos la obra de la justicia» suena poco natural y añade un artículo que puede endurecer innecesariamente la expresión. «Hagamos la obra de justicia» o «hagamos la obra de rectitud» se ajusta mejor al sentido.'
  spanish_quality_summary: El español es claro y digno, pero necesita un pequeño ajuste de naturalidad. «Acerquémonos sin vacilar[a] a su voluntad» funciona, aunque el lugar de la nota queda más natural sobre toda la frase adverbial. La expresión «la obra de la justicia» resulta algo rígida y menos idiomática en español eclesial general. Sin el artículo, la frase conserva la fuerza ética y mejora la legibilidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Justicia» es una buena opción para δικαιοσύνη en este contexto exhortativo. «Modelo» para ὑπογραμμός, «voluntad» para θέλημα, y «sin vacilar» para ἀόκνως están bien fundamentados. La nota alternativa debe conservar el matiz documentado del inglés, pero conviene formularla en español más natural.
  issues:
  - severity: medium
    issue: «la obra de la justicia» suena forzado en español
    rationale: Aunque intenta reflejar literalmente δικαιοσύνης, el artículo definido no es requerido por el griego y hace la frase menos idiomática. «La obra de justicia» preserva mejor el sentido y la fluidez.
  - severity: low
    issue: La formulación de la nota alternativa puede mejorarse
    rationale: El inglés auditado conserva «come eagerly to his will» como alternativa previa. «Acerquémonos con empeño a su voluntad» suena mejor que el actual anclaje aislado sobre «sin vacilar», y evita que la nota parezca modificar solo una palabra en vez de la locución.
  revised_spanish_text: Teniendo, pues, este modelo, acerquémonos a su voluntad sin vacilar[a]. Con todas nuestras fuerzas, hagamos la obra de justicia.
  revised_footnotes:
  - marker: a
    text: O «acerquémonos a su voluntad con empeño».
    reason: alternative_rendering_of_previous_english_choice
  revision_rationale: 'Se conserva el sentido del griego y del historial de revisión inglés, pero se mejora la naturalidad española: se reubica «sin vacilar» para que modifique con más claridad el acercamiento a la voluntad divina, y se cambia «la obra de la justicia» por «la obra de justicia», que suena más idiomático sin perder el valor ético de δικαιοσύνη. La nota se reformula para corresponder a toda la expresión alternativa, no solo a un adverbio aislado.'
