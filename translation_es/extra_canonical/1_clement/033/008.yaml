- from: Teniendo, pues, este modelo, acerquémonos sin vacilar[a] a su voluntad. Con todas nuestras fuerzas, hagamos la obra de la justicia.
  to: Teniendo, pues, este modelo, acerquémonos a su voluntad sin vacilar[a]. Con todas nuestras fuerzas, hagamos la obra de justicia.
  rationale: 'Se conserva el sentido del griego y del historial de revisión inglés, pero se mejora la naturalidad española: se reubica «sin vacilar» para que modifique con más claridad el acercamiento a la voluntad divina, y se cambia «la obra de la justicia» por «la obra de justicia», que suena más idiomático sin perder el valor ético de δικαιοσύνη. La nota se reformula para corresponder a toda la expresión alternativa, no solo a un adverbio aislado.'
