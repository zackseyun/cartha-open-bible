source:
  edition: Funk 1901 (normalized OCR)
  text: ἔχοντες οὖν τοῦτον τὸν ὑπογραμμὸν ἀόκνως προσέλθωμεν τῷ θελήματι αὐτοῦ· ἐξ ὅλης τῆς ἰσχύος ἡμῶν ἐργασώμεθα ἔργον δικαιοσύνης.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/033/008.yaml
  text: Having[a], then, this pattern, let us draw near to his will without hesitation. With all our strength let us do the work of righteousness.
  footnotes:
  - marker: a
    text: Or 'come eagerly to his will'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:56Z'
    unchanged: false
    changes_summary: Revised 'approach his will' to 'draw near to his will' for a more natural rendering of προσέλθωμεν, and changed 'work the work' to 'do the work' for more natural formal English while preserving the sense of ἐργασώμεθα ἔργον.
translation:
  language: es
  text: Teniendo, pues, este modelo, acerquémonos a su voluntad sin vacilar[a]. Con todas nuestras fuerzas, hagamos la obra de justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerquémonos a su voluntad con empeño».
    reason: alternative_rendering_of_previous_english_choice
lexical_decisions:
- source_word: ὑπογραμμὸν
  english_pob_choice: this pattern
  chosen_spanish: este modelo
  alternatives_spanish:
  - este patrón
  - este ejemplo
  - esta pauta
  lexicon: ὑπογραμμός
  rationale: El griego designa una pauta o modelo trazado para ser seguido. «Modelo» comunica bien la idea directiva en español natural sin perder la función ejemplar del término.
- source_word: ἀόκνως
  english_pob_choice: without hesitation
  chosen_spanish: sin vacilar
  alternatives_spanish:
  - sin hesitación
  - sin dudar
  - sin tardanza
  lexicon: ἀόκνως
  rationale: La revisión inglesa corrigió «eagerly» a «without hesitation» por el valor de ἀόκνως como ausencia de vacilación. «Sin vacilar» transmite mejor esa idea en español actual.
- source_word: προσέλθωμεν
  english_pob_choice: let us draw near
  chosen_spanish: acerquémonos
  alternatives_spanish:
  - lleguemos
  - acudamos
  - aproxímenos
  lexicon: προσέρχομαι
  rationale: «Acerquémonos» conserva el movimiento de acercamiento y suena natural en español. «Aproximarnos» sería más técnico y menos idiomático en este imperativo exhortativo.
- source_word: τῷ θελήματι αὐτοῦ
  english_pob_choice: to his will
  chosen_spanish: a su voluntad
  alternatives_spanish:
  - a su querer
  - a su deseo
  lexicon: θέλημα
  rationale: «Voluntad» es la correspondencia estable de θέλημα y mantiene la relación directa con la frase griega, sin suavizarla a una mera preferencia.
- source_word: ἐξ ὅλης τῆς ἰσχύος ἡμῶν
  english_pob_choice: With all our strength
  chosen_spanish: Con todas nuestras fuerzas
  alternatives_spanish:
  - Con toda nuestra fuerza
  - Con toda nuestra energía
  lexicon: ἰσχύς
  rationale: La expresión griega enfatiza la totalidad de la capacidad/fortaleza disponible. «Fuerzas» reproduce bien ese sentido colectivo y exhortativo en español.
- source_word: ἐργασώμεθα ἔργον δικαιοσύνης
  english_pob_choice: let us do the work of righteousness
  chosen_spanish: hagamos la obra de la justicia
  alternatives_spanish:
  - realicemos la obra de la justicia
  - hagamos una obra de justicia
  - trabajemos la obra de la justicia
  lexicon: δικαιοσύνη
  rationale: El griego usa un sustantivo de acción con el mismo verbo raíz; en español, «obra de la justicia» preserva el paralelismo sin sonar forzado. «Justicia» mantiene el valor ético y relacional de δικαιοσύνη.
theological_decisions:
- issue: Sentido exhortativo de acercarse a la voluntad de Dios
  english_pob_reading: let us draw near to his will without hesitation
  chosen_spanish_reading: acerquémonos sin vacilar a su voluntad
  alternative_spanish_readings:
  - acerquémonos con prontitud a su voluntad
  - acerquémonos decididamente a su voluntad
  rationale: No se trata solo de interés emocional, sino de una exhortación a aproximarse a la voluntad divina sin reserva ni demora. «Sin vacilar» conserva la fuerza moral de la exhortación sin introducir matices no presentes en el griego.
  doctrine_reference: obediencia y prontitud ante la voluntad de Dios
- issue: Interpretación de «obra de justicia»
  english_pob_reading: the work of righteousness
  chosen_spanish_reading: la obra de la justicia
  alternative_spanish_readings:
  - la obra justa
  - el trabajo de la justicia
  rationale: La frase puede entenderse como la acción que corresponde a la justicia, no meramente una actividad religiosa genérica. «Obra de la justicia» conserva ese peso ético y la cadencia del original.
  doctrine_reference: ética cristiana / justicia práctica
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la idea de ἀόκνως desde «eagerly» a «without hesitation» y mantuvo προσέλθωμεν como «draw near». La versión española sigue esa lectura, evitando un equivalente que sugiriera solo ardor emocional y no la ausencia de vacilación.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito en la referencia pronominal «su voluntad», conforme al texto fuente, sin introducir el nombre divino donde no aparece explícitamente.
  - Se eligió «justicia» para δικαιοσύνη por coherencia con una lectura ética y práctica del contexto.
  - «Acerquémonos» respeta el tono exhortativo comunitario del subjuntivo hortatorio griego.
