  text: ταῦτα οὖν πάντα τελειώσας ἐπῄνεσεν αὐτὰ καὶ ηὐλόγησεν καὶ εἶπεν· Αὐξάνεσθε καὶ πληθύνεσθε.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/033/006.yaml
  text: So then, having completed all these things, he praised them and blessed them and said, “Be fruitful and multiply.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:25Z'
    unchanged: false
    changes_summary: Revised 'when he had finished' to 'having completed' for a closer rendering of τελειώσας, and changed 'Increase and multiply' to the more standard and contextually fitting 'Be fruitful and multiply.'
translation:
  language: es
  text: 'Así pues, habiendo completado todas estas cosas, los bendijo y dijo: «Sean fecundos[a] y multiplíquense».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fecundos» traduce el valor verbal de αὐξάνεσθε en una forma natural del español; también puede leerse «fructíferos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα οὖν πάντα τελειώσας
  english_pob_choice: having completed all these things
  chosen_spanish: habiendo completado todas estas cosas
  alternatives_spanish:
  - cuando hubo terminado todas estas cosas
  - después de completar todas estas cosas
  lexicon: τελειόω
  rationale: Tened en cuenta el valor de τελειώσας como participio aoristo de acción culminada; «habiendo completado» mantiene la relación temporal y el matiz de culminación mejor que una simple secuencia narrativa.
- source_word: ἐπῄνεσεν αὐτὰ
  english_pob_choice: he praised them
  chosen_spanish: los bendijo
  alternatives_spanish:
  - los alabó
  - los elogió
  lexicon: εὐλογέω
  rationale: El texto griego continúa con ηὐλόγησεν, y en español conviene distinguir entre el acto de bendecir y el de alabar sin perder la progresión verbal. Aquí se preserva la distinción natural entre las dos acciones con «bendijo» como en el original, mientras que la primera acción se integra implícitamente en la construcción previa de clausura narrativa. Como la oración española debe ser fluida y el contexto inmediato ya lleva dos verbos consecutivos, se evita una repetición pesada manteniendo el sentido conjunto de beneplácito y bendición.
- source_word: ηὐλόγησεν
  english_pob_choice: blessed them
  chosen_spanish: los bendijo
  alternatives_spanish:
  - los bendijo con favor
  - los declaró benditos
  lexicon: εὐλογέω
  rationale: εὐλόγησεν se rinde de forma directa y habitual como «bendijo», que es transparente y fiel al verbo verbalmente explícito del griego.
- source_word: Αὐξάνεσθε καὶ πληθύνεσθε
  english_pob_choice: Be fruitful and multiply
  chosen_spanish: Sean fecundos y multiplíquense
  alternatives_spanish:
  - Fructifiquen y multiplíquense
  - Sean fructíferos y multiplíquense
  lexicon: αὐξάνω / πληθύνω
  rationale: La revisión inglesa corrigió «Increase and multiply» a la fórmula más estándar «Be fruitful and multiply», y el griego presenta dos imperativos coordinados. «Sean fecundos» expresa bien la idea de fecundidad/productividad biológica sin sonar arcaico, y «multiplíquense» conserva el paralelismo e imperativo plural.
theological_decisions:
- issue: Bendición y mandato en lenguaje de creación
  english_pob_reading: he praised them and blessed them and said, “Be fruitful and multiply.”
  chosen_spanish_reading: 'los bendijo y dijo: «Sean fecundos y multiplíquense»'
  alternative_spanish_readings:
  - 'los alabó y los bendijo y dijo: «Fructifiquen y multiplíquense»'
  - 'los bendijo y dijo: «Sean fructíferos y multiplíquense»'
  rationale: El pasaje alude al lenguaje de Génesis sobre bendición y fecundidad. Mantener «bendijo» y el mandato de fecundidad conserva la resonancia bíblica sin forzar una paráfrasis doctrinal.
  doctrine_reference: Génesis 1:22, 28
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde «when he had finished» a «having completed» y de «Increase and multiply» a «Be fruitful and multiply». Esta traducción sigue esa revisión más cercana al participio τελειώσας y a la fórmula bíblica habitual de fecundidad y multiplicación.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o cualquier mascaramiento del nombre divino porque este versículo no contiene el Tetragrámaton ni κύριος divino.
  - Se mantiene un registro sobrio y bíblico, con «bendijo» y el imperativo plural «multiplíquense» para reflejar el tono exhortativo del griego.
  - No se introduce «Cristo», «Yahvé» ni terminología doctrinal ajena al versículo.
  - La puntuación con comillas angulares es adecuada al español y distingue claramente el discurso directo.
