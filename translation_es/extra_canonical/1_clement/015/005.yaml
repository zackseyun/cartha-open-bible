source:
  edition: Funk 1901 (normalized OCR)
  text: διὰ τοῦτο ἄλαλα γενηθήτω τὰ χείλη τὰ δόλια τὰ λαλοῦντα κατὰ τοῦ δικαίου ἀνομίαν. καὶ πάλιν· Ἐξολεθρευθῆσαν κύριος πάντα τὰ χείλη τὰ δόλια, γλῶσσαν μεγαλοῤῥήμονα, τοὺς εἰπόντας· Τὴν γλῶσσαν ἡμῶν μεγαλυνοῦμεν, τὰ χείλη ἡμῶν παρ᾽ ἡμῖν ἐστιν· τίς ἡμῶν κύριός ἐστιν;
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/015/005.yaml
  text: Because of this, let the deceitful lips that speak lawlessness against the righteous become mute. And again, “May the Lord destroy all deceitful lips, the boastful tongue, those who say, ‘We will magnify our tongue; our lips are our own; who is lord over us?’”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:48Z'
    unchanged: false
    changes_summary: Changed 'make our tongue great' to 'magnify our tongue' for closer lexical correspondence to μεγαλυνοῦμεν and more formal register. Added the closing quotation mark.
translation:
  language: es
  text: 'Por esto, enmudezcan los labios engañosos[a] que hablan iniquidad contra el justo. Y otra vez: «Destruya el Señor a todos los labios engañosos, a la lengua jactanciosa, a los que dicen: “Magnificaremos nuestra lengua; nuestros labios son nuestros; ¿quién es señor sobre nosotros?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Enmudezcan» conserva el matiz imperativo de “become mute” y evita una reducción a mera silenciosidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλαλα γενηθήτω τὰ χείλη τὰ δόλια
  english_pob_choice: let the deceitful lips ... become mute
  chosen_spanish: enmudezcan los labios engañosos
  alternatives_spanish:
  - callen los labios engañosos
  - queden mudos los labios engañosos
  lexicon: ἄλαλα / χείλη / δόλια
  rationale: «Enmudezcan» reproduce el mandato de quedar sin habla con buena naturalidad en español y conserva la fuerza verbal de ἄλαλα γενηθήτω. «Labios engañosos» sigue δόλια sin suavizarlo a una idea más general de mentira.
- source_word: τὰ λαλοῦντα κατὰ τοῦ δικαίου ἀνομίαν
  english_pob_choice: that speak lawlessness against the righteous
  chosen_spanish: que hablan iniquidad contra el justo
  alternatives_spanish:
  - que hablan iniquidad contra los justos
  - que hablan ilegalidad contra el justo
  lexicon: λαλοῦντα / κατὰ τοῦ δικαίου / ἀνομίαν
  rationale: «Hablan iniquidad» mantiene el sustantivo moral fuerte de ἀνομίαν, en vez de reducirlo a «ilegalidad». Se eligió «el justo» porque el singular de τοῦ δικαίου puede funcionar como sustantivo; en español es una forma compacta y fiel.
- source_word: Ἐξολεθρευθῆσαν κύριος πάντα τὰ χείλη τὰ δόλια
  english_pob_choice: May the Lord destroy all deceitful lips
  chosen_spanish: Destruya el Señor a todos los labios engañosos
  alternatives_spanish:
  - Extermine el Señor a todos los labios engañosos
  - Destruya Yahvé a todos los labios engañosos
  lexicon: κύριος / Ἐξολεθρευθῆσαν / χείλη
  rationale: «Destruya» conserva la fuerza de Ἐξολεθρευθῆσαν en una súplica/jussivo solemne. Se usó «el Señor» porque el contexto cita un texto bíblico griego con κύριος como forma estable de cita; aquí el español tradicional de cita bíblica comunica mejor el referente sin introducir una decisión más fuerte sobre el nombre divino en la paráfrasis citacional.
- source_word: γλῶσσαν μεγαλοῤῥήμονα
  english_pob_choice: the boastful tongue
  chosen_spanish: la lengua jactanciosa
  alternatives_spanish:
  - la lengua altanera
  - la lengua arrogante
  lexicon: γλῶσσαν / μεγαλοῤῥήμονα
  rationale: «Jactanciosa» recoge el matiz de μεγαλοῤῥήμονα como lenguaje de autoexaltación y alarde, manteniendo la imagen de la lengua sin ampliar el sentido.
- source_word: Τὴν γλῶσσαν ἡμῶν μεγαλυνοῦμεν
  english_pob_choice: We will magnify our tongue
  chosen_spanish: Magnificaremos nuestra lengua
  alternatives_spanish:
  - Exaltaremos nuestra lengua
  - Haremos grande nuestra lengua
  lexicon: μεγαλυνοῦμεν
  rationale: «Magnificaremos» sigue de cerca el ajuste revisado del audit trail inglés y mantiene un registro formal. «Lengua» conserva la metáfora idiomática y evita sustituirla por una abstracción no presente.
- source_word: τὰ χείλη ἡμῶν παρ᾽ ἡμῖν ἐστιν
  english_pob_choice: our lips are our own
  chosen_spanish: nuestros labios son nuestros
  alternatives_spanish:
  - nuestros labios nos pertenecen
  - nuestros labios están con nosotros
  lexicon: παρ᾽ ἡμῖν ἐστιν
  rationale: La forma «son nuestros» es breve, idiomática y fiel al sentido posesivo de παρ᾽ ἡμῖν ἐστιν, sin sobreexplicar la noción de pertenencia.
- source_word: τίς ἡμῶν κύριός ἐστιν
  english_pob_choice: who is lord over us?
  chosen_spanish: ¿quién es señor sobre nosotros?
  alternatives_spanish:
  - ¿quién es nuestro señor?
  - ¿quién es señor de nosotros?
  lexicon: κύριός ἐστιν
  rationale: «Señor sobre nosotros» conserva la estructura de dominio/poder del griego y del inglés POB, con un español claro y sobrio.
theological_decisions:
- issue: Uso de κύριος en una cita bíblica griega frente al nombre divino
  english_pob_reading: May the Lord destroy ...
  chosen_spanish_reading: Destruya el Señor ...
  alternative_spanish_readings:
  - Destruya Yahvé ...
  - Destruya el Señor Dios ...
  rationale: En esta línea citacional, κύριος funciona como el equivalente griego transmitido del texto bíblico citado; el español de cita «el Señor» conserva la intertextualidad sin forzar una re-explicitación del nombre divino que el propio pasaje citado no desarrolla aquí.
  doctrine_reference: Intertextualidad bíblica y tratamiento del tetragrámaton en citas griegas
translation_notes:
  revision_awareness: Se incorporó el ajuste final del audit trail inglés en μεγαλυνοῦμεν con «Magnificaremos nuestra lengua», y se respetó el cierre de la cita con comillas. No se añadieron notas no ancladas; la única nota se ancla en «labios engañosos[a]».
  spanish_consistency_notes:
  - Se mantuvo «lengua» para γλῶσσα y «labios» para χείλη de manera consistente.
  - Se evitó traducir ἀνομίαν como «ilegalidad» para preservar su peso moral.
  - Se conservó el registro de cita bíblica con «el Señor» en la fórmula citacional, en línea con el griego κύριος de la fuente citada.
