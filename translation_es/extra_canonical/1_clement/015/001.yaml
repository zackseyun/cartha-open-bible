review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue fielmente el flujo del griego y del POB inglés: conserva la exhortación inicial, la cadena de citas escriturarias, el contraste entre paz piadosa e hipocresía, la fidelidad en el pacto y la cláusula final difícil sin sobreexplicarla. La principal desviación está en θήσομαι ἐν σωτηρίῳ, donde «Lo pondré en seguridad» suena poco idiomático en español y no comunica tan claramente el sentido protector como «Lo pondré a salvo».'
  spanish_quality_summary: 'El español es en general claro, digno y eclesialmente legible. Sin embargo, hay dos puntos de naturalidad: «desean la paz» puede simplificarse a «desean paz» para acercarse más al griego y sonar menos pesado, y «Lo pondré en seguridad» resulta poco natural en español bíblico actual. El resto mantiene buena cadencia y registro.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: κύριος divino como «Yahvé», διαθήκη como «pacto», εὐσέβεια como «piedad», ἀνομία como «iniquidad». «¿quién es señor sobre nosotros?» es una excepción justificada, ya que no refiere al nombre divino sino a señorío/autoridad. No se requieren notas léxicas adicionales.'
  issues:
  - severity: medium
    issue: «Lo pondré en seguridad» es poco idiomático para θήσομαι ἐν σωτηρίῳ
    rationale: Aunque intenta reflejar de cerca el inglés auditado, en español suena forzado y menos claro que «Lo pondré a salvo», que preserva el sentido de protección/seguridad documentado en el POB.
  - severity: low
    issue: «desean la paz» puede sonar más pesado que «desean paz»
    rationale: El griego βουλομένοις εἰρήνην no exige artículo; quitarlo mejora la naturalidad sin alterar el sentido ni el contraste con la primera cláusula.
