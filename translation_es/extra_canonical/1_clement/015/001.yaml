  to: 'Por tanto, unámonos a los que viven en paz con piedad, y no a los que desean paz con hipocresía. Porque en algún lugar dice: «Este pueblo me honra con los labios, pero su corazón está lejos de mí». Y otra vez: «Con su boca bendecían, pero con su corazón maldecían». Y otra vez dice: «Lo amaron con su boca, y con su lengua le mintieron; pero su corazón no era recto con él, ni fueron fieles en su pacto». Por esto, que se vuelvan mudos los labios engañosos que hablan iniquidad contra el justo. Y otra vez: «Que Yahvé destruya todos los labios engañosos, la lengua jactanciosa, a los que dicen: “Haremos grande nuestra lengua; nuestros labios son nuestros; ¿quién es señor sobre nosotros?” “A causa de la miseria de los pobres y a causa del gemido de los necesitados, ahora me levantaré”, dice Yahvé. “Lo pondré a salvo; hablaré abiertamente en él”».'
