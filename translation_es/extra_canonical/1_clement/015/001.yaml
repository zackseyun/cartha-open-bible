base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/015/001.yaml
  text: Therefore let us join ourselves to those who live in peace with godliness, and not to those who desire peace with hypocrisy. For somewhere it says, “This people honors me with their lips, but their heart is far from me.” And again, “With their mouth they were blessing, but with their heart they were cursing.” And again it says, “They loved him with their mouth, and with their tongue they lied to him; but their heart was not upright with him, nor were they faithful in his covenant.” Because of this, let the deceitful lips that speak lawlessness against the righteous become mute. And again, “May the Lord destroy all deceitful lips, the boastful tongue, those who say, ‘We will make our tongue great; our lips are our own; who is lord over us?’ ‘Because of the misery of the poor and because of the groaning of the needy, now I will arise,’ says the Lord. ‘I will set him in safety; I will speak openly in him.’”
