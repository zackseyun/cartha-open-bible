translation:
  language: es
  text: 'Por tanto, unámonos a los que viven en paz con piedad, y no a los que desean paz con hipocresía. Porque en algún lugar dice: «Este pueblo me honra con los labios, pero su corazón está lejos de mí». Y otra vez: «Con su boca bendecían, pero con su corazón maldecían». Y otra vez dice: «Lo amaron con su boca, y con su lengua le mintieron; pero su corazón no era recto con él, ni fueron fieles en su pacto». Por esto, que se vuelvan mudos los labios engañosos que hablan iniquidad contra el justo. Y otra vez: «Que Yahvé destruya todos los labios engañosos, la lengua jactanciosa, a los que dicen: “Haremos grande nuestra lengua; nuestros labios son nuestros; ¿quién es señor sobre nosotros?” “A causa de la miseria de los pobres y a causa del gemido de los necesitados, ahora me levantaré”, dice Yahvé. “Lo pondré a salvo; hablaré abiertamente en él”».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κολληθῶμεν
  english_pob_choice: let us join ourselves
  chosen_spanish: unámonos
  alternatives_spanish:
  - juntémonos
  - adherámonos
  lexicon: BDAG
  rationale: Expresa la exhortación a vincularse o alinearse con otros sin perder la fuerza deliberativa del aoristo subjuntivo exhortativo.
- source_word: τοῖς μετ᾽ εὐσεβείας εἰρηνεύουσιν
  english_pob_choice: those who live in peace with godliness
  chosen_spanish: los que viven en paz con piedad
  alternatives_spanish:
  - los que hacen la paz con piedad
  - los que están en paz de manera piadosa
  lexicon: BDAG
  rationale: Conserva el contraste entre la paz genuina y la mera apariencia, y mantiene εὐσέβεια como «piedad», término más natural que un calco como «devoción» en este contexto.
- source_word: μεθ᾽ ὑποκρίσεως βουλομένοις εἰρήνην
  english_pob_choice: those who desire peace with hypocrisy
  chosen_spanish: los que desean la paz con hipocresía
  alternatives_spanish:
  - los que quieren paz hipócritamente
  - los que desean paz de manera fingida
  lexicon: BDAG
  rationale: Mantiene la asociación instrumental/acompañante de ὑποκρίσεως y el contraste moral con la paz piadosa.
- source_word: πόρρω ἀπέστιν
  english_pob_choice: is far from me
  chosen_spanish: está lejos de mí
  alternatives_spanish:
  - está muy lejos de mí
  - está distante de mí
  lexicon: BDAG
  rationale: Reproduce la distancia relacional del texto citado con una expresión española natural y sobria.
- source_word: κατηρῶντο
  english_pob_choice: they were cursing
  chosen_spanish: maldecían
  alternatives_spanish:
  - estaban maldiciendo
  - proferían maldiciones
  lexicon: BDAG
  rationale: En español, el imperfecto simple «maldecían» conserva el valor de acción reiterada o característica sin forzar una perífrasis.
- source_word: ἐψεύσαντο αὐτόν
  english_pob_choice: they lied to him
  chosen_spanish: le mintieron
  alternatives_spanish:
  - mintieron contra él
  - obraron falsamente con él
  lexicon: BDAG
  rationale: Es la forma más directa y idiomática para conservar el objeto personal explícito.
- source_word: οὐκ εὐθεῖα
  english_pob_choice: was not upright
  chosen_spanish: no era recto
  alternatives_spanish:
  - no era íntegro
  - no era derecho
  lexicon: BDAG
  rationale: «Recto» comunica la rectitud moral del término sin desplazarlo a una abstracción excesiva.
- source_word: ἐπιστώθησαν
  english_pob_choice: were faithful
  chosen_spanish: fueron fieles
  alternatives_spanish:
  - fueron constantes
  - resultaron confiables
  lexicon: BDAG
  rationale: Sigue la decisión revisada en inglés y preserva la dimensión relacional y pactual del verbo en este contexto.
- source_word: διαθήκῃ
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - convenio
  lexicon: BDAG
  rationale: En español, «pacto» suena más natural en una cita bíblica abreviada y conserva la fuerza relacional del término; no se sustituye por lenguaje eclesial más técnico sin necesidad.
- source_word: ἄλαλα γενηθήτω
  english_pob_choice: let ... become mute
  chosen_spanish: que se vuelvan mudos
  alternatives_spanish:
  - que sean silenciados
  - que enmudezcan
  lexicon: BDAG
  rationale: Conserva el tono imprecatorio y la imagen vívida de la mudez.
- source_word: δόλια
  english_pob_choice: deceitful
  chosen_spanish: engañosos
  alternatives_spanish:
  - dolosos
  - falsos
  lexicon: BDAG
  rationale: «Engañosos» mantiene el campo semántico de falsedad deliberada aplicado a labios.
- source_word: ἀνομίαν
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - maldad
  lexicon: BDAG
  rationale: «Iniquidad» reproduce bien el registro bíblico de conducta contraria al orden de Dios sin sonar artificial en español.
- source_word: μεγαλοῤῥήμονα
  english_pob_choice: boastful
  chosen_spanish: jactanciosa
  alternatives_spanish:
  - arrogante
  - fanfarrona
  lexicon: BDAG
  rationale: Captura la idea de lenguaje inflado y autosuficiente con una equivalencia idiomática clara.
- source_word: Τὴν γλῶσσαν ἡμῶν μεγαλυνοῦμεν
  english_pob_choice: We will make our tongue great
  chosen_spanish: Haremos grande nuestra lengua
  alternatives_spanish:
  - Magnificaremos nuestra lengua
  - Exaltaremos nuestra lengua
  lexicon: BDAG
  rationale: Mantiene el paralelismo y la audacia del original con una construcción española comprensible y cercana al griego.
- source_word: τίς ἡμῶν κύριός ἐστιν
  english_pob_choice: who is lord over us?
  chosen_spanish: ¿quién es señor sobre nosotros?
  alternatives_spanish:
  - ¿quién es nuestro señor?
  - ¿quién manda sobre nosotros?
  lexicon: BDAG
  rationale: «Señor sobre nosotros» conserva la fuerza de desafío a la autoridad; aquí no se usa el nombre divino, porque el texto se trata de una pregunta de dominación humana, no de una cita del Tetragrámaton.
- source_word: ταλαιπωρίας
  english_pob_choice: misery
  chosen_spanish: miseria
  alternatives_spanish:
  - aflicción
  - angustia
  lexicon: BDAG
  rationale: Es un equivalente natural que conserva la intensidad del sufrimiento.
- source_word: πενήτων
  english_pob_choice: the needy
  chosen_spanish: los necesitados
  alternatives_spanish:
  - los pobres
  - los menesterosos
  lexicon: BDAG
  rationale: Distingue este término del anterior y conserva el paralelismo con un matiz de carencia real.
- source_word: θήσομαι ἐν σωτηρίῳ
  english_pob_choice: I will set him in safety
  chosen_spanish: Lo pondré en seguridad
  alternatives_spanish:
  - Lo estableceré en salvación
  - Lo pondré a salvo
  lexicon: BDAG
  rationale: Respeta el sentido protector del verbo y el sustantivo, manteniendo una fórmula breve y bíblica.
- source_word: παρρησιάσομαι ἐν αὐτῷ
  english_pob_choice: I will speak openly in him
  chosen_spanish: hablaré abiertamente en él
  alternatives_spanish:
  - hablaré con franqueza en él
  - me mostraré abiertamente en él
  lexicon: BDAG
  rationale: Conserva la decisión del inglés de mantener la cláusula difícil sin resolver por completo la referencia, y refleja el valor de hablar con libertad o abiertamente.
theological_decisions:
- issue: Citas escriturarias encadenadas como autoridad para la exhortación
  english_pob_reading: Preserve the scriptural quotation texture and covenant terminology rather than smoothing into generic moral discourse.
  chosen_spanish_reading: Conservar la cadencia de cita bíblica y el lenguaje de pacto, sin convertir el pasaje en una paráfrasis moral general.
  alternative_spanish_readings:
  - Aplanar las citas en una sola exhortación contemporánea
  - Sustituir el lenguaje de pacto por expresiones más generales
  rationale: La argumentación de Clement depende de la autoridad de las Escrituras citadas; la traducción debe dejar visible esa textura intertextual.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; DOCTRINE.md: consistency of key terms'
- issue: Término de alianza/covenio en el texto citado
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - convenio
  rationale: «Pacto» es el término bíblico más estable en español para διαθήκη y mantiene el peso relacional y teológico.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, preserve theological tension'
- issue: Cláusula final difícil παρρησιάσομαι ἐν αὐτῷ
  english_pob_reading: I will speak openly in him
  chosen_spanish_reading: hablaré abiertamente en él
  alternative_spanish_readings:
  - hablaré con franqueza en él
  - actuaré con libertad en él
  rationale: Se preserva la ambigüedad del griego sin sobreinterpretar el referente o el matiz preposicional.
  doctrine_reference: 'DOCTRINE.md: preserve ambiguity rather than resolve it'
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente que simplifica «were faithful» y «far from me», pero el español mantiene un equivalente natural ya acorde con esas decisiones: «fueron fieles» y «está lejos de mí». No se introdujeron notas porque el texto español no requiere alternativas ancladas para esta sección.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé para κύριος en la cita salmódica porque el contexto reproduce una palabra bíblica dirigida a Dios; no se aplicó a la pregunta retórica «¿quién es señor sobre nosotros?», donde κύριος funciona como título de autoridad humana o divina en sentido general.
  - Se evitó «Cristo» porque no aparece Χριστός en este pasaje.
  - Se prefirió «piedad» para εὐσέβεια y «pacto» para διαθήκη por consistencia con el registro bíblico y la lectura auditada.
  - Se mantuvo el contraste entre labios/boca/lengua y corazón sin suavizar la repetición retórica del pasaje.
