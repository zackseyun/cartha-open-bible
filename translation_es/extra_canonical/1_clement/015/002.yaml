    changes_summary: Changed “far away from me” to the more natural and standard “far from me.”
translation:
  language: es
  text: 'Porque en algún lugar dice: «Este pueblo me honra con los labios, pero su corazón está lejos de mí».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγει γάρ που
  english_pob_choice: For somewhere it says
  chosen_spanish: Porque en algún lugar dice
  alternatives_spanish:
  - Pues en algún lugar dice
  - Porque dice en cierto lugar
  lexicon: λέγω
  rationale: El griego introduce una cita sin precisar la referencia exacta; «en algún lugar» conserva esa indeterminación del POB inglés, y «dice» mantiene la fórmula de cita directa sin volverla demasiado literal o pesada.
- source_word: τοῖς χείλεσιν
  english_pob_choice: with their lips
  chosen_spanish: con los labios
  alternatives_spanish:
  - con sus labios
  - por los labios
  lexicon: χείλος
  rationale: «Con los labios» reproduce la imagen idiomática de medio externo de honra. La forma posesiva no es necesaria en español porque el contexto ya refiere a «este pueblo».
- source_word: τιμᾷ
  english_pob_choice: honors me
  chosen_spanish: me honra
  alternatives_spanish:
  - me venera
  - me da honor
  lexicon: τιμάω
  rationale: «Honra» es la correspondencia más directa y sobria para τιμάω en este contexto de respeto verbal externo frente a una disposición interior contraria.
- source_word: πόρρω ἀπέστιν ἀπ᾽ ἐμοῦ
  english_pob_choice: is far from me
  chosen_spanish: está lejos de mí
  alternatives_spanish:
  - está muy lejos de mí
  - está apartado de mí
  lexicon: πόρρω / ἀπέχω
  rationale: «Lejos de mí» sigue el español natural y la revisión inglesa más reciente («far from me»). «Alejado de mí» o «apartado de mí» podrían sonar más interpretativos; «lejos» conserva el contraste espacial/metafórico sin añadir matiz no exigido.
- source_word: ἡ δὲ καρδία αὐτῶν
  english_pob_choice: but their heart
  chosen_spanish: pero su corazón
  alternatives_spanish:
  - pero el corazón de ellos
  - pero su interior
  lexicon: καρδία
  rationale: «Corazón» conserva el centro personal/volitivo del hebreo y del griego bíblico. Se evita «interior» porque suaviza la imagen concreta del texto y no es necesario para la claridad.
theological_decisions:
- issue: Referencia no explícita de la cita
  english_pob_reading: For somewhere it says
  chosen_spanish_reading: Porque en algún lugar dice
  alternative_spanish_readings:
  - Porque dice en algún lugar
  - Porque en cierto lugar dice
  rationale: El texto no identifica la fuente; mantener la vaguedad respeta la forma del original y evita atribuir la cita a una localización precisa que el autor no da.
  doctrine_reference: Uso retórico de cita implícita en la Escritura y en la tradición apostólica
- issue: Contraste entre honor exterior e interioridad distante
  english_pob_reading: honors me with their lips, but their heart is far from me
  chosen_spanish_reading: me honra con los labios, pero su corazón está lejos de mí
  alternative_spanish_readings:
  - me honra de labios, pero su corazón está lejos de mí
  - me honra con sus labios, pero su corazón está lejos de mí
  rationale: 'La formulación conserva el contraste moral del pasaje: palabras de honor sin correspondencia del centro personal. No se suaviza hacia mera hipocresía explícita, porque el texto describe primero la distancia interior y luego el honor verbal.'
  doctrine_reference: Integridad del culto y la obediencia interior
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «far away from me» por «far from me» por naturalidad. La frase española «está lejos de mí» sigue esa misma dirección y evita un intensificador innecesario.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» solo si aparecen explícitamente; aquí el texto dice «me» sin nombrar al referente, por lo que se conserva la primera persona.
  - Se mantiene un registro bíblico sobrio y claro, sin recurrir a arcaísmos innecesarios.
  - No se añade referencia bíblica entre corchetes porque el texto fuente no la explicita y el POB inglés tampoco la incluyó.
