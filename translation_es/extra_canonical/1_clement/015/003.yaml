translation:
  language: es
  text: 'Y de nuevo: «Con su boca estaban bendiciendo, pero con su corazón estaban maldiciendo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ πάλιν
  english_pob_choice: And again
  chosen_spanish: Y de nuevo
  alternatives_spanish:
  - Y otra vez
  - Y nuevamente
  lexicon: καὶ πάλιν
  rationale: La fórmula introduce una nueva cita o reiteración; «de nuevo» conserva la repetición con naturalidad en español sin cargar el texto con una redundancia innecesaria.
- source_word: Τῷ στόματι αὐτῶν
  english_pob_choice: With their mouth
  chosen_spanish: Con su boca
  alternatives_spanish:
  - Con la boca de ellos
  - Por su boca
  lexicon: στόμα
  rationale: La preposición instrumental está bien representada por «con». En español, el posesivo singular colectivo «su» resulta más natural y readable que una perífrasis literal.
- source_word: εὐλογοῦσαν
  english_pob_choice: were blessing
  chosen_spanish: estaban bendiciendo
  alternatives_spanish:
  - bendecían
  - seguían bendiciendo
  lexicon: εὐλογέω
  rationale: El imperfecto expresa acción continua o habitual; «estaban bendiciendo» preserva ese aspecto sin perder claridad. «Bendecían» sería más breve, pero menos explícito respecto del valor aspectual.
- source_word: τῇ δὲ καρδίᾳ αὐτῶν
  english_pob_choice: but with their heart
  chosen_spanish: pero con su corazón
  alternatives_spanish:
  - pero con el corazón de ellos
  - mas con su corazón
  lexicon: καρδία
  rationale: «Corazón» es la equivalencia directa y adecuada para la sede interior de intención y afecto. La conjunción adversativa «pero» refleja bien el contraste del griego con δέ.
- source_word: κατηρῶντο
  english_pob_choice: were cursing
  chosen_spanish: estaban maldiciendo
  alternatives_spanish:
  - maldecían
  - imprecaban
  lexicon: καταράομαι
  rationale: «Maldiciendo» conserva el paralelismo con «bendiciendo» y comunica la oposición moral del pasaje. «Imprecaban» sería posible, pero menos transparente para el lector general.
theological_decisions:
- issue: Contraste entre palabra externa e intención interna
  english_pob_reading: With their mouth they were blessing, but with their heart they were cursing.
  chosen_spanish_reading: Con su boca estaban bendiciendo, pero con su corazón estaban maldiciendo.
  alternative_spanish_readings:
  - Con la boca bendecían, pero con el corazón maldecían
  - Bendecían con la boca, pero maldecían con el corazón
  rationale: El punto teológico-retórico del texto es el contraste entre la confesión verbal y la disposición interna. La versión mantiene ese paralelismo sin suavizar la acusación.
  doctrine_reference: Sal 62:4; Mt 15:8-9; Stg 3:9-10
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y sin cambios necesarios; se conserva el sentido del texto griego normalizado y la equivalencia óptima de la tradición auditada en inglés.
  spanish_consistency_notes:
  - Se mantiene el paralelismo verbal 'bendiciendo / maldiciendo' para reflejar el contraste del original.
  - Se evita introducir terminología eclesiástica ajena al griego; el texto permanece directo y sobrio.
  - La puntuación con comillas angulares sigue el registro bíblico en español y separa claramente la cita introducida por 'de nuevo'.
