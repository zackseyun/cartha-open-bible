base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/015/004.yaml
  text: And again it says, “They loved him with their mouth, and with their tongue they lied to him; but their heart was not upright with him, nor were they faithful in his covenant.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:47Z'
    unchanged: false
    changes_summary: Removed 'found' before 'faithful' to more directly reflect ἐπιστώθησαν ('were faithful'/'proved faithful') without adding an interpretive nuance not present in the Greek.
translation:
  language: es
  text: 'Y otra vez dice: «Lo amaron con su boca, y con su lengua le mintieron; pero su corazón no era recto con él, ni fueron fieles en su alianza».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ πάλιν λέγει
  english_pob_choice: And again it says
  chosen_spanish: Y otra vez dice
  alternatives_spanish:
  - Y de nuevo dice
  - Y otra vez afirma
  lexicon: καί; πάλιν; λέγω
  rationale: Reproduce la repetición enfática del griego con una fórmula natural en español. «Dice» mantiene la cita introducida sin añadir sujeto explícito que el texto no requiere.
- source_word: Ἠγάπησαν αὐτὸν
  english_pob_choice: They loved him
  chosen_spanish: Lo amaron
  alternatives_spanish:
  - Le amaron
  - Amaron a él
  lexicon: ἀγαπάω
  rationale: «Amaron» refleja el verbo de amor del original; el pronombre de objeto directo «lo» es la forma más natural y clara en español para αὐτόν.
- source_word: τῷ στόματι αὐτῶν
  english_pob_choice: with their mouth
  chosen_spanish: con su boca
  alternatives_spanish:
  - con su labio
  - con sus labios
  lexicon: στόμα
  rationale: «Boca» corresponde de manera directa al órgano de habla del griego. Se evita una literalidad extraña como «con su boca» sí es idiomática; se mantiene la imagen corporal del texto.
- source_word: τῇ γλώσσῃ αὐτῶν
  english_pob_choice: with their tongue
  chosen_spanish: con su lengua
  alternatives_spanish:
  - con su hablar
  - con su palabra
  lexicon: γλῶσσα
  rationale: «Lengua» conserva el paralelismo con «boca» y el sentido concreto del órgano de habla, sin suavizarlo a una abstracción.
- source_word: ἐψεύσαντο αὐτόν
  english_pob_choice: they lied to him
  chosen_spanish: le mintieron
  alternatives_spanish:
  - mintieron contra él
  - lo engañaron
  lexicon: ψεύδομαι
  rationale: «Mentir» expresa el acto verbal del griego. El dativo αὐτόν se vierte de forma natural como «le» en español.
- source_word: ἡ δὲ καρδία αὐτῶν οὐκ εὐθεῖα μετ᾽ αὐτοῦ
  english_pob_choice: but their heart was not upright with him
  chosen_spanish: pero su corazón no fue recto con él
  alternatives_spanish:
  - pero su corazón no estaba recto con él
  - pero su corazón no fue íntegro con él
  lexicon: καρδία; εὐθύς; μετά
  rationale: «Recto» conserva la imagen moral de εὐθεῖα y la relación con Dios/hombre sin desplazarla a una paráfrasis. El singular colectivo «corazón» sigue el griego.
- source_word: οὐδὲ ἐπιστώθησαν ἐν τῇ διαθήκῃ αὐτοῦ
  english_pob_choice: nor were they faithful in his covenant
  chosen_spanish: ni fueron fieles en su pacto
  alternatives_spanish:
  - ni se mostraron fieles en su pacto
  - ni fueron hallados fieles en su pacto
  lexicon: πιστόω; διαθήκη
  rationale: La revisión inglesa eliminó «found» para no añadir una idea no presente; el español sigue esa decisión con «fueron fieles», que refleja la fidelidad/probidad del verbo sin introducir una localización judicial ajena al griego. «Pacto» traduce διαθήκη en sentido de alianza pactal, término ya comprensible en español bíblico.
theological_decisions:
- issue: Relación entre fidelidad y pacto
  english_pob_reading: nor were they faithful in his covenant
  chosen_spanish_reading: ni fueron fieles en su pacto
  alternative_spanish_readings:
  - ni se mostraron fieles en su pacto
  - ni permanecieron fieles en su pacto
  rationale: El griego enfatiza la falta de fidelidad dentro de la relación pactal. «Pacto» preserva el marco teológico sin sustituirlo por un término más eclesiástico o más interpretativo.
  doctrine_reference: Teología bíblica del pacto / fidelidad del pueblo
- issue: Paralelismo externo e interno
  english_pob_reading: with their mouth... with their tongue... but their heart
  chosen_spanish_reading: con su boca... con su lengua... pero su corazón
  alternative_spanish_readings:
  - con su boca... con su lengua... pero su interior
  rationale: Se conserva la progresión retórica entre exterioridad verbal e interioridad moral, importante para la admonición ética del pasaje.
  doctrine_reference: Antropología bíblica / integridad del corazón
translation_notes:
  revision_awareness: La base inglesa fue revisada una vez para eliminar «found» antes de «faithful», a fin de no añadir una inferencia ausente del griego ἐπιστώθησαν. La traducción española sigue esa última revisión y evita equivalentes que introduzcan esa noción.
  spanish_consistency_notes:
  - Se mantiene «pacto» para διαθήκη, coherente con un registro bíblico amplio y no eclesiástico.
  - Se conserva el paralelismo boca/lengua/corazón para reflejar la fuerza retórica del griego.
  - No se introduce «Cristo» ni «Señor»; el versículo citado no contiene esos términos en el texto fuente.
