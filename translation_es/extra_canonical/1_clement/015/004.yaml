- from: 'Y otra vez dice: «Lo amaron con su boca, y con su lengua le mintieron; pero su corazón no fue recto con él, ni fueron fieles en su pacto».'
  to: 'Y otra vez dice: «Lo amaron con su boca, y con su lengua le mintieron; pero su corazón no era recto con él, ni fueron fieles en su alianza».'
  rationale: Se ajusta «no fue recto» a «no era recto» para un español más natural y fiel al valor descriptivo del pasaje, y se cambia «pacto» por «alianza» para una terminología bíblica más idiomática y ampliamente inteligible en español eclesial.
