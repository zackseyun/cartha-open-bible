source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ πάλιν λέγει· Ἠγάπησαν αὐτὸν τῷ στόματι αὐτῶν καὶ τῇ γλώσσῃ αὐτῶν ἐψεύσαντο αὐτόν, ἡ δὲ καρδία αὐτῶν οὐκ εὐθεῖα μετ᾽ αὐτοῦ, οὐδὲ ἐπιστώθησαν ἐν τῇ διαθήκῃ αὐτοῦ.
