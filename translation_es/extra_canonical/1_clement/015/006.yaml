  text: ἀπὸ τῆς ταλαιπωρίας τῶν πτωχῶν καὶ τοῦ στεναγμοῦ τῶν πενήτων νῦν ἀναστήσομαι, λέγει κύριος· θήσομαι ἐν σωτηρίῳ.
