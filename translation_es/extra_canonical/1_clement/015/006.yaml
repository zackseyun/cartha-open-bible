    issue: 'Expresión poco idiomática: «Lo pondré en seguridad»'
    rationale: Aunque intenta seguir de cerca θήσομαι ἐν σωτηρίῳ, en español suena forzado. «Lo pondré a salvo» preserva mejor el sentido de colocar/proteger a alguien en seguridad sin perder fidelidad.
  revised_spanish_text: «A causa de la miseria de los pobres y del gemido de los necesitados, ahora me levantaré», dice el Señor. «Lo pondré a salvo».
  revision_rationale: 'Se mantiene toda la estructura y el singular final del griego, pero se reemplaza una construcción calcada y poco natural por una expresión española más fiel al sentido y más legible: «lo pondré a salvo».'
