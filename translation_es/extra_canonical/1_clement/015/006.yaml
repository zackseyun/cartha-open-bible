base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/015/006.yaml
  text: ‘Because of the misery of the poor and because of the groaning of the needy, now I will arise,’ says the Lord. ‘I will set him in safety.’
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:47Z'
    unchanged: false
    changes_summary: Added the missing closing quotation mark and period. The wording otherwise accurately reflects the Greek, including the singular object in ‘I will set him in safety.’
translation:
  language: es
  text: «A causa de la miseria de los pobres y del gemido de los necesitados, ahora me levantaré», dice el Señor. «Lo pondré a salvo».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τῆς ταλαιπωρίας
  english_pob_choice: misery
  chosen_spanish: miseria
  alternatives_spanish:
  - aflicción
  - miseria
  - desgracia
  lexicon: ταλαιπωρία
  rationale: La frase griega expresa una condición de gran aflicción o penuria. «Miseria» comunica bien la gravedad del sufrimiento y mantiene un tono natural en español; «aflicción» suaviza un poco el matiz material, y «desgracia» desplaza el foco.
- source_word: τῶν πτωχῶν
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los indigentes
  lexicon: πτωχός
  rationale: Πτωχοί denota a los pobres en sentido social y económico. «Los pobres» es la correspondencia más directa y clara; «los necesitados» interpreta más libremente el estado de carencia.
- source_word: τοῦ στεναγμοῦ
  english_pob_choice: groaning
  chosen_spanish: del gemido
  alternatives_spanish:
  - del clamor
  - del suspirar
  - del gemir
  lexicon: στεναγμός
  rationale: El sustantivo griego refiere al gemido o suspiro de dolor. «Gemido» conserva el valor auditivo y emocional del término sin sobrecargarlo de interpretación.
- source_word: τῶν πενήτων
  english_pob_choice: the needy
  chosen_spanish: los necesitados
  alternatives_spanish:
  - los pobres
  - los menesterosos
  lexicon: πενής
  rationale: Πενήτες enfatiza a quienes carecen de recursos. «Los necesitados» expresa esa carencia de forma natural en español y evita repetir «pobres» innecesariamente.
- source_word: ἀναστήσομαι
  english_pob_choice: I will arise
  chosen_spanish: me levantaré
  alternatives_spanish:
  - me alzaré
  - me pondré de pie
  lexicon: ἀνίστημι
  rationale: En este contexto, el verbo indica levantarse para intervenir o actuar. «Me levantaré» es idiomático en español y preserva el sentido de pronta acción divina.
- source_word: θήσομαι ἐν σωτηρίῳ
  english_pob_choice: I will set him in safety
  chosen_spanish: Lo pondré en seguridad
  alternatives_spanish:
  - Lo pondré a salvo
  - Lo estableceré en salvación
  lexicon: τίθημι + σωτήριον
  rationale: La construcción transmite la idea de colocar a alguien en una स्थिति de seguridad o protección. «Lo pondré en seguridad» sigue de cerca la fuerza del griego y conserva la imagen de resguardo; «a salvo» sería más idiomático pero menos cercano, y «en salvación» sonaría demasiado abstracto en español.
theological_decisions:
- issue: ¿A quién se refiere el singular de «Lo pondré en seguridad»?
  english_pob_reading: The English POB preserves the singular object without adding an explicit antecedent, matching the Greek singular pronoun/object form in the cited clause.
  chosen_spanish_reading: «Lo pondré en seguridad» mantiene el singular sin suplir un antecedente explícito.
  alternative_spanish_readings:
  - «Los pondré en seguridad»
  - «Los estableceré a salvo»
  rationale: El texto griego termina con una forma singular, y la revisión inglesa destacó que ese rasgo se conserva. En español conviene mantener esa misma tensión textual en vez de pluralizar o explicitar un referente que no está en el texto base.
  doctrine_reference: Textual fidelity to the Greek singular object; no doctrinal expansion.
- issue: 'Identidad del hablante: «dice el Señor»'
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice Yahvé
  - dice el Señor Dios
  rationale: La cita griega introduce la fórmula κύριος. Dado que el texto fuente y la auditoría inglesa usan «the Lord» en una cita profética, en español se mantiene «el Señor» como fórmula de cita, sin introducir aquí la convención de reemplazarla por «Yahvé» cuando la forma transmitida es la cita bíblica ya mediada por κύριος.
  doctrine_reference: Quotation formula for κύριος in a scriptural citation.
translation_notes:
  revision_awareness: La auditoría inglesa revisó únicamente la puntuación final, añadiendo la comilla de cierre y el punto; el contenido léxico permaneció estable. La versión española conserva ese mismo contenido y la misma clausura de cita.
  spanish_consistency_notes:
  - Se mantiene la cadencia de cita directa en dos segmentos, como en el texto griego y en la versión inglesa auditada.
  - «Pobres» y «necesitados» reproducen la doble designación social del original sin fusionarlas.
  - Se preserva el singular final de «Lo pondré en seguridad» para respetar la observación de la auditoría inglesa sobre la forma griega.
  - Se usa «el Señor» como fórmula citacional de κύριος en este contexto, sin introducir una sustitución interpretativa adicional.
