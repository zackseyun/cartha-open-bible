lexical_decisions:
- source_word: παρρησιάσομαι
  english_pob_choice: I will speak boldly
  chosen_spanish: hablaré con valentía
  alternatives_spanish:
  - hablaré con confianza
  - hablaré abiertamente
  lexicon: παρρησιάζομαι
  rationale: El verbo griego expresa hablar con franqueza y con libertad de ánimo; la revisión inglesa fijó 'speak boldly', por lo que 'hablaré con valentía' conserva la fuerza de audacia sin introducir una idea de simple apertura que sería demasiado débil.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por él
  - en su caso
  lexicon: ἐν + pronombre personal
  rationale: Se mantiene la preposición 'en' para reflejar la decisión revisada del inglés ('in him') y no sustituirla por una paráfrasis causal. En español, 'en él' conserva la relación literal y deja la ambigüedad interpretativa del giro griego.
theological_decisions:
- issue: Referencia del pronombre y alcance de la expresión
  english_pob_reading: '''in him'' more accurately reflects ἐν αὐτῷ than ''for him'''
  chosen_spanish_reading: '''en él'' mantiene la forma directa sin resolver de más la referencia'
  alternative_spanish_readings:
  - '''por él'' interpretaría el sentido como representación o beneficio'
  - '''en su caso'' explicitaría una idea contextual no expresada de forma directa'
  rationale: El texto griego es breve y depende del contexto anterior; la traducción española no debe cerrar la ambigüedad. 'En él' es formalmente fiel y deja abierta la conexión contextual con la persona mencionada antes.
  doctrine_reference: Salmo 11:6 LXX / citación en 1 Clemente 15:7
translation_notes:
  revision_awareness: La revisión más reciente del inglés corrigió una paráfrasis demasiado interpretativa ('for him') y volvió a 'in him'. La versión española sigue esa lectura revisada y evita una nota innecesaria, porque 'en él' ya refleja con suficiente claridad la forma griega sin añadir un matiz no documentado.
  spanish_consistency_notes:
  - Se evitó 'con audacia' porque 'valentía' comunica mejor la franqueza confiada del verbo griego en español bíblico contemporáneo.
  - Se mantuvo la construcción simple 'hablaré ... en él' para respetar la brevedad del original.
  - No se usó 'abiertamente' como texto principal, porque en español podría suavizar el matiz de confianza pública que el contexto sugiere.
