    timestamp: '2026-04-23T11:35:22Z'
    unchanged: false
    changes_summary: Replaced 'Attach yourselves'/'attach themselves' with 'Cling to'/'cling to' for a more natural and faithful rendering of κολλᾶσθε/κολλώμενοι, while preserving the formal tone and meaning.
translation:
  language: es
  text: 'Porque está escrito: «Aférrense[a] a los santos, porque los que se aferran a ellos serán santificados»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Aférrense» traduce κολλᾶσθε, con la idea de adherirse firmemente o apegarse estrechamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κολλᾶσθε
  english_pob_choice: Cling to
  chosen_spanish: Péguense a
  alternatives_spanish:
  - Aférrense a
  - Abrácense a
  - Permanezcan unidos a
  lexicon: κολλάω
  rationale: El verbo griego expresa adherirse fuertemente, pegarse, aferrarse. En español, «péguense a» conserva la imagen corporal y la fuerza relacional sin sonar tan poco natural como una calca literal. Se evita «séanse» o «sigan» porque debilitan la intensidad del verbo.
- source_word: τοῖς ἁγίοις
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los consagrados
  - los que son santos
  lexicon: ἅγιος
  rationale: ἅγιος designa a los apartados para Dios; en español eclesial, «los santos» comunica bien el referente colectivo. «Los consagrados» explicita el sentido pero pierde la designación tradicional del grupo.
- source_word: ἁγιασθήσονται
  english_pob_choice: will be made holy
  chosen_spanish: serán santificados
  alternatives_spanish:
  - serán hechos santos
  - serán consagrados
  lexicon: ἁγιάζω
  rationale: El pasivo futuro de ἁγιάζω se rinde con «serán santificados» para mantener el paralelo con «santos» y la pasiva divina implícita. «Serán hechos santos» es claro, pero menos idiomático y menos técnico.
theological_decisions:
- issue: Relación entre los santos y la santificación
  english_pob_reading: those who cling to them will be made holy
  chosen_spanish_reading: los que se pegan a ellos serán santificados
  alternative_spanish_readings:
  - los que se adhieren a ellos serán santificados
  - los que se unen a ellos serán santificados
  rationale: 'Se conserva la tensión del dicho: la cercanía a los santos aparece como medio de santificación. No se suaviza a una mera asociación social, porque el griego y la lectura inglesa mantienen un efecto causal fuerte.'
  doctrine_reference: Santificación; comunión de los santos
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que cambió «Attach yourselves to» por «Cling to» para expresar mejor κολλᾶσθε/κολλώμενοι. Por eso se eligió «Péguense a» en lugar de una formulación más neutra o meramente reflexiva.
  spanish_consistency_notes:
  - Se mantuvo un registro eclesial sobrio y publicable.
  - Se preservó la repetición verbal entre «Péguense a» y «los que se pegan a» para reflejar el paralelismo griego.
  - No se sustituyó «santos» por un equivalente explicativo más largo, para conservar la fuerza del término bíblico.
