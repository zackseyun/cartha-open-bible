review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: γέγραπται γάρ = «Porque está escrito», κολλᾶσθε/κολλώμενοι = idea de adherirse estrechamente, τοῖς ἁγίοις = «los santos/los santos», y ἁγιασθήσονται = futuro pasivo «serán santificados / serán hechos santos». Sin embargo, «péguense» y «se pegan» en español actual suenan coloquiales e incluso pueden sugerir contacto físico impropio, mientras que el inglés auditado eligió «cling» precisamente para una adhesión fuerte pero digna. Conviene ajustar el verbo para preservar mejor el tono y la fuerza semántica.'
  spanish_quality_summary: La frase es comprensible, pero «Péguense a los santos» no suena natural ni digna en registro bíblico-eclesial. «Aférrense a» y «se aferran a» mejora mucho la legibilidad y mantiene la intensidad relacional. También sobran las notas a tres segmentos que no generan ambigüedad real en español; una nota léxica sobre el verbo basta si se desea conservar explicación.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «los santos» para ἁγίοις y «serán santificados» para ἁγιασθήσονται están bien alineados. El único desajuste es estilístico-lexical en κολλᾶσθε/κολλώμενοι: el español propuesto debería acercarse más a «aferrarse/adherirse» que a «pegarse».'
  issues:
  - severity: medium
    issue: «Péguense a / se pegan a» suena coloquial y poco digno
    rationale: Aunque capta parcialmente κολλάω, en español moderno puede sonar físico, infantil o impropio del registro eclesial. El inglés POB revisó a «Cling to», y «Aférrense a» preserva mejor esa fuerza.
  - severity: low
    issue: Exceso de notas léxicas innecesarias
    rationale: Las notas a «Porque está escrito», «los santos» y la pasiva final no parecen necesarias para resolver ambigüedad ni preservar una alternativa significativa. Una sola nota sobre el matiz de κολλάω es suficiente, si se incluye alguna.
  revised_spanish_text: 'Porque está escrito: «Aférrense[a] a los santos, porque los que se aferran a ellos serán santificados»'
  revised_footnotes:
  - marker: a
    text: «Aférrense» traduce κολλᾶσθε, con la idea de adherirse firmemente o apegarse estrechamente.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «Péguense a / se pegan a» por «Aférrense a / se aferran a» para reflejar mejor κολλᾶσθε/κολλώμενοι con un español más natural, digno y fiel al ajuste del inglés POB a «Cling to». Se conservan «los santos» y «serán santificados» por su buena correspondencia con ἁγίοις y ἁγιασθήσονται. Se reducen las notas a una sola nota léxica útil.
