revisions:
- from: 'Porque está escrito: «[a]Péguense a los santos[b], porque los que se pegan a ellos serán santificados»[c].'
  to: 'Porque está escrito: «Aférrense[a] a los santos, porque los que se aferran a ellos serán santificados»'
  rationale: Se reemplaza «Péguense a / se pegan a» por «Aférrense a / se aferran a» para reflejar mejor κολλᾶσθε/κολλώμενοι con un español más natural, digno y fiel al ajuste del inglés POB a «Cling to». Se conservan «los santos» y «serán santificados» por su buena correspondencia con ἁγίοις y ἁγιασθήσονται. Se reducen las notas a una sola nota léxica útil.
