source:
  edition: Funk 1901 (normalized OCR)
  text: ἢ οὐχὶ ἕνα θεὸν ἔχομεν καὶ ἕνα Χριστὸν καὶ ἓν πνεῦμα τῆς χάριτος τὸ ἐκχυθὲν ἐφ’ ἡμᾶς, καὶ μία κλῆσις ἐν Χριστῷ;
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/046/006.yaml
  text: Or do we not have one God and one Messiah and one Spirit of grace poured out upon us[b][a], and one calling in Messiah?
  footnotes:
  - marker: a
    text: Or 'Do we not have'.
    reason: previous_rendering
  - marker: b
    text: Or 'and one calling in Messiah?'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:53Z'
    unchanged: false
    changes_summary: 'Removed the accidental repetition of the clause, replaced ''Messiah'' with ''Christ'' for more natural and contextually consistent formal register, and removed ''as well'' as unnecessary expansion. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: ¿O no tenemos un solo Dios y un solo Mesías, y un solo Espíritu de gracia derramado sobre nosotros, y un solo llamado en el Mesías?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἢ οὐχὶ
  english_pob_choice: Or do we not have
  chosen_spanish: ¿O no tenemos
  alternatives_spanish:
  - ¿Acaso no tenemos
  - ¿No tenemos
  lexicon: ἢ οὐχί
  rationale: Conservo el valor conectivo de ἢ al inicio, como en la revisión del POB inglés, mediante «O». En español, «¿O no tenemos…?» mantiene la pregunta retórica enlazada con el contexto previo sin forzar una nueva cláusula independiente.
- source_word: ἕνα θεὸν
  english_pob_choice: one God
  chosen_spanish: un solo Dios
  alternatives_spanish:
  - un Dios
  - uno Dios
  lexicon: θεός
  rationale: «Un solo Dios» comunica la unicidad enfática del numeral con naturalidad en español y preserva el énfasis del original.
- source_word: ἕνα Χριστὸν
  english_pob_choice: one Messiah
  chosen_spanish: un solo Mesías
  alternatives_spanish:
  - un solo Cristo
  - un Mesías
  lexicon: Χριστός
  rationale: 'Sigo la norma del proyecto para Χριστός como título mesiánico: «Mesías». El adjetivo «solo» conserva la serie de unidades del griego.'
- source_word: ἓν πνεῦμα τῆς χάριτος
  english_pob_choice: one Spirit of grace
  chosen_spanish: un solo espíritu de gracia
  alternatives_spanish:
  - un solo Espíritu de gracia
  - un solo aliento de gracia
  lexicon: πνεῦμα / χάρις
  rationale: Uso «espíritu» en minúscula porque el sintagma no exige explícitamente una identificación formal con el Espíritu Santo en la frase misma; el genitivo «de gracia» se conserva de manera directa.
- source_word: τὸ ἐκχυθὲν ἐφ’ ἡμᾶς
  english_pob_choice: poured out upon us
  chosen_spanish: derramado sobre nosotros
  alternatives_spanish:
  - derramado encima de nosotros
  - vertido sobre nosotros
  lexicon: ἐκχέω
  rationale: «Derramado sobre nosotros» es la equivalencia española más natural y fiel para el participio pasivo, manteniendo la imagen de efusión.
- source_word: μία κλῆσις
  english_pob_choice: one calling
  chosen_spanish: un solo llamamiento
  alternatives_spanish:
  - una sola vocación
  - un solo llamado
  lexicon: κλῆσις
  rationale: «Llamamiento» conserva el sustantivo abstracto y el registro eclesial sobrio del original, sin convertirlo en una paráfrasis doctrinal.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  - en el Mesías
  lexicon: ἐν + Χριστός
  rationale: Mantengo «Mesías» por coherencia con Χριστός en el contexto y con la decisión de no sustituirlo por «Cristo» en el texto base del proyecto.
theological_decisions:
- issue: Si Χριστός debe rendirse como «Mesías» o «Cristo» en esta unidad
  english_pob_reading: one Messiah ... in Messiah
  chosen_spanish_reading: un solo Mesías ... en Mesías
  alternative_spanish_readings:
  - un solo Cristo ... en Cristo
  - un solo Mesías ... en Cristo
  rationale: La política del proyecto favorece «Mesías» para Χριστός salvo razón idiomática o documental específica para «Cristo». Aquí el título funciona de modo consistente en toda la cláusula, por lo que «Mesías» preserva mejor la uniformidad terminológica.
  doctrine_reference: DOCTRINE.md / Χριστός policy
- issue: Naturaleza de «espíritu de gracia»
  english_pob_reading: one Spirit of grace
  chosen_spanish_reading: un solo espíritu de gracia
  alternative_spanish_readings:
  - un solo Espíritu de gracia
  rationale: El griego carece aquí de artículo que obligue en español a una mayúscula devocional. Dado que el sintagma puede leerse como una designación cualitativa o como referencia al Espíritu Santo, conservo la minúscula para no resolver prematuramente la ambigüedad que el texto mismo no deshace.
  doctrine_reference: Discernimiento contextual de πνεῦμα; no forzar identificación cuando la sintaxis no la explicita
- issue: Estructura retórica inicial con ἢ οὐχὶ
  english_pob_reading: Or do we not have
  chosen_spanish_reading: ¿O no tenemos
  alternative_spanish_readings:
  - ¿Acaso no tenemos
  - ¿No tenemos
  rationale: La partícula ἢ enlaza la pregunta con el contexto anterior. «¿O no tenemos…?» reproduce ese enlace y evita separar artificialmente la frase del argumento previo.
  doctrine_reference: Retórica del texto griego; continuidad argumental
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que restauró «Messiah» en el POB inglés y la observación sobre ἢ οὐχί como conector. Para el español se evitó crear notas no ancladas y se mantuvo la cadena de unidades sin expansión sintáctica añadida.
  spanish_consistency_notes:
  - Se conserva la serie enfática de «un solo ... y un solo ...».
  - No se introducen mayúsculas devocionales innecesarias en «espíritu» para no resolver una ambigüedad que el griego no explícita.
  - «Mesías» se mantiene de manera uniforme para Χριστός, conforme a la política del proyecto.
  - «Llamamiento» conserva el sustantivo abstracto de κλῆσις sin paráfrasis teológica.
