review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: mantiene el enlace retórico inicial de ἢ οὐχὶ con «¿O no tenemos…?», refleja la serie enfática de «uno», y preserva Χριστός como «Mesías» conforme a la política del proyecto. También traduce con fidelidad τὸ ἐκχυθὲν ἐφ’ ἡμᾶς como «derramado sobre nosotros». Sin embargo, «espíritu de gracia» en minúscula debilita una lectura muy probable de πνεῦμα aquí como referencia al Espíritu, especialmente con «derramado sobre nosotros», y «en Mesías» suena poco natural en español cuando el título se usa sin artículo en esa construcción.'
  spanish_quality_summary: 'El español es generalmente claro, pero hay dos puntos mejorables para legibilidad eclesial y naturalidad: «un solo llamamiento» es comprensible pero más pesado que «un solo llamado», y sobre todo «en Mesías» resulta rígido y poco idiomático. «En el Mesías» mantiene la terminología del proyecto y suena mejor en español. Además, «Espíritu de gracia» con mayúscula mejora la lectura natural de la frase sin introducir una paráfrasis.'
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: θεός → «Dios», Χριστός → «Mesías». La principal corrección propuesta es πνεῦμα → «Espíritu» por contexto, no por rutina, dado el participio «derramado sobre nosotros», que en español eclesial apunta con fuerza a una referencia personal/divina. Se mantiene «Mesías» en ambas instancias, pero se ajusta la segunda a «en el Mesías» por gramática y naturalidad españolas.'
  issues:
  - severity: medium
    issue: «espíritu de gracia» en minúscula
    rationale: Aunque el griego no marca mayúsculas, la combinación «un… πνεῦμα τῆς χάριτος» con «derramado sobre nosotros» favorece fuertemente una referencia al Espíritu. En español bíblico y eclesial, la minúscula sugiere más fácilmente una cualidad impersonal y puede oscurecer el sentido.
  - severity: medium
    issue: «en Mesías» suena poco natural en español
    rationale: La preposición ἐν Χριστῷ se puede reproducir literalmente, pero en español la construcción sin artículo con «Mesías» es rígida. «En el Mesías» preserva el título y mejora la idiomaticidad sin añadir contenido.
  - severity: low
    issue: «llamamiento» es correcto pero algo pesado
    rationale: «Llamamiento» es fiel, pero «llamado» suena más natural y claro para un lector amplio. No obstante, este punto es estilístico; puede mantenerse si se prefiere un registro más formal.
  revised_spanish_text: ¿O no tenemos un solo Dios y un solo Mesías, y un solo Espíritu de gracia derramado sobre nosotros, y un solo llamado en el Mesías?
  revision_rationale: Se ajusta «espíritu» a «Espíritu» por el fuerte peso contextual de una referencia al Espíritu derramado sobre los creyentes, y «en Mesías» a «en el Mesías» por naturalidad gramatical en español sin abandonar la política terminológica de Χριστός → «Mesías». También se aligera «llamamiento» a «llamado» para mejor legibilidad.
