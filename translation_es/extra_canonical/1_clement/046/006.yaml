revisions:
- from: ¿O no tenemos un solo Dios y un solo Mesías, y un solo espíritu de gracia derramado sobre nosotros, y un solo llamamiento en Mesías?
  to: ¿O no tenemos un solo Dios y un solo Mesías, y un solo Espíritu de gracia derramado sobre nosotros, y un solo llamado en el Mesías?
  rationale: Se ajusta «espíritu» a «Espíritu» por el fuerte peso contextual de una referencia al Espíritu derramado sobre los creyentes, y «en Mesías» a «en el Mesías» por naturalidad gramatical en español sin abandonar la política terminológica de Χριστός → «Mesías». También se aligera «llamamiento» a «llamado» para mejor legibilidad.
