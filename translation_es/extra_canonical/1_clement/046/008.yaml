review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: mantiene el ay profético, el contraste entre hacer tropezar y desviar, y la imagen de la piedra de molino y el hundimiento en el mar. Sin embargo, la construcción comparativa española queda incompleta en la última cláusula: «que apartar» no es idiomático aquí y no expresa con claridad el infinitivo comparativo griego ἢ… διαστρέψαι. Conviene repararla a «que desviar» o, mejor, «que extraviar / desviar a uno…».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero presenta una aspereza gramatical importante en «que apartar a uno…», donde en español natural se espera «que apartara», «que desviara» o una reestructuración con infinitivo pleno. Además, «piedra de molino» es correcto, aunque «una piedra de molino colgada al cuello» suena más natural que la formulación actual con doble pronombre. La nota al pie también está mal formada porque omite el segmento inicial que pretende glosar y no aporta una alternativa real distinta.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Mis elegidos» corresponde bien a ἐκλεκτῶν μου. «Hacer tropezar» refleja adecuadamente σκανδαλίσαι. Para διαστρέψαι, «apartar» es semánticamente posible, pero en este contexto «desviar» o «extraviar» preserva mejor la idea de llevar por mal camino y encaja mejor con el inglés auditado «lead ... astray».
  issues:
  - severity: medium
    issue: 'Construcción no idiomática: «que apartar a uno de mis elegidos»'
    rationale: Tras «Mejor le habría sido... que...», esa cláusula queda gramaticalmente defectuosa en español. El griego usa un infinitivo comparativo, pero en español aquí debe resolverse con una forma más natural, como «que desviar a uno de mis elegidos» dentro de una reestructuración completa, o mejor una cláusula finita.
  - severity: low
    issue: La nota al pie [a] no representa una alternativa útil ni bien delimitada
    rationale: El inglés documenta una formulación previa completa; la nota española actual repite casi el texto principal desde un punto intermedio y no añade una variante española significativa. Puede omitirse sin pérdida.
  - severity: low
    issue: «Apartar» debilita y vuelve menos precisa la fuerza de διαστρέψαι
    rationale: Aunque posible, «apartar» puede sonar demasiado general. «Desviar» o «extraviar» comunican mejor el sentido de desviar moralmente o llevar por mal camino, en línea con la auditoría inglesa.
  revised_spanish_text: 'Porque dijo: «¡Ay de aquel hombre! Le habría sido bueno no haber nacido, antes que hacer tropezar a uno de mis elegidos. Mejor le habría sido que le colgaran una piedra de molino al cuello y lo hundieran en el mar, que desviar a uno de mis elegidos».

    '
  revision_rationale: Se elimina la nota innecesaria y se corrige la última cláusula para usar un verbo más fiel a διαστρέψαι y más alineado con el inglés auditado («lead ... astray»). El resto del texto se conserva por su buena correspondencia con el original. Aunque la construcción con «que desviar» sigue siendo algo comprimida, es aceptable y mejora claramente el borrador sin introducir paráfrasis extensa.
