source:
  edition: Funk 1901 (normalized OCR)
  text: εἶπεν γάρ· Οὐαὶ τῷ ἀνθρώπῳ ἐκείνῳ· καλὸν ἦν αὐτῷ, εἰ οὐκ ἐγεννήθη, ἢ ἕνα τῶν ἐκλεκτῶν μου σκανδαλίσαι· κρεῖττον ἦν αὐτῷ περιτεθῆναι μύλον καὶ καταποντισθῆναι εἰς τὴν θάλασσαν, ἢ ἕνα τῶν ἐκλεκτῶν μου διαστρέψαι.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/046/008.yaml
  text: For he said[a], “Woe to that man. It would have been good for him if he had not been born, rather than to cause one of my chosen ones to stumble. It would have been better for him to have a millstone hung around him and to be sunk into the sea, than to lead one of my chosen ones astray.”
  footnotes:
  - marker: a
    text: Or 'rather than that he should cause one of my chosen ones to stumble. It would have been better for him to have a millstone hung around him and to be sunk into the sea, than that he should turn one of my chosen ones aside.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:53Z'
    unchanged: false
    changes_summary: Adjusted punctuation after 'Woe to that man' for smoother formal English, and changed 'turn one of my chosen ones aside' to 'lead one of my chosen ones astray' to better reflect διαστρέψαι in natural formal English.
translation:
  language: es
  text: 'Porque dijo[a]: «¡Ay de aquel hombre! Le habría sido bueno no haber nacido, antes que hacer tropezar a uno de mis elegidos. Mejor le habría sido que le colgaran una piedra de molino al cuello y lo hundieran en el mar, que apartar a uno de mis elegidos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes que hacer tropezar a uno de mis elegidos. Mejor le habría sido que le colgaran una piedra de molino al cuello y lo hundieran en el mar, que apartar a uno de mis elegidos».'
    reason: alternative_reading
lexical_decisions:
- source_word: Οὐαὶ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay de aquel!
  - ¡Ay para
  lexicon: interjección de lamento/juicio
  rationale: «Οὐαὶ» expresa ayes proféticos de condena o lamento. En español, «¡Ay de» mantiene el tono judicial y exclamativo sin introducir una paráfrasis más suave.
- source_word: ἐκλεκτῶν μου
  english_pob_choice: my chosen ones
  chosen_spanish: mis elegidos
  alternatives_spanish:
  - mis escogidos
  - los que yo he elegido
  lexicon: ἐκλεκτός
  rationale: POB traduce con fuerza relacional y teológica la idea de elección. «Elegidos» conserva el vínculo directo con la elección divina y es natural en español eclesial contemporáneo.
- source_word: σκανδαλίσαι
  english_pob_choice: to cause ... to stumble
  chosen_spanish: hacer tropezar
  alternatives_spanish:
  - escandalizar
  - hacer caer
  lexicon: σκανδαλίζω
  rationale: El verbo griego puede implicar tropiezo moral o caída. «Hacer tropezar» conserva la imagen concreta y evita que «escandalizar» suene exclusivamente a ofensa social en español moderno.
- source_word: περιτεθῆναι μύλον
  english_pob_choice: to have a millstone hung around him
  chosen_spanish: que le colgaran una piedra de molino al cuello
  alternatives_spanish:
  - que le ataran una piedra de molino
  - que le pusieran una piedra de molino al cuello
  lexicon: περιτίθημι + μύλος
  rationale: La imagen es de una piedra de molino colocada para hundir al culpable. «Al cuello» explicita la función de la frase en español sin alterar el sentido.
- source_word: καταποντισθῆναι εἰς τὴν θάλασσαν
  english_pob_choice: to be sunk into the sea
  chosen_spanish: lo hundieran en el mar
  alternatives_spanish:
  - fuera sumergido en el mar
  - lo arrojaran al mar para hundirlo
  lexicon: καταποντίζω
  rationale: «Hundir» reproduce el valor de inmersión forzada del verbo griego. «En el mar» mantiene la referencia espacial directa y fluida en español.
- source_word: διαστρέψαι
  english_pob_choice: to lead ... astray
  chosen_spanish: apartar
  alternatives_spanish:
  - desviar
  - extraviar
  - llevar por mal camino
  lexicon: διαστρέφω
  rationale: El verbo puede expresar torcer, pervertir o desviar. «Apartar» preserva la idea de hacer que alguien deje el camino correcto, sin añadir un matiz más fuerte que el requerido por el contexto.
theological_decisions:
- issue: Elección divina de los destinatarios
  english_pob_reading: my chosen ones
  chosen_spanish_reading: mis elegidos
  alternative_spanish_readings:
  - mis escogidos
  - los que yo he elegido
  rationale: La frase debe conservar que los destinatarios pertenecen a Dios por elección. «Mis elegidos» es suficientemente literal y mantiene la carga teológica de pertenencia y selección.
  doctrine_reference: doctrina de la elección
- issue: Género y fuerza de la advertencia
  english_pob_reading: Woe to that man
  chosen_spanish_reading: ¡Ay de aquel hombre!
  alternative_spanish_readings:
  - ¡Ay de ese hombre!
  - ¡Ay de aquel!
  rationale: La exclamación profética requiere un tono de juicio serio. «Aquel hombre» suena más distante y judicial que «ese hombre», y sigue de cerca la deixis del original.
  doctrine_reference: advertencia profética y juicio
- issue: Imagen de castigo extremo
  english_pob_reading: millstone hung around him and to be sunk into the sea
  chosen_spanish_reading: que le colgaran una piedra de molino al cuello y lo hundieran en el mar
  alternative_spanish_readings:
  - que le pusieran una piedra de molino al cuello y lo arrojaran al mar
  - que le ataran una piedra de molino y lo sumergieran en el mar
  rationale: La imagen hiperbólica debe conservar su crudeza. La formulación escogida mantiene la secuencia de actos y el sentido de pena irreversible sin suavizarla.
  doctrine_reference: justicia retributiva y severidad de la advertencia
- issue: Relación entre 'tropezar' y 'apartar'
  english_pob_reading: cause ... to stumble / lead ... astray
  chosen_spanish_reading: hacer tropezar / apartar
  alternative_spanish_readings:
  - hacer caer / desviar
  - escandalizar / extraviar
  rationale: Se conservan dos verbos distintos para reflejar que el griego usa dos acciones relacionadas pero no idénticas. «Hacer tropezar» y «apartar» distinguen bien el tropiezo y el desvío.
  doctrine_reference: responsabilidad por hacer caer a otros
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el griego: conserva la exclamación de juicio, el valor de infinitivo de los dos verbos principales y la repetición de «uno de mis elegidos». Se ajusta a la última revisión inglesa al reflejar la oposición simple entre «hacer tropezar» y «apartar», sin añadir elementos explicativos que el texto no exige.'
  spanish_consistency_notes:
  - Se mantuvo «elegidos» para coherencia con el lenguaje teológico de elección.
  - Se prefirió «hacer tropezar» frente a «escandalizar» porque el contexto describe daño espiritual concreto, no mera ofensa.
  - Se conservó el paralelismo entre las dos cláusulas comparativas para respetar la estructura retórica del griego.
  - La nota a pie recoge la alternativa cercana al testimonio auditado en inglés, pero formulada en español natural.
