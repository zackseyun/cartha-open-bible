translation:
  language: es
  text: 'Por tanto, hermanos, también nosotros debemos unirnos[a] a tales ejemplos. Porque está escrito: «Únanse a los santos, porque los que se unen a ellos serán santificados». Y de nuevo, en otro lugar dice: «Con un hombre inocente serás inocente, y con el escogido serás escogido, y con el torcido te torcerás». Unámonos, pues, a los inocentes y justos; estos son los escogidos de Dios.


    ¿Por qué hay entre ustedes contiendas, arrebatos de ira, divisiones y cismas, y hasta guerra? ¿Acaso no tenemos un solo Dios, un solo Mesías y un solo Espíritu de gracia derramado sobre nosotros, y un solo llamamiento en el Mesías? ¿Por qué desgarramos y dividimos los miembros del Mesías, y nos sublevamos contra nuestro propio cuerpo, y llegamos a tal grado de locura que olvidamos que somos miembros unos de otros?


    Recuerden las palabras de Jesús, nuestro Señor. Porque él dijo: «¡Ay de aquel hombre! Le habría sido mejor no haber nacido que hacer tropezar a uno de mis escogidos. Mejor le habría sido que le colgaran una piedra de molino y fuera hundido en el mar, que desviar a uno de mis escogidos». Su cisma ha desviado a muchos, ha arrojado a muchos al desánimo, a muchos a la duda, y a todos nosotros al dolor; y su contienda facciosa persiste.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí se conserva el valor de unión estrecha del verbo griego κολλάω. «Unirse» comunica la idea de adherirse estrechamente sin recurrir a un calco rígido, y la misma raíz se mantiene a lo largo del pasaje para preservar la cohesión retórica.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοιούτοις οὖν ὑποδείγμασιν
  english_pob_choice: such examples
  chosen_spanish: tales ejemplos
  alternatives_spanish:
  - tales modelos
  - tales patrones
  lexicon: LSJ
  rationale: ὑποδείγματα son modelos puestos delante para imitar; en español, «ejemplos» comunica con naturalidad la fuerza exhortativa sin perder la referencia a patrones de conducta.
- source_word: κολληθῆναι / Κολλᾶσθε / κολληθῶμεν
  english_pob_choice: attach ourselves / attach yourselves
  chosen_spanish: unirnos / uníos / unámonos
  alternatives_spanish:
  - apegarnos / apegaos / apeguémonos
  - aferrarnos / aferraos / aferremonos
  - adherirnos / adhiéreos / adhirámonos
  lexicon: LSJ
  rationale: El verbo expresa adherencia estrecha o unión cercana. «Unirnos» evita el calco duro de «adherirnos» y transmite bien la exhortación relacional; el valor repetitivo se conserva con la misma raíz en todo el pasaje.
- source_word: τοῖς ἁγίοις
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos de Dios
  - los consagrados
  lexicon: LSJ
  rationale: Aquí la frase funciona como designación de personas piadosas del pueblo de Dios. «Santos» es la forma más natural y fiel en español, y en este contexto no obliga a una noción técnica posterior.
- source_word: ἁγιασθήσονται
  english_pob_choice: will be made holy
  chosen_spanish: serán santificados
  alternatives_spanish:
  - serán hechos santos
  - quedarán santificados
  lexicon: LSJ
  rationale: El pasivo indica que recibirán santificación. «Serán santificados» mantiene la relación con el verbo griego y la terminología bíblica normal en español.
- source_word: ἀθῴου / ἀθῷοις
  english_pob_choice: innocent / the innocent
  chosen_spanish: inocente / inocentes
  alternatives_spanish:
  - sin culpa
  - irreprensible
  lexicon: LSJ
  rationale: El término destaca ausencia de culpa o dolo. «Inocente» es claro y sirve tanto para la cita como para la exhortación, sin añadir matices ajenos.
- source_word: ἐκλεκτοῦ / ἐκλεκτοὶ
  english_pob_choice: chosen / chosen ones
  chosen_spanish: escogido / escogidos
  alternatives_spanish:
  - elegido / elegidos
  - electo / electos
  lexicon: LSJ
  rationale: «Escogido» conserva la idea de elección divina con español natural. Evita el tecnicismo de «electo» y es más inmediato que «elegido» en algunos registros eclesiales.
- source_word: στρεβλοῦ ... διαστρέψεις
  english_pob_choice: crooked ... become twisted
  chosen_spanish: torcido ... te torcerás
  alternatives_spanish:
  - perverso ... te pervertirás
  - doblado ... te doblarás
  lexicon: LSJ
  rationale: El par verbal debe conservar la imagen de deformación moral y retórica. «Torcido / torcerás» reproduce la correspondencia del griego y sugiere desviación de carácter y conducta.
- source_word: ἔρεις
  english_pob_choice: quarrels
  chosen_spanish: contiendas
  alternatives_spanish:
  - peleas
  - disputas
  lexicon: LSJ
  rationale: En una lista de males comunitarios, «contiendas» suena bíblico pero comprensible, y encaja con el crescendo del pasaje.
- source_word: θυμοί
  english_pob_choice: outbursts of anger
  chosen_spanish: arrebatos de ira
  alternatives_spanish:
  - accesos de ira
  - cóleras
  lexicon: LSJ
  rationale: El plural sugiere erupciones repetidas de ira, no solo una disposición. «Arrebatos de ira» conserva esa fuerza.
- source_word: διχοστασίαι
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - discordias
  - desuniones
  lexicon: LSJ
  rationale: La palabra apunta a separación en bandos. «Divisiones» es exacta y mantiene la distinción con «cismas».
- source_word: σχίσματα
  english_pob_choice: schisms
  chosen_spanish: cismas
  alternatives_spanish:
  - cortes
  - rupturas
  lexicon: LSJ
  rationale: Dado el contexto comunitario y eclesial, «cismas» preserva la carga histórica y retórica sin suavizar el término.
- source_word: πόλεμός
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - combate
  - conflicto
  lexicon: LSJ
  rationale: El singular intensifica el listado de discordias. «Guerra» mantiene el escalamiento chocante del original.
- source_word: πνεῦμα τῆς χάριτος
  english_pob_choice: Spirit of grace
  chosen_spanish: Espíritu de gracia
  alternatives_spanish:
  - espíritu de gracia
  - Espíritu gracioso
  lexicon: LSJ
  rationale: Se conserva la mayúscula por tratarse del Espíritu en sentido teológico. «De gracia» reproduce la densidad bíblica de la expresión.
- source_word: ἐκχυθὲν ἐφ’ ἡμᾶς
  english_pob_choice: poured out upon us
  chosen_spanish: derramado sobre nosotros
  alternatives_spanish:
  - vertido sobre nosotros
  - esparcido sobre nosotros
  lexicon: LSJ
  rationale: La imagen de efusión es claramente bíblica. «Derramado» es la manera más natural en español para mantener el eco sacramental y profético.
- source_word: κλῆσις
  english_pob_choice: calling
  chosen_spanish: llamamiento
  alternatives_spanish:
  - llamada
  - vocación
  lexicon: LSJ
  rationale: «Llamamiento» expresa mejor el hecho de haber sido llamados como pueblo y evita la ambigüedad de una simple «llamada».
- source_word: διέλκωμεν καὶ διασπῶμεν
  english_pob_choice: tear apart and split up
  chosen_spanish: arrancamos y dividimos
  alternatives_spanish:
  - rasgamos y separamos
  - tiramos y partimos
  lexicon: LSJ
  rationale: La pareja de verbos debe sonar violenta y acumulativa. «Arrancamos y dividimos» comunica ruptura activa sin perder naturalidad.
- source_word: στασιάζομεν
  english_pob_choice: rise in revolt
  chosen_spanish: nos sublevamos
  alternatives_spanish:
  - nos rebelamos
  - promovemos sedición
  lexicon: LSJ
  rationale: El término tiene color de facción y sedición, no solo desacuerdo. «Nos sublevamos» conserva la gravedad política y comunitaria.
- source_word: σῶμα τὸ ἴδιον
  english_pob_choice: our own body
  chosen_spanish: nuestro propio cuerpo
  alternatives_spanish:
  - el cuerpo que es nuestro
  - nuestro mismo cuerpo
  lexicon: LSJ
  rationale: La frase subraya autodestrucción comunitaria. «Nuestro propio cuerpo» es claro y mantiene la imagen corporativa.
- source_word: ἀπόνοιαν
  english_pob_choice: a pitch of madness
  chosen_spanish: tal grado de locura
  alternatives_spanish:
  - tal punto de insensatez
  - un extremo de demencia
  lexicon: LSJ
  rationale: El sustantivo expresa falta extrema de cordura o sensatez. «Tal grado de locura» conserva el tono elevado del reproche sin exagerar más allá del griego.
- source_word: μέλη ἐσμὲν ἀλλήλων
  english_pob_choice: members of one another
  chosen_spanish: miembros unos de otros
  alternatives_spanish:
  - miembros los unos de los otros
  - partes unos de otros
  lexicon: LSJ
  rationale: La fórmula debe reflejar reciprocidad. «Miembros unos de otros» es idiomático y preserva la idea de interdependencia corporal.
- source_word: σκανδαλίσαι
  english_pob_choice: cause ... to stumble
  chosen_spanish: hacer tropezar
  alternatives_spanish:
  - escandalizar
  - hacer caer
  lexicon: LSJ
  rationale: La metáfora bíblica de tropiezo se entiende bien en español con «hacer tropezar», evitando la ambigüedad moderna de «escandalizar».
- source_word: μύλον
  english_pob_choice: millstone
  chosen_spanish: piedra de molino
  alternatives_spanish:
  - molino de piedra
  - muela de molino
  lexicon: LSJ
  rationale: «Piedra de molino» es la expresión tradicional y comprensible para la imagen de castigo.
- source_word: καταποντισθῆναι
  english_pob_choice: to be sunk into the sea
  chosen_spanish: fuera hundido en el mar
  alternatives_spanish:
  - fuera sumergido en el mar
  - fuera arrojado al mar y hundido
  lexicon: LSJ
  rationale: El verbo sugiere hundimiento forzado. «Fuera hundido en el mar» conserva la concreción de la imagen sin añadir detalles no presentes.
- source_word: διαστρέψαι
  english_pob_choice: turn ... aside
  chosen_spanish: torcer
  alternatives_spanish:
  - desviar
  - apartarlo
  lexicon: LSJ
  rationale: En español, repetir el verbo de torcimiento del contexto conserva el paralelismo y la idea de desvío moral.
- source_word: ἀθυμίαν
  english_pob_choice: discouragement
  chosen_spanish: desánimo
  alternatives_spanish:
  - desaliento
  - falta de ánimo
  lexicon: LSJ
  rationale: Designa abatimiento o pérdida de valor. «Desánimo» es breve y natural, adecuado para el efecto comunitario señalado.
- source_word: δισταγμόν
  english_pob_choice: doubt
  chosen_spanish: duda
  alternatives_spanish:
  - vacilación
  - titubeo
  lexicon: LSJ
  rationale: El término implica vacilación interior. «Duda» es la opción más directa y comprensible.
- source_word: λύπην
  english_pob_choice: grief
  chosen_spanish: dolor
  alternatives_spanish:
  - tristeza
  - pena
  lexicon: LSJ
  rationale: En esta lista de efectos comunitarios, «dolor» expresa adecuadamente el pesar compartido sin sonar demasiado psicológico.
- source_word: ἐπίμονος
  english_pob_choice: persistent
  chosen_spanish: sigue siendo persistente
  alternatives_spanish:
  - permanece obstinada
  - continúa
  lexicon: LSJ
  rationale: El adjetivo señala continuidad obstinada. La formulación verbal española conserva esa idea sin convertirla en mero adverbio temporal.
theological_decisions:
- issue: Χριστός en este capítulo
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Aquí Χριστός funciona como título confesional y no como mero nombre propio; por eso se traduce como «Mesías» siguiendo la pauta del proyecto y el valor retórico del pasaje.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: ἀδελφοί en la apertura
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - amados hermanos
  rationale: La forma griega es masculina en el vocativo directo. «Hermanos» respeta el texto y mantiene la dirección exhortativa sin añadir expansión inclusiva no presente en la fuente.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
- issue: τοῖς ἁγίοις / ἐκλεκτοί
  english_pob_reading: the holy ones / chosen ones
  chosen_spanish_reading: los santos / escogidos
  alternative_spanish_readings:
  - los santos / elegidos
  - los consagrados / escogidos
  rationale: El texto usa lenguaje bíblico para el pueblo fiel. «Santos» y «escogidos» conservan la categoría teológica sin importar un tecnicismo eclesial posterior.
  doctrine_reference: 'DOCTRINE.md: Preserve source theological categories where context supports them.'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail: conserva la progresión retórica del pasaje, distingue entre «Mesías» como título y «Jesús» como nombre, y refleja el cierre con la idea de persistencia de la facción. También ajusta el paralelismo verbal del griego con soluciones naturales en español, sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός en todo el pasaje, conforme a la política del proyecto y al uso titular del contexto.
  - Se usó «santos» y «escogidos» como categorías bíblicas de personas, no como tecnicismos denominacionales.
  - La metáfora de unión se sostuvo con la misma raíz léxica mediante la nota [a] para señalar el matiz de κολλάω sin saturar el texto.
  - Se evitó «SEÑOR» para el nombre divino porque este versículo no contiene יהוה y el texto griego cita palabras atribuidas a Jesús, no una sustitución del nombre divino.
