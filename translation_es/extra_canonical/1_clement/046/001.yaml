  source_alignment_summary: 'El borrador español sigue de cerca el sentido global del griego y del POB inglés: mantiene la cohesión de κολλάω, la secuencia exhortativa, la confesión de «un solo Dios… un solo Mesías… un solo Espíritu de gracia», la advertencia con dicho de Jesús y los efectos del cisma. Sin embargo, hay varios puntos mejorables de fidelidad léxica y naturalidad: «los santos» estrecha más que «los santos/los consagrados» pero sigue siendo aceptable; «arrancamos» para διέλκωμεν suena algo físico y menos idiomático que «desgarramos» o «hacemos pedazos»; «torcer a uno de mis escogidos» resulta menos natural que «desviar» para διαστρέψαι en ese contexto; y la clausura «sigue siendo persistente» es redundante para ἐπίμονος.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta algunas formulaciones poco naturales o pesadas: «uníos» rompe el registro latinoamericano-neutral preferido; «serás escogido» en la cita puede mantenerse por paralelismo, aunque «serás elegido» sería más idiomático; «arrancamos y dividimos los miembros del Mesías» suena extraño; «torcer a uno de mis escogidos» no es la mejor colocación; y «su facción sigue siendo persistente» suena torpe, además de desplazar στάσις desde «facción/contienda facciosa» hacia una construcción poco idiomática. Conviene uniformar al voseo/castellano litúrgico evitándolo en favor de formas con «ustedes/nosotros».'
  glossary_alignment: 'Alinea bien con la pauta del proyecto en «Mesías», «Jesús», «Espíritu de gracia» y «hermanos». No hay ocurrencia de Yahvé. «Escogidos» es compatible con ἐκλεκτοί aunque «elegidos» también sería posible; «santos» es defendible, pero el POB inglés prefirió «holy ones», así que en español conviene una nota o una formulación menos técnica solo si mejora realmente. El mayor desajuste terminológico está en στάσις: el inglés auditado eligió «factional strife», por lo que «su facción sigue siendo persistente» no refleja bien ni el sustantivo ni su predicación.'
  issues:
  - severity: medium
    issue: Uso de «Uníos» en registro peninsular
    rationale: El objetivo pide español neutral latinoamericano/broadly church-readable. «Uníos» es correcto, pero marcado regionalmente. «Únanse» o reformulación equivalente cumple mejor el estilo meta sin perder el imperativo plural.
  - severity: medium
    issue: «Arrancamos y dividimos los miembros del Mesías» suena poco natural
    rationale: διέλκωμεν καὶ διασπῶμεν expresa desgarro y ruptura acumulativa. «Arrancar miembros» en español sugiere mutilación demasiado literal y forzada. «Desgarramos y dividimos» o «hacemos pedazos y dividimos» conserva la violencia retórica con mejor español.
  - severity: medium
    issue: «Torcer a uno de mis escogidos» para διαστρέψαι es poco idiomático
    rationale: Aunque el capítulo juega con la imagen de torcer, aquí el sentido es desviar o apartar del camino. «Desviar a uno de mis escogidos» refleja mejor el uso contextual y coincide con la decisión del POB inglés «turn aside».
  - severity: high
    issue: Clausura final «su facción sigue siendo persistente» no representa bien στάσις ἐπίμονος
    rationale: στάσις no es simplemente «facción» como grupo, sino contienda/faccionalismo/revuelta. Además, «sigue siendo persistente» es redundante e impropio. Debe revisarse a algo como «y su contienda facciosa persiste» o «y su conflicto faccioso es persistente».
  - severity: low
    issue: Anclaje de nota [a] repetido cuatro veces
    rationale: Es permitido si la misma nota explica el mismo fenómeno repetido, pero visualmente recarga el texto. Dado que la instrucción exige marcadores únicos por nota, conviene reducir el anclaje al primer caso relevante o a los casos estrictamente necesarios.
  revised_spanish_text: 'Por tanto, hermanos, también nosotros debemos unirnos[a] a tales ejemplos. Porque está escrito: «Únanse a los santos, porque los que se unen a ellos serán santificados». Y de nuevo, en otro lugar dice: «Con un hombre inocente serás inocente, y con el escogido serás escogido, y con el torcido te torcerás». Unámonos, pues, a los inocentes y justos; estos son los escogidos de Dios.


    ¿Por qué hay entre ustedes contiendas, arrebatos de ira, divisiones y cismas, y hasta guerra? ¿Acaso no tenemos un solo Dios, un solo Mesías y un solo Espíritu de gracia derramado sobre nosotros, y un solo llamamiento en el Mesías? ¿Por qué desgarramos y dividimos los miembros del Mesías, y nos sublevamos contra nuestro propio cuerpo, y llegamos a tal grado de locura que olvidamos que somos miembros unos de otros?


    Recuerden las palabras de Jesús, nuestro Señor. Porque él dijo: «¡Ay de aquel hombre! Le habría sido mejor no haber nacido que hacer tropezar a uno de mis escogidos. Mejor le habría sido que le colgaran una piedra de molino y fuera hundido en el mar, que desviar a uno de mis escogidos». Su cisma ha desviado a muchos, ha arrojado a muchos al desánimo, a muchos a la duda, y a todos nosotros al dolor; y su contienda facciosa persiste.'
  revised_footnotes:
  - marker: a
    text: Aquí se conserva el valor de unión estrecha del verbo griego κολλάω. «Unirse» comunica la idea de adherirse estrechamente sin recurrir a un calco rígido, y la misma raíz se mantiene a lo largo del pasaje para preservar la cohesión retórica.
    reason: lexical_alternative
  revision_rationale: Se ajustó el texto para mejorar fidelidad al matiz griego y al audit trail inglés, y para lograr un español más natural y neutral. «Únanse» evita un imperativo regionalmente marcado; «desgarramos y dividimos» representa mejor la violencia acumulativa de διέλκωμεν καὶ διασπῶμεν; «desviar» expresa mejor διαστρέψαι en el dicho de Jesús; y «su contienda facciosa persiste» refleja con mayor precisión στάσις ἐπίμονος que la formulación redundante «su facción sigue siendo persistente». También se simplificó el uso del marcador de nota para no sobrecargar visualmente el pasaje.
