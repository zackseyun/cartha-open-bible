    ¿Por qué hay entre ustedes contiendas, arrebatos de ira, divisiones y cismas, y hasta guerra? ¿Acaso no tenemos un solo Dios, un solo Mesías y un solo Espíritu de gracia derramado sobre nosotros, y un solo llamamiento en el Mesías? ¿Por qué arrancamos y dividimos los miembros del Mesías, y nos sublevamos contra nuestro propio cuerpo, y llegamos a tal grado de locura que olvidamos que somos miembros unos de otros? Recuerden las palabras de Jesús, nuestro Señor. Porque él dijo: «¡Ay de aquel hombre! Le habría sido mejor no haber nacido que hacer tropezar a uno de mis escogidos. Mejor le habría sido que le colgaran una piedra de molino al cuello y fuera hundido en el mar, que torcer a uno de mis escogidos». Su cisma ha desviado a muchos, ha arrojado a muchos al desánimo, a muchos a la duda, y a todos nosotros al dolor; y su facción sigue siendo persistente.'
  to: 'Por tanto, hermanos, también nosotros debemos unirnos[a] a tales ejemplos. Porque está escrito: «Únanse a los santos, porque los que se unen a ellos serán santificados». Y de nuevo, en otro lugar dice: «Con un hombre inocente serás inocente, y con el escogido serás escogido, y con el torcido te torcerás». Unámonos, pues, a los inocentes y justos; estos son los escogidos de Dios.


    ¿Por qué hay entre ustedes contiendas, arrebatos de ira, divisiones y cismas, y hasta guerra? ¿Acaso no tenemos un solo Dios, un solo Mesías y un solo Espíritu de gracia derramado sobre nosotros, y un solo llamamiento en el Mesías? ¿Por qué desgarramos y dividimos los miembros del Mesías, y nos sublevamos contra nuestro propio cuerpo, y llegamos a tal grado de locura que olvidamos que somos miembros unos de otros?


    Recuerden las palabras de Jesús, nuestro Señor. Porque él dijo: «¡Ay de aquel hombre! Le habría sido mejor no haber nacido que hacer tropezar a uno de mis escogidos. Mejor le habría sido que le colgaran una piedra de molino y fuera hundido en el mar, que desviar a uno de mis escogidos». Su cisma ha desviado a muchos, ha arrojado a muchos al desánimo, a muchos a la duda, y a todos nosotros al dolor; y su contienda facciosa persiste.'
