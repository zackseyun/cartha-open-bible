review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: el cisma ha desviado a muchos, ha arrojado a muchos al desaliento, a muchos a la duda, y a todos a la tristeza/dolor, y la στάσις sigue vigente. Sin embargo, falla en un punto léxico importante: «vuestra cisma» es incorrecto en español, porque «cisma» es masculino. Además, «vuestra facción persiste» no expresa adecuadamente ἡ στάσις, que aquí no es meramente «la facción» sino la contienda/faccionalismo/la disensión facciosa que persiste.'
  spanish_quality_summary: El texto es mayormente claro y legible, pero contiene un error gramatical notable («vuestra cisma») que impide aprobarlo tal como está. También mejora la naturalidad y precisión traducir στάσις como «contienda facciosa» o similar, en vez de «facción», ya que en español «facción persiste» suena elíptico y menos idiomático.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones clave no pertenecen al glosario fijo, pero sí requieren fidelidad semántica: σχίσμα puede mantenerse como «cisma»; στάσις se representa mejor como «contienda facciosa» que como «facción»; «desaliento», «duda» y «tristeza» son aceptables.'
  issues:
  - severity: high
    issue: Error de género en «vuestra cisma»
    rationale: «Cisma» es sustantivo masculino en español; la forma correcta es «vuestro cisma». Es un error gramatical visible en una palabra clave del versículo.
  - severity: medium
    issue: «Vuestra facción persiste» no refleja bien ἡ στάσις
    rationale: στάσις aquí denota conflicto, disensión o contienda facciosa, no simplemente el grupo o partido. La redacción actual reduce el sentido y suena poco natural en español.
  - severity: low
    issue: Ligera asimetría estilística en la serie verbal
    rationale: La frase funciona, pero repetir «ha» también antes de «arrojado/sumido» o mantener una estructura más paralela mejora la fluidez; no obstante, no es un problema grave.
