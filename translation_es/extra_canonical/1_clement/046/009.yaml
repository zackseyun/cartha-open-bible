id: 1CLEM.46.9
reference: 1 Clement 46:9
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: τὸ σχίσμα ὑμῶν πολλοὺς διέστρεψεν, πολλοὺς εἰς ἀθυμίαν ἔβαλεν, πολλοὺς εἰς δισταγμόν, τοὺς πάντας ἡμᾶς εἰς λύπην· καὶ ἐπίμονος ὑμῶν ἐστὶν ἡ στάσις.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/046/009.yaml
  text: Your schism has turned many aside, cast many into discouragement, many into doubt, and all of us into grief; and your factional strife persists.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:52Z'
    unchanged: false
    changes_summary: Replaced 'still continues' with 'persists' for a more natural and concise rendering of ἐπίμονος ... ἐστίν while preserving the sense of ongoing obstinacy/endurance. Kept the rest unchanged as accurate and complete.
translation:
  language: es
  text: Vuestro cisma ha desviado a muchos, ha sumido a muchos en el desaliento, a muchos en la duda, y a todos nosotros en la tristeza; y vuestra contienda facciosa persiste.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ σχίσμα
  english_pob_choice: Your schism
  chosen_spanish: vuestra cisma
  alternatives_spanish:
  - vuestra división
  - vuestra ruptura
  lexicon: schism
  rationale: «Cisma» conserva la fuerza de una ruptura divisoria dentro de la comunidad y corresponde bien al sentido del griego; se mantiene el tono fuerte del original sin suavizarlo a una mera «división».
- source_word: διέστρεψεν
  english_pob_choice: has turned many aside
  chosen_spanish: ha desviado a muchos
  alternatives_spanish:
  - ha trastornado a muchos
  - ha apartado a muchos
  lexicon: turn aside / distort
  rationale: El verbo griego expresa desviación o desvío causado por la fractura; «ha desviado» reproduce bien esa idea en español y evita una paráfrasis excesiva.
- source_word: ἀθυμίαν
  english_pob_choice: discouragement
  chosen_spanish: desaliento
  alternatives_spanish:
  - desánimo
  - falta de ánimo
  lexicon: discouragement / loss of heart
  rationale: «Desaliento» transmite el abatimiento interior del término griego con dignidad y naturalidad en español contemporáneo.
- source_word: δισταγμόν
  english_pob_choice: doubt
  chosen_spanish: duda
  alternatives_spanish:
  - vacilación
  - titubeo
  lexicon: hesitation / doubt
  rationale: Aunque el griego puede incluir vacilación o irresolución, «duda» es la opción más breve y comprensible; se conserva el matiz de inseguridad sin exagerarlo.
- source_word: εἰς λύπην
  english_pob_choice: into grief
  chosen_spanish: en la tristeza
  alternatives_spanish:
  - en el dolor
  - en la aflicción
  lexicon: grief / sorrow
  rationale: «Tristeza» comunica de manera clara el efecto emocional colectivo; en español resulta más idiomático que un calco directo de «dolor» o «duelo» en este contexto.
- source_word: ἐπίμονος ... ἐστὶν ἡ στάσις
  english_pob_choice: your factional strife persists
  chosen_spanish: vuestra facción persiste
  alternatives_spanish:
  - vuestra contienda sigue
  - vuestra rebelión es obstinada
  lexicon: persistent / factional strife
  rationale: El texto griego subraya la permanencia obstinada de la στάσις; «persiste» sigue fielmente la revisión inglesa y evita añadir temporalidad innecesaria. «Facción» refleja el carácter de partido/partidismo implícito en στάσις.
theological_decisions:
- issue: Cómo renderizar σχίσμα y στάσις sin borrar la fuerza eclesial del conflicto
  english_pob_reading: schism / factional strife
  chosen_spanish_reading: cisma / facción
  alternative_spanish_readings:
  - división / contienda
  - ruptura / rebelión
  rationale: El contexto de 1 Clemente trata un conflicto interno grave en la comunidad; «cisma» y «facción» preservan ese peso eclesial y social sin reducirlo a desacuerdo genérico.
  doctrine_reference: Unidad de la iglesia y gravedad del cisma en 1 Clemente 46:9
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «still continues» por «persists» para ἐπίμονος ... ἐστίν; la traducción española adopta directamente «persiste» para mantener la misma concisión y el matiz de obstinación continua.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y eclesial, acorde con un texto patrístico.
  - No se introdujo «SEÑOR» ni terminología bíblica adicional ajena al griego de este versículo.
  - Se prefirió «cisma»/«facción» por su valor técnico y por la coherencia con el lenguaje de conflicto comunitario.
