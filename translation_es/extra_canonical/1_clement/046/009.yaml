  to: Vuestro cisma ha desviado a muchos, ha sumido a muchos en el desaliento, a muchos en la duda, y a todos nosotros en la tristeza; y vuestra contienda facciosa persiste.
  rationale: Se corrige el género de «cisma» a «vuestro». También se sustituye «vuestra facción persiste» por «vuestra contienda facciosa persiste» para reflejar mejor el sentido de στάσις como disensión o conflicto de partido, en línea con el inglés auditado «your factional strife persists» y con un español más natural y preciso.
