  text: κολληθῶμεν οὖν τοῖς ἀθῴοις καὶ δικαίοις· εἰσὶν δὲ οὗτοι ἐκλεκτοὶ τοῦ θεοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/046/004.yaml
  text: Let us therefore join ourselves to the innocent and righteous[a], for these are God’s chosen ones.
  footnotes:
  - marker: a
    text: Or ', and these are'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:53Z'
    unchanged: false
    changes_summary: Replaced 'attach ourselves to' with 'join ourselves to' for more natural formal English while preserving the sense of κολληθῶμεν. Removed the semicolon in favor of a comma for smoother flow.
translation:
  language: es
  text: Unámonos, pues, a los inocentes y justos[a], porque estos son los escogidos de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y estos son».
    reason: alternative_reading
lexical_decisions:
- source_word: κολληθῶμεν
  english_pob_choice: join ourselves
  chosen_spanish: Unámonos
  alternatives_spanish:
  - Juntémonos
  - Apeguémonos
  lexicon: κολλάω
  rationale: El griego expresa adherirse o unirse estrechamente. «Unámonos» conserva la exhortación inclusiva en primera persona plural y suena natural en español, sin perder la idea de adhesión.
- source_word: τοῖς ἀθῴοις
  english_pob_choice: the innocent
  chosen_spanish: a los inocentes
  alternatives_spanish:
  - a los inocentes y sin culpa
  - a los sin culpa
  lexicon: ἀθῷος
  rationale: «Inocentes» recoge bien la idea moral/jurídica de no culpables y es la opción más clara y idiomática en español contemporáneo.
- source_word: καὶ δικαίοις
  english_pob_choice: and righteous
  chosen_spanish: y justos
  alternatives_spanish:
  - y rectos
  - y rectos delante de Dios
  lexicon: δίκαιος
  rationale: Se eligió «justos» para mantener el paralelo con el griego y con el sentido ético/relacional de δικαίοις. «Rectos» sería posible, pero «justos» es más directo y más fiel al campo semántico aquí.
- source_word: ἐκλεκτοὶ τοῦ θεοῦ
  english_pob_choice: God’s chosen ones
  chosen_spanish: los escogidos de Dios
  alternatives_spanish:
  - los elegidos de Dios
  - los seleccionados por Dios
  lexicon: ἐκλεκτός
  rationale: «Escogidos» preserva el pasivo/resultativo de ἐκλεκτοὶ y encaja con el lenguaje bíblico en español. «Elegidos» también sería viable, pero «escogidos» comunica mejor la acción divina sin sonar más técnico de lo necesario.
theological_decisions:
- issue: Identidad de «los escogidos de Dios»
  english_pob_reading: these are God’s chosen ones
  chosen_spanish_reading: estos son los escogidos de Dios
  alternative_spanish_readings:
  - estos son los elegidos de Dios
  - porque ellos son los escogidos de Dios
  rationale: El texto identifica a los inocentes y justos como el grupo elegido por Dios. Mantener la cláusula identificativa en español preserva la afirmación teológica sin suavizarla ni convertirla en una mera cualidad moral.
  doctrine_reference: Elección divina / lenguaje de pueblo escogido
- issue: Relación entre exhortación y cláusula explicativa
  english_pob_reading: Let us therefore join ourselves to the innocent and righteous, for these are God’s chosen ones.
  chosen_spanish_reading: Unámonos, pues, a los inocentes y justos, porque estos son los escogidos de Dios.
  alternative_spanish_readings:
  - Unámonos, pues, a los inocentes y justos, ya que estos son los escogidos de Dios.
  - Unámonos, pues, a los inocentes y justos; porque estos son los escogidos de Dios.
  rationale: La decisión de usar coma con «porque» reproduce adecuadamente el valor explicativo de δὲ y la identificación final, siguiendo el sentido de la revisión inglesa que privilegia fluidez sin perder la relación causal/explicativa.
  doctrine_reference: Estructura retórica del argumento exhortativo
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «attach ourselves to» a «join ourselves» y pasó de una pausa fuerte a una coma; la versión española sigue ese movimiento con «Unámonos» y una coma antes de la cláusula explicativa, manteniendo el tono exhortativo y el enlace identificativo sin introducir una separación excesiva.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y se conservó «Dios» conforme al griego θεοῦ.
  - Se prefirió «escogidos» en lugar de «elegidos» para mantener la relación semántica con el acto divino de elección y la formulación bíblica habitual sin perder claridad.
  - La puntuación con coma antes de «porque» refleja mejor la explicación del segundo miembro que una coordinación simple.
  - El pronombre implícito de la exhortación plural se expresó con la forma verbal inclusiva «Unámonos».
