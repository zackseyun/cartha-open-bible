translation:
  language: es
  text: ¿Por qué hay pleitos y ira y divisiones y cismas, e incluso guerra entre ustedes?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔρεις
  english_pob_choice: quarrels
  chosen_spanish: pleitos
  alternatives_spanish:
  - disputas
  - riñas
  - quarrels
  lexicon: ἔρις
  rationale: En este contexto de lista acumulativa, «pleitos» comunica bien contienda o disputa abierta en español natural, sin perder la fuerza relacional del término griego.
- source_word: θυμοὶ
  english_pob_choice: anger
  chosen_spanish: enojo
  alternatives_spanish:
  - ira
  - cólera
  - enojes
  lexicon: θυμός
  rationale: La revisión inglesa fijó «anger» como la equivalencia más directa; «enojo» conserva esa lectura de manera clara y menos interpretativa que «ira», que en español puede sonar más intensa o técnica.
- source_word: διχοστασίαι
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - discordias
  - desuniones
  lexicon: διχοστασία
  rationale: «Divisiones» es la correspondencia más transparente y ya refleja adecuadamente el efecto de ruptura interna.
- source_word: σχίσματα
  english_pob_choice: schisms
  chosen_spanish: cismas
  alternatives_spanish:
  - escisiones
  - rupturas
  lexicon: σχίσμα
  rationale: Se conserva «cismas» porque el término tiene fuerza técnica en español eclesial y reproduce con precisión el paralelo del griego junto a «divisiones».
- source_word: πόλεμός
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - conflicto
  - lucha
  lexicon: πόλεμος
  rationale: «Guerra» sigue de cerca la decisión inglesa y mantiene el clímax de la lista, que va de pleitos a un estado de enfrentamiento más grave.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - entre vosotros
  lexicon: ἐν + pronombre de segunda persona plural
  rationale: «Entre ustedes» es idiomático en español latinoamericano y preserva la idea de conflicto interno dentro de la comunidad destinataria.
theological_decisions:
- issue: Intensidad creciente de la lista de conflictos
  english_pob_reading: Why are there quarrels and anger and divisions and schisms and even war among you?
  chosen_spanish_reading: ¿Por qué hay pleitos y enojo, y divisiones y cismas, e incluso guerra entre ustedes?
  alternative_spanish_readings:
  - ¿Por qué hay pleitos, ira, divisiones, cismas y aun guerra entre ustedes?
  - ¿Por qué existen pleitos y enojo, divisiones, cismas e incluso guerra entre ustedes?
  rationale: Se mantiene la secuencia enumerativa y el aumento retórico desde tensiones relacionales hasta guerra, sin suavizar el reproche moral del texto.
  doctrine_reference: Exhortación moral y eclesial en 1 Clemente; conflicto intracomunitario y unidad de la iglesia.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que reemplazó «outbursts of anger» por «anger» para acercarse más al valor léxico directo de θυμοί. Por ello se eligió «enojo» y no una paráfrasis más intensificada. No se añadieron notas porque la alineación semántica es estable y no hay variante textual relevante en el material provisto.
  spanish_consistency_notes:
  - Se conservó el paralelismo coordinado de la lista griega.
  - «Cismas» se retiene como término fuerte y reconocible en registro eclesial, coherente con la POB inglesa.
  - Se evitó «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino ni una cita directa del Tetragrámaton.
