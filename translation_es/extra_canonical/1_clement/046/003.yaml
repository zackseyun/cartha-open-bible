    reason: Preservar la correspondencia con la decisión léxica inglesa ‘elect’ sin sacrificar claridad ni naturalidad en español.
  revision_rationale: Se hace una reparación léxica mínima para evitar una lectura española engañosa. El cambio a «escogido» conserva el paralelismo y el sentido proverbial del griego; la nota retiene la alternativa más literal por transparencia con el historial del POB inglés.
