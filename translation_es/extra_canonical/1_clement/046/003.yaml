source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ πάλιν ἐν ἑτέρῳ τόπῳ λέγει· Μετὰ ἀνδρὸς ἀθῴου ἀθῷος ἔσῃ καὶ μετὰ ἐκλεκτοῦ ἐκλεκτὸς ἔσῃ, καὶ μετὰ στρεβλοῦ διαστρέψεις.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/046/003.yaml
  text: And again[a], in another place it says, “With an innocent man you will be innocent, and with an elect one you will be elect, and with a crooked one you will become twisted.”
  footnotes:
  - marker: a
    text: Or 'with the chosen one you will be chosen, and with the crooked'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:22Z'
    unchanged: false
    changes_summary: Revised 'chosen one' to 'elect one' for closer lexical correspondence to ἐκλεκτοῦ/ἐκλεκτός and better formal consistency within the verse. No other changes needed.
translation:
  language: es
  text: 'Y otra vez, en otro lugar dice: «Con un hombre inocente serás inocente, y con un escogido serás escogido, y con un torcido te torcerás».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un electo serás electo». Se traduce «escogido» porque «electo» en español suele sugerir elección a un cargo y puede sonar impropio aquí, aunque el griego ἐκλεκτός corresponde más literalmente a «electo/elegido».
    reason: Preservar la correspondencia con la decisión léxica inglesa ‘elect’ sin sacrificar claridad ni naturalidad en español.
lexical_decisions:
- source_word: καὶ πάλιν ἐν ἑτέρῳ τόπῳ λέγει
  english_pob_choice: And again, in another place it says
  chosen_spanish: Y otra vez, en otro lugar dice
  alternatives_spanish:
  - Y de nuevo, en otro lugar dice
  - Y otra vez, en otro sitio dice
  lexicon: καὶ πάλιν; ἐν ἑτέρῳ τόπῳ; λέγει
  rationale: Mantiene la fórmula de cita introductoria con un español natural y sobrio. «Otra vez» conserva la reiteración; «en otro lugar» reproduce ἐν ἑτέρῳ τόπῳ sin añadir precisión no presente en el griego.
- source_word: Μετὰ ἀνδρὸς ἀθῴου ἀθῷος ἔσῃ
  english_pob_choice: With an innocent man you will be innocent
  chosen_spanish: Con un hombre inocente serás inocente
  alternatives_spanish:
  - Con un hombre inocente estarás inocente
  - Con un hombre sin culpa serás sin culpa
  lexicon: μετὰ; ἀνδρὸς; ἀθῴου; ἀθῷος ἔσῃ
  rationale: «Hombre» corresponde de forma directa a ἀνδρός y conserva el paralelismo proverbial. «Inocente» mantiene el campo semántico de ἀθῷος sin forzar una paráfrasis explicativa.
- source_word: μετὰ ἐκλεκτοῦ ἐκλεκτὸς ἔσῃ
  english_pob_choice: with an elect one you will be elect
  chosen_spanish: con un electo serás electo
  alternatives_spanish:
  - con un escogido serás escogido
  - con un elegido serás elegido
  lexicon: ἐκλεκτοῦ; ἐκλεκτός
  rationale: Se conserva «electo» para mantener correspondencia léxica con la decisión inglesa «elect» y distinguirlo de la lectura más interpretativa «escogido/elegido». En español suena menos común, pero aquí el paralelismo y la fuerza proverbial justifican su uso.
- source_word: μετὰ στρεβλοῦ διαστρέψεις
  english_pob_choice: with a crooked one you will become twisted
  chosen_spanish: con un torcido te torcerás
  alternatives_spanish:
  - con un perverso te pervertirás
  - con un torcido te volverás torcido
  lexicon: στρεβλοῦ; διαστρέψεις
  rationale: «Torcido» refleja la imagen moral/metafórica de στρεβλός y mantiene el eco formal con διαστρέψεις. «Te torcerás» preserva el matiz de transformación verbal sin introducir una explicación ajena al texto.
theological_decisions:
- issue: Lectura proverbial e indefinida de los sustantivos/adjetivos
  english_pob_reading: with an innocent man... with an elect one... with a crooked one
  chosen_spanish_reading: con un hombre inocente... con un electo... con un torcido
  alternative_spanish_readings:
  - con el inocente... con el electo... con el torcido
  - con un elegido... con un torcido
  rationale: El griego usa formas anartros y paralelas; por eso el español mantiene valores indefinidos/proverbiales. Evita convertir la frase en un título definido o en una referencia específica.
  doctrine_reference: Gramática del texto griego y paralelismo proverbial; sin implicación doctrinal añadida
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió el artículo en inglés para reflejar que ἐκλεκτοῦ y στρεβλοῦ son anartros y paralelos a ἀνδρὸς ἀθῴου. La versión española sigue esa decisión: usa formas indefinidas y evita artículos definidos, sin introducir una lectura específica de ''el electo''.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y la estructura tripartita del original.
  - No se añadió nota al pie porque la alternativa 'electo/escogido' no requiere marcarse en el texto dado que la traducción principal ya refleja la decisión léxica.
  - Se evitó 'SEÑOR' u otros sustitutos porque no hay nombre divino en este versículo.
