  to: 'Y otra vez, en otro lugar dice: «Con un hombre inocente serás inocente, y con un escogido serás escogido, y con un torcido te torcerás».[a]'
  rationale: Se hace una reparación léxica mínima para evitar una lectura española engañosa. El cambio a «escogido» conserva el paralelismo y el sentido proverbial del griego; la nota retiene la alternativa más literal por transparencia con el historial del POB inglés.
