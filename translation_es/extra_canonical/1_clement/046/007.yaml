id: 1CLEM.46.7
reference: 1 Clement 46:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἱνατί διέλκωμεν καὶ διασπῶμεν τὰ μέλη τοῦ Χριστοῦ καὶ στασιάζομεν πρὸς τὸ σῶμα τὸ ἴδιον, καὶ εἰς τοσαύτην ἀπόνοιαν ἐρχόμεθα, ὥστε ἐπιλαθέσθαι ἡμᾶς, ὅτι μέλη ἐσμὲν ἀλλήλων; μνήσθητε τῶν λόγων Ἰησοῦ τοῦ κυρίου ἡμῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/046/007.yaml
  text: 'Why do we pull apart and tear to pieces the members of Messiah[a], and rise in revolt against our own body, and come to such a pitch of madness that we forget that we are members of one another?


    Remember the words of Jesus our Lord.'
  footnotes:
  - marker: a
    text: Or 'tear apart and split up'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:52Z'
    unchanged: false
    changes_summary: 'Changed ''the Messiah'' to ''Christ'' to reflect τοῦ Χριστοῦ more naturally and consistently in this context; added ''that'' before ''we are members'' for smoother formal English. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: '¿Por qué separamos y hacemos pedazos[a] los miembros de Mesías, y nos rebelamos contra nuestro propio cuerpo, y llegamos a tal grado de locura que olvidamos que somos miembros los unos de los otros?


    Recuerden las palabras de Jesús nuestro Señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desgarramos y separamos», «jalamos en direcciones opuestas y rasgamos». El griego combina dos verbos intensivos para expresar una ruptura violenta de la unidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: διέλκωμεν
  english_pob_choice: pull apart
  chosen_spanish: tiramos de un lado
  alternatives_spanish:
  - separamos
  - arrastramos hacia lados opuestos
  lexicon: διέλκω
  rationale: El verbo griego expresa la acción de jalar o separar con fuerza en direcciones opuestas; en español, «tiramos de un lado» conserva la imagen corporal y relacional sin sonar demasiado técnico. «Separamos» debilita la vivacidad del verbo.
- source_word: διασπῶμεν
  english_pob_choice: tear to pieces
  chosen_spanish: hacemos pedazos
  alternatives_spanish:
  - desgarramos
  - hacemos trizas
  lexicon: διασπάω
  rationale: La revisión inglesa reforzó la violencia de «tear to pieces». «Hacemos pedazos» comunica destrucción vívida y natural en español, sin perder el matiz corporal. «Desgarramos» es posible, pero sugiere más literalmente rasgar que destrozar en trozos.
- source_word: τὰ μέλη τοῦ Χριστοῦ
  english_pob_choice: the members of Messiah
  chosen_spanish: los miembros de Mesías
  alternatives_spanish:
  - los miembros de Cristo
  lexicon: μέλη / Χριστός
  rationale: Se mantiene «Mesías» para seguir la decisión documentada de la POB inglesa y la terminología proyectual, evitando sustituirla por una forma eclesiástica tradicional sin razón de fuente. «Miembros» conserva la metáfora del cuerpo.
- source_word: πρὸς τὸ σῶμα τὸ ἴδιον
  english_pob_choice: against our own body
  chosen_spanish: contra nuestro propio cuerpo
  alternatives_spanish:
  - contra nuestro propio cuerpo mismo
  - contra nuestro mismo cuerpo
  lexicon: σῶμα
  rationale: La frase griega es claramente corporal y comunitaria. «Nuestro propio cuerpo» reproduce la fuerza del posesivo intensificado por τὸ ἴδιον, manteniendo la claridad en español.
- source_word: ἐπιλαθέσθαι
  english_pob_choice: we forget
  chosen_spanish: olvidamos
  alternatives_spanish:
  - nos olvidamos
  lexicon: ἐπιλανθάνομαι
  rationale: El verbo en contexto expresa olvido real, no simple descuido. «Olvidamos» es natural y directo; «nos olvidamos» sería igualmente posible, pero menos conciso en esta construcción.
- source_word: μέλη ἐσμὲν ἀλλήλων
  english_pob_choice: we are members of one another
  chosen_spanish: somos miembros los unos de los otros
  alternatives_spanish:
  - somos miembros unos de otros
  - somos miembros entre nosotros
  lexicon: ἀλλήλων
  rationale: La formulación recíproca «los unos de los otros» es idiomática y reproduce bien la relación mutua del griego. Evita ambigüedad y suena más natural que una calca rígida.
- source_word: μνήσθητε
  english_pob_choice: Remember
  chosen_spanish: Acuérdense
  alternatives_spanish:
  - Recuerden
  - Tengan presentes
  lexicon: μιμνήσκομαι
  rationale: El imperativo exhortativo queda bien en español con «Acuérdense», que mantiene el llamado directo y pastoral. «Recuerden» también sería válido, pero «Acuérdense» da una tonalidad más exhortativa.
- source_word: λόγων Ἰησοῦ τοῦ κυρίου ἡμῶν
  english_pob_choice: the words of Jesus our Lord
  chosen_spanish: las palabras de Jesús nuestro Señor
  alternatives_spanish:
  - las palabras de Jesús, nuestro Señor
  - las palabras de nuestro Señor Jesús
  lexicon: λόγος / Ἰησοῦς / κύριος
  rationale: Se conserva el nombre propio «Jesús» y el título relacional «nuestro Señor» sin invertir el orden de manera innecesaria. La puntuación en español fluye bien sin añadir aclaraciones ajenas al texto.
theological_decisions:
- issue: 'Cristológico: Χριστός en 1 Clemente y la terminología proyectual'
  english_pob_reading: members of Messiah
  chosen_spanish_reading: los miembros de Mesías
  alternative_spanish_readings:
  - los miembros de Cristo
  rationale: Aunque el griego usa τοῦ Χριστοῦ, la POB inglesa documentó y restauró «Messiah» por coherencia editorial y sensibilidad teológica del proyecto. En español se sigue esa elección para no borrar la tensión entre el título original y la tradición eclesial posterior.
  doctrine_reference: Terminología cristológica del proyecto POB / fidelidad al audit trail
- issue: Metáfora eclesial del cuerpo y la unidad mutua
  english_pob_reading: against our own body ... we are members of one another
  chosen_spanish_reading: contra nuestro propio cuerpo ... somos miembros los unos de los otros
  alternative_spanish_readings:
  - contra nuestro cuerpo ... somos miembros unos de otros
  rationale: Se preserva la metáfora comunitaria de corporalidad sin espiritualizarla. La relación mutua entre creyentes no se debilita; se expresa como reciprocidad orgánica.
  doctrine_reference: Ecclesiology bíblica / unidad del cuerpo
- issue: Rebelión y locura como agravamiento moral
  english_pob_reading: rise in revolt ... come to such a pitch of madness
  chosen_spanish_reading: nos rebelamos ... llegamos a tal grado de locura
  alternative_spanish_readings:
  - nos alzamos en rebelión ... llegamos a una locura tal
  rationale: «Rebelamos» mantiene el matiz de insurrección. «Tal grado de locura» conserva la escalada moral del griego sin suavizarla.
  doctrine_reference: Advertencia moral y retórica exhortativa
translation_notes:
  revision_awareness: 'La POB inglesa pasó por una revisión lexical importante en la cláusula inicial: de una formulación más débil («split up») a otra más intensa («tear to pieces»), y luego restauró «Messiah» tras una regresión a «Christ». El español refleja esa trayectoria con verbos de violencia fuerte («tiramos de un lado y hacemos pedazos») y mantiene «Mesías» conforme al estado final del audit trail. También se preserva la pequeña mejora sintáctica inglesa implícita en la cláusula final con una estructura española natural y explícita.'
  spanish_consistency_notes:
  - Se usa «Mesías» en lugar de «Cristo» para alinearse con la política terminológica del proyecto y con la historia editorial del versículo.
  - Se mantiene «Jesús nuestro Señor» sin coma para un registro bíblico fluido en español, equivalente al orden del griego.
  - La combinación de dos verbos en la primera cláusula intenta reproducir la duplicación enfática del original, no suavizarla.
