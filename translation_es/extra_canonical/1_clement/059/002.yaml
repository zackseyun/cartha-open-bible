revisions:
- from: Pero nosotros seremos inocentes de este pecado[a], y haremos ferviente oración y súplica, para que el Creador de todas las cosas conserve intacto, por medio de su amado siervo[b] Jesucristo, el número de sus escogidos que ha sido contado en todo el mundo; por medio de él nos llamó de las tinieblas a la luz, de la ignorancia al conocimiento de la gloria de su nombre.
  to: Pero nosotros seremos inocentes de este pecado, y pediremos, haciendo ferviente oración y súplica, que el Creador de todas las cosas conserve intacto el número de sus escogidos que ha sido contado en todo el mundo, por medio de su amado siervo[a] Jesucristo, por medio de quien nos llamó de las tinieblas a la luz, de la ignorancia al conocimiento de la gloria de su nombre.
  rationale: Se corrige la estructura verbal para expresar explícitamente αἰτησόμεθα y el participio ποιούμενοι, se mejora la colocación del complemento 'por medio de su amado siervo Jesucristo' para una sintaxis más clara y más cercana al griego, y se elimina una nota innecesaria. Se conserva la terminología auditada ('siervo', 'Jesucristo', 'escogidos', 'conocimiento').
