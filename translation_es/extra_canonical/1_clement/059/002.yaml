id: 1CLEM.59.2
reference: 1 Clement 59:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἡμεῖς δὲ ἀθῷοι ἐσόμεθα ἀπὸ ταύτης τῆς ἁμαρτίας καὶ αἰτησόμεθα ἐκτενῆ τὴν δέησιν καὶ ἱκεσίαν ποιούμενοι, ὅπως τὸν ἀριθμὸν τὸν κατηριθμημένον τῶν ἐκλεκτῶν αὐτοῦ ἐν ὅλῳ τῷ κόσμῳ διαφυλάξῃ ἄθραυστον ὁ δημιουργὸς τῶν ἁπάντων διὰ τοῦ ἠγαπημένου παιδὸς αὐτοῦ Ἰησοῦ Χριστοῦ, δι᾽ οὗ ἐκάλεσεν ἡμᾶς ἀπὸ σκότους εἰς φῶς, ἀπὸ ἀγνωσίας εἰς ἐπίγνωσιν δόξης ὀνόματος αὐτοῦ,
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/059/002.yaml
  text: But we will be innocent of this sin[a], and we will ask, making earnest prayer and supplication, that the Creator of all may keep intact the number of his elect that has been counted throughout the whole world, through his beloved servant Jesus Christ, through whom he called us from darkness into light, from ignorance into the knowledge of the glory of his name,
  footnotes:
  - marker: a
    text: Or 'beloved child Jesus the Messiah'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:18Z'
    unchanged: false
    changes_summary: Changed 'the full knowledge' to 'the knowledge' for closer lexical accuracy to ἐπίγνωσιν without interpretive intensification. Retained the rest as accurate and natural.
translation:
  language: es
  text: Pero nosotros seremos inocentes de este pecado, y pediremos, haciendo ferviente oración y súplica, que el Creador de todas las cosas conserve intacto el número de sus escogidos que ha sido contado en todo el mundo, por medio de su amado siervo[a] Jesucristo, por medio de quien nos llamó de las tinieblas a la luz, de la ignorancia al conocimiento de la gloria de su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La revisión inglesa documenta también la alternativa tradicional «amado hijo»; aquí se adopta «siervo» por la resonancia del Siervo de Yahvé en el griego.
    reason: theological_note
lexical_decisions:
- source_word: ἀθῷοι ἐσόμεθα
  english_pob_choice: we will be innocent
  chosen_spanish: seremos inocentes
  alternatives_spanish:
  - quedaremos inocentes
  - seremos libres de culpa
  lexicon: ἀθῷος
  rationale: '"Inocentes" comunica bien la idea de quedar sin culpa en relación con el pecado mencionado, sin sobrecargar el sentido jurídico más allá del griego.'
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - falta
  - culpa
  lexicon: ἁμαρτία
  rationale: '"Pecado" es la equivalencia natural y fiel en español para este término moral y teológico.'
- source_word: ἐκτενῆ τὴν δέησιν καὶ ἱκεσίαν ποιούμενοι
  english_pob_choice: making earnest prayer and supplication
  chosen_spanish: haremos ferviente oración y súplica
  alternatives_spanish:
  - haremos oración ferviente y súplica
  - elevarremos con insistencia oración y súplica
  lexicon: δέησις / ἱκεσία / ἐκτενής
  rationale: '"Ferviente" refleja la intensidad de ἐκτενῆ, y "oración y súplica" conserva la doblet lingüística del griego y del inglés POB sin volverla redundante en exceso.'
- source_word: ὁ δημιουργὸς τῶν ἁπάντων
  english_pob_choice: the Creator of all
  chosen_spanish: el Creador de todas las cosas
  alternatives_spanish:
  - el Creador de todo
  - el Creador de todo cuanto existe
  lexicon: δημιουργός
  rationale: '"Creador de todas las cosas" mantiene el alcance universal de τῶν ἁπάντων en un español claro y reverente.'
- source_word: τὸν ἀριθμὸν τὸν κατηριθμημένον τῶν ἐκλεκτῶν αὐτοῦ
  english_pob_choice: the number of his elect that has been counted
  chosen_spanish: el número de sus escogidos que ha sido contado
  alternatives_spanish:
  - la cantidad de sus escogidos que ha sido contada
  - el número de los elegidos que ha sido contado
  lexicon: ἀριθμός / κατηριθμημένος / ἐκλεκτός
  rationale: '"Escogidos" traduce ἐκλεκτοί con lenguaje bíblico claro; "que ha sido contado" conserva la imagen de numeración/registro sin interpretarla más allá del griego.'
- source_word: παιδός
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - servidor
  - criado
  lexicon: παῖς
  rationale: La revisión inglesa documenta la decisión de ver una resonancia litúrgica con el Siervo de Yahvé; en español "siervo" preserva esa carga bíblica mejor que "niño" o "hijo".
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Christ
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Cristo
  - Jesús, el Cristo
  lexicon: Ἰησοῦς / Χριστός
  rationale: Aquí "Jesucristo" funciona como forma nominal estable y natural en español, coherente con la decisión inglesa de tratar Χριστός como nombre fijo en este contexto litúrgico.
- source_word: ἀπὸ σκότους εἰς φῶς
  english_pob_choice: from darkness into light
  chosen_spanish: de las tinieblas a la luz
  alternatives_spanish:
  - de oscuridad a luz
  - desde las tinieblas hacia la luz
  lexicon: σκότος / φῶς
  rationale: '"Tinieblas" conserva el registro bíblico y la antítesis tradicional con "luz"; es más adecuado que "oscuridad" en esta formulación litúrgica.'
- source_word: ἀπὸ ἀγνωσίας εἰς ἐπίγνωσιν
  english_pob_choice: from ignorance into the knowledge
  chosen_spanish: de la ignorancia al conocimiento
  alternatives_spanish:
  - de la ignorancia al pleno conocimiento
  - de la falta de conocimiento al conocimiento
  lexicon: ἀγνωσία / ἐπίγνωσις
  rationale: Se conserva la progresión literal del griego. Evité intensificar ἐπίγνωσις como "pleno conocimiento" porque la revisión inglesa corrigió precisamente esa sobreinterpretación.
- source_word: δόξης ὀνόματος αὐτοῦ
  english_pob_choice: the glory of his name
  chosen_spanish: de la gloria de su nombre
  alternatives_spanish:
  - de la gloria de su Nombre
  - de la gloria de su reputación
  lexicon: δόξα / ὄνομα
  rationale: '"Gloria de su nombre" reproduce la construcción sin añadir explicaciones. "Nombre" se mantiene en minúscula por normalización editorial en español, salvo contexto devocional explícito.'
theological_decisions:
- issue: παῖς aplicado a Jesús
  english_pob_reading: beloved servant Jesus Christ
  chosen_spanish_reading: amado siervo Jesucristo
  alternative_spanish_readings:
  - amado hijo Jesucristo
  - amado niño Jesucristo
  rationale: La revisión inglesa descartó "child" y confirmó "servant" por la resonancia del Siervo sufriente/escogido en el lenguaje litúrgico temprano. En español, "siervo" preserva mejor esa tensión profética sin domesticarla.
  doctrine_reference: Isaías 52:13; Isaías 53; Hechos 3:13, 26
- issue: Χριστός en contexto litúrgico tardío
  english_pob_reading: Jesus Christ
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús el Mesías
  - Jesús, el Cristo
  rationale: Aunque el término puede leerse titulármente, el contexto y la decisión inglesa trataron Χριστός como forma ya fijada. "Jesucristo" evita introducir una glosa explicativa no presente en el flujo del texto.
  doctrine_reference: Uso cristiano primitivo de Χριστός como designación nominal
- issue: Número de los elegidos contado por Dios
  english_pob_reading: the number of his elect that has been counted
  chosen_spanish_reading: el número de sus escogidos que ha sido contado
  alternative_spanish_readings:
  - la totalidad de sus escogidos ya contada
  - el número de sus elegidos ya contado
  rationale: Conservo la idea de una cuantificación o registro divino sin convertirla en una doctrina más específica de la que el texto exige. El participio pasivo sugiere un número ya contado o fijado, pero el español mantiene la misma ambigüedad controlada.
  doctrine_reference: Elección divina; preservación de los escogidos
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió una intensificación indebida en ἐπίγνωσιν: "full knowledge" pasó a "knowledge". La versión española sigue esa corrección con "conocimiento" sin adjetivación, y adopta además la revisión léxica de παῖς como "siervo" en lugar de "hijo/niño".'
  spanish_consistency_notes:
  - Se evita "SEÑOR" como sustituto del nombre divino porque este pasaje no contiene el Tetragrámaton; tampoco se necesita aquí una estrategia de ocultamiento del nombre.
  - Se mantiene un registro litúrgico y bíblico con "tinieblas", "luz", "escogidos", "siervo" y "Jesucristo" para preservar la cadencia del texto.
  - No se añadió "Mesías" porque el audit trail inglés fija aquí "Christ" como forma nominal; en español "Jesucristo" es la opción más natural y consistente.
