translation:
  language: es
  text: 'Pero si algunos desobedecen las cosas dichas por él por medio de nosotros, sepan que se enredarán en transgresión y en un peligro nada pequeño. Pero nosotros seremos inocentes de este pecado, y haremos una ferviente oración y súplica, para que el Creador de todas las cosas mantenga intacto el número de sus escogidos, ya contado en todo el mundo, por medio de su amado hijo, Jesús el Mesías, por quien nos llamó de las tinieblas a la luz, de la ignorancia al pleno conocimiento de la gloria de su nombre,


    para esperar en tu nombre, el origen[a] de toda la creación, habiendo abierto los ojos de nuestro corazón para conocerte a ti, el único Altísimo entre los altos, santo, que reposa entre los santos; el que humilla la insolencia de los soberbios, el que deshace los designios de las naciones, el que eleva a los humildes a lugares altos y humilla a los encumbrados, el que enriquece y empobrece, el que mata y da vida y hace vivir, el único benefactor de los espíritus y Dios de toda carne; el que mira en los abismos, el supervisor de las obras humanas, el auxilio de los que están en peligro, el salvador de los que no tienen esperanza, el creador y supervisor de todo espíritu; el que multiplica las naciones sobre la tierra y de entre todas escoge a los que te aman por medio de Jesús el Mesías, tu amado hijo, por medio de quien nos educaste, santificaste y honraste.


    Te pedimos, Soberano, que seas nuestro ayudador y defensor. Rescata a los nuestros que están en aflicción, ten misericordia de los humildes, levanta a los caídos, muéstrate a los necesitados, sana a los débiles, vuelve a los que se extravían de tu pueblo; sacia a los hambrientos, rescata a nuestros presos, levanta a los enfermos, anima a los de poco ánimo. Que todas las naciones sepan que tú solo eres Dios, y que Jesús el Mesías es tu hijo, y que nosotros somos tu pueblo y las ovejas de tu prado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Origen puede entenderse también como “fuente” o “principio”; la frase griega es elevada y compacta.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπειθήσωσιν
  english_pob_choice: disobey
  chosen_spanish: desobedecen
  alternatives_spanish:
  - rehúsen obedecer
  - se muestren desobedientes
  lexicon: BDAG
  rationale: Mantiene el valor de negativa activa a obedecer, más fuerte que una simple falta de fe, y suena natural en español bíblico moderno.
- source_word: παραπτώσει
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - ofensa
  - trespaso
  - caída
  lexicon: BDAG
  rationale: Conserva el matiz moral-jurídico de culpa en este aviso, sin suavizarlo a una mera falta.
- source_word: ἐνδήσουσιν
  english_pob_choice: will entangle themselves
  chosen_spanish: se enredarán
  alternatives_spanish:
  - se ligarán
  - se implicarán
  - se enmarañarán
  lexicon: LSJ
  rationale: El medio sugiere implicación auto-incurrida; 'se enredarán' comunica bien la idea de quedar atrapados por su propia acción.
- source_word: ἀθῷοι
  english_pob_choice: innocent
  chosen_spanish: inocentes
  alternatives_spanish:
  - sin culpa
  - libres de culpa
  lexicon: BDAG
  rationale: Es el contraste natural con 'pecado' y conserva el matiz legal-moral de exención de culpa.
- source_word: ἐκτενῆ
  english_pob_choice: earnest
  chosen_spanish: ferviente
  alternatives_spanish:
  - intensa
  - constante
  - apremiante
  lexicon: BDAG
  rationale: Expresa la intensidad de la oración sin arcaísmo excesivo; encaja bien con 'petición y súplica'.
- source_word: δέησιν καὶ ἱκεσίαν
  english_pob_choice: prayer and supplication
  chosen_spanish: petición y súplica
  alternatives_spanish:
  - oración y ruego
  - petición y ruego
  lexicon: BDAG
  rationale: Reproduce la pareja retórica con un registro litúrgico claro, evitando la repetición de 'oración'.
- source_word: διαφυλάξῃ ἄθραυστον
  english_pob_choice: may keep intact
  chosen_spanish: mantenga intacto
  alternatives_spanish:
  - preserve sin daño
  - guarde sin quebranto
  lexicon: LSJ
  rationale: Preserva la idea de conservación sin fractura ni pérdida, en español idiomático.
- source_word: δημιουργὸς
  english_pob_choice: Creator
  chosen_spanish: Creador
  alternatives_spanish:
  - Hacedor
  - Artífice
  lexicon: BDAG
  rationale: Es el título teológico más claro y natural en español para 'el Creador de todas las cosas'.
- source_word: παῖς
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - siervo
  - niño
  lexicon: BDAG
  rationale: En este contexto cristológico y con 'amado', 'hijo' comunica mejor la relación filial y evita una ambigüedad extraña en español litúrgico.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus the Messiah
  chosen_spanish: Jesús el Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús Cristo
  lexicon: BDAG
  rationale: Sigue la decisión del POB de traducir Χριστός como título ('Mesías') cuando la frase funciona de manera claramente titulativa.
- source_word: ἐπίγνωσιν
  english_pob_choice: full knowledge
  chosen_spanish: pleno conocimiento
  alternatives_spanish:
  - conocimiento pleno
  - conocimiento cabal
  lexicon: BDAG
  rationale: Conserva la intensificación de ἐπίγνωσις y suena natural en español.
- source_word: ἀρχέγονον πάσης κτίσεως
  english_pob_choice: the source from which all creation first came
  chosen_spanish: el origen de toda la creación
  alternatives_spanish:
  - la fuente de toda la creación
  - el principio de toda la creación
  lexicon: LSJ
  rationale: La frase es elevada y comprimida; 'origen' retiene la idea primordial sin forzar una glosa demasiado interpretativa.
- source_word: ὕψιστον ἐν ὑψίστοις
  english_pob_choice: the only Highest among the highest
  chosen_spanish: el único Altísimo entre los altos
  alternatives_spanish:
  - el único Altísimo entre los más altos
  - el único Supremo entre los exaltados
  lexicon: LSJ
  rationale: Preserva el paralelismo y la superlación hímnica sin calcar de forma pesada el giro griego.
- source_word: ἀναπαυόμενον
  english_pob_choice: resting
  chosen_spanish: que reposa
  alternatives_spanish:
  - que descansa
  - que habita
  lexicon: BDAG
  rationale: '''Reposa'' mantiene el tono cultual y la imagen de permanencia entre los santos.'
- source_word: ὕβριν
  english_pob_choice: insolence
  chosen_spanish: insolencia
  alternatives_spanish:
  - arrogancia
  - soberbia
  - violencia
  lexicon: LSJ
  rationale: Es más preciso que 'orgullo' para el sentido de arrogancia abusiva.
- source_word: διαλύοντα λογισμοὺς ἐθνῶν
  english_pob_choice: breaks up the designs of the nations
  chosen_spanish: deshace los designios de las naciones
  alternatives_spanish:
  - frustra los planes de las naciones
  - disuelve los consejos de las naciones
  lexicon: BDAG
  rationale: '''Designios'' conserva el registro bíblico y ''deshace'' expresa bien el verbo de disolver/frustrar.'
- source_word: ζῳοποιοῦντα καὶ ζῆν ποιοῦντα
  english_pob_choice: gives life and causes to live
  chosen_spanish: da vida y hace vivir
  alternatives_spanish:
  - da vida y vivifica
  - vivifica y hace vivir
  lexicon: BDAG
  rationale: Mantiene la doble expresión sin redundancia artificial.
- source_word: εὐεργέτην
  english_pob_choice: benefactor
  chosen_spanish: benefactor
  alternatives_spanish:
  - bienhechor
  - hacedor de bien
  lexicon: BDAG
  rationale: Es el equivalente más digno y cercano al registro elevado de la oración.
- source_word: ἐπόπτην
  english_pob_choice: overseer
  chosen_spanish: observador
  alternatives_spanish:
  - vigilante
  - supervisor
  - veedor
  lexicon: LSJ
  rationale: Aquí el valor de mirada atenta encaja mejor con el contexto que un título técnico eclesial; 'observador' evita confusión institucional.
- source_word: ἀπηλπισμένων
  english_pob_choice: those without hope
  chosen_spanish: los que no tienen esperanza
  alternatives_spanish:
  - los desesperados
  - los sin esperanza
  lexicon: BDAG
  rationale: Hace explícita la condición descrita por el participio, con tono pastoral y claro.
- source_word: ἐπαίδευσας
  english_pob_choice: trained us
  chosen_spanish: nos educaste
  alternatives_spanish:
  - nos disciplinaste
  - nos instruiste
  lexicon: BDAG
  rationale: Aquí el verbo incluye formación y disciplina; 'educaste' recoge la acción formativa sin endurecerla.
- source_word: ἀντιλήμπτορα
  english_pob_choice: defender
  chosen_spanish: defensor
  alternatives_spanish:
  - protector
  - amparador
  lexicon: BDAG
  rationale: Encaja naturalmente con 'ayudador' y conserva la idea de apoyo activo.
- source_word: ἐπιφάνηθι
  english_pob_choice: show yourself
  chosen_spanish: muéstrate
  alternatives_spanish:
  - aparece
  - manifiéstate
  lexicon: BDAG
  rationale: Es una forma directa y reverente de petición divina en español.
- source_word: πλανωμένους
  english_pob_choice: those of your people who are wandering
  chosen_spanish: los que se extravían
  alternatives_spanish:
  - los que andan errantes
  - los descarriados
  lexicon: BDAG
  rationale: Preserva tanto la idea de desviación como el matiz pastoral de retorno al pueblo.
- source_word: λύτρωσαι
  english_pob_choice: ransom
  chosen_spanish: rescata
  alternatives_spanish:
  - redime
  - libra
  lexicon: BDAG
  rationale: '''Rescata'' transmite liberación efectiva en español; en este contexto funciona mejor que un calco económico de ''rescata'' no, sorry.'
- source_word: ὀλιγοψυχούντας
  english_pob_choice: the fainthearted
  chosen_spanish: los de poco ánimo
  alternatives_spanish:
  - los desanimados
  - los pusilánimes
  lexicon: BDAG
  rationale: Conserva el tono pastoral y evita una dureza innecesaria.
- source_word: παῖς σου
  english_pob_choice: your child
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu siervo
  - tu niño
  lexicon: BDAG
  rationale: En español, 'hijo' es la manera más natural de expresar la relación filial cuando el texto culmina en una confesión sobre Jesús.
- source_word: νομῆς
  english_pob_choice: pasture
  chosen_spanish: prado
  alternatives_spanish:
  - pastura
  - pasto
  - redil
  lexicon: LSJ
  rationale: '''Prado'' conserva la imagen pastoral clásica y suena más natural que ''pasto'' en un contexto litúrgico.'
theological_decisions:
- issue: Título de Cristo
  english_pob_reading: Jesus the Messiah
  chosen_spanish_reading: Jesús el Mesías
  alternative_spanish_readings:
  - Jesucristo
  rationale: Se mantiene el valor titulativo de Χριστός en vez de tratarlo como nombre fijo, conforme a la política del proyecto y al contexto confesional de la oración.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sentido de παῖς aplicado a Jesús
  english_pob_reading: your beloved child
  chosen_spanish_reading: tu amado hijo
  alternative_spanish_readings:
  - tu amado siervo
  - tu amado niño
  rationale: En español, 'hijo' comunica mejor la relación filial y evita una fórmula extraña; aun así, la elección conserva la tensión histórica del término en la tradición cristiana.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Petición a Dios como δέσποτα
  english_pob_reading: Master
  chosen_spanish_reading: Dueño
  alternative_spanish_readings:
  - Dueño soberano
  - Señor
  rationale: '''Dueño'' mantiene el sentido de autoridad/posesión más fuerte que κύριος y distingue el vocativo de otros títulos divinos más comunes.'
  doctrine_reference: 'DOCTRINE.md: Keep lexical distinctions when source distinguishes them.'
- issue: Frase difícil ἀρχέγονον πάσης κτίσεως
  english_pob_reading: the source from which all creation first came
  chosen_spanish_reading: el origen de toda la creación
  alternative_spanish_readings:
  - la fuente de toda la creación
  - el principio de toda la creación
  rationale: La construcción es comprimida y elevada; 'origen' conserva el valor primordial sin cerrar innecesariamente la ambigüedad del giro.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Descripción de Dios como ἐπόπτης
  english_pob_reading: overseer of human deeds
  chosen_spanish_reading: observador de las obras humanas
  alternative_spanish_readings:
  - vigilante de las obras humanas
  - supervisor de las obras humanas
  rationale: Se evita cargar el término con un oficio eclesiástico técnico; el contexto es de contemplación y juicio de las obras humanas.
  doctrine_reference: 'DOCTRINE.md: Preserve source-semantic range before confessional terminology.'
translation_notes:
  revision_awareness: No se requirieron revisiones adicionales; la redacción sigue de cerca el texto griego y el criterio auditado del POB en inglés, especialmente en los puntos teológicos más cargados.
  spanish_consistency_notes:
  - Se conservó 'Mesías' para Χριστός, coherente con el criterio del proyecto.
  - Se evitó 'SEÑOR' como sustituto de Yahvé; este pasaje no contiene el tetragrámaton, pero sí vocativos y títulos que se mantuvieron diferenciados.
  - '''Prado'' se usó para νομῆς para preservar la imagen pastoral sin caer en un regionalismo fuerte.'
  - '''Dueño'' se reservó para δέσποτα para distinguirlo de κύριος.'
  - Se mantuvo un registro litúrgico moderno y claro, sin recurrir innecesariamente a arcaísmos.
