base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/059/001.yaml
  text: 'But if some disobey the things spoken by him through us, let them know that they will entangle themselves in transgression and in no small danger. But we will be innocent of this sin, and we will ask, making earnest prayer and supplication, that the Creator of all may keep intact the number of his elect that has been counted throughout the whole world, through his beloved child Jesus the Messiah, through whom he called us from darkness into light, from ignorance into the full knowledge of the glory of his name,


    to hope in your name, the source from which all creation first came, having opened the eyes of our heart so that we might know you, the only Highest among the highest, holy, resting among the holy; the one who humbles the insolence of the proud, who breaks up the designs of the nations, who raises the lowly to high places and humbles the lofty, who makes rich and makes poor, who kills and gives life and causes to live, the only benefactor of spirits and God of all flesh; who looks into the depths, the overseer of human deeds, the helper of those in danger, the savior of those without hope, the creator and overseer of every spirit; who multiplies nations upon the earth and from among them all chooses those who love you through Jesus the Messiah, your beloved child, through whom you trained us, sanctified us, and honored us.


    We ask you, Master, to be our helper and defender. Rescue those of us who are in affliction, have mercy on the lowly, raise up the fallen, show yourself to those in need, heal the weak, turn back those of your people who are wandering. Feed the hungry, ransom our prisoners, raise up the sick, encourage the fainthearted. Let all the nations know that you alone are God, and that Jesus the Messiah is your child, and that we are your people and the sheep of your pasture.'
