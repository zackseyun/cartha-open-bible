id: 1CLEM.59.4
reference: 1 Clement 59:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἀξιόμεν σε, δέσποτα, βοηθὸν γενέσθαι καὶ ἀντιλήμπτορα ἡμῶν. τοὺς ἐν θλίψει ἡμῶν ῥῦσαι, τοὺς ταπεινοὺς ἐλέησον, τοὺς πεπτωκότας ἔγειρον, τοῖς δεομένοις ἐπιφάνηθι, τοὺς ἀσθενεῖς ἴασαι, τοὺς πλανωμένους τοῦ λαοῦ σου ἐπίστρεψον· χόρτασον τοὺς πεινῶντας, λύτρωσαι τοὺς δεσμίους ἡμῶν, ἐξανάστησον τοὺς ἀσθενοῦντας, παράκαλεσον τοὺς ὀλιγοψυχούντας· γνωτώσαν σε ἅπαντα τὰ ἔθνη, ὅτι σὺ εἶ ὁ θεὸς μόνος καὶ Ἰησοῦς Χριστὸς ὁ παῖς σου καὶ ἡμεῖς λαός σου καὶ πρόβατα τῆς νομῆς σου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/059/004.yaml
  text: We ask you[a], Master, to be our helper and protector. Rescue those of us in affliction, have mercy on the lowly, raise up the fallen, appear to those in need, heal the weak, turn back those of your people who wander. Feed the hungry, redeem our prisoners, raise up the sick, encourage the fainthearted. Let all the nations know that you alone are God, and Jesus Messiah is your servant, and we are your people and the sheep of your pasture.
  footnotes:
  - marker: a
    text: Or 'turn back the wandering of your people'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:20Z'
    unchanged: false
    changes_summary: 'Adjusted several terms for closer lexical accuracy and more natural formal English: added ''to be'' after ''ask you''; changed ''defender'' to ''protector''; rendered ἐπιφάνηθι as ''appear'' instead of ''show yourself''; changed ''ransom'' to ''redeem''; rendered παῖς as ''servant'' instead of ''child''; and used ''Christ'' rather than ''the Messiah'' for consistency with the Greek form. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Te rogamos, Soberano, que seas nuestro ayudador y protector. Rescata a los nuestros que están en aflicción; ten misericordia de los humildes; levanta a los caídos; manifiéstate a los necesitados; sana a los débiles; haz volver a los de tu pueblo que se extravían[a]. Alimenta a los hambrientos; redime a nuestros cautivos; levanta a los enfermos; alienta a los desanimados. Haz que todas las naciones sepan que solo tú eres Dios, y Jesús Mesías es tu siervo, y nosotros somos tu pueblo y las ovejas de tu pasto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haz volver el extravío de tu pueblo».
    reason: previous_rendering
lexical_decisions:
- source_word: ἀξιόμεν σε
  english_pob_choice: We ask you
  chosen_spanish: Te rogamos
  alternatives_spanish:
  - Te pedimos
  - Te imploramos
  lexicon: ἀξιόω
  rationale: En un registro litúrgico y suplicante, «te rogamos» transmite bien la petición reverente del griego sin sonar mecánico. Conserva el tratamiento directo a Dios/Dueño.
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: δέσποτης
  rationale: «Dueño» mantiene la fuerza de autoridad y posesión del término sin sustituirlo por el conventual «Señor», que podría mezclarlo con κύριος.
- source_word: βοηθὸν γενέσθαι καὶ ἀντιλήμπτορα ἡμῶν
  english_pob_choice: to be our helper and protector
  chosen_spanish: que seas nuestro ayudador y protector
  alternatives_spanish:
  - que seas nuestro auxiliador y defensor
  - que nos ayudes y protejas
  lexicon: βοηθός / ἀντιλήμπτωρ
  rationale: «Ayudador y protector» conserva el paralelismo y evita diluir δύο funciones distintas. «Protector» expresa bien ἀντιλήμπτωρ como quien toma a su cargo y resguarda.
- source_word: τοὺς ἐν θλίψει ἡμῶν
  english_pob_choice: those of us in affliction
  chosen_spanish: los que de nosotros están en tribulación
  alternatives_spanish:
  - los nuestros que están en aflicción
  - a los que entre nosotros sufren
  lexicon: θλῖψις
  rationale: «Tribulación» comunica la presión/aflicción del término con tono bíblico y digno. Mantiene la referencia interna a «de nosotros».
- source_word: τοὺς ταπεινοὺς
  english_pob_choice: the lowly
  chosen_spanish: los humildes
  alternatives_spanish:
  - los abatidos
  - los pequeños
  lexicon: ταπεινός
  rationale: «Humildes» es la equivalencia más natural en español eclesial para personas de condición abatida o baja; aquí conserva el valor social y espiritual del término.
- source_word: τοὺς πεπτωκότας
  english_pob_choice: the fallen
  chosen_spanish: los caídos
  alternatives_spanish:
  - los que han caído
  - los derribados
  lexicon: πίπτω
  rationale: La forma breve «los caídos» conserva la imagen y funciona bien en paralelo con las demás peticiones.
- source_word: τοῖς δεομένοις
  english_pob_choice: those in need
  chosen_spanish: los que están necesitados
  alternatives_spanish:
  - los necesitados
  - a los menesterosos
  lexicon: δέομαι
  rationale: Aunque el griego puede implicar necesidad o súplica, aquí el contexto pide un grupo necesitado. «Los que están necesitados» evita perder esa dependencia concreta.
- source_word: ἐπιφάνηθι
  english_pob_choice: appear
  chosen_spanish: preséntate
  alternatives_spanish:
  - aparece
  - manifiéstate
  lexicon: ἐπιφαίνω
  rationale: «Preséntate» expresa la epifanía solicitada con solemnidad y naturalidad en español. Evita sonar demasiado coloquial.
- source_word: τοὺς ἀσθενεῖς
  english_pob_choice: the weak
  chosen_spanish: los débiles
  alternatives_spanish:
  - los enfermos
  - los flacos
  lexicon: ἀσθενής
  rationale: Aquí se conserva la debilidad en sentido amplio, no únicamente enfermedad física, como en la lista paralela de peticiones.
- source_word: τοὺς πλανωμένους
  english_pob_choice: those of your people who wander
  chosen_spanish: los que se extravían de tu pueblo
  alternatives_spanish:
  - los que andan errantes de tu pueblo
  - los vagabundos de tu pueblo
  lexicon: πλανάω
  rationale: El participio apunta a personas, no al acto abstracto de vagar. «Se extravían» refleja bien el desvío y evita la ambigüedad nominal.
- source_word: χόρτασον
  english_pob_choice: Feed
  chosen_spanish: Alimenta
  alternatives_spanish:
  - Sacia
  - Da de comer a
  lexicon: χορτάζω
  rationale: «Alimenta» mantiene el imperativo simple y natural. «Sacia» sería más fuerte, pero aquí el paralelo con otras peticiones favorece una fórmula amplia.
- source_word: τοὺς δεσμίους ἡμῶν
  english_pob_choice: our prisoners
  chosen_spanish: nuestros presos
  alternatives_spanish:
  - nuestros cautivos
  - los que están presos de nosotros
  lexicon: δεσμιος
  rationale: «Presos» es claro y directo; conserva la referencia a personas encarceladas sin añadir matices jurídicos no presentes en el griego.
- source_word: ἐξανάστησον
  english_pob_choice: raise up
  chosen_spanish: levanta
  alternatives_spanish:
  - restaura
  - reanima
  lexicon: ἐξανίστημι
  rationale: El verbo puede expresar levantar/poner en pie. «Levanta» permite el paralelismo con «los caídos» y «los enfermos».
- source_word: τοὺς ὀλιγοψυχούντας
  english_pob_choice: the fainthearted
  chosen_spanish: los de poco ánimo
  alternatives_spanish:
  - los desanimados
  - los cobardes
  lexicon: ὀλιγόψυχος
  rationale: «Los de poco ánimo» preserva el sentido de ánimo reducido sin cargarlo con cobardía moral.
- source_word: Ἰησοῦς Χριστός
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús el Mesías
  lexicon: Χριστός
  rationale: Se mantiene «Mesías» porque el audit trail inglés restauró Messiah y el proyecto pide preferir el título cuando la fuente lo usa. «Jesús Mesías» evita convertirlo en mero nombre litúrgico fijo.
- source_word: ὁ παῖς σου
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu servidor
  - tu niño
  lexicon: παῖς
  rationale: Aunque παῖς puede significar «niño» o «siervo», el contexto aquí y el audit trail inglés favorecen el sentido de servidor/agente subordinado. «Siervo» es la opción más transparente.
- source_word: λαός σου
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  lexicon: λαός
  rationale: «Tu pueblo» es la correspondencia estable y eclesial de λαός en este contexto de alianza.
- source_word: πρόβατα τῆς νομῆς σου
  english_pob_choice: the sheep of your pasture
  chosen_spanish: las ovejas de tu prado
  alternatives_spanish:
  - las ovejas de tu pasto
  - las ovejas de tu rebaño
  lexicon: νομὴ
  rationale: «Prado» mantiene la imagen pastoral del griego con naturalidad en español. «Pasto» también es posible, pero «prado» suena más idiomático en un registro literario.
theological_decisions:
- issue: Tratamiento reverencial de Dios en la súplica
  english_pob_reading: Master; we ask you to be our helper and protector
  chosen_spanish_reading: Dueño; te rogamos que seas nuestro ayudador y protector
  alternative_spanish_readings:
  - Señor; te pedimos que seas nuestro ayudador y protector
  - Soberano; te imploramos que seas nuestro ayudador y protector
  rationale: Se evita «Señor» como máscara automática porque el griego usa δέσποτα, que concentra autoridad y dominio. «Dueño» conserva esa distinción sin perder reverencia.
  doctrine_reference: Distinción léxica entre δέσποτα y κύριος; fidelidad terminológica al texto fuente.
- issue: Χριστός / Mesías en la clausula final
  english_pob_reading: Jesus Messiah is your servant
  chosen_spanish_reading: Jesús Mesías es tu siervo
  alternative_spanish_readings:
  - Jesucristo es tu siervo
  - Jesús el Mesías es tu siervo
  rationale: Se mantiene «Mesías» porque el audit trail inglés restauró Messiah tras una regresión a Christ contra la política del proyecto. En español, el título conserva el vínculo semántico con el hebreo/grecohelenístico.
  doctrine_reference: Política POB sobre Χριστός / Messiah; preservación del título mesiánico.
- issue: Sentido de παῖς en referencia a Jesús
  english_pob_reading: your servant
  chosen_spanish_reading: tu siervo
  alternative_spanish_readings:
  - tu hijo
  - tu servidor
  rationale: El texto fuente y el audit trail favorecen el sentido funcional de subordinación/servicio. «Tu hijo» impondría una interpretación no apoyada por esta línea y perdería la relación con el encargo divino.
  doctrine_reference: Léxico de παῖς en contexto de agencia/servicio; evitar sobrelectura cristológica no demandada aquí.
- issue: La última fórmula pastoral
  english_pob_reading: the sheep of your pasture
  chosen_spanish_reading: las ovejas de tu prado
  alternative_spanish_readings:
  - las ovejas de tu pasto
  - las ovejas de tu rebaño
  rationale: Se conserva la imagen de pertenencia y cuidado pastoral sin sustituirla por una abstracción. «Prado» mantiene el paralelismo con el campo de alimentación y guía.
  doctrine_reference: Imagen pastoral bíblica de pertenencia del pueblo a Dios.
translation_notes:
  revision_awareness: 'Tomé como contexto el audit trail inglés más reciente: se corrigió la ambigüedad de «the wandering» a «those... who wander», se prefirió «protector», «appear», «redeem» y, tras una regresión, se restauró «Messiah». La versión española sigue esas decisiones semánticas, pero adapta «appear» como «preséntate» para un registro litúrgico natural y mantiene «Mesías» conforme a la política del proyecto.'
  spanish_consistency_notes:
  - Conservé un paralelismo imperativo encadenado similar al griego para la serie de peticiones.
  - Usé «Jesús Mesías» de forma consistente con la decisión auditada de mantener «Messiah».
  - Mantuve el campo semántico pastoral con «tu pueblo» y «las ovejas de tu prado».
  - Evité traducir δέσποτα por «Señor» para no confundirlo con la convención de YHWH ni con κύριος.
