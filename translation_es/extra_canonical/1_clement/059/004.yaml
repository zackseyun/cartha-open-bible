review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la secuencia de imperativos y la clausura confesional del griego, y preserva bien decisiones importantes como «Jesús Mesías» y «tu siervo». Sin embargo, varias elecciones españolas no representan con suficiente naturalidad o precisión el sentido fuente: «Dueño» para δέσποτα suena impropio en oración dirigida a Dios; «preséntate» no refleja bien ἐπιφάνηθι; «vuelve a los que se extravían de tu pueblo» es sintácticamente deficiente para τοὺς πλανωμένους τοῦ λαοῦ σου ἐπίστρεψον; y «prado» debilita la imagen estable de νομῆς como pasto/pastura.'
  spanish_quality_summary: 'El texto es generalmente legible, pero contiene giros poco idiomáticos o poco eclesiales: «los que de nosotros están en tribulación», «los que están necesitados», «nuestros presos» y sobre todo «Dueño». Conviene ajustar hacia un español más natural y digno sin perder literalidad. También la nota [a] no corresponde al contenido de la nota inglesa auditada.'
  glossary_alignment: Acierta al mantener «Mesías» para Χριστός y «siervo» para παῖς. No hay términos del glosario mayor en conflicto salvo que «Dueño» como equivalente de δέσποτα, aunque defendible léxicamente, resulta poco apropiado en el registro meta; «Soberano» preserva mejor la distinción respecto de κύριος sin caer en la máscara «Señor».
  issues:
  - severity: high
    issue: «Dueño» para δέσποτα
    rationale: Aunque refleja dominio/propiedad, en español de oración a Dios suena extraño y hasta doméstico. «Soberano» mantiene autoridad reverente y distingue de κύριος mejor que «Señor».
  - severity: medium
    issue: Nota [a] no refleja el audit trail inglés
    rationale: La nota inglesa preserva una alternativa para τοὺς πλανωμένους («O 'turn back the wandering of your people'»), no una nota sobre «te rogamos/te pedimos». La nota española actual documenta otra cosa.
  - severity: medium
    issue: «preséntate» para ἐπιφάνηθι
    rationale: En este contexto de súplica divina, «manifiéstate» o «aparece» comunica mejor la idea de hacerse visible/presente con auxilio. «Preséntate» suena menos natural y más coloquial.
  - severity: high
    issue: «vuelve a los que se extravían de tu pueblo»
    rationale: La construcción con «de tu pueblo» es poco natural y puede sugerir separación. El griego significa «haz volver a los de tu pueblo que andan extraviados».
  - severity: medium
    issue: «las ovejas de tu prado»
    rationale: La expresión estable bíblica en español es «las ovejas de tu pasto» o «de tu pastura». «Prado» cambia la imagen hacia un lugar físico más pintoresco y menos textual.
  - severity: low
    issue: Varios giros poco idiomáticos
    rationale: «los que de nosotros están en tribulación», «los que están necesitados» y «nuestros presos» pueden mejorarse a «los nuestros que están en aflicción», «los necesitados» y «nuestros cautivos» o «los nuestros que están presos» para mayor naturalidad.
  revised_spanish_text: Te rogamos, Soberano, que seas nuestro ayudador y protector. Rescata a los nuestros que están en aflicción; ten misericordia de los humildes; levanta a los caídos; manifiéstate a los necesitados; sana a los débiles; haz volver a los de tu pueblo que se extravían[a]. Alimenta a los hambrientos; redime a nuestros cautivos; levanta a los enfermos; alienta a los desanimados. Haz que todas las naciones sepan que solo tú eres Dios, y Jesús Mesías es tu siervo, y nosotros somos tu pueblo y las ovejas de tu pasto.
  revised_footnotes:
  - marker: a
    text: O «haz volver el extravío de tu pueblo».
    reason: previous_rendering
  revision_rationale: 'Se corrige el registro reverencial y la naturalidad del español sin apartarse del griego: δέσποτα → «Soberano»; ἐπιφάνηθι → «manifiéstate»; τοὺς πλανωμένους τοῦ λαοῦ σου ἐπίστρεψον → «haz volver a los de tu pueblo que se extravían», conservando en nota la alternativa abstracta documentada por el audit trail; νομῆς → «pasto». También se suavizan varios calcos poco idiomáticos.'
