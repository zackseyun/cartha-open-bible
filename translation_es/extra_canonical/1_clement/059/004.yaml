revisions:
- from: Te rogamos[a], Dueño, que seas nuestro ayudador y protector. Rescata a los que de nosotros están en tribulación; ten misericordia de los humildes; levanta a los caídos; preséntate a los que están necesitados; sana a los débiles; vuelve a los que se extravían de tu pueblo. Alimenta a los hambrientos; redime a nuestros presos; levanta a los enfermos; alienta a los de poco ánimo. Haz que todas las naciones sepan que solo tú eres Dios, y que Jesús Mesías es tu siervo, y que nosotros somos tu pueblo y las ovejas de tu prado.
  to: Te rogamos, Soberano, que seas nuestro ayudador y protector. Rescata a los nuestros que están en aflicción; ten misericordia de los humildes; levanta a los caídos; manifiéstate a los necesitados; sana a los débiles; haz volver a los de tu pueblo que se extravían[a]. Alimenta a los hambrientos; redime a nuestros cautivos; levanta a los enfermos; alienta a los desanimados. Haz que todas las naciones sepan que solo tú eres Dios, y Jesús Mesías es tu siervo, y nosotros somos tu pueblo y las ovejas de tu pasto.
  rationale: 'Se corrige el registro reverencial y la naturalidad del español sin apartarse del griego: δέσποτα → «Soberano»; ἐπιφάνηθι → «manifiéstate»; τοὺς πλανωμένους τοῦ λαοῦ σου ἐπίστρεψον → «haz volver a los de tu pueblo que se extravían», conservando en nota la alternativa abstracta documentada por el audit trail; νομῆς → «pasto». También se suavizan varios calcos poco idiomáticos.'
