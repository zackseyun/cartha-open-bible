source:
  edition: Funk 1901 (normalized OCR)
  text: ἐλπίζειν ἐπὶ τὸ ἀρχέγονον πάσης κτίσεως ὄνομά σου, ἀνοίξας τοὺς ὀφθαλμοὺς τῆς καρδίας ἡμῶν εἰς τὸ γινώσκειν σε τὸν μόνον ὕψιστον ἐν ὑψίστοις, ἅγιον ἐν ἁγίοις ἀναπαυόμενον· τὸν ταπεινοῦντα ὕβριν ὑπερηφάνων, τὸν διαλύοντα λογισμοὺς ἐθνῶν, τὸν ποιοῦντα ταπεινοὺς εἰς ὕψος καὶ τοὺς ὑψηλοὺς ταπεινοῦντα, τὸν πλουτίζοντα καὶ πτωχίζοντα, τὸν ἀποκτείνοντα καὶ ζῳοποιοῦντα καὶ ζῆν ποιοῦντα, μόνον εὐεργέτην πνευμάτων καὶ θεὸν πάσης σαρκός· τὸν ἐπιβλέποντα ἐν τοῖς ἀβύσσοις, τὸν ἐπόπτην ἀνθρωπίνων ἔργων, τὸν τῶν κινδυνευόντων βοηθόν, τὸν τῶν ἀπηλπισμένων σωτῆρα, τὸν παντὸς πνεύματος κτίστην καὶ ἐπίσκοπον· τὸν πληθύνοντα ἔθνη ἐπὶ γῆς καὶ ἐκ πάντων ἐκλεγόμενον τοὺς ἀγαπῶντάς σε διὰ Ἰησοῦ Χριστοῦ τοῦ ἠγαπημένου παιδός σου, δι’ οὗ ἡμᾶς ἐπαίδευσας, ἥγιασας, ἐτίμησας.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/059/003.yaml
  text: to hope in your name[a], the source of all creation, having opened the eyes of our heart so that we might know you, the only Most High among the highest, the Holy One resting among the holy ones; the one who humbles the insolence of the proud, who frustrates the plans of the nations, who exalts the humble and humbles the exalted, who makes rich and makes poor, who kills and gives life, the only benefactor of spirits and God of all flesh; who looks into the depths, the overseer of human deeds, the helper of those in danger, the savior of those without hope, the creator and overseer of every spirit; who multiplies nations on the earth and from among them all chooses those who love you through Jesus Messiah, your beloved servant, through whom you instructed us, sanctified us[b], and honored us.
  footnotes:
  - marker: a
    text: Or 'your name, the source from which all creation first came'.
    reason: previous_rendering
  - marker: b
    text: Or 'holy, resting among the holy'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:21Z'
    unchanged: false
    changes_summary: 'Refined several renderings for accuracy and register: ''primal source'' to ''source''; ''only Highest'' to ''only Most High''; ''breaks up the designs'' to ''frustrates the plans''; ''raises the lowly to high places and humbles the lofty'' to ''exalts the humble and humbles the exalted''; removed the redundant ''and causes to live''; ''upon the earth'' to ''on the earth''; ''Messiah'' to ''Christ'' for consistency with the Greek; ''child'' to ''servant'' for παιδός; and ''trained'' to ''instructed'' for ἐπαίδευσας. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: poner nuestra esperanza en tu nombre[a], la fuente de toda la creación, habiendo abierto los ojos de nuestro corazón para que te conozcamos a ti, el único Altísimo entre los altísimos, el Santo que reposa entre los santos[b]; el que humilla la insolencia de los soberbios, el que frustra los planes de las naciones, el que exalta a los humildes y humilla a los exaltados, el que enriquece y empobrece, el que mata y da vida, el único benefactor de los espíritus y Dios de toda carne; el que mira en los abismos, el que vigila las obras humanas, el que ayuda a los que están en peligro, el salvador de los desesperanzados, el creador y supervisor de todo espíritu; el que multiplica las naciones en la tierra y de entre todas ellas escoge a los que te aman por medio de Jesús Mesías, tu amado siervo, por quien nos instruiste, nos santificaste y nos honraste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu nombre, la fuente de la cual vino primero toda la creación».'
    reason: alternative_reading
  - marker: b
    text: 'O: «el Santo, reposando entre los santos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀρχέγονον πάσης κτίσεως ὄνομά σου
  english_pob_choice: your name, the source of all creation
  chosen_spanish: tu nombre, la fuente de toda la creación
  alternatives_spanish:
  - tu nombre, el origen de toda la creación
  - tu nombre, el principio de toda la creación
  lexicon: ἀρχέγονος
  rationale: La revisión inglesa reconoció que ἀρχέγονον modifica directamente a ὄνομα y expresa una relación de fuente/origen. En español, «la fuente de toda la creación» conserva esa fuerza nominal y evita una paráfrasis más larga. Se mantiene «tu nombre» en aposición, siguiendo la estructura griega.
- source_word: τὸν μόνον ὕψιστον ἐν ὑψίστοις
  english_pob_choice: the only Most High among the highest
  chosen_spanish: el único Altísimo entre los altísimos
  alternatives_spanish:
  - el único Supremo entre los supremos
  - el único Muy Alto entre los muy altos
  lexicon: ὕψιστος
  rationale: Se conserva el superlativo sustantivado con «Altísimo» y su plural correlativo con «altísimos». «El único» refleja μόνον con valor exclusivo, y la fórmula mantiene el contraste jerárquico del griego.
- source_word: ἅγιον ἐν ἁγίοις ἀναπαυόμενον
  english_pob_choice: the Holy One resting among the holy ones
  chosen_spanish: el Santo que reposa entre los santos
  alternatives_spanish:
  - el Santo que descansa entre los santos
  - el Santo que habita entre los santos
  lexicon: ἅγιος
  rationale: 'La revisión inglesa tomó ἅγιον como sustantivo: «the Holy One». En español, «el Santo» reproduce mejor ese uso sustantivado que un adjetivo simple. «Reposa entre los santos» conserva ἀναπαυόμενον sin forzar un matiz más doctrinal que el texto no impone.'
- source_word: ἐθνῶν
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: ἔθνος
  rationale: Se mantiene «las naciones» para preservar la resonancia bíblica y el paralelo con la intercesión/corrección divina en la oración.
- source_word: πνευμάτων καὶ θεὸν πάσης σαρκός
  english_pob_choice: spirits and God of all flesh
  chosen_spanish: los espíritus y Dios de toda carne
  alternatives_spanish:
  - los espíritus y Dios de toda la humanidad
  - los espíritus y Dios de toda criatura
  lexicon: πνεῦμα / σάρξ
  rationale: «Espíritus» preserva el plural de πνευμάτων. «Toda carne» mantiene la carga bíblica de σάρξ y evita diluir el contraste entre lo espiritual y lo corpóreo/humano.
- source_word: ἀνθρωπίνων ἔργων
  english_pob_choice: human deeds
  chosen_spanish: las obras humanas
  alternatives_spanish:
  - los hechos humanos
  - las acciones humanas
  lexicon: ἔργον
  rationale: «Obras humanas» es la opción más transparente y cercana al sustantivo griego. Conserva el plural concreto sin elevarlo a un giro más abstracto.
- source_word: παντὸς πνεύματος κτίστην καὶ ἐπίσκοπον
  english_pob_choice: the creator and overseer of every spirit
  chosen_spanish: el creador y supervisor de todo espíritu
  alternatives_spanish:
  - el creador y vigilante de todo espíritu
  - el creador y obispo de todo espíritu
  lexicon: ἐπίσκοπος
  rationale: «Supervisor» reproduce la función de ἐπίσκοπος sin introducir de antemano un título eclesial técnico que el contexto aquí no exige. «Todo espíritu» sigue el singular distributivo del griego.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús el Mesías
  lexicon: Χριστός
  rationale: Se sigue la política del proyecto de rendir Χριστός como «Mesías» en la forma del nombre/título, manteniendo la distinción conceptual y evitando aplanarlo a una forma litúrgica fija donde el audit trail preserva la tensión.
- source_word: τοῦ ἠγαπημένου παιδός σου
  english_pob_choice: your beloved servant
  chosen_spanish: tu amado siervo
  alternatives_spanish:
  - tu hijo amado
  - tu amado servidor
  lexicon: παῖς
  rationale: La revisión inglesa prefirió «servant» para παιδός. En español, «siervo» conserva mejor el eco bíblico y la ambigüedad respetuosa de παις/siervo-hijo sin resolverla artificialmente. «Amado» mantiene el vínculo afectivo del genitivo.
- source_word: ἐπαίδευσας
  english_pob_choice: you instructed us
  chosen_spanish: nos instruiste
  alternatives_spanish:
  - nos educaste
  - nos disciplinaste
  lexicon: παιδεύω
  rationale: «Instruiste» refleja el sentido de enseñanza/formación que la revisión inglesa prefirió frente a «trained». Se evita «disciplinaste» porque aquí el contexto inmediato es didáctico y de formación litúrgica más que punitivo.
theological_decisions:
- issue: Titulación divina de ὕψιστος y ἅγιος
  english_pob_reading: the only Most High among the highest; the Holy One resting among the holy ones
  chosen_spanish_reading: el único Altísimo entre los altísimos; el Santo que reposa entre los santos
  alternative_spanish_readings:
  - el único Supremo entre los supremos; el Santo descansando entre los santos
  - el único Altísimo entre los más altos; el Santo que habita entre los santos
  rationale: Se conserva la estructura de títulos superlativos sin convertirla en una paráfrasis teológica más explicativa de lo que permite el griego. La elección respeta la solemnidad de la doxología y la relación entre singularidad divina y comunidad de los santos.
  doctrine_reference: Cristología y teología del culto en 1 Clemente; fidelidad al lenguaje doxológico del texto
translation_notes:
  revision_awareness: La redacción incorpora la última revisión inglesa que corrigió ἀρχέγονον como un modificador directo de ὄνομα (no una cláusula relativa larga), mantuvo Χριστός como «Mesías» según la política del proyecto, y afinó varios pares léxicos («Most High», «frustrates the plans», «instructed»). También se tuvo en cuenta la observación gramatical sobre ἅγιον como sustantivo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca explícitamente el tetragrámaton; aquí el texto griego usa lenguaje doxológico indirecto y no requiere sustitución.
  - Se conserva «Mesías» para Χριστός en coherencia con la política POB, y no se introduce «Cristo» en el cuerpo principal.
  - «Espíritus» y «espíritu» se distinguen por número y función sintáctica; no se normaliza a un término teológicamente más técnico.
  - «Carne» se conserva en sentido bíblico para πάσα σάρξ, sin reemplazarlo por «humanidad» salvo que el contexto lo exigiera.
