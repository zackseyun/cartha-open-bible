translation:
  language: es
  text: Cada uno de nosotros, hermanos, en el rango que le ha sido asignado[a], agrade a Dios, con buena conciencia, sin traspasar la regla fijada de su propio ministerio[b], con dignidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Rango que le ha sido asignado'' intenta recoger el sentido de τάγμα como puesto o estación ordenada, no solo ''orden'' en sentido abstracto.'
    reason: lexical_alternative
  - marker: b
    text: '''Ministerio'' mantiene la resonancia eclesial de λειτουργία, aunque el contexto también conserva un trasfondo de servicio sagrado.'
    reason: theological_note
  - marker: c
    text: '''Con dignidad'' traduce el matiz de σεμνότητι: seriedad, corrección y decoro en la conducta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τάγματι
  english_pob_choice: appointed rank
  chosen_spanish: rango asignado
  alternatives_spanish:
  - orden asignado
  - puesto asignado
  - rango establecido
  lexicon: LSJ
  rationale: τάγμα puede expresar una disposición ordenada, rango o estación. 'Rango asignado' conserva la idea de una posición determinada y ordenada sin sonar demasiado técnico en español.
- source_word: εὐαρεστείτω
  english_pob_choice: be pleasing
  chosen_spanish: sea agradable
  alternatives_spanish:
  - sea placentero
  - sea aceptable
  - agrade a
  lexicon: BDAG
  rationale: El imperativo apunta a una conducta que resulte aceptable ante Dios. 'Sea agradable a Dios' mantiene el valor relacional y moral del verbo.
- source_word: συνειδήσει
  english_pob_choice: conscience
  chosen_spanish: conciencia
  alternatives_spanish:
  - conciencia moral
  - consciente
  - entendimiento
  lexicon: BDAG
  rationale: En el discurso moral cristiano temprano, συνείδησις se expresa de manera natural como 'conciencia'; así se preserva el tono ético del texto.
- source_word: παρεκβαίνων
  english_pob_choice: overstepping
  chosen_spanish: sin traspasar
  alternatives_spanish:
  - sin sobrepasar
  - sin desviarse de
  - sin exceder
  lexicon: LSJ
  rationale: El participio comunica ir más allá de un límite fijado. 'Traspasar' expresa bien la idea de cruzar un límite normativo, acorde con el contexto de orden y medida.
- source_word: ὡρισμένον
  english_pob_choice: fixed
  chosen_spanish: fijada
  alternatives_spanish:
  - determinada
  - establecida
  - señalada
  lexicon: BDAG
  rationale: El término indica algo establecido o determinado. 'Fijada' funciona de manera natural con 'regla' y conserva la idea de un límite definido.
- source_word: λειτουργίας
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  - función litúrgica
  - ministerio sagrado
  lexicon: BDAG
  rationale: λειτουργία puede aludir a servicio público o religioso. 'Ministerio' mantiene la resonancia eclesial en español y encaja con la analogía de orden ministerial del pasaje.
- source_word: κανόνα
  english_pob_choice: rule
  chosen_spanish: regla
  alternatives_spanish:
  - norma
  - medida
  - canon
  lexicon: BDAG
  rationale: κανών aquí designa una norma prescrita o límite. 'Regla' comunica con claridad la idea de un estándar fijado para el ministerio.
- source_word: σεμνότητι
  english_pob_choice: with dignity
  chosen_spanish: con dignidad
  alternatives_spanish:
  - con gravedad
  - con decoro
  - con seriedad
  lexicon: BDAG
  rationale: El término implica seriedad y corrección de conducta. 'Con dignidad' es idiomático en español y conserva el tono moral apropiado.
theological_decisions:
- issue: Analogía eclesial y cultual del orden ministerial
  english_pob_reading: The chapter is rendered to preserve Clement's appeal to ordered ranks and bounded ministries by analogy with Jerusalem's sacrificial regulations, without collapsing Christian ministry into Levitical priesthood.
  chosen_spanish_reading: El texto mantiene la apelación de Clemente al orden de rangos y ministerios limitados por analogía con las regulaciones sacrificiales de Jerusalén, sin reducir el ministerio cristiano al sacerdocio levítico.
  alternative_spanish_readings:
  - Convertir el pasaje en una simple exhortación moral sobre no salirse del puesto
  - Reformular λειτουργία como lenguaje litúrgico explícito en todo el versículo
  rationale: El griego conserva simultáneamente el orden eclesial y la analogía cultual. La traducción preserva esa tensión con expresiones como 'rango asignado' y 'ministerio', sin borrar el trasfondo sacrificial del contexto inmediato.
  doctrine_reference: Eclesiología y tipología cultual en 1 Clemente 41:1
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, que corrigió un duplicado del texto en inglés y confirmó la lectura 'prayers' para el pasaje ampliado. Para este versículo, el español se ajusta solo al contenido de 1 Clement 41:1 y no introduce material ajeno.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεός conforme al estándar del proyecto.
  - Se evitó 'SEÑOR' porque el texto griego usa θεός, no κύριος.
  - Se optó por un registro moderno y digno, evitando calcos innecesarios.
  - Se preservó la tensión entre orden eclesial y analogía cultual sin domesticar el vocabulario de λειτουργία.
