review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y del inglés POB: la restricción geográfica de los sacrificios, la limitación adicional dentro de Jerusalén, y la inspección previa de la ofrenda por las autoridades cultuales. Sin embargo, «holocausto continuo» parece demasiado específico frente al inglés auditado «the continual offering» y puede estrechar el sentido del original; «ofrenda continua» preserva mejor la referencia cultual sin sobreinterpretar. Además, el inglés explicita «for blemishes», matiz que conviene reflejar en español.'
  spanish_quality_summary: 'El español es claro, natural y de registro digno. La sintaxis fluye bien. Las mejoras necesarias son léxicas y de precisión cultual: evitar una posible sobredeterminación técnica en «holocausto continuo» y hacer explícita la idea de revisión de la ofrenda en cuanto a defectos/manchas.'
  glossary_alignment: No hay conflictos con los términos base del proyecto. «Sumo sacerdote», «santuario», «altar» y «Jerusalén» están bien. «Ministros» es aceptable para λειτουργοί en este contexto. La principal corrección es cambiar «holocausto continuo» por «ofrenda continua» para ajustarse mejor al audit trail y evitar fijar una categoría sacrificial más estrecha de la que el expediente respalda.
  issues:
  - severity: medium
    issue: «holocausto continuo» puede ser demasiado específico
    rationale: El expediente inglés auditado dice «the continual offering», no «burnt offering» de manera explícita. Traducir «holocausto continuo» introduce una identificación sacrificial más estrecha de lo que el registro presentado justifica.
  - severity: medium
    issue: Falta el matiz explícito de examen «por defectos»
    rationale: El inglés POB incluye «inspected for blemishes». «Examinada» sola comunica revisión, pero no el criterio cultual concreto. «Examinada para ver si tenía algún defecto» o equivalente preserva mejor el sentido.
  revised_spanish_text: Porque los sacrificios de la ofrenda continua, o de las oraciones, o por el pecado y la transgresión, no se ofrecen en todas partes, hermanos, sino solo en Jerusalén; y aun allí no se ofrecen en todo lugar, sino delante del santuario, en el altar, después de que la ofrenda haya sido examinada para ver si tenía algún defecto por el sumo sacerdote y los ministros ya mencionados.
  revision_rationale: Se ajusta «holocausto continuo» a «ofrenda continua» para no restringir indebidamente el referente cultual, y se añade explícitamente el matiz de inspección por defectos para reflejar con más fidelidad el audit trail inglés y el sentido ritual del pasaje.
