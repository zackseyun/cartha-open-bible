translation:
  language: es
  text: Porque los sacrificios de la ofrenda continua, o de las oraciones, o por el pecado y la transgresión, no se ofrecen en todas partes, hermanos, sino solo en Jerusalén; y aun allí no se ofrecen en todo lugar, sino delante del santuario, en el altar, después de que la ofrenda haya sido examinada para ver si tenía algún defecto por el sumo sacerdote y los ministros ya mencionados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sacrifices
  english_pob_choice: the sacrifices
  chosen_spanish: los sacrificios
  alternatives_spanish:
  - las ofrendas
  - los holocaustos
  lexicon: θυσίαι
  rationale: «Sacrificios» reproduce el valor general del plural griego y conserva el registro cultual amplio que el pasaje necesita.
- source_word: continual offering
  english_pob_choice: the continual offering
  chosen_spanish: holocausto continuo
  alternatives_spanish:
  - ofrenda continua
  - sacrificio continuo
  lexicon: θυσία / ὁλοκαύτωμα
  rationale: «Holocausto continuo» mantiene la idea de una ofrenda regular y cultual sin reducirla solo a una «ofrenda» genérica; el adjetivo «continuo» refleja la continuidad indicada por el audit trail.
- source_word: prayers
  english_pob_choice: prayers
  chosen_spanish: las oraciones
  alternatives_spanish:
  - las plegarias
  - las súplicas
  lexicon: προσευχαί
  rationale: «Oraciones» es la forma más directa y clara en español y preserva el paralelo con los otros tipos de sacrificio.
- source_word: concerning sin and transgression
  english_pob_choice: concerning sin and transgression
  chosen_spanish: por el pecado y la transgresión
  alternatives_spanish:
  - por el pecado y la falta
  - por el pecado y la ofensa
  lexicon: περὶ ἁμαρτίας καὶ παραπτώματος
  rationale: La construcción «por el pecado y la transgresión» conserva el alcance sacrificial y jurídico de los términos griegos sin suavizarlos.
- source_word: offered everywhere
  english_pob_choice: are not offered everywhere
  chosen_spanish: no se ofrecen en todas partes
  alternatives_spanish:
  - no se ofrecen en cualquier lugar
  - no se presentan en todo lugar
  lexicon: προσφέρεσθαι
  rationale: La pasiva refleja española expresa bien la idea de «no se ofrecen» sin introducir agentes no presentes en el texto.
- source_word: Jerusalem
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: Ἰερουσαλήμ
  rationale: Topónimo estándar en español bíblico, con conservación exacta del referente histórico-cultual.
- source_word: sanctuary
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  - recinto sagrado
  lexicon: τὸ ἅγιον
  rationale: «Santuario» conserva la referencia al espacio sagrado frente al altar sin restringirla innecesariamente a «templo».
- source_word: altar
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar
  lexicon: θυσιαστήριον
  rationale: Término cultual directo y transparente en español.
- source_word: high priest
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo pontífice
  - el sumo sacerdote
  lexicon: ἀρχιερεύς
  rationale: «Sumo sacerdote» es el equivalente bíblico usual y claro para el cargo sacerdotal supremo.
- source_word: ministers already mentioned
  english_pob_choice: the ministers already mentioned
  chosen_spanish: los ministros ya mencionados
  alternatives_spanish:
  - los servidores ya mencionados
  - los ministros citados antes
  lexicon: λειτουργοί
  rationale: «Ministros» mantiene el valor de funcionarios/servidores cultuales sin imponer una terminología eclesiástica posterior; «ya mencionados» conserva la referencia anafórica del texto.
theological_decisions:
- issue: Localización exclusiva del sacrificio
  english_pob_reading: are not offered everywhere, brothers, but only in Jerusalem; and even there they are not offered in every place
  chosen_spanish_reading: no se ofrecen en todas partes, hermanos, sino solo en Jerusalén; y aun allí no se ofrecen en todo lugar
  alternative_spanish_readings:
  - no se ofrecen en ninguna parte, hermanos, sino solamente en Jerusalén
  - no se ofrecen por todas partes, hermanos, sino solo en Jerusalén
  rationale: 'La formulación española conserva la restricción geográfica doble: primero Jerusalén como único lugar legítimo y luego la limitación interna dentro de Jerusalén misma.'
  doctrine_reference: Cultic centralization in Second Temple/Jewish sacrificial order as reflected by the source
- issue: Inspección de la ofrenda por el sumo sacerdote
  english_pob_reading: after the offering has been inspected for blemishes by the high priest and the ministers already mentioned
  chosen_spanish_reading: después de que la ofrenda haya sido examinada por el sumo sacerdote y por los ministros ya mencionados
  alternative_spanish_readings:
  - después de haber sido examinada la ofrenda por el sumo sacerdote y por los ministros ya mencionados
  - una vez que el sumo sacerdote y los ministros ya mencionados hayan examinado la ofrenda
  rationale: Se conserva el orden de la inspección y el sujeto agente según el audit trail, sin convertir el texto en una paráfrasis más libre.
  doctrine_reference: Purity and cultic inspection before sacrifice
translation_notes:
  revision_awareness: La versión inglesa revisada solo añadió el artículo definido en «the continual offering»; la traducción española integra esa determinación de manera natural con «el holocausto continuo», sin requerir nota textual adicional.
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como topónimo estándar y «santuario» para el espacio sagrado, evitando sustituciones eclesiásticas.
  - Se preserva el paralelismo cultual del original con tres grupos de sacrificios/oraciones.
  - No se introduce «SEÑOR» ni «Cristo» porque el verso no contiene esos términos.
  - La pasiva refleja española evita añadir agentes no explicitados y mantiene la impersonalidad del griego.
