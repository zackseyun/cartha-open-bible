revisions:
- from: Porque los sacrificios del holocausto continuo, o de las oraciones, o por el pecado y la transgresión, no se ofrecen en todas partes, hermanos, sino solo en Jerusalén; y aun allí no se ofrecen en todo lugar, sino delante del santuario, en el altar, después de que la ofrenda haya sido examinada por el sumo sacerdote y por los ministros ya mencionados.
  to: Porque los sacrificios de la ofrenda continua, o de las oraciones, o por el pecado y la transgresión, no se ofrecen en todas partes, hermanos, sino solo en Jerusalén; y aun allí no se ofrecen en todo lugar, sino delante del santuario, en el altar, después de que la ofrenda haya sido examinada para ver si tenía algún defecto por el sumo sacerdote y los ministros ya mencionados.
  rationale: Se ajusta «holocausto continuo» a «ofrenda continua» para no restringir indebidamente el referente cultual, y se añade explícitamente el matiz de inspección por defectos para reflejar con más fidelidad el audit trail inglés y el sentido ritual del pasaje.
