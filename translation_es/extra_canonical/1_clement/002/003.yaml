review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido global del griego: plenitud de disposición santa, celo y confianza piadosa, el gesto de extender las manos, la súplica a Dios Todopoderoso y la referencia a pecados no intencionales. Sin embargo, dos elecciones requieren ajuste menor para mayor fidelidad y mejor español eclesial: «hacia Dios» suena menos natural que «a Dios» con ἐκτείνω τὰς χεῖρας πρὸς, y «que fuese propicio» es posible pero resulta algo rígido; «que tuviera misericordia» comunica con más claridad ἵλεων γενέσθαι en español actual sin perder el matiz de favor misericordioso.'
  spanish_quality_summary: El texto es legible y digno, pero mezcla voseo reverencial peninsular («extendisteis», «habíais») con una meta declarada de español neutro latinoamericano. Para registro eclesial amplio conviene preferir formas como «extendieron» y «habían pecado». También «propósito santo» es comprensible, pero «santo propósito» suena más natural en español. La nota actual sobre el orden de palabras no añade valor real.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: θεόν = «Dios», παντοκράτορα = «Todopoderoso». No aparecen términos sensibles como Yahvé, Mesías o δοῦλος. La decisión sobre ἀκόντες debe seguir la revisión inglesa a «no intencional», y en español «sin querer» o «inadvertidamente» expresan mejor ese matiz que «involuntariamente», que puede sonar más a falta de control que a inadvertencia.'
  issues:
  - severity: medium
    issue: Registro verbal no alineado con español neutro
    rationale: «Extendisteis» y «habíais» son formas correctas, pero suenan marcadamente peninsulares; la guía pide español neutral latinoamericano/broadly church-readable.
  - severity: medium
    issue: «Hacia Dios Todopoderoso» es menos natural que «a Dios Todopoderoso»
    rationale: Con «extender las manos», el complemento habitual en español es «a»; «hacia» preserva dirección visual, pero resulta menos idiomático sin aportar sentido adicional importante.
  - severity: medium
    issue: «Que fuese propicio» suena rígido y algo opaco
    rationale: ἵλεων γενέσθαι apunta a que Dios sea/muestre misericordia o favor. «Tuviera misericordia» comunica mejor el sentido al lector actual y mantiene la solemnidad.
  - severity: low
    issue: La nota [a] no preserva una alternativa semántica relevante
    rationale: La inversión «propósito santo» / «santo propósito» no requiere nota; no añade información exegética ni resuelve ambigüedad.
  - severity: low
    issue: «Involuntariamente» no es el mejor equivalente contextual de ἀκόντες
    rationale: Aunque evita el error de «de mala gana», puede sugerir ausencia de voluntad o control. En contexto de pecado por inadvertencia, «sin querer» o «inadvertidamente» es más claro.
  revised_spanish_text: Y llenos de santo propósito, con buen celo y devota confianza extendieron sus manos a Dios Todopoderoso, suplicándole que tuviera misericordia, si en algo habían pecado sin querer.
  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad idiomática y alineación con el estilo meta: se cambió a formas verbales de español neutro («extendieron», «habían pecado»), «a Dios» por naturalidad, «tuviera misericordia» por claridad para ἵλεων γενέσθαι, «santo propósito» por orden español más natural y «sin querer» para expresar mejor el valor de ἀκόντες como pecado no intencional. La nota se eliminó por no aportar una alternativa sustantiva.'
