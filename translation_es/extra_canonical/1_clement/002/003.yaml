id: 1CLEM.2.3
reference: 1 Clement 2:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: μεστοί τε ὁσίας βουλῆς, ἐν ἀγαϑῇ προϑυμίᾳ μετ’ εὐσεβοῦς πεποιϑήσεως ἐξετείνατε τὰς χεῖρας ὑμῶν πρὸς τὸν παντοκράτορα ϑεόν, ἱκετεύοντες αὐτὸν ἵλεων γενέσϑαι, εἴ τι ἀκόντες ἡμάρτετε.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/002/003.yaml
  text: And being full of holy purpose[a], with good zeal and devout confidence you stretched out your hands to God Almighty, imploring him to be merciful, if in anything you had sinned unintentionally.
  footnotes:
  - marker: a
    text: Or 'unwillingly'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:25Z'
    unchanged: false
    changes_summary: 'Refined wording for accuracy and register: changed ''in good eagerness'' to ''with good zeal'' for προθυμίᾳ, removed ''the'' in ''God Almighty'' for a more natural formal rendering of τὸν παντοκράτορα θεόν, and changed ''begging him to become merciful'' to ''imploring him to be merciful'' for more natural English while preserving ἱκετεύοντες...ἵλεων γενέσθαι.'
translation:
  language: es
  text: Y estando llenos de propósito santo[a], con buen celo y devota confianza extendisteis vuestras manos hacia Dios Todopoderoso, suplicándole que fuese propicio, si en algo habíais pecado involuntariamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llenos de santo propósito».'
    reason: alternative_reading
lexical_decisions:
- source_word: μεστοί ... ὁσίας βουλῆς
  english_pob_choice: full of holy purpose
  chosen_spanish: llenos de propósito santo
  alternatives_spanish:
  - llenos de santo propósito
  - colmados de propósito santo
  lexicon: μεστός; ὁσίας; βουλή
  rationale: Conservo la idea de plenitud y el valor moral/religioso de ὁσίας. 'Propósito santo' refleja el sentido de intención o resolución, sin sobretraducir a una fórmula más interpretativa.
- source_word: ἐν ἀγαϑῇ προϑυμίᾳ
  english_pob_choice: with good zeal
  chosen_spanish: con buen celo
  alternatives_spanish:
  - con buena prontitud
  - con buena diligencia
  lexicon: προθυμία
  rationale: '''Celo'' comunica la energía voluntaria y positiva que el contexto requiere, y mantiene un registro digno en español. ''Prontitud'' o ''diligencia'' serían posibles, pero atenúan el matiz afectivo y devoto.'
- source_word: μετ’ εὐσεβοῦς πεποιϑήσεως
  english_pob_choice: with devout confidence
  chosen_spanish: con devota confianza
  alternatives_spanish:
  - con piadosa confianza
  - con confianza piadosa
  lexicon: εὐσεβής; πεποίθησις
  rationale: '''Devota confianza'' preserva la relación entre piedad y seguridad confiada, y evita una paráfrasis excesiva. ''Piadosa'' es posible, pero ''devota'' suena más natural aquí.'
- source_word: ἐξετείνατε τὰς χεῖρας ὑμῶν
  english_pob_choice: you stretched out your hands
  chosen_spanish: extendisteis vuestras manos
  alternatives_spanish:
  - alargasteis vuestras manos
  - alzasteis vuestras manos
  lexicon: ἐκτείνω; χείρ
  rationale: '''Extender las manos'' es la equivalencia directa y natural en español para el gesto de súplica. Mantiene la imagen corporal sin introducir una lectura litúrgica ajena.'
- source_word: πρὸς τὸν παντοκράτορα ϑεόν
  english_pob_choice: to God Almighty
  chosen_spanish: hacia Dios Todopoderoso
  alternatives_spanish:
  - a Dios Todopoderoso
  - ante Dios Todopoderoso
  lexicon: παντοκράτωρ; θεός
  rationale: '''Todopoderoso'' es la traducción estable de παντοκράτωρ. ''Hacia'' conserva el movimiento del gesto de oración; ''a'' también sería válida, pero menos visual.'
- source_word: ἱκετεύοντες αὐτὸν ἵλεων γενέσϑαι
  english_pob_choice: imploring him to be merciful
  chosen_spanish: suplicándole que fuese propicio
  alternatives_spanish:
  - implorándole que fuese misericordioso
  - rogándole que se mostrara propicio
  lexicon: ἱκετεύω; ἵλεως; γίνομαι
  rationale: '''Suplicándole'' corresponde a ἱκετεύοντες. Para ἵλεων γενέσθαι, ''ser propicio'' reproduce mejor la idea de volverse favorable; ''misericordioso'' sería posible, pero desplaza el foco del favor a una cualidad más general.'
- source_word: εἴ τι ἀκόντες ἡμάρτετε
  english_pob_choice: if in anything you had sinned unintentionally
  chosen_spanish: si en algo habíais pecado involuntariamente
  alternatives_spanish:
  - si en algo habíais pecado sin querer
  - si en algo habíais pecado inadvertidamente
  lexicon: ἄκων; ἁμαρτάνω
  rationale: '''Involuntariamente'' sigue la revisión inglesa desde ''unwillingly'' a ''unintentionally'' y evita sugerir pecado bajo coacción. ''Inadvertidamente'' o ''sin querer'' expresan la idea, pero ''involuntariamente'' mantiene un tono más técnico y solemne.'
theological_decisions:
- issue: Descripción del gesto de oración y de la disposición interior
  english_pob_reading: full of holy purpose ... with good zeal and devout confidence
  chosen_spanish_reading: llenos de propósito santo ... con buen celo y devota confianza
  alternative_spanish_readings:
  - llenos de santo propósito ... con buena diligencia y piadosa confianza
  rationale: El texto une intención interior y acto corporal de oración. La traducción conserva ambas capas sin diluir la tensión entre resolución humana y súplica reverente.
  doctrine_reference: Piedad práctica y oración de arrepentimiento
- issue: Naturaleza del pecado referido por ἀκόντες
  english_pob_reading: sinned unintentionally
  chosen_spanish_reading: habíais pecado involuntariamente
  alternative_spanish_readings:
  - habíais pecado inadvertidamente
  - habíais pecado sin querer
  rationale: La revisión del POB aclara que no se trata de pecado por compulsión, sino de falta involuntaria o no intencional. 'Involuntariamente' conserva esa distinción sin perder la gravedad moral.
  doctrine_reference: Pecado por inadvertencia / culpa no intencional
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: ''with good zeal'', ''God Almighty'' y ''unintentionally''. También toma en cuenta la corrección anterior de ἀκόντες para evitar la idea engañosa de ''contra la voluntad'' como coacción, prefiriendo una falta no intencional o involuntaria.'
  spanish_consistency_notes:
  - Usé 'Dios Todopoderoso' para παντοκράτορα θεόν, en línea con la decisión inglesa de evitar un artículo innecesario.
  - Conservé 'propicio' para ἵλεων γενέσθαι para mantener el matiz de favor divino más que una simple descripción abstracta de misericordia.
  - Mantuve un registro eclesial sobrio y moderno, sin acudir a fórmulas tradicionales que oculten el texto fuente.
