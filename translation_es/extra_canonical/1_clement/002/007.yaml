base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/002/007.yaml
  text: You mourned over the trespasses of your neighbors; you considered their shortcomings to be your own. Doing good[a], ready for every good work.
  footnotes:
  - marker: a
    text: Or 'Beneficent, ready for every good work,'.
    reason: previous_rendering
  revision_pass:
