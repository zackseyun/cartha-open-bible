  text: ἐπὶ τοῖς παραπτώμασιν τῶν πλησίον ἐπενϑεῖτε· τὰ ὑστερήματα αὐτῶν ἴδια ἐκρίνετε. ἀγαθοποιοί, ἕτοιμοι εἰς πᾶν ἔργον ἀγαθόν.
