    timestamp: '2026-04-23T11:33:27Z'
    unchanged: false
    changes_summary: Changed 'judged' to 'considered' for more natural sense of ἐκρίνετε here, and revised 'You were doers of good' to 'Doing good' to reflect the adjectival ἀγαθοποιοί more naturally without adding an unnecessary finite verb.
translation:
  language: es
  text: Se dolían por las transgresiones de sus prójimos; consideraban como propias sus faltas. Haciendo el bien[a], prontos para toda buena obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Benefactores, prontos para toda buena obra».
    reason: alternativa léxica para el adjetivo sustantivado ἀγαθοποιοί
lexical_decisions:
- source_word: ἐπὶ τοῖς παραπτώμασιν τῶν πλησίον ἐπενϑεῖτε
  english_pob_choice: You mourned over the trespasses of your neighbors
  chosen_spanish: Se dolían por las transgresiones de sus prójimos
  alternatives_spanish:
  - Lloraban por las faltas de sus vecinos
  - Se lamentaban por los pecados de sus prójimos
  lexicon: παράπτωμα = transgresión, falta; πλησίον = prójimo/vecino; ἐπενθεῖτε = lamentarse, dolerse, llorar por
  rationale: «Se dolían» conserva el matiz de duelo/lamento de ἐπενθεῖτε sin endurecerlo a un término más litúrgico. «Transgresiones» reproduce el peso moral de παράπτωμα, y «prójimos» mantiene la cercanía humana de πλησίον mejor que «vecinos» en un contexto ético-comunitario.
- source_word: τὰ ὑστερήματα αὐτῶν ἴδια ἐκρίνετε
  english_pob_choice: you considered their shortcomings to be your own
  chosen_spanish: consideraban como propias sus faltas
  alternatives_spanish:
  - juzgaban como propias sus carencias
  - tenían por propias sus deficiencias
  lexicon: ὑστέρημα = carencia, falta, deficiencia; κρίνω = considerar, juzgar, estimar
  rationale: «Consideraban» sigue la revisión inglesa de ἐκρίνετε como un juicio/estimación más natural que «juzgaban» en español aquí. «Como propias» preserva ἴδια y la idea de asumir el peso ajeno; «faltas» mantiene un término amplio y moral sin precisar demasiado.
- source_word: ἀγαθοποιοί
  english_pob_choice: Doing good
  chosen_spanish: Hacedores de bien
  alternatives_spanish:
  - Haciendo el bien
  - Benefactores
  lexicon: ἀγαθοποιός = hacer el bien, hacedor de bien
  rationale: El griego presenta un sustantivo/adjetivo plural sin verbo finito; «Hacedores de bien» conserva la cualidad habitual y es más natural en español que un calco como «haciendo el bien». Además, mantiene la fuerza descriptiva que la revisión inglesa buscó al evitar un verbo copulativo innecesario.
- source_word: ἕτοιμοι εἰς πᾶν ἔργον ἀγαθόν
  english_pob_choice: ready for every good work
  chosen_spanish: prontos para toda buena obra
  alternatives_spanish:
  - preparados para toda obra buena
  - listos para toda buena acción
  lexicon: ἕτοιμοι = prontos, listos, preparados; ἔργον ἀγαθόν = buena obra, buena acción
  rationale: «Prontos» refleja disponibilidad inmediata y conserva un registro más elevado que «listos». «Buena obra» sigue el lenguaje bíblico habitual para ἔργον ἀγαθόν sin perder claridad en español.
theological_decisions:
- issue: Relación ética con el prójimo y asunción de las faltas ajenas
  english_pob_reading: You mourned over the trespasses of your neighbors; you considered their shortcomings to be your own.
  chosen_spanish_reading: Se dolían por las transgresiones de sus prójimos; consideraban como propias sus faltas.
  alternative_spanish_readings:
  - Lloraban por los pecados de sus vecinos; tenían por propias sus deficiencias.
  - Se lamentaban por las faltas de sus prójimos y las asumían como propias.
  rationale: El texto describe solidaridad moral y empatía comunitaria, no simple censura. «Como propias» conserva la tensión ética de asumir responsabilidad por la condición ajena, sin convertir el pasaje en una fórmula doctrinal que el griego no explicita.
  doctrine_reference: ética cristiana de solidaridad fraterna y examen mutuo
- issue: Naturaleza de ἀγαθοποιοί como cláusula independiente sin verbo finito
  english_pob_reading: Doing good, ready for every good work.
  chosen_spanish_reading: Hacedores de bien, prontos para toda buena obra.
  alternative_spanish_readings:
  - Haciendo el bien, prontos para toda buena obra.
  - Que hacen el bien, prontos para toda buena obra.
  rationale: La frase griega funciona como una designación nominal/adjetival. En español, un sustantivo de agente plural comunica mejor la cualidad estable que un gerundio, y evita añadir un verbo copulativo no presente en el texto base.
  doctrine_reference: descripción ética de la conducta cristiana
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que prefirió «considered» para ἐκρίνετε y «Doing good» para ἀγαθοποιοί, evitando un verbo finito añadido y manteniendo el carácter de cláusula independiente del griego. La versión española refleja esa misma decisión mediante «consideraban» y la construcción nominal «Hacedores de bien».
  spanish_consistency_notes:
  - Se mantuvo «prójimos» para πλησίον por coherencia con el registro ético-bíblico.
  - Se evitó «SEÑOR», «Cristo» o terminología confesional no presente en el versículo.
  - «Buena obra» se usó de forma consistente para ἔργον ἀγαθόν, con el plural semántico implícito en «toda».
