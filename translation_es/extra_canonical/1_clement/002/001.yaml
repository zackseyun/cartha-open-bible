translation:
  language: es
  text: Y todos ustedes eran humildes de corazón[a], sin jactarse de nada, sometiéndose más bien que exigiendo sumisión, hallando más placer en dar que en recibir; contentos con las provisiones del Mesías, y atentos a sus palabras, las habían abrazado cuidadosamente en sus corazones, y sus sufrimientos estaban delante de sus ojos. Así se daba a todos una paz profunda y rica, y un anhelo insaciable de hacer el bien, y una plena efusión del Espíritu Santo venía sobre todos. Y, llenos de santo propósito, con buena disposición y con confianza devota, extendían sus manos hacia Dios el Todopoderoso, rogándole que fuera misericordioso, si en algo hubieran pecado sin querer. De día y de noche su preocupación era por toda la hermandad, para que el número de sus elegidos fuera salvo con misericordia y conciencia. Eran sinceros y sin doblez, y libres de resentimiento unos hacia otros. Toda sedición y todo cisma les era detestable. Se lamentaban por las transgresiones de sus vecinos; consideraban sus
    faltas como propias. Haciendo el bien, listos para toda buena obra, adornados con una conducta venerable, se conducían en todo con temor de él; los mandamientos y los justos requisitos del Señor habían sido escritos en las tablas de sus corazones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''De corazón'' busca conservar en español la fuerza interior de ταπεινοφρονεῖτε, sin reducir el término a una simple actitud momentánea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταπεινοφρονεῖτε
  english_pob_choice: were humble-minded
  chosen_spanish: eran humildes de corazón
  alternatives_spanish:
  - practicaban humildad
  - eran humildes
  lexicon: LSJ
  rationale: Mantiene el valor durativo y de carácter de la forma verbal, pero lo expresa en español con una frase natural y digna. 'De corazón' ayuda a conservar el matiz interior de ταπεινοφροσύνη sin sonar mecánico.
- source_word: ἀλαζονευόμενοι
  english_pob_choice: boasting in nothing
  chosen_spanish: sin jactarse de nada
  alternatives_spanish:
  - sin arrogancia
  - no presumían de nada
  lexicon: LSJ
  rationale: La idea no es solo orgullo abstracto, sino autoexhibición o jactancia. 'Jactarse' reproduce bien el contraste con la humildad.
- source_word: ὑποτασσόμενοι μᾶλλον ἢ ὑποτάσσοντες
  english_pob_choice: submitting rather than demanding submission
  chosen_spanish: sometiéndose más bien que exigiendo sumisión
  alternatives_spanish:
  - sometiéndose más bien que sometiendo
  - obedeciendo más bien que imponiéndose
  lexicon: BDAG
  rationale: El contraste es relacional y ético. 'Exigiendo sumisión' hace explícito el matiz activo del participio sin perder la forma comparativa.
- source_word: ἧδον διδόντες ἢ λαμβάνοντες
  english_pob_choice: taking more pleasure in giving than in receiving
  chosen_spanish: hallando más placer en dar que en recibir
  alternatives_spanish:
  - gustando más de dar que de recibir
  - prefiriendo dar antes que recibir
  lexicon: LSJ
  rationale: Conserva la comparación afectiva y el tono exhortativo de la frase griega, en un español fluido.
- source_word: ἐφοδίοις
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - suministros
  - recursos
  lexicon: LSJ
  rationale: '''Provisiones'' expresa bien lo necesario para el camino o sustento, y en español moderno sigue siendo claro.'
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: 'Se conserva el criterio del proyecto: Χριστός como título se traduce ''Mesías'' cuando funciona como designación titulada, no como nombre fijo.'
- source_word: ἐνεστερνισμένοι ... τοῖς σπλάγχνοις
  english_pob_choice: had embraced them carefully in your hearts
  chosen_spanish: las habían abrazado cuidadosamente en sus corazones
  alternatives_spanish:
  - las habían guardado con cuidado en su interior
  - las habían hecho suyas en lo más íntimo
  lexicon: LSJ
  rationale: La revisión inglesa prefirió 'hearts' por el sentido idiomático, y el español puede seguir esa línea con 'corazones' sin perder la intensidad afectiva del pasaje.
- source_word: τὰ παθήματα αὐτοῦ
  english_pob_choice: his sufferings
  chosen_spanish: sus sufrimientos
  alternatives_spanish:
  - lo que padeció
  - sus padecimientos
  lexicon: BDAG
  rationale: En contexto cristológico, 'sufrimientos' comunica con claridad el contenido de πάθημα y el valor ejemplar de la memoria de Cristo.
- source_word: λιπαρά
  english_pob_choice: rich
  chosen_spanish: rica
  alternatives_spanish:
  - abundante
  - plena
  lexicon: LSJ
  rationale: Con paz como sujeto, 'rica' expresa plenitud y densidad sin forzar un matiz ajeno al griego.
- source_word: ἀκόρεστος πόθος εἰς ἀγαθοποιΐαν
  english_pob_choice: an insatiable longing for doing good
  chosen_spanish: un anhelo insaciable de hacer el bien
  alternatives_spanish:
  - un deseo insaciable de hacer el bien
  - una pasión nunca satisfecha por el bien
  lexicon: LSJ
  rationale: '''Anhelo insaciable'' conserva la fuerza afectiva de πόθος y ''hacer el bien'' traduce con naturalidad la orientación práctica de ἀγαθοποιΐα.'
- source_word: πλήρης πνεύματος ἁγίου ἐπέχυσις
  english_pob_choice: a full outpouring of the Holy Spirit
  chosen_spanish: una plena efusión del Espíritu Santo
  alternatives_spanish:
  - un derramamiento pleno del Espíritu Santo
  - una completa efusión del Espíritu Santo
  lexicon: BDAG
  rationale: '''Efusión'' conserva la imagen de derramamiento con un registro eclesial claro; ''plena'' refleja la fuerza de πλήρης sin expandir el sentido.'
- source_word: ὁσίας βουλῆς
  english_pob_choice: holy purpose
  chosen_spanish: santo propósito
  alternatives_spanish:
  - propósito santo
  - resolución santa
  lexicon: LSJ
  rationale: βούλη aquí apunta a intención o resolución interior, no a consejo público. 'Santo propósito' suena natural y preserva el matiz volitivo.
- source_word: εὐσεβοῦς πεποιθήσεως
  english_pob_choice: devout confidence
  chosen_spanish: confianza devota
  alternatives_spanish:
  - seguridad piadosa
  - confianza piadosa
  lexicon: BDAG
  rationale: La combinación mantiene reverencia y firmeza interior. 'Devota' reproduce bien εὐσεβής en un registro comprensible y litúrgicamente sobrio.
- source_word: ἵλεων γενέσθαι
  english_pob_choice: to become merciful
  chosen_spanish: que fuera misericordioso
  alternatives_spanish:
  - que se mostrara benigno
  - que fuera propicio
  lexicon: LSJ
  rationale: Sigue la revisión inglesa que evita el tecnicismo cultual. En español, 'ser misericordioso' expresa la petición de favor y perdón divinos sin arcaísmo.
- source_word: εἴ τι ἀκόντες ἡμάρτετε
  english_pob_choice: if in anything you had sinned unwillingly
  chosen_spanish: si en algo hubieran pecado sin querer
  alternatives_spanish:
  - si en algo hubieran pecado involuntariamente
  - si en algo hubieran errado contra su voluntad
  lexicon: BDAG
  rationale: '''Sin querer'' comunica bien el matiz de ἀκόντες y conserva la gravedad moral de ἁμαρτάνω sin sobreexplicar.'
- source_word: ἀδελφότητος
  english_pob_choice: brotherhood
  chosen_spanish: hermandad
  alternatives_spanish:
  - fraternidad
  - comunidad de hermanos
  lexicon: BDAG
  rationale: '''Hermandad'' conserva el colectivo eclesial con fuerza y naturalidad en español, sin diluir la textura comunitaria del término.'
- source_word: μετ’ ἐλέους καὶ συνειδήσεως
  english_pob_choice: with mercy and conscience
  chosen_spanish: con misericordia y conciencia
  alternatives_spanish:
  - con misericordia y buena conciencia
  - con compasión y conciencia
  lexicon: BDAG
  rationale: Se evita añadir 'buena' donde el griego no la dice. 'Conciencia' queda desnuda para no suavizar el borde semántico del original.
- source_word: εἰλικρινεῖς
  english_pob_choice: sincere
  chosen_spanish: sinceros
  alternatives_spanish:
  - genuinos
  - puros
  lexicon: BDAG
  rationale: '''Sinceros'' comunica transparencia moral y resulta natural en un catálogo de virtudes.'
- source_word: ἀκέραιοι
  english_pob_choice: guileless
  chosen_spanish: sin doblez
  alternatives_spanish:
  - íntegros
  - sin malicia
  lexicon: BDAG
  rationale: '''Sin doblez'' preserva la idea de ausencia de duplicidad y encaja con el paralelismo de la frase.'
- source_word: ἀμνησίκακοι
  english_pob_choice: free from resentment
  chosen_spanish: libres de resentimiento
  alternatives_spanish:
  - sin rencor
  - no recordando agravios
  lexicon: LSJ
  rationale: Expresa idiomáticamente la negativa a retener agravios, sin volverla demasiado técnica.
- source_word: στάσις
  english_pob_choice: sedition
  chosen_spanish: sedición
  alternatives_spanish:
  - facción
  - discordia
  lexicon: BDAG
  rationale: En el contexto de Clemente, el término tiene un peso comunitario y disruptivo fuerte; 'sedición' preserva esa severidad.
- source_word: σχίσμα
  english_pob_choice: schism
  chosen_spanish: cisma
  alternatives_spanish:
  - división
  - ruptura
  lexicon: BDAG
  rationale: Se mantiene el término eclesial clásico porque el contexto es abiertamente de ruptura comunitaria.
- source_word: παραπτώμασιν
  english_pob_choice: trespasses
  chosen_spanish: transgresiones
  alternatives_spanish:
  - faltas
  - ofensas
  lexicon: BDAG
  rationale: '''Transgresiones'' conserva el peso moral-religioso del término y suena natural en el español bíblico contemporáneo.'
- source_word: τὰ ὑστερήματα αὐτῶν ἴδια ἐκρίνετε
  english_pob_choice: you judged their shortcomings to be your own
  chosen_spanish: consideraban sus faltas como propias
  alternatives_spanish:
  - juzgaban sus carencias como propias
  - estimaban sus faltas como de ustedes mismos
  lexicon: LSJ
  rationale: La frase conserva la solidaridad comunitaria del griego. 'Como propias' mantiene la brevedad y el sentido de apropiación moral.
- source_word: ἀγαθοποιοί
  english_pob_choice: Doing good
  chosen_spanish: Haciendo el bien
  alternatives_spanish:
  - Hacedores del bien
  - Benefactores
  lexicon: LSJ
  rationale: La revisión inglesa corrigió hacia una expresión más concreta; en español 'Haciendo el bien' sigue ese ajuste y evita un adjetivo menos natural en la cadena.
- source_word: σεβασμίῳ πολιτείᾳ
  english_pob_choice: a venerable way of life
  chosen_spanish: una conducta venerable
  alternatives_spanish:
  - una manera de vivir venerable
  - una vida respetable
  lexicon: BDAG
  rationale: Politeia aquí apunta al modo de vivir o conducta. 'Conducta venerable' conserva dignidad y evita un giro demasiado moderno.
- source_word: ἐτελελεῖτε
  english_pob_choice: conducted yourselves in everything
  chosen_spanish: se conducían en todo
  alternatives_spanish:
  - lo realizaban todo
  - llevaban todo a cabo
  lexicon: LSJ
  rationale: El verbo transmite la idea de llevar a término la conducta general. 'Se conducían en todo' es la forma más natural y fiel en español.
- source_word: τὰ δικαιώματα τοῦ κυρίου
  english_pob_choice: the righteous requirements of the Lord
  chosen_spanish: los justos requisitos del Señor
  alternatives_spanish:
  - las ordenanzas justas del Señor
  - los mandatos justos del Señor
  lexicon: BDAG
  rationale: '''Requisitos'' refleja la dimensión normativa del término sin volverlo excesivamente técnico. ''Justos'' conserva el valor ético/legal.'
- source_word: ἐπὶ τὰ πλάτη τῆς καρδίας
  english_pob_choice: the tablets of your hearts
  chosen_spanish: las tablas de sus corazones
  alternatives_spanish:
  - las tablas de sus corazones
  - la anchura de sus corazones
  lexicon: LSJ
  rationale: Aunque la literalidad de πλάτη es 'anchuras' o 'espacios amplios', el propio audit trail inglés revisó hacia la imagen idiomática de 'tablets'. En español, 'tablas de sus corazones' mantiene esa resonancia escritural y evita una rareza opaca.
theological_decisions:
- issue: Rendering Χριστοῦ as title rather than fixed name
  english_pob_reading: of the Messiah
  chosen_spanish_reading: del Mesías
  alternative_spanish_readings:
  - de Cristo
  rationale: Se sigue la política del proyecto de traducir títulos cristológicos cuando el contexto los usa con valor titular. 'Mesías' preserva el vínculo con la expectativa salvífica y con la auditable decisión inglesa.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Ecclesial collective ἀδελφότητος
  english_pob_reading: brotherhood
  chosen_spanish_reading: hermandad
  alternative_spanish_readings:
  - fraternidad
  - comunidad de hermanos
  rationale: El contexto de Clemente es comunitario y eclesial; 'hermandad' conserva la forma colectiva sin diluirla en una abstracción social moderna.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
- issue: Rendering σχίσμα with strong churchly force
  english_pob_reading: schism
  chosen_spanish_reading: cisma
  alternative_spanish_readings:
  - división
  - ruptura
  rationale: El texto trata de rupturas comunitarias dentro de la iglesia; 'cisma' mantiene la gravedad eclesial que el inglés auditado también preserva.
  doctrine_reference: 'PHILOSOPHY.md: Preserve rhetorical and ecclesial texture.'
translation_notes:
  revision_awareness: 'Seguí de cerca el último pass de revisión inglesa para respetar sus ajustes semánticos: ''hearts'' para σπλάγχνοις, ''conscience'' sin adición de ''good'', la formulación concreta para ἀγαθοποιοί, la idea de conducta para ἐτελελεῖτε y la imagen más idiomática para πλάτη. A la vez, adapté esas decisiones al español sin retroceder a calcos innecesarios ni introducir formulaciones no sustentadas por el griego.'
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para Χριστοῦ conforme al estándar del proyecto.
  - Se evitó 'Señor' como máscara para el nombre divino; aquí el griego usa κύριος en un marco citacional, pero la frase sigue la decisión auditada del inglés y se traduce de manera directa en español.
  - '''Conciencia'' se dejó sin adjetivo para no añadir una precisión inexistente en el griego.'
  - '''Cisma'' y ''sedición'' conservan el tono eclesial fuerte del pasaje.'
  - El registro general procura ser bíblico y digno, pero con sintaxis española natural.
