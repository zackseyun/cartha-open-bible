review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro auditado en inglés en casi todo el versículo: humildad, contraste entre someterse y exigir sumisión, dar más que recibir, provisiones del Mesías, atención a sus palabras, sufrimientos ante los ojos, paz profunda y rica, efusión del Espíritu Santo, oración al Dios Todopoderoso, pecado involuntario, preocupación por toda la hermandad, rechazo de sedición y cisma, duelo por las transgresiones ajenas, solidaridad con las faltas del prójimo, buena conducta y mandamientos escritos en el corazón. Sin embargo, hay un punto de fidelidad mejorable: «fuera salvo» para σώζεσθαι τὸν ἀριθμὸν ... resulta menos natural y algo más singularizador que el sentido colectivo «fuera preservado/salvado». También conviene pulir algunos giros para español más natural sin perder fuerza lexical.'
  spanish_quality_summary: 'La calidad general es alta y el registro es digno y legible. No obstante, hay pequeñas asperezas: «humildes de corazón» puede sonar interpretativo frente a la decisión inglesa «humble-minded»; «plena efusión» es comprensible pero «pleno derramamiento» o «plena efusión» ambos funcionan; «venía sobre todos» puede mejorarse a «se derramaba sobre todos» para reflejar mejor ἐπέχυσις/ἐγίνετο; «fuera salvo» suena menos idiomático en español eclesial que «fuera preservado» o «fuera salvado». La nota [a] no es necesaria, porque introduce una justificación de matiz que puede resolverse mejor en el texto mismo.'
  glossary_alignment: 'El borrador respeta bien la terminología del proyecto: Χριστοῦ como «Mesías», πνεύματος ἁγίου como «Espíritu Santo», ἀδελφότης como «hermandad», σχίσμα como «cisma». «Señor» para κυρίου es aceptable aquí porque el griego tiene κυρίου, no el Tetragrámaton. No hay conflictos doctrinales mayores. Recomiendo ajustar ἐταπεινοφρονεῖτε a «eran humildes» para evitar una expansión innecesaria, y σώζεσθαι ... τὸν ἀριθμόν a una formulación colectiva más fiel y natural.'
  issues:
  - severity: medium
    issue: «humildes de corazón[a]» añade un matiz no explícito en el texto base
    rationale: ἐταπεινοφρονεῖτε expresa humildad de mente/actitud; «de corazón» no es gravemente erróneo, pero desplaza el eje semántico y requiere una nota innecesaria.
  - severity: medium
    issue: «una plena efusión del Espíritu Santo venía sobre todos» no refleja del modo más natural la imagen de derramamiento
    rationale: La combinación nominal/verbal suena algo tiesa en español. «se derramaba sobre todos» o «vino sobre todos» recoge mejor ἐπέχυσις ... ἐγίνετο.
  - severity: high
    issue: «para que el número de sus elegidos fuera salvo» es poco idiomático y puede desajustar el valor colectivo de τὸν ἀριθμόν
    rationale: El griego apunta a la preservación/salvación del número total de los escogidos; en español «fuera preservado» o «fuera salvado» suena más natural y fiel que «fuera salvo».
  - severity: low
    issue: La nota [a] no aporta una ambigüedad real que el lector necesite resolver
    rationale: Las notas deben reservarse para alternativas significativas o posibles confusiones; aquí basta con una formulación española más limpia en el texto principal.
  revised_spanish_text: Y todos ustedes eran humildes, sin jactarse de nada, sometiéndose más bien que exigiendo sumisión, hallando más placer en dar que en recibir; contentos con las provisiones del Mesías, y atentos a sus palabras, las habían abrazado cuidadosamente en sus corazones, y sus sufrimientos estaban delante de sus ojos. Así se daba a todos una paz profunda y rica, y un anhelo insaciable de hacer el bien, y una plena efusión del Espíritu Santo se derramaba sobre todos. Y, llenos de santo propósito, con buena disposición y con confianza devota, extendían sus manos hacia Dios el Todopoderoso, rogándole que fuera misericordioso, si en algo hubieran pecado sin querer. De día y de noche su preocupación era por toda la hermandad, para que el número de sus elegidos fuera preservado con misericordia y conciencia. Eran sinceros y sin doblez, y libres de resentimiento unos hacia otros. Toda sedición y todo cisma les era detestable. Se lamentaban por las transgresiones de sus vecinos; consideraban
    sus faltas como propias. Haciendo el bien, listos para toda buena obra, adornados con una conducta venerable, se conducían en todo con temor de él; los mandamientos y los justos requisitos del Señor habían sido escritos en las tablas de sus corazones.
  revision_rationale: 'Se hizo una reparación menor para mejorar fidelidad y español natural sin alterar la estructura del pasaje: «humildes» en vez de «humildes de corazón» evita una expansión interpretativa; «se derramaba sobre todos» representa mejor la imagen de efusión; y «fuera preservado» corrige el giro menos idiomático «fuera salvo» y refleja mejor el sentido colectivo de σώζεσθαι τὸν ἀριθμόν. Se elimina la nota [a] por innecesaria.'
