  text: Πάντες τε ἐταπεινοφρονεῖτε μηδὲν ἀλαζονευόμενοι, ὑποτασσόμενοι μᾶλλον ἢ ὑποτάσσοντες, ἧδον διδόντες ἢ λαμβάνοντες· τοῖς ἐφοδίοις τοῦ Χριστοῦ ἀρκούμενοι καὶ προσέχοντες, τοὺς λόγους αὐτοῦ ἐπιμελῶς ἐνεστερνισμένοι ἦτε τοῖς σπλάγχνοις, καὶ τὰ παθήματα αὐτοῦ ἦν πρὸ ὀφϑαλμῶν ὑμῶν. 2. οὕτως εἰρήνη βαϑεῖα καὶ λιπαρὰ ἐδέδοτο πᾶσιν καὶ ἀκόρεστος πόϑος εἰς ἀγαϑοποιΐαν, καὶ πλήρης πνεύματος ἁγίου ἐπέχυσις ἐπὶ πάντας ἐγίνετο· . μεστοί τε ὁσίας βουλῆς, ἐν ἀγαϑῇ προϑυμίᾳ μετ’ εὐσεβοῦς πεποιϑήσεως ἐξετείνατε τὰς χεῖρας ὑμῶν πρὸς τὸν παντοκράτορα ϑεόν, ἱκετεύοντες αὐτὸν ἵλεων γενέσϑαι, εἴ τι ἀκόντες ἡμάρτετε. . ἦν ὑμῖν ἡμέρας τε καὶ νυκτὸς ὑπὲρ πάσης τῆς ἀδελφότητος, εἰς τὸ σώζεσϑαι μετ’ ἐλέους καὶ συνειδήσεως τὸν ἀριθμὸν τῶν ἐκλεκτῶν αὐτοῦ. 5. εἰλικρινεῖς καὶ ἀκέραιοι ἦτε καὶ ἀμνησίκακοι εἰς ἀλλήλους. 6. πᾶσα στάσις καὶ πᾶν σχίσμα βδέλυκτον ἦν ὑμῖν. ἐπὶ τοῖς παραπτώμασιν τῶν πλησίον ἐπενϑεῖτε· τὰ ὑστερήματα αὐτῶν ἴδια ἐκρίνετε. ἀγαθοποιοί, ἕτοιμοι εἰς πᾶν ἔργον ἀγαθόν. σεβασμίῳ πολιτείᾳ κεκοσμημένοι
    πάντες ἐν φόβῳ αὐτοῦ ἐτελελεῖτε· τὰ προστάγματα καὶ τὰ δικαιώματα τοῦ κυρίου ἐπὶ τὰ πλάτη τῆς καρδίας ὑμῶν ἐγέγραπτο.
