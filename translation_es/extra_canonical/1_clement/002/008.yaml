id: 1CLEM.2.8
reference: 1 Clement 2:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: σεβασμίῳ πολιτείᾳ κεκοσμημένοι πάντες ἐν φόβῳ αὐτοῦ ἐτελελεῖτε· τὰ προστάγματα καὶ τὰ δικαιώματα τοῦ κυρίου ἐπὶ τὰ πλάτη τῆς καρδίας ὑμῶν ἐγέγραπτο.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/002/008.yaml
  text: adorned with a venerable way of life[a], you conducted yourselves entirely in his fear; the commandments and the righteous requirements of the Lord had been written on the tablets of your hearts.
  footnotes:
  - marker: a
    text: Or 'carried everything through'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:27Z'
    unchanged: false
    changes_summary: Changed 'accomplished all things' to 'conducted yourselves entirely' to better reflect the sense of ἐτελελεῖτε in context; changed 'broad places' to 'tablets' for πλάτη in the idiom 'on the tablets of your hearts,' which is the natural and contextually appropriate rendering.
translation:
  language: es
  text: Adornados con una forma de vida venerable, se conducían enteramente en su temor[a]; los mandamientos y los justos preceptos del Señor habían sido escritos en las tablas de sus corazones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevaban todo a cabo».'
    reason: Preserva la alternativa histórica reflejada en la nota inglesa anterior sobre τελέω, sin introducir una formulación pasiva o confusa en español.
lexical_decisions:
- source_word: σεβασμίῳ πολιτείᾳ
  english_pob_choice: adorned with a venerable way of life
  chosen_spanish: adornados con una venerable manera de vivir
  alternatives_spanish:
  - adornados con una forma de vida respetable
  - adornados con una conducta venerable
  lexicon: σεβασμίος; πολιτεία
  rationale: Mantiene la imagen de adorno y el registro elevado. 'Manera de vivir' evita reducir πολιτεία a una sola dimensión política y conserva el sentido de conducta/estilo de vida documentado por la POB inglesa.
- source_word: ἐτελελεῖτε
  english_pob_choice: you conducted yourselves entirely
  chosen_spanish: os condujisteis por completo
  alternatives_spanish:
  - cumplisteis por completo
  - llevasteis a cabo todo
  lexicon: τελέω
  rationale: Sigue la revisión inglesa que rechazó 'carried through' por ser coloquial y entendió τελέω como conducirse/realizar plenamente en contexto. 'Por completo' preserva el alcance total sin forzar una paráfrasis.
- source_word: ἐν φόβῳ αὐτοῦ
  english_pob_choice: in his fear
  chosen_spanish: en su temor
  alternatives_spanish:
  - con temor de él
  - bajo su temor reverente
  lexicon: φόβος
  rationale: 'Conserva la construcción directa y la ambigüedad reverente del texto: temor, no meramente miedo. ''Su'' sigue el referente del Señor implícito en el contexto.'
- source_word: τὰ προστάγματα καὶ τὰ δικαιώματα τοῦ κυρίου
  english_pob_choice: the commandments and the righteous requirements of the Lord
  chosen_spanish: los mandamientos y las justas exigencias del Señor
  alternatives_spanish:
  - los mandamientos y las justas ordenanzas del Señor
  - los mandamientos y las rectas disposiciones del Señor
  lexicon: πρόσταγμα; δικαίωμα
  rationale: '''Mandamientos'' es la equivalencia natural de προστάγματα. Para δικαιώματα, ''justas exigencias'' conserva la fuerza normativa/recta sin convertirlo automáticamente en terminología técnica eclesiástica.'
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Maestro
  lexicon: κύριος
  rationale: Aquí el griego usa κύριος, y la POB inglesa mantiene 'Lord' como referencia al Señor del contexto bíblico. En español se conserva 'Señor' porque la frase cita el título reverencial establecido en la recepción de la obra y no hay una cita explícita del nombre divino en el texto griego.
- source_word: ἐπὶ τὰ πλάτη τῆς καρδίας ὑμῶν
  english_pob_choice: on the tablets of your hearts
  chosen_spanish: en las tablas de vuestro corazón
  alternatives_spanish:
  - sobre las tablas de vuestro corazón
  - en las tablas de vuestros corazones
  lexicon: πλάτη; καρδία
  rationale: Sigue la revisión inglesa que corrigió 'broad places' a 'tables/tablets'. 'Tablas' en español reproduce el símil escriturario de la escritura sobre tablas y mantiene la metáfora del corazón como lugar interior de inscripción.
theological_decisions:
- issue: Renderización del título κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: La frase en 1 Clement conserva el título reverencial sin una indicación textual adicional de reemplazarlo por el nombre propio. En español, 'Señor' comunica el mismo valor honorífico y evita introducir una decisión más fuerte que la sostenida por este pasaje aislado.
  doctrine_reference: Cristología y reverencia nominal en citas bíblicas antiguas
- issue: Sentido de ἐν φόβῳ αὐτοῦ
  english_pob_reading: in his fear
  chosen_spanish_reading: en su temor
  alternative_spanish_readings:
  - en su temor reverente
  - con temor de él
  rationale: El texto puede expresar tanto reverencia como temor. La traducción mantiene la ambigüedad útil de la fuente y no la estrecha a 'respeto' ni la intensifica a 'miedo'.
  doctrine_reference: Piedad y obediencia reverente
translation_notes:
  revision_awareness: La versión inglesa revisada abandonó 'carried everything through' por 'conducted yourselves entirely' y corrigió 'broad places' a 'tables/tablets'. La draft española sigue esas decisiones y evita reflejar el OCR erróneo del griego suministrado.
  spanish_consistency_notes:
  - Se mantiene un registro formal y eclesiásticamente legible sin recurrir a arcaísmos innecesarios.
  - '''Tablas de vuestro corazón'' conserva la metáfora bíblica de inscripción interior y la decisión revisada sobre πλάτη.'
  - No se introduce 'Cristo' ni 'Mesías' porque el texto dice κύριος y la evidencia aportada no exige otra equivalencia.
