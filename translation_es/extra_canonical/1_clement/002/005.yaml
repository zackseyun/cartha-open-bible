translation:
  language: es
  text: Ustedes eran sinceros, sin engaño y libres de resentimiento entre sí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰλικρινεῖς
  english_pob_choice: sincere
  chosen_spanish: sinceros
  alternatives_spanish:
  - sinceros de corazón
  - puros
  lexicon: adjetivo griego que expresa sinceridad, integridad o pureza no mezclada
  rationale: «Sinceros» transmite con naturalidad la idea de integridad sin añadir una paráfrasis más larga. «Puros» podría sonar demasiado moralizante o desviar el matiz hacia limpieza ritual/moral.
- source_word: ἀκέραιοι
  english_pob_choice: guileless
  chosen_spanish: sin engaño
  alternatives_spanish:
  - íntegros
  - sin malicia
  - sin doblez
  lexicon: adjetivo griego que indica integridad, incorruptibilidad o ausencia de mezcla/fraude
  rationale: La combinación «sin engaño» hace visible el valor de ausencia de astucia o duplicidad que en inglés POB se expresó como «guileless». «Íntegros» sería posible, pero en español puede solaparse demasiado con «sinceros»; por eso se distingue con una expresión más concreta.
- source_word: ἀμνησίκακοι
  english_pob_choice: free from resentment
  chosen_spanish: libres de resentimiento
  alternatives_spanish:
  - sin rencor
  - no guardaban rencor
  - sin resentimiento
  lexicon: 'adjetivo compuesto griego: no recordar el mal, no guardar rencor'
  rationale: «Libres de resentimiento» conserva la idea de no retener ofensa en una forma idiomática y digna. «Sin rencor» también sería válido, pero «resentimiento» refleja mejor el eco de ofensa interior persistente.
- source_word: εἰς ἀλλήλους
  english_pob_choice: toward one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - unos con otros
  - hacia los demás
  lexicon: preposición + pronombre recíproco que indica relación mutua
  rationale: «Entre sí» es breve y recíproco, y evita un giro más pesado. El sentido relacional mutuo queda claro sin expandir el texto.
theological_decisions:
- issue: Tríplice descripción ética de la comunidad
  english_pob_reading: sincere and guileless and free from resentment toward one another
  chosen_spanish_reading: sinceros, sin engaño y libres de resentimiento entre sí
  alternative_spanish_readings:
  - sinceros, íntegros y sin rencor entre sí
  - puros, íntegros y sin resentimiento unos con otros
  rationale: El griego presenta tres rasgos coordinados, y la traducción mantiene esa triple estructura sin fusionarlos. Se evita suavizar la secuencia en un solo concepto general para no perder la fuerza acumulativa del elogio moral.
  doctrine_reference: Ethics of Christian community; no direct doctrinal controversy
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y no registra cambios de revisión; por ello se mantiene una traducción directa y estable, ajustando solo la naturalidad del español para conservar los tres adjetivos coordinados del griego.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y comunitario propio del pasaje.
  - No se introducen términos eclesiásticos posteriores ni vocabulario doctrinal ajeno al griego.
  - La recíproca εἰς ἀλλήλους se rinde con una expresión breve de relación mutua, coherente con el estilo de la serie.
