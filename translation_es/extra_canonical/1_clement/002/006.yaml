translation:
  language: es
  text: Toda facción[a] y todo cisma[b] eran detestables para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Facción'' refleja la revisión inglesa que entiende στάσις aquí como conflicto interno o espíritu de partido, no como simple rebelión política.'
    reason: lexical_alternative
  - marker: b
    text: '''Cisma'' conserva el valor fuerte de σχίσμα como ruptura o división marcada, especialmente en contexto comunitario o eclesial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα στάσις
  english_pob_choice: Every faction
  chosen_spanish: Toda facción
  alternatives_spanish:
  - Toda sedición
  - Toda discordia
  - Toda facción partidista
  lexicon: στάσις
  rationale: La revisión inglesa corrigió 'sedition' a 'faction' para reflejar mejor στάσις como división interna o espíritu de partido; 'facción' comunica bien esa idea en español sin cargar primero la noción de rebelión abierta.
- source_word: πᾶν σχίσμα
  english_pob_choice: every schism
  chosen_spanish: toda cisma
  alternatives_spanish:
  - toda división
  - todo cisma
  lexicon: σχίσμα
  rationale: Se conserva 'cisma' porque reproduce el valor lexical de σχίσμα y mantiene la distinción auditada entre esta palabra y στάσις. En español, 'cisma' es el equivalente más estable para la ruptura o división eclesial o comunitaria.
- source_word: βδέλυκτον
  english_pob_choice: detestable
  chosen_spanish: detestable
  alternatives_spanish:
  - abominable
  - repugnante
  lexicon: βδέλυκτον
  rationale: '''Detestable'' preserva el juicio fuerte del adjetivo griego y coincide con la opción inglesa auditada, sin intensificar más allá de lo que el texto exige.'
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - para vosotros
  lexicon: ὑμῖν
  rationale: '''Para ustedes'' expresa el dativo de referencia/relación en un español natural y respetuoso; se evita el arcaísmo plural peninsular salvo necesidad contextual.'
theological_decisions:
- issue: Distinción entre interna división partidista y ruptura eclesial
  english_pob_reading: Every faction and every schism
  chosen_spanish_reading: Toda facción y toda cisma
  alternative_spanish_readings:
  - Toda sedición y todo cisma
  - Toda división y todo cisma
  rationale: La lectura inglesa revisada separa 'faction' de 'schism'; el español mantiene esa distinción para no diluir la tensión léxica. 'Facción' cubre la idea de bando o partido interno, mientras 'cisma' preserva la ruptura dividida/confrontativa.
  doctrine_reference: Unidad de la comunidad cristiana; condena de divisiones internas
translation_notes:
  revision_awareness: La versión inglesa pasó de 'sedition' a 'faction' en la revisión más reciente para ajustar στάσις al sentido de conflicto interno o partido; el español sigue esa revisión y conserva 'schism' como 'cisma'. No hay variantes textuales en el griego base proporcionado.
  spanish_consistency_notes:
  - Se mantiene un registro formal y bíblico, pero con español actual.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes porque el texto no contiene el nombre divino.
  - La coordinación 'toda... y toda...' preserva el paralelismo del griego.
  - Se usa 'ustedes' por neutralidad latinoamericana y legibilidad eclesial.
