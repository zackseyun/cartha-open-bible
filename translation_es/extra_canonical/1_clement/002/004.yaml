base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/002/004.yaml
  text: Day and night you were concerned for the whole brotherhood[a], so that the number of his elect might be saved with mercy and conscientiousness.
  footnotes:
  - marker: a
    text: Or 'your concern was'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:25Z'
    unchanged: false
    changes_summary: Replaced 'had a struggle' with 'were concerned' to better reflect the implied sense without overreading; simplified 'chosen ones' to 'elect' for closer lexical correspondence to ἐκλεκτῶν; rendered συνειδήσεως as 'conscientiousness' rather than 'a good conscience,' since 'good' is not explicit in the Greek.
translation:
  language: es
  text: De día y de noche [a] os preocupabais por toda la hermandad, para que el número de sus elegidos fuera salvado con misericordia y conciencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘vuestra preocupación era’. La revisión inglesa indica una posible lectura más suave del inicio, pero el texto griego y el contexto favorecen una intensidad de cuidado/afán, por eso se conserva una formulación de preocupación continua.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἦν ὑμῖν ἡμέρας τε καὶ νυκτός
  english_pob_choice: Day and night
  chosen_spanish: De día y de noche
  alternatives_spanish:
  - Día y noche
  - De día y de noche constantemente
  lexicon: ἡμέρας τε καὶ νυκτός
  rationale: Mantiene la expresión temporal idiomática sin añadir un adverbio excesivo; refleja continuidad y énfasis.
- source_word: ὑπὲρ πάσης τῆς ἀδελφότητος
  english_pob_choice: for the whole brotherhood
  chosen_spanish: por toda la hermandad
  alternatives_spanish:
  - por toda la fraternidad
  - por toda la comunidad de hermanos
  lexicon: ἀδελφότης
  rationale: ‘Hermandad’ conserva el sentido colectivo de la comunidad fraterna y es natural en español eclesial sin forzar una terminología más técnica.
- source_word: εἰς τὸ σώζεσϑαι
  english_pob_choice: so that ... might be saved
  chosen_spanish: para que ... fuera salvado
  alternatives_spanish:
  - a fin de que ... fuera salvo
  - para que ... pudiera ser salvado
  lexicon: σῴζω
  rationale: ‘Fuera salvado’ conserva el pasivo y el propósito; evita suavizar la fuerza soteriológica del verbo.
- source_word: μετ’ ἐλέους
  english_pob_choice: with mercy
  chosen_spanish: con misericordia
  alternatives_spanish:
  - con compasión
  - en misericordia
  lexicon: ἔλεος
  rationale: ‘Misericordia’ es la correspondencia estándar y mantiene el matiz de compasión activa.
- source_word: καὶ συνειδήσεως
  english_pob_choice: and conscientiousness
  chosen_spanish: y conciencia
  alternatives_spanish:
  - y escrúpulo
  - y recta conciencia
  lexicon: συνείδησις
  rationale: La revisión inglesa optó por ‘conscientiousness’ para no introducir ‘good’; en español, ‘conciencia’ preserva la referencia directa a συνείδησις sin añadir calificativos no presentes.
- source_word: τὸν ἀριθμὸν τῶν ἐκλεκτῶν αὐτοῦ
  english_pob_choice: the number of his elect
  chosen_spanish: el número de sus elegidos
  alternatives_spanish:
  - el número de sus electos
  - la cantidad de sus elegidos
  lexicon: ἐκλεκτός
  rationale: ‘Elegidos’ es idiomático en español y conserva la idea de los seleccionados por Dios; evita la frialdad de ‘electos’ salvo en contextos más técnicos.
theological_decisions:
- issue: 'El sentido del propósito salvífico: να sea salvado el número de los elegidos'
  english_pob_reading: so that the number of his elect might be saved
  chosen_spanish_reading: para que el número de sus elegidos fuera salvado
  alternative_spanish_readings:
  - para que el número de sus elegidos fuese salvado
  - a fin de que el número de sus elegidos se salvara
  rationale: Se conserva la estructura de propósito y el pasivo teológico sin convertir el texto en una formulación más interpretativa.
  doctrine_reference: Soteriología y elección divina
translation_notes:
  revision_awareness: 'La versión inglesa pasó de una lectura intensa (‘you had a struggle’) a una más suave (‘you were concerned’) por prudencia frente al estado del griego transmitido. La redacción española sigue la forma suavizada, pero ancla la ambigüedad con una nota: el griego transmitido puede admitir una lectura de preocupación/afán continuo, y el inicio del testimonio textual es incierto por la OCR y la revisión posterior.'
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque el texto no contiene el Tetragrámaton ni una cita explícita de κύριος.
  - ‘Elegidos’ se mantiene como término bíblico directo para ἐκλεκτοί.
  - ‘Conciencia’ reproduce συνείδησις sin agregar ‘buena’, conforme a la revisión inglesa.
  - La nota [a] está anclada en el sintagma inicial para reflejar la variante interpretativa del arranque.
