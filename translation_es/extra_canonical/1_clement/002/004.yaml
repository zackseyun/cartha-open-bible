review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: la continuidad temporal (''día y noche''), la preocupación por toda la comunidad, el propósito de salvación, y ''misericordia''. Sin embargo, ''conciencia'' no reproduce bien el valor adverbial/abstracto de συνειδήσεως aquí, que en la auditoría inglesa se fijó como ''conscientiousness'', y en español suena como facultad interna más que como actuar concienzudo. Además, la nota [a] ya no corresponde al texto base ni a una alternativa real anclada en el español revisado.'
  spanish_quality_summary: El español es generalmente claro y digno. 'De día y de noche' y 'toda la hermandad' son naturales. No obstante, la colocación del marcador [a] tras 'noche' es extraña, y 'fuera salvado' aplicado a 'el número' suena algo rígido; puede mantenerse, pero 'fuera preservado' sería más idiomático si no fuera por la decisión inglesa de mantener 'saved'. La mejora principal necesaria es 'con misericordia y esmero de conciencia' o mejor 'con misericordia y concienzudez'; la opción más natural y fiel es 'con misericordia y concienzudez'.
  glossary_alignment: 'No hay conflictos con los términos de proyecto mayores. ''elegidos'' para ἐκλεκτῶν es adecuado. ''hermandad'' para ἀδελφότης es defendible. La desviación principal es συνείδησις: ''conciencia'' no preserva la decisión auditada de evitar ''buena conciencia'' pero sí introduce una ambigüedad española; ''concienzudez'' refleja mejor el sentido documentado de ''conscientiousness''.'
  issues:
  - severity: medium
    issue: La nota [a] no está bien justificada ni bien anclada.
    rationale: El texto español no contiene una formulación que requiera esa alternativa, y la nota mezcla historia de revisión inglesa con comentario editorial. Además, colocada tras 'noche' parece referirse a la frase temporal, no al predicado verbal.
  - severity: high
    issue: '''y conciencia'' no refleja adecuadamente συνειδήσεως en este contexto.'
    rationale: En español, 'conciencia' normalmente denota la conciencia moral o el conocimiento interior, no la cualidad de actuar con esmero/concienzudamente. La auditoría inglesa optó explícitamente por 'conscientiousness' para evitar 'good conscience'; el español debe preservar esa decisión con una forma como 'concienzudez'.
  revised_spanish_text: De día y de noche os preocupabais por toda la hermandad, para que el número de sus elegidos fuera salvado con misericordia y concienzudez.
  revision_rationale: Se elimina la nota innecesaria y desanclada. Se corrige 'conciencia' a 'concienzudez' para reflejar mejor συνειδήσεως según la auditoría inglesa ('conscientiousness') sin añadir 'buena'. El resto del texto puede mantenerse como fiel y natural.
