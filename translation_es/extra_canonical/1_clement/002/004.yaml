  text: ἦν ὑμῖν ἡμέρας τε καὶ νυκτὸς ὑπὲρ πάσης τῆς ἀδελφότητος, εἰς τὸ σώζεσϑαι μετ’ ἐλέους καὶ συνειδήσεως τὸν ἀριθμὸν τῶν ἐκλεκτῶν αὐτοῦ.
