  text: οὕτως εἰρήνη βαϑεῖα καὶ λιπαρὰ ἐδέδοτο πᾶσιν καὶ ἀκόρεστος πόϑος εἰς ἀγαϑοποιΐαν, καὶ πλήρης πνεύματος ἁγίου ἐπέχυσις ἐπὶ πάντας ἐγίνετο·
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/002/002.yaml
  text: Thus deep and rich peace had been given to all[a], and an insatiable desire for doing good, and a full outpouring of the Holy Spirit came upon all;
  footnotes:
  - marker: a
    text: Or 'was given'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:23Z'
    unchanged: false
    changes_summary: Changed 'longing' to 'desire' for a more direct rendering of πόθος and retained the rest as accurate and natural.
translation:
  language: es
  text: Así, una paz profunda y abundante había sido dada a todos[a], y un deseo insaciable de hacer el bien, y una plena efusión del Espíritu Santo venía sobre todos;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'era dada'.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰρήνη βαϑεῖα καὶ λιπαρὰ
  english_pob_choice: deep and rich peace
  chosen_spanish: una paz profunda y abundante
  alternatives_spanish:
  - una paz honda y rica
  - una paz profunda y opulenta
  lexicon: εἰρήνη, βαθύς, λιπαρός
  rationale: Mantengo el doble matiz de profundidad e intensidad/plenitud con un español natural. 'Abundante' comunica bien la idea de 'rich' sin sonar material o extraño en este contexto eclesial.
- source_word: ἐδέδοτο
  english_pob_choice: had been given
  chosen_spanish: había sido dada
  alternatives_spanish:
  - era dada
  - fue dada
  lexicon: δίδωμι
  rationale: El griego está en pluscuamperfecto; por eso uso 'había sido dada' para reflejar un estado ya establecido, no una simple acción puntual.
- source_word: ἀκόρεστος πόϑος
  english_pob_choice: an insatiable desire
  chosen_spanish: un deseo insaciable
  alternatives_spanish:
  - un anhelo insaciable
  - un deseo inagotable
  lexicon: πόθος
  rationale: '''Deseo'' sigue de cerca la decisión auditada en inglés y conserva la fuerza de πόθος sin cargarlo con matiz devocional excesivo que ''anhelo'' podría sugerir.'
- source_word: ἀγαϑοποιΐαν
  english_pob_choice: doing good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - practicar el bien
  - obrar el bien
  lexicon: ἀγαθοποιΐα
  rationale: '''Hacer el bien'' es la forma más natural y transparente en español para la actividad ética denotada por el sustantivo.'
- source_word: πλήρης πνεύματος ἁγίου ἐπέχυσις
  english_pob_choice: a full outpouring of the Holy Spirit
  chosen_spanish: una plena efusión del Espíritu Santo
  alternatives_spanish:
  - un derramamiento pleno del Espíritu Santo
  - una abundante efusión del Espíritu Santo
  lexicon: πνεῦμα ἅγιον, ἐπέχυσις
  rationale: '''Efusión'' reproduce bien la imagen de derramamiento/outpouring y es un término digno y reconocible en español bíblico. ''Espíritu Santo'' se conserva como nombre propio teológico establecido.'
theological_decisions:
- issue: Estado previo de paz y dones como descripción retrospectiva
  english_pob_reading: Thus deep and rich peace had been given to all
  chosen_spanish_reading: Así, una paz profunda y abundante había sido dada a todos
  alternative_spanish_readings:
  - Así, una paz profunda y abundante fue dada a todos
  - Así, había una paz profunda y abundante para todos
  rationale: La descripción mira hacia atrás a una condición ya establecida en la comunidad; el pluscuamperfecto en español preserva ese valor retrospectivo y evita rebajar la idea a un simple evento pasado.
  doctrine_reference: Aspecto verbal y narración retrospectiva
- issue: Relación entre 'efusión' y la obra del Espíritu Santo
  english_pob_reading: and a full outpouring of the Holy Spirit came upon all
  chosen_spanish_reading: y una plena efusión del Espíritu Santo venía sobre todos
  alternative_spanish_readings:
  - y una plena efusión del Espíritu Santo vino sobre todos
  - y un pleno derramamiento del Espíritu Santo cayó sobre todos
  rationale: '''Venía sobre todos'' conserva el sentido de irrupción o extensión continua sin forzar una imagen más abrupta que la del griego. ''Efusión'' mantiene el lenguaje de derramamiento sin sustituirlo por una formulación interpretativa.'
  doctrine_reference: Pneumatología y lenguaje de efusión
translation_notes:
  revision_awareness: La revisión en inglés corrigió 'was given' a 'had been given' por el pluscuamperfecto de ἐδέδοτο y refinó 'longing' a 'desire' para πόθος; la redacción española refleja ambos ajustes con 'había sido dada' y 'deseo'.
  spanish_consistency_notes:
  - Se mantiene 'Espíritu Santo' con mayúsculas por tratarse de una referencia personal-teológica estable.
  - Se usa 'hacer el bien' en lugar de una perífrasis más técnica para conservar claridad sin perder el valor lexical de ἀγαθοποιΐα.
  - La nota a[a] preserva la alternativa de voz pasiva simple frente al pluscuamperfecto, aunque el texto principal adopta la lectura más ajustada al griego.
