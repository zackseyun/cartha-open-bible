source:
  edition: Funk 1901 (normalized OCR)
  text: ἐπ’ ἀληθείας ταχὺ καὶ ἐξαίφνης τελειωθήσεται τὸ θέλημα αὐτοῦ, συνεπιμαρτυρούσης καὶ τῆς γραφῆς, ὅτι ταχὺ ἥξει καὶ οὐ χρονιεῖ, καὶ ἐξαίφνης ἥξει ὁ κύριος εἰς τὸν ναὸν αὐτοῦ, καὶ ὁ ἅγιος, ὃν ὑμεῖς προσδοκᾶτε.
