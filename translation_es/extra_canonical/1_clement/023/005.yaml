base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/023/005.yaml
  text: Truly, his will shall be accomplished quickly and suddenly, as the Scripture also bears witness, saying, “Quickly he will come and will not delay,” and, “Suddenly the Lord will come to his temple, even the Holy One whom you expect.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:15Z'
    unchanged: false
    changes_summary: Reordered 'quickly and suddenly' for more natural English, capitalized 'Scripture' for formal register, and added 'saying' to smooth the citation introduction without changing meaning.
translation:
  language: es
  text: 'En verdad, su voluntad se cumplirá pronto y de repente, como también da testimonio la Escritura, diciendo: «Pronto vendrá y no tardará», y: «De repente el Señor vendrá a su templo, sí, el Santo a quien ustedes esperan».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπ’ ἀληθείας
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Verdaderamente
  - Ciertamente
  lexicon: frase adverbial de afirmación
  rationale: En español, «En verdad» reproduce el valor enfático-afirmativo de la fórmula griega sin sonar artificial. Mantiene el registro solemne de apertura.
- source_word: ταχὺ καὶ ἐξαίφνης
  english_pob_choice: quickly and suddenly
  chosen_spanish: pronto y de repente
  alternatives_spanish:
  - rápidamente y de repente
  - pronto y súbitamente
  lexicon: adverbios de tiempo y modo
  rationale: El orden natural en español favorece primero la inmediatez temporal («pronto») y luego la irrupción inesperada («de repente»). «De repente» conserva mejor la sorpresa que un calco como «súbitamente».
- source_word: τελειωθήσεται τὸ θέλημα αὐτοῦ
  english_pob_choice: his will shall be accomplished
  chosen_spanish: su voluntad se cumplirá
  alternatives_spanish:
  - su voluntad será cumplida
  - se llevará a cabo su voluntad
  lexicon: τελειόω + θέλημα
  rationale: «Se cumplirá» expresa bien el pasivo futuro y el logro efectivo del propósito divino. Evita una formulación más pesada y mantiene la idea de consumación sin añadir matices ajenos.
- source_word: συνεπιμαρτυρούσης καὶ τῆς γραφῆς
  english_pob_choice: as the Scripture also bears witness
  chosen_spanish: como también da testimonio la Escritura
  alternatives_spanish:
  - como también testifica la Escritura
  - según atestigua también la Escritura
  lexicon: συνεπιμαρτυρέω + γραφή
  rationale: «Da testimonio» es una equivalencia natural y fiel para el verbo compuesto, y «la Escritura» conserva el singular reverente del texto inglés revisado.
- source_word: ὅτι ταχὺ ἥξει καὶ οὐ χρονιεῖ
  english_pob_choice: Quickly he will come and will not delay
  chosen_spanish: «Pronto vendrá y no tardará»
  alternatives_spanish:
  - «Pronto vendrá y no demorará»
  - «Vendrá pronto y no se retrasará»
  lexicon: ἥξει + οὐ χρονιεῖ
  rationale: «No tardará» es la forma española más idiomática para expresar οὐ χρονιεῖ. «Vendrá» mantiene el movimiento hacia el cumplimiento futuro.
- source_word: καὶ ἐξαίφνης ἥξει ὁ κύριος εἰς τὸν ναὸν αὐτοῦ
  english_pob_choice: Suddenly the Lord will come to his temple
  chosen_spanish: «De repente el Señor vendrá a su templo»
  alternatives_spanish:
  - «De repente el Señor llegará a su templo»
  - «Y de repente vendrá el Señor a su templo»
  lexicon: ὁ κύριος + ναός
  rationale: «Señor» corresponde al κύριος del pasaje citado, y «vendrá a su templo» conserva la dirección cultual y profética del texto. No se sustituye por un equivalente más interpretativo.
- source_word: καὶ ὁ ἅγιος, ὃν ὑμεῖς προσδοκᾶτε
  english_pob_choice: even the Holy One whom you expect
  chosen_spanish: sí, el Santo a quien ustedes esperan
  alternatives_spanish:
  - es decir, el Santo que ustedes esperan
  - incluso el Santo a quien esperan
  lexicon: ὁ ἅγιος
  rationale: «El Santo» reproduce el sustantivo titular griego y su resonancia bíblica. «Sí» ayuda a hacer natural la apposición española sin añadir contenido nuevo, y «a quien ustedes esperan» mantiene el presente de expectativa del interlocutor.
theological_decisions:
- issue: Referencia al nombre divino en κύριος dentro de una cita bíblica
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: Aunque el proyecto normalmente usa «Yahvé» para יהוה, aquí el texto griego cita una formulación con κύριος dentro de una cita escrituraria ya transmitida en esa forma. Mantener «el Señor» preserva la cita tradicional del pasaje y evita forzar una identificación que el griego del testimonio citado no explicita directamente en esta línea.
  doctrine_reference: cita profética y continuidad intertextual
- issue: Tensión entre inmediatez («pronto») y carácter repentino («de repente»)
  english_pob_reading: quickly and suddenly
  chosen_spanish_reading: pronto y de repente
  alternative_spanish_readings:
  - rápidamente y súbitamente
  - pronto y súbitamente
  rationale: 'La pareja española conserva ambos aspectos semánticos: celeridad e irrupción inesperada. Se evita colapsarlos en un solo adverbio, porque el griego los distingue.'
  doctrine_reference: escatología e inmediatez del cumplimiento
- issue: Titularidad de ὁ ἅγιος
  english_pob_reading: the Holy One
  chosen_spanish_reading: el Santo
  alternative_spanish_readings:
  - el Santo Uno
  - el Santo Ser
  rationale: «El Santo» mantiene el valor de título personal/bíblico sin añadir perífrasis. En español, esta forma es más sobria y reconocible que alternativas más largas o menos idiomáticas.
  doctrine_reference: título mesiánico / santo de Dios
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés, especialmente el reordenamiento de los adverbios («quickly and suddenly») y la introducción de la cita con «saying», reflejada en español con una transición natural («diciendo»). No se trasladaron notas porque el texto fuente y el audit trail no preservan variantes textuales relevantes ni ambigüedades que requieran anclaje en esta sección.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico solemne pero en español natural, evitando calcos como «no demorará» o «súbitamente» cuando sonaban menos idiomáticos.
  - Se conservó «la Escritura» en singular, coherente con el uso reverente del inglés auditado.
  - No se añadieron notas al pie porque no hay decisiones que requirieran variantes textuales ancladas en el versículo y se evitó repetir el error de marcadores sin ancla.
  - «Señor» se dejó sin máscara de nombre divino porque el griego aquí funciona como cita escrituraria transmitida con κύριος, y el contexto inmediato no obliga a explicitar «Yahvé» en el cuerpo del texto.
