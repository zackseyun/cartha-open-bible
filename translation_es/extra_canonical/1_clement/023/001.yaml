translation:
  language: es
  text: 'El Padre compasivo y del todo benéfico tiene entrañas de ternura para con los que le temen, y con suavidad y benignidad da sus dones de gracia a los que se acercan a él con un ánimo sencillo.


    Por tanto, no seamos de doble ánimo, ni esté nuestra alma en duda[a] acerca de sus dones tan abundantes y gloriosos. Lejos de nosotros este pasaje de la Escritura, donde dice: «Miserables son los de doble ánimo, los que vacilan en su alma, los que dicen: “Estas cosas las oímos aun en los días de nuestros padres, y he aquí que envejecemos, y nada de esto nos ha sucedido”».


    ¡Oh insensatos!, compárense con un árbol: tomen una vid. Primero pierde sus hojas, luego brota un retoño, luego una hoja, luego una flor; después de estas viene la uva verde, y luego aparece el racimo. Ustedes ven que en poco tiempo el fruto del árbol llega a su madurez.


    En verdad, pronto y de repente se cumplirá su voluntad, como también da testimonio la Escritura: «Pronto vendrá, y no tardará», y: «De repente vendrá el Señor a su templo, sí, el Santo[b] que ustedes esperan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Puede traducirse también «vacilante»; el griego apunta a una inestabilidad interior, no solo a incertidumbre intelectual.
    reason: lexical_alternative
  - marker: b
    text: O «el Santo». El griego usa un título escritural y no explicita aquí más la identidad del referente.
    reason: theological_title_clarity
lexical_decisions:
- source_word: οἰκτίρμων
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - compasivo y misericordioso
  lexicon: LSJ
  rationale: El griego expresa una disposición de compasión activa; «compasivo» transmite bien esa idea en español moderno y mantiene el registro digno.
- source_word: εὐεργετικός
  english_pob_choice: beneficent
  chosen_spanish: benéfico en todo
  alternatives_spanish:
  - benefactor
  - bondadoso
  - que hace el bien
  lexicon: LSJ
  rationale: El término indica alguien que hace el bien o concede beneficios; «benéfico» conserva el sentido de beneficencia y el tono elevado.
- source_word: σπλάγχνα ἔχει
  english_pob_choice: has tender affections
  chosen_spanish: tiene entrañas de ternura
  alternatives_spanish:
  - tiene compasión
  - tiene afecto tierno
  - tiene misericordia
  lexicon: LSJ
  rationale: La expresión es visceral y afectiva; «entrañas de ternura» preserva mejor la imagen interna y cálida que una formulación más plana.
- source_word: φοβουμένους
  english_pob_choice: those who fear
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que lo reverencian
  - los que le reverencian
  lexicon: BDAG
  rationale: Se mantiene «temer» para conservar la continuidad bíblica y el matiz reverente del griego.
- source_word: χάριτας
  english_pob_choice: gracious gifts
  chosen_spanish: dones de gracia
  alternatives_spanish:
  - favores
  - gracias
  - beneficios
  lexicon: LSJ
  rationale: El plural se refiere aquí a dones o favores concedidos; «dones de gracia» mantiene la raíz de χάρις y su claridad en español.
- source_word: ἁπλῇ διανοίᾳ
  english_pob_choice: with a single-minded mind
  chosen_spanish: con un ánimo sencillo
  alternatives_spanish:
  - con mente sencilla
  - con una mente íntegra
  - con un corazón sencillo
  lexicon: LSJ
  rationale: La frase apunta a sencillez, integridad y falta de división interior; «ánimo sencillo» suena natural en español y conserva la idea de una disposición no dividida.
- source_word: διψυχῶμεν
  english_pob_choice: let us not be double-minded
  chosen_spanish: no seamos de doble ánimo
  alternatives_spanish:
  - no seamos inconstantes
  - no dudemos
  - no seamos de dos mentes
  lexicon: LSJ
  rationale: «Doble ánimo» reproduce de forma idiomática el valor paraenético de διψυχία y mantiene la conexión con el texto citado más adelante.
- source_word: ἐνδυλλιεσθω
  english_pob_choice: let our soul be doubtful
  chosen_spanish: esté nuestra alma en duda
  alternatives_spanish:
  - vacile nuestra alma
  - se turbe nuestra alma
  - se divida nuestra alma
  lexicon: LSJ
  rationale: El verbo es raro y el contexto pide una idea de vacilación interior; «estar en duda» comunica esa inestabilidad sin añadir demasiado.
- source_word: ὑπερβαλλούσαις καὶ ἐνδόξοις δωρεαῖς
  english_pob_choice: surpassing and glorious gifts
  chosen_spanish: dones tan abundantes y gloriosos
  alternatives_spanish:
  - dones sobresalientes y gloriosos
  - dones extraordinarios y gloriosos
  - dones excesivos y gloriosos
  lexicon: LSJ
  rationale: La pareja enfatiza abundancia/superioridad y gloria; «tan abundantes y gloriosos» recoge bien ambos elementos en español.
- source_word: διατάζοντες τῇ ψυχῇ
  english_pob_choice: who waver in their soul
  chosen_spanish: los que vacilan en su alma
  alternatives_spanish:
  - los que se contradicen interiormente
  - los que disputan consigo mismos
  - los que dividen su alma
  lexicon: LSJ
  rationale: La frase expresa inestabilidad interna; «vacilan en su alma» conserva el sentido práctico de la vacilación espiritual.
- source_word: συμβάλετε ἑαυτοὺς ξύλῳ
  english_pob_choice: compare yourselves to a tree
  chosen_spanish: compárense con un árbol
  alternatives_spanish:
  - compárense a un árbol
  - júzguense por un árbol
  - considérense por medio de un árbol
  lexicon: LSJ
  rationale: El imperativo pide una comparación ilustrativa; «compárense con un árbol» es claro y conserva la fuerza exhortativa.
- source_word: ὄμφαξ
  english_pob_choice: the unripe grape
  chosen_spanish: la uva verde
  alternatives_spanish:
  - la uva inmadura
  - el fruto verde
  - la uva sin madurar
  lexicon: LSJ
  rationale: El término designa una uva inmadura; «uva verde» es natural en español y comunica el estado de desarrollo sin cargar un matiz adicional.
- source_word: πέπειρον
  english_pob_choice: comes to maturity
  chosen_spanish: llega a su madurez
  alternatives_spanish:
  - madura
  - alcanza su plenitud
  - llega a estar maduro
  lexicon: LSJ
  rationale: El adjetivo se refiere a madurez o sazón; «llega a su madurez» mantiene el proceso de desarrollo de la imagen.
- source_word: τελειωθήσεται
  english_pob_choice: shall be accomplished
  chosen_spanish: se cumplirá
  alternatives_spanish:
  - será realizado
  - será completado
  - será llevado a término
  lexicon: BDAG
  rationale: Tratándose de la voluntad de Dios, «se cumplirá» expresa bien la realización efectiva y solemne del propósito divino.
- source_word: συνεπιμαρτυρούσης
  english_pob_choice: bears witness
  chosen_spanish: da testimonio
  alternatives_spanish:
  - testifica juntamente
  - confirma
  - atestigua junto con
  lexicon: LSJ
  rationale: La partícula indica apoyo testimonial de la Escritura; «da testimonio» preserva el tono bíblico natural.
- source_word: ὁ ἅγιος
  english_pob_choice: the Holy One
  chosen_spanish: el Santo
  alternatives_spanish:
  - el Santo Uno
  - el Santo de Dios
  lexicon: LSJ
  rationale: El griego cita un título escritural sin desarrollar su identidad; «el Santo» preserva la titularidad sin resolver la referencia más allá del texto.
- source_word: προσδοκᾶτε
  english_pob_choice: you expect
  chosen_spanish: ustedes esperan
  alternatives_spanish:
  - aguardan
  - buscan
  - esperan
  lexicon: BDAG
  rationale: «Esperan» es natural en español y conserva la expectativa escatológica presente en el contexto.
theological_decisions:
- issue: Lenguaje de paternidad divina
  english_pob_reading: The compassionate and altogether beneficent Father
  chosen_spanish_reading: El Padre compasivo y benéfico en todo
  alternative_spanish_readings:
  - El Padre misericordioso y bondadoso
  - El Padre compasivo en todo
  rationale: El texto griego nombra a Dios como Padre; se conserva ese título sin neutralizarlo, con adjetivos que expresan su benevolencia activa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Advertencia contra la διψυχία
  english_pob_reading: double-minded / doubtful / waver in their soul
  chosen_spanish_reading: de doble ánimo / esté nuestra alma en duda / vacilan en su alma
  alternative_spanish_readings:
  - de dos mentes
  - de ánimo vacilante
  - duden interiormente
  rationale: La exhortación no es mera duda intelectual, sino división interior e inconstancia ante las promesas de Dios; se preserva el campo semántico de la doblez interior.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Identidad de ὁ ἅγιος en la cita final
  english_pob_reading: the Holy One
  chosen_spanish_reading: el Santo
  alternative_spanish_readings:
  - el Santo One
  - el Mesías
  rationale: La cita griega dice literalmente «el Santo» y no explicita más la identificación; se mantiene el título sin decidir en el cuerpo principal la cuestión intertextual cristológica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje revisado en el audit trail: ἁπλῇ διανοίᾳ fue leído con más literalidad en la fase final del inglés, pero en español se prefirió una solución natural que conserve la idea de sencillez e integridad interior. También se siguió la revisión que acercó ἐνδυλλιεσθω al valor de duda/vacilación interior y el ajuste de ἐν καιρῷ ὀλίγῳ a una expresión temporal breve.'
  spanish_consistency_notes:
  - Se mantuvo «doble ánimo» para διψυχία a lo largo del pasaje y en el eco del texto citado.
  - Se preservó «el Santo» en la cita final para no resolver prematuramente la referencia del título.
  - Se usó «Yahvé» solo cuando corresponda a un nombre divino explícito; en este versículo no aparece.
  - Se evitó «SEÑOR» como máscara del nombre divino y se mantuvo el tono bíblico sin arcaizar innecesariamente.
  - Se optó por un español neutro y eclesialmente legible, con vocabulario de raíz bíblica pero sintaxis natural.
