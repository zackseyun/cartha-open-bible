base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/023/002.yaml
  text: Therefore let us not be double-minded[a], nor let our soul be doubtful concerning his surpassing and glorious gifts.
  footnotes:
  - marker: a
    text: Or 'nor let our soul be inwardly divided'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:14Z'
    unchanged: false
    changes_summary: Revised 'hesitate over' to 'be doubtful concerning' for closer lexical alignment with the Greek and a more formal, natural register.
translation:
  language: es
  text: Por tanto, no seamos de doble ánimo[a], ni nuestra alma dude respecto de sus dones sobresalientes y gloriosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de corazón dividido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διψυχῶμεν
  english_pob_choice: let us not be double-minded
  chosen_spanish: no seamos de doble ánimo
  alternatives_spanish:
  - no seamos de mente dividida
  - no vacilemos interiormente
  lexicon: δίψυχος
  rationale: El compuesto expresa una mente o voluntad dividida; en español, «de doble ánimo» conserva el valor idiomático tradicional sin volver mecánico el texto. Se evita reducirlo a mera duda, porque la primera cláusula ya marca la división interior.
- source_word: ἡ ψυχὴ ἡμῶν
  english_pob_choice: our soul
  chosen_spanish: nuestra alma
  alternatives_spanish:
  - nuestro ser
  - nuestro interior
  lexicon: ψυχή
  rationale: Se mantiene «alma» porque el griego usa ψυχή y el contexto contrasta la disposición interior con la fe firme. «Nuestro ser» suavizaría demasiado la imagen; «nuestro interior» es posible, pero menos fiel al sustantivo concreto.
- source_word: ἐνδυλλιεσθω / ἰνδάλλομαι (corrupt reading acknowledged in audit trail)
  english_pob_choice: be doubtful
  chosen_spanish: dude
  alternatives_spanish:
  - vacile
  - hesite
  lexicon: ἰνδάλλομαι
  rationale: La revisión inglesa fijó el sentido en «be doubtful» para distinguirlo de la primera cláusula. En español, «dude» transmite esa incertidumbre o vacilación respecto de los dones de Dios sin repetir exactamente la idea de «doble ánimo».
- source_word: ἐπὶ ταῖς ὑπερβαλλούσαις καὶ ἐνδόξοις δωρεαῖς αὐτοῦ
  english_pob_choice: concerning his surpassing and glorious gifts
  chosen_spanish: respecto de sus dones tan abundantes y gloriosos
  alternatives_spanish:
  - acerca de sus dones sobresalientes y gloriosos
  - respecto de sus dones sobresalientes y gloriosos
  lexicon: δωρεαί
  rationale: «Dones» es la equivalencia natural para δωρεαί. «Tan abundantes» busca reflejar ὑπερβαλλούσαις con una cualidad de excelencia/abundancia sin forzar un tecnicismo; «gloriosos» mantiene ἐνδόξοις de forma transparente.
theological_decisions:
- issue: Distinción entre la mente dividida y la duda respecto de los dones de Dios
  english_pob_reading: Therefore let us not be double-minded, nor let our soul be doubtful concerning his surpassing and glorious gifts.
  chosen_spanish_reading: Por tanto, no seamos de doble ánimo, ni nuestra alma dude respecto de sus dones tan abundantes y gloriosos.
  alternative_spanish_readings:
  - Por tanto, no seamos de doble ánimo, ni nuestra alma esté dividida en cuanto a sus dones tan gloriosos.
  - Por tanto, no seamos vacilantes, ni dudemos de sus dones gloriosos y sobresalientes.
  rationale: 'El texto griego y el audit trail inglés distinguen dos matices: la doble disposición interior y la duda/hesitación ante los dones de Dios. La redacción española conserva esa tensión sin colapsar ambas cláusulas en una sola idea.'
  doctrine_reference: 1 Clemente 23:2; distinción lexical de διψυχῶμεν e ἰνδάλλομαι/forma corrupta transmitida
translation_notes:
  revision_awareness: El audit trail inglés revisó la segunda cláusula desde una solución que sugería división interior a una que expresa duda, por consideración del verbo griego probablemente corrupto/establecido como ἰνδάλλομαι en este contexto. La versión española sigue esa revisión y evita repetir la idea de la primera cláusula.
  spanish_consistency_notes:
  - Se usa «Dios» de manera implícita por el posesivo «sus» en referencia a los dones, en continuidad con el contexto cristológico/teológico de 1 Clemente.
  - Se preserva el paralelismo retórico de dos miembros coordinados con «ni», como en el griego y el inglés auditado.
  - «Alma» se mantiene uniforme para ψυχή en contextos interiores, sin introducir «espíritu» porque el texto no lo requiere.
