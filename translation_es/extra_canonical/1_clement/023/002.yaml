review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura y la distinción léxica principal del griego: διψυχῶμεν = «de doble ánimo» y ἰνδάλλομαι = «dudar». También conserva «alma» para ψυχή y «dones» para δωρεαί. Sin embargo, «tan abundantes» no refleja con suficiente precisión ὑπερβαλλούσαις, que según el POB auditado apunta más a «sobrepasantes / sobresalientes / extraordinarios» que a mera abundancia cuantitativa.'
  spanish_quality_summary: El español es claro y digno. «No seamos de doble ánimo» y «ni nuestra alma dude» suenan naturales en registro eclesial amplio. La única reparación recomendada es ajustar «tan abundantes» a una formulación más fiel y algo más precisa semánticamente. También conviene pulir la nota alternativa para que corresponda mejor a «double-minded» que a una mera glosa moderna.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. «Alma» y «dones» están bien alineados con ψυχή y δωρεαί. La elección «de doble ánimo» es aceptable como equivalente idiomático de διψυχῶμεν, con alternativa en nota.
  issues:
  - severity: medium
    issue: «tan abundantes» debilita el sentido de ὑπερβαλλούσαις
    rationale: ὑπερβαλλούσαις comunica idea de exceder, sobrepasar o ser extraordinario/sobresaliente, no simplemente abundancia. «Abundantes» desplaza el énfasis hacia cantidad y pierde parte de la fuerza del original y del inglés «surpassing».
  - severity: low
    issue: La nota «de mente dividida» podría formularse de manera más natural en español
    rationale: Como alternativa a «de doble ánimo», una opción más idiomática y cercana al matiz del compuesto sería «de corazón dividido» o «indecisos de ánimo». No es un error grave, pero la nota actual suena algo calcada.
  revised_spanish_text: Por tanto, no seamos de doble ánimo[a], ni nuestra alma dude respecto de sus dones sobresalientes y gloriosos.
  revised_footnotes:
  - marker: a
    text: 'O: «de corazón dividido».'
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura y las decisiones principales del borrador, pero se reemplaza «tan abundantes» por «sobresalientes» para reflejar mejor ὑπερβαλλούσαις («surpassing»). Se ajusta la nota alternativa a una formulación más natural en español y semánticamente más cercana a διψυχῶμεν.
