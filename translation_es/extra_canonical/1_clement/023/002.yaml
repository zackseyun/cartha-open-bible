  text: διὸ μὴ διψυχῶμεν, μηδὲ ἐνδυλλιεσθω ἡ ψυχὴ ἡμῶν ἐπὶ ταῖς ὑπερβαλλούσαις καὶ ἐνδόξοις δωρεαῖς αὐτοῦ.
