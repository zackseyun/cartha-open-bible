id: 1CLEM.23.3
reference: 1 Clement 23:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: πόρρω γενέσθω ἀφ’ ἡμῶν ἡ γραφὴ αὕτη, ὅπου λέγει· Ταλαίπωροί εἰσιν οἱ δίψυχοι, οἱ διατάζοντες τῇ ψυχῇ, οἱ λέγοντες· Ταῦτα ἠκούσαμεν καὶ ἐπὶ τῶν πατέρων ἡμῶν, καὶ ἰδοὺ, γηράσκομεν, καὶ οὐδὲν ἡμῖν τούτων συνέβηκεν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/023/003.yaml
  text: Let this scripture be far from us[a], where it says, “Wretched are the double-minded, those who doubt in their soul, who say, ‘These things we heard even in the days of our fathers, and behold, we have grown old, and none of these things has happened to us.’”
  footnotes:
  - marker: a
    text: Or 'Far be from us this scripture'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:15Z'
    unchanged: false
    changes_summary: Changed “waver in their soul” to “doubt in their soul” for closer lexical correspondence to διατάζοντες τῇ ψυχῇ, and “look” to “behold” for a more formal register.
translation:
  language: es
  text: 'Que esta Escritura esté lejos de nosotros[a], donde dice: «Desdichados los de doble ánimo, los que dudan en su alma, los que dicen: “Estas cosas las oímos aun en los días de nuestros padres, y he aquí, hemos envejecido, y nada de esto nos ha sucedido”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lejos de nosotros esta Escritura».'
    reason: alternative_rendering
lexical_decisions:
- source_word: πόρρω γενέσθω ἀφ’ ἡμῶν
  english_pob_choice: Let this scripture be far from us
  chosen_spanish: Que esta Escritura esté lejos de nosotros
  alternatives_spanish:
  - Aleje de nosotros esta Escritura
  - Sea esta Escritura apartada de nosotros
  lexicon: πόρρω + γίνομαι
  rationale: La griega expresa un deseo de alejamiento; en español, «Que ... esté lejos de nosotros» conserva el sentido imperativo-optativo sin forzar una inversión sintáctica. «Escritura» mantiene el referente del texto citado, como en el inglés POB.
- source_word: ἡ γραφὴ αὕτη
  english_pob_choice: this scripture
  chosen_spanish: esta Escritura
  alternatives_spanish:
  - esta escritura
  - este pasaje
  lexicon: γραφή
  rationale: Se conserva la mayúscula por tratarse de una cita autoritativa de la Escritura, alineado con el uso del POB inglés y la claridad reverente en español.
- source_word: Ταλαίπωροί
  english_pob_choice: Wretched
  chosen_spanish: ¡Desdichados
  alternatives_spanish:
  - Miserables
  - Infelices
  lexicon: ταλαίπωρος
  rationale: «Desdichados» comunica bien la carga de aflicción/estado lamentable del término sin sonar excesivamente coloquial. Mantiene la fuerza exclamativa del griego y del inglés.
- source_word: οἱ δίψυχοι
  english_pob_choice: the double-minded
  chosen_spanish: los de doble ánimo
  alternatives_spanish:
  - los de doble mente
  - los indecisos
  lexicon: δίψυχος
  rationale: «Doble ánimo» es una equivalencia estable y bíblica en español para la idea de dos lealtades internas. «De doble mente» sería más literal pero menos idiomático.
- source_word: οἱ διατάζοντες τῇ ψυχῇ
  english_pob_choice: those who doubt in their soul
  chosen_spanish: los que dudan en su alma
  alternatives_spanish:
  - los que vacilan en su alma
  - los que disputan en su alma
  lexicon: διατάσσω / διάστασις? (as reflected in the source phrase as transmitted)
  rationale: Siguiendo el audit trail del inglés POB, se conserva «dudan» para la tensión interior del verbo/participio en este contexto. «En su alma» refleja τῇ ψυχῇ sin neutralizar la dimensión interior.
- source_word: Ταῦτα ἠκούσαμεν
  english_pob_choice: These things we heard
  chosen_spanish: Estas cosas las oímos
  alternatives_spanish:
  - Estas cosas oímos
  - Esto lo oímos
  lexicon: ἀκούω
  rationale: «Las oímos» mantiene el objeto explícito del griego y fluye naturalmente en español. Se conserva el tiempo pasado simple como en la narración citada.
- source_word: καὶ ἐπὶ τῶν πατέρων ἡμῶν
  english_pob_choice: even in the days of our fathers
  chosen_spanish: aun en los días de nuestros padres
  alternatives_spanish:
  - también en los días de nuestros padres
  - incluso en los días de nuestros padres
  lexicon: ἐπί + genitivo
  rationale: La preposición con genitivo expresa marco temporal; «aun en los días de nuestros padres» sigue de cerca el sentido del inglés POB y mantiene el tono bíblico sin arcaísmo excesivo.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - fíjate
  lexicon: ἰδού
  rationale: «He aquí» reproduce el registro bíblico-formal del marcador discursivo, coherente con el inglés «behold» y con la cita solemne.
- source_word: γηράσκομεν
  english_pob_choice: we have grown old
  chosen_spanish: hemos envejecido
  alternatives_spanish:
  - nos hemos hecho viejos
  - estamos envejeciendo
  lexicon: γηράσκω
  rationale: «Hemos envejecido» expresa el resultado acumulado del tiempo con naturalidad y evita un giro demasiado coloquial.
- source_word: καὶ οὐδὲν ἡμῖν τούτων συνέβηκεν
  english_pob_choice: and none of these things has happened to us
  chosen_spanish: y nada de esto nos ha sucedido
  alternatives_spanish:
  - y nada de esto nos ha pasado
  - y no nos ha ocurrido nada de esto
  lexicon: συμβαίνω
  rationale: «Ha sucedido» / «ha sucedido a nosotros» se naturaliza como «nos ha sucedido» en español. Se conserva el perfecto, que refleja la afirmación de experiencia acumulada.
theological_decisions:
- issue: Tono de rechazo a la Escritura citada
  english_pob_reading: Let this scripture be far from us
  chosen_spanish_reading: Que esta Escritura esté lejos de nosotros
  alternative_spanish_readings:
  - Aleje de nosotros esta Escritura
  - Que esta palabra esté lejos de nosotros
  rationale: La frase debe sonar como una repudiación solemne de la aplicación de la cita. Se evita suavizarla; «Escritura» mantiene la autoridad del texto citado, tal como en el griego y el inglés POB.
  doctrine_reference: Autoridad de la Escritura; recepción retórica de citas bíblicas en la literatura cristiana primitiva
- issue: Causalidad interna de la advertencia
  english_pob_reading: those who doubt in their soul
  chosen_spanish_reading: los que dudan en su alma
  alternative_spanish_readings:
  - los que vacilan en su alma
  - los de alma dividida
  rationale: La decisión conserva la tensión moral/espiritual interna del pasaje sin convertirla en mera duda intelectual. «En su alma» mantiene el foco antropológico del griego.
  doctrine_reference: Integridad interior; exhortación contra la duplicidad
- issue: Cita de experiencia tardía y presunción
  english_pob_reading: we have grown old, and none of these things has happened to us
  chosen_spanish_reading: hemos envejecido, y nada de esto nos ha sucedido
  alternative_spanish_readings:
  - nos hemos hecho viejos, y nada de esto nos ha pasado
  - hemos llegado a viejos, y nada de esto ha ocurrido
  rationale: 'La formulación preserva la autoconfianza irónica del discurso citado: la demora aparente se usa como argumento contra la advertencia. No se explicita más de lo que el texto dice.'
  doctrine_reference: Advertencia contra la incredulidad y la demora aparente del juicio/divina retribución
translation_notes:
  revision_awareness: El inglés POB fue revisado para mejorar la naturalidad de «Let this scripture be far from us» y para afinar «doubt in their soul» / «behold». La versión española sigue esas decisiones revisadas sin volver al giro invertido de tipo literal y mantiene el registro formal de la cita.
  spanish_consistency_notes:
  - Se usa «Escritura» con mayúscula para el referente canónico citado, en consonancia con el tratamiento reverente del POB.
  - Se conserva «he aquí» para ἰδοὺ por consistencia con el registro bíblico-formal.
  - «De doble ánimo» se mantiene como solución estable en español para δίψυχοι, evitando innovaciones innecesarias.
  - No se introduce léxico tradicional de reemplazo como «SEÑOR» o «Cristo», ya que no aparecen en este pasaje.
