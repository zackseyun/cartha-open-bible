review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia botánica general y la idea de que el fruto llega a madurez en poco tiempo. Sin embargo, no preserva con suficiente fidelidad dos rasgos del griego y de la auditoría inglesa: (1) συμβάλετε ἑαυτοὺς ξύλῳ se expresa de forma más natural y exacta como «compárense con un árbol», no «comparen ustedes mismos con un árbol»; (2) la revisión inglesa destacó que παρίστανται es plural, presentando juntos ὄμφαξ y σταφυλή como sujetos coordinados. El español actual usa singular («aparece ... y luego ...»), lo que oscurece esa sintaxis. También «después de estas» suena menos natural que «después de estas cosas» o una reestructuración equivalente.'
  spanish_quality_summary: 'El texto es legible y de registro adecuado, pero tiene giros algo forzados: «comparen ustedes mismos» es poco idiomático; «después de estas» suena incompleto; «el racimo completo» es comprensible, aunque «racimo ya formado» o similar suena más natural. Conviene además ajustar la puntuación para que la enumeración fluya mejor en español.'
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos aquí. «Insensatos» para ἀνόητοι y «vid» para ἄμπελον están bien. «Uva verde» para ὄμφαξ es aceptable y claro. La mejora principal no es terminológica sino sintáctica y estilística, para reflejar el plural de παρίστανται y mejorar la naturalidad del imperativo reflexivo.
  issues:
  - severity: medium
    issue: Imperativo reflexivo poco natural en «comparen ustedes mismos con un árbol»
    rationale: El griego συμβάλετε ἑαυτοὺς pide una comparación reflexiva; en español bíblico natural se expresa mejor con «compárense con un árbol».
  - severity: high
    issue: La secuencia «aparece la uva verde y luego el racimo completo» no refleja bien el plural de παρίστανται
    rationale: 'La auditoría inglesa corrigió precisamente este punto: ὄμφαξ y σταφυλή aparecen como sujetos conjuntos de un verbo plural. El español debe evitar una construcción singular que desdibuje esa relación.'
  - severity: low
    issue: «después de estas» suena incompleto o poco idiomático
    rationale: Como equivalente de καὶ μετὰ ταῦτα, en español conviene «después de esto» o una reestructuración más natural dentro de la secuencia enumerativa.
  - severity: low
    issue: «el racimo completo» es entendible pero algo rígido
    rationale: No es incorrecto, pero «el racimo ya formado» suena más natural y sigue la idea de desarrollo progresivo sin introducir prematuramente la madurez final.
  revised_spanish_text: '¡Oh insensatos[a], compárense con un árbol: tomen una vid. Primero se le caen las hojas; luego brota un retoño, después una hoja, luego una flor, y después de esto aparecen la uva verde y luego el racimo ya formado. Ustedes ven que, en poco tiempo, el fruto del árbol llega a madurez.'
  revised_footnotes:
