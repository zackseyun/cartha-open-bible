    text: O «necios».
    reason: alternative_reading
  revision_rationale: Se ajustó el imperativo reflexivo a un español natural («compárense»), se reestructuró la enumeración para mayor fluidez, y se corrigió la cláusula final de la secuencia botánica para reflejar mejor el plural de παρίστανται, en línea con la auditoría inglesa. Se conservó la nota alternativa sobre ἀνόητοι.
