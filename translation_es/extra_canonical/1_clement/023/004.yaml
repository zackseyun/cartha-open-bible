base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/023/004.yaml
  text: 'You foolish ones[a], compare yourselves to a tree: take a vine. First it sheds its leaves, then a shoot appears, then a leaf, then a flower, and after these the unripe grape and then the full cluster appear. You see that in a short time the fruit of the tree comes to maturity.'
  footnotes:
  - marker: a
    text: Or 'and after these comes the unripe grape, then the full cluster appears. You see that in a little season'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:14Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: '¡Oh insensatos[a], compárense con un árbol: tomen una vid. Primero se le caen las hojas; luego brota un retoño, después una hoja, luego una flor, y después de esto aparecen la uva verde y luego el racimo ya formado. Ustedes ven que, en poco tiempo, el fruto del árbol llega a madurez.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «necios».
    reason: alternative_reading
lexical_decisions:
- source_word: ὦ ἀνόητοι
  english_pob_choice: You foolish ones
  chosen_spanish: ¡Oh insensatos!
  alternatives_spanish:
  - ¡Oh necios!
  - ¡Insensatos ustedes!
  lexicon: ἀνόητοι
  rationale: Mantiene el tono de reprensión directa y el valor de falta de discernimiento; «insensatos» suena natural en registro bíblico y conserva la fuerza exhortativa sin suavizarla demasiado.
- source_word: συμβάλετε ἑαυτοὺς ξύλῳ
  english_pob_choice: compare yourselves to a tree
  chosen_spanish: comparen ustedes mismos con un árbol
  alternatives_spanish:
  - compárense con un árbol
  - pónganse a la par de un árbol
  lexicon: συμβάλλω + ἑαυτόν + ξύλον
  rationale: El griego pide una comparación explícita; «comparen ustedes mismos» refleja el reflexivo y el imperativo plural. «Con un árbol» reproduce el símil sin añadir interpretación.
- source_word: ἄμπελον
  english_pob_choice: a vine
  chosen_spanish: una vid
  alternatives_spanish:
  - una parra
  - una viña
  lexicon: ἄμπελος
  rationale: «Vid» es la equivalencia más directa y clara en español para la planta de la vid; evita confundir con el conjunto del viñedo.
- source_word: φυλλορροεῖ
  english_pob_choice: it sheds its leaves
  chosen_spanish: se le caen las hojas
  alternatives_spanish:
  - pierde sus hojas
  - deshoja
  lexicon: φυλλορροέω
  rationale: Expresa el proceso natural de desprendimiento de hojas en español idiomático y mantiene el sentido verbal del griego.
- source_word: βλαστός γίνεται
  english_pob_choice: a shoot appears
  chosen_spanish: aparece un brote
  alternatives_spanish:
  - sale un tallo
  - surge un retoño
  lexicon: βλαστός
  rationale: «Brote» comunica bien el inicio del crecimiento vegetal y evita tecnicismos innecesarios.
- source_word: ἄνθος
  english_pob_choice: a flower
  chosen_spanish: una flor
  alternatives_spanish:
  - florece
  - una floración
  lexicon: ἄνθος
  rationale: Traducción literal y natural; preserva la secuencia botánica del texto.
- source_word: ὄμφαξ
  english_pob_choice: the unripe grape
  chosen_spanish: la uva verde
  alternatives_spanish:
  - el fruto agrio
  - la uva inmadura
  lexicon: ὄμφαξ
  rationale: En español, «uva verde» comunica de modo claro la fruta todavía inmadura. «Uva inmadura» es posible, pero menos vívida; se evita «agrio» porque añade un matiz no explícito aquí.
- source_word: σταφυλή
  english_pob_choice: the full cluster
  chosen_spanish: el racimo completo
  alternatives_spanish:
  - el racimo maduro
  - el racimo lleno
  lexicon: σταφυλή
  rationale: «Racimo» corresponde al conjunto de uvas; «completo» sigue el avance del desarrollo descrito sin introducir un juicio de madurez que ya se expresa en la frase final.
- source_word: ὁρᾶτε
  english_pob_choice: You see
  chosen_spanish: Ustedes ven
  alternatives_spanish:
  - Ven
  - Como pueden ver
  lexicon: ὁράω
  rationale: Mantiene la apelación directa al lector y el carácter demostrativo del argumento.
- source_word: ἐν καιρῷ ὀλίγῳ
  english_pob_choice: in a short time
  chosen_spanish: en poco tiempo
  alternatives_spanish:
  - en un breve lapso
  - en breve tiempo
  lexicon: καιρός + ὀλίγος
  rationale: «En poco tiempo» es natural y fiel al valor temporal breve; conserva la idea de lapsus corto sin forzar un tono arcaico.
- source_word: εἰς πέπειρον καταντᾷ ὁ καρπὸς
  english_pob_choice: the fruit of the tree comes to maturity
  chosen_spanish: el fruto del árbol llega a madurez
  alternatives_spanish:
  - el fruto del árbol madura
  - el fruto del árbol llega a estar maduro
  lexicon: καταντάω + πέπειρος + καρπός
  rationale: La combinación expresa llegada a estado maduro; «llega a madurez» preserva el movimiento hacia la plenitud sin reducirlo solo a un verbo intransitivo.
theological_decisions:
- issue: La censura inicial expresa reprensión, no una acusación doctrinal específica.
  english_pob_reading: You foolish ones
  chosen_spanish_reading: ¡Oh insensatos!
  alternative_spanish_readings:
  - ¡Oh necios!
  - ¡Oh imprudentes!
  rationale: El texto usa un vocativo de reprensión para exhortar con fuerza retórica. «Insensatos» conserva la severidad sin convertirlo en un insulto coloquial.
  doctrine_reference: N/A
- issue: La comparación botánica funciona como argumento de observación sobre el crecimiento y la maduración.
  english_pob_reading: compare yourselves to a tree ... the fruit of the tree comes to maturity
  chosen_spanish_reading: comparen ustedes mismos con un árbol ... el fruto del árbol llega a madurez
  alternative_spanish_readings:
  - compárense con un árbol ... el fruto del árbol madura
  rationale: 'Se preserva la lógica analógica del pasaje: un proceso visible en la naturaleza ilustra una conclusión sobre el desarrollo y la madurez.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La base inglesa ya había sido afinada para reflejar la sintaxis griega plural en la cláusula final («the unripe grape and then the full cluster appear»). La versión española sigue ese ajuste al hacer explícitos dos sujetos coordinados: «la uva verde y luego el racimo completo». También se conserva la secuencia botánica y el cierre temporal breve sin introducir una paráfrasis más amplia que la que el griego permite.'
  spanish_consistency_notes:
  - Se mantiene el vocativo plural directo con verbo imperativo plural («comparen», «tomen») para corresponder al griego.
  - «Vid» se usa para ἄμπελος; no se sustituye por «viña» porque podría sugerir el terreno y no la planta.
  - «Uva verde» se prefiere como equivalente transparente de ὄμφαξ; si se necesitara mayor literalidad, «uva inmadura» sería la alternativa más cercana.
  - La última cláusula conserva la idea de maduración del fruto, coherente con el griego πέπειρον y con la decisión inglesa revisada sobre la sintaxis plural.
