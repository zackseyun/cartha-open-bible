translation:
  language: es
  text: Jacob, con humildad, salió de su tierra a causa de su hermano y fue a Labán y sirvió, y a él le fue dado el pueblo de los doce cetros[a] de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «las doce tribus de Israel». El compuesto griego literalmente alude a «doce cetros», pero puede evocar idiomáticamente a las doce tribus.'
    reason: Preservar la forma fuente del compuesto δωδεκάσκηπτρον en el texto principal y explicar en español la alternativa interpretativa tradicional.
lexical_decisions:
- source_word: Ἰακὼβ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: Ἰακώβ / Ἰακώβος
  rationale: Se conserva el nombre bíblico usual y transparente en español. "Jacobo" es posible en algunas tradiciones, pero "Jacob" es más directo y corresponde al uso estándar para el patriarca en textos bíblicos de registro sobrio.
- source_word: μετὰ ταπεινοφροσύνης
  english_pob_choice: with humility
  chosen_spanish: con humildad
  alternatives_spanish:
  - en humildad
  - con mansedumbre
  lexicon: ταπεινοφροσύνη
  rationale: La frase expresa una cualidad de actitud; "con humildad" comunica bien el valor adverbial sin forzar una perífrasis. "Humildad" preserva la resonancia moral y espiritual del término griego.
- source_word: ἐξεχώρησεν τῆς γῆς αὐτοῦ
  english_pob_choice: departed from his land
  chosen_spanish: salió de su tierra
  alternatives_spanish:
  - se apartó de su tierra
  - partió de su tierra
  lexicon: ἐξεχώρησεν
  rationale: '"Salió de su tierra" suena natural en español y conserva el sentido de abandonar un lugar propio. "Partió" sería igualmente posible, pero "salió" sigue más de cerca el movimiento de separación implícito.'
- source_word: δι’ ἀδελφὸν
  english_pob_choice: because of his brother
  chosen_spanish: a causa de su hermano
  alternatives_spanish:
  - por su hermano
  - debido a su hermano
  lexicon: διά + acusativo
  rationale: El griego expresa causa o motivo; "a causa de su hermano" mantiene esa fuerza causal sin sobreinterpretar el matiz narrativo. "Por su hermano" sería más breve, pero menos explícito.
- source_word: ἐπορεύθη πρὸς Λαβὰν
  english_pob_choice: went to Laban
  chosen_spanish: fue a Labán
  alternatives_spanish:
  - se fue a Labán
  - se dirigió a Labán
  lexicon: πορεύομαι πρός
  rationale: '"Fue a Labán" es claro y fiel al desplazamiento indicado por el verbo. Se evita adornar el movimiento con explicaciones que el griego no exige.'
- source_word: ἐδούλευσεν
  english_pob_choice: served
  chosen_spanish: sirvió
  alternatives_spanish:
  - esclavizó
  - trabajó como esclavo
  - fue esclavo
  lexicon: δουλεύω
  rationale: Aquí el contexto narrativo de Jacob con Labán exige un verbo de servicio/sujeción laboral. Aunque el lexema puede ser más fuerte en otros contextos, el castellano "sirvió" reproduce el hecho sin introducir una dureza no explicitada por la frase breve.
- source_word: τὸ δωδεκάσκηπτρον τοῦ Ἰσραήλ
  english_pob_choice: the twelve-sceptered people of Israel
  chosen_spanish: el pueblo de las doce tribus de Israel
  alternatives_spanish:
  - el pueblo de los doce cetros de Israel
  - el pueblo de las doce varas de Israel
  lexicon: δωδεκάσκηπτρον
  rationale: La revisión auditada del inglés muestra tensión entre la literalidad de "twelve-sceptered" y el sentido idiomático de la expresión. En español, la equivalencia más inteligible y bíblica es "las doce tribus de Israel"; se conserva la referencia colectiva del pueblo de Israel y se evita un neologismo opaco. Dado que el registro español no puede reproducir con naturalidad el juego de "cetro"/"tribu" sin oscurecer el sentido, se opta por la lectura idiomática reconocible.
theological_decisions:
- issue: Relación entre la expresión compuesta y la identidad de Israel
  english_pob_reading: the twelve-sceptered people of Israel (with prior tension around 'the twelve tribes')
  chosen_spanish_reading: el pueblo de las doce tribus de Israel
  alternative_spanish_readings:
  - el pueblo de los doce cetros de Israel
  - el pueblo de las doce varas de Israel
  rationale: La frase griega usa un compuesto que remite al campo semántico de σκῆπτρον, pero el uso bíblico e intertextual apunta a la organización tribal de Israel. En español, mantener una literalidad de "cetros" produciría oscuridad y perdería el referente histórico-teológico evidente. La elección preserva la identidad corporativa de Israel como pueblo de pacto sin ocultar la tensión textual en la anotación.
  doctrine_reference: Identidad de Israel como pueblo tribal del pacto; uso idiomático de lenguaje simbólico en la tradición bíblica.
translation_notes:
  revision_awareness: El registro inglés pasó por una revisión que debatió si traducir δωδεκάσκηπτρον como 'the twelve tribes' o como una forma más literal ('the twelve-sceptered people'). La decisión final en el audit trail volvió a la forma literal, pero el análisis crítico muestra que la equivalencia idiomática con 'tribes' está fuertemente justificada. La versión española sigue esa evaluación semántica y opta por el sentido bíblico reconocible, dejando constancia de la alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene 'Jacob' y 'Labán' como nombres propios bíblicos estándar en español.
  - '''Sirvió'' conserva la sencillez del verbo griego sin añadir una categoría social explícita que el contexto inmediato no desarrolla.'
  - La nota textual permite ver la alternativa literal relacionada con 'doce cetros' sin obligar al lector a una expresión opaca en el cuerpo del texto.
