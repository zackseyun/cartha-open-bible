source:
  edition: Funk 1901 (normalized OCR)
  text: τίνος χάριν ηὐλογήθη ὁ πατὴρ ἡμῶν Ἀβραάμ, οὐχὶ δικαιοσύνην καὶ ἀλήθειαν διὰ πίστεως ποιήσας;
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/031/002.yaml
  text: For what reason was our father Abraham blessed? Was it not because he did righteousness and truth through faith?
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:21Z'
    unchanged: false
    changes_summary: Revised 'practiced righteousness and truth' to 'did righteousness and truth' for closer lexical correspondence to ποιήσας while preserving natural formal register.
translation:
  language: es
  text: ¿Por qué fue bendecido nuestro padre Abraham? ¿No fue porque hizo justicia y verdad por medio de la fe?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τίνος χάριν
  english_pob_choice: For what reason
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  - ¿Por qué razón
  lexicon: τίς / χάριν
  rationale: La pregunta griega pide la causa o razón de la bendición; en español, «¿Por qué?» comunica de manera natural y fiel esa función interrogativa sin añadir matices innecesarios.
- source_word: ηὐλογήθη
  english_pob_choice: was blessed
  chosen_spanish: fue bendecido
  alternatives_spanish:
  - recibió bendición
  - fue bendita
  lexicon: εὐλογέω
  rationale: «Fue bendecido» reproduce el pasivo de manera directa y mantiene el sentido de recibir favor divino en un registro claro y bíblico.
- source_word: ὁ πατὴρ ἡμῶν Ἀβραάμ
  english_pob_choice: our father Abraham
  chosen_spanish: nuestro padre Abraham
  alternatives_spanish:
  - Abraham, nuestro padre
  - nuestro padre Abraham
  lexicon: πατήρ
  rationale: Se conserva la filiación comunitaria y el orden natural del español permite una formulación sobria y fluida.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: δικαιοσύνη
  rationale: En este contexto ético-covenantal, «justicia» es el equivalente más estable en español y preserva mejor el campo semántico bíblico que una paráfrasis moralizante.
- source_word: ἀλήθειαν
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - la verdad
  - veracidad
  lexicon: ἀλήθεια
  rationale: «Verdad» es la correspondencia más directa y natural para ἀλήθεια; se evita especificar «veracidad» porque podría estrechar indebidamente el alcance del término.
- source_word: διὰ πίστεως
  english_pob_choice: through faith
  chosen_spanish: por medio de la fe
  alternatives_spanish:
  - por la fe
  - mediante la fe
  lexicon: διά + genitivo
  rationale: «Por medio de la fe» expresa con claridad el instrumento o medio indicado por διά con genitivo, manteniendo el énfasis causal/instrumental sin volverlo demasiado técnico.
- source_word: ποιήσας
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - practicó
  - obró
  - realizó
  lexicon: ποιέω
  rationale: La revisión inglesa corrigió «practiced» a «did» para acercarse a ποιήσας; en español, «hizo» reproduce esa sobriedad verbal sin perder la idea de acto concreto. Se evita «practicó» por introducir una interpretación habitual que no está exigida por el griego.
theological_decisions:
- issue: La bendición de Abraham se vincula a su conducta de justicia y verdad mediante la fe
  english_pob_reading: Was it not because he did righteousness and truth through faith?
  chosen_spanish_reading: ¿No fue porque hizo justicia y verdad por medio de la fe?
  alternative_spanish_readings:
  - ¿No fue porque practicó justicia y verdad por medio de la fe?
  - ¿No fue porque obró justicia y verdad por medio de la fe?
  rationale: 'Se mantiene la relación causal propuesta por el texto: la bendición de Abraham se presenta como ligada a su acción justa y verdadera realizada por medio de la fe. No se suaviza la conexión ni se introduce una doctrina posterior que reemplace la formulación directa del pasaje.'
  doctrine_reference: Justificación por la fe en continuidad con una obediencia fiel; no se define aquí una doctrina sistemática más amplia, sino la afirmación retórica del texto.
translation_notes:
  revision_awareness: La versión inglesa fue revisada de 'practiced righteousness and truth' a 'did righteousness and truth' para ajustarse más de cerca a ποιήσας; la traducción española sigue esa revisión con «hizo» para mantener la correspondencia léxica y el registro formal.
  spanish_consistency_notes:
  - Se usa «fe» para πίστεως de manera consistente con el lenguaje bíblico estándar en español.
  - Se mantiene «justicia» y «verdad» como pares conceptuales directos, sin expandirlos a glosas interpretativas.
  - El tono interrogativo retórico se conserva con dos preguntas breves, alineadas con la estructura del griego.
