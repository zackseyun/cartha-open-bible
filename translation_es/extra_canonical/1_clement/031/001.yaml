base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/031/001.yaml
  text: Let us therefore cling to his blessing, and let us see what the ways of blessing are. Let us review the things that have happened from the beginning. For what reason was our father Abraham blessed? Was it not because he did righteousness and truth through faith? Isaac, knowing with confidence what was to come, gladly offered himself as a sacrifice. Jacob, with humility, departed from his land because of his brother and went to Laban and served, and to him was given the twelve-tribed scepter of Israel.
