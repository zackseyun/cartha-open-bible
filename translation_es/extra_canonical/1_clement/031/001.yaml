- from: Unámonos, pues, a su bendición, y veamos cuáles son los caminos de la bendición. Revisemos las cosas que han sucedido desde el principio. ¿Por qué causa fue bendecido nuestro padre Abraham? ¿No fue porque hizo justicia y verdad por medio de la fe? Isaac, con confianza, sabiendo lo que había de venir, se ofreció de buen grado como sacrificio. Jacob, con humildad, salió de su tierra por causa de su hermano y fue a Labán y sirvió, y a él le fue dado el cetro de las doce tribus de Israel.
  to: Adhirámonos, pues, a su bendición, y veamos cuáles son los caminos de la bendición. Revisemos las cosas que han sucedido desde el principio. ¿Por qué causa fue bendecido nuestro padre Abraham? ¿No fue porque hizo justicia y verdad por medio de la fe? Isaac, sabiendo con confianza lo que había de venir, se ofreció de buen grado como sacrificio. Jacob, con humildad, salió de su tierra por causa de su hermano y fue a Labán y sirvió, y a él le fue dado el cetro de Israel de doce tribus[a].
