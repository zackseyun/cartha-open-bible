translation:
  language: es
  text: Adhirámonos, pues, a su bendición, y veamos cuáles son los caminos de la bendición. Revisemos las cosas que han sucedido desde el principio. ¿Por qué causa fue bendecido nuestro padre Abraham? ¿No fue porque hizo justicia y verdad por medio de la fe? Isaac, sabiendo con confianza lo que había de venir, se ofreció de buen grado como sacrificio. Jacob, con humildad, salió de su tierra por causa de su hermano y fue a Labán y sirvió, y a él le fue dado el cetro de Israel de doce tribus[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el cetro de doce tribus de Israel’. El griego usa una expresión compuesta inusual que conserva la imagen del cetro en relación con el Israel de doce tribus, en vez de decir simplemente ‘las doce tribus de Israel’.
    reason: Preservar en español la rareza metafórica de δωδεκάσκηπτρον sin volver el texto ininteligible.
lexical_decisions:
- source_word: Κολληθῶμεν
  english_pob_choice: Let us therefore cling
  chosen_spanish: Unámonos
  alternatives_spanish:
  - Adhirámonos
  - Apeguémonos
  - Aferrémonos
  lexicon: BDAG
  rationale: El exhortativo pide una traducción imperativa inclusiva. 'Unámonos' conserva la llamada a adhesión activa sin sonar forzado; 'aferrémonos' sería más literal, pero en español puede cargar una imagen demasiado física.
- source_word: εὐλογίᾳ
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendecimiento
  - bienaventuranza
  lexicon: BDAG
  rationale: '''Bendición'' es el equivalente natural y mantiene tanto el favor divino como el tema dominante del pasaje.'
- source_word: ὁδοὶ τῆς εὐλογίας
  english_pob_choice: the ways of blessing
  chosen_spanish: los caminos de la bendición
  alternatives_spanish:
  - las sendas de la bendición
  - las maneras de la bendición
  lexicon: BDAG
  rationale: '''Caminos'' reproduce bien la metáfora y suena natural en español bíblico contemporáneo; la relación genitiva se mantiene con claridad.'
- source_word: ἀνατυλίξωμεν
  english_pob_choice: Let us review
  chosen_spanish: Revisemos
  alternatives_spanish:
  - Desenrollémoslo
  - Despleguemos
  - Examinemos
  lexicon: LSJ
  rationale: El verbo sugiere desplegar o revisar retrospectivamente. En español, 'revisemos' conserva la función retórica de repaso sin perder inteligibilidad; 'desenrollémoslo' preservaría la imagen, pero resultaría más áspero.
- source_word: τὰ ἀπ’ ἀρχῆς γενόμενα
  english_pob_choice: the things that have happened from the beginning
  chosen_spanish: las cosas que han sucedido desde el principio
  alternatives_spanish:
  - los acontecimientos desde el principio
  - lo que ocurrió desde el principio
  lexicon: BDAG
  rationale: '''Han sucedido'' conserva el valor retrospectivo y narrativo; ''cosas'' refleja el neutro plural griego sin sobrerreducirlo a un concepto más técnico.'
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: BDAG
  rationale: Aunque el inglés POB usa 'righteousness', en español 'justicia' comunica mejor el campo moral/legal del término y se ajusta al par con 'verdad'. Se conserva la tensión ética sin introducir lenguaje paulino técnico.
- source_word: ἀλήθειαν
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - integridad
  lexicon: BDAG
  rationale: '''Verdad'' es la correspondencia más directa y mantiene la pareja clásica ''justicia y verdad''. No se fuerza ''fidelidad'' porque el texto no lo exige explícitamente.'
- source_word: διὰ πίστεως
  english_pob_choice: through faith
  chosen_spanish: por medio de la fe
  alternatives_spanish:
  - por la fe
  - a través de la fe
  lexicon: BDAG
  rationale: '''Por medio de'' expresa con naturalidad la mediación indicada por διά y evita ambigüedad sobre un valor meramente instrumental o causal.'
- source_word: ποιήσας
  english_pob_choice: he did
  chosen_spanish: hizo
  alternatives_spanish:
  - practicó
  - realizó
  lexicon: BDAG
  rationale: Se mantiene la forma más cercana al griego y al audit trail revisado. En español, 'hizo justicia y verdad' suena sobrio y fiel; 'practicó' explicita más de lo que el participio obliga.
- source_word: μετὰ πεποιθήσεως
  english_pob_choice: with confidence
  chosen_spanish: con confianza
  alternatives_spanish:
  - con seguridad
  - con plena confianza
  lexicon: BDAG
  rationale: La frase expresa seguridad asentada; 'con confianza' es natural y conserva el tono del pasaje.
- source_word: γινώσκων τὸ μέλλον
  english_pob_choice: knowing what was to come
  chosen_spanish: sabiendo lo que había de venir
  alternatives_spanish:
  - conociendo lo que iba a venir
  - sabiendo el futuro
  lexicon: BDAG
  rationale: La formulación evita tecnicismos y mantiene el sentido prospectivo sin exagerar un matiz de presciencia especializada.
- source_word: ἡδέως
  english_pob_choice: gladly
  chosen_spanish: de buen grado
  alternatives_spanish:
  - con gusto
  - alegremente
  lexicon: BDAG
  rationale: '''De buen grado'' comunica una aceptación voluntaria y gozosa en un registro sobrio, adecuado al tono eclesial del texto.'
- source_word: προσήγετο θυσία
  english_pob_choice: offered himself as a sacrifice
  chosen_spanish: se ofreció ... como sacrificio
  alternatives_spanish:
  - se presentó como sacrificio
  - aceptó ser ofrecido como sacrificio
  lexicon: BDAG
  rationale: La construcción refleja el resultado narrativo y la disposición voluntaria de Isaac, preservando la tensión entre pasividad y consentimiento que el contexto exige.
- source_word: ταπεινοφροσύνης
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - humillación
  - modestia
  lexicon: BDAG
  rationale: '''Humildad'' es el equivalente natural del término de virtud y mantiene el paralelismo ético del pasaje.'
- source_word: ἐξεχώρησεν
  english_pob_choice: departed
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se retiró
  lexicon: LSJ
  rationale: En español, 'salió de su tierra' traduce el movimiento narrativo de forma clara y digna, sin añadir un matiz demasiado técnico.
- source_word: δι’ ἀδελφόν
  english_pob_choice: because of his brother
  chosen_spanish: por causa de su hermano
  alternatives_spanish:
  - a causa de su hermano
  - debido a su hermano
  lexicon: BDAG
  rationale: La preposición causal se mantiene de modo transparente y natural; 'por causa de' refleja bien el motivo del desplazamiento de Jacob.
- source_word: ἐδούλευσεν
  english_pob_choice: served
  chosen_spanish: sirvió
  alternatives_spanish:
  - fue esclavo
  - prestó servicio
  lexicon: BDAG
  rationale: Aquí el sentido contextual es servicio a Labán; 'sirvió' evita imponer 'esclavo' donde el contexto inmediato no lo desarrolla.
- source_word: δωδεκάσκηπτρον
  english_pob_choice: the twelve-tribed scepter
  chosen_spanish: el cetro de las doce tribus
  alternatives_spanish:
  - el cetro de las doce tribus de Israel
  - el cetro de Israel de doce tribus
  lexicon: LSJ
  rationale: Se conserva la imagen del cetro y se explica su referente en español de manera comprensible. La metáfora política/real no se aplana a una simple enumeración.
theological_decisions:
- issue: Cómo expresar la relación entre Abraham, la justicia y la fe sin importar formulaciones paulinas posteriores
  english_pob_reading: Was it not because he did righteousness and truth through faith?
  chosen_spanish_reading: ¿No fue porque hizo justicia y verdad por medio de la fe?
  alternative_spanish_readings:
  - ¿No fue porque vivió en justicia y verdad por la fe?
  - ¿No fue porque practicó justicia y verdad mediante la fe?
  rationale: La frase se traduce de forma directa para no borrar la tensión entre acto moral y fe. Se evita convertir el pasaje en un argumento doctrinal posterior; el texto de Clemente simplemente enlaza fe y conducta justa.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; avoid overharmonizing with later doctrinal systematizations.'
- issue: La voluntariedad de Isaac en el episodio sacrificial
  english_pob_reading: Isaac, knowing with confidence what was to come, gladly offered himself as a sacrifice.
  chosen_spanish_reading: Isaac, con confianza, sabiendo lo que había de venir, se ofreció de buen grado como sacrificio.
  alternative_spanish_readings:
  - Isaac, sabiendo con confianza lo que había de venir, aceptó ser ofrecido como sacrificio.
  - Isaac, con confianza, sabiendo lo que iba a venir, se presentó de buen grado como sacrificio.
  rationale: El griego y el contexto subrayan la disposición consciente de Isaac. La versión elegida conserva su consentimiento sin afirmar más de lo que la frase exige sobre la mecánica del sacrificio.
  doctrine_reference: 'DOCTRINE.md: preserve source tension between passive sacrificial frame and willing submission.'
- issue: Mantener la imagen del cetro en δωδεκάσκηπτρον
  english_pob_reading: the twelve-tribed scepter of Israel
  chosen_spanish_reading: el cetro de las doce tribus
  alternative_spanish_readings:
  - el cetro de las doce tribus de Israel
  - el cetro de Israel de las doce tribus
  rationale: Clemente usa una formulación elevada y metafórica. En español conviene mantener 'cetro' para no perder la figura regia; se evita reducirlo a 'tribus' sin más, aunque se explicita el referente para claridad.
  doctrine_reference: 'DOCTRINE.md: preserve literary-metaphorical texture where source diction is elevated.'
translation_notes:
  revision_awareness: La redacción sigue el audit trail inglés más reciente, incorporando la decisión revisada de 'review' para ἀνατυλίξωμεν, 'did' para ποιήσας y la formulación final con 'twelve-tribed scepter'. En español se ajustó 'did' a 'hizo' para mantener naturalidad sin apartarse del valor verbal directo del participio, y se evitó sobrecargar el pasaje con glosas no ancladas. No se introdujeron notas al pie porque la versión española quedó sin ambigüedades textuales que requirieran alternativas ancladas.
  spanish_consistency_notes:
  - Se mantiene 'bendición' de manera uniforme para εὐλογία.
  - '''Fe'' se conserva como traducción de πίστις, sin sustituirla por ''fidelidad''.'
  - Se usa 'justicia y verdad' como pareja ética estable.
  - No se emplea 'SEÑOR' para el nombre divino, ya que este versículo no contiene el tetragrámaton ni κύριος con función de cita.
  - El final conserva la imagen del cetro, con una glosa mínima de sentido mediante 'las doce tribus'.
