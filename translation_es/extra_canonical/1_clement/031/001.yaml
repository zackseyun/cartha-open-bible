    rationale: El griego y el audit trail enfatizan apego o adhesión fuerte (‘cling’), no mera asociación. ‘Unámonos’ es entendible, pero suaviza el matiz exhortativo de aferrarse/adherirse a la bendición.
  - severity: medium
    issue: δωδεκάσκηπτρον aplanado en ‘el cetro de las doce tribus de Israel’
    rationale: Aunque mantiene ‘cetro’, la formulación española reinterpreta el compuesto como simple genitivo explicativo y pierde la extrañeza retórica de ‘doce-cetros / de doce tribus’ aplicada a Israel. Conviene una forma más cercana al original, aunque siga siendo algo literaria.
  - severity: low
    issue: Orden de ‘con confianza, sabiendo…’ en la frase de Isaac
    rationale: No es incorrecto, pero ‘sabiendo con confianza lo que había de venir’ o mantener una secuencia más compacta refleja algo mejor la unidad de μετὰ πεποιθήσεως γινώσκων. Es ajuste estilístico menor.
