translation:
  language: es
  text: Isaac, sabiendo con confianza[a] lo que había de venir, se ofreció con gusto como sacrificio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sabiendo lo que había de venir con confianza».'
    reason: Preserva la alternativa sintáctica documentada en la auditoría inglesa sobre el alcance de «con confianza».
lexical_decisions:
- source_word: Ἰσαὰκ
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Isaác
  lexicon: nombre propio
  rationale: Se conserva el nombre propio tradicional en español, sin adaptación fonética innecesaria.
- source_word: μετὰ πεποιθήσεως
  english_pob_choice: with confidence
  chosen_spanish: con confianza
  alternatives_spanish:
  - con plena certeza
  - con seguridad
  lexicon: πεποίθησις
  rationale: «Con confianza» reproduce de forma natural la idea de convicción/seguridad implícita en πεποιθήσεως y mantiene el matiz relacional y cognitivo del griego.
- source_word: γινώσκων τὸ μέλλον
  english_pob_choice: knowing what was to come
  chosen_spanish: sabiendo lo que había de venir
  alternatives_spanish:
  - conociendo lo que iba a venir
  - sabiendo lo futuro
  lexicon: γινώσκω / μέλλω
  rationale: «Sabiendo» es idiomático en español y conserva el valor cognitivo del participio. «Lo que había de venir» expresa el futuro de manera solemne y cercana al tono del texto.
- source_word: ἡδέως
  english_pob_choice: gladly
  chosen_spanish: con gusto
  alternatives_spanish:
  - de buena gana
  - alegremente
  lexicon: ἡδέως
  rationale: «Con gusto» comunica bien la disposición voluntaria y gozosa sin introducir una emoción más fuerte que la del griego.
- source_word: προσήγετο θυσία
  english_pob_choice: offered himself as a sacrifice
  chosen_spanish: se ofreció como sacrificio
  alternatives_spanish:
  - se presentó como sacrificio
  - se ofreció en sacrificio
  lexicon: προσάγω
  rationale: El verbo medio se refleja con «se ofreció», que sigue de cerca la decisión inglesa auditada y conserva el sentido de presentarse/ofrecerse. «Como sacrificio» mantiene la estructura del original sin añadir elementos ajenos.
theological_decisions:
- issue: El sentido del ofrecimiento de Isaac
  english_pob_reading: gladly offered himself as a sacrifice
  chosen_spanish_reading: se ofreció con gusto como sacrificio
  alternative_spanish_readings:
  - se entregó con gusto como sacrificio
  - se ofreció en sacrificio
  rationale: El griego no dice explícitamente «se entregó», pero sí presenta una acción voluntaria y sacrificial. «Se ofreció» preserva la relación con προσήγετο y evita ampliar el sentido más allá del texto, mientras que «con gusto» conserva el matiz de disposición voluntaria.
  doctrine_reference: Tipología sacrificial de Isaac en la tradición patrística; no se formula doctrina explícita en el texto.
translation_notes:
  revision_awareness: La versión inglesa fue revisada para resolver una ambigüedad sintáctica y para reflejar mejor προσήγετο como «offered himself». La propuesta española sigue esa lectura revisada, colocando «con confianza» antes de la cláusula de contenido implícitamente y usando una formulación verbal directa y natural en español.
  spanish_consistency_notes:
  - Se mantiene «Isaac» como nombre propio estándar en español.
  - Se evita «Señor» u otras sustituciones teológicas no pertinentes; no aparece el nombre divino en este versículo.
  - Se conserva un tono formal y bíblico, pero sin arcaísmos innecesarios.
  - La nota textual en el pie de página refleja la alternativa inglesa preservada y la ambigüedad de alcance del modificador griego.
