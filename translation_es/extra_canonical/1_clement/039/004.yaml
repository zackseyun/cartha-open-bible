source:
  edition: Funk 1901 (normalized OCR)
  text: Τί γάρ; μὴ καθαρὸς ἔσται βροτὸς ἐναντί κυρίου; ἢ ἀπὸ τῶν ἔργων αὐτοῦ ἄμεμπτος ἀνήρ, εἰ κατὰ παίδων αὐτοῦ οὐ πιστεύει, κατὰ δὲ ἀγγέλων αὐτοῦ σκολιὸν τι ἐπενόησεν;
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/039/004.yaml
  text: What then? Shall a mortal be clean before the Lord? Or shall a man be blameless because of his works[a], if he does not trust his children, and has conceived something crooked against his angels?
  footnotes:
  - marker: a
    text: Or 'if he does not trust even his own servants, and has perceived something crooked even in his angels?'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:40Z'
    unchanged: false
    changes_summary: Revised 'servants' to 'children' for παίδων, and 'has perceived' to 'has conceived' for ἐπενόησεν. Also rendered κατὰ with 'against' in the second clause for closer lexical accuracy.
translation:
  language: es
  text: ¿Qué, pues? ¿Será limpio un mortal delante de Yahvé? ¿O será un hombre irreprensible por causa de sus obras[a], si no confía en sus hijos, y ha concebido algo torcido contra sus ángeles?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si no confía en sus siervos, y ha percibido algo torcido en sus ángeles»'
    reason: previous_rendering
lexical_decisions:
- source_word: Τί γάρ;
  english_pob_choice: What then?
  chosen_spanish: ¿Qué, pues?
  alternatives_spanish:
  - ¿Entonces qué?
  - ¿Qué, pues, diremos?
  lexicon: τί / γάρ
  rationale: Mantengo la función retórica e inferencial de la pregunta; «¿Qué, pues?» es natural en español bíblico sin volverse arcaizante.
- source_word: βροτὸς
  english_pob_choice: mortal
  chosen_spanish: mortal
  alternatives_spanish:
  - ser humano
  - hombre mortal
  lexicon: βροτός
  rationale: «Mortal» conserva el contraste de fragilidad frente a Dios en el argumento, y evita neutralizar la fuerza antropológica del término.
- source_word: ἐναντί κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - ante el Señor
  - en presencia del Señor
  lexicon: ἐναντί + κύριος
  rationale: «Delante de» expresa bien la comparación forense/presencial del texto y es idiomático en español bíblico.
- source_word: ἄμεμπτος
  english_pob_choice: blameless
  chosen_spanish: irreprensible
  alternatives_spanish:
  - sin culpa
  - intachable
  lexicon: ἄμεμπτος
  rationale: «Irreprensible» mantiene el valor moral y relacional sin cargarlo con una tonalidad exclusivamente jurídica.
- source_word: παίδων αὐτοῦ
  english_pob_choice: his children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus siervos
  lexicon: παῖς
  rationale: Sigo la revisión más reciente que corrigió la lectura a «children». En español, «hijos» es la forma más natural y suficientemente amplia para el parentesco indicado por el contexto auditado.
- source_word: ἀγγέλων αὐτοῦ
  english_pob_choice: his angels
  chosen_spanish: sus ángeles
  alternatives_spanish:
  - sus mensajeros
  lexicon: ἄγγελος
  rationale: Conservo «ángeles» porque el contexto auditado y la revisión final mantienen la referencia celestial; «mensajeros» debilitaría el contraste a fortiori.
- source_word: σκολιὸν τι
  english_pob_choice: something crooked
  chosen_spanish: algo torcido
  alternatives_spanish:
  - algo perverso
  - algo desviado
  lexicon: σκολιός
  rationale: «Torcido» reproduce la imagen moral/metafórica del original sin intensificar indebidamente el juicio.
- source_word: ἐπενόησεν
  english_pob_choice: has conceived
  chosen_spanish: ha concebido
  alternatives_spanish:
  - ha ideado
  - ha pensado
  lexicon: ἐπινοέω
  rationale: La revisión final corrigió «perceived» a «conceived». «Ha concebido» conserva el sentido de formar/idear internamente algo contra alguien.
theological_decisions:
- issue: Referencia del sujeto en la segunda pregunta y el objeto de la sospecha
  english_pob_reading: if he does not trust his children, and has conceived something crooked against his angels?
  chosen_spanish_reading: si no confía en sus hijos, y ha concebido algo torcido contra sus ángeles
  alternative_spanish_readings:
  - si no confía en sus hijos, y ha concebido algo torcido en sus ángeles
  - si no confía en sus hijos, y ha concebido algo torcido respecto de sus ángeles
  rationale: Sigo la lectura revisada que entiende que el sujeto continúa siendo el Señor. Traduzco κατὰ con «contra» porque el audit trail indica que esa es la opción más cercana al valor relacional/adversativo en esta cláusula, preservando el a fortiori del pasaje.
  doctrine_reference: Lectura retórica y doxológica del discurso sobre la santidad divina y la limitación humana; cf. Job 4:17-18 en la base citada por la tradición textual.
translation_notes:
  revision_awareness: Se incorporó la revisión final auditada que corrige la cláusula de παιδιά/παίδων a «sus hijos», cambia ἐπενόησεν de «ha percibido» a «ha concebido» y prefiere «contra» para κατὰ en la segunda cláusula. La redacción española evita seguir la versión inglesa previa donde «servants» habría oscurecido el sujeto del argumento.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en esta cita del trasfondo de Job, conforme al español bíblico estándar para el título divino en una formulación no marcada por el tetragrámaton.
  - «Mortal» y «delante del Señor» conservan el paralelismo retórico entre fragilidad humana y santidad divina.
  - La nota al pie acompaña la alternativa textual reconocida en el expediente sin introducir una nueva lectura no atestiguada.
