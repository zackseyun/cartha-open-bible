revisions:
- from: Ni aun los cielos están limpios delante de él; ¡cuánto menos los que habitan en casas de barro[a], del mismo barro de que nosotros también somos hechos! Los hirió como a una polilla, y de la mañana hasta la tarde ya no existen; porque no podían ayudarse a sí mismos, perecieron.
  to: Ni siquiera los cielos están limpios delante de él; ¡cuánto menos los que habitan en casas de barro[a], del mismo barro del que nosotros también somos hechos! Los golpeó como una polilla, y de la mañana hasta la tarde ya no existen; porque no podían ayudarse a sí mismos, perecieron.
  rationale: 'Se hacen ajustes menores de naturalidad y precisión: «Ni siquiera» mejora el español contemporáneo; «del mismo barro del que» fluye mejor; y «Los golpeó como una polilla» refleja más claramente la comparación del original sin la torpeza de «como a una polilla». No se requieren cambios doctrinales ni de fondo.'
