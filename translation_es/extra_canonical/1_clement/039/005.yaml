id: 1CLEM.39.5
reference: 1 Clement 39:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: οὐρανοὺς δὲ οὐχὶ καθαρὴς ἐνώπιον αὐτοῦ· ἐὰ δὲ, οἱ κατοικοῦντες οἰκίας πηλίνας, ἐξ ὧν καὶ αὐτοὶ ἐκ τοῦ αὐτοῦ πηλοῦ ἐσμέν. ἔπαισεν αὐτοὺς σητὸς τρόπον, καὶ ἀπὸ πρωΐθεν ἕως ἑσπέρας οὐκ ἔτι εἰσίν· παρὰ τὸ μὴ δύνασθαι αὐτοὺς ἑαυτοῖς βοηθῆσαι ἀπώλοντο.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/039/005.yaml
  text: Even the heavens are not clean before him; how much less those who dwell in houses of clay[a], from the same clay of which we ourselves also are made. He struck them like a moth, and from morning until evening they are no more; because they are unable to help themselves, they perished.
  footnotes:
  - marker: a
    text: Or 'from which we ourselves also are from the same clay.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:41Z'
    unchanged: false
    changes_summary: Adjusted punctuation to better reflect the Greek flow, changed 'of which same clay' to the more natural and accurate 'from the same clay of which,' and retained the rest as faithful and natural.
translation:
  language: es
  text: Ni siquiera los cielos están limpios delante de él; ¡cuánto menos los que habitan en casas de barro[a], del mismo barro del que nosotros también somos hechos! Los golpeó como una polilla, y de la mañana hasta la tarde ya no existen; porque no podían ayudarse a sí mismos, perecieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Barro» traduce aquí el material frágil y terrenal del griego; también puede entenderse como «arcilla».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρανοὺς
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: οὐρανός
  rationale: Mantiene el plural del griego y el alcance cósmico de la afirmación, en línea con el inglés POB.“los cielos” es natural en español bíblico y evita reducirlo a un singular genérico.
- source_word: καθαρὴς
  english_pob_choice: clean
  chosen_spanish: limpios
  alternatives_spanish:
  - puros
  - limpios
  lexicon: καθαρός
  rationale: «Limpios» conserva la imagen de pureza/no mancha sin introducir una abstracción doctrinal ajena al contexto. «Puros» es posible, pero menos concreto para esta acusación retórica.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - delante de él
  lexicon: ἐνώπιον
  rationale: «Delante de él» expresa presencia/juicio de forma clara y sobria. Evita una rigidez excesiva de «ante él» en español sin perder el sentido.
- source_word: οἱ κατοικοῦντες οἰκίας πηλίνας
  english_pob_choice: those who dwell in houses of clay
  chosen_spanish: los que habitan en casas de barro
  alternatives_spanish:
  - los que habitan en casas de arcilla
  - los moradores de casas de barro
  lexicon: πηλός / πηλίνος
  rationale: «Barro» mantiene la metáfora de fragilidad material y sigue de cerca el campo semántico de πηλός/πηλῖνος. «Arcilla» es posible, pero en español puede sonar más técnico y menos imagético.
- source_word: ἐξ ὧν καὶ αὐτοὶ ἐκ τοῦ αὐτοῦ πηλοῦ ἐσμέν
  english_pob_choice: from the same clay of which we ourselves also are made
  chosen_spanish: del mismo barro de que nosotros también somos hechos
  alternatives_spanish:
  - del mismo barro del que también nosotros somos hechos
  - del mismo barro, del que nosotros mismos también somos hechos
  lexicon: ἐκ + genitive; πηλός
  rationale: Conserva la redundancia semítica/grecológica del griego sin volverla torpe en español. «Somos hechos» reproduce el pasivo resultativo de manera natural y mantiene la referencia al mismo material común.
- source_word: ἔπαισεν αὐτοὺς
  english_pob_choice: He struck them
  chosen_spanish: Los hirió
  alternatives_spanish:
  - Los golpeó
  - Los hirió
  lexicon: παίω
  rationale: «Hirió» conserva la fuerza de un castigo infligido y suena más bíblico en español que «golpeó», sin suavizar el acto.
- source_word: σητὸς τρόπον
  english_pob_choice: like a moth
  chosen_spanish: como a una polilla
  alternatives_spanish:
  - como una polilla
  - como a una polilla
  lexicon: σής
  rationale: Mantiene la comparación natural del griego. El «a» tras la preposición ayuda al español y refleja la referencia a personas alcanzadas por un daño leve y devastador.
- source_word: ἀπὸ πρωΐθεν ἕως ἑσπέρας
  english_pob_choice: from morning until evening
  chosen_spanish: de la mañana hasta la tarde
  alternatives_spanish:
  - desde la mañana hasta la tarde
  - de la mañana hasta la tarde
  lexicon: mañana/tarde temporal idiom
  rationale: Es una equivalencia idiomática clara y fiel al arco temporal del texto. «Desde» también sería correcto, pero «de... hasta...» suena más directo aquí.
- source_word: οὐκ ἔτι εἰσίν
  english_pob_choice: they are no more
  chosen_spanish: ya no existen
  alternatives_spanish:
  - ya no están
  - ya no existen
  lexicon: οὐκέτι + εἰμί
  rationale: «Ya no existen» conserva el matiz de desaparición total que el inglés POB expresa con «are no more». «Ya no están» podría sonar demasiado débil.
- source_word: παρὰ τὸ μὴ δύνασθαι αὐτοὺς ἑαυτοῖς βοηθῆσαι
  english_pob_choice: because they are unable to help themselves
  chosen_spanish: porque no podían ayudarse a sí mismos
  alternatives_spanish:
  - ya que no podían ayudarse a sí mismos
  - porque no podían socorrerse a sí mismos
  lexicon: δύναμαι + βοηθέω
  rationale: Expresa la causa explícita del final y mantiene la idea de incapacidad. «Ayudarse a sí mismos» es idiomático y directo; «socorrerse» sería más formal, pero menos inmediato.
- source_word: ἀπώλοντο
  english_pob_choice: they perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - se perdieron
  - perecieron
  lexicon: ἀπόλλυμι
  rationale: «Perecieron» preserva el valor de destrucción/muerte del verbo sin ambigüedad. «Se perdieron» sería demasiado débil y menos adecuado en español bíblico.
theological_decisions:
- issue: La afirmación sobre los cielos y los seres humanos delante de Dios expresa una comparación de impureza/fragilidad, no una doctrina técnica de pecado ritual.
  english_pob_reading: Even the heavens are not clean before him; how much less those who dwell in houses of clay...
  chosen_spanish_reading: Ni aun los cielos están limpios delante de él; ¡cuánto menos los que habitan en casas de barro...!
  alternative_spanish_readings:
  - Ni aun los cielos son puros delante de él
  - Ni aun los cielos están puros delante de él
  rationale: «Limpios» preserva el lenguaje de pureza relacional y ritual implícito sin convertirlo en una formulación doctrinal más específica de lo que el texto exige.
  doctrine_reference: Santidad de Dios; fragilidad humana ante Dios
- issue: La comparación con 'casas de barro' y 'del mismo barro' debe conservar la metáfora de mortalidad compartida.
  english_pob_reading: those who dwell in houses of clay, from the same clay of which we ourselves also are made
  chosen_spanish_reading: los que habitan en casas de barro, del mismo barro de que nosotros también somos hechos
  alternative_spanish_readings:
  - los que habitan en casas de arcilla
  - los que habitan en casas de barro, del mismo barro del que nosotros también somos hechos
  rationale: '«Barro» mantiene la tensión poética y antropológica: el ser humano es frágil y formado del mismo material común. No se domestica la metáfora con un término demasiado técnico.'
  doctrine_reference: Antropología bíblica; mortalidad humana
- issue: La frase final debe expresar muerte/desaparición real sin introducir una lectura moralizada adicional.
  english_pob_reading: because they are unable to help themselves, they perished.
  chosen_spanish_reading: porque no podían ayudarse a sí mismos, perecieron.
  alternative_spanish_readings:
  - porque no podían socorrerse a sí mismos, perecieron
  - por no poder ayudarse a sí mismos, perecieron
  rationale: Se conserva la causalidad explícita y la conclusión fuerte del texto. No se añade una explicación moral o espiritual que el griego no formula aquí.
  doctrine_reference: Juicio divino; dependencia humana
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue ajustada recientemente para mejorar la fluidez y reflejar mejor el flujo griego: se compactó la cláusula relativa sobre el mismo barro y se preservó la secuencia retórica. Esta traducción española sigue esa misma estructura, manteniendo la repetición del material común y la progresión de contraste/causa/muerte sin suavizarla.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino explícito, por lo que se conserva «él» y no se introduce una sustitución innecesaria.
  - Se eligió un registro bíblico natural pero contemporáneo, evitando tanto el arcaísmo rígido como la paráfrasis libre.
  - Se conservó la metáfora de «barro» de manera consistente en toda la cláusula para no romper la imagen antropológica del pasaje.
