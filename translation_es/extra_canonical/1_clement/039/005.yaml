review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego y del inglés POB: conserva el plural «los cielos», la metáfora de «casas de barro», la comparación temporal «de la mañana hasta la tarde» y la conclusión causal de que perecieron por no poder ayudarse a sí mismos. Sin embargo, hay dos puntos mejorables para mayor fidelidad y naturalidad: «Ni aun» suena menos natural que «Ni siquiera», y «Los hirió como a una polilla» no refleja bien la comparación griega/inglesa «He struck them like a moth»; en español esa imagen queda más natural como «Los golpeó como una polilla» o similar, evitando la construcción personal «como a una polilla».'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta leves asperezas estilísticas. «Ni aun» resulta algo arcaizante o rígido para el registro objetivo del proyecto, y la frase «Los hirió como a una polilla» suena extraña en español porque sugiere que ellos fueron heridos como si fueran una polilla individual. También conviene suavizar «de que nosotros también somos hechos» a «del que nosotros también somos hechos», que encaja mejor con el relativo español sin perder la redundancia del original.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Barro» es una buena elección para πηλός/πηλίνος, con «arcilla» como alternativa válida en nota. No aparecen términos del glosario teológico mayor (Yahvé, Mesías, esclavo, etc.).
  issues:
  - severity: medium
    issue: «Ni aun» suena poco natural en español contemporáneo neutral.
    rationale: Aunque comprensible, «Ni siquiera» expresa mejor el énfasis del griego οὐχί en un español moderno y eclesialmente legible.
  - severity: medium
    issue: «Los hirió como a una polilla» es una comparación torpe y poco idiomática.
    rationale: El griego σητὸς τρόπον y el inglés POB «like a moth» presentan una comparación adverbial, no un objeto personal introducido por «a». La redacción actual confunde la imagen. «Los golpeó como una polilla» preserva mejor la construcción comparativa.
  - severity: low
    issue: «de que nosotros también somos hechos» puede mejorarse a «del que nosotros también somos hechos».
    rationale: La forma revisada suena más natural en español sin apartarse del relativo redundante del original.
  revised_spanish_text: Ni siquiera los cielos están limpios delante de él; ¡cuánto menos los que habitan en casas de barro[a], del mismo barro del que nosotros también somos hechos! Los golpeó como una polilla, y de la mañana hasta la tarde ya no existen; porque no podían ayudarse a sí mismos, perecieron.
  revised_footnotes:
  - marker: a
    text: «Barro» traduce aquí el material frágil y terrenal del griego; también puede entenderse como «arcilla».
    reason: lexical_alternative
  revision_rationale: 'Se hacen ajustes menores de naturalidad y precisión: «Ni siquiera» mejora el español contemporáneo; «del mismo barro del que» fluye mejor; y «Los golpeó como una polilla» refleja más claramente la comparación del original sin la torpeza de «como a una polilla». No se requieren cambios doctrinales ni de fondo.'
