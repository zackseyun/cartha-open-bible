revisions:
- from: Que sus hijos estén lejos de la salvación; que sean aplastados[a] a las puertas por los humildes, y no habrá quien los rescate. Porque lo que prepararon, los justos lo comerán, pero ellos mismos no serán librados de los males.
  to: Que sus hijos estén lejos de la seguridad; que sean aplastados[a] junto a las puertas por los humildes, y no habrá quien los rescate. Porque lo que prepararon, los justos lo comerán, pero ellos mismos no serán librados de los males.
  rationale: Se ajusta σωτηρίας a 'seguridad' para seguir mejor el sentido contextual y el expediente inglés ('safety'), evitando una lectura soteriológica innecesaria en español. También se pule la locución espacial a 'junto a las puertas' para una lectura más natural sin alterar el sentido. Se conserva correctamente 'lo que prepararon' según la corrección textual documentada en la cita de Job 5:5.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:44:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura imprecatoria y, de forma importante, preserva la corrección textual documentada por el expediente al traducir ἃ ... ἡτοίμασας con el sentido de cita de Job 5:5: ''lo que prepararon''. También refleja adecuadamente κολαβρισθείησαν, δίκαιοι y οὐκ ἐξαίρετοι ἔσονται. Sin embargo, hay dos ajustes preferibles: (1) σωτηρίας en este contexto se alinea mejor con ''seguridad'' o ''liberación'' que con ''salvación'', porque el inglés auditado usa ''safety'' y aquí no hay razón suficiente para cargar el término con resonancia soteriológica; (2) ''a las puertas'' suena menos natural y algo menos preciso que ''junto a las puertas'' o ''a la puerta'', dado ἐπὶ θύραις. '
  spanish_quality_summary: El español es claro y digno, pero 'lejos de la salvación' suena más teológico de lo necesario en un contexto de calamidad/imprecación. 'Lejos de la seguridad' mejora la legibilidad y evita una posible lectura doctrinal indebida. El resto del verso fluye bien en español eclesial neutro.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. ''Los justos'', ''rescatar'' y ''librados de los males'' son adecuados. La excepción relevante es σωτηρία: aquí conviene no fijarla como ''salvación'' por defecto, sino seguir el valor contextual de protección/seguridad reflejado en el expediente inglés.'
  issues:
  - severity: medium
    issue: σωτηρίας se tradujo como 'salvación' en vez de un equivalente contextual como 'seguridad'.
    rationale: El expediente inglés auditado eligió 'safety', y el contexto de Job 5:4/esta cita trata de desamparo y falta de protección, no de salvación en sentido más amplio o teológico. 'Salvación' en español puede sonar demasiado cargado doctrinalmente.
  - severity: low
    issue: La frase locativa 'a las puertas por los humildes' puede pulirse levemente.
    rationale: Aunque comprensible, 'junto a las puertas por los humildes' suena más natural para ἐπὶ θύραις y mantiene la idea de agresión en el umbral/entrada.
  revised_spanish_text: Que sus hijos estén lejos de la seguridad; que sean aplastados[a] junto a las puertas por los humildes, y no habrá quien los rescate. Porque lo que prepararon, los justos lo comerán, pero ellos mismos no serán librados de los males.
  revised_footnotes:
  - marker: a
    text: 'O: “sean quebrantados”.'
    reason: lexical_alternative
  revision_rationale: Se ajusta σωτηρίας a 'seguridad' para seguir mejor el sentido contextual y el expediente inglés ('safety'), evitando una lectura soteriológica innecesaria en español. También se pule la locución espacial a 'junto a las puertas' para una lectura más natural sin alterar el sentido. Se conserva correctamente 'lo que prepararon' según la corrección textual documentada en la cita de Job 5:5.
