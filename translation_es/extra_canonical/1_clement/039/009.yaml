id: 1CLEM.39.9
reference: 1 Clement 39:9
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: πρόγένοιντο οἱ υἱοὶ αὐτῶν ἀπὸ σωτηρίας· κολαβρισθείησαν ἐπὶ θύραις ἡσόνων, καὶ οὐκ ἔσται ὁ ἐξαιρούμενος· ἃ γὰρ ἐκείνοις ἡτοίμασας, δίκαιοι ἕδονται, αὐτοὶ δὲ ἐκ κακῶν οὐκ ἐξαίρετοι ἔσονται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/039/009.yaml
  text: May their sons be far from safety; may they be crushed at the gates by the lowly[a], and there will be no one to rescue them. For what you prepared for them, the righteous will eat, but they themselves will not be delivered from evils.
  footnotes:
  - marker: a
    text: Or 'For what things you prepared for them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:42Z'
    unchanged: false
    changes_summary: Changed 'doors of inferiors' to 'gates by the lowly' for more natural English and a better rendering of ἐπὶ θύραις ἡσόνων; changed 'what they prepared' to 'what you prepared for them' to reflect ἃ γὰρ ἐκείνοις ἡτοίμασας.
translation:
  language: es
  text: Que sus hijos estén lejos de la seguridad; que sean aplastados[a] junto a las puertas por los humildes, y no habrá quien los rescate. Porque lo que prepararon, los justos lo comerán, pero ellos mismos no serán librados de los males.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “sean quebrantados”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σωτηρίας
  english_pob_choice: safety
  chosen_spanish: salvación
  alternatives_spanish:
  - seguridad
  - salvación
  lexicon: σωτηρία
  rationale: En este contexto poético, la noción apunta a quedar fuera de la liberación/bienestar esperado. En español, 'salvación' conserva mejor la amplitud de rescate y protección que 'seguridad', sin volverlo excesivamente técnico.
- source_word: κολαβρισθείησαν
  english_pob_choice: may they be crushed
  chosen_spanish: sean aplastados
  alternatives_spanish:
  - sean quebrantados
  - sean aplastados
  lexicon: κολαβρίζω
  rationale: El verbo expresa violencia contundente; 'aplastados' reproduce esa fuerza en español natural y mantiene el tono imprecatorio del pasaje.
- source_word: ἐπὶ θύραις ἡσόνων
  english_pob_choice: at the gates by the lowly
  chosen_spanish: a las puertas por los humildes
  alternatives_spanish:
  - a las puertas por los humildes
  - a las puertas de los humildes
  lexicon: θύραι / ἡσόνων
  rationale: Se conserva 'puertas' porque el griego apunta a un lugar de juicio/ataque, y 'los humildes' traduce ἡσόνων de forma más transparente y menos conjetural que opciones como 'inferiores'.
- source_word: ὁ ἐξαιρούμενος
  english_pob_choice: one to rescue them
  chosen_spanish: quien los rescate
  alternatives_spanish:
  - quien los rescate
  - quien los libre
  lexicon: ἐξαιρέω
  rationale: '''Rescatar'' mantiene el sentido activo de sacar/liberar a alguien de peligro y concuerda con la imaginería del verso.'
- source_word: ἃ ... ἡτοίμασας
  english_pob_choice: what you prepared for them
  chosen_spanish: lo que prepararon
  alternatives_spanish:
  - lo que prepararon
  - lo que preparaste para ellos
  lexicon: ἑτοιμάζω
  rationale: El texto crítico y la revisión auditada señalan que la forma del pasaje refleja la cita de Job 5:5 en la que la idea es lo que ellos mismos han preparado/adquirido. Dado el soporte textual del expediente para el sentido corregido, se opta por el plural impersonal 'lo que prepararon' para no introducir un destinatario no asentado en el griego normalizado disponible.
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los justos
  - los rectos
  lexicon: δίκαιος
  rationale: '''Los justos'' es la equivalencia más estable en español bíblico y mantiene el matiz moral/legal del término.'
- source_word: οὐκ ἐξαίρετοι ἔσονται
  english_pob_choice: will not be delivered from evils
  chosen_spanish: no serán librados de los males
  alternatives_spanish:
  - no serán librados de los males
  - no escaparán de los males
  lexicon: ἐξαιρέω
  rationale: '''Librados'' conserva la idea de ser sacados de una situación adversa, y ''males'' traduce τῶν κακῶν con una forma plural que refleja el griego y suena natural en español.'
theological_decisions:
- issue: Alcance de σωτηρία en un contexto imprecatorio y poético
  english_pob_reading: safety
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - seguridad
  - liberación
  rationale: Aunque 'safety' puede sonar más general, el contexto bíblico-poético permite una carga más amplia de rescate y preservación. 'Salvación' evita reducir el término a mera seguridad física y permanece suficientemente abierto.
  doctrine_reference: Soteriology / divine deliverance language
- issue: Sujeto de 'lo que prepararon' según la corrección textual
  english_pob_reading: what they prepared
  chosen_spanish_reading: lo que prepararon
  alternative_spanish_readings:
  - lo que preparaste para ellos
  rationale: El expediente de revisión indica que la frase refleja una cita de Job 5:5 y que el sentido correcto es el de bienes/recursos preparados por ellos mismos. Se evita introducir un 'tú' inexistente en el testigo normalizado.
  doctrine_reference: Textual criticism / citation alignment
translation_notes:
  revision_awareness: This draft follows the latest audited revision in the English POB file, especially the correction of the quotation clause from the earlier OCR-driven misunderstanding. It also preserves the revised rendering of θύραις ἡσόνων as 'at the gates by the lowly' by using a Spanish equivalent that remains concrete and natural.
  spanish_consistency_notes:
  - Se mantiene 'los justos' para δίκαιοι en línea con el uso bíblico común y el registro del proyecto.
  - Se evita 'SEÑOR' o equivalentes de máscara porque este versículo no contiene el tetragrámaton ni una cita directa que lo exija.
  - '''Males'' se conserva en plural para reflejar τῶν κακῶν y evitar una abstracción innecesaria.'
  - La nota al pie marca una alternativa verbal, no una variante textual, porque el griego admite más de un matiz violento en español.
