    timestamp: '2026-04-23T11:34:38Z'
    unchanged: false
    changes_summary: Revised 'belongs to' to 'has' for a more natural and direct rendering of the implied possession in the Greek, while preserving the formal tone and meaning.
translation:
  language: es
  text: ¿Qué puede hacer un mortal? ¿O qué fuerza tiene uno nacido de la tierra?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θνητός
  english_pob_choice: mortal
  chosen_spanish: mortal
  alternatives_spanish:
  - ser humano
  - hombre mortal
  lexicon: θνητός
  rationale: «Mortal» reproduce con naturalidad en español la idea de un ser humano sujeto a la muerte, y conserva el contraste implícito con la debilidad humana sin añadir matices ajenos al griego.
- source_word: δύναται
  english_pob_choice: can do
  chosen_spanish: puede hacer
  alternatives_spanish:
  - puede
  - es capaz de hacer
  lexicon: δύναμαι
  rationale: El verbo expresa capacidad efectiva; en español, «puede hacer» transmite de manera directa la pregunta sobre lo que un mortal es capaz de realizar.
- source_word: ἰσχὺς
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - vigor
  - poder
  lexicon: ἰσχύς
  rationale: «Fuerza» conserva el campo semántico de capacidad/potencia física o efectiva y suena natural en una pregunta retórica breve.
- source_word: γηγενοῦς
  english_pob_choice: one born of earth
  chosen_spanish: uno nacido de la tierra
  alternatives_spanish:
  - uno nacido del polvo
  - un ser terrenal
  lexicon: γηγενής
  rationale: La traducción mantiene la imagen literal de origen terrenal. «Nacido de la tierra» refleja bien la metáfora griega sin sobreinterpretarla, y evita sustituirla por una formulación más interpretativa.
theological_decisions:
- issue: Debilidad humana y condición terrenal
  english_pob_reading: For what can a mortal do? Or what strength has one born of earth?
  chosen_spanish_reading: ¿Qué puede hacer un mortal? ¿O qué fuerza tiene uno nacido de la tierra?
  alternative_spanish_readings:
  - ¿Qué puede hacer el hombre mortal?
  - ¿Qué fuerza posee quien ha nacido de la tierra?
  rationale: El pasaje plantea una pregunta retórica sobre la limitación humana. Se preserva la tensión entre mortalidad y origen terrenal sin convertirla en una afirmación doctrinal más amplia que la del texto.
  doctrine_reference: 'Antropología bíblica: fragilidad humana frente a la grandeza de Dios.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB desde «belongs to» a «has» por mayor naturalidad y correspondencia con la posesión implícita del griego. Por eso se eligió «tiene» en español, en paralelo con el ajuste revisado.
  spanish_consistency_notes:
  - Se mantuvo un tono breve y retórico, acorde con la estructura de dos preguntas del griego.
  - Se evitó «SEÑOR» u otros términos no presentes en el verso, ya que el texto no los requiere.
  - «Uno nacido de la tierra» conserva la imagen original sin añadir explicaciones como «polvo» o «humanidad» que el griego no explicita.
