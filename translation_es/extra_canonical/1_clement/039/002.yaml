  text: τί γὰρ δύναται θνητός; ἢ τίς ἰσχὺς γηγενοῦς;
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/039/002.yaml
  text: For what can a mortal do? Or what strength has one born of earth?
  revision_pass:
