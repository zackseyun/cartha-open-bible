base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/039/006.yaml
  text: He breathed on them, and they died because they lacked wisdom.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:40Z'
    unchanged: false
    changes_summary: Removed the comma for smoother English and revised 'because they had no wisdom' to 'because they lacked wisdom' for a more natural yet accurate rendering of παρὰ τὸ μὴ ἔχειν... σοφίαν.
translation:
  language: es
  text: Sopló sobre ellos, y murieron porque les faltaba sabiduría.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐνεφύσησεν
  english_pob_choice: He breathed on them
  chosen_spanish: Sopló sobre ellos
  alternatives_spanish:
  - Les sopló encima
  - Alentó sobre ellos
  lexicon: ἐμφυσάω
  rationale: El verbo griego expresa soplar/alentar sobre alguien. En español, 'sopló sobre ellos' comunica de manera natural la acción física sin añadir matices no presentes en el texto.
- source_word: αὐτοῖς
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - en ellos
  lexicon: αὐτός
  rationale: La preposición implícita en la traducción inglesa se conserva con 'sobre', que mantiene la imagen direccional del acto.
- source_word: ἐτελεύτησαν
  english_pob_choice: they died
  chosen_spanish: murieron
  alternatives_spanish:
  - fallecieron
  - perecieron
  lexicon: τελευτάω
  rationale: '''Murieron'' es la forma más directa y fiel al hecho de morir sin introducir registro excesivo o interpretaciones adicionales.'
- source_word: παρὰ τὸ μὴ ἔχειν αὐτοὺς σοφίαν
  english_pob_choice: because they lacked wisdom
  chosen_spanish: porque les faltaba sabiduría
  alternatives_spanish:
  - porque no tenían sabiduría
  - a causa de no tener sabiduría
  lexicon: παρά + articular infinitive; ἔχω; σοφία
  rationale: La revisión inglesa prefirió 'lacked wisdom' frente a 'had no wisdom' por naturalidad y precisión. En español, 'les faltaba sabiduría' reproduce bien la idea de carencia sin sonar forzado ni perder el matiz de insuficiencia.
theological_decisions:
- issue: Relación causal entre el soplo y la muerte
  english_pob_reading: He breathed on them, and they died because they lacked wisdom.
  chosen_spanish_reading: Sopló sobre ellos, y murieron porque les faltaba sabiduría.
  alternative_spanish_readings:
  - Sopló sobre ellos, y murieron por no tener sabiduría.
  - Sopló sobre ellos, y murieron ya que no tenían sabiduría.
  rationale: 'El texto presenta dos acciones unidas por causa: el soplo y la muerte, con la falta de sabiduría como explicación causal. La traducción mantiene esa relación sin ampliar el significado hacia una categoría moral distinta.'
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La versión inglesa más reciente eliminó la coma y cambió ''they had no wisdom'' por ''they lacked wisdom'' para reflejar mejor παρὰ τὸ μὴ ἔχειν... σοφίαν. La versión española sigue esa decisión con una formulación natural equivalente: ''les faltaba sabiduría''.'
  spanish_consistency_notes:
  - Se conservó un estilo sobrio y directo, adecuado para un texto breve de tono narrativo.
  - No se añadió mayúscula a 'sabiduría' porque no hay indicio contextual de uso técnico o personificado.
  - '''Sopló sobre ellos'' evita una calca rígida y mantiene la imagen física del griego.'
