translation:
  language: es
  text: 'Está escrito: «No había forma ante mis ojos[a], sino que solo oí un soplo y una voz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Está escrito: “No había forma ante mis ojos; solo oía un soplo y una voz”».'
    reason: previous_rendering
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: It is written
  chosen_spanish: Está escrito
  alternatives_spanish:
  - Escrito está
  - Se ha escrito
  lexicon: γέγραπται
  rationale: La fórmula griega presenta una cita formal sin añadir conectivo; en español, «Está escrito» reproduce con naturalidad la cita bíblica sin introducir un «porque» o «pues» que no está en el original.
- source_word: μορφὴ
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - figura
  - apariencia
  lexicon: μορφή
  rationale: «Forma» conserva la referencia visual y general del sustantivo griego, y funciona bien en español sin desplazar el sentido hacia una apariencia meramente subjetiva.
- source_word: ἀλλʼ ἢ
  english_pob_choice: but only
  chosen_spanish: sino que ... solo
  alternatives_spanish:
  - pero solo
  - excepto que
  lexicon: ἀλλά + ἤ
  rationale: 'Tras una negación, la construcción griega expresa exclusión: «sino que» / «solo». Esta solución evita el matiz comparativo de «más bien» y refleja el valor de «excepto».},{'
theological_decisions:
- issue: Presencia de una cita sin conectivo explicativo inicial
  english_pob_reading: 'It is written: ...'
  chosen_spanish_reading: 'Está escrito: ...'
  alternative_spanish_readings:
  - 'Porque está escrito: ...'
  - 'Pues está escrito: ...'
  rationale: El griego no contiene un marcador causal; por eso la traducción no añade una explicación teológica o narrativa que el texto no formula explícitamente.
  doctrine_reference: Principio de transparencia textual y de no añadir inferencias no marcadas por el original.
- issue: Imagen auditiva frente a visiva en la cita
  english_pob_reading: There was no form before my eyes, but I heard only a breath and a voice.
  chosen_spanish_reading: No había forma ante mis ojos, sino que oí solo un soplo y una voz.
  alternative_spanish_readings:
  - No había apariencia ante mis ojos, sino que oí solo un aliento y una voz.
  - No había forma delante de mis ojos, sino que oí solo un viento y una voz.
  rationale: «Soplo» mantiene la ambigüedad posible de αὔραν entre aire, brisa, soplo o aliento sin forzar una concreción interpretativa. «Voz» conserva el paralelo auditivo del griego. La frase mantiene la tensión entre percepción visual ausente y auditiva presente.
  doctrine_reference: Lectura literal-controlada de la cita, sin resolver la imaginería más allá de lo que permite el griego.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó el «For» inicial, ajustó ἀλλʼ ἢ a «but only» y prefirió un tiempo verbal más natural en inglés. La versión española sigue esas decisiones: no añade conectivo causal inicial, expresa la exclusión con «sino que ... solo» y usa un pasado simple natural («oí»).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando el hebreo lo requiera, aunque este versículo no contiene el Nombre.
  - No se empleó «SEÑOR» por ser un texto griego de cita donde no aparece κύριος en este segmento.
  - «Soplo» se eligió por su amplitud semántica y porque evita fijar indebidamente αὔραν como «viento» o «aliento» en este contexto.
