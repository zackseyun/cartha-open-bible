id: 1CLEM.39.8
reference: 1 Clement 39:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἐγὼ δὲ ἑώρακα ἄφρονας ῥίζας βάλλοντας, ἀλλʼ εὐθέως ἐβρώθη αὐτῶν ἡ δίαιτα.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/039/008.yaml
  text: But I have seen fools taking root, yet immediately their dwelling was consumed.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:41Z'
    unchanged: false
    changes_summary: Changed 'And' to 'But' to reflect δὲ more naturally in context; retained the rest as accurate and formal. 'Taking root' reflects ῥίζας βάλλοντας, and 'their dwelling was consumed' adequately represents αὐτῶν ἡ δίαιτα ἐβρώθη.
translation:
  language: es
  text: Pero yo he visto que los necios echaban raíces, y enseguida fue consumida su morada.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: δὲ
  rationale: En este contexto adversativo, 'Pero' reproduce mejor el giro de contraste que 'δὲ' aporta en la revisión inglesa. 'Mas' sería más arcaico; 'Y' perdería el contraste.
- source_word: ἑώρακα
  english_pob_choice: I have seen
  chosen_spanish: yo he visto
  alternatives_spanish:
  - he visto
  - yo vi
  lexicon: ὁράω
  rationale: El perfecto griego expresa una experiencia adquirida con relevancia presente; en español, 'he visto' lo comunica bien. Se conserva el pronombre explícito para claridad retórica y paralelismo con la primera persona enfática.
- source_word: ἄφρονας
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los necios e insensatos
  lexicon: ἄφρων
  rationale: '''Necios'' es la equivalencia más natural y fuerte en español bíblico para ἄφρων. ''Insensatos'' es posible, pero atenúa el matiz moral.'
- source_word: ῥίζας βάλλοντας
  english_pob_choice: taking root
  chosen_spanish: echaban raíces
  alternatives_spanish:
  - arraigándose
  - echar raíces
  lexicon: ῥίζα + βάλλω
  rationale: La imagen literal es 'lanzar raíces', pero en español la expresión idiomática y transparente es 'echar raíces'. Se mantiene la metáfora vegetal sin forzar un calco.
- source_word: δίαιτα
  english_pob_choice: dwelling
  chosen_spanish: morada
  alternatives_spanish:
  - habitación
  - estancia
  - modo de vida
  lexicon: δίαιτα
  rationale: Aunque δίαιτα puede significar 'régimen de vida' en otros contextos, aquí el audit trail inglés tomó 'dwelling', entendiendo una imagen de habitación o residencia. 'Morada' preserva esa lectura y suena natural en español; 'modo de vida' introducía una interpretación no apoyada por el contexto inmediato.
- source_word: ἐβρώθη
  english_pob_choice: was consumed
  chosen_spanish: fue consumida
  alternatives_spanish:
  - fue devorada
  - fue destruida
  - se consumió
  lexicon: βιόω/βρώσκω?
  rationale: El aoristo pasivo de ἐβρώθη expresa consumo o devoración. 'Fue consumida' mantiene la pasividad y la imagen de destrucción sin añadir un agente explícito.
theological_decisions:
- issue: Interpretación de δίαιτα en el cierre
  english_pob_reading: their dwelling was consumed
  chosen_spanish_reading: fue consumida su morada
  alternative_spanish_readings:
  - se consumió su modo de vida
  - fue destruido su régimen de vida
  rationale: 'Se sigue la lectura auditada del inglés POB: una imagen de residencia/estancia consumida. Aunque δίαιτα puede tener otros sentidos, el contexto y la revisión inglesa favorecen una referencia concreta a la morada, no a una abstracción ética.'
  doctrine_reference: none
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'And' por 'But' para reflejar mejor δὲ, y mantuvo 'taking root' / 'their dwelling was consumed'. La versión española sigue esa misma decisión de contraste y conserva la metáfora de raíces y la imagen de morada consumida sin introducir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u այլ sustituciones no pertinentes; no hay nombres divinos en este versículo.
  - Se mantiene un registro bíblico sobrio y comprensible, sin arcaísmos innecesarios.
  - '''Morada'' se usa como equivalente natural de la imagen final, coherente con la opción inglesa auditada.'
