translation:
  language: es
  text: 'Los hombres insensatos, faltos de entendimiento, necios e incultos se burlan de nosotros y nos escarnecen, queriendo enaltecerse en sus propios pensamientos. Porque ¿qué puede hacer un mortal? ¿O qué fuerza tiene uno nacido de tierra? Porque está escrito: «No vi figura alguna delante de mis ojos; sino que oí solo un soplo[a] y una voz. ¿Qué entonces? ¿Será puro un mortal delante de Yahvé? ¿O será un hombre irreprensible delante de él por sus obras, si no confía ni siquiera en sus propios siervos, y ha percibido algo torcido aun en sus ángeles? Ni aun los cielos son puros delante de él. Cuánto menos los que habitan en casas de barro, de esa misma arcilla de la que también nosotros somos hechos. Los golpeó como a una polilla, y desde la mañana hasta la tarde ya no existen; porque no podían ayudarse a sí mismos, perecieron. Sopló sobre ellos, y murieron, porque no tenían sabiduría. Pero clama, a ver si alguien te escucha, o si llegas a ver a alguno de los santos ángeles; porque la
    ira mata al hombre necio, y los celos dan muerte al que se ha desviado. Y yo he visto a necios echar raíces, pero de inmediato su sustento[b] fue consumido. Que sus hijos estén lejos de la salvación; que sean aplastados a las puertas de los inferiores, y no habrá quien los rescate. Porque lo que ellos prepararon, los justos lo comerán, pero ellos mismos no serán librados de los males».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: αὔραν puede significar 'soplo', 'brisa' o 'viento'; aquí 'soplo' sigue el inglés POB y conserva mejor la impresión de algo apenas percibido.
    reason: lexical_alternative
  - marker: b
    text: δίαιτα admite varios matices, como 'modo de vida', 'hogar' o 'sustento'; aquí se eligió 'sustento' por el contexto de consumo repentino de lo que los mantenía.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφρονες / ἀσύνετοι / μωροὶ / ἀπαίδευτοι
  english_pob_choice: foolish and senseless and stupid and untaught
  chosen_spanish: insensatos, faltos de entendimiento, necios e incultos
  alternatives_spanish:
  - necios e ignorantes
  - fatuos y sin entendimiento
  - tontos e inexpertos
  lexicon: LSJ
  rationale: Conservo la acumulación retórica de cuatro calificativos distintos sin reducirla a un solo insulto. 'Incultos' preserva el matiz de ἀπαίδευτοι como falta de formación, no solo de información.
- source_word: χλευάζουσιν / μυκτηρίζουσιν
  english_pob_choice: mock / sneer at
  chosen_spanish: insultan y nos escarnecen
  alternatives_spanish:
  - se burlan de nosotros y nos mofan
  - ridiculizan y nos desprecian
  - nos chotean y nos menosprecian
  lexicon: LSJ
  rationale: '''Escarnecer'' reproduce el tono de desprecio del par verbal griego y, junto con ''insultan'', conserva la doble carga de burla y desdén.'
- source_word: ἐπαίρεσθαι
  english_pob_choice: to exalt themselves
  chosen_spanish: enaltecerse
  alternatives_spanish:
  - ensalzarse
  - alzarse
  - engrandecerse
  lexicon: LSJ
  rationale: En español, 'enaltecerse' comunica bien la autoexaltación orgullosa sin sonar forzado.
- source_word: θνητός
  english_pob_choice: mortal
  chosen_spanish: mortal
  alternatives_spanish:
  - ser humano
  - hombre
  - humano
  lexicon: LSJ
  rationale: '''Mortal'' mantiene el contraste retórico con la fragilidad humana resaltada en la pregunta.'
- source_word: γηγενής
  english_pob_choice: one born of earth
  chosen_spanish: uno nacido de tierra
  alternatives_spanish:
  - hijo de la tierra
  - nacido de la tierra
  - terráqueo
  lexicon: LSJ
  rationale: La expresión conserva el matiz humillante y material del compuesto griego. 'De tierra' refleja el origen terrestre sin añadir tradición interpretativa.
- source_word: αὔραν
  english_pob_choice: a breath
  chosen_spanish: un soplo
  alternatives_spanish:
  - un aliento
  - una brisa
  - un viento
  lexicon: LSJ
  rationale: '''Soplo'' expresa mejor que ''brisa'' la fragilidad e inasibilidad de lo percibido en la visión.'
- source_word: καθαρός
  english_pob_choice: clean
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - sin mancha
  lexicon: LSJ
  rationale: En este contexto litúrgico/scriptural, 'puro' suena más natural en español que 'limpio' y mantiene el campo semántico de pureza ante Dios.
- source_word: ἄμεμπτος
  english_pob_choice: blameless
  chosen_spanish: irreprensible
  alternatives_spanish:
  - sin culpa
  - sin falta
  - intachable
  lexicon: LSJ
  rationale: '''Irreprensible'' conserva la fuerza moral/judicial del término y es un equivalente bíblico natural en español.'
- source_word: παῖδες
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - servidores
  - criados
  - hijos
  lexicon: LSJ
  rationale: Sigo la decisión inglesa de entender aquí παῖδες como subordinados o asistentes celestiales, no como 'hijos'. En español, 'siervos' refleja mejor la relación de servicio en el paralelismo con 'sus ángeles'.
- source_word: σκολιόν
  english_pob_choice: something crooked
  chosen_spanish: algo torcido
  alternatives_spanish:
  - algo perverso
  - algo retorcido
  - algo desviado
  lexicon: LSJ
  rationale: '''Torcido'' reproduce el adjetivo moral en un español claro y mantiene la imagen de desviación ética.'
- source_word: οἰκίας πηλίνας
  english_pob_choice: houses of clay
  chosen_spanish: casas de barro
  alternatives_spanish:
  - casas de arcilla
  - casas de lodo
  - viviendas de barro
  lexicon: LSJ
  rationale: '''Casas de barro'' es una solución natural y bíblicamente reconocible para la metáfora de fragilidad humana.'
- source_word: ἔπαισεν αὐτοὺς σητὸς τρόπον
  english_pob_choice: He struck them like a moth
  chosen_spanish: Los golpeó como a una polilla
  alternatives_spanish:
  - Los hirió como una polilla
  - Los consumió como una polilla
  - Los abatió como a una polilla
  lexicon: LSJ
  rationale: La comparación queda transparente en español y evita suavizar la imagen de destrucción súbita.
- source_word: ἐνεφύσησεν
  english_pob_choice: He breathed on them
  chosen_spanish: Sopló sobre ellos
  alternatives_spanish:
  - Breatheó sobre ellos
  - Alentó sobre ellos
  - Sopló en ellos
  lexicon: LSJ
  rationale: '''Sopló sobre ellos'' comunica el acto dirigido hacia ellos sin sugerir vivificación; encaja mejor con el resultado de muerte.'
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - celo
  lexicon: LSJ
  rationale: En este contexto de pasión destructiva, 'celos' mantiene la fuerza afectiva negativa sin convertirlo en el sentido positivo de 'celo'.
- source_word: ῥίζας βάλλοντας
  english_pob_choice: taking root
  chosen_spanish: echar raíces
  alternatives_spanish:
  - arraigarse
  - echarse raíces
  - poner raíces
  lexicon: LSJ
  rationale: Es la expresión española más natural para conservar la imagen de estabilidad aparente antes de la ruina.
- source_word: δίαιτα
  english_pob_choice: livelihood
  chosen_spanish: sustento
  alternatives_spanish:
  - modo de vida
  - patrimonio
  - hogar
  lexicon: LSJ
  rationale: Dado el contexto de consumir lo que tenían, 'sustento' expresa mejor el sentido de lo que sustentaba su vida/estado que un término más vago.
- source_word: κολαβρισθείησαν
  english_pob_choice: may they be crushed
  chosen_spanish: sean aplastados
  alternatives_spanish:
  - sean abatidos
  - sean machacados
  - sean humillados
  lexicon: LSJ
  rationale: '''Aplastados'' transmite el carácter fuerte e imprecatorio del verbo en un español natural.'
- source_word: ἐξαιρούμενος / ἐξαίρετοι
  english_pob_choice: to rescue / delivered
  chosen_spanish: rescates / librados
  alternatives_spanish:
  - salvar / salvados
  - rescatar / rescatados
  - sacar / sacados
  lexicon: LSJ
  rationale: Conservo el mismo campo léxico de liberación para ambos miembros del paralelismo, como hace el griego y como refleja el inglés.
theological_decisions:
- issue: Cita bíblica transmitida en forma no idéntica a un texto canónico estándar
  english_pob_reading: Translate the wording as cited in 1 Clement rather than harmonizing to a standard English Job text.
  chosen_spanish_reading: Traducir la formulación tal como aparece citada en 1 Clemente, sin armonizarla con una versión española fija de Job.
  alternative_spanish_readings:
  - Ajustar la cita a una traducción canónica familiar de Job
  - Marcar todas las divergencias en el cuerpo principal
  rationale: La transparencia textual exige traducir la forma transmitida por Clemente, porque la catena refleja una tradición textual concreta y no una cita normalizada.
  doctrine_reference: Primacía del texto fuente y preservación de variantes textuales
- issue: Sentido de παῖδες en la cláusula sobre la confianza de Dios
  english_pob_reading: Render as 'servants' rather than 'children.'
  chosen_spanish_reading: Traducirlo como 'siervos' y no como 'hijos'.
  alternative_spanish_readings:
  - hijos
  - servidores
  rationale: El paralelismo inmediato con 'sus ángeles' apunta a asistentes o subordinados celestiales; 'hijos' introduciría una lectura teológica innecesaria y menos ajustada al contexto.
  doctrine_reference: Consistencia semántica según el contexto y no por tradición heredada
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión inglesa en los puntos clave: mantiene ''before him'' como ''delante de él'', conserva la relación de ''from which same clay'' con ''de la misma arcilla de la cual'', y refleja δίαιτα con una opción concreta (''sustento'') que evita diluir el sentido contextual. También conserva la cita tal como circula en 1 Clemente, sin armonizarla con Job canónico.'
  spanish_consistency_notes:
  - Usé 'Yahvé' para κύριος en la cita bíblica, en coherencia con el criterio del proyecto cuando el texto griego cita el nombre divino.
  - Mantuve 'siervos' para παῖδες por coherencia con el paralelismo con 'ángeles'.
  - Preferí 'puro' y 'irreprensible' para conservar el campo de pureza moral y judicial sin oscurecer el estilo castellano.
  - La serie de cuatro adjetivos iniciales se conservó como acumulación retórica, no como simple repetición de sinónimos.
