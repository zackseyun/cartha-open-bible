base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/039/001.yaml
  text: 'Foolish and senseless and stupid and untaught men mock us and sneer at us, wanting to exalt themselves in their own thoughts. For what can a mortal do? Or what strength belongs to one born of earth? For it is written, “No form was before my eyes; but I heard only a breath and a voice: What then? Shall a mortal be clean before the Lord? Or shall a man be blameless before him because of his works, if he does not trust even his own servants, and has perceived something crooked even in his angels? Even the heavens are not clean before him. How much less those who dwell in houses of clay, from which same clay we ourselves also are made. He struck them like a moth, and from morning until evening they are no more; because they are unable to help themselves, they perished. He breathed on them, and they died, because they had no wisdom. But call out, if anyone will listen to you, or if you will see any of the holy angels; for anger kills the foolish man, and jealousy puts the one gone astray
    to death. And I have seen fools taking root, but immediately their livelihood was consumed. May their sons be far from safety; may they be crushed at the doors of inferiors, and there will be no one to rescue them. For what they prepared, the righteous will eat, but they themselves will not be delivered from evils.”'
