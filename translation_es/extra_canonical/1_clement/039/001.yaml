  to: 'Los hombres insensatos, faltos de entendimiento, necios e incultos se burlan de nosotros y nos escarnecen, queriendo enaltecerse en sus propios pensamientos. Porque ¿qué puede hacer un mortal? ¿O qué fuerza tiene uno nacido de tierra? Porque está escrito: «No vi figura alguna delante de mis ojos; sino que oí solo un soplo[a] y una voz. ¿Qué entonces? ¿Será puro un mortal delante de Yahvé? ¿O será un hombre irreprensible delante de él por sus obras, si no confía ni siquiera en sus propios siervos, y ha percibido algo torcido aun en sus ángeles? Ni aun los cielos son puros delante de él. Cuánto menos los que habitan en casas de barro, de esa misma arcilla de la que también nosotros somos hechos. Los golpeó como a una polilla, y desde la mañana hasta la tarde ya no existen; porque no podían ayudarse a sí mismos, perecieron. Sopló sobre ellos, y murieron, porque no tenían sabiduría. Pero clama, a ver si alguien te escucha, o si llegas a ver a alguno de los santos ángeles; porque la ira
    mata al hombre necio, y los celos dan muerte al que se ha desviado. Y yo he visto a necios echar raíces, pero de inmediato su sustento[b] fue consumido. Que sus hijos estén lejos de la salvación; que sean aplastados a las puertas de los inferiores, y no habrá quien los rescate. Porque lo que ellos prepararon, los justos lo comerán, pero ellos mismos no serán librados de los males».'
  rationale: La revisión corrige pequeñas imprecisiones léxicas y mejora la naturalidad del español sin apartarse del griego ni de las decisiones auditadas del POB. Se reemplazó 'insultan' por 'se burlan de nosotros' para reflejar mejor χλευάζουσιν; se suavizó la construcción de la exhortación retórica ('a ver si alguien te escucha...') para que suene idiomática; se aligeró una frase pesada sobre la arcilla; y se normalizó la puntuación final. Se conservaron las notas léxicas útiles sobre αὔραν y δίαιτα.
  reviewer_model: gpt-5.4
