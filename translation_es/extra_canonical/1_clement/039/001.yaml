  revised_spanish_text: 'Los hombres insensatos, faltos de entendimiento, necios e incultos se burlan de nosotros y nos escarnecen, queriendo enaltecerse en sus propios pensamientos. Porque ¿qué puede hacer un mortal? ¿O qué fuerza tiene uno nacido de tierra? Porque está escrito: «No vi figura alguna delante de mis ojos; sino que oí solo un soplo[a] y una voz. ¿Qué entonces? ¿Será puro un mortal delante de Yahvé? ¿O será un hombre irreprensible delante de él por sus obras, si no confía ni siquiera en sus propios siervos, y ha percibido algo torcido aun en sus ángeles? Ni aun los cielos son puros delante de él. Cuánto menos los que habitan en casas de barro, de esa misma arcilla de la que también nosotros somos hechos. Los golpeó como a una polilla, y desde la mañana hasta la tarde ya no existen; porque no podían ayudarse a sí mismos, perecieron. Sopló sobre ellos, y murieron, porque no tenían sabiduría. Pero clama, a ver si alguien te escucha, o si llegas a ver a alguno de los santos ángeles;
