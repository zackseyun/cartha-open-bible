  text: Ἄφρονες καὶ ἀσύνετοι καὶ μωροὶ καὶ ἀπαίδευτοι χλευάζουσιν ἡμᾶς καὶ μυκτηρίζουσιν, ἑαυτοὺς βουλόμενοι ἐπαίρεσθαι ταῖς διανοίαις αὐτῶν. 2. τί γὰρ δύναται θνητός; ἢ τίς ἰσχὺς γηγενοῦς; 3. γέγραπται· Οὐκ ἦν μορφὴ πρὸ ὀφθαλμῶν μου, ἀλλʼ ἢ αὔραν καὶ φωνὴν ἤκουονʼ 4. Τί γάρ; μὴ καθαρὸς ἔσται βροτὸς ἐναντί κυρίου; ἢ ἀπὸ τῶν ἔργων αὐτοῦ ἄμεμπτος ἀνήρ, εἰ κατὰ παίδων αὐτοῦ οὐ πιστεύει, κατὰ δὲ ἀγγέλων αὐτοῦ σκολιὸν τι ἐπενόησεν; 5. οὐρανοὺς δὲ οὐχὶ καθαρὴς ἐνώπιον αὐτοῦ· ἐὰ δὲ, οἱ κατοικοῦντες οἰκίας πηλίνας, ἐξ ὧν καὶ αὐτοὶ ἐκ τοῦ αὐτοῦ πηλοῦ ἐσμέν. ἔπαισεν αὐτοὺς σητὸς τρόπον, καὶ ἀπὸ πρωΐθεν ἕως ἑσπέρας οὐκ ἔτι εἰσίν· παρὰ τὸ μὴ δύνασθαι αὐτοὺς ἑαυτοῖς βοηθῆσαι ἀπώλοντο. 6. ἐνεφύσησεν αὐτοῖς, καὶ ἐτελεύτησαν παρὰ τὸ μὴ ἔχειν αὐτοὺς σοφίαν. 7. ἐπικάλεσαι δέ, εἴ τις σοι ὑπακούσεται, ἢ εἴ τινα ἁγίων ἀγγέλων ὄψῃ· καὶ γὰρ ἄφρονα ἀναιρεῖ ὀργή, πεπλανημένον δὲ θανατοῖ ζῆλος. 8. ἐγὼ δὲ ἑώρακα ἄφρονας ῥίζας βάλλοντας, ἀλλʼ εὐθέως ἐβρώθη αὐτῶν ἡ δίαιτα. 9. πρόγένοιντο οἱ υἱοὶ αὐτῶν ἀπὸ σωτηρίας·
    κολαβρισθείησαν ἐπὶ θύραις ἡσόνων, καὶ οὐκ ἔσται ὁ ἐξαιρούμενος· ἃ γὰρ ἐκείνοις ἡτοίμασας, δίκαιοι ἕδονται, αὐτοὶ δὲ ἐκ κακῶν οὐκ ἐξαίρετοι ἔσονται.
