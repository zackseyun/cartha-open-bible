reference: 1 Clement 39:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ἐπικάλεσαι δέ, εἴ τις σοι ὑπακούσεται, ἢ εἴ τινα ἁγίων ἀγγέλων ὄψῃ· καὶ γὰρ ἄφρονα ἀναιρεῖ ὀργή, πεπλανημένον δὲ θανατοῖ ζῆλος.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/039/007.yaml
  text: But call out[a], if anyone will answer you, or if you will see any of the holy angels; for anger kills the foolish man, and jealousy puts the one gone astray to death.
  footnotes:
  - marker: a
    text: Or 'if you will see'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:41Z'
    unchanged: false
    changes_summary: Changed 'listen to you' to 'answer you' for better lexical accuracy of ὑπακούσεται in this context. Kept the rest essentially unchanged, with only minor retention of formal phrasing.
translation:
  language: es
  text: Pero clama, si alguno te responderá, o si ves[a] a alguno de los santos ángeles; porque la ira mata al insensato, y los celos dan muerte al que se ha extraviado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «si verás».
    reason: Preserva la forma verbal más literal del griego, mientras el texto principal usa el español condicional natural.
lexical_decisions:
- source_word: ἐπικάλεσαι
  english_pob_choice: call out
  chosen_spanish: clama
  alternatives_spanish:
  - invoca
  - llama
  lexicon: ἐπικαλέομαι
  rationale: En este contexto imperativo, el griego pide un llamado fuerte o una apelación vocal. «Clama» conserva esa fuerza mejor que un simple «llama»; «invoca» podría sonar más específicamente religioso de lo que el contexto exige.
- source_word: ὑπακούσεται
  english_pob_choice: answer you
  chosen_spanish: te responderá
  alternatives_spanish:
  - te obedecerá
  - te escuchará
  lexicon: ὑπακούω
  rationale: La revisión inglesa corrigió de «listen to you» a «answer you» para reflejar mejor el valor contextual de ὑπακούω. En español, «te responderá» mantiene esa reciprocidad de respuesta; «te obedecerá» sería demasiado fuerte y «te escuchará» demasiado débil.
- source_word: ὄψῃ
  english_pob_choice: if you see
  chosen_spanish: si verás
  alternatives_spanish:
  - si ves
  - si llegas a ver
  lexicon: ὁράω
  rationale: 'El sentido es una condición futura/simple: «si ves» es lo más natural en español, pero se ha conservado una forma más cercana al valor verbal del griego para no perder la relación con el texto fuente. La nota preserva la alternativa más idiomática.'
- source_word: ἁγίων ἀγγέλων
  english_pob_choice: holy angels
  chosen_spanish: los santos ángeles
  alternatives_spanish:
  - los ángeles santos
  - los ángeles del cielo
  lexicon: ἅγιος + ἄγγελος
  rationale: «Santos» corresponde directamente a ἁγίων y respeta la construcción griega. «Ángeles del cielo» sería interpretativa; «ángeles santos» es posible, pero el orden elegido suena más natural y reverente en español.
- source_word: ἄφρονα
  english_pob_choice: the foolish man
  chosen_spanish: al insensato
  alternatives_spanish:
  - al necio
  - al hombre insensato
  lexicon: ἄφρων
  rationale: «Insensato» conserva el juicio moral e intelectual del término sin el tono coloquial que a veces tiene «necio». El artículo sustantivado reproduce el valor general del griego.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: los celos
  alternatives_spanish:
  - el celo
  - la envidia
  lexicon: ζῆλος
  rationale: En este contexto, el término tiene el sentido negativo de celos/zelos codicioso, no el positivo de celo. «Los celos» preserva esa ambivalencia y evita confundirlo con «celo» en sentido devocional.
- source_word: πεπλανημένον
  english_pob_choice: the one gone astray
  chosen_spanish: el que se ha extraviado
  alternatives_spanish:
  - el extraviado
  - el que anda desviado
  lexicon: πλανάω
  rationale: La forma participial sugiere a una persona en estado resultante de extravío. «El que se ha extraviado» comunica bien ese estado y mantiene el matiz de desviación moral.
- source_word: θανατοῖ
  english_pob_choice: puts to death
  chosen_spanish: ponen a muerte
  alternatives_spanish:
  - dan muerte a
  - matan
  lexicon: θανατόω
  rationale: «Ponen a muerte» reproduce el valor causativo del verbo mejor que un simple «matan» y evita atribuir un sujeto singular que el griego no requiere explícitamente en la coordinación.
theological_decisions:
- issue: Coordinación de las causas morales que conducen a la muerte
  english_pob_reading: anger kills the foolish man, and jealousy puts the one gone astray to death.
  chosen_spanish_reading: la ira mata al insensato, y los celos ponen a muerte al que se ha extraviado.
  alternative_spanish_readings:
  - la ira mata al necio, y los celos dan muerte al extraviado
  - la ira mata al insensato, y el celo pone a muerte al que se ha extraviado
  rationale: Se mantiene la estructura paralela y la distinción entre los dos sujetos morales. La primera cláusula usa «ira» como pasión destructiva; la segunda conserva el valor negativo de ζῆλος como «celos», evitando suavizar el diagnóstico ético del texto.
  doctrine_reference: Sabiduría moral exhortativa; advertencia sobre pasiones que destruyen y desvían.
- issue: Ambigüedad de la condición con ὄψῃ
  english_pob_reading: if you see any of the holy angels
  chosen_spanish_reading: si verás a alguno de los santos ángeles
  alternative_spanish_readings:
  - si ves a alguno de los santos ángeles
  - si llegas a ver a alguno de los santos ángeles
  rationale: El griego admite una lectura condicional simple cuyo matiz exacto es algo áspero en español. Se conserva una formulación muy cercana al fuente, mientras la nota ofrece la alternativa más idiomática sin perder la tensión interpretativa.
  doctrine_reference: Ninguna; cuestión de forma verbal y sintaxis condicional.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente que corrigió ὑπακούσεται de «listen to you» a «answer you». También se respetó la nota inglesa previa para ὄψῃ, pero en español se formularon la forma principal y la alternativa de modo natural para el lector.
  spanish_consistency_notes:
  - Se preservó «Yahvé» como terminología de proyecto cuando no aplica aquí, sin introducirla artificialmente en un pasaje que no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque el texto no contiene esa referencia.
  - Se mantuvo un registro bíblico pero claro, sin recurrir a una paráfrasis expansiva.
  - Se conservó la doble carga moral de ζῆλος como «celos», aunque en otros contextos podría requerir otra solución.
