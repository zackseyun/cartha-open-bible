  revised_spanish_text: Y nuestros apóstoles supieron por medio de nuestro Señor Jesús Mesías que habría discordia respecto del nombre del cargo de supervisor[a]. Por esta causa, pues, habiendo recibido pleno conocimiento anticipado, designaron a los varones ya mencionados, y después dieron una disposición adicional, para que, si se durmieran, otros varones aprobados los sucedieran en su ministerio. Por tanto, juzgamos injusto que los que fueron designados por ellos, o después por otros varones respetables, con el consentimiento de toda la iglesia, y que han servido al rebaño del Mesías sin reproche, con humildad, en quietud y sin arrogancia, y que por mucho tiempo han tenido buen testimonio de todos, esos tales sean apartados del ministerio. Porque no será pecado pequeño para nosotros si echamos fuera del cargo de supervisor a los que han ofrecido los dones sin reproche y con devoción. Bienaventurados los ancianos que fueron delante, los cuales tuvieron una partida oportuna y completa;
    pues no temen que alguien los quite del lugar que les fue asignado. Porque vemos que ustedes han desplazado a algunos que se conducían bien del ministerio que ellos habían honrado de manera irreprochable.
