revisions:
- from: Y nuestros apóstoles supieron por medio de nuestro Señor Jesús Mesías que habría[а] discordia respecto del nombre del oficio de [a]supervisor. Por esta causa, pues, habiendo recibido un conocimiento previo completo, establecieron a los varones ya mencionados, y después dieron una provisión adicional, para que, si durmieran, otros varones aprobados sucedieran a su ministerio. Por tanto, juzgamos injusto que los que fueron establecidos por ellos, o después por otros varones respetables, con el consentimiento de toda la iglesia, y que sirvieron al rebaño del Mesías sin reproche, con humildad, en quietud y sin arrogancia, y que por largo tiempo han tenido buen testimonio de todos, esos tales sean apartados del ministerio. Porque no será pecado pequeño para nosotros si echamos fuera del oficio de supervisor a los que han presentado los dones sin reproche y con devoción. Bienaventurados los ancianos que fueron delante, los cuales tuvieron una partida oportuna y completa; pues no temen
