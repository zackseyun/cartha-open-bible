translation:
  language: es
  text: Y nuestros apóstoles supieron por medio de nuestro Señor Jesús Mesías que habría discordia respecto del nombre del cargo de supervisor[a]. Por esta causa, pues, habiendo recibido pleno conocimiento anticipado, designaron a los varones ya mencionados, y después dieron una disposición adicional, para que, si se durmieran, otros varones aprobados los sucedieran en su ministerio. Por tanto, juzgamos injusto que los que fueron designados por ellos, o después por otros varones respetables, con el consentimiento de toda la iglesia, y que han servido al rebaño del Mesías sin reproche, con humildad, en quietud y sin arrogancia, y que por mucho tiempo han tenido buen testimonio de todos, esos tales sean apartados del ministerio. Porque no será pecado pequeño para nosotros si echamos fuera del cargo de supervisor a los que han ofrecido los dones sin reproche y con devoción. Bienaventurados los ancianos que fueron delante, los cuales tuvieron una partida oportuna y completa; pues no temen que
    alguien los quite del lugar que les fue asignado. Porque vemos que ustedes han desplazado a algunos que se conducían bien del ministerio que ellos habían honrado de manera irreprochable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «cargo de supervisor» traduce ἐπισκοπῆς con énfasis en la función de supervisión y dirección; se evita «obispo» o «obispado» para no introducir una carga eclesiástica posterior que el griego no exige por sí mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρις
  english_pob_choice: strife
  chosen_spanish: discordia
  alternatives_spanish:
  - contienda
  - querella
  lexicon: BDAG
  rationale: En español, «discordia» comunica con naturalidad el conflicto comunitario y la tensión faccional sin volverlo trivial. Conserva el peso eclesial de ἔρις en este contexto de disputa por cargos.
- source_word: ἐπισκοπῆς
  english_pob_choice: overseer’s office
  chosen_spanish: oficio de supervisor
  alternatives_spanish:
  - oficio de sobreveedor
  - cargo de supervisor
  - episcopado
  lexicon: BDAG
  rationale: Se evita «obispo» o «episcopado», que pueden sonar demasiado posteriores o denominacionales. «Supervisor» mantiene la función de supervisión institucional que exige el griego.
- source_word: πρόγνωσιν εἰληφότες τελείαν
  english_pob_choice: having received complete foreknowledge
  chosen_spanish: habiendo recibido un conocimiento previo completo
  alternatives_spanish:
  - habiendo recibido plena presciencia
  - habiendo obtenido presciencia completa
  lexicon: BDAG
  rationale: «Conocimiento previo» suena más natural en español que «presciencia» y conserva el sentido de conocimiento anticipado. «Completo» traduce τελείαν sin forzar la idea de perfección absoluta.
- source_word: κατέστησαν
  english_pob_choice: appointed
  chosen_spanish: establecieron
  alternatives_spanish:
  - designaron
  - nombraron
  - instituyeron
  lexicon: BDAG
  rationale: «Establecieron» conserva el acto formal de colocar a alguien en una función y resulta más amplio que «nombraron», que puede sonar demasiado administrativo.
- source_word: ἐπινομὴν
  english_pob_choice: a further provision
  chosen_spanish: una provisión adicional
  alternatives_spanish:
  - una disposición adicional
  - un arreglo adicional
  - una regla suplementaria
  lexicon: LSJ
  rationale: La expresión rara sugiere una medida añadida y deliberada para la sucesión. «Provisión adicional» mantiene ese valor sin sobreespecificar más de lo que el término permite.
- source_word: κοιμηθῶσιν
  english_pob_choice: fall asleep
  chosen_spanish: durmieran
  alternatives_spanish:
  - murieran
  - partieran
  - se durmieran
  lexicon: BDAG
  rationale: Se conserva el eufemismo cristiano tradicional para la muerte, que en español se entiende con naturalidad y respeta el tono del texto.
- source_word: διαδέξωνται
  english_pob_choice: might succeed to
  chosen_spanish: sucedieran a
  alternatives_spanish:
  - heredaran
  - tomaran el lugar de
  - sucedieran en
  lexicon: BDAG
  rationale: «Suceder a» expresa la continuidad ordenada en el cargo o ministerio, que es precisamente el punto argumental de Clemente.
- source_word: λειτουργίαν
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  - función litúrgica
  - oficio
  lexicon: BDAG
  rationale: «Ministerio» conserva el registro eclesial y funcional del término sin reducirlo a una mera tarea ni cargarlo innecesariamente de sentido litúrgico técnico.
- source_word: ἐλλογίμων
  english_pob_choice: reputable
  chosen_spanish: respetables
  alternatives_spanish:
  - distinguidos
  - estimados
  - de buena reputación
  lexicon: LSJ
  rationale: «Respetables» transmite reconocimiento público y formalidad moral de modo claro en español. Mantiene la idea de varones con consideración social y eclesial.
- source_word: συνευδοκησάσης τῆς ἐκκλησίας πάσης
  english_pob_choice: with the whole church consenting
  chosen_spanish: con el consentimiento de toda la iglesia
  alternatives_spanish:
  - con la aprobación de toda la iglesia
  - habiendo concurrido toda la iglesia
  lexicon: BDAG
  rationale: La frase participial se naturaliza como circunstancia de consentimiento comunitario. «Toda la iglesia» preserva el alcance corporativo del asentimiento.
- source_word: ποιμνίῳ
  english_pob_choice: flock
  chosen_spanish: rebaño
  alternatives_spanish:
  - grey
  - manada
  lexicon: BDAG
  rationale: «Rebaño» es la metáfora pastoral más clara y natural en español para la imagen del pueblo cuidado por Cristo.
- source_word: ταπεινοφροσύνης
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - lowlidad de ánimo
  - humillación
  lexicon: BDAG
  rationale: «Humildad» es la equivalencia directa, clara y digna para la virtud indicada por el término griego.
- source_word: ἡσύχως
  english_pob_choice: quietly
  chosen_spanish: en quietud
  alternatives_spanish:
  - tranquilamente
  - en paz
  - silenciosamente
  lexicon: BDAG
  rationale: «En quietud» preserva el matiz de comportamiento sereno y no belicoso; evita sugerir mera ausencia de sonido.
- source_word: ἀβαναύσως
  english_pob_choice: without arrogance
  chosen_spanish: sin arrogancia
  alternatives_spanish:
  - sin altivez
  - sin soberbia
  - sin actitud grosera
  lexicon: LSJ
  rationale: El término es difícil y el contexto contrasta con humildad y quietud. «Sin arrogancia» recoge bien el sentido moral de conducta no altiva ni prepotente.
- source_word: μεμαρτυρημένους
  english_pob_choice: well attested
  chosen_spanish: han tenido buen testimonio
  alternatives_spanish:
  - han sido bien testimoniados
  - han sido bien acreditados
  - han recibido buen testimonio
  lexicon: BDAG
  rationale: En español, la fórmula «buen testimonio» es idiomática y refleja la buena reputación sostenida a lo largo del tiempo que exige el participio.
- source_word: ἀποβάλλεσθαι
  english_pob_choice: be removed
  chosen_spanish: sean apartados
  alternatives_spanish:
  - sean removidos
  - sean expulsados
  - sean echados fuera
  lexicon: BDAG
  rationale: «Apartados» es menos brusco que «echados fuera» pero sigue expresando la injusta exclusión del ministerio. En el versículo siguiente se usa una formulación más fuerte para el contraste retórico.
- source_word: προσενέγκοντας τὰ δῶρα τῆς ἐπισκοπῆς
  english_pob_choice: have offered its gifts
  chosen_spanish: han presentado los dones
  alternatives_spanish:
  - han ofrecido los dones
  - han presentado las ofrendas del oficio
  - han ofrecido las ofrendas del supervisor
  lexicon: BDAG
  rationale: «Dones» mantiene visible el lenguaje de ofrenda/servicio del texto griego sin convertirlo en una paráfrasis sacrificial excesiva. El complemento «del oficio de supervisor» queda implícito por el contexto inmediato.
- source_word: ὁσίως
  english_pob_choice: devoutly
  chosen_spanish: con devoción
  alternatives_spanish:
  - piadosamente
  - santamente
  - con piedad
  lexicon: BDAG
  rationale: «Con devoción» comunica una piedad activa y reverente, adecuada al registro moral del pasaje y más natural que un adverbio arcaico.
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - mayores
  lexicon: BDAG
  rationale: «Ancianos» traduce de forma transparente πρεσβύτεροι y evita introducir un tecnicismo eclesiástico posterior sin necesidad contextual.
- source_word: προοδοιπορήσαντες
  english_pob_choice: went on before
  chosen_spanish: fueron delante
  alternatives_spanish:
  - fueron antes
  - precedieron
  - caminaron delante
  lexicon: LSJ
  rationale: La imagen de ir delante se conserva de manera natural en español y encaja con la metáfora de los que han muerto antes que los demás.
- source_word: ἀνάλυσιν
  english_pob_choice: departure
  chosen_spanish: partida
  alternatives_spanish:
  - partida de este mundo
  - salida
  - despedida
  lexicon: BDAG
  rationale: «Partida» expresa el eufemismo de muerte con dignidad y brevedad. «Partida oportuna y completa» intenta reflejar el sentido de temporalidad adecuada y consumación del verbo.
- source_word: μετηγάγετε
  english_pob_choice: have displaced
  chosen_spanish: han desplazado
  alternatives_spanish:
  - han removido
  - han trasladado
  - han apartado
  lexicon: LSJ
  rationale: El verbo sugiere mover a alguien fuera de su lugar. «Han desplazado» conserva la idea de cambio indebido de puesto sin añadir una acusación más específica de la que el griego exige.
- source_word: καλῶς πολιτευομένους
  english_pob_choice: conducting themselves well
  chosen_spanish: se conducían bien
  alternatives_spanish:
  - vivían honorablemente
  - se comportaban rectamente
  - llevaban buena conducta
  lexicon: BDAG
  rationale: La expresión combina conducta y orden de vida; «se conducían bien» la expresa con naturalidad y sin perder el matiz ético.
- source_word: τετιμημένης
  english_pob_choice: honorably assigned
  chosen_spanish: honrosamente reconocido
  alternatives_spanish:
  - honrado
  - tenido en honor
  - debidamente honrado
  lexicon: BDAG
  rationale: El participio perfecto indica un ministerio investido de honor. «Honrosamente reconocido» intenta conservar tanto la dignidad otorgada como el aprecio ya asentado por la comunidad.
theological_decisions:
- issue: Χριστοῦ / Χριστός en este contexto
  english_pob_reading: our Lord Jesus Messiah
  chosen_spanish_reading: nuestro Señor Jesús Mesías
  alternative_spanish_readings:
  - nuestro Señor Jesús Cristo
  - nuestro Señor Jesucristo
  rationale: Se sigue la política del proyecto de traducir el título cuando funciona como título. En 1 Clemente, el uso conserva fuerza titular y no exige convertirlo en nombre fijo litúrgico.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: 'Lenguaje de cargos eclesiales: ἐπισκοπή, λειτουργία, πρεσβύτεροι'
  english_pob_reading: overseer’s office / ministry / elders
  chosen_spanish_reading: oficio de supervisor / ministerio / ancianos
  alternative_spanish_readings:
  - obispado / ministerio / presbíteros
  - supervisión / servicio / presbíteros
  rationale: La redacción preserva el valor institucional sin cargar el texto con terminología confesional posterior. «Supervisor» mantiene la función del cargo, mientras «ancianos» traduce πρεσβύτεροι de forma directa.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La versión inglesa revisada mantiene sin cambios la filosofía de equivalencia óptima y no registra notas textuales adicionales. La presente propuesta sigue esa línea, conservando el tono argumentativo de Clemente y las decisiones clave del audit trail, con ajustes naturales para el español.
  spanish_consistency_notes:
  - Se conserva «Mesías» para Χριστός según la política del proyecto.
  - Se usa «supervisor» de manera consistente para ἐπισκοπή en este pasaje.
  - «Ancianos» se mantiene para πρεσβύτεροι, diferenciándolo de cargos posteriores.
  - La metáfora de muerte como «dormir» se preserva en «durmieran».
