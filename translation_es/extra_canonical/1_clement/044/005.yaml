revisions:
- from: Bienaventurados los ancianos que fueron delante[a], los cuales tuvieron una partida oportuna y completa; porque no temen que alguien los aparte del lugar que les fue dado.
  to: Bienaventurados los ancianos que se adelantaron[a], los cuales tuvieron una partida oportuna y completa; porque no temen que alguien los aparte del lugar que les fue dado.
  rationale: Se reemplaza «fueron delante» por «se adelantaron» para expresar de forma más natural en español la idea de προοδοιπορήσαντες, manteniendo el matiz de haber ido antes que otros. Se ajusta la nota para ofrecer una alternativa idiomática real. No se tocan «partida» ni «lugar que les fue dado», que reflejan bien tanto el griego como la revisión léxica del POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:30:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: μακάριοι = «Bienaventurados», πρεσβύτεροι = «ancianos», ἔγκαιρον καὶ τελείαν ἔχον τὴν ἀνάλυσιν = «tuvieron una partida oportuna y completa», y δεδομένου αὐτοῖς τόπου = «el lugar que les fue dado», preservando correctamente el cambio léxico a δίδωμι documentado por el POB. Sin embargo, «fueron delante» para προοδοιπορήσαντες suena poco natural en español y no comunica con suficiente claridad la idea idiomática de haber ido antes/partido antes.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «fueron delante» es torpe en español bíblico moderno y la nota «que iban delante» no mejora la naturalidad. Una formulación como «se adelantaron» o «fueron antes» lee mejor; en este contexto funerario/eulogístico, «se adelantaron» conserva la metáfora de ir por delante sin introducir tecnicismo. El resto del versículo es legible y fiel.
  glossary_alignment: No hay términos del glosario maestro en conflicto. «Ancianos» para πρεσβύτεροι y «lugar que les fue dado» para δεδομένου αὐτοῖς τόπου están bien alineados con la evidencia y la auditoría inglesa. La única mejora necesaria es una decisión léxica más idiomática para προοδοιπορήσαντες.
  issues:
  - severity: medium
    issue: «fueron delante» es una traducción poco idiomática de προοδοιπορήσαντες
    rationale: Aunque literalmente cercana, la expresión resulta forzada en español y debilita la claridad. El contexto pide una formulación natural que mantenga la idea de ir antes o preceder en el camino de la muerte.
  - severity: low
    issue: La nota alternativa «que iban delante» no aporta una alternativa mejor
    rationale: La variante propuesta también suena poco natural y no preserva mejor el matiz del original. Conviene sustituirla por una alternativa más clara o eliminarla.
  revised_spanish_text: Bienaventurados los ancianos que se adelantaron[a], los cuales tuvieron una partida oportuna y completa; porque no temen que alguien los aparte del lugar que les fue dado.
  revised_footnotes:
  - marker: a
    text: 'O: «que fueron antes»'
    reason: alternative_rendering
  revision_rationale: Se reemplaza «fueron delante» por «se adelantaron» para expresar de forma más natural en español la idea de προοδοιπορήσαντες, manteniendo el matiz de haber ido antes que otros. Se ajusta la nota para ofrecer una alternativa idiomática real. No se tocan «partida» ni «lugar que les fue dado», que reflejan bien tanto el griego como la revisión léxica del POB.
