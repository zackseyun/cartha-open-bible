translation:
  language: es
  text: Bienaventurados los ancianos que se adelantaron[a], los cuales tuvieron una partida oportuna y completa; porque no temen que alguien los aparte del lugar que les fue dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que fueron antes»'
    reason: alternative_rendering
lexical_decisions:
- source_word: προοδοιπορήσαντες
  english_pob_choice: went on before
  chosen_spanish: fueron delante
  alternatives_spanish:
  - precedieron
  - fueron antes
  lexicon: προοδοιπορέω
  rationale: El verbo sugiere ir delante o preceder; 'fueron delante' conserva el movimiento temporal y relacional sin volverlo demasiado técnico. Evita también la resonancia administrativa de 'precedieron en cargo' que no está en el griego.
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - ancianos de la iglesia
  lexicon: πρεσβύτερος
  rationale: Aquí el griego designa a los mayores/ancianos en sentido eclesial; en español 'ancianos' es fiel y transparente. 'Presbíteros' introduciría un tecnicismo confesional no requerido por el pasaje.
- source_word: ἔγκαιρον
  english_pob_choice: timely
  chosen_spanish: oportuna
  alternatives_spanish:
  - a tiempo
  - en el momento debido
  lexicon: ἔγκαιρος
  rationale: '''Oportuna'' mantiene la idea de algo en su debido tiempo y suena natural en español bíblico moderno.'
- source_word: τελείαν
  english_pob_choice: complete
  chosen_spanish: completa
  alternatives_spanish:
  - perfecta
  - acabada
  lexicon: τέλειος
  rationale: '''Completa'' comunica la idea de plenitud/cumplimiento sin cargar ''perfecta'' con una connotación moral que aquí no es central.'
- source_word: ἀνάλυσιν
  english_pob_choice: departure
  chosen_spanish: partida
  alternatives_spanish:
  - despedida
  - partida de este mundo
  - partida final
  lexicon: ἀνάλυσις
  rationale: El término apunta a una salida o disolución de la vida; 'partida' es sobria y fiel. 'Despedida' sería más interpretativa.
- source_word: δεδομένου αὐτοῖς τόπου
  english_pob_choice: place given to them
  chosen_spanish: el lugar que les fue dado
  alternatives_spanish:
  - el lugar asignado a ellos
  - el lugar concedido a ellos
  lexicon: δίδωμι
  rationale: Sigo la revisión del POB que corrige la falsa equivalencia con 'appointed'. 'Fue dado' preserva el valor de δίδωμι y mantiene la pasiva impersonal natural en español.
theological_decisions:
- issue: Cómo reflejar el honor concedido a los dirigentes ya fallecidos sin convertirlo en una fórmula litúrgica posterior
  english_pob_reading: Blessed are the elders who went on before, who had a timely and complete departure
  chosen_spanish_reading: Bienaventurados los ancianos que fueron delante, los cuales tuvieron una partida oportuna y completa
  alternative_spanish_readings:
  - Dichosos los ancianos que precedieron
  - Bienaventurados los presbíteros que murieron en su tiempo
  rationale: '''Bienaventurados'' conserva el tono de proclamación del original. ''Ancianos'' evita imponer un título eclesiástico más técnico que el texto no exige; ''partida'' mantiene la tensión eufemística del griego sin explicitar ''muerte'' de forma no motivada por el texto.'
  doctrine_reference: 1 Clemente 44:5; uso de μακάριοι y la metáfora de la partida
- issue: Si traducir τόπος como lugar físico o posición/oficio
  english_pob_reading: the place given to them
  chosen_spanish_reading: el lugar que les fue dado
  alternative_spanish_readings:
  - el puesto que les fue dado
  - el sitio asignado a ellos
  rationale: '''Lugar'' conserva la ambigüedad entre posición y esfera de servicio. La revisión inglesa rechazó ''appointed'' porque el griego dice ''given''; en español, ''puesto'' sería posible pero inclinaría demasiado la lectura hacia cargo formal.'
  doctrine_reference: 1 Clemente 44:5; contraste con καθίστημι en 44:2-3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrige English 'appointed to them' por 'given to them', porque el griego usa δεδομένου (δίδωμι) y no καθίστημι. Por eso la versión española evita cualquier equivalente de 'nombrado' o 'designado' y conserva 'les fue dado'.
  spanish_consistency_notes:
  - Se usa 'ancianos' para πρεσβύτεροι, coherente con el sentido del pasaje y sin imponer terminología confesional posterior.
  - '''Bienaventurados'' reproduce el tono evaluativo del μακάριοι sin modernizarlo a ''felices'', que bajaría el registro.'
  - Se mantiene la distinción entre 'lugar' y 'puesto' en nota, porque el griego permite ambas resonancias pero la revisión enfatiza el valor de 'dado'.
