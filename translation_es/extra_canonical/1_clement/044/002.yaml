source:
  edition: Funk 1901 (normalized OCR)
  text: διὰ ταύτην οὖν τὴν αἰτίαν πρόγνωσιν εἰληφότες τελείαν κατέστησαν τοὺς προειρημένους καὶ μεταξὺ ἐπινομὴν δεδώκασιν, ὅπως, ἐὰν κοιμηθῶσιν, διαδέξωνται ἕτεροι δεδοκιμασμένοι ἄνδρες τὴν λειτουργίαν αὐτῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/044/002.yaml
  text: For this reason[a], then, having received complete foreknowledge, they appointed the men already mentioned, and afterward they gave a further provision, so that if they should fall asleep, other approved men might succeed to their ministry.
  footnotes:
  - marker: a
    text: Or 'Therefore, for this reason,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:49Z'
    unchanged: false
    changes_summary: Changed 'since they had received' to 'having received' to reflect the participial construction more directly and naturally. No other changes needed.
translation:
  language: es
  text: Por esta razón[a], pues, habiendo recibido plena presciencia, nombraron a los ya mencionados y, además, dieron una disposición adicional, para que, si murieran[b], otros hombres aprobados sucedieran en su ministerio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por tanto, por esta razón,»'
    reason: Preserva la alternativa del inglés para la combinación inferencial διὰ ταύτην τὴν αἰτίαν ... οὖν.
  - marker: b
    text: Lit. «se durmieran»; eufemismo por morir.
    reason: El griego κοιμηθῶσιν usa el lenguaje de «dormir» como eufemismo de la muerte; en español el sentido se aclara mejor en el texto con nota.
lexical_decisions:
- source_word: διὰ ταύτην τὴν αἰτίαν ... οὖν
  english_pob_choice: For this reason, then,
  chosen_spanish: Por esta razón, entonces,
  alternatives_spanish:
  - Por esta razón, por tanto,
  - Por ello, entonces,
  lexicon: διὰ + acusativo de causa; οὖν como partícula inferencial
  rationale: Mantiene la relación causal explícita de διὰ ταύτην τὴν αἰτίαν y reproduce el matiz conectivo de οὖν con una combinación natural en español sin duplicar innecesariamente la idea de causa.
- source_word: πρόγνωσιν εἰληφότες
  english_pob_choice: having received complete foreknowledge
  chosen_spanish: habiendo recibido pleno conocimiento previo
  alternatives_spanish:
  - habiendo recibido completa presciencia
  - habiendo obtenido conocimiento previo completo
  lexicon: πρόγνωσις; participio perfecto de λαμβάνω
  rationale: ‘Pleno conocimiento previo’ expresa la idea de presciencia recibida sin introducir una fórmula teológica más técnica que el griego no exige aquí. ‘Presciencia’ es posible, pero ‘conocimiento previo’ deja más visible el valor léxico de πρόγνωσις.
- source_word: τελείαν ... πρόγνωσιν
  english_pob_choice: complete foreknowledge
  chosen_spanish: pleno conocimiento previo
  alternatives_spanish:
  - conocimiento previo completo
  - presciencia completa
  lexicon: τελεῖος; πρόγνωσις
  rationale: ‘Pleno’ comunica totalidad y suficiencia en español natural. Evita rigidizar la frase como término técnico y conserva la fuerza del adjetivo sin apartarse del sentido.
- source_word: κατέστησαν τοὺς προειρημένους
  english_pob_choice: they appointed the men already mentioned
  chosen_spanish: establecieron a los varones ya mencionados
  alternatives_spanish:
  - nombraron a los varones ya mencionados
  - constituyeron a los varones ya mencionados
  lexicon: καθίστημι; προλέγω
  rationale: ‘Establecieron’ mantiene la idea de designación/constitución con dignidad literaria. ‘Varones’ reproduce el tono formal de ‘men’ y evita una simplificación que podría perder el matiz institucional.
- source_word: ἐπινομὴν δεδώκασιν
  english_pob_choice: they gave a further provision
  chosen_spanish: dieron una provisión adicional
  alternatives_spanish:
  - dieron una disposición adicional
  - establecieron una provisión adicional
  lexicon: ἐπινομή
  rationale: ‘Provisión adicional’ refleja la idea de una medida suplementaria o provisión ulterior. ‘Disposición’ podría funcionar, pero ‘provisión’ conserva mejor el carácter de arreglo preventivo.
- source_word: κοιμηθῶσιν
  english_pob_choice: should fall asleep
  chosen_spanish: llegaran a dormirse
  alternatives_spanish:
  - murieran
  - descansaran
  lexicon: κοιμάω
  rationale: En contexto eclesial, el griego puede aludir a la muerte de manera eufemística. Sin embargo, el español ‘dormirse’ conserva esa ambigüedad sin forzar una paráfrasis doctrinal; ‘llegaran a dormirse’ hace natural el potencial subjuntivo.
- source_word: δεδοκιμασμένοι ἄνδρες
  english_pob_choice: other approved men
  chosen_spanish: otros varones aprobados
  alternatives_spanish:
  - otros hombres probados
  - otros varones examinados y aprobados
  lexicon: δοκιμάζω; δεδοκιμασμένος
  rationale: ‘Aprobados’ traduce bien el estado resultante de haber sido probados/examinados. ‘Varones’ conserva el registro formal y se alinea con la primera mención de los designados.
- source_word: διαδέξωνται τὴν λειτουργίαν αὐτῶν
  english_pob_choice: might succeed to their ministry
  chosen_spanish: sucedieran en su ministerio
  alternatives_spanish:
  - tomaran su ministerio
  - heredaran su ministerio
  lexicon: διαδέχομαι; λειτουργία
  rationale: ‘Sucedieran’ reproduce la idea de reemplazo/continuidad en el cargo. ‘Ministerio’ es adecuado para λειτουργία en este contexto de servicio/función eclesial, y mantiene la terminología de la tradición POB sin ocultar el sentido funcional.
theological_decisions:
- issue: La función de la “presciencia” y la sucesión ordenada en el liderazgo eclesial
  english_pob_reading: having received complete foreknowledge ... they gave a further provision, so that ... other approved men might succeed to their ministry
  chosen_spanish_reading: habiendo recibido pleno conocimiento previo ... dieron una provisión adicional, para que ... otros varones aprobados sucedieran en su ministerio
  alternative_spanish_readings:
  - habiendo recibido completa presciencia ... establecieron una provisión ulterior, para que ... otros hombres probados heredaran su ministerio
  - habiendo recibido conocimiento previo pleno ... dejaron un arreglo adicional, para que ... otros aprobados ocuparan su ministerio
  rationale: El texto presenta una previsión ordenada para la continuidad del servicio. La traducción conserva el carácter preventivo y la sucesión institucional sin convertirlo en una afirmación doctrinal más amplia de la necesaria.
  doctrine_reference: orden eclesial y sucesión ministerial en 1 Clemente 44:2
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la tautología ‘Therefore, for this reason,’ y dejó la frase causal + inferencial como ‘For this reason, then,’. La traducción española refleja esa relación con ‘Por esta razón, entonces,’ sin duplicar la causalidad ni perder el enlace discursivo del griego. También sigue la revisión que mantuvo el participio como ‘having received’ mediante ‘habiendo recibido’.
  spanish_consistency_notes:
  - Se usa ‘varones’ de forma consistente para traducir el registro formal de ‘men’ en este pasaje.
  - ‘Ministerio’ se mantiene para λειτουργία por coherencia eclesial y por ser inteligible en español contemporáneo.
  - No se introduce nota al pie porque la versión final no requiere alternativa textual anclada.
