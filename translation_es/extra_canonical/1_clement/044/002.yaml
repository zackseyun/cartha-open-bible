    issue: «pleno conocimiento previo» para πρόγνωσιν εἰληφότες τελείαν
    rationale: Aunque comunica la idea básica, suena analítico y poco natural. Además, πρόγνωσις aquí se acerca más a «presciencia»/«conocimiento anticipado» que a una simple perífrasis débil. En español eclesial, «plena presciencia» es más conciso y fiel.
  - severity: medium
    issue: «establecieron a los varones ya mencionados» para κατέστησαν τοὺς προειρημένους
    rationale: «Establecer a personas» es menos idiomático en español actual que «nombrar» o «constituir». El griego apunta a designación/nombramiento de personas para un oficio.
  - severity: medium
    issue: «llegaran a dormirse» para ἐὰν κοιμηθῶσιν
    rationale: En español, «dormirse» aplicado a personas en este marco no funciona bien como eufemismo de muerte; parece sueño literal. Conviene usar «mueran» en el texto y, si se desea preservar el matiz, aclararlo en nota.
  - severity: low
    issue: «provisión adicional» para ἐπινομὴν δεδώκασιν
    rationale: Es defendible, pero algo opaco. «Disposición adicional» o «medida adicional» comunica mejor la idea de arreglo suplementario para la sucesión.
  - severity: low
    issue: «Por esta razón, entonces,»
    rationale: Es comprensible, pero en español suena algo rígido. «Por esta razón, pues,» refleja bien el οὖν pospositivo en un registro digno y más natural.
