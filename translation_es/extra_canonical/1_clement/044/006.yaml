- from: Porque vemos que ustedes han apartado a algunos que se conducían bien del ministerio que había sido honrado por ellos[a].
  to: Porque vemos que ustedes han apartado a algunos que se conducían bien del ministerio que había sido honrado por ellos de manera intachable[a].
  rationale: Se añadió explícitamente «de manera intachable» para representar ἀμέμπτως en el texto principal y mantener la decisión auditada de traducir τετιμημένης como «honrado», no «asignado». La nota se simplificó a una alternativa española natural que conserva el mismo sentido básico sin reintroducir la lectura descartada.
