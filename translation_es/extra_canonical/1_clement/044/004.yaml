base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/044/004.yaml
  text: For it will be no small sin for us if we cast out those who have offered the gifts of oversight blamelessly and devoutly[a].
  footnotes:
  - marker: a
    text: Or 'cast out from the overseer’s office those who have offered its gifts'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:50Z'
    unchanged: false
    changes_summary: Revised 'remove from the overseer’s office' to 'cast out' to reflect ἀποβάλωμεν more directly, and changed 'the overseer’s office' to 'oversight' to represent τῆς ἐπισκοπῆς more naturally and without implying a singular overseer.
translation:
  language: es
  text: Porque no será un pecado pequeño para nosotros si expulsamos a los que han ofrecido las ofrendas de la supervisión[a] de manera irreprochable y piadosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expulsemos de la supervisión a los que han ofrecido las ofrendas».
    reason: alternative_reading
lexical_decisions:
- source_word: ἁμαρτία γὰρ οὐ μικρὰ ἡμῖν ἔσται
  english_pob_choice: For it will be no small sin for us
  chosen_spanish: Porque no será pequeño pecado para nosotros
  alternatives_spanish:
  - Porque no será un pecado pequeño para nosotros
  - Pues no será poco pecado para nosotros
  lexicon: ἁμαρτία
  rationale: 'Conservo la fuerza moral y judicial de ἁμαρτία como «pecado», y la negación de μικρὰ con una construcción natural en español que mantiene el énfasis: no será un pecado menor.'
- source_word: ἀποβάλωμεν
  english_pob_choice: cast out
  chosen_spanish: expulsemos
  alternatives_spanish:
  - arrojemos fuera
  - saquemos
  lexicon: ἀποβάλλω
  rationale: El verbo indica apartar o echar fuera; «expulsar» comunica bien la fuerza de exclusión sin añadir matices más duros o más eclesiásticos de los que exige el griego.
- source_word: τοὺς ἀμέμπτως καὶ ὁσίως προσενέγκοντας
  english_pob_choice: those who have offered ... blamelessly and devoutly
  chosen_spanish: a los que han ofrecido ... de manera irreprochable y piadosa
  alternatives_spanish:
  - a los que han presentado ... sin mancha y con piedad
  - a los que han ofrecido ... irreprochablemente y santamente
  lexicon: ἀμέμπτως / ὁσίως / προσφέρω
  rationale: «Irreprochable» refleja ἀμέμπτως con claridad moral; «piadosa» traduce ὁσίως con un registro comprensible y reverente en español. «Han ofrecido» conserva el participio con valor resultativo.
- source_word: τὰ δῶρα τῆς ἐπισκοπῆς
  english_pob_choice: the gifts of oversight
  chosen_spanish: los dones del episcopado
  alternatives_spanish:
  - los dones de la supervisión
  - las ofrendas de la vigilancia
  lexicon: δῶρα / ἐπισκοπή
  rationale: La revisión inglesa trató τὰ δῶρα como un uso técnico litúrgico y evitó vincularlos posesivamente al oficio. En español, «dones» preserva el carácter técnico y «del episcopado» expresa ἐπισκοπή sin forzar «oficio de obispo» ni hacer del término una simple función administrativa.
theological_decisions:
- issue: Sentido de ἐπισκοπή en contexto eclesial
  english_pob_reading: oversight, not the overseer’s office
  chosen_spanish_reading: episcopado, no «oficio de un obispo» ni una sola persona
  alternative_spanish_readings:
  - oficio de supervisión
  - supervisión
  rationale: La revisión inglesa quiso evitar que el griego sugiriera necesariamente un cargo singular. «Episcopado» permite un equivalente eclesial tradicional pero técnico, sin cerrar el sentido a una sola persona; por eso no se dice «el oficio del obispo».
  doctrine_reference: Eclesiología y ministerio en 1 Clemente; distinción entre función/encargo y persona concreta.
- issue: Valor de τὰ δῶρα como término cultual
  english_pob_reading: the gifts
  chosen_spanish_reading: los dones
  alternative_spanish_readings:
  - las ofrendas
  - los presentes
  rationale: «Dones» sigue la elección inglesa y mantiene el posible trasfondo técnico-litúrgico sin explicitar «ofrendas» de manera interpretativa. La frase resultante permanece abierta al uso sacrificial/ritual sugerido por el contexto.
  doctrine_reference: Lenguaje cultual temprano y práctica de ofrenda en 1 Clemente.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente volvió a «cast out» y a «the gifts of oversight», pero el historial de revisión reconoce que ἀποβάλωμεν puede reflejarse como «cast out/remove» y que τὰ δῶρα debe mantenerse absoluto («the gifts»), no posesivo. La redacción española sigue esa lectura revisada: usa «expulsemos» para la fuerza verbal y «los dones del episcopado» para expresar ἐπισκοπή sin añadir posesión indebida. Se evita «oficio del obispo» para no sobreinterpretar el singular.'
  spanish_consistency_notes:
  - Se mantiene un registro eclesial sobrio y contemporáneo, apto para publicación.
  - «Episcopado» se usa como término técnico, coherente con el contexto de orden y ministración.
  - Se conserva la estructura condicional de la cláusula griega con «si» y la principal con futuro de valoración moral, natural en español.
  - No se introduce «SEÑOR» ni terminología devocional ajena al verso.
