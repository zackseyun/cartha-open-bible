  text: ἁμαρτία γὰρ οὐ μικρὰ ἡμῖν ἔσται, ἐὰν τοὺς ἀμέμπτως καὶ ὁσίως προσενέγκοντας τὰ δῶρα τῆς ἐπισκοπῆς ἀποβάλωμεν.
