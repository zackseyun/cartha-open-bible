review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: ἁμαρτία ... οὐ μικρὰ como ''no será pequeño pecado'', ἀποβάλωμεν con fuerza de exclusión, y el participio προσενέγκοντας con ''han ofrecido''. También conserva la nota alternativa sobre si ἀποβάλωμεν modifica a las personas o su ejercicio de la ἐπισκοπή. Sin embargo, ''del episcopado'' suena en español a estado/orden episcopal posterior y puede desalinear ἐπισκοπή, que aquí según el rastro inglés se quiso mantener como ''oversight'' más que ''episcopado''. Además, para δῶρα en contexto cultual español ''ofrendas'' comunica mejor que ''dones'' el acto de presentar regalos sacrificiales.'
  spanish_quality_summary: El español es claro y digno, pero 'los dones del episcopado' resulta poco natural y potencialmente equívoco para lectores hispanos, sugiriendo carismas u orden episcopal. 'Han ofrecido las ofrendas de la supervisión' suena algo técnico pero es más comprensible y más cercano al contexto litúrgico. También conviene ajustar la nota alternativa para mantener esa misma terminología.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. La cuestión principal es ἐπισκοπή: mejor ''supervisión'' aquí que ''episcopado'' para evitar una lectura anacrónica de oficio episcopal singular o de orden episcopal. Para δῶρα, se prefiere ''ofrendas'' sobre ''dones'' por el valor cultual de προσενέγκοντας τὰ δῶρα.'
  issues:
  - severity: medium
    issue: '''episcopado'' para ἐπισκοπῆς'
    rationale: Aunque teológicamente posible, en español contemporáneo eclesial suele remitir al episcopado como orden/colegio de obispos o al cargo de obispo, mientras que el rastro POB quiso evitar precisamente ese estrechamiento y reflejar 'oversight'.
  - severity: medium
    issue: '''dones'' para τὰ δῶρα'
    rationale: En español bíblico-eclesial 'dones' suele asociarse a regalos espirituales o capacidades. Aquí, con προσενέγκοντας, el sentido cultual de cosas ofrecidas queda mejor con 'ofrendas'.
  - severity: low
    issue: Coherencia terminológica en la nota alternativa
    rationale: Si se revisa el texto principal, la nota debe reflejar la misma elección léxica para no introducir una segunda ambigüedad innecesaria.
  revised_spanish_text: Porque no será un pecado pequeño para nosotros si expulsamos a los que han ofrecido las ofrendas de la supervisión[a] de manera irreprochable y piadosa.
  revised_footnotes:
  - marker: a
    text: O «expulsemos de la supervisión a los que han ofrecido las ofrendas».
    reason: alternative_reading
  revision_rationale: Se ajusta ἐπισκοπή a 'supervisión' para reflejar mejor el sentido de 'oversight' documentado por el POB y evitar el anacronismo potencial de 'episcopado'. Se cambia δῶρα a 'ofrendas' porque en español comunica mejor el valor cultual de los dones presentados. Se conserva 'expulsamos' para la fuerza de ἀποβάλωμεν y la nota alternativa documentada por el inglés.
