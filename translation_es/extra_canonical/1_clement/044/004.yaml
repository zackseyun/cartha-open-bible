revisions:
- from: Porque no será pequeño pecado para nosotros si expulsamos a los que han ofrecido los dones del episcopado[a] de manera irreprochable y piadosa.
  to: Porque no será un pecado pequeño para nosotros si expulsamos a los que han ofrecido las ofrendas de la supervisión[a] de manera irreprochable y piadosa.
  rationale: Se ajusta ἐπισκοπή a 'supervisión' para reflejar mejor el sentido de 'oversight' documentado por el POB y evitar el anacronismo potencial de 'episcopado'. Se cambia δῶρα a 'ofrendas' porque en español comunica mejor el valor cultual de los dones presentados. Se conserva 'expulsamos' para la fuerza de ἀποβάλωμεν y la nota alternativa documentada por el inglés.
