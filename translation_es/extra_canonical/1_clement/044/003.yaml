id: 1CLEM.44.3
reference: 1 Clement 44:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: τοὺς οὖν κατασταθέντας ὑπ᾽ ἐκείνων ἢ μεταξὺ ὑφ᾽ ἑτέρων ἐλλογίμων ἀνδρῶν συνευδοκησάσης τῆς ἐκκλησίας πάσης, καὶ λειτουργήσαντας ἀμέμπτως τῷ ποιμνίῳ τοῦ Χριστοῦ μετὰ ταπεινοφροσύνης, ἡσύχως καὶ ἀβαναύσως, μεμαρτυρημένους τε πολλοῖς χρόνοις ὑπὸ πάντων, τούτους οὐ δικαίως νομίζομεν ἀποβάλλεσθαι τῆς λειτουργίας.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/044/003.yaml
  text: Therefore[a], those who were appointed by them, or afterward by other reputable men with the whole church consenting, and who have served the flock of the Messiah blamelessly, with humility, quietly, and unpretentiously, and who for a long time have been well attested by all—these we consider not to be justly removed from the ministry.
  footnotes:
  - marker: a
    text: Or 'Therefore we consider it unjust that those who were appointed by them, or afterward by other reputable men with the whole church consenting, and who have served the flock of the Messiah blamelessly, with humility, quietly, and without arrogance, and who for a long time have been well attested by all—such men should be removed from the ministry.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:50Z'
    unchanged: false
    changes_summary: 'Changed ''without arrogance'' to ''unpretentiously'' for a more natural rendering of ἀβαναύσως, and adjusted the final clause to more closely reflect the Greek word order: ''we consider not to be justly removed.'''
translation:
  language: es
  text: Por tanto, a los que fueron establecidos por ellos, o después por otros varones reputados con el consentimiento de toda la iglesia, y que han servido al rebaño del Mesías sin reproche, con humildad, apaciblemente y sin pretensión, y que durante mucho tiempo han recibido buen testimonio de todos, a estos consideramos que no es justo removerlos del ministerio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατασταθέντας
  english_pob_choice: were appointed
  chosen_spanish: fueron establecidos
  alternatives_spanish:
  - fueron नियुक्तados
  - fueron nombrados
  - fueron designados
  lexicon: καθίστημι
  rationale: ‘Establecidos’ conserva la idea de ser puestos en función u oficio sin cargar tanto un matiz administrativo moderno como ‘nombrados’. En este contexto eclesial refleja bien el acto de instituir ministros.
- source_word: ἐλλογίμων ἀνδρῶν
  english_pob_choice: reputable men
  chosen_spanish: varones reputados
  alternatives_spanish:
  - hombres reputados
  - varones de buena reputación
  - varones distinguidos
  lexicon: ἔλλογιμος
  rationale: ‘Reputados’ comunica la estima pública y la honorabilidad indicada por el griego. ‘Varones’ mantiene el paralelismo del registro eclesial antiguo sin perder inteligibilidad.
- source_word: ποιμνίῳ τοῦ Χριστοῦ
  english_pob_choice: the flock of the Messiah
  chosen_spanish: el rebaño del Mesías
  alternatives_spanish:
  - el rebaño de Cristo
  - el rebaño de Jesús el Mesías
  - el rebaño mesiánico
  lexicon: ποιμνίον; Χριστός
  rationale: Se conserva ‘Mesías’ según la preferencia POB para Χριστός como título, y ‘rebaño’ para mantener la imagen pastoral explícita del original.
- source_word: ἀμέμπτως
  english_pob_choice: blamelessly
  chosen_spanish: sin reproche
  alternatives_spanish:
  - irreprochablemente
  - sin culpa
  - sin mancha
  lexicon: ἀμέμπτως
  rationale: ‘Sin reproche’ es natural en español eclesial y preserva la idea de conducta no censurable, sin introducir una connotación moral más fuerte de la que exige el texto.
- source_word: ταπεινοφροσύνης
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - humildad de mente
  - modestia
  - mansedumbre
  lexicon: ταπεινοφροσύνη
  rationale: ‘Humildad’ es la equivalencia directa y clara. La expresión ‘humildad de mente’ sería más explicativa que el contexto no requiere.
- source_word: ἡσύχως
  english_pob_choice: quietly
  chosen_spanish: en silencio
  alternatives_spanish:
  - tranquilamente
  - apaciblemente
  - en quietud
  lexicon: ἡσύχως
  rationale: Aquí el adverbio puede abarcar una conducta serena y no conflictiva. ‘En silencio’ mantiene la sobriedad del estilo, aunque la alternativa ‘tranquilamente’ también sería posible.
- source_word: ἀβαναύσως
  english_pob_choice: unpretentiously
  chosen_spanish: sin pretensión
  alternatives_spanish:
  - sin arrogancia
  - sin ostentación
  - sin vanagloria
  lexicon: ἀβαναύσως
  rationale: ‘Sin pretensión’ refleja mejor la falta de ostentación o fanfarronería indicada por el término, evitando reducirlo sólo a orgullo moral.
- source_word: μεμαρτυρημένους τε πολλοῖς χρόνοις ὑπὸ πάντων
  english_pob_choice: well attested by all for a long time
  chosen_spanish: han sido bien testimoniados por todos, por mucho tiempo
  alternatives_spanish:
  - han tenido buen testimonio de todos desde hace mucho
  - han sido acreditados por todos durante mucho tiempo
  - han sido testificados por todos por largo tiempo
  lexicon: μαρτυρέω
  rationale: ‘Bien testimoniados’ conserva el pasivo del griego y la idea de un testimonio público sostenido. Se añadió el orden natural ‘por mucho tiempo’ para fluidez española, sin alterar el sentido temporal.
- source_word: λειτουργίας
  english_pob_choice: the ministry
  chosen_spanish: el ministerio
  alternatives_spanish:
  - el servicio litúrgico
  - el servicio
  - el ministerio sagrado
  lexicon: λειτουργία
  rationale: ‘Ministerio’ es el equivalente más natural en este contexto de oficio eclesial. ‘Servicio litúrgico’ sería demasiado estrecho y ‘ministerio sagrado’ añadiría un matiz no explícito.
theological_decisions:
- issue: Traducción de Χριστός como título mesiánico
  english_pob_reading: the flock of the Messiah
  chosen_spanish_reading: el rebaño del Mesías
  alternative_spanish_readings:
  - el rebaño de Cristo
  - el rebaño del Ungido
  rationale: La POB en inglés eligió ‘Messiah’ para conservar el valor titular de Χριστός. En español, ‘Mesías’ hace visible esa misma decisión y evita la cristalización confesional de ‘Cristo’ como nombre propio.
  doctrine_reference: Cristología / uso titular de Χριστός
- issue: Valor de ἡσύχως y ἀβαναύσως
  english_pob_reading: quietly, and unpretentiously
  chosen_spanish_reading: en silencio y sin pretensión
  alternative_spanish_readings:
  - tranquilamente y sin ostentación
  - apaciblemente y sin arrogancia
  rationale: La secuencia griega subraya conducta no estridente y no ostentosa. ‘En silencio’ y ‘sin pretensión’ reproduce esa doble cualidad sin sobrecargarla con un juicio psicológico no necesario.
  doctrine_reference: Ética ministerial / humildad en el servicio
- issue: Finalidad del pasivo en la cláusula final
  english_pob_reading: we consider not to be justly removed from the ministry
  chosen_spanish_reading: consideramos no ser justamente removidos del ministerio
  alternative_spanish_readings:
  - consideramos injusto que sean removidos del ministerio
  - consideramos que no deben ser removidos justamente del ministerio
  rationale: Se preserva el giro objetivo del griego, donde el juicio recae sobre la justicia de la remoción. La construcción española busca mantener la tensión sin transformar la frase en una paráfrasis más interpretativa.
  doctrine_reference: Orden eclesial / continuidad del ministerio
- issue: ‘Por tanto’ frente a la fuerza inferencial del conector
  english_pob_reading: Therefore
  chosen_spanish_reading: Por tanto
  alternative_spanish_readings:
  - Así pues
  - Por consiguiente
  rationale: ‘Por tanto’ es una inferencia clara y solemne en español. Conserva el enlace lógico con la argumentación previa sin añadir énfasis retórico extra.
  doctrine_reference: Coherencia discursiva del argumento
- issue: Ministros y legitimidad de su remoción
  english_pob_reading: these we consider not to be justly removed from the ministry
  chosen_spanish_reading: a estos consideramos no ser justamente removidos del ministerio
  alternative_spanish_readings:
  - a estos consideramos que no deben ser removidos del ministerio
  - consideramos que no es justo remover a estos del ministerio
  rationale: La formulación mantiene el foco en la evaluación de justicia de la remoción, respetando el tono deliberativo del texto y evitando introducir una condena absoluta no formulada explícitamente.
  doctrine_reference: Disciplina eclesiástica / justicia en la remoción de ministros
translation_notes:
  revision_awareness: 'La versión griega presenta un encadenamiento participial largo con objeto frontalizado y un demostrativo resumptivo al final (τούτους). La revisión inglesa reciente corrigió la gramática para reflejar mejor esa estructura. La traducción española sigue ese orden retórico general, concentrando primero las cualificaciones de los hombres y cerrando con el juicio: que no se considera justa su remoción del ministerio.'
  spanish_consistency_notes:
  - Se mantiene ‘Mesías’ para Χριστός, coherente con la terminología POB cuando el título es el sentido primario.
  - Se evita ‘siervo’ para δοῦλος porque este versículo no contiene ese término; ‘ministerio’ corresponde a λειτουργία en el marco eclesial.
  - ‘Sin pretensión’ se usa de forma consistente para ἀβαναύσως, evitando tanto ‘sin arrogancia’ como ‘sin ostentación’ por ser más específicos de lo que el contexto inmediato exige.
  - La cláusula final conserva un tono deliberativo y judicial, no meramente emotivo, acorde con el argumento del capítulo.
