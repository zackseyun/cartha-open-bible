review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia principal del griego: imparcialidad, andar en las ordenanzas de Dios, sumisión a los dirigentes, honra a los ancianos, dirección de los jóvenes, instrucción a las mujeres y enseñanza sobre la gestión del hogar. Sin embargo, varias elecciones léxicas se alejan innecesariamente del matiz de la fuente o del audit trail inglés: τοῖς νομίμοις τοῦ θεοῦ se refleja mejor como «ordenanzas» o «disposiciones» que como «mandamientos»; μέτρα καὶ σεμνὰ νοεῖν no suena natural en español como «pensar pensamientos»; y τὰ κατὰ τὸν οἶκον... no son solo «tareas» sino los asuntos del hogar. También conviene ajustar «estaban instruyendo» a un imperfecto más natural en español narrativo.'
  spanish_quality_summary: 'El texto es comprensible y mayormente digno, pero tiene varias expresiones poco idiomáticas: «pensar pensamientos», «estando bajo el orden de la sumisión» y «las tareas de la casa» suenan forzadas o estrechan el sentido. Una revisión menor puede mejorar mucho la naturalidad sin perder cercanía al griego.'
  glossary_alignment: 'No hay conflictos con términos doctrinales mayores del glosario del proyecto. Las decisiones problemáticas son de precisión léxica y estilo: «mandamientos» por νόμιμοι estrecha demasiado el sentido frente a la línea inglesa «ordinances»; «dirigentes» y «ancianos» son aceptables; «dominio propio» para σωφρονούσας es bueno.'
  issues:
  - severity: medium
    issue: «los mandamientos de Dios» estrecha τοῖς νομίμοις τοῦ θεοῦ
    rationale: La evidencia griega y la traducción inglesa auditada apuntan a «ordinances», no específicamente a mandamientos. «Ordenanzas de Dios» preserva mejor el matiz normativo establecido.
  - severity: medium
    issue: «pensar pensamientos moderados y dignos» es poco natural en español
    rationale: Aunque intenta seguir el griego de cerca, en español resulta torpe. «Tener pensamientos moderados y dignos» o «pensar con moderación y dignidad» comunica fielmente el sentido.
  - severity: medium
    issue: «las tareas de la casa» reduce el alcance de τὰ κατὰ τὸν οἶκον
    rationale: La frase griega se refiere a los asuntos del hogar/lo concerniente a la casa, no solo a tareas domésticas puntuales. «Los asuntos del hogar» refleja mejor el alcance.
  - severity: low
    issue: «estaban instruyendo» y «les enseñaban» mezclan aspecto de forma algo pesada
    rationale: El griego usa imperfectos sucesivos. En español es más fluido mantener «instruían» y «enseñaban».
  - severity: low
    issue: La nota [b] no corresponde al tipo de alternativa preservada en el audit trail inglés
    rationale: La nota inglesa conservaba una alternativa sobre la construcción «being under the rule of submission», no sobre «affairs of the household». En español conviene trasladar esa alternativa, especialmente porque la construcción puede generar ambigüedad.
  revised_spanish_text: Porque ustedes hacían todo sin parcialidad[a] y andaban en las ordenanzas de Dios, sometiéndose a sus dirigentes y dando el honor que corresponde a los ancianos entre ustedes. Ustedes dirigían a los hombres jóvenes a tener pensamientos moderados y dignos. Y ustedes instruían a las mujeres para que realizaran todo con una conciencia irreprochable, digna y pura, amando a sus propios maridos como corresponde; y les enseñaban, estando bajo la regla de la sumisión[b], a administrar con dignidad los asuntos del hogar, con pleno dominio propio.
  revised_footnotes:
  - marker: a
    text: O «sin acepción de personas».
    reason: alternative_reading
  - marker: b
    text: O «y, estando dentro de la regla de la sumisión, administrar».
    reason: previous_rendering
  revision_rationale: 'Se hicieron ajustes menores pero importantes para alinear mejor el español con el griego y con el audit trail inglés: «ordenanzas» por «mandamientos» para reflejar νόμιμοι; una formulación idiomática para μέτρα καὶ σεμνὰ νοεῖν; «asuntos del hogar» para el alcance doméstico más amplio; y una nota que preserva la alternativa documentada sobre la construcción de «regla de la sumisión».'
