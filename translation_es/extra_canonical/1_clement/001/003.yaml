revisions:
- from: Porque ustedes hacían todo sin parcialidad[a] y andaban en los mandamientos de Dios, sometiéndose a sus dirigentes y dando el honor que corresponde a los ancianos entre ustedes. Ustedes dirigían a los hombres jóvenes a pensar pensamientos moderados y dignos. Y estaban instruyendo a las mujeres para que realizaran todo con una conciencia irreprochable, digna y pura, amando a sus propios maridos como corresponde; y les enseñaban, estando bajo el orden de la sumisión, a administrar con dignidad las tareas de la casa[b], con pleno dominio propio.
  to: Porque ustedes hacían todo sin parcialidad[a] y andaban en las ordenanzas de Dios, sometiéndose a sus dirigentes y dando el honor que corresponde a los ancianos entre ustedes. Ustedes dirigían a los hombres jóvenes a tener pensamientos moderados y dignos. Y ustedes instruían a las mujeres para que realizaran todo con una conciencia irreprochable, digna y pura, amando a sus propios maridos como corresponde; y les enseñaban, estando bajo la regla de la sumisión[b], a administrar con dignidad los asuntos del hogar, con pleno dominio propio.
  rationale: 'Se hicieron ajustes menores pero importantes para alinear mejor el español con el griego y con el audit trail inglés: «ordenanzas» por «mandamientos» para reflejar νόμιμοι; una formulación idiomática para μέτρα καὶ σεμνὰ νοεῖν; «asuntos del hogar» para el alcance doméstico más amplio; y una nota que preserva la alternativa documentada sobre la construcción de «regla de la sumisión».'
