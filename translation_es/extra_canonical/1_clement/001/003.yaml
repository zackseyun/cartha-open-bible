source:
  edition: Funk 1901 (normalized OCR)
  text: ἀπροσωπολήμπτως γὰρ πάντα ἐποιεῖτε καὶ ἐν τοῖς νομίμοις τοῦ θεοῦ ἐπορεύεσθε, ὑποτασσόμενοι τοῖς ἡγουμένοις ὑμῶν καὶ τιμὴν τὴν καϑήκουσαν ἀπονέμοντες τοῖς παρ’ ὑμῖν πρεσβυτέροις· νέοις τε μέτρα καὶ σεμνὰ νοεῖν ἐπετρέπετε· γυναξὶν τε ἐν ἀμώμῳ καὶ σεμνῇ καὶ ἁγνῇ συνειδήσει πάντα ἐπιτελεῖν παρηγγέλλετε, στεργούσας καϑηκόντως τοὺς ἄνδρας ἑαυτῶν· ἐν τε τῷ κανόνι τῆς ὑποταγῆς ὑπάρχουσας τὰ κατὰ τὸν οἶκον σεμνῶς οἰκουρεῖν ἐδιδάσκετε, πάνυ σωφρονούσας.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/001/003.yaml
  text: For you did everything without partiality[a], and you walked in the ordinances of God, submitting yourselves to your leaders and giving the honor that is fitting to the elders among you. You were directing the younger men to think moderate and dignified thoughts. And you were instructing the women to carry out all things with a blameless and dignified and pure conscience, loving their own husbands as is fitting; and you taught them, being under the rule of submission, to manage the affairs of the household with dignity[b], showing complete self-control.
  footnotes:
  - marker: a
    text: Or 'and, being within the rule of submission, to manage'.
    reason: previous_rendering
  - marker: b
    text: Or 'to think thoughts marked by moderation and dignity'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:24Z'
    unchanged: false
    changes_summary: Removed 'lawful' before 'ordinances' as redundant with the Greek and changed 'within the rule of submission' to 'under the rule of submission' for more natural English and a clearer sense of subordination.
translation:
  language: es
  text: Porque ustedes hacían todo sin parcialidad[a] y andaban en las ordenanzas de Dios, sometiéndose a sus dirigentes y dando el honor que corresponde a los ancianos entre ustedes. Ustedes dirigían a los hombres jóvenes a tener pensamientos moderados y dignos. Y ustedes instruían a las mujeres para que realizaran todo con una conciencia irreprochable, digna y pura, amando a sus propios maridos como corresponde; y les enseñaban, estando bajo la regla de la sumisión[b], a administrar con dignidad los asuntos del hogar, con pleno dominio propio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin acepción de personas».
    reason: alternative_reading
  - marker: b
    text: O «y, estando dentro de la regla de la sumisión, administrar».
    reason: previous_rendering
lexical_decisions:
- source_word: ἀπροσωπολήμπτως
  english_pob_choice: without partiality
  chosen_spanish: sin parcialidad
  alternatives_spanish:
  - sin acepción de personas
  - sin favoritismos
  lexicon: ἀπροσωπολήμπτως
  rationale: Mantiene la idea de no hacer distinción por estatus o persona, como en la opción inglesa. "Sin parcialidad" es natural en español e ինտelligible en contexto eclesial.
- source_word: τοῖς νομίμοις τοῦ θεοῦ
  english_pob_choice: the ordinances of God
  chosen_spanish: los mandamientos de Dios
  alternatives_spanish:
  - las ordenanzas de Dios
  - las disposiciones de Dios
  lexicon: νόμιμος
  rationale: El griego apunta a lo que es debido o establecido por Dios. "Mandamientos" comunica bien el deber obediente, aunque "ordenanzas" sería una alternativa más literal; se prefiere la claridad idiomática sin perder el marco normativo.
- source_word: τοῖς ἡγουμένοις ὑμῶν
  english_pob_choice: your leaders
  chosen_spanish: sus dirigentes
  alternatives_spanish:
  - sus líderes
  - sus gobernantes
  lexicon: ἡγούμενοι
  rationale: '"Dirigentes" conserva el sentido de quienes encabezan o presiden, sin introducir un término eclesiástico más cargado que el griego no exige.'
- source_word: τοῖς παρ’ ὑμῖν πρεσβυτέροις
  english_pob_choice: the elders among you
  chosen_spanish: los ancianos entre ustedes
  alternatives_spanish:
  - los presbíteros entre ustedes
  - los ancianos de entre ustedes
  lexicon: πρεσβύτεροι
  rationale: '"Ancianos" traduce el término con su valor básico de edad y oficio comunitario; "presbíteros" sería posible, pero más técnico y menos transparente para una lectura amplia.'
- source_word: μέτρα καὶ σεμνὰ νοεῖν
  english_pob_choice: to think moderate and dignified thoughts
  chosen_spanish: pensar pensamientos moderados y dignos
  alternatives_spanish:
  - tener pensamientos moderados y dignos
  - pensar con moderación y dignidad
  lexicon: νοεῖν
  rationale: Sigue de cerca la estructura del griego y la decisión inglesa revisada. Aunque la repetición "pensar pensamientos" suena marcada, conserva la fuerza verbal y el paralelo del original; "tener pensamientos" suavizaría la forma, pero perdería algo de la construcción.
- source_word: γυναξὶν ... συνειδήσει
  english_pob_choice: the women ... with a blameless and dignified and pure conscience
  chosen_spanish: a las mujeres ... con una conciencia irreprochable, digna y pura
  alternatives_spanish:
  - a las mujeres ... con una conciencia sin mancha, digna y pura
  - a las mujeres ... con una conciencia blameless, digna y pura
  lexicon: συνείδησις
  rationale: '"Conciencia" es el equivalente directo; los adjetivos reproducen la tríada moral del griego y la secuencia inglesa, manteniendo el juicio ético interior.'
- source_word: στεργούσας καϑηκόντως τοὺς ἄνδρας ἑαυτῶν
  english_pob_choice: loving their own husbands as is fitting
  chosen_spanish: amando a sus propios maridos como corresponde
  alternatives_spanish:
  - amando a sus propios maridos como es debido
  - queriendo a sus propios maridos como corresponde
  lexicon: στεργούσας
  rationale: '"Amando" conserva el valor afectivo de στεργέω, y "como corresponde" refleja κατὰ/καθήκοντως con una fórmula natural en español. "Maridos" sigue el sentido relacional del pasaje.'
- source_word: ἐν τῷ κανόνι τῆς ὑποταγῆς
  english_pob_choice: being under the rule of submission
  chosen_spanish: estando bajo el orden de la sumisión
  alternatives_spanish:
  - estando bajo la regla de la sumisión
  - estando bajo el régimen de la sumisión
  lexicon: κανών / ὑποταγή
  rationale: La revisión inglesa pasó de "within the rule" a "under the rule"; en español "bajo el orden de la sumisión" conserva subordinación sin sonar mecánico. "Orden" transmite la idea de norma o marco regulador del griego.
- source_word: τὰ κατὰ τὸν οἶκον σεμνῶς οἰκουρεῖν
  english_pob_choice: to manage the affairs of the household with dignity
  chosen_spanish: a administrar con dignidad las tareas de la casa
  alternatives_spanish:
  - a cuidar con dignidad los asuntos del hogar
  - a gobernar con dignidad la casa
  lexicon: οἰκουρεῖν
  rationale: '"Administrar las tareas de la casa" expresa la gestión doméstica sin cargar el término con una connotación moderna de autoridad excesiva. "Casa" conserva la referencia doméstica concreta del griego.'
- source_word: πάνυ σωφρονούσας
  english_pob_choice: showing complete self-control
  chosen_spanish: con pleno dominio propio
  alternatives_spanish:
  - mostrando completo dominio propio
  - con total sobriedad
  lexicon: σωφρονέω
  rationale: '"Dominio propio" es el equivalente bíblico y moral más natural para σωφροσύνη/sωφρονέω; "pleno" refleja πάνυ. Se evita "sobriedad" por ser más restringido en español.'
theological_decisions:
- issue: Autoridad y orden comunitario
  english_pob_reading: submitting yourselves to your leaders ... giving the honor that is fitting to the elders
  chosen_spanish_reading: sometiéndose a sus dirigentes y dando el honor que corresponde a los ancianos entre ustedes
  alternative_spanish_readings:
  - sometiéndose a sus líderes y dando el honor debido a los ancianos entre ustedes
  - sujetándose a sus gobernantes y dando el honor que corresponde a los ancianos
  rationale: El texto presenta una estructura comunitaria de sujeción y honra, no solo cortesía. "Dirigentes" y "ancianos" preservan la dimensión eclesial sin imponer una jerga posterior donde el griego habla de funciones comunitarias reconocibles.
  doctrine_reference: Orden eclesial y respeto a la autoridad comunitaria
- issue: Norma doméstica y sumisión
  english_pob_reading: being under the rule of submission, to manage the affairs of the household with dignity
  chosen_spanish_reading: estando bajo el orden de la sumisión, a administrar con dignidad las tareas de la casa
  alternative_spanish_readings:
  - bajo la regla de la sumisión, a administrar con dignidad la casa
  - en el marco de la sumisión, a administrar con dignidad los asuntos del hogar
  rationale: Se conserva la tensión entre una estructura de sujeción y la dignidad de la administración doméstica. La formulación no atenúa la subordinación, pero tampoco la vuelve más dura de lo que el griego/inglés exige.
  doctrine_reference: Ética doméstica y roles dentro del hogar
translation_notes:
  revision_awareness: 'La revisión inglesa corrigió la dependencia sintáctica final para hacer explícito «you taught them» antes de la cláusula de la sumisión, y simplificó la frase sobre los pensamientos de los jóvenes. La versión española refleja esa secuencia con dos verbos coordinados: «estaban instruyendo» y «les enseñaban», para no perder el paralelismo de los imperfectos del griego.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se usa «ancianos» en sentido comunitario, no simplemente etario, porque así funciona el contexto.
  - Se conserva la tríada adjetival «irreprochable, digna y pura» para no diluir la acumulación ética del griego.
  - «Dominio propio» se usa como equivalente estable de σωφροσύνη/σωφρονέω en el corpus del proyecto.
