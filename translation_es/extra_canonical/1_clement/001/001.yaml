base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/001/001.yaml
  text: 'Because of the sudden and repeated misfortunes and crises that have happened to us, brothers, we consider that we have been somewhat slow in turning our attention to the matters being raised among you, beloved—namely, the alien and strange uprising, defiled and unholy, foreign to the chosen of God, which a few rash and self-willed persons have kindled to such a pitch of madness that your dignified and widely spoken-of name, worthy of love among all people, has been greatly blasphemed.


    For who, after staying among you, did not approve your all-virtuous and steadfast faith? Who did not admire your sober and gentle godliness in Messiah? Who did not proclaim the magnificent character of your hospitality? And who did not count blessed your complete and sure knowledge?


    For you did everything without partiality, and you walked in the lawful ordinances of God, submitting yourselves to your leaders and giving the honor that is fitting to the elders among you. You were directing the younger men to think in ways marked by moderation and dignity. And you were instructing the women to carry out all things with a blameless and dignified and pure conscience, loving their own husbands as is fitting; and, being within the rule of submission, to manage the affairs of the household with dignity, showing complete self-control.'
