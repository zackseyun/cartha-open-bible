translation:
  language: es
  text: 'A causa de las repentinas y repetidas desgracias y crisis que nos han sobrevenido, hermanos, consideramos que hemos tardado algo en volver nuestra atención[a] a los asuntos planteados entre ustedes, amados, es decir, a la sublevación ajena y extraña, contaminada e impía, ajena a los escogidos de Dios, la cual unos pocos hombres precipitados y obstinados han encendido hasta tal punto de locura que su nombre digno, de renombre y digno de amor entre todos los hombres, ha sido grandemente blasfemado.


    Porque, después de haber estado entre ustedes, ¿quién no aprobó su fe enteramente virtuosa y firme? ¿Quién no admiró su piedad sobria y apacible en Mesías? ¿Quién no proclamó el carácter magnífico de su hospitalidad? ¿Y quién no consideró feliz su conocimiento completo y seguro?


    Porque ustedes lo hacían todo sin parcialidad, y caminaban en los preceptos legítimos de Dios, sometiéndose a sus dirigentes y rindiendo el honor debido a los ancianos que están entre ustedes. A los jóvenes les enseñaban a pensar con moderación y dignidad. Y a las mujeres les instruían a llevar a cabo todas las cosas con conciencia irreprochable, digna y pura, amando a sus propios maridos como conviene; y, estando bajo la norma de la sumisión, a administrar con dignidad los asuntos del hogar, mostrando completa templanza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Volver nuestra atención» refleja el idiomatismo de ἐπιστροφὴν πεποιῆσθαι; no implica cambio de tema arbitrario, sino reanudar el cuidado del asunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: βράδιον νομίζομεν ἐπιστροφὴν πεποιῆσθαι
  english_pob_choice: we consider that we have been somewhat slow in turning our attention
  chosen_spanish: consideramos que hemos tardado algo en volver nuestra atención
  alternatives_spanish:
  - consideramos que hemos sido algo lentos en volver nuestra atención
  - consideramos que hemos demorado algo en volver nuestra atención
  lexicon: LSJ
  rationale: βράδιον expresa demora percibida, no necesariamente culpable; en español, 'hemos tardado algo' conserva el matiz apologético y natural. ἐπιστροφὴν πεποιῆσθαι se entiende idiomáticamente como volver la atención a un asunto, no como un retorno físico.
- source_word: περὶ τῶν ἐπιζητουμένων παρʼ ὑμῖν πραγμάτων
  english_pob_choice: the matters being raised among you
  chosen_spanish: los asuntos que se suscitan entre ustedes
  alternatives_spanish:
  - los asuntos que se piden entre ustedes
  - los asuntos que ustedes plantean
  lexicon: LSJ
  rationale: El participio comunica asuntos objeto de búsqueda o planteamiento en la comunidad; 'se suscitan' recoge bien el sentido de cuestiones planteadas sin forzar una sola dirección interpersonal.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  lexicon: BDAG
  rationale: Se mantiene el vocativo masculino del griego, pero con un término español natural y eclesialmente transparente.
- source_word: τῆς τε ἀλλοτρίας καὶ ξένης ... στάσεως
  english_pob_choice: the alien and strange uprising
  chosen_spanish: la sublevación ajena y extraña
  alternatives_spanish:
  - la sedición ajena y extraña
  - la disensión ajena y extraña
  lexicon: BDAG
  rationale: στάσις designa una ruptura comunitaria seria; 'sublevación' conserva la gravedad pública y el carácter activo del conflicto. 'Ajena y extraña' reproduce la doble intensificación ἀλλοτρίας καὶ ξένης.
- source_word: μιαρᾶς καὶ ἀνοσίου
  english_pob_choice: defiled and unholy
  chosen_spanish: contaminada e impía
  alternatives_spanish:
  - manchada e impía
  - profana e impía
  lexicon: LSJ
  rationale: La pareja griega combina impureza moral/cultual con irreligiosidad; 'contaminada e impía' conserva la fuerza condenatoria sin sonar artificial.
- source_word: προπετῆ καὶ αὐθάδη
  english_pob_choice: rash and self-willed
  chosen_spanish: precipitados y obstinados
  alternatives_spanish:
  - imprudentes y testarudos
  - temerarios y arbitrarios
  lexicon: BDAG
  rationale: προπετῆ apunta a impulsividad temeraria; 'precipitados' transmite esa prontitud imprudente. αὐθάδη enfatiza autoafirmación dura; 'obstinados' expresa bien la terquedad voluntariosa.
- source_word: ἀπονοίας
  english_pob_choice: madness
  chosen_spanish: locura
  alternatives_spanish:
  - insensatez
  - desvarío
  lexicon: LSJ
  rationale: El término es retóricamente fuerte; 'locura' mantiene el tono enfático de la acusación y es claro en español.
- source_word: τὸ σεμνὸν καὶ περιβόητον καὶ πᾶσιν ἀνθρώποις ἀξιαγάπητον ὄνομα ὑμῶν
  english_pob_choice: your dignified and widely spoken-of name, worthy of love among all people
  chosen_spanish: su nombre digno, célebre y digno de amor entre todos los hombres
  alternatives_spanish:
  - su nombre digno, muy conocido y digno de amor entre todos los hombres
  - su nombre honorable, famoso y digno de amor entre todos
  lexicon: BDAG
  rationale: σεμνόν se rinde con 'digno' para la cualidad honorable-seria; περιβόητον con 'célebre' para la resonancia pública; ἀξιαγάπητον con 'digno de amor' para mantener el valor moral del apelativo.
- source_word: πανάρετον καὶ βεβαίαν πίστιν
  english_pob_choice: your all-virtuous and steadfast faith
  chosen_spanish: su fe enteramente virtuosa y firme
  alternatives_spanish:
  - su fe plenamente virtuosa y firme
  - su fe de toda virtud y firme
  lexicon: LSJ
  rationale: πανάρετον intensifica la excelencia moral; 'enteramente virtuosa' conserva el sentido totalizante. βεβαίαν se expresa naturalmente como 'firme'.
- source_word: σώφρονα καὶ ἐπιεικῆ ἐν Χριστῷ εὐσέβειαν
  english_pob_choice: your sober and gentle godliness in Messiah
  chosen_spanish: su piedad sobria y apacible en Mesías
  alternatives_spanish:
  - su piedad sobria y amable en Mesías
  - su devoción sobria y apacible en Mesías
  lexicon: BDAG
  rationale: εὐσέβεια aquí es piedad/devoción religiosa; 'piedad' es directo y digno. σώφρων sugiere sobriedad moral, y ἐπιεικής apunta a mansedumbre/apacibilidad. 'En Mesías' conserva el título Χριστός según la política del proyecto.
- source_word: μεγαλοπρεπὲς τῆς φιλοξενίας ὑμῶν ἦθος
  english_pob_choice: the magnificent character of your hospitality
  chosen_spanish: el carácter magnífico de su hospitalidad
  alternatives_spanish:
  - la magnificencia de su hospitalidad
  - el porte magnífico de su hospitalidad
  lexicon: LSJ
  rationale: ἦθος comunica cualidad o talante; 'carácter' lo expresa bien en español. μεγαλοπρεπές se refleja con 'magnífico' sin perder el tono elogioso.
- source_word: τελείαν καὶ ἀσφαλῆ γνῶσιν
  english_pob_choice: your complete and sure knowledge
  chosen_spanish: su conocimiento completo y seguro
  alternatives_spanish:
  - su conocimiento perfecto y seguro
  - su conocimiento maduro y seguro
  lexicon: BDAG
  rationale: γνῶσις se traduce aquí como conocimiento, no como término técnico posterior. τελεία y ἀσφαλής se mantienen como 'completo' y 'seguro' para preservar ambos matices.
- source_word: ἀπροσωπολήμπτως
  english_pob_choice: without partiality
  chosen_spanish: sin parcialidad
  alternatives_spanish:
  - sin favoritismo
  - imparcialmente
  lexicon: BDAG
  rationale: La frase española es bíblica, clara y exacta para la ausencia de acepción de personas.
- source_word: νομίμοις τοῦ θεοῦ
  english_pob_choice: the lawful ordinances of God
  chosen_spanish: los preceptos legítimos de Dios
  alternatives_spanish:
  - las ordenanzas legítimas de Dios
  - las disposiciones legítimas de Dios
  lexicon: LSJ
  rationale: νομίμοις no exige una terminología jurídica rígida; 'preceptos legítimos' mantiene la idea de lo ordenado/legítimo dentro del marco de Dios sin imponer un tecnicismo posterior.
- source_word: ἡγουμένοις ... πρεσβυτέροις
  english_pob_choice: your leaders ... the elders among you
  chosen_spanish: sus dirigentes ... los ancianos que están entre ustedes
  alternatives_spanish:
  - sus líderes ... los ancianos entre ustedes
  - sus guías ... los presbíteros entre ustedes
  lexicon: BDAG
  rationale: ἡγούμενοι se expresa con 'dirigentes' para evitar anacronismos de oficina; πρεσβύτεροι se rinde con 'ancianos', una forma comprensible y eclesialmente reconocible.
- source_word: μέτρα καὶ σεμνὰ νοεῖν
  english_pob_choice: to think in ways marked by moderation and dignity
  chosen_spanish: pensar con moderación y dignidad
  alternatives_spanish:
  - tener pensamientos moderados y dignos
  - pensar de modo moderado y digno
  lexicon: LSJ
  rationale: El griego apunta a una disposición mental regulada; en español, 'pensar con moderación y dignidad' es natural y conserva el valor exhortativo.
- source_word: γυναξὶν
  english_pob_choice: the women
  chosen_spanish: a las mujeres
  alternatives_spanish:
  - a las esposas
  - a las señoras
  lexicon: BDAG
  rationale: El plural es amplio en la forma, pero el contexto posterior con 'sus propios maridos' muestra que se trata de mujeres casadas; se conserva el término básico y el contexto aclara el alcance.
- source_word: ἀμώμῳ καὶ σεμνῇ καὶ ἁγνῇ συνειδήσει
  english_pob_choice: with a blameless and dignified and pure conscience
  chosen_spanish: con conciencia irreprochable, digna y pura
  alternatives_spanish:
  - con conciencia sin mancha, digna y pura
  - con conciencia intachable, digna y pura
  lexicon: BDAG
  rationale: Se conserva la triple cualidad del original. 'Irreprochable' recoge ἀμώμος; 'digna' y 'pura' preservan el tono moral y reverente.
- source_word: στεργούσας καϑηκόντως τοὺς ἄνδρας ἑαυτῶν
  english_pob_choice: loving their own husbands as is fitting
  chosen_spanish: amando a sus propios maridos como conviene
  alternatives_spanish:
  - queriendo a sus propios maridos como corresponde
  - amando a sus propios esposos como conviene
  lexicon: LSJ
  rationale: στεργούσας expresa afecto doméstico/familiar; 'amando' mantiene la sencillez. καϑηκόντως se traduce naturalmente como 'como conviene'.
- source_word: ἐν τῷ κανόνι τῆς ὑποταγῆς
  english_pob_choice: being within the rule of submission
  chosen_spanish: estando bajo la norma de la sumisión
  alternatives_spanish:
  - dentro de la regla de la sumisión
  - bajo la regla de la sumisión
  lexicon: BDAG
  rationale: κανών es una norma o regla; 'norma' suena más natural en español contemporáneo que 'regla' sin perder la idea de orden prescrito. ὑποταγή se conserva como 'sumisión'.
- source_word: οἰκουρεῖν
  english_pob_choice: to manage the affairs of the household
  chosen_spanish: administrar los asuntos del hogar
  alternatives_spanish:
  - cuidar de la casa
  - llevar la casa
  lexicon: LSJ
  rationale: El verbo describe la gestión doméstica, no mera permanencia en casa; 'administrar los asuntos del hogar' preserva esa función.
- source_word: πάνυ σωφρονούσας
  english_pob_choice: showing complete self-control
  chosen_spanish: mostrando completa templanza
  alternatives_spanish:
  - mostrando total dominio de sí
  - mostrando completa sobriedad
  lexicon: BDAG
  rationale: σωφρονέω combina sensatez, moderación y autocontrol; 'templanza' expresa bien el conjunto en español. πάνυ intensifica la cualidad, por eso 'completa'.
theological_decisions:
- issue: Χριστός en ἐν Χριστῷ
  english_pob_reading: in Messiah
  chosen_spanish_reading: en Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: Se sigue la política del proyecto de traducir el título Χριστός como 'Mesías' cuando funciona como designación titulativa y no como nombre fijo. Aquí la piedad se especifica cristológicamente, y 'Mesías' mantiene ese valor de título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: ἀδελφοί como vocativo comunitario
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - amados hermanos
  rationale: Se mantiene el vocativo masculino del original para ser fiel al griego y a la práctica POB de precisión de género, sin perder la inclusividad contextual que puede inferirse del auditorio mixto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
- issue: στάσις como ruptura eclesial grave
  english_pob_reading: uprising
  chosen_spanish_reading: sublevación
  alternative_spanish_readings:
  - sedición
  - facción
  rationale: El término griego denota una ruptura pública y violenta del orden comunitario. 'Sublevación' conserva la gravedad y el carácter de levantamiento contra el orden de la comunidad.
  doctrine_reference: 'PHILOSOPHY.md: Preserve ecclesial language and make reasoning auditable.'
translation_notes:
  revision_awareness: 'La redacción toma en cuenta la revisión final del audit trail: se privilegia ''asuntos que se suscitan entre ustedes'' para περὶ τῶν ἐπιζητουμένων παρʼ ὑμῖν πραγμάτων y ''pensar con moderación y dignidad'' para μέτρα καὶ σεμνὰ νοεῖν, buscando una solución más natural en español sin perder los matices del griego ni el tono apologético de 1 Clemente 1:1.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo donde el texto fuente lo requiera; aquí aparece θεός, por lo que se traduce 'Dios'.
  - Se traduce Χριστός como 'Mesías' en la frase ἐν Χριστῷ para respetar la pauta del proyecto.
  - Se usa 'sumisión' para ὑποταγή y 'norma' para κανών, distinguiendo el principio de la conducta de su marco regulativo.
  - Se conserva el tono elevado y encomiástico del original sin introducir vocabulario eclesiástico posterior no exigido por el griego.
