  revised_spanish_text: 'A causa de las repentinas y repetidas desgracias y crisis que nos han sobrevenido, hermanos, consideramos que hemos tardado algo en volver nuestra atención[a] a los asuntos planteados entre ustedes, amados, es decir, a la sublevación ajena y extraña, contaminada e impía, ajena a los escogidos de Dios, la cual unos pocos hombres precipitados y obstinados han encendido hasta tal punto de locura que su nombre digno, de renombre y digno de amor entre todos los hombres, ha sido grandemente blasfemado.


