review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura retórica del griego y conserva los cuatro elogios: fe, piedad, hospitalidad y conocimiento. Sin embargo, no sigue la política terminológica del proyecto para Χριστός, ya que ἐν Χριστῷ debe reflejarse como ‘en Mesías’ salvo carve-out documentado, y aquí el rastro auditado inglés terminó en ‘in Messiah’. Además, ‘amable’ para ἐπιεικής suaviza demasiado el matiz de gentileza/clemencia.'
  spanish_quality_summary: El español es claro y natural, con buen registro eclesial. Aun así, ‘piedad sobria y amable’ suena algo débil en el segundo adjetivo, y ‘conocimiento completo y seguro’ es aceptable aunque algo rígido. El resto fluye bien y mantiene la cadencia interrogativa del original.
  glossary_alignment: 'Buen alineamiento general con πίστις = fe, εὐσέβεια = piedad, φιλοξενία = hospitalidad, γνῶσις = conocimiento. Desalineación principal: Χριστός se vertió como ‘Cristo’ contra la preferencia del proyecto y contra el texto inglés auditado final (‘Messiah’).'
  issues:
  - severity: high
    issue: ‘en Cristo’ para ἐν Χριστῷ contradice la política del proyecto y el audit trail inglés final
    rationale: La instrucción del proyecto dice que Χριστός suele ser ‘Mesías’ salvo carve-out documentado. Aquí el historial aplicado restauró explícitamente ‘Messiah’ por política doctrinal; por tanto, el español debe reflejar esa decisión salvo razón fuerte, que no consta.
  - severity: medium
    issue: ‘amable’ debilita ἐπιεικῆ
    rationale: ἐπιεικής en este contexto se acerca más a ‘gentil’, ‘benigna’ o ‘considerada’ que a ‘amable’, que puede sonar meramente afable y menos ético-moral.
  revised_spanish_text: Pues, ¿quién, después de haber estado entre ustedes, no aprobó su fe toda virtuosa y firme? ¿Quién no admiró su piedad sobria y gentil en Mesías? ¿Quién no proclamó el carácter magnífico de su hospitalidad? ¿Y quién no consideró bienaventurado su conocimiento completo y seguro?
  revision_rationale: Se corrige ‘Cristo’ a ‘Mesías’ para ajustarse a la política terminológica del proyecto y al audit trail inglés final. También se cambia ‘amable’ por ‘gentil’ para reflejar mejor ἐπιεικής en un registro claro y digno, sin alterar la estructura del pasaje.
