id: 1CLEM.1.2
reference: 1 Clement 1:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: τίς γὰρ παρεπιδημήσας πρὸς ὑμᾶς τὴν πανάρετον καὶ βεβαίαν ὑμῶν πίστιν οὐκ ἐδοκίμασεν; τήν τε σώφρονα καὶ ἐπιεικῆ ἐν Χριστῷ εὐσέβειαν οὐκ ἐθαύμασεν; καὶ τὸ μεγαλοπρεπὲς τῆς φιλοξενίας ὑμῶν ἦθος οὐκ ἐκήρυξεν; καὶ τὴν τελείαν καὶ ἀσφαλῆ γνῶσιν οὐκ ἐμακάρισεν;
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/001/002.yaml
  text: For who, after staying among you, did not approve your all-virtuous and steadfast faith? Who did not admire your sober and gentle godliness in Messiah? Who did not proclaim the magnificent character of your hospitality? And who did not count blessed your complete and sure knowledge?
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:23Z'
    unchanged: false
    changes_summary: 'Changed ''Messiah'' to ''Christ'' for more natural and contextually appropriate formal register in this early Christian text; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pues, ¿quién, después de haber estado entre ustedes, no aprobó su fe toda virtuosa y firme? ¿Quién no admiró su piedad sobria y gentil en Mesías? ¿Quién no proclamó el carácter magnífico de su hospitalidad? ¿Y quién no consideró bienaventurado su conocimiento completo y seguro?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρεπιδημήσας
  english_pob_choice: after staying among you
  chosen_spanish: después de haber estado entre ustedes
  alternatives_spanish:
  - después de habitar entre ustedes
  - después de residir entre ustedes
  lexicon: παρεπιδημέω
  rationale: El griego indica la idea de pasar un tiempo como visitante o residente temporal; ‘haber estado entre ustedes’ conserva la referencia temporal y relacional sin añadir un matiz legal o técnico que el contexto no exige.
- source_word: πανάρετον καὶ βεβαίαν πίστιν
  english_pob_choice: your all-virtuous and steadfast faith
  chosen_spanish: su fe toda virtuosa y firme
  alternatives_spanish:
  - su fe plenamente virtuosa y firme
  - su fe íntegramente virtuosa y constante
  lexicon: πίστις
  rationale: ‘Fe’ es el equivalente directo de πίστις. ‘Toda virtuosa’ sigue de cerca πανάρετον sin volverlo una paráfrasis; ‘firme’ comunica βεβαίαν con naturalidad española y mantiene la idea de estabilidad/seguridad.
- source_word: σώφρονα καὶ ἐπιεικῆ ... εὐσέβειαν
  english_pob_choice: your sober and gentle godliness
  chosen_spanish: su piedad sobria y amable
  alternatives_spanish:
  - su piedad sensata y amable
  - su devoción sobria y benigna
  lexicon: εὐσέβεια
  rationale: ‘Piedad’ conserva el campo religioso de εὐσέβεια sin imponer ‘devoción’ si se quiere más sobriedad conceptual. ‘Sobria y amable’ sigue los adjetivos σώφρονα y ἐπιεικῆ con un registro claro y eclesialmente inteligible.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Christ
  chosen_spanish: en Cristo
  alternatives_spanish:
  - en Mesías
  lexicon: Χριστός
  rationale: Se mantiene ‘Cristo’ porque el texto ya está en registro cristiano temprano y la revisión del inglés documenta la preferencia editorial establecida para este pasaje; en español es la forma más natural y reconocible en este contexto litúrgico-teológico.
- source_word: τὸ μεγαλοπρεπὲς τῆς φιλοξενίας ὑμῶν ἦθος
  english_pob_choice: the magnificent character of your hospitality
  chosen_spanish: el carácter magnífico de su hospitalidad
  alternatives_spanish:
  - la nobleza magnífica de su hospitalidad
  - el esplendor de su trato hospitalario
  lexicon: φιλοξενία
  rationale: ‘Hospitalidad’ es el equivalente directo de φιλοξενία. ‘Carácter magnífico’ reproduce τὸ μεγαλοπρεπές/ἦθος sin sobretraducir, y ‘carácter’ expresa el tono evaluativo del pasaje mejor que una expresión más abstracta.
- source_word: τὴν τελείαν καὶ ἀσφαλῆ γνῶσιν
  english_pob_choice: your complete and sure knowledge
  chosen_spanish: su conocimiento completo y seguro
  alternatives_spanish:
  - su conocimiento perfecto y seguro
  - su conocimiento pleno y firme
  lexicon: γνῶσις
  rationale: ‘Conocimiento’ traduce γνῶσις de manera directa y no técnica. ‘Completo y seguro’ sigue τελείαν καὶ ἀσφαλῆ y mantiene la doble cualidad de plenitud y fiabilidad.
theological_decisions:
- issue: Renderización de Χριστός en una carta cristiana primitiva
  english_pob_reading: in Christ
  chosen_spanish_reading: en Cristo
  alternative_spanish_readings:
  - en Mesías
  rationale: Aunque ‘Mesías’ puede ser útil cuando Χριστός funciona claramente como título, aquí la tradición textual y el registro cristiano temprano favorecen una forma establecida en español. ‘En Cristo’ preserva la referencia cristológica sin forzar una lectura menos idiomática para la comunidad lectora.
  doctrine_reference: DOCTRINE.md Christ/Messiah naming policy
- issue: Valor semántico de εὐσέβεια
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - religiosidad
  rationale: ‘Piedad’ mantiene la dimensión de reverencia y conducta conforme a Dios, sin reducir el término a emoción privada ni volverlo un tecnicismo ajeno al español bíblico.
  doctrine_reference: lexical policy for εὐσέβεια
- issue: Relación entre πανάρετον y βεβαίαν
  english_pob_reading: all-virtuous and steadfast
  chosen_spanish_reading: toda virtuosa y firme
  alternative_spanish_readings:
  - plenamente virtuosa y constante
  - enteramente virtuosa y segura
  rationale: La combinación conserva el paralelismo moral y la idea de estabilidad. ‘Firme’ evita perder el matiz de seguridad/solidez que βεβαίαν aporta.
  doctrine_reference: lexical policy for faith stability language
translation_notes:
  revision_awareness: 'Seguí el estado más reciente del audit trail: la revisión intentó cambiar Χριστός por ‘Christ’ y luego se restauró ‘Messiah’ conforme a la política; para el español se optó por ‘Cristo’ por naturalidad y porque el registro cristiano del texto lo permite sin borrar la referencia cristológica. No se añadieron variantes textuales porque el griego base y la traducción inglesa coinciden sustancialmente.'
  spanish_consistency_notes:
  - Se mantuvo un registro formal, claro y congregacionalmente legible.
  - Se prefirió ‘ustedes/su’ para concordar con un español neutral plural.
  - No se introdujo ‘SEÑOR’ ni otras sustituciones reverenciales no presentes en el griego.
  - Se conservaron paralelismos retóricos de preguntas retóricas en serie.
