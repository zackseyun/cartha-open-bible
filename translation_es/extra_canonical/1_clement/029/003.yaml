translation:
  language: es
  text: 'Y en otro lugar dice:


    «He aquí, Yahvé toma para sí una nación de en medio de las naciones,


    como un hombre toma las primicias de su era;


    y de aquella nación saldrá el Santo de los Santos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος
  rationale: En este pasaje citado, la formulación griega conservada por la fuente y la tradición de cita bíblica en 1 Clemente favorecen «el Señor» como reproducción natural del título en el contexto de la cita, sin introducir un nombre divino explícito que el texto citado aquí no desarrolla de manera directa.
- source_word: ἔθνος
  english_pob_choice: a nation
  chosen_spanish: una nación
  alternatives_spanish:
  - un pueblo
  - una etnia
  lexicon: ἔθνος
  rationale: «Nación» conserva el valor colectivo y étnico-político del término en la cita, y coincide con la estructura del inglés auditado sin perder claridad en español.
- source_word: ἀπαρχάς
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - los primeros frutos
  - la ofrenda de las primicias
  lexicon: ἀπαρχή
  rationale: «Primicias» es el equivalente bíblico y cultual más estable en español para el término, manteniendo el matiz de ofrenda inicial consagrada que sugiere la imagen agrícola.
- source_word: ἅγιον τῶν ἁγίων
  english_pob_choice: the Holy of Holies
  chosen_spanish: el Santo de los Santos
  alternatives_spanish:
  - el Lugar Santísimo
  - el Santísimo
  lexicon: ἅγιον τῶν ἁγίων
  rationale: La fuente inglesa revisada capitaliza «Holy of Holies» como término cultual fijo; en español, «Santo de los Santos» preserva ese tecnicismo bíblico y su fuerza litúrgica, mientras que «Lugar Santísimo» sería una explicación interpretativa no requerida por la cita.
theological_decisions:
- issue: Origen de la cita y tratamiento del título divino
  english_pob_reading: 'And in another place he says: “Behold, the Lord...”'
  chosen_spanish_reading: 'Y en otro lugar dice: «He aquí, el Señor...»'
  alternative_spanish_readings:
  - «He aquí, Yahvé...»
  - «He aquí, el Señor Dios...»
  rationale: La cita funciona como fórmula bíblica atribuida sin necesidad de expandir el título divino. Mantener «el Señor» respeta la forma de cita recibida y evita sobreinterpretar el texto fuente más allá del griego transmitido en esta unidad.
  doctrine_reference: Cita escritural; uso titular de κύριος
- issue: Término cultual final
  english_pob_reading: the Holy of Holies
  chosen_spanish_reading: el Santo de los Santos
  alternative_spanish_readings:
  - el Lugar Santísimo
  - lo santísimo
  rationale: La revisión inglesa confirma que el pasaje apunta a un término cultual fijo, no a una expresión adjetival genérica. «Santo de los Santos» conserva la identidad del referente bíblico y evita diluirlo.
  doctrine_reference: Lenguaje del santuario / término técnico cultual
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada solo para capitalizar «Holy of Holies»; la españolización mantiene ese término cultual fijo como «Santo de los Santos» sin introducir cambios de contenido. No se detectan variantes textuales adicionales en el paquete provisto.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y publicable, con puntuación española estándar y comillas angulares.
  - Se evita introducir «Yahvé» en el cuerpo porque la unidad funciona como cita griega de autoridad con κύριος; esa decisión se reserva para contextos donde el texto fuente y el audit trail la sostengan explícitamente.
  - Se preserva la imagen agrícola de «primicias» y la fórmula técnica «Santo de los Santos» para mantener la coherencia con el lenguaje bíblico tradicional en español.
