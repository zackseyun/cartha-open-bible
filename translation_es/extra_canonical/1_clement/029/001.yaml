review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido de 29:1: exhortación hortativa a acercarse a Dios, santidad interior, manos levantadas en pureza, amor al Padre, y la idea de haber sido hechos una porción escogida para él. Sin embargo, hay un desajuste léxico importante en ἐπιεικῆ: ''amable'' debilita el matiz de ''gentle/forbearing'' y lo desplaza hacia mera cordialidad. También conviene ajustar el orden final para sonar más natural en español sin perder la relación de ἑαυτῷ.'
  spanish_quality_summary: El texto es claro y digno, pero 'Padre amable y compasivo' suena algo coloquial y menos preciso teológicamente que 'Padre bondadoso y compasivo' o 'benigno y compasivo'. El resto lee bien en español eclesial moderno. 'Acerquémonos a él' y 'en santidad de alma' son naturales y fieles. La frase final mejora con 'que ha hecho de nosotros una porción elegida para sí'.
  glossary_alignment: No hay conflictos con los términos de proyecto en este versículo principal. La decisión 'porción elegida' alinea bien con la justificación de ἐκλογῆς μέρος. El problema principal es terminológico con ἐπιεικῆ, donde 'amable' no preserva adecuadamente el valor de gentileza/benignidad paciente documentado en el rastro inglés.
  issues:
  - severity: medium
    issue: '''amable'' para ἐπιεικῆ es demasiado débil y social'
    rationale: El inglés auditado escogió 'gentle' para preservar mansedumbre/benignidad/forbearance. En español, 'amable' suele sugerir cortesía o trato agradable, no necesariamente el carácter benigno y clemente del Padre.
  - severity: low
    issue: La cláusula final puede sonar más natural en español
    rationale: '''que nos hizo para sí una porción elegida'' es comprensible, pero ''que ha hecho de nosotros una porción elegida para sí'' expresa con más claridad la relación entre ''nos'' y ''porción elegida''.'
  revised_spanish_text: Por tanto, acerquémonos a él en santidad de alma, levantando hacia él manos puras e inmaculadas, amando a nuestro Padre bondadoso y compasivo, que ha hecho de nosotros una porción elegida para sí.
  revision_rationale: 'Se revisa únicamente para mejorar la fidelidad léxica y la naturalidad del español: ''bondadoso'' preserva mejor el matiz de ἐπιεικής que ''amable'', y la reformulación final expresa con mayor claridad y fluidez que Dios ha hecho de nosotros su porción escogida sin perder la imagen teológica de elección y herencia.'
