revisions:
- from: Por tanto, acerquémonos a él en santidad de alma, levantando hacia él manos puras e inmaculadas, amando a nuestro Padre amable y compasivo, que nos hizo para sí una porción elegida.
  to: Por tanto, acerquémonos a él en santidad de alma, levantando hacia él manos puras e inmaculadas, amando a nuestro Padre bondadoso y compasivo, que ha hecho de nosotros una porción elegida para sí.
  rationale: 'Se revisa únicamente para mejorar la fidelidad léxica y la naturalidad del español: ''bondadoso'' preserva mejor el matiz de ἐπιεικής que ''amable'', y la reformulación final expresa con mayor claridad y fluidez que Dios ha hecho de nosotros su porción escogida sin perder la imagen teológica de elección y herencia.'
