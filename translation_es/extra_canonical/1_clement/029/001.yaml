translation:
  language: es
  text: Por tanto, acerquémonos a él en santidad de alma, levantando hacia él manos puras e inmaculadas, amando a nuestro Padre bondadoso y compasivo, que ha hecho de nosotros una porción elegida para sí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Προσέλθωμεν
  english_pob_choice: let us come near
  chosen_spanish: acerquémonos
  alternatives_spanish:
  - aproximémonos
  - acerquémonos a él
  lexicon: BDAG
  rationale: Mantiene el valor exhortativo y el matiz devocional/cultual de acercarse a Dios, con español natural y digno.
- source_word: ἐν ὁσιότητι ψυχῆς
  english_pob_choice: in holiness of soul
  chosen_spanish: en santidad de alma
  alternatives_spanish:
  - con santidad de alma
  - en piedad de alma
  lexicon: BDAG
  rationale: Conserva la cualidad moral-religiosa de ὁσιότης y el énfasis interior de ψυχή sin rebajarlo a una simple sinceridad.
- source_word: ἁγνὰς καὶ ἀμιάντους χεῖρας
  english_pob_choice: hands that are pure and undefiled
  chosen_spanish: manos puras e inmaculadas
  alternatives_spanish:
  - manos puras y sin mancha
  - manos limpias e incontaminadas
  lexicon: BDAG
  rationale: Preserva la imagen concreta de manos levantadas en oración y el paralelismo de pureza; 'inmaculadas' comunica bien la fuerza de ἀμιάντους sin sonar arcaico.
- source_word: ἀγαπῶντες
  english_pob_choice: loving
  chosen_spanish: amando
  alternatives_spanish:
  - mientras amamos
  - con amor hacia
  lexicon: BDAG
  rationale: Respeta el participio y el flujo exhortativo del griego, manteniendo la centralidad ética de amar.
- source_word: ἐπιεικῆ
  english_pob_choice: gentle
  chosen_spanish: amable
  alternatives_spanish:
  - manso
  - benigno
  - condescendiente
  lexicon: BDAG
  rationale: En español, 'amable' comunica accesibilidad y trato benigno del Padre; se usa junto con el término siguiente para equilibrar suavidad y compasión.
- source_word: εὔσπλαγχνον
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - tierno de corazón
  lexicon: BDAG
  rationale: Expresa el sentido de profunda compasión de forma clara y contemporánea.
- source_word: ἐκλογῆς μέρος
  english_pob_choice: a chosen portion
  chosen_spanish: una porción elegida
  alternatives_spanish:
  - una porción de elección
  - una porción de los escogidos
  - un pueblo elegido
  lexicon: BDAG
  rationale: Sostiene tanto la idea de elección divina como la imagen de porción/herencia, sin resolver la expresión en una etiqueta eclesial más estrecha.
- source_word: ὁ ὕψιστος
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  lexicon: BDAG
  rationale: Es el título bíblico establecido y más natural en español.
- source_word: υἱοὺς Ἀδάμ
  english_pob_choice: the sons of Adam
  chosen_spanish: los hijos de Adán
  alternatives_spanish:
  - los hijos del hombre
  - los seres humanos
  lexicon: BDAG
  rationale: Conserva explícitamente la referencia a Adán en vez de generalizarla, para mantener el registro escritural del citado.
- source_word: ἔστησεν ὅρια ἐθνῶν
  english_pob_choice: he fixed the boundaries of the nations
  chosen_spanish: fijó los límites de las naciones
  alternatives_spanish:
  - estableció los bordes de las naciones
  - puso fronteras a las naciones
  lexicon: BDAG
  rationale: Naturaliza el lenguaje territorial sin perder la imagen de repartición y delimitación.
- source_word: κατὰ ἀριθμὸν ἀγγέλων θεοῦ
  english_pob_choice: according to the number of the angels of God
  chosen_spanish: según el número de los ángeles de Dios
  alternatives_spanish:
  - conforme al número de los ángeles de Dios
  lexicon: BDAG
  rationale: Reproduce de manera directa la forma de la cita griega tal como aparece en Clemente, sin armonizarla interpretativamente.
- source_word: μερὶς κυρίου
  english_pob_choice: the Lord’s portion
  chosen_spanish: la porción del Señor
  alternatives_spanish:
  - la parte del Señor
  lexicon: BDAG
  rationale: Mantiene el lenguaje bíblico de posesión e herencia con una formulación clara en español.
- source_word: σχοίνισμα κληρονομίας
  english_pob_choice: the measuring-line of his inheritance
  chosen_spanish: la cuerda de su herencia
  alternatives_spanish:
  - la línea de medición de su herencia
  - el cordel de su herencia
  lexicon: BDAG
  rationale: Preserva la metáfora concreta del cordel o cuerda usada para repartir herencias; 'cuerda' es más natural en español y sigue siendo fiel al campo semántico.
- source_word: ἔθνος ἐκ μέσου ἐθνῶν
  english_pob_choice: a nation from the midst of nations
  chosen_spanish: una nación de en medio de las naciones
  alternatives_spanish:
  - una nación de entre las naciones
  - un pueblo de entre las naciones
  lexicon: BDAG
  rationale: Conserva la singularidad de 'nación' y la fuerza de la elección desde dentro del conjunto de las demás naciones.
- source_word: ἀπαρχὴν
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - la primera porción
  - el primer fruto
  lexicon: BDAG
  rationale: Es el término bíblico estándar en español para el sentido cultual/agro-sacrificial de ἀπαρχὴν.
- source_word: ἅλω
  english_pob_choice: threshing floor
  chosen_spanish: era
  alternatives_spanish:
  - era de trillar
  - lugar de trilla
  lexicon: BDAG
  rationale: '''Era'' es el término bíblico y agrícola natural en español para ἅλως/ἅλω, preservando la imagen del acto de trillar.'
- source_word: ἅγια ἁγίων
  english_pob_choice: the holy of holies
  chosen_spanish: el santo de los santos
  alternatives_spanish:
  - el santísimo
  - las cosas santísimas
  lexicon: BDAG
  rationale: Conserva la fórmula cultual tradicional y la ambigüedad del griego en este contexto, sin decidir prematuramente si alude a persona, realidad o conjunto.
theological_decisions:
- issue: 'Ἐκλογῆς μέρος: tensión entre elección y porción/herencia'
  english_pob_reading: Rendered 'a chosen portion' to preserve both election language and inheritance imagery.
  chosen_spanish_reading: una porción elegida
  alternative_spanish_readings:
  - un pueblo elegido
  - una porción de elección
  rationale: La frase griega combina elección divina con imagen de reparto/herencia. 'Una porción elegida' conserva ambos niveles sin convertirlo en una categoría eclesiástica cerrada.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
- issue: ἅγια ἁγίων en la cita final
  english_pob_reading: Rendered literally as 'the holy of holies' in the main text.
  chosen_spanish_reading: el santo de los santos
  alternative_spanish_readings:
  - el santísimo
  - las cosas santísimas
  rationale: La expresión es ambigua en su referente; la fórmula cultual tradicional en español preserva esa ambigüedad y el peso bíblico del lenguaje sagrado.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa auditada se mantiene sin cambios en la revisión más reciente; el borrador español sigue de cerca esas decisiones léxicas y teológicas, conservando la tensión entre elección y herencia, y la ambigüedad cultual de la cita.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece el tetragrámaton en la forma citada.
  - Se mantiene 'Dios' en la frase 'ángeles de Dios' conforme al valor del texto griego.
  - '''Mesías/Cristo'' no aparece aquí; no hay decisión aplicable.'
  - Se prefirió un español litúrgico pero moderno, evitando un calco rígido del inglés auditado.
