base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/029/002.yaml
  text: 'For thus it is written:

    “When the Most High divided the nations,

    when he scattered the sons of Adam,

    he fixed the boundaries of the nations

    according to the number of the angels of God.

    And his people Jacob became the Lord’s portion,

    Israel the measuring-line of his inheritance.”'
  revision_pass:
    model: gpt-5
    timestamp: '2026-05-03T05:05:43Z'
    unchanged: false
    changes_summary: Added “And” to reflect the coordinating καί in the source and lowercased “His” to “his” for consistency with pronoun usage and the Greek syntax. Other wording retained as it accurately represents the LXX citation Clement is quoting.
translation:
  language: es
  text: 'Porque así está escrito:


    “Cuando el Altísimo repartió las naciones,

    cuando dispersó a los hijos de Adán,

    estableció los límites de las naciones

    según el número de los ángeles de Dios.

    Y su pueblo Jacob llegó a ser la porción del Señor,

    Israel, la cuerda de medir de su herencia.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ Ὕψιστος / Most High
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Supremo
  lexicon: adjectival title
  rationale: «Altísimo» es la forma natural y reverente en español para el título divino, y conserva el valor superlativo del griego y del inglés POB sin introducir una perífrasis innecesaria.
- source_word: ἐμέρισεν / divided
  english_pob_choice: divided
  chosen_spanish: repartió
  alternatives_spanish:
  - dividió
  - separó
  lexicon: verbal aspect
  rationale: «Repartió» comunica la distribución de las naciones con un matiz más idiomático en español, manteniendo la idea de asignación territorial que el contexto exige.
- source_word: ἔστησεν ... ὅρια / fixed the boundaries
  english_pob_choice: he fixed the boundaries
  chosen_spanish: estableció los límites
  alternatives_spanish:
  - fijó los límites
  - marcó los límites
  lexicon: boundary terminology
  rationale: «Estableció los límites» reproduce bien la noción de delimitar de manera permanente y es idiomático en registro bíblico español.
- source_word: κατὰ ἀριθμὸν ἀγγέλων θεοῦ / according to the number of the angels of God
  english_pob_choice: according to the number of the angels of God
  chosen_spanish: según el número de los ángeles de Dios
  alternatives_spanish:
  - conforme al número de los ángeles de Dios
  - de acuerdo con el número de los ángeles de Dios
  lexicon: prepositional equivalence
  rationale: Se mantiene la estructura de correspondencia numérica sin suavizar la referencia angélica, ya que el POB inglés conserva la lectura literal del testimonio citado.
- source_word: αὐτοῦ λαὸς Ἰακώβ / And his people Jacob
  english_pob_choice: And his people Jacob
  chosen_spanish: Y su pueblo Jacob
  alternatives_spanish:
  - Y Jacob, su pueblo
  - Y el pueblo suyo, Jacob
  lexicon: coordination and possessive
  rationale: Se conserva la coordinación añadida por la revisión inglesa y la posesión pronominal simple; en español, «su pueblo Jacob» refleja la construcción sin recargarla con explicaciones.
- source_word: ἐγενήθη μέρος Κυρίου / became the Lord’s portion
  english_pob_choice: became the Lord’s portion
  chosen_spanish: llegó a ser la porción del Señor
  alternatives_spanish:
  - vino a ser la porción del Señor
  - se convirtió en la porción del Señor
  lexicon: portion language
  rationale: «Llegó a ser» conserva el valor resultativo del verbo y «porción» mantiene la metáfora patrimonial del texto fuente sin reemplazarla por un término más interpretativo.
- source_word: κλῆρος τῆς κληρονομίας αὐτοῦ / the measuring-line of his inheritance
  english_pob_choice: the measuring-line of his inheritance
  chosen_spanish: la cuerda de medir de su herencia
  alternatives_spanish:
  - el cordel de medir de su herencia
  - la línea de medir de su herencia
  lexicon: measurement metaphor
  rationale: «Cuerda de medir» preserva la imagen concreta del instrumento de medición, que es más transparente que una abstracción como «línea». Mantiene también la relación posesiva con «su herencia».
theological_decisions:
- issue: Referencia al nombre divino en la cita
  english_pob_reading: the Lord’s portion
  chosen_spanish_reading: la porción del Señor
  alternative_spanish_readings:
  - la porción de Yahvé
  - la porción del Señor
  rationale: Aunque el proyecto normalmente prefiere «Yahvé» para יהוה, aquí la cita está mediada por el griego Κυρίου y el POB inglés conserva «the Lord’s» dentro de la fórmula veterotestamentaria citada. Se mantiene «el Señor» para respetar esa cita tal como la presenta Clemente y el POB audit trail.
  doctrine_reference: Nombre divino en citas bíblicas mediadas por griego
- issue: Lectura de «ángeles de Dios» como reflejo literal del testimonio citado
  english_pob_reading: according to the number of the angels of God
  chosen_spanish_reading: según el número de los ángeles de Dios
  alternative_spanish_readings:
  - según el número de los mensajeros de Dios
  rationale: Se conserva «ángeles» porque el texto griego y el inglés POB coinciden en esa lectura, aunque la tradición textual del pasaje tenga variantes. No se armoniza la tensión textual, ya que el objetivo es ser auditable y fuente-gobernado.
  doctrine_reference: Transparencia textual y variante del testimonio citado
translation_notes:
  revision_awareness: This draft incorporates the latest English revision that added the coordinating ‘And’ before ‘his people Jacob’ and lowercased ‘his’ for consistency. The Spanish text mirrors that coordination with «Y» and keeps the possessive in lowercase form implicitly through normal Spanish syntax. No footnotes are necessary because the draft follows the established source reading without introducing alternative renderings that require annotation.
  spanish_consistency_notes:
  - Se mantuvo el tono solemne y publicable sin arcaísmos innecesarios.
  - «Señor» se conservó solo en la cita recibida, no como máscara general para el nombre divino en todo el proyecto.
  - La metáfora «cuerda de medir» se eligió para preservar la imagen concreta del original.
  - No se añadieron notas al pie porque no había un anclaje textual que exigiera alternativa explícita en este pasaje.
