translation:
  language: es
  text: ¿Quiénes son, pues, los enemigos? Los malvados y los que se oponen a su voluntad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «los impíos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἐχϑροί
  english_pob_choice: The enemies
  chosen_spanish: los enemigos
  alternatives_spanish:
  - los adversarios
  - los opuestos
  lexicon: ἐχθροί
  rationale: El sustantivo griego designa con naturalidad a quienes están en oposición hostil; "los enemigos" conserva el valor directo del texto y mantiene la pregunta retórica.
- source_word: οἱ φαῦλοι
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los malos
  lexicon: φαῦλοι
  rationale: En contexto moral, el término apunta a quienes son moralmente malos o corruptos. "Malvados" comunica bien esa fuerza en español sin cargar el verso con un registro excesivamente eclesiástico.
- source_word: ἀντιτασσόμενοι
  english_pob_choice: those who set themselves against
  chosen_spanish: los que se oponen a
  alternatives_spanish:
  - los que se ponen en contra de
  - los que resisten a
  lexicon: ἀντιτάσσω
  rationale: La forma media/pasiva participial expresa oposición activa; "se oponen a" reproduce esa idea de resistencia deliberada de manera clara y natural en español.
- source_word: τῷ ϑελήματι αὐτοῦ
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - su querer
  - su propósito
  lexicon: θέλημα
  rationale: '"Voluntad" es el equivalente más estable y fiel para θέλημα en este contexto; conserva el sentido ético y obediencial del original.'
theological_decisions:
- issue: Caracterización moral de los enemigos
  english_pob_reading: The wicked and those who set themselves against his will
  chosen_spanish_reading: Los malvados y los que se oponen a su voluntad
  alternative_spanish_readings:
  - Los impíos y los que se oponen a su voluntad
  - Los malos y los que resisten su voluntad
  rationale: El griego presenta una sola clase definida por dos descriptores unidos por el artículo. La traducción mantiene esa unidad y evita una separación artificial; "malvados" preserva el juicio moral sin intensificarlo más allá del texto.
  doctrine_reference: Ética bíblica y obediencia a la voluntad divina
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «the vile» por «the wicked» y eliminó la coma para reflejar que ambos rasgos dependen del mismo artículo griego. La traducción española sigue esa decisión unificada con una sola frase nominal coordinada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino solo cuando aparece explícitamente; aquí el texto usa un posesivo de tercera persona y no requiere una sustitución.
  - Se conserva un registro sobrio y eclesialmente legible sin recurrir a fórmulas tradicionales no motivadas por el griego.
  - La nota alternativa «los impíos» se ofrece porque en español es un equivalente posible de φαῦλοι y preserva un matiz bíblico frecuente.
