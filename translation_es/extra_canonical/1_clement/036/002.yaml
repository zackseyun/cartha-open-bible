id: 1CLEM.36.2
reference: 1 Clement 36:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: διὰ τούτου ἀτενίζομεν εἰς τὰ ὕψη τῶν οὐρανῶν, διὰ τούτου ἐνοπτριζόμεθα τὴν ἄμωμον καὶ ὑπερτάτην ὄψιν αὐτοῦ, διὰ τούτου ἠνεῴχθησαν ἡμῶν οἱ ὀφθαλμοὶ τῆς καρδίας, διὰ τούτου ἡ ἀσύνετος καὶ ἐσκοτωμένη διάνοια ἡμῶν ἀναθάλλει εἰς τὸ φῶς, διὰ τούτου ἠθέλησεν ὁ δεσπότης τῆς ἀϑανάτου γνώσεως ἡμᾶς γεύσασϑαι, ὃς ὢν ἀπαύγασμα τῆς μεγαλοσύνης αὐτοῦ, τοσούτῳ μείζων ἐστὶν ἀγγέλων, ὅσῳ διαφορώτερον ὄνομα κεκληρονόμηκεν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/036/002.yaml
  text: Through him we fix our gaze on the heights of the heavens; through him we behold as in a mirror his spotless and most exalted countenance; through him the eyes of our heart were opened; through him our foolish and darkened mind springs up into the light; through him the Master willed that we should taste of immortal knowledge—he who, being the radiance of his majesty, is by so much greater than the angels as he has inherited a more excellent name.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:33Z'
    unchanged: false
    changes_summary: Added 'of' in 'taste of immortal knowledge' to more naturally reflect the Greek γεύσασθαι with the genitive while preserving the formal sense. No other changes needed.
translation:
  language: es
  text: Por medio de él fijamos la mirada en las alturas de los cielos; por medio de él contemplamos, como en un espejo, su semblante sin mancha y supremamente exaltado; por medio de él se abrieron los ojos de nuestro corazón; por medio de él nuestra mente insensata y entenebrecida brota hacia la luz; por medio de él el Dueño del conocimiento inmortal quiso que probáramos de él[a]—él, que, siendo el resplandor de su majestad, es tanto mayor que los ángeles cuanto ha heredado un nombre más excelente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que gustáramos del conocimiento inmortal». El griego puede expresar tanto probar/participar de ese conocimiento como, más literalmente, probar de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τούτου
  english_pob_choice: Through him
  chosen_spanish: Por medio de él
  alternatives_spanish:
  - Por él
  - A través de él
  lexicon: διά + genitivo
  rationale: En esta secuencia repetida, ‘por medio de él’ conserva la función instrumental/mediadora del griego y mantiene la cadencia litánica del original y de la POB inglesa.
- source_word: ἀτενίζομεν εἰς τὰ ὕψη τῶν οὐρανῶν
  english_pob_choice: we fix our gaze on the heights of the heavens
  chosen_spanish: fijamos la mirada en las alturas de los cielos
  alternatives_spanish:
  - miramos fijamente las alturas del cielo
  - contemplamos las alturas de los cielos
  lexicon: ἀτενίζω + εἰς
  rationale: ‘Fijamos la mirada’ comunica la intensidad de ἀτενίζομεν sin sonar arcaico; ‘las alturas de los cielos’ refleja τὰ ὕψη τῶν οὐρανῶν de modo natural en español.
- source_word: ἐνοπτριζόμεθα τὴν ἄμωμον καὶ ὑπερτάτην ὄψιν αὐτοῦ
  english_pob_choice: we behold as in a mirror his spotless and most exalted countenance
  chosen_spanish: contemplamos, como en un espejo, su rostro sin mancha y altísimo
  alternatives_spanish:
  - vemos reflejada, como en un espejo, su semblanza sin mancha y suprema
  - lo miramos como en un espejo, su faz inmaculada y altísima
  lexicon: ἐνοπτρίζομαι; ἄμωμος; ὑπερτάτος; ὄψις
  rationale: ‘Como en un espejo’ mantiene la imagen verbal; ‘rostro’ expresa ὄψις con naturalidad en español y ‘sin mancha y altísimo’ conserva los dos calificativos sin sobrecargar el registro.
- source_word: ἠνεῴχθησαν ἡμῶν οἱ ὀφθαλμοὶ τῆς καρδίας
  english_pob_choice: the eyes of our heart were opened
  chosen_spanish: se abrieron los ojos de nuestro corazón
  alternatives_spanish:
  - fueron abiertos los ojos de nuestro corazón
  - se abrieron los ojos de nuestro interior
  lexicon: ὀφθαλμοί τῆς καρδίας
  rationale: La metáfora antropológica se mantiene literalmente y de forma comprensible; ‘corazón’ evita diluir el paralelismo con la POB inglesa.
- source_word: ἡ ἀσύνετος καὶ ἐσκοτωμένη διάνοια ἡμῶν ἀναθάλλει εἰς τὸ φῶς
  english_pob_choice: our foolish and darkened mind springs up into the light
  chosen_spanish: nuestra mente insensata y entenebrecida brota hacia la luz
  alternatives_spanish:
  - nuestra mente necia y oscurecida despierta a la luz
  - nuestro entendimiento insensato y entenebrecido florece hacia la luz
  lexicon: διάνοια; ἀσύνετος; ἐσκοτωμένη; ἀναθάλλω
  rationale: ‘Mente’ traduce διάνοια con claridad moderna; ‘entenebrecida’ conserva el parentesco semántico con ‘darkened’ y ‘brota hacia la luz’ refleja ἀναθάλλει con una imagen vegetal/lumínica cercana al griego.
- source_word: ὁ δεσπότης τῆς ἀϑανάτου γνώσεως
  english_pob_choice: the Master of immortal knowledge
  chosen_spanish: el Dueño
  alternatives_spanish:
  - el Dueño de la ciencia inmortal
  - el Soberano de la ciencia inmortal
  lexicon: δεσπότης
  rationale: ‘Dueño’ preserva el valor fuerte de δεσπότης como señorío absoluto sin introducir una terminología eclesiástica más suave; el complemento se une al sintagma siguiente para mantener la fluidez del período.
- source_word: ἀϑανάτου γνώσεως
  english_pob_choice: immortal knowledge
  chosen_spanish: la ciencia inmortal
  alternatives_spanish:
  - el conocimiento inmortal
  - la sabiduría inmortal
  lexicon: γνώσις
  rationale: ‘Ciencia’ refleja el matiz de γνώσις como conocimiento adquirido/poseído; se conserva la formulación elevada de la tradición textual y de la POB inglesa.
- source_word: γεύσασϑαι
  english_pob_choice: taste of immortal knowledge
  chosen_spanish: probáramos de la ciencia inmortal
  alternatives_spanish:
  - gustáramos de la ciencia inmortal
  - sintiéramos la ciencia inmortal
  lexicon: γεύομαι
  rationale: ‘Probar de’ reproduce el sentido literal de gustar/experimentar y sigue de cerca la revisión inglesa que añadió ‘of’ para reflejar mejor el genitivo.
- source_word: ἀπαύγασμα τῆς μεγαλοσύνης αὐτοῦ
  english_pob_choice: the radiance of his majesty
  chosen_spanish: el resplandor de su majestad
  alternatives_spanish:
  - el fulgor de su majestad
  - la radiación de su majestad
  lexicon: ἀπαύγασμα; μεγαλοσύνη
  rationale: ‘Resplandor’ es la equivalencia española más natural y reverente para ἀπαύγασμα; ‘majestad’ conserva el registro elevado de μεγαλοσύνη.
- source_word: τοσούτῳ μείζων ἐστὶν ἀγγέλων
  english_pob_choice: is by so much greater than the angels
  chosen_spanish: es tanto mayor que los ángeles
  alternatives_spanish:
  - es mucho mayor que los ángeles
  - es en tanto superior a los ángeles
  lexicon: μείζων + τοσούτῳ
  rationale: ‘Tanto mayor’ reproduce la correlación comparativa del griego y de la POB inglesa sin añadir matices interpretativos.
- source_word: διαφερώτερον ὄνομα κεκληρονόμηκεν
  english_pob_choice: has inherited a more excellent name
  chosen_spanish: ha heredado un nombre más excelente
  alternatives_spanish:
  - ha recibido un nombre más excelente
  - ha heredado un nombre más distinguido
  lexicon: κληρονομέω; διαφορώτερος
  rationale: ‘Heredado’ sigue el verbo perfecto del griego y la POB inglesa; ‘más excelente’ conserva la valoración comparativa de διαφορώτερον.
theological_decisions:
- issue: Referencia del mediador implícito en διὰ τούτου
  english_pob_reading: Through him
  chosen_spanish_reading: Por medio de él
  alternative_spanish_readings:
  - Por él
  - A través de él
  rationale: La repetición insistente de ‘por medio de él’ expresa mediación personal y evita que el español suene a simple localización espacial. No se explicita identidad cristológica adicional que el texto no desarrolle aquí.
  doctrine_reference: Cristología mediadora; lenguaje instrumental
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que añadió ‘of’ en ‘taste of immortal knowledge’ para reflejar con más naturalidad el genitivo griego de γεύσασθαι; por eso el español usa ‘probar de’. El resto del texto sigue de cerca el audit trail inglés y el griego sin cambios de contenido.
  spanish_consistency_notes:
  - Se mantuvo ‘Por medio de él’ en las repeticiones de διὰ τούτου para preservar el paralelismo retórico.
  - Se prefirió ‘Yahvé’ solo cuando aparezca el nombre divino; aquí el pasaje no lo contiene.
  - ‘Dueño’ se conserva para δεσπότης conforme al valor fuerte del término, sin suavizarlo a ‘Señor’.
  - Se evitó ‘Cristo’ porque el texto fuente no usa Χριστός en este versículo/section.
