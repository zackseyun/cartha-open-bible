translation:
  language: es
  text: 'Porque está escrito así:


    “Él hace a sus ángeles vientos,


    y a sus ministros llama de fuego.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γέγραπται γὰρ οὕτως
  english_pob_choice: For it is written thus
  chosen_spanish: Porque está escrito así
  alternatives_spanish:
  - Porque así está escrito
  - Pues está escrito de este modo
  lexicon: γράφω
  rationale: La fórmula introduce una cita escritural y en español resulta natural mantenerla con verbo pasivo impersonal. «Así» conserva la idea de la cita introducida «thus» sin añadir matiz interpretativo.
- source_word: ποιῶν
  english_pob_choice: He makes
  chosen_spanish: Él hace
  alternatives_spanish:
  - Él convierte
  - Él hace llegar a ser
  lexicon: ποιέω
  rationale: El presente verbal expresa la acción divina en la cita. «Hace» es la equivalencia más directa y sobria; «convierte» o «hace llegar a ser» añadirían precisión no exigida por el griego ni por el inglés POB.
- source_word: τοὺς ἀγγέλους αὐτοῦ
  english_pob_choice: his angels
  chosen_spanish: de sus ángeles
  alternatives_spanish:
  - a sus ángeles
  - sus ángeles
  lexicon: ἄγγελος
  rationale: Se conserva la relación posesiva con «sus» y el complemento preposicional «de» para que la frase suene natural en español dentro de la construcción predicativa «hace de...».
- source_word: πνεύματα
  english_pob_choice: winds
  chosen_spanish: vientos
  alternatives_spanish:
  - espíritus
  - alientos
  lexicon: πνεῦμα
  rationale: Aquí el contexto exige el sentido meteorológico de πνεύματα como «vientos», no «espíritus». Mantener «vientos» sigue de cerca el inglés POB y preserva la tensión poética de la cita.
- source_word: τοὺς λειτουργοὺς αὐτοῦ
  english_pob_choice: his ministers
  chosen_spanish: de sus ministros
  alternatives_spanish:
  - de sus servidores
  - de sus siervos
  lexicon: λειτουργός
  rationale: «Ministros» refleja el término del texto y su uso en la cita bíblica. «Servidores» o «siervos» suavizarían el matiz cultual/funcional que el griego conserva.
- source_word: πυρὸς φλόγα
  english_pob_choice: a flame of fire
  chosen_spanish: una llama de fuego
  alternatives_spanish:
  - llama ardiente
  - fuego en llama
  lexicon: φλόξ
  rationale: La expresión se conserva casi literalmente, porque la duplicación «llama de fuego» reproduce la imagen del original y del inglés POB sin explicarla o atenuarla.
theological_decisions:
- issue: 'Naturaleza de la cita: lenguaje figurado sobre ángeles y ministros'
  english_pob_reading: He makes his angels winds, and his ministers a flame of fire.
  chosen_spanish_reading: Él hace de sus ángeles vientos, y de sus ministros una llama de fuego.
  alternative_spanish_readings:
  - Él hace a sus ángeles vientos
  - Él transforma a sus ángeles en vientos
  rationale: La cita se mantiene como imagen poética y escritural, sin resolverla interpretativamente. «Hace de» permite conservar la relación de metáfora o transformación implícita en el griego y en el inglés POB.
  doctrine_reference: Salmo 104:4; Hebreos 1:7
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; el presente borrador sigue de cerca el texto griego normalizado y el consenso del audit trail inglés, sin introducir notas ni variantes adicionales.
  spanish_consistency_notes:
  - Se usa «ángeles» y «ministros» de forma consistente con el valor funcional del pasaje.
  - Se mantiene «vientos» para πνεύματα por el contexto de la cita y para evitar una lectura espiritual no sustentada aquí.
  - No se introduce «SEÑOR» ni «Cristo» porque el texto no contiene esos términos en esta unidad.
