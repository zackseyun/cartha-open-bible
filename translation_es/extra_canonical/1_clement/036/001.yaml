translation:
  language: es
  text: 'Éste es el camino, amados, por el cual encontramos nuestra salvación: Jesús el Mesías, el sumo sacerdote de nuestras ofrendas, el protector y auxiliador de nuestra debilidad.


    Por medio de él fijamos la mirada en las alturas de los cielos; por medio de él contemplamos, como en un espejo, su semblante sin mancha y sumamente exaltado; por medio de él fueron abiertos los ojos de nuestro corazón; por medio de él nuestra mente insensata y entenebrecida brota hacia la luz; por medio de él quiso el Soberano que probáramos el conocimiento inmortal[a]—él, que siendo el resplandor de su majestad es tanto mayor que los ángeles cuanto ha heredado un nombre más excelente.


    Porque así está escrito:


    «Él hace a sus ángeles vientos[b],


    y a sus ministros, llama de fuego».


    Pero acerca de su Hijo dice así:


    «Tú eres mi Hijo;


    yo te he engendrado hoy.


    Pídeme, y te daré las naciones como tu herencia,


    y los confines de la tierra como tu posesión».


    Y otra vez le dice:


    «Siéntate a mi derecha,


    hasta que ponga a tus enemigos por estrado de tus pies».


    ¿Quiénes son entonces los enemigos? Los viles y los que se oponen a su voluntad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Conocimiento inmortal» traduce literalmente ἀθανάτου γνώσεως y conserva la rareza de la expresión; no debe suavizarse a una fórmula más común.
    reason: lexical_alternative
  - marker: b
    text: La cita admite también «espíritus» para πνεύματα; se conserva «vientos» para mantener la imaginería del Salmo, sin excluir la lectura alternativa.
    reason: textual_variant
lexical_decisions:
- source_word: Αὕτη ἡ ὁδός
  english_pob_choice: This is the way
  chosen_spanish: Éste es el camino
  alternatives_spanish:
  - Ésta es la vía
  - Éste es el sendero
  lexicon: LSJ
  rationale: «Camino» conserva la resonancia bíblica y paraenética de ὁδός y suena natural en español; «vía» o «sendero» serían posibles, pero menos aptos para el tono litúrgico y exhortativo del pasaje.
- source_word: σωτήριον
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación salvadora
  - rescate
  lexicon: LSJ
  rationale: El sustantivo apunta claramente al ámbito soteriológico; «salvación» es la forma más directa y fiel en español.
- source_word: Ἰησοῦν Χριστόν
  english_pob_choice: Jesus the Messiah
  chosen_spanish: Jesús el Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesucristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no solo como parte fija del nombre; por eso se traduce «Mesías» según la política del proyecto.
- source_word: ἀρχιερέα
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - gran sacerdote
  - pontífice
  lexicon: BDAG
  rationale: «Sumo sacerdote» es el equivalente estándar y preserva la referencia cultual e intertextual, especialmente en clave hebrea.
- source_word: προσφορῶν
  english_pob_choice: offerings
  chosen_spanish: ofrendas
  alternatives_spanish:
  - oblaciones
  - sacrificios
  lexicon: BDAG
  rationale: «Ofrendas» mantiene amplitud semántica sin reducir el término a sacrificios sangrientos.
- source_word: προστάτην
  english_pob_choice: protector
  chosen_spanish: protector
  alternatives_spanish:
  - defensor
  - campeón
  lexicon: LSJ
  rationale: Conserva la idea de amparo activo y defensa; «defensor» también es viable, pero «protector» empareja bien con el siguiente término.
- source_word: βοηθὸν
  english_pob_choice: helper
  chosen_spanish: ayudador
  alternatives_spanish:
  - auxiliador
  - ayuda
  lexicon: BDAG
  rationale: «Ayudador» reproduce de forma transparente la relación de auxilio; «auxiliador» suena menos natural en español moderno.
- source_word: ἀσθενείας
  english_pob_choice: weakness
  chosen_spanish: debilidad
  alternatives_spanish:
  - fragilidad
  - enfermedad
  lexicon: BDAG
  rationale: «Debilidad» abarca tanto la fragilidad humana como la flaqueza moral sin limitar el sentido a enfermedad física.
- source_word: ἀτενίζομεν
  english_pob_choice: fix our gaze
  chosen_spanish: fijamos la mirada
  alternatives_spanish:
  - miramos atentamente
  - contemplamos con insistencia
  lexicon: BDAG
  rationale: La imagen exige una mirada sostenida e intencional; «fijamos la mirada» lo expresa con naturalidad y precisión.
- source_word: ἐνοπτριζόμεθα
  english_pob_choice: behold as in a mirror
  chosen_spanish: contemplamos, como en un espejo
  alternatives_spanish:
  - vemos reflejado
  - nos vemos como en un espejo
  lexicon: BDAG
  rationale: Se preserva la metáfora del espejo, evitando diluirla en una simple visión directa.
- source_word: ἄμωμον
  english_pob_choice: spotless
  chosen_spanish: sin mancha
  alternatives_spanish:
  - inmaculado
  - sin defecto
  lexicon: BDAG
  rationale: «Sin mancha» es claro, bíblico y conserva la imaginería de pureza visible asociada al rostro/semblante.
- source_word: ὑπερτάτην ὄψιν
  english_pob_choice: most exalted countenance
  chosen_spanish: altísimo rostro
  alternatives_spanish:
  - semblante supremamente exaltado
  - faz altísima
  lexicon: LSJ
  rationale: La combinación busca un español natural que conserve la elevación superlativa; «rostro» funciona bien con la imagen del espejo y la percepción visual.
- source_word: οἱ ὀφθαλμοὶ τῆς καρδίας
  english_pob_choice: the eyes of our heart
  chosen_spanish: los ojos de nuestro corazón
  alternatives_spanish:
  - los ojos de nuestro interior
  - los ojos del corazón
  lexicon: BDAG
  rationale: Se conserva el giro idiomático de forma casi literal porque ya tiene fuerza espiritual y retórica en español cristiano.
- source_word: ἀσύνετος καὶ ἐσκοτωμένη διάνοια
  english_pob_choice: our foolish and darkened mind
  chosen_spanish: nuestra mente insensata y entenebrecida
  alternatives_spanish:
  - nuestro entendimiento insensato y oscurecido
  - nuestra mente necia y oscurecida
  lexicon: BDAG
  rationale: «Mente» comunica bien el ámbito cognitivo; «entenebrecida» mantiene el campo de tinieblas/luz del texto.
- source_word: ἀναθάλλει
  english_pob_choice: springs up
  chosen_spanish: brota
  alternatives_spanish:
  - reverdece
  - florece de nuevo
  lexicon: LSJ
  rationale: «Brota» transmite la imagen de vida renovada que emerge hacia la luz sin añadir una paráfrasis excesiva.
- source_word: δεσπότης
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: BDAG
  rationale: «Maestro» distingue δεσπότης de κύριος y sigue la decisión inglesa de conservar una autoridad fuerte sin confundirlo con el nombre divino convencional.
- source_word: ἀθανάτου γνώσεως
  english_pob_choice: immortal knowledge
  chosen_spanish: conocimiento inmortal
  alternatives_spanish:
  - conocimiento imperecedero
  - conocimiento inmortalizado
  lexicon: BDAG
  rationale: La expresión es rara y debe mantenerse literal; «conocimiento inmortal» preserva su densidad sin explicarla de más.
- source_word: γεύσασθαι
  english_pob_choice: taste
  chosen_spanish: probáramos
  alternatives_spanish:
  - gustáramos
  - participáramos de
  lexicon: BDAG
  rationale: El verbo conserva su metáfora sensorial; en español «probar» comunica bien el matiz de experimentar de manera real.
- source_word: ἀπαύγασμα
  english_pob_choice: radiance
  chosen_spanish: resplandor
  alternatives_spanish:
  - fulgor
  - irradiación
  lexicon: BDAG
  rationale: «Resplandor» es natural y digno, y mantiene la posible alusión sapiencial/hebreosiana de luminosidad procedente de Dios.
- source_word: μεγαλοσύνης
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - grandeza
  - excelencia
  lexicon: BDAG
  rationale: «Majestad» reproduce mejor el registro elevado y el valor divino del término.
- source_word: λειτουργούς
  english_pob_choice: ministers
  chosen_spanish: ministros
  alternatives_spanish:
  - servidores
  - oficiantes
  lexicon: BDAG
  rationale: «Ministros» mantiene el matiz de servicio litúrgico/culto presente en la cita.
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: BDAG
  rationale: En la cita salmódica el sentido territorial-político es principal; «naciones» es la equivalencia más directa.
- source_word: κατάσχεσίν
  english_pob_choice: possession
  chosen_spanish: posesión
  alternatives_spanish:
  - dominio
  - tenencia
  lexicon: LSJ
  rationale: «Posesión» equilibra la paralela «herencia» y mantiene el lenguaje de propiedad sin sobreinterpretarlo.
- source_word: φαῦλοι
  english_pob_choice: the vile
  chosen_spanish: los viles
  alternatives_spanish:
  - los perversos
  - los malvados
  lexicon: BDAG
  rationale: «Viles» retiene la idea de bajeza moral con una fuerza distinta de un simple «malvados».
- source_word: ἀντιτασσόμενοι
  english_pob_choice: those who set themselves against
  chosen_spanish: los que se ponen contra
  alternatives_spanish:
  - los que se oponen
  - los que resisten
  lexicon: BDAG
  rationale: La forma reflexiva ayuda a mostrar la oposición activa y deliberada presente en el participio.
- source_word: θέλημα
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - propósito
  - querer
  lexicon: BDAG
  rationale: «Voluntad» es el equivalente más estándar y conserva el registro bíblico del término.
theological_decisions:
- issue: Tratamiento de Χριστός como título en un texto confesional temprano
  english_pob_reading: Jesus the Messiah
  chosen_spanish_reading: Jesús el Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesucristo
  rationale: El contexto presenta a Χριστός con valor titular, no meramente onomástico. Traducirlo como «Mesías» preserva el contenido confesional y evita ocultar el sentido del título.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres'
- issue: Distinción entre δεσπότης y κύριος en el pasaje
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Soberano
  rationale: Se evita «Señor» para no nivelar δεσπότης con el lenguaje más habitual para Dios o Cristo. «Maestro» mantiene autoridad y distingue el término sin forzarlo.
  doctrine_reference: 'DOCTRINE.md: conservar distinciones léxicas importantes'
- issue: Cita de Salmo 104:4 con πνεύματα
  english_pob_reading: He makes his angels winds
  chosen_spanish_reading: Él hace a sus ángeles vientos
  alternative_spanish_readings:
  - espíritus
  - alientos
  rationale: «Vientos» preserva mejor la imaginería elemental de la cita; el sentido alternativo «espíritus» se registra como posibilidad léxica, sin borrar la tensión textual.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y textual'
- issue: Pronombre posesivo en 'su rostro sin mancha y altísimo'
  english_pob_reading: his spotless and most exalted countenance
  chosen_spanish_reading: su rostro sin mancha y altísimo
  alternative_spanish_readings:
  - el rostro del Hijo
  - el rostro de Dios
  rationale: Se deja el posesivo sin resolver del todo su referente, porque el contexto mueve entre acceso por el Hijo y visión de la gloria divina; resolverlo demasiado estrecharía la textura teológica del pasaje.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones teológicas no resueltas'
- issue: Conocimiento inmortal como objeto de 'gustar/probar'
  english_pob_reading: taste immortal knowledge
  chosen_spanish_reading: probáramos el conocimiento inmortal
  alternative_spanish_readings:
  - gustáramos el conocimiento inmortal
  - experimentáramos conocimiento inmortal
  rationale: El verbo sensorial se conserva para no abstraer la imagen. «Probar» en español permite la experiencia real sin diluir la metáfora.
  doctrine_reference: 'DOCTRINE.md: mantener imágenes bíblicas cuando sean portadoras de sentido'
translation_notes:
  revision_awareness: Se revisó el texto inglés auditado junto con el griego normalizado de Funk 1901. La versión española sigue la decisión óptima-equivalente del POB, conserva la secuencia retórica del original y mantiene las tensiones léxicas señaladas en el audit trail, especialmente en Χριστός, δεσπότης y la cita de Salmo 104:4.
  spanish_consistency_notes:
  - Se usó «Jesús el Mesías» conforme a la política del proyecto para títulos cristológicos.
  - Se evitó «SEÑOR» para YHWH porque este pasaje no contiene una cita directa del nombre divino; donde aparece δεσπότης se distinguió como «Maestro».
  - Se mantuvo el registro cultual con «sumo sacerdote», «ofrendas» y «ministros».
  - Se preservó la metáfora del espejo, la luz y los ojos del corazón sin explicaciones añadidas.
  - Se optó por «vientos» en la cita bíblica, con nota para la lectura alternativa «espíritus».
