  text: Αὕτη ἡ ὁδός, ἀγαπητοί, ἐν ᾗ εὕρομεν τὸ σωτήριον ἡμῶν, Ἰησοῦν Χριστόν, τὸν ἀρχιερέα τῶν προσφορῶν ἡμῶν, τὸν προστάτην καὶ βοηθὸν τῆς ἀσθενείας ἡμῶν. 2. διὰ τούτου ἀτενίζομεν εἰς τὰ ὕψη τῶν οὐρανῶν, διὰ τούτου ἐνοπτριζόμεθα τὴν ἄμωμον καὶ ὑπερτάτην ὄψιν αὐτοῦ, διὰ τούτου ἠνεῴχθησαν ἡμῶν οἱ ὀφθαλμοὶ τῆς καρδίας, διὰ τούτου ἡ ἀσύνετος καὶ ἐσκοτωμένη διάνοια ἡμῶν ἀναθάλλει εἰς τὸ φῶς, διὰ τούτου ἠθέλησεν ὁ δεσπότης τῆς ἀϑανάτου γνώσεως ἡμᾶς γεύσασϑαι, ὃς ὢν ἀπαύγασμα τῆς μεγαλοσύνης αὐτοῦ, τοσούτῳ μείζων ἐστὶν ἀγγέλων, ὅσῳ διαφορώτερον ὄνομα κεκληρονόμηκεν. 3. γέγραπται γὰρ οὕτως· ‘Ὁ ποιῶν τοὺς ἀγγέλους αὐτοῦ πνεύματα καὶ τοὺς λειτουργοὺς αὐτοῦ πυρὸς φλόγα. 4. ἐπὶ δὲ τῷ υἱῷ αὐτοῦ οὕτως· εἶπεν ὁ δεσπότης· Υἱός μου εἶ σύ, ἐγὼ σήμερον γεγέννηκά σε· αἴτησαι παρ’ ἐμοῦ, καὶ δώσω σοι ἔϑνη τὴν κληρονομίαν σου καὶ τὴν κατάσχεσίν σου τὰ πέρατα τῆς γῆς. 5. καὶ πάλιν λέγει πρὸς αὐτόν· Κάϑου ἐκ δεξιῶν μου, ἕως ἂν ϑῶ τοὺς ἐχϑρούς σου ὑποπόδιον τῶν ποδῶν σου. 6. τίνες οὖν οἱ ἐχϑροί; οἱ φαῦλοι καὶ ἀντιτασσόμενοι
    τῷ ϑελήματι αὐτοῦ.
