review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro inglés: conserva «Jesús el Mesías», «sumo sacerdote», «ofrendas», la cadena anafórica «por medio de él», la tensión de «su» en la visión mediada, y la cita de Sal 104:4 con nota sobre «vientos/espíritus». Sin embargo, hay varios puntos mejorables: «Maestro» para δεσπότης debilita el sentido de autoridad soberana; «ayudador» y «se ponen contra» suenan poco naturales; «en el cual» con «camino» es menos idiomático que «por el cual»; y «rostro sin mancha y altísimo» es menos fiel/fluido que una formulación con «semblante» o «rostro… exaltado».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero presenta algunas asperezas de legibilidad y registro eclesial amplio. «Ayudador» resulta poco natural en español general; «Maestro» introduce una noción docente más que señorial; «altísimo» aplicado directamente a «rostro» suena forzado; y «los que se ponen contra» es menos idiomático que «los que se oponen». La puntuación y estructura global están bien logradas.
  glossary_alignment: Buena alineación con la política del proyecto en «Mesías», «Jesús», «Dios» implícito, y preservación de imágenes como «ojos de nuestro corazón» y «conocimiento inmortal». La excepción principal es δεσπότης, donde conviene «Soberano» para distinguirlo de κύριος sin caer en «Maestro», que no refleja bien la fuerza léxica documentada. También conviene preferir «ayuda»/«auxilio» o «ayudante» no, mejor «protector y ayuda» no es ideal; «protector y auxilio» sería posible, pero «protector y ayudador» no alcanza la naturalidad esperada.
  issues:
  - severity: medium
    issue: δεσπότης traducido como «Maestro»
    rationale: El griego apunta a autoridad soberana/dominal, no principalmente a docencia. «Soberano» distingue mejor δεσπότης de κύριος y preserva la fuerza del original y del audit trail inglés.
  - severity: medium
    issue: «ayudador» suena poco natural en español moderno neutral
    rationale: Aunque transparente, no es la opción más legible ni digna para un registro eclesial amplio. «Ayudante» sería demasiado débil; mejor reestructurar como «protector y quien socorre» o usar «auxiliador» si se acepta el matiz más elevado. Aquí conviene «protector y auxilio» no funciona bien para persona, así que «protector y quien socorre» o «protector y ayudante»; la opción más natural y fiel es «protector y ayuda» no. Se recomienda «protector y quien nos ayuda» evitaría literalidad excesiva. Para mantener concisión, «protector y auxiliador» es aceptable y más natural que «ayudador» en registro bíblico.
  - severity: low
    issue: «en el cual encontramos» con «camino»
    rationale: Con «camino», «por el cual» suena más idiomático para expresar medio/acceso, sin apartarse del sentido.
  - severity: medium
    issue: «su rostro sin mancha y altísimo» es rígido y semánticamente extraño
    rationale: ὄψις se refiere a apariencia/semblante/countenance. En español, «semblante sin mancha y sumamente exaltado» o «su rostro sin mancha y muy exaltado» comunica mejor la construcción sin sonar forzado.
  - severity: low
    issue: «los que se ponen contra su voluntad»
    rationale: Es comprensible, pero «los que se oponen a su voluntad» expresa mejor el participio ἀντιτασσόμενοι en español natural.
  revised_spanish_text: 'Éste es el camino, amados, por el cual encontramos nuestra salvación: Jesús el Mesías, el sumo sacerdote de nuestras ofrendas, el protector y auxiliador de nuestra debilidad.


    Por medio de él fijamos la mirada en las alturas de los cielos; por medio de él contemplamos, como en un espejo, su semblante sin mancha y sumamente exaltado; por medio de él fueron abiertos los ojos de nuestro corazón; por medio de él nuestra mente insensata y entenebrecida brota hacia la luz; por medio de él quiso el Soberano que probáramos el conocimiento inmortal[a]—él, que siendo el resplandor de su majestad es tanto mayor que los ángeles cuanto ha heredado un nombre más excelente.


    Porque así está escrito:


    «Él hace a sus ángeles vientos[b],


    y a sus ministros, llama de fuego».


    Pero acerca de su Hijo dice así:


    «Tú eres mi Hijo;


    yo te he engendrado hoy.


    Pídeme, y te daré las naciones como tu herencia,


    y los confines de la tierra como tu posesión».


    Y otra vez le dice:


    «Siéntate a mi derecha,


    hasta que ponga a tus enemigos por estrado de tus pies».


    ¿Quiénes son entonces los enemigos? Los viles y los que se oponen a su voluntad.'
  revised_footnotes:
  - marker: a
    text: «Conocimiento inmortal» traduce literalmente ἀθανάτου γνώσεως y conserva la rareza de la expresión; no debe suavizarse a una fórmula más común.
    reason: lexical_alternative
  - marker: b
    text: La cita admite también «espíritus» para πνεύματα; se conserva «vientos» para mantener la imaginería del Salmo, sin excluir la lectura alternativa.
    reason: textual_variant
  revision_rationale: 'Se proponen ajustes menores pero importantes para mejorar fidelidad léxica y naturalidad del español sin cambiar la arquitectura del pasaje: «Soberano» por δεσπότης, «auxiliador» por «ayudador», «por el cual» con «camino», una formulación más natural para ὑπερτάτην ὄψιν, y «se oponen» por «se ponen contra».'
