translation:
  language: es
  text: 'Pero acerca de su Hijo[a], el Maestro habló así:


    “Tú eres mi Hijo;


    yo te he engendrado hoy.


    Pídeme, y te daré las naciones por herencia,


    y los confines de la tierra por posesión.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero acerca de su Hijo, el Maestro habló así:».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπὶ δὲ τῷ υἱῷ αὐτοῦ
  english_pob_choice: But concerning his Son
  chosen_spanish: Pero acerca de su Hijo
  alternatives_spanish:
  - Pero en cuanto a su Hijo
  - Pero respecto de su Hijo
  lexicon: source phrase with ἐπί + dative; ὑιός
  rationale: ‘Acerca de’ comunica de forma natural el valor de referencia temática de ἐπὶ τῷ υἱῷ αὐτοῦ sin añadir interpretación. Mantiene el giro discursivo del POB inglés y es idiomático en español.
- source_word: εἶπεν ὁ δεσπότης
  english_pob_choice: the Master spoke thus
  chosen_spanish: el Maestro habló así
  alternatives_spanish:
  - el Señor habló así
  - el Dueño habló así
  lexicon: δεσπότης
  rationale: ‘Maestro’ preserva el título reverente que el POB inglés resolvió como ‘Master’ y evita sustituirlo por ‘Señor’, que en español tendería a borrar la fuerza distintiva de δεσπότης en 1 Clement.
- source_word: Υἱός μου εἶ σύ
  english_pob_choice: You are my Son
  chosen_spanish: Tú eres mi Hijo
  alternatives_spanish:
  - Eres mi Hijo
  - Hijo mío eres tú
  lexicon: υἱός
  rationale: Se mantiene la filiación directa y solemne con el orden natural del español, sin alterar el sentido ni la cita bíblica.
- source_word: ἐγὼ σήμερον γεγέννηκά σε
  english_pob_choice: today I have begotten you
  chosen_spanish: yo te he engendrado hoy
  alternatives_spanish:
  - hoy te he engendrado
  - yo te engendré hoy
  lexicon: γεννάω
  rationale: ‘He engendrado’ conserva la fuerza de generación/filiación del verbo griego y evita reducirlo a un simple ‘nacer’. El perfecto compuesto español refleja bien el valor resultativo del perfecto griego en una cita solemne.
- source_word: αἴτησαι παρ’ ἐμοῦ
  english_pob_choice: Ask of me
  chosen_spanish: Pídeme
  alternatives_spanish:
  - Pide de mí
  - Solicítame
  lexicon: αἰτέω
  rationale: ‘Pídeme’ es la forma más natural en español para una petición dirigida a una persona con objeto implícito, y preserva la súplica/solicitud implícita del imperativo griego.
- source_word: καὶ δώσω σοι ἔθνη τὴν κληρονομίαν σου
  english_pob_choice: and I will give you the nations as your inheritance
  chosen_spanish: y te daré las naciones por herencia
  alternatives_spanish:
  - y te daré las naciones como herencia
  - y te daré las naciones por tu herencia
  lexicon: ἔθνη; κληρονομία
  rationale: ‘Por herencia’ reproduce la relación predicativa del inglés del POB y mantiene el valor patrimonial/covenantal de κληρονομία sin sobreexplicar.
- source_word: καὶ τὴν κατάσχεσίν σου τὰ πέρατα τῆς γῆς
  english_pob_choice: and the ends of the earth as your possession
  chosen_spanish: y los confines de la tierra por posesión
  alternatives_spanish:
  - y los confines de la tierra como posesión
  - y los extremos de la tierra por posesión
  lexicon: κατάσχεσις; τὰ πέρατα τῆς γῆς
  rationale: ‘Confin(es) de la tierra’ es la expresión bíblica natural para τὰ πέρατα τῆς γῆς, y ‘por posesión’ conserva el sentido de propiedad heredada o adquirida que el inglés del POB expresa con ‘possession’.
theological_decisions:
- issue: Título de Dios en 1 Clement 36:4
  english_pob_reading: the Master spoke thus
  chosen_spanish_reading: el Maestro habló así
  alternative_spanish_readings:
  - el Señor habló así
  - el Dueño habló así
  rationale: La revisión inglesa corrige una omisión importante y restaura δεσπότης. En español, ‘Maestro’ conserva el título distinguible sin ocultarlo bajo ‘Señor’, que podría confundirse con convenciones litúrgicas distintas del testimonio textual aquí.
  doctrine_reference: Christology / divine sovereignty in extra-canonical citation
- issue: Cita del Salmo 2:7 y su fuerza filológica
  english_pob_reading: today I have begotten you
  chosen_spanish_reading: yo te he engendrado hoy
  alternative_spanish_readings:
  - hoy te he engendrado
  - yo te engendré hoy
  rationale: Se mantiene la formulación de engendramiento, que es teológicamente significativa y no debe suavizarse a ‘te he dado a luz’ ni a una paraphrase. El perfecto compuesto permite una lectura sobria y fiel.
  doctrine_reference: Psalm 2:7 / filial declaration
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada que corrigió la omisión de εἶπεν ὁ δεσπότης; por eso la traducción incluye explícitamente «el Maestro habló así» y no reduce la frase a una simple fórmula introductoria. También se evitó la anterior omisión del segmento de atribución, y la nota alternativa se ancla en el texto con [a].
  spanish_consistency_notes:
  - Se usa «Maestro» de manera consistente para δεσπότης en esta sección, en vez de «Señor», para no ocultar el título griego documentado.
  - Se conservan «naciones», «herencia» y «posesión» en una estructura paralela clara, acorde con el griego y con la lectura inglesa auditada.
  - La puntuación introduce comillas y saltos de línea para reflejar la cita directa en estilo publicable.
  - El marcador [a] aparece exactamente en el texto y corresponde a la única nota al pie incluida.
