translation:
  language: es
  text: 'Y de nuevo le dice: «Siéntate a mi derecha, hasta que ponga a tus enemigos como estrado para tus pies».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ πάλιν λέγει πρὸς αὐτόν
  english_pob_choice: And again he says to him
  chosen_spanish: Y de nuevo le dice
  alternatives_spanish:
  - Y otra vez le dice
  - Y nuevamente le dice
  lexicon: καὶ πάλιν
  rationale: «De nuevo» reproduce bien la repetición discursiva del griego y conserva el tono de cita introducida, sin añadir matices extra. Se omite «a él» porque el dativo de destinatario ya queda claro en español con el contexto de cita directa.
- source_word: Κάϑου ἐκ δεξιῶν μου
  english_pob_choice: Sit at my right hand
  chosen_spanish: Siéntate a mi derecha
  alternatives_spanish:
  - Siéntate a mi lado derecho
  - Siéntate a mi diestra
  lexicon: Κάϑου ἐκ δεξιῶν μου
  rationale: «A mi derecha» expresa de forma natural la posición honorífica del original. Se evita «diestra» por ser más marcada o arcaizante en español general, aunque sigue siendo una alternativa válida.
- source_word: ἕως ἂν ϑῶ
  english_pob_choice: until I make
  chosen_spanish: hasta que ponga
  alternatives_spanish:
  - hasta que haga
  - hasta que coloque
  lexicon: ἕως ἂν + subjuntivo de τίθημι
  rationale: «Hasta que ponga» refleja con claridad el valor de «poner/colocar» de τίθημι y mantiene la relación de finalidad temporal del griego.
- source_word: τοὺς ἐχϑρούς σου
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - los enemigos tuyos
  - tus adversarios
  lexicon: ἐχθροί
  rationale: «Enemigos» es la correspondencia directa y más transparente; «adversarios» suavizaría el término sin base contextual suficiente.
- source_word: ὑποπόδιον τῶν ποδῶν σου
  english_pob_choice: a footstool for your feet
  chosen_spanish: como estrado para tus pies
  alternatives_spanish:
  - por estrado de tus pies
  - como escabel para tus pies
  lexicon: ὑποπόδιον
  rationale: «Estrado» comunica el objeto de apoyo bajo los pies con dignidad literaria. «Escabel» es posible, pero menos común en registro bíblico actual. Se añade «como» para reflejar la función predicativa del griego y evitar una literalidad extraña.
theological_decisions:
- issue: Entonación de la cita sobre el lugar de honor a la derecha
  english_pob_reading: Sit at my right hand
  chosen_spanish_reading: Siéntate a mi derecha
  alternative_spanish_readings:
  - Siéntate a mi diestra
  rationale: La frase conserva la imagen de entronización y honor sin convertirla en una fórmula eclesiástica fija. No se sustituye por un giro litúrgico más tradicional si no aporta mayor fidelidad.
  doctrine_reference: Salmo 110:1; uso cristológico en el NT
- issue: Imagen final de sometimiento de enemigos
  english_pob_reading: until I make your enemies a footstool for your feet
  chosen_spanish_reading: hasta que ponga a tus enemigos como estrado para tus pies
  alternative_spanish_readings:
  - hasta que haga de tus enemigos un estrado para tus pies
  - hasta que convierta a tus enemigos en estrado para tus pies
  rationale: Se conserva la metáfora de humillación y sometimiento con la menor reinterpretación posible. «Como estrado» mantiene la comparación implícita del original y su fuerza poética.
  doctrine_reference: Salmo 110:1; tema de la victoria mesiánica
translation_notes:
  revision_awareness: 'La versión inglesa auditada quedó sin cambios tras la última revisión (''unchanged: true''; ''high_agreement''). Por ello, el español se produce directamente desde el griego con concordancia alta respecto del texto base auditado, sin necesidad de introducir notas de variante ni ajustes de revisión.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente de la cita en estilo directo con comillas españolas.
  - Se conserva la correspondencia singular de segunda persona («tus pies») y el verbo en primera persona divina («ponga»), coherente con el griego.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino; la frase cita una entronización y no requiere sustitución terminológica.
