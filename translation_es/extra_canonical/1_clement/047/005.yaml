revisions:
- from: Pero ahora consideren quiénes los desviaron y disminuyeron la dignidad de su reconocida fraternidad[a][b].
  to: Pero ahora consideren quiénes los desviaron y rebajaron la dignidad de su reconocido amor fraternal[a][b].
  rationale: 'Se hace una reparación menor para mejorar precisión léxica y naturalidad del español: «amor fraternal» refleja mejor φιλαδελφία que «fraternidad», y «rebajaron la dignidad» suena más idiomático que «disminuyeron la dignidad». Se conservan las alternativas documentadas por el rastro inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:53:47Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: conserva el imperativo exhortativo («consideren»), respeta el sujeto plural de τίνες («quiénes»), y refleja la doble acción de διέστρεψαν / ἐμείωσαν. Sin embargo, «disminuyeron la dignidad» suena menos natural en español con objeto abstracto; el griego expresa que redujeron o rebajaron ese carácter digno. Además, φιλαδελφία se expresa mejor aquí como «amor fraternal» que como «fraternidad», porque el original nombra una cualidad afectiva/relacional, no primariamente una entidad o colectividad.'
  spanish_quality_summary: El texto es legible y digno, pero admite una mejora pequeña para mayor naturalidad y precisión semántica. «Su reconocido amor fraternal» fluye mejor y comunica más directamente φιλαδελφία. También conviene ajustar la nota a para que no sugiera variante textual; es una alternativa léxica o traducción previa, no un cambio de base textual.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión clave es φιλαδελφία: «amor fraternal» preserva mejor el valor léxico que «fraternidad». «Desviaron» para διέστρεψαν es aceptable y coherente con el historial inglés («led you astray»), con «pervirtieron» conservado como alternativa en nota.'
  issues:
  - severity: medium
    issue: «fraternidad» debilita el sentido de φιλαδελφία
    rationale: φιλαδελφία en este contexto se refiere más naturalmente al amor fraternal entre los creyentes que a una fraternidad como cuerpo o estado. «Amor fraternal» es más preciso y más cercano al original.
  - severity: low
    issue: «disminuyeron la dignidad» es algo rígido en español
    rationale: Aunque comprensible, con un sustantivo abstracto suena menos idiomático que «rebajaron la dignidad» o «redujeron». El sentido de ἐμείωσαν queda mejor expresado con «rebajaron».
  - severity: low
    issue: La razón de la nota a está mal clasificada como textual_variant
    rationale: No se trata de una variante textual del griego sino de una alternativa de traducción/lexical previa. Conviene reflejarlo correctamente en la revisión editorial.
  revised_spanish_text: Pero ahora consideren quiénes los desviaron y rebajaron la dignidad de su reconocido amor fraternal[a][b].
