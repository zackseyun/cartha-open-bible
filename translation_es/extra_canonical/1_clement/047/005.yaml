  text: νυνὶ δὲ κατανοήσατε, τίνες ὑμᾶς διέστρεψαν καὶ τὸ σεμνὸν τῆς περιβοήτου φιλαδελφίας ὑμῶν ἐμείωσαν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/047/005.yaml
  text: But now consider who led you astray and diminished the dignity of your renowned brotherly love[a][b].
  footnotes:
  - marker: a
    text: Or 'who it is that has perverted you'.
    reason: previous_rendering
  - marker: b
    text: Or 'widely spoken-of'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:54Z'
    unchanged: false
    changes_summary: Changed 'perverted you' to 'led you astray' for a more natural and contextually appropriate rendering of διέστρεψαν, while retaining the rest of the verse essentially unchanged.
translation:
  language: es
  text: Pero ahora consideren quiénes los desviaron y rebajaron la dignidad de su reconocido amor fraternal[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quiénes los pervirtieron».'
    reason: previous_rendering
  - marker: b
    text: 'O: «célebre», «muy conocido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατανοήσατε
  english_pob_choice: consider
  chosen_spanish: consideren
  alternatives_spanish:
  - reflexionen
  - tomen en cuenta
  lexicon: κατανοέω
  rationale: El verbo pide una atención deliberada a la situación; «consideren» conserva el llamado directo a examinar con discernimiento sin añadir matices no presentes en el griego.
- source_word: τίνες ὑμᾶς διέστρεψαν
  english_pob_choice: who led you astray
  chosen_spanish: quiénes los desviaron
  alternatives_spanish:
  - quiénes los llevaron por mal camino
  - quiénes los pervirtieron
  lexicon: τίς + διαστρέφω
  rationale: τίνες es plural, así que uso «quiénes». Para διέστρεψαν, «desviaron» mantiene la idea de apartar o torcer el camino; evita el exceso de dureza de «pervirtieron» y sigue siendo fiel a la fuerza del verbo.
- source_word: τὸ σεμνὸν
  english_pob_choice: the dignity
  chosen_spanish: la dignidad
  alternatives_spanish:
  - el carácter digno
  - la nobleza
  lexicon: σεμνός
  rationale: En este contexto, σεμνόν funciona como sustantivado y apunta a lo honorable/digno. «Dignidad» comunica bien esa cualidad elevada en español contemporáneo.
- source_word: τῆς περιβοήτου φιλαδελφίας ὑμῶν
  english_pob_choice: of your renowned brotherly love
  chosen_spanish: de su reconocida fraternidad
  alternatives_spanish:
  - de su fraternidad célebre
  - de su amor fraternal tan conocido
  lexicon: περιβόητος + φιλαδελφία
  rationale: «Reconocida» transmite la idea de algo muy conocido o celebrado sin sonar artificial. «Fraternidad» conserva el campo de φιλαδελφία, aunque también puede entenderse como amor fraternal; elegí la forma nominal más natural para este registro.
theological_decisions:
- issue: Sentido de la exhortación y del sujeto de la pregunta
  english_pob_reading: But now consider who led you astray
  chosen_spanish_reading: Pero ahora consideren quiénes los desviaron
  alternative_spanish_readings:
  - Pero ahora consideren quién los desvió
  - Pero ahora consideren quiénes los llevaron por mal camino
  rationale: El griego tiene una pregunta plural («quiénes»), no una singular. Mantengo el tono exhortativo sin suavizar la corrección comunitaria implícita en el texto.
  doctrine_reference: Exhortación moral y corrección eclesial en 1 Clemente 47:5
translation_notes:
  revision_awareness: 'El audit trail inglés fue revisado para preferir una lectura más cercana al griego: τίνες es plural y διέστρεψαν es aoristo plural, por lo que la versión española evita una construcción singular o perifrástica. También se adoptó un equivalente natural para περιβόητος como «reconocida» en vez de una calca literal.'
  spanish_consistency_notes:
  - Se preserva el registro exhortativo y comunitario del original.
  - «Fraternidad» se usa como equivalente de φιλαδελφία para mantener la relación fraterna sin perder claridad.
  - No se introduce lenguaje eclesiástico tradicional que no esté exigido por el texto.
