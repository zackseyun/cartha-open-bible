  timestamp: '2026-05-07T22:56:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: la doble intensificación de αἰσχρά, la evaluación moral de ἀνάξια, la referencia idiomática a la ἐν Χριστῷ ἀγωγή, la caracterización de la iglesia corintia como βεβαιοτάτην καὶ ἀρχαίαν, y la idea de facción/rebelión contra los πρεσβύτεροι por una o dos personas. Sin embargo, «tan firmemente establecida» añade un matiz explicativo no necesario y desplaza el superlativo de βεβαιοτάτην; conviene una forma más directa.'
  spanish_quality_summary: El español es claro y eclesialmente legible. La estructura con rayas funciona bien. No obstante, «la iglesia corintia, tan firmemente establecida y antigua» suena algo perifrástico; «la antiquísima y muy firme iglesia de los corintios» sería demasiado literal, pero una formulación como «la muy firme y antigua iglesia de los corintios» mantiene mejor el énfasis y la sintaxis sin rigidez. También es preferible «a causa de» frente a «por causa de» por mayor naturalidad.
  glossary_alignment: Buena alineación general con la terminología del proyecto. «Cristo» en ἐν Χριστῷ sigue correctamente la adjudicación inglesa. «Presbíteros» es defendible por precisión eclesial. La nota alternativa sobre «Mesías» puede conservarse porque el rastro inglés la conserva. No hay conflicto con glosario mayor.
  issues:
  - severity: medium
    issue: βεβαιοτάτην se vierte como «tan firmemente establecida»
    rationale: La frase española introduce una paráfrasis explicativa y atenúa el valor superlativo/directo del adjetivo griego. Una formulación más cercana como «la muy firme y antigua iglesia de los corintios» preserva mejor el énfasis sin sonar antinatural.
  - severity: low
    issue: «por causa de» suena menos natural que «a causa de»
    rationale: Ambas son comprensibles, pero «a causa de una o dos personas» fluye mejor en español general y mantiene el mismo sentido causal.
  revised_spanish_text: Es vergonzoso[a], amados—muy vergonzoso y no digno de la conducta en Cristo—que se oiga que la muy firme y antigua iglesia de los corintios está en rebelión contra los presbíteros a causa de una o dos personas.
  revised_footnotes:
  - marker: a
    text: O «conducta en el Mesías».
    reason: alternative_reading
  revision_rationale: Se ajusta βεβαιοτάτην καὶ ἀρχαίαν a una expresión española más directa y fiel al énfasis del griego, y se pule la naturalidad de la expresión causal. Se conserva la nota sobre «Mesías» en línea con el audit trail inglés. No se requiere nueva adjudicación doctrinal o textual.
