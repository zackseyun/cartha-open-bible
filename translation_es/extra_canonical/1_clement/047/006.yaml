source:
  edition: Funk 1901 (normalized OCR)
  text: αἰσχρά, ἀγαπητοί, καὶ λίαν αἰσχρὰ καὶ ἀνάξια τῆς ἐν Χριστῷ ἀγωγῆς ἀκούεσθαι, τὴν βεβαιοτάτην καὶ ἀρχαίαν Κορνθίων ἐκκλησίαν δι’ ἓν ἢ δύο πρόσωπα στασιάζειν πρὸς τοὺς πρεσβυτέρους.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/047/006.yaml
  text: It is shameful[a], beloved—very shameful and unworthy of conduct in Christ—that it should be heard that the very steadfast and ancient church of the Corinthians is in revolt against the elders because of one or two persons.
  footnotes:
  - marker: a
    text: Or 'conduct in the Messiah'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:54Z'
    unchanged: false
    changes_summary: Removed the comma after 'very shameful' for smoother English. Otherwise retained the draft, which accurately and naturally reflects the Greek.
translation:
  language: es
  text: Es vergonzoso[a], amados—muy vergonzoso y no digno de la conducta en Cristo—que se oiga que la muy firme y antigua iglesia de los corintios está en rebelión contra los presbíteros a causa de una o dos personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conducta en el Mesías».
    reason: alternative_reading
lexical_decisions:
- source_word: αἰσχρά / αἰσχρὰ
  english_pob_choice: It is shameful / very shameful
  chosen_spanish: Es vergonzoso / muy vergonzoso
  alternatives_spanish:
  - Es deshonroso
  - Es afrentoso
  lexicon: αἰσχρός
  rationale: «Vergonzoso» expresa bien el juicio moral y social del griego sin endurecerlo innecesariamente. La repetición intensiva («muy vergonzoso») conserva la fuerza de αἰσχρά ... καὶ λίαν αἰσχρὰ.
- source_word: ἀνάξια
  english_pob_choice: unworthy
  chosen_spanish: no digno de
  alternatives_spanish:
  - indigno de
  - no apropiado para
  lexicon: ἀνάξιος
  rationale: «No digno de» mantiene la estructura evaluativa del original y suena natural en español. «Indigno de» es posible, pero resulta más acusatorio; «no apropiado para» debilita la carga moral.
- source_word: ἡ ἐν Χριστῷ ἀγωγή
  english_pob_choice: conduct in Christ
  chosen_spanish: la conducta en Cristo
  alternatives_spanish:
  - la conducta en el Mesías
  - el modo de vivir en Cristo
  lexicon: ἀγωγή
  rationale: Sigo la revisión inglesa que prefirió «Christ» sobre «Messiah» por el carácter idiomático fijo de ἐν Χριστῷ en este contexto temprano cristiano. «Conducta» conserva el sentido de comportamiento/formación de vida que da ἀγωγή.
- source_word: βεβαιοτάτην καὶ ἀρχαίαν
  english_pob_choice: the very steadfast and ancient
  chosen_spanish: tan firmemente establecida y antigua
  alternatives_spanish:
  - la muy firme y antigua
  - la más sólida y antigua
  lexicon: βεβαιότατος; ἀρχαῖος
  rationale: «Firmemente establecida» reproduce la idea de estabilidad consolidada más que la mera firmeza abstracta. «Antigua» traduce ἀρχαίαν sin añadir matiz de superioridad no explícito.
- source_word: στασιάζειν
  english_pob_choice: is in revolt
  chosen_spanish: está en rebelión
  alternatives_spanish:
  - se ha levantado en facción
  - está amotinada
  lexicon: στασιάζω
  rationale: «En rebelión» comunica la idea de sedición/facción de forma clara y sobria. «Amotinada» sería demasiado fuerte y «levantado en facción» demasiado técnico para español general.
- source_word: πρεσβυτέρους
  english_pob_choice: the elders
  chosen_spanish: los presbíteros
  alternatives_spanish:
  - los ancianos
  - los líderes
  lexicon: πρεσβύτερος
  rationale: Conservo «presbíteros» porque el término es el equivalente eclesial directo y mantiene la terminología de la comunidad cristiana primitiva. «Ancianos» sería válido, pero menos preciso en español eclesial contemporáneo.
theological_decisions:
- issue: Χριστός en la expresión ἐν Χριστῷ
  english_pob_reading: conduct in Christ, with a footnote allowing 'the Messiah' as an alternative rendering
  chosen_spanish_reading: conducta en Cristo, con nota alternativa posible «el Mesías»
  alternative_spanish_readings:
  - conducta en el Mesías
  rationale: La revisión inglesa adjudicó que, en 1 Clemente y en este sintagma fijo, Χριστός funciona primariamente como título/identidad cristiana establecida, no como el título judío resaltado. Por eso la traducción principal mantiene «Cristo», aunque se deja constancia de la alternativa semántica.
  doctrine_reference: Cristología temprana; uso idiomático de ἐν Χριστῷ en la literatura cristiana primitiva
translation_notes:
  revision_awareness: 'The English audit trail shows a single lexical/theological revision: the phrase ἐν Χριστῷ moved from ''conduct in the Messiah'' to ''conduct in Christ'' on contextual grounds. The Spanish draft follows the final English reading while preserving the alternative in a note, and otherwise tracks the established English wording closely without introducing new interpretive shifts.'
  spanish_consistency_notes:
  - Usé «Cristo» en la frase fija «en Cristo» para alinearme con la adjudicación del expediente y con el uso temprano cristiano del sintagma.
  - Mantuve una sintaxis periodística fiel al griego, con incisos marcados por guiones, porque el texto combina evaluación moral y acusación comunitaria en una sola unidad.
  - Elegí «presbíteros» en lugar de «ancianos» para sostener la terminología eclesial técnica sin perder inteligibilidad.
