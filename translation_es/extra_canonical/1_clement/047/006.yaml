revisions:
- from: Es vergonzoso[a], amados—muy vergonzoso y no digno de la conducta en Cristo—que se oiga que la iglesia corintia, tan firmemente establecida y antigua, está en rebelión contra los presbíteros por causa de una o dos personas.
  to: Es vergonzoso[a], amados—muy vergonzoso y no digno de la conducta en Cristo—que se oiga que la muy firme y antigua iglesia de los corintios está en rebelión contra los presbíteros a causa de una o dos personas.
  rationale: Se ajusta βεβαιοτάτην καὶ ἀρχαίαν a una expresión española más directa y fiel al énfasis del griego, y se pule la naturalidad de la expresión causal. Se conserva la nota sobre «Mesías» en línea con el audit trail inglés. No se requiere nueva adjudicación doctrinal o textual.
