revisions:
- from: Y la noticia no solo ha llegado a nosotros[a], sino también a los que están alejados de nosotros, de modo que hasta blasfemias[b] se lanzan contra el nombre del Señor a causa de vuestra insensatez, mientras vosotros os acarreáis peligro.
  to: Y la noticia no solo ha llegado a nosotros, sino también a los que están alejados de nosotros[a], de modo que hasta blasfemias[b] recaen sobre el nombre del Señor a causa de vuestra insensatez, mientras os acarreáis peligro a vosotros mismos.
  rationale: Se revisa la nota [a] para alinearla con la decisión adjudicada de que el referente son personas ajenas o extrañas al grupo, no simplemente de opinión distinta. También se ajusta la cláusula de βλασφημίας ἐπιφέρεσθαι a «recaen sobre» para reflejar mejor el griego, y se hace más natural y explícita la última frase en español con «os acarreáis peligro a vosotros mismos».
