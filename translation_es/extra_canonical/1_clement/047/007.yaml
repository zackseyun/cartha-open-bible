id: 1CLEM.47.7
reference: 1 Clement 47:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ ἡ ἀκοὴ οὐ μόνον εἰς ἡμᾶς ἐχώρησεν, ἀλλὰ καὶ εἰς τοὺς ἑτεροκλινεῖς ὑπάρχοντας ἀφ’ ἡμῶν, ὥστε καὶ βλασφημίας ἐπιφέρεσθαι τῷ ὀνόματι κυρίου διὰ τὴν ὑμετέραν ἀφροσύνην, ἑαυτοῖς δὲ κίνδυνον ἐξεργάζεσθαι.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/047/007.yaml
  text: And the report has reached not only us[a], but also those who are estranged from us, so that even blasphemies are brought upon the name of the Lord because of your foolishness[b], while you bring danger upon yourselves.
  footnotes:
  - marker: a
    text: Or 'those who are of a different mind from us'.
    reason: previous_rendering
  - marker: b
    text: Or 'so that blasphemies'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:55Z'
    unchanged: false
    changes_summary: Removed 'this' for closer alignment with the Greek, changed 'alien to us' to the more natural 'estranged from us,' and revised 'work danger for yourselves' to the more idiomatic 'bring danger upon yourselves.'
translation:
  language: es
  text: Y la noticia no solo ha llegado a nosotros, sino también a los que están alejados de nosotros[a], de modo que hasta blasfemias[b] recaen sobre el nombre del Señor a causa de vuestra insensatez, mientras os acarreáis peligro a vosotros mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que nos son extraños».'
    reason: alternative_reading
  - marker: b
    text: 'O: «de modo que hasta se traen blasfemias sobre el nombre del Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἡ ἀκοή
  english_pob_choice: the report
  chosen_spanish: la noticia
  alternatives_spanish:
  - el reporte
  - la voz
  - el informe
  lexicon: ἀκοή
  rationale: En este contexto ἀκοή se refiere a una noticia o informe que circula; «noticia» comunica bien la idea en español sin volverlo técnico. «Reporte» o «informe» serían posibles, pero suenan más administrativos.
- source_word: ἑτεροκλινεῖς ὑπάρχοντας ἀφ’ ἡμῶν
  english_pob_choice: those who are estranged from us
  chosen_spanish: los que están alejados de nosotros
  alternatives_spanish:
  - los que son extraños para nosotros
  - los que están en desacuerdo con nosotros
  - los que son de otro sentir respecto de nosotros
  lexicon: ἑτεροκλινής
  rationale: La revisión inglesa ya descartó una lectura meramente interna y favoreció un sentido de alejamiento/extrañeza. «Alejados de nosotros» mantiene la distancia relacional sin introducir una precisión doctrinal no explícita en el griego.
- source_word: βλασφημίας ἐπιφέρεσθαι
  english_pob_choice: blasphemies are brought upon
  chosen_spanish: blasfemias se lanzan contra
  alternatives_spanish:
  - blasfemias se traen sobre
  - se acumulan blasfemias sobre
  - se pronuncian blasfemias contra
  lexicon: βλασφημία
  rationale: El griego usa una construcción pasiva con ἐπιφέρεσθαι que expresa que las blasfemias recaen o se lanzan sobre el nombre. «Se lanzan contra» reproduce con naturalidad el movimiento ofensivo y el destinatario explícito («contra el nombre»).
- source_word: τῷ ὀνόματι κυρίου
  english_pob_choice: the name of the Lord
  chosen_spanish: el nombre del Señor
  alternatives_spanish:
  - el nombre de Yahvé
  - el nombre del Señor Jesucristo
  lexicon: ὄνομα / κύριος
  rationale: Aquí κύριος sigue la forma tradicional de 1 Clement respecto al título divino en una cita/eco cristiano; en español se conserva «Señor» porque el texto no explicita el Tetragrámaton y la fórmula fija «nombre del Señor» es clara y fiel al audit trail inglés.
- source_word: ὑμετέραν ἀφροσύνην
  english_pob_choice: your foolishness
  chosen_spanish: vuestra insensatez
  alternatives_spanish:
  - vuestra necedad
  - vuestra estupidez
  - vuestra falta de juicio
  lexicon: ἀφροσύνη
  rationale: «Insensatez» conserva el matiz de falta de sensatez o juicio sin endurecerlo innecesariamente. «Necedad» también es viable, pero «insensatez» suena más neutral y literario en español contemporáneo.
- source_word: κίνδυνον ἐξεργάζεσθαι
  english_pob_choice: you bring danger upon yourselves
  chosen_spanish: os acarreáis peligro
  alternatives_spanish:
  - os causáis peligro
  - producís peligro para vosotros mismos
  - os procuráis peligro
  lexicon: κίνδυνος
  rationale: La idea es de producir o traer sobre uno mismo un peligro. «Acarreáis peligro» es idiomático en español y refleja el resultado autoinducido mejor que una traducción literal rígida.
theological_decisions:
- issue: 'El alcance de ἑτεροκλινεῖς: ¿disenso interno o extrañeza/exterioridad?'
  english_pob_reading: those who are estranged from us
  chosen_spanish_reading: los que están alejados de nosotros
  alternative_spanish_readings:
  - los que piensan distinto de nosotros
  - los de otro parecer respecto de nosotros
  - los que nos son extraños
  rationale: La evidencia contextual apunta a personas fuera del grupo que terminan oyendo del escándalo y blasfemando el nombre del Señor. La versión española evita reducirlo a una mera diferencia de opinión interna y conserva la distancia relacional sugerida por la revisión inglesa.
  doctrine_reference: 'Eclesiología y testimonio público: el mal comportamiento de la comunidad afecta el honor del nombre del Señor ante los de afuera.'
- issue: El valor de καὶ en βλασφημίας ἐπιφέρεσθαι
  english_pob_reading: even blasphemies are brought upon
  chosen_spanish_reading: hasta blasfemias se lanzan contra
  alternative_spanish_readings:
  - también blasfemias se lanzan contra
  - blasfemias se pronuncian contra
  - se acumulan blasfemias contra
  rationale: Se conserva el matiz intensivo de καὶ como «hasta», que expresa la gravedad creciente del escándalo. Esto evita suavizar la fuerza del griego y mantiene la carga acusatoria del pasaje.
  doctrine_reference: Santidad del nombre del Señor y responsabilidad comunitaria ante el testimonio cristiano.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: mantiene «estranged from us» como alejamiento relacional, conserva el ascensivo de καὶ con «hasta», y traduce la clausula final con un verbo idiomático de autoacarrearse peligro. También evita introducir «este» o ampliar innecesariamente el sentido de ἑτεροκλινεῖς hacia un mero desacuerdo interno.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en coherencia con el contexto cristiano del pasaje y con la práctica del proyecto cuando no hay un eco explícito del Tetragrámaton.
  - «Insensatez» se usa aquí como equivalente de ἀφροσύνη en un registro sobrio; no se entiende como una atenuación doctrinal, sino como elección estilística.
  - «Hasta» refleja el valor ascensivo de καὶ, en paralelo con el inglés POB «even».
