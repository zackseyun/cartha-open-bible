review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del audit trail inglés: ἡ ἀκοή como noticia/reporte difundido, el alcance externo de ἑτεροκλινεῖς ἀφ’ ἡμῶν, el matiz ascensivo de καὶ en «hasta/e incluso», y la consecuencia reflexiva de traer peligro sobre sí mismos. Sin embargo, hay un desajuste importante en la nota [a]: reintroduce como alternativa una lectura interna («de otro sentir») que el proceso de revisión inglesa descartó explícitamente por no ajustarse al contexto. Además, «se lanzan contra el nombre» es aceptable, pero «se traen sobre el nombre» o una formulación equivalente refleja un poco mejor la construcción ἐπιφέρεσθαι.'
  spanish_quality_summary: El español es claro y legible. «La noticia», «alejados de nosotros» e «insensatez» funcionan bien. «Mientras vosotros os acarreáis peligro» suena algo menos natural por la ausencia de complemento reflexivo explícito; «os acarreáis peligro a vosotros mismos» o «os acarreáis peligro» ambas son entendibles, pero puede mejorarse la fluidez con «os acarreáis peligro a vosotros mismos». También conviene sustituir «Señor» por «Señor» no requiere cambio; en este contexto patrístico con κύριος no hay base suficiente para imponer «Yahvé».
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: κύριος se mantiene como «Señor» con justificación contextual adecuada; no hay uso problemático de términos teológicos clave. El único choque serio con la racionalidad documentada está en la nota alternativa de ἑτεροκλινεῖς, que contradice la decisión adjudicada de entender personas ajenas/extrañas al grupo, no meramente de opinión diferente.'
  issues:
  - severity: high
    issue: La nota [a] reintroduce una alternativa descartada por la adjudicación inglesa.
    rationale: El audit trail determinó que ἑτεροκλινεῖς ὑπάρχοντας ἀφ’ ἡμῶν no debe presentarse como simple diferencia de opinión interna. Mantener «los que están de otro sentir respecto de nosotros» como nota socava una decisión lexical ya resuelta y puede inducir una lectura incorrecta.
  - severity: medium
    issue: La expresión «blasfemias se lanzan contra el nombre» es algo menos ceñida a ἐπιφέρεσθαι.
    rationale: No es incorrecta, pero el griego enfatiza que las blasfemias son traídas/recaen sobre el nombre del Señor. Una redacción como «recaen sobre» o «se traen sobre» preserva mejor la imagen verbal sin perder naturalidad.
  - severity: low
    issue: «Os acarreáis peligro» puede afinarse en español.
    rationale: La idea reflexiva de ἑαυτοῖς δὲ κίνδυνον ἐξεργάζεσθαι queda más explícita y natural con «os acarreáis peligro a vosotros mismos» o «os causáis peligro a vosotros mismos».
  revised_spanish_text: Y la noticia no solo ha llegado a nosotros, sino también a los que están alejados de nosotros[a], de modo que hasta blasfemias[b] recaen sobre el nombre del Señor a causa de vuestra insensatez, mientras os acarreáis peligro a vosotros mismos.
  revised_footnotes:
