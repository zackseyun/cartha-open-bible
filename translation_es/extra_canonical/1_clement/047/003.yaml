    issue: “habían hecho parcialidades” es poco idiomático en español
    rationale: Aunque calca de cerca el inglés auditado “had made partialities”, en español moderno y eclesial suena forzado. “Habían mostrado parcialidades” o “habían caído en parcialidades” comunica mejor el mismo sentido sin exagerarlo a “facciones”.
  revised_spanish_text: En verdad, escribió espiritualmente[a] acerca de sí mismo y de Cefas y de Apolos, porque aun entonces ustedes habían mostrado parcialidades[b].
  revised_footnotes:
