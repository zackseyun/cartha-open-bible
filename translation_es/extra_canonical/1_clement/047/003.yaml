  text: ἐπ’ ἀληθείας πνευματικῶς ἐπέστειλεν ὑμῖν περὶ ἑαυτοῦ τε καὶ Κηφᾶ τε καὶ Ἀπολλώ, διὰ τὸ καὶ τότε προσκλίσεις ὑμᾶς πεποιῆσθαι.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/047/003.yaml
  text: In truth, he wrote to you spiritually about himself and Cephas and Apollos, because even then you had made partialities.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:53Z'
    unchanged: false
    changes_summary: Changed 'in the Spirit' to 'spiritually' for a more direct rendering of πνευματικῶς, and revised 'formed factions' to 'made partialities' to more closely reflect προσκλίσεις while preserving formal register.
translation:
  language: es
  text: En verdad, escribió espiritualmente[a] acerca de sí mismo y de Cefas y de Apolos, porque aun entonces ustedes habían mostrado parcialidades[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en sentido espiritual”.
    reason: lexical_alternative
  - marker: b
    text: O “habían mostrado favoritismo” o “habían formado facciones”.
    reason: lexical_alternative
lexical_decisions:
- source_word: πνευματικῶς
  english_pob_choice: spiritually
  chosen_spanish: espiritualmente
  alternatives_spanish:
  - en el Espíritu
  - de manera espiritual
  lexicon: πνευματικῶς
  rationale: El griego es el adverbio πνευματικῶς, y la revisión inglesa corrigió explícitamente “in the Spirit” por “spiritually” para reflejar mejor ese adverbio. En español, “espiritualmente” conserva la misma forma adverbial sin añadir la interpretación específica “en el Espíritu”.
- source_word: προσκλίσεις
  english_pob_choice: made partialities
  chosen_spanish: parcialidades
  alternatives_spanish:
  - partidismos
  - facciones
  lexicon: προσκλίσεις
  rationale: La revisión inglesa dejó claro que el término apunta a inclinaciones parciales más que a la idea más fuerte de “facciones”. “Parcialidades” mantiene el campo semántico de favoritismo/partidismo sin exagerar la fuerza del sustantivo.
- source_word: Κηφᾶ
  english_pob_choice: Cephas
  chosen_spanish: Cefas
  alternatives_spanish:
  - Cefas
  - Pedro
  lexicon: Κηφᾶς
  rationale: Se conserva el nombre transliterado que aparece en el griego y en la tradición textual, en lugar de sustituirlo por el equivalente interpretativo “Pedro”.
- source_word: Ἀπολλώ
  english_pob_choice: Apollos
  chosen_spanish: Apolos
  alternatives_spanish:
  - Apolos
  - Apolo
  lexicon: Ἀπολλώς
  rationale: Se mantiene la forma nominal conocida en español como nombre propio del ministerio paulino, sin adaptar al nombre del dios griego Apolo.
theological_decisions:
- issue: El alcance de πνευματικῶς
  english_pob_reading: spiritually
  chosen_spanish_reading: espiritualmente
  alternative_spanish_readings:
  - en el Espíritu
  - por el Espíritu
  rationale: La revisión auditada descartó una lectura pneumatológica explícita y prefirió un adverbio de modo. La versión española sigue esa decisión para no introducir una interpretación no exigida por el texto.
  doctrine_reference: Espíritu Santo / adverbio de modo
- issue: προσκλίσεις como descripción de la conducta de la comunidad
  english_pob_reading: made partialities
  chosen_spanish_reading: habían hecho parcialidades
  alternative_spanish_readings:
  - habían formado facciones
  - habían mostrado favoritismo
  rationale: La redacción española conserva la tensión entre división y favoritismo sin convertirla en un término eclesial más técnico de lo que el griego y la revisión inglesa requieren.
  doctrine_reference: unidad de la iglesia / corrección fraterna
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente, que cambió “in the Spirit” por “spiritually” y “formed factions” por “made partialities”. La redacción española sigue esas dos correcciones y evita retroceder a una interpretación más fuerte que la auditoría ya rechazó.
  spanish_consistency_notes:
  - Se usa “Yahvé” como convención general del proyecto solo cuando aparece el tetragrámaton; aquí no aplica.
  - Se mantiene “Cefas” y “Apolos” como nombres propios estables.
  - El adverbio “espiritualmente” se coloca como modificador de “escribió”, de acuerdo con el griego y la revisión inglesa.
  - No se introdujo vocabulario eclesiástico más cargado que el que el texto y la auditoría justifican.
