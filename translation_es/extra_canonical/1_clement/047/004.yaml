  text: ἀλλ’ ἡ πρόσκλισις ἐκείνη ἧσσον ἁμαρτίαν ὑμῖν προσήνεγκεν· προσεκλίθητε γὰρ ἀποστόλοις μεμαρτυρημένοις καὶ ἀνδρὶ δεδοκιμασμένῳ παρ’ αὐτοῖς.
