base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/047/004.yaml
  text: But that partiality brought less sin upon you; for you inclined yourselves toward apostles who had been approved[a], and toward a man approved by them.
  footnotes:
  - marker: a
    text: Or 'were aligning yourselves with apostles of approved testimony, and with a man tested by them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:55Z'
    unchanged: false
    changes_summary: Replaced 'factionalism' with 'partiality' to reflect πρόσκλισις more closely; revised 'aligned yourselves with' to 'inclined yourselves toward' to preserve the verbal connection with προσεκλίθητε; rendered μεμαρτυρημένοις more formally as 'who had been approved' for closer lexical consistency with δεδοκιμασμένῳ ('approved').
translation:
  language: es
  text: Pero esa parcialidad les trajo menos pecado; porque ustedes se inclinaron hacia[a] apóstoles aprobados, y hacia un hombre aprobado por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se pusieron del lado de». También: «apóstoles bien acreditados»; el griego μεμαρτυρημένοις puede expresar «de buen testimonio» o «bien atestiguados».'
    reason: Mejora idiomática y preservación de la alternativa léxica documentada.
lexical_decisions:
- source_word: ἀλλ’ ἡ πρόσκλισις ἐκείνη
  english_pob_choice: But that partiality
  chosen_spanish: Pero esa parcialidad
  alternatives_spanish:
  - Pero esa inclinación parcial
  - Pero ese favoritismo
  lexicon: πρόσκλισις
  rationale: «Parcialidad» comunica la inclinación sesgada o preferencia indebida que el contexto reprueba, sin introducir una palabra más fuerte que el griego exige. «Favoritismo» es posible, pero suena más interpretativo; «inclinación parcial» conserva mejor el paralelismo con el verbo siguiente.
- source_word: ἧσσον ἁμαρτίαν ὑμῖν προσήνεγκεν
  english_pob_choice: brought less sin upon you
  chosen_spanish: les trajo menos pecado
  alternatives_spanish:
  - les ocasionó menos pecado
  - les acarreó menos pecado
  lexicon: ἁμαρτία
  rationale: 'Se mantiene la idea de consecuencia culpable: no se suaviza a mera culpa moral abstracta. «Trajo» reproduce bien el efecto resultativo de προσήνεγκεν en español contemporáneo.'
- source_word: προσεκλίθητε
  english_pob_choice: you inclined yourselves toward
  chosen_spanish: ustedes se inclinaron hacia
  alternatives_spanish:
  - ustedes se alinearon con
  - ustedes se adhirieron a
  lexicon: προσκλίνω
  rationale: El verbo conserva la imagen de inclinarse hacia alguien; «inclinaron hacia» preserva la conexión verbal con πρόσκλισις. «Alinear(se) con» es posible, pero desplaza la metáfora espacial; «adherirse a» es más doctrinal que textual.
- source_word: ἀποστόλοις μεμαρτυρημένοις
  english_pob_choice: apostles who had been approved
  chosen_spanish: apóstoles aprobados
  alternatives_spanish:
  - apóstoles bien acreditados
  - apóstoles de buen testimonio
  lexicon: μεμαρτυρημένοις
  rationale: El contexto y la revisión inglesa favorecen la idea de aprobación/reconocimiento acreditado, no simplemente una evaluación en proceso. «Aprobados» mantiene brevedad y enlaza con el segundo participio, aunque en una nota se deja abierta la alternativa de «bien acreditados».
- source_word: ἀνδρὶ δεδοκιμασμένῳ παρ’ αὐτοῖς
  english_pob_choice: a man approved by them
  chosen_spanish: un hombre aprobado por ellos
  alternatives_spanish:
  - un hombre probado por ellos
  - un hombre examinado por ellos
  lexicon: δεδοκιμασμένῳ
  rationale: «Aprobado» refleja el resultado de la prueba, no solo el proceso de examinar. Se conserva la pasiva/resultativa del participio perfecto y la referencia a la validación hecha por los apóstoles.
theological_decisions:
- issue: Relación entre 'apóstoles aprobados' y 'un hombre aprobado por ellos'
  english_pob_reading: approved apostles ... and a man approved by them
  chosen_spanish_reading: apóstoles aprobados ... y un hombre aprobado por ellos
  alternative_spanish_readings:
  - apóstoles bien acreditados ... y un hombre probado por ellos
  - apóstoles de testimonio aprobado ... y un hombre examinado por ellos
  rationale: No se neutraliza la repetición de «aprobado», porque el griego vincula dos participios emparentados y la revisión inglesa preserva esa proximidad semántica. La repetición ayuda a mostrar el contraste entre la acreditación de los apóstoles y la aprobación específica del hombre por ellos.
  doctrine_reference: κρίσις/δοκιμή como validación eclesial; no es una afirmación doctrinal sobre infalibilidad, sino sobre reconocimiento/aprobación ministerial en el contexto del pasaje.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente prefirió ''partiality'' frente a ''factionalism'', ''inclined yourselves toward'' frente a ''aligned yourselves with'', y ''approved'' para ambos participios relacionados. La versión española sigue esas decisiones: usa «parcialidad»; conserva la metáfora de inclinarse; y mantiene «aprobados» en ambos puntos para reflejar la cercanía léxica del griego.'
  spanish_consistency_notes:
  - Se mantiene «aprobado» para μεμαρτυρημένοις y δεδοκιμασμένῳ a fin de conservar la relación semántica destacada en la revisión.
  - «Ustedes» se usa como sujeto explícito de segunda persona plural para claridad en español neutral, sin alterar el sentido del aoristo pasado.
  - No se introduce «SEÑOR», «Cristo» ni otra terminología no presente en el texto fuente.
