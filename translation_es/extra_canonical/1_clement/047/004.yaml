review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego: πρόσκλισις como «parcialidad», ἧσσον ἁμαρτίαν... προσήνεγκεν como consecuencia de «menos pecado», y la doble validación de μεμαρτυρημένοις / δεδοκιμασμένῳ como «aprobados». También conserva el vínculo verbal entre πρόσκλισις y προσεκλίθητε mediante «parcialidad» / «se inclinaron». Sin embargo, «se inclinaron hacia apóstoles aprobados» en español suena algo duro e incompleto sintácticamente; conviene añadir el pronombre dativo «a» para la construcción personal: «se inclinaron hacia/apoyaron a».'
  spanish_quality_summary: El texto es claro y fiel, pero presenta una ligera aspereza idiomática en «se inclinaron hacia apóstoles...», donde el español naturalmente pide «hacia los apóstoles» o mejor «se inclinaron a favor de». Además, «apóstoles aprobados» puede sonar como si alguien superior los hubiera aprobado; la nota ya ayuda, pero una formulación más natural en español es «apóstoles bien acreditados», reservando «aprobado» para el segundo miembro si se quiere evitar ambigüedad. Aun así, el cambio necesario es pequeño.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión sobre μεμαρτυρημένοις queda bien manejada con nota alternativa, aunque en español «bien acreditados» suena más idiomático que «aprobados» para ese participio.
  issues:
  - severity: medium
    issue: 'Construcción poco natural: «se inclinaron hacia apóstoles aprobados»'
    rationale: Aunque es comprensible y cercana al griego, en español suena forzada sin artículo ni marca personal. Una leve reparación mejora la legibilidad sin perder el matiz verbal.
  - severity: low
    issue: «Apóstoles aprobados» puede sonar ambiguo en español
    rationale: El griego μεμαρτυρημένοις transmite acreditación/testimonio reconocido. «Aprobados» es defendible, pero en español puede sugerir una aprobación burocrática o externa; la nota compensa esta posible ambigüedad.
  revised_spanish_text: Pero esa parcialidad les trajo menos pecado; porque ustedes se inclinaron hacia[a] apóstoles aprobados, y hacia un hombre aprobado por ellos.
  revised_footnotes:
  - marker: a
    text: 'O: «se pusieron del lado de». También: «apóstoles bien acreditados»; el griego μεμαρτυρημένοις puede expresar «de buen testimonio» o «bien atestiguados».'
    reason: Mejora idiomática y preservación de la alternativa léxica documentada.
  revision_rationale: Se hace una reparación menor para sostener mejor la sintaxis española y conservar el matiz de προσεκλίθητε. Se mantiene la estructura y el sentido del borrador, con una nota que reúne la alternativa verbal y la alternativa léxica ya documentada para μεμαρτυρημένοις.
