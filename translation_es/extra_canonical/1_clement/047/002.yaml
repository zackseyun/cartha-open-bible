    unchanged: false
    changes_summary: 'Adjusted word order to reflect πρῶτον more naturally in formal English: ''write to you first'' instead of ''first write to you.'''
translation:
  language: es
  text: ¿Qué les escribió él primero al comienzo del evangelio?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Cuál cosa
  - ¿Qué cosa
  lexicon: τί
  rationale: Interrogativo directo normal en español para una pregunta abierta sobre el contenido de lo escrito.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - antes que nada
  lexicon: πρῶτον
  rationale: Se coloca como adverbio natural en español para conservar la prioridad temporal o de orden sin volver la frase pesada.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: ὑμῖν
  rationale: Dativo plural expresado como objeto indirecto en español; 'les' mantiene neutralidad y fluidez.
- source_word: ἔγραψεν
  english_pob_choice: did he write
  chosen_spanish: escribió
  alternatives_spanish:
  - ha escrito
  - redactó
  lexicon: γράφω
  rationale: Perfecto simple en español para un pasado narrativo puntual; evita calco del auxiliar inglés y conserva el sentido de acción escrita.
- source_word: ἐν ἀρχῇ
  english_pob_choice: at the beginning
  chosen_spanish: al comienzo
  alternatives_spanish:
  - al principio
  - en el principio
  lexicon: ἀρχή
  rationale: '''Al comienzo'' es idiomático y fiel a la idea temporal de inicio.'
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: of the gospel
  chosen_spanish: del evangelio
  alternatives_spanish:
  - del anuncio
  - de la buena noticia
  lexicon: εὐαγγέλιον
  rationale: '''Evangelio'' es el término establecido y más fiel al registro eclesial del texto, sin reemplazarlo por una paráfrasis.'
theological_decisions:
- issue: Referencia a 'el evangelio' como marco de la acción
  english_pob_reading: beginning of the gospel
  chosen_spanish_reading: al comienzo del evangelio
  alternative_spanish_readings:
  - al principio de la buena noticia
  - al inicio del anuncio
  rationale: Se conserva el término técnico 'evangelio' porque el griego usa εὐαγγέλιον; no hay indicio suficiente para sustituirlo por una paráfrasis de 'buena noticia' en este contexto breve.
  doctrine_reference: Uso estándar de εὐαγγέλιον en el NT
translation_notes:
  revision_awareness: La revisión inglesa cambió el orden de 'first' para reflejar mejor πρῶτον; en español se resolvió de forma equivalente con 'primero' colocado antes del verbo, manteniendo el énfasis sin artificialidad.
  spanish_consistency_notes:
  - Se mantiene el tuteo plural implícito en 'les' sin marcar registro regional.
  - No se introduce ninguna mayúscula teológica innecesaria; 'evangelio' permanece en minúscula como sustantivo común técnico.
  - La pregunta conserva el orden natural del español y el énfasis temporal de πρῶτον.
