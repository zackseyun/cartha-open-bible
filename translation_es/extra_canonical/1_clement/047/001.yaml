review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego y del rastro auditado en inglés: retomar la carta de Pablo, recordar las divisiones tempranas, contrastarlas con la rebelión actual contra los ancianos, y advertir del escándalo público y del peligro que ellos mismos se acarrean. Sin embargo, hay varios puntos donde el español puede ajustarse más fielmente al matiz fuente: ''fraternidad'' atenúa φιλαδελφίας frente a ''amor fraternal''; ''ampliamente reconocida'' no refleja tan bien el matiz de ''muy comentada / de la que mucho se habla'' de περιβοήτου; ''aquella facción'' singulariza el fenómeno cuando el griego apunta más bien al faccionalismo o partidismo; y ''se levantan blasfemias'' suena menos natural y menos cercano al valor de ἐπιφέρεσθαι que ''se traen / recaen blasfemias''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero algunas expresiones suenan algo calcadas o menos naturales de lo ideal: ''ampliamente reconocida fraternidad'', ''aquella facción les trajo menos pecado'' y ''se levantan blasfemias'' pueden mejorarse. También conviene pulir la coordinación final para evitar el cambio brusco de persona en ''se procuran peligro para sí mismos''; ''ustedes mismos se acarrean peligro'' suena más directo y natural.'
  glossary_alignment: 'La terminología del proyecto está mayormente respetada: ''Mesías'' para Χριστός, ''Espíritu'' para πνευματικῶς, ''ancianos'' para πρεσβυτέρους, ''Señor'' para κύριος (correcto aquí por el griego), y nombres propios bien resueltos. La principal desviación léxica relevante es φιλαδελφίας, donde ''amor fraternal'' preserva mejor el término fuente y la decisión inglesa documentada que ''fraternidad''.'
  issues:
  - severity: medium
    issue: φιλαδελφίας se traduce como 'fraternidad'
    rationale: Aunque es comprensible, desplaza el énfasis afectivo de 'amor fraternal' documentado en la auditoría inglesa y presente en el griego.
  - severity: low
    issue: περιβοήτου se traduce como 'ampliamente reconocida'
    rationale: El término apunta a algo muy divulgado o de lo que mucho se habla; 'muy celebrado' o 'del que mucho se hablaba' conserva mejor el matiz retórico.
  - severity: medium
    issue: πρόσκλισις se vierte como 'aquella facción'
    rationale: El singular español suena como un grupo concreto, mientras que el contexto apunta al fenómeno de partidismo/faccionalismo; conviene una formulación abstracta.
  - severity: low
    issue: '''se levantan blasfemias'' es poco idiomático'
    rationale: Para ἐπιφέρεσθαι en este contexto, 'recaen' o 'se traen' blasfemias contra el nombre del Señor suena más natural y más fiel al efecto causado.
  - severity: low
    issue: '''se procuran peligro para sí mismos'' es entendible pero rígido'
    rationale: Una formulación como 'ustedes mismos se acarrean peligro' expresa mejor el sentido reflexivo y activo de κίνδυνον ἐξεργάζεσθαι.
