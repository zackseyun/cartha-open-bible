  to: Tomen la carta del bienaventurado Pablo, el apóstol. ¿Qué les escribió primero al comienzo del evangelio? En verdad, les escribió en el Espíritu acerca de sí mismo, de Cefas y de Apolos, porque aun entonces ustedes habían formado facciones. Pero aquel faccionalismo les trajo menos pecado; porque se estaban alineando con apóstoles de testimonio aprobado, y con un hombre aprobado por ellos. Pero ahora consideren quiénes son los que los han pervertido y han disminuido la dignidad de su amor fraternal del que tanto se hablaba. Es vergonzoso, amados —muy vergonzoso, y no digno de una conducta en el Mesías—, que se oiga que la iglesia firmísima y antigua de los corintios está en rebelión contra los ancianos por causa de una o dos personas. Y este informe no solo ha llegado a nosotros, sino también a los que están en desacuerdo con nosotros, de modo que recaen blasfemias sobre el nombre del Señor a causa de su necedad, mientras ustedes mismos se acarrean peligro.
