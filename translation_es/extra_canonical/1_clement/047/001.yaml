translation:
  language: es
  text: Tomen la carta del bienaventurado Pablo, el apóstol. ¿Qué les escribió primero al comienzo del evangelio? En verdad, les escribió en el Espíritu acerca de sí mismo, de Cefas y de Apolos, porque aun entonces ustedes habían formado facciones. Pero aquel faccionalismo les trajo menos pecado; porque se estaban alineando con apóstoles de testimonio aprobado, y con un hombre aprobado por ellos. Pero ahora consideren quiénes son los que los han pervertido y han disminuido la dignidad de su amor fraternal del que tanto se hablaba. Es vergonzoso, amados —muy vergonzoso, y no digno de una conducta en el Mesías—, que se oiga que la iglesia firmísima y antigua de los corintios está en rebelión contra los ancianos por causa de una o dos personas. Y este informe no solo ha llegado a nosotros, sino también a los que están en desacuerdo con nosotros, de modo que recaen blasfemias sobre el nombre del Señor a causa de su necedad, mientras ustedes mismos se acarrean peligro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀναλάβετε
  english_pob_choice: Take up
  chosen_spanish: Tomen
  alternatives_spanish:
  - Tomen de nuevo
  - Tomen en sus manos
  - Reciban
  lexicon: LSJ
  rationale: El imperativo pide que la comunidad retome la carta para reconsiderarla. En español, 'Tomen' conserva la acción concreta sin añadir palabras que el griego no exige.
- source_word: μακαρίου
  english_pob_choice: blessed
  chosen_spanish: bienaventurado
  alternatives_spanish:
  - bendito
  - feliz
  lexicon: BDAG
  rationale: Para una persona venerada ya fallecida, 'bienaventurado' mantiene el tono eclesial y reverente. 'Bendito' podría sonar más como una alabanza litúrgica a Dios en español.
- source_word: ἐν ἀρχῇ τοῦ εὐαγγελίου
  english_pob_choice: at the beginning of the gospel
  chosen_spanish: al comienzo del evangelio
  alternatives_spanish:
  - en el principio del evangelio
  - al inicio de la buena noticia
  lexicon: BDAG
  rationale: '''Al comienzo del evangelio'' sigue de cerca la estructura griega y suena natural en español, sin precisar más de lo que el texto dice.'
- source_word: πνευματικῶς
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - espiritualmente
  - con discernimiento espiritual
  lexicon: BDAG
  rationale: La adverbialidad apunta aquí a una escritura guiada por el Espíritu, no solo a un modo 'espiritual' en sentido genérico. 'En el Espíritu' conserva esa fuerza teológica.
- source_word: προσκλίσεις
  english_pob_choice: factions
  chosen_spanish: facciones
  alternatives_spanish:
  - parcialidades
  - bandos
  - grupos
  lexicon: LSJ
  rationale: El sustantivo expresa alineamientos partidistas. 'Facciones' reproduce bien el matiz de división y el eco paulino del problema corintio.
- source_word: προσεκλίθητε
  english_pob_choice: were aligning yourselves
  chosen_spanish: se estaban alineando
  alternatives_spanish:
  - se inclinaban
  - se adherían
  - tomaban partido
  lexicon: LSJ
  rationale: El verbo corresponde al sustantivo anterior y describe una adhesión partidista. 'Se estaban alineando' conserva el proceso relacional y el matiz de toma de partido.
- source_word: μεμαρτυρημένοις
  english_pob_choice: of approved testimony
  chosen_spanish: de testimonio aprobado
  alternatives_spanish:
  - de testimonio acreditado
  - de testimonio reconocido
  - atestiguados
  lexicon: BDAG
  rationale: El participio perfecto indica personas cuya credibilidad o ministerio había sido atestiguado. 'De testimonio aprobado' sigue de cerca la formulación auditada del inglés y mantiene el sentido eclesial.
- source_word: δεδοκιμασμένῳ
  english_pob_choice: tested
  chosen_spanish: aprobado
  alternatives_spanish:
  - probado
  - ensayado
  - comprobado
  lexicon: BDAG
  rationale: Aquí el énfasis es que el hombre fue examinado y hallado apto. 'Aprobado' refleja bien ese veredicto, de modo más natural que un calco rígido de 'testeado'.
- source_word: σεμνὸν
  english_pob_choice: dignity
  chosen_spanish: dignidad
  alternatives_spanish:
  - honor
  - gravedad
  - nobleza
  lexicon: BDAG
  rationale: El término describe el carácter honorable de su amor fraternal. 'Dignidad' preserva el registro moral y comunitario del pasaje.
- source_word: περιβοήτου
  english_pob_choice: widely spoken-of
  chosen_spanish: ampliamente reconocida
  alternatives_spanish:
  - muy comentada
  - famosa
  - renombrada
  lexicon: LSJ
  rationale: La palabra indica algo muy divulgado o de amplia fama. 'Ampliamente reconocida' suena natural en español y conserva el matiz de notoriedad pública.
- source_word: φιλαδελφίας
  english_pob_choice: brotherly love
  chosen_spanish: fraternidad
  alternatives_spanish:
  - amor fraternal
  - amor entre hermanos
  - afecto fraternal
  lexicon: BDAG
  rationale: Aunque 'amor fraternal' es literal, 'fraternidad' permite expresar en español la idea comunitaria del vínculo fraternal sin perder el peso eclesial del término. Se evita masculinizar innecesariamente el sentido del original.
- source_word: ἀγωγῆς
  english_pob_choice: conduct
  chosen_spanish: conducta
  alternatives_spanish:
  - modo de vida
  - comportamiento
  - vida
  lexicon: LSJ
  rationale: El sustantivo alude al modo de vida moral. 'Conducta' es una opción clara y digna en español para el contexto ético cristiano.
- source_word: στασιάζειν
  english_pob_choice: is in revolt
  chosen_spanish: está en rebelión
  alternatives_spanish:
  - se rebela
  - está en sedición
  - está en discordia
  lexicon: BDAG
  rationale: El verbo es fuerte, más que una simple discrepancia. 'Está en rebelión' mantiene el escándalo y la severidad del conflicto.
- source_word: πρεσβυτέρους
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - mayores
  lexicon: BDAG
  rationale: '''Ancianos'' es el equivalente eclesial natural en español y conserva el título de oficio sin transliteración innecesaria.'
- source_word: ἑτεροκλινεῖς
  english_pob_choice: those who are of a different mind from us
  chosen_spanish: los que están en desacuerdo con nosotros
  alternatives_spanish:
  - los disidentes
  - los de mente distinta
  - los que no son de los nuestros
  lexicon: LSJ
  rationale: El término probablemente designa a personas no alineadas con la comunidad romana. 'Los que están en desacuerdo con nosotros' conserva la relación de contraste sin sobreespecificar identidades.
- source_word: βλασφημίας
  english_pob_choice: blasphemies
  chosen_spanish: blasfemias
  alternatives_spanish:
  - injurias
  - maldiciones
  - reproches sacrílegos
  lexicon: BDAG
  rationale: Como el objeto es el nombre del Señor, 'blasfemias' es la opción más exacta y teológicamente fuerte en español.
- source_word: ἀφροσύνην
  english_pob_choice: foolishness
  chosen_spanish: necedad
  alternatives_spanish:
  - foolishness
  - locura
  - insensatez
  lexicon: BDAG
  rationale: '''Necedad'' expresa mejor en español el juicio moral y espiritual del texto que una locución más débil.'
- source_word: κίνδυνον ἐξεργάζεσθαι
  english_pob_choice: work danger for yourselves
  chosen_spanish: se procuran peligro para sí mismos
  alternatives_spanish:
  - se atraen peligro
  - se causan peligro a sí mismos
  - se labran peligro
  lexicon: BDAG
  rationale: La expresión idiomática comunica que activamente producen peligro para sí. 'Se procuran peligro para sí mismos' es idiomático en español y conserva la acción reflexiva del griego.
- source_word: ἐν Χριστῷ
  english_pob_choice: in the Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  - en el Ungido
  lexicon: BDAG
  rationale: El texto usa el título mesiánico, no solo un nombre propio fijo. 'En el Mesías' sigue la preferencia del proyecto y preserva el valor titular del griego.
theological_decisions:
- issue: Rendering Χριστῷ
  english_pob_reading: in the Messiah
  chosen_spanish_reading: en el Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: En este contexto exhortativo, Χριστῷ funciona como título de identidad y norma de conducta. 'Mesías' mantiene el sentido titular y evita aplanar el matiz mesiánico.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sense of πνευματικῶς
  english_pob_reading: he wrote to you in the Spirit
  chosen_spanish_reading: les escribió en el Espíritu
  alternative_spanish_readings:
  - les escribió espiritualmente
  - les escribió con discernimiento espiritual
  rationale: La frase apunta a una comunicación marcada por la acción del Espíritu, no solo a un estilo interior o devoto. 'En el Espíritu' preserva esa carga teológica sin explicarla de más.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: The English audit trail reports no applied revisions and a high-agreement cross-check with unchanged latest revision status; the Spanish draft follows that stable reading closely while adapting natural Spanish syntax.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este pasaje no contiene el nombre divino hebreo; el inglés audita 'Lord' con blasfemias contra su nombre, por lo que se traduce naturalmente como 'el Señor' en esta referencia al título griego κυρίου.
  - Se usa 'Mesías' para Χριστός/Χριστῷ conforme a la política del proyecto y al contexto titular del pasaje.
  - Se conserva el contraste entre 'facciones' y 'se estaban alineando' para reflejar el juego léxico del griego entre sustantivo y verbo.
  - '''Ancianos'' traduce πρεσβυτέρους como oficio eclesial, sin introducir una equivalencia más técnica que el texto no exige.'
