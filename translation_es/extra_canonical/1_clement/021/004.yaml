translation:
  language: es
  text: Por tanto, es justo que no desertemos de su voluntad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «abandonemos su voluntad»; el verbo griego sugiere la idea de desertar o dejar el puesto.'
    reason: alternative_reading
lexical_decisions:
- source_word: δίκαιον
  english_pob_choice: right
  chosen_spanish: justo
  alternatives_spanish:
  - correcto
  - razonable
  lexicon: δίκαιον
  rationale: El griego afirma que la conclusión es moralmente/éticamente justa; 'justo' conserva esa valoración con naturalidad en español.
- source_word: λειποτακτεῖν
  english_pob_choice: desert
  chosen_spanish: desertemos
  alternatives_spanish:
  - abandonemos
  - seamos desertores
  lexicon: λειποτακτέω
  rationale: El verbo tiene el matiz de 'abandonar el puesto' o 'desertar'. En español, 'desertar de' comunica mejor la imagen de deslealtad y abandono que un simple 'abandonar'.
- source_word: ἀπό τοῦ θελήματος αὐτοῦ
  english_pob_choice: his will
  chosen_spanish: de su voluntad
  alternatives_spanish:
  - de su querer
  - de su voluntad
  lexicon: θέλημα
  rationale: '''Voluntad'' es la equivalencia más estable y transparente para θέλημα en este contexto; mantiene el sentido de dirección obediencial sin añadir paráfrasis.'
theological_decisions:
- issue: La metáfora militar de λειποτακτεῖν
  english_pob_reading: desert his will
  chosen_spanish_reading: desertemos de su voluntad
  alternative_spanish_readings:
  - abandonemos su voluntad
  - seamos desertores de su voluntad
  rationale: La revisión inglesa señaló que λειποτακτεῖν es un término militar. El español 'desertar de' conserva esa fuerza, mientras que 'abandonar' la suaviza. Se evita también convertirlo en mera oposición intelectual.
  doctrine_reference: Orden y obediencia en Clemente; imagen de fidelidad a Dios y rechazo de la deserción espiritual.
translation_notes:
  revision_awareness: La auditoría inglesa corrigió una formulación más plana ('desert his will') para recuperar el matiz militar de λειποτακτεῖν. La versión española preserva ese matiz con 'desertar de', manteniendo una sintaxis natural y fiel al griego.
  spanish_consistency_notes:
  - Se usa 'voluntad' para θέλημα, en continuidad con el sentido bíblico habitual y sin forzar una perífrasis.
  - '''Desertar de'' conserva el matiz de deserción/abandono del puesto reconocido en la revisión del texto fuente.'
  - La partícula conclusiva 'Por tanto' reproduce el οὖν con un conector natural en español.
