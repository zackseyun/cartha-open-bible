id: 1CLEM.21.7
reference: 1 Clement 21:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: τὸ ἀξιαγάπητον τῆς ἁγνείας ἦθος ἐνδειξάσθωσαν, τὸ ἀκέραιον τῆς πραΰτητος αὐτῶν βούλημα ἀποδειξάτωσαν, τὸ ἐπιεικὲς τῆς γλώσσης αὐτῶν διὰ τῆς σιγῆς φανερὸν ποιησάτωσαν, τὴν ἀγάπην αὐτῶν μὴ κατὰ προσκλίσεις, ἀλλὰ πᾶσιν τοῖς φοβουμένοις τὸν θεὸν ὁσίως ἴσην παρεχέτωσαν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/021/007.yaml
  text: Let them show the lovely character of purity; let them demonstrate the sincere disposition of their gentleness; let them make the moderation of their tongue evident through silence; let them extend their love not according to partiality, but equally to all who fear God in holiness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:11Z'
    unchanged: false
    changes_summary: Changed 'intention' to 'disposition' for βούλημα as a more natural and fitting rendering here, and changed 'partialities' to the more idiomatic singular 'partiality.'
translation:
  language: es
  text: Muestren el hermoso carácter de la pureza; manifiesten la disposición sincera de su mansedumbre; hagan evidente, por medio del silencio, la moderación de su lengua; y extiendan su amor no con parcialidad, sino igualmente a todos los que temen a Dios, en santidad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ ἀξιαγάπητον τῆς ἁγνείας ἦθος
  english_pob_choice: the lovely character of purity
  chosen_spanish: el carácter amable de la pureza
  alternatives_spanish:
  - la conducta digna de amor de la pureza
  - el bello talante de la pureza
  lexicon: ἀξιαγάπητον; ἦθος; ἁγνεία
  rationale: Conservo el valor apreciativo de ἀξιαγάπητον con «amable», que en español puede expresar algo digno de amor sin volverlo meramente afectivo. «Carácter» transmite ἦθος con naturalidad; «pureza» mantiene ἁγνεία sin introducir una noción más técnica como «castidad» que sería demasiado restrictiva aquí.
- source_word: τὸ ἀκέραιον τῆς πραΰτητος αὐτῶν βούλημα
  english_pob_choice: the sincere disposition of their gentleness
  chosen_spanish: la disposición sincera de su mansedumbre
  alternatives_spanish:
  - el querer íntegro de su mansedumbre
  - la intención íntegra de su mansedumbre
  lexicon: ἀκέραιον; πραΰτης; βούλημα
  rationale: «Disposición» sigue bien el matiz de βούλημα tal como lo leyó el POB en inglés, y evita reducirlo a una simple meta mental. «Sincera» recoge ἀκέραιον como integridad/incorruptibilidad. «Mansedumbre» expresa πραΰτης con un registro bíblico claro y más exacto que «gentileza» en este contexto.
- source_word: τὸ ἐπιεικὲς τῆς γλώσσης αὐτῶν διὰ τῆς σιγῆς φανερὸν ποιησάτωσαν
  english_pob_choice: let them make the moderation of their tongue evident through silence
  chosen_spanish: hagan evidente, por medio del silencio, la moderación de su lengua
  alternatives_spanish:
  - hagan visible, mediante el silencio, la afabilidad de su lengua
  - hagan patente, por el silencio, la mesura de su lengua
  lexicon: ἐπιεικής; γλῶσσα; σιγή
  rationale: «Moderación» comunica bien el juicio sobrio y contenido de ἐπιεικής sin forzar «mansedumbre» o «amabilidad», que aquí quedarían demasiado difusas. «Lengua» mantiene la metáfora bíblica normal. «Por medio del silencio» refleja διὰ τῆς σιγῆς de forma natural en español y conserva la paradoja retórica del original.
- source_word: τὴν ἀγάπην αὐτῶν μὴ κατὰ προσκλίσεις, ἀλλὰ πᾶσιν ... ὁσίως ἴσην παρεχέτωσαν
  english_pob_choice: let them extend their love not according to partiality, but equally to all who fear God in holiness
  chosen_spanish: extiendan su amor no según parcialidad, sino de manera igual a todos los que temen a Dios en santidad
  alternatives_spanish:
  - extiendan su amor no por favoritismo, sino por igual a todos los que temen a Dios en santidad
  - hagan su amor no parcial, sino igual para todos los que temen a Dios en santidad
  lexicon: ἀγάπη; προσκλίσεις; ἴσην; ὁσίως; φοβέομαι
  rationale: «Amor» es la opción natural para ἀγάπη. «Parcialidad» reproduce el sentido de προσκλίσεις sin introducir un término más sociológico como «favoritismo», aunque esa sea una alternativa válida. «De manera igual» conserva ἴσην con un adverbio español fluido. «En santidad» traduce ὁσίως con una forma adverbial teológicamente sobria.
theological_decisions:
- issue: La expresión final «a todos los que temen a Dios en santidad» puede leerse como modificando el acto de amar o como describiendo a los destinatarios.
  english_pob_reading: their love ... equally to all who fear God in holiness
  chosen_spanish_reading: su amor ... de manera igual a todos los que temen a Dios en santidad
  alternative_spanish_readings:
  - extiendan su amor igualmente, en santidad, a todos los que temen a Dios
  - extiendan su amor igualmente a todos los que, en santidad, temen a Dios
  rationale: 'Sigo la lectura del POB: el adverbio final califica la manera del trato amoroso y no introduce un nuevo grupo distinto de «los que temen a Dios». El español permite ambas lecturas, así que mantengo una formulación abierta pero ordenada, sin desplazar el peso de ὁσίως del modo de actuar.'
  doctrine_reference: Ética comunitaria y parcialidad; cf. lenguaje de imparcialidad en Santiago y la santidad como modo de vida.
translation_notes:
  revision_awareness: Esta versión sigue la revisión más reciente del POB en inglés, que afinó βούλημα como «disposition» y singularizó «partiality». En español se refleja con «disposición» y «parcialidad», evitando volver al plural o introducir un matiz más fuerte que el del texto revisado.
  spanish_consistency_notes:
  - Se usa «Dios» para θεὸς conforme al estándar del proyecto.
  - Se preserva «temen a Dios» sin convertirlo en una paráfrasis moralizante, porque φοβουμένοις mantiene el motivo reverente del original.
  - No se introducen notas al pie porque el versículo no exige una alternativa textual o lexical decisiva que no pueda resolverse con la redacción principal.
