revisions:
- from: Muestren el carácter amable de la pureza; manifiesten la disposición sincera de su mansedumbre; hagan evidente, por medio del silencio, la moderación de su lengua; y extiendan su amor no según parcialidad, sino de manera igual a todos los que temen a Dios en santidad.
  to: Muestren el hermoso carácter de la pureza; manifiesten la disposición sincera de su mansedumbre; hagan evidente, por medio del silencio, la moderación de su lengua; y extiendan su amor no con parcialidad, sino igualmente a todos los que temen a Dios, en santidad.
  rationale: 'Se hicieron reparaciones menores de estilo y fidelidad: «hermoso carácter» expresa mejor el valor apreciativo de ἀξιαγάπητον que «carácter amable»; «no con parcialidad» corrige un calco poco idiomático; «igualmente» simplifica «de manera igual»; y una coma antes de «en santidad» ayuda a mantener la lectura adverbial favorecida por el POB sin alterar el sentido.'
