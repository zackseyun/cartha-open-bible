source:
  edition: Funk 1901 (normalized OCR)
  text: Ὁρᾶτε, ἀγαπητοί, μὴ αἱ εὐεργεσίαι αὐτοῦ αἱ πολλαὶ γένωνται εἰς κρίμα πᾶσιν ἡμῖν, ἐὰν μὴ ἀξίως αὐτοῦ πολιτευόμενοι τὰ καλὰ καὶ εὐάρεστα ἐνώπιον αὐτοῦ ποιῶμεν μεθ’ ὁμονοίας. . λέγει γάρ που· Πνεῦμα κυρίου λύχνος ἐρευνῶν τὰ ταμιεῖα τῆς γαστρός. 3. ἴδωμεν, πῶς ἐγγύς ἐστιν, καὶ ὅτι οὐδὲν λέληθεν αὐτὸν τῶν ἐννοιῶν ἡμῶν οὐδὲ τῶν διαλογισμῶν ὧν ποιούμεθα. . δίκαιον οὖν ἐστίν, μὴ λειποτακτεῖν ἡμᾶς ἀπὸ τοῦ θελήματος αὐτοῦ. 5. μᾶλλον ἀνθρώποις ἄφροσι καὶ ἀνοήτοις καὶ ἐπαιρομένοις καὶ ἐγκαυχωμένοις ἐν ἀλαζονείᾳ τοῦ λόγου αὐτῶν προσκόψωμεν ἢ τῷ θεῷ. 6. τὸν κύριον Ἰησοῦν Χριστόν, οὗ τὸ αἷμα ὑπὲρ ἡμῶν ἐδόθη, ἐντραπῶμεν, τοὺς προηγουμένους ἡμῶν αἰδεσθῶμεν, τοὺς πρεσβυτέρους τιμήσωμεν, τοὺς νέους παιδεύσωμεν τὴν παιδείαν τοῦ φόβου τοῦ θεοῦ, τὰς γυναῖκας ἡμῶν ἐπὶ τὸ ἀγαθὸν διορθωσώμεθα. 7. τὸ ἀξιαγάπητον τῆς ἁγνείας ἦθος ἐνδειξάσθωσαν, τὸ ἀκέραιον τῆς πραΰτητος αὐτῶν βούλημα ἀποδειξάτωσαν, τὸ ἐπιεικὲς τῆς γλώσσης αὐτῶν διὰ τῆς σιγῆς φανερὸν ποιησάτωσαν, τὴν ἀγάπην αὐτῶν μὴ κατὰ προσκλίσεις, ἀλλὰ πᾶσιν
    τοῖς φοβουμένοις τὸν θεὸν ὁσίως ἴσην παρεχέτωσαν. 8. τὰ τέκνα ἡμῶν τῆς ἐν Χριστῷ παιδείας μεταλαμβανέτωσαν· μαθέτωσαν, τί ταπεινοφροσύνη παρὰ θεῷ ἰσχύει, τί ἀγάπη ἁγνὴ παρὰ θεῷ δύναται, πῶς ὁ φόβος αὐτοῦ καλὸς καὶ μέγας καὶ σῴζων πάντας τοὺς ἐν αὐτῷ ὁσίως ἀναστρεφομένους ἐν καθαρᾷ διανοίᾳ. 9. ἐρευνητὴς γάρ ἐστιν ἐννοιῶν καὶ ἐνθυμήσεων· οὗ ἡ πνοὴ αὐτοῦ ἐν ἡμῖν ἐστίν, καὶ ὅταν θέλῃ, ἀνελεῖ αὐτήν.
