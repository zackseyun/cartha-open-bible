  source_alignment_summary: 'El borrador español sigue de cerca el sentido general del griego y del rastro POB en la mayoría del pasaje: conserva la advertencia sobre que los dones/beneficios se vuelvan juicio, mantiene la distinción entre pensamientos y razonamientos, refleja bien la imagen fuerte de ‘desertar’ la voluntad divina, preserva la serie exhortativa a líderes/ancianos/jóvenes/mujeres/hijos, y traduce πνοή como ‘aliento’. Sin embargo, hay varias desviaciones significativas: ‘condenación’ intensifica indebidamente κρίμα; ‘con una misma mente’ suena poco natural para ὁμονοίας; ‘cuyo sangre’ es gramaticalmente incorrecto; la cita de Πνεῦμα κυρίου debería ajustarse mejor a la decisión del proyecto sobre κύριος/YHWH en una cita escritural con probable trasfondo veterotestamentario; y ‘Señor Jesús Mesías’ carece del artículo natural en español para el título.'
  spanish_quality_summary: 'El texto es generalmente legible y digno, pero presenta algunos giros poco naturales o defectuosos para español eclesial contemporáneo: ‘con una misma mente’ suena calcado; ‘en alguna parte dice’ puede suavizarse a ‘en cierto lugar dice’; ‘cuyo sangre’ es un error; ‘carácter amable de la pureza’ resulta menos preciso que ‘carácter digno de amor de la pureza’ o una solución más idiomática como ‘el bello carácter de la pureza’; y ‘cuando quiera’ rebaja el matiz de ὅταν θέλῃ frente a ‘cuando él quiera’ o ‘cuando él lo quiera’. La revisión propuesta mejora fidelidad y naturalidad sin parafrasear.'
  glossary_alignment: 'Alineación parcial con la glosa del proyecto. Positivo: Χριστός se traduce como ‘Mesías’; πνοή como ‘aliento’; ἐντραπῶμεν como ‘tengamos reverencia’. A corregir: en la cita ‘Πνεῦμα κυρίου’, dado el estándar del proyecto de no enmascarar el nombre divino, conviene ‘Espíritu de Yahvé’ con nota contextual sobre la forma citada ‘del Señor’, ya que el texto inmediato griego tiene κυρίου pero la cita remite al nombre divino. También conviene ajustar κρίμα a ‘juicio’ en vez de ‘condenación’.'
  issues:
  - severity: medium
    issue: ‘condenación’ para κρίμα
    rationale: κρίμα aquí es ‘juicio’, no necesariamente condenación final. ‘Condenación’ endurece el sentido más allá del griego y del English POB.
  - severity: medium
    issue: ‘con una misma mente’ para ὁμονοίας
    rationale: Aunque semánticamente cercano, suena calcado y poco idiomático en español. ‘De común acuerdo’ o ‘con un mismo sentir’ preserva mejor la concordia comunitaria.
  - severity: high
    issue: 'Error gramatical: ‘cuyo sangre’'
    rationale: Debe ser ‘cuya sangre’. Tal como está, el texto español es incorrecto.
  - severity: medium
    issue: Cita ‘El Espíritu del Señor’ sin atender la política de Yahvé
    rationale: El proyecto pide ‘Yahvé’ en texto principal. Como aquí el griego cita ‘Πνεῦμα κυρίου’, lo mejor es usar ‘Espíritu de Yahvé’ y explicar en nota que el griego dice ‘del Señor’ en la cita.
  - severity: low
    issue: ‘Señor Jesús Mesías’ sin artículo
    rationale: En español resulta más natural y claro ‘el Señor Jesús Mesías’ en esta construcción exhortativa.
  - severity: low
    issue: ‘carácter amable de la pureza’
    rationale: ‘Amable’ puede entenderse como ‘afable’ y pierde el matiz de ἀξιαγάπητον (‘digno de amor’, ‘hermoso’, ‘bello’). Conviene una formulación más clara y natural.
  revised_spanish_text: 'Cuidad, amados, que sus muchos beneficios no lleguen a ser juicio para todos nosotros, si no vivimos de manera digna de él y no hacemos lo bueno y agradable delante de él de común acuerdo. Porque en cierto lugar dice: «El Espíritu de Yahvé[a] es una lámpara que escudriña los aposentos del vientre». Veamos cuán cerca está, y que nada de nuestros pensamientos ni de los razonamientos que hacemos se le ha ocultado. Por tanto, es justo que no desertemos de su voluntad. Más bien, ofendamos a hombres insensatos y necios, hombres que se enorgullecen y se jactan en la arrogancia de su hablar, antes que a Dios. Tengamos reverencia por el Señor Jesús Mesías, cuya sangre fue dada por nosotros; respetemos a los que nos guían; honremos a los ancianos; instruyamos a los más jóvenes en la disciplina del temor de Dios; y dirijamos a nuestras mujeres hacia lo bueno. Que ellas muestren el bello carácter de la pureza; que manifiesten la intención sincera de su mansedumbre; que hagan
    evidente por medio del silencio la moderación de su lengua; que extiendan su amor no según parcialidades, sino igualmente a todos los que temen a Dios en santidad. Que nuestros hijos participen de la disciplina que está en Mesías. Que aprendan qué fuerza tiene la humildad delante de Dios, qué puede hacer el amor puro delante de Dios, cómo su temor es bueno, grande y salva a todos los que se conducen delante de él en santidad, con mente pura. Porque él es examinador de pensamientos e intenciones; su aliento está en nosotros, y cuando él quiera, lo quitará.'
  revised_footnotes:
  - marker: a
    text: El griego de la cita dice literalmente «Espíritu del Señor» (Πνεῦμα κυρίου), pero se vierte «Yahvé» siguiendo la política del proyecto para las alusiones al nombre divino en citas escriturales.
    reason: Preservar la política terminológica del proyecto y explicar la forma citada en griego para evitar confusión.
  revision_rationale: La revisión corrige una intensificación semántica indebida (‘condenación’ → ‘juicio’), mejora la naturalidad del español (‘de común acuerdo’), arregla el error gramatical (‘cuya sangre’), alinea la cita con la política de ‘Yahvé’ mediante una nota, y suaviza algunos giros para un español más claro y digno sin perder el contenido del original ni las decisiones léxicas documentadas.
