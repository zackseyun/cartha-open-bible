translation:
  language: es
  text: 'Cuidad, amados, que sus muchos beneficios no lleguen a ser juicio para todos nosotros, si no vivimos de manera digna de él y no hacemos lo bueno y agradable delante de él de común acuerdo. Porque en cierto lugar dice: «El Espíritu de Yahvé[a] es una lámpara que escudriña los aposentos del vientre». Veamos cuán cerca está, y que nada de nuestros pensamientos ni de los razonamientos que hacemos se le ha ocultado. Por tanto, es justo que no desertemos de su voluntad. Más bien, ofendamos a hombres insensatos y necios, hombres que se enorgullecen y se jactan en la arrogancia de su hablar, antes que a Dios. Tengamos reverencia por el Señor Jesús Mesías, cuya sangre fue dada por nosotros; respetemos a los que nos guían; honremos a los ancianos; instruyamos a los más jóvenes en la disciplina del temor de Dios; y dirijamos a nuestras mujeres hacia lo bueno. Que ellas muestren el bello carácter de la pureza; que manifiesten la intención sincera de su mansedumbre; que hagan evidente por medio
    del silencio la moderación de su lengua; que extiendan su amor no según parcialidades, sino igualmente a todos los que temen a Dios en santidad. Que nuestros hijos participen de la disciplina que está en Mesías. Que aprendan qué fuerza tiene la humildad delante de Dios, qué puede hacer el amor puro delante de Dios, cómo su temor es bueno, grande y salva a todos los que se conducen delante de él en santidad, con mente pura. Porque él es examinador de pensamientos e intenciones; su aliento está en nosotros, y cuando él quiera, lo quitará.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de la cita dice literalmente «Espíritu del Señor» (Πνεῦμα κυρίου), pero se vierte «Yahvé» siguiendo la política del proyecto para las alusiones al nombre divino en citas escriturales.
    reason: Preservar la política terminológica del proyecto y explicar la forma citada en griego para evitar confusión.
lexical_decisions:
- source_word: εὐεργεσίαι
  english_pob_choice: good gifts
  chosen_spanish: beneficios
  alternatives_spanish:
  - buenos dones
  - benevolencias
  - buenas dádivas
  lexicon: LSJ
  rationale: En este contexto se trata de los actos benéficos recibidos de Dios; ‘beneficios’ comunica la idea de dones favorables sin sonar forzado en español. Evita reducirlo a ‘obras’ y conserva la relación de gracia recibida que puede volverse juicio si no se responde dignamente.
- source_word: πολιτευόμενοι
  english_pob_choice: live in a manner worthy
  chosen_spanish: vivimos de manera digna
  alternatives_spanish:
  - nos conducimos como ciudadanos
  - ordenamos nuestra vida
  - vivimos
  lexicon: BDAG
  rationale: El verbo tiene fuerza ética con matiz de conducta comunitaria. ‘Vivir de manera digna’ conserva ese peso moral en español natural, sin forzar el matiz cívico de forma mecánica.
- source_word: ὁμονοίας
  english_pob_choice: with one accord
  chosen_spanish: con una misma mente
  alternatives_spanish:
  - con un mismo sentir
  - en armonía
  - de común acuerdo
  lexicon: LSJ
  rationale: La unidad aquí es concordia activa de la comunidad. ‘Con una misma mente’ conserva la resonancia de unanimidad y evita un giro demasiado técnico o eclesiástico.
- source_word: ταμιεῖα τῆς γαστρός
  english_pob_choice: the storerooms of the belly
  chosen_spanish: los aposentos del vientre
  alternatives_spanish:
  - los almacenes del vientre
  - los recovecos del vientre
  - las cámaras del vientre
  lexicon: LSJ
  rationale: Se mantiene la imagen corporal y oculta de la cita con un español comprensible. ‘Aposentos’ reproduce el valor de ‘chambers/storerooms’ sin abstractizar la metáfora a ‘interior’ o ‘corazón’.
- source_word: ἐννοιῶν
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - ideas
  - nociones
  - pensares
  lexicon: BDAG
  rationale: En el pasaje remite al contenido mental interior. ‘Pensamientos’ es la forma más natural y clara en español.
- source_word: διαλογισμῶν
  english_pob_choice: reasonings
  chosen_spanish: razonamientos
  alternatives_spanish:
  - deliberaciones
  - cavilaciones
  - argumentos internos
  lexicon: BDAG
  rationale: Se preserva la distinción con ἐννοιῶν. ‘Razonamientos’ comunica el proceso discursivo o reflexivo que la audiencia realiza, sin colapsarlo en ‘pensamientos’.
- source_word: λειποτακτεῖν
  english_pob_choice: desert
  chosen_spanish: desertemos
  alternatives_spanish:
  - abandonemos
  - nos apartemos
  - traicionemos
  lexicon: LSJ
  rationale: La imagen de deserción es fuerte; ‘desertemos’ conserva ese tono de ruptura con la voluntad de Dios mejor que ‘abandonemos’.
- source_word: προσκόψωμεν
  english_pob_choice: offend
  chosen_spanish: ofendamos
  alternatives_spanish:
  - tropecemos
  - demos tropiezo
  - irritemos
  lexicon: BDAG
  rationale: La oposición es entre agradar a hombres arrogantes o a Dios. ‘Ofender’ reproduce bien la fuerza relacional y moral del verbo en español contemporáneo.
- source_word: ἐντραπῶμεν
  english_pob_choice: have reverence for
  chosen_spanish: tengamos reverencia por
  alternatives_spanish:
  - tengamos temor reverente de
  - reverenciemos
  - sintamos reverencia por
  lexicon: BDAG
  rationale: El contexto es exhortativo y devocional; no se trata solo de vergüenza, sino de una postura de reverencia ante el Señor Jesús. ‘Tengamos reverencia por’ lo expresa con claridad.
- source_word: προηγουμένους
  english_pob_choice: those who lead us
  chosen_spanish: los que nos guían
  alternatives_spanish:
  - nuestros líderes
  - los que van delante de nosotros
  - los que nos presiden
  lexicon: BDAG
  rationale: La expresión puede aludir a quienes van delante en liderazgo. ‘Los que nos guían’ es claro y mantiene el sentido comunitario sin imponer un título eclesiástico específico.
- source_word: παιδεύσωμεν ... τὴν παιδείαν
  english_pob_choice: train ... in the discipline
  chosen_spanish: instruyamos ... en la disciplina
  alternatives_spanish:
  - eduquemos ... en la disciplina
  - formemos ... en la disciplina
  - enseñemos ... en la disciplina
  lexicon: BDAG
  rationale: La repetición de la raíz παιδ- apunta a formación moral, no solo instrucción intelectual. ‘Instruyamos’ y ‘disciplina’ conservan esa relación formativa en español.
- source_word: διορθωσώμεθα
  english_pob_choice: direct
  chosen_spanish: dirijamos
  alternatives_spanish:
  - corregimos
  - ordenemos
  - encaminemos
  lexicon: LSJ
  rationale: En este marco, el verbo expresa orientar la conducta de las mujeres hacia lo bueno. ‘Dirijamos’ respeta el tono exhortativo y evita un matiz excesivamente duro.
- source_word: ἀξιαγάπητον
  english_pob_choice: lovely
  chosen_spanish: amable
  alternatives_spanish:
  - amable de amar
  - digno de amor
  - hermoso
  lexicon: LSJ
  rationale: El adjetivo significa algo digno de amor. ‘Amable’ funciona en español como ‘amable/atractivo para el amor’ en estilo literario, conservando el valor elogioso del término.
- source_word: ἁγνείας
  english_pob_choice: purity
  chosen_spanish: pureza
  alternatives_spanish:
  - castidad
  - limpieza
  - honestidad
  lexicon: BDAG
  rationale: El término abarca pureza moral, no solo sexual. ‘Pureza’ mantiene ese alcance amplio y es la opción más transparente.
- source_word: ἀκέραιον
  english_pob_choice: sincere
  chosen_spanish: sincera
  alternatives_spanish:
  - íntegra
  - pura
  - sin mezcla
  lexicon: BDAG
  rationale: La palabra sugiere integridad, no duplicidad. ‘Intención sincera’ refleja bien la idea de intención no mezclada o no fingida.
- source_word: ἐπιεικές
  english_pob_choice: moderation
  chosen_spanish: moderación
  alternatives_spanish:
  - mansedumbre
  - afabilidad
  - mesura
  lexicon: BDAG
  rationale: Aplicado a la lengua, el término sugiere contención y mesura. ‘Moderación de su lengua’ hace visible la conexión con el silencio del contexto.
- source_word: προσκλίσεις
  english_pob_choice: partialities
  chosen_spanish: parcialidades
  alternatives_spanish:
  - preferencias
  - favores
  - acepción de personas
  lexicon: LSJ
  rationale: La frase prohíbe un amor selectivo por favoritismos. ‘Parcialidades’ conserva la crítica ética sin introducir una frase más interpretativa.
- source_word: μεταλαμβανέτωσαν
  english_pob_choice: partake
  chosen_spanish: participen
  alternatives_spanish:
  - participen en
  - tomen parte de
  - compartan
  lexicon: BDAG
  rationale: El verbo implica participación real en una formación moral. ‘Participen’ es natural en español y mantiene la idea de tomar parte en una disciplina compartida.
- source_word: ταπεινοφροσύνη
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - bajeza de mente
  - lowliness de mente
  - humillación
  lexicon: BDAG
  rationale: Es el término ético estándar. ‘Humildad’ comunica de manera clara y digna la virtud requerida.
- source_word: ἀναστρεφομένους
  english_pob_choice: conduct themselves
  chosen_spanish: se conducen
  alternatives_spanish:
  - viven
  - andan
  - se comportan
  lexicon: BDAG
  rationale: El verbo describe el modo habitual de vida. ‘Se conducen’ preserva ese valor ético continuo.
- source_word: ἐνθυμήσεων
  english_pob_choice: intentions
  chosen_spanish: intenciones
  alternatives_spanish:
  - pensamientos internos
  - propósitos
  - reflexiones
  lexicon: BDAG
  rationale: En paralelo con pensamientos, este término apunta a impulsos o propósitos internos. ‘Intenciones’ mantiene la distinción semántica y suena natural.
- source_word: πνοή
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - respiración
  - espíritu
  - vida
  lexicon: BDAG
  rationale: Aquí el sentido es el aliento vital que Dios pone en nosotros y puede retirar. ‘Aliento’ conserva la imagen antropológica sin confundirla con πνεῦμα en la cita previa.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: Proyecto POB (terminología cristológica)
  rationale: Se sigue la norma del proyecto de traducir el título como ‘Mesías’ cuando funciona como designación titulary. Esto se aplica a ‘Señor Jesús Mesías’ y a ‘en Mesías’ para mantener la transparencia semántica.
theological_decisions:
- issue: Χριστός como título cristológico
  english_pob_reading: the Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto es confesional y titulado, no una mera forma nominalizada fija. ‘Mesías’ mantiene visible el valor de título y sigue la política del proyecto de no ocultar el contenido semántico bajo ‘Cristo’ salvo necesidad idiomática.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: ἐντραπῶμεν hacia el Señor Jesús
  english_pob_reading: have reverence for
  chosen_spanish_reading: tengamos reverencia por
  alternative_spanish_readings:
  - sintamos temor reverente de
  - reverenciemos
  - nos avergoncemos ante
  rationale: El pasaje llama a una actitud de respeto devoto ante Jesús por la entrega de su sangre. ‘Reverencia’ expresa mejor ese movimiento que una simple ‘vergüenza’, que resultaría más débil o más estrecha de lo que el contexto pide.
  doctrine_reference: La exégesis del verbo en este contexto paraenético y cristológico.
- issue: τὰς γυναῖκας ἡμῶν
  english_pob_reading: our women
  chosen_spanish_reading: nuestras mujeres
  alternative_spanish_readings:
  - nuestras esposas
  - las mujeres de nosotros
  rationale: La secuencia enumera grupos comunitarios (líderes, ancianos, jóvenes, mujeres, niños). ‘Nuestras mujeres’ conserva el ámbito corporativo y no restringe indebidamente el referente a esposas individuales, aunque el contexto doméstico sigue siendo posible.
  doctrine_reference: La distribución exhortativa de grupos en el capítulo.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la última revisión inglesa: mantiene ‘one accord’ con una fórmula de unidad, conserva ‘Messiah’ como título traducido, y refleja la clausura con ‘before him’ mediante ‘delante de él’. También preserva la distinción entre ‘thoughts’ y ‘reasonings’, y entre la cita de πνεῦμα como ‘Espíritu’ y πνοή como ‘aliento’.'
  spanish_consistency_notes:
  - Se mantiene ‘Mesías’ para Χριστός en todo el pasaje, evitando alternancia con ‘Cristo’.
  - Se distingue ‘Espíritu’ (cita) de ‘aliento’ (final), para no confundir πνεῦμα con πνοή.
  - Se conserva la pareja ‘pensamientos / razonamientos’ para reflejar dos términos griegos distintos.
  - La estructura exhortativa en imperativos y subjuntivos exhortativos se traduce con formas inclusivas de primera persona del plural para mantener el tono comunitario del original.
