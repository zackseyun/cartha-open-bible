base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/021/001.yaml
  text: See to it, beloved, that his many good gifts do not become a judgment against us all, if we do not live in a manner worthy of him and do what is good and pleasing before him with one accord. For somewhere it says, “The Spirit of the Lord is a lamp, searching the storerooms of the belly.” Let us see how near he is, and that none of our thoughts, nor the reasonings we carry on, has escaped his notice. Therefore it is right that we should not desert his will. Rather, let us offend foolish and senseless men, men who are puffed up and boast in the arrogance of their speech, rather than God. Let us have reverence for the Lord Jesus Messiah, whose blood was given for us; let us respect those who lead us; let us honor the elders; let us train the younger in the discipline of the fear of God; let us direct our women toward what is good. Let them show the lovely character of purity; let them demonstrate the sincere intention of their gentleness; let them make the moderation of their tongue
    evident through silence; let them extend their love not according to partialities, but equally to all who fear God in holiness. Let our children partake of the discipline that is in Messiah. Let them learn what strength humility has before God, what pure love is able to do before God, how his fear is good and great and saves all who conduct themselves before him in holiness, with a pure mind. For he is a searcher of thoughts and intentions; his breath is in us, and whenever he wills, he will take it away.
