source:
  edition: Funk 1901 (normalized OCR)
  text: μᾶλλον ἀνθρώποις ἄφροσι καὶ ἀνοήτοις καὶ ἐπαιρομένοις καὶ ἐγκαυχωμένοις ἐν ἀλαζονείᾳ τοῦ λόγου αὐτῶν προσκόψωμεν ἢ τῷ θεῷ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/021/005.yaml
  text: Rather, let us offend foolish and senseless men, who are puffed up and boast in the arrogance of their speech, rather than God.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:10Z'
    unchanged: false
    changes_summary: Removed the repeated 'men' for smoother English and changed the final clause to 'rather than God' for more natural comparison while preserving the sense.
translation:
  language: es
  text: Más bien, ofendamos a hombres necios e insensatos, que se llenan de orgullo y se jactan con la arrogancia de su hablar, en vez de ofender a Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνθρώποις ἄφροσι καὶ ἀνοήτοις
  english_pob_choice: foolish and senseless men
  chosen_spanish: hombres insensatos y necios
  alternatives_spanish:
  - hombres necios e insensatos
  - personas insensatas y necias
  lexicon: ἄφρων, ἀνόητος
  rationale: Conservo el doble calificativo con una pareja natural en español. ‘Insensatos’ y ‘necios’ reflejan bien la acumulación semántica del griego sin diluirla en una sola idea.
- source_word: ἐπαιρομένοις
  english_pob_choice: who are puffed up
  chosen_spanish: que se enorgullecen
  alternatives_spanish:
  - que están inflados
  - que se ensoberbecen
  lexicon: ἐπαίρω
  rationale: La imagen literal de ‘inflarse’ es posible, pero ‘se enorgullecen’ comunica en español con claridad el matiz de arrogancia que sigue en el contexto.
- source_word: ἐγκαυχωμένοις
  english_pob_choice: boast
  chosen_spanish: se jactan
  alternatives_spanish:
  - se glorían
  - presumen
  lexicon: ἐγκαυχάομαι
  rationale: ‘Jactarse’ reproduce con precisión el valor de autoexaltación verbal. Mantiene la relación con la frase final sobre la arrogancia de sus palabras.
- source_word: ἐν ἀλαζονείᾳ τοῦ λόγου αὐτῶν
  english_pob_choice: in the arrogance of their speech
  chosen_spanish: en la arrogancia de sus palabras
  alternatives_spanish:
  - en la arrogancia de su խոս话
  - en la vanagloria de su խոսlengo
  lexicon: ἀλαζονεία, λόγος
  rationale: ‘Palabras’ expresa de forma directa el genitivo plural del texto y evita una abstracción mayor. ‘Arrogancia’ mantiene el tono moral del término griego.
- source_word: προσκόψωμεν ἢ τῷ θεῷ
  english_pob_choice: rather than God
  chosen_spanish: antes que a Dios
  alternatives_spanish:
  - más bien que a Dios
  - en vez de a Dios
  lexicon: προσκόπτω, θεός
  rationale: El griego compara dos posibles objetos del tropiezo/ofensa. En español, ‘antes que a Dios’ conserva la idea comparativa y el contraste retórico del texto base. Dado el contexto, ‘Dios’ es la referencia natural de τῷ θεῷ.
theological_decisions:
- issue: Objeto de la ofensa/tropiezo
  english_pob_reading: Rather, let us offend foolish and senseless men ... rather than God.
  chosen_spanish_reading: Más bien, ofendamos a hombres insensatos y necios ... antes que a Dios.
  alternative_spanish_readings:
  - Más bien, tropecemos a hombres insensatos y necios ...
  - Más bien, escandalicemos a hombres insensatos y necios ...
  rationale: El verbo griego προσκόπτω puede llevar la idea de ‘tropezar’ u ‘ofender’. La POB inglesa eligió ‘offend’ y el español ‘ofendamos’ conserva ese valor relacional y retórico sin forzar una imagen más específica que el contexto no exige.
  doctrine_reference: Uso retórico de ofensa/tropiezo en exhortación moral; no implica aprobación del mal sino priorización del agrado de Dios.
translation_notes:
  revision_awareness: La versión inglesa revisada suavizó la repetición de ‘men’ y cerró con una comparación más natural (‘rather than God’). El español sigue esa línea de fluidez, pero conserva el contraste directo del griego con ‘antes que a Dios’, sin introducir explicaciones añadidas.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para τῷ θεῷ conforme al estándar del proyecto.
  - Se conserva una estructura exhortativa en primera persona plural (‘ofendamos’), coherente con el subjuntivo exhortativo del griego y con la POB inglesa.
  - No se introduce ‘Cristo’ ni terminología eclesiástica ajena al texto.
  - La duplicación semántica ‘insensatos y necios’ refleja la intensificación del original sin simplificarla.
