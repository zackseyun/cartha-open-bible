  rationale: 'Se ajusta la redacción para que el español sea más natural sin perder el sentido del griego ni la auditoría inglesa: se conserva la preferencia retórica de desagradar a hombres arrogantes antes que a Dios, se mantiene la doble caracterización negativa, y se expresa de forma más idiomática la idea de jactarse en la arrogancia de su habla.'
