    changes_summary: Replaced the period after 'intentions' with a semicolon to better reflect the Greek sentence flow; otherwise retained the draft as accurate and natural.
translation:
  language: es
  text: Porque él es escudriñador de pensamientos e intenciones; su aliento está en nosotros, y cuando quiera, lo retirará.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐρευνητὴς
  english_pob_choice: searcher
  chosen_spanish: escudriñador
  alternatives_spanish:
  - buscador
  - investigador
  lexicon: ἐρευνητής
  rationale: «Escudriñador» comunica bien la idea de alguien que examina a fondo y con penetración, y en español conserva un tono más solemne y bíblico que «buscador», sin perder el sentido de búsqueda/examen del griego y del inglés POB.
- source_word: ἐννοιῶν καὶ ἐνθυμήσεων
  english_pob_choice: thoughts and intentions
  chosen_spanish: pensamientos e intenciones
  alternatives_spanish:
  - pensamientos y propósitos
  - ideas e intenciones
  lexicon: ἔννοια / ἐνθύμησις
  rationale: La pareja «pensamientos e intenciones» reproduce con naturalidad la doble referencia interna del original y coincide con la decisión inglesa; «intenciones» mantiene la orientación volitiva o deliberada que sugiere ἐνθυμήσεις.
- source_word: πνοὴ
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - respiración
  - soplo
  lexicon: πνοή
  rationale: «Aliento» es la opción más natural en español para πνοή en este contexto, preservando el sentido de vida/respiración sin forzar una interpretación específica como «Espíritu».
- source_word: ἀνελεῖ αὐτήν
  english_pob_choice: will take it away
  chosen_spanish: lo quitará
  alternatives_spanish:
  - la quitará
  - lo removerá
  - lo arrebatará
  lexicon: ἀναιρέω
  rationale: El sujeto implícito es «su aliento»; en español, «lo quitará» mantiene la brevedad y la idea de retirar o remover la vida/aliento. «La» sería gramaticalmente posible si se toma πνοή como femenino, pero la traducción inglesa usa un neutro referencial; aquí se evita una discordancia innecesaria con «aliento».
theological_decisions:
- issue: ¿«aliento» o una referencia explícita al Espíritu?
  english_pob_reading: his breath is in us
  chosen_spanish_reading: su aliento está en nosotros
  alternative_spanish_readings:
  - su Espíritu está en nosotros
  - su soplo está en nosotros
  rationale: 'El griego usa πνοή, no πνεῦμα; por eso se conserva «aliento» y no se explicita «Espíritu». Esto mantiene la tensión lexical del texto: habla de la dependencia vital de los humanos respecto de Dios, no de una afirmación explícita sobre el Espíritu Santo.'
  doctrine_reference: Creación y dependencia de la vida humana de Dios (Gn 2:7; Job 33:4)
translation_notes:
  revision_awareness: La versión inglesa revisada unificó el flujo con un punto y coma tras «intentions». La redacción española ya refleja esa estructura con un punto y coma, manteniendo una sola cláusula principal seguida de la explicación causal y temporal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el tetragrámaton ni κύριος con función sustitutiva.
  - Se evita «Cristo»/«Mesías» porque el pasaje no contiene χριστός ni lenguaje mesiánico.
  - Se conserva el paralelismo semántico entre «pensamientos» e «intenciones» sin añadir términos interpretativos.
  - «Aliento» se usa en sentido de vida/respiración, no como glosa doctrinal.
  - La puntuación con punto y coma sigue la revisión inglesa y el flujo sintáctico del griego.
