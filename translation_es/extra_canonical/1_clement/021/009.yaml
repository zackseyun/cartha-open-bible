- from: Porque él es escudriñador de pensamientos e intenciones; su aliento está en nosotros, y cuando él quiera, lo quitará.
  to: Porque él es escudriñador de pensamientos e intenciones; su aliento está en nosotros, y cuando quiera, lo retirará.
  rationale: Se mantiene la fidelidad léxica general del borrador, pero se sustituye «lo quitará» por «lo retirará» para un español más natural y más preciso en este contexto, y se simplifica «cuando él quiera» a «cuando quiera» para reflejar mejor el griego y mejorar la fluidez.
