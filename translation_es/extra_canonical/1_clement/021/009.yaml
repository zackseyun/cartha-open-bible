review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el audit trail inglés: ἐρευνητὴς → «escudriñador», ἐννοιῶν καὶ ἐνθυμήσεων → «pensamientos e intenciones», πνοὴ → «aliento», y la estructura con punto y coma refleja correctamente el flujo de la oración. Sin embargo, hay un problema de referencia pronominal en español: «lo quitará» no expresa con naturalidad que Dios retirará «su aliento» de nosotros; en este contexto, el español idiomático y más fiel al sentido es «lo retirará» o una reformulación equivalente.'
  spanish_quality_summary: La redacción es clara y digna, pero «cuando él quiera» suena ligeramente menos natural que «cuando quiera» o «cuando él lo quiera», y «lo quitará» resulta algo tosco y ambiguo en español eclesial moderno. Una pequeña revisión mejora la fluidez y la precisión sin apartarse del original.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Aliento» respeta correctamente πνοή y evita confundirlo con «Espíritu». «Escudriñador» encaja bien con el tono bíblico y con «searcher».
  issues:
  - severity: medium
    issue: Verbo final «lo quitará» poco natural para referirse al retiro del aliento/vida
    rationale: Aunque comprensible, «quitar» con objeto directo «lo» suena menos idiomático y menos preciso en este contexto que «retirar». El griego ἀνελεῖ αὐτήν aquí expresa quitar/retirar la vida o el aliento; «lo retirará» comunica mejor esa acción en español.
  - severity: low
    issue: «cuando él quiera» puede afinarse estilísticamente
    rationale: El griego ὅταν θέλῃ no exige énfasis en el pronombre. «Cuando quiera» suena más natural en español; no obstante, mantener «él» no es incorrecto. La revisión propuesta conserva la claridad y mejora el ritmo general.
  revised_spanish_text: Porque él es escudriñador de pensamientos e intenciones; su aliento está en nosotros, y cuando quiera, lo retirará.
  revision_rationale: Se mantiene la fidelidad léxica general del borrador, pero se sustituye «lo quitará» por «lo retirará» para un español más natural y más preciso en este contexto, y se simplifica «cuando él quiera» a «cuando quiera» para reflejar mejor el griego y mejorar la fluidez.
