revisions:
- from: Que nuestros hijos participen de la disciplina que está en el Mesías. Que aprendan qué logra la humildad[a] delante de Dios, qué puede hacer el amor puro delante de Dios, cómo su temor es bueno, grande y salva a todos los que viven en santidad en él, con una mente pura.
  to: Que nuestros hijos participen de la disciplina del Mesías. Que aprendan qué logra la humildad[a] delante de Dios, qué puede hacer el amor puro delante de Dios, cuán bueno y grande es su temor, y que salva a todos los que viven en santidad en él, con mente pura.
  rationale: Se retoca la redacción para que el español refleje con más naturalidad la sintaxis y el énfasis del griego. «Disciplina del Mesías» evita un calco rígido de ἐν Χριστῷ en una construcción nominal. «Cuán bueno y grande es su temor, y que salva…» expresa mejor πῶς… καλὸς καὶ μέγας καὶ σῴζων que la formulación con «cómo». Se mantiene la nota alternativa sobre ἰσχύει y la terminología «Mesías» conforme a la política del proyecto.
  reviewer_model: gpt-5.4
