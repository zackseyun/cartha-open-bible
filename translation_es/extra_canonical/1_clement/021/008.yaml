id: 1CLEM.21.8
reference: 1 Clement 21:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: τὰ τέκνα ἡμῶν τῆς ἐν Χριστῷ παιδείας μεταλαμβανέτωσαν· μαθέτωσαν, τί ταπεινοφροσύνη παρὰ θεῷ ἰσχύει, τί ἀγάπη ἁγνὴ παρὰ θεῷ δύναται, πῶς ὁ φόβος αὐτοῦ καλὸς καὶ μέγας καὶ σῴζων πάντας τοὺς ἐν αὐτῷ ὁσίως ἀναστρεφομένους ἐν καθαρᾷ διανοίᾳ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/021/008.yaml
  text: Let our children partake of the discipline that is in Messiah. Let them learn what humility accomplishes before God[a], what pure love is able to do before God, how his fear is good and great and saves all who live in holiness in him, with a pure mind.
  footnotes:
  - marker: a
    text: Or 'what humility has strength before God'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:12Z'
    unchanged: false
    changes_summary: 'Changed ''Messiah'' to ''Christ'' to match ἐν Χριστῷ more naturally in this context; revised ''what strength humility has before God'' to ''what humility accomplishes before God'' for more natural rendering of ἰσχύει; and changed ''conduct themselves in it in holiness'' to ''live in holiness in him'' to reflect ἐν αὐτῷ with ἀναστρεφομένους more accurately. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Que nuestros hijos participen de la disciplina del Mesías. Que aprendan qué logra la humildad[a] delante de Dios, qué puede hacer el amor puro delante de Dios, cuán bueno y grande es su temor, y que salva a todos los que viven en santidad en él, con mente pura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «qué fuerza tiene la humildad delante de Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν Χριστῷ
  english_pob_choice: that is in Messiah
  chosen_spanish: que está en el Mesías
  alternatives_spanish:
  - que está en Cristo
  - en el Mesías
  lexicon: Χριστός
  rationale: Se conserva «Mesías» como forma principal conforme a la política del proyecto para Χριστός, y porque el contexto habla de la disciplina vinculada a esa esfera; «Cristo» quedaría como opción idiomática, pero no como preferencia principal aquí.
- source_word: παιδείας
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - formación
  - instrucción
  lexicon: παιδεία
  rationale: «Disciplina» mantiene el campo de formación correctiva y educativa de παιδεία sin suavizarlo hacia una mera enseñanza.
- source_word: μαθέτωσαν
  english_pob_choice: Let them learn
  chosen_spanish: Que aprendan
  alternatives_spanish:
  - Que conozcan
  - Que sepan
  lexicon: μανθάνω
  rationale: «Aprendan» conserva el valor de adquisición activa de conocimiento exigido por el contexto exhortativo.
- source_word: τί ταπεινοφροσύνη παρὰ θεῷ ἰσχύει
  english_pob_choice: what humility accomplishes before God
  chosen_spanish: qué logra la humildad delante de Dios
  alternatives_spanish:
  - qué fuerza tiene la humildad delante de Dios
  - qué puede la humildad delante de Dios
  lexicon: ταπεινοφροσύνη / ἰσχύω
  rationale: La revisión inglesa corrigió el giro hacia el efecto/alcance de la humildad; «logra» comunica ese valor efectivo sin forzar una lectura puramente modal de ἰσχύει. Se evita «tiene fuerza» como posible alternativa válida, pero menos natural en español.
- source_word: ἀγάπη ἁγνὴ
  english_pob_choice: pure love
  chosen_spanish: el amor puro
  alternatives_spanish:
  - amor puro
  - el amor limpio
  lexicon: ἀγάπη
  rationale: Se mantiene «amor» para ἀγάπη y «puro» para ἁγνὴ, preservando la cualidad moral/ritual sin introducir términos ajenos como «limpio».
- source_word: φόβος αὐτοῦ
  english_pob_choice: his fear
  chosen_spanish: su temor
  alternatives_spanish:
  - el temor de él
  - el temor de Dios
  lexicon: φόβος
  rationale: «Su temor» reproduce el pronombre del griego y evita resolver prematuramente la referencia, aunque el contexto apunta a Dios. La nota teológica queda implícita en el contexto y no se expande innecesariamente.
- source_word: ὁσίως ἀναστρεφομένους
  english_pob_choice: who live in holiness
  chosen_spanish: los que viven en santidad
  alternatives_spanish:
  - los que se conducen santamente
  - los que se comportan con santidad
  lexicon: ὁσίως / ἀναστρέφω
  rationale: «Viven en santidad» mantiene el sentido resultativo y evita una frase demasiado literal sobre «conducirse», que en español suena más pesada que el griego contextual.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en él mismo
  - en aquel
  lexicon: ἐν αὐτῷ
  rationale: Se conserva la referencia pronominal directa del texto griego, sin convertirla en una paráfrasis explicativa.
- source_word: καθαρᾷ διανοίᾳ
  english_pob_choice: with a pure mind
  chosen_spanish: con una mente pura
  alternatives_spanish:
  - con un entendimiento puro
  - con una disposición pura
  lexicon: διανοία
  rationale: «Mente» reproduce el componente cognitivo de διανοία y «pura» mantiene el calificativo de καθαρᾷ sin sobreexplicar.
theological_decisions:
- issue: Título mesiánico de Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se restaura la terminología del proyecto para Χριστός como título mesiánico, siguiendo la política indicada y el control de revisiones que corrigió un desvío hacia «Cristo».
  doctrine_reference: Project terminology policy for Χριστός / Messiah language
- issue: Pronombre en «su temor»
  english_pob_reading: his fear
  chosen_spanish_reading: su temor
  alternative_spanish_readings:
  - el temor de Dios
  rationale: El griego conserva el pronombre αὐτοῦ; la versión española mantiene esa ambigüedad controlada sin explicitar más de lo que el texto dice.
  doctrine_reference: Source transparency principle
- issue: «Vivir en santidad en él»
  english_pob_reading: who live in holiness in him
  chosen_spanish_reading: los que viven en santidad en él
  alternative_spanish_readings:
  - los que se conducen santamente en él
  rationale: La frase conserva la unión de ἀναστρεφομένους con ἐν αὐτῷ sin disolverla en una paráfrasis; «en él» se mantiene como esfera de vida y perseverancia.
  doctrine_reference: Source-grounded syntax preservation
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección reciente del inglés POB: ἐν Χριστῷ volvió a «Messiah», y τί ταπεινοφροσύνη παρὰ θεῷ ἰσχύει se entendió como el alcance/eficacia de la humildad, no como una simple propiedad nominal. La frase final también refleja la revisión que unió ἐν αὐτῷ con ἀναστρεφομένους como esfera de vida.'
  spanish_consistency_notes:
  - Se usa «Mesías» en lugar de «Cristo» conforme a la terminología predeterminada del proyecto para Χριστός.
  - Se conserva «Dios» para θεῷ y «temor» para φόβος sin añadir artículos explicativos que alteren la sintaxis.
  - La nota [a] está anclada en «humildad» para señalar la alternativa «fuerza» sin duplicar lecturas en el cuerpo principal.
