source:
  edition: Funk 1901 (normalized OCR)
  text: τὸν κύριον Ἰησοῦν Χριστόν, οὗ τὸ αἷμα ὑπὲρ ἡμῶν ἐδόθη, ἐντραπῶμεν, τοὺς προηγουμένους ἡμῶν αἰδεσθῶμεν, τοὺς πρεσβυτέρους τιμήσωμεν, τοὺς νέους παιδεύσωμεν τὴν παιδείαν τοῦ φόβου τοῦ θεοῦ, τὰς γυναῖκας ἡμῶν ἐπὶ τὸ ἀγαθὸν διορθωσώμεθα.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/021/006.yaml
  text: Let us have reverence for the Lord Jesus Christ[a], whose blood was given for us; let us respect those who go before us; let us honor the elders; let us train the young in the discipline of the fear of God[c][b]; let us direct our wives toward what is good.
  footnotes:
  - marker: a
    text: Or 'the Lord Jesus the Messiah'.
    reason: previous_rendering
  - marker: b
    text: Or 'the younger in the discipline that comes from the fear of God'.
    reason: previous_rendering
  - marker: c
    text: Or 'our women'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:11Z'
    unchanged: false
    changes_summary: Revised 'those who lead us' to 'those who go before us' for closer lexical correspondence to τοὺς προηγουμένους ἡμῶν without over-interpreting the term as formal leadership. No other changes needed.
translation:
  language: es
  text: Tengamos reverencia[a] al Señor Jesucristo, cuya sangre fue entregada por nosotros; respetemos a los que van delante de nosotros; honremos a los ancianos; formemos a los jóvenes en la disciplina del temor de Dios[b]; y dirijamos a nuestras esposas hacia lo bueno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Señor Jesús el Mesías».
    reason: previous_rendering
  - marker: b
    text: O «la disciplina que proviene del temor de Dios».
    reason: previous_rendering
  - marker: c
    text: O «nuestras mujeres».
    reason: previous_rendering
lexical_decisions:
- source_word: τὸν κύριον Ἰησοῦν Χριστόν
  english_pob_choice: the Lord Jesus Christ
  chosen_spanish: el Señor Jesucristo
  alternatives_spanish:
  - el Señor Jesús el Mesías
  - el Señor Jesús Cristo
  lexicon: κύριος; Ἰησοῦς; Χριστός
  rationale: Mantengo «Señor» para κύριον y una forma unida «Jesucristo» para Χριστόν, siguiendo el uso cristiano temprano reflejado en la revisión inglesa. «Jesucristo» evita una separación artificial y es natural en español eclesial. La alternativa «Mesías» quedaría mejor solo si el contexto exigiera subrayar el título semítico, pero aquí el flujo litúrgico favorece la forma fija de nombre.
- source_word: οὗ τὸ αἷμα ὑπὲρ ἡμῶν ἐδόθη
  english_pob_choice: whose blood was given for us
  chosen_spanish: cuya sangre fue dada por nosotros
  alternatives_spanish:
  - cuya sangre fue entregada por nosotros
  - cuya sangre se derramó por nosotros
  lexicon: αἷμα; δίδωμι
  rationale: Conservo la pasiva «fue dada» para reflejar ἐδόθη sin introducir explícitamente «derramó», que no aparece en el griego. «Por nosotros» reproduce ὑπὲρ ἡμῶν con la misma relación vicaria que en la versión inglesa.
- source_word: τοὺς προηγουμένους ἡμῶν
  english_pob_choice: those who go before us
  chosen_spanish: los que van delante de nosotros
  alternatives_spanish:
  - los que nos preceden
  - los que nos anteceden
  lexicon: προηγέομαι
  rationale: «Van delante de nosotros» conserva la imagen espacial y evita convertir la frase en una función institucional de liderazgo. Es la contrapartida natural de la revisión inglesa que prefirió «go before us».
- source_word: τοὺς πρεσβυτέρους
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  lexicon: πρεσβύτερος
  rationale: En este contexto de exhortación comunitaria general, «ancianos» comunica el rango de edad/respetabilidad sin forzar una terminología eclesiástica técnica. «Presbíteros» sería posible, pero aquí la lista paralela sugiere una referencia más amplia y social.
- source_word: τοὺς νέους
  english_pob_choice: the young
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes varones
  lexicon: νέος
  rationale: «Los jóvenes» corresponde al valor positivo del adjetivo griego y evita el error de hacerla comparativa. Es la forma más natural y amplia en español.
- source_word: τὴν παιδείαν τοῦ φόβου τοῦ θεοῦ
  english_pob_choice: the discipline of the fear of God
  chosen_spanish: la disciplina del temor de Dios
  alternatives_spanish:
  - la disciplina que proviene del temor de Dios
  - la disciplina nacida del temor de Dios
  lexicon: παιδεία; φόβος; θεός
  rationale: Sigo de cerca la estructura genitiva del griego, como la revisión inglesa. «Temor de Dios» es una expresión bíblica estable en español y conserva la densidad reverente de φόβος sin suavizarla a mero «respeto».
- source_word: τὰς γυναῖκας ἡμῶν
  english_pob_choice: our wives
  chosen_spanish: nuestras esposas
  alternatives_spanish:
  - nuestras mujeres
  - nuestras mujeres/esposas
  lexicon: γυνή
  rationale: El posesivo ἡμῶν en este código doméstico favorece el sentido relacional de «esposas». «Nuestras mujeres» sería demasiado genérico en español y perdería la precisión contextual señalada por la revisión inglesa.
- source_word: ἐπὶ τὸ ἀγαθόν διορθωσώμεθα
  english_pob_choice: let us direct ... toward what is good
  chosen_spanish: encaminemos ... hacia lo bueno
  alternatives_spanish:
  - dirijamos ... hacia lo bueno
  - corrijamos ... para lo bueno
  lexicon: διορθόω; ἀγαθός
  rationale: «Encaminar» comunica la idea de orientar o poner en rumbo hacia el bien sin reducir διορθόω a corrección disciplinaria estricta. «Hacia lo bueno» mantiene la ambigüedad amplia del neutro griego τὸ ἀγαθόν.
theological_decisions:
- issue: Referencia cristológica a Jesús con Χριστός
  english_pob_reading: the Lord Jesus Christ
  chosen_spanish_reading: el Señor Jesucristo
  alternative_spanish_readings:
  - el Señor Jesús el Mesías
  rationale: La expresión griega funciona aquí como fórmula cristiana temprana ya fusionada; por eso en español conviene una forma nominal estable, no una traducción que suene analítica o separada. Mantener «Jesucristo» respeta el uso confesional sin ocultar que Χριστός es título/nombre en el original.
  doctrine_reference: Cristología del nombre-título; uso kerygmático temprano
- issue: φόβος τοῦ θεοῦ y el sentido de disciplina
  english_pob_reading: the discipline of the fear of God
  chosen_spanish_reading: la disciplina del temor de Dios
  alternative_spanish_readings:
  - la disciplina que proviene del temor de Dios
  rationale: No suavizo φόβος a «respeto» dentro de la frase sobre la formación de los jóvenes, porque el griego mantiene la fuerza reverencial del temor piadoso como marco formativo. La elección preserva la tensión entre disciplina educativa y reverencia religiosa.
  doctrine_reference: Sabiduría bíblica y formación piadosa
- issue: τὰς γυναῖκας ἡμῶν en contexto doméstico-comunitario
  english_pob_reading: our wives
  chosen_spanish_reading: nuestras esposas
  alternative_spanish_readings:
  - nuestras mujeres
  rationale: La secuencia de roles comunitarios y domésticos apoya el sentido de «esposas», no de mujeres en general. En español, «esposas» evita una lectura inespecífica y preserva el carácter de exhortación familiar del pasaje.
  doctrine_reference: Orden doméstico y exhortación comunitaria
translation_notes:
  revision_awareness: La revisión más reciente del POB inglés corrigió «those who lead us» por «those who go before us» para no sobreinterpretar προηγουμένους como liderazgo formal. También consolidó «the Lord Jesus Christ», mantuvo «the young» y entendió γυναῖκας ἡμῶν como «our wives». La redacción española sigue esas decisiones y refleja la misma cautela semántica.
  spanish_consistency_notes:
  - Se mantuvo la forma confesional «Señor Jesucristo» para Χριστός, coherente con el uso cristiano temprano y con la revisión inglesa.
  - «Los que van delante de nosotros» evita cargar el texto con una jerarquía que el griego no explicita.
  - «Temor de Dios» se conserva como expresión reverente estable; no se diluye en un mero «respeto».
  - «Nuestras esposas» sigue la lectura contextual de γυνή en este pasaje doméstico.
