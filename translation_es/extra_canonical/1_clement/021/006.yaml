  - severity: low
    issue: «reverencia por» es menos natural que «reverencia a» en este contexto
    rationale: Con verbos y sustantivos de actitud en español, «tener reverencia a» o «reverenciar» suena más idiomático que «tener reverencia por», sin cambiar el sentido.
  - severity: low
