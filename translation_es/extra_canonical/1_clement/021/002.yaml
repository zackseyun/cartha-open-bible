translation:
  language: es
  text: 'Porque en algún lugar dice[a]: «El Espíritu del Señor es una lámpara que escudriña las cámaras más íntimas del vientre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en alguna parte».
    reason: source_note
lexical_decisions:
- source_word: Πνεῦμα κυρίου
  english_pob_choice: The Spirit of the Lord
  chosen_spanish: El Espíritu del Señor
  alternatives_spanish:
  - El Espíritu de Yahvé
  - El espíritu del Señor
  lexicon: πνεῦμα; κύριος
  rationale: Aquí el contexto exige mayúscula por referencia personal/divina; «Espíritu del Señor» reproduce la relación genitiva del griego y conserva la formulación bíblica natural en español. Se evita «Yahvé» en la cita porque el griego del pasaje trae κύριος y la audición POB en inglés también conserva «Lord».
- source_word: λύχνος
  english_pob_choice: a lamp
  chosen_spanish: una lámpara
  alternatives_spanish:
  - una luz
  - un farol
  lexicon: λύχνος
  rationale: «Lámpara» es el equivalente directo y mantiene la imagen de luz que ilumina e inspecciona; «luz» sería más libre y perdería el objeto metafórico.
- source_word: ἐρευνῶν
  english_pob_choice: searching
  chosen_spanish: que escudriña
  alternatives_spanish:
  - que busca
  - examinando
  lexicon: ἐρευνάω
  rationale: «Escudriñar» expresa bien la acción de examinar a fondo, con mayor fuerza que «buscar»; además funciona naturalmente como participio descriptivo en español.
- source_word: τὰ ταμιεῖα
  english_pob_choice: the inner chambers
  chosen_spanish: las cámaras interiores
  alternatives_spanish:
  - las habitaciones interiores
  - los aposentos internos
  - los almacenes
  lexicon: ταμιεῖον
  rationale: Sigo la revisión inglesa que corrigió «storerooms» a «inner chambers». En español, «cámaras interiores» comunica mejor la idea de espacios ocultos o íntimos. «Almacenes» sería literal pero erróneo en este contexto proverbial.
- source_word: τῆς γαστρός
  english_pob_choice: of the belly
  chosen_spanish: del vientre
  alternatives_spanish:
  - del pecho
  - del interior
  - del abdomen
  lexicon: γαστήρ
  rationale: «Vientre» conserva el sentido corporal/visceral de γαστήρ en un español bíblico claro. «Abdomen» suena demasiado técnico; «interior» perdería la metáfora corporal.
theological_decisions:
- issue: 'Sentido de la cita proverbial: interior humano vs. almacenamiento físico'
  english_pob_reading: The Spirit of the Lord is a lamp, searching the inner chambers of the belly.
  chosen_spanish_reading: El Espíritu del Señor es una lámpara que escudriña las cámaras interiores del vientre.
  alternative_spanish_readings:
  - El Espíritu del Señor es una lámpara que escudriña los almacenes del vientre.
  - El Espíritu del Señor es una lámpara que examina lo más íntimo del ser.
  rationale: La revisión inglesa ya resolvió la ambigüedad a favor de «inner chambers», reflejando el trasfondo proverbial de Prov 20:27. La versión española mantiene esa tensión imagética sin convertirla en paráfrasis psicológica excesiva ni volverla una imagen digestiva absurda.
  doctrine_reference: Proverbios 20:27; 1 Clemente 21:2
- issue: Referencia divina de κύριος en el pasaje citado
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Señor Dios
  rationale: En el texto griego citado aparece κύριος, y la línea auditada en inglés preserva «Lord». Para esta cita, «Señor» es la forma más directa y fiel; no se sustituye por el nombre divino en la traducción de esta cláusula porque no hay señal en el pasaje de una reexpresión del Tetragrámaton.
  doctrine_reference: Uso de κύριος en citas del AT
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «storerooms» por «inner chambers» con alta concordancia; la presente redacción sigue esa corrección y evita reintroducir la lectura rechazada. No se requieren más cambios de fondo respecto del paquete auditado.
  spanish_consistency_notes:
  - Se conserva la fórmula introductoria impersonal «Porque en algún lugar dice» para reflejar λέγει γάρ που sin sobreespecificar la fuente.
  - «Espíritu» lleva mayúscula por la referencia personal/divina, coherente con el sentido de πνεῦμα κυρίου.
  - «Vientre» se mantiene por fidelidad semántica a γαστήρ, aunque el contexto obliga a entenderlo de modo figurado y no anatómico literal.
  - La nota al pie marca la incertidumbre de la localización de la cita, siguiendo el inglés «somewhere».
