  rationale: 'Se revisó el texto para ajustar mejor varias decisiones documentadas en el audit trail: se fortaleció la idea de esquema hostil con «maquinación»; se recuperó parcialmente el matiz de πολιτεύομαι con «viven como ciudadanos»; se aclaró la frase difícil sobre la condenación y la armonía transmitida; y se reemplazó «servidor» por «asistente» para reflejar mejor la distinción léxica de θεράπων. También se mejoró la idiomaticidad bíblica con «señales y prodigios».'
  reviewer_model: gpt-5.4
