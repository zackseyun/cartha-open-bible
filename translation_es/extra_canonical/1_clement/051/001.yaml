  to: 'Por tanto, cualquier mal que hayamos hecho y cometido por alguna maquinación del adversario, pidamos que nos sea perdonado. Y quienes llegaron a ser jefes de rebelión y de división deben considerar el bien común de nuestra esperanza. Porque los que viven como ciudadanos con temor y amor prefieren caer en malos tratos ellos mismos antes que causárselos a sus prójimos; más bien, prefieren cargar ellos mismos con la condenación antes que hacerla recaer sobre la armonía que nos ha sido transmitida buena y justamente. Pues es bueno que una persona confiese sus transgresiones antes que endurecer su corazón, así como se endureció el corazón de los que se rebelaron contra Moisés, el [a]asistente de Dios, hombres cuyo juicio quedó manifiesto. Porque descendieron vivos al Hades, y la muerte los pastoreará. Faraón y su ejército y todos los gobernantes de Egipto, tanto sus carros como los que iban en ellos, fueron hundidos en el mar Rojo y perecieron por ninguna otra causa sino esta: que sus
