translation:
  language: es
  text: 'Por tanto, cualquier mal que hayamos hecho y cometido por alguna maquinación del adversario, pidamos que nos sea perdonado. Y quienes llegaron a ser jefes de rebelión y de división deben considerar el bien común de nuestra esperanza. Porque los que viven como ciudadanos con temor y amor prefieren caer en malos tratos ellos mismos antes que causárselos a sus prójimos; más bien, prefieren cargar ellos mismos con la condenación antes que hacerla recaer sobre la armonía que nos ha sido transmitida buena y justamente. Pues es bueno que una persona confiese sus transgresiones antes que endurecer su corazón, así como se endureció el corazón de los que se rebelaron contra Moisés, el [a]asistente de Dios, hombres cuyo juicio quedó manifiesto. Porque descendieron vivos al Hades, y la muerte los pastoreará. Faraón y su ejército y todos los gobernantes de Egipto, tanto sus carros como los que iban en ellos, fueron hundidos en el mar Rojo y perecieron por ninguna otra causa sino esta: que sus
    corazones insensatos se endurecieron después de que las señales y los prodigios habían acontecido en la tierra de Egipto por medio de Moisés, el asistente de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Asistente» traduce aquí θεράπων, no δοῦλος; busca conservar la dignidad y el matiz distintivo del título aplicado a Moisés, aunque en español no haya un equivalente perfecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεπέσαμεν
  english_pob_choice: have done wrong
  chosen_spanish: hemos hecho mal
  alternatives_spanish:
  - hemos caído en error
  - hemos transgredido
  lexicon: LSJ
  rationale: La frase expresa caída en culpa o falta moral. «Hacer mal» es idiomático en español y conserva el sentido de culpabilidad sin volverlo excesivamente técnico.
- source_word: διά τινος τῶν τοῦ ἀντικειμένου
  english_pob_choice: through some scheme of the adversary
  chosen_spanish: por algún plan del adversario
  alternatives_spanish:
  - por alguna trama del adversario
  - por algún recurso del adversario
  lexicon: LSJ
  rationale: La construcción es elíptica y apunta a una mediación hostil. «Plan» mantiene la idea de estrategia o designio sin decidir más de lo que el griego permite; «adversario» conserva la fuerza personal o moral abierta en el audit trail.
- source_word: ἀξιώσωμεν ἀφεθῆναι
  english_pob_choice: let us ask that they be forgiven us
  chosen_spanish: pidamos que nos sea perdonado
  alternatives_spanish:
  - rueguemos que nos sea perdonado
  - suplicuemos que nos sea perdonado
  lexicon: BDAG
  rationale: El valor aquí es de petición/rogativa respecto del perdón. «Pidamos» es natural en español y mantiene el sentido sin forzar una equivalencia formal rígida.
- source_word: ἀρχηγοὶ στάσεως καὶ διχοστασίας
  english_pob_choice: leaders of revolt and division
  chosen_spanish: jefes de rebelión y de división
  alternatives_spanish:
  - caudillos de rebelión y de división
  - iniciadores de sedición y disensión
  lexicon: BDAG
  rationale: «Ἀρχηγοί» son quienes encabezan o inician; «jefes» reproduce esa función con claridad. «Rebelión» y «división» conservan la gravedad comunitaria del pasaje.
- source_word: τὸ κοινὸν τῆς ἐλπίδος
  english_pob_choice: the common good of our hope
  chosen_spanish: el bien común de nuestra esperanza
  alternatives_spanish:
  - lo común de nuestra esperanza
  - el interés común de nuestra esperanza
  lexicon: LSJ
  rationale: «Τὸ κοινόν» admite la idea de bien común o interés compartido. En este contexto exhortativo, «bien común» expresa mejor la orientación comunitaria que el griego sugiere.
- source_word: μετὰ φόβου καὶ ἀγάπης πολιτευόμενοι
  english_pob_choice: live as citizens with fear and love
  chosen_spanish: se conducen con temor y amor
  alternatives_spanish:
  - viven como ciudadanos con temor y amor
  - ordenan su vida con temor y amor
  lexicon: BDAG
  rationale: «Πολιτεύομαι» tiene tono de conducta cívica o de vida ordenada. «Se conducen» suena natural en español y conserva la idea ética sin introducir una imagen demasiado técnica de ciudadanía.
- source_word: αἰκίαις
  english_pob_choice: mistreatment
  chosen_spanish: malos tratos
  alternatives_spanish:
  - abusos
  - vejaciones
  lexicon: LSJ
  rationale: El término refiere a trato duro o abuso. «Malos tratos» es claro y suficientemente amplio para el contexto.
- source_word: κατάγνωσιν
  english_pob_choice: condemnation
  chosen_spanish: condenación
  alternatives_spanish:
  - culpa
  - censura
  lexicon: BDAG
  rationale: La palabra puede abarcar juicio adverso o sentencia. «Condenación» conserva la carga moral y judicial del pasaje.
- source_word: ὁμοφωνίας
  english_pob_choice: harmony
  chosen_spanish: armonía
  alternatives_spanish:
  - concordia
  - unidad
  lexicon: LSJ
  rationale: «Ὁμοφωνία» literalmente sugiere una sola voz o acuerdo armónico. «Armonía» reproduce mejor la imagen auditiva y comunitaria que el texto evoca.
- source_word: παραδεδομένης ἡμῖν
  english_pob_choice: handed down to us
  chosen_spanish: nos ha sido transmitida
  alternatives_spanish:
  - nos ha sido entregada
  - nos ha sido heredada
  lexicon: BDAG
  rationale: El participio expresa tradición recibida. «Transmitida» conserva bien la idea de algo recibido por herencia comunitaria.
- source_word: ἐξομολογεῖσθαι
  english_pob_choice: to confess
  chosen_spanish: confiese
  alternatives_spanish:
  - reconozca
  - haga confesión
  lexicon: BDAG
  rationale: Aquí el verbo tiene sentido penitencial. «Confiese» es la forma más directa y eclesialmente clara en español.
- source_word: θεράποντα τοῦ θεοῦ
  english_pob_choice: the attendant of God
  chosen_spanish: el servidor de Dios
  alternatives_spanish:
  - el asistente de Dios
  - el ministro de Dios
  lexicon: LSJ
  rationale: Aunque «θεράπων» no es el δοῦλος común, en español «servidor» transmite la dignidad del término y resulta más natural que «atendente» o «asistente» en un contexto bíblico-litúrgico.
- source_word: τὸ κρίμα πρόδηλον ἐγενήθη
  english_pob_choice: their judgment became plain
  chosen_spanish: su juicio quedó manifiesto
  alternatives_spanish:
  - su sentencia quedó manifiesta
  - su juicio se hizo evidente
  lexicon: BDAG
  rationale: «Κρίμα» puede significar juicio, sentencia o resultado judicial. «Quedó manifiesto» conserva la idea de visibilidad del desenlace sin cerrar la ambigüedad entre veredicto y castigo.
- source_word: ᾅδου
  english_pob_choice: Hades
  chosen_spanish: Hades
  alternatives_spanish:
  - el sepulcro
  - el inframundo
  lexicon: BDAG
  rationale: Se conserva el término propio griego por ser un nombre técnico en el uso judío-cristiano, evitando reducirlo a una sola interpretación.
- source_word: θάνατος ποιμανεῖ αὐτούς
  english_pob_choice: death will shepherd them
  chosen_spanish: la muerte los pastoreará
  alternatives_spanish:
  - la muerte los guiará
  - la muerte los regirá
  lexicon: LSJ
  rationale: Se mantiene la metáfora fuerte del texto y su eco escriturario, sin suavizarla con un verbo menos figurado.
- source_word: ἀσυνέτους καρδίας
  english_pob_choice: senseless hearts
  chosen_spanish: corazones insensatos
  alternatives_spanish:
  - corazones faltos de entendimiento
  - corazones necios
  lexicon: BDAG
  rationale: «Ἀσύνετος» denota falta de entendimiento. «Insensatos» conserva el tono bíblico y moral sin perder claridad.
- source_word: σημεῖα καὶ τὰ τέρατα
  english_pob_choice: signs and wonders
  chosen_spanish: las señales y las maravillas
  alternatives_spanish:
  - señales y prodigios
  - las señales y los prodigios
  lexicon: BDAG
  rationale: La pareja es una colocación bíblica estable. «Señales y maravillas» mantiene la cadencia del original y del audit trail en inglés.
theological_decisions:
- issue: Sentido de τῶν τοῦ ἀντικειμένου
  english_pob_reading: the adversary, with a hostile spiritual/moral sense left somewhat open
  chosen_spanish_reading: el adversario, con un sentido hostil espiritual o moral que queda abierto
  alternative_spanish_readings:
  - el diablo específicamente
  - la parte opuesta en sentido general
  rationale: El texto no nombra explícitamente a Satanás, pero sí presenta una agencia contraria real. «Adversario» conserva la tensión sin resolverla en exceso.
  doctrine_reference: Preservar la tensión teológica documentada en lugar de cerrarla interpretativamente.
- issue: Valor de τὸ κοινὸν τῆς ἐλπίδος
  english_pob_reading: the common good of our hope
  chosen_spanish_reading: el bien común de nuestra esperanza
  alternative_spanish_readings:
  - el interés común de la esperanza
  - nuestra esperanza compartida
  rationale: El contexto exhorta al cuidado de lo común en la comunidad. «Bien común» expresa esa orientación colectiva sin perder la base de la esperanza.
  doctrine_reference: Equivalencia óptima con textura eclesial.
- issue: 'Título aplicado a Moisés: θεράπων τοῦ θεοῦ'
  english_pob_reading: the attendant of God
  chosen_spanish_reading: el servidor de Dios
  alternative_spanish_readings:
  - el asistente de Dios
  - el ministro de Dios
  rationale: En español, «servidor» preserva la dignidad del término y comunica mejor que una solución demasiado literal. La decisión no pretende borrar la distinción lexical señalada en el audit trail, sino volverla publicable.
  doctrine_reference: Mantener la distinción semántica sin sacrificar inteligibilidad.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que afinó la singularidad de la expresión griega equivalente a «algún plan» y la naturalidad de la formulación sobre condenación; en español se eligió «algún plan del adversario» y «llevar condenación ellos mismos» para conservar ese equilibrio entre cercanía al original y fluidez idiomática.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este pasaje no contiene el tetragrámaton.
  - Se conservó «Hades» como término técnico, siguiendo la decisión auditada del inglés POB.
  - «Mesías/Cristo» no aparece en este verso; no se introdujo terminología cristológica innecesaria.
  - La nota al pie se ancló explícitamente en «servidor» para evitar marcas huérfanas.
