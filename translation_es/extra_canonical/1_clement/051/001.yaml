review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido general del griego y del audit trail inglés: culpa cometida por influencia del adversario, exhortación al bien común, preferencia por sufrir maltrato antes que dañar al prójimo, confesión en vez de endurecimiento, y los ejemplos de juicio sobre los rebeldes y sobre Faraón. Sin embargo, hay varios puntos donde la fidelidad puede mejorarse: «por algún plan» suena algo débil frente a la idea de maquinación/esquema; «se conducen» pierde el matiz cívico de πολιτευόμενοι; «llevar condenación ellos mismos antes que la de la armonía» resulta oscuro en español; y, sobre todo, «servidor de Dios» no refleja bien la decisión documentada de distinguir θεράπων de δοῦλος, ya preservada en inglés como “attendant of God”.'
  spanish_quality_summary: La redacción es generalmente comprensible y digna, pero presenta tropiezos de naturalidad y claridad. «Hayamos hecho mal y cometido» es algo tosco; «malos tratos» funciona; «llevar condenación... la de la armonía» es poco idiomático; «señales y maravillas» es posible, pero «señales y prodigios» suena más bíblico en español. El texto necesita un ajuste menor-moderado para sonar más natural sin apartarse del original.
  glossary_alignment: 'No hay conflictos con términos del glosario mayor. El punto principal es θεράπων: el proyecto inglés documentó una distinción léxica importante y el español debería conservarla mejor con «asistente de Dios» o fórmula equivalente, idealmente con nota. «Hades» está bien preservado. «Adversario» también está bien.'
  issues:
  - severity: medium
    issue: «servidor de Dios» para θεράπων
    rationale: Aunque el borrador añade nota, el texto principal no preserva suficientemente la distinción documentada frente a δοῦλος. Dado el audit trail, conviene una opción que refleje mejor la elección marcada, como «asistente de Dios», aun si lleva nota aclaratoria por estilo.
  - severity: medium
    issue: «prefieren llevar condenación ellos mismos antes que la de la armonía...»
    rationale: La frase reproduce muy literalmente la estructura y queda oscura en español. Debe aclararse que prefieren cargar ellos mismos con la condenación antes que recaiga sobre la armonía/concordia transmitida.
  - severity: low
    issue: «se conducen con temor y amor»
    rationale: Es aceptable, pero pierde del todo el matiz de πολιτεύομαι. «viven como ciudadanos» suena algo más cercano al original y sigue siendo comprensible en español eclesial.
  - severity: low
    issue: «por algún plan del adversario»
    rationale: No es incorrecto, pero «maquinación» o «artimaña» reflejan mejor la idea de esquema hostil documentada en el audit trail.
  - severity: low
    issue: «señales y maravillas»
    rationale: Es válido, pero «señales y prodigios» es la colocación bíblica más natural en español, sin pérdida semántica.
