source:
  edition: Funk 1901 (normalized OCR)
  text: Φαραὼ καὶ ἡ στρατιὰ αὐτοῦ καὶ πάντες οἱ ἡγούμενοι Αἰγύπτου, τά τε ἅρματα καὶ οἱ ἀναβάται αὐτῶν οὐ διʼ ἄλλην τινὰ αἰτίαν ἐβυθίσθησαν εἰς θάλασσαν ἐρυθρὰν καὶ ἀπώλοντο, ἀλλὰ διὰ τὸ σκληρυνθῆναι αὐτῶν τὰς ἀσυνέτους καρδίας μετὰ τὸ γενέσθαι τὰ σημεῖα καὶ τὰ τέρατα ἐν γῇ Αἰγύπτου διὰ τοῦ θεράποντος τοῦ θεοῦ Μωϋσέως.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/051/005.yaml
  text: 'Pharaoh and his army and all the leaders of Egypt, both the chariots and those who rode in them, were sunk into the Red Sea and perished for no other cause than this: their foolish hearts were hardened after the signs and wonders had taken place in the land of Egypt through Moses, the servant of God.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:04Z'
    unchanged: false
    changes_summary: Changed 'rulers' to 'leaders' for ἡγούμενοι, 'their chariots' to 'the chariots' to reflect the Greek more directly, 'senseless hearts' to 'foolish hearts' for ἀσυνέτους, and 'attendant of God' to 'servant of God' for more natural formal English for θεράπων.
translation:
  language: es
  text: 'Faraón y su ejército, y todos los líderes de Egipto, tanto los carros como los que montaban en ellos, fueron hundidos en el Mar Rojo y perecieron no por otra causa sino por esta: sus corazones necios fueron endurecidos después de que ocurrieron las señales y los prodigios en la tierra de Egipto por medio de Moisés, el siervo de Dios.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Φαραὼ
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Faraón
  lexicon: N/A
  rationale: Nombre propio histórico habitual en español; corresponde directamente al término griego y al uso estándar bíblico.
- source_word: ἡ στρατιὰ αὐτοῦ
  english_pob_choice: his army
  chosen_spanish: su ejército
  alternatives_spanish:
  - su ejército
  - el ejército de él
  lexicon: N/A
  rationale: Mantiene la referencia posesiva del griego con una construcción natural en español.
- source_word: πάντες οἱ ἡγούμενοι Αἰγύπτου
  english_pob_choice: all the leaders of Egypt
  chosen_spanish: todos los líderes de Egipto
  alternatives_spanish:
  - todos los jefes de Egipto
  - todos los gobernantes de Egipto
  lexicon: N/A
  rationale: ἡγούμενοι tiene sentido de quienes están al frente o dirigen; 'líderes' reproduce bien el matiz sin forzar una categoría política más específica.
- source_word: τά τε ἅρματα καὶ οἱ ἀναβάται αὐτῶν
  english_pob_choice: both the chariots and those who rode in them
  chosen_spanish: tanto los carros como los que montaban en ellos
  alternatives_spanish:
  - tanto los carros como los que iban en ellos
  - tanto los carros como sus jinetes
  lexicon: N/A
  rationale: '''Carros'' comunica de forma natural ἅρματα en español bíblico moderno; ''los que montaban en ellos'' evita añadir una posesión inexistente en el griego, en línea con la revisión inglesa que quitó ''their''.'
- source_word: ἐβυθίσθησαν εἰς θάλασσαν ἐρυθρὰν
  english_pob_choice: were sunk into the Red Sea
  chosen_spanish: fueron hundidos en el Mar Rojo
  alternatives_spanish:
  - fueron sumergidos en el Mar Rojo
  - se hundieron en el Mar Rojo
  lexicon: N/A
  rationale: Pasiva fuerte 'fueron hundidos' refleja el agente implícito divino y conserva la contundencia del verbo; 'Mar Rojo' es el equivalente habitual y claro.
- source_word: ἀπώλοντο
  english_pob_choice: perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - perecieron
  - fueron destruidos
  lexicon: N/A
  rationale: '''Perecieron'' traduce bien la pérdida total implicada y mantiene el paralelo con la inmersión en el mar.'
- source_word: οὐ διʼ ἄλλην τινὰ αἰτίαν ... ἀλλὰ διὰ τὸ
  english_pob_choice: 'for no other cause than this: ...'
  chosen_spanish: 'por ninguna otra causa sino esta: ...'
  alternatives_spanish:
  - 'no por otra causa sino esta: ...'
  - 'por ninguna otra razón sino esta: ...'
  lexicon: N/A
  rationale: Conserva la fórmula contrastiva y enfática del griego y del inglés POB, con castellano idiomático y solemne.
- source_word: σκληρυνθῆναι
  english_pob_choice: were hardened
  chosen_spanish: fueron endurecidos
  alternatives_spanish:
  - se endurecieron
  - fueron obstinados
  lexicon: N/A
  rationale: La pasiva respeta la forma verbal del griego y sugiere la acción judicial/causal implícita sin resolverla en una reflexión interpretativa.
- source_word: αὐτῶν τὰς ἀσυνέτους καρδίας
  english_pob_choice: their foolish hearts
  chosen_spanish: sus corazones necios
  alternatives_spanish:
  - sus corazones insensatos
  - sus corazones necios e insensatos
  lexicon: N/A
  rationale: '''Necios'' recoge la fuerza moral e intelectual de ἀσύνετος mejor que ''insensatos'' en este contexto; mantiene la tensión documental de una crítica al entendimiento moral.'
- source_word: μετὰ τὸ γενέσθαι τὰ σημεῖα καὶ τὰ τέρατα
  english_pob_choice: after the signs and wonders had taken place
  chosen_spanish: después de que las señales y los prodigios ocurrieron
  alternatives_spanish:
  - después de que ocurrieron las señales y los prodigios
  - tras haberse realizado las señales y los prodigios
  lexicon: N/A
  rationale: '''Señales y prodigios'' es una pareja estable en español bíblico; ''ocurrieron'' evita añadir una interpretación demasiado técnica y sigue de cerca el griego.'
- source_word: ἐν γῇ Αἰγύπτου
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  - en la tierra egipcia
  lexicon: N/A
  rationale: '''Tierra de Egipto'' reproduce literalmente la expresión y es plenamente comprensible en registro bíblico.'
- source_word: διὰ τοῦ θεράποντος τοῦ θεοῦ Μωϋσέως
  english_pob_choice: through Moses, the servant of God
  chosen_spanish: por medio de Moisés, el siervo de Dios
  alternatives_spanish:
  - por medio de Moisés, el servidor de Dios
  - por medio de Moisés, el siervo de Dios
  lexicon: N/A
  rationale: '''Por medio de'' expresa la mediación instrumental del griego διά; ''siervo de Dios'' sigue la decisión inglesa de θεράπων y es una fórmula bíblica natural en español.'
theological_decisions:
- issue: Causalidad del juicio sobre Egipto
  english_pob_reading: 'were sunk into the Red Sea and perished for no other cause than this: their foolish hearts were hardened'
  chosen_spanish_reading: 'fueron hundidos en el Mar Rojo y perecieron por ninguna otra causa sino esta: que sus corazones necios fueron endurecidos'
  alternative_spanish_readings:
  - se hundieron en el Mar Rojo y perecieron porque sus corazones se endurecieron
  - fueron sumergidos en el Mar Rojo y perecieron debido a la dureza de sus corazones
  rationale: La redacción mantiene el encadenamiento causal explícito del texto, evitando suavizar la afirmación moral y judicial. La pasiva preserva el hecho de que el desastre no se presenta como accidente sino como juicio relacionado con la dureza del corazón.
  doctrine_reference: Éxodo 14; dureza del corazón y juicio divino en la narrativa bíblica
- issue: Relación entre señales/prodigios y la dureza del corazón
  english_pob_reading: after the signs and wonders had taken place in the land of Egypt through Moses
  chosen_spanish_reading: después de que las señales y los prodigios ocurrieron en la tierra de Egipto por medio de Moisés
  alternative_spanish_readings:
  - después de las señales y los prodigios en la tierra de Egipto, por medio de Moisés
  - tras haberse realizado señales y prodigios en Egipto por medio de Moisés
  rationale: 'Se conserva el orden causal-temporal: primero las señales y prodigios, luego la dureza. No se introduce una explicación adicional sobre el efecto de los milagros; el texto solo afirma la secuencia y el agente mediador.'
  doctrine_reference: Éxodo 7–12; respuesta humana a las señales divinas
- issue: Título de Moisés como agente
  english_pob_reading: Moses, the servant of God
  chosen_spanish_reading: Moisés, el siervo de Dios
  alternative_spanish_readings:
  - Moisés, el servidor de Dios
  - Moisés, el siervo de Dios
  rationale: '''Siervo de Dios'' mantiene una designación reverente y bíblica sin reemplazarla por un término más eclesiástico. La elección sigue el valor formal del término y la tradición de lenguaje bíblico inteligible.'
  doctrine_reference: Éxodo 14:31; Números 12:7; designación de los mediadores de Dios
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado en un pass reciente: ''rulers'' fue corregido a ''leaders'', ''their chariots'' a ''the chariots'', ''senseless hearts'' a ''foolish hearts'' y ''attendant of God'' a ''servant of God''. La versión española refleja esas decisiones revisadas: ''líderes'', ausencia de posesivo añadido en ''los carros'', ''corazones necios'' y ''siervo de Dios''.'
  spanish_consistency_notes:
  - Se mantiene 'Mar Rojo' como término bíblico estándar y transparente.
  - Se evita 'SEÑOR' para el nombre divino porque el texto griego aquí dice θεοῦ y no κύριος.
  - No se introduce una glosa interpretativa como 'obstinados' para σκληρυνθῆναι; se conserva la pasiva 'fueron endurecidos'.
  - '''Carros'' y ''los que montaban en ellos'' conservan la relación del griego sin añadir elementos ausentes.'
  - El registro busca ser bíblico y publicable en español, sin arcaísmos innecesarios.
