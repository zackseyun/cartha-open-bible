review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido global del griego: Faraón, su ejército, los líderes de Egipto, los carros y sus ocupantes, el hundimiento en el Mar Rojo, la causa exclusiva, la dureza de sus corazones tras las señales y prodigios, y la mediación de Moisés como siervo de Dios. No obstante, la frase causal principal en español suena poco idiomática: ''por ninguna otra causa sino esta'' es comprensible, pero ''no por ninguna otra causa'' o ''por ninguna otra causa'' puede resultar torpe en este contexto. Además, conviene afinar la cláusula explicativa para que lea con más naturalidad en español sin alterar la pasiva ni la fuerza causal del original.'
  spanish_quality_summary: 'El texto es claro y mayormente fiel, con buena terminología bíblica. Sin embargo, necesita un ajuste menor de fluidez y naturalidad: la secuencia ''por ninguna otra causa sino esta: que...'' suena forzada. ''No por otra causa sino por esta'' o ''por ninguna otra causa más que esta'' sería mejor. También puede mejorarse el orden de ''ocurrieron'' para sonar más natural en español formal.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: ''Dios'', ''siervo'', ''señales y prodigios'', ''Mar Rojo'', ''Faraón''. No hay conflicto con términos doctrinales clave. ''Líderes'' para ἡγούμενοι sigue la revisión inglesa y es aceptable. ''Carros'' para ἅρματα y ''los que montaban en ellos'' preservan bien el griego.'
  issues:
  - severity: medium
    issue: Giro causal poco idiomático en español
    rationale: La expresión 'perecieron por ninguna otra causa sino esta' es entendible, pero no suena natural en español culto actual. El griego οὐ ... ἀλλὰ pide una formulación contrastiva más idiomática, como 'no por otra causa sino por esta'.
  - severity: low
    issue: Cláusula con 'que' innecesariamente pesada
    rationale: 'Tras los dos puntos, ''que sus corazones necios fueron endurecidos'' añade una subordinación que no mejora la claridad. Puede expresarse directamente: ''sus corazones necios fueron endurecidos''.'
  - severity: low
    issue: Orden verbal mejorable en la frase de señales y prodigios
    rationale: '''después de que las señales y los prodigios ocurrieron'' es correcto, pero ''después de que ocurrieron las señales y los prodigios'' fluye mejor en español formal sin cambiar el sentido.'
  revised_spanish_text: 'Faraón y su ejército, y todos los líderes de Egipto, tanto los carros como los que montaban en ellos, fueron hundidos en el Mar Rojo y perecieron no por otra causa sino por esta: sus corazones necios fueron endurecidos después de que ocurrieron las señales y los prodigios en la tierra de Egipto por medio de Moisés, el siervo de Dios.'
  revision_rationale: Se hizo una revisión menor para mejorar la idiomaticidad del español y conservar con mayor claridad la estructura contrastiva del griego (οὐ ... ἀλλὰ). También se aligeró la cláusula posterior a los dos puntos y se ajustó el orden verbal para una lectura más natural, sin cambiar el contenido ni la teología del texto.
