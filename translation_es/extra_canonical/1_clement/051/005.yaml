revisions:
- from: 'Faraón y su ejército, y todos los líderes de Egipto, tanto los carros como los que montaban en ellos, fueron hundidos en el Mar Rojo y perecieron por ninguna otra causa sino esta: que sus corazones necios fueron endurecidos después de que las señales y los prodigios ocurrieron en la tierra de Egipto por medio de Moisés, el siervo de Dios.'
  to: 'Faraón y su ejército, y todos los líderes de Egipto, tanto los carros como los que montaban en ellos, fueron hundidos en el Mar Rojo y perecieron no por otra causa sino por esta: sus corazones necios fueron endurecidos después de que ocurrieron las señales y los prodigios en la tierra de Egipto por medio de Moisés, el siervo de Dios.'
  rationale: Se hizo una revisión menor para mejorar la idiomaticidad del español y conservar con mayor claridad la estructura contrastiva del griego (οὐ ... ἀλλὰ). También se aligeró la cláusula posterior a los dos puntos y se ajustó el orden verbal para una lectura más natural, sin cambiar el contenido ni la teología del texto.
