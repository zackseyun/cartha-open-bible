revisions:
- from: Porque los que se conducen con temor y amor desean antes caer ellos mismos en maltrato que sus prójimos[a]; más bien[b], traen condenación sobre sí mismos antes que sobre la armonía que nos ha sido transmitida bien y justamente.
  to: Porque los que se conducen con temor y amor prefieren sufrir ellos mismos maltrato antes que sus prójimos; de hecho[a], aceptan la condenación de sí mismos antes que la de la armonía que nos ha sido transmitida bien y justamente.
  rationale: 'Se elimina la nota [a] original porque conserva una lectura rechazada por la evidencia griega y el historial de revisión. Se suaviza la primera cláusula para un español más natural sin alterar el sentido: los sujetos prefieren que el maltrato recaiga sobre ellos antes que sobre sus prójimos. En la segunda cláusula, se reformula la expresión para evitar el giro pesado «traen condenación sobre sí mismos», manteniendo la idea de que asumen la condenación respecto de sí mismos antes que respecto de la armonía recibida. La nota restante solo preserva una variante discursiva válida para μᾶλλον δέ.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:50:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en lo central: πολιτευόμενοι = «se conducen», φόβου καὶ ἀγάπης = «con temor y amor», αἰκίαις περιπίπτειν con ἑαυτοὺς/τοὺς πλησίον = preferir sufrir uno mismo el maltrato antes que el prójimo, y ὁμοφωνίας = «armonía». Sin embargo, hay dos problemas de fidelidad/formulación: (1) la nota [a] reintroduce una lectura descartada por el audit trail («hacer que sus prójimos caigan en él»), ausente del griego; (2) «traen condenación sobre sí mismos» es defendible por el historial inglés intermedio, pero en español suena algo pesado y puede expresarse mejor como «aceptan la condenación de sí mismos», que refleja con más naturalidad el contraste sin cambiar el sentido básico de κατάγνωσιν φέρουσιν.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «desean antes caer ellos mismos en maltrato que sus prójimos» queda algo duro; «prefieren sufrir ellos mismos maltrato antes que sus prójimos» o una forma equivalente sería más natural. También «más bien» funciona, aunque «de hecho» o simplemente mantener la coordinación puede sonar más fluido. La principal deficiencia editorial es la nota [a], que introduce una alternativa incorrecta.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. «Temor», «amor», «prójimos» y «armonía» están bien elegidos. «Maltrato» es una buena opción para αἰκίαις. No hay términos teológicos mayores en disputa. La decisión sobre κατάγνωσιν debe priorizar naturalidad española sin perder el matiz de condenación dirigida hacia sí mismos y no hacia la armonía recibida.
  issues:
  - severity: high
    issue: La nota [a] preserva una alternativa incorrecta
    rationale: El audit trail documenta explícitamente que la lectura activa «hacer que sus prójimos caigan en él / bring it upon their neighbors» es una mala interpretación del griego. No debe mantenerse como nota alternativa.
  - severity: medium
    issue: La frase principal sobre αἰκίαις περιπίπτειν suena poco natural en español
    rationale: «desean antes caer ellos mismos en maltrato que sus prójimos» reproduce la estructura, pero resulta áspera. Una formulación como «prefieren sufrir ellos mismos maltrato antes que sus prójimos» conserva el sentido con mejor legibilidad.
  - severity: medium
    issue: «traen condenación sobre sí mismos» es algo pesado e idiomáticamente forzado
    rationale: Aunque intenta reflejar el valor activo de φέρουσιν, en español eclesial/neutral suena menos natural que una formulación como «aceptan la condenación de sí mismos» o «prefieren condenarse a sí mismos». Conviene mejorar la legibilidad manteniendo el contraste con la armonía.
  revised_spanish_text: Porque los que se conducen con temor y amor prefieren sufrir ellos mismos maltrato antes que sus prójimos; de hecho[a], aceptan la condenación de sí mismos antes que la de la armonía que nos ha sido transmitida bien y justamente.
  revised_footnotes:
  - marker: a
    text: 'O: «más bien».'
    reason: alternative_rendering
  revision_rationale: 'Se elimina la nota [a] original porque conserva una lectura rechazada por la evidencia griega y el historial de revisión. Se suaviza la primera cláusula para un español más natural sin alterar el sentido: los sujetos prefieren que el maltrato recaiga sobre ellos antes que sobre sus prójimos. En la segunda cláusula, se reformula la expresión para evitar el giro pesado «traen condenación sobre sí mismos», manteniendo la idea de que asumen la condenación respecto de sí mismos antes que respecto de la armonía recibida. La nota restante solo preserva una variante discursiva válida para μᾶλλον δέ.'
