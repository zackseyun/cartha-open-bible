id: 1CLEM.51.2
reference: 1 Clement 51:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: οἱ γὰρ μετὰ φόβου καὶ ἀγάπης πολιτευόμενοι ἑαυτοὺς θέλουσιν μᾶλλον αἰκίαις περιπίπτειν ἢ τοὺς πλησίον· μᾶλλον δὲ ἑαυτῶν κατάγνωσιν φέρουσιν ἢ τῆς παραδεδομένης ἡμῖν καλῶς καὶ δικαίως ὁμοφωνίας.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/051/002.yaml
  text: For those who conduct themselves with fear and love desire rather to fall into mistreatment themselves than their neighbors[a]; indeed[b], they bear condemnation of themselves rather than of the harmony that has been handed down to us well and justly.
  footnotes:
  - marker: a
    text: Or 'desire rather to fall into mistreatment themselves than to bring it upon their neighbors'.
    reason: previous_rendering
  - marker: b
    text: Or 'bear condemnation of themselves than of the harmony'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:04Z'
    unchanged: false
    changes_summary: Replaced 'live as citizens' with 'conduct themselves' for more natural English while preserving πολιτευόμενοι; clarified reflexive emphasis with 'themselves'; changed 'bring condemnation upon themselves' to 'bear condemnation of themselves' to reflect φέρουσιν κατάγνωσιν more closely; rendered δικαίως as 'justly' for a more formal register.
translation:
  language: es
  text: Porque los que se conducen con temor y amor prefieren sufrir ellos mismos maltrato antes que sus prójimos; de hecho[a], aceptan la condenación de sí mismos antes que la de la armonía que nos ha sido transmitida bien y justamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más bien».'
    reason: alternative_rendering
lexical_decisions:
- source_word: πολιτευόμενοι
  english_pob_choice: conduct themselves
  chosen_spanish: se conducen
  alternatives_spanish:
  - se comportan
  - viven como ciudadanos
  lexicon: πολιτεύομαι
  rationale: El verbo griego expresa el modo de vida o conducta de una persona; en español, «se conducen» conserva esa idea sin forzar una imagen cívica que aquí sería demasiado estrecha. «Viven como ciudadanos» sería más literal etimológicamente, pero menos natural y más interpretativo en este contexto.
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - respeto reverente
  lexicon: φόβος
  rationale: «Temor» mantiene el campo semántico amplio del griego y funciona bien junto con «amor». «Respeto reverente» explicitaría una lectura posible, pero añade interpretación. «Miedo» suena más limitado y menos apto para el tono moral del pasaje.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: ἀγάπη
  rationale: «Amor» es la correspondencia más directa y clara para el lector español, sin introducir el matiz eclesiástico de «caridad», que sería más estrecho.
- source_word: αἰκίαις
  english_pob_choice: mistreatment
  chosen_spanish: maltrato
  alternatives_spanish:
  - vejación
  - abusos
  lexicon: αἰκία
  rationale: «Maltrato» refleja de manera natural la idea de trato dañino o humillante. «Vejación» es posible, pero más técnica o literaria; «abusos» sería demasiado específico y pluraliza innecesariamente.
- source_word: πλησίον
  english_pob_choice: neighbors
  chosen_spanish: prójimos
  alternatives_spanish:
  - vecinos
  - sus vecinos
  lexicon: πλησίον
  rationale: «Prójimos» es la forma más estable en español bíblico para el sentido de «los cercanos / los demás». Aunque «vecinos» es más literal en algunos contextos, aquí puede sonar limitado geográficamente.
- source_word: κατάγνωσιν φέρουσιν
  english_pob_choice: bear condemnation of themselves
  chosen_spanish: traen condenación sobre sí mismos
  alternatives_spanish:
  - se atraen condenación
  - cargan condenación sobre sí mismos
  lexicon: κατάγνωσις
  rationale: La revisión inglesa corrigió la idea desde «bear» como sufrir a «bring upon». En español, «traen condenación sobre sí mismos» conserva el valor activo de φέρουσιν con κατάγνωσιν. «Cargan condenación» sonaría más pasivo y menos preciso.
- source_word: παραδεδομένην ἡμῖν ὁμοφωνίας
  english_pob_choice: the harmony that has been handed down to us
  chosen_spanish: la armonía que nos ha sido transmitida
  alternatives_spanish:
  - la concordia que nos ha sido entregada
  - la unidad que nos ha sido transmitida
  lexicon: ὁμοφωνία
  rationale: «Armonía» traduce bien la imagen de concordancia unida y evita reducir el término a simple «unidad» institucional. «Concordia» también es viable, pero «armonía» conserva mejor el matiz de acuerdo viviente. «Nos ha sido transmitida» sigue el pasivo del griego y el audit trail inglés.
- source_word: καλῶς καὶ δικαίως
  english_pob_choice: well and justly
  chosen_spanish: bien y justamente
  alternatives_spanish:
  - bien y rectamente
  - bien y con justicia
  lexicon: δικαίως
  rationale: «Justamente» reproduce el valor adverbial de δικαίως y mantiene el equilibrio con «bien». «Rectamente» sería posible, pero cambia el registro moral hacia corrección ética más que justicia. «Con justicia» es más explicativo que literal.
theological_decisions:
- issue: Relación entre temor y amor en la vida moral
  english_pob_reading: those who conduct themselves with fear and love
  chosen_spanish_reading: los que se conducen con temor y amor
  alternative_spanish_readings:
  - los que viven con temor y amor
  - los que se comportan con reverencia y amor
  rationale: Mantengo el binomio sin suavizarlo, porque el texto une ambas disposiciones como rasgo de conducta. No convierto «temor» en una paráfrasis devocional más amplia, para no borrar la tensión moral del original.
  doctrine_reference: ética cristiana y reverencia ante Dios
- issue: 'Destino preferido del daño: ellos mismos o sus prójimos'
  english_pob_reading: desire rather to fall into mistreatment themselves than their neighbors
  chosen_spanish_reading: desean antes caer ellos mismos en maltrato que sus prójimos
  alternative_spanish_readings:
  - prefieren que ellos mismos caigan en maltrato antes que sus prójimos
  - desean que ellos mismos sufran maltrato antes que sus prójimos
  rationale: Conservo la preferencia reflexiva y la estructura comparativa, evitando introducir una acción agresiva contra los prójimos. La formulación refleja que el texto pone a los sujetos como receptores del mal antes que a otros.
  doctrine_reference: amor al prójimo y disposición a sufrir uno mismo
- issue: Condenación sobre sí mismos frente a la armonía comunitaria
  english_pob_reading: they bear condemnation of themselves rather than of the harmony that has been handed down to us well and justly
  chosen_spanish_reading: traen condenación sobre sí mismos antes que sobre la armonía que nos ha sido transmitida bien y justamente
  alternative_spanish_readings:
  - se atraen condenación sobre sí mismos antes que sobre la armonía
  - traen condena sobre sí mismos antes que sobre la concordia recibida
  rationale: 'La frase griega presenta un contraste moral y comunitario: preferir el propio daño antes que dañar la concordia recibida. «Condenación» mantiene la fuerza judicial/moral de κατάγνωσις, y «armonía» preserva el valor de ὁμοφωνία sin rebajarlo a mera cordialidad.'
  doctrine_reference: unidad eclesial y responsabilidad moral
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés auditado: corrige la relación reflexiva de ἑαυτοὺς/τοὺς πλησίον y la fuerza activa de φέρουσιν κατάγνωσιν. También refleja el ajuste de δικαίως a un adverbio formal («justamente»), manteniendo el tono sobrio del pasaje.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no lo contiene.
  - Se usa «amor» y «temor» de forma estable, sin sustituirlos por explicaciones devocionales.
  - «Armonía» se elige de modo consistente para ὁμοφωνία, evitando oscilar con «concordia» dentro del mismo versículo.
  - Las notas a y b se anclan únicamente donde el español podría admitir lecturas alternativas reales, en paralelo con el audit trail inglés.
