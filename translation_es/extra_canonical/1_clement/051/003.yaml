id: 1CLEM.51.3
reference: 1 Clement 51:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: καλὸν γὰρ ἀνθρώπῳ ἐξομολογεῖσθαι περὶ τῶν παραπτωμάτων ἢ σκληρῦναι τὴν ₂₅ καρδίαν αὐτοῦ, καθὼς ἐσκληρύνθη ἡ καρδία τῶν στασιασάντων πρὸς τὸν θεράποντα τοῦ θεοῦ Μωϋσῆν, ὧν τὸ κρίμα πρόδηλον ἐγενήθη.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/051/003.yaml
  text: For it is good for a man to confess his transgressions rather than to harden his heart[a], just as the heart of those who rebelled against Moses, the servant of God, was hardened, whose judgment became evident.
  footnotes:
  - marker: a
    text: Or 'confess concerning his transgressions'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:03Z'
    unchanged: false
    changes_summary: Changed 'attendant of God' to 'servant of God' for more natural and standard rendering of θεράπων; changed 'men whose judgment became plain' to 'whose judgment became evident' for a more direct and formal rendering of ὧν τὸ κρίμα πρόδηλον ἐγενήθη.
translation:
  language: es
  text: Porque es bueno para una persona confesar sus transgresiones[a] en vez de endurecer su corazón, así como se endureció el corazón de los que se rebelaron contra Moisés, el siervo de Dios, cuyo juicio llegó a ser evidente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «confesar acerca de sus transgresiones».'
    reason: Preserva la alternativa más literal para περὶ, conforme a la nota del POB inglés y sin repetir inútilmente el texto principal.
lexical_decisions:
- source_word: ἐξομολογεῖσθαι
  english_pob_choice: confess
  chosen_spanish: confiese
  alternatives_spanish:
  - declare
  - reconozca
  lexicon: ἐξομολογέομαι
  rationale: En este contexto de admisión de faltas, 'confiese' conserva el valor de reconocer abiertamente la culpa y encaja con el sustantivo 'transgresiones'. 'Reconozca' sería posible, pero pierde algo de la carga pública y penitencial del verbo.
- source_word: παραπτωμάτων
  english_pob_choice: transgressions
  chosen_spanish: transgresiones
  alternatives_spanish:
  - faltas
  - pecados
  lexicon: παράπτωμα
  rationale: '''Transgresiones'' mantiene la idea de caída o desviación concreta que el POB inglés también preserva. ''Pecados'' sería más general y teológicamente cargado; ''faltas'' suaviza demasiado el término.'
- source_word: σκληρῦναι τὴν καρδίαν αὐτοῦ
  english_pob_choice: harden his heart
  chosen_spanish: endurecer su corazón
  alternatives_spanish:
  - hacer duro su corazón
  - obstinar su corazón
  lexicon: σκληρύνω
  rationale: '''Endurecer su corazón'' reproduce bien la imagen bíblica de insensibilidad y obstinación. ''Obstinar'' explicita el efecto, pero cambia la metáfora original.'
- source_word: θεράποντα τοῦ θεοῦ
  english_pob_choice: the servant of God
  chosen_spanish: el servidor de Dios
  alternatives_spanish:
  - el siervo de Dios
  - el ministro de Dios
  lexicon: θεράπων
  rationale: '''Servidor de Dios'' conserva la dignidad del término sin convertirlo automáticamente en el cliché eclesiástico ''siervo''. ''Siervo'' también es viable, pero ''servidor'' mantiene mejor el matiz de ministerio/servicio respetuoso sin añadir jerga litúrgica.'
- source_word: τὸ κρίμα πρόδηλον ἐγενήθη
  english_pob_choice: whose judgment became evident
  chosen_spanish: cuyo juicio llegó a ser evidente
  alternatives_spanish:
  - cuya condena quedó manifiesta
  - cuyo juicio se hizo patente
  lexicon: κρίμα
  rationale: '''Juicio'' conserva la amplitud de κρίμα, que puede abarcar sentencia/juicio/veredicto. ''Condena'' estrecha demasiado el sentido hacia una decisión penal; ''evidente'' sigue de cerca el POB y la fuerza de πρόδηλον.'
theological_decisions:
- issue: Confesión de transgresiones frente a endurecimiento del corazón
  english_pob_reading: It is good for a man to confess his transgressions rather than to harden his heart.
  chosen_spanish_reading: Es bueno que el hombre confiese sus transgresiones antes que endurecer su corazón.
  alternative_spanish_readings:
  - es bueno para el hombre confesar sus transgresiones en vez de endurecer su corazón
  - es bueno que el hombre reconozca sus transgresiones antes que endurecer su corazón
  rationale: 'La formulación mantiene la oposición moral y espiritual del texto: confesión humilde versus autoendurecimiento. Se evita debilitar la fuerza exhortativa con un lenguaje demasiado general.'
  doctrine_reference: Arrepentimiento y confesión de pecado; endurecimiento del corazón en la tradición bíblica.
- issue: Título de Moisés como θεράπων τοῦ θεοῦ
  english_pob_reading: Moses, the servant of God
  chosen_spanish_reading: Moisés, el servidor de Dios
  alternative_spanish_readings:
  - Moisés, el siervo de Dios
  - Moisés, el ministro de Dios
  rationale: El texto lo presenta como un título de honor ligado al servicio divino. 'Servidor' permite una traducción fiel y comprensible sin imponer un registro eclesiástico más fijo de lo necesario.
  doctrine_reference: Moisés como siervo/servidor fiel de Dios (cf. tradición bíblica sobre su vocación y servicio).
- issue: 'Resultado de los rebeldes: juicio evidente'
  english_pob_reading: whose judgment became evident
  chosen_spanish_reading: cuyo juicio llegó a ser evidente
  alternative_spanish_readings:
  - cuya sentencia quedó manifiesta
  - cuyo juicio se hizo patente
  rationale: '''Juicio'' conserva la ambigüedad útil del griego entre sentencia y juicio; ''evidente'' mantiene la visibilidad pública del desenlace. Así se preserva la advertencia del ejemplo sin cerrarlo prematuramente a una sola acepción.'
  doctrine_reference: Juicio divino como advertencia pública contra la rebelión.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente: mantiene ''confesar sus transgresiones'', ''servidor de Dios'' y ''cuyo juicio llegó a ser evidente'', evitando calcos extraños y conservando la tensión moral del griego.'
  spanish_consistency_notes:
  - Se mantiene 'transgresiones' para παράπτωματα, en línea con el POB inglés.
  - Se usa 'servidor de Dios' como opción digna y transparente para θεράπων, sin forzar 'siervo' como término técnico único.
  - '''Juicio'' se conserva como equivalente amplio de κρίμα; no se estrecha a ''condena'' salvo que el contexto lo exigiera.'
  - La nota textual refleja la alternativa indicada por el POB inglés para ἐξομολογεῖσθαι περὶ τῶν παραπτωμάτων.
