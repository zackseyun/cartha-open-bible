translation:
  language: es
  text: Porque bajaron vivos al Hades, y la muerte los pastoreará.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατέβησαν
  english_pob_choice: went down
  chosen_spanish: bajaron
  alternatives_spanish:
  - descendieron
  - fueron abajo
  lexicon: καταβαίνω
  rationale: El verbo expresa movimiento descendente; «bajaron» conserva la imagen de descenso de forma natural en español y evita una perífrasis más pesada.
- source_word: ζῶντες
  english_pob_choice: alive
  chosen_spanish: vivos
  alternatives_spanish:
  - estando vivos
  - con vida
  lexicon: ζάω
  rationale: «Vivos» mantiene la oposición directa con la muerte y reproduce con claridad el adverbial participio griego.
- source_word: ᾅδου
  english_pob_choice: Hades
  chosen_spanish: Hades
  alternatives_spanish:
  - el Hades
  - el Seol
  lexicon: ᾅδης
  rationale: Se conserva el nombre propio del ámbito de los muertos, como en el inglés POB; «el Seol» sería una equivalencia interpretativa más marcada desde el hebreo.
- source_word: ποιμανεῖ
  english_pob_choice: will shepherd
  chosen_spanish: pastoreará
  alternatives_spanish:
  - apacentará
  - los pastoreará
  lexicon: ποιμαίνω
  rationale: «Pastoreará» preserva el sentido verbal de pastorear/gobernar con la imagen bíblica de guía y dominio; es la mejor correspondencia directa en español.
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: θάνατος
  rationale: Se traduce como sustantivo personificado femenino en español, en paralelo con el griego y con el sujeto del verbo siguiente.
theological_decisions:
- issue: Personificación de la muerte como agente que gobierna a los impíos
  english_pob_reading: death will shepherd them
  chosen_spanish_reading: la muerte los pastoreará
  alternative_spanish_readings:
  - la muerte los gobernará
  - la muerte los conducirá como pastor
  rationale: 'Se mantiene la personificación fuerte del original y de la traducción inglesa: no se suaviza a una mera consecuencia abstracta, porque el verbo ποιμανεῖ aporta una imagen intencional de dominio y conducción.'
  doctrine_reference: Psalm 49:14; 1 Clement 51:4
translation_notes:
  revision_awareness: La versión española sigue el texto griego directamente y coincide con la traducción inglesa POB sin cambios de sentido ni necesidad de notas; el pasaje fue confirmado en revisión reciente como sin modificaciones necesarias.
  spanish_consistency_notes:
  - Se conserva «Hades» como término técnico del ámbito de los muertos, en coherencia con la decisión inglesa.
  - Se usa «la muerte» en femenino por concordancia idiomática del español y por la personificación del sustantivo.
  - No se introduce puntuación interpretativa adicional ni se añade artículo antes de «Hades» para mantener la concisión del original.
