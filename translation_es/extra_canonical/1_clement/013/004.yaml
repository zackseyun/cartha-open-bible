translation:
  language: es
  text: ¿Sobre quién fijaré mi mirada[a], sino sobre el que es manso y tranquilo y tiembla ante mis palabras?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Sobre quién fijaré mi mirada, sino sobre el manso y tranquilo y el que tiembla ante mis palabras?» El griego tiene un solo artículo que gobierna las tres descripciones, por lo que la frase se refiere a una sola persona.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐπὶ τίνα ἐπιβλέψω
  english_pob_choice: Upon whom shall I look
  chosen_spanish: ¿Sobre quién fijaré mi mirada?
  alternatives_spanish:
  - ¿A quién miraré?
  - ¿Sobre quién miraré?
  lexicon: ἐπιβλέπω
  rationale: 'La idea es más que ver: es dirigir la mirada con atención. «Fijaré mi mirada» conserva bien el valor relacional y el futuro interrogativo, con un español natural y digno.'
- source_word: τὸν πρᾶον
  english_pob_choice: the one who is gentle
  chosen_spanish: el que es manso
  alternatives_spanish:
  - el que es gentil
  - el manso
  lexicon: πρᾶος
  rationale: «Manso» transmite la cualidad de apacibilidad y humildad sin perder fuerza bíblica; «gentil» en español podría sonar a cortesía social, menos preciso aquí.
- source_word: καὶ ἡσύχιον
  english_pob_choice: and quiet
  chosen_spanish: y tranquilo
  alternatives_spanish:
  - y silencioso
  - y sosegado
  lexicon: ἡσύχιος
  rationale: «Tranquilo» comunica reposo, calma y ausencia de agitación. «Silencioso» sería demasiado estrecho; «sosegado» es posible, pero menos directo.
- source_word: καὶ τρέμοντά μου τὰ λόγια
  english_pob_choice: and trembles at my words
  chosen_spanish: y tiembla ante mis palabras
  alternatives_spanish:
  - y tiembla a causa de mis palabras
  - y reverencia mis palabras hasta temblar
  lexicon: τρέμω + λόγια
  rationale: Se conserva el verbo «temblar», que mantiene la tensión reverencial del griego. «Ante mis palabras» expresa la relación de respuesta frente a la palabra divina sin añadir una idea no presente en el texto.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió la segmentación gramatical para que un solo artículo griego gobierne las tres descripciones. La versión española sigue esa misma unidad sintáctica y evita dividirla en dos personas o grupos.
  spanish_consistency_notes:
  - Se mantuvo un español natural sin perder la unidad de τὸν con los tres participios/adjetivos.
  - Se evitó «SEÑOR» u otro reemplazo teológico porque el verso no contiene el nombre divino explícito.
  - La nota al pie queda anclada en «mi mirada[a]» y recoge la alternativa heredada del audit trail sin romper la continuidad del verso.
