revisions:
- from: 'Con este mandamiento y estos preceptos fortalezcámonos para andar como obedientes a sus palabras santas[a], teniendo humildad de espíritu. Porque la santa palabra dice:'
  to: 'Con este mandamiento y estos preceptos fortalezcámonos para andar como quienes obedecen sus palabras santas[a], con mente humilde. Porque la santa palabra dice:'
  rationale: Se ajusta «como obedientes a» a «como quienes obedecen» para reflejar de manera más natural e íntegra ὑπηκόους ὄντας. Se sustituye «teniendo humildad de espíritu» por «con mente humilde» para representar mejor ταπεινοφρονοῦντες sin introducir «espíritu». Se mejora la nota eliminando el anglicismo y conservando la alternativa semántica documentada para ἁγιοπρεπής.
