id: 1CLEM.13.3
reference: 1 Clement 13:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: ταύτῃ τῇ ἐντολῇ καὶ τοῖς παραγγέλμασι τούτοις στηρίξωμεν ἑαυτοὺς εἰς τὸ πορεύεσθαι ὑπηκόους ὄντας τοῖς ἁγιοπρεπέσι λόγοις αὐτοῦ, ταπεινοφρονοῦντες· φησὶν γὰρ ὁ ἅγιος λόγος·
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/013/003.yaml
  text: 'By this command and these injunctions let us strengthen ourselves to walk as those who are obedient to his holy words[a], being humble-minded. For the holy word says:'
  footnotes:
  - marker: a
    text: Or 'holy and fitting words'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:33:44Z'
    unchanged: false
    changes_summary: Revised 'charges' to 'injunctions' for a more formal rendering of παραγγέλμασι; changed 'so as to walk in obedience' to 'to walk as those who are obedient' to reflect ὑπηκόους ὄντας more fully; adjusted 'words befitting holiness' to 'holy words' for a more natural rendering of ἁγιοπρεπέσι λόγοις.
translation:
  language: es
  text: 'Con este mandamiento y estos preceptos fortalezcámonos para andar como quienes obedecen sus palabras santas[a], con mente humilde. Porque la santa palabra dice:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus palabras que convienen a la santidad»; el adjetivo griego también puede expresar la idea de palabras «dignas de santidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντολῇ
  english_pob_choice: command
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - precepto
  lexicon: ἐντολή
  rationale: «Mandamiento» conserva el valor normativo fuerte del singular griego y funciona bien junto al plural siguiente sin sonar redundante en español.
- source_word: παραγγέλμασι
  english_pob_choice: injunctions
  chosen_spanish: preceptos
  alternatives_spanish:
  - injunciones
  - órdenes
  lexicon: παράγγελμα
  rationale: «Preceptos» da un registro formal y normativo cercano a «injunctions», sin caer en un calco poco natural como «injunciones».
- source_word: στηρίξωμεν ἑαυτοὺς
  english_pob_choice: let us strengthen ourselves
  chosen_spanish: fortalezcámonos
  alternatives_spanish:
  - fortalezcamos a nosotros mismos
  - confirmémonos
  lexicon: στηρίζω
  rationale: El imperativo exhortativo reflexivo en español se expresa de forma natural y concisa con «fortalezcámonos».
- source_word: εἰς τὸ πορεύεσθαι
  english_pob_choice: to walk
  chosen_spanish: para andar
  alternatives_spanish:
  - para caminar
  - para vivir
  lexicon: πορεύομαι
  rationale: «Andar» preserva la imagen de conducta/vivir en marcha, más cercana al uso bíblico, sin forzar un sentido meramente físico.
- source_word: ὑπηκόους ὄντας
  english_pob_choice: as those who are obedient
  chosen_spanish: como obedientes
  alternatives_spanish:
  - siendo obedientes
  - como personas obedientes
  lexicon: ὑπήκοος
  rationale: «Como obedientes» refleja el participio adjetival de manera directa y natural en español, sin sobreexplicar la construcción.
- source_word: τοῖς ἁγιοπρεπέσι λόγοις
  english_pob_choice: his holy words
  chosen_spanish: sus palabras santas
  alternatives_spanish:
  - sus palabras que son dignas de santidad
  - sus palabras santamente apropiadas
  lexicon: ἁγιοπρεπής
  rationale: La revisión inglesa osciló entre «holy words» y «words befitting holiness». En español, «palabras santas» conserva la reverencia sin perder la referencia a la cualidad de santidad; la nota a pie recoge la alternativa semántica.
- source_word: ταπεινοφρονοῦντες
  english_pob_choice: being humble-minded
  chosen_spanish: teniendo humildad de espíritu
  alternatives_spanish:
  - siendo humildes de mente
  - con mente humilde
  lexicon: ταπεινοφρονέω
  rationale: «Humildad de espíritu» suena natural en español e intenta mantener el matiz interior/disposicional de la expresión griega.
- source_word: ὁ ἅγιος λόγος
  english_pob_choice: the holy word
  chosen_spanish: la santa palabra
  alternatives_spanish:
  - la palabra santa
  - la palabra de santidad
  lexicon: λόγος
  rationale: Se conserva el singular y el tono solemne del original; «santa» corresponde al adjetivo griego sin introducir una personificación más fuerte de la necesaria.
theological_decisions:
- issue: Relación entre el mandamiento singular y los preceptos plurales
  english_pob_reading: By this command and these injunctions
  chosen_spanish_reading: Con este mandamiento y estos preceptos
  alternative_spanish_readings:
  - Con este mandato y estas órdenes
  - Con este precepto y estos mandatos
  rationale: Se mantiene la doble forma singular/plural del griego, que sugiere una base normativa concreta junto con instrucciones derivadas, sin fusionarlas.
  doctrine_reference: No doctrinal claim; syntactic/semantic preservation of the source structure.
- issue: Carácter de las palabras de Dios como 'holy' versus 'befitting holiness'
  english_pob_reading: his holy words
  chosen_spanish_reading: sus palabras santas
  alternative_spanish_readings:
  - sus palabras dignas de santidad
  - sus palabras que convienen a la santidad
  rationale: El griego ἁγιοπρεπέσι admite tanto 'santo' como 'befitting holiness'. Para el texto principal se escoge una formulación natural y reverente; la nota preserva la alternativa semántica sin perderla.
  doctrine_reference: Lexical/theological nuance in ἁγιοπρεπής; no doctrinal dispute, but a fidelity issue.
- issue: Sentido de 'humble-minded'
  english_pob_reading: being humble-minded
  chosen_spanish_reading: teniendo humildad de espíritu
  alternative_spanish_readings:
  - siendo humildes de mente
  - con humildad de pensamiento
  rationale: El griego expresa una disposición interior; en español, 'humildad de espíritu' comunica bien esa actitud ética y devocional, sin convertirla en una noción exclusivamente psicológica.
  doctrine_reference: Ethical disposition in Christian exhortation; no confessional doctrine.
translation_notes:
  revision_awareness: El texto inglés más reciente volvió de «words befitting holiness» a «holy words» por naturalidad, aunque el historial de revisión muestra que el compuesto ἁγιοπρεπής tiene una gama más precisa. La versión española sigue esa decisión de naturalidad reverente en el cuerpo del texto y conserva la alternativa semántica en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo requiera; este pasaje no contiene el nombre divino explícito.
  - Se mantiene un registro eclesial sobrio y moderno, evitando calcos como «injunciones».
  - «Palabra» se conserva en singular en la cláusula final, conforme al griego y al inglés POB.
