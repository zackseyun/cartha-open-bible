base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/013/002.yaml
  text: 'For thus he said: “Show mercy, so that you may receive mercy. Forgive, so that you may be forgiven. As you do, so it will be done to you. As you give, so it will be given to you. As you judge, so you will be judged. As you show kindness, so kindness will be shown to you. With the measure by which you measure, it will be measured to you.”'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:34:15Z'
    unchanged: false
    changes_summary: Revised 'so that it may be forgiven you' to 'so that you may be forgiven' for more natural English and closer alignment with the passive construction ἀφεθῇ ὑμῖν. No other changes needed.
translation:
  language: es
  text: 'Porque así dijo: «Muestren misericordia, para que reciban misericordia. Perdonen, para que sean perdonados. Como ustedes hacen, así se hará con ustedes. Como ustedes dan, así se les dará. Como ustedes juzgan, así serán juzgados. Como ustedes muestran bondad, así se les mostrará bondad. Con la medida con que miden, se les medirá».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐλεεῖτε
  english_pob_choice: Show mercy
  chosen_spanish: Muestren misericordia
  alternatives_spanish:
  - Tengan misericordia
  - Sean misericordiosos
  lexicon: ἐλεέω
  rationale: El imperativo plural pide una acción visible hacia otros; «muestren misericordia» conserva el aspecto exhortativo y el valor concreto de la misericordia como acto, no solo como actitud. «Tengan misericordia» es posible, pero suena más abstracto en español.
- source_word: ἀφίετε
  english_pob_choice: Forgive
  chosen_spanish: Perdonen
  alternatives_spanish:
  - Dejen pasar
  - Absuelvan
  lexicon: ἀφίημι
  rationale: En este contexto el verbo expresa perdonar ofensas. «Perdonen» es la equivalencia natural y fiel en español; «absuelvan» sería demasiado técnico y «dejen pasar» demasiado libre.
- source_word: ἐλεηθῆτε / ἀφεθῇ ὑμῖν
  english_pob_choice: you may receive mercy / you may be forgiven
  chosen_spanish: reciban misericordia / sean perdonados
  alternatives_spanish:
  - les sea concedida misericordia / les sea perdonado
  lexicon: pasivo divino/ pasivo indefinido
  rationale: El griego usa pasivos que presentan la acción recibida sin nombrar explícitamente al agente. En español, el pasivo perifrástico comunica bien esa pasividad. «Sean perdonados» sigue de cerca el pasivo y evita introducir un agente no mencionado.
- source_word: χρηστεύεσθε
  english_pob_choice: show kindness
  chosen_spanish: muestran bondad
  alternatives_spanish:
  - sean bondadosos
  - traten con bondad
  lexicon: χρηστεύομαι
  rationale: El POB inglés opta por «show kindness» para reflejar el matiz de trato benévolo. En español, «mostrar bondad» conserva la idea de una bondad expresada en acciones, sin diluirla en una simple cualidad interior.
- source_word: χρηστευθήσεται ὑμῖν
  english_pob_choice: kindness will be shown to you
  chosen_spanish: se les mostrará bondad
  alternatives_spanish:
  - se les hará bondad
  - serán tratados con bondad
  lexicon: χρηστεύω
  rationale: 'Se mantiene el paralelo verbal con el griego y con la línea anterior: lo que uno manifiesta hacia otros retorna en forma semejante. «Serán tratados con bondad» sería idiomático, pero perdería un poco la correspondencia formal con el verbo de la cláusula anterior.'
- source_word: ᾧ μέτρῳ μετρεῖτε, ἐν αὐτῷ μετρηθήσεται ὑμῖν
  english_pob_choice: With the measure by which you measure, it will be measured to you
  chosen_spanish: Con la medida con que miden, se les medirá
  alternatives_spanish:
  - Con la medida que ustedes midan, les será medida
  - Con la medida con que midan, se les medirá
  lexicon: μέτρον / μετρέω
  rationale: La formulación española conserva la repetición de «medida / medirá» y el paralelismo proverbial. «Con la medida con que miden» es natural y sigue el texto sin sobrecargarlo.
theological_decisions:
- issue: 'Retribución moral en forma paralela: recibir misericordia, perdón y juicio según la conducta propia'
  english_pob_reading: The saying is rendered as a direct moral reciprocity statement without adding doctrinal framing.
  chosen_spanish_reading: El dicho se presenta como una reciprocidad moral directa, sin añadir marco doctrinal ajeno al texto.
  alternative_spanish_readings:
  - Añadir una glosa explícita sobre gracia o salvación
  - Suavizar el paralelismo con una explicación interpretativa
  rationale: El griego y el inglés POB mantienen la forma proverbial y el paralelismo. La traducción española debe conservar esa estructura para no debilitar la fuerza exhortativa ni introducir interpretaciones que el texto no explicita.
  doctrine_reference: Proverbial reciprocity / ethical exhortation
- issue: Pasivos sin agente explícito en las cláusulas finales
  english_pob_reading: “you may be forgiven” and “it will be done to you” preserve passive sense without naming the agent.
  chosen_spanish_reading: «sean perdonados», «se les dará», «se les medirá» preservan la voz pasiva o pasiva refleja sin agente explícito.
  alternative_spanish_readings:
  - «Dios los perdonará»
  - «Dios les dará»
  - «Dios les medirá»
  rationale: Nombrar a Dios como agente iría más allá del griego, que presenta la acción de manera pasiva. La traducción mantiene la apertura del texto y su formulación proverbial.
  doctrine_reference: Passive voice / divine agency implied but not stated
translation_notes:
  revision_awareness: El contexto de revisión en inglés solo ajustó una cláusula pasiva para mayor naturalidad; no cambió el sentido ni introdujo variantes textuales. La versión española sigue el mismo contenido base y conserva el paralelismo del original griego sin necesidad de notas de variante.
  spanish_consistency_notes:
  - Se mantiene «misericordia» para ἐλεέω y no se sustituye por un sinónimo menos preciso.
  - Se mantiene «perdonen / sean perdonados» para ἀφίημι en sentido de perdón de ofensas.
  - Se conserva el paralelismo verbal y sintáctico en toda la serie para reflejar la cadencia proverbial del original.
  - No se usa «SEÑOR» ni terminología litúrgica adicional, porque el pasaje no contiene referencia al nombre divino.
