source:
  edition: Funk 1901 (normalized OCR)
  text: οὕτως γὰρ εἶπεν· Ἐλεεῖτε, ἵνα ἐλεηθῆτε· ἀφίετε, ἵνα ἀφεθῇ ὑμῖν· ὡς ποιεῖτε, οὕτω ποιηθήσεται ὑμῖν· ὡς δίδοτε, οὕτως δοθήσεται ὑμῖν· ὡς κρίνετε, οὕτως κριθήσεσθε· ὡς χρηστεύεσθε, οὕτως χρηστευθήσεται ὑμῖν· ᾧ μέτρῳ μετρεῖτε, ἐν αὐτῷ μετρηθήσεται ὑμῖν.
