translation:
  language: es
  text: 'Humillémonos, pues, hermanos, desechando toda arrogancia, presunción, necedad e ira, y hagamos lo que está escrito, porque el Espíritu Santo dice: “No se gloríe el sabio en su sabiduría, ni el fuerte en su fuerza, ni el rico en sus riquezas; sino el que se gloría, gloríese en el Señor, para buscarlo y hacer justicia y rectitud”. Y especialmente recordemos las palabras del Señor Jesús, las cuales habló enseñando mansedumbre y paciencia. Porque así dijo: “Misericordia[a] tengan, para que reciban misericordia; perdonen, para que les sea perdonado; como hacen, así se les hará; como dan, así se les dará; como juzgan, así serán juzgados; como muestran bondad, así se les mostrará bondad; con la medida con que miden, se les medirá”. Con este mandamiento y estos preceptos[b] fortalezcámonos para andar como quienes obedecen sus palabras, en forma digna de santidad, siendo humildes de mente. Porque la santa palabra dice: “¿Sobre quién fijaré mi mirada, sino sobre el manso y tranquilo, y sobre
    el que tiembla ante mis palabras?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Puede leerse también «Misericordia tengan», conservando más de cerca el imperativo del griego.
    reason: alternative_reading
  - marker: b
    text: «Preceptos» traduce el plural παραγγέλμασι; también puede entenderse como «mandatos» o «encargos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταπεινοφρονήσωμεν
  english_pob_choice: Let us therefore be humble
  chosen_spanish: Humillémonos, pues
  alternatives_spanish:
  - Seamos humildes, pues
  - Tengamos humildad, pues
  lexicon: LSJ; BDAG
  rationale: El verbo expresa asumir una disposición humilde; en español, el imperativo exhortativo reflexivo 'Humillémonos' conserva la fuerza parenética y la conexión con 'humilde' / 'humildes de mente' más adelante.
- source_word: ἀλαζονείαν
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - vanagloria
  - presunción
  lexicon: LSJ; BDAG
  rationale: '''Arrogancia'' comunica el orgullo autoexaltado del vicio con registro moral claro y contemporáneo.'
- source_word: τύφος
  english_pob_choice: conceit
  chosen_spanish: presunción
  alternatives_spanish:
  - vanidad
  - engreimiento
  lexicon: LSJ; BDAG
  rationale: Distingue la autosuficiencia inflada de ἀλαζονεία sin repetir el mismo matiz; 'presunción' preserva la idea de autoimportancia.
- source_word: ἀφροσύνην
  english_pob_choice: foolishness
  chosen_spanish: necedad
  alternatives_spanish:
  - locura
  - insensatez
  lexicon: LSJ; BDAG
  rationale: '''Necedad'' es natural en registro bíblico y ético para la conducta carente de sensatez.'
- source_word: ὀργάς
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojos
  - arranques de ira
  lexicon: LSJ; BDAG
  rationale: Aunque el plural sugiere manifestaciones múltiples, 'ira' funciona bien en español como vicio general y mantiene el tono de lista moral.
- source_word: τὸ γεγραμμένον
  english_pob_choice: what is written
  chosen_spanish: lo que está escrito
  alternatives_spanish:
  - lo escrito
  - la Escritura
  lexicon: LSJ; BDAG
  rationale: Reproduce la fórmula de manera amplia y sobria, sin especificar más de lo que el griego exige.
- source_word: καυχάσθω
  english_pob_choice: boast
  chosen_spanish: se gloríe
  alternatives_spanish:
  - se jacte
  - se enorgullezca
  lexicon: LSJ; BDAG
  rationale: En la cita bíblica en español, 'gloriarse' mantiene el eco escritural tradicional y el sentido de presumir en algo.
- source_word: ἐκζητεῖν
  english_pob_choice: to seek him
  chosen_spanish: buscarlo
  alternatives_spanish:
  - buscarlo diligentemente
  - procurarlo
  lexicon: LSJ; BDAG
  rationale: '''Buscarlo'' es la forma natural en español; conserva la relación verbal con el objeto implícito del Señor.'
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: LSJ; BDAG
  rationale: 'Aquí se preserva la tensión lexical con δικαιοσύνη: en vez de duplicar ''juicio'', ''justicia'' hace visible el emparejamiento ético-jurídico del texto, coherente con la cita profética.'
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justeza
  lexicon: LSJ; BDAG
  rationale: Se opta por 'rectitud' para diferenciarla de κρίμα y reflejar el matiz de conducta correcta; en español moderno evita repetir 'justicia' dos veces en la misma cláusula.
- source_word: ἐπιείκειαν
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - benignidad
  - dulzura
  lexicon: LSJ; BDAG
  rationale: '''Mansedumbre'' es el equivalente bíblico más estable y abarca la suavidad de trato y disposición que el contexto exige.'
- source_word: μακροθυμίαν
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - constancia
  lexicon: LSJ; BDAG
  rationale: '''Paciencia'' es la opción más clara en español para la perseverancia contenida ante otros.'
- source_word: Ἐλεεῖτε
  english_pob_choice: Show mercy
  chosen_spanish: Misericordia tengan
  alternatives_spanish:
  - Sean misericordiosos
  - Sean compasivos
  lexicon: LSJ; BDAG
  rationale: La construcción exhortativa conserva el paralelo recíproco de la serie; 'misericordia' mantiene el sustantivo del original y el eco escritural.
- source_word: ἀφίετε
  english_pob_choice: Forgive
  chosen_spanish: perdonen
  alternatives_spanish:
  - absuelvan
  - dejen pasar
  lexicon: LSJ; BDAG
  rationale: En este contexto ético interpersonal, 'perdonen' es la traducción natural y exacta.
- source_word: χρηστεύεσθε
  english_pob_choice: show kindness
  chosen_spanish: muestran bondad
  alternatives_spanish:
  - se comportan con bondad
  - son bondadosos
  lexicon: LSJ; BDAG
  rationale: '''Mostrar bondad'' conserva el paralelismo de acciones recíprocas; la forma verbal en la cita funciona bien en español como conducta observable.'
- source_word: παραγγέλμασι
  english_pob_choice: injunctions
  chosen_spanish: preceptos
  alternatives_spanish:
  - mandatos
  - encargos
  lexicon: LSJ; BDAG
  rationale: '''Preceptos'' refleja el carácter normativo plural sin sonar redundante junto a ''mandamiento''.'
- source_word: στηρίξωμεν ἑαυτούς
  english_pob_choice: let us strengthen ourselves
  chosen_spanish: fortalezcámonos
  alternatives_spanish:
  - apoyémonos
  - afirmémonos
  lexicon: LSJ; BDAG
  rationale: '''Fortalezcámonos'' expresa de manera natural la exhortación a consolidarse interiormente mediante estas enseñanzas.'
- source_word: ὑπηκόους ὄντας
  english_pob_choice: as those who are obedient
  chosen_spanish: como quienes obedecen
  alternatives_spanish:
  - como obedientes
  - siendo obedientes
  lexicon: LSJ; BDAG
  rationale: La frase española mantiene el valor participial y el sentido de conducta obediente sin forzar una calca.
- source_word: ἁγιοπρεπέσι λόγοις
  english_pob_choice: holy and fitting words
  chosen_spanish: en forma digna de santidad
  alternatives_spanish:
  - con palabras dignas de santidad
  - en palabras santas y decorosas
  lexicon: LSJ; BDAG
  rationale: El adjetivo ἁγιοπρεπής expresa lo que conviene a la santidad; la perífrasis evita reducirlo a 'santo' solamente y conserva el matiz de decoro reverente.
- source_word: ταπεινοφρονοῦντες
  english_pob_choice: being humble-minded
  chosen_spanish: siendo humildes de mente
  alternatives_spanish:
  - pensando humildemente
  - con humildad de mente
  lexicon: LSJ; BDAG
  rationale: Mantiene la conexión léxica con el comienzo y refleja que se trata de una disposición interior, no solo de una conducta externa.
- source_word: πρᾶον
  english_pob_choice: gentle
  chosen_spanish: manso
  alternatives_spanish:
  - apacible
  - dulce
  lexicon: LSJ; BDAG
  rationale: '''Manso'' es el equivalente bíblico más directo y sostiene la cita profética con resonancia reconocible.'
- source_word: ἡσύχιον
  english_pob_choice: quiet
  chosen_spanish: tranquilo
  alternatives_spanish:
  - callado
  - sereno
  lexicon: LSJ; BDAG
  rationale: '''Tranquilo'' transmite el matiz de calma, sosiego y ausencia de contienda mejor que una simple referencia al silencio.'
- source_word: τρέμοντά μου τὰ λόγια
  english_pob_choice: the one who trembles at my words
  chosen_spanish: el que tiembla ante mis palabras
  alternatives_spanish:
  - el que se estremece ante mis palabras
  - el que teme mis palabras
  lexicon: LSJ; BDAG
  rationale: Conserva el lenguaje reverencial del texto profético sin suavizar el impacto de 'tiembla'.
theological_decisions:
- issue: Rendering of κύριος in the scriptural citation and in 'the Lord Jesus'
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé en la cita profética
  - el Señor
  rationale: En el cuerpo del texto se mantiene 'Señor' para κύριος, tanto en la cita como en 'el Señor Jesús', porque el griego no marca de forma explícita el nombre divino y la fórmula bíblica española más transparente aquí conserva la ambigüedad reverente sin introducir una distinción que el pasaje no explicita.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering of δικαιοσύνη in the Jeremiah-like citation
  english_pob_reading: righteousness
  chosen_spanish_reading: rectitud
  alternative_spanish_readings:
  - justicia
  - justicia y rectitud
  rationale: Se evita duplicar 'justicia' y se distingue δικαιοσύνη de κρίμα en español; 'rectitud' hace visible el par semántico y preserva la tensión ética-jurídica del pasaje.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness'
- issue: Gendered address ἀδελφοί
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: Se conserva la dirección fraterna del griego y el uso eclesial tradicional sin neutralizar la forma del vocativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, especialmente el ajuste de 'anger', la clarificación de 'as those who are obedient' y la preferencia por 'justice' junto a 'righteousness'. La versión española busca preservar esa precisión, pero reconfigura algunos emparejamientos léxicos para evitar redundancias y mantener una prosa natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en todo el pasaje para conservar consistencia interna.
  - Se usa 'justicia' y 'rectitud' para reflejar la distinción entre κρίμα y δικαιοσύνη.
  - '''Mansedumbre'' y ''humildes de mente'' se relacionan intencionalmente para sostener el campo léxico de la humildad.'
  - La lista de virtudes y vicios se traduce con vocabulario bíblico comprensible en español contemporáneo sin perder registro solemne.
