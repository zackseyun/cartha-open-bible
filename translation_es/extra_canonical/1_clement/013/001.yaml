base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/013/001.yaml
  text: 'Let us therefore be humble, brothers, laying aside all arrogance and conceit and foolishness and anger, and let us do what is written—for the Holy Spirit says: “Let not the wise boast in his wisdom, nor the strong in his strength, nor the rich in his riches, but let the one who boasts boast in the Lord, to seek him and to do justice and righteousness”—especially remembering the words of the Lord Jesus, which he spoke while teaching gentleness and patience. 2 For thus he said: “Show mercy, so that you may receive mercy. Forgive, so that it may be forgiven you. As you do, so it will be done to you. As you give, so it will be given to you. As you judge, so you will be judged. As you show kindness, so kindness will be shown to you. With the measure by which you measure, it will be measured to you.” 3 By this command and these injunctions let us strengthen ourselves so as to walk as those who are obedient to his words befitting holiness, being humble-minded. For the holy word says: “Upon
    whom shall I look, except upon the gentle and quiet one, and the one who trembles at my words?”'
