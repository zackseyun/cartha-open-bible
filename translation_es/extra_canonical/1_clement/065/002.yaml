lexical_decisions:
- source_word: ὅπως θᾶττον
  english_pob_choice: so that they may report to us all the sooner
  chosen_spanish: para que nos comuniquen tanto más pronto
  alternatives_spanish:
  - para que nos informen más pronto
  - a fin de que nos comuniquen más rápidamente
  lexicon: ὅπως + θᾶττον
  rationale: La cláusula expresa finalidad con rapidez; «para que» conserva la relación final y «tanto más pronto» reproduce el comparativo de prontitud sin volverlo pesado. «Comuniquen» sigue el sentido de dar noticia/reportar mejor que un simple «decir».
- source_word: τὴν εὐξαπεῖσαν καὶ ... ἐπιποθήτην
  english_pob_choice: the peace and concord we have prayed for and desired
  chosen_spanish: la paz y la concordia que hemos pedido y deseado
  alternatives_spanish:
  - la paz y la concordia por la que hemos orado y anhelado
  - la paz y la concordia que hemos suplicado y deseado
  lexicon: εὐξαπεῖσαν / ἐπιποθήτην
  rationale: El texto griego transmitido está truncado y con OCR irregular, pero el audit trail inglés fija la doble idea de oración/petición y deseo. «Hemos pedido y deseado» mantiene ambos matices sin introducir devocionalismo ajeno ni borrar la tensión léxica de dos verbos distintos.
- source_word: εἰς τὸ τάχιον καὶ ἡμᾶς χαρῆναι
  english_pob_choice: in order that we too may more quickly rejoice
  chosen_spanish: a fin de que también nosotros nos alegremos más rápidamente
  alternatives_spanish:
  - para que también nosotros nos regocijemos con mayor prontitud
  - a fin de que también nosotros podamos alegrarnos más pronto
  lexicon: εἰς τὸ τάχιον + χαρῆναι
  rationale: «A fin de que» es una equivalencia formal de finalidad; «nos alegremos» conserva el verbo de gozo sin añadir tono litúrgico. «Más rápidamente» refleja el adverbio de rapidez presente en el contexto.
- source_word: περὶ τῆς εὐσταθείας ὑμῶν
  english_pob_choice: concerning your good order
  chosen_spanish: por vuestro buen orden
  alternatives_spanish:
  - acerca de vuestro buen orden
  - por vuestra buena firmeza
  lexicon: εὐσταθεία
  rationale: «Buen orden» sigue el valor de estabilidad/ordenamiento que el inglés POB ya optó por «good order». «Vuestro» respeta el plural epistolar y «por» mantiene la preposición relacional del gozo/alegría respecto de ese estado.
theological_decisions:
- issue: La fuente griega proporcionada está truncada y presenta un error de OCR, pero el texto inglés auditado corrige la omisión con base en revisión fuente-grounded.
  english_pob_reading: so that they may report to us all the sooner the peace and concord we have prayed for and desired, in order that we too may more quickly rejoice concerning your good order.
  chosen_spanish_reading: para que nos comuniquen tanto más pronto la paz y la concordia que hemos pedido y deseado, a fin de que también nosotros nos alegremos más rápidamente por vuestro buen orden.
  alternative_spanish_readings:
  - para que nos informen más pronto la paz y la concordia que hemos orado y anhelado, para que también nosotros nos alegremos por vuestro buen orden
  rationale: 'Se conserva la totalidad del sentido restaurado por la revisión: no solo la petición de paz y concordia, sino también el segundo propósito, el gozo de los remitentes ante la buena estabilidad de los destinatarios. No se suaviza el doble movimiento retórico del texto.'
  doctrine_reference: Source-critical fidelity to the supplied Greek plus audited English revision
translation_notes:
  revision_awareness: 'El registro inglés fue revisado para corregir una omisión importante: la primera redacción dejaba fuera la mitad final del versículo. La presente versión española sigue el texto auditado completo, y además deja visible la opción alternativa relacionada con la manera de entender εὐξαπεῖσαν/ἐπιποθήτην dentro de la tradición textual transmitida.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece explícitamente el nombre divino; aquí no aplica.
  - Se mantiene un registro epistolar y sobrio, sin cristianizar indebidamente el vocabulario.
  - «Buen orden» se conserva como equivalente de εὐσταθεία para mantener consistencia con la línea auditada en inglés.
  - La nota a pie de página marca la alternativa de lectura sin duplicar sentidos en el cuerpo del texto.
