translation:
  language: es
  text: Ahora devuélvannos pronto, en paz y con alegría, a los hombres enviados de parte nuestra —Claudio Ephebo y Valerio Bitón, junto con Fortunato—, para que nos informen cuanto antes de la paz y la concordia por las que hemos orado y que hemos deseado, a fin de que también nosotros nos alegremos pronto por su buen orden.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπεσταλμένους
  english_pob_choice: the men sent from us
  chosen_spanish: los hombres enviados de parte nuestra
  alternatives_spanish:
  - los enviados de parte nuestra
  - los delegados enviados por nosotros
  lexicon: LSJ
  rationale: Conserva el participio pasivo y el matiz de personas comisionadas y enviadas, sin introducir un término eclesiástico más específico que el griego no exige.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: LSJ
  rationale: En español, la locución natural y fiel es 'en paz', que preserva el valor relacional y comunitario de la expresión.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - gozosamente
  lexicon: LSJ
  rationale: '''Alegría'' comunica bien el afecto de la frase y resulta claro para una lectura amplia; ''gozo'' sería posible, pero suena más marcado devocionalmente.'
- source_word: ἐν τάχει
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - sin demora
  lexicon: LSJ
  rationale: '''Rápidamente'' refleja la urgencia del imperativo y funciona de modo natural en una petición epistolar.'
- source_word: ἀναπέμψατε
  english_pob_choice: send back
  chosen_spanish: envíennos de regreso
  alternatives_spanish:
  - devuélvannos
  - reexpídanlos
  lexicon: LSJ
  rationale: El verbo aquí pide el retorno de los enviados al emisor; 'envíennos de regreso' reproduce esa dirección de forma clara en español.
- source_word: ὅπως θᾶττον
  english_pob_choice: so that they may report to us all the sooner
  chosen_spanish: para que nos informen cuanto antes
  alternatives_spanish:
  - a fin de que nos den noticia más pronto
  - para que lo sepamos más rápidamente
  lexicon: LSJ
  rationale: El griego apunta a una finalidad ligada a la rapidez. En español, 'nos informen cuanto antes' expresa la urgencia sin sobrecargar con una expansión innecesaria del sentido.
- source_word: εὐξαπεῖσαν
  english_pob_choice: for which we have prayed earnestly
  chosen_spanish: que hemos pedido y deseado
  alternatives_spanish:
  - por la que hemos orado con insistencia
  - por la que hemos suplicado
  lexicon: LSJ
  rationale: El texto griego conserva una referencia rara y truncada vinculada con algo deseado en el marco de la oración. Dado que el fragmento disponible no desarrolla plenamente la forma, se mantiene una expresión prudente que recoge 'pedido' y 'deseado' sin afirmar más de lo extante.
theological_decisions:
- issue: Reconstrucción mínima del sentido a partir de un texto griego truncado
  english_pob_reading: The translation completes the sense minimally as a request that the returned delegates report the prayed-for peace and concord.
  chosen_spanish_reading: La traducción completa el sentido de manera mínima como una petición para que los delegados regresen e informen de la paz y la concordia pedidas y deseadas.
  alternative_spanish_readings:
  - Dejar la oración inconclusa tras 'y'
  - Reproducir solo las palabras conservadas sin suplir el objeto implícito
  rationale: El griego conservado queda cortado y apunta con claridad a un pedido epistolar sobre el retorno de los enviados y el informe de la situación de paz. En español se completa solo lo indispensable para la legibilidad, sin ampliar el contenido más allá de lo que el contexto inmediato sostiene.
  doctrine_reference: 'PHILOSOPHY.md: preservar razonamiento auditable; no parafrasear más allá de lo que el griego permite'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios adicionales según el resumen de revisión y el cotejo cruzado de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma de proyecto solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - '''Mesías/Cristo'' no aparece en este pasaje, por lo que no hay decisión terminológica correspondiente.'
  - Se preservó el tono epistolar y exhortativo con español natural, evitando calcos como 'en prisa' o 'con alegría' cuando un giro más idiomático era posible.
