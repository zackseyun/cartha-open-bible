  revision_rationale: La revisión conserva la reconstrucción mínima del pasaje truncado, pero corrige la omisión del matiz de oración en εὐξαπεῖσαν y mejora la naturalidad del imperativo español con 'devuélvannos'. También suaviza el estilo sin apartarse del sentido auditado.
