revisions:
- from: Ahora envíennos de regreso rápidamente, en paz y con alegría, a los hombres enviados de parte nuestra —Claudio Ephebo y Valerio Bitón, junto con Fortunato—, para que nos informen cuanto antes de la paz y la concordia que hemos pedido y deseado, a fin de que también nosotros nos regocijemos pronto por su buen orden.
  to: Ahora devuélvannos pronto, en paz y con alegría, a los hombres enviados de parte nuestra —Claudio Ephebo y Valerio Bitón, junto con Fortunato—, para que nos informen cuanto antes de la paz y la concordia por las que hemos orado y que hemos deseado, a fin de que también nosotros nos alegremos pronto por su buen orden.
  rationale: La revisión conserva la reconstrucción mínima del pasaje truncado, pero corrige la omisión del matiz de oración en εὐξαπεῖσαν y mejora la naturalidad del imperativo español con 'devuélvannos'. También suaviza el estilo sin apartarse del sentido auditado.
