translation:
  language: es
  text: 'El Dueño de todo no tiene necesidad, hermanos; no necesita de nada, sino solo que se le confiese[a]. Pues el David escogido dice: “Confesaré al Señor, y le agradará más que un becerro joven que produce[b] cuernos y pezuñas. Vean los pobres y alégrense”. Y de nuevo dice: “Ofrece a Dios un sacrificio de alabanza y paga tus votos al Altísimo; e invócame en el día de tu aflicción, y te libraré, y me glorificarás”. Porque el sacrificio para Dios es un espíritu quebrantado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '“Se le confiese” mantiene la amplitud del griego ἐξομολογεῖσθαι: puede incluir confesión, reconocimiento público y alabanza agradecida.'
    reason: theological_note
  - marker: b
    text: Lit. “trayendo/produciendo cuernos y pezuñas”; se conserva la imagen concreta del participio griego ἐκφέροντα.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπροσδεής
  english_pob_choice: without need
  chosen_spanish: no tiene necesidad
  alternatives_spanish:
  - está sin necesidad
  - carece de necesidad
  lexicon: LSJ
  rationale: Expresa la idea de carencia de necesidad con naturalidad en español y conserva el predicado aplicado al Dueño de todo.
- source_word: δεσπότης
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Señor
  - Soberano
  - Maestro
  lexicon: LSJ
  rationale: Se mantiene la distinción respecto de κύριος del pasaje citado. “Dueño” conserva autoridad y posesión sin colapsarlo con “Señor”, que aquí aparece en la cita bíblica.
- source_word: χρῄζει
  english_pob_choice: has need
  chosen_spanish: necesita
  alternatives_spanish:
  - tiene necesidad
  - requiere
  lexicon: LSJ
  rationale: En español, “necesita” comunica el sentido idiomático con claridad; el duplicado “no tiene necesidad” refuerza la fuerza del griego sin sonar forzado.
- source_word: ἐξομολογεῖσθαι
  english_pob_choice: that confession be made to him
  chosen_spanish: se le haga confesión
  alternatives_spanish:
  - se le rinda confesión
  - se le confiese
  lexicon: LSJ
  rationale: Se conserva la ambigüedad bíblica de confesión/acknowledgment/praise. La pasiva impersonal evita restringir demasiado el matiz del verbo.
- source_word: ἐκλεκτὸς
  english_pob_choice: chosen
  chosen_spanish: escogido
  alternatives_spanish:
  - elegido
  - electo
  lexicon: LSJ
  rationale: “Escogido” es claro, bíblico y natural en español, sin cargar con resonancias técnicas posteriores.
- source_word: μόσχον νέον
  english_pob_choice: a young bull
  chosen_spanish: un becerro joven
  alternatives_spanish:
  - un toro joven
  - un novillo
  lexicon: LSJ
  rationale: “Becerro joven” conserva el valor sacrificial y la juventud del animal, con un registro bíblico comprensible.
- source_word: κέρατα ἐκφέροντα καὶ ὁπλάς
  english_pob_choice: bringing forth horns and hoofs
  chosen_spanish: que saca cuernos y pezuñas
  alternatives_spanish:
  - que trae cuernos y pezuñas
  - que va sacando cuernos y pezuñas
  lexicon: LSJ
  rationale: “Saca” reproduce de manera natural la imagen del participio ἐκφέροντα, manteniendo la viveza concreta del crecimiento/emergencia de los cuernos y pezuñas.
- source_word: πτωχοὶ
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los humildes
  - los necesitados
  lexicon: LSJ
  rationale: Se conserva el sentido social directo del término y la referencia del salmo citado.
- source_word: Θῦσον
  english_pob_choice: Offer
  chosen_spanish: Ofrece
  alternatives_spanish:
  - Saca
  - Sacrifica
  lexicon: LSJ
  rationale: Imperativo natural en español para introducir el lenguaje sacrificial del salmo.
- source_word: θυσίαν αἰνέσεως
  english_pob_choice: a sacrifice of praise
  chosen_spanish: un sacrificio de alabanza
  alternatives_spanish:
  - un sacrificio de acción de gracias
  - una ofrenda de alabanza
  lexicon: LSJ
  rationale: La fórmula es ya reconocible y conserva el paralelismo cultual del griego.
- source_word: εὐχάς
  english_pob_choice: vows
  chosen_spanish: votos
  alternatives_spanish:
  - promesas
  - votos hechos
  lexicon: LSJ
  rationale: “Votos” mantiene la terminología cultual y la correspondencia con el lenguaje de salmos.
- source_word: θλίψεώς
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - angustia
  lexicon: LSJ
  rationale: “Aflicción” conserva el registro bíblico sobrio del clamor al Señor/Dios.
- source_word: ἐξελοῦμαί
  english_pob_choice: I will deliver you
  chosen_spanish: te libraré
  alternatives_spanish:
  - te rescataré
  - te salvaré
  lexicon: LSJ
  rationale: “Librar” reproduce bien la cadencia bíblica del verbo y su sentido de liberación efectiva.
- source_word: πνεῦμα συντετριμμένον
  english_pob_choice: a broken spirit
  chosen_spanish: un espíritu quebrantado
  alternatives_spanish:
  - un espíritu roto
  - un espíritu contrito
  lexicon: LSJ
  rationale: “Quebrantado” preserva el valor concreto de συντετριμμένον sin imponer “contrito” como interpretación más estrecha.
theological_decisions:
- issue: Distinción entre δεσπότης y κύριος
  english_pob_reading: Master of all ... Lord in the quotation
  chosen_spanish_reading: Dueño de todo ... Señor en la cita
  alternative_spanish_readings:
  - Señor de todo ... Señor en la cita
  - Soberano de todo ... Señor en la cita
  rationale: 'Se conserva la diferencia lexical del original: δεσπότης se vierte de modo distinto a κύριος para no borrar la distinción auditables en el griego.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; consistency of key terms, or documented exception.'
- issue: Sentido de ἐξομολογεῖσθαι en el contexto de los salmos citados
  english_pob_reading: confession/acknowledgment made to God, encompassing thankful praise
  chosen_spanish_reading: que se le haga confesión, abarcando confesión, reconocimiento y alabanza
  alternative_spanish_readings:
  - que se le dé gracias
  - que se le alabe abiertamente
  rationale: El contexto de los salmos hace que el verbo oscile entre confesar, reconocer y alabar; la redacción española conserva esa tensión en vez de fijar solo uno de los sentidos.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó “bringing forth horns and hoofs” para reflejar mejor ἐκφέροντα. En español se optó por “que saca cuernos y pezuñas”, manteniendo la imagen dinámica y la precisión lexical sin volverla artificial.
  spanish_consistency_notes:
  - Se reservó “Señor” para κύριος en la cita bíblica, y se evitó para δεσπότης a fin de preservar la distinción del griego.
  - Se usó “espíritu quebrantado” para πνεῦμα συντετριμμένον, en continuidad con el registro bíblico y sin forzar “contrito”.
  - “Votos” se mantuvo para εὐχάς por la carga cultual del contexto salmódico.
