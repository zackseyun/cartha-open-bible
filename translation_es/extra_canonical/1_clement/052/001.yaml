base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/052/001.yaml
  text: The Master of all is without need, brothers; he has need of nothing except that confession be made to him. For the chosen David says, “I will confess to the Lord, and it will please him more than a young bull bringing forth horns and hoofs. Let the poor see and be glad.” And again he says, “Offer to God a sacrifice of praise, and pay your vows to the Most High; and call upon me in the day of your affliction, and I will deliver you, and you will glorify me.” For a sacrifice to God is a broken spirit.
