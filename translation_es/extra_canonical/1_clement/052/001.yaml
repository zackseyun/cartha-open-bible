revisions:
- from: 'El Dueño de todo no tiene necesidad, hermanos; no necesita de nada, sino que se le haga confesión[a]. Pues el David escogido dice: “Confesaré al Señor, y le agradará más que un becerro joven que saca[b] cuernos y pezuñas. Vean los pobres y alégrense”. Y de nuevo dice: “Ofrece a Dios un sacrificio de alabanza y paga tus votos al Altísimo; e invócame en el día de tu aflicción, y te libraré, y me glorificarás”. Porque el sacrificio para Dios es un espíritu quebrantado.'
  to: 'El Dueño de todo no tiene necesidad, hermanos; no necesita de nada, sino solo que se le confiese[a]. Pues el David escogido dice: “Confesaré al Señor, y le agradará más que un becerro joven que produce[b] cuernos y pezuñas. Vean los pobres y alégrense”. Y de nuevo dice: “Ofrece a Dios un sacrificio de alabanza y paga tus votos al Altísimo; e invócame en el día de tu aflicción, y te libraré, y me glorificarás”. Porque el sacrificio para Dios es un espíritu quebrantado.'
