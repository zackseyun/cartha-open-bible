review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español sigue fielmente el griego y la traducción POB en todos los segmentos principales: Θῦσον → «Ofrece», θυσίαν αἰνέσεως → «un sacrificio de alabanza», ἀπόδος... τὰς εὐχάς σου → «cumple tus votos», ἐπικαλέσαι με → «clámame», ἐν ἡμέρᾳ θλίψεώς σου → «en el día de tu aflicción», ἐξελοῦμαί σε → «te libraré», δοξάσεις με → «me glorificarás». No se detecta pérdida de sentido ni expansión indebida.'
  spanish_quality_summary: El español es natural, digno y claramente legible en registro bíblico moderno. La sintaxis coordinada reproduce bien el ritmo exhortativo/citacional del original. «Clámame» puede alternar con «invócame», pero no resulta incorrecto ni oscuro en este contexto. La puntuación y capitalización son adecuadas.
  glossary_alignment: No aparecen términos del glosario project-level que requieran ajuste especial. «el Altísimo» corresponde bien a τῷ ὑψίστῳ. No hay conflicto terminológico con Yahvé, Mesías/Cristo, esclavo, etc.
  issues:
  - severity: low
    issue: «Clámame» es una opción algo más marcada que «invócame»
    rationale: ἐπικαλέσαι με significa literalmente invocar/llamar sobre. «Clámame» enfatiza la súplica urgente y sigue siendo fiel, pero «invócame» sería una alternativa igualmente válida si se buscara mayor cercanía léxica.
