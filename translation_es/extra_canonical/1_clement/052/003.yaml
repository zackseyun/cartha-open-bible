base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/052/003.yaml
  text: And again he says, “Offer to God a sacrifice of praise, and pay your vows to the Most High; and call upon me in the day of your affliction, and I will deliver you, and you will glorify me.”
  revision_pass:
