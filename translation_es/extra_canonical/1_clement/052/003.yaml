source:
  edition: Funk 1901 (normalized OCR)
  text: καὶ πάλιν λέγει· Θῦσον τῷ θεῷ θυσίαν αἰνέσεως καὶ ἀπόδος τῷ ὑψίστῳ τὰς εὐχάς σου· καὶ ἐπικαλέσαι με ἐν ἡμέρᾳ θλίψεώς σου, καὶ ἐξελοῦμαί σε, καὶ δοξάσεις με.
