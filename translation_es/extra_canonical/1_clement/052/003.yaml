translation:
  language: es
  text: 'Y otra vez dice: «Ofrece a Dios un sacrificio de alabanza, y cumple tus votos al Altísimo; y clámame en el día de tu aflicción, y te libraré, y me glorificarás».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Θῦσον
  english_pob_choice: Offer
  chosen_spanish: Ofrece
  alternatives_spanish:
  - Presenta
  - Ofrece en sacrificio
  lexicon: θύω
  rationale: El imperativo griego aquí pide una ofrenda sacrificial; en español, «ofrece» mantiene la forma verbal natural y conserva la fuerza cultual sin volver la frase pesada. «Ofrece en sacrificio» es posible, pero el contexto ya explicita «un sacrificio de alabanza».
- source_word: θυσίαν αἰνέσεως
  english_pob_choice: a sacrifice of praise
  chosen_spanish: un sacrificio de alabanza
  alternatives_spanish:
  - un sacrificio de elogio
  - un sacrificio de acción de gracias
  lexicon: θυσία / αἴνεσις
  rationale: «Alabanza» reproduce de manera directa αἴνεσις y conserva la referencia litúrgica del texto. «Acción de gracias» sería una posible matización, pero no es la opción principal del griego aquí.
- source_word: τῷ ὑψίστῳ
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Muy Alto
  - el Supremo
  lexicon: ὕψιστος
  rationale: «El Altísimo» es la manera más natural y fiel en español para el título divino ὁ ὕψιστος, manteniendo su valor reverencial y bíblico.
- source_word: ἐπικαλέσαι με
  english_pob_choice: call upon me
  chosen_spanish: clámame
  alternatives_spanish:
  - invócame
  - llámame
  lexicon: ἐπικαλέομαι
  rationale: «Clámame» conserva el carácter de súplica dirigida a Dios. «Invócame» es también posible, pero «clamar» resulta más transparente y idiomático en español bíblico para esta apelación urgente.
- source_word: ἐν ἡμέρᾳ θλίψεώς σου
  english_pob_choice: in the day of your affliction
  chosen_spanish: en el día de tu aflicción
  alternatives_spanish:
  - en el día de tu tribulación
  - en el día de tu angustia
  lexicon: θλῖψις
  rationale: «Aflicción» refleja bien θλῖψις y mantiene el tono sobrio del pasaje. «Angustia» o «tribulación» también serían posibles, pero «aflicción» conserva mejor la amplitud semántica.
- source_word: ἐξελοῦμαί σε
  english_pob_choice: I will deliver you
  chosen_spanish: te libraré
  alternatives_spanish:
  - te rescataré
  - te salvaré
  lexicon: ἐξαιρέω
  rationale: «Libraré» sigue de cerca la promesa de rescate o liberación implícita en ἐξαιρέω y funciona con naturalidad en español bíblico. «Rescataré» sería viable, pero su matiz puede sonar más específico que el griego aquí.
- source_word: δοξάσεις με
  english_pob_choice: you will glorify me
  chosen_spanish: me glorificarás
  alternatives_spanish:
  - me darás gloria
  - me honrarás
  lexicon: δοξάζω
  rationale: «Glorificarás» conserva el paralelismo verbal con el texto fuente y coincide con el registro bíblico habitual de δοξάζω. «Me darás gloria» sería más explicativo, pero menos directo.
theological_decisions:
- issue: Tratamiento del título divino ὁ ὕψιστος
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Supremo
  - el Muy Alto
  rationale: Se mantiene el título teíco tradicional sin sustituirlo por una paráfrasis. «El Altísimo» preserva la reverencia y el vínculo intertextual bíblico.
  doctrine_reference: Lenguaje bíblico sobre el Dios Altísimo (p. ej., Sal 7:17; 47:2)
- issue: Forma de la promesa divina de liberación
  english_pob_reading: I will deliver you
  chosen_spanish_reading: te libraré
  alternative_spanish_readings:
  - te rescataré
  - te salvaré
  rationale: «Te libraré» preserva la promesa de intervención divina concreta sin cargarla innecesariamente con una lectura soteriológica técnica. Mantiene abierta la ambigüedad salutífera/liberadora del verbo griego.
  doctrine_reference: Liberación divina en contextos de aflicción; cf. Sal 50:15
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se necesitaban cambios y el cotejo posterior mostró alta concordancia (veredicto: agree). La presente versión sigue de cerca la lectura inglesa POB sin depender mecánicamente de ella, y se ajusta al griego normalizado del pasaje citado.'
  spanish_consistency_notes:
  - Se conserva «Dios» para θεῷ y «el Altísimo» para ὑψίστῳ, sin introducir «SEÑOR» o mayúsculas de sustitución.
  - 'Se mantiene el paralelismo verbal del original: ofrenda / votos / clamor / liberación / glorificación.'
  - El registro es bíblico pero no arcaizante en exceso, buscando legibilidad pública en español latinoamericano.
