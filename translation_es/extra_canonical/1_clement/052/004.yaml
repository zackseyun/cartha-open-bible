  text: Porque un sacrificio a Dios es un espíritu quebrantado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θυσία
  english_pob_choice: a sacrifice
  chosen_spanish: un sacrificio
  alternatives_spanish:
  - una ofrenda
  - un holocausto
  lexicon: θυσία
  rationale: El griego habla de sacrificio en sentido general; «sacrificio» conserva la equivalencia directa y el valor cultual sin añadir especificación ritual no presente en el texto.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  - ante Dios
  lexicon: θεός
  rationale: «Para Dios» expresa bien la relación de destinación/aceptación implícita en el predicado nominal español y suena natural sin perder el dativo de referencia del griego.
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - ánimo
  - corazón
  lexicon: πνεῦμα
  rationale: Se mantiene «espíritu» porque el texto contrapone una realidad interior del ser humano; «ánimo» o «corazón» suavizarían la fuerza lexical del término griego.
- source_word: συντετριμμένον
  english_pob_choice: broken
  chosen_spanish: quebrantado
  alternatives_spanish:
  - roto
  - triturado
  - contrito
  lexicon: συντετριμμένος
  rationale: «Quebrantado» preserva la imagen de ruptura interior con dignidad literaria en español bíblico y evita tanto lo demasiado crudo («roto») como un desplazamiento interpretativo excesivo («contrito»).
theological_decisions:
- issue: Naturaleza de la ofrenda aceptable a Dios
  english_pob_reading: For a sacrifice to God is a broken spirit.
  chosen_spanish_reading: Porque un sacrificio para Dios es un espíritu quebrantado.
  alternative_spanish_readings:
  - Porque el sacrificio que agrada a Dios es un espíritu quebrantado.
  - Porque a Dios le es sacrificio un espíritu quebrantado.
  rationale: 'Se mantiene la afirmación general del original: el «sacrificio» en vista es un estado interior quebrantado, no una corrección interpretativa que añada «que agrada» o que convierta la frase en una fórmula más explicativa de lo que el griego dice.'
  doctrine_reference: Salmo 51:17; contrición y humildad como ofrenda aceptable a Dios
translation_notes:
  revision_awareness: La revisión más reciente indica concordancia alta y ningún cambio necesario; esta propuesta mantiene la lectura estable de la POB inglesa sin introducir expansión exegética.
  spanish_consistency_notes:
  - Se conserva «Dios» para θεός conforme al estándar del proyecto.
  - No se introduce «Mesías» ni otra terminología cristológica porque el versículo no lo requiere.
  - El orden español se ajusta levemente para fluidez natural, pero sin alterar la relación semántica del original griego.
