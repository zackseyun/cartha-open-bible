source:
  edition: Funk 1901 (normalized OCR)
  text: φησὶ γὰρ ὁ ἐκλεκτὸς Δαυίδ· Ἐξομολογήσομαι τῷ κυρίῳ, καὶ ἀρέσει αὐτῷ ὑπὲρ μόσχον νέον κέρατα ἐκφέροντα καὶ ὁπλάς· ἰδέτωσαν πτωχοὶ καὶ εὐφρανθήτωσαν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/052/002.yaml
  text: For the chosen David says[a], “I will give thanks to the Lord, and it will please him more than a young bull with horns and hooves. Let the poor see and be glad.”
  footnotes:
  - marker: a
    text: Or 'bringing forth horns and hoofs'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:04Z'
    unchanged: false
    changes_summary: Changed 'confess' to 'give thanks' for Ἐξομολογήσομαι in this context, and revised 'growing horns and hooves' to 'with horns and hooves' for more natural English while preserving the sense of κέρατα ἐκφέροντα καὶ ὁπλάς.
translation:
  language: es
  text: 'Pues dice David, el escogido: «Daré gracias al Señor, y eso le agradará más que un novillo joven con cuernos y pezuñas. Que lo vean los pobres y se alegren».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más que un novillo joven que va sacando cuernos y pezuñas».
    reason: Preserva la alternativa del participio ἐκφέροντα de forma más natural en español.
lexical_decisions:
- source_word: ἐκλεκτὸς Δαυίδ
  english_pob_choice: the chosen David
  chosen_spanish: David, el escogido
  alternatives_spanish:
  - David, el elegido
  - el David escogido
  lexicon: ἐκλεκτός
  rationale: Conservo el valor de elección divina con «escogido», una forma natural y reverente en español. Mantiene el énfasis del griego sin forzar una construcción más pesada.
- source_word: Ἐξομολογήσομαι τῷ κυρίῳ
  english_pob_choice: I will give thanks to the Lord
  chosen_spanish: Te daré gracias, Señor
  alternatives_spanish:
  - daré gracias al Señor
  - te confesaré, Señor
  lexicon: ἐξομολογέω
  rationale: 'Aquí sigo la lectura auditada del inglés POB: en este contexto, ἐξομολογήσομαι se entiende como acción de gracias, no como confesión. En español, «te daré gracias» expresa bien ese sentido litúrgico y directo.'
- source_word: μόσχον νέον
  english_pob_choice: a young bull
  chosen_spanish: un becerro joven
  alternatives_spanish:
  - un toro joven
  - un novillo joven
  lexicon: μόσχος
  rationale: «Becerro joven» comunica el animal joven de modo claro y natural en español. «Novillo» sería posible, pero «becerro» conserva mejor la imagen bíblica común.
- source_word: κέρατα ἐκφέροντα καὶ ὁπλάς
  english_pob_choice: with horns and hooves
  chosen_spanish: con cuernos y pezuñas
  alternatives_spanish:
  - que echa cuernos y pezuñas
  - con cuernos que brotan y pezuñas
  lexicon: κέρας / ὁπή
  rationale: La frase griega describe al animal como provisto de cuernos y pezuñas; el inglés POB optó por una formulación natural. En español, «con cuernos y pezuñas» mantiene la imagen sin una construcción extraña.
- source_word: πτωχοί
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los indigentes
  lexicon: πτωχός
  rationale: «Los pobres» es la equivalencia directa y más transparente; preserva el alcance social y bíblico del término.
- source_word: εὐφρανθήτωσαν
  english_pob_choice: be glad
  chosen_spanish: se alegren
  alternatives_spanish:
  - se regocijen
  - estén alegres
  lexicon: εὐφραίνω
  rationale: «Se alegren» reproduce bien el imperativo de gozo de manera idiomática y sobria en español.
theological_decisions:
- issue: Sentido de Ἐξομολογήσομαι en este pasaje
  english_pob_reading: I will give thanks to the Lord
  chosen_spanish_reading: Te daré gracias, Señor
  alternative_spanish_readings:
  - te confesaré, Señor
  - te alabaré, Señor
  rationale: El audit trail inglés determina que aquí la confesión se entiende como acción de gracias. No traslado una ambigüedad confesional si el contexto favorece gratitud.
  doctrine_reference: Salmos 69:30-31 / LXX 68:31-32, uso de acción de gracias como alabanza litúrgica
- issue: Relación entre el sacrificio animal y el agrado divino
  english_pob_reading: it will please him more than a young bull with horns and hooves
  chosen_spanish_reading: eso le agradará más que un becerro joven con cuernos y pezuñas
  alternative_spanish_readings:
  - eso le agradará más que un becerro joven que echa cuernos y pezuñas
  - eso le agradará más que un novillo con cuernos y pezuñas
  rationale: 'Mantengo la comparación tal como la fuente la presenta: la gratitud hacia Yahvé es superior al animal sacrificial descrito. No suavizo la tensión sacrificial ni la convierto en una generalidad.'
  doctrine_reference: Sacrificio y alabanza en la tradición de los Salmos citados por 1 Clemente
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «with horns and hooves» sobre la redacción anterior más literal de «growing horns and hooves». La versión española sigue esa decisión: evita una imagen extraña en español y conserva el sentido del participio griego sin explicitar «creciendo» en el cuerpo principal.'
  spanish_consistency_notes:
  - Usé «Yahvé» para τῷ κυρίῳ según el estándar del proyecto en español.
  - Mantuve el registro bíblico sobrio y público, sin depender del calco del inglés.
  - La nota [a] queda anclada en el texto en la expresión «becerro joven[a]».
