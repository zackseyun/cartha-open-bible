translation:
  language: es
  text: 'Porque está escrito[a]: «Bienaventurados aquellos cuyas iniquidades han sido perdonadas y cuyos pecados han sido cubiertos; bienaventurado el hombre a quien el Señor de ningún modo le tomará en cuenta el pecado, y en cuya boca no hay engaño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuyas iniquidades fueron perdonadas y cuyos pecados fueron cubiertos».'
    reason: Mantener la alternativa documentada por el POB para el valor verbal pasado frente al estado resultante vigente.
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: For it is written
  chosen_spanish: Porque está escrito
  alternatives_spanish:
  - Pues está escrito
  - Está escrito
  lexicon: γέγραπται
  rationale: Se conserva la fórmula escritural introductoria sin añadir matices ajenos; en español, «porque está escrito» reproduce bien la función justificativa del griego y del inglés POB. No se fuerza un tiempo pasado específico, porque la cita vale como autoridad vigente.
- source_word: ἀνομίαι
  english_pob_choice: lawless deeds
  chosen_spanish: iniquidades
  alternatives_spanish:
  - actos de iniquidad
  - hechos de rebeldía contra la ley
  lexicon: ἀνομία
  rationale: «Iniquidades» transmite el peso moral y legal de ἀνομίαι mejor que un calco demasiado literal. Evita reducirlo a mera «desobediencia» y mantiene la fuerza de la falta contra la ley divina.
- source_word: ἀφέθησαν
  english_pob_choice: are forgiven
  chosen_spanish: han sido perdonadas
  alternatives_spanish:
  - son perdonadas
  - fueron perdonadas
  lexicon: ἀφίημι
  rationale: El griego aoristo pasivo en esta bienaventuranza tiene fuerza gnómica; en español, el perfecto compuesto comunica mejor un estado resultante vigente. «Han sido perdonadas» preserva la lectura revisada del POB sin sonar excesivamente temporal.
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  lexicon: ἁμαρτία
  rationale: «Pecados» es la equivalencia natural y transparente en español eclesial para ἁμαρτίαι. Mantiene la correspondencia semántica sin suavizar el término.
- source_word: ἐπεκαλύφθησαν
  english_pob_choice: are covered
  chosen_spanish: han sido cubiertos
  alternatives_spanish:
  - son cubiertos
  - fueron cubiertos
  lexicon: ἐπικαλύπτω
  rationale: Como con el verbo anterior, el perfecto compuesto en español expresa el estado resultante de la acción y evita fijarla como evento pasado aislado. Conserva la simetría de la cita.
- source_word: ἀνήρ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el varón
  lexicon: ἀνήρ
  rationale: «El hombre» reproduce de forma natural y fiel el sustantivo del texto citado, manteniendo el paralelismo poético con el hebreo/greco-lxx subyacente. «Varón» sería más marcado y menos idiomático aquí.
- source_word: λογίσηται
  english_pob_choice: will certainly not reckon
  chosen_spanish: ciertamente no contará
  alternatives_spanish:
  - de ninguna manera contará
  - no imputará
  lexicon: λογίζομαι
  rationale: «Contará» reproduce el verbo de cómputo/imputación sin introducir terminología técnica no necesaria. «Ciertamente no» refleja la negación enfática οὐ μή del griego y la seguridad del enunciado.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - iniquidad
  lexicon: ἁμαρτία
  rationale: Se mantiene la misma raíz semántica de ἁμαρτία con «pecado» para evitar una variación innecesaria que debilite la cita.
- source_word: δόλος
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - dolo
  - fraude
  lexicon: δόλος
  rationale: «Engaño» es natural en español y conserva el sentido moral de dolo/falsedad sin sonar jurídico o demasiado técnico. Es la opción más clara para lectura pública.
theological_decisions:
- issue: Forma verbal de las bienaventuranzas y estado resultante del perdón
  english_pob_reading: whose lawless deeds are forgiven, and whose sins are covered
  chosen_spanish_reading: cuyas iniquidades han sido perdonadas y cuyos pecados han sido cubiertos
  alternative_spanish_readings:
  - cuyas iniquidades son perdonadas y cuyos pecados son cubiertos
  - cuyas iniquidades fueron perdonadas y cuyos pecados fueron cubiertos
  rationale: La revisión inglesa corrigió el pasado simple para captar el valor gnómico del aoristo. En español, el perfecto compuesto comunica mejor que el sujeto se encuentra en un estado actual de perdón/cobertura, sin convertirlo en un acto puntual pasado ni en una pasiva demasiado mecánica.
  doctrine_reference: Salmo 32:1-2 / Romanos 4:7-8, donde la bienaventuranza se vincula con el perdón y la no imputación de pecado.
- issue: No imputación del pecado
  english_pob_reading: the Lord will certainly not reckon
  chosen_spanish_reading: el Señor ciertamente no contará
  alternative_spanish_readings:
  - el Señor no imputará
  - el Señor de ningún modo contará
  rationale: «Contar» conserva la imagen contable del verbo griego y permite que la noción de imputación quede implícita sin imponer terminología doctrinal más técnica de la necesaria. La negación enfática mantiene la seguridad absoluta del texto.
  doctrine_reference: Romanos 4:8, donde el lenguaje de no contar el pecado se relaciona con la justificación y el perdón.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que rechazó el pasado simple para ἀφέθησαν y ἐπεκαλύφθησαν por su fuerza gnómica en la cita. La redacción española sigue esa decisión con perfecto compuesto («han sido perdonadas», «han sido cubiertos») para reflejar un estado vigente, no un evento aislado. También se preservó la estructura poética del paralelismo y la negación enfática de οὐ μή.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma proyectada de tetragrama solo cuando aparezca explícitamente el nombre divino; aquí el texto griego dice κύριος en la cita, por lo que se traduce «el Señor» siguiendo el propio POB inglés y la cita al salmo.
  - Se mantuvo «pecado/pecados» y «iniquidades» para distinguir ἁμαρτία de ἀνομία sin nivelar ambos términos.
  - Se evitó «imputará» porque el verbo griego es λογίζομαι con sentido de contar/considerar; «contará» deja abierta la dimensión contable-jurídica sin sobretraducción.
