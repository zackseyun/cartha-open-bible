base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/050/006.yaml
  text: For it is written[a], “Blessed are those whose lawless deeds are forgiven, and whose sins are covered; blessed is the man whose sin the Lord will certainly not reckon, and in whose mouth there is no deceit.”
  footnotes:
