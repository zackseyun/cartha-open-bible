id: 1CLEM.50.2
reference: 1 Clement 50:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: τίς ἱκανὸς ἐν αὐτῇ εὑρεθῆναι, εἰ μὴ οὓς ἂν καταξιώσῃ ὁ θεός; δεηθῶμεν οὖν καὶ αἰτώμεθα ἀπὸ τοῦ ἐλέους αὐτοῦ, ἵνα ἐν ἀγάπῃ εὑρεθῶμεν δίχα προσκλίσεως ἀνθρωπίνης, ἄμωμοι.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/050/002.yaml
  text: Who is sufficient to be found in it, except those whom God may count worthy? Therefore let us pray and ask from his mercy that we may be found in love, without human partiality, blameless.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:00Z'
    unchanged: false
    changes_summary: Changed 'beg' to 'pray' for a more natural and formally appropriate rendering of δεηθῶμεν, while preserving the sense. No other changes needed.
translation:
  language: es
  text: ¿Quién es suficiente para ser hallado en ella, sino aquellos a quienes Dios considere dignos? Por tanto, oremos y pidamos de su misericordia que seamos hallados en amor, sin parcialidad humana, irreprochables.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τίς ἱκανός
  english_pob_choice: Who is sufficient
  chosen_spanish: ¿Quién es suficiente
  alternatives_spanish:
  - ¿Quién es capaz
  - ¿Quién basta
  lexicon: ἱκανός
  rationale: Mantiene la idea de suficiencia/capacidad sin volverlo más interpretativo que el griego; en español “suficiente” conserva bien la fuerza retórica de la pregunta.
- source_word: εὑρεθῆναι
  english_pob_choice: to be found
  chosen_spanish: ser hallado
  alternatives_spanish:
  - ser encontrado
  - aparecer
  lexicon: εὑρίσκω
  rationale: “Ser hallado” reproduce el registro bíblico y refleja el pasivo de la forma griega con naturalidad en español.
- source_word: καταξιώσῃ
  english_pob_choice: count worthy
  chosen_spanish: quiera tener por dignos
  alternatives_spanish:
  - considere dignos
  - haga dignos
  lexicon: καταξιόω
  rationale: El griego expresa que Dios otorga dignidad/estima; “quiera tener por dignos” evita una traducción demasiado técnica o rígida y conserva la dependencia del juicio divino.
- source_word: δεηθῶμεν
  english_pob_choice: let us pray
  chosen_spanish: oremos
  alternatives_spanish:
  - suplicamos
  - imploremos
  lexicon: δέομαι
  rationale: La revisión inglesa aclaró que el verbo pide un sentido formal de oración, no solo de ruego intenso; “oremos” es el equivalente más natural y reverente.
- source_word: αἰτώμεθα
  english_pob_choice: ask
  chosen_spanish: pidamos
  alternatives_spanish:
  - solicitemos
  - roguemos
  lexicon: αἰτέω
  rationale: “Pedir” conserva el paralelismo con “orar” y refleja bien la petición dirigida a Dios desde su misericordia.
- source_word: ἀπὸ τοῦ ἐλέους αὐτοῦ
  english_pob_choice: from his mercy
  chosen_spanish: de su misericordia
  alternatives_spanish:
  - desde su misericordia
  - a partir de su misericordia
  lexicon: ἔλεος
  rationale: La construcción española más natural es “de su misericordia”; mantiene la idea de origen/fuente de la súplica sin forzar el idioma.
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - en el amor
  - en caridad
  lexicon: ἀγάπη
  rationale: Se conserva “amor” en línea con el texto fuente y con el sentido amplio de ἀγάπη, sin introducir la carga eclesial específica de “caridad”.
- source_word: δίχα προσκλίσεως ἀνθρωπίνης
  english_pob_choice: without human partiality
  chosen_spanish: sin parcialidad humana
  alternatives_spanish:
  - sin favoritismo humano
  - sin inclinación humana
  lexicon: προσκλίσις
  rationale: “Parcialidad” expresa el sesgo o favoritismo que el griego sugiere; “humana” mantiene el contraste con la imparcialidad divina.
- source_word: ἄμωμοι
  english_pob_choice: blameless
  chosen_spanish: irreprochables
  alternatives_spanish:
  - sin mancha
  - irreprensibles
  lexicon: ἄμωμος
  rationale: “Irreprochables” comunica bien la condición moral sin sobrecargar con un matiz sacrificial; es claro y fiel para español contemporáneo.
theological_decisions:
- issue: Acceso a la asamblea/ámbito referido por “it”
  english_pob_reading: Who is sufficient to be found in it
  chosen_spanish_reading: ¿Quién es suficiente para ser hallado en ella
  alternative_spanish_readings:
  - ¿Quién es suficiente para ser hallado en eso
  - ¿Quién es suficiente para encontrarse en ella
  rationale: El antecedente implícito de “it” se conserva sin explicitarlo, porque el griego y el inglés auditado lo dejan abierto; “ella” mantiene la referencia contextual sin añadir contenido no presente.
  doctrine_reference: Contextual reference maintained; no doctrinal expansion beyond source
- issue: Relación entre mérito divino y dignidad concedida
  english_pob_reading: except those whom God may count worthy
  chosen_spanish_reading: sino aquellos a quienes Dios quiera tener por dignos
  alternative_spanish_readings:
  - sino aquellos a quienes Dios considere dignos
  - sino aquellos a quienes Dios haga dignos
  rationale: La formulación conserva que la suficiencia depende de la acción/jucio de Dios, no de mérito humano. “Quiera tener por dignos” refleja la voluntariedad divina de manera respetuosa y idiomática.
  doctrine_reference: Divine initiative in worthiness
- issue: Misericordia como fuente de la oración
  english_pob_reading: ask from his mercy
  chosen_spanish_reading: pidamos de su misericordia
  alternative_spanish_readings:
  - pidamos a su misericordia
  - pidamos por su misericordia
  rationale: Se preserva el valor de fuente/origen del genitivo con una construcción natural en español, sin perder la dependencia de la misericordia divina.
  doctrine_reference: Grace/mercy as source of petition
- issue: “In love” and communal purity
  english_pob_reading: that we may be found in love, without human partiality, blameless
  chosen_spanish_reading: que seamos hallados en amor, sin parcialidad humana, irreprochables
  alternative_spanish_readings:
  - que seamos hallados en el amor
  - que seamos hallados amando
  rationale: 'Se evita convertir la frase en una paráfrasis moralizante. “En amor” conserva la ambigüedad útil del griego: estado relacional o esfera de conducta, sin perder la conexión con la pureza moral final.'
  doctrine_reference: Ethical holiness and communal impartiality
translation_notes:
  revision_awareness: The English audit trail revised 'beg' to 'pray' for δεηθῶμεν, so the Spanish follows the more formal and natural ‘oremos’ rather than an intensified plea. No English footnotes were present, and the cross-check indicated only minor issues with high agreement.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' y no se introdujo 'Señor', en conformidad con el paquete fuente.
  - Se usó 'irreprochables' para ἄμωμοι, reservando 'sin mancha' como alternativa más sacrificial o cultual.
  - '''En amor'' se dejó sin artículo para conservar la concisión del griego; en español es comprensible y fiel.'
  - No se añadió ninguna nota a pie de texto porque no había variantes textuales ni alternativas obligatorias en el audit trail.
