review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro auditado en inglés: conserva la pregunta retórica, el pasivo de ''ser hallado'', la dependencia de la dignificación divina, el doble llamado a orar/pedir, y la meta de ser hallados en amor, sin parcialidad humana, irreprochables. Sin embargo, ''quiera tener por dignos'' introduce un matiz volitivo algo más fuerte que el simple potencial/judicial de καταξιώσῃ, y conviene ajustarlo a ''considere'' o equivalente.'
  spanish_quality_summary: 'El español es claro y eclesialmente legible, pero hay dos puntos mejorables: ''sino aquellos'' debe concordar con el interrogativo singular con ''sino aquellos/los'' según estilo, y sobre todo ''quiera tener por dignos'' suena más pesado y menos natural que ''considere dignos''. El resto fluye bien; ''ser hallado'' y ''en amor'' son aceptables en registro bíblico contemporáneo.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Dios', 'amor' y 'misericordia' están bien. La decisión 'irreprochables' es admisible para ἄμωμοι. No se requieren notas léxicas adicionales en español.
  issues:
  - severity: medium
    issue: Matiz de καταξιώσῃ en 'quiera tener por dignos'
    rationale: El griego y el inglés auditado apuntan a 'count/consider worthy', no tanto a una voluntad explícita ('quiera'). En español, 'considere dignos' preserva mejor el juicio divino sin añadir un matiz volitivo innecesario.
  - severity: low
    issue: Pesadez idiomática en 'sino aquellos a quienes Dios quiera tener por dignos'
    rationale: La construcción es entendible, pero más rígida de lo necesario. 'Sino aquellos a quienes Dios considere dignos' es más natural y fiel al valor del verbo.
  revised_spanish_text: ¿Quién es suficiente para ser hallado en ella, sino aquellos a quienes Dios considere dignos? Por tanto, oremos y pidamos de su misericordia que seamos hallados en amor, sin parcialidad humana, irreprochables.
  revision_rationale: Se ajusta καταξιώσῃ a 'considere dignos' para reflejar mejor el sentido de 'count worthy' del griego y del POB inglés, evitando el matiz volitivo añadido por 'quiera tener por dignos'. No hacen falta otras modificaciones ni notas.
