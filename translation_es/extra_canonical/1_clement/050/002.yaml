revisions:
- from: ¿Quién es suficiente para ser hallado en ella, sino aquellos a quienes Dios quiera tener por dignos? Por tanto, oremos y pidamos de su misericordia que seamos hallados en amor, sin parcialidad humana, irreprochables.
  to: ¿Quién es suficiente para ser hallado en ella, sino aquellos a quienes Dios considere dignos? Por tanto, oremos y pidamos de su misericordia que seamos hallados en amor, sin parcialidad humana, irreprochables.
  rationale: Se ajusta καταξιώσῃ a 'considere dignos' para reflejar mejor el sentido de 'count worthy' del griego y del POB inglés, evitando el matiz volitivo añadido por 'quiera tener por dignos'. No hacen falta otras modificaciones ni notas.
  reviewer_model: gpt-5.4
