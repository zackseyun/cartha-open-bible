  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: μακαρισμός como estado de bienaventuranza, ἐγένετο ἐπὶ como algo que vino sobre un grupo, los escogidos por Dios, la mediación por medio de Jesús, y la doxología final. Sin embargo, no preserva bien la decisión terminológica documentada para Χριστός, ya que el inglés auditado restauró explícitamente ''Messiah'' y la política española por defecto pide ''Mesías'' salvo excepción fuerte. Aquí ''Jesucristo'' borra el valor titular más que una mera forma de nombre fijo.'
  spanish_quality_summary: 'El español es claro y digno, pero ''vino sobre'' suena algo literal y menos natural que ''vino sobre'' aceptable; el texto es legible. La principal mejora necesaria es terminológica: ''Jesús el Mesías, nuestro Señor'' o ''Jesús Mesías, nuestro Señor'' comunica mejor el griego y la política del proyecto. La puntuación actual con coma antes de ''nuestro Señor'' funciona bien. La nota al pie es válida y está bien anclada.'
  glossary_alignment: 'Desalineación principal con la guía del proyecto: Χριστός debería representarse normalmente como ''Mesías'', no ''Cristo/Jesucristo'', y el audit trail inglés corrigió precisamente ese punto. Los demás términos clave están razonablemente alineados: θεοῦ -> ''Dios'', κύριος -> ''Señor'', μακαρισμός -> ''bienaventuranza''.'
  issues:
  - severity: high
    issue: Χριστός se tradujo como 'Jesucristo' en vez de 'Mesías'.
    rationale: La evidencia griega tiene διὰ Ἰησοῦ Χριστοῦ y el audit trail inglés restauró 'Jesus Messiah' por política doctrinal/terminológica. En español, la guía del proyecto también prefiere 'Mesías' salvo carve-out claro; aquí no hay necesidad fuerte que obligue a 'Jesucristo'.
  - severity: medium
    issue: La decisión teológica/lexical justifica una excepción insuficientemente fuerte para usar 'Jesucristo'.
    rationale: Aunque 'Jesucristo' es idiomático, esta línea del proyecto prioriza preservar el título mesiánico cuando el griego usa Χριστός. Dado que 'Jesús el Mesías' es natural y claro en español eclesial, la excepción no está bien sustentada.
  revised_spanish_text: Esta bienaventuranza[a] vino sobre los escogidos por Dios por medio de Jesús el Mesías, nuestro Señor, a quien sea la gloria por los siglos de los siglos. Amén.
