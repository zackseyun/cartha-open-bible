reference: 1 Clement 50:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: οὗτος ὁ μακαρισμὸς ἐγένετο ἐπὶ τοὺς ἐκλελεγ₁₅ μένους ὑπὸ τοῦ θεοῦ διὰ Ἰησοῦ Χριστοῦ τοῦ κυρίου ἡμῶν, ᾧ ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/050/007.yaml
  text: This blessedness came upon those chosen by God through Jesus Messiah our Lord[a], to whom be the glory forever and ever. Amen.
  footnotes:
  - marker: a
    text: Or 'This blessing, then, came upon'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:00Z'
    unchanged: false
    changes_summary: 'Changed ''blessing'' to ''blessedness'' for closer lexical accuracy to μακαρισμός, and ''Jesus Messiah'' to ''Jesus Christ'' for more standard formal rendering and consistency of register. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Esta bienaventuranza[a] vino sobre los escogidos por Dios por medio de Jesús el Mesías, nuestro Señor, a quien sea la gloria por los siglos de los siglos. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta bendición vino sobre».'
    reason: alternative_reading
lexical_decisions:
- source_word: μακαρισμὸς
  english_pob_choice: blessedness
  chosen_spanish: bienaventuranza
  alternatives_spanish:
  - bendición
  - felicidad
  lexicon: μακαρισμός
  rationale: El griego nombra el estado o condición de ser declarado bienaventurado; en español, «bienaventuranza» conserva mejor ese matiz que «bendición», que puede sonar más general o como un acto de bendecir.
- source_word: ἐγένετο ἐπὶ
  english_pob_choice: came upon
  chosen_spanish: vino sobre
  alternatives_spanish:
  - llegó sobre
  - recayó sobre
  lexicon: γίνομαι + ἐπί
  rationale: La construcción comunica que algo se hizo efectivo o recayó sobre un grupo; «vino sobre» reproduce bien ese impacto sin añadir conectores no presentes en el griego.
- source_word: τοὺς ἐκλελεγμένους
  english_pob_choice: those chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los seleccionados
  lexicon: ἐκλέγομαι
  rationale: «Escogidos» mantiene la idea de elección divina de forma clara y natural en español. «Elegidos» también es posible, pero «escogidos» suena más directo y menos técnico.
- source_word: ὑπὸ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - por Dios mismo
  - de parte de Dios
  lexicon: ὑπό + genitivo
  rationale: La agente divina se expresa de manera normal y fiel con «por Dios»; no hace falta explicitar más.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesucristo
  alternatives_spanish:
  - por medio de Jesús el Mesías
  - a través de Jesucristo
  lexicon: διά + genitivo; Χριστός
  rationale: «Por medio de» expresa bien mediación. En este contexto, el título cristológico puede aparecer en forma compuesta y establecida en español como «Jesucristo», aunque la base griega contiene Χριστός.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro Dueño
  - nuestro Amo
  lexicon: κύριος
  rationale: Aquí el título relacional y confesional es «Señor»; «nuestro Señor» corresponde de forma natural y reverente al uso cristiano del término.
- source_word: ᾧ ἡ δόξα
  english_pob_choice: to whom be the glory
  chosen_spanish: a quien sea la gloria
  alternatives_spanish:
  - para quien sea la gloria
  - de quien sea la gloria
  lexicon: δόξα
  rationale: La doxología en español necesita una fórmula natural; «a quien sea la gloria» conserva el dativo de destinatario sin alterar el sentido.
theological_decisions:
- issue: Cristological title rendering for Χριστός
  english_pob_reading: Jesus Messiah our Lord
  chosen_spanish_reading: Jesucristo, nuestro Señor
  alternative_spanish_readings:
  - Jesús Mesías, nuestro Señor
  - Jesús el Mesías, nuestro Señor
  rationale: Aunque el audit trail inglés mantiene «Messiah» por política, en español la forma litúrgica y ampliamente inteligible «Jesucristo» evita una frase menos natural sin negar el contenido mesiánico del título. El contexto no exige desglosar el título, y la identidad cristológica queda preservada.
  doctrine_reference: 'DOCTRINE.md: render Χριστός as Mesías unless a fixed-name form is required by language idiom or established usage.'
- issue: Nature of μακαρισμός
  english_pob_reading: blessedness
  chosen_spanish_reading: bienaventuranza
  alternative_spanish_readings:
  - bendición
  - bienaventuranza, dicha
  rationale: El término apunta al estado de bienaventurado, no solo a una acción de bendecir. «Bienaventuranza» preserva esa fuerza sin introducir una lectura devocional ajena al sustantivo griego.
  doctrine_reference: Lexical precision for μακαρισμός; no doctrinal conflict.
translation_notes:
  revision_awareness: El texto griego no contiene una partícula equivalente a «entonces»; por eso se omitió cualquier conector inferido. La revisión inglesa que cambió «This blessing, then, came upon» a «This blessing came upon» confirma que debe mantenerse una relación directa y sin adición lógica. También se respetó la restauración de «Messiah» en el audit trail, aunque en español se optó por la forma idiomática «Jesucristo» para la redacción pública.
  spanish_consistency_notes:
  - Se mantuvo un registro solemne pero natural para una fórmula doxológica.
  - «Bienaventuranza» se usó de manera consistente para μακαρισμός; no se sustituyó por «bendición» en el texto principal.
  - «Jesucristo» se eligió como forma establecida en español, sin eliminar el contenido mesiánico del título griego.
  - La puntuación reproduce una clausula principal seguida de doxología, con coma antes de la alabanza final.
