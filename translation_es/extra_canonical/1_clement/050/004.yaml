  text: γέγραπται γάρ· Εἰσέλθετε εἰς τὰ ταμεῖα μικρὸν ὅσον ὅσον, ἕως οὗ παρέλθῃ ἡ ὀργὴ καὶ ὁ θυμός μου, καὶ μνησθήσομαι ἡμέρας ἀγαθῆς, καὶ ἀναστήσω ὑμᾶς ἐκ τῶν θηκῶν ὑμῶν.
