  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro inglés: conserva la fórmula introductoria, la imagen de entrar en las cámaras, la brevedad del tiempo, la duplicación de ira/enojo y el levantamiento desde los sepulcros. No añade «interiores», en línea con la revisión inglesa. La principal debilidad no es de fidelidad semántica sino de naturalidad idiomática en español en «por un muy breve tiempo».'
  spanish_quality_summary: El texto es claro y digno, pero «cámaras» suena algo menos natural en registro bíblico eclesial que «aposentos», y sobre todo «por un muy breve tiempo» resulta forzado en español. «Un día bueno» es comprensible pero algo rígido; sin embargo, puede mantenerse por cercanía al original. Conviene un ajuste menor para fluidez sin perder literalidad.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas principales son aceptables. «Los levantaré» respeta bien ἀναστήσω sin sobreinterpretar como «resucitaré».
  issues:
  - severity: medium
    issue: 'Frase temporal poco natural: «por un muy breve tiempo»'
    rationale: Aunque transmite μικρὸν ὅσον ὅσον, en español suena poco idiomático. «Por muy poco tiempo» o «por un tiempo muy breve» conserva el sentido y mejora la legibilidad.
  - severity: low
    issue: «Cámaras» es posible pero menos natural que «aposentos» en este contexto bíblico
    rationale: ταμεῖα significa cámaras/cuartos/chambers; «cámaras» no es incorrecto, pero en español general puede sonar técnico o ambiguo. «Aposentos» encaja mejor con el tono y el contexto sin añadir significado.
  revised_spanish_text: 'Porque está escrito: «Entren en sus aposentos por muy poco tiempo, hasta que pase mi ira y mi enojo; y me acordaré de un día bueno, y los levantaré de sus sepulcros».'
  revision_rationale: 'Se hacen solo ajustes menores de estilo para un español más natural y eclesialmente legible: «aposentos» por «cámaras» y «por muy poco tiempo» por la formulación forzada «por un muy breve tiempo». Se preservan la estructura, el tono profético y las decisiones semánticas principales del original y del POB inglés.'
