base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/050/004.yaml
  text: For it is written, “Enter into your chambers for a very little while, until my wrath and anger pass by; and I will remember a good day, and I will raise you from your tombs.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:00Z'
    unchanged: false
    changes_summary: Changed 'your inner chambers' to 'your chambers' to reflect the Greek more directly and avoid adding 'inner,' which is not explicit in the source.
translation:
  language: es
  text: 'Porque está escrito: «Entren en sus aposentos por muy poco tiempo, hasta que pase mi ira y mi enojo; y me acordaré de un día bueno, y los levantaré de sus sepulcros».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: For it is written
  chosen_spanish: Porque está escrito
  alternatives_spanish:
  - Pues está escrito
  - Porque se ha escrito
  lexicon: γράφω
  rationale: La fórmula es bíblica y solemnemente introductoria; «está escrito» conserva bien el pasivo perfecto y la autoridad del texto citado.
- source_word: ταμεῖα
  english_pob_choice: chambers
  chosen_spanish: cámaras
  alternatives_spanish:
  - aposentos
  - habitaciones
  lexicon: ταμεῖον
  rationale: «Cámaras» reproduce el sentido de recinto o cuarto reservado sin añadir «interiores», que no aparece en el griego ni en la revisión inglesa más reciente.
- source_word: μικρὸν ὅσον ὅσον
  english_pob_choice: for a very little while
  chosen_spanish: por un muy breve tiempo
  alternatives_spanish:
  - por un rato muy pequeño
  - por muy poco tiempo
  lexicon: μικρόν
  rationale: La expresión intensiva pide una duración mínima; «muy breve tiempo» es natural en español y mantiene la fuerza temporal.
- source_word: ὀργή καὶ θυμός
  english_pob_choice: wrath and anger
  chosen_spanish: ira y enojo
  alternatives_spanish:
  - ira e indignación
  - furor y enojo
  lexicon: ὀργή / θυμός
  rationale: Se conservan dos términos próximos para no borrar la duplicación retórica del griego; «ira y enojo» comunica bien la acumulación semántica.
- source_word: μνησθήσομαι ἡμέρας ἀγαθῆς
  english_pob_choice: I will remember a good day
  chosen_spanish: me acordaré de un día bueno
  alternatives_spanish:
  - recordaré un día bueno
  - me acordaré de un día favorable
  lexicon: μιμνῄσκομαι
  rationale: La construcción futura media admite «me acordaré»; se conserva «un día bueno» sin expandirlo a una idea más interpretativa de prosperidad.
- source_word: ἀναστήσω ὑμᾶς ἐκ τῶν θηκῶν ὑμῶν
  english_pob_choice: I will raise you from your tombs
  chosen_spanish: los levantaré de sus sepulcros
  alternatives_spanish:
  - los resucitaré de sus sepulcros
  - los sacaré de sus tumbas
  lexicon: ἀνίστημι / θήκη
  rationale: El griego dice literalmente «de sus sepulcros/tumbas»; «levantaré» mantiene el verbo de alzamiento, y «sepulcros» preserva el matiz funerario sin imponer una terminología más doctrinal.
theological_decisions:
- issue: La referencia a la ira divina y el acto de levantar a los muertos
  english_pob_reading: until my wrath and anger pass by; and I will remember a good day, and I will raise you from your tombs
  chosen_spanish_reading: hasta que pase mi ira y mi enojo; y me acordaré de un día bueno, y los levantaré de sus sepulcros
  alternative_spanish_readings:
  - hasta que pase mi juicio; y recordaré un día favorable, y los resucitaré
  - hasta que pase mi furor; y me acordaré de un día bueno, y los haré salir de sus tumbas
  rationale: Se mantiene el paralelismo entre dos términos de juicio y el futuro de restauración/resurrección sin suavizar el juicio ni convertir «levantar» en una glosa doctrinal más explícita que el texto griego.
  doctrine_reference: Juicio divino y restauración/resurrección en lenguaje profético
- issue: El sentido de θήκαι como lugar funerario
  english_pob_reading: your tombs
  chosen_spanish_reading: sus sepulcros
  alternative_spanish_readings:
  - sus tumbas
  - sus sepulcros
  rationale: «Sepulcros» es un término digno y suficientemente cercano al griego para una sepultura; evita la posible reducción coloquial de «tumbas» y conserva el tono escritural.
  doctrine_reference: Lenguaje funerario y esperanza de levantamiento/resurrección
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que eliminó 'inner' de 'inner chambers'; por eso la traducción usa solo «cámaras» y no añade un calificativo espacial no explicitado en el griego.
  spanish_consistency_notes:
  - Se mantuvo «ira y enojo» para reflejar la duplicación semántica del griego.
  - Se evitó «Cristo» o terminología eclesial no presente en el versículo.
  - Se prefirió una frase verbal directa («los levantaré») que refleja el futuro activo del original sin cargarla de interpretación adicional.
