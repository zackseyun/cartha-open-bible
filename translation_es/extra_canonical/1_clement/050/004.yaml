  to: 'Porque está escrito: «Entren en sus aposentos por muy poco tiempo, hasta que pase mi ira y mi enojo; y me acordaré de un día bueno, y los levantaré de sus sepulcros».'
  rationale: 'Se hacen solo ajustes menores de estilo para un español más natural y eclesialmente legible: «aposentos» por «cámaras» y «por muy poco tiempo» por la formulación forzada «por un muy breve tiempo». Se preservan la estructura, el tono profético y las decisiones semánticas principales del original y del POB inglés.'
