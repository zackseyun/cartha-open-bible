base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/050/005.yaml
  text: Blessed are we[a], beloved, if we do the commandments of God in the harmony of love, so that through love our sins may be forgiven us.
  footnotes:
  - marker: a
    text: Or 'in the harmony of love'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:00Z'
    unchanged: false
    changes_summary: Replaced 'concord' with the more natural 'harmony' for ὁμονοίᾳ while preserving the formal sense; otherwise retained the draft.
translation:
  language: es
  text: Somos bienaventurados, amados, si hacemos los mandamientos de Dios en armonía de amor, para que por amor nos sean perdonados nuestros pecados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Benditos
  - Felices
  lexicon: μακάριος
  rationale: ‘Bienaventurados’ conserva el tono declarativo y formal de bienaventuranza mejor que ‘felices’, y corresponde naturalmente al ‘Blessed’ del POB sin sonar mecánico.
- source_word: ἐσμὲν
  english_pob_choice: we are
  chosen_spanish: somos
  alternatives_spanish:
  - estamos
  lexicon: εἰμί
  rationale: 'Se mantiene la primera persona plural explícita del griego: ‘somos’. En español, la copulativa expresa mejor el estado enunciado por la bienaventuranza.'
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados hermanos
  - queridos
  lexicon: ἀγαπητός
  rationale: ‘Amados’ reproduce el vocativo afectivo y eclesial sin añadir ‘hermanos’, que no está en el texto.
- source_word: ὁμονοίᾳ
  english_pob_choice: in the harmony/concord of love
  chosen_spanish: en la armonía del amor
  alternatives_spanish:
  - en la concordia del amor
  - en la unidad del amor
  lexicon: ὁμόνοια
  rationale: La revisión inglesa osciló entre ‘harmony’ y ‘concord’; en español, ‘armonía’ es la opción más natural y sigue el sentido de acuerdo/unanimidad. Se evita ‘concordia’ por posible rigidez y ‘unidad’ por ser menos específico.
- source_word: τὸ ἀφεθῆναι ἡμῖν ... τὰς ἁμαρτίας
  english_pob_choice: so that ... our sins may be forgiven us
  chosen_spanish: para que ... nos sean perdonados nuestros pecados
  alternatives_spanish:
  - para que se nos perdonen nuestros pecados
  - a fin de que ...
  lexicon: ἀφίημι
  rationale: La pasiva impersonal ‘nos sean perdonados’ conserva el valor verbal de remisión/perdón sin forzar un giro demasiado literal. ‘Perdonados’ mantiene la claridad litúrgica y bíblica del español.
- source_word: τὰς ἁμαρτίας
  english_pob_choice: our sins
  chosen_spanish: nuestros pecados
  alternatives_spanish:
  - nuestras faltas
  - nuestros delitos
  lexicon: ἁμαρτία
  rationale: ‘Pecados’ es la equivalencia estándar y precisa para ἁμαρτία en este contexto moral y eclesial.
theological_decisions:
- issue: Relación entre obediencia y perdón
  english_pob_reading: so that through love our sins may be forgiven us
  chosen_spanish_reading: para que por amor nos sean perdonados nuestros pecados
  alternative_spanish_readings:
  - para que, por amor, nuestros pecados nos sean perdonados
  - de modo que por amor se nos perdonen nuestros pecados
  rationale: Se conserva la relación causal/final del griego, sin convertirla en mérito automático. El texto presenta el amor como el ámbito o medio de la obediencia y del perdón, no como sustituto de la gracia divina.
  doctrine_reference: Arrepentimiento, obediencia y perdón divino en lenguaje bíblico y patrístico, sin añadir una formulación sistemática ajena al verso.
- issue: ὁμόνοια como término comunitario
  english_pob_reading: harmony/concord of love
  chosen_spanish_reading: armonía del amor
  alternative_spanish_readings:
  - concordia del amor
  - unidad del amor
  rationale: Aunque el trasfondo de ὁμόνοια en 1 Clement es comunitario y puede implicar concordia cívica, en español ‘armonía’ transmite un acuerdo vivo y legible para el lector general sin perder el sentido de unanimidad relacional.
  doctrine_reference: Unidad eclesial y paz comunitaria en la literatura cristiana antigua.
translation_notes:
  revision_awareness: 'La decisión española sigue la forma final del audit trail inglés, que volvió de ‘concord’ a ‘harmony’ para ὁμόνοια, pero mantiene conciencia de la tensión lexical en 1 Clement: el término puede insinuar concordia comunitaria más específica que una mera ‘armonía’ estética. Por eso se eligió ‘armonía’ en el texto principal y se conservó la alternativa en nota.'
  spanish_consistency_notes:
  - Se mantuvo ‘Dios’ para θεοῦ conforme al estándar POB en español.
  - Se tradujo ἀφίημι con ‘perdonados’ para una lectura natural y doctrinalmente estable en español.
  - No se añadió ‘Cristo’ ni terminología ajena al verso.
  - Se evitó ‘siervo’ porque el texto no usa δοῦλος.
  - La puntuación sigue el orden lógico del griego y del texto inglés auditado.
