review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: todas las generaciones han pasado; los perfeccionados en amor por la gracia de Dios tienen un lugar entre los piadosos; y estos serán manifestados en la visitación del reino del Mesías. Sin embargo, hay un problema sintáctico de antecedente en español: «quienes serán manifestados» puede leerse como referido a «los piadosos» inmediatos, no necesariamente a «los que fueron perfeccionados en amor». Conviene una redacción que preserve con más claridad la relación del relativo griego οἵ.'
  spanish_quality_summary: El español es natural, digno y mayormente fiel. «Visitación» y «piadosos» son opciones eclesialmente legibles. La principal debilidad es la ambigüedad referencial creada por la puntuación y el relativo «quienes», que en español suena menos claro que en el original. Un ajuste menor mejora la legibilidad sin paraprasear.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: «Dios», «gracia», «Mesías» y «amor» están bien resueltos. La elección de «Mesías» para Χριστοῦ sigue correctamente la política documentada, incluso frente a la fluctuación del inglés auditado. No hay conflictos terminológicos mayores.'
  issues:
  - severity: medium
    issue: Ambigüedad del relativo «quienes serán manifestados»
    rationale: En la cadena española «tienen un lugar entre los piadosos, quienes serán manifestados...», el antecedente más natural de «quienes» es «los piadosos». Aunque eso no destruye del todo el sentido, sí vuelve menos nítida la referencia y puede desviar la lectura respecto del griego οἵ, que retoma al grupo descrito en conjunto.
  - severity: low
    issue: «Han pasado» es correcto, pero «han pasado» frente a «han pasado de largo / han desaparecido» deja implícito el matiz de transitoriedad
    rationale: No exige cambio; el borrador sigue siendo fiel. Se señala solo para constancia de que la traducción española opta por una formulación sobria y suficientemente idiomática.
  revised_spanish_text: Todas las generaciones desde Adán hasta este día han pasado, pero los que fueron perfeccionados en amor, conforme a la gracia de Dios, tienen un lugar entre los piadosos y serán manifestados en la visitación del reino del Mesías.
  revision_rationale: Se reemplaza la relativa «quienes serán manifestados» por la coordinación «y serán manifestados» para eliminar la ambigüedad de antecedente en español, mientras se conserva el mismo contenido semántico del original y del inglés POB auditado. No hacen falta notas adicionales.
