id: 1CLEM.50.3
reference: 1 Clement 50:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Funk 1901 (normalized OCR)
  text: αἱ γενεαὶ πᾶσαι ἀπὸ Ἀδὰμ ἕως τῆσδε τῆς ἡμέρας παρῆλθον, ἀλλ’ οἱ ἐν ἀγάπῃ τελειωθέντες κατὰ τὴν τοῦ θεοῦ χάριν ἔχουσιν χῶρον εὐσεβῶν, οἳ ₅ φανερωθήσονται ἐν τῇ ἐπισκοπῇ τῆς βασιλείας τοῦ Χριστοῦ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/050/003.yaml
  text: All the generations from Adam until this day have passed away, but those who were perfected in love according to the grace of God have a place among the godly, who will be revealed in the visitation of the kingdom of Messiah.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:35:00Z'
    unchanged: false
    changes_summary: 'Changed ''and they will be revealed'' to ''who will be revealed'' to reflect the relative pronoun more closely, and changed ''the Messiah'' to ''Christ'' to match the Greek Χριστοῦ more directly and maintain formal consistency. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Todas las generaciones desde Adán hasta este día han pasado, pero los que fueron perfeccionados en amor, conforme a la gracia de Dios, tienen un lugar entre los piadosos y serán manifestados en la visitación del reino del Mesías.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αἱ γενεαὶ πᾶσαι
  english_pob_choice: All the generations
  chosen_spanish: Todas las generaciones
  alternatives_spanish:
  - Todas las razas
  - Todas las estirpes
  lexicon: γενεαί
  rationale: «Generaciones» reproduce el sentido histórico-serial del plural griego y mantiene la referencia a la sucesión humana sin introducir un matiz étnico que «razas» o «estirpes» podrían sugerir indebidamente.
- source_word: ἀπὸ Ἀδὰμ ἕως τῆσδε τῆς ἡμέρας
  english_pob_choice: from Adam until this day
  chosen_spanish: desde Adán hasta este día
  alternatives_spanish:
  - desde Adán hasta hoy
  - desde Adán hasta la presente jornada
  lexicon: ἀπό... ἕως
  rationale: «Desde... hasta» sigue de cerca la relación temporal del griego y es natural en español; «este día» conserva la deixis solemne del original y del inglés POB.
- source_word: παρῆλθον
  english_pob_choice: have passed away
  chosen_spanish: han pasado
  alternatives_spanish:
  - han pasado y desaparecido
  - han fenecido
  lexicon: παρέρχομαι
  rationale: La idea principal es la transitoriedad de las generaciones; «han pasado» es idiomático y suficientemente fuerte sin añadir una imagen más funeraria que el texto no exige.
- source_word: ἐν ἀγάπῃ τελειωθέντες
  english_pob_choice: those who were perfected in love
  chosen_spanish: los que fueron perfeccionados en amor
  alternatives_spanish:
  - los que llegaron a la perfección en amor
  - los que fueron completados en amor
  lexicon: τελειόω / ἀγάπη
  rationale: «Perfeccionados» conserva la pasiva y el valor de consumación/completamiento. «En amor» reproduce la esfera o ámbito del proceso; no se expande a «por amor» porque el griego presenta ἐν ἀγάπῃ.
- source_word: κατὰ τὴν τοῦ θεοῦ χάριν
  english_pob_choice: according to the grace of God
  chosen_spanish: conforme a la gracia de Dios
  alternatives_spanish:
  - según la gracia de Dios
  - de acuerdo con la gracia de Dios
  lexicon: κατά + acusativo; χάρις
  rationale: «Conforme a» preserva el valor normativo/ajustado de κατά y mantiene «gracia» como traducción estándar de χάρις, sin reducirla a mero «favor».
- source_word: χῶρον εὐσεβῶν
  english_pob_choice: a place among the godly
  chosen_spanish: un lugar entre los piadosos
  alternatives_spanish:
  - un lugar entre los justos
  - un sitio entre los piadosos
  lexicon: χῶρος; εὐσεβής
  rationale: «Lugar» responde bien a χῶρον. Para εὐσεβῶν, «piadosos» conserva el registro reverente y el matiz de reverencia a Dios; «justos» desplazaría el término hacia una categoría más jurídica que la del texto.
- source_word: ἐν τῇ ἐπισκοπῇ
  english_pob_choice: in the visitation
  chosen_spanish: en la visitación
  alternatives_spanish:
  - en la visita
  - en la inspección
  lexicon: ἐπισκοπή
  rationale: «Visitación» preserva el tono bíblico-teológico y la ambigüedad histórica del sustantivo (visita, intervención, supervisión). «Visita» sería demasiado débil; «inspección» excesivamente técnico.
- source_word: τῆς βασιλείας τοῦ Χριστοῦ
  english_pob_choice: of the kingdom of Christ
  chosen_spanish: del reino del Mesías
  alternatives_spanish:
  - del reino de Cristo
  - del reino del Ungido
  lexicon: βασιλεία; Χριστός
  rationale: Se conserva «Mesías» como término principal para Χριστός, conforme a la preferencia terminológica del proyecto y al valor titulativo del griego; «Cristo» queda como alternativa posible por consistencia formal, pero no se adopta aquí.
theological_decisions:
- issue: Cómo verter Χριστοῦ en un contexto extra-canónico donde el griego usa el título cristológico
  english_pob_reading: the kingdom of Messiah
  chosen_spanish_reading: el reino del Mesías
  alternative_spanish_readings:
  - el reino de Cristo
  - el reino del Ungido
  rationale: La forma «Mesías» mantiene la identificación titulativa sin sustituirla por una forma eclesial más cristalizada. En este registro, el texto habla del reinado mesiánico futuro; «Mesías» hace visible esa carga semítica sin perder inteligibilidad.
  doctrine_reference: 'Proyecto POB: Χριστός → Mesías como preferencia por defecto; consistencia terminológica cristológica'
- issue: Valor de ἐπισκοπή en la expresión escatológica
  english_pob_reading: the visitation
  chosen_spanish_reading: la visitación
  alternative_spanish_readings:
  - la visita
  - la supervisión
  rationale: «Visitación» conserva la posible densidad escatológica y judicial del término, sin fijarlo prematuramente a una sola función. Esto evita borrar la tensión semántica entre visita benéfica e intervención decisiva.
  doctrine_reference: Léxico bíblico de intervención divina/escatológica; no se reduce a una sola acepción
translation_notes:
  revision_awareness: El inglés POB fue revisado desde «the kingdom of the Messiah» a «the kingdom of Christ» y luego restaurado a «the kingdom of Messiah». La versión española sigue la lectura restaurada y mantiene la relación relativa de οἳ mediante «quienes», evitando añadir una coordinación que el griego no requiere.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «gracia» para χάρις, en coherencia con los defaults del proyecto.
  - Se usa «Mesías» para Χριστοῦ por la preferencia terminológica documentada; no se introduce «Cristo» en el texto principal.
  - «Visitación» se conserva como término técnico-teológico estable en español bíblico del proyecto.
  - La sintaxis intenta seguir el orden y las relaciones del griego sin sonar forzada en español.
