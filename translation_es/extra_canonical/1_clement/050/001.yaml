base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_clement/050/001.yaml
  text: See, beloved, how great and marvelous love is, and of its perfection there is no explanation. Who is sufficient to be found in it, except those whom God may count worthy? Therefore let us beg and ask from his mercy that we may be found in love, without human partiality, blameless. All the generations from Adam until this day have passed away, but those who were perfected in love according to the grace of God have a place among the godly, and they will be revealed in the visitation of the kingdom of the Messiah. For it is written, “Enter into your inner chambers for a very little while, until my wrath and anger pass by; and I will remember a good day, and I will raise you from your tombs.” Blessed are we, beloved, if we do the commandments of God in the harmony of love, so that through love our sins may be forgiven us. For it is written, “Blessed are those whose lawless deeds are forgiven, and whose sins are covered; blessed is the man whose sin the Lord will certainly not reckon,
    and in whose mouth there is no deceit.” This blessing, then, came upon those chosen by God through Jesus Messiah our Lord, to whom be the glory forever and ever. Amen.
