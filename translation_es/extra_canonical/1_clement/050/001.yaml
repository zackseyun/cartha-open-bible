translation:
  language: es
  text: 'Vean, amados, cuán grande y maravilloso es el amor, y de su perfección no hay explicación. ¿Quién es suficiente para ser hallado en él, excepto aquellos a quienes Dios tenga por dignos? Por tanto, supliquemos y pidamos de su misericordia que seamos hallados en amor, sin parcialidad humana, irreprochables. Todas las generaciones desde Adán hasta este día han pasado, pero los que fueron perfeccionados en amor según la gracia de Dios tienen lugar entre los piadosos, y serán manifestados en la visitación del reino del Mesías. Porque está escrito: «Entren en sus aposentos interiores por muy poco tiempo, hasta que pase mi ira y mi furor; y yo me acordaré de un día bueno, y los levantaré de sus tumbas». Bienaventurados somos, amados, si hacemos los mandamientos de Dios en la armonía del amor, para que por amor nos sean perdonados nuestros pecados. Porque está escrito: «Bienaventurados aquellos cuyos actos de iniquidad son perdonados y cuyos pecados son cubiertos; bienaventurado el hombre
    cuyo pecado el Señor ciertamente no tomará en cuenta, y en cuya boca no hay engaño». Esta bienaventuranza, entonces, vino sobre aquellos escogidos por Dios por medio de Jesús el Mesías, nuestro Señor, a quien sea la gloria por los siglos de los siglos. Amén.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: Se mantiene el término general y relacional que domina todo el pasaje. 'Amor' conserva la cohesión retórica y la carga exhortativa del original mejor que 'caridad'.
- source_word: τελειότης / τελειωθέντες
  english_pob_choice: perfection / perfected
  chosen_spanish: perfección / perfeccionados
  alternatives_spanish:
  - madurez / llevados a plenitud
  - completitud / completados
  lexicon: BDAG
  rationale: La POB inglesa preserva el vínculo léxico entre la 'perfección' del amor y los que son 'perfeccionados' en amor. En español, 'perfección' y 'perfeccionados' mantienen ese paralelismo y el registro elevado.
- source_word: ἐξήγησις
  english_pob_choice: explanation
  chosen_spanish: explicación
  alternatives_spanish:
  - interpretación
  - relato completo
  lexicon: LSJ
  rationale: '''Explicación'' expresa bien la idea de que la perfección del amor no puede ser plenamente expuesta o desarrollada. Es más natural en español que una transliteración conceptual más técnica.'
- source_word: ἱκανός
  english_pob_choice: sufficient
  chosen_spanish: suficiente
  alternatives_spanish:
  - capaz
  - digno
  lexicon: BDAG
  rationale: '''Suficiente'' conserva la pregunta sobre adecuación o aptitud moral sin adelantar la idea de dignidad, que aparece después en καταξιώσῃ.'
- source_word: καταξιώσῃ
  english_pob_choice: count worthy
  chosen_spanish: tener por dignos
  alternatives_spanish:
  - considerar dignos
  - juzgar dignos
  lexicon: BDAG
  rationale: En español, la construcción 'tener por dignos' comunica con claridad la acción divina de reconocer como dignos, sin sugerir una transformación ontológica que el contexto no exige.
- source_word: δεηθῶμεν ... αἰτώμεθα
  english_pob_choice: let us beg and ask
  chosen_spanish: supliquemos y pidamos
  alternatives_spanish:
  - roguemos y pidamos
  - suplicamos y solicitamos
  lexicon: BDAG
  rationale: La pareja verbal refleja dos matices de petición intensa. 'Supliquemos y pidamos' suena natural y solemne en español, conservando el tono de urgencia.
- source_word: δίχα προσκλίσεως ἀνθρωπίνης
  english_pob_choice: without human partiality
  chosen_spanish: sin parcialidad humana
  alternatives_spanish:
  - sin favoritismo humano
  - sin sesgo humano
  lexicon: LSJ
  rationale: La frase señala ausencia de inclinación personal o favoritismo entre personas. 'Parcialidad humana' conserva el matiz ético y evita una expresión demasiado interpretativa.
- source_word: ἄμωμοι
  english_pob_choice: blameless
  chosen_spanish: irreprochables
  alternatives_spanish:
  - sin mancha
  - intachables
  lexicon: BDAG
  rationale: '''Irreprochables'' comunica bien la ausencia de culpa o censura moral y encaja en español contemporáneo; mantiene el valor ético-cultual del término.'
- source_word: εὐσεβῶν
  english_pob_choice: the godly
  chosen_spanish: los piadosos
  alternatives_spanish:
  - los justos
  - los devotos
  lexicon: BDAG
  rationale: En este contexto de pertenencia escatológica y reverencia, 'los piadosos' conserva el matiz de devoción a Dios. 'Los justos' podría desplazar el énfasis hacia justicia forense.
- source_word: ἐπισκοπή
  english_pob_choice: visitation
  chosen_spanish: visitación
  alternatives_spanish:
  - visita
  - intervención
  - supervisión
  lexicon: BDAG
  rationale: '''Visitación'' mantiene la resonancia bíblico-teológica de una manifestación/acción decisiva de Dios sin resolver indebidamente si se trata de inspección, intervención o aparición.'
- source_word: βασιλεία τοῦ Χριστοῦ
  english_pob_choice: kingdom of the Messiah
  chosen_spanish: reino del Mesías
  alternatives_spanish:
  - reino de Cristo
  lexicon: BDAG
  rationale: 'Se sigue la pauta del proyecto para Χριστός como título: ''Mesías''. En español, esto evita una forma confesional fija cuando el contexto es claramente titular y escatológico.'
- source_word: ταμεῖα
  english_pob_choice: inner chambers
  chosen_spanish: aposentos interiores
  alternatives_spanish:
  - cámaras interiores
  - cuartos interiores
  lexicon: LSJ
  rationale: El sentido en la cita es de espacios privados de refugio. 'Aposentos interiores' suena natural y conserva la idea de interioridad y resguardo.
- source_word: θηκῶν
  english_pob_choice: tombs
  chosen_spanish: tumbas
  alternatives_spanish:
  - sepulcros
  - sepulturas
  lexicon: LSJ
  rationale: En el contexto de resurrección, 'tumbas' es la opción más clara y idiomática en español, sin perder el referente funerario.
- source_word: ὁμονοία
  english_pob_choice: harmony
  chosen_spanish: armonía
  alternatives_spanish:
  - unidad
  - concordia
  lexicon: BDAG
  rationale: '''Armonía'' reproduce la imagen relacional y comunitaria del término, y encaja con la frase ''en la armonía del amor'' mejor que una abstracción más plana.'
- source_word: ἀφεθῆναι
  english_pob_choice: be forgiven
  chosen_spanish: sean perdonados
  alternatives_spanish:
  - sean remitidos
  - sean absueltos
  lexicon: BDAG
  rationale: En el contexto de los pecados, 'perdonados' es la expresión natural y fiel. Mantiene el sentido de remisión sin forzar tecnicismos.
- source_word: ἀνομίαι
  english_pob_choice: lawless deeds
  chosen_spanish: acciones de iniquidad
  alternatives_spanish:
  - obras de iniquidad
  - actos de maldad
  lexicon: BDAG
  rationale: '''Acciones de iniquidad'' preserva la concreción de ''deeds'' y el carácter de violación del orden de Dios. Se evita ''iniquidades'' para no perder la referencia a actos concretos.'
- source_word: λογίσηται
  english_pob_choice: reckon
  chosen_spanish: tomará en cuenta
  alternatives_spanish:
  - imputará
  - contará
  lexicon: BDAG
  rationale: '''Tomará en cuenta'' comunica la idea contable-forense de no atribuir pecado al hombre citado, en un español claro y menos técnico que ''imputará''.'
- source_word: δόλος
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - astucia
  - fraude
  lexicon: BDAG
  rationale: '''Engaño'' es un equivalente natural para la ausencia de falsedad en la boca. Conserva la dimensión moral y verbal del término.'
- source_word: μακαρισμός
  english_pob_choice: blessing
  chosen_spanish: bienaventuranza
  alternatives_spanish:
  - bendición
  - pronunciamiento de bienaventuranza
  lexicon: BDAG
  rationale: Aquí el término se refiere al estado y pronunciamiento de felicidad bendita del pasaje citado. 'Bienaventuranza' mantiene la resonancia bíblica sin perder precisión.
- source_word: ἐκλελεγμένους
  english_pob_choice: chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los seleccionados
  lexicon: BDAG
  rationale: '''Escogidos'' es transparente en español y refleja la acción divina sin cargar innecesariamente el término con una tecnicidad doctrinal posterior.'
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  lexicon: BDAG
  rationale: Es la equivalencia doxológica normal y más adecuada en español eclesial.
theological_decisions:
- issue: Cómo rendir Χριστός en un contexto escatológico y doxológico
  english_pob_reading: kingdom of the Messiah / Jesus Messiah our Lord
  chosen_spanish_reading: reino del Mesías / Jesús el Mesías, nuestro Señor
  alternative_spanish_readings:
  - reino de Cristo / Jesucristo, nuestro Señor
  rationale: 'Se sigue la directriz del proyecto: cuando Χριστός funciona como título, se traduce ''Mesías''. Esto preserva la distinción entre nombre y título y mantiene la lectura escatológica del pasaje.'
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres cuando corresponda.'
- issue: Sentido de ἐπισκοπή en la frase escatológica
  english_pob_reading: visitation of the kingdom of the Messiah
  chosen_spanish_reading: visitación del reino del Mesías
  alternative_spanish_readings:
  - aparición del reino del Mesías
  - intervención del reino del Mesías
  rationale: '''Visitación'' conserva la tensión teológica del término sin decidir de antemano si se trata de inspección, manifestación o intervención. Esto sigue el principio de no resolver excesivamente la ambigüedad del original.'
  doctrine_reference: 'DOCTRINE.md: preservar tensiones teológicas cuando el texto las mantiene.'
- issue: Relación entre perdón y amor en la cláusula final de la exhortación
  english_pob_reading: so that through love our sins may be forgiven us
  chosen_spanish_reading: para que por amor nos sean perdonados nuestros pecados
  alternative_spanish_readings:
  - para que por amor se nos perdonen nuestros pecados
  - a fin de que por amor se nos perdonen nuestros pecados
  rationale: La formulación mantiene que el perdón viene 'por amor' y no de manera autónoma, preservando el enlace ético-teológico del texto sin añadir una teoría distinta del perdón.
  doctrine_reference: 'DOCTRINE.md: conservar la causalidad y el orden argumental del texto.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente de la POB inglesa, que corrigió 'description' a 'explanation' para ἐξήγησις. La versión española adopta 'explicación' para alinearse con esa decisión revisada, y mantiene sin cambios el resto de la solución auditada salvo ajustes naturales de español.
  spanish_consistency_notes:
  - Se mantuvo 'amor' de forma uniforme para ἀγάπη.
  - Se usó 'Mesías' para Χριστός en los lugares titulativos, conforme a la pauta del proyecto.
  - Se evitó 'SEÑOR' como máscara para el nombre divino porque este pasaje no introduce YHWH explícitamente en el texto base; donde aparece κύριος en la cita bíblica y en la doxología, el sentido es contextual y se traduce según la frase hecha española del texto citado.
  - Se preservó el registro bíblico mediante 'bienaventurados / bienaventuranza' en la cita salmódica, en vez de reemplazarlo por un giro más moderno que perdería eco escritural.
  - Se conservó la distinción entre 'perfección' y 'perfeccionados' para mantener el paralelismo léxico del original.
