  to: 'Vean, amados, cuán grande y maravilloso es el amor, y de su perfección no hay explicación. ¿Quién es suficiente para ser hallado en él, excepto aquellos a quienes Dios tenga por dignos? Por tanto, supliquemos y pidamos de su misericordia que seamos hallados en amor, sin parcialidad humana, irreprochables. Todas las generaciones desde Adán hasta este día han pasado, pero los que fueron perfeccionados en amor según la gracia de Dios tienen lugar entre los piadosos, y serán manifestados en la visitación del reino del Mesías. Porque está escrito: «Entren en sus aposentos interiores por muy poco tiempo, hasta que pase mi ira y mi furor; y yo me acordaré de un día bueno, y los levantaré de sus tumbas». Bienaventurados somos, amados, si hacemos los mandamientos de Dios en la armonía del amor, para que por amor nos sean perdonados nuestros pecados. Porque está escrito: «Bienaventurados aquellos cuyos actos de iniquidad son perdonados y cuyos pecados son cubiertos; bienaventurado el hombre
