translation:
  language: es
  text: Y a los sabios de una generación[a], las sendas de violencia y de muerte les serán reveladas[b], y se mantendrán lejos de ellas y no las seguirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de generación en generación». La frase ge''ez ha sido entendida de más de una manera en la historia de la traducción; aquí se sigue la decisión auditada final que la toma como referencia a una generación.'
    reason: previous_rendering
  - marker: b
    text: 'O: «les serán mostradas». El verbo ge''ez puede expresar que algo es mostrado o revelado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እሙራን
  english_pob_choice: the wise
  chosen_spanish: ciertos hombres
  alternatives_spanish:
  - los sabios
  - hombres conocidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El auditorio inglés finalmente revisado entiende እሙራን como ‘certain men’, no como ‘the wise’. En español, ‘ciertos hombres’ conserva la indefinición y evita introducir una sabiduría no sostenida por el análisis revisado.
- source_word: ለሰብእ
  english_pob_choice: among men
  chosen_spanish: hombres
  alternatives_spanish:
  - entre los hombres
  - a los hombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia con ለ- funciona idiomáticamente en el entorno revisado como referencia a hombres concretos. ‘De una generación’ más ‘hombres’ reproduce la relación sin forzar un giro más técnico.
- source_word: እምትውልድ
  english_pob_choice: from generation to generation
  chosen_spanish: de una generación
  alternatives_spanish:
  - de generación
  - entre generaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El análisis corregido advierte que el ge'ez dice solo ‘de/of a generation’, sin iteración. Por eso se evita ‘de generación en generación’ y se conserva la referencia simple a una generación.
- source_word: ይትከሠት
  english_pob_choice: will be revealed
  chosen_spanish: serán revelados
  alternatives_spanish:
  - serán mostrados
  - se manifestarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Revelados’ sigue la decisión inglesa revisada y mantiene el matiz de manifestación pasiva. En español, la pasiva refleja/ser + participio es natural y fiel al valor de disclosure.
- source_word: ፍኖዋተ
  english_pob_choice: the paths
  chosen_spanish: los caminos
  alternatives_spanish:
  - las sendas
  - las vías
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta del plural ge'ez. ‘Caminos’ es un equivalente claro y bíblicamente legible en español; ‘sendas’ también sería posible, pero ‘caminos’ suena menos literario sin perder imagen.
- source_word: ግፍዕ
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - injusticia violenta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Violencia’ transmite el sentido moral fuerte y directo del término, como en la lectura inglesa auditada. No se amplía a ‘opresión’ o ‘injusticia’ porque el verso mantiene una formulación breve y contundente.
- source_word: ሞት
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - destrucción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido básico es literal y no requiere expansión. ‘Muerte’ preserva la coordinación con ‘violencia’ y el contraste moral del pasaje.
- source_word: ይርኅቁ እምኔሆሙ
  english_pob_choice: they will keep far from them
  chosen_spanish: se mantendrán lejos de ellos
  alternatives_spanish:
  - se apartarán de ellos
  - se quedarán lejos de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma expresa mantenerse/ponerse lejos. ‘Se mantendrán lejos de ellos’ es idiomático en español y conserva la idea de distancia moral y práctica.
- source_word: ኢይትለውዎሙ
  english_pob_choice: will not follow them
  chosen_spanish: no los seguirán
  alternatives_spanish:
  - no irán tras ellos
  - no los acompañarán
  lexicon: Dillmann, Lexicon Lingae Aethiopicae
  rationale: El verbo significa seguir detrás. ‘No los seguirán’ retiene la metáfora de caminar por un camino moral, que se corresponde con ‘caminos de violencia y de muerte’.
theological_decisions:
- issue: Imagen concreta de caminos morales
  english_pob_reading: Retain 'paths of violence and death' as concrete imagery
  chosen_spanish_reading: Conservar 'los caminos de violencia y de muerte'
  alternative_spanish_readings:
  - las sendas del mal y de la muerte
  - conductas violentas y mortales
  rationale: El pasaje presenta un plural concreto de caminos; traducirlo como caminos preserva la metáfora moral y la advertencia apocalíptico-sapiencial. No se lo abstrae en una paráfrasis ética general.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; avoid unwarranted paraphrase.'
- issue: Ambigüedad de destinatarios en እሙራን
  english_pob_reading: Revised from 'the wise' to 'certain men'
  chosen_spanish_reading: ‘ciertos hombres’
  alternative_spanish_readings:
  - los sabios
  - hombres sabios
  rationale: El expediente revisado corrige una lectura sapiencial que no sostiene el ge'ez. En español se debe reflejar esa cautela, manteniendo la indefinición de los destinatarios sin introducir un elogio inexistente.
  doctrine_reference: Source-critical fidelity to the revised audit trail.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que corrige la lectura de እሙራን como ‘ciertos hombres’ y restringe እምትውልድ a ‘de una generación’, evitando la expansión iterativa anterior. También se mantuvo el valor pasivo de ይትከሠት con ‘serán revelados’.
  spanish_consistency_notes:
  - Se mantuvo la metáfora plural de ‘caminos’ para ፍኖዋተ, coherente con el énfasis moral del verso.
  - Se evitó ‘de generación en generación’ porque el expediente revisado lo considera una adición no sustentada por el ge'ez.
  - Se prefirió ‘muerte’ y ‘violencia’ en forma literal para preservar el paralelismo breve del original.
  - Los pronombres de objeto directos (‘los’) retoman naturalmente ‘caminos’ y evitan una repetición pesada en español.
