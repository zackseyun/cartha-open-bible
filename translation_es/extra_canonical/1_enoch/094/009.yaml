translation:
  language: es
  text: Ustedes han cometido afrenta y violencia[a], y se han preparado para el día del derramamiento de sangre[b], y para el día de la oscuridad, y para el día del gran juicio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'han hecho afrenta y violencia'. El verbo ge'ez básico significa 'hacer' o 'cometer'; aquí la revisión auditada favorece el sentido de cometer actos culpables.
    reason: lexical_alternative
  - marker: b
    text: También puede expresarse de forma más compacta como 'matanza' o 'derramamiento de sangre'.
    reason: lexical_alternative
  - marker: c
    text: Una lectura previa entendía el inicio como 'Han preparado esto para afrenta y violencia', pero la revisión gramatical auditada favorece 'han cometido afrenta y violencia'.
    reason: previous_rendering
lexical_decisions:
- source_word: ገበርክምዋ
  english_pob_choice: You have committed reproach and violence
  chosen_spanish: han cometido
  alternatives_spanish:
  - han hecho
  - han preparado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez base significa 'hacer' o 'cometer'. En este contexto, la revisión auditada corrige la lectura de 'preparar' y confirma que la frase introduce los actos mismos, no una finalidad. En español, 'han cometido' comunica mejor la fuerza moral y judicial del pasaje.
- source_word: ለጽርፈት
  english_pob_choice: reproach
  chosen_spanish: reproche
  alternatives_spanish:
  - afrenta
  - oprobio
  - vituperio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término abarca insulto, afrenta o reproche. 'Reproche' conserva el tono acusatorio y se adapta bien al paralelismo con 'violencia'.
- source_word: ወለዓመፃ
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - maldad
  - opresión
  - maltrato
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La palabra puede cubrir violencia, opresión o wrongdoing. 'Violencia' mantiene la aspereza apocalíptica y corresponde a la lectura auditada del inglés POB.
- source_word: ወድልዋነ ኮንክሙ
  english_pob_choice: and you have made yourselves ready
  chosen_spanish: se han preparado
  alternatives_spanish:
  - se han dispuesto
  - han llegado a estar listos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa quedar o hacerse listos para algo futuro. En español, el reflexivo 'se han preparado' conserva esa idea de disposición para el juicio venidero sin añadir más contenido del necesario.
- source_word: ለዕለተ ክዕወት ደም
  english_pob_choice: for the day of the shedding of blood
  chosen_spanish: para el día del derramamiento de sangre
  alternatives_spanish:
  - para el día de la sangre derramada
  - para el día del derramamiento de sangre y sangre vertida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión apunta al acto de derramar sangre, no sólo a 'sangre' como sustantivo estático. 'Derramamiento de sangre' sigue de cerca el valor semántico y suena natural en español bíblico.
- source_word: ወለዕለተ ጽልመት
  english_pob_choice: and for the day of darkness
  chosen_spanish: y para el día de la oscuridad
  alternatives_spanish:
  - y para el día tenebroso
  - y para el día de tinieblas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Oscuridad'' conserva el paralelismo apocalíptico del original y resulta claro para lectores modernos. ''Tinieblas'' sería más tradicional, pero menos neutro en español contemporáneo.'
- source_word: ወለዕለተ ኵነኔ ዐቢይ
  english_pob_choice: and for the day of the great judgment
  chosen_spanish: y para el día del gran juicio
  alternatives_spanish:
  - y para el día del juicio grande
  - y para el día de la gran condena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Juicio'' preserva la solemnidad esjatológica y evita introducir ''condena'' como traducción interpretativa más fuerte de lo que exige el término. ''Gran juicio'' mantiene el paralelismo con la fórmula apocalíptica.'
theological_decisions:
- issue: El pasaje puede leerse como mera calamidad histórica o como lenguaje apocalíptico de juicio final
  english_pob_reading: The final triad is rendered as explicit eschatological days culminating in 'the great judgment.'
  chosen_spanish_reading: 'La traducción conserva la serie de ''días'' escatológicos: derramamiento de sangre, oscuridad y gran juicio.'
  alternative_spanish_readings:
  - Una referencia general a desgracia y castigo en la historia
  - Una formulación moral sin énfasis escatológico
  rationale: La repetición de 'para el día de...' y el cierre con 'gran juicio' exigen conservar la atmósfera apocalíptica. En español conviene mantener esa progresión sin diluirla en lenguaje genérico.
  doctrine_reference: Preservar imaginería apocalíptica y fórmulas de juicio; no aplanar el texto en prosa religiosa moderna.
translation_notes:
  revision_awareness: La revisión auditada corrige una lectura anterior que entendía el verbo inicial como 'preparar'. El pase adjudicado señala que la construcción ge'ez con sufijo de objeto anticipado y marcas de objeto directo debe leerse como 'cometer reproche y violencia'. Por eso la traducción española adopta un verbo de acción culpable ('han cometido') y mantiene la secuencia escatológica posterior sin reinterpretarla como finalidad.
  spanish_consistency_notes:
  - Se evita 'Señor' o 'Yahvé' porque este versículo no contiene el nombre divino ni un título correspondiente.
  - '''Gran juicio'' conserva el lenguaje de juicio esjatológico sin añadir una confesionalidad posterior específica.'
  - Se usa 'oscuridad' en vez de 'tinieblas' para un registro moderno, pero se mantiene el paralelismo formal del texto.
