translation:
  language: es
  text: Y aférrense al pensamiento de sus corazones[a], y no dejen que mis palabras sean borradas de sus corazones; porque sé que los pecadores tentarán a los hombres para practicar la sabiduría mala, y no se hallará lugar para ella[b], y ninguna tentación[c] la disminuirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''a la intención de sus corazones''. El ge''ez combina pensamiento interior e intención con el corazón como sede de resolución.'
    reason: lexical_alternative
  - marker: b
    text: La frase 'no se hallará lugar para ella' es difícil. 'Lugar' puede significar sitio literal, espacio o incluso oportunidad para la enseñanza mala.
    reason: alternative_reading
  - marker: c
    text: 'O: ''prueba'' o ''aflicción''. El término final es incierto y puede abarcar tentación, prueba o aflicción.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወትእኅዙ
  english_pob_choice: hold fast
  chosen_spanish: manténganlos firmes
  alternatives_spanish:
  - manténganlos sujetos
  - afírmenlos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto ge'ez corregido exige la idea de asirse o retener con firmeza, no la de mandar. En español, 'manténganlos firmes' conserva el impulso exhortativo y la noción de sujeción/resolución interior.
- source_word: በሐሊና ልብክሙ
  english_pob_choice: in the thought of your hearts
  chosen_spanish: en la intención de sus corazones
  alternatives_spanish:
  - en el pensamiento de sus corazones
  - en el propósito de sus corazones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión combina pensamiento interior y el corazón como sede de resolución. 'Intención' comunica mejor esa orientación volitiva en español sin perder el matiz interno.
- source_word: ኢይደምስስ ነገርየ እምልብክሙ
  english_pob_choice: do not let my words be blotted out from your hearts
  chosen_spanish: no dejen que mis palabras sean borradas de sus corazones
  alternatives_spanish:
  - no dejen que mis palabras sean borradas de su corazón
  - no permitan que mis palabras se borren de sus corazones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Borradas'' reproduce bien la imagen de eliminación/borrado, manteniendo el sentido de pérdida de memoria o retención interior. ''Corazones'' conserva el plural del destinatario.'
- source_word: ያሜክሮዎሙ
  english_pob_choice: tempt men
  chosen_spanish: tentarán a los hombres
  alternatives_spanish:
  - seducirán a los hombres
  - pondrán a prueba a los hombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión muestra que el verbo pertenece al campo de tentar/entice/test. 'Tentarán' refleja la fuerza de corrupción activa que el contexto requiere.
- source_word: ጥበበ እኩየ
  english_pob_choice: evil wisdom
  chosen_spanish: la sabiduría mala
  alternatives_spanish:
  - la sabiduría perversa
  - el saber malo
  - la astucia mala
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la tensión sapiential de 'sabiduría' en un uso irónico y negativo, sin rebajarla a mera maldad genérica. 'Mala' es más natural en español que 'malvada' con este sustantivo.
- source_word: ኵሉ መካን ኢይትረከብ ላቲ
  english_pob_choice: no place will be found for it
  chosen_spanish: no se hallará lugar para ella
  alternatives_spanish:
  - no se encontrará lugar para ella
  - no habrá lugar para ella
  - no se hallará espacio para ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lugar'' mantiene la ambigüedad entre sitio literal, espacio de acogida u अवसर de acceso. El femenino concuerda con ''sabiduría'' y evita una resolución innecesaria de la referencia.'
- source_word: ኵሉ መከራ
  english_pob_choice: no temptation will diminish
  chosen_spanish: ninguna prueba la disminuirá
  alternatives_spanish:
  - ninguna tentación la disminuirá
  - ninguna aflicción la reducirá
  - ninguna tribulación la acortará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término admite 'prueba', 'tentación' o 'aflicción'. 'Prueba' permite reflejar la ambigüedad ya señalada en el audit trail y evita fijar prematuramente un matiz único.
theological_decisions:
- issue: Conservar la tensión entre sabiduría auténtica y una sabiduría corrupta o falsa
  english_pob_reading: Rendered ጥበበ እኩየ as 'evil wisdom'
  chosen_spanish_reading: la sabiduría mala
  alternative_spanish_readings:
  - la sabiduría perversa
  - la astucia mala
  rationale: El pasaje no habla solo de conducta mala, sino de una forma torcida de 'sabiduría'. Mantener 'sabiduría' preserva la crítica sapiencial y la ironía del texto.
  doctrine_reference: Preservar la tensión teológica y léxica en vez de resolverla; coherencia con el uso del término en contextos sapienciales.
- issue: Relación entre tentación y prueba en el cierre de la cláusula
  english_pob_reading: Or 'trial'
  chosen_spanish_reading: prueba
  alternative_spanish_readings:
  - tentación
  - aflicción
  rationale: La tradición del audit trail deja abierta la oscilación entre tentación, prueba y aflicción. 'Prueba' funciona como término puente en español y conserva esa indeterminación.
  doctrine_reference: Mantener ambigüedad lexical documentada; no imponer una lectura doctrinalmente cerrada cuando el texto es semánticamente inestable.
translation_notes:
  revision_awareness: 'El texto fuente corregido no dice ''manden/ordenen'', sino ''mantengan firmes / afirmen''. También se corrigió la relación léxica entre el verbo y el sustantivo final: el campo semántico es de tentar/poner a prueba, no de instruir. La traducción española evita repetir el error de lectura del borrador inglés y conserva la ambigüedad del cierre entre prueba, tentación y aflicción.'
  spanish_consistency_notes:
  - Se conservó 'corazones' en plural para reflejar el destinatario colectivo.
  - '''Sabiduría'' se mantiene de forma deliberada para no diluir el contraste irónico del texto.'
  - '''Lugar'' y ''prueba'' preservan ambigüedades explícitas del audit trail en vez de resolverlas de modo interpretativo.'
  - Se prefirió un español natural pero sobrio, compatible con lectura eclesial y con trazabilidad lexical.
