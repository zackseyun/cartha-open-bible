  language: en
  yaml_path: translation/extra_canonical/1_enoch/094/005.yaml
  text: And command them in the thought of your hearts[a], and do not let my words be blotted out from your hearts; for I know that sinners will tempt men to practice evil wisdom, and no place will be found for it[f][e][d][c][b], and no temptation will diminish.
