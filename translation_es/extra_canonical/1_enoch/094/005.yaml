  source_alignment_summary: 'El borrador español refleja bien las correcciones clave del audit trail frente al inglés base: toma ወትእኅዙ como una idea de aferrarse/sostener, no de ''mandar'', y ያሜክሮዎሙ como ''tentar'', preservando además la relación léxica con መከራ. También mantiene ''sabiduría'' para ጥበበ እኩየ y conserva la dificultad de ''no se hallará lugar para ella''. Sin embargo, ''manténganlos firmes'' introduce un objeto explícito (''los'') que no está claro en la fuente y vuelve más interpretativa la primera cláusula; además, el anclaje de la nota [a] no corresponde al texto principal, porque la nota ofrece exactamente la misma frase en vez de una alternativa real. En la última cláusula, el español principal debería preferir ''tentación'' para sostener la conexión documentada entre el verbo ''tentar'' y el sustantivo final.'
