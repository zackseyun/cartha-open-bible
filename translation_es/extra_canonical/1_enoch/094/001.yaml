translation:
  language: es
  text: 'Y ahora les digo, mis hijos: amen la rectitud y caminen en ella; porque los senderos de la rectitud son dignos y aceptables[a], pero los senderos de la iniquidad serán destruidos rápidamente y desaparecerán[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Aceptables’ refleja el valor pasivo de ‘ser recibidos/aprobados’; también podría entenderse como ‘aprobados’ o ‘recibidos’.
    reason: lexical_alternative
  - marker: b
    text: La forma final intensifica la desaparición total del sendero impío; el POB inglés anterior había oscilado entre ‘violence’ e ‘iniquity’, pero la revisión favorece aquí ‘iniquidad’ para distinguirla del término técnico de violencia que aparece en el verso siguiente.
    reason: textual_variant
lexical_decisions:
- source_word: እብለክሙ
  english_pob_choice: I say to you
  chosen_spanish: les digo a ustedes
  alternatives_spanish:
  - les digo
  - les hablo a ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la fórmula directa de exhortación sin perder el destinatario explícito; en español suena natural y conserva el tono paternal del discurso.
- source_word: ደቂቅየ
  english_pob_choice: my children
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos míos
  - mis pequeños
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es de parentesco/instrucción. ‘Mis hijos’ mantiene la relación pedagógica y afectiva; aquí ‘hijos’ comunica mejor que una traducción literal más fría.
- source_word: አፍቅርዋ ለጽድቅ
  english_pob_choice: love righteousness
  chosen_spanish: amen la justicia
  alternatives_spanish:
  - amen la rectitud
  - amen la justicia y la rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés POB eligió ‘righteousness’, en este contexto exhortativo la equivalencia española más transparente y fiel al campo ético de ጽድቅ es ‘justicia’; ‘rectitud’ sería posible, pero ‘justicia’ mantiene mejor la fuerza covenantal/moral del contraste con la iniquidad.
- source_word: ወባቲ ሖሩ
  english_pob_choice: and walk in it
  chosen_spanish: y caminen en ella
  alternatives_spanish:
  - y anden en ella
  - y vayan por ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La metáfora de camino/andar se conserva de forma idiomática; ‘caminen en ella’ mantiene el valor ético de vivir conforme a la justicia.
- source_word: ፍኖዋተ ጽድቅ
  english_pob_choice: the paths of righteousness
  chosen_spanish: los senderos de la justicia
  alternatives_spanish:
  - los caminos de la justicia
  - las sendas de la justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Senderos’ reproduce bien la imagen concreta de vías morales y su contraste con los ‘senderos’ opuestos, mientras que ‘de la justicia’ conserva la coherencia con ጽድቅ.
- source_word: ይደሉ
  english_pob_choice: are worthy
  chosen_spanish: son dignos
  alternatives_spanish:
  - son apropiados
  - son convenientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Dignos’ transmite la idea de aptitud/valor moral de manera natural en español y recoge la valoración positiva del original.
- source_word: ይትወከፍ
  english_pob_choice: acceptable
  chosen_spanish: aceptables
  alternatives_spanish:
  - aprobados
  - recibidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo/reflexivo sugiere ser recibidos o aprobados; ‘aceptables’ preserva esa valoración sin introducir un sujeto implícito.
- source_word: ዓመፃ
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - injusticia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del POB inglés adjudicó ‘iniquity’ como lectura preferente y distinguió este término de ‘violence’/oppression. ‘Iniquidad’ reproduce bien el antónimo moral directo de ‘justicia’ y evita confundirlo con violencia física.
- source_word: ፍጡነ
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - velozmente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverbio de rapidez; ‘rápidamente’ es claro y formal en español.
- source_word: ይትሐጐላ ወየሐፅፃ
  english_pob_choice: will be destroyed and vanish
  chosen_spanish: serán destruidos rápidamente y desaparecerán
  alternatives_spanish:
  - serán derribados y desaparecerán
  - serán destruidos y pasarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La doble acción final preserva la ruina y la desaparición del camino impío; el sujeto implícito plural concuerda con ‘senderos’.
theological_decisions:
- issue: Traducción de ጽድቅ en un contexto sapiencial/apocalíptico
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia y rectitud
  rationale: Aunque el POB inglés mantiene ‘righteousness’, en español ‘justicia’ comunica con mayor claridad la dimensión ética y relacional del término, y encaja bien con el contraste inmediato con ዓመፃ (‘iniquidad’). ‘Rectitud’ sigue siendo una alternativa válida, pero puede sonar más abstracta.
  doctrine_reference: Consistencia de términos clave; justicia/rectitud según contexto
- issue: Pareja evaluativa aplicada a los senderos de la justicia
  english_pob_reading: worthy and acceptable
  chosen_spanish_reading: dignos y aceptables
  alternative_spanish_readings:
  - apropiados y aceptados
  - convenientes y recibidos
  rationale: La formulación conserva ambos predicados del original, evitando fusionarlos en una sola idea general. ‘Dignos y aceptables’ mantiene la balanza retórica y el juicio favorable sobre esos caminos.
  doctrine_reference: Equivalencia óptima; preservación de paralelismo poético
translation_notes:
  revision_awareness: 'Se tomó en cuenta la secuencia de revisiones del POB inglés: la adjudicación posterior corrigió ‘violence’ a ‘iniquity’ en 94:1, y el pase final solo ajustó la puntuación. La versión española sigue esa revisión más reciente y evita proyectar ‘violencia’ sobre este verso.'
  spanish_consistency_notes:
  - 'Se mantuvo una terminología moral coherente: ‘justicia’ para ጽድቅ e ‘iniquidad’ para ዓመፃ, reservando ‘violencia’ para contextos donde el original lo exija explícitamente.'
  - ‘Senderos’ se usa de manera consistente para conservar la metáfora del camino moral.
  - La puntuación y el orden retórico siguen el paralelismo del original sin caer en calcos innecesarios.
