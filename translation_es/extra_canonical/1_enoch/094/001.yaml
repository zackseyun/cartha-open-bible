    reason: textual_variant
  revision_rationale: 'La revisión corrige la principal desalineación léxica: ጽድቅ debe reflejar la decisión auditada de ''righteousness'' con un español que conserve su amplitud ética; ''rectitud'' funciona mejor aquí que ''justicia''. También se simplifica ''les digo a ustedes'' a ''les digo'' para un español más natural, y se eliminó la nota innecesaria asociada a esa explicitación. Se conservan las notas útiles sobre ''aceptables'' y sobre ''iniquidad'' frente a ''violence''.'
