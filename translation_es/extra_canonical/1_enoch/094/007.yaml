translation:
  language: es
  text: ¡Ay de los que edifican sus casas con pecado, porque serán arrancadas de sus cimientos[b]; [y caerán a espada[a];] y los que adquieren oro y plata en injusticia serán destruidos rápidamente[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula «y caerán a espada» aparece entre corchetes en el testigo etiópico suministrado, lo que indica incertidumbre textual.
    reason: textual_variant
  - marker: b
    text: «Cimientos» conserva la imagen concreta de una ruina arquitectónica; el sentido no se reduce a una metáfora abstracta.
    reason: source_note
  - marker: c
    text: La expresión puede entenderse como una referencia a una adquisición marcada por la injusticia, no simplemente a riqueza en sí.
    reason: lexical_note
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de los
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa bien el tono profético de denuncia y juicio. En español, '¡Ay de' conserva la fórmula oracular sin sonar mecánica.
- source_word: የሐንጹ አብያቲሙ
  english_pob_choice: build their houses
  chosen_spanish: edifican sus casas
  alternatives_spanish:
  - construyen sus casas
  - edifican sus hogares
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Casas'' mantiene la imagen concreta y arquitectónica del texto; ''edifican'' encaja bien con el registro bíblico y evita la ambigüedad de ''hogares''.'
- source_word: በኃጢአት
  english_pob_choice: with sin
  chosen_spanish: con pecado
  alternatives_spanish:
  - por pecado
  - en pecado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Con pecado'' preserva la lectura instrumental o modal sin forzar una perífrasis más interpretativa. ''Pecado'' es más natural que ''con sin'' o un calco.'
- source_word: እምኵሉ መሠረቶሙ ይትነሠቱ
  english_pob_choice: for they will be torn up from all their foundations
  chosen_spanish: serán arrancadas desde todos sus cimientos
  alternatives_spanish:
  - serán arrancadas de todos sus cimientos
  - serán desarraigadas desde todos sus cimientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo y la preposición 'from' favorecen una imagen de remoción violenta. 'Arrancadas' conserva la fuerza de despojo; 'cimientos' traduce bien la base arquitectónica.
- source_word: ወበሰይፍ ይወድቁ
  english_pob_choice: and they will fall by the sword
  chosen_spanish: y caerán a espada
  alternatives_spanish:
  - y caerán por la espada
  - y caerán por la espada en juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula bíblica concisa y natural en español. 'A espada' conserva el valor idiomático de muerte por guerra/juicio sin explicitar más de lo que el texto dice.
- source_word: ያጠርይዎ ለወርቅ ወለብሩር
  english_pob_choice: those who acquire gold and silver
  chosen_spanish: los que adquieren oro y plata
  alternatives_spanish:
  - los que amasan oro y plata
  - los que obtienen oro y plata
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Adquieren'' refleja el acto de obtener o acumular riqueza sin añadir una valoración no explícita. ''Oro y plata'' conserva el par lexical fijo del original.'
- source_word: በጽነኔ
  english_pob_choice: in injustice / in oppression
  chosen_spanish: en injusticia
  alternatives_spanish:
  - en opresión
  - por violencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Siguiendo la revisión más reciente del audit trail, la forma debe leerse como una expresión de injusticia/ilegitimidad ligada a la adquisición de riqueza. 'En injusticia' es la opción más sobria y fiel para el español.
- source_word: ፍጡነ ይትሐጐሉ
  english_pob_choice: will quickly be destroyed
  chosen_spanish: serán destruidos rápidamente
  alternatives_spanish:
  - perecerán rápidamente
  - serán arruinados pronto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Destruidos'' mantiene el juicio severo del pasivo; ''rápidamente'' reproduce la intensificación temporal del adverbio.'
theological_decisions:
- issue: Alcance de 'casas'
  english_pob_reading: Retain the literal image 'houses' in the main text while allowing broader social implication.
  chosen_spanish_reading: Mantener 'casas' como imagen literal principal, sin convertirla en 'hogares' o 'linajes'.
  alternative_spanish_readings:
  - hogares
  - familias
  - estancias
  rationale: La mención de cimientos obliga a conservar el campo arquitectónico. En español, 'casas' permite además la posible extensión social sin borrarla.
  doctrine_reference: Preservar la imagen apocalíptica y no diluirla en paráfrasis.
- issue: Naturaleza de 'in injusticia'
  english_pob_reading: Those who acquire gold and silver in injustice are judged.
  chosen_spanish_reading: Vincular la obtención de oro y plata con una esfera de injusticia.
  alternative_spanish_readings:
  - con injusticia
  - mediante injusticia
  - en opresión
  rationale: El audit trail corrigió la lectura previa errónea hacia 'injustice'. El español puede sostener la locución 'en injusticia' de modo breve y transparente, aunque suene menos idiomática que otras opciones.
  doctrine_reference: Mantener la tensión léxica del texto fuente y respetar la revisión filológica.
- issue: Cláusula del espada entre corchetes
  english_pob_reading: Include the clause in the main text but preserve its bracketed uncertainty in a footnote.
  chosen_spanish_reading: Incluir la cláusula en el texto principal como marcada textual y editorialmente incierta.
  alternative_spanish_readings:
  - Omitir la cláusula
  - Incluirla sin marcas
  rationale: La cláusula está atestiguada con incertidumbre en el testigo etiópico; conviene traducirla, pero sin fingir seguridad textual.
  doctrine_reference: Transparencia textual ante variantes o incertidumbre en el testimonio.
translation_notes:
  revision_awareness: Se corrigió la lectura anterior errónea de በጽነኔ y se tuvo en cuenta la revisión crítica que la entiende como በኵነኔ ('en justicia/juicio'), evitando la glosa 'opresión' que no está respaldada por la revisión más reciente. También se conservó la cláusula entre corchetes sobre la espada como variante textual transparente.
  spanish_consistency_notes:
  - Se mantiene 'casas' y no 'hogares' para respetar la imagen arquitectónica del verso.
  - '''Cimientos'' se usa de manera concreta, no alegórica, en coherencia con la línea anterior.'
  - '''A espada'' conserva el giro bíblico breve y solemne.'
  - Se prefirió 'en injusticia' por ser la forma más alineada con la revisión filológica, aunque 'con injusticia' podría sonar más natural en español.
  - No se introduce 'Cristo', 'SEÑOR' ni otras equivalencias no presentes en el texto fuente.
