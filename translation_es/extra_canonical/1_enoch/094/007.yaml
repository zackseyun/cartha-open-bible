review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del versículo y conserva la imaginería principal: casas, cimientos, espada, oro y plata. Sin embargo, presenta dos problemas de alineación con la evidencia y el rastro de auditoría: (1) la nota textual sobre la cláusula entre corchetes está anclada en el lugar equivocado; el marcador [a] aparece tras «pecado» en vez de junto a la cláusula incierta «[y caerán a espada;]»; (2) «serán arrancadas desde todos sus cimientos» es menos fiel y menos natural que una formulación con «de/sobre» y con sujeto humano implícito o casas como imagen principal. El sentido adjudicado en el audit trail es que serán arrancados/arrancadas de sus cimientos, no simplemente ''desde''.'
  spanish_quality_summary: El español es generalmente legible y digno, pero hay detalles mejorables. «Desde todos sus cimientos» suena poco natural en este contexto; «de todos sus cimientos» o mejor «arrancados de sus cimientos»/«arrancadas de sus cimientos» es más idiomático. «En injusticia» es aceptable por fidelidad al audit trail, aunque algo rígido; no requiere cambio si se quiere conservar la concisión fuente. La puntuación y el tono general son adecuados.
  glossary_alignment: No hay conflicto con la terminología global del proyecto. El registro bíblico de «¡Ay de…!», «casas», «oro y plata», y «a espada» está bien. La decisión «en injusticia» es defendible dentro del rastro documental, aunque más literal que idiomática.
  issues:
  - severity: high
    issue: El marcador de la nota textual está mal colocado.
    rationale: La nota [a] explica la incertidumbre de la cláusula «y caerán a espada», pero en el texto está colocada tras «pecado». Esto incumple la disciplina de anclaje de notas y puede inducir a pensar que la incertidumbre textual afecta a «con pecado».
  - severity: medium
    issue: «Desde todos sus cimientos» es una formulación poco natural y débilmente alineada con la preposición fuente.
    rationale: La preposición Ge'ez corresponde a «de/des-de», pero en español «arrancadas desde todos sus cimientos» suena torpe. «Arrancadas de sus cimientos» comunica mejor la remoción violenta desde la base.
  - severity: low
    issue: La nota c editorializa de más la historia de revisión.
    rationale: La nota actual habla de una 'lectura revisada' y de 'revisión crítica del pasaje'. Sería mejor una nota más neutral si se mantiene, o incluso omitirla porque el inglés POB no exigía una nota aquí; pero no es un error grave.
