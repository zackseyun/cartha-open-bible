revisions:
- from: ¡Ay de ustedes[a], ricos, porque han confiado en sus riquezas, y de sus riquezas partirán[b], porque no se acordaron del Altísimo en los días de sus riquezas.
  to: ¡Ay de ustedes, ricos, porque han confiado en sus riquezas, y de sus riquezas se apartarán[a], porque no se acordaron del Altísimo en los días de sus riquezas.
  rationale: Se conserva el sentido del original y del POB, pero se corrige el aparato de notas y se mejora levemente la naturalidad del español. Se elimina una nota [a] innecesaria y se deja una sola nota útil en el punto de mayor ambigüedad léxica. También se sustituye «partirán» por «se apartarán» para expresar con más claridad la separación de las riquezas sin resolver la imagen apocalíptica más allá de lo que dice el texto.
