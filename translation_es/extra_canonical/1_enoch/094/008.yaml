review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del ge''ez y el rastro POB en casi todos los puntos: mantiene el oráculo de juicio («¡Ay de...!»), el vocativo a los ricos, la confianza mal puesta en las riquezas, el título divino «el Altísimo» y la cláusula temporal «en los días de sus riquezas». También preserva correctamente la ambigüedad de «salir/departir de las riquezas» sin fijarla como muerte o despojo. Sin embargo, la nota a en español no corresponde al tipo de alternativa preservada por el inglés y además crea una formulación redundante; la nota b fusiona dos notas inglesas distintas y conviene ajustarla para que el texto principal y la nota distingan mejor la lectura principal de la alternativa literal.'
  spanish_quality_summary: 'El español es claro, natural y de tono bíblico digno. La única mejora necesaria es pulir el aparato de notas: la nota a actual («¡Ay de ustedes, los ricos!») no aporta una alternativa significativa y suena menos natural; la nota b puede simplificarse para que el texto principal use una formulación más idiomática y la nota preserve la alternativa más literal. Además, «de sus riquezas se apartarán» suena algo más claro en español que «de sus riquezas partirán», manteniendo la imagen de separación.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «el Altísimo» corresponde bien a ለልዑል. No aparecen términos del glosario mayor que requieran excepción. La repetición de «riquezas» está bien preservada conforme a la decisión léxica auditada.
  issues:
  - severity: medium
    issue: La nota [a] no refleja una alternativa léxica relevante del original ni del POB inglés.
    rationale: El inglés marca la nota a sobre la frase principal de denuncia, pero el contenido útil de alternativa está realmente en la forma de apelación («rich ones / the rich»). En español, «¡Ay de ustedes, los ricos!» no mejora ni aclara; más bien introduce una aposición algo torpe.
  - severity: medium
    issue: La nota [b] combina dos funciones distintas del aparato inglés y puede organizarse mejor.
    rationale: El POB inglés tiene texto principal «depart» y una nota con la alternativa más literal «go out», además de una explicación interpretativa separada. En español conviene mantener un texto principal idiomático y una nota breve con la alternativa literal, sin sobrecargarla innecesariamente.
  - severity: low
    issue: «de sus riquezas partirán» es comprensible, pero no es la opción más natural en español para expresar separación de bienes.
    rationale: «Partir de» en español suele requerir complemento locativo o puede sonar como iniciar un viaje. «Se apartarán de sus riquezas» conserva mejor la idea de separación, sin cerrar la interpretación.
  revised_spanish_text: ¡Ay de ustedes, ricos, porque han confiado en sus riquezas, y de sus riquezas se apartarán[a], porque no se acordaron del Altísimo en los días de sus riquezas.
  revised_footnotes:
  - marker: a
    text: 'O: «de sus riquezas saldrán». La frase puede implicar ser separados de ellas o dejarlas atrás en el juicio, sin precisar el modo exacto.'
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del original y del POB, pero se corrige el aparato de notas y se mejora levemente la naturalidad del español. Se elimina una nota [a] innecesaria y se deja una sola nota útil en el punto de mayor ambigüedad léxica. También se sustituye «partirán» por «se apartarán» para expresar con más claridad la separación de las riquezas sin resolver la imagen apocalíptica más allá de lo que dice el texto.
