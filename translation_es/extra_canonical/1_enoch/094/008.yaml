translation:
  language: es
  text: ¡Ay de ustedes, ricos, porque han confiado en sus riquezas, y de sus riquezas se apartarán[a], porque no se acordaron del Altísimo en los días de sus riquezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de sus riquezas saldrán». La frase puede implicar ser separados de ellas o dejarlas atrás en el juicio, sin precisar el modo exacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La interjección profética de juicio se expresa de forma natural en español con «¡Ay de...!», que conserva el tono de denuncia sin volverlo meramente exclamativo.
- source_word: አብዕልት
  english_pob_choice: rich ones
  chosen_spanish: ricos
  alternatives_spanish:
  - los ricos
  - personas ricas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El vocativo plural se entiende claramente como una apelación directa. «Ricos» preserva la concisión y el tono sentencioso del original.
- source_word: ብዕልክሙ
  english_pob_choice: your riches
  chosen_spanish: sus riquezas
  alternatives_spanish:
  - su riqueza
  - sus bienes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Riquezas» mantiene el campo léxico repetido en el versículo y conserva el paralelismo con la primera y la última cláusula.
- source_word: ተወከልክሙ
  english_pob_choice: you have trusted
  chosen_spanish: han confiado
  alternatives_spanish:
  - han puesto su confianza
  - han dependido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Confiado» reproduce el sentido de dependencia/reliance y suena natural en un oráculo moral dirigido al lector.
- source_word: ትወፅኡ
  english_pob_choice: you will depart
  chosen_spanish: partirán
  alternatives_spanish:
  - saldrán
  - se apartarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de salida se conserva como separación de las riquezas. «Partirán» es más idiomático en español que un calco como «saldrán de sus riquezas», y mantiene la ambigüedad sobre el modo exacto del juicio.
- source_word: ለልዑል
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Muy Alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Título divino estándar y transparente en español bíblico; «Altísimo» preserva el tono reverente sin introducir formulaciones eclesiales innecesarias.
- source_word: ኢተዘከርክምዎ
  english_pob_choice: you did not remember
  chosen_spanish: no se acordaron
  alternatives_spanish:
  - no recordaron
  - no tuvieron presente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Acordarse» expresa el olvido culpable de manera idiomática y conserva la carga ética de la frase.
- source_word: በመዋዕለ ብዕልክሙ
  english_pob_choice: in the days of your riches
  chosen_spanish: en los días de sus riquezas
  alternatives_spanish:
  - durante sus días de riqueza
  - en el tiempo de su prosperidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la estructura temporal y la repetición de «riquezas», que forma parte del énfasis retórico del versículo.
theological_decisions:
- issue: Sentido de «partirán de sus riquezas»
  english_pob_reading: Retain the literal image of departure from riches rather than interpret it explicitly as death, dispossession, or exile.
  chosen_spanish_reading: Mantener la imagen literal de separación de las riquezas, sin precisar si implica muerte, desposesión o expulsión.
  alternative_spanish_readings:
  - partirán dejando sus riquezas
  - serán despojados de sus riquezas
  - morirán y dejarán sus riquezas
  rationale: El ge'ez conserva una imagen breve y abierta. «Partirán» permite mantener la tensión interpretativa y evita resolver el alcance del juicio más allá de lo que el texto afirma.
  doctrine_reference: Preservar la tensión teológica y la imaginería apocalíptica sin sobreinterpretación.
translation_notes:
  revision_awareness: La redacción sigue de cerca el testimonio ge'ez y el audit trail en inglés. Se conserva la fórmula de juicio, el paralelismo léxico con «riquezas» y la ambigüedad deliberada de la cláusula de salida/departida, evitando resolver el destino exacto de las riquezas o del sujeto.
  spanish_consistency_notes:
  - Se usa «Altísimo» como equivalente estándar de ለልዑል.
  - Se mantiene «riquezas» en todo el versículo para reproducir la repetición retórica del original.
  - «Partirán» conserva la imagen de separación sin convertirla en paráfrasis interpretativa.
