  source_alignment_summary: 'El borrador español preserva bien la estructura exhortativa del ge’ez: transición temporal, vocativo a los justos, doble prohibición sobre los caminos del mal y de la muerte, advertencia de no acercarse a ''ellos'' y cláusula final de resultado negativo. Sin embargo, la cláusula final ''para que no sean destruidos'' suena menos fiel al matiz de advertencia negativa que ''no sea que perezcan'' o ''para que no perezcan'', y además la nota b mezcla español con inglés (''swept away'').'
  spanish_quality_summary: 'El español es claro y legible, pero puede pulirse para mayor naturalidad y dignidad bíblica. ''Los justos'' y ''no anden en los caminos'' funcionan bien. La nota a está mal anclada: el marcador [a] aparece en ''ustedes'', pero la nota trata sobre ''caminos/sendas''. También conviene evitar el pasivo pesado ''sean destruidos'' en favor de ''perezcan'', que es más idiomático y además coincide con la alternativa documentada por el POB.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Los justos', 'mal', 'muerte' y 'ellos' concuerdan con las decisiones léxicas auditadas. La principal corrección es de estilo y de anclaje de nota, no de glosario.
  issues:
  - severity: medium
    issue: Marcador de nota [a] mal colocado
    rationale: La nota a explica la elección léxica de 'caminos' frente a 'sendas', pero el marcador [a] está puesto tras 'ustedes'. Debe anclarse en 'caminos' o en la primera ocurrencia pertinente.
  - severity: medium
    issue: La cláusula final 'para que no sean destruidos' es poco natural y algo pesada
    rationale: Aunque semánticamente posible, en español bíblico natural la advertencia negativa se expresa mejor como 'no sea que perezcan' o 'para que no perezcan'. Esto preserva mejor el valor exhortativo y evita un pasivo torpe.
  - severity: low
    issue: La nota b contiene una intrusión de inglés
    rationale: La glosa 'swept away' no debe quedar en inglés dentro de la nota española; debe verterse como 'arrebatados' o 'arrastrados'.
  revised_spanish_text: 'Y ahora les digo a ustedes, los justos: no anden en los caminos[a] del mal, ni en los caminos de la muerte, y no se acerquen a ellos[b], no sea que perezcan.'
  revised_footnotes:
