translation:
  language: es
  text: 'Y ahora les digo a ustedes, los justos: no anden en los caminos[a] del mal, ni en los caminos de la muerte, y no se acerquen a ellos[b], no sea que perezcan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sendas'; la imagen es la metáfora moral habitual de un curso de vida.
    reason: lexical_alternative
  - marker: b
    text: La advertencia final también puede traducirse 'no sea que sean destruidos' o 'no sea que sean arrebatados'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y en este momento
  - Y ahora bien
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un marcador temporal/discursivo de transición a una nueva admonición; “Y ahora” comunica bien el giro exhortativo en español natural.
- source_word: እብል
  english_pob_choice: I say
  chosen_spanish: les digo
  alternatives_spanish:
  - digo
  - les hablo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de habla mantiene la fuerza directa de la advertencia; en español, el dativo explícito “les” hace clara la apelación a los destinatarios.
- source_word: ለጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Justos” es la equivalencia más estable y natural para el grupo moralmente íntegro al que se dirige el texto; conserva la categoría ética recurrente.
- source_word: ኢትሖሩ
  english_pob_choice: do not walk
  chosen_spanish: no anden
  alternatives_spanish:
  - no caminen
  - no vayan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con “caminos”, el idiomático “andar” reproduce la metáfora moral de vida/conducta sin volverla demasiado literal o mecánica.
- source_word: በፍኖዋተ
  english_pob_choice: in the paths of
  chosen_spanish: en los caminos de
  alternatives_spanish:
  - en las sendas de
  - en los senderos de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Caminos” es una imagen ética muy clara en español y conserva el valor metafórico del plural ge’ez para una manera de vivir.
- source_word: እኩይ
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - la maldad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el contraste es de conducta/camino; “el mal” resulta más natural que “malvado” y no introduce una personificación innecesaria.
- source_word: ሞት
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  - mortalidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el sustantivo directo para mantener el contraste tajante entre vida y muerte propio del lenguaje sapiencial y apocalíptico.
- source_word: ኢትቅረቡ ኀቤሆሙ
  english_pob_choice: do not draw near to them
  chosen_spanish: no se acerquen a ellos
  alternatives_spanish:
  - no se aproximen a ellos
  - no se alleguen a ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural pronominal sugiere personas asociadas con esos caminos; “acercarse” conserva tanto la proximidad como la idea de asociación y participación.
- source_word: ከመ ኢትትሐጐሉ
  english_pob_choice: lest you be destroyed
  chosen_spanish: para que no sean destruidos
  alternatives_spanish:
  - no sea que sean destruidos
  - para que no perezcan
  - no sea que perezcan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula expresa un resultado negativo/advertencia. “Ser destruidos” mantiene la gravedad del juicio sin definir de más si el matiz es físico, moral o judicial.
theological_decisions:
- issue: Referente de “ellos” en la advertencia final
  english_pob_reading: The pronoun refers to people characterized by the paths of evil and death, not merely the abstract paths themselves.
  chosen_spanish_reading: “Ellos” se entiende primariamente como personas identificadas con esos caminos, no solo como caminos abstractos.
  alternative_spanish_readings:
  - El pronombre podría referirse a los caminos mismos en sentido metafórico
  - 'La referencia queda amplia: caminos y quienes los siguen'
  rationale: El ge’ez usa un pronombre plural que naturalmente apunta a sujetos asociados con los caminos mencionados. Mantener “ellos” en español preserva esa ambigüedad útil sin cerrarla demasiado.
  doctrine_reference: Sabiduría ética/apocalíptica de Enoch; advertencia sobre asociación con el mal y juicio consecuente
translation_notes:
  revision_awareness: La versión inglesa auditada ya había sido revisada sin cambios sustantivos y cuenta con alta concordancia. Esta traducción española sigue esa lectura estable, manteniendo la metáfora moral de caminos, el sujeto plural implícito en “ellos”, y la severidad de la advertencia final sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto cuando aparezca el Tetragrámaton; aquí no aparece.
  - “Justos” se usa para ለጻድቃን, en línea con el valor ético del pasaje.
  - “Caminos”/“andar” preservan la metáfora de conducta de manera fluida en español.
  - La clausula final se dejó en forma de consecuencia negativa para reflejar el tono admonitorio del original.
