  glossary_alignment: No hay términos del glosario mayor en conflicto salvo el principio proyectual para lenguaje tipo δικαιοσύνη, que favorece «justicia/rectitud» por contexto. En este contexto paraenético, «rectitud» alinea mejor con la decisión inglesa documentada («righteousness») que «justicia». Los demás términos están bien resueltos.
