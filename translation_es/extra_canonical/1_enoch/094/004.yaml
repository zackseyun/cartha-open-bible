translation:
  language: es
  text: Pero busquen y elijan para ustedes rectitud[a] y una vida buena[b], y anden por los caminos de la paz[c], para que vivan y prosperen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia».
    reason: lexical_alternative
  - marker: b
    text: O «una buena vida»; el ge'ez es algo difícil en este testigo OCR, pero el sentido apunta a una vida caracterizada por el bien o la bondad.
    reason: textual_variant
  - marker: c
    text: O «anden por los caminos de paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: እላ / አላ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino que
  - Mas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La evidencia revisada indica un valor adversativo inicial; en español, «Pero» comunica mejor el contraste exhortativo sin volver el verso arcaico.
- source_word: ፍቅዱ
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - busquen con empeño
  - deseen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la adjudicación revisada que entiende el verbo como exhortación a buscar o desear. «Busquen» preserva el impulso volitivo sin añadir interpretación excesiva.
- source_word: ወኀረዩ
  english_pob_choice: choose
  chosen_spanish: elijan
  alternatives_spanish:
  - escojan
  - seleccionen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Elijan» es el equivalente natural de una decisión moral deliberada y conserva la fuerza imperativa del original.
- source_word: ጽድቀ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - justicia/rectitud
  - rectitud
  - justificación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés POB prefiere «righteousness», en español «justicia» comunica mejor el campo ético-covenantal sin sonar redundante con «vida buena». Mantengo el sentido moral fuerte sin reducirlo a mera legalidad.
- source_word: ወሕይወተ ኄራተ
  english_pob_choice: a good life
  chosen_spanish: una vida buena
  alternatives_spanish:
  - una vida buena
  - una vida de bondad
  - una buena vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La combinación apunta a vida caracterizada por bondad o rectitud. «Una vida buena» conserva la cualidad moral del sustantivo y evita el matiz demasiado coloquial de «buena vida».
- source_word: ወሖሩ
  english_pob_choice: walk
  chosen_spanish: anden
  alternatives_spanish:
  - caminen
  - vayan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Anden» mantiene la metáfora bíblica del modo de conducta, propia del registro sapiencial y exhortativo.
- source_word: በፍኖዋተ ሰላም
  english_pob_choice: in the paths of peace
  chosen_spanish: por los caminos de la paz
  alternatives_spanish:
  - en los caminos de paz
  - en las sendas de la paz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen plural de caminos/sendas se preserva. «Por» funciona bien con el verbo «andar» y sugiere la trayectoria de conducta.
- source_word: ወተሐደዉ
  english_pob_choice: so that you may live
  chosen_spanish: para que vivan
  alternatives_spanish:
  - para que vivan ustedes
  - y vivan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor resultativo se expresa naturalmente con «para que». Dado el contexto exhortativo, «vivan» transmite el propósito del camino recto.
- source_word: ወትደለዉ
  english_pob_choice: and prosper
  chosen_spanish: y prosperen
  alternatives_spanish:
  - y tengan prosperidad
  - y florezcan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Prosperen» conserva el cierre sapiencial de éxito/florecimiento sin limitarlo a riqueza material.
theological_decisions:
- issue: 'Cómo traducir el par ético final: «righteousness» y «a good life»'
  english_pob_reading: righteousness and a good life
  chosen_spanish_reading: justicia y una vida buena
  alternative_spanish_readings:
  - justicia y rectitud
  - rectitud y una vida buena
  - justicia y una buena vida
  rationale: El texto exhorta a una elección moral concreta. «Justicia» conserva el peso normativo y «una vida buena» mantiene el matiz de vida cualificada por el bien, sin duplicar innecesariamente el primer término.
  doctrine_reference: 'Principio POB sobre δικαιοσύνη-like language: preferir un término ético amplio y no reducirlo a legalismo.'
translation_notes:
  revision_awareness: 'El borrador anterior en inglés fue corregido por revisión auditada: «Love righteousness» era una mala lectura; el paquete revisado entiende la apertura como un imperativo adversativo con «seek». La versión española refleja esa corrección y evita perpetuar la lectura descartada.'
  spanish_consistency_notes:
  - Se mantiene «justicia» para el campo de δικαιοσύνη-like language en esta unidad.
  - Se evita «Señor» y otras sustituciones de estilo litúrgico, porque el versículo no contiene el tetragrámaton ni un título divino que exija esa convención.
  - «Anden» y «caminos» conservan la metáfora conductual característica del material sapiencial/apocalíptico.
  - La puntuación y el orden buscan ser publicables en español moderno sin perder la paralelidad del original.
