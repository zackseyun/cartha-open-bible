translation:
  language: es
  text: ¡Ay de los que levantan la iniquidad y la opresión, y ponen el cimiento del engaño[a], pues serán derribados rápidamente[b], y no tendrán paz!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión del ge'ez es algo incierta, pero claramente continúa la metáfora de construcción y la vincula con el engaño o el fraude. «Cimiento del engaño» conserva el sustantivo abstracto subyacente.
    reason: lexical_alternative
  - marker: b
    text: 'O: «¡Ay de los que levantan la iniquidad y la opresión, y ponen el cimiento del engaño, pues serán derribados rápidamente, y no tendrán paz!»'
    reason: previous_rendering
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Ay de los...!
  - ¡Ay!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce un oráculo de juicio. En español, «¡Ay de los que...!» preserva el tono profético sin volverlo meramente exclamativo o sentimental.
- source_word: የሐንጽዋ
  english_pob_choice: build up
  chosen_spanish: edifican
  alternatives_spanish:
  - construyen
  - edifican
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la metáfora arquitectónica. «Edifican» suena natural en español y conserva la idea de levantar algo de manera intencional.
- source_word: ለዓመፃ
  english_pob_choice: unrighteousness
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la injusticia
  - el mal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Iniquidad» conserva mejor el peso moral y judicial del término que una simple «injusticia», y encaja con el registro de denuncia.
- source_word: ወለግፍዕ
  english_pob_choice: oppression
  chosen_spanish: la opresión
  alternatives_spanish:
  - la violencia
  - la extorsión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Opresión» es la equivalencia más directa y comprensible en español para el daño coercitivo y abusivo del término.
- source_word: ወይሣርርዋ ለጕሕሉት
  english_pob_choice: and who lay the foundation of deceit
  chosen_spanish: y ponen el cimiento del engaño
  alternatives_spanish:
  - y ponen el cimiento de la falsedad
  - y establecen el engaño
  - y edifican con fraude
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La evidencia revisada favorece un sustantivo abstracto («engaño/fraude») como objeto de la acción. «Ponen el cimiento del engaño» conserva la imagen de construcción y evita convertir el sustantivo en adjetivo.
- source_word: ፍጡነ
  english_pob_choice: swiftly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - con rapidez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa inmediatez de juicio con naturalidad en español contemporáneo, sin perder el matiz de urgencia.
- source_word: ይትነሠቱ
  english_pob_choice: they will be overthrown
  chosen_spanish: serán derribados
  alternatives_spanish:
  - serán derrocados
  - serán destruidos
  - serán abatidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto de construcción favorece una imagen de colapso o derrumbe. «Serán derribados» preserva esa metáfora y el sentido judicial de ruina.
- source_word: ወአልቦሙ ሰላመ
  english_pob_choice: and they will have no peace
  chosen_spanish: y no tendrán paz
  alternatives_spanish:
  - y no habrá paz para ellos
  - y no tendrán paz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula final de juicio directa y sobria. «No tendrán paz» es idiomático y mantiene la finalidad absoluta del enunciado.
theological_decisions:
- issue: Preservar o no la metáfora de construcción y derrumbe
  english_pob_reading: Preserve the building/foundation metaphor throughout the verse
  chosen_spanish_reading: Se preserva la metáfora de edificar, poner cimiento y ser derribados
  alternative_spanish_readings:
  - 'Se podría abstraer como: «¡Ay de los que practican la iniquidad y la opresión, y el engaño; porque serán juzgados rápidamente!»'
  rationale: El ge'ez repite el lenguaje arquitectónico y el juicio responde naturalmente con la imagen del colapso. Mantener esa metáfora evita aplanar la fuerza apocalíptico-sapiencial del texto.
  doctrine_reference: 'Translation philosophy: no aplanar imágenes apocalípticas; equivalencia óptima con decisiones auditables.'
- issue: Matiz de ጕሕሉት como sustantivo abstracto
  english_pob_reading: the foundation of deceit
  chosen_spanish_reading: el cimiento del engaño
  alternative_spanish_readings:
  - el cimiento de la falsedad
  - cimientos engañosos
  rationale: La revisión textual favorece entender ጕሕሉት como sustantivo («engaño/fraude»), no como adjetivo. «Del engaño» preserva esa fuerza abstracta y la relación con el acto de construir.
  doctrine_reference: Source-based lexical/theological decision; respect for the revised audit trail.
translation_notes:
  revision_awareness: La revisión auditada corrige una lectura anterior que tomaba ጕሕሉት como si fuera adjetivo («deceitful foundations»). La forma española adopta la lectura revisada y conservadora con sustantivo abstracto («el cimiento del engaño»), manteniendo además el paralelismo arquitectónico confirmado por el contexto y por la última revisión sin cambios sustanciales.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando no hay equivalente directo en este versículo; aquí no aplica.
  - «Iniquidad» se eligió por fuerza judicial/moral, no por una simple equivalencia ética suave.
  - «Edifican» y «serán derribados» preservan el campo semántico de construcción y colapso.
  - La puntuación con exclamación inicial y pausa media sigue el tono oracular del original.
