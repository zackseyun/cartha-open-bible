translation:
  language: es
  text: Y después de eso vi ganado grande y negro, y he aquí, todos ellos cambiaron sus establos[a] y sus pastizales y sus terneros, y comenzaron a vivir unos con otros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase sobre cambiar «sus establos, sus pastizales y sus terneros» es difícil tanto textualmente como en sentido. El ge'ez parece reunir lugares y descendencia bajo un mismo verbo de cambio; también podría entenderse de manera más amplia como «sus lugares de habitación, sus lugares de pasto y sus crías».
    reason: textual_variant
  - marker: b
    text: 'O: «vivir juntos», «habitar unos con otros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: አልህምተ
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - cattle
  - reses
  - bovinos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de la visión animal, el término apunta a un colectivo bovino. «Ganado» conserva el valor genérico y la imaginería apocalíptica sin forzar sexo ni especie más de lo que el texto exige.
- source_word: ዐቢያነ
  english_pob_choice: large
  chosen_spanish: grande
  alternatives_spanish:
  - grandes
  - vasto
  - enormes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo expresa tamaño o prominencia. «Grande» es natural en español y reproduce el valor visual de la escena.
- source_word: ጸሊማነ
  english_pob_choice: black
  chosen_spanish: negro
  alternatives_spanish:
  - oscuro
  - de color negro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige una propuesta anterior de «dark» y establece que el contraste simbólico del ciclo zoológico exige «black». En español, «negro» conserva ese contraste cromático y tipológico.
- source_word: ወለጡ
  english_pob_choice: changed
  chosen_spanish: cambiaron
  alternatives_spanish:
  - alteraron
  - intercambiaron
  - dejaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica un cambio o alteración respecto de lo que sigue. «Cambiaron» es la forma más directa y clara para el lector español.
- source_word: ምዕያኖሙ
  english_pob_choice: stalls
  chosen_spanish: establos
  alternatives_spanish:
  - moradas
  - lugares donde se guardan
  - corrales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un contexto de ganado, el lugar correspondiente es el establo. Aunque existe la posibilidad más amplia de «moradas», «establos» mantiene la imagen animal concreta que la traducción inglesa también preserva.
- source_word: ምርጓዮሙ
  english_pob_choice: pastures
  chosen_spanish: pastizales
  alternatives_spanish:
  - pastos
  - praderas
  - lugares de pasto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo remite a lugares de pastoreo o alimentación. «Pastizales» suena natural en español y conserva la relación con el cuidado del ganado.
- source_word: አጥዐጥሆሙ
  english_pob_choice: their calves
  chosen_spanish: sus terneros
  alternatives_spanish:
  - sus crías
  - sus hijos
  - su descendencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa decidió mantener la referencia bovina específica; por eso en español conviene «terneros» y no un término más general como «crías» o «descendencia».
- source_word: አሐዙ ተየሐይዉ ፩ ለካልኡ
  english_pob_choice: they began to live with one another
  chosen_spanish: comenzaron a vivir uno con otro
  alternatives_spanish:
  - vivieron juntos
  - empezaron a convivir entre sí
  - comenzaron a habitar juntos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia verbal expresa cohabitación o vida compartida. «Comenzaron a vivir uno con otro» mantiene el inicio de esa convivencia y evita una paráfrasis excesiva.
theological_decisions:
- issue: Preservación de la imaginería animal en lugar de interpretar explícitamente los referentes humanos
  english_pob_reading: Keep the animal imagery literal in the main text
  chosen_spanish_reading: Mantener la imaginería animal literal en el texto principal
  alternative_spanish_readings:
  - Traducir de forma interpretativa con referentes humanos implícitos
  rationale: Como en el POB inglés, la función de la visión es apocalíptica y simbólica. La traducción debe conservar la imagen de ganado y sus cambios, dejando la interpretación para notas o comentario, no para el texto principal.
  doctrine_reference: 'Contexto del libro: preservar el lenguaje visionario y apocalíptico'
translation_notes:
  revision_awareness: La versión inglesa auditada corrigió una duplicación accidental al inicio y también revirtió una opción previa de «dark» a «black» por razones tipológicas y léxicas en el ciclo zoomórfico del Animal Apocalypse. La presente propuesta sigue esa revisión y mantiene la imaginería literal, con una nota para la dificultad de la cláusula media.
  spanish_consistency_notes:
  - Se mantiene «Y después de eso» para reproducir el enlace narrativo del original.
  - Se usa «negro» para respetar el contraste cromático documentado en el aparato auditado.
  - 'Se conserva la estructura paralela de tres elementos: establos, pastizales y terneros.'
  - «Vivir uno con otro» evita intensificar el texto más allá de la convivencia indicada por el original.
