  glossary_alignment: 'La terminología clave está bien alineada con el proyecto y con las decisiones léxicas auditadas: አልህምተ -> «ganado», ጸሊማነ -> «negro» conforme a la revisión adjudicada, y se preserva la imaginería apocalíptica sin interpretación explicativa. No hay conflictos con la glosa teológica del proyecto.'
