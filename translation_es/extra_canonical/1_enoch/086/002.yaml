base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/086/002.yaml
  text: And after that I saw large and black cattle[a], and behold, all of them changed their stalls and their pastures and their calves[c][b], and they began to live with one another.
  footnotes:
  - marker: a
    text: The clause about changing 'their stalls and their pastures and their calves' is textually and semantically difficult. The Ge'ez appears to list places and offspring together under one verb of change or alteration; a broader sense such as 'their dwelling places, their grazing places, and their young' is also possible.
    reason: textual_variant
  - marker: b
    text: The final phrase may also be rendered 'they lived together' or 'they dwelt with one another.'
    reason: lexical_alternative
  - marker: c
    text: Or 'dark'.
    reason: previous_rendering
