review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la secuencia visionaria del ge''ez y del POB inglés: repetición de ver, marco onírico, visión del cielo, partícula deíctica, caída de una estrella, y la doble acción final de comer y pastar. También mantiene correctamente «estrella» sin interpretación angelológica añadida. Sin embargo, «aquel ganado» no refleja con suficiente precisión el demostrativo plural de «those cattle»; en español conviene «ese ganado» o «aquellos animales de ganado», y «de aquel ganado» suena algo distante y menos natural. Además, falta trasladar las notas del POB inglés que preservan decisiones significativas.'
  spanish_quality_summary: El español es generalmente claro, digno y legible. «Y otra vez» funciona, aunque «Y de nuevo» sonaría un poco más fluido; no es un problema. «El cielo de lo alto» es comprensible, pero «el cielo arriba» sería demasiado coloquial y «el cielo en lo alto» sería más idiomático; aun así, la frase actual es aceptable. El punto más débil es «en medio de aquel ganado», que suena menos natural y menos exacto que «en medio de ese ganado». También conviene añadir notas para conservar la distinción entre «comió» y «pastó» y la posible lectura simbólica de «estrella», ya documentadas por el POB.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos como Yahvé, Mesías, Espíritu, etc. La decisión teológica de mantener «una estrella» sin glosa interpretativa está bien alineada. La corrección previa de «calves» a «cattle» debe mantenerse en español como «ganado», no «terneros».
  issues:
  - severity: medium
    issue: Falta de notas que preserven decisiones auditadas del POB inglés
    rationale: El POB inglés conserva notas relevantes sobre «estrella» como símbolo y sobre la doble acción «ate and grazed/fed». El español debería preservarlas aquí, pues siguen siendo significativas y no generan sobrecarga.
  - severity: low
    issue: «Aquel ganado» suena menos natural y menos preciso que el demostrativo esperado
    rationale: El texto fuente/inglés apunta a «those cattle». En español, «ese ganado» o «aquel ganado» pueden traducir deixis, pero «ese ganado» resulta más natural en este contexto narrativo sin perder referencia.
  - severity: low
    issue: La correspondencia de notas del inglés quedó alterada por la revisión de «cattle»
    rationale: La nota inglesa marcada como c dice «Or ‘calves’», pero tras la revisión adjudicada el texto principal es «cattle». En español no conviene replicar esa nota como si fuera una alternativa preferible; debe omitirse para no reintroducir una lectura corregida.
  revised_spanish_text: Y otra vez miré con mis ojos mientras dormía, y vi el cielo de lo alto, y he aquí, una estrella[a] cayó del cielo, y se levantó y comió y pastó[b] en medio de ese ganado.
  revised_footnotes:
  - marker: a
    text: En el Apocalipsis de los Animales, las estrellas a menudo funcionan como seres celestiales simbólicos, pero el versículo mismo dice «estrella».
    reason: cross_reference
  - marker: b
    text: Los verbos finales son literalmente «comió y pastó / se alimentó», conservando la imaginería animal de la visión en lugar de suavizarla en una sola acción.
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del original, pero se ajusta «aquel ganado» a «ese ganado» por naturalidad y precisión contextual, y se restauran las notas relevantes del POB inglés sin reintroducir la alternativa corregida «calves».
