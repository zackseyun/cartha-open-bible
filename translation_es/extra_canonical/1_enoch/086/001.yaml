translation:
  language: es
  text: Y otra vez miré con mis ojos mientras dormía, y vi el cielo de lo alto, y he aquí, una estrella[a] cayó del cielo, y se levantó y comió y pastó[b] en medio de ese ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En el Apocalipsis de los Animales, las estrellas a menudo funcionan como seres celestiales simbólicos, pero el versículo mismo dice «estrella».
    reason: cross_reference
  - marker: b
    text: Los verbos finales son literalmente «comió y pastó / se alimentó», conservando la imaginería animal de la visión en lugar de suavizarla en una sola acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ካዕበ
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca la reanudación de la secuencia visionaria. «Otra vez» conserva el ritmo narrativo sin sonar rígido en español.
- source_word: ርኢኩ በአዕይንትየ
  english_pob_choice: I looked with my eyes / I saw
  chosen_spanish: miré con mis ojos
  alternatives_spanish:
  - vi
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión refuerza el acto de ver en primera persona dentro de la visión. «Miré con mis ojos» conserva el paralelismo explícito del original, aunque en español suene más marcado que un simple «vi».
- source_word: እንዘ እነውም
  english_pob_choice: while I was sleeping
  chosen_spanish: mientras dormía
  alternatives_spanish:
  - cuando dormía
  - estando dormido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa claramente el marco onírico de la visión con una construcción natural en español.
- source_word: ሰማየ መልዕልተ
  english_pob_choice: the heaven above
  chosen_spanish: el cielo de lo alto
  alternatives_spanish:
  - el cielo alto
  - el cielo de arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro indica la esfera celestial superior. «De lo alto» mantiene la referencia ascendente sin introducir una cosmología más técnica de la que da el texto.
- source_word: ነዋ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - véase
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserva el registro apocalíptico y deíctico del introducción del elemento sorprendente de la visión.
- source_word: ኮከብ አሐዱ
  english_pob_choice: one star
  chosen_spanish: una estrella
  alternatives_spanish:
  - una sola estrella
  - un astro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Estrella» reproduce el símbolo sin interpretarlo. El numeral queda implícito en el artículo indefinido, suficiente para el español natural.
- source_word: ወድቀ እምሰማይ
  english_pob_choice: fell from heaven
  chosen_spanish: cayó del cielo
  alternatives_spanish:
  - cayó desde el cielo
  - se precipitó del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cielo» es el equivalente más idiomático y solemne en español para el ámbito celestial. «Cayó» conserva la fuerza visual y ominosa del verbo.
- source_word: ወይትሌዐል
  english_pob_choice: it arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Tras caer, la estrella vuelve a erguirse. «Se levantó» es una forma natural que mantiene la secuencia del movimiento.
- source_word: ወይበልዕ
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - devoró
  - alimentó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ordinario «comer» conserva la imagen básica sin intensificarla más allá del texto.
- source_word: ወይትረዐይ
  english_pob_choice: grazed / fed
  chosen_spanish: pastó
  alternatives_spanish:
  - pacía
  - se alimentó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El segundo verbo mantiene la imagen ganadera separada del primero. «Pastó» o «pacía» comunican el acto de alimentarse en contexto de animales y preservan la duplicación verbal.
- source_word: ማእከለ እልከቱ አልህምት
  english_pob_choice: in the midst of those cattle
  chosen_spanish: en medio de aquel ganado
  alternatives_spanish:
  - en medio de aquel ganado vacuno
  - en medio de aquellos bovinos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión reciente corrigió «calves» a «cattle». «Ganado» transmite de forma natural el colectivo bovino sin perder la referencia allegórica, y «aquel» conserva la deixis del visionario.
theological_decisions:
- issue: Si la estrella debe interpretarse en el texto principal como ser angelical o mantenerse como símbolo
  english_pob_reading: Retain 'one star' without interpretive expansion.
  chosen_spanish_reading: Mantener «una estrella» sin expansión interpretativa.
  alternative_spanish_readings:
  - un ángel estelar
  - un ángel
  rationale: En la literatura enóquica las estrellas suelen simbolizar seres celestiales, pero el versículo presenta la imagen como estrella dentro de una visión onírica. La traducción conserva la tensión simbólica y no la resuelve en el texto.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión interpretativa.
translation_notes:
  revision_awareness: 'La redacción incorpora la revisión más reciente del audit trail: el término Ge''ez አልህምት se entiende como ''cattle/ganado'' y no como ''calves/terneros''. También se conserva la preferencia del POB inglés por no interpretar la ''estrella'' como un ángel en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y apocalíptico, con vocabulario comprensible en español bíblico contemporáneo.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes; el versículo no contiene el nombre divino.
  - Se preservó la duplicación verbal ('comió' / 'pastó') porque forma parte de la imaginería del pasaje.
  - No se añadieron notas al pie porque el español no introdujo una ambigüedad adicional que requiriera marcación textual.
