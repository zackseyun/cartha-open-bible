  language: en
  yaml_path: translation/extra_canonical/1_enoch/086/001.yaml
  text: And again I looked with my eyes while I was sleeping[a], and I saw heaven above, and behold, one star fell from heaven[c][b], and it arose and ate and grazed in the midst of those cattle.
  footnotes:
  - marker: a
    text: In the Animal Apocalypse, stars commonly function as symbolic heavenly beings, but the verse itself says 'star.'
    reason: cross_reference
  - marker: b
    text: The final verbs are literally 'ate and grazed/fed,' preserving the animal imagery of the vision rather than smoothing it into a single action.
    reason: lexical_alternative
  - marker: c
