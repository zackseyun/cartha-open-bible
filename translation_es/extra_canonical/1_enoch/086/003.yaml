    text: The phrase 'that first star' likely points back to a previously mentioned star in the vision rather than introducing a new figure.
    reason: cross_reference
  - marker: b
    text: '''Stars'' may symbolize heavenly beings, but the translation keeps the visionary image explicit rather than interpreting it in the main text.'
    reason: lexical_alternative
  - marker: c
    text: The final clause is difficult. The Ge'ez most naturally yields 'they were seen among them,' though 'they appeared with them' is also possible.
    reason: alternative_reading
  - marker: d
    text: Or 'among those bulls they became horses, and they were seen among them.'.
