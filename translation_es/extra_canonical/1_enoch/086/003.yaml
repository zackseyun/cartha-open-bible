translation:
  language: es
  text: Y otra vez vi en la visión, y miré al cielo; y he aquí, vi muchas estrellas. Bajaron y fueron arrojadas del cielo a aquella primera estrella[a], y entre aquellos terneros se volvieron toros[d][c][b], y pastaron con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «aquella primera estrella» probablemente remite a una estrella mencionada antes en la visión, no a una figura nueva.
    reason: cross_reference
  - marker: b
    text: «Estrellas» puede simbolizar seres celestiales, pero la traducción conserva explícitamente la imagen visionaria en lugar de interpretarla en el texto principal.
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula final fue entendida antes como visión o aparición, pero la revisión del ge’ez favorece el sentido de pastoreo: «pastaron con ellos».'
    reason: source_note
  - marker: d
    text: La imaginería del Apocalipsis de los Animales exige mantener el cambio zoomórfico de modo concreto, sin sustituirlo por una explicación alegórica.
    reason: theological_note
lexical_decisions:
- source_word: ወካዕበ
  english_pob_choice: And again
  chosen_spanish: Y otra vez
  alternatives_spanish:
  - Y de nuevo
  - Y otra vez más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula retomada marca una nueva escena del mismo relato visionario; «Y otra vez» conserva el valor repetitivo y el tono apocalíptico sin volverse pesado.
- source_word: ርኢኩ በራእይ
  english_pob_choice: I saw in the vision
  chosen_spanish: vi en la visión
  alternatives_spanish:
  - vi en una visión
  - vi en la visión-report
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene explícito el marco visionario. En español, «en la visión» suena más natural y fiel al registro que una expansión interpretativa.
- source_word: ነጸርክዎ ለሰማይ
  english_pob_choice: I looked up to heaven
  chosen_spanish: miré al cielo
  alternatives_spanish:
  - miré hacia el cielo
  - levanté la vista al cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El movimiento visual ascendente queda claro en español con una formulación natural. «Cielo» conserva el referente vertical del texto apocalíptico.
- source_word: ነዋ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - y he aquí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la deíxis solemne y la vivacidad de la escena visionaria.
- source_word: ከዋክብተ ብዙኃነ
  english_pob_choice: many stars
  chosen_spanish: muchas estrellas
  alternatives_spanish:
  - una multitud de estrellas
  - numerosas estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Traducción directa y transparente del sustantivo plural con adjetivo, sin interpretar el símbolo en el texto principal.
- source_word: ወረዱ
  english_pob_choice: came down
  chosen_spanish: bajaron
  alternatives_spanish:
  - descendieron
  - vinieron abajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «bajaron» comunica el desplazamiento vertical con claridad y fluidez; evita una rigidez innecesaria.
- source_word: ተገደፉ እምሰማይ
  english_pob_choice: were cast from heaven
  chosen_spanish: fueron arrojadas del cielo
  alternatives_spanish:
  - fueron lanzadas del cielo
  - fueron precipitadas del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva expresa expulsión o derribo, no solo caída. «Arrojadas» conserva la fuerza judicial de la imagen.
- source_word: በኀበ ዝኩ ኮከብ ቀዳማዊ
  english_pob_choice: to that first star
  chosen_spanish: hacia aquella primera estrella
  alternatives_spanish:
  - a aquella primera estrella
  - hacia esa primera estrella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Aquella» respeta el valor deíctico retrospectivo que apunta a una figura ya introducida. «Primera» mantiene la referencia ordinal del original.
- source_word: ጣዕዋ
  english_pob_choice: calves
  chosen_spanish: terneros
  alternatives_spanish:
  - becerros
  - crías de ganado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el código animal de 1 Enoc, el término designa ganado joven; «terneros» es claro, bíblicamente comprensible y compatible con el campo semántico de crías bovinas.
- source_word: አልህምት ኮኑ
  english_pob_choice: they became bulls
  chosen_spanish: se volvieron toros
  alternatives_spanish:
  - se hicieron toros
  - se transformaron en toros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La transformación debe permanecer visible. «Toros» refleja mejor el bovino adulto masculino que «vacas» o un término genérico.
- source_word: ወምስሌሆሙ ይትረዓዩ
  english_pob_choice: and they were seen among them / and they appeared among them
  chosen_spanish: y pastaron con ellos
  alternatives_spanish:
  - y fueron vistos entre ellos
  - y aparecieron entre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indica que el verbo deriva de «pastar/graze», por lo que la lectura correcta es pastoral, no visual. En español, «pastaron con ellos» sigue la evidencia fuente y conserva la imagen zoomórfica.
theological_decisions:
- issue: Identidad de las estrellas en el Apocalipsis de los Animales
  english_pob_reading: Retain 'stars' literally in the main text without identifying them as angels.
  chosen_spanish_reading: Mantener «estrellas» literalmente en el texto principal, sin identificaras con ángeles.
  alternative_spanish_readings:
  - ángeles
  - seres angélicos simbolizados por estrellas
  rationale: El texto ge’ez dice «estrellas». Aunque el símbolo puede referirse a seres celestiales, la traducción debe conservar la imagen y no resolverla interpretativamente en el cuerpo principal.
  doctrine_reference: Preservar la tensión interpretativa sin imponer una identificación doctrinal en la traducción.
- issue: La relación entre el movimiento desde el cielo y la expulsión
  english_pob_reading: Translate as 'were cast from heaven' rather than simple 'fell.'
  chosen_spanish_reading: 'Traducir con una pasiva de expulsión: «fueron arrojadas del cielo».'
  alternative_spanish_readings:
  - cayeron del cielo
  - fueron echadas del cielo
  rationale: La pasiva del original sugiere acción ejercida sobre ellas, no simple descenso accidental. «Arrojadas» preserva el matiz de juicio.
  doctrine_reference: Prioridad del idioma original sobre la tradición de traducción.
- issue: Lectura final del verbo ይትረዓዩ
  english_pob_reading: The Ge'ez most naturally yields 'they were seen among them,' though 'they appeared with them' is also possible.
  chosen_spanish_reading: 'Leer el verbo en sentido de pastoreo: «pastaron con ellos».'
  alternative_spanish_readings:
  - fueron vistos entre ellos
  - aparecieron con ellos
  rationale: 'La revisión indicaba un error lexical importante: el verbo procede de la raíz de «pastorear/pastar», no de «ver». Por fidelidad a la fuente, la traducción debe reflejar convivencia/pastoreo bovino.'
  doctrine_reference: Corrección filológica basada en la fuente original.
translation_notes:
  revision_awareness: 'La versión inglesa auditada sufrió una revisión importante: la lectura previa de la clausula final como «were seen among them / appeared among them» fue corregida por la revisión filológica a «pastored with them». También se corrigieron errores léxicos en la fase intermedia sobre el campo bovino; por eso esta versión española sigue la última adjudicación y no la redacción inglesa anterior.'
  spanish_consistency_notes:
  - Se mantiene «cielo» para el referente superior apocalíptico, coherente con el español bíblico y con la imagen de descenso.
  - Se conserva «estrellas» en el texto principal para no resolver simbólicamente el signo.
  - Se usa vocabulario bovino concreto («terneros», «toros») para respetar la imaginería animal del libro.
  - No se introduce «Cristo», «Señor» ni equivalentes ajenos al texto fuente.
  - La decisión final sobre ይትረዓዩ sigue la revisión filológica más reciente, no la primera traducción inglesa.
