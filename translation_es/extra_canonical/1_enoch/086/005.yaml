translation:
  language: es
  text: Y todo el ganado les tuvo miedo y quedó aterrorizado por ellos, y ellos[a] empezaron a morder con sus dientes y a devorar y a cornear con sus cuernos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El ge''ez mantiene explícita la imaginería animal: el ganado reacciona con temor ante ellos, y luego ellos comienzan a atacar con dientes y cuernos. Los referentes simbólicos no se nombran en el verso.'
    reason: cultural_note
lexical_decisions:
- source_word: ኵሎሙ
  english_pob_choice: all
  chosen_spanish: todo el
  alternatives_spanish:
  - todos los
  - el conjunto de
  lexicon: Dillmann
  rationale: El cuantificador abarca al grupo entero; en español, «todo el» suena natural antes de un sustantivo colectivo como «ganado».
- source_word: አልህምት
  english_pob_choice: the cattle
  chosen_spanish: el ganado
  alternatives_spanish:
  - los bovinos
  - las reses
  - el rebaño
  lexicon: Dillmann
  rationale: «Ganado» conserva el campo semántico bovino sin forzar una subespecie. En español resulta más natural que una calca como «el ganado vacuno» en este contexto apocalíptico.
- source_word: ፈርህዎሙ
  english_pob_choice: feared them
  chosen_spanish: les tuvo miedo
  alternatives_spanish:
  - les temió
  - les tuvo temor
  lexicon: Dillmann
  rationale: El verbo expresa miedo directo con objeto pronominal. «Les tuvo miedo» es idiomático en español y mantiene la relación directa con «them».
- source_word: ወደንገፁ
  english_pob_choice: were terrified
  chosen_spanish: fue aterrorizado
  alternatives_spanish:
  - quedó aterrorizado
  - se llenó de terror
  - fue presa del pánico
  lexicon: Dillmann
  rationale: Se conserva la intensificación de un segundo verbo más fuerte que el simple temor. La pasiva refleja en español ayuda a mantener el valor resultativo sin introducir interpretaciones añadidas.
- source_word: እምኔሆሙ
  english_pob_choice: by them
  chosen_spanish: por ellos
  alternatives_spanish:
  - ante ellos
  - a causa de ellos
  lexicon: Dillmann
  rationale: Aunque el inglés revisado prefirió «by them», el ge'ez permite una relación de causa/ presencia temible. «Por ellos» mantiene la agencia temida sin fijar solo la localización espacial.
- source_word: አሐዙ
  english_pob_choice: they began
  chosen_spanish: empezaron
  alternatives_spanish:
  - comenzaron
  - se pusieron a
  lexicon: Dillmann
  rationale: Es un auxiliar incoativo; «empezaron» reproduce de manera natural el arranque de la acción.
- source_word: ይኔክሱ
  english_pob_choice: to bite
  chosen_spanish: a morder
  alternatives_spanish:
  - a masticar
  - a mordisquear
  lexicon: Dillmann
  rationale: Se preserva el sentido violento y literal del verbo. «A morder» es la equivalencia más directa y clara.
- source_word: በስኒሆሙ
  english_pob_choice: with their teeth
  chosen_spanish: con sus dientes
  alternatives_spanish:
  - por medio de sus dientes
  lexicon: Dillmann
  rationale: La construcción instrumental se expresa de forma natural en español con «con».
- source_word: ይውሕጡ
  english_pob_choice: to devour
  chosen_spanish: a devorar
  alternatives_spanish:
  - a tragar
  - a consumir
  lexicon: Dillmann
  rationale: «Devorar» conserva el matiz de violencia y consumo total mejor que «consumir», que sería más abstracto.
- source_word: ይወግኡ
  english_pob_choice: to gore
  chosen_spanish: a cornear
  alternatives_spanish:
  - a embestir con los cuernos
  - a herir con los cuernos
  lexicon: Dillmann
  rationale: Dado el complemento instrumental siguiente, el verbo específico debe relacionarse con el ataque de los cuernos. «Cornear» es la opción más concisa y fiel en español.
- source_word: በአቅርንቲሆሙ
  english_pob_choice: with their horns
  chosen_spanish: con sus cuernos
  alternatives_spanish:
  - por sus cuernos
  lexicon: Dillmann
  rationale: Se mantiene el instrumento concreto del ataque y el paralelismo con «con sus dientes».
theological_decisions:
- issue: Preservar la imaginería zoomórfica sin identificar explícitamente los referentes simbólicos
  english_pob_reading: Keep the animal imagery in the main text rather than unpacking the symbols into human groups
  chosen_spanish_reading: Conservar el lenguaje animal («ganado», «dientes», «cuernos») sin explicarlo como grupos humanos
  alternative_spanish_readings:
  - Traducir de forma interpretativa a los grupos humanos simbolizados
  - Añadir aclaraciones explicativas dentro del versículo
  rationale: El texto apocalíptico depende de la imaginería sostenida. La traducción no debe aplanar la visión ni introducir explicaciones que el verso no da.
  doctrine_reference: 'Principio del libro: no aplanar la imaginería cósmica/apocalíptica en lenguaje religioso genérico moderno.'
translation_notes:
  revision_awareness: 'La auditoría inglesa pasó por una corrección importante del sujeto en la segunda cláusula: el ge''ez indica que los nuevos animales nacidos en el v. 4 son quienes empiezan a atacar al ganado. En español, la forma plural «empezaron» mantiene esa continuidad narrativa sin añadir el pronombre demostrativo «estos»; el sujeto queda recuperable por el contexto inmediato y por la coordinación del período.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según convenga en otros pasajes, pero aquí no aparece ningún nombre divino.
  - Se conserva un registro apocalíptico sobrio y no explicativo.
  - «Ganado» se emplea como término zoomórfico amplio, no como interpretación del símbolo.
