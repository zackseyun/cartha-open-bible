translation:
  language: es
  text: Y comenzaron de nuevo a devorar ese ganado[a], y he aquí[c][b], todos los hijos de la tierra comenzaron [a temblar y huir].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término ge'ez አልህምት se entiende aquí como «ganado» o «bovinos», no «elefantes».
    reason: lexical_alternative
  - marker: b
    text: Se conserva literalmente «los hijos de la tierra» como giro apocalíptico, en vez de reducirlo a «habitantes de la tierra».
    reason: cultural_note
  - marker: c
    text: 'La partícula ge''ez ነዋ funciona como interjección de atención: «he aquí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: አሐዙ
  english_pob_choice: they began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  - se pusieron a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa inicio de una acción; en español, «comenzaron» conserva el valor narrativo de inicio sin añadir matices innecesarios.
- source_word: እንከ
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca repetición o reanudación de la acción. «De nuevo» suena natural y mantiene la continuidad del relato visionario.
- source_word: ይብልዕዎሙ
  english_pob_choice: to devour those
  chosen_spanish: a devorar aquel ganado
  alternatives_spanish:
  - a devorar a aquellos
  - a comerlos
  - a consumirlos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto apocalíptico pide un verbo fuerte como «devorar». Dado el dictamen revisado, «ganado» refleja mejor አልህምት que una traducción más general o animalizada erróneamente.
- source_word: አልህምት
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - bovinos
  - reses
  - toros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión estableció que el término significa «cattle / bovines», no «elephants». «Ganado» es el equivalente más natural y publicable en español, y conserva la referencia concreta sin interpretar simbólicamente.
- source_word: ነዋ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y mira
  - mira
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail revisado indica que ነዋ es una interjección de deíxis, no un verbo. «He aquí» reproduce la función exclamativa/atencional en español bíblico sin arcaísmo excesivo.
- source_word: ኵሎሙ ውሉደ ምድር
  english_pob_choice: all the children of the earth
  chosen_spanish: todos los hijos de la tierra
  alternatives_spanish:
  - todos los habitantes de la tierra
  - todos los hijos de la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva literalmente la expresión apocalíptica, como hizo la POB inglesa, para no aplanar el giro idiomático hacia «habitantes».
theological_decisions:
- issue: Conservar la imaginería apocalíptica sin descodificarla
  english_pob_reading: Animal Apocalypse imagery remains concrete rather than interpreted in translation
  chosen_spanish_reading: El pasaje conserva el ganado como imagen visionaria concreta, sin identificarlo en el texto principal con poderes o naciones.
  alternative_spanish_readings:
  - interpretar el ganado como reyes o imperios
  - explicar el símbolo dentro del versículo
  rationale: La traducción debe mantener el nivel de imagen del texto fuente. La descodificación pertenece al comentario, no al versículo.
  doctrine_reference: Preservar imaginería apocalíptica; no convertir la visión en prosa interpretativa.
translation_notes:
  revision_awareness: 'La base inglesa fue revisada: el manuscrito ge''ez no respalda «elephants»; አልህምት significa «cattle/bovines», y ነዋ es una interjección («behold»), no un verbo. Además, el tramo final visible de la línea quedó truncado en la extracción, por lo que la frase entre corchetes señala la parte inferida/esperada a partir del audit trail inglés, sin sobreafirmar más allá del texto recuperado.'
  spanish_consistency_notes:
  - Usé «Y» inicial para coordinar la escena narrativa, siguiendo el tono bíblico en español sin copiar mecánicamente la sintaxis inglesa.
  - Mantuve «hijos de la tierra» por coherencia con la expresión apocalíptica documentada en el POB inglés.
  - Preferí «ganado» frente a un término más técnico para una lectura fluida y fiel al dictamen textual revisado.
  - No usé «SEÑOR» ni terminología teológica ajena, porque este versículo no involucra esos lexemas.
