translation:
  language: es
  text: 'Y los observé y vi: he aquí que todos ellos expusieron sus partes íntimas[a] como caballos, y comenzaron a montar las vacas[b]; y las vacas quedaron preñadas y dieron a luz elefantes, camellos y asnos.[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge'ez ንፍረታቲሆሙ es sexualmente explícita y se refiere a los órganos genitales masculinos expuestos o extendidos; «partes íntimas» es una traducción digna pero inequívoca.
    reason: lexical_alternative
  - marker: b
    text: 'El término ge''ez አልህምት (alhmət, plural de ላህም, lahm) significa «ganado» o «vacas», no «elefantas» —que es ነጌያተ (nagēyāta), la primera especie nombrada entre las crías. Una versión anterior traducía erróneamente este término como «hembras de elefante», destruyendo la alegoría: en el Apocalipsis Animal, las vacas representan a las mujeres humanas con quienes los ángeles caídos (las «estrellas» del episodio anterior) se unen ilícitamente.'
    reason: textual_variant
  - marker: c
    text: La lista de crías —elefantes, camellos y asnos— pertenece al esquema alegórico del Apocalipsis Animal y no constituye una descripción zoológica literal. Estas bestias representan a los gigantes (los Nefilim) nacidos de la unión transgresora entre ángeles y mujeres humanas.
    reason: cultural_note
lexical_decisions:
- source_word: ወነጸርክዎሙ
  english_pob_choice: And I looked at them
  chosen_spanish: Y los observé
  alternatives_spanish:
  - Y los miré
  - Y los contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Observé'' conveys directed visual attention in el registro narrativo apocalíptico, ligeramente más formal que ''miré'' y más natural que ''contemplé'' para un verbo de acción visual inmediata.'
- source_word: ወርኢኩ ወነዋ
  english_pob_choice: 'and saw: behold'
  chosen_spanish: 'y vi: he aquí que'
  alternatives_spanish:
  - y vi, y he aquí
  - y vi—¡he aquí!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula visionaria doble (verbo de visión + exclamativa deíctica) es una marca retórica del género apocalíptico y debe preservarse. Los dos puntos replican la función de ruptura del inglés POB. 'He aquí que' es la construcción introductora estándar en español literario y bíblico.
- source_word: አውፁኡ ንፍረታቲሆሙ
  english_pob_choice: exposed their private parts
  chosen_spanish: expusieron sus partes íntimas
  alternatives_spanish:
  - expusieron sus genitales
  - mostraron sus miembros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez es sexualmente explícito y alude a los órganos sexuales masculinos. 'Partes íntimas' reproduce el registro del inglés POB —claro pero no clínico ni eufemístico vago— y es la opción más legible para un público eclesial latinoamericano amplio.
- source_word: ከመ አፍራስ
  english_pob_choice: like horses
  chosen_spanish: como caballos
  alternatives_spanish:
  - cual caballos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Calco directo. La comparación evoca exhibición sexual notoria y debe preservarse literalmente; 'como' es la conjunción comparativa natural en español.
- source_word: ወአሐዙ ይዐረጉ
  english_pob_choice: began to mount
  chosen_spanish: comenzaron a montar
  alternatives_spanish:
  - empezaron a subir sobre
  - comenzaron a cubrir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literalmente 'comenzaron a subir/ascender sobre'. En español, 'montar' es el término animal establecido para la monta sexual y conserva la imagería de la Apocalipsis Animal sin sobre-explicar. 'Cubrir' es alternativa veterinaria menos accesible.
- source_word: ዲበ አንስት አልህምት
  english_pob_choice: the cows (revised from 'the female elephants')
  chosen_spanish: las vacas
  alternatives_spanish:
  - el ganado vacuno
  - las reses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: አልህምት (alhmət) es plural de ላህም (lahm) = 'ganado/vacas', no 'elefantas' (ነጌያተ). La revisión de alta prioridad corrigió la traducción anterior que destruía el esquema alegórico. 'Vacas' es la traducción precisa y la más transparente para el lector español; preserva la alegoría donde las vacas representan a las mujeres humanas.
- source_word: ወጸንሳ ኵሎነ
  english_pob_choice: they all became pregnant
  chosen_spanish: todas quedaron preñadas
  alternatives_spanish:
  - todas concibieron
  - todas quedaron encinta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Preñadas'' es el término estándar en español para la gestación animal, más natural que ''embarazadas'' (que en el uso cotidiano se refiere a humanas) y más preciso que ''encinta'' en este contexto bíblico-animal. ''Concibieron'' (cf. inglés anterior ''conceived'') también sería válido pero el inglés POB revisado prefirió el énfasis en el estado gestante.'
- source_word: ወወለዳ
  english_pob_choice: gave birth
  chosen_spanish: dieron a luz
  alternatives_spanish:
  - parieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Dieron a luz'' es la expresión más neutra y legible en español para el parto; ''parieron'' es igualmente correcto y más conciso, pero tiene connotaciones más crudas que ''dieron a luz'' en el registro literario-bíblico.'
- source_word: ነጌያተ ወአገማሰ ወአእዳገ
  english_pob_choice: elephants, camels, and donkeys
  chosen_spanish: elefantes, camellos y asnos
  alternatives_spanish:
  - elefantes, camellos y burros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Estas son las tres especies de crías en la visión, representando alegóricamente a los gigantes engendrados. 'Asnos' es preferible a 'burros' en el registro elevado de la literatura apocalíptica; 'camellos' es la única opción natural en español moderno para አገማሰ.
theological_decisions:
- issue: Preservación de la imagería sexual explícita en el texto visionario
  english_pob_reading: they all exposed their private parts like horses, and they began to mount the cows
  chosen_spanish_reading: todos ellos expusieron sus partes íntimas como caballos, y comenzaron a montar a las vacas
  alternative_spanish_readings:
  - Suavizar a lenguaje de apareamiento genérico
  - Oscurecer la anatomía con eufemismo
  rationale: El versículo describe un apareamiento transgresor en forma animal simbólica. Aplanar la imagería sexual debilitaría la fuerza de la visión y la alegoría del Apocalipsis Animal. La traducción española mantiene el impacto sin ser innecesariamente explícita, en línea con la filosofía del POB de no parafrasear más allá de lo que atestigua la fuente.
  doctrine_reference: 'Filosofía de traducción del POB: preservar la imagería apocalíptica; no parafrasear más allá del testimonio textual.'
- issue: 'Corrección de አልህምት: ''vacas'' vs. ''hembras de elefante'' y su impacto alegórico'
  english_pob_reading: the cows (corrected from 'the female elephants' by the tier-3 revision)
  chosen_spanish_reading: las vacas
  alternative_spanish_readings:
  - las hembras de elefante (lectura incorrecta anterior)
  - el ganado
  rationale: 'La revisión de nivel 3 corrigió una mistranslación que destruía la alegoría central del Apocalipsis Animal: las ''estrellas caídas'' (ángeles rebeldes) se unen a las ''vacas'' (mujeres humanas) y engendran una prole monstruosa (elefantes, camellos y asnos = los gigantes/Nefilim). Traducir አልህምት como ''hembras de elefante'' colocaba los elefantes tanto como pareja como como cría, haciendo incoherente la alegoría. La traducción española adopta inequívocamente ''vacas'', la única lectura léxicamente correcta y teológicamente coherente.'
  doctrine_reference: 'Apocalipsis Animal de 1 Enoc: esquema alegórico donde los animales representan categorías de seres. Las vacas = mujeres humanas; la prole híbrida = los gigantes del Génesis 6.'
translation_notes:
  revision_awareness: 'Se incorporan dos revisiones sustanciales del rastro de auditoría inglés. (1) Revisión de nivel 3 (adjudicador gemini_3_1_pro_tier3, 2026-04-22): corrección crítica de አልህምት de «hembras de elefante» a «vacas/ganado»; este error destruía el esquema alegórico central del Apocalipsis Animal y se refleja en la traducción española con «las vacas» y se documenta en la nota [b]. (2) Revisión de gpt-5.4 (2026-04-23): «let out» → «exposed» y «conceived» → «became pregnant»; el español sigue estas elecciones con «expusieron» y «quedaron preñadas» respectivamente. La verificación cruzada del inglés marcó el versículo como needs_review / major-issues con acuerdo 0,65; la principal causa era la mistranslación de አልህምት, ya corregida en la revisión de nivel 3.'
  spanish_consistency_notes:
  - «Partes íntimas» para ንፍረታቲሆሙ sigue el registro moderado pero claro del inglés POB «private parts»; se evitan tanto el clínico «genitales» como el eufemístico vago.
  - «Montar» es el verbo animal establecido en español para la monta/cópula; replica la naturalidad del inglés «mount» en el contexto de la imagería del Apocalipsis Animal.
  - «Preñadas» (no «embarazadas») es el término apropiado para la gestación animal en español, coherente con el sujeto de la oración (vacas).
  - «Asnos» se prefiere sobre «burros» para mantener el registro literario-bíblico elevado del texto apocalíptico.
  - «Vacas» para አልህምት es la única opción léxicamente correcta confirmada por la revisión de nivel 3; queda documentada en nota [b] con explicación alegórica.
  - No aparece el nombre divino (יהוה/YHWH) en este versículo; la convención «Yahvé» no es aplicable aquí.
  - 'La fórmula visionaria doble «Y los observé y vi: he aquí que» preserva la retórica apocalíptica del ge''ez sin calco sintáctico forzado.'
