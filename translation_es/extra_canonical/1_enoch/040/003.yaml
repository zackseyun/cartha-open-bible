translation:
  language: es
  text: Y oí las voces de aquellos cuatro seres[a], mientras alababan ante el Señor de gloria[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «aquellos cuatro rostros». La expresión probablemente se refiere a los cuatro seres celestiales vistos en la visión, y no a rostros por separado.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «Señor del esplendor».
    reason: lexical_alternative
  - marker: c
    text: 'Traducción anterior: «aquellas cuatro presencias».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወሰማዕኩ
  english_pob_choice: And I heard
  chosen_spanish: Y oí
  alternatives_spanish:
  - Y escuché
  - Y oí el sonido de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto en primera persona de oír se expresa con naturalidad y fidelidad con «oí», que conserva el tono de relato visionario sin añadir contenido.
- source_word: ቃሎሙ
  english_pob_choice: the voices of them
  chosen_spanish: las voces
  alternatives_spanish:
  - sus voces
  - sus palabras
  - su sonido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de alabanza celestial, «voces» comunica mejor el elemento audible que «palabras», sin forzar una interpretación más específica.
- source_word: እልኩ ገጽ አርባዕቱ
  english_pob_choice: those four beings
  chosen_spanish: aquellos cuatro seres
  alternatives_spanish:
  - aquellos cuatro rostros
  - aquellos cuatro figuras
  - aquellos cuatro presencias
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez ገጽ significa literalmente «rostro/cara», pero en el contexto visionario de 1 Enoc se refiere a los cuatro seres celestiales ya aludidos. «Seres» evita una traducción demasiado literal y mantiene claro que son personajes celestiales, mientras conserva el enlace anafórico con el verso anterior mediante «aquellos cuatro».
- source_word: እንዘ ይሴብሑ
  english_pob_choice: as they gave praise
  chosen_spanish: mientras daban alabanza
  alternatives_spanish:
  - mientras alababan
  - así como alababan
  - mientras hacían alabanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción indica acción simultánea. «Mientras daban alabanza» mantiene el tono elevado y reproduce bien el aspecto progresivo sin volverla más libre de lo que permite el texto.
- source_word: ቅድመ
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ante» conserva el matiz cortesano y reverente de la escena celestial y suena natural en español bíblico moderno.
- source_word: እግዚአ ስብሐት
  english_pob_choice: the Lord of glory
  chosen_spanish: el Señor de gloria
  alternatives_spanish:
  - el Señor del esplendor
  - el Dueño de gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia nominal funciona como título divino. «Señor de gloria» sigue de cerca la forma original y mantiene el registro apocalíptico; «de gloria» evita introducir una glosa explicativa no sustentada por el texto.
theological_decisions:
- issue: Título divino እግዚአ ስብሐት
  english_pob_reading: the Lord of glory
  chosen_spanish_reading: el Señor de gloria
  alternative_spanish_readings:
  - el Señor del esplendor
  - el Dueño de gloria
  rationale: El texto presenta un título reverente para la figura divina delante de quien alaban los seres celestiales. Mantener «Señor de gloria» preserva la dignidad del título y sigue de cerca la lectura auditada del POB, sin sustituirla por fórmulas eclesiásticas más interpretativas.
  doctrine_reference: Preservar el título apocalíptico sin suavizarlo ni convertirlo en una paráfrasis devocional.
- issue: Referencia de ገጽ a los cuatro seres celestiales
  english_pob_reading: those four beings
  chosen_spanish_reading: aquellos cuatro seres
  alternative_spanish_readings:
  - aquellos cuatro rostros
  - aquellos cuatro figuras
  - aquellos cuatro presencias
  rationale: En el contexto inmediato de 1 Enoc 40, la expresión alude a cuatro figuras celestiales reales dentro de la visión. En español, «seres» comunica mejor la referencia personal que «rostros», que podría sonar literalista o desorientador, aunque se conserva la idea de identificación con «aquellos cuatro».
  doctrine_reference: Conservar la imaginería apocalíptica y su referente celestial sin borrar la tensión entre literalidad y claridad.
translation_notes:
  revision_awareness: 'La traducción inglesa auditada pasó por una corrección que sustituyó «those four presences» por «those four beings» para mayor naturalidad, pero el historial también conserva la alternativa literal «faces» y la nota sobre «presences». La versión española mantiene esa tensión: opta por «seres» para claridad contextual, pero documenta la literalidad de ገጽ («rostros») y la posibilidad de entender la frase como cuatro presencias celestiales. También conserva el título «Señor de gloria» con nota de alternativa léxica.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para el título divino, en coherencia con el POB y con la política de títulos reverentes.
  - «Alabanza» se usa como sustantivo litúrgico natural en español, sin convertir el verbo ge'ez en una fórmula más interpretativa.
  - Los marcadores de nota siguen el orden a, b, c y cada uno se ancla en el texto donde corresponde.
