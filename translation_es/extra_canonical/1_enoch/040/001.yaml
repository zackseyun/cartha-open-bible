base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/040/001.yaml
  text: And after that I saw thousands of thousands and ten thousands of ten thousands[a], whose number and count were without end[e][d][c][b], standing before the Lord of Spirits.
  footnotes:
  - marker: a
    text: The underlying Ethiopic here includes an uncertain segment (“*ኍልቈ” in the OCR). The sense continues immediately as “and there was no count of them,” indicating innumerability; we translate the secure wording.
    reason: textual_variant
  - marker: b
    text: Compare Daniel 7:10 for a similar vision of countless attendants standing before the divine throne.
    reason: cross_reference
  - marker: c
    text: Alternatively, “without number” for “there was no count of them.”
    reason: lexical_alternative
  - marker: d
    text: Or 'there was no count of them'.
    reason: previous_rendering
  - marker: e
    text: Or 'Lord of the Spirits'.
    reason: previous_rendering
