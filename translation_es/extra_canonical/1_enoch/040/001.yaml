translation:
  language: es
  text: Y después de eso vi miles de miles y diez miles de diez miles[a], cuyo número y cuenta eran sin fin[b], de pie ante el Señor de Espíritus[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez contiene un doble intensificador numérico («miles de miles» y «diez miles de diez miles»), que preservamos de forma literal para reflejar la multitud innumerable.
    reason: lexical_choice
  - marker: b
    text: La expresión ge'ez incluye dos sustantivos de cálculo, «número» y «cuenta». Conservamos ambos para no suavizar la intensificación del original.
    reason: lexical_alternative
  - marker: c
    text: «Señor de Espíritus» traduce un título divino fijo en esta sección. Lo mantenemos como forma titular reverente y en armonía con la decisión de consistencia del audit trail.
    reason: theological_note
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Vi
  lexicon: Dillmann; Leslau
  rationale: El perfecto narrativo con waw conserva la secuencia visionaria; en español, «vi» mantiene la sencillez y el ritmo, y la conjunción inicial reproduce el encadenamiento del original.
- source_word: እምድኅረዝ
  english_pob_choice: after that
  chosen_spanish: después de eso
  alternatives_spanish:
  - después
  - luego de eso
  lexicon: Dillmann; Leslau
  rationale: La expresión idiomática equivale a un marcador temporal posterior sin requerir un calco rígido.
- source_word: አእላፍ / አእላፈ
  english_pob_choice: thousands of thousands
  chosen_spanish: miles de miles
  alternatives_spanish:
  - millares de millares
  - miles sobre miles
  lexicon: Leslau; Dillmann
  rationale: El plural repetido expresa una superabundancia numérica. «Miles de miles» conserva el patrón semítico sin introducir «myriads», que no es natural en español.
- source_word: ትእልፊት / ትእልፊተ
  english_pob_choice: ten thousands of ten thousands
  chosen_spanish: diez miles de diez miles
  alternatives_spanish:
  - miríadas de miríadas
  - decenas de miles de decenas de miles
  lexicon: Leslau; Dillmann
  rationale: La base léxica ge'ez designa diez mil; la duplicación intensifica la inmensidad. «Diez miles de diez miles» mantiene la estructura literal y el valor superlativo.
- source_word: ኍልቈ
  english_pob_choice: number
  chosen_spanish: número
  alternatives_spanish:
  - cuenta
  - cómputo
  lexicon: Dillmann; Leslau
  rationale: La revisión auditada exige reflejar también este término explícito. «Número» reproduce la idea básica del sustantivo y se combina bien con el siguiente doblete.
- source_word: ኃሳበ
  english_pob_choice: count
  chosen_spanish: cuenta
  alternatives_spanish:
  - cómputo
  - recuento
  lexicon: Leslau (ḥasab); Dillmann
  rationale: El segundo sustantivo del doblete mantiene el campo semántico de cálculo/recuento. «Cuenta» permite una coordinación natural con «número» sin borrar la redundancia enfática del original.
- source_word: አልቦሙ
  english_pob_choice: were without end / there was no count of them
  chosen_spanish: eran sin fin
  alternatives_spanish:
  - no tenían fin
  - carecían de número
  lexicon: Dillmann; Leslau
  rationale: La construcción negativa con sufijo pronominal se interpreta idiomáticamente como ausencia de límite. «Eran sin fin» integra el sentido de innumerabilidad de forma clara y elegante en español.
- source_word: እለ ይቀውሙ
  english_pob_choice: standing
  chosen_spanish: los que están de pie
  alternatives_spanish:
  - los que se mantienen en pie
  - estando de pie
  lexicon: Leslau (qwm); Dillmann
  rationale: El participio relativo describe postura continua. «Están de pie» preserva la imagen judicial/cortesana sin añadir matices ajenos.
- source_word: ቅድመ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: Leslau; Dillmann
  rationale: «Delante de» es natural en español y conserva la relación espacial y reverencial del original.
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of the Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de espíritu
  - el Señor de los espíritus
  lexicon: Dillmann; Leslau
  rationale: Se conserva el título divino como en el audit trail inglés. En español, el plural con artículo forma una titulatura reverente y reconocible; «Señor» traduce እግዚአ sin sustituirlo por un equivalente litúrgico que ocultaría la forma del título.
theological_decisions:
- issue: Título divino እግዚአ መናፍስት
  english_pob_reading: A divine title for God in the Parables, retained as “the Lord of the Spirits.”
  chosen_spanish_reading: Un título divino para Dios, mantenido como «el Señor de los Espíritus».
  alternative_spanish_readings:
  - un señor de espíritus
  - el Señor de espíritu
  rationale: La escena es de corte celestial y el título funciona como designación reverente del Altísimo. Mantener la forma titular evita rebajarla a una descripción genérica o a un ángel exaltado.
  doctrine_reference: Translation philosophy §2 (Translate titles; transliterate names).
- issue: 'Doble expresión de innumerabilidad: ኍልቈ ወኃሳበ አልቦሙ'
  english_pob_reading: whose number and count were without end
  chosen_spanish_reading: cuyo número y cuenta eran sin fin
  alternative_spanish_readings:
  - de quienes no había número ni cuenta
  - cuyo cómputo y número no tenían fin
  rationale: La revisión auditada insiste en no omitir el doblete explícito. En español, «número y cuenta» conserva ambas piezas léxicas y «eran sin fin» expresa la imposibilidad de cuantificación sin introducir una idea más fuerte que la del original.
  doctrine_reference: Translation philosophy §3 (Preserve emphatic doublets and parallelism).
translation_notes:
  revision_awareness: La lectura inglesa más reciente corrigió una omisión anterior y recuperó el doblete explícito «number and count»; la versión española refleja esa revisión con «número y cuenta». También se evita suavizar la multitud con una sola idea de infinitud, preservando la redundancia enfática del ge'ez. El cierre se ajusta al sujeto participial para sonar natural en español sin perder la escena de audiencia celestial.
  spanish_consistency_notes:
  - Se mantiene «Señor» como traducción de እግዚአ, conforme al tratamiento titular del texto.
  - 'Se preserva la duplicación numérica del original con dos pares coordinados: «miles de miles» y «diez miles de diez miles».'
  - Se usa «de pie» para la postura de los asistentes celestiales, coherente con un marco de tribunal o sala del trono.
  - No se introduce «Cristo» ni terminología eclesial posterior, ya que el texto no lo requiere.
