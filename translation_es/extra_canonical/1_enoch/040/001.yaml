    rationale: El relativo «los que están de pie» queda algo colgante tras una descripción ya cerrada. «..., cuyo número y cuenta eran sin fin, de pie ante...» o «..., que están de pie ante...» comunica mejor la relación con la multitud.
  - severity: low
