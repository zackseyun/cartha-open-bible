    issue: El título divino está como «Señor de los Espíritus» en lugar de la forma armonizada «Señor de Espíritus».
    rationale: 'Las revisiones aplicadas del inglés indican una decisión de consistencia para este título técnico frecuente en las Parábolas: «Lord of Spirits». Aunque el ge''ez permite ambas defensas, el audit trail final pide armonización.'
  - severity: low
