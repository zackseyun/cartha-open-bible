  yaml_path: translation/extra_canonical/1_enoch/040/002.yaml
  text: And on the four sides of the Lord of Spirits I saw four other faces[a], different from those who do not sleep. And I learned their names[c][b], for the angel who came with me made their names known to me and showed me all the hidden things.
  footnotes:
