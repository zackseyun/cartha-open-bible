review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la lectura revisada del ge''ez: ''lados'' en vez de ''alas'', ''rostros'' para ገጸ, la distinción respecto de ''aquellos que no duermen'', y la cláusula explicativa sobre el ángel que dio a conocer los nombres. Sin embargo, la nota [a] no preserva correctamente la alternativa inglesa/auditada: presenta ''rostros'' como alternativa, cuando ''rostros'' ya está en el texto principal. La nota debe reflejar la variante documentada (''otros cuatro rostros'' / ''otros cuatro rostros'' frente a ''otros cuatro rostros'' no aporta nada); en español conviene usarla para señalar la opción de orden ''cuatro otros rostros'' o, mejor, la formulación alternativa heredada del historial: ''Y junto a los cuatro lados del Señor de los Espíritus vi otros cuatro rostros...'' como redacción previa/alternativa.'
  spanish_quality_summary: El español es claro, digno y natural. 'En los cuatro lados' suena algo menos idiomático que 'a los cuatro lados' o 'por los cuatro lados', pero sigue siendo comprensible y aceptable como calco espacial moderado. 'Me hizo conocer sus nombres' es inteligible, aunque 'me dio a conocer sus nombres' sería más idiomático; aun así, no exige cambio. El problema principal es la footnote [a], que está mal formulada y redundante.
  glossary_alignment: Se mantiene correctamente 'Señor de los Espíritus' para እግዚአ መናፍስት, sin conflicto con los defaults de Yahvé/Mesías. 'Rostros', 'ocultas' y 'aprendí' concuerdan con las decisiones léxicas auditadas. No hay choques terminológicos mayores.
  issues:
  - severity: medium
    issue: La nota [a] repite el término ya usado en el texto principal en vez de preservar una alternativa real.
    rationale: El texto principal ya dice 'otros cuatro rostros[a]'. La nota 'Otra posibilidad ... sería «rostros»' es incoherente y no informa al lector. Debe corregirse para reflejar una alternativa/documentación válida del audit trail.
  - severity: low
    issue: La footnote [a] no corresponde bien al motivo inglés de 'lexical_alternative/previous_rendering'.
    rationale: El inglés conserva una alternativa/redacción previa sobre la frase completa y la imaginería de 'faces'. En español, la nota actual no transmite esa información auditada.
  revised_spanish_text: Y en los cuatro lados del Señor de los Espíritus vi otros cuatro rostros[a], distintos de aquellos que no duermen. Y aprendí sus nombres, porque el ángel que vino conmigo me hizo conocer sus nombres y me mostró todas las cosas ocultas[b].
  revised_footnotes:
  - marker: a
    text: 'Otra redacción posible es: «Y junto a los cuatro lados del Señor de los Espíritus vi otros cuatro rostros, distintos de aquellos que no duermen»; el ge''ez mantiene la imagen visible de «rostros».'
    reason: previous_rendering
  - marker: b
    text: «Las cosas ocultas» también puede entenderse como «las cosas secretas», una expresión apocalíptica común para misterios celestiales revelados en visión.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel y legible, pero se corrige la nota [a], que era redundante e incorrecta: debía ofrecer una alternativa real/documentada y no repetir ''rostros'', ya presente en el texto.'
