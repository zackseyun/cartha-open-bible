translation:
  language: es
  text: Y en los cuatro lados del Señor de los Espíritus vi otros cuatro rostros[a], distintos de aquellos que no duermen. Y aprendí sus nombres, porque el ángel que vino conmigo me hizo conocer sus nombres y me mostró todas las cosas ocultas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Otra posibilidad, más cercana al valor visual del ge'ez, sería «rostros»; el original conserva la imagen de lo visto.
    reason: lexical_alternative
  - marker: b
    text: «Las cosas ocultas» también puede entenderse como «las cosas secretas», una expresión apocalíptica común para misterios celestiales revelados en visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: በአርባዕቱ ክነፊሁ
  english_pob_choice: beside the four wings of him / on the four sides of the Lord of Spirits
  chosen_spanish: en los cuatro lados
  alternatives_spanish:
  - junto a las cuatro alas
  - alrededor de los cuatro lados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail señala que ክነፍ aquí funciona espacialmente como 'lado/extremidad', no como 'ala' literal. En español, 'en los cuatro lados' transmite la relación espacial sin atribuir alas al Señor de los Espíritus.
- source_word: ለእግዚአ መናፍስት
  english_pob_choice: of the Lord of Spirits
  chosen_spanish: del Señor de los Espíritus
  alternatives_spanish:
  - del Dueño de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título eocénico estándar como título traducido, no transliterado. 'Señor de los Espíritus' es la forma más clara y consistente en español.
- source_word: አርባዕተ ገጸ ካልአ
  english_pob_choice: four other faces / another four faces
  chosen_spanish: otros cuatro rostros
  alternatives_spanish:
  - cuatro otros rostros
  - cuatro caras distintas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''ገጽ'' puede ser ''rostro/cara''. ''Rostros'' mantiene la imagen visible de la visión y suena más natural en español que una calca como ''cuatro otras caras''.'
- source_word: እምነ እለ
  english_pob_choice: different from those
  chosen_spanish: distintos de aquellos
  alternatives_spanish:
  - diferentes de aquellos
  - separados de aquellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Distintos de aquellos'' conserva la marca de contraste sin intensificarla más allá del texto. En español, también evita una repetición torpe de ''otros''.'
- source_word: ኢይነውሙ
  english_pob_choice: do not sleep
  chosen_spanish: que no duermen
  alternatives_spanish:
  - que no duermen jamás
  - insomnes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma relativa española 'que no duermen' reproduce el valor descriptivo del original y suena natural. No se introduce 'velan' ni 'insomnes' porque añadirían matices no explicitados.
- source_word: አእመርኩ
  english_pob_choice: I learned
  chosen_spanish: aprendí
  alternatives_spanish:
  - llegué a conocer
  - reconocí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Aprendí'' expresa con claridad el momento en que Enoch llega a saber los nombres por revelación del ángel. Es más fluido que una perífrasis y mantiene el sentido de adquisición de conocimiento.'
- source_word: ዘአይድዐኒ አስማቲሆሙ
  english_pob_choice: made their names known to me
  chosen_spanish: me hizo conocer sus nombres
  alternatives_spanish:
  - me dio a conocer sus nombres
  - me informó de sus nombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase causal del Ge'ez se refleja con una construcción española directa y solemne. 'Me hizo conocer' conserva la idea de mediación del ángel sin volver la frase demasiado técnica.
- source_word: ኅቡኣተ
  english_pob_choice: the hidden things
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - los secretos
  - las cosas secretas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Las cosas ocultas'' mantiene la transparencia apocalíptica del original y permite incluir el matiz de misterio revelado. Se evita ''secretas'' para no sonar menos natural en este contexto.'
theological_decisions:
- issue: Título divino እግዚአ መናፍስት
  english_pob_reading: Lord of Spirits
  chosen_spanish_reading: Señor de los Espíritus
  alternative_spanish_readings:
  - Señor de los espíritus
  - Dueño de los Espíritus
  rationale: Se mantiene la forma titular establecida por el testimonio en inglés y el uso habitual en 1 Enoc. En español, el plural con mayúscula conserva el carácter reverencial del título sin oscurecer su sentido.
  doctrine_reference: Translate titles; preserve apocalyptic divine titles consistently.
- issue: Imagen espacial de በአርባዕቱ ክነፊሁ
  english_pob_reading: on the four sides of the Lord of Spirits
  chosen_spanish_reading: en los cuatro lados del Señor de los Espíritus
  alternative_spanish_readings:
  - junto a los cuatro lados del Señor de los Espíritus
  - por los cuatro lados del Señor de los Espíritus
  rationale: La nota de revisión corrige una lectura como 'alas' para no atribuirle alas al Señor de los Espíritus. La opción 'lados' sigue la adjudicación textual y conserva el marco espacial de la visión.
  doctrine_reference: Respect lexical revision from source review; avoid importing imagery not warranted by Ge'ez.
translation_notes:
  revision_awareness: El audit trail revisado corrige la lectura anterior de ክነፍ como 'alas' y favorece 'lados' por ajuste semítico espacial; también confirma 'faces' como traducción principal de ገጽ. Esta versión sigue esas adjudicaciones y conserva el cierre sobre los 'hidden things' como misterio revelado.
  spanish_consistency_notes:
  - Se usó 'Señor de los Espíritus' como título fijo y reverencial, consistente con el registro del texto de 1 Enoc.
  - Se prefirió 'rostros' para ገጽ por su valor visual, sin convertirlo en una abstracción como 'presencias'.
  - '''Cosas ocultas'' mantiene el tono apocalíptico y deja abierta la alternativa ''secretas'' en nota.'
  - La sintaxis evita calcos excesivos y conserva un español bíblico moderno, claro y solemne.
