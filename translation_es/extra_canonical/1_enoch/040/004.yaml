translation:
  language: es
  text: La voz del primero bendice al Señor de los espíritus por los siglos de los siglos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La primera voz». El ge''ez puede entenderse así, pero «la voz del primero» refleja mejor el estado constructo y la relación con la primera presencia del contexto.'
    reason: previous_rendering
  - marker: b
    text: 'O: «por la eternidad». La expresión ge''ez es una fórmula enfática de duración sin fin; «por los siglos de los siglos» conserva bien ese tono solemne en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ቃለ
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - palabra
  - enunciado
  - sonido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario y litúrgico, el sustantivo designa una voz o pronunciación oída por el vidente. «Voz» conserva mejor la escena auditiva que una traducción más abstracta como «palabra».
- source_word: ቀዳማዊ
  english_pob_choice: first
  chosen_spanish: del primero
  alternatives_spanish:
  - primero
  - del primero en orden
  - del primero entre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez está en estado constructo y gobierna al ordinal; por eso en español se refleja mejor como «la voz del primero» que como «la primera voz». Mantiene la relación gramatical con la presencia angelical mencionada en el contexto inmediato.
- source_word: ይባርኮ
  english_pob_choice: blesses
  chosen_spanish: bendice
  alternatives_spanish:
  - alaba
  - da bendición a
  - bendice continuamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa la acción de bendecir; «bendice» es el equivalente natural y fiel en español, sin añadir aspecto ni matices no explicitados por el texto.
- source_word: ለእግዚአ፡ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  - el Dueño de los Espíritus
  - el Maestro de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título divino fijo de 1 Enoc. «Señor» mantiene el registro elevado y la continuidad terminológica del título; el plural con mayúscula en «Espíritus» respeta el carácter titular y no reduce la expresión a un genérico.
- source_word: ለዓለመ፡ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - por la eternidad
  - por los siglos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El idioma ge'ez es una intensificación enfática de duración sin fin. En español, «por los siglos de los siglos» comunica esa fuerza idiomática con solemnidad bíblica y sin depender de una paráfrasis moderna.
theological_decisions:
- issue: Título divino ለእግዚአ፡ መናፍስት
  english_pob_reading: the Lord of Spirits
  chosen_spanish_reading: el Señor de los Espíritus
  alternative_spanish_readings:
  - el Señor de los espíritus
  - el Maestro de los Espíritus
  rationale: Se mantiene el título teológico como nombre divino, no como descripción común. «Señor» preserva la alta dignidad del título y evita aplanarlo; la mayúscula en «Espíritus» ayuda a señalar su función titulativa en el pasaje enochico.
  doctrine_reference: Traducir títulos divinos preservando su peso teológico y su valor de nombre propio en el contexto.
translation_notes:
  revision_awareness: La revisión gramatical del audit trail corrige una lectura previa de «la primera voz» y confirma que el ge'ez ቃለ está en estado constructo («voz de»), gobernando ቀዳማዊ. La versión española adopta esa relación sintáctica de forma natural con «la voz del primero».
  spanish_consistency_notes:
  - Se evita «SEÑOR» en mayúsculas como máscara editorial; se usa «Señor» por tratarse del título divino documentado.
  - «Espíritus» se mantiene con mayúscula inicial por tratarse del título fijo «Señor de los Espíritus», no por plural común.
  - La fórmula final opta por un equivalente bíblico solemne que conserve la intensificación durativa del original.
