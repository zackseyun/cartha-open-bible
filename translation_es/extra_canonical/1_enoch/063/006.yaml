translation:
  language: es
  text: Ahora deseamos un poco de descanso, pero no lo encontramos; somos expulsados, y no podemos asirlo[a], y la luz ha pasado de delante de nosotros[b], y la oscuridad será nuestra morada[c] por siempre y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula traducida «no podemos asirlo» es breve y también puede significar «no podemos agarrarlo» o «no podemos aferrarnos a ello», probablemente continuando la idea de un descanso o seguridad inalcanzables.
    reason: lexical_alternative
  - marker: b
    text: O «de nuestra presencia».
    reason: previous_rendering
  - marker: c
    text: La palabra traducida «morada» es difícil en esta línea geʽez; «habitación» es otra posible traducción. El sentido es que la oscuridad llega a ser su destino permanente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይእዜኒ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - En este momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca temporal discursiva que introduce la queja presente; «Ahora» es natural en español y conserva el contraste con el estado anterior.
- source_word: ንስቲተ፡ ዕረፍተ
  english_pob_choice: a little rest
  chosen_spanish: un poco de descanso
  alternatives_spanish:
  - un poco de reposo
  - algo de alivio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada indica que ንስቲተ modifica «rest», por lo que conviene reflejar la cuantificación con una construcción natural en español; «descanso» conserva el matiz de pausa/cessación sin estrecharlo a sueño corporal.
- source_word: ንትሜነይ
  english_pob_choice: we desire
  chosen_spanish: deseamos
  alternatives_spanish:
  - anhelamos
  - queremos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa deseo intenso o anhelo; «deseamos» mantiene ese sentido sin sobreinterpretar una petición formal.
- source_word: ወኢንረክብ
  english_pob_choice: but we do not find it
  chosen_spanish: pero no lo encontramos
  alternatives_spanish:
  - pero no lo obtenemos
  - pero no lo alcanzamos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Encontrar» funciona bien con «descanso» y preserva la idea de frustración en la búsqueda; el pronombre «lo» mantiene la referencia al descanso.
- source_word: ንሰደድ
  english_pob_choice: we are driven away
  chosen_spanish: somos expulsados
  alternatives_spanish:
  - somos echados fuera
  - somos perseguidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto judicial/apocalíptico, «expulsados» comunica mejor la pasividad y la fuerza de la exclusión que una mera dispersión.
- source_word: ወኢንእኅዝ
  english_pob_choice: we cannot seize it
  chosen_spanish: y no podemos asirlo
  alternatives_spanish:
  - y no podemos agarrarlo
  - y no podemos apoderarnos de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Asir» conserva el valor concreto de agarrar/aferrar y el tono vívido del original; el pronombre neutro retoma el objeto implícito del descanso.
- source_word: ወብርሃን
  english_pob_choice: and the light
  chosen_spanish: y la luz
  alternatives_spanish:
  - y luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el artículo porque el contexto apocalíptico apunta a una luz concreta y conocida, no a la abstracción general de la iluminación.
- source_word: እምቅድሜነ
  english_pob_choice: from before us
  chosen_spanish: de delante de nosotros
  alternatives_spanish:
  - de nuestra presencia
  - de ante nosotros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La locución preserva la imagen espacial del original sin forzar un calco demasiado duro; «de delante de nosotros» es idiomático y fiel.
- source_word: ኀለፈ
  english_pob_choice: has passed away
  chosen_spanish: se ha alejado
  alternatives_spanish:
  - ha pasado
  - se ha ido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se ha alejado» comunica la pérdida irreversible de la luz y conserva el movimiento de retirada implícito en el contexto.
- source_word: ወጽልመት
  english_pob_choice: and darkness
  chosen_spanish: y la oscuridad
  alternatives_spanish:
  - y las tinieblas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oscuridad» es plenamente natural en español moderno y mantiene el contraste con «la luz»; «tinieblas» quedaría más solemne, pero menos neutral.
- source_word: ምኅባሪነ
  english_pob_choice: will be our dwelling
  chosen_spanish: será nuestra morada
  alternatives_spanish:
  - será nuestro habitar
  - será nuestra habitación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Morada» conserva el valor de lugar permanente y funciona bien en registro bíblico sin caer en un arcaismo excesivo.
- source_word: ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: por siempre y para siempre
  alternatives_spanish:
  - por los siglos de los siglos
  - por toda la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Equivale al idiomismo de duración ilimitada con español claro y solemne; evita una fórmula litúrgica que podría sonar importada sin necesidad.
theological_decisions:
- issue: La naturaleza de la luz perdida y la oscuridad resultante
  english_pob_reading: Retained as apocalyptic-cosmic imagery of judgment rather than reduced to inward emotion alone.
  chosen_spanish_reading: 'Se conserva como imaginería apocalíptica de juicio: la luz perdida y la oscuridad como destino real, sin reducirlo solo a tristeza interior.'
  alternative_spanish_readings:
  - solo una metáfora de desesperación
  - oscuridad física literal exclusivamente
  rationale: El pasaje pertenece a una lamentación escatológica; mantener la imagen sin explicarla en exceso preserva la tensión entre lo moral, lo judicial y lo cósmico.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección auditada que identifica ንስቲተ como «un poco» y ንትሜነይ como «deseamos/ansiamos»; por eso la traducción evita el antiguo error de leer «we seek rest for ourselves» y refleja la secuencia «un poco de descanso» + «deseamos». También se preserva el contraste entre luz y oscuridad sin normalizarlo a un mero estado emocional.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se mantiene «descanso», «luz» y «oscuridad» como vocabulario apocalíptico llano y comprensible.
  - No se introduce terminología eclesiástica tradicional no motivada por el original.
