    text: The word rendered 'dwelling' is difficult in this Ge'ez line; 'habitation' is another possible rendering. The sense is that darkness becomes their enduring lot.
    reason: lexical_alternative
  - marker: c
    text: Or 'Now we seek rest for ourselves'.
