  - severity: medium
    issue: Falta una nota para la alternativa «from before us / from our presence».
    rationale: El inglés conserva una nota [c] para esta frase. En español debe preservarse una alternativa equivalente, especialmente porque «de delante de nosotros» puede percibirse como poco usual.
  - severity: low
    issue: La nota [b] incluye «habitat», que no es una alternativa adecuada en este registro.
    rationale: «Hábitat» no corresponde al tono bíblico y distorsiona las alternativas documentadas, que son «dwelling / habitation»; en español convienen «morada / habitación / habitación permanente».
  - severity: low
    issue: «Se ha alejado» es algo menos fiel que «ha pasado» o «ha desaparecido» para ኀለፈ.
    rationale: El rastro léxico inglés enfatiza el pasar irreversible más que un simple alejamiento. Una leve corrección mejora la correspondencia sin afectar la naturalidad.
