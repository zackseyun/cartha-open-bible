translation:
  language: es
  text: Y después de esto[a], sus rostros se llenarán de tinieblas y vergüenza delante de aquel Hijo del Hombre[b], y serán expulsados de delante de su rostro, y una espada permanecerá delante de su rostro[c] en medio de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula final del ge'ez es sintácticamente difícil. Esta traducción conserva de cerca la imaginería; la espada puede implicar un instrumento permanente de juicio presente entre ellos delante de él.
    reason: textual_variant
  - marker: b
    text: '''Hijo del Hombre'' se mantiene aquí como la designación establecida de la figura apocalíptica en las Parábolas, no como una expresión genérica retroformada a partir del uso posterior del Nuevo Testamento.'
    reason: cross_reference
  - marker: c
    text: O 'delante de su rostro, en medio de ellos'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይመልእ
  english_pob_choice: will be filled
  chosen_spanish: se llenarán
  alternatives_spanish:
  - serán llenos
  - se colmarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor resultativo/pasivo del verbo se expresa con naturalidad en español mediante 'se llenarán', manteniendo la imagen de juicio sin volverla interpretativa.
- source_word: ገጾሙ
  english_pob_choice: their faces
  chosen_spanish: sus rostros
  alternatives_spanish:
  - sus caras
  - sus semblantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Rostros'' conserva la concreción imagística del texto y su tono apocalíptico; ''semblantes'' suena más literario pero menos directo.'
- source_word: ጽልመተ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - sombras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Tinieblas'' conserva mejor la fuerza judicial y bíblica del cuadro que ''oscuridad'', sin suavizar la severidad del pasaje.'
- source_word: ኃፍረተ
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - humillación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Vergüenza'' es el equivalente más directo y natural para emparejar con ''tinieblas'' en una escena de condena pública.'
- source_word: በቅድመ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición de la preposición en el original se refleja con 'delante de', que comunica exposición ante el juez con claridad idiomática.
- source_word: ዝኩ ወልደ እጓለ እመሕያው
  english_pob_choice: that Son of Man
  chosen_spanish: aquel Hijo del Hombre
  alternatives_spanish:
  - aquel hijo del hombre
  - aquel ser humano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto enóquico la expresión funciona como designación apocalíptica reconocible; 'Hijo del Hombre' preserva ese valor titular sin resolverlo hacia formulaciones posteriores.
- source_word: ይሰደዱ
  english_pob_choice: they will be driven away
  chosen_spanish: serán expulsados
  alternatives_spanish:
  - serán alejados
  - serán echados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido judicial de expulsión queda bien expresado por 'serán expulsados', que mantiene la fuerza pasiva del original.
- source_word: ሰይፍ
  english_pob_choice: a sword
  chosen_spanish: una espada
  alternatives_spanish:
  - la espada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El artículo indefinido en español reproduce adecuadamente el carácter no especificado del sustantivo en ge'ez.
- source_word: የኃድር
  english_pob_choice: will abide
  chosen_spanish: permanecerá
  alternatives_spanish:
  - quedará
  - morará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Permanecerá'' expresa continuidad de presencia amenazante, conservando la imagen de un juicio que no es momentáneo.'
- source_word: ማእከሎሙ
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - entre ellos
  - en su interior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''En medio de ellos'' reproduce la espacialidad concreta del original y evita imponer una interpretación más estrecha.'
theological_decisions:
- issue: Tratamiento de 'Hijo del Hombre' como título apocalíptico
  english_pob_reading: '''Son of Man'' is retained as the established designation of the apocalyptic figure in the Parables.'
  chosen_spanish_reading: '''Hijo del Hombre'' se conserva como designación apocalíptica establecida en el contexto del libro.'
  alternative_spanish_readings:
  - hijo del hombre
  - aquel ser humano
  rationale: La expresión en este pasaje no se normaliza a un giro genérico; mantener la forma titular conserva la teología propia de 1 Enoc sin fusionarla con usos posteriores.
  doctrine_reference: Preservar la tensión teológica del texto; no armonizar con cristología neotestamentaria posterior.
- issue: Relación entre la espada y el juicio
  english_pob_reading: '''a sword will abide ... in their midst'' preserves the imagery closely.'
  chosen_spanish_reading: '''una espada permanecerá en medio de ellos'' mantiene la imagen de un juicio presente y persistente.'
  alternative_spanish_readings:
  - una espada quedará entre ellos
  - la espada estará en medio de ellos
  rationale: El pasaje sugiere una presencia judicial continua; 'permanecerá' y 'en medio de ellos' conservan esa tensión sin explicarla más de lo que el texto permite.
  doctrine_reference: Mantener la imaginería apocalíptica sin resolver su simbolismo de forma dogmática.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente que corrige la sintaxis final: el texto base recuperado apunta a ''una espada permanecerá en medio de ellos'', no a una duplicación de ''delante de su rostro'' en la cláusula final. La versión española sigue esa lectura revisada.'
  spanish_consistency_notes:
  - Se mantuvo 'Hijo del Hombre' con mayúsculas por coherencia con el uso técnico del POB en contextos apocalípticos.
  - '''Tinieblas'' y ''vergüenza'' se conservaron como pares de juicio, evitando suavizarlos a términos más abstractos.'
  - '''Delante de'' y ''en medio de'' preservan la repetición espacial del original sin forzar una paráfrasis.'
  - No se usó 'SEÑOR' ni 'Cristo', porque el pasaje no los contiene en esta forma y la terminología propia del texto requiere mantener la designación local de 1 Enoc.
