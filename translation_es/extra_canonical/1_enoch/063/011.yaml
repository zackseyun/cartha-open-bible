base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/063/011.yaml
  text: And after this[a], their faces will be filled with darkness and shame before that Son of Man, and they will be driven away from before his face[c][b], and a sword will abide before his face in their midst.
  footnotes:
  - marker: a
    text: The final clause is syntactically difficult in Ge'ez. 'A sword will abide before his face in their midst' preserves the imagery closely; it may imply a standing instrument of judgment present among them before him.
    reason: textual_variant
  - marker: b
    text: '''Son of Man'' is retained here as the established designation of the apocalyptic figure in the Parables, not back-formed from later New Testament usage.'
    reason: cross_reference
  - marker: c
    text: Or 'before his face in their midst'.
    reason: previous_rendering
