translation:
  language: es
  text: En aquellos días, los poderosos y los reyes que poseen la tierra seca[a] pedirán a los ángeles del castigo[b], en cuyas manos han sido entregados, que les concedan un poco de respiro[c], para que se postren y adoren delante del Señor de los espíritus, y confiesen sus pecados delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge'ez es concreta ('tierra seca') y probablemente alude al dominio territorial; no se suaviza a 'mundo' para no perder esa concreción.
    reason: lexical_alternative
  - marker: b
    text: La frase puede entenderse como entrega/custodia judicial. 'En cuyas manos han sido entregados' sigue de cerca la revisión inglesa y conserva el matiz forense.
    reason: textual_variant
  - marker: c
    text: '''Un poco de respiro'' indica un alivio breve y limitado, no una liberación del juicio.'
    reason: cultural_note
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En ese tiempo
  - En aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal apocalíptica se conserva de modo natural en español con plural, manteniendo el registro visionario y repetitivo del original.
- source_word: ዓዚዛን
  english_pob_choice: the mighty ones
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los magnates
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Poderosos'' comunica la fuerza social y política del término sin sobredeterminar el rango exacto; en español fluye mejor que una forma demasiado literal.'
- source_word: ነገሥት
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los gobernantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Reyes'' es la equivalencia directa del título y conserva la formalidad del pasaje.'
- source_word: እለ ይእኅዝዋ ለየብስ
  english_pob_choice: who possess the dry land
  chosen_spanish: que poseen la tierra seca
  alternatives_spanish:
  - que poseen la tierra
  - que dominan la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la concreción de 'dry land' con 'tierra seca', evitando suavizarla a 'mundo' o 'tierra' sin más. La expresión es poco usual, pero refleja mejor la textura semítica/apocalíptica.
- source_word: እመላእክት መቅሠፍት
  english_pob_choice: the angels of punishment
  chosen_spanish: los ángeles del castigo
  alternatives_spanish:
  - los ángeles del castigo judicial
  - los ángeles de la pena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Castigo'' mantiene el sentido judicial y es más natural que ''tormento'' para el sustantivo de origen. Conserva la relación de juicio sin introducir matices no documentados.'
- source_word: በኀበ ሀለዉ ምጥዋነ
  english_pob_choice: into whose hands they have been delivered
  chosen_spanish: en cuyas manos han sido entregados
  alternatives_spanish:
  - a cuya custodia han sido entregados
  - en cuya custodia están
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen de 'manos' sigue de cerca la revisión inglesa y el valor judicial de entrega/custodia. En español es una forma idiomática y suficientemente precisa.
- source_word: ከመ የሀቦሙ ዕረፍተ ንስቲተ
  english_pob_choice: that they might give them a little respite
  chosen_spanish: que les concedan un poco de respiro
  alternatives_spanish:
  - que les concedan un breve descanso
  - que les den un poco de alivio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Respiro'' comunica bien la idea de alivio breve y limitado. ''Un poco'' refleja la restricción del tiempo/alcance del alivio.'
- source_word: ከመ ይደቁ ወይስግዱ
  english_pob_choice: so that they may fall down and worship
  chosen_spanish: para que se postren y adoren
  alternatives_spanish:
  - para que caigan y adoren
  - para que se inclinen y adoren
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Postrarse'' conserva el gesto corporal de sometimiento; ''adorar'' expresa el acto cultual correspondiente. Esta combinación evita sonar demasiado literal o demasiado vaga.'
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título fijo enochino en una forma reverente y reconocible en español. 'Espíritus' en mayúscula inicial no es necesaria aquí porque el título no se reduce al Espíritu Santo, sino a una designación plural divina.
- source_word: ወይትአመኑ ኃጢአቶሙ
  english_pob_choice: and confess their sins
  chosen_spanish: y confiesen sus pecados
  alternatives_spanish:
  - y reconozcan sus pecados
  - y admitan sus pecados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Confesar'' es la mejor correspondencia en este contexto penitencial-judicial y conserva la dimensión pública de reconocimiento ante Dios.'
theological_decisions:
- issue: Si la petición y la confesión implican arrepentimiento real o sumisión forzada bajo juicio
  english_pob_reading: The verse depicts a plea for brief relief in order to perform acts of submission and confession, without asserting that this repentance is accepted.
  chosen_spanish_reading: El versículo presenta una petición de alivio breve para realizar gestos de sometimiento y confesión, sin afirmar que ese arrepentimiento sea aceptado.
  alternative_spanish_readings:
  - La confesión muestra arrepentimiento sincero
  - La confesión es solo una admisión forzada
  rationale: El texto informa la petición y la acción prevista, pero no declara aceptación divina ni transformación interior. Conviene preservar esa tensión sin resolverla en una sola dirección.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de resolverla.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'to whom they have been handed over' a 'into whose hands they have been delivered' para alinearse mejor con la construcción del original. La redacción española sigue esa revisión con una imagen de custodia judicial en 'en cuyas manos han sido entregados'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparece el nombre divino יהוה; aquí no aparece, por lo que se conserva el título enochino 'Señor de los Espíritus'.
  - '''Pecados'' traduce con naturalidad la confesión final sin añadir una dimensión sacramental ajena al texto.'
  - La elección de 'tierra seca' preserva una rareza semítica del original y queda marcada con nota para evitar malentendidos.
