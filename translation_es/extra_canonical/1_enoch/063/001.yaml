base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/063/001.yaml
  text: In those days the mighty ones and the kings who possess the dry land shall beg the angels of punishment[a], into whose hands they have been delivered, that they might give them a little respite, so that they may fall down and worship before the Lord of Spirits[c][b], and confess their sins before him.
  footnotes:
  - marker: a
    text: Or 'who hold the earth/land.' The Ge'ez phrase is concrete ('the dry land') and likely refers to earthly dominion.
    reason: lexical_alternative
  - marker: b
    text: The clause rendered 'to whom they have been handed over' is textually difficult in the Ethiopic witness; the sense appears to be that these angels have custody over the condemned rulers.
    reason: textual_variant
  - marker: c
    text: '''A little respite'' indicates a brief, limited relief, not release from judgment.'
    reason: cultural_note
