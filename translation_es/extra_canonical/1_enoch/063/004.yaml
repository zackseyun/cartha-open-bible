translation:
  language: es
  text: Ahora sabemos que debemos alabar y bendecir al Señor de los reyes[a], y al que reina sobre todos los reyes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Señor de reyes'. Aquí se prefiere 'de los reyes' por claridad en español, manteniendo la construcción del ge'ez y sin comprimirla en la fórmula tradicional 'Rey de reyes'.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula conserva la segunda parte de la aclamación real del original: ''el que reina sobre todos los reyes'', en vez de sustituirla por una fórmula tradicional más condensada.'
    reason: source_note
lexical_decisions:
- source_word: ይእዜ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - En este momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca un giro temporal y discursivo inmediato; 'Ahora' es natural en español y conserva el cambio de reconocimiento expresado en el texto.
- source_word: አእመርነ
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - hemos entendido
  - hemos reconocido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma plural expresa conocimiento ya adquirido o reconocido; 'sabemos' comunica bien ese estado sin sobrecargar el español.
- source_word: ከመ ንሰብሖ ወንባርኮ
  english_pob_choice: we ought to praise and bless
  chosen_spanish: debemos alabar y bendecir
  alternatives_spanish:
  - que alabemos y bendigamos
  - habríamos de alabar y bendecir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor volitivo/subjuntivo de las formas ge'ez se refleja mejor en obligación moral en español; 'debemos' evita reducirlo a mera exhortación o futuro.
- source_word: ለእግዚኦሙ ለነገሥት
  english_pob_choice: the Lord of the kings
  chosen_spanish: el Señor de reyes
  alternatives_spanish:
  - el Señor de los reyes
  - el Dueño de reyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fuente literal no dice 'King of kings' como fórmula compacta; 'de reyes' conserva la estructura del genitivo y la tensión documental del texto.
- source_word: ወለዘ ይነግሥ ዲበ ኵሎሙ ነገሥት
  english_pob_choice: and the one who reigns over all the kings
  chosen_spanish: y al que reina sobre todos los reyes
  alternatives_spanish:
  - y al que gobierna sobre todos los reyes
  - y al que reina por encima de todos los reyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Reina sobre'' preserva la realeza en curso y la relación de dominio universal del relativo ge''ez, en español fluido y reverente.'
theological_decisions:
- issue: Cómo reflejar el título real sin imponer la fórmula tradicional 'Rey de reyes'
  english_pob_reading: the Lord of the kings and the one who reigns over all the kings
  chosen_spanish_reading: el Señor de reyes, y al que reina sobre todos los reyes
  alternative_spanish_readings:
  - el Rey de reyes
  - el Señor de los reyes
  rationale: 'La auditable lectura del ge''ez distingue dos miembros: un título de señorío sobre reyes y una cláusula relativa sobre reinar universalmente. Mantener esa distinción evita suavizar la evidencia textual.'
  doctrine_reference: Translation philosophy §§1, 3
- issue: Fuerza modal de las formas verbales en primera persona plural
  english_pob_reading: we ought to praise and bless
  chosen_spanish_reading: debemos alabar y bendecir
  alternative_spanish_readings:
  - alabemos y bendigamos
  - vamos a alabar y bendecir
  rationale: En un contexto de reconocimiento confesional, 'debemos' comunica obligación/adecuación moral sin convertirlo en simple imperativo o predicción.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta el registro de revisión inglesa que eliminó repeticiones innecesarias y volvió más idiomática la referencia a 'kings'; en español se mantuvo la estructura auditable del título real sin añadir artículos que la fuente no exige.
  spanish_consistency_notes:
  - Se usa 'Señor' para እግዚኦሙ según el tono titular del pasaje.
  - Se evita 'Cristo' o 'Rey de reyes' porque el testimonio ge'ez aquí distingue entre 'Señor de reyes' y el que reina sobre todos los reyes.
  - La construcción con 'al que' mantiene el relativo personal y solemne del original.
  - '''Sabemos'' y ''debemos'' conservan el giro confesional del reconocimiento presente.'
