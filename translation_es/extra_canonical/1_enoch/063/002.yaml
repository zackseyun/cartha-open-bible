base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/063/002.yaml
  text: And they will bless and praise the Lord of spirits[a], and they will say, “Blessed is the Lord of spirits, the Lord of the kings, the Lord of the mighty, the Lord of the great ones, the Lord of glory[c][b], and the Lord of wisdom.”
  footnotes:
  - marker: a
    text: The Ge'ez repeats 'Lord of ...' across each social class and abstract quality; the English keeps that repetition rather than compressing it.
    reason: cultural_note
  - marker: b
    text: The phrase rendered 'the rich' may also be understood more broadly as those who possess wealth or property.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Lord of the kings, the Lord of the mighty, the Lord of the rich, the Lord of glory, and the Lord of wisdom.'.
    reason: previous_rendering
