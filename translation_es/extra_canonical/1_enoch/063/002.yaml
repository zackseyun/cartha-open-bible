translation:
  language: es
  text: 'Y ellos bendecirán y alabarán al Señor de los espíritus[a], y dirán: «Bendito es el Señor de los espíritus, el Señor de los reyes, el Señor de los poderosos, el Señor de los grandes[b], el Señor de la gloria, y el Señor de la sabiduría[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez repite el patrón «Señor de...» con cada clase social o cualidad abstracta; se mantiene la estructura repetitiva para conservar el efecto litúrgico y la solemnidad del pasaje.
    reason: cultural_note
  - marker: b
    text: «Los grandes» refleja la lectura ampliada de ብዑላን en este contexto; también puede entenderse como personas de riqueza o posición elevada.
    reason: lexical_alternative
  - marker: c
    text: 'También puede ordenarse como: «el Señor de los reyes, el Señor de los poderosos, el Señor de los grandes, el Señor de la gloria y el Señor de la sabiduría».'
    reason: alternative_reading
lexical_decisions:
- source_word: ይባርክዎ
  english_pob_choice: they will bless
  chosen_spanish: bendecirán
  alternatives_spanish:
  - ellos bendecirán
  - bendecirán a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa bendecir en una fórmula de aclamación futura; en español, «bendecirán» mantiene el valor doxológico y la direccionalidad implícita del objeto sin volver la frase pesada con un pronombre explícito.
- source_word: ይሴብሕዎ
  english_pob_choice: praise
  chosen_spanish: alabarán
  alternatives_spanish:
  - glorificarán
  - exaltarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Alabar» conserva el paralelismo con «bendecirán» y comunica de manera clara la segunda acción de culto sin sobreelevar el registro más allá del género litúrgico del texto.
- source_word: እግዚአ መንፈሳት / እግዚአ መናፍስት
  english_pob_choice: Lord of spirits
  chosen_spanish: Señor de los espíritus
  alternatives_spanish:
  - Señor de los espíritus
  - Dueño de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título en forma estable y reverente. «Señor» sigue la convención del proyecto para títulos divinos y «de los espíritus» preserva el alcance cósmico del genitivo plural.
- source_word: ቡሩክ ውእቱ
  english_pob_choice: Blessed is
  chosen_spanish: Bendito es
  alternatives_spanish:
  - Bendecido es
  - Sea bendito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La escena es una proclamación declarativa; «Bendito es» reproduce mejor el valor de aclamación que una forma optativa como «Sea bendito».
- source_word: እግዚኦሙ ለነገሥት
  english_pob_choice: the Lord of the kings
  chosen_spanish: el Señor de los reyes
  alternatives_spanish:
  - el Señor de los reyes
  - el Señor sobre los reyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El genitivo con valor de soberanía se vierte naturalmente como «de los reyes», conservando la cadencia repetitiva del título.
- source_word: ዐዚዛን
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los valientes
  - los poderosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de clases sociales y poder, «poderosos» comunica mejor la fuerza y la posición de dominio que un simple rasgo físico.
- source_word: ብዑላን
  english_pob_choice: the great ones
  chosen_spanish: los grandes
  alternatives_spanish:
  - los grandes
  - los ricos
  - los nobles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el ajuste revisado del audit trail inglés hacia «the great ones», en español «los grandes» preserva la amplitud semántica de dignidad/rango sin restringirlo a riqueza material.
- source_word: እግዚአ ስብሐት
  english_pob_choice: the Lord of glory
  chosen_spanish: el Señor de la gloria
  alternatives_spanish:
  - el Señor de la gloria
  - el Señor del esplendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gloria» mantiene el registro apocalíptico y la terminología bíblica estable, más fiel que «esplendor» para esta fórmula de título.
- source_word: እግዚአ ጥበብ
  english_pob_choice: the Lord of wisdom
  chosen_spanish: el Señor de la sabiduría
  alternatives_spanish:
  - el Señor de la sabiduría
  - el Señor del entendimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sabiduría» reproduce el campo semántico básico del término y evita estrecharlo a mera inteligencia o comprensión técnica.
theological_decisions:
- issue: Mantenimiento del título divino fijo እግዚአ መንፈሳት
  english_pob_reading: Lord of spirits
  chosen_spanish_reading: Señor de los espíritus
  alternative_spanish_readings:
  - Señor de los espíritus
  - Dueño de los espíritus
  rationale: Se conserva la fórmula en traducción estable para no diluir su carácter enóquico y para mantener coherencia interna con el título divino en el resto de la obra.
  doctrine_reference: Translation philosophy §2, §4
- issue: Valor de ቡሩክ ውእቱ como aclamación declarativa
  english_pob_reading: Blessed is
  chosen_spanish_reading: Bendito es
  alternative_spanish_readings:
  - Sea bendito
  - Bendecido es
  rationale: El contexto es una proclamación de seres hablantes; la forma declarativa respeta la sintaxis y evita convertir la frase en una súplica litúrgica.
  doctrine_reference: Translation philosophy §3
- issue: Repetición polisindética de los títulos divinos
  english_pob_reading: the Lord of the kings, the Lord of the mighty, the Lord of the great ones, the Lord of glory, and the Lord of wisdom
  chosen_spanish_reading: el Señor de los reyes, el Señor de los poderosos, el Señor de los grandes, el Señor de la gloria y el Señor de la sabiduría
  alternative_spanish_readings:
  - el Señor de los reyes, el Señor de los poderosos, el Señor de los nobles, el Señor de la gloria y el Señor de la sabiduría
  - el Señor de los reyes, y el Señor de los poderosos, y el Señor de los grandes, y el Señor de la gloria, y el Señor de la sabiduría
  rationale: El texto ge'ez usa repetición deliberada de la conjunción para dar solemnidad; en español se conserva la repetición de «el Señor de...» y, en la cita, el tono acumulativo sin forzar una traducción excesivamente artificiosa.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail inglés, que prefirió «the great ones» para ብዑላን y eliminó la repetición explícita de «and» por fluidez en inglés. En español se recupera la repetición retórica de los títulos mediante la estructura paralela «el Señor de...», sin copiar mecánicamente el cambio estilístico del inglés cuando este debilitaba la fuerza del original ge'ez.
  spanish_consistency_notes:
  - Se usó «Señor» para el título divino en coherencia con el estilo del proyecto y con la traducción estable de títulos enóquicos.
  - Se mantuvo «espíritus» en plural para reflejar el genitivo plural del original.
  - Se evitó «Cristo» y otras equivalencias cristológicas ajenas al texto.
  - Se eligió «gloria» y «sabiduría» como abstracciones sustantivas, no como adjetivos, para sostener el patrón del título.
