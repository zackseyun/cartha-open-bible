base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/063/008.yaml
  text: And in the day of our trouble and our affliction[a], he will not save us, and we shall not find rest; for we trusted that our Lord is faithful in all his works and in his judgments and his righteousness[c][b], and his judgments show no partiality.
  footnotes:
  - marker: a
    text: The clause 'we shall find no rest to believe' is textually and syntactically difficult in the Ge'ez. It may mean 'we shall find no rest in which to trust' or 'we shall find no respite for hope.'
    reason: alternative_reading
  - marker: b
    text: Literally, the final clause refers to judgment not 'lifting up the face'—an idiom for showing no favoritism or partiality.
    reason: lexical_alternative
  - marker: c
    text: Or 'in all his works and in his judgments; and his judgment shows no partiality.'.
    reason: previous_rendering
