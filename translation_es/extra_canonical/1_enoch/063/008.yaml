translation:
  language: es
  text: Y en el día de nuestra angustia y de nuestra aflicción[a], no nos salvará, y no hallaremos descanso; porque confiábamos en que nuestro Señor es fiel en todas sus obras, en sus juicios y en su justicia, y sus juicios no hacen acepción de personas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El ge''ez de esta cláusula es difícil textual y sintácticamente. También puede entenderse como: «y no hallaremos descanso para confiar», «y no hallaremos descanso en el que creer», o «y no hallaremos reposo para esperar»'
    reason: alternative_reading
  - marker: b
    text: Literalmente, el final del verso habla de no «levantar el rostro», un modismo para no favorecer a nadie en el juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: በዕለተ
  english_pob_choice: in the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - en el tiempo de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición temporal conserva el tono solemne y escatológico del pasaje sin volverlo artificioso en español.
- source_word: ስራሕነ
  english_pob_choice: our distress
  chosen_spanish: nuestra angustia
  alternatives_spanish:
  - nuestra aflicción
  - nuestra tribulación
  - nuestra pena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El campo semántico apunta a una situación de aflicción intensa; 'angustia' suena natural en español bíblico y recoge bien la carga existencial del término.
- source_word: ምንዳቤነ
  english_pob_choice: our affliction
  chosen_spanish: nuestra aflicción
  alternatives_spanish:
  - nuestro sufrimiento
  - nuestro castigo
  - nuestra tribulación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantengo 'aflicción' para reflejar el paralelo con el término anterior sin forzar una especificación causal que el verso no explicita de modo directo.
- source_word: ኢያድኅነነ
  english_pob_choice: he will not save us
  chosen_spanish: no nos salvará
  alternatives_spanish:
  - no nos librará
  - no nos rescatará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Salvar'' conserva la fuerza salvífica del verbo y encaja con el juicio implícito del contexto.'
- source_word: ኢንረክብ ዕረፍተ
  english_pob_choice: we shall not find rest
  chosen_spanish: no hallaremos descanso
  alternatives_spanish:
  - no encontraremos reposo
  - no tendremos alivio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro difícil se traduce de forma sobria y transparente. 'Descanso' comunica la idea sin resolver de antemano la ambigüedad del hebreo/etiópico subyacente.
- source_word: ንእመን
  english_pob_choice: to believe / to trust
  chosen_spanish: confiamos
  alternatives_spanish:
  - creímos
  - teníamos confianza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase etiópica es sintácticamente difícil. En español, el verbo en pasado contextualiza de manera natural la confianza previa de los hablantes, sin borrar la noción de fe/confianza que el audit trail documenta.
- source_word: መሃይምን
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fidedigno
  - verdadero
  - confiable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fiel'' es la equivalencia más directa y teológicamente reconocible para la confiabilidad del Señor.'
- source_word: ምግባሩ
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Obras'' reproduce bien el sentido general de acciones divinas y funciona con el registro bíblico en español.'
- source_word: ኵነኔሁ
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - su juicio
  - sus sentencias
  - su justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El plural se conserva porque el texto enumera varias dimensiones: obras, juicios y justicia. ''Juicios'' respeta la forma plural del original y el tono legal del pasaje.'
- source_word: ጽድቁ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia recta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí conviene mantener 'justicia' para conservar el paralelismo con 'juicios' y el valor moral-jurídico del término. En español, 'rectitud' sería posible, pero debilita la resonancia forense del contexto.
- source_word: ገጹ
  english_pob_choice: partiality / face
  chosen_spanish: acepción de personas
  alternatives_spanish:
  - favoritismo
  - parcialidad
  - aceptación de rostros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión idiomática se vierte con un equivalente bíblico claro en español. 'Acepción de personas' comunica el sentido jurídico de no favorecer a nadie.
- source_word: ኢይነሥኡ
  english_pob_choice: show no partiality / do not lift up the face
  chosen_spanish: no hacen acepción de personas
  alternatives_spanish:
  - no muestran favoritismo
  - no levantan el rostro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la decisión auditada de traducir el modismo con claridad idiomática en español, manteniendo el contenido judicial sin una literalidad opaca.
theological_decisions:
- issue: La cláusula difícil sobre no hallar descanso y confiar/creer
  english_pob_reading: we shall not find rest; for we trusted
  chosen_spanish_reading: no hallaremos descanso; porque confiamos
  alternative_spanish_readings:
  - no hallaremos descanso para confiar
  - no hallaremos descanso en el que creer
  - no hallaremos reposo ni confianza
  rationale: 'El ge''ez presenta una construcción difícil. En español, la frase queda más transparente si se explicita la relación causal: el lamento surge porque antes confiaron en Yahvé. Esta solución conserva la tensión del pasaje sin imponer una paráfrasis excesiva.'
  doctrine_reference: Preservar la dificultad textual con claridad mínima; no resolver más allá de lo que el testimonio permite.
- issue: La fórmula final de juicio sin favoritismo
  english_pob_reading: his judgments show no partiality
  chosen_spanish_reading: sus juicios no hacen acepción de personas
  alternative_spanish_readings:
  - sus juicios no muestran favoritismo
  - sus juicios no aceptan rostros
  - sus juicios son imparciales
  rationale: El trasfondo idiomático alude a no 'levantar el rostro' en sentido de favorecer a alguien. La fórmula española bíblica 'acepción de personas' comunica bien el valor legal y teológico de imparcialidad.
  doctrine_reference: Lenguaje judicial bíblico; traducción idiomática de un modismo semítico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que recupera la lista completa del original etiópico: obras, juicios y justicia. La redacción española refleja esa tripleta sin omitir ninguno de sus términos. También se consideró que la cláusula final expresa imparcialidad judicial mediante un modismo semítico, por lo que se tradujo idiomáticamente en vez de literalmente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino según la norma del proyecto, pero aquí el texto dice 'nuestro Señor' en la fuente inglesa auditada; en este verso el referente se mantiene como 'nuestro Señor' porque el original etiópico emplea un título señorío y el verso en español sigue el contexto del audit trail sin introducir una convención no atestiguada en esta sección.
  - '''Juicios'' se mantiene en plural para reflejar la enumeración del original.'
  - '''Justicia'' conserva la resonancia jurídico-moral del término y evita diluir el paralelismo con ''juicios''.'
  - La sintaxis busca ser publicable en español moderno sin perder la dureza del lamento apocalíptico.
