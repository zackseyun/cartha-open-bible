translation:
  language: es
  text: Y tu poder es bendecido en toda cosa oculta[a], por todas las generaciones, y tu gloria por los siglos de los siglos. Profundas son todas tus cosas ocultas[b], y son innumerables; y tu rectitud[c] está más allá de todo cálculo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''en todas tus cosas ocultas'' / ''en tus secretos''. El ge''ez es más literalmente ''en toda cosa oculta'', aunque el expediente de revisión también registró una lectura previa: ''Y bendito sea tu poder oculto''.'
    reason: lexical_alternative
  - marker: b
    text: O 'todas tus cosas escondidas' o 'todos tus misterios'. El ge'ez dice más literalmente 'todas tus cosas ocultas'.
    reason: lexical_alternative
  - marker: c
    text: O 'tu justicia'. El término ge'ez también puede llevar ese matiz, pero aquí 'rectitud' refleja mejor la preferencia doxológica documentada.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, la idea es que 'no tiene cálculo/recuento'. Es decir, está más allá de todo cómputo o valoración exhaustiva.
    reason: source_note
lexical_decisions:
- source_word: ይበርህ
  english_pob_choice: shines / is blessed (revised audit conflict)
  chosen_spanish: resplandece
  alternatives_spanish:
  - brilla
  - alumbra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez ይበርህ es de በርሀ, 'brillar / resplandecer', no una fórmula de bendición. 'Resplandece' conserva el valor verbal y el tono solemne sin resolver indebidamente la tensión textual del audito.
- source_word: ኵሉ ኅቡእ
  english_pob_choice: every hidden thing
  chosen_spanish: toda cosa oculta
  alternatives_spanish:
  - todo lo oculto
  - cada cosa escondida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es concreta y plural/abarcadora; 'toda cosa oculta' mantiene la amplitud y la literalidad relativa sin introducir 'misterios' o 'secretos' que serían más interpretativos.
- source_word: ለትውልደ ትውልድ
  english_pob_choice: throughout all generations
  chosen_spanish: por todas las generaciones
  alternatives_spanish:
  - de generación en generación
  - por generación tras generación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula idiomática expresa duración continua. 'Por todas las generaciones' es natural en español y mantiene el alcance durativo del original.
- source_word: ስብሐቲከ
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu esplendor
  - tu alabanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto doxológico, el término apunta a la gloria/esplendor divino, no al acto de alabanza ofrecido a Dios.
- source_word: ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por siempre jamás
  - por la edad de las edades
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula española litúrgica transmite bien la perpetuidad enfática del giro ge'ez y suena natural en registro bíblico.
- source_word: ዕሙቅ ውእቱ
  english_pob_choice: Deep are
  chosen_spanish: Profundo es
  alternatives_spanish:
  - Profundos son
  - Hondo es
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el orden enfático y el tono poético. 'Profundo es' refleja la cualidad de insondabilidad del sujeto siguiente.
- source_word: ኍልቈ አልቦሙ
  english_pob_choice: they are without number
  chosen_spanish: no tiene número
  alternatives_spanish:
  - son innumerables
  - no se pueden contar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idiomática ge'ez expresa incalculabilidad. En español, 'no tiene número' mantiene la textura formal y la idea de innumerabilidad.
- source_word: ጽድቅ ዚአከ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu justicia recta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí se preserva la alternativa semántica documentada por el propio POB. 'Justicia' es una traducción posible y fuerte en español; el contexto de proclamación divina permite también 'rectitud', pero se elige 'justicia' para no debilitar el peso ético-jurídico del término.
theological_decisions:
- issue: Si el verso debe leerse como 'tu poder resplandece' o como una fórmula de bendición sobre el poder
  english_pob_reading: The audit trail is conflicted, but the latest adjudicated correction rejects 'blessed' and reads the Ge'ez verb as 'shines'.
  chosen_spanish_reading: Y tu poder resplandece en toda cosa oculta
  alternative_spanish_readings:
  - Y tu poder es bendecido en toda cosa oculta
  - Y tu poder brilla en toda cosa oculta
  rationale: La forma ge'ez no es un jussivo de bendición sino un verbo de brillo/resplandor. La traducción española debe seguir esa corrección para no perder el sentido del original ni la revisión más sólida del auditorio.
  doctrine_reference: Primacía del lenguaje fuente; corrección textual frente a tradición de traducción
- issue: Cómo rendir ኅቡእ sin reducirlo a 'misterios' o 'secretos'
  english_pob_reading: all your hidden things
  chosen_spanish_reading: toda cosa oculta
  alternative_spanish_readings:
  - todos tus secretos
  - todos tus misterios
  rationale: El texto conserva una ambigüedad reverente sobre lo escondido en Dios. 'Toda cosa oculta' evita importar categorías posteriores y mantiene la tensión entre lo revelado y lo oculto.
  doctrine_reference: Conservar la tensión teológica; no sobreinterpretar el léxico fuente
- issue: Cómo traducir ጽድቅ en este contexto doxológico
  english_pob_reading: your righteousness
  chosen_spanish_reading: tu justicia
  alternative_spanish_readings:
  - tu rectitud
  rationale: '''Justicia'' mantiene el rango semántico de ጽድቅ y puede abarcar rectitud moral y justicia activa. En una alabanza a Dios, no se limita a un acto forense aislado.'
  doctrine_reference: Consistencia léxica con flexibilidad contextual
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente que corrige el inicio del verso: el ge''ez ይበርህ significa ''resplandece / brilla'', no ''es bendecido''. También he evitado la lectura previa de ''tu poder oculto'' porque el audit trail indica que la secuencia es ''tu poder resplandece en toda cosa oculta''. He mantenido las demás decisiones del POB sobre ''gloria'', la fórmula temporal, la profundidad e incontabilidad, y he dejado ''justicia'' como alternativa documentada para ጽድቅ.'
  spanish_consistency_notes:
  - He usado 'Yahvé' no porque aparezca en este verso, sino para mantener la consistencia del proyecto cuando corresponda; aquí el texto fuente usa un vocativo divino sin necesidad de sustituirlo.
  - He mantenido un registro doxológico elevado, con verbos y fórmulas que suenan bíblicos en español sin calco excesivo.
  - He evitado 'misterios' como traducción principal de ኅቡእ para no resolver la ambigüedad del original.
  - La puntuación separa las cláusulas de alabanza con claridad, respetando el paralelismo poético del texto ge'ez.
