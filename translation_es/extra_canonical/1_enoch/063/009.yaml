translation:
  language: es
  text: Y nos alejamos de delante de su rostro[a], a causa de nuestras obras, y todos nuestros pecados son contados en justicia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su presencia». El ge'ez dice literalmente «de delante de su rostro», una expresión vívida que conserva la escena de estar ante el juez divino.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final también puede entenderse como «todos nuestros pecados son contados justamente» o «son tenidos en cuenta en justicia». El ge'ez es judicial, pero no explicita del todo el matiz exacto.
    reason: alternative_reading
lexical_decisions:
- source_word: ወነኀልፍ
  english_pob_choice: and we pass away
  chosen_spanish: y pasamos
  alternatives_spanish:
  - y pasamos de esta vida
  - y desaparecemos
  - y perecemos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa pasar, irse o desaparecer; en este contexto de juicio, el español natural y fiel es «pasamos», que conserva el movimiento de salida sin añadir la idea moderna de morir implícita en «pasar away».
- source_word: እምገጹ
  english_pob_choice: from before his face
  chosen_spanish: de delante de su rostro
  alternatives_spanish:
  - de su presencia
  - de delante de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta y semítica de estar «delante de su rostro», que refleja mejor el valor literal de «from before his face» que la paráfrasis más lisa «de su presencia».
- source_word: በእንተ ምግባሪነ
  english_pob_choice: because of our deeds
  chosen_spanish: a causa de nuestras obras
  alternatives_spanish:
  - por nuestras obras
  - a causa de nuestros hechos
  - por nuestra conducta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obras» comunica bien el sustantivo de acciones/obras y mantiene el tono confesional-jurídico. «A causa de» expresa con claridad la relación causal del giro ge'ez.
- source_word: ወኵሉ ኃጢአትነ
  english_pob_choice: and all our sins
  chosen_spanish: y todos nuestros pecados
  alternatives_spanish:
  - y todos nuestros errores
  - y todos nuestros delitos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pecados» es el equivalente natural y teológicamente preciso para ኃጢአት. «Todos» preserva el alcance totalizador del original.
- source_word: በጽድቅ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - con justicia
  - justamente
  - en rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase ge'ez tiene tono judicial. En español, «en justicia» conserva la forma nominal y deja abierta la posible fuerza de estándar o modo, igual que el POB inglés mantuvo la tensión entre «in righteousness» y una posible lectura adverbial.
- source_word: ትኈለቍ
  english_pob_choice: are counted
  chosen_spanish: son contados
  alternatives_spanish:
  - son computados
  - son tenidos en cuenta
  - son reckoned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Son contados» sigue de cerca la metáfora de cómputo/registro y resulta natural en español bíblico. Mantiene la ambigüedad judicial sin resolverla hacia «juzgados» o «pesados».
theological_decisions:
- issue: Imagen concreta de exclusión ante el juez divino
  english_pob_reading: from before his face
  chosen_spanish_reading: de delante de su rostro
  alternative_spanish_readings:
  - de su presencia
  - de delante de él
  rationale: Se preserva la imaginería apocalíptica y judicial del texto fuente, sin suavizarla en una expresión más abstracta. Esto sigue la preferencia del POB por mantener la concreción semítica cuando es inteligible en español.
  doctrine_reference: 'Translation philosophy: preserve original-language primacy and avoid flattening apocalyptic imagery.'
- issue: Sentido de la cláusula final sobre los pecados y la justicia
  english_pob_reading: all our sins are counted in righteousness
  chosen_spanish_reading: todos nuestros pecados son contados en justicia
  alternative_spanish_readings:
  - todos nuestros pecados son contados justamente
  - todos nuestros pecados son tenidos en cuenta con justicia
  - todos nuestros pecados son juzgados con justicia
  rationale: La forma ge'ez es judicial pero no del todo explícita. «Son contados en justicia» conserva tanto la metáfora de registro como el estándar de justicia, sin cerrar indebidamente la tensión interpretativa.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; prefer transparent wording plus documentation where the sense is uncertain.'
translation_notes:
  revision_awareness: El inglés auditado pasó de «we pass from before his face» a «we pass away from before his face» para evitar el falso matiz moderno de muerte asociado a «pass away», y pasó de «are reckoned up» a «are counted» por naturalidad. La versión española sigue esa lectura revisada y mantiene la tensión judicial sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiría; aquí no aparece el nombre divino explícito.
  - Se eligió «justicia» para በጽድቅ, en coherencia con el registro jurídico del pasaje.
  - Se prefirió «obras» para ምግባሪነ, ya que en este contexto no hace falta forzar una glosa más amplia como «conducta».
  - Se mantuvo la metáfora de cómputo con «son contados» en lugar de una paráfrasis como «son juzgados», para conservar la tensión del original.
