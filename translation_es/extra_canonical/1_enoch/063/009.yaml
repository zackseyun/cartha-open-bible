  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Justicia» para በጽድቅ y «pecados» para ኃጢአት están bien. La conservación de «rostro» sigue la preferencia del proyecto por no aplanar la imagen de presencia divina.
  issues:
  - severity: medium
    issue: La frase inicial «Y pasamos de delante de su rostro» suena poco idiomática en español.
    rationale: Aunque es comprensible y bastante literal, la combinación verbal y preposicional se percibe forzada. «Nos alejamos de delante de su rostro» conserva la imagen de exclusión espacial ante el juez divino y evita introducir la idea de muerte asociada a «pasar away».
  - severity: low
    issue: La nota a ya no correspondería exactamente si se revisa el verbo principal.
    rationale: Las notas deben armonizar con el texto final y sus alternativas documentadas.
