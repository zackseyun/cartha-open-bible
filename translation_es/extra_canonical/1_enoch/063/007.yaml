translation:
  language: es
  text: Porque, delante de él, no creímos[a], y no alabamos el nombre del Señor de los espíritus[a][b], [y no alabamos a nuestro Señor,] y nuestra esperanza estaba en el cetro de nuestro reino y en nuestra gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula entre corchetes sobre 'y no alabamos a nuestro Señor' es incierta en el testimonio suministrado y puede reflejar una variante o una expansión secundaria.
    reason: textual_variant
  - marker: b
    text: '''Cetro'' traduce una palabra que también puede significar ''vara'' o ''bastón''; aquí el sentido regio encaja con la confesión sobre el reino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce la razón de la confesión con una causalidad natural en español; 'Porque' conserva el valor explicativo sin endurecer el orden sintáctico.
- source_word: በቅድሜሁ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la relación espacial/judicial de forma clara y digna en español. 'Delante de él' mantiene la escena de comparecencia sin sonar arcaico.
- source_word: አአመነ
  english_pob_choice: we did not believe
  chosen_spanish: no creímos
  alternatives_spanish:
  - no confiamos
  - no tuvimos fe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de raíz de fe/belief se vierte de manera directa. 'Creímos' conserva la fuerza verbal concreta; el negativo viene del texto crítico revisado en la auditoría.
- source_word: አሰባሕነ
  english_pob_choice: we did not praise
  chosen_spanish: no alabamos
  alternatives_spanish:
  - no bendecimos
  - no glorificamos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Alabar'' es la equivalencia más natural para el verbo de alabanza en español eclesial contemporáneo, sin convertirlo en un término más interpretativo.'
- source_word: ለስሙ
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - su nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el objeto explícito 'el nombre', porque el giro semítico tiene peso reverencial y no debe simplificarse prematuramente a 'su nombre'.
- source_word: እግዚአ መናፈስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título apocalíptico tradicional de 1 Enoc con mayúscula reverencial; 'Espíritus' reproduce el título fijo y la forma establecida en la obra.
- source_word: ወአሰባሕናሁ ለእግዚእነ
  english_pob_choice: and we praised our Lord
  chosen_spanish: y no alabamos a nuestro Señor
  alternatives_spanish:
  - y no bendecimos a nuestro Señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula bracketed se representa con el mismo valor negativo que el texto crítico revisado; 'a nuestro Señor' conserva el objeto personal explícito sin borrar la incertidumbre textual.
- source_word: ወተስፋነ ኮነ ዲበ
  english_pob_choice: and our hope was in
  chosen_spanish: y nuestra esperanza estaba en
  alternatives_spanish:
  - y nuestra esperanza descansaba en
  - y pusimos nuestra esperanza en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción verbal se naturaliza en español con un imperfecto estático que conserva el sentido de dependencia o apoyo, sin convertirlo en una decisión más explícita de la que el texto exige.
- source_word: በትረ መንግሥትነ
  english_pob_choice: the scepter of our kingdom
  chosen_spanish: el cetro de nuestro reino
  alternatives_spanish:
  - la vara de nuestro reino
  - el báculo de nuestro reino
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cetro'' reproduce el sentido regio indicado por la auditoría; aunque la raíz puede significar vara o bastón, el contexto político- monárquico hace preferible el símbolo real.'
- source_word: ስብሐቲነ
  english_pob_choice: our glory
  chosen_spanish: nuestra gloria
  alternatives_spanish:
  - nuestro esplendor
  - nuestro honor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Gloria'' conserva el valor de autoexaltación y prestigio real del contexto. Es la opción más directa y eclesialmente inteligible en español.'
theological_decisions:
- issue: 'Negación del confesante: los reyes admiten falta de fe y de alabanza, no una fe genuina'
  english_pob_reading: we did not believe, and we did not praise the name of the Lord of Spirits
  chosen_spanish_reading: no creímos, y no alabamos el nombre del Señor de los Espíritus
  alternative_spanish_readings:
  - creímos, y alabamos
  - no confiamos, y no dimos alabanza
  rationale: La revisión crítica señaló un error de OCR que invertía la negación. El español debe reflejar la confesión de culpa tal como exige el contexto judicial de 1 Enoc 63, sin suavizarla.
  doctrine_reference: Preservar la tensión teológica y la confesión de juicio; no resolverla por armonización interpretativa.
- issue: Tratamiento de la cláusula entre corchetes sobre 'nuestro Señor'
  english_pob_reading: '[and we praised our Lord]'
  chosen_spanish_reading: '[y no alabamos a nuestro Señor,]'
  alternative_spanish_readings:
  - '[y alabamos a nuestro Señor,]'
  - '[y alabamos a nuestro Señor]'
  rationale: La cláusula está marcada como incierta en el testimonio y la auditoría la considera variante o expansión secundaria. En español se mantiene entre corchetes y en forma negativa, coherente con el texto crítico revisado.
  doctrine_reference: Prioridad del testimonio textual sobre la suavización estilística; conservar la incertidumbre documental.
- issue: 'Imagen política: esperanza puesta en el cetro del reino y en la gloria propia'
  english_pob_reading: our hope was in the scepter of our kingdom and in our glory
  chosen_spanish_reading: nuestra esperanza estaba en el cetro de nuestro reino y en nuestra gloria
  alternative_spanish_readings:
  - nuestra esperanza estaba en la vara de nuestro reino y en nuestro esplendor
  - nuestra esperanza se apoyaba en el poder de nuestro reino y en nuestro honor
  rationale: Conviene conservar la imaginería concreta del cetro y de la gloria para que la crítica profética al poder humano permanezca visible. No se abstrae a 'poder' o 'status' porque eso debilitaría el contraste apocalíptico.
  doctrine_reference: Primacía del lenguaje de fuente y conservación de la imaginería apocalíptica.
translation_notes:
  revision_awareness: 'La auditoría crítica corrigió una lectura previa errónea que invertía la negación por una confusión del prefijo ge''ez ኢ con አ. El texto español se alinea con la revisión más reciente: negar fe y alabanza, no afirmarlas. También se conservó la cláusula bracketed como incierta, tal como indica el aparato auditable.'
  spanish_consistency_notes:
  - Se usa 'Señor de los Espíritus' como título fijo de 1 Enoc, con mayúscula reverencial en 'Espíritus'.
  - '''Alabar'' se mantiene como verbo de culto en lugar de ''bendecir'' o ''glorificar'' para conservar sencillez y correspondencia verbal.'
  - '''Cetro'' se eligió por la fuerza regia del contexto; la nota aclara la posible alternativa ''vara'' para mantener auditable la decisión.'
  - La negación se expresa dos veces en concordancia con el texto crítico revisado y con el tono confesional de la escena.
