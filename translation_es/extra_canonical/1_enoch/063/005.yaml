translation:
  language: es
  text: 'Y dijeron: «¿Quién nos ha dado reposo[a], para que alabemos y demos gracias y creamos delante de tu gloria?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alivio» para «reposo». El sustantivo puede denotar descanso, respiro o alivio; el contexto subraya la falta de toda pausa bajo juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: መኑ
  english_pob_choice: who
  chosen_spanish: ¿Quién... ?
  alternatives_spanish:
  - ¿Qué persona... ?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El interrogativo introduce una pregunta de lamentación; «quién» es el equivalente natural y claro en español.
- source_word: ወሀበነ
  english_pob_choice: has given us
  chosen_spanish: nos ha dado
  alternatives_spanish:
  - nos dio
  - nos concedió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa dar/conceder; el perfecto español mantiene bien la fuerza de una pregunta retórica sobre si ese descanso fue alguna vez otorgado.
- source_word: ዕረፍተ
  english_pob_choice: rest
  chosen_spanish: reposo
  alternatives_spanish:
  - descanso
  - alivio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede significar reposo, descanso o alivio. «Reposo» preserva la sobriedad del contexto judicial y apocalíptico, sin volverlo demasiado coloquial.
- source_word: ከመ
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula marca propósito o resultado; «para que» expresa de forma natural el sentido final en español.
- source_word: ንሰብሖ
  english_pob_choice: we should praise
  chosen_spanish: alabemos
  alternatives_spanish:
  - glorifiquemos
  - lo alabemos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo pertenece al campo de alabar/glorificar. «Alabemos» conserva la sencillez y evita introducir un complemento no explícito en el texto fuente.
- source_word: ወናአኵቶ
  english_pob_choice: and thank
  chosen_spanish: y demos gracias
  alternatives_spanish:
  - y agradezcamos
  - y den gracias
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo significa agradecer o dar gracias. La construcción verbal española sigue bien la secuencia triádica sin forzar un registro litúrgico excesivo.
- source_word: ወንእመን
  english_pob_choice: and believe
  chosen_spanish: y creamos
  alternatives_spanish:
  - y creamos/creyéramos
  - y confesemos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa y la gramática ge'ez apuntan a «creer» más que a «confesar». En español, «creamos» refleja el valor verbal del original y mantiene la deliberada repetición temática de la fe.
- source_word: ቅድመ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Delante de» reproduce con naturalidad la idea espacial/relacional de estar ante la gloria divina, con un tono solemne.
- source_word: ስብሐቲከ
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu majestad
  - tu esplendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gloria» es la equivalencia más directa y teológicamente adecuada para el campo semántico del término en este contexto apocalíptico.
theological_decisions:
- issue: Naturaleza de la pregunta bajo juicio
  english_pob_reading: 'A rhetorical lament: they have not been given any rest or respite from judgment, and therefore cannot stand in thankful praise before the divine glory.'
  chosen_spanish_reading: 'Una queja retórica: no se les ha concedido reposo ni alivio bajo el juicio, y por eso no pueden presentarse en alabanza agradecida delante de la gloria divina.'
  alternative_spanish_readings:
  - Una pregunta informativa sobre quién les concedió tiempo para el culto.
  - Una formulación más neutral sobre descanso y adoración.
  rationale: El contexto de condena en el capítulo exige conservar el tono de lamento judicial. La traducción española mantiene la pregunta retórica sin suavizarla ni convertirla en una observación neutral.
  doctrine_reference: Preservar la tensión teológica del juicio apocalíptico sin diluirla en prosa general.
translation_notes:
  revision_awareness: La auditoría inglesa revisó «believe» como la mejor lectura para el verbo ge'ez ወንእመን, corrigiendo la idea anterior de «confess». La versión española adopta esa revisión y evita el objeto explícito «lo» para seguir la redacción del texto fuente final, que enumera los verbos sin complemento expreso.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverencial de segunda persona singular («tu gloria») para concordar con la dirección a la gloria divina.
  - Se eligió un orden verbal acumulativo («alabemos y demos gracias y creamos») para reproducir la tríada del original.
  - «Reposo» se usó en el texto principal, con nota alternativa a «alivio» por la ambigüedad léxica del sustantivo.
