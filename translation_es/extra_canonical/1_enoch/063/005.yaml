base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/063/005.yaml
  text: And they said[a], “Who has given us rest[c][b], that we should praise and thank and believe before your glory?”
  footnotes:
  - marker: a
    text: Or “relief” for “rest.” The noun can denote respite or repose; the context is the lack of any respite under judgment.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered “confess” is difficult in this Ge'ez-only section of the Parables; “acknowledge” is also possible, and some might understand it more weakly as “believe.”
    reason: lexical_alternative
  - marker: c
    text: Or 'praise and thank and confess'.
