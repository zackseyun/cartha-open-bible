    reason: lexical_alternative
  - marker: c
    text: Seol se conserva en vez de «infierno» para preservar el sentido apocalíptico judío antiguo del inframundo.
    reason: cultural_note
  revision_rationale: Se revisa para reflejar mejor la decisión auditada «our descent» con «nuestro descenso», mejorar la naturalidad de la frase difícil «from its midst» con «desde su interior», y corregir la nota b eliminando el anglicismo «heaviness». El resto del texto se mantiene por ser fiel al sentido fuente y a la terminología del proyecto.
