translation:
  language: es
  text: 'Ahora les dirán: «Nuestra alma se ha saciado de riqueza injusta, pero eso no impide nuestro descenso desde su interior al peso de Seol»[a][b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión traducida aquí como «riqueza injusta» es textualmente y léxicamente difícil en el ge'ez y puede referirse de manera más amplia a bienes adquiridos por maldad.
    reason: lexical_alternative
  - marker: b
    text: O «a la pesadez de Seol». La imagen es la de un descenso opresivo al ámbito de los muertos, no simplemente un entierro.
    reason: lexical_alternative
  - marker: c
    text: Seol se conserva en vez de «infierno» para preservar el sentido apocalíptico judío antiguo del inframundo.
    reason: cultural_note
lexical_decisions:
- source_word: ይእዜ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Entonces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca temporal discursiva que introduce la confesión en el momento de juicio; «Ahora» es natural en español y conserva el giro dramático.
- source_word: ይብልዎሙ
  english_pob_choice: they will say to them
  chosen_spanish: les dirán
  alternatives_spanish:
  - dirán a ellos
  - dirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo objeto -womu exige destinatario explícito; «les dirán» preserva la dirección del habla sin recargar la frase.
- source_word: ትጸግብ ነፍስነ
  english_pob_choice: Our soul has had its fill
  chosen_spanish: Nuestra alma se ha saciado
  alternatives_spanish:
  - Nuestra alma está satisfecha
  - Nuestra alma se ha llenado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa saciedad/llenura; «se ha saciado» reproduce el estado completo y el matiz de plenitud excesiva.
- source_word: እምጥየየ ዐመፃ
  english_pob_choice: unrighteous wealth
  chosen_spanish: riqueza injusta
  alternatives_spanish:
  - ganancia injusta
  - riqueza adquirida con maldad
  - bienes de injusticia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión parece referirse a riqueza o ganancia obtenida por injusticia; «riqueza injusta» mantiene el nexo material y moral sin especificar más de lo que el texto permite.
- source_word: ወኢትከልእ
  english_pob_choice: but it does not prevent
  chosen_spanish: pero no nos impide
  alternatives_spanish:
  - pero no nos detiene
  - y no nos impide
  - pero no nos retiene
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene sentido de impedir/estorbar; «no nos impide» es la forma española más clara y fiel.
- source_word: ወረደተነ
  english_pob_choice: our descent
  chosen_spanish: descender
  alternatives_spanish:
  - nuestra bajada
  - nuestro descenso
  - ir hacia abajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo verbal apunta al acto de bajar; el infinitivo «descender» preserva la imagen de movimiento hacia abajo.
- source_word: እምልባ
  english_pob_choice: from its midst
  chosen_spanish: desde en medio de ella
  alternatives_spanish:
  - desde dentro de ella
  - desde su centro
  - de en medio de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La locución es difícil y probablemente señala salir desde el interior o centro de la realidad mencionada; la formulación española conserva esa ambigüedad sin resolverla indebidamente.
- source_word: ለክበደ ሲኦል
  english_pob_choice: into the burden of Sheol
  chosen_spanish: al peso de Seol
  alternatives_spanish:
  - a la carga de Seol
  - a la pesadez de Seol
  - al peso del Seol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Peso» reproduce la imagen concreta de gravedad/opresión; «Seol» conserva el término del mundo de los muertos sin sustituirlo por «infierno».
- source_word: ሲኦል
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - Sheol
  - el Seol
  - el mundo de los muertos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se translitera al español como «Seol» para preservar el concepto israelita antiguo del ámbito de los muertos y evitar importaciones doctrinales posteriores.
theological_decisions:
- issue: Retención del término del inframundo
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - el sepulcro
  - el infierno
  - el mundo de los muertos
  rationale: El pasaje pertenece al imaginario apocalíptico judío y requiere su propia terminología. «Seol» mantiene la textura teológica y cosmológica sin confundirla con el infierno cristiano posterior.
  doctrine_reference: Traducir primero desde el contexto local; no armonizar en exceso con usos cristianos posteriores.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que afinó «unjust gain» a «unrighteous wealth» y aclaró la sintaxis del segundo miembro como «does not prevent our descent from its midst». La versión española refleja esa decisión con «riqueza injusta» y con la estructura «no nos impide descender desde en medio de ella».
  spanish_consistency_notes:
  - Se mantiene «Seol» de forma consistente como transliteración del término del inframundo.
  - Se evita «SEÑOR» u otras normalizaciones no presentes en el pasaje.
  - La puntuación y comillas siguen el uso habitual en español bíblico moderno.
  - El pronombre «ella» remite a la riqueza mencionada, conservando la referencia interna del texto.
