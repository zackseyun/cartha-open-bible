base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/063/010.yaml
  text: Now they will say to them[a], ‘Our soul has had its fill of unrighteous wealth[d][c][b], but it does not prevent our descent from its midst into the burden of Sheol.’
  footnotes:
  - marker: a
    text: The phrase rendered 'of unjust gain' is textually and lexically difficult in the Ge'ez and may refer more broadly to wealth acquired by wrongdoing.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the weight/heaviness of Sheol.' The image is of oppressive descent into the realm of the dead, not merely burial.
    reason: lexical_alternative
  - marker: c
    text: '''Sheol'' is retained rather than ''hell'' to preserve the ancient Jewish apocalyptic sense of the underworld.'
    reason: cultural_note
  - marker: d
    text: Or 'Now they will say,'.
    reason: previous_rendering
