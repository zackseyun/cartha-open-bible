translation:
  language: es
  text: 'Así dijo el Señor de los espíritus: «Esta es la ordenanza y el juicio para los poderosos.»[a][b][c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo transmitido ይቤ normalmente significa «dijo». Sin embargo, en esta línea el texto parece comprimido, y por eso la auditoría inglesa representó el sentido como una cláusula declarativa («esta es la ordenanza y el juicio»). Aquí se conserva la fórmula de habla explícita del texto transmitido.
    reason: textual_variant
  - marker: b
    text: El segmento final también puede entenderse como «contra los poderosos», según cómo se tome la preposición en contexto.
    reason: lexical_alternative
  - marker: c
    text: 'O: «Porque esta es la ordenanza y el juicio del Señor de los espíritus».'
    reason: previous_rendering
lexical_decisions:
- source_word: ከመዝ
  english_pob_choice: Thus said / for this
  chosen_spanish: Así dijo
  alternatives_spanish:
  - Por esto dijo
  - Entonces dijo
  - Así es
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro etiópico funciona aquí como fórmula introductoria. «Así dijo» conserva el valor declarativo y formulaico que la POB inglesa resolvió con una introducción de habla, sin forzar una traducción mecánica del conector.
- source_word: ይቤ
  english_pob_choice: is / said
  chosen_spanish: dijo
  alternatives_spanish:
  - decía
  - es
  - se dijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Aunque la auditoría inglesa explica la oscilación entre valor verbal y copulativo, en español la lectura más natural y fiel al marco introductorio es verbal: «dijo». Mantiene el tono de pronunciamiento judicial.'
- source_word: እግዚአ መናፈስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el título en su forma apocalíptica característica. En español, «Espíritus» con mayúscula ayuda a reconocerlo como título divino estable, no como una referencia genérica a seres espirituales.
- source_word: ሥርዓቱ
  english_pob_choice: the ordinance
  chosen_spanish: el decreto
  alternatives_spanish:
  - la ordenanza
  - el orden
  - la disposición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto judicial, «decreto» comunica mejor la fuerza normativa y sentenciosa que «ordenanza» en español moderno, sin perder el registro formal.
- source_word: ወኵነኔሁ
  english_pob_choice: and the judgment
  chosen_spanish: y el juicio
  alternatives_spanish:
  - y la sentencia
  - y la condena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Juicio» conserva el campo legal amplio que la POB inglesa quiso mantener. «Sentencia» estrecha demasiado el alcance y «condena» interpreta más de lo que el término exige.
- source_word: ለዐዚዛን
  english_pob_choice: for the mighty
  chosen_spanish: para los poderosos
  alternatives_spanish:
  - contra los poderosos
  - para los fuertes
  - para los poderosos de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición etiópica admite matiz relacional o direccional; la POB inglesa retuvo «for». En español, «para los poderosos» preserva esa relación sin decidir de antemano si el sentido contextual es favorable o adversativo. La nota de alternativa queda reflejada en la lista de opciones.
theological_decisions:
- issue: Título divino en un contexto apocalíptico enóquico
  english_pob_reading: the Lord of Spirits
  chosen_spanish_reading: el Señor de los Espíritus
  alternative_spanish_readings:
  - el Señor de los espíritus
  rationale: Se mantiene el título tal como funciona en 1 Enoc, sin sustituirlo por fórmulas litúrgicas más tardías. La mayúscula en «Espíritus» ayuda a conservar su carácter titular y evita una lectura puramente común.
  doctrine_reference: Preservar títulos propios del texto apocalíptico; no homogeneizar con nomenclatura eclesial posterior.
- issue: Relación de la cláusula final con los poderosos
  english_pob_reading: for the mighty / against the mighty
  chosen_spanish_reading: para los poderosos
  alternative_spanish_readings:
  - contra los poderosos
  - para los poderosos de la tierra
  rationale: La fuente y la auditoría inglesa señalan una ambigüedad preposicional real. «Para» conserva la ambivalencia del original y no elimina la posibilidad contextual de una referencia judicial dirigida a los poderosos.
  doctrine_reference: Conservar tensión lexical documentada cuando el texto transmite ambigüedad semántica.
translation_notes:
  revision_awareness: 'La versión inglesa auditada corrigió un desvío importante: no debe leerse la frase como si «el Señor de los Espíritus» fuera un modificador genitivo de «decreto y juicio», sino como sujeto explícito del verbo introductorio. La presente redacción española sigue esa corrección y además conserva la ambigüedad del complemento final mediante «para los poderosos», en línea con el aviso lexical de la POB inglesa.'
  spanish_consistency_notes:
  - Se mantuvo «el Señor de los Espíritus» como título estable y transparente, coherente con el registro enóquico.
  - Se eligió «decreto» para ሥርዓቱ y «juicio» para ወኵነኔሁ para conservar dos términos jurídicos distintos sin neutralizarlos.
  - Se evitó convertir la ambigüedad preposicional en una interpretación cerrada; la nota a pie de página conserva la alternativa «contra los poderosos».
  - La puntuación española respeta la cita directa y el cierre de la sentencia como unidad textual completa.
