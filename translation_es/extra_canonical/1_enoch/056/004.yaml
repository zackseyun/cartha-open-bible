  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Los escogidos' es defendible para ሕሩያን. 'Extravío' representa bien la ambigüedad de ዕለተ ስሕተቶሙ. La revisión propuesta mantiene el sentido y añade una nota para la incertidumbre verbal de ኢትትኌለቍ.
  issues:
  - severity: medium
    issue: Calco poco natural en 'será llenado con'
    rationale: Aunque comprensible, en español natural y digno resulta mejor 'se llenará de', que conserva el valor pasivo/resultativo sin sonar forzado.
  - severity: medium
    issue: Falta nota para 'ya no serán contados'
    rationale: El English POB documenta que el verbo final también puede entenderse como 'ser conocidos' o 'ser tenidos por/reckoned'; esa incertidumbre significativa no debe perderse.
  - severity: low
    issue: La nota sobre 'sus amados' podría reflejar mejor la incertidumbre relacional
    rationale: La dificultad no es solo elegir entre 'amados' y 'queridos', sino que la referencia exacta de las personas asociadas a los escogidos es incierta.
