translation:
  language: es
  text: Y en aquellos días ese valle[a] se llenará de los escogidos y de sus amados[b], y los días de su vida terminarán, y los días de su extravío[c] ya no serán contados[d] desde entonces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez permite aquí una referencia topográfica concreta; la revisión del texto favorece 'valle' frente a alternativas más generales como 'región' o 'lugar'.
    reason: lexical_alternative
  - marker: b
    text: La expresión es difícil. Probablemente se refiere a personas queridas por los escogidos o asociadas con ellos, pero el matiz exacto es incierto.
    reason: lexical_alternative
  - marker: c
    text: '''Extravío'' recoge la ambigüedad del término original, que también puede entenderse como ''error'', ''vagabundeo'' o ''desviación''.'
    reason: lexical_alternative
  - marker: d
    text: El verbo también puede entenderse como 'ser conocidos' o 'ser tenidos por/contados'; la línea etiópica es oscura y debe leerse con cautela.
    reason: alternative_reading
lexical_decisions:
- source_word: እሜሃ
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: Dillmann
  rationale: Mantiene la fórmula apocalíptica temporal en plural, con tono elevado y natural en español.
- source_word: ውእቱ ቈላ
  english_pob_choice: that valley
  chosen_spanish: ese valle
  alternatives_spanish:
  - aquella región
  - ese lugar
  lexicon: Dillmann
  rationale: El audit trail revisado confirma el sentido topográfico concreto de 'valle'; por eso se evita 'región' en el texto principal.
- source_word: ሕሩያን
  english_pob_choice: the chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los electos
  lexicon: Dillmann
  rationale: '''Escogidos'' conserva el valor de grupo designado sin importar una terminología eclesial más cargada que no aparece en este registro.'
- source_word: ፍቁራነ ዚአሆሙ
  english_pob_choice: their beloved ones
  chosen_spanish: sus amados
  alternatives_spanish:
  - los amados de ellos
  - sus queridos
  lexicon: Dillmann
  rationale: En español, 'sus amados' es natural y conserva el vínculo posesivo-relacional de la expresión ge'ez.
- source_word: ይትዌዳእ
  english_pob_choice: will be ended
  chosen_spanish: terminarán
  alternatives_spanish:
  - serán acabados
  - serán terminados
  lexicon: Dillmann
  rationale: La revisión crítica señala que el verbo expresa que los días llegan a su fin; en español, 'terminarán' comunica ese cierre con menos dureza que una pasiva literal.
- source_word: ዕለተ ሕይወቶሙ
  english_pob_choice: the days of their lives
  chosen_spanish: los días de su vida
  alternatives_spanish:
  - los días de sus vidas
  - el tiempo de su vida
  lexicon: Dillmann
  rationale: Se conserva la cadencia de la construcción semítica y se evita una redundancia extraña en español.
- source_word: ዕለተ ስሕተቶሙ
  english_pob_choice: the days of their wandering
  chosen_spanish: los días de su extravío
  alternatives_spanish:
  - los días de su errar
  - los días de su vagar
  - los días de su error
  lexicon: Dillmann
  rationale: La nota inglesa reconoce la ambigüedad entre error, desviación y vagar; 'extravío' preserva la tensión moral y el movimiento desviado sin fijar demasiado el matiz.
- source_word: ኢትትኌለቍ
  english_pob_choice: will no longer be counted
  chosen_spanish: ya no serán contados
  alternatives_spanish:
  - ya no se contarán
  - no serán ya contados
  lexicon: Dillmann
  rationale: El valor de 'contar/reckon' se mantiene de forma clara en pasiva; 'desde entonces' refleja el adverbio final de cesación.
theological_decisions:
- issue: Designación de ሕሩያን como grupo apocalíptico
  english_pob_reading: the chosen
  chosen_spanish_reading: los escogidos
  alternative_spanish_readings:
  - los elegidos
  - los electos
  rationale: Se preserva el carácter de título grupal sin introducir un tecnicismo doctrinal innecesario; 'escogidos' es transparente y compatible con el marco apocalíptico del pasaje.
  doctrine_reference: Consistencia de términos clave; evitar sobredeterminación confesional donde el texto solo designa un grupo seleccionado.
- issue: Relación entre 'días de su vida' y 'días de su extravío'
  english_pob_reading: the days of their lives will be ended, and the days of their wandering will no longer be counted
  chosen_spanish_reading: los días de su vida terminarán, y los días de su extravío ya no serán contados
  alternative_spanish_readings:
  - los días de su vida serán acabados, y los días de su extravío ya no serán contados
  - los días de su vida llegarán a su fin, y los días de su errar ya no serán contados
  rationale: 'La corrección revisada distingue dos cláusulas: primero el fin de la vida, luego la cesación del cómputo de los días de desviación. El español debe conservar esa distinción para no borrar la tensión textual.'
  doctrine_reference: Respeto de la sintaxis y de las cláusulas distintas del original; principio de no colapsar verbos con alcance diferente.
translation_notes:
  revision_awareness: 'Se incorporó la corrección del audit trail que distingue dos cláusulas separadas: ''los días de su vida terminarán'' y luego ''los días de su extravío ya no serán contados''. También se adoptó ''valle'' en vez de la lectura más generalizada de la primera traducción inglesa, en línea con la revisión adjudicada del ge''ez.'
  spanish_consistency_notes:
  - Se mantiene 'escogidos' para ሕሩያን, evitando alternar entre 'elegidos' y 'electos' en este registro.
  - Se evita 'SEÑOR' o sustitución litúrgica porque el versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - La puntuación conserva dos miembros coordinados finales, reflejando la estructura de dos cláusulas del original.
