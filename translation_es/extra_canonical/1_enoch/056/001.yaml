translation:
  language: es
  text: Y allí vi a los ángeles del castigo que iban de un lado a otro, y sostenían azotes y cadenas de hierro y de bronce.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La redacción ge'ez para estos instrumentos es difícil. El primer objeto puede denotar azotes, látigos u otro instrumento punitivo; el segundo puede denotar cadenas o grilletes. La relación exacta con 'hierro' y 'bronce' también es algo incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: vi
  alternatives_spanish:
  - vi allí
  - y contemplé
  - y observé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula visionaria se expresa con un pasado simple natural en español, manteniendo el testimonio directo sin calcar la sintaxis inglesa.
- source_word: በህየ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allí mismo
  - en ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio locativo se refleja de forma breve y natural en español.
- source_word: ትዕይንታተ
  english_pob_choice: vision
  chosen_spanish: —
  alternatives_spanish:
  - visión
  - escena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el auditorial inglés este elemento se absorbe en la fórmula de visión; en español también se puede absorber sin añadir un sustantivo innecesario, preservando la fluidez.
- source_word: መላእክት መቅሠፍት
  english_pob_choice: the angels of punishment
  chosen_spanish: los ángeles del castigo
  alternatives_spanish:
  - los ángeles del castigo judicial
  - los ángeles del castigo punitivo
  - los ángeles de la punición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relación genitiva denota ángeles asociados con juicio punitivo; 'castigo' conserva el valor judicial y apocalíptico en un español claro y digno.
- source_word: እንዘ የሐውሩ
  english_pob_choice: going about
  chosen_spanish: que iban de un lado a otro
  alternatives_spanish:
  - que andaban
  - que se movían de un lado a otro
  - que iban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma participial/imperfectiva pide un movimiento continuo dentro de la escena; la expresión elegida mantiene esa viveza sin sobreespecificar el modo.
- source_word: ወይአሕዙ
  english_pob_choice: and they were holding
  chosen_spanish: y llevaban
  alternatives_spanish:
  - y sostenían
  - y tenían
  - y portaban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'llevaban' comunica de modo natural que portaban los instrumentos, sin perder la acción continuada del original.
- source_word: መቅሠፍተ
  english_pob_choice: chains
  chosen_spanish: azotes
  alternatives_spanish:
  - látigos
  - flagelos
  - cadenas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto ge'ez presenta aquí el primer instrumento punitivo; la revisión del auditorial inglés indica que corresponde a 'scourges'. En español, 'azotes' mantiene la fuerza punitiva y evita confundirlo con el otro objeto mencionado.
- source_word: ወመማግረ፡ ሐጺን፡ ውብርት
  english_pob_choice: and chains of iron and bronze
  chosen_spanish: y cadenas de hierro y bronce
  alternatives_spanish:
  - y cadenas de hierro y de bronce
  - y cadenas férreas y broncíneas
  - y grillos de hierro y bronce
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia material se entiende mejor como el segundo instrumento, calificado por hierro y bronce. 'Cadenas' es la solución más consistente con la revisión del texto y con el par punitivo del versículo.
- source_word: ሐጺን
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - de hierro
  - férreo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el material literal para mantener la imaginería dura del pasaje.
- source_word: ውብርት
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Bronce'' es el equivalente bíblico más natural en español para un aleación de cobre en este contexto.'
theological_decisions:
- issue: Identidad y función de los seres celestiales
  english_pob_reading: angels assigned to punitive judgment
  chosen_spanish_reading: ángeles del castigo
  alternative_spanish_readings:
  - ángeles de la punición
  - ángeles del juicio punitivo
  - ángeles castigadores
  rationale: La frase mantiene el carácter judicial-apocalíptico sin introducir categorías demonológicas ajenas al pasaje. 'Castigo' conserva la carga de juicio divino.
  doctrine_reference: Conservar el sentido local del texto apocalíptico y su imaginería de juicio.
translation_notes:
  revision_awareness: 'La versión inglesa auditada atravesó correcciones importantes: se eliminó una lectura errónea de ''hosts of'' y se ajustó el orden y la identificación de los instrumentos. La traducción española sigue la revisión más reciente del testimonio ge''ez, evitando insertar ''hosts'' y reflejando dos objetos punitivos distintos con sus materiales correspondientes.'
  spanish_consistency_notes:
  - Se mantiene un español neutral latinoamericano, fluido y de tono bíblico digno.
  - Se evita el calco de la sintaxis inglesa cuando el español requiere una formulación más natural.
  - '''Castigo'' se usa para conservar el matiz judicial y apocalíptico del original.'
  - '''Azotes'' y ''cadenas'' se distinguen para no borrar la tensión léxica del texto revisado.'
