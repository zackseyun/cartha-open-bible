review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia principal del Geʽez y sigue la revisión inglesa auditada, especialmente al corregir ወትትሎሙ ኀጕሎን como una acción verbal: «la destrucción los perseguirá». También preserva acertadamente «Sheol» como realidad apocalíptica personificada. Sin embargo, la última frase se aparta del matiz de እምቅድመ ገጸ ኅሩያን al decir «lejos de la presencia», que introduce una idea de distancia más interpretativa que la remoción «de delante de / de la presencia de».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos ajustes recomendables: 1) en español eclesial y bíblico, «Seol» es más natural y legible que «Sheol»; 2) «escogidos» no sigue la preferencia documentada del POB por «los elegidos/chosen ones» en este contexto, y «lejos de» suena más libre de lo necesario. Una redacción más fiel y natural sería: «Seol tragará a los pecadores de delante de los elegidos», con nota que explique el literal «de delante de la faz».'
  glossary_alignment: 'Hay un desajuste terminológico menor pero significativo: el inglés POB documenta «chosen ones» y específicamente pide no aplanarlo ni sobrecargarlo; en español, «los elegidos» refleja mejor esa decisión que «los escogidos» en este contexto de consistencia local. Además, aunque la guía global menciona «Yahvé» y «Mesías», no aplican aquí. El uso de «Sheol» en vez de «Seol» no es incorrecto teológicamente, pero para legibilidad española conviene hispanizarlo manteniendo la misma referencia.'
  issues:
  - severity: medium
    issue: Uso de «Sheol» en vez de «Seol».
    rationale: El sentido está bien preservado, pero en español bíblico general «Seol» es la forma más natural y legible. Mantiene la misma decisión teológica sin dejar el término innecesariamente extranjerizado.
  - severity: medium
    issue: «los escogidos» no refleja de la mejor manera la decisión auditada «chosen ones».
    rationale: Aunque «escogidos» es comprensible, «los elegidos» suena más natural en español contemporáneo y sigue mejor la terminología establecida del POB para este pasaje.
  - severity: medium
    issue: «lejos de la presencia» sobreinterpreta እምቅድመ ገጸ.
    rationale: La fuente y la nota inglesa expresan remoción de la presencia de los elegidos, no necesariamente distancia enfatizada. «De delante de» o «de la presencia de» es más fiel.
  revised_spanish_text: Y en aquellos días, Seol[a] abrirá su boca, y ellos se hundirán en ella; y la destrucción[b] los perseguirá; Seol tragará a los pecadores de delante de[c] los elegidos.
  revised_footnotes:
  - marker: a
    text: Se conserva «Seol» para mantener la imagen apocalíptica de un reino personificado que devora, en lugar de neutralizarla con «sepulcro» o «infierno».
    reason: lexical_alternative
  - marker: b
    text: 'El Geʽez expresa aquí una acción verbal: la destrucción «los perseguirá». La lectura nominal «su destrucción» fue descartada en la revisión auditada.'
    reason: textual_variant
  - marker: c
    text: Literalmente, «de delante de la faz de los elegidos»; en español se conserva la idea de ser quitados de su presencia sin añadir un matiz más fuerte como «lejos de».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción para mejorar la fidelidad al modismo fuente y a la terminología del POB: «Seol» hispaniza naturalmente el término conservando su valor teológico, «los elegidos» sigue mejor «chosen ones», y «de delante de» evita la sobreinterpretación de «lejos de».'
