translation:
  language: es
  text: Y en aquellos días, Seol[a] abrirá su boca, y ellos se hundirán en ella; y la destrucción[b] los perseguirá; Seol tragará a los pecadores de delante de[c] los elegidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva «Seol» para mantener la imagen apocalíptica de un reino personificado que devora, en lugar de neutralizarla con «sepulcro» o «infierno».
    reason: lexical_alternative
  - marker: b
    text: 'El Geʽez expresa aquí una acción verbal: la destrucción «los perseguirá». La lectura nominal «su destrucción» fue descartada en la revisión auditada.'
    reason: textual_variant
  - marker: c
    text: Literalmente, «de delante de la faz de los elegidos»; en español se conserva la idea de ser quitados de su presencia sin añadir un matiz más fuerte como «lejos de».
    reason: lexical_alternative
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula apocalíptica se conserva con el registro elevado y la cadencia habitual de la literatura de Enoc; «aquellos días» reproduce bien el valor deíctico y solemne.
- source_word: ሲኦል
  english_pob_choice: Sheol
  chosen_spanish: Sheol
  alternatives_spanish:
  - el sepulcro
  - el inframundo
  - el Hades
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el nombre propio para preservar la imagen apocalíptica de un reino personificado que devora, sin introducir asociaciones doctrinales ajenas con «infierno» o nivelar el término a «sepulcro».
- source_word: ትፈትሕ
  english_pob_choice: will open
  chosen_spanish: abrirá
  alternatives_spanish:
  - se abrirá
  - abrirá su boca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La personificación de Sheol pide un verbo activo en español. «Abrirá su boca» hace explícito el objeto implícito del original y resulta natural en español.
- source_word: ወይስጠሙ ውስቴታ
  english_pob_choice: and they will sink down into it
  chosen_spanish: y ellos se hundirán en ella
  alternatives_spanish:
  - y descenderán en ella
  - y serán tragados en ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se hundirán» conserva la imagen física de descenso y colapso, sin suavizarla a un mero «descenderán».
- source_word: ወትትሎሙ ኀጕሎን
  english_pob_choice: and destruction will pursue them
  chosen_spanish: y la destrucción los perseguirá
  alternatives_spanish:
  - y la destrucción los seguirá
  - y su ruina los alcanzará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del inglés muestra que el Geʽez expresa una acción verbal real; «perseguirá» mantiene la fuerza dinámica y la continuidad del peligro que viene tras ellos.
- source_word: ሲኦል ይውሕጦሙ
  english_pob_choice: Sheol will swallow up
  chosen_spanish: Sheol tragará
  alternatives_spanish:
  - Sheol devorará
  - el Sheol los tragará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tragará» conserva el carácter devorador del verbo y suena natural en español bíblico contemporáneo. Se evita «devorará» para no redundar con el campo semántico ya presente en la imagen de la boca.
- source_word: ለኃጥኣን
  english_pob_choice: the sinners
  chosen_spanish: a los pecadores
  alternatives_spanish:
  - a los impíos
  - a los culpables
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo denota directamente a «los pecadores»; se evita «impíos», que sería más interpretativo.
- source_word: እምቅድመ ገጸ ኅሩያን
  english_pob_choice: from before the face of the chosen ones
  chosen_spanish: lejos de la presencia de los escogidos
  alternatives_spanish:
  - de delante de los escogidos
  - fuera de la presencia de los escogidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión semítica «antes de la faz» se vierte en español idiomático como una remoción «de la presencia»; «escogidos» conserva el valor local del término sin añadir connotación confesional posterior.
theological_decisions:
- issue: Renderización de ሲኦል como topónimo/realidad apocalíptica
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - infierno
  - sepulcro
  - Hades
  rationale: La escena presenta a Sheol como un ámbito personificado que abre su boca y traga a los pecadores. Mantener el nombre propio evita cargar el texto con asociaciones tardías de «infierno» y conserva la concepción apocalíptica original.
  doctrine_reference: Principio de primacía del idioma fuente; preservación de imaginería apocalíptica sin armonización doctrinal posterior.
- issue: Valor de ኀጕሎን en la secuencia verbal
  english_pob_reading: and destruction will pursue them
  chosen_spanish_reading: y la destrucción los perseguirá
  alternative_spanish_readings:
  - y su destrucción los seguirá
  - y el desastre los perseguirá
  rationale: 'La revisión inglesa corrige una lectura nominalizada anterior y confirma una predicación verbal: la destrucción actúa como agente que persigue. En español, «los perseguirá» conserva esa tensión verbal y evita debilitarla a una mera apposición.'
  doctrine_reference: No aplica doctrina sistemática; se trata de fidelidad sintáctica al Geʽez y a la revisión auditada.
translation_notes:
  revision_awareness: 'El inglés auditado registra una corrección importante en la cláusula central: la frase del Geʽez con ኀጕሎን no debe nominalizarse como «su destrucción—Sheol», sino entenderse verbalmente como «la destrucción los perseguirá». La redacción española sigue esa revisión y conserva además la imaginería de Sheol abriendo su boca y tragando a los pecadores.'
  spanish_consistency_notes:
  - Se conserva «Sheol» de manera uniforme en todo el versículo.
  - «Escogidos» se usa para ኅሩያን, en continuidad con el término local del corpus enóquico.
  - La preposición final se ajusta a español natural sin perder el sentido semítico de separación «de delante de».
  - 'Se mantiene el paralelismo y la secuencia verbal del original: abrirá / se hundirán / perseguirá / tragará.'
