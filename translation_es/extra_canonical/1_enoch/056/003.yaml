review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la apertura y el posesivo clave («sus escogidos… sus amados»), en línea con la corrección adjudicada del Ge''ez. Sin embargo, en la cláusula final colapsa dos elementos distintos de la cadena topográfica: ውስተ፡ ንቅዐተ = «en la hendidura/grieta/chasma» y ማዕምቅ = «del abismo», ዘቈላ = «del valle». Al traducir «en el abismo del valle», el español omite «hendidura/grieta/chasma» del texto principal y desplaza «abismo» para cubrir el primer sustantivo, debilitando la correspondencia con la fuente y con el audit trail inglés.'
  spanish_quality_summary: El español es claro y digno, pero la frase final queda demasiado resumida y pierde la imaginería ominosa de apertura/cisura. Además, la nota a explica poco, porque repite prácticamente el texto principal y menciona una ambigüedad dativa/final de forma confusa. Conviene restaurar en el texto una solución natural como «en la hendidura del abismo del valle» y dejar la variedad léxica en una nota.
  glossary_alignment: No hay conflictos con la terminología doctrinal global. «Escogidos» y «amados» son defendibles aquí. El problema principal es léxico-topográfico, no de glosario mayor. La traducción de ንቅዐተ debe reflejarse en el texto principal; «abismo» debe reservarse para ማዕምቅ.
  issues:
  - severity: high
    issue: Se omite en el texto principal el valor de ንቅዐተ («hendidura/grieta/chasma»).
    rationale: La fuente presenta una cadena de tres sustantivos topográficos. «En el abismo del valle» elimina el primer elemento y no preserva fielmente la estructura ni la imaginería del original.
  - severity: medium
    issue: La decisión léxica interna para ውስተ፡ ንቅዐተ contradice el audit trail.
    rationale: En las decisiones léxicas se asigna a ንቅዐተ «en el abismo», mientras que el inglés documenta «into the chasm / cleft / fissure» y reserva «abyss» para ማዕምቅ.
  - severity: medium
    issue: La nota [a] no representa bien la dificultad documentada en el POB inglés.
    rationale: El problema principal no es simplemente una ambigüedad dativa/final, sino la dificultad de la redacción y del referente. Además, la nota no refleja de forma útil la alternativa histórica documentada («Estas son para…» / similar).
  - severity: low
    issue: «Amados» es comprensible, pero «seres amados» sería menos ambiguo en español contemporáneo.
    rationale: No es un error; «amados» puede funcionar sustantivado en registro elevado. Se puede mantener para concisión y dignidad.
  revised_spanish_text: 'Y me dijo[a]: «A sus escogidos y a sus amados, para que sean arrojados en la hendidura[b] del abismo del valle».'
  revised_footnotes:
  - marker: a
    text: La redacción es difícil. También puede entenderse de otra manera, como «Estas son para sus escogidos y para sus amados», pero el referente exacto no queda explícito en este versículo por sí solo.
    reason: alternative_reading
  - marker: b
    text: O «grieta», «fisura» o «abertura». La imagen ge'ez es topográfica y ominosa; el matiz exacto de la abertura es incierto.
    reason: lexical_alternative
  revision_rationale: 'La revisión restituye en el texto principal la correspondencia de la cadena topográfica de la fuente: ንቅዐተ = «hendidura», ማዕምቅ = «abismo», ዘቈላ = «valle». También mejora la nota de dificultad para reflejar la alternativa documentada en el audit trail inglés sin forzar una interpretación del referente. El resto del verso puede mantenerse.'
