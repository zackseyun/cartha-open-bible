translation:
  language: es
  text: 'Y me dijo[a]: «A sus escogidos y a sus amados, para que sean arrojados en la hendidura[b] del abismo del valle».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La redacción es difícil. También puede entenderse de otra manera, como «Estas son para sus escogidos y para sus amados», pero el referente exacto no queda explícito en este versículo por sí solo.
    reason: alternative_reading
  - marker: b
    text: O «grieta», «fisura» o «abertura». La imagen ge'ez es topográfica y ominosa; el matiz exacto de la abertura es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይቤለኒ
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Y me habló
  - Y me habló diciendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula narrativa exige una rendición directa y sobria. «Me dijo» conserva el tono de comunicación visionaria sin añadir matices no presentes en el texto.
- source_word: ለሕሩያነ
  english_pob_choice: to their chosen ones / for the chosen
  chosen_spanish: a sus escogidos
  alternatives_spanish:
  - a los escogidos
  - para sus escogidos
  - a los elegidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El Ge'ez lleva la preposición ለ con valor direccional/dativo. En español, «a sus escogidos» expresa bien el destinatario. «Escogidos» mantiene el término marcado sin cargarlo con el registro eclesial de «electos».
- source_word: ዚአሆሙ
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  - los suyos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El posesivo de tercera persona plural debe conservarse en español; no es un demostrativo. «Sus» mantiene la dependencia gramatical de «escogidos».
- source_word: ወለፍቁራኒሆሙ
  english_pob_choice: and for their beloved ones
  chosen_spanish: y a sus amados
  alternatives_spanish:
  - y a sus amados seres
  - y a los que les son queridos
  - y a sus queridos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Amados» preserva el valor afectivo elevado del sustantivo derivado de amar. En español suena natural y deja abierta la relación exacta de estos amados con los escogidos.
- source_word: ከመ፡ ይትወደዩ
  english_pob_choice: so that they may be cast
  chosen_spanish: para que sean arrojados
  alternatives_spanish:
  - para que sean echados
  - para que sean lanzados
  - para que sean lanzados al
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo/jusivo pide una voz pasiva o refleja en español. «Arrojados» conserva la violencia y el tono de juicio apocalíptico sin introducir una interpretación adicional.
- source_word: ውስተ፡ ንቅዐተ
  english_pob_choice: into the chasm
  chosen_spanish: en el abismo
  alternatives_spanish:
  - en la hendidura
  - en la grieta
  - en la sima
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El conjunto topográfico es oscuro y ominoso. En español, «abismo» transmite mejor la profundidad amenazante; la nota conserva la alternativa de «chasm/cleft/fissure» del audit trail.
- source_word: ማዕምቅ
  english_pob_choice: of the abyss
  chosen_spanish: del valle
  alternatives_spanish:
  - de la profundidad
  - del abismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto Ge'ez enlaza la serie topográfica con ዘቈላ. Para no sobrecargar el español con una cadena demasiado literal y opaca, se integra la relación como «abismo del valle», manteniendo el peso espacial y la referencia final al valle.
- source_word: ዘቈላ
  english_pob_choice: of the valley
  chosen_spanish: del valle
  alternatives_spanish:
  - de aquel valle
  - de la hondonada
  - del desfiladero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Valle» es el término topográfico más natural y fiel en español. Conserva el cierre del encadenamiento genitivo sin añadir un topónimo no explicitado.
theological_decisions:
- issue: Referente de «sus escogidos» y «sus amados»
  english_pob_reading: Retain the Ge'ez wording without resolving whether this refers ironically to the judged kings/mighty ones and their associates, or to another group identified in the immediate context.
  chosen_spanish_reading: 'Conservar la ambigüedad del referente: «sus escogidos» y «sus amados».'
  alternative_spanish_readings:
  - los escogidos para juicio y sus allegados
  - los elegidos del narrador
  - los escogidos del pueblo justo
  rationale: La sintaxis de la fuente y el audít trail inglés no permiten fijar con seguridad el referente. El español debe mantener esa tensión sin explicar indebidamente quiénes son.
  doctrine_reference: Preservar la tensión interpretativa cuando el texto no la resuelve.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del auditor sobre ዚአሆሙ: no se leyó como demostrativo («estos son»), sino como posesivo de tercera persona plural («sus»). También se evitó invertir indebidamente el valor dativo/preposicional de ל־; por eso la línea principal mantiene «a sus escogidos y a sus amados».'
  spanish_consistency_notes:
  - Se prefirió «escogidos» en vez de «elegidos» para conservar la terminología marcada y evitar un registro demasiado teológico-tradicional.
  - Se usó «abismo» para mantener el tono apocalíptico; la alternativa más literal «hendidura/grieta/fisura» queda documentada en nota.
  - No se introdujo «Mesías», «Yahvé» ni otros términos no presentes en la perícopa.
  - Se evitó resolver el referente humano o colectivo de los destinatarios, en consonancia con el audit trail inglés.
