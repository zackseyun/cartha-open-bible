translation:
  language: es
  text: Y subirán y pisarán la tierra de los escogidos de él[a][b], y la tierra de los escogidos de él se volverá delante de ellos un lugar hollado y un camino trillado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «subirán y marcharán sobre la tierra de los escogidos de él». Los verbos pueden describir avance militar además de pisoteo literal.'
    reason: lexical_alternative
  - marker: b
    text: 'La redacción ge''ez es difícil. El par final de expresiones probablemente intensifica la imagen: la tierra queda como algo pisoteado, como una senda o camino trillado.'
    reason: textual_variant
lexical_decisions:
- source_word: የዓርግዋ
  english_pob_choice: they shall go up
  chosen_spanish: subirán
  alternatives_spanish:
  - ascenderán
  - irán hacia arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa movimiento ascendente; en este contexto apocalíptico-militar, «subirán» conserva la imagen concreta y funciona con naturalidad en español.
- source_word: ይከይድዋ
  english_pob_choice: tread upon
  chosen_spanish: pisarán
  alternatives_spanish:
  - marcharán sobre
  - hollarán
  - trillarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El campo semántico incluye andar, pisar y hollar. «Pisarán» mantiene la acción física hostil y enlaza con la imagen posterior de terreno hollado.
- source_word: ምድረ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - territorio
  - suelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí se trata del ámbito territorial de los escogidos, no de la tierra en sentido cósmico; «tierra» es la opción más directa y bíblicamente inteligible.
- source_word: ኅሩያነ
  english_pob_choice: chosen ones
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - los escogidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» conserva el designio de selección sin cargar innecesariamente un matiz doctrinal posterior. En plural sustantivado, es claro y sobrio.
- source_word: ዚአሁ
  english_pob_choice: his
  chosen_spanish: sus
  alternatives_spanish:
  - de él
  - de suyo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo posesivo ge'ez solo marca pertenencia. «Sus» refleja la relación posesiva sin identificar en el texto principal al referente implícito.
- source_word: በቅድሜሆሙ
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en su presencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es espacial y visual; «delante de ellos» mantiene la escena de exposición frente a los invasores.
- source_word: ምካይደ
  english_pob_choice: a trampled place
  chosen_spanish: un lugar hollado
  alternatives_spanish:
  - un lugar pisoteado
  - un lugar de pisadas
  - un terreno hollado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo se relaciona con el verbo de pisar y refuerza el mismo motivo. «Hollado» conserva mejor la violencia y la repetición de la acción que una forma más neutral.
- source_word: አሰረ
  english_pob_choice: a beaten path
  chosen_spanish: un sendero batido
  alternatives_spanish:
  - un camino batido
  - una senda pisada
  - un camino trillado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Batido» transmite la idea de un trayecto formado por uso repetido y mantiene la imagen concreta de un paso abierto por el pisoteo.
theological_decisions:
- issue: Referente de «sus» en «sus escogidos»
  english_pob_reading: Retain the pronoun as 'his' without explicit identification.
  chosen_spanish_reading: Conservar el posesivo sin nombrar explícitamente al referente.
  alternative_spanish_readings:
  - los escogidos de Dios
  - los escogidos del Señor
  rationale: El ge'ez solo ofrece un posesivo. Nombrar a Dios o al Señor añadiría una identificación que no está explicitada en el verso, así que la versión española preserva la ambigüedad documentada.
  doctrine_reference: Preservar la tensión textual sin resolverla de forma interpretativa.
translation_notes:
  revision_awareness: 'El borrador sigue el sentido y las decisiones auditadas del POB inglés, sin depender mecánicamente de ese texto. Se han conservado la imagen de avance ascendente, el pisoteo hostil y la ambigüedad del posesivo ''sus''/''his'', y se ha resuelto la dificultad final con una pareja española igualmente intensiva: «lugar hollado» / «sendero batido».'
  spanish_consistency_notes:
  - Se mantiene «escogidos» de forma consistente para ኅሩያነ, evitando alternar con «elegidos» sin necesidad.
  - Se conserva la posesión indefinida «sus» en el texto principal para no resolver el referente implícito.
  - La pareja «hollado / batido» reproduce la intensificación final sin suavizar la violencia de la imagen.
  - El registro es bíblico y sobrio, pero con español contemporáneo claro.
