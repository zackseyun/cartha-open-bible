    rationale: Aunque el rastro inglés permite «scourges», la justificación preferida es «instruments of punishment». En español, «azotes» puede entenderse como golpes más que como instrumentos. «Instrumentos de castigo» refleja mejor la ambivalencia concreta del ge'ez.
