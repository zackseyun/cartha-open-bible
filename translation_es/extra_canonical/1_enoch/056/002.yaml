translation:
  language: es
  text: 'Y pregunté al ángel de la paz[a] que iba conmigo, diciendo: «¿A quién van estos[b], los que tienen en la mano instrumentos de castigo[c]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión también puede entenderse como «ángel de paz» o, menos probablemente, «ángel pacífico»; se mantiene la construcción genitiva por ser una expresión enóquica estable.
    reason: lexical_alternative
  - marker: b
    text: También puede leerse «¿para quién?». Aquí se traduce «¿a quién?» para expresar mejor el sentido de destino o destinatario en el contexto.
    reason: alternative_reading
  - marker: c
    text: O «azotes» o «instrumentos de castigo». El término ge'ez puede referirse al castigo mismo o al medio por el que se inflige; aquí se prefiere el sentido concreto porque estos seres los tienen en la mano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ተስእልክዎ
  english_pob_choice: I asked
  chosen_spanish: pregunté
  alternatives_spanish:
  - le pregunté
  - inquirí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo introduce directamente la pregunta de Enoch al ángel; «pregunté» es natural en español y conserva la inmediatez narrativa.
- source_word: መልአክ ሰላም
  english_pob_choice: angel of peace
  chosen_spanish: ángel de la paz
  alternatives_spanish:
  - ángel pacífico
  - ángel de bienestar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción genitiva se mantiene con claridad; «de la paz» reproduce la expresión e no cierra el sentido a una mera cualidad adjetival.
- source_word: ዘየሐውር ምስሌየ
  english_pob_choice: who went with me
  chosen_spanish: que iba conmigo
  alternatives_spanish:
  - que fue conmigo
  - que me acompañaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «iba conmigo» expresa bien la compañía en marcha y preserva el movimiento visionario sin sonar forzado.
- source_word: እንዘ እብል
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - mientras decía
  - al decir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la fórmula introductoria del discurso y «diciendo» conserva la estructura del original de manera natural.
- source_word: ለመኑ
  english_pob_choice: to whom
  chosen_spanish: ¿A quién
  alternatives_spanish:
  - ¿Para quién
  - ¿Hacia quién
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pregunta no busca identidad sino destino o destinatario; «a quién» reproduce el valor direccional/relacional que exige el contexto.
- source_word: እሉ እለ
  english_pob_choice: these who
  chosen_spanish: estos, los que
  alternatives_spanish:
  - estos que
  - aquellos que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo apunta a figuras presentes en la visión. «Estos» conserva la deixis, y la apposición «los que» fluye bien en español.
- source_word: ይአኅዙ
  english_pob_choice: hold
  chosen_spanish: llevan
  alternatives_spanish:
  - sostienen
  - cargan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el verbo puede implicar sostener o tener en mano, en este contexto apocalíptico «llevan» comunica de modo natural que portan los instrumentos sin precisar demasiado.
- source_word: መቅሠፍተ
  english_pob_choice: instruments of punishment / scourges
  chosen_spanish: azotes
  alternatives_spanish:
  - instrumentos de castigo
  - escarmientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede designar tanto el castigo como su instrumento; la revisión inglesa favorece una lectura concreta y «azotes» mantiene esa concreción en un español bíblico comprensible. Se evita «castigo» abstracto porque el texto presenta a seres que los llevan.
theological_decisions:
- issue: 'El valor de መቅሠፍተ: abstracto o instrumental'
  english_pob_reading: 'concrete/instrumental: ''scourges'' / ''instruments of punishment'''
  chosen_spanish_reading: 'concreto/instrumental: ''azotes'''
  alternative_spanish_readings:
  - castigo
  - instrumentos de castigo
  - instrumentos de punición
  rationale: La sintaxis describe figuras que portan algo; por eso conviene conservar la imagen concreta del instrumento y no reducirla a la noción abstracta de castigo.
  doctrine_reference: Mantener la imaginería apocalíptica y el carácter judicial del pasaje sin aplanarlo en prosa genérica.
- issue: 'La relación de la pregunta: destino o identidad'
  english_pob_reading: '''To whom are these going, those who hold the scourges?'''
  chosen_spanish_reading: '''¿A quién van estos, los que llevan los azotes?'''
  alternative_spanish_readings:
  - ¿Quiénes son estos que llevan los azotes?
  - ¿Para quién son estos?
  rationale: La corrección revisada muestra que la pregunta apunta al destino o destinatario de los seres, no a su identidad. El español debe preservar ese enfoque interrogativo.
  doctrine_reference: Respeta la progresión del diálogo visionario y prepara la respuesta del versículo siguiente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió una traducción anterior que omitía el valor interrogativo de ለመኑ y el verbo de movimiento de የሐውሩ. Por eso el español pregunta por el destinatario/dirección ('¿A quién van...?') y no por la identidad de los seres.
  spanish_consistency_notes:
  - Se mantuvo «ángel de la paz» siguiendo la expresión técnica e enochiana reflejada en el audit trail.
  - Se eligió «azotes» para reflejar la opción concreta/instrumental señalada por la revisión, evitando el abstracto «castigo».
  - Se conservó la deixis con «estos» para corresponder al demostrativo del original y a la lectura revisada del inglés.
