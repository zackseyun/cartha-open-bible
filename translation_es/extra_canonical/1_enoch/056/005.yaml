  to: Y en aquellos días, los ángeles volverán y volverán la cabeza hacia el oriente, hacia el pueblo de Partia y de Media. Agitarán a los reyes[a], y un espíritu[b] de tumulto vendrá sobre ellos; los sacudirá de sus tronos, y saldrán como leones de sus guaridas[c], y como lobos hambrientos en medio de su pastura.
