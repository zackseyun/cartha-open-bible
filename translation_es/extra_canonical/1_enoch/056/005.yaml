base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/056/005.yaml
  text: And in those days the angels will return and turn their heads toward the east[a], toward the people of Parthia and Media. They will stir up the kings, and a spirit of turmoil will come upon them; it will unsettle them from their thrones, and they will go out like lions from their lairs[c][b], and like hungry wolves in the midst of their pasture.
  footnotes:
