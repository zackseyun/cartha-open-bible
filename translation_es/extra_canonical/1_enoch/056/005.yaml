translation:
  language: es
  text: Y en aquellos días, los ángeles volverán y volverán la cabeza hacia el oriente, hacia el pueblo de Partia y de Media. Agitarán a los reyes[a], y un espíritu[b] de tumulto vendrá sobre ellos; los sacudirá de sus tronos, y saldrán como leones de sus guaridas[c], y como lobos hambrientos en medio de su pastura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El objeto de «agitarán» es textual y filológicamente difícil en el OCR; por el contexto de los tronos, se entiende como «los reyes».
    reason: textual_variant
  - marker: b
    text: También puede entenderse como «un espíritu de confusión»; el ge'ez permite una fuerza o condición de desorden, sin precisar si se trata de un ser personal.
    reason: lexical_alternative
  - marker: c
    text: 'O: «de sus escondites».'
    reason: lexical_alternative
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula apocalíptica temporal estándar; «aquellos días» conserva el plural y el tono solemne sin volverla artificiosamente arcaica.
- source_word: ይገብኡ መላእክት
  english_pob_choice: the angels will return
  chosen_spanish: los ángeles volverán
  alternatives_spanish:
  - los ángeles regresarán
  - los ángeles retornarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo base significa «volver/regresar». «Volverán» refleja mejor el retorno de movimiento en español bíblico moderno y evita la lectura de simple reunión.
- source_word: ወይወድዩ አርእስቲሆሙ
  english_pob_choice: turn their heads
  chosen_spanish: volverán su rostro
  alternatives_spanish:
  - volverán sus cabezas
  - dirigirán su rostro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el ge'ez menciona literalmente «sus cabezas», en español «volver su rostro» expresa la orientación deliberada con dignidad y sin sonar mecánico.
- source_word: ለምሥራቅ
  english_pob_choice: toward the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - al oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oriente» mantiene el matiz direccional y es idiomático en registro bíblico sin ser arcaizante en exceso.
- source_word: ለኀበ ሰብአ ጳርቴ ወሙዴ
  english_pob_choice: toward the people of Parthia and Media
  chosen_spanish: hacia el pueblo de Partia y de Media
  alternatives_spanish:
  - hacia los partos y los medos
  - hacia la gente de Partia y Media
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la referencia etnogeográfica explícita con «pueblo de», siguiendo la carga del original y evitando suavizarla a etnónimos desnudos.
- source_word: የሐውክዎሙ
  english_pob_choice: they will stir up
  chosen_spanish: Harán que los reyes se agiten
  alternatives_spanish:
  - agitarán a los reyes
  - los trastornarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto requiere un objeto gobernante; la forma española conserva la idea causativa de provocar disturbio y mantiene la solución textual indicada por la tradición auditada.
- source_word: ለዝንቱ
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - ellos
  - los gobernantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el pasaje ge'ez es textualmente difícil, la imagen inmediata de tronos exige un referente real de gobierno; «reyes» expresa ese referente sin sobreinterpretar.
- source_word: መንፈሰ ሀውክ
  english_pob_choice: a spirit of turmoil
  chosen_spanish: un espíritu de tumulto
  alternatives_spanish:
  - un espíritu de confusión
  - un soplo de tumulto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la ambigüedad entre entidad personal y fuerza operativa, pero en español «espíritu de tumulto» suena natural y mantiene la intensidad apocalíptica.
- source_word: እመንበረሆሙ
  english_pob_choice: from their thrones
  chosen_spanish: de sus tronos
  alternatives_spanish:
  - de sus asientos
  - desde sus tronos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto real, «tronos» es la forma precisa y conserva la imagen política y jurisdiccional del original.
- source_word: ከመ አናብስት እምስካባቲሆሙ
  english_pob_choice: like lions from their lairs
  chosen_spanish: como leones de sus guaridas
  alternatives_spanish:
  - como leones de sus madrigueras
  - como leones desde sus guaridas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Guaridas» comunica bien la imagen depredadora y es más natural que una literalidad excesiva; conserva la fuerza de la comparación.
- source_word: ከመ አዝእብት ርኁባን
  english_pob_choice: like hungry wolves
  chosen_spanish: como lobos hambrientos
  alternatives_spanish:
  - como lobos famélicos
  - como lobos hambrientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La traducción es directa y idiomática; «hambrientos» mantiene el peligro y la urgencia del símil.
- source_word: ማእከለ መርዔት ዚአሆሙ
  english_pob_choice: in the midst of their pasture
  chosen_spanish: en medio de su pastizal
  alternatives_spanish:
  - en medio de su pastura
  - en medio de su pradera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pastizal» refleja el lugar de pastoreo sin introducir «rebaños» que no están explícitos; conserva el contraste entre lobos y territorio de pastura.
theological_decisions:
- issue: Naturaleza de «un espíritu de tumulto» / መንፈሰ ሀውክ
  english_pob_reading: a spirit of turmoil
  chosen_spanish_reading: un espíritu de tumulto
  alternative_spanish_readings:
  - un espíritu de confusión
  - el espíritu de confusión
  rationale: 'Se conserva la ambigüedad del original y del audit trail inglés: puede ser una entidad espiritual o una fuerza de desorden permitida por Dios. El indefinido «un espíritu» evita resolver la ontología del término.'
  doctrine_reference: Preservar la tensión teológica sin decidir indebidamente entre agente personal y estado impersonal.
translation_notes:
  revision_awareness: La versión inglesa auditada fue corregida por un pase de revisión que eliminó una duplicación accidental y mantuvo la lectura de base «return». La presente redacción española sigue esa lectura revisada, evita la antigua solución de «reunirse» y conserva la ambigüedad teológica de «spirit of turmoil» con un equivalente natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término base del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «espíritu» en sentido ambiguo, sin capitalizar, porque el contexto no exige Espíritu Santo.
  - «Reyes» se deja explícito para corresponder al contexto de tronos y al ajuste textual documentado.
  - 'Se prefieren formas bíblicas modernas pero no arcaizantes: «oriente», «guaridas», «pastizal».'
