base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/056/007.yaml
  text: And the city of my righteous ones shall be a hindrance to their horses[a]; and they will stir up slaughter among themselves, and their right hand will be strong against them. And a man will not know his brother, nor a son his father or his mother, until the number of the corpses from their death is complete[d][c][b], and their punishment will not be in vain.
  footnotes:
  - marker: a
    text: Or 'obstacle' or 'trap' for their horses; the Ge'ez term suggests something that blocks or ensnares.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a man will not know his brother'; the sense may include 'recognize.'
    reason: lexical_alternative
  - marker: c
    text: The clause about 'the number of the corpses' is textually difficult in the Ethiopic and is rendered transparently rather than smoothed.
    reason: textual_variant
  - marker: d
    text: Or 'they will stir themselves up to slaughter among themselves'.
    reason: previous_rendering
