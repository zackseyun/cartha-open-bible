translation:
  language: es
  text: Y la ciudad de mis justos será un obstáculo[a] para sus caballos; y provocarán matanza[d] entre sí, y su mano derecha será fuerte contra ellos. Y un hombre no conocerá a su hermano[b], ni un hijo a su padre ni a su madre, hasta que se complete el número de los cadáveres[c] de su muerte, y su castigo no será en vano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Obstáculo» mantiene el sentido amplio del término etiópico: algo que bloquea, estorba o enreda el avance de los caballos; también podría entenderse como «trampa» o «estorbo».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «un hombre no conocerá a su hermano»; el verbo también puede implicar «reconocer».'
    reason: lexical_alternative
  - marker: c
    text: La cláusula etiópica es difícil; la traducción conserva de forma transparente la imagen del «número de los cadáveres» sin suavizarla.
    reason: textual_variant
  - marker: d
    text: 'O: «se incitarán a matanza entre sí» o «se alzarán para matarse entre sí»; la formulación etiópica en este punto ha sido discutida.'
    reason: previous_rendering
lexical_decisions:
- source_word: ሀገረ
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - tierra
  - región
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico, “ciudad” conserva la imagen concreta y sitiada del juicio mejor que una traducción más amplia como “tierra” o “región”.
- source_word: ጻድቃነ
  english_pob_choice: my righteous ones
  chosen_spanish: mis justos
  alternatives_spanish:
  - los justos
  - mis rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma etiópica conserva un matiz posesivo de primera persona; en español, “mis justos” mantiene esa fuerza sin sonar forzado. “Justos” es la opción más natural para este registro.
- source_word: ማዕቀፈ
  english_pob_choice: hindrance
  chosen_spanish: obstáculo
  alternatives_spanish:
  - estorbo
  - trampa
  - freno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término apunta a algo que bloquea o dificulta el avance. “Obstáculo” es la opción más clara y amplia en español, sin decidir prematuramente si se trata de trampa literal o impedimento militar.
- source_word: አፍራሲሆሙ
  english_pob_choice: their horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - su caballería
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el sentido literal de animales de guerra. “Caballería” sería más interpretativo y menos transparente respecto del testimonio fuente.
- source_word: ያነሥኡ
  english_pob_choice: they will stir themselves up
  chosen_spanish: levantarán
  alternatives_spanish:
  - se alzarán
  - se agitarán
  - provocarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión textual indica que el verbo es transitivo: “stir up/raise” con “slaughter” como objeto directo. En español, “levantarán matanza” preserva esa transitividad y el tono áspero del original.'
- source_word: ቀትለ
  english_pob_choice: slaughter
  chosen_spanish: matanza
  alternatives_spanish:
  - muerte
  - degüello
  - carnicería
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Matanza” refleja bien la violencia colectiva y no suaviza el registro apocalíptico. “Degüello” o “carnicería” serían más marcados y menos generales.
- source_word: ትጸንዕ የማኖሙ ዲቤሆሙ
  english_pob_choice: their right hand will be strong against them
  chosen_spanish: su mano derecha será fuerte contra ellos
  alternatives_spanish:
  - su diestra prevalecerá contra ellos
  - su mano derecha se impondrá sobre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen idiomática de la mano derecha como símbolo de poder, con una sintaxis directa y comprensible en español.
- source_word: ኢያእምር ብእሲ ለአኁሁ
  english_pob_choice: a man will not know his brother
  chosen_spanish: un hombre no conocerá a su hermano
  alternatives_spanish:
  - un hombre no reconocerá a su hermano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Conocerá” mantiene la literalidad del verbo y deja abierto el sentido de “reconocer”, que la nota puede explicitar.
- source_word: ኢወልድ ለአቡሁ ወለእሙ
  english_pob_choice: nor a son his father or his mother
  chosen_spanish: ni un hijo a su padre ni a su madre
  alternatives_spanish:
  - ni un hijo conocerá a su padre y a su madre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La elipsis verbal se resuelve en español por continuidad con la cláusula anterior, sin añadir contenido ajeno al testimonio.
- source_word: ኍልቈ አብድነት እሞቶሙ
  english_pob_choice: the number of the corpses from their death is complete
  chosen_spanish: el número de los cadáveres de su muerte
  alternatives_spanish:
  - la cuenta de los muertos
  - el número de los caídos de su muerte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la dureza y la rareza de la frase etiópica sin suavizarla. “Cadáveres” hace visible el carácter macabro y cuantificado del juicio.
- source_word: መቅሰፍቶሙ ኢትኩን በከ
  english_pob_choice: their punishment will not be in vain
  chosen_spanish: su castigo no será en vano
  alternatives_spanish:
  - su azote no será inútil
  - su corrección no será sin efecto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Castigo” es la opción más natural y fiel al valor judicial del término, mientras que “en vano” expresa que el juicio tendrá efecto real.
theological_decisions:
- issue: Poseedor en “city of my righteous ones”
  english_pob_reading: 'Retain first-person possessive: ''my righteous ones'''
  chosen_spanish_reading: 'Mantener el posesivo de primera persona: “mis justos”'
  alternative_spanish_readings:
  - “los justos”
  - “sus justos”
  rationale: El testimonio fuente conserva una relación posesiva; traducir “mis justos” evita borrar ese matiz de pertenencia/protección y no fuerza una identificación doctrinal específica.
  doctrine_reference: Preservar la tensión textual; prioridad de la lengua fuente sobre la nivelación traductora.
- issue: Naturaleza de la violencia descrita
  english_pob_reading: Mutual self-destruction among the wicked powers
  chosen_spanish_reading: Violencia interna y colapso del reconocimiento familiar
  alternative_spanish_readings:
  - ataque externo de fuerzas invasoras
  - caos general sin reciprocidad explícita
  rationale: La secuencia de acciones recíprocas y la pérdida de reconocimiento entre hermanos y padres favorecen leer el pasaje como juicio que desintegra el orden social desde dentro.
  doctrine_reference: No diluir la imaginería apocalíptica ni convertirla en prosa genérica.
translation_notes:
  revision_awareness: 'La redacción española toma en cuenta la revisión gramatical del audit trail: ያነሥኡ se entiende como transitivo (‘levantarán/stir up’) con ቀትለ como objeto directo (‘matanza’), evitando la lectura reflexiva previa. También se conserva la transparencia de la cláusula textual difícil sobre el número de los cadáveres, tal como indica el aparato inglés.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se mantiene “justos” para ጻድቃነ, en coherencia con el registro apocalíptico y la preferencia POB por la precisión léxica.
  - “Matanza” conserva el carácter colectivo y violento del pasaje, evitando suavizar el juicio.
  - La cadena de relaciones familiares se traduce de modo sobrio para preservar la ruptura del reconocimiento sin añadir explicaciones interpretativas.
