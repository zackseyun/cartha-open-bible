translation:
  language: es
  text: Del fruto de este se dará vida a los escogidos, y será plantado hacia el norte, sobre...[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El tramo final es textualmente difícil en este testimonio aislado. «Hacia el norte, sobre...» sigue de cerca las palabras ge’ez conservadas; el referente implícito puede ser el lugar futuro de plantación del árbol.
    reason: textual_variant
  - marker: b
    text: 'O posiblemente «arriba» o «por encima», aunque el ge’ez conservado aquí se entiende mejor como una preposición truncada: «sobre...».'
    reason: previous_rendering
lexical_decisions:
- source_word: ፍሬ
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - producto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Fruto» conserva la imagen concreta del árbol y es el equivalente natural en español para este contexto visionario.
- source_word: ይትወሀብ
  english_pob_choice: shall be given
  chosen_spanish: se dará
  alternatives_spanish:
  - será dado
  - será concedido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva/futura queda bien expresada con «se dará», que mantiene el matiz solemne sin sonar forzado en español.
- source_word: ኅሩያን
  english_pob_choice: the chosen ones
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los electos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» preserva el valor de grupo apocalíptico designado por el texto y evita cargar el término con tecnicismos doctrinales posteriores.
- source_word: ሐይወት
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida eterna
  - vivir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge’ez dice simplemente «vida»; no se expande a «vida eterna» para no resolver una tensión teológica que el testimonio aislado no explicita.
- source_word: መንገለ መስዕ
  english_pob_choice: toward the north
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - en dirección al norte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hacia el norte» conserva el matiz direccional de la preposición ge’ez y suena natural en español.
- source_word: ይተከል
  english_pob_choice: it shall be planted
  chosen_spanish: será plantado
  alternatives_spanish:
  - será trasplantado
  - será establecido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Plantado» mantiene la imagen arbórea explícita y refleja con fidelidad el verbo principal del verso.
- source_word: ዲበ
  english_pob_choice: upon / above
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - upon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición ge’ez exige objeto; en este fragmento truncado, «sobre...» reproduce el carácter incompleto del testimonio y evita convertir indebidamente la preposición en adverbio.
theological_decisions:
- issue: Alcance de «los escogidos»
  english_pob_reading: the chosen ones as the faithful people singled out for eschatological life
  chosen_spanish_reading: los escogidos como designación apocalíptica de los fieles destinados a recibir vida
  alternative_spanish_readings:
  - los elegidos en sentido técnico doctrinal
  - los justos en general
  rationale: En 1 Enoc, la expresión funciona como etiqueta de grupo. Se conserva el sentido local sin importarlo a una formulación sistemática posterior.
  doctrine_reference: Contested terms / consistency of key terms
- issue: Naturaleza de la vida prometida
  english_pob_reading: life in an exalted or eschatological sense, left simply as 'life' in the text
  chosen_spanish_reading: vida, sin ampliar a «vida eterna» ni a una paráfrasis explicativa
  alternative_spanish_readings:
  - vida eterna
  - restauración o sanidad
  rationale: El contexto sugiere un sentido escatológico, pero el testimonio ge’ez aquí solo dice «vida». Se preserva la tensión teológica del pasaje.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente que corrige el valor de ዲበ como preposición («upon/on/over») y no como adverbio. Por eso el texto español usa «sobre...» y conserva la suspensión por tratarse de un fragmento truncado. También se tuvo presente el audit trail inglés, que preserva la dificultad textual sin resolverla más allá de lo permitido por el testimonio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Escogidos» se usa de manera consistente para ኅሩያን, evitando alternar con «elegidos» dentro del mismo registro.
  - «Vida» no se amplía a «vida eterna» para respetar la economía del testimonio ge’ez.
  - La suspensión con puntos suspensivos reproduce el fragmento incompleto del verso y su dependencia del contexto perdido.
