    issue: La nota textual [a] está anclada en «los escogidos» pero explica la dificultad textual del tramo final «hacia el norte, sobre...»
    rationale: El anclaje actual puede inducir a pensar que la dificultad textual afecta a ኅሩያን, cuando la nota auditada se refiere a la frase final incompleta del testimonio.
  - severity: medium
    issue: La nota [b] ofrece «O «encima»» como alternativa de «sobre...»
    rationale: El rastro inglés indica una nota de renderización previa para «above». En español, «encima» no mejora la fidelidad aquí, especialmente al quedar truncado sin objeto; es mejor convertir esta nota en una aclaración de que también podría entenderse «arriba»/«por encima», aunque menos adecuada que la preposición «sobre».
  - severity: low
    issue: Uso de «éste» con tilde
    rationale: La ortografía actual prefiere «este» sin tilde salvo casos excepcionales de ambigüedad, que aquí no existen.
