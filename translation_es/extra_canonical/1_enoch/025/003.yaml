translation:
  language: es
  text: 'Y me respondió, diciendo: «Esta montaña alta que has visto, cuya cumbre es como el trono de Yahvé[a], es su trono, donde el Santo y el Grande, el Señor de Gloria, el Rey Eterno, morará cuando descienda a visitar la tierra con bondad[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta montaña alta que has visto es como el trono de Yahvé». El giro ge''ez puede referirse específicamente a la cumbre de la montaña o, de manera más amplia, a la montaña en relación con la imagen del trono.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «cuando descienda para visitar la tierra para bien» o «para inspeccionar la tierra para bien». La idea es una visita divina benéfica, no solo un descenso espacial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አውሥአ
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - me respondió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo introduce una respuesta en diálogo visionario. «Respondió» conserva el intercambio natural en español; con el pronombre explícito en el texto se mantiene la referencia directa al interlocutor.
- source_word: ደብር
  english_pob_choice: mountain
  chosen_spanish: montaña
  alternatives_spanish:
  - monte
  - cerro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico se trata de una elevación cósmica. «Montaña» es claro y fiel; «monte» sería posible, pero menos preciso para el registro.
- source_word: ነዋኅ
  english_pob_choice: high
  chosen_spanish: alta
  alternatives_spanish:
  - elevada
  - lofty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Describe la elevación visible de la montaña. «Alta» es la opción más natural y directa en español.
- source_word: ዘርእሱ
  english_pob_choice: its summit
  chosen_spanish: su cumbre
  alternatives_spanish:
  - su cima
  - su tope
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cumbre» conserva el valor topográfico de cabeza/superioridad y suena más digno que un calco como «cabeza».
- source_word: መንበረ / መንበሩ
  english_pob_choice: throne / is his throne
  chosen_spanish: trono / es su trono
  alternatives_spanish:
  - asiento / es su asiento
  - silla / es su silla
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El léxico entroniza la montaña, no la reduce a un lugar genérico. «Trono» preserva la imaginería real y divina, y la repetición «es su trono» refleja el énfasis del ge'ez.
- source_word: ለእግዚአ
  english_pob_choice: of the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  - de Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el texto base el título es divino. Para seguir la política del proyecto sobre el nombre divino, se usa «Yahvé» en el cuerpo principal en vez de una sustitución reverencial.
- source_word: ቅዱስ ወዐቢይ
  english_pob_choice: the Holy and Great One
  chosen_spanish: el Santo y Grande
  alternatives_spanish:
  - el Santo y el Grande
  - el Santo y Poderoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez funciona como título sustantivado. En español, capitalizar solo el primer término sería menos claro; «el Santo y Grande» mantiene el peso titular sin agregar elementos no atestiguados.
- source_word: እግዚአ ስብሐት
  english_pob_choice: Lord of Glory
  chosen_spanish: el Señor de Gloria
  alternatives_spanish:
  - el Señor de la Gloria
  - el Dueño de Gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Señor de Gloria» reproduce el título apocalíptico con solemnidad y evita una paráfrasis excesiva. Se conserva «Gloria» como núcleo del sintagma titular.
- source_word: ንጉሥ ዘለዓለም
  english_pob_choice: the Eternal King
  chosen_spanish: el Rey Eterno
  alternatives_spanish:
  - el Rey para siempre
  - el Rey de eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Rey Eterno» es la equivalencia más natural y fiel en español para el título de duración perpetua.
- source_word: ይነብር
  english_pob_choice: will dwell
  chosen_spanish: morará
  alternatives_spanish:
  - habitará
  - dwellará
  lexicon: Dillmann, Lexicon Liguae Aethiopicae
  rationale: El verbo expresa residencia/establecimiento, no solo movimiento. «Morará» conserva un registro bíblico sin sonar arcaizante en exceso.
- source_word: የኀውጻ ለምድር
  english_pob_choice: to visit the earth
  chosen_spanish: a visitar la tierra
  alternatives_spanish:
  - a inspeccionar la tierra
  - a visitar la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción final mantiene la idea de visita divina a la tierra; el infinitivo «a visitar» conserva la sencillez del original.
- source_word: በሠናይ
  english_pob_choice: with goodness
  chosen_spanish: con bondad
  alternatives_spanish:
  - en bondad
  - para bien
  - con bien
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Con bondad» expresa el modo beneficente de la visita sin especificar más de lo que el texto permite.
theological_decisions:
- issue: Enthronement imagery on the mountain
  english_pob_reading: The mountain is identified as God's throne/place of future enthronement, not merely a scenic height.
  chosen_spanish_reading: La montaña es su trono, y la imagen se mantiene como entronización divina futura al descender.
  alternative_spanish_readings:
  - La montaña es solo un lugar alto parecido a un trono.
  - La cumbre es simplemente comparable al trono.
  rationale: El ge'ez repite explícitamente el motivo del trono y añade una cláusula temporal de descenso. La traducción conserva esa tensión sin resolverla en favor de una lectura estática.
  doctrine_reference: Preservar la tensión del texto; no reducir la imaginería entronizadora.
- issue: Divine title እግዚአ
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Dios
  rationale: Dado que el contexto es claramente divino y el proyecto pide evitar el enmascaramiento con «SEÑOR», se usa el nombre divino en el texto principal.
  doctrine_reference: Proyecto terminológico sobre el nombre divino.
- issue: Substantival divine epithets
  english_pob_reading: the Holy and Great One, the Lord of Glory, the Eternal King
  chosen_spanish_reading: el Santo y Grande, el Señor de Gloria, el Rey Eterno
  alternative_spanish_readings:
  - el Santo y el Grande
  - el Santo y Poderoso
  rationale: Se conservan los títulos acumulativos como apposición, sin fundirlos ni interpretarlos como simples adjetivos. Esto respeta la densidad titulativa del pasaje.
  doctrine_reference: Traducir títulos como títulos; mantener la apposición.
translation_notes:
  revision_awareness: Este borrador sigue la revisión que corrigió la reducción de «it is his throne» a una mera expresión de lugar. Por eso conserva explícitamente «es su trono» y refleja la estructura titular del ge'ez. También toma en cuenta la revisión posterior que prefirió «will dwell»; en español se ha rendido con «morará» para preservar esa idea de residencia/entronización más que un simple acto de sentarse.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme a la política del proyecto.
  - 'Se conserva la secuencia titular: «el Santo y Grande, el Señor de Gloria, el Rey Eterno».'
  - «Morará» se eligió para reflejar el valor de residencia del verbo, no una acción puntual.
  - La puntuación y el uso de comillas siguen el estilo editorial bíblico en español.
  - La nota a cubre la ambigüedad de la cumbre frente a la montaña; la nota b cubre la ambigüedad del fin benéfico de la visita divina.
