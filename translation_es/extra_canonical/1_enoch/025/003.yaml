base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/025/003.yaml
  text: And he answered me[a], saying, “This high mountain that you have seen, whose summit is like the throne of the Lord, is his throne, where the Holy and Great One, the Lord of Glory, the Eternal King[c][b], will dwell when he comes down to visit the earth with goodness.”
  footnotes:
  - marker: a
    text: Or 'whose top is like the throne of the Lord.' The Ge'ez wording may describe either the mountain's summit specifically or the mountain more generally in relation to the throne imagery.
    reason: lexical_alternative
  - marker: b
    text: The final phrase can also be understood as 'to inspect the earth for good' or 'to visit the earth in goodness.' The sense is a beneficent divine visitation, not merely movement from heaven to earth.
    reason: lexical_alternative
  - marker: c
    text: Or 'is the place where the Holy and Great Lord of Glory, the Eternal King, will sit'.
    reason: previous_rendering
