translation:
  language: es
  text: 'Y me dijo[a]: «Enoc, ¿por qué preguntas acerca de la fragancia de este árbol, e indagas para saber?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "acerca de su aroma". El término ge'ez puede significar olor, aroma o fragancia; aquí se eligió "fragancia" por el tono elevado de la escena.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይቤለኒ
  english_pob_choice: he said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - me expresó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula narrativa directa se conserva con naturalidad en español. "Me dijo" mantiene la inmediatez del diálogo sin añadir matices inexistentes.
- source_word: ሄኖክ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Enoch
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se adapta al uso español habitual del nombre bíblico/profético, sin alterar la identidad del personaje.
- source_word: ምንተ ትስእል
  english_pob_choice: why do you ask
  chosen_spanish: ¿por qué preguntas
  alternatives_spanish:
  - ¿qué preguntas?
  - ¿para qué preguntas?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque la forma literal gira en torno a "qué", el contexto muestra una pregunta sobre el motivo de la indagación. "¿Por qué preguntas?" expresa mejor la fuerza idiomática sin perder el matiz interrogativo.
- source_word: በእንተ መዓዛሁ
  english_pob_choice: about the fragrance of it
  chosen_spanish: acerca del aroma de este árbol
  alternatives_spanish:
  - acerca de su fragancia
  - sobre su aroma
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez puede referirse a olor/aroma/fragrancia. "Aroma" funciona bien en español y mantiene un registro elevado, mientras que el posesivo se aclara con "este árbol" por la referencia contextual del sufijo.
- source_word: ለዝ ዕፅ
  english_pob_choice: of this tree
  chosen_spanish: de este árbol
  alternatives_spanish:
  - de esta madera
  - de esta planta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario, "árbol" es la opción más concreta y natural; conserva la imagen principal sin extenderla a sentidos menos específicos.
- source_word: ወትጠየቅ
  english_pob_choice: and inquire
  chosen_spanish: e indagas
  alternatives_spanish:
  - e inquires
  - y preguntas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el segundo verbo de búsqueda de información como elemento distinto. "Indagas" evita la mera repetición mecánica de "preguntas" y refleja una exploración insistente.
- source_word: ከመ ታእምር
  english_pob_choice: so that you may know
  chosen_spanish: para que sepas
  alternatives_spanish:
  - a fin de que sepas
  - para que conozcas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula expresa propósito. "Para que sepas" es la forma más natural y precisa en español para el valor epistémico del original.
theological_decisions:
- issue: Tono de la respuesta angélica
  english_pob_reading: A mild challenge to Enoch's inquiry rather than a rebuke
  chosen_spanish_reading: Una pregunta correctiva suave, no un regaño ni una simple solicitud de aclaración
  alternative_spanish_readings:
  - Un regaño por curiosidad impropia
  - Una mera solicitud de aclaración
  rationale: La estructura con dos verbos de preguntar y una cláusula de propósito sugiere una interpelación que cuestiona la motivación de Enoc y lo conduce a la revelación, sin condenarlo. El español conserva ese tono con la interrogación y el doble movimiento verbal.
  doctrine_reference: Mantener la escena apocalíptica y el habla angélica sin exagerar la reprensión ni rebajar la fuerza del intercambio.
translation_notes:
  revision_awareness: El texto coincide con la lectura auditada en inglés y no requiere revisión adicional; se conservó la duplicación verbal del original ge'ez y se ajustó el tono al registro natural del español.
  spanish_consistency_notes:
  - Se usa "Enoc" como forma española habitual del nombre propio.
  - Se preserva la distinción entre la primera pregunta y el segundo verbo de indagación mediante "preguntas" e "indagas".
  - '"Aroma" se escogió por registro; la nota conserva la alternativa semántica "fragancia".'
  - La puntuación con comillas angulares y signos de interrogación dobles sigue la convención del español.
