translation:
  language: es
  text: Y este árbol fragante[a]—ninguna carne tiene autoridad para tocarlo hasta el gran juicio[b], cuando todos serán vengados y todo será llevado a su cumplimiento para siempre; eso será dado a los justos y a los humildes.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «ninguna carne». La frase se refiere a seres humanos mortales, no a la carne como sustancia.
    reason: lexical_alternative
  - marker: b
    text: La cláusula después de «el gran juicio» es difícil. El sentido es que la retribución se ejecuta universalmente y todo es llevado a su plena culminación.
    reason: textual_variant
  - marker: c
    text: O «los humildes». El expediente inglés POB vigente entiende así el término final en esta etapa de la revisión.
    reason: previous_rendering
lexical_decisions:
- source_word: ዕፀ መዓዛ
  english_pob_choice: fragrant tree
  chosen_spanish: árbol fragante
  alternatives_spanish:
  - árbol de fragancia
  - árbol perfumado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión designa un árbol caracterizado por su aroma o perfume. «Árbol fragante» conserva la imagen concreta y suena natural en español.
- source_word: አልሐዱ
  english_pob_choice: touch
  chosen_spanish: tocar
  alternatives_spanish:
  - acercarse a
  - manipular
  - comer de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de acceso restringido al árbol, el verbo más plausible es contacto físico. «Tocar» preserva la prohibición sin especificar más de lo que el texto exige.
- source_word: ዘሥጋ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - ser humano mortal
  - mortal
  - humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido literal es «de carne». Mantener «carne» preserva el contraste antropológico apocalíptico; en español, la frase «ninguna carne» puede referir a seres mortales sin convertir el término en una paráfrasis.
- source_word: ሥልጣነ
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - derecho
  - permiso
  - poder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término apunta a acceso autorizado, no solo capacidad física. «Autoridad» conserva el matiz jurídico de la prohibición.
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - condena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto apocalíptico se trata del gran juicio escatológico. «Juicio» es amplio y adecuado para el registro bíblico.
- source_word: ይትቤቀል
  english_pob_choice: he will take vengeance / all will be avenged
  chosen_spanish: se ejecutará venganza
  alternatives_spanish:
  - se hará venganza
  - habrá venganza
  - será vengado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa retribución o venganza judicial. La construcción impersonal pasiva evita introducir un sujeto no nombrado y refleja bien el sentido colectivo del contexto revisado.
- source_word: ኵሎ
  english_pob_choice: on all
  chosen_spanish: sobre todos
  alternatives_spanish:
  - sobre todo
  - sobre cada uno
  - contra todos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El objeto es amplio y puede abarcar personas bajo juicio. «Sobre todos» conserva la amplitud sin estrechar indebidamente el referente.
- source_word: ይፌጽም
  english_pob_choice: bring it to completion
  chosen_spanish: se lo llevará a cumplimiento
  alternatives_spanish:
  - lo completará
  - lo llevará a término
  - lo consumará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica completar o llevar a plenitud. «Se lo llevará a cumplimiento» mantiene la idea de culminación y evita una paráfrasis demasiado libre.
- source_word: ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por los siglos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la equivalencia idiomática natural de permanencia indefinida en español bíblico contemporáneo.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un término apocalíptico de identidad clave; «los justos» es la traducción más estable y reconocible.
- source_word: ቅዱሳን
  english_pob_choice: the holy
  chosen_spanish: los santos
  alternatives_spanish:
  - los consagrados
  - los santos y consagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La corrección textual señalada en la revisión muestra que el Ge'ez lee «los santos», no «los humildes». «Los santos» refleja con precisión el adjetivo sustantivado y mantiene la pareja apocalíptica habitual.
- source_word: ዝኩ
  english_pob_choice: that
  chosen_spanish: entonces
  alternatives_spanish:
  - esa
  - aquella
  - ese
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión indica que el demostrativo se refiere al árbol, no a un adverbio temporal. En español, para evitar un final torpe («ese será dado»), se usa una transición natural («entonces») que enlaza con la cláusula previa sin alterar el referente final.
theological_decisions:
- issue: Sentido de «carne» en la prohibición de acceso
  english_pob_reading: No mortal human has authority to touch the tree before the appointed judgment.
  chosen_spanish_reading: Ninguna carne tiene autoridad para tocarlo antes del juicio señalado.
  alternative_spanish_readings:
  - Ningún ser humano mortal tiene autoridad para tocarlo
  - Nadie puede tocarlo
  rationale: El Ge'ez dice literalmente «carne». Se conserva el término para no borrar la oposición apocalíptica entre lo mortal y el árbol sagrado, aunque en español queda claro por el contexto que se refiere a mortales.
  doctrine_reference: Preservar la imaginería apocalíptica y el contraste antropológico del pasaje; evitar armonización excesiva.
- issue: Cláusula de retribución y culminación
  english_pob_reading: All will be avenged and brought to completion forever.
  chosen_spanish_reading: se ejecutará venganza sobre todos y se lo llevará a cumplimiento para siempre
  alternative_spanish_readings:
  - habrá venganza sobre todos y se llevará a término
  - será vengado todo y será completado para siempre
  rationale: La revisión textual favorece una lectura impersonal/colectiva más que un sujeto singular explícito. La pasiva impersonal en español preserva la fuerza judicial sin introducir un sujeto no atestiguado.
  doctrine_reference: Mantener la ambigüedad controlada del original y no sobreespecificar el agente del juicio.
- issue: Identidad de los receptores finales
  english_pob_reading: then it will be given to the righteous and the holy.
  chosen_spanish_reading: entonces será dado a los justos y a los santos
  alternative_spanish_readings:
  - entonces será dado a los justos y a los humildes
  - entonces será dado a los justos y a los consagrados
  rationale: La revisión indica que el texto dice «los santos» (qəddusān), no «los humildes». Se adopta la lectura corregida y la pareja apocalíptica tradicional «justos y santos».
  doctrine_reference: Seguir la corrección textual documentada y no conservar una lectura derivada del OCR errado.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión crítica que corrige la lectura de ትሑታን a ቅዱሳን y la observación sobre el demostrativo ዝኩ; por eso el cierre se traduce con «los santos» y la transición final se formula en español de modo natural sin convertir el demostrativo en adverbio temporal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se conservó «carne» por la fuerza lexical apocalíptica y se aclaró en nota que no significa la sustancia física.
  - Se eligió «los justos» y «los santos» para reflejar la pareja terminológica estabilizada por la revisión textual.
  - Se evitó «el Señor» y otras sustituciones devocionales ajenas al texto fuente.
  - La puntuación con raya larga busca reproducir la apposición enfática del original sin añadir contenido.
