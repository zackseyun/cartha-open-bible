    issue: El borrador usa «los santos» en vez de «los humildes».
    rationale: Aunque hubo una revisión intermedia por supuesto error OCR, la traducción inglesa POB auditada vigente y el pase posterior de revisión restablecieron «the humble». El revisor español debe seguir el expediente auditado final, no una capa intermedia contradictoria.
  - severity: medium
    issue: «entonces» no refleja bien el demostrativo ዝኩ documentado como «that».
    rationale: La auditoría lexical indica valor demostrativo, no temporal. «Entonces» añade un matiz temporal ajeno al dato fuente y desdibuja la referencia al árbol/eso.
  - severity: medium
    issue: «se lo llevará a cumplimiento» es español poco natural y ambiguo de forma innecesaria.
