translation:
  language: es
  text: 'En aquel tiempo, yo, Enoc, le respondí, diciendo: «Deseo saber acerca de todo[a], pero especialmente acerca de este árbol[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «todo esto», en referencia al conjunto de lo ya mostrado en la visión.
    reason: alternative_reading
  - marker: b
    text: 'El ge''ez al final del versículo es algo difícil; el sentido es que Enoc pide un conocimiento más pleno, especialmente acerca de este árbol. Otra posible lectura es: «Deseo saber acerca de todo esto, y aún más acerca de este árbol».'
    reason: textual_variant
lexical_decisions:
- source_word: አውሣእክዎ
  english_pob_choice: answered him
  chosen_spanish: le respondí
  alternatives_spanish:
  - respondí
  - le contesté
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez indica respuesta directa en diálogo; el sufijo pronominal exige expresar el objeto indirecto en español. «Le respondí» conserva la relación interpersonal sin añadir énfasis innecesario.
- source_word: እንዘ፡ እብል
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción introduce el discurso directo. «Diciendo» reproduce la fórmula narrativa natural en español y mantiene el registro elevado.
- source_word: በእንተ፡ ኵሉ፡
  english_pob_choice: about everything / concerning all this
  chosen_spanish: todo
  alternatives_spanish:
  - acerca de todo
  - de todo
  - sobre todo esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicum?
  rationale: Aquí el ge'ez apunta a la amplitud del objeto del conocimiento solicitado. «Todo» transmite esa totalidad con claridad y evita forzar una referencia restringida a «todo esto» si el contexto no la exige.
- source_word: እፈቅድ
  english_pob_choice: I desire
  chosen_spanish: Deseo
  alternatives_spanish:
  - Quiero
  - Anhelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa voluntad/deseo. «Deseo» conserva el tono solemne y el matiz volitivo mejor que «quiero».
- source_word: ኣእምር
  english_pob_choice: to know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  - comprender
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario, el objetivo es acceder a conocimiento de algo concreto; «conocer» suena más natural que el infinitivo «saber» unido a un complemento nominal, y mantiene la fuerza cognitiva.
- source_word: ወፈድፋደሰ
  english_pob_choice: all the more
  chosen_spanish: pero especialmente
  alternatives_spanish:
  - y mucho más
  - y con mayor razón
  - sobre todo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor es intensificador y contrastivo respecto del conjunto de cosas. En español, «pero especialmente» expresa mejor el contraste entre la totalidad y el árbol señalado, sin perder la intensificación.
- source_word: ዕፅ
  english_pob_choice: tree
  chosen_spanish: árbol
  alternatives_spanish:
  - madero
  - planta
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: El sentido contextual es vegetal y literal. «Árbol» es la traducción directa y más clara en español.
theological_decisions:
- issue: Cómo reflejar la tensión entre conocimiento general y foco especial en el árbol
  english_pob_reading: I desire to know about everything, but especially about this tree.
  chosen_spanish_reading: Deseo conocer todo, pero especialmente este árbol.
  alternative_spanish_readings:
  - Deseo conocer acerca de todo, y más aún de este árbol.
  - Deseo conocer todo, y sobre todo este árbol.
  rationale: El ge'ez contrapone la amplitud de «todo» con la focalización en «este árbol». La traducción conserva esa tensión sin resolverla en una simple curiosidad ni en una mera reformulación estilística.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Cómo representar el destinatario explícito del verbo «respondí»
  english_pob_reading: answered him
  chosen_spanish_reading: le respondí
  alternative_spanish_readings:
  - respondí a él
  - le contesté
  rationale: El sufijo de objeto en ge'ez muestra que Enoc responde a un interlocutor concreto. «Le respondí» preserva esa referencia personal de forma natural en español.
  doctrine_reference: Principio de transparencia gramatical y auditable source-grounding
translation_notes:
  revision_awareness: 'El pasaje fue revisado a partir de una adjudicación que corrigió dos puntos clave del inglés POB: el objeto explícito del verbo («him») y la oposición entre «everything» y «this tree». La presente versión sigue esa lectura revisada y evita diluir la totalidad de ኵሉ en una fórmula genérica.'
  spanish_consistency_notes:
  - Se mantiene «Enoc» para el nombre propio, en concordancia con el uso español bíblico estándar.
  - Se usa «árbol» de manera literal; no se espiritualiza ni se sustituye por un término más interpretativo.
  - El registro conserva la cadencia narrativa y el estilo directo de una declaración visionaria.
  - Las notas distinguen entre la lectura principal y la alternativa permitida por el audit trail, sin sobrecargar el texto principal.
