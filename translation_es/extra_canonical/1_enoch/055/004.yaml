  spanish_quality_summary: 'El texto es comprensible, pero ''habitáis/acampáis/os alojáis/moráis'' suena marcadamente peninsular o literario-arcaizante. Para una Biblia en español neutral y eclesialmente legible, conviene usar formas de ustedes: ''viven'', ''acampan'', ''se alojan'', ''moran'' o similar. También es preferible ''los poderosos'' en el texto alternativo para mayor naturalidad, aunque en vocativo sin artículo la forma breve sigue siendo viable.'
  glossary_alignment: 'No hay términos del glosario principal en juego. La revisión propuesta preserva la decisión lexical del audit trail: vocativo directo, sin añadir localización no atestiguada, y mantiene alternativas verbales en nota.'
  issues:
  - severity: medium
    issue: Uso de 'habitáis' en el texto principal
    rationale: Aunque refleja bien la segunda persona plural, pertenece al paradigma de 'vosotros' y no al español neutral latinoamericano solicitado. 'ustedes ... viven/habitan' es más adecuado.
  - severity: medium
    issue: Formas verbales peninsulares en la nota a
    rationale: '''acampáis'' y ''os alojáis'' repiten el problema de registro regional. Deben ajustarse a formas amplias de lectura panhispánica, p. ej. ''acampan'' y ''se alojan''.'
  - severity: low
    issue: Interjección inicial 'Oh'
    rationale: Es aceptable, pero conviene puntuarla mejor y evitar un tono demasiado calcado. 'Oh, reyes...' funciona con más naturalidad en español bíblico moderno.
