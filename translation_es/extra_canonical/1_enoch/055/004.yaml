lexical_decisions:
- source_word: ነገሥት
  english_pob_choice: the kings
  chosen_spanish: reyes
  alternatives_spanish:
  - los reyes
  - gobernantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez plural ነገሥት designa reyes o gobernantes. En un vocativo español, 'reyes' comunica mejor la clase social-política que 'gobernantes', y el artículo puede omitirse por la forma de exhortación/apóstrofe.
- source_word: ኃያላን
  english_pob_choice: the mighty
  chosen_spanish: poderosos
  alternatives_spanish:
  - los poderosos
  - los fuertes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto apocalíptico/judicial, ኃያላን se refiere a personas influyentes o poderosas, no solo a fuerza física. 'Poderosos' conserva ese peso social y suena natural en español.
- source_word: ትኃድሩ
  english_pob_choice: dwell
  chosen_spanish: habitáis
  alternatives_spanish:
  - dormís
  - acampáis
  - moráis
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión gramatical del audit trail indica segunda persona plural ('vosotros ustedes') en presente imperfectivo, no tercera persona. 'Habitáis' refleja directamente la dirección vocativa y mantiene abierta la ambigüedad semántica entre habitar, morar o alojarse sin forzar una localización inexistente en el fragmento.
theological_decisions:
- issue: La línea preservada parece incompleta o elíptica, y el verbo se entiende mejor como apelación directa en segunda persona plural.
  english_pob_reading: O kings and mighty ones who dwell
  chosen_spanish_reading: Oh reyes y poderosos que habitáis
  alternative_spanish_readings:
  - Oh reyes y poderosos que moráis allí
  - Oh reyes y poderosos que acampáis
  rationale: 'La evidencia ge''ez favorece un vocativo directo con verbo de segunda persona plural. Dado que no hay locativo explícito en el fragmento, el español debe mantener la misma cautela que el audit trail: traducir solo lo atestiguado y no completar el lugar implícito en el cuerpo del texto.'
  doctrine_reference: Preservar la tensión textual y no reconstruir de más ante un testimonio fragmentario.
translation_notes:
  revision_awareness: 'El audit trail muestra una corrección importante: el verbo ge''ez ትኃድሩ se reconoció como segunda persona plural, no como tercera persona. Por eso el español adopta un vocativo directo y evita una traducción descriptiva en tercera persona. También se conserva la prudencia textual frente a la posible omisión de un complemento locativo.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o títulos litúrgicos no presentes en el texto.
  - '''Poderosos'' conserva el valor social de ''the mighty'' sin diluirlo en ''fuertes''.'
  - Se mantiene la ambigüedad de 'habitáis' sin añadir 'allí' en el texto principal.
