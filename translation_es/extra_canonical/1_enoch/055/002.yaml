translation:
  language: es
  text: Y juró por su gran nombre que de ahora en adelante no haría así a todos los que habitan sobre la tierra seca[a]; y pondré una señal en los cielos, y será un compromiso de fidelidad entre mí y ellos para siempre, mientras duren los días del cielo sobre la tierra[b]; y esto es por mi mandato[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión 'señal en los cielos' probablemente evoca la tradición de la señal del diluvio, pero el versículo no nombra explícitamente la señal.
    reason: cross_reference
  - marker: b
    text: El sustantivo traducido aquí como 'compromiso de fidelidad' también puede entenderse más ampliamente como 'fidelidad' o, por extensión contextual, como una garantía pactal.
    reason: lexical_alternative
  - marker: c
    text: La frase final también puede verterse 'esto es conforme a mi ordenanza' o 'esto es mi decreto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: መሐለ
  english_pob_choice: he swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - prometió bajo juramento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Juró es la forma más directa y natural en español para expresar el acto solemne de tomar juramento, conservando la fuerza pactal del verbo.
- source_word: በስሙ ዐቢይ
  english_pob_choice: by his great name
  chosen_spanish: por su gran nombre
  alternatives_spanish:
  - por su nombre العظيمo
  - por su nombre poderoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Gran nombre reproduce el valor reverencial y solemne del original sin introducir matices no atestiguados por el texto.
- source_word: እምይእዜ
  english_pob_choice: from this time onward
  chosen_spanish: desde este tiempo en adelante
  alternatives_spanish:
  - desde ahora
  - de aquí en adelante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Esta expresión conserva con claridad el sentido temporal prospectivo y mantiene un registro elevado y comprensible.
- source_word: ኢይገብር ከመዝ
  english_pob_choice: he would not do thus
  chosen_spanish: no haría así
  alternatives_spanish:
  - no actuaría de este modo
  - no lo haría así
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: No haría así refleja la fórmula concisa del ge'ez sin sobreexplicar el referente de 'así', que debe quedar determinado por el contexto.
- source_word: ለኵሎሙ እለ ይነብሩ ዲበ የብስ
  english_pob_choice: to all who dwell upon the dry land
  chosen_spanish: a todos los que habitan sobre la tierra seca
  alternatives_spanish:
  - a todos los que viven sobre la tierra seca
  - a todos los habitantes de la tierra seca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Tierra seca conserva el matiz específico de የብስ y evita nivelarlo con 'tierra' o 'mundo', preservando la posible evocación del contexto del diluvio.
- source_word: ትእምርተ
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - un signo
  - una marca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Señal es natural en español bíblico contemporáneo y comunica bien el carácter visible y referencial del elemento celeste.
- source_word: እወዲ በሰማያት
  english_pob_choice: I will set in the heavens
  chosen_spanish: pondré en los cielos
  alternatives_spanish:
  - colocaré en los cielos
  - la pondré en el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Pondré en los cielos mantiene la imagen espacial del original y su registro solemne, sin identificar el signo con un objeto específico.
- source_word: ማእከሌየ ወማእከሌሆሙ
  english_pob_choice: between me and them
  chosen_spanish: entre mí y ellos
  alternatives_spanish:
  - entre yo y ellos
  - como vínculo entre mí y ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Entre mí y ellos reproduce la relación bilateral del texto con la mayor transparencia y naturalidad en español.
- source_word: ሃይማኖተ
  english_pob_choice: a pledge of faithfulness
  chosen_spanish: un compromiso de fidelidad
  alternatives_spanish:
  - una prenda de fidelidad
  - una fidelidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Compromiso de fidelidad expresa la idea de ḥaymānotə como vínculo fiable o garantía relacional sin cerrar la ambigüedad del término a 'pacto' o 'covenant'.
- source_word: እስከ ለዓለም መጠነ መዋዕለ ሰማይ ዲበ ምድር
  english_pob_choice: forever, for as long as the days of heaven are upon the earth
  chosen_spanish: para siempre, mientras los días del cielo estén sobre la tierra
  alternatives_spanish:
  - para siempre, mientras duren los días del cielo sobre la tierra
  - para siempre, en tanto los días del cielo estén sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula conserva el valor poético y durativo del original sin reducirla a un simple 'para siempre'.
- source_word: ዝ በትእዛዝየ ውእቱ
  english_pob_choice: and this is by my command
  chosen_spanish: y esto es por mi mandato
  alternatives_spanish:
  - y esto es conforme a mi mandato
  - y esto es por mi orden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mandato recoge la idea de disposición autoritativa divina de manera breve y elevada, compatible con el cierre formal del versículo.
theological_decisions:
- issue: Cómo traducir ሃይማኖተ sin resolver en exceso su alcance teológico
  english_pob_reading: a pledge of faithfulness between me and them
  chosen_spanish_reading: un compromiso de fidelidad entre mí y ellos
  alternative_spanish_readings:
  - un pacto entre mí y ellos
  - una fidelidad entre mí y ellos
  rationale: La forma elegida preserva la tensión entre fidelidad, garantía y posible resonancia pactal, sin introducir 'pacto' como si el término estuviera explícito en el ge'ez.
  doctrine_reference: Preservar la tensión lexical; primacía del idioma fuente sobre la armonización doctrinal o intertextual.
- issue: Si nombrar explícitamente la señal como arco iris
  english_pob_reading: The sign in the heavens likely echoes the flood-sign tradition, but the verse itself does not explicitly name the sign.
  chosen_spanish_reading: Se deja como 'una señal en los cielos' sin nombrarla.
  alternative_spanish_readings:
  - el arco iris en los cielos
  - el arco en las nubes
  rationale: El texto fuente no identifica la señal; nombrarla excedería el testimonio disponible, aunque el contexto recuerde la tradición del diluvio.
  doctrine_reference: No sobrearmonizar con pasajes familiares cuando el texto presente no los explicita.
translation_notes:
  revision_awareness: El borrador sigue la lectura auditada más reciente, que no requirió cambios, y mantiene la decisión de no identificar la señal celestial ni resolver de antemano la amplitud semántica de ሃይማኖተ.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el texto fuente lo exigiera; en este versículo no aparece el nombre divino explícito, por lo que no se introdujo.
  - Se conservó el paralelismo solemne del original con una sintaxis clara en español, evitando una paráfrasis explicativa.
  - Se mantuvo la ambigüedad controlada de la 'señal' y del término de fidelidad para respetar el testimonio fuente.
