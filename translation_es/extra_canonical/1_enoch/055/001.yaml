translation:
  language: es
  text: 'Y después de esto, la Cabeza de los Días cambió de parecer[a] y dijo: «En vano he destruido a todos los que habitan en la tierra seca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se arrepintió» o «se retractó». El verbo ge'ez puede expresar un giro, una reversión o un cambio de parecer; con un sujeto divino, el matiz puede ser menos moral que el que suele sugerir «arrepentirse» en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምድኅረዝ
  english_pob_choice: after this
  chosen_spanish: después de esto
  alternatives_spanish:
  - después
  - luego de esto
  - tras esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula marca transición temporal narrativa; «después de esto» conserva el orden apocalíptico con español natural.
- source_word: ነሥሐ
  english_pob_choice: relented
  chosen_spanish: se arrepintió
  alternatives_spanish:
  - se arrepintió
  - cedió
  - cambió de parecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez admite la idea de giro, arrepentimiento o cambio de actitud. En español, «se arrepintió» mantiene la tensión teológica del original y el valor verbal fuerte, mientras la nota preserva alternativas menos moralizadas.
- source_word: ርእሰ መዋዕል
  english_pob_choice: the Head of Days
  chosen_spanish: el Cabeza de los Días
  alternatives_spanish:
  - el Jefe de los Días
  - el Principal de los Días
  - el Cabeza de los Días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título apocalíptico de forma literal y transparente. Aunque suene inusual en español, refleja mejor la composición del ge'ez que una normalización teológica como «Anciano de días».
- source_word: ሕኵፖልክዎሙ
  english_pob_choice: I destroyed them
  chosen_spanish: he destruido
  alternatives_spanish:
  - he aniquilado
  - he arrasado
  - he exterminado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «He destruido» reproduce la fuerza del acto judicial sin cargar el español con matices más interpretativos o más intensos de los que exige el texto.
- source_word: ለኵሎሙ ለእለ ይነብሩ
  english_pob_choice: all those who dwell
  chosen_spanish: a todos los que habitan
  alternatives_spanish:
  - a todos los que viven
  - a todos los que moran
  - a quienes habitan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia preserva la totalidad explícita y el sentido durativo de «habitar». En español, «habitan» suena más sobrio que «moran» y más preciso que «viven» en este contexto.
- source_word: ውስተ የብስ
  english_pob_choice: on the dry land
  chosen_spanish: en la tierra seca
  alternatives_spanish:
  - sobre la tierra seca
  - en el suelo seco
  - en tierra seca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tierra seca» conserva el contraste concreto del ge'ez የብስ y evita suavizarlo a «tierra» sin más. «En» fluye mejor que una calca rígida de la preposición.
theological_decisions:
- issue: Cómo traducir el verbo divino ነሥሐ aplicado al Cabeza de los Días
  english_pob_reading: 'relented; footnote: or changed his mind'
  chosen_spanish_reading: 'se arrepintió; nota: también puede entenderse «cedió» o «cambió de parecer»'
  alternative_spanish_readings:
  - cedió
  - cambió de parecer
  - se ablandó
  rationale: El texto presenta una expresión antropopática fuerte. La versión principal mantiene la tensión del original en lugar de neutralizarla. La nota ofrece alternativas que muchos lectores considerarán más naturales en español con sujeto divino.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones teológicas/textuales en vez de resolverlas; nota léxica sobre campos semánticos de arrepentimiento/cambio de mente.'
translation_notes:
  revision_awareness: 'La POB inglesa fue revisada desde «repented» a «relented» para reflejar mejor el tono contextual y evitar una carga moral innecesaria; la versión española conserva la tensión del verbo original con «se arrepintió», pero la nota mantiene las alternativas menos marcadas. También se atendió la puntuación inglesa final para reproducir en español una cláusula natural: «En vano he destruido...».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el original lo exija explícitamente; este verso no contiene el tetragrámaton.
  - Se conserva el título apocalíptico literal «Cabeza de los Días» para coherencia con el léxico POB en contextos enóquicos.
  - «habitan» se usa para sostener el valor durativo de ይነብሩ, evitando una simplificación a «viven».
  - Se preserva el tono de juicio con «he destruido» sin intensificarlo a un equivalente más duro que el audit trail no demande.
