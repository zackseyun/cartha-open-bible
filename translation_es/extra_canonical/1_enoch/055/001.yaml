revisions:
- from: 'Y después de esto, el Cabeza de los Días se arrepintió[a] y dijo: «En vano he destruido a todos los que habitan en la tierra seca».'
  to: 'Y después de esto, la Cabeza de los Días cambió de parecer[a] y dijo: «En vano he destruido a todos los que habitan en la tierra seca».'
  rationale: Se ajusta ነሥሐ en el texto principal a «cambió de parecer» para reflejar mejor la decisión auditada inglesa de evitar en el cuerpo del texto una lectura demasiado moralizada con sujeto divino, mientras se conserva la tensión en la nota mediante «se arrepintió». Se corrige el título a «la Cabeza de los Días», que mantiene la literalidad apocalíptica pero con español más natural y legible. Se mantiene «tierra seca», que representa bien የብስ.
