translation:
  language: es
  text: Cuando quise entregarlos en manos de los ángeles[a] en el día de tribulación y dolor, haré reposar sobre ellos mi castigo y mi ira, dice Dios, el Señor de los espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez es difícil en la transición antes de «mi castigo y mi ira». La frase puede entenderse como entrega al poder de los ángeles o, según otra lectura, como una captura por medio de los ángeles, seguida del juicio divino que se posa sobre ellos.
    reason: textual_variant
lexical_decisions:
- source_word: ፈቀድኩ
  english_pob_choice: I wished / I desired
  chosen_spanish: quise
  alternatives_spanish:
  - deseé
  - tuve la intención de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa voluntad o intención. «Quise» comunica una resolución divina clara sin forzar una formulación más técnica de decreto.
- source_word: አጽንዖሙ
  english_pob_choice: to give them over / to seize them
  chosen_spanish: tomarles
  alternatives_spanish:
  - apoderarme de ellos
  - agarrarlos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A la luz de la revisión del Ge'ez, el verbo apunta a sujetar o prender, no a «entregarlos». «Tomarles» mantiene la acción de captura sin añadir más de lo que el texto permite.
- source_word: በእደ መላእክት
  english_pob_choice: by the hand of the angels
  chosen_spanish: por mano de los ángeles
  alternatives_spanish:
  - por medio de los ángeles
  - por la mano de los ángeles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el valor instrumental/agencial de la expresión, siguiendo la revisión que entiende በ como agencia. «Por mano de» mantiene el matiz idiomático y judicial.
- source_word: በዕለተ ምንዳቤ ወሕማም
  english_pob_choice: on the day of tribulation and pain
  chosen_spanish: en el día de tribulación y dolor
  alternatives_spanish:
  - en el día de aflicción y sufrimiento
  - en el día de angustia y dolor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tribulación» y «dolor» reproducen el tono apocalíptico y el paralelismo de sufrimiento externo e interno, en línea con la lectura inglesa auditable.
- source_word: መቅሠፍተየ
  english_pob_choice: my punishment
  chosen_spanish: mi castigo
  alternatives_spanish:
  - mi castigo punitivo
  - mi azote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Castigo» es el equivalente más natural en español para la fuerza judicial del término, sin estrecharlo indebidamente a «plaga» o «azote».
- source_word: መዐትየ
  english_pob_choice: my wrath
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furia
  - mi indignación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ira» comunica el juicio divino con dignidad y claridad. Aunque «ira» es menos elevada que «ira/ira divina» en algunas tradiciones, aquí preserva el sentido sin sobretraducción.
- source_word: አኃድር ዲቤሆሙ
  english_pob_choice: I will cause ... to abide upon them
  chosen_spanish: haré reposar sobre ellos
  alternatives_spanish:
  - haré morar sobre ellos
  - haré que permanezca sobre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma causativa sugiere hacer que algo se asiente o permanezca. «Haré reposar sobre ellos» conserva la imagen de un juicio que se posa y permanece.
- source_word: እግዚአብሔር እግዚአ መናፈስት
  english_pob_choice: God, the Lord of spirits
  chosen_spanish: Dios, el Señor de los espíritus
  alternatives_spanish:
  - Dios, el Señor de espíritu[s]
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El Ge'ez distingue «Dios» de «Señor de». En español, «Dios» preserva እግዚአብሔር y «el Señor de los espíritus» refleja el título compuesto sin redundancia innecesaria.
theological_decisions:
- issue: Agencia divina mediada por ángeles
  english_pob_reading: God acts through angels, and divine judgment then rests on the condemned.
  chosen_spanish_reading: Dios los toma por medio de los ángeles en el día de tribulación y dolor, y luego hace reposar sobre ellos su castigo y su ira.
  alternative_spanish_readings:
  - Dios los entrega a los ángeles
  - los ángeles mismos son el castigo
  rationale: La sintaxis conserva la mediación angélica sin confundirla con la acción judicial directa de Dios. También mantiene la tensión entre el agente secundario y el juicio divino explícito.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla artificialmente.
- issue: Título divino final
  english_pob_reading: God, the Lord of spirits
  chosen_spanish_reading: Dios, el Señor de los espíritus
  alternative_spanish_readings:
  - el Señor de los espíritus
  - Dios, Señor de los espíritus
  rationale: El Ge'ez emplea dos expresiones distintas; traducir ambas evita borrar la distinción entre el nombre genérico de Dios y el título soberano de gobierno sobre los espíritus.
  doctrine_reference: Distinción lexical-teológica entre እግዚአብሔር y እግዚአ.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se corrigió la idea previa de «entregarlos» y se adoptó una lectura de captura/sujeción por medio de los ángeles, además de respetar la distinción entre «Dios» y «el Señor de los espíritus». También se evitó introducir «entonces» o una secuencia temporal no garantizada por el Ge''ez.'
  spanish_consistency_notes:
  - Se mantuvo «espíritus» en plural para el título divino, conforme al sentido literal del texto fuente.
  - Se prefirió «ira» y «castigo» por su transparencia semántica y para no sustituir la tensión judicial del pasaje por términos eclesiásticos más tradicionales.
  - La nota al pie marca la dificultad de transición textual sin resolverla de manera interpretativa excesiva.
