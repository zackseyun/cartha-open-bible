base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/055/003.yaml
  text: When I desired to deliver them into the hand of the angels on the day of tribulation and pain[a], I will cause my punishment and my wrath to abide upon them, says God[d][c][b], the Lord of spirits.
  footnotes:
  - marker: a
    text: The Ge'ez wording is difficult at the transition before 'my punishment and my wrath.' The sense appears to move from being handed over to angels to the settling of divine judgment upon them.
    reason: textual_variant
  - marker: b
    text: Literally, 'into the hand of the angels,' a judicial idiom for being given into another's power.
    reason: cultural_note
  - marker: c
    text: Or 'to give them over into the hand of the angels on the day of tribulation and pain, then'.
    reason: previous_rendering
  - marker: d
    text: Or 'says the Lord, the Lord of spirits'.
    reason: previous_rendering
