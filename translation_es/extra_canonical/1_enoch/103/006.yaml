translation:
  language: es
  text: Y ahora murieron en prosperidad[a] y en riqueza, y no vieron aflicción ni matanza en su vida; y murieron con honra[b], y el juicio no se ejecutó contra ellos en su vida[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas buenas» / «bienestar». El ge'ez ሠናይ puede designar lo bueno o favorable en sentido amplio; en esta colocación con «riqueza», apunta a circunstancias prósperas más que a bondad moral.
    reason: lexical_alternative
  - marker: b
    text: O «gloria» / «esplendor». El ge'ez ስብሐት denota aquí estima social o condición honorable al morir, no gloria divina; «honra» evita la ambigüedad teológica que «gloria» introduciría en español.
    reason: lexical_alternative
  - marker: c
    text: 'La expresión «en su vida» (ge''ez: በሕይወቶሙ), repetida al final del versículo, limita la afirmación a la experiencia terrena: el juicio no se ejecutó contra ellos durante su vida, lo cual no excluye el juicio final. Una versión anterior del texto —basada en un error de OCR (አርአዩ, ''vieron'', en lugar de ኢርእዩ, ''no vieron'')— producía la lectura errónea «en aflicción y vieron matanza»; la revisión de nivel 3 restauró la negación correcta del original etíope.'
    reason: theological_note
lexical_decisions:
- source_word: ሠናይ
  english_pob_choice: prosperity
  chosen_spanish: prosperidad
  alternatives_spanish:
  - cosas buenas
  - bienestar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En colocación con ብዕል («riqueza»), el término ge'ez apunta a circunstancias favorables o bienestar material más que a bondad moral abstracta. «Prosperidad» es la opción más natural en español moderno para esta combinación; «bienestar» sería igualmente válida pero menos específica del éxito material que el contexto requiere.
- source_word: ብዕል
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - abundancia
  - riquezas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Riqueza» transmite plenitud material acumulada sin exageración; «abundancia» sería válida pero menos precisa para bienes materiales específicos. La colocación prosperidad-riqueza refleja el par ge'ez ሠናይ-ብዕል con claridad.
- source_word: ምንዳቤ
  english_pob_choice: distress
  chosen_spanish: aflicción
  alternatives_spanish:
  - angustia
  - tribulación
  - penuria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Aflicción» cubre el campo semántico de sufrimiento o penuria que los impíos no experimentaron. «Angustia» acentuaría el componente emocional por encima del material; «tribulación» posee resonancias escatológicas más especializadas en el español eclesiástico que podrían proyectar al versículo un matiz que la fuente no exige.
- source_word: ቀትለ
  english_pob_choice: slaughter
  chosen_spanish: matanza
  alternatives_spanish:
  - muerte violenta
  - asesinato
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Matanza» preserva la violencia del sustantivo ge'ez y el tono apocalíptico-judicial del capítulo, siguiendo la decisión del POB inglés de mantener la fuerza del término. «Muerte violenta» sería descriptivo pero más diluido; «asesinato» apunta a intencionalidad individual que la fuente no requiere.
- source_word: ስብሐት
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - gloria
  - esplendor
  - honor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El POB inglés eligió «honor» para distinguir la estima social al morir de la gloria divina; «honra» es el equivalente español más preciso para reputación o condición honorable en la muerte. «Gloria» introduciría ambigüedad teológica en español, confundiéndose con gloria celestial. «Honor» (anglicismo) es comprensible pero menos natural que «honra» en prosa española dignificada.
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - castigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '«Juicio» preserva la amplitud forense: no solo una sentencia ya ejecutada, sino el proceso judicial divino en su conjunto. «Castigo» reduciría el sentido al aspecto punitivo; «sentencia» lo limitaría al declaratorio. La tensión teológica entre el juicio terrenal ausente y el juicio final pendiente requiere este término más amplio.'
- source_word: ኢትገብረ ሎሙ
  english_pob_choice: was not executed against them
  chosen_spanish: no se ejecutó contra ellos
  alternatives_spanish:
  - no se hizo contra ellos
  - no recayó sobre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción pasivo-refleja española «no se ejecutó contra ellos» transmite que el juicio no fue llevado a cabo sobre ellos —no meramente que estuvo ausente como entidad abstracta—, siguiendo el razonamiento del POB inglés. «No recayó sobre ellos» sería igualmente idiomático pero menos preciso para la acción judicial.
theological_decisions:
- issue: ¿Implica el versículo que los impíos escaparon todo juicio, o únicamente el juicio durante su vida terrena?
  english_pob_reading: The text denies judgment in their lifetime, not ultimate judgment.
  chosen_spanish_reading: El texto niega el juicio durante su vida terrena; no niega el juicio final.
  alternative_spanish_readings:
  - No vino juicio alguno contra ellos (nunca, de ningún tipo)
  - El versículo solo expresa queja por la injusticia aparente sin implicación escatológica
  rationale: 'La expresión «en su vida» (ge''ez: በሕይወቶሙ) aparece dos veces en el versículo —al cerrar la primera cláusula y al cerrar la segunda—, circunscribiendo explícitamente la afirmación a la experiencia terrena. La traducción española mantiene esta doble repetición («en su vida» ... «en su vida») para preservar la tensión entre prosperidad aparente de los impíos y el juicio escatológico que el capítulo contrasta con la suerte de los justos.'
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: 'Lectura corregida del texto etíope: ኢርእዩ (''no vieron'') frente a la lectura errónea anterior አርአዩ (''vieron'')'
  english_pob_reading: They did not see distress and slaughter in their lifetime (tier-3 revision correcting OCR error አርአዩ → ኢርእዩ).
  chosen_spanish_reading: No vieron aflicción ni matanza en su vida.
  alternative_spanish_readings:
  - En aflicción y vieron matanza (lectura anterior basada en error de OCR; descartada)
  rationale: 'La revisión de nivel 3 identificó un error de OCR en la fuente: አርአዩ (''vieron'') era una lectura incorrecta de ኢርእዩ (''no vieron''). Además, ምንዳቤ y ቀትለ funcionan como objetos directos sin la preposición «ba-» que introducía los sustantivos anteriores, confirmando la sintaxis de la oración negativa. La negación es contextualmente necesaria: el argumento del versículo es que los impíos escaparon el sufrimiento terreno. La traducción española sigue íntegramente la lectura corregida.'
  doctrine_reference: 'Source text integrity: OCR-corrected Ge''ez reading; tier-3 adjudicated revision 2026-04-22'
translation_notes:
  revision_awareness: 'La revisión de nivel 3 (adjudicador: gemini_3_1_pro_tier3_adjudicator, 2026-04-22) corrigió un error crítico de OCR en el texto etíope: አርአዩ (''vieron'') por ኢርእዩ (''no vieron''). Esta corrección invierte el sentido de la cláusula central y es el fundamento de la traducción española «no vieron aflicción ni matanza». La versión anterior («en aflicción y vieron matanza», marcada como previous_rendering en el POB inglés) no constituye una alternativa válida: deriva de una lectura errónea del texto fuente confirmada por el análisis sintáctico (ምንዳቤ y ቀትለ son objetos directos sin preposición ''ba-'', lo que requiere la estructura negativa). Dicha lectura errónea queda documentada únicamente en la nota [c] como advertencia textual, no como variante legítima.'
  spanish_consistency_notes:
  - El versículo no contiene el nombre divino (יהוה/YHWH) ni terminología cristológica; las pautas del proyecto para Yahvé, Mesías, Jesús, etc. no son aplicables aquí.
  - «Juicio» para ኵነኔ sigue la pauta general del proyecto para términos forenses de amplio espectro; se prefiere sobre «sentencia» o «castigo» para preservar la dimensión procesal.
  - «Honra» se prefiere sobre «gloria» para ስብሐት a fin de evitar la confusión con terminología de gloria divina; la decisión está documentada en la nota léxica [b] y en las decisiones léxicas.
  - La doble aparición de «en su vida» reproduce intencionalmente la repetición ge'ez de በሕይወቶሙ, que es teológicamente significativa según la decisión del POB inglés y la revisión de nivel 3.
  - «Aflicción ni matanza» (con 'ni' coordinante negativo) es más idiomático en español que «aflicción y matanza» en el contexto de la negación «no vieron»; preserva el mismo alcance semántico del original.
