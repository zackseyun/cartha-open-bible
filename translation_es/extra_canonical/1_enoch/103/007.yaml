translation:
  language: es
  text: Sepan que ellos harán descender sus almas[a] a Sheol[b], y su retribución[c] será mala y grande[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus espíritus». El término ge'ez puede denotar almas o espíritus.
    reason: lexical_alternative
  - marker: b
    text: Sheol es el ámbito de los muertos en la tradición judía; el texto conserva ese término en vez de reducirlo a «sepulcro».
    reason: cultural_note
  - marker: c
    text: O «su pago» o «su recompensa».
    reason: lexical_alternative
  - marker: d
    text: O «muy grande».
    reason: alternative_reading
lexical_decisions:
- source_word: ታእምርዎሙ
  english_pob_choice: Know that
  chosen_spanish: Reconozcan que
  alternatives_spanish:
  - Sepan que
  - Tomen nota de que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de saber/percibir en imperativo plural funciona como advertencia solemne. «Reconozcan que» conserva el matiz de discernir la realidad anunciada sin reducirlo a mera información.
- source_word: ለሲኦል
  english_pob_choice: to Sheol
  chosen_spanish: a Sheol
  alternatives_spanish:
  - al sepulcro
  - al inframundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el término técnico «Sheol» para preservar el registro judío apocalíptico y la tensión conceptual del texto fuente.
- source_word: ያወርዶዎሙ
  english_pob_choice: they will bring ... down
  chosen_spanish: harán descender
  alternatives_spanish:
  - llevarán hacia abajo
  - derribarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa movimiento hacia abajo con sujeto plural implícito. «Harán descender» conserva la fuerza causativa y la pluralidad del sujeto.
- source_word: ለመናፍስቲክሙ
  english_pob_choice: your souls
  chosen_spanish: sus almas
  alternatives_spanish:
  - sus espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el término ge'ez puede referirse a almas o espíritus, en este contexto de descenso postmortem «almas» resulta más natural en español y mantiene la referencia a la persona tras la muerte.
- source_word: እኩያተ
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - malo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo/substantivo se vierte de manera breve como «mal» para conservar el tono sentencioso y la parquedad del juicio.
- source_word: ምንዳቤሆሙ
  english_pob_choice: their recompense
  chosen_spanish: su retribución
  alternatives_spanish:
  - su pago
  - su recompensa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente del análisis inglés señala que el sustantivo denota tribulación/aflicción en esta lectura contextual, pero la forma nominal sigue siendo apta para expresar la idea de retribución en español. «Retribución» conserva el carácter formal del retribuir sin fijar de antemano una paráfrasis demasiado interpretativa.
- source_word: ዐቢየ
  english_pob_choice: great indeed
  chosen_spanish: grande
  alternatives_spanish:
  - muy grande
  - en gran manera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el valor de intensidad con «grande», integrado naturalmente en español junto a la retribución.
theological_decisions:
- issue: Mantener Sheol como término propio en vez de verterlo por una noción más general
  english_pob_reading: Sheol is the realm of the dead in Jewish tradition; the text preserves that term rather than reducing it to 'grave'.
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - la tumba
  - el sepulcro
  - el inframundo
  rationale: La traducción conserva el término del mundo conceptual del texto y evita aplanarlo a un equivalente moderno más estrecho.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension and imagery'
- issue: Cómo reflejar la relación entre mal/retribución y grandeza al final del verso
  english_pob_reading: and their recompense will be evil and great
  chosen_spanish_reading: y su retribución será mal y grande
  alternative_spanish_readings:
  - y su castigo será grande
  - y su paga será mala y grande
  rationale: El español debe sostener la tensión entre la forma nominal y el predicado calificativo sin cerrar prematuramente el sentido. «Retribución» mantiene la relación formal del sustantivo; «mal y grande» deja la valoración negativa y la intensificación final.
  doctrine_reference: 'Translation philosophy: preserve lexical/theological tension and avoid over-paraphrase'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del paquete fuente: se corrigió el sujeto plural implícito de ያወርዶዎሙ y se evitó seguir la lectura inglesa anterior que interpretaba ምንዳቤ como «recompense» de forma fija. El español conserva la estructura breve del texto, pero ajusta el verbo principal al plural y mantiene la posibilidad semántica de una retribución negativa sin imponer una expansión interpretativa.'
  spanish_consistency_notes:
  - Se preserva «Sheol» como término técnico, conforme al criterio del proyecto.
  - Se evita «SEÑOR» o equivalentes de máscara; no hay nombre divino en este verso.
  - Se usa «almas» para መናፍስት, dejando constancia de la alternativa «espíritus» en nota.
  - La frase final intenta mantener la concisión sentenciosa del original y la tensión entre sustantivo y adjetivo.
