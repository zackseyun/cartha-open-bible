review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura principal del verso: imperativo de saber, descenso a Sheol, y cierre sobre una retribución mala y grande. También mantiene correctamente el sujeto plural en «harán descender» y preserva «Sheol». Sin embargo, no reproduce fielmente la redacción inglesa auditada en dos puntos clave: 1) «Reconozcan que» introduce un matiz de discernimiento menos natural que el sentido más simple y exhortativo de «Know that»; 2) «su retribución será mal y grande» es gramaticalmente defectuoso en español, porque «mal» no funciona aquí como predicativo natural de «retribución». Debe decir «mala y grande» o reformularse. Además, el anclaje de la nota [a] sobre «espíritus» aparece también en «mal», donde no corresponde.'
  spanish_quality_summary: 'La frase necesita una reparación pequeña pero importante para sonar como español natural y digno. «Sepan que» es más claro y solemne que «Reconozcan que» en este contexto. «Harán descender sus almas a Sheol» es aceptable, aunque «harán bajar» también sería posible; la elección actual conserva bien la fuerza causativa. El mayor problema de legibilidad es «su retribución será mal y grande», que suena antinatural y incorrecto. «Su retribución será mala y grande» resuelve el problema sin alejarse del audit trail. También hay un error formal de notas: el marcador [a] se reutiliza para dos notas distintas, lo cual contradice las instrucciones.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: se conserva «Sheol» como término técnico y «almas» con nota alternativa «espíritus». No hay conflicto con los glosarios mayores. La excepción necesaria es puramente gramatical: እኩያተ / English POB «evil» no puede verterse aquí como «mal» predicativo de «retribución»; en español debe ser «mala» para preservar el sentido.'
  issues:
