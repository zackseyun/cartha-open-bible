    rationale: En español, «mal» no funciona naturalmente como atributo de «retribución» en esta estructura. La forma fiel y legible es «mala y grande».
  - severity: high
    issue: Reutilización incorrecta del marcador [a] para dos notas distintas
    rationale: Las instrucciones exigen marcadores únicos y no reutilizados dentro del mismo registro. Aquí [a] se usa tanto para «almas» como para «mal», pero solo una nota [a] existe.
  - severity: medium
    issue: «Reconozcan que» no refleja de la mejor manera el inglés auditado «Know that»
    rationale: Aunque posible, «Reconozcan» añade un matiz de reconocimiento/discernimiento menos natural que la exhortación simple «Sepan que», especialmente en español bíblico claro.
