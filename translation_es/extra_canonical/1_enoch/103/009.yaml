translation:
  language: es
  text: 'No digan[a], justos y buenos que están en vida: «En los días de nuestra angustia trabajamos, y vimos toda aflicción, y encontramos muchos males, y fuimos disminuidos y quedamos pocos, y nuestro espíritu se hizo pequeño[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma ge'ez subyacente es difícil; el sentido general es una prohibición dirigida a los justos y buenos. El español sigue la lectura vocativa confirmada por el audit trail.
    reason: textual_variant
  - marker: b
    text: 'Literalmente: «nuestro espíritu se hizo pequeño»; conserva la imagen de encogimiento interior, que puede sugerir desaliento o debilitamiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢትበልዎሙ
  english_pob_choice: Do not say, you righteous and good who are in life
  chosen_spanish: No digan, ustedes, los justos y buenos que están en vida
  alternatives_spanish:
  - No digan de ellos, ustedes, los justos y buenos que están en vida
  - No digan a ellos, ustedes, los justos y buenos que están en vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail inglés corrigió la sintaxis para leer un vocativo; en español lo mantengo como exhortación directa con «ustedes» para reflejar el plural y evitar el extraño «de ellos» o «a ellos» que no encaja con la cita en primera persona.
- source_word: ለጻድቃን
  english_pob_choice: you righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justificados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Justos» preserva el vocabulario moral de Enoc y es el equivalente más natural en español. «Rectos» es posible, pero menos estable en este contexto.
- source_word: ወኄራን
  english_pob_choice: and the good
  chosen_spanish: y buenos
  alternatives_spanish:
  - y bondadosos
  - y piadosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Buenos» conserva el paralelo amplio del término y evita estrecharlo a una sola virtud específica.
- source_word: እለ ሀለዉ ውስተ ሕይወት
  english_pob_choice: who are in life
  chosen_spanish: que están en vida
  alternatives_spanish:
  - que están vivos
  - que viven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En vida» refleja de cerca el giro ge'ez y mantiene el matiz sobrio del original; «están vivos» sería más idiomático, pero menos cercano al texto.
- source_word: በመዋዕለ
  english_pob_choice: in the days of
  chosen_spanish: En los días de
  alternatives_spanish:
  - Durante los días de
  - En el tiempo de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresión temporal estándar y solemne, adecuada al tono apocalíptico.
- source_word: ሥራሕነ
  english_pob_choice: our trouble
  chosen_spanish: nuestra angustia
  alternatives_spanish:
  - nuestro trabajo
  - nuestra aflicción
  - nuestra tribulación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La tradición auditada muestra dificultad textual; en español, «angustia» comunica bien la carga de sufrimiento sin fijar en exceso una de las lecturas posibles entre labor, aflicción o penuria.
- source_word: ዳማ ጻመውነ
  english_pob_choice: we labored
  chosen_spanish: trabajamos
  alternatives_spanish:
  - nos fatigamos
  - nos afanamos
  - trabajamos duramente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Trabajamos» conserva el valor básico y evita una sobreinterpretación; la intensificación se deja sugerida por el contexto de lamento.
- source_word: ወኵሎ ሥራኀ ርኢነ
  english_pob_choice: and we saw every affliction
  chosen_spanish: y vimos toda aflicción
  alternatives_spanish:
  - y vimos todo trabajo
  - y vimos todo sufrimiento
  - y vimos toda tribulación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la fuerza de «ver» como experimentar y conserva el carácter totalizante de «toda».
- source_word: እኩያተ ብዙኃተ ረከብነ
  english_pob_choice: and we encountered many evils
  chosen_spanish: y encontramos muchos males
  alternatives_spanish:
  - y hallamos muchas desgracias
  - y encontramos muchas cosas malas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Males» es el equivalente natural y fuerte en español; preserva el juicio negativo del texto sin suavizarlo.
- source_word: ወውኅድነ
  english_pob_choice: and made few
  chosen_spanish: y fuimos disminuidos y hechos pocos
  alternatives_spanish:
  - y fuimos reducidos y hechos pocos
  - y fuimos disminuidos
  - y quedamos pocos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la revisión inglesa que conserva la reducción cuantitativa; «hechos pocos» reproduce la imagen concreta de merma en número o fuerza.
- source_word: ወንእስት መንፈስነ
  english_pob_choice: and our spirit became small
  chosen_spanish: y nuestro espíritu se hizo pequeño
  alternatives_spanish:
  - y nuestro espíritu se debilitó
  - y nuestro ánimo se hizo pequeño
  - y nuestro espíritu menguó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el giro idiomático de empequeñecimiento interior para no borrar la tensión léxica señalada por el audit trail; «espíritu» conserva la fuerza antropológica del texto.
theological_decisions:
- issue: Vocative versus objeto en el arranque de la prohibición
  english_pob_reading: Do not say, you righteous and good who are in life
  chosen_spanish_reading: No digan, ustedes, los justos y buenos que están en vida
  alternative_spanish_readings:
  - No digan de los justos y buenos que están en vida
  - No digan a los justos y buenos que están en vida
  rationale: 'Sigo la decisión revisada del audit trail: el texto funciona mejor como vocativo dirigido a los justos, no como discurso acerca de ellos. En español, la coma y «ustedes» hacen explícita esa lectura.'
  doctrine_reference: Preservar la coherencia gramatical del testimonio sin suavizar la acusación o queja implícita.
- issue: Sentido de «who are in life»
  english_pob_reading: those presently in life/alive, not yet vindicated in the age to come
  chosen_spanish_reading: los que están en vida, es decir, vivos en el presente
  alternative_spanish_readings:
  - los de la vida futura
  - los que viven espiritualmente
  rationale: El contexto es una queja sobre sufrimiento presente. No se debe espiritualizar la frase ni proyectarla al más allá; la traducción conserva la referencia a la vida presente.
  doctrine_reference: Mantener la tensión escatológica local del pasaje sin resolverla doctrinalmente.
translation_notes:
  revision_awareness: 'La versión inglesa pasó por una corrección importante: de una lectura con objeto («say of the righteous») a una lectura vocativa («say, you righteous»), y también afinó la última línea para conservar mejor el valor de «made few» y del giro idiomático sobre el espíritu. La propuesta española sigue esas revisiones y evita resolver la ambigüedad de modo demasiado interpretativo.'
  spanish_consistency_notes:
  - Se usa «justos» para ለጻድቃን y «buenos» para ወኄራን, manteniendo el paralelismo moral.
  - «Espíritu» se conserva en minúscula porque aquí no se trata explícitamente del Espíritu Santo, sino del interior humano.
  - Se evitó «SEÑOR»/«Cristo» u otra terminología no presente en el verso.
  - La puntuación intenta reflejar la cita directa y el vocativo, con coma antes de la exhortación y dos puntos antes del discurso citado.
