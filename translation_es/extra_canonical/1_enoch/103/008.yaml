translation:
  language: es
  text: Y en la oscuridad, y en una trampa[a], y en un fuego ardiente, sus espíritus entrarán, en el gran juicio[b]; y el gran juicio será para todas las generaciones de la eternidad[c]. ¡Ay de ustedes!, porque no tienen paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «en redes» o «en una red»; el ge'ez conserva una imagen concreta de atrapamiento y puede funcionar de manera metafórica para un juicio ineludible.
    reason: lexical_alternative
  - marker: b
    text: La preposición ge'ez también puede entenderse como «hacia el gran juicio»; aquí se mantiene el valor direccional de la escena.
    reason: alternative_reading
  - marker: c
    text: La expresión es difícil; probablemente subraya el alcance duradero y solemne de este juicio, más que un simple «para siempre».
    reason: cultural_note
lexical_decisions:
- source_word: በጽልመት
  english_pob_choice: into darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - dentro de la oscuridad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «en la oscuridad» comunica bien el ámbito adonde se entra, sin forzar una preposición rígidamente direccional. Conserva el sentido de estado/ámbito de juicio.
- source_word: በመርበብት
  english_pob_choice: into nets / into a net / into a snare
  chosen_spanish: en una red
  alternatives_spanish:
  - en una trampa
  - en unas redes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez evoca la imagen concreta de atrapamiento. «Red» preserva esa imaginería apocalíptica sin explicarla en exceso; «trampa» desplaza más el foco hacia la metáfora interpretativa.
- source_word: በላህብ ዘይነድድ
  english_pob_choice: into a blazing fire
  chosen_spanish: en un fuego ardiente
  alternatives_spanish:
  - en una llama ardiente
  - en un fuego que arde
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Fuego ardiente» mantiene la intensificación del fuego como juicio. En español suena más natural que un calco como «fuego en llamas» y sigue siendo fiel a la imagen.
- source_word: ትበውእ መንፈስክሙ
  english_pob_choice: your spirits shall enter
  chosen_spanish: entrará vuestro espíritu
  alternatives_spanish:
  - entrarán vuestros espíritus
  - entrará vuestra alma
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el antecedente inmediato en la revisión inglesa fluctuó, el sustantivo ge'ez puede leerse en singular y el verbo en singular encaja con esa lectura. «Vuestro espíritu» conserva la tensión antropológica sin imponer una armonización doctrinal.
- source_word: ኵነኔ ዐባይ
  english_pob_choice: the great judgment
  chosen_spanish: el gran juicio
  alternatives_spanish:
  - el gran juicio condenatorio
  - la gran sentencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Juicio» preserva la amplitud jurídica del término sin reducirlo a «condenación». «Gran» mantiene el énfasis solemne del original.
- source_word: ለኵሉ ትውልደ ዓለም
  english_pob_choice: for all the generations of eternity
  chosen_spanish: para todas las generaciones de la eternidad
  alternatives_spanish:
  - para todas las generaciones para siempre
  - para todas las generaciones del siglo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción es difícil y solemne. «De la eternidad» conserva el registro apocalíptico y la amplitud duradera que el inglés auditado también procuró mantener.
- source_word: ኴሌ ለክሙ
  english_pob_choice: Woe to you
  chosen_spanish: ¡Ay de vosotros!
  alternatives_spanish:
  - ¡Ay de ustedes!
  - ¡Pobre de vosotros!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la fórmula profética/apocalíptica estándar. «Vosotros» mantiene el tono de invectiva solemne y evita un registro demasiado coloquial.
- source_word: እስመ አልብክሙ ሰላመ
  english_pob_choice: for you have no peace
  chosen_spanish: porque no tenéis paz
  alternatives_spanish:
  - pues no tenéis paz
  - porque para vosotros no hay paz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa la causa del lamento y la privación de paz. «No tenéis paz» es directo y fiel, sin añadir una explicación interpretativa.
theological_decisions:
- issue: Naturaleza de 'vuestro espíritu' en contexto de juicio
  english_pob_reading: Retain 'your spirits' rather than interpret as a full anthropological statement about the afterlife.
  chosen_spanish_reading: Mantener «vuestro espíritu» como traducción descriptiva, sin resolver la cuestión antropológica.
  alternative_spanish_readings:
  - vuestro(s) espíritu(s)
  - vuestras almas
  - vosotros mismos
  rationale: El texto nombra el espíritu entrando en ámbitos de castigo. La traducción conserva esa formulación y evita aclarar más de lo que el ge'ez permite sobre alma, cuerpo o estado intermedio.
  doctrine_reference: Preservar la tensión teológica; primacía del texto fuente.
- issue: Valor de ኵነኔ en la secuencia apocalíptica
  english_pob_reading: Render as 'judgment' rather than 'condemnation.'
  chosen_spanish_reading: Traducir como «juicio» y no como «condenación».
  alternative_spanish_readings:
  - condenación
  - sentencia
  rationale: «Juicio» preserva el campo forense amplio del término y no estrecha indebidamente el sentido hacia un veredicto ya cerrado en una sola dirección doctrinal.
  doctrine_reference: Primacía del original; mantener la amplitud judicial del término.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del inglés POB: la oscilación entre singular y plural en «spirit/spirits» y entre «for/to the great judgment». La versión española opta por una formulación singular de «espíritu» por la concordancia inmediata del texto fuente ge''ez, y por «para el gran juicio» en el cuerpo principal, con nota que reconoce la lectura direccional alternativa. También se retiene la imaginería de atrapamiento sin imponer una interpretación alegórica cerrada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda a tetragramas; aquí no aparece.
  - Se mantiene «juicio» para ኵነኔ según el criterio del proyecto.
  - Se conserva un registro solemne y apocalíptico, evitando modernizaciones coloquiales.
  - La puntuación reproduce el paralelismo y el giro final de denuncia con «¡Ay de vosotros!».
