review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la secuencia apocalíptica de oscuridad/red/fuego y mantiene correctamente «juicio» en vez de «condenación». Sin embargo, no sigue de forma fiel el estado auditado final del English POB ni la mejor lectura aquí para ትበውእ መንፈስክሙ, que en el expediente terminó como plural semántico «your spirits shall enter». También «para el gran juicio» debilita la fuerza direccional que el expediente documenta; en español conviene «en el gran juicio» o «hacia el gran juicio», y con «entrar» la construcción más natural es integrar la frase sin crear ambigüedad.
  spanish_quality_summary: El español es generalmente claro y digno, pero mezcla un registro latinoamericano-neutral con «vosotros / tenéis», que no encaja con el estilo objetivo pedido. Además, «entrará vuestro espíritu» suena más rígido y menos natural que «entrarán sus espíritus» o «vuestros espíritus entrarán». La cadena con comas después de cada sintagma preposicional resulta algo pesada; puede alisarse sin perder literalidad.
  glossary_alignment: Sin términos del glosario mayor en conflicto. «Juicio» está bien alineado con la decisión teológica. La principal desalineación es con la decisión auditada final sobre «your spirits» y con el registro objetivo de español neutral, donde conviene evitar «vosotros/tenéis».
  issues:
  - severity: high
    issue: Número de «espíritu/espíritus»
    rationale: El expediente auditado final revierte a «your spirits shall enter». El borrador español mantiene singular («vuestro espíritu»), lo que ya no refleja el estado final de la auditoría ni la mejor preservación del texto recibido por el proyecto.
  - severity: medium
    issue: «para el gran juicio» no representa bien la fuerza direccional documentada
    rationale: La nota inglesa y las revisiones distinguen que la preposición tiene valor direccional. «Para» en español puede sonar final/purposivo. Es mejor una formulación que preserve movimiento o relación locativa inmediata con el juicio.
  - severity: medium
    issue: Registro pronominal no neutral
    rationale: «Vosotros / tenéis» es comprensible, pero no corresponde al objetivo de español neutral latinoamericano/ampliamente eclesial. «Ustedes / tienen» o una reestructuración impersonal es más adecuada.
  - severity: low
    issue: «en una red» es fiel pero menos natural que «en una trampa» en esta secuencia
    rationale: La imagen concreta de atrapamiento debe conservarse. «Red» puede mantenerse con nota, pero en español bíblico moderno «trampa» suena más idiomático en un contexto de juicio, mientras la nota puede preservar «red(es)» como alternativa.
  revised_spanish_text: Y en la oscuridad, y en una trampa[a], y en un fuego ardiente, sus espíritus entrarán, en el gran juicio[b]; y el gran juicio será para todas las generaciones de la eternidad[c]. ¡Ay de ustedes!, porque no tienen paz.
  revised_footnotes:
  - marker: a
    text: También puede entenderse «en redes» o «en una red»; el ge'ez conserva una imagen concreta de atrapamiento y puede funcionar de manera metafórica para un juicio ineludible.
    reason: lexical_alternative
  - marker: b
    text: La preposición ge'ez también puede entenderse como «hacia el gran juicio»; aquí se mantiene el valor direccional de la escena.
    reason: alternative_reading
  - marker: c
    text: La expresión es difícil; probablemente subraya el alcance duradero y solemne de este juicio, más que un simple «para siempre».
    reason: cultural_note
  revision_rationale: Se revisa para alinearse con el estado auditado final del English POB («your spirits»), preservar mejor la fuerza direccional de la frase sobre el gran juicio, y ajustar el registro a un español neutral más consistente. También se mejora la naturalidad de «red/trampa» manteniendo la alternativa en nota.
