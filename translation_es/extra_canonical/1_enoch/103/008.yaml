revisions:
- from: Y en la oscuridad, y en una red[a], y en un fuego ardiente, entrará vuestro espíritu, para el gran juicio[b]; y el gran juicio será para todas las generaciones de la eternidad[c]. ¡Ay de vosotros! porque no tenéis paz.
  to: Y en la oscuridad, y en una trampa[a], y en un fuego ardiente, sus espíritus entrarán, en el gran juicio[b]; y el gran juicio será para todas las generaciones de la eternidad[c]. ¡Ay de ustedes!, porque no tienen paz.
  rationale: Se revisa para alinearse con el estado auditado final del English POB («your spirits»), preservar mejor la fuerza direccional de la frase sobre el gran juicio, y ajustar el registro a un español neutral más consistente. También se mejora la naturalidad de «red/trampa» manteniendo la alternativa en nota.
