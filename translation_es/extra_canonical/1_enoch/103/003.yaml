    text: 'O: «registrados». La expresión puede evocar un registro celestial del galardón reservado para los muertos justos.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «el fruto de su trabajo». La imagen conserva la idea de que el esfuerzo da una cosecha futura.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «su porción excederá la porción de los vivos».'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de las notas para que cada una comente la frase correspondiente según el rastro de auditoría del POB inglés. También se ajusta la nota [a] para ofrecer una alternativa léxica real («registrados») y se suaviza levemente la sintaxis inicial en español sin cambiar el sentido fuente.
