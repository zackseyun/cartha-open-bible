translation:
  language: es
  text: Porque todo bien, gozo y gloria han sido preparados y escritos[a] para los espíritus de los que murieron en justicia; y mucho bien se les dará a ustedes, el fruto de su trabajo[b], y su porción abundará más allá de la porción de los vivos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «registrados». La expresión puede evocar un registro celestial del galardón reservado para los muertos justos.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «el fruto de su trabajo». La imagen conserva la idea de que el esfuerzo da una cosecha futura.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «su porción excederá la porción de los vivos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, la conexión causal o explicativa queda mejor con «Porque» al inicio de la frase; preserva la fuerza justificativa del original sin volverla más especulativa.
- source_word: ኵሉ ሠናይ
  english_pob_choice: every good thing
  chosen_spanish: todo bien
  alternatives_spanish:
  - cada cosa buena
  - toda bendición
  - todo lo bueno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Todo bien» conserva el alcance total y el sustantivo abstracto concreto del original sin introducir «bendición», que sería más interpretativo.
- source_word: ፍሥሓ
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - gozo
  - regocijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gozo» funciona bien en registro bíblico y mantiene el paralelo con «bien» y «gloria»; en español es plenamente natural y reverente.
- source_word: ክብር
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honra
  - esplendor
  - gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gloria» es la equivalencia directa y conserva el peso escatológico del término en contextos de recompensa.
- source_word: ተደለወ
  english_pob_choice: has been prepared
  chosen_spanish: han sido preparados
  alternatives_spanish:
  - han sido dispuestos
  - han sido preparados
  - han sido hechos ready
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo perfecto plural en español concuerda con la serie «todo bien, gozo y gloria» y mantiene la idea de preparación previa.
- source_word: ተጽሕፈ
  english_pob_choice: written down
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - escritos
  - anotados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez sugiere una inscripción o registro; en español, «escritos» conserva la imagen sin sobrecargarla con una explicación explícita de libros celestiales.
- source_word: ለመንፈሳቲሆሙ
  english_pob_choice: for the spirits of them
  chosen_spanish: para los espíritus de
  alternatives_spanish:
  - para sus espíritus
  - para las almas de
  - para los espíritus de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene «espíritus» para no desplazar el matiz antropológico hacia «almas», que podría introducir una carga teológica posterior no exigida por el texto.
- source_word: ለእለ ሞቱ በጽድቅ
  english_pob_choice: of those who died in righteousness
  chosen_spanish: de los que murieron en justicia
  alternatives_spanish:
  - de los que murieron en rectitud
  - de los que murieron en justicia
  - de los que murieron justamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En justicia» conserva el sustantivo moral del original y mantiene el vínculo con el lenguaje bíblico de justicia/rectitud sin convertirlo en un adverbio.
- source_word: ይትወሀብ ለክሙ
  english_pob_choice: will be given to you
  chosen_spanish: se les dará a ustedes
  alternatives_spanish:
  - les será dado
  - se les concederá
  - se les dará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El destinatario plural se ajusta mejor al «ustedes» del discurso; el dativo clítico hace natural la frase en español sin perder el futuro pasivo.
- source_word: ተክለ ጻማክሙ
  english_pob_choice: the fruit of your labor
  chosen_spanish: el fruto de su trabajo
  alternatives_spanish:
  - el fruto de su labor
  - el producto de su trabajo
  - la cosecha de su trabajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Fruto de su trabajo» preserva la metáfora agrícola y su sentido de resultado producido por el esfuerzo; «trabajo» suena más natural que «labor» para español general.
- source_word: ክፍልክሙ
  english_pob_choice: your portion
  chosen_spanish: su porción
  alternatives_spanish:
  - su parte
  - su porción
  - su lote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Porción» mantiene el tono bíblico y el sentido de asignación o herencia; el posesivo plural se adapta al trato reverente de «ustedes».
- source_word: ፈድፋደ እምክፍለ ሕያዋን
  english_pob_choice: will abound beyond the portion of the living
  chosen_spanish: abundará más allá de la porción de los vivos
  alternatives_spanish:
  - excederá la parte de los vivos
  - abundará más allá de la porción de los vivos
  - será mayor que la porción de los vivos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Abundará más allá» conserva tanto la idea de excedencia como la de plenitud, sin perder el contraste con la porción de los vivos.
theological_decisions:
- issue: Naturaleza del registro escrito
  english_pob_reading: written down; the wording may evoke a heavenly written register, but the translation keeps the image explicit without expanding it
  chosen_spanish_reading: escritos
  alternative_spanish_readings:
  - registrados en el cielo
  - inscritos en los libros celestiales
  - anotados
  rationale: El ge'ez permite la alusión a un registro celestial, pero no obliga a mencionarlo de forma explícita. «Escritos» preserva la tensión entre texto y posible registro sin añadir una explicación no presente.
  doctrine_reference: Mantener primacía del texto fuente y no paraphrase beyond what the witness warrants.
- issue: Anthropological term for the dead
  english_pob_reading: spirits
  chosen_spanish_reading: espíritus
  alternative_spanish_readings:
  - almas
  - espíritus
  - seres
  rationale: «Espíritus» evita imponer la semántica de «almas» y conserva la referencia a los difuntos como seres desincorporados, tal como sugiere el original.
  doctrine_reference: Preservar la tensión antropológica sin resolverla mediante terminología posterior.
- issue: «In righteousness» as moral sphere
  english_pob_reading: of those who died in righteousness
  chosen_spanish_reading: de los que murieron en justicia
  alternative_spanish_readings:
  - de los que murieron rectamente
  - de los que murieron en rectitud
  - de los que murieron en justicia
  rationale: La construcción con «en justicia» conserva el sustantivo y la esfera moral/covenantal del término, en lugar de reducirlo a una mera descripción adverbial.
  doctrine_reference: Conservar el campo semántico de justicia/rectitud según el contexto.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión final del auditorio inglés: se mantiene la coordinación plural («han sido preparados») para concordar con la serie de sustantivos, y se conserva la apposición del «fruto de su trabajo» con puntuación clara. También se evitó expandir el texto hacia una explicación explícita de libros celestiales, porque el ge''ez solo afirma que fue escrito.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta serie solo cuando el texto fuente lo exige; aquí no aparece el nombre divino.
  - Se mantiene «justicia»/«rectitud» como campo semántico bíblico sin sustituirlo por fórmulas eclesiales más tradicionales.
  - «Espíritus» se conserva para el antropologismo del pasaje, evitando «almas» salvo evidencia contextual específica.
  - 'La puntuación busca reflejar el paralelismo de la lista: bien, gozo, gloria; luego preparación/escritura; después recompensa y excedencia.'
