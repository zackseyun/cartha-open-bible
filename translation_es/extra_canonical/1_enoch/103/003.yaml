review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en líneas generales el sentido del ge''ez y del POB inglés: bienes preparados y escritos para los espíritus de los justos muertos, promesa de mucho bien, metáfora del fruto del trabajo y porción que excede la de los vivos. Sin embargo, hay un problema de alineación en la ubicación de la nota [c]: en inglés [c] explica la alternativa para la última cláusula sobre la porción, pero en el español se ancló erróneamente en «el fruto de su trabajo». Además, «escritos» como traducción principal de ተጽሕፈ es aceptable, pero la nota actual ofrece «escritos» como alternativa de «escritos», lo que no preserva bien la distinción inglesa entre texto principal y alternativa.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor de naturalidad y consistencia. La frase inicial suena más natural con «todo bien, gozo y gloria han sido preparados y escritos» sin repetir «para» antes de «los espíritus». «En justicia» es defendible, aunque «en rectitud» podría sonar más idiomático; no es necesario cambiarlo. Lo principal es corregir el anclaje de las notas y mejorar la nota [a] para que realmente ofrezca una alternativa léxica.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: «espíritus» preserva la decisión antropológica frente a «almas»; «justicia» mantiene el campo semántico de righteousness; «porción» conserva el registro bíblico; «fruto de su trabajo» mantiene la metáfora. No hay conflictos con términos troncales del glosario.'
  issues:
  - severity: high
    issue: La nota [c] está anclada en el lugar equivocado.
    rationale: 'La nota [c] dice «O: “su porción excederá la porción de los vivos”», por lo que debe ir junto a la cláusula final sobre «su porción», no junto a «el fruto de su trabajo». Tal como está, induce a error sobre qué frase comenta.'
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real al texto principal.
    rationale: 'El texto principal ya usa «escritos», pero la nota [a] empieza «O: “escritos”». El POB inglés marca como alternativa «recorded». En español conviene una alternativa como «registrados» para reflejar la distinción léxica.'
  - severity: low
    issue: Redacción inicial ligeramente pesada por la repetición de «para».
    rationale: «Porque para todo bien, gozo y gloria han sido preparados y escritos para los espíritus...» es comprensible, pero «Porque todo bien, gozo y gloria han sido preparados y escritos para los espíritus...» fluye mejor y mantiene el sentido.
  revised_spanish_text: Porque todo bien, gozo y gloria han sido preparados y escritos[a] para los espíritus de los que murieron en justicia; y mucho bien se les dará a ustedes, el fruto de su trabajo[b], y su porción abundará más allá de la porción de los vivos[c].
  revised_footnotes:
