translation:
  language: es
  text: Esperábamos llegar a ser la cabeza[a], y llegamos a ser la cola; trabajamos, pero no obtuvimos dominio sobre nuestro trabajo[c]; y llegamos a ser alimento para pecadores y para los inicuos[b], y ellos hicieron pesar su yugo sobre nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'teníamos la esperanza de ser la cabeza'. El ge'ez expresa expectativa o aspiración; la formulación exacta puede leerse con matiz de esperanza o de deseo.
    reason: lexical_alternative
  - marker: b
    text: '''Alimento'' es una metáfora concreta; el sentido es que llegaron a ser presa de pecadores y de los inicuos.'
    reason: lexical_alternative
  - marker: c
    text: O 'pero no obtuvimos dominio sobre el fruto de nuestro trabajo'. El pasaje etiópico es difícil, pero la revisión vigente entiende este segmento en relación con la labor y su fruto, no como 'riqueza' ni como 'no se realizó para nosotros'.
    reason: textual_variant
lexical_decisions:
- source_word: ንሴፎ
  english_pob_choice: we hoped
  chosen_spanish: esperábamos
  alternatives_spanish:
  - teníamos la esperanza de
  - esperábamos llegar a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma expresa expectativa o aspiración comunitaria. En español, 'esperábamos' mantiene el tono de lamento sin sonar demasiado abstracto.
- source_word: ንኩን ርእሰ
  english_pob_choice: to become the head
  chosen_spanish: llegar a ser la cabeza
  alternatives_spanish:
  - ser la cabeza
  - llegar a ser jefe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta de 'cabeza' como contraparte de 'cola', en vez de generalizarla a liderazgo. 'Llegar a ser' refleja el movimiento de aspiración frustrada.
- source_word: ወኮነ ዘነበ
  english_pob_choice: and we became the tail
  chosen_spanish: y llegamos a ser la cola
  alternatives_spanish:
  - y fuimos la cola
  - y llegamos a ser lo de atrás
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el paralelismo proverbial y la imagen corporal antitética. 'Cola' es la correspondencia natural de 'cabeza' en español.
- source_word: ጻመውነ
  english_pob_choice: we toiled
  chosen_spanish: trabajamos
  alternatives_spanish:
  - fatigamos
  - nos afanamos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez indica esfuerzo duro, pero en español 'trabajamos' resulta más natural y readable. La dureza del contexto ya está reforzada por el resto de la queja.
- source_word: ወኢሠለጥነ ዲበ ዳማነ
  english_pob_choice: and we did not gain mastery over our labor
  chosen_spanish: pero no obtuvimos dominio sobre nuestro trabajo
  alternatives_spanish:
  - y no tuvimos poder sobre nuestro trabajo
  - pero no dominamos el fruto de nuestro trabajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa señala que el sentido es de labor/resultado del trabajo, no de 'riqueza'. 'Dominio' conserva la fuerza de ሠለጠ como poder o señorío, y 'nuestro trabajo' mantiene la referencia laboral sin añadir metáforas no aseguradas.
- source_word: መብልዕተ
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - presa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la metáfora concreta sin interpretarla como 'presa' en el texto principal. 'Alimento' suena dignificado y conserva la imagen de ser devorados o consumidos.
- source_word: ለኃጥኣን ወለዓማፅያን
  english_pob_choice: for sinners and for the lawless
  chosen_spanish: para pecadores y para los inicuos
  alternatives_spanish:
  - para pecadores y para los malvados
  - para pecadores y para los sin ley
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Inicuos'' preserva mejor el matiz moral fuerte de ''lawless'' que un genérico ''malvados''. Se conserva la doble designación de opresores corruptos.'
- source_word: አክበዱ ላዕሌነ አርዑተ ዚአሆሙ
  english_pob_choice: they laid their yoke heavily upon us
  chosen_spanish: cargaron pesadamente su yugo sobre nosotros
  alternatives_spanish:
  - pusieron su yugo pesadamente sobre nosotros
  - nos impusieron su yugo con dureza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva 'yugo' como metáfora de opresión y se traduce la intensificación verbal con 'pesadamente'. La preposición 'sobre nosotros' mantiene la imagen de imposición.
theological_decisions:
- issue: Preservar la reversión concreta 'cabeza/cola' o interpretarla socialmente
  english_pob_reading: 'Preserve the concrete idiom: ''the head ... the tail'''
  chosen_spanish_reading: 'Preservar la imagen concreta: ''la cabeza ... la cola'''
  alternative_spanish_readings:
  - los jefes ... los últimos
  - los principales ... los postreros
  rationale: La lamentación depende de una inversión proverbial y corporal. Mantener la imagen evita aplanarla a categorías sociales menos vívidas.
  doctrine_reference: Translation philosophy §Original-language primacy; preserve imagery
- issue: Cómo traducir el final de opresión con el yugo
  english_pob_reading: they laid their yoke heavily upon us
  chosen_spanish_reading: cargaron pesadamente su yugo sobre nosotros
  alternative_spanish_readings:
  - nos oprimieron mucho
  - nos gravaron con su yugo
  rationale: El yugo es una imagen teológica y retóricamente importante de servidumbre/opresión; no debe desaparecer en una abstracción general.
  doctrine_reference: 'Book context: do not flatten apocalyptic or judgment imagery'
translation_notes:
  revision_awareness: La decisión refleja la revisión más reciente del testigo inglés, que corrigió una lectura demasiado pasiva o negativa del segmento central. En consecuencia, la versión española evita cualquier idea de 'no se hizo' o de pasividad inexistente en el ge'ez, y sigue el valor de esfuerzo frustrado expresado por el texto. También se conserva la tensión lexical entre 'trabajo' y 'fruto de nuestro trabajo' mediante una nota, porque el auditor inglés mostró vacilación entre ambas posibilidades.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'Mesías/Cristo' solo cuando el texto lo requiere; aquí no aplica.
  - Se conserva la metáfora 'cabeza/cola' sin reinterpretarla como liderazgo/vanguardia.
  - Se evita 'siervo' porque el pasaje no usa δοῦλος; la opresión se expresa con 'yugo'.
  - '''Inicuos'' se eligió para reflejar un matiz moral fuerte y consistente con el término de leylessness.'
