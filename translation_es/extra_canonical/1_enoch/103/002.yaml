translation:
  language: es
  text: Porque conozco el misterio[a], y he leído las tablas del cielo[b], y he visto los santos escritos[c], y he hallado escrito en ellas, y he entendido acerca de ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el secreto». El contexto apocalíptico favorece «misterio» como conocimiento revelado.
    reason: lexical_alternative
  - marker: b
    text: Imagen apocalíptica de registros o decretos celestiales; no necesariamente tablas físicas en sentido literal.
    reason: cultural_note
  - marker: c
    text: O «la santa escritura». La expresión ge'ez es difícil, y el historial de revisión conserva tensión entre una lectura singular y una plural; aquí se traduce en plural para seguir el texto principal inglés auditado.
    reason: textual_variant
lexical_decisions:
- source_word: ምሥጢረ
  english_pob_choice: the mystery
  chosen_spanish: el misterio
  alternatives_spanish:
  - el secreto
  - lo oculto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto apocalíptico, «misterio» conserva el registro revelado y la idea de conocimiento oculto dado a conocer. «Secreto» sería posible, pero rebaja el matiz técnico y solemne del pasaje.
- source_word: ፀፍፀፈ ሰማይ
  english_pob_choice: the tablets of heaven
  chosen_spanish: las tablas del cielo
  alternatives_spanish:
  - las tablas de los cielos
  - los libros del cielo
  - los escritos del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tablas» mantiene la imagen concreta de registro escrito celestial que el contexto enóquico sugiere. «Cielo» traduce el genitivo/relación celestial sin convertirlo en una paráfrasis más abstracta como «escritos».
- source_word: ጽሕፈተ ቅድስተ
  english_pob_choice: the holy writings
  chosen_spanish: la santa escritura
  alternatives_spanish:
  - los santos escritos
  - la escritura santa
  - la santa escritura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión del audit trail corrigió la comprensión hacia una expresión adjetival singular: «la santa escritura». En español, esto preserva la relación directa entre el sustantivo y el adjetivo y evita introducir un plural no exigido por el griego fragmentario citado en el contexto. Mantengo el singular porque es el mejor correlato de la lectura revisada, aun cuando el resto de la cláusula use un referente plural para «ellas».'
- source_word: ውስቴቶሙ
  english_pob_choice: in them
  chosen_spanish: en ellas
  alternatives_spanish:
  - dentro de ellas
  - entre ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El plural femenino español concuerda naturalmente con «las tablas» y conserva la referencia locativa simple de la cláusula: «hallé escrito en ellas».'
- source_word: አኩዐ
  english_pob_choice: understood
  chosen_spanish: entendí
  alternatives_spanish:
  - comprendí
  - percibí
  - conocí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Entendí» expresa de manera directa el paso de leer a comprender, sin añadir contenido interpretativo extra.
- source_word: አንበብኩ
  english_pob_choice: I have read
  chosen_spanish: he leído
  alternatives_spanish:
  - leí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El perfecto español reproduce mejor el valor resultativo del verbo en la secuencia narrativa: el hablante afirma haber realizado la lectura con efecto presente de conocimiento.'
theological_decisions:
- issue: Identidad y alcance de «la santa escritura»
  english_pob_reading: The English POB preserves ambiguity with 'the holy writings' and notes the textual difficulty; the revision trail points to a singular adjectival reading.
  chosen_spanish_reading: «la santa escritura» sin especificar si se trata de un escrito celestial singular, de una colección, o de una escritura asociada a seres santos.
  alternative_spanish_readings:
  - «los santos escritos»
  - «la escritura de los santos»
  - «la escritura santa»
  rationale: 'La evidencia del audit trail muestra tensión entre una lectura singular revisada y el encaje plural de la referencia pronominal posterior. En español conviene conservar esa tensión: el sintagma puede leerse como una escritura santa singular, mientras «en ellas» sigue remitiendo a las tablas del cielo. No se debe resolver artificialmente la ambigüedad introduciendo «ángeles» o «santos» sin base suficiente.'
  doctrine_reference: Preservar la tensión textual y no sobredeterminar el referente.
translation_notes:
  revision_awareness: 'El borrador español toma en cuenta el audit trail inglés y la revisión posterior: se mantiene «misterio» y «tablas del cielo», pero se adopta la lectura revisada de ጽሕፈተ ቅድስተ como singular adjetival («la santa escritura»). También se conserva la tensión entre ese singular y el plural de «en ellas», siguiendo la ambigüedad documentada en la tradición de trabajo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene el registro apocalíptico elevado sin recurrir a paráfrasis devocionales.
  - «Entendí» y «he leído» conservan el encadenamiento verbal de descubrimiento y comprensión.
  - La concordancia en «en ellas» se refiere naturalmente a «las tablas del cielo» y no fuerza el referente de «la santa escritura».
