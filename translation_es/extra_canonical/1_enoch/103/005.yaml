translation:
  language: es
  text: '¡Ay de ustedes, pecadores muertos, cuando mueran en la riqueza de sus pecados[a], y los que son como ustedes digan acerca de ustedes: «¡Bienaventurados son estos pecadores[b]; han visto todos sus días[c]!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En la riqueza de sus pecados» conserva el valor crítico de la expresión ge'ez; una lectura más débil sería simplemente «en sus pecados».
    reason: textual_variant
  - marker: b
    text: 'También puede entenderse: «¡Ay de ustedes, pecadores, cuando mueran!»; la repetición de «muertos» / «cuando mueran» forma parte del énfasis retórico del pasaje.'
    reason: lexical_alternative
  - marker: c
    text: 'También puede entenderse: «han vivido para ver todos sus días», es decir, que se los considera dichosos por haber llegado a una vida completa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay para ustedes!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el tono de denuncia/judicio profético. En español, «¡Ay de ustedes!» suena natural y mantiene la fuerza oracular de la fórmula, sin convertirla en mera lamentación.
- source_word: ምውታን ኃጥኣን
  english_pob_choice: dead sinners
  chosen_spanish: pecadores muertos
  alternatives_spanish:
  - sinners muertos
  - pecadores fallecidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fuente ge'ez sí une «muertos» con «pecadores», y la repetición con «cuando mueran» es retórica, no un error que deba suavizarse. En español, «pecadores muertos» conserva el énfasis del original.
- source_word: ሶበ ትመውቱ
  english_pob_choice: when you die
  chosen_spanish: cuando mueran
  alternatives_spanish:
  - cuando mueran ustedes
  - si mueren
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula es temporal y advertencial. «Cuando mueran» preserva la inmediatez del aviso; se evita «si» porque debilita la certeza retórica.
- source_word: በብዕለ ኃጢአትክሙ
  english_pob_choice: in the wealth of your sins
  chosen_spanish: en la riqueza de sus pecados
  alternatives_spanish:
  - en la abundancia de sus pecados
  - en la riqueza que hay en sus pecados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión crítica que identifica el valor de «wealth/richness» en el compuesto ge'ez. «Riqueza» preserva la crítica a la prosperidad y evita desfigurarla como mera localización moral («en sus pecados»).
- source_word: ወይብሉ ዲቤክሙ
  english_pob_choice: and ... say about you
  chosen_spanish: y los que son como ustedes digan de ustedes
  alternatives_spanish:
  - y digan acerca de ustedes los que son como ustedes
  - y los de su clase digan de ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción apunta a quienes pertenecen al mismo tipo o grupo. «Los que son como ustedes» es claro y mantiene el matiz comparativo sin introducir una paráfrasis ajena.
- source_word: እለ ከማክሙ
  english_pob_choice: those like you
  chosen_spanish: los que son como ustedes
  alternatives_spanish:
  - los semejantes a ustedes
  - gente como ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el valor de semejanza/clase, evitando un tono demasiado coloquial. La frase funciona bien en español bíblico contemporáneo.
- source_word: ብፁዓን እሙንቱ
  english_pob_choice: Blessed are these
  chosen_spanish: ¡Bienaventurados son estos pecadores!
  alternatives_spanish:
  - ¡Felices son estos pecadores!
  - ¡Dichosos son estos pecadores!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Bienaventurados» conserva el registro elevado de la aclamación y su ironía. Se mantiene «estos pecadores» porque el texto presenta una valoración torcida y deliberadamente escandalosa.
- source_word: ኵሎ መዋዕሎሙ ርእዩ
  english_pob_choice: they have seen all their days
  chosen_spanish: han visto todos sus días
  alternatives_spanish:
  - han vivido todos sus días
  - han visto pasar todos sus días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se conserva el giro idiomático literal del original para mantener la ironía evaluativa: no se aclara en exceso como si fuera solo «vivieron mucho», porque el texto deja abierta la valoración mundana de una vida completa.'
theological_decisions:
- issue: La aparente duplicación entre «pecadores muertos» y «cuando mueran»
  english_pob_reading: The warning addresses dead sinners, while also stating the moment of their death.
  chosen_spanish_reading: El texto se dirige a pecadores ya caracterizados como muertos y, además, describe el momento de su muerte como parte del reproche.
  alternative_spanish_readings:
  - Reducirlo a «pecadores, cuando mueran»
  - Suavizarlo a «pecadores al morir»
  rationale: La repetición es parte de la retórica de juicio y no debe eliminarse. Mantener ambos elementos preserva el golpe del texto y su contraste con la suerte de los justos muertos en el contexto inmediato.
  doctrine_reference: Jue 1 Enoch 103:3-6; mantener la tensión retórica sin armonizarla artificialmente.
- issue: La valoración de la «riqueza» vinculada a los pecados
  english_pob_reading: The verse critiques dying in the wealth of one's sins, not merely 'in your sins'.
  chosen_spanish_reading: La frase denuncia la falsa seguridad de una riqueza asociada con el pecado.
  alternative_spanish_readings:
  - 'Leerlo solo como una localización moral: «en sus pecados»'
  - Entenderlo como prosperidad material sin relación con el pecado
  rationale: La revisión del texto fuente favorece «riqueza»; por eso la traducción debe conservar la crítica a la prosperidad perversa. Quitar esa dimensión borraría una tensión teológica importante del pasaje.
  doctrine_reference: 1 Enoch 103:5; crítica de la prosperidad de los impíos.
- issue: La beatitud irónica en boca de los malvados
  english_pob_reading: 'An ironic beatitude: ''Blessed are these sinners; they have seen all their days.'''
  chosen_spanish_reading: Una bienaventuranza irónica en boca de quienes juzgan mal la vida de los muertos.
  alternative_spanish_readings:
  - Tomarla como elogio sincero
  - Volverla una simple observación funeraria
  rationale: La ironía es central al sentido. «Bienaventurados» debe sonar auténticamente elevado para que el contraste con el juicio divino permanezca visible.
  doctrine_reference: Sabiduría apocalíptica; preservación de ironía y juicio escatológico.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión crítica posterior que corrige la omisión de «muertos» y rescata el valor de «riqueza» en la frase ge'ez. Por eso la versión española evita la simplificación de la primera redacción inglesa y conserva tanto la duplicación retórica como la crítica a la prosperidad pecaminosa.
  spanish_consistency_notes:
  - Se mantuvo «pecadores» en todo el versículo para conservar la cohesión léxica.
  - Se usó «Bienaventurados» en la cita irónica para preservar el registro elevado del contraste.
  - Se evitó «Señor» u այլ sustituciones no pertinentes; no hay términos divinos en este versículo.
  - «Riqueza» se dejó explícita para no perder la dimensión económica del pasaje.
