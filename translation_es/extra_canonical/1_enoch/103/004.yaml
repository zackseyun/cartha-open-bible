review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido global del ge''ez y sigue la línea del English POB auditado: vida continuada de los justos muertos, doble expresión de gozo, no perecer de sus espíritus, recuerdo/presencia ante el Grande, y exhortación final a no temer la humillación. Sin embargo, hay dos puntos mejorables para una fidelidad más precisa y una mejor naturalidad española: 1) la cláusula final inglesa no necesita mantener el posesivo ambiguo como ''su humillación''; en español conviene explicitar ''la humillación que sufren'' para evitar que parezca una humillación causada por ellos o perteneciente a otro referente; 2) ''delante del rostro del Grande'' preserva el modismo, pero ''ante el rostro del Grande'' suena más digno y natural en español bíblico actual sin perder la imagen.'
  spanish_quality_summary: El texto es legible y reverente, pero mezcla un registro algo peninsular ('vosotros', 'moristeis', 'temáis') con la meta declarada de español neutral latinoamericano/broadly church-readable. No es un error grave, pero conviene suavizar donde sea posible. Además, 'se gozarán' y 'su recuerdo' son comprensibles, aunque 'se llenarán de gozo' sería más natural; con todo, puede mantenerse para conservar la duplicación. La mejora principal es aclarar la frase final y pulir la fórmula de presencia.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: መንፈስ = ''espíritus'' está bien; ጽድቅ = ''justicia'' es defendible; ለዐቢይ = ''el Grande'' preserva el epíteto enóquico; no aparecen términos como Yahvé/Mesías/Cristo que exijan ajuste. La nota cultural sobre ''rostro'' debe mantenerse, y la alternativa léxica de ''humillación/reproche/vergüenza'' sigue siendo pertinente.'
  issues:
  - severity: medium
    issue: Ambigüedad en 'no temáis su humillación'
    rationale: En español, el posesivo 'su' queda demasiado abierto y puede sonar poco idiomático. El original permite 'their humiliation/reproach', pero para un lector español es más claro 'no teman la humillación que sufren' o similar, preservando el sentido de afrenta pública padecida por los justos.
  - severity: low
    issue: '''delante del rostro del Grande'' es algo tosco en español'
    rationale: La literalidad se entiende, pero 'ante el rostro del Grande' conserva la imagen y mejora la fluidez y dignidad del castellano eclesial.
  - severity: low
    issue: Registro pronominal menos neutral
    rationale: El uso de 'vosotros/moristeis/temáis' no rompe la fidelidad, pero se aparta del objetivo de neutral latinoamericano. Puede evitarse con formas no marcadas como 'ustedes, los que murieron...' y 'no teman'.
  revised_spanish_text: Y sus espíritus vivirán[a], ustedes, los que murieron en justicia; se alegrarán y se gozarán, y sus espíritus no perecerán, y su recuerdo estará ante el rostro del Grande[b] por todas las generaciones de la eternidad. Y ahora, no teman la humillación que sufren[c].
  revised_footnotes:
