translation:
  language: es
  text: Y sus espíritus vivirán[a], ustedes, los que murieron en justicia; se alegrarán y se gozarán, y sus espíritus no perecerán, y su recuerdo estará ante el rostro del Grande[b] por todas las generaciones de la eternidad. Y ahora, no teman la humillación que sufren[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''ustedes, los que murieron en justicia''. La construcción ge''ez puede dirigirse directamente a los muertos justos en vez de describir de manera aposicional a ''sus espíritus''.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ''ante el rostro del Grande'', fórmula de presencia característica del lenguaje celestial y de corte.'
    reason: cultural_note
  - marker: c
    text: 'O: ''no teman su reproche'' o ''su vergüenza''. El sustantivo final puede implicar humillación pública, afrenta o deshonra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: የሐይዉ
  english_pob_choice: will live
  chosen_spanish: vivirán
  alternatives_spanish:
  - tendrán vida
  - seguirán viviendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El futuro simple español comunica bien la promesa consoladora y mantiene la fuerza prospectiva del verbo ge'ez sin introducir una paráfrasis excesiva.
- source_word: መንፈስክሙ
  english_pob_choice: your spirit
  chosen_spanish: vuestros espíritus
  alternatives_spanish:
  - vuestra alma
  - vuestro aliento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Espíritus’ conserva el valor antropológico y apocalíptico de መንፈስ y además sigue la revisión auditada que regulariza el plural para concordar con el verbo y con ‘sus espíritus’ en la segunda mitad del verso.
- source_word: ለእለ ሞትክሙ በጽድቅ
  english_pob_choice: you who died in righteousness
  chosen_spanish: vosotros que moristeis en justicia
  alternatives_spanish:
  - vosotros que moristeis en rectitud
  - vosotros cuya muerte fue en justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez usa un verbo directo de segunda persona plural (‘moristeis’), por lo que la frase debe dirigirse a los destinatarios, no convertirla en un sustantivo. ‘Justicia’ preserva el término base de ጽድቅ en forma natural para el español bíblico actual.
- source_word: በጽድቅ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - justamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el campo semántico de ጽድቅ con ‘justicia’, que puede abarcar el matiz judicial/covenantal del término y evita una traducción demasiado moralizante.
- source_word: ይትፌሥሑ
  english_pob_choice: they will rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - reinarán en gozo
  - se regocijarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Se alegrarán’ es idiomático en español y conserva el valor de gozo esperado para los justos vindicados.
- source_word: ይትሐሠዩ
  english_pob_choice: be glad
  chosen_spanish: se gozarán
  alternatives_spanish:
  - estarán gozosos
  - se llenarán de gozo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se distingue de ‘se alegrarán’ para no borrar la duplicación enfática del original; ‘gozarse’ preserva el tono elevado y no añade contenido ajeno.
- source_word: ኢይትሐጐሉ መንፈሳቲሆሙ
  english_pob_choice: their spirits will not perish
  chosen_spanish: sus espíritus no perecerán
  alternatives_spanish:
  - sus espíritus no serán destruidos
  - sus espíritus no se perderán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Perecerán’ reproduce de manera sobria la negación de la ruina definitiva y mantiene el paralelismo con la vida prometida al inicio del verso.
- source_word: ዝካሮሙ
  english_pob_choice: their remembrance
  chosen_spanish: su recuerdo
  alternatives_spanish:
  - su memoria
  - su memorial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Recuerdo’ permite una lectura clara y pública en español; aquí no se sobrecarga con ‘memorial’, aunque el trasfondo es el de una conmemoración permanente ante Dios.
- source_word: እምቅ ድመ ገጸ ለዐቢይ
  english_pob_choice: before the face of the Great One
  chosen_spanish: delante del rostro del Grande
  alternatives_spanish:
  - en la presencia del Grande
  - ante el rostro del Grande
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la fórmula de presencia ‘delante del rostro’ para reflejar el lenguaje cortesano/apocalíptico. ‘El Grande’ mantiene el epíteto del texto en lugar de normalizarlo a ‘Dios’.
- source_word: ለኵሉ ትውልደ ዓለም
  english_pob_choice: for all the generations of eternity
  chosen_spanish: por todas las generaciones de la eternidad
  alternatives_spanish:
  - por todas las generaciones del mundo
  - por todas las edades
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada favorece el valor temporal de ዓለም aquí. ‘Eternidad’ expresa mejor la duración escatológica que ‘mundo’, sin perder la huella de la fórmula semítica.
- source_word: ኢትፍርህዎ ለኀሣሮሙ
  english_pob_choice: do not fear their humiliation
  chosen_spanish: no temáis su humillación
  alternatives_spanish:
  - no temáis su reproche
  - no temáis su vergüenza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Humillación’ recoge bien el sentido de afrenta pública o desprecio social que puede implicar ኀሣር, y encaja con el consuelo dirigido a los justos oprimidos.
theological_decisions:
- issue: Existencia post-mortem de los justos
  english_pob_reading: your spirits will live; their spirits will not perish
  chosen_spanish_reading: vuestros espíritus vivirán; sus espíritus no perecerán
  alternative_spanish_readings:
  - vuestras almas vivirán; sus almas no perecerán
  - vuestro aliento vivirá; no perecerá
  rationale: Se mantiene ‘espíritus’ para respetar la antropología del texto y evitar imponer una precisión doctrinal posterior sobre ‘alma’. La formulación preserva la tensión apocalíptica entre muerte física y vida continuada prometida.
  doctrine_reference: No resolver la tensión antropológica; mantener el lenguaje del texto fuente.
- issue: Título divino ለዐቢይ
  english_pob_reading: the Great One
  chosen_spanish_reading: el Grande
  alternative_spanish_readings:
  - el Grande Uno
  - Dios
  rationale: El texto ge'ez usa un epíteto, no un sustantivo genérico. ‘El Grande’ conserva el registro enóquico y evita sustituir una designación literaria por una equivalencia doctrinal más explícita.
  doctrine_reference: Primacía del registro del texto original sobre la normalización traductora.
- issue: Fórmula de presencia ante Dios
  english_pob_reading: before the face of the Great One
  chosen_spanish_reading: delante del rostro del Grande
  alternative_spanish_readings:
  - ante el rostro del Grande
  - en la presencia del Grande
  rationale: La imagen de ‘rostro’ es deliberada y debe mantenerse para reflejar la fórmula de corte celestial y presencia continua. Esto conserva la concreción del original.
  doctrine_reference: Lenguaje reverencial y de corte celestial en literatura apocalíptica.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que regulariza el plural de ‘your spirits’ y mantiene el valor temporal de ‘generations of eternity’; también se corrigió la relación verbal de ሞትክሙ como ‘moristeis’, no como una frase nominal. La traducción española refleja esas decisiones y conserva el paralelismo interno del verso.
  spanish_consistency_notes:
  - Se mantuvo ‘espíritus’ para መንፈስ y ‘justicia’ para ጽድቅ, siguiendo la terminología del proyecto.
  - Se evitó ‘SEÑOR’ o ‘Dios’ para ለዐቢይ porque el texto preserva el epíteto ‘el Grande’.
  - Se diferenciaron los dos verbos de gozo (‘se alegrarán’ / ‘se gozarán’) para no perder el paralelismo enfático.
  - Se usó ‘delante del rostro’ por fidelidad a la fórmula de presencia, aunque ‘en la presencia’ sería una opción estilísticamente más fluida.
  - La frase final mantiene el matiz de afrenta social en ‘humillación’, acorde con el consuelo a los justos perseguidos.
