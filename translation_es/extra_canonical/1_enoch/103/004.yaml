    reason: cultural_note
  - marker: c
    text: Or 'do not fear their reproach/disgrace.' The final noun can denote humiliation or public shame.
    reason: lexical_alternative
  - marker: d
    text: Or 'your spirit will live—those of you whose death was in righteousness'.
    reason: previous_rendering
  - marker: e
    text: Or 'generations of the world'.
