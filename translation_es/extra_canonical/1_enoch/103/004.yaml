revisions:
- from: Y vuestros espíritus vivirán[a], vosotros que moristeis en justicia; y se alegrarán y se gozarán, y sus espíritus no perecerán, y su recuerdo estará delante del rostro del Grande[b] por todas las generaciones de la eternidad. Y ahora, no temáis su humillación[c].
  to: Y sus espíritus vivirán[a], ustedes, los que murieron en justicia; se alegrarán y se gozarán, y sus espíritus no perecerán, y su recuerdo estará ante el rostro del Grande[b] por todas las generaciones de la eternidad. Y ahora, no teman la humillación que sufren[c].
  rationale: 'Ajusté el texto para mayor claridad y mejor español neutral: eliminé el posesivo ambiguo en la exhortación final, suavicé la fórmula de presencia sin perder la imagen de ''rostro'', y reexpresé la dirección a los destinatarios con formas ampliamente legibles en América Latina. Mantengo ''espíritus'', ''justicia'', ''el Grande'' y la duplicación de gozo porque reflejan bien el sentido y las decisiones auditadas.'
  reviewer_model: gpt-5.4
