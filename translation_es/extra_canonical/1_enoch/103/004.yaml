  language: en
  yaml_path: translation/extra_canonical/1_enoch/103/004.yaml
  text: And your spirits will live[a], you who died in righteousness, and they will rejoice and be glad, and their spirits will not perish, and their remembrance will be before the face of the Great One for all the generations of eternity. And now[e][d][c][b], do not fear their humiliation.
