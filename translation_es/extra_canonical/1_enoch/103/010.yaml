    text: Or 'we perished' / 'we were brought to ruin' for the repeated verb rendered 'we were destroyed.'
    reason: lexical_alternative
  - marker: b
    text: '''With a word'' likely means that no one came to their aid even by speech, plea, or advocacy.'
    reason: cultural_note
  - marker: c
    text: The clause 'and we found nothing' is textually and syntactically difficult; the sense may be 'nor did we obtain anything' or 'in no way did we find relief.'
