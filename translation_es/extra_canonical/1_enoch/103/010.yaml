translation:
  language: es
  text: Y fuimos destruidos[a], y no hubo nadie que nos ayudara en ningún asunto[b], y no encontramos nada[c]. Fuimos atormentados y destruidos, y no tuvimos esperanza de ver la vida de día en día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''perecimos'' / ''fuimos llevados a la ruina'' para el verbo repetido traducido ''fuimos destruidos''.'
    reason: lexical_alternative
  - marker: b
    text: La expresión también puede entenderse como 'en nada' o 'de ninguna manera'; el sentido es que no hubo ayuda para ellos en ningún asunto.
    reason: lexical_alternative
  - marker: c
    text: La cláusula 'y no encontramos nada' es textual y sintácticamente difícil; también puede entenderse como 'ni obtuvimos nada' o 'de ningún modo hallamos alivio'.
    reason: textual_variant
lexical_decisions:
- source_word: ተሐጕልነ
  english_pob_choice: we were destroyed
  chosen_spanish: fuimos destruidos
  alternatives_spanish:
  - perecimos
  - fuimos llevados a la ruina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la fuerza del verbo repetido y el tono de ruina total sin suavizarlo a una mera dificultad o aflicción.
- source_word: አልቦ
  english_pob_choice: there was no one
  chosen_spanish: no hubo nadie
  alternatives_spanish:
  - no había nadie
  - no hubo ninguno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de un auxiliador ausente, el giro personal 'nadie' comunica mejor la negación que un impersonal como 'nada'.
- source_word: ዘይረድአነ
  english_pob_choice: to help us
  chosen_spanish: que nos ayudara
  alternatives_spanish:
  - que viniera en nuestro auxilio
  - que nos asistiera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Ayudar'' es un equivalente claro y natural en español, y mantiene la idea de socorro o apoyo presente en el verbo.'
- source_word: በነገር
  english_pob_choice: in any matter
  chosen_spanish: en nada
  alternatives_spanish:
  - en ningún asunto
  - de ninguna manera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa entendió la expresión como una negación amplia y natural; en español, 'en nada' preserva esa amplitud sin forzar una traducción demasiado literal o extraña.
- source_word: ወኢበምንትኒ ኢረከብነ
  english_pob_choice: and we found nothing
  chosen_spanish: y no encontramos nada
  alternatives_spanish:
  - y no obtuvimos nada
  - y de ningún modo hallamos alivio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto es difícil y admite matices; 'no encontramos nada' conserva la negatividad total y evita introducir una interpretación más específica que el testimonio no exige.
- source_word: ተጸዐርነ
  english_pob_choice: we were tormented
  chosen_spanish: fuimos atormentados
  alternatives_spanish:
  - fuimos afligidos
  - fuimos oprimidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Atormentados'' refleja la intensidad del lamento y encaja con la acumulación de sufrimiento del verso.'
- source_word: ኢተስፈውነ
  english_pob_choice: we had no hope
  chosen_spanish: no tuvimos esperanza
  alternatives_spanish:
  - no esperábamos
  - no pudimos tener esperanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma negativa expresa ausencia real de esperanza; en español, 'no tuvimos esperanza' transmite mejor el estado de desesperación que una formulación más débil.
- source_word: ከመ ንርአይ ሕይወተ ዕለት እምዕለት
  english_pob_choice: of seeing life from day to day
  chosen_spanish: de ver vida de día en día
  alternatives_spanish:
  - de ver la vida de un día para otro
  - de contemplar la vida día tras día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''De día en día'' conserva el movimiento idiomático de continuidad entre días y suena natural en español, mientras mantiene la imagen de supervivencia prolongada.'
theological_decisions:
- issue: Cómo conservar la repetición de destrucción sin suavizar la lamentación apocalíptica
  english_pob_reading: Retain repeated ruin language ('destroyed' ... 'destroyed') and explicit hopelessness
  chosen_spanish_reading: Mantener 'fuimos destruidos' ... 'fuimos destruidos' y la declaración explícita de falta de esperanza
  alternative_spanish_readings:
  - Reducir la repetición a una sola mención de sufrimiento
  - Reformular como miseria general
  rationale: El verso intensifica el dolor mediante repetición y negación total; la versión española debe conservar esa retórica de lamento para no diluir la gravedad del juicio y la aflicción.
  doctrine_reference: 'Translation philosophy: preserve significant repetition and do not flatten apocalyptic rhetoric.'
translation_notes:
  revision_awareness: Esta versión sigue la revisión más reciente del audit trail, que ajustó la expresión de በነገር desde una lectura literal de 'con una palabra' a un sentido más natural y probable de ausencia de ayuda 'en nada / en ningún asunto'. También conserva la repetición de 'destruidos' y la clausura de desesperanza sin atenuarlas.
  spanish_consistency_notes:
  - Se mantiene 'Dios'/'Yahvé' solo cuando aparezcan en el texto; este versículo no los contiene.
  - Se usa 'fuimos destruidos' para preservar la severidad lexical del verbo repetido, no 'perdimos' ni 'sufrimos'.
  - '''Fuimos atormentados'' se eligió por intensidad, pero el matiz de ''afligidos'' sigue siendo una alternativa válida si se buscara un tono algo menos enfático.'
  - La estructura general sigue el orden del original y del testimonio inglés para conservar la cadencia del lamento.
