  yaml_path: translation/extra_canonical/1_enoch/103/010.yaml
  text: And we were destroyed[a], and there was no one to help us in any matter, and we found nothing. We were tormented and destroyed[c][b], and we had no hope of seeing life from day to day.
  footnotes:
