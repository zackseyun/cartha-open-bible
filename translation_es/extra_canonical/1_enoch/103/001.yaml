translation:
  language: es
  text: Y ahora conozco este misterio[a] para ustedes, oh justos, por la gloria del Grande, del Venerable y del Poderoso en dominio[b], y por su grandeza lo conozco para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez es compacto y algo difícil; el verbo repetido puede significar simplemente «conozco» o, más específicamente, «conozco este misterio revelado».
    reason: lexical_alternative
  - marker: b
    text: «Dominio» también puede entenderse como «reino» o «reinado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y en este momento
  - Mas ahora
  lexicon: Dillmann
  rationale: Marca discursiva temporal y enfática; «Y ahora» conserva la conexión y la inmediatez del anuncio.
- source_word: አነ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: Dillmann
  rationale: Se conserva el pronombre explícito para mantener el énfasis solemne de la declaración.
- source_word: እምሕል
  english_pob_choice: know this mystery
  chosen_spanish: conozco este misterio
  alternatives_spanish:
  - conozco
  - he llegado a conocer este misterio
  - entiendo este misterio
  lexicon: Dillmann
  rationale: En el contexto enóquico, el verbo expresa conocimiento revelado. «Conozco este misterio» preserva la fuerza apocalíptica sin sobreparafrasear.
- source_word: ለክሙ
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - para vosotros
  lexicon: Dillmann
  rationale: El destinatario plural se vierte de forma natural en español moderno; «para» conserva el matiz de revelación hecha en beneficio de los justos.
- source_word: ጻድቃን
  english_pob_choice: righteous ones
  chosen_spanish: justos
  alternatives_spanish:
  - los justos
  - personas justas
  lexicon: Dillmann
  rationale: La forma sustantiva plural se traduce con un plural sustantivado idiomático en español, sin perder el valor de grupo distintivo.
- source_word: በስብሐቱ
  english_pob_choice: by the glory
  chosen_spanish: por la gloria
  alternatives_spanish:
  - por medio de la gloria
  - con la gloria
  lexicon: Dillmann
  rationale: La preposición instrumental se vierte con una construcción transparente en español; «por la gloria» mantiene la relación formal sin fijar más de lo que el ge'ez permite.
- source_word: ለዐቢይ ወለክቡር ወዕዙዘ መንግሥት
  english_pob_choice: of the Great and Honored and Mighty One in dominion
  chosen_spanish: del Grande, del Honorable y del Poderoso en dominio
  alternatives_spanish:
  - del Grande, del Honorable y del Poderoso en reino
  - del Grande, Honorable y Poderoso de dominio
  lexicon: Dillmann
  rationale: La sintaxis ge'ez coordina títulos/diversos calificativos de una misma figura divina. «Del Grande, del Honorable y del Poderoso en dominio» preserva la serie adjetival y la relación con «dominio» sin convertirla en una entidad separada.
- source_word: ወበዕበዩ
  english_pob_choice: and by his greatness
  chosen_spanish: y por su grandeza
  alternatives_spanish:
  - y por su majestad
  - y por su exaltación
  lexicon: Dillmann
  rationale: «Grandeza» reproduce el sustantivo abstracto con dignidad y mantiene la repetición del juramento/afirmación. Se evita aclarar excesivamente el vínculo sintáctico para respetar la compresión del original.
theological_decisions:
- issue: 'Naturaleza del conocimiento declarado: simple conocimiento o conocimiento revelado'
  english_pob_reading: The speaker declares knowledge of a revealed mystery for the righteous.
  chosen_spanish_reading: El hablante declara conocer un misterio revelado para los justos.
  alternative_spanish_readings:
  - El hablante simplemente dice que lo conoce para ustedes
  - El hablante dice que comprende el misterio
  rationale: El marco enóquico favorece la lectura apocalíptica de conocimiento revelado. «Este misterio» conserva la carga teológica sin diluirla en cognición ordinaria.
  doctrine_reference: Preservar el registro apocalíptico y no aplanar el discurso visionario.
- issue: Referencia de los títulos «el Grande», «el Honorable» y «el Poderoso en dominio»
  english_pob_reading: A divine title, rendered 'the Great One' without expanding it to 'God' in the main text.
  chosen_spanish_reading: Una serie de títulos divinos mantenida como tales en el texto principal, sin resolverla explícitamente como «Dios».
  alternative_spanish_readings:
  - 'Convertirlos en una paráfrasis explícita: «de Dios, el grande y honorable y poderoso»'
  - Leerlos como meros adjetivos no titulados
  rationale: El ge'ez presenta una cadena titulada que apunta a la divinidad, pero el texto permite conservar la formulación honorífica. «El Grande» y los demás títulos preservan la tensión sin sobreexplicarla.
  doctrine_reference: Preservar la tensión teológica y traducir títulos por su valor semántico.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente que corrige la estructura ge''ez: los tres calificativos pertenecen al mismo referente divino, y la cláusula final expresa «por su grandeza». También conserva la repetición del conocimiento y el giro instrumental, evitando la antigua lectura que separaba indebidamente «reino» como entidad autónoma.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando el original lo exige explícitamente; aquí el pasaje habla con títulos reverenciales, por lo que no se introduce ese nombre.
  - Se mantiene «misterio» para reflejar el registro enóquico y apocalíptico del verbo de conocimiento.
  - «Justos» conserva el sustantivo plural colectivo de ጻድቃን.
  - «Dominio» se eligió como opción principal frente a «reino» por la nota de ambigüedad del término መንግሥት.
  - Se preserva la repetición de «por la gloria... y por su grandeza» como recurso retórico del original.
