translation:
  language: es
  text: Porque vi a todos los ángeles del castigo hospedados allí y preparando todos los instrumentos de Satanás[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La línea etíope visible en este versículo aparece truncada en el OCR después de «y preparando». La frase «todos los instrumentos de Satanás» se adopta a partir del contexto inmediato y de la forma completa atestiguada en la edición crítica, por lo que debe entenderse como una reconstrucción cautelosa.
    reason: textual_variant
  - marker: b
    text: O «morando allí». El verbo ge'ez sugiere permanecer o quedarse en un lugar.
    reason: lexical_alternative
  - marker: c
    text: O «y preparando instrumentos de Satanás».
    reason: previous_rendering
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduzco la explicación causal/conectiva con una partícula natural en español. 'Porque' conserva la fuerza justificativa del inicio del versículo sin forzar un matiz más inferencial que el del ge'ez.
- source_word: ርኢክዎሙ
  english_pob_choice: I saw them
  chosen_spanish: vi
  alternatives_spanish:
  - vi a ellos
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de visión se expresa de forma directa y sobria. En español, el objeto está suficientemente retomado por el complemento siguiente; 'vi' mantiene el testimonio visionario sin añadir solemnidad innecesaria.
- source_word: ኵሎሙ
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno de
  - a todos los
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo la totalidad explícita del original. En español, 'a todos' es la forma más natural para el objeto directo humano/angelical en esta estructura.
- source_word: መላእክተ መቅሠፍት
  english_pob_choice: the angels of punishment
  chosen_spanish: los ángeles del castigo
  alternatives_spanish:
  - los ángeles de la punición
  - los ángeles del azote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Castigo'' transmite la fuerza judicial y punitiva del genitivo. Evito ''chastisement'' o términos más eclesiásticos porque el contexto apocalíptico es de juicio penal, no de corrección pastoral.'
- source_word: እንዘ የኃድሩ
  english_pob_choice: lodging there
  chosen_spanish: alojándose allí
  alternatives_spanish:
  - viviendo allí
  - residiendo allí
  - quedándose allí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez sugiere permanecer o estar hospedado en un lugar. 'Alojándose allí' conserva la idea concreta de estancia sin imponer permanencia absoluta; además, encaja bien con el paralelismo narrativo de la visión.
- source_word: ወያስተዴ
  english_pob_choice: and preparing
  chosen_spanish: y preparando
  alternatives_spanish:
  - y disponiendo
  - y poniendo en orden
  - y haciendo preparativos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantengo el verbo en forma continua para reflejar la acción simultánea y abierta del pasaje, sin decidir más de lo que el texto visible permite.
- source_word: ኵሎ ... ንዋየ ሰይጣን
  english_pob_choice: all the instruments of Satan
  chosen_spanish: todos los instrumentos de Satanás
  alternatives_spanish:
  - todas las herramientas de Satanás
  - todos los utensilios de Satanás
  - todo el equipo de Satanás
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El auditorial inglés ya incorporó la cuantificación 'all', que el ge'ez completo respalda. 'Instrumentos' respeta el campo semántico amplio de 'implementos/medios' sin suavizar la carga demonológica de 'Satanás'.
theological_decisions:
- issue: Reproducción del objeto de la preparación, que en el testimonio transmitido está reconstruido por contexto
  english_pob_reading: supplying 'instruments of Satan' in the main text, with a note that the OCR line is truncated
  chosen_spanish_reading: incluir 'todos los instrumentos de Satanás' en el texto principal, marcado como lectura sustentada por el contexto de la edición crítica
  alternative_spanish_readings:
  - 'dejar el verbo sin objeto explícito: ''y preparando'''
  - restringir la reconstrucción a 'y preparando instrumentos'
  rationale: Sigo la decisión auditada del POB inglés, que transparenta que la línea visible está truncada y que el objeto se restituye por el contexto inmediato y la forma completa atestiguada en la edición crítica. En español conviene mantener esa misma transparencia mediante la nota, pero el texto principal puede leer fluidamente con la reconstrucción contextual.
  doctrine_reference: Transparencia textual; preservar la tensión entre testimonio manuscrito incompleto y reconstrucción contextual.
translation_notes:
  revision_awareness: La revisión más reciente indicó que el ge'ez completo incluye ኵሎ ('todos') modificando 'los instrumentos de Satanás'. La presente redacción lo incorpora explícitamente en el texto principal, en concordancia con el tramo auditado y con la nota crítica sobre la reconstrucción contextual.
  spanish_consistency_notes:
  - He usado 'ángeles del castigo' para mantener el valor judicial de መላእክተ መቅሠፍት sin suavizarlo a una formulación más devocional.
  - '''Satanás'' se conserva como nombre propio transliterado en uso español común, coherente con la carga demonológica del pasaje.'
  - '''Alojándose allí'' mantiene la escena concreta y evita imponer una duración que el ge''ez no especifica.'
  - Se conserva el cuantificador 'todos' para reflejar el ajuste de la revisión auditada.
