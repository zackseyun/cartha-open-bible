translation:
  language: es
  text: Allí mis ojos vieron un valle cuyas aberturas estaban abiertas y profundas[a]; y todos los que habitan sobre la tierra seca, el mar y las islas le traerán dones, presentes y ofrendas[b] a ese valle[c]; pero aquel valle profundo no se llenará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge'ez es difícil en la frase que describe las aberturas del valle. Esta traducción entiende la imagen como un valle con aberturas abiertas y profundas.
    reason: textual_variant
  - marker: b
    text: Los tres sustantivos, «dones», «presentes» y «ofrendas», son cercanos en sentido en este contexto y pueden denotar tributo traído desde todas las regiones del mundo.
    reason: lexical_alternative
  - marker: c
    text: 'O: «un valle profundo con aberturas abiertas».'
    reason: previous_rendering
lexical_decisions:
- source_word: በህየ
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - En aquel lugar
  - Entonces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un adverbio locativo que introduce la escena visionaria; «Allí» conserva la deixis sin sonar forzado en español.
- source_word: ርእያ አዕይንትየ
  english_pob_choice: my eyes saw
  chosen_spanish: mis ojos vieron
  alternatives_spanish:
  - vi
  - mis ojos contemplaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es ocular y enfática. «Mis ojos vieron» mantiene el registro visionario mejor que una simple «vi».
- source_word: ቈላ
  english_pob_choice: valley
  chosen_spanish: valle
  alternatives_spanish:
  - hondonada
  - garganta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un contexto apocalíptico, el término designa una depresión o hendidura del terreno; «valle» es la opción amplia y fiel.
- source_word: ርኁወ ወዕሙቀ
  english_pob_choice: open and deep
  chosen_spanish: abiertos y profundos
  alternatives_spanish:
  - abierto y profundo
  - con aperturas abiertas y profundas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente del POB entendió que ambos adjetivos describen las aberturas del valle y no solo el valle en general. En español, «abiertos y profundos» aplicada a «abismos» preserva mejor la imagen coordinada sin forzar «bocas».
- source_word: ወኵሎሙ እለ የኃድሩ ዲበ የብስ ወባሕር ወደሰያት
  english_pob_choice: all who dwell on the dry land and the sea and the islands
  chosen_spanish: todos los que habitan sobre la tierra seca, el mar y las islas
  alternatives_spanish:
  - todos los que habitan en la tierra, el mar y las islas
  - todos los que viven sobre la tierra seca, el mar y las islas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La tríada geográfica es totalizante. «Tierra seca» conserva el contraste con el mar y evita borrar el matiz del ge'ez.
- source_word: አምኃ ወአስካዓ ወጋዳ
  english_pob_choice: gifts and presents and offerings
  chosen_spanish: dones, presentes y ofrendas
  alternatives_spanish:
  - tributos, dones y ofrendas
  - gifts, presentes y ofrendas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Los tres sustantivos son cercanos y posiblemente acumulativos; en español conviene mantener la serie con términos distintos pero emparentados, sin reducirla a una sola idea.
- source_word: ይመጽኡ ሎቱ
  english_pob_choice: will bring ... to it
  chosen_spanish: traerán a él
  alternatives_spanish:
  - llevarán a él
  - vendrán a él con
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el verbo base puede ser «venir», el contexto con objetos concretos favorece el sentido de llevar/traer tributos al lugar; «traerán a él» conserva esa relación.
- source_word: ወዝኩስ ዕሙቅ ቈላ ኢይመልእ
  english_pob_choice: yet that deep valley will not be filled
  chosen_spanish: pero aquel valle profundo no se llenará
  alternatives_spanish:
  - y aquel valle profundo no será llenado
  - pero ese valle profundo no se llenará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase final expresa la insaciabilidad del valle. «No se llenará» mantiene la fuerza simple del original y el tono ominoso.
theological_decisions:
- issue: Naturaleza de lo que las naciones o habitantes llevan al valle
  english_pob_reading: material gifts/offerings are brought to the valley itself
  chosen_spanish_reading: se presentan dones, presentes y ofrendas al valle como tributo material
  alternative_spanish_readings:
  - solo se acercan al valle con regalos
  - se trata de un gesto puramente simbólico de homenaje
  rationale: El texto enumera tres sustantivos concretos antes del verbo de movimiento y los sitúa en un marco de juicio visionario. Traducirlos como tributo material conserva la imaginería apocalíptica sin espiritualizarla.
  doctrine_reference: Preservar la imaginería apocalíptica y su materialidad descriptiva.
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente del POB en dos puntos clave: (1) la coordinación de los adjetivos ge''ez «abierto y profundo» aplicada a las aberturas del valle; y (2) el reordenamiento de la tríada de dones/ofrendas/presentes para reflejar mejor la secuencia del original. En español, he preferido una formulación natural que preserve ambas decisiones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no pertinente aquí porque el verso no lo contiene.
  - Se evitó «SEÑOR» y el lenguaje eclesiástico tradicional no presente en el original.
  - «dones, presentes y ofrendas» conserva la acumulación léxica del texto sin fusionar los tres sustantivos.
  - «se llenará» traduce el cierre ominoso del valle sin añadir modalización innecesaria.
