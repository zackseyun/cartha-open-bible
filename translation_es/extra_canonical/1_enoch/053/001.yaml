base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/053/001.yaml
  text: There my eyes saw a valley whose openings were open and deep[a]; and all who dwell on the dry land and the sea and the islands will bring gifts and presents and offerings to it[c][b], yet that deep valley will not be filled.
  footnotes:
  - marker: a
    text: The Ge'ez text is difficult in the phrase describing the valley's 'mouths.' The translation understands the image as a deep valley with gaping openings.
    reason: textual_variant
  - marker: b
    text: The three nouns rendered 'gifts and offerings and presents' are near-synonymous in this context and may denote tribute brought from all regions of the world.
    reason: lexical_alternative
  - marker: c
    text: Or 'a deep valley with open mouths'.
    reason: previous_rendering
