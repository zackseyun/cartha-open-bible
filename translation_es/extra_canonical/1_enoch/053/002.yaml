translation:
  language: es
  text: Y sus manos cometen hechos de iniquidad[a], y los pecadores devoran a todos los que apoyan sus hechos de iniquidad. Y los pecadores serán destruidos de delante del Señor de los Espíritus, y de la faz de su tierra serán arrancados, y no permanecerán para siempre jamás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pasaje etiópico es difícil; la lectura auditada entiende aquí una referencia a actos de iniquidad, no a 'manos' como objeto independiente. Se conserva la imagen concreta de las manos como agentes del mal.
    reason: lexical_alternative
  - marker: b
    text: La frase final puede leerse más literalmente como 'y no permanecerán para siempre jamás'. La tradición auditada también considera una lectura de 'arrancados' para el verbo de remoción final.
    reason: textual_variant
lexical_decisions:
- source_word: ወጌጋየ
  english_pob_choice: lawless deeds
  chosen_spanish: hechos de iniquidad
  alternatives_spanish:
  - hechos sin ley
  - obras de iniquidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB inglesa actualiza el término repetido como 'lawless deeds'. En español, 'hechos de iniquidad' conserva el valor moral-jurídico sin sonar mecánico; 'sin ley' sería más literal pero menos idiomático.
- source_word: እደዊሆሙ
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus brazos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la equivalencia directa y natural en español para el cuerpo/acción del sujeto.
- source_word: ይገብሩ
  english_pob_choice: commit
  chosen_spanish: cometen
  alternatives_spanish:
  - hacen
  - realizan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico es 'hacer', pero en este contexto judicial 'cometen' comunica mejor la idea de actos culpables, como en la lectura inglesa 'commit lawless deeds'.
- source_word: ዘይጻምዉ
  english_pob_choice: who support
  chosen_spanish: los que apoyan
  alternatives_spanish:
  - los que desean
  - los que se afanan por
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La tradición auditada corrige la lectura anterior de 'hunger for' y entiende el sintagma como apoyo/adhesión a la iniquidad. 'Apoyan' reproduce esa relación causal en español.
- source_word: ለጌጋይ
  english_pob_choice: their lawless deeds / them
  chosen_spanish: sus hechos de iniquidad
  alternatives_spanish:
  - ellos
  - esas iniquidades
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El antecedente es el mismo grupo de actos inicuos; en español conviene repetirlo para evitar ambigüedad y mantener el enlace anafórico.
- source_word: ኃጥኣን
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los impíos
  - los culpables
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Los pecadores'' es la designación directa del grupo juzgado en este pasaje apocalíptico y coincide con el audit trail inglés.'
- source_word: ይበልዑ
  english_pob_choice: devour
  chosen_spanish: devoran
  alternatives_spanish:
  - comen
  - devorarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el verbo fuerte y literal de la imagen de consumo. 'Devoran' mantiene la crudeza apocalíptica mejor que suavizarlo a 'destruyen'.
- source_word: እምገጸ ለእግዚአ መነፈሳት
  english_pob_choice: from before the Lord of Spirits
  chosen_spanish: de delante del Señor de los Espíritus
  alternatives_spanish:
  - de la presencia del Señor de los Espíritus
  - ante el Señor de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''De delante de'' reproduce el giro espacial-ceremonial de la fórmula etiópica y concuerda con el castellano bíblico sin ocultar la imagen.'
- source_word: ይትሐጐሉ
  english_pob_choice: shall be destroyed
  chosen_spanish: serán destruidos
  alternatives_spanish:
  - serán expulsados
  - serán aniquilados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura revisada de la tradición auditada favorece un verbo de destrucción más que de simple expulsión. 'Serán destruidos' conserva la tensión sin especificar más de lo que permite el texto.
- source_word: እምገጸ ምድረ ዚአሁ
  english_pob_choice: from the face of his earth
  chosen_spanish: de la faz de su tierra
  alternatives_spanish:
  - de su tierra
  - de la superficie de su tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Faz'' conserva el giro bíblico y la imagen espacial. ''Su tierra'' sigue de cerca la construcción posesiva del original.'
- source_word: ይትቀወሙ / πιθαν. ይትነቀሉ
  english_pob_choice: they shall be uprooted
  chosen_spanish: serán arrancados
  alternatives_spanish:
  - serán desarraigados
  - serán uprootados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada señala que el sentido probable es 'uprooted'. En español, 'arrancados' comunica el desarraigo violento con naturalidad y sin perder la metáfora vegetal/judicial.
- source_word: ወኢያነልቁ ለዓለመ ዓለም
  english_pob_choice: and they shall not remain forever and ever
  chosen_spanish: y no permanecerán para siempre jamás
  alternatives_spanish:
  - y no subsistirán por los siglos de los siglos
  - y no quedarán para siempre jamás
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB inglesa opta por una formulación más literal que 'perish'. En español, 'no permanecerán' preserva la permanencia/ausencia final sin decidir indebidamente si la muerte es aniquilación o expulsión perpetua.
theological_decisions:
- issue: Naturaleza de la sentencia final
  english_pob_reading: The sinners are destroyed and uprooted, and they shall not remain forever and ever.
  chosen_spanish_reading: Los pecadores son destruidos y arrancados, y no permanecerán para siempre jamás.
  alternative_spanish_readings:
  - Los pecadores serán expulsados y no permanecerán para siempre jamás.
  - Los pecadores perecerán para siempre jamás.
  rationale: La fuente y el audit trail sostienen una fórmula de juicio irreversible. El español mantiene la tensión entre destrucción, desarraigo y permanencia negada, sin cerrar más de la cuenta la cuestión metafísica.
  doctrine_reference: Preservar la tensión teológica documentada entre expulsión y destrucción final.
- issue: Referencia al título divino
  english_pob_reading: Lord of Spirits
  chosen_spanish_reading: Señor de los Espíritus
  alternative_spanish_readings:
  - Señor de los espíritus
  rationale: Se conserva el título reverencial con mayúscula inicial en el sustantivo principal, reflejando el uso establecido en la POB y la fórmula enochiana.
  doctrine_reference: Mantener el título divino tradicional del pasaje sin masking de יהוה, ya que aquí la fuente inmediata es la fórmula enochiana 'Lord of Spirits'.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que corrige la antigua imagen de cadenas/fetters y la lectura de 'hunger for them' hacia una cláusula sobre actos de iniquidad y apoyo a esos actos. También se incorporó la lectura revisada del final como 'not remain forever and ever' y la probable corrección textual de un verbo de 'uprooting' al final de la línea.
  spanish_consistency_notes:
  - Se mantuvo 'Señor de los Espíritus' como título fijo del pasaje.
  - Se usó 'pecadores' para ኃጥኣን, coherente con la POB inglesa y con registro bíblico comprensible.
  - Se prefirió 'de delante de' para reproducir la fórmula espacial del juicio divino.
  - Se evitó 'SEÑOR' en mayúsculas para no enmascarar el título específico del original enochiano.
  - Se evitó 'Cristo' porque el texto no usa el título Χριστός ni requiere esa equivalencia aquí.
