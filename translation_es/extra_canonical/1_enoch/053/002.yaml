base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/053/002.yaml
  text: And their hands commit lawless deeds[a], and all who support their lawless deeds the sinners devour. And the sinners shall be destroyed from before the Lord of Spirits, and from the face of his earth they shall be uprooted[d][c][b], and they shall not remain forever and ever.
  footnotes:
  - marker: a
    text: The line about 'my chains' and sinners who 'hunger for them' and 'eat them' is difficult in the Ethiopic. The translation keeps the imagery literal rather than smoothing it away; the sense may be that the instruments of judgment become the sinners' own portion.
    reason: lexical_alternative
  - marker: b
    text: The final clause may be rendered more literally, 'and they shall not remain forever and ever.' The OCR also shows uncertainty around the negative particle.
    reason: textual_variant
  - marker: c
    text: Or 'And my chains shall be for their hands to make fetters; and all who hunger for them—the sinners—shall eat them. And the sinners shall be driven'.
    reason: previous_rendering
  - marker: d
    text: Or 'they shall be banished'.
    reason: previous_rendering
