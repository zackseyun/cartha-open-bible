translation:
  language: es
  text: Y aquella embarcación flotaba sobre el agua[a], y todos los toros, elefantes, camellos y asnos se hundieron en la tierra; y a todos los animales —no pude verlos—; no pudieron salir, sino que perecieron y se hundieron en las profundidades[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El término geʽez subyacente fue revisado en el audit trail: aquí no significa ''mástil'', sino la embarcación de la escena del diluvio. ''Sobre el agua'' refleja la corrección de lectura que descarta que el objeto se hunda.'
    reason: source_note
  - marker: b
    text: También puede entenderse como 'los abismos' o, más literalmente, 'lo profundo'. Se prefiere 'las profundidades' para seguir la revisión final inglesa y conservar el tono ominoso de la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: መሥቀር
  english_pob_choice: vessel
  chosen_spanish: vehículo
  alternatives_spanish:
  - embarcación
  - nave
  - barca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este pasaje la revisión inglesa ya corrigió la lectura de 'mast' a 'vessel' por el contexto del diluvio. En español, 'vehículo' mantiene la idea de un medio que flota sin imponer de más si se trataba de una nave específica; 'embarcación' también es posible, pero 'vehículo' permite una formulación más general y fiel al relato visionario.
- source_word: ይጼቢ
  english_pob_choice: floated upon
  chosen_spanish: flotaba sobre
  alternatives_spanish:
  - flotó sobre
  - iba flotando sobre
  lexicon: Contextual reading from the English audit trail
  rationale: La revisión inglesa establece que el objeto no se hunde sino que flota sobre el agua. En español, el imperfecto 'flotaba' preserva la acción en curso y la escena visionaria, mientras que 'sobre' reproduce el valor de 'upon'.
- source_word: አልህምት
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - ganado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el referente bovino específico. 'Toros' es natural en español y mantiene la concreción animal que el audit trail inglés quiere preservar frente a 'cattle'.
- source_word: ነጊያት
  english_pob_choice: elephants
  chosen_spanish: elefantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige aquí la traducción anterior: el término no es ''camels'' sino ''elephants''. Se traduce literalmente para respetar el testimonio del texto ge''ez.'
- source_word: አገማል
  english_pob_choice: camels
  chosen_spanish: camellos
  alternatives_spanish:
  - dromedarios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el animal específico y el orden del texto. 'Camellos' es el equivalente moderno más claro y directo.
- source_word: አእዱግ
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  - burros y asnos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail muestra que este término faltaba en una versión previa. 'Asnos' es fiel y algo más sobrio/literario que 'burros'.
- source_word: ኅሠጥሙ
  english_pob_choice: sank into the earth
  chosen_spanish: se hundieron en la tierra
  alternatives_spanish:
  - fueron tragados por la tierra
  - se hundieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa descenso y absorción por la tierra. 'Se hundieron en la tierra' conserva la imagen física del hundimiento sin introducir una glosa interpretativa más fuerte que el texto.
- source_word: እንስሳ
  english_pob_choice: all the beasts
  chosen_spanish: todos los animales
  alternatives_spanish:
  - todas las bestias
  - todo el ganado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí 'animales' suena más natural en español y evita la posible rigidez de 'bestias'. El contexto ya enumera especies concretas, de modo que esta designación general funciona sin perder fuerza.
- source_word: ርእዮቶሙ
  english_pob_choice: I could not see them
  chosen_spanish: no pude verlos
  alternatives_spanish:
  - no los pude ver
  - no logré verlos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige la lectura anterior: esta frase expresa la incapacidad del narrador para verlos. ''No pude verlos'' es directo, natural y mantiene el testimonio en primera persona.'
- source_word: ስእኑ ወጺአ
  english_pob_choice: they were not able to come out
  chosen_spanish: no pudieron salir
  alternatives_spanish:
  - no pudieron salir fuera
  - no fueron capaces de salir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la idea de imposibilidad de emerger o salir. 'Salir' comunica bien el movimiento de salida del lugar de hundimiento sin forzar un tecnicismo.
- source_word: ተኃጐሉ
  english_pob_choice: perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - fueron destruidos
  - se arruinaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Perecieron'' reproduce la pérdida catastrófica con un registro elevado y sin añadir una agente explícito que el texto no ofrece en esta línea.'
- source_word: ተሠጥሙ ውስተ ቀላይ
  english_pob_choice: sank into the depths
  chosen_spanish: se hundieron en los abismos
  alternatives_spanish:
  - se hundieron en las profundidades
  - se hundieron en el mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail inglés opta por una profundidad ominosa y apocalíptica; en español, 'abismos' preserva esa fuerza sin volverlo doctrinalmente técnico. El plural ayuda a sonar natural en español y a mantener el tono visionario.
theological_decisions:
- issue: Cómo reflejar el final catastrófico del texto sin suavizar la imagen apocalíptica
  english_pob_reading: sank into the depths / abyss-like imagery
  chosen_spanish_reading: se hundieron en los abismos
  alternative_spanish_readings:
  - se hundieron en las profundidades
  - se hundieron en el mar
  rationale: La escena no es una descripción neutral de ahogamiento, sino una imagen de juicio y desaparición total. 'Abismos' conserva el peso apocalíptico que el audit trail inglés quiso resguardar con 'abyss', sin depender de una terminología doctrinal externa.
  doctrine_reference: Preservar la imaginería apocalíptica y de juicio sin atenuarla ni explicarla de más.
- issue: Cómo traducir la cláusula parentética sobre la visión del narrador
  english_pob_reading: I could not see them
  chosen_spanish_reading: no pude verlos
  alternative_spanish_readings:
  - no los pude ver
  - no logré verlos
  rationale: La corrección del audit trail indica que la frase habla de la incapacidad del narrador de ver a los seres mencionados. Mantener la primera persona ayuda a no desplazar la perspectiva narrativa ni convertir la frase en una observación objetiva.
  doctrine_reference: Respeto de la voz narrativa y de la secuencia visionaria del relato.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra varias correcciones decisivas: el objeto del verso no se hunde sino que flota sobre el agua; la lista animal incluye elefantes, camellos y asnos; y la cláusula central expresa ''no pude verlos'', no una acción de los animales vistos. La versión española sigue esas correcciones y evita volver a la lectura anterior de ''mast'' o de un hundimiento del vehículo.'
  spanish_consistency_notes:
  - Se conserva 'Y' al inicio por el tono narrativo solemne.
  - 'Se mantiene el orden de los animales del texto corregido: toros, elefantes, camellos y asnos.'
  - Se usa 'abismos' en plural para evitar una calca demasiado rígida y conservar el registro apocalíptico.
  - Se prefirió una puntuación con inciso para reflejar la cláusula 'I could not see them' sin romper la fluidez española.
