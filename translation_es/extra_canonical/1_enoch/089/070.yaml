translation:
  language: es
  text: Y así, en la visión, vi que el que escribía escribió[a] todo lo que era destruido por esos pastores, día por día; y llevó, puso y mostró todo aquel libro al Señor de las ovejas, todo lo que habían hecho, y todo lo que cada uno de ellos había hecho desaparecer[b], y todo lo que habían entregado a la destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La repetición de «escribía / escribió» intenta reflejar la insistencia del etiópico, donde el acto de escribir funciona como registro judicial continuo.
    reason: source_note
  - marker: b
    text: La expresión etiópica es difícil; puede entenderse como «había hecho desaparecer», «había retirado» o «había apartado». Se eligió una forma amplia para no cerrar indebidamente el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ርኢክዎ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En una fórmula visionaria, «vi» conserva la sencillez narrativa y el carácter apocalíptico sin volver arcaico el español.
- source_word: ዘይጽሕፍ
  english_pob_choice: one who wrote
  chosen_spanish: el que escribía
  alternatives_spanish:
  - el que escribió
  - el escriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El participio identifica a la figura por su función. «El que escribía» mantiene el valor descriptivo sin introducir el oficio de «escriba», que no está explícito en el verso.
- source_word: እፎ ይጽሕፍ
  english_pob_choice: he wrote down
  chosen_spanish: escribía
  alternatives_spanish:
  - escribió
  - registraba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición del verbo de escribir subraya la acción de registro. En español, la coordinación «el que escribía escribía» conserva esa insistencia; se entiende como acto de registrar por contexto.
- source_word: ዘይትሐጐል
  english_pob_choice: who was destroyed
  chosen_spanish: era destruido
  alternatives_spanish:
  - perecía
  - era aniquilado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma es pasiva y el contexto exige mantener la destrucción sufrida por las ovejas. «Era destruido» preserva la voz pasiva y la tensión judicial.
- source_word: እምነ ዝኩ ኖላዊያን
  english_pob_choice: from among those shepherds
  chosen_spanish: por aquellos pastores
  alternatives_spanish:
  - de entre aquellos pastores
  - por esos pastores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El pasaje adjudicado corrige la relación agente/paciente: los pastores son los causantes de la destrucción. En español, «por aquellos pastores» expresa la agencia requerida por el contexto y la revisión textual.'
- source_word: በኵሉ ዕለት
  english_pob_choice: day by day
  chosen_spanish: día por día
  alternatives_spanish:
  - cada día
  - día tras día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición idiomática se conserva con «día por día», que suena natural y mantiene el carácter acumulativo del registro.
- source_word: ያዓርግ
  english_pob_choice: he brought up
  chosen_spanish: lo llevaba
  alternatives_spanish:
  - lo subía
  - lo alzaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto etiópico usa un movimiento ascendente hacia la corte divina. En español, «lo llevaba» funciona idiomáticamente con la secuencia siguiente («lo ponía») para expresar la presentación del libro.
- source_word: ያዓርፍ
  english_pob_choice: laid it
  chosen_spanish: lo ponía
  alternatives_spanish:
  - lo dejaba
  - lo colocaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lo ponía» traduce el gesto de depositar el libro ante la figura divina sin sobreespecificar el modo físico del acto.
- source_word: ያርኢ ኵሎ ኪያሁ መጽሐፈ
  english_pob_choice: showed him all
  chosen_spanish: mostraba ese libro entero
  alternatives_spanish:
  - mostraba todo
  - le mostraba el libro entero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El objeto explícito es «el libro». «Mostraba ese libro entero» restituye el referente material y el sentido de presentación completa.
- source_word: ለእግዚአ አባግዕ
  english_pob_choice: to the Lord of the sheep
  chosen_spanish: al Señor de las ovejas
  alternatives_spanish:
  - al Dueño de las ovejas
  - ante el Señor de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título alegórico del Animal Apocalypse de manera directa y comprensible en español.
- source_word: ዘገብሩ
  english_pob_choice: what they had done
  chosen_spanish: lo que habían hecho
  alternatives_spanish:
  - sus obras
  - lo que hicieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula de reporte judicial se vierte de forma transparente en pretérito pluscuamperfecto para respetar la secuencia narrativa previa al juicio.
- source_word: ዘአእተተ
  english_pob_choice: had put away
  chosen_spanish: había hecho desaparecer
  alternatives_spanish:
  - había retirado
  - había apartado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es lexicamente difícil y puede implicar hacer desaparecer o quitar del rebaño. «Hecho desaparecer» preserva la ambigüedad y la fuerza de pérdida sin cerrar en exceso el sentido.
- source_word: ዘመጠዉ ለሐጕል
  english_pob_choice: had given over to destruction
  chosen_spanish: habían entregado a la destrucción
  alternatives_spanish:
  - habían dejado para destrucción
  - habían destinado a la ruina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa una acción culpable y activa. «Entregado a la destrucción» conserva el peso judicial y la violencia del original.
theological_decisions:
- issue: Identidad de la figura que escribe
  english_pob_reading: A heavenly recorder/scribe figure who documents the shepherds' conduct before God
  chosen_spanish_reading: Una figura celestial que registra ante Dios lo hecho por los pastores
  alternative_spanish_readings:
  - un ángel mensajero en general
  - Enoc como registrador
  rationale: El texto presenta una figura diferenciada por su acción de escribir, subir y mostrar el libro. La traducción mantiene esa función sin identificarla más allá de lo que el verso afirma.
  doctrine_reference: Preservar la imaginería apocalíptica y la escena de tribunal celestial.
- issue: Agencia en la cláusula de destrucción
  english_pob_reading: all that was destroyed by those shepherds
  chosen_spanish_reading: todo lo que era destruido por aquellos pastores
  alternative_spanish_readings:
  - todo lo que aquellos pastores destruían
  - todo lo que había sido destruido por aquellos pastores
  rationale: 'La revisión textual corrige el sentido: los pastores son los agentes de destrucción. El español conserva esa agencia con una pasiva que no borra la estructura del original.'
  doctrine_reference: Respetar la relación agente/paciente según la gramática etiópica y la revisión crítica.
- issue: Título divino del relato animal
  english_pob_reading: Lord of the sheep
  chosen_spanish_reading: Señor de las ovejas
  alternative_spanish_readings:
  - Dueño de las ovejas
  - Señor del rebaño
  rationale: Se mantiene el título alegórico propio del pasaje, sin sustituirlo por un término eclesiástico más interpretativo.
  doctrine_reference: Conservar la imaginería del Animal Apocalypse y su lenguaje de juicio divino.
translation_notes:
  revision_awareness: 'La revisión crítica corrige un desajuste importante del borrador inglés: la cláusula etiópica no dice que el escriba escribió a los pastores, sino que escribió lo que fue destruido por ellos. También confirma que el movimiento verbal implica presentar el libro completo ante el Señor de las ovejas y que el objeto explícito debe conservarse. La versión española sigue esa corrección y mantiene la ambigüedad léxica donde el etiópico es oscuro.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; aquí el título requerido por el pasaje es «Señor de las ovejas».
  - Se mantiene «ovejas» y no «rebaño» en el título para respetar la imaginería alegórica directa del texto.
  - Se evita «escriba» para no introducir un cargo no explicitado; la figura queda descrita funcionalmente.
  - Se conserva la pasiva en la primera cláusula para no invertir agentes y pacientes.
  - «Hecho desaparecer» se eligió por su amplitud; no debe leerse como una decisión interpretativa cerrada sobre la etimología exacta.
