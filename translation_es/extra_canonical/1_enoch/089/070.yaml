base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/070.yaml
  text: And thus in the vision I saw that the one who wrote wrote down every one that was destroyed by those shepherds[a], day by day, and he brought up and laid down and showed that whole book to the Lord of the sheep, all that they had done, and all that each one of them had made away with[d][c][b], and all that they had given over to destruction.
  footnotes:
  - marker: a
    text: The clause rendered 'had put away' is lexically difficult in the Ethiopic witness and may refer more specifically to what each shepherd had removed or caused to disappear from the flock.
    reason: lexical_alternative
  - marker: b
    text: The repeated writing and presentation imagery depicts a heavenly record of the shepherds' actions brought before the divine court.
    reason: cross_reference
  - marker: c
    text: Or 'he wrote down every one of those shepherds, day by day, who was destroyed from among them'.
    reason: previous_rendering
  - marker: d
    text: Or 'and he went up and laid it all before the Lord of the sheep, and showed him all'.
    reason: previous_rendering
