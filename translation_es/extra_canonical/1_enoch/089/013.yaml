translation:
  language: es
  text: Y cuando aquellas doce ovejas habían crecido[a], entregaron una de ellas a los asnos, y esos asnos de nuevo entregaron aquella oveja a los lobos, y aquella oveja creció en medio de los lobos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez usa un verbo de crecimiento o maduración para estas ovejas; por eso puede traducirse también «habían madurado».
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse más simplemente: «aquella oveja estaba entre los lobos»; sin embargo, el verbo de crecimiento en el contexto favorece conservar la idea de maduración.'
    reason: alternative_reading
lexical_decisions:
- source_word: ልህቁ
  english_pob_choice: had grown
  chosen_spanish: hubieron crecido
  alternatives_spanish:
  - habían crecido
  - hubieron madurado
  - habían madurado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica desarrollo o maduración, no mera existencia. En español, el pretérito pluscuamperfecto conserva la anterioridad narrativa y evita suavizar la idea de crecimiento.
- source_word: ፲ወ፪አባግዕ
  english_pob_choice: twelve sheep
  chosen_spanish: doce ovejas
  alternatives_spanish:
  - doce corderas
  - doce corderos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El numeral compuesto más el sustantivo animal denota claramente doce ovejas. 'Ovejas' mantiene la imagen alegórica sin sugerir juventud de manera innecesaria.
- source_word: አሐዱ እምኔሆሙ
  english_pob_choice: one of them
  chosen_spanish: una de ellas
  alternatives_spanish:
  - una de entre ellas
  - una de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una expresión partititiva simple. En español, 'una de ellas' es natural y conserva la referencia colectiva femenina de 'ovejas'.
- source_word: መጦውዎ
  english_pob_choice: handed ... over
  chosen_spanish: entregaron
  alternatives_spanish:
  - cedieron
  - dieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail corrige la lectura de 'ir a' por 'entregar, poner en manos de'. 'Entregaron' refleja mejor el valor de traslado/deliverance del verbo ge'ez sin añadir matiz interpretativo.
- source_word: አእዱግ
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  - jumentos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Asnos'' es un equivalente directo, digno y tradicional en español bíblico, apto para el registro alegórico. ''Burros'' sería más coloquial.'
- source_word: ካዕበ
  english_pob_choice: again
  chosen_spanish: a su vez
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí marca una devolución sucesiva dentro de la cadena narrativa. 'A su vez' conserva el movimiento recíproco sin forzar repetición exacta en español, aunque 'de nuevo' sigue siendo posible.
- source_word: በግዕ
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - oveja
  - cordero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el sustantivo general 'oveja' para respetar la alegoría y no sobreespecificar pequeñez o inmadurez.
- source_word: አዝእብት
  english_pob_choice: wolves
  chosen_spanish: lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término depredador plural se traduce de forma directa por 'lobos', preservando la simbología del Apocalipsis Animal.
- source_word: ማእከለ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en el centro de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''En medio de'' reproduce la localización dentro de un grupo hostil y sugiere inmersión sin perder naturalidad en español.'
theological_decisions:
- issue: Si la cláusula final debe leerse como mera ubicación o como crecimiento/maduración en el ambiente hostil
  english_pob_reading: that sheep grew up in the midst of the wolves
  chosen_spanish_reading: aquella oveja creció en medio de los lobos
  alternative_spanish_readings:
  - aquella oveja estaba en medio de los lobos
  - aquella oveja se hizo fuerte en medio de los lobos
  rationale: El verbo repetido de crecimiento al inicio del versículo favorece mantener un sentido de desarrollo también al final. Se preserva así la tensión alegórica sin resolverla hacia una simple residencia.
  doctrine_reference: Preservar la tensión textual y alegórica; no neutralizar una posible ambigüedad del original.
translation_notes:
  revision_awareness: 'El audit trail en inglés muestra una corrección importante: መጦውዎ no significa ''came to'' sino ''handed over / delivered''. Por eso el borrador español evita cualquier verbo de movimiento y adopta ''entregaron''. También se refleja la revisión sobre ካዕበ, que puede ser ''again'' o una marca sucesiva; por eso se eligió ''a su vez'' para preservar la cadena de entregas sin sonar mecánico. Se mantuvo el final con sentido de crecimiento, en línea con la lectura más defendida por el audit trail, y se documentó la alternativa locativa.'
  spanish_consistency_notes:
  - Se usó 'Y' inicial, acorde al registro bíblico narrativo en español.
  - Se prefirió 'asnos' sobre 'burros' por tono bíblico digno.
  - '''Oveja'' se mantuvo constante para la figura singular, evitando alternar con ''cordero''.'
  - Las notas a y b están ancladas en el texto con los marcadores correspondientes.
