translation:
  language: es
  text: Y me entristecí mucho a causa de la torre,[a] porque la casa de las ovejas había sido derribada;[b] y de entre ellas no pude ver si aquellas ovejas entraban en aquella casa.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término ge'ez aquí se entiende como «torre», no como «recinto» o «redil».
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «había sido demolida» o «había sido destruida».
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula final es difícil: también puede leerse simplemente «no pude ver a aquellas ovejas» o «no pude ver si entraban en aquella casa».'
    reason: alternative_reading
lexical_decisions:
- source_word: ወሐዘንኩ
  english_pob_choice: and I grieved
  chosen_spanish: y me entristecí
  alternatives_spanish:
  - y me dolí
  - y me afligí
  - y lloré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa pena o aflicción en un informe visionario. En español, «me entristecí» comunica un dolor real y personal sin sonar demasiado literario o demasiado débil.
- source_word: ብዙኃ፡ ጥቀ
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - sobremanera
  - muchísimo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La duplicación intensiva del ge'ez requiere una intensificación clara. «Mucho» funciona con naturalidad en español y mantiene la fuerza del lamento.
- source_word: ማኅፈድ
  english_pob_choice: tower
  chosen_spanish: la torre
  alternatives_spanish:
  - la torre fortificada
  - la estructura
  - el recinto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el término designa la «torre» del esquema alegórico, no un mero recinto. Dado el contexto de 1 Enoc y la revisión auditada, «torre» es la opción precisa y coherente.
- source_word: ቤት ዘአባግዐ
  english_pob_choice: house of the sheep
  chosen_spanish: la casa de las ovejas
  alternatives_spanish:
  - la casa de los ovejas
  - la casa para las ovejas
  - la casa de ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la metáfora literal y transparente del ge'ez. «Casa de las ovejas» mantiene la imagen simbólica sin resolverla prematuramente como «aprisco» o «redil».
- source_word: ተከርየ
  english_pob_choice: had been torn down
  chosen_spanish: había sido derribada
  alternatives_spanish:
  - había sido demolida
  - había sido destruida
  - había sido derrumbada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo describe la ruina de un edificio con fuerza concreta. «Derribada» expresa bien la acción de abatir o demoler una construcción y suena natural en español.
- source_word: ኢክህልኩ ርእዮቶሙ
  english_pob_choice: I was not able to see whether those sheep entered that house
  chosen_spanish: no pude ver si aquellas ovejas entraban en esa casa
  alternatives_spanish:
  - no pude ver si aquellas ovejas entraban en la casa
  - no pude ver a aquellas ovejas entrar en esa casa
  - no pude ver si entraban aquellas ovejas en esa casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa incapacidad de ver el hecho consumado o su posibilidad. «No pude ver si…» conserva esa incertidumbre; «aquellas ovejas» mantiene el valor demostrativo.
- source_word: ይበውኡ
  english_pob_choice: entered
  chosen_spanish: entraban
  alternatives_spanish:
  - entraron
  - entrasen
  - iban a entrar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto visionario admite una acción vista como proceso o como posibilidad de entrada. «Entraban» refleja bien la observación incompleta y la duda del narrador.
theological_decisions:
- issue: Imagen apocalíptica de la torre y la casa de las ovejas
  english_pob_reading: Retain the allegorical architecture of 'tower' and 'house of the sheep' rather than flattening the imagery.
  chosen_spanish_reading: Conservar «torre» y «casa de las ovejas» como imágenes distintas.
  alternative_spanish_readings:
  - unificar como «redil»
  - convertir todo en «casa»
  rationale: El texto simbólico distingue los elementos de la alegoría. Mantener ambas imágenes en español respeta la estructura del relato y evita borrar una distinción que el original sí presenta.
  doctrine_reference: Preservación de la imaginería apocalíptica y del valor alegórico del texto.
- issue: Fuerza del daño al edificio
  english_pob_reading: had been torn down
  chosen_spanish_reading: había sido derribada
  alternative_spanish_readings:
  - había sido destruida
  - había sido demolida
  - había sido arrancada
  rationale: La revisión auditada favorece una destrucción concreta de la edificación. «Derribada» transmite ruina física sin exagerar el alcance del verbo más allá de lo que el ge'ez permite.
  doctrine_reference: Primacía del idioma fuente y conservación de la imaginería concreta.
- issue: 'Última cláusula difícil: si vio o no la entrada de las ovejas'
  english_pob_reading: could not see whether those sheep entered that house
  chosen_spanish_reading: no pude ver si aquellas ovejas entraban en esa casa
  alternative_spanish_readings:
  - no pude ver a aquellas ovejas entrar en esa casa
  - no pude ver si aquellas ovejas habían entrado en esa casa
  rationale: El original permite una lectura de incertidumbre sobre el ingreso de las ovejas. «Si… entraban» conserva esa ambigüedad sin resolverla indebidamente.
  doctrine_reference: Respeto por la ambigüedad textual y por la incertidumbre visionaria.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la lectura de ማኅፈድ como «torre» y la del verbo ተከርየ como una destrucción más natural en español que «cut away». También se siguió la revisión final del inglés que simplifica la última cláusula a la incertidumbre sobre si las ovejas entraban en la casa.
  spanish_consistency_notes:
  - Se mantiene «torre» para ማኅፈድ, en coherencia con el pasaje vecino y con la revisión crítica.
  - «Casa de las ovejas» conserva la metáfora sin sustituirla por un término interpretativo como «redil».
  - La incertidumbre de la última cláusula se conserva con «si… entraban», evitando cerrar la ambigüedad del original.
