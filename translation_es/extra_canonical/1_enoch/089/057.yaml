    reason: lexical_alternative
  - marker: c
    text: O «bestias salvajes». La expresión ge’ez puede evocar animales predatorios del campo o del desierto; aquí se mantiene el sentido de amenaza sobre el rebaño.
    reason: lexical_alternative
