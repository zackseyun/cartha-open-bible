translation:
  language: es
  text: Y comencé[a] a clamar con todas mis fuerzas, y llamé al Señor de las ovejas y le mostré[b] lo que pasaba con las ovejas, que eran devoradas por todas las fieras[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «empecé a». El verbo ge’ez es inceptivo; la traducción expresa el inicio de la acción.
    reason: lexical_alternative
  - marker: b
    text: O «le hice saber» o «le presenté». El verbo puede implicar mostrar, presentar o dar a conocer.
    reason: lexical_alternative
  - marker: c
    text: O «bestias salvajes». La expresión ge’ez puede evocar animales predatorios del campo o del desierto; aquí se mantiene el sentido de amenaza sobre el rebaño.
    reason: lexical_alternative
lexical_decisions:
- source_word: አኃዝኩ
  english_pob_choice: I began
  chosen_spanish: comencé
  alternatives_spanish:
  - empecé
  - me puse a
  lexicon: Dillmann
  rationale: El verbo ge’ez funciona de manera inceptiva; en español, «comencé» reproduce con naturalidad el inicio de la acción sin añadir matices ajenos.
- source_word: እጽራሕ
  english_pob_choice: to cry out
  chosen_spanish: a clamar
  alternatives_spanish:
  - a gritar
  - a exclamar
  lexicon: Dillmann
  rationale: «Clamar» conserva el sentido de voz intensa y de angustia religiosa mejor que un simple «gritar».
- source_word: በኵሉ ኃይልየ
  english_pob_choice: with all my strength
  chosen_spanish: con todas mis fuerzas
  alternatives_spanish:
  - con todo mi poder
  - con toda mi fuerza
  lexicon: Dillmann
  rationale: «Fuerzas» es la equivalencia más natural y solemne en español; mantiene la idea de totalidad e intensidad.
- source_word: አጸውዖ
  english_pob_choice: I called
  chosen_spanish: llamé
  alternatives_spanish:
  - clamé
  - apelé
  lexicon: Dillmann
  rationale: 'Se conserva la distinción verbal frente a «clamar»: primero el grito, luego la llamada dirigida al destinatario.'
- source_word: ለእግዚአ አባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el Maestro de las ovejas
  lexicon: Dillmann
  rationale: «Señor» es la manera más fiel de reproducir la fórmula de autoridad divina del alegoría; «ovejas» mantiene el símbolo del rebaño.
- source_word: አርእዮ
  english_pob_choice: showed him
  chosen_spanish: le mostré
  alternatives_spanish:
  - le hice saber
  - le presenté
  lexicon: Dillmann
  rationale: El verbo implica hacer ver o presentar; «le mostré» conserva el gesto de exponer la situación ante él con claridad.
- source_word: በእንተ አባግዕ
  english_pob_choice: concerning the sheep
  chosen_spanish: lo concerniente a las ovejas
  alternatives_spanish:
  - acerca de las ovejas
  - respecto de las ovejas
  lexicon: Dillmann
  rationale: La fórmula mantiene el alcance del objeto comunicado sin sonar demasiado administrativa ni demasiado libre.
- source_word: ተበልዑ
  english_pob_choice: were being devoured
  chosen_spanish: eran devoradas
  alternatives_spanish:
  - estaban siendo devoradas
  - eran comidas
  lexicon: Dillmann
  rationale: «Eran devoradas» preserva la violencia de la imagen y suena idiomático en español bíblico contemporáneo.
- source_word: እምኵሎሙ አራዊተ ገዳም
  english_pob_choice: by all the wild beasts
  chosen_spanish: por todas las fieras
  alternatives_spanish:
  - por todas las bestias salvajes
  - por todos los animales del campo
  lexicon: Dillmann
  rationale: La expresión ge’ez alude a animales predatorios no domesticados; «fieras» comunica bien la amenaza sin forzar «del campo», que en español puede sonar menos natural en este contexto.
theological_decisions:
- issue: Título divino en la alegoría
  english_pob_reading: the Lord of the sheep
  chosen_spanish_reading: el Señor de las ovejas
  alternative_spanish_readings:
  - el dueño de las ovejas
  - el maestro de las ovejas
  rationale: En el marco alegórico del Apocalipsis de los Animales, la expresión identifica a Dios como soberano del rebaño. «Señor» preserva autoridad y registro elevado mejor que una simple relación de propiedad.
  doctrine_reference: Translate titles; transliterate names. Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés auditado, que corrigió una duplicación accidental y dejó estable la redacción final con «wild beasts». La versión española sigue esa lectura consolidada y mantiene la distinción entre clamar y llamar.
  spanish_consistency_notes:
  - Se usa «Señor» para እግዚአ en esta fórmula alegórica, siguiendo el valor de título y no una sustitución devocional automática.
  - Se prefirió «ovejas» por coherencia con la imagen del rebaño; no se introduce «rebaño» porque el original repite el objeto directo «ovejas».
  - «Fieras» comunica la carga predatoria de አራዊተ ገዳም y evita una literalidad extraña en español.
  - Se conservó la diferencia entre el clamor inicial y la llamada dirigida al Señor, conforme a la distinción verbal del audit trail en inglés.
