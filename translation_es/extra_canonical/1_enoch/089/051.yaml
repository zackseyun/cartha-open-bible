  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/051.yaml
  text: And again I saw those sheep[a], how they went astray and walked in many paths, and they abandoned that house of their Lord. And the Lord of the sheep called some from among the sheep and sent them to the sheep[c][b], but the sheep began to kill them.
  footnotes:
  - marker: a
    text: Or 'their master'; the Ge'ez term can denote a lord or master. 'Lord' is chosen because the figure in the vision represents God as ruler of the flock.
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be understood more concretely as 'the sheep seized them in order to kill them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And again I saw those sheep again'.
    reason: previous_rendering
