translation:
  language: es
  text: Y otra vez vi aquellas ovejas[c], cómo se descarriaban y andaban por muchos caminos, y abandonaron la casa de su Señor[a]. Y el Señor de las ovejas llamó a algunos de entre las ovejas y los envió a las ovejas, pero las ovejas comenzaron a matarlos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su amo'; el término ge'ez puede significar señor o amo. Se prefiere 'Señor' porque la figura de la visión representa a Dios como gobernante del rebaño.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse más concretamente: ''pero las ovejas se apoderaron de ellos para matarlos''.'
    reason: lexical_alternative
  - marker: c
    text: O 'Y otra vez vi otra vez aquellas ovejas'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢክዎሙ ካዕበ
  english_pob_choice: And again I saw
  chosen_spanish: Y otra vez vi
  alternatives_spanish:
  - Y vi otra vez
  - Entonces vi otra vez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la fórmula visionaria repetitiva sin forzar una repetición adverbial innecesaria en español. 'Otra vez vi' suena natural y mantiene el valor de reanudación apocalíptica.
- source_word: ለዝኩ አባግዕ
  english_pob_choice: those sheep
  chosen_spanish: aquellas ovejas
  alternatives_spanish:
  - esas ovejas
  - las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo mira hacia un grupo ya identificado en la visión. 'Aquellas' preserva el valor de referencia retrospectiva mejor que un artículo simple.
- source_word: ከመ ስሕቱ
  english_pob_choice: how they went astray
  chosen_spanish: cómo se descarriaban
  alternatives_spanish:
  - que se desviaban
  - cómo erraban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Se descarriaban'' reproduce bien la imagen de ovejas que se apartan del camino y conserva el matiz moral/religioso de desviación.'
- source_word: ወሖሩ በብዙሕ ፍናዋት
  english_pob_choice: and walked in many paths
  chosen_spanish: y andaban por muchos caminos
  alternatives_spanish:
  - y caminaban por muchas sendas
  - y seguían muchos caminos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Andaban por muchos caminos'' mantiene la imagen concreta de múltiples rutas sin volverla abstracta. ''Caminos'' es más idiomático en español que una traducción demasiado literal de ''paths''.'
- source_word: ወሐደጉ ዝኩ ቤተ ዚአሆሙ
  english_pob_choice: and they abandoned that house
  chosen_spanish: y abandonaron la casa de su Señor
  alternatives_spanish:
  - y dejaron la casa de su Señor
  - y abandonaron aquella casa suya
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Abandonaron'' preserva la fuerza de ruptura del verbo, y ''la casa de su Señor'' hace explícita la relación posesiva y reverencial que el contexto sugiere. Se evita ''de ellos'' para no oscurecer la dependencia respecto del Señor.'
- source_word: ወእግዚኦሙ ለአባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el dueño de las ovejas
  - el maestro de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Señor'' conserva el peso teológico que el audit trail preserva con ''Lord'', sin borrar la metáfora pastoril. ''Dueño'' o ''maestro'' serían posibles lexicalmente, pero aquí debilitan la figura divina del visionario.'
- source_word: ጸውዐ እምውስተቶሙ ለአባግዕ
  english_pob_choice: called some from among the sheep
  chosen_spanish: llamó a algunos de entre las ovejas
  alternatives_spanish:
  - llamó a algunas ovejas de entre ellos
  - llamó a algunos fuera de entre las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''De entre las ovejas'' conserva la selección interna al rebaño. ''Algunos'' expresa adecuadamente el valor distributivo implícito en la construcción ge''ez.'
- source_word: ወለአኮሙ ኀበ አባግዕ
  english_pob_choice: and sent them to the sheep
  chosen_spanish: y los envió a las ovejas
  alternatives_spanish:
  - y los mandó a las ovejas
  - y los envió hacia las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Envió'' preserva el matiz de misión/comisión. En español, ''a las ovejas'' comunica con claridad el destino del envío sin añadir elementos ajenos al texto.'
- source_word: ወአባግዕ አኃዙ ይቅትልዎሙ
  english_pob_choice: but the sheep began to kill them
  chosen_spanish: pero las ovejas comenzaron a matarlos
  alternatives_spanish:
  - pero las ovejas se apoderaron de ellos para matarlos
  - pero las ovejas los agarraron para matarlos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Comenzaron a matarlos'' sigue de cerca la lectura principal del audit trail y conserva la escalada hostil. Aunque el ge''ez puede admitir una lectura más concreta de aprehensión, el español principal mantiene la ambigüedad sin resolverla excesivamente.'
theological_decisions:
- issue: Título del figura divina en la alegoría
  english_pob_reading: Lord / the Lord of the sheep
  chosen_spanish_reading: Señor / el Señor de las ovejas
  alternative_spanish_readings:
  - dueño
  - maestro
  rationale: En esta visión alegórica, la figura del dueño/pastor representa a Dios como soberano del rebaño. 'Señor' preserva esa carga teológica, mientras que 'dueño' o 'maestro' reducirían indebidamente el alcance reverencial del término.
  doctrine_reference: Principio de fidelidad semántica con tensión teológica preservada; uso consistente de 'Señor' para figuras divinas cuando el contexto lo exige.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto inglés que elimina la repetición incómoda de 'again' al final de la fórmula. En español se evita una duplicación equivalente ('otra vez... otra vez') por la misma razón de fluidez, sin perder el valor repetitivo de 'otra vez'. También se consideró la nota del audit trail sobre la posibilidad de leer el final como 'se apoderaron de ellos para matarlos'; esa alternativa se conserva como nota, pero no se fuerza en el texto principal.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para la figura divina, en línea con el criterio POB de no ocultar el nombre/título teológico cuando el contexto alude al gobernante del rebaño.
  - '''Ovejas'' se conserva de forma consistente para el grupo simbólico; ''rebaño'' no sustituye al término del verso para no introducir una paráfrasis no atestiguada.'
  - 'La secuencia verbal conserva el paralelismo narrativo: visión -> descarriarse -> abandonar -> llamar/enviar -> violencia.'
