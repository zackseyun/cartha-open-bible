translation:
  language: es
  text: Y agua, y oscuridad, y bruma[a] aumentaron sobre ella[d]; y miré la altura de aquella agua[b], y aquella agua se elevó sobre ese recinto[c], y desbordó el recinto y quedó sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'niebla'. El término ge'ez denota una obscuridad vaporosa que acompaña al agua y a la oscuridad.
    reason: lexical_alternative
  - marker: b
    text: La repetición de 'agua' en singular probablemente conserva la imagen de inundación en el contexto, pero la traducción mantiene la redacción ge'ez en vez de explicitarla.
    reason: cultural_note
  - marker: c
    text: '''Recinto'' puede referirse más específicamente a un redil o un patio cercado dentro del simbolismo de la visión.'
    reason: lexical_alternative
  - marker: d
    text: 'O: ''Y sobre ella vinieron agua, oscuridad y bruma''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወበዝኀ / ወበዝን
  english_pob_choice: increased upon it
  chosen_spanish: aumentaron sobre ella
  alternatives_spanish:
  - se acumularon sobre ella
  - se multiplicaron sobre ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido adjudicado es de aumento/intensificación, no de simple aparición. En español, 'aumentaron sobre ella' conserva la idea dinámica y el tono visionario sin forzar una explicación interpretativa adicional.
- source_word: ማይ
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  - inundación
  - aguas de inundación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular repetido en el ge'ez se puede conservar naturalmente como sustantivo de masa en español. 'Agua' mantiene la literalidad y deja que el contexto sugiera la imagen de diluvio sin convertirla en una paráfrasis.
- source_word: ጽልመት
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - sombra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Oscuridad'' es claro y digno en español actual. ''Tinieblas'' también sería posible, pero ''oscuridad'' evita un tono más bíblico-tradicional si no lo exige el contexto.'
- source_word: ጊሜ
  english_pob_choice: mist
  chosen_spanish: bruma
  alternatives_spanish:
  - niebla
  - neblina
  - vaho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Bruma'' comunica una neblina vaporosa acompañando agua y oscuridad, y corresponde bien al valor semántico señalado por la auditoría. ''Niebla'' es alternativa válida, pero ''bruma'' conserva mejor el matiz leve y atmosférico.'
- source_word: አሬኢ
  english_pob_choice: I looked
  chosen_spanish: miré
  alternatives_spanish:
  - vi
  - observé
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En narración visionaria, 'miré' es natural y preserva el acto de atención del vidente sin desplazarlo a una simple percepción pasiva.
- source_word: መልዕልተ
  english_pob_choice: height
  chosen_spanish: altura
  alternatives_spanish:
  - parte alta
  - cima
  - nivel superior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Altura'' reproduce bien la verticalidad del original en dos lugares del verso: la altura del agua y el subir por encima del recinto. Es idiomático y no introduce una interpretación adicional.'
- source_word: ዐጸድ
  english_pob_choice: enclosure
  chosen_spanish: recinto
  alternatives_spanish:
  - corral
  - cercado
  - redil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Recinto'' es suficientemente amplio para el ámbito simbólico del texto sin imponer de inmediato ''redil'' o ''aprisco''. Conserva el carácter cerrado del espacio y funciona bien en español contemporáneo.'
- source_word: ይከዑ
  english_pob_choice: it poured over
  chosen_spanish: desbordó
  alternatives_spanish:
  - se derramó sobre
  - vertió sobre
  - pasó por encima de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Desbordó'' comunica con fuerza el paso del agua sobre los límites del recinto y mantiene la imagen de inundación. Aunque el sujeto en el original es el agua, en español el verbo intransitivo expresa con naturalidad ese movimiento.'
- source_word: ቆመ
  english_pob_choice: stood
  chosen_spanish: quedó
  alternatives_spanish:
  - permaneció
  - estuvo
  - se mantuvo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Quedó sobre la tierra'' reproduce el resultado duradero del verbo semítico de estar/erigirse/permancer, sin sonar forzado en español. ''Estuvo'' o ''permaneció'' serían posibles, pero ''quedó'' capta mejor el estado final después del desbordamiento.'
theological_decisions:
- issue: Mantener la imagen del agua en singular sin convertirla explícitamente en 'diluvio'
  english_pob_reading: Retain the repeated 'water' rather than interpretively rendering 'floodwaters'.
  chosen_spanish_reading: Conservar 'agua' en singular repetido, sin sustituirlo por 'diluvio' o 'aguas de inundación' en el texto principal.
  alternative_spanish_readings:
  - aguas de inundación
  - el diluvio
  rationale: La evidencia ge'ez repite 'agua', y la auditoría inglesa decidió no explicitar la interpretación de inundación en el cuerpo del texto. El español puede conservar esa sobriedad y permitir que el lector infiera el contexto apocalíptico.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo traducir el espacio simbólico ዐጸድ
  english_pob_reading: '''Enclosure'' may refer more specifically to a fold or fenced court within the vision''s animal symbolism.'
  chosen_spanish_reading: Usar 'recinto' sin especificar 'redil' en el texto principal.
  alternative_spanish_readings:
  - redil
  - corral
  - cercado
  rationale: '''Recinto'' preserva la ambigüedad controlada del original y evita fijar prematuramente la imagen en un redil de ovejas, algo que el verso por sí solo no exige. La lectura simbólica sigue abierta para el contexto mayor de la visión.'
  doctrine_reference: Translation philosophy §3, §4
- issue: Valor de ጊሜ como término de obscuración atmosférica
  english_pob_reading: mist
  chosen_spanish_reading: bruma
  alternative_spanish_readings:
  - niebla
  - neblina
  rationale: El ge'ez combina agua, oscuridad y un elemento vaporoso. 'Bruma' mantiene ese campo semántico sin sobrecargar el verso ni volverlo demasiado coloquial.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que el verbo ge'ez subyacente significa 'aumentar/multiplicarse' y no 'venir'. Por eso el borrador español evita una formulación de aparición y traduce el movimiento como intensificación sobre el objeto. También se tuvo en cuenta la observación de que el texto conserva deliberadamente 'agua' en singular y no explicita 'floodwaters' en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene 'agua' en singular en concordancia con la decisión inglesa de preservar el término repetido del ge'ez.
  - Se usa 'recinto' en lugar de un término más estrecho como 'redil' para no sobretraducir el símbolo.
  - '''Bruma'' conserva el matiz atmosférico y no compite con ''oscuridad'' en el mismo campo semántico.'
  - Los marcadores de nota se aplican solo a los lugares donde existe una alternativa real documentada en el audit trail.
