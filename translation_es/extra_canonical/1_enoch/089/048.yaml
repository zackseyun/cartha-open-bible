translation:
  language: es
  text: Y aquel carnero posterior se levantó y condujo a las ovejas; y aquel carnero engendró muchas ovejas y se acostó[a]. Y una oveja pequeña[b] se convirtió en un carnero en su lugar[c][d], y llegó a ser gobernante y líder de aquellas ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Se acostó» probablemente funciona en esta visión como un modismo para su muerte, pero el texto principal conserva la imagen literal.
    reason: lexical_alternative
  - marker: b
    text: «Pequeña» también puede sugerir «joven»; el ge'ez permite ambas posibilidades.
    reason: lexical_alternative
  - marker: c
    text: O «Y aquel carnero posterior».
    reason: previous_rendering
  - marker: d
    text: O «la oveja pequeña».
    reason: previous_rendering
lexical_decisions:
- source_word: ዳሓራዊ
  english_pob_choice: afterward
  chosen_spanish: aquel
  alternatives_spanish:
  - posterior
  - siguiente
  - de después
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El valor revisado de ዳሓራዊ aquí no es adverbial sino adjetival: ‘lateral/laterior/segundo’. En español, el contraste se puede naturalizar con ‘aquel’ unido al sustantivo ‘ram’, sin forzar un adverbio que desalinearía la gramática del ge''ez.'
- source_word: ሐርጌ
  english_pob_choice: ram
  chosen_spanish: ram
  alternatives_spanish:
  - macho de oveja
  - carnero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Ram’ conserva la figura diferenciada de liderazgo animal del apocalipsis de las ovejas. Aunque ‘carnero’ es posible, ‘ram’ mantiene mejor la correspondencia con la tradición auditada del POB y evita una equivalencia más libre.
- source_word: ተንሥአ
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  - resucitó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo describe el inicio de acción y liderazgo. ‘Se levantó’ es natural en español y preserva el movimiento narrativo sin introducir la carga específica de ‘resucitó’.
- source_word: መርሖሙ
  english_pob_choice: led
  chosen_spanish: condujo
  alternatives_spanish:
  - guió
  - los lideró
  - dirigió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Condujo’ mantiene el acto de dirigir a un grupo concreto y funciona bien en el registro figurado del texto. ‘Guió’ también sería posible, pero ‘condujo’ conserva mejor la idea de movimiento/mandato sobre el rebaño.
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  - ovejas del rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el referente concreto de animales. ‘Ovejas’ es más transparente en español que ‘rebaño’, que abstraería indebidamente la imagen.
- source_word: ወሊደ
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró como padre
  - tuvo
  - procreó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Engendró’ refleja con fuerza la generación paterna presente en el verbo y evita suavizarla con ‘tuvo’. Es un término bíblico y suficientemente claro para español culto.
- source_word: ሰከበ
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - se tendió
  - se echó
  - durmió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB inglesa mantiene la imagen literal, aunque señala la posible muerte en nota. En español, ‘se acostó’ reproduce mejor la imagen visible del sueño/visionario sin resolver el posible sentido de muerte en el cuerpo del texto.
- source_word: ንኡስ
  english_pob_choice: little
  chosen_spanish: pequeña
  alternatives_spanish:
  - pequeña o joven
  - menor
  - joven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Pequeña’ conserva la ambigüedad de tamaño y permite, sin decidirlo en exceso, la posible lectura de juventud. En el contexto visionario, es una equivalencia natural para el diminutivo.
- source_word: ህየንቴሁ
  english_pob_choice: in its place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - como su sucesor
  - en lugar de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘En su lugar’ expresa sucesión/reemplazo sin sobreinterpretar el mecanismo político. Es la forma más idiomática en español para la función del sintagma.
- source_word: መኰንነ
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - príncipe
  - gobernador
  - señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Gobernante’ comunica autoridad de forma amplia y no excesivamente técnica. Evita títulos históricos específicos que no exige el texto.
- source_word: መራሔ
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - guía
  - caudillo
  - pastor
  lexicon: Dillmann, Lexicon Lingae Aethiopicae
  rationale: ‘Líder’ refleja el rol de dirección sin introducir un matiz pastoral que no está explícito en el sustantivo. Se mantiene la distinción entre la acción de conducir y el cargo de liderazgo.
theological_decisions:
- issue: Cómo representar la sucesión simbólica del ram y la oveja pequeña sin resolver el allegorismo histórico
  english_pob_reading: A little sheep became a ram in its place
  chosen_spanish_reading: Una oveja pequeña se convirtió en un ram en su lugar
  alternative_spanish_readings:
  - Una oveja joven se convirtió en un ram en su lugar
  - Una pequeña oveja se convirtió en un carnero en su lugar
  rationale: 'La imagen debe conservar su carácter visionario: no conviene convertirla en una paráfrasis histórica explícita. El español mantiene la transformación simbólica y la relación de reemplazo, sin explicar quiénes son los personajes representados.'
  doctrine_reference: Preservar la tensión apocalíptica y la imaginería visionaria sin interpretarla de más.
- issue: Si el último miembro de la cláusula duplicada debe mantenerse o suavizarse
  english_pob_reading: it became ruler and leader of those sheep
  chosen_spanish_reading: llegó a ser gobernante y líder de aquellas ovejas
  alternative_spanish_readings:
  - se convirtió en gobernante y líder de aquellas ovejas
  - llegó a ser gobernante y conductor de aquellas ovejas
  rationale: 'El ge''ez distingue dos funciones: autoridad y liderazgo. El español mantiene ambas, aunque con una coordinación fluida, para no borrar la repetición semántica que el texto conserva.'
  doctrine_reference: Respetar la doble designación de autoridad sin fusionarla indebidamente.
translation_notes:
  revision_awareness: 'La base inglesa del POB fue revisada: se corrigió el arranque de 1 Enoc 89:48 para reflejar que ዳሓራዊ modifica a ‘ram’ como ‘lateral/laterior/segundo’ y no como ‘afterward’. También se eliminó una duplicación textual y se mantuvo la ambigüedad de ንኡስ (‘little/young’) y de ሰከበ (‘lay down’), cuya posible implicación de muerte queda fuera del cuerpo principal. La versión española sigue esas decisiones auditadas y conserva la imaginería del texto.'
  spanish_consistency_notes:
  - Se usa ‘ram’ de manera consistente para la figura del macho de oveja, según la terminología auditada del POB.
  - Se usa ‘ovejas’ en plural para አባግዕ y ‘oveja pequeña’ para በግዕ ንኡስ, respetando la diferencia singular/plural del texto revisado.
  - ‘En su lugar’ comunica reemplazo sin introducir una interpretación histórica no explicitada.
  - Se conserva la doble autoridad con ‘gobernante y líder’ para reflejar መኰንነ y መራሔ por separado.
  - La construcción ‘se acostó’ mantiene la imagen literal del verbo, sin resolver la posible alusión a muerte en el texto principal.
