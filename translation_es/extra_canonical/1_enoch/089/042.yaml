review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del ge''ez y del audit trail inglés: los depredadores comienzan a devorar a las ovejas, y luego el Señor de las ovejas levanta de entre ellas a un líder. Se preservan adecuadamente «comenzaron», «aquellas ovejas», «el Señor de las ovejas», «de entre ellas» y «carnero». También es correcto no añadir vocabulario pastoral más fuerte que el verbo ‘guiar/lead’. Sin embargo, «zorrinos» no corresponde al valor léxico documentado para ቈናጽል, cuyo campo semántico en el expediente inglés es «zorros» con posible solapamiento hacia «chacales», no el animal español normalmente entendido como mofeta/skunk. Además, falta en español la nota textual sobre la variante alrededor de «un carnero», que el POB inglés conserva explícitamente.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «zorrinos» resulta engañoso e introduce un referente animal incorrecto para la mayoría de lectores hispanos. «Zorros» es natural y fiel en el cuerpo del texto, con nota que preserve la alternativa «chacales». La frase restante fluye bien en español eclesial neutro. Conviene también anclar una nota textual en «un carnero» para reflejar la evidencia editorial ya documentada.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Señor» aquí es apropiado porque el ge'ez dice «el Señor de las ovejas», no el nombre divino Yahvé. «Carnero» para ሐርጌ está bien. La corrección principal es alinear ቈናጽል con «zorros» en vez de «zorrinos», preservando «chacales» como alternativa en nota.
  issues:
  - severity: high
    issue: «zorrinos» traduce mal ቈናጽል
    rationale: En español común, «zorrino» significa mofeta/skunk, no un cánido tipo zorro/chacal. Esto altera el referente zoológico y rompe la fidelidad al expediente léxico, que favorece «foxes» con posible alternativa «jackals».
  - severity: medium
    issue: Falta la nota textual sobre la lectura difícil alrededor de «un carnero»
    rationale: El POB inglés conserva una nota importante de variante textual. La instrucción pide preservar alternativas significativas en notas cuando el inglés las preservó. El español debe reflejar esa nota con marcador propio en el texto.
  revised_spanish_text: Y los perros, los zorros[a] y los jabalíes del campo comenzaron a devorar a aquellas ovejas, hasta que el Señor de las ovejas levantó de entre ellas un carnero[b] para que las guiara.
  revised_footnotes:
