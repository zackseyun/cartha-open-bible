translation:
  language: es
  text: Y los perros, los zorros[a] y los jabalíes del campo comenzaron a devorar a aquellas ovejas, hasta que el Señor de las ovejas levantó de entre ellas un carnero[b] para que las guiara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término del etíope puede, en algunos contextos, solaparse con un sentido más amplio de canino carroñero o depredador, como «chacales».
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula entre corchetes en el OCR sugiere una lectura difícil o variante en torno a «un carnero». El sentido del versículo es claro: se levanta de entre el rebaño un solo macho de oveja como líder.'
    reason: textual_variant
lexical_decisions:
- source_word: አኃዙ
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  - se pusieron a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor ingesivo de la construcción pide marcar el inicio de la acción. «Comenzaron» conserva ese matiz narrativo sin volverlo pesado.
- source_word: አክላብ
  english_pob_choice: dogs
  chosen_spanish: perros
  alternatives_spanish:
  - canes
  - hounds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el término animal ordinario y directo. «Perros» comunica con naturalidad el referente sin añadir especialización.
- source_word: ቈናጽል
  english_pob_choice: foxes
  chosen_spanish: zorrinos[a]
  alternatives_spanish:
  - zorros
  - chacales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail inglés señala una posible amplitud semántica hacia un canino carroñero o depredador, no solo «foxes» en sentido estrecho. En español, «zorrinos» aquí intenta capturar esa zona léxica de animal parecido al zorro/chacal, manteniendo la nota de alternativa léxica.
- source_word: ሐራዊያ ሐቅል
  english_pob_choice: wild boars of the field
  chosen_spanish: jabalíes del campo
  alternatives_spanish:
  - puercos salvajes del campo
  - jabalíes silvestres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase alude a cerdos salvajes en un ámbito abierto. «Jabalíes del campo» conserva la imaginería violenta y el complemento locativo del original.
- source_word: ይብልዕዎሙ
  english_pob_choice: devour them
  chosen_spanish: devorar a aquellas ovejas
  alternatives_spanish:
  - comer a aquellas ovejas
  - consumir a aquellas ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un contexto alegórico de destrucción, «devorar» transmite mejor la violencia que «comer».
- source_word: ዝኩ አባግዕ
  english_pob_choice: those sheep
  chosen_spanish: aquellas ovejas
  alternatives_spanish:
  - estas ovejas
  - las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo señala un grupo ya presente en la visión. «Aquellas» mantiene esa referencia deíctica.
- source_word: እስከ አንሥአ
  english_pob_choice: until ... raised up
  chosen_spanish: hasta que ... levantó
  alternatives_spanish:
  - hasta que ... alzó
  - hasta que ... levantó en alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Levantó» conserva el sentido de elevar/proveer una figura dirigente desde el grupo, con buena fluidez en español.
- source_word: እግዚአ አባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el Dueño de las ovejas
  - el Maestro de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título tradicional del pasaje visionario con mayúscula reverencial, coherente con la lectura elevada del original.
- source_word: ፩እምኔሆሙ
  english_pob_choice: one ... from among them
  chosen_spanish: un carnero de entre ellas
  alternatives_spanish:
  - uno de entre ellas
  - uno de ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión marca surgimiento desde dentro del rebaño. «De entre ellas» conserva mejor ese origen interno que un simple «uno de ellas».
- source_word: ሐርጌ
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - macho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Carnero» es el equivalente natural en español para el macho de la oveja y preserva la distinción simbólica frente al rebaño.
- source_word: ዘይመርሖሙ
  english_pob_choice: to lead them
  chosen_spanish: para que las guiara
  alternatives_spanish:
  - para conducirlas
  - para dirigirlas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Guiara» expresa conducción/guía sin introducir explícitamente vocabulario pastoral que el verbo no exige.
theological_decisions:
- issue: Título divino en la alegoría
  english_pob_reading: the Lord of the sheep
  chosen_spanish_reading: el Señor de las ovejas
  alternative_spanish_readings:
  - el Dueño de las ovejas
  - el Maestro de las ovejas
  rationale: El título en el apocalipsis animal tiene peso teológico y no debe rebajarse a mera propiedad. «Señor» preserva la autoridad elevada y el registro reverencial del texto.
  doctrine_reference: Translate titles; preserve theological tension rather than reduce imagery.
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del etíope y el audit trail inglés, especialmente en la secuencia ingesiva «comenzaron a devorar», el título «Señor de las ovejas» y la clausula final con «un carnero de entre ellas» como lectura más estable del pasaje, sin ocultar la variante textual indicada en el OCR.
  spanish_consistency_notes:
  - Se mantiene «ovejas» para el grupo simbólico en todo el versículo.
  - Se conserva la distinción entre animales depredadores y el «carnero» levantado como líder.
  - 'El título divino se traduce de forma consistente con mayúscula reverencial: «Señor de las ovejas».'
  - No se introduce lenguaje pastoral adicional más allá de lo exigido por el verbo «guiar».
