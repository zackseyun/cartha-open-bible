  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/049.yaml
  text: And those sheep grew and multiplied[a], and all those dogs and foxes and wild boars of the field feared and fled from them. And that ram gored and killed all the beasts, and those beasts were no longer able to be again in the midst of the sheep[e][d][c][b], and they did not seize anything from them.
