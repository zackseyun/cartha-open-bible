translation:
  language: es
  text: Y aquellas ovejas crecieron y se multiplicaron[a], y todos aquellos perros, zorros[b] y jabalíes del campo temieron y huyeron de ellas. Y aquel carnero embistió[c] y mató a todas las bestias, y aquellas bestias ya no pudieron volver a estar en medio de las ovejas[d], y no arrebataron nada de ellas[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «crecieron y llegaron a ser muchas».
    reason: alternative_reading
  - marker: b
    text: El término que aquí se traduce como «zorros» también puede entenderse como un animal semejante al chacal.
    reason: lexical_alternative
  - marker: c
    text: O «golpeó». En el contexto de un carnero, la idea es la de una embestida con los cuernos.
    reason: lexical_alternative
  - marker: d
    text: O «quedarse/estar nuevamente». La expresión subraya que ya no podían volver a ocupar ese espacio entre las ovejas.
    reason: alternative_reading
  - marker: e
    text: La cláusula final enfatiza que las bestias hostiles ya no podían llevarse nada de las ovejas.
    reason: cultural_note
lexical_decisions:
- source_word: ልህቁ / በዝኁ
  english_pob_choice: grew and multiplied
  chosen_spanish: crecieron y se multiplicaron
  alternatives_spanish:
  - crecieron y aumentaron
  - crecieron y llegaron a ser muchas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Los dos verbos ge''ez no son redundantes: uno expresa crecimiento o aumento de tamaño/estado y el otro multiplicación numérica. En español, «crecieron y se multiplicaron» conserva esa doble progresión sin diluirla.'
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En la alegoría apocalíptica conviene mantener la imagen concreta del animal. «Ovejas» es más directo y visual que «rebaño».
- source_word: አክላብ
  english_pob_choice: dogs
  chosen_spanish: perros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término zoológico directo; «perros» conserva la literalidad de la imagen animal.
- source_word: ቈናጽል
  english_pob_choice: foxes
  chosen_spanish: zorros
  alternatives_spanish:
  - chacales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede designar un animal tipo zorro o chacal. «Zorros» es la opción más natural en español y mantiene el valor de depredador/carroñero sin sobreespecificar la zoología.
- source_word: ሐራዊያ ገዳም
  english_pob_choice: wild boars of the field
  chosen_spanish: jabalíes del campo
  alternatives_spanish:
  - cerdos salvajes del desierto
  - jabalíes del desierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase remite a cerdos/jabalíes salvajes en terreno no cultivado. «Del campo» sigue de cerca la formulación del POB inglés y suena idiomático en español bíblico.
- source_word: ፈርሁ ወነፍጹ እምኔሁ
  english_pob_choice: feared and fled from them
  chosen_spanish: temieron y huyeron de ellas
  alternatives_spanish:
  - les tuvieron miedo y escaparon de ellas
  - temieron y se alejaron de ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Los dos verbos conservan tanto el temor interno como el retroceso visible. «Huyeron» mantiene la fuerza narrativa de la retirada.
- source_word: ሐርጌ
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho oveja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Carnero» preserva la imagen concreta del macho ovino y su posible simbolismo de liderazgo. Es más natural que una glosa explicativa.
- source_word: ጐድአ
  english_pob_choice: gored
  chosen_spanish: embistió
  alternatives_spanish:
  - acorraló
  - acometió
  - dió un topetazo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el verbo puede significar «golpear/pegar», en un carnero la acción específica es la embestida con los cuernos. «Embestió» conserva esa precisión zoomórfica mejor que «golpeó» o «mató».
- source_word: አራዊተ / አራዊት
  english_pob_choice: beasts
  chosen_spanish: bestias
  alternatives_spanish:
  - animales salvajes
  - fieras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el registro apocalíptico, «bestias» mantiene el tono hostil y simbólico mejor que el más neutro «animales».
- source_word: አክህሉ ዳግመ
  english_pob_choice: were no longer able again
  chosen_spanish: ya no pudieron volver a
  alternatives_spanish:
  - ya no pudieron otra vez
  - ya no fueron capaces de volver a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa una incapacidad renovada o reiterativa. «Ya no pudieron volver a» conserva tanto la negación como la idea de reingreso/retorno.
- source_word: ማእከለ አባግዕ
  english_pob_choice: to be in the midst of the sheep
  chosen_spanish: estar en medio de las ovejas
  alternatives_spanish:
  - estar entre las ovejas
  - permanecer en medio de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En medio de» reproduce la imagen espacial del original y del POB inglés, sin convertirla en un comentario interpretativo.
- source_word: ምንትኒ ገሙራ ኢመሠጡ እምኔሆሙ
  english_pob_choice: they did not seize anything from them
  chosen_spanish: no arrebataron nada de ellas
  alternatives_spanish:
  - no tomaron nada de ellas
  - no saquearon nada de ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El final subraya el cese completo del pillaje o rapto depredador. «Arrebataron» comunica mejor la violencia del acto que «tomaron».
theological_decisions:
- issue: Conservar la alegoría animal sin decodificarla históricamente en el texto principal
  english_pob_reading: Preserve the animal imagery in the main text without decoding it into human nations or factions.
  chosen_spanish_reading: Conservar la imaginería animal sin identificarla en la traducción principal con naciones, grupos o figuras humanas.
  alternative_spanish_readings:
  - Interpretar abiertamente las ovejas, perros, zorros y jabalíes como pueblos o facciones
  - Añadir una paráfrasis explicativa en el cuerpo del texto
  rationale: El pasaje pertenece al tejido visionario del Animal Apocalypse. La fidelidad a la fuente exige mantener la escena zoológica como tal, dejando cualquier identificación histórica fuera del texto principal.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve apocalyptic imagery'
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección de revisión que distinguió ልህቁ como «crecer» y በዝኁ como «multiplicarse», así como la observación final que prefirió una acción más precisa para el carnero en contexto zoomórfico. Por eso se evitó la duplicación semántica y se eligió una formulación española que conserva ambos verbos. También se respetó la revisión que eliminó una duplicación accidental en el borrador inglés y aclaró la clausula final de imposibilidad de reingreso entre las ovejas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
  - Se preserva la imaginería animal en todo el verso, sin traducción interpretativa de los referentes humanos ocultos.
  - «Bestias» se usa de forma consistente para el grupo hostil, en línea con el valor apocalíptico del inglés POB.
  - La secuencia verbal «crecieron y se multiplicaron» reproduce la duplicación aspectual del ge'ez sin sonar forzada en español.
