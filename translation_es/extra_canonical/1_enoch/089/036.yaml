translation:
  language: es
  text: Y vi en la visión hasta que aquella oveja se convirtió en un hombre[a], y edificó una casa[b] para el Señor de las ovejas, y puso a todas las ovejas en aquella casa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El que la oveja se convirtiera en «un hombre» forma parte de la transformación simbólica de la visión; la traducción deja la figura sin identificar en vez de imponer una interpretación.
    reason: cultural_note
  - marker: b
    text: «Casa» probablemente tiene aquí matices de santuario o templo, pero el término ge'ez es simplemente «casa».
    reason: lexical_alternative
  - marker: c
    text: 'O: «e hizo que todas las ovejas estuvieran de pie».'
    reason: previous_rendering
lexical_decisions:
- source_word: በግዕ
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - carnero
  lexicon: Dillmann
  rationale: En la visión apocalíptica se mantiene la imagen genérica del animal del rebaño; 'oveja' preserva mejor el símbolo que 'cordero' o 'carnero', que serían más específicos de edad o sexo.
- source_word: ኮነ ብእሴ
  english_pob_choice: became a man
  chosen_spanish: se convirtió en un hombre
  alternatives_spanish:
  - se hizo hombre
  - se volvió humano
  lexicon: Dillmann
  rationale: La construcción verbal sugiere transformación dentro de la visión. 'Se convirtió en un hombre' conserva ese cambio figurativo sin identificar al personaje.
- source_word: ሐነጸ ቤተ
  english_pob_choice: built a house
  chosen_spanish: edificó una casa
  alternatives_spanish:
  - construyó una casa
  - edificó un templo
  lexicon: Dillmann
  rationale: El ge'ez dice literalmente 'casa'. 'Edificó' mantiene un registro elevado y natural en español, sin introducir 'templo' en el texto principal más allá de lo que el contexto sugiere.
- source_word: ለእግዚአ አባግዕ
  english_pob_choice: for the Lord of the sheep
  chosen_spanish: para el Señor de las ovejas
  alternatives_spanish:
  - para el dueño de las ovejas
  - para el maestro de las ovejas
  lexicon: Dillmann
  rationale: '''Señor'' reproduce el valor de እግዚአ en un registro reverente y coincide con la designación elevada del personaje divino en la obra.'
- source_word: አቀሞሙ
  english_pob_choice: placed all the sheep
  chosen_spanish: puso a todas las ovejas
  alternatives_spanish:
  - colocó a todas las ovejas
  - hizo que todas las ovejas estuvieran de pie
  lexicon: Dillmann
  rationale: El causativo admite la idea de poner/colocar. 'Puso' suena natural en español y evita una literalidad áspera, sin perder la acción de situarlas en la casa.
- source_word: በውእቱ ቤት
  english_pob_choice: in that house
  chosen_spanish: en aquella casa
  alternatives_spanish:
  - dentro de aquella casa
  - en esa casa
  lexicon: Dillmann
  rationale: '''Aquella'' conserva la deixis narrativa y el distanciamiento del relato visionario.'
theological_decisions:
- issue: ¿Traducir ቤተ como 'casa' o interpretarlo como 'templo'?
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  - santuario
  rationale: La fuente ge'ez usa 'casa' y la filosofía de traducción favorece mantener esa imagen primaria. Aunque el contexto apunta a connotaciones cultuales, estas se dejan implícitas en lugar de importarlas al texto principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Identidad de la oveja que se convierte en hombre
  english_pob_reading: left implicit in the translation
  chosen_spanish_reading: se mantiene implícita
  alternative_spanish_readings:
  - Moisés
  - un líder representando a Moisés o a Israel
  rationale: La identificación simbólica pertenece a la interpretación del pasaje, no a la traducción. El texto español conserva la figura visionaria sin resolverla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta el contexto auditado en inglés y la revisión que suavizó 'made all the sheep stand' a una formulación más natural. En español se optó por 'puso' para reflejar el causativo sin introducir una calca incómoda.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para እግዚአ en consonancia con el registro reverente del texto y con la terminología POB.
  - Se conservó 'oveja' de forma uniforme para በግዕ, evitando alternar con términos más específicos que debiliten el símbolo animal.
  - Se preservó 'casa' sin interpretarlo como 'templo' en el cuerpo principal, dejando la posible carga cultual en nota.
