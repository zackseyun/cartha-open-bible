translation:
  language: es
  text: Y cuando lo vieron, tuvieron miedo y temblaron delante de su rostro[a]; y desearon volver a sus propios rediles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «delante de su rostro»; giro vívido para estar en su presencia.
    reason: lexical_alternative
  - marker: b
    text: El término probablemente alude a rediles o apriscos de animales; «rediles» preserva la imaginería ovina de la visión.
    reason: cultural_note
lexical_decisions:
- source_word: ርእይዎ
  english_pob_choice: they saw him
  chosen_spanish: lo vieron
  alternatives_spanish:
  - lo observaron
  - lo contemplaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez es el verbo común de ver, con objeto pronominal masculino. «Lo vieron» reproduce el sentido directo y el flujo narrativo sin sobrecargar el texto.
- source_word: ፈርሁ
  english_pob_choice: they were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - temieron
  - les dio miedo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma expresa temor real e inmediato. «Tuvieron miedo» suena natural en español moderno y conserva la fuerza emocional.
- source_word: ወርዕዱ
  english_pob_choice: and trembled
  chosen_spanish: y temblaron
  alternatives_spanish:
  - y se estremecieron
  - y se conmovieron de temor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término intensifica el miedo con una reacción física. «Temblaron» mantiene el paralelo con la traducción inglesa y el registro apocalíptico.
- source_word: እምቅድመ ገጹ
  english_pob_choice: before his face
  chosen_spanish: delante de su rostro
  alternatives_spanish:
  - ante su rostro
  - en su presencia
  - delante de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La expresión es literalmente vívida: «frente/antes de su rostro». «Delante de su rostro» conserva esa imagen semítica sin neutralizarla demasiado en «en su presencia».'
- source_word: ወፈቀዱ
  english_pob_choice: and they desired
  chosen_spanish: y desearon
  alternatives_spanish:
  - y quisieron
  - y anhelaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo denota querer o desear. «Desearon» mantiene el tono elevado del relato visionario.
- source_word: ከመ ይግብኡ
  english_pob_choice: to return
  chosen_spanish: volver
  alternatives_spanish:
  - regresar
  - volver atrás
  lexicon: Dillmann, Lexicon Lingae Aethiopicae
  rationale: En contexto narrativo el sentido es moverse de vuelta. «Volver» es la opción más natural y fiel al movimiento implícito.
- source_word: ለአዕጻዲ ዚአሆሙ
  english_pob_choice: to their own folds
  chosen_spanish: a sus propios rediles
  alternatives_spanish:
  - a sus propios apriscos
  - a sus propios cercados
  - a sus propios rediles de ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto de la Apocalipsis de los Animales pide conservar la imaginería animal. «Rediles» comunica el lugar de resguardo para ovejas y mantiene la fuerza simbólica mejor que una generalización como «hogares».
theological_decisions:
- issue: Conservar la imaginería animal del pasaje
  english_pob_reading: retain 'folds' rather than a generic 'homes' or 'places'
  chosen_spanish_reading: conservar «rediles» en vez de generalizar a «hogares» o «lugares»
  alternative_spanish_readings:
  - sus casas
  - sus lugares
  - sus enclosures
  rationale: La sección pertenece a la Apocalipsis de los Animales y funciona simbólicamente con lenguaje de rebaño. Generalizarlo borraría una tensión literaria y teológica importante del texto.
  doctrine_reference: 'Contexto literario de 1 Enoc: preservar la imaginería apocalíptica animal.'
translation_notes:
  revision_awareness: Se siguió el trazado auditado del inglés POB y se verificó que no hubo revisiones posteriores que alteraran las decisiones. Se mantuvo la imagen animal de la visión y la expresión semítica «delante de su rostro» sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se usó «rostro» para preservar la imagen bíblica concreta de ገጽ sin reemplazarla por una abstracción.
  - «Rediles» mantiene el plural posesivo y el ámbito de animales de la visión.
  - 'El orden de las acciones sigue el original: ver, temer, temblar, desear volver.'
