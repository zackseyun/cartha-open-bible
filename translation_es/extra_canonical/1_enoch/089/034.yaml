    rationale: Conviene reformular la nota para que explique que es un giro vívido para «estar en su presencia», en vez de presentar como alternativa algo ya puesto en el cuerpo del texto.
  revised_spanish_text: Y cuando lo vieron, tuvieron miedo y temblaron delante de su rostro[a]; y desearon volver a sus propios rediles[b].
