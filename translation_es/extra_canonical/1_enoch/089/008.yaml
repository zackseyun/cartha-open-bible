    text: 'La revisión auditada entiende aquí un comienzo de acción: ''empezó a descender''.'
    reason: source_note
  - marker: b
    text: El término ge'ez መስቀር fue corregido en la revisión como 'arca' o 'embarcación', no como 'abismo'.
    reason: textual_variant
  - marker: c
    text: La cláusula puede evocar imaginería de creación o restauración, pero se mantiene una formulación cercana al ge'ez sin adoptar de lleno la cadencia de Génesis.
    reason: cross_reference
  revision_rationale: Se corrige 'hacia ellos' a 'en ellos' para reflejar mejor el movimiento del agua hacia dentro de los abismos referidos en el contexto inmediato. Se conserva el resto del verso porque es fiel, natural y teológicamente adecuado. También se normaliza la nota [b] al español.
