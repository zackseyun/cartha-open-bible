translation:
  language: es
  text: Y el agua empezó[a] a descender en ellos hasta que la tierra quedó descubierta; y aquella arca[b] reposó sobre la tierra, y la oscuridad se apartó[c], y apareció la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La revisión auditada entiende aquí un comienzo de acción: ''empezó a descender''.'
    reason: source_note
  - marker: b
    text: El término ge'ez መስቀር fue corregido en la revisión como 'arca' o 'embarcación', no como 'abismo'.
    reason: textual_variant
  - marker: c
    text: La cláusula puede evocar imaginería de creación o restauración, pero se mantiene una formulación cercana al ge'ez sin adoptar de lleno la cadencia de Génesis.
    reason: cross_reference
lexical_decisions:
- source_word: ወአንዘ / ይረድ
  english_pob_choice: began to go down
  chosen_spanish: empezó a descender
  alternatives_spanish:
  - comenzó a bajar
  - empezó a bajar
  lexicon: Dillmann
  rationale: La construcción inceptiva pide en español un inicio de acción; 'empezó a descender' conserva el registro visionario sin sonar demasiado coloquial.
- source_word: ማይ
  english_pob_choice: water
  chosen_spanish: el agua
  alternatives_spanish:
  - las aguas
  lexicon: Dillmann
  rationale: El singular colectivo 'el agua' refleja mejor el sustantivo singular del ge'ez y mantiene la imagen de una masa de agua en movimiento.
- source_word: ውስቴቶሙ
  english_pob_choice: into them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - entre ellos
  - en medio de ellos
  lexicon: Dillmann
  rationale: El referente inmediato son los otros abismos abiertos en 89:7; 'hacia ellos' deja abierta la referencia espacial sin introducir una anatomía falsa ni forzar una localización demasiado precisa.
- source_word: እስክነ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - de modo que
  lexicon: Dillmann
  rationale: Marca un límite temporal claro en español y enlaza bien con el resultado de la acción del agua.
- source_word: ተከሥተ ምድር
  english_pob_choice: the earth was uncovered
  chosen_spanish: la tierra quedó descubierta
  alternatives_spanish:
  - la tierra fue descubierta
  - la tierra quedó al descubierto
  lexicon: Dillmann
  rationale: '''Quedó descubierta'' expresa con naturalidad el estado resultante tras retirarse las aguas y conserva la pasiva/resultativa del original.'
- source_word: መስቀር
  english_pob_choice: vessel / ark
  chosen_spanish: arca
  alternatives_spanish:
  - vasija
  - embarcación
  lexicon: Leslau, CDG 368
  rationale: 'La revisión auditada corrige la lectura anterior: aquí መስቀር se refiere al arca de Noé. ''Arca'' es el término español más preciso y reconocido para este contexto.'
- source_word: ነበረ
  english_pob_choice: rested
  chosen_spanish: reposó
  alternatives_spanish:
  - descansó
  - se asentó
  lexicon: Dillmann
  rationale: '''Reposó'' comunica el asentamiento del arca sobre la tierra con dignidad literaria y mantiene el valor de reposo/estabilidad indicado por el verbo.'
- source_word: ውስተ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el suelo
  lexicon: Dillmann
  rationale: '''Sobre'' expresa mejor el contacto de apoyo del arca con la superficie terrestre.'
- source_word: ተገኅሰት ጽልመት
  english_pob_choice: the darkness departed
  chosen_spanish: la oscuridad se apartó
  alternatives_spanish:
  - la oscuridad desapareció
  - la oscuridad fue retirada
  lexicon: Dillmann
  rationale: '''Se apartó'' preserva la idea de retirada o alejamiento sin convertirla en una mera desaparición abstracta.'
- source_word: ኮነ ብርሃን
  english_pob_choice: light appeared
  chosen_spanish: apareció la luz
  alternatives_spanish:
  - hubo luz
  - la luz vino a ser
  lexicon: Dillmann
  rationale: '''Apareció'' expresa la emergencia de la luz con naturalidad en español y evita una fórmula demasiado rígida.'
theological_decisions:
- issue: Referente de መስቀር en el relato del diluvio
  english_pob_reading: that vessel rested upon the earth
  chosen_spanish_reading: aquel arca reposó sobre la tierra
  alternative_spanish_readings:
  - aquel navío reposó sobre la tierra
  - esa embarcación reposó sobre la tierra
  rationale: La corrección filológica obliga a evitar cualquier lectura de 'abismo' aquí. El contexto del relato del diluvio y la revisión auditada muestran que se trata del arca de Noé; 'arca' preserva la referencia teológica e intertextual sin suavizarla.
  doctrine_reference: Lectura histórica/literal del relato del diluvio; fidelidad al referente textual
- issue: Relación entre oscuridad y luz en la cláusula final
  english_pob_reading: and light appeared
  chosen_spanish_reading: y apareció la luz
  alternative_spanish_readings:
  - y hubo luz
  - y la luz apareció
  rationale: Se mantiene la resonancia con imaginería de creación/restauración sin forzar una cita exacta de Génesis. 'Apareció la luz' conserva la tensión intertextual y la forma sencilla del ge'ez.
  doctrine_reference: Preservar la tensión literaria e intertextual sin armonizar
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección importante: መስቀር no significa ''abyss'' aquí, sino ''vessel/ark''; además, la construcción con ወአንዘ + imperfecto se entendió como inceptiva (''began to descend''). La redacción española incorpora esas revisiones y evita la antigua lectura errónea.'
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' solo cuando el texto lo requiera; en este versículo no aparece.
  - '''Arca'' se usa en sentido narrativo de Noé, no como ''arca'' litúrgica.'
  - Se evitó 'SEÑOR' o armonizaciones con Génesis que no están en el ge'ez.
  - La puntuación reproduce el flujo de tres acciones coordinadas con una clausura final luminosa.
