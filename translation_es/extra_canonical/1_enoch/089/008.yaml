  rationale: Se corrige 'hacia ellos' a 'en ellos' para reflejar mejor el movimiento del agua hacia dentro de los abismos referidos en el contexto inmediato. Se conserva el resto del verso porque es fiel, natural y teológicamente adecuado. También se normaliza la nota [b] al español.
