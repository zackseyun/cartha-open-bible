base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/008.yaml
  text: And the water began to go down into them until the earth was uncovered[a]; and that vessel rested upon the earth, and the darkness departed[d][c][b], and light appeared.
  footnotes:
  - marker: a
    text: The Ge'ez noun rendered 'abyss' is difficult and may also be understood as 'chasm,' 'pit,' or 'depth.'
    reason: lexical_alternative
  - marker: b
    text: The line's movement from darkness to light likely evokes creation or restoration imagery, but the wording here is kept close to the Ge'ez rather than conformed to a standard Genesis-style English formula.
    reason: cross_reference
  - marker: c
    text: Or 'that abyss was in the earth'.
    reason: previous_rendering
  - marker: d
    text: Or 'And water descended into their midst'.
    reason: previous_rendering
