revisions:
- from: Y fue a él y le habló solo[a], y levantó a ese carnero[b], y lo hizo gobernante y líder de las ovejas; y a través de todo esto, los perros estaban afligiendo a las ovejas.
  to: Y fue a él, y le habló en privado[a], y levantó a ese carnero[b], y lo hizo gobernante y guía de las ovejas; y en todo esto, los perros estaban oprimiendo a las ovejas.
