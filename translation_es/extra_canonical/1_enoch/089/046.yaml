translation:
  language: es
  text: Y fue a él, y le habló en privado[a], y levantó a ese carnero[b], y lo hizo gobernante y guía de las ovejas; y en todo esto, los perros estaban oprimiendo a las ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión puede entenderse como 'en privado' o 'a solas'; se procura reflejar la idea de exclusividad en el acto de hablar, no un nuevo objeto.
    reason: lexical_alternative
  - marker: b
    text: La revisión textual indica que el término ge'ez aquí significa 'carnero', no 'cuerno'.
    reason: textual_variant
lexical_decisions:
- source_word: ወሖረ
  english_pob_choice: and he went
  chosen_spanish: y fue
  alternatives_spanish:
  - y vino
  - y se acercó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de movimiento se mantiene con una forma natural en español que preserva la secuencia narrativa sin precisar más dirección de la que da el contexto.
- source_word: ኀቤሁ
  english_pob_choice: to it
  chosen_spanish: a él
  alternatives_spanish:
  - a ello
  - hacia él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta visión, la figura del carnero puede recibir referencia masculina en español por el referente animal-personificado; 'a él' evita la frialdad de 'a ello' y conserva la relación directa del habla.
- source_word: ለባሕቲቱ
  english_pob_choice: spoke to it alone
  chosen_spanish: le habló solo[a]
  alternatives_spanish:
  - le habló en privado
  - le habló solamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez señala exclusividad/solitud en el acto de hablar, no un nuevo objeto. Por eso se expresa con 'solo', siguiendo la revisión auditada del inglés y evitando interpretar erróneamente el sintagma como si fuera el carnero.
- source_word: አንሥአ ለውእቱ ሐርጌ
  english_pob_choice: raised up that ram
  chosen_spanish: levantó a ese carnero[b]
  alternatives_spanish:
  - hizo surgir a ese carnero
  - levantó ese carnero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Según la revisión del audit trail, ሐርጌ aquí es 'carnero', no 'cuerno'. Se conserva el referente explícito con un artículo demostrativo para reflejar la deíxis del original y la dificultad textual.
- source_word: ገብረ መኰንነ ወመራሔ
  english_pob_choice: made it ruler and leader
  chosen_spanish: lo hizo gobernante y líder
  alternatives_spanish:
  - lo nombró gobernante y guía
  - lo hizo príncipe y conductor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Los dos términos expresan autoridad y conducción. 'Gobernante y líder' conserva el paralelismo semántico en un español claro sin cargar con títulos eclesiásticos o monárquicos no exigidos por el texto.
- source_word: ለአባግዕ
  english_pob_choice: of the sheep
  chosen_spanish: de las ovejas
  alternatives_spanish:
  - sobre las ovejas
  - para las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El genitivo marca el ámbito de gobierno dentro de la visión; en español 'líder de las ovejas' es natural y mantiene la imagen animal apocalíptica.
- source_word: ወበኵሉዝ
  english_pob_choice: through all this
  chosen_spanish: a través de todo esto
  alternatives_spanish:
  - mientras tanto
  - en todo esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase temporal se entiende como una expresión de simultaneidad o de desarrollo concomitante. 'A través de todo esto' sigue de cerca la lectura revisada en inglés y evita una interpretación demasiado libre.
- source_word: አክላብ
  english_pob_choice: the dogs
  chosen_spanish: los perros
  alternatives_spanish:
  - los canes
  - la jauría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el animal literal de la visión con un término común y comprensible en español.
- source_word: ያጸህቅዎሙ
  english_pob_choice: were afflicting
  chosen_spanish: estaban afligiendo
  alternatives_spanish:
  - estaban acosando
  - estaban oprimendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del inglés corrigió una lectura más débil hacia un verbo más fuerte. 'Afligiendo' conserva la intensidad de presión/daño sin perder la continuidad aspectual del imperfecto.
theological_decisions:
- issue: Preservar la imaginería apocalíptica del carnero y los perros sin convertirla en una paráfrasis explicativa
  english_pob_reading: Retain the animal vision imagery; do not flatten symbolic language
  chosen_spanish_reading: Mantener el carnero, las ovejas y los perros como imágenes literales de la visión
  alternative_spanish_readings:
  - interpretar el carnero como poder o autoridad en el texto principal
  - reemplazar la imaginería animal por prosa explicativa
  rationale: El texto pertenece a una visión simbólica sostenida. Traducir los animales literalmente permite que la carga apocalíptica permanezca visible para el lector, en vez de sustituirla por interpretación.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; avoid premature interpretation in the main text.'
- issue: Resolver la ambigüedad de ለባሕቲቱ sin convertirla en un objeto distinto
  english_pob_reading: spoken to it alone / privately
  chosen_spanish_reading: le habló solo
  alternative_spanish_readings:
  - le habló en privado
  - le habló solamente
  rationale: La revisión auditada corrige la lectura inglesa previa que vinculaba erróneamente el sintagma con el carnero como objeto. El español debe reflejar la exclusividad del acto de hablar, no añadir un nuevo referente.
  doctrine_reference: Textual-critical fidelity to the Ge'ez revision notes.
translation_notes:
  revision_awareness: 'Se ha seguido la revisión más reciente del audit trail, que corrige la lectura anterior en inglés: ለባሕቲቱ se entiende como ''solo/en privado'', ሐርጌ como ''carnero'', y ያጸህቅዎሙ como una acción de aflicción/hostigamiento, no de expulsión. La versión española refleja esas correcciones y evita reproducir el error previo de ''cuerno''.'
  spanish_consistency_notes:
  - Se mantiene 'carnero' en lugar de 'cuerno' por la revisión textual más reciente.
  - Se conserva el paralelismo animal ('carnero', 'ovejas', 'perros') para respetar la visión.
  - '''Gobernante y líder'' evita términos eclesiásticos no motivados por el texto.'
  - La construcción 'le habló solo' preserva la ambigüedad de 'solo/en privado' sin sobreinterpretar.
