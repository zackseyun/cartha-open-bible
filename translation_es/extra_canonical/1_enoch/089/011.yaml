translation:
  language: es
  text: Y comenzaron a embestirse unos a otros[a]; y aquel toro blanco[b] que nació en medio de ellos engendró un asno salvaje y un toro blanco junto con este[c], y los asnos salvajes se multiplicaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula inicial en ge'ez es textualmente difícil. El verbo probablemente describe una acción violenta mutua entre los animales; «embestirse» conserva bien esa imagen sin precisar más de lo que permite el texto.
    reason: textual_variant
  - marker: b
    text: El término para el bovino puede variar según el contexto entre «toro», «becerro» o «ganado». Aquí «toro» mantiene con claridad la figura bovina individual dentro de la visión.
    reason: lexical_alternative
  - marker: c
    text: O «y un toro blanco con él». La construcción indica que el toro blanco nació junto con el asno salvaje; «junto con este» evita una referencia personal ambigua en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይትናሰኩ
  english_pob_choice: began to gore one another
  chosen_spanish: comenzaron a embestirse unos a otros
  alternatives_spanish:
  - comenzaron a herirse unos a otros
  - comenzaron a atacarse unos a otros
  - comenzaron a darse cornadas unos a otros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de la visión animal, el verbo sugiere acción violenta mutua entre bovinos. «Embestirse» conserva esa imagen corporal sin sonar tan técnico como «dar cornadas» ni tan general como «atacarse».
- source_word: ላህም
  english_pob_choice: bull-calf / cattle
  chosen_spanish: toro
  alternatives_spanish:
  - becerro
  - toro joven
  - ganado
  - res
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el referente es singular, nacido en medio de los otros animales, y el flujo narrativo exige un animal bovino individual. «Toro» mantiene la fuerza imagética; «becerro» o «toro joven» serían posibles, pero menos naturales en esta frase española.
- source_word: ጸዓዳ
  english_pob_choice: white
  chosen_spanish: blanco
  alternatives_spanish:
  - brillante
  - pálido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El color es simbólicamente relevante y debe permanecer literal. «Blanco» reproduce de manera directa el valor del término ge'ez.
- source_word: ዘተወልደ
  english_pob_choice: there was born
  chosen_spanish: que nació
  alternatives_spanish:
  - que fue engendrado
  - que fue nacido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula relativa describe al toro blanco como nacido en medio de ellos. «Que nació» es natural en español y conserva el pasivo/resultativo sin forzar una perífrasis más pesada.
- source_word: ማእከሎሙ
  english_pob_choice: among them / in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - entre ellos
  - en su medio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En medio de ellos» preserva la localización espacial precisa y funciona bien con la imagen narrativa de nacimiento dentro del grupo.
- source_word: ወለደ
  english_pob_choice: begot
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró de
  - dio origen a
  - parió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo principal es genético y genealógico, no solo biológico. «Engendró» conserva esa relación de descendencia intencional que la tradición visionaria usa de modo simbólico.
- source_word: አድገ፡ ገዳም
  english_pob_choice: wild ass
  chosen_spanish: un asno salvaje
  alternatives_spanish:
  - un asno del desierto
  - un onagro
  - un asno montés
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente del auditor inglés corrige la lectura hacia un singular inequívoco. «Asno salvaje» es transparente en español y mantiene la referencia zoológica concreta.
- source_word: ወ ላህመ፡ ጸዓዳ፡ ምስሌሁ
  english_pob_choice: and a white bull with it
  chosen_spanish: y un toro blanco con él
  alternatives_spanish:
  - y un toro blanco con él mismo
  - y un toro blanco junto con él
  - y un toro blanco con éste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción indica otro nacimiento junto al primero. «Con él» sigue el inglés auditado y preserva la relación conjunta sin introducir interpretación adicional.
- source_word: አእዱገ፡ ገዳም
  english_pob_choice: the wild asses
  chosen_spanish: los asnos salvajes
  alternatives_spanish:
  - los onagros
  - los asnos del desierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural es claro y debe mantenerse en español. «Asnos salvajes» conserva el contraste con el toro blanco y hace visible la multiplicación zoológica.
theological_decisions:
- issue: Preservar la imaginería simbólica animal sin decodificarla en la traducción
  english_pob_reading: 'Retain literal animal terms: white bull, wild ass, wild asses'
  chosen_spanish_reading: 'Mantener los animales literales: toro blanco, asno salvaje, asnos salvajes'
  alternative_spanish_readings:
  - interpretar los animales como grupos humanos
  - parafrasear la genealogía en términos históricos
  rationale: El pasaje pertenece a la visión apocalíptica y su sentido depende de la secuencia imaginativa. La traducción debe conservar la superficie animal para no borrar la tensión simbólica que el texto presenta.
  doctrine_reference: 'Contexto del libro: preservar la imaginería apocalíptica; no sustituirla por interpretación en el texto principal.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección mayor del auditor: el sujeto es «aquel toro blanco que nació en medio de ellos» y el verbo principal es «engendró»; además, el primer descendiente es un singular, «asno salvaje», y luego aparece otro «toro blanco con él». La versión española sigue esa sintaxis revisada y evita la inversión errónea de sujeto y verbo detectada en el borrador anterior.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no porque aparezca aquí, sino como norma general del proyecto; en este versículo no se requiere.
  - Se conservaron los términos zoológicos concretos y no se introdujeron equivalencias interpretativas.
  - Se prefirió «engendró» por la genealogía visionaria, evitando «parió» por su matiz menos apropiado para el sujeto masculino simbólico.
  - La repetición de «toro blanco» respeta la cadena simbólica del pasaje y la revisión textual más reciente.
