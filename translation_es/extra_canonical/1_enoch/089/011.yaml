  to: Y comenzaron a embestirse unos a otros[a]; y aquel toro blanco[b] que nació en medio de ellos engendró un asno salvaje y un toro blanco junto con este[c], y los asnos salvajes se multiplicaron.
  rationale: La traducción solo necesita un ajuste menor para reflejar con más precisión la auditoría inglesa final y mejorar la claridad referencial en español. «Junto con este» comunica mejor la referencia animal no personal que «con él», y las notas se reformulan para justificarse desde la evidencia textual y la decisión traductológica, no desde el texto inglés como audiencia.
