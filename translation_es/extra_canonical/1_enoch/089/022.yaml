translation:
  language: es
  text: Y el Señor de las ovejas fue con ellas mientras las guiaba, y todas sus ovejas lo siguieron; y su rostro era glorioso, espléndido[a] y terrible de contemplar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «majestuoso»; el adjetivo ge'ez puede implicar honor o peso, además de magnificencia visible.
    reason: lexical_alternative
  - marker: b
    text: «Terrible de contemplar» expresa un temor reverente, no mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚኦሙ
  english_pob_choice: the Lord of
  chosen_spanish: el Señor de
  alternatives_spanish:
  - el amo de
  - el dueño de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario, el término designa a la figura soberana sobre las ovejas. «Señor de» conserva la relación genitiva y el registro teológico elevado mejor que «amo»; «dueño» suena más posesivo y menos solemne.
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen apocalíptica mantiene el símbolo animal concreto. «Ovejas» preserva la repetición y la fuerza simbólica; «rebaño» generalizaría la figura.
- source_word: ሖረ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - procedió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Un verbo simple de movimiento encaja con la secuencia narrativa. «Fue con ellas» suena natural en español y refleja el desplazamiento visionario sin añadir dirección no explicitada.
- source_word: ምስሌሆሙ
  english_pob_choice: with them
  chosen_spanish: con ellas
  alternatives_spanish:
  - entre ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición expresa acompañamiento. «Con ellas» es la opción más idiomática en español y no introduce un matiz espacial que el texto no exige.
- source_word: እንዘ ይመራሖሙ
  english_pob_choice: as he led them
  chosen_spanish: mientras las guiaba
  alternatives_spanish:
  - mientras las conducía
  - mientras las pastoreaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción indica acción simultánea. «Guiaba» es claro y natural; «pastoreaba» sería más interpretativo, y «conducía» funciona pero suena menos pastoral.
- source_word: ኵሎሙ አባግዒሁ
  english_pob_choice: all his sheep
  chosen_spanish: todas sus ovejas
  alternatives_spanish:
  - todas las ovejas que eran suyas
  - todo su rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El posesivo es explícito y la imagen debe seguir siendo concreta. «Todas sus ovejas» es natural y fiel; «rebaño» suaviza la concreción repetida.
- source_word: ተለውዎ
  english_pob_choice: followed him
  chosen_spanish: lo siguieron
  alternatives_spanish:
  - fueron tras él
  - lo acompañaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el marco del pastor y las ovejas, «lo siguieron» capta mejor la relación de dependencia y dirección que «acompañaron».
- source_word: ገጹ
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su faz
  - su semblante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo es concreto, pero en español bíblico «rostro» resulta más natural y mantiene la viveza de la imagen visionaria.
- source_word: ስቡሕ
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - espléndido
  - magnífico
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Glorioso» transmite resplandor y honor, conservando el peso teológico del adjetivo sin forzar un giro arcaizante.
- source_word: ክቡር
  english_pob_choice: splendid
  chosen_spanish: espléndido
  alternatives_spanish:
  - majestuoso
  - honorable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Como «glorioso» ya traduce ስቡሕ, «espléndido» mantiene la distinción entre los adjetivos y expresa brillo/excelencia visible.
- source_word: ግሩም
  english_pob_choice: terrible
  chosen_spanish: terrible
  alternatives_spanish:
  - temible
  - imponente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En descripción apocalíptica, el término tiene fuerza de sobrecogimiento. «Terrible» conserva el sentido de temor reverente; en español moderno puede sonar fuerte, pero eso corresponde al efecto del original.
- source_word: ለርእይ
  english_pob_choice: to behold
  chosen_spanish: de contemplar
  alternatives_spanish:
  - de ver
  - para contemplar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Tras la cadena descriptiva, una construcción final con infinitivo encaja bien en español. «Contemplar» mantiene el registro elevado propio de una visión.
theological_decisions:
- issue: Identidad del guía en la alegoría de las ovejas
  english_pob_reading: Render እግዚኦሙ ... ለአባግዕ as 'the Lord of the sheep' and retain the sheep imagery literally.
  chosen_spanish_reading: Traducir «el Señor de las ovejas» y conservar literalmente la imaginería ovina.
  alternative_spanish_readings:
  - su señor
  - el dueño de las ovejas
  - el pastor de las ovejas
  rationale: El pasaje mantiene una figura soberana dentro del marco simbólico de la visión. «Señor de las ovejas» conserva tanto la identidad elevada del personaje como la alegoría apocalíptica, sin reducirla a una explicación llana.
  doctrine_reference: 'Principios de traducción POB; contexto del libro: no aplanar la imaginería apocalíptica.'
translation_notes:
  revision_awareness: Revisión más reciente sin cambios sustantivos; el acuerdo de revisión fue alto y no se requirieron correcciones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Señor» para እግዚኦሙ en este contexto titular, coherente con el registro teológico del pasaje.
  - Se conserva la repetición de «ovejas» para no diluir la imaginería animal.
  - Se tradujo la secuencia de adjetivos con tres equivalentes distintos para reflejar la triple descripción del rostro sin fusionar matices.
