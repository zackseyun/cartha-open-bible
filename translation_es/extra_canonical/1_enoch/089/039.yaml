review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran parte la secuencia del ge''ez y del POB inglés revisado: silencio tras el clamor por una sola oveja, cruce del curso de agua, y sustitución de líderes por otras dos ovejas que luego los conducen. Sin embargo, «los que habían caído» no preserva fielmente la decisión auditada para ለእለ ሰከቡ, que se mantuvo deliberadamente como «those who had lain down» para evitar sobreinterpretar el verbo como caída o muerte.'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. No obstante, «se pusieron en lugar de» suena algo más dinámico e interpretativo que el inglés/ ge'ez narrativo; «se quedaron en lugar de» o «estuvieron en lugar de» refleja mejor el estado de reemplazo. La mejora principal es sustituir «habían caído» por una expresión más literal y menos interpretativa.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se conserva «oveja/ovejas» para mantener la imaginería apocalíptica concreta. «Curso de agua» es aceptable para ውሒዘ ማይ. No aparecen términos del glosario mayor como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: «los que habían caído» sobreinterpreta ለእለ ሰከቡ
    rationale: La auditoría inglesa mantuvo «those who had lain down» precisamente para no convertir el verbo en «caer» o «morir». En español debe preservarse esa cautela, por ejemplo con «los que se habían echado» o «los que habían quedado tendidos».
  - severity: low
    issue: «se pusieron en lugar de» introduce un matiz más activo que el simple estar/ponerse como reemplazo
    rationale: La revisión inglesa final dice «stood in place of». En español, «se quedaron en lugar de» o «estuvieron en lugar de» suena más cercano al valor narrativo de ‘estuvieron/quedaron allí como sustitutos’, aunque el borrador no llega a ser incorrecto.
  revised_spanish_text: Y vi hasta que se callaron por el clamor por aquella oveja, y cruzaron aquel curso de agua. Y las otras dos ovejas, que los guiaban, se quedaron en lugar de los que se habían echado, y los guiaron.
  revision_rationale: Se ajusta «habían caído» a «se habían echado» para conservar la cautela léxica del ge'ez y de la auditoría inglesa, evitando una interpretación más fuerte de colapso o muerte. También se suaviza «se pusieron en lugar de» a «se quedaron en lugar de» para reflejar mejor el sentido narrativo de estar como sustitutas tras el cruce.
