revisions:
- from: Y vi hasta que se callaron por el clamor por aquella oveja, y cruzaron aquel curso de agua. Y las otras dos ovejas, que los guiaban, se pusieron en lugar de los que habían caído, y los guiaron.
  to: Y vi hasta que se callaron por el clamor por aquella oveja, y cruzaron aquel curso de agua. Y las otras dos ovejas, que los guiaban, se quedaron en lugar de los que se habían echado, y los guiaron.
  rationale: Se ajusta «habían caído» a «se habían echado» para conservar la cautela léxica del ge'ez y de la auditoría inglesa, evitando una interpretación más fuerte de colapso o muerte. También se suaviza «se pusieron en lugar de» a «se quedaron en lugar de» para reflejar mejor el sentido narrativo de estar como sustitutas tras el cruce.
