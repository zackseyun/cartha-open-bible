translation:
  language: es
  text: Y vi hasta que se callaron por el clamor por aquella oveja, y cruzaron aquel curso de agua. Y las otras dos ovejas, que los guiaban, se quedaron en lugar de los que se habían echado, y los guiaron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አርመሙ
  english_pob_choice: became silent
  chosen_spanish: se callaron
  alternatives_spanish:
  - guardaron silencio
  - quedaron en silencio
  - se aquietaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa volverse callado o silencioso. «Se callaron» conserva el proceso narrativo sin añadir una causa externa que el ge'ez no exige.
- source_word: እምጽራኁ
  english_pob_choice: from the cry / outcry
  chosen_spanish: por el clamor
  alternatives_spanish:
  - por el grito
  - por el clamor
  - por el alarido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia es a una expresión colectiva de dolor o protesta. «Clamor» comunica bien esa fuerza y funciona con naturalidad en español.
- source_word: በግዕ
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - oveja
  - cordero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conviene mantener la imaginería animal concreta. «Oveja» es la correspondencia más directa y clara en español.
- source_word: ውሒዘ ማይ
  english_pob_choice: stream of water
  chosen_spanish: curso de agua
  alternatives_spanish:
  - corriente de agua
  - arroyo
  - río
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase remite a un cuerpo de agua en movimiento, pero sin precisar demasiado. «Curso de agua» evita cerrar el sentido a «río» si el término es más general.
- source_word: ካልኤሆሙ
  english_pob_choice: the other two sheep
  chosen_spanish: las otras dos ovejas
  alternatives_spanish:
  - las dos ovejas
  - las otras dos
  - los dos demás
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez señala dualidad; por eso «dos» debe hacerse explícito en español. «Las otras dos ovejas» conserva el contraste y la referencia numérica.
- source_word: ይመርሕዎሙ
  english_pob_choice: were leading them
  chosen_spanish: los guiaban
  alternatives_spanish:
  - los conducían
  - los llevaban adelante
  - los dirigían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo significa guiar o conducir. «Los guiaban» es natural y mantiene el sentido de dirección continua.
- source_word: ተክሎሙ
  english_pob_choice: stood in place of
  chosen_spanish: se pusieron en lugar de
  alternatives_spanish:
  - estuvieron en lugar de
  - ocuparon el lugar de
  - quedaron en lugar de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura revisada entiende la expresión como «en lugar de / en vez de», no como un verbo de colocar. «Se pusieron en lugar de» comunica sustitución sin forzar el español.
- source_word: ለእለ ሰከቡ
  english_pob_choice: those who had lain down
  chosen_spanish: los que habían caído
  alternatives_spanish:
  - los que habían estado tendidos
  - los que se habían echado
  - los que habían quedado caídos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el verbo básico puede ser «yacer / echarse», en este contexto visionario la caída previa de las ovejas encaja mejor en español con «habían caído», sin perder la idea de estar postrados o derribados.
- source_word: መርሕዎሙ
  english_pob_choice: led them
  chosen_spanish: los guiaron
  alternatives_spanish:
  - los condujeron
  - los llevaron
  - los dirigieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición del verbo de guía debe mantenerse en español. «Los guiaron» preserva la secuencia narrativa y el paralelismo del verso.
theological_decisions:
- issue: Mantener la imaginería de ovejas sin interpretarla en el texto principal
  english_pob_reading: Retain sheep imagery and narrative sequence without inserting historical identifications.
  chosen_spanish_reading: Conservar «ovejas» y la secuencia de acciones sin añadir identificaciones históricas en el texto principal.
  alternative_spanish_readings:
  - traducir como «el pueblo»
  - identificar explícitamente a figuras históricas en el versículo
  rationale: El pasaje pertenece a una visión apocalíptica donde el símbolo animal forma parte del argumento. La traducción debe preservar esa imaginería para no cerrar interpretaciones que el texto no explicita aquí.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del audit trail: la lectura correcta entiende ካልኤሆሙ como «las otras dos» y ተክሎሙ como «en lugar de / en vez de», no como «set down». También evité apoyar la nota textual difícil sobre una formulación en el texto español, porque el verso puede traducirse de forma fluida sin añadir una glosa anclada.'
  spanish_consistency_notes:
  - Usé «oveja» de manera consistente para በግዕ, manteniendo la imaginería animal concreta.
  - Preferí «guiaban / guiaron» para el verbo de liderazgo a fin de conservar el paralelismo del verso.
  - Elegí «curso de agua» como solución sobria para ውሒዘ ማይ sin forzar «río» o «arroyo».
  - No introduje notas al pie, ya que el texto español no necesita marcadores para esta redacción final.
