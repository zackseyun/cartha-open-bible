base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/039.yaml
  text: And I saw until they became silent from the cry for that sheep[a], and they crossed that stream of water. And the other two sheep, which were leading them, stood in place of those who had lain down[e][d][c][b], and they led them.
  footnotes:
  - marker: a
    text: The clause rendered 'they set down those who had lain down' is textually and lexically difficult. The Ge'ez may mean that the leading sheep placed, stationed, or gathered those who had lain down before leading them onward.
    reason: textual_variant
  - marker: b
    text: '''Stream of water'' could also be rendered ''watercourse'' or ''river,'' depending on how specifically the flowing water is understood in context.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the outcry of those sheep'.
    reason: previous_rendering
  - marker: d
    text: Or 'those other sheep stood still, the ones who were leading them'.
    reason: previous_rendering
  - marker: e
    text: Or 'and they set down those who had lain down'.
    reason: previous_rendering
