translation:
  language: es
  text: Y entre ellos vi al Señor de las ovejas, de pie delante de ellos; y vieron que era grande, temible y poderoso, y todas aquellas ovejas lo vieron y tuvieron miedo ante su presencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «temieron desde su faz/rostro»; la expresión ge'ez describe temor provocado por su presencia manifiesta en la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚአ አባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el dueño de las ovejas
  - el amo de las ovejas
  lexicon: Dillmann
  rationale: Conservo el título relacional y apocalíptico con «Señor», que en español comunica autoridad sin reducirlo a mera posesión. «Ovejas» mantiene la alegoría animal del pasaje.
- source_word: ዘቆመ ቅድሜሆሙ
  english_pob_choice: standing before them
  chosen_spanish: de pie delante de ellos
  alternatives_spanish:
  - estando delante de ellos
  - que estaba delante de ellos
  lexicon: Dillmann
  rationale: La construcción verbal describe una presencia visible y estática en la visión. «De pie delante de ellos» conserva la escena directa y natural en español.
- source_word: ዐቢይ
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - grande en estatura
  - majestuoso
  lexicon: Dillmann
  rationale: «Grande» reproduce la amplitud semántica de tamaño o excelencia sin cerrar prematuramente el matiz.
- source_word: ግሩም
  english_pob_choice: fearsome
  chosen_spanish: temible
  alternatives_spanish:
  - terrible
  - imponente
  lexicon: Dillmann
  rationale: «Temible» comunica el elemento de asombro mezclado con temor propio del lenguaje visionario, sin sonar arcaico en exceso.
- source_word: ኃያል
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - poderosísimo
  lexicon: Dillmann
  rationale: «Poderoso» expresa fuerza y capacidad con un registro solemne y claro en español. Mantiene el paralelo de atributos del original.
- source_word: ኵሎሙ ዝኩ አባግዕ
  english_pob_choice: all those sheep
  chosen_spanish: todas aquellas ovejas
  alternatives_spanish:
  - todas las ovejas
  - todas esas ovejas
  lexicon: Dillmann
  rationale: «Aquellas» preserva el valor demostrativo del original y la distancia narrativa implícita en la visión.
- source_word: ፈርሁ እምገጹ
  english_pob_choice: were afraid before him
  chosen_spanish: tuvieron miedo delante de él
  alternatives_spanish:
  - tuvieron miedo de su presencia
  - temieron ante él
  lexicon: Dillmann
  rationale: La idiomática ge'ez asocia el temor con la presencia/faz del personaje; en español, «delante de él» mantiene la escena y evita una paráfrasis excesiva, mientras «tuvieron miedo» refleja el verbo de temor.
theological_decisions:
- issue: Título divino para እግዚአ አባግዕ
  english_pob_reading: the Lord of the sheep
  chosen_spanish_reading: el Señor de las ovejas
  alternative_spanish_readings:
  - el dueño de las ovejas
  - el amo de las ovejas
  rationale: En el Apocalipsis Animal, esta figura no es un simple propietario humano; el título tiene peso teológico. «Señor» preserva esa densidad sin borrar la imagen pastoral.
  doctrine_reference: Preservar títulos y simbolismo apocalíptico; primacía del texto fuente sobre equivalencias eclesiásticas fijas.
- issue: Relación entre visión y temor final
  english_pob_reading: they saw him and were afraid before him
  chosen_spanish_reading: lo vieron y tuvieron miedo delante de él
  alternative_spanish_readings:
  - lo vieron y temieron ante él
  - lo vieron y tuvieron miedo de su presencia
  rationale: El texto enlaza visión y temor como respuesta inmediata a la manifestación. «Delante de él» conserva la espacialidad del encuentro y evita convertir la frase en una mera nota psicológica.
  doctrine_reference: Conservar el lenguaje corpóreo/visionario del relato apocalíptico.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB, que prefirió «were afraid before him» frente a «of his presence», y la observación gramatical previa sobre el valor de la preposición ge'ez. La redacción española intenta sostener esa relación espacial/visionaria sin perder naturalidad.
  spanish_consistency_notes:
  - Se usó «Señor» para el título divino del pasaje, en línea con el valor teológico señalado en el audit trail, sin sustituirlo por «dueño» en el texto principal.
  - Se mantuvo «ovejas» como término técnico de la alegoría de 1 Enoc, evitando actualizarlo a un lenguaje no figurativo.
  - «Delante de él» conserva la relación presencial del original; en español suena natural y permite leer el temor como respuesta inmediata a la manifestación.
