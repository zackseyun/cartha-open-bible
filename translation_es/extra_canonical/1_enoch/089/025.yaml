translation:
  language: es
  text: Y nuevamente esos lobos se mostraron[a] a las ovejas, y fueron en medio de aquella corriente[b] de agua; y esos lobos siguieron a las ovejas y corrieron tras ellas en aquella corriente de agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'se hicieron ver' o 'hicieron ver a las ovejas'. El verbo del testimonio ge'ez es difícil, y el sentido exacto permanece algo incierto.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como 'arroyo de agua' o 'curso de agua'. La expresión del original no obliga a precisar si se trata de un arroyo, un río o un torrente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ጓዲሆሙ
  english_pob_choice: those
  chosen_spanish: esos
  alternatives_spanish:
  - aquellos
  - esos mismos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El elemento deíctico se conserva con 'esos' para mantener la referencia narrativa a los lobos ya presentados. En español, 'esos' suena natural y preserva la distancia anafórica sin recargar el verso.
- source_word: አዝእብት
  english_pob_choice: wolves
  chosen_spanish: lobos
  alternatives_spanish:
  - canes salvajes
  - perros salvajes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen animal del Apocalipsis Animal debe mantenerse concreta. 'Lobos' es la identificación estándar y comunica mejor el carácter depredador que una generalización como 'enemigos'.
- source_word: አርእይዎሙ
  english_pob_choice: showed themselves
  chosen_spanish: se mostraron
  alternatives_spanish:
  - se hicieron ver
  - se presentaron
  - hicieron ver a las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo causativo es difícil, y el audit trail en inglés reconoce esa tensión. Tras la revisión del texto ge'ez, la lectura más probable aquí es una aparición/manifestación de los lobos ante las ovejas; 'se mostraron' conserva esa visibilidad sin imponer una explicación interpretativa.
- source_word: ለአባግዕ
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la imagen apocalíptica concreta. 'Las ovejas' conserva el plural y el valor simbólico mejor que 'el rebaño', que sería más colectivo y menos vívido.
- source_word: ማእከለ
  english_pob_choice: into the midst of
  chosen_spanish: al medio de
  alternatives_spanish:
  - en medio de
  - al centro de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Al medio de'' reproduce de manera clara el movimiento hacia el interior del lugar señalado. Aunque ''en medio de'' es posible, ''al medio de'' mantiene el sentido direccional del pasaje.'
- source_word: ዐይገ ማይ
  english_pob_choice: stream of water
  chosen_spanish: arroyo de agua
  alternatives_spanish:
  - corriente de agua
  - canal de agua
  - torrente de agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El compuesto indica una corriente o curso de agua, sin precisar tamaño. 'Arroyo de agua' es una solución legible en español y conserva la imagen de un flujo atravesable, sin sobredeterminarlo como río o torrente.
- source_word: ተለውዎሙ
  english_pob_choice: followed
  chosen_spanish: siguieron
  alternatives_spanish:
  - persiguieron
  - fueron tras
  - se lanzaron tras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail señala que el verbo expresa seguimiento/persecución. 'Siguieron' mantiene el movimiento hostil sin introducir una intensificación no obligada; el segundo miembro del verso ya explicita la carrera tras las ovejas.
- source_word: ወረጹ ድኅሬሆሙ
  english_pob_choice: ran after them
  chosen_spanish: corrieron tras ellas
  alternatives_spanish:
  - perseguían tras ellas
  - se lanzaron tras ellas
  - corrieron detrás de ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la vivacidad del verbo de movimiento con una forma natural en español. 'Corrieron tras ellas' reproduce la inmediatez de la escena y evita redundancia excesiva con 'siguieron'.
theological_decisions:
- issue: Preservación de la imaginería apocalíptica animal
  english_pob_reading: Retain the concrete animal imagery ('wolves,' 'sheep,' 'stream of water') without interpretive substitution.
  chosen_spanish_reading: Conservar 'lobos', 'ovejas' y 'arroyo de agua' sin convertirlos en glosas interpretativas.
  alternative_spanish_readings:
  - '''enemigos'' y ''pueblo'''
  - '''perseguidores'' y ''gente'''
  rationale: La obra es visión apocalíptica y su fuerza literaria depende de la imagen concreta. Traducir los animales como equivalentes históricos o abstractos borraría la textura simbólica que el texto quiere mantener.
  doctrine_reference: 'Contexto literario del Apocalipsis Animal: prosa/poesía visionaria que debe conservar su imaginería.'
- issue: Valor del primer verbo en la cláusula inicial
  english_pob_reading: '''showed themselves'' with acknowledged difficulty in the underlying verb.'
  chosen_spanish_reading: '''se mostraron'''
  alternative_spanish_readings:
  - '''hicieron ver'''
  - '''se hicieron ver'''
  - '''se aparecieron'''
  rationale: El texto base y su auditoría inglesa reconocen una zona de tensión lexical. Dado el pasaje y la revisión que corrige la lectura previa, el español debe reflejar una aparición visible de los lobos sin forzar una construcción causal que el estado textual no garantiza plenamente.
  doctrine_reference: Principio de no borrar tensiones textuales cuando el testimonio base es ambiguo o revisado.
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por una revisión importante: una lectura anterior entendía el primer verbo como ''pursued'' y otra como ''showed themselves''. La versión más reciente del contexto inglés volvió a ''showed themselves'' en la primera cláusula, mientras conserva la idea de seguir/perseguir en la segunda. La presente redacción española sigue esa última revisión y evita introducir una persecución en la primera cláusula que el estado textual más reciente no respalda.'
  spanish_consistency_notes:
  - Se usa 'lobos' de forma consistente para አዝእብት, evitando 'perros salvajes' o abstracciones.
  - Se mantiene el plural 'ovejas' conforme al simbolismo del capítulo.
  - '''Arroyo de agua'' conserva el valor genérico del curso de agua y no cierra la opción de una corriente mayor o menor.'
  - No se sustituye la imaginería por equivalentes históricos; la interpretación queda fuera del texto base.
