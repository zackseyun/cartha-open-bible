translation:
  language: es
  text: Y más allá de la medida que les fue prescrita[a] siguieron matando y destruyendo, y yo lloraba y clamaba[b] por aquellas ovejas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más allá de su número» o «de su orden asignado». El ge'ez ሥርዓት (śer'āt) puede designar una disposición, regla o cantidad fija; la revisión de nivel 3 del texto base prefirió «medida prescrita» para conservar la fuerza legal y autoritativa del término frente a la alternativa más simple «número».
    reason: lexical_alternative
  - marker: b
    text: 'Revisión aplicada (2026-04-22): una lectura anterior incluía «mientras dormía», pero la partícula ge''ez እንዘ (enza) significa únicamente «mientras»; no aparece ninguna palabra ge''ez para «dormir» en este pasaje. La construcción እንዘ + imperfecto forma un pasado continuo: «yo lloraba y clamaba».'
    reason: textual_variant
  - marker: c
    text: Las «ovejas» conservan la imaginería simbólica del Apocalipsis Animal; su identificación histórica pertenece a la interpretación, no al texto principal.
    reason: cultural_note
lexical_decisions:
- source_word: ፈድፋደ
  english_pob_choice: beyond
  chosen_spanish: más allá de
  alternatives_spanish:
  - en exceso de
  - por encima de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ፈድፋደ expresa adición o exceso. «Más allá de» preserva la fuerza comparativa y se combina naturalmente con «su medida prescrita» en español sin caer en un calco torpe.
- source_word: እምሥርዓቶሙ
  english_pob_choice: their prescribed measure
  chosen_spanish: su medida prescrita
  alternatives_spanish:
  - su número asignado
  - su orden
  - su disposición fijada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሥርዓት (śer'āt) significa orden, regla, ordenanza o medida prescrita. La revisión de nivel 3 (2026-04-22) descartó «su número» (que perdía la fuerza legal y autoritativa del término) en favor de «prescribed measure». «Medida prescrita» reproduce ese peso normativo en español. La alternativa «su número» se preserva en nota.
- source_word: ይቀትል
  english_pob_choice: they kept killing
  chosen_spanish: siguieron matando
  alternatives_spanish:
  - mataron
  - estaban matando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperfecto ge'ez en una narración visionaria puede tener fuerza iterativa o durativa. «Siguieron matando» refleja la violencia repetida del Apocalipsis Animal y es la construcción española más natural para el aspecto continuativo-iterativo del original.
- source_word: ያሐጕል
  english_pob_choice: destroying
  chosen_spanish: destruyendo
  alternatives_spanish:
  - arrasando
  - devastando
  - echando por tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo denota ruina o tratamiento destructivo. «Destruyendo» es suficientemente amplio para preservar la violencia sin pretender mayor precisión textual de la que el testimonio permite.
- source_word: 'እንዘ (OCR: እንዝኩ)'
  english_pob_choice: while (continuous frame)
  chosen_spanish: 'construcción de pasado continuo: «yo lloraba y clamaba»'
  alternatives_spanish:
  - mientras yo lloraba y clamaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La partícula እንዘ (enza) significa «mientras» y, combinada con los imperfectos እብኪ y አዐውዩ, forma un pasado continuo. La lectura anterior «mientras dormía» fue corregida por el adjudicador de nivel 3: no existe palabra ge''ez para «dormir» en este versículo. En español la construcción se resuelve con el imperfecto de indicativo sin añadir la cláusula temporal explícita, que resultaría redundante.'
- source_word: እብኪ
  english_pob_choice: weeping
  chosen_spanish: lloraba
  alternatives_spanish:
  - estaba llorando
  - lamentaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo de lamento sin ambigüedad. El imperfecto «lloraba» capta la fuerza emotiva y la duración del llanto en el marco visionario.
- source_word: አዐውዩ
  english_pob_choice: crying out
  chosen_spanish: clamaba
  alternatives_spanish:
  - gritaba
  - daba voces
  - exclamaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo intensifica el lamento más allá de las lágrimas silenciosas. «Clamaba» preserva la angustia audible y tiene dignidad estilística adecuada para prosa apocalíptica sin reducirlo a lamento ritual.
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  - el ganado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El Apocalipsis Animal usa sistemáticamente imágenes de animales de modo simbólico. «Ovejas» conserva la imagen sin interpretarla como «el pueblo» o «Israel» en el texto principal. «Rebaño» perdería la especificidad de la especie que el original mantiene.
theological_decisions:
- issue: Si interpretar «las ovejas» como Israel/Judá en el texto principal
  english_pob_reading: Retain 'sheep' as the vision's imagery
  chosen_spanish_reading: Retener «ovejas» como imagen visionaria
  alternative_spanish_readings:
  - ese pueblo
  - Israel
  - los israelitas
  rationale: La filosofía de traducción del POB exige preservar las imágenes apocalípticas en lugar de aplanar los animales simbólicos convirtiéndolos en sus referentes históricos. La identificación de las ovejas con Israel pertenece a la interpretación teológica, no al texto principal.
  doctrine_reference: 'Contexto del libro: preservar la prosa visionaria y apocalíptica; no aplanar la imaginería simbólica.'
translation_notes:
  revision_awareness: 'Dos revisiones de nivel 3 (2026-04-22, adjudicador gemini_3_1_pro) afectan este registro: (1) Se eliminó la frase «mientras dormía» porque la partícula ge''ez እንዘ significa simplemente «mientras» y no hay vocablo ge''ez para «dormir» en este versículo; la lectura fue una interpolación del contexto onírico general. (2) Se sustituyó «más allá de su número» por «más allá de su medida prescrita» para preservar la fuerza legal y normativa de ሥርዓት (śer''āt = orden, ordenanza, regla). Una revisión posterior (2026-04-23, azure-gpt-5.4) corrigió únicamente una coma errónea. Las tres correcciones se reflejan íntegramente en el borrador español: se emplea «medida prescrita» y la construcción «yo lloraba y clamaba» sin ninguna referencia al sueño.'
  spanish_consistency_notes:
  - «Ovejas» (አባግዕ) debe mantenerse de modo consistente en todo el Apocalipsis Animal; no sustituir por «rebaño» ni interpretar como «pueblo» en el texto principal.
  - «Lloraba» (እብኪ) y «clamaba» (አዐውዩ) se mantienen como verbos distintos para preservar la diferencia entre llanto silencioso y expresión audible de angustia; no colapsar en un único verbo de lamento.
  - No aparece el nombre divino יהוה/YHWH en este versículo; el valor predeterminado «Yahvé» no es aplicable aquí.
  - La fuerza iterativa de ይቀትል se reproduce con «siguieron matando» (perífrasis de continuación + gerundio), patrón coherente con la traducción de imperfectos iterativos en otros pasajes del Apocalipsis Animal.
  - El texto ge'ez no contiene marcadores explícitos de primera persona del singular más allá del verbo; «yo lloraba y clamaba» hace explícito el sujeto por claridad narrativa, en consonancia con el estilo del texto base inglés.
