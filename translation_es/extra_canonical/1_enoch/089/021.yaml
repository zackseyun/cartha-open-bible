translation:
  language: es
  text: Y vi a las ovejas[a] hasta que salieron de entre los lobos; y los ojos de los lobos fueron cegados[b], y aquellos lobos salieron siguiendo a las ovejas con toda su fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aquellas ovejas». El texto ge''ez permite una referencia marcada, pero en español el artículo definido basta para una lectura fluida.'
    reason: alternative_reading
  - marker: b
    text: 'O: «fueron oscurecidos»; también podría entenderse como «se les cegaron los ojos». El giro pasivo conserva mejor la gramática del ge''ez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢክዎሙ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y observé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula visionaria en primera persona se expresa de modo natural y sobrio en español con 'Y vi', conservando el ritmo apocalíptico sin añadir interpretación.
- source_word: ለአባግዕ
  english_pob_choice: those sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - aquellas ovejas
  - esas ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'las ovejas' comunica con claridad la imagen simbólica sin forzar una deixis artificial. El contexto visionario ya identifica a las ovejas como sujeto representativo.
- source_word: እስከ ወፁኡ እምአዝእብት
  english_pob_choice: until they came out from the wolves
  chosen_spanish: hasta que salieron de entre los lobos
  alternatives_spanish:
  - hasta que salieron de los lobos
  - hasta que emergieron de entre los lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''De entre los lobos'' refleja mejor la relación espacial o de esfera expresada por el ge''ez que un simple ''de los lobos'', manteniendo la imagen de salida desde la presencia hostil.'
- source_word: ተጸለሉ አዕይንቲሆሙ
  english_pob_choice: blinded their eyes
  chosen_spanish: los ojos de los lobos fueron cegados
  alternatives_spanish:
  - sus ojos fueron cegados
  - los ojos de ellos fueron oscurecidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión gramatical muestra que el sujeto es 'los ojos' y no un acto activo de los lobos. 'Fueron cegados' conserva la pasiva/intransitiva del ge'ez y la imagen concreta del texto apocalíptico.
- source_word: ወወፁኡ እንዘ ይትልውዎሙ
  english_pob_choice: and they went out following
  chosen_spanish: y aquellos lobos salieron siguiendo a las ovejas
  alternatives_spanish:
  - y salieron siguiendo a las ovejas
  - y aquellos lobos salieron tras las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La actualización del audit trail favorece 'following' como traducción menos interpretativa que 'pursuing'. En español, 'siguiendo' conserva esa neutralidad y el demostrativo 'aquellos' reproduce el valor de ዝኩ.
- source_word: ዝኩ አዝእብት
  english_pob_choice: those wolves
  chosen_spanish: aquellos lobos
  alternatives_spanish:
  - esos lobos
  - los lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo añade precisión narrativa. 'Aquellos lobos' mantiene esa referencia visual y el tono de observación directa propio de la visión.
- source_word: በኵሉ ኃይሎሙ
  english_pob_choice: with all their power
  chosen_spanish: con toda su fuerza
  alternatives_spanish:
  - con todo su poder
  - con todas sus fuerzas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fuerza'' transmite bien la intensidad física y amenazante del contexto. En español suena natural y conserva la idea de totalidad expresada por ''con all''.'
theological_decisions:
- issue: Conservar la imaginería apocalíptica sin reducirla a explicación moral o política
  english_pob_reading: Retain the concrete image 'blinded their eyes'
  chosen_spanish_reading: Conservar la imagen concreta 'los ojos de los lobos fueron cegados'
  alternative_spanish_readings:
  - '''los engañaron'''
  - '''les oscurecieron la vista'''
  rationale: La escena del Apocalipsis Animal usa imágenes duras y concretas. Mantener la ceguedad como hecho visible preserva la carga simbólica del texto sin suavizarla en lenguaje abstracto.
  doctrine_reference: Preservar imaginería apocalíptica; no aplanar el símbolo en una paráfrasis moralizante.
translation_notes:
  revision_awareness: 'He seguido la última revisión del audit trail: la cláusula final se entiende mejor con ''following'' como ''siguiendo'' y el sujeto explícito es ''aquellos lobos''; además, la pasiva de ''were blinded'' se refleja en ''fueron cegados''.'
  spanish_consistency_notes:
  - Se mantiene el registro visionario y sobrio propio de 1 Enoc.
  - Se evita 'SEÑOR' o terminología eclesiástica no presente en el pasaje.
  - '''Ovejas'' y ''lobos'' se conservan literalmente por la fuerza simbólica del texto.'
