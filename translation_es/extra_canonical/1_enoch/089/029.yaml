translation:
  language: es
  text: Y aquella oveja[a] subió a la cima[b] de aquella roca alta,[c] y el Señor de las ovejas la envió a ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La palabra ge'ez designa aquí una «oveja» en sentido general, no específicamente un «carnero».
    reason: lexical_alternative
  - marker: b
    text: La expresión también puede entenderse más simplemente como «la parte superior» o «la cumbre».
    reason: lexical_alternative
  - marker: c
    text: O «aquella alta roca».
    reason: lexical_alternative
lexical_decisions:
- source_word: ዐርገ
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa movimiento ascendente. En español, «subió» es natural, directo y conserva el sentido narrativo sin elevar innecesariamente el registro.
- source_word: በግዕ
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - oveja macho
  - carnero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El POB inglés revisado corrigió «ram» a «sheep» porque el ge'ez usa el término genérico para oveja. En español, «oveja» conserva esa generalidad y evita añadir especificidad no sustentada por el texto.
- source_word: ዲበ
  english_pob_choice: onto
  chosen_spanish: al
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición marca dirección hacia un lugar más alto, no mera localización estática. «Al» transmite bien el movimiento con el verbo «subió».
- source_word: ድማኃ
  english_pob_choice: summit
  chosen_spanish: pináculo
  alternatives_spanish:
  - cima
  - cumbre
  - parte superior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es una subida a la parte más alta de una roca. «Pináculo» conserva la idea de punto culminante y mantiene un tono algo más elevado, aunque «cima» o «cumbre» también serían posibles.
- source_word: ኰኵሕ
  english_pob_choice: rock
  chosen_spanish: peñasco
  alternatives_spanish:
  - roca
  - peña
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa una masa rocosa. «Peñasco» comunica mejor la imagen de una formación rocosa prominente en español bíblico-literario que el más general «roca».
- source_word: ነዋሕ
  english_pob_choice: high
  chosen_spanish: alto
  alternatives_spanish:
  - elevado
  - alto y grande
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa prefirió «high» frente a «lofty» por mayor directez. «Alto» corresponde de forma clara y fiel al adjetivo etiópico sin introducir matiz excesivo.
- source_word: እግዚኦሙ ለአባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el Señor de los rebaños
  - el dueño de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título alegórico tradicional del pasaje. «Señor» preserva la carga teológica del original y de la traducción inglesa; «de las ovejas» sigue la imagen del Animal Apocalypse sin convertirla en lenguaje eclesiástico distinto del propio texto.
- source_word: ፈነዎ
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de envío se expresa naturalmente con «envió», que mantiene la acción narrativa y puede sostener tanto un envío simple como una comisión implícita sin sobreinterpretación.
- source_word: ኀቤሆሙ
  english_pob_choice: to them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - a ellos
  - entre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El movimiento del envío se dirige a un grupo previamente mencionado. «Hacia ellos» conserva mejor la dirección implícita del ge'ez y armoniza con «lo envió».
theological_decisions:
- issue: Título divino del remitente en la alegoría
  english_pob_reading: the Lord of the sheep
  chosen_spanish_reading: el Señor de las ovejas
  alternative_spanish_readings:
  - el dueño de las ovejas
  - el maestro de las ovejas
  rationale: La frase funciona como designación del soberano divino dentro de la alegoría. Traducir «Señor» mantiene la fuerza teológica del título sin resolverla en una fórmula doctrinal posterior ni desdibujar la metáfora animal.
  doctrine_reference: 'Principio POB: traducir títulos y preservar la tensión teológica del texto apocalíptico/alegórico.'
translation_notes:
  revision_awareness: El POB inglés pasó de «ram» a «sheep» tras una revisión que observó que በግዕ es el término genérico para oveja, y luego ajustó «lofty rock» a «high rock» por una formulación más directa. La versión española sigue esa última revisión, evitando la especificación indebida «carnero» y manteniendo una estructura simple y fiel al movimiento ascendente del verso.
  spanish_consistency_notes:
  - Se mantiene «oveja» para በግዕ, en coherencia con la revisión inglesa que descartó «ram».
  - Se conserva «Señor de las ovejas» como título alegórico estable, sin sustituirlo por una fórmula eclesiástica distinta.
  - El verso se ha redactado con sintaxis simple y narrativa, acorde con el registro de la serie.
  - Se usa «alto» para ነዋሕ siguiendo la revisión inglesa más directa y evitando intensificar el matiz.
  - La imagen espacial se expresa con verbos y preposiciones de dirección («subió», «al», «hacia ellos») para reflejar el ascenso y el envío.
