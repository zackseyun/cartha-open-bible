    rationale: El inglés conserva 'fountains' y 'sources' como alternativas a 'springs'. En español, si el texto principal ya usa 'manantiales', no debe ofrecer 'manantiales' como variante; una nota como 'fuentes' o 'vertientes' / 'fuentes' o 'nacientes' representa mejor el expediente.
