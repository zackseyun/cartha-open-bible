  yaml_path: translation/extra_canonical/1_enoch/089/003.yaml
  text: And again I saw[a], and behold, springs were opened upon the earth in that great enclosure, and that water was bubbling up and rising over the earth, and that enclosure appeared[e][d][c][b], until all its land was covered with water.
  footnotes:
