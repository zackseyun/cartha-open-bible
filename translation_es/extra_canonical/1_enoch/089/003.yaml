    text: Or 'fountains' or 'sources' were opened.
    reason: lexical_alternative
  - marker: b
    text: The clause 'that enclosure appeared' is textually and syntactically difficult; it may mean that the enclosed land came into view as the waters rose, or more broadly that the scene of the enclosure was revealed.
    reason: alternative_reading
  - marker: c
    text: '''All its ground'' may also be understood as ''all the earth,'' depending on how the pronominal ending is taken.'
    reason: alternative_reading
