translation:
  language: es
  text: Y otra vez vi[a], y he aquí, se abrieron manantiales sobre la tierra en aquel gran recinto, y aquella agua brotaba y subía sobre la tierra, y aquel recinto apareció[d][c][b], hasta que toda su tierra quedó cubierta de agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fuentes' o 'vertientes'.
    reason: lexical_alternative
  - marker: b
    text: La cláusula 'aquel recinto apareció' es difícil en ge'ez; puede significar que el recinto quedó a la vista mientras subía el agua, o más ampliamente que se reveló la escena del recinto.
    reason: alternative_reading
  - marker: c
    text: '''Toda su tierra'' también puede entenderse como ''toda la tierra'', según se tome el sufijo pronominal.'
    reason: alternative_reading
  - marker: d
    text: O 'y aquella agua brotaba y subía sobre la tierra; y aquel recinto apareció'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ / And again I saw
  english_pob_choice: And again I saw
  chosen_spanish: Y otra vez vi
  alternatives_spanish:
  - Y vi de nuevo
  - Y otra vez contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la repetición visionaria del relato apocalíptico sin añadir matices no presentes en el original. 'Vi' sigue de cerca el verbo de percepción; 'otra vez' reproduce 'and again' de manera natural en español.
- source_word: አንቅዕታት
  english_pob_choice: springs
  chosen_spanish: manantiales
  alternatives_spanish:
  - fuentes
  - vertientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de agua que emerge del suelo, 'manantiales' comunica bien la idea de fuentes de agua que brotan sin sonar mecánico. Se mantiene la alternativa léxica en nota porque el inglés POB conserva 'springs' con alternativas 'fountains'/'sources'.
- source_word: ተርሕዉ
  english_pob_choice: were opened
  chosen_spanish: se abrieron
  alternatives_spanish:
  - fueron abiertos
  - quedaron abiertos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva ge'ez se vuelve naturalmente reflexiva en español. 'Se abrieron' preserva la acción sobre los manantiales sin introducir agente.
- source_word: ዐጸድ ዐቢይ
  english_pob_choice: great enclosure
  chosen_spanish: gran recinto
  alternatives_spanish:
  - gran cercado
  - gran corral
  - gran recinto cercado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Recinto'' comunica un espacio delimitado sin forzar una lectura arquitectónica o agrícola. ''Gran recinto'' mantiene la amplitud y el carácter espacial del término en la visión.'
- source_word: ይፈልሕ
  english_pob_choice: began to well up / was bubbling up
  chosen_spanish: brotaba
  alternatives_spanish:
  - manaba
  - emanaba
  - borbollaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica agua que sale hacia arriba o aflora. 'Brotaba' es idiomático y conserva el movimiento continuo; evita 'hervía', que impondría una imagen térmica no requerida por el texto.
- source_word: ይትነሣእ
  english_pob_choice: rise
  chosen_spanish: subía
  alternatives_spanish:
  - se levantaba
  - ascendía
  - subía hacia arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Después de 'brotaba', 'subía' reproduce el aumento y ascenso del agua con naturalidad. Mantiene el paralelismo del original sin sobrecargarlo.
- source_word: ተአርአየ ለውእቱ ዐጸድ
  english_pob_choice: that enclosure appeared
  chosen_spanish: aquel recinto apareció
  alternatives_spanish:
  - aquel recinto fue visto
  - se dejó ver aquel recinto
  - aquel recinto quedó a la vista
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula es difícil en ge'ez; 'apareció' conserva la idea de que el recinto quedó visible dentro de la secuencia visionaria. Se evita resolver interpretativamente si 'apareció' describe el recinto, el terreno, o la escena entera.
- source_word: ኵሉ ምድሩ
  english_pob_choice: all its land / all its ground
  chosen_spanish: toda su tierra
  alternatives_spanish:
  - todo su terreno
  - todo su suelo
  - toda su tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Tierra'' permite mantener la ambigüedad entre terreno local y sentido más amplio, igual que el inglés POB en su decisión revisada. En español suena más natural que ''su suelo'' y menos restrictivo que ''terreno''.'
theological_decisions:
- issue: Alcance de la inundación en la visión
  english_pob_reading: The verse is rendered as describing the inundation of the symbolic enclosed land, not explicitly the whole world in the main text.
  chosen_spanish_reading: El texto principal describe la inundación del recinto simbólico y de su propia tierra, sin resolver explícitamente si el horizonte es local o universal.
  alternative_spanish_readings:
  - Una inundación del mundo entero
  - Una escena local dentro del recinto simbólico
  rationale: El ge'ez permite una referencia pronominal al territorio del recinto y no obliga a universalizar la escena. La traducción conserva esa tensión teológica y narrativa en vez de cerrarla con una interpretación más amplia de la que el verso garantiza.
  doctrine_reference: Preservar la tensión exegética sin resolverla prematuramente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión auditada que corrigió la secuencia visionaria para incluir 'y he aquí', y la relación temporal entre el brotar/subir del agua y la aparición del recinto. La versión española refleja esa progresión sin convertirla en una subordinación más explicativa de lo que el ge'ez exige.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' no aplica en este verso; no hay terminología divina explícita.
  - '''Recinto'' se usa de forma consistente para ዐጸድ ዐቢይ, evitando ''jardín'' o ''campo'' que estrecharían indebidamente el sentido.'
  - La ambigüedad de 'toda su tierra' se mantiene deliberadamente para respetar la tensión entre lectura local y más amplia.
  - La fórmula visionaria 'y he aquí' se conserva por su valor apocalíptico y por la revisión auditada.
