translation:
  language: es
  text: Y todos aquellos temieron y temblaron delante de él, y siguieron tras aquel carnero[b] que estaba con ellos [que estaba en medio de ellos][a], porque no podía mantenerse en pie delante de nuestro Señor ni mirarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula «que estaba en medio de ellos» aparece entre corchetes en el testimonio fuente y puede ser una lectura secundaria o incierta.
    reason: textual_variant
  - marker: b
    text: «Carnero» traduce con más precisión el animal simbólico que «oveja» y preserva la distinción del Apocalipsis de los Animales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኵሎሙ
  english_pob_choice: all those
  chosen_spanish: todos aquellos
  alternatives_spanish:
  - todos
  - todos ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es totalizador y anafórico; "todos aquellos" conserva el referente colectivo sin perder la fuerza deíctica del original.
- source_word: እልኩ
  english_pob_choice: said ones
  chosen_spanish: aquellos
  alternatives_spanish:
  - los antes mencionados
  - los que se habían dicho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez es difícil y parece remitir al grupo previamente mencionado. En español, "aquellos" mantiene la referencia sin introducir una glosa interpretativa excesiva.
- source_word: ይፈርሁ
  english_pob_choice: feared
  chosen_spanish: temieron
  alternatives_spanish:
  - tuvieron miedo
  - estuvieron llenos de temor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo básico de temor; "temieron" mantiene el registro solemne y apocalíptico.
- source_word: ይርዐዱ
  english_pob_choice: trembled
  chosen_spanish: temblaron
  alternatives_spanish:
  - se estremecieron
  - quedaron temblando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la duplicación semántica de temor físico sin colapsarla en un solo verbo.
- source_word: እምኔሁ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - por causa de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relación es reverencial/judicial; "delante de él" es idiomático en español y preserva la orientación espacial del original.
- source_word: ደርኁ ድኅሬሁ
  english_pob_choice: they followed after that ram
  chosen_spanish: siguieron tras aquel carnero
  alternatives_spanish:
  - fueron tras aquel carnero
  - lo siguieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa corrigió una lectura más difícil hacia "followed after". En español, "siguieron tras" conserva el matiz de ir detrás sin suavizar el paralelo con el verbo de seguimiento del texto.
- source_word: ለዝኩ በግዕ
  english_pob_choice: that ram
  chosen_spanish: aquel carnero
  alternatives_spanish:
  - ese carnero
  - aquella oveja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto del Apocalipsis de los Animales, "carnero" es más preciso que "oveja" y preserva la distinción simbólica del macho ovino.
- source_word: ምስሌሆሙ
  english_pob_choice: that was with them
  chosen_spanish: que estaba con ellos
  alternatives_spanish:
  - que iba con ellos
  - que estaba entre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la asociación inmediata del carnero con el grupo de modo claro y natural.
- source_word: ዘሀሎ ማእከሎሙ
  english_pob_choice: that was in their midst
  chosen_spanish: que estaba en medio de ellos
  alternatives_spanish:
  - que estaba entre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fuente marca esta cláusula entre corchetes, así que se conserva como lectura alternativa/posible adición textual.
- source_word: እስመ ኢንክል ቀዊመ
  english_pob_choice: because it was not able to stand
  chosen_spanish: porque no podía mantenerse en pie
  alternatives_spanish:
  - porque no podía estar en pie
  - porque no era capaz de sostenerse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reproduce la incapacidad de permanecer erguido ante la presencia superior con una expresión natural en español.
- source_word: ቅድመ እግዚእነ
  english_pob_choice: before our Lord
  chosen_spanish: delante de nuestro Señor
  alternatives_spanish:
  - ante nuestro Señor
  - delante de nuestro Dueño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El poseedor "nuestro" debe conservarse; "Señor" refleja el registro reverencial del ge'ez sin desplazar el sentido a una glosa menos fiel.
- source_word: አነጽሮቶ
  english_pob_choice: to look at him
  chosen_spanish: mirarlo
  alternatives_spanish:
  - verlo
  - contemplarlo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa ver con atención; en español, el infinitivo simple "mirarlo" comunica bien la imposibilidad de sostener la mirada.
theological_decisions:
- issue: Referencia de "nuestro Señor" en el contexto visionario
  english_pob_reading: Retain 'our Lord' as the narrator's/the vision's designation for the divine figure without specifying beyond the text.
  chosen_spanish_reading: Mantener "nuestro Señor" sin identificarlo más allá del texto.
  alternative_spanish_readings:
  - Dios
  - el Señor de las ovejas
  - el soberano celestial
  rationale: El ge'ez dice explícitamente "nuestro Señor". Traducir con más especificidad resolvería indebidamente la tensión simbólica de la visión y debilitaría la transparencia textual.
  doctrine_reference: Preservar la tensión teológica del original sin sobreinterpretación.
- issue: Valor de la cláusula entre corchetes sobre el carnero en medio del grupo
  english_pob_reading: The clause 'that was in their midst' is bracketed in the source witness and may reflect a secondary or uncertain reading.
  chosen_spanish_reading: Conservar la cláusula entre corchetes como lectura incierta o secundaria.
  alternative_spanish_readings:
  - omitirla por completo
  - integrarla sin marca
  rationale: La marca del testimonio fuente indica incertidumbre textual; el español debe reflejarla sin convertirla en parte segura del texto principal.
  doctrine_reference: Respeto por la variante textual y la auditableidad del testimonio.
- issue: Pronombre final referido al carnero
  english_pob_reading: Render the subject as 'it' in keeping with the immediate animal imagery ('ram').
  chosen_spanish_reading: Mantener el referente animal con "no podía" y "mirarlo" respecto del carnero.
  alternative_spanish_readings:
  - no podía mantenerse en pie ... y mirarlo (interpretación personal)
  - no podía mantenerse en pie ... y mirarle
  rationale: La imaginería animal es inmediata y debe permanecer en el nivel simbólico del texto. El español permite sostener esa ambigüedad sin explicitar un pronombre de persona.
  doctrine_reference: Primacía del texto fuente sobre la armonización interpretativa posterior.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que corrigió la lectura difícil de 'begged after him' a 'followed after that ram' y eliminó el infinitivo innecesario final. El español adopta esa línea revisada y conserva, como en el aparato, la cláusula entre corchetes por su posible carácter secundario.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" fuera de este versículo porque el testimonio fuente dice "nuestro Señor" y no el nombre divino tetragramático.
  - Se usa "Señor" con mayúscula como fórmula reverencial en correspondencia con el inglés POB y el ge'ez.
  - Se conserva el nivel animal-simbólico con "carnero" y pronombres neutros/implícitos, sin convertir el pasaje en lectura antropomórfica.
  - La puntuación reproduce la coordinación y la clausula causal del original sin añadir explicaciones interpretativas.
