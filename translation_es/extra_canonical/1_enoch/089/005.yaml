translation:
  language: es
  text: Y todo el ganado[b] que estaba en aquel cercado[a] fue reunido, hasta que lo vi hundirse, ser tragado[d][c] y ser destruido en aquella agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pastizal» para «campo»; el término ge’ez puede designar tierra abierta asociada con pastoreo o cultivo.
    reason: lexical_alternative
  - marker: b
    text: «Ganado» conserva el sentido colectivo de cattle y mantiene el símbolo animal del pasaje sin reducirlo a una especie más específica ni ampliarlo a «animales» en general.
    reason: lexical_alternative
  - marker: c
    text: O «de aquel campo».
    reason: previous_rendering
  - marker: d
    text: O «hasta que vi que se hundía, era tragado y era destruido».
    reason: previous_rendering
lexical_decisions:
- source_word: ኵሎሙ
  english_pob_choice: all of them / all
  chosen_spanish: todas
  alternatives_spanish:
  - todas ellas
  - la totalidad de ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El cuantificador expresa totalidad; en español natural se resume con «todas» sin perder el alcance completo.
- source_word: አላህምት
  english_pob_choice: the cattle
  chosen_spanish: las reses
  alternatives_spanish:
  - el ganado
  - los animales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Reses» preserva el referente colectivo de animales de granja/ganado y suena más amplio y simbólico que «vacas» u opciones más específicas. Mantiene el vehículo animal de la visión.
- source_word: ዐጸድ
  english_pob_choice: in that enclosure
  chosen_spanish: en aquel cercado
  alternatives_spanish:
  - en aquel recinto
  - en aquel campo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada indica continuidad espacial con un mismo ʿaṣad entendido como «enclosure/cercado». «Cercado» conserva esa continuidad mejor que «campo» y evita romper la imagen visionaria.
- source_word: ተጋብኡ
  english_pob_choice: were gathered together
  chosen_spanish: fueron reunidas
  alternatives_spanish:
  - se reunieron
  - fueron juntadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva/mediopasiva se refleja con «fueron reunidas», que mantiene el tono formal y el movimiento colectivo de la frase.
- source_word: እስክነ ርኢክዎሙ
  english_pob_choice: until I saw them
  chosen_spanish: hasta que las vi
  alternatives_spanish:
  - hasta que las vi hundirse
  - hasta verlas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La sintaxis ge'ez incluye el objeto explícito «them»; en español conviene ponerlo antes del primer verbo finito. «Hasta que las vi» deja espacio para los verbos complementarios sin forzar la estructura.
- source_word: ይሠጠሙ
  english_pob_choice: they sank
  chosen_spanish: hundirse
  alternatives_spanish:
  - se hundieran
  - sumergirse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia verbal describe un descenso en el agua; el infinitivo complementario «hundirse» reproduce bien la imagen y encaja con la coordinación posterior.
- source_word: ይትወንጡ
  english_pob_choice: were swallowed up
  chosen_spanish: ser tragadas
  alternatives_spanish:
  - ser engullidas
  - ser absorbidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ser tragadas» conserva la fuerza de la imagen de ser engullidas por el agua sin suavizarla. Además, funciona naturalmente en la serie de infinitivos dependientes de «vi».
- source_word: ይትኃጐሉ
  english_pob_choice: were destroyed
  chosen_spanish: ser destruidas
  alternatives_spanish:
  - perecer
  - ser aniquiladas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ser destruidas» mantiene el cierre del trío verbal con el mismo registro y sin añadir intensidad interpretativa más allá del texto.
- source_word: ማይ
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  - caudal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular ge'ez se refleja con «agua». En español bíblico, «aquella agua» es entendible y preserva el referente singular del original.
theological_decisions:
- issue: Preserving the apocalyptic animal symbolism
  english_pob_reading: Render the herd term concretely as 'cattle' rather than interpretively as a human group.
  chosen_spanish_reading: Conservar el lenguaje animal concreto con «reses», sin convertirlo en un grupo humano interpretativo.
  alternative_spanish_readings:
  - personas
  - ganado simbólico
  - bestias
  rationale: La visión apocalíptica comunica mediante imágenes animales sostenidas; traducirlas como personas borraría el vehículo simbólico que el texto presenta. «Reses» mantiene esa literalidad funcional.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten visionary symbolism.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrige ዐጸድ como «enclosure/cercado» por continuidad espacial con los versículos previos, y la corrección sintáctica que exige expresar el objeto «them» en la cláusula «I saw them sink». La redacción española refleja ambas decisiones.
  spanish_consistency_notes:
  - Se mantiene el registro apocalíptico y la imagen animal sin reinterpretación alegórica explícita.
  - Se usa «agua» en singular, en consonancia con el ge'ez ማይ.
  - Se evita «SEÑOR» u otras sustituciones; no hay aquí léxico divino.
  - La estructura con infinitivos dependientes de «vi» reproduce de manera natural la sintaxis observada en el audit trail.
