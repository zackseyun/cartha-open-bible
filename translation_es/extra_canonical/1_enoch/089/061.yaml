translation:
  language: es
  text: 'Y llamó a otro y le dijo: «Presta atención[a] y mira todo lo que los pastores están haciendo a estas ovejas, porque destruyen de entre ellas[b] más de lo que les mandé[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Presta atención» también puede traducirse «pon atención» o, más literalmente, expresar la idea de dirigir la mente o el corazón a una observación cuidadosa.
    reason: lexical_alternative
  - marker: b
    text: 'El ge''ez tiene un matiz partitivo: «de entre ellas», es decir, de en medio del mismo rebaño.'
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como «más allá de lo que les mandé» o «más de lo que les ordené». La frase implica que habían recibido una comisión limitada y la excedieron.
    reason: cross_reference
lexical_decisions:
- source_word: ለካልእ
  english_pob_choice: to another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otro más
  - a un segundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez señala a un destinatario adicional, sin identificarlo más de lo necesario. «A otro» conserva esa secuencia narrativa con naturalidad en español.
- source_word: ጸውዐ
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó a
  - convocó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el verbo narrativo simple de llamar. «Llamó» reproduce bien el tono visionario y directo del original.
- source_word: ለቡ
  english_pob_choice: Take note
  chosen_spanish: Presta atención
  alternatives_spanish:
  - Toma nota
  - Pon atención
  - Fija tu mente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión parece implicar una orientación de la mente o del corazón hacia una observación cuidadosa. «Presta atención» transmite esa fuerza imperativa de forma natural en español.
- source_word: ወርኢ
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  - y observa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la percepción visual concreta del mandato. «Mira» es idiomático y conserva el valor evidencial de la escena.
- source_word: ኵሎ ዘይገብሩ
  english_pob_choice: all that ... are doing
  chosen_spanish: todo lo que ... están haciendo
  alternatives_spanish:
  - todo cuanto ... hacen
  - todas las cosas que ... hacen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción relativa totalizante se expresa con una cláusula natural en español sin perder el alcance de «todo».
- source_word: ኖሎት
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los cuidadores
  - los boyeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En la Alegoría de los Animales, los supervisores metafóricos se identifican consistentemente como «pastores». Se conserva esa imagen establecida y su carga alegórica.
- source_word: ዲበ እሉ አባግዕ
  english_pob_choice: to these sheep
  chosen_spanish: a estas ovejas
  alternatives_spanish:
  - sobre estas ovejas
  - contra estas ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición puede ser amplia, pero en contexto las acciones son dañinas y dirigidas al rebaño. «A estas ovejas» es el equivalente más directo y fluido en español.
- source_word: ያሐጕሉ
  english_pob_choice: they are destroying
  chosen_spanish: destruyen
  alternatives_spanish:
  - están destruyendo
  - arruinan
  - hacen perecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Destruyen» expresa la fuerza destructiva del verbo sin forzar una especificación mayor, y mantiene la gravedad del juicio implícito.
- source_word: እምውስተቶሙ
  english_pob_choice: among them
  chosen_spanish: entre ellas
  alternatives_spanish:
  - de entre ellas
  - de entre ellos
  - en medio de ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El giro ge''ez tiene un matiz partitivo: destrucción que ocurre dentro del propio conjunto. En español, «entre ellas» comunica esa acción interna sobre el rebaño.'
- source_word: ፈድፋደ እምዘ አዘዝክዎሙ
  english_pob_choice: more than I commanded them
  chosen_spanish: más de lo que les mandé
  alternatives_spanish:
  - más de lo que les ordené
  - más allá de lo que les mandé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Mandé» mantiene la relación de autoridad y el exceso culpable respecto de una comisión limitada. La alternativa «ordené» es posible, pero «mandé» suena más natural en este contexto narrativo.
theological_decisions:
- issue: Exceso culpable respecto de una comisión limitada
  english_pob_reading: The shepherds exceed a divinely permitted commission and act destructively beyond what was commanded.
  chosen_spanish_reading: Los pastores actúan destructivamente más allá de lo que se les mandó, excediendo una comisión limitada.
  alternative_spanish_readings:
  - Los pastores simplemente descuidan su deber.
  - La frase solo indica exceso numérico sin carga moral.
  rationale: El verbo de destrucción junto con el comparativo «más de lo que les mandé» indica exceso culpable, no mera negligencia. La redacción española conserva esa tensión teológica sin resolverla artificialmente.
  doctrine_reference: Conservar la tensión teológica documentada en la alegoría, en vez de suavizarla o explicarla en exceso.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, especialmente la preferencia por un matiz partitivo en እምውስተቶሙ. En español se optó por «entre ellas» para reflejar la destrucción interna del rebaño sin perder naturalidad. También se respetó la tensión entre el daño cometido y el límite de la comisión recibida.
  spanish_consistency_notes:
  - Se mantiene «pastores» para los ኖሎት por coherencia con la alegoría.
  - Se conserva «ovejas» como imagen estable para el rebaño metafórico.
  - Se usa «mandó» en lugar de «ordenó» para mantener un tono narrativo sobrio y directo.
  - Se evita la terminología eclesiástica de «pastores» como ministros; aquí funciona solo como figura alegórica del texto.
