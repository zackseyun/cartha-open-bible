    reason: lexical_alternative
  revision_rationale: 'Se mantiene la lectura jussiva negativa ya adjudicada, pero se corrige la última cláusula para un español más fiel y natural: «haz subir todo ello ante mí» expresa mejor el valor causativo y la imaginería de ascenso que «sube todo ello ante mí». También se depuran las notas para reflejar alternativas léxicas relevantes al lector final, en especial la de la cláusula final documentada en la auditoría inglesa.'
