translation:
  language: es
  text: Y que no lo sepan, y no se lo muestres, y no los reprendas; más bien, escribe toda la destrucción de los pastores, cada uno en su tiempo[a], y haz subir todo ello[b] ante mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada uno a su tiempo». La construcción es distributiva y también puede sugerir una secuencia por turnos o caso por caso.
    reason: lexical_alternative
  - marker: b
    text: O «preséntalo todo ante mí». El verbo etiópico puede sugerir ‘hacer subir’ o ‘presentar’; aquí se conserva la imaginería ascendente de una presentación celestial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወኢያእምሩ
  english_pob_choice: and they did not know / let them not know
  chosen_spanish: y que no lo sepan
  alternatives_spanish:
  - y no lo sepan
  - y que ellos no sepan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente corrige la forma verbal como jussivo negativo de tercera persona plural, no como pasado. En español, «que no lo sepan» conserva la prohibición y el carácter deliberado de ocultamiento sin forzar un pasado.
- source_word: ወኢታርእዮሙ
  english_pob_choice: and do not show them / and I did not show them
  chosen_spanish: y no se lo muestres
  alternatives_spanish:
  - y no se los muestres
  - y no los muestres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto gramatical exige segunda persona singular; por eso se traduce como mandato negativo. «Se lo muestres» preserva el objeto indirecto/causativo de mostrar y evita la lectura de primera persona descartada por la adjudicación.
- source_word: ወኢትዝለፎሙ
  english_pob_choice: and do not rebuke them / and I did not rebuke them
  chosen_spanish: y no los reprendas
  alternatives_spanish:
  - y no los censures
  - y no los recrimines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Reprender» mantiene el tono judicial y profético del pasaje. Otras opciones son posibles, pero suavizan o cambian el matiz de corrección pública que el verbo sugiere.
- source_word: አላ፡ ጸሐፍ
  english_pob_choice: but write down
  chosen_spanish: sino escribe
  alternatives_spanish:
  - pero escribe
  - más bien escribe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La adversativa introduce contraste con las prohibiciones previas. En español, «sino» comunica bien el giro correctivo del mandato; «escribe» conserva la fuerza imperativa sin añadir una glosa innecesaria.
- source_word: ኵሎ፡ ሐጕለ፡ ኖላዊያን
  english_pob_choice: all the destruction of the shepherds
  chosen_spanish: toda la destrucción de los pastores
  alternatives_spanish:
  - toda la ruina de los pastores
  - todo el derrumbe de los pastores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene «destrucción» porque el sustantivo apunta a ruina/judgment con intensidad apocalíptica. «Pastores» se conserva según la imagen simbólica del texto, sin sustituirla por una explicación interpretativa.
- source_word: በጊዜሁ፡ ለለ፡ ፩፩
  english_pob_choice: each one in its time
  chosen_spanish: cada uno en su tiempo
  alternatives_spanish:
  - uno por uno en su tiempo señalado
  - cada uno a su tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase tiene valor distributivo y temporal. «Cada uno en su tiempo» conserva ambas ideas de secuencia y asignación temporal sin sobredeterminar el sentido del pasaje.
- source_word: ወአዐርግ፡ ኵሎ፡ ኀቤየ
  english_pob_choice: and bring all of it up before me
  chosen_spanish: y sube todo ello ante mí
  alternatives_spanish:
  - y preséntalo todo ante mí
  - y haz que todo ello suba ante mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sube» conserva la imagen vertical del verbo etiópico, que la auditoría inglesa también protegía. «Ante mí» suena más natural en español bíblico que «before me» calcado, y mantiene la escena de presentación celestial.
theological_decisions:
- issue: Mandato negativo y ocultamiento deliberado
  english_pob_reading: The shepherds are not to be informed, shown, or rebuked at this stage; their deeds are recorded for later reckoning.
  chosen_spanish_reading: No deben saberlo ni recibir advertencia o corrección; en cambio, todo su daño queda escrito para su posterior rendición de cuentas.
  alternative_spanish_readings:
  - No se les informa ni se les reprende; solo se registra su destrucción.
  - Que no lo sepan, no se les muestre y no se les reprenda; más bien, escribe su destrucción.
  rationale: 'La revisión textual indica que las formas son jussivas negativas dirigidas al encargado de escribir. El español debe reflejar una prohibición actual, no un relato en pasado. Se conserva además la tensión teológica: no hay intervención inmediata, sino registro para juicio futuro.'
  doctrine_reference: Mantener la tensión entre ocultamiento, paciencia y juicio diferido; no suavizar la dimensión judicial del pasaje.
translation_notes:
  revision_awareness: 'Se incorporó la corrección de la revisión más reciente: las tres primeras cláusulas son jussivos negativos dirigidos al escriba/ángel, no una narración en pasado ni una voz primera persona. El español fue ajustado para reflejar esa gramática y la lectura de juicio diferido.'
  spanish_consistency_notes:
  - Se mantiene «pastores» para conservar el símbolo del Animal Apocalypse y no explicitar la interpretación dentro del texto.
  - Se prefiere «sino» frente a «pero» para marcar con claridad el contraste entre prohibición y mandato.
  - Se conserva la imagen ascendente de «sube» en lugar de un más neutro «presenta», en continuidad con la preferencia auditada por la verticalidad del original.
