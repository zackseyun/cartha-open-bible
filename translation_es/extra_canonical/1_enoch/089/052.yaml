translation:
  language: es
  text: Y uno de ellos escapó y no fue muerto[a]; y clamó sobre las ovejas, y quisieron matarlo, pero el Señor de las ovejas lo salvó de en medio de las ovejas, y lo llevó hasta mí y lo puso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘clamó a las ovejas’ o ‘clamó acerca de las ovejas’; la preposición ge’ez permite más de una relación aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ድኅነ
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - fue librado
  - fue salvado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En secuencia con ‘no fue muerto’, el verbo expresa con naturalidad la supervivencia o escape de la agresión. ‘Escapó’ conserva el dinamismo narrativo sin anticipar el rescate divino que aparece después.
- source_word: ኢተቀትለ
  english_pob_choice: was not killed
  chosen_spanish: no fue muerto
  alternatives_spanish:
  - no fue asesinado
  - no fue muerto a espada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una pasiva negativa directa. ‘No fue muerto’ mantiene el tono sobrio y la fuerza narrativa del original mejor que una paráfrasis más interpretativa.
- source_word: ጸርኀ
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo pide una voz fuerte de alarma o dolor. ‘Clamó’ funciona bien en español bíblico y conserva solemnidad sin especificar demasiado el matiz.
- source_word: ዲበ አባግዕ
  english_pob_choice: over the sheep
  chosen_spanish: sobre las ovejas
  alternatives_spanish:
  - a las ovejas
  - acerca de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición apunta literalmente a una relación de sobre/encima. En esta visión, ‘sobre las ovejas’ preserva la imagen y evita decidir prematuramente si el clamor era dirigido a ellas o acerca de ellas.
- source_word: ፈቀዱ ይቅትልዎ
  english_pob_choice: they wanted to kill it
  chosen_spanish: quisieron matarlo
  alternatives_spanish:
  - querían matarlo
  - buscaron matarlo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa intención o deseo. ‘Quisieron matarlo’ es natural y transmite con claridad la voluntad hostil.
- source_word: እግዚአ አባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el Amo de las ovejas
  - el Dueño de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un título reverente y recurrente en la Alegoría de los Animales para Dios. ‘Señor’ preserva el registro teológico y el valor tradicional del título sin convertirlo en un simple término administrativo.
- source_word: አድኃኖ
  english_pob_choice: saved it
  chosen_spanish: lo salvó
  alternatives_spanish:
  - lo libró
  - lo rescató
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el sujeto es explícitamente el Señor de las ovejas; por eso conviene un verbo fuerte de rescate divino. ‘Lo salvó’ mantiene el peso teológico y la naturalidad en español.
- source_word: እምኔሆሙ
  english_pob_choice: from among the sheep
  chosen_spanish: de en medio de las ovejas
  alternatives_spanish:
  - de entre ellas
  - del medio de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrigió la idea de ‘para las ovejas’ y precisó que la salida es desde dentro del grupo hostil. ‘De en medio de las ovejas’ reproduce bien esa separación desde el interior del rebaño.
- source_word: አዕረጎ ኀቤየ
  english_pob_choice: brought it up to me
  chosen_spanish: lo llevó hasta mí
  alternatives_spanish:
  - lo trajo hasta mí
  - lo hizo subir hasta mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo incluye movimiento de elevación o aproximación en la visión. ‘Lo llevó hasta mí’ fluye mejor en español, mientras ‘hasta mí’ conserva la idea de traslado directo al vidente.
- source_word: አንበሮ
  english_pob_choice: set it down
  chosen_spanish: lo puso allí
  alternatives_spanish:
  - lo dejó allí
  - lo colocó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Tras traerlo al vidente, el sentido inmediato es colocación delante de él. ‘Lo puso allí’ es concreto y conserva la secuencia narrativa sin sobrecargarla.
theological_decisions:
- issue: Título divino en la Alegoría de los Animales
  english_pob_reading: the Lord of the sheep
  chosen_spanish_reading: el Señor de las ovejas
  alternative_spanish_readings:
  - el Amo de las ovejas
  - el Dueño de las ovejas
  rationale: El título funciona como circunlocución reverente para Dios dentro del simbolismo animal. ‘Señor’ preserva el registro teológico y la convención de traducir títulos con dignidad, sin reducir el sentido a mera propiedad.
  doctrine_reference: Translation philosophy §2, ‘Translate titles; transliterate names’
translation_notes:
  revision_awareness: Se siguió el último pase de revisión que eliminó una acción no sustentada (‘se levantó/saltó’) y precisó እምኔሆሙ como separación desde el interior del grupo, no como beneficio para las ovejas. La redacción española intenta reflejar esa lectura revisada sin perder la ambigüedad controlada del original en el clamor sobre/a/por las ovejas.
  spanish_consistency_notes:
  - Se usa ‘Señor’ para el título divino recurrente del texto, coherente con el registro reverente del pasaje.
  - Se evita ‘Cristo’ o terminología cristológica ajena al contexto; el versículo pertenece a una alegoría visionaria de 1 Enoc.
  - ‘Ovejas’ mantiene el simbolismo del pasaje sin explicar alegóricamente el referente.
  - ‘Salvar’ se reserva para el rescate divino explícito; ‘escapó’ describe la supervivencia inicial del individuo.
