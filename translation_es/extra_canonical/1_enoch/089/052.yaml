base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/052.yaml
  text: And one of them escaped and was not killed[a]; and it cried out over the sheep, and they wanted to kill it, but the Lord of the sheep saved it from among the sheep[c][b], and brought it up to me and set it down.
  footnotes:
  - marker: a
    text: Or 'cried out to the sheep' or 'cried out concerning the sheep'; the Ge'ez preposition can be taken more than one way here.
    reason: lexical_alternative
  - marker: b
    text: '''For the sheep'' may also mean ''to the sheep'' or ''on behalf of the sheep.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'saved it from them for the sheep'.
    reason: previous_rendering
