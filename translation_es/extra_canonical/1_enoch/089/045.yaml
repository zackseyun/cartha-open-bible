  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/045.yaml
  text: And the Lord of the sheep sent a sheep to another sheep[a], and raised him up so that he might become a ram and might lead the sheep in place of that ram[c][b], which had abandoned his glory.
  footnotes:
