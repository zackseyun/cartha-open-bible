translation:
  language: es
  text: Y el Señor de las ovejas envió una oveja a otra[a], y lo levantó para que llegara a ser un carnero y guiara a las ovejas en lugar de aquel carnero[b], que había abandonado su gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a otra oveja». El singular puede expresarse de forma abreviada con «otra», sin cambiar el sentido.
    reason: lexical_alternative
  - marker: b
    text: O «su honor» o «su esplendor». La frase probablemente alude al estatus o dignidad del carnero, no solo a un brillo visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚኦሙ
  english_pob_choice: the Lord of the sheep / the Lord
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el Señor
  - su Señor
  - el Amo de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantengo el título elevado y relacional del original. «Señor de las ovejas» explicita el dominio sobre el grupo simbólico sin rebajar el registro a «amo», que en español suena más duro y menos teológicamente marcado.
- source_word: አባግዕ
  english_pob_choice: the sheep
  chosen_spanish: las ovejas / una oveja
  alternatives_spanish:
  - el rebaño
  - ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo la imaginería zoomórfica concreta. En el singular del objeto enviado, «una oveja» sigue la revisión inglesa más reciente y evita la distorsión de convertirla en «cordero», que no está apoyado por el ge'ez.
- source_word: ፈነዎ
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  - mandó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Envió» reproduce de manera natural la idea de comisión o envío sin añadir matices ajenos. En español bíblico conserva la iniciativa del Señor.
- source_word: አንሥአ
  english_pob_choice: raised him up
  chosen_spanish: lo levantó
  alternatives_spanish:
  - lo alzó
  - lo exaltó
  - lo levantó y lo exaltó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede expresar elevación/promoción. «Lo levantó» conserva la imagen y permite que la elevación sea tanto literal como funcional, sin cerrar el sentido a una mera designación administrativa.
- source_word: ከመ ይኩን ሐርጌ
  english_pob_choice: so that he might become a ram
  chosen_spanish: para que llegara a ser un carnero
  alternatives_spanish:
  - para que fuera un carnero
  - para que se convirtiera en un carnero
  - para que llegara a ser líder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo el símbolo animal de la apocalíptica y evito abstractar la figura a «líder». «Llegara a ser» comunica el cambio de estado con un matiz más narrativo que «fuera».
- source_word: ይመርሖሙ
  english_pob_choice: might lead the sheep
  chosen_spanish: guiara a las ovejas
  alternatives_spanish:
  - condujera a las ovejas
  - las pastoreara
  - las guiara
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Guiara» expresa la función directiva con naturalidad en español. «Pastoreara» es posible, pero introduce una carga más específicamente pastoral que puede exceder el foco del símbolo en esta línea.
- source_word: ህየንተ ዝኩ ሐርጌ
  english_pob_choice: in place of that ram
  chosen_spanish: en lugar de aquel carnero
  alternatives_spanish:
  - en vez de aquel carnero
  - en sustitución de aquel carnero
  - en lugar de ese carnero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión señala sucesión o reemplazo. «Aquel carnero» mantiene distancia anafórica y evita la ambigüedad de «ese». Mantengo «carnero» para la figura de liderazgo en el código zoomórfico.
- source_word: ዘሐደገ ስብሐቲሁ
  english_pob_choice: which had abandoned his glory
  chosen_spanish: que había abandonado su gloria
  alternatives_spanish:
  - que había dejado su gloria
  - que había abandonado su honor
  - que había dejado su honor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gloria» preserva la densidad apocalíptica y el lenguaje de estatus/dignidad. «Abandonado» traduce de forma directa la acción deliberada sin especificar más de lo que el texto dice.
theological_decisions:
- issue: Conservación de la imaginería zoomórfica en la sucesión de liderazgo
  english_pob_reading: A sheep is sent to another sheep and is raised to become a ram, preserving the symbolic animal progression.
  chosen_spanish_reading: Una oveja es enviada a otra oveja y es levantada para llegar a ser un carnero, conservando la progresión simbólica.
  alternative_spanish_readings:
  - Se envía un líder a otro líder
  - Se envía una oveja joven a otra oveja y luego se convierte en dirigente
  rationale: La visión apocalíptica depende de animales concretos con valor simbólico. Traducirlos como cargos humanos borra el código narrativo. Por eso mantengo oveja/carnero, dejando que el lector perciba la transferencia de estatus sin deshacer la metáfora.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten symbolic language into generic prose.'
- issue: Sentido de «su gloria» en el cierre
  english_pob_reading: Translate literally as 'his glory' with an alternative note that 'honor' or 'splendor' may be intended.
  chosen_spanish_reading: su gloria
  alternative_spanish_readings:
  - su honor
  - su esplendor
  rationale: «Gloria» es suficientemente amplio para abarcar honra, dignidad y esplendor visible, y conserva el peso teológico del término en un contexto visionario. No resuelvo la tensión semántica en el cuerpo del texto; la documento en nota.
  doctrine_reference: Preserve theological tension rather than resolve it; document alternatives in footnotes.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió el antecedente de singular a singular («a sheep to another sheep») y mantuvo el cierre con «his glory». El borrador español sigue esa revisión: usa «una oveja a otra oveja» y conserva la tensión de «gloria» con nota alternativa de «honor/esplendor». También evita la anterior tendencia a «cordero», que no está respaldada por el ge''ez para በግዕ.'
  spanish_consistency_notes:
  - Mantengo «Señor de las ovejas» para coherencia con el código zoomórfico del Animal Apocalypse.
  - Uso «oveja» para በግዕ y «carnero» para ሐርጌ, siguiendo la distinción funcional del pasaje.
  - Conservo «gloria» en el texto principal para no resolver prematuramente la ambigüedad de ስብሐቲሁ.
  - La puntuación y el orden verbal buscan una cadencia bíblica clara en español sin calcos innecesarios.
