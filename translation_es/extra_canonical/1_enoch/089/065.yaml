translation:
  language: es
  text: Y vi hasta que aquellos pastores apacentaban en su tiempo[a], y comenzaron a matar y destruir mucho más de lo que les había sido mandado[b][c], y abandonaron aquellas ovejas en manos de los leones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su tiempo». La frase indica el período señalado para la actividad de aquellos pastores.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «de lo que les había sido mandado» o «más allá de lo que les había sido mandado».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «mucho más de lo que se les había mandado».'
    reason: previous_rendering
lexical_decisions:
- source_word: ኖላዊያን
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores-guardianes
  - pastores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pastores» conserva la imagen de conducción y custodia del rebaño. En el marco alegórico de 1 Enoc, el término remite a los vigilantes designados simbólicamente; «pastores» mantiene esa metáfora mejor que opciones más explicativas como «pastores-guardianes».
- source_word: ይርዐዩ
  english_pob_choice: pastured
  chosen_spanish: apacentaban
  alternatives_spanish:
  - pastoreaban
  - guiaban el rebaño
  - alimentaban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo corresponde al acto de apacentar/pastorear dentro de la imagen del rebaño. «Apacentaban» es natural en español bíblico y preserva el registro pastoril sin perder la acción concreta.
- source_word: በጊዜሁ
  english_pob_choice: in their time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - en su temporada
  - en su momento
  - en su tiempo asignado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase señala un período determinado o asignado. «En su tiempo» reproduce bien el valor de un lapso concedido a esos pastores, y en español suena más fluido que una glosa como «en su tiempo asignado».
- source_word: ወአኃዙ
  english_pob_choice: they began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - se pusieron a
  - empezaron
  - procedieron a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor incoativo del verbo se expresa con claridad mediante «comenzaron». Es la opción más directa y estable para introducir la serie verbal siguiente.
- source_word: ይቅትሉ
  english_pob_choice: to kill
  chosen_spanish: matar
  alternatives_spanish:
  - matar
  - dar muerte a
  - matar a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Matar» es fiel, directo y suficientemente sobrio para el tono apocalíptico. No se requiere una forma más literaria como «dar muerte a».
- source_word: ያሕጕሉ
  english_pob_choice: destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - arruinar
  - devastar
  - arrasar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El par verbal intensifica la violencia: matar y destruir. «Destruir» conserva esa intensificación sin sobrecargar el verso con una equivalencia más extrema como «arrasar».'
- source_word: ብዙኃ እም
  english_pob_choice: much more than they had been commanded
  chosen_spanish: mucho más de lo que les había sido mandado
  alternatives_spanish:
  - mucho más de lo que se les había mandado
  - más allá de lo que se les había mandado
  - mucho más de lo que les habían mandado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión más reciente del audit trail muestra que la construcción ge''ez funciona comparativamente: «mucho más de». Mantengo esa relación y la pasiva impersonal «les había sido mandado» para expresar con precisión el exceso respecto de una orden recibida.'
- source_word: እምትእዛዞሙ
  english_pob_choice: beyond what had been commanded them
  chosen_spanish: de lo que les había sido mandado
  alternatives_spanish:
  - de sus órdenes
  - de lo que se les había ordenado
  - más allá de su mandato
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El núcleo semántico es la comisión/mandato dado a los pastores. «Mandado» conserva el tono de mandato recibido y evita domesticar el texto con un lenguaje demasiado administrativo.
- source_word: ኃደጉ
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - entregaron
  - desampararon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo implica una renuncia culpable, no solo una salida. «Abandonaron» refleja mejor esa carga que «dejaron».
- source_word: አባግዐ
  english_pob_choice: those sheep
  chosen_spanish: esas ovejas
  alternatives_spanish:
  - aquellas ovejas
  - ese rebaño
  - las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo conserva la referencia a las ovejas ya mencionadas y subraya que son el rebaño concreto confiado a esos pastores. «Esas ovejas» es natural y mantiene la deixis.
- source_word: ውስተ እደ
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - entregadas a
  - en poder de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión idiomática «en manos de» reproduce la fórmula bíblica de entrega a dominio ajeno mejor que una simple paráfrasis como «en poder de».
- source_word: አናብስት
  english_pob_choice: the lions
  chosen_spanish: los leones
  alternatives_spanish:
  - leones
  - bestias feroces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En la alegoría animal, el término específico «leones» debe mantenerse para conservar la imaginería y la correspondencia simbólica.
theological_decisions:
- issue: Si los pastores actuaron dentro de su comisión o más allá de ella
  english_pob_reading: They began to kill and destroy much more than they had been commanded.
  chosen_spanish_reading: Comenzaron a matar y destruir mucho más de lo que les había sido mandado.
  alternative_spanish_readings:
  - Comenzaron a matar y destruir conforme a lo que se les había mandado.
  - Comenzaron a matar y destruir, y luego lo hicieron en exceso.
  rationale: 'Sigo la lectura del audit trail que entiende la construcción ge''ez como comparativa de exceso. La redacción española conserva la tensión teológica: el daño no fue simplemente permitido, sino que excedió lo encomendado.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente; registrar el abuso de una autoridad delegada.
translation_notes:
  revision_awareness: El texto español sigue la última decisión revisada del expediente, que corrigió la construcción ge'ez para expresar una comparación de exceso («mucho más de») y no «muchos más» como objeto directo. También conserva la lectura estable de «en su tiempo» para el período asignado a los pastores.
  spanish_consistency_notes:
  - Se mantiene «pastores» para preservar la metáfora animal y la terminología interna de 1 Enoc.
  - Se usa «apacentaban» para corresponder al verbo pastoril del original y al registro apocalíptico.
  - «En manos de los leones» reproduce la fórmula idiomática de entrega a dominio ajeno sin perder literalidad.
  - La nota [b] y la nota [c] distinguen el matiz comparativo y la variante de redacción, evitando suavizar el exceso culpable de los pastores.
