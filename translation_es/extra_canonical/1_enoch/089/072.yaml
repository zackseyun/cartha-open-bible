base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/072.yaml
  text: And after that I saw[a], as the shepherds were pasturing for twelve hours, and behold, three of those sheep came, and they arrived and entered[e][d][c][b], and they began to build up all that had fallen down of that house.
  footnotes:
  - marker: a
    text: The phrase 'twelve hours' is likely symbolic within the vision, marking a set period rather than a literal clock-time.
    reason: cultural_note
  - marker: b
    text: The Ethiopic piles up several motion verbs ('came in,' 'arrived,' 'entered'). The English keeps the repetition because it is part of the vision's style.
    reason: lexical_alternative
  - marker: c
    text: The surviving OCR is difficult at the end of the verse. The sense appears to be that the three sheep began building or rebuilding comprehensively, likely in relation to the 'house' imagery of the surrounding context.
    reason: textual_variant
  - marker: d
    text: Or 'that they pastured'.
    reason: previous_rendering
  - marker: e
    text: Or 'came in'.
    reason: previous_rendering
