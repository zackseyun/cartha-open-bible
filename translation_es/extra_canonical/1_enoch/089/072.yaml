translation:
  language: es
  text: Y después de eso vi[a], mientras los pastores pastoreaban durante doce horas, y he aquí, tres de aquellas ovejas vinieron, y llegaron y entraron[b], y comenzaron a reconstruir todo lo caído de aquella casa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión 'después de eso' probablemente marca avance temporal dentro de la visión, no una secuencia cronológica ordinaria.
    reason: cultural_note
  - marker: b
    text: El ge'ez acumula varios verbos de movimiento ('vinieron', 'llegaron', 'entraron'); se conservan en español porque forman parte del ritmo visionario.
    reason: lexical_alternative
  - marker: c
    text: El final del verso es difícil en la tradición transmitida; el sentido parece ser una restauración o reconstrucción de todo lo caído de la casa.
    reason: textual_variant
lexical_decisions:
- source_word: እምኔሁ
  english_pob_choice: after that
  chosen_spanish: y después de eso
  alternatives_spanish:
  - y luego
  - y después
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa con naturalidad la progresión temporal visionaria sin forzar un 'otra vez' que podría sugerir repetición más que secuencia.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, la fórmula profética es natural y directa con 'vi'; conserva el reporte visionario en primera persona.
- source_word: ኖሎት
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los pastores angelicales
  - los guardianes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez explicita el sujeto 'pastores', y el contexto del Apocalipsis de los Animales remite a los pastores simbólicos del relato; 'pastores' mantiene la imagen sin decodificarla en el texto principal.
- source_word: ይርዐዩ
  english_pob_choice: they pastured
  chosen_spanish: pastoreaban
  alternatives_spanish:
  - estaban pastoreando
  - apacentaban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pastoreaban'' conserva el imperfectivo y la imagen pastoril; en español suena más natural que una pasiva forzada.'
- source_word: ኖሎት ፲ወ፪ሰዓተ
  english_pob_choice: for twelve hours
  chosen_spanish: durante doce horas
  alternatives_spanish:
  - por doce horas
  - por doce periodos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la literalidad del símbolo temporal sin convertirlo en una explicación histórica. 'Durante' funciona bien con el imperfectivo.
- source_word: ፫ እምዝኩ አባግዕ
  english_pob_choice: three of those sheep
  chosen_spanish: tres de aquellas ovejas
  alternatives_spanish:
  - tres ovejas de aquellas
  - tres de esas ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Aquellas'' refleja el carácter anafórico del grupo ya mencionado y su distancia narrativa en la visión.'
- source_word: ገብኡ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - volvieron
  - llegaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión detectó que 'came in' era demasiado específico; 'vinieron' conserva el movimiento sin introducir 'regreso' como sentido principal.
- source_word: ወመጽኡ
  english_pob_choice: arrived
  chosen_spanish: llegaron
  alternatives_spanish:
  - arribaron
  - vinieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Llegaron'' es claro y natural, y mantiene la secuencia de verbos de movimiento.'
- source_word: ወቦኡ
  english_pob_choice: entered
  chosen_spanish: entraron
  alternatives_spanish:
  - ingresaron
  - penetraron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el verbo de entrada de forma simple y readable, en paralelo con 'vinieron' y 'llegaron'.
- source_word: ወአኀዙ
  english_pob_choice: they began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  - se pusieron a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Comenzaron'' reproduce el valor incoativo con dignidad literaria.'
- source_word: እንዘ ሐንጹ
  english_pob_choice: to build up
  chosen_spanish: a levantar de nuevo
  alternatives_spanish:
  - a reconstruir
  - a edificar de nuevo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La tradición de revisión señala una acción de restauración. 'Levantar de nuevo' conserva la imagen de edificar sin imponer un tecnicismo que cierre la ambigüedad entre construir y reconstruir.
- source_word: ኵሎ
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - todo lo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Todo'' mantiene la amplitud totalizadora de la restauración.'
theological_decisions:
- issue: Tratamiento de la imaginería apocalíptica de los pastores y las ovejas
  english_pob_reading: Keep the animal imagery and house-building imagery in the main text without decoding it.
  chosen_spanish_reading: Mantener la imaginería de pastores y ovejas, y la de la casa, sin explicarla en el cuerpo del versículo.
  alternative_spanish_readings:
  - Explicitar que son líderes y retornados
  - Traducir la casa como el templo
  rationale: El texto fuente presenta una visión simbólica; la traducción debe preservar la figura, no sustituirla por una paráfrasis histórica. La identificación interpretativa puede ir en notas, pero no en el versículo.
  doctrine_reference: Principio de fidelidad al género apocalíptico y de no sobreexplicar la visión en el texto base.
- issue: Valor de 'twelve hours' como período simbólico
  english_pob_reading: The phrase 'twelve hours' is likely symbolic within the vision, marking a set period rather than a literal clock-time.
  chosen_spanish_reading: Conservar 'doce horas' como período simbólico o visionario, sin cronometraje literal.
  alternative_spanish_readings:
  - doce periodos
  - doce tiempos
  rationale: La forma literal permite que el lector perciba el simbolismo sin que el traductor lo cierre con una explicación interpretativa en el texto principal.
  doctrine_reference: Respeto al lenguaje simbólico interno de la visión.
translation_notes:
  revision_awareness: Se atendió la revisión más reciente que corrigió una lectura anterior demasiado específica ('came in' -> 'came') y una omisión crítica del sujeto 'los pastores'. También se evitó traducir ገብኡ como 'regresaron', porque la revisión indica que el sentido no es suficientemente fuerte para afirmar 'return'.
  spanish_consistency_notes:
  - Se mantiene 'pastores' para ኖሎት, siguiendo el audit trail y evitando borrar el sujeto explícito.
  - '''Ovejas'' y ''casa'' se preservan como imágenes apocalípticas sin decodificación contextual en el versículo.'
  - La secuencia de verbos de movimiento se conserva para reflejar el estilo acumulativo del ge'ez.
  - '''Levantar de nuevo'' deja abierta la ambigüedad entre construir y reconstruir, acorde con la nota textual.'
