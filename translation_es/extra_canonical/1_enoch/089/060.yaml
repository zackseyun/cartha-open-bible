translation:
  language: es
  text: «Y los entregaré[a] a ustedes por número, y les diré[b] cuáles de ellos han de ser destruidos[c], y a esos ustedes los destruirán». Y él les entregó aquellas ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «por número» sigue de cerca el valor distributivo del texto; también podría leerse con matiz de «según el número» o «en número».
    reason: lexical_alternative
  - marker: b
    text: El doble verbo de comunicación se mantiene como repetición enfática; «les diré» refleja el primero de los dos verbos de habla.
    reason: lexical_alternative
  - marker: c
    text: La expresión futura relativa apunta a destino o adjudicación para destrucción; por eso se evita una formulación más general como «lo que sucederá».
    reason: theological_note
lexical_decisions:
- source_word: አሜጥወክሙ
  english_pob_choice: I will hand them over to you
  chosen_spanish: los entregaré a ustedes
  alternatives_spanish:
  - se los entregaré
  - los pondré en sus manos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etíope expresa transferencia/entrega, no mero decir. En español, «entregar» conserva la fuerza de pasar algo a otro, y el complemento indirecto «a ustedes» mantiene el destinatario plural.
- source_word: በኍልቍ
  english_pob_choice: by number
  chosen_spanish: por número
  alternatives_spanish:
  - en número
  - según el número
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica asignación o distribución numérica. «Por número» reproduce de manera directa esa relación sin convertirla en una explicación más libre.
- source_word: እነግረክሙ
  english_pob_choice: I will tell you
  chosen_spanish: les diré
  alternatives_spanish:
  - les declararé
  - les haré saber
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El segundo verbo es de comunicación directa. «Decir» es natural en español y conserva la repetición enfática de la frase anterior sin cargarla de más solemnidad que la del original.
- source_word: ዘይትኃጐል
  english_pob_choice: which of them are to be destroyed
  chosen_spanish: cuáles de ellos han de ser destruidos
  alternatives_spanish:
  - cuáles de ellos serán destruidos
  - cuáles de ellos deben ser destruidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma relativa futura apunta a los que están destinados a destrucción. «Han de ser destruidos» conserva el sentido de destino/inminencia sin suavizar el juicio.
- source_word: አኅጕሉ
  english_pob_choice: those you shall destroy
  chosen_spanish: a esos ustedes los destruirán
  alternatives_spanish:
  - y a esos los destruirán
  - y ustedes destruirán a esos
  lexicon: Dillmann, Lexicon Lingae Aethiopicae
  rationale: La acción es imperativa y concreta. «Destruirán» conserva la fuerza verbal, y el orden con objeto dislocado suena natural en español sin perder la referencia demostrativa.
- source_word: መጠወ
  english_pob_choice: he handed over
  chosen_spanish: él les entregó
  alternatives_spanish:
  - él los entregó a ellos
  - él se los entregó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo final es activo, no pasivo, como indica la revisión. «Entregó» mantiene el sentido de transferencia y el tono ominoso del pasaje.
- source_word: ዝኩ አባግዐ
  english_pob_choice: those sheep
  chosen_spanish: aquellas ovejas
  alternatives_spanish:
  - esas ovejas
  - las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo y el plural nominal se refieren al grupo simbólico ya mencionado. «Aquellas ovejas» refleja bien la distancia narrativa y el referente colectivo.
theological_decisions:
- issue: Fuerza judicial de la entrega y la destrucción
  english_pob_reading: The verse describes transfer for destruction, not a neutral entrustment.
  chosen_spanish_reading: La frase presenta una entrega con destino de destrucción, no una encomienda neutral.
  alternative_spanish_readings:
  - una entrega confiada
  - una simple cesión
  rationale: La revisión crítica corrige una lectura pasiva y atenuada. En español conviene mantener el peso judicial/apocalíptico del pasaje con «entregar» y «destruir» sin suavizarlo.
  doctrine_reference: Preservar la tensión teológica del juicio sin resolverla ni atenuarla.
translation_notes:
  revision_awareness: 'El borrador anterior era una mistraducción grave: confundía los verbos de «entregar» y «decir», leía «por número» como «en verdad», convertía «ser destruidos» en «qué sucederá», y tomaba como pasivo un verbo que el revisor identifica como activo. Esta versión sigue la revisión más reciente y corrige la sintaxis para reflejar la entrega de las ovejas a los agentes del juicio.'
  spanish_consistency_notes:
  - Se mantiene «entregar» para el verbo de transferencia y «destruir» para la acción judicial, conforme al audit trail.
  - Se evita «Mesías»/«Cristo» porque este verso no lo requiere.
  - Se conserva «ovejas» para el símbolo animal del pasaje, en concordancia con el contexto literario de 1 Enoc.
  - No se usa una convención de ocultamiento del nombre divino porque el versículo no la contiene.
