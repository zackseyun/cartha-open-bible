base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/018.yaml
  text: And one sheep went to the wolves at the word of the Lord[a], and another sheep met him and went with him. And the two of them went together and entered into the assembly of those wolves, and they spoke to them and made them hear[d][c][b], that from then on they should not ravage the sheep.
  footnotes:
  - marker: a
    text: Or 'by the command of the Lord.' The Ge'ez phrase can denote action undertaken in response to divine speech or command.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'made them hear' is retained close to the Ge'ez. It likely means that the wolves were compelled to listen to what the two sheep said.
    reason: lexical_alternative
  - marker: c
    text: Or 'would no longer ravage them'—the final object is specified as 'the sheep' in the verse, clarifying the wolves' predatory action.
    reason: lexical_alternative
  - marker: d
    text: Or 'made them hear, so that from then on they would no longer ravage'.
    reason: previous_rendering
