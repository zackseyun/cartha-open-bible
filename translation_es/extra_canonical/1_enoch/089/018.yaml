    text: 'O: «por mandato del Señor». El giro ge''ez puede indicar acción realizada en respuesta a la palabra o a la orden divina.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «les advirtieron». El español «les hicieron oír» conserva más de cerca la forma del ge''ez; el sentido puede ser el de advertencia o testimonio contra ellos.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «dejaran de devastar». El objeto final se especifica como «las ovejas», aclarando la imagen depredadora de los lobos.'
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente la elección de 'cordero' a 'oveja' en los dos primeros casos para ajustarse al sentido genérico de በግዕ y preservar la coherencia de la imaginería animal documentada por el POB inglés. Se mantienen el resto de las decisiones, incluyendo 'les hicieron oír', porque reflejan de forma suficientemente fiel la fuente y el historial de revisión auditado.
