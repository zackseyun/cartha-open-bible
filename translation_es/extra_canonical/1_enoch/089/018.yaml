translation:
  language: es
  text: Y una oveja fue a los lobos[a] por la palabra del Señor, y otra oveja lo encontró y fue con él. Y las dos fueron juntas y entraron en la asamblea de aquellos lobos, y les hablaron y les hicieron oír[b], para que desde entonces no devastaran[c] a las ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por mandato del Señor». El giro ge''ez puede indicar acción realizada en respuesta a la palabra o a la orden divina.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «les advirtieron». El español «les hicieron oír» conserva más de cerca la forma del ge''ez; el sentido puede ser el de advertencia o testimonio contra ellos.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «dejaran de devastar». El objeto final se especifica como «las ovejas», aclarando la imagen depredadora de los lobos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በግዕ
  english_pob_choice: sheep
  chosen_spanish: cordero / ovejas
  alternatives_spanish:
  - oveja
  - ovejas
  - carnero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El inglés POB conserva 'sheep' por el simbolismo animal. En español, 'cordero' para los dos individuos iniciales suena natural en singular narrativo, mientras 'ovejas' mantiene el colectivo final explícito. 'Carnero' especificaría sexo y alteraría la imagen.
- source_word: አዝእብት
  english_pob_choice: wolves
  chosen_spanish: lobos
  alternatives_spanish:
  - lobas
  - perros salvajes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lobos'' reproduce la imagen depredadora sin suavizarla. ''Perros salvajes'' sería una alternativa menos exacta para el sentido estándar del término.'
- source_word: በቃለ እግዚእ
  english_pob_choice: at the word of the Lord
  chosen_spanish: por la palabra del Señor
  alternatives_spanish:
  - a la palabra del Señor
  - por mandato del Señor
  - según la palabra del Señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez puede expresar acción en respuesta a palabra/mandato divino. 'Por la palabra del Señor' conserva la elevación y la relación causal sin forzar una paráfrasis; 'por mandato' explicitaría más la noción de orden.
- source_word: ተረክቦ
  english_pob_choice: met him
  chosen_spanish: lo encontró
  alternatives_spanish:
  - se encontró con él
  - lo alcanzó
  - lo recibió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el movimiento narrativo, 'lo encontró' comunica el contacto entre los dos corderos de forma clara en español, manteniendo la secuencia hacia el acompañamiento posterior. 'Se encontró con él' es posible, pero menos directo.
- source_word: ምስሌሁ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  - a su lado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la equivalencia más natural y transparente para acompañamiento.
- source_word: ኅቡረ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en compañía
  - como uno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Juntos'' expresa la acción conjunta de manera idiomática y fiel.'
- source_word: ማኅበሮሙ
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - reunión
  - grupo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Asamblea'' preserva el sentido formal de reunión organizada sin introducir connotaciones eclesiales no presentes de manera necesaria.'
- source_word: ወተናገርዎሙ
  english_pob_choice: they spoke to them
  chosen_spanish: les hablaron
  alternatives_spanish:
  - les dijeron
  - se dirigieron a ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Les hablaron'' mantiene la sencillez del verbo de habla y funciona bien antes del complemento causativo siguiente.'
- source_word: ወአስምዑ ዲቤሆሙ
  english_pob_choice: made them hear
  chosen_spanish: les hicieron oír
  alternatives_spanish:
  - los hicieron escuchar
  - les causaron oír
  - les hicieron escuchar atentamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la cercanía al giro ge'ez y la causalidad. En español, 'les hicieron oír' suena algo más literal que 'les advirtieron', pero evita borrar la tensión idiomática documentada por el POB inglés. La nota explica el valor de advertencia implícito sin sustituirlo en el texto principal.
- source_word: ከመ እምይእዜ
  english_pob_choice: so that from then on
  chosen_spanish: para que desde entonces
  alternatives_spanish:
  - de modo que desde entonces
  - así que desde ese momento
  - para que de ahí en adelante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la finalidad/resultante temporal de manera natural y precisa.
- source_word: ኢይግሥሥዎሙ
  english_pob_choice: they would no longer ravage them
  chosen_spanish: no devastaran
  alternatives_spanish:
  - no dañaran
  - no asolaran
  - no destruyeran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Devastar'' conserva la violencia predatoria de ''ravage'' mejor que ''dañar''. El objeto directo se aclara en la cláusula final como ''a las ovejas'', conforme al contexto simbólico.'
- source_word: አባግዕት
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - las corderas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Las ovejas'' mantiene el paralelismo con el simbolismo repetido del pasaje. ''Rebaño'' sería más colectivo y menos explícito.'
theological_decisions:
- issue: Referencia divina en 'በቃለ እግዚእ' dentro de una visión apocalíptica
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  - Yahvé
  rationale: El contexto apunta a autoridad divina; en español, 'el Señor' reproduce el registro reverente adoptado por la POB inglesa para this phrasing, sin perder la gravedad del mandato. 'Yahvé' sería más explícito, pero aquí el contexto auditado inglés ha optado por una forma reverencial genérica.
  doctrine_reference: Traducción reverente de referencia divina en narrativa visionaria; continuidad con uso litúrgico sin ocultar la referencia a autoridad divina.
- issue: Valor de 'les hicieron oír' en la escena
  english_pob_reading: made them hear
  chosen_spanish_reading: les hicieron oír
  alternative_spanish_readings:
  - les advirtieron
  - los hicieron escuchar
  rationale: La revisión inglesa registrada rechazó 'warned them' como demasiado interpretativa y volvió a una forma más cercana al ge'ez. En español se mantiene esa cercanía, aunque el valor pragmático puede incluir amonestación o advertencia; por eso no se reduce a 'advirtieron' en el texto principal.
  doctrine_reference: Principio de no borrar tensiones léxicas ni sobreinterpretar un idiomatismo cuando la fuente exige cautela.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la secuencia de revisiones del POB inglés: primero una lectura más semántica (''warned them''), luego la decisión revisada de volver a una forma más literal (''made them hear''). La versión española conserva esa tensión en el texto principal y la explica en nota, sin ocultar el matiz de advertencia implícito. También se ajustó la concreción del objeto final (''las ovejas'') para reflejar el cierre del versículo.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para la referencia divina inmediata, conforme al registro reverente del POB inglés en esta frase.
  - Se evita 'Cristo' y 'Mesías' porque el pasaje no los contiene.
  - '''Ovejas''/''cordero'' se usan de forma coherente con el simbolismo animal del pasaje; se evita ''rebaño'' en el texto principal para no diluir la imagen.'
  - Las notas siguen la secuencia de marcadores a, b, c y cada una se ancla en el texto donde corresponde.
