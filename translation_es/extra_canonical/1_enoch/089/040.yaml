translation:
  language: es
  text: Y vi a las ovejas hasta que entraron en un buen lugar, y en una tierra agradable y gloriosa; y vi hasta que las ovejas quedaron saciadas[c][b], y aquella casa[a] estaba en medio de ellas en la tierra agradable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Casa» puede aludir al santuario o templo dentro de la imaginería simbólica de la visión.
    reason: lexical_alternative
  - marker: b
    text: La expresión equivalente a «tierra agradable» se repite al final del versículo en el ge'ez, reforzando el escenario restaurado y bendecido.
    reason: cross_reference
  - marker: c
    text: 'O: «vi a las ovejas hasta que entraron en un buen lugar, y en una tierra agradable y gloriosa; y vi hasta que las ovejas quedaron saciadas, y aquella casa estaba en medio de ellas en la tierra agradable».'
    reason: previous_rendering
lexical_decisions:
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantengo la imagen animal literal del apocalipsis de animales. «Ovejas» conserva el simbolismo visionario sin interpretarlo como una referencia abstracta a personas o a Israel.
- source_word: መካን ሠናይ
  english_pob_choice: a good place
  chosen_spanish: un lugar bueno
  alternatives_spanish:
  - un lugar agradable
  - un sitio bueno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez usa un término de lugar seguido de un calificativo de bondad; «lugar bueno» refleja esa estructura sin cargarla con una interpretación más precisa de la que ofrece el texto.
- source_word: ምድር ኃዋዝ
  english_pob_choice: a land of delight
  chosen_spanish: una tierra agradable
  alternatives_spanish:
  - una tierra deleitosa
  - una tierra de deleite
  - una tierra placentera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la revisión que entiende ኃዋዝ como adjetivo que modifica «tierra». «Agradable» conserva el valor de placidez/delight sin convertir el sintagma en un sustantivo abstracto.
- source_word: ስብሕት
  english_pob_choice: glory
  chosen_spanish: gloriosa
  alternatives_spanish:
  - de gloria
  - espléndida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo se ajusta a «tierra» en la gramática del ge'ez. «Gloriosa» mantiene el registro exaltado y evita deshacer la relación adjetival señalada en el aparato inglés.
- source_word: ጸግቡ
  english_pob_choice: were satisfied
  chosen_spanish: quedaron saciadas
  alternatives_spanish:
  - fueron satisfechas
  - quedaron satisfechas
  - estuvieron satisfechas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Saciadas» expresa plenitud de provisión de manera natural en español y conserva la fuerza de estar llenas o satisfechas.
- source_word: ቤት
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa
  - morada
  - templo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Respeto la literalidad del sustantivo principal. «Casa» conserva la imagen del texto y deja abierta la posible referencia simbólica al santuario sin imponerla en la línea principal.
- source_word: ማእከሎሙ
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellas
  alternatives_spanish:
  - en su midst
  - entre ellas
  - en su centro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En medio de ellas» comunica el sentido espacial y comunitario de manera natural en español. Dado que el referente inmediato son las ovejas, uso el pronombre femenino plural concordante.
theological_decisions:
- issue: Si la "casa" debe identificarse explícitamente como templo/santuario en el texto principal
  english_pob_reading: Retain 'house' in the main text; possible temple referent remains in footnote
  chosen_spanish_reading: Conservar «casa» en el texto principal y dejar abierta la lectura simbólica
  alternative_spanish_readings:
  - templo
  - santuario
  - morada
  rationale: El género apocalíptico mantiene imágenes simbólicas que no conviene resolver de antemano. «Casa» preserva la dicción del texto y permite la interpretación templaria solo como posibilidad contextual, no como traducción impuesta.
  doctrine_reference: Translation philosophy §1 Original-language primacy; §3 Preserve theological tension rather than resolve it.
- issue: Cómo reflejar la repetición final de la expresión equivalente a «tierra agradable»
  english_pob_reading: The phrase 'land of delight' is repeated at the end of the verse in the Ge'ez, reinforcing the restored and blessed setting.
  chosen_spanish_reading: Repetir «tierra agradable» al final del versículo
  alternative_spanish_readings:
  - la tierra de deleite
  - la tierra placentera
  - la tierra agradable
  rationale: La repetición intensifica el cuadro restaurado y bendecido. Repito la misma expresión para mantener la cohesión retórica del ge'ez y la observación del aparato inglés.
  doctrine_reference: Translation philosophy §1 Original-language primacy; §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Parto del ajuste revisado del aparato inglés que entiende la sintaxis ge''ez como prolepsis: «vi a las ovejas hasta que entraron», y toma ኃዋዝ y ስብሕት como adjetivos que modifican «tierra», no como sustantivos abstractos. Por eso el español principal evita una estructura más libre como «hasta que las ovejas entraron» sin el objeto anticipado y conserva la repetición final de «tierra agradable».'
  spanish_consistency_notes:
  - Mantengo «ovejas» de forma literal para sostener el simbolismo de la Visión de los Animales.
  - Uso «casa» y no «templo» en el cuerpo principal para respetar la imagen del texto y la práctica POB de no resolver la ambigüedad simbólica sin necesidad.
  - Conservo un registro digno y moderno, con vocabulario transparente para lectores eclesiales amplios.
  - Alineo los adjetivos con «tierra» en concordancia femenina plural/singular según corresponda al español, respetando la revisión gramatical del original.
