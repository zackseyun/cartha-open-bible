base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/041.yaml
  text: And sometimes their eyes were opened[a], and sometimes they were blinded, until another sheep arose and led them and brought them all in[c][b], and their eyes were opened.
  footnotes:
  - marker: a
    text: The repeated image of eyes being opened likely carries symbolic force in the vision—awakening, recognition, or restored discernment—but the text itself leaves the image unexpanded.
    reason: cultural_note
  - marker: b
    text: The clause 'brought them all in' may also be understood as 'gathered them all together,' depending on how the Ge'ez verb is taken.
    reason: lexical_alternative
  - marker: c
    text: Or 'And there were some whose eyes were being opened, and there were some who were blind, until another sheep arose and led them and brought them all in'.
