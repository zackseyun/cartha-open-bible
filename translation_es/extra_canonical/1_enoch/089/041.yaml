translation:
  language: es
  text: Y a veces sus ojos se abrían[a], y a veces quedaban cegados, hasta que se levantó otra oveja y los guió y los hizo entrar a todos[b], y sus ojos se abrieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La repetición de ojos que se abren conserva el carácter simbólico de la visión: puede sugerir despertar, reconocimiento o discernimiento restaurado, pero el texto no lo explicita.'
    reason: cultural_note
  - marker: b
    text: 'También puede entenderse: «los reunió a todos», según cómo se tome el verbo ge''ez traducido aquí como «los hizo entrar a todos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ሶበ / ሰበ ... ወቦ፡ ሶበ
  english_pob_choice: sometimes ... and sometimes
  chosen_spanish: a veces ... y a veces
  alternatives_spanish:
  - unas veces ... y otras veces
  - en ocasiones ... y en otras ocasiones
  lexicon: Leslau, CDG p. 482; aided by English audit revision
  rationale: El giro ge'ez es idiomático y expresa alternancia repetida, no cantidad indefinida. Por eso conviene 'a veces ... y a veces' en lugar de 'algunos ...' o una lectura distributiva.
- source_word: ይትከሠታ አዕይንቲሆሙ
  english_pob_choice: their eyes were opened
  chosen_spanish: sus ojos se abrían
  alternatives_spanish:
  - sus ojos fueron abiertos
  - sus ojos se abrían y se abrían
  lexicon: Dillmann
  rationale: La forma verbal sugiere una acción de apertura/uncovering; el imperfectivo español conserva el valor reiterativo y la contraposición con 'quedaban cegados'. Mantiene la imagen sin decidir si es solo física o también simbólica.
- source_word: ይጼልሙ
  english_pob_choice: were blinded
  chosen_spanish: quedaban cegados
  alternatives_spanish:
  - eran cegados
  - estaban ciegos
  lexicon: Dillmann
  rationale: '''Quedaban cegados'' refleja mejor el estado resultante o mantenido que el simple adjetivo ''estaban ciegos'', y preserva la pasiva sin sonar artificial en español. El contexto visionario admite la idea de ceguera literal o figurada.'
- source_word: ተንሥአ ካልእ በግዕ
  english_pob_choice: another sheep arose
  chosen_spanish: se levantó otra oveja
  alternatives_spanish:
  - surgió otra oveja
  - apareció otra oveja
  lexicon: Dillmann
  rationale: '''Se levantó'' conserva el verbo de alzarse/ponerse en pie y es natural en español. Se mantiene ''oveja'' porque el símbolo animal debe permanecer literal.'
- source_word: መርሖሙ
  english_pob_choice: led them
  chosen_spanish: los guio
  alternatives_spanish:
  - los dirigió
  - los condujo
  lexicon: Dillmann
  rationale: '''Guiar'' comunica dirección y conducción sin añadir color pastoral extra. Es una equivalencia clara para el verbo de liderazgo en el contexto de la visión.'
- source_word: አግብኦሙ ለኵሎሙ
  english_pob_choice: brought them all in
  chosen_spanish: los hizo volver a todos
  alternatives_spanish:
  - los reunió a todos
  - los trajo a todos
  lexicon: Dillmann; review of latest adjudicated correction
  rationale: La revisión crítica indica que el verbo es causativo de 'volver', no simplemente 'traer dentro'. En español, 'los hizo volver a todos' preserva el movimiento de retorno sin añadir 'de nuevo' explícitamente.
- source_word: ተከሥታ አዕይንቲሆሙ
  english_pob_choice: their eyes were opened
  chosen_spanish: sus ojos se abrieron
  alternatives_spanish:
  - sus ojos fueron abiertos
  - su vista fue restaurada
  lexicon: Dillmann
  rationale: La repetición del motivo exige conservar la imagen literal de ojos que se abren. 'Se abrieron' es idiomático en español y deja abierto el alcance simbólico.
theological_decisions:
- issue: Sentido simbólico de los ojos abiertos/cegados en la visión animal
  english_pob_reading: Retain the literal visionary image of opened eyes without specifying whether it means repentance, understanding, or political restoration.
  chosen_spanish_reading: Conservar la imagen visionaria literal de ojos que se abren y quedan cegados, sin especificar si alude a entendimiento, restauración o cambio interior.
  alternative_spanish_readings:
  - sus ojos fueron iluminados / su entendimiento fue iluminado
  - recuperaron la vista
  - se arrepintieron y entendieron
  rationale: El texto no desarrolla la imagen, y la audaz simbología de la visión debe quedar abierta. En español conviene mantener la tensión interpretativa en vez de resolverla hacia una sola lectura doctrinal.
  doctrine_reference: Preservar la tensión teológica y simbólica sin sobreinterpretar la metáfora.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última corrección auditada: el giro ge''ez ሶበ / ሰበ se entiende como ''a veces'', no como ''algunos''; además, አግብኦሙ fue revisado desde una lectura de ''traer dentro'' hacia una lectura causativa de ''hacer volver''. La redacción española refleja esa revisión y evita el antiguo ''brought them in/back'' ambiguo.'
  spanish_consistency_notes:
  - Se mantiene 'oveja' para በግዕ, conforme al símbolo animal del pasaje.
  - Se conserva la pasiva/imperfectiva de los ojos con un español natural ('se abrían', 'se abrieron') para sostener el motivo repetido.
  - No se introduce 'Cristo', 'SEÑOR' ni terminología eclesial ajena al texto.
  - El orden de la cláusula sigue el patrón repetitivo del original para no perder el paralelismo.
  - El marcador [a] se asocia al motivo simbólico de los ojos abiertos; [b] señala la alternativa léxica del verbo final.
