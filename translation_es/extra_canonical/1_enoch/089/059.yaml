translation:
  language: es
  text: 'Y llamó a setenta pastores y les entregó aquellas ovejas, para que las apacentaran. Y dijo a los pastores y a todos sus compañeros[a]: «Desde ahora, cada uno de ustedes[b] apacentará a las ovejas y hará todo lo que yo les ordene».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase original para «sus compañeros» es algo incierta; probablemente se refiere a quienes estaban asociados con los pastores.
    reason: lexical_alternative
  - marker: b
    text: El texto etíope repite el número setenta en el discurso («todos setenta ustedes»). La traducción expresa el sentido distributivo como «cada uno de ustedes» después de haber mencionado ya a los setenta pastores.
    reason: lexical_alternative
lexical_decisions:
- source_word: ጸውዐ
  english_pob_choice: summoned
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó solemnemente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, ‘llamó’ comunica la acción de convocar para una comisión. ‘Convocó’ sería posible, pero ‘llamó’ mantiene mayor naturalidad sin debilitar el tono formal del pasaje.
- source_word: ኖላዊያነ
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores de ovejas
  - cuidadores del rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Pastores’ preserva la metáfora apocalíptica establecida. En español, ‘pastor’ es la equivalencia directa y mantiene la imagen de gobierno y cuidado sobre las ovejas.
- source_word: ገደፎሙ ሎሙ
  english_pob_choice: gave over ... to them
  chosen_spanish: entregó ... a ellos
  alternatives_spanish:
  - les entregó ...
  - encomendó ... a ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Entregó’ refleja la transferencia de responsabilidad/custodia sin interpretar demasiado. ‘Encomendó’ sería plausible, pero añade una idea de encargo que no es explícita en la forma elegida por la POB inglesa.
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ovejas del rebaño
  - ganado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Ovejas’ conserva la imagen concreta y tradicional del texto visionario. ‘Rebaño’ abstraería la metáfora, y ‘ganado’ sería demasiado amplio.
- source_word: ከመ ይርዐይዎሙ
  english_pob_choice: that they might pasture them
  chosen_spanish: para que las apacentaran
  alternatives_spanish:
  - para que las pastorearan
  - para que las cuidaran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Apacentaran’ reproduce el verbo pastoril con el mismo campo semántico que ‘pasture’ en la POB inglesa. ‘Pastorearan’ también es posible, pero ‘apacentar’ suena más natural en este contexto bíblico y conserva la relación con las ovejas.
- source_word: ለጸማዶሙ
  english_pob_choice: to their companions
  chosen_spanish: a todos sus compañeros
  alternatives_spanish:
  - a sus compañeros
  - a los asociados con ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB inglesa añadió ‘all’ por ኵሉ; en español, ‘a todos sus compañeros’ lo refleja de forma directa. ‘Compañeros’ conserva la relación asociada sin forzar una identificación más precisa de la que el texto permite.
- source_word: ኵሉ ፯፯ እምኔክሙ
  english_pob_choice: each of you
  chosen_spanish: cada uno de ustedes
  alternatives_spanish:
  - todos ustedes
  - cada uno de vosotros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma distributiva del mandato se expresa naturalmente con ‘cada uno de ustedes’. Esto mantiene la fuerza de ‘each of you’ sin perder la referencia al grupo entero.
- source_word: እምይእዜ
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de ahora en adelante
  - desde este momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Desde ahora’ es una fórmula clara y directa para introducir la comisión. Conserva el valor temporal de inicio sin sonar arcaica.
- source_word: ኵሎ ዘአአዝዘክሙ አነ ግበሩ
  english_pob_choice: do all that I command you
  chosen_spanish: harán todo lo que yo les ordene
  alternatives_spanish:
  - hagan todo lo que yo les mande
  - cumplan todo lo que yo les ordene
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Ordene’ preserva el tono de autoridad del mandato. Se eligió la forma futura ‘harán’ para reflejar el valor exhortativo/directivo del original en un español natural y solemne.
theological_decisions:
- issue: Preservar la imagen apocalíptica de pastores y ovejas sin reinterpretarla en el texto principal
  english_pob_reading: The shepherds and sheep remain symbolic images; the translation should not collapse them into explicit referents.
  chosen_spanish_reading: Se mantienen ‘pastores’ y ‘ovejas’ como imágenes simbólicas sin explicarlas en el versículo.
  alternative_spanish_readings:
  - régulos y pueblos
  - ángeles y seres humanos
  rationale: El pasaje pertenece a una visión sostenida en imágenes. Traducir de forma interpretativa alteraría el carácter visionario que la POB inglesa preserva deliberadamente.
  doctrine_reference: 'Contexto literario de 1 Enoc: prosa visionaria y apocalíptica; evitar la desfiguración interpretativa del símbolo.'
translation_notes:
  revision_awareness: La base inglesa revisada añadió ‘all’ delante de ‘their companions’ y ajustó el orden a ‘gave those sheep over to them’. La versión española refleja ese ‘all’ con ‘todos sus compañeros’ y conserva el sentido de entrega/custodia con ‘entregó ... a ellos’.
  spanish_consistency_notes:
  - Se mantiene la terminología visionaria ‘pastores/ovejas’ para conservar el símbolo apocalíptico.
  - Se evita ‘SEÑOR’ u այլ sustituciones teológicas no pertinentes; el texto no contiene referencias al nombre divino.
  - ‘Apacentar’ se usa consistentemente para el verbo pastoril, en paralelo con la elección inglesa ‘pasture’.
