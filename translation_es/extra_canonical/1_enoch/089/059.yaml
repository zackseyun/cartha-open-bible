  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/059.yaml
  text: And he summoned seventy shepherds and gave those sheep over to them[a], that they might pasture them. And he said to the shepherds and to all their companions, “From now on, each of you shall pasture the sheep[b], and do all that I command you.”
  footnotes:
  - marker: a
    text: The phrase rendered 'their companions' is somewhat uncertain; it likely refers to those associated with the shepherds.
    reason: lexical_alternative
  - marker: b
    text: The Ethiopic text repeats the number seventy in the address ('all seventy of you'). The translation brings out the distributive sense as 'each of you' after already stating 'seventy shepherds.'
