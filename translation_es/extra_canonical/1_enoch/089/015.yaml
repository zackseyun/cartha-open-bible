  yaml_path: translation/extra_canonical/1_enoch/089/015.yaml
  text: And the wolves began to terrify them and to oppress them[a], until they destroyed their little ones and cast their little ones into a stream of much water[c][b]. And those sheep began to cry out because of their little ones and to lament before their Lord.
  footnotes:
  - marker: a
    text: Or 'attacked them' for 'oppressed them'; the Ge'ez verb can denote forceful hostile action.
    reason: lexical_alternative
