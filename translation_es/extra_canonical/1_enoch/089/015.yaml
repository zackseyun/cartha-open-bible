review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido del ge''ez auditado: los lobos aterrorizan y oprimen, destruyen a los pequeños, los arrojan al agua, y luego las ovejas claman y se lamentan ante su Señor. También conserva adecuadamente el valor teológico de «su Señor» frente a la alternativa «su maestro». La principal desviación está en በውኂዘ ማይ ብዙኅ: el inglés POB elegido es «a stream of much water», mientras que el español principal puso «un torrente de mucha agua», que en el expediente auditado figura como alternativa, no como elección principal.'
  spanish_quality_summary: El español es claro, digno y legible. «Aterrorizarlos», «oprimirlos», «clamar» y «delante de su Señor» funcionan bien. Sin embargo, «un torrente de mucha agua» suena más interpretativo e intenso que la opción principal auditada; «una corriente de mucha agua» o «un cauce de mucha agua» se alinea mejor con el texto base y mantiene naturalidad. También conviene mantener el anclaje de las notas exactamente donde corresponden a las alternativas preservadas por la POB inglesa.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Señor» aquí es correcto por la decisión teológica documentada. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La cuestión léxica principal es respetar la decisión auditada de «stream» en vez de promover al texto principal una alternativa como «torrente».
  issues:
  - severity: medium
    issue: La frase principal «en un torrente de mucha agua» no sigue la elección principal auditada «into a stream of much water».
    rationale: «Torrente» está documentado como alternativa válida, pero el texto principal español debería reflejar la opción principal del expediente, salvo razón fuerte de claridad, que aquí no es necesaria. Además, «torrente» intensifica la imagen más de lo requerido por la fuente.
  - severity: low
    issue: La nota [b] debe seguir existiendo, pero ahora como alternativa a una redacción principal más cercana a «stream».
    rationale: Si se corrige el cuerpo del texto a «corriente», la nota puede preservar «río» y «torrente» como alternativas, en coherencia con la auditoría inglesa.
  revised_spanish_text: Y los lobos comenzaron a aterrorizarlos[a] y a oprimirlos, hasta que destruyeron a sus pequeños y arrojaron a sus pequeños en una corriente de mucha agua[b]. Y aquellas ovejas comenzaron a clamar por causa de sus pequeños y a lamentarse delante de su Señor[c].
  revised_footnotes:
  - marker: a
    text: O «los atacaron»; el verbo ge'ez puede denotar una acción hostil y forzosa, no solo una opresión abstracta.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «un río de mucha agua» o «un torrente de abundante agua».
    reason: lexical_alternative
  - marker: c
    text: También podría entenderse «ante su maestro», pero el contexto favorece un referente divino dentro de la alegoría.
    reason: alternative_reading
  revision_rationale: 'Se ajusta la frase del agua para reflejar la elección principal auditada («stream of much water») con una opción española natural y menos interpretativa: «una corriente de mucha agua». Se conservan las alternativas en nota. El resto del borrador es fiel, claro y teológicamente bien orientado.'
