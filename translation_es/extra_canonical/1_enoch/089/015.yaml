translation:
  language: es
  text: Y los lobos comenzaron a aterrorizarlos[a] y a oprimirlos, hasta que destruyeron a sus pequeños y arrojaron a sus pequeños en una corriente de mucha agua[b]. Y aquellas ovejas comenzaron a clamar por causa de sus pequeños y a lamentarse delante de su Señor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los atacaron»; el verbo ge'ez puede denotar una acción hostil y forzosa, no solo una opresión abstracta.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «un río de mucha agua» o «un torrente de abundante agua».
    reason: lexical_alternative
  - marker: c
    text: También podría entenderse «ante su maestro», pero el contexto favorece un referente divino dentro de la alegoría.
    reason: alternative_reading
lexical_decisions:
- source_word: አዝእብት
  english_pob_choice: the wolves
  chosen_spanish: los lobos
  alternatives_spanish:
  - lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural concreto del símbolo animal se conserva de forma directa como «los lobos»; en la alegoría apocalíptica el referente simbólico sigue siendo animales dentro de la visión.
- source_word: ይፈርህዎሙ
  english_pob_choice: began to terrify them
  chosen_spanish: comenzaron a aterrorizarlos
  alternatives_spanish:
  - comenzaron a asustarlos
  - comenzaron a infundirles temor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido causativo/incoativo del verbo se refleja mejor con «aterrorizar», que conserva la fuerza hostil sin suavizarla a un mero estado emocional.
- source_word: አጠቅዎሙ
  english_pob_choice: to oppress them
  chosen_spanish: a oprimirlos
  alternatives_spanish:
  - a atacarlos
  - a afligirlos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oprimir» mantiene la idea de presión hostil y sostenida que la tradición auditada de la POB reconoce para este verbo, sin reducirlo a un único golpe físico.
- source_word: እስከ ያኅልቅ
  english_pob_choice: until they destroyed
  chosen_spanish: hasta que destruyeron
  alternatives_spanish:
  - hasta que consumieron
  - hasta que acabaron con
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Destruyeron» comunica adecuadamente el resultado total de la violencia. En español suena natural y fuerte, acorde con el valor pleno del verbo.
- source_word: ደቂቆሙ
  english_pob_choice: their little ones
  chosen_spanish: sus pequeños
  alternatives_spanish:
  - sus hijos
  - sus crías
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En la alegoría animal, «sus pequeños» preserva la relación filial y la imaginería zoológica sin volver demasiado humano el lenguaje ni perder inteligibilidad.
- source_word: ወገደፉ
  english_pob_choice: cast
  chosen_spanish: arrojaron
  alternatives_spanish:
  - lanzaron
  - echaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Arrojaron» corresponde bien al movimiento forzado hacia el agua y mantiene un registro formal sin dejar de ser vívido.
- source_word: በውኂዘ ማይ ብዙኅ
  english_pob_choice: a stream of much water
  chosen_spanish: un torrente de mucha agua
  alternatives_spanish:
  - un río de mucha agua
  - un arroyo de mucha agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez admite varias matizaciones; «torrente» conserva el carácter abundante y dinámico mejor que «río» en español, sin imponer precisión geográfica no garantizada por el texto.
- source_word: እልኩ አባግዕ
  english_pob_choice: those sheep
  chosen_spanish: aquellas ovejas
  alternatives_spanish:
  - esas ovejas
  - las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo se conserva con «aquellas» para marcar la remisión narrativa al grupo ya mencionado, mientras que «ovejas» es el equivalente natural del símbolo en español.
- source_word: ይጸርኁ
  english_pob_choice: to cry out
  chosen_spanish: clamar
  alternatives_spanish:
  - gritar
  - dar voces
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: «Clamar» transmite un grito de dolor con matiz de súplica o lamento, más adecuado que un simple «gritar» en este contexto de duelo.
- source_word: በእንተ ደቂቆሙ
  english_pob_choice: because of their little ones
  chosen_spanish: por causa de sus pequeños
  alternatives_spanish:
  - a causa de sus pequeños
  - por sus pequeños
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '«Por causa de» expresa con claridad la relación causal del lamento: lloran a raíz de la pérdida y destrucción de sus pequeños.'
- source_word: ይስክዩ
  english_pob_choice: to lament
  chosen_spanish: lamentarse
  alternatives_spanish:
  - lamentar
  - gemir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo se traduce con un reflexivo natural en español para expresar el acto de lamentación personal y audible delante de Dios, sin convertirlo en mera queja.
- source_word: ኀበ እግዚኦሙ
  english_pob_choice: before their Lord
  chosen_spanish: delante de su Señor
  alternatives_spanish:
  - ante su Señor
  - delante de su maestro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La decisión auditada favorece un referente divino en el marco de la visión; «Señor» conserva la solemnidad y evita resolver prematuramente la tensión alegórica.
theological_decisions:
- issue: Título para እግዚኦሙ en el lamento de las ovejas
  english_pob_reading: before their Lord, with a possible alternative of their master
  chosen_spanish_reading: delante de su Señor
  alternative_spanish_readings:
  - delante de su maestro
  - ante su Señor
  rationale: Aunque la alegoría permitiría «maestro», el contexto de la Visión de los animales orienta el clamor hacia un referente divino. «Señor» preserva esa fuerza teológica sin borrar la ambigüedad literaria del símbolo.
  doctrine_reference: Translate titles; preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que elevó el matiz a «aterrorizar» y prefirió un registro más formal para el verbo de arrojar; por eso se eligieron «aterrorizarlos» y «arrojaron»/«torrente» en español, manteniendo la intensidad y el tono elevado del texto revisado.
  spanish_consistency_notes:
  - Se conserva «Señor» para እግዚኦሙ conforme al criterio teológico auditado, sin sustituirlo por una forma más neutral.
  - Se mantiene la imaginería animal con «lobos», «ovejas» y «sus pequeños», evitando humanizar excesivamente la alegoría.
  - 'La sintaxis española sigue de cerca la secuencia verbal del original: acción hostil, destrucción, arrojamiento al agua, clamor y lamento delante del Señor.'
