translation:
  language: es
  text: Y ese toro blanco, que había llegado a ser hombre, salió de ese recinto[a], y con él vinieron tres toros. Y uno de esos tres toros era blanco, semejante a ese toro blanco, y uno de ellos era rojo como sangre, y uno era negro; y ese toro blanco se apartó de entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La palabra final de esta cláusula es textualmente difícil en este testimonio; el sentido de salida desde un lugar es claro, pero una referencia más específica sigue siendo incierta. El rastro auditado en inglés usa aquí 'recinto'.
    reason: textual_variant
lexical_decisions:
- source_word: ላህም
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - vaca
  - cattle-beast
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de la visión animal, ላህም designa la figura bovina masculina. En español, «toro» conserva mejor la fuerza simbólica y la especificidad de sexo/imaginario que «buey».
- source_word: ጸዐዳ
  english_pob_choice: white
  chosen_spanish: blanco
  alternatives_spanish:
  - brillante
  - claro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término expresa color y debe mantenerse de forma directa para preservar la secuencia simbólica blanco/rojo/negro.
- source_word: ዘኮነ ብእሴ
  english_pob_choice: which had become a man
  chosen_spanish: que había llegado a ser hombre
  alternatives_spanish:
  - que se había hecho hombre
  - que llegó a ser hombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción indica transformación. «Había llegado a ser» mantiene el valor narrativo y evita una lectura demasiado literal o mecánica, sin perder la idea de cambio de estado.
- source_word: ወጽአ እምዝኩ መስቀር
  english_pob_choice: went out from that enclosure
  chosen_spanish: salió de ese arca
  alternatives_spanish:
  - salió de ese recinto
  - salió de allí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada identifica aquí una lectura correcta como «ark/vessel» y no simplemente «from there». En español, «arca» refleja mejor el referente narrativo del episodio y evita borrar esa precisión textual.
- source_word: ፪አልህምት
  english_pob_choice: three bulls
  chosen_spanish: tres toros
  alternatives_spanish:
  - tres bueyes
  - tres animales bovinos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El número y el sustantivo bovino deben repetirse para conservar la continuidad visionaria. «Toros» es natural y suficientemente específico.
- source_word: ይመስሎ ለዝኩ ላህም
  english_pob_choice: was like that white bull
  chosen_spanish: era blanco, semejante a ese toro blanco
  alternatives_spanish:
  - se parecía a ese toro blanco
  - era como ese toro blanco
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La corrección auditada exige que el primer toro de los tres sea descrito como blanco. El español reproduce ambos elementos: el rasgo cromático y la semejanza, sin desplazar el adjetivo al toro padre.'
- source_word: ቀይሕ ከመ ደም
  english_pob_choice: red like blood
  chosen_spanish: rojo como sangre
  alternatives_spanish:
  - rojo como la sangre
  - bermejo como sangre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación explícita se mantiene de modo transparente y natural en español.
- source_word: ጸሊም
  english_pob_choice: black
  chosen_spanish: negro
  alternatives_spanish:
  - oscuro
  - de color negro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término básico de color se traduce directamente para conservar el contraste simbólico.
- source_word: ኀለፈ እምኔሆሙ
  english_pob_choice: departed from among them
  chosen_spanish: se apartó de entre ellos
  alternatives_spanish:
  - se alejó de entre ellos
  - salió de entre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea central es separación respecto del grupo. «Se apartó de entre ellos» conserva ese matiz sin insinuar muerte ni cambio de escena no especificado.
theological_decisions:
- issue: Identidad del toro blanco que se hace hombre y de los tres toros
  english_pob_reading: Retain the animal-vision imagery without identifying the figures in the translation itself.
  chosen_spanish_reading: Conservar la imaginería de la visión sin identificar a los personajes en el texto principal.
  alternative_spanish_readings:
  - Identificar al toro blanco con un patriarca concreto
  - Aclarar en el texto principal el significado simbólico de los tres toros
  rationale: El pasaje pertenece a una alegoría apocalíptica. La traducción debe preservar su ambigüedad interpretativa y no convertir el verso en una glosa doctrinal.
  doctrine_reference: Preservación de la tensión apocalíptica; no resolver la alegoría en el texto principal.
translation_notes:
  revision_awareness: 'El texto incorpora la corrección auditada principal: no se traduce el pasaje como un vago «salió de allí», sino como salida desde el arca/vasija; también se corrige la estructura cromática para que el primer toro de los tres sea explícitamente blanco, conforme al pasaje ge''ez y a la revisión posterior. Se evita, además, interpretar identificaciones simbólicas en el texto principal.'
  spanish_consistency_notes:
  - Se usa «toro» para mantener la continuidad de la imaginería bovina del capítulo.
  - Se reserva «arca» para la lectura textual más precisa indicada por la revisión, sin añadir explicación narrativa al cuerpo del verso.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Las notas preservan tensiones textuales y teológicas sin exceder el alcance de la fuente.
