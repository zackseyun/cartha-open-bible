translation:
  language: es
  text: Y aquella oveja que los guiaba regresó y subió sobre aquella roca[a]; y las ovejas, mientras sus ojos estaban cegados, se desviaron del camino que él les había mostrado[b], pero aquella oveja no lo supo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre aquella altura/peñasco»; el término ge'ez puede referirse a una elevación rocosa más que a una sola piedra.
    reason: lexical_alternative
  - marker: b
    text: O «mientras sus ojos eran cegados».
    reason: textual_variant
lexical_decisions:
- source_word: ገብአ
  english_pob_choice: returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - retornó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto narrativo muestra que la oveja líder, después de guiar al grupo, da marcha atrás. «Regresó» comunica ese movimiento sin sonar arcaico ni excesivamente literal.
- source_word: ዘይመርሖሙ
  english_pob_choice: that led them
  chosen_spanish: que los guiaba
  alternatives_spanish:
  - que los condujo
  - que los dirigía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El participio relativo identifica a la oveja por su función de guía. En español, «los guiaba» conserva la relación continua y evita una rigidez innecesaria.
- source_word: ዐርገ
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es de movimiento ascendente. «Subió» es natural en español y mantiene la concreción del gesto.
- source_word: ድማኅ
  english_pob_choice: rock
  chosen_spanish: roca
  alternatives_spanish:
  - peña
  - peñasco
  - altura rocosa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede referirse a una elevación rocosa. «Roca» es la opción más directa; la nota preserva la alternativa semántica de altura/crag.
- source_word: አባግዕ
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - los ovinos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural ovino se mantiene con el sustantivo colectivo natural en español. «Las ovejas» conserva la imaginería apocalíptica del pasaje.
- source_word: ይጸልሉ አዕይንቲሆሙ
  english_pob_choice: while their eyes were blinded
  chosen_spanish: mientras sus ojos estaban cegados
  alternatives_spanish:
  - mientras sus ojos eran cegados
  - mientras sus ojos estaban oscurecidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase describe un estado de visión impedida. «Estaban cegados» refleja la condición resultante sin obligar a suponer un agente explícito en ese momento.
- source_word: ይስሕቱ እምፍኖት
  english_pob_choice: went astray from the path
  chosen_spanish: se desviaron del camino
  alternatives_spanish:
  - se apartaron del camino
  - anduvieron extraviadas del camino
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen combina ruta física y desviación moral. «Se desviaron del camino» conserva ambas dimensiones en un español claro y sobrio.
- source_word: እንተ አርአዮሙ
  english_pob_choice: that he had shown them
  chosen_spanish: que él les había mostrado
  alternatives_spanish:
  - que les había enseñado
  - que él les había indicado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene sentido de mostrar/indicar un trayecto. «Había mostrado» es la correspondencia más directa y mantiene la relación con el camino.
- source_word: ኢያእመረ
  english_pob_choice: did not know it
  chosen_spanish: no lo supo
  alternatives_spanish:
  - no lo sabía
  - no se dio cuenta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El original expresa falta de conocimiento, no necesariamente culpa añadida. «No lo supo» conserva la brevedad y la tensión narrativa del cierre.
theological_decisions:
- issue: Si la ceguedad de las ovejas debe interpretarse como un acto externo inmediato o como un estado descriptivo
  english_pob_reading: while their eyes were blinded
  chosen_spanish_reading: mientras sus ojos estaban cegados
  alternative_spanish_readings:
  - mientras sus ojos eran cegados
  - mientras sus ojos estaban oscurecidos
  rationale: El griego/etiópico auditado en la tradición inglesa describe la condición de los ojos, no necesariamente el proceso causal en tiempo real. «Estaban cegados» preserva el estado y evita introducir una agencia no explicitada.
  doctrine_reference: Preservar la tensión textual sin sobreexplicar la causa.
- issue: Si la ignorancia de la oveja líder debe intensificarse como negligencia moral
  english_pob_reading: but that sheep did not know it
  chosen_spanish_reading: pero aquella oveja no lo supo
  alternative_spanish_readings:
  - pero aquella oveja no lo sabía
  - pero aquella oveja no se dio cuenta
  rationale: El texto afirma desconocimiento. Mantenerlo como desconocimiento simple evita cargar el pasaje con una culpabilidad mayor que la que el original exige.
  doctrine_reference: No resolver ni ampliar la responsabilidad moral más allá de la evidencia textual.
translation_notes:
  revision_awareness: La redacción española sigue el estado textual más reciente del inglés POB, incluyendo la secuencia sin coma innecesaria entre «regresó» y «subió», y la cláusula circunstancial simple para los ojos cegados. Se evitó calcar el inglés de forma rígida cuando el español pide un orden más natural, pero se preservaron la imagen de la roca, la ceguedad de los ojos, el desvío del camino y el desconocimiento final.
  spanish_consistency_notes:
  - Se mantiene «oveja(s)» para la imaginería animal apocalíptica, en lugar de neutralizarla como «rebaño» salvo donde el plural lo haga más natural en contexto.
  - Se usa «camino» para ፍኖት/πόρος de ruta guiada, conservando la dimensión literal y simbólica.
  - Se eligió «Yahvé» como norma de proyecto no aplicable aquí, pues el versículo no contiene el nombre divino.
  - No se introduce terminología eclesiástica tradicional ajena al registro apocalíptico del texto.
