translation:
  language: es
  text: Y llamó a aquella oveja[a] que había escapado de los lobos, y habló con ella acerca de los lobos, para que oyera acerca de ellos[b], a fin de que no oprimieran a las ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición de lectura del versículo ha sido inestable: el texto ge''ez y la revisión auditada favorecen «oveja» aquí, no «carnero».'
    reason: textual_variant
  - marker: b
    text: La cláusula en ge'ez es difícil; puede entenderse como que oyera acerca de los lobos, o más activamente como una advertencia o cargo respecto de ellos. La traducción conserva esa cautela.
    reason: alternative_reading
lexical_decisions:
- source_word: ጸውዖ
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó a gritos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico es llamar o convocar. «Llamó» conserva la sencillez narrativa sin sobrecargar el nivel de autoridad.
- source_word: በግዕ
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - oveja macho
  - macho de oveja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En la revisión auditada quedó corregido «ram» por «sheep». En español, el singular natural y fiel es «oveja»; el contexto zoomórfico del Apocalipsis Animal mantiene la identidad simbólica sin forzar un marcador sexual que el texto revisado no sostiene aquí.
- source_word: ዘተኃጥአ
  english_pob_choice: which had escaped from the wolves
  chosen_spanish: que había escapado
  alternatives_spanish:
  - que se había perdido
  - que había huido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual corrige la antigua lectura de «había pecado»; aquí el valor es el de escapar o quedar fuera. «Había escapado» refleja bien el hecho narrativo sin introducir culpa moral.
- source_word: እምአዝእብት
  english_pob_choice: from the wolves
  chosen_spanish: de los lobos
  alternatives_spanish:
  - entre los lobos
  - desde los lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez se refiere explícitamente a «los lobos». En español, «de los lobos» reproduce la relación de procedencia/separación de forma natural y fiel.
- source_word: ተናገሮ በእንተ አዝእብት
  english_pob_choice: spoke with him about the wolves
  chosen_spanish: habló con ella acerca de los lobos
  alternatives_spanish:
  - le habló sobre los lobos
  - habló con ella respecto de los lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica conversación sobre el tema de los lobos. Dado que «oveja» en español es femenino, el pronombre natural es «ella»; esto no altera el referente simbólico del texto.
- source_word: ከመ ይስምዕ ዲቤሆሙ
  english_pob_choice: so that he might hear concerning them
  chosen_spanish: para que oyera respecto de ellos
  alternatives_spanish:
  - para que escuchara acerca de ellos
  - para que oyera contra ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula es difícil. La versión inglesa reciente retrocede a una lectura más literal, pero el campo semántico y la revisión textual favorecen una idea de advertencia o exposición respecto a los lobos. «Oyera respecto de ellos» conserva la ambigüedad sin forzar un sentido que el español no exige.
- source_word: ኢይግስስዎሙ
  english_pob_choice: might not oppress the sheep
  chosen_spanish: no oprimieran a las ovejas
  alternatives_spanish:
  - no devoraran a las ovejas
  - no destrozaran a las ovejas
  - no asaltaran a las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite una gama de violencia predatoria. «Oprimir» sigue la solución inglesa auditada y mantiene un registro más sobrio, sin eliminar la amenaza real contra las ovejas.
- source_word: አባግዕ
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - las reses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural concreto «las ovejas» conserva el vocabulario simbólico recurrente del Apocalipsis Animal mejor que «rebaño».
theological_decisions:
- issue: Cómo reflejar la relación entre la oveja singular y las ovejas plurales sin resolver la imagen simbólica
  english_pob_reading: The sheep are threatened by wolves, and the singular sheep is addressed so that harm against the group may be prevented.
  chosen_spanish_reading: Una oveja singular es llamada y advertida respecto de los lobos para proteger a las ovejas del daño.
  alternative_spanish_readings:
  - Una oveja representa al líder del grupo y recibe una misión directa.
  - La oveja singular es simplemente una figura individual sin carga representativa.
  rationale: La imagen animal funciona simbólicamente y no debe aplanarse. Mantener el singular y el plural en español ayuda a conservar la tensión narrativa entre el individuo y el colectivo, sin cerrar el valor tipológico.
  doctrine_reference: Preservar la imagen simbólica y la tensión narrativa; primacía del texto original sobre la armonización doctrinal.
translation_notes:
  revision_awareness: 'Se incorporó la corrección textual más reciente frente a la lectura anterior errónea: ዘተኃጥአ እምአዝእብት no significa «que había pecado de entre las ovejas», sino «que había escapado de los lobos». También se evitó la antigua interpretación de la cláusula media como «testificar contra ellos» o «advertirles» en el texto principal, prefiriendo una formulación menos interpretativa y más cercana al valor auditado, con nota para la ambigüedad.'
  spanish_consistency_notes:
  - Se mantuvo «oveja/ovejas» para la codificación zoomórfica del pasaje.
  - Se evitó «Cristo», «SEÑOR» u այլ terminología de sustitución que no corresponde al texto fuente.
  - La sintaxis busca ser publicable en español actual sin perder la ambigüedad textual documentada.
  - Los pronombres se ajustaron al género gramatical español de «oveja» sin cambiar el referente simbólico.
