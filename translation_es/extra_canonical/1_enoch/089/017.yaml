  yaml_path: translation/extra_canonical/1_enoch/089/017.yaml
  text: And he called that sheep which had escaped from the wolves[a], and spoke with him about the wolves, so that he might hear concerning them[d][c][b], that they might not oppress the sheep.
  footnotes:
