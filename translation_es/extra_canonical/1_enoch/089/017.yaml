    text: 'La tradición de lectura del versículo ha sido inestable: el texto ge''ez y la revisión auditada favorecen «oveja» aquí, no «carnero».'
    reason: textual_variant
  - marker: b
    text: La cláusula en ge'ez es difícil; puede entenderse como que oyera acerca de los lobos, o más activamente como una advertencia o cargo respecto de ellos. La traducción conserva esa cautela.
    reason: alternative_reading
  revision_rationale: 'Se hace una reparación menor de estilo y fidelidad funcional: «acerca de ellos» es más natural que «respecto de ellos» en español y sigue preservando la ambigüedad documentada por la auditoría inglesa. La nota correspondiente se ajusta para explicar esa cautela de manera más precisa.'
