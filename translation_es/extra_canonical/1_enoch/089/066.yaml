translation:
  language: es
  text: Y los leones y los leopardos[a] devoraron y tragaron a la mayoría de aquellas ovejas, y los jabalíes del desierto comieron con ellas, y quemaron aquella torre y derribaron aquella casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término etiópico puede designar leopardos o panteras; se eligió 'leopardos' porque la revisión inglesa corrigió 'tigers' y porque esa identificación es la más coherente con la tradición simbólica del pasaje.
    reason: lexical_alternative
  - marker: b
    text: '''Casa'' probablemente se refiere simbólicamente al santuario o templo dentro de la visión, pero el texto principal conserva la imagen narrativa usada en el relato.'
    reason: cultural_note
lexical_decisions:
- source_word: ወበልዑ
  english_pob_choice: devoured
  chosen_spanish: devoraron
  alternatives_spanish:
  - comieron
  - consumieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa un comer voraz y destructivo en contexto violento; en español, 'devoraron' conserva la imagen predatoria mejor que 'comieron'.
- source_word: ወውሕጡ
  english_pob_choice: swallowed up
  chosen_spanish: tragaron
  alternatives_spanish:
  - tragaron por completo
  - engulleron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea es de consumo total, enlazada con 'devoraron'. 'Tragaron' comunica esa absorción destructiva sin sobrecargar el estilo.
- source_word: መብዝሕቶሙ
  english_pob_choice: most of them
  chosen_spanish: la mayoría de
  alternatives_spanish:
  - la mayor parte de
  - la multitud de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia apunta al conjunto mayoritario de las ovejas; 'la mayoría de' es claro y fiel en español.
- source_word: አባግዐ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la imagen concreta del símbolo animal del relato.
- source_word: አናብስት
  english_pob_choice: lions
  chosen_spanish: leones
  alternatives_spanish:
  - grandes fieras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el equivalente directo y más natural en español.
- source_word: አነምርት
  english_pob_choice: leopards
  chosen_spanish: leopardos
  alternatives_spanish:
  - panteras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa corrigió 'tigers' a 'leopards'; en español 'leopardos' reproduce esa corrección y mantiene la identificación zoológica probable del símbolo apocalíptico.
- source_word: ሐራዊያ ገዳም
  english_pob_choice: wild boars of the desert
  chosen_spanish: jabalíes del desierto
  alternatives_spanish:
  - jabalíes del desierto árido
  - cerdos salvajes del desierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Jabalíes'' es la forma natural en español para el animal salvaje; ''del desierto'' conserva el matiz de wilderness/country inculto del original.'
- source_word: ምስሌሆሙ
  english_pob_choice: with them
  chosen_spanish: con ellas
  alternatives_spanish:
  - entre ellas
  - junto con ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pronombre femenino plural concuerda con 'ovejas'. 'Con ellas' refleja la relación compartida entre los jabalíes y las ovejas sin especificarla en exceso.
- source_word: አውዐይዎ
  english_pob_choice: burned
  chosen_spanish: quemaron
  alternatives_spanish:
  - incendiaron
  - pusieron fuego a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica acción de fuego destructivo; 'quemaron' es directo y suficientemente fuerte en español.
- source_word: ማኅፈድ
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - fortaleza
  - atalaya
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Torre'' sigue la imagen arquitectónica concreta sin resolver de antemano el valor simbólico.'
- source_word: ከረይዎ
  english_pob_choice: tore down
  chosen_spanish: derribaron
  alternatives_spanish:
  - destruyeron
  - demolieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa derribo violento y es natural en español.
- source_word: ቤት
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - templo
  - morada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La edición inglesa preserva 'house' para no cerrar el símbolo en 'temple'; 'casa' conserva esa literalidad en español y evita interpretar prematuramente el referente.
theological_decisions:
- issue: Mantener el referente simbólico de ቤት sin resolverlo como templo
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  - santuario
  rationale: La visión trabaja con imágenes alegóricas; traducir 'casa' conserva la tensión entre imagen literal y referente simbólico, en lugar de fijar interpretivamente el sentido.
  doctrine_reference: Preservar la ambigüedad simbólica conforme al primado del texto fuente.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que corrigió la mala lectura de ''tigers'' a ''leopards'' y eliminó la cláusula duplicada final. La versión española refleja dos acciones separadas: los leones y leopardos devoran/tragan; los jabalíes comen con ellas; luego queman la torre y derriban la casa.'
  spanish_consistency_notes:
  - Se usó el plural masculino para los depredadores y el femenino plural para 'ovejas'.
  - Se evitó 'templo' en el texto principal para respetar la decisión auditada de preservar la imagen de 'house/casa'.
  - La puntuación separa con comas las cláusulas coordinadas para reflejar la estructura del original sin añadir elementos interpretativos.
