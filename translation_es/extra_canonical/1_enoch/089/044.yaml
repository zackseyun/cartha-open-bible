translation:
  language: es
  text: Y aquella oveja[a], cuyos ojos habían sido abiertos, vio aquel carnero en medio de las ovejas, que había abandonado su gloria[b], y comenzó a cornear a aquellas ovejas y a pisotearlas, y andaba sin freno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre las ovejas».
    reason: lexical_alternative
  - marker: b
    text: La palabra «gloria» puede aludir simbólicamente a honor, esplendor, majestad o estatus; el texto no precisa cuál de estas ideas está en primer plano.
    reason: theological_note
  - marker: c
    text: También puede entenderse como «sin que nadie lo contuviera» o «sin que nadie lo frenara»; una revisión crítica también propone el matiz «sin decoro» o «sin dignidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: በግዕ
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el marco de la visión animal, 'oveja' conserva el valor colectivo y simbólico mejor que 'cordero', que sugiere más bien un animal joven o sacrificial.
- source_word: ዘተፈትሐ አዕይንቲሁ
  english_pob_choice: whose eyes had been opened
  chosen_spanish: cuyos ojos habían sido abiertos
  alternatives_spanish:
  - cuyos ojos se habían abierto
  - que había abierto los ojos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva expresa una apertura de percepción recibida, no una acción espontánea del animal; por eso se mantiene el sentido visionario de 'habían sido abiertos'.
- source_word: ሐርጌ
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Carnero'' es el equivalente natural en español y conserva el contraste simbólico con el rebaño.'
- source_word: ዘማእከለ አባግዕ
  english_pob_choice: in the midst of the sheep
  chosen_spanish: en medio de las ovejas
  alternatives_spanish:
  - entre las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''En medio de'' reproduce bien la localización visual y algo formal del original sin perder claridad.'
- source_word: ዘሐደገ ስብሐተ
  english_pob_choice: that had abandoned its glory
  chosen_spanish: que había abandonado su gloria
  alternatives_spanish:
  - que había dejado su gloria
  - que había abandonado su esplendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva 'gloria' porque el término ge'ez es amplio y el contexto visionario deja abierta su referencia simbólica; 'esplendor' estrecha demasiado el campo semántico.
- source_word: አሐዘ ይጉድኦሙ
  english_pob_choice: it began to gore them
  chosen_spanish: comenzó a cornear
  alternatives_spanish:
  - empezó a embestir
  - comenzó a golpear con los cuernos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cornear'' mantiene la imagen concreta y violenta del ataque animal, y en español suena natural en este contexto.'
- source_word: ወኬዶሙ
  english_pob_choice: and trample them
  chosen_spanish: y a pisotearlas
  alternatives_spanish:
  - y a atropellarlas
  - y a hollar las
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pisotear'' conserva la continuación de la violencia física con una imagen clara y aceptable en español.'
- source_word: ዘእንበለ ተደላ
  english_pob_choice: without anyone restraining it
  chosen_spanish: sin restricción
  alternatives_spanish:
  - sin que nadie lo contuviera
  - sin freno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión crítica del POB en inglés destaca que la expresión ge'ez apunta a actuar sin propriedad o sin dignidad; en español, 'sin restricción' conserva la idea de actuar libremente/impunemente sin decidir de antemano entre 'dignidad' o 'contención', y deja abierta la tensión semántica del original.
theological_decisions:
- issue: Sentido de 'su gloria' del carnero
  english_pob_reading: Render literally as 'glory' without specifying whether this refers to royal dignity, horned strength, or former honor.
  chosen_spanish_reading: Mantener 'su gloria' sin explicarla más.
  alternative_spanish_readings:
  - su esplendor
  - su majestad
  - su honor
  - su fuerza
  rationale: El texto apocalíptico usa lenguaje simbólico abierto; traducir literalmente preserva la ambigüedad teológica y literaria sin cerrar el sentido a una sola interpretación.
  doctrine_reference: Preservar la tensión interpretativa del símbolo sin resolverla.
- issue: Valor de ዘእንበለ ተደላ
  english_pob_reading: The later revision notes that the phrase means acting without dignity/propriety, while the latest English text says 'without restraint'.
  chosen_spanish_reading: Traducirlo como 'sin restricción', con nota de que también puede implicar falta de decoro/propriedad.
  alternative_spanish_readings:
  - sin dignidad
  - sin decoro
  - sin freno
  rationale: El español necesita una forma idiomática que no fuerce el sentido. 'Sin restricción' permite recoger la idea de actuar libremente o sin impedimento, mientras la nota conserva la tensión documentada entre 'restricción' y 'dignidad/propriedad'.
  doctrine_reference: Mantener la ambigüedad lexical documentada en el aparato crítico.
translation_notes:
  revision_awareness: Se tuvo en cuenta que el estado más reciente del audit trail en inglés pasó de 'without dignity' a 'without restraint', aunque la revisión crítica señala que el ge'ez puede significar 'sin propriedad/decoro'. La traducción española mantiene una opción amplia ('sin restricción') para no borrar esa tensión.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' como forma base cuando corresponda, pero aquí el versículo no contiene el tetragrámaton ni una cita directa.
  - Se usa 'gloria' para ስብሐት, manteniendo la amplitud semántica del original.
  - Se prefiere 'carnero' para ሐርጌ por claridad y naturalidad en español.
  - Se conserva el tono narrativo apocalíptico sin introducir explicaciones no presentes en el texto.
