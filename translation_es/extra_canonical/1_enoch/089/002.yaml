translation:
  language: es
  text: Y otra vez levanté mis ojos hacia el cielo[a], y vi un techo alto, y siete corrientes sobre él; y esas corrientes fluyeron hacia un recinto[b] con mucha agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez puede referirse aquí a una cubierta, techo o estructura superior; la imagen arquitectónica exacta no es segura.
    reason: lexical_alternative
  - marker: b
    text: El término ge'ez puede significar un patio, recinto o espacio cercado; la precisión del lugar es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ካዕበ
  english_pob_choice: and again
  chosen_spanish: y otra vez
  alternatives_spanish:
  - y de nuevo
  - otra vez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la repetición narrativa apocalíptica sin endurecer la frase; en español, «y otra vez» conserva tanto el enlace como el sentido de reanudación.
- source_word: አልዓልኩ አዕይንትየ
  english_pob_choice: I lifted up my eyes
  chosen_spanish: levanté mis ojos
  alternatives_spanish:
  - alcé mis ojos
  - levanté la mirada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la expresión idiomática visionaria. Se evita simplificar a «miré» para no perder el gesto formal del texto.
- source_word: መንገለ ሰማይ
  english_pob_choice: toward heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia el cielo
  - en dirección al cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hacia» conserva la fuerza direccional. En español «cielo» es la opción natural y reverente para el ámbito celeste del texto.
- source_word: ናሕሰ ልዑለ
  english_pob_choice: a lofty roof
  chosen_spanish: un techo alto
  alternatives_spanish:
  - un techo elevado
  - una cubierta alta
  - una estructura alta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez puede referirse a un techo, cubierta o estructura superior. «Techo alto» es sobrio y no fuerza una identificación arquitectónica más precisa de la que el texto permite.
- source_word: ወ፯አስራብ ዲቤሁ
  english_pob_choice: and seven streams upon it
  chosen_spanish: y siete corrientes sobre él
  alternatives_spanish:
  - y siete corrientes encima de él
  - y siete canales sobre él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Corrientes» mantiene la imagen de aguas en movimiento sin decidir de más si son ríos, canales o conductos. «Sobre él» reproduce la relación locativa con la cubierta/techo.
- source_word: እልኩ አስራብ
  english_pob_choice: those streams
  chosen_spanish: esas corrientes
  alternatives_spanish:
  - aquellas corrientes
  - las corrientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el valor anafórico del demostrativo. «Esas» enlaza con las siete corrientes mencionadas antes.
- source_word: ይውሕዙ
  english_pob_choice: flowed
  chosen_spanish: fluyeron
  alternatives_spanish:
  - corrieron
  - se derramaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo de movimiento acuático directo y natural en español, sin añadir matices excesivos de violencia o abundancia.
- source_word: በ፯ ዐጸድ
  english_pob_choice: into an enclosure
  chosen_spanish: hacia una enramada
  alternatives_spanish:
  - hacia un recinto
  - hacia una cerca
  - hacia un patio cercado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El antecedente ge'ez ዐጸድ puede denotar un espacio cercado o patio/recinto. Aquí se opta por una solución española interpretativa y legible, pero menos precisa que «recinto», porque el testimonio textual es oscuro; aun así, «enramada» intenta reflejar un espacio cerrado o cubierto sin convertirlo en término técnico eclesial. Esta elección preserva la incertidumbre del objeto visionario.
- source_word: ማየ ብዙሐ
  english_pob_choice: with much water
  chosen_spanish: con mucha agua
  alternatives_spanish:
  - con abundante agua
  - con gran cantidad de agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Traducción directa y clara de la abundancia hídrica del visionario.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «into an enclosed place» a «into an enclosure with much water», con una armonización posterior hacia «enclosure». Para el español se mantuvo la idea de un espacio cercado, pero se evitó fijar de manera indebida un término técnico único donde el ge'ez admite más de una posibilidad. También se evitó traducir mecánicamente «roof» como una cubierta rígidamente literal si el contexto visionario sugiere una estructura superior no plenamente identificable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa una sintaxis solemne pero moderna, evitando arcaísmos innecesarios.
  - Se preserva la ambigüedad léxica de los objetos visionarios en lugar de forzar una identificación arquitectónica o topográfica.
  - «Corrientes» se usa de forma consistente para አስራብ en esta perícopa.
