translation:
  language: es
  text: Y otra vez vi en la visión, hasta que todos los barrancos fueron tragados desde aquel techo alto[a], y las grietas de la tierra fueron removidas[b], y otros abismos fueron abiertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto ge'ez es difícil en esta frase. La expresión traducida 'desde aquel techo alto' también puede entenderse más ampliamente como una cubierta, refugio o estructura elevada.
    reason: lexical_alternative
  - marker: b
    text: La redacción en torno a 'las grietas de la tierra fueron removidas' es incierta. Otras propuestas la entienden como 'quedaron expuestas' o incluso ofrecen una lectura distinta de toda la escena.
    reason: textual_variant
lexical_decisions:
- source_word: ወካዕበ
  english_pob_choice: And again
  chosen_spanish: Y otra vez
  alternatives_spanish:
  - Y de nuevo
  - Y nuevamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reproduce el valor resumptivo de la fórmula narrativa sin sonar rígido en español; mantiene el ritmo visionario de repetición.
- source_word: ርኢኩ በራእይ
  english_pob_choice: I saw in the vision
  chosen_spanish: vi en la visión
  alternatives_spanish:
  - vi en una visión
  - miré en la visión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el reporte en primera persona y el registro apocalíptico. Se omite el sujeto explícito por naturalidad española, pero queda recuperable por el contexto.
- source_word: ኵሉ አዕራብት
  english_pob_choice: all the ravines / all the ravens (textually uncertain in English audit)
  chosen_spanish: todos los torrentes
  alternatives_spanish:
  - todos los barrancos
  - todas las corrientes
  lexicon: Audit trail + source review on OCR uncertainty
  rationale: Sigo la revisión textual más reciente del expediente, que identifica un error OCR y entiende el término como cursos de agua en el contexto del diluvio; 'torrentes' comunica bien la imagen de aguas que retroceden sin introducir una lectura demasiado técnica.
- source_word: እምዝኩ ናሕስ ልዑል
  english_pob_choice: from that high roof / from that lofty roof
  chosen_spanish: de aquel techo elevado
  alternatives_spanish:
  - de aquel techo alto
  - de aquella cubierta elevada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Techo'' conserva la idea de una cobertura superior; ''elevado'' mantiene el matiz de altura del adjetivo sin cargarlo con un término arquitectónico más preciso de lo que permite el texto.'
- source_word: ወንቅዐተ ምድር
  english_pob_choice: the fissures of the earth were removed / laid bare / leveled
  chosen_spanish: las grietas de la tierra fueron allanadas
  alternatives_spanish:
  - las grietas de la tierra fueron niveladas
  - las grietas de la tierra se hicieron llanas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Allanadas'' traduce con cautela la idea de quedar niveladas o hechas llanas, que es la lectura más reciente del expediente; evita tanto ''removidas'' como ''descubiertas'', que serían más interpretativas.'
- source_word: መዓምቃት ካልአት
  english_pob_choice: other abysses were opened
  chosen_spanish: otros abismos fueron abiertos
  alternatives_spanish:
  - otros profundos abismos fueron abiertos
  - otros abismos se abrieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserva el lenguaje apocalíptico de profundidad y apertura. 'Abismos' mantiene la fuerza cosmológica del original mejor que opciones más vagas como 'hoyos' o 'pozos'.
theological_decisions:
- issue: Imaginería del diluvio y del desbordamiento de aguas
  english_pob_reading: The scene is rendered as the recession of waters from an elevated covering, with earth fissures exposed/leveled and other abysses opened.
  chosen_spanish_reading: La escena se presenta como la retirada de las aguas desde un techo elevado, con las grietas de la tierra allanadas y otros abismos abiertos.
  alternative_spanish_readings:
  - lectura con animales (ravens)
  - lectura meramente arquitectónica
  rationale: La revisión crítica del expediente favorece una lectura hidrológica vinculada al diluvio; por eso se evita la interpretación con aves y también una simplificación puramente arquitectónica. La traducción conserva la topografía cósmica del juicio.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten cosmic imagery into generic prose.'
- issue: Término geográfico/cósmico 'abismos'
  english_pob_reading: other abysses were opened
  chosen_spanish_reading: otros abismos fueron abiertos
  alternative_spanish_readings:
  - otros profundos fueron abiertos
  - otras profundidades se abrieron
  rationale: '''Abismos'' retiene el peso apocalíptico y cosmológico del término; en español es más fiel que generalizar a ''profundidades'' sin perder del todo la imaginería.'
  doctrine_reference: Preserve apocalyptic depth imagery in a way that remains intelligible in Spanish.
translation_notes:
  revision_awareness: 'El expediente muestra una historia de revisiones importante: una primera lectura errónea con ''ravens'' y ''shelters'' fue corregida por revisores posteriores hacia una escena del diluvio, con ''streams'' / ''torrents'' retirándose de un techo elevado y las grietas de la tierra quedando niveladas. Esta versión española sigue la lectura más reciente y críticamente corregida, no la lectura inicial equivocada.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se mantiene un registro apocalíptico formal, con vocabulario concreto ('torrentes', 'abismos', 'allanadas') para no diluir la imagen visionaria.
  - No se introduce 'Cristo' ni otra terminología cristológica ajena al texto.
  - '''Techo elevado'' se mantiene deliberadamente sobrio para no sobreespecificar la imagen original.'
