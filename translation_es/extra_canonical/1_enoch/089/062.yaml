translation:
  language: es
  text: 'Y todo el exceso y la destrucción que hicieron los pastores[a], el escriba lo escribió: cuántos destruyeron por mi mandato, y cuántos destruyeron por su propia cuenta[b]; toda la destrucción de aquellos setenta pastores quedó registrada contra ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez revisado aquí no significa 'ceguera', sino 'exceso', 'desmesura' o 'insolencia'. Se traduce 'exceso' para mantener la fuerza moral del término.
    reason: lexical_alternative
  - marker: b
    text: La expresión literal puede entenderse también como 'sobre sus propias cabezas', es decir, bajo su propia responsabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ጽጋበ
  english_pob_choice: excess
  chosen_spanish: exceso
  alternatives_spanish:
  - desmesura
  - insolencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez no corresponde a 'ceguera' en la revisión más reciente, sino a una idea de exceso, desmesura o insolencia. 'Exceso' conserva el valor de desbordamiento moral sin forzar una paráfrasis.
- source_word: ወሐጕለ
  english_pob_choice: destruction / destroy
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - arrasamiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El lexema expresa ruina o destrucción violenta. En español, 'destrucción' mantiene la fuerza semántica y permite coordinarse con el sustantivo del primer miembro del verso.
- source_word: በኖሎት
  english_pob_choice: by the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - por los pastores
  - a manos de los pastores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail corrigió la lectura errónea 'elephants' y confirmó que el sintagma se refiere a los pastores. En español, la pasiva perifrástica 'que hicieron los pastores' expresa la agencia sin introducir un giro menos natural.
- source_word: ጻሐፍ
  english_pob_choice: wrote down / was recorded
  chosen_spanish: lo escribió
  alternatives_spanish:
  - lo registró
  - quedó escrito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto de contabilidad judicial/heavenly bookkeeping favorece un verbo de registro. 'Lo escribió' mantiene la acción del escriba con un español directo y formal.
- source_word: ሚመጠነ
  english_pob_choice: how many
  chosen_spanish: cuántos
  alternatives_spanish:
  - el número de cuántos
  - cuánto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma introduce un recuento exacto. 'Cuántos' es la opción natural en español para conservar el tono de contabilización.
- source_word: በትእዛዝየ
  english_pob_choice: by my command
  chosen_spanish: por mi mandato
  alternatives_spanish:
  - por mi orden
  - según mi decreto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Mandato'' conserva autoridad formal y refleja bien la voz primera del juez visionario. ''Por mi mandato'' mantiene el contraste con la segunda cláusula.'
- source_word: በርእሶሙ
  english_pob_choice: by their own will / on their own heads
  chosen_spanish: por su propia cuenta
  alternatives_spanish:
  - por voluntad propia
  - sobre sus propias cabezas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez es idiomática y puede aludir a responsabilidad asumida por ellos mismos. 'Por su propia cuenta' comunica esa responsabilidad sin resolver del todo la tensión entre literalidad e interpretación.
- source_word: ፯፯ ኖላዊ
  english_pob_choice: those seventy shepherds
  chosen_spanish: aquellos setenta pastores
  alternatives_spanish:
  - los setenta pastores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el grupo simbólico y la imaginería del texto apocalíptico. 'Aquellos' reproduce el valor de distancia referencial del pasaje.
- source_word: ዲቤሆሙ
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - en su contra
  - sobre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa un registro acusatorio, no meramente informativo. 'Contra ellos' es la opción más natural y precisa en español.
theological_decisions:
- issue: Responsabilidad dividida entre mandato divino y culpa de los pastores
  english_pob_reading: The verse distinguishes actions done by my command from ruin attributable to the shepherds themselves.
  chosen_spanish_reading: El verso distingue lo hecho por mandato del juez visionario de lo que los pastores hicieron por su propia cuenta.
  alternative_spanish_readings:
  - Todo el daño fue igualmente mandado por Dios.
  - La segunda cláusula solo enfatiza castigo, no responsabilidad.
  rationale: La traducción conserva la tensión del texto entre soberanía divina y responsabilidad de las criaturas. No se elimina la diferencia marcada por las dos cláusulas, porque el audit trail la trata como deliberada.
  doctrine_reference: Preservar la tensión teológica del texto; no armonizarla prematuramente.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail, que corrige errores graves del borrador inglés anterior: no dice ''elephants'', no usa ''blindness'', y lee በኖሎት como ''by the shepherds''. También se respetó la forma final coherente del versículo con un único enunciado de registro judicial.'
  spanish_consistency_notes:
  - '''Pastores'' se conserva de manera literal para mantener la imaginería del Animal Apocalypse.'
  - '''Exceso'' y ''destrucción'' se mantienen distintos para no diluir la doble carga del original.'
  - '''Mandato'' y ''por su propia cuenta'' dejan visible la tensión entre orden y responsabilidad.'
  - El registro contable/judicial se expresa con 'el escriba lo escribió' y 'quedó registrada contra ellos' para reflejar el libro de cuentas implícito en el pasaje.
