base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/062.yaml
  text: 'And all the excess and destruction that was done by the shepherds[a], the scribe wrote down: how many they destroyed by my command, and how many they destroyed of their own accord[e][d][c][b]; all the destruction of those seventy shepherds was recorded against them.'
  footnotes:
  - marker: a
    text: The Ge'ez wording is difficult. The repeated root rendered 'plucked out / destruction' may cover a broader sense of violent removal or ruin.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by/on their heads' in the second clause; the idiom may mean 'on their own responsibility' rather than strictly 'by their own will.'
    reason: lexical_alternative
  - marker: c
    text: The affected animals are given here as 'elephants' from the Ge'ez witness. Because this chapter's symbolic-animal sequence is textually difficult in places, the identification should be held with some caution.
    reason: textual_variant
  - marker: d
    text: Or 'blindness'.
    reason: previous_rendering
  - marker: e
    text: Or 'to those elephants'.
    reason: previous_rendering
