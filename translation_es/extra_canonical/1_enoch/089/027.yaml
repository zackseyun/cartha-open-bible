translation:
  language: es
  text: Y vi hasta que todos los lobos que siguieron a aquellas ovejas perecieron y fueron ahogados[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez es difícil al final del versículo. La idea general es que los lobos perecieron y fueron sumergidos en juicio.
    reason: textual_variant
  - marker: b
    text: 'O: «fueron hundidos»; el verbo final puede entenderse como inmersión o sumersión mortal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y seguí viendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En una visión apocalíptica, el inicio narrativo natural en español es 'Y vi', que conserva la primera persona y la secuencia visionaria sin sobrecargar el verbo.
- source_word: እስከ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - así que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hasta que'' expresa mejor en español el límite temporal de la visión introducido por la partícula, con valor de continuación hasta un desenlace.'
- source_word: አዝእብት
  english_pob_choice: all the wolves
  chosen_spanish: todos los lobos
  alternatives_spanish:
  - todas las fieras
  - todos los animales salvajes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El estado textual y el auditoría inglesa corrigen aquí 'beasts' a 'wolves'. 'Lobos' es la opción literal y coherente con el ciclo de imágenes del capítulo.
- source_word: እለ ተለውዎሙ
  english_pob_choice: that followed those sheep
  chosen_spanish: que siguieron a aquellas ovejas
  alternatives_spanish:
  - que se apartaron de aquellas ovejas
  - que fueron tras aquellas ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La base ge'ez indica seguimiento o ir tras ellas; 'siguieron a' preserva la relación espacial/narrativa sin introducir la idea opuesta de apartarse.
- source_word: ተሐጕሉ
  english_pob_choice: perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - fueron destruidos
  - se perdieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual señala que este verbo significa 'perecieron' o 'fueron destruidos'. 'Perecieron' mantiene la fuerza de juicio sin añadir una imagen acuática que pertenece al siguiente verbo.
- source_word: ወተሠጥሙ
  english_pob_choice: were drowned
  chosen_spanish: fueron hundidos
  alternatives_spanish:
  - fueron ahogados
  - se hundieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo final expresa hundimiento/submersión. 'Fueron hundidos' mantiene la pasiva y la imagen física de ser sumergidos, evitando restringirlo solo a 'ahogados'.
theological_decisions:
- issue: Preservación del simbolismo animal del Apocalipsis de los Animales
  english_pob_reading: Keep the animal imagery literal ('beasts' and 'sheep')
  chosen_spanish_reading: Conservar la imaginería literal ('lobos' y 'ovejas')
  alternative_spanish_readings:
  - Interpretar explícitamente como naciones y pueblo
  - Explicar el símbolo dentro del versículo
  rationale: El contexto literario exige mantener el símbolo animal sin convertirlo en paráfrasis explicativa. La corrección filológica confirma 'lobos', por lo que la traducción debe conservar la escena visionaria.
  doctrine_reference: 'Contexto de 1 Enoc 89: visiones simbólicas del Apocalipsis de los Animales'
- issue: Relación entre los dos verbos finales
  english_pob_reading: perished and were drowned
  chosen_spanish_reading: perecieron y fueron hundidos
  alternative_spanish_readings:
  - perecieron y se ahogaron
  - fueron destruidos y se hundieron
  rationale: 'La auditoría distingue dos acciones: una de ruina general y otra de hundimiento/sumersión. ''Perecieron'' + ''fueron hundidos'' conserva esa tensión en vez de fusionarla o repetirla sin matiz.'
  doctrine_reference: Principio de no borrar tensiones léxicas del texto fuente
translation_notes:
  revision_awareness: 'La traducción incorpora la revisión de gran impacto que corrige la lectura previa: no son ''beasts'' ni ''turned away'', sino ''lobos'' que ''siguieron'' a aquellas ovejas; además, se separan los dos verbos finales como ''perecieron'' y ''fueron hundidos'', respetando la distinción semántica indicada por la auditoría.'
  spanish_consistency_notes:
  - Se mantiene 'ovejas' para el referente simbólico del pasaje.
  - Se usa 'lobos' en concordancia con la corrección textual y con el entorno inmediato del capítulo.
  - Se evita 'SEÑOR' u otros términos ajenos porque no aparecen en este versículo.
  - La pasiva 'fueron hundidos' conserva el valor imagístico sin forzar una interpretación doctrinal adicional.
