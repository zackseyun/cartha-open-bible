base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/026.yaml
  text: And when they saw the Lord of the sheep[a], they fled from before his face; and that watercourse gathered together, and it became swift according to its nature[d][c][b], and it filled with water and rose up until it covered those wolves.
  footnotes:
  - marker: a
    text: Or 'that channel of water' or 'that torrent-bed'; the Ge'ez term likely refers to a stream-course that suddenly swells.
    reason: lexical_alternative
  - marker: b
    text: Or 'rose up to cover those wolves.' The final phrase may refer either to the flood reaching the wolves' covering/shelter or to the waters covering the wolves themselves.
    reason: alternative_reading
  - marker: c
    text: Or 'they entered'.
    reason: previous_rendering
  - marker: d
    text: Or 'as far as the covering of those wolves'.
    reason: previous_rendering
