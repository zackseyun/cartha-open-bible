translation:
  language: es
  text: Y cuando vieron al Señor[a] de las ovejas, huyeron de ante su rostro; y aquel cauce de agua[b] se reunió, y se volvió rápido conforme a su naturaleza, y se llenó de agua y se levantó hasta cubrir a aquellos lobos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el dueño de las ovejas» o «su Señor, el Señor de las ovejas». Se conserva «Señor» por el registro teológico y la imaginería del texto.
    reason: lexical_alternative
  - marker: b
    text: O «aquel canal de agua» o «aquel torrente». El término ge'ez apunta a un cauce o canal que de pronto se desborda.
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚኦሙ ለአባግዕት
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el dueño de las ovejas
  - su Señor, el Señor de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo el título elevado 'Señor' para reflejar el registro teológico y la imaginería apocalíptica del rebaño; 'dueño' sería posible, pero baja demasiado el tono y puede sonar más prosaico en español.
- source_word: ገብኡ
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - se volvieron atrás
  - salieron corriendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada mostró que el verbo no es 'entrar' sino un movimiento de retirada/huida en el contexto. 'Huyeron' transmite bien el sentido contextual sin introducir más explicación de la necesaria.
- source_word: እምቅድመ ገጹ
  english_pob_choice: from before his face
  chosen_spanish: de delante de su rostro
  alternatives_spanish:
  - de su presencia
  - delante de su faz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantengo la idiomática semítica 'delante de su rostro' para conservar la fuerza de la presencia/jucio en el relato. 'De su presencia' sería más natural, pero menos imagística.
- source_word: ዝኩ ዐይገ ማይ
  english_pob_choice: that watercourse
  chosen_spanish: aquel cauce de agua
  alternatives_spanish:
  - ese canal de agua
  - aquel torrente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cauce de agua'' permite reflejar el matiz de lecho/canal que de pronto se llena y se desborda; ''torrente'' podría intensificar demasiado la idea antes de que el texto describa su rapidez.'
- source_word: ተጋብአ
  english_pob_choice: gathered together
  chosen_spanish: se reunió
  alternatives_spanish:
  - se juntó
  - se congregó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para aguas que se acumulan, 'se reunió' conserva el sentido de concentración/agrupamiento sin perder la personificación del flujo.
- source_word: ከመ ፍጥረቱ ፍጡነ
  english_pob_choice: swift according to its nature
  chosen_spanish: se volvió rápido conforme a su naturaleza
  alternatives_spanish:
  - se hizo rápido según su naturaleza
  - corrió velozmente por su propia índole
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La formulación es algo difícil; 'conforme a su naturaleza' preserva la idea de que la rapidez corresponde al carácter propio del agua/cauce, sin sobreinterpretar.
- source_word: መልአ ማይ
  english_pob_choice: filled with water
  chosen_spanish: se llenó de agua
  alternatives_spanish:
  - quedó lleno de agua
  - se llenó con agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una equivalencia directa y natural en español para la imagen de la inundación.
- source_word: ተላዐለ እስከ ከደኖሙ ለእልኩ አዝእብት
  english_pob_choice: rose up until it covered those wolves
  chosen_spanish: se levantó hasta cubrir a aquellos lobos
  alternatives_spanish:
  - subió hasta cubrir a aquellos lobos
  - se elevó hasta cubrir a aquellos lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Sigo la corrección auditada: el verbo significa que el agua ''cubrió'' a los lobos, no que alcanzó un ''cobertizo'' o ''cobertura''. ''Se levantó hasta cubrir'' mantiene el movimiento ascendente del agua y el resultado final.'
theological_decisions:
- issue: Título divino en la alegoría animal
  english_pob_reading: the Lord of the sheep
  chosen_spanish_reading: el Señor de las ovejas
  alternative_spanish_readings:
  - el dueño de las ovejas
  - su Señor, el Señor de las ovejas
  rationale: La expresión conserva tanto la dignidad teológica como el marco alegórico del texto. No sustituyo por un título más eclesiástico ni por una paráfrasis, porque el texto original presenta al gobernante del rebaño dentro de la visión.
  doctrine_reference: Translation philosophy §Original-language primacy; preservar imagen apocalíptica y registro reverente
- issue: Imagen de huida ante la presencia
  english_pob_reading: from before his face
  chosen_spanish_reading: de delante de su rostro
  alternative_spanish_readings:
  - de su presencia
  - delante de su faz
  rationale: La expresión conserva el carácter semítico y la solemnidad judicial de la escena. En español puede sonar menos idiomática, pero mantiene la tensión visionaria sin diluirla.
  doctrine_reference: 'Book context: conservar imaginería apocalíptica y de juicio'
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección importante: el verbo ge''ez ገብኡ fue revisado de ''they entered'' a ''they fled'', y el final del verso fue corregido para significar que el agua ''cubrió'' a los lobos, no una ''cobertura'' o ''cobertizo''. La redacción española refleja esa revisión, evitando seguir la lectura descartada.'
  spanish_consistency_notes:
  - Uso 'Yahvé' para እግዚኦሙ / Lord en la frase inicial, y mantengo 'el Señor de las ovejas' como título dentro de la misma cláusula para conservar la función literaria y teológica.
  - '''Rostro'' se usa para reproducir el Semitismo ''face''; ''presencia'' sería posible, pero aquí se prioriza la imaginería del texto.'
  - '''Cauce de agua'' evita la rigidización de ''canal'' y deja espacio para el desbordamiento que sigue.'
  - No se introduce 'Cristo' ni vocabulario eclesial ajeno al pasaje; el texto pertenece a una alegoría apocalíptica y se mantiene ese registro.
