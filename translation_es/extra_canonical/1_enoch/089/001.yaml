translation:
  language: es
  text: Y uno de aquellos cuatro fue hacia aquel toro blanco y le enseñó un misterio, mientras no temblaba; y aquel toro nació y llegó a ser un hombre, y construyó para sí una gran nave[a] y habitó sobre ella. Y tres toros estaban con él en aquella nave[b], y quedaron cubiertos por arriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Nave» evita imponer «arca» como equivalencia obligatoria; el contexto alude al relato del diluvio, pero el símbolo permanece en forma visionaria.
    reason: cross_reference
  - marker: b
    text: Una versión anterior entendía «vacas» aquí, pero «toros» preserva mejor el código zoomórfico masculino del pasaje.
    reason: alternative_reading
lexical_decisions:
- source_word: ፬ሖረ
  english_pob_choice: went to
  chosen_spanish: fue hacia
  alternatives_spanish:
  - fue a
  - se dirigió a
  - fue hasta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición direccional pide un movimiento hacia el otro bovino; «fue hacia» conserva el sentido de dirección sin forzar un matiz más específico de llegada o cercanía.
- source_word: ላህም ጸዓዳ
  english_pob_choice: white bull
  chosen_spanish: toro blanco
  alternatives_spanish:
  - buey blanco
  - novillo blanco
  - toro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual del audit trail corrige el error anterior de sexado. En el código zoomórfico del relato, el animal representa un varón patriarcal; «toro» preserva ese mapeo simbólico mejor que «vaca» o «ternero».
- source_word: መሀሮ ምሥጢረ
  english_pob_choice: taught him a mystery
  chosen_spanish: le enseñó un misterio
  alternatives_spanish:
  - le instruyó en un misterio
  - le reveló un secreto
  - le enseñó un secreto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Enseñó» conserva la fuerza didáctica, y «misterio» refleja el carácter de conocimiento oculto o revelado del término. En español, «le enseñó un misterio» es más natural que «le enseñó en un misterio» y mantiene el valor apocalíptico.
- source_word: እንዘ ኢይርዕድ
  english_pob_choice: while he was not trembling
  chosen_spanish: mientras no temblaba
  alternatives_spanish:
  - mientras no estaba temblando
  - mientras no temía
  - mientras no se estremecía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la lectura revisada con la negación explícita. «Mientras no temblaba» reproduce el valor verbal y la negación sin añadir una paráfrasis psicológica ajena al texto.
- source_word: ተወልደ ወኮነ ሰብአ
  english_pob_choice: was born and became a man
  chosen_spanish: nació y llegó a ser un hombre
  alternatives_spanish:
  - nació y se hizo hombre
  - fue nacido y se hizo hombre
  - nació y se convirtió en hombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Llegó a ser» conserva con claridad el cambio de estado del símbolo animal al humano, sin sonar demasiado rígido en español. «Un hombre» mantiene el singular narrativo.
- source_word: መስቀረ ዐቢየ
  english_pob_choice: a great vessel
  chosen_spanish: una gran nave
  alternatives_spanish:
  - una gran embarcación
  - un gran vaso
  - un gran navío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Nave» comunica en español una embarcación amplia y digna sin imponer de entrada el término cargado «arca». Mantiene la imaginería visionaria y la posible alusión al relato del diluvio.
- source_word: ነበረ ዲቤሃ
  english_pob_choice: dwelt upon it
  chosen_spanish: habitó sobre ella
  alternatives_spanish:
  - vivió en ella
  - moró sobre ella
  - se quedó sobre ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición favorece la idea de estar sobre la nave. «Habitó» conserva registro elevado y narrativo, mientras «sobre ella» mantiene el detalle espacial.
- source_word: ፫አላህምት
  english_pob_choice: three bulls
  chosen_spanish: tres toros
  alternatives_spanish:
  - tres bovinos
  - tres bueyes
  - tres machos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La corrección del audit trail exige mantener la coherencia del código simbólico masculino. «Toros» es la opción española más clara y consistente con «toro blanco».
- source_word: ተከድኑ ላዕሌሆሙ
  english_pob_choice: they were covered over above them
  chosen_spanish: fueron cubiertos por encima de ellos
  alternatives_spanish:
  - había una cubierta sobre ellos
  - quedaron cubiertos por arriba
  - los cubrieron por encima
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva conserva la extrañeza sintáctica del original. «Por encima de ellos» mantiene el valor locativo del preposicional sin suavizar la imagen visionaria.
theological_decisions:
- issue: Mantener o resolver la tipología del diluvio al estilo de Noé
  english_pob_reading: Retain the animal-to-man transformation and vessel imagery without naming Noah in the translation
  chosen_spanish_reading: Mantener el cambio simbólico de toro a hombre y la nave, sin nombrar a Noé
  alternative_spanish_readings:
  - Traducir interpretativamente como Noé construyendo el arca
  - Usar «arca» para explicitar la alusión al diluvio
  rationale: El texto presenta una visión alegórica y no una identificación directa. La traducción debe preservar la tensión simbólica y la alusión bíblica sin resolverla por interpretación explícita.
  doctrine_reference: Preservar la tensión textual; no paraprasear más allá del testimonio dado.
translation_notes:
  revision_awareness: 'El audit trail muestra una corrección importante: el texto previo tenía errores de sexo en los animales y una lectura invertida de la negación en እንዘ ኢይርዕድ. Se adoptó la revisión posterior que entiende ላህም y አላህምት como bovinos masculinos, y se ajustó el verbo a una negación explícita. También se conservó la opción de no explicitar «arca» para mantener el carácter visionario del pasaje.'
  spanish_consistency_notes:
  - Se usa «toro» de manera consistente para el singular y plural masculinos simbólicos.
  - Se mantiene «misterio» en vez de «secreto» para reflejar el valor apocalíptico del término sin perder claridad.
  - Se evita «arca» para no cerrar interpretativamente la imagen de la «gran nave».
  - La puntuación y los tiempos verbales buscan un registro bíblico moderno, legible para una audiencia eclesial amplia.
