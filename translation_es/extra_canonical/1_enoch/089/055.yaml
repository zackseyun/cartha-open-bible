translation:
  language: es
  text: Y los entregó en manos de los leones y los leopardos[a] y los lobos y las hienas[b], y en manos de los zorros, y a todas las fieras; y aquellas bestias del campo comenzaron a despedazar a aquellas ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El animal designado aquí es incierto; el término ge'ez puede referirse a un felino grande, como un leopardo o una pantera, más que a un tigre en el sentido zoológico moderno.
    reason: lexical_alternative
  - marker: b
    text: El animal traducido como «hienas» también puede entenderse como «chacales».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሐደጎሙ
  english_pob_choice: and he gave them over
  chosen_spanish: y los entregó
  alternatives_spanish:
  - y los dejó
  - y los abandonó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Entregó» conserva la idea activa de poner a alguien en poder hostil, que en este contexto judicial/apocalíptico es más precisa que «dejó».
- source_word: ውስተ እደ
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en el poder de
  - a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión idiomática se vierte naturalmente como «en manos de» en español, manteniendo la imagen de dominio y sometimiento.
- source_word: አናብስት
  english_pob_choice: lions
  chosen_spanish: leones
  alternatives_spanish:
  - grandes bestias
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el Apocalipsis de los Animales, el término funciona como un animal específico y no como una categoría general; «leones» es la equivalencia directa y contextual.
- source_word: አንምርት
  english_pob_choice: leopards
  chosen_spanish: leopardos
  alternatives_spanish:
  - panteras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual corrige la antigua opción «tigres»; el ge'ez ነምር se relaciona con «leopardo/pantera», por lo que «leopardos» es la opción más fiel y no anacrónica.
- source_word: አዝእብት
  english_pob_choice: wolves
  chosen_spanish: lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Traducción directa y estable del término en la secuencia de depredadores.
- source_word: አጽዕብት
  english_pob_choice: hyenas
  chosen_spanish: hienas
  alternatives_spanish:
  - chacales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la identificación principal adoptada por el POB inglés, manteniendo abierta la alternativa zoológica documentada mediante nota.
- source_word: ቈናጽል
  english_pob_choice: foxes
  chosen_spanish: zorros
  alternatives_spanish:
  - chacales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Zorros» reproduce la lectura literal y común del término, sin forzar la zoología hacia una identificación más interpretativa.
- source_word: ኵሉ አራዊት
  english_pob_choice: all the wild beasts
  chosen_spanish: todos los animales salvajes
  alternatives_spanish:
  - todas las fieras
  - todos los animales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Animales salvajes» transmite el alcance general del sintagma con un español natural; conserva el tono ominoso sin sonar excesivamente arcaico.
- source_word: ዝኩ አራዊተ ገዳም
  english_pob_choice: those beasts of the field
  chosen_spanish: aquellas bestias del campo
  alternatives_spanish:
  - aquellos animales del campo
  - aquellas fieras del campo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase distingue estos animales de los nombrados antes; «bestias del campo» preserva la distinción léxica señalada por la auditoría inglesa y la repetición simbólica del pasaje.
- source_word: አሐዙ
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  - se pusieron a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor incoativo se expresa de modo natural con «comenzaron», que encaja bien con la acción siguiente.
- source_word: ይምሥጥዎሙ
  english_pob_choice: to tear apart
  chosen_spanish: a despedazar
  alternatives_spanish:
  - a rasgar
  - a devorar
  - a destruir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Despedazar» transmite la violencia concreta del verbo y se ajusta al cuadro animal más que opciones más generales como «destruir».
- source_word: እልኩ አባግዕ
  english_pob_choice: those sheep
  chosen_spanish: aquellas ovejas
  alternatives_spanish:
  - esas ovejas
  - aquellos corderos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el Apocalipsis de los Animales, las ovejas son el símbolo ya establecido; «aquellas ovejas» conserva la referencia demostrativa y el valor alegórico.
theological_decisions:
- issue: Agencia judicial en el acto de entregar a las ovejas
  english_pob_reading: he gave them over into the hand of the predators
  chosen_spanish_reading: los entregó en manos de los depredadores
  alternative_spanish_readings:
  - los dejó en manos de los depredadores
  - los abandonó a los depredadores
  rationale: «Entregó» mantiene la agencia activa del sujeto narrativo y la dimensión judicial del pasaje, sin resolver la tensión apocalíptica en una mera pasividad.
  doctrine_reference: Conservar la imaginería apocalíptica y la responsabilidad del agente según el contexto visionario.
translation_notes:
  revision_awareness: Se incorporó la revisión que corrige «tigres» por «leopardos» y la que distingue «todos los animales salvajes» de «aquellas bestias del campo», preservando ambas series zoológicas y su progresión en el verso. La lectura final también evita la equivalencia anacrónica con tigres y mantiene la agencia judicial del verbo principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí; no hay nombre divino explícito en este versículo.
  - «Aquellas bestias del campo» distingue el segundo grupo de animales frente a «todos los animales salvajes», siguiendo la estructura del ge'ez y la auditoría inglesa.
  - Se usa un registro bíblico moderno y sobrio, evitando el calco excesivo pero conservando la imaginería apocalíptica.
  - Los nombres de animales se normalizan al español común cuando la identificación es segura; se preserva la incertidumbre zoológica donde la fuente la documenta.
