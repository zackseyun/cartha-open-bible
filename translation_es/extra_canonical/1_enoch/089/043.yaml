translation:
  language: es
  text: Y aquel carnero comenzó a embestir por este lado y por aquel lado[b] a aquellos perros, zorros[a] y jabalíes[c], hasta que los destruyó a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término traducido 'zorros' también puede entenderse de modo más amplio como un cánido salvaje, por ejemplo, 'chacales'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'de este lado y de aquel lado', expresión que indica ataque por ambos lados o por todas partes.
    reason: lexical_alternative
  - marker: c
    text: 'O: ''Y aquel carnero empezó a embestir por este lado y por aquel lado contra los perros, los zorros y los jabalíes''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወዝኩ
  english_pob_choice: And that ram
  chosen_spanish: Y aquel carnero
  alternatives_spanish:
  - Y ese carnero
  - Y aquel macho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto ge'ez no dice 'veo' ni 'vi', sino una continuación narrativa con 'y aquel'. La revisión auditada corrige 'horn' por 'ram'; en español, 'carnero' preserva la imagen zoomórfica concreta del contexto.
- source_word: ሐርጌ
  english_pob_choice: that ram
  chosen_spanish: aquel carnero
  alternatives_spanish:
  - el carnero
  - aquel macho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el referente animal explícito, conforme a la corrección textual del audit trail. 'Carnero' es más natural que 'macho' para el símbolo y evita introducir una glosa interpretativa.
- source_word: አኃዘ ይወግእ
  english_pob_choice: began to gore
  chosen_spanish: comenzó a acometer
  alternatives_spanish:
  - comenzó a embestir
  - empezó a cornear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido literal apunta al ataque propio del carnero; 'acometer' conserva el movimiento agresivo sin depender de una forma demasiado técnica o repetitiva. 'Embestir' y 'cornear' son alternativas válidas, pero 'acometer' suena más fluido y digno en español bíblico.
- source_word: እምዝየ ወእምዝየ
  english_pob_choice: from this side and from that side
  chosen_spanish: por este lado y por aquel lado
  alternatives_spanish:
  - de este lado y de aquel lado
  - por un lado y por otro lado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La duplicación ge'ez se conserva con una duplicación natural en español. 'Por este lado y por aquel lado' comunica el ataque desde ambos lados sin volverlo explicativo de más.
- source_word: አክላብ
  english_pob_choice: the dogs
  chosen_spanish: a aquellos perros
  alternatives_spanish:
  - a los perros
  - a esos perros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se retiene el animal literal, sin interpretación histórica en el texto. Se eligió 'aquellos' para reflejar la deixis narrativa del demostrativo y mantener la distancia del pasaje visionario.
- source_word: ቈናጽል
  english_pob_choice: the foxes
  chosen_spanish: a aquellos zorros
  alternatives_spanish:
  - a aquellos chacales
  - a aquellos canidos salvajes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La identificación léxica es algo incierta en etiópico; la POB inglesa usa 'foxes' con nota de posible 'jackals'. En español, 'zorros' es la opción base más transparente, dejando abierta la alternativa en nota.
- source_word: ሐራዊያ ገዳም
  english_pob_choice: the wild boars
  chosen_spanish: a aquellos jabalíes
  alternatives_spanish:
  - a aquellos cerdos salvajes
  - a aquellos puercos del desierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Jabalíes'' es el equivalente natural y preciso de la imagen de los cerdos salvajes del campo abierto. Conserva el registro narrativo sin recurrir a una perífrasis innecesaria.'
- source_word: እስከ ለኵሎሙ አኅጐሎሙ
  english_pob_choice: until he had destroyed them all
  chosen_spanish: hasta que los destruyó a todos
  alternatives_spanish:
  - hasta que los destruyó por completo
  - hasta aniquilarlos a כולם
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la consumación total de la acción, con un español directo y natural. 'Destruyó a todos' expresa la victoria completa sin agregar intensificación no exigida por el texto.
theological_decisions:
- issue: Conservar la imaginería animal sin identificación histórica en el texto principal
  english_pob_reading: Retain literal animal imagery without identifying the nations or groups represented
  chosen_spanish_reading: Conservar la imagen literal del carnero y los animales, sin identificar en el texto a los pueblos o grupos simbolizados
  alternative_spanish_readings:
  - Interpretar los animales como naciones o grupos concretos en el texto
  - Añadir glosas históricas dentro del versículo
  rationale: El expediente inglés privilegia la traducción del símbolo en sí, no su comentario histórico. En español se mantiene esa misma decisión para no borrar la tensión apocalíptica ni introducir interpretación no atestiguada por el verso.
  doctrine_reference: Principio de traducción con respeto al género apocalíptico y a la delimitación entre texto y comentario
translation_notes:
  revision_awareness: 'Se corrigieron las fallas auditadas del borrador previo: se eliminó la adición no presente de ''vi'', se sustituyó ''horn'' por el referente correcto ''carnero'', y se ajustó el verbo para reflejar el ataque propio del carnero (''comenzó a acometer'') en lugar de ''making war''. También se anclaron en el texto las notas que corresponden a alternativas léxicas reales, evitando marcadores huérfanos.'
  spanish_consistency_notes:
  - Se mantiene 'carnero' para el referente zoomórfico del pasaje, en coherencia con el verso inmediato y con la corrección del audit trail.
  - Se usa 'a aquellos' para conservar la deixis narrativa del original y evitar una generalización impersonal.
  - Se prefieren equivalentes concretos de animales ('perros', 'zorros', 'jabalíes') porque el género apocalíptico exige preservar la imaginería literal.
  - Las notas de pie de página se anclan solo en los términos donde el español ofrece una alternativa lexical real.
