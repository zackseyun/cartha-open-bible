translation:
  language: es
  text: Y el libro fue leído delante del Señor de las ovejas[a], y tomó el libro de su mano[b], y lo leyó, y lo selló, y lo dejó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La revisión inglesa opta por «was read»; la lectura «was opened» se consideró, pero se rechazó porque duplicaría indebidamente la acción posterior de leer.
    reason: lexical_alternative
  - marker: b
    text: El antecedente de «su» no se explicita en el testimonio ge'ez; la frase conserva esa ambigüedad.
    reason: alternative_reading
lexical_decisions:
- source_word: መጽሐፍ
  english_pob_choice: book
  chosen_spanish: libro
  alternatives_spanish:
  - rollo
  - documento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez es el vocablo común para un escrito/libro. En español, «libro» es el equivalente más natural y no fuerza la imagen de rollo, que no está exigida por la palabra.
- source_word: ተነበ
  english_pob_choice: was read
  chosen_spanish: fue leído
  alternatives_spanish:
  - fue abierto
  - fue revelado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del POB inglés corrige la lectura previa «was opened» por «was read». En español, «fue leído» conserva la secuencia narrativa de lectura explícita y evita introducir una acción no sustentada por el verbo corregido.
- source_word: በቅድመ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición expresa presencia ante una figura superior. «Delante de» suena natural en español y mantiene el matiz de escena solemne/courtroom sin volverla más interpretativa.
- source_word: እግዚአ አባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el maestro de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título metafórico propio de la visión de los Animales. «Señor» preserva el registro elevado y la referencia titular, mientras «ovejas» mantiene la imaginería apocalíptica sin sustituirla por una explicación.
- source_word: ነሥአ
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - levantó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo narra la acción de tomar el libro en posesión. «Tomó» es la opción más directa y natural en español.
- source_word: እምእዱ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de la mano de él
  - de su propia mano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la ambigüedad del antecedente, tal como observa el POB inglés. «De su mano» es fiel y conciso; no especifica más de lo que permite el texto.
- source_word: አንበበ
  english_pob_choice: read
  chosen_spanish: lo leyó
  alternatives_spanish:
  - lo recitó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto el sentido ordinario es leer el documento. Se usa el objeto directo pronominal para evitar repetición pesada de «el libro» y conservar fluidez.
- source_word: ኀተማ
  english_pob_choice: sealed
  chosen_spanish: lo selló
  alternatives_spanish:
  - lo cerró con sello
  - lo autenticó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Selló» reproduce la acción documental/judicial implicada por el verbo y mantiene la fuerza legal de la escena.
- source_word: አንበረ
  english_pob_choice: set it down
  chosen_spanish: lo puso aparte
  alternatives_spanish:
  - lo colocó
  - lo dejó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica colocar el libro al terminar. «Lo puso aparte» comunica el gesto final de depositarlo sin añadir una imagen excesivamente técnica o rígida.
theological_decisions:
- issue: Título divino apocalíptico para እግዚአ አባግዕ
  english_pob_reading: the Lord of the sheep
  chosen_spanish_reading: el Señor de las ovejas
  alternative_spanish_readings:
  - el maestro de las ovejas
  rationale: Se conserva el título como designación de autoridad divina dentro de la visión. Traducirlo por «Señor» mantiene el registro reverente y no aplana la metáfora pastoral/apocalíptica.
  doctrine_reference: Preservar títulos; mantener la imaginería de la visión animal; evitar paráfrasis que borren la figura.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail, que corrige la antigua solución «was opened» a «was read» y elimina la repetición accidental final. La redacción española refleja esa decisión y preserva el paralelismo narrativo: lectura del libro, toma del libro, nueva lectura, sellado y colocación.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en mayúsculas como sustituto de Yahvé porque aquí el texto no usa el tetragrámaton sino un título apocalíptico metafórico.
  - Se mantuvo «Señor de las ovejas» para conservar el término titular y la imaginería del relato.
  - Se usó «libro» en vez de «rollo» porque el ge'ez no obliga a especificar formato material.
  - Se conservó la ambigüedad posesiva en «de su mano», conforme al expediente textual.
