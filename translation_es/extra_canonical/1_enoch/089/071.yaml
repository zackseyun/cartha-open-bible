    reason: lexical_alternative
  - marker: b
    text: El antecedente de «su» no se explicita en el testimonio ge'ez; la frase conserva esa ambigüedad.
    reason: alternative_reading
  revision_rationale: Se reemplaza «lo puso aparte» por «lo dejó» para reflejar mejor el sentido básico de colocar/dejar el libro al final de la secuencia, sin añadir el matiz de apartarlo. El resto del texto es fiel, claro y bien alineado con la auditoría inglesa y la fuente.
