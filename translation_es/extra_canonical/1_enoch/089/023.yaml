translation:
  language: es
  text: Y los lobos comenzaron a perseguir a esas ovejas hasta que las alcanzaron en un manantial de agua[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una fuente de agua». La expresión ge'ez señala la localización en un punto de agua; también puede entenderse de manera más amplia como «en un lugar de agua».
    reason: lexical_alternative
lexical_decisions:
- source_word: አዝእብት
  english_pob_choice: the wolves
  chosen_spanish: los lobos
  alternatives_spanish:
  - las fieras
  - los perros salvajes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo la imagen animal concreta del original y del audit trail inglés. "Lobos" mantiene el valor hostil y depredador sin convertir la figura en una interpretación histórica.
- source_word: አሐዙ
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - se pusieron a
  - empezaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta construcción el verbo funciona de modo incoativo antes del infinitivo de acción siguiente. "Comenzaron" reproduce bien ese valor y suena natural en español.
- source_word: ይትልውዎሙ
  english_pob_choice: to pursue them
  chosen_spanish: a perseguir
  alternatives_spanish:
  - a seguir
  - a cazar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Perseguir" conserva la presión hostil del verbo y evita un tono demasiado débil como "seguir". "Cazar" sería más fuerte de lo que exige el pasaje.'
- source_word: ዝኩ አባግዕት
  english_pob_choice: those sheep
  chosen_spanish: esas ovejas
  alternatives_spanish:
  - aquellas ovejas
  - las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo se conserva para reflejar la referencia específica dentro de la visión. "Esas" es natural en español y mantiene la deixis narrativa.
- source_word: እስክ ተረክብዎሙ
  english_pob_choice: until they overtook them
  chosen_spanish: hasta que las alcanzaron
  alternatives_spanish:
  - hasta que las sobrepasaron
  - hasta que les dieron alcance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail corrigió la idea de "drove" y dejó claro que el verbo significa alcanzar/overtake. "Las alcanzaron" expresa con precisión ese valor y encaja con la narración.
- source_word: በአሐቲ ዐይገ ማይ
  english_pob_choice: at a spring of water
  chosen_spanish: junto a un manantial de agua
  alternatives_spanish:
  - junto a una fuente de agua
  - en un manantial de agua
  - junto a un pozo de agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la revisión más reciente del audit trail, que prefirió "spring of water". "Manantial de agua" es claro en español y preserva la localización junto al punto de agua, no un movimiento hacia dentro.
theological_decisions:
- issue: Conservación del simbolismo animal apocalíptico
  english_pob_reading: Render the animals literally as animals in the main text, without decoding them into historical groups.
  chosen_spanish_reading: 'Mantener a los animales como animales: lobos y ovejas.'
  alternative_spanish_readings:
  - Interpretar los lobos como enemigos humanos concretos
  - Reemplazar la imagen por lenguaje histórico directo
  rationale: La sección pertenece a una visión apocalíptica con simbolismo sostenido. La traducción debe conservar la imagen y dejar la identificación histórica para notas o comentario, no incorporarla al texto.
  doctrine_reference: 'Contexto literario del libro: prosa visionaria/apocalíptica que debe retener su imaginería.'
translation_notes:
  revision_awareness: Tomé en cuenta la corrección del audit trail que descarta «drove them into» y entiende ተረክብዎሙ como «alcanzaron/overtook», además de la revisión posterior que prefiere «spring of water» frente a «pool of water».
  spanish_consistency_notes:
  - Usé «lobos» y «ovejas» para mantener el simbolismo animal del ciclo de visiones.
  - Preferí «comenzaron a perseguir» por su naturalidad en español y por reflejar el valor incoativo del verbo ge'ez.
  - Evité «SEÑOR» u otras sustituciones innecesarias; este versículo no contiene términos divinos directos.
  - La nota [a] conserva una alternativa legítima en español porque el segmento de agua sigue siendo algo flexible en el source trail.
