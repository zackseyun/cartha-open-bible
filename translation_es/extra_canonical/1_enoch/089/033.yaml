translation:
  language: es
  text: Y el Señor de las ovejas se enfureció enormemente contra ellas, y aquella oveja lo supo[a], y descendió desde la cima de la roca, y vino a las ovejas[c], y halló que la mayor parte de ellas tenían los ojos cegados[b] y se habían descarriado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula 'descendió desde la cima de la roca' es sintácticamente difícil. El etiópico apunta más naturalmente a 'aquella oveja', aunque algunos pueden entender el sujeto de otra manera.
    reason: alternative_reading
  - marker: b
    text: '"Cegados" también puede traducirse "oscurecidos" o "entenebrecidos", preservando la imagen de una visión impedida más que una pérdida total de la vista.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "y reconoció a aquella oveja; y esta descendió desde la cima de la roca".'
    reason: previous_rendering
lexical_decisions:
- source_word: እግዚኦሙ ለአባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - su señor
  - el amo de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción posesiva exige un término relacional fuerte. "Señor" conserva el registro elevado del texto visionario mejor que "amo", y evita rebajar la figura a un simple propietario.
- source_word: ተምዐዐ ዲቤሆሙ መዐተ ዐቢየ
  english_pob_choice: was exceedingly angry with them
  chosen_spanish: se enfureció enormemente contra ellas
  alternatives_spanish:
  - estuvo muy enojado con ellas
  - se indignó grandemente contra ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El par intensivo del ge'ez pide una expresión igualmente enfática. "Se enfureció enormemente" mantiene la intensidad sin volverse innecesariamente pesada en español.
- source_word: ዝኩ በግዕ
  english_pob_choice: that sheep
  chosen_spanish: aquella oveja
  alternatives_spanish:
  - esa oveja
  - esa cordera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo señala a una oveja ya identificada en el contexto. "Aquella" conserva distancia narrativa y evita introducir interpretaciones adicionales.
- source_word: አእመረ
  english_pob_choice: he knew it / he recognized it
  chosen_spanish: lo supo
  alternatives_spanish:
  - lo reconoció
  - lo entendió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto narrativo, el verbo expresa toma de conciencia. "Lo supo" sigue la lectura revisada del inglés POB y deja abierta la idea de percibir/entender sin forzar un objeto explícito distinto.
- source_word: ወወረደ እምነ ድማኅ ለኵኵሕ
  english_pob_choice: and came down from the summit of the rock
  chosen_spanish: descendió desde la cima de la roca
  alternatives_spanish:
  - bajó desde la cumbre de la roca
  - descendió del alto peñón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"ድማኅ" apunta a "cima/summit" y no solo a altura general. "Cima de la roca" conserva el relieve topográfico y evita importar un adjetivo no necesario.'
- source_word: ኀበ አባግዕት
  english_pob_choice: came to the sheep
  chosen_spanish: fue hacia las ovejas
  alternatives_spanish:
  - vino a las ovejas
  - se acercó a las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El movimiento direccional se expresa de forma natural en español con "fue hacia". "Ovejas" mantiene el simbolismo animal del relato sin interpretarlo alegóricamente en el texto principal.
- source_word: ዘመብዝኅቶሙ
  english_pob_choice: the greater part of them
  chosen_spanish: la mayor parte de ellas
  alternatives_spanish:
  - la mayoría de ellas
  - la parte mayor de ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"La mayor parte" reproduce con precisión la idea cuantitativa sin convertirla en una mera generalización coloquial.'
- source_word: ዘጽሉለ አዕይንቲሆሙ
  english_pob_choice: with their eyes blinded
  chosen_spanish: tenían los ojos cegados
  alternatives_spanish:
  - tenían los ojos oscurecidos
  - tenían los ojos entenebrecidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez puede sugerir oscurecimiento o cegamiento. "Cegados" conserva la fuerza de la imagen y la lectura moral/visionaria del pasaje; se mantiene la alternativa semántica en nota.
- source_word: እለ ስሕቱ
  english_pob_choice: those who had gone astray
  chosen_spanish: se habían descarriado
  alternatives_spanish:
  - habían errado
  - se habían desviado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Descarriarse" encaja bien con la imaginería de ovejas y, al mismo tiempo, conserva el sentido moral de desviación.'
theological_decisions:
- issue: Identidad del 'Señor de las ovejas'
  english_pob_reading: the Lord of the sheep
  chosen_spanish_reading: el Señor de las ovejas
  alternative_spanish_readings:
  - el amo de las ovejas
  - su señor
  rationale: En el contexto del Apocalipsis Animal, la figura funciona como soberano y juez. "Señor" preserva el registro teológico elevado sin convertirlo en un título eclesial posterior.
  doctrine_reference: §Primacía del texto original; §Registro teológico del relato visionario
- issue: Sujeto de 'descendió desde la cima de la roca'
  english_pob_reading: the subject remains the singled-out sheep
  chosen_spanish_reading: aquella oveja ... descendió desde la cima de la roca
  alternative_spanish_readings:
  - el Señor descendió
  - descendió el pastor implícito
  rationale: La sintaxis etíope favorece que la oveja señalada sea el sujeto de la acción. La traducción conserva esa tensión y no la resuelve hacia una figura distinta.
  doctrine_reference: §Preservar la tensión del original en pasajes sintácticamente difíciles
- issue: Sentido de 'blinded' en los ojos
  english_pob_reading: blinded could also be rendered darkened or dimmed
  chosen_spanish_reading: tenían los ojos cegados
  alternative_spanish_readings:
  - tenían los ojos oscurecidos
  - tenían los ojos entenebrecidos
  rationale: '"Cegados" transmite la gravedad del daño visual y la dimensión simbólica del juicio. Se deja constancia de la alternativa más suave porque el hebreo/etiópico admite una gradación de oscuridad o impedimento visual.'
  doctrine_reference: §Equilibrio entre imagen literal y fuerza moral
- issue: Relación entre ceguera y extravío
  english_pob_reading: blind in their eyes and had gone astray
  chosen_spanish_reading: tenían los ojos cegados y se habían descarriado
  alternative_spanish_readings:
  - con los ojos cegados y extraviadas
  - tenían los ojos oscurecidos y andaban errantes
  rationale: 'La frase mantiene ambos rasgos del original: incapacidad de ver y desviación moral/narrativa. El español conserva el paralelismo sin añadir interpretación doctrinal externa.'
  doctrine_reference: §No suavizar tensiones léxicas o morales del texto
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión que corrigió la lectura del sujeto: el ge''ez favorece que "aquella oveja" sea la que sabe, desciende y llega a las ovejas. También se atendió la precisión de "summit of the rock", por lo que se eligió "cima de la roca" en lugar de expresiones más vagas como "alto peñasco". La versión española sigue esa adjudicación revisada y evita desplazar el sujeto hacia el Señor.'
  spanish_consistency_notes:
  - Se mantiene "Señor" para እግዚኦሙ, coherente con el registro teológico del texto.
  - Se usa "ovejas" y no "rebaño" para conservar la imaginería animal del pasaje.
  - No se introduce "Cristo" ni terminología eclesiástica posterior, porque el texto no lo exige.
  - '"Cegados" y "descarriados" reproducen dos imágenes distintas: visión impedida y desviación moral.'
