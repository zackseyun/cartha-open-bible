    reason: alternative_reading
  - marker: b
    text: '"Cegados" también puede traducirse "oscurecidos" o "entenebrecidos", preservando la imagen de una visión impedida más que una pérdida total de la vista.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "y reconoció a aquella oveja; y esta descendió desde la cima de la roca".'
    reason: previous_rendering
  revision_rationale: Se conserva el sentido principal del borrador, pero se corrigen las notas para reflejar fielmente el rastro de auditoría inglés y se añade la alternativa documentada sobre 'reconoció a aquella oveja'. También se mejora ligeramente la naturalidad de la frase direccional con 'vino a las ovejas'.
