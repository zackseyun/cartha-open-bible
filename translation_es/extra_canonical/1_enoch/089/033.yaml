base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/033.yaml
  text: And the Lord of the sheep was exceedingly angry with them[a], and that sheep knew it, and came down from the summit of the rock, and came to the sheep[c][b], and found that the greater part of them were blind in their eyes and had gone astray.
  footnotes:
  - marker: a
    text: The clause 'it came down from the lofty rock' is syntactically difficult. The Ethiopic most naturally points back to 'that sheep,' but some may understand the subject differently.
    reason: alternative_reading
  - marker: b
    text: '''Blinded'' could also be rendered ''darkened'' or ''dimmed,'' preserving the image of impaired sight rather than total loss of vision.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and he recognized that sheep; and it came down from the lofty rock'.
    reason: previous_rendering
