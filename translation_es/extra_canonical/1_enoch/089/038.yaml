revisions:
- from: Y aquella oveja que los guiaba, la cual se había hecho hombre, fue separada de ellos y se echó[a]; y todas las ovejas lo buscaron y clamaron por él con un gran clamor[b].
  to: Y aquella oveja que los guiaba, que se había hecho hombre[a], fue separada de ellos y se echó[b]; y todas las ovejas lo buscaron y clamaron por él con un gran clamor.
  rationale: 'Se hace una reparación menor para mejorar la naturalidad del español (''que'' en lugar de ''la cual'') y para alinear las notas con la auditoría inglesa y la lógica exegética documentada: se conserva la nota sobre ''se echó'' y se añade la nota sobre la transformación simbólica en hombre, eliminando la nota innecesaria sobre ''gran clamor''.'
