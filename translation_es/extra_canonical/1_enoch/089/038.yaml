translation:
  language: es
  text: Y aquella oveja que los guiaba, que se había hecho hombre[a], fue separada de ellos y se echó[b]; y todas las ovejas lo buscaron y clamaron por él con un gran clamor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La oveja que 'se había hecho hombre' representa una transformación simbólica dentro de la visión onírica, no una salida del registro alegórico.
    reason: cultural_note
  - marker: b
    text: Aquí 'se echó' conserva la imagen literal del original; en el contexto visionario probablemente alude a la muerte de la oveja que guiaba al rebaño.
    reason: theological_note
lexical_decisions:
- source_word: ወዝኩ
  english_pob_choice: And that sheep
  chosen_spanish: Y aquella oveja
  alternatives_spanish:
  - Y esa oveja
  - Y la oveja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo etiópico ወዝኩ no corresponde a una fórmula de visión como «y vi», sino a un anafórico/demostrativo. En español, «aquella oveja» conserva esa referencia ya conocida en la visión sin introducir un sujeto nuevo ni una acción no presente en el original.
- source_word: ዘይመርሖሙ
  english_pob_choice: who was leading them
  chosen_spanish: que los guiaba
  alternatives_spanish:
  - que los conducía
  - que los llevaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de guía/pastoreo pide en español un verbo natural y solemne. «Guiaba» preserva la función continua de liderazgo sobre el rebaño y evita un calco rígido.
- source_word: ዘኮነ ብእሴ
  english_pob_choice: who had become a man
  chosen_spanish: la cual se había hecho hombre
  alternatives_spanish:
  - que se había hecho hombre
  - la que había llegado a ser hombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción indica transformación o estado alcanzado dentro de la visión. «Se había hecho hombre» mantiene la fuerza de cambio simbólico y el orden narrativo del perfecto anterior.
- source_word: ተሌለየ እምኔሆሙ
  english_pob_choice: was separated from them
  chosen_spanish: fue separada de ellos
  alternatives_spanish:
  - se apartó de ellos
  - fue apartada de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo separativo destaca la remoción del grupo sin especificar agente. En español, «fue separada de ellos» conserva esa pasividad y evita añadir una causa no expresada.
- source_word: ወሰከበ
  english_pob_choice: and lay down
  chosen_spanish: y se echó
  alternatives_spanish:
  - y yació
  - y se acostó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico es «echarse / tenderse». Como el contexto probablemente alude a la muerte en la visión, pero el texto la expresa por imagen, «se echó» preserva la literalidad imagística sin resolver la tensión apocalíptica en la traducción principal.
- source_word: ኃሠሥዎ
  english_pob_choice: sought him
  chosen_spanish: lo buscaron
  alternatives_spanish:
  - lo procuraron
  - lo anduvieron buscando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Buscaron» es la equivalencia más directa y natural en español actual. Conserva la acción de búsqueda colectiva del rebaño sin pérdida de sentido.
- source_word: ወጸርኁ ዲቤሁ
  english_pob_choice: and cried out over him
  chosen_spanish: y clamaron por él
  alternatives_spanish:
  - y gritaron sobre él
  - y lamentaron por él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición permite un matiz de clamor dirigido hacia/por alguien. «Clamaron por él» es más natural en español que «clamaron sobre él» y mantiene el lamento audible sin sobredeterminar un rito funerario específico.
- source_word: ጽራኀ ዐቢየ
  english_pob_choice: with a great cry
  chosen_spanish: con un gran clamor
  alternatives_spanish:
  - con un gran grito
  - con un fuerte clamor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gran clamor» reproduce el registro solemne y colectivo del original mejor que un simple «grito». «Clamor» también permite abarcar lamento y griterío sin decidir entre ellos.
theological_decisions:
- issue: Si la acción final debe explicitar la muerte del líder-oveja
  english_pob_reading: Retain the literal visionary wording 'lay down' in the main text
  chosen_spanish_reading: Mantener «se echó» en el texto principal
  alternative_spanish_readings:
  - «murió»
  - «se durmió»
  rationale: La visión usa lenguaje imagístico de animal-apocalipsis. Como el verbo ge'ez permite una lectura literal y el texto no nombra directamente la muerte, la traducción principal conserva la imagen y deja que el contexto sugiera la implicación.
  doctrine_reference: Preservar la tensión simbólica del texto apocalíptico sin explicitar más de lo que el original dice.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió el error de leer ወዝኩ como «Y vi». Por eso el español inicia con el demostrativo («Y aquella oveja») y preserva el orden de las relativas: primero la que guiaba, luego la que se había hecho hombre. También se evitó invertir sujeto y oración subordinada.'
  spanish_consistency_notes:
  - Se mantiene «oveja» como término simbólico del Animal Apocalypse, no como simple animal doméstico.
  - Se conserva el valor visionario y alegórico del pasaje sin deshacer la metáfora en la línea principal.
  - El uso de «gran clamor» y «clamaron» evita añadir un rito funerario explícito inexistente en el ge'ez.
