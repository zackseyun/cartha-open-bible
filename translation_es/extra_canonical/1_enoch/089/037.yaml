translation:
  language: es
  text: Y observé hasta que aquella oveja se recostó —la que había encontrado a la oveja que los guiaba—, y observé hasta que todas las ovejas, grandes y pequeñas, fueron agitadas en su lugar[a], y entraron en el pasto y se acercaron al arroyo de agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión es incierta; también puede entenderse como «a su lugar» o, menos probablemente, «en lugar de ellos». El texto principal conserva la lectura locativa.
    reason: textual_variant
lexical_decisions:
- source_word: ሰከበ
  english_pob_choice: lay down / was laid down
  chosen_spanish: se recostó
  alternatives_spanish:
  - se acostó
  - se echó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez es activa, no pasiva. En este contexto visionario, 'se recostó' conserva la acción de tenderse sin decidir en español si implica solamente reposo o una alusión eufemística a la muerte.
- source_word: በግዕ
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - carnero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El símbolo animal de 1 Enoc usa de manera estable el lenguaje de ovejas para los grupos representados. 'Oveja' es el equivalente natural y contextual en español.
- source_word: ዘተረክበ
  english_pob_choice: had met
  chosen_spanish: había encontrado
  alternatives_spanish:
  - había encontrado a
  - había topado con
  - había llegado a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El relativo identifica a la oveja por su encuentro con la que guiaba. 'Había encontrado' reproduce bien la relación narrativa y es idiomático en español.
- source_word: ዘመርሖሙ
  english_pob_choice: which led them
  chosen_spanish: que los guiaba
  alternatives_spanish:
  - que los conducía
  - que los llevaba
  - que los pastoreaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo implica conducir o dirigir. 'Guiaba' mantiene la imagen de conducción sin introducir una carga pastoral más específica de la que exige el ge'ez.
- source_word: ተኃጕሉ
  english_pob_choice: were stirred up
  chosen_spanish: se alzaron
  alternatives_spanish:
  - fueron removidas
  - se levantaron
  - se pusieron en pie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El auditorio revisó que la lectura no debe ser pasiva ni 'perdieron/ perecieron'. En contexto, el verbo expresa un levantarse o ser movidos a acción; 'se alzaron' preserva esa dinámica y es menos interpretativo que 'fueron removidas'.
- source_word: ህየንቴሆሙ
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su sitio
  - en su lugar de ellos
  - en su puesto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es difícil; el sentido locativo es el más coherente con la secuencia de movimiento. 'En su lugar' conserva la ambigüedad sin forzar una explicación sustitutiva.
- source_word: መርዔት
  english_pob_choice: pasture
  chosen_spanish: pastizal
  alternatives_spanish:
  - pastura
  - prado
  - pasto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Designa un lugar de pasto. 'Pastizal' es claro en español moderno y conserva la imagen de un espacio donde las ovejas entran para alimentarse.
- source_word: ፈለገ ማይ
  english_pob_choice: stream of water
  chosen_spanish: arroyo de agua
  alternatives_spanish:
  - corriente de agua
  - riachuelo
  - caudal de agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es literalmente un curso o corriente de agua. 'Arroyo de agua' mantiene la concreción del original sin sobredefinir el tamaño del cauce.
theological_decisions:
- issue: Cómo renderizar la acción de la oveja principal sin resolver de más su posible valor eufemístico
  english_pob_reading: Retain the more literal 'lay down' without stating 'was slain' in the main text
  chosen_spanish_reading: se recostó
  alternative_spanish_readings:
  - murió
  - fue abatida
  - fue derribada
  rationale: El ge'ez permite una lectura de simple recostarse o de muerte velada, pero no obliga a explicitar la muerte. La traducción española conserva esa tensión interpretativa en lugar de resolverla.
  doctrine_reference: Preservar la tensión teológica y simbólica del texto apocalíptico sin añadir una conclusión no exigida por el original.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección importante: se rechazó el pasivo ''was laid down'' por ser incompatible con la voz activa del ge''ez ሰከበ, y también se corrigió una lectura errónea de ተኃጕሉ. El español adopta esa revisión y evita toda solución que haga de la oveja principal un pasivo o que convierta la cláusula en una idea de ''perecer''; además, mantiene la ambigüedad de ህየንቴሆሙ con una nota mínima.'
  spanish_consistency_notes:
  - Se usa 'oveja' de forma consistente para በግዕ.
  - Se evita 'Cristo', 'Señor' y otras sustituciones no sustentadas por el texto fuente.
  - '''Espíritu/espiritual'' no interviene en este versículo; no se introduce vocabulario innecesario.'
  - La puntuación con raya larga marca la incisión explicativa del relativo, como en el audit trail inglés, pero con sintaxis natural en español.
