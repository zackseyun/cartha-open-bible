base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/037.yaml
  text: And I watched until that sheep lay down—the one that had met that sheep which led them—and I watched until all the great and small sheep were stirred up in their place[d][c][b][a], and they entered into the pasture and came near the stream of water.
  footnotes:
  - marker: a
    text: The clause 'were driven in their place' is uncertain. The underlying phrase may also be understood along the lines of 'to their place' or, less likely, 'instead of them.'
    reason: textual_variant
  - marker: b
    text: '''Was laid down'' may imply that the sheep was brought low or killed, but the Ge''ez wording does not require the translator to make that explicit here.'
    reason: lexical_alternative
  - marker: c
    text: Or 'was laid down'.
    reason: previous_rendering
  - marker: d
    text: Or 'all the sheep, great and small, were driven in their place'.
    reason: previous_rendering
