translation:
  language: es
  text: Y aquella masa de agua[a] se partió, y el agua se detuvo de este lado y de aquel lado delante de sus rostros[b]; y su señor, mientras los guiaba, estuvo entre ellos y los lobos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cauce de agua» o «corriente de agua». La expresión ge'ez señala una extensión o curso de agua delimitado, no el agua en abstracto.
    reason: lexical_alternative
  - marker: b
    text: 'Más literalmente: «delante de sus rostros»; también podría simplificarse como «delante de ellos». Se conserva la formulación concreta del original.'
    reason: lexical_alternative
  - marker: c
    text: La cláusula final probablemente significa que el agua detenida y la presencia protectora de su señor formaban una barrera entre el rebaño y los lobos.
    reason: cultural_note
lexical_decisions:
- source_word: ዐይገ ማይ
  english_pob_choice: pool of water / water-channel
  chosen_spanish: canal de agua
  alternatives_spanish:
  - cauce de agua
  - canal del agua
  - arroyo encauzado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez designa un curso delimitado de agua, no el agua en abstracto. «Canal de agua» conserva la imagen concreta y permite entender la escena como una barrera o paso de agua en una visión apocalíptica.
- source_word: ተሠጠ
  english_pob_choice: was split
  chosen_spanish: fue partido
  alternatives_spanish:
  - fue dividido
  - se abrió
  - fue hendida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo sugiere una separación violenta o una apertura. «Fue partido» mantiene esa fuerza sin añadir una paráfrasis excesiva.
- source_word: ቆመ ማይ
  english_pob_choice: the water stood
  chosen_spanish: el agua se detuvo
  alternatives_spanish:
  - el agua quedó inmóvil
  - el agua permaneció quieta
  - el agua estuvo detenida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, repetir literalmente «estuvo de pie» aplicado al agua sonaría antinatural. «Se detuvo» comunica la misma imagen de agua retenida y fija, preservando el efecto visionario.
- source_word: እምዝየ ወእምዝየ
  english_pob_choice: on this side and on that side
  chosen_spanish: de este lado y de aquel lado
  alternatives_spanish:
  - aquí y allá
  - por un lado y por el otro
  - de un lado y del otro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja distributiva señala dos lados opuestos. «De este lado y de aquel lado» es natural en español y mantiene la simetría espacial del original.
- source_word: በቅድመ ገጾሙ
  english_pob_choice: before their faces
  chosen_spanish: delante de sus rostros
  alternatives_spanish:
  - delante de ellos
  - ante sus rostros
  - frente a sus rostros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo la concreción corporal del original. «Delante de sus rostros» refleja mejor la formulación literal que una simplificación a «delante de ellos».
- source_word: እግዚኦሙ
  english_pob_choice: their lord
  chosen_spanish: su señor
  alternatives_spanish:
  - su señorío
  - su dueño
  - su soberano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto alegórico de la Visión de los Animales, el término refiere al guía o jefe de la oveja/flock, no necesariamente a una designación directa de Dios en esta cláusula. «Señor» conserva la relación de autoridad sin forzar mayúscula teológica.
- source_word: እንዘ ይመራሖሙ
  english_pob_choice: while he was leading them
  chosen_spanish: mientras los guiaba
  alternatives_spanish:
  - mientras los conducía
  - al guiarlos
  - mientras iba guiándolos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa acción simultánea y durativa. «Mientras los guiaba» es natural y mantiene el movimiento continuo de la escena.
- source_word: ማእከሎሙ ወማእከለ አዝእብት
  english_pob_choice: between them and between the wolves
  chosen_spanish: en medio de ellos y de los lobos
  alternatives_spanish:
  - entre ellos y los lobos
  - entre ellos y entre los lobos
  - en medio de ellos y en medio de los lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El sentido es separativo: la presencia del sujeto marca una barrera entre el grupo y los lobos. «En medio de ellos y de los lobos» comunica esa separación sin repetir innecesariamente la preposición.'
theological_decisions:
- issue: Referente de «su señor» en la alegoría
  english_pob_reading: their Lord, while he was leading them, stood between them and the wolves
  chosen_spanish_reading: su señor, mientras los guiaba, estuvo en medio de ellos y de los lobos
  alternative_spanish_readings:
  - el Señor, mientras los guiaba, estuvo en medio de ellos y de los lobos
  - su señor, mientras los guiaba, se puso en medio de ellos y de los lobos
  rationale: Sigo la decisión auditada de no resolver la ambigüedad alegórica convirtiendo el término en un título divino con mayúscula. El texto puede leerse como el señor o guía del rebaño dentro de la visión; mantener «su señor» preserva esa tensión.
  doctrine_reference: Preservar la tensión alegórica sin sobreinterpretar; primacía del texto fuente sobre una lectura devocional posterior.
- issue: Relación entre la barrera de agua y la protección frente a los lobos
  english_pob_reading: the water stood on this side and on that side ... and their Lord ... stood between them and the wolves
  chosen_spanish_reading: el agua se detuvo de este lado y de aquel lado ... y su señor ... estuvo en medio de ellos y de los lobos
  alternative_spanish_readings:
  - el agua quedó detenida ... y su señor ... se mantuvo entre ellos y los lobos
  - el agua se partió ... y su señor ... estuvo entre ellos y los lobos
  rationale: 'La imagen combina la partición del agua con la presencia protectora del guía. Traduzco de manera que ambas acciones queden distinguibles: la del agua como barrera y la del señor como mediación protectora.'
  doctrine_reference: Mantener la estructura simbólica del relato sin fusionar indebidamente acciones distintas.
translation_notes:
  revision_awareness: 'El auditorio en inglés corrigió una lectura sintáctica previa: el sujeto de la segunda acción es «su señor», no el agua. También consolidó la equivalencia de ዐይገ ማይ como un curso/canal de agua. La versión española refleja esa corrección, evitando convertir el segundo «estuvo» en un rasgo del agua y manteniendo separados los dos movimientos de la escena.'
  spanish_consistency_notes:
  - Se usó «Y» inicial para seguir el tono narrativo continuo de la perícopa.
  - Se evitó «SEÑOR» en mayúsculas porque el referente aquí es alegórico y no está resuelto como un título divino directo.
  - «Lobos» se conserva en plural para corresponder al original.
  - La construcción «estuvo en medio de ellos y de los lobos» mantiene la idea de separación central sin alterar el sentido auditable del texto.
