base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/024.yaml
  text: And that pool of water was split[a], and the water stood on this side and on that side before their faces; and their Lord, while he was leading them[e][d][c][b], stood between them and the wolves.
  footnotes:
  - marker: a
    text: Or 'watercourse' or 'channel of water.' The Ge'ez expression points to a bounded course of water rather than water in general.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'before their faces' is more literally 'before their faces'; the English could also be simplified to 'before them.'
    reason: lexical_alternative
  - marker: c
    text: The final clause likely means that the standing water formed a barrier separating the flock from the wolves.
    reason: cultural_note
  - marker: d
    text: Or 'and before their lord, while he was leading them; and it stood between them and between the wolves.'.
    reason: previous_rendering
  - marker: e
    text: Or 'water-channel'.
    reason: previous_rendering
