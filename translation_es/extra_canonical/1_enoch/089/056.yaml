base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/056.yaml
  text: And I saw that he abandoned that house of theirs and their tower and all their beloved ones into the hand of the lions[a], so that they might tear them apart, and into the hands of all the wild beasts[c][b], so that they might devour them.
  footnotes:
  - marker: a
    text: '''House'' and ''tower'' are left as the vision''s own imagery rather than being interpreted in the main text as temple, fold, or community.'
    reason: cultural_note
  - marker: b
    text: The phrase 'into the hand of' is an idiom for being given over to another's control or power.
    reason: lexical_alternative
  - marker: c
    text: Or 'and gave all of them into the hand of the lions, so that they might tear them apart and devour them, into the hands of all the wild beasts.'.
    reason: previous_rendering
