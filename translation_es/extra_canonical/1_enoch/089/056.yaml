translation:
  language: es
  text: Y vi que abandonó esa casa de ellos y su torre, y los entregó a todos ellos en manos de los leones[a], para que los despedazaran, y en manos de todas las bestias salvajes, para que los devoraran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «en manos de» conserva el giro idiomático de quedar entregados al poder o control de otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሐደጎ
  english_pob_choice: abandoned
  chosen_spanish: abandonó
  alternatives_spanish:
  - dejó
  - desamparó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa dejar o abandonar; en este contexto apocalíptico, «abandonó» conserva mejor el matiz de juicio que un simple «dejó».
- source_word: ቤተ
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa
  - morada
  - templo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto fuente usa el sustantivo ordinario «house». En español, «casa» es el equivalente más natural y mantiene la imaginería visionaria sin interpretarla como «templo».
- source_word: ማኅፈዶሙ
  english_pob_choice: their tower
  chosen_spanish: su torre
  alternatives_spanish:
  - su torre
  - su recinto
  - su fortaleza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma apunta a una estructura protectora concreta. «Torre» conserva la imagen arquitectónica y el tono simbólico del pasaje.
- source_word: ወወደዮሙ
  english_pob_choice: gave all of them
  chosen_spanish: a todos sus amados
  alternatives_spanish:
  - a todos ellos
  - a todos los suyos
  - entregó a todos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ajuste del audit trail inglés mostró que el objeto omitido corresponde a «all their beloved ones». En español, «a todos sus amados» refleja ese grupo humano sin añadir interpretación extra.
- source_word: ዲበ እደ
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - en poder de
  - entregado a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La locución semítica se conserva en una forma natural en español. «En manos de» mantiene el registro bíblico y la idea de quedar bajo control ajeno.
- source_word: አናብስት
  english_pob_choice: lions
  chosen_spanish: los leones
  alternatives_spanish:
  - los leones
  - leones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo designa literalmente leones; se conserva la concreción animal de la visión.
- source_word: ይምሥጥዎሙ
  english_pob_choice: tear them apart
  chosen_spanish: los despedazaran
  alternatives_spanish:
  - los rasgaran
  - los destrozaran
  - los hiciesen pedazos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En paralelo con «devoraran», el verbo transmite violencia depredadora. «Despedazar» comunica bien ese sentido en español actual.
- source_word: ይብልዕዎሙ
  english_pob_choice: devour them
  chosen_spanish: los devoraran
  alternatives_spanish:
  - los comieran
  - los consumieran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Devorar» reproduce la fuerza salvaje del verbo y mantiene el paralelo con el acto anterior.
- source_word: አራዊት
  english_pob_choice: wild beasts
  chosen_spanish: bestias salvajes
  alternatives_spanish:
  - bestias salvajes
  - animales salvajes
  - fieras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Bestias salvajes» conserva el tono amenazante del término y su contraste con las imágenes domésticas o cuidadas de la visión.
theological_decisions:
- issue: Si la visión debe interpretarse en la traducción como una realidad simbólica específica (templo, comunidad, redil) o conservar sus imágenes literales
  english_pob_reading: Retain the literal visionary image 'house' and 'tower' without decoding the symbolism in translation.
  chosen_spanish_reading: Conservar «casa» y «torre» como imágenes visionarias, sin explicitar en el texto principal su referente simbólico.
  alternative_spanish_readings:
  - «templo» y «torre/fortaleza»
  - «casa» y «recinto/redil»
  rationale: La filosofía de traducción exige preservar la imaginería apocalíptica. El posible referente simbólico puede tratarse en nota o comentario, pero no debe imponerse en la línea principal.
  doctrine_reference: 'Filosofía de traducción: preservar la imaginería apocalíptica y la primacía del texto fuente.'
- issue: Cómo reproducir la expresión semítica «into the hand of»
  english_pob_reading: Keep the idiom 'into the hand of the lions' in substance.
  chosen_spanish_reading: Mantener «en manos de» como equivalente idiomático de entrega a poder ajeno.
  alternative_spanish_readings:
  - «en poder de»
  - «entregó a»
  - «lo dejó a merced de»
  rationale: «En manos de» es una locución estable, bíblica y comprensible en español, y preserva la fuerza judicial y de sometimiento del giro original.
  doctrine_reference: 'Filosofía de traducción: conservar registro y textura teológica del original.'
translation_notes:
  revision_awareness: 'El audit trail inglés corrigió primero la sintaxis para unir cada destino con su cláusula de propósito, y luego añadió «and all their beloved ones» para recuperar el objeto de ወወደዮሙ. La versión española sigue esa última lectura y preserva la estructura con dos destinos separados: leones y bestias salvajes, cada uno con su propósito depredador.'
  spanish_consistency_notes:
  - Se mantiene «casa» y «torre» sin interpretar sus equivalentes simbólicos.
  - Se conserva la locución «en manos de» para reflejar el idiomatismo semítico.
  - «Bestias salvajes» evita suavizar el tono amenazante del original.
  - El añadido «a todos sus amados» responde al objeto recuperado en la revisión inglesa y se integra sin ampliar el sentido.
