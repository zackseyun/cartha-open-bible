translation:
  language: es
  text: Y desde allí[a] vi a los lobos, y se hicieron muy fuertes contra las ovejas con toda su fuerza, y las ovejas clamaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde él» o «desde ello»; el sufijo pronominal es ambiguo de forma aislada, y el antecedente inmediato depende del contexto más amplio de la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምኔሁ
  english_pob_choice: from it
  chosen_spanish: desde ello
  alternatives_spanish:
  - desde él
  - desde allí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo pronominal es ambiguo fuera de contexto inmediato; 'desde ello' conserva esa ambigüedad sin decidir indebidamente el antecedente.
- source_word: ርኢክዎሙ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el verbo normal de visión en el relato de visión; 'vi' es natural en español y mantiene la narración directa.
- source_word: አዝእብት
  english_pob_choice: the wolves
  chosen_spanish: los lobos
  alternatives_spanish:
  - los lobo(s)
  - las fieras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual corrige este término como 'wolves'. En español, 'lobos' preserva la identidad zoomórfica y la consistencia del pasaje.
- source_word: ጸንዑ
  english_pob_choice: grow strong
  chosen_spanish: se volvieron extremadamente fuertes
  alternatives_spanish:
  - se hicieron fuertes
  - llegaron a ser muy fuertes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa hacerse fuerte o firme; en este contexto hostil, 'se volvieron extremadamente fuertes' comunica el cambio de estado sin perder el matiz de intensificación.
- source_word: ፈድፋደ
  english_pob_choice: increase / exceedingly
  chosen_spanish: extremadamente
  alternatives_spanish:
  - en gran manera
  - sobremanera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La corrección revisada muestra que funciona adverbialmente como intensificador, no como verbo. 'Extremadamente' refleja bien la fuerza del modificador en español.
- source_word: ዲበ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto de ataque, 'contra' expresa la hostilidad de forma más clara y natural que la literalidad espacial de 'sobre'.
- source_word: አባግዕ
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen apocalíptica conserva el símbolo del pueblo como 'sheep'; 'ovejas' mantiene la metáfora concreta y consistente.
- source_word: በኵሉ ኃይሎሙ
  english_pob_choice: with all their power
  chosen_spanish: con toda su fuerza
  alternatives_spanish:
  - con todo su poder
  - con todas sus fuerzas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase intensifica la agresión. 'Con toda su fuerza' es idiomático en español y conserva la totalidad de la energía hostil.
- source_word: ጸርኁ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron la voz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo denota un clamor fuerte; 'clamaron' mantiene dignidad literaria y la urgencia del grito sin especificar su contenido.
theological_decisions:
- issue: Imagen animal apocalíptica
  english_pob_reading: Retain the concrete animal terms 'wolves' and 'sheep' rather than interpretively converting them into human groups in the main text.
  chosen_spanish_reading: Mantener 'lobos' y 'ovejas' en el texto principal, sin explicarlos alegóricamente.
  alternative_spanish_readings:
  - Interpretar como naciones y líderes atacando al pueblo
  - Usar 'rebaño' para destacar la colectividad simbólica
  rationale: El pasaje se presenta como visión simbólica; la traducción debe conservar la imaginería visible antes que convertirla en paráfrasis interpretativa.
  doctrine_reference: Preservación de la imaginería apocalíptica; interpretación secundaria.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección crítica del audit trail: አዝእብት significa ''lobos'' y ፈድፋደ funciona como intensificador adverbial (''extremadamente''), no como verbo de aumento. La redacción española evita repetir el error de ''wild beasts'' y la lectura interpretativa de ''how''.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico y sobrio, sin calcos duros innecesarios.
  - Se conserva la metáfora de animales concretos para respetar la estructura apocalíptica.
  - '''Ovejas'' se prefiere a ''rebaño'' por fidelidad simbólica y consistencia con el pasaje.'
  - La puntuación sigue el ritmo de una sola cláusula visionaria, con coma antes del cierre final.
