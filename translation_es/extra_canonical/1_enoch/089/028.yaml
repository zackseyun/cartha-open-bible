translation:
  language: es
  text: Pero las ovejas pasaron de aquella agua y salieron a un desierto donde no había agua ni hierba[a]; y comenzaron a abrir sus ojos y a ver. Y vi al Señor de las ovejas pastoreándolas y dándoles agua y hierba[b], y a aquella oveja, que iba conduciéndolas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase 'comenzaron a abrir sus ojos y a ver' conserva la imagen literal del rebaño, aunque probablemente señale también un despertar o percepción renovada dentro de la visión.
    reason: lexical_alternative
  - marker: b
    text: '''Hierba'' también puede entenderse como ''pasto'' o ''forraje''; el término ge''ez designa alimento apropiado para el rebaño.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''y aquella oveja iba y las conducía''.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወ*አባግዕሰ
  english_pob_choice: But the sheep
  chosen_spanish: Pero las ovejas
  alternatives_spanish:
  - Y las ovejas
  - Mas las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El enclítico -sa se entiende mejor como matiz adversativo o topicalizador, de modo que 'Pero' refleja la pequeña oposición discursiva del contexto. Se usa 'las ovejas' para mantener el referente colectivo del grupo visionario sin añadir distancia demostrativa no justificada.
- source_word: ኃለፉ እምዝኩ ማይ
  english_pob_choice: passed from that water
  chosen_spanish: pasaron de aquella agua
  alternatives_spanish:
  - cruzaron desde aquella agua
  - se alejaron de aquella agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pasaron de'' conserva el movimiento de salida sin especificar un cruce más fuerte de lo que el ge''ez exige. ''Aquella agua'' mantiene la deixis de la escena y evita suavizar el referente.'
- source_word: ውስተ በድው
  english_pob_choice: into a wilderness
  chosen_spanish: a un desierto
  alternatives_spanish:
  - a un desierto apartado
  - a un yermo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'desierto' comunica bien el lugar árido y deshabitado en clave bíblico-apocalíptica. Aunque 'wilderness' puede sugerir 'desierto' o 'yermo', aquí el contexto de carencia material favorece 'desierto' por claridad y naturalidad.
- source_word: ኀበ አልቦ ማየ ወሣዕረ
  english_pob_choice: where there was no water or grass
  chosen_spanish: donde no había agua ni hierba
  alternatives_spanish:
  - donde no había agua ni pasto
  - donde no había agua ni forraje
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hierba'' reproduce de manera sencilla y vívida la imagen de alimento para el rebaño. ''Ni'' conserva la negación coordinada natural en español y evita la sobreinterpretación de ''pasture'' como término técnico.'
- source_word: አኃዙ ይክሥቱ አዕይንቲሆሙ
  english_pob_choice: they began to open their eyes
  chosen_spanish: comenzaron a abrir sus ojos
  alternatives_spanish:
  - empezaron a abrir los ojos
  - comenzaron a despertar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el verbo físico de la imagen para no resolver prematuramente el sentido simbólico. 'Abrir sus ojos' mantiene la literalidad visionaria, y 'comenzaron' refleja el inicio del proceso.
- source_word: ይሬእዩ
  english_pob_choice: to see
  chosen_spanish: y a ver
  alternatives_spanish:
  - y a percibir
  - y a mirar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma infinitiva coordinada en español ('a ver') sigue la secuencia progresiva del original y del audit trail inglés, conservando la transición de apertura ocular a percepción.
- source_word: እግዚኦሙ ለአባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: al Señor de las ovejas
  alternatives_spanish:
  - al Dueño de las ovejas
  - al Señor sobre las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Señor de las ovejas'' es la fórmula tradicional de este pasaje y preserva el título visionario sin explicarlo. Se usa el artículo y la preposición esperables en español al introducir el objeto de ''vi''.'
- source_word: ይርዕዮሙ
  english_pob_choice: shepherding them
  chosen_spanish: pastoreándolas
  alternatives_spanish:
  - apacentándolas
  - guiándolas como pastor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pastorear'' expresa de forma directa la acción pastoral del verbo y evita perder la imagen de cuidado activo del rebaño. El enclítico de objeto se vierte con ''-las'' para mantener la referencia a las ovejas.'
- source_word: ይሁቦሙ ማየ ወሣዕረ
  english_pob_choice: giving them water and grass
  chosen_spanish: dándoles agua y hierba
  alternatives_spanish:
  - proveyéndoles agua y pasto
  - dándoles agua y forraje
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la estructura simple del verbo 'dar', que invierte la privación previa. 'Hierba' traduce de modo llano el alimento del rebaño sin introducir un tecnicismo innecesario.
- source_word: ዝኩ በግዕ
  english_pob_choice: that sheep
  chosen_spanish: a aquella oveja
  alternatives_spanish:
  - a esa oveja
  - a la oveja aquella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo conserva la referencia específica a un miembro destacado del relato visionario. 'Aquella oveja' suena natural en español y mantiene la deixis sin volverla explicativa.
- source_word: እንዘ የሐውር ወይመራሖሙ
  english_pob_choice: and that sheep going and leading them
  chosen_spanish: yendo y conduciéndolas
  alternatives_spanish:
  - e iba conduciéndolas
  - y caminando y guiándolas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción circunstantial del ge'ez funciona como complemento de la visión y no como cláusula independiente. En español, el gerundio enlazado por 'y' conserva el movimiento continuo sin añadir una frase explicativa como 'mientras'.
theological_decisions:
- issue: Identidad del 'Señor de las ovejas'
  english_pob_reading: Render as 'the Lord of the sheep' without interpretive expansion
  chosen_spanish_reading: '''el Señor de las ovejas'' sin expansión interpretativa'
  alternative_spanish_readings:
  - Dios como pastor de Israel
  - el dueño de las ovejas
  rationale: El pasaje pertenece al simbolismo estable de la Visión de los Animales. Traducir el título de modo literal preserva la figura apocalíptica y evita borrar la tensión entre imagen animal y referente divino.
  doctrine_reference: Preservar la imaginería apocalíptica; no aplanarla en prosa explicativa.
- issue: Significado de que las ovejas abren los ojos
  english_pob_reading: Retain the literal-visionary wording 'began to open their eyes and to see'
  chosen_spanish_reading: '''comenzaron a abrir sus ojos y a ver'''
  alternative_spanish_readings:
  - empezaron a comprender
  - comenzaron a tomar conciencia
  rationale: La expresión probablemente sugiere despertar o percepción renovada, pero el texto lo presenta mediante imagen literal. Se mantiene la tensión entre escena visionaria y sentido simbólico, en lugar de resolverla con una paráfrasis.
  doctrine_reference: Preservar la tensión teológica entre imagen literal y percepción simbólica.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente ajustó la construcción negativa a ''water or grass'' y aclaró que ''But the sheep'' refleja mejor el enclítico adversativo de ወ...ሰ. También se corrigió la última cláusula para mantener la fuerza circunstancial de ''and that sheep going and leading them'' sin convertirla en una oración independiente. La propuesta española sigue esas decisiones: conserva el contraste inicial con ''Pero'', la negación simple ''ni'' y el gerundio final para la acción continua.'
  spanish_consistency_notes:
  - Se mantiene 'Señor de las ovejas' como título técnico del pasaje, coherente con el audit trail inglés.
  - Se usa 'ovejas' de forma consistente para todo el grupo, y el singular 'aquella oveja' para el individuo destacado del final.
  - No se introduce 'Cristo', 'SEÑOR' en versales ni otro equivalente eclesiástico que altere el simbolismo original.
  - '''Hierba'' se conserva en el texto base por fidelidad y naturalidad; la nota cubre la alternativa ''pasto''.'
