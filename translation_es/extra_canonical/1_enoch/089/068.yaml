base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/068.yaml
  text: And the shepherds and their companions handed over those sheep to all the wild beasts of the field[a], so that they might devour them; and all of them, each in its time, was handed over by number—sixty from among them—while the number of the rest was written down in the book[d][c][b], how many were destroyed from among them.
  footnotes:
  - marker: a
    text: The numeral and surrounding accounting language are difficult in this witness. The Ethiopic OCR appears to read 'sixty,' but the line may preserve a corrupt or uncertain tally. The verse's main point is that the sheep were handed over under a counted and recorded reckoning.
    reason: textual_variant
  - marker: b
    text: Literally 'written in the book,' continuing the vision's theme that the destruction is not only permitted but also recorded.
    reason: cross_reference
  - marker: c
    text: '''By tale'' means by numerical reckoning or count.'
    reason: lexical_alternative
  - marker: d
    text: Or 'by tale'.
    reason: previous_rendering
