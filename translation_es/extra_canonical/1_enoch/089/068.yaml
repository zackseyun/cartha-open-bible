translation:
  language: es
  text: Y los pastores y sus compañeros entregaron a aquellas ovejas a todas las fieras del campo, para que las devoraran; y todas ellas, cada una en su tiempo, fueron entregadas por número[a] —sesenta de entre ellas—, mientras que el número del resto fue escrito en el libro[b], cuántas fueron destruidas de entre ellas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio etíope del numeral y del lenguaje contable es difícil; la cifra visible parece ser 'sesenta', pero el pasaje podría conservar una lectura corrupta o incierta. El punto principal es que las ovejas fueron entregadas dentro de un recuento y un registro.
    reason: textual_variant
  - marker: b
    text: Literalmente, 'escrito en el libro', continuando el tema de la visión de que la destrucción no solo es permitida, sino también registrada.
    reason: cross_reference
  - marker: c
    text: 'O: ''cuántas perecieron de entre ellas''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ኖላዊያን
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los guardianes
  - los cuidadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el Apocalipsis de los Animales, la imagen de los dirigentes/encargados se mantiene como 'pastores' para conservar el símbolo rector de la visión, en lugar de convertirlo en un término administrativo más plano.
- source_word: ጸማዶሙ
  english_pob_choice: their companions
  chosen_spanish: sus compañeros
  alternatives_spanish:
  - sus asociados
  - los que estaban con ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma indica personas unidas o acompañantes de los pastores; 'compañeros' es natural en español y conserva la relación sin especificar más de lo que el texto permite.
- source_word: መጠውዎሙ
  english_pob_choice: handed over
  chosen_spanish: entregaron
  alternatives_spanish:
  - dieron
  - cedieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa transferencia a poder ajeno. 'Entregaron' conserva el peso judicial/apocalíptico del acto sin suavizarlo.
- source_word: እእኩ አባግዕ
  english_pob_choice: those sheep
  chosen_spanish: aquellas ovejas
  alternatives_spanish:
  - esas ovejas
  - aquellas ovejas del rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta visión las ovejas simbolizan al pueblo. 'Aquellas ovejas' es directo, idiomático y mantiene la distancia narrativa.
- source_word: አራዊተ ገዳም
  english_pob_choice: the wild beasts of the field
  chosen_spanish: las fieras del campo
  alternatives_spanish:
  - las fieras del desierto
  - las bestias salvajes del campo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Campo'' corresponde al lugar abierto de pastoreo/caza en este contexto y sigue la revisión inglesa más reciente; ''fieras'' comunica la violencia predatoria en español mejor que una expresión demasiado técnica.'
- source_word: ከመ ይብልዕዎሙ
  english_pob_choice: so that they might devour them
  chosen_spanish: para que las devoraran
  alternatives_spanish:
  - para que las comieran
  - a fin de que las devoraran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La finalidad apunta a destrucción depredadora; 'devoraran' reproduce la fuerza imagética del verbo mejor que 'comieran'.
- source_word: በጊዜሁ
  english_pob_choice: each in its time
  chosen_spanish: cada una en su tiempo
  alternatives_spanish:
  - cada una en su momento
  - cada una en el tiempo señalado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El distributivo exige una formulación singular por elemento. 'En su tiempo' mantiene la idea de asignación temporal sin sobreinterpretarla.
- source_word: በኍልቍ
  english_pob_choice: by number
  chosen_spanish: por número
  alternatives_spanish:
  - por cuenta
  - por conteo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa recuento numérico; 'por número' es literal y claro en español, y conserva el lenguaje contable del juicio/apocalipsis.
- source_word: ይትሜጠው
  english_pob_choice: was handed over
  chosen_spanish: se les entregó
  alternatives_spanish:
  - fue entregado
  - les fue entregado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva/reflexiva continúa el motivo de la entrega a disposición de otros. 'Se les entregó' suena natural y conserva la pasividad del giro.
- source_word: ፷፻ እምኔሆሙ
  english_pob_choice: sixty from among them
  chosen_spanish: sesenta de entre ellas
  alternatives_spanish:
  - sesenta de ellas
  - sesenta entre ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el numeral visible en el testimonio y la idea de selección 'de entre ellas'. La cifra es textual y debe preservarse con cautela por la incertidumbre del testimonio.
- source_word: ለካልኡ በመጽሐፍ ይጸሐፍ
  english_pob_choice: the number of the rest was written down in the book
  chosen_spanish: el número del resto fue escrito en el libro
  alternatives_spanish:
  - el recuento del resto fue escrito en el libro
  - los demás fueron inscritos en el libro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula pasa al registro escrito del juicio. 'Número del resto' refleja con precisión el matiz contable del texto y la revisión inglesa reciente.
- source_word: ሚመጠነ ያሐጕል እምኔሆሙ
  english_pob_choice: how many were destroyed from among them
  chosen_spanish: cuántas fueron destruidas de entre ellas
  alternatives_spanish:
  - cuántas perecieron de entre ellas
  - cuántas fueron perdidas de entre ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase final pregunta por la cantidad de las destruidas. 'Destruidas' mantiene la fuerza violenta del contexto y el registro numérico del pasaje.
theological_decisions:
- issue: Identidad de los 'pastores'
  english_pob_reading: The shepherds are left as visionary shepherds rather than interpreted in the translation as human rulers or angels.
  chosen_spanish_reading: Los 'pastores' se mantienen como figura visionaria, sin identificarlos en el texto como gobernantes humanos ni como ángeles.
  alternative_spanish_readings:
  - pastores angélicos
  - gobernantes humanos
  - encargados angélicos
  rationale: La visión usa simbolismo sostenido; la traducción debe conservar la imagen principal y no resolverla en una sola interpretación histórica o doctrinal.
  doctrine_reference: Preservar la tensión apocalíptica sin cerrar la identificación simbólica.
- issue: Valor de la entrega repetida y del registro escrito
  english_pob_reading: The sheep are handed over under a counted and recorded reckoning.
  chosen_spanish_reading: Las ovejas son entregadas bajo un recuento y un registro escrito.
  alternative_spanish_readings:
  - son abandonadas al recuento
  - son consignadas por número y por escrito
  rationale: 'El pasaje combina violencia y contabilidad judicial. La traducción debe mantener ambas dimensiones: entrega, número y libro.'
  doctrine_reference: Motivo apocalíptico del juicio registrado.
translation_notes:
  revision_awareness: La versión inglesa de trabajo osciló entre 'wild beasts of the desert' y 'wild beasts of the field'; la revisión más reciente favorece 'field', y en español se ha seguido esa decisión con 'campo'. También se consolidó la repetición de 'entregó'/'se les entregó' para reflejar la continuidad del motivo de entrega en el original, y se mantuvo el elemento contable final ('por número', 'el número del resto') conforme al pasaje revisado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda; en este versículo no aparece.
  - Se conserva 'pastores' como término simbólico de la visión.
  - Se emplea 'entregó' para el verbo de transferencia y 'fieras' para intensificar el matiz depredador en español.
  - La expresión numérica se mantiene abierta y no se normaliza más allá de lo que permite el testimonio.
