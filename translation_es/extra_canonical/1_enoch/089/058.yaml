translation:
  language: es
  text: Y él permaneció quieto mientras observaba, y se alegró porque fueron devorados, tragados y arrebatados; y los abandonó en manos[a] de todas las bestias como alimento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'en manos de'. 'Mano' es un modismo semítico para poder o control; la expresión significa que fueron dejados bajo el dominio de las bestias.
    reason: lexical_alternative
lexical_decisions:
- source_word: አርመመ
  english_pob_choice: kept still
  chosen_spanish: se quedó quieto
  alternatives_spanish:
  - permaneció callado
  - se mantuvo en silencio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa quietud o silencio. 'Se quedó quieto' conserva la idea de permanecer inmóvil o en reposo sin forzar una sola matización de habla.
- source_word: እንዘ ይሬኢ
  english_pob_choice: as he watched
  chosen_spanish: mientras observaba
  alternatives_spanish:
  - mientras veía
  - así como miraba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción indica simultaneidad. 'Mientras observaba' suena natural en español y mantiene el carácter visionario de la escena.
- source_word: ተፈሥሐ
  english_pob_choice: he rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se llenó de gozo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo denota alegría o gozo. 'Se alegró' es fiel y claro; 'se regocijó' sería más elevado, pero menos natural para algunos lectores.
- source_word: ተበልዑ
  english_pob_choice: were devoured
  chosen_spanish: fueron devorados
  alternatives_spanish:
  - fueron comidos
  - fueron consumidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Devorados'' conserva la imagen predatoria violenta que el contexto animal-apocalíptico exige.'
- source_word: ተውሕጡ
  english_pob_choice: swallowed up
  chosen_spanish: tragados
  alternatives_spanish:
  - engullidos
  - tragados por completo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para el valor intensivo del verbo, 'tragados' mantiene la secuencia de juicio sin sonar excesivamente explicativo. Se conserva junto a 'devorados' para reflejar la acumulación verbal del original.
- source_word: ተሀይዱ
  english_pob_choice: carried off
  chosen_spanish: llevados
  alternatives_spanish:
  - arrebatados
  - arrastrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo final expresa ser llevados o retirados por la fuerza. 'Llevados' es sobrio y permite que el lector perciba la culminación de la imagen sin añadir intensidad no exigida por el texto.
- source_word: ኃደጎሙ
  english_pob_choice: he abandoned them
  chosen_spanish: los abandonó
  alternatives_spanish:
  - los dejó
  - los entregó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Abandonó'' reproduce bien la idea de dejarlos expuestos al juicio. ''Entregó'' podría sonar más teológico de lo que el ge''ez exige.'
- source_word: ውስተ እዴ
  english_pob_choice: into the hand
  chosen_spanish: en manos
  alternatives_spanish:
  - en la mano
  - en poder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la metáfora semítica de 'mano' como poder o control; en español, 'en manos de' es idiomático y transparente.
- source_word: ኵሎሙ አራዊት
  english_pob_choice: all the beasts
  chosen_spanish: todas las bestias
  alternatives_spanish:
  - todas las fieras
  - todos los animales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Bestias'' mantiene el registro simbólico del pasaje, donde los animales representan poderes agresores.'
- source_word: ለመብልዕ
  english_pob_choice: for food
  chosen_spanish: para alimento
  alternatives_spanish:
  - como alimento
  - para comer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Para alimento'' conserva la finalidad del giro ge''ez y suena más digno que ''para comer''.'
theological_decisions:
- issue: Si el acto final debe sonar como simple abandono o como entrega judicial
  english_pob_reading: he abandoned them into the hand of all the beasts
  chosen_spanish_reading: los abandonó en manos de todas las bestias
  alternative_spanish_readings:
  - los dejó en poder de todas las bestias
  - los entregó a todas las bestias
  rationale: El ge'ez permite un acto fuerte de dejarlos expuestos al juicio. 'Abandonó' conserva la severidad sin imponer una fórmula doctrinal posterior; 'en manos de' mantiene el idiomatismo semítico con transparencia.
  doctrine_reference: Preservar la tensión teológica del texto y priorizar el lenguaje de fuente sobre armonizaciones posteriores.
- issue: Cómo reflejar la triple secuencia de violencia sobre los sujetos
  english_pob_reading: devoured and swallowed up and carried off
  chosen_spanish_reading: devorados y tragados y llevados
  alternative_spanish_readings:
  - devorados y tragados y arrebatados
  - devorados y tragados y llevados fuera
  rationale: Se conserva la acumulación verbal sin reducirla a una sola idea. 'Tragados' y 'llevados' mantienen la progresión y el valor imagético, aunque en español la tercera forma resulta menos marcada que en inglés.
  doctrine_reference: Mantener la progresión de juicio y destrucción sin suavizarla ni resolver la tensión léxica.
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó 'destroyed' por 'carried off' para reflejar mejor el último verbo ge'ez como ser llevado o arrebatado por la fuerza. La traducción española sigue esa revisión con 'llevados', manteniendo además la tríada verbal completa y la imagen animal de juicio.
  spanish_consistency_notes:
  - Se mantiene 'bestias' para conservar el registro alegórico del pasaje.
  - '''En manos de'' preserva la metáfora semítica sin ocultarla con una paráfrasis doctrinal.'
  - Se evita 'Cristo', 'SEÑOR' o fórmulas eclesiales ajenas al texto de fuente.
  - La secuencia verbal española intenta reflejar la acumulación del original sin forzar un sinónimo único.
