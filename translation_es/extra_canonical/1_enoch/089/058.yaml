  yaml_path: translation/extra_canonical/1_enoch/089/058.yaml
  text: And he kept still as he watched[a], and he rejoiced because they were devoured and swallowed up and carried off[c][b]; and he abandoned them into the hand of all the beasts for food.
  footnotes:
  - marker: a
    text: '''Into the hand'' is a literal idiom for being delivered into the power or control of another.'
    reason: lexical_alternative
  - marker: b
    text: The three verbs 'devoured,' 'swallowed up,' and 'destroyed' are retained as a cumulative sequence rather than reduced to a single English verb, to preserve the verse's escalating judgment imagery.
    reason: cultural_note
  - marker: c
    text: Or 'And that one kept still while he watched, and he rejoiced because they were devoured and swallowed up and destroyed'.
