    reason: lexical_alternative
  - marker: b
    text: Varios nombres de animales en este verso son inciertos en su identificación exacta; entre las alternativas posibles están chacales para «hienas» o «zorros», gavilanes para «halcones» y cornejas para «cuervos».
    reason: lexical_alternative
  - marker: c
    text: Una traducción anterior entendía este término como «ardillas».
    reason: previous_rendering
  revision_rationale: 'La revisión es menor y no doctrinal: mejora la naturalidad del español («pueblos»), ajusta una especie a la forma citativa más natural («zorros») y restaura plenamente el aparato de notas del audit trail inglés al conservar la antigua alternativa para ገሐያት, mientras mantiene «liebres» como la lectura correcta tras la adjudicación crítica.'
