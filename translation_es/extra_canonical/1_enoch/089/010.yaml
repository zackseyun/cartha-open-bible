  to: 'Y comenzaron a dar a luz las bestias del campo y las aves[a]; y de entre ellas salieron toda clase de pueblos: leones, leopardos, lobos, perros, hienas, jabalíes, zorros, liebres[c], cerdos, halcones, buitres, milanos, águilas y cuervos[b]; y en medio de ellos nació un toro blanco.'
