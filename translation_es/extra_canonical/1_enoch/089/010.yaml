translation:
  language: es
  text: 'Y comenzaron a dar a luz las bestias del campo y las aves[a]; y de entre ellas salieron toda clase de pueblos: leones, leopardos, lobos, perros, hienas, jabalíes, zorros, liebres[c], cerdos, halcones, buitres, milanos, águilas y cuervos[b]; y en medio de ellos nació un toro blanco.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase del geʽez traducida «toda clase de pueblos» es difícil. También puede entenderse más generalmente como «todo tipo» o «toda clase», pero el término para «naciones/pueblos» está presente en el testimonio geʽez.
    reason: lexical_alternative
  - marker: b
    text: Varios nombres de animales en este verso son inciertos en su identificación exacta; entre las alternativas posibles están chacales para «hienas» o «zorros», gavilanes para «halcones» y cornejas para «cuervos».
    reason: lexical_alternative
  - marker: c
    text: Una traducción anterior entendía este término como «ardillas».
    reason: previous_rendering
lexical_decisions:
- source_word: አሐዙ ይለዱ
  english_pob_choice: they began to bring forth
  chosen_spanish: comenzaron a dar a luz
  alternatives_spanish:
  - comenzaron a traer forth
  - comenzaron a producir
  - comenzaron a engendrar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase compuesta expresa inicio de la acción + generación. «Comenzaron a dar a luz» preserva el comienzo narrativo y el sentido de engendrar sin volverlo demasiado biológico para una visión simbólica.
- source_word: አራዊተ ገዳም
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - las fieras del campo
  - las bestias del desierto
  - los animales salvajes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Bestias del campo» mantiene el tono bíblico elevado del pasaje y sigue de cerca la construcción del texto fuente.
- source_word: አዕዋፈ
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - las aves del cielo
  - las criaturas voladoras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término simple basta aquí; «aves» es natural en español y no añade información no atestiguada.
- source_word: እምኔሆሙ
  english_pob_choice: from among them there came forth
  chosen_spanish: de entre ellas salieron
  alternatives_spanish:
  - de entre ellos salió
  - de ellas surgieron
  - de entre ellos vinieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «De entre ellas salieron» conserva la idea de emergencia desde el grupo anterior y el tono visionario.
- source_word: ዘእምኵሉ ኅብር አሕዛብ
  english_pob_choice: every kindred of the nations
  chosen_spanish: toda clase de las naciones
  alternatives_spanish:
  - toda clase de los pueblos
  - toda especie de las naciones
  - todo tipo de pueblos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es difícil y parece clasificar simbólicamente a los animales con referencia a «naciones/pueblos». «Toda clase de las naciones» retiene esa dimensión colectiva sin forzar una precisión técnica que el geʽez no aclara del todo.
- source_word: አናብስት
  english_pob_choice: lions
  chosen_spanish: leones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término zoológico directo.
- source_word: አናምርት
  english_pob_choice: leopards
  chosen_spanish: leopardos
  alternatives_spanish:
  - panteras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Leopardos» es la equivalencia estándar y clara en español.
- source_word: አዝእብት
  english_pob_choice: wolves
  chosen_spanish: lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término zoológico directo.
- source_word: አካልብት
  english_pob_choice: dogs
  chosen_spanish: perros
  alternatives_spanish:
  - canes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Perros» es natural y directo en español; «canes» resultaría más marcado y menos transparente.
- source_word: አጽባዕት
  english_pob_choice: hyenas
  chosen_spanish: hienas
  alternatives_spanish:
  - chacales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La identificación exacta puede debatirse, pero «hienas» sigue siendo una solución plausible y tradicional para el término del pasaje.
- source_word: ሐራዊ ገዳም
  english_pob_choice: wild boars
  chosen_spanish: jabalíes
  alternatives_spanish:
  - cerdos salvajes
  - puercos salvajes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El compuesto apunta a un cerdo salvaje; «jabalíes» es idiomático y preciso en español.
- source_word: ቂናጽል
  english_pob_choice: foxes
  chosen_spanish: zorras
  alternatives_spanish:
  - chacales
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: La identificación exacta es incierta; «zorras» mantiene una lectura canina/carnívora posible y es una opción natural en español.
- source_word: ገሐያት
  english_pob_choice: hares
  chosen_spanish: liebres
  alternatives_spanish:
  - conejos
  lexicon: Leslau, Comparative Dictionary of Ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión crítica favorece «liebres» para este término geʽez, no «ardillas». «Liebres» es la solución más asentada en traducciones críticas modernas.
- source_word: ሐንዘር
  english_pob_choice: swine
  chosen_spanish: cerdos
  alternatives_spanish:
  - puercos
  - cochinos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cerdos» es transparente para lectores actuales; mantiene el registro sin pérdida sustancial de sentido.
- source_word: ሲሲት
  english_pob_choice: falcons
  chosen_spanish: halcones
  alternatives_spanish:
  - gavilanes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se trata de un ave rapaz; «halcones» es una equivalencia natural y comprensible.
- source_word: አንሰርት
  english_pob_choice: vultures
  chosen_spanish: buitres
  alternatives_spanish:
  - águilas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede abarcar grandes aves rapaces/carroñeras; «buitres» encaja con la secuencia de aves rapaces del listado.
- source_word: ሆባይ
  english_pob_choice: kites
  chosen_spanish: milanos
  alternatives_spanish:
  - buitres
  - gavilanes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es otro rapáz de identificación incierta; «milanos» comunica bien la categoría de ave de presa sin precisar en exceso.
- source_word: ፍቃንስ
  english_pob_choice: eagles
  chosen_spanish: águilas
  alternatives_spanish:
  - halcones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Águilas» es el equivalente más natural y elevado para el gran ave rapaz del listado.
- source_word: ቋዓት
  english_pob_choice: ravens
  chosen_spanish: cuervos
  alternatives_spanish:
  - cornejas
  - cuervos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede ser más amplio que una especie exacta; «cuervos» mantiene el registro solemne y ominoso de la visión.
- source_word: ተወልዱ ማእከሎሙ ላህም ጸዓዳ
  english_pob_choice: and in their midst a white bull was born
  chosen_spanish: y en medio de ellos nació un toro blanco
  alternatives_spanish:
  - y en medio de ellos nació un buey blanco
  - y nació en medio de ellos un toro blanco
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen central es el nacimiento singular del animal blanco. «Toro» mantiene la fuerza simbólica y la distinción de sexo/fortaleza mejor que «buey».
theological_decisions:
- issue: Sentido simbólico del listado de animales como representación de pueblos/naciones
  english_pob_reading: 'Render the collective phrase with explicit national language: ''every kindred of the nations'''
  chosen_spanish_reading: toda clase de las naciones
  alternative_spanish_readings:
  - todo tipo de pueblos
  - toda clase de los pueblos
  - toda especie de las naciones
  rationale: El pasaje pertenece al marco alegórico del Apocalipsis Animal; no es solo una lista zoológica. La traducción conserva la dimensión colectiva y política de «naciones/pueblos» sin desactivar el simbolismo.
  doctrine_reference: Primacía del testimonio original y preservación de la tensión interpretativa.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión crítica que corrige ገሐያት a «liebres»; por eso el texto español usa «liebres» y no una identificación distinta. También se evitó la duplicación accidental del listado y se mantuvo la lectura formal y natural del verso completo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda a tetragrámaton; este versículo no lo contiene.
  - Se usa «toro» para el animal final, coherente con la imaginería simbólica del pasaje.
  - Se evita latinizar innecesariamente nombres de animales cuando el español común es más claro.
  - La nota [a] va anclada a «aves» y la nota [b] a «cuervos» para reflejar las dos zonas de mayor incertidumbre léxica.
