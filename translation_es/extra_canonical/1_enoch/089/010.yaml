  yaml_path: translation/extra_canonical/1_enoch/089/010.yaml
  text: 'And they began to bring forth the beasts of the field and the birds[a]; and from among them there came forth every kind of the nations: lions, leopards, wolves, dogs, hyenas, wild boars, foxes, swine, falcons, vultures, kites, eagles, and ravens[c][b]; and in their midst a white bull was born.'
  footnotes:
