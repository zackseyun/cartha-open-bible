    reason: lexical_alternative
  - marker: b
    text: Several animal names in this verse are uncertain in exact species identification; alternatives include jackals for 'hyenas' or 'foxes,' hawks for 'falcons,' and crows for 'ravens.'
    reason: lexical_alternative
  - marker: c
