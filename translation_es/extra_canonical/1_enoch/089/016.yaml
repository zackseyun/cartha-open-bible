revisions:
- from: Y un cordero que había sido rescatado de los lobos huyó y pasó entre los asnos salvajes del desierto[a], y vi a los corderos mientras se lamentaban, clamaban y suplicaban a su Señor con todas sus fuerzas, hasta que aquel Señor de los corderos descendió desde su elevada morada[b], y llegó a ellos y los vio.
  to: Y una oveja que había sido rescatada de los lobos huyó y pasó al lugar de los asnos salvajes del desierto[a], y vi a las ovejas mientras se lamentaban, clamaban y suplicaban a su Señor con todas sus fuerzas, hasta que aquel Señor de las ovejas descendió a la voz de las ovejas desde su elevada morada[b], y llegó a ellas y las vio.
  rationale: Se corrige la omisión de 'a la voz de las ovejas', se alinea mejor el movimiento con la revisión inglesa final ('into'), y se sustituye 'cordero/corderos' por 'oveja/ovejas' para una alegoría más natural y consistente en español.
