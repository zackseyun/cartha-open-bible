translation:
  language: es
  text: Y una oveja que había sido rescatada de los lobos huyó y pasó al lugar de los asnos salvajes del desierto[a], y vi a las ovejas mientras se lamentaban, clamaban y suplicaban a su Señor con todas sus fuerzas, hasta que aquel Señor de las ovejas descendió a la voz de las ovejas desde su elevada morada[b], y llegó a ellas y las vio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase ge'ez es difícil. Probablemente se refiere a que la oveja pasó al ámbito o al grupo de los asnos salvajes dentro de la visión, no solo a un detalle geográfico sencillo.
    reason: textual_variant
  - marker: b
    text: La expresión ge'ez aquí se entiende como 'desde su elevada morada' o 'morada alta'. La cláusula también conserva la idea de que descendió en respuesta a la voz de las ovejas.
    reason: textual_variant
lexical_decisions:
- source_word: በግዕ
  english_pob_choice: a sheep
  chosen_spanish: un cordero
  alternatives_spanish:
  - una oveja
  - el cordero
  - la oveja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El Ge'ez usa singular, y en la alegoría del Animal Apocalypse este individuo singular funciona como figura representativa; en español, 'cordero' conserva mejor el registro visionario y simbólico que 'oveja' en esta escena puntual, sin convertirlo en colectivo.
- source_word: ዘድኅነ
  english_pob_choice: that had been rescued
  chosen_spanish: que había sido rescatado
  alternatives_spanish:
  - que había sido salvado
  - que escapó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Rescatado'' expresa una liberación concreta de peligro, en línea con el matiz de cumplimiento previo del relativo perfecto.'
- source_word: እምነ አዝእብት
  english_pob_choice: from the wolves
  chosen_spanish: de los lobos
  alternatives_spanish:
  - desde los lobos
  - fuera de los lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La separación desde depredadores hostiles se expresa de forma natural en español con 'de los lobos'.
- source_word: ነፈፀ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - se precipitó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Huyó'' conserva la urgencia del movimiento repentino sin añadir detalles no garantizados por el texto.'
- source_word: ኀለፈ ውስተ አእዱገ ገዳም
  english_pob_choice: passed into the wild asses of the wilderness
  chosen_spanish: pasó entre los asnos salvajes del desierto
  alternatives_spanish:
  - pasó entre los asnos salvajes del yermo
  - atravesó hacia los asnos salvajes del desierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es difícil y el inglés POB la trató como un grupo animal dentro de la visión. 'Pasó entre' mantiene la relación espacial/visionaria y evita resolver en exceso el problema sintáctico; 'desierto' traduce el valor de contexto de 'wilderness' en español bíblico moderno.
- source_word: የአወይዉ
  english_pob_choice: lamented
  chosen_spanish: se lamentaban
  alternatives_spanish:
  - gemían
  - hacían duelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lamentarse'' reproduce el tono elevado y doliente sin volverlo demasiado moderno o demasiado interpretativo.'
- source_word: ይጸርኁ
  english_pob_choice: cried out
  chosen_spanish: clamaban
  alternatives_spanish:
  - gritaban
  - alzaban la voz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Clamaban'' es más solemne y apocalíptico que ''gritaban'', y conserva la intensidad de la apelación.'
- source_word: ይስእልዎ ለእግዚኦሙ
  english_pob_choice: petitioned their Lord
  chosen_spanish: suplicaban a su Señor
  alternatives_spanish:
  - pedían a su Señor
  - rogaban a su Señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Suplicaban'' conserva el carácter urgente de la petición. Se mantiene ''Señor'' porque el título es el de soberanía divina en la visión.'
- source_word: በኵሉ ኃይሎሙ
  english_pob_choice: with all their strength
  chosen_spanish: con todas sus fuerzas
  alternatives_spanish:
  - con toda su fuerza
  - con todo su poder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la forma idiomática natural en español para intensificar la súplica colectiva.
- source_word: እግዚአ አባግዕ
  english_pob_choice: that Lord of the sheep
  chosen_spanish: aquel Señor de los corderos
  alternatives_spanish:
  - el Señor de las ovejas
  - el Señor del rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título técnico de la alegoría. En español, 'Señor de los corderos' mantiene mejor la continuidad simbólica con el primer 'cordero' singular y con la imaginería del capítulo.
- source_word: ወረደ
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino abajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Descendió'' preserva el movimiento vertical con solemnidad adecuada al acto divino.'
- source_word: ኀበ ቃሎሙ ለአባግዕ እም ጽርኁ ልዑል
  english_pob_choice: at the voice of the sheep from his lofty dwelling
  chosen_spanish: desde su elevada morada
  alternatives_spanish:
  - desde su alta morada
  - desde su morada elevada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión del inglés corrige un error: ጽርሕ significa ''morada/cámara/sala'' con posesivo de tercera persona singular. En español, ''elevada morada'' comunica el espacio celeste sin perder la referencia a la altura; se evita una construcción que dependa de ''voz'' por ser un malentendido textual ya revisado.'
- source_word: ወበጽኀ ኀቤሆሙ
  english_pob_choice: and he came to them
  chosen_spanish: y llegó a ellos
  alternatives_spanish:
  - y vino a ellos
  - y se acercó a ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Llegó a ellos'' es claro y conserva la secuencia de movimiento tras el descenso.'
- source_word: ወርእዮሙ
  english_pob_choice: and saw them
  chosen_spanish: y los vio
  alternatives_spanish:
  - y los contempló
  - y los miró
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico 'ver' debe permanecer simple; el contexto aporta la carga de atención divina sin necesidad de ampliarla.
theological_decisions:
- issue: Tratamiento del título divino simbólico en la alegoría
  english_pob_reading: Lord of the sheep
  chosen_spanish_reading: Señor de los corderos
  alternative_spanish_readings:
  - Señor de las ovejas
  - Señor del rebaño
  rationale: La alegoría mantiene un sistema simbólico coherente; en español, el título debe seguir sonando como designación teológica fija dentro de la visión. 'Corderos' conserva la correspondencia con el singular inicial y evita neutralizar la imagen en una expresión más abstracta.
  doctrine_reference: Preservar el sistema simbólico y la tensión alegórica sin domesticarla.
- issue: Revisión del segmento difícil sobre el lugar de origen de la bajada divina
  english_pob_reading: from his lofty dwelling
  chosen_spanish_reading: desde su elevada morada
  alternative_spanish_readings:
  - desde su alta morada
  - desde su morada elevada
  rationale: La evidencia revisada descarta leer 'voz' aquí y favorece un sustantivo de habitación/palacio. 'Morada' es suficientemente amplio para no fijar indebidamente la escena, mientras 'elevada' retiene la altura celestial.
  doctrine_reference: No forzar una interpretación textual ya corregida; mantener la lectura revisada del testimonio ge'ez.
translation_notes:
  revision_awareness: 'Se siguió la revisión crítica más reciente: se mantuvo el singular en el primer sujeto (''un cordero''), se corrigió el tramo difícil como una referencia a la ''elevada morada'' y no a la voz, y se evitó la colectivización indebida del primer movimiento. También se respetó la función simbólica del ''Señor de los corderos'' dentro de la alegoría.'
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para el título divino de la alegoría, en continuidad con la función teológica del texto.
  - Se usó 'cordero' para el sujeto singular inicial y 'corderos' después, para reflejar la alternancia numérica del ge'ez.
  - Se evitó 'SEÑOR' como convención tipográfica de sustitución del nombre divino; el texto es una traducción directa de una obra visionaria, no una sustitución litúrgica.
  - Se prefirió 'morada' para ጽርሕ por ser un término más fiel y menos interpretativamente cargado que 'palacio' o 'sala' en este contexto.
