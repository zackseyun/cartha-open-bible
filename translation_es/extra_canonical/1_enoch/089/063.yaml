base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/063.yaml
  text: And read out before me by number how many they destroy[a], and how many they hand over to destruction, so that this may be a testimony for me against them, that I may know all the deeds of the shepherds, and assess them, and see what they do—whether they abide by my command that I commanded them[c][b], or not.
  footnotes:
  - marker: a
    text: The Ethiopic is difficult in the opening clause. The repeated counting language likely refers to a numerical reckoning of the shepherds and of those they destroyed.
    reason: textual_variant
  - marker: b
    text: Or 'that this record might stand against them.' The phrase rendered 'upon them' may carry an accusatory force in context.
    reason: lexical_alternative
  - marker: c
    text: Or 'And I read out before him the tally of those shepherds, and how many they had destroyed for the shepherds, so that this testimony might be upon them, that I might know all the deeds of the shepherds, and count them, and see what they do—whether they abide by my command that I commanded them, or not.'.
