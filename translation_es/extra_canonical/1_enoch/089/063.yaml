translation:
  language: es
  text: Y lee delante de mí por número cuántos destruyen[a], y cuántos entregan a destrucción, para que esto sea un testimonio para mí contra ellos[b], a fin de que yo conozca todas las obras de los pastores, y los cuente, y vea lo que hacen, si permanecen en mi mandato, el que les mandé, o no.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El etíope es difícil en la cláusula inicial; la expresión probablemente conserva un doble movimiento de conteo sobre cuántos destruyen y cuántos son entregados a destrucción.
    reason: textual_variant
  - marker: b
    text: También puede entenderse «para que este testimonio esté sobre ellos», con matiz acusatorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: አንበብ
  english_pob_choice: I read out
  chosen_spanish: lee delante de mí
  alternatives_spanish:
  - leo en voz alta delante de mí
  - lee
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo apunta a lectura/recitación en voz alta. En español, «lee delante de mí» conserva el acto público y la escena judicial; en esta corrección del texto, el hablante divino se dirige al escriba y por eso el imperativo encaja mejor que una narración en primera persona.
- source_word: ቅድሜየ
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La forma pronominal exige primera persona singular: «de mí». «Delante de mí» comunica presencia directa de manera natural en español y mantiene el marco de audiencia/juicio.'
- source_word: ወበኍልቈ
  english_pob_choice: by number / the tally of
  chosen_spanish: por número cuántos
  alternatives_spanish:
  - según el número de
  - cuál es el número de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión tiene fuerza de conteo, no de simple reporte. «Por número cuántos» conserva la duplicación cuantitativa que el etíope sugiere sin suavizarla en exceso.
- source_word: የኃጕሉ
  english_pob_choice: they destroy
  chosen_spanish: destruyen
  alternatives_spanish:
  - matan
  - hacen perecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el Apocalipsis de los Animales, el verbo mantiene una violencia amplia. «Destruyen» preserva el sentido general sin especificar más de lo que el texto exige.
- source_word: ይሚጥዉ፡ ለኃጕል
  english_pob_choice: they hand over to destruction
  chosen_spanish: entregan a destrucción
  alternatives_spanish:
  - entregan para destrucción
  - los entregan a la destrucción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase añade una segunda acción distinta del primer verbo. «Entregan a destrucción» mantiene el paralelismo y la violencia judicial del giro etíope.
- source_word: ስምዐ
  english_pob_choice: testimony
  chosen_spanish: un testimonio
  alternatives_spanish:
  - un registro
  - una prueba
  - un testimonio judicial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es evidencial y acusatorio. «Testimonio» conserva esa función legal sin convertirlo en mera nota informativa.
- source_word: ዲቤሆሙ
  english_pob_choice: upon them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - en su contra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque literalmente es «sobre ellos», en contexto el testimonio funciona como acusación. «Contra ellos» comunica la fuerza forense en español, como el POB inglés lo explica con su alternativa.
- source_word: አእምር
  english_pob_choice: I might know
  chosen_spanish: yo conozca
  alternatives_spanish:
  - yo pueda conocer
  - yo llegue a saber
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Es una finalidad: «a fin de que yo conozca». En español suena más natural que un «pueda saber» y mantiene el propósito judicial de la cláusula.'
- source_word: ኖላዊያን
  english_pob_choice: shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los cuidadores
  - los conductores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un grupo simbólico fijo en la visión. «Pastores» conserva la imagen animal-apocalíptica y la consistencia terminológica.
- source_word: እመጥኖሙ
  english_pob_choice: count them / assess them
  chosen_spanish: los examine
  alternatives_spanish:
  - los cuente
  - los evalúe
  - los valore
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo mezcla conteo y tasación. «Examine» en español permite el sentido de inspección judicial que el inglés POB resolvió con «assess them», sin perder el carácter de revisión.
- source_word: ግብሮሙ
  english_pob_choice: deeds
  chosen_spanish: las obras
  alternatives_spanish:
  - las acciones
  - los hechos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obras» es un equivalente natural en español para el conjunto de actos evaluados moralmente; conserva el tono bíblico sin ser arcaizante.
- source_word: በትእዛዝየ ዘአዘዝክዎሙ
  english_pob_choice: by my command that I commanded them
  chosen_spanish: en mi mandamiento que les mandé
  alternatives_spanish:
  - según mi mandamiento que les di
  - conforme a mi mandamiento que les ordené
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La duplicación verbal es deliberada y no debe borrarse. «Mandamiento» y «mandé» mantienen el eco repetitivo del original y la medida de obediencia requerida.
theological_decisions:
- issue: Voz del hablante y dirección de la lectura
  english_pob_reading: The verse is a formal audit addressed to the seer, with the Lord speaking in first person and commanding the reading before him.
  chosen_spanish_reading: 'El texto se traduce como una orden directa del hablante divino: «lee delante de mí», no como narración en primera persona.'
  alternative_spanish_readings:
  - Y leí delante de él
  - Y leí delante de mí
  rationale: La forma pronominal de ቅድሜየ obliga a «de mí». La revisión auditada corrige la lectura anterior, que invertía el destinatario; la escena es judicial y de rendición de cuentas.
  doctrine_reference: Mantener la deixis correcta del texto fuente y la función de juicio/apocalipsis.
- issue: Función forense del testimonio
  english_pob_reading: The record stands as a testimony against the shepherds, not merely an informational report.
  chosen_spanish_reading: «Un testimonio contra ellos» conserva la fuerza acusatoria del registro.
  alternative_spanish_readings:
  - un registro sobre ellos
  - un testimonio para ellos
  rationale: El conjunto de conteo, testimonio y examen forma un marco legal. En español, «contra ellos» expresa mejor la orientación adversarial que el simple «sobre ellos».
  doctrine_reference: Preservar la imaginería judicial del juicio divino en el Apocalipsis de los Animales.
translation_notes:
  revision_awareness: 'El borrador anterior fue corregido por confundir la persona gramatical y la dirección de la escena: ቅድሜየ exige «delante de mí», y la cláusula inicial funciona como mandato, no como narración. Esta versión sigue la revisión auditada que recupera el sentido forense y el paralelismo cuantitativo del texto etíope.'
  spanish_consistency_notes:
  - Se mantiene «pastores» para el grupo simbólico fijo del Apocalipsis de los Animales.
  - Se conserva «destruyen» / «entregan a destrucción» para distinguir las dos acciones del texto.
  - «Mandamiento» y «mandé» reproducen la repetición enfática del original.
  - El registro judicial se expresa con «testimonio» y «contra ellos» para no diluir la acusación.
  - La puntuación busca reflejar la secuencia acumulativa de conteo, examen y obediencia.
