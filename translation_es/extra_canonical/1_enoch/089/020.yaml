    rationale: El inglés documenta que, tras 'las ovejas guardaron silencio', la secuencia etiópica parece decir literalmente algo como 'y desde entonces gritaron', con posible perturbación textual o verbo resumptivo. La nota española actual habla de 'la nota crítica del inglés' y no expone directamente el problema textual al lector.
