translation:
  language: es
  text: Y el Señor de las ovejas vino a ellas[a], y mientras pisoteaban[b] a aquellos lobos, y los lobos gritaban, las ovejas guardaron silencio[c], y desde aquel momento no gritaron más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El cierre del versículo es difícil en la secuencia etiópica: después de «las ovejas guardaron silencio», el texto parece decir literalmente algo como «y desde entonces gritaron». El sujeto del verbo final puede ser resumptivo o reflejar una perturbación textual.'
    reason: textual_variant
  - marker: b
    text: 'O: «mientras golpeaban a aquellos lobos». La sintaxis ge''ez auditada entiende «aquellos lobos» como objeto directo del ataque.'
    reason: previous_rendering
  - marker: c
    text: 'O: «enmudecieron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚኦሙ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - su Señor
  - el dueño de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el marco simbólico de la Apocalipsis de los Animales, la relación posesiva expresa señorío sobre las ovejas. «Señor de las ovejas» conserva la imagen y evita una paráfrasis más abstracta.
- source_word: መጽአ ኀቤሆሙ
  english_pob_choice: came to them
  chosen_spanish: vino a ellos
  alternatives_spanish:
  - se acercó a ellos
  - llegó hasta ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción indica movimiento con destino. «Vino a ellos» es natural en español y conserva la sencillez del original.
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  - borregas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la imagen repetida del texto visionario. «Ovejas» preserva el valor simbólico mejor que «rebaño».
- source_word: ይዝብጥዎሙ
  english_pob_choice: were trampling
  chosen_spanish: golpeaban
  alternatives_spanish:
  - pisoteaban
  - aplastaban
  - maltrataban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El paso al español admite varias opciones. Como el texto ge'ez fue revisado por la tradición de la nota crítica para señalar que las ovejas estaban atacando a los lobos, «golpeaban» evita forzar una imagen de pisoteo si la sintaxis se lee de modo más directo, pero mantiene la violencia del acto. Se deja constancia de la oscilación textual en la nota.
- source_word: እልኩ አዝእብት / አዝእብት
  english_pob_choice: the wolves ... the wolves
  chosen_spanish: aquellos lobos
  alternatives_spanish:
  - esos lobos
  - los lobos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la identificación del enemigo como lobos. «Aquellos» refleja bien la distancia narrativa y la referencia demostrativa del pasaje.
- source_word: የአውይዉ
  english_pob_choice: cried out
  chosen_spanish: gritaban
  alternatives_spanish:
  - clamaban
  - aullaban
  - gritaban con fuerza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa un clamor vocal. «Gritaban» es amplio y claro en español, sin restringir innecesariamente el matiz aullador.
- source_word: አርመሙ
  english_pob_choice: became silent
  chosen_spanish: guardaron silencio
  alternatives_spanish:
  - se callaron
  - quedaron en silencio
  - enmudecieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea central es el paso al silencio. «Guardaron silencio» resulta idiomático y conserva la transición narrativa.
- source_word: እምሶቤሃ አፀርኁ
  english_pob_choice: from that time they cried out no more
  chosen_spanish: desde aquel momento no gritaron más
  alternatives_spanish:
  - desde entonces no clamaron más
  - a partir de ese momento no gritaron más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la lectura revisada que entiende el cierre como cesación de un clamor, no como continuación del mismo. «No gritaron más» expresa bien la cesación sin introducir una voz más técnica.
theological_decisions:
- issue: Identidad del Señor en la visión animal
  english_pob_reading: the Lord of the sheep refers to God within the vision-symbolism
  chosen_spanish_reading: el Señor de las ovejas refiere a Dios dentro del simbolismo de la visión
  alternative_spanish_readings:
  - su Señor en sentido menos explícito
  - el dueño de las ovejas en sentido no teológico
  rationale: La figuración animal apunta al gobierno divino sobre el pueblo representado por las ovejas. La traducción mantiene el título simbólico sin sustituirlo por un término más eclesial.
  doctrine_reference: Translation philosophy §Original-language primacy; preserve apocalyptic imagery
- issue: Resolución de la dificultad final del versículo
  english_pob_reading: the final clause may be resumptive or reflect textual disturbance
  chosen_spanish_reading: se refleja la lectura revisada que entiende el final como cesación del clamor
  alternative_spanish_readings:
  - mantener el texto como 'gritaron' para reproducir la dificultad
  - armonizarlo como 'cesaron' sin nota
  rationale: La tradición auditada indica un problema textual y una corrección crítica que favorece la idea de cesación. En español se adopta una formulación clara, pero sin borrar que el pasaje depende de una lectura revisada.
  doctrine_reference: Translation philosophy §Textual transparency; preserve documented tension
translation_notes:
  revision_awareness: 'El audit trail muestra una revisión importante: una lectura anterior invirtió los papeles entre ovejas y lobos, pero la revisión adjudicada corrigió esa relación. También hubo una corrección textual en la clausula final, donde una lectura OCR errónea producía «gritaron»; la revisión crítica favorece la idea de cesación. La versión española sigue la lectura revisada y conserva la tensión textual mediante notas breves.'
  spanish_consistency_notes:
  - Se mantiene «Señor de las ovejas» como término simbólico coherente con el resto del corpus.
  - Se usa «ovejas» y «lobos» de forma consistente para conservar la alegoría animal.
  - Se evita «SEÑOR» mayúsculo como máscara litúrgica porque el proyecto exige transparencia del nombre divino en contexto simbólico.
  - El cierre «no gritaron más» refleja la cesación y evita una traducción mecánica que contradiga la revisión crítica.
