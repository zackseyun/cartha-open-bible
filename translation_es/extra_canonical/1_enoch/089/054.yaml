translation:
  language: es
  text: Y después de esto vi que abandonaron la casa de Yahvé y su torre[a], y todos se extraviaron, y sus ojos quedaron cegados. Y vi que el Señor de las ovejas hizo una gran matanza entre ellos en su pasto, hasta que aquellas ovejas clamaron a causa de aquella matanza y abandonaron su lugar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen de «torre» también puede entenderse como «redil» o «recinto»; el contexto visionario apunta al complejo simbólico del santuario.
    reason: lexical_alternative
  - marker: b
    text: El final es textualmente difícil. Otras lecturas permiten entender «y entraron en su lugar» o «se acercaron a su lugar» en vez de «abandonaron su lugar».
    reason: textual_variant
lexical_decisions:
- source_word: ወእምኔሁ
  english_pob_choice: And after that
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Y luego de esto
  - Y tras esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia temporal es la lectura revisada por el audit trail; en español, «Y después de esto» reproduce bien la progresión visionaria sin sugerir «otra vez».
- source_word: ኃደጉ
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - desampararon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo fuerte expresa salida culpable y se ajusta al juicio del pasaje mejor que un simple «dejaron».
- source_word: ቤተ ለእግዚአ
  english_pob_choice: the house of the Lord
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa del Señor
  - la casa de Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la terminología POB para el nombre divino («Yahvé») en vez de ocultarlo con «Señor», aunque el inglés audit trail use «Lord». La construcción sigue el genitivo del original sin añadir demostrativos.
- source_word: ማኅፈዶ
  english_pob_choice: his tower
  chosen_spanish: su torre
  alternatives_spanish:
  - su redil
  - su recinto
  - su fortaleza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Torre» conserva la imaginería apocalíptica señalada por el audit trail y es el equivalente más transparente en español, aunque el término pueda abarcar también redil o recinto.
- source_word: ስሕቱ
  english_pob_choice: went astray
  chosen_spanish: se extraviaron
  alternatives_spanish:
  - se desviaron
  - anduvieron errantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «se extraviaron» comunica bien la desviación moral y espacial del rebaño sin perder naturalidad.
- source_word: ተጸለሉ አዕይንቲሆሙ
  english_pob_choice: their eyes were blinded
  chosen_spanish: sus ojos quedaron cegados
  alternatives_spanish:
  - sus ojos fueron cegados
  - sus ojos se oscurecieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Quedaron cegados» conserva la pasividad y el efecto resultante en un castellano fluido; mantiene la fuerza de la acusación visual.
- source_word: እግዚአ አባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el Dueño de las ovejas
  - el Amo de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título fijo del ciclo visionario en forma española reconocible. Aquí no se sustituye por «Yahvé» porque el sintagma funciona como título narrativo dentro de la alegoría.
- source_word: ገብረ ቀትለ ብዙኃ
  english_pob_choice: bring about a great slaughter
  chosen_spanish: hizo una gran matanza
  alternatives_spanish:
  - provocó una gran matanza
  - realizó una gran matanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hizo» preserva la agencia activa del texto; «matanza» comunica el campo semántico de killing/slaughter con naturalidad en español.
- source_word: በመራዕይሆሙ
  english_pob_choice: in their pastures
  chosen_spanish: en su pastizal
  alternatives_spanish:
  - en sus pastos
  - en su lugar de pastoreo
  - en su pastura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular colectivo «pastizal» suena natural en español y refleja mejor la nota revisada del audit trail que restringe la imagen a un lugar de pastoreo.
- source_word: ይጼውዕዎ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron su clamor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite clamor o llamada; «clamaron» preserva la ambigüedad entre lamento y súplica sin añadir interpretación.
- source_word: አግብኡ መካኖ
  english_pob_choice: left his place
  chosen_spanish: abandonaron su lugar
  alternatives_spanish:
  - se apartaron de su lugar
  - dejaron su lugar
  - entraron en su lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail trata el final como textualmente difícil pero favorece la idea de salida/dejamiento. En español, «abandonaron su lugar» sigue esa lectura, manteniendo la dificultad sin resolverla de forma especulativa.
theological_decisions:
- issue: Agencia divina en la matanza
  english_pob_reading: the Lord of the sheep bring about a great slaughter among them
  chosen_spanish_reading: el Señor de las ovejas hizo una gran matanza entre ellos
  alternative_spanish_readings:
  - el Señor de las ovejas permitió una gran matanza entre ellos
  - el Señor de las ovejas causó que muchos fueran muertos entre ellos
  rationale: La fuente presenta agencia directa del Señor de las ovejas en el juicio. La traducción conserva esa fuerza y no la suaviza hacia mera permisión, para respetar la tensión teológica del pasaje.
  doctrine_reference: Preservar la tensión teológica del texto; no armonizarla artificialmente.
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail: se traduce ወእምኔሁ como «Y después de esto», se evita la expansión interpretativa de «again», y se mantiene la lectura final sobria y textualmente cautelosa con «abandonaron su lugar». También se siguió la corrección que favorece una referencia temporal única en el tramo final y no una glosa de acción distinta.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino principal, según la política del proyecto, sin ocultarlo con «Señor» en la frase de la casa.
  - Se mantiene «el Señor de las ovejas» como título narrativo fijo dentro de la alegoría.
  - Se conserva el paralelismo de imágenes de casa/torre/pastizal sin explicitar más de lo que el texto exige.
  - La traducción evita el giro tradicional bíblico cuando el español moderno expresa mejor la dureza del juicio sin perder solemnidad.
