  - marker: b
    text: El final es textualmente difícil. Otras lecturas permiten entender «y entraron en su lugar» o «se acercaron a su lugar» en vez de «abandonaron su lugar».
    reason: textual_variant
  revision_rationale: Se corrige el anclaje de la nota léxica para que recaiga sobre «torre», que es el término realmente comentado. Además, se sustituye «pastizal» por «pasto», una opción más natural y bíblicamente legible en español sin perder el singular del lugar de pastoreo. El resto del verso puede mantenerse.
