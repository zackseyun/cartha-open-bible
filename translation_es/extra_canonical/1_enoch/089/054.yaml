  to: Y después de esto vi que abandonaron la casa de Yahvé y su torre[a], y todos se extraviaron, y sus ojos quedaron cegados. Y vi que el Señor de las ovejas hizo una gran matanza entre ellos en su pasto, hasta que aquellas ovejas clamaron a causa de aquella matanza y abandonaron su lugar[b].
  rationale: Se corrige el anclaje de la nota léxica para que recaiga sobre «torre», que es el término realmente comentado. Además, se sustituye «pastizal» por «pasto», una opción más natural y bíblicamente legible en español sin perder el singular del lugar de pastoreo. El resto del verso puede mantenerse.
