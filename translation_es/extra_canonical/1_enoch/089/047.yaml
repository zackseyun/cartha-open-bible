translation:
  language: es
  text: Y el primer carnero persiguió a aquel carnero posterior, y aquel carnero posterior se levantó y huyó ante él[a][b]; y vi hasta que aquellos perros derribaron al primer carnero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: ''de delante de su rostro'', un giro semítico que expresa retroceso o huida ante alguien.'
    reason: lexical_alternative
  - marker: b
    text: '''Posterior'' traduce el valor de secuencia del término, en contraste con ''primero''; también podría entenderse como ''siguiente'' o ''último'', según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ሐርጌ
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho
  - macho de oveja
  lexicon: Dillmann
  rationale: En el contexto inmediato del Apocalipsis Animal, el término no debe traducirse como un animal distinto ni como interpretación histórica. 'Carnero' conserva la imaginería zoomórfica y corresponde al inglés POB 'ram'.
- source_word: ቀዳማዊ
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - primer
  - primero en orden
  lexicon: Dillmann
  rationale: Marca la secuencia entre dos figuras del mismo tipo. 'Primero' es la forma natural en español y mantiene el contraste con 'posterior'.
- source_word: ዳሓራዊ / ዳሕራዊ
  english_pob_choice: later
  chosen_spanish: posterior
  alternatives_spanish:
  - siguiente
  - segundo
  - último
  lexicon: Dillmann
  rationale: El valor principal es secuencial, no necesariamente terminal. 'Posterior' conserva esa relación sin imponer que sea el último de una serie mayor.
- source_word: ሰደዶ
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - siguió tras
  - corrió tras
  - acosó
  lexicon: Dillmann
  rationale: El verbo expresa persecución activa. 'Persiguió' es claro, solemne y adecuado para narrativa visionaria.
- source_word: ተንሥአ
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  - se incorporó
  lexicon: Dillmann
  rationale: La acción describe el movimiento del carnero antes de huir. 'Se levantó' es la opción más natural y mantiene el dinamismo del texto.
- source_word: ነፍጸ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - se dio a la fuga
  - corrió
  lexicon: Dillmann
  rationale: El contexto es retirada ante un agresor. 'Huyó' conserva el tono narrativo y la idea de escape.
- source_word: እምቅድመ ገጹ
  english_pob_choice: from before his face
  chosen_spanish: de delante de su rostro
  alternatives_spanish:
  - de delante de él
  - de su presencia
  lexicon: Dillmann
  rationale: La expresión semítica se conserva de manera auditable. En español, 'de delante de su rostro' mantiene la literalidad sin perder inteligibilidad; es una fórmula que refleja el giro original más que una paráfrasis.
- source_word: አክላብ
  english_pob_choice: dogs
  chosen_spanish: perros
  alternatives_spanish:
  - canes
  - sabuesos
  lexicon: Dillmann
  rationale: El sustantivo denota perros de forma directa. 'Perros' es el equivalente natural y no introduce una especificación no sustentada como 'sabuesos'.
- source_word: አውደቅዎ
  english_pob_choice: brought down
  chosen_spanish: derribaron
  alternatives_spanish:
  - tumbaron
  - hicieron caer
  - abatieron
  lexicon: Dillmann
  rationale: La acción es causar la caída de la víctima. 'Derribaron' reproduce bien la fuerza física del verbo en español y preserva el carácter violento de la escena.
theological_decisions:
- issue: Preservación de la imaginería apocalíptica animal
  english_pob_reading: Keep the figures as 'ram' and 'dogs' rather than interpret them as historical actors in the translation.
  chosen_spanish_reading: Mantener 'carnero' y 'perros' como figuras del visionario, sin convertirlos en identificaciones históricas dentro del texto.
  alternative_spanish_readings:
  - Traducir los animales como actores políticos o reyes en el cuerpo del versículo
  - Sustituir la imagen por una glosa explicativa
  rationale: El texto pertenece a una visión alegórica sostenida. La traducción debe conservar la superficie simbólica para no colapsar el signo en su interpretación, dejando la lectura histórica para notas o comentario.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten symbolic narrative into prose interpretation.'
translation_notes:
  revision_awareness: 'El contexto auditado muestra una corrección importante: el término ሐርጌ aquí debe leerse como ''ram'' y no como ''boar''. La revisión más reciente afirma que traducirlo como ''boar'' destruye la alegoría del Apocalipsis Animal. Por eso el español sigue la lectura revisada y evita la interpretación errónea anterior.'
  spanish_consistency_notes:
  - Se mantuvo 'carnero' para ሐርጌ conforme a la adjudicación revisada y al contexto cercano.
  - Se conservó la repetición de 'primer carnero' para reflejar la estructura narrativa del original.
  - Se prefirió 'de delante de su rostro' para preservar el giro semítico documentado.
  - No se introdujeron equivalentes eclesiásticos tradicionales que desdibujen la imaginería del texto.
