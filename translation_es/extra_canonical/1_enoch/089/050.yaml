translation:
  language: es
  text: Y aquella casa llegó a ser grande y ancha[a], y fue construida para aquellas ovejas; y se edificó sobre la casa una torre alta y grande para el Señor de las ovejas. Y aquella casa era baja[c], pero la torre fue levantada y llegó a ser alta; y el Señor de las ovejas estaba de pie sobre aquella torre, y pusieron una mesa llena delante de él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Casa” conserva el sentido literal del ge'ez. En este contexto visionario puede aludir simbólicamente al templo, pero el texto no usa ese término en la línea principal.
    reason: cross_reference
  - marker: b
    text: También puede entenderse como “una mesa cargada” o “una mesa preparada”; el ge'ez permite una mesa plenamente provista ante la presencia divina.
    reason: lexical_alternative
  - marker: c
    text: 'O: “Y aquella casa estaba baja”. El giro subraya el contraste con la torre elevada.'
    reason: alternative_reading
lexical_decisions:
- source_word: ቤት
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa
  - templo
  - edificio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez usa el término básico “house”; en español, “casa” mantiene la literalidad del símbolo sin convertirlo de entrada en “templo”. La imagen puede sugerir significado templario, pero el texto no lo nombra explícitamente.
- source_word: ዐቢየ
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - grande
  - amplia
  - enorme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Grande” reproduce bien el valor de tamaño o importancia y combina naturalmente con “ancha” en español, manteniendo el paralelismo del original.
- source_word: ወርኅበ
  english_pob_choice: broad
  chosen_spanish: ancha
  alternatives_spanish:
  - ancha
  - ancha y espaciosa
  - amplia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Ancha” conserva la imagen espacial concreta de expansión. Evita volver más interpretativa la idea con “espaciosa”.
- source_word: ተኃንጸ
  english_pob_choice: was built
  chosen_spanish: fue construida / se edificó
  alternatives_spanish:
  - fue construida
  - se edificó
  - fue levantada
  lexicon: Dillmann, Lexicon Linguae Aethiopicæ
  rationale: Uso dos formas pasivas naturales en español para variar el flujo sin perder el sentido arquitectónico del verbo. “Se edificó” funciona bien con la torre; “fue construida” con la casa.
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ovejas
  - rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Ovejas” preserva la figura animal individualizada del apocalipsis. “Rebaño” sería más colectivo y menos visual en este contexto.
- source_word: ማኅፈድ
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - torre
  - estructura elevada
  - plataforma alta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Torre” es la equivalencia española más directa para la estructura elevada y monumental de la visión, manteniendo su verticalidad simbólica.
- source_word: ነዋኅ / high
  english_pob_choice: high
  chosen_spanish: alta
  alternatives_spanish:
  - alta
  - elevada
  - alta y elevada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El inglés auditado pasó de “lofty” a “high”; en español, “alta” expresa la altura física con naturalidad y de modo consistente en ambas ocurrencias.
- source_word: እግዚአ አባግዕ
  english_pob_choice: Lord of the sheep
  chosen_spanish: Señor de las ovejas
  alternatives_spanish:
  - Señor de las ovejas
  - Dueño de las ovejas
  - Maestro de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Señor” sigue el patrón del POB para títulos de soberanía divina y evita el reduccionismo de “dueño”. En español bíblico contemporáneo es claro y reverente.
- source_word: ተተሕተ
  english_pob_choice: was low
  chosen_spanish: estaba baja
  alternatives_spanish:
  - estaba baja
  - era baja
  - estaba rebajada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La casa se describe por su nivel relativo frente a la torre. “Estaba baja” conserva el contraste espacial sin forzar un matiz activo que el ge'ez no exige.
- source_word: ተላዐለ
  english_pob_choice: was raised up
  chosen_spanish: fue levantada
  alternatives_spanish:
  - fue levantada
  - fue alzada
  - se alzó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Fue levantada” reproduce bien la pasiva elevativa y prepara la repetición de altura en la frase siguiente.
- source_word: ቆመ
  english_pob_choice: stood
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - se puso de pie
  - estuvo de pie
  - se mantuvo de pie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Se puso de pie” suena natural en español y conserva la imagen de presencia corporal sobre la torre. “Estuvo de pie” sería más estático.
- source_word: ማእደ
  english_pob_choice: table
  chosen_spanish: mesa
  alternatives_spanish:
  - mesa
  - mesa colocada
  - mesa preparada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Mesa” es la equivalencia directa y suficientemente concreta para el mueble ritual/cultual sugerido por el pasaje.
- source_word: ምልእተ
  english_pob_choice: full
  chosen_spanish: llena
  alternatives_spanish:
  - llena
  - cargada
  - puesta completamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Llena” expresa la idea de una mesa completamente provista. Es más natural en español que “plena” en este contexto.
- source_word: አቅረቡ በቅድሜሁ
  english_pob_choice: they set before him
  chosen_spanish: pusieron delante de él
  alternatives_spanish:
  - pusieron delante de él
  - presentaron delante de él
  - colocaron ante él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Pusieron delante de él” reproduce de forma simple y fiel la acción de presentación en su presencia, con un registro bíblico natural.
theological_decisions:
- issue: Si ቤት debe traducirse como “casa” o explicitarse como “templo”
  english_pob_reading: house; the symbolic context suggests temple imagery but the wording remains literal
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  - casa-templo
  rationale: Mantener “casa” respeta el dato léxico del ge'ez y deja que la imaginería apocalíptica sugiera la posible referencia al templo sin cerrarla prematuramente en el texto principal.
  doctrine_reference: Transparencia textual y equivalencia óptima; cf. § sobre términos simbólicos
- issue: Cómo renderizar el título እግዚአ አባግዕ
  english_pob_reading: Lord of the sheep
  chosen_spanish_reading: Señor de las ovejas
  alternative_spanish_readings:
  - Dueño de las ovejas
  - Maestro de las ovejas
  rationale: “Señor” conserva la fuerza de soberanía y la continuidad con el tratamiento del POB para títulos elevados. “Dueño” sería demasiado doméstico; “Maestro” no comunica tan bien autoridad regia/divina.
  doctrine_reference: 'Contested terms: κύριος → Lord'
- issue: Si la mesa final debe interpretarse cultualmente como ofrenda o mantenerse concreta
  english_pob_reading: they set a full table before him
  chosen_spanish_reading: pusieron delante de él una mesa llena
  alternative_spanish_readings:
  - presentaron una mesa cargada delante de él
  - pusieron delante de él una mesa preparada
  rationale: El ge'ez presenta una mesa concreta; traducirla así evita añadir un contenido sacrificial no explicitado. “Llena” preserva la idea de abundancia sin especificar más de lo que dice el texto.
  doctrine_reference: Principio de no sobre-interpretación cultual
translation_notes:
  revision_awareness: La redacción española sigue el último estado auditado del inglés, que estabilizó “high” en ambos lugares y mantuvo la estructura paratáctica con múltiples ‘and’. También incorpora la revisión que restablece el ‘and’ inicial del segundo miembro (‘And that house was low’). En español se preserva esa cadencia con repeticiones de ‘y’, sin desarrollar la escena más allá del ge'ez.
  spanish_consistency_notes:
  - Se mantiene ‘Señor’ para እግዚአ አባግዕ, coherente con la terminología POB para soberanía divina.
  - Se usa ‘casa’ en lugar de ‘templo’ en el texto principal por fidelidad al término básico del original.
  - ‘Alta’ traduce consistentemente las dos ocurrencias de altura, reflejando el ajuste del audit trail inglés de ‘lofty’ a ‘high’.
  - Se conserva la estructura narrativa con abundantes coordinaciones ‘y’, acorde con el estilo paratáctico del pasaje apocalíptico.
