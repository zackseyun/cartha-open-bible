  yaml_path: translation/extra_canonical/1_enoch/089/014.yaml
  text: And the Lord brought the twelve sheep so that they might dwell with it and graze with it among the wolves[c][b][a]; and they multiplied and became many flocks of sheep.
  footnotes:
  - marker: a
    text: The Ethiopic text is difficult in the middle of the verse; the clause rendered 'pasture with him among the wolves' reflects the animal imagery of the passage and may also be understood more literally as 'graze with him in the midst of the wolves.'
