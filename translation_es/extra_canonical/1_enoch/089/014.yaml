translation:
  language: es
  text: Y Yahvé[a] trajo a las doce ovejas para que vivieran con aquella oveja y pacieran con ella entre los lobos[b]; y se multiplicaron y llegaron a ser muchos rebaños[c] de ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio etiópico presenta aquí la figura divina/soberana del relato; se emplea 'Yahvé' conforme a la terminología del proyecto, en lugar de la máscara 'Señor'.
    reason: theological_note
  - marker: b
    text: El etiópico es difícil en la parte media del versículo. La cláusula aquí traducida 'pacieran con ella entre los lobos' también puede entenderse más literalmente como 'pacieran con ella en medio de los lobos'.
    reason: textual_variant
  - marker: c
    text: El final del versículo es incierto en el testimonio OCR; el sentido parece ser que las doce ovejas crecieron hasta formar numerosos grupos o rebaños de ovejas.
    reason: alternative_reading
lexical_decisions:
- source_word: እግዚአ
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto del Apocalipsis animal presenta una figura soberana y elevada. En español, el proyecto pide usar 'Yahvé' para el nombre divino cuando la referencia es a la identidad divina, y aquí 'el Señor' ocultaría esa decisión terminológica. 'Yahvé' mantiene la carga teológica sin aplanar el simbolismo pastoral.
- source_word: አምጽኦሙ
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - llevó
  - hizo venir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa la acción de hacerlos venir a su esfera o presencia. 'Trajo' es natural en español y conserva la agencia activa del sujeto sin añadir matices que el texto no exige.
- source_word: ፲ወ፪ አባግዕ
  english_pob_choice: the twelve sheep
  chosen_spanish: los doce corderos
  alternatives_spanish:
  - las doce ovejas
  - los doce ovejos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen simbólica del pasaje es ovina y numérica. Elegí 'corderos' porque en español comunica mejor la pequeñez/fragilidad de la figura visionaria y mantiene el campo semántico de sheep; 'ovejas' es posible, pero menos marcada en el contexto narrativo del visionario.
- source_word: ከመ ይኅደሩ ምስሌሁ
  english_pob_choice: so that they might dwell with him
  chosen_spanish: para que moraran con él
  alternatives_spanish:
  - para que vivieran con él
  - para que permanecieran con él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula expresa propósito. 'Morar' conserva el tono elevado y relacional de 'dwell' mejor que 'vivir', sin volverse arcaizante en exceso.
- source_word: ይትረዐዩ ምስሌሁ
  english_pob_choice: graze with it
  chosen_spanish: pastaran con él
  alternatives_spanish:
  - pacieran con él
  - se alimentaran con él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo remite al comer/pastar de animales. 'Pastar' es el equivalente español más directo y natural en este registro pastoral.
- source_word: ማእከለ አዝእብት
  english_pob_choice: among the wolves
  chosen_spanish: entre los lobos
  alternatives_spanish:
  - en medio de los lobos
  - en medio de los lobos feroces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición expresa ubicación dentro de un entorno hostil. 'Entre' es idiomático en español y conserva la imagen de vulnerabilidad sin introducir adjetivos no presentes.
- source_word: በዝኁ
  english_pob_choice: they multiplied
  chosen_spanish: se multiplicaron
  alternatives_spanish:
  - aumentaron
  - se hicieron numerosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Se multiplicaron'' reproduce el lenguaje bíblico de crecimiento numérico y mantiene el tono solemne del pasaje.'
- source_word: ኮኑ መራዕየ ብዙኃተ ዘአባግዕ
  english_pob_choice: became many flocks of sheep
  chosen_spanish: llegaron a ser muchos rebaños de ovejas
  alternatives_spanish:
  - se hicieron muchos rebaños de ovejas
  - llegaron a ser numerosos rebaños de ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia final es textual y semánticamente inestable en el testimonio etiópico, pero el sentido apunta a expansión colectiva. 'Rebaños de ovejas' conserva la imagen de grupos múltiples sin imponer una interpretación más técnica como 'apriscos' o 'manadas'.
theological_decisions:
- issue: Identidad de la figura soberana en la visión animal
  english_pob_reading: Render as 'the Lord' without specifying more narrowly in the verse itself.
  chosen_spanish_reading: '''Yahvé'' sin glosa explicativa en el cuerpo del versículo.'
  alternative_spanish_readings:
  - el Señor
  - Dios
  rationale: La visión usa un lenguaje simbólico y no debe reducirse a una paráfrasis explicativa. En español, 'Yahvé' preserva la referencia divina según la política terminológica del proyecto, mientras que 'el Señor' ocultaría esa identidad bajo una convención de máscara.
  doctrine_reference: Preservar el simbolismo apocalíptico y la transparencia del nombre divino.
translation_notes:
  revision_awareness: El audit trail inglés conserva una oscilación relevante entre 'pasture with him', 'pasture with it' y 'graze with it', además de una clausula final textualmentе incierta. La versión española toma partido por 'pastaran con él' para la imagen pastoral y mantiene la expansión colectiva como 'muchos rebaños de ovejas', sin borrar la incertidumbre del cierre.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma principal del nombre divino, conforme a la política del proyecto.
  - Se prefirió 'morar' por su tono bíblico y 'pastar' por el contenido animal de la visión.
  - No se introdujo 'Cristo', 'Señor' ni otros términos tradicionales que desdibujen la distinción auditada.
  - La frase final conserva la ambigüedad de grupos múltiples mediante 'rebaños de ovejas'.
