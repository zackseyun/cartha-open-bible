translation:
  language: es
  text: Y envió muchas otras ovejas a aquellas ovejas, para que oigan[a] y clamen sobre ellas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El verbo subyacente permite también una fuerza causativa: «hacer oír» o «proclamar para que se oiga».'
    reason: lexical_alternative
  - marker: b
    text: «Clamen sobre ellas» también puede entenderse como «clamen acerca de ellas»; menos probablemente, «clamen contra ellas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ካልኣነ
  english_pob_choice: other
  chosen_spanish: otras
  alternatives_spanish:
  - demás
  - otras más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma contrasta con el grupo ya mencionado; «otras» comunica bien esa distinción y conserva el paralelismo simbólico del texto.
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ovejas del rebaño
  - ganado ovino
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «ovejas» mantiene la imagen visionaria de manera natural y fiel; «rebaño» desplazaría el foco del símbolo individual al colectivo.
- source_word: ብዙኃነ
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - numerosas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Muchas» reproduce la cantidad sin sobrecargar el tono; concuerda con «ovejas» en género y número.
- source_word: ፈነወ
  english_pob_choice: And he sent
  chosen_spanish: Y envió
  alternatives_spanish:
  - Y despachó
  - Y mandó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez es de tercera persona singular masculina perfecta; «envió» refleja correctamente el sujeto y el acto de remisión o despacho.
- source_word: ኀቤሆሙ
  english_pob_choice: to them
  chosen_spanish: a aquellas ovejas
  alternatives_spanish:
  - a ellas
  - hacia ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La dirección se entiende a las ovejas ya mencionadas; repetir el grupo destinatario en español evita una referencia pronominal menos clara en una frase apocalíptica larga.
- source_word: ለዝኩ አባግዕ
  english_pob_choice: to those sheep
  chosen_spanish: a aquellas ovejas
  alternatives_spanish:
  - a esas ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La demostración señala al grupo receptivo específico; «aquellas» preserva la distancia deíctica y suena natural en castellano bíblico contemporáneo.
- source_word: ያስምዑ
  english_pob_choice: that they might hear
  chosen_spanish: para que oyeran
  alternatives_spanish:
  - para que escucharan
  - para que hicieran oír
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma causativa admite una tensión entre «oír» y «hacer oír». Aquí se conserva la lectura más directa del audit trail inglés, pero se expresa con «oyeran», dejando abierta la ambigüedad registrada en la nota.
- source_word: የአውይዉ
  english_pob_choice: cry out
  chosen_spanish: clamaran
  alternatives_spanish:
  - gritaran
  - lamentaran
  - se quejaran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Clamar» conserva la fuerza de un grito audible y solemne sin decidir de antemano si el matiz es lamento, protesta o denuncia.
- source_word: ዲቤሆሙ
  english_pob_choice: over them
  chosen_spanish: sobre ellas
  alternatives_spanish:
  - acerca de ellas
  - contra ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición puede abarcar un clamor dirigido a, relativo a, o contra el grupo. «Sobre ellas» mantiene esa amplitud y reproduce el eco de la imagen visionaria.
theological_decisions:
- issue: Identidad de las 'other sheep' dentro de la imaginería del Animal Apocalypse
  english_pob_reading: Retain the literal visionary image 'other sheep' without identifying them in the translation.
  chosen_spanish_reading: Conservar la imagen literal «otras ovejas» sin identificarla en el texto.
  alternative_spanish_readings:
  - profetas
  - líderes fieles
  - un grupo reformador dentro de Israel
  rationale: El verso funciona dentro de un sueño profético simbólico; la traducción no debe resolver en el cuerpo del texto la referencia histórica o tipológica. Mantener el símbolo respeta la tensión interpretativa documentada.
  doctrine_reference: Preservar la imaginería apocalíptica y la ambigüedad interpretativa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección del audit trail que ajusta el verbo principal a tercera persona singular («envió») y la observación sobre la forma causativa de ያስምዑ. En el español se preserva la lectura directa «oyeran», pero se documenta la alternativa causativa en nota para no borrar la tensión léxica del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino; en este verso no aparece.
  - Se usa «ovejas» para preservar el símbolo apocalíptico sin reinterpretarlo como un colectivo histórico explícito.
  - Se evita «siervos» o «rebaño» para no debilitar la imagen individualizada del texto.
  - Se mantiene un registro bíblico moderno y claro, con puntuación española y concordancia natural.
