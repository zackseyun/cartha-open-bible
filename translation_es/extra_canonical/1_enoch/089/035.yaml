revisions:
- from: Y ese carnero tomó con él otras ovejas[a], y vino contra aquellas ovejas que se habían extraviado; y comenzó a matarlas. Y las ovejas tuvieron miedo delante de él, y ese carnero hizo volver[b] a aquellas ovejas que se habían extraviado, y regresaron a sus rediles.
  to: Y ese carnero tomó con él otras ovejas, y llegó adonde estaban aquellas ovejas que se habían extraviado; y comenzó a matarlas[a]. Y las ovejas tuvieron miedo delante de él, y ese carnero hizo volver a aquellas ovejas que se habían extraviado, y regresaron a sus rediles.
  rationale: Se ajusta 'vino contra' a 'llegó adonde estaban' para reflejar mejor el valor de ቦአ ዲበ sin intensificarlo indebidamente. Se elimina una nota meramente estilística y se conserva en español la alternativa léxica importante documentada por el POB inglés para አኀዘ ይቅትሎሙ. El resto del texto se mantiene por ser fiel, claro y natural.
