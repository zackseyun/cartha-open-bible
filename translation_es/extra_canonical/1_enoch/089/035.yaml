translation:
  language: es
  text: Y ese carnero tomó con él otras ovejas, y llegó adonde estaban aquellas ovejas que se habían extraviado; y comenzó a matarlas[a]. Y las ovejas tuvieron miedo delante de él, y ese carnero hizo volver a aquellas ovejas que se habían extraviado, y regresaron a sus rediles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, 'las agarró para matarlas'; la construcción ge'ez resalta el inicio de la acción violenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: በግዕ
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - oveja macho
  - macho de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto alegórico del Apocalipsis Animal, el término distingue al líder ovino masculino; 'carnero' conserva esa distinción en español mejor que 'oveja'.
- source_word: ነሥአ ምስሌሁ
  english_pob_choice: took other sheep with him
  chosen_spanish: tomó con él otras ovejas
  alternatives_spanish:
  - llevó con él otras ovejas
  - tomó consigo otras ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa acción de tomar/llevar acompañado de otros; 'tomó con él' es natural y mantiene el valor de compañía.
- source_word: ባዕደ አባግዐ
  english_pob_choice: other sheep
  chosen_spanish: otras ovejas
  alternatives_spanish:
  - unas ovejas más
  - otras del rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural del ge'ez exige plural en español; 'otras ovejas' sigue fielmente el sentido y evita el error de singularizarlo.
- source_word: ቦአ ዲበ
  english_pob_choice: came upon
  chosen_spanish: vino contra
  alternatives_spanish:
  - cayó sobre
  - se abalanzó sobre
  - llegó contra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión indica acercamiento con fuerza o confrontación; 'vino contra' preserva esa carga sin volverla demasiado interpretativa.
- source_word: እለ ስሕቱ
  english_pob_choice: that had gone astray
  chosen_spanish: que se habían extraviado
  alternatives_spanish:
  - que se habían perdido
  - que habían errado
  - que andaban descarriadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Extraviarse'' en español puede abarcar tanto el desvío literal como el moral-covenantal que sugiere la alegoría.'
- source_word: አኀዘ ይቅትሎሙ
  english_pob_choice: he began to kill them
  chosen_spanish: comenzó a matarlas
  alternatives_spanish:
  - empezó a matarlas
  - se puso a matarlas
  - se aprestó a matarlas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez expresa inicio de acción violenta; 'comenzó a matarlas' mantiene el sentido explícito sin suavizarlo.
- source_word: ፈርሁ እምገጹ
  english_pob_choice: were afraid before him
  chosen_spanish: tuvieron miedo delante de él
  alternatives_spanish:
  - temieron ante él
  - se atemorizaron ante su presencia
  - tuvieron miedo en su presencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Delante de él'' conserva la relación espacial y solemne del original; ''tener miedo'' comunica el verbo de forma directa en español.'
- source_word: አግብኦሙ
  english_pob_choice: made ... return
  chosen_spanish: hizo volver[b]
  alternatives_spanish:
  - los hizo regresar
  - los hizo retornar
  - los hizo volver atrás
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma causativa exige que el carnero cause el regreso, no solo que acompañe. Se conserva el valor causal en español.
- source_word: አዕጻዲሆሙ
  english_pob_choice: their folds
  chosen_spanish: sus rediles
  alternatives_spanish:
  - sus apriscos
  - sus corrales
  - sus cercados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español pastoral, 'rediles' comunica el recinto de las ovejas de modo claro y natural; mantiene la imagen ovina sin tecnicismo excesivo.
theological_decisions:
- issue: Violencia del carnero contra las ovejas extraviadas
  english_pob_reading: Retain the explicit killing language in the main text.
  chosen_spanish_reading: Mantener el lenguaje explícito de matar en el texto principal.
  alternative_spanish_readings:
  - suavizar a 'castigarlas'
  - suavizar a 'golpearlas'
  rationale: El ge'ez usa lenguaje de muerte de forma directa, y la alegoría apocalíptica admite imágenes severas de juicio. Suavizarlo ocultaría ese rasgo.
  doctrine_reference: Preservar la imaginería apocalíptica y el juicio explícito del texto.
- issue: Pluralidad de las ovejas tomadas con él
  english_pob_reading: other sheep
  chosen_spanish_reading: otras ovejas
  alternative_spanish_readings:
  - otra oveja
  rationale: La forma plural del original debe mantenerse; singularizarla alteraría el sentido gramatical y narrativo.
  doctrine_reference: Fidelidad gramatical al número del texto fuente.
translation_notes:
  revision_awareness: Se corrigió la falla previa asegurando que cada marca de nota aparezca exactamente en el texto español. También se ajustó el número a plural en 'otras ovejas', de acuerdo con la revisión más reciente del texto fuente y su auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo el registro solemne y narrativo propio de la serie alegórica.
  - Se evitó 'SEÑOR' y otras sustituciones no pertinentes, ya que este verso no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se preservó el verbo de muerte explícito sin atenuación, conforme al audit trail inglés.
  - Se usó español neutral de amplia inteligibilidad y sintaxis natural, sin mecanicismos innecesarios.
