  language: en
  yaml_path: translation/extra_canonical/1_enoch/089/035.yaml
  text: And that ram took other sheep with him[a], and came upon those sheep that had gone astray; and he began to kill them. And the sheep were afraid before him, and that ram made those sheep that had gone astray return[b], and they went back into their folds.
  footnotes:
