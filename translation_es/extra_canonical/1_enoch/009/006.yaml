translation:
  language: es
  text: Ves lo que ha hecho Azazel, que enseñó toda iniquidad sobre la tierra y reveló las cosas ocultas del mundo[a], que se hacen en los cielos[b] y que los hombres aprendieron[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «las cosas ocultas del mundo» también puede entenderse como «los secretos de la era» o «las cosas ocultas de la eternidad», porque el término ge'ez correspondiente admite varios matices relacionados.
    reason: lexical_alternative
  - marker: b
    text: O «que son hechas en los cielos». El ge'ez permite un matiz pasivo o impersonal en esta cláusula.
    reason: lexical_alternative
  - marker: c
    text: La revisión textual favorece «que los hombres aprendieron» frente a la antigua expansión «que los hombres estaban tratando de aprender».
    reason: textual_variant
lexical_decisions:
- source_word: ርኢከ
  english_pob_choice: You see
  chosen_spanish: Ves
  alternatives_spanish:
  - Has visto
  - Mira
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo en segunda persona introduce una apelación directa al destinatario celestial. «Ves» mantiene la vivacidad y la inmediatez del texto, como el inglés POB «You see».
- source_word: ዘገብረ
  english_pob_choice: what ... has done
  chosen_spanish: lo que ha hecho
  alternatives_spanish:
  - lo que hizo
  - lo que ha realizado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción relativa expresa una acción completada con relevancia presente. «Ha hecho» conserva ese valor mejor que un pretérito simple.
- source_word: አዛዝኤል
  english_pob_choice: Azazel
  chosen_spanish: Azazel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Nombre propio transliterado conforme a la política del proyecto.
- source_word: ዘመሀረ
  english_pob_choice: how he has taught
  chosen_spanish: que enseñó
  alternatives_spanish:
  - que instruyó
  - cómo enseñó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica enseñanza o instrucción. En español, «enseñó» transmite la imputación de haber comunicado activamente esa perversión o conocimiento ilícito.
- source_word: ኵሎ ዓመፃ
  english_pob_choice: all unrighteousness
  chosen_spanish: toda injusticia
  alternatives_spanish:
  - toda injusticia moral
  - toda iniquidad
  - toda impiedad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término abarca culpa moral amplia. «Injusticia» comunica bien el sentido ético y resulta natural en español; se evita reducirlo a violencia física o a una formulación demasiado litúrgica.
- source_word: በዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición espacial marca la esfera terrestre corrompida por la enseñanza de Azazel. «Sobre la tierra» conserva el registro elevado y la imagen de extensión general.
- source_word: ወአግሀደ
  english_pob_choice: and revealed
  chosen_spanish: y reveló
  alternatives_spanish:
  - y dio a conocer
  - y descubrió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo apunta a una divulgación de lo oculto. «Reveló» encaja con el registro apocalíptico y mantiene la tensión de una revelación ilícita.
- source_word: ኅቡኣተ ዓለም
  english_pob_choice: the hidden things of the world
  chosen_spanish: las cosas ocultas del mundo
  alternatives_spanish:
  - los secretos del mundo
  - las cosas ocultas de la edad
  - los misterios del siglo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ዓለም» puede significar mundo, edad o eternidad. Aquí se preserva el sentido amplio con «mundo», siguiendo el criterio del POB inglés de no fijar de más el valor técnico.
- source_word: እለ ይትገበሩ በሰማያት
  english_pob_choice: that are done in the heavens
  chosen_spanish: las cuales ... son hechas en los cielos
  alternatives_spanish:
  - que se hacen en los cielos
  - que tienen lugar en los cielos
  - que son realizadas en el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase apunta a realidades o actos celestiales. «En los cielos» refleja mejor el plural semítico/apocalíptico que «en el cielo», y «son hechas» conserva la pasiva sin añadir interpretación.
- source_word: አመረ ሰብእ
  english_pob_choice: which men learned
  chosen_spanish: las cuales los hombres aprendieron
  alternatives_spanish:
  - que los hombres aprendieron
  - que los hombres llegaron a conocer
  - que los hombres buscaban aprender
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual favorece la lectura simple «aprendieron»; no se debe importar la antigua paráfrasis inglesa de «were striving to learn». En español, «aprendieron» refleja directamente el testimonio ge'ez recibido.
theological_decisions:
- issue: Alcance moral de ዓመፃ
  english_pob_reading: all unrighteousness
  chosen_spanish_reading: toda injusticia
  alternative_spanish_readings:
  - toda iniquidad
  - toda impiedad
  - toda leylessness/lawlessness
  rationale: La acusación describe corrupción moral total introducida por enseñanza prohibida. «Injusticia» conserva el peso ético general sin restringirlo a una sola esfera del mal.
  doctrine_reference: Translation philosophy §Consistency of key terms; righteousness/justice terminology table
- issue: Divulgación de secretos celestiales
  english_pob_reading: the hidden things of the world that are done in the heavens
  chosen_spanish_reading: las cosas ocultas del mundo, las cuales son hechas en los cielos
  alternative_spanish_readings:
  - los misterios del mundo que se hacen en el cielo
  - las cosas ocultas de la edad hechas en los cielos
  - los secretos del mundo que acontecen en el cielo
  rationale: La línea denuncia la revelación indebida de realidades celestiales ocultas. Se mantiene la tensión apocalíptica sin resolverla hacia categorías doctrinales posteriores.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
- issue: Valor de la cláusula final
  english_pob_reading: which men learned
  chosen_spanish_reading: las cuales los hombres aprendieron
  alternative_spanish_readings:
  - que los hombres aprendieron
  - que los hombres conocieron
  rationale: La revisión adjudicada corrige la antigua expansión interpretativa. La traducción española debe seguir la lectura textual simple recibida, aunque quede sintácticamente densa.
  doctrine_reference: Textual criticism note in applied revisions; preserve source-weighted reading
translation_notes:
  revision_awareness: 'La versión inglesa POB pasó por una corrección textual importante: se descartó la paráfrasis «were striving to learn» y se prefirió «which men learned», conforme al ge''ez recibido. La redacción española sigue esa revisión y evita importar la antigua expansión interpretativa. También se ajustó la sintaxis para que refleje con claridad la cadena relativa del original sin perder la fuerza apocalíptica del pasaje.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este verso no contiene el nombre divino.
  - Se prefirió «injusticia» en coherencia con el valor moral amplio de ዓመፃ, evitando sustituirlo por un término más eclesial.
  - Se usó «cielos» en plural para respetar el registro cosmológico del original.
  - Se conservó la tensión de revelación ilícita sin explicarla doctrinalmente.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el verso.
