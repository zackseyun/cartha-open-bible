revisions:
- from: Ves lo que ha hecho Azazel, que enseñó toda injusticia sobre la tierra y reveló las cosas ocultas del mundo[a][b], las cuales los hombres aprendieron[c].
  to: Ves lo que ha hecho Azazel, que enseñó toda iniquidad sobre la tierra y reveló las cosas ocultas del mundo[a], que se hacen en los cielos[b] y que los hombres aprendieron[c].
  rationale: Se restaura en el texto principal la cláusula fuente sobre lo que «se hace en los cielos», que no debe quedar solo en nota. También se ajusta «injusticia» a «iniquidad» para reflejar mejor el valor moral amplio de ዓመፃ / «all unrighteousness», y se aligera la sintaxis para un español más natural y fiel.
  reviewer_model: gpt-5.4
