review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva en general la secuencia del ge'ez y sigue bien la revisión inglesa adjudicada, especialmente al mantener la cláusula final como «los hombres aprendieron» y no «estaban tratando de aprender». Sin embargo, omite en el texto principal la cláusula «que son hechas en los cielos / que se hacen en los cielos», que sí está presente en la fuente y en el POB inglés. Esa omisión afecta de manera sustancial el alcance de «las cosas ocultas del mundo».
  spanish_quality_summary: El español es legible y digno, pero la oración queda incompleta semánticamente al saltarse la referencia a los cielos y relegarla a una nota. Además, «las cuales» repetido dos veces seguidas resulta algo pesado; conviene aligerarlo. «Toda injusticia» es posible, pero en este contexto apocalíptico «toda iniquidad» preserva mejor el peso moral amplio de «all unrighteousness» sin sonar antinatural.
  glossary_alignment: 'No hay conflictos con términos de proyecto como Yahvé/Mesías. El punto léxico principal es ዓመፃ: el borrador usa «injusticia», aceptable, pero «iniquidad» alinea mejor con la decisión inglesa «unrighteousness» en un contexto de corrupción moral total. También debe mantenerse explícitamente «en los cielos» en el texto principal para reflejar እለ ይትገበሩ በሰማያት.'
  issues:
  - severity: high
    issue: Omisión de la cláusula «que se hacen/son hechas en los cielos» en el texto principal
    rationale: La fuente ge'ez incluye explícitamente እለ ይትገበሩ በሰማያት, y el POB inglés lo conserva en el cuerpo del verso. Pasarlo solo a nota cambia el sentido al dejar indefinido qué clase de «cosas ocultas» fueron reveladas.
  - severity: medium
    issue: «Toda injusticia» debilita el matiz de «all unrighteousness»
    rationale: «Injusticia» en español puede oírse más social o forense; «iniquidad» comunica mejor la amplitud moral y teológica documentada en las decisiones inglesas.
  - severity: low
    issue: Sintaxis algo pesada con relativas encadenadas
    rationale: La secuencia «las cuales... las cuales...» suena torpe en español. Puede suavizarse sin perder la estructura del original.
  revised_spanish_text: Ves lo que ha hecho Azazel, que enseñó toda iniquidad sobre la tierra y reveló las cosas ocultas del mundo[a], que se hacen en los cielos[b] y que los hombres aprendieron[c].
  revised_footnotes:
