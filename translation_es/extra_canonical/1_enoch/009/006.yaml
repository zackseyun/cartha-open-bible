    reason: lexical_alternative
  - marker: b
    text: O «que son hechas en los cielos». El ge'ez permite un matiz pasivo o impersonal en esta cláusula.
    reason: lexical_alternative
  - marker: c
    text: La revisión textual favorece «que los hombres aprendieron» frente a la antigua expansión «que los hombres estaban tratando de aprender».
    reason: textual_variant
  revision_rationale: Se restaura en el texto principal la cláusula fuente sobre lo que «se hace en los cielos», que no debe quedar solo en nota. También se ajusta «injusticia» a «iniquidad» para reflejar mejor el valor moral amplio de ዓመፃ / «all unrighteousness», y se aligera la sintaxis para un español más natural y fiel.
