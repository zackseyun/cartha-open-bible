translation:
  language: es
  text: y las mujeres han dado a luz gigantes[a], y por esto toda la tierra se ha llenado de sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La referencia apunta a la descendencia gigantesca producida en el contexto de las uniones ilícitas de los Vigilantes; el ge'ez lo expresa de forma muy breve.
    reason: cross_reference
lexical_decisions:
- source_word: አንስት
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  - las feminas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo designa mujeres; "esposas" añadiría una relación matrimonial no explícita en la cláusula, aunque el contexto amplio trate de uniones ilícitas. En español, "las mujeres" conserva la referencia anafórica a las hijas de los hombres mencionadas antes.
- source_word: ወለዳ
  english_pob_choice: have borne
  chosen_spanish: han dado a luz
  alternatives_spanish:
  - han parido
  - han engendrado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal expresa el hecho de dar a luz/engendrar. "Han dado a luz" es natural en español y mantiene el valor resultativo del perfecto.
- source_word: ረዓይተ
  english_pob_choice: giants
  chosen_spanish: gigantes
  alternatives_spanish:
  - descendencia gigantesca
  - seres monstruosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de los Vigilantes, el término se refiere a la descendencia gigante de esas uniones. "Gigantes" conserva el sentido tradicional y contextual sin ampliar innecesariamente el texto.
- source_word: በዘ
  english_pob_choice: by this
  chosen_spanish: por esto
  alternatives_spanish:
  - por ello
  - así
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El conector introduce consecuencia o medio. "Por esto" mantiene el vínculo causal/resultativo de manera clara y sobria en español.
- source_word: መልአት
  english_pob_choice: has been filled
  chosen_spanish: ha sido llenada
  alternatives_spanish:
  - está llena
  - fue llenada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica llenarse o quedar lleno. "Ha sido llenada" preserva el resultado completado y deja explícito el sujeto "la tierra".
- source_word: ኵላ ምድር
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - toda la tierra habitable
  - el mundo entero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión puede significar la tierra en sentido global. "Toda la tierra" es idiomático en español y conserva el alcance cósmico del pasaje.
- source_word: ደመ
  english_pob_choice: with blood
  chosen_spanish: de sangre
  alternatives_spanish:
  - con sangre
  - con derramamiento de sangre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo es "sangre"; en español, la construcción "llenada de sangre" reproduce de forma directa e impactante la imagen apocalíptica sin suavizarla.
theological_decisions:
- issue: Relación causal entre la procreación de gigantes y la llenura de la tierra con sangre
  english_pob_reading: and by this the whole earth has been filled with blood
  chosen_spanish_reading: y por esto toda la tierra ha sido llenada de sangre
  alternative_spanish_readings:
  - y por ello toda la tierra ha sido llenada de sangre
  - y así toda la tierra ha sido llenada de sangre
  - y por esta causa toda la tierra ha sido llenada de sangre
  rationale: El ge'ez presenta una relación breve de consecuencia/medio; en español, "por esto" conserva esa compacta relación sin convertirla en paráfrasis explicativa. Se mantiene la imaginería apocalíptica de la acusación de los arcángeles.
  doctrine_reference: Mantener la tensión apocalíptica y el vínculo causal sin expandir más allá del testimonio fuente.
translation_notes:
  revision_awareness: Se siguió el dictamen revisado que identifica la referencia anafórica a las mujeres/hijas de los hombres del contexto inmediato, y se evitó la duplicación accidental de la cláusula causal presente en un borrador anterior. También se ajustó la puntuación para que ambas notas estén ancladas en el texto.
  spanish_consistency_notes:
  - Se mantuvo «gigantes» como término técnico-contextual para ረዓይተ.
  - Se evitó «esposas» porque el texto fuente no lo explicita.
  - «Toda la tierra» conserva el alcance total del hebreo/etiópico sin convertirlo en «el mundo».
  - La voz pasiva perifrástica «ha sido llenada» preserva el resultado consumado.
  - Las notas [a] y [b] están ancladas exactamente en «gigantes» para satisfacer el registro auditable.
