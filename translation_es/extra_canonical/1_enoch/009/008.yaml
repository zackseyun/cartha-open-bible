translation:
  language: es
  text: Y fueron a las hijas de los hombres en la tierra, y se acostaron con ellas, con aquellas mujeres, y se contaminaron y les revelaron[a] todo pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les dieron a conocer»; el verbo puede significar también «dar a conocer», pero aquí se mantiene «revelaron» por su fuerza apocalíptica y por la revisión del audit trail inglés.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሖሩ
  english_pob_choice: they went
  chosen_spanish: fueron
  alternatives_spanish:
  - fueron a
  - se fueron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez ሖሩ significa simplemente ‘ir/fueron’; no requiere un idiomático ‘entraron’. ‘Fueron a’ es claro en español y mantiene el movimiento hacia las mujeres sin sobretraducir la carga sexual, que ya queda expresada en la cláusula siguiente.
- source_word: አዋልደ ሰብእ
  english_pob_choice: the daughters of men
  chosen_spanish: las hijas de los hombres
  alternatives_spanish:
  - las hijas de la humanidad
  - las hijas de los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la expresión tradicional y suficientemente literal para el contraste narrativo entre seres celestiales y mujeres humanas. ‘Hombres’ funciona aquí como colectivo humano, no como varones solamente.
- source_word: በዲበ ምድር
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en la tierra, sobre la superficie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Sobre la tierra’ reproduce de forma transparente la localización espacial del ge'ez y conserva el contraste cielo/tierra propio del relato. Es una equivalencia natural en español bíblico.
- source_word: ወስከቡ ምስሌሆን
  english_pob_choice: they lay with them
  chosen_spanish: se acostaron con ellas
  alternatives_spanish:
  - y yacieron con ellas
  - y se unieron a ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea es unión sexual ilícita. ‘Se acostaron con ellas’ es el equivalente español más claro y sobrio para ese valor, mejor que un calco más duro o más ambiguo.
- source_word: ምስለ እልኩ አንስት
  english_pob_choice: with those women
  chosen_spanish: con aquellas mujeres
  alternatives_spanish:
  - con esas mujeres
  - con aquellas esposas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Aquellas mujeres’ conserva el demostrativo reforzador del texto y evita introducir la idea de matrimonio, que no está en el original.
- source_word: ወረኵሱ
  english_pob_choice: and they defiled themselves
  chosen_spanish: y se contaminaron
  alternatives_spanish:
  - y se defilaron
  - y se hicieron impuros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo refleja impureza moral y cultual. ‘Se contaminaron’ mantiene esa amplitud semántica en un español bíblico comprensible, sin reducirlo solo a una noción ritual.
- source_word: ወአግሀዱ ሎን
  english_pob_choice: and revealed to them
  chosen_spanish: y les revelaron
  alternatives_spanish:
  - y les hicieron conocer
  - y les dieron a conocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ajuste de revisión en la tradición inglesa confirma ‘revealed’ como mejor opción que ‘made known’. En español, ‘revelaron’ conserva el sentido de desvelar/disclose propio del contexto apocalíptico y de la transgresión de secretos prohibidos.
- source_word: ኵሎ ኃጢአተ
  english_pob_choice: every sin
  chosen_spanish: todo pecado
  alternatives_spanish:
  - cada pecado
  - toda clase de pecado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión singular colectiva del ge'ez admite una formulación totalizante en singular. ‘Todo pecado’ suena natural en español y conserva el alcance universal de la acusación.
theological_decisions:
- issue: Naturaleza de la corrupción de los Vigilantes
  english_pob_reading: The verse describes both illicit sexual union and the disclosure of sinful knowledge.
  chosen_spanish_reading: El versículo describe tanto la unión sexual ilícita como la revelación de todo pecado.
  alternative_spanish_readings:
  - Solo describe corrupción sexual, con la última cláusula como glosa secundaria.
  - La última cláusula se refiere específicamente a artes ocultas o técnicas, no al pecado en general.
  rationale: 'El ge''ez expresa explícitamente ambos elementos: acostarse con las mujeres y revelarles todo pecado. La traducción conserva esa doble acusación sin estrechar el texto hacia una sola categoría de corrupción.'
  doctrine_reference: Conservar la tensión teológica y apocalíptica del texto; no neutralizar su denuncia moral ni su dimensión de conocimiento prohibido.
translation_notes:
  revision_awareness: 'El audit trail inglés corrigió dos puntos relevantes: abandonó ‘went in to’ por un simple movimiento (‘went’), y prefirió ‘revealed’ frente a ‘made known’. Esta versión española sigue esas revisiones: evita un ‘entraron’ o un equivalente de penetración implícita en el primer verbo, y conserva ‘revelaron’ en la cláusula final para reflejar la terminología apocalíptica del texto y la decisión revisada de la POB inglesa. También se adopta ‘on the earth’ como ‘sobre la tierra’ por naturalidad y fidelidad espacial.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el texto lo exija; aquí no aparece ninguna forma del nombre divino.
  - ‘Hombres’ se usa en sentido colectivo humano, no sexista restrictivo, por fidelidad al contraste narrativo tradicional.
  - ‘Se contaminaron’ conserva una ambigüedad moral/cultual útil para textos apocalípticos; no se reduce a higiene ritual.
  - ‘Revelaron’ se alinea con la revisión inglesa más reciente y con el tono de disclosure prohibido del relato.
