translation:
  language: es
  text: 'Y dijeron al Señor[a] de los reyes: «Porque tú eres Señor de señores, Dios de dioses y Rey de reyes, y el trono de tu gloria permanece por todas las generaciones de la eternidad, y tu nombre es santo y glorioso por toda la eternidad, y bendito[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La apertura etiópica es sintácticamente comprimida y ha sido entendida de distintas maneras; aquí se sigue la lectura «al Señor de los reyes», que refleja mejor la construcción genitival de la expresión inicial.
    reason: alternative_reading
  - marker: b
    text: 'Una lectura etiópica entre corchetes añade después de «bendito»: «y glorioso» o «y honrado».'
    reason: textual_variant
lexical_decisions:
- source_word: እግዚኦሙ
  english_pob_choice: their Lord
  chosen_spanish: su Señor
  alternatives_spanish:
  - su Amo
  - su Soberano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma es un posesivo con valor reverencial dirigido a la deidad suprema. En español, «su Señor» conserva la relación posesiva y el tono de reverencia sin rebajar el matiz a mera soberanía política.
- source_word: ለነገሥት
  english_pob_choice: Lord of lords / the King (opening address compression issue in audit trail)
  chosen_spanish: Rey
  alternatives_spanish:
  - de reyes
  - el Rey
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto del acatamiento hace que el primer miembro de la serie funcione como título real de aclamación. En español, «el Rey» en aposición dentro de la invocación evita una lectura forzada y conserva el tono honorífico del saludo inicial.
- source_word: እግዚኦሙ ለአጋእዝት
  english_pob_choice: Lord of lords
  chosen_spanish: Señor de señores
  alternatives_spanish:
  - Señor sobre señores
  - Señor de los señores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la fórmula superlativa y paralela propia del doxología. «Señor de señores» es la correspondencia española más directa y solemne.
- source_word: አምላኮሙ ለአማልክት
  english_pob_choice: God of gods
  chosen_spanish: Dios de dioses
  alternatives_spanish:
  - Dios sobre dioses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción de superioridad se conserva literalmente en la cadena titulary. «Dios de dioses» reproduce la fuerza comparativa sin suavizarla.
- source_word: ንጉሦሙ ለነገሥት
  english_pob_choice: King of kings
  chosen_spanish: Rey de reyes
  alternatives_spanish:
  - Rey sobre reyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula triádica culmina con el mismo patrón de excelencia. «Rey de reyes» es el equivalente español asentado y fiel al paralelismo del texto.
- source_word: መንበረ ስብሐቲከ
  english_pob_choice: the throne of your glory
  chosen_spanish: el trono de tu gloria
  alternatives_spanish:
  - tu trono glorioso
  - el asiento de tu gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta del trono, importante en el lenguaje apocalíptico. «De tu gloria» mantiene la construcción sustantiva en lugar de convertirla en adjetivo.
- source_word: ውስተ ኵሉ ትውልደ ዓለም
  english_pob_choice: through all the generations of eternity
  chosen_spanish: por todas las generaciones de la eternidad
  alternatives_spanish:
  - en todas las generaciones de la eternidad
  - a través de todas las generaciones de la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada muestra que ዓለም aquí equivale a «eternidad/edad», no a «mundo». «Por todas las generaciones de la eternidad» conserva la fórmula temporal sin borrar el tono apocalíptico ni el paralelismo del original.
- source_word: ስምከ ቅዱስ ወስቡሕ ... ወቡሩክ
  english_pob_choice: your name is holy and glorious through all eternity, and blessed
  chosen_spanish: tu nombre es santo y glorioso por toda la eternidad, y bendito
  alternatives_spanish:
  - tu nombre es santo, glorioso y bendito por toda la eternidad
  - tu nombre es santo y alabado por toda la eternidad, y bendito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La evidencia revisada favorece «glorioso» frente a «alabado» para ስቡሕ en esta cadena doxológica, y el término bracketed final se deja fuera del cuerpo principal. «Santo y glorioso» preserva la doble predicación explícita, mientras «bendito» mantiene el último predicado seguro.
theological_decisions:
- issue: Cómo reflejar la titulatura divina repetida sin diluir su intensidad
  english_pob_reading: Preserve the threefold formula 'Lord of lords, God of gods, and King of kings'
  chosen_spanish_reading: Mantener la tríada «Señor de señores, Dios de dioses y Rey de reyes»
  alternative_spanish_readings:
  - Resumirla como «Soberano supremo»
  - Parafrasearla como «que gobierna sobre todo señor, dios y rey»
  rationale: La doxología depende de la repetición acumulativa. Traducirla explícitamente preserva la retórica de supremacía absoluta y evita neutralizar la cadencia solemne del pasaje.
  doctrine_reference: 'Principios de traducción POB: transparencia y preservación de la forma retórica del texto fuente.'
- issue: Cómo tratar el inicio de la invocación con እግዚኦሙ ለነገሥት
  english_pob_reading: Textually compressed opening address with royal and divine acclamation
  chosen_spanish_reading: «a su Señor, el Rey» como apertura reverencial y apposicional
  alternative_spanish_readings:
  - «al Señor de los reyes»
  - «al Rey, su Señor»
  rationale: La secuencia ge'ez es comprimida y honorífica. El español necesita explicitar la relación sin imponer una reescritura. La aposición mantiene el carácter de aclamación y evita borrar la tensión entre posesión, realeza y adoración.
  doctrine_reference: 'Principios de traducción POB: fidelidad auditada al sentido sintáctico y respeto por la ambigüedad controlada del original.'
- issue: Si incluir o no la lectura bracketed final [ወከቡድ]
  english_pob_reading: Exclude from the main text and note as a textual variant
  chosen_spanish_reading: Excluirla del texto principal y dejar la variación indicada en nota
  alternative_spanish_readings:
  - Incluirla como «y glorioso/honrado»
  - Fundirla en la serie final de predicados
  rationale: El marcador bracketed señala incertidumbre textual. Para transparencia, el texto principal debe apoyarse sólo en las lecturas seguras; la posible adición se documenta aparte para no nivelar indebidamente el testimonio manuscrito.
  doctrine_reference: Principios POB sobre variantes textuales y trazabilidad.
translation_notes:
  revision_awareness: 'El material auditado muestra que la lectura inglesa pasó por correcciones importantes: se rechazó una simplificación de la apertura («to their Lord, the King») y luego se afirmó que la secuencia inicial es sintácticamente comprimida; también se corrigió la frase temporal para entender ዓለም como «eternidad/edad», no como «mundo». Asimismo, la nota final bracketed fue tratada como variante textual, y la última revisión inglesa prefirió «glorious» frente a «praised». Mi español sigue esa línea revisada, pero usa «santo y glorioso» para reflejar la cadena adjetival segura y mantener el tono doxológico.'
  spanish_consistency_notes:
  - He conservado «Yahvé» fuera del versículo porque no aparece en la fuente.
  - He usado «Señor de señores / Dios de dioses / Rey de reyes» como fórmula fija y paralela, sin sustituirla por equivalentes más interpretativos.
  - He elegido «eternidad» para ዓለም en la fórmula temporal, de acuerdo con la revisión auditada.
  - He mantenido el texto principal libre de la lectura bracketed incierta, conforme a la transparencia textual del proyecto.
  - La puntuación española sigue el orden de la aclamación y el cierre doxológico, sin añadir material explicativo al versículo.
