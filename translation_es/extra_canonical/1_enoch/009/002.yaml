translation:
  language: es
  text: 'Y dijeron entre sí: «La voz de su clamor[a] ha llegado hasta las puertas del cielo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La formulación puede entenderse como el clamor de las víctimas que sube desde la tierra, o como la tierra misma clamando por la sangre derramada; el ge’ez permite ambas lecturas.
    reason: alternative_reading
lexical_decisions:
- source_word: ወይቤሉ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Y hablaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo narrativo estándar para introducir el discurso directo; «dijeron» conserva la naturalidad del español y el movimiento de la escena.
- source_word: በበይናቲሆሙ
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - entre ellos
  - los unos a los otros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresión recíproca idiomática en español; «entre sí» reproduce bien el sentido grupal sin forzar una construcción menos natural.
- source_word: ቃለ
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - palabra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto, el término apunta al clamor audible que sube al cielo, no a «palabra». «Voz» mantiene el relieve apocalíptico del término.
- source_word: ጽራኃቲሆሙ
  english_pob_choice: their outcry / their cry
  chosen_spanish: su clamor
  alternatives_spanish:
  - su grito
  - su grito de auxilio
  - su llanto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Clamor» expresa mejor la fuerza colectiva e intensa del término que «llanto», y en español puede abarcar un grito de denuncia o de angustia.
- source_word: ዐረቀ
  english_pob_choice: has reached
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha subido
  - ha ascendido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma apunta al arribo al destino indicado; «ha llegado» es la opción más natural en español y evita resolver de manera excesiva la imagen espacial.
- source_word: ጸርሐት
  english_pob_choice: cry of distress
  chosen_spanish: clamor
  alternatives_spanish:
  - grito de angustia
  - clamor de angustia
  - llanto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto ge’ez presenta una segunda expresión de clamor que intensifica la primera. En español, «clamor» conserva esa resonancia sin introducir una paráfrasis más larga.
- source_word: ምድር
  english_pob_choice: the earth’s
  chosen_spanish: su
  alternatives_spanish:
  - de la tierra
  - de la tierra misma
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la referencia posesiva de manera natural en la cláusula española. El contexto permite entender que la tierra participa del clamor por la sangre derramada.
- source_word: እስከ አንቀጸ ሰማይ
  english_pob_choice: to the gates of heaven
  chosen_spanish: hasta las puertas del cielo
  alternatives_spanish:
  - hasta las puertas del cielo
  - hasta los portales del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Puertas del cielo» conserva la imagen apocalíptica concreta y es plenamente inteligible en español. «Hasta» refleja la llegada al límite señalado.
theological_decisions:
- issue: Si el verso debe dejar ver la tensión entre la voz humana y la voz de la tierra
  english_pob_reading: The wording may be read either as the victims’ cry rising from the earth or as the earth itself crying out because of the bloodshed; the Ge'ez allows the line to evoke both.
  chosen_spanish_reading: 'La frase se deja con una ambigüedad reverente: el clamor puede oírse como el de las víctimas y, a la vez, como el de la tierra manchada por la violencia.'
  alternative_spanish_readings:
  - Solo el clamor de las víctimas ha llegado al cielo
  - Solo la tierra ha clamado hasta el cielo
  rationale: El contexto de la sección y la sintaxis del ge’ez permiten mantener ambas referencias sin resolverlas de manera prematura. La traducción española conserva esa tensión teológica en vez de cerrarla.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El estado de revisión más reciente simplificó la cláusula a una sola oración con «their cry has reached the gates of heaven», evitando una lectura que hacía clamar explícitamente a la tierra. Para el español se adopta esa forma breve y natural, pero se conserva en nota la ambigüedad reconocida por el audit trail y por el contexto del capítulo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se prefirió «clamor» en vez de «grito» para mantener el tono solemne y colectivo del verso.
  - «Puertas del cielo» se conserva de forma literal porque la imagen espacial es parte del sentido apocalíptico.
  - La puntuación respeta el discurso directo con comillas angulares habituales en español de registro bíblico.
