translation:
  language: es
  text: Y Semyaza[a], a quien diste autoridad para gobernar sobre los que están con él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede transliterarse 'Semjaza' o 'Shemyaza'.
    reason: lexical_alternative
  - marker: b
    text: La cláusula ge'ez aquí es textualmente difícil. La expresión final también puede entenderse como 'los que están unidos con él' o 'los asociados con él', probablemente los Vigilantes reunidos bajo su liderazgo.
    reason: textual_variant
lexical_decisions:
- source_word: ስምያዛ
  english_pob_choice: Semyaza
  chosen_spanish: Semyaza
  alternatives_spanish:
  - Semjaza
  - Shemyaza
  lexicon: Knibb
  rationale: Se conserva el nombre propio por transliteración, no por traducción, siguiendo la práctica del proyecto para nombres propios.
- source_word: ዘአንተ
  english_pob_choice: to whom you
  chosen_spanish: a quien tú
  alternatives_spanish:
  - a quien
  - a quien tú mismo
  lexicon: Dillmann
  rationale: El giro relativo en español requiere una construcción con 'a quien'. Mantengo el valor de dirección/dative del original y el pronombre explícito para conservar la segunda persona divina del pasaje.
- source_word: ወሀብኮ
  english_pob_choice: you gave
  chosen_spanish: le diste
  alternatives_spanish:
  - diste
  - le concediste
  - le otorgaste
  lexicon: Dillmann
  rationale: El contexto corregido exige segunda persona singular dirigida a Dios. 'Le diste' conserva el acto de concesión sin introducir una solemnidad ajena al registro.
- source_word: ስልጣነ
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  lexicon: Dillmann
  rationale: '''Autoridad'' reproduce bien la idea de poder delegado y evita exagerar hacia ''dominio'', que suena más absoluto.'
- source_word: ይኵንን
  english_pob_choice: to rule
  chosen_spanish: para gobernar
  alternatives_spanish:
  - para reinar
  - para mandar
  - para regir
  lexicon: Dillmann
  rationale: El verbo de la cláusula debe estar presente en español; 'gobernar' expresa la función de dirigir o ejercer autoridad. No reduzco el término a una preposición.
- source_word: እለ ምስሌሁ ኅቡረ
  english_pob_choice: those who are with him / those who are joined with him
  chosen_spanish: sobre los que están con él
  alternatives_spanish:
  - sobre los que están unidos con él
  - sobre sus compañeros
  - sobre los que se juntaron con él
  lexicon: Dillmann
  rationale: La frase adverbial describe acompañamiento o asociación. 'Los que están con él' es la forma más natural y menos interpretativa en español, preservando la ambigüedad entre estar con, asociados con, o reunidos con él.
theological_decisions:
- issue: Dirección del discurso y sujeto de la acción
  english_pob_reading: The angels address God; authority is something God gave to Semyaza.
  chosen_spanish_reading: 'Los ángeles siguen hablando a Dios: es Dios quien dio autoridad a Semyaza.'
  alternative_spanish_readings:
  - Semyaza, a quien tú le diste autoridad
  - Y Semyaza, a quien le diste autoridad
  rationale: La revisión crítica indica que la frase se dirige a Dios en segunda persona, no a Semyaza. La traducción debe conservar esa relación para no invertir sujeto y destinatario.
  doctrine_reference: Preservar la gramática y la dirección del discurso del texto fuente; primacía del original sobre una lectura heredada.
- issue: Alcance de la autoridad conferida
  english_pob_reading: delegated authority over the associated Watchers, not intrinsic dominion
  chosen_spanish_reading: autoridad para gobernar sobre un grupo asociado con él, como autoridad delegada
  alternative_spanish_readings:
  - poder sobre los que están con él
  - dominio sobre los que están con él
  rationale: '''Autoridad'' y ''gobernar'' conservan la idea de encargo delegado sin convertirla en soberanía absoluta. Se evita ''dominio'' para no sobrerrepresentar el alcance teológico.'
  doctrine_reference: Conservar la tensión teológica entre autoridad delegada y soberanía divina.
translation_notes:
  revision_awareness: El borrador inglés anterior fue revisado porque invertía sujeto y objeto; la lectura corregida entiende que los ángeles se dirigen a Dios y que el verbo central es 'gobernar'. También se corrigió la pérdida del matiz de compañía/asociación en la cláusula final.
  spanish_consistency_notes:
  - Se mantiene 'Semyaza' como transliteración estable de nombre propio.
  - Se usa 'autoridad' en lugar de 'poder' o 'dominio' para reflejar una concesión delegada.
  - Se conserva el registro bíblico sobrio y moderno, evitando calcos rígidos pero sin expandir el sentido más allá del texto.
  - No se emplea 'Señor' como sustituto de YHWH porque el pasaje no contiene el nombre divino en esta línea; aquí el referente es el pronombre de segunda persona del discurso.
