translation:
  language: es
  text: Has hecho todas las cosas[a], y autoridad sobre todo está contigo; y todas las cosas están descubiertas y puestas al descubierto delante de ti, y ves todas las cosas, y no hay nada que pueda esconderse de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «todas las cosas están descubiertas delante de ti y manifiestas». Las expresiones pareadas intensifican la imagen de exposición total ante Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ገበርከ
  english_pob_choice: have made
  chosen_spanish: has hecho
  alternatives_spanish:
  - has hecho
  - has formado
  - has creado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa hacer o obrar. En este contexto cósmico, 'has hecho' conserva la amplitud de la acción divina sin añadir con mayor fuerza la idea técnica de 'crear', que el verbo por sí solo no exige.
- source_word: ስልጣነ
  english_pob_choice: authority
  chosen_spanish: la autoridad
  alternatives_spanish:
  - el dominio
  - el poder
  - el gobierno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Autoridad'' refleja la fuerza de poder gobernante y legítimo, y en español suena natural en una confesión dirigida a Dios. Mantiene la relación entre soberanía y potestad sin volverla doctrinalmente abstracta.'
- source_word: ምስሌከ
  english_pob_choice: is with you
  chosen_spanish: está contigo
  alternatives_spanish:
  - está contigo
  - está con vosotros
  - te pertenece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión literal 'con ti' se conserva de modo natural con 'contigo'. Esto mantiene visible la construcción relacional del ge'ez, sin perder fluidez en español.
- source_word: ክሡት
  english_pob_choice: uncovered
  chosen_spanish: descubiertas
  alternatives_spanish:
  - descubiertas
  - desveladas
  - expuestas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Descubiertas'' comunica bien la imagen concreta de algo sin cobertura. Es una opción clara en español y permite mantener el paralelismo con ''desnudas''.'
- source_word: ግሁድ
  english_pob_choice: laid bare
  chosen_spanish: desnudas
  alternatives_spanish:
  - desnudas
  - expuestas
  - al descubierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Desnudas'' reproduce la intensificación imagética del par ge''ez. Junto con ''descubiertas'', conserva el doble énfasis de exposición total ante Dios, sin reducirlo a una sola idea abstracta.'
- source_word: ትሬኢ
  english_pob_choice: you see
  chosen_spanish: tú ves
  alternatives_spanish:
  - tú ves
  - tú miras
  - contemplas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Ves'' es la forma más directa y natural para el verbo de ver, y preserva el énfasis repetido en la omnivisión divina.'
- source_word: ዘይትከሀል
  english_pob_choice: that can
  chosen_spanish: que pueda
  alternatives_spanish:
  - que pueda
  - que sea capaz de
  - que logre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor es de capacidad o posibilidad. 'Que pueda' mantiene esa posibilidad negada de modo natural en español, sin introducir una formulación más técnica de capacidad.
- source_word: ይትኀባእ
  english_pob_choice: hide itself
  chosen_spanish: esconderse
  alternatives_spanish:
  - esconderse
  - ocultarse
  - quedarse oculto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez tiene un matiz reflexivo; en español, 'esconderse' comunica bien la autoocultación y reproduce la idea de que nada puede sustraerse de la mirada divina.
theological_decisions:
- issue: Preservar el lenguaje concreto de soberanía y conocimiento sin convertirlo en resumen doctrinal
  english_pob_reading: Retain the concrete language of making, authority, exposure, and seeing rather than abstract theological labels.
  chosen_spanish_reading: Conservar el lenguaje concreto de hacer, autoridad, exposición y ver, en vez de resumirlo como omnipotencia u omnisciencia.
  alternative_spanish_readings:
  - Tú eres omnipotente y omnisciente
  - Todo te es conocido
  rationale: El ge'ez expresa estas verdades mediante predicados concretos e imagísticos. El español mantiene esa forma fuente para no perder la tensión retórica ni sustituir la descripción por una etiqueta doctrinal posterior.
  doctrine_reference: Principio de primacía del texto original; preservar tensión teológica en vez de resolverla
- issue: Ajuste de la primera persona verbal para un texto de alabanza dirigido a Dios
  english_pob_reading: You have made all things
  chosen_spanish_reading: Tú has hecho todas las cosas
  alternative_spanish_readings:
  - Has hecho todas las cosas
  - Tú hiciste todas las cosas
  rationale: Se mantiene una forma de tratamiento directo a Dios y el valor perfecto del inglés. 'Has hecho' expresa acción completada con relevancia presente, adecuada para la alabanza.
  doctrine_reference: Convenciones de discurso reverencial en español; equivalencia aspectual
translation_notes:
  revision_awareness: La redacción sigue el texto ge'ez recibido y el audit trail inglés, especialmente la revisión que prefirió la formulación más natural 'can hide itself'. En español se reflejó ese valor con 'pueda esconderse', manteniendo el matiz de capacidad negada. También se preservó el paralelismo intensivo de 'uncovered and laid bare' mediante 'descubiertas y desnudas'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton; por eso no aplica aquí.
  - Se evitó 'SEÑOR' y también 'Cristo', porque el pasaje es una confesión sobre Dios sin vocabulario cristológico.
  - '''Autoridad'' conserva el sentido de gobierno legítimo sin forzar ''dominio'' o ''poder'', que en español podrían desbalancear el paralelismo del verso.'
  - '''Descubiertas y desnudas'' mantiene el doblet intensivo documentado en la nota inglesa; no se colapsó en ''conocidas'' para no borrar la imagen de exposición.'
