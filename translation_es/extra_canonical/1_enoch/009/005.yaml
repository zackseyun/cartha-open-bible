revisions:
- from: Tú has hecho todas las cosas[a], y la autoridad sobre todo está contigo; y todas las cosas están descubiertas y desnudas delante de ti, y tú ves todas las cosas, y no hay nada que pueda esconderse de ti.
  to: Has hecho todas las cosas[a], y autoridad sobre todo está contigo; y todas las cosas están descubiertas y puestas al descubierto delante de ti, y ves todas las cosas, y no hay nada que pueda esconderse de ti.
  rationale: 'Se hacen ajustes menores para reflejar con más precisión el expediente del POB inglés y mejorar la naturalidad del español: se elimina el artículo en «autoridad», se quita el pronombre explícito inicial por fluidez, y se reemplaza «desnudas» por «puestas al descubierto» para conservar la doble intensificación del ge''ez de forma más idiomática.'
  reviewer_model: gpt-5.4
