    rationale: El texto principal ya usa «Presenten nuestro caso», pero la nota dice «también puede entenderse como “Presenten nuestro caso”», lo que vuelve redundante y confusa la nota. Debe presentar solo alternativas reales como «nuestra causa» o «haznos justicia / tráenos justicia», explicando el matiz jurídico.
