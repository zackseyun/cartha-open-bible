translation:
  language: es
  text: 'Y ahora[a], a ustedes, los seres santos del cielo, las almas de los hombres presentan su súplica, diciendo: «Presenten nuestro caso[b] ante el Altísimo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y ahora mismo», «y en este momento». La partícula introduce un cambio discursivo-temporal sin precisar más la cronología.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Presenten nuestra causa ante el Altísimo»; también puede entenderse como «Tráennos justicia ante el Altísimo». El término ge''ez tiene un matiz jurídico y puede abarcar la idea de caso, causa o vindicación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora mismo
  - Y en este momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce un giro temporal-discursivo; «Y ahora» conserva el cambio retórico sin forzar una precisión temporal excesiva.
- source_word: ለክሙ
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - ante ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El dativo de destinatario en español se expresa naturalmente con «a ustedes», manteniendo el tono de apelación directa.
- source_word: ለቅዱሳነ ሰማይ
  english_pob_choice: the holy ones of heaven
  chosen_spanish: los seres santos del cielo
  alternatives_spanish:
  - los santos del cielo
  - los santos celestiales
  - los seres santos en el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Seres santos» preserva la referencia a entidades celestiales sin importar de entrada la categoría eclesial de «santos»; «del cielo» reproduce la relación genitiva y mantiene el marco apocalíptico.
- source_word: ይስእዩ
  english_pob_choice: make their plea
  chosen_spanish: elevan su pleito
  alternatives_spanish:
  - presentan su súplica
  - hacen su petición
  - elevan su ruego
  lexicon: Dillmann, Lexicon Linguae Aethiopicæ
  rationale: El verbo tiene valor de petición formal y jurídico; «elevan su pleito» conserva el registro forense que el contexto exige y evita rebajar la escena a una mera súplica devocional.
- source_word: ነፍሳተ ሰብእ
  english_pob_choice: the souls of men
  chosen_spanish: las almas de los hombres
  alternatives_spanish:
  - las almas humanas
  - las vidas de los hombres
  - las almas de seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Almas de los hombres» sigue de cerca la antropología del texto y mantiene el lenguaje de las víctimas muertas o clamantes.
- source_word: እንዘ ይብሉ
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - mientras dicen
  - al decir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula introductoria de discurso; «diciendo» es natural en español y suficientemente formal.
- source_word: አብኡ ለነ ፍትሐ
  english_pob_choice: Bring our case / Bring our justice / Present our case
  chosen_spanish: Presenten nuestro caso
  alternatives_spanish:
  - Traigan nuestra causa
  - Presenten nuestra causa
  - Hagan valer nuestro pleito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Caso» conserva el matiz jurídico y la apertura semántica de ፍትሕ/φρίσις en este contexto forense; evita cerrar el sentido en una sola lectura como «sentencia» o «justicia».
- source_word: ኀበ ልዑል
  english_pob_choice: before the Most High
  chosen_spanish: ante el Altísimo
  alternatives_spanish:
  - delante del Altísimo
  - ante el Más Alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ante el Altísimo» es la preposición más natural para la presentación de una causa en un tribunal celestial, y conserva la majestad del título.
theological_decisions:
- issue: Identidad de «los seres santos del cielo»
  english_pob_reading: heavenly holy beings/angels addressed by the souls of the dead
  chosen_spanish_reading: seres celestiales santos, entendidos de manera amplia y no como una categoría eclesial de «santos»
  alternative_spanish_readings:
  - ángeles
  - santos del cielo
  - los santos celestiales
  rationale: El pasaje presenta una escena de corte celestial; conviene mantener la ambigüedad controlada del texto sin convertirla en lenguaje de canonización o devoción posterior.
  doctrine_reference: Conservar la imaginería apocalíptica local y no imponer terminología eclesiástica posterior.
- issue: Sentido de ፍትሐ en la petición
  english_pob_reading: legal case / justice / vindication with forensic ambiguity
  chosen_spanish_reading: caso en sentido jurídico de petición o causa por ventilar ante el tribunal divino
  alternative_spanish_readings:
  - justicia
  - vindicación
  - causa
  rationale: 'El contexto es claramente forense: las almas apelan a una instancia superior. «Caso» deja abierta la tensión entre causa, justicia y vindicación sin resolverla prematuramente.'
  doctrine_reference: Preservar la tensión teológica y jurídica del texto en lugar de fijar una sola equivalencia.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el valor forense destacado por la tradición auditada. Tomé en cuenta la revisión más reciente en inglés, que prefirió «case» sobre «cause» para claridad; en español mantuve «caso» en el texto principal porque reproduce mejor la apertura semántica y la naturalidad moderna, mientras la nota conserva «causa» como alternativa legítima. También se evitó resolver la ambigüedad de ፍትሐ hacia una sentencia ya dictada.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para ኀበ ልዑል en coherencia con el registro reverente del texto.
  - Se usa «almas» para ነፍሳተ ሰብእ, conservando la antropología del pasaje.
  - «Pleito/caso/causa» se mantiene dentro del campo jurídico para no perder la fuerza forense del original.
  - No se emplea «SEÑOR» para el título divino, siguiendo la norma del proyecto de traducir el nombre divino explícitamente cuando aparezca; aquí el texto usa «Altísimo».
