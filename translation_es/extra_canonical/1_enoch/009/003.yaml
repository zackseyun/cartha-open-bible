    issue: «elevan su pleito» es poco idiomático en español actual
    rationale: Aunque intenta conservar el tono forense, la combinación verbal suena forzada y menos natural que otras opciones. El ge'ez expresa petición/apelación; en español, «presentan su súplica» o «hacen su petición» fluye mejor sin perder dignidad.
  - severity: medium
