translation:
  language: es
  text: Y entonces Miguel, Uriel, Rafael y Gabriel miraron hacia abajo desde el cielo y vieron mucha sangre siendo derramada sobre la tierra[a], y toda la transgresión que se cometía sobre la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘siendo derramada’. El verbo ge'ez es difícil; también puede entenderse como ‘siendo vertida’, y algunos intérpretes lo relacionan con la idea de sangre que clama. El texto principal conserva la imagen más inmediata de sangre sobre la tierra.
    reason: lexical_alternative
  - marker: b
    text: La repetición de ‘sobre la tierra’ se conserva para mantener el énfasis del verso en el ámbito terrestre como escenario de violencia y transgresión.
    reason: cultural_note
lexical_decisions:
- source_word: እሜሃ
  english_pob_choice: then
  chosen_spanish: y entonces
  alternatives_spanish:
  - entonces
  - luego
  - en ese momento
  lexicon: Dillmann
  rationale: Marca la transición temporal y narrativa con naturalidad en español, preservando la secuencia del relato.
- source_word: ሐወጹ
  english_pob_choice: looked down
  chosen_spanish: miraron desde el cielo
  alternatives_spanish:
  - miraron hacia abajo
  - miraron desde lo alto
  - se asomaron desde el cielo
  lexicon: Dillmann
  rationale: El ge'ez indica una visión dirigida desde arriba en contexto celestial; en español, ‘miraron desde el cielo’ conserva la perspectiva vertical sin sonar forzado.
- source_word: እምሰማይ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde el cielo arriba
  lexicon: Dillmann
  rationale: ‘Desde el cielo’ es una equivalencia transparente y natural para el ámbito celestial explícito del original.
- source_word: ወርእዩ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - contemplaron
  - miraron
  lexicon: Dillmann
  rationale: Verbo narrativo simple y directo, adecuado para mantener el tono visionario sin añadir matiz interpretativo.
- source_word: ብዙሐ ደመ
  english_pob_choice: much blood
  chosen_spanish: mucha sangre
  alternatives_spanish:
  - gran cantidad de sangre
  - mucha sangre derramada
  - mucho derramamiento de sangre
  lexicon: Dillmann
  rationale: El original dice literalmente ‘much blood’; ‘mucha sangre’ preserva la concreción del cuadro apocalíptico. Se evita sustituirlo por un resumen abstracto como ‘violencia’.
- source_word: ዘይትከዓው
  english_pob_choice: being poured out
  chosen_spanish: derramada
  alternatives_spanish:
  - vertida
  - siendo derramada
  - saliendo
  lexicon: Dillmann
  rationale: En español, con ‘sangre’, el participio ‘derramada’ expresa de forma natural la imagen de sangre esparcida o vertida sobre la tierra; mantiene la fuerza visual sin alargar innecesariamente la frase.
- source_word: በዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por encima de la tierra
  - sobre la superficie de la tierra
  lexicon: Dillmann
  rationale: Conserva la repetición locativa del verso y la escena terrestre como ámbito de la violencia y la transgresión.
- source_word: ኵሎ ዓመፃ
  english_pob_choice: all the lawlessness
  chosen_spanish: toda la iniquidad
  alternatives_spanish:
  - toda la maldad
  - toda la injusticia
  - toda la ilegalidad
  lexicon: Dillmann
  rationale: ‘Inequidad’ comunica el peso moral y judicial de ዓመፃ en un registro bíblico inteligible; ‘iniquidad’ evita estrechar el término solo a violencia física o mera ilegalidad civil.
- source_word: ዘይትገበር
  english_pob_choice: being done
  chosen_spanish: que se cometía
  alternatives_spanish:
  - que se hacía
  - que se realizaba
  - que estaba ocurriendo
  lexicon: Dillmann
  rationale: Para ἀ/ ge'ez relativo pasivo con valor continuo, ‘que se cometía’ suena más natural en español cuando el sustantivo es moralmente negativo, y preserva la idea de actos en curso.
- source_word: Michael / Mikael
  english_pob_choice: Michael
  chosen_spanish: Miguel
  alternatives_spanish:
  - Mikael
  - Michael
  lexicon: Project default for names
  rationale: En español bíblico, el nombre del arcángel se reconoce de manera estándar como ‘Miguel’; se adopta la forma usual en español por claridad y legibilidad, sin afectar el contenido del nombre.
theological_decisions:
- issue: 'Naturaleza de la escena: visión celestial de la corrupción terrestre'
  english_pob_reading: The angels look down from heaven and see blood poured out upon the earth and lawlessness being done upon the earth.
  chosen_spanish_reading: Los ángeles miran desde el cielo y ven sangre derramada y toda la iniquidad que se comete sobre la tierra.
  alternative_spanish_readings:
  - Los ángeles observan desde el cielo la violencia y la maldad sobre la tierra
  - Los ángeles miran desde el cielo y ven sangre vertida sobre la tierra y toda injusticia
  rationale: Se mantiene la simultaneidad entre observación celestial y realidad terrestre, sin convertir la escena en un resumen moralizante. ‘Sangre derramada’ conserva la materialidad del juicio y la violencia presentes en el texto.
  doctrine_reference: 'POB principle: preserve apocalyptic imagery and avoid flattening concrete visionary language into abstraction.'
- issue: Traducción de ዓመፃ
  english_pob_reading: lawlessness
  chosen_spanish_reading: iniquidad
  alternative_spanish_readings:
  - desobediencia
  - iniquidad
  - injusticia
  rationale: El término ge'ez abarca transgresión moral amplia. ‘Iniquidad’ comunica esa amplitud en español bíblico sin reducir el sentido a un solo aspecto jurídico o social.
  doctrine_reference: 'Lexical theology: retain broad moral-juridical force where present in the source.'
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión menor que estandarizó el nombre a ‘Michael’ y mantuvo intacta la lectura principal de la sangre ‘being poured out’ y de la ‘lawlessness’. La versión española sigue esa línea, pero adapta el nombre al uso bíblico normal del español (‘Miguel’) y traduce la imagen verbal con un participio natural (‘derramada’) que conserva la concreción del original.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y legible, evitando tanto el calco excesivo como la paráfrasis interpretativa.
  - Se conserva la repetición de ‘sobre la tierra’ para reflejar la insistencia del original.
  - ‘Iniquidad’ se usa aquí como equivalente amplio de ዓመፃ, no como término técnico dogmático restringido.
  - Los nombres angélicos se presentan en forma estándar española cuando existe una forma bíblica asentada y clara.
