base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/009/001.yaml
  text: And then Michael[a], Uriel, Raphael, and Gabriel looked down from heaven and saw much blood being poured out upon the earth[b], and all the lawlessness being done upon the earth.
  footnotes:
  - marker: a
    text: Or 'being shed.' The Ge'ez verb is difficult, and some interpreters connect it with the idea of blood crying out; the main text keeps the more immediate image of blood poured out upon the earth.
    reason: lexical_alternative
  - marker: b
    text: The repeated phrase 'upon the earth' is retained to preserve the verse's emphasis on the earthly sphere as the scene of violence and transgression.
    reason: cultural_note
