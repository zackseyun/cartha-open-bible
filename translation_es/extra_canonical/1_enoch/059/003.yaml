translation:
  language: es
  text: Y después de esto se me mostraron todas las cosas ocultas[a] de las luces[b] y de los relámpagos; fulguran para bendición y para abundancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «todas sus cosas ocultas», es decir, los aspectos ocultos de las luces y de los relámpagos.
    reason: lexical_alternative
  - marker: b
    text: «Luces» puede referirse específicamente a los luminares celestes en este contexto visionario.
    reason: cultural_note
lexical_decisions:
- source_word: ወእምድኅረዝ
  english_pob_choice: And after this
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Y después de aquello
  - Y luego de esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula marca transición temporal en la visión; «después de esto» conserva el orden apocalíptico sin volverse artificioso.
- source_word: ተርእየ / ትርእየ
  english_pob_choice: were shown to me
  chosen_spanish: me fueron mostradas
  alternatives_spanish:
  - me fueron reveladas
  - se me mostraron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ajuste revisado indica una voz pasiva/reflexiva, no un futuro activo. En español, «me fueron mostradas» refleja con claridad la pasiva y el dativo indirecto.
- source_word: ኵሉ ኅቡኣቲሆሙ
  english_pob_choice: all their hidden things
  chosen_spanish: todas las cosas ocultas
  alternatives_spanish:
  - todos sus secretos
  - todo lo oculto de ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cosas ocultas» sigue de cerca el valor literal de «hidden things» y evita convertir prematuramente el pasaje en un tecnicismo de «secretos».
- source_word: ለብርሃናት
  english_pob_choice: of the lights
  chosen_spanish: de las luces
  alternatives_spanish:
  - de los luminares
  - de los astros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Luces» conserva la amplitud del ge'ez y mantiene abierta la referencia cósmica sin imponer una identificación más estrecha que el texto no exige.
- source_word: ወለመባርቅት
  english_pob_choice: and of the lightnings
  chosen_spanish: y de los relámpagos
  alternatives_spanish:
  - y de los rayos
  - y de los fulgores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pluralidad del término se puede representar naturalmente con «relámpagos», que mantiene la imagen vívida y no la abstrae.
- source_word: ይበርቁ
  english_pob_choice: they flash forth
  chosen_spanish: resplandecen
  alternatives_spanish:
  - irrumpen con fulgor
  - fulguran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo apunta a brillar o relampaguear; «resplandecen» es idiomático en español y conserva el sentido de manifestación luminosa continua.
theological_decisions:
- issue: Relación entre «cosas ocultas» y «secretos» en un contexto apocalíptico
  english_pob_reading: all their hidden things
  chosen_spanish_reading: todas las cosas ocultas
  alternative_spanish_readings:
  - todos sus secretos
  rationale: La fuente ge'ez dice literalmente «cosas ocultas». Se preserva esa tensión semántica sin cerrar el pasaje en un lenguaje técnico que el texto base no exige explícitamente.
  doctrine_reference: 'POB translation philosophy §3: preservar la tensión teológica/lexical en vez de resolverla prematuramente.'
- issue: Función de «para bendición y para abundancia»
  english_pob_reading: they flash for blessing and for abundance
  chosen_spanish_reading: resplandecen para bendición y para abundancia
  alternative_spanish_readings:
  - resplandecen como bendición y abundancia
  - resplandecen con bendición y abundancia
  rationale: La construcción con propósito se conserva con «para». «Bendición» y «abundancia» siguen el valor del texto y no introducen una interpretación de prosperidad ajena al testimonio.
  doctrine_reference: 'POB translation philosophy §3: mantener el valor relacional y final de las expresiones del original.'
translation_notes:
  revision_awareness: 'Ajusté la sintaxis española para reflejar la revisión crítica del inglés POB: el verbo principal es pasivo («me fueron mostradas»), «de las luces y de los relámpagos» depende de «las cosas ocultas», y «para bendición y para abundancia» expresa finalidad, no un simple genitivo. También corrigí la anclación de notas para que cada marcador aparezca en el texto.'
  spanish_consistency_notes:
  - Uso de «luces» para ለብርሃናት, siguiendo la apertura semántica del original y la práctica POB.
  - Uso de «relámpagos» para መባርቅት, preservando el plural y la imaginería cósmica.
  - «Bendición» y «abundancia» se mantienen como sustantivos abstractos, sin desplazar el sentido hacia prosperidad económica.
  - Se evitó «Cristo», «Señor» u otras sustituciones no motivadas por el texto.
  - La pasiva española «me fueron mostradas» refleja el cambio corregido desde la lectura errónea de una activa/futura en el borrador inglés.
