translation:
  language: es
  text: En aquellos días mis ojos vieron los secretos[a] de los relámpagos y de las luces, y su curso[b], y destellan[c] para bendición y para maldición[d], como ha querido el Señor de los Espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '‘Secretos’ traduce el sentido adjudicado de ኅቡኣተ: cosas ocultas o misterios revelados, no ‘tesoros’ ni ‘depósitos’.'
    reason: lexical_alternative
  - marker: b
    text: O ‘su orden’ o ‘su recorrido’. El término apunta al movimiento o disposición regulada de estos fenómenos celestes.
    reason: lexical_alternative
  - marker: c
    text: O ‘resplandecen’. ‘Destellan’ expresa mejor el fulgor repentino sugerido por el contexto de relámpagos.
    reason: spanish_style_note
  - marker: d
    text: ‘Maldición’ mantiene la polaridad del original; también podría entenderse como ‘para maldecir’, pero el singular suena más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Follows the established apocalyptic temporal formula with a dignified Spanish equivalent that preserves the visionary register.
- source_word: ርእያ አዕይንትየ
  english_pob_choice: my eyes saw
  chosen_spanish: mis ojos vieron
  alternatives_spanish:
  - yo vi
  - la visión de mis ojos vio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the explicit mention of the eyes while keeping Spanish natural and not overly wooden.
- source_word: ኅቡኣተ
  english_pob_choice: secrets
  chosen_spanish: secretos
  alternatives_spanish:
  - cosas ocultas
  - tesoros ocultos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adjusted to the adjudicated reading 'secrets' rather than 'storehouses'; this matches the Ge'ez term for hidden things and preserves the revelation-of-mysteries sense.
- source_word: መባርቅት
  english_pob_choice: lightnings
  chosen_spanish: relámpagos
  alternatives_spanish:
  - rayos
  - centellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Relámpagos'' is a transparent modern equivalent for the plural lightning imagery.'
- source_word: ብርሃናት
  english_pob_choice: lights
  chosen_spanish: luces
  alternatives_spanish:
  - lumbreras
  - luminarias
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the broad plural of luminous heavenly phenomena without narrowing the referent too much.
- source_word: አክኒሆሙ
  english_pob_choice: their courses
  chosen_spanish: sus cursos
  alternatives_spanish:
  - su orden
  - su recorrido
  - su curso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reflects the revised audit decision that the term denotes the regulated celestial course or movement, not 'judgments' or 'ordinance' in this verse.
- source_word: ወይበርቁ
  english_pob_choice: and they flash forth
  chosen_spanish: y ellas resplandecen
  alternatives_spanish:
  - y ellas destellan
  - y ellas relampaguean
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Spanish 'resplandecen' is a natural rendering that can cover the visible shining/flash of the phenomena while remaining readable in a liturgical register.
- source_word: ለበረከት ወለመረገም
  english_pob_choice: for blessing and for curse
  chosen_spanish: para bendición y para maldición
  alternatives_spanish:
  - para bendición y para maldecir
  - para bendición y para una maldición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the stark polarity of the source; 'maldición' is the most direct and dignified Spanish equivalent of 'curse' here.
- source_word: በከመ ፈቀደ
  english_pob_choice: as ... has willed
  chosen_spanish: como ha querido
  alternatives_spanish:
  - como ha querido el Señor de los Espíritus
  - según ha dispuesto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys conformity to divine volition in idiomatic Spanish, preserving the governing agency of God.
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Dueño de los Espíritus
  - el Señor de espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the fixed Enochic divine title in a form natural for Spanish and consistent with the source's majesty.
theological_decisions:
- issue: Cosmic phenomena as instruments of divine governance rather than mere natural events
  english_pob_reading: The lightnings and lights act for both blessing and curse under the will of the Lord of Spirits.
  chosen_spanish_reading: Los relámpagos y las luces actúan dentro de un orden querido por el Señor de los Espíritus, para bendición y para maldición.
  alternative_spanish_readings:
  - Las luces solo describen fenómenos naturales sin función moral.
  - El texto podría leerse como una descripción poética sin agencia divina explícita.
  rationale: The verse grounds the phenomena in divine willing and gives them a dual function of blessing/curse; the Spanish should preserve that theological causality and not reduce the line to mere cosmology.
  doctrine_reference: Apocalyptic cosmology and divine sovereignty in 1 Enoch; preserve judgment/blessing polarity.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente que corrigió ኅቡኣተ a ‘secrets’ y አክኒሆሙ a ‘courses’; por eso no se conservan las lecturas anteriores de ‘storehouses/treasuries’ ni ‘judgments/ordinance’. La traducción española se ajusta a esa lectura final y evita sobreinterpretar el término celestial.
  spanish_consistency_notes:
  - Se preservó el título eocnico fijo ‘el Señor de los Espíritus’ de manera uniforme.
  - Se mantuvo la pluralidad de los fenómenos celestes (‘relámpagos’, ‘luces’).
  - Se evitó introducir ‘Cristo’ o ‘SEÑOR’ como máscara convencional; el nombre/título divino queda explícito según la pauta del proyecto.
  - La polaridad ‘bendición / maldición’ se mantuvo sin suavizarse, conforme al valor judicial del verso.
