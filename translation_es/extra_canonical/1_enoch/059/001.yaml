  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. ‘Señor de los Espíritus’ mantiene el título enoquita fijo. ‘Secretos’, ‘relámpagos’, ‘luces’, ‘bendición’ y ‘maldición’ están bien encaminados. La principal mejora es estilístico-lexical: evitar ‘cursos’ en plural y preferir un verbo de fulgor más preciso.'
