translation:
  language: es
  text: Y allí vi los lugares ocultos del trueno, y cómo, cuando retumba en la altura del cielo, se oye su sonido; y me mostró las moradas de la tierra seca[a], y el sonido del trueno[b], ya sea para paz y bendición o para maldición, conforme a la palabra del Señor de los Espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión traducida «las moradas de la tierra seca» es textual y léxicamente difícil; también puede referirse más generalmente a los lugares habitados de la tierra.
    reason: lexical_alternative
  - marker: b
    text: Un sintagma entre corchetes en el testimonio repite «y el sonido del trueno»; la repetición puede ser original o reflejar una expansión escribal, pero se representa en la cláusula final de la traducción.
    reason: textual_variant
lexical_decisions:
- source_word: ኅቡኣተ
  english_pob_choice: hidden places
  chosen_spanish: lugares ocultos
  alternatives_spanish:
  - sitios ocultos
  - moradas ocultas
  - lugares secretos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede designar cosas o lugares escondidos. En este contexto apocalíptico, con referencia al trueno, conviene conservar el valor locativo sin volverlo abstracto; 'lugares ocultos' refleja bien el matiz de espacios escondidos.
- source_word: ነጐድጓድ
  english_pob_choice: thunder
  chosen_spanish: trueno
  alternatives_spanish:
  - tempestad
  - tormenta eléctrica
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo denota propiamente el trueno. Mantener 'trueno' preserva el foco del pasaje en el sonido y su efecto, sin ampliar innecesariamente a 'tormenta'.
- source_word: ይደቅቅ
  english_pob_choice: it crashes
  chosen_spanish: retumba
  alternatives_spanish:
  - crashea
  - se estrella
  - truena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa impacto, golpe o estruendo violento. En español, 'retumba' comunica el estrépito y la fuerza sonora de modo natural y digno.
- source_word: መልዕልተ ሰማይ
  english_pob_choice: in the height of heaven
  chosen_spanish: en la altura del cielo
  alternatives_spanish:
  - en la altura de los cielos
  - en lo alto del cielo
  - en la cima del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cadena constructa señala la altura o cumbre del cielo. 'En la altura del cielo' conserva la imagen vertical sin introducir una preposición de origen que no está en el ge'ez.
- source_word: ተመመንደርት የብስ
  english_pob_choice: the dwellings of the dry land
  chosen_spanish: las moradas de la tierra seca
  alternatives_spanish:
  - las moradas de la tierra
  - los lugares habitados de la tierra seca
  - las viviendas de la tierra seca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es difícil y puede aludir a las moradas o lugares habitados de la tierra seca. 'Moradas de la tierra seca' conserva el giro y la rareza del original sin normalizarlo excesivamente.
- source_word: አስተአርአየኒ
  english_pob_choice: he showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me enseñó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El causativo significa de forma directa 'mostrar'. 'Me mostró' mantiene el estilo visionario sencillo y fiel al agente explícito.
- source_word: ለሰላም
  english_pob_choice: for peace
  chosen_spanish: para paz
  alternatives_spanish:
  - para bienestar
  - para tranquilidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Paz'' preserva la resonancia teológica y cósmica del término. En español, ''para paz'' es algo más sobrio que ''para la paz'' y mantiene la parataxis del original.'
- source_word: ለበረከት
  english_pob_choice: for blessing
  chosen_spanish: y bendición
  alternatives_spanish:
  - y para bendición
  - y para una bendición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición se sobreentiende por la serie coordinada en español; 'bendición' conserva el paralelismo con 'paz' y la fuerza nominal del sustantivo.
- source_word: ለረገም
  english_pob_choice: for a curse
  chosen_spanish: para maldición
  alternatives_spanish:
  - para una maldición
  - para maldecir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo expresa maldición o execración. 'Maldición' conserva el tono judicial del contraste con 'paz y bendición'.
- source_word: በቃለ እግዚአ መናፍስት
  english_pob_choice: according to the word of the Lord of Spirits
  chosen_spanish: conforme a la palabra del Señor de los Espíritus
  alternatives_spanish:
  - según la palabra del Señor de los Espíritus
  - por la palabra del Señor de los Espíritus
  - con la palabra del Señor de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica que el efecto del trueno está regido por el decreto o palabra divina. 'Conforme a la palabra' preserva la noción normativa sin reducirla a mera comunicación.
theological_decisions:
- issue: Función del trueno como instrumento benéfico o punitivo
  english_pob_reading: Thunder is portrayed as an instrument whose effect may be peace, blessing, or curse under divine decree.
  chosen_spanish_reading: El trueno aparece como instrumento cuyo efecto puede ser paz, bendición o maldición, bajo la palabra del Señor de los Espíritus.
  alternative_spanish_readings:
  - El trueno solo acompaña anuncios de paz, bendición o maldición.
  - Se trata de distintos sonidos del trueno que señalan resultados diferentes.
  rationale: La sintaxis vincula el sonido del trueno con resultados determinados por la palabra divina. La traducción conserva esa ambigüedad cósmico-judicial sin reducir el pasaje a meteorología.
  doctrine_reference: Conservar la tensión teológica y no resolverla prematuramente.
- issue: Título divino እግዚአ መናፍስት
  english_pob_reading: Lord of Spirits
  chosen_spanish_reading: Señor de los Espíritus
  alternative_spanish_readings:
  - Señor de los espíritus
  - Señor de Espíritu
  rationale: Es el título establecido en 1 Enoc y conviene mantenerlo de manera consistente. 'Señor de los Espíritus' conserva la forma titulativa y la mayúscula respeta la referencia divina.
  doctrine_reference: Consistencia terminológica de títulos divinos en literatura enóquica.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el estado revisado del POB inglés, pero corrige el matiz cosmológico de መልዕልተ ሰማይ como 'altura del cielo' en lugar de una formulación con 'from above'. También conserva la coordinación 'paz y bendición o maldición' sin sobreexplicar la relación entre los efectos del trueno y el decreto divino.
  spanish_consistency_notes:
  - Se mantuvo 'Señor de los Espíritus' para el título fijo de 1 Enoc.
  - Se usó 'trueno' en vez de un término más amplio como 'tormenta' para respetar el foco léxico del original.
  - Se preservó 'maldición' como contraste judicial con 'paz y bendición'.
  - Se evitó 'SEÑOR' en mayúsculas como sustituto de nombre divino, conforme al criterio del proyecto.
