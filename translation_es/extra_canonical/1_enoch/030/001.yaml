translation:
  language: es
  text: Y sobre ellos, sobre aquellos montes del oriente[b], no lejos, vi otro lugar, un valle de aguas[c], como si no se agotara[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto etiópico es difícil al final del versículo. La cláusula final puede significar «como si no pudiera drenarse» o «como si no se agotara».
    reason: lexical_alternative
  - marker: b
    text: El etiópico presenta incertidumbre en la forma de «montes»; también es posible leer simplemente «los montes».
    reason: textual_variant
  - marker: c
    text: 'O: «por encima de aquellos montes, vi otro lugar, un valle de aguas, no lejos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ላዕሌሁ / ላዕለ
  english_pob_choice: above
  chosen_spanish: por encima de
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición de la preposición marca elevación espacial en la geografía visionaria. «Por encima de» conserva bien la relación de altura sin sonar demasiado rígido en español.
- source_word: እሙንቱ
  english_pob_choice: them
  chosen_spanish: ellos
  alternatives_spanish:
  - aquellos
  - esos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pronombre remite a elementos previamente vistos. En español, «ellos» mantiene la anáfora; se acompaña con «aquellos» en el sintagma siguiente para reflejar mejor la deixis distante.
- source_word: ተደብረ
  english_pob_choice: their mountains
  chosen_spanish: aquellos montes
  alternatives_spanish:
  - los montes
  - sus montes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El testimonio presenta incertidumbre morfológica y textual. Dado el ajuste del audit trail inglés, se opta por una forma española que conserve la referencia a montes sin forzar una posesión dudosa; «aquellos» ayuda a reflejar la distancia demostrativa del contexto.
- source_word: ጽባሕ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - he visto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto funciona como fórmula visionaria. «Vi» es la forma natural y directa en español para el testimonio de percepción del vidente.
- source_word: መካነ ካልአ
  english_pob_choice: another place
  chosen_spanish: otro lugar
  alternatives_spanish:
  - un segundo lugar
  - otra región
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lugar» conserva el valor locativo básico de መካነ y «otro» reproduce ካልአ sin sobrerregularizar el matiz secuencial.
- source_word: ቈላ
  english_pob_choice: valley
  chosen_spanish: valle
  alternatives_spanish:
  - cañada
  - hondonada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa una depresión del terreno. «Valle» es la opción más amplia y clara para el lector hispanohablante.
- source_word: ማያት
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  - corrientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural se preserva con «aguas», que mantiene el tono imagético y evita reducir el sentido a una sola masa de agua o a corrientes específicas.
- source_word: አኮ ርሑቀ
  english_pob_choice: not far away
  chosen_spanish: no lejos
  alternatives_spanish:
  - no estaba lejos
  - a poca distancia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa proximidad relativa. «No lejos» reproduce con sobriedad el valor espacial sin añadir interpretación.
- source_word: ከመ ዘኢይትዌጸእ
  english_pob_choice: as though it were inexhaustible
  chosen_spanish: como si no se agotara
  alternatives_spanish:
  - como si no pudiera agotarse
  - como si no se vaciara
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula es difícil en etiópico. En español, «como si no se agotara» conserva la idea de inagotabilidad sin sobreprecisar el mecanismo (drenarse, vaciarse, acabarse).
theological_decisions:
- issue: Conservar la geografía visionaria como espacio concreto y no alegorizado
  english_pob_reading: 'Render the landscape as an actual seen place within the vision: ''another place, a valley of waters'''
  chosen_spanish_reading: «otro lugar, un valle de aguas»
  alternative_spanish_readings:
  - «un lugar con agua»
  - una lectura simbólica del valle
  rationale: El pasaje presenta topografía revelada. Mantener la concreción espacial preserva el carácter apocalíptico del texto y evita aplanarlo en una formulación general.
  doctrine_reference: 'Poética apocalíptica: preservar la imaginería visionaria sin alegorizarla.'
- issue: Reflejar la ambigüedad textual del cierre sin resolverla de forma artificial
  english_pob_reading: The final clause may mean 'as though it could not be drained' or 'as though it did not run out.'
  chosen_spanish_reading: «como si no se agotara»
  alternative_spanish_readings:
  - «como si no pudiera drenarse»
  - «como si no se vaciara»
  rationale: El etiópico es difícil y admite más de una paráfrasis. La traducción española mantiene la tensión semántica de inexhaustibilidad sin imponer una solución cerrada.
  doctrine_reference: 'Principio de transparencia textual: preservar incertidumbre donde la base textual la presenta.'
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: la mención de «oriente» fue restituida y la secuencia sintáctica ajustada para reflejar mejor el orden del ge''ez. La versión española sigue esa lectura revisada, pero conserva la ambigüedad del cierre y la tensión textual sobre la relación exacta de los «montes».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o vocabulario teológico ajeno, porque el verso es descriptivo y geográfico.
  - «Aguas» conserva el plural del original y el tono visionario.
  - La expresión «por encima de» se usa de manera consistente para la localización espacial elevada.
  - Se opta por un español moderno y sobrio, evitando arcaísmos innecesarios.
