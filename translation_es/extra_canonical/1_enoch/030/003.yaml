  glossary_alignment: No hay términos del glosario teológico principal implicados aquí. La decisión 'canela' para ቀናንሞስ concuerda con la justificación léxica documentada. 'Oriente' es una opción española digna y fiel para ጽባሕ. 'Bordes' alinea correctamente con la revisión inglesa que precisó 'edges'.
