translation:
  language: es
  text: Y junto a los bordes de aquellos valles vi canela fragante, y más allá de ellos me dirigí hacia el oriente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መንገለ
  english_pob_choice: by the side of / beyond / toward
  chosen_spanish: junto a / más allá de / hacia
  alternatives_spanish:
  - al lado de
  - más allá
  - en dirección a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El formativo preposicional aparece tres veces con fuerza local distinta: cercanía espacial, paso más allá de un punto de referencia y dirección de movimiento. En español, ‘junto a’, ‘más allá de’ y ‘hacia’ preservan esa variedad sin sonar forzados.'
- source_word: ክንፈሩ
  english_pob_choice: edge
  chosen_spanish: bordes
  alternatives_spanish:
  - orillas
  - bordes
  - lados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto topográfico, el término se refiere al borde o borde exterior de los valles, no a un ‘ala’ literal. ‘Bordes’ refleja mejor la precisión de la revisión inglesa.
- source_word: ቈላት
  english_pob_choice: valleys
  chosen_spanish: valles
  alternatives_spanish:
  - wadis
  - quebradas
  - ravines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Valles’ es la equivalencia natural y clara en español para un término geográfico de paisaje visionario.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - vi
  - contemplé
  - observé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma narrativa en primera persona se expresa de manera directa y fluida con ‘vi’, manteniendo el tono visionario sin añadir solemnidad no requerida.
- source_word: ቀናንሞስ
  english_pob_choice: cinnamon
  chosen_spanish: canela
  alternatives_spanish:
  - canelo
  - cassia
  - canela
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El préstamo ge'ez designa una especia aromática identificable como canela/cassia. ‘Canela’ es la forma española más clara y natural para el lector.
- source_word: ዘመዓዛ
  english_pob_choice: fragrant
  chosen_spanish: fragante
  alternatives_spanish:
  - fragante
  - aromática
  - de buen olor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo destaca el aroma del objeto visto. ‘Fragante’ conserva el valor sensorial de manera sobria y digna.
- source_word: ቀረብኩ
  english_pob_choice: I went / I came near
  chosen_spanish: fui
  alternatives_spanish:
  - me acerqué
  - fui
  - me dirigí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa optó por ‘I went’ para una progresión narrativa natural. En español, ‘fui’ funciona bien con ‘hacia el oriente’ y conserva el movimiento sin añadir un matiz de llegada o aproximación excesivo.
- source_word: ጽባሕ
  english_pob_choice: the east
  chosen_spanish: el oriente
  alternatives_spanish:
  - el oriente
  - el este
  - hacia el este
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Oriente’ es una forma digna y plenamente inteligible en español bíblico, además de conservar el valor direccional y geográfico del original.
theological_decisions:
- issue: Concreción del elemento aromático en un paisaje visionario
  english_pob_reading: cinnamon
  chosen_spanish_reading: canela
  alternative_spanish_readings:
  - cassia
  - una planta aromática
  - canela
  rationale: El texto enumera rasgos concretos del paisaje apocalíptico; por eso conviene mantener un referente específico. ‘Canela’ comunica mejor el préstamo etiópico que una paráfrasis genérica.
  doctrine_reference: Preservar la imaginería visionaria concreta sin suavizarla a una descripción abstracta.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa (‘And by the edges of those valleys I saw fragrant cinnamon, and beyond them I went toward the east.’) y corrige la anterior ambigüedad de ‘by the side’/‘came near’ con un español más natural y exacto. No se añadieron notas porque el verso puede comunicarse con claridad sin ambigüedades textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico moderno y digno, evitando calcos innecesarios.
  - ‘Oriente’ se usa como equivalente geográfico estilísticamente apropiado para textos visionarios.
  - No se recurrió a ‘Señor’ ni a terminología teológica no presente en el verso.
  - La imagen aromática se conservó concreta, sin generalizarla a ‘planta’ o ‘especia’.
