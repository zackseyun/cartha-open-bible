lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal visionaria se traduce de manera directa y natural con «vi», conservando la secuencia narrativa apocalíptica que marca el prefijo conjuntivo.
- source_word: ዕፀ ሠናየ
  english_pob_choice: a beautiful tree
  chosen_spanish: un árbol hermoso
  alternatives_spanish:
  - un árbol bello
  - un árbol bueno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo significa «árbol/madera» y el adjetivo expresa belleza o bondad; «hermoso» suena natural en español y mantiene el valor descriptivo.
- source_word: ዘይመስል
  english_pob_choice: which resembled
  chosen_spanish: que se parecía
  alternatives_spanish:
  - que semejaba
  - que era como
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción relativa comparativa del ge'ez pide una expresión de semejanza explícita. «Se parecía» preserva el verbo de comparación que el audit trail inglés corrigió al eliminar la paráfrasis de «whose fragrance was like».
- source_word: ዕፀ መዓዛ
  english_pob_choice: fragrant tree
  chosen_spanish: árbol fragante
  alternatives_spanish:
  - árbol aromático
  - árbol de fragancia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto, la frase apunta al árbol caracterizado por su aroma, no a una especie independiente. «Árbol fragante» conserva la imagen literal sin volverla rígida en español.
- source_word: ከመ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Partícula comparativa estándar; «como» es la equivalencia más directa y clara en español.
- source_word: እንተ ዘስኪኖን
  english_pob_choice: mastic tree
  chosen_spanish: el árbol de lentisco
  alternatives_spanish:
  - el árbol de almácigo
  - el mastic
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El nombre botánico es incierto, pero el consenso léxico apunta a mastic/lentisco. «Lentisco» comunica la referencia vegetal en español; se evita imponer una identificación más fuerte de la que permite el texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección del audit trail inglés que recupera la estructura comparativa explícita del ge''ez: no se reduce a un giro posesivo sobre el aroma, sino que mantiene la idea de un árbol que «se parecía» a un árbol fragante. También se conservó la incertidumbre botánica final mediante una nota.'
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar la continuidad narrativa del original.
  - Se evita «SEÑOR» o fórmulas teológicas ajenas porque el verso no contiene vocabulario divino.
  - «Árbol fragante» y «árbol de lentisco» preservan la tensión entre descripción general y posible identificación botánica.
