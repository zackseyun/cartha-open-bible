translation:
  language: es
  text: Y vi un árbol hermoso, que se parecía a un árbol fragante[a], como el árbol de lentisco[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que tenía un aroma semejante al del lentisco».'
    reason: alternative_reading
  - marker: b
