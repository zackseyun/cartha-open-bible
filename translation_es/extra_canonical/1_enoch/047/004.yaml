review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del Ge''ez y mantiene las decisiones principales: ''corazones'', ''gozo'', ''número'', ''oración'', y el título enóquico. Sin embargo, en el último miembro no refleja el estado final del audit trail en inglés, que ya revisó ተፈቅደ a ''has been avenged'' por mejor precisión contextual. ''Ha sido reclamada'' conserva parte del matiz forense, pero en español suena incompleto con ''la sangre'' como sujeto y debilita la vindicación explícita que el registro auditado finalmente adoptó.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay varios ajustes menores de naturalidad y fidelidad al proyecto: ''serán llenados'' suena menos natural que ''se llenarán''; ''los santos'' introduce más sobretono eclesiástico que ''los santos/los consagrados'', aunque aquí no es necesariamente erróneo; y la nota [a] está mal anclada semánticamente, porque comenta ''el número/recuento de los justos'' pero está colocada tras ''gozo''. Además, la nota [c] invierte la relación principal/alternativa: en español común ''escuchada'' es más natural como alternativa de ''oída'', pero no es un problema mayor.'
  glossary_alignment: 'No hay conflicto con terminología de proyecto como Yahvé/Mesías. Sí conviene alinear mejor ቅዱሳን con la preferencia auditada ''holy ones'' mediante ''los santos'' o mejor ''los santos/los consagrados''; el borrador usa ''los santos'', aceptable pero algo más cargado. La decisión clave a corregir es ተፈቅደ: el español debe seguir la revisión auditada final con ''ha sido vengada'' o equivalente claro de vindicación, no ''ha sido reclamada'' en el texto principal.'
  issues:
  - severity: medium
    issue: La traducción principal de ተፈቅደ no sigue la revisión auditada final.
    rationale: El historial inglés terminó en 'has been avenged', no en 'has been required/reclaimed'. Dado que el proyecto usa el audit trail como contexto normativo revisado, el español principal debe reflejar esa decisión final, dejando el matiz forense como nota si se desea.
  - severity: medium
    issue: La nota [a] está colocada en el lugar equivocado.
    rationale: El contenido de la nota trata sobre 'el número de los justos' o su sentido judicial, pero el marcador aparece tras 'gozo'. Esto desorienta al lector y rompe la disciplina de anclaje.
  - severity: low
    issue: '''Serán llenados de gozo'' es menos natural que una formulación reflexiva en español.'
    rationale: '''Se llenarán de gozo'' conserva el sentido y suena más idiomático en español bíblico moderno.'
  - severity: low
    issue: La nota [c] como alternativa 'ha sido escuchada' no añade mucho valor.
    rationale: No es incorrecta, pero la diferencia entre 'oída' y 'escuchada' es leve. Puede mantenerse por continuidad con el POB inglés, aunque no es imprescindible.
  revised_spanish_text: Y los corazones de los santos se llenarán de gozo, porque el número[a] de los justos se ha acercado, y la oración de los justos ha sido oída[c], y la sangre de los justos ha sido vengada[b] delante del Señor de los Espíritus.
  revised_footnotes:
