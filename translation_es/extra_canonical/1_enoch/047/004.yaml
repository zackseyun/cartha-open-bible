translation:
  language: es
  text: Y los corazones de los santos se llenarán de gozo, porque el número[a] de los justos se ha acercado, y la oración de los justos ha sido oída[c], y la sangre de los justos ha sido vengada[b] delante del Señor de los Espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el recuento de los justos se ha acercado», si el sustantivo se entiende en un sentido más judicial y no meramente numérico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha sido reclamada» o «ha sido requerida», con matiz forense de exigir cuentas por la sangre derramada.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «ha sido escuchada».'
    reason: previous_rendering
lexical_decisions:
- source_word: ልቦሙ
  english_pob_choice: their hearts
  chosen_spanish: los corazones de los santos
  alternatives_spanish:
  - sus corazones
  - su interior
  - sus vidas interiores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El Ge'ez usa el plural posesivo con el sustantivo 'corazones' para el asiento de la emoción y el pensamiento. En español, 'los corazones de los santos' conserva la imagen concreta y el paralelismo bíblico, y 'santos' reproduce bien ቅዱሳን en este contexto apocalíptico.
- source_word: ቅዱሳን
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos consagrados
  - los consagrados
  - los santos de Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés POB prefirió 'holy ones' para evitar un matiz eclesiástico posterior, en español 'santos' es el equivalente más natural y transparente para este grupo apocalíptico. Aquí no se introduce una devoción posterior, sino un término bíblico para los consagrados de Dios.
- source_word: ትመልእ ፍሥሐ
  english_pob_choice: shall be filled with joy
  chosen_spanish: serán llenados de gozo
  alternatives_spanish:
  - estarán llenos de gozo
  - serán colmados de alegría
  - se llenarán de gozo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Serán llenados'' refleja con claridad la pasiva/futura del verbo; ''gozo'' mantiene el registro elevado y bíblico, cercano a ''joy'' sin volverlo arcaico. La elección conserva el movimiento de plenitud emocional del verso.'
- source_word: ቀርበ
  english_pob_choice: has drawn near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - ha llegado cerca
  - está cerca
  - ha llegado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto comunica proximidad ya alcanzada o inminencia realizada. 'Se ha acercado' es natural en español y mantiene el matiz de cercanía apocalíptica sin simplificarlo a una mera localización temporal.
- source_word: ኍልቈ ለጻድቅ
  english_pob_choice: the number of the righteous
  chosen_spanish: el número de los justos
  alternatives_spanish:
  - la cuenta de los justos
  - el recuento de los justos
  - la reckoning de los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Número'' sigue de cerca el valor básico del sustantivo y permite la lectura de un total fijado o cumplido. ''Justos'' corresponde a ጻድቅ / ጻድቃን y encaja bien con el tono judicial del pasaje.'
- source_word: ጻድቅ / ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los rectos de corazón
  - los justificados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Justos'' es el equivalente bíblico estándar y conserva la fuerza moral/judicial del término. ''Righteous'' en POB combina rectitud ética y vindicación; en español ''justos'' transmite ambos rasgos mejor que opciones más explicativas.'
- source_word: ጸሎቶሙ ተሰምዐ
  english_pob_choice: the prayer of the righteous has been heard
  chosen_spanish: la oración de los justos ha sido oída
  alternatives_spanish:
  - su oración ha sido oída
  - las oraciones de los justos han sido oídas
  - su plegaria ha sido escuchada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el singular colectivo 'la oración' tal como el Ge'ez usa una forma singular con posesivo plural. 'Ha sido oída' refleja el pasivo sin añadir énfasis interpretativo; 'oída' es más sobrio que 'escuchada' y mantiene el paralelismo del verso.
- source_word: ደሙ ለጻድቅ
  english_pob_choice: the blood of the righteous
  chosen_spanish: la sangre de los justos
  alternatives_spanish:
  - la sangre de los justos inocentes
  - su sangre
  - la sangre del justo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque la forma ge'ez puede leerse de manera singular en la construcción, el contexto colectivo del pasaje favorece una traducción plural sin perder el motivo de la sangre derramada. 'Sangre' mantiene la imagen de víctima y vindicación.
- source_word: ተፈቅደ
  english_pob_choice: has been avenged
  chosen_spanish: ha sido reclamada
  alternatives_spanish:
  - ha sido vengada
  - ha sido requerida
  - ha sido pedida cuentas de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail señala que el verbo expresa ser buscada/reclamada, con el sentido judicial de exigir rendición de cuentas por la sangre. 'Reclamada' en español conserva ese campo semántico y evita suavizarlo hacia 'aceptada' o cargarlo demasiado pronto con una interpretación explícita de venganza.
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  - el Señor de los espíritus celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título fijo en forma reconocible y tradicional del corpus enóquico. En español, 'Espíritus' con mayúscula ayuda a señalar el título divino y evitar una lectura genérica de seres espirituales.
theological_decisions:
- issue: Sentido de 'el número de los justos se ha acercado'
  english_pob_reading: An appointed total or full count of the righteous is nearing completion.
  chosen_spanish_reading: El verso deja abierta la idea de un número determinado de los justos que se está cumpliendo o alcanzando.
  alternative_spanish_readings:
  - el tiempo de los justos se ha acercado
  - la cuenta/judicación de los justos se ha acercado
  rationale: El sustantivo base puede denotar número, cuenta o recuento. En español conviene mantener 'número' en el texto principal y no resolver la ambigüedad, porque el contexto apocalíptico permite tanto la idea de total fijado como la de cómputo judicial.
  doctrine_reference: Preservar la tensión interpretativa; no cerrar el sentido más allá de lo que el original exige.
- issue: Fuerza de 'la sangre ... ha sido reclamada'
  english_pob_reading: The shed blood of the righteous has come before God with acknowledged validity, implying divine regard and impending response.
  chosen_spanish_reading: La sangre derramada de los justos ha sido puesta en demanda delante de Dios, con el sentido de responsabilidad judicial y respuesta divina.
  alternative_spanish_readings:
  - ha sido vengada
  - ha sido aceptada
  - ha sido recordada
  rationale: El audit trail posterior corrige la traducción inglesa hacia un valor de 'reclamar/require' más que 'aceptar'. En español, 'ha sido reclamada' conserva el carácter forense de exigir cuentas por la sangre sin añadir más de lo que el verbo y el contexto inmediato obligan.
  doctrine_reference: Primacía del testimonio del idioma original sobre la formulación interpretativa heredada.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una historia de revisión importante en el último miembro del verso: ''has been accepted'' fue posteriormente corregido a un valor de ''required'' y luego reexpresado como ''avenged'' para la traducción inglesa final. Por eso el español principal evita ''aceptada'' y también evita fijar sin más ''vengada'' en el cuerpo del texto; usa ''reclamada'', que mantiene la fuerza judicial señalada por el análisis más reciente y permite la lectura de vindicación sin excederla. También se respetó la ambigüedad de ''number'' mediante una nota alternativa, siguiendo la práctica del POB de documentar tensiones léxicas.'
  spanish_consistency_notes:
  - Se mantiene 'justos' de forma uniforme para ጻድቅ / ጻድቃን.
  - Se conserva 'Espíritus' con mayúscula en el título divino.
  - '''Gozo'' se usa para ፍሥሐ con registro bíblico, no ''alegría'', para mantener el tono apocalíptico.'
  - Las notas con [a], [b], [c] corresponden exactamente a las ambigüedades lexicales y teológicas documentadas.
