translation:
  language: es
  text: Y en aquellos días[c][b], la oración de los justos y la sangre de los justos[a] ascendieron desde la tierra delante del Señor de Espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase «la sangre de los justos» también puede entenderse más literalmente como «la sangre del justo», porque la forma ge'ez después de «sangre» es singular. La línea probablemente usa un singular representativo o colectivo en paralelo con «la oración de los justos».
    reason: lexical_alternative
  - marker: b
    text: El verbo es explícito para «la oración» («ascendió»), pero no se repite para «la sangre». El español deja la segunda frase elíptica en cuanto al original, aunque la concordancia verbal con el sujeto compuesto queda expresada de forma natural.
    reason: lexical_alternative
  - marker: c
    text: 'O: «la oración de los justos ascenderá, y la sangre de los justos desde la tierra, delante del Señor de Espíritus».'
    reason: previous_rendering
lexical_decisions:
- source_word: መዋዕል
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - tiempos
  - aquellos tiempos
  lexicon: Dillmann
  rationale: En la fórmula apocalíptica, «en aquellos días» es la equivalencia española más natural y solemne, y conserva el marcador temporal visionario.
- source_word: ጸሎተ
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - petición
  - súplica
  lexicon: Dillmann
  rationale: «Oración» es el equivalente más amplio y natural en español para este contexto solemne; «súplica» sería más estrecho.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos ones
  lexicon: Dillmann
  rationale: «Justos» transmite bien el grupo apocalíptico y funciona de modo natural en español sin perder la carga teológica del término.
- source_word: ደሙ
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - su sangre
  - la sangre de ellos
  lexicon: Dillmann
  rationale: El posesivo subyacente no se fuerza en el español principal; «la sangre» mantiene la concisión del paralelismo y evita decidir de más sobre número y referencia.
- source_word: ጻድቅ
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - el justo
  - los justos
  lexicon: Dillmann
  rationale: Aunque la forma ge'ez es singular, el paralelo inmediato favorece una lectura colectiva; el plural español preserva esa correspondencia sin ocultar la tensión textual.
- source_word: እምነ ምድር
  english_pob_choice: from the earth
  chosen_spanish: desde la tierra
  alternatives_spanish:
  - desde la tierra
  - de la tierra
  lexicon: Dillmann
  rationale: «Desde la tierra» conserva el movimiento ascendente y el alcance cósmico del original mejor que una traducción más local como «de la tierra».
- source_word: ቅድመ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: Dillmann
  rationale: «Delante de» es claro, digno y fiel; expresa la relación de comparecencia sin añadir solemnidad interpretativa innecesaria.
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  lexicon: Dillmann
  rationale: Se conserva el título en su forma transparente y tradicional en la literatura enóquica, manteniendo su fuerza cósmica y reverencial.
theological_decisions:
- issue: Valor colectivo o singular de ጻድቅ después de «sangre»
  english_pob_reading: 'collective sense: ''the blood of the righteous'''
  chosen_spanish_reading: 'lectura colectiva: «la sangre de los justos»'
  alternative_spanish_readings:
  - la sangre del justo
  - la sangre de los justos
  rationale: El paralelo con «la oración de los justos» favorece una lectura colectiva en español; aun así, la nota permite recordar que la forma ge'ez es singular y deja abierta la tensión.
  doctrine_reference: Preservar la tensión filológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de un futuro con elipsis a un perfecto en pasado («ascendieron»), por corrección gramatical del ge'ez; el español sigue esa revisión y conserva la sintaxis compacta sin añadir explicación en la línea principal.
  spanish_consistency_notes:
  - Se prefirió «justos» frente a «rectos» por coherencia con el audit trail inglés y con el registro eclesial natural del español.
  - Se mantuvo «Señor de los Espíritus» como título propio en lugar de una paráfrasis explicativa.
  - La elipsis verbal del segundo miembro se resuelve en español por fluidez, pero la nota b recuerda la compresión del paralelo original.
