base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/047/001.yaml
  text: And in those days[c][b][a], the prayer of the righteous and the blood of the righteous ascended from the earth before the Lord of Spirits.
  footnotes:
  - marker: a
    text: The phrase 'the blood of the righteous' may also be understood more literally as 'the blood of the righteous one,' since the Ge'ez form after 'blood' is singular. The line likely uses a representative singular or collective sense in parallel with 'the prayer of the righteous.'
    reason: lexical_alternative
  - marker: b
    text: The verb is explicit for 'the prayer' ('will ascend') but not repeated for 'the blood.' The English leaves the second phrase elliptical, matching the compressed parallelism of the Ge'ez.
    reason: lexical_alternative
  - marker: c
    text: Or 'the prayer of the righteous will ascend, and the blood of the righteous from the earth, before the Lord of Spirits.'.
    reason: previous_rendering
