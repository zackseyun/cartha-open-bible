translation:
  language: es
  text: En aquellos días vi al Jefe de Días[a], mientras estaba sentado en el trono de su gloria, y los libros de los vivientes[b] fueron abiertos delante de él; y toda su hueste, que está en las alturas del cielo, y su corte[c] estaban de pie delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Anciano de Días». La traducción sigue de cerca el título ge''ez en vez de armonizarlo con la forma daniélica más familiar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los libros de la vida». El ge''ez usa una expresión plural, más literalmente «los libros de los vivientes».'
    reason: lexical_alternative
  - marker: c
    text: 'También: «su asamblea» o «el círculo a su alrededor». El ge''ez puede referirse al grupo reunido en torno al entronizado, es decir, su corte celestial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la fórmula apocalíptica temporal breve y cadenciosa; 'días' conserva mejor el ritmo visionario que 'tiempos'.
- source_word: ርኢክዎ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré y vi
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma simple reproduce el reporte visionario directo del ge'ez sin añadir un doblete innecesario.
- source_word: ለርእሰ መዋዕል
  english_pob_choice: the Head of Days
  chosen_spanish: el Cabeza de Días
  alternatives_spanish:
  - el Jefe de Días
  - el Anciano de Días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la cercanía formal al título ge'ez documentado por la POB inglesa. Aunque la secuencia española es menos idiomática, evita armonizar prematuramente con 'Anciano de Días' y respeta la elección auditada de mantener la literalidad del título.
- source_word: ሶበ ነበረ መንበረ ስብሐቲሁ
  english_pob_choice: as he sat on the throne of his glory
  chosen_spanish: cuando se sentó sobre el trono de su gloria
  alternatives_spanish:
  - mientras se sentaba en el trono de su gloria
  - al sentarse sobre el trono de su gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se sigue la corrección auditada del gramatical activo: el sujeto es el Cabeza de Días que se sienta. ''Sobre el trono'' conserva la imagen de entronización; ''de su gloria'' traduce el genitivo directo del texto.'
- source_word: መጻሕፍተ ሕያዋን
  english_pob_choice: the books of the living
  chosen_spanish: los libros de los vivientes
  alternatives_spanish:
  - los libros de los vivos
  - el libro de la vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el plural 'libros' y el genitivo 'de los vivientes', evitando importar la expresión posterior y más familiar 'libro de la vida'.
- source_word: በቅድሜሁ ተከሥቱ
  english_pob_choice: were opened before him
  chosen_spanish: fueron abiertos delante de él
  alternatives_spanish:
  - se abrieron ante él
  - fueron revelados delante de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un contexto de libros celestiales, 'abiertos' es la equivalencia natural y conserva la escena judicial sin sobreinterpretar.
- source_word: ኵሉ ኃይሉ
  english_pob_choice: all his host
  chosen_spanish: toda su hueste
  alternatives_spanish:
  - todo su ejército
  - todas sus fuerzas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hueste'' comunica una compañía celestial colectiva mejor que ''poder'' o ''fuerzas'' abstractas, y encaja con el entorno de corte celestial.'
- source_word: ዘመልዕልተ ሰማያት
  english_pob_choice: which is in the heights of heaven
  chosen_spanish: que está en las alturas del cielo
  alternatives_spanish:
  - que está en las alturas de los cielos
  - que está sobre los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Alturas del cielo'' preserva la imagen espacial elevada sin forzar una formulación más técnica de ''cielos'' que podría sonar menos natural en español.'
- source_word: አውደ ዚአሁ
  english_pob_choice: his council
  chosen_spanish: su consejo
  alternatives_spanish:
  - su corte
  - su asamblea
  - su círculo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la lectura de asamblea celestial. 'Consejo' funciona en español como cuerpo reunido alrededor del entronizado, aunque la nota permite la alternativa espacial de 'corte' o 'círculo'.
- source_word: ይቀውሙ በቅድሜሁ
  english_pob_choice: stood before him
  chosen_spanish: se puso delante de él
  alternatives_spanish:
  - estuvo de pie delante de él
  - se mantuvo delante de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La colocación refleja la postura de presencia ante un trono. 'Se puso' reproduce de forma flexible el estar de pie ante él, sin perder la escena cortesana.
theological_decisions:
- issue: Título ርእሰ መዋዕል y su traducción en español
  english_pob_reading: the Head of Days
  chosen_spanish_reading: el Cabeza de Días
  alternative_spanish_readings:
  - el Anciano de Días
  - el Jefe de Días
  rationale: La POB inglesa eligió conservar la literalidad ge'ez y no armonizar con el título daniélico más conocido. En español se conserva esa decisión de transparencia, aun con una sintaxis menos convencional, para no borrar la tensión entre la forma etiópica y la tradición posterior.
  doctrine_reference: 'Translation philosophy §1: primacía del texto de origen sobre la tradición de traducción; evitar armonización no justificada.'
- issue: Pluralidad de los registros celestiales መጻሕፍተ ሕያዋን
  english_pob_reading: the books of the living
  chosen_spanish_reading: los libros de los vivientes
  alternative_spanish_readings:
  - el libro de la vida
  - los libros de vida
  rationale: Se conserva el plural y el genitivo literal del ge'ez. No se sustituye por la expresión singular tradicional, porque eso suavizaría una diferencia real del testimonio etiópico.
  doctrine_reference: 'Translation philosophy §1: respetar la forma del testimonio textual; no importar un eco canónico posterior sin base.'
translation_notes:
  revision_awareness: 'La redacción refleja la revisión auditada que corrigió la sintaxis inglesa previa de la clausula de entronización: el sujeto es el Cabeza de Días, que se sienta sobre el trono, no el trono que ''fue puesto''. También incorpora la oscilación auditada entre ''council'' y ''court'', eligiendo ''consejo'' en el texto y dejando la alternativa espacial en nota.'
  spanish_consistency_notes:
  - Se mantiene 'vivientes' para መጻሕፍተ ሕያዋን, en coherencia con la decisión POB de preservar el plural.
  - Se evita 'SEÑOR' y otros sustitutos reverenciales, porque el pasaje no contiene el Tetragrámaton ni una cita directa de κύριος.
  - '''Hueste'' y ''consejo'' sostienen el imaginario de corte celestial sin modernizarlo excesivamente.'
  - La frase 'delante de él' evita variar innecesariamente con 'ante él' para conservar paralelismo con la POB y el tono judicial del pasaje.
