  revision_rationale: 'La revisión mantiene las decisiones auditadas esenciales del original ge''ez, pero corrige tres puntos de fidelidad y estilo en español: (1) sustituye «Cabeza» por «Jefe» para conservar la transparencia del título sin caer en una construcción poco idiomática; (2) cambia «cuando se sentó» por «mientras estaba sentado» para reflejar mejor la escena simultánea de la visión; y (3) reemplaza «su consejo se puso delante de él» por «su corte estaban de pie delante de él», que representa con más precisión la postura y el entorno cortesano del original. También se añade una nota en «los vivientes» para preservar la alternativa tradicional que la POB inglesa documenta.'
