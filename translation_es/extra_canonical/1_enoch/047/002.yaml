revisions:
- from: En aquellos días, los santos[a] que habitan en las alturas del cielo se unirán con una sola voz, y rogarán, orarán, alabarán, darán gracias y bendecirán el nombre del Señor de los Espíritus, a causa de la sangre de los justos que ha sido derramada, y para que la oración de los justos no sea vana ante el Señor de los Espíritus, para que se ejecute juicio sobre ellos[c][b], y para que la paciencia no sea de ellos para siempre.
  to: En aquellos días, los santos[a] que habitan en las alturas del cielo se unirán con una sola voz, y rogarán, orarán, alabarán, darán gracias y bendecirán el nombre del Señor de los Espíritus, a causa de la sangre de los justos que ha sido derramada, y para que la oración de los justos no sea vana ante el Señor de los Espíritus, para que se ejecute juicio a favor de ellos[c][b], y para que la paciencia no siga siendo de ellos para siempre.
  rationale: Se requiere una revisión menor pero necesaria. Cambié 'sobre ellos' por 'a favor de ellos' para reflejar correctamente el sentido vindicatorio documentado en el POB inglés y evitar que el español sugiera juicio contra los justos. Corregí la nota [a] para que ofrezca una alternativa real y preserve mejor la ambigüedad de ቅዱሳን. También suavicé levemente la última cláusula para mantener el sustantivo 'paciencia' con una sintaxis más natural en español.
