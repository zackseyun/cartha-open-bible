  yaml_path: translation/extra_canonical/1_enoch/047/002.yaml
  text: In those days the holy ones who dwell in the heights of heaven shall unite with one voice[a], and they shall plead and pray and praise and give thanks and bless the name of the Lord of Spirits, on account of the blood of the righteous that has been poured out, and that the prayer of the righteous may not be in vain before the Lord of Spirits, that judgment may be executed for them[d][c][b], and that patience may not be theirs forever.
  footnotes:
  - marker: a
    text: Or 'the saints'; the term can denote holy beings generally. Because they are described as dwelling in the heights of heaven, the wording leaves open whether the reference is to angels, the heavenly righteous, or both.
    reason: lexical_alternative
  - marker: b
    text: The verb behind 'should not be in vain' is uncertain in this Ethiopic witness. The sense in context is likely that the prayer of the righteous is not to go unanswered or ineffective before the Lord of Spirits.
    reason: textual_variant
  - marker: c
    text: Or 'justice may be done for them.' The noun can be heard either as judicial sentence or as the execution of justice on behalf of the righteous.
    reason: lexical_alternative
  - marker: d
    text: Or 'and because the prayer of the righteous should not be in vain before the Lord of Spirits, so that judgment may be executed for them and patience may not be theirs forever.'.
    reason: previous_rendering
