translation:
  language: es
  text: En aquellos días, los santos[a] que habitan en las alturas del cielo se unirán con una sola voz, y rogarán, orarán, alabarán, darán gracias y bendecirán el nombre del Señor de los Espíritus, a causa de la sangre de los justos que ha sido derramada, y para que la oración de los justos no sea vana ante el Señor de los Espíritus, para que se ejecute juicio a favor de ellos[c][b], y para que la paciencia no siga siendo de ellos para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “los seres santos”. El término puede designar seres santos en general, y el contexto celeste deja abierta la referencia a ángeles, a los justos celestiales o a ambos.'
    reason: lexical_alternative
  - marker: b
    text: El verbo subyacente a “no sea vana” es incierto en este testimonio etiópico. El sentido contextual parece ser que la oración de los justos no quede sin efecto ni sea ignorada ante el Señor de los Espíritus.
    reason: textual_variant
  - marker: c
    text: 'O: “para que se haga justicia por ellos”. El sustantivo puede entenderse como sentencia judicial o como la ejecución de justicia en favor de los justos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ቅዱሳን
  english_pob_choice: the holy ones
  chosen_spanish: los santos[a]
  alternatives_spanish:
  - los santos
  - los seres santos
  - los santos celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El griego/etiópico aquí admite una referencia amplia a seres santos. En español, 'santos' es la forma más natural y conserva la ambigüedad entre seres celestiales y seres humanos glorificados; la nota preserva la alternativa 'holy ones' del POB inglés.
- source_word: የኃድሩ
  english_pob_choice: who dwell
  chosen_spanish: que habitan
  alternatives_spanish:
  - que moran
  - que viven
  - que residen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Habitar'' reproduce la idea de residencia estable en un ámbito celestial y suena natural en español bíblico moderno.'
- source_word: በመልዕልተ ሰማያት
  english_pob_choice: in the heights of heaven
  chosen_spanish: en las alturas del cielo
  alternatives_spanish:
  - en las alturas de los cielos
  - en lo alto del cielo
  - en el cielo más alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Alturas del cielo'' mantiene la imagen espacial sin forzar una cosmología más precisa de la que permite el texto.'
- source_word: በ፩ቃል
  english_pob_choice: with one voice
  chosen_spanish: con una sola voz
  alternatives_spanish:
  - unánimemente
  - como uno solo
  - con una misma voz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión literal en español es clara y preserva tanto la unidad como el matiz vocal/litúrgico.
- source_word: ያስተበቍዑ
  english_pob_choice: shall plead
  chosen_spanish: rogarán
  alternatives_spanish:
  - suplicarán
  - intercederán
  - implorarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa petición urgente. 'Rogar' es idiomático en español y mantiene el tono de súplica; 'intercederán' sería posible, pero desplaza el énfasis al papel mediador.
- source_word: ይጼልዩ
  english_pob_choice: pray
  chosen_spanish: orarán
  alternatives_spanish:
  - rezarán
  - harán oración
  - supplicarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Orar'' es la correspondencia normal y distingue bien esta acción de ''rogarán'' en la secuencia paralela.'
- source_word: ይሴብሑ
  english_pob_choice: praise
  chosen_spanish: alabarán
  alternatives_spanish:
  - praisearán
  - glorificarán
  - cantarán alabanzas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Alabar'' es la forma natural en español para el verbo doxológico y mantiene la progresión litúrgica.'
- source_word: የአኵቱ
  english_pob_choice: give thanks
  chosen_spanish: darán gracias
  alternatives_spanish:
  - agradecerán
  - expresarán gratitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La locución fija 'dar gracias' corresponde bien a la acción de thanksgiving y evita una paráfrasis pesada.
- source_word: ይባርኩ
  english_pob_choice: bless
  chosen_spanish: bendecirán
  alternatives_spanish:
  - bendecirán con bendición
  - dirán bendición sobre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Bendecir'' es el verbo usual para hablar de bendecir el nombre divino y conserva el registro bíblico.'
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  - el Señor de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título técnico del POB inglés en forma naturalizada en español. La mayúscula en 'Espíritus' respeta el carácter titular y solemne del epíteto apocalíptico.
- source_word: በእንተ ደመ ጻድቃን
  english_pob_choice: on account of the blood of the righteous
  chosen_spanish: a causa de la sangre de los justos
  alternatives_spanish:
  - por la sangre de los justos
  - a causa de la sangre de los rectos
  - por motivo de la sangre de los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''A causa de'' transmite bien el motivo desencadenante de la súplica celestial. ''Justos'' es la equivalencia más clara en español para el grupo fiel/vindicado.'
- source_word: ዘተክዕወ
  english_pob_choice: that has been poured out
  chosen_spanish: que ha sido derramada
  alternatives_spanish:
  - que ha sido derramado
  - que ha sido vertida
  - que ha sido vertido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Para ''sangre'' el participio debe concordar en femenino: ''derramada''. Conserva la imaginería sacrificial y violenta del derramamiento de sangre.'
- source_word: ጸሎቶሙ ለጻድቃን
  english_pob_choice: the prayer of the righteous
  chosen_spanish: la oración de los justos
  alternatives_spanish:
  - la oración de los rectos
  - las oraciones de los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular colectivo 'oración' reproduce el valor de conjunto del inglés POB y evita forzar una pluralidad que el estado transmisional no exige.
- source_word: ከመ ኢትጸራዕ በቅድመ እግዚአ መናፍስት
  english_pob_choice: should not be in vain before the Lord of Spirits
  chosen_spanish: no sea vana ante el Señor de los Espíritus
  alternatives_spanish:
  - no quede sin efecto ante el Señor de los Espíritus
  - no sea rechazada ante el Señor de los Espíritus
  - no resulte inútil ante el Señor de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Vana'' comunica que la oración no será inútil o infructuosa. Es una solución transparente en español que preserva la incertidumbre léxica sin falsearla.'
- source_word: ከመ ይትገበር ሎሙ ኵነኔ
  english_pob_choice: so that judgment may be executed for them
  chosen_spanish: para que se ejecute juicio sobre ellos[c]
  alternatives_spanish:
  - para que se haga justicia por ellos
  - para que se lleve a cabo el juicio por ellos
  - para que se ejecute sentencia para ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Juicio'' conserva la fuerza forense y apocalíptica del sustantivo, mientras que ''sobre ellos'' expresa con naturalidad la acción judicial dirigida contra/en favor del grupo vindicado. La nota preserva la alternativa ''justicia'' del POB.'
- source_word: ትዕግሥት ኢይኩን ሎሙ ለዓለም
  english_pob_choice: patience may not be theirs forever
  chosen_spanish: y para que la paciencia no sea de ellos para siempre
  alternatives_spanish:
  - y para que no tengan paciencia para siempre
  - y para que no haya para ellos paciencia para siempre
  - y para que su espera no sea para siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el sustantivo 'paciencia' para respetar el valor literal del etiópico y la decisión del POB, aunque el sentido contextual también puede rozar la idea de demora o espera prolongada.
theological_decisions:
- issue: Identidad de ቅዱሳን en la escena celestial
  english_pob_reading: Rendered as 'the holy ones' rather than specifically human 'saints.'
  chosen_spanish_reading: Se traduce como 'los santos', manteniendo una ambigüedad reverente entre seres celestiales y justos glorificados.
  alternative_spanish_readings:
  - los seres santos
  - los ángeles
  - los santos celestiales
  rationale: El contexto los sitúa en las alturas del cielo y en un acto litúrgico celestial. 'Santos' comunica santidad y deja abierta la identidad exacta, en vez de resolverla indebidamente.
  doctrine_reference: Preservar la tensión interpretativa del texto apocalíptico.
- issue: La petición sobre la oración de los justos
  english_pob_reading: The prayer of the righteous is rendered as not being 'in vain' before the Lord of Spirits.
  chosen_spanish_reading: La oración de los justos no sea vana ante el Señor de los Espíritus.
  alternative_spanish_readings:
  - no quede sin efecto
  - no sea rechazada
  - no sea silenciada
  rationale: La forma etiópica es textual y léxicamente incierta. 'Vana' comunica con sobriedad la idea de una oración no frustrada ni ineficaz, sin fingir certeza donde el testimonio es vacilante.
  doctrine_reference: Preferir transparencia y nota explicativa cuando el sentido exacto no es seguro.
- issue: Sentido de ኵነኔ en contexto vindicativo
  english_pob_reading: Rendered 'judgment' rather than 'justice.'
  chosen_spanish_reading: Se traduce como 'juicio', conservando el marco forense y escatológico.
  alternative_spanish_readings:
  - justicia
  - sentencia
  - fallo
  rationale: En un contexto de sangre derramada y súplica celestial, 'juicio' mantiene la imaginería de tribunal divino. La posibilidad de justicia/vindicacion queda implícita en el contexto y se refleja en la nota textual.
  doctrine_reference: Conservar la imaginería apocalíptica del juicio divino.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión aceptada que trata las cláusulas con ከመ como proposiciones de propósito/contenido: ''para que...'' y no ''porque...''. También conserva la incertidumbre textual de la forma etiópica equivalente a ''no sea vana'' y la ambigüedad de ኵነኔ entre ''juicio'' y ''justicia''.'
  spanish_consistency_notes:
  - Se mantuvo 'Señor de los Espíritus' para conservar el título técnico del POB y la solemnidad apocalíptica.
  - Se usó 'los santos' con nota porque el español permite una ambigüedad útil semejante a la del inglés 'holy ones'.
  - 'La secuencia verbal se mantuvo paralela: ''rogarán, orarán, alabarán, darán gracias y bendecirán''.'
  - Se evitó 'SEÑOR' como máscara tipográfica; se tradujo el título completo de manera explícita.
  - '''Juicio'' se prefirió a ''justicia'' en el texto principal para no perder el marco forense, dejando la alternativa en nota.'
