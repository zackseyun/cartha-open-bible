    rationale: El geʽez ሎሙ y el POB inglés 'for them' apuntan a juicio/justicia ejecutado en favor de los justos. 'Sobre ellos' en español normalmente se entiende como juicio dirigido contra ellos.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real al texto principal
    rationale: 'El texto principal dice ''los santos[a]'' y la nota dice ''O: “los santos”''. Eso no informa al lector. La alternativa documentada por el POB es ''los seres santos'' o una explicación de ''holy ones''.'
  - severity: low
    issue: '''la paciencia no sea de ellos para siempre'' suena algo calcada'
    rationale: La frase es fiel al sustantivo literal, pero puede sonar rígida. 'No siga siendo de ellos para siempre' mantiene el valor literal y mejora la fluidez.
  revised_spanish_text: En aquellos días, los santos[a] que habitan en las alturas del cielo se unirán con una sola voz, y rogarán, orarán, alabarán, darán gracias y bendecirán el nombre del Señor de los Espíritus, a causa de la sangre de los justos que ha sido derramada, y para que la oración de los justos no sea vana ante el Señor de los Espíritus, para que se ejecute juicio a favor de ellos[c][b], y para que la paciencia no siga siendo de ellos para siempre.
  revised_footnotes:
