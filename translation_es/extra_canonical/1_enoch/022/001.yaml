translation:
  language: es
  text: Y de allí fui a otro lugar, y me mostró en el occidente un monte grande y alto[a], y una roca dura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La descripción puede leerse como un monte que es a la vez grande y alto; el ge'ez conserva ambas cualidades en vez de reducirlas a una sola.
    reason: lexical_alternative
  - marker: b
    text: La frase final también puede traducirse 'roca sólida' o 'roca firme'.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምህየ
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa de manera natural el desplazamiento desde el lugar anterior, conservando la transición espacial sin añadir énfasis innecesario.
- source_word: ሖርኩ
  english_pob_choice: I went
  chosen_spanish: fui
  alternatives_spanish:
  - anduve
  - viajé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasado simple español reproduce el movimiento narrativo directo del ge'ez sin sobredeterminar la modalidad del viaje.
- source_word: ካልአ መካነ
  english_pob_choice: to another place
  chosen_spanish: a otro lugar
  alternatives_spanish:
  - a otro sitio
  - a una segunda ubicación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Otro lugar'' es la equivalencia natural y fiel para indicar un sitio distinto del anterior, manteniendo la sencillez del enunciado.'
- source_word: አርአየኒ
  english_pob_choice: he showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me reveló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Me mostró'' preserva la fórmula visionaria de guía sin introducir explícitamente un término no presente en el versículo.'
- source_word: በምዕራብ
  english_pob_choice: in the west
  chosen_spanish: en el occidente
  alternatives_spanish:
  - al occidente
  - en el oeste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Occidente'' es formal y claro en registro bíblico; mantiene la orientación geográfica del texto.'
- source_word: ደብረ ዐቢየ ወነዋኅ
  english_pob_choice: a great and high mountain
  chosen_spanish: un monte grande y alto
  alternatives_spanish:
  - un monte grande y elevado
  - un monte grande y encumbrado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se conserva la doble cualidad del monte: grandeza y altura. ''Monte'' reproduce bien el término poético y visible del pasaje, sin forzar una equivalencia técnica rígida.'
- source_word: ኵኵሐ ጽኑዐ
  english_pob_choice: a hard rock
  chosen_spanish: una roca dura
  alternatives_spanish:
  - una roca firme
  - una roca sólida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Roca dura'' transmite la cualidad física del original y corresponde naturalmente al artículo introducido por la revisión inglesa, evitando una abstracción como ''roca firme'' salvo que el contexto exigiera una metáfora más interpretativa.'
theological_decisions:
- issue: Si debe identificarse explícitamente al sujeto que muestra la visión
  english_pob_reading: Retain the simple pronoun sense in 'he showed me' without specifying 'the angel.'
  chosen_spanish_reading: Mantener el pronombre implícito en 'me mostró' sin añadir 'el ángel'.
  alternative_spanish_readings:
  - el ángel me mostró
  - mi guía me mostró
  rationale: El ge'ez sólo da un sujeto masculino de tercera persona; aunque el contexto puede sugerir un guía angélico, el versículo no lo nombra. La traducción debe conservar esa reserva y no resolverla por adelantado.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión interpretativa cuando el original no la explicita.
- issue: Cómo reflejar la doble descripción del monte sin reducirla a un solo adjetivo
  english_pob_reading: The description may be read as a mountain that is both great and lofty; the Ge'ez preserves both qualities rather than reducing them to a single adjective.
  chosen_spanish_reading: '''Grande y alto'' conserva las dos cualidades del monte.'
  alternative_spanish_readings:
  - '''grande'' solamente'
  - '''alto'' solamente'
  - '''grande y elevado'''
  rationale: El original preserva dos rasgos descriptivos. En español conviene mantener ambos para no perder la fuerza acumulativa de la imagen apocalíptica.
  doctrine_reference: Respeto por la densidad descriptiva del original y por su imaginería visionaria.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al reflejar la estructura 'un/a ...' antes de 'roca dura', y conserva la observación auditada de que el ge'ez mantiene dos cualidades del monte. No se añade 'ángel' ni se suaviza la imagen rocosa.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' y 'Mesías/Cristo' fuera de este versículo según las reglas del proyecto, sin necesidad de intervenir aquí.
  - '''Monte'' se conserva por su tono bíblico y visual, más cercano al registro del pasaje que ''montaña'' en este contexto poético.'
  - '''Occidente'' se usa como término geográfico formal y comprensible para lectores de español bíblico.'
