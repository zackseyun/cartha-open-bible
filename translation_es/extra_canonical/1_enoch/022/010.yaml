translation:
  language: es
  text: Y así fue hecho para los pecadores[a], cuando mueren y son sepultados en la tierra[c][b], y el juicio no ha venido sobre ellos durante su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión inicial probablemente retoma la descripción anterior de los lugares separados para los muertos; por eso «Y así» expresa correspondencia con ese contexto.
    reason: cross_reference
  - marker: b
    text: «Fue hecho» también podría entenderse como «fue creado» o «fue establecido»; el texto no repite el sustantivo implícito tomado del contexto.
    reason: lexical_alternative
  - marker: c
    text: 'O bien: «fue hecho para los pecadores: cuando mueren y son sepultados en la tierra, y el juicio no ha venido sobre ellos»'
    reason: previous_rendering
lexical_decisions:
- source_word: በከመ / ከማሁ
  english_pob_choice: And thus / And so
  chosen_spanish: Y así
  alternatives_spanish:
  - Y de esta manera
  - Así también
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja de partículas introduce una correspondencia con lo dicho antes. «Y así» conserva el enlace y la relación inferencial sin volverla más interpretativa de lo que exige el ge'ez.
- source_word: ተፈጥረ
  english_pob_choice: it has been made / it was created
  chosen_spanish: fue hecho
  alternatives_spanish:
  - fue creado
  - fue establecido
  - ha sido hecho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo perfecto puede expresar una disposición ya constituida. «Fue hecho» mantiene la amplitud semántica del original y evita fijar demasiado pronto una lectura metafísica o jurídica.
- source_word: ለኃጥኣን
  english_pob_choice: for sinners
  chosen_spanish: para los pecadores
  alternatives_spanish:
  - para los culpables
  - para los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pecadores» es claro en español bíblico y corresponde de forma directa al dativo de destino o aplicación. «Para» conserva la idea de asignación o destinación.
- source_word: ሶበ ይመውቱ ወይትቀበሩ
  english_pob_choice: when they die and are buried
  chosen_spanish: cuando mueren y son sepultados
  alternatives_spanish:
  - cuando mueren y son enterrados
  - cuando mueren y son sepultados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula temporal es directa. «Son sepultados» conserva el registro bíblico y la pasiva concreta del entierro.
- source_word: ውስተ ምድር
  english_pob_choice: in the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra
  - en el suelo
  - en la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «en la tierra» comunica de forma natural la imagen funeraria del texto y preserva el lenguaje elemental del original. «Suelo» sería más coloquial y «tierra» evita una lectura meramente geográfica.
- source_word: ወኵነኔ ኢኮነ በላዕሌሆሙ
  english_pob_choice: and judgment has not come upon them
  chosen_spanish: y el juicio no ha venido sobre ellos
  alternatives_spanish:
  - y el juicio no ha caído sobre ellos
  - y no les sobrevino el juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ha venido sobre ellos» reproduce la imagen de un juicio que alcanza a la persona. En español es una forma natural y suficientemente literal; «ha caído» agrega una metáfora no explícita.
- source_word: በሕይወቶሙ
  english_pob_choice: during their lifetime
  chosen_spanish: durante su vida
  alternatives_spanish:
  - mientras estaban vivos
  - durante su vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión contrasta la vida presente con el estado posterior a la muerte. «Durante su vida» es clara, sobria y fiel al valor temporal del original.
theological_decisions:
- issue: Alcance de la disposición para los pecadores
  english_pob_reading: The verse describes an allotted postmortem arrangement for sinners who escaped judgment while alive, without specifying annihilation or final acquittal.
  chosen_spanish_reading: El versículo describe una disposición asignada para los pecadores después de la muerte, sin precisar aniquilación ni absolución final.
  alternative_spanish_readings:
  - El versículo afirma que ese lugar fue creado exclusivamente para pecadores
  - El versículo solo dice que mueren y son sepultados, sin aludir a una asignación posterior
  rationale: El ge'ez permite entender una disposición ya establecida; la formulación española conserva esa tensión sin resolver si se trata de creación, establecimiento o simple designación. Así no se sobreexplica el estado postmortem.
  doctrine_reference: Preservar la tensión teológica sin decidir más de lo que el texto dice.
translation_notes:
  revision_awareness: La versión inglesa más reciente prefirió una redacción más natural («it was made») y mantuvo el sentido general de disposición para pecadores. El texto español sigue esa línea, pero conserva la posibilidad semántica de «hecho/creado/establecido» en la nota b, para no borrar la tensión lexical del ge'ez.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto solo cuando el original lo exige; este versículo no contiene el tetragrámaton.
  - Se evita «Señor» o fórmulas eclesiásticas no presentes en el original.
  - «Pecadores» se usa de forma consistente con el valor directo de ለኃጥኣን.
  - «Juicio» conserva el sentido forense del contexto y no se suaviza a mera condena.
