translation:
  language: es
  text: Y vi los espíritus de los hijos de los hombres que estaban muertos, y su voz llegó hasta el cielo y clamó[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gritó»; el verbo final es difícil y puede implicar queja, reclamo o apelación, no solo una emisión neutral de voz.
    reason: lexical_alternative
  - marker: b
    text: O «hizo acusación»; la tradición de traducción inglesa osciló entre una lectura de acusación y una de petición, y el español mantiene abierta esa tensión con «clamó».
    reason: lexical_alternative
lexical_decisions:
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y contemplé
  - Y observé
  lexicon: Dillmann
  rationale: El verbo visionario directo se expresa de forma natural en español con «vi», manteniendo el relato en primera persona sin añadir matices no requeridos por el texto.
- source_word: መናፍስተ
  english_pob_choice: the spirits
  chosen_spanish: los espíritus
  alternatives_spanish:
  - las almas
  lexicon: Dillmann
  rationale: «Espíritus» conserva mejor la antropología apocalíptica del original que «almas», que sería más interpretativo en español.
- source_word: ውሉደ ሰብእ
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - los hombres
  lexicon: Dillmann
  rationale: Se preserva la expresión semítica elevada de manera bastante literal, porque el POB inglés también retiene esa formulación y el español la puede recibir sin dificultad.
- source_word: እንዘ ሙታን ውእቶሙ
  english_pob_choice: who were dead
  chosen_spanish: que estaban muertos
  alternatives_spanish:
  - que eran muertos
  - mientras estaban muertos
  lexicon: Dillmann
  rationale: La cláusula identifica el estado de muerte de esos seres humanos; «estaban muertos» es idiomático y fiel al sentido de estado.
- source_word: ቃሎሙ
  english_pob_choice: their voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su clamor
  - su sonido
  lexicon: Dillmann
  rationale: «Voz» conserva el sentido base del término y permite dejar abierta la intensidad del acto sin resolverlo prematuramente como «clamor».
- source_word: ይበጽሕ እስከ ሰማይ
  english_pob_choice: reached to heaven
  chosen_spanish: llegó hasta el cielo
  alternatives_spanish:
  - subió hasta el cielo
  - llegó al cielo
  lexicon: Dillmann
  rationale: «Llegó hasta el cielo» reproduce la imagen vertical de ascenso y funciona con naturalidad en español.
- source_word: ወይስኪ
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - protestó
  - reclamó
  - expuso una queja
  lexicon: Dillmann
  rationale: Dado el historial auditable de la línea inglesa, la opción final más neutra y compatible con la repetición del verbo en el pasaje es «clamó», que preserva el grito sin fijarlo unilateralmente como acusación o petición.
theological_decisions:
- issue: La voz de los muertos y su orientación hacia el cielo
  english_pob_reading: The text depicts the dead as conscious spirits whose voice rises heavenward in complaint/accusation.
  chosen_spanish_reading: El texto presenta a los muertos como espíritus conscientes cuya voz asciende al cielo en un clamor que puede implicar queja o apelación.
  alternative_spanish_readings:
  - Una mera descripción de sonido que sube al cielo
  - Una oración explícita de los muertos
  rationale: El español debe mantener la tensión del texto sin cerrar el sentido del último verbo. «Clamó» conserva el carácter audible y urgente del original, dejando abierta la fuerza jurídica o suplicante que el contexto pueda sugerir.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés, que volvió el final a una formulación más neutral («cried out»). Por eso se evita una traducción cerrada como «hizo acusación» o «hizo petición» y se adopta «clamó», dejando la ambigüedad funcional del verbo final.
  spanish_consistency_notes:
  - Se mantuvo «espíritus» y no «almas» para respetar la antropología apocalíptica del pasaje.
  - Se preservó la expresión semítica «hijos de los hombres» siguiendo la forma elevada del original.
  - «Cielo» se usa aquí por la oposición espacial clásica con la ascendencia de la voz, sin introducir una parafrasis doctrinal.
  - No se introdujo «SEÑOR» ni otras sustituciones teológicas ajenas al texto.
  - El final se dejó deliberadamente abierto entre queja, reclamación y clamor, conforme al historial de decisiones del POB inglés.
