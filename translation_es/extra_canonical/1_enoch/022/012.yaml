translation:
  language: es
  text: Y así se ha hecho una división para las almas de los que presentan su queja[a], los que dan a conocer su destrucción[b], cuando los mataron en los días de los pecadores[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que claman» o «los que acusan». El verbo ge''ez puede sugerir lamento, queja o protesta.'
    reason: alternative_reading
  - marker: b
    text: 'O: «su ruina» o «su violento fin». La expresión puede referirse de manera específica a la forma violenta de su muerte.'
    reason: alternative_reading
  - marker: c
    text: Este versículo continúa la descripción de lugares separados para los muertos en el Seol, donde los que fueron muertos aguardan juicio y vindicación.
    reason: cross_reference
lexical_decisions:
- source_word: ተፈልጠ
  english_pob_choice: a division has been made
  chosen_spanish: se ha hecho una división
  alternatives_spanish:
  - se ha separado
  - se ha hecho una distinción
  - se ha apartado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo ge'ez expresa separación o división. En español, 'se ha hecho una división' conserva el valor espacial/judicial sin sobreespecificar el tipo de compartimiento.
- source_word: ለነፍሰ
  english_pob_choice: for the souls
  chosen_spanish: para las almas
  alternatives_spanish:
  - para las almas de
  - a las almas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido dativo/preposicional encaja con un lugar o porción asignada. 'Almas' transmite el plural requerido por las relativas siguientes.
- source_word: እለ ይስክዩ
  english_pob_choice: those who make their complaint
  chosen_spanish: los que presentan su queja
  alternatives_spanish:
  - los que lamentan
  - los que claman
  - los que acusan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede abarcar lamentación, protesta y denuncia. 'Presentan su queja' conserva ese cruce entre lamento y reclamación forense sin fijarlo demasiado en una sola dirección.
- source_word: እለ ያርእዩ
  english_pob_choice: who make known
  chosen_spanish: los que dan a conocer
  alternatives_spanish:
  - los que revelan
  - los que muestran
  - los que testifican
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo significa mostrar o hacer saber. 'Dar a conocer' suena natural en español y mantiene la fuerza de divulgación de lo oculto.
- source_word: በእንተ ሕጉለት
  english_pob_choice: concerning their destruction
  chosen_spanish: su destrucción
  alternatives_spanish:
  - su ruina
  - su violento fin
  - su perecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El complemento introducido por 'concerning' puede sonar pesado en español; el contexto ya aporta el matiz de referencia. 'Su destrucción' conserva la amplitud semántica de ruina o aniquilación violenta.
- source_word: አመ ተቀትሉ
  english_pob_choice: when they were slain
  chosen_spanish: cuando fueron muertos
  alternatives_spanish:
  - cuando fueron asesinados
  - cuando fueron matados
  - cuando fueron degollados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva refiere claramente a muerte violenta. 'Fueron muertos' mantiene el registro elevado y la violencia sin añadir una calificación jurídica no explicitada.
- source_word: በመዋዕለ ኃጥኣን
  english_pob_choice: in the days of the sinners
  chosen_spanish: en los días de los pecadores
  alternatives_spanish:
  - durante los días de los pecadores
  - en tiempos de los pecadores
  - en la época de los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es temporal y caracteriza la era por quienes son pecadores. 'Pecadores' es transparente y mantiene el contraste moral propio de la literatura enóquica.
theological_decisions:
- issue: Si las almas se presentan solo como dolientes o también como denunciantes de sangre injustamente derramada
  english_pob_reading: The main text uses 'make their complaint' to preserve both lament and forensic protest.
  chosen_spanish_reading: '''presentan su queja'' conserva a la vez el lamento y la protesta/denuncia.'
  alternative_spanish_readings:
  - los que claman
  - los que acusan
  rationale: El contexto de este capítulo incluye la sangre de los muertos clamando por justicia. Una formulación doblemente abierta mantiene la tensión teológica entre duelo e imputación sin resolverla artificialmente.
  doctrine_reference: Conservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El contexto inglés más reciente mantuvo sin cambios la redacción principal, con revisión menor previa sobre 'who make known their destruction'. La versión española sigue esa decisión al naturalizarla como 'los que dan a conocer su destrucción', evitando una construcción forzada y preservando el matiz forense/revelatorio.
  spanish_consistency_notes:
  - Se mantiene 'almas' para ለነፍሰ, coherente con el plural del contexto.
  - '''Pecadores'' se usa para ኃጥኣን por transparencia y por la antítesis moral enóquica.'
  - No se introduce terminología eclesiástica adicional; el registro sigue siendo bíblico y sobrio.
  - La nota de la destrucción queda anclada en el texto para reflejar la ambigüedad entre ruina general y muerte violenta.
