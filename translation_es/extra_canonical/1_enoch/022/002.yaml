translation:
  language: es
  text: 'Y había en él cuatro lugares huecos[a], profundos, anchos y muy lisos; tres de ellos eran oscuros, y uno era luminoso, y en medio de él brotaba agua[b]. Y dije: «¡Qué lisos son estos lugares huecos[c], y qué profundos y oscuros a la vista!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez de este versículo es difícil en varios puntos, especialmente en la descripción de estos lugares huecos como «lisos». El sentido probable es que las cavidades parecían escarpadas o pulidas.
    reason: lexical_alternative
  - marker: b
    text: Algunos intérpretes entienden que la frase se refiere a una fuente o corriente de agua situada en el centro del lugar luminoso.
    reason: alternative_reading
  - marker: c
    text: 'O: «profundos y muy lisos».'
    reason: previous_rendering
lexical_decisions:
- source_word: አርባዕቱ መካናት
  english_pob_choice: four hollow places
  chosen_spanish: cuatro lugares huecos
  alternatives_spanish:
  - cuatro cavidades
  - cuatro cámaras
  - cuatro lugares
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መካናት puede significar lugares o espacios, pero en esta visión interior conviene una expresión que sugiera recessos vacíos. «Lugares huecos» mantiene la idea espacial sin añadir una interpretación más específica de la que permite el ge'ez.
- source_word: ዕሙቀ
  english_pob_choice: deep
  chosen_spanish: profundos
  alternatives_spanish:
  - profundos
  - hondos
  - sumidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término describe profundidad física visible; en español «profundos» es natural y conserva el rasgo dimensional de las cavidades.
- source_word: ወርኂበ
  english_pob_choice: very smooth
  chosen_spanish: anchos
  alternatives_spanish:
  - anchos
  - muy anchos
  - amplios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada señala que el ge'ez incluye un adjetivo distinto de «profundos» y «lisos», concretamente «wide». Por eso se rinde aquí como «anchos» para no perder el rasgo físico de amplitud.
- source_word: ልሙጸ / ልሙጽ
  english_pob_choice: smooth
  chosen_spanish: muy lisos
  alternatives_spanish:
  - lisos
  - pulidos
  - suaves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto visionario y la repetición posterior apuntan a una superficie lisa o pulida. «Lisos» es claro; el intensivo «muy» reproduce ጥቀ como intensificador.
- source_word: ጥቀ
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - bastante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el valor intensificador del adverbio que modifica la cualidad inmediata, en este caso «lisos».
- source_word: ጸልማት
  english_pob_choice: dark
  chosen_spanish: oscuros
  alternatives_spanish:
  - oscuros
  - tenebrosos
  - sombríos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oscuros» comunica la oposición visual con el único lugar luminoso sin cargar con matices literarios innecesarios.
- source_word: ብርህት
  english_pob_choice: bright
  chosen_spanish: luminoso
  alternatives_spanish:
  - brillante
  - luminoso
  - claro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contraste con «oscuros», «luminoso» expresa bien el lugar lleno de luz en un registro digno y preciso.
- source_word: ነቅዐ ማይ
  english_pob_choice: water was springing up
  chosen_spanish: brotaba agua
  alternatives_spanish:
  - brotaba agua
  - manaba agua
  - saltaba agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase sugiere agua que emerge activamente. «Brotaba agua» mantiene la imagen de surgimiento sin forzar una identificación más concreta como «fuente» o «arroyo».
- source_word: በማእከላ
  english_pob_choice: in its midst
  chosen_spanish: en medio de él
  alternatives_spanish:
  - en su centro
  - en su interior
  - en medio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pronombre se refiere al lugar luminoso; «en medio de él» es idiomático en español y conserva la localización central.
- source_word: ለነጽሮ
  english_pob_choice: to look at
  chosen_spanish: para mirar
  alternatives_spanish:
  - para ver
  - para contemplar
  - para observar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El infinitivo indica percepción visual. «Para mirar» mantiene el tono de observación directa del visionario sin elevar innecesariamente el registro.
theological_decisions:
- issue: Forma de la respuesta visionaria del narrador
  english_pob_reading: And I said
  chosen_spanish_reading: Y dije
  alternative_spanish_readings:
  - Y vi
  - Y exclamé
  - Y me dije
  rationale: El texto ge'ez sostiene una respuesta en primera persona dicha por el vidente. «Y dije» preserva la estructura narrativa y evita convertir la reacción en mera descripción.
  doctrine_reference: Mantener la retórica apocalíptica y la voz del testigo visionario sin nivelar la escena.
- issue: Referencia del agua que surge en el centro
  english_pob_reading: water was springing up
  chosen_spanish_reading: brotaba agua
  alternative_spanish_readings:
  - había una fuente de agua
  - manaba agua
  - corría agua
  rationale: La lectura auditada permite un agua que emerge activamente; «brotaba agua» conserva esa ambigüedad entre agua manando y una fuente sin imponer una lectura más cerrada.
  doctrine_reference: Respetar la ambigüedad léxica cuando el original no exige especificar 'fuente' o 'arroyo'.
translation_notes:
  revision_awareness: 'La auditoría inglesa revisada corrigió una omisión importante: en el ge''ez aparece ወርኂበ, que aporta la idea de «ancho». Por eso la redacción española no sigue la antigua fórmula «profundos y muy lisos», sino que incorpora «anchos» junto con «profundos» y «muy lisos». También se preserva la posible ambigüedad de la imagen del agua, sin cerrar si es manantial, arroyo o surgimiento de agua.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el Tetragrámaton ni términos equivalentes.
  - Se evitó «SEÑOR» y «Cristo» por no corresponder al contenido de esta sección.
  - Se mantuvo un español moderno y solemne, con vocabulario concreto para la visión espacial.
  - 'Se conservó la fuerza descriptiva triple: profundidad, anchura y lisura, siguiendo la revisión auditada del texto ge''ez.'
