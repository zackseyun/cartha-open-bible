  yaml_path: translation/extra_canonical/1_enoch/022/002.yaml
  text: And there were four hollow places in it[a], deep and wide and very smooth; three of them were dark, and one was bright, and water was springing up in its midst. And I said, “How smooth these hollow places are[c][b], and deep and dark to look at.”
  footnotes:
  - marker: a
    text: The Ethiopic text in this verse is difficult at several points, especially in the description of the hollows as 'smooth.' The sense is likely that the cavities were sheer or polished in appearance.
    reason: lexical_alternative
  - marker: b
    text: Some interpreters understand the phrase about water as referring to a spring or stream located in the middle of the bright hollow.
    reason: alternative_reading
  - marker: c
    text: Or 'deep and very smooth'.
    reason: previous_rendering
