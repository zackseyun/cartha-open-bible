  glossary_alignment: 'No hay conflicto con los términos doctrinales del proyecto: ''espíritu'' está bien; no aparecen Yahvé/Mesías/etc. El punto terminológico relevante es la política de preservar repeticiones significativas del original. ''Descendencia'' es aceptable, pero ''linaje'' conserva mejor la fuerza corporativa y judicial del doble ''seed'' en esta frase concreta.'
