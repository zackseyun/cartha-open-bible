translation:
  language: es
  text: 'Y me respondió y me dijo: «Este es el espíritu que salió de Abel, a quien Qayin, su hermano, mató; y le acusa hasta que su linaje sea destruido de delante del rostro de la tierra[a], y su linaje sea borrado[b] de entre el linaje de los hombres[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'de delante del rostro de la tierra'. Se conserva la imagen semítica para no suavizar el registro solemne del pasaje.
    reason: source_note
  - marker: b
    text: '''Borrado'' mantiene la fuerza de la imagen de eliminación total del linaje, en paralelo con la primera cláusula de destrucción.'
    reason: lexical_alternative
  - marker: c
    text: '''Linaje de los hombres'' preserva la repetición de ''seed'' del original; ''humanidad'' o ''descendencia'' serían más fluidos, pero menos transparentes para el paralelismo genealógico del pasaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወአውሥአኒ / ወይቤለኒ
  english_pob_choice: he answered me and said to me
  chosen_spanish: me respondió y me dijo
  alternatives_spanish:
  - me respondió
  - me dijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El Ge'ez incluye ambos verbos y el sufijo de objeto en primera persona; el español conserva la doble fórmula de habla sin sobrecargarla con un gerundio literal.
- source_word: መንፈስ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - viento
  - alma
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario y judicial se trata del referente personal y sobrenatural de Abel, por lo que 'espíritu' es la opción más fiel.
- source_word: ዘወጽአ እምአቤል
  english_pob_choice: that came out from Abel
  chosen_spanish: que salió de Abel
  alternatives_spanish:
  - que salió de entre Abel
  - que procedió de Abel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Salió de'' reproduce bien el movimiento procedente del texto y suena natural en español sin perder la imagen original.'
- source_word: ዘቀተሎ ቃየን እኁሁ
  english_pob_choice: whom Qayin his brother killed
  chosen_spanish: a quien Qayin, su hermano, mató
  alternatives_spanish:
  - a quien mató Qayin, su hermano
  - a quien su hermano Qayin mató
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el nombre transliterado Qayin y el parentesco explícito; 'mató' es el equivalente español directo y solemne de killed.
- source_word: ይሰኪ ኪያሁ
  english_pob_choice: it accuses him
  chosen_spanish: le acusa
  alternatives_spanish:
  - le hace acusación
  - presenta acusación contra él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene sentido jurídico. En español, 'le acusa' conserva la fuerza forense sin perder claridad ni naturalidad.
- source_word: ይትኀጐል ዘርኡ
  english_pob_choice: his seed is destroyed
  chosen_spanish: su descendencia sea destruida
  alternatives_spanish:
  - su semilla sea destruida
  - su linaje sea destruido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Descendencia'' expresa en español actual el valor de linaje/corporación familiar que el texto preserva con ''seed''; se mantiene la noción genealógica del juicio.'
- source_word: እምቅድመ ገጸ ለምድር
  english_pob_choice: from before the face of the earth
  chosen_spanish: de delante del rostro de la tierra
  alternatives_spanish:
  - de la faz de la tierra
  - de delante de la faz de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la imagen semítica elevada. 'Rostro' refleja bien el 'face' del original; la formulación mantiene el tono solemne del texto.
- source_word: ይማስን ዘርኡ
  english_pob_choice: his seed is blotted out
  chosen_spanish: su descendencia sea borrada
  alternatives_spanish:
  - su descendencia sea obliterada
  - su descendencia sea eliminada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Borrada'' comunica con claridad la idea de ser borrado/quitado, manteniendo el paralelismo con la cláusula anterior y evitando un término demasiado técnico.'
- source_word: እምዘርአ ሰብእ
  english_pob_choice: from among the seed of men
  chosen_spanish: de entre la descendencia de los hombres
  alternatives_spanish:
  - de entre la simiente de los hombres
  - de entre los hombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''De entre'' refleja bien la exclusión desde un conjunto humano; ''descendencia'' conserva la repetición de ''seed'' y su carga genealógica.'
theological_decisions:
- issue: Cómo rendir la presencia postmortem de Abel
  english_pob_reading: spirit
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - alma
  - sombra
  - voz
  rationale: El Ge'ez usa explícitamente መንፈስ. En un marco apocalíptico, 'espíritu' preserva la realidad personal del testigo muerto sin domesticar la escena.
  doctrine_reference: Preservar la tensión teológica y la imaginería apocalíptica sin resolverla artificialmente.
- issue: Cómo conservar la fórmula de juicio genealógico sobre la línea de Qayin
  english_pob_reading: his seed is destroyed ... his seed is blotted out
  chosen_spanish_reading: su descendencia sea destruida ... su descendencia sea borrada
  alternative_spanish_readings:
  - su linaje sea destruido ... su linaje sea borrado
  - su posteridad sea destruida ... su posteridad sea borrada
  rationale: La repetición de 'seed' es deliberada y sostiene el sentido corporativo del castigo; 'descendencia' permite conservar esa repetición en español de modo inteligible.
  doctrine_reference: Consistencia de términos clave y preservación de la fórmula repetida del texto.
translation_notes:
  revision_awareness: 'La versión revisada en inglés eliminó el redundante ''saying'' y prefirió una formulación más natural para ''accuses him'' y ''from among the seed of men''. La presente redacción española sigue esa revisión: evita un calco de gerundio innecesario, usa un verbo jurídico natural (''le acusa'') y expresa la exclusión con ''de entre''.'
  spanish_consistency_notes:
  - Se mantiene Qayin en vez de 'Caín' para seguir la transliteración del expediente fuente.
  - Se conserva 'descendencia' en ambas apariciones para reflejar la repetición de 'seed' y la lógica genealógica del juicio.
  - El tono intenta ser solemne y readable, evitando arcaísmos innecesarios pero sin trivializar el estilo apocalíptico.
