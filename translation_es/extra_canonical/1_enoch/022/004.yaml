  yaml_path: translation/extra_canonical/1_enoch/022/004.yaml
  text: And these places were made for them to dwell in until the day of their judgment[a], and until their appointed time, and that appointed time is long[c][b], until the time of the great judgment upon them.
  footnotes:
  - marker: a
    text: The marked word in the Ethiopic witness (†ገብሩ†) is textually uncertain. The sense of the clause is that these are the places designated for them to dwell until judgment.
    reason: textual_variant
  - marker: b
    text: '''Appointed time'' renders a term that can also mean ''age,'' ''lifetime,'' or ''term.'' Here it likely refers to the fixed period allotted before final judgment.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And these are the places where they will dwell until the day of their judgment, and until their appointed time, and that appointed time is great, until the great judgment comes upon them.'.
