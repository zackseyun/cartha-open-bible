translation:
  language: es
  text: Y estos lugares fueron hechos para que habiten en ellos hasta el día de su juicio[a], y hasta su tiempo asignado[b], y ese tiempo asignado es largo[c], hasta el tiempo del gran juicio sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo marcado en el testimonio etiópico (†ገብሩ†) es textualmente incierto. El sentido de la cláusula es que estos son los lugares dispuestos para que habiten allí hasta el juicio.
    reason: textual_variant
  - marker: b
    text: «Tiempo asignado» traduce una expresión que también puede significar «edad», «vida» o «término». Aquí probablemente se refiere al plazo fijo concedido antes del juicio final.
    reason: lexical_alternative
  - marker: c
    text: 'O: «Y estos lugares fueron hechos para que habiten en ellos hasta el día de su juicio, y hasta su tiempo asignado, y ese tiempo asignado es grande, hasta el tiempo del gran juicio sobre ellos».'
    reason: previous_rendering
lexical_decisions:
- source_word: መካናት
  english_pob_choice: places
  chosen_spanish: lugares
  alternatives_spanish:
  - moradas
  - sitios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo designa ubicaciones o lugares de habitación. «Lugares» conserva amplitud y evita cargar la imagen con una interpretación más específica que el texto no exige.
- source_word: ይነብርዎሙ
  english_pob_choice: they will dwell
  chosen_spanish: habiten en ellos
  alternatives_spanish:
  - moren en ellos
  - permanezcan en ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa morar o permanecer. «Habiten en ellos» mantiene la idea de residencia continua y suena natural en español bíblico contemporáneo.
- source_word: ኵነኔሆሙ
  english_pob_choice: their judgment
  chosen_spanish: su juicio
  alternatives_spanish:
  - su sentencia
  - su condenación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Juicio» preserva el registro judicial del término sin decidir de antemano si el resultado es condenación. Esto conserva la tensión semántica observada en la traducción inglesa auditable.
- source_word: አመ ዕድሜሆሙ
  english_pob_choice: their appointed time
  chosen_spanish: su tiempo asignado
  alternatives_spanish:
  - su edad fijada
  - su término señalado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto escatológico, ዕድሜ apunta a un período fijado. «Tiempo asignado» comunica mejor ese plazo establecido que «edad» o «lifetime» en español.
- source_word: ዘየዓቢ
  english_pob_choice: is great
  chosen_spanish: es largo
  alternatives_spanish:
  - es grande
  - es extenso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el adjetivo básico es «grande», el contexto de duración favorece una equivalencia que haga explícita la extensión temporal. La revisión inglesa también entendió aquí una noción de duración.
- source_word: ኵነኔ ዐቢይ በላዕሌሆሙ
  english_pob_choice: the great judgment upon them
  chosen_spanish: el gran juicio sobre ellos
  alternatives_spanish:
  - el gran juicio que vendrá sobre ellos
  - el juicio grande sobre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre ellos» reproduce la dirección del juicio y mantiene el tono de visita escatológica. «Gran juicio» conserva la solemnidad del original sin añadir precisión doctrinal no explicitada.
- source_word: †ገብሩ†
  english_pob_choice: were made
  chosen_spanish: fueron hechos
  alternatives_spanish:
  - fueron preparados
  - fueron designados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma marcada es textualmente incierta. Para reflejar el valor del verbo en el contexto, «fueron hechos» conserva la pasiva y permite entender que estos lugares fueron dispuestos para su morada.
theological_decisions:
- issue: Si ኵነኔ debe estrecharse a condenación o mantenerse como juicio
  english_pob_reading: judgment
  chosen_spanish_reading: juicio
  alternative_spanish_readings:
  - condenación
  - sentencia
  rationale: El texto habla en marco judicial y apocalíptico, pero no obliga a reducir el término a condenación. «Juicio» conserva la amplitud del original y evita resolver una tensión doctrinal que el verso no desarrolla.
  doctrine_reference: Mantener la amplitud del juicio escatológico sin sobreespecificar el resultado.
- issue: Cómo tratar la frase textual incierta †ገብሩ†
  english_pob_reading: were made
  chosen_spanish_reading: fueron hechos
  alternative_spanish_readings:
  - fueron preparados
  - fueron designados
  rationale: La tradición textual presenta una forma difícil. En español conviene preservar la pasiva y la incertidumbre, sin decidir prematuramente entre preparación, fabricación o designación.
  doctrine_reference: Preservar la incertidumbre textual y no resolverla interpretativamente.
translation_notes:
  revision_awareness: La revisión más reciente en inglés cambió «great» por «long» para la idea de ዕድሜ/appointed time, y restauró la sintaxis de la primera cláusula con «were made». Esta versión española sigue esa línea al usar «tiempo asignado» y al reflejar la pasiva «fueron hechos», además de conservar la apertura interpretativa en el juicio final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general POB, pero este versículo no contiene el Nombre divino.
  - Se usa «juicio» y no «condenación» para conservar la amplitud judicial del término.
  - «Tiempo asignado» refleja la noción temporal fija sin imponer «edad» en español.
  - La frase final conserva el valor de duración con «es largo», en línea con la revisión inglesa.
  - Se mantiene una pasiva en la primera cláusula para no perder la incertidumbre textual del verbo marcado.
