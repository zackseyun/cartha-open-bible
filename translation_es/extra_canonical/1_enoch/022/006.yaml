translation:
  language: es
  text: 'En aquel tiempo le pregunté a Rafael, el ángel que estaba conmigo, y le dije: «Este espíritu[a] cuya voz llega así y acusa[b], ¿a quién pertenece?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término puede traducirse 'alma', pero aquí 'espíritu' preserva mejor el sentido apocalíptico y la continuidad con el contexto de los muertos.
    reason: theological_note
  - marker: b
    text: 'O: «y hace acusación». La elección de «acusa» mantiene el matiz forense del verbo ge''ez y enlaza con la repetición del contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ውእቱ ጊዜ
  english_pob_choice: At that time
  chosen_spanish: Entonces
  alternatives_spanish:
  - En aquel tiempo
  - En ese momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la fórmula temporal narrativa con naturalidad en español y conserva el tono elevado sin volverse arcaico.
- source_word: ተስእልክዎ
  english_pob_choice: I asked
  chosen_spanish: le pregunté
  alternatives_spanish:
  - le hice una pregunta
  - le inquirí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'pregunté' comunica de forma directa y natural la introducción de la consulta de Enoc al ángel.
- source_word: ለሩፋኤል መልአክ
  english_pob_choice: Raphael, the angel
  chosen_spanish: a Rafael, el ángel
  alternatives_spanish:
  - al ángel Rafael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se translitera el nombre propio y se traduce el título; el orden mantiene el matiz apposicional cercano al ge'ez.
- source_word: እንዘ ሀሎ ምስሌየ
  english_pob_choice: who was with me
  chosen_spanish: que estaba conmigo
  alternatives_spanish:
  - que se hallaba conmigo
  - mientras estaba conmigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relativa identifica a Rafael como compañero de Enoc; 'estaba conmigo' suena idiomático y fiel.
- source_word: ዝመንፈስ
  english_pob_choice: This spirit
  chosen_spanish: Este espíritu
  alternatives_spanish:
  - Esta alma
  - Este ser espiritual
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Espíritu'' preserva el término antropológico-apocalíptico del texto sin sustituirlo por una explicación interpretativa.'
- source_word: ዘመኑ
  english_pob_choice: whose
  chosen_spanish: cuya
  alternatives_spanish:
  - de quien
  - que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cuya'' funciona bien en español para enlazar la voz del espíritu con la pregunta por su identidad.'
- source_word: ዘከመዝ ቃሉ ይበጽሕ
  english_pob_choice: whose voice reaches thus
  chosen_spanish: cuya voz llega así
  alternatives_spanish:
  - cuya voz llega de este modo
  - cuya voz alcanza hasta aquí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Llega así'' conserva el valor de alcance/arribo del verbo y mantiene la construcción del original de forma natural.'
- source_word: ወይሰኪ
  english_pob_choice: and accuses
  chosen_spanish: y acusa
  alternatives_spanish:
  - y denuncia
  - y hace acusación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada del inglés subraya el sentido forense del verbo. 'Acusa' conserva ese valor judicial sin sobreexplicar.
theological_decisions:
- issue: Naturaleza del 'espíritu' que clama
  english_pob_reading: This spirit
  chosen_spanish_reading: Este espíritu
  alternative_spanish_readings:
  - Esta alma
  - Este ser espiritual
  rationale: Se mantiene 'espíritu' para no resolver indebidamente la antropología del pasaje. El texto presenta una voz en un escenario visionario, y el término conserva la tensión apocalíptica.
  doctrine_reference: Preservar la tensión teológica y terminológica sin armonizarla en exceso.
- issue: Sentido del verbo final ወይሰኪ
  english_pob_reading: accuses
  chosen_spanish_reading: acusa
  alternative_spanish_readings:
  - denuncia
  - hace acusación
  rationale: La tradición auditada del inglés terminó en 'accuses', y el contexto inmediato es judicial. 'Acusa' sostiene la carga forense sin convertir el enunciado en una paráfrasis.
  doctrine_reference: Primacía del sentido original con coherencia interna del pasaje.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, que prefirió 'accuses' y reformuló la pregunta final como 'to whom does it belong?'. En español se optó por '¿a quién pertenece?' porque es la manera más natural y formal de conservar esa pregunta de pertenencia/identidad sin perder el sentido del original. También se respetó la lectura forense del verbo final, evitando suavizarla como 'petición'.
  spanish_consistency_notes:
  - Se mantiene el nombre 'Rafael' transliterado, con el título traducido como 'el ángel'.
  - Se conserva 'espíritu' de modo consistente con el léxico apocalíptico de 1 Enoc.
  - La pregunta final se formula con una construcción española natural ('¿a quién pertenece?') para expresar identidad/posesión, en línea con el inglés auditado y el ge'ez.
  - No se introduce 'Señor' ni otras sustituciones eufemísticas; el pasaje no requiere terminología divina en esta línea.
