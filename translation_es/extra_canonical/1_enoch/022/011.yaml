translation:
  language: es
  text: Aquí sus almas están separadas en esta gran aflicción hasta el gran día del juicio, del castigo y de la aflicción para los que son maldecidos para siempre[a]; y venganza sobre sus almas. Allí los atará para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase también puede entenderse como 'los que maldicen para siempre' si el verbo ge'ez se toma en sentido activo, pero el sentido pasivo encaja mejor con el contexto de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: በዝየ
  english_pob_choice: Here
  chosen_spanish: Aquí
  alternatives_spanish:
  - En este lugar
  - Acá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio ge'ez es locativo y significa 'aquí / en este lugar'. 'Aquí' reproduce mejor esa localización que un valor consecutivo como 'así'.
- source_word: ይትፈለጠ
  english_pob_choice: are separated
  chosen_spanish: están separadas
  alternatives_spanish:
  - están apartadas
  - son separadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma expresa separación o asignación a un lugar distinto. 'Están separadas' mantiene la idea de estado resultante sin volverla excesivamente técnica.
- source_word: ነፍሳቲሆሙ
  english_pob_choice: their souls
  chosen_spanish: sus almas
  alternatives_spanish:
  - sus espíritus
  - sus vidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este pasaje de los muertos aguardando juicio, 'almas' es la equivalencia más natural y fiel al referente disembodied del contexto.
- source_word: ዐቢይ ጻዕር
  english_pob_choice: great affliction
  chosen_spanish: gran aflicción
  alternatives_spanish:
  - gran tormento
  - gran dolor
  - gran angustia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Aflicción'' conserva el sufrimiento real sin decidir de más entre dolor físico, angustia o tormento punitivo; preserva la tensión del texto.'
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - condena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Juicio'' es el término más amplio y transparente en español para el acto judicial escatológico que el contexto presenta.'
- source_word: መቅሠፍት
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - pena
  - plaga
  - azote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta secuencia legal-apocalíptica, 'castigo' comunica bien la consecuencia penal sin introducir imágenes de plaga que no son obligatorias aquí.
- source_word: ይረግሙ
  english_pob_choice: are cursed
  chosen_spanish: maldicen
  alternatives_spanish:
  - son maldecidos
  - están malditos
  - blasfeman
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión del audit trail indica que el verbo es activo: ''los que maldicen''. ''Maldicen'' respeta esa lectura y evita invertir el sentido.'
- source_word: ወበቀል
  english_pob_choice: and vengeance
  chosen_spanish: y venganza
  alternatives_spanish:
  - y retribución
  - y desquite
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo expresa represalia retributiva; 'venganza' preserva la fuerza judicial y apocalíptica del término.
- source_word: ይእስሮሙ
  english_pob_choice: he will bind them
  chosen_spanish: los atará
  alternatives_spanish:
  - los vendará
  - los encadenará
  - los sujetará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Atará'' mantiene la imagen concreta de sujeción y castigo sin añadir un objeto no atestiguado como ''cadenas''.'
- source_word: እስከ ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por los siglos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula indica duración sin fin. 'Para siempre' es idiomático y solemne en español contemporáneo.
theological_decisions:
- issue: La tensión entre separación y sufrimiento previo al juicio final
  english_pob_reading: 'The main text preserves both separation and suffering: ''separated in this great affliction ... until the great day of judgment.'''
  chosen_spanish_reading: 'El texto principal conserva tanto la separación como la aflicción: ''están separadas en esta gran aflicción ... hasta el gran día del juicio''.'
  alternative_spanish_readings:
  - '''están apartadas en este gran tormento'''
  - '''están separadas para el gran juicio'''
  rationale: El ge'ez combina lenguaje de ubicación/separación con un término de sufrimiento real. La traducción no resuelve la tensión hacia una custodia neutral ni hacia un castigo totalmente consumado.
  doctrine_reference: Preservar la tensión teológica del original.
- issue: La caracterización de los destinatarios de la aflicción final
  english_pob_reading: those who are cursed forever
  chosen_spanish_reading: los que maldicen para siempre
  alternative_spanish_readings:
  - los que son maldecidos para siempre
  - los malditos para siempre
  rationale: La revisión crítica del audit trail favorece la lectura activa del verbo ge'ez, coherente con el fragmento griego citado en el contexto. Por eso se traduce como acción de maldecir, no como pasivo.
  doctrine_reference: Primacía de la fuente original sobre una tradición de traducción previa.
- issue: La forma de expresar la venganza sobre las almas
  english_pob_reading: and vengeance on their souls. There he will bind them.
  chosen_spanish_reading: y venganza sobre sus almas. Allí los atará para siempre.
  alternative_spanish_readings:
  - y allí hará venganza sobre sus almas. Allí los atará.
  - y les hará venganza en sus almas. Allí los atará para siempre.
  rationale: El ge'ez presenta un sintagma nominal coordinado ('y venganza sobre sus almas'), no una cláusula verbal independiente. El español conserva esa estructura y deja 'allí' para la acción de atar.
  doctrine_reference: Respeto a la gramática de la fuente original.
translation_notes:
  revision_awareness: Se incorporó la revisión crítica que corrige la lectura de በዝየ como 'aquí' y la de ይረግሙ como verbo activo ('maldicen'). También se ajustó la segunda mitad del verso para mantener 'venganza sobre sus almas' como sintagma nominal, en vez de convertirlo en una cláusula verbal independiente. La decisión española sigue el texto original y el aparato inglés, no la redacción inicial revisada erróneamente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - '''Almas'' se conserva de forma consistente para ነፍሳቲሆሙ en este contexto escatológico.'
  - '''Juicio'' y ''castigo'' mantienen el registro jurídico-apocalíptico del pasaje.'
  - Se evita 'Cristo', 'SEÑOR' o formulaciones eclesiales que no están motivadas por la fuente.
