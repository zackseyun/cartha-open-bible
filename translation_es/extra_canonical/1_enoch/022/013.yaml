    text: The Ethiopic verb can be understood as 'has been made/prepared/appointed.' In this context of designated places for the dead, 'appointed' is preferred.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult. It may mean 'they will be with the lawless,' 'they will be like them,' or some combination of both.
    reason: alternative_reading
  - marker: c
    text: Or 'the children of men'.
    reason: previous_rendering
  - marker: d
    text: Or '—and their souls as well.'.
    reason: previous_rendering
