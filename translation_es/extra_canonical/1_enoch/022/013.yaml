translation:
  language: es
  text: Y así ha sido hecho para las almas de la gente que no es justa[a], sino pecadora, completa en transgresión, y estarán con los inicuos como ellos[b]. Pero en cuanto a sus almas...
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo ge'ez puede entenderse como 'ha sido hecho/establecido/preparado'. En este contexto de destinos postmortem, también puede expresar la idea de una disposición o asignación fijada.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final es difícil. Puede entenderse como 'estarán con los inicuos', 'serán como ellos' o una combinación de ambas.
    reason: alternative_reading
lexical_decisions:
- source_word: ተፈጥረ
  english_pob_choice: has been appointed
  chosen_spanish: ha sido establecido
  alternatives_spanish:
  - ha sido hecho
  - ha sido preparado
  - ha sido creado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de compartimentos para los muertos y de un destino postmortem designado, el verbo expresa una disposición establecida más que una creación física. "Ha sido establecido" conserva ese sentido funcional sin fijar indebidamente la imagen.
- source_word: ለነፍሶሙ
  english_pob_choice: for the souls of them
  chosen_spanish: para las almas de los hombres
  alternatives_spanish:
  - para sus almas
  - para las almas de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción con lamed indica la destinación de lo dispuesto. "Almas de los hombres" refleja el genérico del original y mantiene el registro elevado del pasaje.
- source_word: ለሰብእ
  english_pob_choice: men / the people
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la humanidad
  - los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez aquí es simplemente un genérico humano; en español, "los hombres" es una forma tradicional y comprensible, sin añadir el matiz idiomático más fuerte de "hijos de los hombres" que el original no usa.
- source_word: ኢኮኑ ጻድቃነ አላ ኃጥኣነ
  english_pob_choice: who are not righteous, but sinners
  chosen_spanish: que no son justos, sino pecadores
  alternatives_spanish:
  - que no eran justos, sino pecadores
  - que no son rectos, sino culpables
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el contraste moral directo entre justos y pecadores. "Justos" expresa con claridad la categoría ética del texto; "pecadores" mantiene la oposición sin suavizarla.
- source_word: ፍጹማነ እበሳ
  english_pob_choice: complete in transgression
  chosen_spanish: completos en transgresión
  alternatives_spanish:
  - perfectos en pecado
  - llenos de ofensa
  - consumados en maldad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La combinación intensifica su condición culpable. "Completos en transgresión" conserva la fuerza de ፍጹም sin volverlo un modismo explicativo ajeno al texto.
- source_word: አባሲያን
  english_pob_choice: the lawless
  chosen_spanish: los inicuos
  alternatives_spanish:
  - los sin ley
  - los impíos
  - los transgresores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí se prefirió "inicuos" por su resonancia judicial y moral en español, cercana a la fuerza apocalíptica del término. Aunque "sin ley" sería más literal, resulta menos natural para lectura pública.
- source_word: ይከውኑ ከማሆሙ
  english_pob_choice: will be with ... like them
  chosen_spanish: estarán con ... como ellos
  alternatives_spanish:
  - serán como ellos
  - se unirán con ellos
  - estarán junto a ellos, como ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula es difícil y ambigua. Se conserva la relación de asociación y semejanza sin resolverla hacia una doctrina más específica de castigo o disolución que el testimonio no exige.
- source_word: ወነፍሶሙሰ
  english_pob_choice: But as for their souls...
  chosen_spanish: Pero en cuanto a sus almas...
  alternatives_spanish:
  - Y respecto de sus almas...
  - Pero sus almas...
  - Mas en lo tocante a sus almas...
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El enclítico -sa funciona como partícula de topicalización o contraste, no como adición. "Pero en cuanto a" reproduce mejor el giro sintáctico que una lectura acumulativa.
theological_decisions:
- issue: Cómo traducir el verbo de destino postmortem sin convertirlo en una afirmación ontológica sobre la creación de las almas
  english_pob_reading: assignment/appointment of a fate or place for the wicked souls
  chosen_spanish_reading: disposición establecida para el destino de las almas injustas
  alternative_spanish_readings:
  - creación de las almas
  - hecho de las almas
  - preparación de las almas
  rationale: El contexto inmediato trata de lugares preparados para los muertos y de su suerte diferenciada. Por eso conviene una traducción de asignación/establecimiento, no de creación de las almas mismas.
  doctrine_reference: Translation philosophy §1 Original-language primacy; §3 Preserve theological tension rather than resolve it
- issue: Cómo tratar la cláusula final ambigua sobre la relación con los inicuos
  english_pob_reading: retain ambiguity about whether the souls are 'with' the lawless or 'like' them
  chosen_spanish_reading: mantener la ambigüedad entre compañía y semejanza
  alternative_spanish_readings:
  - estarán condenadas como ellos
  - permanecerán con ellos
  - serán hechas como ellos
  rationale: El ge'ez es comprimido y no obliga a decidir entre varias posibilidades. La versión española conserva esa tensión sin introducir una precisión doctrinal no garantizada por el texto.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se tomó en cuenta la última revisión inglesa, que prefirió una formulación más cercana a 'made' y 'the people', pero también la adjudicación previa que corrigió 'children of men' y el valor adversativo de ወነፍሶሙሰ. La redacción española sigue el sentido de destino asignado, evita añadir 'hijos de' y conserva el corte sintáctico con 'Pero en cuanto a sus almas...'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'transgresión' para እበሳ, siguiendo la fuerza moral-jurídica del contexto.
  - '''Inicuos'' se eligió para አባሲያን por claridad de registro en español público, sin borrar la tensión con ''sin ley''.'
  - La frase final queda abierta con puntos suspensivos porque el verso continúa en el siguiente contexto textual.
