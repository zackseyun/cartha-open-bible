    text: El verbo ge'ez puede entenderse como 'ha sido hecho/establecido/preparado'. En este contexto de destinos postmortem, también puede expresar la idea de una disposición o asignación fijada.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final es difícil. Puede entenderse como 'estarán con los inicuos', 'serán como ellos' o una combinación de ambas.
    reason: alternative_reading
  revision_rationale: Se ajusta 'los hombres' a 'la gente' para reflejar mejor el genérico humano de ለሰብእ en español neutral y se cambia 'ha sido establecido' por 'ha sido hecho' para acercarse más al texto principal auditado, manteniendo en la nota la posibilidad contextual de 'asignación' o 'disposición'.
