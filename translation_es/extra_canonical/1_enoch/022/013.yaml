  yaml_path: translation/extra_canonical/1_enoch/022/013.yaml
  text: And thus it has been made for the souls of the people who are not righteous[a], but sinners, who are complete in transgression, and they will be with the lawless like them[d][c][b]. But as for their souls...
  footnotes:
