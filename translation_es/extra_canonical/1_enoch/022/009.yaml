translation:
  language: es
  text: 'Y me respondió y me dijo[a]: «Estas tres han sido hechas para que los espíritus de los muertos sean separados. Y así se hizo una separación para los espíritus de los justos, donde hay un manantial[b] de agua, con luz sobre él[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El ge''ez repite la idea de separación dos veces: primero respecto de «los espíritus de los muertos» en general y luego específicamente respecto de «los espíritus de los justos». La traducción conserva esa repetición con «sean separados» y «se hizo una separación».'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «una fuente de agua» o «un surgimiento de agua». La imagen es la de un origen de agua dentro del lugar asignado a los justos.
    reason: lexical_alternative
  - marker: c
    text: La frase del ge'ez es muy breve y puede describir la luz colocada sobre el manantial o sobre toda la separación de los justos.
    reason: alternative_reading
lexical_decisions:
- source_word: ወአውሥአኒ / ወይቤለኒ
  english_pob_choice: And he answered me and said to me
  chosen_spanish: Y me respondió y me dijo
  alternatives_spanish:
  - Y me respondió y me habló
  - Y respondió y me dijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La doble fórmula verbal se conserva en español para reflejar la respuesta seguida de discurso directo, sin añadir contenido no presente en el ge'ez.
- source_word: ፫ትገብሩ
  english_pob_choice: These three have been made
  chosen_spanish: Estas tres han sido hechas
  alternatives_spanish:
  - Estas tres fueron hechas
  - Estas tres han sido hechas para
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto ge'ez expresa tres realidades hechas/establecidas; 'han sido hechas' mantiene el valor resultativo sin introducir explícitamente 'divisiones', que el texto no nombra aquí.
- source_word: ይትፈለጠ
  english_pob_choice: might be separated
  chosen_spanish: sean separados
  alternatives_spanish:
  - se separen
  - sean apartados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sean separados'' conserva la raíz de separación repetida en el verso y mantiene el matiz pasivo/teleológico del pasaje apocalíptico.'
- source_word: ተፈልጠ
  english_pob_choice: a division has been made
  chosen_spanish: se ha hecho una separación
  alternatives_spanish:
  - ha sido hecha una separación
  - se ha hecho una división
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición del mismo verbo se traduce con otra forma pasiva/reflexiva en español para preservar el paralelismo con la cláusula anterior sin forzar una frase nominal.
- source_word: መንፈሶሙ
  english_pob_choice: the spirits
  chosen_spanish: los espíritus
  alternatives_spanish:
  - las almas
  - los seres espirituales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Espíritus'' es el equivalente más directo y consistente con la antropología visionaria del pasaje; ''almas'' suavizaría el término y desplazaría su fuerza léxica.'
- source_word: ምዉታን
  english_pob_choice: the dead
  chosen_spanish: de los muertos
  alternatives_spanish:
  - de los fallecidos
  - de los difuntos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Muertos'' reproduce el sustantivo colectivo de manera natural en español y mantiene el contraste con ''los justos'' del siguiente miembro.'
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Los justos'' es la forma española más estable para el grupo vindicado en contextos de juicio y recompensa; conserva el sentido forense/moral del término.'
- source_word: ነቅዐ ማይ
  english_pob_choice: a spring of water
  chosen_spanish: una fuente de agua
  alternatives_spanish:
  - un manantial de agua
  - una fuente/manantial de agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez designa una fuente o surgencia de agua; 'fuente de agua' comunica bien la imagen concreta y permite una lectura natural en español.
- source_word: በላዕሌሁ ብርሃን
  english_pob_choice: with light above it
  chosen_spanish: con luz sobre ella
  alternatives_spanish:
  - y luz sobre ella
  - con luz encima de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción breve del ge'ez se expresa de modo igualmente conciso. 'Sobre ella' preserva la ubicación de la luz respecto de la fuente sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: 'Cómo representar la antropología del pasaje: spirits of the dead'
  english_pob_reading: spirits of the dead
  chosen_spanish_reading: los espíritus de los muertos
  alternative_spanish_readings:
  - las almas de los muertos
  - los espíritus de los fallecidos
  rationale: '''Espíritus'' mantiene el término repetido del ge''ez y evita sustituirlo por ''almas'', que en español puede sonar más interpretativo y menos fiel al léxico visionario del texto.'
  doctrine_reference: Translation philosophy §1, §3, §4
- issue: Preservar la repetición de separación entre los muertos y los justos
  english_pob_reading: separated / division
  chosen_spanish_reading: sean separados / se ha hecho una separación
  alternative_spanish_readings:
  - se dividan / se ha hecho una división
  - se aparten / se ha apartado
  rationale: El pasaje insiste en la misma raíz semántica para subrayar una separación espacial y escatológica. En español, 'sean separados' y 'se ha hecho una separación' conservan esa repetición sin reducirla a una simple abstracción.
  doctrine_reference: 'Book context: preserve cosmic imagery; Translation philosophy §3'
- issue: Naturaleza del compartimento de los justos
  english_pob_reading: a distinct division for the righteous marked by a spring of water and light above it
  chosen_spanish_reading: una separación para los espíritus de los justos, donde hay una fuente de agua, con luz sobre ella
  alternative_spanish_readings:
  - un lugar separado para los justos, con una fuente de agua y luz sobre ella
  - una división para los justos, donde hay una fuente de agua
  rationale: La sintaxis española conserva la localización espacial y el carácter imagístico del lugar. 'Separación' deja abierta la ambigüedad entre 'compartimento' y 'estado/escisión' sin añadir una categoría que el ge'ez no explícita aquí.
  doctrine_reference: 'Book context: preserve cosmic imagery; Translation philosophy §3'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail al evitar introducir 'divisiones' donde el ge'ez solo dice 'estas tres fueron/hechas' y al mantener la repetición verbal de la separación. También conserva la imagen final breve ('con luz sobre ella') sin expandirla interpretativamente.
  spanish_consistency_notes:
  - Se mantiene 'espíritus' para መንፈሶሙ, coherente con el audit trail y con el uso apocalíptico del término.
  - '''Justos'' traduce ጻድቃን con el sentido forense/moral esperado, evitando opciones más libres como ''rectos'' en el texto principal.'
  - '''Fuente de agua'' conserva el carácter concreto del lugar; las alternativas léxicas quedan registradas en nota.'
  - La puntuación española reproduce un discurso directo claro y publicable, sin añadir elementos exegéticos al cuerpo del texto.
