translation:
  language: es
  text: 'Y en aquel tiempo pregunté acerca de él[a] y acerca del juicio de todos: ¿por qué razón fueron separados, unos de otros?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Él» refleja el sufijo singular masculino del ge'ez, que la revisión inglesa identifica como referencia al antecedente inmediato y no a un plural.
    reason: source_note
lexical_decisions:
- source_word: ውእተ ጊዜ
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal narrativa se conserva con un giro natural y solemne en español. «En aquel tiempo» mantiene el registro elevado de la visión y corresponde bien a la secuencia discursiva del original.
- source_word: ተስእልኩ
  english_pob_choice: I asked
  chosen_spanish: pregunté
  alternatives_spanish:
  - inquirí
  - interrogué
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa una acción de preguntar/inquirir. «Pregunté» es claro, natural y fiel; «inquirí» sería más formal, pero menos transparente para lectura pública.
- source_word: በእንቲአሁ / በእንተ
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El preposición repetida marca los temas de la pregunta. «Acerca de» conserva la relación temática sin sonar excesivamente técnica en español.
- source_word: በእንቲአሁ
  english_pob_choice: concerning him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - acerca de eso
  - respecto de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa aclara que el sufijo es singular masculino y remite al antecedente inmediato, el espíritu de Abel mencionado antes. «Él» conserva esa referencia específica; se evita el plural para no borrar esa precisión.
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - juicio condenatorio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo puede abarcar juicio, sentencia o condena. «Juicio» preserva el alcance amplio que el audit trail inglés defiende, sin reducirlo prematuramente a castigo.
- source_word: ኵሉ
  english_pob_choice: of all
  chosen_spanish: de todos
  alternatives_spanish:
  - de todo
  - de toda la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica alcance universal. «De todos» es la forma más natural en español para el genitivo colectivo y mantiene la amplitud del original.
- source_word: ምንት
  english_pob_choice: for what reason
  chosen_spanish: por qué razón
  alternatives_spanish:
  - por qué
  - con qué motivo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pregunta busca la causa o razón de la separación. «Por qué razón» conserva el matiz explicativo y el tono formal del inglés auditado.
- source_word: ተፈልጡ
  english_pob_choice: were separated
  chosen_spanish: fueron separados
  alternatives_spanish:
  - fueron divididos
  - fueron apartados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo describe una diferenciación real entre los compartimentos o grupos vistos por Enoc. «Fueron separados» es preciso y no fuerza una interpretación más técnica de la escena.
- source_word: ፩እምነ ፩
  english_pob_choice: one from another
  chosen_spanish: unos de otros
  alternatives_spanish:
  - uno de otro
  - entre sí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión recíproca se vierte de forma idiomática en español. «Unos de otros» comunica separación mutua con naturalidad y mantiene el valor formal del enunciado.
theological_decisions:
- issue: Alcance de «el juicio de todos»
  english_pob_reading: Rendered broadly as 'the judgment of all' rather than 'the punishment of all.'
  chosen_spanish_reading: «el juicio de todos»
  alternative_spanish_readings:
  - «el castigo de todos»
  - «la sentencia de todos»
  rationale: El sustantivo ge'ez admite un sentido judicial amplio. En el contexto de los compartimentos de los muertos y sus destinos, conviene preservar la amplitud de la pregunta en vez de resolverla como castigo, manteniendo la tensión teológica documentada por el auditor inglés.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de cerrarla prematuramente.
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión del auditor: corrige la referencia singular de በእንቲአሁ («acerca de él») y conserva una sola formulación fluida de la pregunta, sin duplicar cláusulas. También retiene el alcance amplio de «juicio de todos» para no reducir indebidamente el sentido del ge''ez.'
  spanish_consistency_notes:
  - Se usa «en aquel tiempo» para mantener el registro narrativo elevado.
  - Se evita «Señor» o sustituciones devocionales porque el verso no contiene el nombre divino.
  - Se conserva «juicio» en vez de «castigo» para respetar la amplitud judicial del término original.
  - La separación recíproca se expresa con una construcción natural en español, sin perder el matiz formal del texto.
