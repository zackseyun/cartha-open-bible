  to: 'Y en aquel tiempo, Rafael[a], uno de los santos ángeles que estaba conmigo, respondió y me dijo: «Estos lugares huecos fueron hechos para que se reunieran en ellos los espíritus, las almas de los muertos[b]. Para este fin fueron creados aquí: para que recogieran en sí todas las almas de los hijos de los hombres[c]».'
