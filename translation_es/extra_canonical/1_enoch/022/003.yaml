    issue: Ambigüedad en 'para que reunieran todas las almas'
    rationale: En español, el subjuntivo plural sin sujeto explícito sugiere que 'ellos' reúnen activamente, pero el contexto describe la finalidad de los lugares como receptáculos donde las almas son reunidas. La redacción actual puede confundir al lector sobre quién realiza la acción.
  - severity: low
