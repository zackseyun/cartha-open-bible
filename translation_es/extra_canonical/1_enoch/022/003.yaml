translation:
  language: es
  text: 'Y en aquel tiempo, Rafael[a], uno de los santos ángeles que estaba conmigo, respondió y me dijo: «Estos lugares huecos fueron hechos para que se reunieran en ellos los espíritus, las almas de los muertos[b]. Para este fin fueron creados aquí: para que recogieran en sí todas las almas de los hijos de los hombres[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El adjetivo subyacente puede significar también 'buenos', 'bellos' o 'agradables'; aquí se sigue la revisión crítica que favorece 'huecos' por el contexto.
    reason: lexical_alternative
  - marker: b
    text: En el pasaje, 'espíritus' y 'almas' funcionan probablemente en aposición; la traducción conserva ambos para no borrar la duplicación conceptual.
    reason: lexical_alternative
  - marker: c
    text: La expresión también puede verterse como 'toda alma de la humanidad' o 'todos los seres humanos', pero se conserva la fórmula tradicional 'hijos de los hombres'. La frase 'recogieran en sí' explicita en español la función receptiva de estos lugares.
    reason: cross_reference
lexical_decisions:
- source_word: አውሥአ
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - dio respuesta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'respondió' expresa con naturalidad la función narrativa de introducir la réplica; evita la repetición algo pesada de 'contestó y dijo' y conserva el diálogo.
- source_word: ቅዱሳን መላእክት
  english_pob_choice: holy angels
  chosen_spanish: santos ángeles
  alternatives_spanish:
  - ángeles santos
  - ángeles sagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Santos ángeles'' mantiene el sintagma apocalíptico estable y refleja el valor cultual/moral de ቅዱሳን sin volverlo demasiado eclesiástico.'
- source_word: ዝመካናት
  english_pob_choice: these ... places
  chosen_spanish: estos lugares
  alternatives_spanish:
  - estas regiones
  - estas cámaras
  - estos sitios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lugares'' es suficientemente amplio para el espacio subterráneo descrito y no añade una arquitectura no atestiguada.'
- source_word: ሰናያት
  english_pob_choice: hollow places
  chosen_spanish: lugares huecos
  alternatives_spanish:
  - lugares vacíos
  - lugares profundos
  - cavidades
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el etíope puede significar 'bellos/buenos', el contexto y la revisión auditada señalan que el sentido original aquí es 'hollow'; 'huecos' preserva esa corrección y su tono físico.
- source_word: ይትጋብኡ
  english_pob_choice: might be gathered
  chosen_spanish: se reunieran
  alternatives_spanish:
  - fueran reunidos
  - se congregaran
  - fueran recogidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Se reunieran'' expresa el movimiento a un lugar preparado sin forzar una imagen demasiado técnica; mantiene el valor pasivo/reflexivo del verbo.'
- source_word: መናፍስት
  english_pob_choice: spirits
  chosen_spanish: los espíritus
  alternatives_spanish:
  - los alientos
  - los soplos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto del mundo de los muertos, 'espíritus' es el sentido pertinente y evita confundirlo con 'aliento'.
- source_word: ለነፍሶሙ ለምዉታን
  english_pob_choice: the souls of the dead
  chosen_spanish: las almas de los muertos
  alternatives_spanish:
  - sus almas, los muertos
  - las personas de los muertos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Almas de los muertos'' conserva la aposición del texto sin borrar la duplicación conceptual entre ''espíritus'' y ''almas''.'
- source_word: ሎቱ ዝንቱ
  english_pob_choice: For this purpose
  chosen_spanish: Para este fin
  alternatives_spanish:
  - Con este propósito
  - A esto fueron destinados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula final es teleológica; 'Para este fin' suena natural y mantiene la explicación causal del versículo.
- source_word: ተፈጥሩ
  english_pob_choice: were created
  chosen_spanish: fueron creados
  alternatives_spanish:
  - fueron hechos
  - fueron formados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fueron creados'' conserva la intención deliberada de la escena visionaria y la relación con el propósito indicado.'
- source_word: ያስተጋብኡ
  english_pob_choice: they might gather
  chosen_spanish: reunieran
  alternatives_spanish:
  - juntaran
  - recogieran
  - agruparan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la idea de reunir/recoger a los difuntos en un lugar preparado; en español la repetición de 'reunir' en la cláusula final refuerza el motivo sin sonar extraña.
- source_word: ኵሎ ነፍሰ ውሉደ ሰብእ
  english_pob_choice: all the souls of the children of men
  chosen_spanish: todas las almas de los hijos de los hombres
  alternatives_spanish:
  - todas las almas de la humanidad
  - toda alma de los hijos de los hombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la expresión antropológica tradicional 'hijos de los hombres', que en este género literario tiene peso formular y no debe modernizarse en exceso.
theological_decisions:
- issue: Relación entre 'espíritus' y 'almas de los muertos'
  english_pob_reading: 'Render both terms appositionally: ''the spirits—the souls of the dead'''
  chosen_spanish_reading: 'Render ambos términos en aposición: ''los espíritus, las almas de los muertos'''
  alternative_spanish_readings:
  - '''los espíritus de los muertos'''
  - omitir uno de los dos términos para simplificar
  rationale: El etíope emplea መናፍስት y luego ነፍሶሙ/ነፍሰ; mantener ambos evita suavizar una tensión antropológica real del pasaje y respeta la redacción auditada.
  doctrine_reference: Preservar la tensión teológica y no resolverla artificialmente.
- issue: Sentido de ሰናያት en esta revisión auditada
  english_pob_reading: These hollow places
  chosen_spanish_reading: Estos lugares huecos
  alternative_spanish_readings:
  - Estos lugares bellos
  - Estos lugares buenos
  - Estas cavidades
  rationale: La revisión del expediente indica que la lectura correcta aquí es 'hollow' y no 'beautiful'; en español, 'huecos' comunica el sentido espacial y corrige la desviación señalada por el audit trail.
  doctrine_reference: Priorizar la lectura original documentada por la revisión crítica frente a una traducción etiópica engañosa.
- issue: Alcance de 'children of men'
  english_pob_reading: children of men
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  - los hombres
  rationale: La expresión es una fórmula antropológica tradicional del material apocalíptico; conservarla mantiene el registro elevado y la resonancia semítica.
  doctrine_reference: Mantener el giro heredado de la fuente, no aplanarlo en un término genérico moderno.
translation_notes:
  revision_awareness: Se siguió la última revisión auditada que corrige la lectura de ሰናያት a 'hollow places' / 'lugares huecos', rechazando la traducción previa 'beautiful places'. También se mantuvo la puntuación fluida y la aposición entre 'spirits' y 'souls' sin fusionarlas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija; aquí no aparece.
  - '''ángeles santos'' sigue el patrón de ''holy angels'' sin introducir terminología eclesiástica adicional.'
  - '''espíritus'' y ''almas'' se conservan ambos por fidelidad al paralelismo del original.'
  - '''hijos de los hombres'' se mantiene como giro antropológico tradicional del género apocalíptico.'
  - La puntuación busca ser publicable en español sin alterar el contenido semántico del versículo.
