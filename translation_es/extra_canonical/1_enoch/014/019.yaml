translation:
  language: es
  text: Y de debajo del trono salió[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez deja sin expresar qué salió; el contexto siguiente aporta la imagen, por lo que la traducción conserva la cláusula abierta sin suplir un objeto.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Y de debajo del trono salió».'
    reason: alternative_reading
lexical_decisions:
- source_word: ወእምታሕተ
  english_pob_choice: from beneath
  chosen_spanish: de debajo
  alternatives_spanish:
  - desde debajo
  - desde abajo de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez combina valor ablativo con el sentido espacial de ታሕተ ('debajo, bajo'). En español, 'de debajo' conserva la imagen de procedencia desde un punto inferior sin volverla demasiado explicativa.
- source_word: መንበሩ
  english_pob_choice: the throne
  chosen_spanish: el trono
  alternatives_spanish:
  - su trono
  - el asiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el sufijo masculino singular puede referir de manera anafórica al trono ya mencionado, el contexto inmediato no exige explicitar posesión. 'El trono' sigue la revisión más reciente y evita introducir un posesivo prematuro.
- source_word: ይወፅእ
  english_pob_choice: came forth
  chosen_spanish: salió
  alternatives_spanish:
  - fue hacia afuera
  - emergió
  - salió de allí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite la idea de salir o venir fuera. 'Salió' es la forma española más natural y sobria para una cláusula breve de visión, sin añadir objeto no expresado en el texto.
theological_decisions:
- issue: Posesivo implícito en 'el trono'
  english_pob_reading: Retain the masculine singular pronoun without explicating the referent in the verse itself.
  chosen_spanish_reading: Mantener 'el trono' sin explicitar 'su trono' en el texto principal.
  alternative_spanish_readings:
  - su trono
  - el trono de Dios
  - el trono del Gran Gloria
  rationale: La tensión del texto ge'ez se preserva mejor dejando el referente implícito. El audit trail muestra que la revisión reciente rechazó 'su trono' por prematuro; por eso la traducción española evita un glosado interpretativo en la línea principal.
  doctrine_reference: Primacía del texto fuente y preservación de la ambigüedad local; no resolver en traducción lo que el contexto inmediato aún no desarrolla.
translation_notes:
  revision_awareness: El texto base en inglés pasó de 'his throne' a 'the throne' y luego eliminó el expletivo 'there'; la versión española sigue esa revisión reciente y evita el posesivo, manteniendo además la brevedad de la cláusula ge'ez.
  spanish_consistency_notes:
  - Se usa 'trono' para መንበር en coherencia con el registro visionario y apocalíptico.
  - Se evita 'Cristo' o 'Señor' porque el pasaje no los introduce y el original no los exige.
  - La cláusula queda deliberadamente abierta, conforme al carácter lacónico del ge'ez.
