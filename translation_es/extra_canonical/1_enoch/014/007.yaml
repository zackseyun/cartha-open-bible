    issue: «su petición» es ambiguo frente a «ustedes»
    rationale: El original y el POB inglés expresan segunda persona plural («your petition»). En español latinoamericano, «su» puede sonar ambiguo entre segunda de cortesía y tercera persona. Como el verso luego usa «ustedes mismos», «la petición de ustedes» preserva mejor la referencia y evita confusión.
  revised_spanish_text: Y la petición[a] de ustedes a favor de ellos no será concedida; ni a favor de ustedes mismos; y ustedes mismos, mientras lloran y hacen súplica[c][b], no hablarán ni una sola palabra del libro que escribí.
