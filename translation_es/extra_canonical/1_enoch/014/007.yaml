translation:
  language: es
  text: Y la petición[a] de ustedes a favor de ellos no será concedida; ni a favor de ustedes mismos; y ustedes mismos, mientras lloran y hacen súplica[c][b], no hablarán ni una sola palabra del libro que escribí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su oración ... no se cumplirá». El ge'ez dice literalmente «no será», pero en el contexto de una petición el sentido probable es que no será concedida.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final es difícil. Puede implicar que los Vigilantes no pueden presentar, repetir o usar el escrito de Enoc delante de Dios.
    reason: alternative_reading
  - marker: c
    text: O «y a favor de ustedes mismos—ustedes mismos llorarán y harán súplica, pero no hablarán».
    reason: alternative_reading
lexical_decisions:
- source_word: ስእለትክሙ
  english_pob_choice: your petition
  chosen_spanish: su petición
  alternatives_spanish:
  - su ruego
  - su súplica
  - su oración
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo expresa una petición o súplica formal. «Petición» conserva mejor el tono jurídico-intercesorio del contexto que «oración», que sería más amplio y menos preciso.
- source_word: በእንቲአሆሙ
  english_pob_choice: on their behalf
  chosen_spanish: a favor de ellos
  alternatives_spanish:
  - por ellos
  - en favor de ellos
  - en representación de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica mediación o representación. «A favor de ellos» comunica bien esa función intercesora en español natural; «en representación de ellos» suena más técnico y pesado.
- source_word: ኢይከውን
  english_pob_choice: will not be granted
  chosen_spanish: no será concedida
  alternatives_spanish:
  - no será
  - no ocurrirá
  - no se cumplirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque literalmente puede leerse como «no será», en el contexto de una petición la fuerza idiomática es que no será efectiva ni aceptada. «No será concedida» reproduce esa implicación sin exagerarla.
- source_word: በእንቲአክሙ
  english_pob_choice: on your own behalf
  chosen_spanish: a favor de ustedes mismos
  alternatives_spanish:
  - por ustedes mismos
  - en favor de ustedes mismos
  - en representación de ustedes mismos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El paralelismo con «a favor de ellos» pide una formulación equivalente en español. «A favor de ustedes mismos» mantiene el matiz de intercesión y el contraste con la petición a favor de otros.
- source_word: አንትሙሂ
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes también
  - ustedes en persona
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El enclítico añade énfasis. «Ustedes mismos» conserva esa insistencia: ellos no hablarán por medio de Enoch, sino directamente, sin mediación.'
- source_word: እንዘ ትበክዩ
  english_pob_choice: will weep
  chosen_spanish: mientras lloran
  alternatives_spanish:
  - mientras lloran
  - mientras están llorando
  - cuando lloren
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción funciona como circunstancial. En español, «mientras lloran» preserva ese valor sin forzar una segunda acción principal innecesaria.
- source_word: ታስተበቍዑ
  english_pob_choice: make supplication
  chosen_spanish: hacen súplica
  alternatives_spanish:
  - imploran
  - suplican
  - hacen ruegos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un verbo intensivo de ruego formal. «Hacen súplica» conserva el registro elevado y el carácter de intercesión más claramente que un verbo más coloquial.
- source_word: ኢትተናገሩ
  english_pob_choice: you will not speak
  chosen_spanish: no hablarán
  alternatives_spanish:
  - no dirán
  - no pronunciarán
  - no hablarán ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un verbo simple de habla negada. «No hablarán» es amplio y natural, y se integra bien con la cláusula circunstancial anterior.
- source_word: ኢምንተ ቃለ
  english_pob_choice: even a word
  chosen_spanish: ni una sola palabra
  alternatives_spanish:
  - ni una palabra
  - ni siquiera una palabra
  - ninguna palabra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión intensifica la negación. «Ni una sola palabra» refleja con naturalidad esa fuerza enfática mejor que una formulación más literal pero menos idiomática.
- source_word: እምውስተ መጽሐፍ ዘጻሐፍኩ
  english_pob_choice: from the book that I wrote
  chosen_spanish: del libro que escribí
  alternatives_spanish:
  - del libro que yo escribí
  - de la obra que escribí
  - del escrito que escribí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መጽሐፍ aquí designa un escrito/libro; «libro» es la opción más natural y fiel. El relativo mantiene explícito que el texto fue compuesto por el hablante.
theological_decisions:
- issue: Sentido final de la cláusula sobre no hablar una palabra del libro
  english_pob_reading: 'The clause is rendered as inability/denial: they will not speak a single word from Enoch''s written book.'
  chosen_spanish_reading: Se traduce como negación de la posibilidad de hablar ni una sola palabra del libro.
  alternative_spanish_readings:
  - no se les permitirá pronunciar ni una sola palabra del libro
  - no obtendrán respuesta por medio del libro
  - no podrán usar el libro para hablar
  rationale: 'El ge''ez niega directamente el acto de hablar, no explica el mecanismo. La redacción española conserva esa tensión: puede implicar prohibición, imposibilidad o inutilidad, sin resolverla por adelantado.'
  doctrine_reference: Preservar la tensión interpretativa del texto fuente.
- issue: Relación entre las dos frases con በእንቲአሆሙ y በእንቲአክሙ
  english_pob_reading: The petition is denied both on behalf of the Watchers and on behalf of the addressees themselves.
  chosen_spanish_reading: 'Se mantiene el paralelismo: la petición no será concedida ni a favor de ellos ni a favor de ustedes mismos.'
  alternative_spanish_readings:
  - la petición no será concedida por ellos ni por ustedes
  - la súplica no prosperará para ellos ni para ustedes
  - no habrá concesión ni en su favor ni en el de ustedes
  rationale: La sintaxis del ge'ez presenta dos frases paralelas. La versión española conserva ese paralelismo para no desplazar la segunda expresión al tramo final de la oración.
  doctrine_reference: Respetar la estructura y el contraste retórico del pasaje.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión gramatical más reciente: la frase paralela «ni a favor de ustedes mismos» se mantiene separada del tramo final, y la construcción con እንዘ se expresa como circunstancia («mientras lloran y hacen súplica») vinculada al verbo principal «no hablarán». También se incorporó la preferencia revisada de una negación enfática natural en español: «ni una sola palabra».'
  spanish_consistency_notes:
  - Se conserva «petición» para ስእለት, en línea con el registro formal/intercesorio ya documentado.
  - Se mantiene la forma reverencial y moderna «ustedes» para el plural de segunda persona.
  - «Hacen súplica» preserva el tono elevado sin recurrir a una paráfrasis doctrinal.
  - No se introduce terminología eclesiástica no sustentada por la fuente.
