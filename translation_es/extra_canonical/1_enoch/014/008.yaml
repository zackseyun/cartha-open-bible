translation:
  language: es
  text: 'Y una visión me mostró así[c]: he aquí, en la visión las nubes me llamaban, y la neblina me llamaba; y el curso[a] de las estrellas y los relámpagos me empujaban y me apremiaban, y en la visión los vientos[b] me hacían volar, y me llevaban, y me alzaban al cielo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el correr de las estrellas» o «los caminos de las estrellas»; la expresión ge'ez evoca a las estrellas en movimiento, no solo como objetos estáticos.
    reason: lexical_alternative
  - marker: b
    text: «Vientos» también podría traducirse «espíritus», pero el contexto inmediato favorece fuerzas atmosféricas que participan en la ascensión de Enoc.
    reason: lexical_alternative
  - marker: c
    text: O «Y así fue como la visión me mostró esto».
    reason: previous_rendering
lexical_decisions:
- source_word: ራእይ
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - aparición
  - revelación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto apocalíptico, «visión» conserva el marco revelatorio y permite repetir el término de forma consistente como en el inglés POB.
- source_word: አስተአርአየኒ
  english_pob_choice: showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me reveló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma causativa comunica que la visión fue presentada al hablante; «me mostró» es natural en español y mantiene la fuerza visual.
- source_word: ደመናት
  english_pob_choice: clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - nubes de tormenta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido básico es «nubes»; no hace falta intensificarlo, pues la escena apocalíptica ya aporta solemnidad.
- source_word: ይጼውዑኒ / ይጼውዐኒ
  english_pob_choice: were calling me
  chosen_spanish: me llamaban
  alternatives_spanish:
  - me convocaban
  - me gritaban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Me llamaban» reproduce el carácter repetido del verbo sin convertirlo en una orden formal que el texto no exige.
- source_word: ጊሜ
  english_pob_choice: the mist
  chosen_spanish: la neblina
  alternatives_spanish:
  - la niebla
  - el vapor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular del ge'ez favorece una forma singular en español. «Neblina» conserva el matiz atmosférico leve y poético, paralelo a las nubes.
- source_word: ሩጸተ ከዋክብት
  english_pob_choice: the course of the stars
  chosen_spanish: el curso de las estrellas
  alternatives_spanish:
  - el correr de las estrellas
  - los caminos de las estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Curso» refleja el movimiento celeste sin forzar una interpretación estática; conserva la idea dinámica documentada por el POB.
- source_word: መበርቅት
  english_pob_choice: the lightnings
  chosen_spanish: los relámpagos
  alternatives_spanish:
  - los rayos
  lexicon: Dillmann, Lexicon Lingae Aethiopicae
  rationale: En español, «relámpagos» suena más natural para el fenómeno luminoso plural en este paralelismo, sin perder el registro elevado.
- source_word: ይንጐዑኒ
  english_pob_choice: were driving me
  chosen_spanish: me empujaban
  alternatives_spanish:
  - me impulsaban
  - me hacían avanzar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es de empuje vigoroso; «me empujaban» conserva la fuerza motriz del verbo.
- source_word: ወተያድህቁኒ
  english_pob_choice: urging me on
  chosen_spanish: me apremiaban
  alternatives_spanish:
  - me instaban
  - me urgían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Después de «me empujaban», conviene un verbo que intensifique sin repetir exactamente la misma imagen; «apremiar» comunica presión y urgencia.
- source_word: ነፋሳት
  english_pob_choice: winds
  chosen_spanish: los vientos
  alternatives_spanish:
  - los espíritus
  - las fuerzas del viento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto inmediato reúne fenómenos atmosféricos y cósmicos, por lo que «vientos» preserva esa lectura y evita importar una angelología más específica.
- source_word: ያበርሩኒ
  english_pob_choice: were making me fly
  chosen_spanish: me hacían volar
  alternatives_spanish:
  - me hacían remontar
  - me llevaban en vuelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia al vuelo es explícita; «me hacían volar» mantiene la imagen directa sin sobreexplicar.
- source_word: ያንጉጹኒ
  english_pob_choice: carrying me off
  chosen_spanish: me llevaban
  alternatives_spanish:
  - me arrebataban
  - me arrastraban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el español puede simplificar la fuerza del verbo como traslado en marcha ascendente; el POB reconoce la posibilidad de una lectura más contundente, pero «me llevaban» funciona con el ritmo del verso.
- source_word: አነሥኡኒ
  english_pob_choice: lifting me up
  chosen_spanish: me alzaban
  alternatives_spanish:
  - me levantaban
  - me subían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Alzar» conserva el movimiento ascendente y el tono elevado mejor que alternativas más cotidianas.
- source_word: ላዕለ ውስተ ሰማይ
  english_pob_choice: into heaven
  chosen_spanish: hasta el cielo
  alternatives_spanish:
  - al cielo
  - hacia el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el contexto de ascensión apocalíptica, «cielo» puede comunicar naturalmente la meta; «hasta» sugiere culminación del movimiento ascendente.
theological_decisions:
- issue: ¿«Vientos» o «espíritus» para ነፋሳት?
  english_pob_reading: winds
  chosen_spanish_reading: los vientos
  alternative_spanish_readings:
  - los espíritus
  rationale: 'La secuencia enumera agentes cósmicos y atmosféricos: nubes, neblina, estrellas, relámpagos y vientos. Traducir «vientos» conserva esa imaginería y evita introducir una lectura personalizante que el contexto inmediato no exige.'
  doctrine_reference: Preservar la tensión del texto local sin resolverla a favor de una interpretación doctrinal más explícita.
translation_notes:
  revision_awareness: La base inglesa POB pasó por una revisión que corrigió la mención de «mists» al singular «mist» y ajustó la clausura a «lifting me up into heaven». En español, por fidelidad al singular del ge'ez, se optó igualmente por una forma singular («la neblina»), y la culminación se expresó de manera natural como «me alzaban hasta el cielo», manteniendo el ascenso sin forzar una duplicación adverbial.
  spanish_consistency_notes:
  - Se mantiene «visión» de manera consistente para ራእይ.
  - Se prefirió «Yahvé» no aplica en este versículo; no hay nombre divino explícito.
  - Se evita «espíritus» para ነፋሳት por el contexto atmosférico inmediato.
  - Se conserva el paralelismo verbal de llamada, empuje, vuelo y elevación.
  - Se usa puntuación española con dos puntos después de la introducción y comas para la enumeración extensa.
