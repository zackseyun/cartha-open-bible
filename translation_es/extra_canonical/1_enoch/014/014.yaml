translation:
  language: es
  text: Y mientras yo me estremecía y temblaba[a], caí rostro en tierra y vi en la visión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras estaba turbado y temblando». Los dos verbos están estrechamente relacionados y juntos expresan un miedo o una agitación intensos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እንዘ
  english_pob_choice: as
  chosen_spanish: mientras
  alternatives_spanish:
  - cuando
  - así que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce simultaneidad de manera natural en español y conserva la circunstancia concurrente entre el temblor y la caída.
- source_word: እትሀወክ
  english_pob_choice: I trembled
  chosen_spanish: temblaba
  alternatives_spanish:
  - estaba turbado
  - me agitaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario, el verbo expresa agitación interior con reflejo corporal; 'temblaba' mantiene ese matiz sin volverlo abstracto.
- source_word: እርዕድ
  english_pob_choice: shook
  chosen_spanish: me estremecía
  alternatives_spanish:
  - me sacudía
  - me conmovía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el segundo verbo como reacción física distinta, siguiendo la decisión POB de no fusionar ambos verbos en un solo término genérico.
- source_word: ወድቁ
  english_pob_choice: I fell
  chosen_spanish: caí
  alternatives_spanish:
  - me postré
  - me desplomé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico de movimiento se puede expresar de forma directa; la postura queda especificada por la frase siguiente.
- source_word: በገጽየ
  english_pob_choice: on my face
  chosen_spanish: sobre mi rostro
  alternatives_spanish:
  - con el rostro en tierra
  - boca abajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la imagen idiomática de postración de forma literal y digna, sin añadir una paráfrasis excesiva.
- source_word: እሬኢ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo visionario básico se traduce con simplicidad y claridad.
- source_word: በራእይ
  english_pob_choice: in the vision
  chosen_spanish: en la visión
  alternatives_spanish:
  - en una visión
  - por la visión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el marco técnico apocalíptico del pasaje y sigue de cerca la formulación auditada en inglés.
theological_decisions:
- issue: Cómo rendir la doble reacción de temor/agitación sin aplanarla a un solo estado emocional
  english_pob_reading: 'embodied reaction: ''I shook and trembled'''
  chosen_spanish_reading: 'reacción corporal: ''temblaba y me estremecía'''
  alternative_spanish_readings:
  - '''estaba turbado y temblando'''
  - '''temblaba y temblaba'''
  rationale: La secuencia enfatiza la respuesta física previa a la revelación; por eso se conservan dos verbos coordinados que expresan intensidad y no solo miedo interior.
  doctrine_reference: Translation philosophy §§1, 5; preservar imaginería apocalíptica y evitar aplanar la prosa visionaria.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para reflejar más de cerca el orden del original, pasando de 'trembled and shook' a 'shook and trembled'. La redacción española sigue ese impulso de conservar la secuencia de dos verbos y la simultaneidad del evento sin sobrecargar el texto.
  spanish_consistency_notes:
  - Se mantiene 'visión' para el marco apocalíptico, coherente con el inglés auditado.
  - '''Rostro'' conserva el tono literal y culto del gesto de postración, sin sustituirlo por una expresión más coloquial.'
  - Se opta por 'temblaba y me estremecía' para reflejar dos verbos cercanos pero no idénticos, siguiendo la decisión léxica POB de preservar la tensión.
