translation:
  language: es
  text: Yo vi en mi dormir lo que ahora hablo con una lengua de carne y con mi espíritu[a], que el Grande[b] les ha dado a los hombres como boca[c], para que hablen con ella y entiendan en el corazón[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «con mi aliento»; el ge'ez admite la ambigüedad entre espíritu y respiración, y el contexto inmediato favorece el sentido de facultad de habla.
    reason: lexical_alternative
  - marker: b
    text: «El Grande» conserva el epíteto divino del texto etiópico; no se sustituye por un título más convencional como «Dios» o «Señor».
    reason: source_note
  - marker: c
    text: Literalmente, «como boca»; el texto conserva la imagen de la facultad dada para hablar, no solo una manera de hablar.
    reason: lexical_alternative
  - marker: d
    text: «Corazón» aquí designa el interior de la persona, especialmente la comprensión y el discernimiento, no solo la emoción.
    reason: cultural_note
lexical_decisions:
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: Yo vi
  alternatives_spanish:
  - Yo contemplé
  - Yo observé
  lexicon: Dillmann
  rationale: El perfecto de ver en ge'ez expresa la visión recibida; «Yo vi» es directo, natural y conserva el carácter visionario sin añadir matiz interpretativo.
- source_word: በንዋምየ
  english_pob_choice: in my sleep
  chosen_spanish: en mi sueño
  alternatives_spanish:
  - mientras dormía
  - en mi dormir
  lexicon: Dillmann
  rationale: El término apunta al estado de sueño o al sueño como experiencia visionaria. «En mi sueño» es comprensible en español y mantiene la ambigüedad entre sueño y estado de dormir.
- source_word: ይእዜ እነግር
  english_pob_choice: I now speak
  chosen_spanish: ahora hablo
  alternatives_spanish:
  - ahora declaro
  - ahora digo
  lexicon: Dillmann
  rationale: La fórmula contrasta la visión pasada con el acto presente de comunicarla. «Hablo» conserva la relación inmediata con lengua/boca y suena natural en español.
- source_word: በልሳን ዘሥጋ
  english_pob_choice: with a tongue of flesh
  chosen_spanish: con una lengua de carne
  alternatives_spanish:
  - con una lengua carnal
  - con lengua de carne
  lexicon: Dillmann
  rationale: Se preserva la expresión antropológica literal y su fuerza apocalíptica. «Lengua de carne» mantiene el contraste con el ámbito espiritual sin suavizarlo.
- source_word: ወበመንፈስየ
  english_pob_choice: with my breath / with my spirit
  chosen_spanish: con mi espíritu
  alternatives_spanish:
  - con mi aliento
  - con mi soplo
  lexicon: Dillmann
  rationale: El ge'ez permite «espíritu» o «aliento/breath». Dado el audit trail inglés más reciente y la posible resonancia antropológica del pasaje, se conserva «espíritu» en el texto principal; la alternativa de aliento queda implícita en la nota.
- source_word: ዘወሀበ ዓቢይ አፈ ለሰብእ
  english_pob_choice: which the Great One has given to men as a mouth
  chosen_spanish: que el Grande ha dado a los hombres como boca
  alternatives_spanish:
  - que el Grande les ha dado como boca
  - que el Grande ha dado a la humanidad como boca
  lexicon: Dillmann
  rationale: Se sigue la revisión que restituye «mouth/boca» explícitamente. «El Grande» conserva el epíteto divino característico del texto, y «como boca» respeta la función instrumental/atributiva del objeto dado.
- source_word: ይትናገሩ ቦቱ
  english_pob_choice: so that they might speak with it
  chosen_spanish: para que hablen con ella
  alternatives_spanish:
  - para que hablen por ella
  - para que hablen con ello
  lexicon: Dillmann
  rationale: El pronombre remite a la facultad/boca mencionada; en español, «con ella» resulta natural si se entiende «boca» como antecedente. Se mantiene el sentido de medio o instrumento para hablar.
- source_word: ወይለብዉ በልብ
  english_pob_choice: and understand in the heart
  chosen_spanish: y entiendan en el corazón
  alternatives_spanish:
  - y comprendan en el corazón
  - y entiendan de corazón
  lexicon: Dillmann
  rationale: Se conserva la antropología semítica del «corazón» como sede de comprensión interior. «Entiendan» expresa percepción intelectual e interior sin reducirlo a emoción.
theological_decisions:
- issue: መንፈስ en paralelo con lengua de carne
  english_pob_reading: with my spirit / with my breath
  chosen_spanish_reading: con mi espíritu
  alternative_spanish_readings:
  - con mi aliento
  - con mi soplo
  rationale: El pasaje conserva una tensión entre corporeidad («lengua de carne») y el principio interior/animador («espíritu»). Se deja abierta la posibilidad de «aliento» mediante nota, pero el texto principal sigue la lectura más amplia y la revisión reciente del audit trail.
  doctrine_reference: Preservar la ambigüedad semántica de መንፈስ sin resolverla prematuramente; dejar convivir espíritu/aliento como campo de sentido.
- issue: Epíteto divino ዓቢይ
  english_pob_reading: the Great One
  chosen_spanish_reading: el Grande
  alternative_spanish_readings:
  - el Gran Ser
  - el Grande Uno
  rationale: Se mantiene el epíteto reverente sin sustituirlo por «Dios», porque el texto etiópico usa una fórmula titulativa propia. «El Grande» es breve, solemne y fiel al registro apocalíptico.
  doctrine_reference: Primacía del diccionario y del registro del texto fuente sobre la domesticación litúrgica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la secuencia de revisiones en inglés: la adjudicación corrigió la omisión de «mouth/boca», y la versión más reciente reubicó la frase como «given to men as a mouth». Por eso el español incluye explícitamente «como boca» y evita traducir el sintagma de forma más libre. También se respetó la tensión entre «breath» y «spirit» señalada en el audit trail, manteniéndola en nota.'
  spanish_consistency_notes:
  - Se usa «lengua de carne» para conservar la imagen corporal sin suavizarla a «lengua humana».
  - Se usa «el Grande» como epíteto divino consistente con el registro apocalíptico y no como adjetivo genérico.
  - «Con ella» remite a «boca» por concordancia femenina en español; la referencia es funcional, no personal.
  - Se mantiene «corazón» con valor antropológico semítico para comprensión interior.
