translation:
  language: es
  text: Y su piso era de fuego, y encima de él había relámpagos y el camino[a] de las estrellas, y su techo[b] era fuego ardiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"El camino de las estrellas" también puede entenderse como "el curso de las estrellas", refiriéndose a su movimiento ordenado por el cielo.'
    reason: lexical_alternative
  - marker: b
    text: La palabra traducida "techo" también podría entenderse como "tejado" o, menos probablemente, "bóveda/firmamento", según se lea la línea con un matiz más arquitectónico o más cósmico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ምድሩሰ
  english_pob_choice: its floor
  chosen_spanish: su piso
  alternatives_spanish:
  - su suelo
  - su pavimento
  - su fundamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de una visión arquitectónica celestial, "piso" comunica bien la superficie interior sin cargarla innecesariamente con una imagen de obra terminada como "pavimento" ni con la abstracción de "fundamento".
- source_word: ዘእሳት
  english_pob_choice: of fire
  chosen_spanish: de fuego
  alternatives_spanish:
  - ígneo
  - hecho de fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la construcción genitiva simple del etíope y el tono apocalíptico directo. "De fuego" es la forma más natural y fiel en español.
- source_word: መልዕልቴሁ
  english_pob_choice: above it
  chosen_spanish: encima de él
  alternatives_spanish:
  - sobre él
  - por encima de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Encima de él" reproduce la relación espacial de manera idiomática en español y mantiene la secuencia descriptiva del pasaje.'
- source_word: መበርቅት
  english_pob_choice: lightnings
  chosen_spanish: relámpagos
  alternatives_spanish:
  - rayos
  - destellos de relámpago
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural intensifica la visión. "Relámpagos" conserva el registro elevado y la multiplicidad del original mejor que una forma más explicativa.
- source_word: ምርዋፀ ከዋክብት
  english_pob_choice: the path of the stars
  chosen_spanish: el camino de las estrellas
  alternatives_spanish:
  - la senda de las estrellas
  - el curso de las estrellas
  - la trayectoria de las estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la imagen del recorrido estelar. "Camino" reproduce bien la compacta metáfora espacial; "curso" o "trayectoria" también serían posibles, pero suenan más técnicos y menos visionarios.
- source_word: ጠፈሩኒ
  english_pob_choice: its ceiling
  chosen_spanish: su techo
  alternatives_spanish:
  - su cielo raso
  - su bóveda
  - su firmamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La decisión inglesa favorece una lectura arquitectónica. En español, "techo" comunica mejor esa interioridad; "bóveda" o "firmamento" desplazan demasiado la imagen hacia lo cósmico.
- source_word: እሳት ዘይነድድ
  english_pob_choice: blazing fire
  chosen_spanish: fuego ardiente
  alternatives_spanish:
  - fuego que arde
  - fuego que quema
  - llamas ardientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la intensidad repetitiva del original con una expresión natural en español. "Fuego ardiente" mantiene la fuerza imagística sin sonar redundante en exceso.
theological_decisions:
- issue: Tensión entre imaginería arquitectónica y cósmica en la visión
  english_pob_reading: Translate the terms as features of an interior heavenly building ('floor,' 'above it,' 'ceiling') while preserving cosmic elements ('lightnings,' 'path of the stars').
  chosen_spanish_reading: 'Traducir el pasaje como una estructura celestial interior, sin perder los elementos cósmicos: piso, encima, techo, relámpagos y camino de las estrellas.'
  alternative_spanish_readings:
  - Hacerlo más cósmico con "bóveda" o "firmamento"
  - Hacerlo más estrictamente arquitectónico y suavizar las imágenes celestes
  rationale: El texto combina dos registros y no conviene resolver la tensión. Mantener ambos preserva el carácter apocalíptico de la visión y evita homogeneizarla en una sola imagen.
  doctrine_reference: Preservar la tensión literaria y teológica del lenguaje apocalíptico sin armonizarla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto ge'ez y el audit trail inglés de POB, conservando la doble tensión de arquitectura celestial e imaginería cósmica. No se introdujeron cambios respecto del sentido revisado del original inglés.
  spanish_consistency_notes:
  - Se usa "Dios"/"Yahvé" según el criterio del proyecto, aunque este versículo no los contiene.
  - '"Fuego" y "relámpagos" mantienen el registro apocalíptico elevado sin modernizarlo excesivamente.'
  - '"Techo" se prefiere a "bóveda" para no borrar la lectura de espacio interior que el audit trail inglés considera prioritaria.'
