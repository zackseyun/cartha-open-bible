    issue: Nota [c] mal anclada
    rationale: La nota [c] explica el término ge’ez relacionado con vigilancia/wakefulness y la identificación de los Watchers, pero en el borrador está colocada sobre ‘reprensión’ en vez de ‘Vigilantes’. Esto incumple la disciplina de anclaje de notas y puede confundir al lector.
  - severity: medium
    issue: ‘Reprensión’ no refleja tan bien la decisión léxica auditada
    rationale: Aunque posible, ‘reprensión’ en español tiende a denotar una reprimenda verbal. El rastro de auditoría documenta un sentido de ‘reproach/reproof’ como porción negativa o condición judicial-moral. ‘Reproche’ mantiene mejor esa ambigüedad sobria y se acerca más a la decisión inglesa.
  - severity: low
