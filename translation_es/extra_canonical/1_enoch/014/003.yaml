translation:
  language: es
  text: Como él creó y dio a la humanidad para entender la palabra del conocimiento[a], así también me creó y me dio reproche[b] para los Vigilantes[c], los hijos del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la palabra de entendimiento’. El giro ge’ez conserva el matiz concreto de ‘palabra’, no solo una facultad mental.
    reason: lexical_alternative
  - marker: b
    text: La construcción etiópica es difícil; también puede entenderse como una porción o condición negativa dada a los seres celestiales, no simplemente como un ‘reproche’ en sentido moderno.
    reason: textual_variant
  - marker: c
    text: O ‘los Vigilantes, los hijos del cielo’. El término ge’ez está relacionado con la vigilancia o la vigilia y suele referirse a los seres angélicos del Libro de los Vigilantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ቃለ አእምሮ
  english_pob_choice: the word of understanding
  chosen_spanish: la palabra del conocimiento
  alternatives_spanish:
  - la palabra del entendimiento
  - la palabra de comprensión
  - el habla del conocimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro ge’ez une ቃል (‘palabra, habla’) con አእምሮ (‘entendimiento, inteligencia’). En español, ‘la palabra del conocimiento’ mantiene la concreción de ‘palabra’ y refleja el campo semántico de conocimiento/entendimiento sin volver la frase excesivamente abstracta.
- source_word: ሰብእ
  english_pob_choice: humankind
  chosen_spanish: la humanidad
  alternatives_spanish:
  - el ser humano
  - la gente
  - los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un colectivo genérico. ‘La humanidad’ evita exclusividad masculina y conserva el valor colectivo del término, con estilo natural en español bíblico contemporáneo.
- source_word: እዝልፎሙ
  english_pob_choice: reproach
  chosen_spanish: reprensión
  alternatives_spanish:
  - reproche
  - vergüenza
  - deshonra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto presenta un contraste de dones/porciones entre la humanidad y los seres celestiales. ‘Reprensión’ conserva el tono moral-judicial de la decisión divina, sin forzar una emoción específica como ‘vergüenza’.
- source_word: ትጉሃን
  english_pob_choice: the vigilant
  chosen_spanish: los Vigilantes
  alternatives_spanish:
  - los vigilantes
  - los despiertos
  - los veladores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el sentido literal es ‘vigilantes/despiertos’, en este libro el término funciona como designación técnica de los seres angélicos. Mantener ‘los Vigilantes’ preserva esa identificación tradicional y el eco intertextual, mientras la mayúscula marca el título.
- source_word: ውሉደ ሰማይ
  english_pob_choice: sons of heaven
  chosen_spanish: los hijos del cielo
  alternatives_spanish:
  - los hijos de los cielos
  - los hijos celestiales
  - los hijos del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Hijos del cielo’ reproduce la imagen filial y celestial del original de manera natural en español y mantiene el paralelismo con la frase angélica del contexto.
theological_decisions:
- issue: Identificación de los seres celestiales en la frase final
  english_pob_reading: Rendered descriptively as 'the vigilant sons of heaven,' referring to the angelic Watchers.
  chosen_spanish_reading: ‘los Vigilantes, los hijos del cielo’ conserva la referencia angelical sin ocultar el nombre técnico del grupo.
  alternative_spanish_readings:
  - los vigilantes, los hijos del cielo
  - los Vigilantes, los hijos celestiales
  - los Vigilantes, los hijos de los cielos
  rationale: El pasaje contrasta a la humanidad con un grupo celestial de la narrativa de los Vigilantes. La mayúscula en ‘Vigilantes’ permite reconocer el término técnico sin perder el sentido literal subyacente en el ge’ez. La apposición ‘los hijos del cielo’ mantiene el paralelismo del texto fuente.
  doctrine_reference: Preservar el sentido local del pasaje y evitar la sobrerregularización; traducir títulos por sentido cuando el contexto lo permite.
- issue: Dificultad textual en la relación sintáctica de la cláusula media
  english_pob_reading: The clause 'to these he created and gave reproach' is textually difficult in the Ethiopic witness; the sense may be that, unlike humankind, the heavenly beings received a negative portion or condition.
  chosen_spanish_reading: ‘me dio reprensión’ sigue la lectura literal más sobria del estado textual recibido, sin ampliar indebidamente la acción.
  alternative_spanish_readings:
  - me dio para reprenderlos
  - me dio reprensión para los Vigilantes
  - me dio reproche
  rationale: El testimonio etiópico es difícil y el audit trail de la POB conserva tensión entre una lectura más interpretativa y otra más literal. En español se opta por ‘reprensión’ como sustantivo, manteniendo la ambigüedad controlada del original y evitando añadir una función verbal no establecida por el texto base.
  doctrine_reference: Respetar la dificultad textual y no resolverla con una paráfrasis que elimine la tensión documentada.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un error importante de lectura en inglés: el texto no dice meramente que a los seres celestiales se les dio ‘reproach’ como nombre abstracto, sino que el testimonio ge’ez es sintácticamente difícil y la POB mantiene una solución sobria. La versión española sigue esa cautela, pero al mismo tiempo evita ocultar la identificación tradicional de los Vigilantes. Además, el análisis de la fuente ge’ez justifica la simetría entre el don dado a la humanidad y la asignación/porción vinculada a los seres celestiales.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera; aquí no aparece el nombre divino explícito.
  - Se mantiene ‘los Vigilantes’ con mayúscula por tratarse de una designación técnica del libro.
  - ‘Humanidad’ se eligió para ሰብእ por claridad inclusiva y tono bíblico contemporáneo.
  - No se agregó ‘Cristo’ ni otra terminología cristológica ajena al pasaje.
  - La puntuación reproduce la estructura paralela del original sin exagerar la relación causal o final que el testimonio no asegura.
