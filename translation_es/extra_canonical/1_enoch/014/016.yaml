translation:
  language: es
  text: Y en todo aspecto sobresalía[a] en esplendor y gloria y grandeza, de modo que no puedo hablarles de su esplendor y de su grandeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rebosaba», «desbordaba» o «abundaba». El verbo ge''ez sugiere una plenitud efusiva o desbordante, no solo una cualidad estática.'
    reason: lexical_alternative
  - marker: b
    text: El posesivo «su» probablemente se refiere a la estructura celestial que está en vista, aunque la visión puede dejar deliberadamente difuso si el esplendor pertenece al lugar, a la presencia divina, o a ambos.
    reason: alternative_reading
lexical_decisions:
- source_word: በኵሉ
  english_pob_choice: in every respect
  chosen_spanish: en todo
  alternatives_spanish:
  - en todo aspecto
  - en todo sentido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa totalidad o integralidad de la medida; «en todo» comunica bien el alcance general sin añadir interpretación.
- source_word: ይፈደፍድ
  english_pob_choice: was overflowing / excelled
  chosen_spanish: sobresalía
  alternatives_spanish:
  - sobresalía abundantemente
  - rebosaba
  - estaba sobresaliendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor principal aquí es de excelencia o superación visionaria, no solo de estado estático. «Sobresalía» mantiene la intensidad sin forzar un calco.
- source_word: በስብሐት
  english_pob_choice: with splendor
  chosen_spanish: en esplendor
  alternatives_spanish:
  - con esplendor
  - en resplandor
  - con radiancia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario, «esplendor» es la opción más natural y mantiene el matiz de brillo manifiesto.
- source_word: በክብር
  english_pob_choice: and glory
  chosen_spanish: y gloria
  alternatives_spanish:
  - y honor
  - y majestad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gloria» conserva el registro elevado y la distinción frente a «esplendor» sin fusionar ambos términos.
- source_word: በዕበይ
  english_pob_choice: and greatness
  chosen_spanish: y grandeza
  alternatives_spanish:
  - y majestad
  - y magnificencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Grandeza» preserva la idea de magnitud/exaltación y encaja con la triple acumulación del original.
- source_word: እስከ ኢይክል ዜንዎተክሙ
  english_pob_choice: so that I am unable to tell you
  chosen_spanish: de modo que no puedo deciros
  alternatives_spanish:
  - hasta el punto de no poder deciros
  - de modo que no me es posible describíroslo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige la lectura errónea de «eyes»: el Ge''ez dice que no es posible decirlo/contarlo a ustedes. «Deciros» refleja el sufijo de segunda persona plural.'
- source_word: በእንተ ስብሐቲሁ
  english_pob_choice: about its splendor
  chosen_spanish: acerca de su esplendor
  alternatives_spanish:
  - sobre su esplendor
  - en cuanto a su esplendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Después de un verbo de habla, la preposición indica el tema del discurso, no causalidad. «Acerca de» expresa bien ese valor.
- source_word: በእንተ ዕበዩ
  english_pob_choice: about its greatness
  chosen_spanish: acerca de su grandeza
  alternatives_spanish:
  - sobre su grandeza
  - en cuanto a su grandeza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el paralelo con la frase anterior y el referente implícito del poseedor, sin resolverlo doctrinalmente.
theological_decisions:
- issue: Referente del sufijo posesivo de tercera persona en «su esplendor ... su grandeza»
  english_pob_reading: The suffix refers to the visionary structure immediately in view rather than directly naming God.
  chosen_spanish_reading: El posesivo queda deliberadamente no explicitado más allá de «su», dejando que el contexto determine el referente inmediato de la visión.
  alternative_spanish_readings:
  - el esplendor y la grandeza de la presencia divina
  - una referencia mezclada al edificio visionario y a la presencia entronizada
  rationale: El Ge'ez no nombra de nuevo el referente. Mantener «su» conserva la tensión interpretativa y evita resolverla con más precisión de la que permite el texto.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el referente.
translation_notes:
  revision_awareness: La revisión auditada corrigió una lectura errónea previa que confundía el sentido de ዜንዎተክሙ con una referencia a los ojos; el texto expresa imposibilidad de decir/contar a los destinatarios. También se rectificó la comprensión de በእንተ como valor temático («acerca de») tras un verbo de habla. El español refleja esa corrección y evita la vieja lectura ocular.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «gloria» y «grandeza» como pares léxicos distinguidos, sin fundirlos en un solo término.
  - Se conserva un registro elevado pero moderno, apto para lectura eclesial contemporánea.
