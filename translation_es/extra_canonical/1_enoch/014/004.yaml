translation:
  language: es
  text: 'Yo escribí la petición de ustedes, y en mi visión se mostró así: que la petición de ustedes no les será concedida por todos los días de la eternidad[a], y la sentencia[b] contra ustedes ha sido cumplida, y no les será concedida.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase ge'ez correspondiente es literalmente «por todos los días de la era/eternidad», una fórmula enfática de duración sin fin.
    reason: lexical_alternative
  - marker: b
    text: «Sentencia» traduce aquí el valor judicial de la expresión; también podría entenderse como «decreto» o «decisión final», pero el contexto favorece el lenguaje forense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ስእለትክሙ
  english_pob_choice: your petition
  chosen_spanish: su petición
  alternatives_spanish:
  - su oración
  - su ruego
  - su solicitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término denota una súplica o pedido dirigido a una autoridad. «Petición» conserva el tono formal y casi judicial que la POB documenta para el apelativo de los Vigilantes.
- source_word: ጻሐፍኩ
  english_pob_choice: I wrote down
  chosen_spanish: yo escribí
  alternatives_spanish:
  - yo escribí y registré
  - yo anoté
  - yo dejé por escrito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo significa simplemente «escribí». En español, «yo escribí» es fiel y natural; el contexto ya da la idea de registro de la petición.
- source_word: በራእየየ
  english_pob_choice: in my vision
  chosen_spanish: en mi visión
  alternatives_spanish:
  - en la visión que vi
  - en mi ver revelado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma remite a visión revelatoria. «En mi visión» mantiene el modo apocalíptico sin forzar una paráfrasis.
- source_word: ያስተርኢ
  english_pob_choice: it was shown
  chosen_spanish: se mostró
  alternatives_spanish:
  - fue mostrado
  - se me reveló
  - fue revelado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción pasiva/impersonal expresa una revelación dada en visión. «Se mostró» conserva esa impersonalidad y evita introducir un sujeto explícito no presente en el texto base.
- source_word: ኢትከውነክሙ
  english_pob_choice: will not be granted to you
  chosen_spanish: no les será concedida
  alternatives_spanish:
  - no les será dada
  - no les será otorgada
  - no se les hará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto jurídico, la negativa a la petición se expresa bien con «concedida». Dado que el destinatario es plural en español, se usa «les».
- source_word: መዋዕለ ዓለም
  english_pob_choice: for all the days of eternity
  chosen_spanish: por todos los días de la eternidad
  alternatives_spanish:
  - por toda la eternidad
  - por los días del siglo eterno
  - por todas las eras de la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula es enfática y literalmente durativa. «Por todos los días de la eternidad» conserva el ritmo solemne y evita aplanar la expresión a un simple «para siempre».
- source_word: ፍጽምት
  english_pob_choice: the sentence
  chosen_spanish: la sentencia
  alternatives_spanish:
  - el decreto
  - la decisión final
  - el juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es de fallo judicial definitivo. «Sentencia» captura mejor esa fuerza que un abstracto como «completación» y sigue el eje interpretativo auditado por la POB.
- source_word: ላዕሌክሙ
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - sobre ustedes
  - encima de ustedes
  - en su contra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición literalmente puede ser «sobre/contra». En registro judicial español, «contra ustedes» comunica el carácter adverso del veredicto.
- source_word: ወኢይከውነ ክሙ
  english_pob_choice: and it will not be granted to you
  chosen_spanish: y no les será concedida
  alternatives_spanish:
  - y no se les concederá
  - y no les será otorgada
  - y no les ocurrirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición del rechazo se mantiene con la misma fórmula de concesión denegada, como en el inglés auditado, para conservar la insistencia del oráculo.
theological_decisions:
- issue: Denegación judicial de la petición de los Vigilantes
  english_pob_reading: 'A judicial refusal: ''your petition will not be granted to you'''
  chosen_spanish_reading: 'Una negativa judicial: «su petición no les será concedida»'
  alternative_spanish_readings:
  - «su petición no les será oída»
  - «su petición no les será dada»
  - «su petición no les será concedida» con tono más devocional
  rationale: El contexto no describe una oración devocional común, sino una súplica rechazada en un marco de juicio apocalíptico. «Concedida» conserva la fuerza legal sin importar la idiomática posterior de «ser oído»
  doctrine_reference: Preservar la tensión teológica y el juicio irrevocable del texto fuente, sin suavizarlo con formulaciones litúrgicas tradicionales.
- issue: Sentencia/decreto final contra los Vigilantes
  english_pob_reading: A fixed judicial sentence/decree against the Watchers
  chosen_spanish_reading: La sentencia ha quedado cumplida contra ustedes
  alternative_spanish_readings:
  - el decreto ha quedado cumplido contra ustedes
  - la decisión final ha sido cumplida contra ustedes
  - el juicio ha sido cumplido contra ustedes
  rationale: La POB distingue entre el mero «completion» y el sentido judicial fijado. «Sentencia» mantiene el matiz forense y «ha quedado cumplida» reproduce la idea de una determinación ya cerrada, sin diluirla en una consumación cósmica general.
  doctrine_reference: Equivalencia óptima; conservar la fórmula de juicio apocalíptico y su irrevocabilidad.
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente que ajusta el sentido a una fórmula judicial definitiva y la nota de adjudicación sobre el marcador de contenido introducido por «que/because» en la visión. El español conserva la estructura «en mi visión se mostró así: que...», manteniendo el contenido introducido y el doble rechazo de la petición, y evita paraphrasear la clausula final como un mero «juicio» abstracto.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en este pasaje.
  - Se usó tratamiento plural («ustedes/les») para concordar con el destinatario colectivo implícito en el ge'ez.
  - Se prefirió «sentencia» sobre «juicio» para seguir la lectura forense documentada por la POB y evitar ambigüedad con el acto de juzgar.
  - No se suavizó el doble rechazo; la repetición final se conserva para reflejar la insistencia del texto fuente.
