  footnotes:
  - marker: a
    text: The Ge'ez phrase rendered 'for all the days of eternity' is literally 'for all the days of the age/eternity,' an emphatic formula of unending duration.
    reason: lexical_alternative
  - marker: b
    text: The word rendered 'sentence' may also be understood as 'decree' or 'final decision'; the sense is that a definitive judgment has already been fixed against the Watchers.
    reason: lexical_alternative
  - marker: c
    text: Or 'your petition will not be granted to you for all the days of eternity; and the sentence against you has been fully decreed'.
