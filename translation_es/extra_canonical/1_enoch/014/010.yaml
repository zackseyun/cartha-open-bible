  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: ''lengua de fuego'', ''gran casa'', ''edificada'', ''piedras de granizo'', ''techo'' y ''piso''. La principal corrección requerida afecta la gestión de notas: eliminar la nota mal anclada sobre variante textual arquitectónica y conservar en cambio las notas pertinentes al ''mosaico'' y a la lectura alternativa del elemento arquitectónico superior.'
