base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/014/010.yaml
  text: And I went into the tongue of fire[a], and I drew near to a great house built of hailstones; and the roof of that house was like a mosaic of hailstones[c][b], and its floor was hail.
  footnotes:
  - marker: a
    text: The Ge'ez architectural term rendered 'wall' is textually difficult in this OCR witness; it may refer more generally to a structural surface of the house.
    reason: textual_variant
  - marker: b
    text: The comparison rendered 'mosaic floor' refers to patterned stonework or tessellated paving, not necessarily a modern glass mosaic.
    reason: cultural_note
  - marker: c
    text: Or 'the wall of that house was like a mosaic floor'.
    reason: previous_rendering
