translation:
  language: es
  text: Y entré en la lengua de fuego, y me acerqué a una gran casa edificada con piedras de granizo; y el techo[a] de aquella casa era como un mosaico de piedras de granizo[b], y su piso era granizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la pared de aquella casa era como un piso de mosaico'. El término ge'ez para esta parte de la casa es textualmente difícil en este testimonio y puede referirse de manera más general a una superficie estructural.
    reason: textual_variant
  - marker: b
    text: El comparativo apunta a una obra de piedra dispuesta en patrón o teselas; no debe imaginarse un mosaico moderno de vidrio.
    reason: cultural_note
lexical_decisions:
- source_word: ልሳነ እሳት
  english_pob_choice: the tongue of fire
  chosen_spanish: la lengua de fuego
  alternatives_spanish:
  - la llama de fuego
  - la lengua ígnea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta de ልሳን = 'lengua', porque el texto visionario presenta una forma visible de fuego y no solo una llama genérica. 'Lengua de fuego' mantiene mejor la rareza imagética que una equivalencia más explicativa.
- source_word: ቤት ዓቢይ
  english_pob_choice: a great house
  chosen_spanish: una gran casa
  alternatives_spanish:
  - una casa grande
  - un gran edificio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቤት es literalmente 'casa' o 'casa/edificio'; 'gran casa' reproduce el registro elevado sin imponer 'templo' o 'palacio', que irían más allá de la evidencia directa.
- source_word: ዘኅኑጽ
  english_pob_choice: built
  chosen_spanish: edificada
  alternatives_spanish:
  - construida
  - hecha
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El participio indica una estructura levantada a partir del material mencionado; 'edificada' suena digno y natural en español bíblico-literario, sin volverse arcaizante en exceso.
- source_word: በእእባነ በረድ
  english_pob_choice: of hailstones
  chosen_spanish: con piedras de granizo
  alternatives_spanish:
  - de piedras de granizo
  - con granizos
  - de granizo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción etíope literalmente dice 'con piedras de granizo'. En español, 'piedras de granizo' preserva el asombro material y evita diluir la imagen en un abstracto 'de hielo' o 'de cristal'.
- source_word: አረፍተ ውእቱ ቤት
  english_pob_choice: the roof of that house
  chosen_spanish: el techo de aquella casa
  alternatives_spanish:
  - el techo de esa casa
  - la cubierta de aquella casa
  - la parte superior de aquella casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La tradición auditada debate si el término apunta a muro, superficie o cubierta; el pasaje revisado en inglés lo entendió como 'roof'. En español, 'techo' es la mejor opción para reflejar esa lectura y mantener la imagen arquitectónica coherente.
- source_word: ከመ ጸፍጸፈ ሳሌዳት
  english_pob_choice: was like a mosaic floor
  chosen_spanish: era como un mosaico de piedras de granizo
  alternatives_spanish:
  - era como un pavimento de teselas
  - era como un mosaico
  - era como un suelo mosaico
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido apunta a una labor de piedra dispuesta en patrón o teselas. En español, 'mosaico' comunica bien la textura sin forzar una equivalencia técnica moderna, y se conserva el material 'piedras de granizo' para no perder la imagen repetida.
- source_word: ምድረ በረድ
  english_pob_choice: its floor was hail
  chosen_spanish: su piso era granizo
  alternatives_spanish:
  - su suelo era granizo
  - su pavimento era granizo
  - su piso era de granizo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dentro de una casa, ምድር se entiende naturalmente como 'piso' o 'suelo'. 'Piso' es más directo y legible en español contemporáneo, y 'era granizo' conserva la contundencia visionaria del original.
theological_decisions:
- issue: Whether to normalize the visionary architecture into familiar temple language
  english_pob_reading: Retain 'great house' and the strange hailstone imagery without harmonizing to temple terminology.
  chosen_spanish_reading: Mantener 'gran casa' y la imaginería extraña de piedras de granizo, sin convertirla en 'templo' ni en otra etiqueta interpretativa.
  alternative_spanish_readings:
  - templo
  - palacio
  - santuario
  rationale: El verso describe una visión, no una identificación explícita. Preservar la rareza evita introducir asociaciones teológicas posteriores que el texto no exige en este punto.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió 'roof' para el término arquitectónico superior y mantuvo la imagen de 'mosaic'/'tessellated' para la superficie decorada. La redacción española refleja esa decisión sin adoptar la lectura anterior de 'muro'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo subyacente lo requiera; aquí no aparece.
  - Se evita 'Cristo' porque no hay lenguaje cristológico en el verso.
  - Se conserva el registro visionario y concreto, con 'granizo' y 'mosaico', sin suavizar la extrañeza del texto.
  - No se añadió nota sobre 'lengua de fuego' en el texto principal porque la imagen ya es transparente en español.
