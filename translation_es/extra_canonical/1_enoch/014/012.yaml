translation:
  language: es
  text: y un fuego ardía alrededor de los muros, y debajo de ellos había un fuego ardiente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወእሳት
  english_pob_choice: and a fire
  chosen_spanish: y un fuego
  alternatives_spanish:
  - y fuego
  - y una llama
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantengo el sustantivo concreto «fuego» para reproducir la imagen apocalíptica repetida en el verso sin intensificarla a «llama» ni suavizarla.
- source_word: ዘይነድድ
  english_pob_choice: was burning
  chosen_spanish: ardía
  alternatives_spanish:
  - estaba ardiendo
  - quemaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ardía» comunica el estado continuo de combustión de manera natural en español y conserva el valor descriptivo del pasaje.
- source_word: በአውደ
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor de
  - en torno a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Todo alrededor» expresa bien la extensión envolvente y evita una fórmula demasiado calcada o demasiado arcaica.
- source_word: አረፍት
  english_pob_choice: the walls
  chosen_spanish: los muros
  alternatives_spanish:
  - las paredes
  - los muros de la casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual identifica አረፍት como «walls». Opto por «muros» por ser más adecuado para un registro visionario y arquitectónico que «paredes» en español bíblico-literario.
- source_word: ጥሕቱ
  english_pob_choice: beneath them
  chosen_spanish: debajo de ellos
  alternatives_spanish:
  - bajo ellos
  - debajo de estas murallas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo la referencia plural natural en español para concordar con «muros» y reflejar el sentido espacial directo del término.
- source_word: ይውዒ
  english_pob_choice: there was a blaze
  chosen_spanish: había una llamarada
  alternatives_spanish:
  - había fuego
  - ardía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Llamarada» traduce bien la idea de un fuego visible e intenso, más expresivo que un simple «había fuego» y sin introducir apoyo ajeno al texto.
- source_word: በእሳት
  english_pob_choice: of fire
  chosen_spanish: de fuego
  alternatives_spanish:
  - con fuego
  - en fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción «de fuego» mantiene la relación nominal directa y suena natural en español literario.
theological_decisions:
- issue: 'Referencia del espacio incendiado: muros, no una estructura más específica'
  english_pob_reading: Use the pronoun 'it' rather than supplying 'house,' 'wall,' or 'throne-room' in the main text
  chosen_spanish_reading: Nombrar explícitamente «los muros» según la corrección lexical del texto ge'ez
  alternative_spanish_readings:
  - la casa
  - la estructura
  - el lugar
  rationale: La revisión del testimonio ge'ez permite precisar «muros» sin ir más allá del dato textual. En español conviene explicitar ese referente porque el verso ya no es elíptico en esta lectura revisada.
  doctrine_reference: Primacía del testimonio original y transparencia textual; evitar lecturas importadas sin base.
- issue: Intensidad del fuego bajo los muros
  english_pob_reading: and beneath them was a blaze of fire
  chosen_spanish_reading: y debajo de ellos había una llamarada de fuego
  alternative_spanish_readings:
  - y debajo de ellos ardía un fuego
  - y bajo ellos había fuego
  rationale: «Llamarada» conserva el carácter vívido y apocalíptico del original y refleja mejor la intensidad sugerida por el verbo que un mero «había fuego».
  doctrine_reference: Mantener la fuerza imagística del texto sin suavizarla.
translation_notes:
  revision_awareness: Este borrador sigue la revisión más reciente que rechaza la lectura de «puertas» y también la antigua solución de un pronombre indefinido. La base ge'ez disponible y el audit trail apoyan leer el primer sintagma como «alrededor de los muros» y la clausula final como una escena de fuego intenso debajo de ellos.
  spanish_consistency_notes:
  - He usado «muros» de manera uniforme para አረፍት, en consonancia con la corrección textual más reciente.
  - He evitado «SEÑOR» y otras sustituciones no pertinentes, ya que el verso no contiene el Nombre divino.
  - He mantenido un registro literario bíblico sin arcaísmos innecesarios.
  - Los corchetes de nota aparecen exactamente en el lugar correspondiente del texto traducido.
