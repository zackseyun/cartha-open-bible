base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/014/018.yaml
  text: And I looked and saw within it a lofty throne[a]; and its appearance was like crystal, and its wheels like the shining sun[d][c][b], and the voice of the cherubim.
  footnotes:
  - marker: a
    text: The word rendered 'crystal' may also suggest ice, frost, or a bright crystalline substance; the image is one of dazzling transparency and brilliance.
    reason: lexical_alternative
  - marker: b
    text: Or 'its circuit' or 'what surrounded it,' if the focus is on the encircling radiance rather than geometric shape.
    reason: lexical_alternative
  - marker: c
    text: 'The final phrase is terse in Ge''ez: literally ''and the voice of the cherubim,'' likely adding an auditory feature to the throne vision rather than forming a complete clause.'
    reason: lexical_alternative
  - marker: d
    text: Or 'its circumference'.
    reason: previous_rendering
