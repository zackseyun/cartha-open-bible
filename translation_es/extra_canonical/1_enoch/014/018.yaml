translation:
  language: es
  text: Y miré y vi dentro de él un trono excelso; y su apariencia era como de cristal[a], y sus ruedas como el sol resplandeciente[b], y la voz de los querubines[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La palabra ge‘ez traducida como ‘cristal’ también puede sugerir hielo, escarcha o una sustancia cristalina brillante; la imagen es de transparencia y resplandor deslumbrantes.
    reason: lexical_alternative
  - marker: b
    text: La palabra ge‘ez detrás de ‘ruedas’ puede abarcar círculo o circunferencia, pero aquí la revisión textual favorece claramente la lectura de ‘ruedas’ en el marco de la visión del carro-trono.
    reason: textual_variant
  - marker: c
    text: 'La frase final es muy breve en ge‘ez; puede leerse como una nota auditiva añadida a la visión: ‘y la voz de los querubines’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወነጸርኩ / ወርኢኩ
  english_pob_choice: I looked and saw
  chosen_spanish: miré y vi
  alternatives_spanish:
  - contemplé y vi
  - miré y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la doblez verbal del relato visionario sin endurecerlo en una calca innecesaria; ‘miré y vi’ suena natural en español y conserva el tono apocalíptico de observación intensa.
- source_word: ውስቴቱ
  english_pob_choice: within it
  chosen_spanish: dentro de ello
  alternatives_spanish:
  - dentro de él
  - en su interior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia espacial interna se conserva de forma clara. ‘Ello’ evita forzar género antes de precisar el referente visual y mantiene la ambigüedad del entorno visionario.
- source_word: መንበረ ልዑለ
  english_pob_choice: a lofty throne
  chosen_spanish: un trono excelso
  alternatives_spanish:
  - un trono alto
  - un trono exaltado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Excelso’ comunica altura y majestad a la vez. Evita un calco demasiado físico como ‘alto’ y no impone una formulación doctrinal que el contexto no requiere.
- source_word: ራእዩ
  english_pob_choice: its appearance
  chosen_spanish: su apariencia
  alternatives_spanish:
  - su aspecto
  - su visión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se refiere al modo visible en que se presentaba el trono; ‘apariencia’ es la opción más transparente en español para este valor descriptivo.
- source_word: አስሐትያ
  english_pob_choice: crystal
  chosen_spanish: cristal
  alternatives_spanish:
  - hielo
  - escarcha
  - una sustancia cristalina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Cristal’ preserva la imagen de brillo y transparencia propuesta por la tradición del pasaje. Las alternativas más literales se mantienen como posibilidades semánticas, pero ‘cristal’ es la mejor lectura pública en español.
- source_word: ክበቡ
  english_pob_choice: its wheels
  chosen_spanish: sus ruedas
  alternatives_spanish:
  - su rueda
  - su circunferencia
  - su círculo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada favorece ‘wheels’ por el contexto de carro-trono; en español, el plural ‘ruedas’ refleja mejor el imaginario merkabá y evita oscurecer una referencia central del texto.
- source_word: ፀሐይ ዘያበርህ
  english_pob_choice: the shining sun
  chosen_spanish: el sol resplandeciente
  alternatives_spanish:
  - el sol que brilla
  - el sol radiante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación enfatiza el brillo visible. ‘Resplandeciente’ reproduce el efecto luminoso con un registro digno y fluido en español.
- source_word: ቃለ ኪሩቤን
  english_pob_choice: the voice of the cherubim
  chosen_spanish: la voz de los querubines
  alternatives_spanish:
  - el sonido de los querubines
  - la voz de querubines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Voz’ mantiene la fuerza auditiva del hebraísmo/semitismo subyacente. En español, el plural ‘querubines’ expresa con naturalidad el colectivo celestial mencionado por la fuente.
theological_decisions:
- issue: Naturaleza del trono en visión apocalíptica
  english_pob_reading: a lofty throne
  chosen_spanish_reading: un trono excelso
  alternative_spanish_readings:
  - un trono alto
  - un trono exaltado
  rationale: La frase describe una visión, no una definición doctrinal. ‘Excelso’ conserva la elevación y la majestad sin convertir el pasaje en una formulación técnica o litúrgica.
  doctrine_reference: Evitar sobrelectura teológica; traducir la imagen visionaria en su propio registro apocalíptico.
- issue: Interpretación de ክበቡ como ruedas del trono
  english_pob_reading: its wheels
  chosen_spanish_reading: sus ruedas
  alternative_spanish_readings:
  - su circunferencia
  - su círculo
  rationale: La revisión textual señala que el sentido correcto aquí es ‘ruedas’, no ‘circunferencia’. En español conviene reflejar la imaginería de carro-trono de Ezequiel sin suavizarla.
  doctrine_reference: Mantener la imaginería merkabá y la tensión apocalíptica del texto.
- issue: Clausula final breve 'the voice of the cherubim'
  english_pob_reading: the voice of the cherubim
  chosen_spanish_reading: la voz de los querubines
  alternative_spanish_readings:
  - el sonido de los querubines
  - la voz de querubines
  rationale: La fuente es telegráfica y puede funcionar como rasgo auditivo añadido a la visión. En español se conserva la brevedad sin desarrollar una cláusula explicativa.
  doctrine_reference: Respetar la concisión del original, sin completar artificialmente la sintaxis.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente que corrigió el singular ‘wheel’ a plural ‘wheels’, y adopta la lectura confirmada por el contexto merkabá y por los testimonios comparados. También integra la nota auditiva final sin expandirla más de lo que permite la fuente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se mantiene ‘querubines’ como plural convencional en español.
  - ‘Cristal’ conserva la ambigüedad luminosa señalada por la tradición de la entrada, sin forzar especificaciones.
  - La puntuación conserva el carácter enumerativo del original, con coordinación simple y sin explicaciones añadidas.
