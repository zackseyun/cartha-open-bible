base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/014/005.yaml
  text: And from now on you shall not ascend into heaven for all eternity[b][a], and on the earth it has been declared that you shall be bound for all the days of eternity.
  footnotes:
  - marker: a
    text: 'The Ethiopic uses two overlapping duration formulas in this verse: one after the ban from heaven and another after the sentence of binding. The translation preserves both rather than merging them into a single ''forever.'''
    reason: lexical_alternative
  - marker: b
    text: The passive phrase 'it has been declared' leaves the speaker or authority implicit; the context suggests a heavenly judicial decree.
    reason: cultural_note
