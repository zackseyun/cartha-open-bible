revisions:
- from: Y desde ahora no subirán al cielo[a], por toda la eternidad[b]; y en la tierra ha sido declarado[c] que ustedes serán atados por todos los días de la eternidad.
  to: Y de ahora en adelante no subirán al cielo[a], y sobre la tierra se ha declarado[b] que ustedes serán atados por todos los días de la eternidad.
  rationale: 'Se corrige principalmente el aparato de notas para alinearlo con el audit trail inglés: una sola nota explica la doble fórmula temporal, y otra conserva la observación sobre la pasiva implícita. También se mejora levemente la naturalidad del español con «de ahora en adelante» y «se ha declarado», manteniendo intacto el sentido judicial y la imaginería apocalíptica del original. Se elimina la puntuación que separaba artificialmente la primera fórmula temporal y se deja la segunda explícita al final, donde el original la vincula directamente con el castigo de ser atados.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:42:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien el sentido general del ge''ez y la lógica judicial del versículo: marcador temporal («desde ahora»), prohibición de ascender al cielo, decreto pasivo implícito y castigo de ser atados. También mantiene correctamente las dos fórmulas de duración sin fusionarlas. Sin embargo, la distribución de las notas no sigue bien el rastro auditado en inglés: la nota principal sobre la superposición de dos fórmulas temporales debe corresponder al conjunto de la frase, no fragmentarse en dos notas separadas que además anclan solo segmentos parciales.'
  spanish_quality_summary: 'El español es claro y digno, pero hay pequeños ajustes de naturalidad y precisión editorial. «Y desde ahora» suena mejor como «Y de ahora en adelante». «En la tierra ha sido declarado» es comprensible, pero «sobre la tierra se ha declarado» o «en la tierra se ha decretado» suena más idiomático; no obstante, para conservar la pasiva implícita del original conviene «se ha declarado». Además, hay un problema técnico: existe una nota c anclada en el texto, pero la consigna prioriza preservar notas significativas del inglés y evitar notas innecesarias. Aquí basta con dos notas: una para la doble fórmula temporal y otra para la pasiva impersonal.'
  glossary_alignment: No hay términos del glosario mayor en conflicto. Las decisiones «cielo», «atados» y la conservación del tono judicial son coherentes con el POB. «Serán atados» preserva bien la imaginería apocalíptica concreta frente a opciones más interpretativas como «encarcelados».
  issues:
  - severity: medium
    issue: Las notas al pie no reflejan con fidelidad la lógica del audit trail inglés sobre las dos fórmulas de duración.
    rationale: El inglés tiene una nota unificada que explica la superposición de dos fórmulas temporales en todo el versículo. El borrador la divide en dos notas separadas, lo que debilita la observación textual y complica innecesariamente el aparato.
  - severity: low
    issue: «Desde ahora» es correcto, pero «de ahora en adelante» suena más natural y solemne en español bíblico contemporáneo.
    rationale: Ambas opciones son fieles, pero la segunda encaja mejor con una proclamación judicial continua.
  - severity: low
    issue: «Ha sido declarado» resulta algo rígido en español.
    rationale: «Se ha declarado» conserva la impersonalidad/pasiva del original con mejor fluidez, sin explicitar indebidamente al agente.
  revised_spanish_text: Y de ahora en adelante no subirán al cielo[a], y sobre la tierra se ha declarado[b] que ustedes serán atados por todos los días de la eternidad.
  revised_footnotes:
