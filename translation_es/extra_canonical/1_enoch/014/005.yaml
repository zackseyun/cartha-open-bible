    reason: lexical_alternative
  - marker: b
    text: La frase impersonal «se ha declarado» deja implícita la autoridad que emite el decreto; el contexto sugiere un decreto judicial celestial.
    reason: cultural_note
  revision_rationale: 'Se corrige principalmente el aparato de notas para alinearlo con el audit trail inglés: una sola nota explica la doble fórmula temporal, y otra conserva la observación sobre la pasiva implícita. También se mejora levemente la naturalidad del español con «de ahora en adelante» y «se ha declarado», manteniendo intacto el sentido judicial y la imaginería apocalíptica del original. Se elimina la puntuación que separaba artificialmente la primera fórmula temporal y se deja la segunda explícita al final, donde el original la vincula directamente con el castigo de ser atados.'
