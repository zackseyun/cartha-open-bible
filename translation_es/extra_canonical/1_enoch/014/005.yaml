translation:
  language: es
  text: Y de ahora en adelante no subirán al cielo[a], y sobre la tierra se ha declarado[b] que ustedes serán atados por todos los días de la eternidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El etiópico usa dos fórmulas de duración que se superponen en este versículo: una después de la prohibición de subir al cielo y otra después de la sentencia de ser atados. La traducción conserva ambas en lugar de fusionarlas en un solo «para siempre».'
    reason: lexical_alternative
  - marker: b
    text: La frase impersonal «se ha declarado» deja implícita la autoridad que emite el decreto; el contexto sugiere un decreto judicial celestial.
    reason: cultural_note
lexical_decisions:
- source_word: እምይእዜ
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - a partir de ahora
  - en adelante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca un cambio temporal inmediato y solemne; «desde ahora» conserva el valor judicial del inicio de una nueva स्थिति sin sonar artificial en español.
- source_word: ኢትዓርጉ
  english_pob_choice: you shall not ascend
  chosen_spanish: no subirán
  alternatives_spanish:
  - no ascenderán
  - no irán a subir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico es «subir», que en español comunica bien el movimiento vertical; en este contexto apocalíptico es preferible a una formulación más técnica como «ascenderán».
- source_word: ውስተ ሰማይ
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - al cielo de Dios
  - al cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español «cielo» expresa de manera natural el contraste cósmico con la tierra. La preposición «al» refleja el movimiento hacia arriba implícito en el original.
- source_word: እስከ ኵሉ ዓለም
  english_pob_choice: for all eternity
  chosen_spanish: por toda la eternidad
  alternatives_spanish:
  - para siempre
  - por toda la era
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase etiópica intensifica una duración absoluta; «por toda la eternidad» preserva ese alcance sin reducirlo a un simple «para siempre».
- source_word: ወውስተ ምድር ተነግረ
  english_pob_choice: and on the earth it has been declared
  chosen_spanish: y en la tierra ha sido declarado
  alternatives_spanish:
  - y sobre la tierra ha sido declarado
  - y en la tierra se ha declarado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción pasiva deja implícita la autoridad que pronuncia el decreto. «Ha sido declarado» conserva el tono formal y el carácter jurídico del pasaje.
- source_word: ይእስርክሙ
  english_pob_choice: you shall be bound
  chosen_spanish: serán atados
  alternatives_spanish:
  - quedarán atados
  - serán encadenados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Atados» mantiene la imagen concreta de sujeción y castigo propia del Libro de los Vigilantes, sin convertirla en una abstracción como «encarcelados».
- source_word: በኵሉ መዋዕለ ዓለም
  english_pob_choice: for all the days of eternity
  chosen_spanish: por todos los días de la eternidad
  alternatives_spanish:
  - por todos los días del mundo eterno
  - por todos los días de la era
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición temporal del original se conserva con una formulación literal y solemne. «Días de la eternidad» refleja mejor la estructura del etiópico que una simplificación a «para siempre».
theological_decisions:
- issue: Conservar la imagen apocalíptica concreta del juicio en lugar de abstraerla
  english_pob_reading: you shall be bound
  chosen_spanish_reading: serán atados
  alternative_spanish_readings:
  - serán encarcelados
  - quedarán confinados
  rationale: El texto no describe de manera genérica una pena, sino una imagen judicial concreta de sujeción. Mantener «atados» preserva el simbolismo propio del pasaje.
  doctrine_reference: Preservar el imaginario apocalíptico del Libro de los Vigilantes; no aplanar el juicio en prosa general.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto etiópico y el audit trail inglés, preservando las dos fórmulas de duración, la pasiva impersonal y la imagen concreta de atadura. No se requieren revisiones respecto del pasaje base.
  spanish_consistency_notes:
  - Se usa «cielo» para ውስተ ሰማይ en sentido cosmológico/apocalíptico, no como metáfora del aire o del firmamento.
  - Se mantiene «atados» para conservar la fuerza material del castigo; no se sustituye por «encarcelados» porque esa sería una interpretación secundaria.
  - Se traduce la doble duración con dos expresiones distintas en español para reflejar la redundancia enfática del original, tal como en el audit trail inglés.
