translation:
  language: es
  text: Y entré hasta acercarme a una estructura[a] construida de piedras de granizo[b], y una lengua de fuego la rodeaba, y su fundamento me hizo temer[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un edificio» o «una casa»; el término geʽez denota algo construido, pero el matiz arquitectónico exacto no es seguro a partir de este testimonio solamente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «piedras de granizo». Puede referirse a granizos, pero la formulación más literal conserva la extrañeza de la visión.
    reason: lexical_alternative
  - marker: c
    text: La cláusula final es textualmente difícil en este testimonio; el sentido parece ser que su fundamento o base comenzó a infundirme temor.
    reason: textual_variant
lexical_decisions:
- source_word: ወቦእኩ
  english_pob_choice: And I went in
  chosen_spanish: Y entré
  alternatives_spanish:
  - Y fui hacia adentro
  - Y me adentré
  lexicon: Dillmann; Leslau
  rationale: El verbo expresa entrar/ir dentro. «Entré» comunica bien el movimiento visionario sin perder naturalidad en español.
- source_word: እስከ እቀርብ
  english_pob_choice: until I drew near
  chosen_spanish: hasta acercarme
  alternatives_spanish:
  - hasta que me acerqué
  - hasta que llegué cerca
  lexicon: Dillmann; Leslau
  rationale: La secuencia marca un avance continuo hasta la proximidad. «Hasta acercarme» conserva ese matiz con español fluido.
- source_word: ጥቅም
  english_pob_choice: a structure / a wall
  chosen_spanish: una pared
  alternatives_spanish:
  - un muro
  - una muralla
  lexicon: Dillmann; Leslau
  rationale: El desarrollo del dossier muestra que el término se entiende mejor como una pared o muro, no como una estructura genérica. «Pared» es claro en español y mantiene la idea de superficie/obstáculo cercano en la visión.
- source_word: ዘሕንጽት
  english_pob_choice: built of
  chosen_spanish: construida de
  alternatives_spanish:
  - hecha de
  - levantada con
  lexicon: Dillmann; Leslau
  rationale: La forma relativa califica la pared como algo edificado. «Construida de» mantiene el valor descriptivo sin sobreinterpretar.
- source_word: በእእባነ በረድ
  english_pob_choice: stones of hail
  chosen_spanish: piedras de granizo
  alternatives_spanish:
  - piedras de hielo
  - granizos
  lexicon: Dillmann; Leslau
  rationale: La expresión es literalmente «piedras de granizo». Se conserva esa imagen extraña y apocalíptica en lugar de normalizarla a «granizos».
- source_word: ልሳነ እሳት
  english_pob_choice: a tongue of fire
  chosen_spanish: una lengua de fuego
  alternatives_spanish:
  - lenguas de fuego
  - una llama
  lexicon: Dillmann; Leslau
  rationale: 'El singular debe preservarse: la imagen es «una lengua de fuego», no plural. En español, «lengua de fuego» reproduce bien la metáfora concreta.'
- source_word: የዓውዳ
  english_pob_choice: surrounded it
  chosen_spanish: la rodeaba
  alternatives_spanish:
  - la cercaba
  - la circundaba
  lexicon: Dillmann; Leslau
  rationale: El verbo indica rodear/encerrar alrededor. «La rodeaba» es natural y mantiene la relación espacial con el antecedente singular.
- source_word: ወጠነ
  english_pob_choice: it began
  chosen_spanish: su fundamento
  alternatives_spanish:
  - su base
  - el fundamento de ella
  lexicon: Dillmann; Leslau
  rationale: La tradición de revisión señalada en el audit trail entiende que el sentido apunta al efecto producido por el fundamento/base de la pared. «Fundamento» preserva esa lectura técnica y permite reflejar el cierre del verso.
- source_word: ያፍርሀኒ
  english_pob_choice: to make me afraid
  chosen_spanish: me hizo temer
  alternatives_spanish:
  - me atemorizó
  - me hizo sentir miedo
  lexicon: Dillmann; Leslau
  rationale: El causativo expresa producir miedo. «Me hizo temer» conserva la relación causal sin cargarlo demasiado hacia una intensidad que el texto no obliga a dar.
theological_decisions:
- issue: Conservación de la imagen visionaria no normalizada
  english_pob_reading: a wall built of stones of hail ... a tongue of fire surrounded it
  chosen_spanish_reading: una pared construida de piedras de granizo ... una lengua de fuego la rodeaba
  alternative_spanish_readings:
  - una muralla hecha de granizo ... unas llamas la rodeaban
  - una estructura de piedras de hielo ... fuego la cercaba
  rationale: La visión es deliberadamente extraña y material. Mantener «piedras de granizo» y «lengua de fuego» evita suavizar el carácter apocalíptico del pasaje.
  doctrine_reference: 'Principio de traducción: preservar la imaginería visionaria y la tensión textual cuando la fuente la presenta.'
- issue: Ambigüedad del final del verso
  english_pob_reading: its foundation made me afraid
  chosen_spanish_reading: su fundamento me hizo temer
  alternative_spanish_readings:
  - su base me atemorizó
  - el cimiento me causó miedo
  rationale: El audit trail muestra una oscilación interpretativa en la última cláusula. «Fundamento» permite reflejar la lectura de base/fundación sin cerrar indebidamente la ambigüedad.
  doctrine_reference: 'Criterio de cautela textual: no borrar una dificultad semántica que permanece en el testimonio disponible.'
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por varias decisiones: primero «a structure», luego una corrección a «a wall», y además una revisión del cierre final. Para el español se siguió la última orientación útil del expediente, pero se mantuvo la cautela textual en la cláusula final y se preservó la imaginería singular de «una lengua de fuego».'
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar la continuidad narrativa.
  - Se eligió «lengua de fuego» en singular, coherente con el expediente auditado.
  - «Pared» se usa como equivalente funcional de wall; el pie de nota ofrece las alternativas más cercanas.
  - No se introdujo terminología eclesiástica ajena al texto; se conservó un registro sobrio y visionario.
