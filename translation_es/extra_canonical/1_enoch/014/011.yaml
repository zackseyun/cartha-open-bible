translation:
  language: es
  text: Su techumbre era como el camino de las estrellas y de los relámpagos[a], y entre ellos había querubines de fuego, y su cielo era agua[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase puede entenderse también como “el curso de las estrellas y de los relámpagos”.
    reason: lexical_alternative
  - marker: b
    text: La expresión “su cielo era agua” es difícil; podría referirse al estrato celeste asociado con esas figuras o al cielo superior de la visión.
    reason: alternative_reading
lexical_decisions:
- source_word: ጠፈሩ
  english_pob_choice: its ceiling
  chosen_spanish: su techumbre
  alternatives_spanish:
  - su techo
  - su cielo raso
  - su cubierta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, ‘techumbre’ conserva la imagen arquitectónica elevada del recinto visionario y resulta más natural que un calco como ‘ceiling’. Evita además ‘firmamento’, que desplazaría la escena hacia un sentido cosmológico no exigido por el contexto inmediato.
- source_word: ሩጸተ
  english_pob_choice: path
  chosen_spanish: camino
  alternatives_spanish:
  - curso
  - recorrido
  - andar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea básica es la trayectoria o movimiento visible de los astros. ‘Camino’ comunica bien esa trayectoria en español sin volverla demasiado técnica ni forzar un matiz verbal.
- source_word: ከዋክብት
  english_pob_choice: stars
  chosen_spanish: las estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el equivalente directo y natural en español para el referente celeste.
- source_word: መበርቅት
  english_pob_choice: lightnings / flashes of lightning
  chosen_spanish: los relámpagos
  alternatives_spanish:
  - las luces de relámpago
  - los rayos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Relámpagos’ recoge el plural de fenómenos luminosos y es idiomático en español. En esta frase se mantiene la coordinación del original sin ampliar innecesariamente la imagen.
- source_word: ማእከሎሙ
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su centro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Entre ellos’ es la forma más clara y fluida para situar a los querubines dentro del conjunto de estrellas/relámpagos.
- source_word: ኪሩቤን
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines celestiales
  - kerubines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Querubines’ es el término reconocido en español para este ser angélico y preserva el registro apocalíptico.
- source_word: ዘእሳት
  english_pob_choice: fiery
  chosen_spanish: de fuego
  alternatives_spanish:
  - ígneos
  - ardientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción genitiva del ge'ez se expresa con naturalidad como ‘de fuego’, manteniendo la fuerza imagética sin introducir un adjetivo menos transparente.
- source_word: ሰማዮሙ
  english_pob_choice: their heaven
  chosen_spanish: su cielo
  alternatives_spanish:
  - su cielo era agua
  - su cielo estaba hecho de agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el posesivo y el sustantivo ‘cielo’ para reflejar la forma del original sin resolver la extrañeza de la imagen. ‘Cielo’ es más idiomático en español que ‘heaven’, y mantiene el sentido cósmico/visionario.
- source_word: ማይ
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Agua’ reproduce el sustantivo singular y mantiene la simplicidad del enunciado; ‘aguas’ introduciría un plural no exigido por el texto base.
theological_decisions:
- issue: Conservar la imagen extraña de “su cielo era agua” sin normalizarla
  english_pob_reading: their heaven was water
  chosen_spanish_reading: su cielo era agua
  alternative_spanish_readings:
  - el cielo sobre ellos era agua
  - su cielo estaba hecho de agua
  rationale: El testimonio ge'ez preserva una formulación difícil que la tradición auditada en inglés decide no suavizar. En español se mantiene esa rareza para respetar la tensión visionaria y no convertirla en una explicación interpretativa.
  doctrine_reference: Preservar tensión textual y apocalíptica en vez de armonizarla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la traducción de ሩጸተ para mantener ‘path’ en vez de ‘course’ por consistencia con 14:8, y conservó la rareza de ‘their heaven was water’. La propuesta española sigue esa decisión de consistencia, usando ‘camino’ para ሩጸተ y manteniendo la formulación difícil del cierre.
  spanish_consistency_notes:
  - Se mantiene una construcción paralela y solemne para reflejar el estilo visionario del pasaje.
  - ‘Querubines’ conserva el término tradicional apocalíptico sin introducir explicación interpretativa.
  - Se evita ‘firmamento’ para ጠፈሩ porque el contexto inmediato sugiere una techumbre/parte superior de la estructura visionaria.
