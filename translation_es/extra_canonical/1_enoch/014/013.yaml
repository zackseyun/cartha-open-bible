    rationale: No obstante, aquí refleja bien el contraste con «fría como hielo» y sigue la decisión auditada de «hot», por lo que no requiere cambio.
  - severity: low
    issue: «deleite de vida» es una expresión inusual en español
    rationale: La rareza es intencional y fiel al original difícil; la nota explicativa mitiga la posible opacidad sin sobreinterpretar el texto.
