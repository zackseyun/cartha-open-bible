translation:
  language: es
  text: Y entré en aquella casa[a], y estaba caliente como fuego y fría como hielo, y no había en ella ningún deleite de vida; el temor me cubrió, y el temblor se apoderó de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase ge'ez traducida «deleite de vida» es difícil. Puede significar que no había en la casa ninguna cualidad vivificante y agradable, o más ampliamente que no había dentro de ella ningún consuelo propio de la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወቦእኩ
  english_pob_choice: And I went into
  chosen_spanish: Y entré en
  alternatives_spanish:
  - Y fui a
  - Y me metí en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa el movimiento de entrar. En español, «entré en» conserva la acción de ingreso con naturalidad y sin añadir matices indebidos.
- source_word: ውእቱ ቤት
  english_pob_choice: that house
  chosen_spanish: aquella casa
  alternatives_spanish:
  - esa casa
  - la casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo remite a la casa ya descrita en el contexto visionario. «Aquella» conserva mejor la distancia referencial que «la» sola.
- source_word: ምውቅ
  english_pob_choice: hot
  chosen_spanish: caliente
  alternatives_spanish:
  - calurosa
  - ardiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido base es de calor; «caliente» funciona bien con la comparación «como fuego» y evita intensificar más de lo que el texto requiere.
- source_word: ቈሪር
  english_pob_choice: cold
  chosen_spanish: fría
  alternatives_spanish:
  - helada
  - congelada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo denota frialdad general. «Fría» es la equivalencia más clara y se complementa con «como hielo».
- source_word: በረድ
  english_pob_choice: ice
  chosen_spanish: hielo
  alternatives_spanish:
  - hielo duro
  - escarcha
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En la comparación la imagen más natural en español es «hielo». Mantiene el contraste apocalíptico de calor y frío.
- source_word: ወኢምንተ ፍግዐ ሕይወት አልቦቱ ውስቴቱ
  english_pob_choice: and there was no delight of life within it
  chosen_spanish: y no había en ella ningún deleite de vida
  alternatives_spanish:
  - y no había en ella ningún placer de vida
  - y no había en ella nada vivificante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez es difícil y parece negar una cualidad vivificante o agradable de la vida dentro de la casa. «Deleite de vida» conserva la rareza y evita resolver el pasaje demasiado pronto.
- source_word: ፍርሃት ከደነኒ
  english_pob_choice: fear covered me
  chosen_spanish: el temor me cubrió
  alternatives_spanish:
  - el miedo me envolvió
  - el temor me sobrecogió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo sugiere cubrir o envolver. «Me cubrió» preserva esa imagen corporal y visionaria.
- source_word: ወረዓድ አኃዘኒ
  english_pob_choice: and trembling seized me
  chosen_spanish: y el temblor se apoderó de mí
  alternatives_spanish:
  - y el estremecimiento me tomó
  - y el temblor me agarró
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo alude al temblor o estremecimiento, y el verbo expresa tomar o agarrar. «Se apoderó de mí» transmite bien la fuerza física de la reacción.
theological_decisions:
- issue: Cómo preservar la frase difícil sobre lo que faltaba dentro de la casa
  english_pob_reading: there was no delight of life within it
  chosen_spanish_reading: no había en ella ningún deleite de vida
  alternative_spanish_readings:
  - no había en ella ningún placer de vida
  - no había en ella nada vivificante
  rationale: El ge'ez no parece decir simplemente que no había vida biológica, sino que niega una cualidad de vida agradable o vivificante. Mantener la extrañeza de la frase en español conserva la tensión interpretativa del texto.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El presente borrador sigue la última revisión sin cambios sustanciales y conserva el mismo análisis de la expresión difícil sobre la ausencia de «deleite de vida», manteniendo la tensión semántica del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Temor» y «temblor» distinguen dos respuestas corporales distintas, como en el inglés auditado.
  - La puntuación conserva el paralelismo y la sucesión de imágenes del texto fuente sin añadir explicaciones interpretativas.
