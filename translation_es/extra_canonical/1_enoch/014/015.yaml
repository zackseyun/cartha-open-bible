translation:
  language: es
  text: Y he aquí otra casa, mayor que aquélla[a], y todas sus puertas estaban abiertas delante de mí; y estaba construida con lenguas de fuego[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mayor que esa». El demostrativo del ge''ez es lejano, no cercano.'
    reason: previous_rendering
  - marker: b
    text: «Lenguas de fuego» mantiene la imagen concreta de formas o proyecciones de llama; algunos traductores la suavizan como «llamas de fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: ናሁ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - véase
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el giro visionario y deíctico del relato apocalíptico sin volverlo una mera transición narrativa.
- source_word: ካልእ ቤት
  english_pob_choice: another house
  chosen_spanish: otra casa
  alternatives_spanish:
  - una segunda casa
  - otro edificio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Casa'' reproduce con fidelidad la imagen arquitectónica del etíope y deja abierta la posible resonancia cultual sin imponer ''templo'' o ''palacio''.'
- source_word: ዘየዓቢ እምዝክቱ
  english_pob_choice: greater than that one
  chosen_spanish: mayor que aquélla
  alternatives_spanish:
  - más grande que aquélla
  - más grande que esa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Mayor'' conserva el valor comparativo de tamaño y prominencia; ''aquélla'' refleja el demostrativo lejano del ge''ez, conforme a la revisión auditable.'
- source_word: ኵሉ ኆኅተ
  english_pob_choice: all its doors
  chosen_spanish: todas sus puertas
  alternatives_spanish:
  - cada una de sus puertas
  - todas sus entradas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pluralidad posesiva es más natural en español con 'todas sus puertas'; mantiene la idea de apertura total sin forzar un calco de 'every doorway'.
- source_word: ርኁት
  english_pob_choice: were open
  chosen_spanish: estaban abiertas
  alternatives_spanish:
  - permanecían abiertas
  - quedaban abiertas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa el estado resultante de las puertas de forma idiomática en español, preservando la escena visual ante el vidente.
- source_word: በቅድሜየ
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Delante de mí'' reproduce con claridad la perspectiva espacial del visionario en español contemporáneo.'
- source_word: ሕኑጽ
  english_pob_choice: built
  chosen_spanish: construida
  alternatives_spanish:
  - edificada
  - hecha
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Construida'' comunica el sentido arquitectónico sin añadir connotaciones interpretativas.'
- source_word: በልሳናተ እሳት
  english_pob_choice: with tongues of fire
  chosen_spanish: con lenguas de fuego
  alternatives_spanish:
  - con llamas de fuego
  - con lenguas ígneas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la imagen concreta y extraña del original, evitando suavizarla a 'llamas' y preservando la fuerza apocalíptica.
theological_decisions:
- issue: Identificación de la construcción visionaria
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  - palacio
  rationale: El ge'ez dice literalmente 'casa'. Aunque el contexto puede sugerir una lectura cultual o real, la traducción no la explicita para conservar la tensión teológica documentada.
  doctrine_reference: Preservar la tensión interpretativa en vez de resolverla en el texto principal.
translation_notes:
  revision_awareness: La revisión más reciente corrigió el demostrativo de 'this' a 'that' para reflejar ዝክቱ; la versión española adopta 'aquélla' para mantener esa lectura. También sigue la decisión inglesa más reciente de 'all its doors were open' frente a una formulación más distributiva.
  spanish_consistency_notes:
  - Se mantiene 'casa' en lugar de 'templo' o 'palacio' para no sobreinterpretar la identificación de la estructura.
  - '''Aquélla'' refleja el demostrativo lejano del texto base y evita el error corregido en la auditoría.'
  - '''Lenguas de fuego'' conserva la imagen insólita del original y es coherente con el estilo POB de retener tensión lexical cuando no hay motivo para aplanarla.'
