translation:
  language: es
  text: Este es el libro de las palabras de justicia y de la reprensión de los vigilantes[a], que son desde antiguo[b], tal como lo ordenó el Santo y Grande en esa visión[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «los Vigilantes», el nombre tradicional de estos seres celestiales; el término ge'ez significa literalmente los que están despiertos o velan.
    reason: lexical_alternative
  - marker: b
    text: La expresión puede significar también «desde la eternidad» o «desde la antigüedad», subrayando procedencia remota más que definiendo necesariamente eternidad absoluta.
    reason: lexical_alternative
  - marker: c
    text: O «como» o «según». El ge'ez በከመ puede expresar comparación o modo; aquí se traduce de forma natural como «tal como».
    reason: previous_rendering
lexical_decisions:
- source_word: መጽሐፈ
  english_pob_choice: book
  chosen_spanish: libro
  alternatives_spanish:
  - escrito
  - rollo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መጽሐፈ designa un escrito o libro; «libro» es la equivalencia natural y elevada en español para introducir el contenido de la obra.
- source_word: ቃለ
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - discurso
  - asunto
  - relato
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma singular puede funcionar colectivamente; en español, «palabras» preserva ese valor colectivo y suena natural en una fórmula de encabezamiento.
- source_word: ጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia salvadora
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el término puede expresar tanto rectitud moral como justicia en sentido religioso. «Justicia» conserva el peso ético-teológico sin introducir una paráfrasis más interpretativa.
- source_word: ዘለፋ
  english_pob_choice: reproof
  chosen_spanish: reprensión
  alternatives_spanish:
  - reprensión severa
  - censura
  - amonestación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término denota reproche o censura. «Reprensión» mantiene el tono formal y admonitorio del texto apocalíptico mejor que opciones más coloquiales.
- source_word: ትጉሃን
  english_pob_choice: the vigilant ones
  chosen_spanish: los vigilantes
  alternatives_spanish:
  - los vigilantes despiertos
  - los que velan
  - los vigilantes / los vigilantes celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo-nombre ge'ez remite a los que velan o están despiertos. «Vigilantes» conserva la fuerza técnica del grupo angelical conocido tradicionalmente como Watchers, sin reemplazarlo por una frase genérica.
- source_word: እለ እምዓለም
  english_pob_choice: who are from eternity
  chosen_spanish: que son de antaño
  alternatives_spanish:
  - que son de la eternidad
  - que son desde la antigüedad
  - que son de antiguo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase admite la idea de origen remoto o antigua procedencia. «De antaño» preserva esa ambigüedad en español y evita definir excesivamente si se trata de eternidad absoluta o de antigüedad primordial.
- source_word: አዘዘ
  english_pob_choice: commanded
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - decretó
  - dio la orden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ordenó» refleja un acto de mandato divino con dignidad literaria y corresponde bien al marco de revelación.
- source_word: ቅዱስ ወዓቢይ
  english_pob_choice: the Holy and Great One
  chosen_spanish: el Santo y Grande
  alternatives_spanish:
  - el Santo y el Grande
  - el Santo y Poderoso
  - el Santo y Magnífico
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Los epítetos funcionan como título divino unitario. En español, «el Santo y Grande» reproduce la condensación del original y resulta idiomático; se omite «Uno» porque el título puede entenderse naturalmente en español sin forzar la expresión.
- source_word: በይእቲ ራእይ
  english_pob_choice: in that vision
  chosen_spanish: en esa visión
  alternatives_spanish:
  - por esa visión
  - mediante esa visión
  - dentro de esa visión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición ge'ez puede ser locativa o instrumental. «En esa visión» es la opción menos interpretativa y se ajusta al marco narrativo de la revelación.
theological_decisions:
- issue: Identidad de ትጉሃን
  english_pob_reading: Rendered as 'the vigilant ones,' referring to the heavenly Watchers rather than generic diligent people.
  chosen_spanish_reading: «los vigilantes» como término técnico para los seres celestiales del libro de Enoc.
  alternative_spanish_readings:
  - los que velan
  - los vigilantes celestiales
  - los vigilantes / Watchers
  rationale: El contexto del Libro de los Vigilantes favorece una referencia angelológica específica. «Los vigilantes» conserva la raíz semántica de vigilia y mantiene el valor técnico sin diluirlo en un sentido moral general.
  doctrine_reference: Preservar la imaginería apocalíptica y los términos técnicos locales; no convertir seres celestiales en prosa genérica.
- issue: Fuerza de እለ እምዓለም
  english_pob_reading: 'Taken as a descriptor of primordial heavenly beings: ''who are from eternity.'''
  chosen_spanish_reading: «que son de antaño», entendido como procedencia remota o primordial.
  alternative_spanish_readings:
  - que son de la eternidad
  - que son desde la antigüedad
  - que son eternos
  rationale: La expresión es ambigua entre eternidad y antigüedad remota. «De antaño» conserva esa tensión sin decidir más de lo que el ge'ez exige, y deja abierta la lectura de antigüedad primordial.
  doctrine_reference: Preservar la tensión teológica cuando el original es genuinamente ambiguo.
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión que corrigió el inglés arcaico equivalente de በከመ a una comparación más natural; por eso el español usa «tal como» y evita un calco rígido. También respeta la lectura aprobada del título divino y mantiene la ambigüedad controlada de እለ እምዓለም sin resolverla en exceso.
  spanish_consistency_notes:
  - Se conserva el registro solemne y apocalíptico sin recurrir a fórmulas eclesiásticas tradicionales no sustentadas por el original.
  - «Vigilantes» se mantiene como término técnico coherente con la terminología del libro de Enoc.
  - «Justicia» y «reprensión» reflejan adecuadamente el par ético-admonitorio del texto.
  - No se usa «SEÑOR» como máscara del nombre divino; aquí el original ofrece un título, no el tetragrámaton.
