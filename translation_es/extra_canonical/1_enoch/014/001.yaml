    reason: previous_rendering
  revision_rationale: Se revisa solo lo necesario para acercar el español al grado de ambigüedad preservado por el original y por el English POB. 'Desde antiguo' mantiene mejor la noción de origen primordial/remoto que 'de antaño'. También se afina la nota [c] para reflejar mejor el abanico semántico documentado para በከመ y la razón de traducirlo aquí como 'tal como'.
