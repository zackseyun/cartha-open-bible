revisions:
- from: Y no se os concederá misericordia ni súplica[a], por causa de la violencia que habéis enseñado[c][b], y por causa de todas las obras de blasfemia, violencia y pecado que habéis mostrado a la humanidad.
  to: Y no se les concederá misericordia ni súplica[a], por causa de la violencia que han enseñado, y por causa de todas las obras de blasfemia, violencia y pecado que han mostrado[b] a la humanidad.
  rationale: 'Se corrigen tres problemas concretos sin cambiar el sentido base: 1) se adopta un registro neutral latinoamericano (''les'', ''han'') en lugar de ''os/habéis''; 2) se reubica la nota sobre ''mostrar/revelar'' al verbo correcto; 3) se elimina la nota [c] defectuosa, conservando solo notas útiles y fieles a la auditoría. El texto revisado mantiene la lectura auditada de ''misericordia'' y preserva la acusación de transmisión corrupta a la humanidad.'
