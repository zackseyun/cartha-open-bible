translation:
  language: es
  text: Y no se les concederá misericordia ni súplica[a], por causa de la violencia que han enseñado, y por causa de todas las obras de blasfemia, violencia y pecado que han mostrado[b] a la humanidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La combinación de dos términos cercanos conserva el énfasis formal del versículo en la negación de intercesión o acceso a favor de los Vigilantes.
    reason: cultural_note
  - marker: b
    text: O 'revelado a la humanidad' o 'hecho conocer a la humanidad'. El verbo ge'ez puede denotar hacer ver o dar a conocer; en contexto, puede referirse al conocimiento ilícito divulgado por los Vigilantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሣሕት
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - clemencia
  - favor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige aquí una lectura errónea previa: el término recuperado en la fuente se entiende como ''misericordia'' / ''clemencia''. En español, ''misericordia'' conserva mejor la idea de alivio o indulgencia negada en un contexto judicial.'
- source_word: ስእለት
  english_pob_choice: petition / supplication
  chosen_spanish: súplica
  alternatives_spanish:
  - petición
  - ruego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el par formal de términos relacionados para preservar la duplicación enfática del versículo. 'Súplica' suena natural en español bíblico y conserva el tono de intercesión formal.
- source_word: ኢይከውከ
  english_pob_choice: will be granted to you
  chosen_spanish: se os concederá
  alternatives_spanish:
  - os será otorgada
  - se os dará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor negativo imperfectivo apunta a una concesión denegada. 'Conceder' refleja bien la idea de que misericordia y súplica no serán otorgadas/eficaces para los destinatarios.
- source_word: ዘመሀርከ
  english_pob_choice: you have taught
  chosen_spanish: habéis enseñado
  alternatives_spanish:
  - habéis instruido
  - habéis causado a aprender
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Enseñar'' es la opción más directa y mantiene la acusación de transmisión de violencia a la humanidad.'
- source_word: ግፍዐ
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - injusticia violenta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La voz acusa un daño activo y social; 'violencia' preserva la fuerza moral del término y coincide con la lectura del contexto del juicio.
- source_word: ምግባረ
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - prácticas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Obras'' reproduce el plural concreto y el registro elevado de una lista de cargos.'
- source_word: ጽርፈት
  english_pob_choice: blasphemy
  chosen_spanish: blasfemia
  alternatives_spanish:
  - injuria
  - irreverencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Blasfemia'' es la equivalencia más natural en español religioso para una conducta o palabra impía/abusiva en este marco judicial.'
- source_word: ወግፍዕ
  english_pob_choice: and violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - daño violento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva 'violencia' por consistencia con el mismo campo léxico del versículo, evitando variar sin necesidad.
- source_word: ወሓጢአት
  english_pob_choice: and sin
  chosen_spanish: pecado
  alternatives_spanish:
  - transgresión
  - culpa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pecado'' es la forma más amplia y reconocible en español, adecuada para el clímax acusatorio.'
- source_word: ዘአርአይከ
  english_pob_choice: you have shown
  chosen_spanish: habéis mostrado
  alternatives_spanish:
  - habéis revelado
  - habéis hecho conocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene 'mostrar' como la opción principal, dejando abierta la posible idea de revelación sin imponerla en el texto base.
- source_word: ለሰብእ
  english_pob_choice: to humankind
  chosen_spanish: a la humanidad
  alternatives_spanish:
  - a los seres humanos
  - a la gente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Humanidad'' expresa un referente colectivo general y evita una lectura masculina exclusiva.'
theological_decisions:
- issue: 'Alcance de la acusación final: enseñanza vs. mera exhibición'
  english_pob_reading: The verse indicts them for showing or teaching corrupt practices to humankind, not merely for committing those acts themselves.
  chosen_spanish_reading: El versículo acusa tanto la enseñanza de violencia como la exhibición de obras corruptas ante la humanidad.
  alternative_spanish_readings:
  - El versículo podría entenderse solo como la exhibición de esas obras ante la humanidad.
  - También puede leerse con el matiz de revelar conocimiento ilícito a la humanidad.
  rationale: La cercanía de 'habéis enseñado' y 'habéis mostrado' favorece una acusación de transmisión corrupta, no solo de acto privado. Se conserva el doble movimiento sin resolver del todo si 'mostrar' implica revelar conocimiento o exhibir conductas.
  doctrine_reference: Preservar la tensión textual sin homogeneizarla; mantener la doble posibilidad de enseñanza y revelación/exhibición.
- issue: 'Sentido de la negación: misericordia y súplica no obtenidas'
  english_pob_reading: No mercy or petition will be granted to you.
  chosen_spanish_reading: No se les concederá misericordia ni súplica.
  alternative_spanish_readings:
  - No habrá misericordia ni súplica para ustedes.
  - No se les otorgará misericordia ni ruego.
  rationale: La formulación española debe expresar denegación de acceso o eficacia, no solo ausencia abstracta. 'Conceder' reproduce bien la dimensión forense y de respuesta negada.
  doctrine_reference: Conservar el tono judicial de la intercesión rechazada y no suavizar la sentencia.
translation_notes:
  revision_awareness: 'La fuente auditada incluye una corrección importante: la primera expresión no debe entenderse como ''petición/súplica'' solamente, sino como ''misericordia'' (o clemencia). La versión española refleja esa revisión y conserva la duplicación formal del verso con un segundo término intercesorio.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' únicamente cuando el texto lo exija; aquí no aparece el nombre divino.
  - '''Humanidad'' se emplea para un destinatario colectivo inclusivo.'
  - Se mantiene un registro bíblico sobrio sin recurrir a fórmulas eclesiásticas arcaizantes innecesarias.
  - Se conserva la duplicación semántica del versículo con 'misericordia ni súplica' para reflejar el énfasis retórico.
