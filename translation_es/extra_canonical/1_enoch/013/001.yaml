translation:
  language: es
  text: 'Y Enoc fue y dijo a Azazel: «No tendrás paz; una gran sentencia[a] ha salido contra ti: serás atado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juicio» o «decreto» para «sentencia»; el término ge'ez es jurídico e introduce el castigo que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኃሊፎ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue y se encaminó
  - partió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo marca el movimiento de Enoc antes de hablar. «Fue» conserva la secuencia narrativa de forma natural en español sin añadir matices no presentes en el ge'ez.
- source_word: ይቤሎ
  english_pob_choice: said to
  chosen_spanish: dijo a
  alternatives_spanish:
  - habló a
  - declaró a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un verbo de habla directo y neutro. «Dijo a» mantiene la dirección de la alocución sin cargarla de solemnidad adicional.
- source_word: አዛዝኤል
  english_pob_choice: Azazel
  chosen_spanish: Azazel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Nombre propio/sobrenatural transliterado conforme a la política del proyecto.
- source_word: ኢይከውከ ሰላም
  english_pob_choice: you shall have no peace
  chosen_spanish: No tendrás paz
  alternatives_spanish:
  - no habrá paz para ti
  - la paz no será tuya
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase niega bienestar o prosperidad favorable. «No tendrás paz» conserva el tono solemne de oráculo de juicio y su fuerza apocalíptica en español natural.
- source_word: ዓቢይ
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - severo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo intensifica el sustantivo de juicio. «Gran» es la forma idiomática más directa antes de un sustantivo en español y conserva la amplitud del calificativo sin especificarla más de lo que el texto permite.
- source_word: ኵነኔ
  english_pob_choice: sentence
  chosen_spanish: sentencia
  alternatives_spanish:
  - juicio
  - decreto
  - condena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es una proclamación jurídica contra Azazel. «Sentencia» refleja mejor una decisión formal con consecuencia punitiva; en español también preserva la tensión entre veredicto y castigo.
- source_word: ወጽአ ላዕሌከ
  english_pob_choice: has gone out against you
  chosen_spanish: ha salido contra ti
  alternatives_spanish:
  - ha salido sobre ti
  - ha salido en tu contra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro idiomático comunica que el decreto ya fue emitido y se dirige a Azazel. «Ha salido contra ti» reproduce la imagen de una resolución que avanza desde la esfera judicial hacia el destinatario.
- source_word: ይእስርከ
  english_pob_choice: you will be bound
  chosen_spanish: serás atado
  alternatives_spanish:
  - te atarán
  - serás encadenado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica atadura o encarcelamiento punitivo. «Serás atado» sigue de cerca la forma pasiva del ge'ez y conserva la imagen de castigo sin añadir el detalle de cadenas que el texto no explicita.
theological_decisions:
- issue: Fórmula de paz en un oráculo de juicio
  english_pob_reading: Rendered as 'You shall have no peace'
  chosen_spanish_reading: «No tendrás paz»
  alternative_spanish_readings:
  - «No habrá paz para ti»
  - «La paz no será tuya»
  rationale: No se trata de una despedida cordial, sino de una negación judicial de bienestar para un ser condenado. La fórmula en español mantiene el tono profético-apocalíptico sin suavizarlo ni convertirlo en prosa genérica.
  doctrine_reference: Conservar el lenguaje de juicio apocalíptico y no neutralizarlo.
- issue: Matiz jurídico de ኵነኔ
  english_pob_reading: Rendered as 'sentence'
  chosen_spanish_reading: «sentencia»
  alternative_spanish_readings:
  - «juicio»
  - «decreto»
  - «condena»
  rationale: El texto no solo anuncia evaluación, sino una resolución formal que conduce a la atadura posterior. «Sentencia» transmite mejor la decisión judicial con consecuencia penal; «juicio» queda como alternativa más amplia, pero menos precisa.
  doctrine_reference: Equivalencia óptima con preservación de la tensión legal del término.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó la cláusula final de un infinitivo («to bind you») a una forma pasiva finita («you will be bound»). En español se reflejó directamente con «serás atado», evitando una construcción finalista y preservando el matiz punitivo del ge'ez.
  spanish_consistency_notes:
  - Se mantuvo «Azazel» como transliteración del nombre propio.
  - Se eligió «sentencia» por su carga jurídica, alineada con la nota inglesa sobre el valor forense del término.
  - La negación «No tendrás paz» conserva la fórmula solemne de juicio sin importar una fraseología eclesiástica ajena al pasaje.
  - La cláusula final se expresó en pasiva («serás atado») para seguir la revisión inglesa y la estructura del original.
