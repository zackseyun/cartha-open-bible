translation:
  language: es
  text: Entonces fui y les hablé a todos ellos reunidos[a], y todos temieron, y el temor y el temblor se apoderaron de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La redacción acumula lenguaje de temor: primero ''temieron'', y luego ''el temor y el temblor se apoderaron de ellos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እሜሃ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y entonces
  - Luego
  lexicon: Dillmann
  rationale: Marca la secuencia narrativa inmediata sin añadir matices temporales que el ge'ez no exige.
- source_word: ሐዊርየ
  english_pob_choice: I went
  chosen_spanish: fui
  alternatives_spanish:
  - me fui
  - salí
  - anduve
  lexicon: Dillmann
  rationale: El verbo de ir se expresa de forma natural y breve en español con 'fui'.
- source_word: ነገርክዎሙ
  english_pob_choice: I spoke to them
  chosen_spanish: les hablé
  alternatives_spanish:
  - les dije
  - les hablé a
  - les hablé con
  lexicon: Dillmann
  rationale: '''Hablé'' conserva el acto de dirigirse oralmente; el dativo ''les'' expresa el objeto sin forzar la sintaxis.'
- source_word: ለኵሎሙ
  english_pob_choice: to them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a todos los
  lexicon: Dillmann
  rationale: Mantiene el alcance totalizador del plural colectivo en un español fluido.
- source_word: ኅቡረ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - reunidos
  - como un solo grupo
  lexicon: Dillmann
  rationale: Reproduce la idea de colectividad reunida de modo idiomático y claro.
- source_word: ወእሙንቱ ኵሎሙ
  english_pob_choice: and they all
  chosen_spanish: y todos
  alternatives_spanish:
  - y todos ellos
  - y ellos todos
  lexicon: Dillmann
  rationale: Preserva la repetición enfática de totalidad del original sin volverla pesada.
- source_word: ፈርሁ
  english_pob_choice: feared
  chosen_spanish: temieron
  alternatives_spanish:
  - tuvieron miedo
  - temían
  lexicon: Dillmann
  rationale: '''Temieron'' refleja el verbo simple de temor con registro bíblico natural y sin suavizar la reacción.'
- source_word: ፍርሃት
  english_pob_choice: fear
  chosen_spanish: el temor
  alternatives_spanish:
  - el miedo
  - el pavor
  lexicon: Dillmann
  rationale: '''Temor'' mantiene la relación léxica con el verbo anterior y suena digno en español bíblico.'
- source_word: ነሥአሙ
  english_pob_choice: seized them
  chosen_spanish: se apoderaron de ellos
  alternatives_spanish:
  - los invadieron
  - los tomaron
  lexicon: Dillmann
  rationale: Expresa la fuerza externa e incontrolable del sustantivo-emoción, conservando el golpe apocalíptico del texto.
- source_word: ወረዓድ
  english_pob_choice: and trembling
  chosen_spanish: el temblor
  alternatives_spanish:
  - el estremecimiento
  - el temblor y la conmoción
  lexicon: Dillmann
  rationale: '''Temblor'' nombra el movimiento corporal asociado al miedo y conserva la paridad con ''temor''.'
theological_decisions:
- issue: Intensificación de la reacción emocional
  english_pob_reading: 'Rendered as an intensified fear response: ''fear and trembling seized them'''
  chosen_spanish_reading: 'Como una reacción intensificada: ''el temor y el temblor se apoderaron de ellos'''
  alternative_spanish_readings:
  - '''el miedo y el temblor los invadieron'''
  - '''fueron presa del temor y del temblor'''
  - '''temor y temblor los tomaron'''
  rationale: El ge'ez combina un verbo de miedo con la pareja nominal 'temor/temblor'; la traducción conserva ambos elementos y su progresión, sin reducirla a un miedo genérico.
  doctrine_reference: Preservar la imaginería apocalíptica y la repetición enfática del juicio sin suavizarla.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que sustituyó 'became afraid' por 'feared' para reflejar más directamente el verbo del original, manteniendo después la cláusula intensificada con 'fear and trembling seized them'. La versión española imita esa decisión con 'temieron' y 'el temor y el temblor se apoderaron de ellos'.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió 'temor' en lugar de 'miedo' para sostener una relación léxica más estrecha con el verbo 'temieron' y un tono bíblico digno.
  - No se introdujo 'Mesías', 'Cristo' ni vocabulario teológico ajeno al versículo.
