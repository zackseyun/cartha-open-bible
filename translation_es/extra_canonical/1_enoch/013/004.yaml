translation:
  language: es
  text: Y me pidieron que escribiera para ellos una petición memorial[a], para que hubiera perdón para ellos, y que yo la subiera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una oración de recuerdo» o «una petición escrita para memoria». La expresión ge''ez combina las ideas de memoria y súplica.'
    reason: lexical_alternative
  - marker: b
    text: La frase final queda abierta en el texto transmitido y conduce al versículo siguiente, donde se desarrolla la subida o presentación de la petición.
    reason: textual_variant
lexical_decisions:
- source_word: ተስእሉኒ
  english_pob_choice: they asked me
  chosen_spanish: me pidieron
  alternatives_spanish:
  - me rogaron
  - me solicitaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa una petición directa; «me pidieron» es natural en español y conserva el carácter inmediato de la súplica dirigida a Enoc.
- source_word: እጽሐፍ
  english_pob_choice: to write
  chosen_spanish: escribiera
  alternatives_spanish:
  - que escribiera
  - para escribir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Tras la petición, el infinitivo/subjuntivo se vierte de modo natural con un subjuntivo dependiente en español; «escribiera» mantiene la relación subordinada sin sonar mecánico.
- source_word: ተዝካረ ስእለት
  english_pob_choice: petition of remembrance
  chosen_spanish: petición de recuerdo
  alternatives_spanish:
  - petición memorial
  - oración de recuerdo
  - escrito de recuerdo y súplica
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión combina memoria/recuerdo con petición o súplica. «Petición de recuerdo» conserva ambos componentes sin convertirlo en una fórmula litúrgica posterior.
- source_word: ይኩኖሙ ኅድገተ
  english_pob_choice: there might be forgiveness for them
  chosen_spanish: hubiera perdón para ellos
  alternatives_spanish:
  - hubiera perdón de parte de Dios para ellos
  - se les concediera perdón
  - hubiera liberación para ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ኅድገተ» puede implicar perdón, liberación o remisión. En este contexto judicial-apocalíptico, «perdón» comunica bien la intención del ruego sin borrar el matiz de alivio frente al juicio.
- source_word: አዕርግ
  english_pob_choice: I might bring it up
  chosen_spanish: la subiera
  alternatives_spanish:
  - la llevara arriba
  - la hiciera subir
  - la presentara en alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor causativo indica «hacer subir / subir algo» más que simplemente «ascender». En español, «la subiera» conserva el objeto implícito de la petición y el movimiento vertical hacia el ámbito celestial.
theological_decisions:
- issue: Naturaleza de la petición de los Vigilantes
  english_pob_reading: a petition of remembrance
  chosen_spanish_reading: una petición de recuerdo
  alternative_spanish_readings:
  - una oración de recuerdo
  - un escrito de memorial
  - una súplica memorial
  rationale: La frase sugiere un documento escrito para ser presentado ante la esfera celestial, no sólo una oración privada. «Petición de recuerdo» mantiene la tensión entre memorial y súplica sin imponerse como terminología litúrgica posterior.
  doctrine_reference: Conservar el lenguaje de corte celestial y de juicio sin suavizarlo.
- issue: Valor del verbo final
  english_pob_reading: and that I might bring it up
  chosen_spanish_reading: y que yo la subiera
  alternative_spanish_readings:
  - y que yo la llevara arriba
  - y que yo la presentara
  rationale: El cierre es incompleto en el testimonio transmitido y apunta hacia la línea siguiente. La traducción debe mantener esa apertura sin cerrar artificialmente la frase.
  doctrine_reference: Respetar la forma transmitida y su enlace con el verso siguiente.
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del audit trail: el cierre no debe leerse como un intransitivo «ascender», sino como una acción causativa de hacer subir la petición. Por eso elegí una forma española que conserva el objeto implícito («la») y el movimiento vertical sin añadir explicaciones ajenas al texto.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Mantuve un registro neutral y bíblico, sin sustituir la terminología apocalíptica por fórmulas devocionales posteriores.
  - Conservé «perdón» en lugar de una paráfrasis más amplia para no diluir el matiz judicial del pasaje.
  - La nota [b] marca el final abierto, ya que el verso queda incompleto en la transmisión recibida.
