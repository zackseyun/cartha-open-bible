base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/081/003.yaml
  text: And at that time I blessed the Great Lord[a], the King of Glory forever, because he has made all the works of the world; and I praised the Lord for his patience[b], and I blessed him concerning the children of Adam.
  footnotes:
  - marker: a
    text: Or 'for his forbearance' or 'for his long-suffering'; the Ge'ez term can carry the sense of enduring restraint, not mere passive patience.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'children of Adam' is a literal anthropological expression for human beings, preserving the text's linkage to Adam rather than using the smoother 'humanity.'
    reason: cultural_note
