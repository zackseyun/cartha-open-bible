translation:
  language: es
  text: Y en aquel tiempo bendije al Gran Señor, al Rey de Gloria por siempre, porque hizo todas las obras del mundo; y alabé al Señor por su paciencia[a], y lo bendije con respecto a los hijos de Adán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por su longanimidad» o «por su tolerancia paciente»; el término ge''ez puede implicar una resistencia contenida y duradera, no mera paciencia pasiva.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «los hijos de Adán»: expresión antropológica que preserva el vínculo con Adán en vez de suavizarse como «humanidad».'
    reason: cultural_note
lexical_decisions:
- source_word: እምሶቤሃ
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal introduce la respuesta de Enoc con registro narrativo solemne; 'en aquel tiempo' conserva ese tono mejor que un simple 'entonces'.
- source_word: ባረክዎ
  english_pob_choice: I blessed
  chosen_spanish: bendije
  alternatives_spanish:
  - dije bendición a
  - lo bendije
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de bendecir se mantiene como tal en español; aquí la elipsis del objeto se resuelve con el contexto inmediato, sin perder la acción de bendición dirigida a Dios.
- source_word: እግዚአ ዐቢይ
  english_pob_choice: the Great Lord
  chosen_spanish: el Gran Señor
  alternatives_spanish:
  - el gran Señor
  - el Señor grande
  - el Señor poderoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título divino con mayúscula y adjetivo directo. 'Gran' suena más natural en español bíblico actual que 'grande' antepuesto, y evita sobreinterpretar como 'poderoso'.
- source_word: ንጉሠ ስብሐት
  english_pob_choice: the King of Glory
  chosen_spanish: el Rey de Gloria
  alternatives_spanish:
  - el rey de gloria
  - el Rey glorioso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción se reproduce como título honorífico. 'Gloria' se capitaliza para preservar el carácter doxológico y evitar una simple descripción adjetival.
- source_word: ለዓለም
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por la era
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'por siempre' comunica bien la duración eterna en un contexto doxológico sin sonar demasiado literal o arcaizante.
- source_word: በከመ ገብረ ኵሎ ግብረ ዓለም
  english_pob_choice: because he has made all the works of the world
  chosen_spanish: porque hizo todas las obras del mundo
  alternatives_spanish:
  - porque hizo todas las obras del mundo creado
  - porque hizo toda la obra del mundo
  - porque hizo todas las obras de la creación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el paralelismo 'obras / mundo' sin diluirlo en una abstracción como 'todo'. El aoristo español hace natural la referencia a la acción ya cumplida, equivalente al perfecto del inglés POB en este contexto.
- source_word: ሰባሕኩ
  english_pob_choice: I praised
  chosen_spanish: alabé
  alternatives_spanish:
  - glorifiqué
  - dí alabanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se distingue de 'bendije' para reflejar el par verbal del texto. 'Alabé' es la opción más natural y fiel para el segundo verbo de adoración.
- source_word: ትዕግሥቱ
  english_pob_choice: his patience
  chosen_spanish: su paciencia
  alternatives_spanish:
  - su longanimidad
  - su longánime paciencia
  - su forbearancia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Paciencia'' funciona en español moderno y mantiene la idea de la disposición divina a soportar y esperar. Se preserva en nota la alternativa más fuerte de longanimidad/forbearancia.'
- source_word: ዲበ ውሉደ አዳም
  english_pob_choice: concerning the children of Adam
  chosen_spanish: con respecto a los hijos de Adán
  alternatives_spanish:
  - acerca de los hijos de Adán
  - en relación con los hijos de Adán
  - respecto de los hijos de Adán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición se vierte de modo relacional, no causal, siguiendo la revisión inglesa que evitó imponer una lectura de beneficio o causa. 'Hijos de Adán' conserva la expresión antropológica concreta y su resonancia adámica.
theological_decisions:
- issue: 'Título divino con majestad: ''Great Lord / King of Glory'''
  english_pob_reading: the Great Lord, the King of Glory forever
  chosen_spanish_reading: el Gran Señor, el Rey de Gloria por siempre
  alternative_spanish_readings:
  - el gran Señor, el rey de gloria por siempre
  - el Señor grande, el Rey glorioso por siempre
  rationale: Se preservan ambos títulos como fórmulas distintas y elevadas, sin fusionarlos ni suavizarlos. La mayúscula mantiene el carácter divino, y 'por siempre' expresa la duración doxológica del texto.
  doctrine_reference: Respeto del lenguaje de adoración del texto fuente; no armonizar títulos distintos.
- issue: La expresión antropológica 'children of Adam'
  english_pob_reading: the children of Adam
  chosen_spanish_reading: los hijos de Adán
  alternative_spanish_readings:
  - la humanidad
  - los hijos de los hombres
  - la descendencia de Adán
  rationale: Se conserva la referencia adámica concreta en vez de abstraerla en 'humanidad'. Esto preserva la genealogía teológica y la tonalidad bíblica del original.
  doctrine_reference: Traducir el rasgo local del pasaje antes que nivelarlo a una categoría general.
- issue: Nuance de la paciencia/forbearance divina
  english_pob_reading: for his patience
  chosen_spanish_reading: por su paciencia
  alternative_spanish_readings:
  - por su longanimidad
  - por su forbearancia
  - por su long-suffering
  rationale: '''Paciencia'' es idiomática y fiel; sin embargo, la nota mantiene abierta la intensidad semántica de resistencia/forbearance indicada por el audit trail inglés y la fuente ge''ez.'
  doctrine_reference: Conservar la tensión lexical sin borrar la amplitud semántica del término.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés al mantener la relación directa expresada por la preposición en la cláusula final ('con respecto a'), evitando una lectura causal más fuerte. También conserva la distinción entre 'bendije' y 'alabé' para reflejar el par verbal del ge'ez. Se atendió además a la nota léxica sobre 'forbearance/long-suffering' mediante una nota española que no borra la alternativa semántica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton cuando aparezca explícitamente; aquí el texto fuente presenta 'Señor' como título divino en la cadena del original ge'ez, así que se mantuvo 'Señor' sin introducir 'Yahvé'.
  - Se mantuvo 'hijos de Adán' para preservar la referencia adámica y la forma antropológica concreta.
  - Se distinguieron 'bendije' y 'alabé' para no colapsar dos verbos diferentes del original en un solo término español.
