translation:
  language: es
  text: 'Y de esto dije: Bienaventurado el hombre justo y bueno que muere[a], sobre quien no se ha escrito ningún libro de maldad[b], y para quien no se hallará día de juicio[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez dice «que muere», no «que no muere».
    reason: textual_variant
  - marker: b
    text: Lit. «ningún libro de maldad»; el lenguaje conserva la imagen apocalíptica de un libro o registro celestial de culpa.
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse «día de condenación», según el matiz de ኵነኔ en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምኔሁ
  english_pob_choice: from it
  chosen_spanish: de esto
  alternatives_spanish:
  - de ello
  - a partir de ello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pronominal se refiere a lo recién revelado. «De esto» conserva el enlace anafórico sin fijar de más el antecedente.
- source_word: ብፁዕ
  english_pob_choice: blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - bendito
  - feliz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un contexto sapiencial/apocalíptico, «bienaventurado» mantiene el tono elevado de la bienaventuranza mejor que «feliz».
- source_word: ብእሲ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular genérico se expresa de manera natural con «el hombre» en una fórmula sentenciosa y solemne.
- source_word: ጻድቅ
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí «justo» funciona bien en español para la cualidad moral y covenantal del término; no se pierde la fuerza ética del original.
- source_word: ኄር
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - benigno
  - bondadoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Bueno» es la equivalencia más amplia y directa; evita estrechar el sentido hacia solo amabilidad o mansedumbre.
- source_word: ዘይመውት
  english_pob_choice: who dies
  chosen_spanish: que muere
  alternatives_spanish:
  - que fallece
  - que está muriendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige la negación: el ge''ez expresa «que muere», no «que no muere». Mantengo el valor afirmativo sin añadir explicación interpretativa en el texto principal.'
- source_word: ኵሉ መጽሐፈ ዐመፃ
  english_pob_choice: no book of wrongdoing
  chosen_spanish: ningún libro de maldad
  alternatives_spanish:
  - ningún registro de maldad
  - ningún libro de wrongdoing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen apocalíptica del «libro» celestial. «Maldad» es una opción natural en español para ዐመፃ, aunque el término también puede abarcar injusticia o culpa.
- source_word: ኢተጽሕፈ ዲቤሁ
  english_pob_choice: has been written upon him
  chosen_spanish: ha sido escrito sobre quien
  alternatives_spanish:
  - ha sido escrito contra quien
  - ha sido inscrito sobre él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre quien» conserva el valor preposicional de «upon him» y sugiere el registro forense sin forzar una paráfrasis.
- source_word: ኢይትረከብ ዕለተ ኵነኔ
  english_pob_choice: no day of judgment will be found
  chosen_spanish: no se hallará día de juicio
  alternatives_spanish:
  - no se hallará día de condenación
  - no se encontrará día de juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Juicio» es el equivalente apocalíptico más amplio para ኵነኔ. «Se hallará» reproduce el pasivo/imperfecto con naturalidad en español.
theological_decisions:
- issue: Sentido de ዘይመውት en la bienaventuranza
  english_pob_reading: The audited English had to be corrected because the Ge'ez means 'who dies,' not 'who does not die.'
  chosen_spanish_reading: Mantener «que muere» en el texto principal, sin suavizarlo a inmortalidad o exención de muerte.
  alternative_spanish_readings:
  - que no muere
  - que no perece
  - que muere bajo juicio
  rationale: La revisión textual obliga a conservar la afirmación de muerte. El verso pronuncia bienaventuranza sobre el justo y bueno que muere, no sobre uno que evita morir.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Imagen del libro celestial
  english_pob_reading: Keep 'book' in the main text rather than replacing it with 'record.'
  chosen_spanish_reading: Conservar «libro» en lugar de convertirlo en «registro».
  alternative_spanish_readings:
  - registro
  - asiento
  - acta
  rationale: La imaginería de libros celestiales es parte del trasfondo apocalíptico y no debe diluirse en una metáfora administrativa abstracta.
  doctrine_reference: Original-language primacy over translation tradition; do not flatten apocalyptic imagery.
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada más reciente, que corrigió una duplicación de inicio y, sobre todo, la lectura de ዘይመውት: el verso debe decir que el hombre justo y bueno muere, no que no muere. También se preservó la imaginería del libro celestial y la clausula final sobre el día de juicio.'
  spanish_consistency_notes:
  - Se prefirió «bienaventurado» por coherencia con el registro bíblico/apocalíptico.
  - Se evitó «SEÑOR» o terminología litúrgica ajena porque el verso no contiene el nombre divino.
  - «Juicio» se mantiene como término amplio; no se cerró la ambigüedad a «condenación» en el texto principal.
  - La puntuación sigue el español moderno y la frase inicial conserva la relación inferencial con el material revelado.
