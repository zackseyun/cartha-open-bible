translation:
  language: es
  text: Por un año te dejaremos con tu hijo, hasta un nuevo mandato[a], para que…
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez auditado usa un verbo en primera persona plural («te dejaremos»). La cláusula final está truncada en el testimonio conservado; por eso se mantiene «hasta un nuevo mandato, para que…» sin completar la continuación incierta.
    reason: textual_variant
lexical_decisions:
- source_word: ዓመተ፡ አሐደ፡
  english_pob_choice: for one year
  chosen_spanish: por un año
  alternatives_spanish:
  - durante un año
  - un año
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión temporal es directa; en español, «por un año» reproduce con naturalidad la duración del período sin añadir matices no presentes en el ge'ez.
- source_word: ነኅድገከ፡
  english_pob_choice: we will leave you
  chosen_spanish: te dejaremos
  alternatives_spanish:
  - te dejaremos permanecer
  - te permitiremos quedarte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail corrige la gramática a primera persona plural. «Te dejaremos» conserva la fuerza simple de «leave» y refleja que son varios los que hablan.
- source_word: በኀበ፡ ወልድከ፡
  english_pob_choice: with your son
  chosen_spanish: con tu hijo
  alternatives_spanish:
  - junto a tu hijo
  - en compañía de tu hijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Con tu hijo» es la equivalencia más natural y fiel para la relación de acompañamiento o asociación indicada por la preposición.
- source_word: እስከ፡ ካዕበ፡ ትእዛዝ፡
  english_pob_choice: until a further command
  chosen_spanish: hasta una orden adicional
  alternatives_spanish:
  - hasta un nuevo mandato
  - hasta que llegue otra orden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto no permite precisar más allá de una nueva orden o mandato; «orden adicional» mantiene la idea de una instrucción posterior sin forzar el verbo implícito.
- source_word: ትእዛዝ፡
  english_pob_choice: the command
  chosen_spanish: orden
  alternatives_spanish:
  - mandato
  - comando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un contexto apocalíptico, la palabra expresa autoridad. «Orden» es claro en español moderno y no desplaza innecesariamente el sentido hacia lenguaje eclesiástico posterior.
theological_decisions:
- issue: Forma verbal plural del hablante
  english_pob_reading: we will leave you
  chosen_spanish_reading: te dejaremos
  alternative_spanish_readings:
  - te dejaré
  - te dejamos
  rationale: La revisión auditada indica que el sujeto es plural; por eso el español debe reflejar pluralidad, evitando una primera persona singular no sustentada por el ge'ez.
  doctrine_reference: Fidelidad gramatical al sujeto plural del enunciado apocalíptico.
- issue: Cláusula final truncada
  english_pob_reading: until a further command, so that...
  chosen_spanish_reading: hasta una orden adicional, para que…
  alternative_spanish_readings:
  - hasta una nueva orden, de modo que…
  - hasta que haya una nueva orden, para que…
  rationale: El testigo está truncado y no autoriza completar el verbo final. Mantener la elipsis en español respeta la incertidumbre textual y evita inventar una conclusión.
  doctrine_reference: Respeto por variantes textuales y por la limitación del testimonio recuperado.
translation_notes:
  revision_awareness: 'El borrador toma en cuenta la corrección principal del audit trail: el verbo es de primera persona plural («te dejaremos»), y la cláusula final no debe cerrarse con un verbo inventado. También evita el cambio a una forma singular o a una paráfrasis que resuelva artificialmente la elipsis.'
  spanish_consistency_notes:
  - Se mantiene el tutear singular («te», «tu») porque el destinatario sigue siendo uno solo, aunque el hablante sea plural.
  - Se eligió «orden» en vez de «mandato» para un español más natural, sin perder la fuerza autoritativa del término.
  - La elipsis final se conserva con puntos suspensivos para señalar que el texto fuente está incompleto.
