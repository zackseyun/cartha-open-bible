translation:
  language: es
  text: 'Y me dijo: «Mira, Enoc, las tablas del cielo[a], y lee lo que está escrito en ellas, y entiende cada cosa, una por una[b][c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «tablas del cielo» evoca en la tradición apocalíptica registros escritos celestiales, no solo una metáfora del conocimiento abstracto.
    reason: cultural_note
  - marker: b
    text: 'O, más literalmente: «entiende todas las cosas, una por una».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «cada cosa individualmente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ነጽር
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira bien
  - observa
  - contempla
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo pide atención visual directa. «Mira» es natural en español y conserva el valor de mandato sin volver el estilo arcaico.
- source_word: ዘፀፍፀፈ ሰማይ
  english_pob_choice: the tablets of heaven
  chosen_spanish: las tablas del cielo
  alternatives_spanish:
  - las tablas celestiales
  - las tablas del cielo estrellado
  - las tablas del cielo [registros]
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta de «tablas» y el complemento «del cielo», que refleja el imaginario apocalíptico de registros celestes. «Tablas» evita una paráfrasis demasiado interpretativa como «registros».
- source_word: አንብብ
  english_pob_choice: read
  chosen_spanish: lee
  alternatives_spanish:
  - lee en voz alta
  - lee
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El mandato es simplemente leer; «lee» reproduce con claridad la acción sin añadir oralidad que el texto no exige.
- source_word: ዘጽሑፍ ዲቤሆሙ
  english_pob_choice: what is written on them
  chosen_spanish: lo que está escrito en ellas
  alternatives_spanish:
  - lo escrito en ellas
  - aquello que está escrito en ellas
  - lo que ha sido escrito sobre ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lo que está escrito en ellas» es una forma española natural y fiel al referente de las tablas. Mantiene el sentido pasivo sin sobrecargar la frase.
- source_word: እእምር
  english_pob_choice: understand
  chosen_spanish: entiende
  alternatives_spanish:
  - comprende
  - entiende
  - discierne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa captación mental del contenido, no solo lectura. «Entiende» conserva ese impulso cognitivo de manera idiomática.
- source_word: ኵሎ አሐደ አሐደ
  english_pob_choice: everything, one by one
  chosen_spanish: todo, uno por uno
  alternatives_spanish:
  - todo, individualmente
  - todo, uno tras otro
  - cada cosa, una por una
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición distributiva se refleja con «uno por uno», que mantiene el matiz de itemización. «Todo» recoge la amplitud del mandato sin perder la distribución.
theological_decisions:
- issue: Imagen apocalíptica de registro celeste
  english_pob_reading: the tablets of heaven
  chosen_spanish_reading: las tablas del cielo
  alternative_spanish_readings:
  - las tablas celestiales
  - los registros del cielo
  - los libros del cielo
  rationale: Se preserva la concreción de la imagen apocalíptica en vez de sustituirla por un equivalente más abstracto. «Tablas» mantiene la materialidad del símbolo y evita suavizar la escena.
  doctrine_reference: 'Translation philosophy: preservar la imaginería apocalíptica y su fuerza visual, no normalizarla hacia prosa abstracta.'
translation_notes:
  revision_awareness: Se siguió el último estado revisado del audit trail en inglés, que favorece la formulación «everything, one by one» y «on them». La versión española refleja esa naturalidad sin perder el valor distributivo del final ni la imagen concreta de las tablas celestes.
  spanish_consistency_notes:
  - Se mantuvo «Mira» como imperativo breve y directo, acorde con el registro del pasaje.
  - Se eligió «tablas» para conservar la imagen material apocalíptica; no se sustituyó por «libros» o «registros».
  - 'Se conservó la secuencia verbal imperativa: mirar, leer, entender.'
  - «Uno por uno» expresa la distribución final sin volverla excesivamente coloquial o arcaica.
