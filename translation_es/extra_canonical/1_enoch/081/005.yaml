translation:
  language: es
  text: 'Y aquellos siete seres santos me acercaron y me pusieron sobre la tierra, delante de la puerta de mi casa[a], y me dijeron: «Haz saber todo a Matusalén, tu hijo, y muestra a todos tus hijos que ninguna carne es justa ante Yahvé[b], porque él es quien los creó».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante la entrada de mi casa». El término ge’ez puede referirse a una puerta o al área de acceso.
    reason: lexical_alternative
  - marker: b
    text: «Carne» conserva el modismo concreto del original, con el sentido de toda criatura mortal o la humanidad en su condición encarnada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ፯ ቅዱሳን
  english_pob_choice: seven holy ones
  chosen_spanish: siete santos
  alternatives_spanish:
  - siete seres santos
  - siete santos celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Santos» conserva el término apocalíptico básico del original y del audit trail inglés. En español suena más natural que una perífrasis, y no introduce un matiz eclesiástico indebido cuando el contexto es celestial.
- source_word: አቅረቡኒ
  english_pob_choice: brought me near
  chosen_spanish: me acercaron
  alternatives_spanish:
  - me trajeron cerca
  - me llevaron cerca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa causación de cercanía; «me acercaron» reproduce bien esa direccionalidad en español sin perder naturalidad.
- source_word: አንበሩኒ
  english_pob_choice: set me on the earth
  chosen_spanish: me pusieron sobre la tierra
  alternatives_spanish:
  - me colocaron en la tierra
  - me asentaron sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pusieron sobre la tierra» sigue de cerca el sentido de colocar o asentar, y evita una literalidad torpe. Mantiene la escena de retorno al ámbito terrenal.
- source_word: በቅድመ ኆኅተ ቤትየ
  english_pob_choice: before the door of my house
  chosen_spanish: delante de la puerta de mi casa
  alternatives_spanish:
  - ante la entrada de mi casa
  - frente a la puerta de mi casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Delante de la puerta» conserva la concreción espacial del ge’ez. Se elige «puerta» como equivalente directo, sin ampliar a «entrada» salvo nota opcional.
- source_word: አይድዕ ኵሎ
  english_pob_choice: Make everything known
  chosen_spanish: Haz saber todo
  alternatives_spanish:
  - Da a conocer todo
  - Haz conocido todo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma causativa pide una orden de comunicación, no solo de conocimiento. «Haz saber todo» es idiomática en español y conserva la fuerza del mandato.
- source_word: አርኢ ለኵሎሙ ውሉድከ
  english_pob_choice: show all your children
  chosen_spanish: muestra a todos tus hijos
  alternatives_spanish:
  - muéstralo a todos tus hijos
  - revela esto a todos tus hijos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Muestra» reproduce el verbo de ver/hacer ver. Se mantiene «hijos» porque aquí el plural filial puede leerse de forma directa en español y sigue el registro del texto fuente.
- source_word: ከመ ኢ ይጸድቅ ኵሉ ዘሥጋ
  english_pob_choice: that no flesh is righteous
  chosen_spanish: que ninguna carne es justa
  alternatives_spanish:
  - que toda carne no es justa
  - que ningún ser de carne es justo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva «carne» por la fuerza concreta del idiomático semita. «Justa» traduce el campo de δικαιοσύνη en sentido ético-forense sin borrar la tensión apocalíptica del original.
- source_word: ዘሥጋ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - humanidad
  - ser mortal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La conservación de «carne» evita suavizar la antropología concreta del texto y coincide con la decisión auditada del inglés.
- source_word: በቅድመ እግዚአ
  english_pob_choice: before the Lord
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - en presencia de Yahvé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se usa «Yahvé» conforme al estándar del proyecto para יהוה. «Ante» reproduce la relación de comparecencia judicial/personal del original mejor que una simple ubicación.
- source_word: ፈጠሮሙ
  english_pob_choice: for he is the one who created them
  chosen_spanish: porque él es quien los creó
  alternatives_spanish:
  - porque él los creó
  - pues él es el que los hizo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Es quien los creó» conserva el énfasis del pronombre copulativo del original y del inglés auditado, sin reducirlo a un simple pasado.
theological_decisions:
- issue: Declaración universal sobre la incapacidad de la carne para ser justa ante Dios
  english_pob_reading: A universal statement of creaturely inability to stand as righteous before God
  chosen_spanish_reading: Una afirmación universal de que ninguna carne puede presentarse como justa ante Yahvé
  alternative_spanish_readings:
  - una afirmación sobre impureza ritual o mortalidad
  - una formulación forense de justificación en sentido paulino
  rationale: El ge’ez dice literalmente que «ninguna carne es justa» ante Dios. En español se preserva esa tensión sin convertirla en una doctrina posterior más desarrollada ni en una simple nota de impureza ritual.
  doctrine_reference: Preservar la tensión textual y el carácter apocalíptico-creatural del pasaje; no importar fórmulas paulinas posteriores.
translation_notes:
  revision_awareness: El auditable inglés POB revisó «set me down on the earth» a «set me on the earth» por naturalidad. La versión española sigue esa decisión con «me pusieron sobre la tierra», manteniendo el sentido de colocación sin añadir un descenso explícito. También conserva la redacción universal sobre «carne» y la comparación directa con «ante Yahvé» conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» en lugar de «Señor» para reflejar el nombre divino según la política del proyecto.
  - Se conservó «carne» para mantener el idiomatismo semita y la tensión antropológica del pasaje.
  - Se eligió un registro formal y publicable, con verbos de mandato en imperativo directo («Haz saber», «muestra»).
  - «Santos» se mantuvo como término apocalíptico para seres celestiales, no como denominación eclesiástica.
