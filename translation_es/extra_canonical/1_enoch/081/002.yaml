translation:
  language: es
  text: Y miré las tablas del cielo, y leí todo lo que estaba escrito, y lo comprendí todo; y leí el libro[a] de todos los hechos de la humanidad y de todos los hijos de carne[b], sobre la tierra[d], para las generaciones de la eternidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el libro acerca de todos los hechos de la humanidad». La construcción ge''ez también puede entenderse como una descripción genitiva del contenido del libro.'
    reason: lexical_alternative
  - marker: b
    text: «Hijos de carne» es una expresión literal de tipo semítico para seres humanos en su condición mortal y terrenal.
    reason: cultural_note
  - marker: c
    text: 'O: «para las generaciones eternas» / «hasta generaciones perpetuas». La frase final es idiomática y expansiva, no solo cronológica.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «que están sobre la tierra». El ge''ez permite una relativa sin verbo explícito; por eso también puede entenderse de manera más directa como una frase nominal.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወነጸርኩ
  english_pob_choice: I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - y observé
  - y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa una acción de ver/observar en contexto visionario. «Miré» es natural en español y conserva el tono de relato apocalíptico sin añadir solemnidad innecesaria.
- source_word: በፀፍፀፈ ሰማይ
  english_pob_choice: at the tablets of heaven
  chosen_spanish: las tablas del cielo
  alternatives_spanish:
  - las tablas celestiales
  - las tablas de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta de «tablas» en vez de suavizarla como «registro» o «libro». «Del cielo» comunica bien la procedencia/ámbito celestial del objeto en español.
- source_word: ወአንበብኩ ኵሎ ዘጽሑፍ
  english_pob_choice: I read all that was written
  chosen_spanish: leí todo lo que estaba escrito
  alternatives_spanish:
  - leí todo lo escrito
  - leí todo lo que se había escrito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción totalizante de «todo» y el pasivo de «lo que estaba escrito» se mantienen con claridad. «Lo que estaba escrito» suena fluido y respeta el estado resultante del texto.
- source_word: ወአእመርኩ ኵሎ
  english_pob_choice: I understood it all
  chosen_spanish: lo comprendí todo
  alternatives_spanish:
  - lo entendí todo
  - lo conocí todo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica comprensión/conocimiento logrado, no solo lectura. «Comprendí» conserva mejor el matiz cognitivo que «entendí» en español formal.
- source_word: ወአንበብክዋ ለመጽሐፈ
  english_pob_choice: I read the book
  chosen_spanish: leí el libro
  alternatives_spanish:
  - leí el libro completo
  - lo leí, el libro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se traduce de forma directa y natural la repetición del acto de leer. «Leí el libro» conserva el objeto explícito sin introducir artificios sintácticos.
- source_word: ኵሉ ምግባሮሙ ለሰብእ
  english_pob_choice: of all the deeds of humankind
  chosen_spanish: de todas las obras de la humanidad
  alternatives_spanish:
  - de todos los hechos de la humanidad
  - de todas las acciones de la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Mígbar» puede abarcar obras/hechos/acciones. «Obras» funciona bien en español bíblico y mantiene el alcance universal de «la humanidad» sin restricción masculina.
- source_word: ውሉደ ሥጋ
  english_pob_choice: children of flesh
  chosen_spanish: los hijos de carne
  alternatives_spanish:
  - los hijos de la carne
  - los hijos carnales
  - los hijos de la carne mortal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la expresión semítica literal y su fuerza antropológica/apocalíptica. «Carne» mantiene la textura de la fuente; se evita sustituirla por «mortales» para no borrar la imagen.
- source_word: ዘዲበ ምድር
  english_pob_choice: who will be upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - que están sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase ge'ez es una cláusula relativa sin verbo explícito; por eso se vierte de modo nominal como «sobre la tierra», sin imponer un tiempo verbal que el original no marca.
- source_word: እስከ ትውልደ ዓለም
  english_pob_choice: to the generations of eternity
  chosen_spanish: para las generaciones de la eternidad
  alternatives_spanish:
  - hasta las generaciones de la eternidad
  - para las generaciones para siempre
  - hasta las generaciones eternas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el giro elevado y expansivo del final. «Para» reproduce bien la orientación temporal/global del sintagma sin reducirlo a un simple «para siempre».
theological_decisions:
- issue: Expresión antropológica y apocalíptica de «hijos de carne»
  english_pob_reading: children of flesh
  chosen_spanish_reading: los hijos de carne
  alternative_spanish_readings:
  - mortales
  - seres humanos
  - hijos carnales
  rationale: Se mantiene la literalidad semítica para conservar la oposición implícita entre el ámbito celestial del libro y la condición terrenal/corporal de los seres humanos. «Mortales» sería más idiomático, pero atenuaría la imaginería del texto.
  doctrine_reference: Preservar la imaginería apocalíptica y la densidad antropológica del texto fuente.
- issue: Alcance del final temporal
  english_pob_reading: to the generations of eternity
  chosen_spanish_reading: para las generaciones de la eternidad
  alternative_spanish_readings:
  - hasta las generaciones eternas
  - para siempre, por generaciones
  rationale: El giro hebraizante/semítico es amplio y no meramente cronológico. «De la eternidad» conserva la solemnidad y evita domesticar la expresión a una fórmula plana.
  doctrine_reference: Respetar el lenguaje escatológico amplio y no reducirlo a una paráfrasis temporal moderna.
translation_notes:
  revision_awareness: La decisión final sigue la revisión de alta concordancia que corrigió la frase final a una construcción sin verbo explícito en ge'ez. Por eso el español evita imponer «serán» o «estarán», y usa «sobre la tierra». También se conserva la nota de ambigüedad de la secuencia final y la literalidad de «hijos de carne», siguiendo el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Mesías» no aplica en este versículo.
  - Se mantiene «carne» por coherencia con la terminología POB cuando la expresión es semítica y antropológica.
  - El tono es bíblico contemporáneo, no arcaizante, pero sin perder solemnidad apocalíptica.
  - Se evita convertir la imagen de las «tablas del cielo» en una abstracción moderna como «registro» o «archivo».
