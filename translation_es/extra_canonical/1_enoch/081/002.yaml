  to: Y miré las tablas del cielo, y leí todo lo que estaba escrito, y lo comprendí todo; y leí el libro[a] de todos los hechos de la humanidad y de todos los hijos de carne[b], sobre la tierra[d], para las generaciones de la eternidad[c].
