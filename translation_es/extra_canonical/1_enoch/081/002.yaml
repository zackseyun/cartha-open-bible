  language: en
  yaml_path: translation/extra_canonical/1_enoch/081/002.yaml
  text: And I looked at the tablets of heaven[a], and I read all that was written, and I understood it all; and I read the book of all the deeds of humankind and of all the children of flesh upon the earth[d][c][b], to the generations of eternity.
  footnotes:
