translation:
  language: es
  text: Y vi cómo los vientos sostienen las alturas del cielo[a], y ellos están entre el cielo y la tierra; estos son los pilares del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo ge'ez detrás de esta frase es difícil; puede entenderse de manera más amplia como 'extienden', 'sostienen' o una acción semejante que afecta a las alturas del cielo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ነፋሳት
  english_pob_choice: the winds
  chosen_spanish: los vientos
  alternatives_spanish:
  - los espíritus
  - los vientos/espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de visión cósmica, el plural se refiere de manera más natural a vientos como fuerzas del cosmos, no a espíritus personales. 'Los vientos' conserva la imagen apocalíptica sin introducir una lectura angelológica no exigida por el ge'ez.
- source_word: ይረብብዋ
  english_pob_choice: support the heights of heaven
  chosen_spanish: sostienen las alturas del cielo
  alternatives_spanish:
  - extienden las alturas del cielo
  - apoyan las alturas del cielo
  - sostienen los pilares del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo es difícil y la tradición inglesa revisada prefirió una idea de sostén aplicada a las alturas del cielo, distinguiéndolas de los pilares nombrados al final. 'Sostienen' mantiene esa decisión sin forzar un matiz excesivamente interpretativo.
- source_word: አዕልና ሰማይ
  english_pob_choice: the heights of heaven
  chosen_spanish: las alturas del cielo
  alternatives_spanish:
  - las alturas del cielo
  - los soportes del cielo
  - las columnas del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase nombra la parte alta o elevada del cielo; en español 'las alturas del cielo' es claro y fiel, y evita confundir esa expresión con los 'pilares' de la cláusula final.
- source_word: ይቀውሙ
  english_pob_choice: they stand
  chosen_spanish: están
  alternatives_spanish:
  - están de pie
  - permanecen
  - se mantienen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'están' comunica de forma natural la localización estática de los pilares en la visión. El inglés usa 'they stand'; la idea es posicional, no narrativa.
- source_word: ማእከለ ሰማይ ወምድር
  english_pob_choice: between heaven and earth
  chosen_spanish: entre el cielo y la tierra
  alternatives_spanish:
  - en medio del cielo y la tierra
  - entre el cielo y la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Entre el cielo y la tierra'' reproduce la espacialidad cosmológica con naturalidad en español y conserva la imagen de mediación o ubicación intermedia.'
- source_word: እሙንቱ ውእቶሙ
  english_pob_choice: these are
  chosen_spanish: estos son
  alternatives_spanish:
  - ellos son
  - aquellos son
  - estos son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción es enfática e identificadora. 'Estos son' captura el valor explicativo y la referencia anafórica al elemento visto por Enoc.
theological_decisions:
- issue: 'Interpretación de ነፋሳት: ¿vientos o espíritus?'
  english_pob_reading: winds
  chosen_spanish_reading: vientos
  alternative_spanish_readings:
  - espíritus
  - vientos/espíritus
  rationale: El pasaje pertenece a un recorrido cosmológico sobre la arquitectura del cielo y la tierra. Traducir 'vientos' preserva la imagen física y evita introducir una especificidad espiritual no exigida por el texto base.
  doctrine_reference: Primacía del sentido local del pasaje y del testimonio del idioma original sobre la armonización doctrinal amplia.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del texto inglés, que corrigió una formulación anterior para distinguir mejor entre 'las alturas del cielo' y los 'pilares del cielo'. La versión española sigue esa distinción y evita fusionar ambas expresiones.
  spanish_consistency_notes:
  - Se mantiene 'cielo' para heaven, no 'firmamento', porque el contexto cosmológico no requiere el término técnico hebraico-griego tradicional.
  - Se evita 'espíritus' para ነፋሳት en ausencia de una señal contextual fuerte, siguiendo la lectura auditada del inglés POB.
  - Se conserva el paralelismo final 'estos son los pilares del cielo' para reflejar la cláusula identificadora del original.
