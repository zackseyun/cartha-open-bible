base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/018/007.yaml
  text: And those toward the east were of colored stone[a], and one was of pearl stone, and one of precious stone[d][c][b]; and those toward the south were of red stone.
  footnotes:
  - marker: a
    text: The Ge'ez list of stones is difficult. 'Pearl stone' may also be understood as mother-of-pearl or a lustrous gem.
    reason: lexical_alternative
  - marker: b
    text: '''Healing stone'' renders a term that literally suggests remedy or healing; it may refer to a specific mineral rather than describing the stone''s effect.'
    reason: lexical_alternative
  - marker: c
    text: The repeated directional phrase likely describes the material composition of different sides or regions in Enoch's vision.
    reason: cultural_note
  - marker: d
    text: Or 'and the eastern tract was of colored stone, and one was of pearl stone, and one of healing stone; and the western tract was of red stone.'.
    reason: previous_rendering
