translation:
  language: es
  text: Y los que estaban hacia el oriente eran de piedra coloreada[a], y uno era de piedra de perla, y uno de piedra preciosa[b]; y los que estaban hacia el sur eran de piedra roja.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lista ge'ez de piedras es difícil; «piedra de perla» también puede entenderse como madreperla o como una gema lustrosa.
    reason: lexical_alternative
  - marker: b
    text: El expediente inglés revisó este término desde «healing stone» a «precious stone»; en español se sigue la lectura revisada, aunque la identificación exacta del vocablo sigue siendo discutida.
    reason: source_note
lexical_decisions:
- source_word: ዘመንገለ
  english_pob_choice: those toward / tract
  chosen_spanish: los de hacia
  alternatives_spanish:
  - los que estaban hacia
  - los del lado de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez señala una designación direccional de los grupos mencionados, no un 'tracto' en sentido abstracto. En español, 'los de hacia' conserva la referencia a los elementos situados en esa dirección sin sobrerrepresentar la imagen espacial.
- source_word: ጽባሕ*ሰ
  english_pob_choice: eastern / toward the east
  chosen_spanish: el oriente
  alternatives_spanish:
  - el este
  - hacia el este
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez es direccional; 'oriente' es un equivalente natural y solemne en español bíblico, y mantiene la relación con el contraste posterior 'sur'.
- source_word: እምእብነ
  english_pob_choice: of stone
  chosen_spanish: piedra
  alternatives_spanish:
  - de piedra
  - hecha de piedra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sintagma marca composición material. En español, 'piedra coloreada', 'piedra de perla' y 'piedra preciosa' son más fluidos que repetir sistemáticamente 'de piedra' en cada elemento.
- source_word: ሕብር
  english_pob_choice: colored
  chosen_spanish: coloreada
  alternatives_spanish:
  - de colores
  - variegada
  - multicolor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la idea de variedad cromática sin intensificarla más allá del ge'ez. 'Coloreada' es transparente y suficientemente sobria para esta lista de materiales.
- source_word: ባሕርይ
  english_pob_choice: pearl stone
  chosen_spanish: piedra de perla
  alternatives_spanish:
  - perla
  - madreperla
  - piedra nacarada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El auditorio textual permite una ambigüedad entre perla y material nacarado. 'Piedra de perla' mantiene la literalidad y el carácter enigmático del inventario de piedras.
- source_word: ፈውስ
  english_pob_choice: healing stone / precious stone
  chosen_spanish: piedra preciosa
  alternatives_spanish:
  - piedra curativa
  - piedra de remedio
  - piedra sanadora
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la revisión más reciente del expediente inglés, que corrigió 'healing stone' a 'precious stone'. En español, 'piedra preciosa' comunica mejor una categoría de gema en una lista mineral, sin borrar que el término ge'ez tuvo una historia interpretativa más incierta.
- source_word: አዜብ
  english_pob_choice: south / southward
  chosen_spanish: el sur
  alternatives_spanish:
  - hacia el sur
  - el mediodía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa establece que el término significa 'south', no 'west'. 'El sur' refleja esa corrección de forma directa y evita mantener el error anterior.
- source_word: ቀይሕ
  english_pob_choice: red
  chosen_spanish: roja
  alternatives_spanish:
  - rojo
  - bermeja
  - rojiza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Como concordancia con 'piedra', 'roja' es la forma natural en español y conserva el valor cromático básico del término.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del expediente inglés, que corrigió አዜብ como 'sur' (no 'west') y ajustó ፈውስ de 'healing stone' a 'precious stone'. También se evitó el calco 'tract' por no representar bien el antecedente direccional de la visión.
  spanish_consistency_notes:
  - Se mantiene 'oriente' y 'sur' como pares direccionales coherentes con el texto fuente y con la revisión auditada.
  - Se conservó el carácter de inventario de piedras/materias, sin intentar identificar mineralógicamente cada término más allá de lo que el expediente permite.
  - '''Piedra preciosa'' se usa como rendición sobria de ፈውስ siguiendo la última revisión; la nota conserva la tensión lexical histórica.'
