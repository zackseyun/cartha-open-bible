translation:
  language: es
  text: Y vi los almacenes[a] de todos los vientos, y vi cómo con ellos adornó[b] toda la creación y los fundamentos de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «tesoros»; la imagen apunta a cámaras celestiales donde se guardan los vientos.
    reason: lexical_alternative
  - marker: b
    text: El verbo también puede sugerir «ordenó» o «estableció», no solo «adornó».
    reason: lexical_alternative
lexical_decisions:
- source_word: መዛግብተ
  english_pob_choice: storehouses
  chosen_spanish: almacenes
  alternatives_spanish:
  - tesoros
  - depósitos
  - cámaras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cosmológico, መዛግብተ designa recintos o cámaras donde se guardan los vientos. «Almacenes» conserva la imagen concreta de lugares de resguardo sin cargar el texto con una connotación monetaria como podría ocurrir con «tesoros».
- source_word: ኵሉ ነፋሳት
  english_pob_choice: all the winds
  chosen_spanish: todos los vientos
  alternatives_spanish:
  - cada viento
  - todos los espíritus
  - todos los aires
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el término se entiende mejor como fenómenos cósmicos y no como seres espirituales. «Todos los vientos» reproduce el sentido del pasaje y mantiene la escena apocalíptica de fuerzas guardadas en depósitos celestiales.
- source_word: ከመ
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - que
  - de qué manera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción introductoria expresa el modo en que Enoc percibió la relación de los vientos con la creación. «Cómo» es natural en español y conserva el valor de observación visionaria.
- source_word: ቦሙ
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - por medio de ellos
  - mediante ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma señala una relación instrumental o asociativa respecto de los vientos. «Con ellos» es la opción más cercana al texto y deja abierta la fuerza instrumental sin explicitarla en exceso.
- source_word: አሰርገወ
  english_pob_choice: adorned
  chosen_spanish: adornó
  alternatives_spanish:
  - ordenó
  - estableció
  - embelleció
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La raíz admite un campo de sentido que incluye adornar y también ordenar o establecer. Se conserva «adornó» como imagen principal, porque el testimonio ge'ez sustenta un verbo vívido; las otras posibilidades quedan como alternativas legítimas del mismo campo semántico.
- source_word: ኵሎ ፍጥረተ
  english_pob_choice: all creation
  chosen_spanish: toda la creación
  alternatives_spanish:
  - toda criatura
  - la creación entera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo colectivo pide un equivalente universal. «Toda la creación» suena natural en español y preserva la amplitud cósmica del verso.
- source_word: መሰረታቲሃ ለምድር
  english_pob_choice: the foundations of the earth
  chosen_spanish: los fundamentos de la tierra
  alternatives_spanish:
  - las bases de la tierra
  - los cimientos de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es una fórmula cosmológica estable. «Fundamentos» mantiene el tono bíblico y la imagen arquitectónica del texto sin modernizarla en exceso.
theological_decisions:
- issue: 'Sentido de ነፋሳት: ¿vientos o espíritus?'
  english_pob_reading: winds
  chosen_spanish_reading: vientos
  alternative_spanish_readings:
  - espíritus
  - alientos
  rationale: El contexto inmediato es una visión de la estructura del cosmos y de sus elementos. Traducirlo como «vientos» evita introducir una lectura angelológica o pneumatológica que el pasaje no exige.
  doctrine_reference: Mantener el sentido local del pasaje antes de armonizar con otros usos de la palabra en la obra.
- issue: 'Valor de አሰርገወ: ¿adornar o establecer/ordenar?'
  english_pob_reading: adorned
  chosen_spanish_reading: adornó
  alternative_spanish_readings:
  - ordenó
  - estableció
  - embelleció
  rationale: El testimonio base favorece el matiz de adorno o embellecimiento, aunque el contexto cósmico permite una implicación de ordenamiento. Se conserva el verbo imagístico y no se sustituye por una formulación más plana; la tensión semántica queda abierta.
  doctrine_reference: Preservar la imaginería apocalíptica y no neutralizar un término ambiguo cuando el contexto admite más de un matiz.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el testimonio ge''ez recuperado y el criterio auditado de la POB en inglés. No se introdujeron cambios respecto del último pase revisado, y se conservaron las dos ambigüedades documentadas: el nombre del recinto como almacén/tesoro y el valor verbal de አሰርገወ como adorno con posible matiz de ordenamiento.'
  spanish_consistency_notes:
  - Se usa «Y vi» para reproducir el reportativo visionario.
  - «Vientos» se mantiene en minúscula por referirse al elemento cósmico, no al Espíritu Santo.
  - «Tierra» se deja sin mayúscula por la misma razón cosmológica.
  - Se evita «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - La sintaxis conserva el paralelismo de dos observaciones visionarias unidas por «y vi».
