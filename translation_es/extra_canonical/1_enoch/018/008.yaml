  glossary_alignment: 'Hay una desviación menor del default del proyecto: el texto usa ''Señor'' en vez de ''Yahvé''. Dado que el audit trail inglés documenta explícitamente ''the Lord'' para እግዚአብሔር en este contexto, la excepción es defendible y no requiere cambio. ''Piedra de cristal'' y ''piedra de zafiro'' concuerdan con las decisiones léxicas auditadas.'
