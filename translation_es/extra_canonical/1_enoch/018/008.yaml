translation:
  language: es
  text: Y la montaña del medio llegó hasta el cielo, como el trono del Señor, que era de piedra de cristal[a], y la parte superior del trono era de piedra de zafiro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión ''piedra de cristal'' conserva la incertidumbre léxica del término ge''ez: puede aludir a un material brillante o precioso, no necesariamente al cristal en sentido moderno.'
    reason: lexical_alternative
  - marker: b
    text: La frase 'parte superior del trono' traduce una construcción difícil; también podría referirse más generalmente a la parte alta o a la cumbre de la estructura asociada con el trono.
    reason: alternative_reading
lexical_decisions:
- source_word: ማእከላይሰ
  english_pob_choice: the middle one
  chosen_spanish: el montículo del medio
  alternatives_spanish:
  - el del medio
  - la montaña del medio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El adjetivo sustantivado funciona como sujeto: no significa simplemente ''en medio'', sino ''el del medio''. En español, ''montículo del medio'' conserva la referencia a una de las montañas/alturas del contexto sin forzar un sustantivo no explicitado en este versículo.'
- source_word: ይጐድእ
  english_pob_choice: reached to heaven
  chosen_spanish: llegó hasta el cielo
  alternatives_spanish:
  - se alzó hasta el cielo
  - se extendió hasta el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa extensión o alcance vertical. 'Llegó hasta el cielo' mantiene la imagen visual y el sentido de alcance sin añadir matices interpretativos.
- source_word: እስከ ሰማይ
  english_pob_choice: to heaven
  chosen_spanish: hasta el cielo
  alternatives_spanish:
  - al cielo
  - hasta los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hasta el cielo'' refleja el valor de extensión del sintagma y es idiomático en español, preservando la altura visionaria.'
- source_word: ከመ መንበረ ለእግዚአብሔር
  english_pob_choice: like the throne of the Lord
  chosen_spanish: como el trono del Señor
  alternatives_spanish:
  - como el trono de Yahvé
  - como el trono del Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula comparativa pide 'como', no identidad. Se mantiene 'Señor' porque el contexto inglés auditado usa 'the Lord' para እግዚአብሔር; en este registro español evita una sobrelectura doctrinal y conserva la solemnidad del título.
- source_word: እምእብነ ፑክ
  english_pob_choice: of crystal stone
  chosen_spanish: de piedra de cristal
  alternatives_spanish:
  - de cristal
  - de piedra cristalina
  - de piedra brillante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es lexicamente incierto y el inglés POB lo trata como material brillante tipo 'crystal stone'. 'Piedra de cristal' preserva la ambigüedad lexical y el valor precioso/luminoso sin cerrar indebidamente la identificación.
- source_word: ይማሑ ለመንበሩ
  english_pob_choice: the top of the throne
  chosen_spanish: la parte superior del trono
  alternatives_spanish:
  - la cima del trono
  - el remate del trono
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez es difícil y parece referirse a la parte alta o superior de la estructura. 'Parte superior' es más natural que 'top' literal en español y evita fijar una arquitectura no segura.
- source_word: እምእብነ ሰንፔር
  english_pob_choice: of sapphire stone
  chosen_spanish: de piedra de zafiro
  alternatives_spanish:
  - de zafiro
  - de piedra zafírica
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Zafiro'' es el equivalente convencional del nombre de gema, y añadir ''piedra'' sigue la construcción material del original y del inglés auditado.'
theological_decisions:
- issue: Título divino en እግዚአብሔር
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - Dios
  - el Señor Dios
  rationale: El texto compara una visión del trono con el trono del Señor. Mantener 'Señor' sigue el audit trail inglés y conserva la reverencia del título sin introducir una decisión adicional no exigida por el versículo.
  doctrine_reference: DOCTRINE.md / Divine title practice; κύριος → Lord
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente que corrigió el inglés de ''reached up to heaven'' a ''reached to heaven'', y también respeta la corrección estructural que toma ''the middle one'' como sujeto. Además, evita la lectura errónea que añadía una ''foundation'' al segundo material, manteniendo solo dos rasgos materiales: piedra de cristal y piedra de zafiro.'
  spanish_consistency_notes:
  - Se mantuvo un registro solemne y bíblico, pero con sintaxis española natural.
  - '''Señor'' se usa como equivalente del auditado ''the Lord'' en esta unidad.'
  - No se añadió 'Yahvé' en el texto principal porque el contexto fuente auditado ya fija la traducción inglesa con 'Lord' y el pasaje es una comparación visionaria.
  - Se preservó la ambigüedad del material 'crystal stone' con una nota, en lugar de normalizarlo a una gema específica.
  - No se usó 'Cristo' ni terminología eclesiástica ajena al pasaje.
