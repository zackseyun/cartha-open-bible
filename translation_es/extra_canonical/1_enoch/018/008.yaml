    text: The stone term rendered 'crystal' is lexically uncertain; it denotes a bright or precious material in this throne vision.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'the top of the throne' is difficult; it may refer more generally to the upper part or summit of the structure associated with the throne.
    reason: alternative_reading
  - marker: c
    text: Or 'And in the middle it reached up'.
    reason: previous_rendering
  - marker: d
    text: Or 'and the top of the throne was of crystal stone, and its foundation was of sapphire stone.'.
