translation:
  language: es
  text: Vi los vientos sobre la tierra[a], que llevan las nubes[c]; vi los caminos de los ángeles[d]; vi en el extremo de la tierra el firme sostén[b] del cielo de arriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula inicial es textual y sintácticamente difícil. También puede entenderse más literalmente como «los vientos sobre la tierra, que llevan las nubes» o «los vientos que sostienen lo que está sobre la tierra entre las nubes».
    reason: textual_variant
  - marker: b
    text: O «el fundamento del cielo de arriba». El término ge'ez puede denotar firmeza o fuerza de soporte.
    reason: lexical_alternative
  - marker: c
    text: O «Y vi los vientos que llevan la tierra por encima de las nubes».
    reason: previous_rendering
  - marker: d
    text: O «; y vi los caminos de los ángeles; y vi en el extremo de la tierra».
    reason: previous_rendering
lexical_decisions:
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: Vi
  alternatives_spanish:
  - He visto
  - Contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula visionaria en primera persona se rinde de forma natural y directa con «vi», manteniendo el ritmo repetido del original sin arcaizar innecesariamente.
- source_word: ነፋሳተ
  english_pob_choice: the winds
  chosen_spanish: los vientos
  alternatives_spanish:
  - los espíritus
  - los vientos/espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cósmico y con referencia a nubes, tierra y cielo, el sentido físico «vientos» es el más probable y evita introducir una lectura espiritual que el pasaje no exige.
- source_word: ዘይጸውር
  english_pob_choice: that bear
  chosen_spanish: que llevan
  alternatives_spanish:
  - que cargan
  - que sostienen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa portar, cargar o sostener. «Llevan» conserva la imagen de movimiento y soporte de modo natural en español, sin perder la fuerza cosmológica.
- source_word: ዘዲበ ምድር
  english_pob_choice: the winds upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión textual y sintáctica muestra que la frase modifica a «los vientos» y no al verbo siguiente; por eso se traduce como ubicación de los vientos: «sobre la tierra».'
- source_word: በደመናት
  english_pob_choice: which bear the clouds
  chosen_spanish: que llevan las nubes
  alternatives_spanish:
  - que cargan las nubes
  - que sostienen las nubes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La preposición y el participio se entienden mejor en español como relación instrumental o de transporte: los vientos están llevando las nubes.'
- source_word: ፍናወ
  english_pob_choice: the paths
  chosen_spanish: los caminos
  alternatives_spanish:
  - las sendas
  - las rutas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Caminos» es la opción más clara y natural para rutas de movimiento celestial; conserva la imaginería espacial del pasaje.
- source_word: መላእክት
  english_pob_choice: the angels
  chosen_spanish: de los ángeles
  alternatives_spanish:
  - de los mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el marco apocalíptico de 1 Enoc, «ángeles» es la equivalencia más transparente y estable para el lector español.
- source_word: ውስተ ጽንፈ ምድር
  english_pob_choice: at the end of the earth
  chosen_spanish: al extremo de la tierra
  alternatives_spanish:
  - al fin de la tierra
  - en el extremo de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión señala el límite cosmográfico del mundo. «Al extremo de la tierra» preserva la idea de frontera lejana con buena fluidez en español.
- source_word: ጽንዐ
  english_pob_choice: the firm support
  chosen_spanish: el firme sostén
  alternatives_spanish:
  - el fundamento firme
  - el sostén fijo
  - la firme base
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término denota firmeza y soporte. «Firme sostén» conserva el valor de apoyo estructural sin imponer una metáfora arquitectónica demasiado específica.
- source_word: ዘሰማይ መልዕልተ
  english_pob_choice: of the heaven above
  chosen_spanish: del cielo de arriba
  alternatives_spanish:
  - del cielo superior
  - del cielo en lo alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase apunta al cielo en su altura. «Del cielo de arriba» es comprensible y mantiene explícita la verticalidad cosmológica.
theological_decisions:
- issue: Si ነፋሳተ debe entenderse como «vientos» o «espíritus»
  english_pob_reading: winds
  chosen_spanish_reading: vientos
  alternative_spanish_readings:
  - espíritus
  - vientos/espíritus
  rationale: 'El pasaje enumera realidades cósmicas visibles en secuencia visionaria: vientos, caminos de los ángeles y el sostén del cielo. «Vientos» preserva la arquitectura cósmica y evita desplazar el sentido hacia una lectura espiritual no indicada por el contexto inmediato.'
  doctrine_reference: Priorizar el sentido local del pasaje antes que armonizar términos cargados a través del corpus.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente: corrige la lectura sintáctica de ዘዲበ ምድር para que describa a los vientos «sobre la tierra» y elimina la conjunción añadida entre las cláusulas visionarias, respetando el asindetón del ge''ez. También toma en cuenta la confirmación griega citada en el audit trail.'
  spanish_consistency_notes:
  - Se conserva «ángeles» y no «mensajeros» por la claridad apocalíptica del contexto.
  - Se usa «vientos» de manera consistente para ነፋሳተ, evitando fluctuaciones con «espíritus».
  - «Cielo de arriba» mantiene la verticalidad del original sin recurrir a fórmulas eclesiales más tradicionales.
  - Las comas separan las tres visiones para reflejar el ritmo repetitivo de «vi» en el original.
