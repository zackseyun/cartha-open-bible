    reason: previous_rendering
  revision_rationale: La revisión mantiene el sentido correcto del texto principal, pero corrige la colocación y el contenido de las notas para que coincidan con el expediente auditado del POB inglés. También mejora ligeramente la fluidez española con «en el extremo de la tierra».
