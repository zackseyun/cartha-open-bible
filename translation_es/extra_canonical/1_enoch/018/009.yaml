translation:
  language: es
  text: Y vi un fuego ardiente, que estaba dentro de todos los montes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እሳተ
  english_pob_choice: a burning fire
  chosen_spanish: un fuego ardiente
  alternatives_spanish:
  - un fuego que arde
  - un fuego encendido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo indefinido pide un español igualmente simple e indefinido. «Ardiente» conserva el rasgo descriptivo del fuego sin añadir interpretación.
- source_word: ዘይነድድ
  english_pob_choice: burning
  chosen_spanish: ardiente
  alternatives_spanish:
  - que arde
  - ardiendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma relativa describe al fuego en estado continuo. En español, «ardiente» funciona con naturalidad y mantiene la cualidad presente del fuego.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la fórmula visionaria en primera persona. «Vi» es directo y fiel, sin elevar innecesariamente el registro.
- source_word: ወዘሀሎ
  english_pob_choice: that was within
  chosen_spanish: que estaba
  alternatives_spanish:
  - que había
  - y estaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Siguiendo la revisión auditada, la segunda cláusula relativa modifica al sustantivo «fuego», no introduce un objeto aparte. En español, «que estaba» reproduce esa función de manera clara.
- source_word: ውስተ ኵሉ አድባር
  english_pob_choice: within all the mountains
  chosen_spanish: dentro de todos los montes
  alternatives_spanish:
  - dentro de todas las montañas
  - en todos los montes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Dentro de» conserva la interioridad marcada por el ge'ez. «Montes» puede sonar más bíblico y amplio que «montañas», sin perder inteligibilidad en español moderno.
theological_decisions:
- issue: Naturaleza de la imagen del fuego en los montes
  english_pob_reading: Retain the vision as literal-apocalyptic imagery of fire within the mountains, without allegorizing it into abstract judgment language.
  chosen_spanish_reading: Conservar la visión como imagen apocalíptica literal de fuego dentro de los montes, sin convertirla en lenguaje abstracto de juicio.
  alternative_spanish_readings:
  - una figura general del juicio divino
  - una explicación naturalista del fuego
  rationale: El contexto inmediato es una visión topográfica. La traducción española mantiene la imagen tal como se ve, sin interpretar más allá de lo que el texto respalda.
  doctrine_reference: Preservar la imaginería apocalíptica; no aplanar la visión cósmica en prosa religiosa genérica.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrigió la sintaxis para hacer que la segunda cláusula relativa modifique a «fuego», evitando una lectura de objetos separados. La presente versión integra esa decisión en español y elimina cualquier nota no anclada, para cumplir la validación.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo simple de dos rasgos del fuego: «ardiente» y «que estaba dentro de todos los montes».'
  - Se evitó «SEÑOR» u այլ terminología no pertinente, ya que el versículo no contiene el nombre divino.
  - Se prefirió «montes» por registro bíblico y por concordancia con la imagen cosmográfica del pasaje.
