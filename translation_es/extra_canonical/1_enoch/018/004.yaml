translation:
  language: es
  text: Y vi los vientos que hacen girar el cielo y hacen que se pongan el disco del sol y todas las estrellas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula visionaria se conserva de modo natural y sobrio en español; «vi» mantiene el valor narrativo directo sin recargar el estilo.
- source_word: ነፋሳተ
  english_pob_choice: the winds
  chosen_spanish: los vientos
  alternatives_spanish:
  - los espíritus
  - las ráfagas de viento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cósmico, el sentido concreto «vientos» es el más fiel. «Espíritus» introduciría una personalización no explicitada por el verso.
- source_word: እለ ይመይጥዋ ለሰማይ
  english_pob_choice: that turn the sky
  chosen_spanish: que hacen girar el cielo
  alternatives_spanish:
  - que mueven el cielo
  - que hacen revolver el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hacen girar» transmite el movimiento cósmico de manera clara y idiomática en español, preservando la imagen de un cielo puesto en movimiento.
- source_word: ወእለ ያዐርቡ
  english_pob_choice: and cause ... to set
  chosen_spanish: y hacen descender
  alternatives_spanish:
  - y hacen ponerse
  - y causan que se pongan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail señala que el verbo expresa hacer ponerse o descender, no acercar. «Hacen descender» refleja mejor el valor causativo del verbo para el sol y las estrellas.
- source_word: ለክበበ ፀሐይ
  english_pob_choice: the disk of the sun
  chosen_spanish: el disco del sol
  alternatives_spanish:
  - el orbe del sol
  - el círculo del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Disco» reproduce bien la imagen visible y redonda del sol en un español claro, sin introducir tecnicismos ajenos al texto.
- source_word: ወኵሎ ከዋክብተ
  english_pob_choice: and all the stars
  chosen_spanish: y todas las estrellas
  alternatives_spanish:
  - y cada una de las estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma colectiva del original se comunica naturalmente con «todas las estrellas», manteniendo el alcance universal de la escena.
theological_decisions:
- issue: Naturaleza de los agentes que mueven el cielo y los astros
  english_pob_reading: impersonal cosmic winds
  chosen_spanish_reading: vientos cósmicos impersonales
  alternative_spanish_readings:
  - espíritus
  - vientos-espíritus
  rationale: El contexto inmediato describe fuerzas del orden creado que actúan sobre el cielo, el sol y las estrellas. Mantener «vientos» evita introducir seres personales o angélicos sin base explícita en el verso.
  doctrine_reference: Preservar la imaginería apocalíptica sin sobreinterpretar la agencia.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que corrige una confusión léxica entre «acercar» y el valor causativo de «hacer descender/ponerse» para ያዐርቡ; por eso se evita toda traducción de cercanía y se adopta un verbo de descenso.
  spanish_consistency_notes:
  - Se mantiene «vientos» en sentido físico/cósmico, no espiritual.
  - Se evita «SEÑOR» o terminología eclesiástica no presente en el texto.
  - El tono es bíblico y digno, pero en español moderno natural.
  - No se añaden notas al pie porque el texto español principal ya refleja la decisión revisada sin requerir ambigüedad tipográfica.
