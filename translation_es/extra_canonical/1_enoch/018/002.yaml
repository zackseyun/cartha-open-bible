translation:
  language: es
  text: Y vi las piedras angulares[a] de la tierra, y vi los cuatro vientos[b] que sostienen la tierra y el firmamento del cielo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las piedras de los ángulos de la tierra». La construcción del ge''ez es arquitectónica y puede referirse a las extremidades fundacionales de la tierra en una imagen visionaria.'
    reason: lexical_alternative
  - marker: b
    text: El sustantivo traducido «vientos» puede, en algunos contextos, solaparse con «espíritus» o «alientos»; aquí el marco cosmológico favorece «vientos».
    reason: lexical_alternative
  - marker: c
    text: «Firmamento del cielo» conserva la imaginería cosmológica antigua de una extensión o bóveda celestial estructurada.
    reason: cultural_note
lexical_decisions:
- source_word: እብነ
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedras angulares
  - piedras de esquina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo básico es ‘piedras’; en construcción con el término siguiente expresa la imagen arquitectónica de ‘piedras angulares’. En español, ‘piedras angulares’ comunica mejor la función imaginal sin perder la base léxica.
- source_word: ማእዘንተ
  english_pob_choice: cornerstones
  chosen_spanish: angulares
  alternatives_spanish:
  - de esquina
  - de los ángulos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término alude a esquina/ángulo. Como modifica a ‘piedras’, ‘angulares’ preserva la relación arquitectónica de forma natural en español y evita una perífrasis pesada.
- source_word: ምድር
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - mundo
  - suelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cósmico, ‘tierra’ es la correspondencia más directa y comprensible para ‘earth’, mejor que ‘mundo’, que sería más interpretativo.
- source_word: አርባዕተ ነፋሳተ
  english_pob_choice: the four winds
  chosen_spanish: los cuatro vientos
  alternatives_spanish:
  - los cuatro espíritus
  - los cuatro vientos del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el término puede rozar ‘espíritus’ o ‘alientos’, el marco cosmológico y el número cuatro favorecen ‘vientos’. Se omite ‘del cielo’ porque no está explícito en el ge’ez.
- source_word: ይጸውርዋ
  english_pob_choice: bear up
  chosen_spanish: sostienen
  alternatives_spanish:
  - sostienen en pie
  - llevan
  - apoyan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa portar o sostener. ‘Sostienen’ conserva la imagen de soporte cósmico en un español claro y digno; ‘llevan’ sonaría demasiado general.
- source_word: ወጽንዐ ሰማይ
  english_pob_choice: the firmament of heaven
  chosen_spanish: el firmamento del cielo
  alternatives_spanish:
  - la bóveda del cielo
  - el firmamento celestial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión remite a la cosmología antigua de una extensión/estructura celestial. ‘Firmamento del cielo’ mantiene esa imaginería y sigue de cerca el valor del original.
theological_decisions:
- issue: Conservación de la imaginería cosmológica antigua
  english_pob_reading: 'Retain concrete imagery: the earth has ''cornerstones'' and is ''borne up'' along with the heavenly firmament.'
  chosen_spanish_reading: 'Conservar la imaginería concreta: la tierra tiene ‘piedras angulares’ y es ‘sostenida’ por los cuatro vientos junto con el firmamento del cielo.'
  alternative_spanish_readings:
  - Desmitologizar a ‘extremos de la tierra’ y ‘fuerzas que gobiernan el mundo’
  - Reducir a ‘esquinas’ y ‘soporte’
  rationale: La política de la POB exige preservar la visión apocalíptica en lugar de aplanarla en prosa moderna. La traducción debe dejar en pie la arquitectura cósmica del pasaje.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; optimal equivalence without paraphrastic smoothing.'
translation_notes:
  revision_awareness: 'El contexto inglés indica que la revisión más reciente no introdujo cambios: el texto y las decisiones léxicas se mantuvieron estables, con acuerdo alto entre la auditoría y la revisión cruzada.'
  spanish_consistency_notes:
  - Se mantiene ‘tierra’ para ምድር en sentido cósmico global.
  - Se conserva ‘vientos’ para ነፋሳተ sin añadir ‘del cielo’, porque el ge’ez no lo explicita.
  - ‘Firmamento’ se usa en sentido cosmológico antiguo, no como sinónimo moderno de ‘cielo’.
  - La sintaxis española intenta ser publica y fluida, pero sin borrar la estructura visionaria del original.
