review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido general del ge'ez y sigue la línea del English POB en ‘piedras angulares’, ‘cuatro vientos’ y ‘firmamento del cielo’. Sin embargo, la sintaxis española actual rompe la relación del relativo ‘que la sostienen’ con ambos complementos directos del original (‘la tierra y el firmamento del cielo’). El ge'ez y el English POB dicen que los cuatro vientos sostienen tanto la tierra como el firmamento, no solo la tierra. Además, el segundo ‘y’ antes de ‘el firmamento’ deja una frase elíptica y menos fiel.
  spanish_quality_summary: 'La redacción es legible y digna, pero la coordinación final suena incompleta en español. Conviene explicitar el segundo objeto del verbo para evitar ambigüedad y mejorar la fluidez: ‘que sostienen la tierra y el firmamento del cielo’. Las notas están bien formuladas y son claras.'
  glossary_alignment: No hay conflictos con el glosario del proyecto. ‘Vientos’ está bien frente a posibles ‘espíritus’; ‘firmamento del cielo’ preserva la imaginería cosmológica; no aparecen términos sensibles como Yahvé/Mesías. ‘Piedras angulares’ es aceptable como equivalente español de ‘cornerstones’, con la alternativa ya consignada en nota.
  issues:
  - severity: high
    issue: El verbo ‘sostienen’ solo se aplica explícitamente a ‘la tierra’ en el borrador.
    rationale: El original ge'ez ‘ይጸውርዋ ለምድር ወጽንዐ ሰማይ’ y el English POB indican que los cuatro vientos sostienen ‘la tierra y el firmamento del cielo’. La redacción actual puede leerse como si el firmamento fuera solo algo visto, no algo sostenido por los vientos.
  - severity: medium
    issue: La coordinación ‘que la sostienen, y el firmamento del cielo’ queda elíptica y poco natural en español.
    rationale: Aunque recupera todos los elementos léxicos, la frase suena truncada. Repetir el objeto directo completo mejora fidelidad y naturalidad sin añadir interpretación.
  revised_spanish_text: Y vi las piedras angulares[a] de la tierra, y vi los cuatro vientos[b] que sostienen la tierra y el firmamento del cielo[c].
  revised_footnotes:
  - marker: a
    text: 'O: «las piedras de los ángulos de la tierra». La construcción del ge''ez es arquitectónica y puede referirse a las extremidades fundacionales de la tierra en una imagen visionaria.'
    reason: lexical_alternative
  - marker: b
    text: El sustantivo traducido «vientos» puede, en algunos contextos, solaparse con «espíritus» o «alientos»; aquí el marco cosmológico favorece «vientos».
    reason: lexical_alternative
  - marker: c
    text: «Firmamento del cielo» conserva la imaginería cosmológica antigua de una extensión o bóveda celestial estructurada.
    reason: cultural_note
  revision_rationale: 'La revisión corrige un problema de fidelidad sintáctica: en el original, los cuatro vientos sostienen tanto la tierra como el firmamento del cielo. También suaviza una coordinación poco natural en español, manteniendo intactas las decisiones léxicas y teológicas del POB.'
