translation:
  language: es
  text: 'Y seguí hacia el sur, y vi un lugar que ardía de día y de noche, donde había siete montes[a] de piedra preciosa[b]: tres hacia el oriente y tres hacia el sur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto ge'ez transmitido dice «tres hacia el oriente y tres hacia el sur» después de mencionar siete montes. En este verso, tal como ha llegado, no se especifica el séptimo monte.
    reason: textual_variant
  - marker: b
    text: «Piedra preciosa» también podría entenderse como «piedra costosa» o «piedra gloriosa»; el ge'ez subraya el valor o esplendor excepcional de la piedra.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሐለፍኩ
  english_pob_choice: I went on
  chosen_spanish: seguí
  alternatives_spanish:
  - fui adelante
  - proseguí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez expresa continuación del movimiento dentro de la visión. «Seguí» conserva ese avance narrativo con naturalidad en español.
- source_word: መንገለ አዜብ
  english_pob_choice: toward the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - rumbo al sur
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula direccional indica orientación hacia el sur, no solo destino estático. «Hacia el sur» preserva ese matiz.
- source_word: ወርኢኩ መካነ
  english_pob_choice: and I saw a place
  chosen_spanish: vi un lugar
  alternatives_spanish:
  - vi un sitio
  - vi una región
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lugar» reproduce bien el escenario visionario sin forzar una precisión geográfica mayor que la del texto.
- source_word: ዘይነድድ
  english_pob_choice: burning
  chosen_spanish: que ardía
  alternatives_spanish:
  - ardiente
  - que quemaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El participio relativo describe una acción continua. «Que ardía» mantiene la imagen apocalíptica de fuego persistente.
- source_word: መዐልተ ወሌሊተ
  english_pob_choice: day and night
  chosen_spanish: de día y de noche
  alternatives_spanish:
  - día y noche
  - por el día y por la noche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja temporal expresa continuidad incesante. En español, «de día y de noche» suena natural y conserva el paralelismo.
- source_word: ሰብዓቱ አድባር
  english_pob_choice: seven mountains
  chosen_spanish: siete montes
  alternatives_spanish:
  - siete montañas
  - siete cerros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Adbar» puede traducirse como montes o montañas. Elegí «montes» porque encaja bien con el paisaje elevado sin exagerar la altura; «montañas» sigue siendo posible.
- source_word: ዘእምእብን ክቡር
  english_pob_choice: of precious stone
  chosen_spanish: de piedra preciosa
  alternatives_spanish:
  - de piedra costosa
  - de piedra gloriosa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Piedra preciosa» comunica con claridad el valor/splendor excepcional de la piedra que destaca el ge'ez, y corresponde al uso auditable de la POB inglesa.
- source_word: ፫መንገለ ጽባሕ
  english_pob_choice: three toward the east
  chosen_spanish: tres hacia el oriente
  alternatives_spanish:
  - tres hacia el este
  - tres al oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oriente» es un equivalente bíblico claro y digno para la dirección del amanecer/east, manteniendo el paralelismo poético.
- source_word: ወ፫መንገለ አዜብ
  english_pob_choice: and three toward the south
  chosen_spanish: y tres hacia el sur
  alternatives_spanish:
  - y tres al sur
  - y tres del lado sur
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la lista direccional tal como está transmitida. No se resuelve la cuenta restante dentro del verso, porque el texto preservado no lo hace.
theological_decisions:
- issue: Topografía visionaria y valor de la imagen apocalíptica
  english_pob_reading: Preserve the visionary topography literally rather than interpret it symbolically in translation.
  chosen_spanish_reading: Conservar literalmente la topografía visionaria sin convertirla en explicación simbólica.
  alternative_spanish_readings:
  - Reformular como una región ígnea general
  - Interpretar los montes como estructuras celestiales en el texto principal
  rationale: El pasaje presenta una escena apocalíptica concreta. La traducción española debe mantener la imagen para no resolver la tensión interpretativa que el texto mismo deja abierta.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica y la imaginería apocalíptica sin sobreinterpretar.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; esta versión sigue el texto auditado y conserva la misma solución general, ajustando solo el español para fluidez y precisión.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto, pero no aparece en este versículo.
  - Se prefirió «oriente» para la dirección este, coherente con un registro bíblico sobrio.
  - Se evitó introducir interpretación simbólica que el aparato auditado no autoriza.
  - La nota sobre el séptimo monte se conserva porque el testimonio transmitido ofrece solo seis ubicaciones direccionales explícitas.
  - «Piedra preciosa» refleja el matiz de valor/splendor sin cerrar la ambigüedad lexical completa.
