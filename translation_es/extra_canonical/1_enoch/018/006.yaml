base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/018/006.yaml
  text: And I went on toward the south[a], and I saw a place burning day and night[b], where there were seven mountains of precious stone—three toward the east and three toward the south.
  footnotes:
  - marker: a
    text: The transmitted Ge'ez text says 'three toward the east and three toward the south' after mentioning seven mountains. The seventh mountain is not specified within this verse as preserved here.
    reason: textual_variant
  - marker: b
    text: '''Precious stone'' could also be rendered ''costly stone'' or ''glorious stone''; the Ge''ez emphasizes the exceptional value or splendor of the stone.'
    reason: lexical_alternative
