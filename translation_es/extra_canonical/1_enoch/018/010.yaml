translation:
  language: es
  text: Y allí vi un lugar más allá de la gran tierra[a][b]; allí se reúnen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lectura ge'ez de ማዕዶተ se entiende aquí como «más allá de / al otro lado de», no como «en los extremos de».
    reason: textual_variant
  - marker: b
    text: 'Alternativamente: «un lugar al otro lado de la gran tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un verbo narrativo visionario; en español, "vi" conserva la relación directa con una visión reportada sin volver la frase artificial.
- source_word: ህየ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio de lugar se repite en el verso; "allí" mantiene la deixis espacial propia del relato visionario.
- source_word: መካነ
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - un espacio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ajuste adjudicado en el audit trail muestra valor indefinido; "un lugar" refleja mejor esa indefinición que una forma definida.
- source_word: ማዕዶተ
  english_pob_choice: beyond
  chosen_spanish: más allá de
  alternatives_spanish:
  - al otro lado de
  - del otro lado de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión reciente identifica el sentido de "pέραν" / "beyond", no el de "bordes"; "más allá de" preserva esa relación espacial sin reinterpretarla.
- source_word: ዐቢይ ምድር
  english_pob_choice: the great earth
  chosen_spanish: la gran tierra
  alternatives_spanish:
  - la gran tierra
  - la vasta tierra
  - la gran tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Tierra" funciona mejor que "mundo" o "suelo" en este registro cosmológico. "Gran" conserva la amplitud del referente sin suavizarlo.'
- source_word: ይትጋብኡ
  english_pob_choice: they gather together
  chosen_spanish: se reúnen
  alternatives_spanish:
  - se congregan
  - se juntan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal apunta a reunión colectiva; "se reúnen" es natural en español y refleja la acción sin forzar una pasiva.
theological_decisions:
- issue: Geografía cósmica y no allegorización del lugar descrito
  english_pob_reading: a place beyond the great earth
  chosen_spanish_reading: un lugar más allá de la gran tierra
  alternative_spanish_readings:
  - un lugar en los confines de la gran tierra
  - un lugar al otro lado de la gran tierra
  rationale: La escena pertenece a un recorrido visionario. Mantener "más allá de" conserva la geografía apocalíptica sin convertirla en una paráfrasis abstracta ni en "extremos" no apoyados por la revisión más reciente.
  doctrine_reference: Preservar la imaginería apocalíptica y su espacialidad concreta.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail: ማዕዶተ se entendió como «beyond / más allá de», y መካነ como indefinido («a place / un lugar»). También se incorporó el cambio de la revisión más reciente de una pasiva a una forma verbal simple: «they gather together» → «se reúnen».'
  spanish_consistency_notes:
  - Se mantuvo "lugar" como equivalente neutral de መካነ en un contexto visionario.
  - '"Más allá de" evita la traducción literal de "ends/borders" descartada por la revisión auditada.'
  - '"Se reúnen" conserva el valor colectivo del verbo sin introducir terminología eclesial ajena al texto.'
