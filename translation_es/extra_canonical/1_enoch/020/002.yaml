translation:
  language: es
  text: Uriel[a], uno de los santos ángeles[b], que está sobre el mundo y sobre el Tártaro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase final es difícil en el testimonio de OCR. El sentido podría ser «sobre el Tártaro» —el ámbito-prisión de seres celestiales rebeldes— o, de manera más general, «sobre el abismo».
    reason: textual_variant
  - marker: b
    text: 'O: «Uriel, uno de los santos ángeles, que está sobre el mundo y sobre el Tártaro».'
    reason: alternative_reading
lexical_decisions:
- source_word: ኡርኤል
  english_pob_choice: Uriel
  chosen_spanish: Uriel
  alternatives_spanish:
  - Uriel
  - Uri'el
  lexicon: Convención onomástica ge'ez
  rationale: Los nombres propios se transliteran; en español bíblico «Uriel» es la forma más natural y reconocible.
- source_word: ፩እመላእክት
  english_pob_choice: one of the holy angels
  chosen_spanish: uno de los santos ángeles
  alternatives_spanish:
  - uno de los ángeles santos
  - uno de los ángeles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción numeral + grupo expresa pertenencia dentro del conjunto. «Santos» conserva el matiz técnico de seres celestiales consagrados.
- source_word: ቅዱሳን
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - santos y celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico, «santos» comunica mejor la designación habitual de los seres angelicales que «sagrados».
- source_word: እሰመ
  english_pob_choice: who is over
  chosen_spanish: que está sobre
  alternatives_spanish:
  - que es puesto sobre
  - que está encargado de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula relativa presenta su esfera de autoridad. «Que está sobre» mantiene la fórmula sin sobreinterpretar la investidura.
- source_word: ዘዓለም
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra
  - la era
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En la lista de jurisdicciones cósmicas, «el mundo» es la equivalencia más directa y amplia.
- source_word: ወዘተረዓድ
  english_pob_choice: and over Tartarus
  chosen_spanish: y sobre el Tártaro
  alternatives_spanish:
  - y sobre el abismo
  - y sobre el reino subterráneo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el contexto de 1 Enoc 20 y la lectura auditada, se preserva el nombre del ámbito infernal concreto. «Tártaro» evita diluir la cosmología apocalíptica en un término más genérico.
theological_decisions:
- issue: Si el último ámbito debe suavizarse como «abismo» o conservarse como un lugar concreto
  english_pob_reading: over Tartarus
  chosen_spanish_reading: sobre el Tártaro
  alternative_spanish_readings:
  - sobre el abismo
  - sobre el reino subterráneo
  rationale: La tradición de 1 Enoc 20 presenta jurisdicciones angelicales específicas. Mantener «Tártaro» preserva la tensión cosmológica y el posible trasfondo de prisión para seres rebeldes sin resolver la dificultad textual.
  doctrine_reference: Preservar la tensión textual y cosmológica; no normalizar el imaginario apocalíptico a categorías más generales.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para restaurar la cláusula relativa («who is over») coherente con la serie de 1 Enoc 20:3-7; la versión española sigue esa estructura relativa («que está sobre»). Se mantuvo la lectura concreta «Tártaro» por el contexto apocalíptico, dejando la variante más general en nota.
  spanish_consistency_notes:
  - Se conservó «Uriel» como nombre propio transliterado, no traducido.
  - Se prefirió «santos ángeles» para reflejar la fórmula apocalíptica del grupo celestial.
  - «Sobre» se repite para mantener la paralelismo de jurisdicciones.
  - «Tártaro» se usó como término técnico y se explicó en nota para no perder la tensión textual.
