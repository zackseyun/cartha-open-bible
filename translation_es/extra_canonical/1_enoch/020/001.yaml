translation:
  language: es
  text: Y estos son los nombres de los santos ángeles que velan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo traducido «velan» también puede entenderse como «están vigilantes» o «vigilan». En el contexto más amplio de 1 Enoc, este lenguaje se relaciona con la idea de los vigilantes celestiales, pero el versículo mismo lo presenta como una descripción de los ángeles.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወዝንቱ
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Y estos son
  - Ahora estos son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula introductoria en ge'ez presenta una identificación en plural; en español, «Y estos son» conserva tanto la función enlazadora como el número plural sin añadir matices innecesarios.
- source_word: አስማቲሆሙ
  english_pob_choice: the names
  chosen_spanish: los nombres
  alternatives_spanish:
  - sus nombres
  - los nombres de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido literal es «sus nombres», pero en español la secuencia introductoria queda más natural como «los nombres», dejando que el relativo posterior precise de quiénes se trata.
- source_word: ለእለ
  english_pob_choice: of those who / who
  chosen_spanish: que
  alternatives_spanish:
  - de los que
  - de aquellos que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El marcador relativo liga «nombres» con la cláusula siguiente. En español, «que» transmite la relación de forma directa y evita una perífrasis pesada.
- source_word: ይተግሁ
  english_pob_choice: keep watch
  chosen_spanish: velan
  alternatives_spanish:
  - están vigilantes
  - guardan vigilia
  - vigilan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa estar despiertos con vigilancia. «Velan» conserva el matiz de vigilancia activa y funciona de manera idiomática en español religioso sin forzar el título técnico «Vigilantes» en el texto principal.
- source_word: ቅዱሳን
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - santos y consagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Santos» es el equivalente normal de «holy» para seres celestiales y mantiene el registro elevado. «Sagrados» sería posible, pero suena menos personal para seres angélicos.
- source_word: መላእክት
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico el referente son seres celestiales; «ángeles» es la traducción más precisa y estable en español.
theological_decisions:
- issue: Si traducir el lenguaje de vigilancia con el título técnico «Vigilantes» o con una descripción verbal
  english_pob_reading: keep watch
  chosen_spanish_reading: que velan
  alternative_spanish_readings:
  - los Vigilantes
  - que están vigilantes
  - que guardan vigilia
  rationale: El audit trail inglés evita imponer el título técnico «Watchers» en este versículo, prefiriendo la descripción verbal. En español, «que velan» reproduce esa decisión y evita sobre-harmonizar el pasaje con el corpus completo.
  doctrine_reference: Preservar el sentido local del pasaje y no convertir una descripción verbal en un título técnico sin base suficiente en el texto.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de verificación es alto y coincide con la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene «ángeles» para መላእክት y no «mensajeros», conforme al contexto apocalíptico.
  - Se evita «Vigilantes» en el texto principal para no convertir una descripción verbal en título técnico.
  - «Santos» conserva el registro reverente sin desplazar el sentido de consagración celestial.
