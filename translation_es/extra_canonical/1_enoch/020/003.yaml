review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del ge''ez: Rafael es uno de los ángeles santos y está puesto sobre los espíritus humanos. Conserva adecuadamente «espíritus» frente a alternativas más interpretativas como «almas». Sin embargo, «que está sobre» suena calcado y algo torpe en español bíblico actual; puede preservarse mejor la idea de autoridad con «que está a cargo de», aunque esto es una leve explicitación. Además, la nota al pie ya reconoce que «hombres» es colectivo, por lo que conviene ajustar el texto principal a «seres humanos» para evitar una lectura masculina innecesaria en español.'
  spanish_quality_summary: 'El texto es claro y digno, pero «los santos ángeles» suena menos natural que «los ángeles santos» o «los ángeles consagrados» en este tipo de catálogo; aun así, no es un error. La mejora principal es idiomática: «está sobre» resulta poco natural en español. «Seres humanos» mejora la legibilidad y alinea mejor el sentido colectivo sin perder concisión excesivamente.'
  glossary_alignment: No hay conflictos con la terminología central del proyecto. «Rafael» es forma española asentada y correcta. «Espíritus» respeta la decisión auditada. El cambio a «seres humanos» aplica correctamente la nota lexical inglesa sobre el valor colectivo de ሰብእ.
  issues:
  - severity: medium
    issue: «que está sobre» suena poco idiomático en español
    rationale: Aunque refleja literalmente la construcción inglesa auditada, en español moderno digno suena calco. Una formulación como «que está a cargo de» comunica la esfera de autoridad de manera natural sin imponer una interpretación teológica nueva.
  - severity: medium
    issue: «de los hombres» puede leerse como masculino específico
    rationale: La propia auditoría inglesa aclara que el término ge'ez es colectivo, no necesariamente masculino. En español actual, «los hombres» puede entenderse genéricamente, pero también como varones. «Los seres humanos» evita esa ambigüedad.
  revised_spanish_text: Rafael[a], uno de los ángeles santos, que está a cargo de los espíritus de los seres humanos.
