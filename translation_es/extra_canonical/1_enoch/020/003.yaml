translation:
  language: es
  text: Rafael[a], uno de los ángeles santos, que está a cargo de los espíritus de los seres humanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los espíritus de la humanidad». El término ge'ez se usa aquí en sentido colectivo, no necesariamente masculino.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሩፋኤል
  english_pob_choice: Raphael
  chosen_spanish: Rafael
  alternatives_spanish:
  - Rufael
  lexicon: Ge'ez lexicon
  rationale: Nombre propio transliterado al español con la forma ya asentada y natural; conserva la identificación del personaje sin traducirlo.
- source_word: ፩እምነ
  english_pob_choice: one of
  chosen_spanish: uno de
  alternatives_spanish:
  - uno entre
  - uno de entre
  lexicon: Ge'ez lexicon
  rationale: La construcción partitiva se expresa de manera natural con «uno de», manteniendo la pertenencia al grupo sin añadir matices.
- source_word: ቅዱሳን መላእክት
  english_pob_choice: the holy angels
  chosen_spanish: los santos ángeles
  alternatives_spanish:
  - los ángeles santos
  - los ángeles celestiales
  lexicon: Ge'ez lexicon
  rationale: «Santos» refleja bien el valor consagrado del adjetivo y mantiene el registro apocalíptico. Se evita «sagrados» porque suena más abstracto en español bíblico.
- source_word: ዘ
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: Ge'ez lexicon
  rationale: El relativo simple «que» es idiomático en español y sirve bien para introducir la esfera de autoridad de Rafael.
- source_word: መናፍስተ
  english_pob_choice: spirits
  chosen_spanish: los espíritus
  alternatives_spanish:
  - las almas
  - los alientos
  lexicon: Ge'ez lexicon
  rationale: «Espíritus» conserva el término amplio y cosmológico del original, sin reducirlo a «almas», que desplazaría el sentido hacia una lectura más psicológica o escatológica.
- source_word: ሰብእ
  english_pob_choice: men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de la humanidad
  - de las personas
  lexicon: Ge'ez lexicon
  rationale: Se conserva la concisión del original y de la versión inglesa auditada. En español, «hombres» puede abarcar humanidad en sentido colectivo; no se expande a «humanidad» para no suavizar la formulación breve del texto.
- source_word: ዘመናፍስተ ሰብእ
  english_pob_choice: who is over the spirits of men
  chosen_spanish: que está sobre los espíritus de los hombres
  alternatives_spanish:
  - que tiene a su cargo los espíritus de los hombres
  - que supervisa los espíritus de los hombres
  lexicon: Ge'ez lexicon
  rationale: «Está sobre» preserva la fórmula jerárquica breve del texto y no introduce una paráfrasis interpretativa como «tiene a su cargo», aunque esta sería posible.
theological_decisions:
- issue: Alcance de la jurisdicción de Rafael
  english_pob_reading: Raphael is described as having oversight over human spirits.
  chosen_spanish_reading: Rafael es descrito como estando sobre los espíritus de los hombres.
  alternative_spanish_readings:
  - Rafael está sobre las almas de los muertos
  - Rafael vela por la vida interior de la humanidad
  rationale: El ge'ez solo dice «espíritus de los hombres». Se mantiene esa amplitud sin importar interpretaciones posteriores sobre almas de difuntos o funciones curativas de Rafael en otros textos.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión semántica sin resolverla por tradición posterior.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto ge''ez y el criterio auditado de la POB en inglés: nombre propio transliterado, partitivo simple, adjetivo sacral en registro apocalíptico y el sintagma amplio «espíritus de los hombres» sin especificar almas de muertos ni función curativa.'
  spanish_consistency_notes:
  - Se mantiene «Rafael» como forma española estándar del nombre propio.
  - «Santos ángeles» conserva el tono litúrgico/apocalíptico sin sustituir innecesariamente el léxico fuente.
  - «Espíritus» se usa en sentido amplio, y la nota aclara la posible lectura colectiva de «hombres».
  - La preposición y el orden verbal buscan naturalidad en español sin perder la estructura del original.
