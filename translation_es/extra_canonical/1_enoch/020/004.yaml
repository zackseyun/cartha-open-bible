translation:
  language: es
  text: Raguel, uno de los santos ángeles, que toma venganza[a] sobre el mundo y sobre los luminares[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que se venga del mundo y de los luminares». El verbo subyacente tiene un sentido retributivo y judicial.
    reason: lexical_alternative
  - marker: b
    text: «Luminares» se refiere a los astros celestes, probablemente el sol, la luna y las estrellas dentro del marco apocalíptico.
    reason: cultural_note
lexical_decisions:
- source_word: ራጉኤል
  english_pob_choice: Raguel
  chosen_spanish: Raguel
  alternatives_spanish:
  - Ragw'el
  lexicon: Convendón transliterativa onomástica ge'ez
  rationale: Los nombres propios angelológicos se transliteran, no se traducen. «Raguel» es la forma convencional en español y conserva la referencia del original.
- source_word: ፩እምነ
  english_pob_choice: one of
  chosen_spanish: uno de
  alternatives_spanish:
  - uno entre
  - uno de entre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión marca pertenencia a un grupo; «uno de» reproduce de forma natural el matiz partitivo sin añadir información.
- source_word: መላእክት ቅዱሳን
  english_pob_choice: the holy angels
  chosen_spanish: los santos ángeles
  alternatives_spanish:
  - los ángeles santos
  - los ángeles, los santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Santos» conserva el adjetivo directo. En español suena más natural que «sagrados» para este uso angelológico y mantiene la designación del grupo.
- source_word: ዘይትቤቀሎ
  english_pob_choice: who takes vengeance
  chosen_spanish: que toma venganza
  alternatives_spanish:
  - que se venga
  - que avenga
  - que castiga
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene fuerza judicial-retributiva. «Toma venganza» preserva esa dureza apocalíptica mejor que «castiga», y evita suavizar el sentido.
- source_word: ለዓለም
  english_pob_choice: on the world
  chosen_spanish: sobre el mundo
  alternatives_spanish:
  - sobre la tierra
  - sobre la era
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Mundo» expresa mejor el alcance cósmico/judicial del pasaje que «tierra», que en español podría reducir demasiado el campo semántico.
- source_word: ለብርሃናት
  english_pob_choice: on the luminaries
  chosen_spanish: sobre los luminares
  alternatives_spanish:
  - sobre las luces
  - sobre los astros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Luminares» conserva el lenguaje cósmico-apocalíptico del original. En español es más preciso que «luces» y menos interpretativo que «astros».
theological_decisions:
- issue: Alcance de la función punitiva de Raguel
  english_pob_reading: Raguel is described as executing vengeance against both the world and the luminaries.
  chosen_spanish_reading: Raguel es presentado como ejecutor de venganza contra el mundo y contra los luminares.
  alternative_spanish_readings:
  - Raguel supervisa el orden respecto del mundo y de los luminares
  - Raguel toma venganza por el mundo y por los luminares
  rationale: La sintaxis ge'ez y la lectura auditada en inglés presentan dos objetos coordinados del mismo verbo. Por eso el español mantiene la formulación judicial fuerte, sin convertirla en mera supervisión ni en un giro más abstracto.
  doctrine_reference: Preservar el lenguaje apocalíptico de juicio y retribución, sin diluirlo en prosa religiosa general.
translation_notes:
  revision_awareness: Se siguió el pasaje recuperado del ge'ez con el mismo marco auditado en inglés; no hubo revisiones posteriores aplicadas al texto de referencia, y la versión española conserva la estructura partitiva, la designación angelológica y el paralelismo de los dos objetos de juicio.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este verso no aplica.
  - Se mantuvo «luminares» para preservar la imaginería cósmica del original y evitar una reducción a «luces».
  - «Santos ángeles» conserva el adjetivo explícito sin introducir un matiz litúrgico no atestiguado.
