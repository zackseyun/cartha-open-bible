  glossary_alignment: No hay conflicto con la terminología marco del proyecto. No aparecen términos sensibles como Yahvé, Mesías, espíritu, etc. La transliteración «Raguel» y la elección «luminares» concuerdan con la justificación auditada. El lenguaje judicial fuerte del verbo se conserva adecuadamente.
