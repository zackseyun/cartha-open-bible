    issue: La forma «Gabriʾel» puede resultar menos familiar para lectores hispanos que «Gabriel».
    rationale: Sin embargo, está explícitamente justificada por la auditoría inglesa para conservar la forma etiópica del nombre, por lo que no conviene cambiarla aquí.
  - severity: low
    issue: «Que está sobre» es ligeramente más literal que alternativas como «que tiene a su cargo».
    rationale: Aun así, reproduce bien la relación de autoridad señalada en la decisión léxica inglesa y mantiene un tono sobrio sin añadir interpretación.
