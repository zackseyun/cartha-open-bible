translation:
  language: es
  text: Gabriʾel[a], uno de los ángeles santos, que está sobre el Paraíso, las serpientes y los querubines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término traducido «serpientes» es léxicamente difícil en la transmisión etiópica; subsiste cierta incertidumbre, aunque el sentido tradicional en este versículo apunta a seres serpentinos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ገብርኤል
  english_pob_choice: Gabriʾel
  chosen_spanish: Gabriʾel
  alternatives_spanish:
  - Gabriel
  lexicon: Glosa onomástica / tradición etiópica
  rationale: Se conserva la transliteración del nombre propio para reflejar la forma etiópica detrás del nombre familiar Gabriel y mantener la trazabilidad con el testimonio fuente.
- source_word: ፩እምነ
  english_pob_choice: one of
  chosen_spanish: uno de
  alternatives_spanish:
  - de entre
  - uno entre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa pertenencia a un grupo; «uno de» es la solución natural y fiel en español.
- source_word: መላእክት ቅዱሳን
  english_pob_choice: the holy angels
  chosen_spanish: los ángeles santos
  alternatives_spanish:
  - los ángeles sagrados
  - los ángeles, los santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el orden natural del español sin perder el registro apocalíptico ni el matiz de santidad del grupo celestial.
- source_word: ዘዲበ
  english_pob_choice: who is over
  chosen_spanish: que está sobre
  alternatives_spanish:
  - que preside sobre
  - que está encargado de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión indica autoridad o cargo sobre una esfera; «que está sobre» reproduce esa relación de dominio de manera sobria y clara.
- source_word: ገነት
  english_pob_choice: Paradise
  chosen_spanish: el Paraíso
  alternatives_spanish:
  - el jardín
  - Edén
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este catálogo de poderes angélicos, el término apunta al ámbito paradisíaco más que a un jardín genérico; «Paraíso» preserva el sentido cósmico y teológico.
- source_word: አክይስት
  english_pob_choice: the serpents
  chosen_spanish: las serpientes
  alternatives_spanish:
  - las sierpes
  - las serpientes/seres serpentinos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la lectura tradicional señalada por el auditor inglés, reconociendo la dificultad léxica del término etiópico pero evitando una paráfrasis no sustentada.
- source_word: ኪሩቤን
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español bíblico, «querubines» comunica con precisión el plural tradicional del término y preserva el registro apocalíptico.
theological_decisions:
- issue: Alcance de ገነት en un inventario de autoridades celestiales
  english_pob_reading: Paradise
  chosen_spanish_reading: el Paraíso
  alternative_spanish_readings:
  - el jardín
  - Edén
  rationale: El contexto enumera esferas de custodia angelical; por eso el término debe leerse como ámbito paradisíaco/cósmico, no como jardín común. «Paraíso» mantiene esa fuerza sin añadir doctrina ajena al pasaje.
  doctrine_reference: Translación apocalíptica y de localización celestial en tradición enóquica.
- issue: Tratamiento del término difícil አክይስት
  english_pob_reading: serpents (with lexical uncertainty)
  chosen_spanish_reading: las serpientes
  alternative_spanish_readings:
  - seres serpentinos
  - sierpes
  rationale: El testimonio auditado en inglés reconoce la incertidumbre léxica pero conserva el sentido serpentino tradicional. En español conviene mantener esa misma tensión con una traducción directa y una nota.
  doctrine_reference: Transparencia textual y respeto por la incertidumbre léxica documentada.
translation_notes:
  revision_awareness: El testimonio inglés auditado presenta alta concordancia y no registra revisiones sustantivas; se conserva el mismo sentido global, con español idiomático y una nota para la ambigüedad léxica de «serpientes».
  spanish_consistency_notes:
  - Se prefiere «Paraíso» con mayúscula por tratarse de un ámbito celestial nominalizado.
  - Se conserva la transliteración Gabriʾel para alineación con la tradición etiópica del texto base.
  - «Los ángeles santos» mantiene el registro elevado sin introducir una fórmula eclesiástica ajena al pasaje.
