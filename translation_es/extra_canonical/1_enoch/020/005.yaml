translation:
  language: es
  text: Mikael[a], uno de los santos ángeles, que ha sido puesto sobre el bien de la humanidad y sobre el pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma ge'ez puede reflejar la escritura del nombre propia de la tradición etiópica; «Miguel» sería la equivalencia española habitual.
    reason: lexical_alternative
  - marker: b
    text: El ge'ez de esta cláusula es difícil. También puede entenderse como «sobre el buen orden del pueblo» o «sobre los buenos de entre el pueblo».
    reason: alternative_reading
lexical_decisions:
- source_word: ሚካኤል
  english_pob_choice: Mikael
  chosen_spanish: Mikael
  alternatives_spanish:
  - Miguel
  lexicon: tradición léxica ge'ez
  rationale: Se conserva la forma transliterada cercana al ge'ez, en línea con el tratamiento del nombre propio en el texto auditado; 'Miguel' es la equivalencia española más conocida, pero no sigue tan de cerca la forma fuente.
- source_word: ፩እምነ
  english_pob_choice: one of
  chosen_spanish: uno de
  alternatives_spanish:
  - de entre
  lexicon: tradición léxica ge'ez
  rationale: La construcción marca pertenencia a un grupo; 'uno de' es la forma natural y fiel en español.
- source_word: መላእክት ቅዱሳን
  english_pob_choice: the holy angels
  chosen_spanish: los santos ángeles
  alternatives_spanish:
  - los ángeles santos
  - los ángeles, los santos
  lexicon: tradición léxica ge'ez
  rationale: '''Santos'' conserva el valor de la cualidad atribuida a los ángeles y suena más natural en español bíblico que una calca más rígida.'
- source_word: እሰመ
  english_pob_choice: who is set over
  chosen_spanish: que ha sido puesto sobre
  alternatives_spanish:
  - que está sobre
  - que ha sido नियुक्तado sobre
  lexicon: tradición léxica ge'ez
  rationale: La decisión inglesa corregida en el audit trail apunta a un verbo de asignación/puesta en cargo. 'Ha sido puesto sobre' conserva la idea de designación y evita traducir el error OCR por 'mandato' o 'comando'.
- source_word: ሠናይቱ
  english_pob_choice: the good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el buen orden
  lexicon: tradición léxica ge'ez
  rationale: El sustantivo sustantivado es ambiguo; 'el bien' permite mantener la apertura semántica sin forzar una interpretación moralista o abstracta excesiva.
- source_word: ለሰብእ
  english_pob_choice: mankind
  chosen_spanish: de la humanidad
  alternatives_spanish:
  - de los hombres
  - de la gente
  lexicon: tradición léxica ge'ez
  rationale: La referencia es general y colectiva; 'humanidad' es la mejor equivalencia inclusiva y clara en español contemporáneo.
- source_word: ዲበ ሕዝብ
  english_pob_choice: and over the people
  chosen_spanish: y sobre el pueblo
  alternatives_spanish:
  - y sobre la gente
  - y acerca del pueblo
  lexicon: tradición léxica ge'ez
  rationale: Se sigue la relación de jurisdicción/encargo indicada por la preposición en el contexto; 'pueblo' reproduce bien el valor colectivo del término.
theological_decisions:
- issue: Alcance del encargo de Mikael
  english_pob_reading: Mikael is described as overseeing a beneficent command or ordering related to the people.
  chosen_spanish_reading: Mikael es presentado como puesto al frente del bien de la humanidad y del pueblo.
  alternative_spanish_readings:
  - Mikael está sobre el buen orden del pueblo
  - Mikael está sobre los bienes de la humanidad
  rationale: El testimonio ge'ez corregido por el audit trail no apoya 'mandato' ni 'comando'. La redacción española mantiene la tensión entre una esfera de bien/bondad y una función de supervisión, sin resolverla de manera especulativa.
  doctrine_reference: Preservar la tensión textual y evitar sobreinterpretación; fidelidad al dominio asignado en el texto fuente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección del audit trail que identifica un error OCR severo en la lectura ''command for the people''. La versión española evita esa lectura y sigue la interpretación revisada: ''puesto sobre el bien de la humanidad y sobre el pueblo''.'
  spanish_consistency_notes:
  - Se mantiene 'Mikael' según la forma etiópica usada en el audit trail.
  - Se evita 'SEÑOR' o cualquier sustitución teológica no presente en el texto.
  - '''Santos ángeles'' conserva el valor descriptivo del adjetivo sin introducir tecnicismos adicionales.'
  - La ambigüedad entre 'bien', 'bienes' y 'buen orden' queda preservada en la nota, no resuelta en el cuerpo del texto.
