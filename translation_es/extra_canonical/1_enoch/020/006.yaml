translation:
  language: es
  text: Saraqael[a], uno de los ángeles santos, que está a cargo de los espíritus de los hijos de los hombres que pecan.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La parte media de la línea etiópica del OCR es incierta. Una comprensión ampliamente atestiguada de este versículo es que Saraqael está puesto sobre «los espíritus de la humanidad que peca» o una formulación similar.
    reason: textual_variant
  - marker: b
    text: 'O: «los espíritus de los que pecan en el espíritu».'
    reason: previous_rendering
lexical_decisions:
- source_word: ሰራቃኤል
  english_pob_choice: Saraqael
  chosen_spanish: Saraqael
  alternatives_spanish:
  - Sariel
  lexicon: Tradición onomástica ge'ez
  rationale: Se translitera el nombre propio; la forma Saraqael conserva de cerca el testimonio etiópico y coincide con la opción principal del POB inglés.
- source_word: ፩እምነ
  english_pob_choice: one of
  chosen_spanish: uno de
  alternatives_spanish:
  - uno entre
  - uno de entre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión partitiva indica que Saraqael pertenece a un grupo mayor; en español, 'uno de' es natural y preciso.
- source_word: መላእክት፡ ቅዱሳን
  english_pob_choice: the holy angels
  chosen_spanish: los santos ángeles
  alternatives_spanish:
  - los ángeles santos
  - los ángeles sagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Santos ángeles'' reproduce el registro apocalíptico y mantiene el matiz de seres apartados para Dios; ''santos'' es más idiomático que ''sagrados'' en este contexto.'
- source_word: ዘዲበ
  english_pob_choice: who is over
  chosen_spanish: que está sobre
  alternatives_spanish:
  - que tiene a su cargo
  - que ha sido puesto sobre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición y el verbo expresan supervisión o autoridad. 'Está sobre' conserva la idea de cargo sin cargar demasiado el español.
- source_word: መናፍስት
  english_pob_choice: the spirits
  chosen_spanish: los espíritus
  alternatives_spanish:
  - espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el plural y el artículo, porque el texto identifica una clase concreta bajo la vigilancia angélica.
- source_word: እጓለ፡ እመሕያው / OCR uncertainty in bracketed middle phrase
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - la humanidad
  - los seres humanos
  lexicon: Charles 1906 OCR witness; Ge'ez idiom recognized in revision history
  rationale: Aunque el OCR del paquete muestra una forma defectuosa, la revisión del propio POB inglés identifica el modismo ge'ez estándar 'hijos de los hombres'. En español se traduce de manera literal y transparente como 'los hijos de los hombres'.
- source_word: ዘመናፍስት ያኃጥኡ
  english_pob_choice: who sin
  chosen_spanish: que pecan
  alternatives_spanish:
  - que cometen pecado
  - que transgreden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa acción moral de pecado. 'Pecan' es la forma más natural y fiel en español bíblico contemporáneo.
theological_decisions:
- issue: Identidad de quienes están bajo la autoridad de Saraqael
  english_pob_reading: spirits of the children of men who sin
  chosen_spanish_reading: los espíritus de los hijos de los hombres que pecan
  alternative_spanish_readings:
  - los espíritus de la humanidad que peca
  - los espíritus de los hombres que pecan
  rationale: Se sigue la revisión más reciente del POB inglés y el reconocimiento del modismo ge'ez para 'hijos de los hombres'. Así se conserva el objeto humano de la autoridad de Saraqael y la asociación con el pecado sin introducir interpretaciones adicionales.
  doctrine_reference: Evitar resolver la tensión textual con una paráfrasis; mantener la referencia a la humanidad pecadora tal como la revisión textual la recupera.
translation_notes:
  revision_awareness: El texto etiópico recibido muestra una lectura OCR defectuosa en la parte media, pero la auditoría inglesa más reciente corrige esa zona a un modismo ge'ez estándar para «los hijos de los hombres». Por eso el español sigue la revisión más reciente y no conserva una redacción ambigua o corrupta en el cuerpo principal.
  spanish_consistency_notes:
  - Se usa 'Saraqael' para mantener coherencia con la transliteración principal del POB inglés.
  - Se evita 'SEÑOR' o equivalentes de máscara porque el versículo no contiene el Tetragrámaton.
  - Se conserva 'santos ángeles' como término de registro apocalíptico, no como simple adjetivo devocional.
  - '''Pecan'' se mantiene en lenguaje bíblico natural y no se atenúa a una expresión más genérica.'
