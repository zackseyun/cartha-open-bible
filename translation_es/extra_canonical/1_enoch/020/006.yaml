revisions:
- from: Saraqael[a], uno de los santos ángeles[b], que está sobre los espíritus de los hijos de los hombres que pecan.
  to: Saraqael[a], uno de los ángeles santos, que está a cargo de los espíritus de los hijos de los hombres que pecan.[b]
  rationale: La traducción principal es básicamente fiel, pero necesita una reparación menor para alinear las notas al pie con el rastro de auditoría del POB inglés y para mejorar la naturalidad del español. Se mantiene la lectura revisada 'los espíritus de los hijos de los hombres que pecan', pero se sustituyen las notas por las documentadas en el expediente y se mejora la formulación a 'ángeles santos' y 'está a cargo de'.
