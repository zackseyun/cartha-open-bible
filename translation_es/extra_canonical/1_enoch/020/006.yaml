    issue: Las notas al pie españolas no corresponden al expediente inglés vigente.
    rationale: La nota [a] del inglés trata la incertidumbre textual del segmento etiópico; la española habla de transliteración del nombre. La nota [b] del inglés conserva una alternativa interpretativa sobre la cláusula final; la española solo da una variante estilística ('los ángeles santos').
  - severity: low
    issue: '''Los santos ángeles'' es menos idiomático que ''los ángeles santos''.'
    rationale: Ambas opciones son fieles, pero en español bíblico-natural 'los ángeles santos' fluye mejor y además coincide con la alternativa ya reconocida en el propio borrador.
  - severity: low
    issue: '''Que está sobre'' suena algo calcado.'
    rationale: La idea de supervisión de ዘዲበ se expresa con más naturalidad en español mediante 'que está a cargo de', sin perder el sentido jerárquico.
  revised_spanish_text: Saraqael[a], uno de los ángeles santos, que está a cargo de los espíritus de los hijos de los hombres que pecan.[b]
