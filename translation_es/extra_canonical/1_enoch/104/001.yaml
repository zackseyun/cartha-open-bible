translation:
  language: es
  text: Les juro que en el cielo los ángeles los recuerdan para bien, delante de la gloria del Grande.[a][b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El ge''ez conservado es breve pero suficiente para la idea general: un juramento dirigido a los oyentes. Se opta por la formulación solemne ''Les juro'' para reflejar esa apertura enfática de manera natural en español.'
    reason: textual_variant
  - marker: b
    text: La expresión 'en el cielo' sigue de cerca el texto visible y mantiene el marco celestial del pasaje. Otras traducciones amplían el sentido con lenguaje más interpretativo.
    reason: alternative_reading
  - marker: c
    text: '''Delante de la gloria del Grande'' conserva el cierre reverente del texto. La frase final es corta en el testimonio ge''ez transmitido, por lo que no se introduce aquí una expansión interpretativa.'
    reason: source_note
lexical_decisions:
- source_word: እምሕል፡ ለክሙ፡
  english_pob_choice: I swear to you
  chosen_spanish: Juro a ustedes
  alternatives_spanish:
  - Les aseguro
  - Les juro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez expresa una fórmula enfática de juramento/aseveración dirigida al auditorio. En español, 'Juro a ustedes' conserva la fuerza solemne y la dirección plural del original, sin introducir una paráfrasis ajena.
- source_word: በሰማይ፡
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo de Dios
  - en los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sintagma visible es directo y espacial. 'En el cielo' comunica bien el ámbito celestial sin sobrecargarlo con una glosa interpretativa.
- source_word: መላእክት፡
  english_pob_choice: the angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - los mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez corresponde claramente a 'ángeles'. Se mantiene el término estándar y fiel al texto auditado.
- source_word: ይዜከሩ፡
  english_pob_choice: remember
  chosen_spanish: recuerdan
  alternatives_spanish:
  - memoran
  - tienen presente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo remite a recordar o tener en memoria. 'Recuerdan' es la opción más natural y directa en español, preservando el sentido de memorial/recuerdo sin añadir la carga forense de 'escrito' que no está en el ge'ez visible.
- source_word: በእንቲአክሙ፡ ለሠናይ፡
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - en favor de ustedes
  - con propósito bueno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia expresa beneficio o resultado favorable respecto de los destinatarios. 'Para bien' reproduce esa orientación benéfica de manera concisa y bíblica en español.
- source_word: ቅድመ፡
  english_pob_choice: before the glory of the Great One
  chosen_spanish: delante de la gloria del Grande
  alternatives_spanish:
  - ante la gloria del Grande
  - en presencia de la gloria del Grande
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El final conservado apunta a una escena de presencia/corte celestial. 'Delante de' mantiene la relación espacial y judicial del original, y 'el Grande' traduce el título reverente sin sustituirlo por una fórmula doctrinal posterior.
theological_decisions:
- issue: 'La escena celestial: recuerdo angelical ante la gloria divina'
  english_pob_reading: The verse speaks of the righteous being remembered by angels in heaven before the glory of the Great One.
  chosen_spanish_reading: El versículo presenta a los ángeles recordando a los destinatarios en el cielo para su bien, delante de la gloria del Grande.
  alternative_spanish_readings:
  - los ángeles tienen presente a los destinatarios en el cielo
  - su memorial está delante de la gloria del Grande
  rationale: El texto ge'ez disponible favorece de forma clara la lectura de ángeles que recuerdan, no de un memorial escrito. Mantener ese sentido evita ocultar la imagen explícita del original y respeta la revisión crítica del audit trail.
  doctrine_reference: Preservar la imaginería apocalíptica y la mediación angelical propia de 1 Enoc, sin nivelarla a un mero recuerdo abstracto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión crítica que corrigió una antigua mistraducción en el contexto inglés. A diferencia del borrador anterior, esta versión sigue el ge''ez visible: juramento inicial, ángeles como sujeto, recuerdo/consideración benéfica y la escena de presencia delante de la gloria del Grande. No se adopta la lectura alternativa sobre memorial escrito porque no está sustentada por el texto fuente proporcionado.'
  spanish_consistency_notes:
  - Se usa 'ángeles' de forma consistente con መላእክት፡.
  - Se evita 'Cristo' o 'SEÑOR' porque el texto no los contiene.
  - '''Para bien'' conserva el valor benefactivo de ''ለሠናይ፡'' sin sobreinterpretar.'
  - '''El Grande'' mantiene el título reverente del original sin introducir una glosa cristiana posterior.'
