translation:
  language: es
  text: Y de allí fui hacia el oriente, hasta los confines del cielo[a], y vi tres portales abiertos en el cielo hacia el oriente[b], y sobre ellos portales pequeños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio usado anteriormente para este versículo conservaba solo la frase conectiva «Y de allí». La traducción inglesa primero retuvo esa forma fragmentaria antes de restaurarse el texto completo a partir del testimonio corregido.
    reason: textual_variant
  - marker: b
    text: O «Y de allí—».
    reason: previous_rendering
lexical_decisions:
- source_word: ወ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Entonces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La conjunción enlaza la visión con lo anterior sin añadir matiz temporal excesivo; en español, 'Y' conserva esa continuidad narrativa de forma natural.
- source_word: እምህየ
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El deíctico indica origen o separación desde un lugar ya mencionado. 'De allí' es breve, natural y fiel al valor espacial.
- source_word: መንገለ፡ አዜብ / ምሥራቅ
  english_pob_choice: toward the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - al oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El geʿez apunta a la dirección del oriente. 'Oriente' mantiene un registro bíblico digno sin perder inteligibilidad; 'este' sería más llano pero menos solemne.
- source_word: በአጽናፈ፡ ምድር / በአጽናፈ፡ ሰማይ
  english_pob_choice: to the ends of heaven
  chosen_spanish: hasta los confines del cielo
  alternatives_spanish:
  - hasta los extremos del cielo
  - hasta el fin del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión idiomática mantiene la imagen de límite extremo. 'Confines' conserva mejor el carácter poético y espacial que una traducción más literal pero menos natural.
- source_word: ሠለስተ፡ ኀዋኅወ፡ ሰማይ
  english_pob_choice: three open portals of heaven
  chosen_spanish: tres portales abiertos del cielo
  alternatives_spanish:
  - tres puertas abiertas del cielo
  - tres aberturas abiertas del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Portales'' traduce el valor de ''openings/gates'' con tono elevado y coherente con la imaginería visionaria. ''Puertas'' es una alternativa posible, pero ''portales'' evita asociar demasiado el término a una puerta física moderna.'
- source_word: ርኅዋተ
  english_pob_choice: open
  chosen_spanish: abiertos
  alternatives_spanish:
  - abiertas
  - abiertos y abiertas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se refiere a 'portales' masculinos en español; 'abiertos' refleja el estado de apertura sin alterar la concordancia.
- source_word: ንኡሳን
  english_pob_choice: small portals
  chosen_spanish: portales pequeños
  alternatives_spanish:
  - pequeños portales
  - portales menores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pequeños'' expresa tamaño directamente y conserva la imagen de varios portales superiores de menor dimensión.'
theological_decisions:
- issue: Orden y extensión de la escena visionaria
  english_pob_reading: The verse describes a movement to the east and a vision of heavenly portals; the earlier English audit noted a truncation problem, but the restored reading gives the complete scene.
  chosen_spanish_reading: La traducción reproduce el desplazamiento hacia el oriente y la visión de los portales celestiales sin añadir elementos interpretativos.
  alternative_spanish_readings:
  - Una versión más libre podría explicitar 'puertas del cielo' o 'aberturas celestes'
  - Podría suavizarse 'confines del cielo' a 'extremos del cielo'
  rationale: No hay una carga doctrinal especial aquí, pero sí una escena apocalíptica precisa. Conviene conservar la imaginería espacial y la relación entre cielo y portales sin paráfrasis expansiva.
  doctrine_reference: Apocalíptica visionaria; fidelidad imagística, sin implicación doctrinal explícita.
translation_notes:
  revision_awareness: La base inglesa previa quedó corregida por auditoría para reflejar el texto completo de 1 Enoc 36:2; esta versión española sigue ese texto restaurado y no la forma fragmentaria anterior.
  spanish_consistency_notes:
  - Se mantuvo 'oriente' para la dirección geográfica, en coherencia con el registro bíblico y visionario.
  - '''Portales'' se usa de manera consistente para ኀዋኅወ en vez de ''puertas'', salvo que el contexto requiriera una lectura más doméstica o narrativa.'
  - No se introdujo 'SEÑOR' ni otras sustituciones reverenciales, porque el verso no contiene el Tetragrámaton ni una cita divina explícita.
  - Las notas al pie están ancladas exactamente en los segmentos marcados [a] y [b], sin marcadores sueltos.
