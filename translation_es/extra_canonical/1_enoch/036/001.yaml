translation:
  language: es
  text: Y desde allí fui hacia el sur, hasta los confines de la tierra; y allí vi tres portales abiertos en el cielo[a], y de allí salen el viento del sur, el rocío[b], la lluvia y el viento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La imagen de los «portales del cielo» refleja una cosmografía visionaria: el cielo se presenta como si tuviera aberturas por donde salen los fenómenos meteorológicos.'
    reason: cultural_note
  - marker: b
    text: El ge'ez ጠል se entiende aquí como «rocío»; también puede traducirse «niebla».
    reason: lexical_alternative
lexical_decisions:
- source_word: እምህየ
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: Dillmann
  rationale: La fórmula narrativa de transición se expresa de manera natural en español con «desde allí», conservando el movimiento del relato sin añadir matices.
- source_word: ሖርኩ
  english_pob_choice: I went
  chosen_spanish: fui
  alternatives_spanish:
  - anduve
  - viajé
  lexicon: Dillmann
  rationale: El verbo de movimiento en primera persona se puede traducir de forma sobria con «fui», que mantiene el estilo descriptivo y no sobreinterpreta la intensidad del desplazamiento.
- source_word: መንገለ አዜብ
  english_pob_choice: toward the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - en dirección al sur
  lexicon: Dillmann
  rationale: La expresión marca dirección geográfica; «hacia el sur» es claro y fiel al valor direccional del sintagma.
- source_word: በአጽናፈ ምድር
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta el fin de la tierra
  lexicon: Dillmann
  rationale: Se conserva el lenguaje apocalíptico-cósmico. «Confin​es» comunica bien la idea de borde/extremo sin aplanar la imagen cosmográfica.
- source_word: ሠለስተ ኆዋኅወ ሰማይ
  english_pob_choice: three open portals of heaven
  chosen_spanish: tres portales abiertos del cielo
  alternatives_spanish:
  - tres ventanas abiertas del cielo
  - tres aberturas del cielo
  lexicon: Dillmann
  rationale: Se mantiene la imagen arquitectónica visionaria. «Portales» preserva el carácter cósmico y «abiertos» refleja el estado de las aberturas.
- source_word: ወይወፅእ እምህየ
  english_pob_choice: and from there come out
  chosen_spanish: y de allí salen
  alternatives_spanish:
  - y de allí salen hacia afuera
  - y de allí brotan
  lexicon: Dillmann
  rationale: En una descripción visionaria de fenómenos meteorológicos, el presente descriptivo «salen» resulta natural en español y conserva el valor iterativo/observacional.
- source_word: አዜብ
  english_pob_choice: the south wind
  chosen_spanish: el viento del sur
  alternatives_spanish:
  - el viento austral
  - el viento del sur
  lexicon: Dillmann
  rationale: En este contexto meteorológico el término remite al viento procedente del sur; «viento del sur» es transparente y evita confundirlo con la sola dirección cardinal.
- source_word: ጠል
  english_pob_choice: dew
  chosen_spanish: el rocío
  alternatives_spanish:
  - el rocío
  - el relente
  lexicon: Dillmann
  rationale: El audit trail revisado favorece «dew». En español, «rocío» es el equivalente más natural y preciso para ese elemento meteorológico distintivo.
- source_word: ዝናም
  english_pob_choice: rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - la lluvia
  - la precipitación
  lexicon: Dillmann
  rationale: Término meteorológico directo y estándar; «lluvia» conserva la sencillez del original.
- source_word: ነፋስ
  english_pob_choice: wind
  chosen_spanish: el viento
  alternatives_spanish:
  - el aire
  - la brisa
  lexicon: Dillmann
  rationale: Aquí el sentido es físico-meteorológico; «viento» evita una lectura espiritual indebida y corresponde al listado de fenómenos que salen de los portales.
theological_decisions:
- issue: Imaginería cósmica de los portales del cielo
  english_pob_reading: portals of heaven
  chosen_spanish_reading: portales abiertos del cielo
  alternative_spanish_readings:
  - ventanas del cielo
  - aberturas del cielo
  rationale: Se preserva la cosmografía visionaria sin rebajarla a una formulación más familiar o bíblica tradicional. «Portales» mantiene la arquitectura celestial implícita en el texto.
  doctrine_reference: Preservar la imaginería apocalíptica y no diluir la geografía cósmica del pasaje.
- issue: Rocío como entidad meteorológica diferenciada
  english_pob_reading: dew
  chosen_spanish_reading: rocío
  alternative_spanish_readings:
  - llovizna fina
  - niebla
  rationale: El audit trail revisado corrige la opción «mist» y confirma que el ge'ez ጠል designa «dew». En español, «rocío» comunica mejor esa realidad meteorológica específica y evita perder la taxonomía cósmica del texto.
  doctrine_reference: Respetar la distinción de fenómenos creada en la cosmología de 1 Enoc, sin modernizarla de forma reductiva.
translation_notes:
  revision_awareness: 'El audit trail inglés registra una revisión importante: la palabra ge''ez ጠል fue corregida de ''mist'' a ''dew''. Esta elección se ha seguido en español con «rocío», manteniendo además la otra revisión menor que preserva el listado meteorológico sin duplicaciones. También se ha respetado la imagen apocalíptica de los tres portales abiertos del cielo.'
  spanish_consistency_notes:
  - Se usó «Y» al inicio para reflejar la coordinación narrativa del original.
  - «Confin​es de la tierra» conserva el alcance cosmográfico del pasaje.
  - 'Se mantuvo la serie de fenómenos en orden: viento del sur, rocío, lluvia y viento.'
  - No se introdujo lenguaje eclesiástico tradicional ajeno al texto; se conservó la imaginería visionaria del original.
