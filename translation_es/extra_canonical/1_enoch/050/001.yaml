revisions:
- from: Y en aquellos días vendrá un cambio para los santos[a] y los escogidos[b].
  to: Y en aquellos días vendrá un cambio[a] para los consagrados y los escogidos.
  rationale: Se conserva la estructura y el sentido del borrador, pero se corrige «santos» a «consagrados» para reflejar mejor la decisión fuente «holy ones» y evitar asociaciones eclesiásticas posteriores. También se mueve la nota al término «cambio», que es donde realmente corresponde la aclaración léxica sobre ሚጠት. Se elimina la segunda nota por innecesaria.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:25:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'La idea principal está bien alineada con la fuente auditada: በእማንቱ መዋዕል = «en aquellos días», ሚጠት = «cambio» y no «misericordia», ትከውን con matiz ingresivo = «vendrá», y ወለኅሩያን = «los escogidos». Sin embargo, «los santos» para ለቅዱሳን se aparta del razonamiento documentado del POB, que prefirió «holy ones» precisamente para evitar asociaciones eclesiásticas posteriores; en español, «los santos» también introduce ese riesgo. Además, la nota [a] está anclada a «santos», pero comenta ሚጠት, por lo que el anclaje es incorrecto.'
  spanish_quality_summary: 'El español es fluido y legible, pero puede mejorarse con una opción más transparente y menos cargada doctrinalmente: «los consagrados» o «los santos consagrados» según contexto. Aquí «los consagrados» suena natural y preserva mejor el valor descriptivo. También conviene mover la nota léxica sobre «cambio» al término correspondiente y dejar «escogidos» sin nota, ya que la alternativa «elegidos» no es necesaria en una frase tan breve.'
  glossary_alignment: Alineación parcial. «un cambio» y «los escogidos» siguen bien el expediente. La principal desviación es ለቅዱሳን -> «los santos», frente al principio del proyecto y la decisión inglesa «holy ones». No hay conflicto con la terminología mayor del proyecto (Yahvé, Mesías, etc.) en este versículo.
  issues:
  - severity: medium
    issue: «los santos» introduce una asociación eclesiástica no favorecida por la decisión base
    rationale: El expediente inglés eligió «holy ones» en vez de «saints» para evitar resonancias eclesiásticas posteriores. En español, «santos» acarrea el mismo problema; «consagrados» o «los santos» con nota no es tan fiel al razonamiento documentado como una formulación más descriptiva.
  - severity: medium
    issue: La nota [a] está anclada al término equivocado
    rationale: La nota explica ሚጠት («cambio/reversión», no «misericordia»), pero aparece tras «santos». Las notas deben anclarse al término pertinente en el texto.
  - severity: low
    issue: La nota [b] sobre «escogidos/elegidos» no es necesaria aquí
    rationale: La traducción principal «escogidos» ya es clara y fiel; la nota añade poco y recarga innecesariamente un versículo breve.
  revised_spanish_text: Y en aquellos días vendrá un cambio[a] para los consagrados y los escogidos.
  revised_footnotes:
  - marker: a
    text: O «una reversión». El ge'ez ሚጠት expresa un cambio o giro de estado, no «misericordia».
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y el sentido del borrador, pero se corrige «santos» a «consagrados» para reflejar mejor la decisión fuente «holy ones» y evitar asociaciones eclesiásticas posteriores. También se mueve la nota al término «cambio», que es donde realmente corresponde la aclaración léxica sobre ሚጠት. Se elimina la segunda nota por innecesaria.
