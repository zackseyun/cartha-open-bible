translation:
  language: es
  text: Y en aquellos días vendrá un cambio[a] para los consagrados y los escogidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una reversión». El ge'ez ሚጠት expresa un cambio o giro de estado, no «misericordia».
    reason: lexical_alternative
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Formula apocalíptica temporal fija. «Días» conserva mejor el ritmo y la idiomática visionaria que «tiempos».
- source_word: ሚጠት
  english_pob_choice: a change
  chosen_spanish: un cambio
  alternatives_spanish:
  - una transformación
  - una mudanza
  - una reversión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrigió la lectura errónea «mercy» y estableció el sentido de «change/turning». «Cambio» es la opción más directa y sobria en español; «reversión» explicita más el giro de fortuna, pero es más interpretativa.
- source_word: ትከውን
  english_pob_choice: shall come
  chosen_spanish: vendrá
  alternatives_spanish:
  - será
  - llegará a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo copulativo/ingresivo admite «ser» o «llegar a ser», pero en español «vendrá» comunica con naturalidad la irrupción del cambio sin forzar una perífrasis.
- source_word: ለቅዱሳን
  english_pob_choice: for the holy ones
  chosen_spanish: para los santos
  alternatives_spanish:
  - para los santos consagrados
  - para los santos/los consagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La etiqueta enochica de personas santas permite «santos» en español por claridad y tradición bíblica, aunque «santos» puede sonar eclesial. Se mantiene el término más inteligible y se anota la alternativa conceptual en la decisión léxica.
- source_word: ወለኅሩያን
  english_pob_choice: and the chosen ones
  chosen_spanish: y los escogidos
  alternatives_spanish:
  - y los elegidos
  - y los seleccionados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» conserva el paralelismo bíblico y evita cargar de más el término con sistemas doctrinales posteriores asociados a «elegidos». Es más natural en español actual que «los elegidos» en algunos contextos.
theological_decisions:
- issue: Cómo reflejar la relación entre juicio y benevolencia divina en un «cambio» que sobreviene a los justos
  english_pob_reading: The passage describes a change coming for the holy ones and the chosen ones, preserving the open tension of the original without resolving it into mercy language.
  chosen_spanish_reading: El texto habla de un cambio que vendrá para los santos y los escogidos, sin convertirlo en una afirmación explícita de «misericordia».
  alternative_spanish_readings:
  - vendrá misericordia para los santos y los escogidos
  - vendrá compasión para los santos y los escogidos
  rationale: La revisión textual mostró que ሚጠት significa «cambio/turning», no «misericordia». Por fidelidad a la fuente, se mantiene la idea de reversión o cambio de estado, dejando intacta la tensión apocalíptica del pasaje.
  doctrine_reference: Primacía del léxico original sobre lecturas devocionales; preservar la tensión teológica documentada en la revisión auditable.
translation_notes:
  revision_awareness: La traducción toma en cuenta la corrección de revisión que descartó «mercy» y estableció ሚጠት como «change/turning». También incorpora la ampliación del texto fuente restaurada por la auditoría, manteniendo la cláusula completa de 1 Enoc 50:1 y evitando la traducción truncada previa.
  spanish_consistency_notes:
  - Se mantiene «santos» para ቅዱሳን y «escogidos» para ኅሩያን para conservar el paralelismo.
  - Se evita «SEÑOR» porque aquí no aparece YHWH en el texto base; el nombre divino no requiere sustitución en este versículo.
  - La puntuación final con punto simple refleja una sola cláusula completa en español, sin añadir material no sustentado por el fragmento fuente.
