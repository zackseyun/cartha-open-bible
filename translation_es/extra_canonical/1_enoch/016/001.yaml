translation:
  language: es
  text: Desde los días de la matanza, la destrucción y la muerte de los gigantes, los espíritus que han salido de sus almas y de su carne[a] destruirán sin incurrir en juicio[b]; así destruirán hasta el día de la consumación del gran juicio, cuando la gran era sea llevada a su fin[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase 'los espíritus que han salido de sus almas y de su carne' es una traducción muy literal de una expresión difícil del ge'ez. Probablemente se refiere a espíritus desencarnados asociados con la descendencia de los Vigilantes en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''sin juicio''. La redacción principal conserva la idea de actuar sin quedar sujetos al juicio todavía.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''cuando el gran orden del mundo llegue a su consumación''. El término ge''ez puede significar ''era'' o ''mundo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እመዋዕለ
  english_pob_choice: From the days of
  chosen_spanish: Desde los días de
  alternatives_spanish:
  - En los días de
  - A partir de los días de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición con 'días' marca un punto de inicio temporal. 'Desde los días de' conserva mejor el arranque de la acción que un simple 'en los días de'.
- source_word: ቀትል
  english_pob_choice: slaughter
  chosen_spanish: matanza
  alternatives_spanish:
  - matanza sangrienta
  - muerte violenta
  - degüello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'matanza' comunica el sentido colectivo y violento del término en el marco de juicio apocalíptico, sin sonar excesivamente arcaico.
- source_word: ሙስና
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - devastación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Destrucción'' es la correspondencia directa y natural en español para el daño catastrófico del contexto.'
- source_word: ሞተ
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - morir
  - muerte causada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Completa la tríada de calamidad con un sustantivo claro y fiel al original.
- source_word: ረዓይትኒ
  english_pob_choice: the giants
  chosen_spanish: los gigantes
  alternatives_spanish:
  - los nefilim
  - los seres gigantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige la omisión previa: el término corresponde explícitamente a ''giants''. ''Gigantes'' es el equivalente español normal y mantiene la referencia intertextual del libro de Enoc.'
- source_word: ወፅአ መናፍስት እምነፍሳት ሥጋሆሙ
  english_pob_choice: the spirits that have gone out from their souls and from their flesh
  chosen_spanish: los espíritus que han salido de sus almas y de su carne
  alternatives_spanish:
  - los espíritus que han salido de sus cuerpos
  - los espíritus que han salido de sus almas y de su cuerpo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la rareza de la formulación original sin suavizarla. 'Almas' y 'carne' reflejan con mayor fidelidad la distinción del texto que reemplazarlas por 'cuerpos'.
- source_word: ሲይኩን
  english_pob_choice: shall
  chosen_spanish: destruirán
  alternatives_spanish:
  - destruirán de continuo
  - seguirán destruyendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo futuro en español transmite la fuerza consecutiva del giro verbal en la secuencia profética.
- source_word: ዘያማስን
  english_pob_choice: destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - hacer daño
  - devastar
  - oprimir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Destruir'' reproduce la severidad del acto atribuido a los espíritus y encaja con la serie ''matanza / destrucción / muerte''.'
- source_word: ዘእንበለ ኵነኔ
  english_pob_choice: without judgment
  chosen_spanish: sin incurrir en juicio
  alternatives_spanish:
  - sin juicio
  - sin condena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sin incurrir en juicio'' conserva la idea de actuar sin quedar sujetos a una sentencia/juicio, tal como refleja la lectura auditada ''without incurring judgment''.'
- source_word: እስከ ዕለተ ተፍጻሜት ኵነኔ ዐቢይ
  english_pob_choice: until the day of the completion of the great judgment
  chosen_spanish: hasta el día de la consumación del gran juicio
  alternatives_spanish:
  - hasta el día en que se complete el gran juicio
  - hasta el día de la terminación del gran juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Consumación'' conserva el matiz formal de completitud/culminación del sustantivo, y ''gran juicio'' sigue la auditable lectura del texto.'
- source_word: አመ ዓለም ዐቢይ ይትፌጸም
  english_pob_choice: when the great age shall be brought to an end
  chosen_spanish: cuando la gran era llegue a su fin
  alternatives_spanish:
  - cuando la gran edad se complete
  - cuando el gran mundo llegue a su fin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Era'' refleja la posible fuerza de ዓለም como edad/orden del mundo, y evita una traducción que suene a aniquilación del cosmos.'
theological_decisions:
- issue: Identidad de los espíritus y relación con los gigantes
  english_pob_reading: The verse speaks of the spirits issuing from embodied beings and continuing destructive activity until the final judgment.
  chosen_spanish_reading: El versículo habla de los espíritus que salen de los gigantes y continúan su actividad destructiva hasta el juicio final.
  alternative_spanish_readings:
  - El versículo habla de espíritus humanos en general que salen del cuerpo
  - El versículo se refiere más específicamente a los espíritus de los gigantes tras la muerte corporal
  rationale: La corrección auditada exige conservar a los gigantes como antecedente explícito. La traducción mantiene, sin resolver por completo, la relación difícil entre 'espíritus', 'almas' y 'carne', siguiendo la cautela del texto fuente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla por paráfrasis.
- issue: Sentido de ዓለም en la cláusula final
  english_pob_reading: age/world-order
  chosen_spanish_reading: era
  alternative_spanish_readings:
  - mundo
  - orden del mundo
  - edad
  rationale: '''Era'' comunica bien el valor escatológico de una etapa histórica/cósmica que llega a su término, sin imponer una lectura filosófica ajena al texto.'
  doctrine_reference: Primacía del lenguaje fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'Se incorporó la revisión auditada que corrige la omisión de ''los gigantes'' y se ajustó la cláusula final para reflejar la versión más reciente del contexto inglés: ''without incurring judgment'' y ''when the great age shall be brought to an end''. Se evitó volver a la lectura anterior que decía simplemente ''sin juicio'' o que omitía el antecedente explícito.'
  spanish_consistency_notes:
  - Se mantiene 'gigantes' para ረዓይት en coherencia con la corrección revisada del audit trail.
  - '''Almas'' y ''carne'' se conservan deliberadamente para no suavizar la rareza del sintagma ge''ez.'
  - '''Era'' se usa de manera consistente para ዓለም en sentido escatológico.'
  - Se evita 'SEÑOR' o equivalentes de máscara; no aplica en este versículo.
  - La puntuación separa claramente la tríada inicial y la cláusula relativa de los espíritus para facilitar la lectura pública.
