revisions:
- from: Desde los días de la matanza, la destrucción y la muerte de los gigantes, los espíritus que han salido de sus almas y de su carne destruirán sin incurrir en juicio[a]; así destruirán hasta el día de la consumación del gran juicio, cuando la gran era llegue a su fin.
  to: Desde los días de la matanza, la destrucción y la muerte de los gigantes, los espíritus que han salido de sus almas y de su carne[a] destruirán sin incurrir en juicio[b]; así destruirán hasta el día de la consumación del gran juicio, cuando la gran era sea llevada a su fin[c].
  rationale: Se propone una revisión menor, no por error grave, sino para alinear mejor el español con las notas y matices del POB auditado. Se añade una nota para la frase ge'ez difícil sobre 'almas' y 'carne', se conserva pero matiza 'sin incurrir en juicio' con una alternativa más simple, y se ajusta la cláusula final a una formulación más cercana a 'shall be brought to an end'.
