  language: en
  yaml_path: translation/extra_canonical/1_enoch/016/001.yaml
  text: From the days of the slaughter and destruction and death of the giants[a], the spirits that have gone out from their souls and from their flesh shall destroy without incurring judgment; thus they shall destroy until the day of the completion of the great judgment[d][c][b], when the great age shall be brought to an end.
  footnotes:
  - marker: a
    text: The opening clause is textually difficult in the OCR witness. The sense is that from the time marked by slaughter, destruction, and death, these spirits continue their ravaging activity.
    reason: textual_variant
  - marker: b
    text: '''The spirits that have gone out from the souls of their flesh'' is a very literal rendering of a difficult phrase. It likely refers to disembodied spirits associated with the Watchers'' offspring in the surrounding context.'
    reason: lexical_alternative
  - marker: c
    text: Or 'when the great world-order reaches its completion.' The Ge'ez term can carry the sense of 'age' or 'world.'
    reason: lexical_alternative
  - marker: d
    text: Or 'From the days of slaughter and destruction and death, the spirits'.
    reason: previous_rendering
