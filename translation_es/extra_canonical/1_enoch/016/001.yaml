    text: La frase 'los espíritus que han salido de sus almas y de su carne' es una traducción muy literal de una expresión difícil del ge'ez. Probablemente se refiere a espíritus desencarnados asociados con la descendencia de los Vigilantes en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''sin juicio''. La redacción principal conserva la idea de actuar sin quedar sujetos al juicio todavía.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''cuando el gran orden del mundo llegue a su consumación''. El término ge''ez puede significar ''era'' o ''mundo''.'
    reason: lexical_alternative
  revision_rationale: Se propone una revisión menor, no por error grave, sino para alinear mejor el español con las notas y matices del POB auditado. Se añade una nota para la frase ge'ez difícil sobre 'almas' y 'carne', se conserva pero matiza 'sin incurrir en juicio' con una alternativa más simple, y se ajusta la cláusula final a una formulación más cercana a 'shall be brought to an end'.
