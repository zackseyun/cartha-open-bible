lexical_decisions:
- source_word: እምቅድመ
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - antes que
  - previo a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma preposicional expresa prioridad temporal; en español, «antes de» comunica esa relación de manera natural y fiel sin añadir interpretación.
- source_word: ኵሉ
  english_pob_choice: these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - estas cosas
  - todo esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo sustantivado pide un referente global; «todas estas cosas» conserva el alcance total del sintagma y su valor deíctico.
- source_word: ተከብተ
  english_pob_choice: was hidden
  chosen_spanish: fue escondido
  alternatives_spanish:
  - fue ocultado
  - estuvo escondido
  lexicon: Gəʕəz lexical tradition as reflected in the audited English POB reading
  rationale: La lectura auditada entiende el verbo como pasivo de ocultación. «Fue escondido» mantiene la pasividad y el tono narrativo sin sobrecargar con un matiz más abstracto que «ocultado».
- source_word: ሄኖክ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Enoch
  lexicon: Biblical proper-name convention in Spanish
  rationale: La forma usual en español bíblico es «Enoc»; mantiene inteligibilidad y reconocimiento eclesial sin alterar el nombre propio.
theological_decisions:
- issue: Alcance del texto conservado en el testimonio ge'ez
  english_pob_reading: Translate only the extant clause as a short narrative statement without importing the fuller traditional verse from other editions.
  chosen_spanish_reading: Traducir únicamente la cláusula atestiguada, como una breve afirmación narrativa.
  alternative_spanish_readings:
  - Reconstruir el versículo completo a partir de otras tradiciones
  - Omitir el versículo por estar fragmentario
  rationale: El proyecto exige anclaje en el testimonio dado y no sustituirlo por una reconstrucción no atestiguada. Por eso se conserva la brevedad y se refleja la incertidumbre textual mediante nota.
  doctrine_reference: Primacía de la evidencia textual; preservar la ambigüedad cuando el testimonio es limitado
