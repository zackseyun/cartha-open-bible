translation:
  language: es
  text: Y vi otras montañas[c], en las cuales había árboles, y de ellas salió algo como néctar[b], cuyo nombre era serera[a] y galbano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación botánica de serera es incierta; el ge’ez parece conservar el nombre de una sustancia aromática más que un sustantivo descriptivo común.
    reason: lexical_alternative
  - marker: b
    text: Galbano es una resina aromática conocida en antiguas tradiciones de incienso; el término subyacente del ge’ez también podría dejarse transliterado como kelbene.
    reason: cultural_note
  - marker: c
    text: O «otra montaña, en la cual».
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y contemplé
  - Y observé
  lexicon: Dillmann
  rationale: La fórmula visionaria se expresa naturalmente en español con el perfecto simple «vi», que conserva el carácter de relato apocalíptico sin rigidizar la frase.
- source_word: ካልአነ
  english_pob_choice: other
  chosen_spanish: otras
  alternatives_spanish:
  - segundas
  - más
  lexicon: Dillmann
  rationale: El ge’ez es plural; «otras» refleja con claridad el valor distributivo y evita la singularización corregida por la revisión.
- source_word: አደባረ
  english_pob_choice: mountains
  chosen_spanish: montañas
  alternatives_spanish:
  - montes
  - cerros
  lexicon: Dillmann
  rationale: «Montañas» comunica bien el plural y la elevación del paisaje; mantiene la escala visionaria del texto.
- source_word: ዘቦ ውስቴቶሙ ዕፀወ
  english_pob_choice: in which there were trees
  chosen_spanish: en las cuales había árboles
  alternatives_spanish:
  - que tenían árboles en ellas
  - donde había árboles
  lexicon: Dillmann
  rationale: La construcción española con «en las cuales» conserva la relación locativa plural del ge’ez sin volverla pesada.
- source_word: ወይወፅእ እምኔሁ
  english_pob_choice: and from them there came out
  chosen_spanish: y de ellas salió
  alternatives_spanish:
  - y de ellas salía
  - y de ellas brotó
  lexicon: Dillmann
  rationale: «Salió» reproduce la salida de una sustancia desde esas montañas; «de ellas» sigue la corrección plural del texto fuente y del audit trail.
- source_word: ከመ ኔቄጥር
  english_pob_choice: something like nectar
  chosen_spanish: algo como néctar
  alternatives_spanish:
  - algo parecido a néctar
  - una sustancia como néctar
  lexicon: Dillmann
  rationale: La comparación exige un equivalente comparativo; «algo como néctar» conserva la imagen concreta de una exudación sin identificarla de manera indebida.
- source_word: ዘስሙ ሰረራ ወከልበኔ
  english_pob_choice: whose name was serera and galbanum
  chosen_spanish: cuyo nombre era serera y galbano
  alternatives_spanish:
  - llamado serera y galbano
  - cuyo nombre era serera y galbán
  lexicon: Dillmann
  rationale: «Serera» se translitera porque su identificación es incierta; «galbano» es el nombre español establecido para el aromático asociado a ከልበኔ, más claro que un simple préstamo.
theological_decisions:
- issue: Preservar la imaginería material de la visión en vez de espiritualizarla como mero aroma
  english_pob_reading: 'Retain a concrete exudation/substance image: ''there came out something like nectar'''
  chosen_spanish_reading: 'Conservar una imagen concreta de sustancia que sale de las montañas: «de ellas salió algo como néctar»'
  alternative_spanish_readings:
  - de ellas emanó un perfume
  - de ellas brotó una fragancia
  rationale: El pasaje describe rasgos visionarios concretos del paisaje; una sustancia comparada con néctar mantiene mejor la fuerza apocalíptica que una abstracción olfativa.
  doctrine_reference: Preservar la imaginería apocalíptica sin diluirla en prosa religiosa general.
translation_notes:
  revision_awareness: 'La revisión reciente corrigió un error importante de número: el ge’ez exige plural («otras montañas» / «de ellas»), no singular. La redacción española sigue esa corrección y conserva la estructura visionaria del original, junto con la identificación incierta de serera y la posible equivalencia de ከልበኔ con galbano.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de este versículo porque no aparecen en el texto fuente.
  - Se conserva «galbano» como término establecido en español para la resina aromática, mientras «serera» queda transliterado por incertidumbre lexical.
  - El orden de los complementos sigue el paralelismo del inglés auditado, pero la base es el ge’ez y su pluralidad explícita.
  - El estilo evita arcaísmos innecesarios y usa un español bíblico moderno, claro y publicable.
