translation:
  language: es
  text: Y sobre aquella montaña vi otra montaña, y dentro de ella había árboles; y aquellos árboles estaban llenos y eran robustos, como almendros.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ዲበ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre aquella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición introduce una ubicación visionaria elevada; «sobre» comunica bien la relación espacial sin sonar forzado en español.
- source_word: ደብር
  english_pob_choice: mountain
  chosen_spanish: montaña
  alternatives_spanish:
  - monte
  - cerro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Montaña» es la equivalencia natural y mantiene la imaginería topográfica repetida en el pasaje.
- source_word: ካልአ
  english_pob_choice: another
  chosen_spanish: otra
  alternatives_spanish:
  - una segunda
  - otra distinta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Indica otra montaña en secuencia narrativa; «otra» es la opción más natural en español.
- source_word: ውስቴቱ
  english_pob_choice: within it
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en su interior
  - en medio de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la idea de vegetación situada en o dentro de la montaña sin precisar en exceso la geografía.
- source_word: ዕፀወ
  english_pob_choice: trees
  chosen_spanish: árboles
  alternatives_spanish:
  - vegetación
  - plantas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo se entiende de manera concreta como árboles en la descripción visual del versículo.
- source_word: እልኩ
  english_pob_choice: those
  chosen_spanish: aquellos
  alternatives_spanish:
  - esos
  - dichos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo plural remite a los árboles ya mencionados; «aquellos» mantiene la distancia narrativa.
- source_word: ምሉኣን
  english_pob_choice: full
  chosen_spanish: llenos
  alternatives_spanish:
  - plenos
  - abundantes
  - frondosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo expresa plenitud o abundancia; «llenos» es literal y claro en español.
- source_word: ጽኑዕተ
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - firmes
  - robustos
  - duros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conviene una cualidad de robustez física; «fuertes» suena natural y conserva la fuerza descriptiva.
- source_word: ዘከመ ከርካዕ
  english_pob_choice: like almond trees
  chosen_spanish: como almendros
  alternatives_spanish:
  - como árboles de almendra
  - como almendros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión adjudicada corrige la comparación botánica a «almond trees»; en español «almendros» es el equivalente idiomático y fiel.
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente que corrige la lectura de እልኩ como demostrativo plural («aquellos») y de ከርካዕ como «almond trees»/almendros, evitando la lectura errónea anterior de «fragrant plants» y «carob». También se mantuvo la colocación final para que la comparación alcance la descripción completa de los árboles.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otros sustitutos porque no hay aquí lenguaje divino nominal.
  - Se preservó el tono visionario y descriptivo sin añadir glosas interpretativas al texto principal.
  - La elección de «almendros» sigue la revisión textual más fuerte del audit trail y es idiomática en español.
  - No se añadieron notas teológicas porque el versículo es descriptivo y no doctrinal.
