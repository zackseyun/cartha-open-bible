translation:
  language: es
  text: Y cuando trituran ese fruto[a][b][c], es mejor que toda fragancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La acción verbal es algo incierta en el testimonio ge'ez conservado. La revisión inglesa final entiende el sentido como una acción física sobre el fruto que libera su olor; también podría traducirse 'aplastan' o 'machacan'.
    reason: textual_variant
  - marker: b
    text: La cláusula puede destacar la excelencia del fruto específicamente por su olor, más que una cualidad general; por eso se conserva la comparación sensorial con 'fragancia'.
    reason: lexical_alternative
  - marker: c
    text: 'Una traducción anterior entendía: ''Y cuando toman ese fruto, es mejor que toda fragancia''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ተይነሥእዎ / yehēsewo (audit reading)
  english_pob_choice: they crush that fruit
  chosen_spanish: exprime[n] ese fruto
  alternatives_spanish:
  - trituran ese fruto
  - lo aplastan
  - frotan ese fruto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El hilo de revisión del POB indica una lectura corregida del gesto como acción física para liberar el aroma. En español, 'exprimir' comunica bien esa acción de presionar un fruto para extraer su fragancia sin añadir demasiada especificación mecánica. Mantengo una forma impersonal/plural entre corchetes para reflejar la oscilación del sujeto en la tradición textual y la vacilación del testimonio.
- source_word: ፍሬ
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - fruto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fruto'' conserva el tono bíblico y funciona mejor en español religioso que ''fruta'', que suena más doméstico. También deja abierta la referencia botánica/visionaria sin especificarla de más.'
- source_word: ይኄይስ
  english_pob_choice: it is better
  chosen_spanish: es mejor
  alternatives_spanish:
  - supera
  - es más excelente
  - vale más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación exige un equivalente natural en español. 'Es mejor' reproduce la fuerza evaluativa sin exagerar ni convertirla en una frase explicativa.
- source_word: እምኵሉ አፈው
  english_pob_choice: every fragrance
  chosen_spanish: toda fragancia
  alternatives_spanish:
  - toda fragancia
  - todo perfume
  - todo aroma
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fragancia'' preserva el campo semántico olfativo del texto y suena digna en español. ''Perfume'' puede sonar demasiado moderno o comercial; ''aroma'' es posible, pero ''fragancia'' mantiene mejor la valoración estética de la imagen.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: la primera lectura inglesa pasó de ''took up'' a una acción de fricción y luego a ''crush''. Dado que el testimonio ge''ez y la nota OCR siguen siendo inestables, la versión española evita fijar con demasiada rigidez un verbo técnico y opta por una imagen físicamente plausible y semánticamente abierta.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió 'fruto' y 'fragancia' por coherencia con el tono visionario y sensorial del pasaje.
  - La puntuación y el orden siguen una cadencia bíblica natural en español, sin calco servil del inglés.
