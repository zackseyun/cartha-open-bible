translation:
  language: es
  text: Y desde ahora, los poderosos y los exaltados que poseen la tierra no serán así[a], ni podrán mirar el rostro de los santos[b], porque el Señor de los Espíritus ha hecho aparecer su luz sobre el rostro de los santos, los justos y los elegidos[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que retienen la tierra». El verbo ge'ez puede denotar agarrar o retener; «poseen» aquí comunica un control afianzado.
    reason: lexical_alternative
  - marker: b
    text: «Mirar el rostro de» conserva un giro idiomático de encuentro o acceso directo, en lugar de simplificarlo como «estar en la presencia de».
    reason: cultural_note
  - marker: c
    text: La cláusula final también puede implicar que la luz del Señor resplandece sobre el semblante de los santos, los justos y los elegidos, señalando su vindicación.
    reason: alternative_reading
  - marker: d
    text: O «los poderosos y los exaltados, que poseen la tierra, ya no existirán». Esta fue una traducción previa, pero la gramática del ge'ez favorece entender «poderosos y exaltados» como predicados y no como el sujeto que deja de existir.
    reason: previous_rendering
lexical_decisions:
- source_word: ዐዚዛነ
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los mighty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término describe a quienes tienen fuerza o poder; en este contexto apocalíptico, «los poderosos» comunica mejor la fuerza social y política que «los fuertes», sin añadir un matiz militar no garantizado.
- source_word: እልዑላነ
  english_pob_choice: the exalted
  chosen_spanish: los exaltados
  alternatives_spanish:
  - los altos
  - los encumbrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se refiere a quienes están elevados en estatus o posición. «Los exaltados» conserva la elevación social y el contraste irónico con el juicio, de modo cercano al valor del original.
- source_word: ይእኅዝዋ ለምድር
  english_pob_choice: who possess the earth
  chosen_spanish: que poseen la tierra
  alternatives_spanish:
  - que dominan la tierra
  - que tienen la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite la idea de agarrar, retener o poseer; en el contexto, expresa control durable. «Poseen la tierra» sigue la lectura auditada de posesión estable, sin intensificar indebidamente hacia «dominan» o «se apoderan».
- source_word: ገጸ ቅዱሳን
  english_pob_choice: the face of the holy ones
  chosen_spanish: el rostro de los santos
  alternatives_spanish:
  - el rostro de los santos
  - la presencia de los santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción semítica singular con referente plural se conserva mejor con «el rostro de». En español, «rostro» mantiene la imagen concreta y solemne; «santos» es la forma más natural para ቅዱሳን en este contexto.
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un título fijo en 1 Enoc. Se conserva la forma establecida en español con mayúsculas reverenciales, sin expandirlo innecesariamente.
- source_word: አርአየ ብርሃኖ
  english_pob_choice: has caused his light to appear
  chosen_spanish: ha hecho aparecer su luz
  alternatives_spanish:
  - ha mostrado su luz
  - ha revelado su luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ha hecho aparecer» conserva la fuerza causativa/manifestativa del verbo sin reducirla a una revelación meramente conceptual. En español suena natural y mantiene la imagen de manifestación visible.
- source_word: በገጸ ቅዱሳን ጻድቃን ወኅሩያን
  english_pob_choice: on the face of the holy, the righteous, and the chosen
  chosen_spanish: sobre el rostro de los santos, los justos y los elegidos
  alternatives_spanish:
  - en el rostro de los santos, los justos y los elegidos
  - ante los santos, los justos y los elegidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre el rostro» mantiene la imagen de una luz visible que reposa o resplandece sobre el semblante, sin convertirla en una mera idea de favor. Se distinguen los tres calificativos porque el texto los presenta como rasgos importantes e independientes.
theological_decisions:
- issue: Identidad del grupo juzgado y pérdida de estatus
  english_pob_reading: The verse refers to earthly elites or rulers now dispossessed from access to the vindicated holy ones.
  chosen_spanish_reading: El versículo describe a los poderosos y exaltados que poseen la tierra como incapaces de acercarse o mirar el rostro de los santos, en un juicio sobre elites terrenales.
  alternative_spanish_readings:
  - Una referencia general a todos los pecadores arrogantes.
  - Una referencia específicamente política a reyes y terratenientes.
  rationale: La combinación de «poderosos», «exaltados» y «que poseen la tierra» apunta con mayor naturalidad a elites terrenales dominantes. La traducción conserva esa amplitud sin restringirla más de lo que permite el ge'ez.
  doctrine_reference: Preservar la retórica apocalíptica local sin armonizarla en exceso.
- issue: Sentido de la luz divina sobre el rostro de los santos
  english_pob_reading: The Lord's light is manifested upon the vindicated community, marking their honor and reversal before judgment.
  chosen_spanish_reading: La luz del Señor de los Espíritus se manifiesta sobre el rostro de los santos, los justos y los elegidos como señal de vindicación.
  alternative_spanish_readings:
  - La luz aparece delante de ellos.
  - La luz se refleja desde sus rostros.
  rationale: La formulación del ge'ez favorece una manifestación visible sobre el rostro, no sólo una presencia abstracta. El español escogido conserva esa imagen de honra y reversión sin diluirla.
  doctrine_reference: Mantener la imaginería apocalíptica y la tensión teológica del texto.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente que corrige la gramática del ge''ez: «los poderosos y los exaltados» funciona como predicado, mientras que «que poseen la tierra» es el sujeto relativo. Por eso no se traduce como si la frase dijera que «los que poseen la tierra dejarán de existir», sino como una pérdida de estatus y acceso. También se conserva la imagen concreta de «mirar el rostro» y la manifestación de la luz sobre el rostro de los santos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda, pero aquí el texto tiene el título fijo «Señor de los Espíritus», que se mantiene por consistencia en 1 Enoc.
  - Se traduce ἅγιοι/«holy ones» con «santos» en español, ya que en este pasaje la referencia es a una comunidad vindicada y el término es claro y natural.
  - Se evita «SEÑOR» como máscara del nombre divino; aquí la mayúscula se reserva para el título fijo «Señor de los Espíritus».
  - Se mantiene «rostro» para preservar el idiomismo semítico y la fuerza visual del texto.
