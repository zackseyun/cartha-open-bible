base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/038/004.yaml
  text: And from now on the mighty and exalted who possess the earth shall not be so[a], nor shall they be able to look on the face of the holy ones, because the Lord of Spirits has caused his light to appear on the face of the holy, the righteous[d][c][b], and the chosen.
  footnotes:
  - marker: a
    text: Or 'who hold the earth.' The Ge'ez verb can denote grasping or holding; 'possess' here conveys entrenched control.
    reason: lexical_alternative
  - marker: b
    text: '''Look upon the face of'' is an idiom of direct encounter or access, preserved here rather than simplified to ''be in the presence of.'''
    reason: cultural_note
  - marker: c
    text: The final clause may imply that the Lord's light shines upon the countenance of the holy, righteous, and chosen, signaling their vindication.
    reason: alternative_reading
  - marker: d
    text: Or 'the mighty and the exalted, who possess the earth, shall be no more'.
    reason: previous_rendering
