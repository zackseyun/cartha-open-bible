review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del ge''ez y del POB auditado: encabezado separado, cláusula temporal abierta, «aparezca», juicio neutral y expulsión de la tierra. Sin embargo, el texto principal contiene dos errores formales graves: «primer» y «parale» llevan marcador [s] insertado de forma incorrecta, y «parale» además es una forma ortográficamente incorrecta de «parábola». También el uso de la nota s no está justificado en el texto final y rompe la legibilidad.'
  spanish_quality_summary: 'La redacción base es natural y digna: «la asamblea de los justos», «sean juzgados», «sean expulsados» funcionan bien en español bíblico moderno. «De la faz de la tierra» es idiomático y aceptable. Pero los errores tipográficos y de anclaje en el encabezado impiden aprobar el texto tal como está.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Parábola», «justos», «pecadores», «juzgados» y «tierra» están bien alineados con las decisiones léxicas auditadas. La nota a debe corregirse para reflejar con precisión que lo literal es más bien «de la faz del suelo seco/de la tierra seca», no repetir exactamente el texto principal como si fuera la literalidad.
  issues:
  - severity: high
    issue: 'El texto principal tiene una forma incorrecta: «parale[s]»'
    rationale: «Parale» no es español válido; debe ser «parábola». Esto afecta fidelidad y legibilidad.
  - severity: high
    issue: Marcadores de nota mal colocados en «El primer[s] parale[s]»
    rationale: El mismo marcador s aparece dos veces en el texto para una sola nota, lo cual viola la disciplina de notas; además el anclaje interrumpe artificialmente palabras y no corresponde a una ambigüedad textual real.
  - severity: medium
    issue: La nota a describe mal la literalidad
    rationale: Dice «Literalmente, ‘de la faz de la tierra’», pero el expediente inglés documenta como más literal «from the face of the dry ground». En español la nota debe reflejar esa relación con mayor precisión.
  - severity: low
    issue: «los pecadores» podría simplificarse a «pecadores»
    rationale: La revisión inglesa quitó el artículo por tratarse de un plural de clase desnudo. En español, sin embargo, «los pecadores» sigue siendo natural y no distorsiona seriamente el sentido, así que no es necesario forzar cambio por este punto solo.
  revised_spanish_text: La primera parábola. Cuando aparezca la asamblea de los justos, y los pecadores sean juzgados por sus pecados, y sean expulsados de la faz de la tierra[a],
  revised_footnotes:
  - marker: a
    text: Literalmente, «de la faz del suelo seco» o «de la faz de la tierra seca». La expresión puede entenderse idiomáticamente como «de la faz de la tierra» o «de la tierra»; aquí se opta por la forma más natural en español.
    reason: lexical_alternative
  revision_rationale: Se corrigen un error ortográfico y un problema serio de marcación de notas en el encabezado. También se elimina la nota s, porque no aporta información necesaria al lector y estaba anclada de manera incorrecta. Se mantiene el sentido auditado del verso y se ajusta la nota a para reflejar con más precisión la literalidad ge'ez documentada en el POB inglés. Se usa «La primera parábola» como encabezado español natural y correcto.
