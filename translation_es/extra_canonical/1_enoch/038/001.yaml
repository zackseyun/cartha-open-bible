translation:
  language: es
  text: La primera parábola. Cuando aparezca la asamblea de los justos, y los pecadores sean juzgados por sus pecados, y sean expulsados de la faz de la tierra[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «de la faz del suelo seco» o «de la faz de la tierra seca». La expresión puede entenderse idiomáticamente como «de la faz de la tierra» o «de la tierra»; aquí se opta por la forma más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ምሳሌ
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - similitud
  - figura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta sección funciona como encabezado de un discurso visionario. «Parábola» es el equivalente español más transparente y natural, sin perder el carácter técnico del apartado.
- source_word: ቀዳማ፲
  english_pob_choice: the first
  chosen_spanish: el primer
  alternatives_spanish:
  - primero
  - la primera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca ordinal de apertura del primer discurso. En español, «el primer» mantiene la función de encabezado con sintaxis natural.
- source_word: ሶበ
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al tiempo que
  - cada vez que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce una cláusula temporal sencilla; «cuando» conserva la fuerza directa del original.
- source_word: ያስተርኢ
  english_pob_choice: appears
  chosen_spanish: aparezca
  alternatives_spanish:
  - sea revelada
  - sea mostrada
  - se manifieste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa visibilidad/comparecencia, no necesariamente el matiz fuerte de revelación. «Aparezca» sigue de cerca esa fuerza y evita resolver el matiz apocalíptico de manera excesiva.
- source_word: ማኅበረ ጻድቃን
  english_pob_choice: the assembly of the righteous
  chosen_spanish: la asamblea de los justos
  alternatives_spanish:
  - la congregación de los justos
  - la compañía de los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Asamblea» conserva el sentido colectivo y solemne del grupo reunido. «Justos» transmite el valor adjetival de ጻድቃን sin perder fluidez.
- source_word: ወይትኴነኑ
  english_pob_choice: and ... are judged
  chosen_spanish: y ... sean juzgados
  alternatives_spanish:
  - y ... sean condenados
  - y ... sean llevados a juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La escena es judicial; «sean juzgados» mantiene el acto de juicio sin añadir de antemano la condena como resultado explícito.
- source_word: ኃጥኣን
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los impíos
  - los pecadores como clase
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un plural sustantivado que designa una clase de personas. «Los pecadores» es claro, bíblico en tono y fiel al valor del término.
- source_word: በኃጢአቶሙ
  english_pob_choice: for their sins
  chosen_spanish: por sus pecados
  alternatives_spanish:
  - a causa de sus pecados
  - por causa de sus pecados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición expresa base o motivo de la acción judicial. «Por sus pecados» es conciso y natural en español.
- source_word: ወእምገጸ የብስ
  english_pob_choice: from the face of the earth
  chosen_spanish: de la faz de la tierra
  alternatives_spanish:
  - de la superficie de la tierra
  - de la faz de la tierra seca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa optó por «earth» por naturalidad contextual; en español, «faz de la tierra» conserva la imagen semítica y es idiomática. «Tierra» recoge el alcance más natural del término sin perder la imagen.
- source_word: ይትሀወዙ
  english_pob_choice: are driven away
  chosen_spanish: sean expulsados
  alternatives_spanish:
  - sean arrojados
  - sean apartados
  - sean echados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es de expulsión punitiva fuera del ámbito humano. «Sean expulsados» preserva la pasiva y el matiz judicial con claridad.
theological_decisions:
- issue: Si el verbo de juicio debe resolverse como condena o permanecer neutral
  english_pob_reading: judged
  chosen_spanish_reading: sean juzgados
  alternative_spanish_readings:
  - sean condenados
  - sean llevados a juicio
  rationale: El texto presenta un acto judicial y la expulsión posterior, pero el verbo por sí solo no obliga a explicitar condena. Mantener «juzgados» conserva la tensión interpretativa documentada por el POB en inglés.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del dato textual.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente que prefería «earth» sobre «dry ground» y el ajuste de ያስተርኢ como «appears». En español, eso se refleja con «aparezca» y «de la faz de la tierra», sin introducir una concreción más fuerte que el original. También preservé la cláusula temporal abierta con coma final, acorde con la estructura protasis-apódosis del verso.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Mantuve «justos/pecadores/juzgados» para conservar el registro judicial-apocalíptico.
  - Preferí «tierra» en el texto principal por naturalidad, mientras la nota conserva la alternativa literal más cercana al giro ge'ez.
  - 'La marca [s] no se usa como nota: el ordinal se integró en la frase como parte del encabezado, por lo que no corresponde una nota aparte.'
