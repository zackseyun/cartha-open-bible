review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura temporal de ሶበ como «Cuando», conserva adecuadamente «las cosas ocultas de los justos», mantiene el juicio pasivo sobre «los pecadores», y comunica con fidelidad la expulsión forzosa de «los impíos» fuera de la presencia de la comunidad vindicada. Sin embargo, la nota [c] introduce una lectura alternativa española deficiente: omite la coma y convierte la construcción en una coordinación menos clara, cuando la nota inglesa preserva una alternativa histórica con «Then», no una reformulación española torpe de «Cuando».'
  spanish_quality_summary: El texto principal es claro, natural y de registro bíblico digno. «Escogidos» es aceptable, pero en combinación con «de los justos y de los escogidos» suena algo más pesado de lo necesario; aun así, no constituye error. El único problema real de calidad está en la nota [c], cuya redacción actual resulta poco idiomática y no representa bien la alternativa documentada. Conviene también ajustar levemente la nota [a] para sonar más natural en español («hechos, identidades o motivos de vindicación»).
  glossary_alignment: No hay conflicto con la terminología marco del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones «justos», «pecadores», «impíos» y «escogidos» concuerdan con el audit trail y con un español eclesial legible. «Presencia» sigue correctamente la revisión inglesa final para እምገጸ.
  issues:
  - severity: medium
    issue: La nota [c] no reproduce fielmente la alternativa documentada en el audit trail inglés.
    rationale: 'La nota inglesa dice: «Or ''Then the hidden things of the righteous will be revealed, and sinners will be judged''». La versión española actual: «Cuando se revelen las cosas ocultas de los justos y los pecadores serán juzgados» elimina la pausa necesaria y no representa la oposición principal «Then/When». Debe reformularse como alternativa histórica clara, por ejemplo con «Entonces».'
  - severity: low
    issue: La nota [a] puede expresarse con español más natural.
    rationale: «Hechos, identidad o vindicación» es comprensible, pero en español suena más fluido «hechos, identidades o motivos de vindicación», manteniendo la amplitud semántica sin estrechar el sentido.
  revised_spanish_text: Cuando se revelen[a] las cosas ocultas de los justos, los pecadores serán juzgados[c][b], y los impíos serán expulsados de la presencia de los justos y de los escogidos.
  revised_footnotes:
  - marker: a
    text: También puede entenderse «sus secretos». El ge'ez puede abarcar lo que ha estado oculto, pero el verso no precisa si se trata de hechos, identidades o motivos de vindicación.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de la faz de los justos y de los escogidos». La expresión conserva la imagen de exclusión de la presencia de la comunidad vindicada.
    reason: cultural_note
  - marker: c
    text: 'O: «Entonces se revelarán las cosas ocultas de los justos, y los pecadores serán juzgados».'
    reason: previous_rendering
  revision_rationale: Se conserva intacto el texto principal porque es fiel al ge'ez y al audit trail inglés. Solo se corrigen las notas para que la alternativa [c] refleje de verdad la variante histórica documentada («Then/Entonces») y para mejorar ligeramente la naturalidad de [a] en español.
