translation:
  language: es
  text: Cuando se revelen[a] las cosas ocultas de los justos, los pecadores serán juzgados[c][b], y los impíos serán expulsados de la presencia de los justos y de los escogidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «sus secretos». El ge'ez puede abarcar lo que ha estado oculto, pero el verso no precisa si se trata de hechos, identidad o vindicación.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de la faz de los justos y de los escogidos». La expresión conserva la imagen de exclusión de la presencia de la comunidad vindicada.
    reason: cultural_note
  - marker: c
    text: 'O: «Cuando se revelen las cosas ocultas de los justos y los pecadores serán juzgados».'
    reason: alternative_reading
lexical_decisions:
- source_word: ሶበ
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Al tiempo que
  - Cuando llegue el momento en que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La conjunción ge'ez introduce una cláusula temporal; «Cuando» conserva la relación protasis-apódosis y el impulso retórico apocalíptico, sin convertirlo en un «entonces» explicativo.
- source_word: ይትከሠት
  english_pob_choice: will be revealed
  chosen_spanish: se revelen
  alternatives_spanish:
  - se descubran
  - se manifiesten
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo encaja con una revelación de realidades ocultas al final del juicio. «Se revelen» mantiene la pasiva y el registro elevado.
- source_word: ኅቡኣቲሆሙ
  english_pob_choice: the hidden things of them
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - sus secretos
  - las cosas escondidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Las cosas ocultas» preserva el plural amplio del ge'ez sin decidir si se trata de hechos, identidades o vindicación; evita estrecharlo indebidamente a «secretos».
- source_word: ለጻድቃን
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos y rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español bíblico, «los justos» comunica con claridad la categoría moral y judicial del pasaje, manteniendo la relación genitiva.
- source_word: ይትኴነኑ
  english_pob_choice: will be judged
  chosen_spanish: serán juzgados
  alternatives_spanish:
  - serán condenados
  - serán puestos a juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva judicial se conserva con «serán juzgados», que no fuerza todavía el resultado a «condenados».
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los que pecan
  - los impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pecadores» es el equivalente directo y mantiene la categoría moral estándar de la literatura de juicio.
- source_word: ይትሀወዙ
  english_pob_choice: will be driven away
  chosen_spanish: serán expulsados
  alternatives_spanish:
  - serán alejados
  - serán arrojados fuera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa remoción forzosa; «serán expulsados» comunica mejor la fuerza judicial que una salida meramente pasiva.
- source_word: ረስዓን
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los inicuos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español bíblico «impíos» corresponde bien al paralelo con «justos» y conserva el contraste moral del texto apocalíptico.
- source_word: እምገጸ
  english_pob_choice: from the presence of
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de delante de
  - de la faz de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión inglesa que prefirió la formulación más natural «presence». En español, «de la presencia de» conserva el valor espacial-judicial de exclusión sin perder claridad.
- source_word: ወኅሩያን
  english_pob_choice: and the chosen
  chosen_spanish: y de los escogidos
  alternatives_spanish:
  - y de los elegidos
  - y de los electos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» expresa la categoría teológica del texto y es idiomático en español; mantiene el sentido de elección divina sin adoptar un tecnicismo menos natural.
theological_decisions:
- issue: Sentido de «las cosas ocultas» de los justos
  english_pob_reading: the hidden things of the righteous
  chosen_spanish_reading: las cosas ocultas de los justos
  alternative_spanish_readings:
  - los secretos de los justos
  - los ocultos entre los justos
  rationale: El ge'ez permite una amplitud semántica que no obliga a restringirlo a secretos privados ni a convertirlo en personas ocultas. «Cosas ocultas» preserva la tensión entre hechos, condición y vindicación revelada.
  doctrine_reference: Preservar la tensión lexical sin resolverla por adelantado.
- issue: Fuerza de la cláusula final de exclusión
  english_pob_reading: driven away from the presence of the righteous and the chosen
  chosen_spanish_reading: serán expulsados de la presencia de los justos y de los escogidos
  alternative_spanish_readings:
  - serán removidos de delante de los justos y de los escogidos
  - serán alejados de la presencia de los justos y de los escogidos
  rationale: La escena no describe solo vergüenza interior, sino expulsión judicial fuera del ámbito de los vindicados. «Expulsados» conserva la violencia forense del pasaje.
  doctrine_reference: Primacía del lenguaje original en escenas de juicio.
translation_notes:
  revision_awareness: 'La base inglesa pasó por una corrección importante: el marcador temporal ሶበ se entendió finalmente como «When», no «Then», y እምገጸ fue revisado de «from the face of» a la formulación más natural «from the presence of». La versión española sigue ambas decisiones: mantiene la temporalidad con «Cuando» y conserva la exclusión de presencia con «de la presencia de».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece el nombre divino.
  - Se mantiene «justos/pecadores/impíos/escogidos» para respetar el paralelismo judicial del pasaje.
  - No se suaviza «expulsados», porque el verbo ge'ez indica remoción forzosa, no simple alejamiento.
