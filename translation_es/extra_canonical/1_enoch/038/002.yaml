    text: The phrase 'whose deeds hang upon the Lord of Spirits' is difficult. It may mean that their deeds depend on him or are upheld before him.
    reason: lexical_alternative
  - marker: b
    text: '''Dry ground'' is a literal rendering; it likely refers to the inhabited land in contrast to the cosmic waters.'
    reason: cultural_note
  - marker: c
    text: Or 'And righteousness will appear'.
    reason: previous_rendering
  - marker: d
    text: Or 'and he will show light'.
