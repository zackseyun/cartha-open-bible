revisions:
- from: Y cuando la justicia aparezca sobre los rostros de los justos[a], de los escogidos, cuyas obras penden del Señor de los Espíritus, y la luz aparezca a los justos y a los escogidos que habitan sobre el suelo seco[b], ¿dónde entonces será el lugar de habitación de los pecadores, y dónde el lugar de reposo de los que negaron al Señor de los Espíritus? Mejor les habría sido si no hubieran nacido.
  to: Y cuando la justicia aparezca sobre los rostros de los justos[a], los escogidos, cuyas obras penden del Señor de los Espíritus, y la luz aparezca a los justos y a los escogidos que habitan sobre el suelo seco[b], ¿dónde está entonces la morada de los pecadores, y dónde el lugar de reposo de los que negaron al Señor de los Espíritus? Mejor les habría sido si no hubieran nacido.
  rationale: 'La revisión hace tres ajustes menores: corrige la apposición («los justos, los escogidos»), sustituye el futuro artificial de la pregunta por un presente idiomático («¿dónde está entonces...?»), y reemplaza «lugar de habitación» por «morada» para mejorar la naturalidad. Se preservan el sentido fuente, la imaginería apocalíptica y las notas clave del POB.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:15:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura temporal («Y cuando»), la imaginería de la justicia visible en los rostros, la literalidad de «suelo seco», y la sentencia final de juicio. También preserva adecuadamente la rareza de la frase sobre las obras que «penden» del Señor de los Espíritus mediante nota. Sin embargo, hay dos problemas principales: (1) la puntuación y la sintaxis en español enturbian la relación entre «los justos» y «los escogidos» y hacen menos natural la cadena larga; (2) «será» introduce un matiz futuro no exigido por la pregunta retórica, donde conviene un presente más directo («está»/«queda» o elipsis).'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero suena algo forzado en varios puntos: «de los justos[a], de los escogidos» resulta torpe; «lugar de habitación» es comprensible pero pesado; y «¿dónde entonces será...?» no suena natural en español bíblico contemporáneo. Una leve revisión mejora fluidez sin perder fidelidad.'
  glossary_alignment: Buena alineación general con la terminología del proyecto. «justicia» para ጽድቅ es defendible aquí; «escogidos» para ኅሩያን funciona; «Señor de los Espíritus» sigue el expediente inglés. No hay conflicto con términos de alto control como Yahvé/Mesías. Se recomienda «morada» en lugar de «lugar de habitación» por naturalidad sin pérdida semántica.
  issues:
  - severity: medium
    issue: 'Construcción appositiva poco natural: «los justos[a], de los escogidos»'
    rationale: El original y el POB inglés presentan dos designaciones coordinadas del mismo grupo («the righteous, the chosen»). En español, repetir «de los» tras coma suena desajustado. «los justos[a], los escogidos» o «los justos, los escogidos» preserva mejor la apposición.
  - severity: medium
    issue: «¿dónde entonces será...?» introduce un futuro innecesario
    rationale: La pregunta retórica del original no exige futuro verbal. En español, el presente («¿dónde está entonces...?») o una formulación nominal es más idiomática y mantiene la fuerza del juicio presente/escatológico.
  - severity: low
    issue: «lugar de habitación» es pesado y menos idiomático
    rationale: Aunque fiel al valor locativo, «morada» comunica de forma más natural y digna el sentido de መኃደሪ sin añadir interpretación.
  revised_spanish_text: Y cuando la justicia aparezca sobre los rostros de los justos[a], los escogidos, cuyas obras penden del Señor de los Espíritus, y la luz aparezca a los justos y a los escogidos que habitan sobre el suelo seco[b], ¿dónde está entonces la morada de los pecadores, y dónde el lugar de reposo de los que negaron al Señor de los Espíritus? Mejor les habría sido si no hubieran nacido.
  revised_footnotes:
  - marker: a
    text: La expresión «cuyas obras penden del Señor de los Espíritus» es difícil. Puede sugerir que sus obras dependen de él o que quedan sostenidas ante él.
    reason: lexical_alternative
  - marker: b
    text: «Suelo seco» es una traducción literal; probablemente alude a la tierra habitada en contraste con las aguas cósmicas.
    reason: cultural_note
  revision_rationale: 'La revisión hace tres ajustes menores: corrige la apposición («los justos, los escogidos»), sustituye el futuro artificial de la pregunta por un presente idiomático («¿dónde está entonces...?»), y reemplaza «lugar de habitación» por «morada» para mejorar la naturalidad. Se preservan el sentido fuente, la imaginería apocalíptica y las notas clave del POB.'
