base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/038/002.yaml
  text: And when righteousness appears on the faces of the righteous[a], the chosen, whose deeds hang upon the Lord of Spirits, and light appears to the righteous and to the chosen who dwell on the dry ground, where then is the dwelling of sinners[d][c][b], and where the resting place of those who denied the Lord of Spirits? It would have been better for them if they had not been born.
  footnotes:
