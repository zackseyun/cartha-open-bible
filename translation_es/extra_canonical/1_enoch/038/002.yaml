translation:
  language: es
  text: Y cuando la justicia aparezca sobre los rostros de los justos[a], los escogidos, cuyas obras penden del Señor de los Espíritus, y la luz aparezca a los justos y a los escogidos que habitan sobre el suelo seco[b], ¿dónde está entonces la morada de los pecadores, y dónde el lugar de reposo de los que negaron al Señor de los Espíritus? Mejor les habría sido si no hubieran nacido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «cuyas obras penden del Señor de los Espíritus» es difícil. Puede sugerir que sus obras dependen de él o que quedan sostenidas ante él.
    reason: lexical_alternative
  - marker: b
    text: «Suelo seco» es una traducción literal; probablemente alude a la tierra habitada en contraste con las aguas cósmicas.
    reason: cultural_note
lexical_decisions:
- source_word: ወሶበ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y al tiempo que
  - Y si
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor temporal del conjuntivo exige una cláusula dependiente en español; «Y cuando» conserva la estructura retórica del pasaje.
- source_word: ጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario la manifestación visible de la condición justa puede expresarse bien como «justicia»; mantiene el peso moral y forense del término sin forzar una abstracción moderna.
- source_word: በገጾሙ
  english_pob_choice: on the faces of them
  chosen_spanish: sobre los rostros de
  alternatives_spanish:
  - en la presencia de
  - sobre las caras de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la imagen corporal y visible del original. «Rostros» suena más natural y digno que «caras» en español bíblico contemporáneo.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Justos» es el equivalente más natural en español para el grupo de los righteous, y conserva el registro bíblico sin perder claridad.
- source_word: ኅሩያን
  english_pob_choice: the chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los seleccionados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» reproduce el sentido apocalíptico sin cargar el término con matices eclesiásticos posteriores asociados a «los elegidos».
- source_word: ተግባሮሙ ስቁል በእግዚአ መናፍስት
  english_pob_choice: whose deeds hang upon the Lord of Spirits
  chosen_spanish: cuyas obras penden del Señor de los Espíritus
  alternatives_spanish:
  - cuyas obras dependen del Señor de los Espíritus
  - cuyas obras son sostenidas ante el Señor de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la metáfora extraña de «penden» para no resolverla prematuramente; «obras» funciona mejor en español aquí que «hechos», y «Señor de los Espíritus» sigue la convención del texto fuente.
- source_word: ብርሃን
  english_pob_choice: light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  - resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma sustantivada con artículo mantiene paralelismo con «la justicia» y es idiomática en español.
- source_word: የኃድሩ ዲበ የብስ
  english_pob_choice: who dwell on the dry ground
  chosen_spanish: que habitan sobre el suelo seco
  alternatives_spanish:
  - que habitan en la tierra seca
  - que viven sobre la tierra seca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la literalidad de «dry ground» sin suavizarla a «tierra» sin más. «Suelo seco» suena algo más natural en español que «suelo seco» como imagen cosmológica, y retiene la extrañeza del original.
- source_word: መኃደሪ
  english_pob_choice: dwelling
  chosen_spanish: lugar de habitación
  alternatives_spanish:
  - morada
  - habitación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lugar de habitación» conserva el valor locativo y evita confundirlo con una mera acción de habitar.
- source_word: ምዕራፎሙ
  english_pob_choice: resting-place
  chosen_spanish: lugar de reposo
  alternatives_spanish:
  - reposo
  - morada de descanso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión mantiene la simetría con «lugar de habitación» y respeta la referencia espacial del término.
- source_word: ክሕድዎ
  english_pob_choice: denied
  chosen_spanish: negaron
  alternatives_spanish:
  - renegaron de
  - desconocieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español «negaron al Señor de los Espíritus» reproduce bien el acto de rechazo/denegación religiosa sin introducir una perífrasis más interpretativa.
- source_word: እምኃየሶሙ ሶበ ኢተወልዱ
  english_pob_choice: It would have been better for them if they had not been born
  chosen_spanish: Mejor les habría sido si no hubieran nacido
  alternatives_spanish:
  - les habría sido mejor no haber nacido
  - mejor habría sido para ellos no haber nacido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La formulación es idiomática en español y conserva el juicio severo del original sin añadir una cita formulística ajena.
theological_decisions:
- issue: Relación entre 'justicia' y el grupo de los justos/escogidos
  english_pob_reading: Righteousness appears on the faces of the righteous, the chosen
  chosen_spanish_reading: La justicia aparece sobre los rostros de los justos, de los escogidos
  alternative_spanish_readings:
  - La rectitud aparece sobre los rostros de los justos, de los escogidos
  - La justicia se muestra sobre los rostros de los justos, de los escogidos
  rationale: Se conserva la manifestación visible de la justicia como señal de vindicación. En español, «justicia» mantiene la fuerza forense y apocalíptica del término sin borrar su carga moral.
  doctrine_reference: Vindicación escatológica de los justos
- issue: Sentido de la frase sobre las obras que 'penden' del Señor de los Espíritus
  english_pob_reading: whose deeds hang upon the Lord of Spirits
  chosen_spanish_reading: cuyas obras penden del Señor de los Espíritus
  alternative_spanish_readings:
  - cuyas obras dependen del Señor de los Espíritus
  - cuyas obras son sostenidas ante el Señor de los Espíritus
  rationale: La rareza del giro se preserva para no resolver una tensión léxica/textual que el testimonio etiópico no aclara de modo seguro. El lector recibe la imagen sin que el traductor la cierre doctrinalmente.
  doctrine_reference: Preservar tensión léxica en texto apocalíptico
- issue: Referente de 'suelo seco'
  english_pob_reading: dry ground
  chosen_spanish_reading: suelo seco
  alternative_spanish_readings:
  - tierra seca
  - tierra habitada
  rationale: Se conserva el color cosmológico del original. Aunque pueda aludir a la tierra habitada, la literalidad evita aplanar la imagen y sigue siendo comprensible en español.
  doctrine_reference: No aplanar la imaginería apocalíptica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la cláusula temporal inicial («Y cuando») y la lectura de «luz» como sujeto que aparece, no como objeto causado. Por eso la redacción española mantiene la subordinación temporal y formula «la luz aparezca» para respetar el giro del original y el paralelismo del verso.
  spanish_consistency_notes:
  - Se usa «Señor de los Espíritus» de manera consistente para el título divino.
  - Se mantiene «los escogidos» en paralelo con «los justos» para reflejar la duplicación del original.
  - Se conserva la extrañeza controlada de la imagen de las obras que «penden» del Señor de los Espíritus.
  - Se eligió «suelo seco» para no sustituir prematuramente una imagen cosmológica concreta por un genérico neutral.
