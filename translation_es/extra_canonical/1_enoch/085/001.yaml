translation:
  language: es
  text: Y después de esto vi otro sueño, y te mostraré el sueño completo[a], hijo mío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo el sueño». La expresión ge''ez puede referirse a la totalidad de este sueño; en otro entendimiento, puede oírse con un alcance más amplio sobre la secuencia de sueños.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እምድኅረዝ
  english_pob_choice: after this
  chosen_spanish: y después de esto
  alternatives_spanish:
  - después de esto
  - y después
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la transición temporal inmediata del relato visionario sin endurecer el español con un calco excesivo.
- source_word: ካልአ
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - segundo
  - otro más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la distinción de un sueño adicional respecto del anterior. 'Otro' es natural en español y conserva la secuencia narrativa.
- source_word: ሕለመ
  english_pob_choice: dream
  chosen_spanish: sueño
  alternatives_spanish:
  - visión en sueño
  - ensueño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término normal para la experiencia onírica; en este contexto conviene preservar la forma simple 'sueño' antes de la exposición profética.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo directo de reporte visionario. En español, 'vi' es la forma más natural y fiel a la inmediatez del original.
- source_word: ኵሎ ሕልመ
  english_pob_choice: the whole dream
  chosen_spanish: el sueño completo
  alternatives_spanish:
  - todo el sueño
  - el sueño entero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la revisión que entiende la expresión como referencia a la totalidad de este sueño concreto, no a una distribución por varios sueños. 'Completo' comunica bien esa totalidad en español sin perder la ambigüedad textual documentada.
- source_word: አርእየከ
  english_pob_choice: I will show you
  chosen_spanish: te mostraré
  alternatives_spanish:
  - te haré ver
  - te contaré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el sentido de hacer ver / mostrar una revelación mediada. 'Mostrar' es más cercano al valor del verbo que 'contar'.
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - oh hijo mío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el tono filial y exhortativo del discurso directo. 'Hijo mío' suena natural en español y preserva la intimidad del vocativo.
theological_decisions:
- issue: Alcance de ኵሎ ሕልመ
  english_pob_reading: the whole dream
  chosen_spanish_reading: el sueño completo
  alternative_spanish_readings:
  - todo el sueño
  - cada sueño
  rationale: La revisión del texto favorece leer la expresión como un todo referido al sueño recién mencionado, no como un distributivo sobre una serie. Traduzco de manera que conserve esa totalidad concreta, pero sin borrar que el hebreo/etiópico permite una lectura menos cerrada en otros contextos.
  doctrine_reference: Preservar la tensión lexical documentada; no resolverla por paráfrasis.
translation_notes:
  revision_awareness: 'El audit trail en inglés presenta una oscilación documentada para ኵሎ ሕልመ: primero ''every dream'', luego una revisión a ''the whole dream'', con justificación contextual. La traducción española sigue la decisión revisada (''el sueño completo'') y conserva en nota la alternativa lexical histórica para no borrar la ambigüedad registrada.'
  spanish_consistency_notes:
  - Uso 'Yahvé' por defecto solo cuando aparezca el nombre divino; aquí no aplica.
  - Conservo 'sueño' y no 'visión' para respetar la terminología del original en este versículo.
  - Evito 'señor' o calcos litúrgicos porque el texto no los requiere.
  - '''Hijo mío'' mantiene el vocativo afectivo sin añadir solemnidad inexistente.'
