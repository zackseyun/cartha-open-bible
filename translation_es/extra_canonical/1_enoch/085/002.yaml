translation:
  language: es
  text: 'Y Enoc alzó su voz y dijo a su hijo, Matusalén: «A ti te hablo, hijo mío: oye mis palabras e inclina tu oído a la visión del sueño de tu padre[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «la visión de un sueño». La expresión ge''ez une lenguaje de ver/visión con lenguaje de sueño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወአንሥአ
  english_pob_choice: lifted up his voice
  chosen_spanish: alzó su voz
  alternatives_spanish:
  - levantó su voz
  - alzando la voz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico expresa elevar o levantar; en español, «alzó su voz» conserva el registro solemne y la fórmula narrativa de habla sin volverla mecánica.
- source_word: ወይቤ
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - decía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el verbo narrativo estándar de introducción al discurso; «dijo» es transparente y fiel al giro formulaico.
- source_word: ለወልዱ
  english_pob_choice: to his son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - para su hijo
  - a su hijo varón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El marcador de dirección indica el destinatario del habla; «a su hijo» preserva la relación filial sin añadir matiz innecesario.
- source_word: ማቱሳላ
  english_pob_choice: Methuselah
  chosen_spanish: Matusalén
  alternatives_spanish:
  - Matusalá
  lexicon: —
  rationale: Se sigue la transliteración habitual en español bíblico, manteniendo la identificación del personaje.
- source_word: ለከ እብለከ
  english_pob_choice: To you I speak
  chosen_spanish: A ti te hablo
  alternatives_spanish:
  - A ti digo
  - Te hablo a ti
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La duplicación pronominal del original se refleja con el fronting «A ti» y el clítico «te», conservando énfasis e inmediatez.
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - oh hijo mío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es vocativo afectivo y de autoridad; «hijo mío» reproduce el tono sin introducir un arcaísmo innecesario.
- source_word: ስማዕ
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oye atentamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo pide atención auditiva; «oye» mantiene la fuerza breve y elevada del mandato.
- source_word: ነገርየ
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi խոսa
  - lo que digo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural de sentido se conserva naturalmente como «mis palabras», adecuado para una exhortación revelatoria.
- source_word: አጽንን እዝነከ
  english_pob_choice: incline your ear
  chosen_spanish: inclina tu oído
  alternatives_spanish:
  - aplica tu oído
  - presta atención
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen corporal del oído inclinado se mantiene en español con una fórmula clara y bíblica; evita una paráfrasis que borraría la metáfora.
- source_word: ለርእየ ሕልመ
  english_pob_choice: the vision of your father’s dream
  chosen_spanish: la visión del sueño de tu padre
  alternatives_spanish:
  - la visión de tu padre en sueño
  - el sueño-visión de tu padre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se preservan ambos elementos del original: visión y sueño. «La visión del sueño de tu padre» refleja la relación sintáctica sin forzar un neologismo.'
- source_word: አቡከ
  english_pob_choice: of your father
  chosen_spanish: de tu padre
  alternatives_spanish:
  - de tu progenitor
  - de tu padre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El genitivo identifica al padre cuya experiencia visionaria se menciona; «de tu padre» es natural y exacto.
theological_decisions:
- issue: La expresión combinada de visión y sueño en ርእየ ሕልመ
  english_pob_reading: the vision of your father’s dream
  chosen_spanish_reading: la visión del sueño de tu padre
  alternative_spanish_readings:
  - el sueño de tu padre
  - la visión de un sueño
  rationale: La frase mantiene la tensión apocalíptica entre soñar y ver; no se reduce a un sueño ordinario ni se separan indebidamente los dos campos semánticos.
  doctrine_reference: Transparencia textual y preservación de imaginería apocalíptica
- issue: El énfasis directo de ለከ እብለከ
  english_pob_reading: To you I speak
  chosen_spanish_reading: A ti te hablo
  alternative_spanish_readings:
  - A ti te digo
  - Te hablo a ti
  rationale: El original enfatiza el destinatario por duplicación pronominal; la solución española conserva ese énfasis sin perder fluidez.
  doctrine_reference: Fidelidad retórica al discurso exhortativo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió una formulación más cercana al original («the vision of your father’s dream») en lugar de la compuesta «dream-vision». La versión española sigue esa misma cautela y conserva explícitamente los dos componentes semánticos sin crear un compuesto artificial.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos no necesarios.
  - 'Los nombres propios se transliteran según uso hispánico habitual: Matusalén.'
