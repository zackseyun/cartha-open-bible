translation:
  language: es
  text: Y esa novilla negra creció, y vino.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወዝኩ
  english_pob_choice: And that
  chosen_spanish: Y esa
  alternatives_spanish:
  - Y aquella
  - Y esa misma
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige la lectura errónea ‘And I saw’ y entiende ወዝኩ como un elemento deíctico. En español, ‘esa’ conserva mejor la referencia señalada en la visión que una traducción interpretativa más libre.
- source_word: ጸሊም
  english_pob_choice: black
  chosen_spanish: negra
  alternatives_spanish:
  - oscura
  - negra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo expresa color negro de forma directa. ‘Negra’ es la equivalencia natural en español y mantiene el simbolismo cromático del texto apocalíptico.
- source_word: ጣዕዋ
  english_pob_choice: heifer
  chosen_spanish: novilla
  alternatives_spanish:
  - becerra
  - ternera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indica que el término no es ‘wild boar’ sino un bovino joven femenino. ‘Novilla’ conserva el registro digno y la precisión zoológica, además de concordar con la forma verbal femenina.
- source_word: ላህቀ
  english_pob_choice: grew up
  chosen_spanish: creció
  alternatives_spanish:
  - se hizo grande
  - maduró
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasaje actualizado entiende el verbo como ‘grow up / become large’. ‘Creció’ es el equivalente más directo y claro en español, sin añadir interpretación.
- source_word: ወመጽአት
  english_pob_choice: and she came
  chosen_spanish: y vino
  alternatives_spanish:
  - y llegó
  - y se acercó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico es ‘venir’. ‘Y vino’ mantiene la tersura secuencial del original y la concordancia femenina implícita por la forma verbal.
theological_decisions:
- issue: Conservación de la imaginería visionaria animal
  english_pob_reading: The passage should retain concrete animal imagery rather than interpretive identification in the main line.
  chosen_spanish_reading: La línea española mantiene la imagen concreta de una novilla negra que crece y viene.
  alternative_spanish_readings:
  - Interpretar el animal como símbolo histórico en el texto principal
  - Parafrasear como una figura hostil sin imagen animal precisa
  rationale: El texto pertenece a una visión apocalíptica; la traducción debe dejar visible la metáfora animal y no resolverla interpretativamente en la línea principal. La identificación histórica queda para comentario, no para el texto.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten symbolic language into generic prose.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente, que corrige la lectura previa de ‘wild boar’ y de ‘I saw’ y establece ‘black heifer’ como solución intermedia, con ajuste final a un bovino joven femenino para concordar con el verbo ‘she came’.
  spanish_consistency_notes:
  - Se evita ‘Cristo’, ‘SEÑOR’ o vocabulario eclesiástico no respaldado por el texto.
  - Se mantiene un estilo sobrio y publicable, con sintaxis breve acorde al carácter telegráfico del ge'ez.
  - Se opta por ‘y vino’ en lugar de ‘llegó’ para conservar la economía verbal del original.
