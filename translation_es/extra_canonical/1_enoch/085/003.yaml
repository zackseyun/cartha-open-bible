  language: en
  yaml_path: translation/extra_canonical/1_enoch/085/003.yaml
  text: Before I took your mother Edna[a], I saw in a vision on my bed, and behold, a bull came up from the earth; and that bull was white. And after it there came out one heifer, and with her came out two bulls[c][b], and one of them was black and one red.
  footnotes:
