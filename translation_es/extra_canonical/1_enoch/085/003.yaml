- from: Antes de tomar a tu madre Edna[a], vi en una visión sobre mi lecho, y he aquí que un toro subió de la tierra; y aquel toro era blanco. Y después salió una novilla, y con ella salieron dos toros[b][c], y uno de ellos era negro y uno rojo.
  to: Antes de tomar a tu madre Edna[a], vi en una visión en mi lecho, y he aquí que un toro subió de la tierra; y aquel toro era blanco. Y después salió una novilla, y con ella salieron dos toros[b][c], y uno de ellos era negro y el otro, rojo.
  rationale: 'La revisión hace ajustes menores pero necesarios para mejorar la naturalidad y precisión del español sin apartarse del source evidence ni del audit trail inglés: ''en mi lecho'' suena más idiomático que ''sobre mi lecho''; se mejora la clausula final con ''el otro, rojo''; y se corrige la clasificación de la nota c para reflejar que es una traducción alternativa previa, no una variante textual. El resto del contenido y de las decisiones léxicas principales se conserva.'
