translation:
  language: es
  text: Antes de tomar a tu madre Edna[a], vi en una visión en mi lecho, y he aquí que un toro subió de la tierra; y aquel toro era blanco. Y después salió una novilla, y con ella salieron dos toros[b][c], y uno de ellos era negro y el otro, rojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «vi en la visión de mi sueño».
    reason: lexical_alternative
  - marker: b
    text: La imaginería animal es simbólica dentro de las Visiones del Sueño; la traducción conserva los términos propios de la visión en vez de sustituirlos por identidades explicativas en el texto principal.
    reason: cultural_note
  - marker: c
    text: 'O: «y de nuevo vi con mis ojos mientras dormía».'
    reason: previous_rendering
lexical_decisions:
- source_word: እንበለ፡ እንሥአ፡ ለአምክ፡ ኤድና፡
  english_pob_choice: Before I took your mother Edna
  chosen_spanish: Antes de tomar a tu madre Edna
  alternatives_spanish:
  - Antes de tomar a tu madre Edna,
  - Antes de que tomara a tu madre Edna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula temporal se conserva de forma directa y natural en español. Mantengo el vínculo posesivo de segunda persona («tu madre») porque el texto fuente y la tradición de visiones de 1 Enoc hablan en discurso dirigido, y Edna es presentada como madre del destinatario en el contexto narrativo.
- source_word: በራእየ፡ ምስካብየ
  english_pob_choice: I saw in a vision on my bed
  chosen_spanish: vi en una visión sobre mi lecho
  alternatives_spanish:
  - vi en la visión de mi sueño
  - vi en una visión de mi lecho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo el sustantivo «visión» para reflejar ራእይ y «sobre mi lecho» para reproducir el escenario de sueño sin borrar el matiz visionario. Evito reducirlo a una simple fórmula de dormir, porque el audit trail inglés subraya la visión apocalíptica.
- source_word: ላህም
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - novillo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Toro» preserva el valor de macho bovino y la carga simbólica del relato, mejor que «buey», que sugiere animal castrado o de labor. En este pasaje la oposición sexual y cromática es parte del símbolo.
- source_word: ወፅአ፡ እምድር
  english_pob_choice: came up from the earth
  chosen_spanish: subió de la tierra
  alternatives_spanish:
  - salió de la tierra
  - emergió de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Subió de la tierra» conserva el movimiento ascendente y la vividez de la aparición. La imagen apocalíptica se mantiene sin añadir explicación interpretativa.
- source_word: ጸዓዳ
  english_pob_choice: white
  chosen_spanish: blanco
  alternatives_spanish:
  - de color blanco
  - brillante y blanco
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El color es directo y simbólicamente relevante; «blanco» es la forma más clara y fiel en español.
- source_word: ጣዕዋ፡ እንስቲያት፡ አሐቲ
  english_pob_choice: a heifer
  chosen_spanish: una novilla
  alternatives_spanish:
  - una becerra
  - una heifer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Novilla» transmite una hembra bovina joven de manera natural en español y conserva mejor que «becerra» el tono narrativo de la escena. En contexto, no hace falta reinterpretar el animal como otra figura.
- source_word: ወምስሌሃ፡ ወፅኡ፡ ክልኤቱ፡ ጣዕዋ
  english_pob_choice: with her came out two bulls
  chosen_spanish: y con ella salieron dos toros
  alternatives_spanish:
  - y con ella salieron dos novillos
  - y junto con ella salieron dos toros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantengo la secuencia «con ella salieron» para respetar la relación sintáctica con la novilla. «Toros» preserva el paralelismo sexado del símbolo y su fuerza visual.
- source_word: ጸሊመ
  english_pob_choice: black
  chosen_spanish: negro
  alternatives_spanish:
  - oscuro
  - de color negro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Negro» es la correspondencia más directa y mantiene el contraste cromático del pasaje.
- source_word: ቀይሐ
  english_pob_choice: red
  chosen_spanish: rojo
  alternatives_spanish:
  - rojizo
  - encarnado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Rojo» conserva el contraste inmediato con «negro» y sigue de cerca el término de color del original.
theological_decisions:
- issue: Conservar la imaginería animal del Sueño/Visiones sin identificarla en el cuerpo del texto
  english_pob_reading: Retain the imagery as literal animal description within the vision rather than interpretively identifying the figures in the translation.
  chosen_spanish_reading: Mantener la descripción literal de animales dentro de la visión, sin identificar las figuras en el texto principal.
  alternative_spanish_readings:
  - Interpretar los animales como personajes humanos en el texto principal
  - Aclarar simbólicamente la identidad de cada figura dentro de la traducción
  rationale: La visión funciona por medio de imágenes animales sostenidas; traducirlas como tales preserva el modo apocalíptico del pasaje. Las identificaciones interpretativas deben quedar para notas o comentario, no para reemplazar el lenguaje del texto.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not paraphrase beyond the witness.'
translation_notes:
  revision_awareness: El texto fuente ge'ez incluye la cláusula inicial «Antes de tomar a tu madre Edna», y el audit trail inglés corrige una omisión previa. También mantiene la visión como «visión sobre mi lecho» en vez de reducirla a una simple fórmula de sueño. Para el español se siguió esa lectura revisada, conservando además la progresión de un toro blanco, luego una novilla, y después dos toros de colores contrastantes.
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando corresponda al tetragrámaton; aquí no aparece.
  - Conservo «visión» y no sustituyo por «sueño» para mantener el matiz apocalíptico.
  - Mantengo el léxico animal literal («toro», «novilla») para respetar la imaginería del pasaje.
  - No uso «Cristo» ni terminología cristiana ajena al texto.
  - La puntuación sigue el castellano moderno con coordinación clara y ritmo narrativo.
