    text: Literally, 'I saw in the vision of my sleep.'
    reason: lexical_alternative
  - marker: b
    text: The animal imagery is symbolic within the Dream Visions; the translation preserves the vision's own terms rather than supplying identifications in the main text.
    reason: cultural_note
  - marker: c
    text: Or 'And again I saw with my eyes as I slept'.
    reason: previous_rendering
