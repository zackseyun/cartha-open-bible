translation:
  language: es
  text: Y aquel becerro negro golpeó[a] al becerro rojo y lo persiguió hasta la tierra[b], y después de eso ya no pude volver a ver a aquel becerro rojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo también podría traducirse 'corneó', dado el contexto de bovinos; aquí se prefiere 'golpeó' porque conserva la violencia del acto sin especificar de más la manera.
    reason: lexical_alternative
  - marker: b
    text: '''Hasta la tierra'' también puede entenderse como ''hasta el suelo'', ''a tierra'' o ''en la tierra'', según cuán concretamente se tome el movimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ጐድአ
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - azotó
  - hirió con un golpe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa un contacto violento o herida; 'golpeó' conserva la violencia sin añadir la especificación de 'corneó' o 'empujó', que sería más interpretativa. En español suena natural en una escena visionaria con animales.
- source_word: ጸሊም
  english_pob_choice: black
  chosen_spanish: negro
  alternatives_spanish:
  - oscuro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el término básico de color y el más directo en español para el contraste simbólico del pasaje.
- source_word: ጣዕዋ
  english_pob_choice: calf
  chosen_spanish: becerro
  alternatives_spanish:
  - ternero
  - novillo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa un bovino joven. 'Becerro' preserva mejor el valor léxico sin imponer sexo femenino, lo cual evita la tensión corregida por el audit trail inglés.
- source_word: ለቀይሕ
  english_pob_choice: the red calf
  chosen_spanish: el becerro rojo
  alternatives_spanish:
  - el rojo
  - el becerro encarnado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto lo identifica por el color; en español conviene explicitar el sustantivo para evitar la elipsis demasiado marcada. 'Rojo' mantiene la referencia visual del original.
- source_word: ተለዎ
  english_pob_choice: pursued
  chosen_spanish: lo persiguió
  alternatives_spanish:
  - lo siguió
  - lo fue tras él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La acción es hostil después del golpe; 'persiguió' comunica mejor la agresividad que 'siguió'.
- source_word: ውስተ ምድር
  english_pob_choice: onto the earth
  chosen_spanish: hasta la tierra
  alternatives_spanish:
  - sobre la tierra
  - a tierra
  - hasta el suelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La locución ge'ez señala dirección hacia la tierra/suelo. 'Hasta la tierra' preserva el movimiento sin decidir si entra en la tierra o simplemente llega al suelo.
- source_word: አክሀልኩ እምሶቤሃ ርእዮቶ
  english_pob_choice: I could no longer see
  chosen_spanish: ya no pude ver más
  alternatives_spanish:
  - dejé de verlo
  - ya no lo vi
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La clausula indica el cese de la visión profética. 'Ya no pude ver más' mantiene el sentido de pérdida de vista sin sonar demasiado técnico o arcaico.
theological_decisions:
- issue: Mantener la imaginería animal visionaria sin decodificarla en el texto principal
  english_pob_reading: Retain the black and red calf imagery as symbolic animals
  chosen_spanish_reading: Conservar el becerro negro y el becerro rojo como figuras visionarias
  alternative_spanish_readings:
  - identificarlo como Caín y Abel en la traducción
  - parafrasear la escena en términos humanos
  rationale: La visión apocalíptica debe leerse en su superficie simbólica. La traducción no debe resolver el símbolo ni sustituirlo por una interpretación, porque eso iría más allá del testimonio del texto.
  doctrine_reference: Principio de preservación de la imaginería apocalíptica y de no paráfrasis interpretativa
translation_notes:
  revision_awareness: 'El audit trail inglés registra una corrección importante: la forma del bovino joven debe ser ''calf''/''becerro'', no ''heifer'', para no imponer femenino al símbolo. Esta propuesta sigue esa revisión y evita la lectura femenina. También conserva la fuerza de ''struck'' y ''pursued'' sin sobreespecificar el modo del golpe.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y cualquier terminología litúrgica ajena al pasaje, ya que no aparece el Tetragrámaton ni lenguaje divino aquí.
  - '''Becerro'' se usa de manera consistente para ጣዕዋ, en línea con la revisión que corrige el error de género del inglés.'
  - La escena permanece literal y visionaria; no se introducen identificaciones narrativas de Caín y Abel en el texto principal.
