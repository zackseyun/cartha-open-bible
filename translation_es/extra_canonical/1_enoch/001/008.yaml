translation:
  language: es
  text: Y establecerá paz para los justos[a], y guardará a los escogidos; y el favor estará sobre ellos, y todos serán de Dios, y prosperarán[b] y serán bendecidos, y la luz de Dios brillará sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez indica paz dirigida a los justos; en español se evita la expresión «hacer paz con», que sugeriría reconciliación mutua y no está apoyada aquí.
    reason: theological_note
  - marker: b
    text: El verbo puede significar también «les irá bien» o «florecerán».
    reason: lexical_alternative
lexical_decisions:
- source_word: ሰላመ
  english_pob_choice: make peace
  chosen_spanish: hará paz
  alternatives_spanish:
  - dará paz
  - establecerá paz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro ge'ez ሰላመ ይገብር expresa una acción de paz más activa que un simple “dar paz”. “Hará paz” conserva esa fuerza verbal sin introducir la idea incorrecta de reconciliación mutua que tendría “hacer paz con” en español.
- source_word: የዓቅቦሙ
  english_pob_choice: guard them
  chosen_spanish: guardará a los escogidos
  alternatives_spanish:
  - los guardará
  - los protegerá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Guardar” mantiene el tono elevado y protege el matiz de preservación. En este contexto escatológico funciona mejor que “proteger” por su cercanía al valor de custodia del original.
- source_word: ሕሩያን
  english_pob_choice: the chosen ones
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los electos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Escogidos” es claro en español y conserva la designación teológica sin cargarla con el tecnicismo confesional de “electos”. Mantiene además el paralelismo con “los justos”.
- source_word: ሣህል
  english_pob_choice: favor
  chosen_spanish: el favor
  alternatives_spanish:
  - la gracia
  - la misericordia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido aquí es de benevolencia que reposa sobre ellos. “Favor” reproduce bien la colocación y evita reducir el término a “gracia” en un sentido ya más técnico o a “misericordia” como compasión enfocada en la miseria.
- source_word: ዘአምላክ
  english_pob_choice: be God's
  chosen_spanish: serán de Dios
  alternatives_spanish:
  - pertenecerán a Dios
  - serán de Dios mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión genitiva indica pertenencia. “Serán de Dios” es natural en español y conserva la idea de identidad y posesión sin añadir “pueblo” ni moralizarla como “serán piadosos”.
- source_word: ይሴርሑ
  english_pob_choice: prosper
  chosen_spanish: prosperarán
  alternatives_spanish:
  - les irá bien
  - florecerán
  - tendrán éxito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede implicar bienestar, prosperidad o florecimiento. “Prosperarán” mantiene el valor positivo general y sigue la decisión POB de no restringirlo a riqueza material.
- source_word: ይትባረኩ
  english_pob_choice: be blessed
  chosen_spanish: serán bendecidos
  alternatives_spanish:
  - recibirán bendición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva se refleja de manera directa con “serán bendecidos”, manteniendo el tono formular y litúrgico del texto.
- source_word: ይበርህ ሎሙ ብርሃነ አምላክ
  english_pob_choice: the light of God will shine upon them
  chosen_spanish: la luz de Dios brillará sobre ellos
  alternatives_spanish:
  - la luz de Dios alumbrará sobre ellos
  - la luz de Dios resplandecerá sobre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Brillará sobre ellos” conserva la imagen apocalíptica de iluminación divina y su paralelismo con “sobre ellos”. “Brillar” suena natural en español contemporáneo sin perder solemnidad.
theological_decisions:
- issue: Relación divina con los justos en ሰላመ ይገብር
  english_pob_reading: He will make peace for the righteous, not with the righteous
  chosen_spanish_reading: Y hará paz para los justos
  alternative_spanish_readings:
  - Y dará paz a los justos
  - Y establecerá paz para los justos
  rationale: En español, “hacer paz con” sugeriría reconciliación tras enemistad, lo cual no se deduce del ge'ez ni del contexto. “Para los justos” sigue el valor de finalidad/destino del original y evita introducir una teología de hostilidad previa.
  doctrine_reference: Translation philosophy §§1, 3-4; original-language primacy
- issue: Identidad de ዘአምላክ
  english_pob_reading: They will all be God's / belong to God
  chosen_spanish_reading: todos serán de Dios
  alternative_spanish_readings:
  - todos pertenecerán a Dios
  - todos serán propiedad de Dios
  rationale: “Serán de Dios” preserva la pertenencia sin volverla legalista o cosificadora. “Pertenecerán a Dios” es válido pero más explicativo; “propiedad” resulta demasiado moderno y duro para este contexto poético.
  doctrine_reference: Translation philosophy §1 original-language primacy
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audio inglés: la corrección de ''make peace with'' a ''make peace for'' y el ajuste de ''belong to God'' a ''be God''s''. La redacción española sigue esa línea, usando ''hará paz para'' y ''serán de Dios'' para reflejar con más precisión la relación de finalidad/pertenencia. También se preserva la tensión léxica de ''prosper'' con una nota de alternativa.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para አምላክ y no se introduce 'Señor'.
  - Se evita 'electos' para ሕሩያን, prefiriendo 'escogidos' por transparencia.
  - '''Favor'' se conserva como término distinto de ''gracia'' para no borrar la matización lexical.'
  - La imagen final se formula con 'la luz de Dios' para mantener la estructura posesiva del original y la cadencia poética.
