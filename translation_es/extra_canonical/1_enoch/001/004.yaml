translation:
  language: es
  text: Y el Dios de la eternidad[a], desde allí, hollará el monte Sinaí[b]; aparecerá con su hueste[c], y aparecerá en la fuerza de su poder desde el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La palabra ge'ez ዓለም también puede entenderse como «mundo» o «edad»; aquí se traduce «eternidad» para expresar el epíteto divino de duración perdurable.
    reason: lexical_alternative
  - marker: b
    text: 'El verbo se traduce de forma enfática: no solo «irá», sino que avanza solemnemente sobre el monte, preservando la imagen teofánica.'
    reason: lexical_alternative
  - marker: c
    text: La lectura auditada del término corresponde a «hueste» o séquito celestial, no a «manifestación».
    reason: textual_variant
lexical_decisions:
- source_word: እምላከ (reading as ወ+አምላክ)
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - deidad
  lexicon: Leslau, Comparative Dictionary of Ge‘ez
  rationale: Se conserva el sujeto divino sin desplazarlo a un nombre propio. En español, «Dios» comunica bien el referente y mantiene la función sintáctica del hebreo/gee'z original.
- source_word: ዓለም
  english_pob_choice: eternity
  chosen_spanish: eternidad
  alternatives_spanish:
  - mundo
  - edad
  lexicon: Leslau, Comparative Dictionary of Ge‘ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción con «Dios» funciona mejor como epíteto de duración. «Eternidad» preserva la idea temporal-teológica que el POB inglés destacó frente a «mundo/edad».
- source_word: እምህየ
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Desde allí» es natural en español y mantiene la deixis remitiendo al lugar mencionado en el contexto previo.
- source_word: ይከይድ
  english_pob_choice: will tread
  chosen_spanish: pisará
  alternatives_spanish:
  - irá
  - vendrá
  - marchará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El POB inglés eligió «will tread» para conservar la imagen solemne de poner el pie sobre un lugar santo. En español, «pisará» transmite ese contacto fuerte mejor que un simple «irá».
- source_word: ዲበ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición expresa contacto con la superficie. «Sobre» es la equivalencia más clara y sobria en español; en la frase se integra como «pisará el monte Sinaí».
- source_word: ሲና ደብር
  english_pob_choice: Mount Sinai
  chosen_spanish: el monte Sinaí
  alternatives_spanish:
  - el monte de Sinaí
  - Sinaí, el monte
  lexicon: Leslau, Comparative Dictionary of Ge‘ez
  rationale: Se mantiene el topónimo bíblico usual en español y el sustantivo común «monte», equivalente de ደብር.
- source_word: ያስተርኢ
  english_pob_choice: will appear
  chosen_spanish: aparecerá
  alternatives_spanish:
  - se mostrará
  - se dejará ver
  lexicon: Leslau, Comparative Dictionary of Ge‘ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto de teofanía, «aparecerá» reproduce bien la manifestación divina sin añadir matices reflexivos innecesarios.
- source_word: በትዕይንቱ
  english_pob_choice: with his host
  chosen_spanish: con su hueste
  alternatives_spanish:
  - con su ejército
  - con su campamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se adopta la corrección textual/auditiva documentada en el POB inglés: el término apunta a «hueste/hoste», no a «manifestación». «Hueste» conserva el matiz bíblico y militar-celestial.'
- source_word: በኃይለ
  english_pob_choice: in the strength
  chosen_spanish: en la fuerza
  alternatives_spanish:
  - con el poder
  - en el poder
  lexicon: Leslau, Comparative Dictionary of Ge‘ez
  rationale: «Fuerza» sigue de cerca el sustantivo ge'ez y empareja bien con la frase siguiente sin perder solemnidad.
- source_word: ጽንዑ
  english_pob_choice: of his might
  chosen_spanish: de su poder
  alternatives_spanish:
  - de su might
  - de su fuerza
  - de su firmeza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «poder» comunica con naturalidad la intensidad de ጽንዕ y evita una construcción demasiado áspera. Se mantiene la duplicación enfática como «la fuerza de su poder».
- source_word: እምሰማይ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - de los cielos
  - del cielo
  lexicon: Leslau, Comparative Dictionary of Ge‘ez
  rationale: «Desde el cielo» reproduce el origen celeste del movimiento en un español claro y reverente.
theological_decisions:
- issue: Epíteto divino አምላክ ዓለም
  english_pob_reading: God of eternity / God of the world/age
  chosen_spanish_reading: Dios de la eternidad
  alternative_spanish_readings:
  - Dios del mundo
  - Dios de la edad
  rationale: Se privilegia el valor de duración señalado por el POB inglés y se evita una lectura cosmológica que no encaja tan bien con el tono teofánico del verso. «Eternidad» preserva el énfasis en la permanencia divina.
  doctrine_reference: Translation philosophy §Original-language primacy; §Consistency of key terms
- issue: Imagen de ትዕይንት / hoste celestial
  english_pob_reading: with his host
  chosen_spanish_reading: con su hueste
  alternative_spanish_readings:
  - con su ejército
  - con su campamento
  rationale: Se sigue la revisión auditada que corrige la lectura anterior y devuelve la imagen de acompañamiento celestial/militar. «Hueste» es un término sobrio y bíblicamente reconocible en español.
  doctrine_reference: Translation philosophy §Original-language primacy; §Preserve documented lexical/theological tension
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada más reciente que corrigió la lectura de ትዕይንት como «with his host» y descartó la traducción anterior basada en «manifestation». También se conservó la decisión del POB inglés de entender ዓለም como epíteto de duración, no como «mundo».
  spanish_consistency_notes:
  - Se mantiene «Dios» para አምላክ/אלוהים según la convención del proyecto.
  - Se usa «hueste» para la compañía celestial, coherente con el ajuste textual documentado.
  - «Eternidad» se emplea como epíteto divino, no como concepto abstracto independiente.
  - Se evita «SEÑOR» porque el texto fuente no requiere el recurso de ocultación del nombre divino.
