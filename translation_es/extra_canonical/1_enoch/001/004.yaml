base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/001/004.yaml
  text: And the God of eternity[a], from there, will tread upon Mount Sinai; he will appear with his host[d][c][b], and he will appear in the strength of his might from heaven.
  footnotes:
  - marker: a
    text: The phrase translated “in his manifestation” is በትዕይንቱ, literally “in his appearance.” Some Greek witnesses have “from his camp,” a different image; the Ge’ez here points to a theophany (appearance) rather than an encampment.
    reason: textual_variant
  - marker: b
    text: “God of eternity” translates አምላክ ዓለም; it can also be read “God of the world/age.” The present rendering emphasizes duration rather than realm.
    reason: lexical_alternative
  - marker: c
    text: The verb ይከይድ is rendered “will tread” to retain the weighty theophanic imagery; alternatives include “will go/come forth.”
    reason: lexical_alternative
  - marker: d
    text: Or 'in his manifestation'.
    reason: previous_rendering
