translation:
  language: es
  text: 'Y Enoc respondió y dijo: «Un hombre justo[a], cuyos ojos fueron abiertos por Dios, vio una visión santa en los cielos[b], que me mostraron los ángeles; y de ellos oí todo, y entendí lo que vi; pero no para esta generación, sino para una generación distante[c] que ha de venir[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El giro «cuyos ojos fueron abiertos por Dios» sigue de cerca la construcción difícil del ge'ez; en contexto, se refiere a una apertura de la percepción visionaria, no solo física.
    reason: textual_variant
  - marker: b
    text: «Los cielos» conserva el plural cosmológico semítico frecuente en textos apocalípticos.
    reason: cultural_note
  - marker: c
    text: O también «lejana». El término conserva la idea de distancia, no solo de futuridad.
    reason: lexical_alternative
  - marker: d
    text: La frase final también puede entenderse como «para una generación lejana que vendrá».
    reason: lexical_alternative
lexical_decisions:
- source_word: አውሥአ
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo narrativo abre una fórmula semítica de discurso; en español, «respondió y dijo» o «contestó» transmiten ese valor sin perder el tono solemne. Aquí se eligió una forma breve y natural, manteniendo la introducción oracional.
- source_word: ብእሲ ጻድቅ
  english_pob_choice: a righteous man
  chosen_spanish: un hombre justo
  alternatives_spanish:
  - un hombre recto
  - un hombre piadoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Justo» conserva la fuerza moral y también la resonancia judicial/covenantal posible de צדיק / δίκαιος. «Recto» o «piadoso» suavizan o desplazan el matiz.
- source_word: ዘእምኀበ እግዚአብሔር [እንዘ] አዕይን ቲሁ ክሡታት
  english_pob_choice: his eyes having been opened by God
  chosen_spanish: cuyos ojos habían sido abiertos por Dios
  alternatives_spanish:
  - con sus ojos abiertos por Dios
  - a quien Dios había abierto los ojos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa una apertura divina de la percepción visionaria. En español, la relativa «cuyos ojos habían sido abiertos por Dios» preserva la dependencia y evita convertirla en una paráfrasis interpretativa.
- source_word: እግዚአብሔር
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto etiópico, el término señala la agencia divina sin necesidad de la fórmula de nombre pactual. «Dios» es la equivalencia más directa y evita introducir una convención litúrgica no requerida.
- source_word: ራእየ ቅዱሰ
  english_pob_choice: a holy vision
  chosen_spanish: una visión santa
  alternatives_spanish:
  - una visión sagrada
  - la visión del Santo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo califica naturalmente la visión; «santa» conserva el registro apocalíptico. «Sagrada» es válida, pero puede sonar más cultual que visionaria.
- source_word: ዘበሰማያት
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se retiene el plural cosmológico semítico. «En los cielos» comunica mejor el matiz plural que «en el cielo».
- source_word: ዘአርአዩኒ መላእክት
  english_pob_choice: which the angels showed me
  chosen_spanish: que me mostraron los ángeles
  alternatives_spanish:
  - que los ángeles me revelaron
  - que los ángeles me hicieron ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Mostrar» conserva el énfasis visual y la mediación angélica sin añadir una interpretación más abstracta como «revelaron».
- source_word: ወሰማዕኩ እምኀቤሆሙ ኵሎ
  english_pob_choice: and from them I heard everything
  chosen_spanish: y de ellos oí todo
  alternatives_spanish:
  - y de ellos escuché todo
  - y de ellos oí todas las cosas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oí todo» mantiene la totalidad del contenido recibido y suena más natural que una forma pesada. «Escuché» podría sugerir atención voluntaria más que recepción de revelación.
- source_word: ወአእመርኩ አነ ዘእሬኢ
  english_pob_choice: and I understood what I saw
  chosen_spanish: y entendí lo que vi
  alternatives_spanish:
  - y comprendí lo que vi
  - y conocí lo que vi
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa comprensión cognitiva de la visión. «Entendí» es claro y conserva el paso de ver a comprender.
- source_word: ወአኮ ለዛ ትውልድ አላ ለዘ ይመጽእ ርኁቃት
  english_pob_choice: but not for this generation, rather for one far off that is to come
  chosen_spanish: pero no para esta generación, sino para una distante que ha de venir
  alternatives_spanish:
  - pero no para esta generación, sino para una futura que ha de venir
  - pero no para esta generación, sino para una lejana que vendrá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la oposición entre la generación presente y una futura/distante. «Una distante» reproduce el carácter elíptico del original y evita fijar innecesariamente si se trata de una generación o de un colectivo, aunque el artículo permite leerlo naturalmente en español.
theological_decisions:
- issue: Cómo representar la identidad y función de la visión dada a Enoch
  english_pob_reading: A righteous man whose eyes were opened by God saw a holy vision in the heavens, which the angels showed me
  chosen_spanish_reading: Un hombre justo, cuyos ojos habían sido abiertos por Dios, vio una visión santa en los cielos, que me mostraron los ángeles
  alternative_spanish_readings:
  - Un hombre justo, con los ojos abiertos por Dios, vio una visión santa en los cielos
  - Un hombre justo, a quien Dios le abrió los ojos, vio una visión santa en los cielos
  rationale: La redacción mantiene la tensión entre percepción humana y apertura divina sin resolverla en una explicación más explícita de la que exige el texto. También conserva el papel mediador de los ángeles y el carácter visionario de la escena.
  doctrine_reference: Preserve theological tension rather than smoothing it.
- issue: Alcance temporal de la revelación
  english_pob_reading: not for this generation, but for a distant one that is to come
  chosen_spanish_reading: no para esta generación, sino para una distante que ha de venir
  alternative_spanish_readings:
  - no para esta generación, sino para una futura que ha de venir
  - no para esta generación, sino para generaciones lejanas
  rationale: La frase conserva el contraste escatológico y la distancia del destinatario. Se evita convertirlo en una generalidad sobre el futuro sin mantener el tono de lejanía del original.
  doctrine_reference: Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que aclaró la puntuación, mantuvo la cláusula de apertura ocular como subordinada y fijó «but for a distant one that is to come»; la presente redacción española sigue esa última lectura y conserva la apertura divina, la mediación angélica y el contraste temporal sin introducir glosas doctrinales.
  spanish_consistency_notes:
  - Se usa «Dios» para እግዚአብሔር, conforme al audit trail.
  - Se conserva el plural cosmológico con «los cielos».
  - Se mantiene un registro solemne pero natural en español.
  - No se usa «Cristo», «SEÑOR» ni otras sustituciones no justificadas por el contexto.
  - Los marcadores de nota aparecen exactamente en el texto principal y cada uno corresponde a una sola nota.
