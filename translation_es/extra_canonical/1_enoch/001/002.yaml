  yaml_path: translation/extra_canonical/1_enoch/001/002.yaml
  text: 'And Enoch answered and said: "A righteous man[a], whose eyes were opened by God, saw a holy vision in the heavens, which the angels showed me; and from them I heard everything, and I understood what I saw—but not for this generation[d][c][b], but for a distant one that is to come."'
