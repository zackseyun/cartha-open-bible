translation:
  language: es
  text: Y la tierra será rasgada[a], y todo lo que está dentro de la tierra[b] será destruido, y el juicio[c] vendrá sobre todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será hendida» o «será partida». El ge'ez apunta a una ruptura o desgarramiento físico, no solo a una sacudida.
    reason: lexical_alternative
  - marker: b
    text: O «todo lo que está en la tierra» o «todo lo que está sobre la tierra». El ge'ez dice literalmente «todo lo que está en la tierra», pero en español «dentro de la tierra» comunica mejor ese matiz sin suavizarlo.
    reason: lexical_alternative
  - marker: c
    text: O «la justicia» o «la rectitud». Aquí el término funciona como un acto de juicio que vendrá sobre todos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ትሠጠጥ
  english_pob_choice: shall be rent asunder
  chosen_spanish: será rasgada
  alternatives_spanish:
  - será hendida
  - será partida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico describe una acción violenta de abrir o rasgar, no solo sacudir. «Será rasgada» conserva la imagen apocalíptica de ruptura física sin añadir detalles no explícitos.
- source_word: ምድር
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cósmico y universal, «la tierra» es la correspondencia más natural y fiel. «El mundo» podría sonar más interpretativo.
- source_word: ኵሉ ዘውስተ ምድር
  english_pob_choice: everything that is in the earth
  chosen_spanish: todo lo que está en la tierra
  alternatives_spanish:
  - todo lo que hay en la tierra
  - todo lo que está dentro de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase ge'ez es literalmente «todo lo que está en la tierra». En español, «todo lo que está en la tierra» mantiene la fuerza del original y evita suavizarla hacia «sobre la tierra».
- source_word: ይትሐጐል
  english_pob_choice: shall be destroyed
  chosen_spanish: será destruido
  alternatives_spanish:
  - perecerá
  - será consumido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa ruina o destrucción. «Será destruido» es la forma más clara y amplia en español, y encaja con la secuencia de juicio cósmico.
- source_word: ፍትሕ
  english_pob_choice: judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la justicia
  - la rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el término puede abarcar «justicia» o «rectitud», aquí la cláusula «vendrá sobre todos» indica un acto de rendición de cuentas, no solo una cualidad moral. «El juicio» preserva esa tensión sin resolverla artificialmente.
- source_word: ላዕለ ኵሉ
  english_pob_choice: upon all
  chosen_spanish: sobre todos
  alternatives_spanish:
  - contra todos
  - encima de todos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición comunica una acción que cae encima de todos. «Sobre todos» suena natural en español y conserva la idea de alcance universal.
theological_decisions:
- issue: Si ፍትሕ debe entenderse como cualidad moral («justicia/rectitud») o como acto escatológico («juicio»).
  english_pob_reading: judgment
  chosen_spanish_reading: el juicio
  alternative_spanish_readings:
  - la justicia
  - la rectitud
  rationale: La estructura verbal «vendrá sobre todos» favorece una acción divina de juicio. Traducirlo como «el juicio» mantiene el carácter apocalíptico del versículo y evita convertirlo en una afirmación abstracta.
  doctrine_reference: 'Principio POB: preservar la tensión teológica cuando el término admite más de una lectura; tabla de términos disputados justicia/rectitud'
- issue: Si la imagen del verbo debe atenuarse como simple agitación o mantenerse como ruptura física.
  english_pob_reading: shall be rent asunder
  chosen_spanish_reading: será rasgada
  alternative_spanish_readings:
  - será sacudida
  - será estremecida
  rationale: La revisión textual y la evidencia léxica apoyan una imagen de ruptura, no de mera vibración. «Será rasgada» sigue esa lectura y refleja mejor el paralelismo apocalíptico del pasaje.
  doctrine_reference: 'Principio POB: no borrar la tensión o el impacto del lenguaje fuente; mantener la imaginería cuando está respaldada por el texto'
translation_notes:
  revision_awareness: La versión inglesa más temprana leía «shall be shaken», pero la revisión posterior corrigió el sentido a «shall be rent asunder» con respaldo del ge'ez y del testimonio griego. La redacción española sigue esa corrección y evita la lectura suavizada.
  spanish_consistency_notes:
  - Se usa «tierra» para ምድር por el alcance cósmico del pasaje.
  - Se mantiene «juicio» para ፍትሕ, con nota que preserva las alternativas «justicia» y «rectitud».
  - Se conserva la imagen fuerte de ruptura para ትሠጠጥ, acorde con la revisión textual.
  - No se traduce mecánicamente «sobre la tierra» porque el ge'ez es más literal con «en la tierra» y el español permite esa formulación sin pérdida de claridad.
