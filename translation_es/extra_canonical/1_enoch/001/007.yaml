review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del ge''ez y sigue la revisión inglesa en los puntos principales: ruptura de la tierra, destrucción total y venida del juicio. Sin embargo, en ኵሉ ዘውስተ ምድር el español principal usa «en la tierra», lo cual en español normalmente se oye como ''sobre la tierra'' y no preserva con suficiente fidelidad la rareza literal «in the earth» que el POB decidió mantener. También la nota b está internamente confusa, porque ofrece «dentro de la tierra» como alternativa pero luego dice que la forma literal es «en la tierra»; en español, para comunicar la intención del original, conviene llevar «dentro de la tierra» al texto principal.'
  spanish_quality_summary: El texto es claro y digno, pero requiere un ajuste menor para mayor precisión semántica y mejor coherencia entre texto principal y nota. «La tierra será rasgada» es entendible, aunque «se abrirá en grietas» sería más interpretativo; «será rasgada» es aceptable. «Todo lo que está en la tierra» suena natural, pero no transmite bien el matiz documentado. Con «todo lo que está dentro de la tierra» el español sigue siendo legible y preserva mejor la decisión auditada.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. «Juicio» para ፍትሕ está bien justificado por el contexto apocalíptico. No aparecen términos sensibles del glosario mayor como Yahvé, Mesías, Espíritu o δοῦλος.
  issues:
  - severity: medium
    issue: La frase principal «todo lo que está en la tierra» no preserva suficientemente la literalidad significativa de ኵሉ ዘውስተ ምድር.
    rationale: El audit trail inglés decidió mantener la rareza de «everything that is in the earth» en vez de suavizar a «on the earth». En español, «en la tierra» tenderá a entenderse como ubicación superficial/general, no como contenido interior. «Dentro de la tierra» comunica mejor la decisión documentada.
  - severity: medium
    issue: La nota b contradice o desdibuja la decisión léxica.
    rationale: 'Presenta «dentro de la tierra» como mera alternativa mientras afirma que el ge''ez literal dice «en la tierra». Dado el valor semántico en español, conviene invertir la relación: poner «dentro de la tierra» en el texto y notar que también puede entenderse como «en la tierra» o «sobre la tierra».'
  revised_spanish_text: Y la tierra será rasgada[a], y todo lo que está dentro de la tierra[b] será destruido, y el juicio[c] vendrá sobre todos.
  revised_footnotes:
  - marker: a
    text: O «será hendida» o «será partida». El ge'ez apunta a una ruptura o desgarramiento físico, no solo a una sacudida.
    reason: lexical_alternative
  - marker: b
    text: O «todo lo que está en la tierra» o «todo lo que está sobre la tierra». El ge'ez dice literalmente «todo lo que está en la tierra», pero en español «dentro de la tierra» comunica mejor ese matiz sin suavizarlo.
    reason: lexical_alternative
  - marker: c
    text: O «la justicia» o «la rectitud». Aquí el término funciona como un acto de juicio que vendrá sobre todos.
    reason: lexical_alternative
