translation:
  language: es
  text: Y he aquí[a], viene con miríadas de santos, para ejecutar juicio sobre ellos, y destruir a los impíos[c], y reprender a toda carne[b] por todo lo que los pecadores e impíos hicieron y hablaron contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y mira». La expresión reproduce el tono visionario e introductorio del original.
    reason: lexical_alternative
  - marker: b
    text: «Toda carne» es un modismo bíblico para toda la humanidad; se conserva la imagen concreta del texto fuente.
    reason: cultural_note
  - marker: c
    text: Este versículo se refleja en Judas 14–15, pero aquí la redacción sigue el testimonio ge'ez recibido y no una conformación directa al Nuevo Testamento.
    reason: cross_reference
lexical_decisions:
- source_word: ወናሁ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - He aquí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el valor deíctico y visionario del giro apocalíptico sin reducirlo a una simple conjunción.
- source_word: መጽአ
  english_pob_choice: he comes
  chosen_spanish: viene
  alternatives_spanish:
  - viene
  - vendrá
  - ha venido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En discurso profético/apocalíptico, el presente vívido en español mantiene la inmediatez de la visión sin fijar de más el tiempo verbal.
- source_word: በትእልፊተ ቅዱሳን
  english_pob_choice: with myriads of holy ones
  chosen_spanish: con miríadas de seres santos
  alternatives_spanish:
  - con diez millares de seres santos
  - con innumerables seres santos
  - con santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Miríadas» preserva el matiz numérico-apocalíptico; «seres santos» mantiene la ambigüedad de la expresión sin decidir prematuramente entre ángeles y santos humanos.
- source_word: ይግበር ፍትሐ
  english_pob_choice: to execute judgment
  chosen_spanish: para ejecutar juicio
  alternatives_spanish:
  - para hacer justicia
  - para llevar a cabo juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto judicial, «juicio» expresa mejor la acción forense que una abstracción como «justicia».
- source_word: ላዕሌሆሙ
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - encima de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre ellos» conserva amplitud semántica y funciona bien con la escena de juicio que sigue.
- source_word: ይሕጕሎሙ ለረሲዓን
  english_pob_choice: to destroy the wicked
  chosen_spanish: destruir a los impíos
  alternatives_spanish:
  - castigar a los impíos
  - condenar a los impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo pide una fuerza mayor que una simple reprensión; «impíos» traduce el adjetivo moral con un registro bíblico claro en español.
- source_word: ይዘልፍ ኵሎ ዘሥጋ
  english_pob_choice: to rebuke all flesh
  chosen_spanish: reprender a toda carne
  alternatives_spanish:
  - reprender a toda la humanidad
  - reprobar a toda carne
  - contender con toda carne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el giro concreto «toda carne», que es un modismo bíblico, evitando reemplazarlo por una paráfrasis más abstracta.
- source_word: ኵሉ ዘገብሩ ወረሰዩ
  english_pob_choice: everything that ... have done and spoken
  chosen_spanish: por todo lo que los pecadores e impíos hicieron y hablaron
  alternatives_spanish:
  - por todo lo que ... hicieron y cometieron
  - por todo lo que ... hicieron y dijeron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la doble referencia a acción y palabra; «hablaron» refleja mejor la corrección auditada del verbo final que una segunda acción general.
- source_word: ኃጥኣን ወረሲዓን
  english_pob_choice: the sinful and wicked
  chosen_spanish: los pecadores e impíos
  alternatives_spanish:
  - los pecadores y los malvados
  - los pecaminosos y los impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la doble acusación moral del original con dos términos distintos y naturalmente bíblicos en español.
- source_word: ላዕሌሁ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - ante él
  - frente a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular retoma al juez divino implícito; «contra él» preserva el matiz de ofensa personal que cierra el verso.
theological_decisions:
- issue: Identidad del sujeto que viene
  english_pob_reading: Render the subject simply as 'he' without specifying 'the Lord' in the main text.
  chosen_spanish_reading: Mantener «viene» sin añadir un sujeto explícito como «el Señor» o «Dios».
  alternative_spanish_readings:
  - el Señor viene
  - Dios viene
  rationale: La fuente ge'ez dada no explicita el sujeto; la traducción no debe resolver la tensión insertando un título ausente, aunque el contexto sea teofánico.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión interpretativa.
- issue: Sentido de «holy ones»
  english_pob_reading: Translate as 'holy ones' rather than 'saints' or 'angels.'
  chosen_spanish_reading: Traducir como «seres santos» en lugar de «santos» o «ángeles».
  alternative_spanish_readings:
  - santos
  - ángeles
  rationale: «Seres santos» conserva la expresión abierta de la fuente y evita cerrar prematuramente la referencia hacia seres humanos o angélicos.
  doctrine_reference: Conservación de la ambigüedad léxica cuando el original no la resuelve de forma explícita.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para sustituir la frase final de acción general por una referencia explícita a lo hablado («spoken against him»). La redacción española sigue esa revisión con «hablaron contra él», evitando una traducción que diluya el componente verbal. También se mantuvo la preferencia por una designación abierta de los «holy ones» y por el sujeto implícito de la venida, conforme a la política auditada.
  spanish_consistency_notes:
  - Se mantuvo «Y he aquí» como fórmula apocalíptica estable y natural en español.
  - Se evitó «SEÑOR» como máscara para el nombre divino porque la fuente dada no lo explicita en esta línea.
  - «Impíos» y «pecadores» se conservaron como dos acusaciones distintas para reflejar el paralelismo del original.
  - «Toda carne» se dejó literal por su valor idiomático bíblico y porque el registro español lo admite sin oscurecer el sentido.
