base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/001/009.yaml
  text: And behold[a], he comes with myriads of holy ones, to execute judgment upon them, and to destroy the wicked[c][b], and to rebuke all flesh for everything that the sinful and wicked have done and spoken against him.
  footnotes:
  - marker: a
    text: Or 'with ten thousands of holy ones.' The Ge'ez phrase denotes an immense host and may reflect a traditional numerical expression.
    reason: lexical_alternative
  - marker: b
    text: '''All flesh'' is a traditional idiom for all humanity; the translation keeps the concrete wording of the source.'
    reason: cultural_note
  - marker: c
    text: This verse is echoed in Jude 14–15, but the wording here is translated from the Ge'ez witness itself rather than conformed to later New Testament phrasing.
    reason: cross_reference
