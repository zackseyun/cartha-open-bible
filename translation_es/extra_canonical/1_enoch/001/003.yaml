    text: «Escogidos» también puede traducirse «Elegidos» o, de manera más tradicional, «Electos».
    reason: lexical_alternative
  - marker: b
    text: «Parábola» aquí designa un dicho profético o poético; no necesariamente una narración breve con personajes y trama.
    reason: cultural_note
  - marker: c
    text: «Saldrá» también puede traducirse «vendrá» o «vendrá de allí».
    reason: lexical_alternative
  revision_rationale: Se ajusta ኅሩያን a «Escogidos» para alinearlo mejor con la decisión auditada «Chosen Ones», manteniendo las alternativas en nota. Se conserva el resto de la sintaxis por su fidelidad y naturalidad, y se añade la alternativa documentada para ይወፅእ. No se requiere una relectura doctrinal o filológica mayor.
