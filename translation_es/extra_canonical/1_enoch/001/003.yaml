translation:
  language: es
  text: 'En cuanto a los Escogidos[a], hablé, y pronuncié una parábola acerca de ellos[b]: el Santo y Grande saldrá[c] de su morada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Escogidos» también puede traducirse «Elegidos» o, de manera más tradicional, «Electos».
    reason: lexical_alternative
  - marker: b
    text: «Parábola» aquí designa un dicho profético o poético; no necesariamente una narración breve con personajes y trama.
    reason: cultural_note
  - marker: c
    text: «Saldrá» también puede traducirse «vendrá» o «vendrá de allí».
    reason: lexical_alternative
lexical_decisions:
- source_word: በእንተ
  english_pob_choice: concerning
  chosen_spanish: en cuanto a
  alternatives_spanish:
  - acerca de
  - sobre
  lexicon: Dillmann; Leslau
  rationale: Marca el tema o referencia del enunciado. «En cuanto a» conserva la función temática sin sonar mecánico en español.
- source_word: ኅሩያን
  english_pob_choice: Chosen Ones
  chosen_spanish: los Elegidos
  alternatives_spanish:
  - los Escogidos
  - los Electos
  lexicon: Leslau; Dillmann
  rationale: El sentido básico es «elegidos/escogidos». «Elegidos» es natural en español bíblico y mantiene el plural nominal sin cargar innecesariamente con asociaciones confesionales adicionales.
- source_word: እቤ
  english_pob_choice: I spoke
  chosen_spanish: hablé
  alternatives_spanish:
  - dije
  - hablé públicamente
  - declaré
  lexicon: Dillmann
  rationale: La revisión textual corrige la idea de «lifted up»; el ge’ez expresa simplemente hablar/decir/utter. «Hablé» refleja bien el acto verbal sin añadir un matiz no presente.
- source_word: አውሣእኩ
  english_pob_choice: I uttered
  chosen_spanish: pronuncié
  alternatives_spanish:
  - dije
  - emití
  - proferí
  lexicon: Dillmann; Leslau
  rationale: Para 1ª singular con el valor de «uttered/spoke», «pronuncié» conserva un registro digno y la idea de enunciar una fórmula o dicho. Evita la falsa imagen de un gesto físico de «levantar».
- source_word: ምስለ
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - dicho
  - sentencia
  - proverbio
  lexicon: Leslau; Dillmann
  rationale: En este contexto enóquico funciona como un dicho profético o poético. «Parábola» mantiene la tradición terminológica y el valor de enunciado figurado, sin implicar necesariamente una narración.
- source_word: ቅዱስ ወዐቢይ
  english_pob_choice: the Holy and Great One
  chosen_spanish: el Santo y Grande
  alternatives_spanish:
  - el Santo Grande
  - el Santo, el Grande
  lexicon: Leslau; Dillmann
  rationale: Se conserva la mayúscula para señalar el carácter titular/divino. «Santo y Grande» reproduce el paralelismo de los dos adjetivos sin suavizar la fórmula.
- source_word: እማኅደሩ
  english_pob_choice: from his dwelling
  chosen_spanish: de su morada
  alternatives_spanish:
  - de su habitación
  - de su habitación celestial
  - de su habitación
  lexicon: Leslau; Dillmann
  rationale: «Morada» es idiomático, reverente y claro en español bíblico. Comunica el lugar de residencia sin introducir una especificación que el texto no da.
theological_decisions:
- issue: Identidad de «el Santo y Grande»
  english_pob_reading: A divine title for the God of Israel (the Most High) who manifests in theophany.
  chosen_spanish_reading: Un título divino para Dios, que viene en manifestación teofánica desde su morada.
  alternative_spanish_readings:
  - un ser santo y grande
  - un ángel exaltado, santo y grande
  rationale: El contexto habla de salir de su morada en un marco de venida solemne; por eso la lectura titular/divina es la más fuerte. La traducción conserva la ambigüedad relativa del ge’ez con mayúsculas, sin convertirla en una formulación dogmática posterior.
  doctrine_reference: Principios de primacía de la fuente y preservación de tensiones interpretativas del POB.
translation_notes:
  revision_awareness: La draft final de referencia corrigió la lectura previa de «I lifted up my parable» a «I uttered a parable»; esta versión española sigue esa revisión y evita cualquier verbo que sugiera un gesto físico de levantar. También conserva el valor titular de «the Holy and Great One» sin sobreexplicar la identidad.
  spanish_consistency_notes:
  - Se mantiene «Elegidos» para el grupo destinatario, coherente con el valor de plural de ኅሩያን.
  - Se mantiene «parábola» como término técnico para el dicho enóquico, con nota aclaratoria para evitar una lectura exclusivamente narrativa.
  - «Morada» conserva el tono bíblico y no introduce una localización concreta no presente en el original.
