review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del ge’ez y la revisión inglesa auditada: tema introductorio sobre los escogidos/elegidos, doble verbo de habla, y la salida del personaje divino desde su morada. Sin embargo, «los Elegidos» se aparta del término preferido por el POB inglés («Chosen Ones») y de la nota léxica que preserva la alternativa «Elect» solo como opción secundaria. Además, «el Santo y Grande» suena elíptico en español donde el inglés y la decisión teológica tratan la expresión como título sustantivado: «el Santo y Grande» es comprensible, pero «el Santo y el Grande» sería demasiado interpretativo, y la solución más natural y fiel es mantener «el Santo y Grande» solo si se acepta esa elipsis. Aun así, el ajuste principal necesario es terminológico y de notas.'
  spanish_quality_summary: El español es legible y digno, pero puede mejorar en fidelidad terminológica y en la gestión de notas. «En cuanto a» y «hablé» funcionan bien. «Pronuncié una parábola» también es natural. La frase final es clara. No obstante, conviene cambiar «Elegidos» por «Escogidos» para representar mejor «Chosen Ones» sin cargar tanto el lenguaje soteriológico eclesial, y añadir una nota que preserve la alternativa tradicional «Electos». También falta una nota para la alternativa de «saldrá / saldrá de su morada» frente a «vendrá / vendrá de», que el inglés sí conserva para «go forth / come forth».
  glossary_alignment: 'No hay términos del glosario principal (Yahvé, Mesías, etc.) implicados directamente aquí. La principal cuestión de alineación es interna al proyecto: ኅሩያን fue documentado como «Chosen Ones», con «Elect» como alternativa. En español, «los Escogidos» se alinea mejor con esa decisión que «los Elegidos». «Parábola» se mantiene correctamente con nota explicativa. El título divino puede conservarse como «el Santo y Grande» por cercanía formal al original.'
  issues:
  - severity: medium
    issue: «los Elegidos» no refleja óptimamente la decisión léxica auditada para ኅሩያን
    rationale: El POB inglés escogió «Chosen Ones» y relegó «Elect» a alternativa. «Elegidos» en español se acerca más a «elect» que a «chosen». «Escogidos» preserva mejor la base léxica y evita connotaciones doctrinales más cargadas.
  - severity: low
    issue: La nota a sobre «Electos» no preserva la alternativa más natural/tradicional disponible
    rationale: Si el texto principal pasa a «Escogidos», la nota puede ofrecer «Elegidos» o «Electos». La formulación actual depende de mantener «Elegidos» en el texto principal.
  - severity: low
    issue: Falta la alternativa documentada para ይወፅእ
    rationale: El inglés conservó en nota que «will go forth» también puede ser «will come forth». En español conviene reflejarlo como «saldrá» / «vendrá» o «saldrá» / «vendrá de allí», para no perder una alternativa significativa ya auditada.
  revised_spanish_text: 'En cuanto a los Escogidos[a], hablé, y pronuncié una parábola acerca de ellos[b]: el Santo y Grande saldrá[c] de su morada.'
  revised_footnotes:
