base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/001/003.yaml
  text: 'Concerning the Chosen Ones I spoke[e][d][c][b][a], and I uttered a parable concerning them: The Holy and Great One will go forth from his dwelling.'
  footnotes:
  - marker: a
    text: “Lifted up my parable” reflects a Semitic idiom for uttering a stylized saying (cf. Hebrew “to lift up a proverb”). “I uttered a parable” would be a smooth equivalent.
    reason: cultural_note
  - marker: b
    text: “Chosen Ones” can also be rendered “Elect,” a traditional option.
    reason: lexical_alternative
  - marker: c
    text: “Parable” (Geʿez məsəl) here means a prophetic or poetic saying, not necessarily a narrative story.
    reason: cultural_note
  - marker: d
    text: “Will go forth” could also be rendered “will come forth.”
    reason: lexical_alternative
  - marker: e
    text: Or 'I lifted up my parable'.
    reason: previous_rendering
