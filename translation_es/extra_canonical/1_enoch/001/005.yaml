translation:
  language: es
  text: Y todos temerán, y los vigilantes[a] temblarán; y temor y gran temblor se apoderarán de ellos hasta los confines de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Los vigilantes» traduce aquí un término técnico usado en 1 Enoc para esos seres; la formulación española conserva ese valor sin recurrir al anglicismo «Watchers».
    reason: lexical_alternative
  - marker: b
    text: 'La expresión semítica «hasta los confines de la tierra» indica alcance universal: toda la tierra hasta sus límites más remotos.'
    reason: cultural_note
lexical_decisions:
- source_word: ይፈርሁ
  english_pob_choice: will fear
  chosen_spanish: temerán
  alternatives_spanish:
  - tendrán miedo
  - temerán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa el acto de temer; en español, 'temerán' conserva la fuerza lexical y el tono profético futuro sin añadir paráfrasis.
- source_word: ኵሉ
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: El cuantificador universal se expresa naturalmente con 'todos', sin necesidad de artículo adicional en español.
- source_word: ይደለቀለቁ
  english_pob_choice: will tremble
  chosen_spanish: temblarán
  alternatives_spanish:
  - estremecerán
  - quedarán sacudidos
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: La forma reduplicada intensifica la reacción; 'temblarán' es el equivalente más natural y fiel en español para una respuesta de teofanía.
- source_word: ትጉሃን
  english_pob_choice: the vigilant ones
  chosen_spanish: los vigilantes
  alternatives_spanish:
  - los vigilantes
  - los Watchers
  - los atentos
  lexicon: Leslau, Comparative Dictionary of Geʿez; revisión auditada posterior sobre el término técnico en 1 Enoc
  rationale: El término ge'ez es un nombre técnico para los 'Watchers'/'vigilantes' en 1 Enoc; en español, 'los vigilantes' mantiene el valor técnico sin introducir un anglicismo ni una glosa explicativa en el texto principal.
- source_word: ይነሥኦሙ
  english_pob_choice: will seize them
  chosen_spanish: los agarrarán
  alternatives_spanish:
  - los asirán
  - los aprehenderán
  - se apoderarán de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa una toma súbita y envolvente; 'agarrarán' comunica bien la idea de que miedo y temblor se apoderan de ellos, en un español claro y directo.
- source_word: ፍርሃት
  english_pob_choice: fear
  chosen_spanish: miedo
  alternatives_spanish:
  - temor
  - miedo
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: Aunque 'temor' es posible, 'miedo' combina mejor con 'gran temblor' en español y preserva el paralelismo afectivo del texto.
- source_word: ወረዓድ
  english_pob_choice: trembling
  chosen_spanish: temblor
  alternatives_spanish:
  - temblor
  - estremecimiento
  - quebranto
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: '''Temblor'' mantiene la correlación semántica con ''miedo'' y traduce de modo natural el sustantivo derivado del verbo ''temblar''.'
- source_word: ዓቢይ
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - gran
  - grande
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: '''Gran'' es la forma idiomática antepuesta en español para intensificar el sustantivo siguiente.'
- source_word: እስከ
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta
  - así como hasta
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: La preposición marca alcance/extensión; 'hasta' es la opción natural en español para expresar límite espacial.
- source_word: አጽናፈ ምድር
  english_pob_choice: the ends of the earth
  chosen_spanish: los confines de la tierra
  alternatives_spanish:
  - los confines de la tierra
  - los extremos de la tierra
  - los fines de la tierra
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: La locución semítica idiomática se vierte con 'los confines de la tierra', fórmula clara en español para la amplitud universal del alcance.
theological_decisions:
- issue: Referente de ትጉሃን
  english_pob_reading: the vigilant ones / the Watchers, left deliberately open in English audit trail
  chosen_spanish_reading: los vigilantes
  alternative_spanish_readings:
  - los Watchers
  - los seres vigilantes
  - los atentos
  rationale: El ge'ez usa un término técnico de 1 Enoc para los Watchers/vigilantes. En español, 'los vigilantes' preserva esa referencia sin forzar una identificación interpretativa adicional en el cuerpo del texto.
  doctrine_reference: 1 Enoc 1:5; uso técnico del término en la literatura enoquica
- issue: Alcance de la expresión 'los confines de la tierra'
  english_pob_reading: a Semitic idiom describing universal scope—the whole world to its furthest limits
  chosen_spanish_reading: los confines de la tierra
  alternative_spanish_readings:
  - hasta los confines de la tierra
  - hasta los extremos de la tierra
  - por toda la tierra
  rationale: Se conserva el modismo semítico para mantener su fuerza apocalíptica y su alcance universal, sin convertirlo en una explicación más interpretativa que el original.
  doctrine_reference: Idiomática semítica en literatura apocalíptica
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisiones: la propuesta inglesa más reciente optó por «the vigilant ones» para evitar imponer una identificación; sin embargo, el registro de auditoría reconoce que ትጉሃን es el término técnico de 1 Enoc para los Watchers. En español se eligió «los vigilantes» para reflejar el valor técnico del término sin depender de la glosa inglesa ni introducir una nota interpretativa en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio por estilo de coordinación narrativa del verso, siguiendo el ritmo del original.
  - 'Se preserva el paralelismo de dos miembros: reacción universal y reacción específica de los vigilantes.'
  - Se evita 'SEÑOR' u otras sustituciones teológicas porque el verso no contiene el nombre divino.
  - Se usa 'confines de la tierra' para mantener la fórmula idiomática semítica y su resonancia apocalíptica.
