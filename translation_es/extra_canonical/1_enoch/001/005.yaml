  - marker: b
    text: 'La expresión semítica «hasta los confines de la tierra» indica alcance universal: toda la tierra hasta sus límites más remotos.'
    reason: cultural_note
  revision_rationale: Se elimina la nota redundante sobre «temerán», se mantiene «los vigilantes» conforme a la revisión auditada, y se mejora la naturalidad y dignidad del español con «temor» y «se apoderarán de ellos», que expresan mejor la fuerza del original en este contexto apocalíptico.
