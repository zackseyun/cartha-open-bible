base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/001/005.yaml
  text: And all will fear[a], and the vigilant ones will tremble[c][b]; and fear and great trembling will seize them to the ends of the earth.
  footnotes:
  - marker: a
    text: The phrase “the mighty ones” translates a generic term for strong/powerful beings. Some interpreters take it to refer to the Watchers (angelic beings) in this section, but the Ethiopic here does not use the usual technical term for Watchers.
    reason: lexical_alternative
  - marker: b
    text: “As far as the ends of the earth” is a Semitic idiom describing universal scope—the whole world to its furthest limits.
    reason: cultural_note
  - marker: c
    text: Or 'the mighty ones'.
    reason: previous_rendering
