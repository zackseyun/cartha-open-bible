translation:
  language: es
  text: Y temblarán los montes altos[a], y las colinas elevadas serán abatidas[b]; se derretirán como cera delante de la llama[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: se sacudirán; temblarán.'
    reason: lexical_alternative
  - marker: b
    text: 'O: serán hechas bajar; serán humilladas.'
    reason: lexical_alternative
  - marker: c
    text: 'O: en presencia de la llama/fuego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይደነግፁ (yǝdänägǝṣu)
  english_pob_choice: will quake
  chosen_spanish: temblarán
  alternatives_spanish:
  - se sacudirán
  - estremecerán
  lexicon: Leslau; Dillmann
  rationale: El verbo ge‘ez expresa una reacción intensa e intransitiva del sujeto plural. En español, «temblarán» comunica bien ese estremecimiento apocalíptico con naturalidad y sin forzar una pasiva.
- source_word: አድባር (ʾadbar)
  english_pob_choice: mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: Leslau; Dillmann
  rationale: El término designa alturas montañosas; «montes» mantiene dignidad bíblica y funciona bien en paralelo con «colinas».
- source_word: ነዋኀን / ነዋኃት (newaḥn / newaḥat)
  english_pob_choice: lofty / high
  chosen_spanish: altos / elevadas
  alternatives_spanish:
  - elevados
  - encumbrados
  lexicon: Leslau; Dillmann
  rationale: El rasgo semántico es la altura física, no una cualidad moral. «Altos» y «elevadas» conservan el paralelismo de género sin introducir la metáfora de orgullo.
- source_word: ይቴሐቱ (yǝtēḥatu)
  english_pob_choice: will be brought low
  chosen_spanish: serán abatidas
  alternatives_spanish:
  - serán humilladas
  - serán hechas bajar
  - serán bajadas
  lexicon: Leslau; Dillmann
  rationale: El giro ge‘ez expresa reducción de altura. «Serán abatidas» es idiomático en español y preserva la reversión de exaltación/abatimiento sin añadir una antropomorfización fuerte.
- source_word: አውግር (ʾawgr)
  english_pob_choice: hills
  chosen_spanish: las colinas
  alternatives_spanish:
  - los lomeríos
  - las lomas
  lexicon: Leslau; Dillmann
  rationale: «Colinas» es el equivalente más claro y natural en español para el segundo término topográfico, manteniendo el paralelismo con «montes».
- source_word: ይትመሰዉ (yǝtmäsäw)
  english_pob_choice: will melt
  chosen_spanish: se derretirán
  alternatives_spanish:
  - se fundirán
  - se desharán
  lexicon: Leslau; Dillmann
  rationale: El verbo básico es «derretirse». La forma reflexiva española reproduce bien el proceso físico que recae sobre el sujeto.
- source_word: መዓረ (mäʿärä)
  english_pob_choice: wax
  chosen_spanish: cera
  alternatives_spanish:
  - cera de abeja
  lexicon: Leslau; Dillmann
  rationale: El sentido léxico es cera; «cera» es suficiente y natural en español. Añadir «de abeja» sería más específico de lo que el texto exige.
- source_word: ግራ (gǝra)
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: Leslau; Dillmann
  rationale: La comparación espacial del símil queda clara con «delante de», que en español conserva la imagen de exposición directa frente al fuego.
- source_word: እም ላህብ (ʾǝm lāhb)
  english_pob_choice: the flame
  chosen_spanish: la llama
  alternatives_spanish:
  - el fuego
  - la flama
  lexicon: Leslau; Dillmann
  rationale: El campo semántico es fuego/llama; «llama» corresponde con precisión a la imagen concreta y mantiene la decisión revisada del audit trail frente a opciones más genéricas.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «blaze» a «flame» para ajustarse mejor al término del ge‘ez; la traducción española sigue esa preferencia con «llama». Se mantuvo el paralelismo topográfico y la imagen física del derretimiento, sin suavizar el carácter apocalíptico del verso.
  spanish_consistency_notes:
  - He usado «montes» y «colinas» para conservar el paralelismo geográfico y evitar introducir matices no presentes en el original.
  - He preferido verbos de efecto físico («temblarán», «serán abatidas», «se derretirán») para reflejar la secuencia de acciones del texto fuente.
  - «Llama» se eligió por correspondencia más estrecha con el término de fuego del ge‘ez y con la revisión inglesa más reciente.
