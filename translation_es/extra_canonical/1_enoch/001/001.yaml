    issue: '''para la remoción de'' suena poco natural en español'
    rationale: Aunque reproduce nominalmente el inglés, en español bíblico contemporáneo resulta rígido. 'para eliminar a' o 'para quitar de en medio a' comunica mejor el sentido de ለአሰስሎ sin alejarse del original.
  - severity: low
    issue: 'Coordinación final algo pesada: ''los malvados y los impíos'''
    rationale: Es fiel, pero 'los malvados e impíos' suena más fluido y sigue bien la coordinación de dos categorías condenadas. No es un problema de sentido, sino de estilo.
