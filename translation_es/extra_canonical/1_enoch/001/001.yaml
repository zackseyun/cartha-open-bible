translation:
  language: es
  text: Las palabras de la bendición de Henoc[a], con las que bendijo a los escogidos y a los justos que estarán presentes en el día de aflicción[b], para eliminar a todos los malvados e impíos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Henoc'' sigue la forma del ge''ez; la forma bíblica más conocida en español es ''Enoc''.'
    reason: lexical_alternative
  - marker: b
    text: La expresión 'día de aflicción' también puede entenderse como 'día de angustia' o 'día de tribulación'.
    reason: lexical_alternative
  - marker: c
    text: 'El par final distingue dos clases de condenados: los malvados y los impíos.'
    reason: cultural_note
lexical_decisions:
- source_word: ቃለ
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabra
  - mensajes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El arranque es una fórmula titular en plural; 'palabras' refleja mejor el giro revisado del POB inglés y conserva el carácter de encabezamiento sin forzar un singular artificial.
- source_word: በረከት
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - benedición
  - bendición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Bendición'' es el equivalente natural en español para el sustantivo de bendecir/benediction y funciona bien en un título de introducción.'
- source_word: ዘሄኖክ
  english_pob_choice: Henok
  chosen_spanish: Henoc
  alternatives_spanish:
  - Enoc
  - Henoc
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la forma basada en el ge'ez que refleja la política del POB inglés; en español, 'Henoc' preserva esa transliteración sin imponer la forma bíblica más familiar 'Enoc'.
- source_word: በከመ ባረከ
  english_pob_choice: with which he blessed
  chosen_spanish: con las que bendijo
  alternatives_spanish:
  - con la cual bendijo
  - con que bendijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción relativa/instrumental pide una relación de medio o contenido. En español, 'con las que bendijo' suena natural y mantiene el vínculo con 'las palabras de la bendición'.
- source_word: ኅሩያነ
  english_pob_choice: the chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los escogidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Escogidos'' conserva la idea de elección sin cargar de forma innecesaria un tecnicismo doctrinal; sigue de cerca el valor del término y el criterio del POB de no introducir ''elect'' cuando no es necesario.'
- source_word: ወጻድቃነ
  english_pob_choice: and the righteous
  chosen_spanish: y a los justos
  alternatives_spanish:
  - y a los justos
  - y a los rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Justos'' mantiene el campo ético-covenantal del término y suena natural en español bíblico contemporáneo.'
- source_word: እለ ሀለዉ ይኩኑ
  english_pob_choice: who will be present
  chosen_spanish: que estarán presentes
  alternatives_spanish:
  - que estarán presentes
  - que estarán allí
  - que serán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción apunta a la presencia en un tiempo futuro, no solo a existir; 'estarán presentes' expresa esa localización temporal y situacional con claridad.
- source_word: በዕለተ ምንዳቤ
  english_pob_choice: on the day of affliction
  chosen_spanish: en el día de aflicción
  alternatives_spanish:
  - en el día de aflicción
  - en el día de angustia
  - en el día de tribulación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Aflicción'' conserva la gravedad apocalíptica sin resolverla prematuramente hacia un tecnicismo escatológico único; es fiel y comprensible en español.'
- source_word: ለአሰስሎ
  english_pob_choice: for the removal of
  chosen_spanish: para la remoción de
  alternatives_spanish:
  - para la remoción de
  - para quitar
  - para la eliminación de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Remoción'' reproduce el valor nominal y el tono de sentencia/expulsión del original mejor que una frase más verbalizada.'
- source_word: ኵሎ እኩያነ
  english_pob_choice: all the wicked
  chosen_spanish: todos los malvados
  alternatives_spanish:
  - todos los malvados
  - todos los perversos
  - todos los impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Malvados'' recoge el totalizador ''todos'' y el valor moral negativo de manera clara; se separa de ''impíos'' para respetar la distinción final del original.'
- source_word: ወረሲዓነ
  english_pob_choice: and the godless
  chosen_spanish: y los impíos
  alternatives_spanish:
  - y los impíos
  - y los irreverentes
  - y los sin Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Impíos'' preserva la dimensión religiosa específica de la falta de piedad, distinguiéndola de la maldad general del término anterior.'
theological_decisions:
- issue: 'Distinción entre dos grupos destinatarios: los escogidos y los justos'
  english_pob_reading: the chosen and the righteous
  chosen_spanish_reading: los escogidos y los justos
  alternative_spanish_readings:
  - los elegidos y los justos
  - los escogidos, es decir, los justos
  rationale: El ge'ez coordina dos designaciones; mantener ambas evita fusionarlas y conserva la estructura categorial del texto, que puede distinguir entre elección y rectitud sin identificarlas por completo.
  doctrine_reference: Translation philosophy §3 preserve theological tension rather than resolve it
- issue: Valor de በዕለተ ምንዳቤ como momento de sufrimiento y crisis
  english_pob_reading: on the day of affliction
  chosen_spanish_reading: en el día de aflicción
  alternative_spanish_readings:
  - en el día de angustia
  - en el día de tribulación
  - en el día del juicio
  rationale: '''Aflicción'' mantiene la carga de sufrimiento/trouble sin adelantar una interpretación más específica como ''juicio''. Así se preserva la tensión entre calamidad y juicio implícito en el contexto.'
  doctrine_reference: Translation philosophy §3 preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés que cambió 'word' por 'words' y eliminó el artículo antes de 'godless'. Por eso el español usa 'Las palabras de la bendición' y mantiene dos sustantivos coordinados al final ('los malvados y los impíos') sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se conserva 'Henoc' como transliteración basada en ge'ez, coherente con la política auditada del POB.
  - '''Escogidos'' evita importar innecesariamente la terminología doctrinal ''elegidos'' cuando el contexto solo requiere el término de elección.'
  - '''Impíos'' se reserva para la segunda categoría para no borrar la distinción semántica entre maldad general y falta de piedad.'
  - Se usa un registro bíblico moderno y claro, evitando calcos innecesarios pero sin paraphrasear el encabezamiento apocalíptico.
