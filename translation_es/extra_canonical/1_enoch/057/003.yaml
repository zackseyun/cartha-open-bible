translation:
  language: es
  text: Y todos ellos caerán y adorarán al Señor de los espíritus. Y este es el fin de la segunda parábola[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "de otra parábola" o "de la otra parábola", si ካልእ se entiende no en sentido secuencial sino como "otra".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወድቁ
  english_pob_choice: shall fall down
  chosen_spanish: caerán
  alternatives_spanish:
  - se postrarán
  - caerán postrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa una caída física en un contexto de reverencia. En español, 'caerán' conserva la imagen corporal sin añadir por sí mismo la especificación ritual de 'postrarse', que el contexto inmediato de adoración ya aporta.
- source_word: ኵሎሙ
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - ellos todos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo pronominal es explícito y conviene mantener el referente totalizador. 'Todos ellos' es natural en español y conserva la continuidad referencial.
- source_word: ይሰግዱ
  english_pob_choice: worship
  chosen_spanish: adorarán
  alternatives_spanish:
  - adorarán reverentemente
  - se inclinarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicæ
  rationale: Junto con 'caerán', el verbo tiene fuerza cultual/reverencial. 'Adorarán' comunica bien esa fuerza en español sin repetir innecesariamente la acción física ya expresada.
- source_word: ለእግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicæ
  rationale: Es un título fijo en 1 Enoc y debe conservarse como tal. En español, el genitivo plural con mayúscula en 'Espíritus' refleja el título tradicional del pasaje sin diluirlo en una frase genérica.
- source_word: ተፍጻሜተ
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - la conclusión
  - el cumplimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La palabra marca el cierre o término de una sección. 'El fin' es idiomático en español y reproduce bien la función de cierre del verso.
- source_word: ካልእ ምሳሌ
  english_pob_choice: the second parable
  chosen_spanish: la segunda parábola
  alternatives_spanish:
  - la otra parábola
  - otra parábola
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque ካልእ puede significar 'otro/otra', en este contexto estructural la lectura secuencial 'segunda' es la más probable. 'Parábola' mantiene la división literaria del libro.
theological_decisions:
- issue: Título divino ለእግዚአ መናፍስት
  english_pob_reading: the Lord of Spirits
  chosen_spanish_reading: el Señor de los Espíritus
  alternative_spanish_readings:
  - el Señor de los espíritus
  rationale: Conviene preservar el título como una designación propia del texto en vez de suavizarlo. La mayúscula en 'Espíritus' ayuda a marcar que se trata de un título divino estable dentro de 1 Enoc.
  doctrine_reference: Translate titles; preserve local passage wording rather than later doctrinal expectations.
- issue: Valor de ካልእ en la fórmula conclusiva
  english_pob_reading: the second parable
  chosen_spanish_reading: la segunda parábola
  alternative_spanish_readings:
  - la otra parábola
  - otra parábola
  rationale: La sección funciona como cierre de una división interna del libro; por eso la lectura secuencial se refleja explícitamente. Se conserva la tensión interpretativa mediante alternativas documentadas.
  doctrine_reference: Preserve theological and textual tension rather than resolve it silently; document contested readings.
translation_notes:
  revision_awareness: La versión en inglés ya fue revisada y quedó sin cambios en el último pase; esta propuesta española sigue ese mismo estado estable y mantiene la decisión secuencial para 'la segunda parábola', documentando la alternativa no ordinal en nota.
  spanish_consistency_notes:
  - Se mantiene 'Señor de los Espíritus' como título fijo y no se sustituye por 'Señor de los espíritus' salvo en la nota alternativa.
  - Se preserva la distinción entre caída corporal ('caerán') y adoración cultual ('adorarán').
  - Se usa 'fin' para el cierre literario del verso, con nota sobre alternativas semánticas.
  - La puntuación separa claramente la declaración y la fórmula de cierre del pasaje.
