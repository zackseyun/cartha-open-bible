base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/057/002.yaml
  text: And the sound of their chariots was heard[a]; and when this turmoil came to be, the holy ones in heaven took notice, and the pillars of the earth were shaken from their foundations[e][d][c][b], and it was heard from one end of heaven to the other in one day.
  footnotes:
  - marker: a
    text: Or 'this disturbance,' 'this uproar.' The Ge'ez term denotes agitation or commotion, and the exact nuance is uncertain in this Ge'ez-only section.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the ends of heaven to its ends,' an idiom for the full span of heaven.
    reason: lexical_alternative
  - marker: c
    text: '''The holy ones'' likely refers to heavenly beings here, since they are said to take notice ''from heaven.'''
    reason: cultural_note
  - marker: d
    text: Or 'the pillars of the earth were shaken from their foundations'.
    reason: previous_rendering
  - marker: e
    text: Or 'the sound of the voice of their chariots'.
