translation:
  language: es
  text: Y se oyó el sonido de sus carros[a]; y cuando sobrevino este tumulto, los santos en el cielo[c] se percataron de ello, y el pilar de la tierra fue sacudido de su cimiento[d], y se oyó desde un extremo del cielo hasta el otro[b] en un solo día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el ruido de sus carros'. El ge'ez combina dos términos auditivos; el matiz exacto es incierto en esta sección.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'desde los extremos del cielo hasta sus extremos', un giro idiomático para abarcar toda su extensión.
    reason: lexical_alternative
  - marker: c
    text: Aquí 'los santos' probablemente se refiere a seres celestiales, ya que el pasaje los sitúa en el cielo.
    reason: cultural_note
  - marker: d
    text: O 'la columna de la tierra fue sacudida de su cimiento'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተሰምዐ / ተሰምዓ
  english_pob_choice: was heard / it was heard
  chosen_spanish: se oyó
  alternatives_spanish:
  - fue oído
  - se hizo oír
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo auditorio del ge’ez se conserva con una construcción impersonal natural en español. 'Se oyó' mantiene el tono visionario sin volverlo más activo de lo que permite el texto.
- source_word: ቃለ ድምፀ
  english_pob_choice: the sound of the voice / the sound of the noise
  chosen_spanish: el sonido
  alternatives_spanish:
  - el sonido de la voz
  - el ruido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro ge’ez es enfático y algo redundante. En español, 'el sonido' evita la duplicación pesada de 'sonido de la voz/ruido' y sigue siendo fiel al efecto auditivo global, especialmente aplicado a carros inanimados.
- source_word: ሰረገላቲሆሙ
  english_pob_choice: their chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - sus carruajes
  - sus carros de guerra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Carros'' es un equivalente natural y digno en español para la imagen apocalíptica; ''carros de guerra'' añade una precisión no exigida por el texto.'
- source_word: ዝሀውክ
  english_pob_choice: this turmoil
  chosen_spanish: este tumulto
  alternatives_spanish:
  - esta conmoción
  - este disturbio
  - esta agitación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Tumulto'' comunica bien la conmoción cósmica y el desorden audible/visible sugerido por el término, sin sobreinterpretarlo.'
- source_word: ቅዱሳን
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los seres santos
  - los santos celestiales
  - los consagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español bíblico, 'los santos' es la forma más idiomática para 'holy ones'. Aunque el contexto sugiere seres celestiales, se mantiene la amplitud del término, como en el auditorio original, sin cerrar la ambigüedad.
- source_word: አእመሩ
  english_pob_choice: took notice
  chosen_spanish: tomaron noticia
  alternatives_spanish:
  - percibieron
  - se dieron cuenta
  - notaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Tomaron noticia'' conserva un matiz de advertencia/percepción consciente y funciona bien en un registro elevado. Evita el nivel demasiado coloquial de ''se dieron cuenta''.'
- source_word: ዐምደ ምድር
  english_pob_choice: the pillar(s) of the earth
  chosen_spanish: el pilar de la tierra
  alternatives_spanish:
  - la columna de la tierra
  - los pilares de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión gramatical del ge’ez, que apunta al singular. 'Pilar de la tierra' preserva la imagen cosmológica sin pluralizar indebidamente.
- source_word: ተሐውሰ
  english_pob_choice: were shaken / was shaken
  chosen_spanish: fue sacudido
  alternatives_spanish:
  - fue agitado
  - se estremeció
  - fue conmovido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fue sacudido'' refleja bien la alteración sísmica/cósmica y mantiene el pasivo del original.'
- source_word: እመንበሩ
  english_pob_choice: from their foundations / from its foundation
  chosen_spanish: desde su fundamento
  alternatives_spanish:
  - desde su base
  - de su fundamento
  - desde sus cimientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular posesivo se ajusta al singular del sustantivo en ge’ez. 'Fundamento' suena natural y conserva la imagen estructural.
- source_word: እምአጽናፈ ሰማይ እስከ አጽናፍ
  english_pob_choice: from one end of heaven to the other
  chosen_spanish: desde un extremo del cielo hasta el otro
  alternatives_spanish:
  - de un extremo del cielo al otro
  - desde los confines del cielo hasta sus confines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción española reproduce el arco idiomático del ge’ez con claridad. 'Cielo' hace el pasaje transparente sin perder la amplitud cósmica.
- source_word: በአሐቲ ዕለት
  english_pob_choice: in one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - dentro de un solo día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''En un solo día'' es una equivalencia directa, natural y suficientemente solemne.'
theological_decisions:
- issue: Identidad de 'los santos'
  english_pob_reading: heavenly holy beings/angels are left implicit in the phrase 'the holy ones'
  chosen_spanish_reading: los santos del cielo
  alternative_spanish_readings:
  - los seres santos en el cielo
  - los ángeles
  - los santos
  rationale: El contexto celestial permite sugerir seres celestiales sin cerrar el término en 'ángeles', que sería más interpretativo. 'Del cielo' ayuda a orientar la lectura sin borrar la ambigüedad heredada del original.
  doctrine_reference: Mantener la tensión local del texto apocalíptico sin resolverla dogmáticamente en la traducción.
- issue: Singular cosmológico en 'el pilar de la tierra'
  english_pob_reading: the pillar of the earth was shaken from its foundation
  chosen_spanish_reading: el pilar de la tierra fue sacudido desde su fundamento
  alternative_spanish_readings:
  - los pilares de la tierra fueron sacudidos desde sus fundamentos
  - la columna de la tierra fue sacudida desde su base
  rationale: La revisión del texto ge’ez favorece el singular. Traducirlo así evita una pluralización que no está apoyada por la morfología del original.
  doctrine_reference: Fidelidad gramatical al testimonio textual recibido.
translation_notes:
  revision_awareness: 'La redacción española toma en cuenta la última revisión gramatical y léxica del audit trail: el ge''ez favorece un sustantivo singular para ''pillar'', por lo que se evita la pluralización anterior; además, el doblete auditivo de ቃለ ድምፀ se resuelve en español con una fórmula más natural (''el sonido'') sin perder el carácter acústico del pasaje. También se preserva la amplitud idiomática del tramo final sobre los confines del cielo.'
  spanish_consistency_notes:
  - Se usa 'Dios/Yahvé/Mesías' según los defaults del proyecto, pero este versículo no los contiene.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - '''Santos'' se emplea como término amplio y no como simple equivalencia eclesial; el contexto celeste queda indicado por la nota.'
  - No se introducen términos doctrinales ajenos al pasaje; la imagen cosmológica se conserva intacta.
