translation:
  language: es
  text: Y después de esto vi otra visión de carros, y había hombres montados en ellos, y venían sobre los vientos[a] desde el oriente y desde el occidente, hasta el sur[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «venían en los vientos». El ge'ez conserva la imagen visionaria sin precisar si los vientos son el medio de movimiento o la superficie sobre la que vienen.
    reason: lexical_alternative
  - marker: b
    text: Aquí «sur» traduce un modismo ge'ez que literalmente significa «la mitad del día» o «mediodía», pero en este contexto direccional se refiere a la región del sur.
    reason: alternative_reading
lexical_decisions:
- source_word: ወኮነ እምድኅረዝ
  english_pob_choice: And after that
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Y después de aquello
  - Y luego de esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa con naturalidad la transición narrativa consecutiva del Ge'ez sin perder el valor temporal de secuencia apocalíptica.
- source_word: ወርኢኩ ካልእተ ትዕይንተ
  english_pob_choice: I saw another vision
  chosen_spanish: vi otra visión
  alternatives_spanish:
  - vi otro espectáculo
  - vi otra escena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Visión» conserva el género apocalíptico y el valor de algo visto revelatoriamente; «escena» o «espectáculo» debilitan ese matiz.
- source_word: ሠረገላት
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carretas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español «carros» comunica la imagen básica del vehículo antiguo y permite la ambigüedad visionaria del texto. «Carros de guerra» añade un rasgo no explicitado por el Ge'ez; «carretas» rebaja el tono apocalíptico.
- source_word: ወእገዚ ይጼዐኑ ሰብእ ውስቴቶሙ
  english_pob_choice: and men were riding in them
  chosen_spanish: y hombres iban montados en ellos
  alternatives_spanish:
  - y hombres montaban en ellos
  - y hombres estaban sentados en ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Iban montados» transmite la postura/participación en el movimiento del carro sin forzar una literalidad extraña. «Montaban» puede sonar intransitivo y menos claro; «estaban sentados» pierde la idea de conducción o desplazamiento.
- source_word: ይመጽኡ ዲበ ነፋሳት
  english_pob_choice: they were coming on the winds
  chosen_spanish: venían sobre los vientos
  alternatives_spanish:
  - venían en los vientos
  - eran llevados por los vientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre los vientos» conserva la imagen concreta y la tensión interpretativa del original. «Eran llevados por los vientos» resuelve demasiado la imagen; «en los vientos» es menos idiomático.
- source_word: እምስራቅ ወእምዕራብ
  english_pob_choice: from the east and from the west
  chosen_spanish: desde el oriente y desde el occidente
  alternatives_spanish:
  - del este y del oeste
  - desde el este y desde el oeste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oriente/occidente» es un registro sobrio y literario apropiado al texto apocalíptico, y mantiene el paralelismo direccional.
- source_word: እስከ መንፈቀ ዕለት
  english_pob_choice: as far as the south
  chosen_spanish: hasta el sur
  alternatives_spanish:
  - hasta el mediodía
  - hasta la mitad del día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se adopta la lectura direccional confirmada por la revisión: መንፈቀ ዕለት funciona como idiomático para «sur». En español, «hasta el sur» preserva la extensión espacial marcada por እስከ.'
theological_decisions:
- issue: Imágenes visionarias de carros y vientos
  english_pob_reading: Retain the concrete image of chariots and men coming on the winds rather than interpreting it as a mere metaphor for armies or clouds.
  chosen_spanish_reading: Conservar la imagen concreta de carros, hombres montados y venida sobre los vientos, sin convertirla en una explicación simbólica explícita.
  alternative_spanish_readings:
  - interpretarlo como ejércitos
  - suavizarlo como rapidez figurada
  rationale: La fuente presenta una escena visionaria concreta y no exige resolver su simbolismo. Mantener la imagen preserva la tensión apocalíptica y evita sobreinterpretar el pasaje.
  doctrine_reference: Preservar la imaginería apocalíptica sin aplanarla; no forzar equivalencias doctrinales donde el texto mantiene ambigüedad.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que corrige መንፈቀ ዕለት como «sur» y reconoce la tensión previa entre «visión de carros» y lecturas que lo entendían como «host de carros». Se conserva la lectura visionaria y la dirección geográfica adjudicada, sin adoptar la glosa 'host'.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí; no hay sustitución de nombres divinos en este versículo.
  - «Visión» y «carros» se mantienen para reproducir el tono apocalíptico y la decisión auditada del POB.
  - «Oriente/occidente» da un registro coherente y solemne, apto para una traducción bíblica pública.
  - La preposición «sobre» conserva la ambigüedad del Ge'ez en torno a los vientos, sin resolverla de modo explicativo.
