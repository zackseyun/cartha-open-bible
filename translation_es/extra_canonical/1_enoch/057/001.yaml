revisions:
- from: Y después de esto vi otra visión de carros[a], y hombres iban montados en ellos, y venían sobre los vientos[b] desde el oriente y desde el occidente, hasta el sur[c].
  to: Y después de esto vi otra visión de carros, y había hombres montados en ellos, y venían sobre los vientos[a] desde el oriente y desde el occidente, hasta el sur[b].
  rationale: Se corrigió el aparato de notas para que refleje con precisión el expediente auditado y sus anclas reales en el texto. Se eliminó la nota innecesaria sobre «visión de carros», ya que la revisión final inglesa respalda esa lectura sin requerir nota aquí. También se suavizó «iban montados» a «había hombres montados» para mejorar la naturalidad del español sin perder el sentido fuente.
