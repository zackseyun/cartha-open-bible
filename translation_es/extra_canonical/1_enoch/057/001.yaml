base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/057/001.yaml
  text: And after that I saw another vision of chariots[a], and men were riding in them[d][c][b], and they were coming on the winds from the east and from the west as far as the south.
  footnotes:
  - marker: a
    text: Or 'they came on the winds.' The Ge'ez wording preserves the visionary image without specifying whether the winds are the means of motion or the surface upon which they move.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'until the middle of the day.' The expression is difficult in context and may denote the noonday region or extent rather than a time reference alone.
    reason: alternative_reading
  - marker: c
    text: Or 'as far as the middle of the day'.
    reason: previous_rendering
  - marker: d
    text: 'Or ''vision: chariots''.'
    reason: previous_rendering
