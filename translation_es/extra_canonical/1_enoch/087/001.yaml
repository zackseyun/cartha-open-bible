revisions:
- from: Y otra vez los vi[a], y he aquí que se daban golpes uno a otro y se devoraban unos a otros[b], y la tierra comenzó a clamar.
  to: Y otra vez los vi, y he aquí que se embestían[a] unos a otros y se devoraban[b] unos a otros, y la tierra comenzó a clamar.
