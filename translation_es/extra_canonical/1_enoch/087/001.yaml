translation:
  language: es
  text: Y otra vez los vi, y he aquí que se embestían[a] unos a otros y se devoraban[b] unos a otros, y la tierra comenzó a clamar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo también puede entenderse más generalmente como «acometer», «acornear» o «golpear». Se conserva la imaginería de combate animal porque esta visión está presentada en términos simbólicos de animales.
    reason: lexical_alternative
  - marker: b
    text: O «se tragaban» o «se engullían» unos a otros. El verbo subyacente puede denotar tanto engullir como devorar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወካዕበ
  english_pob_choice: And again
  chosen_spanish: Y otra vez
  alternatives_spanish:
  - Y de nuevo
  - Otra vez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula recapitulativa apocalíptica pide una marca de continuidad narrativa. «Y otra vez» conserva el valor de repetición sin sonar forzado en español.
- source_word: ርኢክዎሙ
  english_pob_choice: I saw them
  chosen_spanish: los vi
  alternatives_spanish:
  - los contemplé
  - los observé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La visión se expresa de forma reportiva y directa. «Los vi» transmite el acto de ver sin añadir solemnidad innecesaria.
- source_word: አንዘ፡ እንዘ፡ ይወግኡ
  english_pob_choice: while they were butting one another
  chosen_spanish: se daban golpes uno a otro
  alternatives_spanish:
  - se acorneaban uno a otro
  - se embestían uno a otro
  - se golpeaban uno a otro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto del Apocalipsis Animal preserva imaginería de combate animal, pero el español necesita una formulación natural. «Se daban golpes uno a otro» mantiene la violencia recíproca sin forzar una precisión zoológica que el verso no explicita aquí.
- source_word: ለካልኡ
  english_pob_choice: one another
  chosen_spanish: uno a otro / unos a otros
  alternatives_spanish:
  - entre sí
  - unos a los otros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción recíproca debe mantenerse en español. Se alternan singular y plural según el ritmo de la frase, sin cambiar el sentido mutuo.
- source_word: ወይውሑጦ፡ ለካልኡ
  english_pob_choice: and devouring one another
  chosen_spanish: se devoraban unos a otros
  alternatives_spanish:
  - se tragaban unos a otros
  - se engullían unos a otros
  - se consumían unos a otros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Devorar» es la opción más idiomática en español para conservar la violencia del verbo, sin perder la posible amplitud semántica de engullir/swallowing que el inglés POB documenta.
- source_word: ወምድር
  english_pob_choice: while the earth
  chosen_spanish: y la tierra
  alternatives_spanish:
  - mientras la tierra
  - y el suelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada indica que la frase anterior no debe leerse como una subordinada de tiempo aquí. Por eso se mantiene la coordinación simple del texto revisado: «y la tierra».'
- source_word: አንዘት፡ ትጽራኅ
  english_pob_choice: began to cry out
  chosen_spanish: comenzó a clamar
  alternatives_spanish:
  - empezó a clamar
  - comenzó a gritar
  - empezó a gritar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo personifica a la tierra como sujeto activo. «Clamar» conserva la fuerza de protesta o lamento que sugiere el contexto apocalíptico, más que un simple «gritar».
theological_decisions:
- issue: Personificación de la tierra como sujeto que responde a la violencia
  english_pob_reading: Retain the earth as an active subject that 'began to cry out.'
  chosen_spanish_reading: La tierra comenzó a clamar.
  alternative_spanish_readings:
  - se oyó un clamor desde la tierra
  - la tierra estaba clamando
  - la tierra gritó
  rationale: El ge'ez presenta a la tierra como sujeto activo, no solo como escenario. La traducción conserva esa personificación sin suavizarla a una fórmula impersonal.
  doctrine_reference: Preservar la imaginería apocalíptica y la personificación cósmica del texto.
translation_notes:
  revision_awareness: 'La última revisión auditada corrige una posible lectura subordinada del texto y favorece una secuencia coordinada: «Y otra vez los vi… y la tierra comenzó a clamar». Esta versión española sigue esa línea revisada y evita introducir un «mientras» no respaldado por la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantuvo «tierra» en vez de «suelo» para preservar la personificación cósmica.
  - Se evitó «SEÑOR» o cualquier máscara devocional; el verso no contiene el Tetragrámaton ni un equivalente directo aquí.
  - «Clamar» se prefirió por su fuerza de lamento/protesta, coherente con el tono apocalíptico.
