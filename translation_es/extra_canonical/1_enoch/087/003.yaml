translation:
  language: es
  text: Y aquellos tres que salieron después me tomaron de la mano, y me levantaron de la tierra[a], y me subieron a un lugar alto, y me mostraron una torre elevada[b] sobre la tierra, y todos los collados[c] quedaron bajos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de entre los nacidos de la tierra». La frase ge''ez es más literal que un simple «de la tierra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una estructura elevada» o «una torre alta». El sustantivo ge''ez es difícil y puede referirse a una construcción elevada en general.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los montes quedaron bajos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ፫እለ
  english_pob_choice: those three
  chosen_spanish: aquellos tres
  alternatives_spanish:
  - los tres
  - esos tres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo conserva la referencia anafórica a los tres seres celestiales ya introducidos, sin precisar indebidamente su naturaleza.
- source_word: ወጽኡ ድኅረ
  english_pob_choice: who came out afterward
  chosen_spanish: que salieron después
  alternatives_spanish:
  - que salieron luego
  - que salieron al final
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido temporal es posterior/seguido, no necesariamente 'último' en sentido absoluto; 'después' mantiene la relación relativa sin forzarla.
- source_word: አሐዙኒ በእዴየ
  english_pob_choice: seized me by my hand
  chosen_spanish: me agarraron de la mano
  alternatives_spanish:
  - me tomaron de la mano
  - me sujetaron de la mano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez es singular en 'mi mano'; el plural en español refleja el sujeto dual/plural implícito, y 'de la mano' conserva la imagen corporal sin sobrecargarla.
- source_word: እምትውልደ ምድር
  english_pob_choice: from the earth
  chosen_spanish: de entre los nacidos de la tierra
  alternatives_spanish:
  - de la tierra
  - de los habitantes de la tierra
  - de la descendencia de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la fuerza literal de generación/origen de la tierra. La POB inglesa tuvo una tensión auditada entre 'from the earth' y 'from the offspring of the earth'; aquí se conserva esa tensión con una formulación española natural.
- source_word: መካን ነዋኅ
  english_pob_choice: a high place
  chosen_spanish: un lugar alto
  alternatives_spanish:
  - un sitio elevado
  - un lugar elevado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión denota altura espacial; 'lugar alto' es claro y no introduce resonancias cultuales no requeridas por el contexto.
- source_word: ማኅፈደ ነዋኅ
  english_pob_choice: a lofty tower
  chosen_spanish: una torre elevada
  alternatives_spanish:
  - una estructura elevada
  - una construcción alta
  - una torre alta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva 'torre' por ser la solución más probable del audit trail, pero con un adjetivo neutral que refleje la elevación sin cerrar la ambigüedad del sustantivo ge'ez.
- source_word: ሕፁፀ
  english_pob_choice: became low
  chosen_spanish: quedaron bajos
  alternatives_spanish:
  - fueron abatidos
  - se rebajaron
  - quedaron rebajados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el marco topográfico, el descenso físico es más fiel que una humillación moral; 'quedaron bajos' expresa el cambio de nivel de forma sobria.
- source_word: አውግር
  english_pob_choice: the hills
  chosen_spanish: los collados
  alternatives_spanish:
  - los montes
  - las colinas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Collados'' mantiene un registro bíblico digno y un rango topográfico compatible con la oposición al lugar alto y a la torre.'
theological_decisions:
- issue: La tensión entre separación de Enoch respecto de la 'tierra' y la imagen genealógica de 'nacidos de la tierra'
  english_pob_reading: Retain the literal generational imagery rather than interpret it as merely 'from the earth' or 'from the people of the earth.'
  chosen_spanish_reading: 'Conservar la imagen genealógica: ''de entre los nacidos de la tierra''.'
  alternative_spanish_readings:
  - de la tierra
  - de los habitantes de la tierra
  rationale: La frase apocalíptica no se reduce limpiamente a una localización espacial; mantener el matiz de origen/generación preserva la tensión antropológica del pasaje y evita neutralizarla.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: La naturaleza de la 'torre' o estructura elevada
  english_pob_reading: The noun rendered 'tower' is difficult and may denote a lofty structure more generally.
  chosen_spanish_reading: Una 'torre elevada' con nota de posible ambigüedad.
  alternative_spanish_readings:
  - estructura elevada
  - edificio alto
  - construcción elevada
  rationale: El contexto exige una forma visible y elevada, pero el sustantivo no es completamente transparente; traducirlo como torre mantiene la imagen sin eliminar la reserva filológica.
  doctrine_reference: No aplica; cuestión lexical/visionaria
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la sintaxis del relativo ('que salieron después') y la singularidad de 'mi mano'. Sin embargo, la última revisión inglesa simplificó 'from the offspring of the earth' a 'from the earth'; aquí se mantiene la tensión léxica original del análisis previo, de modo que la traducción española refleja mejor el valor literal documentado en el expediente ge'ez.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo requiera; este versículo no la contiene.
  - '''Torre'' se usa como solución principal por el audit trail inglés, pero la nota preserva la reserva sobre el lexema ge''ez.'
  - Se evita 'SEÑOR' y otras sustituciones no presentes en el pasaje.
  - '''Collados'' se eligió por tono bíblico moderado; ''montes'' queda consignado como alternativa significativa.'
