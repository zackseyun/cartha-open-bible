  language: en
  yaml_path: translation/extra_canonical/1_enoch/087/003.yaml
  text: And those three who came out afterward seized me by my hand[a], and they lifted me up from the earth and brought me up onto a high place, and showed me a lofty tower above the earth[d][c][b], and all the hills became low.
