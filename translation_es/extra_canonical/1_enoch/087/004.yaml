  to: 'Y me dijeron: «Permanece aquí hasta que veas todo lo que vendrá sobre[a] aquellos elefantes y camellos y asnos, y sobre las estrellas y sobre el ganado[b], y todos ellos».'
  rationale: Se corrige la sobretraducción final cambiando «y sobre todos ellos» por «y todos ellos», en conformidad con ወኵሎሙ y con el texto inglés auditado. Se reubica la nota sobre la ambigüedad de «sobre» para que ancle exactamente donde corresponde. Además, se adopta «Permanece aquí» para reflejar mejor el tono solemne de la orden visionaria, sin alterar el sentido.
