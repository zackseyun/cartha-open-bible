base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/087/004.yaml
  text: And they said to me[a], “Remain here until you see everything that will come upon those elephants and camels and donkeys, and upon the stars and upon the cattle[c][b], and all of them.”
  footnotes:
  - marker: a
    text: The final term is commonly understood as 'sheep' in the Animal Apocalypse's symbolic register. If the underlying reading were taken more broadly, it could be rendered 'flocks.'
    reason: lexical_alternative
  - marker: b
    text: The repeated 'upon' leaves unspecified what exactly is coming upon these figures; the context of the vision may imply judgment, but the wording here does not state that directly.
    reason: alternative_reading
  - marker: c
    text: Or 'the sheep'.
    reason: previous_rendering
