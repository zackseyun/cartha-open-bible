    text: '«Ganado» refleja la corrección del audit trail: el ge''ez አልህምታት designa ganado bovino, no «ovejas».'
    reason: textual_variant
  revision_rationale: Se corrige la sobretraducción final cambiando «y sobre todos ellos» por «y todos ellos», en conformidad con ወኵሎሙ y con el texto inglés auditado. Se reubica la nota sobre la ambigüedad de «sobre» para que ancle exactamente donde corresponde. Además, se adopta «Permanece aquí» para reflejar mejor el tono solemne de la orden visionaria, sin alterar el sentido.
