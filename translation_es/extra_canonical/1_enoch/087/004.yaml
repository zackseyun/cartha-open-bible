translation:
  language: es
  text: 'Y me dijeron: «Permanece aquí hasta que veas todo lo que vendrá sobre[a] aquellos elefantes y camellos y asnos, y sobre las estrellas y sobre el ganado[b], y todos ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La repetición de «sobre» conserva la indeterminación del texto: no se especifica aquí si lo que viene es juicio, desastre u otro acontecimiento.'
    reason: alternative_reading
  - marker: b
    text: '«Ganado» refleja la corrección del audit trail: el ge''ez አልህምታት designa ganado bovino, no «ovejas».'
    reason: textual_variant
lexical_decisions:
- source_word: ይቤሉኒ
  english_pob_choice: they said to me
  chosen_spanish: me dijeron
  alternatives_spanish:
  - me hablaron
  - me hablaron a mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula narrativa en ge'ez introduce habla dirigida al narrador. En español, «me dijeron» transmite con naturalidad el objeto indirecto explícito sin forzar un calco.
- source_word: ንበር
  english_pob_choice: Remain here
  chosen_spanish: Quédate aquí
  alternatives_spanish:
  - Permanece aquí
  - Quédate en este lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo expresa permanencia en un lugar de visión. «Quédate aquí» suena natural en español y mantiene el tono directivo; «permanece aquí» sería más solemne pero algo más rígido.
- source_word: እስከ ትሬኢ ኵሎ ዘይመጽእ
  english_pob_choice: until you see everything that will come
  chosen_spanish: hasta que veas todo lo que vendrá
  alternatives_spanish:
  - hasta que veas todo lo que está por venir
  - hasta que veas todo cuanto llegará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido temporal y visionario se conserva con una futura prospectiva. «Vendrá» reproduce bien el carácter apocalíptico de lo anunciado, sin añadir interpretación.
- source_word: ዲበ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición repetida deja abierta la naturaleza del acontecimiento que recae sobre los grupos mencionados. «Sobre» preserva la superposición semántica sin convertirla en «contra».
- source_word: እልኩ ነጌያት
  english_pob_choice: those elephants
  chosen_spanish: aquellos elefantes
  alternatives_spanish:
  - esos elefantes
  - los elefantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo apunta a figuras ya vistas en la visión. «Aquellos» conserva mejor esa distancia deíctica que «los».
- source_word: አግማል
  english_pob_choice: camels
  chosen_spanish: camellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término animal directo; se mantiene literalmente para respetar la imaginería del texto.
- source_word: አእዱግ
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  - borricos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Asnos» es claro, digno y más cercano al registro bíblico que «burros», aunque ambos sean comprensibles.
- source_word: ከዋክብት
  english_pob_choice: the stars
  chosen_spanish: las estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva literalmente. En el contexto enóquico, el término puede tener alcance simbólico, pero el texto nombra «estrellas» y no conviene explicitar su interpretación.
- source_word: አልህምታት
  english_pob_choice: the cattle
  chosen_spanish: el ganado
  alternatives_spanish:
  - el ganado vacuno
  - los bueyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail corrige la lectura previa y confirma que el término designa ganado/caprino-bovino, no «ovejas». En español, «ganado» preserva la amplitud del referente sin estrecharlo indebidamente.
- source_word: ወኵሎሙ
  english_pob_choice: and all of them
  chosen_spanish: y sobre todos ellos
  alternatives_spanish:
  - y todos ellos
  - y sobre cada uno de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula final resume el conjunto de figuras afectadas por lo que viene. Mantener «sobre» evita suavizar la repetición preposicional del original.
theological_decisions:
- issue: Si el evento que «vendrá» debe explicitarse como juicio
  english_pob_reading: that will come upon
  chosen_spanish_reading: lo que vendrá sobre
  alternative_spanish_readings:
  - el juicio que vendrá sobre
  - lo que sucederá a
  rationale: El ge'ez no nombra directamente juicio ni castigo; sólo dice que algo vendrá «sobre» esas figuras. La versión española conserva esa tensión apocalíptica sin resolverla interpretativamente.
  doctrine_reference: Preservar la ambigüedad del oráculo/visión en vez de convertirla en explicación.
- issue: Si debe decodificarse el simbolismo animal en el cuerpo del texto
  english_pob_reading: retain elephants, camels, donkeys, stars, and cattle literally
  chosen_spanish_reading: conservar elefantes, camellos, asnos, estrellas y ganado literalmente
  alternative_spanish_readings:
  - sustituir por grupos históricos interpretados
  - glosar las estrellas como seres celestiales
  rationale: La línea presenta símbolos visionarios, no su interpretación. Traducirlos literalmente respeta la forma apocalíptica y evita aplanar el texto en prosa explicativa.
  doctrine_reference: La imaginería apocalíptica debe mantenerse como imaginería.
translation_notes:
  revision_awareness: El audit trail en inglés pasó de una lectura errónea de አልህምታት como «sheep» a la corrección a «cattle», y además eliminó una duplicación accidental del cierre. La versión española sigue la lectura corregida y mantiene la estructura repetitiva del original sin añadir interpretación.
  spanish_consistency_notes:
  - Se usa «Yahvé» sólo cuando el texto lo exija; aquí no aparece el nombre divino.
  - Se mantiene el registro apocalíptico con vocabulario sencillo y solemne.
  - No se introduce explicación simbólica en el cuerpo principal; las notas distinguen lectura literal y tensión interpretativa.
  - «Asnos» y «camellos» se conservan por coherencia zoológica y textual, sin modernizar el marco visionario.
