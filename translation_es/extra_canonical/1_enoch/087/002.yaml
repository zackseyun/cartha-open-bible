translation:
  language: es
  text: Y levanté otra vez mis ojos hacia el cielo[a], y vi en una visión[b]—y he aquí, salieron del cielo seres con semejanza de hombres blancos[c]; y cuatro salieron de aquel lugar[d], y tres con ellos[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al cielo». El ge'ez expresa la dirección de la mirada elevada.
    reason: lexical_alternative
  - marker: b
    text: O «en visión». El ge'ez በራእይ es anartroso; la forma elegida suena natural en español sin imponer una referencia definida.
    reason: lexical_alternative
  - marker: c
    text: O «figuras en la semejanza de hombres blancos». La redacción conserva la comparación explícita del ge'ez sin identificar a los seres en la línea principal.
    reason: lexical_alternative
  - marker: d
    text: O «desde aquel lugar».
    reason: lexical_alternative
  - marker: e
    text: 'La cláusula final es abrupta en el ge''ez: «y tres con ellos». Se mantiene la concisión en vez de suavizarla.'
    reason: textual_variant
lexical_decisions:
- source_word: አንሣእኩ
  english_pob_choice: I lifted up
  chosen_spanish: levanté
  alternatives_spanish:
  - alcé
  - levanté hacia arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa elevar o levantar; con «mis ojos» en español, «levanté mis ojos» conserva el giro apocalíptico natural sin volverlo demasiado literal o pesado.
- source_word: አዕይንትየ
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mi vista
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el sustantivo concreto del original y del patrón bíblico, que en español suena claro y solemne.
- source_word: ካዕበ
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca la reanudación de la atención visionaria; «otra vez» es idiomático en español y conserva esa insistencia.
- source_word: ውስተ ሰማየ
  english_pob_choice: to heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - al cielo
  - al cielo de arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «hacia el cielo» expresa bien la dirección sin forzar un valor de entrada o penetración; aquí el contexto es la mirada elevada, no un movimiento físico literal.
- source_word: ወርኢኩ በራእይ
  english_pob_choice: and I saw in a vision
  chosen_spanish: y vi en una visión
  alternatives_spanish:
  - y vi en visión
  - y vi en un sueño visionario
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el marco explícitamente visionario. «En una visión» refleja el valor anartro del ge'ez con una formulación natural en español.
- source_word: ወነዋ
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mirad
  - y ved
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Y he aquí» mantiene el tono deíctico y profético del original y del audit trail inglés.
- source_word: ወፁኡ እምሰማይ
  english_pob_choice: there came out from heaven
  chosen_spanish: salieron del cielo
  alternatives_spanish:
  - salieron de los cielos
  - vinieron del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Salieron» conserva la idea de procedencia y aparición; «del cielo» es la forma más natural en español para el movimiento desde el ámbito celeste.
- source_word: ከመ እምሳለ ሰብእ ጸዓዳ
  english_pob_choice: beings in the likeness of white men
  chosen_spanish: seres en la semejanza de hombres blancos
  alternatives_spanish:
  - seres semejantes a hombres blancos
  - figuras en la semejanza de hombres blancos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la duplicación de comparación/resemjanza del ge'ez (כמו / semejanza) sin identificar indebidamente a estas figuras. «Seres» deja abierto su carácter celestial y «hombres blancos» preserva el rasgo visual.
- source_word: ፬ ወፁኡ
  english_pob_choice: four came out
  chosen_spanish: cuatro salieron
  alternatives_spanish:
  - cuatro salieron fuera
  - salieron cuatro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el número explícito y el verbo de salida en una construcción española fluida.
- source_word: እምውእቱ መካን
  english_pob_choice: from that place
  chosen_spanish: de aquel lugar
  alternatives_spanish:
  - de ese lugar
  - desde aquel lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Aquel» respeta la distancia demostrativa del original y su viveza espacial.
- source_word: ፫ ምስሌሆሙ
  english_pob_choice: three with them
  chosen_spanish: y tres con ellos
  alternatives_spanish:
  - tres con ellos
  - y tres junto con ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase final es abrupta en ge'ez; «y tres con ellos» conserva la concisión y el posible total implícito sin suavizar demasiado la sintaxis.
theological_decisions:
- issue: Identidad de los seres blancos que salen del cielo
  english_pob_reading: Render descriptively as heavenly 'beings like white men' without identifying them as angels in the main text.
  chosen_spanish_reading: Se traduce descriptivamente como «seres en la semejanza de hombres blancos», sin llamarlos «ángeles» en el texto principal.
  alternative_spanish_readings:
  - ángeles en forma de hombres
  - figuras humanas blancas
  rationale: El verso solo indica apariencia y procedencia celestial. Nombrarlos como ángeles añadiría una identificación que el texto de esta línea no explicita. La traducción conserva la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
- issue: Valor de la frase visionaria «בַּרַאְי / በራእይ»
  english_pob_reading: and I saw in a vision
  chosen_spanish_reading: y vi en una visión
  alternative_spanish_readings:
  - y vi en visión
  - y vi en una visión profética
  rationale: Se evita introducir un artículo definido no justificado. La forma española conserva el carácter de experiencia visionaria sin precisar más de lo que ofrece el ge'ez.
  doctrine_reference: Respeto a la anartrosidad del original y al registro apocalíptico.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que confirmó como adecuada la lectura anartrosa de በራእይ («en una visión») y la necesidad de conservar la expresión completa de semejanza en ከመ እምሳለ («en la semejanza de»). También se siguió el audit trail inglés que preserva la sintaxis abrupta del cierre numérico.
  spanish_consistency_notes:
  - Se mantuvo «cielo» para ሰማይ en lugar de una paráfrasis más amplia, por coherencia con el registro apocalíptico.
  - Se evitó «SEÑOR» u otras sustituciones teológicas ajenas, ya que este versículo no contiene el Tetragrámaton ni un título divino equivalente.
  - Se conservó «seres» en vez de «ángeles» para no resolver una identificación no explicitada en la línea.
  - La puntuación con raya larga refleja el inciso visionario del original y sigue la presentación del English POB.
