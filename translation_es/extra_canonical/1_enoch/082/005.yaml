- from: Por causa de ellos, la gente se desvía y no los considera en el [a]recuento del mundo entero; porque la gente yerra acerca de ellos y no los conoce [b]con exactitud.
  to: Por causa de ellos, la gente se desvía y no los toma en cuenta en el cálculo[a] del mundo entero; porque la gente yerra acerca de ellos y no los conoce con exactitud[b].
