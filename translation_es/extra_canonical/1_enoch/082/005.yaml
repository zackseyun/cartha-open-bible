translation:
  language: es
  text: Por causa de ellos, la gente se desvía y no los toma en cuenta en el cálculo[a] del mundo entero; porque la gente yerra acerca de ellos y no los conoce con exactitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge’ez admite una lectura de cómputo o cálculo; en este contexto astronómico, ‘cálculo’ refleja mejor que ‘pensamiento’ la idea de reckoning calendárico. También podría traducirse ‘recuento’.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse ‘cuidadosamente’ o ‘precisamente’; por eso ‘con exactitud’ intenta conservar la idea de conocimiento riguroso.
    reason: lexical_alternative
lexical_decisions:
- source_word: በእንቲአሆሙ
  english_pob_choice: because of them
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - a causa de ellos
  - por ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro causal se conserva en español con una expresión natural y formal. ‘Por causa de ellos’ mantiene con claridad el valor explicativo del original y evita una simple traducción mecánica de la preposición.
- source_word: ይጌግዩ
  english_pob_choice: go astray
  chosen_spanish: se desvía
  alternatives_spanish:
  - yerra
  - anda errada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa extravío o error. ‘Se desvía’ mantiene la imagen de apartarse del camino y funciona bien en español contemporáneo sin perder la idea de error.
- source_word: ኢየኀስብዎሙ
  english_pob_choice: do not reckon them
  chosen_spanish: no los considera
  alternatives_spanish:
  - no los cuenta
  - no los reckon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto calendárico, el núcleo semántico es el de valorar/contar correctamente. ‘No los considera’ preserva el matiz mental y práctico del verbo, aunque ‘no los cuenta’ sigue siendo una alternativa posible.
- source_word: ተበሐሳቤ
  english_pob_choice: in the reckoning
  chosen_spanish: en el recuento
  alternatives_spanish:
  - en la cuenta
  - en el cálculo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa corrigió ‘thought’ a ‘reckoning/calculation’. En español, ‘recuento’ comunica bien la idea de cómputo sin sonar demasiado técnico; ‘cálculo’ sería más literal, pero menos fluido aquí.
- source_word: ኵሉ ዓለም
  english_pob_choice: of the whole world
  chosen_spanish: del mundo entero
  alternatives_spanish:
  - de todo el mundo
  - del mundo todo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase amplia y universal se traduce con una formulación natural en español. ‘Del mundo entero’ conserva el alcance total del original y suena más idiomático que un calco rígido.
- source_word: ይጌግይዎሙ
  english_pob_choice: people err concerning them
  chosen_spanish: la gente yerra acerca de ellos
  alternatives_spanish:
  - la gente se equivoca acerca de ellos
  - la gente se extravía respecto de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se respeta la corrección auditada: el sujeto explícito es ‘people/la gente’, y el verbo es intransitivo (‘errar’/‘equivocarse’), no ‘llevar a error’. ‘Yerra acerca de ellos’ conserva con precisión la relación preposicional.'
- source_word: ኢያእምርዎሙ
  english_pob_choice: do not know them
  chosen_spanish: no los conoce
  alternatives_spanish:
  - no los reconoce
  - no los entiende
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Conocer’ es la traducción más amplia y segura para el verbo común ‘saber/conocer’. ‘No los conoce’ deja abierta la posibilidad de reconocimiento o comprensión adecuada, como en el inglés auditado.
- source_word: ጥንቁቀ
  english_pob_choice: accurately
  chosen_spanish: con exactitud
  alternatives_spanish:
  - precisamente
  - cuidadosamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La noción de precisión se expresa de forma natural con ‘con exactitud’. Esto preserva tanto la idea de rigor como la posible dimensión de conocimiento exacto o cuidadoso.
theological_decisions:
- issue: Referente de los pronombres plurales repetidos
  english_pob_reading: The pronouns refer to the heavenly lights or their appointed times/seasons discussed in the surrounding context.
  chosen_spanish_reading: Los pronombres se dejan sin especificar más allá de ‘ellos’, para no resolver el referente con más precisión de la que ofrece el texto.
  alternative_spanish_readings:
  - se refieren a los astros o luces celestiales
  - se refieren a los tiempos o estaciones asignados
  rationale: El pasaje pertenece al Libro Astronómico y el contexto sugiere los luminares y su cómputo, pero el verso mismo no explicita el referente. Mantener la referencia abierta evita añadir una identificación no formulada en el ge’ez.
  doctrine_reference: Preservar ambigüedad donde la fuente es genuinamente abierta; no resolver más allá del texto.
- issue: Valor de ሐሳብ/ال reckoning en un contexto calendárico
  english_pob_reading: The phrase rendered 'in the reckoning of the whole world' may also mean 'in the thought of all the world' / 'in the calculation of the whole world'.
  chosen_spanish_reading: Se entiende como un ‘recuento’ o cómputo calendárico, no como mera ‘idea’ o ‘pensamiento’.
  alternative_spanish_readings:
  - en el pensamiento de todo el mundo
  - en el cálculo del mundo entero
  rationale: La revisión auditada corrige la lectura hacia el campo semántico de cálculo/recuento, coherente con 1 Enoc 72–82. En español conviene reflejar ese sentido técnico sin perder legibilidad.
  doctrine_reference: Respetar la corrección textual y léxica documentada por el auditor.
translation_notes:
  revision_awareness: 'La base inglesa fue revisada: la cláusula final ya no se entiende como ‘they lead them astray’, sino como ‘people err concerning them’. Asimismo, la expresión media se corrigió de ‘thought’ a ‘reckoning/calculation’. La redacción española sigue esas correcciones auditadas y evita resolver el referente de los pronombres más allá de lo que el ge’ez explicita.'
  spanish_consistency_notes:
  - Se mantiene ‘gente’ como sujeto impersonal colectivo, coherente con el inglés auditado y con el ge’ez explícito.
  - Se evita ‘SEÑOR’ u otra terminología de sustitución; no hay nombres divinos en este versículo.
  - ‘Recuento’ y ‘con exactitud’ preservan el campo semántico técnico del pasaje astronómico sin introducir tecnicismos innecesarios.
