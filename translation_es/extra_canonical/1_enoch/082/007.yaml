base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/082/007.yaml
  text: And the matter is true[a], and the reckoning is exact; for Uriel showed me the luminaries, and the paths, and the appointed times, and the years, and the days, and breathed on me—Uriel[f][e][d][c][b], to whom the Lord of all creation of the world gave command concerning the host of heaven.
  footnotes:
  - marker: a
    text: Or 'the careful calculation' or 'the precise account.' The Ge'ez phrase suggests deliberate exactness, fitting the calendrical material of this section.
    reason: lexical_alternative
  - marker: b
    text: '''Paths'' may also be rendered ''courses,'' referring to the routes of the heavenly lights.'
    reason: lexical_alternative
  - marker: c
    text: The term rendered 'appointed times' can also mean 'feasts' or 'festivals'; here the broader calendrical sense is likely.
    reason: lexical_alternative
  - marker: d
    text: The word rendered 'years' is textually difficult in this OCR witness; some understand a seasonal or annual division here.
    reason: textual_variant
  - marker: e
    text: '''Host of heaven'' may refer to the ordered heavenly array, including the celestial bodies governed in this book.'
    reason: cultural_note
  - marker: f
    text: Or 'And this is the matter, and the exact reckoning of the luminaries, and of the paths, and of the appointed times, and of the years, and of the days, as Uriel showed me'.
    reason: previous_rendering
