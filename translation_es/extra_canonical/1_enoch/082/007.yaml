translation:
  language: es
  text: Y el asunto es cierto, y el cálculo es exacto; porque Uriel me mostró los luminares, los caminos[a], los tiempos señalados[b], los años[c] y los días, y sopló sobre mí[d]—Uriel, a quien el Señor de toda la creación del mundo dio mandato acerca del ejército del cielo[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Caminos» puede entenderse también como «cursos», es decir, las trayectorias de los cuerpos celestes.
    reason: lexical_alternative
  - marker: b
    text: «Tiempos señalados» también puede traducirse «fiestas» o «festividades»; aquí conviene el sentido calendárico más amplio.
    reason: lexical_alternative
  - marker: c
    text: El término correspondiente a «años» es textualmente difícil en este testimonio ge'ez; algunos lo entienden como una división estacional o anual.
    reason: textual_variant
  - marker: d
    text: La expresión conserva la imagen concreta de soplar sobre alguien; no debe reducirse a una mera instrucción o inspiración interior.
    reason: source_note
  - marker: e
    text: «Ejército del cielo» puede referirse al ordenado conjunto de astros y seres celestes gobernados en este libro.
    reason: cultural_note
lexical_decisions:
- source_word: ወአማን
  english_pob_choice: the matter is true
  chosen_spanish: el asunto es verdadero
  alternatives_spanish:
  - el asunto es cierto
  - y verdaderamente es el asunto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El Ge'ez afirma la verdad del enunciado con fuerza introductoria. 'El asunto es verdadero' preserva esa solemnidad sin sonar forzado en español.
- source_word: ነገሩ
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la materia
  - el relato
  - el informe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es amplio y puede significar asunto, relato o materia. 'Asunto' funciona bien para introducir la exposición calendárica sin estrechar demasiado el sentido.
- source_word: ጥንቁቅ ሐሳቡ / ዘልኩዕ
  english_pob_choice: the exact reckoning
  chosen_spanish: el cálculo es exacto
  alternatives_spanish:
  - el cálculo cuidadoso
  - el recuento preciso
  - el cómputo fijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa reconoce exactitud/cálculo cuidadoso. En español, 'cálculo es exacto' conserva la precisión técnica del contexto astronómico-calendárico sin añadir una glosa no segura como 'apuntado' al sustantivo.
- source_word: ብርሃናት
  english_pob_choice: luminaries
  chosen_spanish: los luminares
  alternatives_spanish:
  - las luces
  - los cuerpos luminosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Luminares'' mantiene el registro elevado y el sentido de cuerpos celestes ordenados mejor que ''luces''.'
- source_word: አውራኅ
  english_pob_choice: paths
  chosen_spanish: los caminos
  alternatives_spanish:
  - las sendas
  - los cursos
  - los recorridos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El auditorio inglés tuvo una oscilación textual importante; la revisión más reciente entiende aquí 'paths'. En español, 'caminos' conserva esa lectura amplia y natural, sin cerrar innecesariamente la posible idea de rutas celestes.
- source_word: በዓላት
  english_pob_choice: appointed times
  chosen_spanish: los tiempos señalados
  alternatives_spanish:
  - las fiestas
  - las festividades
  - los tiempos fijados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es calendárico. 'Tiempos señalados' preserva la amplitud del término sin reducirlo solo a 'fiestas'.
- source_word: ክረማት
  english_pob_choice: years
  chosen_spanish: los años
  alternatives_spanish:
  - las estaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lista de unidades temporales exige 'años' como la opción más directa, aun reconociendo la dificultad textual indicada en la nota inglesa.
- source_word: መዋዕል
  english_pob_choice: days
  chosen_spanish: los días
  alternatives_spanish:
  - los tiempos
  - las jornadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Después de unidades mayores del calendario, 'días' es la equivalencia más clara y exacta.
- source_word: አርአየኒ
  english_pob_choice: showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me reveló
  - me hizo ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Me mostró'' conserva el gesto visionario directo y evita sobreinterpretar como ''reveló'' si el texto solo dice mostrar.'
- source_word: ነፍሐ ዲቤየ
  english_pob_choice: breathed on me
  chosen_spanish: sopló sobre mí
  alternatives_spanish:
  - sopló en mí
  - respiró sobre mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para ነፍሐ la imagen literal es 'soplar/respirar'. 'Sopló sobre mí' es la forma española más natural y mantiene la imaginería concreta que la POB quiso preservar.
- source_word: ዘአዘዘ ሎቱ
  english_pob_choice: to whom the Lord ... gave command
  chosen_spanish: a quien ... dio mandato
  alternatives_spanish:
  - a quien ... ordenó
  - a quien ... encomendó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Dar mandato'' refleja la relación de autoridad y encargo sin perder la sintaxis relativa del original.'
- source_word: እግዚእ ኵሉ ፍጥረት ዓለም
  english_pob_choice: the Lord of all creation of the world
  chosen_spanish: el Señor de toda la creación del mundo
  alternatives_spanish:
  - el Señor de toda criatura del mundo
  - el Señor de toda la creación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el alcance cósmico de la fórmula. 'Señor' traduce el título de soberanía en este contexto apocalíptico.
- source_word: ለሐይለ ሰማይ
  english_pob_choice: concerning the host of heaven
  chosen_spanish: acerca del ejército del cielo
  alternatives_spanish:
  - acerca del hoste del cielo
  - acerca del ejército celestial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Ejército del cielo'' conserva el matiz de host/armada celeste y es comprensible en español bíblico contemporáneo.'
theological_decisions:
- issue: Cómo traducir el título እግዚእ en un contexto apocalíptico no canónico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Dueño
  rationale: La POB inglesa mantiene 'Lord' como título de soberanía divina. 'Señor' es la equivalencia española más fiel y reverente, sin introducir una domesticación secular.
  doctrine_reference: 'Translation philosophy: translate titles; preserve divine sovereignty language.'
- issue: Cómo preservar la imaginería de ነፍሐ ዲቤየ
  english_pob_reading: breathed on me
  chosen_spanish_reading: sopló sobre mí
  alternative_spanish_readings:
  - me inspiró
  - me habló
  rationale: La escena es visionaria y concreta. Mantener el soplo evita reducir la acción a una mera interioridad o instrucción verbal.
  doctrine_reference: 'Book context: preserve apocalyptic imagery; avoid flattening visionary action.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail en cuanto a la fuerza de ወአማን ('verdadero'), la lectura de አውራኅ en torno a 'paths', la preservación del soplo concreto y la relación causal introducida por እስመ. También evita la glosa 'appointed' aplicada a 'reckoning', conforme a la revisión posterior. Se mantiene, sin embargo, una formulación española natural que no depende mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa 'Señor' para እግዚእ por coherencia con el registro reverente del proyecto.
  - Se usa 'Mesías' no aplica aquí; se conserva la terminología astronómica y calendárica.
  - '''Luminares'' mantiene consistencia con el vocabulario POB para cuerpos celestes.'
  - '''Sopló sobre mí'' y no ''inspiró'' conserva la imagen apocalíptica documentada.'
  - Se evita 'SEÑOR' en versalitas; la forma española corriente 'Señor' es suficiente en este registro.
  - '''Tiempo señalado'' se elige como equivalente amplio, no como equivalencia litúrgica estrecha a ''fiesta''.'
