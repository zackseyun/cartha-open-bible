translation:
  language: es
  text: 'Y estos son los nombres de los líderes que dividen las cuatro partes del año[a], que están designados: Milkiel, Helemmelek, Meleyal[b] y Narel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cuatro divisiones del año»; la expresión ge'ez es literalmente «las cuatro partes del año».
    reason: lexical_alternative
  - marker: b
    text: Los dos nombres centrales son difíciles en este testimonio OCR; se conserva una transliteración conservadora en lugar de reconstruir una ortografía más familiar.
    reason: textual_variant
lexical_decisions:
- source_word: አስማቲሆሙ
  english_pob_choice: their names
  chosen_spanish: los nombres
  alternatives_spanish:
  - sus nombres
  - los nombres de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase introductoria presenta una enumeración nominal. En español, «los nombres» conserva la función expositiva sin forzar un posesivo redundante; «sus nombres» también sería posible, pero el contexto ya identifica los nombres de esos líderes.
- source_word: መራሕያያን
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - guías
  - jefes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término denota quienes conducen o gobiernan. «Líderes» mantiene el sentido de autoridad sin introducir un rango más técnico que el que el pasaje garantiza.
- source_word: ይፈልጡ
  english_pob_choice: divide
  chosen_spanish: dividen
  alternatives_spanish:
  - separan
  - reparten
  - apartan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo, en este contexto calendárico, expresa la partición de las estaciones o segmentos del año. «Dividen» sigue de cerca la fuerza del verbo y su relación con «las cuatro partes del año».
- source_word: ፬መክፈልተ ዓመት
  english_pob_choice: the four parts of the year
  chosen_spanish: las cuatro partes del año
  alternatives_spanish:
  - las cuatro divisiones del año
  - los cuatro cuartos del año
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se conserva la literalidad básica de la expresión ge''ez: cuatro partes del año. «Divisiones» y «cuartos» son posibles, pero «partes» es la opción más cercana y menos interpretativa.'
- source_word: ሥሩዓን
  english_pob_choice: appointed
  chosen_spanish: que están nombrados
  alternatives_spanish:
  - designados
  - establecidos
  - apuntados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el sentido es el de figuras asignadas o designadas para una función. En español, «están nombrados» comunica bien la idea administrativa/celestial; «designados» sería una alternativa válida, pero menos idiomática en esta formulación.
- source_word: ሚልኪኤል
  english_pob_choice: Milkiel
  chosen_spanish: Milkiel
  alternatives_spanish:
  - Malkiel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la transliteración conservadora del testimonio ge'ez, tal como en el audit trail inglés, sin normalizar a una forma más conocida.
- source_word: ህልእምሜሌክ
  english_pob_choice: Helemmelek
  chosen_spanish: Helemmelek
  alternatives_spanish:
  - Helemmelek
  - Hellemmelek
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El nombre es textual y fonéticamente incierto en este testimonio; se retiene la transliteración conservadora del inglés POB para no ocultar la dificultad del texto.
- source_word: ሜሌአየል
  english_pob_choice: Meleyal
  chosen_spanish: Meleyal
  alternatives_spanish:
  - Meleeyal
  - Meleael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la forma transliterada conservadora del POB inglés. Dado el carácter incierto del testimonio, la prioridad es la trazabilidad más que una normalización hipotética.
- source_word: ናሬል
  english_pob_choice: Narel
  chosen_spanish: Narel
  alternatives_spanish:
  - Nar'el
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Nombre propio transliterado directamente desde el ge'ez, siguiendo la forma conservadora del audit trail inglés.
theological_decisions:
- issue: Naturaleza de las figuras nombradas
  english_pob_reading: heavenly leaders overseeing calendrical divisions
  chosen_spanish_reading: líderes celestiales que dividen las partes del año
  alternative_spanish_readings:
  - jefes angelicales de las estaciones
  - marcadores astronómicos personificados
  rationale: El pasaje pertenece al Libro de las Lumbreras y presenta figuras cósmicas con función administrativa. «Líderes» evita sobredeterminar una angelología más desarrollada, pero deja abierta la lectura celestial implícita en el contexto.
  doctrine_reference: Preservar la imaginería apocalíptica y el sentido local del pasaje; no armonizar en exceso con tradiciones posteriores.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto ge'ez y el audit trail inglés, sin cambios de revisión posteriores relevantes; se mantiene la transliteración conservadora de los nombres dudosos y la literalidad de «las cuatro partes del año».
  spanish_consistency_notes:
  - Se usa «años» solo en sentido genérico; aquí se conserva «el año» por fidelidad al singular del original.
  - Se evita «SEÑOR» u otra sustitución litúrgica, pues el pasaje no contiene el tetragrámaton.
  - «Líderes» se emplea como equivalente funcional de autoridad/guía, sin convertirlos en una categoría doctrinal más precisa de la que el texto ofrece.
