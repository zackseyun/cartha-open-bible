base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/082/014.yaml
  text: And the names of those who lead them are Adnarel[a], Iyasusael, and Elomeel. These three follow after the leaders of the orders, and there are two that follow after the leaders of the orders, which follow after all the leaders of the fixed stations[c][b], who divide the four parts of the year.
  footnotes:
  - marker: a
    text: Or 'the four divisions of the year'; the phrase refers to the calendrical partition of the year in the Astronomical Book.
    reason: lexical_alternative
  - marker: b
    text: The syntax of the middle clauses is difficult, with repeated 'follow after' and multiple groups of leaders. The translation preserves the sequence of the Ge'ez rather than smoothing it into a fully resolved hierarchy.
    reason: textual_variant
  - marker: c
    text: Or 'and there are two that follow after the leaders of the orders'.
    reason: previous_rendering
