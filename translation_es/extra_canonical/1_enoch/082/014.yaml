translation:
  language: es
  text: Y los nombres de los que los guían son Adnarel, Iyasusael y Elomeel. Estos tres siguen tras[a] los líderes de los órdenes, y hay dos que siguen tras los líderes de los órdenes,[b] los cuales siguen tras todos los líderes de las estaciones fijas, que dividen las cuatro partes del año.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La sintaxis de las cláusulas intermedias es difícil, con repeticiones de “siguen tras” y varios grupos de líderes. La traducción conserva la secuencia del ge’ez en vez de resolverla por completo.
    reason: textual_variant
  - marker: b
    text: 'O: “y hay dos que siguen tras los líderes de los órdenes”.'
    reason: previous_rendering
  - marker: c
    text: 'O: “las cuatro divisiones del año”. La frase alude a la partición calendárica del año en el Libro Astronómico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አስማቲሆሙ
  english_pob_choice: the names of those who lead them
  chosen_spanish: los nombres de los que los guían
  alternatives_spanish:
  - sus nombres
  - los nombres de aquellos que los conducen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo con sufijo pronominal introduce una lista de nombres; en español, “los nombres de los que los guían” conserva la relación entre nombres y función dirigente sin volverlo artificial.
- source_word: ይመርሃዎሙ
  english_pob_choice: lead them
  chosen_spanish: los guían
  alternatives_spanish:
  - los conducen
  - los dirigen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa dirección/guía en un orden celestial. “Guiar” mantiene la idea de conducción ordenada sin forzar un matiz demasiado administrativo.
- source_word: ይተልዉ
  english_pob_choice: follow after
  chosen_spanish: siguen después
  alternatives_spanish:
  - vienen después
  - siguen tras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición del verbo pide una solución que conserve secuencia y paralelismo. “Siguen después” reproduce bien el valor de orden consecutivo.
- source_word: መራሕያነ
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - guías
  - jefes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico-administrativo, “líderes” refleja adecuadamente la función de mando sin introducir terminología eclesiástica.
- source_word: ሥርዓታት
  english_pob_choice: orders
  chosen_spanish: órdenes
  alternatives_spanish:
  - disposiciones
  - arreglos
  - cursos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término apunta a estructuras ordenadas o disposiciones cósmicas. “Órdenes” preserva esa formalidad y la correspondencia con la organización celeste.
- source_word: ምቅዋማት
  english_pob_choice: fixed stations
  chosen_spanish: estaciones fijas
  alternatives_spanish:
  - posiciones fijas
  - lugares establecidos
  - puestos fijos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es de puestos/estaciones celestes establecidas. “Estaciones fijas” es natural en español y conserva el sentido astronómico de lugares asignados.
- source_word: ይፈልጡ
  english_pob_choice: divide
  chosen_spanish: dividen
  alternatives_spanish:
  - separan
  - reparten
  - apartan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido es repartir o particionar. “Dividen” es el equivalente más directo para “las cuatro partes del año”.
- source_word: ክፍለ ለዓመት
  english_pob_choice: the four parts of the year
  chosen_spanish: las cuatro partes del año
  alternatives_spanish:
  - las cuatro divisiones del año
  - los cuatro cuartos del año
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Partes” mantiene la literalidad y evita imponer una terminología técnica moderna; en este contexto calendárico, el reparto del año es el foco.
- source_word: Adnarel, Iyasusael, Elomeel
  english_pob_choice: Adnarel, Iyasusael, and Elomeel
  chosen_spanish: Adnarel, Iyasusael y Elomeel
  alternatives_spanish:
  - Adnarel, Iasusael y Elomeel
  lexicon: Transliteración conforme a la tradición del texto etiópico y al audit trail inglés
  rationale: Se conservan los nombres propios transliterados, como en el POB inglés, porque funcionan como designaciones celestiales y no como títulos traducibles.
theological_decisions:
- issue: Naturaleza de los seres nombrados
  english_pob_reading: The names are rendered as transliterated personal names of celestial leaders, not translated titles.
  chosen_spanish_reading: Los nombres se mantienen transliterados como nombres personales de líderes celestiales, no como títulos traducidos.
  alternative_spanish_readings:
  - Tratar algunos nombres como epítetos descriptivos
  - Emendar las formas como si fueran corrupción textual
  rationale: El texto presenta una lista nominal dentro de una estructura astronómica. La traducción debe conservar esa función onomástica y no convertir los nombres en descripciones.
  doctrine_reference: Transliterar nombres; traducir títulos solo cuando el original realmente funcione como título.
- issue: Secuencia y jerarquía de los líderes
  english_pob_reading: The translation preserves the sequence of the Ge'ez rather than smoothing it into a fully resolved hierarchy.
  chosen_spanish_reading: La traducción conserva la secuencia del ge’ez sin resolver artificialmente la jerarquía implícita.
  alternative_spanish_readings:
  - Acomodar la sintaxis para que la jerarquía quede completamente explícita
  - Reescribir la relación entre grupos de líderes
  rationale: El testimonio textual mantiene repeticiones y niveles sucesivos de liderazgo. En español conviene preservar esa progresión, aunque la sintaxis quede algo tensa, porque esa tensión forma parte del dato textual.
  doctrine_reference: No suavizar tensiones textuales documentadas; respetar la secuencia del original.
translation_notes:
  revision_awareness: La traducción toma en cuenta la revisión más reciente y evita reflejar el error de OCR que generaba “dos” donde el texto crítico indica la secuencia correcta de líderes; por eso se conserva la progresión de grupos y se mantiene la clausula de los líderes de las estaciones fijas sin alterar el orden del original. También se reconoce la dificultad sintáctica señalada en el audit trail inglés y se preserva sin reestructurarla en exceso.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto lo exija; aquí no aparece ningún divino nombre.
  - “Líderes”, “órdenes” y “estaciones fijas” se mantienen de modo consistente para preservar el campo semántico astronómico-administrativo.
  - Los nombres propios se transliteran sin intentar normalizarlos al español para no perder el dato del texto fuente.
