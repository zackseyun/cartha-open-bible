translation:
  language: es
  text: Y estos son los nombres de los que los conducen[a], que vigilan y entran en sus tiempos señalados[b], que los conducen en sus estaciones, en sus órdenes, en sus tiempos, en sus meses, en sus potestades y en sus posiciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los guían’ o ‘los dirigen’. El verbo ge'ez puede denotar conducir, guiar o dirigir.
    reason: lexical_alternative
  - marker: b
    text: La serie de términos temporales y posicionales se conserva distinguida para mantener visible el catálogo de regulación celestial.
    reason: lexical_alternative
lexical_decisions:
- source_word: አስማቲሆሙ
  english_pob_choice: the names of those
  chosen_spanish: los nombres de los que
  alternatives_spanish:
  - sus nombres
  - los nombres de aquellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo con sufijo pronominal introduce una lista identificadora. En español, ‘los nombres de los que’ conserva la formulación relacional sin volverla demasiado literal ni oscurecer la referencia a seres nombrados.
- source_word: ይመርኅዎሙ
  english_pob_choice: lead them
  chosen_spanish: los guían
  alternatives_spanish:
  - los conducen
  - los dirigen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite el matiz de conducir o dirigir. ‘Guiar’ preserva el sentido administrativo/cósmico del pasaje y mantiene la alternativa que la POB inglesa anotó (‘guide them’) sin sonar rígidamente jerárquico en español.
- source_word: የዐቅቡ
  english_pob_choice: keep watch
  chosen_spanish: vigilan
  alternatives_spanish:
  - guardan
  - están atentos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico no se trata de vigilancia militar simple, sino de una custodia atenta del orden celestial. ‘Vigilan’ comunica bien esa atención ordenada.
- source_word: ይበውኡ
  english_pob_choice: enter
  chosen_spanish: entran
  alternatives_spanish:
  - ingresan
  - van en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa movimiento de entrada. ‘Entran’ es la forma más natural y fiel en español, y conserva el registro formal de la revisión inglesa sin introducir detalles no presentes en el texto.
- source_word: በአዝማነ ዚአሆሙ
  english_pob_choice: at their appointed times
  chosen_spanish: en sus tiempos señalados
  alternatives_spanish:
  - en sus tiempos fijados
  - en sus temporadas asignadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase apunta a tiempos prescritos o establecidos. ‘Tiempos señalados’ reproduce la idea de cita fija y evita reducir el matiz calendárico a una sola palabra como ‘estaciones’ o ‘seasons’.
- source_word: በመካናቲሆሙ
  english_pob_choice: in their stations
  chosen_spanish: en sus estaciones
  alternatives_spanish:
  - en sus puestos
  - en sus lugares
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí no se trata solo de ubicación física, sino de una posición asignada dentro del orden cósmico. ‘Estaciones’ conserva esa función establecida, como en la POB inglesa.
- source_word: በሥርዓታቲሆሙ
  english_pob_choice: in their orders
  chosen_spanish: en sus órdenes
  alternatives_spanish:
  - según sus ordenamientos
  - en sus disposiciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede significar orden, arreglo o regla. ‘Órdenes’ mantiene la serie de términos de organización sin diluir su carácter normativo.
- source_word: በጊዜያቲሆሙ
  english_pob_choice: in their times
  chosen_spanish: en sus tiempos
  alternatives_spanish:
  - en sus períodos
  - en sus épocas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la repetición visible de vocablos temporales. ‘Tiempos’ en español sigue de cerca la POB inglesa y mantiene el paralelismo del catálogo.
- source_word: በአውራኂሆሙ
  english_pob_choice: in their months
  chosen_spanish: en sus meses
  alternatives_spanish:
  - por sus meses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa meses de manera directa y calendárica. ‘Meses’ es la opción más clara y exacta.
- source_word: በስልጣናቲሆሙ
  english_pob_choice: in their authorities
  chosen_spanish: en sus autoridades
  alternatives_spanish:
  - en sus dominios
  - en sus poderes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Autoridades’ conserva la idea de potestad o autoridad delegada, coherente con el lenguaje administrativo/cósmico del pasaje. Aunque en español puede sonar abstracto, refleja mejor el campo semántico que ‘dominios’ o ‘poderes’.
- source_word: በምቅዋማቲሆሙ
  english_pob_choice: in their positions
  chosen_spanish: en sus posiciones
  alternatives_spanish:
  - en sus puestos
  - en sus lugares fijos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término sugiere una posición o emplazamiento fijo. ‘Posiciones’ mantiene el sentido de ubicación asignada y el cierre escalonado de la lista.
theological_decisions:
- issue: ¿Los nombres designan a seres que guían los luminares o a los propios luminares?
  english_pob_reading: The verse is rendered to describe named beings who lead and supervise the luminaries or calendrical motions.
  chosen_spanish_reading: La redacción española conserva la lectura de seres nombrados que guían y supervisan el orden de los astros.
  alternative_spanish_readings:
  - Los nombres podrían referirse directamente a los luminares mismos.
  - Los nombres podrían ser simples designaciones astronómicas, sin agentes supervisores.
  rationale: El encadenamiento de ‘los que los guían’, ‘vigilan’ y la lista de estaciones, órdenes, tiempos, meses, autoridades y posiciones favorece una lectura de administración cósmica por agentes designados. La traducción española preserva esa imagen apocalíptica sin reducirla a una mera descripción astronómica.
  doctrine_reference: Mantener la imaginería apocalíptica del Libro de Enoc y su lógica interna de orden celestial.
translation_notes:
  revision_awareness: La versión inglesa revisada suavizó la sintaxis repitiendo menos veces ‘those who’ y prefirió ‘enter’ a ‘go in’. La traducción española adopta directamente esa sintaxis más fluida y mantiene la enumeración ordenada del original ge'ez.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este verso no contiene el nombre divino.
  - Se conserva ‘Mesías’/‘Cristo’ fuera de este pasaje; aquí no aplica ninguna decisión cristológica.
  - ‘Guiar’ se usa en el texto principal para respetar la alternativa reconocida por la POB inglesa y el matiz de dirección más que simple conducción física.
  - La repetición de ‘sus’ conserva el paralelismo del original y evita un estilo demasiado interpretativo.
