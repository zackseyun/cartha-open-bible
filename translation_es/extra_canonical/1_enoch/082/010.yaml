  rationale: Se ajusta el verbo principal a 'conducen' para reflejar mejor la elección prioritaria 'lead them' de la POB inglesa y el sentido de liderazgo administrativo/cósmico. También se cambia 'autoridades' por 'potestades' para un español más natural que conserve la idea de facultades o ámbitos de autoridad delegada. Se mantienen la estructura relativa, la repetición del catálogo y las notas pertinentes.
