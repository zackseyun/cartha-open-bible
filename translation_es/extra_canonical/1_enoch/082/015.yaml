translation:
  language: es
  text: Al comienzo del año, primero se levanta y gobierna Melkiyal[a], cuyo nombre es llamado Tam'ade'eni y el sol; y todos los días de su dominio mientras gobierna[c][b] son noventa y un días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula posterior a «Melkiyal» es textualmente difícil. El ge'ez parece dar otro nombre o designación; aquí se translitera Tam'ade'eni en vez de traducir especulativamente.
    reason: textual_variant
  - marker: b
    text: El verso trata la primera fracción del año como un período personificado bajo el gobierno de Melkiyal, con un total de noventa y un días.
    reason: cultural_note
  - marker: c
    text: 'O: «Al comienzo del año, primero se levanta y gobierna Melkiyal —cuyo nombre es Tam''ade''eni y el sol—; y todos los días de su dominio, mientras gobierna, son noventa y un días».'
    reason: previous_rendering
lexical_decisions:
- source_word: በቅድመ
  english_pob_choice: at the beginning of
  chosen_spanish: al comienzo de
  alternatives_spanish:
  - al principio de
  - en el comienzo de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fuerza es temporal, no espacial. En español, «al comienzo de» reproduce de manera natural el inicio de un período.
- source_word: ዓመት
  english_pob_choice: year
  chosen_spanish: año
  alternatives_spanish:
  - año solar
  - año
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Corresponde al ciclo calendárico del libro astronómico.
- source_word: ቀዳማዊ
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - el primero
  - primero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí funciona adverbialmente con «se levanta», por eso en español conviene «primero» y no un sustantivo aparte.
- source_word: ይሠርቅ
  english_pob_choice: rises
  chosen_spanish: se levanta
  alternatives_spanish:
  - rises
  - amanece
  - sale
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico, «se levanta» mantiene la imagen del astro que aparece o asciende.
- source_word: ወይመልክ
  english_pob_choice: and rules
  chosen_spanish: y gobierna
  alternatives_spanish:
  - y reina
  - y tiene dominio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gobierna» conserva la idea de dominio asignado sin sonar excesivamente monárquico para el español moderno.
- source_word: ምልኪያል
  english_pob_choice: Melkiyal
  chosen_spanish: Melkiyal
  alternatives_spanish:
  - Malkiyal
  - Melkeyal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se translitera el nombre propio para no perder el referente celestial/personificado.
- source_word: ዘይሠመይ ስሞ
  english_pob_choice: whose name is called
  chosen_spanish: cuyo nombre se llama
  alternatives_spanish:
  - cuyo nombre es
  - que se llama
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula relativa de nombre se puede verter con naturalidad en español sin perder su estructura explícita.
- source_word: ተመአደኒ
  english_pob_choice: Tam'ade'eni
  chosen_spanish: Tam'ade'eni
  alternatives_spanish:
  - Tema'adeni
  - Tamadeni
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La evidencia auditada favorece una transliteración prudente por tratarse de un término o nombre técnicamente incierto.
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el sol
  - el astro solar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La coordinación del original obliga a conservar este elemento dentro de la cláusula de nombramiento.
- source_word: ኵሎሙ መዋዕለ
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - la totalidad de los días
  - todos sus días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa el total del período gobernado sin añadir matices no presentes.
- source_word: ዘበስልጣኑ ዚአሁ
  english_pob_choice: of his dominion
  chosen_spanish: de su dominio
  alternatives_spanish:
  - de su dominio
  - bajo su autoridad
  - de su señorío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Dominio» reproduce el alcance de autoridad/regencia del texto y mantiene el tono apocalíptico.
- source_word: እለ ይመልክ
  english_pob_choice: while he rules
  chosen_spanish: mientras gobierna
  alternatives_spanish:
  - mientras reina
  - durante su gobierno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula relativa temporal se vierte con una fórmula española directa y clara.
- source_word: ፺ወ፩ ዕለት
  english_pob_choice: ninety-one days
  chosen_spanish: noventa y un días
  alternatives_spanish:
  - 91 días
  - noventa y un días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cifra debe mantenerse exacta; en español normativo, «noventa y un días» es la forma idiomática.
theological_decisions:
- issue: Personificación del orden calendárico
  english_pob_reading: Retain 'rules' and 'dominion' language for Melkiyal rather than reducing it to a neutral calendrical marker.
  chosen_spanish_reading: Mantener «gobierna» y «dominio» para Melkiyal en vez de convertirlo en un simple marcador calendárico.
  alternative_spanish_readings:
  - preside sobre
  - marca
  - rige el período
  rationale: El texto de 1 Enoc presenta el orden cósmico mediante figuras celestes con autoridad asignada. En español, conservar ese lenguaje evita aplanar la imaginería apocalíptica.
  doctrine_reference: Mantener la imaginería apocalíptica; no reducirla a prosa calendárica neutra.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión posterior que corrigió la segmentación de la cláusula sobre «el sol» y la función adverbial de «primero». Por eso el español mantiene «cuyo nombre se llama Tam'ade'eni y el sol» unido a Melkiyal, y coloca «primero» con «se levanta», evitando trasladar «el sol» al predicado final de los noventa y un días.
  spanish_consistency_notes:
  - Se conservó «Melkiyal» como transliteración estable del nombre propio.
  - Se mantuvo la coordinación «Tam'ade'eni y el sol» dentro de la cláusula nominal, conforme a la revisión auditada.
  - «Gobierna/dominio» se eligieron para preservar la imaginería de autoridad celestial sin introducir terminología eclesiástica.
  - La cifra final se expresó de forma idiomática en español y sin alterar el total numérico.
