  text: 'And these are the signs of the days that appear on the earth in the days of his dominion: heat and warmth and calm[a]; and all the trees bear fruit, and leaves come forth on all the trees, and the harvest of wheat, and the blossom of the rose, and every flower that comes forth in the field[f][e][d][c][b]; but the trees of winter dry up.'
  footnotes:
