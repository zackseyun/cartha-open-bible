translation:
  language: es
  text: 'Y estas son las señales de los días que aparecen sobre la tierra en los días de su dominio: calor y calidez y calma[a]; y todos los árboles dan fruto, y brotan hojas en todos los árboles, y la cosecha de trigo, y la flor de la rosa, y toda flor que sale en el campo[d][e][c][b][f]; pero los árboles del invierno se secan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «son mostradas sobre la tierra»; el verbo ge'ez tiene un sentido de mostrar/aparecer.
    reason: lexical_alternative
  - marker: b
    text: La expresión «en los días de su dominio» probablemente alude al período de gobierno del luminar en el contexto circundante, pero el versículo deja implícito el referente del pronombre.
    reason: cross_reference
  - marker: c
    text: El término vertido como «calma» es incierto; puede denotar una condición climática agradable o suave.
    reason: lexical_alternative
  - marker: d
    text: La palabra traducida «campo» en otros contextos puede significar desierto o campo abierto; aquí la imagen vegetal favorece «campo».
    reason: lexical_alternative
  - marker: e
    text: El nombre de planta vertido como «rosa» es una identificación tradicional y puede referirse de modo más amplio a una planta florida.
    reason: lexical_alternative
  - marker: f
    text: O «calor y tibieza».
    reason: previous_rendering
lexical_decisions:
- source_word: ትእምርተ
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - indicaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo designa marcadores visibles o indicios observables. En español, «señales» conserva bien ese valor de fenómeno reconocible que anuncia o marca estaciones y tiempos.
- source_word: መዋዕለ
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - tiempos
  - estaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque en contexto puede acercarse a períodos o estaciones, el valor literal es «días». Mantenerlo conserva la concreción temporal del enunciado.
- source_word: ያስተርእዩ
  english_pob_choice: appear
  chosen_spanish: aparecen
  alternatives_spanish:
  - son mostradas
  - se hacen visibles
  - se manifiestan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene un matiz de mostrar/ser visto. «Aparecen» reproduce el tono observacional sin forzar una pasiva poco natural en español.
- source_word: ስልጣኑ
  english_pob_choice: his dominion
  chosen_spanish: su dominio
  alternatives_spanish:
  - su autoridad
  - su gobierno
  - su señorío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede referirse a autoridad o gobierno. «Dominio» mantiene el registro elevado y la idea de una esfera regida por un poder ordenado.
- source_word: ሀፍ
  english_pob_choice: heat
  chosen_spanish: calor
  alternatives_spanish:
  - ardor
  - sudor
  - calidez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es una serie de signos climáticos favorables. «Calor» es la equivalencia natural y amplia para el primer término del par, sin cerrar de antemano la posible imagen concreta del ge'ez.
- source_word: ሞቅ
  english_pob_choice: warmth
  chosen_spanish: tibieza
  alternatives_spanish:
  - calor
  - templaza
  - calidez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se distingue del término anterior para no fusionar dos matices. «Tibieza» comunica una calidez suave o moderada, adecuada al contraste dentro de la lista climática.
- source_word: ዛሕን
  english_pob_choice: calm
  chosen_spanish: calma
  alternatives_spanish:
  - serenidad
  - buen tiempo
  - quietud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es algo incierto, pero apunta a una condición agradable y apacible. «Calma» es fiel y sobria en el contexto meteorológico.
- source_word: ዕፀው
  english_pob_choice: trees
  chosen_spanish: árboles
  alternatives_spanish:
  - plantas leñosas
  - árboles frutales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el equivalente directo y más natural en español para el conjunto de la descripción agrícola.
- source_word: ይፈርዩ
  english_pob_choice: bear fruit
  chosen_spanish: dan fruto
  alternatives_spanish:
  - fructifican
  - producen fruto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es idiomática en español y mantiene la concreción agrícola del verbo.
- source_word: ቈጽል
  english_pob_choice: leaves
  chosen_spanish: hojas
  alternatives_spanish:
  - follaje
  - hojarasca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es de crecimiento botánico sobre los árboles. «Hojas» es el equivalente directo y claro.
- source_word: ይወጽእ
  english_pob_choice: come forth
  chosen_spanish: brotan
  alternatives_spanish:
  - salen
  - emergen
  - aparecen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el movimiento es de aparición vegetal. «Brotan» suena natural en español y conserva la idea de surgimiento.
- source_word: ማእረረ ስርናይ
  english_pob_choice: the harvest of wheat
  chosen_spanish: la cosecha de trigo
  alternatives_spanish:
  - la mies de trigo
  - la recolección del trigo
  - la cosecha del trigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase apunta al resultado o producción del trigo. «Cosecha de trigo» comunica bien el momento y el producto agrícola sin añadir precisión innecesaria.
- source_word: ጽጌ ረዳ
  english_pob_choice: the blossom of the rose
  chosen_spanish: la flor de la rosa
  alternatives_spanish:
  - la floración de la rosa
  - el florecimiento de la rosa
  - la rosa en flor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La identificación tradicional es «rosa», aunque la especie exacta no sea segura. «La flor de la rosa» conserva la imagen poética sin forzar una determinación botánica mayor.
- source_word: ጽጌያት
  english_pob_choice: flower
  chosen_spanish: flor
  alternatives_spanish:
  - florecimiento
  - brote
  - floración
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural distributivo del contexto pide una forma general. «Toda flor» reproduce bien la amplitud de la expresión.
- source_word: ገዳም
  english_pob_choice: field
  chosen_spanish: campo
  alternatives_spanish:
  - campo abierto
  - campo silvestre
  - desierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque a veces puede significar desierto o campo abierto, aquí el contexto vegetal favorece «campo» como lugar donde salen las flores.
- source_word: ዕፀወ ክረምት
  english_pob_choice: the trees of winter
  chosen_spanish: los árboles del invierno
  alternatives_spanish:
  - los árboles de invierno
  - los árboles invernales
  - los árboles en invierno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción genitiva se mantiene literalmente para conservar el contraste estacional con la vegetación floreciente anterior.
- source_word: ይየብሱ
  english_pob_choice: dry up
  chosen_spanish: se secan
  alternatives_spanish:
  - se agostan
  - se secan del todo
  - se marchitan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa secarse o perder humedad. «Se secan» es claro y mantiene el contraste con el brotar y fructificar previos.
theological_decisions:
- issue: Referente de «su» en «en los días de su dominio»
  english_pob_reading: Retain the pronoun without specifying the referent.
  chosen_spanish_reading: Mantener el pronombre sin identificar el referente.
  alternative_spanish_readings:
  - en los días del dominio del sol
  - en los días del dominio de ese luminar
  - en ese período de gobierno
  rationale: El contexto inmediato del Libro Astronómico probablemente aclara el referente, pero este versículo por sí solo no obliga a nombrarlo. Conservar «su dominio» evita resolver prematuramente una referencia que el texto aquí deja implícita.
  doctrine_reference: Preservar la tensión interpretativa sin sobreexplicar.
translation_notes:
  revision_awareness: 'Tomé en cuenta la última revisión del audit trail: aunque una propuesta previa intentó «sudor y calor», la fase más reciente volvió a «heat and warmth» por mejor ajuste al contexto estacional. En español, mantuve esa decisión como «calor y tibieza», sin adoptar «sudor», porque el contexto inmediato describe signos climáticos y botánicos, no una lista de fluidos o imágenes corporales. También seguí la preferencia revisada por una formulación más sobria en la secuencia floral.'
  spanish_consistency_notes:
  - Conservo «Yahvé» solo cuando el texto original lo requiera explícitamente; aquí no aparece.
  - Uso «señales» y no «signos» porque el contexto astronómico-calendárico permite ambos, pero «señales» suena más natural en español bíblico moderno sin perder precisión.
  - Mantuve un orden paralelo para la lista de fenómenos, con coordinación repetida y ritmo acumulativo.
  - La puntuación con dos puntos introduce correctamente la enumeración de signos climáticos y botánicos.
  - Las notas emplean marcadores únicos en el orden solicitado y cada uno está anclado en el texto donde corresponde.
