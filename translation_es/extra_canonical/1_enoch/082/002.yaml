translation:
  language: es
  text: Sabiduría te he dado a ti[a], y a tus hijos, y a los que serán tus hijos, para que transmitan esta sabiduría, que está más allá de su entendimiento[b], a sus hijos a través de las generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase «y a los que serán tus hijos» refleja una lectura entre corchetes en el testimonio ge'ez suministrado y puede indicar descendientes futuros en sentido más amplio.
    reason: textual_variant
  - marker: b
    text: 'O: «por encima de su pensamiento». El ge''ez permite una imagen espacial que aquí expresa superioridad o trascendencia respecto del entendimiento humano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ጥበበ
  english_pob_choice: wisdom
  chosen_spanish: Sabiduría
  alternatives_spanish:
  - entendimiento
  - conocimiento
  - habilidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez denota sabiduría en sentido amplio. «Sabiduría» conserva el registro elevado y el contenido transmisible del pasaje mejor que opciones más técnicas o estrechas.
- source_word: ወሀብኩ
  english_pob_choice: I have given
  chosen_spanish: te he dado
  alternatives_spanish:
  - te di
  - te he entregado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto ge'ez puede reflejar una acción pasada con relevancia presente. En español, «te he dado» comunica bien esa vigencia sin sonar rígido.
- source_word: ወለውሉድከ
  english_pob_choice: and to your children
  chosen_spanish: y a tus hijos
  alternatives_spanish:
  - y a tu descendencia
  - y a tus vástagos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hijos» reproduce de forma natural el plural de descendencia en un registro bíblico claro y no masculino exclusivo, manteniendo la transmisión generacional.
- source_word: '[ወለእለ፡ ይከውኑ፡ ለከ፡ ውሉደ፡]'
  english_pob_choice: and to those who shall be your children
  chosen_spanish: y a los que serán tus hijos
  alternatives_spanish:
  - y a los que llegarán a ser tus hijos
  - y a tus futuros descendientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase entre corchetes parece una lectura textual incierta que alude a descendientes futuros. Se conserva la idea de posteridad venidera sin forzar una paráfrasis excesiva.
- source_word: ከመ፡ የሀቡ፡
  english_pob_choice: so that they may give
  chosen_spanish: para que entreguen
  alternatives_spanish:
  - para que den
  - a fin de que transmitan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto, el verbo expresa pasar algo recibido a la siguiente generación. «Entreguen» mantiene el sentido de transmisión fiel mejor que un simple «den».
- source_word: ለዛ፡ ጥበብ
  english_pob_choice: this wisdom
  chosen_spanish: esta sabiduría
  alternatives_spanish:
  - esa sabiduría
  - la sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo ge'ez requiere una referencia cercana y específica. «Esta sabiduría» respeta la deixis del original y sugiere el contenido concreto del don.
- source_word: ዲበ፡ ሕሊናሆሙ
  english_pob_choice: beyond their understanding
  chosen_spanish: más allá de su entendimiento
  alternatives_spanish:
  - por encima de su pensamiento
  - sobre su entendimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige una lectura demasiado literal de «upon their thought» y entiende ዲበ como «más allá de / por encima de». «Entendimiento» es la forma española más natural y fiel para ሕሊና en este contexto.
theological_decisions:
- issue: Naturaleza de la sabiduría transmitida
  english_pob_reading: The verse speaks of wisdom as a divinely given body of understanding to be handed down across descendants, not merely generic intelligence.
  chosen_spanish_reading: El verso habla de una sabiduría dada por Dios que debe transmitirse de generación en generación, no de mera inteligencia humana.
  alternative_spanish_readings:
  - conocimiento práctico
  - instrucción astronómica específica
  rationale: El texto ge'ez usa un término amplio; el contexto literario sugiere un saber revelado, pero el verso no lo restringe explícitamente. La traducción conserva esa amplitud y deja que el contexto precise el contenido.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla; primacía del original sobre una tradición explicativa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que corrige el arranque sin conjunción, rechaza una traducción hiperliteral de ዲበ y prefiere «beyond their understanding». La versión española sigue esa adjudicación, evitando «y» inicial y usando una fórmula natural para la trascendencia del saber.
  spanish_consistency_notes:
  - Se usa «sabiduría» de manera consistente para ጥበበ, conforme al valor léxico principal del término.
  - Se mantiene «entendimiento» para ሕሊና, porque en español expresa bien la facultad mental aludida sin introducir una lectura excesivamente abstracta.
  - Se conserva el tono de transmisión intergeneracional con «hijos» y «generaciones», en paralelo al inglés auditado y al sentido del ge'ez.
