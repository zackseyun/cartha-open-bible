  to: Sabiduría te he dado a ti[a], y a tus hijos, y a los que serán tus hijos, para que transmitan esta sabiduría, que está más allá de su entendimiento[b], a sus hijos a través de las generaciones.
  rationale: Se sustituye «entreguen» por «transmitan» para expresar con más precisión la transferencia de sabiduría entre generaciones, y «a lo largo de las generaciones» por «a través de las generaciones» para reflejar mejor la continuidad sucesiva del original y del inglés POB auditado. El resto del borrador es fiel y natural, por lo que solo requiere ajuste menor.
