    rationale: Aunque «heads» se preservó en inglés por cautela metafórica, en español «los trescientos sesenta y cuatro cabezas de millares» suena gramatical y estilísticamente deficiente. «Jefes de millares» comunica el título administrativo sin perder el matiz jerárquico del original.
