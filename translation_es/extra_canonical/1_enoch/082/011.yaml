translation:
  language: es
  text: Y sus cuatro líderes entran primero, los que dividen las cuatro partes del año[a]; y después de ellos, los doce líderes de los órdenes, los que dividen los meses; y los trescientos sesenta y cuatro jefes de millares[b], los que distinguen los días[c]; y los cuatro que se añaden con ellos, los que distinguen a los líderes de las cuatro divisiones del año[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los cuatro períodos del año». El ge''ez dice literalmente «cuatro partes/divisiones del año».'
    reason: lexical_alternative
  - marker: b
    text: El número «trescientos sesenta y cuatro» refleja el calendario esquemático de 364 días usado en el Libro Astronómico.
    reason: cultural_note
  - marker: c
    text: «Distinguen» también puede entenderse como «marcan» o «determinan» los días.
    reason: lexical_alternative
  - marker: d
    text: 'O: «los que distinguen las cuatro divisiones del año». El ajuste refleja la relación sintáctica del pasaje revisado.'
    reason: alternative_reading
lexical_decisions:
- source_word: መራሕያኒሆሙ
  english_pob_choice: their leaders
  chosen_spanish: sus líderes
  alternatives_spanish:
  - sus guías
  - sus jefes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo posesivo plural -homu pide un posesivo explícito en español. "Líderes" conserva la función jerárquica del pasaje y evita precisar más de lo que el texto dice.
- source_word: ይበውኡ
  english_pob_choice: enter
  chosen_spanish: entran
  alternatives_spanish:
  - ingresan
  - vienen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Entran" reproduce bien la secuencia formal de ingreso ordenado. En español suena natural y mantiene el valor procesional del verbo.'
- source_word: ቀዳሚ
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - antes que los demás
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca prioridad de orden en la serie; "primero" es directo y adecuado en la enumeración.
- source_word: ይሌልዩ / ይፈልጥዎሙ
  english_pob_choice: divide / distinguish
  chosen_spanish: dividen / distinguen
  alternatives_spanish:
  - separan / determinan
  - apartan / señalan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El campo semántico apunta a partición calendárica y a delimitación de días. "Dividen" conserva la imagen estructural; "distinguen" mantiene la función de delimitar o marcar sin resolverla hacia una sola paráfrasis.
- source_word: ክፍለ ዓመት
  english_pob_choice: parts of the year
  chosen_spanish: partes del año
  alternatives_spanish:
  - divisiones del año
  - cuartos del año
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase etiópica dice literalmente partes/divisiones del año. "Partes del año" es fiel y claro; evito "cuartos" en el cuerpo por posible restricción idiomática.
- source_word: ዘሥርዓታት
  english_pob_choice: of the orders
  chosen_spanish: de los órdenes
  alternatives_spanish:
  - de los arreglos
  - de los cursos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Órdenes" preserva la idea de disposición regulada y el tono casi técnico del calendario astronómico. Se mantiene el plural por fidelidad al sintagma.'
- source_word: ፲፻ወ፷፬ አርእስት
  english_pob_choice: the three hundred and sixty-four heads
  chosen_spanish: los trescientos sesenta y cuatro cabezas de millares
  alternatives_spanish:
  - los 364 jefes de millares
  - los 364 cabezas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto ge'ez incluye 1000 junto a "cabezas", formando un título administrativo del tipo "cabezas de millares". En español, "cabezas" conserva el sustantivo base y "de millares" refleja el elemento numeral sin inventar una categoría ajena al texto.
- source_word: ይፈልጥዎሙ ለመዋዕል
  english_pob_choice: distinguish the days
  chosen_spanish: distinguen los días
  alternatives_spanish:
  - señalan los días
  - determinan los días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Distinguen" mantiene la función de marcar o delimitar los días dentro del sistema calendárico, sin perder la fuerza clasificatoria del verbo.'
- source_word: ይትዌሰኩ ምስሌሆሙ
  english_pob_choice: are added with them
  chosen_spanish: se añaden con ellos
  alternatives_spanish:
  - se juntan con ellos
  - se agregan con ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión indica un grupo suplementario relacionado con los anteriores. "Se añaden con ellos" conserva esa idea de adición y asociación.
- source_word: ፬ መክፈልተ ዓመታት
  english_pob_choice: the four divisions of the years
  chosen_spanish: las cuatro divisiones del año
  alternatives_spanish:
  - las cuatro partes del año
  - las cuatro divisiones de los años
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez usa una construcción plural que, en español, queda más natural como singular genérico "del año". Se conserva la noción de partición cuádruple.
theological_decisions:
- issue: Identidad ontológica de las figuras celestes
  english_pob_reading: Render them as 'leaders,' 'heads,' and ordered functionaries without identifying them more specifically as angels in the main text.
  chosen_spanish_reading: Se los traduce como líderes, cabezas y funcionarios ordenados sin identificarlos más específicamente como ángeles en el texto principal.
  alternative_spanish_readings:
  - ángeles
  - seres celestiales
  - divisiones calendáricas abstractas
  rationale: El versículo describe una jerarquía cósmico-calendárica, pero no nombra explícitamente a estos seres como ángeles en esta línea. Mantener la terminología administrativa preserva la tensión interpretativa del pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
- issue: Lectura del último relativo sobre los cuatro añadidos
  english_pob_reading: those who distinguish the leaders of the four divisions of the year
  chosen_spanish_reading: los que distinguen a los líderes de las cuatro divisiones del año
  alternative_spanish_readings:
  - los que distinguen las cuatro divisiones del año
  - los que distinguen a los cuatro líderes de las divisiones del año
  rationale: La revisión más reciente del inglés deja claro que el relativo final no llama a los cuatro añadidos "los líderes", sino que dice que distinguen a los líderes de las cuatro divisiones. La española debe conservar esa relación sintáctica.
  doctrine_reference: Mantener la referencia relacional del original sin reinterpretarla appositivamente.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente: conserva el posesivo en «sus líderes», incorpora la idea de «cabezas de millares», y mantiene en el último relativo la relación explícita con «los líderes de las cuatro divisiones del año» en lugar de una apposición simplificadora.'
  spanish_consistency_notes:
  - Se mantuvo «líderes» para መራሕያን por consistencia con el audit trail inglés y para no resolver innecesariamente la identidad de las figuras.
  - Se preservó la terminología calendárica («partes», «meses», «días», «divisiones») para reflejar la estructura del texto.
  - Se evitó usar «SEÑOR» o equivalentes de ocultamiento, porque el pasaje no trata del tetragrámaton ni requiere ese recurso.
