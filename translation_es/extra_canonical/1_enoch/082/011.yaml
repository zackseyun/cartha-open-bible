base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/082/011.yaml
  text: And their four leaders enter first[a], those who divide the four parts of the year; and after them the twelve leaders of the orders, those who divide the months; and the three hundred and sixty-four heads of thousands, those who distinguish the days; and the four that are added with them[f][e][d][c][b], those who distinguish the leaders of the four divisions of the year.
  footnotes:
  - marker: a
    text: Or 'quarters of the year.' The Ge'ez literally says 'four parts/divisions of the year.'
    reason: lexical_alternative
  - marker: b
    text: The number 'three hundred and sixty-four' reflects the schematic 364-day calendar used in the Astronomical Book.
    reason: cultural_note
  - marker: c
    text: The phrase 'distinguish the days' may also be understood as 'mark out' or 'determine' the days.
    reason: lexical_alternative
  - marker: d
    text: Or 'And the four leaders enter first'.
    reason: previous_rendering
  - marker: e
    text: Or 'and the three hundred and sixty-four heads, the ones who distinguish the days'.
    reason: previous_rendering
  - marker: f
    text: Or 'those that distinguish the four divisions of the years'.
    reason: previous_rendering
