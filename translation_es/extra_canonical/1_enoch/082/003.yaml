translation:
  language: es
  text: Y aquellos que entienden no dormirán, sino que escucharán con sus oídos[a] para aprender esta sabiduría; y será más dulce para ellos que el buen alimento para los que comen.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión 'con sus oídos' conserva el giro corporal del original, que enfatiza una escucha atenta y receptiva.
    reason: lexical_alternative
  - marker: b
    text: La imagen compara la recepción de la sabiduría con el placer de comer buen alimento; también puede entenderse 'más agradable para ellos que el buen alimento para quienes comen'.
    reason: cultural_note
lexical_decisions:
- source_word: ኢይነውሙ
  english_pob_choice: shall not sleep
  chosen_spanish: no dormirán
  alternatives_spanish:
  - no se dormirán
  - no dormirán ni se adormecerán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la imagen concreta de sueño/inactividad mental del original sin explicarla en exceso. En español, 'no dormirán' funciona de manera natural y mantiene el valor metafórico de vigilancia receptiva.
- source_word: እለ ይሌብዉ
  english_pob_choice: those who understand
  chosen_spanish: aquellos que entienden
  alternatives_spanish:
  - los que comprenden
  - los discernientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase destaca la capacidad cognitiva de los receptores. 'Aquellos que entienden' es claro, sobrio y preserva el matiz intelectual del participio.
- source_word: ይጸምኡ በእዝናሆሙ
  english_pob_choice: be sluggish in their ears / listen with their ears
  chosen_spanish: escucharán con sus oídos
  alternatives_spanish:
  - tendrán oídos atentos
  - oirán con atención
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión audit trail corrige la lectura negativa: el verbo expresa una acción positiva de oír/escuchar con atención. El español retiene la imagen corporal (''con sus oídos'') y evita una paráfrasis que borre el giro idiomático.'
- source_word: ከመ ይትመሀርዋ
  english_pob_choice: so as to learn
  chosen_spanish: para aprender
  alternatives_spanish:
  - a fin de aprenderlo
  - para que lo aprendan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor de finalidad se expresa con naturalidad en español con 'para'. 'Aprender' mantiene la orientación a recibir instrucción sin añadir inferencias.
- source_word: ለዛ ጥበብ
  english_pob_choice: this wisdom
  chosen_spanish: esta sabiduría
  alternatives_spanish:
  - esa sabiduría
  - tal sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo apunta a la instrucción recién dada. 'Esta sabiduría' conserva la deixis y suena natural en español bíblico contemporáneo.
- source_word: ደለወ / ትደልዎሙ
  english_pob_choice: it will be more pleasing to them
  chosen_spanish: les será más agradable
  alternatives_spanish:
  - les será más placentero
  - les resultará más grato
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La auditoría corrige 'sweet' por 'pleasant/agreeable'. En español, 'más agradable' reproduce con precisión la comparación de agrado y evita introducir la idea de dulzura gustativa que el verbo no exige.
- source_word: እመበልዕት ሠናያት
  english_pob_choice: than good food
  chosen_spanish: que el buen alimento
  alternatives_spanish:
  - que los buenos alimentos
  - que la buena comida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el campo semántico alimentario y la comparación concreta. 'Buen alimento' es más elevado y estable que 'buena comida', y encaja con el tono sapiencial/apocalíptico.
- source_word: ለእለ ይበልዑ
  english_pob_choice: for those who eat it / to those who eat
  chosen_spanish: para los que comen
  alternatives_spanish:
  - para los que lo comen
  - para quienes comen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El original compara el agrado del alimento para quienes comen. En español, 'para los que comen' conserva la estructura comparativa y evita añadir un objeto no explícito.
theological_decisions:
- issue: Imagen de vigilancia auditiva y receptividad a la sabiduría revelada
  english_pob_reading: Retain the imagery of not sleeping and listening with the ears as a call to attentive reception of revealed wisdom.
  chosen_spanish_reading: Mantener la imagen de no dormir y escuchar con los oídos como una llamada a recibir con atención la sabiduría revelada.
  alternative_spanish_readings:
  - 'Parafrasear: ''los sabios se mantendrán alerta y escucharán'''
  - '''no cerrarán sus oídos'''
  rationale: La literatura apocalíptico-sapiencial usa metáforas corporales para la recepción de revelación. El español conserva esa textura sin diluirla en exhortación genérica.
  doctrine_reference: 'Translation philosophy: preserve imagery; do not flatten apocalyptic prose.'
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que corrige la lectura negativa del verbo auditivo y la que reemplaza 'más dulce' por 'más agradable'. El español final conserva la metáfora concreta de dormir/escuchar y la comparación con alimento sin forzar dulzura literal.
  spanish_consistency_notes:
  - Se prefirió 'oídos' y 'escuchar' para reflejar la imagen física del texto ge'ez.
  - Se evitó 'Cristo', 'SEÑOR' y otras sustituciones no presentes en este versículo.
  - La comparación final se resolvió con 'más agradable' en coherencia con el valor revisado del verbo ge'ez.
  - El tono es bíblico contemporáneo, no arcaizante, pero conserva la sobriedad propia del pasaje.
