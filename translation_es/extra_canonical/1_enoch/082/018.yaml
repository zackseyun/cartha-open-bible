translation:
  language: es
  text: El segundo líder después de él es Helemmelek[a][b][c], cuyo nombre llaman el Sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La fórmula de nombramiento es más literal: «cuyo nombre llaman el Sol». En español también podría suavizarse como «a quien llaman el Sol».'
    reason: lexical_alternative
  - marker: b
    text: La transliteración del nombre propio se conserva a partir del ge'ez, pero su vocalización exacta no es completamente segura.
    reason: source_note
  - marker: c
    text: 'Otra posibilidad de puntuación y enlace sería: «Helemmelek, cuyo nombre llaman el Sol».'
    reason: alternative_reading
lexical_decisions:
- source_word: ካልእ
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - otro
  - uno segundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En la lista de líderes celestes, el valor ordinal es claro; «el segundo» conserva el orden secuencial sin añadir matices que el fuente no exige.
- source_word: መራሒ
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - guía
  - jefe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Líder» expresa de manera natural en español la función de conducción u आदेश sobre la secuencia celeste, y mantiene la neutralidad semántica del término.
- source_word: ዘድኅሬሁ
  english_pob_choice: after him
  chosen_spanish: después de él
  alternatives_spanish:
  - tras él
  - siguiéndolo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica sucesión en una serie; «después de él» es idiomático y transparente en español.
- source_word: ሄልእምሜሌክ
  english_pob_choice: Helemmelek
  chosen_spanish: Helemmelek
  alternatives_spanish:
  - Helemmelek
  - Helimmelik
  lexicon: —
  rationale: Se conserva la transliteración del nombre propio, siguiendo la práctica del POB. La forma «Helemmelek» coincide con la revisión aducida en el expediente y evita introducir una vocalización no sustentada.
- source_word: ዘይጼውዕዎ ስሞ
  english_pob_choice: whose name they call
  chosen_spanish: a quien llaman
  alternatives_spanish:
  - cuyo nombre llaman
  - a quien llaman por nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez es activo plural con objeto masculino singular; en español, «a quien llaman» preserva mejor esa sintaxis que una pasiva, y evita forzar una fórmula menos natural.
- source_word: ፀሐየ
  english_pob_choice: the Sun
  chosen_spanish: el Sol
  alternatives_spanish:
  - Sol
  - el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, el nombre celeste funciona con naturalidad como designación con artículo; se mantiene la referencia a un astro nombrado sin importar una personificación teológica ajena al contexto.
theological_decisions:
- issue: Tratamiento del Sol como designación nominal en un catálogo apocalíptico
  english_pob_reading: the Sun
  chosen_spanish_reading: el Sol
  alternative_spanish_readings:
  - sol
  - el sol
  rationale: La escena enumera líderes/luminares en un orden cósmico. «El Sol» conserva el carácter casi titular del astro nombrado, sin convertirlo en un símbolo doctrinal ni rebajar la frase a un sustantivo genérico.
  doctrine_reference: Preservar la imaginería apocalíptica y la taxonomía cósmica del texto.
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del expediente: la forma del nombre se estandariza como Helemmelek, y la sintaxis del verbo refleja el activo plural del ge''ez («llaman») en lugar de una pasiva. También se evita la vocalización errónea señalada en el borrador anterior.'
  spanish_consistency_notes:
  - Se mantiene «líder» para መራሒ, coherente con el tratamiento del listado astronómico.
  - Se traduce ፀሐየ como «el Sol» para conservar el carácter nominal del astro nombrado.
  - La fórmula «a quien llaman» refleja con transparencia la sintaxis activa del original.
  - Se preserva la transliteración del nombre propio sin castellanizarlo.
