    rationale: El expediente inglés marcó explícitamente que la fórmula literal 'whose name ...' debía preservarse por transparencia. 'A quien llaman el Sol' comunica el sentido general, pero colapsa un rasgo formal del original.
  - severity: medium
    issue: La nota c no corresponde con la alternativa documentada en el POB inglés.
    rationale: La alternativa inglesa era del tipo 'Helemmelek, whose name is called / they call ...', no simplemente la misma lectura española con un desplazamiento de coma. Conviene ofrecer una alternativa española real y pertinente.
  - severity: low
    issue: La nota a explica la voz activa, pero no aclara que la revisión principal en español ahora preserva también la fórmula nominal.
    rationale: Si se corrige el texto principal, la nota debe describir con precisión la elección y la alternativa más fluida.
