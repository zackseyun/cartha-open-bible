  language: en
  yaml_path: translation/extra_canonical/1_enoch/082/006.yaml
  text: 'For they belong to the reckoning of the year[a], and they are truly fixed forever: one in the first gate, one in the third gate, one in the fourth, and one in the sixth[b]; and the year is completed in three hundred and sixty-four days.'
  footnotes:
  - marker: a
    text: The repeated 'one ... one ... one ... one' refers to the four additional days distributed among the solar quarters in the Enochic 364-day calendar.
    reason: cultural_note
  - marker: b
    text: The OCR line appears to omit 'gate' after 'fourth' and 'sixth,' but the sequence strongly implies the same noun throughout.
    reason: textual_variant
