translation:
  language: es
  text: 'Porque pertenecen al cómputo del año[a], y en verdad están fijados para siempre: uno en la primera puerta, uno en la tercera puerta, uno en la cuarta puerta y uno en la sexta puerta[b]; y el año se completa en trescientos sesenta y cuatro días.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las cuatro apariciones de «uno» son distributivas y aluden a los cuatro días adicionales repartidos entre los cuartos solares en el calendario enoquiano de 364 días.
    reason: cultural_note
  - marker: b
    text: El texto etíope parece omitir «puerta» después de «cuarta» y «sexta», pero la serie de la lista sugiere el mismo sustantivo en todas las cláusulas.
    reason: textual_variant
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce la razón de la afirmación anterior. En español, «Porque» expresa bien el valor causal/explanatorio sin sonar forzado.
- source_word: ሀለዉ
  english_pob_choice: they belong
  chosen_spanish: pertenecen
  alternatives_spanish:
  - están incluidos
  - forman parte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido aquí no es mera existencia, sino inclusión en el cálculo anual. «Pertenecen» conserva esa idea de pertenencia dentro del sistema calendárico.
- source_word: በሐሳበ፡ ዓመት
  english_pob_choice: to the reckoning of the year
  chosen_spanish: al cómputo del año
  alternatives_spanish:
  - al cálculo del año
  - a la cuenta del año
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cómputo» es natural en español para un registro calendárico técnico y mantiene la idea de reckoning/calculation.
- source_word: ወአማን
  english_pob_choice: and they are truly
  chosen_spanish: y en verdad
  alternatives_spanish:
  - y ciertamente
  - e indudablemente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la fuerza enfática sin sobrecargar la frase. «En verdad» refleja la afirmación enfática del texto.
- source_word: ልኩዓን
  english_pob_choice: fixed
  chosen_spanish: fijados
  alternatives_spanish:
  - establecidos
  - puestos en orden
  - determinados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Fijados» sigue de cerca la revisión inglesa que optó por «fixed» y comunica estabilidad/establecimiento del orden calendárico.
- source_word: እሙንቱ፡ ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para toda la eternidad
  - por siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa permanencia duradera de forma clara y digna en español.
- source_word: አሐቲ
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - una
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición distributiva requiere mantener la numeración simple en español para reflejar la estructura del original.
- source_word: በቀዳሚት፡ ኆኅት
  english_pob_choice: in the first gate
  chosen_spanish: en la primera puerta
  alternatives_spanish:
  - en la primera puerta/portón
  - por la primera puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Puerta» corresponde a la imagen del texto y es más natural que un calco demasiado técnico. Se conserva la secuencia de puertas del esquema astronómico.
- source_word: በሣልስት፡ ኆኅት
  english_pob_choice: in the third gate
  chosen_spanish: en la tercera puerta
  alternatives_spanish:
  - en la tercera puerta/portón
  - por la tercera puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la serie distributiva y la terminología uniforme de la imagen.
- source_word: በራብዕት
  english_pob_choice: in the fourth
  chosen_spanish: en la cuarta puerta
  alternatives_spanish:
  - en la cuarta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia implica el mismo sustantivo aunque el OCR lo omita en esa línea. En español se completa para preservar claridad y coherencia con la serie.
- source_word: በሳድስት
  english_pob_choice: in the sixth
  chosen_spanish: en la sexta puerta
  alternatives_spanish:
  - en la sexta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Igual que en la cláusula anterior, se completa el sustantivo implícito para hacer visible la serie completa de puertas.
- source_word: ወይትፌጸም፡ ዓመተ፡ መዋዕል
  english_pob_choice: and the year is completed
  chosen_spanish: y el año se completa
  alternatives_spanish:
  - y el año llega a su término
  - y el ciclo anual se completa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el sentido de culminación del ciclo anual sin añadir interpretación extra.
- source_word: ፫፻ወ፷ወረቡዕ
  english_pob_choice: three hundred and sixty-four days
  chosen_spanish: trescientos sesenta y cuatro días
  alternatives_spanish:
  - 364 días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se escribe con palabras para un tono formal y para resaltar la precisión del calendario en el texto.
theological_decisions:
- issue: Valor del calendario de 364 días
  english_pob_reading: The verse asserts a fixed, enduring calendrical order in creation rather than merely a temporary observational pattern.
  chosen_spanish_reading: El versículo presenta un orden calendárico fijo y duradero, no solo una observación ocasional.
  alternative_spanish_readings:
  - Una simple nota astronómica descriptiva
  - Una glosa esquemática sin peso teológico
  rationale: La combinación de «en verdad», «fijados para siempre» y la conclusión numérica sostiene un orden estable del cosmos en la lógica del libro. La traducción debe conservar ese peso, no neutralizarlo.
  doctrine_reference: Preservar el imaginario apocalíptico y su afirmación de orden creado sin domesticarlo a prosa genérica.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «appointed» por «fixed» y completó «gate» en las cláusulas de «fourth» y «sixth». La redacción española sigue esa revisión al preferir «fijados» y al repetir «puerta» en toda la serie para conservar la coherencia del esquema.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda a יהוה; este versículo no lo contiene.
  - Se mantiene el registro técnico/calendárico con léxico claro y formal.
  - Se conserva la repetición distributiva de «uno» y de «puerta» para reflejar la estructura del original.
  - No se introducen términos eclesiásticos tradicionales que no estén respaldados por el texto fuente.
