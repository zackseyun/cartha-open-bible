translation:
  language: es
  text: Y ahora, hijo mío Matusalén, te digo todas estas cosas, y las escribo para ti, y todas te las he revelado, y te he dado sus libros[a] acerca de todas estas cosas. Guarda, hijo mío, el libro de la mano de tu padre[b][c], para que lo entregues a las generaciones del mundo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los escritos acerca de todas estas cosas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el libro de la mano de tu padre», un modismo para un libro transmitido directamente por el padre.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y dalo».'
    reason: previous_rendering
  - marker: d
    text: La frase final también puede entenderse como «a todas las generaciones para siempre» o «a las generaciones de la eternidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora pues
  - Y ahora mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula de transición discursiva; «Y ahora» conserva el cambio exhortativo sin sonar forzado en español.
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - oh hijo mío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Vocativo posesivo. «Hijo mío» es natural y mantiene el tono paternal del pasaje.
- source_word: ማቱሳላ
  english_pob_choice: Methuselah
  chosen_spanish: Matusalén
  alternatives_spanish:
  - Mathusala
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Nombre propio con transliteración española estándar y reconocible.
- source_word: ኵሎሙ፡ እሉንተ
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la totalidad de los contenidos revelados de manera idiomática en español.
- source_word: ለከ፡ እነግር
  english_pob_choice: I tell you
  chosen_spanish: te digo
  alternatives_spanish:
  - te declaro
  - te cuento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo directo de habla en primera persona; «te digo» es claro y fiel al registro exhortativo.
- source_word: ወእጽሕፍ፡ ለከ
  english_pob_choice: and I write them down for you
  chosen_spanish: y las escribo para ti
  alternatives_spanish:
  - y las escribo por ti
  - y te las escribo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo es «escribir»; en español, el complemento «para ti» comunica la destinación sin añadir contenido no atestiguado.
- source_word: ወኵሎሙ፡ ከሠትኩ፡ ለከ
  english_pob_choice: and I have revealed them all to you
  chosen_spanish: y todas te las he revelado
  alternatives_spanish:
  - y todas te las he mostrado
  - y todas te las he dado a conocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Revelado» preserva el matiz apocalíptico de hacer visible o conocer lo oculto.
- source_word: ወወሀብኩከ፡ መጻሕፍቲሆሙ፡ ለእሉ፡ ኵሎሙ
  english_pob_choice: and I have given you their books concerning all these things
  chosen_spanish: y te he dado sus libros
  alternatives_spanish:
  - y te he dado los libros de ellos
  - y te he dado los escritos de ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma posesiva del ge'ez pide un español con posesivo explícito. Se mantiene «sus libros» para no expandir indebidamente la relación genitiva.
- source_word: ዕቀብ
  english_pob_choice: Keep
  chosen_spanish: Guarda
  alternatives_spanish:
  - Preserva
  - Custodia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperativo de conservar y velar por un texto sagrado; «guarda» es natural y puede implicar custodia fiel.
- source_word: መጽሐፈ፡ እዴሁ፡ ለአቡከ
  english_pob_choice: the book from the hand of your father
  chosen_spanish: el libro de la mano de tu padre
  alternatives_spanish:
  - el libro de tu padre
  - el libro de la mano paterna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen literal de transmisión. En español, «de la mano de» mantiene el valor idiomático sin borrar el gesto de entrega paterna.
- source_word: ወከመ፡ ትሀብ፡ ለትውልደ፡ ዓለም
  english_pob_choice: so that you may give it to the generations of the world
  chosen_spanish: para que se lo entregues a las generaciones del mundo
  alternatives_spanish:
  - para que lo des a las generaciones del mundo
  - para que lo transmitas a las generaciones del mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción final indica propósito. «Se lo entregues» refleja mejor el objeto ya mencionado, y «entregar» conserva la idea de transmisión fiel.
theological_decisions:
- issue: Alcance de la transmisión final
  english_pob_reading: to the generations of the world
  chosen_spanish_reading: a las generaciones del mundo
  alternative_spanish_readings:
  - a todas las generaciones para siempre
  - a las generaciones de la eternidad
  rationale: Se conserva la expresión amplia y deliberadamente ambigua del ge'ez, sin resolverla en una mera fórmula temporal ni en una universalización interpretativa.
  doctrine_reference: Preservar la tensión textual sin sobreinterpretar.
- issue: Naturaleza de la revelación y la escritura
  english_pob_reading: I write them down for you / I have revealed them all to you
  chosen_spanish_reading: las escribo para ti / todas te las he revelado
  alternative_spanish_readings:
  - las pongo por escrito para ti / todas te las he mostrado
  rationale: El texto presenta transmisión oral y escrita de conocimientos revelados; el español mantiene ambas capas sin fusionarlas.
  doctrine_reference: Retener la doble mediación oral-escrita del testimonio.
translation_notes:
  revision_awareness: La sintaxis final del ge'ez usa ወከመ + subjuntivo, por lo que el cierre debe expresar propósito («para que...») y no una coordinación simple. También se atendió al posesivo de መጻሕፍቲሆሙ, manteniendo «sus libros»/«sus escritos» como alternativa semántica, y a la cláusula final amplia sobre ለትውልደ፡ ዓለም sin cerrarla interpretativamente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no aparece.
  - «Matusalén» sigue la transliteración española usual para el nombre propio.
  - «Guarda» conserva el matiz de custodiar un escrito sagrado.
  - La elección de «el libro de la mano de tu padre» mantiene la imagen de transmisión directa presente en el texto fuente.
  - Se evita forzar «para siempre» en la cláusula final, porque el ge'ez permite tanto un valor de generaciones mundanas como duraderas.
