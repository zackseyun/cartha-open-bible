translation:
  language: es
  text: 'Y estos son las cabezas[b] de un millar[e]: entre líder y líder[a][d], seis se añaden después de la estación; y sus líderes hacen la distinción[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto etiópico de este versículo es difícil en lo textual y sintáctico. Parece describir divisiones técnicas dentro del esquema luminar, quizá con unidades suplementarias añadidas después de una estación fija.
    reason: textual_variant
  - marker: b
    text: O «jefes de un millar» / «líderes de un millar». La relación de «cabezas» con «un millar» no es del todo clara.
    reason: lexical_alternative
  - marker: c
    text: O «sus guías los distinguen» / «sus líderes los disciernen».
    reason: lexical_alternative
  - marker: d
    text: 'Traducción anterior: «en medio de los líderes, y líder después de líder».'
    reason: previous_rendering
  - marker: e
    text: O «cabezas de un millar».
    reason: previous_rendering
lexical_decisions:
- source_word: እሙንቱ
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - aquellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo plural introduce los elementos de la enumeración; "estos" conserva la referencia inmediata y el tono explicativo.
- source_word: አርእስት
  english_pob_choice: heads
  chosen_spanish: cabezas
  alternatives_spanish:
  - jefes
  - líderes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma literal "cabezas" preserva el valor técnico y algo opaco del término, como en el inglés POB, sin resolverlo prematuramente como un título administrativo más interpretativo.
- source_word: ፲፻
  english_pob_choice: the thousand
  chosen_spanish: un millar
  alternatives_spanish:
  - el millar
  - mil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El Ge'ez no exige artículo definido; "un millar" refleja mejor el valor numérico sustantivado y evita imponer una definitud no marcada en el original.
- source_word: ማእከለ
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - dentro de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indica la idiomática construcción "between leader and leader"; en español "entre" reproduce esa relación distributiva con naturalidad.
- source_word: መራኂ
  english_pob_choice: leaders
  chosen_spanish: líder
  alternatives_spanish:
  - guía
  - conductor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene "líder" para conservar el paralelo repetido del sintagma "líder y líder" y la estructura técnica del pasaje.
- source_word: ይትዌሰኩ፡ ፮
  english_pob_choice: six are added
  chosen_spanish: seis se añaden
  alternatives_spanish:
  - seis son insertados
  - seis se agregan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La voz pasiva/reflexiva del verbo pide una forma impersonal en español. "Se añaden" conserva la idea de adición sin explicitar más de lo que el texto permite.
- source_word: በድኅረ ምቅዋም
  english_pob_choice: after the station
  chosen_spanish: después de la estación
  alternatives_spanish:
  - después del puesto
  - tras la posición fija
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Estación" mantiene el carácter técnico-astronómico y el sentido de posición fija, conforme a la decisión inglesa de no paraphrasear el esquema.'
- source_word: መራሕያኒሆሙ
  english_pob_choice: their leaders
  chosen_spanish: sus líderes
  alternatives_spanish:
  - sus guías
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la raíz de liderazgo de manera consistente con el vocabulario previo del verso y con el paralelismo interno.
- source_word: ይፈልጡ
  english_pob_choice: make the distinction
  chosen_spanish: hacen la distinción
  alternatives_spanish:
  - los distinguen
  - marcan la distinción
  - los separan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Hacen la distinción" mantiene la abstracción técnica y evita cargar el verbo con una explicación interpretativa más fuerte que la del texto base.'
theological_decisions:
- issue: Grado de explicitación del esquema astronómico/calendárico
  english_pob_reading: Retain the technical and somewhat opaque wording about heads, leaders, addition, and distinction.
  chosen_spanish_reading: Conservar el lenguaje técnico y algo opaco sobre cabezas, líderes, adición y distinción.
  alternative_spanish_readings:
  - Parafrasear como una explicación de divisiones calendáricas adicionales
  - Aclarar el pasaje como unidades intercaladas del año
  rationale: La sintaxis ge'ez es difícil y el contexto del Libro Astronómico usa lenguaje esquemático. La traducción española preserva esa opacidad en vez de importar una explicación doctrinal o comentarial que el verso no formula explícitamente.
  doctrine_reference: Translation philosophy §1, §3; guidance on preserving apocalyptic/technical imagery
- issue: Relación de "cabezas" con "un millar"
  english_pob_reading: Or 'chiefs of the thousand' / 'leaders of the thousand.' The relation of 'heads' to 'the thousand' is not fully clear.
  chosen_spanish_reading: Mantener "cabezas de un millar" sin resolverlo como título administrativo cerrado.
  alternative_spanish_readings:
  - jefes de un millar
  - líderes de un millar
  rationale: El español puede sonar más natural con "jefes" o "líderes", pero la forma literal conserva la tensión lexical documentada y deja abierta la relación exacta entre el sustantivo y el numeral.
  doctrine_reference: POB lexical policy on preserving documented tensions and avoiding premature harmonization
translation_notes:
  revision_awareness: He seguido la revisión que corrige la idiomática ge'ez de ማእከለ መራኂ ወመራኂ como «entre líder y líder» y la adjudicación que aclara que አርእስት ፲፻ es «heads of a thousand» sin artículo definido. También he evitado convertir el pasaje en una paráfrasis calendárica explícita, en línea con la última pasada que dejó el texto sin cambios.
  spanish_consistency_notes:
  - Se mantiene un registro técnico y sobrio, acorde con el Libro Astronómico.
  - '"Cabezas" se conserva como término literal para respetar la tensión léxica documentada; las alternativas quedan en nota.'
  - '"Yahvé" no aparece porque el versículo no contiene el Tetragrámaton ni una alusión directa al nombre divino.'
  - Los marcadores de nota aparecen en el texto exactamente donde corresponde cada alternativa.
