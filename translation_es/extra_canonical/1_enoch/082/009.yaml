translation:
  language: es
  text: Y este es el orden de las estrellas[a], las que se ponen en sus lugares, y en sus tiempos, y en sus festividades[b], y en sus meses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «estaciones» para «lugares»; el ge'ez puede denotar ubicaciones asignadas dentro del curso ordenado de las estrellas.
    reason: lexical_alternative
  - marker: b
    text: «Festividades» refleja tiempos de fiesta del calendario, no que las estrellas celebren; el verso vincula el orden estelar con el cómputo de tiempos sagrados.
    reason: cultural_note
lexical_decisions:
- source_word: ሥርዓተ
  english_pob_choice: order
  chosen_spanish: orden
  alternatives_spanish:
  - arreglo
  - disposición
  - reglamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Orden» conserva la idea de un patrón establecido y regular de los cuerpos celestes, sin volver el término excesivamente jurídico o eclesiástico.
- source_word: ከዋክብት
  english_pob_choice: stars
  chosen_spanish: estrellas
  alternatives_spanish:
  - astros
  - cuerpos celestes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El referente directo es concreto: estrellas. «Astros» ampliaría el alcance y «cuerpos celestes» sería más general de lo que exige el ge''ez.'
- source_word: የዐርቡ
  english_pob_choice: that set
  chosen_spanish: se ponen
  alternatives_spanish:
  - entran
  - descienden
  - se ocultan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico, el verbo describe el ponerse de las estrellas. «Se ponen» es natural en español y mantiene la imagen del ocaso.
- source_word: በመካናቲሆሙ
  english_pob_choice: in their places
  chosen_spanish: en sus lugares
  alternatives_spanish:
  - en sus estaciones
  - en sus posiciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lugares» sigue de cerca el término básico y preserva la idea de sitios asignados en el curso ordenado de las estrellas.
- source_word: በአዝማኒሆሙ
  english_pob_choice: in their times
  chosen_spanish: en sus tiempos
  alternatives_spanish:
  - en sus tiempos señalados
  - en sus temporadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tiempos» mantiene la correspondencia formal con el ge'ez y deja abierta la fuerza calendárica que el contexto sugiere.
- source_word: በበዓላቲሆሙ
  english_pob_choice: in their festivals
  chosen_spanish: en sus festividades
  alternatives_spanish:
  - en sus fiestas
  - en sus tiempos festivos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Festividades» reproduce la dimensión calendárico-cultual del texto. «Fiestas» también sería posible, pero «festividades» suena más amplio y solemne en español moderno.
- source_word: በአውራኂሆሙ
  english_pob_choice: in their months
  chosen_spanish: en sus meses
  alternatives_spanish:
  - en sus meses lunares
  - según sus meses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa meses; se conserva sin añadir «lunares», porque eso iría más allá de la mención explícita del verso.
theological_decisions:
- issue: Mantener la relación entre orden celestial y tiempo sagrado sin diluirla
  english_pob_reading: Retain 'festivals' alongside 'times' and 'months'
  chosen_spanish_reading: Conservar «festividades» junto con «tiempos» y «meses»
  alternative_spanish_readings:
  - Reducir todo a «estaciones» o «periodos»
  - Hacer la frase puramente cronológica
  rationale: El pasaje no solo describe astronomía; vincula el orden de las estrellas con el cómputo de tiempos sagrados. Traducir «festividades» deja visible esa dimensión cultual sin resolverla en cronología genérica.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not flatten apocalyptic imagery or cultic terminology.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; la redacción española se mantiene alineada con la lectura estable del texto fuente y con la auditoría inglesa.
  spanish_consistency_notes:
  - Se prefirió «estrellas» en lugar de un término más amplio para conservar la imagen astronómica concreta.
  - Se mantuvo una estructura coordinada paralela («en sus lugares, y en sus tiempos, y en sus festividades, y en sus meses») para reflejar la cadencia del original.
  - No se introdujo vocabulario litúrgico más fuerte que el exigido por el contexto; «festividades» conserva la nota calendárico-cultual sin sobrerinterpretar.
