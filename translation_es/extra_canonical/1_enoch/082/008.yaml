    issue: El sujeto verbal inicial en español no coincide con la traducción inglesa POB final auditada.
    rationale: El audit trail aplicado termina en «they have authority», mientras el borrador español conserva «tiene autoridad». Dado que la tarea pide revisar contra la evidencia fuente y el rastro POB auditado, la versión española debe reflejar el estado final salvo razón fuerte en contra.
  - severity: high
    issue: La nota [a] está mal ubicada y su contenido no corresponde al punto anotado en el texto.
    rationale: La nota sobre «rutas recurrentes o ciclos ordenados» explica በዓስቢሆሙ («en sus cursos»), no «autoridad». Debe anclarse en «cursos».
  - severity: medium
