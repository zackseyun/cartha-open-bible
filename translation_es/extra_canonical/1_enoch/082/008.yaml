    rationale: La nota inglesa [b] dice «Or 'And authority over them is by night and by day in heaven'», una variante de la cláusula inicial. El borrador la reemplaza por una nota teológica sobre «potestades», lo que altera el expediente auditado.
  - severity: medium
    issue: «Potestades del cielo» es más marcado y menos natural que la opción auditada equivalente a «poderes del cielo».
    rationale: El POB inglés eligió «powers of heaven» para mantener el registro cósmico sin forzar personalización. En español, «poderes del cielo» transmite eso con mayor claridad general que «potestades», que puede sonar excesivamente técnico o angelológico.
