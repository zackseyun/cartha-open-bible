translation:
  language: es
  text: 'Y tienen autoridad de noche y de día en el cielo[a], para que den luz sobre la humanidad: el sol, la luna, las estrellas y todos los poderes del cielo, que retornan en sus cursos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en sus cursos». La expresión etiópica puede denotar rutas recurrentes o ciclos ordenados del movimiento celeste.
    reason: lexical_alternative
  - marker: b
    text: O «Y la autoridad sobre ellos es de noche y de día en el cielo».
    reason: previous_rendering
lexical_decisions:
- source_word: ስልጣነ
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  - gobierno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término etiópico expresa poder de jurisdicción u ordenamiento. «Autoridad» conserva mejor que «poder» el matiz de gobierno cósmico que el POB documenta para este pasaje.
- source_word: ቦቱ
  english_pob_choice: they have / over them (revised audit trail)
  chosen_spanish: tiene
  alternatives_spanish:
  - tienen
  - está en él
  - les pertenece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail señala que ቦቱ es sufijo masculino singular de tercera persona y debe referirse a un sujeto singular previo. En español, «tiene autoridad» preserva esa referencia singular sin forzar una construcción impersonal.
- source_word: በሌሊት ወበመዓልት
  english_pob_choice: by night and by day
  chosen_spanish: de noche y de día
  alternatives_spanish:
  - por la noche y por el día
  - en la noche y en el día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja temporal es directa. «De noche y de día» suena natural en español y mantiene el paralelismo formal del original.
- source_word: ውስተ ሰማይ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo
  - en el firmamento
  - en los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el audit trail inglés prefiere «in heaven», en español «el cielo» comunica el ámbito cósmico de manera clara y digna. «Firmamento» sería posible, pero aquí el contraste con los cuerpos celestes ya queda explícito en la enumeración.
- source_word: ከመ ያርኡ ብርሃነ
  english_pob_choice: so that they may give light
  chosen_spanish: para que den luz
  alternatives_spanish:
  - para que alumbren
  - para que den resplandor
  - para que hagan brillar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro expresa finalidad. «Den luz» reproduce bien la función luminosa sin añadir una paráfrasis más interpretativa como «alumbren» o «hagan brillar».
- source_word: ዲበ ሰብእ
  english_pob_choice: upon humankind
  chosen_spanish: sobre la humanidad
  alternatives_spanish:
  - sobre la gente
  - sobre los seres humanos
  - sobre la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El colectivo humano se mantiene en singular abstracto, como en el inglés del POB. «Humanidad» es claro, formal y evita un tono masculino genérico.
- source_word: ፀሐየ ወወርኀ ወከዋክብተ
  english_pob_choice: the sun and the moon and the stars
  chosen_spanish: el sol, la luna, las estrellas
  alternatives_spanish:
  - el sol y la luna y las estrellas
  - el sol, la luna y las estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la lista de luminares con ritmo natural en español. La coma antes de «y» final no es necesaria aquí por claridad y fluidez.
- source_word: ኵሎሙ ስልጣናት ሰማይ
  english_pob_choice: all the powers of heaven
  chosen_spanish: todas las potestades del cielo
  alternatives_spanish:
  - todos los poderes del cielo
  - todas las autoridades del cielo
  - todos los poderes celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Potestades» permite mantener el registro elevado y la posible ambigüedad entre fuerzas cósmicas y seres celestes, sin resolverla. En español bíblico, también puede sugerir un colectivo de orden celestial sin imponer personificación.
- source_word: እለ ይትመየጡ
  english_pob_choice: which return
  chosen_spanish: que retornan
  alternatives_spanish:
  - que vuelven
  - que regresan
  - que giran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo apunta a un movimiento recurrente. «Retornan» conserva el aspecto cíclico y formal del texto astronómico.
- source_word: በዓስቢሆሙ
  english_pob_choice: in their courses
  chosen_spanish: en sus cursos
  alternatives_spanish:
  - en sus cursos
  - en sus recorridos
  - en sus trayectorias
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cursos» es el equivalente más natural para el movimiento astronómico ordenado. Mantiene el sentido técnico sin volverlo excesivamente moderno.
theological_decisions:
- issue: '¿A quién se refiere el sujeto con autoridad: una entidad singular previa o un plural implícito ligado a los luminares?'
  english_pob_reading: The revised audit trail notes that ቦቱ is singular and refers back to Uriel, while the verse later names multiple heavenly bodies.
  chosen_spanish_reading: 'La frase inicial se deja en singular: «tiene autoridad», dejando implícita la referencia al sujeto previo del contexto inmediato. No se fuerza un plural en español.'
  alternative_spanish_readings:
  - tienen autoridad
  - él tiene autoridad sobre ellos
  rationale: La evidencia gramatical del audit trail corrige el error de tomar ቦቱ como plural. Como el versículo en español se presenta aislado, se evita introducir «él» si no está explícito en la línea misma, pero se conserva el singular mediante el verbo.
  doctrine_reference: Preserve textual and grammatical tension; do not smooth over contextual reference.
- issue: ¿«Potestades del cielo» debe entenderse como seres personales o como fuerzas cósmicas ordenadas?
  english_pob_reading: The English POB preserves the ambiguity with 'powers of heaven' and notes an alternative reading involving authorities over them.
  chosen_spanish_reading: «Potestades del cielo» mantiene la ambigüedad entre fuerzas/órdenes celestes y posibles seres celestiales, sin decidir la cuestión.
  alternative_spanish_readings:
  - autoridades del cielo
  - poderes del cielo
  - huestes del cielo
  rationale: El pasaje del Libro de las Lumbreras enfatiza el orden astronómico. «Potestades» conserva el registro elevado y la tensión interpretativa que el POB quiere preservar.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al tomar ቦቱ como singular («tiene autoridad») y no como plural. También conserva la idea cíclica de ይትመየጡ / በዓስቢሆሙ con «retornan en sus cursos», mientras el inglés final optó por «return in their courses».
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se mantiene «cielo» para ውስተ ሰማይ por fluidez española, sin perder el sentido cósmico.
  - «Potestades» se eligió para no cerrar la ambigüedad del término etiópico.
  - La puntuación con guion largo ayuda a leer la enumeración de luminares sin alterar el contenido.
