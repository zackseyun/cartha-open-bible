translation:
  language: es
  text: Bienaventurados todos los justos que andan en el camino de la justicia y no tienen pecado como los pecadores[a], en el número total de todos sus días, mientras el sol recorre el cielo, entrando y saliendo por las puertas durante treinta días, junto con los jefes de los millares del orden de las estrellas[b], y con los cuatro que se añaden[c], los cuales dividen las cuatro partes del año, que los guían y entran con ellos en cuatro días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión puede entenderse también como una afirmación muy fuerte de vida sin pecado; se conserva la comparación explícita con 'los pecadores' para no suavizar el texto.
    reason: theological_note
  - marker: b
    text: La frase etiópica/ge'ez resulta difícil; también puede leerse como 'las cabezas de los órdenes estelares' o, de manera más idiomática, 'los jefes de los órdenes estelares'. Se mantiene la imagen jerárquica y numérica visible.
    reason: lexical_alternative
  - marker: c
    text: El pasaje parece referirse a cuatro días adicionales o intercalarios que dividen el año en cuatro partes. La lectura exacta del número en el testimonio etiópico es difícil, por lo que se deja documentada la decisión contextual.
    reason: textual_variant
lexical_decisions:
- source_word: ብፁዓን
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el tono de bienaventuranza solemne y bíblica; 'felices' debilita el registro apocalíptico y 'dichosos' es posible pero menos inmediato en español actual.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Justos'' es el equivalente natural y bíblico para el término ético-teológico; mantiene la coherencia con el lenguaje de justicia del versículo.'
- source_word: የሐውሩ / በፍኖተ ጽድቅ
  english_pob_choice: walk in the path of righteousness
  chosen_spanish: andan en el camino de la justicia
  alternatives_spanish:
  - caminan por la senda de la justicia
  - andan por la senda de la rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Andar en el camino'' preserva la metáfora moral de conducta; ''justicia'' mantiene el vínculo con ጽድቅ y evita reemplazar el campo semántico por una paráfrasis más abstracta.'
- source_word: አልቦሙ ኃጢአት
  english_pob_choice: have no sin
  chosen_spanish: no tienen pecado
  alternatives_spanish:
  - están sin pecado
  - no poseen pecado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''No tienen pecado'' reproduce la afirmación fuerte sin suavizarla; en español queda natural y conserva la tensión teológica del original.'
- source_word: ከመ ኃጥኣን
  english_pob_choice: like sinners
  chosen_spanish: como los pecadores
  alternatives_spanish:
  - igual que los pecadores
  - al modo de los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación debe permanecer explícita; 'como los pecadores' mantiene el contraste sin resolver la posible fuerza hiperbólica o estricta del enunciado.
- source_word: በኍልቈ ኵሉ መዋዕሊሆሙ
  english_pob_choice: in the whole number of all their days
  chosen_spanish: en el número total de todos sus días
  alternatives_spanish:
  - durante el cómputo completo de todos sus días
  - en el total de sus días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Número total'' conserva el matiz de cómputo/calendario visible en el texto y su interés astronómico, sin sonar torpe en español.'
- source_word: ለዘ የኀውር ፀሐይ በሰማይ
  english_pob_choice: while the sun traverses heaven
  chosen_spanish: mientras el sol recorre el cielo
  alternatives_spanish:
  - mientras el sol atraviesa el cielo
  - mientras el sol va por el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Recorre el cielo'' transmite el movimiento continuo sin una calca demasiado dura; ''cielo'' es el equivalente más claro y natural para השמיים/ሰማይ en español.'
- source_word: በአናቅጽ ይበውእ ወይወጽእ
  english_pob_choice: entering and going out through the gates
  chosen_spanish: entrando y saliendo por las puertas
  alternatives_spanish:
  - entrando y saliendo por los portales
  - al entrar y salir por las puertas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Puertas'' es la forma más directa y comprensible para conservar la imaginería de los accesos celestes; ''portales'' sería posible pero menos simple.'
- source_word: ሠላሳ ዕለተ
  english_pob_choice: for thirty days
  chosen_spanish: durante treinta días
  alternatives_spanish:
  - por treinta días
  - en treinta días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Durante'' expresa la duración dentro del movimiento del sol y evita sugerir una finalidad.'
- source_word: አርእስተ ፲፻ዘሥርዓቶሙ ለከዋክብት
  english_pob_choice: the heads of the thousands of the order of the stars
  chosen_spanish: las cabezas de los millares del orden de las estrellas
  alternatives_spanish:
  - los jefes de los millares del orden de las estrellas
  - los cabezas de los millares del orden de las estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cabezas'' conserva la imagen jerárquica del original y su eco administrativo-militar; ''millares'' refleja el componente numérico sin borrar la extrañeza sintáctica documentada.'
- source_word: ምስለ ፲ እለ ይትዌሰኩ
  english_pob_choice: with the four that are added
  chosen_spanish: con los cuatro que se añaden
  alternatives_spanish:
  - con los cuatro adicionales
  - con los cuatro intercalados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Mantiene la decisión contextual del audit trail: la lectura más probable son cuatro días adicionales, pero la formulación española no oculta la literalidad del texto.'
- source_word: እለ ይጼልዩ ማእከለ ፬ ክፍለ ዓመት
  english_pob_choice: which divide the four parts of the year
  chosen_spanish: los cuales dividen las cuatro partes del año
  alternatives_spanish:
  - que separan las cuatro partes del año
  - los cuales marcan las cuatro divisiones del año
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Dividen'' conserva la función calendárica exacta atribuida a estos días; ''partes del año'' es claro y fiel al marco astronómico.'
- source_word: እለ ይመርዓዎሙ
  english_pob_choice: which lead them
  chosen_spanish: que los guían
  alternatives_spanish:
  - que los conducen
  - que los regulan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Guiar'' conserva la personificación del orden cósmico en español de manera natural; ''regulan'' explicita más de la cuenta.'
- source_word: ወምስሌሆሙ ይበውኡ አርባዕተ መዋዕለ
  english_pob_choice: and enter with them on four days
  chosen_spanish: y entran con ellos en cuatro días
  alternatives_spanish:
  - y con ellos entran en cuatro días
  - y entran junto con ellos en cuatro días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la imagen de entrada asociada a los cuatro días intercalados sin añadir explicaciones fuera del texto.
theological_decisions:
- issue: Alcance de la afirmación sobre la ausencia de pecado
  english_pob_reading: 'The text is rendered as a strong ethical description: the righteous ''have no sin like sinners'' within the calendrical frame of their days.'
  chosen_spanish_reading: La traducción mantiene una afirmación fuerte —'no tienen pecado como los pecadores'— sin convertirla en una corrección doctrinal ni atenuarla a una simple conducta general.
  alternative_spanish_readings:
  - no pecan como los pecadores
  - viven sin pecado como los pecadores
  rationale: El original es contundente y debe conservar esa fuerza; al mismo tiempo, la comparación explícita evita borrar la tensión teológica y permite que el lector perciba el carácter exhortativo o hiperbólico del pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla interpretativamente.
- issue: Identidad de los días añadidos del calendario
  english_pob_reading: The verse refers to four additional days associated with dividing the year into four parts.
  chosen_spanish_reading: Se traduce de modo que el lector vea cuatro días añadidos vinculados con las cuatro partes del año.
  alternative_spanish_readings:
  - cuatro entidades añadidas
  - diez añadidos según la lectura literal defectuosa del OCR
  rationale: El contexto del Libro Astronómico favorece claramente cuatro días intercalarios; documentarlo así evita esconder la inestabilidad del OCR y mantiene el valor calendárico del pasaje.
  doctrine_reference: Mantener transparencia textual y contextual.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés actualizado: se conservó la lectura revisada de ''heads of the thousands of the order of the stars'', se mantuvo la decisión contextual de cuatro días añadidos, y se respetó la fuerza del enunciado sobre la ausencia de pecado sin neutralizarla.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca aquí el tetragrámaton, sino para mantener la norma general del proyecto; este versículo no requiere el término.
  - '''Justos'' y ''justicia'' se conservaron para mantener cohesión léxica en todo el pasaje.'
  - '''Puertas'' se prefirió a ''portales'' por claridad y por continuidad con la imaginería celeste del texto.'
  - Se mantuvo el orden de los elementos del original para preservar el paralelismo entre los justos y el marco astronómico/calendárico.
