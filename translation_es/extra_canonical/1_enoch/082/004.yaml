  yaml_path: translation/extra_canonical/1_enoch/082/004.yaml
  text: Blessed are all the righteous who walk in the path of righteousness and have no sin like sinners[a], in the whole number of all their days, while the sun traverses heaven, entering and going out through the gates for thirty days, together with the heads of the thousands of the order of the stars, and with the four that are added, which divide the four parts of the year[c][b], which lead them and enter with them on four days.
