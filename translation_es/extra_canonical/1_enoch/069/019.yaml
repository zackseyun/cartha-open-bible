translation:
  language: es
  text: Y por ese juramento las profundidades[a] quedaron firmes[b], y están firmes y no se mueven de su lugar desde la eternidad hasta la eternidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Ge''ez ቀላይ (qalāy): puede traducirse «el abismo» o «los abismos». Se adopta «las profundidades» (plural) para mantener la coherencia con los verbos en tercera persona plural que siguen. Una revisión anterior de la traducción inglesa identificó la omisión de este sujeto nominal como error mayor y lo restituyó.'
    reason: source_note
  - marker: b
    text: O «fueron fortalecidas» o «se afianzaron». El verbo ge'ez ፀንዐት puede expresar llegar a estar firme, fortalecerse o ser establecido.
    reason: lexical_alternative
  - marker: c
    text: 'Fórmula bimembre ge''ez ʾəm-ʿāläm... la-ʿāläm, lit. «desde la edad/eternidad hasta la edad/eternidad». Alternativas posibles: «de eternidad en eternidad» o «por los siglos de los siglos». Se prefiere «desde la eternidad hasta la eternidad» para preservar la estructura bipartita del original.'
    reason: textual_variant
lexical_decisions:
- source_word: ማሐላ
  english_pob_choice: oath
  chosen_spanish: juramento
  alternatives_spanish:
  - jura
  - maldición
  - voto
  lexicon: Dillmann
  rationale: ማሐላ designa el acto solemne y vinculante de jurar, con fuerza jurídica-apocalíptica en el contexto. «Juramento» es el término español preciso que conserva ese peso; «voto» sugiere promesa religiosa voluntaria, y «maldición» desplazaría el sentido hacia un polo negativo no exigido por el texto.
- source_word: ቀላይ
  english_pob_choice: the depths
  chosen_spanish: las profundidades
  alternatives_spanish:
  - el abismo
  - los abismos
  - el piélago
  lexicon: Dillmann
  rationale: ቀላይ (qalāy) es sustantivo femenino singular en ge'ez que puede traducirse «el abismo» o «la profundidad»; la revisión al inglés identificó su omisión como error mayor y lo restituyó como sujeto. Se adopta «las profundidades» en plural porque los verbos siguientes (ቆሙ, ኢይትሐወሱ) y el pronombre (እመካኖሙ) están en tercera persona plural, lo que indica que el plural de traducción refleja la extensión cósmica del referente. «El abismo» (singular) sería posible pero aplanarías la coherencia morfológica con el resto de la cláusula en español.
- source_word: ፀንዐት
  english_pob_choice: were made firm
  chosen_spanish: quedaron afianzadas
  alternatives_spanish:
  - fueron fortalecidas
  - se afirmaron
  - fueron consolidadas
  lexicon: Dillmann
  rationale: El verbo ge'ez ፀነዐ (ṣanʿa) expresa ponerse o volverse firme/fuerte; la forma ፀንዐት es perfecta 3.ª femenina singular, concordando en género con ቀላይ. El resultativo «quedaron afianzadas» preserva el matiz pasivo-resultativo (algo las hizo quedar firmes) sin necesitar un agente explícito, lo que encaja con el instrumental «por ese juramento». «Fueron fortalecidas» es igualmente válido y se anota como alternativa.
- source_word: ወቆሙ
  english_pob_choice: they stand
  chosen_spanish: permanecen
  alternatives_spanish:
  - están de pie
  - se mantienen en pie
  - están firmes
  lexicon: Dillmann
  rationale: El inglés POB revisado pasó de «they stood» (pretérito) a «they stand» (presente) siguiendo la nota de que el imperfecto ኢይትሐወሱ describe una realidad cósmica continua. En español, «permanecen» traduce esa estabilidad persistente con mayor fluidez que «están de pie», que tiene connotación más física-postural; «se mantienen» es opción válida pero más reflexiva. «Permanecen» captura la estabilidad ontológica del cosmos.
- source_word: ወኢይትሐወሱ
  english_pob_choice: do not move
  chosen_spanish: no se mueven
  alternatives_spanish:
  - no son sacudidas
  - no son perturbadas
  - no se desplazan
  lexicon: Dillmann
  rationale: El imperfecto negativo ኢይትሐወሱ denota un movimiento o perturbación que no ocurre; la revisión inglesa corrigió «were not moved» (pasado) por «do not move» (presente continuo). «No se mueven» es la expresión española más directa e idiomática para este estado de inmutabilidad cósmica en curso.
- source_word: እመካኖሙ
  english_pob_choice: from their place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de sus lugares
  - de sus puestos
  - de sus posiciones
  lexicon: Dillmann
  rationale: እመካን (makān) es «lugar, sitio, posición»; el sufijo ሙ es pronominal de 3.ª plural. En español, «de su lugar» es idiomaáticamente más natural que «de sus lugares» para una entidad cósmica colectiva; «de sus puestos» añadiría un matiz de cargo/función ligeramente más interpretativo. El inglés POB señaló «stations» como alternativa más interpretativa; en español se mantiene la misma reserva.
- source_word: እምዓለም ወእስከ ለዓለም
  english_pob_choice: from eternity to eternity
  chosen_spanish: desde la eternidad hasta la eternidad
  alternatives_spanish:
  - de eternidad en eternidad
  - por los siglos de los siglos
  - para siempre jamás
  lexicon: Dillmann
  rationale: La fórmula bimembre ge'ez ʾəm-ʿāläm... la-ʿāläm reproduce literalmente «desde la edad/eternidad... hasta la edad/eternidad». La revisión inglesa restauró la estructura bipartita («from eternity to eternity») frente al idiomático «forever and ever». En español, «desde la eternidad hasta la eternidad» mantiene esa estructura bipartita de forma natural; «por los siglos de los siglos» es la fórmula litúrgica tradicional (Ap 1:6) pero encubre la forma del original; «de eternidad en eternidad» es concisa pero difumina la preposición direccional ʾəm...ʿəskä.
theological_decisions:
- issue: 'Sujeto del establecimiento cósmico: ¿son «las profundidades» las que son establecidas por el juramento, o es el juramento mismo el que permanece firme?'
  english_pob_reading: The verse describes beings or cosmic realities being strengthened and fixed in place by the oath.
  chosen_spanish_reading: La secuencia verbal plural (permanecen, no se mueven, de su lugar) indica que «las profundidades» son los referentes establecidos por el juramento, no el juramento mismo.
  alternative_spanish_readings:
  - El juramento mismo es lo que está firme y permanece
  - 'Declaración impersonal: la estabilidad advino por medio del juramento'
  rationale: El ge'ez emplea verbos en 3.ª plural (ቆሙ, ኢይትሐወሱ) y un pronombre posesivo plural (እመካኖሙ) que remiten a un sujeto nominal plural o colectivo; ቀላይ, aunque singular en ge'ez, actúa como colectivo cósmico. La imagen apocalíptica de las profundidades como entidades cosmológicas fijadas por un acto jurídico-divino es coherente con el contexto inmediato de 1 Enoc 69. El español refleja esta lectura plural manteniendo «las profundidades» como sujeto activo de los tres verbos.
  doctrine_reference: Preservar la imagen apocalíptica y el contexto local antes de aplanar en abstracción (POB theological note).
- issue: 'Aspecto verbal de ወቆሙ/ወኢይትሐወሱ: ¿tiempo pasado completado o presente cósmico continuo?'
  english_pob_reading: The revised English renders 'they stand and do not move' as present ongoing, not past completed.
  chosen_spanish_reading: Se usan presentes de indicativo («permanecen», «no se mueven») para describir una realidad cósmica vigente.
  alternative_spanish_readings:
  - Se mantuvieron y no fueron movidas (pretérito, secuencia narrativa completada)
  - Han permanecido y no se han movido (perfecto con relevancia presente)
  rationale: La revisión inglesa de 2026-04-22 señaló que ኢይትሐወሱ es un imperfecto ge'ez que denota acción en curso, no un evento pasado puntual. El español adopta el presente de indicativo para conservar esa fuerza durativa cósmica, en línea con la imagen enóquica de órdenes creacionales permanentes.
  doctrine_reference: 'Cosmovisión apocalíptica enóquica: los elementos cósmicos establecidos por decreto divino permanecen en su lugar de modo continuo y eterno.'
translation_notes:
  revision_awareness: 'Dos revisiones críticas del inglés POB se integran en la traducción española: (1) La revisión de 2026-04-22 corrigió la omisión del sujeto ቀላይ (qalāy, «las profundidades»); el español lo incorpora como sujeto explícito y en plural para concordar con los verbos siguientes. (2) La revisión de 2026-04-23 reemplazó «forever and ever» por «from eternity to eternity» para reflejar la estructura bimembre del original ge''ez; el español sigue esta decisión con «desde la eternidad hasta la eternidad». Además, la nota sobre el imperfecto ኢይትሐወሱ (realidad cósmica continua, no pasado completado) se respeta mediante el uso de presentes de indicativo en español («permanecen», «no se mueven»).'
  spanish_consistency_notes:
  - «Juramento» se usa para ማሐላ de manera consistente en este contexto juridico-apocalíptico; no se usa «promesa» ni «voto».
  - «Las profundidades» (plural) para ቀላይ, no «el abismo» (singular), a fin de mantener coherencia morfológica con los verbos en tercera persona plural del resto del versículo.
  - Verbos en presente de indicativo («permanecen», «no se mueven») para los imperfectos ge'ez, reflejando la realidad cósmica continua según la revisión auditada.
  - «Desde la eternidad hasta la eternidad» para la fórmula ʾəm-ʿāläm... la-ʿāläm, preservando la estructura bipartita del original frente a fórmulas litúrgicas opacas como «por los siglos de los siglos».
  - No aparece el nombre divino (יהוה/Yahvé) en este versículo; no aplica la convención de proyecto al respecto.
