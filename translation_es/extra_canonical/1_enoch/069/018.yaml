translation:
  language: es
  text: Y por ese juramento fue creado el mar, y como su fundamento[b], para el tiempo de ira[a], le puso arena[c], y no pasa más allá de ella desde la creación del mundo y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión del ge'ez es difícil; también puede entenderse de manera más general como 'para un tiempo de juicio'.
    reason: lexical_alternative
  - marker: b
    text: '''Fundamento'' probablemente se refiere al límite o base fija del mar; la imagen es que la arena se ha puesto como el confín que no puede cruzar.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''puso para él arena''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ማሐላ
  english_pob_choice: oath
  chosen_spanish: juramento
  alternatives_spanish:
  - juramento solemne
  - juramento
  lexicon: Dillmann Lexicon
  rationale: En este contexto cósmico y solemne, 'juramento' comunica mejor que una traducción más eclesiástica o abstracta. 'Juramento solemne' sería posible, pero 'juramento' conserva la fuerza directa del término sin añadir material no atestado.
- source_word: ተፈጥረት
  english_pob_choice: was created
  chosen_spanish: fue creado
  alternatives_spanish:
  - llegó a ser
  - fue formado
  lexicon: Dillmann Lexicon
  rationale: La pasiva de creación conserva la acción divina y el alcance cosmológico del original ge'ez.
- source_word: ባሕር
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el océano
  lexicon: Dillmann Lexicon
  rationale: En español, 'mar' es la forma natural y digna para el elemento cósmico; 'océano' estrecharía innecesariamente la imagen.
- source_word: መሠረታ
  english_pob_choice: its foundation
  chosen_spanish: su fundamento
  alternatives_spanish:
  - su base
  - su fundamento-límite
  lexicon: Dillmann Lexicon
  rationale: '''Fundamento'' preserva la imagen concreta usada por la tradición POB en inglés y evita reducir el sentido a mera ''frontera''. En contexto también puede insinuar el límite estable del mar.'
- source_word: ለጊዜ መዓት
  english_pob_choice: for the time of wrath
  chosen_spanish: para el tiempo de ira
  alternatives_spanish:
  - para un tiempo de ira
  - para el tiempo de juicio
  lexicon: Dillmann Lexicon
  rationale: '''Ira'' reproduce el registro apocalíptico sin suavizarlo. ''Tiempo de juicio'' es una posibilidad interpretativa, pero ''ira'' deja intacta la tensión lexical señalada por el audit trail.'
- source_word: አንበረ ላቲ ኆፃ
  english_pob_choice: he set sand for it
  chosen_spanish: puso arena para él
  alternatives_spanish:
  - puso arena para ello
  - colocó arena para él
  lexicon: Dillmann Lexicon
  rationale: '''Puso arena para él'' es fiel, natural y conserva el objeto concreto como límite impuesto. Evita sobreinterpretar el verbo como fijar un límite abstracto.'
- source_word: ወኢትኅልፍ
  english_pob_choice: and it does not pass beyond it
  chosen_spanish: y no lo traspasa
  alternatives_spanish:
  - y no pasa más allá de él
  - y no lo sobrepasa
  lexicon: Dillmann Lexicon
  rationale: '''No lo traspasa'' comunica con precisión la idea de no cruzar el límite. Otras opciones son correctas, pero esta mantiene el peso de la imagen de restricción.'
- source_word: እምፍጥረተ ዓለም ወእስከ ለዓለም
  english_pob_choice: from the creation of the world and forever
  chosen_spanish: desde la creación del mundo y para siempre
  alternatives_spanish:
  - desde la creación del mundo y por siempre
  - desde la creación del mundo hasta la eternidad
  lexicon: Dillmann Lexicon
  rationale: La fórmula temporal se vuelve transparente y litúrgicamente inteligible en español sin perder el alcance cósmico y perpetuo.
theological_decisions:
- issue: Cómo expresar la imagen cósmica del mar con una restricción impuesta sin diluir la tensión entre orden creacional e imagen de juicio
  english_pob_reading: Retained the concrete image 'he set sand for it' together with 'for the time of wrath,' preserving both creation order and apocalyptic judgment resonance.
  chosen_spanish_reading: Se conserva la imagen concreta de arena como elemento de contención junto con 'para el tiempo de ira', manteniendo la resonancia entre orden creacional e imaginería de juicio.
  alternative_spanish_readings:
  - fijó su límite
  - puso arena como frontera
  - omitió la referencia a la ira
  rationale: El texto ge'ez combina una imagen material con una expresión temporal/judicial difícil. La versión española conserva ambas sin resolverlas demasiado en favor de una sola lectura.
  doctrine_reference: Preservar la tensión teológica; no aplanar la imaginería apocalíptica ni convertirla sólo en geografía natural.
translation_notes:
  revision_awareness: 'La redacción sigue el último estado del audit trail en inglés: se adoptó la forma más fluida ''he set sand for it'' y se mantuvo la tensión interpretativa del tramo difícil ''for the time of wrath''. La decisión española conserva esa combinación de concreción e incertidumbre sin resolverla de manera excesiva.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como término por defecto solo cuando aparezca el nombre divino; aquí no aplica.
  - '''Juramento'' se usa por fuerza lexical, evitando ''maldición'' porque el contexto es constructivo y cosmogónico.'
  - '''Mar'' y ''arena'' conservan la imaginería física concreta.'
  - La sintaxis sigue siendo natural en español, pero sin eliminar el valor de límite impuesto por el texto fuente.
