translation:
  language: es
  text: Y allí se guardan la voz[a] del trueno y la luz del relámpago, y allí se guardan los depósitos del granizo, y los depósitos de la escarcha[b], y los depósitos de la neblina, y los depósitos de la lluvia y del rocío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge'ez para el trueno admite un matiz entre «voz» y «sonido». Se eligió «voz» para conservar mejor la personificación del texto; «sonido» sigue siendo una alternativa plausible.
    reason: lexical_alternative
  - marker: b
    text: El término de esta serie es textualmente difícil. La revisión crítica del expediente indica que አስሐትያ corresponde a «escarcha» y que ጊሜ designa la neblina o niebla; por eso se distinguen ambos depósitos en la traducción.
    reason: textual_variant
lexical_decisions:
- source_word: በህየ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  - en aquel lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio locativo marca un lugar visionario concreto; «allí» conserva la repetición espacial y suena natural en español.
- source_word: ይትዓቀቡ / ይትዓቀብ
  english_pob_choice: are kept
  chosen_spanish: se guardan
  alternatives_spanish:
  - son guardados
  - se preservan
  - se almacenan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva/reflexiva expresa la idea de depósitos celestiales. «Se guardan» mantiene amplitud entre custodiar y almacenar sin forzar un matiz demasiado técnico.
- source_word: ቃሉ ለነጐድጓድ
  english_pob_choice: the sound of the thunder
  chosen_spanish: la voz del trueno
  alternatives_spanish:
  - el sonido del trueno
  - la palabra del trueno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés revisado optó por «sound», el valor de ቃል puede ser «voz», «palabra» o «sonido». En español, «la voz del trueno» conserva mejor el registro personificado y apocalíptico del texto sin perder inteligibilidad.
- source_word: ብርሃኑ ለመብረቅ
  english_pob_choice: the light of the lightning
  chosen_spanish: la luz del relámpago
  alternatives_spanish:
  - el resplandor del relámpago
  - la luz del rayo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Relámpago» reproduce bien la imagen visual de ብርሃን aplicada al fenómeno luminoso; mantiene el paralelo con el trueno y es natural en español.
- source_word: መዛግብተ
  english_pob_choice: storehouses
  chosen_spanish: almacenes
  alternatives_spanish:
  - depósitos
  - tesoros
  - reservorios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta de recipientes o reservorios celestiales. «Almacenes» es claro y directo en español, aunque «depósitos» también sería posible.
- source_word: በረድ
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término meteorológico estándar y plenamente comprensible.
- source_word: አስሐትያ
  english_pob_choice: mist
  chosen_spanish: escarcha
  alternatives_spanish:
  - helada
  - hielo
  - hojarasca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se sigue la revisión auditada: el término corresponde a «hoarfrost»/«frost». «Escarcha» expresa bien ese fenómeno en español y evita la inexactitud de traducirlo como neblina.'
- source_word: ጊሜ
  english_pob_choice: cloud
  chosen_spanish: neblina
  alternatives_spanish:
  - niebla
  - nube
  - bruma
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado que el ajuste textual distingue este término del anterior, se opta por un fenómeno atmosférico suave y no por «escarcha». «Neblina» funciona bien en la secuencia y preserva la incertidumbre léxica señalada por la tradición crítica.
- source_word: ዝናም
  english_pob_choice: rain
  chosen_spanish: lluvia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Equivalencia meteorológica directa.
- source_word: ጠል
  english_pob_choice: dew
  chosen_spanish: rocío
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: Equivalencia meteorológica directa; conserva el cierre de la lista cósmica.
theological_decisions:
- issue: Preservar la imaginería cósmica apocalíptica sin reducirla a lenguaje meteorológico plano
  english_pob_reading: Keep the concrete idea of heavenly storehouses of natural forces
  chosen_spanish_reading: Conservar almacenes celestiales de los fenómenos naturales
  alternative_spanish_readings:
  - Reducirlo a descripciones meteorológicas ordinarias
  - Parafrasear como procesos naturales sin depósitos
  rationale: El pasaje no pretende explicar meteorología común, sino describir repositorios celestiales en un marco visionario. Por eso se mantiene el lenguaje de «almacenes» y la repetición estructural.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten cosmic imagery into generic modern religious prose.'
- issue: Elegir entre «voz» y «sonido» para el trueno
  english_pob_reading: the sound of the thunder
  chosen_spanish_reading: la voz del trueno
  alternative_spanish_readings:
  - el sonido del trueno
  - el estruendo del trueno
  rationale: La fuente ge'ez permite un término más expresivo que el mero sonido. «Voz» conserva la personificación y el paralelo con «luz del relámpago», sin afirmar una doctrina adicional.
  doctrine_reference: Apocalyptic personification in visionary literature; preserve lexical tension where the source permits it.
translation_notes:
  revision_awareness: 'Seguí la revisión auditada que corrige la primera solución inglesa: አስሐትያ no es «mist», sino un término para hoarfrost/frost, mientras que ጊሜ corresponde a un fenómeno de niebla/neblina. También respeté la repetición de መዛግብተ antes de «la lluvia y del rocío». Para el español, opté por una formulación que conserve la estructura repetitiva y la imaginería apocalíptica, aun cuando el inglés revisado haya suavizado «voice» a «sound».'
  spanish_consistency_notes:
  - Usé «Yahvé» no porque aparezca aquí, sino por consistencia del proyecto; no se aplica en este versículo.
  - Mantuve artículos y repeticiones para reflejar la cadencia acumulativa del original.
  - Elegí vocabulario meteorológico común pero preciso, evitando términos excesivamente técnicos o regionales.
