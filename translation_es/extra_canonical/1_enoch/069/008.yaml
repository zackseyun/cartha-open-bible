translation:
  language: es
  text: Y el cuarto —su nombre era Penemue—, este[a] mostró a los hijos de los hombres lo amargo y lo dulce[b], y les mostró todos los secretos de su sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Este» conserva el demostrativo enfático del original, que apunta al personaje ya nombrado.
    reason: lexical_alternative
  - marker: b
    text: O «amargura y dulzura». La formulación del texto principal conserva mejor el contraste sustantivado del original, sin decidir si es moral o simplemente experiencial.
    reason: previous_rendering
lexical_decisions:
- source_word: ራብዕ
  english_pob_choice: the fourth
  chosen_spanish: el cuarto
  alternatives_spanish:
  - cuarto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el valor ordinal del texto; en español, el artículo es natural y no altera el sentido.
- source_word: ስሙ
  english_pob_choice: his name was
  chosen_spanish: su nombre era
  alternatives_spanish:
  - su nombre fue
  - se llamaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula de identificación narrativa se expresa con un imperfecto natural en español, manteniendo el registro del relato.
- source_word: ፔኔሙኤ
  english_pob_choice: Penemue
  chosen_spanish: Penemue
  alternatives_spanish:
  - Pene(m)ue
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Nombre propio transliterado, sin traducción.
- source_word: ዝንቱ
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  - éste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo tiene valor deíctico y algo enfático; «este» reproduce la referencia sin sobrecargar el español.
- source_word: አርአየ
  english_pob_choice: showed
  chosen_spanish: mostró
  alternatives_spanish:
  - reveló
  - enseñó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Mostrar» preserva la repetición verbal del versículo y evita interpretar de más el acto como enseñanza formal.
- source_word: ለውሉደ ሰብእ
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los hijos de la humanidad
  - los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la expresión enfática y elevada de estilo enóquico; «los hijos de los hombres» refleja mejor la dicción del original que una equivalencia más plana.
- source_word: መሪረ
  english_pob_choice: the bitter
  chosen_spanish: lo amargo
  alternatives_spanish:
  - lo amargo y lo dulce
  - lo amargo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa reciente entendió el par como adjetivos sustantivados. En español, «lo amargo» mantiene esa sustantivación y evita convertirlo en una abstracción excesiva.
- source_word: ወመዓርፂረ
  english_pob_choice: the sweet
  chosen_spanish: lo dulce
  alternatives_spanish:
  - lo dulce
  - la dulzura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el paralelo con «lo amargo» y la forma sustantivada del contraste original.
- source_word: ኅቡኣተ
  english_pob_choice: the secrets
  chosen_spanish: los secretos
  alternatives_spanish:
  - las cosas ocultas
  - los misterios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Secretos» es una equivalencia idiomática directa para lo oculto; conserva el carácter apocalíptico del conocimiento transmitido.
- source_word: ጥበቦሙ
  english_pob_choice: their wisdom
  chosen_spanish: su sabiduría
  alternatives_spanish:
  - su conocimiento
  - su sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, el posesivo singular «su» puede referirse colectivamente a «los hijos de los hombres». Se evita duplicar un posesivo plural poco natural, sin perder la referencia humana colectiva.
theological_decisions:
- issue: Si el par መሪረ / ወመዓርፂረ debe leerse como sustantivos o como un contraste más abstracto o moral
  english_pob_reading: the bitter and the sweet
  chosen_spanish_reading: lo amargo y lo dulce
  alternative_spanish_readings:
  - lo amargo y lo dulce
  - amargura y dulzura
  - el bien y el mal
  rationale: La evidencia del audit trail favorece preservar el contraste léxico sin moralizarlo ni explicarlo. «Lo amargo y lo dulce» conserva la tensión abierta del original y evita resolverla como una oposición ética que el texto no explicita.
  doctrine_reference: Preservar la ambigüedad semántica cuando el original es sobrio y no aclara la relación conceptual.
- issue: Cómo reflejar el posesivo de ጥበቦሙ en relación con «los hijos de los hombres»
  english_pob_reading: the secrets of their wisdom
  chosen_spanish_reading: los secretos de su sabiduría
  alternative_spanish_readings:
  - los secretos de su sabiduría
  - los secretos de la sabiduría de ellos
  rationale: El sufijo pronominal se mantiene de modo natural en español como posesivo colectivo («su»), vinculando los secretos con la sabiduría humana en general sin forzar una perífrasis pesada.
  doctrine_reference: Mantener visible la relación entre humanidad y sabiduría recibida, sin diluirla en abstracción.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del inglés POB, que prefirió «the bitter and the sweet» como sustantivación de adjetivos. Por ello, la versión española usa «lo amargo y lo dulce» en vez de una abstracción como «amargura y dulzura», para mantener visible la forma del contraste y su posible tensión semántica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva el registro elevado de la dicción enóquica mediante «los hijos de los hombres».
  - Se evita «Cristo»/«Mesías» porque no corresponde al contenido del versículo.
  - La formulación «su sabiduría» es colectiva y remite al grupo humano mencionado inmediatamente antes.
