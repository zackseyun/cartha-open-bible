  language: en
  yaml_path: translation/extra_canonical/1_enoch/069/014.yaml
  text: This one said to Michael to show him the hidden name[a], so that they might remember it in the oath, and so that they might tremble before that name and oath[d][c][b], those who revealed to the children of men all that is hidden.
  footnotes:
  - marker: a
    text: Or 'the secret name.' The Ge'ez adjective means hidden or concealed; the verse does not require a later mystical technical sense.
