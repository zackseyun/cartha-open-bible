translation:
  language: es
  text: Este le dijo a Miguel que le mostrara el nombre oculto[a], para que lo recordaran en el juramento[b], y para que temblaran ante aquel nombre y juramento—los que revelaron a los hijos de los hombres todo lo que está oculto[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el nombre secreto». El adjetivo ge''ez significa «oculto» o «escondido»; el versículo no exige un sentido técnico místico posterior.'
    reason: lexical_alternative
  - marker: b
    text: «En el juramento» también puede sugerir la invocación solemne del nombre dentro de una adjuración, no solo su simple recuerdo.
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula final probablemente identifica a los que tiemblan: los mismos que revelaron a los seres humanos lo oculto.'
    reason: alternative_reading
  - marker: d
    text: La construcción puede entenderse como una solicitud indirecta, no como una cita directa con imperativo.
    reason: source_note
lexical_decisions:
- source_word: ዝንቱ
  english_pob_choice: This one
  chosen_spanish: Este
  alternatives_spanish:
  - Ese
  - Él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo conserva la fuerza deíctica del arranque sin volver la frase pesada en español. 'Este' mantiene la referencia marcada al personaje ya mencionado.
- source_word: ይቤሎ ለሚካኤል
  english_pob_choice: said to Mikael
  chosen_spanish: dijo a Miguel
  alternatives_spanish:
  - habló a Miguel
  - le dijo a Miguel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula narrativa se vierte de manera natural en español con 'dijo a'. Se usa 'Miguel' por la forma castellana usual del nombre en una lectura eclesial amplia.
- source_word: ያርእዮ
  english_pob_choice: Show him
  chosen_spanish: que le mostrara
  alternatives_spanish:
  - que le muestre
  - muéstrale
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión gramatical del audit trail indica una construcción indirecta de mandato/solicitud, no un imperativo directo. Por eso se traduce con subjuntivo dependiente ('que le mostrara') y no con cita directa.
- source_word: ስመ ኅቡአ
  english_pob_choice: the hidden name
  chosen_spanish: el nombre escondido
  alternatives_spanish:
  - el nombre oculto
  - el nombre secreto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Escondido'' conserva el sentido de algo no patente o velado sin cargar la frase con un matiz técnico esotérico. ''Oculto'' sigue siendo posible, pero ''escondido'' suena más natural y directo en este contexto.'
- source_word: ከመ ይዝክርዎ በመሐላ
  english_pob_choice: so that they might remember it in the oath
  chosen_spanish: para que lo recordaran en el juramento
  alternatives_spanish:
  - para que lo recordaran con juramento
  - para que lo invocaran en el juramento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Juramento'' traduce መሐላ de forma llana y fiel. ''Recordaran'' conserva el sentido amplio de rememorar/mentar, dejando abierta la posibilidad de una mención solemne sin forzar una formulación más técnica.'
- source_word: ከመ ይርዓዱ
  english_pob_choice: so that they might tremble
  chosen_spanish: para que temblaran
  alternatives_spanish:
  - para que temieran
  - para que se estremecieran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo apunta a temor con reacción física; 'temblaran' comunica bien la respuesta apocalíptica y conserva la fuerza somática del original.
- source_word: እምውእቱ ስም ወማሐላ
  english_pob_choice: before that name and oath
  chosen_spanish: ante aquel nombre y juramento
  alternatives_spanish:
  - ante ese nombre y juramento
  - por causa de aquel nombre y juramento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Ante'' reproduce bien la postura de temor reverente o estremecimiento frente a aquello. Se mantiene ''nombre y juramento'' en paralelo, como en el texto fuente.'
- source_word: እለ አርአዩ ለውሉደ ሰብእ ኵሎ ዘበኅቡእ
  english_pob_choice: those who revealed to the children of men all that is hidden
  chosen_spanish: los que revelaron a los hijos de los hombres todo lo que está oculto
  alternatives_spanish:
  - los que mostraron a los hijos de los hombres todo lo oculto
  - los que dieron a conocer a los hijos de los hombres todo lo oculto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Revelaron'' recoge la acción de dar a conocer misterios ocultos, acorde con el contexto apocalíptico. ''Los hijos de los hombres'' preserva el giro antropológico tradicional sin sustituirlo por un equivalente más abstracto.'
theological_decisions:
- issue: Identidad del grupo al que afecta el temblor al final del versículo
  english_pob_reading: 'The closing clause likely identifies those who are to tremble: the ones who disclosed hidden things to humankind.'
  chosen_spanish_reading: La cláusula final identifica a los mismos que revelaron lo oculto a los hombres como los que tiemblan ante el nombre y el juramento.
  alternative_spanish_readings:
  - La cláusula final podría referirse de modo más general a quienes oyen el juramento.
  - La sintaxis permite una lectura algo más comprimida donde el referente del temblor no se explicita del todo.
  rationale: La frase española conserva la identificación de los responsables de la revelación ilícita como destinatarios del temor, en armonía con el contexto judicial del pasaje. Se mantiene la tensión sintáctica sin resolverla en exceso.
  doctrine_reference: Preservar la tensión textual y la lógica apocalíptica del juicio, sin armonizar artificialmente la sintaxis.
- issue: Valor de መሐላ en el contexto
  english_pob_reading: '''In the oath'' may also imply invocation of the name within a solemn adjuration, not mere recollection.'
  chosen_spanish_reading: '''En el juramento'' se vierte como ''en el juramento'' / ''ante el juramento'' sin convertirlo en una frase doctrinalmente cerrada.'
  alternative_spanish_readings:
  - con juramento
  - por juramento
  - al jurar
  rationale: En español, 'juramento' es suficiente para mantener la solemnidad y no estrecha indebidamente el sentido. No se introduce terminología litúrgica posterior que el texto no exige.
  doctrine_reference: Mantener la sobriedad semántica del juramento como acto solemne, sin sobredeterminarlo.
translation_notes:
  revision_awareness: 'El texto español sigue la revisión gramatical más reciente del audit trail: evita tratar ያርእዮ como imperativo directo y traduce la relación como solicitud indirecta (''que le mostrara''). También conserva la referencia a Miguel/Michael en forma castellana estándar y mantiene el cierre sin comillas, en línea con la versión revisada.'
  spanish_consistency_notes:
  - Se conserva 'nombre' y 'juramento' de forma paralela, sin sustituirlos por formulaciones más interpretativas.
  - '''Hijos de los hombres'' se mantiene por fidelidad al giro antropológico del original.'
  - El estilo es sobrio y legible en registro bíblico moderno, evitando arcaísmos innecesarios.
