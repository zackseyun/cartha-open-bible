    reason: lexical_alternative
  - marker: c
    text: 'The closing clause likely identifies those who are to tremble: the ones who disclosed hidden things to humankind.'
    reason: alternative_reading
  - marker: d
    text: Or 'This one said to Mikael, “Show him'.
