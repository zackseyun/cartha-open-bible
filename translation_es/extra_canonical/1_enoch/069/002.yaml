base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/069/002.yaml
  text: 'And these are the names of those angels[a], and these are their names: the first of them was Semyaza, the second Artaqifa, the third Armen, the fourth Kokabel, the fifth Turiel, the sixth Rumyal, the seventh Daniyal, the eighth Neqael, the ninth Baraqel, the tenth Azazel, the eleventh Armaros, the twelfth Batariel, the thirteenth Basasael, the fourteenth Hananel, the fifteenth Turiel, the sixteenth Simipesiel, the seventeenth Yeterel, the eighteenth Tumael, the nineteenth Turiel, the twentieth Teremael[d][c][b], and the twenty-first Te''azazel.'
  footnotes:
  - marker: a
    text: Several names in this verse are difficult because the Parables are preserved effectively only in Ge'ez for this workflow, and the OCR of the Ethiopic witness is uneven. The English keeps close to the visible Ethiopic forms rather than harmonizing them to more familiar spellings.
    reason: textual_variant
  - marker: b
    text: The name rendered 'Turiel' appears more than once in the Ethiopic list, with slight spelling variation. The repetition is preserved rather than silently corrected.
    reason: textual_variant
  - marker: c
    text: Some names in this list are rendered differently in other editions or translations; these differences usually reflect uncertainty in the Ethiopic forms, not a different translation philosophy.
    reason: alternative_reading
  - marker: d
    text: Or 'And these are the names of those angels:'.
    reason: previous_rendering
