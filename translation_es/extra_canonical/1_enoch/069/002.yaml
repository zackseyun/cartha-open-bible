translation:
  language: es
  text: 'Y estos son los nombres de aquellos ángeles[a], y estos son sus nombres: el primero de ellos fue Semyaza, el segundo Artaqifa, el tercero Armen, el cuarto Kokabel, el quinto Turiel[b], el sexto Rumyal, el séptimo Daniyal, el octavo Neqael, el noveno Baraqel, el décimo Azazel, el undécimo Armaros, el duodécimo Batariel, el decimotercero Basasael, el decimocuarto Hananel, el decimoquinto Turiel, el decimosexto Simipesiel, el decimoséptimo Yeterel, el decimoctavo Tumael, el decimonoveno Turiel, el vigésimo Teremael[c][d], y el vigésimo primero Te''azazel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La apertura ge'ez contiene una doble introducción; la repetición se conserva en español en vez de comprimirse en una sola cláusula.
    reason: source_note
  - marker: b
    text: El nombre Turiel aparece más de una vez en la lista; se mantiene la repetición en vez de armonizarla o corregirla.
    reason: textual_variant
  - marker: c
    text: Algunos nombres de esta lista presentan grafías inciertas en el testimonio ge'ez y pueden verse de otro modo en otras ediciones o traducciones.
    reason: alternative_reading
  - marker: d
    text: La forma Teremael sigue de cerca la secuencia visible del testimonio; otras traducciones pueden reflejar otras lecturas posibles.
    reason: alternative_reading
lexical_decisions:
- source_word: ወነዋ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mirad
  - Y ved
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce solemnemente la lista; 'he aquí' conserva el matiz exclamativo/deíctico sin volverlo demasiado coloquial.
- source_word: አስማቲሆሙ
  english_pob_choice: the names of them / their names
  chosen_spanish: los nombres de aquellos ángeles
  alternatives_spanish:
  - sus nombres
  - los nombres de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo pronominal indica posesión/lista perteneciente a ese grupo; en español, la construcción más natural en el encabezado es 'los nombres de aquellos ángeles'.
- source_word: ወዝንቱ፡ ውእቱ፡ አስማቲሆሙ
  english_pob_choice: And these are their names
  chosen_spanish: y estos son sus nombres
  alternatives_spanish:
  - y esta es su lista de nombres
  - y estos son los nombres de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la fórmula de enumeración con concordancia plural natural en español.
- source_word: ቀዳማዊ
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - primer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal introduciendo el primer miembro de la serie.
- source_word: ዚአሆሙ
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - entre ellos
  - de aquellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor partitivo se expresa naturalmente con 'de ellos'.
- source_word: series of ordinals
  english_pob_choice: the second / the third / the fourth ...
  chosen_spanish: el segundo / el tercero / el cuarto ...
  alternatives_spanish:
  - segundo / tercero / cuarto ...
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la estructura ordinal explícita de la lista, sin comprimirla.
- source_word: proper names in Ge'ez witness
  english_pob_choice: Semyaza, Artaqifa, Armen, Kokabel, Turiel, Rumyal, Daniyal, Neqael, Baraqel, Azazel, Armaros, Batariel, Basasael, Hananel, Simipesiel, Yeterel, Tumael, Teremael, Te''azazel
  chosen_spanish: Semyaza, Artaqifa, Armen, Kokabel, Turiel, Rumyal, Daniyal, Neqael, Baraqel, Azazel, Armaros, Batariel, Basasael, Hananel, Simipesiel, Yeterel, Tumael, Teremael, Te'azazel
  alternatives_spanish:
  - formas armonizadas como Daniel, Ramiel, Kokabiel, Turel, etc.
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conservan transliteraciones cercanas al testimonio ge'ez, evitando armonizar silenciosamente con formas más familiares de otras tradiciones.
theological_decisions:
- issue: Whether to normalize the angelic names to familiar later forms
  english_pob_reading: Retain transliterations close to the Ge'ez witness, even where they resemble familiar names in other traditions
  chosen_spanish_reading: Mantener transliteraciones cercanas al testimonio ge'ez, aunque se parezcan a formas más conocidas en otras tradiciones
  alternative_spanish_readings:
  - Normalizar a Daniel, Ramiel, Kokabiel o Turel
  rationale: En una lista onomástica apocalíptica, la fidelidad al testimonio recibido prima sobre la armonización tradicional; así se preserva también la incertidumbre textual.
  doctrine_reference: Translation philosophy §1, §2; restraint in extra-canonical Parables
- issue: Whether to preserve repeated names in the list
  english_pob_reading: Preserve the repetitions as they stand in the Ethiopic witness
  chosen_spanish_reading: Preservar las repeticiones tal como están en el testimonio etiópico
  alternative_spanish_readings:
  - Corregir o suprimir duplicaciones como posibles errores de copia
  rationale: La repetición forma parte del texto transmitido y no debe corregirse sin una base textual más fuerte.
  doctrine_reference: Translation philosophy §3; text-critical restraint
translation_notes:
  revision_awareness: La versión revisada en inglés corrigió la omisión de la apertura enfática 'And behold' y luego la volvió a ajustar a 'And these are'; en español se integró la apertura solemnemente como 'Y he aquí' y se mantuvo la segunda cláusula de lista. También se conservaron las repeticiones y la transliteración cercana al ge'ez, respetando la cautela textual del audit trail.
  spanish_consistency_notes:
  - Se usa 'ángeles' para መላእክት, en concordancia con el audit trail inglés.
  - Se mantiene 'Y he aquí' como apertura apocalíptica solemne, no como simple conector.
  - Los nombres propios se transliteran sin castellanizarlos para no ocultar la variación del testimonio ge'ez.
  - Se conserva la numeración ordinal completa para reflejar la lista sin resumirla.
  - Te'azazel mantiene el apóstrofo para señalar hiato y diferenciarlo de Azazel.
