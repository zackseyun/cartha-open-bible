translation:
  language: es
  text: Y el segundo[a], cuyo nombre era Asbe'el—este enseñó el mal consejo a los santos hijos de Dios[c], y los desvió de modo que contaminaron sus cuerpos[b] con las hijas de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el otro»; el ge'ez ካልእ puede significar «otro» o «segundo», pero aquí el contexto de la enumeración favorece el valor ordinal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «su carne».
    reason: lexical_alternative
  - marker: c
    text: O «a los hijos de los ángeles santos». La sintaxis del ge'ez es difícil, y el pasaje no cuenta aquí con control griego o de Qumrán para fijar la redacción.
    reason: alternative_reading
lexical_decisions:
- source_word: ካልእ
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - otro
  - un segundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de una lista enumerada, el valor ordinal de ካልእ es el que mejor corresponde; por eso se usa «el segundo» y no «otro».
- source_word: ስሙ
  english_pob_choice: whose name was
  chosen_spanish: cuyo nombre era
  alternatives_spanish:
  - su nombre era
  - que se llamaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la fórmula nominal con claridad y evita una traducción demasiado pesada, sin perder la relación posesiva del original.
- source_word: አስብኤል
  english_pob_choice: Asbe'el
  chosen_spanish: Asbe'el
  alternatives_spanish:
  - Asbel
  - Asb'el
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Los nombres propios se transliteran; se conserva la forma con apóstrofo para reflejar la articulación semítica del nombre.
- source_word: አመርሙ
  english_pob_choice: taught
  chosen_spanish: enseñó
  alternatives_spanish:
  - instruyó
  - dio a conocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Enseñó» transmite bien la idea de impartir una doctrina o consejo corrupto, en línea con el contexto de enseñanza perversa.
- source_word: ምክረ እኩየ
  english_pob_choice: the evil counsel
  chosen_spanish: el mal consejo
  alternatives_spanish:
  - el consejo malo
  - el consejo perverso
  - el mal designio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Consejo» conserva el matiz de orientación o propuesta corrupta; «mal consejo» es natural en español y fiel al sentido.
- source_word: ለደቂቀ መላእክት ቅዱሳን
  english_pob_choice: the holy sons of God
  chosen_spanish: los santos hijos de Dios
  alternatives_spanish:
  - los hijos santos de Dios
  - los santos hijos de los ángeles
  - los hijos de los ángeles santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión inglesa que corrigió la frase a «holy sons of God», y en español se mantiene la transparencia lexical de «hijos» sin resolver indebidamente la tensión sintáctica del ge'ez.
- source_word: አስሐቶሙ
  english_pob_choice: led them astray
  chosen_spanish: los desvió
  alternatives_spanish:
  - los extravió
  - los llevó por mal camino
  - los hizo errar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Desvió» resume la idea de apartar del camino correcto; el complemento «de modo que» expresa bien el resultado que sigue en el texto.
- source_word: ያማስኑ
  english_pob_choice: so that they defiled
  chosen_spanish: contaminaron
  alternatives_spanish:
  - profanaron
  - se contaminaron
  - mancharon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el verbo apunta a profanación/impureza corporal; «contaminaron» comunica ese acto de corrupción ritual y moral en español actual.
- source_word: ሥጋሆሙ
  english_pob_choice: their bodies
  chosen_spanish: sus cuerpos
  alternatives_spanish:
  - su carne
  - su carne propia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se adopta la lectura más clara para lectores modernos, sin perder el carácter concreto y corporal del término; la alternativa literal se documenta en nota.
- source_word: በአዋልደ ሰብእ
  english_pob_choice: with the daughters of men
  chosen_spanish: con las hijas de los hombres
  alternatives_spanish:
  - con las hijas de la humanidad
  - por las hijas de los hombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Con» reproduce la relación sexual implícita en el contexto; «hijas de los hombres» sigue de cerca la expresión tradicional del texto sin sustituirla por una paráfrasis.
theological_decisions:
- issue: Cómo verter la lista de seres en ለደቂቀ መላእክት ቅዱሳን
  english_pob_reading: the holy sons of God
  chosen_spanish_reading: los santos hijos de Dios
  alternative_spanish_readings:
  - los santos hijos de los ángeles
  - los hijos santos de Dios
  rationale: La revisión inglesa favoreció «sons of God» sobre «sons of the angels». En español se sigue esa decisión y se evita normalizar la frase a una fórmula más conocida de manera que borre la tensión del ge'ez.
  doctrine_reference: Preservar la tensión textual y evitar una resolución interpretativa no garantizada por la lengua fuente.
- issue: Si ሥጋ debe traducirse como «flesh» o «bodies»
  english_pob_reading: their bodies
  chosen_spanish_reading: sus cuerpos
  alternative_spanish_readings:
  - su carne
  - su carne propia
  rationale: El contexto es la contaminación sexual corporal; «sus cuerpos» es más claro para el lector español contemporáneo, mientras que «su carne» queda como alternativa literal documentada.
  doctrine_reference: Equivalencia óptima con nota de alternativa léxica para mantener auditabilidad.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió «holy sons of the angels» a «holy sons of God» por precisión léxica y naturalidad; esta propuesta española sigue esa revisión. También adopta «el segundo» en lugar de «otro» porque el contexto inmediato enumera claramente una serie ordinal.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general, aunque en este versículo no aparece el nombre divino.
  - Se usa «Dios» para θεός/אֱלֹהים según la pauta del proyecto.
  - Se conserva la transliteración de Asbe'el por tratarse de un nombre propio.
  - «Hijos de los hombres» se mantiene por fidelidad a la tradición textual y a la transparencia del original.
