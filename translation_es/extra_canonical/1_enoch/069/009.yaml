translation:
  language: es
  text: Y enseñó a la humanidad la escritura con tinta y papel[a], y por eso muchos se han extraviado de eternidad a eternidad[b], hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La revisión textual indica que el referente no es una expresión simbólica de ‘tablillas de amargura y engaño’, sino una referencia a la escritura como medio material (tinta y papel).
    reason: textual_variant
  - marker: b
    text: También puede entenderse ‘de edad en edad’; se conserva la fórmula elevada para mantener el ritmo apocalíptico.
    reason: lexical_alternative
lexical_decisions:
- source_word: መሀሮሙ / አበወዎሙ
  english_pob_choice: he taught humankind
  chosen_spanish: enseñó a la humanidad
  alternatives_spanish:
  - les enseñó
  - enseñó a la gente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada indica que el verbo correcto es ‘enseñó’. ‘La humanidad’ conserva el colectivo humano sin exclusión masculina y mantiene el tono general del pasaje.
- source_word: ለሰብእ
  english_pob_choice: to humankind
  chosen_spanish: a la humanidad
  alternatives_spanish:
  - a los seres humanos
  - a la gente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa a la colectividad humana. ‘Humanidad’ es natural en español y conserva el valor colectivo.
- source_word: በቀለም፡ ወበክርታስ / textual object phrase
  english_pob_choice: writing with ink and paper
  chosen_spanish: la escritura con tinta y papel
  alternatives_spanish:
  - escritura con tinta y papiro
  - el escribir con tinta y papel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La nota de revisión aclara que el texto apunta a ‘tinta y papel’. ‘La escritura’ refleja el acto/arte escrito y suena natural en español, sin perder el sentido de tecnología de escritura.
- source_word: ብዙኃን
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - multitudes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Muchos’ reproduce de forma directa la cuantificación del pasaje.
- source_word: እለ ይስሕቱ
  english_pob_choice: have gone astray
  chosen_spanish: se han extraviado
  alternatives_spanish:
  - han errado
  - se han desviado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Extraviarse’ conserva la idea moral de desviación/error sin sonar demasiado técnico. El perfecto compuesto armoniza con ‘hasta este día’.
- source_word: እምዓለም ወእስከ ለዓለም
  english_pob_choice: from eternity to eternity
  chosen_spanish: de eternidad a eternidad
  alternatives_spanish:
  - de siglo en siglo
  - de edad en edad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el registro elevado y la repetición enfática del original, siguiendo la decisión inglesa de no aplanar la fórmula apocalíptica.
- source_word: ወእስከ ዛቲ ዕለት
  english_pob_choice: even to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - incluso hasta hoy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Hasta este día’ es una fórmula española sobria y bíblica que conserva el cierre temporal del versículo.
theological_decisions:
- issue: Objeto de la enseñanza sobre escritura
  english_pob_reading: A written medium associated with harmful knowledge ('writing tablets of bitterness and deceit') / revised as writing with ink and paper
  chosen_spanish_reading: Una enseñanza sobre la escritura como medio material de transmisión, sin suavizar su carga crítica
  alternative_spanish_readings:
  - escritura con tinta y papel
  - tablillas de escritura
  rationale: La revisión auditada corrige un OCR severo y entiende el pasaje como una denuncia del medio de escritura, no como ‘tablillas de amargura y engaño’. La traducción conserva ese enfoque sin introducir detalles no atestiguados por el texto revisado.
  doctrine_reference: Mantener la tensión textual y no retroceder a una lectura tradicional no sustentada por el estado crítico del pasaje.
- issue: Aspecto verbal con 'hasta este día'
  english_pob_reading: have gone astray ... even to this day
  chosen_spanish_reading: se han extraviado ... hasta este día
  alternative_spanish_readings:
  - se extravían ... hasta este día
  - han errado ... hasta este día
  rationale: El perfecto compuesto en español encaja mejor con una condición que llega ‘hasta este día’, preservando la continuidad temporal del enunciado.
  doctrine_reference: Coherencia aspectual y temporal sin alterar el contenido doctrinal del versículo.
translation_notes:
  revision_awareness: 'Se siguió la última revisión auditada que corrige errores graves de OCR: el verbo debe leerse como ‘enseñó’ y la frase objeto como ‘tinta y papel’. Se evitó la lectura anterior de ‘tablillas de amargura y engaño’ por no corresponder al texto revisado.'
  spanish_consistency_notes:
  - Se mantuvo el registro elevado con ‘de eternidad a eternidad’ para reflejar la fórmula repetitiva del original.
  - Se evitó ‘SEÑOR’ o ‘Cristo’ porque no aparecen en este versículo ni en su contexto inmediato.
  - Se usó ‘humanidad’ para un colectivo humano inclusivo y natural en español.
  - La puntuación sigue el flujo de una sola oración coordinada, como en el texto base revisado.
