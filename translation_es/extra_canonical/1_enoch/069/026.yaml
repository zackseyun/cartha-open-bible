translation:
  language: es
  text: Y hubo gran gozo entre ellos[a], y bendijeron, alabaron y exaltaron, porque el nombre de aquel Hijo del Hombre les había sido revelado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El giro ge'ez del título es formalmente difícil. Una traducción más literal podría ser «hijo de la humanidad» o, menos probablemente, «hijo de los vivientes»; aquí se mantiene el título apocalíptico reconocido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወኮኖሙ
  english_pob_choice: and there was among them
  chosen_spanish: Y hubo entre ellos
  alternatives_spanish:
  - Y aconteció entre ellos
  - Y llegó a haber entre ellos
  lexicon: Dillmann
  rationale: La forma introduce un estado o circunstancia resultante. En español, «hubo entre ellos» comunica de modo natural la aparición de esa condición comunitaria sin sugerir un cambio de identidad.
- source_word: ፍሥሐ ዓቢይ
  english_pob_choice: great joy
  chosen_spanish: gran gozo
  alternatives_spanish:
  - gran alegría
  - gran regocijo
  lexicon: Dillmann
  rationale: El sintagma expresa júbilo intenso y solemne. «Gozo» mantiene el tono elevado y bíblico del pasaje, mientras que «gran» conserva la intensidad.
- source_word: ባረኩ ወሰብሑ ወአልዐሉ
  english_pob_choice: blessed and praised and exalted
  chosen_spanish: bendijeron, alabaron y exaltaron
  alternatives_spanish:
  - bendijeron, glorificaron y ensalzaron
  - dieron bendición, alabanza y exaltación
  lexicon: Dillmann
  rationale: Se conservan los tres verbos en secuencia para respetar la fuerza litúrgica repetitiva del texto. «Bendijeron» reproduce bien el primer verbo; «alabaron» y «exaltaron» mantienen la progresión de honra sin suavizarla en una sola idea.
- source_word: በእንተ ዘተከሥተ ሎሙ
  english_pob_choice: because ... had been revealed to them
  chosen_spanish: porque ... les había sido revelado
  alternatives_spanish:
  - porque ... se les había dado a conocer
  - porque ... les había sido manifestado
  lexicon: Dillmann
  rationale: La construcción pasiva comunica bien la revelación recibida. «Les había sido revelado» mantiene la pasiva y el sentido de comunicación divina sin introducir un sujeto explícito ajeno al texto.
- source_word: ስሙ
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - su nombre
  lexicon: Dillmann
  rationale: «El nombre» conserva la formulación definida y el peso de identidad/autoridad del término, en línea con el auditorial inglés.
- source_word: ለውእቱ ወልደ እጓለ እመሕያው
  english_pob_choice: of that Son of Man
  chosen_spanish: de aquel Hijo del Hombre
  alternatives_spanish:
  - de aquel hijo de la humanidad
  - de aquel hijo de los vivientes
  lexicon: Dillmann
  rationale: Se preserva el título apocalíptico reconocido en el contexto de las Parábolas. «Aquel» refleja ውእቱ y marca distancia exaltada, mientras «Hijo del Hombre» mantiene el valor titular sin resolver la tensión formal del giro ge'ez.
theological_decisions:
- issue: Título ወልደ እጓለ እመሕያው
  english_pob_reading: that Son of Man
  chosen_spanish_reading: aquel Hijo del Hombre
  alternative_spanish_readings:
  - aquel hijo de la humanidad
  - aquel hijo de los vivientes
  rationale: Aunque la expresión ge'ez es formalmente inusual, en el marco de las Parábolas funciona como título apocalíptico reconocido. La traducción conserva el título tradicional del pasaje y evita armonizarlo prematuramente con otros usos bíblicos o doctrinales.
  doctrine_reference: Preservar la tensión teológica y el uso local del título en el texto fuente, sin nivelarlo con formulaciones posteriores.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura inglesa auditada y la evidencia ge'ez, sin cambios respecto al sentido confirmado por la revisión más reciente; se conserva la estructura coordinada de tres verbos y el pasivo de revelación.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Hijo del Hombre» se mantiene como título; no se sustituye por una paráfrasis explicativa en el texto principal.
  - 'Se conserva el orden de acciones rituales: bendecir, alabar y exaltar, para reflejar la acumulación verbal del original.'
