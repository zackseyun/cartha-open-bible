revisions:
- from: Y por ese juramento, las estrellas completan sus cursos, y sus nombres son llamados, y responden de edad en edad y para siempre.
  to: Y por ese juramento, las estrellas completan sus cursos, y sus nombres son nombrados, y responden de siglo en siglo y para siempre.
  rationale: 'Se hizo una reparación menor para mejorar la legibilidad y la naturalidad del español sin alterar el sentido documentado: ‘de siglo en siglo’ expresa mejor la fórmula de continuidad del ge''ez, y ‘sus nombres son nombrados’ preserva la pasiva/impersonal de manera más idiomática que ‘son llamados’.'
  reviewer_model: gpt-5.4
