base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/069/021.yaml
  text: And by that oath the stars complete their courses[a], and their names are called[c][b], and they answer from age to age and forever.
  footnotes:
  - marker: a
    text: The line is textually and syntactically compressed in the Ge'ez-only Parables tradition. 'They call their names, and they answer them' may describe the stars themselves, heavenly attendants, or both in an intentionally personified cosmic order.
    reason: textual_variant
  - marker: b
    text: Literally, the closing idiom is 'from age/world ... unto age/world,' a formula of enduring continuance.
    reason: lexical_alternative
  - marker: c
    text: Or 'And in it the courses of the stars complete their circuits, and they call their names, and they answer them'.
    reason: previous_rendering
