review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la corrección principal del audit trail: ማሐላ = ‘juramento’, no ‘curso’, y mantiene la secuencia básica de las estrellas, sus nombres y su respuesta continua. Sin embargo, ‘de edad en edad’ no suena natural ni fiel al giro solemne de continuidad en español bíblico moderno; además, ‘sus nombres son llamados’ es comprensible pero algo duro, y conviene una formulación más idiomática que conserve la ambigüedad pasiva/impersonal.'
  spanish_quality_summary: 'El texto es generalmente claro, pero tiene dos puntos de estilo mejorables: ‘de edad en edad’ resulta poco idiomático en este registro, y ‘son llamados’ suena más torpe que ‘son nombrados’ o ‘son invocados’. Para una Biblia española eclesial legible, hace falta un ajuste menor de naturalidad sin perder la compresión apocalíptica.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El verso no contiene nombres divinos ni términos teológicos sensibles del glosario principal. ‘Juramento’, ‘estrellas’, ‘responden’ y la conservación de la personificación cósmica están alineados con la documentación inglesa.
  issues:
  - severity: medium
    issue: La expresión ‘de edad en edad’ es poco natural en español bíblico contemporáneo.
    rationale: Aunque calca ‘from age to age’, en español ‘edad’ se asocia más a etapas de vida o años de una persona. ‘De siglo en siglo’ o ‘de era en era’ comunican mejor la fórmula solemne de continuidad.
  - severity: low
    issue: ‘Sus nombres son llamados’ es demasiado literal y rígido.
    rationale: La decisión de mantener una construcción pasiva/impersonal es correcta, pero ‘nombrados’ funciona mejor en español formal sin resolver indebidamente quién los llama. También evita una frase algo extraña para lectura pública.
  revised_spanish_text: Y por ese juramento, las estrellas completan sus cursos, y sus nombres son nombrados, y responden de siglo en siglo y para siempre.
  revision_rationale: 'Se hizo una reparación menor para mejorar la legibilidad y la naturalidad del español sin alterar el sentido documentado: ‘de siglo en siglo’ expresa mejor la fórmula de continuidad del ge''ez, y ‘sus nombres son nombrados’ preserva la pasiva/impersonal de manera más idiomática que ‘son llamados’.'
