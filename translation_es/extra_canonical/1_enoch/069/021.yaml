translation:
  language: es
  text: Y por ese juramento, las estrellas completan sus cursos, y sus nombres son nombrados, y responden de siglo en siglo y para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወበውእቱ፡ ማሐላ፡
  english_pob_choice: by that oath
  chosen_spanish: por ese juramento
  alternatives_spanish:
  - por ese juramento solemne
  - y por ese juramento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ajuste correctivo del audit trail indica que ማሐላ significa ‘oath’. En español, ‘juramento’ comunica bien el valor solemne y ritual del término; ‘por’ preserva la función instrumental de la frase.
- source_word: ከዋክብት፡
  english_pob_choice: stars
  chosen_spanish: las estrellas
  alternatives_spanish:
  - los astros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido ordinario es ‘estrellas’. ‘Astros’ sería más general, pero ‘estrellas’ mantiene la imagen apocalíptica concreta sin debilitarla.
- source_word: ይፌጽሙ፡
  english_pob_choice: complete
  chosen_spanish: completan
  alternatives_spanish:
  - cumplen
  - terminan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa llevar algo a su plenitud. ‘Completan’ reproduce ese valor de culminación sin introducir un matiz excesivamente teológico.
- source_word: ምሕዋሪሆሙ፡
  english_pob_choice: their courses
  chosen_spanish: sus cursos
  alternatives_spanish:
  - sus recorridos
  - sus órbitas
  - sus circuitos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB inglesa entiende un movimiento ordenado de los astros. ‘Cursos’ es la opción más natural en español para ese movimiento regular y elevado; ‘órbitas’ sería más técnico y ‘circuitos’ más literal pero menos idiomático.
- source_word: አስማቲሆሙ፡
  english_pob_choice: their names
  chosen_spanish: sus nombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Traducción directa y transparente. Se conserva la concreción nominal del texto.
- source_word: ይጼውዑ፡
  english_pob_choice: their names are called
  chosen_spanish: sus nombres son llamados
  alternatives_spanish:
  - se llaman sus nombres
  - sus nombres son invocados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión crítica del audit trail corrige la voz activa anterior: aquí conviene una pasiva en español para reflejar que el verbo funciona como pasivo impersonal. ‘Son llamados’ mantiene la ambigüedad del sujeto que llama, sin resolverla indebidamente.'
- source_word: ያወሥእዎ፡
  english_pob_choice: they answer
  chosen_spanish: responden
  alternatives_spanish:
  - responden a él
  - contestan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail muestra que el objeto no debe añadirse de forma explícita en esta revisión, porque no está claramente representado en el texto disponible. ‘Responden’ conserva la reciprocidad del verbo sin forzar un complemento.
- source_word: እምዓለም፡ ወእስከ፡ ለዓለም።
  english_pob_choice: from age to age and forever
  chosen_spanish: de edad en edad y para siempre
  alternatives_spanish:
  - de siglo en siglo y para siempre
  - de era en era y para siempre
  - de mundo a mundo y para siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula ge'ez expresa continuidad duradera. ‘De edad en edad’ reproduce el paralelismo y el sentido de duración sin sobrecargarlo con una afirmación metafísica no exigida por el contexto.
theological_decisions:
- issue: La relación entre el juramento, el orden cósmico y la respuesta de las estrellas
  english_pob_reading: 'The stars are portrayed in ordered, quasi-personal responsiveness: their courses are completed, their names are called, and they answer.'
  chosen_spanish_reading: 'Las estrellas aparecen en una obediencia cósmica ordenada: completan su curso, sus nombres son llamados y responden.'
  alternative_spanish_readings:
  - Descripción puramente astronómica del movimiento estelar
  - Referencia a seres celestiales distintos de las estrellas que responden
  rationale: La tradición apocalíptica conserva aquí una personificación o animación del orden celeste. La traducción evita reducirlo a astronomía mecánica y también evita resolver prematuramente si el responder pertenece a las estrellas mismas o a una realidad celestial asociada.
  doctrine_reference: Preservar la tensión literaria y teológica del género apocalíptico; no despersonalizar ni allegorizar en exceso.
translation_notes:
  revision_awareness: 'El audit trail inglés contiene una corrección importante: ማሐላ debe entenderse como ‘juramento’, no como ‘courses’; además, el verbo con sufijo objeto no debe forzarse aquí con un complemento explícito. La versión española sigue esa revisión y evita repetir el error anterior de interpretar el verbo como voz activa con sujetos que llaman.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en el contexto amplio del POB, pero en este versículo no está presente.
  - Se usa ‘estrellas’ en lugar de ‘astros’ para conservar la imagen concreta.
  - Se evita ‘cumplen su carrera’ o fórmulas demasiado bíblicas en español que ocultarían el valor de ‘cursos’ en el movimiento regular de los astros.
  - No se añade nota de pie porque la ambigüedad principal ya queda suficientemente contenida en la redacción española y en las decisiones léxicas.
