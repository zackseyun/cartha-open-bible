  yaml_path: translation/extra_canonical/1_enoch/069/011.yaml
  text: For human beings were not created except to be like the angels[a], so that they might remain pure and righteous; and death, which destroys everything, would not have touched them. But through this knowledge they are being destroyed[d][c][b], and through this power it is consuming me.
  footnotes:
