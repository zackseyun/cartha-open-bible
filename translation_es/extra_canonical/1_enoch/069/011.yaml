  - marker: b
    text: 'The final line is vivid and personal: literally, the power ''consumes'' or ''devours'' me.'
    reason: lexical_alternative
  - marker: c
    text: This section of the Parables lacks effective Greek or Qumran control in this workflow, so uncertain phrases are translated with deliberate restraint.
    reason: textual_variant
