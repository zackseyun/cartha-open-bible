translation:
  language: es
  text: Porque los seres humanos no fueron creados sino para ser como los ángeles, para que permanecieran puros y justos; y la muerte, que destruye todo, no los habría tocado. Pero por este conocimiento[a] son destruidos[d][c][b], y por este poder me está consumiendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula «por este conocimiento son destruidos» es difícil. El ge'ez también puede entenderse como «por este entendimiento perecen».
    reason: lexical_alternative
  - marker: b
    text: 'El último hemistiquio es vívido y personal: literalmente, el poder «me devora» o «me consume».'
    reason: lexical_alternative
  - marker: c
    text: Esta sección de las Parábolas carece aquí de un control eficaz del griego o de Qumrán, por lo que las frases inciertas se traducen con contención deliberada.
    reason: textual_variant
  - marker: d
    text: 'O, según una redacción previa: «Porque ningún ser humano fue creado sino para ser como los ángeles, para que ellos…».'
    reason: previous_rendering
lexical_decisions:
- source_word: ኢተፈጥረ
  english_pob_choice: was created
  chosen_spanish: fueron creados
  alternatives_spanish:
  - llegaron a ser
  - fueron formados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo de creación está explícito en el ge'ez; en español conviene mantener el verbo de creación y el plural colectivo para reflejar el sentido general de la humanidad.
- source_word: ሰብእ
  english_pob_choice: human beings
  chosen_spanish: los seres humanos
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es colectivo y funciona mejor en plural en español para evitar un choque con los pronombres posteriores y conservar el alcance general.
- source_word: ዘእንበለ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, la construcción 'no... sino para' expresa con naturalidad la fuerza restrictiva del original sin perder la relación lógica de excepción.
- source_word: ከመ መላእክት
  english_pob_choice: like the angels
  chosen_spanish: ser como los ángeles
  alternatives_spanish:
  - ser semejantes a los ángeles
  - ser como ángeles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Como los ángeles'' preserva la comparación, no una identidad ontológica; ''ser como'' mantiene mejor la relación que una traducción más interpretativa.'
- source_word: ይንበሩ
  english_pob_choice: might remain
  chosen_spanish: permanecieran
  alternatives_spanish:
  - siguieran
  - moraran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto el verbo apunta a continuidad de estado; 'permanecieran' transmite bien la duración y encaja con los adjetivos siguientes.
- source_word: ንጹሓነ ወጻድቃነ
  english_pob_choice: pure and righteous
  chosen_spanish: puros y justos
  alternatives_spanish:
  - puros y rectos
  - limpios y justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Justos'' conserva el registro ético-religioso habitual de ''righteous'' y suena natural en español bíblico contemporáneo; ''puros'' mantiene el paralelo moral del texto.'
- source_word: ሞት ዘኵሉ ያማሥን
  english_pob_choice: death, which destroys everything
  chosen_spanish: la muerte, que destruye todo
  alternatives_spanish:
  - la muerte, que corrompe todo
  - la muerte, que consume todo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La personificación apocalíptica de la muerte se conserva con 'destruye todo', que reproduce la amplitud universal del relativo.
- source_word: እመ ኢገሰሶሙ
  english_pob_choice: would not have touched them
  chosen_spanish: no los habría tocado
  alternatives_spanish:
  - no se habría acercado a ellos
  - no los habría alcanzado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Tocar'' mantiene la imagen de contacto real y la condición contrafactual; en español resulta más natural que una expresión más literal pero rígida.'
- source_word: አእምሮቶሙ
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - pensamiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Conocimiento'' es la opción más neutral para el sustantivo causal del pasaje; deja abierta la ambigüedad señalada en el testimonio inglés.'
- source_word: ይትሐጐሉ
  english_pob_choice: they are being destroyed
  chosen_spanish: son destruidos
  alternatives_spanish:
  - perecen
  - son arruinados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor pasivo/reflexivo de ruina se expresa de forma sobria en español; el presente conserva la vivacidad del original y del audit trail inglés.
- source_word: ኃይል
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Poder'' es la equivalencia más clara y amplia en español para el término, manteniendo su peso apocalíptico y su ambigüedad semántica.'
- source_word: ይበልዓኒ
  english_pob_choice: it is consuming me
  chosen_spanish: me está consumiendo
  alternatives_spanish:
  - me devora
  - me está devorando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Consumir'' conserva la imagen vívida sin forzar el registro; el reflexivo español ''me está consumiendo'' transmite la acción progresiva y personal.'
theological_decisions:
- issue: Relación entre humanidad y ángeles
  english_pob_reading: Human beings were created to be like the angels in purity and righteousness, not as angels themselves.
  chosen_spanish_reading: Los seres humanos fueron creados para ser como los ángeles, no para ser ángeles.
  alternative_spanish_readings:
  - los seres humanos fueron creados como ángeles
  - solo un grupo especial de humanos es aludido
  rationale: La comparación debe quedar como comparación. El español 'ser como los ángeles' preserva la tensión teológica sin borrar la distinción entre humanidad y seres angélicos.
  doctrine_reference: Mantener la tensión textual sin resolverla; leer el pasaje en su propia antropología apocalíptica.
- issue: Sentido incierto de 'through this knowledge they are being destroyed'
  english_pob_reading: The clause is difficult; the translation keeps 'knowledge' while noting an alternative 'understanding'.
  chosen_spanish_reading: Se conserva 'por este conocimiento son destruidos' como lectura principal, dejando la ambigüedad abierta.
  alternative_spanish_readings:
  - por este entendimiento perecen
  - por este saber son arruinados
  rationale: El pasaje es incierto y debe traducirse con contención. 'Conocimiento' permite reflejar el audit trail inglés sin decidir de antemano si el matiz es cognitivo, moral o nocivo.
  doctrine_reference: Priorizar la evidencia textual y no armonizar la ambigüedad con una interpretación doctrinal externa.
translation_notes:
  revision_awareness: 'La revisión reciente del testimonio inglés corrigió el arranque para resolver un choque de número: de un singular distributivo a un plural colectivo (''human beings''). En español se siguió esa misma lógica, usando plural colectivo (''los seres humanos'') para armonizar con los pronombres posteriores y con la sintaxis natural del pasaje. También se respetó la cautela editorial del audit trail para las frases inciertas, especialmente en la secuencia ''por este conocimiento son destruidos'' y en la línea final de consumición.'
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' por defecto solo cuando aplique; este verso no lo contiene.
  - '''Ángeles'' se mantiene en minúscula por ser sustantivo común en español bíblico.'
  - Se usó 'justos' para 'righteous' por su registro ético-religioso estable en español.
  - Se evitó 'Cristo', 'SEÑOR' y otras sustituciones no presentes en el texto fuente.
  - La puntuación separa claramente la comparación ideal, la cláusula sobre la muerte y las dos afirmaciones finales de deterioro y consumición.
