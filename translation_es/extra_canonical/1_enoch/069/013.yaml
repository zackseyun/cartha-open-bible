translation:
  language: es
  text: Este es el secreto[a] de Kasbeel, el jefe del juramento, que mostró a los santos[b] cuando habitaba en gloria en lo alto; y su nombre[c] es Biqa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: “la fórmula secreta”. El término geʽez puede apuntar, según el contexto, a una realidad oculta o a una formulación revelada.'
    reason: lexical_alternative
  - marker: b
    text: “Los santos” probablemente alude a seres celestiales en esta escena visionaria, aunque se mantiene la expresión literal.
    reason: cultural_note
  - marker: c
    text: 'O: “y el nombre es Biqa”. El posesivo deja abierta la referencia: puede remitir al secreto o al juramento revelado, no necesariamente a Kasbeel mismo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ጐልቁ
  english_pob_choice: secret
  chosen_spanish: secreto
  alternatives_spanish:
  - misterio
  - secreto revelado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; audit trail revision from 'number' to 'secret'
  rationale: La revisión más reciente corrigió una lectura errónea previa y estableció que ጐልቁ se entiende aquí mejor como 'secret'. En español, 'secreto' conserva la carga de cosa revelada y reservada sin añadir más contenido del que permite el texto.
- source_word: ካስብኤል
  english_pob_choice: Kasbeel
  chosen_spanish: Kasbeel
  alternatives_spanish:
  - Kasbiel
  - Qasbeel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Los nombres propios se transliteran. 'Kasbeel' sigue de cerca la forma ge'ez y coincide con la opción auditada en inglés.
- source_word: ርእሰ
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - cabeza
  - líder
  - principal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque literalmente es 'cabeza', en español 'jefe' comunica mejor rango o primacía sin sonar demasiado forzado. Mantiene la idea de preeminencia en un contexto apocalíptico/angélico.
- source_word: ማሐላ
  english_pob_choice: oath
  chosen_spanish: juramento
  alternatives_spanish:
  - juramento solemne
  - oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Juramento'' es el equivalente más natural y digno en español para el valor central del término. ''Oath'' no se usa en español; ''juramento'' preserva la fuerza legal/solemne del vocablo sin explicarlo en exceso.'
- source_word: ዘአርአዩ
  english_pob_choice: which he showed
  chosen_spanish: que él mostró
  alternatives_spanish:
  - que él reveló
  - que él dio a conocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Mostró'' sigue de cerca el verbo de visión/manifestación de la fuente y deja visible la dimensión revelatoria. ''Reveló'' sería posible, pero añade una explicitación interpretativa que el texto no exige.'
- source_word: ለቅዱሳን
  english_pob_choice: to the holy ones
  chosen_spanish: a los santos
  alternatives_spanish:
  - a los seres santos
  - a los santos seres
  - a los santos del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'los santos' es la forma más natural, pero puede sonar eclesial. Se mantiene porque el contexto visionario celeste permite ese uso y porque el inglés POB preserva literalmente la expresión, sin resolverla como 'ángeles'.
- source_word: ሶበ ኆደሩ
  english_pob_choice: when he dwelt
  chosen_spanish: cuando habitaba
  alternatives_spanish:
  - cuando moraba
  - cuando residía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Habitaba'' conserva el registro elevado del original y suena natural en español bíblico contemporáneo. ''Moraba'' sería más tradicional, pero menos neutral; ''residía'' es más frío.'
- source_word: በልዑል በስብሐት
  english_pob_choice: in glory on high
  chosen_spanish: en gloria en lo alto
  alternatives_spanish:
  - en la gloria en lo alto
  - en la gloria de lo alto
  - en gloria celestial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase ge'ez combina altura y gloria; 'en gloria en lo alto' conserva ambos elementos con una cadencia sobria. No se resuelve a una sola idea para no borrar la doble resonancia locativa y doxológica.
- source_word: ወስሙ ቢቃ
  english_pob_choice: and its name is Biqa
  chosen_spanish: y su nombre es Biqa
  alternatives_spanish:
  - y el nombre es Biqa
  - y su nombre es Biqa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se conserva el referente impersonal ''su'' para mantener la ambigüedad auditada en inglés: puede referirse al secreto/juramento revelado más que a Kasbeel mismo. El nombre propio se translitera sin adaptar.'
theological_decisions:
- issue: Identidad de 'los santos' en un marco visionario
  english_pob_reading: holy ones likely refers to heavenly beings, but the phrase is left literal
  chosen_spanish_reading: a los santos
  alternative_spanish_readings:
  - a los seres celestiales
  - a los seres santos
  - a los ángeles
  rationale: El texto de 1 Enoc presenta un escenario visionario celeste; sin embargo, la traducción no debe resolver la identidad con más precisión de la que permite la fuente. Por eso se conserva la expresión literal, dejando visible la ambigüedad interpretativa que también mantiene el inglés POB.
  doctrine_reference: Preservar la tensión interpretativa; no sobre-especificar seres celestiales donde el texto no lo explicita.
- issue: Fuerza de ማሐላ en el contexto de un nombre revelado
  english_pob_reading: retain 'oath' literally, with a note that the term may denote a solemn revealed formula bound up with a name
  chosen_spanish_reading: juramento
  alternative_spanish_readings:
  - secreto juramentado
  - fórmula de adjuración
  - juramento solemne
  rationale: '''Juramento'' comunica la fuerza solemne del término sin introducir especulación. La nota puede señalar que, en este contexto, el juramento está ligado a una fórmula o nombre revelado, pero el texto principal no debe ampliar más allá del soporte ge''ez.'
  doctrine_reference: Primacía del idioma fuente y cautela frente a expansiones interpretativas.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la cadena de revisión: una lectura previa de ጐልቁ como ''number'' fue corregida en el pass más reciente a ''secret''. La versión española sigue esa corrección y evita cualquier rastro de ''número'' o ''tercer nombre''. También se preserva la ambigüedad del referente final (''su nombre'') y la literalidad controlada de ''los santos''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto solo cuando aparece el tetragrámaton; aquí no corresponde.
  - Se conserva transliteración uniforme para Kasbeel y Biqa.
  - Se mantiene un registro bíblico contemporáneo, evitando arcaísmos innecesarios como 'moraba' o 'he aquí'.
  - No se resuelve 'los santos' como 'ángeles' en el texto principal para respetar la ambigüedad del original.
