base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/069/022.yaml
  text: And likewise heaven[a], the spirits of the winds, and all the spirits[d][c][b], and their paths from all the gatherings of spirits.
  footnotes:
  - marker: a
    text: The Ethiopic text of this line is difficult, especially in the middle and final phrases. 'Received' is supplied in English to make the syntax intelligible; the underlying wording may also be understood more literally but less clearly.
    reason: textual_variant
  - marker: b
    text: The term rendered 'paths' may also mean 'ways,' 'courses,' or 'movements.'
    reason: lexical_alternative
  - marker: c
    text: The final phrase could also be understood as referring to every 'company' or 'assembly' of spirits.
    reason: lexical_alternative
  - marker: d
    text: Or 'heaven received their spirits, and all the spirits and their paths from every gathering of spirits.'.
    reason: previous_rendering
