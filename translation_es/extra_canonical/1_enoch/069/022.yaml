translation:
  language: es
  text: Y asimismo el cielo[a], los espíritus de los vientos, y todos los espíritus, y sus caminos[b] desde todas las asambleas[c] de espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto etíope de esta línea es difícil; la sintaxis exacta de la secuencia central y final no es completamente segura. Se conserva la estructura de lista sin añadir un verbo que el original no exige de manera explícita.
    reason: textual_variant
  - marker: b
    text: «Caminos» también puede entenderse como «rutas», «cursos» o «movimientos».
    reason: lexical_alternative
  - marker: c
    text: La frase final también puede entenderse como «desde todas las compañías» o «desde todas las agrupaciones» de espíritus.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሰማይ
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico y cosmológico, «el cielo» conserva el ámbito cósmico sin forzar una pluralidad que el ge'ez no exige. «Cielo» también es natural en español para una lista de elementos celestes.
- source_word: ነፋሳት / ነፋሳቲሆሙ
  english_pob_choice: spirits of the winds
  chosen_spanish: los espíritus de los vientos
  alternatives_spanish:
  - los vientos de los vientos
  - los espíritus
  - los soplos de los vientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto inmediato del pasaje es cósmico, pero la forma ge'ez permite una relación genitiva compleja que la tradición auditada en inglés resolvió como «spirits of the winds». En español, «espíritus de los vientos» mantiene esa solución interpretativa sin reducirla a un simple «vientos» ni borrar la tensión léxica entre viento y espíritu.
- source_word: መንፈሳት
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - vientos
  - seres espirituales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición del término en el verso favorece «espíritus» como sentido gobernante, y en español conserva la amplitud semántica sin imponer una distinción doctrinal más precisa de la que exige el texto.
- source_word: ወፍናዋቲሆሙ
  english_pob_choice: their paths
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus rutas
  - sus movimientos
  - sus cursos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma es oscura y admite varias lecturas. «Caminos» es la opción española más natural para retener la idea de recorridos u orientaciones ordenadas, sin sobreespecificar el matiz cosmológico.
- source_word: እምኵሉ ኅብራት
  english_pob_choice: from all the gatherings of spirits
  chosen_spanish: desde todas las congregaciones de espíritus
  alternatives_spanish:
  - desde todas las asambleas de espíritus
  - desde todos los grupos de espíritus
  - desde todas las compañías de espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Congregaciones» conserva la idea de agrupamientos o conjuntos colectivos y suena natural en español eclesiástico sin convertir el término en una lectura confesional demasiado específica. Además, preserva la ambigüedad del ge'ez entre compañía, asamblea o agrupación.
theological_decisions:
- issue: Cómo reflejar la tensión léxica entre viento y espíritu sin resolverla demasiado pronto
  english_pob_reading: The English audit trail keeps 'spirits' in the verse while noting the cosmological context and the ambiguity of the underlying terms.
  chosen_spanish_reading: Mantener «espíritus» y «espíritus de los vientos» como una solución que preserve la tensión, sin reducir el verso a una lista meramente meteorológica ni convertirlo en un tratado antropológico.
  alternative_spanish_readings:
  - «vientos»
  - «almas»
  - «seres espirituales»
  rationale: El texto ge'ez y la auditoría inglesa muestran que hay ambigüedad real en el campo semántico. En español conviene conservarla para no eliminar el alcance cosmológico del pasaje ni imponer una distinción doctrinal que el verso no desarrolla.
  doctrine_reference: Preservar la tensión textual y evitar una sobrelectura doctrinal.
translation_notes:
  revision_awareness: 'La auditoría inglesa registra una corrección importante: se descartó la lectura que introducía un verbo como «received» y se revisó la frase central para reflejar mejor la relación genitiva del ge''ez. Esta versión española sigue esa revisión y evita añadir un verbo inexistente, conservando la enumeración cósmica y la ambigüedad léxica del original.'
  spanish_consistency_notes:
  - Se usa «cielo» para ሰማይ en sentido cósmico singular.
  - Se conserva «espíritus» para መንፈሳት, evitando resolver el campo semántico viento/espíritu más allá de lo que permite el texto.
  - Se eligió «congregaciones» como equivalente amplio de ኅብራት, compatible con el registro bíblico en español.
  - La puntuación mantiene la estructura enumerativa del verso y no introduce una cláusula verbal ausente en el original.
