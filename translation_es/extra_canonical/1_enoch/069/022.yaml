    reason: textual_variant
  - marker: b
    text: «Caminos» también puede entenderse como «rutas», «cursos» o «movimientos».
    reason: lexical_alternative
  - marker: c
    text: La frase final también puede entenderse como «desde todas las compañías» o «desde todas las agrupaciones» de espíritus.
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor para sustituir «congregaciones» por «asambleas», una opción más neutral y más fiel a la amplitud semántica documentada en el inglés POB y en la evidencia léxica del ge'ez.
