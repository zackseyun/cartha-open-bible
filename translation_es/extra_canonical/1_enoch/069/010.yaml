translation:
  language: es
  text: 'Porque los hombres no nacieron para esto: para fortalecer su fe con pluma y tinta[a][b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «con tinta y con agua de hiel». La imagen es difícil; aquí se entiende como lenguaje de escritura, «pluma y tinta», pero se conserva la cautela interpretativa.
    reason: cultural_note
  - marker: b
    text: «Los hombres» designa aquí a la humanidad en general, no sólo a varones.
    reason: lexical_alternative
  - marker: c
    text: O «para fortalecer su fe por medio de tinta y agua de hiel».
    reason: previous_rendering
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce la razón o explicación de la afirmación previa; «Porque» conserva esa relación causal en un español natural y formal.
- source_word: ኢተወልዱ
  english_pob_choice: were not born
  chosen_spanish: no nacieron
  alternatives_spanish:
  - no fueron engendrados
  - no vinieron a la existencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo negativo de «nacer» expresa bien el origen humano y mantiene la fuerza antropológica del texto sin sobretraducirlo.
- source_word: ሰብእ
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  - las personas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este registro apocalíptico, «los hombres» conserva la concisión elevada del POB inglés, pero se entiende colectivamente como humanidad, no sólo varones.
- source_word: በዘ ከመዝ
  english_pob_choice: for this
  chosen_spanish: para esto
  alternatives_spanish:
  - para tal cosa
  - para este fin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción apunta a finalidad; «para esto» mantiene la brevedad y la referencia teleológica sin añadir explicación interpretativa.
- source_word: በቀለም
  english_pob_choice: by ink
  chosen_spanish: con pluma y tinta
  alternatives_spanish:
  - con tinta
  - por medio de tinta
  - con pluma e tinta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto editorial y la revisión auditada señalan el modismo de escritura mediante «pluma y tinta»; en español suena más natural y preserva la imaginería concreta del instrumento escrito.
- source_word: ወበማየ ሐመት
  english_pob_choice: and by the water of gall
  chosen_spanish: con pluma y tinta
  alternatives_spanish:
  - con agua de hiel
  - con tinta de hiel
  - con tinta ferrogálica
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase ge'ez alude al modismo idiomático de tinta de hierro/gálica asociado a la escritura; dado que el audit trail revisado identifica «pen and ink» como lectura idiomática, se vierte de forma unificada en español con el mismo campo semántico de escritura.
- source_word: ያጽንዑ
  english_pob_choice: to strengthen
  chosen_spanish: afirmar
  alternatives_spanish:
  - fortalecer
  - confirmar
  - hacer firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa hacer firme o robusto; en este contexto contractual/de juramento, «afirmar» reproduce bien la idea de dar validez o firmeza, evitando un matiz excesivamente devocional.
- source_word: ሃይማኖቶሙ
  english_pob_choice: their faith
  chosen_spanish: su buena fe
  alternatives_spanish:
  - su fe
  - su confianza
  - su fidelidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Según la revisión auditada, aquí ሃይማኖቶሙ funciona mejor como «good faith» en un contexto de escritos, pactos u juramentos, no como «fe» religiosa. «Buena fe» preserva esa tensión legal y moral.
theological_decisions:
- issue: ¿Fe religiosa o buena fe contractual en ሃይማኖቶሙ?
  english_pob_reading: The English audit trail preserves 'their faith,' but the adjudicated revision notes that in context of written contracts and oaths the phrase means 'their good faith' or trust.
  chosen_spanish_reading: su buena fe
  alternative_spanish_readings:
  - su fe
  - su confianza
  - su fidelidad
  rationale: El contexto textual y la revisión posterior indican un uso idiomático de confianza/lealtad verificable en escritura y juramento, no una exhortación a la fe religiosa. «Buena fe» mantiene la dimensión ética y jurídica sin borrar la tensión semántica.
  doctrine_reference: Preservar la tensión contextual entre fe religiosa y buena fe jurídica/moral; no resolverla en una lectura devocional.
- issue: Sentido de la imagen de pluma/tinta y la mención original a agua de hiel
  english_pob_reading: The verse criticizes reliance on written or bitterly mediated means to make faith firm, while preserving the unusual imagery transparently.
  chosen_spanish_reading: 'La imagen se conserva como lenguaje de escritura: «pluma y tinta».'
  alternative_spanish_readings:
  - pluma y tinta de hiel
  - tinta ferrogálica
  - agua de hiel
  rationale: La revisión auditada aclara el modismo escribal. En español, «pluma y tinta» comunica el acto de escritura sin oscurecer el verso con una literalidad poco inteligible; al mismo tiempo, evita introducir una explicación doctrinal no garantizada por el texto.
  doctrine_reference: Mantener la transparencia del lenguaje figurado y la cautela interpretativa propia de los Parables.
translation_notes:
  revision_awareness: La presente versión toma en cuenta la revisión auditada que corrigió una lectura anterior más literal de «ink and water of gall» hacia el modismo escribal «pen and ink», y también la nota de contexto que entiende ሃይማኖቶሙ como «good faith» en un marco de contratos/juramentos. Por eso el español evita una traducción devocional de «fe» y preserva el lenguaje jurídico-moral.
  spanish_consistency_notes:
  - Se mantiene «los hombres» con nota aclaratoria para respetar el tono colectivo del original y del POB inglés.
  - Se usa «pluma y tinta» como equivalente idiomático del campo de la escritura, en línea con la revisión auditada.
  - No se introduce «Mesías», «Yahvé» ni otras terminologías ajenas al versículo.
  - La puntuación con dos puntos reproduce la relación explicativa del verso sin expandir el contenido.
