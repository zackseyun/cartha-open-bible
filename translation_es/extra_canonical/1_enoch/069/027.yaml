translation:
  language: es
  text: Y estaba sentado sobre el trono de su gloria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo ge'ez también puede significar 'estaba' o 'permanecía'; aquí se traduce 'estaba sentado' porque el objeto es un trono y la escena es de entronización.
    reason: lexical_alternative
lexical_decisions:
- source_word: ነበረ
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - estuvo
  - estaba
  - permaneció
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto con ዲበ ('sobre') y መንበረ ('trono'), el verbo no se limita a una existencia estática; la escena es de entronización. En español, 'se sentó' comunica mejor la postura regia/judicial que 'estuvo' o 'permaneció'.
- source_word: ዲበ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición significa 'sobre/en'. 'Sobre' es la opción más natural y fiel para el español, y conserva el valor espacial elevado del trono en un registro digno.
- source_word: መንበረ
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento
  - silla
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el sustantivo puede significar 'asiento', en este marco visionario el sentido real es el de un trono. 'Trono' preserva la carga real y judicial del escenario apocalíptico.
- source_word: ስብሐቲሁ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su esplendor
  - su majestad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término abarca gloria/esplendor/alabanza con sufijo posesivo. 'Su gloria' es la traducción más directa y mantiene la fórmula sin introducir matices que el ge'ez no exige aquí.
theological_decisions:
- issue: Si el verbo debe expresar una simple ubicación o una entronización
  english_pob_reading: And he sat upon the throne of his glory.
  chosen_spanish_reading: Y se sentó sobre el trono de su gloria.
  alternative_spanish_readings:
  - Y estaba sobre el trono de su gloria.
  - Y permaneció sobre el trono de su gloria.
  rationale: La sintaxis inmediata favorece la imagen de alguien sentado en un trono, no solo situado allí. En una visión apocalíptica, conviene conservar la idea de entronización y juicio.
  doctrine_reference: Preservar la imaginería apocalíptica y la primacía del texto original sobre una traducción meramente existencial.
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del control cruzado y no introduce cambios respecto del sentido auditable del texto fuente: la escena finaliza con entronización sobre un trono de gloria.'
  spanish_consistency_notes:
  - Se conserva 'trono' para መንበረ y no 'asiento', por coherencia con el contexto regio/judicial.
  - '''Su gloria'' mantiene la estructura posesiva del ge''ez sin sustituirla por una paráfrasis interpretativa.'
  - La nota [a] se ancla en el verbo principal para documentar la alternativa existencial sin borrar la lectura de entronización.
