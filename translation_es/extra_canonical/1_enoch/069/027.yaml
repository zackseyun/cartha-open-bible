review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el ge''ez y la línea del English POB en casi todo: ዲበ = ''sobre'', መንበረ = ''trono'', ስብሐቲሁ = ''su gloria''. La nota también preserva correctamente las alternativas léxicas de ነበረ. Sin embargo, ''se sentó'' en español suele sugerir el acto puntual de tomar asiento, mientras que el inglés ''sat'' aquí funciona más como estado entronizado. Para preservar mejor la imaginería de entronización sin añadir un matiz ingresivo innecesario, conviene ''estaba sentado''.'
  spanish_quality_summary: El español es claro, digno y natural. La única mejora necesaria es evitar que 'se sentó' sugiera demasiado fuertemente el momento de sentarse. 'Estaba sentado sobre el trono de su gloria' suena más idiomático en español bíblico moderno para una escena visionaria y judicial.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Trono', 'gloria' y el registro general son adecuados. La revisión afecta solo la mejor equivalencia aspectual de ነበረ en contexto.
  issues:
  - severity: medium
    issue: '''Se sentó'' introduce un matiz puntual/ingresivo más fuerte de lo que exige el ge''ez ነበረ.'
    rationale: Aunque el English POB eligió 'sat' para preservar la entronización, en español 'se sentó' normalmente describe el acto de sentarse. Dado que la nota ya aclara que el verbo también puede significar 'estaba' o 'permanecía', una formulación estativa como 'estaba sentado' conserva mejor la escena de entronización sin sobreinterpretar el inicio de la acción.
  revised_spanish_text: Y estaba sentado sobre el trono de su gloria[a].
  revised_footnotes:
  - marker: a
    text: El verbo ge'ez también puede significar 'estaba' o 'permanecía'; aquí se traduce 'estaba sentado' porque el objeto es un trono y la escena es de entronización.
    reason: lexical_alternative
