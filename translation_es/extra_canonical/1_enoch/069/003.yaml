translation:
  language: es
  text: Y estos son los jefes de sus ángeles[a], y sus nombres, y los comandantes de sus grupos de cien[b], y los comandantes de sus grupos de cincuenta[c], y los comandantes de sus grupos de diez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El ge''ez enumera una jerarquía por unidades numéricas: cientos, cincuentas y decenas. Esto probablemente refleja divisiones ordenadas o compañías jerarquizadas, no simples totales aritméticos.'
    reason: cultural_note
  - marker: b
    text: El posesivo «sus» se repite en la frase ge'ez a lo largo de esta serie. Su referente exacto lo determina el contexto inmediato.
    reason: lexical_alternative
  - marker: c
    text: O «el comandante de sus cientos, y el comandante de sus cincuentas, y el comandante de sus decenas».
    reason: previous_rendering
lexical_decisions:
- source_word: እሉ
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - aquellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo introduce una lista identificadora inmediata; «estos» conserva mejor la deixis cercana del original que «aquellos».
- source_word: አርእስተ
  english_pob_choice: chiefs
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - líderes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido literal es «cabezas», pero en español «jefes» comunica de forma clara el rango o la función de autoridad sin volver la frase innecesariamente extraña.
- source_word: መላእክቲሆሙ
  english_pob_choice: their angels
  chosen_spanish: sus ángeles
  alternatives_spanish:
  - sus mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En 1 Enoc, el término se refiere normalmente a seres angélicos; «ángeles» conserva esa referencia. Se mantiene el posesivo porque el texto lo repite, aunque su referente exacto depende del contexto.
- source_word: አስማቲሆሙ
  english_pob_choice: their names
  chosen_spanish: sus nombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una equivalencia directa y formal; la secuencia de nombres encaja con el tono de un registro o catálogo.
- source_word: መኰንነ
  english_pob_choice: commander
  chosen_spanish: comandantes
  alternatives_spanish:
  - jefes
  - capitanes
  - gobernantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término aparece en una cadena jerárquica de tipo militar/administrativo. En español, el plural «comandantes» preserva mejor la estructura distributiva que un singular o una traducción más general.
- source_word: ምእት
  english_pob_choice: hundreds
  chosen_spanish: centenas
  alternatives_spanish:
  - cientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se traduce como unidad de rango, no como cantidad matemática aislada. «Centenas» mantiene el valor distributivo y la simetría con «cincuentas» y «decenas».
- source_word: ኀምሳ
  english_pob_choice: fifties
  chosen_spanish: cincuentas
  alternatives_spanish:
  - cincuenta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el plural de unidad jerárquica para reflejar el patrón de rangos sobre unidades de cincuenta.
- source_word: ዐሠርተ
  english_pob_choice: tens
  chosen_spanish: decenas
  alternatives_spanish:
  - diez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Decenas» reproduce el escalonamiento del original y evita reducir la expresión a un número aislado.
- source_word: ዚአሆሙ
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El posesivo se repite en la construcción ge'ez; en español se naturaliza como «sus» manteniendo la referencia posesiva a cada unidad jerárquica.
theological_decisions:
- issue: Cómo representar la jerarquía angélica numerada sin imponer terminología eclesiástica
  english_pob_reading: commander of their hundreds ... fifties ... tens
  chosen_spanish_reading: comandantes de sus centenas ... cincuentas ... decenas
  alternative_spanish_readings:
  - jefes de sus centenas ... cincuentas ... decenas
  - comandantes de sus cientos ... cincuenta ... decenas
  rationale: El pasaje presenta una estructura ordenada de rangos. «Comandantes» conserva el tono administrativo-militar de la cadena de mando sin trasladarlo a vocabulario eclesiástico ni suavizar la fuerza del listado.
  doctrine_reference: Conservar la imaginería apocalíptica y la estructura jerárquica del texto; equivalencia óptima con transparencia formal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la colocación posesiva en la frase jerárquica inglesa. En español se reflejó esa estructura con «sus comandantes de sus centenas/cincuentas/decenas», manteniendo el posesivo repetido del ge'ez y la pluralidad de los cargos. También se preservó el carácter distributivo de las unidades numéricas.
  spanish_consistency_notes:
  - Se prefirió «jefes» para አርእስተ como equivalente natural, pero se reservó «comandantes» para መኰንነ por la fuerza jerárquica del cargo.
  - Se usaron plurales de unidad («centenas», «cincuentas», «decenas») para mantener el paralelismo del original.
  - Se evitó «SEÑOR» y demás convenciones de sustitución porque este versículo no contiene el tetragrámaton ni un caso de κύριος relevante.
