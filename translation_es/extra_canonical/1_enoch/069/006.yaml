revisions:
- from: Y el tercero se llamaba Gadreel[a]; este es el que mostró todos los golpes de muerte[b] a los hijos de los hombres, y extravió a Eva[c], y mostró las armas de muerte a los hijos de los hombres —el escudo, la coraza y la espada para matar—, y todas las armas de muerte a los hijos de los hombres.
  to: Y el tercero se llamaba Gadreel[a]; este es el que mostró todos los golpes de muerte[b] a los hijos de los hombres, y extravió a Eva[c], y mostró las armas de muerte a los hijos de los hombres —el escudo, la coraza y la espada para la matanza— y todas las armas de muerte a los hijos de los hombres.
  rationale: Se propone una revisión menor, no por infidelidad general del borrador, sino para ajustar con más precisión el sintagma final de la lista militar. 'La espada para la matanza' reproduce mejor el valor fuerte de 'for slaughter' y del ge'ez ለቀተል que 'la espada para matar'. También se pule la puntuación para que la frase fluya mejor en español formal.
