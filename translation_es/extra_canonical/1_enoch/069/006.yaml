base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/069/006.yaml
  text: And the third was named Gadreel[a]; this is the one who showed all the blows of death to the children of men, and he led Eve astray[c][b], and he showed the weapons of death to the sons of men—the shield and the breastplate and the sword for slaughter—and all the weapons of death to the children of men.
  footnotes:
  - marker: a
    text: The clause about 'the weapons of death' is textually difficult in this Ge'ez witness and appears with a repeated summary after the list. The translation keeps both the specific list and the repeated closing phrase rather than collapsing them.
    reason: textual_variant
  - marker: b
    text: Or 'all the blows of death.' The underlying expression may refer more broadly to death-dealing assaults or wounds, not only manufactured weapons.
    reason: lexical_alternative
  - marker: c
    text: Or 'all the deadly blows'.
    reason: previous_rendering
