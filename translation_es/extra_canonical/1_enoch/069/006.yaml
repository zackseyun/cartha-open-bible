translation:
  language: es
  text: Y el tercero se llamaba Gadreel[a]; este es el que mostró todos los golpes de muerte[b] a los hijos de los hombres, y extravió a Eva[c], y mostró las armas de muerte a los hijos de los hombres —el escudo, la coraza y la espada para la matanza— y todas las armas de muerte a los hijos de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre se translitera según la forma ge'ez del pasaje; otras grafías posibles en español son secundarias frente al testimonio fuente.
    reason: source_note
  - marker: b
    text: La expresión repite explícitamente el sustantivo 'muerte' en el original; por eso se prefiere 'golpes de muerte' antes que un adjetivo como 'mortales'.
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como 'engañó' o 'hizo errar'; se conserva 'extravió' para mantener la idea de inducir al error sin añadir matices doctrinales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሣልስ
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - tercero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal de presentación en una secuencia; en español requiere artículo para sonar natural y mantener el valor numérico del original.
- source_word: ስሙ
  english_pob_choice: was named
  chosen_spanish: se llamaba
  alternatives_spanish:
  - fue llamado
  - su nombre era
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula nominal en español queda más natural como identificación personal continua, sin perder el sentido de nombramiento.
- source_word: ጋድርኤል
  english_pob_choice: Gadreel
  chosen_spanish: Gadreel
  alternatives_spanish:
  - Gadriel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Nombre propio transliterado conforme a la forma ge'ez atestiguada.
- source_word: ዘአርአየ
  english_pob_choice: who showed
  chosen_spanish: que mostró
  alternatives_spanish:
  - que reveló
  - que enseñó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el verbo reiterado de la fuente sin cargarlo con una glosa interpretativa más fuerte que 'mostrar'.
- source_word: ኵሎ ዝብጠተ ሞት
  english_pob_choice: all the blows of death
  chosen_spanish: todos los golpes de muerte
  alternatives_spanish:
  - todos los golpes mortales
  - todos los golpes de la muerte
  - todas las heridas de muerte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la estructura nominal con 'muerte' como núcleo, siguiendo la observación editorial de que el ge'ez repite explícitamente el sustantivo 'muerte'.
- source_word: ለውሉደ ሰብእ
  english_pob_choice: to the children of men
  chosen_spanish: a los hijos de los hombres
  alternatives_spanish:
  - a los hijos de los hombres
  - a la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reproduce el registro elevado y la fórmula colectiva de la tradición apocalíptica; 'hijos de los hombres' evita suavizar el paralelo con 'children/sons of men'.
- source_word: አስሐታ ለሔዋን
  english_pob_choice: he led Eve astray
  chosen_spanish: extravió a Eva
  alternatives_spanish:
  - engañó a Eva
  - desvió a Eva
  - hizo errar a Eva
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Extraviar'' comunica bien la idea de inducir al error sin sobreespecificar el mecanismo; ''Eva'' es la forma española convencional del nombre.'
- source_word: ንዋየ ሞት
  english_pob_choice: the weapons of death
  chosen_spanish: las armas de muerte
  alternatives_spanish:
  - las armas de la muerte
  - los instrumentos de muerte
  - los implementos de muerte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Armas de muerte'' mantiene el genitivo objetivo del original y su repetición enfática; ''armas'' se ajusta al contexto de la lista militar.'
- source_word: ለደቂቀ ሰብእ
  english_pob_choice: to the sons of men
  chosen_spanish: a los hijos de los hombres
  alternatives_spanish:
  - a los hijos de los hombres
  - a los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la misma fórmula antropológica para no nivelar la variación estilística del texto ge'ez.
- source_word: ወለታ
  english_pob_choice: the shield
  chosen_spanish: el escudo
  alternatives_spanish:
  - el broquel
  - el escudo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término militar claro y exacto en español contemporáneo.
- source_word: ወድርዐ
  english_pob_choice: the breastplate
  chosen_spanish: la coraza
  alternatives_spanish:
  - la coraza
  - la armadura
  - la cota de malla
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Coraza'' funciona como equivalente natural de la pieza de armadura del pasaje, preservando el objeto específico sin forzar un tecnicismo arcaico.'
- source_word: ወሰይፈ ለቀተል
  english_pob_choice: the sword for slaughter
  chosen_spanish: la espada para matar
  alternatives_spanish:
  - la espada para matar
  - la espada de matanza
  - la espada para el degüello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la finalidad violenta de la expresión sin endurecerla con una formulación demasiado técnica o literaria.
theological_decisions:
- issue: Cómo rendir la atribución de la caída de Eva a Gadreel
  english_pob_reading: and he led Eve astray
  chosen_spanish_reading: y extravió a Eva
  alternative_spanish_readings:
  - y engañó a Eva
  - y desvió a Eva
  rationale: La fuente atribuye directamente a Gadreel la acción sobre Eva; se conserva esa relación causal sin armonizarla con tradiciones posteriores ni suavizarla.
  doctrine_reference: Mantener la tensión del testimonio original; primacía del texto fuente sobre la armonización doctrinal.
- issue: Cómo reflejar la repetición explícita de 'muerte' en las expresiones de violencia
  english_pob_reading: all the blows of death ... the weapons of death ... all the weapons of death
  chosen_spanish_reading: todos los golpes de muerte ... las armas de muerte ... todas las armas de muerte
  alternative_spanish_readings:
  - golpes mortales / armas mortales
  - golpes de la muerte / armas de la muerte
  rationale: La repetición de 'muerte' en el ge'ez es parte del efecto retórico y no debe diluirse en adjetivos como 'mortales'.
  doctrine_reference: Respeto de la forma semítica reiterativa del texto; evitar una suavización interpretativa.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que corrigió una primera tendencia a adjetivar la frase como 'deadly blows'; por eso la versión española mantiene el sustantivo 'muerte' de manera reiterada. También se registró el ajuste editorial en inglés de 'coat of mail' a 'breastplate'; en español se optó por 'coraza' como equivalente natural y preciso de la pieza de armadura.
  spanish_consistency_notes:
  - Se mantiene 'Gadreel' como nombre propio transliterado, no traducido.
  - '''Hijos de los hombres'' conserva el registro apocalíptico del original y evita una modernización excesiva.'
  - Se usa 'Eva' como forma española establecida del antropónimo bíblico.
  - 'La secuencia militar conserva lista concreta: escudo, coraza y espada para matar.'
  - No se introduce 'Cristo', 'SEÑOR' ni otras sustituciones no presentes en el texto fuente.
