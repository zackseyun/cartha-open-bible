    reason: lexical_alternative
  - marker: c
    text: The final phrase may also be understood as 'forever' or 'from of old'; the Ge'ez expression carries a broad sense of enduring time.
    reason: alternative_reading
  - marker: d
    text: Or 'and they do not transgress their command from eternity.'.
