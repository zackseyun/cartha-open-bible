review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del ge''ez: medio instrumental («por ese juramento»), sujetos cósmicos («el sol y la luna»), cumplimiento de su movimiento regular, y permanencia dentro del mandato establecido. Sin embargo, la combinación principal «no se apartan de su mandamiento jamás» atenúa el matiz jurídico-apocalíptico documentado en el POB inglés, que prefirió conservar «transgress» en el texto principal. Además, el anclaje de notas [a][b] está mal distribuido: la nota b explica el verbo negativo, no «cursos».'
  spanish_quality_summary: El español es claro y legible, con registro digno y natural. «Cursos» funciona, aunque suena algo literario; sigue siendo aceptable en contexto astral. «Mandamiento» es comprensible, pero junto con «no se apartan» produce una expresión algo menos idiomática que «no transgreden su mandato». La puntuación y el flujo son buenos. La principal necesidad es ajustar el verbo principal y la colocación de notas para mayor fidelidad y limpieza editorial.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas clave son razonables: «juramento», «el sol y la luna», «cursos». La excepción necesaria es preferir «mandato» sobre «mandamiento» en la línea revisada por mejor naturalidad con «transgredir», mientras se preserva el sentido de እምትእዛዞሙ. También conviene alinear el texto principal con la decisión teológica auditada de conservar el matiz de transgresión/obediencia.'
  issues:
  - severity: medium
    issue: El verbo principal «no se apartan» debilita la decisión auditada de conservar el matiz de «transgredir/ sobrepasar».
    rationale: La evidencia léxica reconoce «apartarse» como posibilidad, pero la decisión teológica y el texto inglés POB final conservan el registro jurídico-apocalíptico. En español, «no transgreden su mandato» preserva mejor esa fuerza sin volverse ininteligible.
  - severity: medium
    issue: La nota [b] está anclada a «cursos» aunque explica «no se apartan / no pasar más allá».
    rationale: Los marcadores deben aparecer en la palabra o frase pertinente. Tal como está, [a][b] sobre «cursos» induce a pensar que ambas notas explican el mismo sustantivo.
  - severity: low
    issue: «Mandamiento» es posible, pero menos natural que «mandato» en esta construcción.
    rationale: En español moderno eclesial amplio, «transgredir un mandato» o «una orden» suena más claro que «apartarse de su mandamiento», y evita resonancias excesivas con los Diez Mandamientos que no son necesarias aquí.
  revised_spanish_text: Y por ese juramento el sol y la luna completan sus cursos[a], y no transgreden su mandato[b] jamás[c].
  revised_footnotes:
  - marker: a
    text: «Cursos» también puede entenderse como «circuitos»; el término ge'ez refiere al movimiento regular de los cuerpos celestes.
    reason: lexical_alternative
  - marker: b
    text: O «no sobrepasan su mandato». El verbo presenta al sol y a la luna como permaneciendo dentro del límite impuesto sobre ellos.
    reason: lexical_alternative
  - marker: c
    text: La expresión final puede significar «jamás», «para siempre» o «desde la eternidad»; con verbo negativo, el valor idiomático más natural es un absoluto temporal.
    reason: alternative_reading
  revision_rationale: Se ajusta el verbo principal a «no transgreden» para conservar en el texto principal el matiz jurídico-apocalíptico documentado en el POB inglés y en las decisiones teológicas auditadas. Se cambia «mandamiento» por «mandato» por mayor naturalidad en español con ese verbo. También se corrigen los anclajes de notas para que cada una corresponda a la palabra o frase que explica.
