translation:
  language: es
  text: Y por ese juramento el sol y la luna completan sus cursos[a], y no transgreden su mandato[b] jamás[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cursos» también puede entenderse como «circuitos»; el término ge'ez refiere al movimiento regular de los cuerpos celestes.
    reason: lexical_alternative
  - marker: b
    text: O «no sobrepasan su mandato». El verbo presenta al sol y a la luna como permaneciendo dentro del límite impuesto sobre ellos.
    reason: lexical_alternative
  - marker: c
    text: La expresión final puede significar «jamás», «para siempre» o «desde la eternidad»; con verbo negativo, el valor idiomático más natural es un absoluto temporal.
    reason: alternative_reading
lexical_decisions:
- source_word: ማሐላ
  english_pob_choice: oath
  chosen_spanish: juramento
  alternatives_spanish:
  - oath
  - solemne juramento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo designa un juramento o adjuración vinculante. En español, «juramento» comunica bien el valor solemne y jurídico del pasaje; «oath» se evitaría por no ser español, y «solemne juramento» sería más explicativo que el original.
- source_word: በውእቱ
  english_pob_choice: by that
  chosen_spanish: por ese
  alternatives_spanish:
  - por aquel
  - mediante ese
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición con demostrativo marca instrumento o medio. «Por ese» conserva la fuerza causal/instrumental de forma natural en español.
- source_word: ፀሐይ ወወርኅ
  english_pob_choice: the sun and the moon
  chosen_spanish: el sol y la luna
  alternatives_spanish:
  - sol y luna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Los astros aparecen como actores cósmicos personificados. El artículo definido ayuda a mantener el tono elevado y referencial del pasaje.
- source_word: ይፌጽሙ
  english_pob_choice: complete
  chosen_spanish: completan
  alternatives_spanish:
  - terminan
  - cumplen
  - llevan a cabo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa llevar a término el movimiento asignado. «Completan» es idiomático en español y evita reducirlo a una idea moral de obediencia.
- source_word: ምሕዋሮሙ
  english_pob_choice: their courses
  chosen_spanish: sus cursos
  alternatives_spanish:
  - sus circuitos
  - sus recorridos
  - sus trayectorias
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto del sol y la luna, la palabra alude a su movimiento cíclico u órbita. «Cursos» mantiene la imagen astronómica sin forzar un tecnicismo.
- source_word: ወኢየሐልፉ
  english_pob_choice: and they do not transgress
  chosen_spanish: y no se apartan
  alternatives_spanish:
  - y no transgreden
  - y no pasan más allá
  - y no sobrepasan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo con la preposición sugiere apartarse o salirse del límite establecido. «No se apartan» refleja con naturalidad esa idea en español y evita una traducción demasiado moralizante.
- source_word: እምትእዛዞሙ
  english_pob_choice: their command
  chosen_spanish: de su mandamiento
  alternatives_spanish:
  - de su orden
  - de su decreto
  - de lo mandado para ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede significar mandato, orden o disposición establecida. «Mandamiento» conserva el matiz de norma impuesta, aunque en español bíblico también tenga resonancias más conocidas.
- source_word: እምዓለም
  english_pob_choice: forever / from eternity
  chosen_spanish: jamás
  alternatives_spanish:
  - para siempre
  - desde la eternidad
  - de por siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Con verbo negativo, la expresión funciona idiomáticamente como absoluto temporal: «nunca/jamás». «Jamás» reproduce bien la fuerza de permanencia sin sonar forzado.'
theological_decisions:
- issue: Si mantener el tono astronómico neutro o conservar el matiz de obediencia a un mandato divino
  english_pob_reading: Retain oath and transgress language in the main text
  chosen_spanish_reading: Conservar «juramento», «mandamiento» y la idea de no apartarse del límite impuesto
  alternative_spanish_readings:
  - 'Reducirlo a: «el sol y la luna siguen sus ciclos sin desviarse»'
  - Usar un registro puramente astronómico y omitir la idea de mandato
  rationale: El ge'ez presenta el orden cósmico como sostenido por un juramento y por un mandato al que los astros no se salen. En español conviene mantener esa tensión entre astronomía y obediencia, sin rebajarla a una descripción neutral del movimiento celeste.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El último repaso corrigió la idea de que la frase final debía leerse literalmente como «desde la eternidad»; el consenso revisado favorece un valor idiomático de absoluta negación temporal. Por eso, en español se optó por «jamás», evitando una calca que oscurecería el sentido. También se integró la observación sobre el verbo con preposición, priorizando «no se apartan» frente a una opción más dura como «transgreden».
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico-apocalíptico con vocabulario solemne, pero en español natural.
  - Se evitó «SEÑOR» porque el pasaje no contiene el nombre divino; tampoco hay necesidad de introducir terminología cristiana posterior.
  - «Mandamiento» y «juramento» preservan la fuerza normativa del pasaje sin sobreexplicar.
  - No se usó «Cristo», «Mesías» ni léxico ajeno al contexto.
  - La puntuación y el orden sintáctico siguen un español publicable y claro para lectura litúrgica o académica.
