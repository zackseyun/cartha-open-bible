translation:
  language: es
  text: Y después de este juicio[a], ellos los aterrizarán[b] y los oprimirán[c], porque mostraron esto a los que habitan sobre la tierra seca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de estas cosas». La frase marca la transición de la visión.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los aterrorizarán». El verbo ge''ez expresa causar gran miedo o conmoción.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los maltratarán» o «los acosarán». La revisión del texto favorece «oprimirán» sobre lecturas de expulsión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እምድኅረ ዝ
  english_pob_choice: after this
  chosen_spanish: después de este
  alternatives_spanish:
  - después de estas cosas
  - luego de esto
  - después de esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia temporal apocalíptica se conserva de forma natural en español con «después de este». Como «juicio» queda inmediatamente después, el demostrativo funciona como referencia al evento previo sin forzar la sintaxis.
- source_word: ኵነኔ
  english_pob_choice: the judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - el juicio
  - la sentencia
  - la condena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el término nombra el acto o evento judicial escatológico. «Juicio» es natural en español y conserva la fuerza apocalíptica sin volverlo una noción meramente abstracta.
- source_word: ያደነገፅዎሙ
  english_pob_choice: will terrify them
  chosen_spanish: los aterrizarán
  alternatives_spanish:
  - los aterrorizarán
  - los espantarán
  - los harán temblar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa causar miedo intenso o conmoción. «Aterrizar» en español actual conserva el impacto fuerte y el tono de espanto, aunque «aterrorizar» sería una alternativa más explícita.
- source_word: ያምዕፅዎሙ
  english_pob_choice: oppress them
  chosen_spanish: los oprimirán
  alternatives_spanish:
  - los maltratarán
  - los afligirán
  - los acosarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrigió la lectura anterior: el verbo no significa expulsar, sino oprimir / hacer violencia. «Oprimir» reproduce esa fuerza con fidelidad y mantiene el paralelismo con el verbo anterior.'
- source_word: እስመ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce claramente la causa de la acción venidera. «Porque» es la conexión causal más directa y sobria en español.
- source_word: ዘንተ አርአዩ
  english_pob_choice: they showed this
  chosen_spanish: mostraron esto
  alternatives_spanish:
  - revelaron esto
  - dieron a ver esto
  - hicieron ver esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Mostraron» sigue de cerca el valor de «hacer visible / mostrar» del ge'ez. Se conserva el deíctico «esto» sin especificarlo, como lo hace el texto fuente.
- source_word: ለእለ የኀድሩ
  english_pob_choice: to those who dwell
  chosen_spanish: a los que habitan
  alternatives_spanish:
  - a los que viven
  - a los moradores
  - a los que moran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Habitan» mantiene el registro elevado y evita una paráfrasis excesivamente libre. El complemento con «a» refleja bien el destinatario de lo mostrado.
- source_word: ዲበ የብስ
  english_pob_choice: upon the dry land
  chosen_spanish: sobre la tierra seca
  alternatives_spanish:
  - sobre la tierra firme
  - sobre el terreno seco
  - sobre la tierra árida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez contrasta con agua/mar y remite literalmente a la tierra seca. «Tierra seca» conserva la imagen cosmológica sin reducirla simplemente a «tierra».
theological_decisions:
- issue: Secuencia temporal frente a la frase fija 'after this judgment'
  english_pob_reading: And after this judgment, they will terrify them and oppress them
  chosen_spanish_reading: Y después de este juicio, ellos los aterrizarán y los oprimirán
  alternative_spanish_readings:
  - Y después de este juicio, los aterrizarán y los oprimirán
  - Y después de este juicio, ellos los aterrorizarán y oprimirán
  rationale: La revisión auditada indica que «después de este juicio» forma una unidad temporal, no el sujeto de los verbos siguientes. La puntuación y el orden en español deben reflejar esa relación para no alterar la gramática del pasaje.
  doctrine_reference: Preservar la estructura apocalíptica y la relación temporal del juicio sin convertirlo en agente gramatical.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión adjudicada como corrección mayor: la frase ge''ez እምድኅረ ዝ ኵነኔ debe leerse como una unidad temporal («después de este juicio») y no como si «juicio» fuera sujeto de los verbos. También se incorporó la corrección lexical de ያምዕፅዎሙ como «oprimir».'
  spanish_consistency_notes:
  - Se mantuvo «juicio» para ኵነኔ siguiendo el registro apocalíptico del contexto.
  - Se evitó «SEÑOR» u այլ sustituciones no presentes; el versículo no contiene nombres divinos.
  - «Tierra seca» conserva el contraste cosmológico de የብስ y evita generalizar prematuramente a «mundo» o «humanidad».
