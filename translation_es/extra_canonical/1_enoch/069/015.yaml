review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura del ge''ez y refleja correctamente los puntos clave del audit trail inglés: «este juramento» para el demostrativo proximal, la inclusión de Akae y la imagen concreta de «en la mano». Sin embargo, «la fuerza» no sigue bien la decisión léxica principal inglesa «the power» ni su rationale apocalíptico; «el poder» es más fiel y más natural aquí.'
  spanish_quality_summary: 'El texto es claro y legible, con buen registro bíblico moderno. No obstante, las notas al pie están mal alineadas: [a] se ancla en «juramento» pero comenta «en la mano de Mika''el», y [b] no aporta una alternativa real sino que repite casi el texto principal con una explicación redundante. Conviene reubicar y simplificar las notas.'
  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto. «Juramento» está bien para ማሐላ, «poderoso y firme» está bien para ኃያል / ፅኑዕ, y mantener «Mika'el» respeta la decisión documentada de transliteración en el material fuente/auditado, aunque el inglés final use «Michael». La mejora principal es cambiar «la fuerza» por «el poder».
  issues:
  - severity: medium
    issue: «la fuerza» por ኃይሉ
    rationale: La evidencia y la decisión léxica inglesa priorizan «power» sobre «strength/force» por la eficacia solemne del juramento. En español, «el poder de este juramento» reproduce mejor ese matiz que «la fuerza».
  - severity: medium
    issue: Nota [a] mal anclada
    rationale: El marcador [a] está colocado tras «juramento», pero la nota explica la frase «en la mano de Mika'el». Los marcadores deben aparecer en el punto relevante del texto.
  - severity: low
    issue: Nota [b] redundante y razón inadecuada
    rationale: La nota [b] no preserva una alternativa significativa ni aclara una ambigüedad nueva en español; básicamente repite el texto principal y añade una observación ya integrada en la traducción.
  revised_spanish_text: Y este es el poder de este juramento, porque es poderoso y firme; y puso este juramento, Akae, en la mano de Mika'el[a].
  revised_footnotes:
  - marker: a
    text: La expresión «en la mano de Mika'el» conserva la imagen literal del ge'ez; idiomáticamente, puede implicar encomienda o autoridad.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta ኃይሉ a «el poder» para seguir mejor la decisión léxica auditada y el matiz del original. Se elimina la nota redundante sobre Akae, ya que el nombre propio ya está correctamente incorporado en el texto. Se reubica la única nota al pie al lugar que realmente comenta: «en la mano de Mika''el».'
