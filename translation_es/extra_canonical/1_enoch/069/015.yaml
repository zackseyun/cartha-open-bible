revisions:
- from: Y esta es la fuerza de este juramento[a], porque es poderoso y firme; y puso este juramento, Akae[b], en la mano de Mika'el.
  to: Y este es el poder de este juramento, porque es poderoso y firme; y puso este juramento, Akae, en la mano de Mika'el[a].
  rationale: 'Se ajusta ኃይሉ a «el poder» para seguir mejor la decisión léxica auditada y el matiz del original. Se elimina la nota redundante sobre Akae, ya que el nombre propio ya está correctamente incorporado en el texto. Se reubica la única nota al pie al lugar que realmente comenta: «en la mano de Mika''el».'
