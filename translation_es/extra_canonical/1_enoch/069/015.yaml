translation:
  language: es
  text: Y este es el poder de este juramento, porque es poderoso y firme; y puso este juramento, Akae, en la mano de Mika'el[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «en la mano de Mika'el» conserva la imagen literal del ge'ez; idiomáticamente, puede implicar encomienda o autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኃይሉ
  english_pob_choice: the power
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el poder
  - la potencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez expresa capacidad, vigor o eficacia. En español, «la fuerza» comunica bien esa eficacia solemne del juramento sin sonoridad excesivamente abstracta. «El poder» también sería posible, pero aquí «fuerza» preserva mejor el matiz de energía operativa del acto jurado.
- source_word: ማሐላ
  english_pob_choice: oath
  chosen_spanish: juramento
  alternatives_spanish:
  - oath
  - promesa jurada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el equivalente directo es «juramento», en español bíblico esta palabra resulta clara y natural. Mantiene el peso formal del término sin introducir una glosa innecesaria como «promesa jurada».
- source_word: ኃያል
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - mighty
  - fuerte
  - poderoso y fuerte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo enfatiza la eficacia del juramento. «Poderoso» conserva el registro elevado y el valor dinámico del original; «fuerte» es posible, pero suena algo más plano en este contexto.
- source_word: ፅኑዕ
  english_pob_choice: firm
  chosen_spanish: firme
  alternatives_spanish:
  - estable
  - seguro
  - constante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Firme» es la correspondencia más directa para la estabilidad o fijación del juramento. Forma una pareja natural con «poderoso» y reproduce bien la idea de algo establecido e inconmovible.
- source_word: አንበሮ
  english_pob_choice: he placed
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - puso allí
  - estableció
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite la idea simple de poner/colocar. «Puso» es idiomático en español y mantiene la concreción del acto sin volverlo demasiado interpretativo.
- source_word: በእዴሁ
  english_pob_choice: into the hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - en la mano de
  - bajo la autoridad de
  - a manos de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta del original. Aunque la locución puede implicar encomienda o autoridad, el texto en español mantiene la metáfora corporal transparente y deja la implicación al lector, como en el audit trail inglés.
- source_word: ለሚካኤል
  english_pob_choice: of Mika'el
  chosen_spanish: de Mika'el
  alternatives_spanish:
  - de Miguel
  - de Michael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la transliteración del nombre según la forma ge'ez, en coherencia con la política del proyecto. «Mika'el» preserva la forma del original y evita imponer la forma eclesiástica castellana.
- source_word: አካእ
  english_pob_choice: Akae
  chosen_spanish: Akae
  alternatives_spanish:
  - Aka'e
  - Akae
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto ge'ez incluye un nombre propio asociado al juramento. Se conserva la transliteración estándar breve «Akae» para reflejar ese elemento onomástico sin expandirlo interpretativamente.
theological_decisions:
- issue: Si traducir el idiomático 'into the hand of Michael' de manera concreta o interpretativa
  english_pob_reading: into the hand of Mika'el
  chosen_spanish_reading: en la mano de Mika'el
  alternative_spanish_readings:
  - bajo la autoridad de Mika'el
  - entregado a Mika'el
  rationale: El ge'ez mantiene una imagen corporal concreta que probablemente implica encomienda o autoridad. La traducción española conserva la metáfora de la mano para no borrar la vivacidad apocalíptica del pasaje; la implicación de custodia queda transparente sin ser explicitada en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Si el demostrativo debe ser 'este' y no 'ese/ese juramento'
  english_pob_reading: this oath
  chosen_spanish_reading: este juramento
  alternative_spanish_readings:
  - ese juramento
  - aquel juramento
  rationale: El audit trail revisado corrige el inglés anterior porque el ge'ez usa un demostrativo proximal. Por eso el español debe reflejar «este» y no distanciar indebidamente el referente.
  doctrine_reference: 'Applied revision: 2026-04-22 reviewer correction on demonstrative ዝ'
translation_notes:
  revision_awareness: 'El texto inglés revisado sufrió dos correcciones importantes: el demostrativo debe ser «this» y no «that», y el nombre propio Akae no debe omitirse. La versión española refleja ambas correcciones, conserva la imagen de la mano y traslada el nombre propio ge''ez sin sustituirlo por una forma eclesiástica tradicional.'
  spanish_consistency_notes:
  - Se usó «Mika'el» para mantener la transliteración del nombre propio conforme a la política del proyecto.
  - Se prefirió «juramento» por ser el equivalente natural y estable de ማሐላ en este contexto.
  - Se mantuvo la pareja adjetival «poderoso y firme» para reflejar la fuerza y estabilidad del juramento sin sobrerreformular.
  - Se preservó el demostrativo proximal «este» conforme a la corrección auditada del original.
