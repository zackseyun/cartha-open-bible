translation:
  language: es
  text: 'Y el quinto se llamaba Kasdeya[a]. Este es el que mostró a los hijos de los hombres todos los golpes malignos de los espíritus y de los demonios, y los golpes en el vientre, de modo que el embrión se malogre, y el golpe sobre el alma: la mordedura de la serpiente[f][e][d][c][b], y el golpe que viene al mediodía—el hijo de la serpiente, cuyo nombre es Taba''et.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término ge'ez repetido y aquí vertido como 'golpes' también puede entenderse más ampliamente como 'azotes', 'aflicciones' o impactos dañinos.
    reason: lexical_alternative
  - marker: b
    text: La cláusula sobre el vientre es difícil. El sentido parece ser un daño en el embarazo que resulta en aborto o pérdida del embarazo.
    reason: textual_variant
  - marker: c
    text: La frase 'el golpe sobre el alma' es textualmente incierta en este testigo; la traducción sigue la lectura probable indicada por la OCR.
    reason: textual_variant
  - marker: d
    text: 'O: ''el golpe que ocurre al mediodía''. Las palabras finales pueden identificar este daño de mediodía con un ser serpentino llamado Taba''et.'
    reason: alternative_reading
  - marker: e
    text: 'O: ''los golpes en el vientre, de modo que el embrión se malogre''.'
    reason: previous_rendering
  - marker: f
    text: 'O: ''el golpe sobre el alma''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ኃምስ
  english_pob_choice: the fifth
  chosen_spanish: el quinto
  alternatives_spanish:
  - la quinta figura
  - el quinto de la lista
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal de presentación en una enumeración; en español natural conviene mantener el valor sustantivado con artículo, sin añadir explicaciones que no están en el texto.
- source_word: ስሙ
  english_pob_choice: was named
  chosen_spanish: se llamaba
  alternatives_spanish:
  - fue llamado
  - su nombre era
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula nominativa queda más fluida en español con un verbo pronominal, conservando la identificación nominal sin forzar una traducción mecánica.
- source_word: ካስድያእ
  english_pob_choice: Kasdeya
  chosen_spanish: Kasdeya
  alternatives_spanish:
  - Kasdaya
  - Kasdeja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Nombre propio transliterado de manera conservadora, cercana al consonantismo ge'ez y al uso auditado en inglés.
- source_word: ዘአርአዩ
  english_pob_choice: showed
  chosen_spanish: mostró
  alternatives_spanish:
  - reveló
  - enseñó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa hacer ver / hacer saber; 'mostró' conserva la concreción del acto sin cargarlo de sentido doctrinal adicional.
- source_word: ለውሉደ ሰብእ
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los hijos del hombre
  - la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la expresión apocalíptica elevada, que en español bíblico es inteligible y preserva el registro del original.
- source_word: ኵሎ ዝብጠታተ እኩየ
  english_pob_choice: all the evil blows
  chosen_spanish: todos los golpes malignos
  alternatives_spanish:
  - todos los azotes malignos
  - todos los golpes perversos
  - todas las aflicciones malignas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Golpes'' conserva la imaginería física repetida del ge''ez; ''malignos'' comunica la cualidad nociva de እኩየ sin suavizarla a una mera molestia.'
- source_word: ዘነፍሳት ወዘአጋንንት
  english_pob_choice: of spirits and of demons
  chosen_spanish: de los espíritus y de los demonios
  alternatives_spanish:
  - de espíritus y de demonios
  - de los espíritus y de los demonios malignos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la distinción entre dos clases de agentes/realidades nocivas. En español el artículo definido ayuda a reflejar la referencia específica del pasaje.
- source_word: ባእባአ ማሕፀን
  english_pob_choice: in the womb
  chosen_spanish: al embrión en el vientre
  alternatives_spanish:
  - en el vientre
  - en el útero
  - al vientre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa más reciente entiende la cadena como daño directo al embrión en el vientre. En español, 'al embrión en el vientre' mantiene esa relación objetivo-directa sin romper el orden de la lista.
- source_word: ከመ ይደቅ
  english_pob_choice: so that the embryo miscarries
  chosen_spanish: de modo que aborta
  alternatives_spanish:
  - de modo que se malogra
  - de modo que pierde el embarazo
  - de modo que el embrión miscarries
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se traduce el resultado fatal con un verbo natural en español. Se evita una paráfrasis médica excesiva, pero se conserva el efecto de pérdida del embarazo.
- source_word: '[ዝብጠተ ነፍስ]'
  english_pob_choice: the blows upon the soul
  chosen_spanish: el golpe sobre el alma
  alternatives_spanish:
  - el golpe sobre la vida
  - el golpe del alma
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura auditada distingue aquí un singular textual incierto; se mantiene 'alma' para respetar la carga antropológica/espiritual del pasaje y la tensión textual.
- source_word: ንስክተ አርዌ
  english_pob_choice: the bite of the serpent
  chosen_spanish: la mordida de la serpiente
  alternatives_spanish:
  - la mordedura de la serpiente
  - la mordida del serpiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Mordida'' reproduce el acto concreto de ataque serpentino con un español claro y digno; evita una imagen demasiado técnica o arcaizante.'
- source_word: ዘይከውን በቀትር
  english_pob_choice: that comes at noon
  chosen_spanish: que viene al mediodía
  alternatives_spanish:
  - que ocurre al mediodía
  - que sucede al mediodía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el valor temporal preciso del original. 'Al mediodía' mantiene la posible carga ominosa sin generalizarla.
- source_word: ወልዳ ለአርዌ
  english_pob_choice: the son of the serpent
  chosen_spanish: el hijo de la serpiente
  alternatives_spanish:
  - el descendiente de la serpiente
  - la cría de la serpiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hijo'' preserva el registro mítico-apocalíptico y la relación filial explícita del ge''ez mejor que una formulación biológica.'
- source_word: ዘስሙ ተባዕት
  english_pob_choice: whose name is Taba'et
  chosen_spanish: cuyo nombre es Taba'et
  alternatives_spanish:
  - llamado Taba'et
  - de nombre Taba'et
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula de nombre directa y conservadora; se deja la vocalización como transliteración prudente dada la incertidumbre del valor exacto.
theological_decisions:
- issue: Naturaleza de los males enseñados por Kasdeya
  english_pob_reading: A list of occult or demonic afflictions, including miscarriage, spiritual harm, serpent-bite, and a noonday strike
  chosen_spanish_reading: Una lista de golpes o aflicciones malignas de origen espiritual o demoníaco, con daño al embarazo, al alma, mordida de serpiente y un golpe del mediodía
  alternative_spanish_readings:
  - Una lista de conocimientos sobre heridas físicas
  - Una lista de fórmulas mágicas en lugar de aflicciones
  rationale: El contexto de espíritus, demonios, vientre, alma y serpiente exige mantener el carácter de daños nocivos, no neutralizarlo como simple saber técnico. 'Golpes' conserva la imagen repetida del original.
  doctrine_reference: Preservar el imaginario apocalíptico y demonológico sin diluirlo en prosa genérica.
- issue: Referencia de 'el hijo de la serpiente, cuyo nombre es Taba'et'
  english_pob_reading: It apposes or further specifies the noonday blow/serpentine harm rather than introducing a wholly separate narrative figure
  chosen_spanish_reading: Se entiende como una apposición o especificación del golpe del mediodía y del daño serpentino, no necesariamente como un personaje aparte
  alternative_spanish_readings:
  - Un demonio distinto enseñado por Kasdeya
  - Una glosa que identifica solamente a la serpiente
  rationale: La sintaxis es condensada y ambigua; conviene conservar esa tensión en español en vez de resolverla de modo definitivo. La puntuación con dos puntos deja abierta la relación exacta.
  doctrine_reference: Preservar la ambigüedad textual y no imponer una identificación más precisa que la que el testigo permite.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente que mantiene una sola oración coherente y distingue el daño al embrión en el vientre del golpe sobre el alma. También conserva la incertidumbre textual de la secuencia final, especialmente en la relación entre el golpe del mediodía y 'el hijo de la serpiente'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma preferente para el nombre divino cuando aparezca en otros contextos del proyecto; este versículo no lo contiene.
  - Se mantiene 'espíritus' y 'demonios' como distinción conceptual, sin fusionarlos.
  - '''Golpes'' se conserva de manera uniforme para reflejar la repetición léxica del ge''ez.'
  - La puntuación con dos puntos en la segunda mitad intenta reflejar la estructura comprimida del original sin sobreexplicar la conexión final.
