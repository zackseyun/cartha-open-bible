  - severity: low
    issue: La nota [a] sobre ‘Señor de los espíritus’ no es necesaria como nota del lector en este verso.
    rationale: El español principal ya comunica bien el título. La nota explica una decisión editorial de capitalización más que una alternativa significativa exigida por la fuente. Puede omitirse para evitar sobreanotación.
