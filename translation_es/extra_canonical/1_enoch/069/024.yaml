base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/069/024.yaml
  text: All these will believe and give thanks before the Lord of Spirits[a], and they will bless with all their power, and their food will be in all thanksgiving[c][b]; and they will give thanks and bless and exalt the name of the Lord of Spirits forever and ever.
  footnotes:
  - marker: a
    text: Or 'their possessions' or 'their substance' for 'their wealth'; the Ge'ez term likely refers broadly to what they have at their disposal, not only money.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'in thanksgiving' is compressed in the Ge'ez and may also be understood as 'with all thanksgiving.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and with all their wealth in thanksgiving;'.
    reason: previous_rendering
