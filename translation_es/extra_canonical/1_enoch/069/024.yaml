translation:
  language: es
  text: Todos estos creerán y darán gracias delante del Señor de los Espíritus, y bendecirán con todo su poder, y su alimento será en completa acción de gracias[a][b]; y darán gracias, bendecirán y exaltarán el nombre del Señor de los Espíritus por los siglos de los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge’ez es breve y puede entenderse también como ‘con completa acción de gracias’.
    reason: lexical_alternative
  - marker: b
    text: La revisión auditada corrigió una lectura anterior de ‘wealth’ por ‘food’; por eso aquí se traduce ‘su alimento’.
    reason: source_note
lexical_decisions:
- source_word: ያአምኑ
  english_pob_choice: will believe
  chosen_spanish: creerán
  alternatives_spanish:
  - tendrán fe
  - confiarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa creer/fiar. ‘Creerán’ reproduce con naturalidad el sentido directo y mantiene el matiz futuro de la respuesta de adoración sin imponer formulaciones doctrinales posteriores.
- source_word: የአኵቱ
  english_pob_choice: give thanks
  chosen_spanish: darán gracias
  alternatives_spanish:
  - alabarán
  - confesarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición cercana de lenguaje de gratitud favorece ‘dar gracias’. ‘Alabar’ es posible, pero aquí la secuencia verbal distingue mejor gratitud, bendición y exaltación.
- source_word: በቅድመ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Delante de’ conserva el tono cultual y formal del espacio de adoración, y suena natural en español bíblico contemporáneo.
- source_word: እግዚአ መንፈሳት / እግዚአ መናፍስት
  english_pob_choice: Lord of Spirits
  chosen_spanish: Señor de los Espíritus
  alternatives_spanish:
  - Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título como nombre divino fijo de 1 Enoc. En español, la mayúscula en ‘Espíritus’ ayuda a conservar el carácter titular y evita reducirlo a una descripción genérica.
- source_word: ይሴብሑ
  english_pob_choice: will bless
  chosen_spanish: bendecirán
  alternatives_spanish:
  - alabarán
  - lo bendecirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Bendecirán’ preserva la serie de verbos de culto sin confundirla con el verbo de dar gracias. Aunque en español puede sonar menos transparente que ‘alabarán’, aquí refleja mejor la secuencia del original.
- source_word: በኵሉ ኃይሎሙ
  english_pob_choice: with all their power
  chosen_spanish: con todo su poder
  alternatives_spanish:
  - con toda su fuerza
  - con todas sus fuerzas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Poder’ traduce bien el sentido totalizador de capacidad/fortaleza y mantiene el registro solemne de la frase.
- source_word: ሲሳዮሙ
  english_pob_choice: their food
  chosen_spanish: su alimento
  alternatives_spanish:
  - su comida
  - su sustento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión auditada que corrigió ‘wealth’ por ‘food’. ‘Alimento’ es más amplio y digno que ‘comida’, y conserva la imagen de sustento en clave apocalíptica.
- source_word: በኵሉ አኰቴት
  english_pob_choice: in all thanksgiving
  chosen_spanish: en toda acción de gracias
  alternatives_spanish:
  - con toda acción de gracias
  - en toda gratitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es comprimida en ge’ez y permite una lectura adverbial o modal. ‘En toda acción de gracias’ mantiene la ambigüedad útil entre estado y modo, y suena idiomático en español bíblico.
- source_word: ያሌዕሉ
  english_pob_choice: exalt
  chosen_spanish: exaltarán
  alternatives_spanish:
  - ensalzarán
  - glorificarán
  - elevarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '‘Exaltar’ conserva el valor de elevar o ensalzar y mantiene la progresión de los tres verbos finales: dar gracias, bendecir y exaltar.'
- source_word: ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre jamás
  - por toda la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la equivalencia española más estable para la fórmula de duración eterna y conserva el tono litúrgico del cierre.
theological_decisions:
- issue: Título divino እግዚአ መንፈሳት / እግዚአ መናፍስት
  english_pob_reading: Lord of Spirits
  chosen_spanish_reading: Señor de los Espíritus
  alternative_spanish_readings:
  - Señor de los espíritus
  rationale: En 1 Enoc este sintagma funciona como título divino estable, no como una descripción ocasional. La mayúscula en ‘Espíritus’ ayuda a preservar el carácter titular y la resonancia apocalíptica del nombre.
  doctrine_reference: Preservar títulos divinos y su fuerza literaria en la traducción; no normalizar el título a un genérico.
- issue: Lectura de ሲሳይ y la imagen cultual del alimento
  english_pob_reading: their food will be in all thanksgiving
  chosen_spanish_reading: su alimento será en toda acción de gracias
  alternative_spanish_readings:
  - su alimento será con toda acción de gracias
  - su sustento será en toda acción de gracias
  rationale: 'La revisión textual auditada corrige una lectura errónea como ‘wealth’ y favorece ‘food’. La traducción debe conservar la imagen extraña pero intencional: el alimento mismo queda cualificado por la acción de gracias.'
  doctrine_reference: Atender a la revisión textual y preservar la imaginería apocalíptica sin domesticarla.
translation_notes:
  revision_awareness: Se incorporó la corrección auditada que descarta ‘wealth/substance’ y entiende ሲሳይ como ‘food/nourishment’. También se respetó la preferencia revisada por una forma futura uniforme (‘será’) en la cláusula sobre el alimento. La formulación final conserva la serie de verbos de adoración y el título fijo ‘Señor de los Espíritus’.
  spanish_consistency_notes:
  - Se mantuvo ‘Señor de los Espíritus’ como título divino estable, no como simple perífrasis.
  - Se tradujo የአኵቱ / ይሴብሑ con dos verbos distintos en español para preservar la repetición diferenciada del original.
  - Se evitó ‘Cristo’ y ‘SEÑOR’ porque el testimonio fuente aquí exige el título propio ‘Señor de los Espíritus’.
  - ‘Su alimento será en toda acción de gracias’ conserva la sintaxis algo comprimida del ge’ez sin volverla opaca.
