translation:
  language: es
  text: Y estas son las cosas ocultas de este juramento[a]… y fue hecho firme por su juramento, y el cielo fue suspendido antes de que el mundo fuera creado[c][d][b], y por ello para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El inicio es textualmente difícil en este testimonio etíope; los puntos suspensivos indican transmisión dañada o incierta después de «este juramento».
    reason: textual_variant
  - marker: b
    text: O «los secretos de este juramento».
    reason: lexical_alternative
  - marker: c
    text: La frase final es oscura en este testimonio; literalmente, «y por ello para siempre». El referente de «ello» puede ser el juramento, el cielo o el mundo creado.
    reason: alternative_reading
  - marker: d
    text: O «por ello».
    reason: previous_rendering
lexical_decisions:
- source_word: እሉንቱ
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - estas cosas
  - estas mismas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo plural introduce el contenido que sigue. «Estas» conserva brevedad y naturalidad en español.
- source_word: ኅቡኣቲሁ
  english_pob_choice: the hidden things
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - los secretos
  - las cosas secretas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ocultas» mantiene el valor de lo escondido o velado sin reducirlo a información meramente intelectual. «Cosas» ayuda a naturalidad en español y preserva el carácter concreto del pasaje.
- source_word: ለዝ ማሐላ
  english_pob_choice: of this oath
  chosen_spanish: de este juramento
  alternatives_spanish:
  - de este voto
  - concernientes a este juramento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se traduce la relación genitiva con «de». «Juramento» es el equivalente más natural y fiel para el término en este contexto solemne.
- source_word: ፅኑዕ
  english_pob_choice: made firm
  chosen_spanish: fue hecho firme
  alternatives_spanish:
  - fue establecido
  - fue afirmado
  - quedó firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva/resultativa del ge'ez se conserva con una forma española clara. «Hecho firme» mantiene el énfasis en estabilidad y solemnidad sin suavizarlo.
- source_word: በመሐላሁ
  english_pob_choice: by his oath
  chosen_spanish: por su juramento
  alternatives_spanish:
  - por medio de su juramento
  - mediante su juramento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición instrumental se expresa mejor con «por». «Su» respeta la referencia pronominal del texto fuente.
- source_word: ሰማይ
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el firmamento
  - los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español bíblico contemporáneo, «el cielo» comunica de forma natural la esfera cosmológica del pasaje. «Firmamento» sería más interpretativo.
- source_word: ተሰቅለ
  english_pob_choice: was suspended
  chosen_spanish: fue suspendido
  alternatives_spanish:
  - fue colgado
  - quedó suspendido
  - fue puesto en suspensión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Suspendido» reproduce la imagen cósmica de algo que pende o queda colgado, sin domesticarla. «Fue suspendido» mantiene el tono solemne.
- source_word: ዘእንበለ ይትፈጠር ዓለም
  english_pob_choice: before the world was created
  chosen_spanish: antes de que el mundo fuera creado
  alternatives_spanish:
  - antes de que el mundo existiera
  - antes de la creación del mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula expresa prioridad temporal. «Mundo» es el equivalente más directo de ዓለም aquí, y la construcción pasiva conserva la idea de creación.
- source_word: ወእስከ ለዓለም
  english_pob_choice: and forever
  chosen_spanish: y por él para siempre
  alternatives_spanish:
  - y para siempre
  - y hasta la eternidad
  - y para siempre por ello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase final es oscura y el referente de «él/ello» puede ser el juramento, el cielo o el mundo. Se mantiene la ambigüedad con un pronombre anafórico en español, siguiendo el valor instrumental del texto y la revisión del inglés POB.
- source_word: ቦቱ
  english_pob_choice: by it
  chosen_spanish: por él
  alternatives_spanish:
  - en él
  - sobre él
  - por ello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige la lectura anterior de localización hacia instrumentalidad. «Por él» preserva esa relación y mantiene la ambigüedad del referente.
theological_decisions:
- issue: Alcance de las «cosas ocultas» vinculadas al juramento
  english_pob_reading: The phrase refers to concealed cosmic realities or powers associated with the oath, not merely abstract doctrines.
  chosen_spanish_reading: La frase se entiende como realidades cósmicas veladas asociadas con el juramento, no solo como doctrinas abstractas.
  alternative_spanish_readings:
  - los secretos de este juramento
  - los misterios contenidos en este juramento
  rationale: El contexto de 1 Enoc 69 es visionario y cósmico. «Cosas ocultas» conserva la concreción apocalíptica sin reducir el pasaje a lenguaje doctrinal general.
  doctrine_reference: Preservar el registro apocalíptico y su imaginería cósmica; no domesticarlo.
- issue: Imagen cosmológica del cielo suspendido
  english_pob_reading: Heaven 'was suspended' as a vivid cosmological statement.
  chosen_spanish_reading: «El cielo fue suspendido» conserva la imagen visionaria de un cielo colgante o sostenido.
  alternative_spanish_readings:
  - el cielo fue establecido
  - el cielo fue fijado
  rationale: El verbo de origen sugiere suspensión real, no mera fundación. Mantener la imagen evita suavizar la fuerza cosmológica del texto.
  doctrine_reference: Conservar el lenguaje visionario y apocalíptico.
- issue: Ambigüedad del referente en la cláusula final
  english_pob_reading: The final phrase is obscure; the referent of 'it' may be the oath, heaven, or the created world.
  chosen_spanish_reading: La frase final conserva la ambigüedad del referente con «por él», sin resolverla artificialmente.
  alternative_spanish_readings:
  - y para siempre por ello
  - y sobre ello para siempre
  rationale: La revisión inglesa reconoce que el pasaje es oscuro. El español debe reflejar esa incertidumbre y no forzar una identificación definitiva.
  doctrine_reference: Respetar la incertidumbre textual y no sobreinterpretar.
translation_notes:
  revision_awareness: Se siguió la revisión auditada más reciente del inglés POB, que corrigió la relación de ቦቱ desde una lectura locativa («sobre ello») hacia una lectura instrumental o relacional («por ello»), y se mantuvo la ambigüedad del referente final. También se conservó el carácter textualmente incierto del inicio con puntos suspensivos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el fuente lo requiera; aquí no aparece.
  - Se prefiere «juramento» para ማሐላ y no «voto», por fidelidad contextual.
  - Se mantiene «cielo» en lugar de «firmamento» por el registro cosmológico del pasaje.
  - La puntuación con puntos suspensivos refleja la laguna señalada en el testimonio.
