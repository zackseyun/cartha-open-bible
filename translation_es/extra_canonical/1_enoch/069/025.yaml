base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/069/025.yaml
  text: And over them this oath became strong[a], and they are kept by it; and their paths are kept[c][b], and their courses do not perish.
  footnotes:
  - marker: a
    text: Or 'their ways were guarded, and their circuits do not fail.' The Ge'ez wording allows either a more general sense ('ways') or a more ordered/cosmic sense ('courses, circuits').
    reason: lexical_alternative
  - marker: b
    text: The line is textually difficult in the Ethiopic witness, and the repeated passive verb may indicate both that they are kept by the oath and that their paths are kept under it.
    reason: textual_variant
  - marker: c
    text: Or 'And among them the oath became strong, and they were kept by it; and their paths were kept'.
    reason: previous_rendering
