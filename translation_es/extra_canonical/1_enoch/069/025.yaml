translation:
  language: es
  text: Y sobre ellos este juramento se fortaleció, y por él son guardados[b]; y sus senderos[a][c] son guardados, y sus cursos no perecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «y sus caminos se guardan, y sus circuitos no fallan». El geʽez permite una lectura más general («caminos») o una más ordenada y cósmica («cursos, circuitos»).'
    reason: lexical_alternative
  - marker: b
    text: La línea es textualmente difícil en el testimonio etiópico, y el verbo pasivo repetido puede indicar tanto que ellos son guardados por el juramento como que sus senderos son guardados bajo él.
    reason: textual_variant
  - marker: c
    text: 'O: «Y entre ellos el juramento se fortaleció, y ellos eran guardados por él; y sus caminos eran guardados».'
    reason: previous_rendering
lexical_decisions:
- source_word: ዲቤሆሙ
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - por encima de ellos
  lexicon: Dillmann
  rationale: La preposición indica una fuerza que recae con autoridad sobre ellos; «sobre ellos» conserva esa relación sin volverla demasiado idiomática ni suavizarla hacia «entre ellos».
- source_word: ዝማሐላ
  english_pob_choice: this oath
  chosen_spanish: este juramento
  alternatives_spanish:
  - este juramento solemne
  - este voto
  lexicon: Dillmann
  rationale: «Juramento» comunica con claridad el campo semántico del sustantivo derivado del acto de jurar. «Voto» sería menos preciso en español bíblico; se evita «pacto» porque el término original apunta al juramento mismo.
- source_word: ጸንዐ
  english_pob_choice: became strong
  chosen_spanish: se hizo fuerte
  alternatives_spanish:
  - se volvió firme
  - se fortaleció
  - se hizo firme
  lexicon: Dillmann
  rationale: La idea central es de firmeza o consolidación. «Se hizo fuerte» mantiene el matiz dinámico de establecimiento sin imponer una lectura jurídica exclusiva.
- source_word: ይትዓቀቡ
  english_pob_choice: are kept
  chosen_spanish: son guardados
  alternatives_spanish:
  - son mantenidos
  - son preservados
  - son custodiados
  lexicon: Dillmann
  rationale: El pasivo puede sugerir tanto custodia como sujeción. «Son guardados» conserva esa ambigüedad mejor que un término más interpretativo.
- source_word: ቦቱ
  english_pob_choice: by it
  chosen_spanish: por él
  alternatives_spanish:
  - por medio de él
  - a través de él
  - mediante él
  lexicon: Dillmann
  rationale: El juramento funciona como medio o instrumento. «Por él» es breve y natural en español, y mantiene la referencia instrumental sin añadir explicaciones.
- source_word: ፍናዊሆሙ
  english_pob_choice: their paths
  chosen_spanish: sus senderos
  alternatives_spanish:
  - sus caminos
  - sus sendas
  lexicon: Dillmann
  rationale: «Senderos» preserva la imagen de trayecto ordenado y evita que «caminos» suene demasiado abstracto o cotidiano en este contexto apocalíptico.
- source_word: ምሕዋራቲሆሙ
  english_pob_choice: their courses
  chosen_spanish: sus cursos
  alternatives_spanish:
  - sus órbitas
  - sus recorridos
  - sus circuitos
  lexicon: Dillmann
  rationale: El plural sugiere recorridos ordenados, posiblemente cósmicos. «Cursos» conserva esa lectura de movimiento regulado sin fijarla demasiado a una sola imagen astronómica.
- source_word: ኢይማስን
  english_pob_choice: do not perish
  chosen_spanish: no perecen
  alternatives_spanish:
  - no desaparecen
  - no fallan
  - no se pierden
  lexicon: Dillmann
  rationale: «Perecer» mantiene el registro elevado y la negación de ruina o desaparición final. En español fluye mejor con el presente general del verso que «no perecen».
theological_decisions:
- issue: Si el verso describe sujeción jurídica, custodia protectora, o un orden cósmico estable
  english_pob_reading: 'The verse is rendered to preserve ambiguity: the oath firmly orders and keeps those under it, and their paths/courses remain intact.'
  chosen_spanish_reading: 'El verso se vierte preservando la ambigüedad: el juramento se impone y los mantiene bajo su fuerza, y sus senderos/cursos permanecen intactos.'
  alternative_spanish_readings:
  - El juramento los obliga a obedecer
  - El juramento preserva el orden de las esferas cósmicas
  - El juramento cumple a la vez una función de sujeción y de estabilización cósmica
  rationale: La combinación de «son guardados», «senderos» y «cursos» permite leer tanto sujeción como conservación del orden. No se debe resolver la tensión en una sola categoría moderna.
  doctrine_reference: Preservar la tensión teológica y cosmológica del texto, sin armonizarla en exceso.
- issue: Valor del demostrativo en «este juramento»
  english_pob_reading: this oath
  chosen_spanish_reading: «este juramento» señala un acto presente y definido, no un juramento genérico.
  alternative_spanish_readings:
  - el juramento
  - aquel juramento
  rationale: El demostrativo es relevante porque subraya la inmediatez y singularidad del juramento en cuestión. Traducirlo como artículo simple debilitaría ese énfasis.
  doctrine_reference: Respeto del deíctico textual.
translation_notes:
  revision_awareness: 'El texto sigue la revisión más reciente del expediente: ዲቤሆሙ se entiende como «over them» y ዝ como demostrativo «this», por lo que se traduce «sobre ellos este juramento». También se conserva el presente de «are kept» y la clausula final sobre la no desaparición/perdición de los cursos.'
  spanish_consistency_notes:
  - Se mantiene «juramento» para ዝማሐላ, coherente con el valor verbal del término.
  - Se usa «guardados» para abarcar tanto custodia como sujeción, manteniendo la ambigüedad documentada.
  - «Senderos» y «cursos» distinguen dos términos cercanos sin colapsarlos; la primera imagen es más general, la segunda más ordenada/cósmica.
  - Se evita «SEÑOR» o terminología litúrgica ajena, porque el texto no contiene el Tetragrámaton ni un equivalente contextual que lo requiera.
