translation:
  language: es
  text: Y la tierra fue fundada sobre las aguas[a], y desde los lugares ocultos de los montes brotan aguas vivas[b], desde la creación del mundo y para siempre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘fue establecida’; la revisión auditada del expediente inglés favorece la idea de fundación/establecimiento, no de ruptura.
    reason: lexical_alternative
  - marker: b
    text: ‘Aguas vivas’ conserva el valor literal de la expresión y deja abierta la imagen de aguas frescas, fluyentes o vivificantes.
    reason: lexical_alternative
  - marker: c
    text: 'La frase final es temporal: ‘desde la creación del mundo y para siempre’, sin precisar si el énfasis es retrospectivo, prospectivo o ambos.'
    reason: alternative_reading
lexical_decisions:
- source_word: ተሳረረት
  english_pob_choice: was founded
  chosen_spanish: fue fundada
  alternatives_spanish:
  - fue establecida
  - quedó fundada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; revisión auditada en el expediente English POB
  rationale: La revisión textual del expediente inglés corrige el sentido desde una lectura de rending a una de fundación/establecimiento. En español, 'fue fundada' conserva el motivo cosmológico concreto y el registro bíblico sin introducir metáfora ajena.
- source_word: ዲበ ማይ
  english_pob_choice: upon the waters
  chosen_spanish: sobre las aguas
  alternatives_spanish:
  - encima de las aguas
  - sobre las aguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sobre las aguas'' reproduce la relación espacial de apoyo/superposición y suena natural en español, manteniendo la imagen cosmológica.'
- source_word: ኅቡኣተ አድባር
  english_pob_choice: the hidden places of the mountains
  chosen_spanish: los lugares ocultos de los montes
  alternatives_spanish:
  - los escondrijos de los montes
  - las partes ocultas de los montes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lugares ocultos'' conserva la idea de recesos o zonas secretas, y ''montes'' mantiene un tono bíblico natural en español sin perder el referente geográfico.'
- source_word: ኅሑያን ማያት
  english_pob_choice: living waters
  chosen_spanish: aguas vivas
  alternatives_spanish:
  - aguas vivientes
  - aguas vivas
  - aguas de vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; con control de la corrección textual indicada en el expediente
  rationale: El expediente inglés mantiene 'living waters'; en español, 'aguas vivas' es la forma más idiomática y preserva la imagen de agua viva, fresca y vivificante sin cerrarla excesivamente.
- source_word: ይመፅኡ
  english_pob_choice: come forth
  chosen_spanish: brotan
  alternatives_spanish:
  - salen
  - manan
  - emergen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperfecto indica acción en curso o habitual. 'Brotan' comunica bien el surgir de aguas desde manantiales ocultos y conserva el matiz dinámico y visionario.
- source_word: እምፍጥረተ ዓለም
  english_pob_choice: from the creation of the world
  chosen_spanish: desde la creación del mundo
  alternatives_spanish:
  - desde que fue creado el mundo
  - desde la creación del mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Desde la creación del mundo'' es una traducción temporal directa y natural en español, apta para un registro bíblico contemporáneo.'
- source_word: ወእስከ ለዓለም
  english_pob_choice: and forever
  chosen_spanish: y para siempre
  alternatives_spanish:
  - y por siempre
  - y para siempre
  - y hasta la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Para siempre'' expresa con claridad la duración indefinida del cierre temporal y encaja con el tono solemne del pasaje.'
theological_decisions:
- issue: Imagen cosmológica de la tierra fundada sobre las aguas
  english_pob_reading: Retain the concrete image of the earth being founded upon the waters rather than interpreting it metaphorically or adjusting it to a different cosmological model.
  chosen_spanish_reading: Conservar la imagen concreta de la tierra fundada sobre las aguas.
  alternative_spanish_readings:
  - La tierra estaba asentada sobre las aguas
  - La tierra quedó establecida sobre las aguas
  rationale: El pasaje es descriptivo y apocalíptico; la versión española debe dejar intacta la imagen de fundamento sobre las aguas sin suavizarla ni reinterpretarla.
  doctrine_reference: Principio de primacía del texto fuente; preservación de imaginería apocalíptica sin domesticación interpretativa.
translation_notes:
  revision_awareness: 'El expediente inglés fue revisado y corregido en dos puntos críticos: el verbo ge''ez ተሳረረት se entendió finalmente como ‘was founded’, y ኅሑያን ማያት se mantuvo como ‘living waters’. La traducción española sigue esa lectura más reciente y evita depender de la versión inicial errónea (‘torn apart’).'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ no aplica aquí porque el versículo no contiene el tetragrámaton.
  - Se mantiene ‘aguas vivas’ como término bíblico transparente y natural en español.
  - Se prefiere ‘montes’ frente a ‘montañas’ por resonancia bíblica y registro más solemne.
  - El tiempo verbal ‘brotan’ refleja el imperfecto griego/etiópico en el valor aspectual de proceso continuo o habitual.
