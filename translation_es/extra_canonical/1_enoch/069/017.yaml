base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/069/017.yaml
  text: And the earth was founded upon the waters[a], and from the hidden places of the mountains living waters come forth[e][d][c][b], from the creation of the world and forever.
  footnotes:
  - marker: a
    text: Or 'was split' or 'was rent apart'; the Ge'ez verb suggests violent rending.
    reason: lexical_alternative
  - marker: b
    text: '''Living waters'' is kept literally; it may denote fresh, flowing, or life-giving waters, but the imagery is left open in the main text.'
    reason: lexical_alternative
  - marker: c
    text: 'The closing phrase is temporal: ''from the creation of the world and forever,'' expressing a span from the world''s beginning onward without resolving whether the sense is strictly retrospective, prospective, or both.'
    reason: alternative_reading
  - marker: d
    text: Or 'was torn apart'.
    reason: previous_rendering
  - marker: e
    text: Or 'living waters came forth'.
    reason: previous_rendering
