translation:
  language: es
  text: Y el nombre del primero fue Yeqón[a]; este es el que extravió a todos los hijos de los ángeles[b], y los hizo descender a la tierra firme[c], y los extravió por medio de las hijas de los hombres[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Yeqón es una transliteración del nombre ge'ez; en otras tradiciones puede escribirse también «Yeqon», «Yequn» u otras formas cercanas.
    reason: lexical_alternative
  - marker: b
    text: La expresión es literal; algunos intérpretes la amplían como «el ejército angélico», pero el texto conserva el lenguaje filial.
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como «la tierra» o «la tierra seca»; el ge'ez apunta de manera concreta al ámbito terrestre, en contraste con el cielo o el mar.
    reason: lexical_alternative
  - marker: d
    text: O «a través de las hijas de los hombres». La preposición indica medio o instrumento más que agencia principal.
    reason: alternative_reading
lexical_decisions:
- source_word: ወስሙ
  english_pob_choice: And the name
  chosen_spanish: Y el nombre
  alternatives_spanish:
  - Y su nombre
  - Y el nombre de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción introduce una fórmula nominativa en serie. «Y el nombre» conserva el estilo catalogal y evita añadir posesión no explicitada por el ge'ez.
- source_word: ለቀዳማዊ
  english_pob_choice: of the first
  chosen_spanish: del primero
  alternatives_spanish:
  - del primero de ellos
  - del anterior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto identifica al primer ser nombrado de la secuencia. «Del primero» es natural en español y mantiene la relación genitiva sin sobreexplicar.
- source_word: ይቁን
  english_pob_choice: was Yeqon
  chosen_spanish: fue Yeqon
  alternatives_spanish:
  - era Yeqon
  - se llamaba Yeqon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el nombre propio transliterado. «Fue» reproduce bien la cópula identificadora del enunciado nominal sin introducir matices biográficos ajenos.
- source_word: ዝውእቱ
  english_pob_choice: this is the one who
  chosen_spanish: este es el que
  alternatives_spanish:
  - este es quien
  - él es el que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma demostrativa + cópula funciona como identificación enfática. «Este es el que» mantiene la fuerza explicativa con español natural.
- source_word: ዘአስሐተ
  english_pob_choice: led ... astray
  chosen_spanish: extravió
  alternatives_spanish:
  - desvió
  - hizo errar
  - engañó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa causar desviación/error. «Extraviar» captura bien el sentido de apartar del camino recto y funciona de manera idiomática en español bíblico moderno.
- source_word: ኵሎሙ
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a la totalidad de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El universal se integra de forma natural en la construcción verbal española. «A todos» mantiene la amplitud total sin redundancia pesada.
- source_word: ደቂቀ መላእክት
  english_pob_choice: the children of the angels
  chosen_spanish: los hijos de los ángeles
  alternatives_spanish:
  - los hijos de los ángeles celestiales
  - la descendencia de los ángeles
  - el linaje angélico
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro es literalmente familiar y no debe aplanarse a «los ángeles». «Hijos» preserva la imagen genealógica del original y la ambigüedad interpretativa.
- source_word: ወአውረዶሙ
  english_pob_choice: and brought them down
  chosen_spanish: y los hizo descender
  alternatives_spanish:
  - y los bajó
  - y los trajo abajo
  - y los precipitó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El causativo de descenso puede verterse de forma más precisa con «hizo descender», que conserva el movimiento impuesto sin añadir violencia no explícita.
- source_word: ዲበ የብስ
  english_pob_choice: to the dry land
  chosen_spanish: hasta la tierra seca
  alternatives_spanish:
  - a la tierra seca
  - sobre la tierra seca
  - a la tierra firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez apunta de manera concreta a la tierra seca o firme. «Hasta» expresa el movimiento de descenso y evita la ambigüedad de un simple «a».
- source_word: ወአስሐቶሙ
  english_pob_choice: and led them astray
  chosen_spanish: y los extravió
  alternatives_spanish:
  - y los desvió
  - y los engañó
  - y los hizo errar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se repite el mismo verbo de extravío; repetir «extravió» preserva la correlación retórica y la fuerza moral del pasaje.
- source_word: በአዋልደ ሰብእ
  english_pob_choice: through the daughters of men
  chosen_spanish: por medio de las hijas de los hombres
  alternatives_spanish:
  - por las hijas de los hombres
  - a través de las hijas de los hombres
  - mediante las hijas de los hombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición marca medio o instrumento, no agente principal. «Por medio de» evita la ambigüedad de «por» y conserva la relación instrumental del ge'ez.
theological_decisions:
- issue: Identidad de «los hijos de los ángeles»
  english_pob_reading: Retain the literal familial phrase 'the children of the angels' in the main text.
  chosen_spanish_reading: Mantener «los hijos de los ángeles» en el texto principal.
  alternative_spanish_readings:
  - los ángeles
  - el ejército angélico
  - los seres angélicos
  rationale: El ge'ez conserva un lenguaje genealógico inusual que no conviene normalizar en «los ángeles». La traducción española debe reflejar esa tensión textual e interpretativa.
  doctrine_reference: Primacía de la fuente original; conservar la tensión textual sin armonizarla.
- issue: Fuerza del doble verbo de extravío
  english_pob_reading: Use 'led astray' twice.
  chosen_spanish_reading: Repetir «extravió» en ambas cláusulas.
  alternative_spanish_readings:
  - engañó ... engañó
  - desvió ... desvió
  - sedujo ... sedujo
  rationale: La reiteración del mismo verbo reproduce el paralelismo acusatorio del original y evita introducir matices distintos sin base textual.
  doctrine_reference: Consistencia léxica en elementos repetidos del texto fuente.
- issue: Relación instrumental de la última cláusula
  english_pob_reading: '''by the daughters of men'' / ''through the daughters of men'''
  chosen_spanish_reading: «por medio de las hijas de los hombres»
  alternative_spanish_readings:
  - «por las hijas de los hombres»
  - «mediante las hijas de los hombres»
  rationale: El ge'ez usa una preposición instrumental; en español, «por medio de» comunica mejor que la acción ocurrió a través de ese medio sin sugerir que las hijas de los hombres fueran el agente principal.
  doctrine_reference: Precisión sintáctica para evitar una lectura causal invertida.
translation_notes:
  revision_awareness: 'El contexto inglés fue revisado varias veces: primero con ''children of the angels'' y ''by the daughters of men'', luego con una corrección que cambió la última preposición a ''through'' para evitar ambigüedad instrumental. La versión española refleja esa revisión y resuelve la misma ambigüedad con «por medio de», manteniendo además la literalidad de la filiación angélica y la repetición del verbo de extravío.'
  spanish_consistency_notes:
  - Se mantiene Yeqon como nombre propio transliterado, sin adaptar a una forma castellana no atestiguada.
  - Se conserva «hijos de los ángeles» para respetar la imagen genealógica del texto fuente.
  - Se usa «extravió» en ambas cláusulas para reflejar la repetición verbal del original.
  - La última cláusula se formula instrumentalmente para evitar que las hijas de los hombres parezcan el sujeto agente.
  - El tono es bíblico-formal pero con sintaxis española natural y legible.
