base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/069/004.yaml
  text: And the name of the first was Yeqon[a]; this is the one who led all the children of the angels astray, and brought them down to the dry land[d][c][b], and led them astray by the daughters of men.
  footnotes:
  - marker: a
    text: Yeqon is a transliteration of the Ge'ez form; English spellings may vary, including Yequn or Yequn.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'the sons of the angels' is literal. Some interpreters take it more broadly as the angelic host.
    reason: lexical_alternative
  - marker: c
    text: '''Upon the dry land'' may also be rendered ''upon the earth'' or ''onto the land''; the Ge''ez points concretely to the terrestrial realm.'
    reason: lexical_alternative
  - marker: d
    text: Or 'by the daughters of men'.
    reason: previous_rendering
