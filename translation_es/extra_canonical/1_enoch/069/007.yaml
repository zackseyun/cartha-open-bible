translation:
  language: es
  text: Y de su mano salieron contra los que habitan sobre la tierra seca[a], desde aquel día y hasta la edad de las edades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que viven sobre la tierra'. El ge'ez dice más literalmente 'los que habitan sobre la tierra seca'.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምነ እዴሁ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de su mano, literalmente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la imagen concreta de la mano como origen o agencia, sin abstraerla indebidamente a 'poder'. En español, 'de su mano' es natural y mantiene la fuerza pictórica del ge'ez.
- source_word: ወፅአ
  english_pob_choice: they went out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron fuera
  - fueron hacia afuera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa salida o procedencia. 'Salieron' comunica el movimiento de manera clara en español sin perder la imagen de emergencia descrita por el texto.
- source_word: ዲቤሆሙ
  english_pob_choice: against them
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - contra ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto hostil o judicial favorece 'contra' para marcar dirección adversativa. Se conserva como preposición antes del complemento tácito, con el sentido de acción dirigida.
- source_word: ለእለ የኃድሩ ዲበ የብስ
  english_pob_choice: those who dwell upon the dry ground
  chosen_spanish: los que habitan sobre la tierra seca
  alternatives_spanish:
  - los que viven sobre la tierra
  - los que habitan la tierra seca
  - los que habitan sobre la tierra firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la concreción de የብስ como 'dry ground/land' y no se suaviza a 'tierra' sin más. 'Habitan sobre la tierra seca' es comprensible en español y conserva el matiz cosmológico y poético del original.
- source_word: እምይእቲ ዕለት
  english_pob_choice: from that day
  chosen_spanish: desde aquel día
  alternatives_spanish:
  - desde ese día
  - a partir de aquel día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Desde aquel día'' es idiomático y fiel a la marca temporal de inicio duradero. Mantiene el tono solemne del texto.'
- source_word: እስከ ለዓለመ ዓለም
  english_pob_choice: unto the age of ages
  chosen_spanish: hasta la edad de las edades
  alternatives_spanish:
  - por los siglos de los siglos
  - hasta la eternidad
  - hasta la era de las eras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la fórmula duplicada de duración extrema con un equivalente español literal y elevado. 'Edad de las edades' conserva mejor el paralelismo semítico que una fórmula litúrgica tradicional.
theological_decisions:
- issue: Cómo renderizar la referencia temporal enfática final sin domesticarla en una fórmula litúrgica posterior
  english_pob_reading: unto the age of ages
  chosen_spanish_reading: hasta la edad de las edades
  alternative_spanish_readings:
  - por los siglos de los siglos
  - hasta la eternidad
  rationale: El original usa una duplicación enfática de 'edad' que comunica duración ilimitada. En español, 'edad de las edades' mantiene la estructura y la densidad apocalíptica mejor que una frase tradicionalizada que podría ocultar el patrón semítico.
  doctrine_reference: Principio de transparencia textual y preservación de la imaginería apocalíptica.
- issue: Si 'tierra seca' debe interpretarse como 'tierra' en sentido general
  english_pob_reading: those who dwell upon the dry ground
  chosen_spanish_reading: los que habitan sobre la tierra seca
  alternative_spanish_readings:
  - los que habitan sobre la tierra
  - los que viven en la tierra
  rationale: El audit trail inglés señaló que el ge'ez es más literal 'dry ground' y que conviene conservar esa concreción. La versión española mantiene ese matiz para no diluir la imagen espacial del texto.
  doctrine_reference: Preferencia de lectura transparente cuando el testimonio conservado es ge'ez y la imaginería puede ser significativa.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que corrigió la concordancia de 'it went out' a 'they went out' por el antecedente colectivo de 'weapons of death' en el verso previo. En español se evitó un pronombre explícito para no introducir una referencia falsa y se mantuvo el plural verbal 'salieron'.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' solo cuando el texto lo exija; aquí no aparece el Tetragrámaton.
  - Se mantuvo 'edad de las edades' como fórmula elevada y transparente, en coherencia con el registro apocalíptico del proyecto.
  - '''Tierra seca'' se preserva por fidelidad al ge''ez, aunque en español pueda sonar menos idiomático que ''tierra''.'
