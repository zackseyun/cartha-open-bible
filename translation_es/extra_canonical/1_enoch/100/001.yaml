  rationale: 'Se hacen ajustes menores para alinear mejor el español con las decisiones léxicas auditadas y mejorar la naturalidad: «hijos varones» preserva el matiz de «sons»; «serán abatidos» refleja mejor «be struck down»; «caerán muertos» evita un calco duro; y «una corriente fluya de su sangre» se acerca más a la imaginería y secuencia del POB inglés sin perder dignidad literaria.'
