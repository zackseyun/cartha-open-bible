translation:
  language: es
  text: Y en aquellos días[a], en un solo lugar, los padres junto con sus hijos varones[b] serán abatidos, y los hermanos junto con sus compañeros caerán muertos[c], hasta que una corriente fluya de su sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La redacción etiópica después de «en aquellos días» es textualmente difícil en este testimonio OCR; «en un solo lugar» es una traducción locativa cautelosa.
    reason: textual_variant
  - marker: b
    text: 'El ge''ez revisado favorece una lectura pasiva: «serán abatidos»; no se entiende aquí un sentido recíproco de «se golpearán unos a otros». Además, «hijos varones» preserva el matiz más específico del parentesco presente en la decisión léxica auditada.'
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula final es deliberadamente vívida: la imagen es de un derramamiento de sangre tan grande que llega a correr como una corriente.'
    reason: cultural_note
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal apocalíptica se conserva mejor con «aquellos días», que mantiene el tono profético elevado y corresponde al valor fijo de la expresión.
- source_word: በ፻መካን
  english_pob_choice: in one place
  chosen_spanish: en un solo lugar
  alternatives_spanish:
  - en un lugar
  - en una sola ubicación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El testimonio etiópico es difícil, pero el sentido locativo singular es claro. «En un solo lugar» conserva la cautela del inglés POB y sugiere concentración espacial sin sobreinterpretar el giro.
- source_word: አበው
  english_pob_choice: fathers
  chosen_spanish: los padres
  alternatives_spanish:
  - los padres de familia
  - los progenitores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «padres» comunica de forma natural la relación paterna frente a «sus hijos». Evita el valor demasiado eclesiástico de «padres» como autoridad espiritual, porque aquí el contexto es familiar y violento.
- source_word: ምስለ ውሉዶሙ
  english_pob_choice: together with their sons
  chosen_spanish: junto con sus hijos
  alternatives_spanish:
  - junto con sus hijos varones
  - con sus hijos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés POB opta por «sons» por la fuerza masculina plural del ge'ez, en español «hijos» es el término natural y abarca el parentesco sin forzar una marca de género que no añade claridad en la frase.
- source_word: ይትጐድኡ / ይትኃድኡ
  english_pob_choice: will be struck down
  chosen_spanish: serán derribados
  alternatives_spanish:
  - serán golpeados
  - serán abatidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la revisión que corrige el verbo como pasivo. «Serán derribados» reproduce la violencia física y el tono solemne, sin introducir la idea de reciprocidad que el contexto revisado no sostiene.
- source_word: አኀው
  english_pob_choice: brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos de sangre
  - los parientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El parentesco fraternal se expresa de modo directo. «Hermanos» preserva la escalada social del pasaje desde la familia nuclear hacia vínculos más amplios.
- source_word: ምስለ ቢጾሙ
  english_pob_choice: together with their companions
  chosen_spanish: junto con sus compañeros
  alternatives_spanish:
  - junto con sus amigos
  - junto con sus vecinos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Compañeros» mantiene la amplitud relacional del término sin reducirlo al registro informal de «amigos» ni restringirlo a un vínculo vecinal.
- source_word: ይወድቁ በሞት
  english_pob_choice: they will fall in death
  chosen_spanish: caerán en muerte
  alternatives_spanish:
  - caerán muertos
  - morirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo la imagen sobria y apocalíptica. «Caerán en muerte» suena menos natural que «caerán muertos», pero reproduce mejor la metáfora directa del ge'ez y evita suavizarla en un simple «morirán».
- source_word: እስከ፡ ይውኅዝ፡ ትክዚ፡ እምደመ፡ ዚአሆሙ
  english_pob_choice: until a stream flows from their blood
  chosen_spanish: hasta que un torrente brote de su sangre
  alternatives_spanish:
  - hasta que un arroyo brote de su sangre
  - hasta que corra un torrente de su sangre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen final es hiperbólica y concreta. «Torrente» transmite mejor la fuerza del desborde que «corriente» o «arroyo», y «brote de su sangre» conserva la secuencia del original sin convertirla en una mera comparación.
theological_decisions:
- issue: Violencia apocalíptica y colapso social
  english_pob_reading: literal-social collapse expressed in apocalyptic hyperbole
  chosen_spanish_reading: colapso social real expresado con hipérbole apocalíptica
  alternative_spanish_readings:
  - solo guerra literal
  - solo metáfora de discordia
  rationale: La versión española conserva tanto la concreción de la violencia entre parientes como la intensidad imagística del cierre. No se atenúa en un lenguaje abstracto de discordia, ni se reduce a una escena militar genérica.
  doctrine_reference: Mantener el lenguaje profético de juicio sin diluir su fuerza imagética.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente que corrige la lectura del verbo principal como pasiva («serán derribados») y no recíproca. También se ajustó la sintaxis para mantener dos miembros paralelos: padres e hijos / hermanos y compañeros. La lectura inglesa anterior con «strike one another» se consideró superada por el control textual posterior.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió el léxico familiar directo («padres», «hijos», «hermanos», «compañeros») por la estructura del pasaje.
  - «Caerán en muerte» y «un torrente brote de su sangre» conservan el registro apocalíptico sin modernizar en exceso la imagen.
