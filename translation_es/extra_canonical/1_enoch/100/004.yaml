    rationale: Decir que se omite una conjunción innecesaria antes de 'reunirán' no ilumina el sentido del texto fuente ni resuelve una ambigüedad para el lector español. Conviene sustituirla por una nota que explique la alternativa de segmentación de la cláusula, que sí está presente en el audit trail inglés.
