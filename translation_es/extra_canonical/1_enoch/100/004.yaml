translation:
  language: es
  text: En aquellos días los ángeles descenderán a los lugares ocultos[b] y reunirán en un solo lugar a todos los que llevaron a otros al pecado[a][c]; y el Altísimo se levantará en aquel día de juicio para ejecutar un gran juicio en medio de los pecadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula etíope es difícil. También puede entenderse como “los que ayudaron al pecado” o, más literalmente según otra interpretación, “aquellos por quienes vino el pecado”.
    reason: lexical_alternative
  - marker: b
    text: “Lugares ocultos” también puede traducirse “lugares secretos”, sugiriendo sitios escondidos donde los malvados son reunidos para juicio.
    reason: lexical_alternative
  - marker: c
    text: 'Otra puntuación posible es: “En aquellos días los ángeles descenderán a los lugares ocultos, y reunirán en un solo lugar a todos los que llevaron a otros al pecado; y el Altísimo se levantará en aquel día de juicio para ejecutar un gran juicio en medio de los pecadores”.'
    reason: previous_rendering
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal apocalíptica se conserva de manera natural en español con “en aquellos días”, que mantiene el tono solemne y la repetición idiomática sin perder fidelidad.
- source_word: መላእክት
  english_pob_choice: the angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - ángeles
  - los mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de juicio apocalíptico, el sentido sobrenatural es el adecuado; el artículo definido resulta natural en español.
- source_word: ይወርዱ
  english_pob_choice: will descend
  chosen_spanish: descenderán
  alternatives_spanish:
  - bajarán
  - vendrán abajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Descenderán” preserva la imagen vertical del texto y el movimiento desde el ámbito celestial hacia abajo.
- source_word: ውስተ ምኅባእት
  english_pob_choice: into the hidden places
  chosen_spanish: a los lugares ocultos
  alternatives_spanish:
  - a los lugares secretos
  - a los lugares escondidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Lugares ocultos” conserva el matiz de sitios velados o reservados, con un español claro y solemne. Opto por “a” porque el movimiento de llegada suena más natural que “en” tras “descender” en español.
- source_word: ወይገብእዎሙ በአሐዱ መካን
  english_pob_choice: and they will gather together into one place
  chosen_spanish: y reunirán en un solo lugar
  alternatives_spanish:
  - y los juntarán en un solo lugar
  - y los congregarán en un solo lugar
  - y los llevarán a un solo lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Reunirán” expresa la acción de juntar/congregar con naturalidad en español y mantiene el sentido de confinamiento judicial hacia un solo sitio.
- source_word: ለእሉ እለ ይወርደዋ ለኃጢአት
  english_pob_choice: all those who led others into sin
  chosen_spanish: a todos los que llevaron a otros al pecado
  alternatives_spanish:
  - a todos los que hicieron descender el pecado
  - a todos los que hicieron caer en pecado
  - a todos los que causaron el descenso del pecado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La tradición inglesa revisada destaca una lectura causativa: personas que llevaron a otros al pecado. En español, “llevaron a otros al pecado” transmite bien esa agencia sin forzar una construcción extraña ni borrar la relación entre los agentes y el pecado.'
- source_word: ወይትነሣእ ልዑል
  english_pob_choice: and the Most High will arise
  chosen_spanish: y el Altísimo se levantará
  alternatives_spanish:
  - y el Altísimo surgirá
  - y el Altísimo se alzará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Altísimo” es el equivalente natural de este título divino. “Se levantará” conserva la idea verbal de surgir/levantarse para actuar, sin introducir una paráfrasis teológica.
- source_word: በይእቲ ዕለት ኵነኔ
  english_pob_choice: on that day of judgment
  chosen_spanish: en aquel día de juicio
  alternatives_spanish:
  - en aquel día del juicio
  - en ese día de juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la fórmula solemne y fluida en español. “Día de juicio” conserva la noción explícita de juicio como acontecimiento, no solo como acto abstracto.
- source_word: ከመ ይግበር ኵነኔ ዐቢየ
  english_pob_choice: to execute great judgment
  chosen_spanish: para ejecutar un gran juicio
  alternatives_spanish:
  - para hacer un gran juicio
  - para realizar un gran juicio
  - para llevar a cabo un juicio grande
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Ejecutar” comunica bien la idea judicial de llevar a cabo sentencia/juicio. “Un gran juicio” conserva la magnitud del acto sin añadir contenido no presente.
- source_word: እማእከሎሙ ለኃጥኣን
  english_pob_choice: in the midst of the sinners
  chosen_spanish: en medio de los pecadores
  alternatives_spanish:
  - en medio de los culpables
  - entre los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “En medio de” mantiene la escena pública e ineludible del juicio. “Pecadores” es el equivalente más directo de la categoría moral del pasaje.
theological_decisions:
- issue: Identidad de los reunidos por los ángeles
  english_pob_reading: They are rendered as people associated with the descent or spread of sin, not merely generic sinners.
  chosen_spanish_reading: Se traduce como personas que llevaron a otros al pecado, no solo como “pecadores” genéricos.
  alternative_spanish_readings:
  - todos los pecadores
  - los que cometieron pecado
  - los que hicieron descender el pecado
  rationale: El contexto fuente y la revisión inglesa más reciente señalan una lectura causativa, no simplemente una etiqueta moral general. El español mantiene esa agencia y evita aplanar la tensión textual.
  doctrine_reference: Primacía del original y preservación de tensión textual; no resolver de más una cláusula difícil.
- issue: Título divino ልዑል
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - el Exaltado
  rationale: “Altísimo” es el título bíblico natural y solemne en español para ልዑል, y preserva el peso teológico sin cristianizar ni suavizar el término.
  doctrine_reference: Traducción de títulos divinos con equivalencia idiomática precisa.
translation_notes:
  revision_awareness: 'La redacción inglesa auditada pasó por una corrección importante: una lectura anterior entendía la cláusula como “los que ayudaron al pecado”, pero la revisión posterior la ajustó a una lectura causativa más fuerte (“los que llevaron a otros al pecado”). La versión española sigue esa lectura revisada y conserva también el marco judicial del resto del versículo.'
  spanish_consistency_notes:
  - Se mantiene “Altísimo” para ልዑል, conforme al uso bíblico y al audit trail inglés.
  - Se conserva “pecado” en singular dentro de la cláusula difícil para reflejar la relación con el término fuente, sin convertirla en una generalización moral más amplia.
  - Se usa “lugares ocultos” como equivalente principal de ውስተ ምኅባእት, con nota para la alternativa “secretos”.
  - 'La puntuación reproduce dos movimientos: descenso/reunión y luego aparición del Altísimo para juicio.'
