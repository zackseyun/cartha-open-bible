translation:
  language: es
  text: '¡Ay de ustedes[a], duros de corazón, que permanecen despiertos para tramar el mal[c]: el temor vendrá sobre ustedes[b], y no habrá nadie que los ayude!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo subyacente puede sugerir vigilia deliberada, estar despiertos con intención de hacer el mal, o incluso una postura de acecho; aquí se conserva la idea de desvelo malicioso.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «el temor los alcanzará» o «el temor los sobrevendrá». El verbo puede expresar llegar, alcanzar o sobrevenirles.'
    reason: lexical_alternative
  - marker: c
    text: 'Otra posible traducción: «que velan para tramar el mal» o «que se mantienen despiertos para idear el mal».'
    reason: previous_rendering
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de vosotros!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El interjección abre una fórmula profética de juicio. En español, «¡Ay de ustedes!» conserva el tono de denuncia oracular mejor que una mera exclamación lamentosa como «¡Ay!» sin complemento.
- source_word: ግዙፋነ ልብ
  english_pob_choice: hard of heart
  chosen_spanish: duros de corazón
  alternatives_spanish:
  - obstinados de corazón
  - tercos de corazón
  - duros de corazón en su interior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez indica insensibilidad moral y obstinación interior. «Duros de corazón» es una correspondencia natural en español bíblico y conserva la fuerza ética sin volverlo una mera emoción.
- source_word: ትተግሁ
  english_pob_choice: stay awake
  chosen_spanish: permanecen despiertos
  alternatives_spanish:
  - están despiertos
  - velan
  - se mantienen en vela
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo aquí señala vigilia intencional. «Permanecen despiertos» reproduce la idea de estar deliberadamente sin dormir para dedicarse al mal, evitando la connotación de centinela que puede tener «velar».
- source_word: ከመ ትሰብውዎ ለእኩይ
  english_pob_choice: to devise evil
  chosen_spanish: para tramar el mal
  alternatives_spanish:
  - para idear el mal
  - para planear la maldad
  - para imaginar el mal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa propósito y el objeto es moralmente perverso. «Tramar el mal» comunica la intención deliberada y conspirativa mejor que una lectura puramente mental como «pensar el mal».
- source_word: ፍርሀት
  english_pob_choice: fear
  chosen_spanish: el temor
  alternatives_spanish:
  - el miedo
  - el terror
  - el pavor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo admite «miedo» o «temor», pero en un anuncio de juicio «temor» mantiene un registro más elevado y apocalíptico, fiel al tono del pasaje.
- source_word: ይረክብክሙ
  english_pob_choice: will come upon you
  chosen_spanish: vendrá sobre ustedes
  alternatives_spanish:
  - los alcanzará
  - los sobrevendrá
  - los sorprenderá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede significar llegar, alcanzar u overtaking. «Vendrá sobre ustedes» conserva la imagen de una realidad amenazante que se abate sobre los impíos sin forzar el matiz de persecución de «alcanzará».
- source_word: ወአልቦ ዘይረድአክሙ
  english_pob_choice: and there will be no one to help you
  chosen_spanish: y no habrá nadie que los ayude
  alternatives_spanish:
  - y no habrá quien los socorra
  - y no tendrán ayuda
  - y no habrá quien los socorra a ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula niega toda asistencia o rescate. «No habrá nadie que los ayude» es claro, natural y mantiene la nota de abandono judicial del original.
theological_decisions:
- issue: Naturaleza del dicho profético
  english_pob_reading: A prophetic woe against morally obstinate evildoers facing inescapable judgment
  chosen_spanish_reading: Un ay profético contra personas endurecidas que planean el mal y afrontan un juicio inevitable
  alternative_spanish_readings:
  - Una lamentación general por los pecadores
  - Una advertencia principalmente psicológica sobre la ansiedad
  rationale: El interjección inicial, la caracterización moral de los destinatarios y la ausencia total de ayuda muestran una sentencia de juicio, no un simple proverbio ni una reflexión interna. La traducción española debe conservar ese carácter judicial y apocalíptico.
  doctrine_reference: Conservar el lenguaje de juicio, retribución y advertencia profética sin suavizarlo hacia una moral generalizada.
translation_notes:
  revision_awareness: El contexto auditado del inglés muestra una revisión reciente desde una formulación tipo «keep watch so as to devise evil» hacia «stay awake to devise evil» para evitar la imagen de centinela. La versión española sigue esa adjudicación con «permanecen despiertos» y mantiene la conexión de propósito con «para tramar el mal».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se usa «duros de corazón» como equivalente idiomático natural de la dureza interior moral.
  - Se conserva el registro profético-jurídico mediante «¡Ay de ustedes!» y «temor» en lugar de suavizarlo a una simple lamentación.
