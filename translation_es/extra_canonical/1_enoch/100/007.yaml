translation:
  language: es
  text: ¡Ay de ustedes, pecadores, cuando opriman a los justos en el día de dura angustia[a] y los quemen con fuego[b]! Entonces se les pagará conforme a sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase traducida como 'dura angustia' corresponde literalmente a un día caracterizado por aflicción intensa; 'tribulación' también sería posible, pero se evitó para no introducir un tecnicismo posterior.
    reason: lexical_alternative
  - marker: b
    text: El verbo detrás de 'opriman' también puede entenderse como 'aflijan' o 'persigan', según cuán específicamente se conciba la violencia contra los justos.
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de vosotros!
  - ¡Ay de ustedes pecadores!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La interjección profética de juicio puede rendirse con un lamento de amenaza en español. '¡Ay de ustedes!' conserva la fuerza directa de la reprensión, sin sonar demasiado arcaico.
- source_word: ለክሙ
  english_pob_choice: to you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido es claramente vocativo y de denuncia dirigida a los oyentes; en español, '¡Ay de ustedes!' resulta más natural que un dativo literal.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - los pecadores
  - los malvados
  - los culpables
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pecadores'' preserva la categoría moral-religiosa del original y del inglés auditado, sin rebajarla a mera maldad social.'
- source_word: ታመኒድብዎሙ
  english_pob_choice: you oppress them
  chosen_spanish: opriman
  alternatives_spanish:
  - los aflijan
  - los persigan
  - los opriman
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede implicar aflicción o persecución, pero 'opriman' comunica la violencia sostenida y mantiene la tensión lexical documentada en el audit trail.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Los justos'' es la equivalencia española más estable para esta categoría ética-apocalíptica, y se alinea con el valor del término en el libro.'
- source_word: በዕለተ ጻዕብ ኃያል
  english_pob_choice: on the day of fierce distress
  chosen_spanish: en el día de dura angustia
  alternatives_spanish:
  - en el día de gran tribulación
  - en el día de severa aflicción
  - en el día de angustia intensa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro combina día con intensidad de aflicción; 'dura angustia' transmite bien la gravedad sin introducir un tecnicismo escatológico posterior como 'tribulación'.
- source_word: ታነድድዎሙ በእሳት
  english_pob_choice: burn them with fire
  chosen_spanish: los quemen con fuego
  alternatives_spanish:
  - los abrasen con fuego
  - los prendan fuego
  - los consuman en fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es concreta y violenta; 'quemar con fuego' en español suena natural y conserva la crudeza judicial del original.
- source_word: ወትትፈደዩ
  english_pob_choice: you will be repaid
  chosen_spanish: se les pagará
  alternatives_spanish:
  - serán retribuidos
  - recibirán recompensa
  - se les retribuirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa retribución/repago. La pasiva impersonal 'se les pagará' mantiene la idea de justicia retributiva sin especificar más agencia que la del texto.
- source_word: ከመ ምግባራቲክሙ
  english_pob_choice: according to your deeds
  chosen_spanish: conforme a sus obras
  alternatives_spanish:
  - según sus obras
  - de acuerdo con sus hechos
  - según sus acciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Obras'' es la forma española tradicional y comprensible para la fórmula de retribución; conserva la correspondencia moral del original.'
theological_decisions:
- issue: Forma de la retribución final
  english_pob_reading: The sinners themselves are the ones repaid according to their deeds.
  chosen_spanish_reading: 'La retribución recae sobre los mismos pecadores en forma impersonal: ''se les pagará conforme a sus obras''.'
  alternative_spanish_readings:
  - '''serán recompensados según sus obras'''
  - '''Dios les pagará según sus obras'''
  rationale: El texto dirige toda la acusación a los pecadores y luego anuncia la retribución sin nombrar agente. La construcción impersonal preserva esa tensión y evita explicitar más de lo que el verso dice.
  doctrine_reference: Preservar la tensión teológica y la forma retórica del juicio sin sobreinterpretar la agencia divina.
translation_notes:
  revision_awareness: Se siguió el pasaje etiópico de 1 Enoc 100:7 y el audit trail inglés existente. No hubo revisiones aplicadas en el paso más reciente; la traducción conserva la forma de reproche directo, la secuencia temporal del texto y la retribución final sin añadir agencia interpretativa innecesaria.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponde al nombre divino; este verso no lo contiene.
  - '''Los justos'' mantiene la terminología apocalíptica coherente con el resto de la obra.'
  - Se prefirió una pasiva impersonal en la cláusula final para conservar la ambigüedad de agencia del original.
  - Se evitó 'tribulación' como término técnico para respetar el matiz local de aflicción intensa del sintagma.
