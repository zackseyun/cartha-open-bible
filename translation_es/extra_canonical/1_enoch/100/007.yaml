  language: en
  yaml_path: translation/extra_canonical/1_enoch/100/007.yaml
  text: Woe to you[a], sinners, when you oppress the righteous on the day of fierce distress, and burn them with fire[b]; then you will be repaid according to your deeds.
  footnotes:
  - marker: a
