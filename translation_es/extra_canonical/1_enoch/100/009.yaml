translation:
  language: es
  text: '¡Ay de ustedes[a], pecadores, por las palabras de su boca y por las obras de sus manos, las cuales ha producido su maldad: en el calor de una llama más ardiente que el fuego, arderán!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula siguiente es sintácticamente difícil. Probablemente reúne tanto las palabras como las obras en una sola acusación y las atribuye a la maldad de los pecadores. Se conserva aquí el valor de denuncia y juicio del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes!
  - ¡Ay de vosotros!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para una fórmula de denuncia profética/apocalíptica, “¡Ay de ustedes!” comunica el lamento de juicio sin perder la fuerza del oráculo.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - los pecadores
  - los culpables
  - los impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Pecadores” es la equivalencia natural en español para el grupo bajo condena moral; conserva el tono directo del original.
- source_word: ዲበ
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  - por motivo de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, “por” mantiene bien la causalidad doble introducida por la serie de acusaciones, sin volver la frase pesada.
- source_word: ነገረ አፉክሙ
  english_pob_choice: the words of your mouth
  chosen_spanish: las palabras de su boca
  alternatives_spanish:
  - lo que dice su boca
  - el hablar de su boca
  - las palabras que salen de su boca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la imaginería corporal concreta del original. Se usa “su” para un español de lectura general y reverente, coherente con la forma de tratamiento en el versículo.
- source_word: ተግባረ እዴክሙ
  english_pob_choice: the deeds of your hands
  chosen_spanish: las obras de sus manos
  alternatives_spanish:
  - las acciones de sus manos
  - lo que han hecho sus manos
  - los hechos de sus manos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Obras de sus manos” preserva el paralelismo boca/manos y una fórmula bíblica natural en español, sin perder el énfasis en la agencia humana.
- source_word: ርስዓኒክሙ
  english_pob_choice: your wickedness
  chosen_spanish: su maldad
  alternatives_spanish:
  - su impiedad
  - su perversidad
  - su iniquidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto muestra que la culpa abarca tanto el hablar como el obrar; “maldad” es más natural que “impiedad” en español, pero sigue vinculando el acto con un estado moral torcido.
- source_word: በዋዕየ ላህብ እምእሳት
  english_pob_choice: in the heat of a flame more burning than fire
  chosen_spanish: en el calor de una llama más ardiente que el fuego
  alternatives_spanish:
  - en el ardor de una llama más ardiente que el fuego
  - en la llama encendida más que el fuego
  - en el calor de una llama más ardiente que el fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación intensiva se conserva con “más ardiente que el fuego”. “Calor de una llama” mantiene la construcción concreta del original; se evita suavizar el exceso retórico.
- source_word: ይውዒ
  english_pob_choice: you shall burn
  chosen_spanish: arderán
  alternatives_spanish:
  - ustedes arderán
  - serán quemados
  - arderán ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El futuro plural mantiene la fuerza de sentencia. “Arderán” es más fluido en español y conserva el valor activo/intensivo del verbo.
theological_decisions:
- issue: Cómo reflejar la base moral y religiosa del juicio
  english_pob_reading: your wickedness has done
  chosen_spanish_reading: que ha hecho su maldad
  alternative_spanish_readings:
  - que ha hecho su impiedad
  - que ha hecho su maldad y su impiedad
  - que su maldad ha hecho
  rationale: El texto atribuye el juicio no solo a palabras y obras, sino a una maldad previa que las produce. “Maldad” preserva esa raíz moral sin introducir categorías doctrinales ajenas al pasaje.
  doctrine_reference: Preservar la tensión teológica y moral del texto sin resolverla por paráfrasis explicativa.
- issue: Cómo traducir la comparación intensiva del fuego
  english_pob_reading: more burning than fire
  chosen_spanish_reading: más ardiente que el fuego
  alternative_spanish_readings:
  - más quemante que el fuego
  - más abrasadora que el fuego
  - más ardiente que fuego
  rationale: La comparación no es meramente ornamental; intensifica el castigo. “Más ardiente que el fuego” transmite esa gradación sin perder claridad ni sobrerredactar.
  doctrine_reference: Mantener el paralelismo apocalíptico y la intensidad del juicio final.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del inglés POB: la lectura final restablece la comparación intensiva equivalente a “más ardiente que el fuego” y conserva la sentencia en segunda persona plural. La elección española sigue ese estado revisado, evitando tanto una paráfrasis moralizante como una reducción de la imagen ígnea.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo boca/manos con formulación literal pero natural en español.
  - Se prefirió un registro bíblico contemporáneo, evitando arcaísmos innecesarios.
  - Se conservó la intensidad apocalíptica mediante ‘más ardiente que el fuego’ y ‘arderán’.
  - Se usó tratamiento reverente de tercera persona plural en el texto corrido para un español eclesial amplio.
