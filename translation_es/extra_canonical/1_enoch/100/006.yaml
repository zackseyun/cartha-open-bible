translation:
  language: es
  text: Y los sabios verán, y todos los hijos de la tierra entenderán todo asunto de este libro, y sabrán que su riqueza[a] no puede salvarlos de la destrucción de sus pecados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La revisión del texto fuente indica que el sujeto es «su riqueza»; por eso no se traduce aquí como una idea abstracta de habilidad o de medios.
    reason: source_note
  - marker: b
    text: El giro final se entiende mejor como ruina o destrucción ligada a los pecados, no como una referencia a negarlos o apartarlos.
    reason: theological_note
lexical_decisions:
- source_word: እሙነ
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - verán la verdad
  - verán ciertamente
  - verán con claridad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa descartó leer aquí una idea explícita de 'verdad' y dejó el verbo simple de visión. En español, 'verán' mantiene esa sobriedad y evita añadir un objeto no asegurado por el ge'ez.
- source_word: ሰብአ ጠቢባን
  english_pob_choice: wise men
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - los sabios entre los hombres
  - las personas sabias
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sabios'' reproduce la fuerza sustantiva del grupo humano cualificado por la sabiduría. En español suena natural y conserva el rasgo antropológico sin sobrecargarlo.'
- source_word: ይሬእዩ
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - percibirán
  - contemplarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el valor directo de visión del verbo. 'Verán' es la opción más transparente y fiel al registro apocalíptico.
- source_word: ውሉደ ምድር
  english_pob_choice: the children of the earth
  chosen_spanish: los hijos de la tierra
  alternatives_spanish:
  - los habitantes de la tierra
  - los descendientes de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la expresión literal característica del texto. 'Hijos de la tierra' preserva el color apocalíptico mejor que una paráfrasis más plana.
- source_word: ኵሎ ነገረ ዛቲ መጽሐፍ
  english_pob_choice: every matter of this book
  chosen_spanish: todo asunto de este libro
  alternatives_spanish:
  - todo lo de este libro
  - toda materia de este libro
  - todas las palabras de este libro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Neger'' puede abarcar asunto, cosa o palabra. ''Todo asunto de este libro'' conserva amplitud semántica sin restringirlo solo a palabras escritas.'
- source_word: ያእምሩ
  english_pob_choice: they will understand / know
  chosen_spanish: entenderán
  alternatives_spanish:
  - conocerán
  - comprenderán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el movimiento principal es de comprensión del contenido del libro. 'Entenderán' expresa bien ese paso cognitivo y prepara el 'sabrán' final.
- source_word: ብዕሎሙ
  english_pob_choice: their wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus bienes
  - su riqueza material
  - sus posesiones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión posterior corrigió la omisión de este término y lo entendió como 'their wealth'. 'Su riqueza' es fiel, breve y natural en español.
- source_word: ኢይክል
  english_pob_choice: cannot
  chosen_spanish: no puede
  alternatives_spanish:
  - no podrán
  - no es capaz de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular verbal se ajusta al sujeto 'su riqueza' y conserva la fuerza de incapacidad del original.
- source_word: ብዕሎሙ አድኅኖቶሙ
  english_pob_choice: save them
  chosen_spanish: salvarlos
  alternatives_spanish:
  - librarlos
  - rescatarlos
  - darles salvación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor reflexivo/casual del sentido es que su riqueza no puede producirles rescate. 'Salvarlos' sigue la línea del audit trail inglés y es idiomático en español.
- source_word: በመዳቀ ኃጢአቶሙ
  english_pob_choice: from the destruction of their sins
  chosen_spanish: de la destrucción de sus pecados
  alternatives_spanish:
  - del derrumbe de sus pecados
  - de la ruina de sus pecados
  - en la destrucción de sus pecados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El audit trail más reciente corrigió la lectura previa: la frase apunta al ámbito de ruina/destrucción asociado a los pecados, no a negarlos. ''Destrucción'' preserva esa lectura sin resolver en exceso la imagen.'
theological_decisions:
- issue: Si el verso habla de arrepentimiento o de la inutilidad de la riqueza frente al juicio por el pecado
  english_pob_reading: Their wealth cannot save them from the destruction of their sins.
  chosen_spanish_reading: Su riqueza no puede salvarlos de la destrucción de sus pecados.
  alternative_spanish_readings:
  - No pueden salvarse a sí mismos negando sus pecados.
  - Su riqueza no puede librarlos mediante su propia justicia.
  rationale: La revisión del expediente indica que el sujeto es la riqueza y que el punto es la imposibilidad de auto-rescate frente a la ruina asociada al pecado. Por eso no se introduce una lectura de arrepentimiento que el texto no exige.
  doctrine_reference: Preservar la tensión del texto sin convertirlo en una exhortación moralizante ajena al verso.
translation_notes:
  revision_awareness: 'El expediente de revisión muestra correcciones importantes: una lectura anterior añadió indebidamente «la verdad» y otra omitió el sujeto «su riqueza». La redacción española sigue la última revisión aprobada y refleja la corrección del sujeto y del marco final de destrucción/ruina.'
  spanish_consistency_notes:
  - Se mantiene «sabios» para ሰብአ ጠቢባን y «hijos de la tierra» para ውሉደ ምድር, conservando el registro apocalíptico.
  - Se usa «Dios»/«Yahvé» solo cuando el verso lo exige; aquí no aparece lenguaje divino explícito.
  - Se evita introducir «verdad» para እሙነ, siguiendo la revisión crítica del expediente.
  - El paralelismo verbal 'verán / entenderán / sabrán' ayuda a reproducir el avance cognitivo del original sin añadir contenido doctrinal.
