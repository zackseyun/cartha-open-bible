translation:
  language: es
  text: Y ahora[a], sepan que sus obras serán investigadas por los ángeles en el cielo, y por el sol, la luna y las estrellas, acerca de sus pecados[b], porque sobre la tierra ejecutan juicio contra los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea ge''ez conservada en el expediente es muy breve y parece introducir lo que sigue: literalmente, «Y ahora, sepan…» o «Y ahora, sepan esto». El objeto no es explícito en la formulación extante y puede suplirse por la continuación de la oración en la línea o versículo siguiente.'
    reason: textual_variant
  - marker: b
    text: O «Y ahora, sepan esto:».
    reason: previous_rendering
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora mismo
  - Y en este momento
  - Pero ahora
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La combinación de la conjunción y el adverbio temporal introduce un giro discursivo exhortativo. «Y ahora» conserva la transición y la brevedad del ge'ez sin añadir énfasis no sustentado.
- source_word: አእምሩ
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - entiendan
  - reconozcan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un imperativo plural del verbo «saber/conocer». En español, «sepan» transmite de modo natural la exhortación dirigida a varios oyentes, manteniendo el sentido cognitivo básico sin sobreinterpretar.
translation_notes:
  revision_awareness: La revisión del audit trail mostró oscilación entre una lectura truncada y una expansión no sustentada. Dado que el texto ge'ez proporcionado aquí solo conserva la fórmula breve, esta versión española se limita estrictamente a ese material y señala la posible elipsis en nota.
  spanish_consistency_notes:
  - Se evitó introducir el contenido expandido del aparato audit trail porque no está presente en el texto ge'ez suministrado en este paquete.
  - Se usó «sepan» en lugar de «conozcan» para reflejar mejor el imperativo plural breve y solemne del original.
  - Se mantuvo «Y ahora» como fórmula de transición directa y natural en español.
  - La nota a pie [a] está anclada en el texto para cumplir la trazabilidad del fragmento breve conservado.
