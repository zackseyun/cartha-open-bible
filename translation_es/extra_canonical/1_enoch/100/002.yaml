translation:
  language: es
  text: Porque un hombre no apartará su mano de sus hijos[a], ni de los hijos de sus hijos, para matarlos; y el pecador no apartará su mano de su hermano honrado[b]. Desde el alba hasta que se pone el sol, se matarán unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus hijos varones’; el término ge‘ez puede ser más amplio que la descendencia masculina estricta en algunos contextos.
    reason: lexical_alternative
  - marker: b
    text: ‘Su hermano honrado’ también puede entenderse como ‘su hermano noble’, según si el énfasis recae en el honor personal o en la posición social.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢይከልእ እዴሁ
  english_pob_choice: will not withhold his hand
  chosen_spanish: no retendrá su mano
  alternatives_spanish:
  - no contendrá su mano
  - no detendrá su mano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen idiomática de no ‘retener/contener’ la mano conserva en español la fuerza concreta del gesto violento sin volverlo demasiado explicativo.
- source_word: እምውሉዱ
  english_pob_choice: from his sons
  chosen_spanish: de sus hijos
  alternatives_spanish:
  - de sus hijos varones
  - de su descendencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés POB mantiene ‘sons’ por la concreción del linaje, en español ‘hijos’ comunica de forma natural la posible amplitud del término, como indica la nota inglesa, sin perder el vínculo familiar.
- source_word: ውሉደ ውሉዱ
  english_pob_choice: the sons of his sons
  chosen_spanish: los hijos de sus hijos
  alternatives_spanish:
  - sus nietos
  - sus descendientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la estructura repetitiva del ge‘ez y el paralelismo familiar del texto; ‘nietos’ sería interpretativo y menos transparente.
- source_word: ከመ ይቅትሎ
  english_pob_choice: to kill them
  chosen_spanish: para matarlos
  alternatives_spanish:
  - con el fin de matarlos
  - a fin de matarlos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Para matarlos’ expresa finalidad de manera directa y natural en español, manteniendo la intención homicida del pasaje.
- source_word: ኃጥእ
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - el impío
  - el pecador culpable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Pecador’ sigue de cerca la categoría moral del original y del POB inglés, preservando el tono de juicio apocalíptico.
- source_word: እኍሁ ክቡር
  english_pob_choice: his honored brother
  chosen_spanish: su hermano honrado
  alternatives_spanish:
  - su hermano honorable
  - su hermano noble
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Honrado’ mantiene la ambigüedad entre honor personal y dignidad social que la nota inglesa conserva, evitando fijar demasiado el matiz de ‘noble’.
- source_word: እምጎሕ እስከ ትዐርብ ፀሐይ
  english_pob_choice: From dawn until the sun sets
  chosen_spanish: Desde el alba hasta que se pone el sol
  alternatives_spanish:
  - Desde el amanecer hasta la puesta del sol
  - Desde la aurora hasta la puesta del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se traduce con una expresión española natural que mantiene el arco completo del día y la imaginería cósmica del original.
- source_word: ይትቃተሉ
  english_pob_choice: they will slaughter one another
  chosen_spanish: se matarán unos a otros
  alternatives_spanish:
  - se masacrarán unos a otros
  - se degollarán unos a otros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Se matarán unos a otros’ preserva el sentido recíproco violento sin introducir un léxico demasiado marcado o más específico que el texto fuente.
theological_decisions:
- issue: Violencia intrafamiliar y ruptura del orden social
  english_pob_reading: The verse depicts social collapse so severe that family bonds and honored kinship no longer restrain murder.
  chosen_spanish_reading: El versículo presenta un colapso social tan grave que ni los lazos familiares ni el honor del parentesco frenan el homicidio.
  alternative_spanish_readings:
  - Una simple escena de guerra entre enemigos
  - Un proverbio hiperbólico sin referencia literal a la familia
  rationale: La secuencia de ‘hijos’, ‘hijos de sus hijos’ y ‘hermano honrado’ exige mantener la concreción familiar y la gravedad judicial del pasaje, sin reducirlo a conflicto genérico.
  doctrine_reference: Conservar la imaginería apocalíptica y las fórmulas de juicio; no aplanar el texto en prosa general.
translation_notes:
  revision_awareness: El texto inglés revisado cambió ‘the sun’s setting’ por ‘the sun sets’ para sonar más natural. En español se optó por una solución igualmente natural (‘se pone el sol’) sin perder la imagen del día completo.
  spanish_consistency_notes:
  - Se mantiene ‘hijos’ como opción más natural y amplia, con nota para la alternativa ‘hijos varones’ conforme al audit trail.
  - Se evita ‘SEÑOR’ u otra sustitución teológica no pertinente, ya que el verso no contiene el Nombre divino.
  - ‘Pecador’ conserva la categoría moral singular del original y del POB inglés.
  - La frase final conserva reciprocidad violenta explícita con ‘unos a otros’.
