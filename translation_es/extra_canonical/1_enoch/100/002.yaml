review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del ge‘ez y del POB inglés: mantiene la violencia intrafamiliar, el paralelismo ‘hijos / hijos de sus hijos / hermano’, y el marco temporal completo del día. Sin embargo, ‘no retendrá su mano de…’ suena poco natural en español con el complemento ‘de’, y debilita la claridad del modismo violento. Además, el POB inglés intensifica ይትቃተሉ como ‘slaughter one another’; ‘se matarán unos a otros’ es fiel en sentido básico, pero puede fortalecerse levemente sin caer en exceso.'
  spanish_quality_summary: 'El texto es legible y digno, pero presenta una construcción algo forzada: ‘retener su mano de sus hijos’ no es español idiomático. ‘No apartará/detendrá su mano contra…’ o ‘no refrenará su mano para matar…’ sería más natural. También conviene ajustar la nota [a]: el texto principal usa ‘hijos’, pero la nota dice ‘O de sus hijos varones’, cuando la alternativa más fiel al audit trail inglés es ‘sus hijos’ / ‘sus hijos varones’ según el matiz; la redacción actual queda algo invertida. En conjunto, requiere reparación menor, no reescritura mayor.'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. ‘El pecador’ está bien para ኃጥእ. ‘Hermano honrado’ es aceptable y la nota conserva la alternativa ‘noble’. La principal cuestión es idiomática y de precisión del modismo ‘withhold his hand’, no de glosario teológico.
  issues:
  - severity: medium
    issue: 'Construcción poco natural: ‘no retendrá su mano de sus hijos’'
    rationale: Aunque intenta calcar el modismo fuente, en español ‘retener su mano de’ suena extraño. El sentido es no abstenerse de ejercer violencia contra ellos; ‘no apartará su mano de…’ funciona mejor en español bíblico-legible y conserva la imaginería concreta.
  - severity: low
    issue: La intensidad de ይትቃተሉ queda algo atenuada en ‘se matarán unos a otros’
    rationale: El audit trail inglés justificó ‘slaughter one another’ por la fuerza del verbo recíproco. En español, ‘se degollarán’ sería demasiado específico, pero ‘se despedazarán’ o ‘se masacrarán’ puede sobredeterminar. Se puede mantener ‘se matarán unos a otros’ como opción prudente, aunque una leve intensificación también sería defendible.
  - severity: low
    issue: Nota [a] no refleja con máxima claridad la relación entre el texto principal y la alternativa
    rationale: Si el texto principal mantiene ‘hijos’, la nota debe presentar con claridad la alternativa masculina específica (‘hijos varones’) y explicar que el ge‘ez puede ser más amplio. La redacción actual es comprensible, pero puede pulirse.
