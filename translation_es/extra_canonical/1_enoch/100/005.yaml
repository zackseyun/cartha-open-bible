review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del ge''ez y sigue la revisión inglesa clave: los guardianes provienen de entre los ángeles santos y protegen a los justos y santos. También conserva correctamente el eufemismo de ''dormir'' y el final ''nada tienen que temer''. Sin embargo, las notas no están bien alineadas con el rastro de auditoría inglés: la nota [a] en inglés explica el modismo ''como la pupila de un ojo'', pero en español se desplazó a ''santos'', y la nota [c] en inglés preserva una traducción previa sobre el alcance de ''de entre los santos ángeles'', no una simple variante concesiva de ''aun si''.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, 'sobre todos los justos y santos' puede sonar algo duro; 'para todos los justos y santos' o mantener 'sobre' es aceptable, pero el principal problema es de aparato de notas, no de redacción principal. 'Como la pupila de un ojo' es fiel aunque ligeramente menos idiomático; funciona bien en registro bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Ángeles', 'justos', 'santos', 'pecado' y 'mal' están bien. 'Guardianes' sigue correctamente la decisión léxica y evita 'Vigilantes'.
  issues:
  - severity: high
    issue: La nota [a] está anclada al lugar equivocado y explica otra cosa distinta.
    rationale: El POB inglés documenta en [a] el modismo 'like the pupil of an eye'. En el borrador español, [a] se colocó tras 'santos' y comenta 'santos ángeles', lo cual no preserva la justificación léxica auditada.
  - severity: medium
    issue: La nota [c] no conserva la alternativa relevante del inglés.
    rationale: La nota [c] inglesa registra la traducción previa 'guardians over all the righteous and holy from among the holy angels', es decir, una alternativa sobre la sintaxis del sintagma preposicional. La nota española actual ('aunque los justos duerman...') no corresponde a esa decisión textual.
  - severity: low
    issue: La nota sobre 'santos ángeles' es innecesaria en este verso.
    rationale: Aunque no es errónea teológicamente, introduce una explicación no respaldada por el aparato inglés y desplaza notas más importantes que sí deben preservarse.
  revised_spanish_text: Y designará guardianes de entre los santos ángeles sobre todos los justos y santos, y los guardarán como la pupila[a] de un ojo, hasta que todo mal y todo pecado llegue a su fin. Y aun si los justos duermen un largo sueño[b], nada tienen que temer.
  revised_footnotes:
  - marker: a
    text: «Como la pupila de un ojo» es un modismo para algo protegido con extremo cuidado; compárese la expresión bíblica más conocida «como la niña de los ojos».
    reason: lexical_alternative
  - marker: b
    text: «Duermen un largo sueño» probablemente alude a la muerte o al estado de los muertos, pero el texto mismo conserva el eufemismo del sueño.
    reason: lexical_alternative
  - marker: c
    text: 'O también: «guardianes sobre todos los justos y santos de entre los santos ángeles».'
    reason: previous_rendering
  revision_rationale: 'Se conserva el texto principal casi intacto porque es sustancialmente fiel al origen y al POB inglés. La revisión corrige el aparato crítico para que refleje las decisiones auditadas: [a] vuelve al modismo de la pupila del ojo, [b] mantiene la explicación del eufemismo ''largo sueño'', y [c] preserva la traducción previa documentada como nota de variante sintáctica. No se ancla [c] en el texto revisado porque es una nota de redacción previa y no explica una palabra puntual del español final.'
