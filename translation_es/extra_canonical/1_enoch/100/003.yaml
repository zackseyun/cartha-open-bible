translation:
  language: es
  text: Y un caballo caminará hasta su pecho[a] en la sangre de los pecadores, y los carros se hundirán hasta sus partes más altas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez እንግድዓሁ se entiende aquí como una referencia anatómica («pecho»), no como un elemento del arreo del caballo. La revisión textual del original descartó la alternativa «brida».
    reason: lexical_alternative
lexical_decisions:
- source_word: የሐውር
  english_pob_choice: will walk / implied motion
  chosen_spanish: caminará
  alternatives_spanish:
  - irá
  - avanzará
  lexicon: Dillmann (Ge'ez)
  rationale: El verbo ge'ez expresa movimiento real, no solo un estado. En español, «caminará» comunica el avance penoso a través del líquido y evita la lectura estática que la revisión corrigió en inglés.
- source_word: እንግድዓሁ
  english_pob_choice: its chest
  chosen_spanish: su pecho
  alternatives_spanish:
  - su pecho delantero
  - su tórax
  lexicon: Leslau (Ge'ez)
  rationale: El término designa la parte anatómica del animal; la adjudicación descartó «bridle». «Pecho» es la equivalencia natural y fiel en español, y conserva la imagen corporal del texto.
- source_word: እስከ
  english_pob_choice: up to
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta llegar a
  lexicon: Leslau (Ge'ez)
  rationale: Preposición de límite o extensión. «Hasta» reproduce con claridad el grado de inmersión sin añadir matices ajenos.
- source_word: ደመ
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: Leslau (Ge'ez)
  rationale: El sustantivo corresponde directamente a «sangre». Mantenerlo sin expansión preserva la fuerza apocalíptica de la imagen.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - culpables
  - malvados
  lexicon: Leslau (Ge'ez)
  rationale: El plural designa a quienes pecan; «pecadores» mantiene el énfasis moral y coincide con la decisión inglesa de traducir la categoría ética de forma explícita.
- source_word: ሰረገላት
  english_pob_choice: chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - carros de guerra
  - carros
  lexicon: Leslau (Ge'ez)
  rationale: «Carros» es el equivalente directo en español para el vehículo de guerra o combate, sin forzar una especificación no presente en el ge'ez.
- source_word: መልዕልታ
  english_pob_choice: tops
  chosen_spanish: sus partes más altas
  alternatives_spanish:
  - sus cimas
  - su parte superior
  lexicon: Dillmann (Ge'ez)
  rationale: El término significa «altura» o «parte superior». En español, una perífrasis como «sus partes más altas» expresa con precisión la inmersión parcial del vehículo sin sonar artificial.
- source_word: ትሰጠም
  english_pob_choice: will be sunk
  chosen_spanish: se hundirán
  alternatives_spanish:
  - serán hundidos
  - quedarán sumergidos
  lexicon: Dillmann (Ge'ez)
  rationale: El verbo transmite la idea de ser presionado hacia abajo o submergido. «Se hundirán» es la forma más natural y visual en español.
theological_decisions:
- issue: Imagen de juicio sobre sangre y destrucción
  english_pob_reading: The verse uses hyperbolic apocalyptic judgment imagery; the moral category is rendered as 'sinners.'
  chosen_spanish_reading: El versículo conserva una imagen hiperbólica de juicio apocalíptico; «pecadores» mantiene la categoría moral sin suavizarla.
  alternative_spanish_readings:
  - «culpables»
  - «malvados»
  rationale: No se debe diluir la violencia retórica del pasaje ni convertirla en una simple metáfora moral. La traducción conserva el carácter de juicio y la referencia explícita a quienes pecan.
  doctrine_reference: 'Translation philosophy §Contested terms: render moral categories plainly unless context demands legal nuance.'
translation_notes:
  revision_awareness: 'La revisión del audit trail corrigió un error importante: የሐውር no debe tratarse como una mera cópula, y እንግድዓሁ no significa ''bridle'' sino ''chest/breast''. La versión española incorpora esas correcciones y evita la armonización indebida con Apocalipsis 14:20.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el pasaje lo requiera; aquí no aparece el tetragrámaton.
  - Se prefirió «pecadores» por coherencia con la decisión ética del original y del texto inglés.
  - «Carros» se usa en sentido amplio, sin añadir 'de guerra' porque el ge'ez no lo exige explícitamente.
  - Se evitó «Cristo», «SEÑOR» y otras fórmulas ajenas al texto fuente.
