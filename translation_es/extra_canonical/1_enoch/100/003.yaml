base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/100/003.yaml
  text: And a horse will walk up to its chest in the blood of sinners[d][c][b][a], and chariots will sink up to their tops.
  footnotes:
  - marker: a
    text: The term እንግድዓሁ may denote “its bridle” (equestrian gear) or an anatomical “chest.” The imagery permits either; we render “bridle” for vividness and coherence.
    reason: lexical_alternative
  - marker: b
    text: The form የሐውር is uncertain. It can be read adjectivally (“of whiteness,” i.e., a white horse) or verbally, supplying the motion implied by the line. The parallel with chariots sinking favors an implied motion (“will wade/go”).
    reason: lexical_alternative
  - marker: c
    text: Compare the apocalyptic image of blood reaching horse-bridles in Rev 14:20; the Enochic verse stands on its own terms but employs similar hyperbolic judgment imagery.
    reason: cross_reference
  - marker: d
    text: Or 'And horses will be up to their bridles in the blood of sinners, and chariots will be sunk up to their tops.'.
    reason: previous_rendering
