base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/084/003.yaml
  text: For you have made all things[a], and over all things you rule; and no deed is too hard for you, and not even a single wisdom passes beyond the throne of your dwelling, nor turns away from before your face. And you know all things, and see, and hear, and there is nothing hidden from you[d][c][b], for you see all things.
  footnotes:
  - marker: a
    text: The clause 'not even a single wisdom passes beyond the throne of your dwelling' is difficult in the Ge'ez. It may refer to no wise plan, thought, or matter being beyond God's royal dwelling-place.
