translation:
  language: es
  text: Porque tú has hecho todas las cosas[a], y sobre todas las cosas tú gobiernas; ninguna obra es demasiado difícil para ti[c], y ni siquiera una sola sabiduría pasa más allá del trono de tu morada, ni se aparta de delante de tu rostro. Y tú conoces todas las cosas, y ves, y oyes, y nada está oculto para ti, porque tú ves todas las cosas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula 'ni siquiera una sola sabiduría pasa más allá del trono de tu morada' es difícil en ge'ez. Puede referirse a ningún plan, pensamiento o asunto sabio que quede fuera de la morada real de Dios.
    reason: lexical_alternative
  - marker: b
    text: 'El final repite el tema del conocimiento divino total; algunos testigos parecen conservar una línea conclusiva explícita: ''porque tú ves todas las cosas''.'
    reason: textual_variant
  - marker: c
    text: 'O: ''ninguna obra te resiste''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ገበርከ
  english_pob_choice: have made
  chosen_spanish: has hecho
  alternatives_spanish:
  - has hecho todas las cosas
  - has creado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez puede significar 'hacer' o 'obrar'. En este contexto de alabanza cósmica, 'has hecho' conserva la amplitud del original sin imponer una formulación técnica de 'crear' que el segmento inmediato no exige explícitamente.
- source_word: ለኵሉ
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto existe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es totalizante. 'Todas las cosas' mantiene el registro elevado y refleja bien el alcance universal del sintagma.
- source_word: ትመልክ
  english_pob_choice: you rule
  chosen_spanish: tú gobiernas
  alternatives_spanish:
  - tú reinas
  - tú eres rey sobre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa dominio real. 'Gobiernas' es natural en español y conserva la idea de soberanía activa; 'reinas' también sería posible, pero aquí 'gobiernas' evita un matiz meramente ceremonial.
- source_word: ኢይጸንዐከ ግብር
  english_pob_choice: no deed is too hard for you
  chosen_spanish: ninguna obra es demasiado difícil para ti
  alternatives_spanish:
  - ninguna obra te resiste
  - ninguna obra puede contigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El idiomático ge'ez ጸንዐ con sufijo pronominal expresa que algo es demasiado difícil para alguien. 'Demasiado difícil para ti' conserva el valor de omnipotencia sin reemplazarlo por una idea distinta de oposición o resistencia.
- source_word: ወአሐቲ ጥበብ
  english_pob_choice: even a single wisdom
  chosen_spanish: ni siquiera una sola sabiduría
  alternatives_spanish:
  - ni un solo consejo
  - ni un solo pensamiento sabio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto literalmente dice 'una sabiduría'. 'Sabiduría' mantiene la rareza del original y evita decidir prematuramente si se trata de consejo, plan o pensamiento.
- source_word: ኢትሐልፍ
  english_pob_choice: passes beyond
  chosen_spanish: pasa más allá
  alternatives_spanish:
  - se extiende más allá
  - traspasa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pasa más allá'' reproduce bien la imagen espacial del original y se entiende de forma natural en español.'
- source_word: እምንባራተ ምንባሪከ
  english_pob_choice: the throne of your dwelling
  chosen_spanish: el trono de tu morada
  alternatives_spanish:
  - el trono de tu habitación
  - el asiento de tu morada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Trono'' y ''morada'' preservan el doble campo de realeza y habitación divina. ''Morada'' es más idiomático en español que ''habitación'' para este contexto elevado.'
- source_word: ኢትትመየጥ ኢእምገጽከ
  english_pob_choice: nor turns away from before your face
  chosen_spanish: ni se aparta de delante de tu rostro
  alternatives_spanish:
  - ni se desvía de tu presencia
  - ni se vuelve de tu semblante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''De delante de tu rostro'' mantiene el giro espacial y personal del ge''ez. ''Rostro'' conserva el hebraísmo/biblicismo del original mejor que una paráfrasis más abstracta.'
- source_word: ታአምር
  english_pob_choice: you know
  chosen_spanish: tú lo sabes todo
  alternatives_spanish:
  - tú conoces todo
  - tú entiendes todo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En la serie 'sabes, ves, oyes', el verbo expresa conocimiento total. 'Lo sabes todo' transmite bien la plenitud cognoscitiva y mantiene el ritmo de enumeración.
- source_word: ትሬኢ
  english_pob_choice: see
  chosen_spanish: ves
  alternatives_spanish:
  - miras
  - observas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Ver'' es la equivalencia directa y encaja con la secuencia paralela del verso.'
- source_word: ወትሰምዕ
  english_pob_choice: hear
  chosen_spanish: oyes
  alternatives_spanish:
  - escuchas
  - percibes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Oyes'' conserva la serie de facultades divinas sin recargar el verso.'
- source_word: ዘይትኀባእ
  english_pob_choice: hidden
  chosen_spanish: oculto
  alternatives_spanish:
  - escondido
  - encubierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Oculto'' es la forma más natural en español y mantiene el sentido de ausencia de secreto ante Dios.'
theological_decisions:
- issue: Soberanía y omnisciencia divinas
  english_pob_reading: Render the verse as a strong affirmation that God made all things, rules over all, and that nothing escapes his knowledge.
  chosen_spanish_reading: La traducción presenta una afirmación fuerte de que Dios ha hecho todas las cosas, gobierna sobre todo y nada le queda oculto.
  alternative_spanish_readings:
  - Suavizar la afirmación a una alabanza general
  - Reducirla a lenguaje devocional menos absoluto
  rationale: El texto ge'ez tiene un tono de doxología apocalíptica con alcance universal. Conviene preservar esa fuerza sin atenuarla en español.
  doctrine_reference: Mantener la primacía del texto fuente y conservar el alcance universal de la alabanza divina.
- issue: La cláusula difícil sobre 'una sabiduría' y el trono
  english_pob_reading: 'Keep the unusual wording relatively close to the Ge''ez: ''not even a single wisdom passes beyond the throne of your dwelling.'''
  chosen_spanish_reading: 'Se conserva el giro poco común: ''ni siquiera una sola sabiduría pasa más allá del trono de tu morada''.'
  alternative_spanish_readings:
  - '''ningún pensamiento sabio se escapa de tu trono'''
  - '''ningún consejo está fuera de tu morada'''
  rationale: La sintaxis es oscura y no conviene resolverla con demasiada seguridad. Mantener la extrañeza permite auditar el problema y evita imponer una interpretación no garantizada por el ge'ez.
  doctrine_reference: Cuando el sentido es incierto, conservar la tensión textual y no falsear precisión.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió 'opposes you' a 'is too hard for you' y la observación sobre no introducir un objeto no atestiguado en el primer verbo. Por eso se traduce 'has hecho todas las cosas' siguiendo la redacción final del audit trail, y 'ninguna obra es demasiado difícil para ti' para reflejar el modismo idiomático del ge'ez. También se preservó la cláusula problemática de 'una sola sabiduría' con nota, sin resolverla de manera excesivamente interpretativa.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí el texto no lo contiene, así que no se introduce.
  - Se mantuvo 'morada' y 'trono' para conservar la imaginería real-cósmica del pasaje.
  - Se prefirió 'tú' explícito por el tono de oración directa y para conservar el paralelismo verbal.
  - '''Oculto'' se eligió por naturalidad, aunque la nota preserva la variante ''nada está escondido de ti'' implícita en el sentido del original.'
  - No se introdujo 'Cristo', 'Señor' ni otros términos no presentes en el testimonio base.
