base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/084/001.yaml
  text: And I lifted up my hands in righteousness[a], and I blessed the Holy and Great One; and I spoke with the spirit of my mouth and with the tongue of flesh, which God has made for the children of the flesh of men, so that they might speak with it; and he gave them spirit and tongue and mouth[b], so that they might speak by them.
  footnotes:
  - marker: a
    text: Or 'I spoke by the spirit of my mouth.' The Ge'ez term can denote breath, spirit, or wind; here 'breath' best fits the list of speech faculties.
    reason: lexical_alternative
  - marker: b
    text: 'The wording is deliberately bodily: literally, ''the children of the flesh of men.'' The phrase underscores human creatureliness rather than using a smoother generic term.'
    reason: cultural_note
