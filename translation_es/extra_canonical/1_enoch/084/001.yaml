translation:
  language: es
  text: Y alcé mis manos en justicia, y bendije al Santo y al Grande; y hablé con el espíritu[a] de mi boca y con la lengua de carne, que Dios hizo para los hijos de la carne de los hombres[b], para que hablasen con ella; y les dio espíritu y lengua y boca, para que hablasen por medio de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aliento de mi boca». El término puede denotar espíritu, aliento o viento; aquí «aliento» encaja bien con la lista de facultades del habla.'
    reason: lexical_alternative
  - marker: b
    text: 'La expresión es deliberadamente corporal: literalmente, «los hijos de la carne de los hombres». Se conserva la densidad del original en vez de suavizarla a «seres humanos».'
    reason: cultural_note
lexical_decisions:
- source_word: አልዐልኩ
  english_pob_choice: I lifted up
  chosen_spanish: alcé
  alternatives_spanish:
  - levanté
  - alcé en alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El gesto es corporal y litúrgico; en español, «alcé mis manos» comunica la acción de levantar las manos en oración sin volverla pesada o artificial.
- source_word: እደዋየ
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mi mano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural refleja mejor la postura de oración y mantiene la naturalidad del español.
- source_word: በጽድቅ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - justamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Justicia» preserva el registro moral y solemne del sintagma preposicional; no se reduce a un adverbio más suelto.
- source_word: ባረክዎ ለቅዱስ ወለዓቢይ
  english_pob_choice: I blessed the Holy and Great One
  chosen_spanish: bendije al Santo y al Grande
  alternatives_spanish:
  - bendije al Santo y al Grande Uno
  - bendije al Santo, al Grande
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conservan los epítetos divinos con mayúscula inicial y sin añadir fórmulas doctrinales ajenas al texto. «Al Santo y al Grande» sigue el valor titular de los dos calificativos.
- source_word: ነገርኩ በመንፈስ አፉየ
  english_pob_choice: I spoke with the spirit of my mouth
  chosen_spanish: hablé con el espíritu de mi boca
  alternatives_spanish:
  - hablé por el espíritu de mi boca
  - hablé con el aliento de mi boca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión inglesa más reciente, que mantiene «spirit», pero en español se conserva la ambigüedad controlada de መንፈስ sin forzar «Espíritu Santo». «De mi boca» respeta la construcción posesiva literal.
- source_word: በልስነ ሥጋ
  english_pob_choice: with the tongue of flesh
  chosen_spanish: con la lengua de carne
  alternatives_spanish:
  - con una lengua carnal
  - con la lengua corporal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lengua de carne» preserva la fuerza corporal del hebraísmo/idioma semítico y evita suavizarlo con «humana» o «carnal».
- source_word: ውሉደ ሥጋ ሰብእ
  english_pob_choice: the children of the flesh of men
  chosen_spanish: los hijos de la carne de los hombres
  alternatives_spanish:
  - los hijos carnales de los hombres
  - los seres humanos de carne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se retiene la densidad redundante del original, que subraya la condición corpórea. No se normaliza a «humanidad» para no perder el matiz literal.
- source_word: ከመ ይትናገሩ ባቲ
  english_pob_choice: so that they might speak with it
  chosen_spanish: para que hablasen por ella
  alternatives_spanish:
  - para que hablaran con ella
  - para que se expresaran por ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El referente más natural es «lengua»; por eso se usa el singular femenino «ella». «Por ella» reproduce bien la idea instrumental y evita una repetición rígida de «con».
- source_word: ወወሀቦሙ መንፈሰ ወልሳነ ወአፈ
  english_pob_choice: and he gave them spirit and tongue and mouth
  chosen_spanish: les dio espíritu y lengua y boca
  alternatives_spanish:
  - les dio aliento y lengua y boca
  - les dio espíritu, lengua y boca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la triada de facultades de habla. Aunque el contexto antropológico favorece «aliento», la coherencia con la revisión inglesa y la repetición léxica interna justifican «espíritu» en esta línea.
- source_word: ከመ ይትናገሩ ቦቱ
  english_pob_choice: so that they might speak with them
  chosen_spanish: para que hablasen por ellos
  alternatives_spanish:
  - para que hablaran con ellos
  - para que hablaran por medio de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural retoma la tríada anterior. «Por ellos» expresa adecuadamente el medio o instrumento en español y mantiene la referencia múltiple.
theological_decisions:
- issue: Cómo renderizar መንፈስ en el primer y segundo uso
  english_pob_reading: The latest English revision reads 'spirit' for lexical consistency, while the earlier note argued for 'breath' in the speech-faculty context.
  chosen_spanish_reading: «espíritu» en el texto principal, con la observación implícita de que el término sigue siendo antropológico y no pneumatológico en sentido estricto.
  alternative_spanish_readings:
  - aliento
  - respiración
  - espíritu
  rationale: El texto inglés auditado decidió fijar «spirit» por consistencia léxica. En español, «espíritu» conserva esa consistencia, pero la secuencia completa («de mi boca», junto con «lengua» y «boca») mantiene visible el ámbito corporativo y evita identificar automáticamente el término con el Espíritu Santo.
  doctrine_reference: Preservar la tensión léxica sin resolverla; primacía del testimonio original sobre la normalización teológica.
- issue: Cómo mantener la antropología encarnada del versículo
  english_pob_reading: Retain 'tongue of flesh' and 'children of the flesh of men' to preserve the text's bodily emphasis.
  chosen_spanish_reading: Conservar «lengua de carne» y «los hijos de la carne de los hombres» en el cuerpo del texto.
  alternative_spanish_readings:
  - lengua humana / seres humanos
  - lengua corporal / humanidad
  rationale: La formulación es deliberadamente redundante y corpórea. El español conserva esa aspereza controlada para no diluir el énfasis en la criatura humana como ser hecho por Dios para hablar.
  doctrine_reference: Primacía del original y resistencia a la paráfrasis suavizante.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que sustituyó «breath» por «spirit» para መንፈስ, además de ajustar la instrumentación final a «with them». La versión española sigue esa decisión léxica principal, pero conserva el marco antropológico del verso mediante «de mi boca», «lengua de carne» y la tríada «espíritu y lengua y boca».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se evita «Cristo» porque no hay material mesiánico en el texto.
  - Se usa minúscula en «espíritu» por tratarse aquí de un término antropológico, no de un título divino.
  - La coordinación asindética «espíritu y lengua y boca» reproduce la acumulación del original.
  - La puntuación busca conservar el ritmo largo y solemne del verso sin sobrecargarlo con segmentaciones modernas.
