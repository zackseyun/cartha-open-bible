translation:
  language: es
  text: Y ahora[a], oh Dios y Señor y gran Rey, te ruego y te pido que establezcas mi oración[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión puede entenderse también como «Y en este momento» o «Y ahora, pues»; se mantiene la forma breve porque refleja bien la transición discursiva.
    reason: lexical_alternative
  - marker: b
    text: El verbo puede entenderse también como «sostengas», «confirmes» o «hagas firme» mi oración; «establezcas» sigue de cerca el sentido idiomático del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y en este momento
  - Y ahora, pues
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula introduce el giro inmediato a la súplica; «Y ahora» comunica bien el valor temporal y discursivo sin sobrecargar el español.
- source_word: አምላክ
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Título divino directo y estándar en español, fiel al valor de la palabra ge'ez.
- source_word: እግዚእ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Título de soberanía en una invocación solemne; «Señor» conserva el registro reverente y el paralelismo con «Dios».
- source_word: ንጉሥ ዐቢይ
  english_pob_choice: great King
  chosen_spanish: gran Rey
  alternatives_spanish:
  - Rey grande
  - Rey poderoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la acumulación honorífica del original con una expresión natural en español; «gran Rey» refleja la intensificación del adjetivo y mantiene el tono litúrgico.
- source_word: አስተበቍዕ
  english_pob_choice: I beseech
  chosen_spanish: te ruego
  alternatives_spanish:
  - te imploro
  - te suplico
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa una petición intensa; «te ruego» es solemne y suficientemente fuerte en español, sin volverse torpe.
- source_word: እስእል
  english_pob_choice: ask
  chosen_spanish: te pido
  alternatives_spanish:
  - te solicito
  - te pido encarecidamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el doblete verbal de la fuente («ruego y pido») sin borrar su fuerza retórica.
- source_word: ከመ ታቅም
  english_pob_choice: that you establish
  chosen_spanish: que establezcas
  alternatives_spanish:
  - que sostengas
  - que confirmes
  - que hagas firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa favorece «establish» como idiomático de un verbo causativo de «hacer estar en pie». «Establezcas» conserva la idea de hacer firme o poner en pie la oración/petición.
- source_word: ስእለተየ
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi petición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto devocional, «oración» comunica naturalmente la súplica dirigida a Dios; «petición» queda como alternativa semántica cercana, pero menos litúrgica.
theological_decisions:
- issue: Acumulación de títulos divinos en invocación directa
  english_pob_reading: 'Retain all three titles: ''God and Lord and great King'''
  chosen_spanish_reading: 'Conservar los tres títulos: «Dios y Señor y gran Rey»'
  alternative_spanish_readings:
  - «Oh gran Dios, Señor y Rey»
  - «Dios, Señor y Rey grande»
  rationale: La enumeración escalonada del ge'ez intensifica la alabanza y la reverencia. La traducción conserva esa progresión sin suavizarla ni fusionarla en una sola fórmula.
  doctrine_reference: Preservar el registro de oración apocalíptica y el énfasis en la soberanía divina.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «establish my prayer» frente a «uphold my prayer», por el valor idiomático del verbo ge'ez de «hacer estar en pie» o «establecer». También se respetó la omisión del dativo explícito en la versión final inglesa, evitando añadir una marca innecesaria en español.
  spanish_consistency_notes:
  - Se mantiene «Dios» para አምላክ y «Señor» para እግዚእ, conforme a los valores títulos del original.
  - Se conserva el paralelismo retórico mediante «te ruego y te pido».
  - «Establezcas» reproduce mejor la decisión auditada que «uphold», sin introducir un matiz ajeno al texto.
  - La puntuación y el orden de los títulos siguen un registro solemne y publicable en español latinoamericano.
