    reason: lexical_alternative
  - marker: c
    text: Compare the biblical throne-and-footstool image in Isa 66:1; the Enochic verse uses the same kind of cosmic royal imagery without requiring identical wording.
    reason: cross_reference
  - marker: d
    text: Or 'and through all generations of generations. All the heavens'.
