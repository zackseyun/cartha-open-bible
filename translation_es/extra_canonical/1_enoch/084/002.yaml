translation:
  language: es
  text: Bendito eres tú, Oh Señor, gran Rey y poderoso en tu grandeza, Señor de toda la creación del cielo[b], Rey de reyes y Dios de todo el mundo. Y tu reinado[a], tu reino y tu grandeza permanecen por siempre y para siempre, y tu autoridad es para todas las generaciones de generaciones. Y todos los cielos son tu trono por siempre[c][d], y toda la tierra es el estrado de tus pies por siempre y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Tu reinado’ traduce aquí un término ge'ez de lectura difícil, tratado en el audit trail inglés como potencialmente ‘tu majestad’, ‘tu dominio’ o ‘tu gloria’.
    reason: source_note
  - marker: b
    text: La secuencia literal es ‘toda la creación del cielo’; también puede entenderse como ‘toda la creación celestial’.
    reason: lexical_alternative
  - marker: c
    text: Compárese la imagen bíblica del trono y el estrado en Is 66:1; aquí se conserva la misma clase de imaginería cósmica.
    reason: cross_reference
  - marker: d
    text: 'También puede leerse con el orden: ‘y para todas las generaciones de generaciones. Y todos los cielos...’.'
    reason: previous_rendering
lexical_decisions:
- source_word: ቡሩክ
  english_pob_choice: Blessed are you
  chosen_spanish: Bendito eres tú
  alternatives_spanish:
  - Bendito seas tú
  - Alabado eres tú
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula predicativa de bendición dirigida a Dios. ‘Bendito eres tú’ conserva el tono doxológico directo sin volverlo excesivamente arcaico.
- source_word: እግዚኦ
  english_pob_choice: O Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - Señor
  - oh Dueño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un vocativo en oración. ‘Oh Señor’ reproduce la invocación reverente y natural en español.
- source_word: ንጉሥ ዐቢይ ወኃያል
  english_pob_choice: great King and mighty
  chosen_spanish: gran Rey y poderoso
  alternatives_spanish:
  - gran Rey y fuerte
  - Rey grande y poderoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene separados el título real y el atributo de poder. ‘Poderoso’ transmite el valor de ‘mighty’ con fluidez en español.
- source_word: በዕበየ ዚአከ
  english_pob_choice: in your greatness
  chosen_spanish: en tu grandeza
  alternatives_spanish:
  - en tu majestad
  - por tu grandeza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción intensifica la descripción anterior. ‘En tu grandeza’ sigue de cerca el giro ge'ez sin sobreinterpretarlo.
- source_word: ኵሉ ፍጥረት ሰማይ
  english_pob_choice: all creation of heaven
  chosen_spanish: toda la creación del cielo
  alternatives_spanish:
  - toda la creación celestial
  - toda criatura del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la secuencia literal con español natural. ‘Del cielo’ deja abierta la amplitud cósmica del sintagma, como en la nota inglesa sobre ‘all heavenly creation’.
- source_word: ንጉሠ ነገሥት
  english_pob_choice: King of kings
  chosen_spanish: Rey de reyes
  alternatives_spanish:
  - Rey sobre reyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el equivalente idiomático establecido y mantiene el superlativo regio sin atenuarlo.
- source_word: አምላከ ኵሉ ዓለም
  english_pob_choice: God of all the world
  chosen_spanish: Dios de todo el mundo
  alternatives_spanish:
  - Dios de toda la tierra
  - Dios de todo el universo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Mundo’ responde bien al valor cósmico de ዓለም en este contexto y suena natural en español litúrgico actual.
- source_word: መላኵትከ
  english_pob_choice: your majesty
  chosen_spanish: tu reinado
  alternatives_spanish:
  - tu majestad
  - tu soberanía
  - tu dominio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura ge'ez es difícil y el audit trail inglés la trató como término real de dificultad textual. En español se opta por ‘reinado’ para reflejar la idea de dominio/régimen sin colisionar con ‘reino’ y sin imponer ‘majestad’ donde la evidencia es incierta.
- source_word: መንግሥትከ
  english_pob_choice: your kingdom
  chosen_spanish: tu reino
  alternatives_spanish:
  - tu reino real
  - tu soberanía
  - tu realeza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el término regio normal. ‘Reino’ preserva tanto el dominio como la esfera de gobierno.
- source_word: ዕበይከ
  english_pob_choice: your greatness
  chosen_spanish: tu grandeza
  alternatives_spanish:
  - tu majestad
  - tu exaltación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la repetición enfática de la grandeza divina que el texto preserva.
- source_word: ይነብር
  english_pob_choice: endure
  chosen_spanish: permanecen
  alternatives_spanish:
  - perduran
  - duran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, ‘permanecen’ comunica continuidad estable y solemne. Se usa en plural para abarcar ‘tu reinado, tu reino y tu grandeza’.
- source_word: ለዓለም ወለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: para siempre y para siempre
  alternatives_spanish:
  - por los siglos de los siglos
  - por siempre y para siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reproduce la fórmula enfática y evita sustituirla por una formulación tradicional que no refleja tan de cerca la repetición del original.
- source_word: ለኵሉ ትውልደ ትውልድ
  english_pob_choice: through all generations of generations
  chosen_spanish: por todas las generaciones de generaciones
  alternatives_spanish:
  - a través de todas las generaciones de generaciones
  - por todas las generaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la repetición semítica sin reducirla a ‘todas las generaciones’, que perdería la intensificación formal.
- source_word: ስልጣንከ
  english_pob_choice: your authority
  chosen_spanish: tu autoridad
  alternatives_spanish:
  - tu dominio
  - tu soberanía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa corrigió una omisión importante; en español se traduce explícitamente para no absorber el sustantivo en la cláusula anterior.
- source_word: ኵሎሙ ሰማያት መንበርከ
  english_pob_choice: All the heavens are your throne
  chosen_spanish: todos los cielos son tu trono
  alternatives_spanish:
  - todos los cielos son tu trono-seat
  - el cielo entero es tu trono
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Cielos’ conserva el plural del ge'ez y el lenguaje cósmico del trono sin diluir la imagen.
- source_word: ኵላ ምድር መካይደ እገሪከ
  english_pob_choice: the whole earth is the footstool of your feet
  chosen_spanish: toda la tierra es el estrado de tus pies
  alternatives_spanish:
  - toda la tierra es el escabel de tus pies
  - la tierra entera es el estrado de tus pies
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Estrado de tus pies’ transmite la imagen bíblica sin el calco pesado ‘banquillo/escabel de tus pies’; mantiene la referencia corporal explícita.
theological_decisions:
- issue: Imaginería cósmica del trono y el estrado
  english_pob_reading: Retained as direct royal-cosmic imagery about God's universal rule
  chosen_spanish_reading: Se conserva como imaginería real-cósmica directa del dominio universal de Dios
  alternative_spanish_readings:
  - Se generaliza como pura alabanza sin imagen
  - Se interpreta alegóricamente como templo
  rationale: El texto es una doxología apocalíptica; la imaginería de trono y estrado debe permanecer concreta y no reducirse a prosa devocional abstracta.
  doctrine_reference: Preservar la imaginería apocalíptica; no aplanar el lenguaje cósmico.
- issue: Tratamiento del término textual difícil መላኵትከ
  english_pob_reading: your majesty / your dominion (textually difficult)
  chosen_spanish_reading: tu reinado
  alternative_spanish_readings:
  - tu majestad
  - tu dominio
  - tu soberanía
  rationale: Dado que el testimonio es difícil y la tradición de revisión inglesa lo dejó marcado como incierto, ‘tu reinado’ ofrece una solución semánticamente segura y coherente con ‘tu reino’ y ‘tu autoridad’, sin fingir mayor certeza de la que permite el texto.
  doctrine_reference: Mantener la tensión textual; no resolver artificialmente una lectura difícil con una equivalencia demasiado específica.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una corrección relevante: se había omitido ስልጣንከ (‘tu autoridad’/‘tu dominio’). La versión española lo incluye explícitamente como ‘tu autoridad’, y además respeta la conjunción inicial ‘Y’. También se toma en cuenta la dificultad textual de መላኵትከ, evitando una traducción demasiado cerrada y conservando la línea de revisión que lo trata como término incierto.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino solo cuando aparece el Tetragrámaton; aquí no aparece.
  - ‘Señor’ se conserva como vocativo directo de እግዚኦ.
  - Se mantiene ‘Dios’ para አምላከ sin singularizar ni pluralizar indebidamente.
  - La fórmula ‘para siempre y para siempre’ sigue la repetición enfática del original.
  - El plural ‘cielos’ conserva la forma ge'ez y la imaginería cósmica.
  - ‘Tu reinado’ y ‘tu reino’ se diferencian para reflejar la posible tensión léxica del texto difícil sin perder naturalidad en español.
