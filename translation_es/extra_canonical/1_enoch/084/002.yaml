  language: en
  yaml_path: translation/extra_canonical/1_enoch/084/002.yaml
  text: Blessed are you[a], O Lord, great King and mighty in your greatness, Lord of all the creation of heaven, King of kings and God of all the world. And your kingship and your kingdom and your greatness endure forever and ever, and your authority is for all generations of generations. And all the heavens are your throne forever[d][c][b], and the whole earth is the footstool of your feet forever and ever.
