  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del ge''ez y del audit trail inglés: conserva la doxología, la realeza cósmica, la cláusula explícita de ‘tu autoridad’ y la imagen de trono/estrado. También mantiene la dificultad textual de መላኵትከ mediante nota. Sin embargo, hay varios puntos mejorables para mayor fidelidad y legibilidad: ‘oh Señor’ debe capitalizarse como ‘Oh Señor’ si se conserva la interjección; ‘por todas las generaciones de generaciones’ suena poco natural tras ‘tu autoridad es’, donde ‘para todas…’ refleja mejor el inglés revisado y el valor durativo; ‘para siempre y para siempre’ es demasiado rígido en español y ‘por siempre y para siempre’ o ‘por los siglos de los siglos’ sería más idiomático, pero puede mantenerse una forma cercana al original; y la nota a) no corresponde bien al término anclado en el texto, porque la dificultad textual en el audit trail no recae sobre ‘Bendito eres tú’ sino sobre መላኵትከ.'
