translation:
  language: es
  text: Y sucedió después de esto que su nombre vivo fue alzado[a] delante de aquel Hijo del Hombre y delante del Señor de los Espíritus, lejos de los que habitan en la tierra seca[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «su nombre fue alzado». La expresión puede referirse a que Enoc mismo fue llevado a la presencia del Hijo del Hombre y del Señor de los Espíritus mientras aún vivía.
    reason: lexical_alternative
  - marker: b
    text: O «de la tierra». El ge'ez dice más específicamente «sobre la tierra seca».
    reason: lexical_alternative
lexical_decisions:
- source_word: ተለዓለ፡
  english_pob_choice: was lifted up
  chosen_spanish: fue alzado
  alternatives_spanish:
  - fue levantado
  - fue elevado
  - fue llevado arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Fue alzado» conserva la imagen espacial de elevación y mantiene abierta la posible lectura de asunción o exaltación, sin sobreinterpretar el verbo ge'ez.
- source_word: ስሙ፡
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su renombre
  - su persona
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto dice literalmente «su nombre»; en español se conserva la expresión para no borrar el rasgo semítico donde nombre y persona pueden quedar estrechamente vinculados.
- source_word: ሕያው፡
  english_pob_choice: his living name
  chosen_spanish: su nombre vivo
  alternatives_spanish:
  - su nombre viviente
  - su nombre durante su vida
  - estando aún vivo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión busca reflejar con mayor cercanía la formulación del texto y la revisión inglesa más reciente, manteniendo el carácter inusual de la frase sin convertirla en una paráfrasis.
- source_word: በኀቤሁ፡ ለውእቱ፡ ወልደ፡ እጓለ፡ እመሕያው፡
  english_pob_choice: before that Son of Man
  chosen_spanish: delante de aquel Hijo del Hombre
  alternatives_spanish:
  - ante aquel Hijo del Hombre
  - en presencia de aquel Hijo del Hombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Delante de» reproduce bien el valor espacial/presencial de la preposición y evita suavizar la escena visionaria. «Aquel» refleja el demostrativo del ge'ez.
- source_word: እግዚአ፡ መናፍስት፡
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título estable de 1 Enoc en una forma natural en español, con mayúscula reverencial y sin diluir la fórmula.
- source_word: እምእለ፡ የኃድሩ፡ ዲበ፡ የብስ።
  english_pob_choice: away from those who dwell on the dry ground
  chosen_spanish: lejos de los que habitan sobre la tierra seca
  alternatives_spanish:
  - lejos de los que habitan en la tierra
  - lejos de los habitantes del suelo seco
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tierra seca» conserva el matiz concreto de የብስ que la audición inglesa destacó como «dry ground», y «habitan sobre» mantiene la imagen espacial sin volverla abstracta.
theological_decisions:
- issue: Cómo traducir el sintagma «su nombre fue alzado» sin borrar la tensión entre nombre, persona y asunción
  english_pob_reading: Retain the literal 'his name was lifted up' in the main text, with the implication of Enoch's own translation left implicit
  chosen_spanish_reading: 'Se mantiene la literalidad básica: «su nombre vivo fue alzado», dejando implícita la posible referencia al propio Enoc.'
  alternative_spanish_readings:
  - fue llevado arriba estando aún vivo
  - su fama fue exaltada
  rationale: La redacción ge'ez preserva «nombre»; por eso conviene no resolverlo del todo en «Enoc fue llevado». La forma escogida deja visible la tensión interpretativa y respeta el registro apocalíptico.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Cómo reflejar el título ወልደ እጓለ እመሕያው
  english_pob_reading: that Son of Man
  chosen_spanish_reading: aquel Hijo del Hombre
  alternative_spanish_readings:
  - ese Hijo del Hombre
  - aquel hijo del hombre
  rationale: En este contexto parenético-apocalíptico el título funciona de modo técnico; la mayúscula ayuda a señalarlo sin importar teología ajena al pasaje. «Aquel» conserva la especificidad demostrativa.
  doctrine_reference: Book context note 3; Translation philosophy §2
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail: se prefirió una formulación que conserve el carácter literal de «his living name», se cambió la relación espacial a «delante de» para በኀቤ, y se mantuvo la referencia concreta a «tierra seca» como reflejo de የብስ.'
  spanish_consistency_notes:
  - Se usa «Señor de los Espíritus» de manera consistente con el título establecido en 1 Enoc.
  - Se preserva «Hijo del Hombre» como título, con mayúscula, conforme al uso apocalíptico del contexto.
  - Se mantiene «tierra seca» para no neutralizar la imaginería cosmológica del original.
  - Las notas al pie anclan solo alternativas reales y están marcadas en el texto con [a] y [b].
