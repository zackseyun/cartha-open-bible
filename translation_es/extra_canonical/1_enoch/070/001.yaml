base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/070/001.yaml
  text: And it came to pass after this that his living name was lifted up before that Son of Man and before the Lord of Spirits[b][a], away from those who dwell on the dry ground.
  footnotes:
  - marker: a
    text: Literally, 'his name was lifted up.' The expression may refer to Enoch himself being taken up into the presence of the Son of Man and the Lord of Spirits while still alive.
    reason: lexical_alternative
  - marker: b
    text: Or 'from those who dwell on the earth.' The Ge'ez more specifically says 'upon the dry ground.'
    reason: lexical_alternative
