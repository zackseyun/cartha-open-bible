translation:
  language: es
  text: Y fue levantado[a] en el carro del espíritu, y su nombre desapareció de entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue llevado». El verbo ge''ez puede expresar ser alzado o llevado hacia arriba; «fue levantado» preserva mejor la imaginería ascendente sin precisar si el traslado fue corporal, visionario u honorífico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ተለዓለ፡
  english_pob_choice: was lifted up / was taken up
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue levantado
  - fue tomado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa un movimiento pasivo hacia arriba o de retirada. En español, «fue llevado» conserva la pasividad y la idea de traslado sin decidir indebidamente entre ascenso corporal, traslado visionario o exaltación.
- source_word: በሠረገላተ፡ መንፈስ፡
  english_pob_choice: on the chariot of the spirit
  chosen_spanish: en el carro del espíritu
  alternatives_spanish:
  - sobre el carro del espíritu
  - en la carroza del espíritu
  lexicon: Uso contextual del ge'ez; correspondencia léxica de ሠረገላ / chariot
  rationale: «Carro» es una forma natural y digna en español para ሠረገላ, y «del espíritu» mantiene la relación genitiva sin forzar una mayúscula teológica que el contexto no exige de manera explícita aquí.
- source_word: ወስሙ፡ ኀለፈ፡ ማእከሎሙ።
  english_pob_choice: and his name vanished from among them
  chosen_spanish: y su nombre pasó de en medio de ellos
  alternatives_spanish:
  - y su nombre desapareció de entre ellos
  - y su nombre se fue de en medio de ellos
  lexicon: Ge'ez ኀለፈ en valor de pasar, desaparecer, irse; comparación con el audit trail inglés
  rationale: «Pasó de en medio de ellos» sigue de cerca el valor verbal básico de ኀለፈ sin añadir una interpretación más fuerte de desaparición absoluta. En español conserva la imagen de retirada del ámbito común y evita resolver la tensión entre desaparecer y pasar.
theological_decisions:
- issue: Naturaleza de la elevación de Enoch
  english_pob_reading: A literal upward taking in visionary/apocalyptic narrative
  chosen_spanish_reading: Un traslado ascendente en relato visionario/apocalíptico
  alternative_spanish_readings:
  - Una exaltación simbólica
  - Un simple cambio de escena visionaria
  rationale: 'La frase española conserva la ambigüedad del original y del audit trail: hay movimiento ascendente y traslado, pero el texto no obliga a precisar si fue corporal, visionario u honorífico. «Fue llevado» evita resolver esa tensión.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: El audit trail inglés muestra que el texto ge'ez completo incluye la frase sobre el carro del espíritu, y luego una clausula sobre el nombre que pasa de en medio de ellos. La versión española sigue la revisión restaurada y evita las truncaciones previas, manteniendo solo lo que el source packet y la revisión respaldan.
  spanish_consistency_notes:
  - Se usa «fue llevado» para sostener un registro bíblico claro sin caer en arcaísmo innecesario.
  - «Espíritu» se mantiene en minúscula en el sintagma por tratarse del ge'ez መንፈስ en esta construcción, sin forzar una identificación explícita con el Espíritu Santo.
  - «de en medio de ellos» reproduce la fuerza locativa del original con naturalidad en español.
