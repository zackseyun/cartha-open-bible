revisions:
- from: Y fue llevado[a] en el carro del espíritu[b], y su nombre pasó de en medio de ellos.
  to: Y fue levantado[a] en el carro del espíritu, y su nombre desapareció de entre ellos.
  rationale: Se ajusta el verbo principal para reflejar mejor el matiz ascendente de ተለዐለ según el audit trail inglés y la revisión adjudicada. También se sustituye una frase española poco natural por una formulación idiomática que preserva el sentido de retirada/desaparición del nombre. Se elimina la nota sobre mayúscula de «espíritu» por innecesaria en este verso.
