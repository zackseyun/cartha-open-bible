base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/068/004.yaml
  text: 'And it came to pass[a], when he stood before the Lord of Spirits, that Michael said this to Raphael: “He will not be for them before the eye of the Lord, for the Lord of Spirits is angry with them[c][b], because they act as if they were the Lord.”'
  footnotes:
  - marker: a
    text: The clause 'He will not be for them before the eye of the Lord' is difficult. It likely means that no support or advocacy will stand for them in God's presence.
    reason: lexical_alternative
  - marker: b
    text: Or, 'because they act like lords.' The Ge'ez wording is terse and may accuse them of assuming divine or ruling authority that is not theirs.
    reason: lexical_alternative
  - marker: c
    text: Or 'He will not be for them'.
    reason: previous_rendering
