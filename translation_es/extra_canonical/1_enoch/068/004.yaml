translation:
  language: es
  text: 'Y aconteció[a] que, cuando él se puso ante el Señor de los Espíritus, Miguel dijo esto a Rafael: «Él no estará por ellos[b] ante los ojos del Señor, porque el Señor de los Espíritus está airado con ellos, porque actúan como si fueran el Señor[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La fórmula narrativa «Y aconteció» reproduce el tono de transición característico del relato apocalíptico.
    reason: source_note
  - marker: b
    text: La cláusula es difícil. En el ge'ez puede sugerir que no habrá apoyo o defensa para ellos en la presencia de Dios; el español conserva la ambigüedad de «estará por ellos».
    reason: lexical_alternative
  - marker: c
    text: 'También puede entenderse: «como si fueran señores». El ge''ez es breve y puede acusarlos de asumir una autoridad divina o de gobierno que no les corresponde.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወኮነ፡ ሶበ፡
  english_pob_choice: And it came to pass, when
  chosen_spanish: Y aconteció, cuando
  alternatives_spanish:
  - Y sucedió, cuando
  - Y fue que, cuando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la fórmula narrativa y el giro temporal apocalíptico sin sonar excesivamente arcaico en español.
- source_word: ቆመ፡
  english_pob_choice: he stood
  chosen_spanish: se puso
  alternatives_spanish:
  - estuvo de pie
  - se mantuvo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «se puso delante de» expresa bien la escena judicial/visionaria de presentarse ante alguien, manteniendo la idea básica de estar en pie sin forzar un calco rígido.
- source_word: በቅድመ፡ እግዚአ፡ መናፍስት፡
  english_pob_choice: before the Lord of Spirits
  chosen_spanish: delante del Señor de los Espíritus
  alternatives_spanish:
  - en presencia del Señor de los Espíritus
  - ante el Señor de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Delante de» conserva el valor espacial y judicial de la escena, y «Señor de los Espíritus» sigue el título en estilo natural para el lector hispanohablante.
- source_word: ወከመ'ዝ፡ ይቤሎ፡
  english_pob_choice: that ... said this to
  chosen_spanish: dijo esto a
  alternatives_spanish:
  - así le dijo a
  - y le dijo estas palabras a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula introductoria se vuelve naturalmente discursiva en español, sin perder la referencia a un dicho concreto.
- source_word: ወኢይከውን፡ ሎሙ፡ በውስተ፡ ዓይነ፡ እግዚአ፡
  english_pob_choice: He will not be for them before the eye of the Lord
  chosen_spanish: Él no estará por ellos ante los ojos del Señor
  alternatives_spanish:
  - Él no tomará su parte ante los ojos del Señor
  - Él no estará a favor de ellos ante los ojos del Señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «No estará por ellos» refleja la ambigüedad del giro etiopico y mantiene la tensión interpretativa documentada por la POB. «Ante los ojos del Señor» reproduce la imagen sin convertirla en una abstracción.
- source_word: ተምዕዖሙ፡
  english_pob_choice: is angry with them
  chosen_spanish: está airado con ellos
  alternatives_spanish:
  - está enojado con ellos
  - se ha indignado contra ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Airado» transmite el tono judicial y solemne del contexto mejor que un coloquialismo.
- source_word: እምሳለ፡ እግዚአ፡ ይገብሩ።
  english_pob_choice: they act as if they were the Lord
  chosen_spanish: actúan como si fueran el Señor
  alternatives_spanish:
  - se comportan como si fueran el Señor
  - actúan como señores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación preserva la acusación de usurpar una prerrogativa divina. En español, «como si fueran el Señor» mantiene la fuerza teológica de la expresión sin suavizarla.
theological_decisions:
- issue: Ambigüedad del sujeto implícito en «no estará por ellos»
  english_pob_reading: The main text preserves the third-person singular without naming the referent; the POB notes allow an advocacy/support sense but avoid specifying an intercessor.
  chosen_spanish_reading: «Él no estará por ellos» mantiene la misma ambigüedad, sin identificar al sujeto en el texto principal.
  alternative_spanish_readings:
  - No tomará su parte
  - No intercederá por ellos
  rationale: La fuente ge'ez no obliga a resolver el referente; el español conserva esa tensión para no añadir una interpretación no explicitada.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Alcance de la acusación contra los seres condenados
  english_pob_reading: They act as if they were the Lord.
  chosen_spanish_reading: «Actúan como si fueran el Señor» mantiene la imputación de asumir prerrogativas divinas.
  alternative_spanish_readings:
  - actúan como señores
  - actúan como si fueran dioses
  rationale: 'La lectura elegida conserva el peso teológico del texto: no solo arrogancia, sino usurpación de un lugar que corresponde a Yahvé.'
  doctrine_reference: Usurpación de prerrogativas divinas; juicio contra la arrogancia angélica.
translation_notes:
  revision_awareness: La versión inglesa más reciente volvió de «take their part» a la forma más literal «be for them» para no resolver la ambigüedad del ge'ez. En español, por eso se evita una traducción interpretativa cerrada y se conserva un giro igualmente abierto («no estará por ellos»), mientras se mantiene la nota explicativa sobre la posible idea de apoyo/defensa.
  spanish_consistency_notes:
  - Se mantiene «Señor de los Espíritus» como título fijo de esta sección.
  - Se usa «Espíritu(s)» en mayúscula solo dentro del título divino, no como sustantivo común.
  - «Señor» traduce el título divino del contexto sin introducir «SEÑOR» en versales.
  - La puntuación conserva el discurso directo y la separación entre narración y cita.
  - La ambigüedad de «por ellos» queda explicada en la nota sin alterar el texto principal.
