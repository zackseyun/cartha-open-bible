translation:
  language: es
  text: 'Y Mikael respondió otra vez y dijo a Rufael: «¿Quién es aquel cuyo corazón no se ablanda por esto, y cuyos riñones[a] no están perturbados por esta palabra de severidad y por la sentencia que ha salido contra ellos desde entre ellos[b][c], así?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuyo interior no está perturbado». El ge'ez dice literalmente «riñones», una imagen corporal tradicional del yo interior.
    reason: lexical_alternative
  - marker: b
    text: El cierre es textualmente difícil en el testimonio etíope, sobre todo alrededor de la última cláusula. Se conserva un español cauteloso en lugar de reconstruirla con mayor seguridad.
    reason: textual_variant
  - marker: c
    text: O «por esto», «a causa de ello» o «con respecto a ello»; el referente del pronombre permanece ambiguo en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወአውሥአ ካዕበ
  english_pob_choice: answered again
  chosen_spanish: respondió otra vez
  alternatives_spanish:
  - respondió de nuevo
  - contestó otra vez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula narrativa pide una respuesta repetida; «respondió otra vez» conserva la repetición sin sonar forzado en español.
- source_word: ሚካኤል
  english_pob_choice: Michael
  chosen_spanish: Mikael
  alternatives_spanish:
  - Miguel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la forma etíope más cercana al texto fuente, en vez de normalizar al nombre más familiar en español.
- source_word: ለሩፋኤል
  english_pob_choice: to Raphael/Rufael
  chosen_spanish: a Rufael
  alternatives_spanish:
  - a Rafael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma etiópica del nombre se mantiene como Rufael, siguiendo la política del proyecto de transliterar nombres propios cuando la fuente los presenta así.
- source_word: ዘኢይረክሕ ልቡ
  english_pob_choice: whose heart is not softened
  chosen_spanish: el que no tiene ablandado el corazón
  alternatives_spanish:
  - el que no tiene suavizado el corazón
  - cuyo corazón no está ablandado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez expresa literalmente la imagen de un corazón que se vuelve blando/suave; en español, «tener ablandado el corazón» preserva esa imagen corporal y la idea de ser conmovido.
- source_word: ዲቤሃ
  english_pob_choice: concerning it
  chosen_spanish: por esto
  alternatives_spanish:
  - con respecto a ello
  - a causa de ello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El referente es oscuro; «por esto» mantiene la ambigüedad sin fijar demasiado el antecedente, pero da un español natural.
- source_word: ኢይትሀወክ ኵልያቲሁ
  english_pob_choice: whose kidneys are not troubled
  chosen_spanish: cuyos riñones no están perturbados
  alternatives_spanish:
  - cuyas entrañas no están perturbadas
  - cuyo interior no está agitado
  - cuyos riñones no están turbados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva «riñones» para respetar la antropología corporal semítica del texto; «perturbados» traduce bien la agitación interior.
- source_word: ቃለ ጽነኒ
  english_pob_choice: word of severity
  chosen_spanish: palabra de severidad
  alternatives_spanish:
  - palabra severa
  - palabra dura
  - decreto severo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase suena judicial y solemne; «palabra de severidad» mantiene el tono formal y la relación con un pronunciamiento grave.
- source_word: ፅእት ዲቤሆሙ
  english_pob_choice: the sentence that has gone out against them
  chosen_spanish: la sentencia que ha salido contra ellos
  alternatives_spanish:
  - el juicio que ha salido contra ellos
  - el decreto que ha salido contra ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sentencia» refleja bien el carácter judicial del pasaje; el verbo «ha salido» conserva la imagen de un pronunciamiento emitido.
- source_word: '[እምኔሆሙ] ዘአውፅእዎሙ ከመ''ዝ'
  english_pob_choice: from among them thus
  chosen_spanish: contra ellos, así
  alternatives_spanish:
  - desde entre ellos, así
  - por causa de ellos, así
  - contra los que los sacaron así
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El cierre es textualmente difícil. «Contra ellos, así» conserva la cautela del testimonio sin introducir una reconstrucción más amplia que el texto no asegura.
theological_decisions:
- issue: Antropología bíblica de corazón y riñones
  english_pob_reading: Retain bodily terms rather than replacing them with abstract psychology
  chosen_spanish_reading: Conservar «corazón» y «riñones» como imágenes corporales del interior humano
  alternative_spanish_readings:
  - sustituir por «mente» e «interior»
  - parafrasear como «cuyo ánimo no está perturbado»
  rationale: El texto usa lenguaje semítico antiguo sobre la respuesta interior. Mantener los términos corporales evita aplanar la imaginería y deja visible la tensión del original.
  doctrine_reference: 'Translation philosophy: preserve source-text plain sense and theological tension; do not flatten imagery.'
- issue: Ambigüedad del pronombre final y del cierre textual
  english_pob_reading: Cautious rendering of the difficult closing clause
  chosen_spanish_reading: Mantener un cierre sobrio e indeterminado sin resolver la cláusula oscura
  alternative_spanish_readings:
  - expandir el sentido causal
  - hacer explícito un sujeto implícito
  rationale: La tradición textual es difícil en este punto. La traducción española debe mostrar esa incertidumbre en vez de ocultarla con una solución interpretativa demasiado segura.
  doctrine_reference: 'Translation philosophy: preserve source-text plain sense and theological tension; do not over-resolve textual uncertainty.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió la omisión del sujeto explícito Mikael/Michael en el ge'ez y la dificultad de la cláusula final. Por eso el español nombra a Mikael, conserva el destinatario Rufael y evita una expansión interpretativa fuerte al final.
  spanish_consistency_notes:
  - Se mantiene «Mikael» y «Rufael» como transliteraciones coherentes con la política del proyecto para nombres etiópicos.
  - Se preserva la imaginería corporal de «corazón» y «riñones» en vez de abstraerla.
  - Se usa un registro solemne y sobrio para «palabra de severidad» y «sentencia».
  - Las notas se limitan a alternativas reales del texto y no introducen lexicon-entry numbers ni reconstrucciones no atestiguadas.
