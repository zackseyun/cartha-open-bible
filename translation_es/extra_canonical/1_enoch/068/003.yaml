base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/068/003.yaml
  text: And Michael answered again and said to Raphael[a], "Who is he whose heart is not softened concerning it[d][c][b], and whose kidneys are not troubled by this word of severity and the sentence that has gone out against them from among them thus?"
  footnotes:
  - marker: a
    text: Or 'whose inward parts are not troubled.' The Ge'ez literally says 'kidneys,' a traditional bodily image for the inner self.
    reason: lexical_alternative
  - marker: b
    text: The closing clause is textually difficult in the Ethiopic witness, especially around the bracketed word. The translation keeps the wording cautious rather than adopting a more confident reconstruction.
    reason: textual_variant
  - marker: c
    text: Or 'And he answered again and said to Rufael,'.
    reason: previous_rendering
  - marker: d
    text: Or 'from before them?'.
    reason: previous_rendering
