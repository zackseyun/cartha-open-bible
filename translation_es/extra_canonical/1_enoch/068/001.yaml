base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/068/001.yaml
  text: And after this my grandfather Hēnok gave me the explanation of all the hidden things in a book[a], and the parables that had been given to him[c][b]; and they shall recount them to me in the words of the book of the Parable.
  footnotes:
  - marker: a
    text: The line is textually difficult in the Ge'ez witness, especially in the clauses 'from the words of Hēnok' and 'they shall recount them to me.' The translation stays close to the surviving wording rather than smoothing the syntax.
