translation:
  language: es
  text: Y después de esto mi abuelo Henoc me dio[a] la explicación de todas las cosas ocultas en un libro, y las parábolas[b] que le habían sido dadas; y ellos me las contarán en las palabras del libro de la Parábola.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea es textualmente difícil en el testimonio ge''ez, especialmente en esta cláusula y en la frase final. La traducción se mantiene cerca de la redacción conservada en vez de suavizar la sintaxis. Además, una revisión del audit trail corrigió aquí una lectura errónea: እምሔውየ significa «mi abuelo» o «mi antepasado», no «de las palabras de».'
    reason: textual_variant
  - marker: b
    text: «Parábolas» también puede traducirse «similitudes». El término conserva el título tradicional de esta sección.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሀበኒ
  english_pob_choice: gave me
  chosen_spanish: me dio
  alternatives_spanish:
  - me concedió
  - me entregó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa una acción de dar/otorgar; en español, 'me dio' es directo y fiel sin añadir matiz no sustentado por el contexto.
- source_word: ትእምርተ
  english_pob_choice: the sign / explanation
  chosen_spanish: la explicación
  alternatives_spanish:
  - la señal
  - el signo
  - la indicación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Siguiendo la revisión más reciente del audit trail, 'explicación' refleja mejor el valor aquí de una aclaración revelada del contenido oculto. Se conserva la tensión apocalíptica sin imponer 'misterio'.
- source_word: ኵሎሙ ኅቡኣት
  english_pob_choice: all the hidden things
  chosen_spanish: todos los hechos ocultos
  alternatives_spanish:
  - todas las cosas ocultas
  - todos los secretos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hechos ocultos'' mantiene la referencia a realidades/elementos revelados sin forzar ''misterios''. ''Ocultos'' conserva el contraste revelación/ocultamiento del original.'
- source_word: በመጽሐፍ
  english_pob_choice: in the book
  chosen_spanish: en un libro
  alternatives_spanish:
  - en el libro
  - por medio de un libro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez ubica el contenido dentro del libro. El artículo indefinido en español evita sobreespecificar un libro ya no explícito en esta cláusula.
- source_word: ምሳሌያተ
  english_pob_choice: the parables
  chosen_spanish: las parábolas
  alternatives_spanish:
  - las similitudes
  - las figuras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Parábolas'' es la equivalencia natural y reconocible en español, coherente con el nombre tradicional de esta sección, sin perder el valor comparativo del término.'
- source_word: ተውህበ ሎቱ
  english_pob_choice: had been given to him
  chosen_spanish: le habían sido dadas
  alternatives_spanish:
  - le habían sido concedidas
  - le fueron dadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva indica recepción por parte de Hēnok. 'Le habían sido dadas' conserva el valor retrospectivo y evita introducir una interpretación más fuerte que el texto no exige.
- source_word: ይመርሙ ሊተ
  english_pob_choice: they shall recount them to me
  chosen_spanish: me las contarán
  alternatives_spanish:
  - me las explicarán
  - me las relatarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo es difícil y el audit trail inglés conserva un sentido de narración/exposición. 'Me las contarán' mantiene esa apertura sin resolver indebidamente el matiz técnico.
- source_word: ነገረ መጽሐፍ ዘምሳሌ
  english_pob_choice: the words of the book of the Parable
  chosen_spanish: las palabras del libro de la Parábola
  alternatives_spanish:
  - el relato del libro de la Parábola
  - el asunto del libro de la Parábola
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Palabras'' refleja el campo semántico de ነገር en un contexto literario y preserva la dificultad textual sin suavizarla. Se conserva el singular ''Parábola'' por fidelidad al testimonio inmediato.'
theological_decisions:
- issue: Cómo expresar el contenido revelado sin imponer una terminología doctrinal posterior
  english_pob_reading: hidden things
  chosen_spanish_reading: hechos ocultos
  alternative_spanish_readings:
  - secretos
  - misterios
  rationale: La escena es revelatoria, pero el ge'ez no obliga a un término técnico como 'misterios'. 'Hechos ocultos' preserva la tensión entre ocultamiento y revelación sin cargarla doctrinalmente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
- issue: 'Relación entre Enoch y el hablante: no minimizar el vínculo familiar explícito'
  english_pob_reading: my grandfather Hēnok
  chosen_spanish_reading: mi abuelo Hēnok
  alternative_spanish_readings:
  - mi antepasado Hēnok
  - mi ancestro Hēnok
  rationale: El testimonio ge'ez contiene un posesivo explícito; 'abuelo' mantiene la relación familiar concreta que la revisión corrigió, y 'mi' preserva el sujeto narrativo.
  doctrine_reference: 'Principio de revisión textual: mantener el sujeto explícito de እምሔውየ'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que corrige la antigua lectura de እምሔውየ como si significara «de las palabras de» y mantiene a Hēnok como sujeto explícito de «me dio». También refleja el cambio de 'sign' a 'explanation' y de 'account' a 'words' en la historia de revisiones del English POB.
  spanish_consistency_notes:
  - Se mantiene la transliteración Hēnok para concordar con el expediente auditado y evitar oscurecer la referencia textual.
  - Se usó 'Parábola' en singular en el título interno de la cláusula, siguiendo el testimonio inmediato del ge'ez y el audit trail inglés.
  - Se eligió un español sobrio y publication-readable, evitando tanto el calco rígido como la paráfrasis expansiva.
