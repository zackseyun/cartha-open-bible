    issue: «hechos ocultos» traduce de forma imprecisa ኵሎሙ ኅቡኣት
    rationale: El original y el audit trail apuntan a «hidden things», no a «hechos» en sentido de acontecimientos. «Cosas ocultas» preserva mejor el referente amplio y revelatorio sin estrecharlo.
  - severity: low
