    rationale: La POB inglesa documenta que la línea ge'ez es difícil y que la traducción mantiene la aspereza. Dado que el español también conserva una sintaxis poco lisa, conviene explicarlo para transparencia textual.
  - severity: low
    issue: «Hēnok» resulta poco natural en una edición bíblica en español
    rationale: «Henoc» sería la forma más legible y normal en español. No obstante, esto es una mejora estilística menor, no un error de fidelidad si la edición desea conservar la transliteración auditada.
