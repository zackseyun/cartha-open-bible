translation:
  language: es
  text: A causa de esto[a], todo lo oculto[b] para siempre vendrá sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por esta razón»; el ge’ez introduce una relación causal directa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todo lo oculto desde antiguo vendrá sobre ellos» o «todo lo oculto vendrá sobre ellos para siempre». El valor de ለዓለመ puede denotar eternidad, una era o antigua duración, y su relación sintáctica exacta aquí es discutida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በእንተ'ዝ
  english_pob_choice: Because of this
  chosen_spanish: A causa de esto
  alternatives_spanish:
  - Por esta razón
  - Por esto
  - Así pues
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge’ez expresa una relación causal directa. «A causa de esto» conserva esa fuerza causal de manera natural en español sin rebajarla a una mera conexión discursiva.
- source_word: ኵሉ
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo
  - todo aquello
  - todas las cosas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para el total abarcador, «todo» es la forma más natural en español y mantiene la amplitud indefinida del original.
- source_word: ዘኅቡእ
  english_pob_choice: hidden
  chosen_spanish: lo oculto
  alternatives_spanish:
  - lo escondido
  - lo secreto
  - lo encubierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lo oculto» preserva el sentido de aquello que está cubierto o escondido, y evita resolver prematuramente si se trata de hechos, realidades o juicios reservados.
- source_word: ይመጽእ
  english_pob_choice: shall come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá sobre
  - sobrevendrá
  - ha de venir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo futuro expresa el valor profético del original. «Vendrá sobre ellos» mantiene además la relación de imposición o irrupción sugerida por la preposición ge’ez.
- source_word: ላዕሌሆሙ
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - encima de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre ellos» conserva el movimiento hacia la esfera de los destinatarios y su tono judicial, sin introducir una interpretación más fuerte que el texto no exige.
- source_word: ለዓለመ
  english_pob_choice: forever
  chosen_spanish: no se convirtió en un adverbio independiente en el texto principal; se refleja en la nota textual
  alternatives_spanish:
  - para siempre
  - por la era
  - desde antiguo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La tradición auditada presenta una tensión sobre si «forever» modifica «hidden» o «shall come». En español, para no fijar una solución no segura en el cuerpo del verso, se deja en nota la alternativa de lectura.
theological_decisions:
- issue: Si «lo oculto» debe leerse como revelación de secretos o como juicio oculto que llega sobre los impíos
  english_pob_reading: 'The clause is rendered as concealed realities or judgments now coming upon them: ''everything hidden forever shall come upon them.'''
  chosen_spanish_reading: '«todo lo oculto vendrá sobre ellos» preserva el alcance abierto: puede abarcar realidades ocultas, acciones escondidas o juicios reservados que recaen sobre ellos.'
  alternative_spanish_readings:
  - «todo lo que ha sido ocultado vendrá sobre ellos»
  - «todo lo oculto desde antiguo vendrá sobre ellos»
  - «todo juicio escondido vendrá sobre ellos»
  rationale: El ge’ez afirma el venir «sobre ellos», no simplemente una revelación. Por eso la traducción mantiene el verbo de irrupción y no resuelve el referente de «lo oculto» más de lo que el texto permite.
  doctrine_reference: Preservar la tensión apocalíptica y judicial del pasaje; no aplanar la ambigüedad hacia una sola lectura interpretativa.
- issue: Dónde colocar el valor temporal de ለዓለመ
  english_pob_reading: The audit trail notes disagreement about whether 'forever' modifies 'hidden' or 'shall come.'
  chosen_spanish_reading: Se evita introducir «para siempre» en el texto principal para no decidir la ambigüedad sintáctica sin base suficiente en esta línea aislada.
  alternative_spanish_readings:
  - «todo lo oculto para siempre vendrá sobre ellos»
  - «todo lo oculto vendrá sobre ellos para siempre»
  - «todo lo oculto desde antiguo vendrá sobre ellos»
  rationale: La evidencia auditada muestra tensión editorial sobre la función de ለዓለመ. En español, la solución más prudente es reflejar el contenido seguro del enunciado y consignar la variante en nota.
  doctrine_reference: Respetar la incertidumbre sintáctica y no resolverla artificialmente en la línea principal.
translation_notes:
  revision_awareness: La auditoría inglesa osciló entre relacionar «forever» con «hidden» y con «shall come upon them». La versión española evita fijar esa decisión en el cuerpo del verso y preserva el alcance judicial de la frase con una nota de variante textual.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé/Mesías» según las pautas generales del proyecto, pero este versículo no contiene esos términos.
  - Se prefirió «lo oculto» para mantener abierta la referencia semántica del participio relativo ge’ez.
  - Se mantuvo un registro solemne y apocalíptico sin calco forzado del inglés.
