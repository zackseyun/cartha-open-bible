base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/068/002.yaml
  text: And on that day Michael answered[a], saying to Raphael, “The power of the spirit seizes me and provokes me because of the severity of the judgment concerning the hidden secrets. Who is there that can endure the severe judgment that has been executed[c][b], and before which they melt away?”
  footnotes:
  - marker: a
    text: The Ge'ez text of this line is difficult, and the clause rendered 'because of the severity of the judgment concerning these hidden things' may also be understood more literally as a terrible matter 'for the ear' concerning hidden things.
    reason: textual_variant
  - marker: b
    text: Or 'who can bear the severe thing that has been done?' The wording may refer either to the judgment itself or to the revelation of it.
    reason: lexical_alternative
  - marker: c
    text: Or 'drives me on'.
    reason: previous_rendering
