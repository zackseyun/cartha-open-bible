translation:
  language: es
  text: 'Y en aquel día Miguel respondió, diciendo a Rafael: «El poder del espíritu me arrebata y me provoca por la severidad del juicio acerca de los secretos escondidos[a]. ¿Quién puede soportar el severo juicio que ha sido ejecutado[b], y ante el cual se derriten?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La redacción ge'ez es difícil; esta cláusula también puede entenderse, de manera más literal, como una cosa terrible «para el oído» acerca de los secretos escondidos.
    reason: textual_variant
  - marker: b
    text: 'O: «ha sido hecho»; la expresión puede referirse al juicio mismo o a la revelación de él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አውሥአ
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «respondió» mantiene el valor narrativo de réplica directa en diálogo. «Contestó» sería posible, pero «respondió» conserva mejor el tono formal del relato apocalíptico.
- source_word: መንፈስ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el Espíritu
  - el viento
  - el aliento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto visionario apunta a una fuerza interior o espiritual, no a viento o aliento literal. Se deja en minúscula porque el texto no obliga a identificarlo con el Espíritu Santo.
- source_word: ይመሥጠኒ
  english_pob_choice: seizes me
  chosen_spanish: me seiza
  alternatives_spanish:
  - me arrebata
  - me apresa
  - me toma
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa toma fuerte y súbita. «Me seiza» conserva esa fuerza y se ajusta al sentido de apoderamiento violento del original.
- source_word: ያምዕዐኒ
  english_pob_choice: provokes me
  chosen_spanish: me provoca
  alternatives_spanish:
  - me irrita
  - me incita
  - me impulsa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa más reciente corrigió la lectura hacia una provocación reactiva sin añadir explícitamente «a ira». En español, «me provoca» conserva la ambigüedad entre incitación e irritación, sin cerrar indebidamente el matiz judicial/emocional.
- source_word: ዕፁቡ
  english_pob_choice: the severity
  chosen_spanish: la severidad
  alternatives_spanish:
  - el rigor
  - la dureza
  - lo terrible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Severidad» reproduce bien el campo semántico de rigor/juzgamiento grave y encaja con el contexto judicial de la frase.
- source_word: እንተ ኅቡኣት
  english_pob_choice: the hidden secrets
  chosen_spanish: los secretos escondidos
  alternatives_spanish:
  - las cosas ocultas
  - los secretos ocultos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa optó por «hidden secrets» para reflejar la duplicación del sentido de oculto/secretos. En español, «secretos escondidos» conserva esa redundancia sin perder naturalidad.
- source_word: ተዐግሦተ
  english_pob_choice: endure
  chosen_spanish: soportar
  alternatives_spanish:
  - resistir
  - aguantar
  - sostener
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En una pregunta retórica sobre carga judicial, «soportar» expresa con claridad la capacidad de llevar una carga o juicio insoportable.
- source_word: ተገብረት
  english_pob_choice: has been executed
  chosen_spanish: ha sido ejecutado
  alternatives_spanish:
  - ha sido llevado a cabo
  - ha sido hecho
  - ha sido cumplido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ejecutado» conserva el matiz judicial fuerte que la tradición inglesa también privilegió; no se suaviza a una formulación más genérica.
- source_word: ይትመሰዉ
  english_pob_choice: they melt away
  chosen_spanish: se derriten
  alternatives_spanish:
  - se deshacen
  - se disuelven
  - se consumen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen apocalíptica de deshacerse por completo se comunica bien con «se derriten», que reproduce la pérdida de consistencia ante el juicio.
theological_decisions:
- issue: Si መንፈስ debe entenderse como Espíritu Santo o como espíritu en sentido general
  english_pob_reading: the spirit
  chosen_spanish_reading: el espíritu
  alternative_spanish_readings:
  - el Espíritu
  - el aliento espiritual
  rationale: 'Se preserva la ambigüedad del original y de la traducción inglesa: la frase describe una fuerza que actúa sobre Miguel, pero no exige identificarla dogmáticamente con el Espíritu Santo.'
  doctrine_reference: Mantener la tensión teológica sin resolverla por inferencia.
- issue: Si la frase sobre el juicio debe leerse como el juicio mismo o como la revelación de un asunto terrible
  english_pob_reading: the severe judgment that has been executed
  chosen_spanish_reading: el severo juicio que ha sido ejecutado
  alternative_spanish_readings:
  - la cosa terrible que ha sido hecha
  - el severo veredicto que ha sido ejecutado
  rationale: La lectura principal sigue la comprensión más coherente con el contexto y con la revisión inglesa más reciente. En español, «juicio» conserva el marco forense y apocalíptico sin introducir una explicación ajena al texto.
  doctrine_reference: Preservar la tensión léxica y el carácter judicial de la escena.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la cadena de revisiones inglesa: la última normaliza los nombres como Miguel y Rafael, mantiene «the spirit» en minúscula, sustituye la antigua idea de «drives me on» por una reacción más próxima al original, y afina «hidden secrets». La versión española sigue esa última línea, pero preserva la posibilidad de lectura difícil mediante nota.'
  spanish_consistency_notes:
  - Se usa «Miguel» y «Rafael» según la normalización del audit trail inglés.
  - Se mantiene «el espíritu» en minúscula para conservar la ambigüedad del referente.
  - Se elige vocabulario judicial («juicio», «ejecutado») acorde con el contexto y con la POB inglesa.
  - Se evita «Cristo», «SEÑOR» u otras sustituciones no motivadas por el original.
  - La imagen final «se derriten» conserva la fuerza apocalíptica del cierre.
