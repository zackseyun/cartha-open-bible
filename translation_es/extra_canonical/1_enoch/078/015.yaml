translation:
  language: es
  text: Y hace tres meses de treinta días, y en su tiempo señalado[a], cuando ocurre su menguante[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en sus estaciones»; el término ge''ez puede referirse a tiempos o temporadas señaladas.'
    reason: lexical_alternative
  - marker: b
    text: La última cláusula es difícil; aquí se entiende como una referencia al menguante lunar, no a un simple cálculo temporal.
    reason: source_note
lexical_decisions:
- source_word: ይገብር
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - produce
  - forma
  - realiza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez es singular y expresa una acción concreta de producir o hacer; «hace» conserva esa fuerza sin volver la frase extraña en español.
- source_word: ሠለስተ
  english_pob_choice: three
  chosen_spanish: tres
  alternatives_spanish:
  - '3'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Numeral cardinal directo; se traduce sin cambios de sentido.
- source_word: ወርኀ
  english_pob_choice: months
  chosen_spanish: meses
  alternatives_spanish:
  - mes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con el numeral anterior, el sustantivo va naturalmente en plural en español.
- source_word: ፴መዋዕለ
  english_pob_choice: thirty days
  chosen_spanish: treinta días
  alternatives_spanish:
  - treinta períodos de días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma numérica indica precisión calendárica; «treinta días» mantiene la unidad de medida con claridad.
- source_word: በአዝማነ
  english_pob_choice: in its season
  chosen_spanish: en su estación
  alternatives_spanish:
  - en su tiempo
  - en sus estaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término admite la idea de tiempo o estación; «estación» conserva mejor el matiz astronómico/calendárico del pasaje y se mantiene natural en español.
- source_word: ታኀጻጺተ
  english_pob_choice: waning occurs
  chosen_spanish: ocurre su menguante
  alternatives_spanish:
  - se produce su mengua
  - ocurre su disminución
  - se cumple su menguante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual señala que el sustantivo deriva de la raíz de «menguarse/waning»; «menguante» preserva ese sentido lunar técnico sin ocultarlo tras una paráfrasis más vaga.
- source_word: ዚአሁ
  english_pob_choice: its
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  - de ello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo posesivo remite al ciclo/luminar, no a una persona; en español «su» es la forma más natural y neutra.
theological_decisions:
- issue: Naturaleza del enunciado astronómico/calendárico
  english_pob_reading: Render the clause as a technical calendrical statement, preserving the notion of waning rather than flattening it into generic temporal language.
  chosen_spanish_reading: 'Mantener una formulación técnica: «en su estación, cuando ocurre su menguante».'
  alternative_spanish_readings:
  - en su temporada, cuando se produce su mengua
  - en su tiempo, cuando ocurre su disminución
  rationale: El libro de 1 Enoc usa lenguaje astronómico preciso. En español conviene conservar ese carácter técnico para no diluir la imagen del ciclo lunar y su fase de menguante.
  doctrine_reference: Principio de fidelidad al género apocalíptico y al vocabulario técnico del texto fuente; evitar suavizar la terminología observacional del pasaje.
translation_notes:
  revision_awareness: La lectura de revisión más reciente corrigió una traducción previa que entendía mal la cláusula final. Se adoptó el sentido de «waning/menguante» respaldado por la revisión y se mantuvo la estructura calendárica del enunciado. También se respetó la gramática singular del verbo ge'ez («hace»).
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - Se evita «Cristo/Mesías» porque no hay término correspondiente en este versículo.
  - «Menguante» conserva el valor lunar técnico detectado en la revisión, en lugar de una explicación paraprástica.
  - La elección de «estación» responde al matiz astronómico del ge'ez በአዝማነ y no a un mero período genérico.
