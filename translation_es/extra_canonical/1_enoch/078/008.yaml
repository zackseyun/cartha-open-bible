base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/078/008.yaml
  text: And in its waning[a], on the first day it diminishes to fourteen parts of its light, and on the second it diminishes to thirteen parts of light, and on the third it diminishes to twelve, and on the fourth to eleven parts, and on the fifth it diminishes to ten parts, and on the sixth it diminishes to nine parts, and on the seventh it diminishes to eight parts, and on the eighth it diminishes to seven, and on the ninth it diminishes to six, and on the tenth it diminishes to five, and on the eleventh it diminishes to four, and on the twelfth it diminishes to three, and on the thirteenth it diminishes to two, and on the fourteenth it diminishes to half of a seventh part of all its light[d][c][b]; and on the fifteenth day that which remains from the whole is consumed.
  footnotes:
  - marker: a
    text: The final fraction, 'half of a seventh part,' is a literal rendering of a mathematically awkward Ge'ez expression. The text appears to preserve a precise fractional remainder rather than a smoother idiom.
    reason: lexical_alternative
  - marker: b
    text: The verse describes the measured waning of the moon's light across successive days; 'becomes visible' may also be understood as 'is seen' or 'appears' with reference to the remaining portion.
    reason: lexical_alternative
  - marker: c
    text: Or 'diminishes by fourteen parts of its light, and on the second it diminishes by thirteen parts of light, and on the third by twelve, and on the fourth by eleven parts, and on the fifth it diminishes by ten parts, and on the sixth it diminishes by nine parts, and on the seventh by eight parts, and on the eighth it diminishes by seven, and on the ninth it diminishes by six, and on the tenth by five, and on the eleventh by four, and on the twelfth by three, and on the thirteenth by two, and on the fourteenth by half of a seventh part of all its light'.
    reason: previous_rendering
  - marker: d
    text: Or 'becomes visible'.
    reason: previous_rendering
