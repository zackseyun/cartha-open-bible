translation:
  language: es
  text: Y en su menguante[a], el primer día se reduce a catorce partes de su luz, y en el segundo se reduce a trece partes de luz, y en el tercero a doce, y en el cuarto a once partes, y en el quinto se reduce a diez partes, y en el sexto se reduce a nueve partes, y en el séptimo se reduce a ocho partes, y en el octavo a siete, y en el noveno a seis, y en el décimo a cinco, y en el undécimo a cuatro, y en el duodécimo a tres, y en el decimotercero a dos, y en el decimocuarto se reduce a la mitad de una séptima parte de toda su luz[b][c]; y en el decimoquinto día se consume lo que queda del total[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez presenta aquí una expresión de fase o luz menguante; 'menguante' conserva el marco astronómico mejor que un término genérico de disminución.
    reason: lexical_alternative
  - marker: b
    text: La revisión textual favorece entender 'se reduce a' como resultado restante, no como 'se reduce por'.
    reason: textual_variant
  - marker: c
    text: La frase 'la mitad de una séptima parte' reproduce una expresión fraccionaria incómoda pero precisa del ge'ez; no se suaviza para conservar la forma matemática del original.
    reason: lexical_alternative
  - marker: d
    text: El verbo ge'ez aquí indica consumación o agotamiento, no visibilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሕጸጸ
  english_pob_choice: waning
  chosen_spanish: menguante
  alternatives_spanish:
  - disminución
  - decrecimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto astronómico, el sustantivo/estado apunta a la fase de disminución de la luz lunar. 'Menguante' es la forma natural en español para la fase de la luna y conserva el marco observacional del pasaje.
- source_word: የኀጽጽ
  english_pob_choice: diminishes
  chosen_spanish: se reduce
  alternatives_spanish:
  - disminuye
  - mengua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige la idea de 'disminuir por' a 'reducirse a' un valor restante. 'Se reduce a' expresa bien el estado resultante y preserva la secuencia matemática de partes restantes.
- source_word: እደ / ክፍለ
  english_pob_choice: parts
  chosen_spanish: partes
  alternatives_spanish:
  - porciones
  - fracciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Partes'' reproduce el lenguaje de división medida sin introducir tecnicismo innecesario. En español suena natural en una enumeración numérica y mantiene la idea de unidades de luz.'
- source_word: ብርሃኑ / ብርሃን
  english_pob_choice: its light / light
  chosen_spanish: su luz / luz
  alternatives_spanish:
  - su brillo
  - su resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El referente es la luz visible del astro, no un brillo abstracto. 'Luz' es directo, fiel y suficientemente claro para el cálculo de las partes restantes.
- source_word: መንፈቀ፡ ሳብዐቱ
  english_pob_choice: half of a seventh part
  chosen_spanish: la mitad de una séptima parte
  alternatives_spanish:
  - media séptima parte
  - la mitad de la séptima parte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la expresión aritmética rara y algo pesada del ge'ez, porque la fuente no la suaviza. 'La mitad de una séptima parte' es transparente y auditable en español.
- source_word: ይትዌዳእ
  english_pob_choice: is consumed
  chosen_spanish: se consume
  alternatives_spanish:
  - se agota
  - se termina
  - es consumido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión demuestra que el verbo no significa 'hacerse visible', sino terminarse/consumirse. 'Se consume' conserva el valor de agotamiento completo y funciona bien en español impersonal/reflexivo.
- source_word: ዘተረፈ፡ እምኵሉ
  english_pob_choice: that which remains from the whole
  chosen_spanish: lo que queda de todo
  alternatives_spanish:
  - lo restante de todo
  - el resto del conjunto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lo que queda de todo'' comunica el remanente final de manera idiomática sin perder la referencia totalizante del original.'
theological_decisions:
- issue: Descripción astronómica literal del decrecimiento lunar
  english_pob_reading: Render as an observational-astronomical sequence of the moon's waning light, not as symbolic or allegorical language.
  chosen_spanish_reading: Mantener la secuencia como descripción astronómica literal del menguante de la luna.
  alternative_spanish_readings:
  - Tratar los números como simbolismo
  - Generalizar la idea de que la luna disminuye
  rationale: El pasaje pertenece al Libro Astronómico y presenta una secuencia medida de partes de luz. La traducción debe conservar ese carácter calculado sin convertirlo en alegoría ni resumirlo.
  doctrine_reference: 'Filosofía de traducción: respetar el sentido llano del texto y no aplanar la imaginería cosmológica/apocalíptica.'
translation_notes:
  revision_awareness: 'Esta versión incorpora la corrección revisada del audit trail: el giro numérico debe leerse como cantidad restante (''se reduce a''), no como cantidad sustraída. También corrige el verbo final de ''becomes visible'' a ''se consume'', conforme a la adjudicación más reciente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se usa 'luz' de manera uniforme para ብርሃን / ብርሃኑ, sin introducir 'brillo' o 'resplandor'.
  - La secuencia numérica conserva la repetición verbal en español donde el ritmo del original lo hace pertinente.
  - '''Menguante'' se reserva para el estado/fase astronómica inicial; el desarrollo cuantitativo se expresa con ''se reduce a''.'
