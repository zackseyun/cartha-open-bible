translation:
  language: es
  text: Estos son los dos grandes luminares[a]; sus discos son como el disco del cielo[b], y el tamaño de los discos de ambos es igual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El término final es difícil. El ge''ez parece decir que la extensión medida del contorno perteneciente a ambos luminares es «igual» o «la misma». Una alternativa más literal sería: «y la medida de su contorno, para los dos, es la misma».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus contornos son como el contorno del cielo, y el tamaño del contorno».'
    reason: previous_rendering
lexical_decisions:
- source_word: ብርሃናት
  english_pob_choice: luminaries
  chosen_spanish: luminares
  alternatives_spanish:
  - luces
  - astros luminosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico, ብርሃናት no designa solo “luz” abstracta, sino los cuerpos celestes que dan luz. “Luminares” conserva ese registro cosmológico mejor que “luces”, y es natural en español bíblico.
- source_word: ዐበይት
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - enormes
  - poderosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aplicado al sol y la luna, “grandes” transmite la cualidad física sin añadir matiz de poder que no está exigido por el texto.
- source_word: ክበቦሙ
  english_pob_choice: their disks
  chosen_spanish: sus discos
  alternatives_spanish:
  - sus círculos
  - sus circunferencias
  - sus órbitas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa reciente favorece “disk” por el sentido visible/astronómico del término. En español, “discos” reproduce mejor esa forma visible que “órbitas”, que sugeriría trayectoria, no apariencia; “circunferencias” es posible pero menos transparente para el lector.
- source_word: ከመ ክበበ ሰማይ
  english_pob_choice: like the disk of heaven
  chosen_spanish: como el disco del cielo
  alternatives_spanish:
  - como la circunferencia del cielo
  - como el disco del firmamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación ከመ pide “como”. “Disco del cielo” sigue la revisión inglesa y mantiene la imagen astronómica sin convertirla en un lenguaje técnico moderno ajeno al poema.
- source_word: ወእምጣነ
  english_pob_choice: and the size
  chosen_spanish: y el tamaño
  alternatives_spanish:
  - y la medida
  - y la extensión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Tamaño” es la forma más clara en español actual para el sentido de medida o extensión visible. “Medida” conserva más literalidad, pero resulta algo más abstracta.
- source_word: ለክልኤሆሙ ዕሩይ
  english_pob_choice: of the two of them is equal
  chosen_spanish: de los dos es igual
  alternatives_spanish:
  - de ambos es el mismo
  - de los dos es el mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El cierre expresa equivalencia de medida entre ambos cuerpos celestes. “De los dos es igual” comunica bien la igualdad sin forzar una especificación innecesaria sobre el objeto de comparación.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que corrigió “circuito” por “disco” en función de ክበብ como forma/circunferencia visible. Por eso el español evita “órbita” o “circuito” y mantiene la referencia a discos, en concordancia con la actualización del inglés POB.
  spanish_consistency_notes:
  - Se mantiene “luminares” para ብርሃናት, en línea con el registro cosmológico del libro.
  - Se conserva la igualdad final sin suavizar la tensión lexical del ge'ez; la nota [a] deja abierta la alternativa más literal.
  - “Cielo” se usa de manera simple y elevada, sin añadir glosas interpretativas como “firmamento” en el texto principal.
  - 'La sintaxis respeta el paralelismo del original: dos miembros descriptivos y una cláusula final de equivalencia.'
