  yaml_path: translation/extra_canonical/1_enoch/078/003.yaml
  text: These are the two great luminaries[a]; their disks are like the disk of heaven[b], and the size of the disks of the two of them is equal.
  footnotes:
  - marker: a
    text: The final clause is difficult. The Ge'ez appears to say that the measured extent of the circuit belonging to both luminaries is 'equal' or 'the same.' A more literal alternative would be, 'and the measure of their circuit, for the two of them, is the same.'
