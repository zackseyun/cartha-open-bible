translation:
  language: es
  text: Y cuando la luna se levanta, aparece en el cielo como la mitad de una séptima parte[b], [y toda la luz está en ella,[a]] y completa su luz como catorce partes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula ge'ez entre corchetes es textualmente torpe, pero parece afirmar que toda la luz está presente en la luna en esta cuenta. Se conserva el sentido sin forzar la sintaxis comprimida.
    reason: textual_variant
  - marker: b
    text: En el Libro Astronómico, la luz lunar se mide con «partes» numeradas. Aquí no se trata de una descripción científica moderna, sino de un esquema cosmológico propio del texto.
    reason: cultural_note
  - marker: c
    text: 'O: «y toda su luz se completa hasta catorce partes».'
    reason: alternative_reading
lexical_decisions:
- source_word: ይትነሣእ
  english_pob_choice: rises
  chosen_spanish: se levanta
  alternatives_spanish:
  - asciende
  - sale
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto astronómico, el verbo describe el movimiento/aparición del astro. «Se levanta» conserva el registro observacional natural en español sin perder la idea de ascenso.
- source_word: ወርኅ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna
  - la luna llena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el sustantivo se refiere claramente al cuerpo celeste, no a «mes». «La luna» es la opción más natural y precisa en español.
- source_word: ያስተርኢ በሰማይ
  english_pob_choice: appears in the sky
  chosen_spanish: aparece en el cielo
  alternatives_spanish:
  - se muestra en el cielo
  - es vista en el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase conserva el matiz visual y descriptivo del ge'ez sin volverse rígida. «Aparece en el cielo» comunica bien la observación astronómica.
- source_word: መንፈቀ ሳብዕተ
  english_pob_choice: half of a seventh part
  chosen_spanish: la mitad de una séptima parte
  alternatives_spanish:
  - medio de una séptima parte
  - media séptima parte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción numérica se mantiene de forma transparente. No se suaviza a una expresión moderna porque el pasaje pertenece a un esquema técnico de fracciones luminosas.
- source_word: ብርሃን
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Luz» es la equivalencia más directa y comprensible para el valor físico del término en este contexto.
- source_word: ኵሉ
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - toda la
  - completa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Toda la luz» expresa totalización sin alterar el contenido de la cláusula bracketed; además, suena natural en español.
- source_word: ይፈጽም ብርሃኖ
  english_pob_choice: it completes its light
  chosen_spanish: completa su luz
  alternatives_spanish:
  - lleva a plenitud su luz
  - lleva su luz a su completud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa culminación/realización de una medida. «Completa su luz» preserva el valor procesual y técnico sin forzar una explicación interpretativa.
- source_word: ዐሡር ወረቡዕ
  english_pob_choice: fourteen parts
  chosen_spanish: catorce partes
  alternatives_spanish:
  - catorce porciones
  - catorce unidades
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el sistema numérico del texto y la terminología de «partes» usada en el capítulo. No se añade una explicación que no esté en el verso.
theological_decisions:
- issue: Cómo representar el sistema técnico de medición lunar sin convertirlo en una descripción ordinaria de fase lunar
  english_pob_reading: 'Preserve the numerical reckoning: ''half of a seventh part'' and ''fourteen parts'''
  chosen_spanish_reading: 'Preservar la medición numérica: «la mitad de una séptima parte» y «catorce partes»'
  alternative_spanish_readings:
  - traducir dinámicamente como una fase lunar general
  - interpretar «catorce» como luna llena y simplificar la frase
  rationale: El pasaje pertenece al esquema cosmológico del Libro Astronómico; por eso conviene mantener el lenguaje de fracciones y partes, en lugar de sustituirlo por una paráfrasis de fase lunar.
  doctrine_reference: Translation philosophy §§1, 3, 5; guidance on preserving cosmic imagery
- issue: Cómo reflejar la cláusula bracketed sin fusionarla con la frase final
  english_pob_reading: '[and all the light is in it,] and it completes its light as fourteen parts.'
  chosen_spanish_reading: '[y toda la luz está en ella,] y completa su luz como catorce partes.'
  alternative_spanish_readings:
  - fusionar las dos cláusulas en una sola frase fluida
  - omitir la cláusula bracketed por considerarla redundante
  rationale: 'La evidencia textual distingue dos afirmaciones: que toda la luz está en ella y que completa su luz. Separarlas en español evita perder esa tensión/precisión textual.'
  doctrine_reference: Textual criticism / source preservation principle
translation_notes:
  revision_awareness: 'He integrado la corrección más reciente del audit trail: la cláusula bracketed debe mantenerse separada de la frase final. Por eso el español distingue «toda la luz está en ella» de «completa su luz como catorce partes», y no fusiona ambas ideas. También evité una paráfrasis que borrara el sistema de fracciones del Libro Astronómico.'
  spanish_consistency_notes:
  - He usado «luna» para ወርኅ por contexto astronómico, no «mes».
  - He mantenido «partes» como unidad técnica coherente con el capítulo.
  - He conservado el orden y la segmentación de las dos cláusulas finales para reflejar la evidencia textual.
  - El español evita el calco duro cuando es posible, pero preserva el esquema numérico y observacional del original.
