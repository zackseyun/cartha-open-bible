base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/078/006.yaml
  text: And when the moon rises[a], it appears in the sky as half of a seventh part[c][b], [and all the light is in it,] and it completes its light as fourteen parts.
  footnotes:
  - marker: a
    text: The bracketed Ge'ez clause in the witness is textually awkward but appears to state that the moon's light is present in full measure within this reckoning. The English keeps the sense without forcing every element of the compressed syntax.
    reason: textual_variant
  - marker: b
    text: The Astronomical Book regularly measures lunar illumination in numbered 'parts.' The phrase 'fourteen parts' should be read as part of that schematic system, not as modern scientific description.
    reason: cultural_note
  - marker: c
    text: Or 'and all its light is completed to the measure of fourteen parts.'.
    reason: previous_rendering
