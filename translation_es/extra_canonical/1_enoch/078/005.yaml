translation:
  language: es
  text: Y se ponen, y entran por los portales occidentales[a], y hacen su circuito por el norte[b], y por los portales orientales salen sobre la faz del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen repetida de los portales refleja la visión del Libro Astronómico de un cielo estructurado por aperturas fijas por donde se mueven los luminares.
    reason: cultural_note
  - marker: b
    text: La cláusula traducida 'hacen su circuito por el norte' es breve en ge'ez y también podría entenderse como movimiento alrededor o por la parte norte.
    reason: lexical_alternative
lexical_decisions:
- source_word: የዐርቡ
  english_pob_choice: they set
  chosen_spanish: se ponen
  alternatives_spanish:
  - se ocultan
  - se ponen en su ocaso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico, el verbo alude al ocaso de los luminares. 'Se ponen' es una forma natural en español para 'they set' y conserva el sentido técnico sin volverlo explicativo en exceso.
- source_word: ይበውኡ
  english_pob_choice: they enter
  chosen_spanish: entran
  alternatives_spanish:
  - ingresan
  - penetran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El movimiento por las aberturas celestes exige un verbo simple y directo. 'Entran' mantiene la imagen de tránsito por portales sin añadir matices no atestiguados.
- source_word: ኆዋኅወ
  english_pob_choice: portals
  chosen_spanish: puertas
  alternatives_spanish:
  - portales
  - compuertas
  - entradas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque 'portales' preserva mejor el color cósmico, en español 'puertas' resulta más fluido y plenamente comprensible para el lector, sin perder la idea de aperturas fijas en el cielo.
- source_word: የአውዱ
  english_pob_choice: make their circuit
  chosen_spanish: hacen su circuito
  alternatives_spanish:
  - dan su vuelta
  - hacen su recorrido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase describe el movimiento ordenado de los luminares. 'Hacen su circuito' conserva el carácter astronómico y el patrón cíclico señalado por el texto base.
- source_word: እንተ መስዕ
  english_pob_choice: by the north
  chosen_spanish: por el norte
  alternatives_spanish:
  - por la parte norte
  - al norte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición marca la ruta o el lado por el que discurren. 'Por el norte' conserva esa función direccional de manera natural en español.
- source_word: እንተ ኆዋኅወ ምሥራቅ
  english_pob_choice: by the eastern portals
  chosen_spanish: por las puertas orientales
  alternatives_spanish:
  - por los portales orientales
  - a través de las puertas orientales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el paralelismo con 'puertas occidentales' y conserva la imagen de aperturas fijas por donde salen los luminares.
- source_word: ይወፅኡ
  english_pob_choice: they come out
  chosen_spanish: salen
  alternatives_spanish:
  - salen afuera
  - emergen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Salen'' es el contrapunto natural de ''entran'' y corresponde bien al movimiento de salida por las puertas orientales.'
- source_word: ዲበ ገጸ ሰማይ
  english_pob_choice: upon the face of the sky
  chosen_spanish: sobre la faz del cielo
  alternatives_spanish:
  - sobre la superficie del cielo
  - ante la faz del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Faz del cielo'' conserva la imaginería concreta y solemne del original, evitando reducirla a un simple ''en el cielo''.'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones posteriores; la versión española sigue esa lectura estable, ajustando solo la formulación para mayor naturalidad en español sin alterar la imaginería astronómica ni las alternativas registradas.
  spanish_consistency_notes:
  - Se mantuvo la imaginería cósmica de puertas/aperturas celestes y del circuito ordenado de los luminares.
  - Se prefirió un español publicable y natural, pero sin neutralizar el lenguaje apocalíptico concreto del original.
  - '''Faz del cielo'' conserva el tono elevado de ''face of the sky'' y evita una paráfrasis demasiado general.'
