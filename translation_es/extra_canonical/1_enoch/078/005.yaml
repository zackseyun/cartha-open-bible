  yaml_path: translation/extra_canonical/1_enoch/078/005.yaml
  text: And they set[a], and they enter the western portals, and make their circuit by the north[b], and by the eastern portals they come out upon the face of the sky.
  footnotes:
  - marker: a
    text: The repeated portal imagery reflects the Astronomical Book's picture of the sky as structured with fixed openings through which the luminaries move.
    reason: cultural_note
  - marker: b
    text: The clause rendered 'make their circuit by the north' is somewhat terse in the Ge'ez and could also be understood as movement around or along the northern side.
    reason: lexical_alternative
