  source_alignment_summary: 'El borrador español capta bien la estructura temporal general y conserva la imaginería cósmica de que la luna ''se apaga'' y que su luz ''se completa''. Sin embargo, no preserva plenamente el inciso problemático documentado en el rastro inglés: el texto fuente/POB mantiene explícitamente la frase bracketed ''[its light is completed]'', mientras que el español la desplazó a una nota y la omitió del texto principal. Además, ''pone su luz delante del sol'' resulta algo torpe; una formulación como ''coloca su luz'' refleja mejor el valor concreto atribuido en las decisiones léxicas españolas sin sonar tan coloquial.'
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere una reparación menor para mayor naturalidad y fidelidad. 'Pone su luz' suena poco idiomático en registro bíblico/literario, y la nota actual habla en términos muy generales sin reflejar que el corchete probablemente contiene 'su luz es completada'. Reinsertar el inciso entre corchetes en el texto mejora la trazabilidad con el original y con el audit trail inglés.
  glossary_alignment: No hay conflictos con la terminología doctrinal de proyecto. 'Luna', 'sol', 'cielo' y 'luz' están bien. 'Se apaga' preserva adecuadamente la imaginería cósmica. La principal cuestión es de fidelidad textual y de formulación idiomática, no de glosario teológico.
  issues:
  - severity: medium
    issue: Se omitió del texto principal el inciso bracketed '[its light is completed]' que el audit trail inglés preserva explícitamente.
    rationale: El historial aplicado corrige precisamente que el sujeto explícito del verbo de completitud es 'su luz'. Pasarlo solo a nota borra una parte significativa de la evidencia textual que POB decidió mantener entre corchetes.
  - severity: low
    issue: '''Pone su luz delante del sol'' suena algo coloquial/torpe en español.'
    rationale: Aunque refleja el análisis de un verbo de poner/colocar/transferir, 'coloca su luz delante del sol' o formulación similar suena más natural y digno en español eclesial legible.
  - severity: low
    issue: La nota a no explica con suficiente precisión el contenido probable del inciso problemático.
    rationale: La documentación inglesa dice que las palabras entre corchetes probablemente repiten la idea de que la luz de la luna llega a su completitud o término durante ese período; conviene reflejarlo más directamente en español.
  revised_spanish_text: Y durante todo el tiempo en que la luna mengua, coloca su luz delante del sol hasta catorce días [su luz es completada][a]; y cuando se apaga, toda su luz es completada en el cielo.
  revised_footnotes:
