translation:
  language: es
  text: Y durante todo el tiempo en que la luna mengua, coloca su luz delante del sol hasta catorce días [su luz es completada][a]; y cuando se apaga, toda su luz es completada en el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula alrededor de 'hasta catorce días' es textualmente difícil en el ge'ez OCR; las palabras entre corchetes probablemente repiten la idea de que la luz de la luna llega a su completitud o término durante ese período.
    reason: textual_variant
lexical_decisions:
- source_word: ኵሎ፡ ዘመነ፡
  english_pob_choice: throughout the time
  chosen_spanish: durante todo el tiempo
  alternatives_spanish:
  - todo el tiempo
  - a lo largo de todo el tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la totalidad de un período temporal sin volverlo rígido; conserva el valor distributivo de ኵሎ con un sustantivo de tiempo.
- source_word: ዘተነሡር፡ ወርኅ፡
  english_pob_choice: when the moon is waning
  chosen_spanish: en que la luna mengua
  alternatives_spanish:
  - cuando la luna está menguando
  - cuando la luna decrece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto astronómico, ‘mengua’ es natural en español y conserva la fase lunar de disminución.
- source_word: ትወዲ፡
  english_pob_choice: diminishes / transfers
  chosen_spanish: pone
  alternatives_spanish:
  - coloca
  - pone de manifiesto
  - transfiere
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente y el contexto cosmológico apuntan a un verbo de poner/colocar/transferir; en español, ‘pone su luz’ mantiene la idea concreta sin introducir una abstracción no sustentada. El objeto explícito ‘su luz’ hace que la frase sea inteligible y evita una paráfrasis excesiva.
- source_word: በቅድመ፡ ፀሐይ፡
  english_pob_choice: before the sun
  chosen_spanish: delante del sol
  alternatives_spanish:
  - ante el sol
  - en presencia del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Delante de’ conserva la imagen espacial literal del original y funciona bien en español moderno sin perder la posible relación astronómica.
- source_word: እስከ፡ ፲ወ፬መዋዕል፡
  english_pob_choice: until fourteen days are completed
  chosen_spanish: hasta catorce días
  alternatives_spanish:
  - hasta los catorce días
  - hasta que se cumplan catorce días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez en el audit trail es textualmente difícil; en español conviene mantener la duración mínima con una formulación natural, sin fingir certeza sobre la reconstrucción del inciso problemático.
- source_word: '[ይትፌጸም፡ ብርሃና፡]'
  english_pob_choice: '[its light is completed]'
  chosen_spanish: '[su luz es completada]'
  alternatives_spanish:
  - '[su luz se completa]'
  - '[su luz llega a completarse]'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la idea de ‘completion’ del verbo, que en este libro astronómico tiene valor técnico-esquemático. ‘Es completada’ mantiene la formalidad y deja visible la construcción del original.
- source_word: ወሶበ፡ ይውዒ፡
  english_pob_choice: and when it is extinguished
  chosen_spanish: y cuando se apaga
  alternatives_spanish:
  - y cuando es apagada
  - y cuando se extingue
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Se apaga’ reproduce la imagen de una luminaria que deja de brillar y es idiomático en español, sin perder el registro cósmico del texto.
- source_word: ኵሉ፡ ይትፌጸም፡ ብርሃኑ፡
  english_pob_choice: all its light is completed
  chosen_spanish: toda su luz es completada
  alternatives_spanish:
  - toda su luz se completa
  - toda su luz llega a su cumplimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el verbo de completitud, que es importante para la lógica interna del pasaje y no debe rebajarse a una simple desaparición.
- source_word: ውስተ፡ ሰማይ።
  english_pob_choice: in the sky
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo visible
  - en el firmamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Cielo’ es la equivalencia más natural en español y comunica el espacio astronómico del pasaje; ‘firmamento’ sería más arcaizante.
theological_decisions:
- issue: Conservar el lenguaje cosmológico concreto sin modernizarlo en exceso
  english_pob_reading: when it is extinguished / all its light is completed in the sky
  chosen_spanish_reading: cuando se apaga / toda su luz es completada en el cielo
  alternative_spanish_readings:
  - cuando se pone
  - cuando se oscurece
  rationale: El libro de 1 Enoc presenta procesos celestes con imaginería concreta. ‘Se apaga’ y ‘es completada’ preservan ese registro apocalíptico-cosmológico sin convertirlo en prosa científica moderna.
  doctrine_reference: Mantener la imaginería apocalíptica; no aplanar el lenguaje cósmico.
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión importante del verbo ge'ez ትወዲ desde una lectura de 'diminishes/transfers' hacia un valor de 'put/place/transfer', y también reconoce la dificultad textual del tramo de los catorce días. La versión española evita fijar excesivamente una interpretación técnica no asegurada, pero preserva el esquema temporal, la imagen de la luz lunar y la conclusión de completitud en el cielo.
  spanish_consistency_notes:
  - Se mantiene 'luna' para el astro y 'cielo' para ሰማይ en sentido astronómico.
  - Se usa 'es completada' para conservar la terminología de completitud del texto.
  - La nota [a] está anclada solo en el tramo textualmente difícil y no se reutiliza.
