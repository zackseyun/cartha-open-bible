    text: La cláusula alrededor de 'hasta catorce días' es textualmente difícil en el ge'ez OCR; las palabras entre corchetes probablemente repiten la idea de que la luz de la luna llega a su completitud o término durante ese período.
    reason: textual_variant
  revision_rationale: La revisión reintroduce en el texto el inciso entre corchetes que el rastro POB preserva explícitamente, y ajusta 'pone' a 'coloca' para un español más natural sin perder la imaginería concreta del original. La nota se afina para reflejar mejor la incertidumbre textual documentada.
