lexical_decisions:
- source_word: አውራኅ
  english_pob_choice: months / certain months
  chosen_spanish: meses
  alternatives_spanish:
  - días
  - cursos
  - temporadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; audit trail notes on 1 Enoch 78:9
  rationale: La revisión del texto etiópico indica que አውራኅ es plural de 'mes', no 'días'. Por eso la frase española debe hablar de 'meses' y no de días para este término.
- source_word: እሙራን
  english_pob_choice: certain
  chosen_spanish: ciertos
  alternatives_spanish:
  - determinados
  - fijos
  - luminares
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; revisión aplicada en el expediente
  rationale: 'El audit trail corrige la lectura anterior: aquí no significa ''luminares'', sino una idea de meses determinados o ciertos. ''Ciertos'' conserva esa restricción sin añadir más de lo que el texto sostiene.'
- source_word: ይከውን
  english_pob_choice: it has / it shall be
  chosen_spanish: tiene
  alternatives_spanish:
  - será
  - hay
  - debe tener
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'En una afirmación calendárica, el presente español expresa bien la regularidad descrita: ''el mes tiene veintinueve días''.'
- source_word: ፳ወ፱መዋዕል
  english_pob_choice: twenty-nine days
  chosen_spanish: veintinueve días
  alternatives_spanish:
  - veinte y nueve días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El numeral y el sustantivo 'días' se traducen de forma directa e idiomática.
- source_word: ለወርኅ
  english_pob_choice: for the month
  chosen_spanish: el mes
  alternatives_spanish:
  - del mes
  - para el mes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción ge'ez se entiende aquí como referencia al mes mismo en el cálculo calendárico; por eso la formulación natural en español es 'el mes'.
- source_word: ፭ወሳሙን
  english_pob_choice: once twenty-eight
  chosen_spanish: una vez veintiocho
  alternatives_spanish:
  - y una vez veintiocho
  - y alguna vez veintiocho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; textual correction noted in the review
  rationale: 'Sigo la revisión crítica incorporada en el expediente: la lectura correcta es 28, no ''cinco semanas''. En español, ''una vez veintiocho'' conserva la brevedad del original y la oscilación calendárica.'
translation_notes:
  revision_awareness: 'Se corrigió el error previo que tomaba አውራኅ como ''días'' y ፭ወሳሙን como ''cinco semanas''. La lectura seguida aquí coincide con la revisión aplicada: se trata de meses lunares que normalmente tienen veintinueve días y, en algunos casos, veintiocho.'
  spanish_consistency_notes:
  - Se prefirió 'ciertos meses' para reproducir el valor restrictivo de እሙራን según la revisión textual.
  - Se evitó 'luminares' porque el expediente corrige expresamente esa lectura anterior.
  - '''Una vez veintiocho'' mantiene la concisión del cierre y evita añadir glosas al texto principal.'
  - La puntuación española sigue un enunciado breve, apto para publicación, sin introducir elementos no sustentados por la fuente.
