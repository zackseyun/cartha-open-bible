translation:
  language: es
  text: Y en ciertos meses[a], el mes tiene veintinueve días, y a veces, veintiocho días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase final es difícil en el testimonio OCR etiópico. La revisión adoptada entiende que el versículo describe meses de veintinueve días y, en alguna ocasión, de veintiocho, en lugar de la lectura problemática anterior.
