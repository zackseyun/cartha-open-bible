translation:
  language: es
  text: 'Se cumple con exactitud: de día el sol se pone en el occidente, y desde el oriente[a] la luna sale por la noche y alumbra toda la noche, hasta que el sol sale delante de ella[b][c], y la luna es vista delante del sol.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula «desde el oriente ... por la noche» es difícil en contexto. El etiópico se ha traducido de manera transparente, sin armonizarlo con una formulación astronómica más esperable.
    reason: textual_variant
  - marker: b
    text: El verbo traducido «sale» en «hasta que el sol sale delante de ella» es textualmente incierto en su forma y puede reflejar una transmisión difícil. En contexto, el sentido es la aparición o salida del sol.
    reason: lexical_alternative
  - marker: c
    text: 'O: «de día el sol se pone en el occidente, y desde el oriente sale por la noche; y la luna alumbra».'
    reason: previous_rendering
lexical_decisions:
- source_word: ይትፌጸም
  english_pob_choice: it is completed
  chosen_spanish: se cumple
  alternatives_spanish:
  - se completa
  - se realiza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo pasivo/reflexivo expresa cierre o consumación. «Se cumple» conserva la idea de que el orden descrito llega a su término regular, sin cargar el texto con un matiz profético innecesario.
- source_word: ጥንቀቀ
  english_pob_choice: with exactness
  chosen_spanish: con exactitud
  alternatives_spanish:
  - cuidadosamente
  - con precisión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto astronómico de los Luminares, la idea principal es la regularidad ordenada. «Con exactitud» mantiene el tono técnico y la noción de precisión.
- source_word: በዕለት
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - en el día
  - durante el día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma introduce un contraste directo con «por la noche». «De día» suena natural en español y conserva el paralelo temporal de la construcción.
- source_word: ይወርድ
  english_pob_choice: goes down
  chosen_spanish: se pone
  alternatives_spanish:
  - desciende
  - baja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para el movimiento solar, «se pone» es el equivalente español más claro y fiel al descenso del astro.
- source_word: ዐረብ
  english_pob_choice: the west
  chosen_spanish: el occidente
  alternatives_spanish:
  - el oeste
  - la región occidental
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es direccional y astronómico. «Occidente» mantiene un registro digno y bíblico sin oscurecer el sentido.
- source_word: ምሥራቅ
  english_pob_choice: the east
  chosen_spanish: el oriente
  alternatives_spanish:
  - el este
  - la región oriental
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El paralelo con «occidente» favorece «oriente», que además conserva el tono literario del pasaje.
- source_word: የዐርግ
  english_pob_choice: it rises
  chosen_spanish: sale
  alternatives_spanish:
  - asciende
  - se levanta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque literalmente significa ascender/subir, en español «sale» es el verbo idiomático para el salir de la luna y preserva el movimiento celeste sin rigidez.
- source_word: በሌሊት
  english_pob_choice: by night
  chosen_spanish: por la noche
  alternatives_spanish:
  - de noche
  - en la noche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase paralela a «de día» pide un equivalente temporal natural. «Por la noche» es claro y mantiene la relación con el resto del período.
- source_word: ያበርህ
  english_pob_choice: gives light
  chosen_spanish: alumbra
  alternatives_spanish:
  - da luz
  - ilumina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El causativo expresa producir luz. «Alumbra» conserva una dicción bíblica natural en español y no exagera el valor del verbo.
- source_word: በኵሉ ሌሊት
  english_pob_choice: all night
  chosen_spanish: toda la noche
  alternatives_spanish:
  - durante toda la noche
  - toda la noche entera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión distributiva se vierte de forma directa y idiomática. «Toda la noche» conserva la duración completa sin redundancia artificial.
- source_word: ይሠርቅ
  english_pob_choice: rises
  chosen_spanish: sale
  alternatives_spanish:
  - se levanta
  - aparece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto griego/etiópico presenta un orden difícil, pero el sentido contextual indica la salida del sol. «Sale» mantiene la imagen astronómica y la sucesión del verso.
- source_word: በቅድሜሁ
  english_pob_choice: before it
  chosen_spanish: delante de ella
  alternatives_spanish:
  - antes que ella
  - frente a ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición admite valor espacial y temporal. «Delante de ella» conserva la ambigüedad útil entre precedencia y posición en la secuencia astronómica.
- source_word: ይትረአይ
  english_pob_choice: is seen
  chosen_spanish: es vista
  alternatives_spanish:
  - se ve
  - aparece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva/reflexiva del verbo de visibilidad se refleja con claridad en español. «Es vista» mantiene la transparencia al original y el tono formal del pasaje.
theological_decisions:
- issue: Cómo reflejar la secuencia astronómica difícil sin normalizarla en exceso
  english_pob_reading: Retain the unusual sequence with minimal smoothing, preserving the source-level oddity and the moon/sun ordering.
  chosen_spanish_reading: 'Conservar la secuencia inusual: la luna sale por la noche, alumbra toda la noche, luego el sol sale delante de ella y la luna es vista delante del sol.'
  alternative_spanish_readings:
  - Parafrasear la escena como una descripción más convencional del atardecer, la noche y el amanecer
  - Reordenar el período para hacerlo astronómicamente más fluido
  rationale: La pauta editorial prioriza la transparencia frente a la armonización. El giro difícil del etiópico debe quedar visible en español, incluso si la secuencia resulta extraña, porque ese rasgo forma parte del testimonio textual.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Elección de términos direccionales con tono bíblico pero claro
  english_pob_reading: west/east rendered as directional terms, not euphemisms.
  chosen_spanish_reading: occidente/oriente
  alternative_spanish_readings:
  - oeste/este
  - región occidental/oriental
  rationale: En español, «occidente/oriente» ofrece un registro más digno y literario, sin perder la referencia direccional del texto ni añadir una interpretación doctrinal.
  doctrine_reference: Project terminology defaults for directional clarity and publication readability
translation_notes:
  revision_awareness: 'Se incorporó la revisión crítica que corrige la asignación del sujeto: en este verso, el que «sale por la noche» y «alumbra» es la luna, no el sol. También se respetó la observación de que በዕለት debe leerse como «de día» en paralelo con «por la noche».'
  spanish_consistency_notes:
  - He mantenido «Yahvé» fuera del texto porque el verso no contiene el tetragrámaton ni κύριος.
  - He usado «Mesías/Cristo» no aplica aquí; no hay título mesiánico en el pasaje.
  - He preferido «occidente/oriente» para sostener el paralelismo direccional y el registro literario.
  - He conservado la voz pasiva o perifrástica cuando el original marca visibilidad/completación, para no borrar la tensión textual.
