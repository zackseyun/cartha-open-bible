    rationale: El sentido auditado es técnico-astronómico, no metafísico. «llega a formarse» o «se forma» comunica mejor el proceso sin perder la dificultad del texto.
  - severity: low
    issue: «son añadidas» y «es completada» son comprensibles pero algo rígidas.
    rationale: En español natural y digno, «se añaden» y «se completa» conservan el valor pasivo/progresivo con mejor legibilidad.
