translation:
  language: es
  text: Y quince partes de luz se añaden dentro de ella hasta el día quince; y su luz se completa como señal del año, y llega a ser quince partes[a], y la luna llega a formarse por la mitad de una séptima parte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La repetición de «quince» probablemente se refiere a quince partes de luz lunar, una cuenta técnica usada en este capítulo, no solo a la fecha del calendario.
    reason: cultural_note
lexical_decisions:
- source_word: ፲ትኅምስት
  english_pob_choice: fifteen / fifteen parts
  chosen_spanish: quince partes
  alternatives_spanish:
  - quince
  - el día quince
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El número es claramente ‘quince’; en este contexto astronómico no se refiere solo a una fecha, sino a una medida cuantitativa de luz lunar. Por eso ‘quince partes’ conserva el valor técnico del pasaje.
- source_word: ብርሃን
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - brillo
  - luminosidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este libro astronómico, el término apunta a la luz visible de la luna, no al astro como objeto. ‘Luz’ mantiene el sentido observacional y técnico.
- source_word: ይትወደደ
  english_pob_choice: are added
  chosen_spanish: son añadidas
  alternatives_spanish:
  - son aumentadas
  - se incrementan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea es de aumento por pasos o por porciones. ‘Son añadidas’ conserva la imagen concreta del cómputo progresivo mejor que una simplificación más fluida.
- source_word: ውስቴታ
  english_pob_choice: within it
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en ella
  - dentro de ello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo retoma el ciclo lunar. ‘Dentro de ella’ mantiene la referencia interna al proceso de acumulación de luz.
- source_word: እስከ *ዐሡር ወኃሙስ
  english_pob_choice: until the fifteenth day
  chosen_spanish: hasta el día quince
  alternatives_spanish:
  - hasta quince
  - hasta el quince
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El compuesto significa literalmente ‘diez y cinco’. En español conviene explicitar ‘día’ para dejar claro el valor temporal dentro del ciclo lunar.
- source_word: ይትፈጸም
  english_pob_choice: is completed
  chosen_spanish: es completada
  alternatives_spanish:
  - se completa
  - es cumplida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa llegar a plenitud o completarse. ‘Es completada’ conserva ese cierre del proceso de iluminación lunar.
- source_word: ብርሃነ ዚአሁ
  english_pob_choice: its light
  chosen_spanish: su luz
  alternatives_spanish:
  - la luz de ella
  - esa luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase pronominal remite naturalmente a la luna y a su luz ya mencionada. ‘Su luz’ es la forma más natural en español y mantiene la referencia.
- source_word: ለትእምርተ ዓመት
  english_pob_choice: as a sign of the year
  chosen_spanish: como señal del año
  alternatives_spanish:
  - como signo del año
  - como marca del año
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Señal’ conserva el valor calendárico sin convertirlo en símbolo alegórico. En este contexto astronómico, la luz lunar funciona como marcador del orden anual.
- source_word: ወይከውን ለ፲፲ትኅምስት
  english_pob_choice: and it becomes fifteen parts
  chosen_spanish: y llega a ser quince partes
  alternatives_spanish:
  - y es quince partes
  - y alcanza quince partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La sintaxis repite la medida completa de luz. ‘Llega a ser’ preserva la idea de culminación cuantitativa sin sobreinterpretar el giro.
- source_word: ወርኅ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna llena
  - el mes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el contexto astronómico exige ‘la luna’ como sujeto de las fases. ‘Mes’ sería posible en otros contextos, pero aquí oscurecería la referencia física al ciclo lunar.
- source_word: በመንፈቀ ሳብዕ እደ
  english_pob_choice: by half of a seventh part
  chosen_spanish: por la mitad de una séptima parte
  alternatives_spanish:
  - por medio de una séptima parte
  - en la mitad de una séptima parte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige una lectura previa errónea: la frase no dice que el mes llegue a su mitad en la séptima porción, sino que la luna llega a existir por medio de la mitad de una séptima parte. En español, ‘por la mitad de una séptima parte’ preserva el valor instrumental y el cálculo astronómico.'
theological_decisions:
- issue: Función calendárica de la luz lunar completada
  english_pob_reading: Rendered the phrase in observational/calendrical terms ('as a sign of the year') rather than symbolic or allegorical language.
  chosen_spanish_reading: 'Se mantiene un sentido observacional y calendárico: la luna completa su luz como señal del año.'
  alternative_spanish_readings:
  - como augurio del año
  - como símbolo del año
  rationale: El texto pertenece al material astronómico de 1 Enoc y describe orden cósmico y cómputo, no alegoría. ‘Señal’ conserva la función cronológica sin introducir simbología ajena al pasaje.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
- issue: Alcance matemático de la cláusula final
  english_pob_reading: and the moon comes into being by half of a seventh part.
  chosen_spanish_reading: y la luna llega a existir por la mitad de una séptima parte.
  alternative_spanish_readings:
  - y la luna viene a ser por la mitad de una séptima parte
  - y la luna aparece por la mitad de una séptima parte
  rationale: La revisión del audit trail indica que el verso transmite un cálculo astronómico específico del ciclo lunar. La redacción española debe conservar la dificultad y el valor técnico de la medida, sin suavizarla en una interpretación más general.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El audit trail en inglés registra una corrección importante: una lectura previa entendía erróneamente ወርኅ como ‘el mes’ y la cláusula final como ‘comes to its half in the seventh portion’. La revisión aprobada aclara que ወርኅ aquí es ‘la luna’ y que la frase final expresa un cálculo astronómico: ‘por la mitad de una séptima parte’. La versión española sigue esa lectura revisada y conserva, sin resolver, la dificultad técnica del final.'
  spanish_consistency_notes:
  - Se mantiene ‘luna’ para ወርኅ conforme al contexto astronómico, evitando ‘mes’ salvo que el contexto lo exija explícitamente.
  - ‘Señal del año’ preserva el lenguaje calendárico del pasaje y evita una alegorización innecesaria.
  - Se usa ‘luz’ y no ‘luminar’ para ብርሃን, porque aquí el texto contabiliza la luz visible de la luna.
  - La puntuación conserva la coordinación repetitiva del original y el ritmo técnico del cómputo lunar.
