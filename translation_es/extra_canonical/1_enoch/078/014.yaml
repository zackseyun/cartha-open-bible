translation:
  language: es
  text: De donde le viene la luz a la luna[a], de allí[b] nuevamente mengua hasta que toda la luz se acaba, y pasan los días del mes, y su disco permanece vacío[c], sin luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de aquel lugar». El geʽez usa aquí un relativo locativo correlativo («de donde»), que se corresponde con «de allí» después y subraya que la luna pierde la luz desde el mismo lado en que la recibe.
    reason: lexical_alternative
  - marker: b
    text: 'O «de allí a su vez». También puede entenderse: «De allí le viene la luz a la luna, y de allí nuevamente mengua».'
    reason: lexical_alternative
  - marker: c
    text: «Su disco» también puede traducirse «su círculo» o «su orbe»; la imagen es la forma redonda visible de la luna, dejada en oscuridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምኀበ
  english_pob_choice: from where
  chosen_spanish: de donde
  alternatives_spanish:
  - desde allí
  - de aquel lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El geʽez funciona aquí como relativo locativo correlativo, no como simple deíctico. «De donde» conserva mejor la relación con el segundo miembro «de allí» y evita perder la estructura correlative del verso.
- source_word: ይመጽእ
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - procede
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo describe movimiento simple y repetido dentro de una secuencia astronómica. «Viene» es natural en español y mantiene la imagen de recepción de luz por la luna.
- source_word: ብርሃን
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - luminosidad
  - claridad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto se trata de luz astronómica concreta, no de iluminación metafórica. «Luz» es la opción más directa y fiel.
- source_word: ለወርኅ
  english_pob_choice: to the moon
  chosen_spanish: a la luna
  alternatives_spanish:
  - para la luna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición marca dirección/relación; en español «a la luna» expresa con claridad que la luz se dirige o llega a ella.
- source_word: ካዕበ
  english_pob_choice: again
  chosen_spanish: nuevamente
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio señala repetición cíclica. «Nuevamente» es sobrio y adecuado al tono descriptivo del pasaje.
- source_word: የሐፅፅ
  english_pob_choice: it wanes
  chosen_spanish: mengua
  alternatives_spanish:
  - disminuye
  - va menguando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el ciclo lunar, «mengua» es idiomático y conserva la imagen astronómica sin explicarla modernamente.
- source_word: እስከ ይትዌዳእ ኵሉ ብርሃን
  english_pob_choice: until all the light is ended
  chosen_spanish: hasta que toda la luz se acaba
  alternatives_spanish:
  - hasta que toda la luz termina
  - hasta que toda la luz se consume
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El segmento marca la conclusión del menguante. «Se acaba» expresa bien el agotamiento total de la luz sin añadir mecanicismos ajenos al texto.
- source_word: ወየኀልፍ መዋዕለ ወርኅ
  english_pob_choice: and the days of the month pass
  chosen_spanish: y pasan los días del mes
  alternatives_spanish:
  - y transcurren los días del mes
  - y pasan los días de la luna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí መዋዕለ significa «días» y ወርኅ se entiende temporalmente como «mes» en el ciclo descrito. «Los días del mes» mantiene ese valor calendárico.
- source_word: ወይነብር ክበቡ ባክ ዘእንበለ ብርሃን
  english_pob_choice: and its disk remains empty, without light
  chosen_spanish: y su disco permanece vacío, sin luz
  alternatives_spanish:
  - y su círculo permanece vacío, sin luz
  - y su órbita queda vacía, sin luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ክበቡ alude a la forma redonda visible de la luna; «disco» es una forma clara y fiel en español. «Vacío» conserva la idea de carencia/ausencia, y «sin luz» explicita la condición final.
theological_decisions:
- issue: Descripción astronómica del ciclo lunar
  english_pob_reading: Render the verse as an observational/astronomical description of the moon receiving and losing light, without importing later cosmological explanation.
  chosen_spanish_reading: Mantener el verso como descripción observacional del ciclo de la luna que recibe y pierde luz, sin modernizar el mecanismo ni alegorizarlo.
  alternative_spanish_readings:
  - Interpretarlo simbólicamente como una fuerza espiritual
  - Explicarlo en términos científicos modernos sobre luz reflejada
  rationale: El Libro Astronómico presenta procesos cósmicos ordenados en estilo visionario-apocalíptico. La traducción debe conservar ese registro y la observación del texto, sin imponer explicaciones externas.
  doctrine_reference: 'Principio de traducción: preservar la imaginería apocalíptica y no paraphrasear más allá del testimonio del texto.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección auditada que identifica እምኀበ como correlativo relativo («from where») y እምህየ como demostrativo («from there»). Por eso la primera cláusula quedó como «De donde...», y la segunda como «de allí nuevamente», sin añadir conjunciones que no están en el geʽez. También se respetó la revisión de estilo que favorece una forma formal y natural para el cierre de la cláusula sobre la luz que se acaba.
  spanish_consistency_notes:
  - Se mantuvo «luna» para ወርኅ en el sentido astronómico y «mes» en el segmento temporal, siguiendo el contexto del ciclo lunar.
  - Se prefirió «luz» frente a alternativas abstractas como «claridad», porque el pasaje describe una realidad lumínica concreta.
  - «Mengua» conserva un registro bíblico-natural para el fenómeno lunar sin depender de formulaciones técnicas modernas.
  - No se usó «SEÑOR» ni vocabulario cristológico, pues el verso no los contiene.
