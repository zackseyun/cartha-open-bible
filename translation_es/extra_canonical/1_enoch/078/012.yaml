    text: 'O: «la luz aparece sobre ella». La expresión ge’ez imagina la luminosidad elevándose sobre la luna.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la creciente».'
    reason: previous_rendering
  - marker: d
    text: 'O: «la luz sube sobre ella».'
    reason: previous_rendering
  revision_rationale: Se conserva la estructura y las decisiones auditadas principales, pero se corrige la frase final a «la luz se eleva sobre ella» para un español más natural que aún mantiene la imagen del original. También se normaliza la función de la nota d para que sea una variante genuina y no una repetición del texto base.
