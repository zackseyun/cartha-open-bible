translation:
  language: es
  text: El primer día se la llama la luna nueva[a][b][c][d], porque en ese día la luz se eleva sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la luna está en su fase creciente al comienzo del mes.
    reason: cultural_note
  - marker: b
    text: 'O: «la luz aparece sobre ella». La expresión ge’ez imagina la luminosidad elevándose sobre la luna.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la creciente».'
    reason: previous_rendering
  - marker: d
    text: 'O: «la luz sube sobre ella».'
    reason: previous_rendering
lexical_decisions:
- source_word: በቀዳሚት ዕለት
  english_pob_choice: On the first day
  chosen_spanish: El primer día
  alternatives_spanish:
  - En el primer día
  - Al primer día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión marca un momento temporal concreto dentro de la secuencia lunar; en español natural, «el primer día» comunica con claridad ese inicio dentro del mes sin forzar la sintaxis.
- source_word: ሠርቀ
  english_pob_choice: the new moon
  chosen_spanish: la luna nueva
  alternatives_spanish:
  - la luna creciente
  - la que crece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico/calendárico, el término es la designación técnica del inicio o aparición de la luna nueva. «Luna nueva» preserva el valor calendárico definido por el texto y la revisión auditada.
- source_word: ትሠመይ
  english_pob_choice: she is called
  chosen_spanish: se la llama
  alternatives_spanish:
  - se le llama
  - es llamada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etíope está en forma femenina, refiriéndose a la luna. En español, «se la llama» mantiene la referencia femenina y el tono de denominación formal sin volver la frase torpe.
- source_word: እስመ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce la razón del nombre dado en la primera cláusula; «porque» es la equivalencia más directa y clara en español moderno.
- source_word: ይትነሣእ ላዕሌሃ ብርሃን
  english_pob_choice: light rises upon her
  chosen_spanish: la luz sube sobre ella
  alternatives_spanish:
  - la luz se alza sobre ella
  - la luz aparece sobre ella
  - la luz sube sobre su superficie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El etiópico presenta la imagen de la luz que asciende sobre la luna. «Sube sobre ella» conserva el movimiento vertical/aparente y evita una abstracción excesiva; se mantiene la personificación femenina del astro.
theological_decisions:
- issue: Referencia femenina a la luna
  english_pob_reading: Use feminine pronouns for the moon ('she,' 'her')
  chosen_spanish_reading: 'Conservar la referencia femenina: «la» / «ella»'
  alternative_spanish_readings:
  - usar «eso» o «ello»
  - usar solo el sustantivo sin pronombres
  rationale: El etiópico usa formas femeninas; el pasaje presenta los astros con rasgo personificado. Mantener «la» y «ella» preserva la textura original sin introducir una interpretación doctrinal ajena.
  doctrine_reference: Translation philosophy §Original-language primacy; preserve apocalyptic imagery
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del audit trail: se corrigió la designación del término ge’ez hacia «new moon» y se prefirió «upon her» en lugar de una lectura más libre. Por eso la redacción final usa «luna nueva» y conserva la imagen de la luz que sube/sobre ella, sin añadir glosas al cuerpo del texto.'
  spanish_consistency_notes:
  - Se mantuvo el estilo bíblico-dignificado en español, pero con sintaxis moderna y clara.
  - 'Se preservó la ambigüedad lumínica del original mediante una frase literal pero natural: «la luz sube sobre ella».'
  - Los corchetes de nota se colocaron en la expresión nominal principal para reflejar las variantes auditadas del inglés POB.
