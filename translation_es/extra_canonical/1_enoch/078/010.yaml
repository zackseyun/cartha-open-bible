translation:
  language: es
  text: 'Y Uriel me mostró otra ley[a]: cuando la luz es transferida a la luna, y de dónde se transfiere desde el sol.[b][c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ley» traduce aquí un término ge’ez que también puede entenderse como «orden» u «ordenanza»; la opción elegida mantiene el tono solemne y cósmico del pasaje.
    reason: lexical_alternative
  - marker: b
    text: 'La construcción es algo comprimida: la idea es que Uriel muestra a Enoc la norma que rige cómo la luna recibe su luz del sol.'
    reason: alternative_reading
  - marker: c
    text: 'O: «cuando la luz es transferida a la luna, y de dónde es transferida desde el sol».'
    reason: previous_rendering
lexical_decisions:
- source_word: ካልእት
  english_pob_choice: another
  chosen_spanish: otra
  alternatives_spanish:
  - una segunda
  - una adicional
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo introduce una disposición astronómica נוספת dentro de una serie; «otra» conserva la idea de secuencia de manera natural en español.
- source_word: ሥርዓተ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - orden
  - regla
  - ordenanza
  - regulación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cósmico-astronómico, «ley» comunica mejor el sentido de norma fija u orden establecido que «regla» o «regulación», y mantiene la solemnidad del pasaje.
- source_word: አርአየኒ
  english_pob_choice: showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me reveló
  - me hizo ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un verbo de reporte visionario directo; «me mostró» sigue de cerca la construcción del original sin cargarlo innecesariamente con un matiz técnico de revelación.
- source_word: ይትወደይ
  english_pob_choice: is transferred
  chosen_spanish: es transferida
  alternatives_spanish:
  - es transmitida
  - es llevada
  - pasa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva/reflexiva describe el paso de la luz de un astro a otro. «Es transferida» conserva mejor el sentido técnico y la simetría del texto fuente.
- source_word: ብርሃን
  english_pob_choice: light
  chosen_spanish: la luz
  alternatives_spanish:
  - la claridad
  - el resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido básico es literal y astronómico; «la luz» es la forma más clara y fiel en español.
- source_word: ውስተ ወርኅ
  english_pob_choice: into the moon
  chosen_spanish: a la luna
  alternatives_spanish:
  - dentro de la luna
  - en la luna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el ge’ez marca movimiento hacia/into, en español astronómico «a la luna» expresa mejor la transferencia sin sonar forzado; la idea de recepción queda implícita por el verbo pasivo.
- source_word: እምኀበ
  english_pob_choice: from where
  chosen_spanish: de dónde
  alternatives_spanish:
  - desde dónde
  - de qué lado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada señaló que ኀበ puede implicar «lado» o «dirección»; sin embargo, aquí la lectura publicada en inglés volvió a «from where». «De dónde» mantiene la interrogativa-relativa del original y la ambigüedad espacial sin decidir explícitamente «lado».
- source_word: እምፀሐይ
  english_pob_choice: from the sun
  chosen_spanish: desde el sol
  alternatives_spanish:
  - del sol
  - a partir del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Identifica al sol como fuente del movimiento de la luz. «Desde el sol» conserva mejor la procedencia espacial en una construcción paralela con «de dónde».
theological_decisions:
- issue: Naturaleza derivada de la luz lunar
  english_pob_reading: The verse describes the moon's light as derived from the sun by transfer.
  chosen_spanish_reading: La luna recibe luz procedente del sol por transferencia.
  alternative_spanish_readings:
  - La frase solo describe una relación entre luna y sol sin afirmar derivación.
  - El texto podría tener un matiz astronómico técnico hoy difícil de reconstruir con total precisión.
  rationale: La repetición del verbo pasivo, junto con «luz», «a la luna» y «desde el sol», sostiene la lectura de procedencia derivada. La versión española conserva esa afirmación cosmológica sin armonizarla con explicaciones posteriores.
  doctrine_reference: Preservar el sentido local del pasaje y su cosmología apocalíptica, sin anacronismos doctrinales.
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste más reciente del audit trail en inglés, que volvió de «which direction» a «where». Por eso la versión española evita fijar explícitamente «lado» o «dirección» en el texto principal y conserva una formulación más cercana a la lectura publicada, dejando la posible matización espacial en la nota.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - «Ley» se usa con valor cósmico y no jurídico moderno.
  - «La luz» se mantiene literal para no desdibujar el sentido astronómico.
  - La secuencia de puntuación conserva la cadencia de la fuente y la del audit trail en inglés.
