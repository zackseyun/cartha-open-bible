  - severity: medium
    issue: Sintaxis española poco natural en «de dónde es transferida desde el sol»
    rationale: La secuencia mezcla «de dónde» con «desde el sol» de forma redundante y dura. Aunque el original es comprimido, el español puede reflejarlo mejor con «de dónde se transfiere desde el sol» o equivalente, preservando la rareza sin sonar defectuoso.
  - severity: low
    issue: Falta una nota que preserve la variante/lectura previa documentada en el inglés POB
    rationale: El expediente inglés incluyó una nota adicional sobre la formulación alternativa completa de la cláusula. Dado que esa documentación forma parte del rastro auditado, conviene conservarla también en español.
