translation:
  language: es
  text: 'Y la luna tiene cuatro nombres: el primero es Asonya[a], el segundo Abla, el tercero Benase[b] y el cuarto Erae.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez ወርኅ puede significar 'luna' o 'mes'. Aquí se prefiere 'luna' porque el versículo atribuye cuatro nombres al astro.
    reason: lexical_alternative
  - marker: b
    text: Los cuatro nombres son transliteraciones de las formas etiópicas. Sus formas antiguas subyacentes, si las hubo, no son seguras.
    reason: cultural_note
lexical_decisions:
- source_word: ወርኅ
  english_pob_choice: moon
  chosen_spanish: luna
  alternatives_spanish:
  - mes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto se trata del astro al que se le atribuyen cuatro nombres; por eso, como en la auditoría inglesa, 'luna' es la opción más fiel al referente inmediato, mientras que 'mes' oscurecería el sujeto nombrado.
- source_word: አርባዕተ
  english_pob_choice: four
  chosen_spanish: cuatro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Número cardinal directo; 'cuatro' conserva el valor enumerativo del texto.
- source_word: አስማተ
  english_pob_choice: names
  chosen_spanish: nombres
  alternatives_spanish:
  - apelativos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural de 'nombre' reproduce de manera natural el catálogo de denominaciones del versículo.
- source_word: ቦቱ
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - le pertenecen
  - para él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez expresa posesión o pertenencia; en español, 'tiene' transmite con naturalidad ese sentido sin añadir matices ajenos.
- source_word: ፩ ስሙ
  english_pob_choice: the first is
  chosen_spanish: el primero es
  alternatives_spanish:
  - su primer nombre es
  - un nombre es
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción introduce el primer elemento de una serie; 'el primero es' mantiene el orden enumerativo de forma idiomática en español.
- source_word: አሶንያ
  english_pob_choice: Asonya
  chosen_spanish: Asonya
  alternatives_spanish:
  - Asonia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Nombre propio transliterado; se conserva la forma más cercana al testimonio ge'ez y se evita traducirlo.
- source_word: ካልእ
  english_pob_choice: the second
  chosen_spanish: el segundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal directo para marcar la segunda entrada de la lista.
- source_word: አብላ
  english_pob_choice: Abla
  chosen_spanish: Abla
  alternatives_spanish:
  - Abela
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Nombre propio transliterado sin intentar normalizar una vocalización incierta.
- source_word: ሣልስ
  english_pob_choice: the third
  chosen_spanish: el tercero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal directo; 'el tercero' mantiene la serie de nombres.
- source_word: ብናሴ
  english_pob_choice: Benase
  chosen_spanish: Benase
  alternatives_spanish:
  - Bənase
  - Banase
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Transliteración conservadora de un nombre propio cuya vocalización precisa no es segura; se preserva la forma documental sin inventar una normalización.
- source_word: ራብዕ
  english_pob_choice: the fourth
  chosen_spanish: el cuarto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal directo para la cuarta y última entrada del listado.
- source_word: ኤራእ
  english_pob_choice: Erae
  chosen_spanish: Erae
  alternatives_spanish:
  - Eraʾ
  - Erai
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Nombre propio transliterado de manera conservadora, respetando la incertidumbre sobre su cierre final.
theological_decisions:
- issue: መ/ወርኅ como 'luna' frente a 'mes'
  english_pob_reading: The verse refers to the moon, because the following clause lists four names of the luminary.
  chosen_spanish_reading: '''luna'''
  alternative_spanish_readings:
  - '''mes'''
  rationale: La serie de cuatro nombres pertenece al astro, no al período calendárico; por tanto, 'luna' conserva el referente y evita una ambigüedad que el contexto ya resuelve.
  doctrine_reference: Translation philosophy §Original-language primacy over translation tradition; consistency of referent in context.
translation_notes:
  revision_awareness: La auditoría inglesa muestra acuerdo alto y no registra revisiones sustantivas; este borrador sigue esa lectura sin introducir cambios textuales ni normalizaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene el patrón enumerativo 'el primero... el segundo... el tercero... el cuarto...' para reproducir la estructura del original.
  - Se conserva la transliteración de los nombres propios sin castellanizarlos, en coherencia con la política del proyecto para nombres documentales.
  - '''Luna'' se usa de forma consistente con la decisión lexical y con la nota que explica la alternativa ''mes''.'
