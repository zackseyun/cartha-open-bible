translation:
  language: es
  text: 'Y estos son los nombres del sol: uno es Aryares[a], y el segundo, Tomás.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conservan los dos nombres solares como transliteraciones del testimonio ge'ez. Su forma subyacente exacta en etapas anteriores del texto es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወአስማቲሁ
  english_pob_choice: the names of it / the names
  chosen_spanish: los nombres de él
  alternatives_spanish:
  - sus nombres
  - los nombres de aquel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo plural ‘nombres’ se conserva con valor posesivo referido al sol; en español, ‘los nombres de él’ o ‘sus nombres’ expresan naturalmente la relación sin perder el vínculo con el referente explícito.
- source_word: ለፀሐይ
  english_pob_choice: of the sun
  chosen_spanish: del sol
  alternatives_spanish:
  - para el sol
  - al sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'En esta fórmula enumerativa, la relación es posesiva o atributiva: se trata de nombres pertenecientes al sol. ‘Del sol’ reproduce el sentido con claridad en español.'
- source_word: ከመዝ
  english_pob_choice: are these
  chosen_spanish: estos son
  alternatives_spanish:
  - así son
  - son estos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión introduce una lista. ‘Estos son’ mantiene el giro presentativo sin sonar arcaico.
- source_word: ፩
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - el primero
  - primeramente
  lexicon: Charles 1906 Ethiopic Enoch edition
  rationale: El numeral marca el primer elemento de una pareja. ‘Uno’ sigue de cerca el valor del testimonio ge'ez y conserva la secuencia enumerativa.
- source_word: አርያሬስ
  english_pob_choice: Aryares
  chosen_spanish: Aryares
  alternatives_spanish:
  - Ariyares
  - Aryaris
  lexicon: Charles 1906 Ethiopic Enoch edition
  rationale: Es un nombre propio astronómico/esotérico transmitido en transliteración. Se conserva sin interpretación para no imponer una etimología incierta.
- source_word: ካልእ
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - otro
  - el otro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un listado de dos elementos, el valor es ordinal, no indefinido. ‘El segundo’ expresa con precisión la relación con el primer nombre.
- source_word: ቶማስ
  english_pob_choice: Tomas
  chosen_spanish: Tomas
  alternatives_spanish:
  - Tomás
  - Thomas
  lexicon: Charles 1906 Ethiopic Enoch edition
  rationale: Se conserva la forma transliterada del testimonio ge'ez. Se prefiere ‘Tomas’ a ‘Tomás’ para no normalizarlo innecesariamente a la forma española del nombre bíblico más conocido.
theological_decisions:
- issue: Tratamiento de los nombres solares como elementos transmitidos y no explicados
  english_pob_reading: Retain both as transliterated proper names
  chosen_spanish_reading: Conservar ambos como nombres propios transliterados
  alternative_spanish_readings:
  - Traducir o etimologizar los nombres
  - normalizar Tomas como Tomás
  rationale: El pasaje presenta nombres astrales en una cosmología apocalíptica. Mantener la transliteración preserva la extrañeza del texto y evita lecturas especulativas que el testimonio no desarrolla.
  doctrine_reference: Traducir títulos; transliterar nombres.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste reciente del inglés POB: ‘And these are the names of the sun’ en vez de invertir el orden (‘And the names of the sun are these’), preservando el tono enumerativo y todos los elementos del original ge''ez.'
  spanish_consistency_notes:
  - Se mantiene ‘sol’ en sentido literal, sin introducir mayúsculas teológicas innecesarias.
  - Se conserva ‘Aryares’ y ‘Tomas’ como nombres propios transliterados, de acuerdo con la política del proyecto para nombres inciertos.
  - La estructura ‘Estos son los nombres del sol’ refleja con naturalidad la fórmula de introducción de lista sin añadir contenido interpretativo.
