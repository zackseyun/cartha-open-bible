translation:
  language: es
  text: Porque estas aguas[a] de juicio son para la sanación de la carne de los reyes y para la lujuria de su carne[b]; y por esto no ven ni creen que esas aguas cambiarán y se convertirán en fuego que arde por siempre jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el agua de juicio», si el ge'ez se toma colectivamente; se mantiene el plural «aguas» para preservar la imagen visual de la escena.
    reason: lexical_alternative
  - marker: b
    text: O «Porque estas son las aguas de juicio» (versión anterior basada únicamente en los cuatro primeros vocablos ge'ez conservados, antes de que se recuperara el texto completo de la página 158 mediante revisión adjudicadora).
    reason: source_note
lexical_decisions:
- source_word: እስመ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Pues bien
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conjunción causal/explicativa que introduce la fundamentación de la escena visionaria. «Porque» es el equivalente natural en español y preserva la fuerza explicativa elevada sin expandir el texto. «Pues» sería más coloquial; «ya que» más subordinado y menos enfático.
- source_word: ማየ
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez admite lectura plural o colectiva. Se mantiene «aguas» en plural para preservar la imagen concreta de la escena apocalíptica, coherente con la decisión léxica del inglés POB. El singular «agua» aplanaría la imagen a sustantivo de masa abstracto.
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condena
  - castigo
  - sentencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término judicial forense. «Juicio» preserva la amplitud teológica del acto judicial divino sin reducirlo al veredicto («condena») ni al resultado punitivo («castigo»). Coherente con la terminología del proyecto para términos apocalíptico-forenses.
- source_word: ፈውሰ
  english_pob_choice: healing
  chosen_spanish: sanación
  alternatives_spanish:
  - curación
  - remedio
  - alivio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término denota restauración/salud. «Sanación» lleva una connotación levemente elevada y restauradora propia del registro visionario, y encaja con la ironía de que las aguas de juicio sean buscadas como remedio carnal. «Curación» es igualmente válido y más común; «sanación» se ajusta mejor al registro apocalíptico.
- source_word: ሥጋ (ሥጋሆሙ)
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - cuerpo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Por defecto del proyecto para términos de «carne» (cf. σάρξ). «Carne» preserva el sentido material/corporal y la tensión teológica carne-espíritu sin aplanarla. No hay razón contextual para usar «naturaleza humana», que desplazaría el foco corporal concreto.
- source_word: ፍትወተ (ፍትወተ፡ሥጋሆሙ)
  english_pob_choice: lust
  chosen_spanish: lujuria
  alternatives_spanish:
  - concupiscencia
  - deseo
  - apetito carnal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término denota deseo/apetito carnal en sentido negativo/moral. «Lujuria» capta la fuerza moral desfavorable sin el peso eclesiástico arcaico de «concupiscencia». «Deseo» sería demasiado neutral para el contexto de condena.
theological_decisions:
- issue: 'Alcance de ኵነኔ: acto judicial amplio o veredicto/castigo específico'
  english_pob_reading: judgment
  chosen_spanish_reading: juicio
  alternative_spanish_readings:
  - condena
  - castigo
  rationale: En el contexto apocalíptico de 1 Enoc, estas aguas pertenecen a la acción judicial divina y su identificación como «de juicio» preserva esa amplitud teológica. «Juicio» en español es coherente con la decisión del inglés POB y evita preemptar si el énfasis recae en el proceso, el veredicto o el castigo.
  doctrine_reference: Preservar la tensión teológica sin resolverla; coherencia de términos clave documentada en el proyecto.
- issue: 'Extensión del versículo: solo los cuatro primeros vocablos ge''ez conservados en la fuente, o el versículo completo recuperado por los revisores'
  english_pob_reading: For these waters of judgment are for the healing of the flesh of the kings and for the lust of their flesh; and because of this they do not see and do not believe that those waters will change and become a fire that burns forever and ever.
  chosen_spanish_reading: Versículo completo según el texto restaurado por el adjudicador y la corrección de truncamiento.
  alternative_spanish_readings:
  - Porque estas son las aguas de juicio.
  rationale: El texto fuente extraído contiene únicamente la cláusula inicial (እስመ፡ እሉ፡ ማየ፡ ኵነኔ፡) debido a un fallo del analizador en el límite de páginas 157–158. El adjudicador de nivel 3 (2026-04-22) recuperó el versículo completo con el ge'ez de la página 158. Una revisión posterior (gpt-5.4, 2026-04-23) volvió a truncar el texto; el paso de corrección (claude-sonnet-4-6, 2026-04-23T20:00:00Z) restauró el versículo íntegro. Traducir solo los cuatro vocablos conservados produciría una oración falsamente completa que traicionaría la evidencia manuscrita disponible.
  doctrine_reference: Integridad de la fuente; recuperación del límite de página documentada en applied_revisions.
translation_notes:
  revision_awareness: Este versículo tiene un historial de revisión complejo documentado en applied_revisions. El texto fuente extraído contenía solo cuatro palabras ge'ez (እስመ፡ እሉ፡ ማየ፡ ኵነኔ፡) debido a un fallo del analizador en el límite de páginas 157–158 de la edición Charles 1906. (1) El borrador inicial tradujo esos cuatro vocablos como oración completa. (2) El adjudicador de nivel 3 (gemini_3_1_pro, 2026-04-22) identificó el truncamiento y restauró el versículo completo con el ge'ez de la página 158. (3) El paso de revisión gpt-5.4 (2026-04-23) volvió a truncar el texto al fragmento inicial. (4) La corrección de truncamiento claude-sonnet-4-6 (2026-04-23T20:00:00Z) restauró definitivamente el versículo completo. La traducción española sigue el texto restaurado. El resumen de verificación cruzada muestra acuerdo=0.2 y veredicto «major-issues», reflejo del estado controvertido de los límites de fuente de este versículo; la discrepancia se documenta en la nota [b] y en las decisiones teológicas.
  spanish_consistency_notes:
  - «Juicio» se usa consistentemente para ኵነኔ en contextos apocalíptico-forenses, coherente con la terminología del proyecto.
  - «Carne» para ሥጋ sigue el valor predeterminado del proyecto (cf. σάρξ), sin razón contextual para excepción.
  - No aparece el nombre divino (יהוה/YHWH) en este versículo; no se requiere decisión sobre «Yahvé».
  - «Por siempre jamás» para la fórmula de duración eterna ("forever and ever") es la expresión natural en español para el registro apocalíptico y litúrgico.
  - '«No ven ni creen» en lugar de «no ven y no creen»: la conjunción «ni» en la segunda negación es gramaticalmente más natural en español sin alterar el sentido.'
