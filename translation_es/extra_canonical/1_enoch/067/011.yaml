translation:
  language: es
  text: Y las aguas mismas cambiarán en aquellos días[a], porque cuando esos ángeles sean juzgados en esas aguas, estos manantiales de agua cambiarán[b], y cuando los ángeles asciendan[c], esa agua de los manantiales cambiará y se enfriará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El geʽez es difícil en la parte media del versículo. Una lectura anterior entendía una referencia a la condición caliente de los manantiales; aquí se traduce de forma más literal el cambio de las aguas, y el cierre del versículo indica que luego se enfrían.
    reason: lexical_alternative
  - marker: b
    text: 'O: «estos manantiales—esas fuentes de agua—cambiarán». El texto puede oírse como una apposición enfática.'
    reason: alternative_reading
  - marker: c
    text: Se conserva literalmente «cuando los ángeles asciendan». En contexto puede referirse a los ángeles juzgados que suben en relación con los manantiales o las aguas ardientes, pero la imagen exacta es incierta en el testimonio etiópico.
    reason: alternative_reading
lexical_decisions:
- source_word: ኪያሁ
  english_pob_choice: themselves
  chosen_spanish: mismas
  alternatives_spanish:
  - también
  - incluso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor enfático se conserva con 'mismas', que subraya que el sujeto afectado son las aguas, no solo los ángeles ni otra realidad asociada.
- source_word: ማያት
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el plural para respetar la imagen concreta de múltiples corrientes o cuerpos de agua en la escena apocalíptica.
- source_word: ተውላጠ
  english_pob_choice: will be changed
  chosen_spanish: serán cambiadas
  alternatives_spanish:
  - serán alteradas
  - serán transformadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Serán cambiadas'' preserva el sentido inchoativo/pasivo sin intensificarlo indebidamente como una transformación total.'
- source_word: ይትኴነኑ
  english_pob_choice: are judged
  chosen_spanish: sean juzgados
  alternatives_spanish:
  - sean condenados
  - sean llevados a juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Juzgados'' mantiene el lenguaje judicial explícito del texto y deja abierta la cuestión del veredicto, como hace el POB en inglés.'
- source_word: በውእቱ ማያት
  english_pob_choice: in those waters
  chosen_spanish: en esas aguas
  alternatives_spanish:
  - dentro de esas aguas
  - en aquellas aguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición se conserva porque sitúa el juicio de los ángeles en relación espacial con las aguas; 'esas' refleja el demostrativo del contexto.
- source_word: ይትዌለጡ ዐያኖሙ
  english_pob_choice: these springs of water will change
  chosen_spanish: estos manantiales de agua cambiarán
  alternatives_spanish:
  - sus manantiales de agua cambiarán
  - estos manantiales de aguas cambiarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión más reciente del POB y se evita inferir 'calor' donde el ge'ez habla de los manantiales/surgencias mismas cambiando. 'Manantiales de agua' transmite bien el appositivo.
- source_word: የዐርጉ
  english_pob_choice: ascend
  chosen_spanish: asciendan
  alternatives_spanish:
  - suban
  - se eleven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Asciendan'' conserva el movimiento vertical solemne del verbo, sin añadir una explicación del marco escatológico que el texto no explicita.'
- source_word: ይትዌለጥ
  english_pob_choice: will change
  chosen_spanish: cambiará
  alternatives_spanish:
  - será cambiado
  - se alterará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se repite el motivo del cambio con una forma directa y natural en español, manteniendo el paralelismo del versículo.
- source_word: ይቈርሩ
  english_pob_choice: grow cold
  chosen_spanish: se enfriará
  alternatives_spanish:
  - se volverá fría
  - se pondrá fría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Se enfriará'' expresa el resultado con naturalidad en español y conserva el contraste con la condición previa del agua.'
theological_decisions:
- issue: Naturaleza del juicio de los ángeles
  english_pob_reading: the angels are judged
  chosen_spanish_reading: esos ángeles sean juzgados
  alternative_spanish_readings:
  - esos ángeles sean condenados
  - esos ángeles sean castigados
  rationale: Se conserva el lenguaje judicial sin resolver el resultado final del juicio. Esto preserva la tensión textual y sigue el criterio del POB de no anticipar más de lo que la forma verbal permite.
  doctrine_reference: Preservar la tensión teológica sin sobreespecificar el veredicto.
- issue: Relación entre el juicio angélico y el cambio de las aguas
  english_pob_reading: the waters change in connection with the angels' judgment and ascent
  chosen_spanish_reading: las aguas cambian en conexión con el juicio y el ascenso de los ángeles
  alternative_spanish_readings:
  - las aguas son instrumento del castigo
  - el cambio de las aguas es solo simbólico
  rationale: La traducción mantiene la unión entre juicio, ascenso y cambio de las aguas sin sistematizar la mecánica. El texto presenta una asociación apocalíptica, pero no explica del todo cómo opera.
  doctrine_reference: No resolver indebidamente la imagen apocalíptica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB: se corrigió la omisión de «en esas aguas», se evitó traducir el sustantivo como «calor» y se preservó la apposición de «manantiales de agua» sin añadir una interpretación no exigida por el ge''ez. También se siguió la preferencia revisada por una formulación más natural: «serán cambiadas», «cambiarán» y «se enfriará».'
  spanish_consistency_notes:
  - Se mantiene 'aguas' en plural para respetar la imaginería del pasaje.
  - Se usa 'juzgados' para conservar el registro judicial y no convertirlo prematuramente en 'condenados'.
  - '''Manantiales de agua'' conserva la concreción del término ge''ez sin forzar una lectura doctrinal.'
  - Se evita 'SEÑOR' u otras equivalencias ajenas, porque aquí no aparece el nombre divino ni un título que lo requiera.
