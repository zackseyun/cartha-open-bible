translation:
  language: es
  text: Y vi aquel valle en el que había una gran conmoción y una conmoción de las aguas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gran conmoción ... y una conmoción de las aguas». El término ge'ez repetido probablemente enfatiza una perturbación violenta en el valle, aunque el matiz exacto puede ir desde tumulto hasta convulsión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢክዋ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y contemplé
  - Y miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma narrativa visionaria se expresa naturalmente en español con un perfecto simple. Se conserva la conjunción inicial para mantener la secuencia apocalíptica del relato.
- source_word: ለይእቲ ቈላ
  english_pob_choice: that valley
  chosen_spanish: aquel valle
  alternatives_spanish:
  - ese valle
  - aquel barranco
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቈላ designa una depresión o hondonada tipo valle. «Valle» es la equivalencia más clara y natural; «aquel» conserva la referencia deíctica visionaria del texto.
- source_word: እንተ ሀውከ ዓቢይ ባቲ
  english_pob_choice: in which there was a great upheaval
  chosen_spanish: en el que había un gran trastorno
  alternatives_spanish:
  - en el que había una gran agitación
  - en el que había un gran upheaval
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሀውከ denota disturbio, tumulto o conmoción; en español «trastorno» comunica una perturbación intensa sin introducir de modo explícito lenguaje sísmico no exigido por el ge'ez. Se mantiene el adjetivo «gran» para ዓቢይ.
- source_word: ወሀውከ ማያት
  english_pob_choice: and an upheaval of waters
  chosen_spanish: y un trastorno de las aguas
  alternatives_spanish:
  - y una agitación de las aguas
  - y una conmoción de las aguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la repetición del núcleo léxico para reflejar el paralelismo retórico del original. «Aguas» mantiene el plural del ge'ez ማያት.
theological_decisions:
- issue: Naturaleza de la perturbación en el valle
  english_pob_reading: Physical-cosmic upheaval rather than merely emotional or social disturbance.
  chosen_spanish_reading: Perturbación física/cósmica expresada como trastorno, sin reducirla a simple desorden social o emocional.
  alternative_spanish_readings:
  - gran agitación
  - gran conmoción
  rationale: El contexto apocalíptico favorece una imagen concreta de perturbación en la creación. «Trastorno» conserva la intensidad y deja abierta la naturaleza exacta del fenómeno, sin sobreespecificarlo como terremoto.
  doctrine_reference: Preservar el lenguaje apocalíptico de juicio sin aplanarlo en prosa genérica.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «convulsion» por «upheaval» por ser más natural y contextual. En español, «trastorno» se eligió como equivalente idiomático que conserva la idea de perturbación intensa y la repetición retórica del original.
  spanish_consistency_notes:
  - Se mantuvo la repetición del término central para reflejar el paralelismo del ge'ez.
  - «Aguas» se conservó en plural conforme al sustantivo ge'ez.
  - No se usó «SEÑOR» ni terminología eclesiástica añadida, porque este versículo no involucra esos equivalentes léxicos.
