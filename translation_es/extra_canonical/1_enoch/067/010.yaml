translation:
  language: es
  text: Porque vendrá juicio sobre ellos, porque confían en la indulgencia[a] de su carne y niegan el Espíritu del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término vertido aquí como “indulgencia” es incierto en este pasaje conservado solo en ge'ez. También puede sugerir placer, desenfreno o incluso engaño asociado con la carne.
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  english_pob_choice: for / because
  chosen_spanish: Porque / porque
  alternatives_spanish:
  - pues / porque
  - ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula causal doble del ge'ez se refleja bien con una partícula de enlace al inicio y una causal explícita después. En español, repetir "porque" mantiene la relación lógica del original sin volver la frase pesada.
- source_word: ትመጽእ
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá a
  - llegará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El futuro simple comunica de manera natural la llegada escatológica del juicio, fiel al valor prospectivo del verbo.
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condena
  - sentencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Juicio" preserva el alcance judicial amplio y no reduce el término a una mera condena.'
- source_word: ዲቤሆሙ
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - sobre ellos mismos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, "sobre ellos" reproduce de forma idiomática el valor de una fórmula oracular de juicio.
- source_word: የአምኑ
  english_pob_choice: they trust
  chosen_spanish: confían
  alternatives_spanish:
  - creen
  - se apoyan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Confiar" expresa mejor la dependencia mal dirigida que simplemente "creer", y encaja con el objeto que sigue.'
- source_word: በተውኔተ
  english_pob_choice: in the indulgence of
  chosen_spanish: en la indulgencia de
  alternatives_spanish:
  - en el placer de
  - en la lascivia de
  - en el engaño de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el término raro y su ambigüedad, tal como el testimonio ge'ez obliga a hacerlo. "Indulgencia" es una solución provisional, transparente, que puede abarcar el matiz de autosatisfacción sensual o exceso; el sentido exacto sigue incierto.
- source_word: ሥጋሆሙ
  english_pob_choice: their flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su naturaleza corporal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Carne" mantiene el término antropológico y moral del texto, en vez de diluirlo en "cuerpo".'
- source_word: ወመንፈሰ
  english_pob_choice: and the spirit
  chosen_spanish: y el Espíritu
  alternatives_spanish:
  - y el espíritu
  - y el aliento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado que el genitivo siguiente pertenece al Señor, la mayúscula en "Espíritu" ayuda a reflejar la lectura formal adoptada por la POB y evita reducirlo a una disposición interior genérica.
- source_word: እግዚአ
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Maestro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Señor" corresponde al título divino estándar y es el equivalente español más natural en esta construcción genitiva.'
- source_word: ይክሕዱ
  english_pob_choice: deny
  chosen_spanish: niegan
  alternatives_spanish:
  - rechazan
  - reniegan de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Negar" conserva el peso de repudiación doctrinal del verbo, sin suavizarlo a un simple desacuerdo.'
theological_decisions:
- issue: Identidad de 'el Espíritu del Señor'
  english_pob_reading: a reference to the Lord's Spirit, which they repudiate in contrast to reliance on flesh
  chosen_spanish_reading: una referencia al Espíritu del Señor, que ellos repudian en contraste con su confianza en la carne
  alternative_spanish_readings:
  - su propio espíritu dado por Dios
  - el modo espiritual que pertenece al Señor
  rationale: La construcción del genitivo apunta de manera más directa al Espíritu perteneciente al Señor. Se evita armonizarlo con formulaciones doctrinales posteriores, pero se conserva el contraste carne/Espíritu de forma visible.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano
translation_notes:
  revision_awareness: La revisión inglesa más reciente capitalizó “Spirit” para reflejar la lectura formal de “the Spirit of the Lord”; la versión española sigue esa decisión con “Espíritu”. También se conservó la solución provisional para el término oscuro ተውኔተ, sin forzar una aclaración mayor que el testimonio no sustenta.
  spanish_consistency_notes:
  - Se mantuvo el contraste carne/Espíritu sin reinterpretarlo como psicología interior ni como doctrina posterior.
  - '"Señor" se usa como equivalente de እግዚአ, conforme al valor divino del título en el contexto.'
  - El inciso causal se conserva con redundancia moderada para reflejar la doble እስመ del original.
  - La nota al pie acompaña únicamente el término léxico incierto y no introduce una lectura dogmática.
