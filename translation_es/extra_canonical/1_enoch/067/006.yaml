- from: Y cuando todo esto sucedió[a], de aquel torrente[b] de fuego y de su agitación en aquel lugar, se produjo un olor de azufre, y se juntó con aquellas aguas[c]; y aquel valle de los ángeles que extraviaron a otros arde debajo de aquella tierra.
  to: Y cuando todo esto sucedió, de aquella corriente de fuego y de su agitación en aquel lugar, se produjo un olor de azufre[a] y se juntó con aquellas aguas[b]; y aquel valle de los ángeles que extraviaron arde debajo de aquella tierra.
  rationale: Se corrige el aparato de notas para que [a] vuelva a señalar la alternativa léxica de «azufre/brimstone», se elimina el añadido interpretativo «a otros», y se suaviza «torrente» a «corriente» para acercarse mejor a «stream of fire» sin perder naturalidad española. El resto del versículo queda sustancialmente fiel al ge'ez y a la auditoría inglesa.
