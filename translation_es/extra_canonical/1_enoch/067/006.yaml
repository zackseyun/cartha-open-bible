translation:
  language: es
  text: Y cuando todo esto sucedió, de aquella corriente de fuego y de su agitación en aquel lugar, se produjo un olor de azufre[a] y se juntó con aquellas aguas[b]; y aquel valle de los ángeles que extraviaron arde debajo de aquella tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La traducción tradicional «brimstone» en inglés corresponde aquí a «azufre»; se prefiere el término moderno español por claridad.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «se mezcló con aquellas aguas». El original deja abierta la relación exacta entre el olor de azufre y las aguas.'
    reason: alternative_reading
lexical_decisions:
- source_word: ሶበ
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al momento en que
  - cuando ocurrió
  lexicon: Charles 1906 / valor temporal en Ge'ez
  rationale: La cláusula temporal debe mantenerse explícita; «cuando» conserva la relación dependiente del evento sin añadir interpretación.
- source_word: ነጠብጣብ እሳት
  english_pob_choice: stream of fire
  chosen_spanish: torrente de fuego
  alternatives_spanish:
  - corriente de fuego
  - flujo de fuego
  - arroyo de fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El compuesto evoca fuego que cae o fluye; «torrente» preserva el movimiento continuo y suena natural en español bíblico sin volverlo técnico en exceso.
- source_word: ሀውኮሙ
  english_pob_choice: their disturbance
  chosen_spanish: su agitación
  alternatives_spanish:
  - su disturbio
  - su convulsión
  - su perturbación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma señala agitación, conmoción o desorden. «Agitación» mantiene el sentido físico y dramático sin cargarlo con una lectura médica o excesivamente interpretativa.
- source_word: መካን
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - región
  - paraje
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lugar» reproduce el alcance general del término y funciona bien en una descripción visionaria.
- source_word: ጼና ተይ
  english_pob_choice: smell of sulfur
  chosen_spanish: olor de azufre
  alternatives_spanish:
  - hedor de azufre
  - olor a azufre
  - hedor sulfuroso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia apunta al olor sulfurosо. «Olor de azufre» es directo y fiel; se evita añadir connotaciones más fuertes que el texto no exige.
- source_word: ተወልደ
  english_pob_choice: was produced
  chosen_spanish: se produjo
  alternatives_spanish:
  - nació
  - surgió
  - apareció
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque literalmente puede ser «nació», en español aquí es más idiomático decir que el olor «se produjo», manteniendo la idea de emergencia desde el lugar.
- source_word: ተኃብረ ምስለ እልኩ ማያት
  english_pob_choice: it was joined with those waters
  chosen_spanish: se juntó con aquellas aguas
  alternatives_spanish:
  - se mezcló con aquellas aguas
  - se unió con aquellas aguas
  - se combinó con aquellas aguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite la idea de unión o mezcla. «Se juntó con» conserva la ambigüedad del pasaje y evita fijar de modo indebido si hubo mezcla física exacta o simple asociación.
- source_word: ቈላ
  english_pob_choice: valley
  chosen_spanish: valle
  alternatives_spanish:
  - hondonada
  - barranco
  - quebrada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En la topografía enóquica, «valle» es la equivalencia más clara y estable.
- source_word: እንተ መላእክት እለ አስሐቱ
  english_pob_choice: of the angels who led astray
  chosen_spanish: de los ángeles que extraviaron a otros
  alternatives_spanish:
  - de los ángeles que engañaron
  - de los ángeles que sedujeron al error
  - de los ángeles que desviaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El relativo activo presenta a los ángeles como agentes del extravío. «Extraviaron a otros» comunica la función causal sin imponer un objeto explícito no expresado en el verso.
- source_word: ትነድድ መትሕተ ይእቲ ምድር
  english_pob_choice: burns beneath that land
  chosen_spanish: arde debajo de aquella tierra
  alternatives_spanish:
  - arde bajo aquella tierra
  - está ardiendo debajo de aquella tierra
  - arde bajo ese suelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es de combustión subterránea continua. «Debajo de aquella tierra» conserva la espacialidad y el tono visionario.
theological_decisions:
- issue: Identidad de los ángeles castigados
  english_pob_reading: the angels who led astray
  chosen_spanish_reading: los ángeles que extraviaron a otros
  alternative_spanish_readings:
  - los ángeles que fueron extraviados
  - los ángeles del extravío
  - los ángeles que engañaron
  rationale: El verbo es activo y describe a estos seres como corruptores, no como víctimas pasivas. La redacción española mantiene esa agencia y el trasfondo enóquico de ángeles rebeldes que inducen al error.
  doctrine_reference: Mantener el sentido local del texto enóquico sin armonizarlo con formulaciones demonológicas posteriores.
- issue: Naturaleza de la unión con las aguas
  english_pob_reading: it was joined with those waters / it mixed with those waters
  chosen_spanish_reading: se juntó con aquellas aguas
  alternative_spanish_readings:
  - se mezcló con aquellas aguas
  - se unió con aquellas aguas
  rationale: El ge'ez permite una relación de asociación o mezcla. La traducción conserva la tensión semántica sin decidir indebidamente entre mezcla física y simple acompañamiento.
  doctrine_reference: Preservar la ambigüedad textual donde el original no obliga a una sola lectura.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, especialmente la corrección de la cláusula temporal con ሶበ y la exigencia de no omitir ወሀውኮሙ. La versión española integra explícitamente el tiempo («Y cuando todo esto sucedió») y traduce la idea de agitación («su agitación en aquel lugar»), además de mantener la coordinación entre el olor de azufre y las aguas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se evita «SEÑOR» como sustituto automático, pues no hay tetragrámaton en este versículo.
  - «Azufre» se mantiene como equivalente directo, con nota implícita de posible valor tradicional de «brimstone» en el trasfondo inglés.
  - La sintaxis española conserva la estructura encadenada del original sin volverla críptica.
  - Se prefirió «extraviaron a otros» para respetar la agencia activa del relativo sin sobreexplicitar el objeto del extravío.
