    reason: alternative_reading
  revision_rationale: Se corrige el aparato de notas para que [a] vuelva a señalar la alternativa léxica de «azufre/brimstone», se elimina el añadido interpretativo «a otros», y se suaviza «torrente» a «corriente» para acercarse mejor a «stream of fire» sin perder naturalidad española. El resto del versículo queda sustancialmente fiel al ge'ez y a la auditoría inglesa.
