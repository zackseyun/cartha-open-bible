  rationale: Se corrige la estructura para que las alternativas permanezcan en notas y no en el texto bíblico. También se reubica la nota [c] al lugar relevante y se aclara su función como explicación de una lectura previa corregida. El resto del versículo puede mantenerse, pues es fiel a la evidencia fuente y al razonamiento léxico documentado.
