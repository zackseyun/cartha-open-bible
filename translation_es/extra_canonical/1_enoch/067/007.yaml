translation:
  language: es
  text: Y por sus valles[c] fluyen ríos de fuego[a], donde serán juzgados aquellos ángeles que extraviaron a los que habitan sobre la tierra seca[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «corrientes de fuego». La imagen ge''ez presenta canales que fluyen.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «a los que habitan sobre la tierra seca». Puede entenderse simplemente como los habitantes humanos de la tierra, pero se conserva la formulación más concreta.'
    reason: lexical_alternative
  - marker: c
    text: Una lectura anterior del POB entendía erróneamente una referencia al calor; el ge'ez indica claramente «por sus valles».
    reason: previous_rendering
lexical_decisions:
- source_word: ቈላት
  english_pob_choice: valleys
  chosen_spanish: valles
  alternatives_spanish:
  - valles
  - cañadas
  - quebradas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto revisado por el POB confirma que ቈላት significa 'valleys'. En español, 'valles' es el equivalente directo y natural; 'cañadas' o 'quebradas' sonarían más regionales o menos precisas.
- source_word: ዚአሃ
  english_pob_choice: that / its
  chosen_spanish: sus
  alternatives_spanish:
  - su
  - de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El referente anafórico es el campo o la tierra mencionada antes; en español, 'sus valles' conserva la posesión del original sin necesidad de repetir el antecedente.
- source_word: አፍላገ እሳት
  english_pob_choice: rivers of fire
  chosen_spanish: ríos de fuego
  alternatives_spanish:
  - corrientes de fuego
  - canales de fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro apocalíptico queda mejor con 'ríos de fuego', como en la decisión inglesa del POB. 'Corrientes de fuego' se conserva en nota como alternativa válida, pero 'ríos' es más vivo y plenamente idiomático.
- source_word: ይመጽኡ
  english_pob_choice: flow / come forth
  chosen_spanish: fluyen
  alternatives_spanish:
  - salen
  - brotan
  - vienen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa corrigió hacia una imagen de flujo. 'Fluyen' comunica bien el movimiento continuo de los ríos sin perder el valor descriptivo del imperfectivo ge'ez.
- source_word: ይትኴነኑ
  english_pob_choice: will be judged
  chosen_spanish: serán juzgados
  alternatives_spanish:
  - serán condenados
  - serán juzgadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo judicial se traduce de manera formal con 'serán juzgados'. 'Condenados' estrecha demasiado el sentido; se deja el juicio abierto aunque el contexto lo cargue negativamente.
- source_word: እልኩቱ መላእክት
  english_pob_choice: those angels
  chosen_spanish: aquellos ángeles
  alternatives_spanish:
  - esos ángeles
  - esos mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto enóquico, 'ángeles' es el equivalente adecuado. 'Aquellos' preserva la distancia demostrativa del original mejor que un simple artículo.
- source_word: አስሐትዎሙ
  english_pob_choice: led astray
  chosen_spanish: extraviaron
  alternatives_spanish:
  - desviaron
  - engañaron
  - hicieron errar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Extraviaron'' comunica el sentido causativo de hacer caer en error. Mantiene una carga moral fuerte sin sonar excesivamente técnica o forzada en español.'
- source_word: ለእለ የኃድሩ ዲበ የብስ
  english_pob_choice: those who dwell upon the dry land
  chosen_spanish: a los que habitan sobre la tierra seca
  alternatives_spanish:
  - a los que habitan sobre la tierra
  - a los habitantes de la tierra
  - a los que viven en la tierra firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la concreción cosmológica de 'dry land' con 'tierra seca', como hizo el POB en inglés al retener el matiz concreto. 'Tierra firme' es posible, pero atenúa el eco de contraste con aguas/mar.
theological_decisions:
- issue: Identidad de los ángeles juzgados
  english_pob_reading: The verse refers locally to angels who misled human inhabitants of the earth/dry land and are now subject to divine judgment.
  chosen_spanish_reading: El versículo habla localmente de ángeles que extraviaron a los habitantes de la tierra seca y ahora serán juzgados por Dios.
  alternative_spanish_readings:
  - Se trata específicamente de los vigilantes de la tradición de Génesis 6.
  - Puede entenderse de manera más genérica como seres sobrenaturales vinculados con un engaño previo.
  rationale: La fuente ge'ez y la revisión inglesa no nombran explícitamente a los vigilantes; por eso la traducción española conserva la formulación local sin importar una identificación más específica en el texto principal.
  doctrine_reference: Preservar la tensión interpretativa y no resolverla más allá de la evidencia inmediata del pasaje.
translation_notes:
  revision_awareness: La versión anterior del contexto inglés fue corregida de una lectura errónea sobre 'heat' a la lectura correcta 'through its valleys'. Esta propuesta española sigue la revisión más reciente y evita reproducir la confusión corregida. También conserva el matiz imperfectivo con 'fluyen' y mantiene el juicio futuro con 'serán juzgados'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el verso no contiene el Nombre divino.
  - Se mantiene 'ángeles' por el contexto enóquico apocalíptico.
  - '''Tierra seca'' preserva el color concreto de ''dry land'' sin volverla una abstracción.'
  - El orden de la frase intenta respetar la estructura del original sin sonar calcado en español.
