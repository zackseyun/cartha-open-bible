translation:
  language: es
  text: 'Y oí a Miguel responder y decir: «Este juicio, por el cual los ángeles son juzgados, es un testimonio[a] contra los reyes y los poderosos, los que poseen la tierra seca[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «un testigo contra». El sustantivo ge''ez puede significar «testimonio» o «testigo» en sentido forense.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «la tierra seca». La expresión puede aludir a la tierra habitada bajo dominio humano, sin ampliar innecesariamente a «el mundo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሰማዕክዎ
  english_pob_choice: And I heard
  chosen_spanish: Y oí
  alternatives_spanish:
  - Y escuché
  - Y oí a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto narrativo con objeto pronominal se vierte de forma natural en español como una percepción pasada. «Oí» conserva la inmediatez narrativa sin sobrecargar con un pronombre redundante.
- source_word: ለሚካኤል
  english_pob_choice: Michael
  chosen_spanish: Miguel
  alternatives_spanish:
  - Mikael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español bíblico el nombre angélico tiene forma asentada «Miguel»; no es traducción conceptual sino forma propia del nombre.
- source_word: ያውሥእ
  english_pob_choice: answering
  chosen_spanish: respondiendo
  alternatives_spanish:
  - contestando
  - replicando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula «respondiendo y diciendo» preserva el registro elevado del par verbal sin sonar afectado en español.
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - condena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Juicio» conserva el alcance judicial amplio del término ge'ez, incluyendo proceso y resultado, sin cerrar prematuramente la ambigüedad esjatológica.
- source_word: ዛቲ
  english_pob_choice: this
  chosen_spanish: Este
  alternatives_spanish:
  - Este mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo apunta al juicio específico mencionado; «Este» es la forma más natural en español.
- source_word: እንተ ይትኴነኑ መላእክት
  english_pob_choice: by which the angels are judged
  chosen_spanish: por el cual los ángeles son juzgados
  alternatives_spanish:
  - en el cual los ángeles son juzgados
  - mediante el cual los ángeles son juzgados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relativa causal/instrumental se traduce con «por el cual», que mantiene la conexión con el sustantivo previo y el pasivo del original.
- source_word: ሰማዕተ
  english_pob_choice: a testimony against
  chosen_spanish: un testimonio contra
  alternatives_spanish:
  - un testigo contra
  - un testimonio en contra de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor forense del sustantivo se expresa de forma directa con «testimonio contra», que en español suena natural y mantiene la tensión entre prueba jurídica y declaración.
- source_word: ለነገሥት
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los reyes
  - los gobernantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia concreta a soberanos se conserva con «reyes»; evita diluir el título en un término más general.
- source_word: ወለዐዚዛን
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los grandes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español «los poderosos» reproduce bien la carga socio-política y apocalíptica de la expresión sin sonar arcaico.
- source_word: እለ ይእኅዝዋ ለየብስ
  english_pob_choice: those who possess the dry land
  chosen_spanish: los que poseen la tierra seca
  alternatives_spanish:
  - los que poseen la tierra firme
  - los que poseen la tierra
  - los que ocupan la tierra seca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta de የብስ como «tierra seca», siguiendo de cerca la decisión inglesa de no suavizarla a «tierra» o «mundo» sin necesidad contextual.
theological_decisions:
- issue: Sentido de la cláusula de testimonio respecto del juicio de los ángeles
  english_pob_reading: The angels' judgment serves as testimony against earthly rulers
  chosen_spanish_reading: El juicio de los ángeles es un testimonio contra los reyes y los poderosos
  alternative_spanish_readings:
  - Los ángeles son testigos contra los reyes y los poderosos
  - Este juicio es testimonio para los reyes y los poderosos
  rationale: La sintaxis del original permite vincular el sustantivo judicial con las personas mencionadas después de la relación dativa. Por eso se mantiene la lectura forense principal sin resolver la ambigüedad a favor de una apposición distinta.
  doctrine_reference: Preservar la ambigüedad lexical y sintáctica en textos apocalípticos, en lugar de armonizarla artificialmente.
translation_notes:
  revision_awareness: Se revisó el pasaje frente al texto ge'ez y el audit trail inglés; no se detectaron cambios necesarios respecto de la última revisión, y se conservó la lectura forense principal con la ambigüedad documental intacta.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; en este versículo no se aplica.
  - Se mantuvo el registro apocalíptico con participios coordinados («respondiendo y diciendo») para reflejar la fórmula narrativa del original.
  - Se prefirió «los poderosos» como equivalente estable de la clase de elites con fuerza política, en concordancia con el POB inglés.
