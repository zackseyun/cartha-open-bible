base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/067/012.yaml
  text: And I heard Michael answering and saying[a], “This judgment by which the angels are judged is a testimony against the kings and the mighty[b], those who possess the dry land.”
  footnotes:
  - marker: a
    text: Or 'a witness against the kings and the mighty.' The Ge'ez noun can mean either 'testimony' or 'witness' in a forensic sense.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the dry land.' The phrase may denote the inhabited land under human rule rather than the earth in a fully cosmic sense.
    reason: lexical_alternative
