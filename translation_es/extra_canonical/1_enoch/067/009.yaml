revisions:
- from: Y como muy grande es el ardor de sus cuerpos[a], así les sobreviene un cambio en espíritu para siempre y para siempre[c][b], porque delante del Señor de los Espíritus no hay quien pronuncie una palabra vana.
  to: Y como es muy grande la quemazón de sus cuerpos[a], así les sobreviene un cambio en espíritu para siempre[c][b], porque delante del Señor de los Espíritus no hay quien pronuncie una palabra vana.
  rationale: 'Se hicieron reparaciones menores para mejorar la fidelidad semántica y la naturalidad del español: ''quemazón'' refleja mejor el sentido físico de ''burning''; ''para siempre'' evita una repetición española torpe sin perder la duración indefinida; y las notas se ajustaron para reflejar con más precisión el historial de revisión inglesa, especialmente la corrección de ''contra ellos'' a ''palabra vana''.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:18:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en lo esencial el sentido del ge''ez y la revisión inglesa auditada: gran quema/ardor corporal, cambio que sobreviene en espíritu, duración indefinida, y la cláusula final corregida como ''palabra vana'' en vez de ''contra ellos''. Sin embargo, hay ajustes menores necesarios para mayor fidelidad y naturalidad en español: ''burning'' se vierte mejor como ''quemazón'' o ''quema'' que ''ardor'', y el título fijo ''Lord of Spirits'' conviene como ''Señor de los Espíritus'' aquí, sin implicar el nombre divino Yahvé, porque la fuente inmediata no contiene el Tetragrámaton sino el título ge''ez correspondiente.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero ''muy grande es el ardor'' suena algo calcada; ''es muy grande la quemazón'' fluye mejor y mantiene la imaginería física. También es preferible ''para siempre'' en vez de ''para siempre y para siempre'' para evitar una repetición poco idiomática en español cuando no es necesario conservarla tan literalmente; no obstante, dado el énfasis de la fuente, puede mantenerse con naturalidad mejor como ''por los siglos de los siglos'' o simplificarse. Aquí conviene una solución intermedia y clara: ''para siempre''.'
  glossary_alignment: No hay conflicto con la terminología central del proyecto salvo que el título enóquico debe mantenerse estable como 'Señor de los Espíritus'. El uso de 'espíritu' minúscula es correcto por contexto. La corrección auditada de በከ como 'vano' está bien preservada. Las notas b y c deben ajustarse para no presentar como alternativa vigente una lectura ya descartada sin dejar claro su carácter histórico.
  issues:
  - severity: medium
    issue: '''ardor'' debilita la concreción de ''burning'''
    rationale: La decisión inglesa prefirió 'burning' por la imagen concreta de tormento corporal. En español, 'ardor' puede sugerir sensación o calor abstracto; 'quemazón' preserva mejor la fisicidad sin sonar técnica.
  - severity: medium
    issue: '''para siempre y para siempre'' suena poco idiomático'
    rationale: Aunque intenta reflejar el énfasis de ለዓለመ ዓለም, en español resulta forzado. Una formulación más natural y litúrgicamente reconocible preserva mejor la solemnidad.
  - severity: low
    issue: La nota b conserva una alternativa ya superada de manera algo confusa
    rationale: La auditoría inglesa muestra que 'contra ellos' fue corregido por error léxico en በከ. La nota puede mencionar la lectura anterior como traducción antigua o alternativa histórica, pero no como opción equiprobable actual.
  - severity: low
    issue: La nota c no añade valor suficiente
    rationale: '''quien hable una palabra vana'' es una variación estilística mínima de la lectura principal, no una alternativa semántica relevante. Puede conservarse solo si se quiere reflejar el historial inglés, pero conviene aclararla como traducción previa.'
