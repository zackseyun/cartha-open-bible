    text: 'O: «quien hable una palabra vana».'
    reason: previous_rendering
  revision_rationale: 'Se hicieron reparaciones menores para mejorar la fidelidad semántica y la naturalidad del español: ''quemazón'' refleja mejor el sentido físico de ''burning''; ''para siempre'' evita una repetición española torpe sin perder la duración indefinida; y las notas se ajustaron para reflejar con más precisión el historial de revisión inglesa, especialmente la corrección de ''contra ellos'' a ''palabra vana''.'
