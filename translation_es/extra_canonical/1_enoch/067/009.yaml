base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/067/009.yaml
  text: And as the burning of their bodies is very great[a], so a change comes upon them in spirit forever and ever[c][b], because before the Lord of Spirits there is none who speaks a vain word.
  footnotes:
  - marker: a
    text: The Ethiopic line is difficult. The clause rendered 'so a change comes upon them forever and ever in spirit' may also be understood more literally as 'thus there is for them a change of spirit forever and ever.'
    reason: alternative_reading
  - marker: b
    text: Or 'there is none before the Lord of Spirits who can utter a matter against them.' The wording has a judicial or adversarial flavor.
    reason: lexical_alternative
  - marker: c
    text: Or 'who can speak a word against them'.
    reason: previous_rendering
