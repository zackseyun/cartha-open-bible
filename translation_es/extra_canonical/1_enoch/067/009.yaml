translation:
  language: es
  text: Y como es muy grande la quemazón de sus cuerpos[a], así les sobreviene un cambio en espíritu para siempre[c][b], porque delante del Señor de los Espíritus no hay quien pronuncie una palabra vana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El pasaje etiópico es difícil. La cláusula puede entenderse también más literalmente como: «así hay para ellos un cambio de espíritu para siempre».'
    reason: alternative_reading
  - marker: b
    text: Una traducción anterior entendía la frase como «delante del Señor de los Espíritus no hay quien pueda pronunciar una palabra contra ellos», pero la revisión léxica favorece «palabra vana».
    reason: lexical_alternative
  - marker: c
    text: 'O: «quien hable una palabra vana».'
    reason: previous_rendering
lexical_decisions:
- source_word: ውዕየ
  english_pob_choice: burning
  chosen_spanish: ardor
  alternatives_spanish:
  - quemadura
  - fuego
  - ardor ardiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El campo semántico apunta a calor/combustión. 'Ardor' conserva la imagen de intensificación ígnea sin sonar tan mecánico como 'quemadura' en español, y mantiene bien el contraste con el cambio 'en espíritu'.
- source_word: ሥጋሆሙ
  english_pob_choice: their bodies
  chosen_spanish: sus cuerpos
  alternatives_spanish:
  - su carne
  - su cuerpo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque literalmente es 'su carne', en este contexto judicial y apocalíptico 'sus cuerpos' comunica con claridad el referencial físico sin perder la fuerza corpórea.
- source_word: ተውላጠ
  english_pob_choice: a change comes upon
  chosen_spanish: les sobreviene un cambio
  alternatives_spanish:
  - son cambiados
  - se transforman
  - viene sobre ellos un cambio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Les sobreviene un cambio'' conserva el matiz de alteración que acontece sobre ellos, sin resolver demasiado la forma como transformación completa.'
- source_word: ለመንፈስ
  english_pob_choice: in spirit
  chosen_spanish: en espíritu
  alternatives_spanish:
  - para el espíritu
  - en el espíritu
  - respecto del espíritu
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''En espíritu'' mantiene la esfera o aspecto en el que ocurre el cambio y conserva el contraste con el ardor corporal.'
- source_word: ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: para siempre y para siempre
  alternatives_spanish:
  - por los siglos de los siglos
  - por siempre y para siempre
  - para siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la repetición enfática del idiomatismo de duración interminable; la repetición española refleja mejor la solemnidad que una sola fórmula convencional.
- source_word: እግዚአ መንፈሳት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de espíritus
  - el Señor de las espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título en forma reconocible y reverente. 'Espíritus' con artículo plural preserva el título fijo en español y evita neutralizarlo indebidamente.
- source_word: ዘይነግር ነገረ በከ
  english_pob_choice: who speaks a vain word
  chosen_spanish: quien pronuncie una palabra vana
  alternatives_spanish:
  - quien hable una palabra vana
  - quien diga una palabra vana
  - quien pronuncie una palabra inútil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Palabra vana'' refleja bien el valor de ''in vain/empty'' y mantiene la sobriedad del enunciado. ''Pronuncie'' preserva un registro formal y ligeramente judicial.'
theological_decisions:
- issue: Naturaleza del cambio en espíritu frente al ardor corporal
  english_pob_reading: The verse distinguishes great bodily burning from a change in spirit, preserving the tension without specifying full transformation.
  chosen_spanish_reading: La traducción separa explícitamente el ardor de los cuerpos y el cambio en espíritu, sin convertir el segundo en una metamorfosis total.
  alternative_spanish_readings:
  - y se transforman en espíritu para siempre y para siempre
  - y hay para ellos un cambio de espíritu para siempre y para siempre
  rationale: 'El ge''ez permite una lectura resultativa o una lectura más literal de ''cambio de espíritu''. En español conviene conservar la tensión: ocurre un cambio, pero el texto no obliga a explicarlo como transformación completa.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Valor adversarial/judicial del final de la cláusula
  english_pob_reading: before the Lord of Spirits there is none who speaks a vain word
  chosen_spanish_reading: delante del Señor de los Espíritus no hay quien pronuncie una palabra vana
  alternative_spanish_readings:
  - delante del Señor de los Espíritus no hay quien lo acuse
  - delante del Señor de los Espíritus no hay quien diga algo contra ellos
  - delante del Señor de los Espíritus no hay quien pueda hablar en vano
  rationale: Se sigue la revisión más reciente que corrige el sentido de በከ como 'vano/empty' y no 'contra'. El español conserva la ambigüedad entre valor vain/idle e implicación judicial sin añadir una acusación explícita.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail, que corrige la lectura previa de 'against them' y establece que በከ significa 'vain/empty'. También incorporé el ajuste de colocación de 'en espíritu' para que modifique naturalmente al 'cambio'.
  spanish_consistency_notes:
  - Conservé 'Señor de los Espíritus' como título fijo, coherente con la tradición auditada del POB.
  - Usé 'espíritu' en minúscula porque el contexto no exige el Espíritu Santo, sino la esfera o aspecto del cambio.
  - Mantuve una repetición enfática en 'para siempre y para siempre' para reflejar el idiomatismo durativo del original.
  - Evité 'Cristo' o terminología eclesiástica no respaldada por el texto.
  - Opté por 'palabra vana' en lugar de una acusación jurídica explícita, para respetar la última corrección textual.
