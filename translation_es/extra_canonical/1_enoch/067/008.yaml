base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/067/008.yaml
  text: And in those days those waters will be for the kings and the mighty and the exalted[a], and for those who dwell on the dry ground, for the healing of the body and for the punishment of the spirit; and their spirit will be full of pleasure, so that their bodies may be judged, because they have denied the Lord of Spirits, and they see their judgment every day[d][c][b], yet they do not believe in his name.
  footnotes:
  - marker: a
    text: The clause 'their spirit will be full of pleasure' is textually and contextually difficult. The Ge'ez appears to give a positive term such as 'pleasure' or 'delight,' though the surrounding context is judgment.
    reason: textual_variant
  - marker: b
    text: '''Body'' and ''spirit'' are kept as distinct terms here because the verse speaks of bodily healing and spiritual correction without collapsing them into a single metaphor.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and their spirit will be full of pleasure'.
    reason: previous_rendering
  - marker: d
    text: Or 'for the correction of the spirit'.
    reason: previous_rendering
