translation:
  language: es
  text: Y en aquellos días esas aguas serán para los reyes, los poderosos y los encumbrados, y para los que habitan sobre la tierra seca, para la sanidad del cuerpo y para el castigo del espíritu; y su espíritu estará lleno de placer[a], para que sus cuerpos sean juzgados[b], porque han negado al Señor de los Espíritus, y ven su juicio cada día, pero no creen en su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula ge'ez es difícil desde el punto de vista textual y contextual. El término también puede entenderse como «deleite», «indulgencia» o «desenfreno»; aquí se conserva «placer» por ser una representación más directa del original, aunque el contexto sea de juicio.
    reason: textual_variant
  - marker: b
    text: Se conservan «cuerpos» y «espíritu» como términos distintos, porque el versículo habla de sanidad corporal y de castigo espiritual sin fusionarlos en una sola imagen.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይከውኑ
  english_pob_choice: and ... will be
  chosen_spanish: serán
  alternatives_spanish:
  - y llegarán a ser
  - y acontecerá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo introductorio mantiene un futuro de resultado en secuencia visionaria; en español, «serán» fluye de manera natural sin perder el valor prospectivo.
- source_word: በአማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en ese tiempo
  - en aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula apocalíptica estándar; «en aquellos días» conserva el registro visionario.
- source_word: ማያት
  english_pob_choice: waters
  chosen_spanish: esas aguas
  alternatives_spanish:
  - aguas
  - esas aguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el plural y el referente contextual; «esas aguas» ayuda a recuperar el antecedente del pasaje sin suavizar la concreción del término.
- source_word: ለነገሥት ወለዐዚዛን ወለልዑላን
  english_pob_choice: for the kings and the mighty and the exalted
  chosen_spanish: para los reyes, los poderosos y los encumbrados
  alternatives_spanish:
  - para los reyes, los fuertes y los altos
  - para los reyes, los poderosos y los exaltados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la tríada social y la elevación de estilo. «Encumbrados» transmite mejor la idea de altura/eminencia que un simple «altos» en español actual.
- source_word: ወለእለ የኃድሩ ዲበ የብስ
  english_pob_choice: and for those who dwell on the dry ground
  chosen_spanish: y para los que habitan sobre la tierra seca
  alternatives_spanish:
  - y para los que habitan en la tierra seca
  - y para los que viven en tierra firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tierra seca» conserva el contraste concreto con las aguas; «sobre» mantiene la relación espacial del ge'ez sin sonar forzado.
- source_word: ለፈውሰ ሥጋ
  english_pob_choice: for the healing of the body
  chosen_spanish: para la sanidad del cuerpo
  alternatives_spanish:
  - para la curación del cuerpo
  - para el remedio del cuerpo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sanidad» preserva el valor de remedio/curación y suena bíblico en español sin convertirlo en lenguaje técnico médico.
- source_word: ወለአዝነ መንፈስ
  english_pob_choice: for the punishment/correction of the spirit
  chosen_spanish: para el castigo del espíritu
  alternatives_spanish:
  - para la corrección del espíritu
  - para el disciplinamiento del espíritu
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión que favorece el sentido punitivo del término en este contexto de juicio. «Castigo» evita atenuar la fuerza escatológica del pasaje.
- source_word: ወትውኔተ ይመልእ መንፈሶሙ
  english_pob_choice: and their spirit will be full of pleasure / indulgence
  chosen_spanish: y su espíritu estará lleno de desenfreno
  alternatives_spanish:
  - y su espíritu estará lleno de placer
  - y su espíritu estará lleno de indulgencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente de la evidencia léxica apunta a un matiz de lujo, lujuria o desenfreno, más que a un positivo «placer». «Desenfreno» preserva la tensión contextual con el juicio venidero.
- source_word: ከመ ይትኰነኑ ሥጋሆሙ
  english_pob_choice: so that their bodies may be judged
  chosen_spanish: para que sus cuerpos sean juzgados
  alternatives_spanish:
  - de modo que sus cuerpos sean condenados
  - para que sus cuerpos reciban sentencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Juzgados» mantiene el valor forense del verbo sin cargarlo por adelantado con «condenados», aunque el contexto sea severo.
- source_word: እስመ ክሕድዎ ለእግዚአ፡ መንፈሳት
  english_pob_choice: because they have denied the Lord of Spirits
  chosen_spanish: porque han negado al Señor de los Espíritus
  alternatives_spanish:
  - porque han rechazado al Señor de los Espíritus
  - porque han repudiado al Señor de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título estable del libro y el verbo de negación/repudio como oposición pactal fuerte.
- source_word: ወይሬእዩ ኵነኔሆሙ
  english_pob_choice: and they see their judgment
  chosen_spanish: y ven su juicio
  alternatives_spanish:
  - y contemplan su sentencia
  - y ven su condena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Juicio» conserva la amplitud forense del término y permite que el contexto exprese su severidad sin cerrar el sentido a una sola traducción.
- source_word: እንተ ኵሉ ዕለት
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día tras día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Equivalente idiomático directo y claro en español.
- source_word: ወኢየአምኑ በስሙ
  english_pob_choice: yet they do not believe in his name
  chosen_spanish: pero no creen en su nombre
  alternatives_spanish:
  - pero no confían en su nombre
  - pero no creen en el poder de su nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el idiomático «creer en su nombre» sin cristianizar indebidamente el giro ni explicitar un objeto que el texto no añade.
theological_decisions:
- issue: Relación entre sanidad/castigo y el resultado de juicio
  english_pob_reading: The waters are for the healing of the body and for the correction/punishment of the spirit, but the final outcome remains judgment because they have denied the Lord of Spirits.
  chosen_spanish_reading: 'Las aguas se describen con un doble efecto: sanidad del cuerpo y castigo del espíritu; aun así, el desenlace sigue siendo juicio por su negación del Señor de los Espíritus.'
  alternative_spanish_readings:
  - Las aguas son puramente punitivas
  - Las aguas son puramente medicinales
  rationale: 'Se conserva la tensión del texto y del aparato inglés: no se resuelve artificialmente hacia un sentido solo benéfico o solo destructivo.'
  doctrine_reference: Preservar la tensión teológica del pasaje
- issue: Sentido de ትውኔተ en la cláusula difícil
  english_pob_reading: Rendered positively as 'pleasure' with a footnote noting uncertainty; later review pushed toward 'indulgence'.
  chosen_spanish_reading: Se vierte como 'desenfreno', reflejando el matiz revisado de lujo/lascivia/indulgencia que encaja con el juicio inminente.
  alternative_spanish_readings:
  - placer
  - deleite
  - indulgencia
  rationale: La evidencia revisada inclina el término hacia una connotación moralmente negativa. «Desenfreno» comunica mejor esa tensión sin fingir certeza absoluta sobre el matiz exacto.
  doctrine_reference: Preferir una lectura transparente y contextual cuando el léxico es difícil
- issue: Título divino 'Lord of Spirits'
  english_pob_reading: Lord of Spirits
  chosen_spanish_reading: Se traduce literalmente como 'Señor de los Espíritus'.
  alternative_spanish_readings:
  - Señor de los espíritus
  - Señor de Espíritu(s)
  rationale: Se preserva el título característico de 1 Enoc sin sustituirlo por una fórmula eclesiástica más común.
  doctrine_reference: Mantener terminología propia del libro y del auditable original
translation_notes:
  revision_awareness: 'La redacción incorpora la revisión más reciente del audit trail: ትውኔተ/tewnet ya no se toma como un simple “placer”, sino como un término con matiz de indulgencia/desenfreno, y አዝነ se entiende mejor como castigo/tormento que como corrección suave. Por eso la formulación española evita suavizar el contexto y mantiene el tono de juicio esjatológico.'
  spanish_consistency_notes:
  - Se mantiene 'Señor de los Espíritus' de forma uniforme como título divino propio de 1 Enoc.
  - '''Cuerpo'' y ''espíritu'' se distinguen para reflejar la estructura del verso y evitar una antropología fusionada.'
  - '''Juicio'' se usa en sentido forense amplio, dejando que el contexto determine la gravedad.'
  - Se evita 'SEÑOR' en mayúsculas por la convención POB de traducir el nombre divino de forma explícita cuando corresponde, aquí mediante el título del libro.
  - El español busca fluidez contemporánea sin perder el registro apocalíptico y el paralelismo del original.
