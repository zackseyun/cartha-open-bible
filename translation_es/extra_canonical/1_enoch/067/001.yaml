  language: en
  yaml_path: translation/extra_canonical/1_enoch/067/001.yaml
  text: And in those days the word of the Lord came to me[a], and he said to me, “Noah, your portion has come up before me—a portion without blame[b], a portion of love and uprightness.”
  footnotes:
