translation:
  language: es
  text: 'Y en aquellos días vino a mí la palabra de Yahvé, y me dijo: «Noé, tu porción ha subido ante mí[a]: una porción sin culpa[b], una porción de amor y de rectitud».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «tu lote ha subido ante mí». El ge''ez conserva la imagen de un movimiento ascendente hacia la presencia divina.'
    reason: lexical_alternative
  - marker: b
    text: La expresión traducida «sin culpa» también puede entenderse como «irreprensible» o «sin reproche». Como esta sección se conserva efectivamente solo en ge'ez, conviene mantener cierta cautela respecto al matiz exacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወበእማንቱ መዋዕል
  english_pob_choice: And in those days
  chosen_spanish: Y en aquellos días
  alternatives_spanish:
  - Y durante aquellos días
  - Y en ese tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal apocalíptica se conserva con el registro elevado de «aquellos días», que reproduce mejor el tono ecnóquico que una expresión más plana.
- source_word: ቃለ እግዚአብሔር
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra del Señor
  - el mensaje de Yahvé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés POB dice «the Lord», el proyecto español usa «Yahvé» para el nombre divino. «Palabra» conserva el valor profético-revelatorio del giro sin volverlo genérico.
- source_word: ኀቤየ
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - ante mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con «vino» y «me dijo», el dativo personal natural en español es «a mí». Mantiene la dirección de la revelación sin añadir matices no requeridos.
- source_word: ኖኅ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se usa la forma española asentada del nombre bíblico, clara y reconocible para lectura eclesial amplia.
- source_word: ክፍልከ
  english_pob_choice: your portion
  chosen_spanish: tu porción
  alternatives_spanish:
  - tu parte
  - tu lote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Porción» reproduce el rango semántico de herencia, asignación y condición adjudicada. Es más fiel al peso teológico del término que «parte».
- source_word: ዐርገ ኀቤየ
  english_pob_choice: has come up before me
  chosen_spanish: ha subido ante mí
  alternatives_spanish:
  - ha ascendido ante mí
  - ha llegado hasta mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ha subido» conserva la imagen vertical del ge'ez; «ante mí» expresa la escena de comparecencia divina que el contexto exige. Juntos mantienen la tensión entre movimiento ascendente y presencia judicial.
- source_word: ዘአልቦቱ ሒስ
  english_pob_choice: without blame
  chosen_spanish: sin culpa
  alternatives_spanish:
  - sin reproche
  - sin mancha
  - sin culpa alguna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB inglesa preserva el matiz de ausencia de acusación o defecto. En español, «sin culpa» es natural y mantiene el tono judicial sin convertir la frase en una afirmación absoluta de impecabilidad.
- source_word: ፍቅር
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  - afecto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Amor» es la equivalencia directa y más transparente en español para el sustantivo, conservando la tríada descriptiva del pasaje.
- source_word: ወርትዕ
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - honradez
  - uprightness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Rectitud» en español comunica mejor la idea de estar moralmente derecho y evita cargar el verso con el peso técnico de «justicia», que podría inclinarlo hacia un registro más jurídico-doctrinal.
theological_decisions:
- issue: Cómo traducir el nombre divino en la fórmula revelatoria
  english_pob_reading: the word of the Lord
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - la palabra del Señor
  - la palabra del Dios
  rationale: El inglés POB conserva «Lord» por su convención, pero en español la norma del proyecto es usar «Yahvé» para יהוה. Esto hace visible la identidad del nombre divino sin perder el carácter profético de la fórmula.
  doctrine_reference: 'Project-level default: יהוה / YHWH -> Yahvé'
- issue: Cómo mantener la tensión de ክፍልከ y ዐርገ ኀቤየ
  english_pob_reading: your portion has come up before me
  chosen_spanish_reading: tu porción ha subido ante mí
  alternative_spanish_readings:
  - tu porción ha ascendido ante mí
  - tu suerte ha subido ante mí
  rationale: «Porción» evita reducir el término a una simple «suerte» y permite oír tanto herencia como asignación. «Ha subido ante mí» mantiene la imagen ascendente y la escena de comparecencia divina, sin resolver indebidamente si la imagen es espacial, judicial o cultual.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Cómo rendir ዘአልቦቱ ሒስ sin exagerar la afirmación sobre Noé
  english_pob_reading: without blame
  chosen_spanish_reading: sin culpa
  alternative_spanish_readings:
  - sin reproche
  - sin mancha
  - sin culpa alguna
  rationale: La frase elogia a Noé, pero no obliga a una doctrina de perfección sin pecado. «Sin culpa» comunica ausencia de acusación o defecto con sobriedad y preserva la cautela del texto base.
  doctrine_reference: Original-language primacy over translation tradition; preserve local sense.
translation_notes:
  revision_awareness: Se revisó el pasaje frente al texto ge'ez y al audit trail inglés. Se mantuvieron la fórmula temporal elevada, la imagen ascendente de la «porción» y la prudencia semántica de «sin culpa», sin suavizar la tensión entre comparecencia divina y valoración moral. No se aplicaron revisiones adicionales posteriores al pase más reciente del contexto.
  spanish_consistency_notes:
  - 'Se siguió la convención del proyecto para el nombre divino: «Yahvé», no «Señor».'
  - Se prefirió «porción» por su rango semántico y su capacidad de conservar la ambigüedad entre herencia, asignación y estado.
  - «Rectitud» se eligió para evitar sobrecargar el final con un término más técnico como «justicia».
  - La nota al pie [a] refleja la alternativa importante «lote», preservando la imagen ascendente documentada en el audit trail.
  - El registro general busca ser bíblico y solemne, pero con español natural y no calcado.
