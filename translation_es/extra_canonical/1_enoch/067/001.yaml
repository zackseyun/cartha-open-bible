    text: Or 'your lot has ascended before me.' The Ge'ez keeps the imagery of upward movement into the divine presence.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'without blame' may also be translated 'blameless' or 'without reproach.' Because the Parables are effectively preserved only in Ge'ez here, the nuance should be held with some caution.
