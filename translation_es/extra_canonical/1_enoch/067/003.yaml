base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/067/003.yaml
  text: And I will establish your offspring before me forever and ever[a], and I will make those who dwell with you fruitful. It shall not be barren upon the face of the dry ground[c][b], but it shall be blessed and multiplied on the dry ground in the name of the Lord.
  footnotes:
  - marker: a
    text: The clause 'They shall not counsel upon the face of the dry ground' is uncertain. The Ge'ez appears to negate a verb meaning 'to counsel' or 'to deliberate,' but the sense in context is difficult; some interpreters may understand a broader idea such as planning or acting on the earth.
    reason: textual_variant
  - marker: b
    text: '''Dry ground'' renders a literal expression. It may function here simply as ''land'' or ''earth,'' but the more concrete wording has been preserved.'
    reason: lexical_alternative
  - marker: c
    text: Or 'They shall not counsel upon the face of the dry ground, but they shall be blessed and multiplied'.
    reason: previous_rendering
