translation:
  language: es
  text: Y estableceré tu descendencia delante de mí por los siglos de los siglos, y haré fértiles a los que habitan contigo. No será estéril[a] sobre la faz de la tierra seca[b], sino que será bendecida y multiplicada en la tierra seca, en el nombre del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula es textual y sintácticamente difícil. El ge'ez transmitido parece negar un verbo con el sentido de 'aconsejar' o 'deliberar', pero la revisión más reciente favorece una lectura emendada con el sentido de 'ser estéril' por el contexto de bendición y multiplicación. El español sigue esa solución sin ocultar la incertidumbre subyacente.
    reason: textual_variant
  - marker: b
    text: '"Tierra seca" conserva la expresión literal del original ge''ez. Puede entenderse de manera más general como "tierra" o "suelo", pero se mantiene la concreción para respetar la imagen del texto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አጸንዖ
  english_pob_choice: I will establish
  chosen_spanish: afirmaré
  alternatives_spanish:
  - estableceré
  - haré firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa hacer firme o establecer. En español, "afirmaré" comunica bien la idea de dar solidez y permanencia sin sonar demasiado técnico. Mantiene el matiz de promesa duradera con un registro natural.
- source_word: ዘርእከ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus descendientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Descendencia" conserva el sentido colectivo de linaje y es más natural en español bíblico actual que "simiente". Evita reducir el término a individuos aislados.'
- source_word: በቅድሜየ
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Delante de mí" reproduce con claridad la relación espacial-relacional del original y funciona bien en español solemne. Mantiene el tono elevado sin sobreexplicar.'
- source_word: ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - por la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Esta fórmula intensiva de eternidad tiene un equivalente idiomático fuerte en español bíblico: "por los siglos de los siglos". Conserva la repetición enfática mejor que una paráfrasis simple.'
- source_word: እለ ያኃድሩ ምስሌከ
  english_pob_choice: those who dwell with you
  chosen_spanish: los que habitan contigo
  alternatives_spanish:
  - los que moran contigo
  - los que viven contigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Habitan contigo" expresa co-dwelling en un registro digno y claro. Se evita "moran" por posible arcaísmo y "viven" por menor solemnidad.'
- source_word: ኢይመክር
  english_pob_choice: It shall not be barren
  chosen_spanish: No será estéril
  alternatives_spanish:
  - No será barrida
  - No será infecunda
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el audit trail inglés conserva la tensión textual, la revisión más reciente identifica que el sentido del contexto apunta a esterilidad/barrenness. En español, "estéril" comunica con precisión ese resultado sin forzar una solución interpretativa adicional.
- source_word: ገጸ የብስ
  english_pob_choice: the face of the dry ground
  chosen_spanish: la faz de la tierra seca
  alternatives_spanish:
  - la superficie de la tierra seca
  - la faz del suelo seco
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Faz" preserva la imagen literal de "face" y es una equivalencia bíblica natural. "Tierra seca" evita suavizar el referente concreto de የብስ y mantiene la concreción del original.'
- source_word: ይትባረክ
  english_pob_choice: they shall be blessed
  chosen_spanish: será bendecida
  alternatives_spanish:
  - será bendito
  - recibirá bendición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal es singular en el contexto revisado y concuerda con "tu descendencia". En español, el femenino concuerda con "descendencia" como sustantivo colectivo implícitamente femenino o con la serie nominal inmediata; además mantiene la pasiva de bendición.
- source_word: ይትባዛሕ
  english_pob_choice: multiplied
  chosen_spanish: multiplicada
  alternatives_spanish:
  - aumentada
  - hecha mucha
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Multiplicada" sigue de cerca el valor de aumento numérico del verbo y encaja con el paralelismo de bendición y fecundidad.'
- source_word: በስሙ ለእግዚአ
  english_pob_choice: in the name of the Lord
  chosen_spanish: en el nombre del Señor
  alternatives_spanish:
  - por el nombre del Señor
  - por el nombre de Yahvé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el ge'ez usa el título de "Señor" sin nombre divino explícito. Por fidelidad al audit trail inglés y a la forma tradicional de la invocación, se mantiene "Señor"; no se sustituye por "Yahvé" porque el texto fuente inmediato no lo pide de manera directa.
theological_decisions:
- issue: Cómo reflejar la cláusula difícil sobre esterilidad/barrenness sin perder la tensión textual
  english_pob_reading: It shall not be barren upon the face of the dry ground, but it shall be blessed and multiplied
  chosen_spanish_reading: No será estéril sobre la faz de la tierra seca, sino que será bendecida y multiplicada
  alternative_spanish_readings:
  - No deliberará sobre la faz de la tierra seca, sino que será bendecida y multiplicada
  - No será estéril sobre la faz de la tierra seca, pero será bendecida y multiplicada
  rationale: La revisión más reciente del audit trail entiende que el contexto favorece una lectura de esterilidad, no de deliberación. En español se adopta esa solución, pero se conserva la estructura contrastiva del verso para no borrar la tensión heredada del estado textual.
  doctrine_reference: Preservar la revisión textualmente motivada sin inventar una glosa doctrinal.
- issue: Cómo tratar la referencia divina final
  english_pob_reading: in the name of the Lord
  chosen_spanish_reading: en el nombre del Señor
  alternative_spanish_readings:
  - en el nombre de Yahvé
  - por el nombre del Señor
  rationale: Aunque el proyecto prefiere "Yahvé" cuando el nombre divino está explícito, aquí la forma transmitida y el audit trail inglés usan "Lord/Señor" para እግዚአ. Se mantiene ese título para respetar la cadena documental y evitar una sustitución no atestiguada directamente por el flujo textual de esta edición.
  doctrine_reference: Mantener la equivalencia documental entre el testimonio ge'ez y la tradición de traducción auditable.
translation_notes:
  revision_awareness: He seguido el último estado revisado del audit trail, que corrige la antigua lectura de 'counsel' hacia 'barren/estéril'. Por eso el texto español usa un verbo de esterilidad en singular y evita la pluralización; también conserva la secuencia de bendición y multiplicación como el cierre del verso.
  spanish_consistency_notes:
  - Se mantiene "Señor" para እግዚአ en esta línea final, en coherencia con el audit trail inglés, aunque el proyecto base prefiera "Yahvé" cuando el nombre divino está explícito.
  - Se usa "descendencia" como sustantivo colectivo singular, por lo que los verbos posteriores van en singular femenino para concordar con el referente implícito.
  - Se prefiere "tierra seca" a "tierra" para conservar la concreción imagística del ge'ez y la decisión léxica inglesa sobre 'dry ground'.
