    reason: lexical_alternative
  revision_rationale: 'La revisión hace dos ajustes léxicos para acercar el español al expediente fuente: «ataron» recupera la imaginería concreta de sujeción preservada en el POB inglés actual, y «desafuero» refleja mejor la fuerza de ዓመፃ que «injusticia». Se conserva «mi abuelo Enoc», «occidente» y la cautela con el metal incierto. No hace falta adjudicación adicional porque son correcciones locales y bien sustentadas por el material dado.'
