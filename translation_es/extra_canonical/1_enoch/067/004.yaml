translation:
  language: es
  text: Y los ataron[a] a aquellos ángeles que habían mostrado desafuero en aquel valle ardiente, que mi abuelo Enoc me había mostrado antes en el occidente, junto a los montes de oro, plata, hierro, metal blando[b] y plomo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los encerraron» o «los recluyeron»; el verbo expresa aquí una acción de restricción o sujeción.
    reason: lexical_alternative
  - marker: b
    text: El término para este metal es incierto en este testimonio; el sentido general es el de un metal «blando» o refinado. Otras posibilidades son «estaño» o «electro».
    reason: lexical_alternative
lexical_decisions:
- source_word: የዐጽዎሙ
  english_pob_choice: they bound
  chosen_spanish: los encerraron
  alternatives_spanish:
  - los ataron
  - los aprisionaron
  - los confinaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico expresa la acción de cerrar/restringir con fuerza; el contexto de juicio favorece una imagen concreta de reclusión. En español, «encerraron» comunica bien esa idea sin forzar la imagen de atar, que sería una especificación no segura del original.
- source_word: እሙንቱ መላእክት
  english_pob_choice: those angels
  chosen_spanish: aquellos ángeles
  alternatives_spanish:
  - esos ángeles
  - esos mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico el referente es claramente celestial; «ángeles» es la equivalencia adecuada. «Aquellos» conserva la distancia deíctica del texto.
- source_word: እለ አርአይዋ ለዓመፃ
  english_pob_choice: who had shown lawlessness
  chosen_spanish: que habían mostrado injusticia
  alternatives_spanish:
  - que habían mostrado lawlessness
  - que habían revelado transgresión
  - que habían manifestado rebelión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El núcleo semántico es «mostrar/manifestar» y no solo «cometer». «Injusticia» traduce el valor moral y judicial de ዓመፃ en un español natural y bíblicamente inteligible; se evita «lawlessness» por ser no idiomático en español.
- source_word: ቈላ እንተ ትነድድ
  english_pob_choice: burning valley
  chosen_spanish: aquel valle ardiente
  alternatives_spanish:
  - ese valle que arde
  - aquel valle en llamas
  - ese barranco ardiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen topográfica es vívida y de juicio. «Valle ardiente» conserva el carácter descriptivo sin añadir una metáfora más fuerte que el etiópico.
- source_word: አርአየኒ ቀዳሚ
  english_pob_choice: had previously shown me
  chosen_spanish: me había mostrado antes
  alternatives_spanish:
  - me había mostrado previamente
  - me había mostrado primero
  - me había sido mostrado antes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto etiópico presenta una acción previa de Enoch sobre el hablante; «me había mostrado antes» conserva la anterioridad sin sobretraducir con matices narrativos no explícitos.
- source_word: በዓረብ
  english_pob_choice: in the west
  chosen_spanish: en el occidente
  alternatives_spanish:
  - en el oeste
  - hacia el occidente
  - hacia el oeste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el sentido direccional/geográfico es preferible al temporal «al atardecer». «Occidente» mantiene el registro elevado y la precisión espacial del pasaje.
- source_word: አድባረ ወርቅ ወብሩር ወሐፂን
  english_pob_choice: the mountains of gold and silver and iron
  chosen_spanish: los montes de oro, plata, hierro
  alternatives_spanish:
  - las montañas de oro, plata e hierro
  - los cerros de oro, plata e hierro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Montes» es plenamente idiomático en español literario y conserva la grandeza del cuadro visionario. La secuencia metálica se mantiene literal donde el etiópico es claro.
- source_word: ነጠብጣብ
  english_pob_choice: soft metal
  chosen_spanish: metal blando
  alternatives_spanish:
  - estaño
  - electro
  - metal refinado
  - metal maleable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El testimonio es incierto respecto al metal exacto. «Metal blando» preserva la prudencia del POB inglés y evita fijar indebidamente una identificación específica.
- source_word: ናእስ
  english_pob_choice: lead
  chosen_spanish: plomo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La equivalencia es estable en este listado de metales y funciona con naturalidad en español.
theological_decisions:
- issue: Naturaleza de la falta de los ángeles
  english_pob_reading: the angels are described as having shown or manifested lawlessness
  chosen_spanish_reading: los ángeles habían mostrado injusticia
  alternative_spanish_readings:
  - los ángeles habían cometido injusticia
  - los ángeles habían enseñado injusticia
  - los ángeles habían manifestado rebelión
  rationale: El etiópico enfatiza el acto de mostrar/manifestar ዓመፃ, no simplemente el hecho de delinquir. Se conserva ese matiz verbal. «Injusticia» ofrece una traducción moralmente clara en español sin borrar la tensión entre manifestar y cometer.
  doctrine_reference: Preservar la tensión lexical del original; primacía de la fuente frente a una armonización interpretativa.
- issue: Relación de Enoch con la visión
  english_pob_reading: my grandfather Enoch had previously shown me
  chosen_spanish_reading: mi abuelo Enoc me había mostrado antes
  alternative_spanish_readings:
  - mi abuelo Enoc me había mostrado previamente
  - Enoc me había mostrado antes
  rationale: El texto etiópico explicita «mi abuelo Enoc» como sujeto de la acción. Se mantiene el parentesco y la dirección correcta de la acción para respetar la narración de la sección de Noé.
  doctrine_reference: Fidelidad narrativa y gramatical al testimonio original, evitando invertir sujeto y objeto.
translation_notes:
  revision_awareness: Se tuvo en cuenta el historial de revisión más reciente y sus advertencias de error mayor. Se evitó seguir la lectura inglesa corregida de «will shut up» por no corresponder al texto base proporcionado para esta tarea; en cambio, se optó por una equivalencia española que conserve la restricción punitiva del verbo. También se corrigió explícitamente la relación sintáctica de Enoc como sujeto que muestra el valle al hablante.
  spanish_consistency_notes:
  - Se mantiene «Enoc» para ἄνωχ/ἔνοχ según uso estándar español del nombre propio.
  - Se prefirió «occidente» por coherencia con el marcador espacial y por su registro bíblico-literario.
  - Se conservó la lista metálica completa y el carácter incierto de ነጠብጣብ mediante una nota.
  - No se introdujo «Señor» ni otros términos de máscara, porque no aparecen en este versículo.
