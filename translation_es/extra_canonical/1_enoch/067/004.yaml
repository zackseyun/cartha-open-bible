  language: en
  yaml_path: translation/extra_canonical/1_enoch/067/004.yaml
  text: And they bound those angels who had shown lawlessness in that burning valley which my grandfather Enoch had previously shown me in the west[d][c][b][a], by the mountains of gold and silver and iron and soft metal and lead.
  footnotes:
