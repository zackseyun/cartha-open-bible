revisions:
- from: Y los encerraron[a] a aquellos ángeles que habían mostrado injusticia en aquel valle ardiente, que mi abuelo Enoc me había mostrado antes en el occidente, junto a los montes de oro, plata, hierro y metal blando[b], y plomo.
  to: Y los ataron[a] a aquellos ángeles que habían mostrado desafuero en aquel valle ardiente, que mi abuelo Enoc me había mostrado antes en el occidente, junto a los montes de oro, plata, hierro, metal blando[b] y plomo.
  rationale: 'La revisión hace dos ajustes léxicos para acercar el español al expediente fuente: «ataron» recupera la imaginería concreta de sujeción preservada en el POB inglés actual, y «desafuero» refleja mejor la fuerza de ዓመፃ que «injusticia». Se conserva «mi abuelo Enoc», «occidente» y la cautela con el metal incierto. No hace falta adjudicación adicional porque son correcciones locales y bien sustentadas por el material dado.'
  reviewer_model: gpt-5.4
