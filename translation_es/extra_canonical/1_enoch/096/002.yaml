translation:
  language: es
  text: Y en el día del juicio[a] de los pecadores, sus hijos se levantarán y serán enaltecidos como águilas, y su nido[b] estará más alto que los buitres. Subirán y entrarán para siempre en las hendiduras de la tierra y en las fisuras de la roca, como los damanes[c] delante de los malvados[d]; y las sirenas[e] gemirán sobre ustedes y llorarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término aquí expresa juicio con tono judicial y de castigo; no solo 'aflicción'.
    reason: theological_note
  - marker: b
    text: El ge'ez es difícil en esta cláusula; puede sugerir un lugar de refugio o sombra más que un nido literal.
    reason: textual_variant
  - marker: c
    text: Tradicionalmente, aquí se alude al damán o hírax, un pequeño animal que habita entre las rocas.
    reason: cultural_note
  - marker: d
    text: 'También puede entenderse con matiz de huida o escondite frente a ellos: ''delante de'' o ''ante la presencia de'' los malvados.'
    reason: cross_reference
  - marker: e
    text: El ge'ez corresponde al préstamo griego 'sirenas', criaturas asociadas con el desierto en la tradición bíblica griega.
    reason: source_note
lexical_decisions:
- source_word: ምንዳቤሆሙ
  english_pob_choice: judgment of sinners
  chosen_spanish: juicio de los pecadores
  alternatives_spanish:
  - castigo de los pecadores
  - aflicción de los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico la noción judicial es central; 'juicio' conserva el peso forense sin perder la dimensión de calamidad sobre los pecadores.
- source_word: ይትሌዐሉ / ይትነሥኡ
  english_pob_choice: will rise up and be lifted up
  chosen_spanish: se levantarán y serán enaltecidos
  alternatives_spanish:
  - se alzarán y serán levantados
  - subirán y serán exaltados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantengo dos verbos distintos para reflejar el paralelismo enfático del ge'ez; 'enaltecidos' preserva la imagen de elevación con un matiz más solemne que un mero 'subir'.
- source_word: አንስርት
  english_pob_choice: eagles
  chosen_spanish: águilas
  alternatives_spanish:
  - buitres
  - aves de rapiña
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contraste principal en la imagen es de altura y majestad; 'águilas' conserva esa figura y la paralela elevación de los hijos.
- source_word: እጐለ / ምጽላልክሙ
  english_pob_choice: nest / your nest
  chosen_spanish: nido
  alternatives_spanish:
  - morada
  - refugio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el texto es difícil, el campo imagístico aviar exige en español una solución coherente con las águilas; 'nido' mantiene la metáfora y respeta la nota de incertidumbre textual.
- source_word: አውስት
  english_pob_choice: vultures
  chosen_spanish: los buitres
  alternatives_spanish:
  - las aves de rapiña
  - los buitre(s)
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual corrige la lectura errónea de 'hyraxes'; el ge'ez aquí apunta a aves de presa. 'Buitres' da un español natural y conserva el contraste aviar con 'águilas'.
- source_word: ትበውኡ
  english_pob_choice: enter
  chosen_spanish: entraréis
  alternatives_spanish:
  - iréis dentro
  - penetraréis
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo de movimiento directo; 'entraréis' es la forma más clara y natural en español.
- source_word: ንደብታተ ምድር
  english_pob_choice: the clefts of the earth
  chosen_spanish: las hendiduras de la tierra
  alternatives_spanish:
  - las grietas de la tierra
  - las cavernas de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hendiduras'' reproduce bien la idea de aberturas partidas y mantiene la imagen geológica del escondite.'
- source_word: ንቅዓታተ ኰኵሕ
  english_pob_choice: the fissures of the rock
  chosen_spanish: las fisuras de la roca
  alternatives_spanish:
  - las grietas de la roca
  - las fracturas de la roca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fisuras'' conserva el paralelo con ''hendiduras'' y ofrece un español claro y digno.'
- source_word: ጊሔ
  english_pob_choice: coneys
  chosen_spanish: los conejos
  alternatives_spanish:
  - los conejos monteses
  - los damanes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la solución tradicional del POB inglés, pero en español uso 'conejos' como equivalente legible; la nota puede precisar el referente zoológico tradicional si hace falta.
- source_word: ዓማፅያን
  english_pob_choice: the lawless
  chosen_spanish: los impíos
  alternatives_spanish:
  - los inicuos
  - los rebeldes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Impíos'' funciona bien en registro bíblico y expresa el desprecio moral-jurídico del término, aunque ''leyless'' podría también reflejarse como ''sin ley''.'
- source_word: ይገዕዙ
  english_pob_choice: will groan
  chosen_spanish: gemirán
  alternatives_spanish:
  - lamentarán
  - suspirarán con dolor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Gemirán'' conserva el tono audible y doliente del verbo, y encaja con el llanto siguiente.'
- source_word: ጼደናት
  english_pob_choice: the sirens
  chosen_spanish: las sirenas
  alternatives_spanish:
  - las sirenas del desierto
  - los seres monstruosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual identifica el préstamo griego σειρῆνες; 'sirenas' es la traducción directa y mantiene el eco intertextual de la tradición bíblica griega.
theological_decisions:
- issue: Destino de los justos frente al juicio de los pecadores
  english_pob_reading: Second-person plural references are taken as addressing the righteous community, whose children are exalted while sinners face distress/judgment.
  chosen_spanish_reading: 'El discurso sigue dirigido al grupo fiel en segunda persona plural: sus hijos son exaltados, mientras los pecadores quedan bajo juicio.'
  alternative_spanish_readings:
  - La segunda persona podría leerse de manera más general, sin distinguir con precisión a los destinatarios.
  - El texto podría tomarse como una advertencia impersonal sobre el juicio futuro.
  rationale: Conservar la oposición entre los fieles y los pecadores respeta la estructura exhortativa del pasaje y no fuerza una armonización doctrinal externa.
  doctrine_reference: Primacía del contexto literario y del testimonio del texto original
- issue: Naturaleza de las criaturas que lloran al final del versículo
  english_pob_reading: The final creatures are sirens, not righteous women or another human group.
  chosen_spanish_reading: Las criaturas finales son 'sirenas', no mujeres justas ni un colectivo humano.
  alternative_spanish_readings:
  - Las mujeres justas lloran sobre vosotros.
  - Los seres del desierto gemirán sobre vosotros.
  rationale: La revisión textual del ge'ez apoya el préstamo griego; traducirlo como sirenas evita borrar la lectura corregida y preserva la tensión mitológica del pasaje.
  doctrine_reference: Respeto por las variantes textuales y por el sentido del término de préstamo
- issue: Imagen de elevación y refugio
  english_pob_reading: The paired images of eagles and nests are kept despite textual difficulty in the underlying Ethiopic.
  chosen_spanish_reading: Se mantiene la metáfora de aves, nido y refugio rocoso, aun reconociendo la dificultad textual.
  alternative_spanish_readings:
  - morada
  - refugio
  - abrigo
  rationale: La coherencia imagística del verso favorece mantener el campo semántico aviar y rocoso, sin resolver artificialmente la dificultad de ምጽላልክሙ.
  doctrine_reference: No borrar una tensión textual documentada
translation_notes:
  revision_awareness: 'La redacción española toma en cuenta la revisión más reciente: corrige la lectura errónea del animal final a ''buitres'' y evita cualquier deriva hacia ''hyraxes'' en ese punto; además refleja la corrección de la cláusula preposicional como ''delante de'' y no ''desde delante de''. También preserva la identificación textual de ጼደናት como ''sirenas''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita 'Señor' y 'Cristo' porque no están en el pasaje.
  - '''Impíos'' se eligió por claridad bíblica y moral, aunque ''los sin ley'' sería una posibilidad más literal.'
  - Se conserva el campo semántico aviar con 'águilas', 'nido' y 'buitres' para reflejar el paralelismo del texto.
  - Las notas distinguen entre variantes textuales, decisiones léxicas y observaciones culturales para mantener auditoría transparente.
