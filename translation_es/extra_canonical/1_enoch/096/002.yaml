revisions:
- from: Y en el día del juicio de los pecadores[a], vuestros hijos se levantarán y serán enaltecidos como águilas, y vuestro nido[b] estará más alto que los buitres. Subiréis y entraréis para siempre en las hendiduras de la tierra y en las fisuras de la roca, como los conejos[c] delante de los impíos[d]; y las sirenas[e] gemirán sobre vosotros y llorarán.
  to: Y en el día del juicio[a] de los pecadores, sus hijos se levantarán y serán enaltecidos como águilas, y su nido[b] estará más alto que los buitres. Subirán y entrarán para siempre en las hendiduras de la tierra y en las fisuras de la roca, como los damanes[c] delante de los malvados[d]; y las sirenas[e] gemirán sobre ustedes y llorarán.
  rationale: Se corrige el anclaje de la nota sobre 'juicio', se ajusta el registro al español neutral latinoamericano reemplazando 'vuestros/vosotros' por formas más generales, y se mejora la precisión léxica al traducir el animal roquero como 'damanes' con nota explicativa. También se suaviza 'impíos' a 'malvados' para acercarse al campo semántico de 'lawless' sin perder naturalidad.
  reviewer_model: gpt-5.4
