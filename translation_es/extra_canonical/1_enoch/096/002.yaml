    rationale: El POB inglés conserva 'coneys' por tradición, pero aclara en nota que se refiere al damán/hyrax. En español moderno 'conejo' remite al conejo común y distorsiona la imagen de un pequeño animal de roca. 'Damanes' o 'damanes roqueros' preserva mejor el sentido.
  - severity: low
