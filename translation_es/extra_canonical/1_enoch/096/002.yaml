base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/096/002.yaml
  text: And on the day of the judgment of sinners[a], your children will rise up and be lifted up like eagles, and your nest will be higher than the vultures. You will go up and enter the clefts of the earth and the fissures of the rock forever, like coneys before the lawless[f][e][d][c][b]; and the sirens will groan over you and weep.
  footnotes:
