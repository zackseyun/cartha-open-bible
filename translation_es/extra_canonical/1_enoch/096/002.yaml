    text: The animal terms traditionally rendered 'coney' likely refer to the hyrax or rock-badger.
    reason: cultural_note
  - marker: b
    text: The clause rendered 'your nest will be higher' is textually difficult in Ethiopic; the underlying noun may denote a sheltering place or shaded dwelling rather than a literal nest.
    reason: textual_variant
  - marker: c
    text: The final phrase may also be understood with 'hyraxes' again rather than 'coneys'; both refer to the same small rock-dwelling animal.
    reason: lexical_alternative
  - marker: d
    text: Or 'the hyraxes of the earth'.
    reason: previous_rendering
  - marker: e
    text: Or 'the righteous women'.
    reason: previous_rendering
  - marker: f
    text: Or 'before the lawless'.
    reason: previous_rendering
