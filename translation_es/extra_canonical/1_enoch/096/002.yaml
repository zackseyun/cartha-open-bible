    issue: La nota [a] está mal anclada en 'pecadores' en vez de en 'juicio'.
    rationale: La nota explica el valor semántico de ምንዳቤሆሙ como 'juicio' con matiz judicial/punitivo, no una observación sobre 'pecadores'. Los marcadores deben ir exactamente sobre la palabra o frase pertinente.
  - severity: medium
