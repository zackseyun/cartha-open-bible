  glossary_alignment: No hay términos del glosario principal especialmente conflictivos en este versículo. Las decisiones clave ('no teman', 'han sufrido', 'sanidad', 'luz resplandeciente', 'voz del descanso', 'desde el cielo') están dentro del rango permitido. La decisión teológica de conservar 'descanso' en vez de 'paz' sí debe mantenerse, y conviene reflejarla en la nota correspondiente.
