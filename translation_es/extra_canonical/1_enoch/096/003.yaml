translation:
  language: es
  text: Pero ustedes[a], no teman; los que han sufrido, porque la sanidad les vendrá, y una luz resplandeciente brillará para ustedes, y oirán la voz del descanso[b] desde el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tengan miedo, ustedes que están en aflicción»; la expresión ge''ez puede abarcar a los que sufren dolor o angustia de manera más amplia.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la voz/palabra del descanso». Se conserva una expresión cercana al ge'ez en vez de parafrasearla como «paz» o «consuelo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢትፍርሁ
  english_pob_choice: do not fear
  chosen_spanish: no teman
  alternatives_spanish:
  - no tengan miedo
  - no se asusten
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo negativo plural pide una exhortación directa y solemne. 'No teman' conserva la fuerza apocalíptica y es natural en español bíblico moderno.
- source_word: እለ ሐመምክሙ
  english_pob_choice: you who have suffered
  chosen_spanish: ustedes que han sufrido
  alternatives_spanish:
  - ustedes que están en dolor
  - ustedes que están en aflicción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase identifica a los destinatarios por la experiencia de padecimiento o aflicción. 'Han sufrido' mantiene esa amplitud sin reducirla solo al dolor físico.
- source_word: ፈውስ
  english_pob_choice: healing
  chosen_spanish: la sanidad
  alternatives_spanish:
  - la curación
  - el remedio
  - la recuperación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término remite a restauración o curación. 'Sanidad' es natural en español cristiano y conserva el valor de restauración, aunque 'curación' también sería posible.
- source_word: ይከውነክሙ
  english_pob_choice: will come to you
  chosen_spanish: vendrá para ustedes
  alternatives_spanish:
  - les llegará
  - estará para ustedes
  - ocurrirá para ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene un campo amplio de llegar, acontecer o venir a ser. 'Vendrá para ustedes' conserva la idea de una restauración prometida que se acerca a los destinatarios.
- source_word: ብርሃነ ብሩህ
  english_pob_choice: a bright light
  chosen_spanish: una luz resplandeciente
  alternatives_spanish:
  - una luz brillante
  - una luz radiante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La duplicación intensifica la imagen de luz. 'Resplandeciente' transmite esa cualidad intensificada con buen registro literario en español.
- source_word: ያበርህ ለክሙ
  english_pob_choice: will shine for you
  chosen_spanish: brillará para ustedes
  alternatives_spanish:
  - brillará sobre ustedes
  - les dará luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma causativa apunta a irradiar o dar luz a los destinatarios. 'Brillará para ustedes' mantiene la relación personal sin añadir una imagen no explicitada por el texto.
- source_word: ቃለ ዕረፍት
  english_pob_choice: the voice of rest
  chosen_spanish: la voz del descanso
  alternatives_spanish:
  - la palabra del descanso
  - la voz de reposo
  - la voz de paz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la imagen auditiva cercana al ge'ez, pero en español 'voz del descanso' es más natural que una calca rígida. 'Descanso' retiene el sentido básico de reposo sin resolverlo interpretativamente como 'paz'.
- source_word: እምሰማይ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  - del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Desde el cielo'' expresa bien el origen celestial de la voz. ''Desde'' conserva mejor la procedencia que un simple ''del''. '
theological_decisions:
- issue: Cómo verter ቃለ ዕረፍት sin suavizar su tensión semántica
  english_pob_reading: the voice of rest
  chosen_spanish_reading: la voz del descanso
  alternative_spanish_readings:
  - la voz de paz
  - la palabra de descanso
  - la voz de reposo
  rationale: La traducción evita sustituir 'descanso/reposo' por 'paz', porque el ge'ez conserva una imagen concreta de alivio y reposo. 'Voz del descanso' mantiene esa concreción y la dimensión sonora del pasaje.
  doctrine_reference: Preservar la tensión léxica original en vez de armonizarla con fórmulas devocionales posteriores.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no cambió la lectura base; este borrador sigue el estado estable del audit trail y conserva las decisiones léxicas clave: exhortación negativa plural, addressees en condición de sufrimiento, promesa de sanidad, luz intensificada y voz del descanso desde el cielo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece.
  - '''Sanidad'' se eligió por registro bíblico comprensible en español, sin perder la idea de restauración.'
  - '''Descanso'' se mantuvo para no convertir el término en ''paz'' o ''consuelo'', que serían más interpretativos.'
  - Se mantuvo el plural reverencial 'ustedes' para reflejar el plural original.
