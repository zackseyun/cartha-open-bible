translation:
  language: es
  text: Tengan esperanza[a], justos, porque los pecadores serán destruidos rápidamente de delante de ustedes[b], y la autoridad sobre ellos será suya[c], conforme a su deseo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tengan ánimo» o «sean esperanzados». El imperativo dirige la exhortación de manera directa a los justos.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «de delante de ustedes», conservando la imagen espacial de remoción desde la presencia de los justos.'
    reason: lexical_alternative
  - marker: c
    text: La expresión «autoridad sobre ellos» comunica un giro apocalíptico en el que los justos reciben dominio sobre quienes ahora son juzgados.
    reason: cultural_note
lexical_decisions:
- source_word: ተስፈዉ
  english_pob_choice: Hope
  chosen_spanish: Esperad
  alternatives_spanish:
  - Tened esperanza
  - Tened ánimo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo plural exhorta directamente a los justos. En español, «Esperad» conserva la fuerza exhortativa breve y elevada del original, mientras que «Tened esperanza» explicita más el objeto de la exhortación.
- source_word: ጻድቃን
  english_pob_choice: you righteous
  chosen_spanish: justos
  alternatives_spanish:
  - ustedes los justos
  - los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El vocativo plural se entiende mejor en español con un sustantivo adjetival directo. «Justos» mantiene el tono de llamada directa sin volver la frase pesada.
- source_word: ፍጡነ
  english_pob_choice: swiftly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - velozmente
  - pronto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio modifica la destrucción/juicio con sentido de prontitud. «Rápidamente» es natural en español y conserva la idea de urgencia sin introducir ambigüedad temporal excesiva.
- source_word: ይትሀጐሉ
  english_pob_choice: will be destroyed
  chosen_spanish: serán destruidos
  alternatives_spanish:
  - perecerán
  - serán aniquilados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo pasivo/reflexivo en contexto judicial-apocalíptico expresa ruina o destrucción. «Serán destruidos» preserva el acto de juicio sin especificar más de lo que el texto dice.
- source_word: ኃጥኣን
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los impíos
  - los pecadores culpables
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se trata de una clase definida de personas bajo juicio. «Los pecadores» es el equivalente más directo y transparente en español.
- source_word: እምቅድሜክሙ
  english_pob_choice: from before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de vuestra presencia
  - de ante ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen espacial concreta se conserva mejor con «de delante de ustedes». En español suena natural y mantiene el movimiento de remoción desde la proximidad de los justos.
- source_word: ሥልጣን
  english_pob_choice: authority
  chosen_spanish: la autoridad
  alternatives_spanish:
  - el dominio
  - el poder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término apunta a una potestad concedida, no solo a fuerza bruta. «La autoridad» reproduce bien ese matiz de gobierno o potestad delegada.
- source_word: ይከውን ለክሙ ዲቤሆሙ
  english_pob_choice: will be yours over them
  chosen_spanish: será de ustedes sobre ellos
  alternatives_spanish:
  - les pertenecerá sobre ellos
  - será dada a ustedes sobre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa posesión y ejercicio de la autoridad. «Será de ustedes sobre ellos» conserva la relación de pertenencia y supremacía sin añadir un verbo no presente en el original.
- source_word: በከመ ፈቀድክሙ
  english_pob_choice: according to your desire
  chosen_spanish: conforme a su deseo
  alternatives_spanish:
  - según su deseo
  - como ustedes deseen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica correspondencia con el querer de los justos. «Conforme a su deseo» mantiene el registro formal y no lo vuelve coloquial.
theological_decisions:
- issue: La relación futura de los justos con los pecadores juzgados
  english_pob_reading: The verse promises the righteous real authority over the judged sinners, not merely vindication in a general sense.
  chosen_spanish_reading: El verso promete a los justos una autoridad real sobre los pecadores ya juzgados, no solo consuelo moral o vindicación general.
  alternative_spanish_readings:
  - El verso podría suavizarse como simple triunfo moral de los justos.
  - Podría entenderse solo como vindicación pública, sin idea de gobierno efectivo.
  rationale: El sustantivo «autoridad» y la expresión «sobre ellos» obligan a conservar la inversión apocalíptica de estatus. En español conviene no diluir esa tensión ni decidir más de lo que el texto permite sobre la forma exacta de ese dominio.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene una lectura de imperativo directo, destrucción rápida de los pecadores, y autoridad concedida a los justos. No hubo revisiones aplicadas en el pass más reciente; la traducción española sigue esa lectura sin intensificar ni suavizar el juicio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - Se conserva «justos»/«pecadores» como clases apocalípticas definidas, en consonancia con la auditable English POB.
  - «Autoridad» se prefirió sobre «dominio» para evitar una sobrecarga interpretativa y respetar la decisión léxica documentada.
  - Se evitó traducir mecánicamente desde el inglés cuando el español pedía una formulación más natural, pero sin añadir contenido ausente del original.
