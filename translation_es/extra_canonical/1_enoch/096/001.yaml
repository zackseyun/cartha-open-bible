    issue: «Esperad» traduce ambiguamente ተስፈዉ
    rationale: En español común, «esperad» se entiende como ‘aguarden’. El original y el POB inglés exigen una exhortación a tener esperanza/confianza. La redacción actual puede falsear el sentido principal.
  - severity: medium
    issue: Ubicación poco natural de la nota [a]
    rationale: El marcador aparece al inicio absoluto del versículo en vez de anclarse a la palabra o frase explicada. El requisito pide que el marcador aparezca en el lugar relevante del texto.
  - severity: low
    issue: «será de ustedes» es menos natural que «será suya»
    rationale: Aunque fiel, la redacción actual suena más rígida de lo necesario. «La autoridad sobre ellos será suya» conserva posesión y buen estilo español.
