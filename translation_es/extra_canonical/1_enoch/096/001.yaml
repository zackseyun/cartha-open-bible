  source_alignment_summary: El borrador refleja bien el sentido general del ge'ez y del rastro POB en cuanto a exhortación a los justos, destrucción pronta de los pecadores, remoción espacial y concesión de autoridad sobre ellos. Sin embargo, la forma inicial «Esperad» en español normal significa más naturalmente ‘wait’, no ‘hope’, y por eso no preserva fielmente la decisión léxica principal del original. También la ancla de nota [a] antes de la palabra inicial es poco natural; debe ir sobre la expresión correspondiente.
  spanish_quality_summary: El español es mayormente claro y digno, pero «Esperad» suena arcaizante y semánticamente equívoco en español contemporáneo panhispánico. «Tengan esperanza» o «Tened esperanza» comunica mejor la exhortación. Además, «será de ustedes» es comprensible, pero «será suya» suena más natural y elegante en español general sin perder el sentido posesivo.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal global del proyecto. «Justos», «pecadores» y «autoridad» están bien alineados con las decisiones auditadas. La principal desalineación es léxica: ተስፈዉ debe verterse con idea de esperanza, no de espera.'
  issues:
