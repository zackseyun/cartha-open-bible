translation:
  language: es
  text: 'Y vi para ello otro curso y regulación: por esa regulación hace su curso de los meses[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Regulación» también puede traducirse como «ordenanza»; el término etiópico puede denotar un principio autoritativo de orden establecido.
    reason: lexical_alternative
  - marker: b
    text: El final del versículo se entiende como referencia a su curso de los meses; no se sigue la lectura antigua «vientos», porque el etiópico አውራኅ significa «meses» o «lunas».
    reason: textual_variant
lexical_decisions:
- source_word: ካልአ
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - un segundo
  - otro más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor adjetival simple de «otro» reproduce el sentido de un elemento adicional en la serie de ordenamientos cósmicos sin añadir matices ajenos.
- source_word: ምሕዋረ
  english_pob_choice: course
  chosen_spanish: curso
  alternatives_spanish:
  - circuito
  - trayectoria
  - recorrido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Curso» conserva el sentido técnico de movimiento ordenado o ciclo, y en español suena natural en un contexto cosmológico.
- source_word: ትእዛዘ
  english_pob_choice: regulation
  chosen_spanish: regulación
  alternatives_spanish:
  - ordenanza
  - orden
  - mandato
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La evidencia contextual apunta a un principio de ordenamiento fijo, no a un simple mandato verbal. «Regulación» mantiene ese valor normativo sin cargarlo de lenguaje eclesiástico.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula visionaria se expresa con el pretérito simple «vi», claro y fiel al registro narrativo de observación apocalíptica.
- source_word: ሎቱ
  english_pob_choice: for it
  chosen_spanish: para ella
  alternatives_spanish:
  - para ello
  - con respecto a ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El referente inmediato en este contexto lunar/cósmico puede entenderse como femenino en español por la concordancia implícita con la luna/órbita mencionada en el capítulo; «para ella» refleja la relación de pertenencia o destinación del curso sin forzar una literalidad extraña.
- source_word: በውእቱ ትእዛዝ
  english_pob_choice: by that regulation
  chosen_spanish: por esa regulación
  alternatives_spanish:
  - según esa regulación
  - mediante esa regulación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La preposición «por» comunica bien el valor instrumental/regulativo del original: el movimiento ocurre bajo el marco de esa norma establecida.'
- source_word: ይገብር
  english_pob_choice: it makes
  chosen_spanish: hace
  alternatives_spanish:
  - realiza
  - cumple
  - efectúa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hace su curso» conserva la fuerza activa del verbo sin sonar mecánico en español; evita reducirlo a un simple «va» que perdería el matiz de ejecución de una regla.
- source_word: ምሕዋሮ ዘአውራኅ
  english_pob_choice: its course of the months
  chosen_spanish: su curso de los meses
  alternatives_spanish:
  - su curso mensual
  - su recorrido de los meses
  - su curso de los ciclos lunares
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se adopta la revisión textual correcta: አውራኅ significa «meses»/«lunas», no «vientos». «Curso de los meses» preserva la expresión técnica y la referencia calendárica propia del capítulo.'
theological_decisions:
- issue: Naturaleza de la regulación cósmica
  english_pob_reading: The verse describes a divinely fixed regulation governing cosmic or meteorological movement, not a moral command.
  chosen_spanish_reading: El versículo describe una regulación fija dada al orden cósmico/calendárico, no un mandamiento moral.
  alternative_spanish_readings:
  - un mandato directo a un astro
  - una orden abstracta sin agencia
  rationale: 'Conviene conservar la tensión del original: se trata de una norma estructural para el movimiento de los astros o del calendario, no de un precepto ético. «Regulación» permite expresar esa ordenación sin teologizarla en exceso.'
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
- issue: Lectura revisada de አውራኅ
  english_pob_reading: Or 'its course, the course of the winds'.
  chosen_spanish_reading: No se conserva la lectura de «vientos»; se sigue la revisión que entiende «meses» o «lunas».
  alternative_spanish_readings:
  - su curso de los vientos
  - su trayectoria de los vientos
  rationale: 'La revisión textual es determinante: el etiópico አውራኅ es plural de «mes»/«luna», no «viento». En un capítulo sobre el calendario lunar, traducir «meses» es la opción responsable y evita perpetuar un error textual.'
  doctrine_reference: Textual criticism and source fidelity
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del auditor textual, que corrige la lectura anterior de «vientos» a «meses»/«lunas» para አውራኅ. También se respetó el cambio de orden que coloca «para ella» antes del predicado en la versión inglesa auditada, manteniendo una sintaxis española natural sin perder la secuencia del original.
  spanish_consistency_notes:
  - Se mantiene «regulación» como término técnico coherente con la serie de ordinanzas cósmicas del pasaje.
  - Se evita «SEÑOR» o lenguaje litúrgico ajeno; el versículo no contiene un teónimo ni un título mesiánico.
  - «curso de los meses» se usa de forma consistente con el contexto calendárico lunar de 1 Enoc 74.
  - La puntuación con dos puntos refleja la relación explicativa del segundo miembro respecto del primero.
