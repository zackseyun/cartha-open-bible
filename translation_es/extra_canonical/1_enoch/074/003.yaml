translation:
  language: es
  text: En quince partes completa toda su luz en el oriente[a], y en quince partes completa toda su oscuridad en el occidente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Otra posibilidad, siguiendo una lectura numérica errónea del OCR, sería «cincuenta y siete»; la revisión del texto favorece «quince».
    reason: textual_variant
lexical_decisions:
- source_word: በ፭*፷፯ እደ
  english_pob_choice: in fifteen parts
  chosen_spanish: en quince partes
  alternatives_spanish:
  - en cincuenta y siete días
  - después de cincuenta y siete días
  - dentro de cincuenta y siete días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión crítica indica que el OCR de ፷፯ es un error por ፲፭, por lo que el valor correcto es quince. እደ se entiende aquí como 'partes' o 'porciones' en el marco calendárico del Libro Astronómico, no como 'días'. En español, 'en quince partes' conserva el carácter técnico y esquemático del pasaje.
- source_word: ይፌጽም
  english_pob_choice: completes / is completed
  chosen_spanish: completa
  alternatives_spanish:
  - se completa
  - llega a su plenitud
  - se cumple
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La evidencia revisada favorece un verbo activo: ''it completes''. En español, ''completa'' preserva esa voz activa y la fórmula astronómica repetitiva sin introducir una paráfrasis interpretativa.'
- source_word: ኵሎ ብርሃኖ
  english_pob_choice: all its light
  chosen_spanish: todo su luz
  alternatives_spanish:
  - toda su luz
  - toda la luz de él
  - todo su resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sintagma expresa totalidad y posesión. En el texto de salida se opta por 'todo su luz' para mantener el referente luminar y la repetición del original, aunque 'toda su luz' sería más natural en español; la forma elegida intenta conservar la correspondencia formal con el patrón del verso.
- source_word: በሠርቅ
  english_pob_choice: in the east
  chosen_spanish: en el oriente
  alternatives_spanish:
  - en el este
  - hacia el oriente
  - al oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Oriente'' reproduce el valor locativo y resulta digno y bíblico en español, sin depender de una formulación más cotidiana como ''este''.'
- source_word: ኵሎ ጽልመተ
  english_pob_choice: all its darkness
  chosen_spanish: toda su oscuridad
  alternatives_spanish:
  - toda su tiniebla
  - la totalidad de su oscuridad
  - todo su oscurecimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Oscuridad'' conserva el paralelismo con ''luz'' y el campo semántico de contraste del texto. ''Tiniebla'' sería posible, pero ''oscuridad'' es más transparente y neutra en español actual.'
- source_word: በምዕራብ
  english_pob_choice: in the west
  chosen_spanish: en el occidente
  alternatives_spanish:
  - en el oeste
  - hacia el occidente
  - al occidente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la simetría con 'oriente' mediante 'occidente', que es claro, literario y acorde con el registro del pasaje.
theological_decisions:
- issue: Cómo representar la fórmula astronómica sin convertirla en explicación interpretativa
  english_pob_reading: Kept the literal-completive wording 'is completed' for both light and darkness
  chosen_spanish_reading: Se conserva el completivo literal 'completa' para luz y oscuridad
  alternative_spanish_readings:
  - alcanza su plenitud
  - termina su curso de luz / oscuridad
  - se manifiesta plenamente
  rationale: El Libro Astronómico usa lenguaje técnico y simétrico. Traducir con 'completa' evita suavizar o espiritualizar el dato y mantiene la tensión textual entre luz y oscuridad sin paráfrasis.
  doctrine_reference: Translation philosophy §optimal equivalence; preserve imagery and avoid paraphrase beyond the witness.
translation_notes:
  revision_awareness: 'Se incorporó la corrección crítica del OCR: el numeral debe leerse como quince, no como cincuenta y siete. También se ajustó la voz del verbo a un valor activo (''completa''), conforme a la adjudicación revisada. Se evitó el calco de ''días'' porque la unidad del original es ''partes/porciones''.'
  spanish_consistency_notes:
  - Se mantuvo la simetría oriente/occidente para reflejar la estructura paralela del verso.
  - Se preservó el registro sobrio y técnico propio de 1 Enoch 74 sin introducir lenguaje doctrinal ajeno.
  - La lectura 'oriente/occidente' es consistente con el estilo bíblico en español y evita modernizar en exceso el pasaje.
