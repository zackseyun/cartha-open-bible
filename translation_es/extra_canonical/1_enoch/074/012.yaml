review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la mayor parte del versículo: mantiene el sujeto doble (''el sol y las estrellas''), la idea de traer/introducir los años, la precisión calendárica, las ''estaciones'' como corrección importante del audit trail, la no desviación ni por un día y el total de 364 días. Sin embargo, no sigue fielmente la decisión final auditada del POB en ይዌልጡ ዓመተ, donde la revisión-pass reinstaló ''complete the year''. El español principal dice ''cambian el año'', y la nota c además privilegia esa lectura frente a ''cumplen el año'', lo cual contradice el estado final del expediente inglés.'
  spanish_quality_summary: 'El texto es legible y digno. ''Conforme a sus estaciones para siempre'' funciona, aunque ''según sus estaciones'' suena un poco más natural. El problema principal de calidad no es estilístico sino de coherencia editorial: la nota c convierte una discusión previa del audit trail en la lectura principal, dejando el español desalineado con la traducción POB final. También conviene ajustar la puntuación para reflejar mejor la estructura del enunciado.'
  glossary_alignment: 'No hay conflictos con la terminología global del proyecto. ''Justicia'' para በጽድቅ es aceptable y preserva la carga teológica. ''Estaciones'' para ምንባሪሆሙ también es defendible. La única desalineación relevante es lexical/editorial: ይዌልጡ debe seguir la decisión final del POB como ''cumplen/completan el año'', no ''cambian el año'' en el texto principal.'
  issues:
  - severity: high
    issue: El texto principal usa 'cambian el año' donde el POB inglés final dice 'complete the year'.
    rationale: Aunque hubo una revisión intermedia que propuso 'change the year', la revisión-pass posterior restableció 'complete the year' como decisión final auditada. La traducción española debe seguir ese estado final, no una etapa previa del expediente.
  - severity: medium
    issue: La nota c presenta 'cumplen el año' como alternativa a 'cambian el año' y describe la lectura de 'cambiar' como si siguiera vigente.
    rationale: Esto invierte la jerarquía editorial del audit trail. Si se conserva una nota, debe reflejar que 'cumplen/completan el año' es la lectura principal del POB y que 'cambian el año' pertenece a una discusión previa o alternativa.
  - severity: low
    issue: La puntuación puede mejorar para reflejar la estructura del original y del POB inglés final.
    rationale: Un punto y coma después de 'exactamente' ayuda a separar la afirmación inicial del desarrollo sobre sus estaciones y la falta de desviación.
