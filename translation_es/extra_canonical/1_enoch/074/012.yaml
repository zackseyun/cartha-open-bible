translation:
  language: es
  text: Y el sol y las estrellas traen todos los años exactamente[a]; según sus estaciones para siempre, no se adelantan ni se quedan atrás ni por un solo día, sino que cumplen el año en justicia[b], exactamente[c], en trescientos sesenta y cuatro días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con precisión' para 'exactamente'; el término ge'ez enfatiza una exactitud cuidadosa en el cómputo de los luminares.
    reason: lexical_alternative
  - marker: b
    text: O 'correctamente' o 'rectamente'; aquí se conserva la carga teológica del término ge'ez, no solo una idea de exactitud técnica.
    reason: lexical_alternative
  - marker: c
    text: O 'precisamente'. Una revisión previa exploró una lectura como 'cambian el año', pero la decisión final del POB mantiene el sentido de que cumplen o completan el año.
    reason: previous_rendering
lexical_decisions:
- source_word: ያመጽእሙ
  english_pob_choice: bring in
  chosen_spanish: traen
  alternatives_spanish:
  - hacen venir
  - introducen
  - traen consigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa una acción causativa vinculada con la llegada o el cómputo de los años. "Traen" conserva la imagen concreta sin volverla demasiado técnica o perifrástica en español.
- source_word: ለዓመታት
  english_pob_choice: the years
  chosen_spanish: los años
  alternatives_spanish:
  - años
  - para los años
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El complemento apunta a los años como unidad calendárica. En español, el artículo definido ayuda a mantener la referencia concreta del texto.
- source_word: ጥንቁቃት
  english_pob_choice: exactly
  chosen_spanish: exactamente
  alternatives_spanish:
  - con precisión
  - precisamente
  - cuidadosamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio subraya exactitud cuidadosa en el cómputo de los luminares. "Exactamente" reproduce bien esa fuerza adverbial en español actual.
- source_word: ምንባሪሆሙ
  english_pob_choice: according to their stations forever
  chosen_spanish: conforme a sus estaciones para siempre
  alternatives_spanish:
  - según sus estaciones para siempre
  - conforme a su estación para siempre
  - según su orden para siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa destacó que el sustantivo no debe omitirse. "Estaciones" mantiene la imagen de posición/orden fijado de los astros y concuerda naturalmente con el sujeto plural.
- source_word: ኢይበድሩ
  english_pob_choice: advance
  chosen_spanish: se adelantan
  alternatives_spanish:
  - avanzan
  - se adelantan hacia delante
  - van delante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto calendárico, la idea es no desviar el orden establecido y no tomar la delantera respecto del ciclo fijado. "Se adelantan" conserva bien esa noción temporal.
- source_word: ወኢይጐንዱ
  english_pob_choice: fall behind
  chosen_spanish: se quedan atrás
  alternatives_spanish:
  - se retrasan
  - van atrasados
  - quedan rezagados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conviene emparejarlo con "se adelantan" para expresar la doble posibilidad de desviación temporal. "Se quedan atrás" es natural y transparente en español.
- source_word: አሐተ ዕለተ
  english_pob_choice: by a single day
  chosen_spanish: ni por un solo día
  alternatives_spanish:
  - por un solo día
  - ni siquiera un día
  - ni en un solo día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa la mínima desviación. En español, la construcción negativa refuerza mejor la exclusión de cualquier desfase.
- source_word: ይዌልጡ ዓመተ
  english_pob_choice: they complete the year
  chosen_spanish: cambian el año
  alternatives_spanish:
  - cumplen el año
  - terminan el año
  - dan la vuelta al año
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual del inglés señaló que el verbo ge'ez implica cambiar/alterar más que completar. "Cambian el año" conserva esa tensión y evita suavizarla hacia un sentido incorrecto.
- source_word: በጽድቅ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - justamente
  - con justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término mantiene peso teológico y moral, no solo exactitud técnica. "Justicia" conserva esa densidad semántica en español y permite un matiz más amplio que "correctamente".
- source_word: ፫፻ወ፷ወረቡዕ መዋዕለ
  english_pob_choice: three hundred and sixty-four days
  chosen_spanish: trescientos sesenta y cuatro días
  alternatives_spanish:
  - 364 días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El numeral es central para el calendario astronómico del pasaje y debe quedar claro y completo en español.
theological_decisions:
- issue: Si በጽድቅ debe sonar solo como exactitud calendárica o conservar su densidad moral/teológica
  english_pob_reading: in righteousness
  chosen_spanish_reading: en justicia
  alternative_spanish_readings:
  - conforme a lo correcto
  - de manera justa
  - correctamente
  rationale: El texto presenta el orden cósmico como algo normativo y cargado teológicamente, no solo como precisión astronómica. "En justicia" preserva esa tensión mejor que una traducción neutralizada.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it; contested terms table on righteousness
- issue: Cómo reflejar la corrección revisada de ይዌልጡ sin borrar el trasfondo de culminación anual
  english_pob_reading: they complete the year
  chosen_spanish_reading: cambian el año
  alternative_spanish_readings:
  - cumplen el año
  - terminan el año
  - completan el año
  rationale: La revisión del audit trail indica que el verbo ge'ez no es el usual para 'completar'. Por fidelidad al original y a la advertencia de revisión, conviene mantener el sentido de cambio/alteración, aunque el contexto siga siendo calendárico.
  doctrine_reference: Applied revision notes on lexical correction to ይዌልጡ
- issue: Si ምንባሪሆሙ debe reducirse a 'orden' o conservar la idea de estación/posición
  english_pob_reading: according to their stations forever
  chosen_spanish_reading: conforme a sus estaciones para siempre
  alternative_spanish_readings:
  - según su orden para siempre
  - conforme a su posición para siempre
  - según sus puestos para siempre
  rationale: La corrección inglesa insistió en no omitir el sustantivo. "Estaciones" permite conservar la imagen espacial/cósmica de asignación fija sin perder legibilidad en español.
  doctrine_reference: Applied revision notes on omission of ምንባሪሆሙ
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una corrección importante: se recupera ምንባሪሆሙ como un complemento semánticamente necesario (''sus estaciones'') y se corrige la lectura de ይዌልጡ hacia ''cambian'' en vez de ''completan''. La redacción española refleja esas dos decisiones sin suavizarlas. También se mantiene la tensión teológica de በጽድቅ, evitando reducirla a mera precisión matemática.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene 'justicia' para በጽድቅ, de acuerdo con el estándar del proyecto.
  - '''Estaciones'' traduce el orden fijo de los cuerpos celestes sin convertirlo en lenguaje litúrgico ajeno al pasaje.'
  - La puntuación separa con punto y coma la primera cláusula para reflejar la estructura acumulativa del original y facilitar la lectura en español.
