revisions:
- from: Y el sol y las estrellas traen los años exactamente[a]; conforme a sus estaciones para siempre, no se adelantan ni se quedan atrás ni por un solo día, sino que cambian el año en justicia[b], exactamente, en trescientos sesenta y cuatro días[c].
  to: Y el sol y las estrellas traen todos los años exactamente[a]; según sus estaciones para siempre, no se adelantan ni se quedan atrás ni por un solo día, sino que cumplen el año en justicia[b], exactamente[c], en trescientos sesenta y cuatro días.
  rationale: Se revisa para alinearse con la decisión final del audit trail inglés, que mantiene 'complete the year' en vez de 'change the year'. También se ajusta la nota correspondiente para no privilegiar una etapa intermedia ya superada, y se pule levemente la puntuación y la naturalidad de 'según sus estaciones'.
