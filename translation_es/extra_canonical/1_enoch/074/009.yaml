translation:
  language: es
  text: 'Así vi sus movimientos: cómo la luna sale y el sol se pone en aquellos días.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ከመዝ
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Entonces
  lexicon: Dillmann
  rationale: Introduce la observación visionaria con una relación resumitiva e inferencial natural en español, sin cargar el texto de interpretación adicional.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - observé
  - contemplé
  lexicon: Dillmann
  rationale: Expresa la visión en primera persona de forma simple y fiel. En español, el pretérito 'vi' comunica la experiencia visionaria con claridad.
- source_word: ምግባሮሙ
  english_pob_choice: their workings
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus operaciones
  - sus cursos
  - sus movimientos
  lexicon: Dillmann
  rationale: El contexto astronómico apunta a procesos o acciones visibles de los cuerpos celestes. 'Obras' conserva la idea de actividades observables, aunque en español puede oírse más amplio; se prefiere por sobriedad y por cercanía al valor de 'workings' del POB inglés.
- source_word: በከመ
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - en qué forma
  lexicon: Dillmann
  rationale: Introduce de modo natural la explicación de lo visto, manteniendo el valor explicativo sin forzar una perífrasis más pesada.
- source_word: ይሠርቅ
  english_pob_choice: steal away
  chosen_spanish: sale
  alternatives_spanish:
  - se eleva
  - aparece
  - asoma
  lexicon: Dillmann
  rationale: La revisión del POB inglés identifica que este verbo en realidad corresponde al movimiento de los luminares y no a la idea de 'robarse'. En español, 'sale' es el verbo astronómico más natural y fiel para la luna.
- source_word: አውራኅ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - las lunas
  - el astro lunar
  lexicon: Dillmann
  rationale: La revisión textual indica que el término se refiere a la luna, no a 'paths'. Se mantiene el singular porque la cláusula española fluye mejor y refleja el uso lexical relevante en este versículo.
- source_word: የዓርብ
  english_pob_choice: sets
  chosen_spanish: se pone
  alternatives_spanish:
  - se oculta
  - se ocaso
  - declina
  lexicon: Dillmann
  rationale: Para el sol, 'se pone' es la expresión española más idiomática y exacta para el movimiento de ponerse al atardecer.
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: Dillmann
  rationale: Traducción directa del astro nombrado en el texto.
- source_word: በእማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - durante aquellos días
  lexicon: Dillmann
  rationale: Conserva la fórmula temporal apocalíptica en español corriente y digna.
translation_notes:
  revision_awareness: 'La versión española toma en cuenta la corrección mayor del audit trail: el pasaje no habla de ''paths steal away'', sino del ascenso de la luna y el ocaso del sol. Por eso se evita cualquier calco del error previo y se adopta un vocabulario astronómico directo y sobrio. También se normaliza la sintaxis para que la oración sea publicable en español sin perder el paralelismo original.'
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y bíblico-apocalíptico, pero sin arcaísmos innecesarios.
  - No se usa 'SEÑOR' ni terminología teológica ajena al verso, porque no aparece en el texto fuente.
  - '''la luna'' y ''el sol'' se presentan en singular por claridad y concordancia con la revisión textual auditada.'
