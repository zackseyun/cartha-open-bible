translation:
  language: es
  text: Y de nuevo[a], vuelve por siete días a la cuarta puerta[b][c], de la cual sale el sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto de 'vuelve' es implícito en el ge'ez y, por el contexto de este capítulo, se refiere al curso del sol en la secuencia de puertas.
    reason: lexical_alternative
  - marker: b
    text: El ge'ez también puede entenderse como 'por la cuarta puerta'; la imagen es el movimiento ordenado del sol hacia y desde las puertas celestiales.
    reason: lexical_alternative
  - marker: c
    text: 'O: ''por siete días vuelve a la cuarta puerta''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ካዕበ
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la continuidad repetitiva del movimiento del astro sin sonar mecánico; mantiene el valor de repetición que POB documenta para 'again'.
- source_word: ይገብእ
  english_pob_choice: it returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - retorna
  - regresa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail corrige la lectura previa 'enter' y establece el sentido de 'return/go back'. En español, 'vuelve' transmite ese movimiento cíclico con naturalidad y fidelidad.
- source_word: ሰቡዐ መዋዕለ
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - por siete jornadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la duración temporal indicada por el ge'ez. 'Por siete días' es idiomático en español y preserva la precisión calendárica.
- source_word: በራብዕት ኆኅት
  english_pob_choice: to the fourth gate
  chosen_spanish: a la cuarta puerta
  alternatives_spanish:
  - hasta la cuarta puerta
  - en la cuarta puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente del POB inglés prefirió 'to the fourth gate'. En español, 'a la cuarta puerta' refleja el movimiento hacia/at esa puerta sin sugerir indebidamente atravesarla.
- source_word: እንተ እምኔሃ
  english_pob_choice: from which
  chosen_spanish: de la cual
  alternatives_spanish:
  - de ella
  - desde la cual
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la referencia relativa a la puerta mencionada con claridad y concisión, reproduciendo el vínculo causal/local del original.
- source_word: ይወፅእ ፀሐይ
  english_pob_choice: the sun comes out
  chosen_spanish: sale el sol
  alternatives_spanish:
  - el sol sale
  - el sol emerge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sale el sol'' es la formulación española más natural para ''comes out'' y conserva la imaginería concreta del astro que emerge desde la puerta cósmica.'
translation_notes:
  revision_awareness: 'El inglés de trabajo pasó por una corrección importante: de ''it enters for seven days by'' a ''it returns for seven days to'', basada en el valor léxico de ይገብእ como ''return/go back'' y no ''enter''. La versión española sigue esa revisión y evita una lectura de ''entrar'' que el audit trail ya descartó.'
  spanish_consistency_notes:
  - Se mantiene 'puerta' para ኆኅት, coherente con el registro del pasaje y con la imaginería celestial del capítulo.
  - Se evitó 'Señor' u այլ terminología teológica no pertinente; el verso es cosmológico y no requiere ajustes doctrinales.
  - La coordinación temporal 'de nuevo... por siete días...' refleja la progresión repetitiva del texto sin añadir elementos no atestiguados.
