translation:
  language: es
  text: Durante siete días sale y gira, y vuelve otra vez por la puerta[a] de donde sale el sol; y completa toda su luz[c], y se aparta del sol[b], y entra durante ocho días por la sexta puerta de donde sale el sol[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término ge'ez para esta apertura celeste también puede traducirse como «portal» o «abertura». Se usa «puerta» porque refleja mejor la arquitectura cosmológica del pasaje; «ventana» fue una opción anterior, pero es menos precisa aquí.
    reason: lexical_alternative
  - marker: b
    text: El sujeto es implícito en este versículo. Por el contexto, probablemente se trata de la luna, pero el texto principal mantiene la referencia sin explicitarla.
    reason: alternative_reading
  - marker: c
    text: La frase «completa toda su luz» es técnica y puede aludir al momento en que el luminar alcanza la plenitud de su brillo antes de cambiar de curso.
    reason: cultural_note
  - marker: d
    text: 'Una traducción anterior del pasaje decía: «Durante siete días sale y gira, y vuelve otra vez por la ventana de donde sale el sol; y completa toda su luz, y se aparta del sol, y entra durante ocho días por la sexta ventana de donde sale el sol».'
    reason: previous_rendering
lexical_decisions:
- source_word: ይወፅእ
  english_pob_choice: it goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale hacia afuera
  - sale
  - se pone en movimiento y sale
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «sale» comunica de modo natural el movimiento de salida repetido en la secuencia astronómica. Mantiene la simplicidad del verbo básico sin añadir matices no presentes en el texto.
- source_word: ሰብዓተ መዋዕለ
  english_pob_choice: for seven days
  chosen_spanish: Durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica duración. «Durante siete días» es idiomático en español y conserva el valor temporal adverbial.
- source_word: የአውድ
  english_pob_choice: turns about
  chosen_spanish: gira
  alternatives_spanish:
  - da vueltas
  - gira en torno
  - hace un circuito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gira» conserva la imagen de movimiento circular de forma natural y breve. Evita sobreexplicar la mecánica del desplazamiento astronómico.
- source_word: ይገብእ ካዕበ
  english_pob_choice: it returns again
  chosen_spanish: vuelve otra vez
  alternatives_spanish:
  - regresa de nuevo
  - vuelve nuevamente
  - retorna otra vez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Vuelve otra vez» reproduce el retorno reiterado del original y mantiene la progresión narrativa de salida, giro y reingreso.
- source_word: በኆኅት
  english_pob_choice: through the gate
  chosen_spanish: por la puerta
  alternatives_spanish:
  - por la puerta
  - por la abertura
  - por el portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se adopta «puerta» porque el informe revisado del POB inglés y la adjudicación indican que ኆኅት designa una abertura celeste mejor rendida como «gate/door/portal» que como «window». En español, «puerta» es el equivalente más transparente y no arrastra la imagen equivocada de una ventana doméstica.
- source_word: ወይፌጽም ኵሎ ብርሃኖ
  english_pob_choice: and it completes all its light
  chosen_spanish: y completa toda su luz
  alternatives_spanish:
  - y completa toda su luz
  - y cumple toda su luz
  - y lleva a plenitud toda su luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es técnica y describe la plenitud del brillo del luminar. «Completa toda su luz» conserva la formulación procesual sin interpretarla excesivamente.
- source_word: ወይፀንን እምፀሐይ
  english_pob_choice: and it withdraws from the sun
  chosen_spanish: y se aparta del sol
  alternatives_spanish:
  - y se retira del sol
  - y se separa del sol
  - y se aparta del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se aparta de» expresa bien la separación o retirada sugerida por el verbo ge'ez, y suena natural en español. Además, evita introducir una explicación cosmológica adicional.
- source_word: ስሙነ መዋዕለ
  english_pob_choice: for eight days
  chosen_spanish: durante ocho días
  alternatives_spanish:
  - por ocho días
  - ocho días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Como en la primera cláusula, se traduce como duración explícita. «Durante ocho días» mantiene simetría con «Durante siete días».
- source_word: በሳድስት ኆኅት
  english_pob_choice: through the sixth gate
  chosen_spanish: por la sexta puerta
  alternatives_spanish:
  - por la sexta puerta
  - por la sexta abertura
  - por el sexto portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la misma terminología para la estructura celeste. «Sexta puerta» corresponde al ajuste textual y a la consistencia interna del pasaje.
theological_decisions:
- issue: Sujeto implícito del movimiento astronómico
  english_pob_reading: Render the verbs with the neutral pronoun 'it' rather than specifying 'the moon' in the main text.
  chosen_spanish_reading: Mantener el sujeto implícito mediante la tercera persona verbal, sin especificar «la luna» en el texto principal.
  alternative_spanish_readings:
  - especificar «la luna» en todo el verso
  - especificar otro luminar
  rationale: El contexto sugiere la luna, pero el verso no la nombra en esta cadena verbal. El español permite conservar esa implicitud con verbos en tercera persona, evitando resolver una ambigüedad que el texto no resuelve de manera explícita.
  doctrine_reference: Preservar la ambigüedad cuando el testimonio textual es realmente implícito; no sobredeterminar el referente.
- issue: Terminología de la apertura celeste ኆኅት
  english_pob_reading: gate / window variant, with the revised adjudication preferring gate
  chosen_spanish_reading: Usar «puerta» en lugar de «ventana»
  alternative_spanish_readings:
  - ventana
  - abertura
  - portal
  rationale: La revisión favorece «gate/door/portal» para respetar la arquitectura cosmológica enóquica. «Puerta» en español comunica mejor ese espacio de tránsito celeste y evita un anacronismo visual doméstico.
  doctrine_reference: Respetar la terminología técnica del texto fuente cuando la revisión y el léxico la sostienen.
translation_notes:
  revision_awareness: La traducción refleja la revisión adjudicada que corrige la terminología de ኆኅት a «puerta» y estandariza el verbo de salida como «sale». También elimina la conjunción inicial que no está presente en el ge'ez. Se ha conservado la ambigüedad del sujeto implícito, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «puerta» para ambos pasajes de apertura celeste dentro del versículo.
  - Se conserva el sujeto implícito por medio de verbos en tercera persona, sin insertar «la luna».
  - 'La secuencia verbal sigue el orden del original: salida, giro, retorno, plenitud de luz, separación del sol, entrada por la sexta puerta.'
  - Se evita «SEÑOR» o cualquier terminología no pertinente; el pasaje no involucra el nombre divino.
