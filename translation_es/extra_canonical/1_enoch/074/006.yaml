  yaml_path: translation/extra_canonical/1_enoch/074/006.yaml
  text: For seven days it goes out and turns about[a], and it returns again through the gate from which the sun goes out; and it completes all its light, and it withdraws from the sun[d][c][b], and it enters for eight days through the sixth gate from which the sun goes out.
  footnotes:
  - marker: a
    text: The Ge'ez term for the heavenly opening can also be rendered 'gate.' 'Window' is kept here because it fits the imagery of the luminaries' openings, but 'gate' remains a viable lexical alternative in this section.
    reason: lexical_alternative
  - marker: b
    text: The subject is implicit in this verse. In context it is likely the moon, but the main text keeps the pronoun 'it' rather than supplying the noun.
    reason: alternative_reading
  - marker: c
    text: The clause 'it completes all its light' is somewhat technical and may refer to the luminary reaching the full measure of its brightness before changing its course.
    reason: cultural_note
  - marker: d
    text: Or 'And for seven days it goes out and turns about, and it returns again through the window from which the sun comes out; and it completes all its light, and it withdraws from the sun, and it enters for eight days through the sixth window from which the sun comes out.'.
