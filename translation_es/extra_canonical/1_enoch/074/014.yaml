translation:
  language: es
  text: En cuanto a la luna sola[a][b][c], sus días ascienden a mil sesenta y dos días para tres años y para cinco años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula final, «y para cinco años», parece incompleta en el testimonio ge'ez proporcionado; puede faltar un número o más palabras en esta línea.
    reason: textual_variant
  - marker: b
    text: Se trata de un cálculo calendárico del Libro Astronómico; «sus días ascienden a» significa «su total de días suma» o «equivale a».
    reason: cultural_note
  - marker: c
    text: 'O: «Para el mes singular, sus días ascienden a mil sesenta y dos para tres años».'
    reason: previous_rendering
lexical_decisions:
- source_word: ለወርኅ
  english_pob_choice: for the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - el mes
  - para el mes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto calendárico y el cálculo de 354 días por año identifican aquí la luna, no un mes genérico. En español, 'luna' conserva mejor la referencia al ciclo lunar que sostiene la cuenta.
- source_word: ለባሕቲቱ
  english_pob_choice: alone
  chosen_spanish: sola
  alternatives_spanish:
  - solamente
  - por sí sola
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor de 'alone/by itself' se expresa de forma natural con 'sola' aplicado a 'la luna', manteniendo la idea de unidad individual sin añadir énfasis interpretativo.
- source_word: ይበጽሕ
  english_pob_choice: come to
  chosen_spanish: llegan a
  alternatives_spanish:
  - alcanzan
  - suman
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En una afirmación numérica, 'llegan a' comunica bien el sentido de total acumulado sin sonar mecánico en español.
- source_word: መዋዕሊሁ
  english_pob_choice: its days
  chosen_spanish: sus días
  alternatives_spanish:
  - su cantidad de días
  - el número de sus días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma posesiva es directa y clara en español. Se preserva la referencia al conteo de días del ciclo lunar.
- source_word: ፫ዓም
  english_pob_choice: three years
  chosen_spanish: tres años
  alternatives_spanish:
  - por tres años
  - durante tres años
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el valor temporal simple de la construcción numérica, ligado a la cuenta calendárica.
- source_word: ፲፻ ወ፷ወ፪ መዋዕለ
  english_pob_choice: one thousand and sixty-two days
  chosen_spanish: mil sesenta y dos días
  alternatives_spanish:
  - 1062 días
  lexicon: Ge'ez numeral system
  rationale: La secuencia numeral se vierte literalmente como 1000 + 60 + 2, y se conserva el sustantivo 'días' por la presencia de መዋዕለ.
- source_word: ወለ፭ ዓም
  english_pob_choice: and for five years
  chosen_spanish: y para cinco años
  alternatives_spanish:
  - y en cinco años
  - y durante cinco años
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la cláusula final tal como está atestiguada, sin completar con conjeturas. 'Para' reproduce el enlace relacional del ge'ez de modo sobrio y transparente.
theological_decisions:
- issue: Cláusula final aparentemente incompleta o truncada
  english_pob_reading: Translate the extant Ge'ez wording conservatively and leave the five-year clause incomplete in sense.
  chosen_spanish_reading: Traducir el testimonio ge'ez tal como está, sin intentar resolver la posible laguna del final.
  alternative_spanish_readings:
  - Suplir una cifra o total a partir de otras ediciones
  - Suavizar la línea como afirmación calendárica general
  rationale: El pasaje pertenece a un cálculo astronómico técnico y la evidencia conservada parece truncada en el cierre. La transparencia textual exige no fabricar el contenido perdido en la línea principal.
  doctrine_reference: Priorizar la honestidad textual sobre la apariencia de completitud; mantener la tensión documental cuando el testimonio es incierto.
translation_notes:
  revision_awareness: El contexto inglés auditado corrigió una lectura previa que entendía ለወርኅ como «mes»; la revisión reconoció que el cálculo de 354 días por año identifica aquí la luna lunar. También se restauró la cláusula final «y para cinco años», que no debía truncarse ni duplicarse. La versión española sigue esa revisión y conserva la cautela sobre la posible laguna final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente de κύριος.
  - Se usa «luna» por exigencia contextual del cálculo astronómico, no «mes», siguiendo la revisión auditada.
  - «Sus días llegan a» refleja una suma total, no un movimiento físico literal.
  - Se conserva la terminación abierta de la cláusula final sin completar el posible hueco textual.
