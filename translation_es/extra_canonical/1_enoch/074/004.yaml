translation:
  language: es
  text: Y en ciertos meses cambia sus puestas[a], y en ciertos meses recorre su curso, uno por uno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El geʽez es difícil aquí, pero la revisión fuente-guiada entiende este término como las «puestas» del astro, no como una referencia a «occidente» ni como posiciones en sentido general.
    reason: textual_variant
  - marker: b
    text: 'También puede entenderse: «recorre su curso, uno a uno», conservando el valor distributivo de la repetición final.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በአውራኅ እመራት
  english_pob_choice: in certain months
  chosen_spanish: en ciertos meses
  alternatives_spanish:
  - en algunos meses
  - en meses determinados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión confirmó que አውራኅ significa aquí “meses” y እመራት expresa selección o determinación; por eso se traduce con una expresión natural y precisa en español, sin introducir una relación espacial inexistente.
- source_word: ይዌልጥ
  english_pob_choice: it changes
  chosen_spanish: cambia
  alternatives_spanish:
  - altera
  - modifica
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo implica cambio o alteración. “Cambia” es breve, fiel y suficientemente general para el movimiento astronómico del contexto.
- source_word: ምዕራባተ
  english_pob_choice: its settings
  chosen_spanish: sus posiciones
  alternatives_spanish:
  - sus puestas
  - sus ocasos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La nota inglesa entiende el término como los ‘settings’ del astro, es decir, sus posiciones de puesta o alineación. “Posiciones” preserva el sentido sin forzar un tecnicismo demasiado interpretativo como “ocasos”.
- source_word: የሐውር
  english_pob_choice: it travels
  chosen_spanish: recorre
  alternatives_spanish:
  - viaja
  - prosigue
  - se desplaza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cósmico, el verbo expresa un recorrido ordenado. “Recorre” transmite con claridad la idea de seguir una ruta fija.
- source_word: ምሕዋሪሁ
  english_pob_choice: its course
  chosen_spanish: su curso
  alternatives_spanish:
  - su circuito
  - su trayectoria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La elección inglesa apunta a un recorrido regular y astronómico. “Curso” es el equivalente español más natural y mantiene la idea de trayectoria estable.
- source_word: አሐዱ፡ አሐዱ
  english_pob_choice: one by one
  chosen_spanish: uno por uno
  alternatives_spanish:
  - cada uno
  - sucesivamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición distributiva debe conservarse. “Uno por uno” reproduce el valor secuencial de la duplicación y suena idiomático en español.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un error mayor del borrador inglés: አውራኅ no significa “paths” sino “months”, ይዌልጥ no significa “goes down” sino “changes”, y ምዕራባተ no es “westward” sino el objeto del cambio, entendido como “settings”. La versión española sigue esa corrección y mantiene el carácter astronómico del verso.'
  spanish_consistency_notes:
  - Se mantiene “Y” inicial para corresponder al encadenamiento narrativo del pasaje.
  - Se evita “SEÑOR” o vocabulario cristológico porque el verso no contiene léxico teológico directo.
  - “Curso” y “posiciones” conservan el marco astronómico del Libro Astronómico sin volverlo demasiado técnico.
  - La repetición distributiva final se traduce de forma idiomática pero visible, para no perder la estructura del original.
