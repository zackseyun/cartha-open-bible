base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/074/004.yaml
  text: And in certain months it changes its settings[a], and in certain months it travels its course[d][c][b], one by one.
  footnotes:
  - marker: a
    text: 'The Ethiopic wording is difficult: the phrase rendered ''by the paths of the east'' appears twice, and the final repetition ''one, one'' likely has a distributive sense (''one by one'' / ''each separately'').'
    reason: textual_variant
  - marker: b
    text: '''Goes down westward'' could also be rendered ''descends to the west'' or, more interpretively, ''sets in the west.'''
    reason: lexical_alternative
  - marker: c
    text: The line belongs to the Astronomical Book's description of the ordered tracks of the luminaries; 'course' here refers to a fixed celestial route, not merely general movement.
    reason: cultural_note
  - marker: d
    text: Or 'And by the paths of the east it goes down westward, and by the paths of the east it travels, each one by one, in its course.'.
    reason: previous_rendering
