translation:
  language: es
  text: Y se añaden cinco días[a], y para el sol el total llega a treinta días; y todos los días que le corresponden a uno de aquellos cinco años, al completarse[b][c], suman trescientos sesenta y cuatro días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez es textualmente difícil en este punto; el contexto del Libro Astronómico indica un cómputo calendárico, no una simple suma aritmética aislada.
    reason: textual_variant
  - marker: b
    text: 'O: «cuando se completan». El giro intenta reflejar la idea de alcanzar el total por la completitud del ciclo.'
    reason: alternative_reading
  - marker: c
    text: Compárese el esquema calendárico más amplio del Libro Astronómico, donde el año se organiza en 364 días y no según un cómputo lunar.
    reason: cross_reference
lexical_decisions:
- source_word: ይትዌሰክ
  english_pob_choice: are added
  chosen_spanish: son añadidos
  alternatives_spanish:
  - se añaden
  - son agregados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido aditivo/pasivo se conserva con una pasiva natural en español. 'Son añadidos' mantiene el valor contable y la formalidad del contexto calendárico.
- source_word: ኃምስቱ ዓመት
  english_pob_choice: the five days
  chosen_spanish: cinco días
  alternatives_spanish:
  - cinco años
  - los cinco días epagoménicos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el ge'ez transmite literalmente 'cinco años', el contexto astronómico y la suma final de 364 días requieren entender aquí una referencia a días suplementarios. En español se opta por la lectura contextual más fiel al sentido del pasaje, sin perder la tensión textual registrada en el aparato inglés.
- source_word: ለፀሐይ
  english_pob_choice: for the sun
  chosen_spanish: para el sol
  alternatives_spanish:
  - con respecto al sol
  - al sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Para el sol'' reproduce la relación de cómputo astronómico con suficiente literalidad y claridad en español.'
- source_word: ሠላሳ መዋዕለ
  english_pob_choice: thirty days
  chosen_spanish: treinta días
  alternatives_spanish:
  - treinta jornadas
  - treinta día(s)
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión numérica es directa y calendárica; 'treinta días' es la forma natural en español.
- source_word: ኵሎሙ መዋዕለ ይበጽሕዎ ለዓመት
  english_pob_choice: all the days that accrue to it for one of those five years
  chosen_spanish: todos los días que se le añaden para uno de aquellos cinco años
  alternatives_spanish:
  - todos los días que le corresponden en uno de aquellos cinco años
  - todos los días que alcanzan para uno de aquellos cinco años
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el verbo de suma/alcance ('se le añaden') y la referencia al ciclo de cinco años, siguiendo el ajuste crítico documentado en el aparato inglés. La formulación busca ser transparente sin suavizar la estructura astronómica.
- source_word: ፭እምእሉኩ ፭ዓመት ተመሊኦሙ
  english_pob_choice: when completed
  chosen_spanish: cuando se completan
  alternatives_spanish:
  - al completarse
  - una vez completados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro temporal explica cómo se alcanza el total anual; 'cuando se completan' conserva la relación causal/temporal sin sobreinterpretar la frase.
- source_word: ፻፷ወ፰ወረቡዐ መዋዕለ
  english_pob_choice: three hundred and sixty-four days
  chosen_spanish: trescientos sesenta y cuatro días
  alternatives_spanish:
  - 364 días
  - trescientos y sesenta y cuatro días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El número explícito es central para el calendario solar del libro astronómico; se mantiene en español pleno y solemne.
theological_decisions:
- issue: Lectura de la unidad temporal en ኃምስቱ ዓመት
  english_pob_reading: The verse refers to five supplementary calendar days completing a 364-day solar year.
  chosen_spanish_reading: 'La versión española sigue la función calendárica del pasaje: cinco días suplementarios dentro del esquema solar de 364 días.'
  alternative_spanish_readings:
  - cinco años literales
  - cinco días epagoménicos
  rationale: El texto ge'ez presenta una tensión textual real entre la forma literal y el contexto. En español se privilegia la lectura contextual confirmada por la suma final y por el marco astronómico del libro, sin eliminar la nota crítica sobre la dificultad del original.
  doctrine_reference: Preservar la tensión textual cuando existe; preferir el sentido contextual claro en pasajes calendáricos y cosmológicos.
translation_notes:
  revision_awareness: 'El contexto auditado muestra una corrección importante en la tradición inglesa: se rechazó la lectura anterior de ''five years'' y, tras revisión, se volvió a ''five days'' por coherencia contextual con la aritmética de 364 días. Sin embargo, el ge''ez fuente todavía presenta una tensión formal en ኃምስቱ ዓመት; por ello la traducción española adopta la solución contextual ''cinco días'' y la anota en las decisiones léxicas y teológicas, manteniendo visible la dificultad textual en la nota a pie.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece.
  - '''Días'' se mantiene como unidad temporal coherente con la suma final de 364.'
  - Se evita 'Cristo' y cualquier terminología cristológica no presente en el pasaje.
  - La puntuación intenta seguir un ritmo coordinado claro, propio del estilo apocalíptico y astronómico.
