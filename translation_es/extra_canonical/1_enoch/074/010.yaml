revisions:
- from: Y cinco días son añadidos[a], y para el sol llega a treinta días; y todos los días que se le añaden para uno de aquellos cinco años, cuando se completan[b][c], suman trescientos sesenta y cuatro días.
  to: Y se añaden cinco días[a], y para el sol el total llega a treinta días; y todos los días que le corresponden a uno de aquellos cinco años, al completarse[b][c], suman trescientos sesenta y cuatro días.
  rationale: Se hicieron ajustes de estilo y claridad, no de fondo. 'Se añaden cinco días' suena más natural que 'cinco días son añadidos'; 'para el sol el total llega a treinta días' expresa mejor la idea de cómputo astronómico; y 'al completarse' elimina la ambigüedad del antecedente plural en 'cuando se completan'. Se conservan la dificultad textual y las notas del aparato inglés.
