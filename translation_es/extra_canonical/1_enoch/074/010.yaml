  yaml_path: translation/extra_canonical/1_enoch/074/010.yaml
  text: And five days are added[a], and for the sun it reaches thirty days; and all the days that accrue to it for one of those five years, when completed[c][b], amount to three hundred and sixty-four days.
  footnotes:
