translation:
  language: es
  text: Y su exceso respecto al sol y a las estrellas llega a seis días[a]; en cinco años, a seis cada uno, asciende para ellos a treinta días[c][b], y la luna queda rezagada respecto al sol y a las estrellas por treinta días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La aritmética del versículo es condensada. El sentido parece ser que el sol y las estrellas acumulan seis días de exceso por año, de modo que en cinco años el total asciende a treinta días.
    reason: cultural_note
  - marker: b
    text: «La luna» también podría entenderse como «el mes», pues el término ge'ez puede tener ambos sentidos en contextos calendáricos.
    reason: lexical_alternative
  - marker: c
    text: 'O: «llega a seis días; en cinco años, a seis cada uno, llega para ellos a treinta días, y a la luna le faltan treinta días respecto al sol y a las estrellas».'
    reason: previous_rendering
lexical_decisions:
- source_word: ምብጻሒሆሙ
  english_pob_choice: their excess
  chosen_spanish: su exceso
  alternatives_spanish:
  - su cumplimiento
  - su cuenta
  - su total
  lexicon: Dillmann
  rationale: En este contexto calendárico, la idea no es simple 'llegada' física, sino el excedente acumulado; 'exceso' comunica mejor el valor restante o sobrante que se está calculando.
- source_word: ስሱ
  english_pob_choice: six
  chosen_spanish: seis
  alternatives_spanish:
  - '6'
  lexicon: Dillmann
  rationale: Numeral cardinal directo; se mantiene literal para preservar la aritmética del pasaje.
- source_word: በበስሱ
  english_pob_choice: at six each
  chosen_spanish: a seis cada uno
  alternatives_spanish:
  - por seis cada uno
  - en seis cada uno
  lexicon: Dillmann
  rationale: La preposición repetida con el numeral tiene fuerza distributiva/instrumental. 'A seis cada uno' transmite la distribución del cálculo sin volverlo más explícito de lo que permite el texto.
- source_word: ይበጽሖሙ
  english_pob_choice: it amounts for them / they reach them
  chosen_spanish: les llega
  alternatives_spanish:
  - les alcanza
  - les corresponde
  lexicon: Dillmann
  rationale: El verbo de raíz 'llegar/alcanzar' conserva la imagen de un total que se alcanza. En español, 'les llega' resulta más natural y sigue siendo fiel al movimiento de acumulación.
- source_word: የሐፀፁ
  english_pob_choice: falls behind
  chosen_spanish: queda por debajo
  alternatives_spanish:
  - queda atrás
  - falla respecto de
  lexicon: Dillmann
  rationale: El verbo expresa falta o desventaja respecto de otro total. 'Queda por debajo' preserva la noción de déficit sin introducir una metáfora demasiado fuerte ni un tecnicismo ajeno al español lector.
- source_word: ወርኅ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - el mes
  lexicon: Dillmann
  rationale: Aunque el término ge'ez puede significar también 'mes', aquí el contraste con sol y estrellas favorece la luminaria. Se mantiene 'la luna' y se conserva la posible resonancia calendárica en el contexto.
theological_decisions:
- issue: Pasaje astronómico-calendárico comprimido y algo opaco
  english_pob_reading: Retain the literal sequence of completion/reaching/subtraction rather than paraphrasing into a fully explicit modern calendar formula
  chosen_spanish_reading: Conservar una secuencia breve y técnica de exceso, llegada y desventaja, sin convertirla en una explicación calendárica moderna
  alternative_spanish_readings:
  - Expresar abiertamente que la luna acumula treinta días menos en cinco años
  - Reformularlo como discrepancia entre cómputo solar y lunar
  rationale: El texto pertenece al Libro Astronómico y presenta una formulación de cómputo condensada. Mantener esa densidad evita borrar la textura del original y respeta la tensión interpretativa documentada por el POB inglés.
  doctrine_reference: 'Principio editorial POB: preservar tensiones textuales y no resolverlas mediante paráfrasis explicativa excesiva'
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión que corrigió la sintaxis y la matemática del original: el pasaje afirma un exceso acumulado en cinco años y una falta de treinta días de la luna frente al sol y las estrellas. También atendí la nota revisada sobre ሐፀፀ, que expresa ''quedar por debajo/faltar'' y no ''ser tomado'' o ''ser quitado''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió 'luna' y no 'mes' en el texto principal, conservando la posibilidad alternativa en nota.
  - Se evita 'Mesías/Cristo' porque no aparecen en el versículo.
  - Se preserva un registro formal, inteligible y no arcaizante.
  - La puntuación refleja un único flujo de cálculo, con la nota c aclarando una lectura alternativa sin alterar el texto principal.
