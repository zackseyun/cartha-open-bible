translation:
  language: es
  text: En tres años hay mil noventa y dos días[a], y en cinco años, mil ochocientos veintiocho días; así, en ocho años hay dos mil novecientos doce días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea etiópica presenta una dificultad numérica en este testimonio de OCR. El versículo parece totalizar días para períodos de tres, cinco y ocho años, pero la redacción final puede conservar un número dividido o expresado en un orden extraño. Una traducción más fluida sería: «En tres años, 1,092 días; en cinco años, 1,828 días; así, en ocho años, 2,912 días».'
    reason: textual_variant
lexical_decisions:
- source_word: ለ፫ዓም
  english_pob_choice: for three years
  chosen_spanish: por tres años
  alternatives_spanish:
  - en tres años
  - durante tres años
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición ለ con una expresión temporal funciona aquí de modo distributivo o calculativo en un contexto astronómico. En español, «por tres años» comunica mejor la correspondencia entre el lapso y el total de días que una lectura puramente locativa o de plazo.
- source_word: መዋዕለ
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - conteo de días
  - días en número
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término normal es «días», y aquí funciona como unidad numérica de cómputo calendárico.
- source_word: ፲፻ወ፺ወክልኤ
  english_pob_choice: one thousand ninety-two
  chosen_spanish: mil noventa y dos
  alternatives_spanish:
  - '1092'
  lexicon: Sistema numérico ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor aditivo es 1000 + 90 + 2 = 1092. En español conviene expresarlo con palabras para lectura pública, manteniendo la cifra equivalente al audit trail.
- source_word: ወለ፭ዓመት
  english_pob_choice: and for five years
  chosen_spanish: y por cinco años
  alternatives_spanish:
  - y en cinco años
  - además, por cinco años
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se continúa el mismo patrón de cómputo por lapsos de años. «Y por cinco años» conserva la relación aditiva y calculativa.
- source_word: ፲ወ፰፻፳መዋዕለ፡ ወ፰
  english_pob_choice: one thousand eight hundred twenty-eight days
  chosen_spanish: mil ochocientos veintiocho días
  alternatives_spanish:
  - mil ochocientos veinte días y ocho
  - 1828 días
  lexicon: Sistema numérico ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: El testimonio ge'ez/OCR es numéricamente difícil, pero el audit trail inglés adoptó la lectura suavizada de 1,828 días. Por transparencia textual, la traducción española sigue esa lectura principal y no reproduce la forma más áspera del testimonio en el cuerpo del texto.
- source_word: ከመ፡ ይኩን
  english_pob_choice: thus ... there are
  chosen_spanish: así, ... hay
  alternatives_spanish:
  - de este modo hay
  - por tanto, hay
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí introduce el total resultante del cómputo, no una finalidad. «Así» y «hay» transmiten el valor resultativo con naturalidad en español.
- source_word: ለ፰ዓመት
  english_pob_choice: for eight years
  chosen_spanish: por ocho años
  alternatives_spanish:
  - en ocho años
  - durante ocho años
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el mismo esquema distributivo de los otros miembros del verso.
- source_word: ፪ወ፱፻፲፪
  english_pob_choice: two thousand nine hundred twelve
  chosen_spanish: dos mil novecientos doce
  alternatives_spanish:
  - '2912'
  lexicon: Sistema numérico ge'ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor aditivo es 2000 + 900 + 12 = 2912; se expresa en español de forma clara y pública.
theological_decisions:
- issue: Aritmética calendárica en un verso etiópico difícil de OCR
  english_pob_reading: Preserve the verse as a sequence of day totals for 3, 5, and 8 years, without harmonizing the final wording into a cleaner modern equation.
  chosen_spanish_reading: Preservar el verso como una secuencia de totales de días para tres, cinco y ocho años, sin convertir el testimonio en una ecuación moderna más pulida.
  alternative_spanish_readings:
  - Normalizar el verso a una formulación totalmente suavizada y emendada
  - Reconstruir el texto a partir de otros testigos para eliminar la aspereza numérica
  rationale: No es un punto doctrinal, sino de transparencia textual. El Libro Astronómico depende de números precisos; cuando el testimonio ge'ez/OCR es difícil, la traducción debe dejar visible la decisión de lectura en lugar de ocultarla.
  doctrine_reference: Política de transparencia textual y equivalencia óptima del proyecto POB
translation_notes:
  revision_awareness: El borrador español sigue la revisión inglesa más reciente, que corrigió la cláusula de cinco años a «1,828 days» y eliminó la expansión redundante final. Por eso el texto español adopta «mil ochocientos veintiocho días» y no conserva una expansión adicional de «y diez y dos días».
  spanish_consistency_notes:
  - Se usa «por» con expresiones temporales en sentido distributivo/calculativo, coherente con el contexto astronómico.
  - Se evita «Cristo», «SEÑOR» u otra terminología no presente en el texto fuente.
  - Se mantiene un registro público, sobrio y legible, adecuado para un verso numérico.
  - La nota al pie se ancla en «días[a]» para señalar la variante textual sin sobrecargar el cuerpo principal.
