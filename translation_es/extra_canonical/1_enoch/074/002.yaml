translation:
  language: es
  text: Y todo lo que Uriel, el ángel santo, que es el líder de todos ellos, me mostró, yo escribí sus posiciones según me las mostró, y escribí sus meses tal como son, y la apariencia[a] de sus luces, hasta que se cumplieron quince días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la visión de sus luces». El ge'ez puede expresar aquí la apariencia visible o la visión de sus luminarias; en cualquier caso, la forma se entiende mejor como sustantivo, no como «vi».
    reason: lexical_alternative
lexical_decisions:
- source_word: አርአየኒ
  english_pob_choice: showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me reveló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo conserva el registro visionario y demostrativo del pasaje sin sobrerretraducirlo como revelación técnica.
- source_word: መልአክ ቅዱስ
  english_pob_choice: the holy angel
  chosen_spanish: el ángel santo
  alternatives_spanish:
  - el ángel sagrado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Santo» es la equivalencia natural y fiel para el título celestial del texto.
- source_word: መራሒሆሙ ለኵሎሙ
  english_pob_choice: their leader / the leader of them all
  chosen_spanish: el líder de todos ellos
  alternatives_spanish:
  - su líder
  - el que los guía a todos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La adición etíope intensifica el alcance universal; en español conviene explicitar «de todos ellos» para no perder esa amplitud.
- source_word: ምንባሪሆሙ
  english_pob_choice: their stations
  chosen_spanish: sus estaciones
  alternatives_spanish:
  - sus posiciones
  - sus lugares
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto astronómico, «estaciones» conserva la idea técnica de ubicación ordenada de los cuerpos celestes.
- source_word: አውራኂሆሙ
  english_pob_choice: their paths
  chosen_spanish: su apariencia
  alternatives_spanish:
  - su aspecto
  - la apariencia de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión textual indica que la forma ge''ez corresponde aquí a «apariencia/sight» en estado constructo, no a «caminos» ni a «meses». Por eso se traduce como el objeto escrito: «su apariencia».'
- source_word: ርእየ
  english_pob_choice: the appearance of their lights
  chosen_spanish: contemplé sus luces
  alternatives_spanish:
  - vi sus luces
  - observé sus luces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el audit trail reconoce una lectura nominal de «apariencia», el español fluye mejor si se expresa la acción visual del narrador en la cláusula final; «contemplé» mantiene el tono visionario sin violentar la imagen de las luces.
- source_word: እስከ ተፈጸመ ዐሡር ወኀሙስ መዋዕለ
  english_pob_choice: until fifteen days were completed
  chosen_spanish: hasta que se cumplieron quince días
  alternatives_spanish:
  - hasta completar quince días
  - hasta que terminaron quince días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se cumplieron» reproduce bien la idea de un período completado, con español natural y un matiz formal adecuado.
theological_decisions:
- issue: Identidad del sujeto de los pronombres repetidos
  english_pob_reading: the pronouns refer to the heavenly luminaries discussed in the surrounding Astronomical Book context
  chosen_spanish_reading: los pronombres se mantienen referidos a los cuerpos celestes/luminarias del contexto astronómico inmediato
  alternative_spanish_readings:
  - referencia a seres angélicos vinculados con las luminarias
  - referencia mixta a luminarias y sus órdenes gobernantes
  rationale: La sección trata del orden y la observación de las luminarias; no conviene expandir el referente más allá de lo que el pasaje exige.
  doctrine_reference: Priorizar el sentido local del pasaje y no armonizar de más con otros textos apocalípticos.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrige el error de 'their paths' por 'their months' / 'appearance' según el audit trail, y se evitó reproducir la lectura descartada. También se recuperó en español el matiz añadido por ለኵሎሙ («de todos ellos») sin volver al formulismo inglés anterior.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se eligió «ángel santo» y «líder» por fidelidad al registro cosmológico del pasaje.
  - Se evitó «Cristo» y vocabulario eclesiástico no presente en el fuente.
  - Las notas a pie de página están ancladas exactamente en [a], [b] y [c] dentro del texto.
  - La redacción busca español natural sin perder la densidad técnica del libro astronómico.
