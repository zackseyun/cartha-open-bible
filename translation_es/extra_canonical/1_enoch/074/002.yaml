  language: en
  yaml_path: translation/extra_canonical/1_enoch/074/002.yaml
  text: And all that Uriel[a], the holy angel who is their leader, showed me—I wrote down their positions as he showed them to me, and I wrote down their paths as they are[e][d][c][b], and I saw their lights until fifteen days were completed.
  footnotes:
