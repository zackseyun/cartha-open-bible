translation:
  language: es
  text: Durante dos meses se pone con el sol por estos dos portales centrales[a], el tercero y el cuarto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez aquí es textual y gramaticalmente difícil. La lectura adoptada entiende la frase como una duración temporal ('durante dos meses') y el verbo como 'se pone', no como 'segundo mes' ni 'cuarto día'.
    reason: source_note
lexical_decisions:
- source_word: በክልኤ ወርኅ
  english_pob_choice: For two months
  chosen_spanish: Durante dos meses
  alternatives_spanish:
  - Por dos meses
  - En dos meses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión adjudicada indica que ክልኤ es el cardinal 'dos', no 'segundo'; por eso se expresa una duración temporal con 'Durante dos meses'. Mantiene el valor cuantitativo del ge'ez sin forzar una lectura ordinal.
- source_word: የዓርብ
  english_pob_choice: it sets
  chosen_spanish: se pone
  alternatives_spanish:
  - se oculta
  - se pone el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La nota de revisión muestra que el verbo significa 'ponerse' o 'ocultarse' del sol, no una referencia al cuarto día. 'Se pone' conserva el sentido astronómico y funciona bien en español bíblico contemporáneo.
- source_word: ምስለ ፀሐይ
  english_pob_choice: with the sun
  chosen_spanish: con el sol
  alternatives_spanish:
  - junto con el sol
  - al mismo tiempo que el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Con'' reproduce de manera natural la relación de concomitancia del original. En este contexto astronómico, expresa el movimiento del astro en relación con el sol sin añadir explicación ajena al texto.'
- source_word: በእሉ ክልኤ ኆዋኅው
  english_pob_choice: these two middle portals
  chosen_spanish: estos dos portales del medio
  alternatives_spanish:
  - estas dos puertas del medio
  - estas dos aperturas del medio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión confirma que ኆዋኅው/ኆኅት significa 'puertas', 'portales' o 'portales', no 'ventanas'. 'Portales' conserva la imaginería arquitectónica celestial y evita el calco incorrecto 'ventanas'.
- source_word: እለ ማእከል
  english_pob_choice: middle
  chosen_spanish: del medio
  alternatives_spanish:
  - centrales
  - intermedios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Del medio'' es una forma natural en español para modificar ''portales'' y refleja directamente ማእከል, ''medio'' o ''centro''.'
- source_word: በሣልስት ወበራብዕት ኆኅት
  english_pob_choice: in the third and in the fourth portal
  chosen_spanish: en el tercero y en el cuarto portal
  alternatives_spanish:
  - por el tercer y el cuarto portal
  - en el tercer y cuarto portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Los ordinales indican aperturas numeradas. Se conserva 'portal' en singular con la coordinación necesaria para reflejar la estructura enumerativa del original y la lectura corregida del texto.
theological_decisions:
- issue: Imaginario apocalíptico-astronómico de los portales celestes
  english_pob_reading: windows/openings of the heavens in an apocalyptic-astronomical schema
  chosen_spanish_reading: portales celestes dentro de un esquema apocalíptico-astronómico
  alternative_spanish_readings:
  - ventanas celestes
  - aperturas del cielo
  rationale: La imagen concreta de portales se mantiene porque el texto etíope describe el curso del sol mediante aperturas numeradas. Traducirlo como 'ventanas' sería inconsistente con la corrección textual adoptada y debilitaría la imaginería arquitectónica del pasaje.
  doctrine_reference: Preservar la imaginería apocalíptica sin convertirla en terminología astronómica abstracta.
translation_notes:
  revision_awareness: 'He seguido la última revisión adjudicada, que corrige la lectura previa del inglés POB: በክልኤ significa ''durante dos meses'', የዓርብ significa ''se pone'', y ኆዋኅው/ኆኅት significa ''portales/puertas''. Por eso descarté las antiguas opciones ''segundo mes'', ''cuarto día'' y ''ventanas''.'
  spanish_consistency_notes:
  - Usé 'portales' de forma uniforme para ኆዋኅው/ኆኅት, evitando 'ventanas' por la corrección textual y para mantener la coherencia con la imaginería celestial del pasaje.
  - Elegí 'se pone' en vez de una paráfrasis más explicativa para respetar el valor verbal astronómico del hebraísmo/etiópico subyacente.
  - Mantuve un registro bíblico moderno y digno, sin arcaísmos innecesarios.
