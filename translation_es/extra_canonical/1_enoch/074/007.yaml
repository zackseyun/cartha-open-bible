base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/074/007.yaml
  text: And when the sun goes out from the fourth gate[a], it goes out for seven days, until it goes out from the fifth; and again it returns for seven days through the fourth gate, and completes all its light[c][b], and it withdraws and enters through the first gate for eight days.
  footnotes:
  - marker: a
    text: The Ethiopic text at 'until it goes out from the fifth' does not explicitly repeat 'gate'; the sense is almost certainly 'the fifth gate' from the surrounding pattern.
    reason: lexical_alternative
  - marker: b
    text: '''Completes all its light'' is a close rendering of the Ge''ez idiom. It likely refers to the sun reaching the full measure of its brightness in this phase of the cycle.'
    reason: cultural_note
  - marker: c
    text: Or 'to the fourth gate'.
    reason: previous_rendering
