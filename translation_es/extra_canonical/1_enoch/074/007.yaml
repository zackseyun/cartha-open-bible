translation:
  language: es
  text: Y cuando el sol sale[a] de la cuarta puerta, sale por siete días, hasta que sale de la quinta; y nuevamente regresa por siete días por la cuarta puerta[c], y completa toda su luz[b], y se retira y entra por la primera puerta por ocho días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge’ez no repite explícitamente ‘puerta’ tras ‘la quinta’, pero el sentido del patrón previo hace casi seguro que se trata de ‘la quinta puerta’.
    reason: lexical_alternative
  - marker: b
    text: ‘Completa toda su luz’ sigue de cerca el giro idiomático del ge’ez; probablemente alude a que el sol alcanza la plenitud de su resplandor en esta fase del ciclo.
    reason: cultural_note
  - marker: c
    text: 'O: ‘a la cuarta puerta’.'
    reason: previous_rendering
lexical_decisions:
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el referente astronómico directo del pasaje. En español, el artículo definido fluye naturalmente y mantiene el carácter concreto de la imagen cósmica.
- source_word: ይወፅእ
  english_pob_choice: goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale hacia afuera
  - emerge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Sale’ conserva la repetición verbal del original y su valor de movimiento visible del luminar por una abertura, sin modernizar la imagen.
- source_word: እምራብዕት ኆኅት
  english_pob_choice: from the fourth gate
  chosen_spanish: de la cuarta puerta
  alternatives_spanish:
  - de la cuarta puerta abierta
  - del cuarto portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Puerta’ es la mejor equivalencia pública en español para ኆኅት dentro de esta cosmología. ‘Portal’ es posible, pero ‘puerta’ preserva mejor el paralelismo del ciclo y la imaginería concreta.
- source_word: ሰቡዐ መዋዕለ
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Por siete días’ expresa duración en español de forma natural y conserva el ritmo acumulativo del texto.
- source_word: እስከ ይወፅእ እምነ ኃምስት
  english_pob_choice: until it goes out from the fifth
  chosen_spanish: hasta que sale de la quinta
  alternatives_spanish:
  - hasta que sale de la quinta puerta
  - hasta que sale de la quinta [puerta]
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Sigo el auditable POB: el ge’ez no repite explícitamente ‘puerta’, pero el contexto lo implica. En español se puede mantener la elipsis como ‘la quinta’, dejando visible la dependencia del patrón anterior.'
- source_word: ካዕበ
  english_pob_choice: again
  chosen_spanish: nuevamente
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Nuevamente’ suena digno y claro en español y marca la reanudación del movimiento sin añadir matiz excesivo.
- source_word: ይገብእ
  english_pob_choice: returns
  chosen_spanish: regresa
  alternatives_spanish:
  - vuelve
  - retorna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Regresa’ es idiomático y conserva la idea de reversión del trayecto solar hacia una abertura anterior.
- source_word: በኆኅት ራብዕ
  english_pob_choice: through the fourth gate
  chosen_spanish: por la cuarta puerta
  alternatives_spanish:
  - a través de la cuarta puerta
  - por medio de la cuarta puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición ge’ez በ admite valor de tránsito. ‘Por’ transmite bien la trayectoria sin forzar un tecnicismo innecesario; mantiene la lectura corregida de atravesar la puerta.
- source_word: ይፌጽም ኵሎ ብርሃኖ
  english_pob_choice: completes all its light
  chosen_spanish: completa toda su luz
  alternatives_spanish:
  - completa toda su claridad
  - lleva a plenitud toda su luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Luz’ conserva el sustantivo del original; ‘toda su luz’ reproduce el carácter totalizador de la frase sin convertirla en una paráfrasis explicativa.
- source_word: ይደንን
  english_pob_choice: withdraws
  chosen_spanish: se retira
  alternatives_spanish:
  - se repliega
  - se oculta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Se retira’ mantiene la imagen de retirada o repliegue cósmico, y evita sobreinterpretar el verbo como simple ocultamiento.
- source_word: ይበውእ በቀዳሚት ኆኅት
  english_pob_choice: enters through the first gate
  chosen_spanish: entra por la primera puerta
  alternatives_spanish:
  - entra a través de la primera puerta
  - entra por la primera abertura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Entra por’ reproduce bien el movimiento de ingreso y el paralelismo con ‘sale de’. ‘Puerta’ mantiene la consistencia terminológica del pasaje.
- source_word: ስሙነ መዋዕለ
  english_pob_choice: for eight days
  chosen_spanish: por ocho días
  alternatives_spanish:
  - durante ocho días
  - ocho días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Por ocho días’ expresa duración de forma natural en español y conserva el patrón temporal del cierre del ciclo.
theological_decisions:
- issue: Imaginería astronómica de las puertas
  english_pob_reading: Retain literal 'gate' language for the sun's movement.
  chosen_spanish_reading: Mantener 'puerta' para el movimiento del sol.
  alternative_spanish_readings:
  - usar 'portal'
  - parafrasear como puntos del horizonte
  rationale: El texto pertenece a la cosmología apocalíptica del Libro Astronómico; conservar la arquitectura de puertas evita reducirla a una descripción astronómica moderna y respeta la imaginería del original.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten cosmic imagery into generic modern prose.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió la relación preposicional de la cuarta puerta: en esta cosmología el movimiento solar se expresa mejor como tránsito por la puerta, no como mera dirección hacia ella. También se preservó la elipsis de ‘puerta’ en la cláusula de la quinta, conforme al auditable POB en inglés.'
  spanish_consistency_notes:
  - Se mantiene ‘puerta’ de forma uniforme para ኆኅት y se evita alternar con ‘portal’ sin necesidad textual.
  - 'Se conserva la repetición verbal del movimiento solar con formas simples y claras: ‘sale’, ‘regresa’, ‘entra’.'
  - La elipsis en ‘la quinta’ queda visible para reflejar la transmisión del ge’ez y el criterio del texto base en inglés.
