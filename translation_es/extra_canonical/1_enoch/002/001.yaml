translation:
  language: es
  text: 'Miren todas las obras en el cielo: cómo no alteran sus caminos[a], y las luces en el cielo, cómo todas salen y se ponen en orden, cada una a su tiempo, y no transgreden su orden establecido.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no cambian sus cursos». La formulación ge''ez apunta a trayectorias celestes fijas.'
    reason: lexical_alternative
  - marker: b
    text: '«Orden establecido» también puede entenderse como «orden señalado», «ordinancia» o «regla», destacando que las luces celestes guardan el orden fijado para ellas. Una traducción anterior del giro final fue: «no transgreden contra su orden establecido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ጠይቁ
  english_pob_choice: Consider
  chosen_spanish: Consideren
  alternatives_spanish:
  - Miren
  - Observen
  - Atiendan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo plural introduce una invitación a reflexionar sobre lo visible en la creación. «Consideren» conserva ese tono exhortativo sin convertirlo en una petición de información.
- source_word: ግብረ
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - cosas hechas
  - acciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de fenómenos celestes, el término refiere a las manifestaciones u operaciones de la creación; «obras» comunica bien ese sentido en español.
- source_word: ኢይመይጡ ፍናዊሆሙ
  english_pob_choice: they do not alter their paths
  chosen_spanish: no alteran sus caminos
  alternatives_spanish:
  - no cambian sus cursos
  - no se desvían de sus caminos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Caminos» preserva la imagen concreta de trayectorias celestes; «alteran» refleja la idea de cambio o desviación negada por el verbo.
- source_word: ብርሃናት
  english_pob_choice: the lights
  chosen_spanish: las luces
  alternatives_spanish:
  - los luminares
  - las luminarias
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia probablemente abarca los cuerpos celestes visibles. «Luces» es natural y mantiene la imagen astral sin introducir un tecnicismo innecesario.
- source_word: ይሠርቅ ወየዐርብ
  english_pob_choice: rise and set
  chosen_spanish: salen y se ponen
  alternatives_spanish:
  - amanecen y anochecen
  - salen y descienden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para español, «salen y se ponen» resulta idiomático y reproduce el movimiento regular de los astros sin perder la claridad del par verbal.
- source_word: ሥሩዕ
  english_pob_choice: in order
  chosen_spanish: en orden
  alternatives_spanish:
  - según el orden
  - en su debida disposición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la regularidad y disposición estable de los cuerpos celestes de forma breve y natural.
- source_word: በበዘመኑ
  english_pob_choice: each in its season
  chosen_spanish: cada una en su temporada
  alternatives_spanish:
  - cada uno en su tiempo
  - cada una en su debido tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El distributivo apunta a un tiempo propio para cada astro. «Temporada» conserva el matiz calendárico/cósmico que el contexto sugiere.
- source_word: ኢይትኀደዉ እምሥርዓቶሙ
  english_pob_choice: do not transgress their appointed order
  chosen_spanish: no transgreden su orden establecido
  alternatives_spanish:
  - no se apartan de su orden
  - no violan su orden
  - no traspasan su orden establecido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Transgreden» conserva la fuerza de una infracción de límite u orden fijado, y «orden establecido» comunica que se trata de un orden determinado de antemano.
theological_decisions:
- issue: Cómo expresar la regularidad celeste sin diluir su carga de orden fijado
  english_pob_reading: do not transgress their appointed order
  chosen_spanish_reading: no transgreden su orden establecido
  alternative_spanish_readings:
  - no se apartan de su orden
  - no violan su orden
  rationale: El pasaje presenta la obediencia de la creación a un orden fijo. «Orden establecido» conserva la idea de un orden previamente asignado sin convertir el verso en lenguaje científico neutro ni en una formulación litúrgica ajena al texto.
  doctrine_reference: Preservar la imaginería apocalíptica del orden creado y su obediencia al designio divino.
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó por una revisión menor en la cláusula final para hacer más idiomática la relación entre «transgress» y su objeto; el sentido de fondo permaneció estable. La versión española sigue ese mismo sentido sin añadir matices ajenos al ge'ez.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; aquí no aparece ninguna referencia al nombre divino.
  - «Luces» se conserva para el conjunto de astros/luminarias por fidelidad y claridad.
  - «Orden establecido» se usa de manera consistente para reflejar la idea de orden fijo o asignado.
