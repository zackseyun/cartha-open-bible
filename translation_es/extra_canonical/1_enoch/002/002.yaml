translation:
  language: es
  text: Mira la tierra y entiende acerca de las obras que se hacen sobre ella desde el principio hasta su consumación, de modo que ninguna de las obras de Dios[a][b][c][d] cambia, tal como aparecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas las obras de Dios no cambian». La redacción ge''ez puede entenderse de modo colectivo o distributivo.'
    reason: lexical_alternative
  - marker: b
    text: El cierre también puede leerse como «mientras aparecen» o «según aparecen», dependiendo de cómo se constrúa la forma verbal.
    reason: alternative_reading
  - marker: c
    text: 'O: «tal como él las muestra». Esta posibilidad quedó descartada en la revisión porque el verbo ge''ez es intransitivo/pasivo («aparecer»).'
    reason: previous_rendering
  - marker: d
    text: 'O: «las obras que se hacen sobre ella desde el principio hasta su consumación». La secuencia puede vincularse con «las obras» mismas o con el conjunto de los hechos sobre la tierra.'
    reason: previous_rendering
lexical_decisions:
- source_word: ርእይዋ
  english_pob_choice: Look at it / look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira la
  - Contémplala
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo llama a una observación directa y atenta. «Mira» es natural en español y conserva la fuerza del mandato sin volverlo arcaico.
- source_word: ለምድር
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de observación de la creación, «la tierra» expresa mejor el ámbito creado que el más abstracto «el mundo».
- source_word: ወለብዉ
  english_pob_choice: understand
  chosen_spanish: entiende
  alternatives_spanish:
  - considera
  - presta atención
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia observación→discernimiento se conserva bien con «entiende», que expresa comprensión reflexiva sin añadir interpretación.
- source_word: በእንተ ምግባር
  english_pob_choice: concerning the works
  chosen_spanish: acerca de las obras
  alternatives_spanish:
  - sobre las obras
  - respecto de las obras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obras» mantiene el sentido de actos/obras creado en el contexto. «Acerca de» conserva el matiz de tratar el tema sin sonar tan técnico como «respecto de».
- source_word: ዘይትገበር ላዕሌሃ
  english_pob_choice: that are done upon it
  chosen_spanish: que se hacen sobre ella
  alternatives_spanish:
  - que se hacen sobre ella
  - que tienen lugar sobre ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma impersonal/pasiva del ge'ez se expresa de manera natural con «se hacen». «Sobre ella» conserva la referencia explícita a la tierra.
- source_word: እምቀዳሚ እስከ ተፍጻሜቱ
  english_pob_choice: from the beginning to its completion
  chosen_spanish: desde el principio hasta su consumación
  alternatives_spanish:
  - desde el principio hasta su fin
  - desde el comienzo hasta su consumación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Consumación» refleja mejor el matiz de culminación/terminación plena que un simple «fin». Mantiene la idea de totalidad temporal.
- source_word: ከመ ኢይትመየጥ
  english_pob_choice: that none ... changes
  chosen_spanish: de modo que ninguna ... cambia
  alternatives_spanish:
  - de modo que ninguna ... se altera
  - para que ninguna ... cambie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula expresa estabilidad/regularidad. En español, «cambia» es claro y no sobreinterpreta la construcción como una tesis filosófica absoluta.
- source_word: ኵሉ ምግባረ ለአምላክ
  english_pob_choice: the works of God
  chosen_spanish: las obras de Dios
  alternatives_spanish:
  - todas las obras de Dios
  - cada obra de Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pluralidad española «las obras» preserva el sentido colectivo del giro, y «de Dios» refleja la referencia explícita a አምላክ.
- source_word: እንዘ ያስተርኢ
  english_pob_choice: as they appear
  chosen_spanish: tal como aparecen
  alternatives_spanish:
  - mientras aparecen
  - según aparecen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual corregida exige el sentido intransitivo «aparecen», no «muestran». «Tal como aparecen» mantiene el vínculo con la observación del mundo creado.
theological_decisions:
- issue: Si la frase sobre las obras de Dios debe entenderse como afirmación metafísica de inmutabilidad absoluta o como observación del orden creado
  english_pob_reading: The verse is rendered as a statement about the unchanging character of God's works as observed in creation's ordered course.
  chosen_spanish_reading: La redacción sugiere la firme regularidad de las obras de Dios tal como se observan en la creación, sin convertirla en una formulación sistemática de inmutabilidad absoluta.
  alternative_spanish_readings:
  - Dios nunca cambia nada de lo que hace
  - solo describe la regularidad de las estaciones
  rationale: 'El contexto inmediato invita a mirar la tierra y discernir su orden. Por eso conviene preservar la tensión: el texto afirma estabilidad observable de las obras divinas, pero no fuerza una tesis sistemática más amplia.'
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del contexto inmediato.
translation_notes:
  revision_awareness: 'La tradición de trabajo en inglés pasó por una corrección importante: la cláusula final no significa «as he shows them», sino «as they appear», por el valor intransitivo/pasivo del verbo ge''ez ያስተርኢ. También se ajustó la concordancia de número en la frase temporal para evitar el desajuste entre singular colectivo y plural en inglés; en español se resolvió con una redacción natural que conserva el sentido colectivo sin forzar la sintaxis.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para አምላክ, conforme al estándar del proyecto.
  - Se usa «la tierra» en sentido cósmico/creacional, no territorial.
  - «Obras» conserva el peso semántico de ምግባር y evita trivializarlo como simples «hechos».
  - «Consumación» se prefirió por el valor de culminación plena, más cercano al contexto que un mero «fin».
