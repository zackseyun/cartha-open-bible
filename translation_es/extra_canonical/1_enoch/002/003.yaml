translation:
  language: es
  text: Miren el verano y el invierno[a], cómo toda la tierra está llena de agua[b], y las nubes, el rocío y la lluvia reposan sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La pareja «verano e invierno» sigue de cerca el Ge'ez. En el trasfondo etíope, «invierno» puede sugerir más bien la estación lluviosa que el invierno frío del español moderno.
    reason: cultural_note
  - marker: b
    text: «Rocío» traduce aquí un término que puede ser ambiguo aislado, pero en esta lista de fenómenos meteorológicos lo más probable es que se refiera a la humedad visible del rocío.
    reason: lexical_alternative
lexical_decisions:
- source_word: ርእይዎ
  english_pob_choice: Look at
  chosen_spanish: Mirad
  alternatives_spanish:
  - Ved
  - Observad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo plural/dirigido a un grupo se expresa de manera natural con «Mirad», que conserva el llamado a la observación directa sin sonar forzado.
- source_word: ለሐጋይ
  english_pob_choice: the summer
  chosen_spanish: el verano
  alternatives_spanish:
  - la estación seca
  - el estío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Verano» es el equivalente más claro y natural en español para el par estacional del texto.
- source_word: ወለክረምት
  english_pob_choice: and the winter
  chosen_spanish: el invierno
  alternatives_spanish:
  - la temporada de lluvias
  - el tiempo de lluvias
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el contraste estacional directo del Ge'ez. En este contexto, aunque la nota inglesa advierte que puede evocar la estación lluviosa, «invierno» preserva la pareja léxica básica sin introducir interpretación adicional en el texto principal.
- source_word: ከመ
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - que
  - de qué modo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cómo» conserva el tono observacional e introduce el contenido de lo que se debe mirar, en línea con la decisión inglesa.
- source_word: ኵሉ ምድር
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - la tierra entera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Toda la tierra» reproduce el alcance global sin volverlo excesivamente abstracto; en español suena natural y mantiene la amplitud cósmica.
- source_word: መልአት
  english_pob_choice: is filled
  chosen_spanish: está llena
  alternatives_spanish:
  - está llena de
  - se llena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para español, «está llena de agua» expresa con mayor naturalidad el estado de abundancia que el calco «es llenada». Se conserva el sentido de plenitud presente en el original.
- source_word: ማየ
  english_pob_choice: with water
  chosen_spanish: de agua
  alternatives_spanish:
  - con agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con «está llena» en español, la construcción idiomática requiere «de agua»; el contenido lexical sigue siendo literalmente «water».
- source_word: ወደመና
  english_pob_choice: and clouds
  chosen_spanish: y las nubes
  alternatives_spanish:
  - y nubes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se explicita el artículo para una lectura más fluida en español, sin alterar el referente meteorológico.
- source_word: ወጠለ
  english_pob_choice: and dew
  chosen_spanish: el rocío
  alternatives_spanish:
  - la humedad
  - la neblina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta lista de fenómenos climáticos, «rocío» es la opción más probable y clara en español, manteniendo la equivalencia lexical señalada por la nota inglesa sobre la ambigüedad del término.
- source_word: ወዝናም
  english_pob_choice: and rain
  chosen_spanish: y la lluvia
  alternatives_spanish:
  - y la precipitación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lluvia» es la correspondencia directa y más natural en español para el término meteorológico.
- source_word: ያዓርፍ ላዕሌሃ
  english_pob_choice: rest upon it
  chosen_spanish: reposan sobre ella
  alternatives_spanish:
  - se posan sobre ella
  - descansan sobre ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Reposan sobre ella» mantiene el registro elevado y el sentido de asentarse o quedar sobre la tierra. El plural verbal se adapta a la enumeración anterior de nubes, rocío y lluvia.
theological_decisions:
- issue: Alcance estacional y posible matiz climático de «invierno»
  english_pob_reading: The seasonal pair 'summer and winter' reflects the Ge'ez wording directly. In the Ethiopian setting, 'winter' may evoke the wet season more than a cold season in the modern English sense.
  chosen_spanish_reading: Se mantiene «verano e invierno» en el texto principal, con la posibilidad de entender «invierno» como estación lluviosa en el trasfondo cultural etíope.
  alternative_spanish_readings:
  - verano y temporada de lluvias
  - verano y estación lluviosa
  rationale: No se debe borrar la tensión léxica entre el contraste estacional directo y su posible valor climático local. La redacción principal conserva la forma del original; la nota aclara el matiz sin sustituir el término.
  doctrine_reference: N/A (cultural/lexical context)
- issue: «Rocío» como posible alternativa semántica
  english_pob_reading: The term rendered 'dew' can be difficult in isolation, but in this list of weather phenomena it most likely refers to moisture such as dew rather than a non-meteorological sense.
  chosen_spanish_reading: Se traduce como «rocío» dentro de la lista de fenómenos meteorológicos.
  alternative_spanish_readings:
  - humedad
  - neblina
  rationale: La secuencia agua-nubes-rocío-lluvia favorece una lectura meteorológica. «Rocío» es la solución más transparente para el lector español y conserva la ambigüedad limitada que permite el contexto.
  doctrine_reference: N/A (lexical/contextual)
- issue: «Toda la tierra» frente a «la tierra entera»
  english_pob_reading: The whole earth
  chosen_spanish_reading: «Toda la tierra»
  alternative_spanish_readings:
  - la tierra entera
  - todo el mundo
  rationale: No se requiere una reinterpretación teológica; simplemente se preserva el alcance cosmológico del enunciado con una fórmula natural en español.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el estado más reciente de la revisión, que indica sin cambios necesarios y alta concordancia entre fuente, traducción inglesa y validación cruzada.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí porque el versículo no contiene el Tetragrámaton ni equivalente directo.
  - Se evitó «SEÑOR» o fórmulas eclesiásticas no presentes en la fuente.
  - 'Se mantuvo el paralelismo meteorológico de la lista: agua, nubes, rocío y lluvia.'
  - La puntuación y el orden sintáctico buscan ser naturales en español sin perder la estructura observacional del original.
