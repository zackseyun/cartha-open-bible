translation:
  language: es
  text: Y todos los luminares[a] serán sacudidos con gran temor, y toda la tierra será sacudida y temblará y se convulsionará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las luces». El término ge'ez puede designar en general cosas luminosas, pero aquí probablemente se refiere a los luminares celestes en una escena de juicio cósmico.
    reason: lexical_alternative
  - marker: b
    text: O «se estremecerá». El historial de revisión inglés también consideró una lectura relacionada con terror o alarma personificada debido a una posible dificultad textual en el último verbo ge'ez.
    reason: textual_or_lexical_alternative
lexical_decisions:
- source_word: ኵሎሙ ብርሃናት
  english_pob_choice: all the luminaries
  chosen_spanish: todos los luminares
  alternatives_spanish:
  - todas las luces
  - todos los brillantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ብርሃናት» puede denotar luces o cuerpos luminosos; en este contexto apocalíptico, «luminares» conserva el sentido cósmico de los astros sin reducirlos a luces ordinarias.
- source_word: ይትመሀከዉ / ትትመሀከው
  english_pob_choice: shall be shaken
  chosen_spanish: serán sacudidos / será sacudida
  alternatives_spanish:
  - serán agitados / será agitada
  - serán movidos / será movida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica ser agitado o sacudido; «sacudir» preserva el paralelismo entre los cuerpos celestes y la tierra, y transmite con claridad la perturbación cósmica.
- source_word: በፍርሀት ዐቢይ
  english_pob_choice: with great fear
  chosen_spanish: con gran temor
  alternatives_spanish:
  - con gran miedo
  - en gran temor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Temor» conserva mejor el registro bíblico y el matiz reverencial/terrorífico del pasaje apocalíptico que «miedo».
- source_word: ኵላ ምድር
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - toda la tierra entera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este marco de juicio cósmico, «tierra» es más natural que «país» o «región»; «toda la tierra» reproduce la amplitud universal del original.
- source_word: ትርዕድ
  english_pob_choice: tremble
  chosen_spanish: temblará
  alternatives_spanish:
  - tiritará
  - estremecerá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conviene distinguir este verbo del anterior «será sacudida»; «temblará» mantiene la secuencia de intensificación física en español natural.
- source_word: ትኜጕድ
  english_pob_choice: quake
  chosen_spanish: se estremecerá
  alternatives_spanish:
  - se convulsionará
  - se alborotará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el ajuste de la lectura ge'ez señalado en el audit trail, el último verbo expresa mejor alarma/estremecimiento que un mero movimiento físico; «se estremecerá» conserva esa tensión apocalíptica sin volverlo demasiado interpretativo.
theological_decisions:
- issue: Referencia de «luminares»
  english_pob_reading: heavenly luminaries rather than angelic beings
  chosen_spanish_reading: cuerpos celestes / astros, no ángeles
  alternative_spanish_readings:
  - ángeles resplandecientes
  - seres luminosos
  rationale: La proximidad a «toda la tierra» y el motivo de trastorno cósmico favorecen una lectura astronómica. «Luminares» mantiene la amplitud semántica sin imponer una identificación angelológica.
  doctrine_reference: Conservar la imaginería apocalíptica sin sobrearmonizar con tradiciones posteriores.
- issue: Valor del último verbo en la tradición textual auditada
  english_pob_reading: the final movement verb was revised in English from 'be terrified' to 'quake', though the audit trail notes an OCR problem and personified terror in the source
  chosen_spanish_reading: «se estremecerá» para reflejar tanto la agitación como la alarma personificada
  alternative_spanish_readings:
  - «temblará»
  - «será aterrada»
  rationale: El contexto y el historial de revisión muestran una tensión entre sacudida física y temor personificado. «Se estremecerá» deja espacio a ambas capas sin borrar la personificación ni forzar un verbo exclusivamente físico.
  doctrine_reference: Preservar la tensión textual y no resolverla unilateralmente en favor de una sola imagen.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una oscilación importante en el último verbo: una revisión interpretó el ge''ez como ‘quake’, mientras que el informe de revisión identifica una probable lectura errónea del OCR y sugiere un valor de ‘be terrified/alarmed’. La versión española evita cerrar el sentido de forma excesiva mediante «se estremecerá», que puede abarcar tanto el temblor físico como la inquietud/alarma personificada que sugiere el contexto apocalíptico.'
  spanish_consistency_notes:
  - He mantenido «luminares» por coherencia con el valor cósmico documentado para ብርሃናት.
  - He usado «temor» y no «miedo» para un registro bíblico más elevado y por el paralelismo con la escena de juicio.
  - He evitado «SEÑOR» o equivalentes de sustitución, dado que este versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
  - 'La secuencia verbal en español intenta conservar la gradación del original: sacudidos / sacudida / temblará / se estremecerá.'
