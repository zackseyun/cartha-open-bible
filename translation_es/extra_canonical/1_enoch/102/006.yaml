translation:
  language: es
  text: Y cuando mueran, los pecadores dirán acerca de ustedes,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሶበ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y siempre que
  - Pero cuando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce una circunstancia temporal; en español, «y cuando» conserva la continuidad del contexto sin forzar contraste.
- source_word: ትመውቱ
  english_pob_choice: you die
  chosen_spanish: mueran
  alternatives_spanish:
  - mueren
  - ustedes mueran
  - ustedes mueren
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo está en segunda persona plural; en una cláusula temporal subordinada, el subjuntivo español es natural y fiel al valor de futuro referido.
- source_word: ይብሉ
  english_pob_choice: will say
  chosen_spanish: hablarán
  alternatives_spanish:
  - dirán
  - dirán sobre ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto de la revisión inglesa muestra que el verbo funciona como marco de habla que introduce contenido ulterior. «Hablarán» mantiene la idea de enunciación sin cerrar indebidamente la frase con un matiz conclusivo.
- source_word: ላዕሌክሙ
  english_pob_choice: concerning you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - acerca de ustedes
  - contra ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición etiópica puede ser amplia («sobre/por encima de»); dado el contexto, español «sobre ustedes» conserva la amplitud semántica que el audit trail conserva con «concerning you», sin añadir una oposición hostil que no es segura en esta revisión.
- source_word: ኃጥኣን
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los pecadores impíos
  - los malvados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo designa una clase moral; «pecadores» es el equivalente directo y readable en español, conservando el artículo de clase.
theological_decisions:
- issue: Dirección de la palabra de los pecadores
  english_pob_reading: will say concerning you
  chosen_spanish_reading: hablarán sobre ustedes
  alternative_spanish_readings:
  - dirán acerca de ustedes
  - hablarán contra ustedes
  rationale: La revisión inglesa corrigió una lectura demasiado cerrada de hostilidad. En español, «sobre ustedes» refleja el valor tópico de la preposición sin resolver la ambigüedad hacia un ataque verbal explícito.
  doctrine_reference: Preservar la tensión lexical del texto; no intensificar ni suavizar sin base en la fuente.
translation_notes:
  revision_awareness: La frase inglesa fue revisada desde una lectura hostil («speak against you») a una lectura más estrictamente quotativa («say concerning you»). La versión española sigue esa revisión y evita introducir un matiz adversativo que el texto etiópico no obliga a fijar.
  spanish_consistency_notes:
  - Se mantiene «Y cuando» para el conector temporal.
  - Se conserva la segunda persona plural implícita mediante «ustedes».
  - Se evita «contra ustedes» porque el audit trail actual favorece una lectura más neutral de la preposición.
  - «pecadores» traduce la categoría moral sin añadir glosa interpretativa.
