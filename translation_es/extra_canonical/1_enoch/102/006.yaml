review_pass:
  verdict: revise
  source_alignment_summary: La fuente ge'ez dice literalmente algo como «Y cuando mueran/mueran ustedes, los pecadores dirán acerca de/sobre ustedes». El rastro auditado en inglés fue revisado correctamente a «will say concerning you,» porque ይብሉ funciona como verbo de decir que introduce el discurso siguiente, no como una acción cerrada de «hablar contra». El borrador español acierta al evitar «contra», pero «hablarán sobre ustedes» suena menos fiel al valor básico de ይብሉ que «dirán acerca de ustedes».
  spanish_quality_summary: El borrador es comprensible, pero «hablarán sobre ustedes» resulta algo poco natural en este contexto y puede sugerir un discurso prolongado o una referencia física. «Dirán acerca de ustedes» o «dirán de ustedes» suena más idiomático y preserva mejor la función quotativa abierta hacia la continuación del discurso. También conviene mantener el tratamiento de segunda persona plural coherente; «ustedes» está bien para un español latinoamericano neutro.
  glossary_alignment: No hay términos del glosario principal especialmente activados aquí. «Los pecadores» alinea bien con ኃጥኣን. No hay conflicto terminológico teológico.
  issues:
  - severity: medium
    issue: «hablarán» no refleja tan bien como «dirán» el verbo ge'ez ይብሉ
    rationale: La revisión inglesa documenta que el verbo introduce el discurso de los pecadores. En español, «dirán» conserva de manera más directa esa función quotativa.
  - severity: medium
    issue: «sobre ustedes» es menos idiomático y más ambiguo que «acerca de ustedes»
    rationale: Aunque «sobre» puede funcionar, en este contexto suena más torpe y menos claramente temático. «Acerca de ustedes» reproduce mejor el valor de ‘concerning you’ sin forzar hostilidad.
  - severity: low
    issue: Falta reproducir en español la apertura hacia la cita o continuación
    rationale: El inglés auditado termina con coma porque introduce lo que los pecadores dirán a continuación. El español debe conservar esa apertura con coma final.
  revised_spanish_text: Y cuando mueran, los pecadores dirán acerca de ustedes,
  revision_rationale: Se ajusta «hablarán» a «dirán» para seguir más de cerca el verbo básico ge'ez y su función de introducir el discurso siguiente. Se cambia «sobre ustedes» por «acerca de ustedes» para un español más natural y más fiel al valor tópico documentado en la revisión inglesa. Se conserva la coma final porque la frase queda abierta hacia la cita o contenido que sigue en el contexto.
