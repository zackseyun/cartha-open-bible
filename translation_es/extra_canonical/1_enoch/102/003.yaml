translation:
  language: es
  text: Y todos los ángeles cumplirán su mandato, y procurarán esconderse [a]de delante de la Gran Gloria; y los hijos de la tierra temblarán y quedarán confundidos. Pero ustedes, pecadores, son malditos para siempre, y no habrá paz para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: “de la presencia de la Gran Gloria”. El ge''ez usa una expresión semítica literalmente equivalente a “de delante de”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወኵሎሙ፡ መላእክት፡
  english_pob_choice: And all the angels
  chosen_spanish: Y todos los ángeles
  alternatives_spanish:
  - Y todos los mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico, መላእክት se refiere a seres celestiales, no a mensajeros humanos; por eso “ángeles” preserva el marco cósmico.
- source_word: ይፌጽሙ፡ ትእዛዞሙ
  english_pob_choice: will carry out their commands
  chosen_spanish: cumplirán su mandato
  alternatives_spanish:
  - ejecutarán su orden
  - llevarán a cabo su mandato
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa ejecutar o llevar a cumplimiento, y el sustantivo es singular en el ge'ez; “mandato” conserva la fuerza autoritativa con español natural. Aunque el inglés POB fue revisado desde “their command” a “their commands”, aquí la base morfológica y el paralelo griego singular favorecen un singular distributivo en español.
- source_word: ይፈቅዱ ... ይትኀብኡ
  english_pob_choice: will seek to hide themselves
  chosen_spanish: procurarán esconderse
  alternatives_spanish:
  - querrán esconderse
  - buscarán esconderse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La combinación es idiomática: el verbo de querer/desear funciona con valor intentivo ante el infinitivo de esconderse. “Procurarán” expresa bien la intención activa sin forzar el español.'
- source_word: እምቅድመ
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - ante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión semítica se conserva con un español bíblico claro. “De delante de” mantiene el matiz de retirada de una presencia, sin resolverlo demasiado en una paráfrasis.
- source_word: ዐቢይ፡ ስብሐት
  english_pob_choice: the Great Glory
  chosen_spanish: la Gran Gloria
  alternatives_spanish:
  - la gran majestad
  - la gran gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La audit trail inglesa trata esta expresión como título divino/circunlocución reverencial. En español, capitalizarla con “Gran Gloria” preserva ese valor titular; el artículo femenino sigue el sustantivo español “gloria”.
- source_word: ደቂቀ፡ ምድር
  english_pob_choice: the children of the earth
  chosen_spanish: los hijos de la tierra
  alternatives_spanish:
  - los habitantes de la tierra
  - los hijos de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se conserva la expresión filial literal porque es densa y característica del lenguaje apocalíptico. “Hijos de la tierra” mantiene el color del original mejor que “habitantes”. '
- source_word: ይርዕዱ
  english_pob_choice: will tremble
  chosen_spanish: temblarán
  alternatives_spanish:
  - se estremecerán
  - quedarán temblando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La reacción corporal de miedo o conmoción se expresa naturalmente con “temblarán”, que encaja con el juicio escatológico.
- source_word: ይትሀወኩ
  english_pob_choice: be thrown into confusion
  chosen_spanish: serán puestos en confusión
  alternatives_spanish:
  - serán confundidos
  - caerán en confusión
  - serán perturbados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica turbación/desorientación. “Ser puestos en confusión” conserva la pasividad causada por el juicio y la solemnidad del pasaje.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Pecadores” es el equivalente directo y natural en español para esta designación moral-religiosa.
- source_word: ርጉማን ለዓለም
  english_pob_choice: accursed forever
  chosen_spanish: están malditos para siempre
  alternatives_spanish:
  - están malditos por siempre
  - son malditos para siempre
  - están bajo maldición para siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula de juicio expresa una condición permanente. “Están malditos para siempre” es fiel y idiomática; “bajo maldición” suena más explicativo, pero menos contundente.
- source_word: አልብክሙ ሰላመ
  english_pob_choice: there will be no peace for you
  chosen_spanish: no habrá paz para ustedes
  alternatives_spanish:
  - ustedes no tendrán paz
  - no hay paz para ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción niega paz al destinatario en futuro profético. “No habrá paz para ustedes” sigue con naturalidad el tono oracular.
theological_decisions:
- issue: Referencia de “la Gran Gloria”
  english_pob_reading: A reverential circumlocution for the divine presence or majesty
  chosen_spanish_reading: Una circunlocución reverente para la presencia o majestad divina
  alternative_spanish_readings:
  - Una gloria celestial abstracta
  - La gloria de la corte celestial en general
  rationale: El texto no nombra a Dios explícitamente, pero el sintagma funciona en el corpus enoquico como título reverencial. Mantener “Gran Gloria” preserva la tensión teológica sin resolverla de manera reductiva.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Valor de “mandato” frente a una lectura plural
  english_pob_reading: their command(s)
  chosen_spanish_reading: su mandato
  alternative_spanish_readings:
  - sus mandatos
  - su orden
  rationale: Aunque el inglés auditado pasó por una revisión a plural, el ge'ez y el paralelo griego sostienen singular morfológico. En español, “su mandato” conserva esa base y evita sobrerrepresentar el número.
  doctrine_reference: Principio de prioridad morfológica del texto fuente
- issue: “Hijos de la tierra” como expresión apocalíptica
  english_pob_reading: The children of the earth is a literal expression; it can function broadly for earth's inhabitants, especially humankind under judgment.
  chosen_spanish_reading: Expresión literal que puede abarcar a los moradores de la tierra, especialmente a la humanidad bajo juicio
  alternative_spanish_readings:
  - los habitantes de la tierra
  - la humanidad
  rationale: Se conserva la metáfora filial porque tiene peso intertextual y apocalíptico. La lectura amplia queda disponible sin borrar la literalidad del original.
  doctrine_reference: Mantener imaginería apocalíptica sin aplanarla
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que corrige el número de “mandato/commands”; sin embargo, la solución española adopta un singular distributivo por la morfología del ge'ez (ትእዛዝ) y su paralelo griego singular, manteniendo el sentido colectivo en contexto. También se preservó la capitalización reverencial de “Gran Gloria” conforme a la adjudicación más reciente.
  spanish_consistency_notes:
  - Se usa “Yahvé” cuando el texto fuente lo requiera; aquí no aparece el nombre divino explícito.
  - Se mantuvo “ángeles”, no “mensajeros”, por el contexto celestial.
  - Se preservó “Gran Gloria” con mayúsculas internas como título reverencial.
  - Se optó por “pecadores” y “malditos” para conservar el registro de juicio apocalíptico.
  - La nota a pie marca la alternativa semítica de እምቅድመ sin duplicar otras variantes ya explicadas en decisiones léxicas.
