translation:
  language: es
  text: En aquellos días, si un fuego feroz[a] desciende sobre ustedes, ¿adónde huirán, y dónde hallarán liberación? Y cuando él alce su voz contra ustedes[b], ¿no serán sacudidos y temerán[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El adjetivo aplicado a 'fuego' puede significar extraordinario, asombroso o terrible; aquí probablemente comunica un fuego destructivo e imponente.
    reason: lexical_alternative
  - marker: b
    text: La revisión del ge'ez favorece la lectura literal 'alce/levante su voz' más que 'pronuncie una palabra' o 'un decreto'.
    reason: source_note
  - marker: c
    text: 'La pregunta final es retórica y espera una respuesta afirmativa: ciertamente serán sacudidos y sentirán temor.'
    reason: cultural_note
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la fórmula apocalíptica temporal estándar; 'aquellos' conserva el tono elevado y la distancia escatológica mejor que una localización más neutra.
- source_word: ዕፁብ እሳት
  english_pob_choice: a fierce fire
  chosen_spanish: un fuego feroz
  alternatives_spanish:
  - un fuego terrible
  - un fuego espantoso
  - un fuego extraordinario
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo admite matices de algo terrible, extraordinario o impresionante. 'Feroz' comunica bien el carácter destructivo y amenazante sin sobreexplicar.
- source_word: ወረደ
  english_pob_choice: descends
  chosen_spanish: desciende
  alternatives_spanish:
  - baja
  - cae
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Desciende'' mantiene la imagen de algo que viene desde arriba, apropiada para el lenguaje de juicio.'
- source_word: ዴቤክሙ
  english_pob_choice: upon you / against you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - sobre vosotros
  - contra ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción con fuego pide 'sobre ustedes' en español natural; la adversatividad queda implícita por el contexto de amenaza.
- source_word: በአይቴ ትነፍፁ
  english_pob_choice: where will you flee
  chosen_spanish: ¿adónde huirán?
  alternatives_spanish:
  - ¿adónde escaparán?
  - ¿a dónde correrán?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Huirán'' preserva el verbo de fuga con registro digno y directo. ''Adónde'' funciona bien en una pregunta de destino.'
- source_word: በአይቴ ትድኅኑ
  english_pob_choice: where will you be delivered
  chosen_spanish: ¿adónde serán librados?
  alternatives_spanish:
  - ¿adónde encontrarán libramiento?
  - ¿adónde serán salvados?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Serán librados'' reproduce el campo semántico de liberación sin imponer todavía la carga doctrinal de ''salvados''.'
- source_word: ይወዲ ቃሎ
  english_pob_choice: he lifts up his voice
  chosen_spanish: él alce su voz
  alternatives_spanish:
  - él levante su voz
  - él alza su voz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail indica que el giro ge'ez corresponde a una locución idiomática sobre levantar/alzar la voz. El subjuntivo después de 'cuando' es natural en español y conserva el valor de evento futuro o condicional.
- source_word: አኮ ትትመሀከዉ
  english_pob_choice: will you not be shaken
  chosen_spanish: ¿no serán sacudidos?
  alternatives_spanish:
  - ¿no serán conmovidos?
  - ¿no se estremecerán?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sacudidos'' mantiene la imagen de perturbación física y la pasividad del verbo original. Es fiel y comprensible en español moderno.'
- source_word: ወትፈርሁ
  english_pob_choice: and fear
  chosen_spanish: y temerán
  alternatives_spanish:
  - y tendrán miedo
  - y se asustarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Temerán'' conserva el paralelo poético y el verbo de temor sin perder solemnidad.'
theological_decisions:
- issue: El sujeto de 'alce su voz' y la forma de expresar la amenaza verbal
  english_pob_reading: When he lifts up his voice against you
  chosen_spanish_reading: cuando él alce su voz contra ustedes
  alternative_spanish_readings:
  - cuando su voz se alce contra ustedes
  - cuando él levante su voz contra ustedes
  rationale: El audit trail reciente corrige una lectura impersonal. Se mantiene el sujeto explícito 'él' y la locución 'alce su voz', que expresa una amenaza verbal activa sin convertirla en 'decreto' ni neutralizar su carácter personal.
  doctrine_reference: Preservar la tensión del texto fuente y la ambigüedad sobre la identidad del agente, sin armonizar prematuramente.
- issue: La fuerza judicial de la escena de juicio
  english_pob_reading: the word/voice comes or is lifted up against you
  chosen_spanish_reading: él alce su voz contra ustedes
  alternative_spanish_readings:
  - la palabra venga contra ustedes
  - se pronuncie un decreto contra ustedes
  rationale: El contexto escatológico sugiere juicio, pero el texto ge'ez, según la revisión, habla de voz/clamor levantado. El español conserva esa imagen y deja que el contexto comunique la severidad.
  doctrine_reference: Mantener la transparencia al idioma original y no resolver artificialmente la tensión léxica entre 'voz' y 'sentencia'.
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje de revisión posterior que corrigió una lectura anterior de 'word comes against you' hacia la locución idiomática 'he lifts up his voice against you'. Por eso la versión española usa 'alce su voz' y no 'la palabra' ni 'el decreto'. También se ajustó la escena para reflejar el sujeto personal explícito.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en este proyecto cuando aparezca el tetragrámaton; aquí no aparece.
  - Se prefirió 'librados' para mantener el campo de liberación sin imponer 'salvados'.
  - Se mantuvo un registro solemne, apto para literatura apocalíptica, con preguntas retóricas claras y directas.
