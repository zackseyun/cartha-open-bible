revisions:
- from: No teman[a], ustedes, almas de los justos, y esperen, ustedes que han muerto en justicia.
  to: No teman[a], almas de los justos, y tengan esperanza, ustedes que han muerto en justicia.
  rationale: Se suaviza la sintaxis eliminando una repetición innecesaria de «ustedes» y se reemplaza «esperen» por «tengan esperanza» para evitar la ambigüedad de 'aguardar' y reflejar con mayor claridad la exhortación a la esperanza presente en el original y en la justificación léxica del POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:18:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del ge''ez y del POB en inglés: doble exhortación imperativa a los justos muertos, conservación de «almas» con nota alternativa «espíritus», y mantenimiento del sintagma nominal «en justicia». Sin embargo, la redacción repite innecesariamente «ustedes» dos veces, algo no exigido por el original, y «justos» en «almas de los justos» se aleja ligeramente del POB inglés «righteous» en un contexto donde «los justos»/«los rectos» ambos caben, aunque aquí no es problemático. La mejora principal es estilística y de legibilidad, no de contenido.'
  spanish_quality_summary: El texto es comprensible, pero suena algo pesado por la duplicación de «ustedes». En español bíblico natural, «No teman[a], almas de los justos, y tengan esperanza, ustedes que han muerto en justicia» o «... y esperen...» fluye mejor. Además, «tengan esperanza» expresa con más claridad el valor exhortativo de «hope» en español religioso general que el simple «esperen», que puede sonar ambiguo como 'wait'.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Almas» respeta la decisión antropológica del POB y la nota con «espíritus» está bien. «Justicia» mantiene visible el sustantivo correspondiente a በጽድቅ. No hay términos divinos o cristológicos implicados aquí.
  issues:
  - severity: medium
    issue: Repetición innecesaria de «ustedes»
    rationale: El ge'ez incluye el pronombre plural, pero el español no necesita repetirlo dos veces. La repetición vuelve la frase torpe sin añadir fidelidad semántica.
  - severity: medium
    issue: «Esperen» puede leerse como 'aguarden' más que como 'tengan esperanza'
    rationale: Aunque es defendible, en español amplio «esperar» es ambiguo. Dado que el sentido documentado es exhortación a la esperanza, «tengan esperanza» comunica mejor el valor semántico sin apartarse del original.
  revised_spanish_text: No teman[a], almas de los justos, y tengan esperanza, ustedes que han muerto en justicia.
  revised_footnotes:
  - marker: a
    text: O «espíritus de los justos». El término ge'ez puede significar alma, vida, yo o espíritu según el contexto.
    reason: lexical_alternative
  revision_rationale: Se suaviza la sintaxis eliminando una repetición innecesaria de «ustedes» y se reemplaza «esperen» por «tengan esperanza» para evitar la ambigüedad de 'aguardar' y reflejar con mayor claridad la exhortación a la esperanza presente en el original y en la justificación léxica del POB.
