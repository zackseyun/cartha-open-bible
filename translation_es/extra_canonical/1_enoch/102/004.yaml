translation:
  language: es
  text: No teman[a], almas de los justos, y tengan esperanza, ustedes que han muerto en justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritus de los justos». El término ge'ez puede significar alma, vida, yo o espíritu según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: አትፍርሁ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No se asusten
  - No teman
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo negativo plural pide una exhortación directa. «No teman» conserva la fuerza exhortativa sin volverlo arcaico.
- source_word: ነፍሰ ጻድቃን
  english_pob_choice: souls of the righteous
  chosen_spanish: almas de los justos
  alternatives_spanish:
  - espíritus de los justos
  - vidas de los justos
  - almas de los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ነፍስ» puede ser alma, vida, yo o espíritu según el contexto. En este llamado dirigido a los muertos, «almas» preserva la identidad postmortem sin resolver indebidamente la tensión alma/espíritu.
- source_word: ወተስፈዉ
  english_pob_choice: and hope
  chosen_spanish: y esperen
  alternatives_spanish:
  - y esperen
  - y tengan esperanza
  - y confíen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor imperativo exhorta a la expectativa confiada. «Esperen» comunica el mandato con naturalidad en español y mantiene el paralelismo con el mandato anterior.
- source_word: እለ ሞትክሙ
  english_pob_choice: you who have died
  chosen_spanish: ustedes que han muerto
  alternatives_spanish:
  - ustedes que murieron
  - los que han muerto
  - ustedes que han muerto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma relativa con sufijo plural se traduce de manera directa como un vocativo relativo. «Han muerto» conserva el estado resultante y la dirección a los difuntos justos.
- source_word: በጽድቅ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en justicia
  - en rectitud
  - justamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo «צדק/ጽድቅ» se mantiene visible como «justicia» para preservar su fuerza nominal. «En justicia» refleja bien la construcción preposicional y evita reducirla a un adverbio.
theological_decisions:
- issue: Término antropológico para los difuntos justos
  english_pob_reading: souls of the righteous
  chosen_spanish_reading: almas de los justos
  alternative_spanish_readings:
  - espíritus de los justos
  - vidas de los justos
  rationale: Sigo la lectura POB que preserva la referencia a la identidad continua de los justos después de la muerte. «Almas» mantiene la tensión antropológica sin imponer una definición técnica no explicitada por el ge'ez.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue la lectura auditada del POB en inglés y no introduce cambios de sentido respecto del texto ge'ez recuperado. Se conserva la exhortación plural, la dirección a los muertos justos y la ambigüedad controlada de ነፍስ.
  spanish_consistency_notes:
  - Se prefirió «justos/justicia» para mantener visible la raíz de δικαιοσύνη/צדק-equivalentes semánticos en estilo bíblico.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes porque el verso no contiene el nombre divino.
  - La segunda persona plural se expresa de forma explícita en español para reflejar el አንትሙ del original.
