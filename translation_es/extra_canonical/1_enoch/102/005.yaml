base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/102/005.yaml
  text: And do not grieve if your soul has gone down into Sheol in sorrow[a], and your flesh did not fare according to your goodness during your life; but wait for the day of the judgment of sinners[c][b], and for the day of curse and punishment.
  footnotes:
  - marker: a
    text: Or 'your flesh did not receive as your goodness deserved during your life.' The Ge'ez leaves the object of 'receive' unstated, so the line likely refers to lacking due recompense in earthly life.
