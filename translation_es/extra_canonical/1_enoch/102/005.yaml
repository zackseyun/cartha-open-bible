review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura y el sentido general del ge''ez: prohibición de afligirse, descenso del alma a Sheol, falta de retribución correspondiente en la vida terrenal y espera del juicio de los pecadores. También mantiene correctamente «Sheol» y «carne». Sin embargo, la cláusula «vuestra carne no recibió» suena incompleta y poco idiomática en español, y el cierre «la maldición y del castigo» contiene un error gramatical.'
  spanish_quality_summary: 'El registro es digno y comprensible, pero hay dos problemas de legibilidad importantes: «no recibió» sin objeto resulta forzado en español de un modo más severo que en inglés, y «la maldición y del castigo» es incorrecto. Además, «sino aguardad» funciona, aunque «más bien aguardad» o «pero aguardad» fluye mejor tras una negativa previa.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: «Sheol» se preserva apropiadamente; «carne» mantiene la fuerza literal; no hay conflictos con términos doctrinales base. La nota cultural sobre Sheol está bien. Conviene ajustar la cláusula verbal para reflejar la apertura semántica documentada sin producir un español antinatural.'
  issues:
  - severity: high
    issue: «vuestra carne no recibió» es español incompleto y poco natural
    rationale: Aunque el ge'ez deja implícito el objeto de «recibir», en español esa elipsis suena defectuosa. El inglés auditado ya resolvió esto en el texto principal con «did not fare», y el español necesita una solución equivalente como «no fue tratada» o «no tuvo» para conservar apertura semántica sin sonar roto.
  - severity: high
    issue: «el día de la maldición y del castigo» contiene una discordancia gramatical
    rationale: Tras «el día de», la coordinación correcta aquí es «de la maldición y del castigo» solo si ambos dependen claramente del mismo régimen, pero en la frase dada falta paralelismo desde el primer sustantivo y el texto mismo reporta «la maldición y del castigo» como elección léxica. La forma natural es «el día de maldición y castigo» o «el día de la maldición y el castigo».
  - severity: medium
    issue: La nota [a] añade «ni os lamentéis», que expande el original
    rationale: Como alternativa léxica no es gravísimo, pero introduce una acción adicional no presente explícitamente. Es preferible una alternativa más ceñida como «no os aflijáis».
  - severity: medium
    issue: El marcador de nota sobre la cláusula difícil debería anclarse a una solución española más natural
    rationale: Si se revisa la cláusula principal, la nota debe acompañar exactamente esa nueva formulación y explicar la alternativa más literal y la elipsis del objeto.
