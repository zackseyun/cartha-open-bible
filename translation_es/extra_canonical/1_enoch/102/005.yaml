translation:
  language: es
  text: Y no os entristezcáis[a] si vuestra alma ha descendido a Sheol[b] en dolor, y vuestra carne no fue tratada[c] durante vuestra vida según vuestra bondad; más bien, aguardad el día del juicio de los pecadores y el día de maldición y castigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no os aflijáis».'
    reason: lexical_alternative
  - marker: b
    text: Sheol es el reino de los muertos en la imaginación apocalíptica judía; no equivale necesariamente al infierno cristiano posterior.
    reason: cultural_note
  - marker: c
    text: Lit. «vuestra carne no recibió durante vuestra vida según vuestra bondad». El ge'ez deja implícito el objeto de «recibió», por lo que la línea probablemente se refiere a no haber recibido en esta vida lo que correspondía a su bondad.
    reason: lexical_alternative
lexical_decisions:
- source_word: አት ኅዘኑ
  english_pob_choice: do not grieve
  chosen_spanish: no os entristezcáis
  alternatives_spanish:
  - no os aflijáis
  - no os entristezcáis ni os lamentéis
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo negativo se dirige a los oyentes y prohíbe la tristeza. «Entristecerse» comunica bien el valor afectivo sin sonar excesivamente arcaico; mantiene el tono exhortativo del pasaje.
- source_word: ወረደት ነፍስክሙ ውስተ ሲኦል
  english_pob_choice: your soul has gone down into Sheol
  chosen_spanish: vuestra alma ha descendido a Sheol
  alternatives_spanish:
  - vuestra alma ha bajado a Sheol
  - vuestra alma descendió a Sheol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen de descenso y el término técnico «Sheol» para no borrar la cosmología del judaísmo del Segundo Templo ni sustituirla por «sepulcro» o «infierno».
- source_word: በሐዘን
  english_pob_choice: in sorrow
  chosen_spanish: en dolor
  alternatives_spanish:
  - en tristeza
  - con dolor
  - en pena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo acompaña el descenso del alma y describe su condición; «dolor» es natural en español y conserva el peso afectivo del contexto.
- source_word: ኢረከበ ሥጋክሙ በሕይወትክሙ
  english_pob_choice: your flesh did not fare according to your goodness during your life
  chosen_spanish: vuestra carne no recibió durante vuestra vida según vuestra bondad
  alternatives_spanish:
  - vuestro cuerpo no recibió durante vuestra vida según vuestra bondad
  - vuestra carne no obtuvo durante vuestra vida lo que vuestra bondad merecía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Carne» preserva la fuerza literal y teológica del término. Se mantiene la ambigüedad del verbo sin introducir un objeto que el ge'ez no expresa explícitamente.
- source_word: በከመ ኂሩትክሙ
  english_pob_choice: according to your goodness
  chosen_spanish: según vuestra bondad
  alternatives_spanish:
  - de acuerdo con vuestra bondad
  - conforme a vuestra bondad
  - según vuestra rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Bondad» es transparente y no fuerza el matiz hacia mérito, virtud o generosidad más allá de lo que el texto permite. Mantiene abierta la relación entre la bondad y lo recibido.
- source_word: አላ ጽንሑ
  english_pob_choice: but wait
  chosen_spanish: sino aguardad
  alternatives_spanish:
  - pero esperad
  - sino esperad
  - mas aguardad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adversativo introduce contraste con la situación presente. «Aguardar» sostiene mejor el tono solemne y la orientación temporal hacia el día mencionado después.
- source_word: ለዕለተ እንተ ኵነኔ ኃጥኣን
  english_pob_choice: for the day of the judgment of sinners
  chosen_spanish: el día del juicio de los pecadores
  alternatives_spanish:
  - el día del juicio de los pecadores
  - el día en que los pecadores serán juzgados
  - el día del juicio contra los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la fórmula judicial apocalíptica y la referencia explícita a los pecadores como objeto del juicio.
- source_word: መርገም ወመቅሠፍት
  english_pob_choice: curse and punishment
  chosen_spanish: la maldición y del castigo
  alternatives_spanish:
  - la maldición y el castigo
  - la maldición y la aflicción
  - la maldición y la corrección
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Maldición» conserva la dureza del binomio final y «castigo» mantiene el sentido judicial sin especificar una modalidad que el texto no determina.
theological_decisions:
- issue: Renderización de ሲኦል
  english_pob_reading: Sheol as the realm of the dead in Jewish apocalyptic thought, not later Christian hell
  chosen_spanish_reading: Sheol como el reino de los muertos en la imaginación apocalíptica judía, no como el infierno cristiano posterior
  alternative_spanish_readings:
  - el sepulcro
  - el inframundo
  - el infierno
  rationale: Se preserva el término propio para no sustituir una categoría judía antigua por una noción posterior distinta. El préstamo «Sheol» ayuda a mantener la tensión cosmológica del pasaje.
  doctrine_reference: Primacía de la fuente original y preservación del imaginario apocalíptico.
- issue: Sentido de «vuestra carne no recibió»
  english_pob_reading: the righteous did not receive in embodied life what corresponded to their goodness
  chosen_spanish_reading: la vida encarnada no recibió lo que correspondía a su bondad, sin resolver explícitamente si se trata de recompensa o de trato debido
  alternative_spanish_readings:
  - vuestra carne no recibió recompensa en esta vida
  - vuestra carne no obtuvo su debido
  rationale: El ge'ez deja el objeto de «recibir» implícito; por eso el español conserva la apertura semántica y no fija de antemano «recompensa», aunque esa sea una posibilidad contextual.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'La traducción sigue el texto ge''ez y toma en cuenta el audit trail inglés: se mantiene el imperativo negativo, el descenso a Sheol, la ambigüedad del verbo «recibir» sin objeto expreso, y el cierre judicial con «juicio», «maldición» y «castigo». Se evita mecanizar desde el inglés cuando el español permite una formulación más natural sin perder el valor literal.'
  spanish_consistency_notes:
  - Se usa «Sheol» en transliteración, conforme a la decisión POB de preservar el término técnico.
  - Se elige «carne» para ሥጋ, manteniendo la literalidad teológica.
  - Se traduce ኂሩት como «bondad» para no sobrecargar el verso con «mérito» o «rectitud» sin apoyo explícito.
  - El registro es solemne pero contemporáneo, apto para lectura pública y auditoría.
  - Se evita «SEÑOR» o equivalentes porque el texto no contiene el Tetragrámaton ni un κύριος citacional.
