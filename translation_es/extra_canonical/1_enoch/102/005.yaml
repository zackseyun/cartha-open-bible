revisions:
- from: Y no os entristezcáis[a] si vuestra alma ha descendido a Sheol[b] en dolor, y vuestra carne no recibió[c] durante vuestra vida según vuestra bondad; sino aguardad el día del juicio de los pecadores y el día de la maldición y del castigo.
  to: Y no os entristezcáis[a] si vuestra alma ha descendido a Sheol[b] en dolor, y vuestra carne no fue tratada[c] durante vuestra vida según vuestra bondad; más bien, aguardad el día del juicio de los pecadores y el día de maldición y castigo.
  rationale: 'Se corrige un error gramatical evidente al final del versículo y se reemplaza «no recibió» por «no fue tratada» para producir un español natural que preserve la ambigüedad documentada: la persona justa no recibió en su vida terrenal un trato correspondiente a su bondad, sin especificar explícitamente «recompensa». También se ajusta la nota [a] para no expandir innecesariamente el original y se mantiene «Sheol» y «carne» conforme al proyecto.'
  reviewer_model: gpt-5.4
