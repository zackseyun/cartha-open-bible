translation:
  language: es
  text: Y desde allí continué mi viaje hacia el oriente, en medio de la cordillera del desierto; y vi un lugar solitario, pero lleno de árboles. Desde esta semilla brota agua por encima, y por encima aparece como un canal abundante que corre hacia el noroeste y lleva consigo agua y rocío.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: እምህየ
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde aquel lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma preposicional indica alejamiento de un lugar previamente mencionado. «Desde allí» conserva el valor de procedencia de manera natural en español contemporáneo.
- source_word: ሖርኩ
  english_pob_choice: I went
  chosen_spanish: seguí mi viaje
  alternatives_spanish:
  - fui
  - anduve
  - viajé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa movimiento narrativo en primera persona. Dado que el contexto español debe sonar fluido y el contexto inmediato sugiere desplazamiento continuo, «seguí mi viaje» conserva la idea de avanzar sin sobredeterminar el modo.
- source_word: መንገለ
  english_pob_choice: along the way
  chosen_spanish: mi viaje
  alternatives_spanish:
  - el camino
  - la senda
  - el trayecto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El testimonio disponible está truncado y el sentido direccional no debe forzarse con una preposición incompleta en español. La elección mantiene una formulación publicable y coherente con la revisión inglesa que entendió el segmento como una frase de desplazamiento, no como un destino plenamente explicitado.
