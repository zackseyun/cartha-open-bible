lexical_decisions:
- source_word: እምህየ
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde aquel lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma preposicional indica alejamiento de un lugar previamente mencionado. «Desde allí» conserva el valor de procedencia de manera natural en español contemporáneo.
- source_word: ሖርኩ
  english_pob_choice: I went
  chosen_spanish: seguí mi viaje
  alternatives_spanish:
  - fui
  - anduve
  - viajé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa movimiento narrativo en primera persona. Dado que el contexto español debe sonar fluido y el contexto inmediato sugiere desplazamiento continuo, «seguí mi viaje» conserva la idea de avanzar sin sobredeterminar el modo.
- source_word: መንገለ
  english_pob_choice: along the way
  chosen_spanish: mi viaje
  alternatives_spanish:
  - el camino
  - la senda
  - el trayecto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El testimonio disponible está truncado y el sentido direccional no debe forzarse con una preposición incompleta en español. La elección mantiene una formulación publicable y coherente con la revisión inglesa que entendió el segmento como una frase de desplazamiento, no como un destino plenamente explicitado.
theological_decisions:
- issue: Fragmentariedad del testimonio y alcance semántico de la frase de movimiento
  english_pob_reading: And from there I went on a journey..[a][b], .
  chosen_spanish_reading: Y desde allí seguí mi viaje.
  alternative_spanish_readings:
  - Y desde allí fui.
  - Y desde allí viajé.
  rationale: 'No hay contenido doctrinal explícito en el verso, pero sí una tensión textual: el pasaje es fragmentario y no conviene traducir literalmente un segmento direccional incompleto de modo que suene roto en español. Se opta por una solución sobria que preserva el movimiento narrativo sin añadir elementos no atestiguados.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección del audit trail que restituye el tramo faltante del verso y la revisión que descartó «toward» en favor de una expresión de viaje continuo. Dado que el texto fuente visible sigue siendo fragmentario en el expediente suministrado, la redacción española evita sobreespecificar el destino.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y literario, apto para lectura eclesial.
  - Se evita el calco mecánico de «on a journey» y se privilegia una equivalencia natural en español.
  - Los marcadores de nota aparecen exactamente en el texto principal y están anclados al final de la oración.
