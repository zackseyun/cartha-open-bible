translation:
  language: es
  text: Y después de esto vi todas las cosas ocultas[a] de los cielos, y cómo el reino está dividido[b], y cómo las obras de los seres humanos son pesadas en la balanza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los secretos de los cielos». El término ge''ez puede denotar cosas ocultas a la vista o al conocimiento ordinario.'
    reason: lexical_alternative
  - marker: b
    text: La cláusula «el reino está dividido» es difícil. Puede referirse al ordenamiento o a la distribución del ámbito celestial.
    reason: alternative_reading
  - marker: c
    text: Literalmente, el texto habla de las obras humanas pesadas con imagen de balanza, lo que sugiere juicio o evaluación.
    reason: cultural_note
lexical_decisions:
- source_word: እምድኅረዝ
  english_pob_choice: after this
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Luego de esto
  - Después de estas cosas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula marca transición temporal en una visión apocalíptica; «después de esto» conserva el orden narrativo sin volverlo arcaico.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo visionario en primera persona se expresa de manera directa y natural en español con «vi».
- source_word: ኵሎ ኅቡኣቲሁ ለሰማያት
  english_pob_choice: all the hidden things of the heavens
  chosen_spanish: todas las cosas escondidas de los cielos
  alternatives_spanish:
  - todos los secretos de los cielos
  - todos los misterios de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cosas escondidas» conserva el plural concreto del ge'ez y evita imponer una abstracción teológica como «misterios».
- source_word: መንግሥተ
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el dominio
  - la realeza
  - el orden real
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Reino» es la equivalencia más transparente y mantiene el alcance cósmico-político del término en este contexto apocalíptico.
- source_word: ትትካፈል
  english_pob_choice: is divided
  chosen_spanish: está dividido
  alternatives_spanish:
  - está repartido
  - está apportionado
  - está distribuido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen ge'ez admite tanto división como repartición; «está dividido» preserva la tensión y la dificultad sin resolverla en exceso.
- source_word: ትገበረ ሰብእ
  english_pob_choice: the deeds of human beings
  chosen_spanish: las obras de los seres humanos
  alternatives_spanish:
  - las acciones de los hombres
  - el obrar humano
  - las obras de la gente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obras» refleja bien el campo semántico de lo hecho/obrado, y «seres humanos» evita un masculino genérico innecesario.
- source_word: በመዳልው
  english_pob_choice: in the balance
  chosen_spanish: en la balanza
  alternatives_spanish:
  - en la báscula
  - en los platillos de la balanza
  - en el peso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen de juicio usa instrumental de pesaje; «balanza» conserva la metáfora concreta y reconocible.
- source_word: ይደለው
  english_pob_choice: are weighed
  chosen_spanish: son pesadas
  alternatives_spanish:
  - son medidas
  - son evaluadas
  - se pesan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo del original y la imagen de balanza se expresan naturalmente con «son pesadas», manteniendo el tono judicial/apocalíptico.
theological_decisions:
- issue: Sentido de «el reino está dividido»
  english_pob_reading: a cosmic kingdom/order is seen as divided or apportioned
  chosen_spanish_reading: el reino es visto como dividido, sin precisar si la división implica reparto, ordenamiento o partición
  alternative_spanish_readings:
  - el reino celestial está repartido entre órdenes
  - el dominio está dispuesto en sus partes
  - el orden real está distribuido
  rationale: El ge'ez es condensado y difícil; la versión española conserva la ambigüedad en vez de explicarla. Así no se borra la tensión interpretativa documentada por la POB.
  doctrine_reference: Preservar la tensión textual sin fijar una cosmología no explicitada.
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés de la edición Charles 1906 y no requiere revisión adicional; se conservó la ambigüedad documental del sintagma sobre el reino y la imagen de pesaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no aparecen en el texto.
  - Se usó «seres humanos» para hacer explícito el plural humano sin alterar el sentido genérico de ሰብእ.
  - Se prefirió «balanza» sobre «escala(s)» para conservar la imagen de juicio con español natural y digno.
