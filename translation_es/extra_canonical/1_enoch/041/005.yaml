base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/041/005.yaml
  text: And I saw the storehouses of the sun and of the moon[a], where they come out and where they go in, and their glorious return; and one is more honored than the other. And their course is blessed, and they do not overstep their course, and they do not add to it, and they do not take away from their course[d][c][b]; and they keep faith with one another by an oath.
  footnotes:
  - marker: a
    text: Or 'treasuries.' The image is of heavenly chambers from which the sun and moon emerge and into which they return.
    reason: lexical_alternative
  - marker: b
    text: The clause 'one is more honored than the other' is difficult; it likely compares the relative splendor or rank of the sun and the moon.
    reason: alternative_reading
  - marker: c
    text: '''Keep faith with one another by an oath'' uses covenantal language for the ordered behavior of the heavenly bodies, not merely mechanical regularity.'
    reason: cultural_note
  - marker: d
    text: Or 'where they come out and where they go in—and their glorious return; and one is more honored than the other.'.
    reason: previous_rendering
