review_pass:
  verdict: revise
  source_alignment_summary: El borrador español capta bien el sentido general del ge'ez y preserva la imaginería cósmica de cámaras celestiales, la salida/entrada de los luminares, su retorno, el curso ordenado y el lenguaje teológico de bendición y fidelidad juramentada. Sin embargo, introduce una ligera sobrelectura al traducir አፎ con ‘cómo’ en el texto principal, cuando la revisión inglesa auditada finalmente volvió a ‘and one is more honored than the other’ por fluidez formal, manteniendo la dificultad en nota. Además, la puntuación y el anclaje de notas en ‘los [a]almacenes[b]’ son poco naturales en español.
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay detalles mejorables: ‘los [a]almacenes[b]’ suena torpe por duplicar notas sobre la misma palabra y cortar el flujo visual; ‘cómo uno es más honrado que el otro’ resulta algo forzado; ‘ni añaden a él’ es comprensible pero menos natural que ‘no le añaden nada’; y conviene afinar la nota difícil hacia la incertidumbre del comparativo en vez de presentar ‘cómo’ como decisión asentada.'
  glossary_alignment: Alineación general buena con la terminología del proyecto. ‘bendito’, ‘guardan fidelidad’ y ‘por un juramento’ preservan la carga teológica documentada. ‘almacenes’ es aceptable para መዛግብተ, aunque basta una sola nota léxica con alternativa ‘tesoros’ o ‘depósitos’. No hay conflictos con términos troncales del glosario del proyecto.
  issues:
  - severity: medium
    issue: ‘cómo uno es más honrado que el otro’ sobreinterpreta el pasaje difícil en el texto principal
    rationale: La documentación auditada reconoce la dificultad de አፎ ይከብር አሐዱ ለካልኡ. Aunque una revisión intermedia restauró ‘how’, la versión inglesa auditada final volvió a una formulación declarativa y dejó la dificultad en nota. En español conviene reflejar esa prudencia en el texto principal y explicar la partícula/dificultad en nota.
  - severity: medium
    issue: Anclaje y duplicación de notas en ‘los [a]almacenes[b]’
    rationale: Dos notas distintas sobre la misma palabra vuelven pesada la lectura y una de ellas repite casi el mismo contenido. El proyecto pide conservar alternativas significativas, no multiplicar notas redundantes.
  - severity: low
    issue: ‘ni añaden a él’ es menos idiomático en español
    rationale: Aunque es fiel, suena calcado. ‘No le añaden nada’ o ‘no añaden a su curso’ comunica mejor el paralelismo sin perder el sentido.
