- from: Y vi los [a]almacenes[b] del sol y de la luna, desde donde salen y donde entran, y su gloriosa vuelta; y cómo uno es más honrado que el otro[c]. Y su curso es bendito, y no sobrepasan su curso, ni añaden a él, ni quitan de su curso; y guardan fidelidad entre sí por un juramento.
  to: Y vi los almacenes[a] del sol y de la luna, de donde salen y donde entran, y su glorioso retorno; y uno es más honrado que el otro[b]. Y su curso es bendito, y no sobrepasan su curso, ni le añaden nada, ni quitan de su curso; y guardan fidelidad entre sí por un juramento[c].
  rationale: La revisión mantiene el sentido fuente y las decisiones teológicas de la POB, pero mejora la naturalidad del español y la disciplina de notas. Se evita sobreinterpretar la cláusula difícil con ‘cómo’ en el texto principal, se consolida la nota léxica sobre ‘almacenes’, y se alisa una expresión poco idiomática sin perder el paralelismo del original.
