translation:
  language: es
  text: Y vi los almacenes[a] del sol y de la luna, de donde salen y donde entran, y su glorioso retorno; y uno es más honrado que el otro[b]. Y su curso es bendito, y no sobrepasan su curso, ni le añaden nada, ni quitan de su curso; y guardan fidelidad entre sí por un juramento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘depósitos’ o ‘tesoros’. La imagen es la de cámaras celestiales de las que emergen el sol y la luna y a las que regresan.
    reason: lexical_alternative
  - marker: b
    text: La cláusula ‘uno es más honrado que el otro’ es difícil; probablemente compara el esplendor o rango relativo del sol y la luna. La fuente también permite percibir una fuerza interrogativa implícita, pero aquí se conserva una formulación más natural en español.
    reason: alternative_reading
  - marker: c
    text: ‘Guardan fidelidad entre sí por un juramento’ usa lenguaje de fidelidad pactal para la conducta ordenada de los cuerpos celestes, no mera regularidad mecánica.
    reason: cultural_note
lexical_decisions:
- source_word: መዛግብተ
  english_pob_choice: storehouses
  chosen_spanish: almacenes
  alternatives_spanish:
  - tesoros
  - depósitos
  - almacenes celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede ser ‘treasuries’ o ‘storehouses’. En español, ‘almacenes’ conserva la imagen concreta de cámaras o depósitos celestes sin forzar una lectura financiera de ‘tesoros’.
- source_word: ይወፅኡ / ይገብኡ
  english_pob_choice: come out / go in
  chosen_spanish: salen / entran
  alternatives_spanish:
  - salen / ingresan
  - salen / vuelven a entrar
  - brotan / entran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Son verbos básicos de movimiento. ‘Salen’ y ‘entran’ preservan la imagen visionaria de los astros que emergen y reingresan a sus cámaras sin interpretar demasiado con ‘salir/ponerse’.
- source_word: ግብኦቶሙ
  english_pob_choice: return
  chosen_spanish: vuelta
  alternatives_spanish:
  - retorno
  - regreso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cósmico, ‘vuelta’ comunica el retorno cíclico de forma natural en español, manteniendo la idea de reentrada sin tecnicismo.
- source_word: ስቡሕ
  english_pob_choice: glorious
  chosen_spanish: gloriosa
  alternatives_spanish:
  - espléndida
  - ilustre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Gloriosa’ reproduce el registro elevado y el matiz de gloria/esplendor del adjetivo ge’ez, coherente con el tono apocalíptico.
- source_word: አፎ ይከብር አሐዱ ለካልኡ
  english_pob_choice: one is more honored than the other
  chosen_spanish: cómo uno es más honrado que el otro
  alternatives_spanish:
  - cómo uno supera al otro en honor
  - cómo uno es más glorioso que el otro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula interrogativa አፎ se refleja con ‘cómo’, siguiendo la revisión auditada que pide restaurar la fuerza interrogativa. ‘Honrado’ conserva el comparativo de honor/gloria sin resolver la dificultad del sintagma.
- source_word: ምሕዋሮሙ
  english_pob_choice: their course
  chosen_spanish: su curso
  alternatives_spanish:
  - su órbita
  - su circuito
  - su trayectoria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Curso’ es amplio e idiomático para el movimiento celestial, y evita la tecnicidad moderna de ‘órbita’.
- source_word: ብፁዕ
  english_pob_choice: blessed
  chosen_spanish: bendito
  alternatives_spanish:
  - bendecido
  - feliz
  - favorecido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Bendito’ mantiene el registro religioso del texto y sugiere orden divino, como en la lectura teológica de la POB.
- source_word: ኢየኃልፉ ምሕዋረ
  english_pob_choice: they do not overstep their course
  chosen_spanish: no sobrepasan su curso
  alternatives_spanish:
  - no traspasan su curso
  - no se desvían de su curso
  - no exceden su curso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘No sobrepasan’ comunica bien la idea de no cruzar los límites establecidos, sin perder el matiz de transgresión espacial/ordenada.
- source_word: ኢይዌስኩ ወኢያኃጽጹ
  english_pob_choice: they do not add to it, and they do not take away from their course
  chosen_spanish: ni añaden a él, ni quitan de su curso
  alternatives_spanish:
  - ni aumentan ni disminuyen
  - ni le agregan ni le quitan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición preserva la estructura paralela del original. ‘Añaden/quitan’ mantiene la literalidad funcional y el sentido de no aumentar ni reducir su trayecto ordenado.
- source_word: ሃይማኖተ የዐቅቡ
  english_pob_choice: keep faith
  chosen_spanish: guardan fidelidad
  alternatives_spanish:
  - mantienen la fe
  - conservan fidelidad
  - guardan fe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí ሃይማኖተ expresa fidelidad/fiabilidad, no ‘fe’ doctrinal. ‘Guardan fidelidad’ conserva el matiz covenantal y evita una traducción confusamente eclesial.
- source_word: በመሐላ
  english_pob_choice: by an oath
  chosen_spanish: por un juramento
  alternatives_spanish:
  - con un juramento
  - bajo juramento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Por un juramento’ es idiomático en español y conserva el carácter solemne e instrumental del término.
theological_decisions:
- issue: Si la conducta de los astros debe leerse sólo como regularidad astronómica o también como obediencia pactal/teológica
  english_pob_reading: 'Retain explicitly theological language: ''blessed'' and ''keep faith ... by an oath.'''
  chosen_spanish_reading: 'Conservar lenguaje teológico explícito: ‘bendito’ y ‘guardan fidelidad ... por un juramento.’'
  alternative_spanish_readings:
  - 'lectura neutral: ‘regular’, ‘se mantienen en su acuerdo’'
  - ‘cumplen su recorrido’ sin lenguaje de fidelidad
  rationale: La fuente ge’ez usa vocabulario de bendición y fidelidad juramentada. La traducción no debe reducir la cosmología apocalíptica a mera mecánica astronómica.
  doctrine_reference: Preservar la tensión teológica sin resolverla; no aplanar la imaginería apocalíptica.
translation_notes:
  revision_awareness: 'Se incorporó la revisión que restituye la fuerza de ‘from where’/‘how’ en la sintaxis del pasaje, pero se optó por una formulación española natural: ‘desde donde’ y ‘cómo’. También se evitó emular mecánicamente el inglés en la estructura final, manteniendo el orden y el paralelismo del ge’ez.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando corresponde; aquí no aparece el nombre divino.
  - ‘Mesías/Cristo’ no aplica en este versículo.
  - Se mantuvo el registro apocalíptico con ‘bendito’, ‘gloriosa’ y ‘guardan fidelidad’.
  - Se evitó ‘siervo’/‘esclavo’ porque no aplica al texto.
  - Se preservó el paralelismo repetitivo de los verbos de movimiento y restricción.
