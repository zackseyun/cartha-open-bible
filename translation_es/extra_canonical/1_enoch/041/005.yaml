    reason: alternative_reading
  - marker: c
    text: ‘Guardan fidelidad entre sí por un juramento’ usa lenguaje de fidelidad pactal para la conducta ordenada de los cuerpos celestes, no mera regularidad mecánica.
    reason: cultural_note
