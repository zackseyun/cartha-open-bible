base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/041/003.yaml
  text: And there my eyes saw the hidden treasuries of the lightning and the thunder[a], and the hidden treasuries of the winds—how they are divided so that they may blow upon the earth—and the hidden treasuries of the clouds and the dew; and there I saw from where they come in that place[e][d][c][b], and from there they water the dust of the earth.
  footnotes:
  - marker: a
    text: Or 'storehouses' for 'hidden treasuries.' The Ge'ez term can denote hidden or reserved places/things; the translation keeps the cosmic-repository imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally 'their mouths are divided,' an anthropomorphic image for the outlets or openings of the winds.
    reason: lexical_alternative
  - marker: c
    text: The final clause may mean either that these phenomena 'saturate' the dust of the earth or that from there the earth's dust/soil 'is filled.' The main text adopts the more active reading.
    reason: alternative_reading
  - marker: d
    text: Or 'how their mouths are divided'.
    reason: previous_rendering
  - marker: e
    text: Or 'they saturate the dust of the earth'.
    reason: previous_rendering
