translation:
  language: es
  text: Y allí mis ojos vieron los tesoros ocultos[a] del relámpago y del trueno, y los tesoros ocultos de los vientos—cómo están divididos, para que soplen sobre la tierra—y los tesoros ocultos de las nubes y del rocío; y allí vi de dónde vienen en aquel lugar, y desde allí humedecen el polvo de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tesoros ocultos» conserva la imagen de reservorios guardados; también podría entenderse como «depósitos ocultos» o «almacenes ocultos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ኅቡኣተ
  english_pob_choice: hidden treasuries
  chosen_spanish: tesoros ocultos
  alternatives_spanish:
  - depósitos ocultos
  - almacenes ocultos
  - cosas ocultas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario-cósmico, el término apunta a reservorios guardados de fuerzas naturales. «Tesoros» conserva la imagen de depósitos reservados mejor que una traducción plana como «cosas ocultas», y «ocultos» mantiene el matiz de reserva.
- source_word: መብረቅት
  english_pob_choice: lightning
  chosen_spanish: relámpago
  alternatives_spanish:
  - relámpagos
  - destellos de relámpago
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural ge’ez puede traducirse de modo colectivo en español. «Relámpago» funciona con naturalidad como fenómeno natural único/colectivo y evita una pluralización pesada.
- source_word: ነጐድጓድ
  english_pob_choice: thunder
  chosen_spanish: trueno
  alternatives_spanish:
  - truenos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el fenómeno atmosférico en singular colectivo, en paralelo con «relámpago», como en el registro apocalíptico del pasaje.
- source_word: ነፋሳት
  english_pob_choice: winds
  chosen_spanish: vientos
  alternatives_spanish:
  - espíritus
  - ráfagas de viento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El contexto inmediato es meteorológico: soplan sobre la tierra. Por eso «vientos» es la lectura localmente correcta, sin forzar el sentido de «espíritus».'
- source_word: አፎ
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  lexicon: Revisión textual del ge’ez según el audit trail
  rationale: La revisión del texto muestra que አፎ es un adverbio interrogativo/relativo, no «bocas». Por eso se traduce «cómo», manteniendo la sintaxis de explicación de la división de los vientos.
- source_word: ይትከፈሉ
  english_pob_choice: are divided
  chosen_spanish: están divididos
  alternatives_spanish:
  - son divididos
  - están repartidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva/intransitiva se refleja en español con «están divididos», que conserva el estado resultante y la imagen de distribución de los vientos.
- source_word: ከመ ይንፍሑ ዲበ ምድር
  english_pob_choice: so that they may blow upon the earth
  chosen_spanish: para que soplen sobre la tierra
  alternatives_spanish:
  - para que den viento sobre la tierra
  - a fin de soplar sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Soplen sobre la tierra» reproduce de forma natural la finalidad del pasaje y evita un calco rígido. Mantiene el sentido de acción del viento sin perder dignidad estilística.
- source_word: ደመናት
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - nubarrones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término meteorológico directo y suficiente; no requiere intensificación adicional.
- source_word: ጠል
  english_pob_choice: dew
  chosen_spanish: rocío
  alternatives_spanish:
  - rocío matinal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Rocío» es el equivalente natural en español y preserva el paralelismo con «nubes» como fuentes de humedad.
- source_word: እምኀበ ይመጽእ
  english_pob_choice: from where they come in that place
  chosen_spanish: de dónde vienen en aquel lugar
  alternatives_spanish:
  - de dónde proceden en aquel lugar
  - de dónde vienen allí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la dirección de procedencia («de dónde») y la referencia locativa («en aquel lugar»), acorde con el testimonio revisado del audit trail.
- source_word: ይፀግቡ ጸበለ ምድር
  english_pob_choice: they water the dust of the earth
  chosen_spanish: riegan el polvo de la tierra
  alternatives_spanish:
  - humedecen el polvo de la tierra
  - dan riego al polvo de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Aunque el valor verbal ge’ez puede expresar llenarse/satisfacerse, el audit trail revisado favorece una imagen activa y plural: los fenómenos meteorológicos «riegan» el polvo. «Riegan» mantiene la concreción agrícola y la vividez de la metáfora.'
theological_decisions:
- issue: Si ነፋሳት debe entenderse como «vientos» o como «espíritus»
  english_pob_reading: winds
  chosen_spanish_reading: vientos
  alternative_spanish_readings:
  - espíritus
  rationale: 'El catálogo enumera fenómenos cósmicos y meteorológicos: relámpago, trueno, vientos, nubes y rocío. La cláusula sobre soplar sobre la tierra confirma que se trata de vientos, no de seres personales o espirituales.'
  doctrine_reference: Mantener el sentido local del pasaje antes de armonizar términos polisémicos en todo el corpus.
- issue: Cómo reflejar la imagen de los «tesoros ocultos» sin reducirla a una noción abstracta
  english_pob_reading: hidden treasuries
  chosen_spanish_reading: tesoros ocultos
  alternative_spanish_readings:
  - depósitos ocultos
  - almacenes ocultos
  rationale: La imaginería apocalíptica presenta reservas cósmicas de las que proceden las fuerzas naturales. «Tesoros ocultos» conserva esa tensión entre reserva, secreto y abundancia.
  doctrine_reference: Respetar la imaginería del texto fuente sin sustituirla por una explicación prosaica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y sus correcciones posteriores: se descartó la lectura errónea que entendía አፎ como «bocas» y se siguió la revisión que entiende «cómo»; también se atendió a la corrección que favorece una acción activa en la última cláusula, expresándola en español como «riegan el polvo de la tierra» en lugar de una pasiva o una mera saturación.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el original lo exija explícitamente; este versículo no lo contiene.
  - Se mantiene «tesoros ocultos» en toda la secuencia para conservar el paralelo repetido del original.
  - Se prefirió «rocío» a «agua del rocío» por economía y fidelidad al término meteorológico.
  - La puntuación con rayas conserva la estructura explicativa del original y el énfasis del audit trail inglés.
