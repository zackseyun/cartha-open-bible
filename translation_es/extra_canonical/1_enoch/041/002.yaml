base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/041/002.yaml
  text: There I saw the dwelling places of the sinners and the dwelling places of the holy ones[a]; and there my eyes saw all the sinners being driven away from there—those who deny the name of the Lord of Spirits—and they were being dragged off[d][c][b], and they could not stand because of the punishment that goes out from the Lord of Spirits.
  footnotes:
  - marker: a
    text: Or 'their habitations' / 'their abodes.' The Ge'ez repeats the same noun for both groups, emphasizing distinct places assigned within the vision.
    reason: lexical_alternative
  - marker: b
    text: '''The holy ones'' may refer to sanctified people, heavenly beings, or both; the Ge''ez does not make the referent explicit here.'
    reason: alternative_reading
  - marker: c
    text: The clause rendered 'they had no standing' is idiomatic and may also mean 'they could not remain' or 'there was no place for them to stand' under the punishment issuing from the Lord of Spirits.
    reason: lexical_alternative
  - marker: d
    text: Or 'they had no standing'.
    reason: previous_rendering
