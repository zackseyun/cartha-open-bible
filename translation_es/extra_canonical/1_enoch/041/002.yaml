review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva en general bien la estructura y el sentido del ge''ez: la visión de los lugares asignados a pecadores y santos, la expulsión de los pecadores, su negación del nombre divino y su incapacidad de mantenerse ante el castigo procedente del Señor de los Espíritus. Sin embargo, hay un desajuste importante en las notas: la nota d del inglés (''Or they had no standing'' / previo renderizado) fue trasladada erróneamente a «O “eran expulsados”», que no corresponde al segmento ይስሐቡ sino a una alternativa ya cubierta para ይሰደዱ.'
  spanish_quality_summary: El español es claro y digno, pero «siendo expulsados» suena algo calcado tras «mis ojos vieron a todos los pecadores»; «expulsados» sin gerundio mejora la fluidez. También conviene ajustar la puntuación del inciso con raya para que resulte más natural en español. El resto del léxico principal es legible y apropiado para un registro bíblico moderno.
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto salvo que aquí la fuente usa el título fijo enóquico «Señor de los Espíritus», no el nombre divino Yahvé, por lo que está bien conservarlo. «Los santos» es aceptable, aunque «los santos[a]» depende de una nota para preservar la amplitud de «the holy ones». «Castigo», «pecadores» y «arrastrados» están alineados con las decisiones auditadas.
  issues:
  - severity: high
    issue: La nota d está mal asignada semánticamente.
    rationale: El rastro inglés indica que d corresponde a una traducción previa de ቀዊመ አልቦሙ ('they had no standing'), no a una alternativa de «eran arrastrados» ni de «siendo expulsados». Mantenerla así distorsiona la evidencia auditada.
  - severity: medium
    issue: «Siendo expulsados» después de «vieron a todos los pecadores» suena poco natural en español.
    rationale: Tras un verbo de percepción, en español suele fluir mejor «vieron ... expulsados» o «vieron cómo ... eran expulsados». Es un ajuste de legibilidad, no de sentido.
  - severity: low
    issue: La puntuación del inciso parentético puede mejorarse.
    rationale: 'En español, el inciso con raya queda más limpio con rayas de cierre sin coma adicional: «—los que...— y eran arrastrados...».'
  revised_spanish_text: Allí vi las moradas de los pecadores y las moradas de los santos[a]; y allí mis ojos vieron a todos los pecadores expulsados de allí—los que niegan el nombre del Señor de los Espíritus—, y eran arrastrados[b][c][d], y no podían mantenerse en pie a causa del castigo que sale del Señor de los Espíritus.
  revised_footnotes:
