translation:
  language: es
  text: Allí vi las moradas de los pecadores y las moradas de los santos[a]; y allí mis ojos vieron a todos los pecadores expulsados de allí—los que niegan el nombre del Señor de los Espíritus—, y eran arrastrados[b][c][d], y no podían mantenerse en pie a causa del castigo que sale del Señor de los Espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus moradas» / «sus habitaciones». El ge'ez repite el mismo sustantivo para ambos grupos, subrayando lugares distintos asignados en la visión.
    reason: lexical_alternative
  - marker: b
    text: «Los santos» puede referirse a personas santificadas, seres celestiales o ambos; el ge'ez no especifica aquí el referente.
    reason: alternative_reading
  - marker: c
    text: La cláusula traducida como «no podían mantenerse en pie» también puede entenderse como «no podían permanecer» o «no había lugar para que se mantuvieran en pie» bajo el castigo que sale del Señor de los Espíritus.
    reason: lexical_alternative
  - marker: d
    text: O «no tenían dónde mantenerse en pie».
    reason: previous_rendering
lexical_decisions:
- source_word: መኃድሪሆሙ
  english_pob_choice: their dwelling places
  chosen_spanish: las moradas de
  alternatives_spanish:
  - las habitaciones de
  - los lugares de morada de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término nombra lugares de habitar. «Moradas» conserva la imagen espacial concreta y funciona bien en español bíblico sin volverse arcaico.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - los impíos
  - los culpables
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pecadores» preserva la designación moral estándar y el contraste directo con «santos» del verso.
- source_word: ቅዱሳን
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos consagrados
  - los seres santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB inglesa preserva la amplitud referencial. En español, «santos» es natural y mantiene esa ambigüedad, aunque puede sugerir personas santificadas o seres celestiales.
- source_word: ይሰደዱ
  english_pob_choice: being driven away
  chosen_spanish: siendo expulsados
  alternatives_spanish:
  - siendo echados
  - siendo alejados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa remoción forzosa en un contexto de juicio. «Siendo expulsados» conserva la fuerza punitiva y la dirección del movimiento.
- source_word: ይክሕድዎ ለስመ
  english_pob_choice: deny the name of
  chosen_spanish: niegan el nombre de
  alternatives_spanish:
  - rechazan el nombre de
  - reniegan del nombre de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La estructura incluye explícitamente «el nombre de», por lo que debe mantenerse. «Niegan» reproduce la carga de repudio sin diluirla en incredulidad genérica.
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Dueño de los Espíritus
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un título fijo en 1 Enoc. «Señor de los Espíritus» es transparente y conserva la forma titulal sin sustituirla por un equivalente tradicional que oscurezca el término.
- source_word: ይስሐቡ
  english_pob_choice: they were being dragged off
  chosen_spanish: eran arrastrados
  alternatives_spanish:
  - eran llevados a rastras
  - eran tirados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Arrastrados» mantiene el valor violento y pasivo del verbo, y suena natural en español en un contexto de ejecución judicial.
- source_word: ቀዊመ አልቦሙ
  english_pob_choice: they could not stand
  chosen_spanish: no podían mantenerse en pie
  alternatives_spanish:
  - no podían estar de pie
  - no tenían lugar para estar de pie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa favorece la incapacidad física de permanecer de pie. «No podían mantenerse en pie» expresa ese sentido con claridad y evita el anglicismo legal de «no tenían standing».
- source_word: መቅሠፍት
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - castigo punitivo
  - aflicción
  - plaga
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este marco judicial, «castigo» transmite la sanción divina sin estrechar indebidamente la forma concreta del daño.
- source_word: ትወጽእ እምእግዚአ መናፍስት
  english_pob_choice: that goes out from the Lord of Spirits
  chosen_spanish: que sale del Señor de los Espíritus
  alternatives_spanish:
  - que procede del Señor de los Espíritus
  - que viene del Señor de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sale de» conserva la imagen dinámica de algo que emana o procede desde la fuente divina, tal como en la fuente ge'ez.
theological_decisions:
- issue: Identidad de «los santos»
  english_pob_reading: Rendered broadly as 'the holy ones' without specifying humans or angels.
  chosen_spanish_reading: Se conserva «los santos» sin especificar si son seres celestiales, personas santificadas o ambos.
  alternative_spanish_readings:
  - los santos hombres
  - los ángeles
  - los consagrados
  rationale: El ge'ez no fuerza una identificación única. Mantener la amplitud evita resolver una tensión interpretativa que el texto deja abierta.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Fuerza de «niegan el nombre del Señor de los Espíritus»
  english_pob_reading: Kept as denial of the divine name rather than generalized unbelief.
  chosen_spanish_reading: Se mantiene la negación del nombre divino, no una mera incredulidad general.
  alternative_spanish_readings:
  - los que no confiesan al Señor de los Espíritus
  - los que rechazan al Señor de los Espíritus
  rationale: El texto incluye expresamente «el nombre de», elemento que señala autoridad y pertenencia pactual; omitirlo suavizaría indebidamente la afirmación.
  doctrine_reference: Preserve covenantal and authority-laden significance of the name.
translation_notes:
  revision_awareness: La revisión del audit trail corrigió la frase inglesa de 'they had no standing' hacia 'they could not stand', destacando la incapacidad física/apocalíptica de permanecer en pie. La redacción española sigue esa revisión con «no podían mantenerse en pie» y evita un calco jurídico. También se mantiene la duplicación del motivo de morada y el título fijo «Señor de los Espíritus».
  spanish_consistency_notes:
  - Se usa «Señor de los Espíritus» de forma consistente como título fijo en lugar de una paráfrasis.
  - Se evita «SEÑOR» como máscara tipográfica; se mantiene una forma plenamente visible en español.
  - Se conserva la ambigüedad de «los santos» con nota, siguiendo la amplitud del inglés POB.
  - El verbo principal en la última cláusula se expresa como «sale» para preservar la imagen dinámica del original.
