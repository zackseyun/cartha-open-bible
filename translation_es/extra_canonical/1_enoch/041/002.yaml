    reason: lexical_alternative
  - marker: d
    text: O «no tenían dónde mantenerse en pie».
    reason: previous_rendering
  revision_rationale: Se corrige una nota de auditoría mal trasladada y se hace un ajuste menor de fluidez en el texto principal sin cambiar el sentido. La revisión preserva mejor la relación entre texto y notas documentada en el POB inglés.
