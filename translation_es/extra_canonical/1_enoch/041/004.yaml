base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/041/004.yaml
  text: And there I saw the storehouses of the lightning[a], and from them are apportioned the wind from the storehouse of hail, and the wind from the storehouse of mist[d][c][b], and the cloud and its cloud remain over the earth from before the world.
  footnotes:
  - marker: a
    text: The Ge'ez term rendered 'mist' is uncertain in this witness and may also denote frost, hoarfrost, or a related weather phenomenon.
    reason: lexical_alternative
  - marker: b
    text: The clause 'its cloud and the cloud thereof' is textually awkward in the Ethiopic witness. The translation keeps the repetition rather than smoothing it, because the exact relation between the terms is unclear.
    reason: textual_variant
  - marker: c
    text: Or 'and from them the winds are apportioned; the storehouse of hail and the storehouse of mist'.
    reason: previous_rendering
  - marker: d
    text: Or 'and its cloud and the cloud thereof'.
    reason: previous_rendering
