translation:
  language: es
  text: Y allí vi los depósitos de los relámpagos, y de ellos son repartidos el viento del depósito de granizo y el viento del depósito de niebla[a], y la nube y su nube[b] permanecen sobre la tierra desde antes del mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término ge'ez traducido aquí como «niebla» es incierto en este testimonio y también puede referirse a escarcha, helada o un fenómeno meteorológico afín.
    reason: lexical_alternative
  - marker: b
    text: La secuencia «la nube y su nube» conserva la repetición del testimonio etiópico; el vínculo exacto entre los términos es oscuro.
    reason: textual_variant
lexical_decisions:
- source_word: መዛግብተ
  english_pob_choice: storehouses
  chosen_spanish: almacenes
  alternatives_spanish:
  - depósitos
  - tesoros
  - repositorios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término denota cámaras o reservorios de cosas guardadas. «Almacenes» conserva la imagen concreta y espacial sin introducir la connotación monetaria que puede tener «tesoros».
- source_word: ፀዳዋነ
  english_pob_choice: lightning
  chosen_spanish: relámpagos
  alternatives_spanish:
  - rayos
  - fulgores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto meteorológico, la referencia es a un fenómeno de luz y trueno. «Relámpagos» es natural en español y mantiene el valor cósmico del pasaje.
- source_word: ይትከፈሉ
  english_pob_choice: are apportioned
  chosen_spanish: se distribuyen
  alternatives_spanish:
  - son divididos
  - son repartidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo indica asignación ordenada desde los depósitos celestiales. «Se distribuyen» conserva esa idea mejor que una división meramente física.
- source_word: ነፋስ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - aire
  - vientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el sentido es meteorológico, no espiritual. Usé singular para reflejar el paralelo de cada «viento» procedente de su almacén correspondiente.
- source_word: በረድ
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  - granizadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Granizo» es el equivalente meteorológico directo y claro en español.
- source_word: ጊሜ
  english_pob_choice: mist
  chosen_spanish: niebla
  alternatives_spanish:
  - escarcha
  - helada
  - rocío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El referente exacto es incierto en este testimonio. «Niebla» funciona bien junto a la imaginería de nubes y evita fijar en exceso una identificación discutida.
- source_word: ዘደመና / ወደመና ዚአሁ
  english_pob_choice: the cloud and its cloud
  chosen_spanish: la nube y su nube
  alternatives_spanish:
  - la nube de ella y su nube
  - la nube y la nube de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es repetitiva y algo opaca en ge'ez. Conservé la duplicación en español en lugar de suavizarla, porque el texto no aclara con certeza la relación exacta entre los términos.
- source_word: የኀድር
  english_pob_choice: remain
  chosen_spanish: permanecen
  alternatives_spanish:
  - habitan
  - reposan
  - quedan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Permanecen» expresa continuidad de presencia y resulta natural en español.
- source_word: እምቅድመ ዓለም
  english_pob_choice: from before the world
  chosen_spanish: desde antes del mundo
  alternatives_spanish:
  - desde antes de la creación
  - antes del mundo
  - desde antes de la era
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión conserva la fuerza temporal primordial sin resolver la cuestión teológica sobre el origen del mundo o la eternidad.
theological_decisions:
- issue: Fórmula temporal primordial en un marco cosmológico
  english_pob_reading: from before the world
  chosen_spanish_reading: desde antes del mundo
  alternative_spanish_readings:
  - desde antes de la creación
  - antes del mundo
  rationale: La escena describe depósitos celestiales dentro de un orden cósmico. Mantener la expresión temporal de forma literal preserva la tensión del texto sin imponer una doctrina posterior sobre la creación ex nihilo o la eternidad.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Tomo como base la revisión adjudicada del audit trail inglés: el pasaje debe mantener dos menciones separadas de «viento» vinculadas a sus respectivos almacenes, y debe conservar la duplicación opaca relativa a «la nube y su nube» sin suavizarla. El español refleja esa sintaxis y evita fusionar o desplazar los sujetos.'
  spanish_consistency_notes:
  - Usé «Y allí» para corresponder al deíctico narrativo inicial sin añadir contenido.
  - Mantuve el singular «viento» en cada sintagma para respetar la estructura del ge'ez y la revisión auditada.
  - Conservo «desde antes del mundo» como fórmula temporal abierta, sin resolverla doctrinalmente.
  - 'Las notas al pie están ancladas exactamente en las palabras problemáticas: [a] en «niebla» y [b] en «nube y su nube».'
