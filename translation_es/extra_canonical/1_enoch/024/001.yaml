translation:
  language: es
  text: Y desde allí fui a otro lugar de la tierra[a], y él me mostró un monte de fuego que ardía día y noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto de «me mostró» está implícito en el ge'ez; el contexto sugiere al guía angélico de Enoc.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምህየ
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa con naturalidad el movimiento sucesivo dentro del recorrido visionario y conserva la referencia espacial anterior sin volverla más específica de lo que permite el ge'ez.
- source_word: ሖርኩ
  english_pob_choice: I went
  chosen_spanish: fui
  alternatives_spanish:
  - anduve
  - viajé
  - me fui
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo simple de desplazamiento en primera persona. 'Fui' es breve, natural y no añade matices no presentes en el original.
- source_word: ካልአ መካነ ምድር
  english_pob_choice: another place of the earth
  chosen_spanish: otro lugar de la tierra
  alternatives_spanish:
  - otra región de la tierra
  - otro lugar de la tierra/land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lugar de la tierra'' puede sonar algo literal, pero conserva el sabor cosmográfico y apocalíptico del giro original mejor que ''región'' o una paráfrasis más lisa.'
- source_word: አርአየኒ
  english_pob_choice: he showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me reveló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de visión/reportaje se vierte de forma directa. Se mantiene el sujeto implícito con 'él', como en el griego/etíope subyacente, sin identificarlo explícitamente.
- source_word: ደብረ እሳት
  english_pob_choice: a mountain of fire
  chosen_spanish: un monte de fuego
  alternatives_spanish:
  - una montaña de fuego
  - un monte ígneo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Monte'' es una opción bíblica y digna en español; conserva la imagen concreta y elevada del sustantivo sin convertirla en un adjetivo. ''De fuego'' mantiene la construcción nominal fuerte.'
- source_word: ዘያንበለብል
  english_pob_choice: that blazed
  chosen_spanish: que ardía
  alternatives_spanish:
  - que flameaba
  - que estaba en llamas
  - que ardía intensamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Ardía'' transmite continuidad y viveza de la acción. ''Blazed'' en inglés busca intensidad; en español, el verbo en imperfecto preserva el carácter durativo de la imagen.'
- source_word: መዐልተ ወሌሊተ
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - de día y de noche
  - día y noche, sin cesar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula temporal fija y compacta, natural en español y fiel a la idea de duración incesante.
theological_decisions:
- issue: Sujeto implícito de 'he showed me'
  english_pob_reading: Retain the implicit masculine singular as 'he' rather than specifying 'the angel' in the main text.
  chosen_spanish_reading: Conservar 'él' sin especificar 'el ángel' en el texto principal.
  alternative_spanish_readings:
  - el ángel me mostró
  - mi guía me mostró
  rationale: El contexto narrativo sugiere un guía angélico, pero el versículo no lo nombra. Mantener el pronombre preserva la tensión y evita introducir una identificación no explícita en el original.
  doctrine_reference: Primacía del texto fuente; no resolver en traducción lo que el versículo deja implícito.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el pasaje ge''ez y coincide con la lectura auditada en inglés: desplazamiento secuencial, sujeto implícito, y la imagen apocalíptica de un monte de fuego que arde continuamente. No se aplicaron revisiones posteriores en el expediente inglés.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, sin introducir artículo definido innecesario en 'monte de fuego'.
  - '''Desde allí'' y ''otro lugar de la tierra'' conservan la secuencia espacial del recorrido visionario.'
  - Se evitó 'SEÑOR' u otras convenciones no pertinentes; no hay léxico divino directo en este versículo.
  - La nota al pie usa el marcador [a] en el lugar correspondiente y explica el sujeto implícito sin sobreinterpretarlo.
