translation:
  language: es
  text: Y la séptima montaña estaba en medio de estas, y su altura[a] las superaba a todas, semejante al asiento de un trono[b], y árboles fragantes la rodeaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lectura ge'ez transmitida aquí es corrupta en este punto; el sentido adoptado sigue la revisión apoyada por el testimonio griego, que indica que la montaña «superaba a todas en altura».
    reason: textual_variant
  - marker: b
    text: Se conserva la expresión doble «asiento de un trono» en vez de reducirla a «trono», para reflejar la fórmula ge'ez completa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሳብዕ
  english_pob_choice: the seventh
  chosen_spanish: la séptima
  alternatives_spanish:
  - la séptima montaña
  - séptima
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ordinal introduce la montaña siguiente en la secuencia visionaria; en español, el artículo y el femenino concuerdan naturalmente con «montaña».
- source_word: ደብር
  english_pob_choice: mountain
  chosen_spanish: montaña
  alternatives_spanish:
  - monte
  - cerro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Montaña» comunica con claridad el paisaje elevado apocalíptico y evita un registro demasiado arcaico.
- source_word: ማእከሎሙ ለእሎንቱ
  english_pob_choice: in the midst of these
  chosen_spanish: en medio de estas
  alternatives_spanish:
  - en medio de ellas
  - entre ellas
  - en su centro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión locativa señala posición central respecto de las demás montañas; «estas» conserva el deíctico del contexto inmediato.
- source_word: ኖኆሙ / ዘይትማሰሉ
  english_pob_choice: its height surpassed them all / resembling
  chosen_spanish: su altura las superaba a todas, semejante
  alternatives_spanish:
  - en altura las sobrepasaba a todas, pareciendo
  - su elevación las excedía a todas, semejante
  lexicon: Recovered reading informed by Greek witness and Ge'ez corruption note
  rationale: Sigo la revisión que entiende una corrupción ge'ez y restaura el sentido de superioridad en altura; «su altura» hace explícito el rasgo comparado, y «semejante» conserva la relación comparativa sin convertirla en identidad.
- source_word: መንበረ አትራኖስ
  english_pob_choice: seat of a throne
  chosen_spanish: el asiento de un trono
  alternatives_spanish:
  - el sitial de un trono
  - el asiento del trono
  - el trono
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Asiento» preserva la duplicación semántica del giro ge'ez junto con «trono», evitando simplificarlo a una sola palabra y manteniendo la imagen visionaria compuesta.
- source_word: ዕጸወ መዓዛ
  english_pob_choice: fragrant trees
  chosen_spanish: árboles fragantes
  alternatives_spanish:
  - árboles aromáticos
  - árboles de fragancia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción adjetival es natural en español y conserva el énfasis sensorial del sustantivo compuesto.
- source_word: የአውድዎ
  english_pob_choice: encircled it
  chosen_spanish: la rodeaban
  alternatives_spanish:
  - la circundaban
  - la rodeaban por completo
  - estaban alrededor de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de rodear expresa con precisión el movimiento envolvente de los árboles alrededor de la montaña.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se adopta el sentido restaurado de que la séptima montaña sobresalía en altura por encima de las demás, y se mantiene la imagen compuesta de «asiento de un trono»; también se preserva el matiz de comparación en «semejante».'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «montaña» para ደብር por coherencia con el registro visionario del pasaje.
  - «Árboles fragantes» conserva el valor sensorial del original sin introducir una nota interpretativa adicional.
