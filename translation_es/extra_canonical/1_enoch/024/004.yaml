translation:
  language: es
  text: Y entre ellos había un árbol cuya fragancia yo nunca había percibido[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto ge''ez de este versículo presenta una lectura difícil; la revisión crítica más sólida entiende la frase final como una negación de experiencia olfativa previa: algo cuya fragancia el narrador no había percibido nunca.'
    reason: textual_variant
  - marker: b
    text: La traducción no añade «mirra», porque esa especificación no está sustentada por la corrección crítica documentada en el audit trail.
    reason: textual_variant
lexical_decisions:
- source_word: ወሀሎ
  english_pob_choice: And ... was
  chosen_spanish: Y ... había
  alternatives_spanish:
  - Y ... era
  - Y ... estaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma introduce existencia/presencia en la escena. En español, «había» conserva ese valor narrativo de existencia sin forzar una copulativa impropia.
- source_word: እምውስቴቶሙ
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - de entre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión localiza el árbol dentro del grupo previo. «Entre ellos» es natural y conserva el sentido espacial del ge'ez.
- source_word: ዕፅ
  english_pob_choice: a tree
  chosen_spanish: un árbol
  alternatives_spanish:
  - un vegetal
  - una planta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario y paradisíaco, el sentido más directo y concreto es «árbol».
- source_word: ዘአልቦ ገሙራ አመ ጼኖኩ / ጼወኒ
  english_pob_choice: whose fragrance I had never smelled
  chosen_spanish: cuya fragancia nunca había olido
  alternatives_spanish:
  - que nunca había olido
  - de la cual nunca había percibido el aroma
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail inglés ya corrigió la lectura hacia una experiencia olfativa negada («never smelled»). En español, «fragancia» hace explícito el objeto implícito del olfato y «nunca había olido» mantiene la negación temporal perfecta sin añadir contenido no sustentado.
theological_decisions:
- issue: Lectura del rasgo distintivo del árbol
  english_pob_reading: The verse describes the tree by its fragrance, with the sensory comparison preserved and the textual difficulty documented in notes.
  chosen_spanish_reading: El verso describe el árbol por su fragancia, sin introducir una comparación adicional no atestiguada aquí.
  alternative_spanish_readings:
  - El árbol era incomparable por su aroma.
  - Su aroma era como de mirra.
  rationale: El ge'ez y la revisión del inglés apuntan a una frase de percepción olfativa negativa («nunca había olido»), no a «mirra». Por fidelidad al testimonio más sólido y para no borrar la dificultad textual, se evita cerrar el sentido con una equivalencia especulativa.
  doctrine_reference: Transparencia textual ante pasajes difíciles; preservar la incertidumbre cuando el testimonio no justifica una expansión interpretativa.
translation_notes:
  revision_awareness: 'El audit trail inglés pasó de una propuesta que añadía «myrrh» a una corrección basada en la revisión textual: la frase final debe entenderse como «nunca había olido». Esta versión española sigue esa corrección y evita reforzar la lectura desacreditada.'
  spanish_consistency_notes:
  - Se mantiene «fragancia» para conservar el registro elevado y el campo semántico olfativo.
  - Se usa pretérito pluscuamperfecto («había olido») porque el inglés final también expresa una experiencia previa negada.
  - No se introduce «mirra» en el texto principal ni como glosa, dado que el expediente crítico la descarta.
  - La puntuación y el orden son naturales en español sin perder la estructura de la línea fuente.
