revisions:
- from: Y fui en esa dirección y vi siete montes gloriosos[a], cada uno diferente del otro; y sus piedras eran gloriosas y hermosas, y todos ellos eran gloriosos y espléndidos en apariencia, y bellos de rostro[b]. Tres estaban hacia el oriente, uno sobre otro, y tres hacia el norte, uno sobre otro, con barrancos profundos y sinuosos[c], y no se acercaban unos a otros[d].
  to: Y fui en esa dirección y vi siete montes gloriosos[a], cada uno diferente del otro; y sus piedras eran gloriosas y hermosas, y todos ellos eran gloriosos y espléndidos en apariencia, y bellos de rostro[b]. Tres estaban hacia el oriente, uno sobre otro, y tres hacia el norte, uno sobre otro, con barrancos profundos y sinuosos[c], sin que uno se acercara al otro.
  rationale: Se ajusta la cláusula final para reflejar mejor la construcción singular/recíproca fijada en la revisión inglesa auditada, y se eliminan notas que reintroducían una lectura descartada por la evidencia fuente-grounded. El resto del verso puede mantenerse tal como está, con buena fidelidad y buen español.
