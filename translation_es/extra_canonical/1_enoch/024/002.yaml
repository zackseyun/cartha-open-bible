    reason: textual_variant
  revision_rationale: Se ajusta la cláusula final para reflejar mejor la construcción singular/recíproca fijada en la revisión inglesa auditada, y se eliminan notas que reintroducían una lectura descartada por la evidencia fuente-grounded. El resto del verso puede mantenerse tal como está, con buena fidelidad y buen español.
