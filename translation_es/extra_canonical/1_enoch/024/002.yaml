base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/024/002.yaml
  text: And I went in that direction and saw seven glorious mountains[a], each one differing from the other; and their stones were glorious and beautiful, and all of them were glorious and splendid in appearance, and fair of face. Three were toward the east, one upon another, and three toward the north, one upon another, with deep and winding ravines[d][c][b], no one coming near to another.
  footnotes:
  - marker: a
    text: The Ge'ez description of the final landscape features is difficult. The clause rendered 'with deep ravines and one valley' may describe the spaces between the mountain groupings rather than an additional feature beside them.
    reason: textual_variant
  - marker: b
    text: The phrase 'fair in face' is intentionally retained from the Ge'ez imagery, which describes the mountains in almost personified visual terms.
    reason: cultural_note
  - marker: c
    text: Or 'along my way'.
    reason: previous_rendering
  - marker: d
    text: Or 'with deep ravines and one valley, and they did not come near one another.'.
    reason: previous_rendering
