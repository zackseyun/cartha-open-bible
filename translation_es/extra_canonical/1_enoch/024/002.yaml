translation:
  language: es
  text: Y fui en esa dirección y vi siete montes gloriosos[a], cada uno diferente del otro; y sus piedras eran gloriosas y hermosas, y todos ellos eran gloriosos y espléndidos en apariencia, y bellos de rostro[b]. Tres estaban hacia el oriente, uno sobre otro, y tres hacia el norte, uno sobre otro, con barrancos profundos y sinuosos[c], sin que uno se acercara al otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La descripción ge'ez de los rasgos finales del paisaje es difícil. La cláusula final puede describir los espacios entre los grupos de montes más que añadir un rasgo independiente.
    reason: textual_variant
  - marker: b
    text: Se conserva la imagen personificada del original, que describe los montes en términos casi humanos.
    reason: cultural_note
  - marker: c
    text: La cláusula del paisaje final es difícil; puede describir los barrancos o los espacios entre los grupos de montes. El sentido adoptado aquí es «barrancos profundos y sinuosos», no «una sola quebrada/valle».
    reason: textual_variant
lexical_decisions:
- source_word: ወሖርኩ
  english_pob_choice: And I went in that direction
  chosen_spanish: Y fui en esa dirección
  alternatives_spanish:
  - Y avancé en esa dirección
  - Y proseguí en esa dirección
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica movimiento narrativo simple en primera persona. «Fui» conserva la secuencia visionaria y la dirección señalada sin volver la frase pesada o artificial.
- source_word: መንገሌሁ
  english_pob_choice: in that direction
  chosen_spanish: en esa dirección
  alternatives_spanish:
  - por ese camino
  - hacia allí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa corrige una lectura posesiva errónea y entiende un demostrativo direccional. «En esa dirección» refleja con fidelidad el referente contextual.
- source_word: ነጸርኩ
  english_pob_choice: saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un verbo de percepción visual. «Vi» es claro, natural y suficientemente directo para el registro visionario.
- source_word: ሰብዐተ አድባረ ክቡራነ
  english_pob_choice: seven glorious mountains
  chosen_spanish: siete montes gloriosos
  alternatives_spanish:
  - siete montañas gloriosas
  - siete montes majestuosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Montes» mantiene un tono elevado y bíblico/apocalíptico en español, mientras que «gloriosos» preserva el registro de honor y esplendor del etíope.
- source_word: ወኵሉ ፩እምነ ፩እንዘ ይትዌለጥ
  english_pob_choice: each one differing from the other
  chosen_spanish: cada uno diferente del otro
  alternatives_spanish:
  - cada uno distinto del otro
  - cada uno separado del otro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase marca diferenciación cualitativa entre los montes. «Diferente» preserva esa distinción sin introducir necesariamente separación física.
- source_word: እእባኒ
  english_pob_choice: their stones
  chosen_spanish: sus piedras
  alternatives_spanish:
  - sus rocas
  - sus piedras mismas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El etiópico se refiere al material pétreo de los montes. «Piedras» comunica bien la imagen sin sobreinterpretarla.
- source_word: ሠናያነ
  english_pob_choice: beautiful
  chosen_spanish: hermosas
  alternatives_spanish:
  - bellas
  - bonitas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hermosas» es un equivalente digno y natural para el valor estético positivo del término.
- source_word: ወኵሉ ክቡር ወስቡሕ ራእዮሙ
  english_pob_choice: all of them were glorious and splendid in appearance
  chosen_spanish: todos ellos eran gloriosos y espléndidos en apariencia
  alternatives_spanish:
  - todos ellos eran gloriosos y magníficos en su aspecto
  - todos ellos eran honorables y espléndidos a la vista
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En apariencia» reproduce de modo transparente el sustantivo de visión/aspecto, manteniendo la fuerza visual del pasaje.
- source_word: ወሠናይ ገጾሙ
  english_pob_choice: fair of face
  chosen_spanish: bellos de rostro
  alternatives_spanish:
  - hermosos de semblante
  - bellos en el rostro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es personificada y literalmente dice que su rostro es bello. «De rostro» conserva la concreción imagética sin aligerarla a una simple «apariencia».
- source_word: ፫መንገለ ጽባሕ
  english_pob_choice: Three were toward the east
  chosen_spanish: Tres estaban hacia el oriente
  alternatives_spanish:
  - Tres estaban hacia el este
  - Tres se hallaban al oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oriente» es una opción solemne y clara en español bíblico, equivalente a «east» y adecuada al registro visionario.
- source_word: ጽኑዓን ፩ዲበ ፩
  english_pob_choice: one upon another
  chosen_spanish: uno sobre otro
  alternatives_spanish:
  - apilado uno sobre otro
  - uno encima de otro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La disposición es vertical o escalonada. «Uno sobre otro» conserva la imagen sin añadir un matiz demasiado técnico.
- source_word: ፫መንገለ ሰሜን
  english_pob_choice: three toward the north
  chosen_spanish: y tres hacia el norte
  alternatives_spanish:
  - y tres al norte
  - y tres en dirección norte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el paralelismo con la cláusula anterior y la orientación espacial simple del texto.
- source_word: ቈላት ዕሙቅ ወጠዋያት
  english_pob_choice: deep and winding ravines
  chosen_spanish: barrancos profundos y sinuosos
  alternatives_spanish:
  - desfiladeros profundos y sinuosos
  - hondonadas profundas y sinuosas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión inglesa identifica dos rasgos: profundidad y tortuosidad. «Barrancos» comunica bien la topografía abrupta; «sinuosos» preserva el sentido de lo retorcido o serpenteante.'
- source_word: ኢይትቃረባ
  english_pob_choice: no one coming near to another
  chosen_spanish: no se acercaban unos a otros
  alternatives_spanish:
  - no se aproximaban entre sí
  - no estaban cerca unos de otros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El cierre expresa separación recíproca. La forma pronominal española permite mantener la reciprocidad y la negación sin forzar el sujeto gramatical.
theological_decisions:
- issue: Traducción del nombre divino no aplicable en este verso, pero preservación del registro apocalíptico elevado
  english_pob_reading: Descriptive visionary geography without explicit divine-name language
  chosen_spanish_reading: Registro visionario solemne sin introducir vocabulario eclesiástico ajeno
  alternative_spanish_readings:
  - registro más llano y descriptivo
  - registro bíblico más tradicional
  rationale: Aunque no aparece el Tetragrámaton ni κύριος en este verso, el pasaje pertenece a un marco apocalíptico. Se mantiene un español solemne pero legible, sin suavizar la imaginería.
  doctrine_reference: N/A
- issue: Imágenes personificadas de los montes
  english_pob_reading: fair of face
  chosen_spanish_reading: bellos de rostro
  alternative_spanish_readings:
  - hermosos en apariencia
  - bellos de semblante
  rationale: La tradición de la POB conserva la personificación visual en vez de neutralizarla. «De rostro» deja visible la rareza imagética del original y evita convertirlo en una descripción banal.
  doctrine_reference: Poética visionaria/apocalíptica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión de la POB inglesa que corrige መንገሌሁ como una expresión direccional («in that direction») y que ajusta el final a «deep and winding ravines», descartando la lectura de «one valley». También se siguió la decisión revisada de mantener la imaginería de «fair of face» en lugar de aplanarla.
  spanish_consistency_notes:
  - Se prefirió «montes» por el registro elevado y visionario, manteniéndolo uniforme con la imaginería apocalíptica.
  - Se evitó «Señor» u այլ terminología de máscara divina porque el verso no contiene lenguaje divino explícito.
  - Se mantuvo la reciprocidad del cierre con una construcción pronominal natural en español.
  - Los adjetivos se conservaron en secuencia paralela para reflejar el ritmo descriptivo del original.
