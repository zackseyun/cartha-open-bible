translation:
  language: es
  text: Observen y vean todos los árboles, cómo aparecen marchitos y con todas sus hojas arrancadas, excepto catorce árboles, que no pierden sus hojas, sino que permanecen desde lo viejo hasta que llega lo nuevo[a][b], por dos y tres inviernos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión “desde lo viejo hasta que llega lo nuevo” es elíptica; probablemente alude al paso de la estación o del año viejo al nuevo.
    reason: cultural_note
  - marker: b
    text: “Por dos y tres inviernos” es una expresión difícil. Puede entenderse como “durante dos o tres inviernos” o como una referencia a estaciones invernales repetidas antes de la renovación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ጠይቁ
  english_pob_choice: Observe
  chosen_spanish: Observad
  alternatives_spanish:
  - Considerad
  - Mirad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto el verbo funciona como exhortación a percibir atentamente, no como “preguntar”. El imperativo plural español “Observad” conserva el valor de examen atento que corrigió la lectura inicial del audit trail.
- source_word: ወርእዩ
  english_pob_choice: and see
  chosen_spanish: y ved
  alternatives_spanish:
  - y mirad
  - y observad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El paralelo con el primer imperativo pide una segunda llamada a la percepción. “Ved” es natural, conciso y mantiene el doble impulso observacional del texto.
- source_word: ኵሎ ዕፀወ
  english_pob_choice: all the trees
  chosen_spanish: todos los árboles
  alternatives_spanish:
  - cada árbol
  - todos los árboles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural colectivo se expresa de manera natural con “todos los árboles”. No hay razón para singularizarlo.
- source_word: እፎ ያስተርእዩ ከመ ይቡስ
  english_pob_choice: appear withered
  chosen_spanish: cómo aparecen marchitos
  alternatives_spanish:
  - cómo parecen secos
  - cómo se muestran marchitos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción enfatiza el aspecto visible. “Aparecen marchitos” reproduce bien la observación del estado de los árboles sin añadir interpretación simbólica.
- source_word: አቍጽሊሆሙ
  english_pob_choice: their leaves
  chosen_spanish: sus hojas
  alternatives_spanish:
  - su follaje
  - sus hojas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término remite a hojas concretas; “sus hojas” es la equivalencia más directa y uniforme con el resto del versículo.
- source_word: ንጉፍ
  english_pob_choice: stripped off
  chosen_spanish: arrancadas
  alternatives_spanish:
  - desprendidas
  - arrancadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea no es solo caída natural, sino pérdida violenta o dejada al desnudo. “Arrancadas” conserva mejor ese efecto fuerte que “caídas” o “desprendidas”.
- source_word: ዘእንበለ ፲ወ፬ ዕፀወ
  english_pob_choice: except fourteen trees
  chosen_spanish: excepto catorce árboles
  alternatives_spanish:
  - salvo catorce árboles
  - excepto catorce árboles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase exceptiva debe mantenerse clara y sin suavizar la excepción numérica.
- source_word: ዘኢይትነገፉ
  english_pob_choice: which do not lose their leaves
  chosen_spanish: que no pierden sus hojas
  alternatives_spanish:
  - que no se desprenden
  - que no pierden sus hojas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma negativa contrasta con “arrancadas” del miembro anterior. “No pierden sus hojas” preserva ese contraste de manera idiomática en español.
- source_word: እላ ይጸንሑ
  english_pob_choice: but remain
  chosen_spanish: sino que permanecen
  alternatives_spanish:
  - pero permanecen
  - sino que permanecen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La conjunción adversativa y el verbo de permanencia expresan la estabilidad de esos árboles frente al resto.
- source_word: እምብሉይ እስከ ይመጽእ ኃዲስ
  english_pob_choice: from the old until the new comes
  chosen_spanish: desde lo viejo hasta que llega lo nuevo
  alternatives_spanish:
  - desde lo antiguo hasta que llega lo nuevo
  - desde la estación vieja hasta que llega la nueva
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es elíptica y probablemente alude al paso de una estación o ciclo temporal. Se conserva la elipsis con una formulación española natural, sin resolverla demasiado en el cuerpo del texto.
- source_word: እምክልኤ ወእም ፫ ክረምት
  english_pob_choice: through two and three winters
  chosen_spanish: por dos y tres inviernos
  alternatives_spanish:
  - durante dos o tres inviernos
  - a través de dos y tres inviernos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es difícil y probablemente idiomática. “Por dos y tres inviernos” retiene la rareza del original sin imponer una interpretación demasiado precisa.
theological_decisions:
- issue: Si convertir la imagen de los árboles en alegoría explícita en la traducción
  english_pob_reading: Retain straightforward botanical-seasonal description without allegorical expansion
  chosen_spanish_reading: Mantener una descripción botánica y estacional directa sin ampliar alegóricamente el texto
  alternative_spanish_readings:
  - Leer los árboles como símbolos de grupos humanos o realidades cósmicas en el propio texto
  - Introducir una paráfrasis interpretativa del signo natural
  rationale: El pasaje exhorta a observar una escena natural. La traducción debe preservar la imagen y dejar la posible interpretación a la lectura contextual, no incorporarla en el versículo.
  doctrine_reference: Preservar la tensión teológica sin resolverla; no desplazar el género apocalíptico con alegorización intratextual.
translation_notes:
  revision_awareness: Tomé como base la revisión más reciente del audit trail, que corrigió la lectura inicial de ‘Ask’ a ‘Observe’ y estableció ‘how’ en lugar de ‘whether’. También apliqué la revisión posterior que prefirió ‘leaves’ frente a ‘foliage’. La redacción española sigue esas decisiones y conserva la rareza de la clausula temporal final.
  spanish_consistency_notes:
  - Se mantuvo un registro uniforme de ‘hojas’ para አቍጽሊሆሙ y ዘኢይትነገፉ.
  - Se prefirió el imperativo plural de segunda persona (‘Observad’, ‘ved’) por adecuación al llamado exhortativo del pasaje.
  - No se introdujo vocabulario interpretativo como ‘símbolo’ o ‘alegoría’ en el texto principal.
  - La puntuación con raya ayuda a reflejar el contraste exceptivo del original sin alterar su estructura.
