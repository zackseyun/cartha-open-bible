    text: The phrase 'from the old until the new comes' is elliptical; it likely refers to the passing old season or year and the arrival of the new one.
    reason: cultural_note
  - marker: b
    text: '''Through two and three winters'' is a difficult expression. It may mean ''for two or three winters'' or indicate repeated winter seasons before renewal.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Ask and see whether all the trees appear withered'.
    reason: previous_rendering
