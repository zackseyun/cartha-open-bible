  yaml_path: translation/extra_canonical/1_enoch/003/001.yaml
  text: Observe and see all the trees[a], how they appear withered, and all their leaves stripped off—except fourteen trees, which do not lose their leaves, but remain from the old until the new comes[c][b], through two and three winters.
  footnotes:
