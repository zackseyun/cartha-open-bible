translation:
  language: es
  text: Y Azazel enseñó a los hombres a hacer espadas, y cuchillos, y escudos, y corazas; y les mostró[a] sus metales y su manufactura, y brazaletes, y adornos, y la pintura de los ojos, y el embellecimiento de los párpados, y toda clase de piedra preciosa[b], y todos los tintes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión oscura del ge'ez se entiende aquí siguiendo la revisión de la POB como una referencia a los metales y la manufactura asociada; la lectura literal anterior era probablemente defectuosa.
    reason: textual_variant
  - marker: b
    text: La referencia a «piedra preciosa» corresponde a materiales ornamentales; no conviene reducirla a una abstracción de la belleza.
    reason: cultural_note
lexical_decisions:
- source_word: መሀሮሙ
  english_pob_choice: taught them
  chosen_spanish: enseñó a los hombres
  alternatives_spanish:
  - instruyó a los hombres
  - les hizo aprender
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa enseñanza o instrucción; «enseñó» conserva el sentido directo de transmisión de conocimiento.
- source_word: ለሰብእ
  english_pob_choice: men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a la humanidad
  - a las personas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto de artes bélicas y adornos se refiere a la humanidad en general, pero «hombres» preserva el valor social inmediato que documenta la POB en inglés.
- source_word: ገቢረ አሰይፍት
  english_pob_choice: to make swords
  chosen_spanish: a hacer espadas
  alternatives_spanish:
  - al trabajo de las espadas
  - al arte de hacer espadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción apunta a fabricar o producir armas; «hacer espadas» es natural y fiel a la idea de manufactura.
- source_word: መጣብኅት
  english_pob_choice: knives
  chosen_spanish: cuchillos
  alternatives_spanish:
  - dagas
  - navajas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un instrumento cortante o arma menor; «cuchillos» mantiene amplitud semántica sin forzar una especificación militar.
- source_word: ወወልታ
  english_pob_choice: shields
  chosen_spanish: escudos
  alternatives_spanish:
  - broqueles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Equivalente moderno claro para equipo defensivo.
- source_word: ወድርዐ አንግድዓ
  english_pob_choice: and breastplates
  chosen_spanish: y corazas
  alternatives_spanish:
  - y petos
  - y cotas de malla
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se trata de armadura para el torso; «corazas» es natural, dignificado y suficientemente preciso.
- source_word: ወአርአዮሙ
  english_pob_choice: and he showed them
  chosen_spanish: y les mostró
  alternatives_spanish:
  - y les reveló
  - y les dio a conocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma conserva el acto de exhibir o dar a conocer. En el contexto de los Vigilantes, incluye la idea de revelación sin sobretraducir.
- source_word: ወምግባሮሙ
  english_pob_choice: and their workmanship
  chosen_spanish: y su obra
  alternatives_spanish:
  - y su trabajo
  - y su manufactura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa se inclinó por 'their workmanship'; en español «su obra» es breve, natural y mantiene el referente a la fabricación/arte de los objetos.
- source_word: እውቃፋተ
  english_pob_choice: bracelets
  chosen_spanish: brazaletes
  alternatives_spanish:
  - pulseras
  - muñequeras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Objeto ornamental del brazo o muñeca; «brazaletes» conserva un registro más elevado que «pulseras».
- source_word: ስርጐ
  english_pob_choice: ornaments
  chosen_spanish: adornos
  alternatives_spanish:
  - ornamentos
  - joyas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término general para piezas decorativas; «adornos» es amplio y claro.
- source_word: ተጽሕሎተ
  english_pob_choice: the painting of the eyes
  chosen_spanish: el pintado de los ojos
  alternatives_spanish:
  - el maquillaje de los ojos
  - la pintura de los ojos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia es concreta a cosmética ocular; «pintado» preserva el acto material sin cargarlo de terminología moderna ajena.
- source_word: አስንዮተ ቀርንብ
  english_pob_choice: the beautifying of the eyelids
  chosen_spanish: el embellecimiento de los párpados
  alternatives_spanish:
  - el adorno de los párpados
  - el embellecimiento de las pestañas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB identifica una práctica cosmética vinculada al ojo; «párpados» es la opción cauta y comprensible en español.
- source_word: እብነ እምኵሉ እብን
  english_pob_choice: every kind of precious stone
  chosen_spanish: toda clase de piedra preciosa
  alternatives_spanish:
  - toda suerte de piedras preciosas
  - toda clase de gemas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa favorece 'precious stone'; «piedra preciosa» es la equivalencia idiomática más transparente en español.
- source_word: ወአስንዮተ
  english_pob_choice: the beautifying of
  chosen_spanish: el embellecimiento de
  alternatives_spanish:
  - el adorno de
  - la hermoseadura de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el sustantivo de acción sin volverlo una paráfrasis excesiva.
- source_word: ወምግባሮሙ
  english_pob_choice: and their workmanship
  chosen_spanish: y su obra
  alternatives_spanish:
  - y su trabajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La solución española enlaza con la lectura revisada de la POB: no se trata de una frase espacial, sino del trabajo o fabricación asociado a los objetos.'
theological_decisions:
- issue: Cómo reflejar la carga negativa de la instrucción de Azazel sin añadir explicaciones no presentes en el verso
  english_pob_reading: Retain the plain instructional wording ('taught,' 'showed') while allowing the vice-list and context of the Watchers narrative to carry the negative force.
  chosen_spanish_reading: Mantener «enseñó» y «les mostró» sin añadir glosas morales, dejando que la lista de armas y cosméticos y el contexto de los Vigilantes lleven la carga negativa.
  alternative_spanish_readings:
  - enseñó artes perversas a los hombres
  - les reveló conocimientos prohibidos
  rationale: El verso no contiene un calificativo moral explícito; la traducción debe conservar la tensión entre la neutralidad gramatical y la función narrativa de la revelación ilícita.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla interpretativamente.
translation_notes:
  revision_awareness: La POB inglesa revisó una lectura oscura anterior de la cláusula ge'ez y la sustituyó por «their metals and their workmanship»; por eso el español evita reproducir la versión antigua «lo que estaba detrás de ellos» y sigue la lectura revisada. También adoptó «precious stone» en lugar de una formulación más arcaica, así que el español usa «piedra preciosa».
  spanish_consistency_notes:
  - He mantenido un registro bíblico digno, pero con español moderno y claro.
  - He evitado el calco mecánico del inglés cuando la sintaxis española pedía una formulación más natural.
  - Conservo la lista de objetos sin expandirla interpretativamente.
  - Las notas al pie están ancladas explícitamente en el texto con [a] y [b].
