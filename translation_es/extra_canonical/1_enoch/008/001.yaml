base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/008/001.yaml
  text: And Azazel taught men to make swords[a], and knives, and shields, and breastplates; and he showed them their metals and their workmanship, and bracelets, and ornaments, and the painting of the eyes, and the beautifying of the eyelids, and every kind of precious stone[b], and all coloring tinctures.
  footnotes:
  - marker: a
    text: The clause rendered 'what was behind them' reflects a difficult Ethiopic reading in the OCR witness (†ዘእምድኅሬሆሙ†). The sense may be corrupt or may point to things that followed from these arts; some translators smooth the line more heavily than the surviving wording warrants.
    reason: textual_variant
  - marker: b
    text: The cosmetic terms likely refer to eye-paint and related beautification practices, not merely abstract 'beauty.'
    reason: cultural_note
