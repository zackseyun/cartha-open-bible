base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/075/002.yaml
  text: 'And because of them people go astray concerning them[a], for these lights serve faithfully at the stations of the world: one in the first portal, and one in the third portal of heaven, and one in the fourth portal, and one in the sixth portal[e][d][c][b]; and the ordering of the world is completed in three hundred and sixty-four stations of the world.'
  footnotes:
  - marker: a
    text: Or 'people err because these lights shift their places rightly.' The line contrasts human misunderstanding with the ordered regularity of the luminaries.
    reason: lexical_alternative
  - marker: b
    text: The closing clause is difficult. It likely refers to the Enochic schematic year of 364 ordered positions or days; the Ge'ez wording speaks more literally of the world's precise ordering being completed in 364 'stations.'
    reason: alternative_reading
  - marker: c
    text: Or 'change their stations'.
    reason: previous_rendering
  - marker: d
    text: Or 'and two in the third portal of heaven, and two in the fourth portal, and two in the sixth portal'.
    reason: previous_rendering
  - marker: e
    text: Or 'among them'.
    reason: previous_rendering
