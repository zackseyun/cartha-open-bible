translation:
  language: es
  text: 'Y por causa de ellos la gente yerra acerca de ellos[a], porque estas luces sirven fielmente en las estaciones del mundo: una en el primer portal, una en el tercer portal del cielo, una en el cuarto portal y una en el sexto portal; y el orden del mundo se completa en trescientos sesenta y cuatro estaciones del mundo[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la gente se extravía respecto de ellos». La línea contrasta el error humano con la regularidad ordenada de estos luminares.'
    reason: lexical_alternative
  - marker: b
    text: La cláusula final es difícil. Probablemente se refiere al esquema enoquita de 364 posiciones o días ordenados; el geʽez habla más literalmente de que el orden del mundo se completa en 364 «estaciones del mundo».
    reason: alternative_reading
lexical_decisions:
- source_word: ወበእንቲአሆሙ
  english_pob_choice: And because of them
  chosen_spanish: Y por causa de ellos
  alternatives_spanish:
  - Y a causa de ellos
  - Y por ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase causal se conserva de modo natural en español con 'por causa de ellos', evitando una traducción mecánica que pierda la relación explicativa.
- source_word: ይጌግዩ
  english_pob_choice: go astray
  chosen_spanish: se desvía
  alternatives_spanish:
  - yerra
  - anda errante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico, el verbo expresa error de cálculo o de comprensión; 'se desvía' comunica bien la idea de apartarse del curso correcto sin sobrecargar el texto.
- source_word: ሰብእ ቦሙ
  english_pob_choice: people ... concerning them
  chosen_spanish: la gente ... respecto de ellos
  alternatives_spanish:
  - las personas ... acerca de ellos
  - la gente ... en cuanto a ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''La gente'' mantiene el valor inclusivo de ሰብእ. ''Respecto de ellos'' expresa la relación del error con los luminares, evitando la idea espacial de ''entre ellos''.'
- source_word: እሙንቱ ብርሃናት
  english_pob_choice: these lights
  chosen_spanish: estas luces
  alternatives_spanish:
  - estos luminares
  - estas luminarias
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Luces'' es claro y fiel al término general, y funciona bien en el registro del pasaje astronómico.'
- source_word: ተቀየዩ
  english_pob_choice: serve faithfully
  chosen_spanish: sirven fielmente
  alternatives_spanish:
  - prestan servicio con fidelidad
  - sirven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail revisa este verbo como 'serve faithfully'; en español, 'sirven fielmente' conserva tanto el servicio como la idea de fidelidad/rectitud.
- source_word: መንበረ ዓለም
  english_pob_choice: the stations of the world
  chosen_spanish: las estaciones del mundo
  alternatives_spanish:
  - los puestos del mundo
  - los lugares del mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Estaciones'' conserva la terminología técnica del esquema cósmico y permite repetir la frase final con la misma carga semántica del original.'
- source_word: ቀዳሚ ኆኅት
  english_pob_choice: the first portal
  chosen_spanish: el primer portal
  alternatives_spanish:
  - la primera puerta
  - el primer gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Portal'' preserva el registro apocalíptico y la consistencia terminológica del conjunto.'
- source_word: ሣልስ ኆኅት
  english_pob_choice: the third portal
  chosen_spanish: el tercer portal
  alternatives_spanish:
  - la tercera puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la misma terminología para las aberturas celestiales.
- source_word: ራብዕ ኆኅት
  english_pob_choice: the fourth portal
  chosen_spanish: el cuarto portal
  alternatives_spanish:
  - la cuarta puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la misma terminología para las aberturas celestiales.
- source_word: ሳድስ ኆኅት
  english_pob_choice: the sixth portal
  chosen_spanish: el sexto portal
  alternatives_spanish:
  - la sexta puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la misma terminología para las aberturas celestiales.
- source_word: ይትፌጸም ጥንቃቄ ዓለም
  english_pob_choice: the ordering of the world is completed
  chosen_spanish: el orden del mundo se completa
  alternatives_spanish:
  - el orden cuidadoso del mundo se completa
  - el arreglo del mundo se completa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa simplifica hacia 'the ordering of the world'; en español, 'el orden del mundo se completa' es natural y conserva la idea de arreglo cósmico sin añadir explicación excesiva.
- source_word: ፻፷ወ፬ ወ፬
  english_pob_choice: three hundred and sixty-four
  chosen_spanish: trescientos sesenta y cuatro
  alternatives_spanish:
  - '364'
  lexicon: Ge'ez numeral system
  rationale: Los numerales se expresan en palabras para una lectura fluida y pública en español.
theological_decisions:
- issue: Valor de በጽድቅ / idea de orden recto en el trasfondo astronómico
  english_pob_reading: serve faithfully / in righteousness, preserving the ordered cosmic sense
  chosen_spanish_reading: sirven fielmente
  alternative_spanish_readings:
  - sirven en justicia
  - sirven rectamente
  rationale: Aunque el texto base vincula la regularidad cósmica con la justicia/rectitud, la revisión inglesa ya optó por una formulación más directa. En español, 'fielmente' conserva la noción de servicio correcto y ordenado sin perder naturalidad.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
- issue: Interpretación del cierre sobre 364 estaciones
  english_pob_reading: the ordering of the world is completed in three hundred and sixty-four stations of the world
  chosen_spanish_reading: el orden del mundo se completa en trescientos sesenta y cuatro estaciones del mundo
  alternative_spanish_readings:
  - el orden del mundo se completa en 364 estaciones del mundo
  - la ordenación del mundo se completa en trescientos sesenta y cuatro estaciones
  rationale: Se mantiene la lectura cosmológica y esquemática del número 364, respetando la terminología de estaciones sin convertir explícitamente el pasaje en una paráfrasis calendárica.
  doctrine_reference: Translation philosophy §Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'Se revisó el audit trail inglés más reciente, que simplificó la formulación a ''serve faithfully'' y ''the ordering of the world''. También se tuvo en cuenta la corrección previa del numeral y de la distribución de las portales: cuatro posiciones, una en cada portal mencionado. La traducción española refleja esas revisiones y evita las lecturas ya adjudicadas como erróneas.'
  spanish_consistency_notes:
  - Se usa 'portal' de forma consistente para las aberturas celestiales.
  - Se mantiene 'estaciones del mundo' para conservar la terminología técnica del pasaje.
  - Se traduce ሰብእ de modo inclusivo como 'la gente'.
  - Se evita introducir 'SEÑOR' o 'Cristo', ya que el pasaje no lo requiere.
  - Los marcadores de nota [a]-[e] aparecen exactamente en el texto principal y corresponden a las notas listadas.
