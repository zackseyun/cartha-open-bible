  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto. 'Portal', 'luces' y 'mundo' son adecuados en este contexto. 'Sirven fielmente' refleja bien la revisión auditada de ተቀየዩ. La repetición de 'estaciones del mundo' es aceptable por fidelidad al original.
