base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/075/003.yaml
  text: For concerning the signs and the seasons and the years and the days[a], Uriel, the angel whom the Lord of glory appointed forever over all the luminaries of heaven in heaven and in the world, showed me how they rule over the face of heaven and are seen upon the earth[e][d][c][b], and become guides for day and for night—the sun and the moon and the stars and all the ministering powers that make their circuit in all the chariots of heaven.
  footnotes:
  - marker: a
    text: Or 'appointed times' for 'seasons.' The term can denote fixed divisions of time in a calendrical sense.
    reason: lexical_alternative
  - marker: b
    text: '''The face of heaven'' is a literal idiom for the visible expanse of the sky.'
    reason: cultural_note
  - marker: c
    text: '''Ministering powers'' is uncertain; it may refer to attendant heavenly orders or functions associated with the celestial bodies.'
    reason: lexical_alternative
  - marker: d
    text: '''Chariots of heaven'' may denote the ordered courses by which the heavenly bodies move, but the translation keeps the text''s imagery.'
    reason: lexical_alternative
  - marker: e
    text: Or 'whom the Lord of glory appointed over all the luminaries'.
    reason: previous_rendering
