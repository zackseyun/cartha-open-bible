translation:
  language: es
  text: Porque, acerca de las señales, las estaciones[a] y los años y los días, Uriel, el ángel a quien el Señor de gloria nombró para siempre sobre todas las lumbreras del cielo, en el cielo y en el mundo, me mostró cómo ellas gobiernan sobre la faz del cielo[b] y son vistas sobre la tierra, y sirven de guías para el día y para la noche —el sol y la luna y las estrellas y todas las potestades ministrantes[c] que hacen su circuito en todos los carros del cielo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiempos señalados» para «estaciones». El término puede denotar divisiones fijas del tiempo en sentido calendárico.
    reason: lexical_alternative
  - marker: b
    text: «La faz del cielo» es un giro literal para la extensión visible del firmamento.
    reason: cultural_note
  - marker: c
    text: «Potestades ministrantes» es una traducción incierta; puede referirse a órdenes celestiales o a funciones asociadas con los cuerpos celestes.
    reason: lexical_alternative
  - marker: d
    text: «Carros del cielo» puede aludir a los cursos ordenados por los que se mueven los cuerpos celestes, pero la traducción conserva la imagen del texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ትእምርት
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - marcas
  - portentos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico-calendárico, el término designa indicadores observables del orden celestial. «Señales» conserva el valor de referencia cósmica sin cargarlo innecesariamente con matiz ominoso.
- source_word: አዝማን
  english_pob_choice: seasons
  chosen_spanish: estaciones
  alternatives_spanish:
  - tiempos señalados
  - tiempos
  - épocas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia «señales... estaciones... años... días» pide una división temporal natural en español. «Estaciones» comunica bien la idea de periodos fijados dentro del orden cósmico, y deja abierta la posible noción de tiempos señalados.
- source_word: መዋዕል
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - periodos
  - tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La serie temporal culmina de modo directo en «días», que es la correspondencia más transparente y fiel al orden del texto.
- source_word: አርአየኒ
  english_pob_choice: showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me reveló
  - me hizo ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un verbo visionario estándar. «Me mostró» es sobrio y fiel, sin añadir el peso interpretativo de «reveló».
- source_word: እግዚአ ስብሐት
  english_pob_choice: the Lord of glory
  chosen_spanish: el Señor de gloria
  alternatives_spanish:
  - el Señor de la gloria
  - el Dueño de gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título elevado y apocalíptico. «Señor de gloria» sigue de cerca la construcción del original y del audit trail inglés.
- source_word: ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por los siglos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del contexto confirmó que el ge'ez incluye la idea de duración perpetua en la designación de Uriel. «Para siempre» transmite fielmente ese valor temporal sin forzar solemnidad artificial.
- source_word: ብርሃናት ሰማይ
  english_pob_choice: the luminaries of heaven
  chosen_spanish: las lumbreras del cielo
  alternatives_spanish:
  - los luminares del cielo
  - las luces del cielo
  - los astros del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lumbreras» es un término español bíblico y digno para los cuerpos celestes como portadores de luz. Mantiene el registro técnico-cósmico de «luminaries» sin sonar excesivamente moderno.
- source_word: በሰማይ ወበዓለም
  english_pob_choice: in heaven and in the world
  chosen_spanish: en el cielo y en el mundo
  alternatives_spanish:
  - en el cielo y en la tierra
  - en el cielo y en el ámbito terrenal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Mundo» conserva la amplitud cosmológica del ge'ez y evita reducir de entrada la oposición a un simple cielo/tierra. La frase mantiene el alcance doble del ámbito celeste y el orden mundano.
- source_word: ይምልኩ
  english_pob_choice: they rule
  chosen_spanish: gobiernan
  alternatives_spanish:
  - rigen
  - dominan
  - reinan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa autoridad ordenadora. En español, «gobiernan» comunica bien la función de los luminares como reguladores del tiempo sin endurecer el matiz en un dominio político.
- source_word: ገጸ ሰማይ
  english_pob_choice: the face of heaven
  chosen_spanish: la faz del cielo
  alternatives_spanish:
  - el rostro del cielo
  - la superficie del cielo
  - la extensión del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la imagen idiomática literal. «Faz del cielo» es comprensible en español bíblico y mantiene la metáfora visible en el texto fuente.
- source_word: መራሕያነ
  english_pob_choice: guides
  chosen_spanish: guías
  alternatives_spanish:
  - conductores
  - guías rectoras
  - directores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto las luminarias funcionan como marcadores y orientadores del día y de la noche. «Guías» expresa bien esa función sin sobrecargarla con autoridad institucional.
- source_word: ቅንየታት
  english_pob_choice: ministering powers
  chosen_spanish: potestades ministrantes
  alternatives_spanish:
  - poderes ministrantes
  - seres ministrantes
  - órdenes ministrantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es oscuro y puede aludir a órdenes celestiales o funciones asociadas a los cuerpos celestes. «Potestades ministrantes» preserva la ambigüedad apocalíptica y el tono elevado, sin resolver prematuramente el referente.
- source_word: የአውዱ
  english_pob_choice: make their circuit
  chosen_spanish: hacen su circuito
  alternatives_spanish:
  - recorren su curso
  - dan su vuelta
  - se mueven en círculo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión apunta al movimiento circular u ordenado de los cuerpos celestes. «Hacen su circuito» conserva esa imagen astronómica sin convertirla en una explicación mecánica.
- source_word: ሰረገላት ሰማይ
  english_pob_choice: the chariots of heaven
  chosen_spanish: los carros del cielo
  alternatives_spanish:
  - los carros celestiales
  - los carros del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la imagen literal del texto. «Carros del cielo» es natural en español y conserva la imaginería apocalíptica que el audit trail inglés quiso preservar.
theological_decisions:
- issue: Cómo traducir el lenguaje de gobierno atribuido a los luminares
  english_pob_reading: 'Retain personal and ruling language: ''they rule ... and become guides'''
  chosen_spanish_reading: 'Conservar el lenguaje de gobierno: «gobiernan... y llegan a ser guías»'
  alternative_spanish_readings:
  - 'Reducir a lenguaje impersonal astronómico: «se mueven por el cielo y señalan el día y la noche»'
  - «marcan el día y la noche»
  rationale: El texto presenta el orden cósmico con lenguaje animado y jerárquico. Mantener «gobiernan» evita una lectura modernizante que aplana la cosmología apocalíptica y respeta la fuerza del original.
  doctrine_reference: Preservar la imaginería apocalíptica y el orden creado sin reducirlo a proseísmo científico moderno.
- issue: Cómo representar la relación entre Uriel y su comisión sobre las lumbreras
  english_pob_reading: the angel whom the Lord of glory appointed forever over all the luminaries
  chosen_spanish_reading: el ángel a quien el Señor de gloria nombró para siempre sobre todas las lumbreras
  alternative_spanish_readings:
  - «nombró sobre todas las lumbreras»
  - «designó eternamente sobre todas las lumbreras»
  rationale: La revisión del texto fuente exige conservar «para siempre». La formulación elegida mantiene tanto la comisión divina como su duración perpetua, sin desplazar el foco del verbo «nombró/designó».
  doctrine_reference: Respetar el contenido temporal explícito del texto fuente y la comisión angelical permanente.
- issue: Cómo traducir la expresión «chariots of heaven»
  english_pob_reading: Keep the literal image in the main text
  chosen_spanish_reading: 'Mantener la imagen literal: «carros del cielo»'
  alternative_spanish_readings:
  - «cursos del cielo»
  - «órbitas del cielo»
  rationale: Aunque la frase probablemente apunta a recorridos celestes ordenados, el texto usa una imagen concreta. Se conserva la metáfora para no borrar la tensión entre imagen y función.
  doctrine_reference: Preservar la imaginería apocalíptica en vez de resolverla completamente en una explicación astronómica.
translation_notes:
  revision_awareness: 'La redacción española toma en cuenta la revisión más reciente del audit trail, que reordenó la cláusula inicial para reflejar mejor la sintaxis ge''ez y, sobre todo, corrigió la omisión de ለዓለም («para siempre»). Por eso la versión española integra expresamente «para siempre» en la comisión de Uriel y mantiene el orden: primero el marco temporal («señales... estaciones... años... días»), luego la visión dada por Uriel y finalmente la descripción de la función de las lumbreras.'
  spanish_consistency_notes:
  - Se usa «Señor de gloria» como equivalente constante del título divino del audit trail.
  - Se mantiene «lumbreras» para conservar un registro bíblico-natural en español y diferenciarlo de otras opciones más técnicas como «luminares».
  - 'Se conserva la tensión entre lenguaje astronómico y lenguaje personal/jerárquico: los cuerpos celestes «gobiernan» y «hacen su circuito», en vez de reducirse a meros mecanismos.'
  - No se sustituye «mundo» por «tierra» porque el ge'ez distingue un ámbito cósmico más amplio que el terrestre inmediato.
