  to: Porque, acerca de las señales, las estaciones[a] y los años y los días, Uriel, el ángel a quien el Señor de gloria nombró para siempre sobre todas las lumbreras del cielo, en el cielo y en el mundo, me mostró cómo ellas gobiernan sobre la faz del cielo[b] y son vistas sobre la tierra, y sirven de guías para el día y para la noche —el sol y la luna y las estrellas y todas las potestades ministrantes[c] que hacen su circuito en todos los carros del cielo[d].
