    issue: 'Construcción relativa mejorable: ''de donde'''
    rationale: Para referirse a 'aberturas', en español resulta más preciso y fluido 'de las cuales' que 'de donde', evitando un giro más coloquial o locativo impreciso.
  - severity: medium
    issue: 'Pasiva poco natural: ''cuando son abiertas'''
    rationale: Aunque fiel al inglés, en español suena rígido. 'Cuando se abren' conserva el sentido temporal y la imagen de las aberturas sin pérdida de significado.
