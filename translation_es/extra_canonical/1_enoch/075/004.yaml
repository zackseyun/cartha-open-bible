translation:
  language: es
  text: Asimismo, Uriel me mostró doce aberturas en el circuito de los carros del sol en el cielo, de las cuales salen los rayos del sol[a], y de las cuales sale el calor sobre la tierra, cuando se abren en las estaciones señaladas para ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término ge'ez subyacente es difícil y puede sugerir literalmente 'pies' o, por extensión en este contexto, rayos o haces del sol.
    reason: lexical_alternative
lexical_decisions:
- source_word: ከመዝ ፲ሥሩ ወካልእ / በአበበ ሰረገላት ፀሐይ
  english_pob_choice: twelve openings in the circuit of the chariots of the sun
  chosen_spanish: doce aberturas en el circuito de los carros del sol
  alternatives_spanish:
  - doce aperturas en el circuito de los carros del sol
  - doce aberturas en el recorrido de los carros del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto astronómico exige preservar la imagen de aberturas/aperturas celestes y el movimiento ordenado del sol. En español, 'aberturas' comunica mejor la idea de portales o huecos abiertos que 'aperturas', y 'carros' mantiene la imagen vehicular elevada de 'chariots' sin suavizarla con una paráfrasis moderna.
- source_word: አርአየኒ
  english_pob_choice: showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me reveló
  - me hizo ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula visionaria directa y natural en español. 'Me mostró' conserva la inmediatez del testimonio apocalíptico sin añadir matices interpretativos.
- source_word: እለ እምኔሆሙ ይወፅኡ እገሪሃ ለፀሐይ
  english_pob_choice: from which the rays of the sun go out
  chosen_spanish: de donde salen los rayos del sol
  alternatives_spanish:
  - de donde sale su luz
  - de donde salen los haces del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La tradición auditada reconoce la dificultad de እገሪሃ y admite un valor cercano a 'rayos' o 'pies' en sentido literal. En español, 'rayos del sol' expresa con claridad el sentido contextual sin borrar la tensión lexical; por eso se mantiene una nota que recuerda la dificultad del término.
- source_word: ሞቅ
  english_pob_choice: warmth
  chosen_spanish: el calor
  alternatives_spanish:
  - la calidez
  - el calor de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Calor'' es la correspondencia más natural y fiel para el efecto físico descrito. Aunque ''calidez'' suena más suave, aquí el pasaje habla del influjo térmico sobre la tierra, por lo que ''calor'' es más preciso.'
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sobre la tierra'' conserva la relación espacial elevada del original y su registro solemne. Evita volver más prosaica la frase con ''en la tierra''.'
- source_word: ሶበ ይትረኃዉ
  english_pob_choice: when they are opened
  chosen_spanish: cuando son abiertas
  alternatives_spanish:
  - cuando se abren
  - cuando han sido abiertas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasaje describe aberturas cósmicas que se abren en momentos fijados; la pasiva española 'son abiertas' refleja bien esa apertura dispuesta y no espontánea.
- source_word: በአዝማን እለ እሙራን ሎሙ
  english_pob_choice: in the seasons appointed for them
  chosen_spanish: en las estaciones señaladas para ellas
  alternatives_spanish:
  - en las estaciones establecidas para ellas
  - en sus estaciones determinadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Señaladas'' traduce la idea de tiempos fijados o designados y mantiene el tono bíblico sin sonar artificial. ''Para ellas'' conserva la referencia a las aberturas como elemento femenino gramatical implícito en español.'
theological_decisions:
- issue: Preservación de la cosmología apocalíptica
  english_pob_reading: Retain concrete cosmological imagery of solar chariots and openings rather than reducing the verse to a general statement about sunlight and weather.
  chosen_spanish_reading: Conservar la imaginería concreta de carros solares y aberturas celestes, sin convertir el verso en una observación astronómica genérica.
  alternative_spanish_readings:
  - Interpretarlo de forma más metafórica como simple ciclo del sol
  - Atenuar la imagen a 'movimientos' o 'influencias' del sol
  rationale: El texto pertenece al Libro Astronómico de 1 Enoc y presenta un orden celeste mediante imágenes apocalípticas. La traducción debe mantener ese mundo conceptual, porque suavizarlo borraría parte del argumento y de la teología de la obra.
  doctrine_reference: 'Principio de traducción: preservar la imaginería apocalíptica y el orden cósmico del texto fuente.'
- issue: Tensión léxica de እገሪሃ
  english_pob_reading: The term is difficult and may more literally suggest 'feet' or, by extension, rays or beams.
  chosen_spanish_reading: Traducir con 'rayos del sol' en el texto principal y dejar constancia de la dificultad en nota.
  alternative_spanish_readings:
  - sus pies
  - sus haces
  - su luz
  rationale: '''Rayos del sol'' es inteligible y encaja con el contexto de emisiones solares. Sin embargo, no elimina la dificultad del etiópico; por eso la nota conserva la alternativa léxica y evita borrar la tensión textual.'
  doctrine_reference: 'Cautela filológica: no ocultar problemas de transmisión cuando el contexto permite una solución probable.'
translation_notes:
  revision_awareness: Tomé como base la última revisión auditada, que corrigió la lectura previa de 'another law'/'courses' y afirmó que el pasaje trata de doce aberturas en el circuito de los carros del sol. Por eso la versión española evita toda referencia a 'ley' o 'órdenes' y adopta la imaginería astronómica concreta. También seguí la decisión revisada de mantener la salida de rayos del sol y el calor sobre la tierra, con una formulación española natural pero fiel al marco apocalíptico.
  spanish_consistency_notes:
  - Usé 'Yahvé' no aplica aquí; 'Dios' tampoco aparece en este versículo.
  - Conservé el registro apocalíptico con 'carros del sol' en vez de modernizar a 'órbitas' o 'recorridos'.
  - Elegí 'aberturas' para reflejar portales celestes y evitar un calco demasiado técnico o abstracto.
  - La nota [a] queda anclada en la expresión afectada para preservar la tensión léxica del ge'ez.
