translation:
  language: es
  text: Cuando se abran los otros doce portales[a] en el cielo, en los extremos de la tierra[b], de los cuales salen el sol, la luna y las estrellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aperturas» o «ventanas»; el término ge'ez designa aberturas en la estructura celeste.
    reason: lexical_alternative
  - marker: b
    text: La expresión «los extremos de la tierra» refleja una imaginería cosmológica antigua, no una descripción científica moderna.
    reason: cultural_note
lexical_decisions:
- source_word: ሶበ
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Al tiempo que
  - En el momento en que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce una cláusula temporal que en español se expresa naturalmente con «cuando», no con un adverbio de secuencia.
- source_word: ይትረኃዉ
  english_pob_choice: are opened
  chosen_spanish: se abran
  alternatives_spanish:
  - se abren
  - son abiertos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez es pasivo/reflexivo y pide una construcción pasiva o media en español. «Se abran» conserva el valor de apertura y el matiz temporal de la cláusula.
- source_word: ፲ሥሩ ወካልእ
  english_pob_choice: twelve other
  chosen_spanish: los doce
  alternatives_spanish:
  - otros doce
  - doce más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige «other» y deja simplemente el número doce. En esta sección, el contexto cosmológico ya identifica el conjunto de portales, por lo que «los doce» es fiel y natural.
- source_word: ኃዋላወ
  english_pob_choice: portals
  chosen_spanish: portales
  alternatives_spanish:
  - aperturas
  - ventanas
  - aberturas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Portales» reproduce bien la imagen estructural y apocalíptica de aberturas celestes, y evita la ambigüedad arquitectónica de «ventanas» en español moderno.
- source_word: በሰማይ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo celeste
  - en el firmamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el español «cielo» comunica de manera directa el ámbito cósmico del texto; «firmamento» sería posible, pero menos natural en esta sintaxis.
- source_word: ዲበ አጽናፈ ምድር
  english_pob_choice: at the ends of the earth
  chosen_spanish: a los extremos de la tierra
  alternatives_spanish:
  - en los confines de la tierra
  - en los bordes de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión conserva la cosmología antigua sin modernizarla. «Extremos» refleja bien la idea de límites o confines geográficos/cósmicos.
- source_word: እለ እምኔሆሙ ይወፅእ
  english_pob_choice: from which ... come out
  chosen_spanish: de los cuales salen
  alternatives_spanish:
  - de los cuales salen hacia afuera
  - de donde salen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relativa se vierte con una forma plural concordante con «portales». «Salen» expresa el movimiento de salida de manera directa y literaria.
- source_word: ፀሐይ ወወርኅ ወከዋክብት
  english_pob_choice: the sun and the moon and the stars
  chosen_spanish: el sol, la luna y las estrellas
  alternatives_spanish:
  - el sol y la luna y las estrellas
  - sol, luna y estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La enumeración se mantiene clara y fluida en español con artículos definidos, conservando la secuencia del original.
theological_decisions:
- issue: Cosmología apocalíptica de portales celestiales y extremos de la tierra
  english_pob_reading: Retain concrete imagery of 'openings in heaven' and 'ends of the earth'
  chosen_spanish_reading: Conservar la imagen concreta de portales celestiales abiertos a los extremos de la tierra
  alternative_spanish_readings:
  - Interpretarlo de modo más abstracto como direcciones del cielo
  - Reformularlo como zonas astronómicas
  rationale: El texto pertenece a una cosmología apocalíptica que presenta una arquitectura del cosmos. La traducción no la aplana con lenguaje moderno ni la convierte en descripción científica.
  doctrine_reference: 'Principio de traducción: preservar la imaginería apocalíptica y la tensión cosmológica del texto fuente.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que corrige la lectura de ሶበ como «cuando», ይትረኃዉ como «son/se abren», y ፲ሥሩ ወካልእ como «doce» sin añadir «otros». También se conservó la imaginería cosmológica de los portales celestiales y de los extremos de la tierra.
  spanish_consistency_notes:
  - Se prefirió «portales» por coherencia con la terminología POB auditada para aperturas celestes.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes porque el versículo no contiene el Nombre divino.
  - La puntuación reproduce una cláusula temporal seguida de una relativa explicativa, en español natural y publication-readable.
