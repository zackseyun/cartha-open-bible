base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/075/001.yaml
  text: And the leaders of the heads of thousands[a], who are over all creation and over all the stars, together with those four that are added and do not separate from their service[e][d][c][b], according to the reckoning of the year—and these render service on the four days that are not counted in the reckoning of the year.
  footnotes:
  - marker: a
    text: Or 'are joined' instead of 'are added'; the Ge'ez can suggest attachment to the ordered system of the year.
    reason: lexical_alternative
  - marker: b
    text: The 'four days that are not counted' are the extra calendrical days associated with the turning points of the year in the Astronomical Book's 364-day scheme.
    reason: cultural_note
  - marker: c
    text: The verb rendered 'render service' is difficult and may also carry the sense of taking turns or alternating in function.
    reason: lexical_alternative
  - marker: d
    text: Or 'And their leaders, the chiefs of thousands'.
    reason: previous_rendering
  - marker: e
    text: Or 'together with those four, are added and do not separate'.
