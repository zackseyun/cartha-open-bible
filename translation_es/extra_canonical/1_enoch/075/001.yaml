revisions:
- from: Y los líderes de los jefes de millares, sobre toda la creación y sobre todas las estrellas, junto con esos cuatro que son añadidos[a] y no se separan de su servicio[c][e][d][b], según el cómputo del año; y estos prestan servicio en los cuatro días que no se cuentan en el cómputo del año.
