translation:
  language: es
  text: Y los líderes de los jefes de millares, que están sobre toda la creación y sobre todas las estrellas, junto con aquellos cuatro que son añadidos[a] y no se separan de su servicio, según el cómputo del año; y estos prestan servicio[b] en los cuatro días que no se cuentan en el cómputo del año[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «son unidos»; el término etiópico puede sugerir incorporación al sistema ordenado del año.'
    reason: lexical_alternative
  - marker: b
    text: El verbo traducido «prestan servicio» es difícil y también puede sugerir alternancia o desempeño por turnos.
    reason: lexical_alternative
  - marker: c
    text: Los cuatro días «que no se cuentan» se relacionan con los días calendáricos suplementarios del esquema astronómico de 364 días del Libro Astronómico.
    reason: cultural_note
lexical_decisions:
- source_word: መራሕያኒሆሙ
  english_pob_choice: their leaders
  chosen_spanish: los líderes
  alternatives_spanish:
  - sus guías
  - los que los conducen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El griego/etiópico no exige una traducción posesiva explícita en español. «Líderes» comunica bien la función jerárquica en el marco cósmico y evita una repetición artificial de «sus».
- source_word: አርእስተ አእላፍ
  english_pob_choice: the chiefs of thousands
  chosen_spanish: los jefes de millares
  alternatives_spanish:
  - los cabezas de millares
  - los capitanes de millares
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Heads of thousands» se rinde de manera más directa como «jefes de millares». «Millares» conserva la idea de unidades jerárquicas sin militarizar innecesariamente el texto.
- source_word: ዲበ ኵሉ ፍጥረት
  english_pob_choice: over all creation
  chosen_spanish: sobre toda la creación
  alternatives_spanish:
  - sobre toda criatura
  - sobre el conjunto de la creación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Creación» preserva el alcance cósmico del sustantivo etiópico y suena natural en español bíblico contemporáneo.
- source_word: ዲበ ኵሉ ከዋክብት
  english_pob_choice: over all the stars
  chosen_spanish: sobre todas las estrellas
  alternatives_spanish:
  - sobre cada estrella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pluralidad universal del original se expresa con «todas las estrellas», manteniendo la referencia astronómica directa.
- source_word: ምስለ እሉ ፬
  english_pob_choice: together with those four
  chosen_spanish: junto con esos cuatro
  alternatives_spanish:
  - con esos cuatro
  - al lado de esos cuatro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Junto con» conserva la asociación sin decidir de antemano si los cuatro son entidades o días. «Esos» mantiene la deixis del texto.
- source_word: ይትዌሰኩ
  english_pob_choice: are added
  chosen_spanish: son añadidos
  alternatives_spanish:
  - se añaden
  - son incorporados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo etiópico permite una pasiva española clara. «Son añadidos» retiene el sentido de adjunción calendárica y conserva la posible tensión entre incorporación y pertenencia al sistema.
- source_word: ኢይትሌለዩ እምነ ምግባሮሙ
  english_pob_choice: do not separate from their service
  chosen_spanish: no se separan de su servicio
  alternatives_spanish:
  - no se apartan de su función
  - no se desligan de su servicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Servicio» es la mejor forma de mantener la fuerza funcional/cósmica de ምግባር en este contexto. «No se separan» sigue de cerca la negación del verbo y deja abierta la idea de permanencia en el cargo o función.
- source_word: በከመ ሐሳበ ዓመት
  english_pob_choice: according to the reckoning of the year
  chosen_spanish: según el cómputo del año
  alternatives_spanish:
  - según el recuento del año
  - de acuerdo con el cálculo del año
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cómputo» comunica bien el carácter técnico y calendárico de la expresión, y en español bíblico suena más preciso que «conteo».
- source_word: ይትቀየዩ
  english_pob_choice: render service
  chosen_spanish: prestan servicio
  alternatives_spanish:
  - sirven
  - cumplen su servicio
  - toman su turno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo es difícil y admite la idea de alternancia o función asignada. «Prestan servicio» conserva la noción de desempeño obligatorio sin cerrar excesivamente el matiz.
- source_word: ፬ መዋዐለ እለ ኢይትኃሰቡ
  english_pob_choice: the four days that are not counted
  chosen_spanish: los cuatro días que no se cuentan
  alternatives_spanish:
  - los cuatro días que no se computan
  - los cuatro días que no se contabilizan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La negativa calendárica queda más natural en español con «no se cuentan». Esto conserva el contraste técnico entre días ordinarios del año y días intercalarios excluidos del cómputo.
theological_decisions:
- issue: Identidad de «esos cuatro»
  english_pob_reading: The main text leaves 'those four' somewhat open, while the final clause identifies them functionally with four days not counted in the yearly reckoning.
  chosen_spanish_reading: El texto principal conserva la referencia abierta a «esos cuatro», mientras la cláusula final los identifica funcionalmente como cuatro días no contados en el cómputo del año.
  alternative_spanish_readings:
  - los cuatro son solo días intercalarios
  - los cuatro son únicamente seres celestiales
  - los cuatro son a la vez días y sus oficiales celestiales
  rationale: La sintaxis del etiópico mantiene una tensión real entre los cuatro como entidades asociadas y los cuatro días del cierre. La traducción española preserva esa ambigüedad en vez de resolverla prematuramente.
  doctrine_reference: Preservar la tensión interpretativa documentada por el POB.
- issue: Relación entre los líderes y los cuatro añadidos
  english_pob_reading: together with those four that are added and do not separate from their service
  chosen_spanish_reading: junto con esos cuatro que son añadidos y no se separan de su servicio
  alternative_spanish_readings:
  - los líderes se añaden junto con los cuatro
  - los cuatro son añadidos a los líderes
  rationale: La revisión gramatical indica que «son añadidos» modifica a los cuatro, no a los líderes. El español debe reflejar esa relación relativa con claridad.
  doctrine_reference: Atender a la sintaxis de la cláusula relativa en ge'ez.
translation_notes:
  revision_awareness: Se incorporó la revisión gramatical que corrige la relación entre «los líderes» y «los jefes de millares», y se respetó la cláusula relativa que hace que «son añadidos» modifique a «esos cuatro». También se ajustó la sintaxis española para mantener la ambigüedad útil del original entre entidades celestiales y días intercalarios.
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma general, pero este versículo no contiene el nombre divino.
  - Se mantuvo «creación», «estrellas» y «cómputo del año» para conservar el campo semántico astronómico-calendárico.
  - «Servicio» se conservó de manera consistente para ምግባር en este contexto, evitando sustituirlo por una paráfrasis más interpretativa.
