  rationale: Se corrige la sintaxis española con «que están» para reflejar la relación relativa presente en la fuente y en el inglés auditado, se eliminan notas heredadas que ya no representan alternativas válidas tras la adjudicación gramatical, y se reordena/ancla el aparato de notas para una lectura natural en español. El resto de las decisiones léxicas principales se conservan.
