  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'vientos', 'espíritu', 'rocío' y 'cielo' están bien elegidos según las decisiones léxicas documentadas. La conservación de 'espíritu del rocío' respeta la rationale teológica de no desmitologizar la imaginería cósmica.
