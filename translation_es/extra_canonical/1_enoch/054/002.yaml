translation:
  language: es
  text: Y traerán[a] a los reyes y a los poderosos, y los arrojarán en aquel profundo valle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto no se nombra en este versículo; el plural implícito probablemente remite a agentes ya mencionados en la visión, quizá asistentes angelicales.
    reason: alternative_reading
lexical_decisions:
- source_word: እምጽእዎሙ
  english_pob_choice: they shall bring them
  chosen_spanish: traerán
  alternatives_spanish:
  - los llevarán
  - los conducirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa la acción de traer o llevar a alguien hacia un lugar. En español, «traerán» conserva el movimiento hacia el destino de juicio sin añadir una interpretación más específica que el texto no exige.
- source_word: ለነገሥት
  english_pob_choice: the kings
  chosen_spanish: a los reyes
  alternatives_spanish:
  - a los reyes gobernantes
  - a los monarcas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo se refiere de manera directa a reyes. Se mantiene el artículo y la preposición de objeto directo para una lectura natural en español, con el valor definido que el contexto judicial ya presupone.
- source_word: ወለኃያላን
  english_pob_choice: and the mighty
  chosen_spanish: y a los poderosos
  alternatives_spanish:
  - y a los fuertes
  - y a los poderosos ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Poderosos» conserva el rango sociopolítico y el tono elevado del apocalipsis mejor que una paráfrasis como «los fuertes». Se evita «Cristo» o cualquier término eclesial; aquí el referente es de poder humano.
- source_word: ይውድ ይዎሙ
  english_pob_choice: cast them
  chosen_spanish: los arrojarán
  alternatives_spanish:
  - los echarán
  - los lanzarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La acción es violenta y judicial. «Arrojarán» comunica fuerza y juicio con un registro bíblico claro en español, sin volverlo excesivamente literario ni suavizarlo con «depositarán».
- source_word: ውስተ
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  - hacia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el valor básico es direccional, en español la secuencia «arrojar en» es idiomática y comunica entrada en el lugar de castigo. No se fuerza una preposición más pesada que entorpezca la frase.
- source_word: ዝኩ
  english_pob_choice: that
  chosen_spanish: aquel
  alternatives_spanish:
  - ese
  - ese mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo remite a un lugar ya mostrado en la visión. «Aquel» preserva la distancia deíctica y el matiz visionario mejor que «ese».
- source_word: ዕሙቅ
  english_pob_choice: deep
  chosen_spanish: profundo
  alternatives_spanish:
  - hondo
  - abismal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Profundo» traduce el rasgo físico de la depresión sin introducir una carga interpretativa mayor. «Abismal» sería más fuerte de lo que el término exige.
- source_word: ቈላ
  english_pob_choice: valley
  chosen_spanish: valle
  alternatives_spanish:
  - hondonada
  - desfiladero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo designa una depresión geográfica tipo valle. «Valle» es la equivalencia más directa y legible en español.
theological_decisions:
- issue: Sujeto no nombrado de la acción
  english_pob_reading: Render simply as 'they' without specifying angels
  chosen_spanish_reading: Renderizar simplemente con un sujeto plural implícito en la forma verbal, sin nombrar ángeles ni mensajeros
  alternative_spanish_readings:
  - Los ángeles traerán
  - Los asistentes traerán
  rationale: El ge'ez presenta una forma verbal plural sin sujeto explícito. Para respetar la cautela del POB inglés, el español mantiene la referencia indefinida mediante la flexión verbal («traerán»/«arrojarán») y no resuelve la identidad del sujeto.
  doctrine_reference: Preservar la ambigüedad textual; no forzar una identificación no explícita.
translation_notes:
  revision_awareness: 'La versión sigue el texto ge''ez disponible y el criterio del POB inglés: mantiene el sujeto plural sin explicitarlo, conserva el tono judicial-apocalíptico, y traduce el lugar como una depresión espacial concreta, no como una abstracción teológica.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «poderosos» para ኃያላን por coherencia con el registro apocalíptico y la decisión inglesa documentada.
  - 'Se evita suavizar la violencia verbal: «arrojarán» mantiene el valor de castigo del original.'
  - El demostrativo «aquel» reproduce la deixis de visión del ge'ez y sugiere un lugar previamente mostrado.
