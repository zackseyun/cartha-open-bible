translation:
  language: es
  text: 'Y le pregunté al ángel de paz que iba conmigo, diciendo: «¿Para quién se preparan estas cadenas[b] de los instrumentos[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El giro ge'ez traducido como «de los instrumentos» es incierto en este testimonio; puede referirse con más precisión a implementos o dispositivos asociados con el castigo.
    reason: textual_variant
  - marker: b
    text: 'O: «estas ataduras» / «estos grillos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ተስእእክዎ
  english_pob_choice: I asked
  chosen_spanish: le pregunté
  alternatives_spanish:
  - le inquirí
  - le pregunté a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo introduce una pregunta directa de Enoc al ángel. «Le pregunté» reproduce de forma natural la acción de interrogar sin añadir matices ajenos.
- source_word: መልአከ ሰላም
  english_pob_choice: the angel of peace
  chosen_spanish: el ángel de paz
  alternatives_spanish:
  - el ángel pacífico
  - el ángel de bienestar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantengo la expresión titular «ángel de paz» en forma natural en español. Evita convertirla en un simple adjetivo y conserva su valor fijo en la narración enóquica.
- source_word: ዘየሐውር ምስሌየ
  english_pob_choice: who went with me
  chosen_spanish: que iba conmigo
  alternatives_spanish:
  - que fue conmigo
  - que acompañaba conmigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula relativa identifica al ángel como compañero de visión. «Iba conmigo» expresa bien el movimiento acompañante y suena más natural que una traducción rígida.
- source_word: እሉ እስረተ
  english_pob_choice: these chains
  chosen_spanish: estas cadenas
  alternatives_spanish:
  - estos vínculos
  - estas prisiones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cadenas» conserva la imagen concreta y punitiva que el texto presenta. No suaviza la fuerza material del objeto visionario.
- source_word: መበልዕት
  english_pob_choice: the instruments
  chosen_spanish: los instrumentos
  alternatives_spanish:
  - los implementos
  - las herramientas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado que el testimonio ge'ez es incierto en este punto, «instrumentos» preserva la amplitud semántica sin cerrar prematuramente la referencia a implementos o dispositivos de castigo.
- source_word: ለመኑ ይዴለዉ
  english_pob_choice: for whom are they being prepared
  chosen_spanish: ¿Para quién se preparan?
  alternatives_spanish:
  - ¿Para quién están siendo preparados?
  - ¿Para quién se hacen listos?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pregunta apunta a los destinatarios previstos de las cadenas. En español, el pasivo reflejo «se preparan» conserva la orientación prospectiva y el carácter visionario del texto.
theological_decisions:
- issue: Naturaleza concreta de los objetos visionarios
  english_pob_reading: Render the phrase concretely as 'chains of the instruments' rather than generalizing to abstract punishment.
  chosen_spanish_reading: 'Mantener la concreción: «estas cadenas de los instrumentos».'
  alternative_spanish_readings:
  - cadenas de castigo
  - lazos de juicio
  rationale: El verso presenta objetos visibles dentro de la visión, no una abstracción moral. Conservar la imagen concreta evita aplanar el lenguaje apocalíptico.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten judgment formulas into generic religious prose.'
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el pasaje fuente; el último repaso indicó que no eran necesarios cambios. La redacción española sigue de cerca el texto ge'ez y el criterio del POB en inglés, preservando la ambigüedad del sintagma problemático.
  spanish_consistency_notes:
  - Se usa «ángel de paz» como título fijo, no como simple adjetivo descriptivo.
  - Se conserva la imagen concreta de las cadenas y no se generaliza a un lenguaje abstracto de castigo.
  - «Instrumentos» mantiene la incertidumbre textual del ge'ez sin inventar una precisión que el testimonio no garantiza.
  - El pasivo reflejo «se preparan» es una solución idiomática en español para el valor anticipatorio de la frase final.
