translation:
  language: es
  text: Y allí mis ojos vieron sus instrumentos[a], mientras estaban haciendo cadenas de hierro sin medida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “herramientas” o “implementos”. El término ge'ez puede referirse más específicamente a los objetos usados en el trabajo que se está realizando.
    reason: lexical_alternative
  - marker: b
    text: Literalmente “sin medida”; también puede implicar “sin límite” o “inmensurables”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ርእያ አዕይንትየ
  english_pob_choice: my eyes saw
  chosen_spanish: mis ojos vieron
  alternatives_spanish:
  - vi
  - mis ojos contemplaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo la fórmula visionaria explícita con 'mis ojos' para reflejar el giro apocalíptico sin reducirlo a un simple 'vi'.
- source_word: ዘመባዕዕቲሆሙ
  english_pob_choice: the instruments
  chosen_spanish: sus instrumentos
  alternatives_spanish:
  - sus herramientas
  - sus implementos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo posesivo exige 'sus'. 'Instrumentos' conserva el sentido concreto y elevado del término, y la alternativa 'herramientas' sería más moderna pero menos solemne.
- source_word: እንዘ ይገብርዎሙ
  english_pob_choice: while they were making
  chosen_spanish: mientras estaban haciendo
  alternatives_spanish:
  - as estaban haciendo
  - cuando estaban haciendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa acción en curso; 'mientras estaban haciendo' preserva bien el valor durativo y el objeto plural implicado por el verbo.
- source_word: መአስርተ ሐጺን
  english_pob_choice: iron chains
  chosen_spanish: cadenas de hierro
  alternatives_spanish:
  - grilletes de hierro
  - cadenas férreas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cadenas de hierro'' es la forma más clara y fiel en español. ''Grilletes'' enfatizaría el vínculo corporal, pero sería más interpretativo.'
- source_word: ዘአልቦ መደለውተ
  english_pob_choice: without measure
  chosen_spanish: sin medida
  alternatives_spanish:
  - sin límite
  - inmensurables
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la lectura más literal de la revisión final inglesa. 'Sin medida' mantiene la ambigüedad entre cantidad, extensión o exceso, sin cerrarla de forma interpretativa.
theological_decisions:
- issue: Carácter concreto del castigo en la visión
  english_pob_reading: Concrete iron chains being manufactured for eschatological binding/judgment
  chosen_spanish_reading: Cadenas de hierro concretas, fabricadas en la visión para un acto de aprisionamiento o juicio
  alternative_spanish_readings:
  - Instrumentos genéricos de castigo
  - Ataduras metafóricas
  rationale: El texto presenta imágenes materiales —instrumentos, hacer, hierro, cadenas— y no explicita una metáfora. Por eso la traducción conserva la concreción sin espiritualizar ni generalizar la escena.
  doctrine_reference: Mantener la imaginería apocalíptica concreta sin diluirla en prosa religiosa general.
translation_notes:
  revision_awareness: 'La base inglesa pasó por una corrección importante: primero se intentó una lectura interpretativa con ''of immeasurable weight'', pero la revisión final volvió a la más literal ''without measure''. Además, el auditor señaló correctamente el posesivo plural de ''their instruments'' y el objeto plural del verbo. La versión española sigue la revisión final y conserva esa concreción.'
  spanish_consistency_notes:
  - Uso 'mis ojos vieron' para la fórmula visionaria, coherente con un registro apocalíptico solemne.
  - Mantengo 'instrumentos' y no 'SEÑOR' ni terminología eclesiástica tradicional, porque aquí no hay un nombre divino en juego.
  - Conservo 'sin medida' para dejar abierta la ambigüedad semántica reflejada en el expediente inglés.
