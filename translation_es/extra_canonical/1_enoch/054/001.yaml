translation:
  language: es
  text: Y miré y me volví a otra parte de la tierra[a], y allí vi un valle profundo con fuego ardiente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «otra faz de la tierra», un modismo para otra región o lado de la tierra.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final también puede traducirse: «donde ardía fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወነጸርኩ
  english_pob_choice: I looked
  chosen_spanish: miré
  alternatives_spanish:
  - observé
  - alcé la vista
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez introduce una percepción visionaria directa. «Miré» conserva la secuencia narrativa natural en español y corresponde al valor básico de ver con atención, sin añadir solemnidad innecesaria.
- source_word: ወተመየጥኩ
  english_pob_choice: turned
  chosen_spanish: me volví
  alternatives_spanish:
  - giré
  - me dirigí
  - cambié de dirección
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de visión, el verbo expresa cambio de orientación hacia otra zona. «Me volví» comunica bien el giro de atención y movimiento visual sin forzar un calco.
- source_word: ካልአ፡ ገጸ፡ ምድር
  english_pob_choice: another part of the earth
  chosen_spanish: otra parte de la tierra
  alternatives_spanish:
  - otra faz de la tierra
  - otra región de la tierra
  - otro lado de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez dice literalmente «otra faz/rostro de la tierra». En español, «otra parte de la tierra» transmite con naturalidad la localización espacial; se conserva la opción más literal en nota.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - vi allí
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el verbo principal de percepción visionaria. «Vi» es directo y claro en español, y mantiene el progreso desde «miré» hasta la visión específica.
- source_word: ህየ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  - ahí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio deíctico señala el lugar recién visto. «Allí» es la equivalencia natural y mantiene la referencia espacial del texto.
- source_word: ቈላ ዕሙቀ
  english_pob_choice: a deep valley
  chosen_spanish: un valle profundo
  alternatives_spanish:
  - un barranco profundo
  - una hondonada profunda
  - un valle de gran profundidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión describe una depresión topográfica de gran profundidad. «Valle profundo» preserva la imagen y el tono ominoso sin sobredetallar la geografía.
- source_word: እንዘ፡ ትነድድ፡ እሳት
  english_pob_choice: with burning fire
  chosen_spanish: con fuego ardiente
  alternatives_spanish:
  - donde ardía fuego
  - mientras ardía fuego
  - con fuego que ardía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción presenta el valle asociado a fuego activo. «Con fuego ardiente» mantiene la imagen compacta y poética del original, a la vez que suena natural en español.
translation_notes:
  revision_awareness: El texto español sigue de cerca el consenso del audit trail inglés sin cambios sustantivos respecto a la última revisión, que quedó marcada como sin modificaciones necesarias y con alto acuerdo entre revisores.
  spanish_consistency_notes:
  - Se mantuvo «tierra» para reflejar el cosmograma del original, en línea con el inglés «earth».
  - Se evitó «SEÑOR» y otros equivalentes no pertinentes, porque el verso no contiene lenguaje divino.
  - Se conservó el registro visionario con verbos simples («miré», «vi») para respetar la progresión narrativa del original.
