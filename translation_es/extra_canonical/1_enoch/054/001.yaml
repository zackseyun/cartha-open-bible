    rationale: No afecta el sentido, pero en español editorial limpio basta con presentar la nota sin comillas simples envolventes.
  revised_spanish_text: Y miré y me volví a otra parte de la tierra[a], y allí vi un valle profundo con fuego ardiente[b].
