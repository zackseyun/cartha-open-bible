theological_decisions:
- issue: Cómo reflejar la brevedad y la incertidumbre del verso aislado sin resolverla artificialmente
  english_pob_reading: And they will be joined together.
  chosen_spanish_reading: Y serán unidos.
  alternative_spanish_readings:
  - Y serán reunidos.
  - Y serán juntados.
  rationale: El testimonio etiópico suministrado es extremadamente breve y el contexto del capítulo en este flujo es limitado. Por eso conviene una traducción sobria y transparente, evitando expandir el sentido más allá de lo que el texto permite.
  doctrine_reference: Preservar la tensión textual y no sobreinterpretar un fragmento aislado.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una corrección importante: una lectura previa de ''were measured'' fue rechazada y luego ajustada a ''will be joined together''. La versión española sigue esa revisión y evita la opción descartada, manteniendo el futuro pasivo y el matiz de unión conjunta.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece aquí el Tetragrámaton ni un título divino.
  - Se evita 'Cristo/Mesías' porque el fragmento no contiene cristología.
  - '''unidos'' conserva mejor la pasividad del verbo que una paráfrasis explicativa.'
  - El futuro 'serán' sigue la lectura revisada del imperfecto etiópico, no un pasado.
