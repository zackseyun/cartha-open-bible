    rationale: Esto rompe la legibilidad española y no cumple con la tarea de producir un texto bíblico en español. El audit trail inglés eligió un sentido principal claro; en español debe darse un equivalente como 'iniquidad' o 'rebeldía', con nota si hace falta.
  - severity: medium
