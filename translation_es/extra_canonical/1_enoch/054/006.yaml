base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/054/006.yaml
  text: And Michael and Gabriel and Raphael and Phanuel—they will seize them on that great day and cast them into the burning furnace on that day[a], so that the Lord of Spirits may take vengeance on them for their lawlessness[c][b], because they became servants of Satan and led astray those who dwell upon the dry land.
  footnotes:
  - marker: a
    text: Or 'take hold of them' for 'seize them'; the Ge'ez verb indicates forceful apprehension, but the exact nuance is difficult in this Ge'ez-only section.
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon the dry land.' This may simply mean the earth's inhabitants, but the more concrete wording has been retained because the Parables survive effectively only in Ge'ez here.
    reason: lexical_alternative
  - marker: c
    text: The phrase rendered 'servants of Satan' is textually and lexically difficult; 'slaves of Satan' or, less likely, 'messengers of Satan' are possible.
    reason: textual_variant
