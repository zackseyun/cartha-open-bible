    rationale: El expediente teológico y léxico prefirió 'servants' precisamente para no sobreespecificar el grado de servidumbre. En español, 'siervos de Satanás' preserva mejor esa cautela, dejando 'esclavos' como alternativa en nota.
  - severity: low
