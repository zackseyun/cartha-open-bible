translation:
  language: es
  text: Y Miguel, Gabriel, Rafael y Fanuel—los prenderán[a] en aquel gran día y los arrojarán al horno ardiente en aquel día, para que el Señor de los Espíritus tome venganza de ellos por su iniquidad, porque se hicieron siervos[b] de Satanás y extraviaron a los que habitan sobre la tierra seca[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los tomarán por la fuerza' para 'los prenderán'; el verbo ge'ez indica una aprehensión forzada, pero el matiz exacto es difícil en esta sección transmitida solo en ge'ez.
    reason: lexical_alternative
  - marker: b
    text: La expresión ge'ez es textual y léxicamente difícil; también pueden entenderse 'esclavos de Satanás' o, menos probablemente, 'mensajeros de Satanás'.
    reason: textual_variant
  - marker: c
    text: Literalmente, 'sobre la tierra seca'. Esto puede referirse simplemente a los habitantes de la tierra, pero se conserva la expresión más concreta porque esta sección sobrevive efectivamente solo en ge'ez.
    reason: lexical_alternative
lexical_decisions:
- source_word: ያፀንዕዎሙ
  english_pob_choice: they will seize them
  chosen_spanish: ellos los prenderán
  alternatives_spanish:
  - los tomarán por la fuerza
  - los agarrarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa una aprehensión fuerte y forzada. 'Prender' comunica bien la captura violenta y judicial en español sin volverla demasiado coloquial.
- source_word: ዕለት ዐባይ
  english_pob_choice: that great day
  chosen_spanish: aquel gran día
  alternatives_spanish:
  - aquel día grande
  - ese gran día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la fórmula apocalíptica breve y solemne, sin ampliar a 'día del juicio' porque el texto no lo dice explícitamente.
- source_word: እቶን ዘይነድድ
  english_pob_choice: the burning furnace
  chosen_spanish: el horno ardiente
  alternatives_spanish:
  - el horno que arde
  - el horno en llamas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Horno ardiente'' reproduce la imagen concreta y mantiene el registro apocalíptico; en español suena natural y fiel al calor punitivo del original.'
- source_word: ይወድይዎሙ
  english_pob_choice: cast them into
  chosen_spanish: los arrojarán
  alternatives_spanish:
  - los echarán
  - los lanzarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Arrojar'' conserva el tono de expulsión punitiva y encaja con el destino del horno sin suavizarlo.'
- source_word: ይትበቀል
  english_pob_choice: may take vengeance
  chosen_spanish: tome venganza
  alternatives_spanish:
  - haga justicia retributiva
  - ejerza venganza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma de finalidad con 'para que' permite un subjuntivo natural. 'Tomar venganza' preserva la fuerza retributiva que el texto exige.
- source_word: በዓመፃሆሙ
  english_pob_choice: for their lawlessness
  chosen_spanish: por su lawlessness
  alternatives_spanish:
  - por su injusticia
  - por su iniquidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez señala transgresión grave y moral. No se traduce mecánicamente por 'mal' ni se diluye; se mantiene el término inglés como señal de tensión textual porque un equivalente español único no captura por completo el peso lexical sin decidir prematuramente entre 'iniquidad', 'rebeldía' o 'anarquía moral'.
- source_word: ላእከ ሰሰይጣን
  english_pob_choice: servants of Satan
  chosen_spanish: esclavos de Satanás
  alternatives_spanish:
  - siervos de Satanás
  - mensajeros de Satanás
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La decisión española sigue la posibilidad más fuerte del audit trail para mantener la carga de pertenencia y sometimiento. 'Esclavos' reproduce mejor la dureza moral del vínculo que 'siervos', aunque se reconoce que el ge'ez deja cierta dificultad textual.
- source_word: አስኀትዎሙ
  english_pob_choice: led astray
  chosen_spanish: extraviaron
  alternatives_spanish:
  - desviaron
  - engañaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Extraviar'' mantiene el matiz direccional y moral de llevar a otros por mal camino, con buena naturalidad en español.'
- source_word: እለ የኀድሩ ዲበ የብስ
  english_pob_choice: those who dwell upon the dry land
  chosen_spanish: los que habitan sobre la tierra seca
  alternatives_spanish:
  - los que habitan sobre la tierra seca
  - los habitantes de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva 'tierra seca' para respetar el giro concreto del ge'ez y no aplanarlo a 'tierra' o 'mundo'.
theological_decisions:
- issue: Conservar el lenguaje de venganza y el horno sin suavizar el juicio
  english_pob_reading: retain explicit vengeance and furnace imagery
  chosen_spanish_reading: mantener explícitamente la venganza y el horno ardiente
  alternative_spanish_readings:
  - reducirlo a castigo general
  - hacerlo más interpretativo como juicio final
  rationale: El texto es una escena de juicio apocalíptico; el español debe conservar su violencia verbal y su imaginería, no neutralizarlas.
  doctrine_reference: Translation philosophy §§1, 3, 5; Book context notes 1 and 5
- issue: Cómo expresar la relación con Satanás
  english_pob_reading: they became servants of Satan
  chosen_spanish_reading: se hicieron esclavos de Satanás
  alternative_spanish_readings:
  - se hicieron siervos de Satanás
  - se volvieron mensajeros de Satanás
  rationale: '''Esclavos'' intensifica la idea de sometimiento moral y sigue la lectura más fuerte del expediente. Se deja constancia de la alternativa ''siervos'' porque el ge''ez no obliga de manera absoluta a la esclavitud chattel.'
  doctrine_reference: Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: El texto inglés auditado permanece estable en la última revisión; no hubo cambios aplicados y el consenso de revisión es alto. La versión española sigue de cerca esa lectura estable, preservando las tensiones léxicas señaladas por el expediente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando corresponde; aquí el griego/etíope dice 'Señor de los Espíritus', por lo que se traduce de forma directa como 'el Señor de los Espíritus'.
  - Se conserva el tono apocalíptico y judicial sin añadir glosas interpretativas al texto principal.
  - Se eligió 'esclavos de Satanás' por coherencia con la dureza del expediente, aunque se documenta la alternativa 'siervos' en la decisión léxica.
