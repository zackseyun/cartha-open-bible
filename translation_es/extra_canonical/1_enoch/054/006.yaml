  to: Y Miguel, Gabriel, Rafael y Fanuel—los prenderán[a] en aquel gran día y los arrojarán al horno ardiente en aquel día, para que el Señor de los Espíritus tome venganza de ellos por su iniquidad, porque se hicieron siervos[b] de Satanás y extraviaron a los que habitan sobre la tierra seca[c].
  rationale: 'La revisión corrige dos problemas principales: traduce al español el término inglés incrustado (''lawlessness'') con un equivalente digno y natural (''iniquidad''), y alinea ''servants of Satan'' con la cautela léxica documentada mediante ''siervos'', dejando ''esclavos'' como alternativa en nota. También simplifica ligeramente la sintaxis española y restaura las notas significativas del expediente inglés.'
  reviewer_model: gpt-5.4
