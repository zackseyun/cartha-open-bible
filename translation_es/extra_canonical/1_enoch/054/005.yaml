translation:
  language: es
  text: 'Y me dijo[a]: «Estos están siendo preparados para la hueste de Azazel, para que los tomen y los arrojen a la parte más baja del lugar de juicio; y cubrirán sus mandíbulas con piedras ásperas, según mandó el Señor de los Espíritus».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase traducida aquí como «para la hueste de Azazel» es difícil en el ge'ez y también podría entenderse de modo más abstracto, como «para la obra/hecho de Azazel» o «para los que pertenecen a Azazel».
    reason: textual_variant
lexical_decisions:
- source_word: ይዴለዉ
  english_pob_choice: are being prepared
  chosen_spanish: están siendo preparadas
  alternatives_spanish:
  - están preparadas
  - son preparadas
  - se preparan
  lexicon: Dillmann Lexicon
  rationale: La forma expresa preparación/disposición con sentido intencional, no mera existencia. «Están siendo preparadas» conserva el carácter de acción en curso en esta escena de juicio.
- source_word: ለትዕይንተ
  english_pob_choice: for the host
  chosen_spanish: para la hueste
  alternatives_spanish:
  - para el ejército
  - para la compañía
  - para el espectáculo
  lexicon: Dillmann Lexicon
  rationale: El término es difícil en ge'ez y el contexto apocalíptico sugiere un colectivo asociado con Azazel. «Hueste» mantiene un colectivo sobrenatural o militar sin cerrar demasiado el sentido.
- source_word: አዛዜኤል
  english_pob_choice: Azazʾel
  chosen_spanish: Azazel
  alternatives_spanish:
  - Azazel
  lexicon: —
  rationale: Se translitera el nombre propio en una forma reconocible en español. Se omite el apóstrofo por naturalidad tipográfica en español.
- source_word: ይትመጠውዎሙ
  english_pob_choice: they may take them
  chosen_spanish: las tomen
  alternatives_spanish:
  - las agarren
  - las capturen
  - las reciban
  lexicon: Dillmann Lexicon
  rationale: El verbo indica tomar/aprehender; «las tomen» conserva amplitud semántica y encaja con el encadenamiento posterior de castigo.
- source_word: ወይደይዎሙ
  english_pob_choice: cast them
  chosen_spanish: las arrojen
  alternatives_spanish:
  - las echen
  - las lancen
  - las tiren
  lexicon: Dillmann Lexicon
  rationale: El verbo es un acto fuerte de lanzar o arrojar. «Arrojen» preserva el tono punitivo y la dirección descendente.
- source_word: መትሕተ ኵሉ ደይን
  english_pob_choice: into the lowest part of the place of judgment
  chosen_spanish: al punto más bajo del lugar de juicio
  alternatives_spanish:
  - a la parte más baja del lugar de juicio
  - debajo de todo juicio
  - al fondo del lugar de juicio
  lexicon: Dillmann Lexicon
  rationale: La revisión del POB reconoce que el sintagma es topográfico, no abstracto. «Punto más bajo» conserva la imaginería espacial de descenso y evita cargar el texto con una traducción doctrinal como «infierno».
- source_word: አእባኒ ጠያያነ
  english_pob_choice: rough stones
  chosen_spanish: piedras ásperas
  alternatives_spanish:
  - piedras toscas
  - piedras rugosas
  - piedras ásperas e irregulares
  lexicon: Dillmann Lexicon
  rationale: El sustantivo es «piedras» y el adjetivo señala aspereza/irregularidad. «Ásperas» es natural en español y conserva la dureza material del castigo.
- source_word: ይክድኑ
  english_pob_choice: will cover
  chosen_spanish: cubrirán
  alternatives_spanish:
  - taparán
  - ocultarán
  - recubrirán
  lexicon: Dillmann Lexicon
  rationale: El verbo significa cubrir. «Cubrirán» es la opción más directa y pública, sin añadir matices interpretativos no garantizados.
- source_word: መላትሒሆሙ (recognized behind OCR error)
  english_pob_choice: their jaws
  chosen_spanish: sus mandíbulas
  alternatives_spanish:
  - sus quijadas
  - sus mejillas
  - sus rostros
  lexicon: —
  rationale: Aunque el OCR del paquete muestra una lectura errónea, la revisión indicada identifica que el referente correcto es la mandíbula/quijada. «Mandíbulas» expresa bien la parte del rostro castigada y evita la confusión de «ángeles».
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Dueño de los Espíritus
  - el Señor de espíritu
  lexicon: Dillmann Lexicon
  rationale: Se preserva la fórmula titulativa fija de 1 Enoc con una traducción natural al español. «Espíritus» en plural conserva el valor del título establecido en la tradición enóquica.
theological_decisions:
- issue: Lectura del destinatario colectivo asociado con Azazel
  english_pob_reading: a collective under Azazʾel's authority ('the host of Azazʾel')
  chosen_spanish_reading: una hueste asociada con Azazel
  alternative_spanish_readings:
  - la obra de Azazel
  - los seguidores de Azazel
  - los pertenecientes a Azazel
  rationale: El ge'ez es difícil aquí, pero la secuencia de plurales y el contexto de castigo favorecen una lectura colectiva. «Hueste» retiene la ambigüedad útil sin decidir de manera excesiva si se trata de ejército, séquito o grupo subordinado.
  doctrine_reference: Preservar la tensión textual y no resolver más allá de lo que permite la evidencia.
- issue: Referencia de 'their jaws' frente a la lectura errónea 'their angels'
  english_pob_reading: angelic beings belonging to or associated with Azazʾel's party
  chosen_spanish_reading: sus mandíbulas
  alternative_spanish_readings:
  - sus ángeles
  - sus mensajeros
  - sus líderes
  rationale: 'La revisión crítica señalada en el material de auditoría identifica un error de OCR: la lectura correcta apunta a la parte corporal castigada, no a seres angélicos. Por fidelidad al texto revisado, se traduce «mandíbulas».'
  doctrine_reference: Prioridad al texto corregido y a la coherencia con el paralelo de 1 Enoc 10:4.
- issue: Ubicación del castigo
  english_pob_reading: into the lowest part of the place of judgment
  chosen_spanish_reading: al punto más bajo del lugar de juicio
  alternative_spanish_readings:
  - a la parte más baja del lugar de juicio
  - al fondo del lugar de juicio
  - debajo de todo juicio
  rationale: La revisión del POB corrige una abstracción indebida y evita importaciones teológicas posteriores. La formulación española mantiene el descenso espacial y la topografía enóquica del castigo.
  doctrine_reference: Topografía escatológica en Enoc; evitar anacronismos doctrinales.
translation_notes:
  revision_awareness: 'El texto fuente presenta una dificultad textual importante en la primera mitad del versículo y una lectura OCR errónea en la segunda. La revisión de auditoría más reciente corrige «their angels» por «their jaws» y corrige la abstracción de «beneath every judgment» hacia una ubicación concreta: el punto más bajo del lugar de juicio. Esta versión española adopta esas correcciones y mantiene una nota donde la primera expresión sigue siendo textualmente difícil.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero aquí el título fuente es la fórmula enóquica fija «Señor de los Espíritus», por lo que se conserva esa denominación tradicional del propio texto.
  - «Azazel» se translitera de forma estable y no se sustituye por una forma cristianizada.
  - Se evita «infierno» para no introducir una carga doctrinal ajena al topónimo/espacio de juicio del pasaje.
  - La referencia corporal correcta es «mandíbulas», no un sujeto angélico; esto se refleja en la traducción principal y en las decisiones teológicas.
