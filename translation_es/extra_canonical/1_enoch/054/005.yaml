  glossary_alignment: La terminología del proyecto se respeta en general. No aparece Yahvé en este versículo; «Señor de los Espíritus» sigue la fórmula fijada para 1 Enoc. «Azazel» es una forma española reconocible y aceptable. No hay conflicto con otros términos por defecto del glosario.
