base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/054/005.yaml
  text: And he said to me[a], “These are being prepared for the host of Azazʾel, so that they may take them and cast them into the lowest part of the place of judgment; and they will cover their jaws with rough stones[e][d][c][b], just as the Lord of Spirits commanded.”
  footnotes:
  - marker: a
    text: The phrase rendered 'for the host of Azazʾel' is textually difficult in the Ge'ez and may also be understood more abstractly, such as 'for the work/deed of Azazʾel' or 'for those belonging to Azazʾel.'
    reason: textual_variant
  - marker: b
    text: Or 'under all judgment.' The expression is obscure, but the sense is comprehensive subjection to judgment.
    reason: lexical_alternative
  - marker: c
    text: '''Their angels'' could in principle be rendered ''their messengers,'' but in Enochic context ''angels'' is more likely.'
    reason: lexical_alternative
  - marker: d
    text: Or 'beneath every judgment'.
    reason: previous_rendering
  - marker: e
    text: Or 'and rough stones will cover their angels'.
    reason: previous_rendering
