translation:
  language: es
  text: Y en aquellos días vendrá el castigo[a] del Señor de los Espíritus, y se abrirán todos los almacenes[b] de las aguas que están sobre los cielos, y las fuentes que están debajo de los cielos y debajo de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Castigo» traduce el término de juicio con un valor amplio. Otras opciones como «plaga» o «azote» son posibles, pero aquí se eligió un término más general para no especificar indebidamente el modo del juicio.
    reason: lexical_alternative
  - marker: b
    text: «Almacenes de las aguas» conserva la imagen cosmológica de reservorios celestes. No es una explicación científica, sino lenguaje apocalíptico de depósitos del agua bajo control divino.
    reason: cultural_note
lexical_decisions:
- source_word: በውእቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal apocalíptica se conserva de manera natural en español con «en aquellos días», que mantiene el valor de marco escatológico sin sonar mecánico.
- source_word: መቅሠፍቱ
  english_pob_choice: the punishment
  chosen_spanish: el castigo
  alternatives_spanish:
  - el castigo punitivo
  - la punición
  - la plaga
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Castigo» expresa bien la fuerza judicial del término sin cargarlo hacia una plaga específica. En español, suena claro y preserva el sentido de juicio divino.
- source_word: እግዚአ መናፍስት
  english_pob_choice: Lord of Spirits
  chosen_spanish: Señor de los Espíritus
  alternatives_spanish:
  - Señor de Espíritu
  - Señor de las huestes espirituales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título apocalíptico característico. En español, el plural con artículo explícito comunica con claridad la forma titulativa sin convertirlo en un genérico teológico.
- source_word: መዛግብተ ማያት
  english_pob_choice: storehouses of the waters
  chosen_spanish: los almacenes de las aguas
  alternatives_spanish:
  - los depósitos de las aguas
  - los tesoros de las aguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Almacenes» conserva la imagen de reservorios/cámara de depósito y es comprensible en español moderno. «Tesoros» sería más literario pero menos preciso para la imagen cósmica.
- source_word: ዘመልዕልተ ሰማያት
  english_pob_choice: that are above the heavens
  chosen_spanish: que están sobre los cielos
  alternatives_spanish:
  - que están arriba de los cielos
  - que están por encima de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre los cielos» reproduce la elevación cosmológica del original sin suavizarla. Se evita «cielo» singular porque el ge'ez emplea un plural y la imagen es estratificada.
- source_word: አንቅዕተ
  english_pob_choice: fountains
  chosen_spanish: las fuentes
  alternatives_spanish:
  - los manantiales
  - los surtidores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Fuentes» es la correspondencia más natural y digna en español para el término de surgencia de agua; mantiene la imaginería apocalíptica sin arcaísmo excesivo.
- source_word: መትሕተ ሰማያት
  english_pob_choice: beneath the heavens
  chosen_spanish: debajo de los cielos
  alternatives_spanish:
  - bajo los cielos
  - bajo el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se conserva la misma cosmología escalonada del texto: aguas arriba de los cielos y fuentes debajo de los cielos. «Cielos» plural refleja mejor el original que «cielo» singular.'
- source_word: መትሕተ ምድር
  english_pob_choice: beneath the earth
  chosen_spanish: debajo de la tierra
  alternatives_spanish:
  - bajo la tierra
  - subterráneas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase reproduce directamente la ubicación espacial del original y su paralelismo con «debajo de los cielos». «Debajo de la tierra» es claro y literal en español.
theological_decisions:
- issue: Imagen del juicio cósmico con liberación de aguas
  english_pob_reading: A cosmic judgment in which the Lord of Spirits releases heavenly and subterranean waters.
  chosen_spanish_reading: Un juicio cósmico en el que el Señor de los Espíritus hace que se abran los depósitos de aguas celestiales y subterráneas.
  alternative_spanish_readings:
  - Un castigo general sin imagen hídrica concreta
  - Una metáfora puramente espiritual de apertura
  rationale: La fuente nombra aguas, fuentes y niveles cosmológicos; por eso la traducción debe conservar la imagen concreta de reservorios que se abren. No se debe diluir en una abstracción moral o meramente simbólica.
  doctrine_reference: Preservar imaginería apocalíptica concreta; no generalizar el juicio divino más allá de lo que el texto permite.
- issue: Título divino con pluralidad de espíritus
  english_pob_reading: Lord of Spirits
  chosen_spanish_reading: Señor de los Espíritus
  alternative_spanish_readings:
  - Señor de Espíritu
  - Señor de las almas
  rationale: El original usa un título fijo y distintivo. «Espíritus» mantiene la pluralidad y evita reducir el término a «almas», que introduciría un matiz no sustentado por el texto.
  doctrine_reference: Conservar títulos apocalípticos propios sin sustituciones devocionales posteriores.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto ge'ez y la revisión inglesa más reciente, especialmente la inclusión explícita de las aguas/fuentes «debajo de los cielos» y «debajo de la tierra». Se evitó el calco rígido cuando el español requería ordenar la sintaxis para que ambos paralelismos quedaran claros y legibles.
  spanish_consistency_notes:
  - Se mantiene «Señor de los Espíritus» como título estable, en paralelo con la decisión inglesa «Lord of Spirits».
  - Se conserva la cosmología estratificada con «sobre los cielos / debajo de los cielos / debajo de la tierra» para reflejar el paralelismo del original.
  - No se introduce terminología eclesiástica adicional; el texto conserva el tono apocalíptico propio del pasaje.
