base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/032/003.yaml
  text: And I came into the garden of righteousness[a], and I saw beyond those trees many large trees growing there, with good fragrance, great and very beautiful and glorious; and the tree of wisdom[c][b], from which those who eat know great wisdom.
  footnotes:
  - marker: a
    text: The spatial phrase rendered 'beyond those trees' is difficult in the Ethiopic witness and could also be understood more generally as 'among' or 'beside' those trees.
    reason: textual_variant
  - marker: b
    text: The final clause states that eating from this tree results in knowing 'great wisdom'; the wording intentionally echoes sacred-garden imagery without repeating the exact Genesis expression.
    reason: cross_reference
  - marker: c
    text: Or 'great and very beautiful'.
    reason: previous_rendering
