  glossary_alignment: 'No hay conflictos con terminología mayor del proyecto. La cuestión léxica relevante es ''righteousness'': aquí conviene ''rectitud'' más que ''justicia'' por fidelidad al rationale auditado. ''Sabiduría'' está bien preservado y evita armonizar con Génesis. No hay términos divinos ni mesiánicos implicados.'
