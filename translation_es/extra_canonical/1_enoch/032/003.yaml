translation:
  language: es
  text: Y vine al jardín de rectitud, y vi más allá de aquellos árboles[a] muchos árboles grandes que crecían allí, con buen aroma, grandes, muy hermosos y gloriosos; y el árbol de sabiduría[b], del cual los que comen conocen gran sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase espacial de esta versión etíope es difícil y también podría entenderse de manera más general como 'entre' o 'junto a' aquellos árboles.
    reason: textual_variant
  - marker: b
    text: La cláusula final afirma que comer de este árbol resulta en conocer 'gran sabiduría'; la redacción evoca intencionalmente la imaginería del jardín sagrado sin repetir la expresión exacta de Génesis.
    reason: cross_reference
lexical_decisions:
- source_word: ገነት ጽድቅ
  english_pob_choice: the garden of righteousness
  chosen_spanish: el jardín de justicia
  alternatives_spanish:
  - el jardín de rectitud
  - el paraíso de justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ገነት admite 'jardín' o 'paraíso'; aquí 'jardín' conserva la imagen concreta y visible del pasaje. Para ጽድቅ, elegí 'justicia' porque en español puede abarcar el valor moral y relacional del término sin perder la tensión legal/covenantal que el POB mantiene en otros contextos; 'rectitud' quedó como alternativa viable.
- source_word: ከሐክቲሆሙ ለእልክቱ ዕፀው
  english_pob_choice: beyond those trees
  chosen_spanish: más allá de aquellos árboles
  alternatives_spanish:
  - entre aquellos árboles
  - junto a aquellos árboles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión espacial ge'ez es difícil; 'más allá de' preserva el avance visual de la visión y la idea de que Enoch mira más adentro del jardín. Otras opciones son posibles, pero debilitan esa progresión espacial.
- source_word: ዕፀወ ብዙኃነ ወዐቢይነ ይበቍሉ
  english_pob_choice: many large trees growing
  chosen_spanish: muchos árboles grandes que crecían
  alternatives_spanish:
  - muchos árboles grandes que brotaban
  - numerosos árboles altos que crecían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez combina cantidad y tamaño con un verbo de crecimiento. 'Crecían' mantiene el dinamismo del cuadro; 'brotaban' sería más intensivo de lo que exige el texto.
- source_word: ጼናሆሙ ሠናይ
  english_pob_choice: with good fragrance
  chosen_spanish: con buen aroma
  alternatives_spanish:
  - con buena fragancia
  - de aroma agradable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término apunta al olor/sensación aromática. 'Buen aroma' suena natural en español y conserva el rasgo sensorial sin añadir valoración interpretativa.
- source_word: ዐቢያን ወሥናሙ ብዙኅ ወስቡሓን
  english_pob_choice: great, very beautiful, and glorious
  chosen_spanish: grandes, muy hermosos y gloriosos
  alternatives_spanish:
  - grandes, muy hermosos y magníficos
  - altos, muy hermosos y gloriosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La serie acumula tamaño, hermosura y esplendor. 'Gloriosos' preserva el elemento de magnificencia/ gloria señalado en la revisión, y 'muy hermosos' refleja el intensificador de belleza sin diluir el tercero de los atributos.
- source_word: ዕፀ ጥበብ
  english_pob_choice: the tree of wisdom
  chosen_spanish: el árbol de sabiduría
  alternatives_spanish:
  - el árbol de la sabiduría
  - el árbol sapiencial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma nominal directa es la más fiel y natural. 'Sabiduría' mantiene la terminología del texto y evita importar la fórmula de Génesis sobre conocimiento del bien y del mal.
- source_word: ዘእምኔሁ በሊዖሙ ይአምርዋ ለጥበብ ዐቢይ
  english_pob_choice: from which those who eat know great wisdom
  chosen_spanish: del cual los que comen conocen gran sabiduría
  alternatives_spanish:
  - del cual, si comen, conocen gran sabiduría
  - del cual, al comer, llegan a conocer gran sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula expresa un resultado de comer del árbol. 'Los que comen conocen' sigue de cerca la construcción y conserva el paralelismo con el inglés POB, sin sobreexplicar el mecanismo.
theological_decisions:
- issue: Sabiduría del árbol y eco de Génesis
  english_pob_reading: The tree of wisdom... from which those who eat know great wisdom.
  chosen_spanish_reading: el árbol de sabiduría... del cual los que comen conocen gran sabiduría.
  alternative_spanish_readings:
  - el árbol del conocimiento
  - el árbol que da sabiduría
  rationale: El texto nombra el árbol con vocabulario de sabiduría, no con la fórmula ampliada de Génesis. Mantener 'sabiduría' respeta la teología local del pasaje y evita armonizarlo con una tradición posterior.
  doctrine_reference: Preservar la tensión intertextual sin resolverla por armonización.
- issue: Justicia/righteousness en el jardín
  english_pob_reading: the garden of righteousness
  chosen_spanish_reading: el jardín de justicia
  alternative_spanish_readings:
  - el jardín de rectitud
  - el paraíso de justicia
  rationale: En español, 'justicia' permite conservar el valor moral y relacional del término y, a la vez, puede resonar con un orden correcto del lugar visionario. 'Rectitud' es posible, pero menos natural en esta frase.
  doctrine_reference: Léxico moral-covenantal conservado sin neutralización.
translation_notes:
  revision_awareness: La redacción española incorpora la revisión reciente que restituye el matiz de 'gloriosos/magníficos' en la serie descriptiva de los árboles. También adopta la clausula final en forma clara y directa ('los que comen conocen gran sabiduría'), en línea con el último ajuste del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' para ዕፀ ጥበብ, evitando fórmulas de Génesis que el texto no usa.
  - Se conserva 'justicia' en el sintagma inicial para seguir el valor moral del lugar visionario.
  - '''Gloriosos'' se incluye explícitamente para no perder el matiz añadido por la revisión del texto fuente.'
  - El registro busca ser bíblico y publicable en español neutral, sin calcos rígidos que dañen la naturalidad.
