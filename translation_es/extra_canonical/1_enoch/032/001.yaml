translation:
  language: es
  text: Y después de estas,[c] hacia el sur, mientras miraba por encima de los montes, vi siete montes llenos de nardo escogido[a] y árboles fragantes[b], y canela y pimienta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nardo parece designar aquí un aromático costoso; también sería posible entender un sentido más amplio como «especias escogidas».
    reason: lexical_alternative
  - marker: b
    text: La lista de aromáticos subraya la abundancia y el carácter exótico del paisaje visionario, más que ofrecer un inventario botánico moderno.
    reason: cultural_note
  - marker: c
    text: O «Y después de estas, hacia el sur, mientras miraba, vi siete montes».
    reason: previous_rendering
lexical_decisions:
- source_word: እምድኅረ እሉ
  english_pob_choice: after these
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de estas
  - luego de estas cosas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión marca transición temporal y remite a las escenas visionarias anteriores. «Después de estas cosas» conserva bien el valor anafórico del plural sin añadir contenido ajeno.
- source_word: አፈው ለመስዕ
  english_pob_choice: toward the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - surward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El referente direccional es espacial y conviene expresarlo de manera natural en español. «Hacia el sur» comunica el movimiento de la visión sin sobretraducir.
- source_word: እንዘ እኔጽር
  english_pob_choice: as I looked
  chosen_spanish: mientras yo miraba
  alternatives_spanish:
  - cuando miraba
  - mientras contemplaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción participial indica acción en curso durante la visión. «Mientras yo miraba» preserva la simultaneidad y el carácter testimonial.
- source_word: መልዕልተ አድባር
  english_pob_choice: over the mountains
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - por encima de los montes
  - sobre las montañas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto no solo sitúa al vidente entre montes, sino que enfatiza una mirada extendida «sobre/por encima de» ellos. «Sobre los montes» mantiene esa geografía visionaria.
- source_word: ፯አድባረ
  english_pob_choice: seven mountains
  chosen_spanish: siete montes
  alternatives_spanish:
  - siete montañas
  - siete colinas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El numeral debe mantenerse. «Montes» es una opción natural en español para un marco visionario solemne y evita el matiz más pequeño de «colinas».
- source_word: ምሉኣነ
  english_pob_choice: full of
  chosen_spanish: llenos de
  alternatives_spanish:
  - colmados de
  - llenas de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo expresa abundancia y saturación de aromáticos. «Llenos de» reproduce de forma directa el valor descriptivo.
- source_word: ሰንብላተ ቅድዋተ
  english_pob_choice: choice nard
  chosen_spanish: nardo escogido
  alternatives_spanish:
  - nardo precioso
  - especias escogidas
  - espicanardo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia de aromáticos sugiere un producto concreto y valioso. «Nardo» conserva el término tradicional para el aromático; «escogido» refleja la cualidad de excelencia sin fijar indebidamente la especie exacta.
- source_word: ዕፀ መዓዛ
  english_pob_choice: fragrant trees
  chosen_spanish: árboles fragantes
  alternatives_spanish:
  - árboles aromáticos
  - maderas fragantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión apunta a una imagen de vegetación perfumada. «Árboles fragantes» suena natural en español y conserva el carácter sensorial del paisaje.
- source_word: ቀናንሞን
  english_pob_choice: cinnamon
  chosen_spanish: canela
  alternatives_spanish:
  - cinnamon
  - cinnamomo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el préstamo habitual en español para la especia. «Canela» es claro, reconocible y fiel al referente aromático.
- source_word: ፐፐሬ
  english_pob_choice: pepper
  chosen_spanish: pimienta
  alternatives_spanish:
  - pimienta negra
  - pimienta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa la especia conocida en español como pimienta. Mantiene la lista de aromáticos exóticos sin tecnicismo innecesario.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente, que corrigió la dirección a «hacia el sur» en la versión inglesa del audit trail, pero el expediente crítico más amplio y la nota de revisión de nivel superior señalan que el hebreo/ge'ez de ለመስዕ corresponde a «al norte». Dado el conflicto interno del paquete, la redacción española sigue el estado textual más controlado por la revisión final disponible en el contexto proporcionado, pero preserva la literalidad espacial sin expansión interpretativa adicional. También se incorporó el detalle de mirar «sobre los montes», que la revisión anterior había omitido.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio por estilo de continuidad narrativa.
  - Se usa «montes» de forma consistente para conservar el tono visionario.
  - Se evita «SEÑOR» u այլ sustituciones teológicas irrelevantes, pues el verso no contiene el Tetragrámaton ni títulos cristológicos.
  - La puntuación conserva una sola cadena descriptiva sin recargar la sintaxis.
