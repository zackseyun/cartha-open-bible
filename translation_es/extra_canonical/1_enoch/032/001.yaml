  yaml_path: translation/extra_canonical/1_enoch/032/001.yaml
  text: And after these[a], toward the south, as I looked over the mountains, I saw seven mountains full of choice nard and fragrant trees[c][b], and cinnamon and pepper.
  footnotes:
