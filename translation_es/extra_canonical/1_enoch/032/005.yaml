  - severity: medium
    issue: La nota b afirma de modo demasiado categórico que la forma ge'ez incluye el demostrativo y que por eso debe traducirse «Esto es…».
    rationale: Eso simplifica en exceso un historial editorial mixto. Mejor conservar la información como alternativa o posibilidad textual, no como obligación cerrada.
  - severity: low
    issue: La frase «Esto es hermoso» suena menos natural en español que una reacción breve como «Es hermoso».
    rationale: En español bíblico moderno y legible, una reacción elíptica breve suele sonar más fluida sin demostrativo explícito, especialmente en un texto tan condensado.
