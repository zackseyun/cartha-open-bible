base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/032/002.yaml
  text: And from there I went above the summits of those mountains[a], far to the east, and I crossed over the Erythraean Sea; and I went far from it[c][b], and passed above the angel Zutel.
  footnotes:
  - marker: a
    text: Or 'the Red Sea.' The ancient name 'Erythraean Sea' may refer more broadly than the modern Red Sea.
    reason: lexical_alternative
  - marker: b
    text: The angel's name may be vocalized differently in other editions or translations, such as 'Zutael.'
    reason: textual_variant
  - marker: c
    text: The clause rendered 'I went far from it' is difficult in the Ethiopic witness; the sense is continued travel away from the sea.
    reason: textual_variant
