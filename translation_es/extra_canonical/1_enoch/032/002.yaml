translation:
  language: es
  text: Y de allí pasé por encima de las cumbres de aquellos montes, lejos hacia el oriente, y crucé el mar Eritreo[a]; y me alejé de él[c], y pasé por encima del ángel Zutel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mar Rojo». El nombre antiguo «mar Eritreo» puede referirse de manera más amplia que el mar Rojo moderno.
    reason: lexical_alternative
  - marker: b
    text: El nombre del ángel puede vocalizarse de otras maneras en distintas ediciones o traducciones, por ejemplo «Zutael».
    reason: textual_variant
  - marker: c
    text: La cláusula traducida «me alejé de él» es difícil en el testimonio etiópico; el sentido continúa el viaje alejándose del mar.
    reason: textual_variant
lexical_decisions:
- source_word: መልዕልተ
  english_pob_choice: above
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por arriba de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor espacial de la preposición pide una solución natural en español. «Sobre» conserva el movimiento elevado sin decidir si Enoch pasa directamente encima o simplemente más allá de las montañas.
- source_word: ርእሶሙ
  english_pob_choice: their summits
  chosen_spanish: las cumbres
  alternatives_spanish:
  - las cabezas
  - las cimas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literalmente significa «sus cabezas», pero aplicado a montes equivale idiomáticamente a sus partes más altas. «Cumbres» mantiene la imagen concreta y suena natural en español.
- source_word: ለእልኩ አድባር
  english_pob_choice: of those mountains
  chosen_spanish: de aquellos montes
  alternatives_spanish:
  - de aquellas montañas
  - de aquellos cerros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Aדbar» puede referirse a montes/montañas; «montes» permite un registro bíblico sobrio y conserva el tono grandioso del contexto visionario. El demostrativo se refleja con «aquellos».
- source_word: እንዘ ርሑቅ ውእቱ ለጽባሕ
  english_pob_choice: far to the east
  chosen_spanish: lejos hacia el oriente
  alternatives_spanish:
  - muy al oriente
  - lejos al este
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ጽባሕ» aquí señala la región del amanecer/oriente, no la hora de la mañana. «Oriente» conserva el matiz cosmográfico y mantiene un tono literario adecuado.
- source_word: ባሕረ ኤርትራ
  english_pob_choice: the Erythraean Sea
  chosen_spanish: el mar Eritreo
  alternatives_spanish:
  - el mar Rojo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el nombre geográfico antiguo del texto, evitando reducirlo de entrada al mar Rojo moderno. «Mar Eritreo» reproduce mejor el horizonte geográfico apocalíptico.
- source_word: ተከንኩ
  english_pob_choice: I went far
  chosen_spanish: me alejé
  alternatives_spanish:
  - anduve lejos
  - me retiré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma es difícil en el testimonio etiópico, pero el contexto inmediato expresa continuación del viaje y distancia respecto del mar. «Me alejé» comunica esa progresión sin sobrecargar la ambigüedad.
- source_word: መልአክ ዙጥኤል
  english_pob_choice: the angel Zutel
  chosen_spanish: el ángel Zutel
  alternatives_spanish:
  - el ángel Zutael
  - el ángel Zutiel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Los nombres propios se transliteran. Se conserva «Zutel» como vocalización conservadora acorde con la grafía etiópica, mientras se reconocen variantes de edición o traducción.
theological_decisions:
- issue: Nombrar el mar antiguo sin modernizarlo
  english_pob_reading: the Erythraean Sea
  chosen_spanish_reading: el mar Eritreo
  alternative_spanish_readings:
  - el mar Rojo
  rationale: No es una cuestión doctrinal, pero sí afecta la geografía imaginaria del pasaje. Mantener el nombre antiguo respeta el mundo apocalíptico del texto y evita una identificación moderna demasiado estrecha.
  doctrine_reference: Principio de primacía del original y preservación de la imaginería apocalíptica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el contexto auditado en inglés: la decisión de conservar «Erythraean Sea» como nombre antiguo, la nota sobre la vocalización del ángel y la dificultad textual de la cláusula que expresa alejamiento del mar. La redacción española sigue esas decisiones sin mecanizar el inglés y conserva la tensión donde el ge''ez es incierto.'
  spanish_consistency_notes:
  - Se mantuvo «mar Eritreo» para el nombre antiguo del mar, en consonancia con la política de preservar la geografía apocalíptica original.
  - Se usó «oriente» para ጽባሕ por su valor direccional/cosmográfico, no temporal.
  - «Montes» y «cumbres» sostienen el registro bíblico sin volver literal de forma extraña la imagen de «heads of mountains».
  - El nombre propio «Zutel» se translitera en vez de traducirse o normalizarse a una forma eclesiástica no atestiguada.
