translation:
  language: es
  text: Y parecía un algarrobo, y su fruto era como racimos muy hermosos de buenas uvas; y la fragancia de aquel árbol se extendía lejos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይመስል
  english_pob_choice: it looked like
  chosen_spanish: parecía
  alternatives_spanish:
  - se asemejaba a
  - lucía como
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa semejanza visual; «parecía» conserva la comparación directa sin sobrecargar el estilo.
- source_word: ሐመረ ጽራእ
  english_pob_choice: the carob tree
  chosen_spanish: el árbol de algarrobo
  alternatives_spanish:
  - el algarrobo
  - el árbol de carob
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; revisión basada en el fragmento griego y la identificación lexicográfica
  rationale: La revisión fuente-centrada corrige la identificación botánica hacia algarrobo/carob, que es la lectura respaldada por el testimonio griego y la lexicografía; en español, «árbol de algarrobo» es claro y digno.
- source_word: ፍሬሁ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su producción
  - su cosecha
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Su fruto» es la equivalencia más directa y natural para el fruto del árbol en la comparación.
- source_word: ከመ እስካለ ወይን
  english_pob_choice: like clusters of good grapes
  chosen_spanish: como racimos de buenas uvas
  alternatives_spanish:
  - como racimos de uvas
  - como racimos de fruto de vid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen compara con racimos de uvas; «buenas» conserva ሠናይ sin reducirlo a solo gusto o solo belleza.
- source_word: ሠናይ
  english_pob_choice: good
  chosen_spanish: buenas
  alternatives_spanish:
  - hermosas
  - buenas y hermosas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo es evaluativo amplio; en español «buenas» mantiene esa amplitud. Dado que el texto también exige recuperar el matiz de belleza, se expresa aparte con «muy hermosas» siguiendo la revisión del pasaje.
- source_word: ጥቀ
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en gran manera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión identifica ጥቀ como adverbio de intensificación; «muy» es la forma natural y fiel en español.
- source_word: ለውእቱ ዕፅ
  english_pob_choice: of that tree
  chosen_spanish: de aquel árbol
  alternatives_spanish:
  - de ese árbol
  - de ese mismo árbol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo señala el árbol mencionado; «aquel» conserva distancia textual y fluidez en español.
- source_word: ወጼናሁ
  english_pob_choice: spread
  chosen_spanish: se extendía
  alternatives_spanish:
  - se difundía
  - emanaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para la fragancia, «se extendía» expresa bien la difusión espacial del aroma sin añadir una interpretación innecesaria.
- source_word: የሐውር ነዋኃ
  english_pob_choice: far away
  chosen_spanish: lejos
  alternatives_spanish:
  - a gran distancia
  - muy lejos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lejos» preserva la idea de alcance a distancia con sencillez y naturalidad.
translation_notes:
  revision_awareness: 'Se incorporó la corrección fuente-centrada del árbol: la evidencia revisada favorece ''algarrobo/carob'' en lugar de ''tamarindo''. También se recuperó el intensificador de ጥቀ y el adjetivo evaluativo de ሠናይ para no perder el matiz de ''muy hermosas''.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - Se evitó 'SEÑOR' u otros sustitutos porque el verso no contiene el Tetragrámaton ni lenguaje teológico equivalente.
  - Se prefirió 'algarrobo' por la corrección textual y lexicográfica, no por tradición denominacional.
  - 'La secuencia comparativa se conserva en español con paralelismo natural: árbol / fruto / fragancia.'
