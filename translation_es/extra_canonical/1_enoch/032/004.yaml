- from: Y parecía el árbol de algarrobo, y su fruto era como racimos de buenas uvas, muy hermosas; y la fragancia de aquel árbol se extendía lejos.
  to: Y parecía un algarrobo, y su fruto era como racimos muy hermosos de buenas uvas; y la fragancia de aquel árbol se extendía lejos.
  rationale: 'Se hicieron dos ajustes menores: «parecía un algarrobo» mejora la naturalidad del español manteniendo la semejanza visual, y «racimos muy hermosos de buenas uvas» coloca con más claridad la cualidad de belleza sobre los racimos, evitando que «muy hermosas» parezca referirse solo a las uvas. No se añadieron notas porque no hay nueva ambigüedad en español y la identificación botánica ya está resuelta en la auditoría.'
