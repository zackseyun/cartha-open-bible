translation:
  language: es
  text: Y después de esto me mostró a los ángeles del castigo[a], que están preparados[b] para venir y liberar[c] todo el poder de las aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Castigo» traduce la función judicial de መቅሠፍት; opciones como «corrección» o «disciplina» suavizarían indebidamente su alcance punitivo.
    reason: lexical_alternative
  - marker: b
    text: La expresión «están preparados» refleja una forma geʽez difícil; también podría entenderse como «están listos».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «abrir todo el poder de las aguas»; aquí «liberar» expresa mejor en español la idea de soltar o desatar toda su fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምድኅረ ዝ
  english_pob_choice: after this
  chosen_spanish: después de esto
  alternatives_spanish:
  - después
  - luego de esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal mantiene la secuencia visionaria sin añadir contenido interpretativo.
- source_word: አርአየኒ
  english_pob_choice: he showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me reveló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el acto visionario de mostrar algo al vidente en un español natural y directo.
- source_word: መላእክተ መቅሠፍት
  english_pob_choice: the angels of punishment
  chosen_spanish: los ángeles del castigo
  alternatives_spanish:
  - los ángeles del castigo divino
  - los ángeles del suplicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Castigo» preserva el tono judicial y apocalíptico. Se evita suavizarlo con «corrección» o «reprensión», que debilitarían la fuerza del término.
- source_word: እለ ይልዋን
  english_pob_choice: who are prepared
  chosen_spanish: que están preparados
  alternatives_spanish:
  - que están listos
  - que han sido preparados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma expresa disposición/ preparación para una acción inminente; «están preparados» conserva esa idea sin sobreinterpretar el modo exacto.
- source_word: ወይፍትሑ
  english_pob_choice: and release
  chosen_spanish: y liberar
  alternatives_spanish:
  - y soltar
  - y dejar salir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto de aguas hace que «liberar» comunique bien el valor de «dejar suelto/soltar» sin la rareza de «abrir» aplicado a «poder».},{
theological_decisions:
- issue: Naturaleza de los agentes punitivos
  english_pob_reading: supernatural 'angels of punishment' charged with unleashing watery forces
  chosen_spanish_reading: ángeles celestiales con función de castigo que vienen a desatar las aguas
  alternative_spanish_readings:
  - mensajeros humanos de juicio
  - ángeles de disciplina
  rationale: La escena es claramente apocalíptica y favorece seres angelicales ejecutores de juicio cósmico; traducirlo de otra manera diluiría el marco literario del texto.
  doctrine_reference: Preservar la imaginería apocalíptica y la agencia angelical del juicio.
translation_notes:
  revision_awareness: Sigo la revisión del audit trail que prefiere «release» sobre «open» para ኀይለ ማይ; en español, «liberar todo el poder de las aguas» transmite mejor la idea de soltar/desatar una fuerza, evitando el calco poco natural «abrir el poder».
  spanish_consistency_notes:
  - Se mantiene «ángeles» para መላእክተ y no «mensajeros», conforme al contexto apocalíptico.
  - Se conserva «aguas» en plural para reflejar la expresión del original.
  - El tono es sobrio y eclesial sin recurrir a fórmulas tradicionales que oculten la literalidad del pasaje.
