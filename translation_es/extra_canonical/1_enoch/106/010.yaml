base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/106/010.yaml
  text: 'And now[a], my father, hear me: a son has been born to Lamech my son, and his appearance and form are not like the form of a human being. His complexion is whiter than snow and redder than the blossom of a rose, and the hair of his head is whiter than white wool. And his eyes are like the rays of the sun[c][b]; and he opened his eyes and lit up the whole house.'
  footnotes:
