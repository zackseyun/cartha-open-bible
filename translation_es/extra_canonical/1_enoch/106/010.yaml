translation:
  language: es
  text: 'Y ahora, padre mío, escúchame: a Lamec, mi hijo, le ha nacido un hijo, y su apariencia y su forma no son como la forma de un ser humano[c]. Su tez es más blanca que la nieve y más roja que la flor de una rosa[a], y el cabello de su cabeza es más blanco que la lana blanca. Y sus ojos son como los rayos del sol[b]; y abrió los ojos e iluminó toda la casa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La flor de la comparación puede entenderse de manera más general como una flor roja; la identificación exacta de la especie es incierta.
    reason: lexical_alternative
  - marker: b
    text: La expresión ge'ez es difícil; el sentido es claramente de luminosidad solar.
    reason: lexical_alternative
  - marker: c
    text: O «y él no es como un ser humano en su apariencia y en la forma de su hechura».
    reason: previous_rendering
lexical_decisions:
- source_word: ስምዐኒ
  english_pob_choice: hear me
  chosen_spanish: escúchame
  alternatives_spanish:
  - óyeme
  - escúchame, te ruego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo con sufijo de primera persona expresa una súplica filial urgente; «escúchame» suena natural y conserva la apelación directa sin añadir contenido.
- source_word: ተወልደ
  english_pob_choice: has been born
  chosen_spanish: le ha nacido
  alternatives_spanish:
  - ha nacido
  - nació
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro español con dativo («le ha nacido») reproduce bien la idea de nacimiento completado con relevancia inmediata y mantiene el matiz relacional del enunciado.
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo varón
  - mi hijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hijo» es el equivalente directo y natural en español; el posesivo conserva la relación familiar explícita del original.
- source_word: ዘአምሳሉ
  english_pob_choice: in his appearance
  chosen_spanish: su apariencia
  alternatives_spanish:
  - su semejanza
  - su aspecto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término apunta a la semejanza visible; «apariencia» comunica bien el rasgo observable sin cargar el texto con una abstracción mayor.
- source_word: ፍጥረቱ
  english_pob_choice: the form of his making
  chosen_spanish: su forma
  alternatives_spanish:
  - su constitución
  - la forma de su ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí se trata de la forma o conformación visible del niño; «su forma» es concisa y suficientemente fiel, sin introducir una lectura metafísica que el pasaje no exige.
- source_word: ኢኮነ ከመ ፍጥረተ ሰብእ
  english_pob_choice: he is not like a human being
  chosen_spanish: no son como la forma de un ser humano
  alternatives_spanish:
  - no son como la de un ser humano
  - no son como la forma de un hombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción conserva la comparación explícita con la humanidad ordinaria y mantiene la tensión teológica del pasaje sin resolverla. «Ser humano» es claro y neutral en español.
- source_word: ኅብሩ
  english_pob_choice: his color / complexion
  chosen_spanish: su tez
  alternatives_spanish:
  - su color
  - su complexión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de comparaciones cromáticas, «tez» suena natural en español culto y representa bien la coloración visible del rostro/cuerpo sin perder la fuerza descriptiva.
- source_word: ይጸዐዳ እምአስኃትያ
  english_pob_choice: is whiter than snow
  chosen_spanish: es más blanca que la nieve
  alternatives_spanish:
  - brilla más blanca que la nieve
  - es más blanca que la nieve
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación de blancura se conserva literalmente; «más blanca que la nieve» es transparente y fiel.
- source_word: ይቀይሕ እምጽጌ ረዳ
  english_pob_choice: redder than the blossom of a rose
  chosen_spanish: más roja que la flor de una rosa
  alternatives_spanish:
  - más roja que el brote de una rosa
  - más roja que una rosa en flor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen floral es clara, pero la especie exacta no es segura; «flor de una rosa» preserva la referencia tradicional sin afirmar más de lo que el texto garantiza.
- source_word: ጸጕረ ርእሱ
  english_pob_choice: the hair of his head
  chosen_spanish: el cabello de su cabeza
  alternatives_spanish:
  - el cabello de su cabeza
  - su cabello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción literal se vuelve natural en español con «cabello de su cabeza», manteniendo el detalle corporal enfático.
- source_word: እምፀምር ጸዐዳ
  english_pob_choice: whiter than white wool
  chosen_spanish: más blanco que la lana blanca
  alternatives_spanish:
  - más blanco que lana blanca
  - más blanco que la lana
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la repetición enfática de blancura; «lana blanca» refleja bien el paralelismo intensificador del original.
- source_word: ከመ እግረን ለፀሐይ
  english_pob_choice: like the rays of the sun
  chosen_spanish: como los rayos del sol
  alternatives_spanish:
  - como los rayos del sol
  - como los resplandores del sol
  - como los rayos de sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es difícil en ge'ez, pero el sentido general es de brillo solar; «rayos del sol» conserva la imagen luminosa sin forzar una precisión técnica.
- source_word: ከሠተ አዕይንቲሁ
  english_pob_choice: he opened his eyes
  chosen_spanish: abrió sus ojos
  alternatives_spanish:
  - abrió los ojos
  - abrió sus ojos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la acción secuencial de manera directa; «abrió sus ojos» conserva el paralelismo con el original.
- source_word: አበርሀ ኵሎ ቤተ
  english_pob_choice: he lit up the whole house
  chosen_spanish: iluminó toda la casa
  alternatives_spanish:
  - alumbró toda la casa
  - hizo brillar toda la casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica irradiar luz; «iluminó toda la casa» transmite el efecto milagroso con dignidad y claridad en español.
theological_decisions:
- issue: Grado de extrañeza del niño frente a la humanidad ordinaria
  english_pob_reading: his appearance and form are not like the form of a human being
  chosen_spanish_reading: su apariencia y su forma no son como la forma de un ser humano
  alternative_spanish_readings:
  - su apariencia y su forma no son como la de un ser humano
  - su apariencia y su forma no son como la forma de un hombre
  rationale: El pasaje presenta al recién nacido como extraordinario en su aspecto visible, pero el texto es descriptivo más que doctrinal. Se mantiene la tensión sin convertirla en una afirmación metafísica más fuerte de la que el original exige.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el ajuste final del audit trail inglés: mantiene la conjunción tras «mi hijo», conserva la secuencia con «y abrió sus ojos», y evita suavizar la comparación corporal extraordinaria. También respeta la tensión léxica entre apariencia, forma y comparación humana sin añadir interpretaciones doctrinales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo demande; en este versículo no aparece.
  - Se mantiene «ser humano» para la comparación antropológica, por su neutralidad y claridad.
  - Se evita «Cristo» y otras terminologías no presentes en el pasaje.
  - La puntuación reproduce la cadencia acumulativa del original y de la versión inglesa auditada.
