translation:
  language: es
  text: Y ahora, mi padre, te pido y te suplico que vayas a Henok[a] nuestro padre y oigas de él la verdad[b], porque su morada está con los ángeles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Henok es la forma ge'ez del nombre que con frecuencia se vierte como «Enoc».
    reason: lexical_alternative
  - marker: b
    text: 'O también: «a Henok nuestro padre y oigas de él la verdad».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora mismo
  - Y en este momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El marcador temporal de transición se conserva de manera natural en español con 'Y ahora', manteniendo la urgencia discursiva sin sobretraducir.
- source_word: አስተበቍዐከ
  english_pob_choice: asking you
  chosen_spanish: te estoy pidiendo
  alternatives_spanish:
  - te estoy rogando
  - te estoy suplicando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa una solicitud seria e insistente; en español 'pedir' funciona bien, y el progresivo mantiene la cercanía y viveza de la escena.
- source_word: ወእስእል
  english_pob_choice: and petitioning
  chosen_spanish: y suplicando
  alternatives_spanish:
  - y rogando
  - y solicitando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El par verbal intensifica la petición; 'suplicando' preserva mejor esa elevación retórica que una repetición plana de 'pedir'.
- source_word: ከመ ትሖር ኀበ
  english_pob_choice: that you should go to
  chosen_spanish: que vayas a
  alternatives_spanish:
  - para que vayas a
  - que te dirijas a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula final expresa el contenido de la petición; 'que vayas a' es la forma más directa y fiel en español contemporáneo.
- source_word: ሄኖክ አቡነ
  english_pob_choice: Henok our father
  chosen_spanish: Henok nuestro padre
  alternatives_spanish:
  - Henok, nuestro padre
  - Henok, el padre nuestro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el nombre en la transliteración ajustada al ge'ez 'Henok' y el apelativo familiar 'nuestro padre' como título de respeto, sin convertirlo en una glosa interpretativa.
- source_word: ትስማዕ እምኀቤሁ አማነ
  english_pob_choice: hear from him the truth
  chosen_spanish: escuches la verdad de él
  alternatives_spanish:
  - escuches de él la verdad
  - oigas de él la verdad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de oír/escuchar en ge'ez mantiene el matiz receptivo; 'la verdad de él' evita una formulación demasiado idiomática que borraría la relación original entre fuente y contenido.
- source_word: ውእቱ ምስለ መላእክት ምኅዳሩ
  english_pob_choice: his dwelling is with the angels
  chosen_spanish: su morada está con los ángeles
  alternatives_spanish:
  - él mora con los ángeles
  - su habitación está con los ángeles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción nominal se conserva con 'morada', que reproduce el énfasis apocalíptico en el lugar de residencia sin volverlo excesivamente explicativo.
theological_decisions:
- issue: Cómo expresar la relación de Henok con los ángeles sin suavizar la imagen apocalíptica
  english_pob_reading: his dwelling is with the angels
  chosen_spanish_reading: su morada está con los ángeles
  alternative_spanish_readings:
  - él mora con los ángeles
  - vive con los ángeles
  rationale: Se mantiene la formulación nominal para no diluir la idea de una residencia estable y extraordinaria entre los ángeles; 'morada' conserva mejor el tono visionario que un verbo más corriente.
  doctrine_reference: Preservar imaginería apocalíptica; evitar reinterpretar la ubicación celestial de Henok como mera compañía espiritual.
translation_notes:
  revision_awareness: La redacción sigue el pasaje base con el ajuste de revisión que corrigió la transliteración a «Henok» y mantuvo el orden más directo de la cláusula final ('hear the truth from him'). En español se optó por una sintaxis fluida que preserva la doble petición y la imagen de la morada angelical.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponda, pero aquí no aparece el Tetragrámaton.
  - Se mantiene «Henok» para reflejar la forma ge'ez atestiguada en el texto fuente.
  - Se eligió «ángeles» y «morada» para conservar el marco apocalíptico sin expandir el sentido.
  - No se introduce terminología eclesiástica ajena al registro del pasaje.
