revisions:
- from: Y ahora, mi padre, te estoy pidiendo y suplicando que vayas a Henok[a] nuestro padre y escuches la verdad de él[b], porque su morada está con los ángeles.
  to: Y ahora, mi padre, te pido y te suplico que vayas a Henok[a] nuestro padre y oigas de él la verdad[b], porque su morada está con los ángeles.
  rationale: Se corrigió la expresión no idiomática «la verdad de él» a «oigas de él la verdad», que preserva fielmente la procedencia expresada en el ge'ez y la auditoría inglesa. También se suavizó «te estoy pidiendo» a «te pido» para un español más natural y digno. La nota b se realineó con la alternativa documentada por el POB respecto a la agrupación de «Henok nuestro padre».
