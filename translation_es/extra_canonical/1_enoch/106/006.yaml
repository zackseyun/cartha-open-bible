translation:
  language: es
  text: Y me parece[a] que él no es de mí, sino de los ángeles; y temo que ocurra un prodigio[b] en sus días sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a mí me parece». La expresión ge''ez conserva una percepción subjetiva, no una afirmación segura.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una maravilla» o «algo extraordinario». El término ge''ez denota un acontecimiento fuera de lo común, con matiz de portento o prodigio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይመስለኒ
  english_pob_choice: it seems to me
  chosen_spanish: me parece
  alternatives_spanish:
  - me parece a mí
  - yo pienso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la fórmula de percepción subjetiva sin convertirla en una afirmación segura. En español, "me parece" expresa bien la inferencia temerosa de Lamec.
- source_word: አኮኑ
  english_pob_choice: is not
  chosen_spanish: no es
  alternatives_spanish:
  - no estaba
  - no fue
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción copulativa negativa en español reproduce mejor el valor presente del enunciado directo que una forma pasada.
- source_word: እምኔየ
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - mío
  - procedente de mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"De mí" mantiene la idea de origen/paternidad de manera natural en español y evita una paráfrasis más fuerte que el original.'
- source_word: እመላእክት
  english_pob_choice: from the angels
  chosen_spanish: de los ángeles
  alternatives_spanish:
  - de parte de los ángeles
  - procedente de los ángeles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el contraste apocalíptico entre origen humano y origen angélico sin suavizarlo en una frase más vaga.
- source_word: እፈረሀ
  english_pob_choice: I fear / I was afraid
  chosen_spanish: temo
  alternatives_spanish:
  - tengo miedo
  - temía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado que el contexto es habla directa y la revisión más reciente favorece el presente, "temo" expresa de forma natural la angustia actual de Lamec.
- source_word: ኢይትገበር
  english_pob_choice: will occur
  chosen_spanish: ocurra
  alternatives_spanish:
  - suceda
  - se produzca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo español en subjuntivo con "temo que" expresa con naturalidad la posibilidad temida de un acontecimiento extraordinario, sin resolver la ambigüedad pasiva/impersonal del ge'ez.
- source_word: መንክር
  english_pob_choice: a wonder
  chosen_spanish: una maravilla
  alternatives_spanish:
  - un prodigio
  - algo extraordinario
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Maravilla" conserva el matiz de algo extraordinario o inquietante; en español bíblico actual suena claro y no impone una interpretación doctrinal adicional.'
- source_word: በመዋዕሊሁ
  english_pob_choice: in his days
  chosen_spanish: en sus días
  alternatives_spanish:
  - durante sus días
  - en el tiempo de su vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión española reproduce directamente la referencia temporal al niño y mantiene el registro elevado del original.
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la faz de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Sobre la tierra" refleja el tono solemne y espacial del ge''ez sin forzar un hebraísmo innecesario.'
theological_decisions:
- issue: Origen del niño y temor de Lamec
  english_pob_reading: Lamech suspects angelic rather than human origin, expressed as his fearful perception rather than as narrator-confirmed fact.
  chosen_spanish_reading: Lamec expresa una sospecha subjetiva de que el niño no procede de él, sino de los ángeles; la traducción mantiene ese carácter de percepción temerosa.
  alternative_spanish_readings:
  - El niño es, de hecho, de origen angélico
  - Es solo una exageración de Lamec ante un niño inusual
  rationale: La redacción con "me parece" preserva la tensión teológica y narrativa del pasaje sin convertir la sospecha de Lamec en una afirmación doctrinal respaldada por el narrador.
  doctrine_reference: Preservar la tensión teológica del relato sin resolverla.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que corrige el tiempo verbal para mantener el presente de la voz directa de Lamec. Por eso se usa "me parece" y "temo" en lugar de un pasado narrativo. También se conserva "maravilla" como equivalente de መንክር, sin diluir su fuerza apocalíptica.
  spanish_consistency_notes:
  - Se usó "ángeles" de forma literal, conforme al texto fuente y al audit trail inglés.
  - Se evitó "SEÑOR" o cualquier sustitución litúrgica, porque el pasaje no trata del nombre divino.
  - '"Maravilla" mantiene el valor de evento extraordinario/extraño sin volverlo meramente positivo.'
  - 'La puntuación y el orden reproducen la coordinación del original: percepción subjetiva, contraste de origen y temor ante el acontecimiento.'
