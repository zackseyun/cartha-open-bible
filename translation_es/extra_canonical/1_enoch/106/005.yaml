base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/106/005.yaml
  text: And he said to him[a], “I have begotten a strange son, and he is not like a human being; rather, he is like the children of the angels of heaven. And his nature is different, and he is not like us; and his eyes are like the rays of the sun[c][b], and his face is glorious.”
  footnotes:
  - marker: a
    text: Or 'an unusual son.' The Ge'ez term emphasizes that the child is markedly other than normal.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the children of the angels of heaven,' preserving Lamech's startling comparison rather than reducing it to simply 'angelic.'
    reason: lexical_alternative
  - marker: c
    text: The phrase about the eyes compares them to the sun's emitted light; 'sunbeams' is a possible rendering.
    reason: lexical_alternative
