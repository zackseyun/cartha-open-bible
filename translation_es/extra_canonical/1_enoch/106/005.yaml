translation:
  language: es
  text: 'Y le dijo: «He engendrado[a] un hijo extraño, y no es como un ser humano; antes bien, es como los hijos[b] de los ángeles del cielo. Y su naturaleza es distinta, y no es como nosotros; y sus ojos son como los rayos del sol[c], y su rostro es glorioso».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he sido padre de un hijo extraño». El ge'ez enfatiza que el niño es marcadamente ajeno a lo normal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los hijos de los ángeles del cielo», preservando la comparación impactante en vez de reducirla a «angelical».
    reason: lexical_alternative
  - marker: c
    text: La frase sobre los ojos compara su brillo con la luz emitida por el sol; también podría traducirse «resplandores del sol».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወለድኩ
  english_pob_choice: I have begotten
  chosen_spanish: He engendrado
  alternatives_spanish:
  - He sido padre de
  - He tenido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa generación/paternidad en un registro elevado. «He engendrado» conserva la fuerza paterna y el tono solemne mejor que una formulación más plana.
- source_word: ውሉጠ
  english_pob_choice: strange
  chosen_spanish: extraño
  alternatives_spanish:
  - singular
  - inusual
  - peculiar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término señala alteridad marcada. «Extraño» mantiene la alarma de Lamec sin decidir de antemano si la diferencia es positiva o monstruosa.
- source_word: አኮኑ ከመ ሰብእ
  english_pob_choice: he is not like a human being
  chosen_spanish: no es como un ser humano
  alternatives_spanish:
  - no es como un hombre
  - no es como los humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación contrasta al niño con la humanidad ordinaria. «Ser humano» evita restringir innecesariamente el sentido a lo masculino y suena natural en español.
- source_word: ወይመ ስል
  english_pob_choice: rather
  chosen_spanish: antes bien
  alternatives_spanish:
  - más bien
  - sino
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce una corrección contrastiva más fuerte que un simple «pero». «Antes bien» conserva el giro enfático del original y del audit trail inglés.
- source_word: ደቂቀ መላእክተ ሰማይ
  english_pob_choice: the children of the angels of heaven
  chosen_spanish: los hijos de los ángeles del cielo
  alternatives_spanish:
  - los hijos de los ángeles celestiales
  - los hijos de los ángeles del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez usa una expresión filial literal. Mantener «los hijos de los ángeles del cielo» preserva la comparación sorprendente sin suavizarla a un mero «angelical».
- source_word: ፍጥረቱ
  english_pob_choice: his nature
  chosen_spanish: su naturaleza
  alternatives_spanish:
  - su forma
  - su constitución
  - su condición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto el sustantivo apunta a la constitución o clase del niño. «Naturaleza» transmite bien la fuerza ontológica sin exceder lo que permite el texto.
- source_word: ካልእት
  english_pob_choice: different
  chosen_spanish: distinta
  alternatives_spanish:
  - diferente
  - otra
  - alterada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adjetivo predicativo que subraya otredad. «Distinta» suena natural y conserva la diferencia cualitativa indicada por el ge'ez.
- source_word: አዕይንቲሁ ከመ አገሪሁ ለፀሐይ
  english_pob_choice: his eyes are like the rays of the sun
  chosen_spanish: sus ojos son como los rayos del sol
  alternatives_spanish:
  - sus ojos son como los resplandores del sol
  - sus ojos son como sunbeams
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen compara los ojos con la luz emitida por el sol. «Rayos del sol» conserva la imaginería apocalíptica y la literalidad suficiente del original.
- source_word: ገጹ ስቡሕ
  english_pob_choice: his face is glorious
  chosen_spanish: su rostro es glorioso
  alternatives_spanish:
  - su rostro es espléndido
  - su rostro es lleno de gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo expresa gloria/esplendor. «Glorioso» mantiene el tono exaltado sin introducir una paráfrasis interpretativa.
theological_decisions:
- issue: Si la comparación con «los hijos de los ángeles del cielo» debe suavizarse a una comparación solo angelical
  english_pob_reading: Retain the familial expression 'the children of the angels of heaven' in the main text
  chosen_spanish_reading: Conservar «los hijos de los ángeles del cielo» en el texto principal
  alternative_spanish_readings:
  - como ángeles del cielo
  - como seres celestiales
  rationale: El ge'ez formula una comparación filial explícita, y el contexto narrativo incluye temor por un origen anómalo. Suavizarlo borraría parte de esa tensión documental.
  doctrine_reference: Preservar la tensión teológica y narrativa; no aplanar la imaginería apocalíptica.
- issue: Si ሰብእ debe traducirse con un término masculino o genérico
  english_pob_reading: human being
  chosen_spanish_reading: ser humano
  alternative_spanish_readings:
  - hombre
  - persona
  rationale: El contraste es con la humanidad ordinaria, no con varones específicamente. «Ser humano» comunica el alcance general sin introducir un sesgo de género no exigido por el texto.
  doctrine_reference: Claridad moderna y fidelidad semántica al contraste del original.
translation_notes:
  revision_awareness: 'La versión inglesa auditada recibió solo una corrección de puntuación: se añadió una coma después de «rather»; no hubo cambios léxicos. La redacción española sigue esa misma lectura, conservando la comparación filial, la distinción ontológica y la imagen solar sin suavizarlas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se ha usado «ser humano» para ሰብእ por claridad y neutralidad de género, en línea con la decisión inglesa.
  - «Hijos de los ángeles del cielo» conserva la tensión del original y no se normaliza a «angelical».
  - «Glorioso» se usa en sentido de esplendor visible/estatus exaltado, no como simple adorno retórico.
