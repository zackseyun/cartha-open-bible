translation:
  language: es
  text: Y su cuerpo era blanco como la nieve, y rojo como la flor de una rosa[a]; y el cabello de su cabeza era como lana blanca, y sus mechones eran hermosos. Y sus ojos eran hermosos[b]; y cuando abrió sus ojos, iluminó toda la casa como el sol, y toda la casa quedó sumamente brillante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión equivalente a 'the blooming of a rose' puede entenderse también como 'la floración de una rosa'; ambas conservan la imagen floral de color rojo.
    reason: lexical_alternative
  - marker: b
    text: El pasaje sobre los ojos es textualmente difícil; la lectura adoptada entiende que sus ojos eran hermosos, aunque también podría matizarse como 'espléndidos'.
    reason: textual_variant
lexical_decisions:
- source_word: ሥጋሁ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su carne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto describe la apariencia visible del niño como un todo; en español, 'cuerpo' conserva mejor esa lectura física general que 'carne', que podría sonar contrastiva o teológica.
- source_word: ጻዕዳ
  english_pob_choice: white
  chosen_spanish: blanco
  alternatives_spanish:
  - blanco brillante
  - resplandeciente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el color básico sin intensificarlo indebidamente. La comparación con la nieve ya aporta la fuerza imagética suficiente.
- source_word: አስሐትያ
  english_pob_choice: snow
  chosen_spanish: la nieve
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen comparativa apunta de manera directa a la nieve como patrón de blancura.
- source_word: ቀይሕ
  english_pob_choice: red
  chosen_spanish: rojo
  alternatives_spanish:
  - rubio rojizo
  - rojizo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el término cromático simple del original; 'rojizo' o 'rubio rojizo' serían más interpretativos.
- source_word: ጽጌ ረዳ
  english_pob_choice: the blooming of a rose
  chosen_spanish: la flor de una rosa
  alternatives_spanish:
  - la floración de una rosa
  - el florecer de una rosa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción ge'ez compara el color con una floración rosácea. En español, 'la flor de una rosa' comunica la imagen sin sonar forzado, aunque 'floración' también es posible.
- source_word: ጸጕረ ርእሱ
  english_pob_choice: the hair of his head
  chosen_spanish: el cabello de su cabeza
  alternatives_spanish:
  - su cabello
  - su pelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la expresión completa para corresponder al giro original y mantener el tono descriptivo solemne.
- source_word: ፀምር
  english_pob_choice: wool
  chosen_spanish: lana blanca
  alternatives_spanish:
  - lana
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación pide 'lana'; se explicita 'blanca' para hacer en español la relación con el contexto inmediato y porque el original ya viene asociado al color blanco.
- source_word: ተወድምድማሁ ሠናይ አዕይንቲሁ
  english_pob_choice: his eyes were beautiful
  chosen_spanish: sus ojos eran hermosos
  alternatives_spanish:
  - sus ojos eran bellos
  - sus ojos eran espléndidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se toma la lectura revisada que completa el sintagma sobre los ojos como una valoración positiva de su apariencia. 'Hermosos' es natural y fiel, y evita sobreinterpretar como 'espléndidos'.
- source_word: ከሠተ አዕይንቲሁ
  english_pob_choice: he opened his eyes
  chosen_spanish: cuando abrió sus ojos
  alternatives_spanish:
  - al abrir sus ojos
  - cuando los abrió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la acción directa del original y se integra fluidamente en la oración española.
- source_word: አብርሀ
  english_pob_choice: he lit up
  chosen_spanish: iluminó
  alternatives_spanish:
  - hizo brillar
  - alumbró
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El causativo de brillo se vierte con un verbo natural en español que preserve el efecto de irradiación sobre la casa.
- source_word: ኵሎ ቤተ
  english_pob_choice: the whole house
  chosen_spanish: toda la casa
  alternatives_spanish:
  - la casa entera
  - toda la habitación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión totalizante se reproduce de manera natural en español.
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación cósmica se conserva literalmente.
- source_word: ፈድፋደ በርሀ
  english_pob_choice: became exceedingly bright
  chosen_spanish: quedó sumamente brillante
  alternatives_spanish:
  - se volvió sumamente brillante
  - se llenó de luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción intensifica el resplandor; 'quedó sumamente brillante' transmite el resultado de manera clara y solemne en español.
theological_decisions:
- issue: Conservar la imaginería apocalíptica concreta sin suavizarla en una descripción general de belleza
  english_pob_reading: 'Retained concrete visual descriptions: white like snow, red like a rose''s bloom, eyes that light up the house like the sun.'
  chosen_spanish_reading: 'Se mantienen comparaciones concretas y sorprendentes: blanco como la nieve, rojo como la flor de una rosa, ojos que iluminan la casa como el sol.'
  alternative_spanish_readings:
  - Descripción general de gran belleza o gloria
  - Paráfrasis que reduzca las comparaciones físicas
  rationale: El pasaje es visionario y portentoso; la traducción debe conservar el impacto visual y no abstraerlo en meras expresiones de hermosura.
  doctrine_reference: Principio de preservación de imaginería apocalíptica; evitar la nivelación interpretativa.
translation_notes:
  revision_awareness: Se incorporó la corrección revisada que completa la frase sobre los ojos como una valoración positiva ('sus ojos eran hermosos') y se evitó la omisión defectuosa del sintagma correspondiente. También se distinguió 'mechones' para reflejar el término ge'ez que no es solo 'cabello' en general, sino una referencia al arreglo o trenza del cabello, según el audit trail revisado.
  spanish_consistency_notes:
  - Se usa 'cuerpo' y no 'carne' para mantener el sentido descriptivo visible del pasaje.
  - Se preserva 'sol' y el lenguaje de luz como en la imagen original, sin reinterpretarlo alegóricamente.
  - '''Hermosos'' se mantiene tanto para los ojos como para los mechones, siguiendo la lectura revisada del texto fuente.'
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes, ya que no aparecen en este versículo.
