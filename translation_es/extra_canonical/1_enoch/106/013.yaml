base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/106/013.yaml
  text: And I[a], Enoch, answered and said to him, “The Lord will do a new thing on the earth; and this I have already seen in a vision, and I have made it known to you[e][d][c][b], because in the generation of Jared my father they transgressed the word of my Lord from the heights of heaven.”
  footnotes:
  - marker: a
    text: Or 'will renew' or 'will make anew'; the Ge'ez verb and noun both draw on the idea of newness.
    reason: lexical_alternative
  - marker: b
    text: The final phrase may also be understood as 'the word of my Lord from heaven above.' The Ge'ez syntax is difficult, and the spatial phrase could modify either 'word' or 'Lord.'
    reason: alternative_reading
  - marker: c
    text: Or 'the word of the Lord'.
    reason: previous_rendering
  - marker: d
    text: Or 'make a new thing'.
    reason: previous_rendering
  - marker: e
    text: Or 'from above heaven'.
    reason: previous_rendering
