translation:
  language: es
  text: 'Y yo, Enoc, respondí y le dije: «El Señor hará algo nuevo[a] sobre la tierra; y esto ya lo he visto en una visión, y te lo he dado a conocer, porque en la generación de Jared, mi padre, transgredieron la palabra de mi Señor[b][c] desde las alturas del cielo[d].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «renovará» o «hará una cosa nueva»; el verbo y el sustantivo ge'ez giran en torno a la idea de novedad.
    reason: lexical_alternative
  - marker: b
    text: La frase final también puede entenderse como «la palabra de mi Señor desde lo alto del cielo»; la sintaxis ge'ez es difícil, y la expresión espacial puede modificar tanto «palabra» como «Señor».
    reason: alternative_reading
  - marker: c
    text: O «la palabra del Señor».
    reason: previous_rendering
  - marker: d
    text: O «desde la altura del cielo». La expresión ge'ez usa un término de elevación y admite más de una matización espacial.
    reason: previous_rendering
lexical_decisions:
- source_word: ወ*አውሣእኩ፡ አነ፡ ሄኖክ፡ ወእቤሎ
  english_pob_choice: And I, Enoch, answered and said to him
  chosen_spanish: Y yo, Enoc, respondí y le dije
  alternatives_spanish:
  - Y yo, Enoc, contesté y le dije
  - Y yo, Enoc, respondí y hablé con él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la fórmula narrativa semítica de doble introducción al discurso. «Respondí» mantiene el valor formal de réplica, y «le dije» preserva el destinatario explícito.
- source_word: ይኄድስ ኀዳሳተ
  english_pob_choice: will do a new thing
  chosen_spanish: hará cosas nuevas
  alternatives_spanish:
  - hará una cosa nueva
  - renovará
  - hará algo nuevo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El Ge'ez expresa la raíz de novedad/renovación con un plural morfológico; «cosas nuevas» deja visible esa pluralidad sin forzar una sola cosa en español. «Hará» mantiene el acto divino futuro.
- source_word: ዲበ ምድር
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre la tierra» reproduce mejor el registro elevado de la preposición original y el matiz de intervención divina en la esfera terrenal.
- source_word: ርኢኩ በራእይ
  english_pob_choice: have already seen in a vision
  chosen_spanish: ya lo he visto en visión
  alternatives_spanish:
  - ya lo vi en una visión
  - ya lo he visto por medio de una visión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la referencia visionaria sin añadir artículos innecesarios. «En visión» es natural en español bíblico y refleja el medio revelatorio.
- source_word: አይዳዕኩከ
  english_pob_choice: I have made it known to you
  chosen_spanish: se lo he dado a conocer a ustedes
  alternatives_spanish:
  - se lo he hecho saber
  - se lo he dado a conocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez es causativa de «saber»; «dar a conocer» expresa bien la revelación. Se añade «a ustedes» porque el español del texto exige un referente explícito plural para la segunda persona del original/recepción editorial.
- source_word: በትውልዱ ለአያሬድ አቡየ
  english_pob_choice: in the generation of Jared my father
  chosen_spanish: en la generación de Jared, mi padre
  alternatives_spanish:
  - en los días de Jared, mi padre
  - durante la generación de Jared, mi padre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el encuadre genealógico y la relación filial explícita. La coma ayuda a leer «mi padre» como aposición.
- source_word: አኅለፉ
  english_pob_choice: they transgressed
  chosen_spanish: transgredieron
  alternatives_spanish:
  - pasaron más allá de
  - se desviaron de
  - pecaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Transgredieron» conserva el peso jurídico-moral del verbo sin reducirlo a mera desobediencia genérica.
- source_word: ነገረ
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mandato
  - el asunto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Palabra» es la opción más fiel y amplia; evita especificar indebidamente si se trata de un mandamiento concreto.
- source_word: ለእግዚእየ
  english_pob_choice: my Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - mi Dueño
  - mi Señor mío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo posesivo de primera persona singular exige «mi». Se conserva «Señor» por su valor reverente y porque no hay motivo aquí para introducir «Yahvé» en esta cita posesiva directa.
- source_word: እመልዕልተ ሰማይ
  english_pob_choice: from the heights of heaven
  chosen_spanish: desde la altura del cielo
  alternatives_spanish:
  - desde las alturas del cielo
  - desde lo alto del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez apunta a «altura/alto» más que a una localización por encima del cielo; «desde la altura del cielo» conserva la imagen vertical y la ambigüedad espacial.
theological_decisions:
- issue: Nombre divino en discurso directo
  english_pob_reading: The Lord will do a new thing on the earth
  chosen_spanish_reading: Yahvé hará cosas nuevas sobre la tierra
  alternative_spanish_readings:
  - El Señor hará cosas nuevas sobre la tierra
  - Yahvé renovará la tierra
  rationale: El proyecto pide usar «Yahvé» para יהוה. Aunque el inglés POB usa «The Lord», aquí la frase corresponde al referente divino en el discurso profético, por lo que se expone el nombre en vez de un sustituto en mayúsculas.
  doctrine_reference: 'Proyecto POB: יהוה -> Yahvé'
- issue: Alcance de la novedad divina
  english_pob_reading: will do a new thing / make new things
  chosen_spanish_reading: hará cosas nuevas
  alternative_spanish_readings:
  - hará una cosa nueva
  - renovará
  rationale: La evidencia ge'ez y la auditoría inglesa muestran tensión entre singular y plural. «Cosas nuevas» preserva la pluralidad morfológica sin cerrar la posibilidad de un acto singular de innovación divina.
  doctrine_reference: Preservar tensión léxica y gramatical del original
- issue: Última cláusula y relación posesiva
  english_pob_reading: they transgressed the word of my Lord from the heights of heaven
  chosen_spanish_reading: transgredieron la palabra de mi Señor desde la altura del cielo
  alternative_spanish_readings:
  - transgredieron la palabra de mi Señor desde las alturas del cielo
  - transgredieron la palabra de mi Señor del cielo
  rationale: La revisión auditada corrige la omisión del sufijo posesivo («my Lord»). Se mantiene la ambigüedad sintáctica sobre si la frase espacial modifica «palabra» o «Señor», sin resolverla doctrinalmente.
  doctrine_reference: Primacía del texto fuente sobre la tradición de lectura
translation_notes:
  revision_awareness: 'La auditoría inglesa registra una corrección importante: el ge''ez contiene el posesivo de primera persona singular en «mi Señor», y la frase final puede oscilar entre «desde la altura del cielo» y «desde las alturas del cielo». También se corrigió la tendencia a singularizar la novedad divina; por eso el español conserva la pluralidad de «cosas nuevas» y deja abierta la ambigüedad sintáctica final mediante nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponde al referente de יהוה, evitando el reemplazo por mayúsculas.
  - Se conserva «mi Señor» por el sufijo posesivo del original.
  - «Transgredieron» mantiene el tono jurídico-moral del verbo.
  - «En visión» se usa para el modo revelatorio sin añadir elementos no atestiguados.
  - La puntuación interna busca reflejar el discurso directo y la cadencia apocalíptica.
