translation:
  language: es
  text: Y el padre de este, Lamec, tuvo miedo, y huyó hacia mí, y no creyó que fuera de él, sino que su semejanza era como la de los ángeles del cielo. Y he aquí[b], he venido a ti para que me hagas conocer la justicia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud» o «lo que es justo». El sustantivo ge'ez puede tener fuerza moral o jurídica; aquí la lectura más natural apunta a la explicación verdadera que Lamec busca.
    reason: lexical_alternative
  - marker: b
    text: 'O: «y creyó que no era de él, sino que su semejanza era como la de los ángeles del cielo».'
    reason: textual_variant
lexical_decisions:
- source_word: ፈርሀ
  english_pob_choice: was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - temió
  - se llenó de temor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa temor real y narrativo; «tuvo miedo» conserva la fuerza básica sin sobreactuar la intensidad ni volverlo demasiado literario.
- source_word: ጐየ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - corrió
  - se alejó apresuradamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Huyó» reproduce bien el movimiento impulsivo causado por el temor y suena natural en español bíblico contemporáneo.
- source_word: ኀቤየ
  english_pob_choice: to me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - a mí
  - ante mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición señala movimiento hacia el hablante; «hacia mí» conserva ese matiz dinámico mejor que un simple dativo.
- source_word: አአምነ
  english_pob_choice: he believed
  chosen_spanish: creyó
  alternatives_spanish:
  - pensó
  - estuvo convencido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de base es «creer/fiarse». En español, «no creyó» mantiene ese valor cognitivo y narrativo frente a la cuestión del origen del niño.
- source_word: እምኔሁ
  english_pob_choice: from him
  chosen_spanish: que fuera de él
  alternatives_spanish:
  - que proviniera de él
  - que fuese suyo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La negación en la cláusula subordinada refleja mejor la revisión textual indicada por el audit trail y preserva el sentido de origen/procedencia sin convertirlo en una afirmación doctrinal más fuerte.
- source_word: አላ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - más bien
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sino que» expresa con naturalidad la oposición entre no ser de Lamec y la semejanza celestial del niño.
- source_word: አምሳሉ
  english_pob_choice: in the likeness of
  chosen_spanish: su semejanza era como
  alternatives_spanish:
  - era semejante a
  - su apariencia era como
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto ge'ez subraya «su semejanza»; por eso se evita un giro más abstracto y se mantiene la idea de apariencia/resemblanza, no identidad ontológica.
- source_word: እመላእክተ ሰማይ
  english_pob_choice: the angels of heaven
  chosen_spanish: los ángeles del cielo
  alternatives_spanish:
  - los ángeles del cielo
  - los ángeles celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Del cielo» reproduce el registro apocalíptico del ge'ez y resulta más idiomático que «de los cielos» en español moderno.
- source_word: ናሁ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ve
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «He aquí» conserva el marcador discursivo solemne del original y es reconocible en estilo bíblico en español.
- source_word: ታይድዐኒ
  english_pob_choice: you may make known to me
  chosen_spanish: me hagas conocer
  alternatives_spanish:
  - me informes
  - me des a conocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hacer conocer» refleja mejor la fuerza causativa del verbo que un simple «decir» o «informar».
- source_word: ጽድቀ
  english_pob_choice: the truth / righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - lo justo
  - la verdad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo ge'ez puede abarcar justicia/rectitud y también la verdad del asunto. Dado el contexto, la petición de Lamec apunta a una explicación recta y verdadera; «la justicia» preserva la amplitud lexical y la tensión sin reducirla solo a «verdad».
theological_decisions:
- issue: Si el versículo afirma paternidad angelical o solo semejanza angelical
  english_pob_reading: The main text renders Lamech as believing the child was 'not from him but in the likeness of the angels of heaven,' preserving resemblance language rather than stating direct angelic descent.
  chosen_spanish_reading: La versión española mantiene la negación de procedencia humana («no creyó que fuera de él») y la afirmación de semejanza («su semejanza era como la de los ángeles del cielo»), sin convertirla en descendencia angelical explícita.
  alternative_spanish_readings:
  - no creyó que fuera suyo, sino que era un ángel del cielo
  - no creyó que proviniera de él, sino de los ángeles del cielo
  rationale: El ge'ez destaca la semejanza, no una identificación o filiación directa. La traducción debe conservar esa tensión y no resolverla en una afirmación más fuerte que el texto.
  doctrine_reference: Preservar la tensión textual y la primacía de la fuente original.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión textual posterior que corrige la lógica de la negación en la cláusula sobre la procedencia del niño y la que refuerza la correspondencia de ጽድቀ con un término de justicia/rectitud. La redacción española evita depender del inglés base y sigue la tensión señalada por el audit trail: origen, semejanza y la ambigüedad lexical de ጽድቀ.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió «ángeles del cielo» por coherencia con el registro apocalíptico y para mantener la imagen celestial sin modernizarla en exceso.
  - «He aquí» y la sintaxis con «sino que» mantienen un tono bíblico claro sin calco duro.
  - No se sustituyó «justicia» por «verdad», para no borrar la amplitud moral/jurídica documentada en el original.
