translation:
  language: es
  text: Y en aquel tiempo, se levantó de las manos de la partera[a], y abrió su boca y habló al Señor de rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'de sus manos'. El contexto identifica a la mujer como la asistente del parto, de modo que 'partera' explicita el referente.
    reason: lexical_alternative
  - marker: b
    text: O 'al Señor de justicia'. El término ge'ez puede abarcar tanto el sentido moral de 'rectitud' como el sentido judicial de 'justicia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሶቤሃ
  english_pob_choice: And at that time
  chosen_spanish: Y en aquel tiempo
  alternatives_spanish:
  - Y entonces
  - Y en ese momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el valor temporal-narrativo elevado de la fórmula ge'ez y mantiene el enlace con el evento sorprendente que sigue.
- source_word: ተንሥአ
  english_pob_choice: he rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'se levantó' comunica con naturalidad la acción de alzarse desde una posición inferior sin añadir más postura de la que el texto exige.
- source_word: እምእዴሃ
  english_pob_choice: from the hands of the midwife
  chosen_spanish: de las manos de la partera
  alternatives_spanish:
  - de sus manos
  - de las manos de la comadrona
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez dice literalmente 'de sus manos'. Se mantiene la imagen corporal y se hace explícito el oficio femenino por el contexto inmediato; 'partera' es claro y bíblicamente inteligible en español.
- source_word: ለመውለዲት
  english_pob_choice: the midwife
  chosen_spanish: la partera
  alternatives_spanish:
  - la comadrona
  - la asistente del parto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Corresponde al asistente del parto, no a la madre. 'Partera' es la opción más natural y precisa en español contemporáneo.
- source_word: ወከሠተ አፉሁ
  english_pob_choice: and he opened his mouth
  chosen_spanish: y abrió su boca
  alternatives_spanish:
  - y abrió la boca
  - y su boca fue abierta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la fórmula verbal directa del original, sin suavizar la imagen de apertura de la boca antes del habla.
- source_word: ተወተናገረ
  english_pob_choice: and spoke
  chosen_spanish: y habló
  alternatives_spanish:
  - y dijo
  - y expresó palabras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Habló'' transmite el acto de habla de forma simple y fiel, sin inflarlo ni volverlo demasiado formal.'
- source_word: ለእግዚአ ጽድቅ
  english_pob_choice: to the Lord of righteousness
  chosen_spanish: al Señor de justicia
  alternatives_spanish:
  - al Señor de rectitud
  - al Señor de justicia y rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez permite tanto 'justicia' como 'rectitud/righteousness'. En español, 'Señor de justicia' conserva la fuerza moral y judicial del título y refleja la alternativa reconocida por el POB en inglés.
theological_decisions:
- issue: Título divino con ג/እግዚአ ጽድቅ
  english_pob_reading: Lord of righteousness; or Lord of justice
  chosen_spanish_reading: Señor de justicia
  alternative_spanish_readings:
  - Señor de rectitud
  - Señor de righteousness
  rationale: Se privilegia 'justicia' para mantener visible la tensión semántica documentada por el POB entre lo moral y lo judicial, sin perder la solemnidad del título divino.
  doctrine_reference: 'POB lexical policy: when a term carries both moral and judicial force, Spanish may choose one term in the main text while documenting the alternative.'
translation_notes:
  revision_awareness: El pasaje no muestra revisiones aplicadas en el paquete inglés; se sigue su lectura óptima-equivalente y se conserva la distinción semántica entre 'righteousness' y 'justice' en la documentación.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma predeterminada en este proyecto cuando aparece el nombre divino; aquí el texto ge'ez dice 'Señor', por lo que se mantiene 'Señor' conforme al audit trail.
  - '''Partera'' se prefiere a ''comadrona'' por claridad y tono bíblico-neutral en español latinoamericano.'
  - Se evita 'Cristo' porque el original no contiene Χριστός ni equivalente mesiánico en este verso.
