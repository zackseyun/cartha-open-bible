translation:
  language: es
  text: Y Lamec, su padre, tuvo miedo de él[a][b], y huyó y fue a su padre Matusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre «él» se mantiene en el texto; por el contexto inmediato, lo más probable es que se refiera al recién nacido mencionado antes.
    reason: cross_reference
  - marker: b
    text: 'O: «Y Lamec tuvo miedo de él». El ge''ez coloca «su padre» en aposición a Lamec, de modo que se enfatiza que su propio padre fue quien se asustó.'
    reason: translation_alternative
lexical_decisions:
- source_word: ፈረሀ
  english_pob_choice: was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - temió
  - se asustó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa temor real. «Tuvo miedo» es natural en español y conserva la reacción inmediata sin añadir intensidad no garantizada por el texto.
- source_word: እምኔሁ
  english_pob_choice: of him
  chosen_spanish: de él
  alternatives_spanish:
  - por él
  - a causa de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición marca el objeto del temor. «De él» mantiene la referencia pronominal sin resolver en el cuerpo del verso que el referente es el niño, aunque el contexto lo sugiera.
- source_word: ጐየ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - salió corriendo
  - se fue apresuradamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Huyó» conserva el matiz de retirada rápida motivada por miedo, más fiel que un simple «se fue».
- source_word: መጽአ ኀበ
  english_pob_choice: came to
  chosen_spanish: vino a
  alternatives_spanish:
  - fue a
  - se dirigió a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia de movimiento y llegada se expresa de forma directa con «vino a», que refleja el arribo a Matusalén.
- source_word: አቡሁ
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez incluye la aposición «su padre» referida a Lamec. En español se conserva esa especificación con la coma, porque la revisión auditada señaló que omitirla pierde el énfasis narrativo.
- source_word: ማቱሳላ
  english_pob_choice: Methuselah
  chosen_spanish: Matusalén
  alternatives_spanish:
  - Mathusala
  lexicon: convención transliterada habitual en español bíblico
  rationale: Se usa la forma española familiar del nombre propio para una lectura pública clara, preservando el referente del original.
theological_decisions:
- issue: Referente del pronombre «él» en la frase «tuvo miedo de él»
  english_pob_reading: The pronoun refers to the newborn child described in the immediate context.
  chosen_spanish_reading: El pronombre se mantiene ambiguo en la línea principal, aunque el contexto inmediato apunta al recién nacido.
  alternative_spanish_readings:
  - «tuvo miedo de su hijo»
  - «tuvo miedo del niño»
  rationale: El verso ge'ez usa solo un pronombre, y la POB inglesa conserva esa concisión. En español, no se debe insertar «niño» en el texto principal; la referencia contextual puede explicarse en nota si se desea.
  doctrine_reference: Preservar la concisión y la ambigüedad donde el texto fuente no la resuelve explícitamente.
translation_notes:
  revision_awareness: 'La revisión auditada corrigió una omisión importante: la aposición «su padre» junto a Lamec. La redacción española la conserva explícitamente para no perder el énfasis narrativo del original. También se evita duplicar cualquier cláusula final y se mantiene la estructura simple del verso.'
  spanish_consistency_notes:
  - Se mantiene «Matusalén» como forma española del nombre propio.
  - Se evita introducir explicaciones interpretativas en el texto principal más allá de la aposición necesaria.
  - El tono es bíblico pero en español natural, sin calcos innecesarios.
  - La puntuación separa la aposición «su padre» con comas para reflejar su función en el original.
