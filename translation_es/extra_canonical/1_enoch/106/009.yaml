translation:
  language: es
  text: 'Y me respondió y dijo: «A causa de una gran aflicción[a] he venido a ti, y a causa de una visión maravillosa[b] me he acercado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «angustia», «aflicción» o «urgencia»; la revisión del ge'ez corrige una lectura previa que entendía aquí «justicia» o «rectitud».
    reason: lexical_alternative
  - marker: b
    text: O «asombrosa» o «extraordinaria». El adjetivo subraya el carácter maravilloso de la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: አውሥአኒ
  english_pob_choice: he answered me
  chosen_spanish: me respondió
  alternatives_spanish:
  - me contestó
  - me respondió y dijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa respuesta en un diálogo; en español, «me respondió» conserva la relación directa con el hablante y su destinatario.
- source_word: በእንተ
  english_pob_choice: because of
  chosen_spanish: porque de
  alternatives_spanish:
  - a causa de
  - por causa de
  - debido a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición introduce la razón de la venida. «Porque de» conserva el matiz causal del original en un registro bíblico natural; «a causa de» sería también posible, pero menos cercano al giro repetido del texto.
- source_word: ጻህቅ
  english_pob_choice: great trouble
  chosen_spanish: gran tribulación
  alternatives_spanish:
  - gran angustia
  - gran aflicción
  - gran problema
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente indica que ጻህቅ significa «distress / anxiety / urgency», no «righteousness». En español, «tribulación» comunica bien sufrimiento o apremio intenso sin suavizar el peso del término.
- source_word: ዐቢይ
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - enorme
  - muy grande
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adjetivo intensificador común; «gran» es la forma más natural ante sustantivo femenino en español y mantiene la fuerza del original.
- source_word: መጻእኩ ኀቤከ
  english_pob_choice: I have come to you
  chosen_spanish: he venido a ti
  alternatives_spanish:
  - he llegado a ti
  - vine a ti
  - he venido hacia ti
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto español funciona bien para una acción ya realizada con relevancia presente. «A ti» preserva el complemento direccional del ge'ez.
- source_word: ራእይ
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - revelación
  - aparición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto apocalíptico, «visión» es la correspondencia más directa y mantiene el género revelatorio del pasaje.
- source_word: ዐፁብ
  english_pob_choice: marvelous
  chosen_spanish: maravillosa
  alternatives_spanish:
  - admirable
  - asombrosa
  - extraordinaria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo expresa algo que suscita asombro; «maravillosa» es claro, elevado y fiel al tono del relato.
- source_word: ቀረብኩ
  english_pob_choice: I have drawn near
  chosen_spanish: me he acercado
  alternatives_spanish:
  - he llegado cerca
  - me he aproximado
  - he venido cerca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica acercamiento. «Me he acercado» conserva el movimiento de aproximación sin forzar un giro demasiado literal en español.
theological_decisions:
- issue: Sentido de ጻህቅ en la causa de la visita
  english_pob_reading: a great trouble / distress, not a moral term like righteousness
  chosen_spanish_reading: una gran tribulación
  alternative_spanish_readings:
  - una gran angustia
  - una gran aflicción
  - una gran urgencia
  rationale: La evidencia revisada descarta «justicia/rectitud» y apunta a un estado de aflicción o urgencia. «Tribulación» mantiene el peso semántico y evita introducir una lectura moral ajena al versículo.
  doctrine_reference: Principio de primacía del texto fuente y preservación de la tensión léxica original.
- issue: Relación entre la primera y la segunda cláusula con «venir» y «acercarse»
  english_pob_reading: I have come to you ... and I have drawn near
  chosen_spanish_reading: he venido a ti ... me he acercado
  alternative_spanish_readings:
  - he llegado a ti ... me he acercado
  - he venido a ti ... he llegado cerca
  rationale: Conviene distinguir la llegada dirigida al destinatario de la aproximación final, porque el ge'ez repite la idea con verbos distintos. La traducción conserva esa duplicidad sin fusionarla.
  doctrine_reference: Respeto a la estructura discursiva del original y a la repetición retórica del texto apocalíptico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta que la evaluación previa detectó un error mayor en ጻህቅ: no significa «righteousness», sino un término de distress/anxiety/urgency. Por eso la redacción española evita cualquier alusión a «justicia» y adopta una solución acorde con la revisión más reciente del auditor. También se respetó la distinción entre «venir» y «acercarse» del paralelismo final.'
  spanish_consistency_notes:
  - Se mantiene «visión» para ራእይ en un contexto apocalíptico.
  - Se usa un registro bíblico sobrio, pero con español natural y sin calco excesivo.
  - Se evita cualquier término que sugiera una interpretación mesiánica o moral no sustentada por el ge'ez en este versículo.
  - La puntuación con comillas angulares y la construcción causal siguen un estilo publicable en español de lectura eclesial.
