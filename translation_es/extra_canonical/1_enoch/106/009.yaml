base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/106/009.yaml
  text: And he answered me and said[a], “Because of a great trouble I have come to you[c][b], and because of a marvelous vision I have drawn near.”
  footnotes:
  - marker: a
    text: The phrase rendered 'a great matter of righteousness' is somewhat uncertain. The Ge'ez may also be understood more generally as 'a great matter of justice' or, less likely, as referring to a 'great righteous one.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because of an extraordinary vision I approached.' The final clause uses a verb of coming near, which may overlap in sense with 'I have come to you' earlier in the verse.
    reason: lexical_alternative
  - marker: c
    text: Or 'matter of righteousness'.
    reason: previous_rendering
