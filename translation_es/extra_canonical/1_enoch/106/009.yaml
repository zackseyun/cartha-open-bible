  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión principal es léxica: ajustar ጻህቅ a «aflicción» en vez de «tribulación» por mayor precisión y neutralidad, y reemplazar «porque de» por «a causa de» para una causalidad idiomática en español.'
