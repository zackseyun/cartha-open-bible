translation:
  language: es
  text: Y después de algunos días, mi hijo Matusalén tomó una esposa para su hijo Lamec[a], y ella concibió de él y dio a luz un hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La apertura también puede entenderse con mayor libertad como «después de un tiempo».
    reason: lexical_alternative
lexical_decisions:
- source_word: እምድኅረ መዋዕል
  english_pob_choice: after some days
  chosen_spanish: después de algunos días
  alternatives_spanish:
  - después de un tiempo
  - más tarde
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez marca un intervalo temporal impreciso. «Después de algunos días» conserva el carácter idiomático y narrativo sin volverlo excesivamente literal ni perder la vaguedad del original.
- source_word: ነሥአ
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - obtuvo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contextos matrimoniales, el verbo puede expresar la acción de tomar/esposar. «Tomó» es el equivalente natural en español bíblico y mantiene la agencia de Matusalén en la frase.
- source_word: ብእሲተ
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el sustantivo puede significar «mujer», aquí el contexto matrimonial exige el valor de «esposa». «Esposa» evita ambigüedad en español y refleja la relación nupcial indicada por la sintaxis.
- source_word: ወፀንሰት
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Concibió» corresponde bien al registro narrativo elevado y reproduce el sentido del verbo sin añadir matices ajenos.
- source_word: እምኔሁ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - de él
  - a causa de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición ge'ez señala al padre del niño. «Por él» es la formulación más natural en español para indicar paternidad en el contexto de concepción.
- source_word: ወወለደት ወልደ
  english_pob_choice: and bore a son
  chosen_spanish: y dio a luz un hijo
  alternatives_spanish:
  - y alumbró un hijo
  - y parió un hijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Dio a luz» es claro, digno y plenamente idiomático en español. «Un hijo» conserva el artículo indefinido del original y evita sobrerreafirmar el género más allá de lo expresado.
theological_decisions:
- issue: Agencia matrimonial en la cláusula inicial
  english_pob_reading: Methuselah took a wife for his son Lamech
  chosen_spanish_reading: mi hijo Matusalén tomó para su hijo Lamec una esposa
  alternative_spanish_readings:
  - Matusalén tomó una esposa para su hijo Lamec
  - el hijo de Matusalén, Lamec, tomó una esposa
  rationale: La sintaxis ge'ez presenta a Matusalén como sujeto de la acción y a Lamec como beneficiario indirecto. La traducción española conserva esa lectura y evita desplazar la acción a Lamec, lo que alteraría el flujo narrativo del pasaje.
  doctrine_reference: Priorizar la sintaxis más natural del texto fuente y documentar la ambigüedad sin forzar una tradición interpretativa posterior.
translation_notes:
  revision_awareness: El texto base en inglés y el análisis léxico concuerdan estrechamente con el ge'ez. Se preservó la estructura narrativa y la ambigüedad temporal del inicio sin añadir explicaciones; no se registraron revisiones sustantivas en el audit trail más reciente.
  spanish_consistency_notes:
  - Se mantiene «Matusalén» y «Lamec» como formas españolas habituales de los nombres propios.
  - Se usa «Y» inicial por tratarse de una cláusula narrativa que sigue el tono bíblico español.
  - La elección de «tomó» y «dio a luz» conserva un registro digno y bíblico sin recurrir a arcaísmos innecesarios.
