translation:
  language: es
  text: Y cometerán pecado, y transgredirán la ordenanza; y se unirán con mujeres[a] y cometerán pecado con ellas, y tomarán esposas de entre esas mujeres, y engendrarán hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Se unirán con mujeres’ refleja una formulación más amplia que ‘tendrán relaciones con mujeres’; el contexto la vuelve transgresora, pero el verbo ge’ez no obliga a explicitar el acto sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይገብሩ
  english_pob_choice: they will commit
  chosen_spanish: cometerán
  alternatives_spanish:
  - harán
  - practicarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con objeto moral explícito (‘pecado’), el español natural y fiel es ‘cometerán [pecado]’, evitando un calco como ‘harán pecado’.
- source_word: ኀጢአተ
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado
  - culpa
  - ofensa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Pecado’ conserva el valor moral general y fluye mejor en español bíblico actual; ‘culpa’ o ‘ofensa’ estrecharían o desplazarían el sentido.
- source_word: የኀልፉ
  english_pob_choice: they will transgress
  chosen_spanish: transgredirán
  alternatives_spanish:
  - violarán
  - pasarán por encima de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con ሥርዐተ, el sentido es infringir una norma establecida. ‘Transgredirán’ conserva el registro jurídico-moral sin añadir especificación indebida.
- source_word: ሥርዐተ
  english_pob_choice: the ordinance
  chosen_spanish: la ordenanza
  alternatives_spanish:
  - el orden
  - la ley
  - la regla
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Ordenanza’ reproduce el matiz de norma/decreto establecido y mantiene el tono apocalíptico-judicial. ‘Ley’ sería demasiado específico; ‘orden’ demasiado vago.
- source_word: ተደመሩ
  english_pob_choice: they will join themselves
  chosen_spanish: se unirán
  alternatives_spanish:
  - se mezclarán
  - se juntarán
  - se unirán con
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica asociación o unión voluntaria. ‘Se unirán’ es natural en español y conserva la ambigüedad moral sin volver la frase más explícita de lo que exige el ge’ez.
- source_word: አንስት
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  - feminas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término colectivo simple se traduce mejor como ‘mujeres’; ‘esposas’ añadiría una precisión marital no presente en el sustantivo.
- source_word: ተደመሩ ወምስለ አንስት
  english_pob_choice: join themselves with women
  chosen_spanish: se unirán con mujeres
  alternatives_spanish:
  - se juntarán con mujeres
  - se mezclarán con mujeres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La construcción se mantiene amplia, en línea con la auditoría inglesa: union ilícita sugerida por el contexto, pero sin explicitar el acto sexual más allá del texto fuente.'
- source_word: አውሰቡ
  english_pob_choice: they will take wives
  chosen_spanish: tomarán esposas
  alternatives_spanish:
  - tomarán mujeres
  - recibirán esposas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige la lectura errónea anterior de ‘separados’. Aquí el verbo indica tomar/contraer esposa, así que ‘tomarán esposas’ refleja con fidelidad la decisión lexical revisada.
- source_word: እምኔሆን
  english_pob_choice: from among them
  chosen_spanish: de entre ellas
  alternatives_spanish:
  - de entre ellas mismas
  - de entre ellas y de entre ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición repetida se vierte con una locución española natural que conserva la idea de extracción/selección desde el grupo femenino.
- source_word: ወይወልዱ ውሉደ (from revision context)
  english_pob_choice: and they will beget children
  chosen_spanish: y engendrarán hijos
  alternatives_spanish:
  - y tendrán hijos
  - y procrearán hijos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail indica que el final correcto significa ‘engendrarán hijos’. ‘Engendrarán’ conserva el registro bíblico y el vínculo causal con la unión descrita.
theological_decisions:
- issue: Naturaleza de la unión con mujeres
  english_pob_reading: Render the line as illicit joining with women without making the sexual act more explicit than the Ge'ez wording itself.
  chosen_spanish_reading: ‘Se unirán con mujeres’ mantiene la carga transgresora sin convertir la frase en una paráfrasis más explícita que el ge’ez.
  alternative_spanish_readings:
  - ‘Se casarán con mujeres’
  - ‘Tendrán relaciones con mujeres’
  rationale: La auditoría inglesa preserva la tensión entre unión ilícita y formulación amplia. En español, ‘se unirán con mujeres’ conserva esa ambigüedad controlada y evita resolverla por adelantado.
  doctrine_reference: Preservar la tensión léxica y no sobreinterpretar el alcance del verbo cuando el testimonio no lo exige.
- issue: Sentido de 'ordenanza' frente a otras normas
  english_pob_reading: they will transgress the ordinance
  chosen_spanish_reading: ‘transgredirán la ordenanza’ mantiene el lenguaje de norma establecida y de infracción deliberada.
  alternative_spanish_readings:
  - ‘violarán la ley’
  - ‘romperán el orden’
  rationale: ‘Ordenanza’ deja abierto si se trata de decreto, orden instituida o norma sagrada, sin forzar el texto hacia una ley mosaica específica.
  doctrine_reference: Respetar el registro normativo/judicial del pasaje sin estrechar indebidamente el alcance.
- issue: Clausula final de descendencia
  english_pob_reading: and they will beget children
  chosen_spanish_reading: ‘y engendrarán hijos’ sigue la revisión textual que corrige la lectura errónea previa.
  alternative_spanish_readings:
  - ‘y tendrán hijos’
  - ‘y procrearán hijos’
  rationale: La nota de revisión indica que el final del verso debe leerse como engendrar hijos. La traducción lo refleja de forma directa y sobria.
  doctrine_reference: Dar prioridad a la corrección textual auditada frente a una lectura anterior equivocada.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail, que corrige un error importante en la parte final: el texto no dice ‘separados de ellas’, sino que concluye con ‘engendrarán hijos’. También se adoptó la lectura revisada de አውሰቡ como ‘tomarán esposas’ y no como separación. La traducción española evita reproducir la lectura errónea anterior y conserva la ambigüedad prudente donde el ge’ez es amplio.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando el texto fuente lo exige; aquí no aparece.
  - Se prefirió ‘pecado’/‘pecar’ por consistencia con el campo moral del pasaje.
  - Se mantuvo ‘ordenanza’ para el valor normativo del término, en lugar de ‘ley’ o ‘regla’.
  - No se introdujo ‘Cristo’ ni terminología cristológica ajena al pasaje.
  - ‘Mujeres’ se mantuvo como traducción simple de አንስት; ‘esposas’ solo aparece donde la revisión textual lo justifica por አውሰቡ.
