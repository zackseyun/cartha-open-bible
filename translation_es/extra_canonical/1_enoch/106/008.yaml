translation:
  language: es
  text: 'Y cuando Matusalén oyó las palabras de su hijo[a], vino a mí a los confines de la tierra, porque había oído que yo estaba allí. Y clamó, y oí su voz, y vine a él y le dije: «Mira, aquí estoy, mi hijo. ¿Por qué has venido a mí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La última cláusula es extraña en el etiópico si se vierte literalmente («porque/para que has venido a mí»). En contexto, se entiende mejor como una pregunta de propósito: «¿Por qué has venido a mí?»'
    reason: textual_variant
lexical_decisions:
- source_word: ሰምዐ
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico de percepción auditiva se expresa naturalmente en español con 'oyó'; conserva la secuencia narrativa sin añadir matices de atención no presentes en el texto.
- source_word: ነገረ ወልዱ
  english_pob_choice: the words of his son
  chosen_spanish: las palabras de su hijo
  alternatives_spanish:
  - el mensaje de su hijo
  - lo que dijo su hijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Palabras'' reproduce el sentido concreto de ነገረ sin abstraerlo demasiado en ''mensaje''. En español, ''las palabras de su hijo'' es idiomático y transparente.'
- source_word: ውስተ አጽናፈ ምድር
  english_pob_choice: at the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - a los extremos de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Confines de la tierra'' preserva la fuerza apocalíptico-geográfica de la expresión y suena natural en español bíblico sin diluirla en una mera distancia geográfica.'
- source_word: እስመ ሰምዐ ከመ ህየ ሀለውኩ
  english_pob_choice: because he had heard that I was there
  chosen_spanish: porque había oído que yo estaba allí
  alternatives_spanish:
  - pues había oído que yo estaba allí
  - porque había sabido que yo estaba allí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la explicación causal del viaje y el valor locativo de ህየ como 'allí'. 'Había oído' conserva el carácter auditivo y narrativo del original.
- source_word: ጸርኀ
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - llamó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Clamó'' conserva el registro elevado y la intensidad del llamado, evitando un coloquialismo excesivo como ''gritó''.'
- source_word: ቃሎ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  - su llamado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Después de 'clamó' y 'oí', 'voz' es la mejor equivalencia contextual en español y mantiene la cadena auditiva del relato.
- source_word: ናሁ ሀለውኩ
  english_pob_choice: Behold, I am here
  chosen_spanish: Mira, aquí estoy
  alternatives_spanish:
  - He aquí, aquí estoy
  - Mira, estoy aquí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Mira, aquí estoy'' preserva la función de presentación solemne con un español natural. Se evita ''he aquí'' por resultar más arcaico sin aportar mayor claridad.'
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En vocativo, 'hijo mío' suena más directo y afectivo en español que 'mi hijo', y conserva la relación filial explícita del texto.
- source_word: እስመ መጻእከ ኀቤየ
  english_pob_choice: Why have you come to me?
  chosen_spanish: ¿Por qué has venido a mí?
  alternatives_spanish:
  - ¿Para qué has venido a mí?
  - ¿Por qué viniste a mí?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La clausula etiópica es sintácticamente difícil si se traduce literalmente con 'porque'. En contexto, funciona como pregunta de propósito; '¿Por qué has venido a mí?' preserva esa lectura sin forzar el castellano.
theological_decisions:
- issue: Descripción espacial apocalíptica
  english_pob_reading: at the ends of the earth
  chosen_spanish_reading: hasta los confines de la tierra
  alternative_spanish_readings:
  - hasta los extremos de la tierra
  - en una región remota
  rationale: Se conserva la imagen apocalíptica y de frontera cósmica sin suavizarla en una distancia genérica. La frase no se interpreta alegóricamente ni se normaliza.
  doctrine_reference: Preservar imaginería apocalíptica y geográfica del texto.
translation_notes:
  revision_awareness: El borrador sigue el pasaje etiópico recuperado y el juicio auditado del POB inglés. Se mantiene la secuencia narrativa, la ubicación apocalíptica y la cláusula final en su sentido contextual de pregunta de propósito, sin depender de una calca del inglés.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponda; en este versículo no aparece el nombre divino.
  - Se eligieron formas naturales del español bíblico moderno ('oyó', 'clamó', 'confines de la tierra') para conservar registro solemne sin arcaísmo innecesario.
  - No se introdujeron equivalentes doctrinales adicionales; el verso narra un encuentro y una pregunta directa.
