base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/106/008.yaml
  text: And when Methuselah heard the words of his son[a], he came to me at the ends of the earth, because he had heard that I was there. And he cried out, and I heard his voice, and I came to him and said to him, “Behold, I am here, my son. Why have you come to me?”
  footnotes:
  - marker: a
    text: 'The final clause is textually awkward in Ethiopic if translated literally (''for/because you came to me''). In context it is best understood as a question of purpose: ''Why have you come to me?'''
