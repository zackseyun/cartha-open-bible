translation:
  language: es
  text: Y se levantó en las manos de la partera[a], y abrió su boca y bendijo al Señor del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión de base significa literalmente algo como ‘la mujer que da a luz/que atiende el parto’; aquí se entiende naturalmente como la partera que recibe al niño.
    reason: lexical_alternative
lexical_decisions:
- source_word: ተንሥአ
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa elevarse o ponerse en pie. En español, 'se levantó' comunica bien la acción súbita y sorprendente del recién nacido sin sonar demasiado rígido.
- source_word: ውስተ እዴሃ
  english_pob_choice: in the hands of
  chosen_spanish: en las manos de
  alternatives_spanish:
  - dentro de las manos de
  - entre las manos de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez es literal. 'En las manos de' conserva la imagen física del pasaje y sigue de cerca la construcción original con naturalidad en español.
- source_word: መውላዲት
  english_pob_choice: midwife
  chosen_spanish: partera
  alternatives_spanish:
  - comadrona
  - asistente del parto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto describe a la mujer que atiende al recién nacido, no a la madre. 'Partera' es el equivalente natural y preciso en español bíblico y moderno.
- source_word: ፈትሐ አፉሁ
  english_pob_choice: opened his mouth
  chosen_spanish: abrió su boca
  alternatives_spanish:
  - abrió la boca
  - empezó a hablar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula se preserva de manera literal porque la maravilla del relato está en que el niño abre su boca inmediatamente. 'Abrió la boca' también sería posible, pero 'abrió su boca' mantiene mejor el paralelismo con el texto de base.
- source_word: ባረኮ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - alabó
  - pronunció bendición sobre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el verbo introduce una bendición dirigida a Dios. 'Bendijo' conserva el registro bíblico y la dirección reverente del acto verbal, mejor que un simple 'alabó'.
- source_word: እግዚአ ሰማይ
  english_pob_choice: the Lord of heaven
  chosen_spanish: el Señor del cielo
  alternatives_spanish:
  - el Señor de los cielos
  - el Dueño del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión divina se traduce como título soberano. En español, 'Señor del cielo' es claro, reverente y fiel al genitivo del original; 'cielo' en singular mantiene el estilo idiomático del audit trail inglés.
theological_decisions:
- issue: Título divino soberano
  english_pob_reading: the Lord of heaven
  chosen_spanish_reading: el Señor del cielo
  alternative_spanish_readings:
  - el Señor de los cielos
  - el Dueño del cielo
  rationale: Se mantiene el valor de título divino sin sustituirlo por una formulación más interpretativa. 'Señor' reproduce la soberanía reverencial que el texto atribuye a Dios.
  doctrine_reference: 'Translation philosophy: translate titles; preserve divine sovereignty language.'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el sentido confirmado por el auditable inglés POB y el ge''ez: un nacimiento milagroso, la acción física de levantarse, la apertura de la boca y la bendición dirigida al Dios del cielo. No se detectan revisiones textuales que alteren el contenido de este versículo.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' en mayúsculas como convención de ocultamiento; se traduce el título divino como 'Señor' conforme a la política del proyecto.
  - Se usa 'partera' por claridad contextual; la nota conserva la alternativa semántica del ge'ez.
  - '''Bendijo'' mantiene el registro bíblico sin convertir el acto en una mera alabanza.'
