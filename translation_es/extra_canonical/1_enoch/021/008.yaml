translation:
  language: es
  text: 'Y en aquel tiempo dije: «¡Cuán[a] terrible es este lugar, y penoso de contemplar!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Qué terrible es este lugar, y penoso de contemplar!»; la partícula ge''ez se ha entendido aquí como exclamación («cómo/cuán»), no como el sustantivo «boca».'
    reason: alternative_reading
lexical_decisions:
- source_word: ውእተ ጊዜ
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal es narrativa y elevada; «en aquel tiempo» conserva el enlace discursivo y el registro apocalíptico mejor que un simple «entonces».
- source_word: እቤ
  english_pob_choice: said / spoke, saying
  chosen_spanish: dije
  alternatives_spanish:
  - hablé
  - pronuncié
  - dije, diciendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, la fórmula directa «dije» transmite con naturalidad la introducción de la cita sin recargar el estilo; el matiz formular se preserva por el contexto inmediato.
- source_word: አፎ
  english_pob_choice: How!
  chosen_spanish: ¡Cuán!
  alternatives_spanish:
  - ¡Qué!
  - ¡Cómo de!
  lexicon: Revisión adjudicada del texto ge'ez; paralelo semítico de exclamación
  rationale: El auditor corrigió el valor de አፎ como partícula exclamativa equivalente a «how», no como sustantivo. En español, «¡Cuán!» preserva el tono solemne y exclamativo del original.
- source_word: ግሩም
  english_pob_choice: terrible
  chosen_spanish: terrible
  alternatives_spanish:
  - temible
  - espantoso
  - dreadful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de visión de juicio, «terrible» comunica el carácter sobrecogedor y no positivo de la escena sin modernizarlo indebidamente.
- source_word: ዝንቱ መካን
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este sitio
  - este lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lugar» es natural en español y conserva la referencia topográfica de la visión.
- source_word: ወሕሙም
  english_pob_choice: grievous
  chosen_spanish: penoso
  alternatives_spanish:
  - doloroso
  - aflictivo
  - gravoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Penoso» expresa bien la idea de aflicción o dolor que acompaña a la visión y funciona con «de contemplar» sin perder el tono elevado.
- source_word: ለነጽሮ
  english_pob_choice: to behold
  chosen_spanish: de contemplar
  alternatives_spanish:
  - de ver
  - de mirar
  - de observar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Contemplar» conserva el registro solemne del texto visionario mejor que el más ordinario «ver».
theological_decisions:
- issue: Conservar el tono exclamativo de la visión sin suavizarlo
  english_pob_reading: How terrible this place is, and grievous to behold
  chosen_spanish_reading: ¡Cuán terrible es este lugar, y penoso de contemplar!
  alternative_spanish_readings:
  - ¡Qué terrible es este lugar, y penoso de contemplar!
  - Terrible es este lugar, y penoso de contemplar
  rationale: La frase no plantea una cuestión doctrinal, pero sí exige preservar la fuerza afectiva de la visión. «¡Cuán!» mantiene el carácter de exclamación solemne que el ajuste del audit trail identifica.
  doctrine_reference: 'Book context: preserve apocalyptic imagery and judgment tone'
- issue: Traducción de la partícula ge'ez አፎ tras la revisión textual
  english_pob_reading: How terrible this place is
  chosen_spanish_reading: ¡Cuán terrible es este lugar!
  alternative_spanish_readings:
  - ¡Qué terrible es este lugar!
  - ¡Cómo de terrible es este lugar!
  rationale: La revisión confirma que el segmento no significa «mi boca», sino una exclamación. En español, la opción más fiel y digna para un registro bíblico es «¡Cuán!»
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se incorporó la corrección crítica del audit trail: አፎ no es «mi boca», sino una partícula exclamativa equivalente a «how/cuán». Por eso la línea española evita la lectura errónea y conserva la estructura de discurso directo con una exclamación solemne. También se mantuvo la valoración negativa de ግሩም como «terrible» y se eligió un equivalente natural para ወሕሙም/ለነጽሮ.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando aparezca el nombre divino; no aplica en este verso.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Contemplar» se usa para conservar el tono visionario del original.
