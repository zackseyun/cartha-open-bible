translation:
  language: es
  text: 'Y allí vi una cosa temible: no vi ni los cielos de arriba ni la tierra firmemente establecida[b], sino un lugar caótico[a] y terrible[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sin orden’ o ‘no dispuesto’. La expresión ge'ez probablemente niega la preparación o la disposición adecuada.
    reason: lexical_alternative
  - marker: b
    text: La mención de los cielos y la tierra contrapone este lugar con el cosmos normalmente ordenado, intensificando el tono de temor de la visión.
    reason: cultural_note
  - marker: c
    text: O ‘sin orden’.
    reason: previous_rendering
lexical_decisions:
- source_word: ግብረ
  english_pob_choice: thing
  chosen_spanish: cosa
  alternatives_spanish:
  - obra
  - hecho
  - objeto
  lexicon: Dillmann Lexicon
  rationale: El término ge'ez puede abarcar algo visto como realidad formada o producida. ‘Cosa’ conserva la neutralidad del inglés POB ‘thing’ y evita precisar indebidamente si se trata de una obra, un hecho o un objeto.
- source_word: ግሩመ
  english_pob_choice: fearful
  chosen_spanish: temible
  alternatives_spanish:
  - espantosa
  - terrible
  - dreadful
  lexicon: Dillmann Lexicon
  rationale: ‘Temible’ reproduce el matiz de algo que inspira miedo o sobrecogimiento, manteniendo el registro elevado sin reducirlo a mera admiración.
- source_word: አሰማየ
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos celestiales
  lexicon: Dillmann Lexicon
  rationale: En español, el plural ‘los cielos’ refleja mejor el sentido cósmico del apocalipsis que ‘el cielo’, que puede sonar más cotidiano o singular.
- source_word: ላዕለ
  english_pob_choice: above
  chosen_spanish: de arriba
  alternatives_spanish:
  - arriba
  - en lo alto
  lexicon: Dillmann Lexicon
  rationale: La expresión preposicional ‘de arriba’ da naturalidad en español y conserva la imagen espacial vertical del texto.
- source_word: አምድረ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: Dillmann Lexicon
  rationale: ‘La tierra’ mantiene el paralelismo cósmico con ‘los cielos’ y evita una lectura meramente local de ‘suelo’ o ‘región’.
- source_word: ሱርርተ
  english_pob_choice: firmly founded
  chosen_spanish: firmemente establecida
  alternatives_spanish:
  - firme
  - fundada
  - establecida
  lexicon: Dillmann Lexicon
  rationale: La frase comunica que la tierra está fijada o asentada de manera estable. ‘Firmemente establecida’ conserva la idea de orden cósmico y suena natural en español.
- source_word: መካነ
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - región
  lexicon: Dillmann Lexicon
  rationale: ‘Lugar’ es el equivalente más directo y sobrio para la referencia locativa de la visión.
- source_word: ዘአኮ ድልወ
  english_pob_choice: chaotic
  chosen_spanish: caótico
  alternatives_spanish:
  - sin orden
  - no dispuesto
  - desordenado
  lexicon: Dillmann Lexicon
  rationale: El inglés POB pasó por varias revisiones para captar la falta de orden o preparación. ‘Caótico’ resume ese contraste con el cosmos ordenado de manera idiomática en español, mientras las alternativas preservan la posibilidad más literal de ‘sin orden’ o ‘no dispuesto’.
- source_word: ግሩምም
  english_pob_choice: terrible
  chosen_spanish: terrible
  alternatives_spanish:
  - espantoso
  - temible
  - dreadful
  lexicon: Dillmann Lexicon
  rationale: La repetición del campo semántico del temor se conserva con ‘terrible’, que en español mantiene fuerza descriptiva sin requerir una paráfrasis.
theological_decisions:
- issue: Negación del cosmos ordenado en la visión
  english_pob_reading: The verse denies the presence of the ordered cosmos ('neither the heavens above nor the firmly founded earth') and contrasts it with a disordered, terrifying place.
  chosen_spanish_reading: El verso niega la presencia del cosmos ordenado (‘ni los cielos de arriba ni la tierra firmemente establecida’) y lo contrasta con un lugar caótico y terrible.
  alternative_spanish_readings:
  - El vidente simplemente no percibe los cielos y la tierra por oscuridad o falta de visibilidad.
  - El pasaje describe un lugar más allá de la creación ordinaria sin negar explícitamente el orden cósmico.
  rationale: La pareja ‘cielos’/‘tierra’ evoca claramente el orden normal de la creación, y la frase siguiente sobre un lugar ‘caótico’ sostiene la lectura de una visión de desorden radical. La redacción española conserva esa tensión apocalíptica sin definir más de lo que el texto permite.
  doctrine_reference: Conservar imaginería apocalíptica; no convertir el lenguaje cósmico en prosa genérica.
translation_notes:
  revision_awareness: 'La redacción española sigue la versión inglesa más reciente del expediente: ‘thing’ en lugar de ‘work’ y ‘chaotic’ en lugar de ‘unformed’. También toma en cuenta que el adjetivo ge''ez subyacente sugiere falta de disposición o preparación, por lo que ‘caótico’ se entiende aquí como contraste con el orden cósmico, no como mero desorden emocional.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa ‘los cielos’ en plural para preservar el sentido cosmológico apocalíptico.
  - Se conserva la duplicación del campo semántico del temor con ‘temible’ y ‘terrible’ sin forzar sinonimia exacta.
  - No se introduce ‘Mesías’, ‘Cristo’ ni otras terminologías ajenas al versículo.
