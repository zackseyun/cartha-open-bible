translation:
  language: es
  text: 'Y en aquel tiempo Uriel —uno de los santos ángeles, que estaba conmigo— me respondió y me dijo: «Enoc[a],»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El versículo termina con el vocativo directo «Enoc», que introduce el discurso que continúa en el versículo siguiente.
    reason: cross_reference
lexical_decisions:
- source_word: ውእተ ጊዜ
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el valor temporal narrativo elevado del giro ge’ez y suena natural en español bíblico sin volverlo plano.
- source_word: አውሥአኒ
  english_pob_choice: answered me
  chosen_spanish: me respondió
  alternatives_spanish:
  - me contestó
  - me respondió a mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'responder' expresa mejor la fórmula narrativa de contestación que 'answered me', y mantiene el flujo discursivo aunque la pregunta previa no aparezca en este versículo.
- source_word: ኡርኤል
  english_pob_choice: Uriel
  chosen_spanish: Uriel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Nombre propio transliterado, como en el contexto inglés y conforme al proyecto.
- source_word: ፩እምቅዱሳን መላእክት
  english_pob_choice: one of the holy angels
  chosen_spanish: uno de los santos ángeles
  alternatives_spanish:
  - uno de los ángeles santos
  - uno de los ángeles sagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Santos ángeles'' reproduce de forma directa la identificación de Uriel como miembro de ese grupo celestial, manteniendo la formulación austera del texto sin introducir una categoría doctrinal ajena.'
- source_word: እንዘ ምስሌየ ሀሎ
  english_pob_choice: who was with me
  chosen_spanish: que estaba conmigo
  alternatives_spanish:
  - quien estaba conmigo
  - estando conmigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relativa ge’ez se vierte con una cláusula natural en español. 'Estaba conmigo' comunica la presencia conjunta sin calcar la sintaxis original.
- source_word: ወይቤለኒ
  english_pob_choice: and said to me
  chosen_spanish: y me dijo
  alternatives_spanish:
  - y me habló
  - y dijo a mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula introductoria de discurso; 'me dijo' es la opción más idiomática y fiel en español.
- source_word: ሄኖክ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se usa la forma española usual del nombre propio en texto bíblico.
theological_decisions:
- issue: Descripción de Uriel como parte de una clase de seres celestiales
  english_pob_reading: one of the holy angels
  chosen_spanish_reading: uno de los santos ángeles
  alternative_spanish_readings:
  - uno de los ángeles santos
  - uno de los ángeles sagrados
  rationale: La versión española conserva la identificación de Uriel sin aclararla ni resolverla más allá del texto. 'Santos ángeles' mantiene la tensión del original y su carácter enociano, sin introducir equivalencias confesionales posteriores.
  doctrine_reference: Mantener la categoría local del texto y no armonizarla con angelologías posteriores.
translation_notes:
  revision_awareness: La base inglesa ya fija la lectura de cierre como vocativo directo y no como frase completa; la traducción española conserva ese final abierto con la misma función discursiva.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el nombre divino; aquí no ocurre.
  - Se usa 'santos ángeles' para reflejar la clasificación celeste del texto sin sustituirla por terminología eclesial posterior.
  - El final en vocativo se preserva con comillas y coma, dejando claro que la cita continúa.
