translation:
  language: es
  text: Y allí vi siete estrellas del cielo[a], atadas[b] juntas en él, como grandes montañas, y ardiendo en fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen de estrellas atadas probablemente tiene fuerza simbólica para seres celestiales bajo juicio, pero el texto dice 'estrellas'.
    reason: cross_reference
  - marker: b
    text: '''Juntas'' refleja el valor adverbial de ኅቡረ (''together'') y la revisión reciente que evita tratarlo como una acción aparte.'
    reason: textual_variant
lexical_decisions:
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - miré
  lexicon: Dillmann
  rationale: La forma visionaria se conserva con un verbo simple y natural en español. 'Vi' comunica el reporte profético sin añadir solemnidad innecesaria.
- source_word: ሰብዐተ ከዋክብተ ሰማይ
  english_pob_choice: seven stars of heaven
  chosen_spanish: siete estrellas del cielo
  alternatives_spanish:
  - siete estrellas celestiales
  - siete estrellas del firmamento
  lexicon: Dillmann
  rationale: Mantiene el término astral del texto ge'ez sin identificar explícitamente a las estrellas como ángeles. 'Del cielo' conserva la referencia cósmica de manera idiomática.
- source_word: እሱራነ
  english_pob_choice: bound
  chosen_spanish: atadas
  alternatives_spanish:
  - ligadas
  - encadenadas
  lexicon: Dillmann
  rationale: '''Atadas'' reproduce la idea de restricción o sujeción de forma clara en español. ''Encadenadas'' sería más específica de lo que el ge''ez exige.'
- source_word: በላዕሌሁ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - dentro de él
  - en eso
  lexicon: Dillmann
  rationale: 'Sigue la revisión del audit trail: la preposición expresa ubicación interna en el lugar mencionado, no una posición sobre él.'
- source_word: ኅቡረ
  english_pob_choice: together
  chosen_spanish: juntas
  alternatives_spanish:
  - juntamente
  - reunidas
  lexicon: Dillmann
  rationale: El adverbio modifica 'atadas' y no introduce una acción separada. 'Juntas' conserva la unión de las estrellas de forma natural en español.
- source_word: ከመ አድባር ዐበይት
  english_pob_choice: like great mountains
  chosen_spanish: como grandes montañas
  alternatives_spanish:
  - como montañas enormes
  - como grandes cerros
  lexicon: Dillmann
  rationale: Conserva la comparación sorprendente del original sin suavizarla. 'Montañas' es la correspondencia más directa y transparente.
- source_word: ወበእሳት እንዘ ይነዱ
  english_pob_choice: and burning with fire
  chosen_spanish: y ardiendo con fuego
  alternatives_spanish:
  - y brillando con fuego
  - y consumiéndose en fuego
  lexicon: Dillmann
  rationale: '''Ardiendo con fuego'' mantiene la imagen participial y el énfasis elemental del texto. ''Con fuego'' conserva la redundancia semítica sin eliminarla.'
theological_decisions:
- issue: Si las siete estrellas deben identificarse explícitamente como seres angelicales bajo juicio
  english_pob_reading: Retain 'seven stars of heaven' in the main text without explicit identification
  chosen_spanish_reading: Mantener 'siete estrellas del cielo' sin identificación explícita
  alternative_spanish_readings:
  - siete ángeles del cielo
  - siete seres celestiales
  rationale: El texto ge'ez habla de estrellas, y el simbolismo angelical pertenece al contexto interpretativo, no a la superficie verbal de este versículo. La traducción preserva esa tensión sin resolverla de antemano.
  doctrine_reference: Primacía del texto original y preservación de la tensión simbólica
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que corrige 'above it, gathered together' a 'bound together in it', entendiendo በላዕሌሁ como 'en él' y ኅቡረ como modificador adverbial de 'atadas'. También se conservaron las comas para hacer clara la estructura participial.
  spanish_consistency_notes:
  - Se mantuvo 'cielo' para ሰማይ por ser la opción más natural y consistente en español, sin perder la referencia cósmica.
  - Se evitó 'Cristo' u otro vocabulario doctrinal no presente en el versículo.
  - '''Atadas'' se usó de manera consistente con el valor amplio de restricción del original, sin concretar el tipo de atadura.'
