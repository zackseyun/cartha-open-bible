translation:
  language: es
  text: 'En aquel tiempo[c] dije[a]: «¿Por qué pecado han sido atados[b], y por qué razón han sido arrojados aquí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pregunté», ya que la pregunta directa que sigue puede implicar una indagación más que un simple acto de hablar.
    reason: lexical_alternative
  - marker: b
    text: O «ligados»; el verbo también puede sugerir una sujeción o prisión, pero «atados» conserva mejor la imagen concreta del original.
    reason: lexical_alternative
  - marker: c
    text: 'Traducción anterior: «Y en aquel tiempo». El ge''ez no comienza con la conjunción «y».'
    reason: previous_rendering
lexical_decisions:
- source_word: ውእተ ጊዜ
  english_pob_choice: at that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - Entonces
  - En ese tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez es una fórmula temporal narrativa solemne. «En aquel tiempo» conserva el registro elevado y la deíxis distante del original mejor que un simple «entonces».
- source_word: እቤ
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - pregunté
  - hablé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma introduce el discurso directo de Enoc. En español, «dije» suena natural y fiel; el valor interrogativo de la frase siguiente ya hace visible la intención de preguntar sin necesidad de cambiar el verbo principal.
- source_word: በእንተ አይ ኃጢአት
  english_pob_choice: for what sin
  chosen_spanish: por qué pecado
  alternatives_spanish:
  - a causa de qué pecado
  - con respecto a qué pecado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción pregunta por la causa o motivo. «Por qué pecado» expresa de modo directo la fuerza causal e interrogativa del ge'ez sin perder el matiz de motivo judicial.
- source_word: ተአስሩ
  english_pob_choice: have they been bound
  chosen_spanish: han sido atados
  alternatives_spanish:
  - han sido ligados
  - han sido encarcelados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo apunta a la imagen concreta de ser sujetados o amarrados. «Atados» conserva esa concreción apocalíptica mejor que «encarcelados», que sería más interpretativo.
- source_word: ወበእንተ ምንት
  english_pob_choice: and for what reason
  chosen_spanish: y por qué razón
  alternatives_spanish:
  - y por qué
  - y por qué causa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición interrogativa se mantiene mejor con «y por qué razón», que reproduce la paralelía del original de manera clara y natural en español.
- source_word: ዝየ
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - acá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio deíctico señala el lugar visto por Enoc. «Aquí» es la opción más natural y mantiene la inmediatez de la visión.
- source_word: ተገደፉ
  english_pob_choice: have they been cast here
  chosen_spanish: han sido arrojados aquí
  alternatives_spanish:
  - han sido echados aquí
  - han sido dejados aquí
  - han sido abandonados aquí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite el matiz de ser arrojados, echados o dejados. En este contexto de juicio, «arrojados aquí» preserva la dureza de la deposición punitiva sin convertirla en una mera idea abstracta de abandono.
theological_decisions:
- issue: Imagen de castigo visible en el lugar de juicio
  english_pob_reading: The verse speaks concretely of punitive binding and casting into a place of confinement, not merely abstract guilt or exclusion.
  chosen_spanish_reading: 'El versículo presenta un castigo concreto y visible: ser atados y arrojados a un lugar determinado, no solo una culpa abstracta.'
  alternative_spanish_readings:
  - han sido encarcelados por el pecado
  - han sido dejados allí por su culpa
  rationale: La traducción española conserva la imaginería apocalíptica de confinamiento y deposición. No suaviza el pasaje hacia un lenguaje moral general, porque el texto describe una escena de juicio observada por Enoc.
  doctrine_reference: Preservar la imaginería apocalíptica; no diluir fórmulas de juicio en prosa religiosa genérica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final que retiró «And» del inglés por la asindetonía del ge'ez inicial. Por ello, el español comienza directamente con «En aquel tiempo» sin añadir una conjunción. También se preservó la estructura paralela de dos preguntas y la tensión entre «atados» y «arrojados aquí».
  spanish_consistency_notes:
  - Se mantuvo el registro solemne y visionario con «En aquel tiempo».
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; no hay teología nominal en este verso.
  - «Atados» y «arrojados aquí» conservan la dureza judicial del pasaje sin introducir explicaciones ajenas al texto.
  - La puntuación reproduce el discurso directo con una sola apertura y cierre de comillas, de estilo publicable en español.
