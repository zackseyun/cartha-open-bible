translation:
  language: es
  text: Y seguí adelante hasta llegar a un lugar donde nada había sido hecho[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «hasta llegar a un lugar donde nada estaba hecho» o «donde nada existía». El ge''ez es breve y subraya la ausencia total de cosas formadas.'
    reason: alternative_reading
lexical_decisions:
- source_word: አድኩ
  english_pob_choice: I went on
  chosen_spanish: seguí adelante
  alternatives_spanish:
  - avancé
  - proseguí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la continuación del movimiento visionario con naturalidad en español, manteniendo el progreso narrativo sin volverlo artificial.
- source_word: እስከነ
  english_pob_choice: until I came
  chosen_spanish: hasta llegar
  alternatives_spanish:
  - hasta que llegué
  - hasta que vine
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia indica llegada a un destino; «hasta llegar» conserva ese movimiento y evita una redundancia pesada en español.
- source_word: ኀበ
  english_pob_choice: to a place
  chosen_spanish: a un lugar
  alternatives_spanish:
  - a un sitio
  - a un lugar determinado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición señala dirección hacia una localización; «lugar» comunica bien la idea sin añadir precisión no presente en el ge'ez.
- source_word: አልቦቱ
  english_pob_choice: where nothing is
  chosen_spanish: donde nada está
  alternatives_spanish:
  - donde nada existe
  - donde no hay nada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El negativo existencial se vierte con una construcción natural en español. «Nada está» conserva la concisión y la severidad del original.
- source_word: ዘይትገበር
  english_pob_choice: made
  chosen_spanish: hecho
  alternatives_spanish:
  - fabricado
  - formado
  - creado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hecho» mantiene el sentido amplio de algo producido o formado, sin cerrar prematuramente la ambigüedad entre hacer, formar o crear.
theological_decisions:
- issue: Carácter del lugar visionario
  english_pob_reading: a place where nothing is made
  chosen_spanish_reading: un lugar donde nada está hecho
  alternative_spanish_readings:
  - un lugar donde nada existe
  - un lugar donde nada ha sido hecho
  - un lugar de ausencia total de cosas formadas
  rationale: El ge'ez enfatiza la carencia de cosas formadas/hechas, no una definición metafísica explícita de la nada absoluta. La traducción conserva esa tensión apocalíptica sin resolverla.
  doctrine_reference: Preservar la tensión lexical y teológica del texto fuente.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y conserva la ambigüedad principal del ge''ez: no define si el lugar es de inexistencia absoluta o de ausencia de cosas formadas, sino que deja ambas posibilidades abiertas en una formulación natural en español.'
  spanish_consistency_notes:
  - Se mantiene «lugar» para la localización indeterminada, coherente con la decisión inglesa de suplir el destino sin sobreespecificarlo.
  - Se evita «SEÑOR» y otros términos de traducción litúrgica porque este versículo no contiene referencias al nombre divino.
  - Se usa un español moderno y sobrio, apto para lectura pública, sin depender de calcos rígidos.
