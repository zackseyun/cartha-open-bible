    rationale: Empieza con una comilla simple sobrante antes de 'También puede entenderse', probablemente por arrastre de serialización YAML. Conviene normalizarla para legibilidad.
  revised_spanish_text: Y seguí adelante hasta llegar a un lugar donde nada había sido hecho[a].
