translation:
  language: es
  text: 'Y Uriel, uno de los santos ángeles que estaba conmigo y me guiaba, me dijo: «Enoc, ¿acerca de quién preguntas[b], y acerca de quién inquieres y buscas[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo final es semánticamente incierto; puede sugerir buscar con afán, indagar con intensidad o una curiosidad apremiante. Se traduce de modo amplio como «buscas».
    reason: lexical_alternative
  - marker: b
    text: El original usa dos verbos casi sinónimos seguidos; el español conserva esa duplicación retórica con «preguntas» e «inquieres».
    reason: alternative_reading
lexical_decisions:
- source_word: ኡርኤል
  english_pob_choice: Uriel
  chosen_spanish: Uriel
  alternatives_spanish:
  - Ouriel
  lexicon: Convención onomástica ge'ez
  rationale: Se translitera el nombre propio sin traducirlo, siguiendo la práctica establecida del proyecto.
- source_word: ፩እምቅዱሳን መላእክት
  english_pob_choice: one of the holy angels
  chosen_spanish: uno de los santos ángeles
  alternatives_spanish:
  - uno de los ángeles santos
  - uno entre los santos ángeles
  - uno de los ángeles sagrados
  lexicon: Dillmann, Leslau
  rationale: ‘Santos’ conserva el valor categorial del grupo celestial y suena natural en español bíblico; ‘sagrados’ sería posible, pero menos preciso para este registro.
- source_word: ዘምስሌየ
  english_pob_choice: who was with me
  chosen_spanish: que estaba conmigo
  alternatives_spanish:
  - que estaba a mi lado
  - que me acompañaba
  lexicon: Leslau
  rationale: La relación relativa indica presencia junto a Enoc; ‘estaba conmigo’ es natural y fiel.
- source_word: ዘይመርሐኒ
  english_pob_choice: was guiding me
  chosen_spanish: me guiaba
  alternatives_spanish:
  - me conducía
  - me llevaba
  lexicon: Dillmann, Leslau
  rationale: El verbo expresa conducción continua en contexto visionario; el imperfecto ‘me guiaba’ reproduce bien esa acción en curso.
- source_word: በእንተ መኑ ትስእል
  english_pob_choice: about whom are you asking
  chosen_spanish: ¿acerca de quién preguntas?
  alternatives_spanish:
  - ¿de quién preguntas?
  - ¿sobre quién preguntas?
  lexicon: Leslau
  rationale: ‘Acerca de quién’ conserva el valor temático de በእንተ y mantiene un español claro y solemne.
- source_word: ወበእንተ መኑ ትጠይቅ
  english_pob_choice: and about whom are you inquiring
  chosen_spanish: y acerca de quién inquieres
  alternatives_spanish:
  - y acerca de quién preguntas
  - y de quién indagas
  lexicon: Dillmann, Leslau
  rationale: Se mantiene la repetición deliberada con un verbo distinto para reflejar la duplicación del original sin sonar torpe.
- source_word: ወትጽህቅ
  english_pob_choice: and searching
  chosen_spanish: y buscas
  alternatives_spanish:
  - y procuras saber
  - y investigas
  lexicon: Dillmann, Leslau
  rationale: La última forma es ambigua y, según el audít trail, apunta a una curiosidad intensa o a una búsqueda/investigación. ‘Buscas’ conserva esa amplitud sin añadir una emoción no segura.
theological_decisions:
- issue: Categoría de los ángeles
  english_pob_reading: holy angels
  chosen_spanish_reading: santos ángeles
  alternative_spanish_readings:
  - ángeles sagrados
  - ángeles santos
  rationale: En el contexto enóquico, la santidad es una categoría angelológica importante; ‘santos ángeles’ preserva ese peso sin difuminarlo.
  doctrine_reference: Consistencia terminológica y preservación del registro angelológico del texto.
- issue: Verbo final ge'ez ጸህቀ
  english_pob_reading: searching
  chosen_spanish_reading: buscas
  alternative_spanish_readings:
  - inquieres con afán
  - buscas con celo
  rationale: La revisión más reciente del audít trail desplaza el énfasis desde ‘mostrar preocupación’ hacia una búsqueda/inquisición intensa. ‘Buscas’ mantiene esa amplitud y evita sobreinterpretar la carga emocional.
  doctrine_reference: Principio de equivalencia óptima con cautela semántica ante verbo textualmentе incierto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audít trail, que sustituyó ‘eager to know’ por ‘searching’ para acercarse más al valor del verbo final sin expansión interpretativa. Por eso el español evita ‘eager’ o ‘ansioso’ y opta por ‘buscas’, con nota de incertidumbre léxica.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de nombres propios mediante transliteración.
  - Se prefirió ‘santos ángeles’ para conservar el registro angelológico del texto.
  - Se respetó la duplicación retórica de las dos preguntas con un verbo distinto en la segunda cláusula.
  - La puntuación española usa comillas angulares y dos puntos para introducir el discurso directo.
