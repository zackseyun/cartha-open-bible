base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/021/007.yaml
  text: 'And from there I went to another place[a], more terrible than this, and I saw a fearful thing: a great fire was there, burning and blazing, and the place had a cleft reaching to the abyss, full of great pillars of fire descending; neither its measure nor its size was I able to see[c][b], and I was not able to look at it.'
  footnotes:
  - marker: a
    text: The clause about the place being split downward is difficult in the Ge'ez. 'Cleft reaching to the abyss' represents a cautious rendering of a fissure or chasm extending to extreme depth.
    reason: textual_variant
  - marker: b
    text: Or 'I was not able to discern its measure or its magnitude.' The point is Enoch's inability to comprehend the dimensions of what he sees.
    reason: lexical_alternative
  - marker: c
    text: Or 'with great pillars of fire descending'.
    reason: previous_rendering
