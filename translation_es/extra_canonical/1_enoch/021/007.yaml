translation:
  language: es
  text: 'Y de allí fui a otro lugar, más terrible que este, y vi una cosa temible: allí había un gran fuego, ardiendo y resplandeciendo, y el lugar tenía una hendidura[a] que llegaba hasta el abismo, llena de grandes pilares de fuego que descendían[c]; ni su medida ni su tamaño pude ver[b], y no pude mirarlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esta cláusula es difícil en el ge'ez. 'Una hendidura que llegaba hasta el abismo' representa con cautela la idea de una fisura o sima que se extendía hasta una profundidad extrema.
    reason: textual_variant
  - marker: b
    text: 'O: ''no pude discernir su medida ni su magnitud''. El punto es la incapacidad de Enoch para comprender las dimensiones de lo que ve.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''con grandes pilares de fuego que descendían''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወእምህየ
  english_pob_choice: And from there
  chosen_spanish: Y de allí
  alternatives_spanish:
  - Y desde allí
  - Y de ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el movimiento narrativo desde la escena anterior con una fórmula natural en español, sin perder la referencia espacial del original.
- source_word: ሖርኩ ካልአ መካነ
  english_pob_choice: I went to another place
  chosen_spanish: fui a otro lugar
  alternatives_spanish:
  - me trasladé a otro lugar
  - llegué a otro lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fui'' conserva el verbo simple de desplazamiento y evita añadir matices no explicitados por el ge''ez.'
- source_word: እምዝ ዘይገርም
  english_pob_choice: more terrible than this
  chosen_spanish: más terrible que este
  alternatives_spanish:
  - más espantoso que este
  - más temible que este
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Terrible'' transmite el valor de espanto y juicio del contexto apocalíptico; conserva la comparación con la escena anterior.'
- source_word: ወርኢኩ ግብረ ግሩመ
  english_pob_choice: and I saw a fearful thing
  chosen_spanish: vi una cosa temible
  alternatives_spanish:
  - vi una cosa espantosa
  - vi un espectáculo temible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cosa temible'' reproduce bien el carácter ominoso del sustantivo sin forzar un sentido técnico que el original no exige.'
- source_word: እሳት ዐቢይ
  english_pob_choice: a great fire
  chosen_spanish: un gran fuego
  alternatives_spanish:
  - un fuego grande
  - un fuego inmenso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Gran fuego'' preserva la sencillez y la intensidad del original.'
- source_word: ዘይነድድ ወያንበለብል
  english_pob_choice: burning and blazing
  chosen_spanish: ardiendo y resplandeciendo
  alternatives_spanish:
  - ardiendo y flameando
  - encendido y resplandeciendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja verbal se conserva con dos participios naturales en español; 'resplandeciendo' comunica el aspecto vívido del fuego sin rebajar su fuerza.
- source_word: ወመምተርተ ቦቱ መካኑ እስከ ቀላይ ፍጹም
  english_pob_choice: the place had a cleft reaching to the abyss
  chosen_spanish: el lugar tenía una hendidura que llegaba hasta el abismo
  alternatives_spanish:
  - el lugar tenía una grieta que llegaba hasta el abismo
  - el lugar estaba partido hasta el abismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hendidura'' conserva la imagen de abertura/fisura con español claro; ''abismo'' traduce la idea de gran profundidad extrema sin cerrar la referencia cosmológica.'
- source_word: ፍጹም አዕማደ እሳት ዐበይተ ዘይወርዶሙ
  english_pob_choice: full of great pillars of fire descending
  chosen_spanish: llena de grandes pilares de fuego que descendían
  alternatives_spanish:
  - llena de grandes columnas de fuego que descendían
  - llena de enormes pilares de fuego que bajaban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la idea de plenitud con 'llena de', acorde con la revisión del POB en inglés; 'pilares' mantiene la imagen marcada del texto, y 'descendían' refleja el movimiento vertical del original.
- source_word: ወኢእምጣኖ ወኢዕበዮ አክሀልኩ ነጽሮ
  english_pob_choice: neither its measure nor its size was I able to see
  chosen_spanish: ni su medida ni su tamaño pude ver
  alternatives_spanish:
  - no pude discernir ni su medida ni su tamaño
  - ni su extensión ni su magnitud pude ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Medida'' y ''tamaño'' reproducen la duplicación semántica del original con español directo; evita interpretar más de lo que el texto afirma.'
- source_word: ወስእነኩ [ነጽሮ] ዐይኖ
  english_pob_choice: and I was not able to look at it
  chosen_spanish: y no pude mirarlo
  alternatives_spanish:
  - y no fui capaz de mirarlo
  - y no pude contemplarlo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Mirarlo'' expresa la incapacidad visual final de manera natural y fiel, sin intensificarla a una noción devocional ajena al contexto.'
theological_decisions:
- issue: Naturaleza del lugar visionario
  english_pob_reading: Rendered as a terrifying visionary locale of judgment without specifying hell or final punishment in the main text.
  chosen_spanish_reading: Se presenta como un lugar visionario de terror y juicio, sin identificarlo explícitamente como infierno, Seol o castigo final.
  alternative_spanish_readings:
  - infierno
  - Seol
  - prisón cósmica
  - lugar de castigo final
  rationale: El versículo describe fuego, profundidad y dimensiones incomprensibles, pero no nombra el lugar. Mantener la descripción abierta evita sobreinterpretar el texto y preserva la tensión teológica documentada por el POB en inglés.
  doctrine_reference: Preservar la tensión teológica sin armonizarla con categorías doctrinales posteriores.
translation_notes:
  revision_awareness: He tomado en cuenta la revisión final del POB en inglés que cambió 'fearful work' por 'fearful thing' y reforzó la idea de plenitud con 'full of great pillars of fire descending'. Por eso el español evita 'obra' o 'hecho' y usa 'cosa temible', además de 'llena de grandes pilares de fuego que descendían' para reflejar la revisión más reciente y no debilitar la imagen apocalíptica.
  spanish_consistency_notes:
  - Se mantiene 'Dios' y 'Yahvé' como estándares del proyecto cuando corresponda, pero este versículo no los menciona.
  - '''Abismo'' se usa como término de profundidad extrema sin imponer una identificación doctrinal posterior.'
  - El tono es solemne y bíblico, pero evita arcaísmos innecesarios; 'no pude mirarlo' conserva naturalidad sin perder fuerza.
  - '''Pilares de fuego'' se mantiene por fidelidad a la imagen inusual del original, aunque en español ''columnas de fuego'' sea una alternativa igualmente viable.'
