translation:
  language: es
  text: Estos son de entre las estrellas[a] que transgredieron el mandamiento del Señor, y están atados aquí hasta que se cumplan diez mil años[b]—el número de los días de sus pecados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las estrellas». La preposición ge'ez puede indicar origen además de pertenencia a un grupo.
    reason: lexical_alternative
  - marker: b
    text: La expresión «diez mil años» puede señalar un período vasto y determinado de castigo; se mantiene literal desde el ge'ez.
    reason: cultural_note
  - marker: c
    text: La frase final dice literalmente «el número de los días de sus pecados», preservando la imagen de un castigo medido según su transgresión.
    reason: lexical_alternative
lexical_decisions:
- source_word: እሉ ውእቶሙ
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Éstos son
  - Estos son los que son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción demostrativa con cópula se puede verter de forma directa en español con "Estos son"; conserva la deixis y suena natural en registro bíblico contemporáneo.
- source_word: እምነ ከዋክብት
  english_pob_choice: among the stars
  chosen_spanish: entre las estrellas
  alternatives_spanish:
  - de entre las estrellas
  - de las estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez permite relación partitiva o de origen. "Entre las estrellas" mantiene la relación de pertenencia al grupo sin forzar una lectura meramente locativa. La nota [a] preserva la alternativa "de las estrellas".
- source_word: እለ ኃለፉ ትእዛዘ እግዚአብሔር
  english_pob_choice: that transgressed the command of the Lord
  chosen_spanish: que transgredieron el mandamiento del Señor
  alternatives_spanish:
  - que quebrantaron el mandamiento del Señor
  - que pasaron por encima del mandamiento del Señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Transgredieron" conserva la fuerza legal-moral de ኃለፉ en contexto judicial. "Mandamiento" refleja ትእዛዘ con tono normativo claro en español.'
- source_word: ወተአስሩ በዝየ
  english_pob_choice: and they are bound here
  chosen_spanish: y están atados aquí
  alternatives_spanish:
  - y fueron atados aquí
  - y permanecen atados aquí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo expresa su estado de confinamiento. "Están atados" conserva la imagen punitiva más directamente que "encarcelados" y funciona bien en español.
- source_word: እስከ ሶበ ይትፌጸም
  english_pob_choice: until ... are completed
  chosen_spanish: hasta que se cumplan
  alternatives_spanish:
  - hasta que se complete
  - hasta que se consuman
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula señala el término de la detención. "Se cumplan" transmite la idea de cumplimiento/completación con una construcción natural en español.
- source_word: ትእልፊተ ዓም
  english_pob_choice: ten thousand years
  chosen_spanish: diez mil años
  alternatives_spanish:
  - una miríada de años
  - diez mil de años
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Diez mil años" es la forma más transparente y literal en español para el gran período numérico del ge''ez, preservando el valor apocalíptico del intervalo.'
- source_word: ኈልቈ መዋዕለ ኃጢአቶሙ
  english_pob_choice: the number of the days of their sins
  chosen_spanish: el número de los días de sus pecados
  alternatives_spanish:
  - el conteo de los días de sus pecados
  - la cuenta de los días de sus pecados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Número" y "días" conservan la imaginería contable del texto. "Pecados" traduce el plural del sustantivo con naturalidad en español y mantiene la fuerza moral de la frase.'
theological_decisions:
- issue: Identidad de las estrellas
  english_pob_reading: The stars are presented as heavenly beings who violated the Lord's command and are now confined.
  chosen_spanish_reading: Las estrellas se presentan como seres celestiales que transgredieron el mandamiento del Señor y ahora están confinados.
  alternative_spanish_readings:
  - Estrellas literales personificadas en la visión
  - Designación simbólica de los Vigilantes/ángeles
  rationale: En 1 Enoc, las estrellas suelen funcionar como imagen de seres celestiales bajo juicio. La traducción conserva "estrellas" para no aplanar la imaginería visionaria en una glosa explicativa.
  doctrine_reference: Preservar la imaginería apocalíptica; no sustituir el símbolo por una explicación no presente en el texto.
- issue: Fuerza del período temporal
  english_pob_reading: 'A definite punitive period is in view: ''ten thousand years are completed.'''
  chosen_spanish_reading: 'Se conserva un período punitivo definido: ''diez mil años''.'
  alternative_spanish_readings:
  - Un lapso inmenso e indeterminado
  - Una posible corrupción textual para otra duración
  rationale: El testimonio ge'ez da una cifra explícita; la traducción la mantiene sin resolver la tensión sobre si la expresión funciona también idiomáticamente como un período inmenso fijado por decreto.
  doctrine_reference: Conservar la tensión textual y teológica; traducir con llaneza y sin armonizar en exceso.
translation_notes:
  revision_awareness: 'El inglés auditado pasó de una redacción más explícita con ''the ones'' a una forma más natural (''These are among the stars...'') y luego se estabilizó con la puntuación final en coma. La versión española sigue esa línea: mantiene la literalidad clave del ge''ez, evita sobreexplicar quiénes son las estrellas y conserva la cláusula final contable.'
  spanish_consistency_notes:
  - Se usa 'Señor' para እግዚአብሔር en consonancia con el audit trail inglés; no se introduce 'Yahvé' porque el texto fuente inmediato aquí está mediado por el título, no por un marcado explícito del nombre.
  - Se evita 'Cristo' porque no hay lenguaje mesiánico en el verso.
  - '''Estrellas'' se conserva sin convertirlas en ''ángeles'', para respetar la imaginería propia de 1 Enoc.'
