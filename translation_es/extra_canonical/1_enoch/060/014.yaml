translation:
  language: es
  text: Porque para el trueno han sido dados lugares de reposo[a], con paciencia, para el sonido de su voz; y el trueno y el relámpago no están separados, y aunque no son uno[c][d][b], los dos[e] van juntos por el Espíritu y no están separados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lugares de reposo» refleja el plural del ge'ez; también podría entenderse como «moradas de reposo».
    reason: lexical_alternative
  - marker: b
    text: «Espíritu» puede entenderse también como «espíritu», «aliento» o «viento»; el contexto permite más de una lectura.
    reason: lexical_alternative
  - marker: c
    text: La cláusula correspondiente es textualmente difícil en este testimonio; el sentido parece afirmar que trueno y relámpago permanecen distintos, aunque actúan juntos.
    reason: textual_variant
  - marker: d
    text: 'Otra formulación posible sería: «Porque para el trueno se ha dado un lugar de reposo».'
    reason: previous_rendering
  - marker: e
    text: 'El original destaca explícitamente la dualidad: «los dos» o «ambos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La conjunción introduce explicación o fundamento; «Porque» conserva la relación explicativa de manera natural en español.
- source_word: ቦቱ
  english_pob_choice: there has been given / there is for it
  chosen_spanish: han sido dados
  alternatives_spanish:
  - le han sido dados
  - le han sido asignados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez expresa una disposición/otorgamiento para el trueno; en español, la pasiva refleja la asignación sin añadir un sujeto explícito que el texto no da.
- source_word: ለነጐድጓድ
  english_pob_choice: for the thunder
  chosen_spanish: para el trueno
  alternatives_spanish:
  - al trueno
  - al rayo del trueno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El dativo indica destinatario o ámbito de asignación; «para el trueno» reproduce bien la relación.
- source_word: ምዕረፋተ
  english_pob_choice: resting places
  chosen_spanish: reposos
  alternatives_spanish:
  - lugares de reposo
  - moradas de reposo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural debe mantenerse. «Reposos» es menos pesado que «lugares de reposo» y conserva la idea de lugares o estados de descanso sin especificar de más.
- source_word: በትዕግሥት
  english_pob_choice: with patience
  chosen_spanish: con paciencia
  alternatives_spanish:
  - con forbearancia
  - con longanimidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición se mantiene de forma literal y natural en español; el matiz exacto sigue siendo oscuro y no conviene forzarlo.
- source_word: ለቃለ ዚአሁ
  english_pob_choice: for the sound of its voice
  chosen_spanish: para el sonido de su voz
  alternatives_spanish:
  - para su voz
  - para el sonido de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ቃል» puede significar voz, sonido o palabra; en contexto de trueno, «sonido de su voz» preserva la personificación y el eco del original.
- source_word: ተውህበ
  english_pob_choice: has been given
  chosen_spanish: han sido dados
  alternatives_spanish:
  - fueron dados
  - han sido asignados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva expresa provisión o designación ordenada; el plural concuerda con «reposos».
- source_word: ወኢይትሌለዩ
  english_pob_choice: are not separated
  chosen_spanish: no están separados
  alternatives_spanish:
  - no se separan
  - no se apartan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la repetición y la idea de inseparabilidad en una forma clara y idiomática.
- source_word: እነጐድጓድ ወእመብረቅ
  english_pob_choice: the thunder and the lightning
  chosen_spanish: el trueno y el relámpago
  alternatives_spanish:
  - el trueno y la luz del relámpago
  - el trueno y el rayo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «መብረቅ» admite «relámpago» o «rayo»; «relámpago» funciona mejor en español para el fenómeno luminoso en paralelo con el trueno.
- source_word: ወእም፪ኒ
  english_pob_choice: and though not one
  chosen_spanish: y aunque no son uno
  alternatives_spanish:
  - y aunque no son una sola cosa
  - y aunque no son lo mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula es textualmente difícil; la traducción conserva la tensión entre distinción e inseparabilidad sin resolverla artificialmente.
- source_word: በመንፈስ
  english_pob_choice: by the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - por espíritu
  - por el aliento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cosmológico, la mayúscula preserva la posibilidad de una agencia divina/animadora. «Por» expresa medio o causa instrumentales sin cerrar el sentido de la palabra.
- source_word: ክልኤሆሙ
  english_pob_choice: the two of them
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - los dos de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El dual es importante para la lectura; «los dos» mantiene explícita la pareja trueno/relámpago.
- source_word: የሐውሩ
  english_pob_choice: go together
  chosen_spanish: van juntos
  alternatives_spanish:
  - avanzan juntos
  - marchan juntos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Van juntos» es natural en español y conserva la idea de movimiento coordinado.
theological_decisions:
- issue: Sentido de በመንፈስ en un cuadro cosmológico
  english_pob_reading: by the Spirit
  chosen_spanish_reading: por el Espíritu
  alternative_spanish_readings:
  - por espíritu
  - por el viento
  - por el aliento
  rationale: El texto puede hablar de una agencia divina o de una fuerza vivificante/ordenadora. Se mantiene «Espíritu» con mayúscula para no borrar la posibilidad teológica que el audit trail preserva, sin negar el campo semántico más amplio.
  doctrine_reference: Preservar la tensión léxica y teológica en vez de resolverla prematuramente.
- issue: Relación entre distinción e inseparabilidad del trueno y el relámpago
  english_pob_reading: though they are not one ... the two of them go together and are not separated
  chosen_spanish_reading: aunque no son uno ... los dos van juntos y no están separados
  alternative_spanish_readings:
  - aunque son distintos ... van juntos
  - aunque no son una sola cosa ...
  rationale: La cláusula es difícil en el testimonio etiópico, pero la lectura general parece contraponer distinción real y movimiento conjunto. El español conserva esa tensión sin armonizarla de manera excesiva.
  doctrine_reference: Mantener la dificultad textual señalada en el aparato y no suavizarla doctrinalmente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se mantuvo el plural de «resting places» como plural de sentido («reposos») y la formulación de contraste «though they are not one» como tensión entre distinción e inseparabilidad. También se respetó la repetición de «no están separados» y la ambigüedad de በመንፈስ sin eliminarla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el original lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «Espíritu» con mayúscula por la decisión léxica y teológica del versículo.
  - Se evita «Cristo» porque no hay lenguaje mesiánico en el texto.
  - Se conserva el paralelismo y la repetición del original, especialmente en «no están separados».
  - Se traduce መብረቅ como «relámpago» por claridad poética y naturalidad en español.
