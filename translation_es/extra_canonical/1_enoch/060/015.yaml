- from: Porque cuando relampaguea el relámpago, el trueno da su voz, y el espíritu[a] reposa en su tiempo señalado, y reparte entre ellos[c]; pues el depósito de sus tiempos es de arena, y los dos[b] son sujetos con un freno y vueltos atrás por el poder del espíritu[a], y asimismo son conducidos según las muchas regiones de la tierra.
  to: Porque cuando fulgura el relámpago, el trueno da su voz, y el espíritu[a] reposa en su tiempo señalado, y reparte entre ellos[c]; pues el tesoro de sus tiempos es de arena, y los dos[b] son refrenados con un freno y vueltos atrás por el poder del espíritu[a], y asimismo son impulsados según las muchas regiones de la tierra.
  rationale: 'La revisión propuesta hace ajustes menores pero importantes de fidelidad estilística: mejora la naturalidad del inicio, refuerza la imaginería cosmológica de ''treasury'' con ''tesoro'', sustituye una construcción poco idiomática por ''son refrenados'', y alinea la nota c con la incertidumbre léxica documentada en la auditoría inglesa. No cambia el sentido principal ya corregido por la revisión auditada.'
