base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/060/015.yaml
  text: For when the lightning flashes[a], the thunder gives its voice, and the spirit rests at its appointed time, and it divides equally among them; for the treasury of their times is of sand, and the two of them are restrained with a bridle and turned back by the power of the spirit[d][c][b], and they are driven on likewise according to the many regions of the earth.
  footnotes:
  - marker: a
    text: Or 'wind' in both occurrences of 'spirit'; the verse moves within storm imagery, and the Ge'ez term can denote wind, breath, or spirit.
    reason: lexical_alternative
  - marker: b
    text: The final comparison is textually difficult in the Ethiopic witness; 'dwelling-places' could also be understood more broadly as habitations or regions of the earth.
    reason: textual_variant
  - marker: c
    text: The clause rendered 'he divides equally among them' is uncertain; a more cautious alternative is 'he apportions among them.'
    reason: alternative_reading
  - marker: d
    text: Or 'and he divides equally among them; for the treasury of their times is fixed, and they are stirred and moved by the power of the spirit, and purified from among them, like the many dwelling-places of the earth.'.
    reason: previous_rendering
