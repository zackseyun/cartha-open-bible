translation:
  language: es
  text: Porque cuando fulgura el relámpago, el trueno da su voz, y el espíritu[a] reposa en su tiempo señalado, y reparte entre ellos[c]; pues el tesoro de sus tiempos es de arena, y los dos[b] son refrenados con un freno y vueltos atrás por el poder del espíritu[a], y asimismo son impulsados según las muchas regiones de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “viento” en las dos ocurrencias de “espíritu”; el versículo se mueve dentro de una imaginería de tormenta, y el término ge'ez puede denotar viento, aliento o espíritu.
    reason: lexical_alternative
  - marker: b
    text: La referencia a “los dos” es explícita en el testimonio ge'ez revisado; el pasaje alude a dos entidades celestes sometidas a control.
    reason: source_note
  - marker: c
    text: La cláusula es incierta; también puede entenderse como “reparte por igual entre ellos”.
    reason: alternative_reading
lexical_decisions:
- source_word: ይበርቅ መብረቅ
  english_pob_choice: the lightning flashes
  chosen_spanish: relampaguea el relámpago
  alternatives_spanish:
  - el relámpago fulgura
  - el relámpago centellea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo la acción verbal intensa del ge'ez con un giro natural en español. 'Relampaguea el relámpago' mantiene la redundancia poética y el paralelismo apocalíptico sin aplanarlo a un simple sustantivo.
- source_word: ነጐድጓድ ቃሎ ይሁብ
  english_pob_choice: the thunder gives its voice
  chosen_spanish: el trueno da su voz
  alternatives_spanish:
  - el trueno emite su voz
  - el trueno da su sonido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Da su voz'' reproduce la personificación del trueno preservada por la POB en inglés. En español resulta idiomático y mantiene la imagen cósmica del texto.'
- source_word: መንፈስ
  english_pob_choice: spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el viento
  - el aliento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la decisión auditable de la POB de conservar 'spirit' en el texto principal. Aunque el contexto meteorológico permite 'viento', aquí la agencia, el poder y el control del pasaje sostienen mejor 'espíritu' en la línea principal, con la alternativa indicada en nota.
- source_word: በጊዜሃ ያዐርፍ
  english_pob_choice: rests at its appointed time
  chosen_spanish: reposa en su tiempo señalado
  alternatives_spanish:
  - descansa en su tiempo fijado
  - permanece en su tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Reposa'' conserva la idea de asentarse/cesar dentro de un ciclo ordenado, y ''tiempo señalado'' expresa el carácter fijado del momento sin introducir más de lo que permite el original.'
- source_word: ዐሩየ ይከፍል ማእከሎሙ
  english_pob_choice: he divides equally among them
  chosen_spanish: reparte entre ellos
  alternatives_spanish:
  - distribuye entre ellos
  - los reparte por igual
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada señaló que el texto es difícil en este punto y que el sentido distributivo es seguro, mientras que el matiz exacto es menos cierto. 'Reparte entre ellos' preserva la distribución sin afirmar una igualdad explícita que el ge'ez no obliga a fijar.
- source_word: መዝገበ ጊዜያቲሆሙ
  english_pob_choice: the treasury of their times
  chosen_spanish: el depósito de sus tiempos
  alternatives_spanish:
  - la tesorería de sus tiempos
  - el tesoro de sus tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Depósito'' conserva la imagen concreta de almacenamiento reservada por la POB, y en español evita la posible connotación monetaria de ''tesorería''. ''Sus tiempos'' refleja el posesivo del original.'
- source_word: ዘኆጻ ውእቱ
  english_pob_choice: is of sand
  chosen_spanish: es de arena
  alternatives_spanish:
  - es de polvo
  - es arenoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión mostró que el ge'ez significa 'de arena'. 'De arena' es la equivalencia directa y clara en español.
- source_word: ፪፪እምኔሆሙ
  english_pob_choice: the two of them
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - los dos de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Respeta el dual explícito del texto revisado y su referencia a dos entidades celestes, sin forzar una especificación adicional en español.
- source_word: በአጓም ይትነኃዙ
  english_pob_choice: are restrained with a bridle
  chosen_spanish: son sujetos con un freno
  alternatives_spanish:
  - son detenidos con un freno
  - son refrenados con un freno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Freno'' refleja el instrumento de control señalado por la revisión, y ''son sujetos'' comunica la pasividad/contención del verbo sin sobrecargarlo. ''Con un freno'' conserva la imagen física del original.'
- source_word: ወይትመየጡ
  english_pob_choice: turned back
  chosen_spanish: vueltos atrás
  alternatives_spanish:
  - devueltos
  - replegados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La acción es de retorno o reversión. 'Vueltos atrás' conserva el movimiento direccional y funciona bien en coordinación con el control del 'freno'.
- source_word: በኃይለ መንፈስ
  english_pob_choice: by the power of the spirit
  chosen_spanish: por el poder del espíritu
  alternatives_spanish:
  - por la fuerza del espíritu
  - por el poder del viento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantengo 'espíritu' siguiendo la decisión principal del pasaje y traduzco 'power' por 'poder' por ser la forma más natural y fiel en español.
- source_word: ወይትነጸኡ
  english_pob_choice: they are driven on
  chosen_spanish: son conducidos
  alternatives_spanish:
  - son impulsados
  - son llevados adelante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión indicó un sentido de empuje/conducción, no de purificación. 'Son conducidos' expresa la dirección impuesta sin añadir intensidad ajena al texto.
- source_word: ከመዝ በከመ ብዙኃ አድዋስ ምድር
  english_pob_choice: according to the many regions of the earth
  chosen_spanish: según las muchas regiones de la tierra
  alternatives_spanish:
  - como las muchas regiones de la tierra
  - según las muchas comarcas de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Regiones'' sigue la corrección auditada del término y conserva la amplitud geográfica. ''Según'' refleja el valor comparativo/distributivo del cierre sin convertirlo en una comparación más específica de la que el texto garantiza.'
theological_decisions:
- issue: መንፈስ debe mantenerse como 'espíritu' o reinterpretarse como 'viento' en un contexto de tormenta
  english_pob_reading: spirit
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - viento
  - aliento
  rationale: La POB retuvo 'spirit' en el texto principal para no resolver la tensión entre fenómeno meteorológico y agente cósmico. En español mantengo esa misma tensión, dejando la variante meteorológica en nota.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
- issue: El valor de 'reparte entre ellos' frente a 'reparte por igual'
  english_pob_reading: he divides equally among them / he apportions among them
  chosen_spanish_reading: reparte entre ellos
  alternative_spanish_readings:
  - reparte por igual entre ellos
  - les asigna
  rationale: La evidencia auditada muestra incertidumbre en el matiz exacto. Prefiero una formulación distributiva sobria que no afirme igualdad explícita si el ge'ez no la obliga.
  doctrine_reference: Principio de mínima sobreinterpretación del texto fuente.
- issue: El tramo final acerca de los dos cuerpos y su sometimiento a un freno
  english_pob_reading: the two of them are restrained with a bridle and turned back by the power of the spirit, and they are driven on likewise according to the many regions of the earth
  chosen_spanish_reading: los dos son sujetos con un freno y vueltos atrás por el poder del espíritu, y asimismo son conducidos según las muchas regiones de la tierra
  alternative_spanish_readings:
  - los dos son refrenados con un freno y devueltos atrás por el poder del espíritu
  - ambos son detenidos con un freno y guiados por el poder del espíritu
  rationale: La lectura revisada corrige errores graves de la versión anterior y describe un control real de dos entidades. En español, 'sujetos con un freno' conserva la imagen de restricción sin introducir 'caballo' ni otros elementos ausentes; 'vueltos atrás' y 'conducidos' preservan el dinamismo del pasaje.
  doctrine_reference: Fidelidad al texto corregido y a la imaginería apocalíptica sin domesticarla.
translation_notes:
  revision_awareness: 'La versión inglesa de trabajo fue revisada después de detectar varios errores mayores en la primera pasada: el texto ge''ez no dice que el tesoro de sus tiempos sea ''fixed'', sino ''of sand''; tampoco dice que ''they are stirred and moved'', sino que ''the two of them are held with a rein/bridle'' y ''turned back'', ni que ''they are purified'', sino que ''they are driven/pushed on''. La versión española sigue la lectura ya corregida por la revisión más reciente y evita reproducir las antiguas equivocaciones.'
  spanish_consistency_notes:
  - Se mantiene 'espíritu' como término principal y se anota la alternativa 'viento' en nota, para conservar la tensión léxica del original.
  - Se usa un registro digno y publicable, con estructuras naturales en español, pero sin suavizar la imaginería cósmica.
  - '''Regiones de la tierra'' refleja la corrección auditada del cierre y evita ''lugares de morada'' o ''habitaciones'' que no están apoyados por la revisión.'
  - La puntuación distribuye la oración larga con comas y punto y coma para conservar el flujo apocalíptico sin perder legibilidad.
