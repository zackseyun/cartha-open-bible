base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/060/016.yaml
  text: And the spirit of the sea is male and strong[a], and according to the might of its strength he holds it back with a rein[c][b], and thus it is driven out and scattered among all the mountains of the earth.
  footnotes:
  - marker: a
    text: Or 'the wind of the sea.' The Ge'ez word for 'spirit' can also denote wind or breath; the personified context favors 'spirit.'
    reason: lexical_alternative
  - marker: b
    text: The image appears to depict the sea's force being reined in and then sent out or dispersed over the mountains, possibly in the form of mist, spray, or storm-clouds. The exact mechanics are not fully clear in the Ge'ez-only witness.
    reason: cultural_note
  - marker: c
    text: Or 'the might of his strength'.
    reason: previous_rendering
