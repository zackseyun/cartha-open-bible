translation:
  language: es
  text: Y el espíritu del mar[a] es varón y fuerte, y conforme a la fuerza del vigor del mar lo retiene con una rienda[c][b], y así es expulsado y esparcido entre todos los montes de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el viento del mar». La palabra ge’ez para «espíritu» también puede significar viento o aliento; el contexto personificado favorece «espíritu».'
    reason: lexical_alternative
  - marker: b
    text: La imagen parece describir la fuerza del mar contenida y luego enviada o dispersada sobre los montes, quizá como niebla, rocío o nube de tormenta. El mecanismo exacto no es completamente claro en el testimonio conservado solo en ge’ez.
    reason: cultural_note
  - marker: c
    text: 'Una traducción anterior entendía: «con la fuerza de su vigor», pero el posesivo parece referirse al mar, no al espíritu.'
    reason: previous_rendering
lexical_decisions:
- source_word: መንፈሰ ባሕር
  english_pob_choice: the spirit of the sea
  chosen_spanish: el espíritu del mar
  alternatives_spanish:
  - el viento del mar
  - el aliento del mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንፈስ puede significar espíritu, viento o aliento. Aquí se conserva ‘espíritu’ para mantener la fuerza personificada y cosmológica del pasaje, sin reducirlo a un fenómeno meteorológico.
- source_word: ተባዕታይ
  english_pob_choice: male
  chosen_spanish: varón
  alternatives_spanish:
  - masculino
  - macho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge’ez marca el género de forma explícita. ‘Varón’ conserva la personificación y suena natural en español reverente; ‘macho’ sería demasiado biológico y ‘masculino’ más técnico que literario.
- source_word: ዕኑፅ
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - duro
  - fiero
  - poderoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Fuerte’ reproduce con sobriedad la idea de fuerza o dureza sin intensificar más de lo que el texto exige.
- source_word: ኃይለ ጽንዐታ
  english_pob_choice: the might of its strength
  chosen_spanish: la fuerza de su vigor
  alternatives_spanish:
  - el poder de su fuerza
  - la fuerza de su fortaleza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la intensificación de dos sustantivos cercanos. ‘Fuerza de su vigor’ transmite el doble énfasis y, siguiendo la revisión gramatical del texto fuente, usa el posesivo referido al mar.
- source_word: በአንቍ ይገብእ
  english_pob_choice: he holds it back with a rein
  chosen_spanish: lo retiene con un freno
  alternatives_spanish:
  - lo detiene con una rienda
  - lo sujeta con un freno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El campo semántico apunta a rienda/freno/bridle. ‘Retiene con un freno’ conserva la imagen de control sobre una fuerza poderosa, con un español claro y digno.
- source_word: ትትነጻእ
  english_pob_choice: it is driven out
  chosen_spanish: es expulsado
  alternatives_spanish:
  - sale fuera
  - es lanzado fuera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva/reflexiva indica salida o expulsión. ‘Es expulsado’ mantiene la direccionalidad externa del movimiento sin agregar detalles no presentes.
- source_word: ትዘራእ
  english_pob_choice: scattered
  chosen_spanish: esparcido
  alternatives_spanish:
  - dispersado
  - sembrado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el verbo es literalmente ‘sembrar’, el contexto habla de dispersión sobre las montañas. ‘Esparcido’ preserva la imagen de diseminación natural en español.
- source_word: በአሉ አድባረ ምድር
  english_pob_choice: among all the mountains of the earth
  chosen_spanish: entre todos los montes de la tierra
  alternatives_spanish:
  - sobre todos los montes de la tierra
  - entre todos los montes del mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Montes’ conserva un registro bíblico sobrio y ‘de la tierra’ mantiene el alcance cósmico del original mejor que ‘del país’ o ‘del mundo’ en este contexto.
theological_decisions:
- issue: Personificación y género del espíritu del mar
  english_pob_reading: Retain 'the spirit of the sea' as a male, powerful agent
  chosen_spanish_reading: Mantener ‘el espíritu del mar’ como agente masculino y fuerte
  alternative_spanish_readings:
  - ‘el viento del mar’ como fuerza impersonal
  - neutralizar el género como si fuera solo gramática
  rationale: El texto etiópico presenta una fuerza cósmica personificada y explícitamente masculina. Se conserva esa tensión en español en vez de reducirla a meteorología impersonal.
  doctrine_reference: Primacía del texto original; preservar la tensión léxica y teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió el referente posesivo de ጽንዐታ a ‘su’ (del mar) y no ‘su’ referido al espíritu. Por eso el español dice ‘la fuerza de su vigor’, conservando la referencia al mar y la relación de control ejercida por el espíritu masculino sobre esa fuerza.
  spanish_consistency_notes:
  - Se prefirió ‘espíritu’ para mantener la personificación cosmológica documentada, no ‘viento’, aunque ambas opciones son posibles en ge’ez.
  - Se eligió ‘varón’ para ተባዕታይ por fidelidad semántica y tono literario; ‘masculino’ queda como alternativa más técnica.
  - Se mantuvo ‘freno’ para አንቍ por el valor de control/restricción del imagen ecuestre, equivalente al ‘rein’ del audit trail.
  - ‘Esparcido’ traduce el valor contextual de ‘sembrado’ sin forzar una imagen agrícola literal en español.
