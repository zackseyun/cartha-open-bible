translation:
  language: es
  text: Y el espíritu del rocío tiene su morada[a] en los confines del cielo, y está unido con los almacenes de la lluvia; y su curso[b] está en invierno y en verano, y sus nubes y las nubes de la bruma[c] están unidas[d], y la una da a la otra[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiene su almacén» o «tiene su depósito». El ge'ez aquí distingue «morada» de los «almacenes» de la lluvia que aparecen después.
    reason: previous_rendering
  - marker: b
    text: O «su circuito» o «su camino» para «su curso». El término ge'ez puede denotar movimiento o trayectoria, y el matiz exacto es incierto en este contexto cosmológico.
    reason: lexical_alternative
  - marker: c
    text: O «niebla» o «neblina». El término traducido como «bruma» es algo incierto.
    reason: lexical_alternative
  - marker: d
    text: O «están mezcladas» o «están combinadas».
    reason: lexical_alternative
  - marker: e
    text: O «una da a la otra» o «cada una da a la otra». La frase final puede sugerir intercambio recíproco entre el rocío, la lluvia y las formaciones nubosas.
    reason: lexical_alternative
lexical_decisions:
- source_word: መንፈሰ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - viento
  - aliento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cosmológico y apocalíptico, 'espíritu' conserva el registro personificado de la frase sin reducirla a un mero fenómeno meteorológico.
- source_word: ጠል
  english_pob_choice: dew
  chosen_spanish: rocío
  alternatives_spanish:
  - rocío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término meteorológico directo; 'rocío' es el equivalente natural y fiel en español.
- source_word: ማኅደሩ
  english_pob_choice: has its dwelling
  chosen_spanish: tiene su morada
  alternatives_spanish:
  - tiene su habitación
  - tiene su residencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del texto distingue este término de los 'almacenes' posteriores de la lluvia. 'Morada' refleja mejor una idea de habitación o abode que un depósito material.
- source_word: በ'አጽናፈ፡ ሰማይ
  english_pob_choice: at the ends of heaven
  chosen_spanish: en los confines del cielo
  alternatives_spanish:
  - en los extremos del cielo
  - en los bordes del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Confines'' comunica bien la imagen cósmica de extremidad/limitación sin volverla prosa moderna.'
- source_word: ድኁግ
  english_pob_choice: joined
  chosen_spanish: está unido
  alternatives_spanish:
  - está asociado
  - está ligado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Unido'' expresa la conexión entre las realidades celestes y mantiene la sencillez del enunciado.'
- source_word: መዛግብተ ዝናም
  english_pob_choice: the storehouses of the rain
  chosen_spanish: los almacenes de la lluvia
  alternatives_spanish:
  - los tesoros de la lluvia
  - los depósitos de la lluvia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen de depósito/tesoro celeste, pero 'almacenes' resulta más natural en español y mantiene el vínculo con la idea de custodia.
- source_word: ምሕዋረ
  english_pob_choice: its course
  chosen_spanish: su curso
  alternatives_spanish:
  - su circuito
  - su camino
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Curso'' es la opción más clara y sobria para el movimiento estacional señalado por el texto.'
- source_word: በክረምት ወበሐጋይ
  english_pob_choice: in winter and in summer
  chosen_spanish: en invierno y en verano
  alternatives_spanish:
  - en invierno y en verano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja estacional se vierte de modo directo y transparente, sin adaptar el pasaje a climas regionales.
- source_word: ደመና
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - nubes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término estándar y repetido; 'nubes' mantiene la imagen sin añadidos.
- source_word: ጊሜ
  english_pob_choice: mist
  chosen_spanish: bruma
  alternatives_spanish:
  - niebla
  - neblina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es algo incierto; 'bruma' preserva la ambigüedad y encaja bien con la pareja 'nubes / bruma'.
- source_word: ኅቡር
  english_pob_choice: joined together
  chosen_spanish: están unidas
  alternatives_spanish:
  - están mezcladas
  - están combinadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal mantiene la unión explícita de las nubes y la bruma en español natural.
- source_word: አሐዱ ለአሐዱ ይሁብ
  english_pob_choice: one gives to another
  chosen_spanish: una da a la otra
  alternatives_spanish:
  - la una da a la otra
  - cada una da a la otra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la reciprocidad o sucesión del intercambio con una formulación idiomática en español.
theological_decisions:
- issue: Cómo traducir መንፈሰ en un catálogo cosmológico apocalíptico
  english_pob_reading: personified 'spirit of the dew'
  chosen_spanish_reading: espíritu del rocío
  alternative_spanish_readings:
  - viento del rocío
  - aliento del rocío
  rationale: En este contexto, el texto no parece definir un fenómeno físico solamente, sino una agencia creada presentada de modo personificado. 'Espíritu' preserva ese registro sin cargarlo con una lectura doctrinal ajena.
  doctrine_reference: Preservar la imaginería apocalíptica y la personificación cósmica sin aplanarla.
translation_notes:
  revision_awareness: 'La revisión más reciente mantuvo el texto sin cambios sustanciales, pero el historial de auditoría corrigió un punto importante: ማኅደሩ debe distinguirse de መዛግብተ ዝናም, por lo que en español se evita la traducción uniforme de ambos como ''almacenes''. También se conservó la decisión de leer መንፈሰ como ''espíritu'' para preservar el registro personificado del pasaje.'
  spanish_consistency_notes:
  - Se mantiene 'espíritu' para መንፈሰ conforme al estilo POB y al registro apocalíptico del contexto.
  - Se usa 'morada' para ማኅደሩ y 'almacenes' para መዛግብተ ዝናም' para reflejar la distinción léxica documentada.
  - '''Confin es del cielo'' reproduce la cosmología elevada del original mejor que una paráfrasis moderna.'
  - Se eligió 'bruma' para ጊሜ por su relativa neutralidad ante la incertidumbre léxica.
