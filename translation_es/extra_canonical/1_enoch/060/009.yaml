  language: en
  yaml_path: translation/extra_canonical/1_enoch/060/009.yaml
  text: And I asked another angel that he should show me the power of those monsters[a], how they were separated on one day and were cast[d][c][b], one into the depths of the sea and one onto the dry land of the wilderness.
  footnotes:
  - marker: a
    text: The surrounding context identifies these two cosmic creatures more specifically, but this verse itself refers to them only as 'these monsters.'
    reason: cross_reference
  - marker: b
