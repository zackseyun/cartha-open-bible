translation:
  language: es
  text: Y le pregunté a otro ángel que me mostrara el poder[a] de aquellos monstruos[b], cómo fueron separados en un día y fueron arrojados, uno a las profundidades del mar y otro sobre la tierra seca del desierto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su poder», «su fuerza» o posiblemente «su naturaleza»; el término ge'ez se centra en el poder, pero en contexto también puede implicar el carácter o la fuerza propia de estos seres.
    reason: lexical_alternative
  - marker: b
    text: El contexto circundante identifica más específicamente a estas dos criaturas cósmicas, pero este versículo las menciona solo como «aquellos monstruos».
    reason: cross_reference
  - marker: c
    text: 'La frase final es difícil. El ge''ez parece contrastar el mar con una región desértica y seca: literalmente, algo como «sobre la tierra seca, en el desierto».'
    reason: textual_variant
lexical_decisions:
- source_word: ተስእእክዎ
  english_pob_choice: I asked
  chosen_spanish: le pedí
  alternatives_spanish:
  - le pregunté
  - le solicité
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo introduce una petición dirigida al ángel. «Le pedí» preserva la relación directa de ruego/petición que funciona bien en español y evita una formulación excesivamente rígida.
- source_word: ካልእ መልአክ
  english_pob_choice: another angel
  chosen_spanish: otro ángel
  alternatives_spanish:
  - un ángel distinto
  - un segundo ángel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Otro ángel» reproduce de manera natural el cambio de interlocutor angelical sin añadir matices innecesarios.
- source_word: ያርእየኒ
  english_pob_choice: should show me
  chosen_spanish: me mostrara
  alternatives_spanish:
  - me mostrase
  - me enseñara
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, después de un verbo de petición, el subjuntivo expresa bien la dependencia. «Me mostrara» conserva la fuerza de la solicitud sin sonar calcado.
- source_word: ኃይሎሙ
  english_pob_choice: the power
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - la potencia
  - la naturaleza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Poder» es la equivalencia más directa y general para ኃይሎሙ. En contexto puede incluir fuerza o capacidad, pero el texto base destaca el poder de estas criaturas.
- source_word: ዐናብርት
  english_pob_choice: monsters
  chosen_spanish: monstruos
  alternatives_spanish:
  - bestias
  - grandes criaturas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Monstruos» conserva mejor el tono apocalíptico y extraño del pasaje que «bestias», que en español puede sonar demasiado neutral.
- source_word: እሉክ
  english_pob_choice: those monsters
  chosen_spanish: aquellos monstruos
  alternatives_spanish:
  - esos monstruos
  - los monstruos mencionados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo etiópico corresponde a un valor distal, por lo que «aquellos» es más fiel que «estos». Mantiene además la referencia a criaturas ya conocidas por el contexto cercano.
- source_word: ተሌለዩ
  english_pob_choice: were separated
  chosen_spanish: fueron separados
  alternatives_spanish:
  - fueron divididos
  - fueron apartados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La pasiva debe conservarse: no se separan a sí mismos, sino que son separados. «Fueron separados» es claro y preciso.'
- source_word: በአሐቲ ዕለት
  english_pob_choice: on one day
  chosen_spanish: en un día
  alternatives_spanish:
  - en un solo día
  - en aquel día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En un día» preserva la brevedad temporal sin decidir si el énfasis recae en un día particular o en la singularidad del acto.
- source_word: ተወድዩ
  english_pob_choice: were cast
  chosen_spanish: fueron arrojados
  alternatives_spanish:
  - fueron lanzados
  - fueron echados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva expresa una acción forzada y desechada. «Fueron arrojados» comunica bien esa violencia y mantiene el tono elevado del pasaje.
- source_word: በልጕተ ባሕር
  english_pob_choice: into the depths of the sea
  chosen_spanish: en las profundidades del mar
  alternatives_spanish:
  - en lo profundo del mar
  - en el abismo del mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase alude a la parte profunda del mar. «En las profundidades del mar» es idiomático y respeta la imagen sin introducir terminología técnica no requerida.
- source_word: በየብስ በድው
  english_pob_choice: onto the dry land of the wilderness
  chosen_spanish: sobre la tierra seca del desierto
  alternatives_spanish:
  - sobre la tierra seca del yermo
  - sobre la tierra árida del desierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión combina sequedad y región desolada. «Tierra seca del desierto» mantiene ambos elementos, aunque en español «desierto» ya implica aridez; se conserva para reflejar la tensión del original.
theological_decisions:
- issue: Identidad de los dos seres
  english_pob_reading: Render them generically as 'monsters' rather than naming Leviathan/Behemoth in the main text.
  chosen_spanish_reading: Mantener «monstruos» en el texto principal, sin nombrarlos como Leviatán o Behemot.
  alternative_spanish_readings:
  - nombrarlos explícitamente como Leviatán y Behemot
  - traducirlos como «bestias»
  rationale: El verso mismo no los nombra; solo remite a «aquellos monstruos». Para no sobrearmonizar con el contexto inmediato, el texto principal debe seguir esa referencia genérica, aunque el lector pueda reconocer la identificación contextual.
  doctrine_reference: Preservar el alcance local del pasaje y no añadir identificaciones ausentes del verso.
- issue: Valor del demostrativo etiópico
  english_pob_reading: those monsters
  chosen_spanish_reading: aquellos monstruos
  alternative_spanish_readings:
  - esos monstruos
  - estos monstruos
  rationale: La revisión auditada corrigió el matiz distal del demostrativo. «Aquellos» comunica mejor la distancia referencial que «estos», y evita perder un dato del texto fuente.
  doctrine_reference: Atender al valor gramatical del demostrativo sin homogeneizarlo.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió dos puntos del audit trail inglés: el demostrativo debe ser distal («those»), y el verbo de arrojarse es plural, afectando a ambos seres. La redacción española refleja ambas correcciones con «aquellos» y «fueron arrojados» en plural.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o sustitutos litúrgicos porque aquí no aparece el nombre divino.
  - Se eligió «monstruos» para conservar el tono apocalíptico del pasaje, en línea con el inglés POB.
  - «Aquellos» refleja el demostrativo distal señalado por la revisión, en lugar de «estos».
  - Se mantuvo la estructura pasiva para no diluir la acción recibida por las criaturas.
  - «Tierra seca del desierto» conserva la tensión semántica entre sequedad y región desolada.
