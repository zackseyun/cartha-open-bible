translation:
  language: es
  text: Y Miguel envió[a] a otro ángel de entre los santos celestiales[b], y me levantó. Y cuando me levantó, mi espíritu entró[c], porque no podía soportar la visión de ese poder y su sacudimiento[d] y el temblor del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mandó»; el verbo de envío puede expresarse con matiz de comisión o despacho.
    reason: lexical_alternative
  - marker: b
    text: Lit. «de entre los santos». Aquí probablemente se refiere a seres celestiales de la corte divina, no a santos humanos.
    reason: theological_note
  - marker: c
    text: La cláusula ge'ez es difícil y también puede entenderse como que su espíritu volvió a él o que entró en un nuevo estado visionario.
    reason: lexical_alternative
  - marker: d
    text: O «su tumulto» o «su conmoción». La relación exacta entre «poder», «sacudimiento» y «el temblor del cielo» es sintácticamente compacta en el original.
    reason: alternative_reading
lexical_decisions:
- source_word: ፈነወ
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa el envío de un mensajero; «envió» es natural en español y conserva el movimiento narrativo sin sobrecargar el tono.
- source_word: ካልአ መልአከ
  english_pob_choice: another angel
  chosen_spanish: a otro ángel
  alternatives_spanish:
  - a un ángel más
  - a un segundo ángel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase marca a un ángel distinto de Miguel; «otro ángel» es la solución más directa y sobria.
- source_word: እምቅዱሳን
  english_pob_choice: from among the holy ones
  chosen_spanish: de entre los santos
  alternatives_spanish:
  - de entre los seres santos
  - de entre los santos celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «De entre» preserva el origen dentro de un grupo. Mantengo «los santos» para el registro bíblico apocalíptico, aunque aquí el contexto favorece seres celestiales más que humanos.
- source_word: አንሥአኒ
  english_pob_choice: lifted me up
  chosen_spanish: me levantó
  alternatives_spanish:
  - me alzó
  - me elevó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo apunta a ser alzado; «me levantó» conserva la imagen espacial de ser puesto en alto sin sonar rígido.
- source_word: መንፈስየ ገብአት
  english_pob_choice: my spirit entered in
  chosen_spanish: mi espíritu volvió
  alternatives_spanish:
  - mi espíritu regresó
  - mi espíritu volvió a mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual posterior corrigió la interpretación de ገብአ como «volver/regresar» y no «entrar». Por eso adopto «mi espíritu volvió», que en español transmite mejor el sentido de recobrarse o volver en sí.
- source_word: ኢክህልኩ ተዓግሦ
  english_pob_choice: I was not able to endure
  chosen_spanish: no podía soportar
  alternatives_spanish:
  - no podía resistir
  - no era capaz de soportar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La combinación expresa incapacidad de aguantar la experiencia; «no podía soportar» es idiomático y fiel al valor de endurance.
- source_word: ራእየ ዝኩ ኃይል
  english_pob_choice: the sight of that power
  chosen_spanish: la visión de ese poder
  alternatives_spanish:
  - la visión de esa fuerza
  - el espectáculo de ese poder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Visión» refleja lo visto; «poder» conserva el alcance de ኃይል. En español «visión de ese poder» suena más natural que un calco demasiado abrupto.
- source_word: ሀውከ
  english_pob_choice: shaking
  chosen_spanish: su agitación
  alternatives_spanish:
  - su conmoción
  - su tumulto
  - su sacudida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término sugiere perturbación o violencia de movimiento; «agitación» mantiene el efecto dinámico sin perder claridad.
- source_word: አንቀልቅለ ሰማይ
  english_pob_choice: the quaking of heaven
  chosen_spanish: el temblor del cielo
  alternatives_spanish:
  - el estremecimiento del cielo
  - el quiebre del cielo
  - el temblor de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es cósmica; «temblor del cielo» conserva el impacto apocalíptico en español natural.
theological_decisions:
- issue: Identidad de «los santos»
  english_pob_reading: celestial holy beings, likely angelic attendants
  chosen_spanish_reading: seres celestiales santos, no necesariamente humanos
  alternative_spanish_readings:
  - ángeles
  - santos humanos
  rationale: En este contexto visionario, la expresión se entiende mejor como parte de la corte celestial. Conservo «los santos» en el texto por fidelidad al registro y aclaro en la decisión el trasfondo angelical probable sin armonizarlo con usos eclesiales posteriores.
  doctrine_reference: Uso apocalíptico local; evitar imposición de terminología eclesiástica tardía.
- issue: Sentido de «mi espíritu volvió»
  english_pob_reading: retain the difficult literal wording in the main text
  chosen_spanish_reading: mi espíritu volvió, en sentido de recobrarse o volver en sí
  alternative_spanish_readings:
  - mi espíritu entró en mí
  - mi espíritu retornó a mí
  - volví en mí
  rationale: La evidencia revisada del verbo favorece «volver/regresar». En español, esta forma mantiene la tensión de la frase y evita la traducción errónea de «entró». Al mismo tiempo, sugiere el sentido contextual de recuperación tras el colapso visionario.
  doctrine_reference: Prioridad a la evidencia léxica del ge'ez; conservar el efecto narrativo de una reanimación o recuperación espiritual.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión posterior importante sobre el verbo ገብአ: un pase adjudicó erróneamente ''my spirit entered'', pero la revisión posterior volvió a una solución de ''my spirit returned''. Por eso el español sigue la lectura revisada y corrige la dirección semántica hacia ''mi espíritu volvió''. También se preserva la tensión de la sintaxis comprimida en torno a ''poder'', ''agitación'' y ''temblor del cielo''.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí; no hay tetragrámaton en el pasaje.
  - Se evitó «siervo»/«esclavo» porque no aparece δοῦλος en este verso.
  - Se conservó el registro apocalíptico con «los santos» en vez de reescribirlo como terminología eclesial.
  - Se prefirió una construcción española natural que no diluye el carácter visionario de la escena.
