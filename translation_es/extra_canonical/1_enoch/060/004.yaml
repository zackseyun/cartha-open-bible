base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/060/004.yaml
  text: And Michael sent another angel from among the holy ones[a], and he lifted me up. And when he lifted me up, my spirit entered in[c][b], for I was not able to endure the sight of that power and its shaking and the quaking of heaven.
  footnotes:
  - marker: a
    text: The clause 'my spirit entered' is difficult in Ge'ez and may mean that Enoch's spirit returned to him or came into a new visionary state.
    reason: lexical_alternative
  - marker: b
    text: Or 'the sight of that mighty power and its tumult, and the quaking of heaven.' The exact relation of 'power,' 'shaking/tumult,' and 'heaven' is syntactically compressed.
    reason: alternative_reading
  - marker: c
    text: Or 'my spirit entered'.
    reason: previous_rendering
