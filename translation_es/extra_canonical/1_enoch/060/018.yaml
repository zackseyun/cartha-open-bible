translation:
  language: es
  text: Y el espíritu del granizo se apartó por la fuerza de su poder, y su espíritu está aparte[a]; y lo que sube de él es como humo, y su nombre es Escarcha[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea en ge''ez es difícil. También puede entenderse: «su espíritu está por sí mismo» o «el espíritu en él es separado».'
    reason: lexical_alternative
  - marker: b
    text: El término final se entiende aquí como «Escarcha»; también puede designar de manera más general el frío helado o la helada.
    reason: alternative_reading
lexical_decisions:
- source_word: መንፈሰ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - viento
  - aliento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico conviene conservar el valor personificado y no reducir la expresión a meteorología ordinaria. «Espíritu» mantiene la agencia cosmológica que la tradición del texto presenta.
- source_word: ሐመዳ
  english_pob_choice: hail
  chosen_spanish: nieve
  alternatives_spanish:
  - granizo
  - escarcha
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige la lectura previa: ሐመዳ designa aquí «nieve» o «escarcha blanca/helada», no «hail/granizo». En español, «nieve» comunica mejor la imagen meteorológica primaria, y la nota puede recordar la cercanía semántica con escarcha.'
- source_word: ሐደገ
  english_pob_choice: departed
  chosen_spanish: se apartó
  alternatives_spanish:
  - dejó
  - se alejó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa dejar un lugar o estación, no simplemente salir. «Se apartó» conserva la idea de abandono o separación sin forzar una imagen excesivamente interpretativa.
- source_word: በእንተ ኃይለ ዚአሁ
  english_pob_choice: by the force of his might
  chosen_spanish: por la fuerza de su poder
  alternatives_spanish:
  - por su fuerza
  - mediante su poder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La doble intensidad de la expresión se conserva mejor con una construcción redundante en español. «Fuerza» y «poder» reproducen la acumulación enfática del original sin suavizarla.
- source_word: ቦቱ
  english_pob_choice: its spirit is by itself
  chosen_spanish: su espíritu está por sí mismo
  alternatives_spanish:
  - su espíritu está solo
  - su espíritu es por sí mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma de relación pronominal se mantiene de manera natural en español con «su espíritu». «Por sí mismo» conserva la idea de separación o singularidad del espíritu dentro del fenómeno.
- source_word: ባሕቲቱ
  english_pob_choice: is distinct
  chosen_spanish: está por sí mismo
  alternatives_spanish:
  - está solo
  - está separado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada favorece «by itself/alone» frente a una noción abstracta de «distinto». En español, «está por sí mismo» expresa mejor la autosuficiencia o separación indicada por el ge'ez.
- source_word: ዘየዐርግ እምኔሁ
  english_pob_choice: what goes up from it
  chosen_spanish: lo que sube de ella
  alternatives_spanish:
  - lo que asciende de ella
  - lo que se eleva de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción relativa conserva el movimiento ascendente sin sobreinterpretar la dirección o la causa. Se eligió el femenino por la referencia inmediata a «nieve», siguiendo el antecedente más natural en español.
- source_word: ከመ ጢስ
  english_pob_choice: like smoke
  chosen_spanish: como humo
  alternatives_spanish:
  - como vapor
  - como humo espeso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Como humo» preserva la imagen visual fuerte y no la debilita con un término más técnico o menos vívido.
- source_word: ስሙ ደይክ
  english_pob_choice: its name is Frost
  chosen_spanish: su nombre es Escarcha
  alternatives_spanish:
  - su nombre es Frío
  - su nombre es Hielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada establece que ደይክ significa «frost/cold», no «dew». «Escarcha» es la opción española más natural y concreta para nombrar ese fenómeno, y conserva el carácter de denominación cosmogónica.
theological_decisions:
- issue: Mantener el lenguaje de agencia espiritual en fenómenos meteorológicos
  english_pob_reading: Retain 'spirit' language and personified naming
  chosen_spanish_reading: Conservar «espíritu» y el nombramiento personificado («su nombre es Escarcha»)
  alternative_spanish_readings:
  - reducirlo a «viento» o «corriente»
  - traducir el cierre como una mera descripción meteorológica
  rationale: El pasaje presenta realidades cósmicas como agencias ordenadas, no como simple meteorología moderna. Preservar la personificación evita aplanar la visión apocalíptica del texto.
  doctrine_reference: Preservación de la imaginería apocalíptica; no diluir la agencia cósmica en prosa naturalista.
translation_notes:
  revision_awareness: 'La traducción española incorpora la revisión crítica posterior que corrige dos puntos del borrador inglés auditado: ሐመዳ no debe leerse como «hail/granizo» sino como nieve/escarcha, y ደይክ no debe verterse como «dew/rocío» sino como escarcha/frío. También conserva la decisión de mantener el lenguaje de «espíritu» y la formulación personificada del cierre.'
  spanish_consistency_notes:
  - Se conserva la misma estrategia para רוּחַ/መንፈሰ como «espíritu» en todo el verso.
  - Se evita «SEÑOR» u otra normalización litúrgica porque el texto no contiene el Tetragrámaton ni una cita directa del divino nombre.
  - «Escarcha» se usa como nombre propio del fenómeno final, con mayúscula, para reflejar el cierre nominativo del original.
  - La referencia del pronombre final se resuelve en español con antecedente femenino («ella») por concordancia con «nieve», sin imponer una lectura antropomórfica.
