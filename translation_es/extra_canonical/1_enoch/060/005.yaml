  revised_footnotes:
  - marker: a
    text: «Tierra seca» puede ser significativo en el contexto, por contraste con la imaginería del mar en el pasaje circundante.
    reason: cultural_note
  revision_rationale: Se elimina la nota [a] porque contradice la lectura fuente adjudicada y vuelve a tratar «visión» como si implicara «has visto». También se suprime la nota sobre «lento para la ira» por no ser necesaria como nota independiente en español. Se conserva el texto principal, que es fiel al sentido fuente y natural en español.
