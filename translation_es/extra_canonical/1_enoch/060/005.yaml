base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/060/005.yaml
  text: And Michael said to me[a], “Why are you troubled by such a vision? Until today the day of his mercy has lasted[c][b], and he has been merciful and slow to wrath toward those who dwell upon the dry land.”
  footnotes:
  - marker: a
    text: Or, more literally, 'What is this that you have seen and been troubled?' The opening question is syntactically difficult in the Ge'ez.
    reason: lexical_alternative
  - marker: b
    text: '''Dry land'' may be significant in context, contrasting land-dwelling beings with the sea imagery in the surrounding passage.'
    reason: cultural_note
  - marker: c
    text: Or 'Why have you seen this and been troubled?'.
    reason: previous_rendering
