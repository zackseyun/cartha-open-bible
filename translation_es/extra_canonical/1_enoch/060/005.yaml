  rationale: Se elimina la nota [a] porque contradice la lectura fuente adjudicada y vuelve a tratar «visión» como si implicara «has visto». También se suprime la nota sobre «lento para la ira» por no ser necesaria como nota independiente en español. Se conserva el texto principal, que es fiel al sentido fuente y natural en español.
