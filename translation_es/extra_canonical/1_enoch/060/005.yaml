translation:
  language: es
  text: 'Y Miguel me dijo: «¿Por qué estás inquieto por una visión así? Hasta hoy ha durado el día de su misericordia, y ha sido misericordioso y lento para la ira hacia los que habitan sobre la tierra seca[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tierra seca» puede ser significativo en el contexto, por contraste con la imaginería del mar en el pasaje circundante.
    reason: cultural_note
lexical_decisions:
- source_word: ወይቤለኒ
  english_pob_choice: And Michael said to me
  chosen_spanish: Y Miguel me dijo
  alternatives_spanish:
  - Entonces Miguel me dijo
  - Y él me dijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula narrativa se conserva de manera directa con pasado simple español; «me dijo» refleja el dativo del receptor y mantiene la transparencia del reporte visionario.
- source_word: ሚካኤል
  english_pob_choice: Michael
  chosen_spanish: Miguel
  alternatives_spanish:
  - Michael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español bíblico estándar el nombre se adapta a «Miguel», forma clara y reconocible, sin alterar el referente.
- source_word: ምንተ ርእየ ዘከመዝ ተሀውከ
  english_pob_choice: Why are you troubled by such a vision?
  chosen_spanish: ¿Por qué estás inquieto por una visión así?
  alternatives_spanish:
  - ¿Por qué estás turbado por una visión así?
  - ¿Por qué te inquieta una visión así?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige la lectura errónea de un verbo de ‘ver’ y entiende ርእየ como ‘visión’. «Inquieto» comunica perturbación interior sin cargar demasiado el matiz emocional; «turbado» queda como alternativa más solemne.
- source_word: እስከ ዮም
  english_pob_choice: Until today
  chosen_spanish: Hasta hoy
  alternatives_spanish:
  - Hasta el día de hoy
  - Hasta este día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el valor temporal continuo de la expresión y suena natural en español contemporáneo.
- source_word: ዕለተ ምሕረቱ
  english_pob_choice: the day of his mercy
  chosen_spanish: el día de su misericordia
  alternatives_spanish:
  - el día de su gracia
  - el tiempo de su misericordia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Misericordia» reproduce el campo semántico de ምሕረት sin diluirlo en un mero estado afectivo. Se mantiene el posesivo para preservar el foco teológico indicado en el audit trail.
- source_word: ወሀሎ መሓሪ
  english_pob_choice: and he has been merciful
  chosen_spanish: y ha sido misericordioso
  alternatives_spanish:
  - y es misericordioso
  - y ha mostrado misericordia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción con perfecto verbal expresa una disposición continuada en el período referido. «Misericordioso» evita una repetición excesiva de «misericordia» y sigue el sentido adjetival del término ge'ez.
- source_word: ወርኁቀ መዓት
  english_pob_choice: and slow to wrath
  chosen_spanish: y lento para la ira
  alternatives_spanish:
  - y lento en la ira
  - y paciente en la ira
  - y lejos de la ira
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lento para la ira» conserva la fuerza idiomática y la tensión teológica del original, sin sustituirla por una fórmula más abstracta. Se evita suavizar el contraste con el juicio.
- source_word: ላዕለ እለ የኃድሩ ዲበ የብስ
  english_pob_choice: toward those who dwell upon the dry land
  chosen_spanish: hacia los que habitan sobre la tierra seca
  alternatives_spanish:
  - hacia los que habitan la tierra
  - hacia los que viven en la tierra firme
  - sobre los que habitan la tierra seca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva «tierra seca» para reflejar el valor concreto de የብስ y la posible oposición contextual con el mar; «habitan sobre» sigue de cerca la relación locativa del ge'ez.
theological_decisions:
- issue: El sujeto implícito de «su misericordia»
  english_pob_reading: The pronoun refers to God, implied rather than newly named in the verse.
  chosen_spanish_reading: El posesivo se entiende como referente a Dios, implícito en el discurso.
  alternative_spanish_readings:
  - un ‘día de misericordia’ sin posesivo explícito
  - una formulación impersonal del periodo
  rationale: 'Mantener el posesivo evita borrar la referencia teológica que el audit trail documenta: no es solo un tiempo benévolo, sino el período de misericordia de Dios antes del juicio.'
  doctrine_reference: Preservar la tensión misericordia/juicio sin neutralizarla.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditable que corrige la mala lectura de ርእየ como verbo de ‘ver’; por eso la traducción sigue la lectura aprobada «visión» y elimina la idea de «¿por qué has visto esto?». También se preservó la decisión posterior de mantener la pregunta como una inquietud causada por la visión, no como una acción de ver.
  spanish_consistency_notes:
  - Se usa «Miguel» para el nombre propio, como forma española estándar y reverente.
  - Se evita «Señor» como máscara para el nombre divino porque este versículo no nombra explícitamente a Yahvé; se conserva el posesivo «su» según el texto y el audit trail.
  - Se emplea «misericordia» y no «favor» porque el ge'ez y el contexto escatológico sostienen un periodo de misericordia divina.
  - «Tierra seca» se mantiene de forma consistente con la nota cultural del inglés POB y para no borrar el contraste implícito con el mar.
