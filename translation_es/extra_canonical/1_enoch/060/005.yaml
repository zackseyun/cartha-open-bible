revisions:
- from: 'Y Miguel me dijo: «¿Por qué estás inquieto[a] por una visión así? Hasta hoy ha durado el día de su misericordia, y ha sido misericordioso y lento para la ira[b] hacia los que habitan sobre la tierra seca[c]».'
