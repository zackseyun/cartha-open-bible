revisions:
- from: Y cuando vengan el día, el poder, el castigo[a] y el juicio, que el Señor de los Espíritus ha preparado para los que no se postran ante el Señor de la justicia, y para los que niegan al Señor de la justicia, y para los que toman su nombre en vano[b]—ese día ha sido preparado para los escogidos como pacto[c], y para los pecadores como investigación[d].
  to: Y cuando lleguen el día, el poder, el castigo[a] y el juicio, que el Señor de los espíritus ha preparado para los que no se postran ante el Señor de la rectitud, y para los que niegan al Señor de la rectitud, y para los que toman su nombre en vano[b], ese día ha sido preparado para los escogidos como pacto[c], y para los pecadores como inquisición[d].
  rationale: 'La revisión corrige cuatro puntos: (1) mejora la naturalidad española con «lleguen»; (2) ajusta la capitalización a un español más estándar con «Señor de los espíritus»; (3) sustituye «Señor de la justicia» por «Señor de la rectitud» para reflejar mejor el inglés POB vigente («Lord of righteousness») sin sobreinterpretar la incertidumbre textual documentada; y (4) fortalece ሐተታ como «inquisición», en línea con el inglés auditado final y con el contexto de escrutinio judicial. No hace falta una nueva nota textual porque el verso español puede seguir con fidelidad el audit trail vigente sin adjudicar por sí solo la variante más técnica.'
  reviewer_model: gpt-5.4
