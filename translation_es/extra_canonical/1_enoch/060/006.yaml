translation:
  language: es
  text: Y cuando lleguen el día, el poder, el castigo[a] y el juicio, que el Señor de los espíritus ha preparado para los que no se postran ante el Señor de la rectitud, y para los que niegan al Señor de la rectitud, y para los que toman su nombre en vano[b], ese día ha sido preparado para los escogidos como pacto[c], y para los pecadores como inquisición[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Castigo» también puede verterse como «plaga», «azote» o «aflicción»; el término ge'ez puede denotar un golpe punitivo o una calamidad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tomar su nombre vacíamente/falsamente»; el giro exacto es difícil, y «toman su nombre en vano» es una traducción idiomática del sentido probable.
    reason: lexical_alternative
  - marker: c
    text: O «juramento» en lugar de «pacto».
    reason: lexical_alternative
  - marker: d
    text: También puede entenderse como «indagación», «examen» o «interrogatorio», subrayando el escrutinio judicial de los pecadores.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዕለት
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - tiempo
  - jornada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un contexto apocalíptico, el término marca el momento señalado de la intervención final; «día» conserva la fórmula profética y la cadencia del pasaje.
- source_word: ኃይል
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - majestad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Poder» reproduce bien la serie judicial de términos y sugiere la fuerza acompañante de la visitación divina.
- source_word: መቅሠፍት
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - plaga
  - azote
  - aflicción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede designar golpe, azote o aflicción punitiva. «Castigo» encaja con el campo judicial del versículo; la nota preserva alternativas más concretas.
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - condena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Juicio» es el equivalente jurídico más natural en español para el término apocalíptico y mantiene el paralelismo con los demás sustantivos.
- source_word: አስተዳለወ
  english_pob_choice: has prepared
  chosen_spanish: ha preparado
  alternatives_spanish:
  - ha dispuesto
  - ha dejado listo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa una preparación previa divina; el perfecto español preserva el estado de disposición ya establecido.
- source_word: እግዚአ መንፈሳት
  english_pob_choice: Lord of Spirits
  chosen_spanish: Señor de los Espíritus
  alternatives_spanish:
  - Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un título fijo en 1 Enoc. En español, el plural mayúsculo con artículo definido conserva la formulación tradicional del título sin perder transparencia.
- source_word: ኢይሰግዱ
  english_pob_choice: do not bow down
  chosen_spanish: no se postran
  alternatives_spanish:
  - no se inclinan
  - no adoran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo denota postración corporal. «No se postran» conserva mejor la concreción física que «adoran».
- source_word: እግዚ ጽድቅ
  english_pob_choice: Lord of righteousness
  chosen_spanish: Señor de la justicia
  alternatives_spanish:
  - Señor de la rectitud
  - Señor de la justicia y de la rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el audit trail inglés conserva «Lord of righteousness», la revisión indica un problema textual en el Ge'ez OCR y el trasfondo estándar apunta a la idea de justicia/rectitud. En español, «Señor de la justicia» es idiomático y mantiene la carga moral-jurídica del título.
- source_word: ይክሕዱ
  english_pob_choice: deny
  chosen_spanish: niegan
  alternatives_spanish:
  - rechazan
  - reniegan de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Negar» reproduce la fuerza de repudio del verbo y encaja con el paralelismo del verso.
- source_word: ይነሥኡ ስሞ በከ
  english_pob_choice: take his name in vain
  chosen_spanish: toman su nombre en vano
  alternatives_spanish:
  - pronuncian su nombre falsamente
  - toman su nombre vacíamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es idiomática en español y transmite bien la idea de invocar el nombre de manera vacía o falsa; la nota conserva la alternativa más literal.
- source_word: ተደለወት
  english_pob_choice: has been prepared
  chosen_spanish: ha sido preparado
  alternatives_spanish:
  - ha sido dispuesto
  - ha sido dejado listo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la pasiva y la repetición retórica con el primer verbo de preparación.
- source_word: ሕሩያን
  english_pob_choice: the chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los selectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» es claro, bíblico y evita cargar el término con asociaciones doctrinales posteriores que el contexto no exige.
- source_word: መሐላ
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - juramento
  - juramentación
  - alianza jurada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La palabra puede significar juramento o vínculo jurado. «Pacto» es la opción más natural en español para expresar una relación solemne y favorable para los escogidos, mientras la nota preserva la alternativa de «juramento».
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - los impíos
  - los culpables
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Designación moral directa y contrastiva con «los escogidos».
- source_word: ሐተታ
  english_pob_choice: inquiry
  chosen_spanish: investigación
  alternatives_spanish:
  - indagación
  - examen
  - interrogatorio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Investigación» conserva el matiz judicial de escrutinio sobre los pecadores; en español suena más natural y preciso que «inquisición».
theological_decisions:
- issue: Título divino «Señor de los Espíritus»
  english_pob_reading: Fixed Enochic title preserved as "Lord of Spirits".
  chosen_spanish_reading: Conservar «Señor de los Espíritus» como título fijo del texto enociano.
  alternative_spanish_readings:
  - Señor de los espíritus
  rationale: El título es característico de 1 Enoc y conviene mantenerlo sin normalizarlo a un título más común. La mayúscula inicial de los sustantivos del título ayuda a señalar su carácter técnico.
  doctrine_reference: Preserve textual distinctiveness and apocalyptic title usage.
- issue: Frase verbal sobre quienes «toman su nombre en vano»
  english_pob_reading: Idiomatic rendering of a difficult Ge'ez expression for empty/false use of the divine name.
  chosen_spanish_reading: Traducir de forma idiomática como «toman su nombre en vano».
  alternative_spanish_readings:
  - pronuncian su nombre falsamente
  - lo toman vacíamente
  rationale: El español bíblico entiende bien la expresión, y la nota conserva la literalidad aproximada del giro ge'ez sin borrar la dificultad textual.
  doctrine_reference: Preserve lexical ambiguity while giving readable Spanish.
- issue: Renderizado de መሐላ para los escogidos
  english_pob_reading: Covenant in main text, with 'oath' as alternative.
  chosen_spanish_reading: Usar «pacto» en el texto principal, con «juramento» en nota.
  alternative_spanish_readings:
  - juramento
  - juramento solemne
  rationale: La revisión contextual favorece un sentido relacional y vinculante para los escogidos. «Pacto» funciona mejor en español que «juramento» como equivalente principal, pero la ambigüedad semántica debe quedar visible.
  doctrine_reference: Preserve ambiguity with footnotes where contested.
- issue: Base textual del título tras la revisión crítica
  english_pob_reading: English audit preserved 'Lord of righteousness', but later revision notes an OCR issue and points toward a righteousness/justice reading rather than a second 'Lord' title.
  chosen_spanish_reading: Reflejar la idea con «Señor de la justicia» en el cuerpo principal, señalando la alternativa textual.
  alternative_spanish_readings:
  - Señor de la rectitud
  - righteous law / righteous judgment (not used in main text)
  rationale: Dado que el expediente de revisión indica un problema en el OCR ge'ez y un trasfondo textual diferente al del borrador inicial, el español debe evitar reforzar una lectura posiblemente errónea. «Señor de la justicia» conserva el valor moral del pasaje sin decidir indebidamente entre reconstrucciones críticas más técnicas.
  doctrine_reference: Original-language primacy over translation tradition; preserve textual tension.
translation_notes:
  revision_awareness: La revisión crítica posterior señala que el texto ge'ez transmitido en el paquete tiene un problema de OCR y que el audit trail inglés oscila entre una lectura con «Lord of righteousness» y una reconstrucción crítica con «righteous law / righteous judgment». Para el español, se ha evitado seguir ciegamente la formulación inicial y se ha optado por una redacción que conserve el tono apocalíptico, pero haga visible la ambigüedad textual mediante decisiones léxicas y notas. Asimismo, se mantuvo el valor judicial de los sustantivos finales y se prefirió una equivalencia española natural sin borrar la tensión del original.
  spanish_consistency_notes:
  - Se usa «Señor de los Espíritus» para el título enociano fijo, con mayúsculas iniciales por tratarse de una designación técnica.
  - «Señor de la justicia» se emplea en el texto principal para mantener la referencia moral del pasaje y evitar asentir indebidamente a una lectura OCR problemática.
  - «Los escogidos» y «los pecadores» conservan el contraste antitético del texto.
  - «Pacto» se reserva como traducción principal de መሐላ, con la alternativa «juramento» en nota.
  - La puntuación con rayas reproduce la clausura enfática del período apocalíptico.
