review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran parte el texto inglés auditado, pero no preserva fielmente toda la evidencia interna del expediente. El punto principal es la inconsistencia entre el texto principal y las decisiones léxicas/teológicas: el español mantiene «Señor de la justicia» como si fuera un título fijo, mientras el propio expediente reconoce una incertidumbre textual importante en esa zona. Dado que la revisión inglesa vigente vuelve a «Lord of righteousness», no conviene introducir en español una reinterpretación explicativa más libre («de la justicia») sin nota. Además, el borrador usa «investigación» donde el inglés POB final usa «inquisition» y donde el campo semántico exige un escrutinio judicial más marcado que una simple investigación.'
  spanish_quality_summary: 'El español es generalmente claro y legible, pero tiene algunos detalles mejorables: «vengan el día, el poder...» es gramaticalmente posible, aunque «lleguen» suena más natural con una serie de sustantivos abstractos; «Señor de los Espíritus» capitaliza innecesariamente «Espíritus» dentro del título en español corriente; «Señor de la justicia» suena idiomático pero atenúa la extrañeza del original/audit trail; y «investigación» rebaja el tono judicial. El resto del verso fluye bien y las notas están bien formuladas.'
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías/etc. Sí hay una cuestión de consistencia terminológica con δικαιοσύνη/righteousness: en este contexto conviene preferir «rectitud» o una formulación que preserve la cualidad moral más que una abstracción legal como «justicia», especialmente porque el inglés auditado conserva deliberadamente la rareza del título. También conviene mantener «Señor de los espíritus» con mayúscula solo en «Señor», conforme al español estándar para títulos divinos compuestos.'
  issues:
  - severity: high
    issue: «Señor de la justicia» no refleja de forma suficientemente fiel la lectura inglesa auditada ni la incertidumbre textual documentada.
    rationale: 'El expediente contiene tensión textual real: una revisión propuso «ley justa / juicio justo», pero la revisión posterior inglesa restauró «Lord of righteousness». El borrador español no debería resolver esa tensión por su cuenta mediante una reformulación interpretativa. Debe seguir el texto POB vigente o, si se aparta, explicarlo en nota. Sin nota, «de la justicia» normaliza demasiado y cambia el matiz.'
  - severity: medium
    issue: «Investigación» debilita el matiz judicial de ሐተታ.
    rationale: El inglés POB final usa «inquisition» precisamente para expresar escrutinio judicial formal. En español, «investigación» es entendible pero demasiado general. «Inquisición» o «indagación judicial» preserva mejor la severidad forense del contexto apocalíptico.
  - severity: low
    issue: Capitalización de «Espíritus» en «Señor de los Espíritus».
    rationale: 'En español estándar, dentro de títulos divinos compuestos normalmente basta mayúscula en el nombre principal: «Señor de los espíritus». Mantiene dignidad sin calcado innecesario del inglés.'
  - severity: low
