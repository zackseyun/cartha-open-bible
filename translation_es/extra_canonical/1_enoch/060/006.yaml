base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/060/006.yaml
  text: And when the day and the power and the punishment and the judgment come[a], which the Lord of Spirits has prepared for those who do not bow down to the Lord of righteousness, and for those who deny the Lord of righteousness, and for those who take his name in vain—that day has been prepared for the chosen as a covenant[e][d][c][b], and for sinners as an inquisition.
  footnotes:
  - marker: a
    text: '''Punishment'' could also be rendered ''scourge'' or ''plague''; the Ge''ez term can denote a punitive blow or affliction.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'take up his name emptily/falsely'; the exact idiom is difficult, and 'take his name in vain' is an idiomatic rendering of the likely sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the chosen, an oath' rather than 'a covenant.'
    reason: lexical_alternative
  - marker: d
    text: '''Inquiry'' may also be understood as ''investigation'' or ''examination,'' emphasizing judicial scrutiny of sinners.'
    reason: lexical_alternative
  - marker: e
    text: Or 'to the Lord of righteousness, and for those who deny the Lord of righteousness'.
    reason: previous_rendering
