base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/060/021.yaml
  text: And when the spirit of the rain is stirred from its storehouse[a], the angels come and open the storehouse and bring it out. And when it is scattered upon all the dry ground, it is joined with the water that is upon the dry ground; and whenever it is joined with the water upon the dry ground . [d][c][b]. .
  footnotes:
  - marker: a
    text: The Ge'ez repeats the clause about being joined with the water upon the dry ground. The final phrase is difficult; it may indicate continued mingling or continued presence once the rain has joined the surface waters.
    reason: textual_variant
  - marker: b
    text: The verb rendered 'is poured out' can also carry the sense 'is scattered' or, more literally, 'is sown,' an image that suits rain spread over the land.
    reason: lexical_alternative
  - marker: c
    text: Or 'and whenever it is joined with the water upon the dry ground, it remains there at all times.'.
    reason: previous_rendering
  - marker: d
    text: Or 'is poured out'.
    reason: previous_rendering
