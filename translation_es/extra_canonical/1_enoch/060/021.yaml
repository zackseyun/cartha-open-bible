translation:
  language: es
  text: Y cuando el espíritu de la lluvia es agitado desde su depósito[a], los ángeles vienen y abren el depósito y lo sacan. Y cuando es esparcida sobre toda la tierra seca, se une al agua que está sobre la tierra seca; y cuando se une al agua sobre la tierra seca . . .
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez repite la cláusula sobre unirse al agua que está sobre la tierra seca. La frase final es difícil; puede indicar mezcla continua o presencia continua una vez que la lluvia se ha unido a las aguas de la superficie.
    reason: textual_variant
lexical_decisions:
- source_word: መንፈሱ
  english_pob_choice: the spirit of
  chosen_spanish: el espíritu de
  alternatives_spanish:
  - su viento
  - su aliento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cosmológico, መንፈስ conserva una fuerza personal o animada. «Espíritu de la lluvia» sigue de cerca la elección inglesa y evita reducir el pasaje a meteorología impersonal.
- source_word: ለዝናም
  english_pob_choice: the rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - la precipitación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lluvia» es el equivalente más directo y natural en español; mantiene el referente concreto sin tecnicismos innecesarios.
- source_word: ይትኃወስ
  english_pob_choice: is stirred
  chosen_spanish: es removido
  alternatives_spanish:
  - es agitado
  - es puesto en movimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo sugiere ser movido o puesto en actividad. «Es removido» comunica el desalojo desde el depósito y su activación, con estilo digno y comprensible.
- source_word: መዝገበ
  english_pob_choice: storehouse
  chosen_spanish: almacén
  alternatives_spanish:
  - depósito
  - tesoro
  - reposición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Almacén» conserva la imagen concreta de un lugar donde se guarda algo para su extracción posterior. «Depósito» también sería posible, pero «almacén» es más transparente en español.
- source_word: ይመጽኡ መላእክት
  english_pob_choice: the angels come
  chosen_spanish: los ángeles vienen
  alternatives_spanish:
  - los ángeles llegan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la acción personal y activa de los ángeles. «Vienen» respeta la direccionalidad simple del verbo sin añadir matices narrativos.
- source_word: ያርኅዉ
  english_pob_choice: open
  chosen_spanish: abren
  alternatives_spanish:
  - desbloquean
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa la acción de abrir el almacén. «Abren» es la opción más natural y no añade la especificidad de «desbloquear».
- source_word: ያወጽእዎ
  english_pob_choice: bring it out
  chosen_spanish: lo sacan
  alternatives_spanish:
  - lo hacen salir
  - lo extraen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lo sacan» conserva la transitividad y la sencillez del gesto de extraer lo guardado. En español es más idiomático que una traducción más literal y pesada.
- source_word: ይዘራእ
  english_pob_choice: is scattered / is poured out
  chosen_spanish: es esparcida
  alternatives_spanish:
  - es sembrada
  - es derramada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasaje usa un verbo emparentado con sembrar/esparcir. «Es esparcida» preserva la dispersión sobre la tierra y evita la simplificación de «derramada», que enfatizaría solo el vertido.
- source_word: የብስ
  english_pob_choice: dry ground
  chosen_spanish: tierra seca
  alternatives_spanish:
  - suelo seco
  - tierra firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tierra seca» reproduce el contraste con el agua sobre la superficie seca y suena natural en español bíblico contemporáneo.
- source_word: ይትኃበር ምስለ ማይ
  english_pob_choice: is joined with the water
  chosen_spanish: es unida con el agua
  alternatives_spanish:
  - se mezcla con el agua
  - se junta con el agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva/reflexiva del original queda bien en «es unida con». Mantiene la idea de incorporación sin forzar una explicación del mecanismo.
- source_word: በኵሉ ጊዜ
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - continuamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado que el texto fuente queda cortado y no completa la cláusula, se evita introducir una conclusión inexistente. «En todo tiempo» se conserva solo en el sentido de la repetición potencial, sin cerrar la frase.
theological_decisions:
- issue: Agencia apocalíptica de la lluvia frente a meteorología impersonal
  english_pob_reading: Retain 'the spirit of the rain' and angelic administration of the storehouse
  chosen_spanish_reading: Mantener «el espíritu de la lluvia» y la administración angélica del almacén
  alternative_spanish_readings:
  - Cuando la lluvia sale de su depósito
  - Cuando se libera la lluvia desde su reserva
  rationale: El pasaje presenta fenómenos naturales bajo administración celestial. La traducción conserva esa cosmología en vez de nivelarla a lenguaje meteorológico moderno.
  doctrine_reference: 'Principio de traducción: prioridad del imaginario apocalíptico y de la evidencia del texto original.'
- issue: Final incompleto del versículo
  english_pob_reading: The Ge'ez text ends in an incomplete clause; do not invent a resolution
  chosen_spanish_reading: Terminar con puntos suspensivos sin completar la idea
  alternative_spanish_readings:
  - Suprimir el tramo final
  - Parafrasear una continuidad implícita
  rationale: El original y el control textual señalan una cláusula truncada. La versión española debe reflejar esa incompletitud sin añadir una conclusión interpretativa.
  doctrine_reference: Fidelidad textual y transparencia editorial en ediciones críticas.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión posterior que corrigió una lectura completiva indebida: el final del versículo debe quedar abierto, sin añadir «permanece allí» ni otra conclusión. También se conservó la idea de dispersión/esparcimiento para el verbo de la lluvia, en vez de reducirlo a un simple derramamiento.'
  spanish_consistency_notes:
  - Se mantiene «espíritu» para መንፈስ en coherencia con la lectura apocalíptica del pasaje.
  - Se usa un registro digno y claro, sin archaísmos innecesarios.
  - Se conserva la estructura repetitiva del original, pero se evita cerrar la última cláusula.
  - «Almacén» se usa de forma consistente para መዝገብ como lugar de depósito celestial.
