translation:
  language: es
  text: 'Y me dijo[a]: «Tú, hijo de hombre[b], aquí tú deseas entender[c] lo que está oculto[d]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te habló». La fórmula ge''ez es una expresión narrativa de habla directa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ser humano» o «mortal». Aquí «hijo de hombre» es un apelativo dirigido al vidente, no necesariamente la figura exaltada llamada «el Hijo del Hombre» en otras partes.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «comprender». También puede puntuarse: «Tú, hijo de hombre, aquí deseas entender lo que está oculto».'
    reason: previous_rendering
  - marker: d
    text: 'También puede traducirse: «la cosa oculta», «lo escondido» o «aprender/conocer lo oculto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይቤለኒ
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Y me habló
  - Y me habló diciendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula narrativa ge'ez de habla directa se vierte de manera natural y elevada con «me dijo», que conserva el tono formal y el movimiento hacia el discurso directo.
- source_word: አንተ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - As you
  - Tú mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pronombre explícito mantiene el énfasis del original; en español puede conservarse con «Tú» sin sonar forzado.
- source_word: ወልደ ሰብእ
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  - hijo de la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la expresión semítica tradicional de forma más transparente en español con «hijo de hombre», para mantener el registro apocalíptico y la tensión interpretativa sin convertirla en una paráfrasis.
- source_word: በዝየ
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - en este punto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Aquí» reproduce la fuerza deíctica inmediata del adverbio con naturalidad en español.
- source_word: ትፈቅድ
  english_pob_choice: desire
  chosen_spanish: deseas
  alternatives_spanish:
  - quieres
  - anhelas
  - prefieres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa volición; «deseas» mantiene el matiz más elevado que «quieres» y encaja con el contexto revelatorio.
- source_word: ታእምር
  english_pob_choice: to understand
  chosen_spanish: entender
  alternatives_spanish:
  - comprender
  - conocer
  - percibir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea central es el acceso cognitivo a un secreto revelado; «entender» es claro y fiel, sin introducir una connotación excesivamente técnica.
- source_word: ዘኅቡእ
  english_pob_choice: what is hidden
  chosen_spanish: lo que está oculto
  alternatives_spanish:
  - lo escondido
  - lo secreto
  - la cosa oculta
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: La construcción relativa apunta a algo velado o reservado; «lo que está oculto» suena natural en español y conserva la referencia a un contenido no revelado.
theological_decisions:
- issue: Valor de ወልደ ሰብእ como apelativo en 1 Enoc 60:10
  english_pob_reading: son of man as an address to the seer, not necessarily the exalted figure called 'the Son of Man' elsewhere in the Parables.
  chosen_spanish_reading: hijo de hombre como vocativo dirigido al vidente, sin identificarlo automáticamente con la figura exaltada llamada «el Hijo del Hombre» en otras partes de las Parábolas.
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: La traducción literal conserva el giro semítico y la ambigüedad deliberada del pasaje. En español, «hijo de hombre» mantiene el posible enlace literario con otras ocurrencias sin resolverlo prematuramente.
  doctrine_reference: Preservar la tensión textual y cristológica/apocalíptica donde el texto la deja abierta.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y la revisión más reciente, que mantenía el sentido sin cambios. Se evitó calcar el inglés y se ajustó la sintaxis para que el énfasis de አንተ quede natural en español con «Tú» al inicio del vocativo. Se mantuvo la ambigüedad de ወልደ ሰብእ con una forma semítica transparente.
  spanish_consistency_notes:
  - Se prefirió «hijo de hombre» por coherencia con el registro apocalíptico y para no borrar la tensión documentada por la POB.
  - «oculto»/«oculta» se eligió como equivalente natural de ዘኅቡእ sin introducir «misterio», que sería una intensificación no exigida por el contexto.
  - La puntuación reproduce el vocativo y la cita directa de manera fluida para lectura pública.
