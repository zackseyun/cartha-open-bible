translation:
  language: es
  text: 'Y los tesoros de los espíritus[a][b], y cómo los espíritus se dividen, y cómo son pesados y contados, y los portales de los espíritus son enumerados, cada uno según la fuerza del espíritu, y sus poderes para la luz de la luna, y según la fuerza de la rectitud[c], y las divisiones de las estrellas por sus nombres: toda división será distribuida.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge’ez de este versículo es textual y sintácticamente difícil; expresiones traducidas aquí como «pesados», «contados» y «portales» también pueden entenderse más generalmente como medidos, enumerados o compartimentos/depósitos.
    reason: textual_variant
  - marker: b
    text: «Espíritus» también puede leerse como «vientos»; el término ge’ez permite ambas posibilidades, y el pasaje puede conservar deliberadamente esa ambigüedad entre poderes cósmicos y fuerzas atmosféricas.
    reason: lexical_alternative
  - marker: c
    text: O «justicia». Aquí se prefiere «rectitud» para conservar mejor el matiz de orden justo y teológico que refleja la decisión documentada del POB inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: መዛግብተ
  english_pob_choice: treasuries
  chosen_spanish: tesoros
  alternatives_spanish:
  - almacenes
  - depósitos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un registro apocalíptico, ‘tesoros’ conserva la idea de reservas celestiales guardadas y suena más natural en español que un calco como ‘almacenes’. Mantiene el tono elevado del inglés POB sin perder la noción de depósito reservado.
- source_word: መንፈሳት
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - vientos
  - alientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La ambigüedad ge’ez entre espíritu, viento y aliento se preserva mejor con ‘espíritus’, que permite la lectura cósmica/personificada que el POB inglés defendió. ‘Vientos’ resolvería demasiado pronto la tensión.
- source_word: ይትካፈሉ
  english_pob_choice: shall be divided
  chosen_spanish: son divididos
  alternatives_spanish:
  - serán divididos
  - son repartidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo en presente mantiene la cadena descriptiva y el paralelismo del enunciado. ‘Divididos’ conserva el campo semántico de distribución ordenada.
- source_word: ይደሉ
  english_pob_choice: shall be weighed out
  chosen_spanish: son pesados
  alternatives_spanish:
  - son medidos
  - son tasados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen de peso/medición exacta se entiende mejor en español con ‘pesados’; el matiz de evaluación precisa queda implícito sin introducir una expresión forzada.
- source_word: ይኄለቁ
  english_pob_choice: reckoned
  chosen_spanish: contados
  alternatives_spanish:
  - enumerados
  - calculados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Contados’ transmite el sentido administrativo de contabilización celestial y encaja con la secuencia ‘divididos, pesados y contados’. ‘Enumerados’ se reserva para el siguiente sintagma con ‘portales’.
- source_word: አናቅፅ
  english_pob_choice: portals
  chosen_spanish: portales
  alternatives_spanish:
  - puertas
  - umbrales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se sigue la corrección revisada del auditor: el término es ‘portales’/‘gates’, no ‘chambers’. ‘Portales’ conserva la cosmología enochica y suena más solemne que ‘puertas’.'
- source_word: በበኀይለ መንፈስ
  english_pob_choice: by the power of the spirit
  chosen_spanish: según la fuerza del espíritu
  alternatives_spanish:
  - por la fuerza del espíritu
  - conforme al poder del espíritu
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia distributiva ‘cada uno’ exige en español una relación de medida o asignación más que una causalidad simple. ‘Según la fuerza del espíritu’ refleja mejor el valor de reparto por medida y evita perder la ambigüedad entre espíritu y fuerza.
- source_word: ለብርሃነ ወርኅ
  english_pob_choice: for the light of the moon
  chosen_spanish: para la luz de la luna
  alternatives_spanish:
  - para el resplandor de la luna
  - para la claridad de la luna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una construcción genitiva directa; ‘luz de la luna’ es transparente y fiel, con un registro natural en español.
- source_word: ኀይለ ጽድቅ
  english_pob_choice: the power of righteousness
  chosen_spanish: la fuerza de la justicia
  alternatives_spanish:
  - el poder de la justicia
  - la fuerza de la rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés POB prefirió ‘righteousness’, en español ‘justicia’ comunica mejor el peso de orden recto y divino sin sonar moralista en exceso. Se mantiene la fuerza léxica de ኀይል con ‘fuerza’.
- source_word: ክፍላተ ከዋክብት
  english_pob_choice: the divisions of the stars
  chosen_spanish: las divisiones de las estrellas
  alternatives_spanish:
  - los repartos de las estrellas
  - las porciones de las estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Divisiones’ reproduce el esquema de partición cósmica del versículo y enlaza con el verbo final de reparto. ‘Estrellas’ se mantiene literal.
- source_word: በበ ስሞሙ
  english_pob_choice: by their names
  chosen_spanish: por sus nombres
  alternatives_spanish:
  - según sus nombres
  - con sus nombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula funciona en español con ‘por sus nombres’, breve y clasificada, sin sobreexplicar la relación nominal.
- source_word: ኵሉ ክፍለ ይትከፈል
  english_pob_choice: every division shall be apportioned
  chosen_spanish: toda división será distribuida
  alternatives_spanish:
  - cada división será repartida
  - toda porción será asignada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Distribuida’ conserva el cierre distributivo del verso y evita repetir ‘divididos’. ‘Toda’ mantiene el carácter totalizante del final.
theological_decisions:
- issue: Cómo preservar la ambigüedad de መንፈሳት entre espíritus y vientos
  english_pob_reading: spirits
  chosen_spanish_reading: espíritus
  alternative_spanish_readings:
  - vientos
  - alientos
  rationale: El POB inglés opta por ‘spirits’ para mantener la ambigüedad cosmológica. En español se conserva con ‘espíritus’, sin cerrar la posibilidad atmosférica; la nota explica la alternativa, pero el texto principal sigue la lectura numinosa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Cómo traducir ጽድቅ en un contexto de orden cósmico
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - righteousness
  rationale: En español, ‘justicia’ comunica de manera más natural la idea de orden correcto y medida divina. No se trata de un cambio doctrinal, sino de una equivalencia estilística que conserva el peso ético-cósmico del término.
  doctrine_reference: 'Contested terms table: δικαιοσύνη → justicia / rectitud'
translation_notes:
  revision_awareness: El texto español incorpora la revisión que corrige la lectura de አፎ como ‘cómo’ y de አናቅፅ como ‘portales’, no ‘nubes’ ni ‘cámaras’. También atiende la observación distributiva sobre በበ (‘cada uno / por sus’), manteniendo la cadena de partición, medición y contabilización sin introducir elementos no sustentados por el ge’ez.
  spanish_consistency_notes:
  - Se usa ‘espíritus’ de forma consistente para መንፈሳት, con nota de ambigüedad hacia ‘vientos’.
  - Se evita ‘Señor’ o ‘Cristo’, pues el versículo no contiene esos términos.
  - Se mantiene el registro apocalíptico con vocabulario de reparto, medida y orden celestial.
  - La puntuación con dos puntos antes del cierre ayuda a reflejar la clausura enfática del verso sin añadir contenido.
