translation:
  language: es
  text: Y en aquel día fueron separados los dos monstruos, una hembra, cuyo nombre era Lewyatan[a], para habitar en el abismo del mar[b][c], sobre las fuentes de las aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lewyatan es el nombre bien conocido de la criatura marina, a menudo vertido como «Leviatán».
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la profundidad del mar»; el término ge''ez denota una región honda o abismal.'
    reason: lexical_alternative
  - marker: c
    text: La formulación sitúa su dominio en relación con «las fuentes de las aguas», conservando la imaginería cosmológica antigua más que una descripción geográfica moderna.
    reason: cultural_note
lexical_decisions:
- source_word: ተካፈሉ
  english_pob_choice: were separated
  chosen_spanish: fueron separados
  alternatives_spanish:
  - se dividieron
  - fueron apartados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto ge'ez expresa una acción ya ocurrida; por eso el español debe ir en pasado. 'Fueron separados' conserva el valor pasivo y el tono cósmico del relato.
- source_word: በይእቲ ዕለት
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula apocalíptica temporal. 'En aquel día' suena natural en español y mantiene el registro profético.
- source_word: ክልኤቱ ዐናብርት
  english_pob_choice: the two monsters
  chosen_spanish: los dos monstruos
  alternatives_spanish:
  - las dos bestias
  - las dos criaturas grandes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Monstruos'' conserva la extrañeza y escala mítica de los seres sin rebajarlos a animales ordinarios.'
- source_word: ዐንበሪ አንስትያዊት
  english_pob_choice: one female monster
  chosen_spanish: una hembra
  alternatives_spanish:
  - una criatura hembra
  - la hembra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa optó por no repetir 'monster' y explicitar la cualidad femenina. En español, 'hembra' reproduce esa apposición de manera breve y fiel, sin añadir información ajena.
- source_word: ዘስማ ሌዋያታን
  english_pob_choice: whose name was Lewyatan
  chosen_spanish: cuyo nombre era Lewyatan
  alternatives_spanish:
  - cuyo nombre era Leviatán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la forma etiópica/transliterada que sigue la política del proyecto para nombres propios, manteniendo a la vez su reconocibilidad.
- source_word: ከመ ትኅድር
  english_pob_choice: to dwell
  chosen_spanish: para habitar
  alternatives_spanish:
  - para morar
  - para vivir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El infinitivo final expresa destino o finalidad. 'Habitar' mantiene un registro elevado y adecuado a una morada cósmica.
- source_word: በልጕተ ባሕር
  english_pob_choice: in the abyss of the sea
  chosen_spanish: en el abismo del mar
  alternatives_spanish:
  - en la profundidad del mar
  - en el hondo del mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Abismo'' conserva la fuerza cosmológica del término ge''ez y la imaginería primordial del pasaje.'
- source_word: መልዕልተ አነቅዕተ ማያት
  english_pob_choice: above the springs of the waters
  chosen_spanish: encima de las fuentes de las aguas
  alternatives_spanish:
  - sobre los manantiales de las aguas
  - encima de los manantiales de agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fuentes de las aguas'' conserva la imaginería cosmológica antigua; ''encima de'' refleja la relación espacial explícita del original sin modernizarla.'
theological_decisions:
- issue: Conservación de la imaginería cosmogónica de seres primordiales
  english_pob_reading: the two monsters
  chosen_spanish_reading: los dos monstruos
  alternative_spanish_readings:
  - las dos bestias
  - las dos criaturas
  rationale: El texto describe seres mítico-apocalípticos con dominios asignados. 'Monstruos' preserva su carácter extraordinario sin domesticarlos ni reinterpretarlos como animales comunes.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten cosmic imagery into generic prose.'
- issue: Nombre propio mediado por el testimonio ge'ez
  english_pob_reading: Lewyatan
  chosen_spanish_reading: Lewyatan
  alternative_spanish_readings:
  - Leviatán
  rationale: Se mantiene la transliteración derivada del ge'ez, mientras que la forma familiar 'Leviatán' queda implícitamente como alternativa tradicional; esto respeta la fuente y la política del proyecto sobre nombres.
  doctrine_reference: 'Translation philosophy: translate titles; transliterate names.'
translation_notes:
  revision_awareness: 'El texto español sigue la última revisión del inglés: corrige el tiempo verbal al pasado (''fueron separados'') conforme al perfecto ge''ez, mantiene la apposición femenina como ''una hembra'' según la revisión más reciente, y conserva el nombre transliterado Lewyatan. También se respeta la ubicación cosmológica del pasaje: el abismo del mar en relación con las fuentes de las aguas.'
  spanish_consistency_notes:
  - He evitado el uso de 'SEÑOR' o de terminología cristianizada no pertinente, porque el versículo no contiene el Tetragrámaton ni lenguaje cultual que lo exija.
  - '''Abismo del mar'' mantiene la fuerza semítica/cosmológica del original y resulta más consistente con el registro apocalíptico que ''profundidad'' en esta línea.'
  - La coordinación 'encima de las fuentes de las aguas' conserva la relación espacial explícita sin aclaraciones interpretativas adicionales.
