translation:
  language: es
  text: Y la Cabeza de Días estaba sentado en el trono de su gloria[a], y los ángeles y los justos estaban de pie alrededor de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el Anciano de Días’. El título ge'ez se vierte aquí de manera más literal como ‘la Cabeza de Días’ para preservar la redacción propia de este pasaje sin importar de entrada la formulación más familiar de Daniel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ርእሰ መዋዕል
  english_pob_choice: the Head of Days
  chosen_spanish: el Cabeza de Días
  alternatives_spanish:
  - el Anciano de Días
  - la Cabeza de los Días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro ge'ez conserva un título enigmático y propio de 1 Enoc. Para no borrar su literalidad ni armonizarlo de inmediato con Daniel, se mantiene una traducción muy cercana a la forma del original. En español, 'Cabeza de Días' reproduce el valor formal de 'Head of Days' mejor que 'Anciano de Días', que introduce una identificación tradicional no explícita aquí.
- source_word: መንበረ ስብሐቲሁ
  english_pob_choice: the throne of his glory
  chosen_spanish: el trono de su gloria
  alternatives_spanish:
  - su trono glorioso
  - el asiento de su gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción posesiva se mantiene de modo directo para conservar el registro elevado y la imagen concreta de entronización. 'El trono de su gloria' es natural en español y refleja bien la relación genitiva del texto.
- source_word: ይነብር
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentaba
  - estaba sentado en su trono
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario, el imperfectivo describe una escena en curso. 'Estaba sentado' conserva mejor esa continuidad que un pretérito simple. Se evita 'se sentaba' porque en español puede sonar menos solemne y más habitual que la postura entronizada que aquí se describe.
- source_word: መላእክት
  english_pob_choice: the angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - ángeles
  - los mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es la corte celestial apocalíptica; por eso 'ángeles' es la opción más precisa y transparente para el lector español.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: Dillmann, Lexicon Lingae Aethiopicae
  rationale: En literatura enóquica, el grupo designa a las personas fieles y moralmente aprobadas. 'Los justos' es la forma más natural en español y preserva esa identidad colectiva. Se evita 'rectos' por ser menos idiomático en este contexto.
- source_word: አውዶ
  english_pob_choice: around him
  chosen_spanish: alrededor de él
  alternatives_spanish:
  - en torno a él
  - cerca de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Alrededor de él'' expresa de manera clara la disposición de la corte celestial en torno al entronizado. Es una equivalencia directa y plenamente natural.'
- source_word: ይቆውሙ
  english_pob_choice: were standing
  chosen_spanish: estaban de pie
  alternatives_spanish:
  - estaban en pie
  - se mantenían de pie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La postura de los asistentes se expresa en español de forma más idiomática con 'estar de pie'. Con ello se mantiene la escena de reverencia y servicio ante el trono.
theological_decisions:
- issue: Título divino ርእሰ መዋዕል y su relación con la tradición de Daniel
  english_pob_reading: the Head of Days
  chosen_spanish_reading: el Cabeza de Días
  alternative_spanish_readings:
  - el Anciano de Días
  - la Cabeza de los Días
  rationale: La decisión sigue la estrategia de no importar automáticamente la formulación más conocida de Daniel. En español, 'Cabeza de Días' conserva la rareza y la literalidad del título enóquico, aunque suene inusual; precisamente esa inusualidad refleja que el texto no usa aquí una expresión ya domesticada por la tradición bíblica posterior.
  doctrine_reference: Translation philosophy §1, §3; notas de contexto sobre evitar la harmonización excesiva en los Parables
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa que prefirió 'on the throne' sobre 'upon the throne' por naturalidad. También mantiene la elección literal 'Head of Days' frente a la alternativa daniélica, conforme al control de acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma predeterminada del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - '''Justos'' se usa como grupo sustantivado, coherente con el registro apocalíptico y con el valor colectivo de ጻድቃን.'
  - La puntuación y el orden de los miembros de la oración siguen de cerca la estructura del original para conservar el paralelismo de la escena celestial.
