translation:
  language: es
  text: Y el trueno[a], según sus lugares de impacto, y para cada división que es dividida por el relámpago, para que destelle[b]—y su contención[c], para que oigan rápidamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El geʽez es difícil. «Según sus lugares de impacto» intenta seguir la revisión que entiende el sustantivo como el lugar donde cae el rayo; también podría entenderse como «en sus lugares» o «según sus medidas».
    reason: lexical_alternative
  - marker: b
    text: El original es oscuro; también puede entenderse de manera más general como «para que relampaguee».
    reason: lexical_alternative
  - marker: c
    text: El término final también puede sugerir paciencia, resistencia o contención. En este contexto meteorológico, «contención» intenta reflejar la idea de una fuerza retenida o regulada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ነጐድጓድ
  english_pob_choice: thunder
  chosen_spanish: trueno
  alternatives_spanish:
  - tronido
  - trueno y estruendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ነጐድጓድ» nombra el trueno. «Trueno» conserva la imagen cósmica y apocalíptica sin añadir explicación innecesaria.
- source_word: በበመዳቃቲሆሙ
  english_pob_choice: according to their places of striking
  chosen_spanish: según sus lugares de impacto
  alternatives_spanish:
  - en sus lugares de caída
  - según sus estaciones
  - en sus lugares de golpe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente aclara que el sustantivo remite al «lugar donde cae» el rayo/relámpago. En español, «lugares de impacto» conserva esa concreción meteorológica mejor que una formulación abstracta como «estaciones».
- source_word: ኵሉ ክፍለ ዘይትከፈል
  english_pob_choice: every division that is divided
  chosen_spanish: cada división que es dividida
  alternatives_spanish:
  - toda parte que es repartida
  - cada sección que se separa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la repetición del original para no borrar la dureza expresiva del texto. «División» y «es dividida» reproducen la estructura cognada preservada por la POB inglesa.
- source_word: በመብረቅ
  english_pob_choice: by the lightning
  chosen_spanish: por el relámpago
  alternatives_spanish:
  - con el relámpago
  - mediante el relámpago
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Por el relámpago» conserva el valor instrumental del original sin sonar demasiado técnico. En español, «relámpago» es el término más natural para el fenómeno luminoso asociado a la tormenta.
- source_word: ከመ፡ ይበርቅ
  english_pob_choice: so that it may flash
  chosen_spanish: para que él destelle
  alternatives_spanish:
  - para que brille
  - para que relampaguee
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Destelle» comunica el brillo súbito y breve del rayo. El pronombre «él» intenta reflejar el sujeto singular implícito del verbo, aunque el pasaje es sintácticamente difícil.
- source_word: ትዕግሥቶሙ
  english_pob_choice: their restraint
  chosen_spanish: su contención
  alternatives_spanish:
  - su paciencia
  - su dominio de sí
  - su restricción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ትዕግሥት» puede implicar paciencia, resistencia o contención. Aquí «contención» conserva la idea de fuerza contenida o contenimiento de un fenómeno, que encaja mejor con el contexto meteorológico.
- source_word: ፍጡነ ይስምዑ
  english_pob_choice: they may hear quickly
  chosen_spanish: oigan rápidamente
  alternatives_spanish:
  - escuchen enseguida
  - obedezcan con rapidez
  - atiendan de inmediato
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB mantiene «hear» literalmente, pero señala la posible resonancia de respuesta u obediencia. «Oigan rápidamente» preserva la literalidad y deja abierta esa tensión semítica sin resolverla de forma interpretativa.
theological_decisions:
- issue: Si suavizar la secuencia meteorológica oscura hacia una afirmación más interpretativa sobre obediencia de fuerzas cósmicas
  english_pob_reading: Retain the concrete imagery of thunder, lightning, divisions, and restraint with minimal interpretive expansion
  chosen_spanish_reading: Conservar la imaginería concreta de trueno, relámpago, divisiones y contención con mínima expansión interpretativa
  alternative_spanish_readings:
  - Convertir el último miembro en obediencia explícita a una orden divina
  - Parafrasear todo el versículo como funcionamiento ordenado de los elementos de la tormenta
  rationale: La dificultad del pasaje forma parte de su valor textual. La versión española mantiene la tensión en vez de resolverla con paráfrasis doctrinal o literaria.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente que corrigió «according to their stations» a una referencia más concreta a «their places of striking/fall», y la pass final que simplificó la redacción de «flash forth» a «flash». La versión española sigue esa línea al usar «lugares de impacto» y «destelle», pero conserva la ambigüedad final de «oigan rápidamente», coherente con el audit trail que señala la posible lectura de obediencia además de audición literal.
  spanish_consistency_notes:
  - Se mantuvo «relámpago» para el fenómeno luminoso, evitando alternar con «rayo» salvo en la nota explicativa implícita del impacto.
  - Se usó «trueno» como término principal, en consonancia con la imaginería del pasaje y con el vocabulario bíblico español común.
  - Se evitó reemplazar la oscuridad sintáctica por una explicación más clara, para respetar la tensión textual documentada.
  - Se prefirió un registro formal y publicable, sin arcaísmos innecesarios ni calcos excesivamente duros.
