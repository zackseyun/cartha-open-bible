base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/060/013.yaml
  text: And the thunder[a], according to their places of striking, and for every division that is divided by the lightning, so that it may flash—and their restraint[d][c][b], so that they may hear quickly.
  footnotes:
  - marker: a
    text: The Ge'ez is difficult. 'According to their stations' may also mean 'in their places' or 'by their measures.'
    reason: lexical_alternative
  - marker: b
    text: '''Every division that is divided'' preserves the repetitive wording of the source; it may refer to each apportioned section of the storm phenomena.'
    reason: lexical_alternative
  - marker: c
    text: The final clause literally says 'that they may hear quickly.' In context this could imply swift responsiveness or obedience, not only auditory hearing.
    reason: lexical_alternative
  - marker: d
    text: Or 'according to their stations'.
    reason: previous_rendering
