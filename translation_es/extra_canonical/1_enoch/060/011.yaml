translation:
  language: es
  text: Y otro ángel[a], que iba conmigo y me mostró lo oculto, me dijo qué es lo primero y qué es lo último en el cielo, en la altura, y debajo de la tierra en la profundidad[b], y en los confines del cielo[c], y en los cimientos del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia es una lista de extremos cósmicos revelados a Enoc. «Lo primero y lo último» se entiende aquí de manera descriptiva, no como un título.
    reason: theological_note
  - marker: b
    text: El testimonio etíope es algo difícil en esta zona; la traducción conserva la referencia espacial de «profundidad» sin imponer un término más específico como «abismo».
    reason: textual_variant
  - marker: c
    text: 'O bien: «Y otro ángel, que iba conmigo y me mostró lo oculto, me dijo qué es lo primero y qué es lo último en el cielo, en la altura y debajo, en la profundidad y en los confines del cielo, y en los cimientos del cielo».

      '
    reason: previous_rendering
lexical_decisions:
- source_word: ወይቤለኒ
  english_pob_choice: said to me / told me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - me dijo a mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la fórmula narrativa simple de habla visionaria. «Me dijo» conserva la naturalidad del español y el tono directo del relato sin añadir matices no requeridos.
- source_word: መልአክ ካልእ
  english_pob_choice: another angel
  chosen_spanish: otro ángel
  alternatives_spanish:
  - un segundo ángel
  - un ángel más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Otro» comunica adecuadamente la idea de un ángel adicional sin forzar el matiz ordinal de «segundo».
- source_word: ዘምስሌየ የሐውር
  english_pob_choice: who went with me
  chosen_spanish: que iba conmigo
  alternatives_spanish:
  - que fue conmigo
  - que caminaba conmigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relación de compañía se expresa de modo idiomático con «iba conmigo», manteniendo el sentido de acompañamiento en la visión.
- source_word: ወዘበኀቤኡ ያርእየኒ
  english_pob_choice: and showed me
  chosen_spanish: y me mostró
  alternatives_spanish:
  - y me iba mostrando
  - y me hizo ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Me mostró» preserva la función revelatoria del ángel de manera clara y directa.
- source_word: ወዘኅቡእ
  english_pob_choice: what is hidden
  chosen_spanish: lo oculto
  alternatives_spanish:
  - lo escondido
  - lo que está oculto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura corregida apunta a algo oculto/revelado. «Lo oculto» es natural en español y mantiene el sustantivo neutro implícito.
- source_word: ቀዳሜ ወድኃሬ
  english_pob_choice: what is first and what is last
  chosen_spanish: lo primero y lo último
  alternatives_spanish:
  - el primero y el último
  - lo que es primero y lo que es último
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto descriptivo, «lo primero y lo último» evita convertir la expresión en un título y conserva el valor de extremidad o totalidad.
- source_word: በሰማየ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo celestial
  - en los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cielo» reproduce bien la localización cosmológica del pasaje y es más natural en español que una calca más rígida.
- source_word: በውስተ ላዕሉ ወበታሕተ ምድር በመዓምቅ
  english_pob_choice: in the height and beneath the earth in the depth
  chosen_spanish: en la altura y debajo de la tierra en la profundidad
  alternatives_spanish:
  - en lo alto y debajo de la tierra en el abismo
  - en la altura y bajo la tierra, en la profundidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase sigue la serie de extremos cósmicos. «Debajo de la tierra en la profundidad» conserva el paralelismo espacial sin imponer «abismo», que no está explicitado en el testimonio corregido.
- source_word: በአጽናፈ ሰማይ
  english_pob_choice: at the ends of heaven
  chosen_spanish: en los confines del cielo
  alternatives_spanish:
  - en los extremos del cielo
  - en las orillas del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Confines» transmite con solemnidad la idea de bordes/extremos del cielo y funciona bien en registro apocalíptico.
- source_word: በመሠረተ ሰማይ
  english_pob_choice: at the foundations of heaven
  chosen_spanish: en los cimientos del cielo
  alternatives_spanish:
  - en los fundamentos del cielo
  - en las bases del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cimientos» es una forma clara y visual de expresar la imaginería cosmológica de la base del cielo; conserva el valor arquitectónico del término.
theological_decisions:
- issue: Si la expresión ቀዳሜ ወድኃሬ debe sonar como título o como enumeración descriptiva
  english_pob_reading: what is first and what is last
  chosen_spanish_reading: lo primero y lo último
  alternative_spanish_readings:
  - el primero y el último
  - lo que es primero y lo que es último
  rationale: Aquí la expresión forma parte de un catálogo de extremos cósmicos mostrados al vidente. Se conserva el sentido descriptivo para no introducir una auto-designación titulada que el contexto no exige.
  doctrine_reference: Translation philosophy §1 Original-language primacy; §3 Preserve theological tension rather than resolve it
- issue: Cómo manejar el objeto verbal ligado a «me dijo» tras la corrección textual del testimonio etíope
  english_pob_reading: told me what is first and what is last in heaven, in the height, and beneath the earth in the depth...
  chosen_spanish_reading: me dijo que lo primero y lo último en el cielo, en la altura y debajo de la tierra en la profundidad...
  alternative_spanish_readings:
  - 'me dijo: lo primero y lo último...'
  - me mostró lo oculto y me dijo lo primero y lo último...
  rationale: La auditoría indica que el verbo de habla gobierna el contenido que sigue. El español lo expresa de forma continua para mantener el flujo visionario y la dependencia sintáctica del dicho.
  doctrine_reference: Translation philosophy §1 Original-language primacy; §2 Keep documented tensions visible
- issue: Tratamiento de «lo oculto» frente al posible eco de revelación no especificada
  english_pob_reading: showed me what is hidden
  chosen_spanish_reading: me mostró lo oculto
  alternative_spanish_readings:
  - me mostró lo que está oculto
  - me hizo ver lo oculto
  rationale: La frase se conserva breve y neutra. No se explicita el contenido de lo oculto porque el pasaje no lo desarrolla; así se mantiene la reserva del texto.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se tuvo en cuenta la última corrección del expediente, que restituye la lectura de «lo oculto» y ajusta la secuencia sintáctica para que «me dijo» gobierne el contenido de lo primero y lo último; también se respetó la aclaración de puntuación y la revisión del tramo sobre la tierra/profundidad.
  spanish_consistency_notes:
  - Se mantuvo «ángel» y no «mensajero», en coherencia con el audit trail inglés y con el registro apocalíptico del pasaje.
  - Se eligió «cielo» en singular para seguir el valor locativo del ge'ez y evitar una pluralización no exigida por la fuente.
  - Se evitó «SEÑOR» u otra terminología de sustitución porque el pasaje no contiene el nombre divino.
  - Se preservó el paralelismo de extremos espaciales con un español fluido pero no interpretativo.
