base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/060/011.yaml
  text: And another angel[a], who went with me and showed me what is hidden, told me what is first and what is last in heaven, in the height, and beneath the earth in the depth, and at the ends of heaven[c][b], and at the foundations of heaven.
  footnotes:
  - marker: a
    text: The line is a catalog of cosmic extremities revealed to Enoch. 'What is first and what is last' may also be rendered 'the first and the last,' but here it is taken descriptively rather than as a title.
    reason: lexical_alternative
  - marker: b
    text: The Ethiopic wording around 'in the depth' is somewhat difficult in this witness; the translation keeps the spatial sense without pressing to a more specific term such as 'abyss.'
    reason: textual_variant
  - marker: c
    text: Or 'And another angel, who went with me and showed me what is first and what is last in heaven, in the height and beneath, in the depth and at the ends of heaven, and at the foundations of heaven, said to me,'.
