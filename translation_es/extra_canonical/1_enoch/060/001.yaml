translation:
  language: es
  text: En el año quinientos, en el séptimo mes, el día catorce del mes, en la vida de Henoc, en aquella parábola vi que el cielo de los cielos[a] fue sacudido con un gran sacudimiento[c], y la hueste del Altísimo[b], y los ángeles, millares de millares y diez mil veces diez mil, fueron agitados con una gran conmoción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el más alto cielo'. El ge'ez dice literalmente 'el cielo de los cielos', una expresión superlativa para la esfera celestial más elevada.
    reason: lexical_alternative
  - marker: b
    text: La frase puede entenderse también como 'el poder del Altísimo', pero la mención inmediata de ángeles en número inmenso favorece el sentido colectivo de 'hueste'.
    reason: lexical_alternative
  - marker: c
    text: O 'fue sacudido violentamente'.
    reason: previous_rendering
lexical_decisions:
- source_word: በዓመት ፭ምእት
  english_pob_choice: in the five-hundredth year
  chosen_spanish: En el año quinientos
  alternatives_spanish:
  - En el año quingentésimo
  - En el año de quinientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión fija la fecha de la visión. En español, 'año quinientos' suena natural y conserva el valor cronológico sin forzar un ordinal poco idiomático en este contexto narrativo.
- source_word: በወርኅ ሳብዕ
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - en mes séptimo
  - en el mes siete
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Renderiza de forma directa la referencia temporal y mantiene el registro solemne del pasaje.
- source_word: አመ ዐሡሩ ወረቡዑ ለወርኅ
  english_pob_choice: on the fourteenth day of the month
  chosen_spanish: el día catorce del mes
  alternatives_spanish:
  - el catorce del mes
  - en el día catorce del mes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción numérica se vierte de modo idiomático en español. Se conserva el valor exacto de la fecha.
- source_word: በሕይወተ ሄኖክ
  english_pob_choice: in the life of Henok
  chosen_spanish: en la vida de Henoc
  alternatives_spanish:
  - durante la vida de Henoc
  - en la existencia de Henoc
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la formulación literal 'vida', porque el ge'ez la usa explícitamente y forma parte del encuadre solemne de la visión. 'Henoc' sigue la forma española habitual del nombre.
- source_word: በውእቱ አምሳል
  english_pob_choice: in that parable
  chosen_spanish: en aquella parábola
  alternatives_spanish:
  - en aquel símil
  - en aquella visión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Parábola'' mantiene la conexión con la división literaria local del libro, y ''aquella'' reproduce el valor demostrativo del original.'
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo visionario directo y sobrio, adecuado al tono apocalíptico.
- source_word: ሰማየ ሰማያት
  english_pob_choice: the heaven of heavens
  chosen_spanish: el cielo de los cielos
  alternatives_spanish:
  - el cielo del cielo
  - el cielo supremo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la construcción superlativa literal. 'Cielo de los cielos' preserva el idiomatismo cósmico sin rebajarlo a una paráfrasis explicativa.
- source_word: ታድለቀልቅ ... ይልቅልቅ / ሁከተ ዐቢየ
  english_pob_choice: was shaken with a great shaking / were stirred up with a great commotion
  chosen_spanish: fue sacudido con un gran sacudimiento / fueron agitados con una gran conmoción
  alternatives_spanish:
  - fue estremecido con un gran estremecimiento / fueron removidos con gran tumulto
  - fue sacudido violentamente / fueron conmovidos intensamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez usa construcciones intensivas por repetición y cognado; en español se conserva esa fuerza con 'sacudido con un gran sacudimiento' y 'agitados con una gran conmoción'. Se evita suavizar a 'violentamente' para no perder el paralelismo retórico ni el 'grande' explícito.
- source_word: ኀይሉ ልዑል
  english_pob_choice: the host of the Most High
  chosen_spanish: la hueste del Altísimo
  alternatives_spanish:
  - el ejército del Altísimo
  - el poder del Altísimo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto inmediato, la referencia a ángeles innumerables favorece una lectura colectiva. 'Hueste' comunica bien ese sentido celestial y mantiene el matiz militar/assembleario del término.
- source_word: መላእክት አእላፈ አእላፍ ወትእልፊተ ትእልፊት
  english_pob_choice: the angels, thousands of thousands and ten thousand times ten thousand
  chosen_spanish: los ángeles, millares de millares y diez mil veces diez mil
  alternatives_spanish:
  - los ángeles, millares sobre millares y miríadas sobre miríadas
  - los ángeles, miles de miles y diez mil por diez mil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Millares de millares'' reproduce la fórmula semítica/apocalíptica tradicional y es perfectamente legible en español. ''Diez mil veces diez mil'' conserva la multiplicación enfática del original.'
- source_word: ትሀውኩ ሁከተ ዐቢየ
  english_pob_choice: were stirred up with a great commotion
  chosen_spanish: fueron agitados con una gran conmoción
  alternatives_spanish:
  - fueron removidos con gran tumulto
  - fueron puestos en gran conmoción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición intensiva final pide un verbo de perturbación colectiva. 'Agitados' conserva el movimiento y 'conmoción' mantiene el sustantivo de disturbio sin sobreexplicar.
theological_decisions:
- issue: Cómo entender ሰማየ ሰማያት
  english_pob_reading: the heaven of heavens
  chosen_spanish_reading: el cielo de los cielos
  alternative_spanish_readings:
  - el cielo supremo
  - el más alto cielo
  rationale: Se preserva la elevación cósmica del giro literal. Traducirlo como superlativo corriente sería más fluido, pero perdería el sabor apocalíptico y la estructura enfática del original.
  doctrine_reference: Primacía del texto fuente; conservar imaginería celestial sin armonización interpretativa.
- issue: Cómo traducir ኀይሉ ልዑል
  english_pob_reading: the host of the Most High
  chosen_spanish_reading: la hueste del Altísimo
  alternative_spanish_readings:
  - el poder del Altísimo
  - el ejército del Altísimo
  rationale: La proximidad con la enumeración de ángeles favorece una lectura colectiva, no abstracta. 'Hueste' respeta el carácter de asamblea/ejército celestial sin convertirlo en una abstracción teológica.
  doctrine_reference: Conservar el sentido contextual inmediato y la imaginería apocalíptica.
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión que corregía la pérdida de la intensidad cognada en el doble movimiento de sacudida/agitación. Por eso, en lugar de suavizar a un adverbio general como ''violentamente'', mantuve dos giros intensivos en español: ''con un gran sacudimiento'' y ''con una gran conmoción'', para reflejar el paralelismo y la repetición enfática del ge''ez.'
  spanish_consistency_notes:
  - Usé 'Henoc' para el nombre propio, conforme a la forma española usual, y 'Altísimo' para ልዑል.
  - Mantuve 'parábola' por coherencia con la división literaria de 1 Enoc en la tradición POB.
  - Evité 'SEÑOR' porque aquí no aparece el nombre divino יהוה; la referencia es al 'Altísimo'.
  - Conservé la estructura de una sola oración larga, como en el original, para respetar el encuadre visionario y el paralelismo interno.
