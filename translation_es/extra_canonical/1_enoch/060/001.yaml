base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/060/001.yaml
  text: In the five-hundredth year[a], in the seventh month, on the fourteenth day of the month, in the life of Henok, in that parable I saw that the heaven of heavens was shaken with a great shaking, and the host of the Most High, and the angels, thousands of thousands and ten thousand times ten thousand[c][b], were stirred up with a great commotion.
  footnotes:
  - marker: a
    text: Or 'the highest heaven.' The Ge'ez literally reads 'the heaven of heavens,' a superlative expression for the loftiest heavenly realm.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'the host of the Most High' could also be understood more abstractly as 'the power of the Most High,' but the immediate reference to angels in immense numbers favors a collective heavenly-host sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'was shaken violently'.
    reason: previous_rendering
