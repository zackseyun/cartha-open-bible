translation:
  language: es
  text: Y el espíritu de la niebla no se unirá con ellos en sus depósitos, sino que su depósito está aparte; porque su curso es glorioso, tanto en la luz como en la oscuridad, y en el invierno y en el verano[c][b]; y su depósito es un ángel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cláusula final es difícil. El ge''ez dice literalmente: ''su depósito es un ángel'', lo que puede indicar una identificación con un ser angélico o una función asignada a un ángel como depósito designado.'
    reason: textual_variant
  - marker: b
    text: El último término atmosférico del testimonio OCR es incierto en esta tradición; la revisión textual favorece 'verano'.
    reason: textual_variant
  - marker: c
    text: 'O: ''… y en invierno y en nube/niebla'', si se siguiera la lectura OCR más incierta del testimonio.'
    reason: alternative_reading
lexical_decisions:
- source_word: መንፈሰ ጊሜ
  english_pob_choice: the spirit of the mist
  chosen_spanish: el espíritu de la niebla
  alternatives_spanish:
  - el espíritu de la neblina
  - el viento de la niebla
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: גימֵ (gimē) corresponde a 'niebla' o 'neblina', no a 'mar'. Conservar 'espíritu' preserva la personificación cosmológica del pasaje y evita reducirlo a un fenómeno meramente meteorológico.
- source_word: ኢይትኃበር ምስሌሆሙ
  english_pob_choice: will not be joined with them
  chosen_spanish: no se unirá con ellos
  alternatives_spanish:
  - no se asociará con ellos
  - no se unirá a ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa unión o asociación. En español, 'unirse con' comunica bien la relación sin añadir interpretación; 'con ellos' conserva el sujeto colectivo del texto.
- source_word: መዛግብቲሆሙ
  english_pob_choice: their storehouses
  chosen_spanish: sus almacenes
  alternatives_spanish:
  - sus depósitos
  - sus tesorerías
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Almacenes'' reproduce de forma concreta la imagen de reservorios cósmicos y funciona naturalmente en español; ''tesorerías'' podría sonar demasiado abstracto o financiero.'
- source_word: መዝገበ ቦቱ ባሕቲቱ
  english_pob_choice: its own storehouse is by itself
  chosen_spanish: su almacén está aparte
  alternatives_spanish:
  - su almacén está solo
  - su almacén está separado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción enfatiza separación. 'Está aparte' transmite de modo idiomático la idea de estar por sí mismo, sin sobreexplicar una independencia espacial o metafísica.
- source_word: ምሕዋረ ዚአሁ
  english_pob_choice: its course
  chosen_spanish: su curso
  alternatives_spanish:
  - su recorrido
  - su circuito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Curso'' es la equivalencia más natural para un movimiento regular o trazado cósmico y preserva la idea de una trayectoria ordenada.'
- source_word: ስብሐት ቦ
  english_pob_choice: is glorious
  chosen_spanish: es glorioso
  alternatives_spanish:
  - tiene gloria
  - es espléndido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Glorioso'' mantiene el valor de ''gloria/esplendor'' sin forzar una perífrasis; la frase queda fluida en español y conserva el tono elevado del texto.'
- source_word: በብርሃን ... በጽልመት ... በክረምት ... በሐጋይ
  english_pob_choice: both in light and in darkness, and in winter and in summer
  chosen_spanish: tanto en la luz como en la oscuridad, y en el invierno y en el verano
  alternatives_spanish:
  - en la luz y en la oscuridad, y en invierno y en verano
  - tanto en la claridad como en la oscuridad, y en invierno y en verano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual favorece 'verano' frente a la lectura OCR errónea 'nube' o 'tormenta'. 'Luz/oscuridad' y 'invierno/verano' reproducen los pares contrastivos del original de forma clara en español.
- source_word: መዝገበ ዚአሃ መልአክ ውእቱ
  english_pob_choice: its storehouse is an angel
  chosen_spanish: su almacén es un ángel
  alternatives_spanish:
  - su depósito es un ángel
  - un ángel es su almacén
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula final es difícil, pero la sintaxis directa del ge'ez se conserva mejor con una traducción literal. 'Almacén' evita suavizar la sorpresa apocalíptica del texto.
theological_decisions:
- issue: Si conviene demitologizar el 'espíritu' de la niebla
  english_pob_reading: Retain 'the spirit of the mist' as a cosmic-personified reality
  chosen_spanish_reading: Conservar 'el espíritu de la niebla' como realidad cósmica personificada
  alternative_spanish_readings:
  - la niebla
  - el viento de la niebla
  - la fuerza de la niebla
  rationale: El pasaje describe realidades cósmicas con administración angélica; traducir 'espíritu' mantiene esa cosmovisión en vez de convertirla en simple meteorología.
  doctrine_reference: Preservar la tensión apocalíptica del texto; no reducir su imaginería a categorías modernas.
- issue: Cómo tratar la cláusula final que identifica el almacén con un ángel
  english_pob_reading: Keep the direct wording 'its storehouse is an angel' in the main text
  chosen_spanish_reading: Mantener 'su almacén es un ángel' en el texto principal
  alternative_spanish_readings:
  - su almacén está guardado por un ángel
  - un ángel está sobre su almacén
  rationale: La formulación directa refleja mejor la dificultad del ge'ez y evita ocultar una identificación textual extraña pero explícita.
  doctrine_reference: Cuando el texto fuente es difícil, priorizar transparencia y dejar constancia de la rareza en lugar de armonizarla prematuramente.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente que corrige el error previo de 'mar' por 'niebla' y adopta la lectura 'verano' en lugar de la forma atmosférica incierta. También conserva la clausula final difícil de manera literal, como exige el audit trail.
  spanish_consistency_notes:
  - Se mantiene 'espíritu' para መንፈስ en coherencia con la preferencia POB por no demitologizar lo cosmológico.
  - '''Almacén'' se usa de forma consistente para መዝገብ/መዛግብት dentro de esta cláusula, evitando ''tesorería'' por su matiz financiero.'
  - '''Glorioso'' conserva el registro elevado del original sin introducir una paráfrasis interpretativa.'
  - Se evita 'SEÑOR' o 'Cristo' porque no aparecen en este versículo; no se aplican convenciones de mascaramiento ajenas al texto.
