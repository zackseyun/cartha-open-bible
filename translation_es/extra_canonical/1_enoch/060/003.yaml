  yaml_path: translation/extra_canonical/1_enoch/060/003.yaml
  text: And as for me[a], a great trembling seized me, and fear took hold of me; and my loins were broken, and my kidneys were loosened[d][c][b], and I fell on my face.
  footnotes:
