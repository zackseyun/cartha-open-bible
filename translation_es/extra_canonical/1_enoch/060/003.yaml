translation:
  language: es
  text: Y en cuanto a mí[a], un gran temblor se apoderó de mí, y el miedo me dominó; y mis lomos fueron quebrantados[b], y mis riñones se aflojaron[c], y caí sobre mi rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'y a mí'. El giro tópico marca un retorno enfático a la reacción personal de Enoc.
    reason: source_note
  - marker: b
    text: 'O: ''mis caderas cedieron'' o ''mis lomos se derrumbaron''. La imagen corporal es de quebranto o colapso.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''mis entrañas se aflojaron''. En el lenguaje semita antiguo, los riñones pueden representar el interior o las emociones profundas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሊተ
  english_pob_choice: And as for me
  chosen_spanish: Y en cuanto a mí
  alternatives_spanish:
  - Y a mí
  - Y yo, por mi parte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro tópico enfatiza el retorno a la reacción personal de Enoc; 'en cuanto a mí' reproduce bien el valor de contraste/enfoque sin sonar artificial.
- source_word: ረዓድ ዐቢይ
  english_pob_choice: a great trembling
  chosen_spanish: un gran temblor
  alternatives_spanish:
  - un gran estremecimiento
  - un gran sacudimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Temblor'' mantiene la reacción corporal intensa y natural en español, y ''gran'' conserva el énfasis del adjetivo.'
- source_word: ነሥአኒ
  english_pob_choice: seized me
  chosen_spanish: se apoderó de mí
  alternatives_spanish:
  - me agarró
  - me tomó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen de algo que domina o prende al hablante queda bien expresada con 'se apoderó de mí', sin perder la fuerza física del verbo.
- source_word: ፍርሃት አሐዘኒ
  english_pob_choice: fear took hold of me
  chosen_spanish: el miedo me dominó
  alternatives_spanish:
  - el temor se apoderó de mí
  - el miedo me tomó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Dominó'' transmite la toma concreta del sujeto por el miedo; ''miedo'' es más directo y menos marcado que ''temor'' en español general.'
- source_word: ሐቌየ ተቀጽዐ
  english_pob_choice: my loins were broken
  chosen_spanish: mis lomos fueron quebrantados
  alternatives_spanish:
  - mis lomos fueron quebrados
  - mis caderas cedieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el término corporal tradicional 'lomos' porque refleja con mayor fidelidad la antropología semítica que una paraphrasis moderna; 'quebrantados' comunica mejor el pasivo de ruina o fractura.
- source_word: ኵልያትየ ተፈትሑ
  english_pob_choice: my kidneys were loosened
  chosen_spanish: mis riñones fueron aflojados
  alternatives_spanish:
  - mis riñones se aflojaron
  - mis entrañas se aflojaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Riñones'' preserva la literalidad del término corporal y su valor antropológico antiguo; ''aflojados'' sigue de cerca el verbo y mantiene el paralelismo con la rotura previa.'
- source_word: ወወደቁ በገጽየ
  english_pob_choice: and I fell on my face
  chosen_spanish: y caí sobre mi rostro
  alternatives_spanish:
  - y caí de bruces
  - y caí sobre mi cara
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sobre mi rostro'' conserva la formulación bíblica/formal y evita reducir la postura de postración a una mera caída física.'
theological_decisions:
- issue: Preservar la imaginería corporal extrema de la visión en vez de suavizarla
  english_pob_reading: 'Keep the bodily collapse imagery: trembling, fear, loins broken, kidneys loosened'
  chosen_spanish_reading: 'Conservar el lenguaje corporal fuerte: temblor, miedo, lomos quebrantados y riñones aflojados'
  alternative_spanish_readings:
  - suavizar con 'me desmayé' o 'me quedé sin fuerzas'
  - reemplazar 'riñones' por 'entrañas' o 'interior'
  rationale: La prioridad es mantener la rareza y fuerza de la escena apocalíptica. El español puede sostener el mismo impacto sin resolverlo en una expresión moderna más lisa.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
- issue: Decidir entre 'lomos' y una expresión anatómica moderna
  english_pob_reading: Retain 'loins' in the main text
  chosen_spanish_reading: Retener 'lomos' en el texto principal
  alternative_spanish_readings:
  - caderas
  - zona lumbar
  - cintura
  rationale: '''Lomos'' es más transparente respecto al registro bíblico-semítico y preserva la resonancia antropológica de la fuente; las alternativas modernas serían más claras pero menos fieles al perfil del texto.'
  doctrine_reference: 'Translation philosophy: preserve source imagery where it carries meaning rather than normalizing it.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: ''my kidneys were loosened'' frente a ''dissolved'', y la corrección previa de la cláusula topicalizada ''And as for me''. La versión española refleja ese giro con ''Y en cuanto a mí'' y mantiene el paralelismo corporal con ''aflojados''. También se atendió a la observación sobre ''my loins were broken'', por lo que se evitó traducir esa cláusula con un verbo de aflojamiento.'
  spanish_consistency_notes:
  - Se mantiene 'Y en cuanto a mí' para reproducir el valor tópico de ወሊተ.
  - 'Se conserva el paralelismo pasivo: ''fueron quebrantados'' / ''fueron aflojados''.'
  - '''Riñones'' se usa de forma literal y se aclara en nota por su carga antropológica antigua.'
  - '''Caí sobre mi rostro'' conserva el registro reverente de postración.'
