  text: And the spirit of the hoarfrost is its own angel[c][b][a], and the spirit of the hail is a good angel.
  footnotes:
  - marker: a
    text: The first weather term is uncertain in nuance from the Ethiopic alone. It likely denotes a vaporous or mist-like phenomenon; 'mist' is a cautious rendering.
    reason: lexical_alternative
  - marker: b
    text: 'Literally, the Ethiopic repeats a possession-and-copula formula: ''the angel of it ... he/it is.'' The English expands this to ''its angel is named ...'' for clarity.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And the spirit of the mist—its angel is named Asahatiya—and the spirit of hail—its angel is named Her.'.
