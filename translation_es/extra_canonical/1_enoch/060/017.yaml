  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Espíritu', 'ángel', y 'bueno' están bien alineados. La única desalineación léxica relevante es አስሐትያ, que debe evitar una formulación híbrida como 'hielo granizado'.
