translation:
  language: es
  text: Y el espíritu de la escarcha[a] es su propio ángel, y el espíritu del granizo es un ángel bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término ge'ez es meteorológico y su matiz exacto no es totalmente seguro solo a partir del etíope; probablemente se refiere a la escarcha o escarcha blanca, no a un nombre propio.
    reason: lexical_alternative
lexical_decisions:
- source_word: መንፈሰ
  english_pob_choice: the spirit of
  chosen_spanish: el espíritu de
  alternatives_spanish:
  - el viento de
  - el soplo de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico, መንፈሰ introduce fuerzas cósmicas personificadas. "Espíritu de" conserva mejor esa personificación que reducirlo a un simple fenómeno meteorológico, y sigue de cerca la construcción del original.
- source_word: አስሐትያ
  english_pob_choice: the hoarfrost
  chosen_spanish: hielo granizado
  alternatives_spanish:
  - escarcha
  - granizo helado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige una mala lectura previa: el término no es un nombre propio, sino un sustantivo meteorológico. En español, "hielo granizado" comunica la idea de una formación helada/escarchada sin perder el matiz físico del término.'
- source_word: መልአክ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este catálogo de agentes cósmicos, "ángel" es la equivalencia natural y mantiene la organización sobrenatural del pasaje.
- source_word: ዚአሁ ... ውእቱ
  english_pob_choice: is its own angel
  chosen_spanish: es su propio ángel
  alternatives_spanish:
  - es el ángel de ello
  - es su ángel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula ge'ez es posesiva y copulativa; la traducción española más natural y fiel es "su propio ángel", que conserva la relación de pertenencia sin forzar una construcción extraña en español.
- source_word: በረድ
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  - granizada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Granizo" reproduce el sentido meteorológico básico y encaja con la serie de espíritus/fuerzas de la naturaleza del versículo.'
- source_word: ኄር
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - benigno
  - bondadoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual muestra que ኄር es un adjetivo común, no un nombre propio. "Bueno" es la traducción directa y más transparente en español; "benigno" sería una opción interpretativa algo más estilizada, pero menos cercana.
theological_decisions:
- issue: Tratamiento del pasaje como catálogo de fuerzas/ángeles cósmicos sin convertirlos en nombres propios
  english_pob_reading: The verse describes the spirit of the hoarfrost and the spirit of hail, each linked to an angelic relation, not proper names for the beings themselves.
  chosen_spanish_reading: El versículo presenta el espíritu del hielo granizado y el espíritu del granizo como realidades cósmicas a las que se asigna un ángel, sin convertir esos términos en nombres propios.
  alternative_spanish_readings:
  - Tomar ᠎አስሐትያ como nombre propio
  - Leer ኄር como un nombre angelical
  rationale: La corrección crítica disponible en el expediente señala que el primer término es meteorológico y que ኄር significa "bueno". La traducción española debe reflejar esa lectura y evitar crear una onomástica inexistente en el texto base.
  doctrine_reference: Translation philosophy §§1, 5; preserve apocalyptic imagery per book-context guidance.
- issue: Conservar la tensión de la fórmula posesiva/copulativa ge'ez
  english_pob_reading: Literally, the Ethiopic repeats a possession-and-copula formula; the English expands it for clarity.
  chosen_spanish_reading: 'La versión española conserva la relación posesiva en una forma natural: "es su propio ángel".'
  alternative_spanish_readings:
  - '"es el ángel de ello"'
  - '"su ángel es"'
  rationale: El español requiere una formulación fluida que no oculte la idea de pertenencia. "Su propio ángel" comunica mejor la estructura sin perder la literalidad esencial del original.
  doctrine_reference: Translation philosophy §§1, 5; readability with source fidelity.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión crítica posterior que corrigió dos errores del borrador previo: አስሐትያ no es un nombre angelical sino un término meteorológico, y ኄር significa "bueno". Por eso la versión española evita nombres propios y traduce ambos elementos de manera común y verificable.'
  spanish_consistency_notes:
  - Se mantiene "espíritu" para መንፈሰ, en línea con el uso POB de fuerzas personificadas en contexto apocalíptico.
  - Se usa "ángel" y no "mensajero", porque el pasaje describe administración cósmica sobrenatural.
  - '"Y" al inicio preserva la continuidad narrativa del texto.'
  - No se emplea "SEÑOR" ni terminología litúrgica ajena al pasaje.
  - La nota a pie de página marca únicamente la incertidumbre del primer término; el segundo se traduce de forma directa como "bueno".
