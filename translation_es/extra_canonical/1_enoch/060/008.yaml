  yaml_path: translation/extra_canonical/1_enoch/060/008.yaml
  text: And the name of the male was Behemoth[a], who occupied with his breast a desolate wilderness named Dundayin, east of the garden, where the chosen and the righteous dwell, where my great-grandfather was taken up, the seventh from Adam[e][d][c][b], the first of men whom the Lord of Spirits made.
