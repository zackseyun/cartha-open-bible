translation:
  language: es
  text: Y el nombre del macho fue Behemot[a], que ocupó con su pecho un desierto invisible[b] llamado Dundayín, al oriente del jardín[c], donde habitan los elegidos y los justos, donde fue llevado mi antepasado[d], el séptimo desde Adán[e], el primero de los hombres que el Señor de los Espíritus hizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El contraste con la figura femenina del versículo anterior favorece aquí «macho» como referente biológico directo.
    reason: textual_variant
  - marker: b
    text: El ge'ez puede entenderse como «invisible», «no visto» o, en otra lectura, «desolado». Se conserva la lectura más literal en el cuerpo del texto.
    reason: textual_variant
  - marker: c
    text: «Jardín» reproduce literalmente el ge'ez; el texto no nombra aquí explícitamente a «Edén».
    reason: lexical_alternative
  - marker: d
    text: El pasaje presenta a Enoc como el que fue llevado; el término de parentesco puede entenderse más ampliamente como «antepasado».
    reason: cross_reference
  - marker: e
    text: Es decir, Enoc.
    reason: cross_reference
lexical_decisions:
- source_word: ተባዕታይ
  english_pob_choice: the male
  chosen_spanish: el macho
  alternatives_spanish:
  - el varón
  - el macho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contraste del pasaje es con la figura femenina del versículo anterior; en español, «macho» conserva el valor sexual/biológico directo y el contraste apocalíptico sin suavizarlo a un término más general como «varón».
- source_word: ስሙ ብሔሞት
  english_pob_choice: the name ... was Behemoth
  chosen_spanish: el nombre fue Behemot
  alternatives_spanish:
  - su nombre fue Behemot
  - el nombre ... fue Behemot
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se translitera el nombre propio y se conserva la fórmula nominal sin interpretarlo ni traducirlo.
- source_word: ዘይአኅዝ በእንግ ድዓሁ
  english_pob_choice: who occupied with his breast
  chosen_spanish: que ocupaba con su pecho
  alternatives_spanish:
  - que ocupaba con su pecho
  - que tomaba posesión con su pecho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ocupar» recoge la noción espacial de abarcar o tomar un lugar; «con su pecho» preserva la imagen corporal difícil del ge'ez sin diluirla.
- source_word: በበድው ዘኢያስተርኢ
  english_pob_choice: a desolate wilderness / an unseen wilderness
  chosen_spanish: un desierto invisible
  alternatives_spanish:
  - un desierto desolado
  - un desierto no visto
  - un paraje invisible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión reciente del audit trail favorece el sentido literal de «no visto / invisible». En español, «desierto invisible» mantiene la tensión textual y no resuelve indebidamente la dificultad.
- source_word: ዱንዳይን
  english_pob_choice: Dundayin
  chosen_spanish: Dundayín
  alternatives_spanish:
  - Dundayin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se translitera el topónimo con acento para facilitar la lectura en español, sin pretender normalizar la forma original.
- source_word: በምሥራቀ ገነት
  english_pob_choice: east of the garden
  chosen_spanish: al oriente del jardín
  alternatives_spanish:
  - al este del jardín
  - al oriente del huerto
  - al este de la huerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oriente» reproduce el registro bíblico y solemne de la localización espacial; «jardín» se conserva porque el texto no dice explícitamente «Edén».
- source_word: በኀበ ይነብሩ ኅሩያን ወጻድቃን
  english_pob_choice: where the chosen and the righteous dwell
  chosen_spanish: donde habitan los elegidos y los justos
  alternatives_spanish:
  - donde moran los elegidos y los justos
  - donde viven los escogidos y los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Habitan» expresa residencia estable; «elegidos» conserva el paralelismo tradicional con «justos» sin forzar terminología confesional posterior.
- source_word: ተመጠወ
  english_pob_choice: was taken up
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue tomado
  - fue arrebatado
  - fue llevado arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «fue llevado» comunica la remoción de Enoch de manera natural y suficientemente abierta, sin imponer una tecnicidad que el contexto no exige.
- source_word: እምኄውየ
  english_pob_choice: my great-grandfather
  chosen_spanish: mi bisabuelo
  alternatives_spanish:
  - mi antepasado
  - mi tatarabuelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez es genealógicamente preciso pero no completamente transparente; «bisabuelo» ofrece una relación familiar cercana y clara en español, manteniendo la referencia de parentesco del hablante.
- source_word: ሳብዕ እምአዳም
  english_pob_choice: the seventh from Adam
  chosen_spanish: el séptimo desde Adán
  alternatives_spanish:
  - el séptimo de Adán
  - el séptimo después de Adán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la fórmula genealógica directa y reconocible.
- source_word: ቀዳሚሆሙ ለሰብእ
  english_pob_choice: the first of men / the first of humankind
  chosen_spanish: el primero de los hombres
  alternatives_spanish:
  - el primero de la humanidad
  - el primero de los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Los hombres» conserva el registro bíblico formal del pasaje y la referencia a Adán como primer humano, tal como el audit trail revisado subraya.
- source_word: ዘገብረ እግዚአ መናፍስት
  english_pob_choice: whom the Lord of Spirits made
  chosen_spanish: que Yahvé de los Espíritus hizo
  alternatives_spanish:
  - que el Señor de los Espíritus hizo
  - que Yahvé, Señor de los Espíritus, hizo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la convención POB de usar «Yahvé» para el nombre divino; «de los Espíritus» preserva el título en su forma enochica característica.
theological_decisions:
- issue: Referencia del hablante en la cláusula genealógica
  english_pob_reading: The speaker is Enoch, who identifies himself as 'the seventh from Adam.'
  chosen_spanish_reading: 'La frase se entiende como autoidentificación de Enoc: es el séptimo desde Adán.'
  alternative_spanish_readings:
  - La frase podría leerse de modo más general como una referencia a un antepasado.
  - La cláusula podría despersonalizarse y tomarse solo como dato genealógico.
  rationale: El contexto enochico presupone que habla Enoc. Mantener la autoidentificación evita borrar la voz narrativa y conserva la función literaria del dato genealógico.
  doctrine_reference: Preservar el sentido literario inmediato del pasaje; no armonizar prematuramente con otras tradiciones genealógicas.
- issue: Sentido de la descripción del desierto
  english_pob_reading: a desolate wilderness / an unseen wilderness
  chosen_spanish_reading: un desierto invisible
  alternative_spanish_readings:
  - un desierto desolado
  - un desierto inaccesible
  - un paraje no visto
  rationale: El ge'ez permite una lectura ligada a la invisibilidad/no-aparición. Dado el historial de revisión, conviene conservar esa tensión en el texto principal y no sustituirla por una paráfrasis más segura.
  doctrine_reference: Cuando la evidencia es ambigua, mantener la ambigüedad textual en vez de resolverla artificialmente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que corrigió la lectura anterior de «the male» frente a una mala segmentación de OCR y dio prioridad al valor literal de ዘኢያስተርኢ como «invisible / not seen». Por eso el español evita una lectura de «segundo» y conserva la tensión semántica del desierto como «invisible».
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio POB para el nombre divino.
  - Se translitera el nombre propio Behemot sin traducirlo.
  - Se conserva «Espíritus» en plural en el título divino.
  - Se evita «Cristo» porque no hay término mesiánico en este versículo.
  - Se mantiene un registro bíblico solemne sin arcaizar innecesariamente.
