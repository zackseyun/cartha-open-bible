    reason: textual_variant
  - marker: c
    text: «Jardín» reproduce literalmente el ge'ez; el texto no nombra aquí explícitamente a «Edén».
    reason: lexical_alternative
  - marker: d
    text: El pasaje presenta a Enoc como el que fue llevado; el término de parentesco puede entenderse más ampliamente como «antepasado».
    reason: cross_reference
  - marker: e
    text: Es decir, Enoc.
    reason: cross_reference
