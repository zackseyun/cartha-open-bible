    issue: «hielo» para ቍር
    rationale: La evidencia y el audit trail inglés fijan ቍር como «frost». En español, «hielo» suele referirse a hielo sólido, no al fenómeno de escarcha/helada. «Escarcha» preserva mejor el efecto meteorológico específico.
  - severity: medium
    issue: Anclaje incorrecto de la nota [b]
    rationale: La nota [b] dice «O “aridez” para “sequedad”», pero en el texto está colocada sobre «sur». Los marcadores deben aparecer exactamente en la palabra o frase relevante.
  - severity: low
