translation:
  language: es
  text: Y por la segunda puerta central sale abundancia[a], y de ella salen lluvia, fruto, paz y rocío; y por la tercera puerta, que está hacia el sur, salen escarcha y sequedad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia transmitida es abrupta; se traduce tal como está, sin suavizarla ni reordenarla.
    reason: textual_variant
  - marker: b
    text: O «aridez» para «sequedad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ኆኅት
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portal
  - entrada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este pasaje cosmológico, ኆኅት designa una abertura estructurada por la que salen los fenómenos. «Puerta» conserva mejor la imagen concreta y el paralelismo de las «puertas» que organizan el cosmos, y es más natural en español que un calco como «gate» o una abstracción como «abertura».
- source_word: ማእከላዊት
  english_pob_choice: middle
  chosen_spanish: central
  alternatives_spanish:
  - del medio
  - intermedia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo indica que se trata de la puerta situada en el centro del conjunto. «Central» transmite con claridad la ubicación espacial y suena más natural que una repetición más pesada como «del medio».
- source_word: ርኅብ
  english_pob_choice: abundance
  chosen_spanish: abundancia
  alternatives_spanish:
  - riqueza
  - provisión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Siguiendo la revisión más reciente del audit trail, ርኅብ no se toma aquí como «hambre/famine», sino como un término positivo ligado a abundancia o plenitud. «Abundancia» preserva ese valor y encaja con la serie de bienes que salen de la puerta.
- source_word: ዝናም
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - precipitación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es el equivalente directo de «rain». «Lluvia» es la forma más natural y precisa en español.
- source_word: ፍሬ
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - cosecha
  - producto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta lista agrícola, «fruto» conserva la concreción del original sin limitarlo a fruta comestible. También mantiene mejor el paralelismo con los otros dones climáticos.
- source_word: ሠላም
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - prosperidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Paz» es la equivalencia más directa y amplia de ሠላም. Aunque puede implicar bienestar o prosperidad, el español «paz» preserva el término fuente y sugiere ese sentido más amplio por el contexto.
- source_word: ጤለ
  english_pob_choice: dew
  chosen_spanish: rocío
  alternatives_spanish:
  - humedad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo nombra el rocío. «Rocío» es el equivalente natural en español y mantiene el registro poético del pasaje.
- source_word: መንገለ መስዕ
  english_pob_choice: toward the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - en dirección al sur
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica dirección. «Hacia el sur» es idiomático en español y conserva la orientación espacial sin añadir interpretaciones.
- source_word: ቍር
  english_pob_choice: frost
  chosen_spanish: hielo
  alternatives_spanish:
  - escarcha
  - frío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés POB usa «frost», en español «hielo» puede sonar más tangible pero algo más amplio. Dado el contexto de efectos climáticos, «escarcha» también sería posible; se elige «hielo» para conservar la dureza del fenómeno y el paralelo con «sequedad», sin forzar un tecnicismo demasiado estrecho.
- source_word: የብስ
  english_pob_choice: dryness
  chosen_spanish: sequedad
  alternatives_spanish:
  - aridez
  - sequía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término denota secura o aridez. «Sequedad» es la forma más cercana al sustantivo abstracto del original y queda bien junto a «hielo».
theological_decisions:
- issue: Imagen cosmológica de las puertas celestes
  english_pob_reading: Render ኆኅት as 'gate' and keep repeated 'comes out' language
  chosen_spanish_reading: Conservar la imagen de «puertas» por las que «sale» cada fenómeno
  alternative_spanish_readings:
  - usar «abertura» y verbos más libres como «produce» o «trae»
  - suavizar a una descripción meteorológica ordinaria
  rationale: El pasaje pertenece al lenguaje apocalíptico-astronómico, donde el cosmos está estructurado por aberturas específicas. Mantener «puerta» y la idea de que algo «sale» de ella preserva la cosmología del texto y evita aplanarlo en prosa meteorológica genérica.
  doctrine_reference: Principio de primacía del texto fuente y preservación de la imaginería apocalíptica.
translation_notes:
  revision_awareness: 'El aparato en inglés muestra una historia de revisión con discrepancias importantes: primero se leyó el primer miembro como «famine/what is right», luego se corrigió a «abundance», y también hubo oscilación sobre la orientación de la tercera puerta. Para esta versión española se sigue la lectura final del audit trail: ርኅብ como «abundancia» y መስዕ como «sur», manteniendo además la imagen de que los fenómenos salen por las puertas.'
  spanish_consistency_notes:
  - Se prefirió «puerta» sobre «portón» o «abertura» para conservar la imaginería cósmica del texto.
  - Se mantuvo «abundancia» porque el audit trail revisado la adopta como lectura final de ርኅብ.
  - «Rocío» se usa para ጤለ por claridad y naturalidad en español.
  - «Sequedad» se dejó en el texto principal; «aridez» queda como alternativa léxica.
  - La puntuación con dos miembros coordinados refleja fielmente la sintaxis del original.
