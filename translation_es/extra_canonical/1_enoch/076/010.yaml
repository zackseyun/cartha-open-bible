translation:
  language: es
  text: Y después de estos, vientos del norte—cuyo nombre es Mar[a], y que salen de la séptima abertura que está hacia el oriente—, el rocío sale de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula «cuyo nombre es Mar, y que salen» es textualmente difícil en la transmisión etiópica y puede reflejar una variante o expansión, pero se conserva aquí porque está presente en el testimonio provisto.
    reason: textual_variant
lexical_decisions:
- source_word: እምድኅረ እሉ
  english_pob_choice: after these
  chosen_spanish: después de estos
  alternatives_spanish:
  - tras estos
  - después de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase introduce una secuencia temporal en la descripción de los vientos; «después de estos» conserva el orden sin añadir interpretación.
- source_word: ነፋሳት
  english_pob_choice: winds
  chosen_spanish: los vientos
  alternatives_spanish:
  - las ráfagas
  - los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cosmológico y meteorológico, «vientos» es el sentido natural; «espíritus» no corresponde aquí.
- source_word: መስዕ
  english_pob_choice: north
  chosen_spanish: del norte
  alternatives_spanish:
  - septentrionales
  - del norte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El revisor del texto advirtió que መስዕ significa «norte», no «sur». Por eso se corrige la dirección y se traduce de manera directa.
- source_word: ዘስሙ ባሕር
  english_pob_choice: whose name is Sea
  chosen_spanish: cuya nombre es Mar
  alternatives_spanish:
  - cuyo nombre es Mar
  - que se llama Mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la fórmula nominal literal del testimonio, manteniendo visible el nombre cosmológico «Mar» en lugar de interpretarlo como un simple adjetivo.
- source_word: እም፯ኆኅት
  english_pob_choice: from the seventh opening
  chosen_spanish: de la séptima abertura
  alternatives_spanish:
  - de la séptima apertura
  - de la séptima puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El numeral funciona como ordinal con un sustantivo singular. «Abertura» preserva la imagen cósmica de un orificio/portal sin forzar una equivalencia más doctrinal.
- source_word: እንተ መንገለ ምሥራቅ
  english_pob_choice: that is toward the east
  chosen_spanish: que está hacia el oriente
  alternatives_spanish:
  - que mira al oriente
  - que está al este
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hacia el oriente» reproduce bien la dirección espacial del original y mantiene un registro bíblico claro en español.
- source_word: ይወፅእ እምኔሃ
  english_pob_choice: dew comes forth from it
  chosen_spanish: el rocío sale de ella
  alternatives_spanish:
  - el rocío procede de ella
  - el rocío brota de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sujeto es «el rocío» y el sufijo singular femenino se refiere a la abertura; por eso se traduce «de ella». «Sale» conserva el verbo de salida sin recargar el verso.
- source_word: ጤለ
  english_pob_choice: as dew / dew
  chosen_spanish: rocío
  alternatives_spanish:
  - como rocío
  - humedad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa un fenómeno meteorológico; en español, «rocío» es la opción más natural y fiel al campo semántico.
theological_decisions:
- issue: Conservación del marco cosmológico del libro
  english_pob_reading: Retain 'whose name is Sea' literally; do not flatten cosmic language.
  chosen_spanish_reading: Mantener «cuya nombre es Mar» de modo literal, sin convertirlo en una paráfrasis explicativa.
  alternative_spanish_readings:
  - el viento del mar
  - el viento marino
  rationale: La imagen apocalíptica/cosmológica del texto debe permanecer visible. Traducirlo interpretativamente como «viento marino» suavizaría una nomenclatura que el testimonio transmite como nombre propio o designación fija.
  doctrine_reference: Preservar el lenguaje apocalíptico y la nomenclatura cósmica sin domesticación interpretativa.
translation_notes:
  revision_awareness: Se incorporó la corrección adjudicada de መስዕ como «norte», no «sur», y se evitó la lectura errónea previa. También se siguió la revisión que entiende ፯ኆኅት como «séptima abertura» singular, con el pronombre femenino singular «de ella». Se mantuvo el valor textual difícil de la cláusula nominal «cuya nombre es Mar» como parte de la nomenclatura cosmológica transmitida.
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros contextos del proyecto, pero aquí no aparece el nombre divino.
  - Se prefiere «rocío» para ጤለ, sin añadir «como» porque el testimonio revisado lo trata como sujeto de la oración.
  - 'Se mantiene un registro bíblico sobrio: «oriente»/«abertura» en lugar de un español coloquial.'
