translation:
  language: es
  text: Y después de estos vientos, por el camino del sur salen por dos puertas; por la primera puerta, que se inclina hacia el oriente[a][c], sale un viento de muerte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La sintaxis ge'ez después de «la primera puerta» es comprimida. La cláusula probablemente quiere decir «de aquellas situadas hacia el oriente», pero el antecedente exacto de «aquellas» no queda del todo explícito en este testigo.
    reason: textual_variant
  - marker: b
    text: O «un viento mortal». Se conserva «un viento de muerte» para mantener el tono cósmico y ominoso del pasaje.
    reason: lexical_alternative
  - marker: c
    text: O «por dos aberturas; por la primera abertura, de aquellas que están hacia el oriente».
    reason: previous_rendering
lexical_decisions:
- source_word: እምድኅረ
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: Dillmann
  rationale: Marca secuencia temporal inmediata; «después de» es natural y conserva el orden del catálogo de vientos.
- source_word: እሉ ነፋሳት
  english_pob_choice: these winds
  chosen_spanish: estos vientos
  alternatives_spanish:
  - aquellos vientos
  lexicon: Dillmann
  rationale: El demostrativo retoma los vientos ya descritos; «estos» preserva la conexión discursiva inmediata.
- source_word: መንገለ አዜብ
  english_pob_choice: the way of the south
  chosen_spanish: por el camino del sur
  alternatives_spanish:
  - por la dirección del sur
  - por la región del sur
  lexicon: Dillmann
  rationale: En este contexto cosmológico, መንገለ expresa ruta o dirección. «Camino del sur» mantiene la imagen concreta sin forzar una paráfrasis.
- source_word: ይወፅኡ
  english_pob_choice: they go out
  chosen_spanish: salen
  alternatives_spanish:
  - salen hacia afuera
  - salen fuera
  - emanan
  lexicon: Dillmann
  rationale: Verbo común de salir; «salen» es idiomático en español y conserva el movimiento de salida desde aberturas cósmicas.
- source_word: በ፪ኆኅት
  english_pob_choice: through two openings
  chosen_spanish: por dos puertas
  alternatives_spanish:
  - por dos aberturas
  - por dos aperturas
  lexicon: Dillmann
  rationale: 'El auditoría inglesa vacila entre «openings» y «gates» tras la revisión. «Puertas» refleja bien el espacio de paso y hace natural la imagen, aunque el término etiópico puede ser más amplio; se conserva la nota de alternancia mediante el aparato de decisiones. '
- source_word: ቀዳሚት ኆኅት
  english_pob_choice: the first opening / the first of these gates
  chosen_spanish: la primera de estas puertas
  alternatives_spanish:
  - la primera puerta
  - la puerta primera
  lexicon: Dillmann
  rationale: La revisión inglesa aclara que el relativo modifica a la primera puerta, con valor partitivo. «La primera de estas puertas» comunica ese matiz sin perder fluidez.
- source_word: እንተ ታጸንኑ
  english_pob_choice: which inclines
  chosen_spanish: que se inclina
  alternatives_spanish:
  - que se dirige
  - que mira
  - que se orienta
  lexicon: Dillmann
  rationale: El verbo expresa inclinación/orientación espacial, no mera ubicación estática. «Se inclina» reproduce con fidelidad esa idea de orientación.
- source_word: ለመንገለ ምሥራቅ
  english_pob_choice: toward the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - al este
  lexicon: Dillmann
  rationale: «Oriente» es claro, digno y tradicional en registro bíblico, y conserva el sentido direccional del original.
- source_word: ነፋስ ሞት
  english_pob_choice: a wind of death
  chosen_spanish: un viento de muerte
  alternatives_spanish:
  - un viento mortal
  - un viento letal
  lexicon: Dillmann
  rationale: Se mantiene la construcción genitiva para preservar la imaginería apocalíptica y la fuerza ominosa del texto, en vez de aplanarla a un adjetivo.
theological_decisions:
- issue: Preservar la imaginería apocalíptica de los vientos como entidades ordenadas y portadoras de juicio
  english_pob_reading: a wind of death
  chosen_spanish_reading: un viento de muerte
  alternative_spanish_readings:
  - un viento mortal
  rationale: La expresión literal conserva la personificación y clasificación cósmica del texto enochiano, evitando una normalización meteorológica.
  doctrine_reference: Mantener la imaginería apocalíptica; no suavizar la frase nominal genitiva.
- issue: Interpretación del referente de «estas puertas» tras la revisión textual
  english_pob_reading: through two gates; through the first gate
  chosen_spanish_reading: por dos puertas; por la primera de estas puertas
  alternative_spanish_readings:
  - por dos puertas; por la primera puerta
  rationale: La revisión del audit trail indica que el relativo se aplica a la primera puerta dentro del conjunto de dos. El español puede expresar con claridad el matiz partitivo mediante «de estas».
  doctrine_reference: Seguir la revisión crítica más reciente y reflejar la sintaxis relativa con precisión.
translation_notes:
  revision_awareness: 'La traducción española sigue la última revisión del audit trail inglés, que corrigió la sintaxis del relativo: no hay que leer una expresión plural como si dijera «de ellas», sino una relación partitiva con «la primera» dentro de un grupo de dos puertas. También se adopta la opción más reciente «gates/puertas» en lugar de «openings/aberturas» para reflejar el ajuste editorial sin perder el valor cosmológico del pasaje.'
  spanish_consistency_notes:
  - Se usa «Y» inicial en estilo bíblico narrativo.
  - Se mantiene «viento de muerte» en lugar de un adjetivo para no aplanar la imagen apocalíptica.
  - «Oriente» se prefiere por registro bíblico y claridad direccional.
  - No se introduce «SEÑOR» ni otros reemplazos no atestiguados, porque el pasaje no contiene el Tetragrámaton ni equivalente contextual.
