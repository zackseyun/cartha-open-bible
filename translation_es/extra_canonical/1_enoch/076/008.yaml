  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura fuente adjudicada: la abertura es la del medio y está junto a ''ella'', y de ella salen fragancia/rocío/lluvia/paz/vida. Sin embargo, la nota [a] está mal anclada: en el texto aparece sobre ''abertura central'', pero su contenido explica la alternativa para መዐዛ ሠናይ (''olor/fragancia agradable''). Además, falta en español la nota equivalente a la nota inglesa [c], que documenta la lectura previa alternativa sobre el orden sintáctico.'
  spanish_quality_summary: El español es claro, natural y digno. 'Abertura central' y 'que está junto a ella' son legibles. No obstante, para mayor precisión idiomática y coherencia con la nota léxica, conviene mover la llamada de nota al sintagma 'olor agradable' y preferir 'fragancia agradable', que suena más natural en una lista de emanaciones benéficas. También puede simplificarse la enumeración con un artículo único inicial.
  glossary_alignment: No hay términos del glosario teológico principal en conflicto. 'Paz' preserva bien ሰላም con su nota explicativa. Las decisiones léxicas principales ('abertura', 'central', 'rocío', 'lluvia', 'vida') están alineadas con el expediente inglés. La corrección necesaria es de anclaje de nota y preservación de una nota de alternativa sintáctica ya documentada en el audit trail.
  issues:
  - severity: high
    issue: La nota [a] está anclada a 'abertura central', pero su contenido trata de 'olor/fragancia agradable'.
    rationale: Esto desinforma al lector y rompe la correspondencia obligatoria entre marcador en el texto y el término explicado.
  - severity: medium
    issue: Falta la nota que preserve la alternativa previa de traducción sobre la sintaxis de la abertura junto a la del medio.
    rationale: El audit trail inglés conserva esta alternativa; el español debe preservarla también, especialmente porque hubo una revisión adjudicada sobre este punto.
  - severity: low
    issue: '''Un olor agradable'' es aceptable, pero ''una fragancia agradable'' encaja mejor con el registro literario y con la propia nota léxica.'
    rationale: Mejora la naturalidad y la consistencia terminológica sin cambiar el sentido.
  revised_spanish_text: Y por la abertura central, que está junto a ella,[c] salen de ella una fragancia[a] agradable, rocío, lluvia, paz[b] y vida.
  revised_footnotes:
  - marker: a
    text: O 'olor agradable'. La expresión ge'ez combina un sustantivo de olor o fragancia con un adjetivo que significa 'bueno' o 'agradable'.
    reason: lexical_alternative
  - marker: b
    text: '''Paz'' también puede abarcar bienestar o plenitud, no solo la ausencia de conflicto.'
    reason: lexical_alternative
  - marker: c
    text: O 'Y por la abertura que está junto a la del medio'.
    reason: previous_rendering
  revision_rationale: 'La traducción es sustancialmente fiel, pero requiere una reparación menor: reubicar la nota léxica al sintagma que realmente explica, añadir la nota de alternativa sintáctica preservada en el audit trail, y ajustar ''olor'' a ''fragancia'' para mejorar la naturalidad y la coherencia con la nota.'
