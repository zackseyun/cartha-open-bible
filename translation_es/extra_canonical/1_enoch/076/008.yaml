translation:
  language: es
  text: Y por la abertura central, que está junto a ella,[c] salen de ella una fragancia[a] agradable, rocío, lluvia, paz[b] y vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'olor agradable'. La expresión ge'ez combina un sustantivo de olor o fragancia con un adjetivo que significa 'bueno' o 'agradable'.
    reason: lexical_alternative
  - marker: b
    text: '''Paz'' también puede abarcar bienestar o plenitud, no solo la ausencia de conflicto.'
    reason: lexical_alternative
  - marker: c
    text: O 'Y por la abertura que está junto a la del medio'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኆኅት
  english_pob_choice: opening
  chosen_spanish: abertura
  alternatives_spanish:
  - apertura
  - abertura
  - orificio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa una abertura o abertura/apertura; 'abertura' suena natural en español y conserva la amplitud semántica sin concretar indebidamente en 'ventana' o 'puerta'.
- source_word: እንተ ኃቤሃ
  english_pob_choice: which is beside it
  chosen_spanish: que está junto a ella
  alternatives_spanish:
  - que está al lado de ella
  - que está cerca de ella
  - que está junto a ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase relativa indica proximidad al referente femenino previo; 'junto a ella' preserva esa relación de manera concisa y natural en español.
- source_word: ማእከላዊት
  english_pob_choice: the middle one
  chosen_spanish: central
  alternatives_spanish:
  - del medio
  - del centro
  - central
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo femenino modifica 'abertura'; 'central' comunica que es la abertura del medio dentro de la secuencia descrita.
- source_word: ይወፅእ እምኔሃ
  english_pob_choice: there come out from it
  chosen_spanish: salen de ella
  alternatives_spanish:
  - brotan de ella
  - salen de ella
  - proceden de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa salida o procedencia; 'salen de ella' mantiene el movimiento plural y evita sobreinterpretar el matiz.
- source_word: መዐዛ ሠናይ
  english_pob_choice: a pleasant fragrance
  chosen_spanish: un olor agradable
  alternatives_spanish:
  - una fragancia agradable
  - un aroma agradable
  - un olor agradable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La combinación de 'olor/fragrancia' con 'bueno/agradable' admite varias opciones; 'olor agradable' es natural en español y conserva el matiz sensorial sin volverlo demasiado técnico.
- source_word: ጤለ
  english_pob_choice: dew
  chosen_spanish: rocío
  alternatives_spanish:
  - rocío
  - niebla fina
  - humedad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto meteorológico, 'rocío' es la equivalencia más clara y estable en español.
- source_word: ዝናም
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - lluvia
  - chubasco
  - aguacero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el término estándar y no requiere matiz adicional.
- source_word: ሰላም
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz
  - bienestar
  - plenitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el campo semántico puede incluir bienestar o plenitud, 'paz' preserva mejor la amplitud teológica sin reducirla a prosperidad material.
- source_word: ሕይወት
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida
  - vitalidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La traducción directa 'vida' conserva el clímax de la lista de bendiciones.
theological_decisions:
- issue: Alcance de ሰላም en una lista de emanaciones benéficas
  english_pob_reading: peace
  chosen_spanish_reading: paz
  alternative_spanish_readings:
  - bienestar
  - plenitud
  - prosperidad
  rationale: En este pasaje, el término trasciende la ausencia de conflicto y apunta a una bendición integral. 'Paz' mantiene esa amplitud y evita estrechar el sentido a prosperidad material.
  doctrine_reference: Preservar la tensión semántica documentada sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió la relación sintáctica de la frase ge''ez: la abertura es la central, y la expresión relativa indica que está junto a ella, no que la central sea la que está junto a otra. La redacción española refleja esa estructura.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este verso no contiene el Nombre divino.
  - Se prefirió un español moderno y litúrgicamente legible, evitando calcos innecesarios.
  - 'Las imágenes meteorológicas se conservaron en una secuencia directa: olor agradable, rocío, lluvia, paz y vida.'
