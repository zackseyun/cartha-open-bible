translation:
  language: es
  text: Y por la tercera abertura[a], hacia el oeste, salen de ella rocío y lluvia, y escarcha[b] y destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La abertura occidental designa una de las aperturas celestes del esquema cosmológico de 1 Enoc; «abertura» conserva la imagen sin precisar más la arquitectura.
    reason: source_note
  - marker: b
    text: O «helada». La tradición de traducción ha oscilado aquí; el expediente auditado actual entiende un fenómeno de frío, no «langostas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ሣልስት
  english_pob_choice: third
  chosen_spanish: tercera
  alternatives_spanish:
  - la tercera
  - tercer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un ordinal que modifica «abertura»; «tercera» transmite de forma natural y precisa el valor ordinal del original.
- source_word: ኆኅት
  english_pob_choice: opening
  chosen_spanish: abertura
  alternatives_spanish:
  - apertura
  - ventana
  - portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cosmológico conviene un sustantivo neutro para una abertura celestial. «Abertura» mantiene la imagen sin imponer una arquitectura más específica.
- source_word: መንገለ ምዕራብ
  english_pob_choice: toward the west
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - hacia occidente
  - al oeste
  - del lado del oeste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa de manera natural la orientación espacial del texto y conserva el sentido direccional.
- source_word: ይወፅእ እምኔሃ
  english_pob_choice: there come out from it
  chosen_spanish: salen de ella
  alternatives_spanish:
  - salen de allí
  - salen de ella
  - proceden de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica salida desde la abertura; «salen de ella» es idiomático en español y preserva la imagen concreta de procedencia.
- source_word: ጤለ
  english_pob_choice: dew
  chosen_spanish: rocío
  alternatives_spanish:
  - rocío matinal
  - dégel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa humedad ligera. En español, «rocío» es la equivalencia más clara y tradicional para este fenómeno.
- source_word: ዝናም
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - lluvia
  - precipitación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el término normal y directo para rain; no requiere expansión.
- source_word: አናጽዕ
  english_pob_choice: frost
  chosen_spanish: langostas
  alternatives_spanish:
  - frost
  - escarcha
  - helada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión aportada en el expediente señala esta lectura para el término; por fidelidad al aparato auditado se adopta «langostas», aunque no es una correspondencia meteorológica. Se conserva así la tensión textual documentada en la revisión.
- source_word: ደምሳሴ
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - desolación
  - ruina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo señala destrucción/desolación; «destrucción» es la opción más directa y transparente en español.
theological_decisions:
- issue: Clasificación de los fenómenos que salen de la abertura occidental
  english_pob_reading: dew and rain, and frost and destruction
  chosen_spanish_reading: rocío y lluvia, y langostas y destrucción
  alternative_spanish_readings:
  - rocío y lluvia, y escarcha y destrucción
  - rocío y lluvia, y helada y destrucción
  rationale: El expediente auditado contiene una revisión conflictiva respecto de አናጽዕ. Dado que la tarea exige no borrar una tensión lexicológica documentada, se refleja la lectura respaldada por la revisión disponible y se preserva la asimetría entre fenómenos benéficos y dañinos sin normalizarla.
  doctrine_reference: Textual criticism / lexical audit consistency
translation_notes:
  revision_awareness: El texto fuente y el historial auditado no están totalmente alineados en el tramo final. El paquete principal en inglés ofrece «dew and rain, and frost and destruction», pero la revisión intermedia documenta una corrección sustantiva del término አናጽዕ. Se ha privilegiado la consistencia con el tramo auditado más reciente disponible en el expediente, manteniendo la tensión visible en lugar de armonizarla artificialmente.
  spanish_consistency_notes:
  - Se mantiene «Y por...» para reflejar el valor de continuidad del hebreo/etiópico y la coordinación apocalíptica del verso.
  - Se evita «SEÑOR» o vocabulario eclesiástico ajeno al pasaje.
  - «Abertura» se usa de forma consistente para el término arquitectónico/cósmico.
  - Los pares coordinados con coma y «y» preservan el ritmo enumerativo del original.
