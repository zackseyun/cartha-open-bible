translation:
  language: es
  text: Y en los extremos de la tierra vi doce portales[a], y todos ellos estaban abiertos para todos los vientos[b], de los cuales salen los vientos y soplan sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Portales» conserva la imagen arquitectónica y cósmica del original. También podría traducirse «puertas» o «aperturas».
    reason: lexical_alternative
  - marker: b
    text: 'La lectura del ge''ez ha sido revisada: el pasaje describe los doce portales como abiertos para todos los vientos, no como «abiertos alrededor».'
    reason: textual_variant
lexical_decisions:
- source_word: አጽናፈ ምድር
  english_pob_choice: the ends of the earth
  chosen_spanish: los extremos de la tierra
  alternatives_spanish:
  - los confines de la tierra
  - los bordes de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez señala los límites exteriores del mundo. «Los extremos de la tierra» conserva la geografía cósmica del pasaje con español natural y sobrio.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la fórmula visionaria simple del relato. «Vi» es fiel, directo y apropiado en español bíblico contemporáneo.
- source_word: ፲፪ ኆኃተ
  english_pob_choice: twelve portals
  chosen_spanish: doce portales
  alternatives_spanish:
  - doce puertas
  - doce aperturas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Portales» preserva la imagen estructurada y cósmica del texto mejor que «aperturas», sin cargar innecesariamente la idea de una puerta urbana.
- source_word: ርኅዋተ
  english_pob_choice: open
  chosen_spanish: estaban abiertos
  alternatives_spanish:
  - estaban abiertos de par en par
  - estaban abiertos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez indica el estado de estar abiertos. En español, la pasiva/estado «estaban abiertos» expresa con claridad que los portales permanecían abiertos.
- source_word: ለኵሎሙ ነፋሳት
  english_pob_choice: for all the winds
  chosen_spanish: para todos los vientos
  alternatives_spanish:
  - para todos los espíritus
  - para cada viento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cosmológico inmediato, ነፋሳት significa vientos, no espíritus. Mantener «vientos» evita importar un sentido teológico ajeno al pasaje.
- source_word: እለ እምኔሆሙ ይወፅኡ ነፋሳት
  english_pob_choice: from which the winds go out
  chosen_spanish: de los cuales salen los vientos
  alternatives_spanish:
  - de donde salen los vientos
  - de los que proceden los vientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula relativa identifica a los portales como puntos de salida. «Salen» reproduce de modo natural el movimiento indicado por el verbo sin perder la repetición de «vientos».
- source_word: ወይነፍሱ ዲበ ምድር
  english_pob_choice: and blow upon the earth
  chosen_spanish: y soplan sobre la tierra
  alternatives_spanish:
  - y soplan sobre la tierra
  - y soplan contra la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo se refiere al soplar del viento; «soplan sobre la tierra» es idiomático y conserva el sentido meteorológico del texto.
theological_decisions:
- issue: Sentido de ነፋሳት en un pasaje cosmológico
  english_pob_reading: winds
  chosen_spanish_reading: vientos
  alternative_spanish_readings:
  - espíritus
  - alientos
  rationale: Aunque el término ge'ez puede abarcar viento/espíritu/aliento, el contexto del Libro de las Lumbreras trata de aberturas cósmicas para los vientos. Traducir «vientos» respeta el sentido local del pasaje y evita una carga doctrinal no presente aquí.
  doctrine_reference: Mantener el sentido contextual inmediato; no trasladar usos pneumatológicos posteriores a un texto meteorológico/cosmológico.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión textual más reciente que corrige la OCR ge'ez y entiende ወእልኩ ኃዋላው como parte de la afirmación de que los portales estaban abiertos, evitando la antigua lectura «abiertos alrededor». La redacción española sigue esa corrección y mantiene la estructura del versículo sin añadir interpretaciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - «Portales» se usa de forma consistente con el lenguaje cósmico del libro y con la decisión inglesa auditada.
  - «Vientos» se conserva con su sentido físico local; no se espiritualiza el término.
  - La puntuación reproduce una sola oración con dos miembros coordinados, acorde con la sintaxis del original.
