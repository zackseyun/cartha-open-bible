  yaml_path: translation/extra_canonical/1_enoch/076/004.yaml
  text: Through four of them come forth winds of blessing and peace[a], and from those eight come forth winds of scourging; when they are sent out, they bring ruin upon all the earth and the water on it, and upon all who dwell on it[c][b], and upon everything that is in the water and on the dry land.
  footnotes:
