translation:
  language: es
  text: A través de cuatro de ellos salen vientos de bendición y paz, y de aquellos ocho salen vientos de azote[a]; cuando son enviados, traen ruina sobre toda la tierra y el agua sobre ella[b], y sobre todos los que habitan en ella[c], y sobre todo lo que está en el agua y sobre la tierra seca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vientos de castigo» o «vientos de aflicción». El término ge'ez denota una corrección destructiva; «azote» se elige para conservar la fuerza de la imagen.
    reason: lexical_alternative
  - marker: b
    text: La frase «el agua sobre ella» sigue de cerca el ge'ez. Puede aludir a las aguas asociadas con la tierra en esta descripción cosmológica.
    reason: cultural_note
  - marker: c
    text: O «de tres de ellos». La revisión del texto fuente corrige aquí un error de OCR en el numeral; en este versículo la lectura correcta es «cuatro» para los portales de bendición.
    reason: previous_rendering
lexical_decisions:
- source_word: በ፫እምኔሆሙ / revised as four portals
  english_pob_choice: Through four of them
  chosen_spanish: A través de cuatro de ellos
  alternatives_spanish:
  - Por medio de cuatro de ellos
  - A través de cuatro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; audit revision on OCR numeral ፬
  rationale: La revisión auditada corrige el numeral a cuatro; en español, «a través de» conserva la idea de paso por portales sin volver la frase rígida. Mantiene la relación estructural con el contraste posterior «de aquellos ocho».
- source_word: ይወፅኡ
  english_pob_choice: come forth
  chosen_spanish: salen
  alternatives_spanish:
  - salen hacia afuera
  - emergen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Salen» es natural en español y conserva el movimiento de procedencia/emergencia sin perder el tono descriptivo del pasaje cosmológico. «Emergen» sería más interpretativo.
- source_word: ነፋሳት
  english_pob_choice: winds
  chosen_spanish: vientos
  alternatives_spanish:
  - aires
  - espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico-cósmico se trata de vientos físicos, no de espíritus personales. «Vientos» preserva la imagen meteorológica y la arquitectura del texto.
- source_word: በረከት፡ ወሰላም
  english_pob_choice: blessing and peace
  chosen_spanish: bendición y paz
  alternatives_spanish:
  - bendición y bienestar
  - prosperidad y paz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Bendición y paz» mantiene el registro elevado y la pareja habitual sin desplazar el sentido hacia prosperidad material. Es la forma más directa y fiel en español.
- source_word: እምእልኩ፡ ሰማንቱ
  english_pob_choice: from those eight
  chosen_spanish: de aquellos ocho
  alternatives_spanish:
  - de los ocho
  - de esos ocho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo remite a los ocho ya enumerados; «aquellos» preserva la referencia anafórica y el contraste con los cuatro primeros portales.
- source_word: መቅሠፍት
  english_pob_choice: scourging
  chosen_spanish: azote
  alternatives_spanish:
  - castigo
  - plaga
  - aflicción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Azote» conserva la fuerza de juicio y golpe castigador que el inglés POB quiso mantener con «scourging». En español suena solemne sin suavizar la imagen punitiva.
- source_word: ሶበ፡ ይትፈነዉ
  english_pob_choice: when they are sent out
  chosen_spanish: cuando son enviados
  alternatives_spanish:
  - cuando son despachados
  - cuando son soltados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva impersonal expresa una comisión o liberación ordenada; «son enviados» preserva la agencia implícita y funciona bien en español bíblico contemporáneo.
- source_word: ይደመስስዋ
  english_pob_choice: they bring ruin upon
  chosen_spanish: traen ruina sobre
  alternatives_spanish:
  - destruyen
  - devastan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Traen ruina sobre» retiene el valor resultativo del verbo y se ajusta al encadenamiento de objetos del texto. Evita reducir el efecto a un verbo más plano.
- source_word: ለኵላ፡ ምድር፡ ወማይ፡ ዘዲቤሃ
  english_pob_choice: all the earth and the water on it
  chosen_spanish: toda la tierra y el agua sobre ella
  alternatives_spanish:
  - toda la tierra y el agua en ella
  - toda la tierra y las aguas sobre ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo la formulación espacial inusual del ge'ez, porque forma parte de la descripción cosmológica. «Sobre ella» preserva la relación de pertenencia/ubicación sin normalizarla demasiado.
- source_word: ኵሉ፡ እለ፡ የኃድሩ፡ ዲቤሃ
  english_pob_choice: all who dwell on it
  chosen_spanish: todos los que habitan en ella
  alternatives_spanish:
  - todos los que viven en ella
  - todos sus habitantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Habitan» conserva el registro formal y la relación con el pronombre «ella», paralelo a la frase previa. Evita una paráfrasis demasiado libre.
- source_word: ኵሉ፡ ዘሀሎ፡ ውስተ፡ ማይ፡ ወዲበ፡ የብስ
  english_pob_choice: everything that is in the water and on the dry land
  chosen_spanish: todo lo que está en el agua y sobre la tierra seca
  alternatives_spanish:
  - todo lo que hay en el agua y en la tierra seca
  - todo lo que está en las aguas y sobre la tierra seca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tierra seca» corresponde bien a የብስ y conserva el contraste creación/espacio acuático. «Todo lo que está» mantiene el alcance total sin volverlo explicativo de más.
theological_decisions:
- issue: Renderizado de ነፋሳት como vientos y no espíritus
  english_pob_reading: winds, not personal spirits, within the cosmic portal framework
  chosen_spanish_reading: vientos, no espíritus
  alternative_spanish_readings:
  - espíritus
  - aires
  rationale: El contexto del libro astronómico describe fuerzas meteorológicas que salen por portales ordenados. Traducir «espíritus» desharía esa estructura y añadiría una personificación que el texto no exige.
  doctrine_reference: Principio POB de primacía del sentido del pasaje original; preservar el marco astronómico-cósmico.
- issue: Intensidad de መቅሠፍት en el juicio
  english_pob_reading: scourging as destructive chastisement
  chosen_spanish_reading: azote
  alternative_spanish_readings:
  - castigo
  - plaga
  - aflicción
  rationale: La imagen no es solo una desgracia genérica; comunica golpe disciplinario y ruina. «Azote» mantiene el matiz de juicio violento sin convertirlo en fórmula doctrinal posterior.
  doctrine_reference: Preservar imaginería apocalíptica de juicio sin atenuación léxica.
translation_notes:
  revision_awareness: He seguido la revisión auditada que corrige el numeral de 3 a 4 en la primera cláusula, conforme a la cosmología explícita de 1 Enoc 76 (cuatro portales de bendición y ocho de castigo). También integré la revisión menor que naturaliza la preposición espacial en la segunda mitad sin perder el paralelismo del ge'ez.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Mantuve «vientos» en todo el versículo por consistencia con el marco cosmológico.
  - Conservé el paralelismo entre «cuatro» y «ocho» para reflejar la estructura enumerativa del pasaje.
  - Preferí «tierra seca» para የብስ por coherencia con el contraste agua/tierra del final.
