    reason: lexical_alternative
  - marker: b
    text: The phrase 'the water upon it' is rendered closely from the Ge'ez. It may refer to the waters associated with the earth/land in this cosmological description.
    reason: cultural_note
  - marker: c
    text: Or 'From three of them'.
    reason: previous_rendering
