translation:
  language: es
  text: Y sale el primer viento de aquellos portales[a], cuyo nombre es el viento del oriente, por la primera puerta que está hacia el oriente; y volviéndose hacia el sur, de ella salen desolación, sequía, muerte y destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De aquellos portales» conserva la imagen plural del texto; también podría entenderse «de esas puertas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይወፅእ
  english_pob_choice: and ... goes out
  chosen_spanish: y sale
  alternatives_spanish:
  - y sale fuera
  - y se emite
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen de un viento que procede de una puerta se expresa de forma natural con «sale», manteniendo el movimiento de procedencia sin forzar un calco.
- source_word: ቀዳማይ ነፋስ
  english_pob_choice: the first wind
  chosen_spanish: el primer viento
  alternatives_spanish:
  - el viento primero
  - el viento anterior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Primer» conserva la secuencia ordenada de la lista cósmica y evita perder el valor de enumeración del texto.
- source_word: እምእልክቱ ኃዋሳው
  english_pob_choice: from those gates
  chosen_spanish: de aquellos portales
  alternatives_spanish:
  - de esas puertas
  - de aquellos accesos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Portales» mantiene el registro cosmográfico y la pluralidad imaginal del pasaje; «aquellos» refleja el demostrativo del original.
- source_word: ዘስሙ ጽባሓይ
  english_pob_choice: whose name is the east wind
  chosen_spanish: cuyo nombre es el viento del oriente
  alternatives_spanish:
  - que se llama viento del oriente
  - cuyo nombre es viento de oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula nominal se conserva de manera directa; «viento del oriente» expresa con claridad que el nombre es direccional, no meramente topográfico.
- source_word: በቀዳሚት ኆኅት
  english_pob_choice: through the first gate
  chosen_spanish: por la primera puerta
  alternatives_spanish:
  - a través de la primera puerta
  - por la primera abertura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Puerta» es más natural en español y mantiene la imagen repetida de accesos/gates del conjunto.
- source_word: እንተ መንገለ ጽባሕ
  english_pob_choice: that is toward the east
  chosen_spanish: que está hacia el oriente
  alternatives_spanish:
  - que mira al oriente
  - que está hacia el este
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hacia el oriente» reproduce la orientación del texto y evita una paráfrasis excesiva; «está» traduce con sobriedad la relación espacial.
- source_word: ታጸንኑ ለአዜብ
  english_pob_choice: turning toward the south
  chosen_spanish: volviéndose hacia el sur
  alternatives_spanish:
  - inclinándose hacia el sur
  - girando hacia el sur
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro direccional es difícil; «volviéndose» conserva la idea de desviación hacia el sur sin decidir demasiado entre las posibilidades léxicas.
- source_word: ድምሳሴ
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - ruina
  - devastación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Desolación» conserva el tono apocalíptico y el efecto sobre la tierra mejor que un término más general.
- source_word: ናብስት
  english_pob_choice: drought
  chosen_spanish: sequía
  alternatives_spanish:
  - aridez
  - sequedad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «sequía» comunica el daño climático de modo concreto y natural.
- source_word: ሞት
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - mortalidad
  - morir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez leído en el expediente significa «muerte»; la versión española debe conservar esa lectura y no suavizarla a «calor».
- source_word: ሐጕል
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - arrasamiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término final resume la acción devastadora del viento; «destrucción» mantiene amplitud y fuerza.
theological_decisions:
- issue: Si la secuencia debe leerse como meteorología neutra o como imaginería cósmica apocalíptica
  english_pob_reading: Retain the catastrophic sequence as part of apocalyptic cosmic order
  chosen_spanish_reading: Conservar la secuencia catastrófica como parte del orden cósmico apocalíptico
  alternative_spanish_readings:
  - Reducir la lista a simples efectos meteorológicos
  - Suavizar el tono a una descripción natural
  rationale: El contexto del Libro Astronómico presenta los vientos como agentes cósmicos con efectos funestos; la traducción española debe mantener ese registro ominoso sin banalizarlo.
  doctrine_reference: Mantener la imaginería apocalíptica; no neutralizar fórmulas de juicio en prosa moderna genérica.
translation_notes:
  revision_awareness: El expediente confirma la lectura «muerte» para ወሞት y rechaza la emendación a «calor»; también corrige la relación espacial a «hacia el oriente» y la procedencia a «de ella». La presente versión refleja esa revisión y mantiene la secuencia catastrófica completa.
  spanish_consistency_notes:
  - Se usa «oriente» en lugar de «este» para conservar la terminología direccional solemne y la coherencia con la imaginería astronómica.
  - Se mantiene «portal/puerta» como vocabulario de acceso cosmológico, sin sustituirlo por un término eclesiástico.
  - «Muerte» se conserva por fidelidad al ge'ez y al pasaje revisado; no se atenúa a una lectura meteorológica.
  - 'Los corchetes de nota aparecen solo donde hay anclaje textual real: [a] en «aquellos portales» y [b] en «muerte».'
