translation:
  language: es
  text: Y los tres primeros están hacia el oriente, y tres hacia el norte, y tres después de estos, a la izquierda[a][b], hacia el sur[c], y tres hacia el occidente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión 'a la izquierda' refleja la convención antigua de orientarse mirando hacia el oriente; en ese esquema, el lado izquierdo corresponde al norte, así como el lado derecho corresponde al sur.
    reason: cultural_note
  - marker: b
    text: La porción entre corchetes en el testimonio etiópico disponible sugiere cierta incertidumbre textual en torno a 'después de estos, a la izquierda'; la traducción conserva la frase, pero señala aquí esa incertidumbre.
    reason: textual_variant
  - marker: c
    text: 'O bien: ''Y los tres primeros están hacia el oriente, y tres hacia el sur, y después de estos, a la izquierda, tres hacia el norte y tres hacia el occidente''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ቀዳማያት
  english_pob_choice: on the east side / toward the east
  chosen_spanish: los primeros tres están hacia el oriente
  alternatives_spanish:
  - los tres primeros están hacia el oriente
  - los primeros tres, hacia el oriente
  - los tres de primero, hacia el oriente
  lexicon: Dillmann
  rationale: El ge’ez marca prioridad/primacía con sentido ordinal, no solo una dirección. En español, 'los primeros tres' conserva ese valor y 'hacia el oriente' expresa la orientación espacial.
- source_word: መንገለ
  english_pob_choice: side
  chosen_spanish: hacia
  alternatives_spanish:
  - del lado de
  - en la dirección de
  - por la parte de
  lexicon: Dillmann
  rationale: En esta lista direccional, el sustantivo ge’ez funciona como marcador de orientación. En español, una construcción con 'hacia' resulta más natural y mantiene la relación espacial.
- source_word: ጽባሕ
  english_pob_choice: east
  chosen_spanish: oriente
  alternatives_spanish:
  - este
  - levante
  lexicon: Dillmann
  rationale: Aunque el término está asociado etimológicamente con la mañana/amanecer, aquí la función es claramente direccional. 'Oriente' es solemne y preciso en este contexto.
- source_word: መስዕ
  english_pob_choice: south
  chosen_spanish: el sur
  alternatives_spanish:
  - sur
  - la parte sur
  - el lado derecho
  lexicon: Dillmann
  rationale: El contexto astronómico exige la dirección cardinal. Se evita 'lado derecho' en el texto principal para no oscurecer la referencia espacial, aunque esa orientación antigua queda sugerida por la nota.
- source_word: በድኅረ እሉ
  english_pob_choice: after these
  chosen_spanish: después de estos
  alternatives_spanish:
  - después de ellos
  - tras éstos
  - luego de estos
  lexicon: Dillmann
  rationale: La frase introduce la continuación del catálogo. 'Después de estos' es fiel y formal en español.
- source_word: በፀጋም
  english_pob_choice: on the left
  chosen_spanish: a la izquierda
  alternatives_spanish:
  - del lado izquierdo
  - a mano izquierda
  lexicon: Dillmann
  rationale: Se conserva la orientación corporal antigua porque el texto la mantiene explícitamente. 'A la izquierda' es la forma más natural en español contemporáneo.
- source_word: አዜብ
  english_pob_choice: north
  chosen_spanish: el norte
  alternatives_spanish:
  - norte
  - la parte norte
  - el lado izquierdo
  lexicon: Dillmann
  rationale: La referencia geográfica es la dirección cardinal. Se traduce por 'el norte' y no por 'izquierda' para preservar la claridad del catálogo direccional.
- source_word: ዓረብ
  english_pob_choice: west
  chosen_spanish: el occidente
  alternatives_spanish:
  - el oeste
  - occidente
  - poniente
  lexicon: Dillmann
  rationale: '''Occidente'' mantiene el registro elevado del pasaje y corresponde a la dirección occidental en el esquema cósmico.'
theological_decisions:
- issue: Preservar la tensión entre orientación corporal antigua y direcciones cardinales
  english_pob_reading: Retain 'on the left' alongside 'north'
  chosen_spanish_reading: Mantener 'a la izquierda' junto con 'el norte'
  alternative_spanish_readings:
  - Eliminar la referencia corporal y dejar solo direcciones cardinales
  - 'Traducir solo con lenguaje corporal: ''a la izquierda'''
  rationale: El texto refleja una cosmología antigua en la que se orienta el espacio mirando al oriente. Conservar ambas expresiones evita borrar esa lógica histórica y mantiene la ambigüedad documentada por la tradición textual.
  doctrine_reference: Translation philosophy §3, preserve tension/ambiguity where present
- issue: Tratamiento de la variante textual señalada en el testimonio etiópico
  english_pob_reading: The bracketed portion suggests uncertainty around 'after these, on the left'
  chosen_spanish_reading: Marcar la incertidumbre con una nota sin alterar el texto principal
  alternative_spanish_readings:
  - Suavizar la frase para eliminar la incertidumbre
  - Reescribir el orden para resolver la variante
  rationale: El testimonio etiópico presenta una zona textual incierta. La versión española conserva la secuencia recibida y explica la variante en nota para no ocultar la tensión del texto fuente.
  doctrine_reference: Translation philosophy §3, preserve textual uncertainty where documented
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió dos problemas del borrador inglés precedente: la omisión de ''los primeros'' y el intercambio de norte/sur. Esta versión española sigue la lectura revisada y conserva también la referencia explícita a la izquierda sin resolverla artificialmente.'
  spanish_consistency_notes:
  - Se usa 'oriente' / 'occidente' en estilo elevado y consistente con un registro bíblico sobrio.
  - Se mantiene 'a la izquierda' como huella de la orientación antigua, pero el texto principal identifica claramente el norte y el sur por su valor cardinal.
  - No se introduce 'Yahvé' ni otros términos divinos porque el versículo es puramente direccional.
  - La puntuación busca reflejar la enumeración del original sin añadir interpretación.
