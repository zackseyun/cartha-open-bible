  - severity: low
    issue: Anclaje menos natural de la nota cultural
    rationale: La nota [a] se coloca en 'oriente', pero su contenido explica sobre todo la expresión 'a la izquierda' dentro del esquema de orientación antigua. Reubicarla mejora la legibilidad y la correspondencia entre texto y nota.
