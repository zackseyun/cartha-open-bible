    rationale: 'El historial aplicado exige mantener la tensión textual tal como quedó corregida en inglés: primero ''norte'' y luego, tras ''a la izquierda'', ''sur''. El borrador español refleja esa secuencia en el texto, pero sus decisiones léxicas asignan መስዕ al sur y አዜብ al norte, contradiciendo la corrección documentada y generando un problema de fidelidad editorial.'
