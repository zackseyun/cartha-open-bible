translation:
  language: es
  text: Tres de ellos están abiertos en la faz[a] del cielo, y tres en el oeste, y tres a la derecha del cielo[b], y tres a la izquierda[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «en la parte frontal del cielo». La expresión conserva la imaginería corporal del texto y puede denotar la faz o extensión visible del cielo.
    reason: lexical_alternative
  - marker: b
    text: O «en la faz del cielo».
    reason: previous_rendering
  - marker: c
    text: La expresión «derecha ... izquierda» puede entenderse como orientación cósmica corporal; algunos lectores la relacionan con sur y norte según la orientación del texto.
    reason: cultural_note
lexical_decisions:
- source_word: ፫እም ኔሆሙ
  english_pob_choice: three of them
  chosen_spanish: Tres de ellos
  alternatives_spanish:
  - Tres
  - Tres de entre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor partitivo del numeral con el pronombre remite al conjunto de aberturas ya mencionado. «Tres de ellos» conserva mejor esa referencia que un simple «tres».
- source_word: ርኅዋት
  english_pob_choice: are open
  chosen_spanish: están abiertos
  alternatives_spanish:
  - son abiertos
  - están abiertas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto describe portales o aperturas que se hallan en estado abierto. En español, «están abiertos» comunica bien ese estado predicativo sin forzar una nominalización.
- source_word: በገጸ ሰማይ
  english_pob_choice: in the face of heaven
  chosen_spanish: en la frente del cielo
  alternatives_spanish:
  - en la faz del cielo
  - en la cara del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen corporal de ገጽ como metáfora espacial. «Frente» permite reflejar la orientación del pasaje sin perder el tono concreto del original; «faz» sería más literal pero menos natural en español actual.
- source_word: በምዕራብ
  english_pob_choice: in the west
  chosen_spanish: en el oeste
  alternatives_spanish:
  - al oeste
  - hacia el oeste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un término direccional directo y se traduce de forma idiomática en español.
- source_word: በየማነ ሰማይ
  english_pob_choice: at the right of heaven
  chosen_spanish: a la derecha del cielo
  alternatives_spanish:
  - al lado derecho del cielo
  - al sur del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la imagen literal de derecha/izquierda en lugar de resolverla de inmediato como coordenadas cardinales. Eso preserva la tensión interpretativa presente en el texto y en el aparato inglés.
- source_word: በፀጋም
  english_pob_choice: at the left
  chosen_spanish: a la izquierda
  alternatives_spanish:
  - al lado izquierdo
  - al norte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se empareja naturalmente con «a la derecha» para conservar la simetría espacial del original. La lectura como norte puede anotarse, pero no debe imponerse en el texto principal.
theological_decisions:
- issue: Si normalizar el lenguaje cósmico de derecha/izquierda a direcciones cardinales
  english_pob_reading: Retain 'right' and 'left' of heaven in the main text
  chosen_spanish_reading: Mantener «a la derecha del cielo» y «a la izquierda» en el texto principal
  alternative_spanish_readings:
  - «al sur del cielo» y «al norte»
  - «en el lado derecho/izquierdo del cielo»
  rationale: El pasaje pertenece a la cosmología apocalíptica y usa orientación corporal. Traducirla literalmente preserva el registro imaginal y evita aplanar el texto. La equivalencia cardinal sigue siendo posible, pero debe quedar como posibilidad interpretativa, no como sustitución automática.
  doctrine_reference: 'Translation philosophy: preserve original-language primacy and preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente que volvió de «front of heaven» a «face of heaven» para una correspondencia más cercana al original. En español, la decisión resultó en «frente del cielo» para conservar la imagen corporal y la orientación espacial sin introducir una paráfrasis explicativa en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantiene «cielo» para ሰማይ como término cosmológico estándar.
  - Se evita «SEÑOR» porque no hay aquí un nombre divino a ocultar ni un caso de κύριος.
  - 'Se conserva el paralelismo espacial del pasaje: frente/oeste/derecha/izquierda.'
  - No se fuerza una interpretación cardinal en el texto principal, pero queda abierta en nota.
