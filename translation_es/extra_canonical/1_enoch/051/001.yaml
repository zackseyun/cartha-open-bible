translation:
  language: es
  text: Y en aquellos días la tierra devolverá de su vientre[a], y el Seol devolverá lo que ha recibido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde su vientre». El término conserva la imagen de la tierra como receptáculo interior que devuelve lo que tenía dentro.
    reason: lexical_alternative
  - marker: b
    text: Seol es el ámbito de los muertos en el uso judío antiguo; no debe leerse automáticamente como el «infierno» posterior de la tradición cristiana.
    reason: cultural_note
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal apocalíptica se conserva de manera natural en español con «en aquellos días», que mantiene el ritmo visionario y la distancia escatológica.
- source_word: ምድር
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cósmico y de resurrección, «la tierra» reproduce bien el ámbito total de la creación y suena más natural que «el mundo».
- source_word: ማሕፀንታ
  english_pob_choice: from its womb / earth as a containing depth
  chosen_spanish: de su seno
  alternatives_spanish:
  - de su vientre
  - de su interior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el ajuste crítico señalado por la revisión, no se traduce como «vientre» en sentido biológico. «Seno» permite conservar la imagen de un receptáculo interior sin imponer una lectura anatómica que el texto no exige.
- source_word: ወሲኦል
  english_pob_choice: Sheol
  chosen_spanish: el Seol
  alternatives_spanish:
  - Sheol
  - el sepulcro
  - el lugar de los muertos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el término técnico del mundo judío apocalíptico. En español bíblico, «Seol» comunica mejor que «infierno» o «sepulcro» la categoría conceptual distintiva del pasaje.
- source_word: ዘተመጠወት
  english_pob_choice: what it has received
  chosen_spanish: lo que ha recibido
  alternatives_spanish:
  - lo que le fue confiado
  - lo que se le ha entregado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal sugiere restitución de algo depositado o recibido; «lo que ha recibido» sigue de cerca esa relación sin añadir matices no explicitados por el pasaje.
theological_decisions:
- issue: Distinción entre la tierra y el Seol como depósitos de los muertos
  english_pob_reading: The earth and Sheol are two distinct repositories that will give back what they contain.
  chosen_spanish_reading: La tierra y el Seol aparecen como dos receptáculos distintos que devolverán lo que contienen.
  alternative_spanish_readings:
  - la tierra y el sepulcro
  - la tierra y el inframundo
  rationale: Mantener ambos términos diferenciados preserva la tensión conceptual del texto apocalíptico y evita fundir Seol con categorías posteriores más cargadas doctrinalmente.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
translation_notes:
  revision_awareness: 'Se incorporó la corrección crítica más reciente: ማሕፀንታ no se trata como «vientre» ni como «lo confiado a ella», sino como una imagen de interior/receptáculo expresable en español con «seno». También se evitó depender de una lectura que exigiera la nota eliminada por la revisión, y se mantuvo la cláusula del Seol con terminología técnica estable.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - «Seol» se conserva como término técnico transliterado, de acuerdo con la política POB para conceptos del mundo judío antiguo.
  - No se usa «SEÑOR» ni otras sustituciones devocionales para nombres o títulos no presentes en este verso.
  - La puntuación final sigue el castellano natural y evita agregar contenido ajeno al texto fuente.
