translation:
  language: es
  text: 'Y oí la voz del ángel que decía[a]: «Estos son los ángeles que descendieron sobre la tierra y revelaron lo que estaba oculto a los hijos de los hombres[b], y desviaron a los hijos de los hombres para que cometieran pecado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «revelaron lo oculto». La expresión ge'ez señala el desocultamiento de algo que había estado escondido, sin precisar en este verso qué secretos eran.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «los hijos de los hombres», expresión enóquica para la humanidad.
    reason: cultural_note
lexical_decisions:
- source_word: ሰማዕኩ
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  - percibí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo introduce una percepción auditiva directa en un relato visionario; «oí» es natural y conserva la inmediatez del testimonio.
- source_word: ቃሎ ለመልአክ
  english_pob_choice: the voice of the angel
  chosen_spanish: la voz del ángel
  alternatives_spanish:
  - la palabra del ángel
  - el խոս de la voz?
  - el discurso del ángel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de oír y de discurso directo, «voz» reproduce mejor el valor auditivo de ቃል aquí que «palabra», sin perder que se trata del habla del ángel.
- source_word: እንዘ ይብል
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - mientras decía
  - al decir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una construcción narrativa de introducción al discurso; «diciendo» es la forma española más directa y fiel al enlace con la cita.
- source_word: እሉ ውእቶሙ
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos son ellos
  - Aquellos son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula demostrativa-identificativa se expresa de modo natural con «Estos son», conservando el señalamiento directo.
- source_word: መላእክት እለ ወረዱ ዲበ ምድር
  english_pob_choice: the angels who came down upon the earth
  chosen_spanish: los ángeles que descendieron sobre la tierra
  alternatives_spanish:
  - los ángeles que bajaron a la tierra
  - los ángeles que vinieron sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Descendieron» mantiene la imaginería apocalíptica de bajada, y «sobre la tierra» refleja mejor ዲበ que una simple dirección espacial neutra.
- source_word: ወዘበኅቡእ ከሠቱ
  english_pob_choice: and revealed what was hidden
  chosen_spanish: y revelaron lo que estaba oculto
  alternatives_spanish:
  - y descubrieron las cosas ocultas
  - y dieron a conocer lo oculto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase mantiene abierta la referencia del objeto revelado, como en el inglés POB, sin especificar más de lo que el verso afirma.
- source_word: ለውሉደ ሰብእ
  english_pob_choice: to the children of men
  chosen_spanish: a los hijos de los hombres
  alternatives_spanish:
  - a los hijos de la humanidad
  - a los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la expresión en estilo enóquico, de registro elevado, en vez de sustituirla por una paráfrasis más genérica.
- source_word: ወአስሐትዎሙ
  english_pob_choice: and led the children of men astray
  chosen_spanish: y desviaron a los hijos de los hombres
  alternatives_spanish:
  - y engañaron a los hijos de los hombres
  - y los hicieron errar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Desviaron» comunica tanto el engaño como el apartamiento moral; conserva el movimiento causal sin añadir interpretación excesiva.
- source_word: ከመ ይግበሩ ኃጢአተ
  english_pob_choice: so that they committed sin
  chosen_spanish: para que cometieran pecado
  alternatives_spanish:
  - de modo que pecaran
  - para que hicieran pecado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cometieran pecado» expresa de manera idiomática el resultado buscado y mantiene el sustantivo moral del original sin suavizarlo.
theological_decisions:
- issue: Identidad de los ángeles culpables
  english_pob_reading: Render simply as 'the angels who came down upon the earth' without inserting 'Watchers' into the text.
  chosen_spanish_reading: «los ángeles que descendieron sobre la tierra» sin insertar «vigilantes» en el texto principal.
  alternative_spanish_readings:
  - «los vigilantes que descendieron sobre la tierra»
  - «los ángeles caídos»
  rationale: El Ge'ez dice «ángeles»; aunque la tradición enóquica más amplia los asocia con los Vigilantes, este verso no usa ese título. Mantener «ángeles» evita armonizar más allá de la evidencia local.
  doctrine_reference: Preservar el alcance local del pasaje y no importar una identificación posterior sin base explícita en el verso.
- issue: Naturaleza de lo revelado
  english_pob_reading: Translate generally as 'what was hidden' rather than specifying illicit arts or heavenly secrets in the main text.
  chosen_spanish_reading: «lo que estaba oculto» en lugar de concretar el contenido como «secretos» o «artes ilícitas».
  alternative_spanish_readings:
  - «las cosas ocultas»
  - «los misterios»
  - «los secretos prohibidos»
  rationale: El verso afirma ocultamiento y revelación, pero no nombra el objeto. La redacción española conserva esa amplitud y la tensión interpretativa del texto.
  doctrine_reference: Preservar la tensión textual y no resolverla con una especificación no explícita.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente sin cambios sustanciales; la concordancia con el inglés POB y la lectura del ge'ez es alta, y no se incorporaron variantes no atestiguadas por el verso.
  spanish_consistency_notes:
  - Se mantuvo «ángel/ángeles» en vez de «vigilantes», conforme a la redacción local del Ge'ez.
  - Se conservó «hijos de los hombres» como fórmula enóquica establecida, no como simple referencia genérica.
  - «Descendieron sobre la tierra» busca reproducir la imagen de descenso con el matiz de ዲበ.
  - La frase «lo que estaba oculto» deja abierta la identidad del contenido revelado, como en el audit trail inglés.
