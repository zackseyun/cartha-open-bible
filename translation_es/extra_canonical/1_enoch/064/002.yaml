base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/064/002.yaml
  text: And I heard the voice of the angel saying[a], 'These are the angels who came down upon the earth and revealed what was hidden to the children of men[b], and led the children of men astray so that they committed sin.'
  footnotes:
  - marker: a
    text: Or 'disclosed the hidden things.' The Ge'ez expression points to the uncovering of what had been concealed, without specifying in this verse exactly which secrets are meant.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the children of men,' an Enochic expression for humankind.
