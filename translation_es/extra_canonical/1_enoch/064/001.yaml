translation:
  language: es
  text: Y vi otros rostros ocultos en aquel lugar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «semblantes»; la palabra ge'ez significa literalmente «rostros» y puede implicar personas vistas en forma visionaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: ካልአ
  english_pob_choice: other
  chosen_spanish: otros
  alternatives_spanish:
  - otros diferentes
  - otros más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo introduce entidades adicionales respecto de lo ya visto; «otros» comunica esa adición de forma natural en español y mantiene el plural del sustantivo siguiente.
- source_word: ገጻተ
  english_pob_choice: faces
  chosen_spanish: rostros
  alternatives_spanish:
  - caras
  - semblantes
  - personas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La base semántica es «faces». En español, «rostros» preserva la imagen visual y suena más digno que «caras», sin borrar la posible referencia a seres vistos en forma visionaria.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - ví
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un reporte visionario en pasado. «Vi» es natural en español y fiel; «contemplé» sería más literario de lo necesario.
- source_word: በውእቱ መካን
  english_pob_choice: in that place
  chosen_spanish: en aquel lugar
  alternatives_spanish:
  - en ese lugar
  - en aquella región
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase remite al ámbito visionario ya indicado. «Aquel lugar» mantiene distancia deíctica y conserva el matiz local sin sobreespecificarlo.
- source_word: ኅቡኣተ
  english_pob_choice: hidden
  chosen_spanish: ocultos
  alternatives_spanish:
  - escondidos
  - secretos
  - velados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hidden» puede expresarse como «ocultos» en un registro bíblico claro. «Ocultos» mantiene el tono apocalíptico sin añadir interpretación sobre quién los oculta.
theological_decisions:
- issue: Si ገጻተ debe entenderse literalmente como «rostros/caras» o interpretarse como «personas/seres»
  english_pob_reading: faces, with a footnote noting that 'countenances' or persons may be implied
  chosen_spanish_reading: rostros, manteniendo la imagen concreta
  alternative_spanish_readings:
  - personas
  - seres
  - semblantes
  rationale: La brevedad del verso favorece conservar la imagen visual concreta. «Rostros» reproduce el detalle apocalíptico y deja abierta la posibilidad interpretativa sin eliminarla.
  doctrine_reference: Preservar el lenguaje visionario sin convertirlo en una paráfrasis abstracta.
translation_notes:
  revision_awareness: 'El texto inglés POB vigente lee: “And I saw other hidden faces in that place[a].” El presente borrador sigue esa estructura, conserva la imagen de ‘faces’ y mantiene la nota de alternativa léxica donde el ge''ez puede sugerir ‘persons’ implícitamente.'
  spanish_consistency_notes:
  - Se usa «rostros» en vez de «caras» para un registro bíblico más sobrio.
  - Se evita «SEÑOR» o terminología no pertinente porque este verso no contiene el nombre divino.
  - La nota al pie preserva la ambigüedad entre la imagen literal y la posible referencia a personas/seres.
