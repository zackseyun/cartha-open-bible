translation:
  language: es
  text: Y al oriente de estas bestias vi los confines[a] de la tierra, donde el cielo reposa[b], y las puertas abiertas del cielo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los extremos de la tierra». El ge'ez expresa los límites o bordes extremos del mundo.
    reason: lexical_alternative
  - marker: b
    text: La imagen presupone una cosmología antigua en la que el cielo tiene un lugar de reposo o sostén en el borde del mundo.
    reason: cultural_note
  - marker: c
    text: También puede entenderse como «ventanas» o «aberturas» del cielo, según cómo se conciba la arquitectura celestial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ጽባሖሙ
  english_pob_choice: to the east of these
  chosen_spanish: al oriente de estas
  alternatives_spanish:
  - al este de estas
  - más allá de estas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez señala una dirección espacial concreta, no una noción temporal. En español, «al oriente de» conserva el valor direccional y el registro elevado del pasaje visionario.
- source_word: አርዌ
  english_pob_choice: beasts
  chosen_spanish: bestias
  alternatives_spanish:
  - animales
  - monstruos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto inmediato ya habla de seres visionarios; «bestias» sigue de cerca la fuerza del término y encaja con el registro apocalíptico.
- source_word: አጽናፈ ምድር
  english_pob_choice: the ends of the earth
  chosen_spanish: los extremos de la tierra
  alternatives_spanish:
  - los confines de la tierra
  - los bordes de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Extremos» preserva la idea de límites cosmológicos sin suavizarla. También mantiene la alternativa textual/semántica señalada por la tradición inglesa entre «ends» y «extremities».
- source_word: ሰማይ የዐርፍ
  english_pob_choice: the heaven rests
  chosen_spanish: el cielo reposa
  alternatives_spanish:
  - el cielo descansa
  - el cielo se apoya
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Reposa» reproduce la imagen concreta de un cielo que descansa en un soporte, sin reinterpretarla como una metáfora moderna o abstracta.
- source_word: ኀዋኅወ ሰማይ
  english_pob_choice: the open gates of heaven
  chosen_spanish: las puertas abiertas del cielo
  alternatives_spanish:
  - los portales abiertos del cielo
  - las ventanas abiertas del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Puertas» es la solución más natural en español para una abertura arquitectónica del cielo, y «abiertas» conserva el rasgo explícito del original.
- source_word: ርኁዋተ
  english_pob_choice: open
  chosen_spanish: abiertas
  alternatives_spanish:
  - abiertas de par en par
  - desplegadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo describe las aperturas celestes en estado abierto; «abiertas» es la forma más directa y fiel en español.
theological_decisions:
- issue: 'Cosmología antigua: el cielo tiene un lugar de reposo en el borde de la tierra'
  english_pob_reading: 'Retain the concrete image: ''where the heaven rests'''
  chosen_spanish_reading: 'Conservar la imagen concreta: «donde el cielo reposa»'
  alternative_spanish_readings:
  - donde el cielo se encuentra con la tierra
  - en el horizonte del cielo
  rationale: El texto presenta geografía visionaria antigua, no una formulación moderna. Mantener «reposa» deja intacta la imagen cosmológica y su tensión con la lectura contemporánea.
  doctrine_reference: 'Principio de traducción: preservar la imaginería apocalíptica sin racionalizarla ni convertirla en metáfora genérica.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió una omisión importante: el ge''ez menciona explícitamente la dirección «al oriente de estas bestias». También se evitó la repetición accidental presente en una pasada anterior, y se prefirió una formulación española natural para la imagen de las puertas celestes abiertas.'
  spanish_consistency_notes:
  - Se mantiene «cielo» para ሰማይ en sentido cosmológico, no «firmamento», porque el contexto habla de arquitectura celeste.
  - Se conserva «bestias» para አርዌ por coherencia con el registro visionario y apocalíptico.
  - Se usa «abiertas» y no una perífrasis más interpretativa para no debilitar la abertura explícita del texto.
