    issue: «los extremos de la tierra» es menos idiomático que «los confines de la tierra» en este registro
    rationale: Ambas opciones son semánticamente posibles, pero el audit trail ya preserva «confines» como alternativa, y en español bíblico-literario suena más natural para límites cosmológicos.
  - severity: low
    issue: La redacción global puede afinarse para mayor fluidez literaria
    rationale: El contenido es fiel, pero una leve revisión mejora la naturalidad sin alterar el sentido fuente ni las decisiones teológicas.
