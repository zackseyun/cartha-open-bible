  yaml_path: translation/extra_canonical/1_enoch/033/003.yaml
  text: And I saw the portals from which the stars of heaven come out[a], and I wrote down all their outlets, each one by itself, according to their number and their names, by their order and their activity and their times and their months, as Uriel, the holy angel who was with me[c][b], showed me.
