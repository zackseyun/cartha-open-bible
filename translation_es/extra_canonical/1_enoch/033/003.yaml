translation:
  language: es
  text: Y vi los portales[a] por donde salen las estrellas del cielo, y anoté todas sus salidas, cada una por sí misma, conforme a su número y a sus nombres, según su orden, su actividad, sus tiempos y sus meses, como Uriel, el ángel santo que estaba conmigo[b], me mostró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aberturas» o «bocas»; la fuente etiópica conserva una imagen muy vívida para estos puntos de salida celestes.
    reason: lexical_alternative
  - marker: b
    text: 'La frase final sigue la lectura revisada del pasaje: Uriel es presentado como el ángel santo que acompaña a Enoc y le muestra estas realidades.'
    reason: source_note
lexical_decisions:
- source_word: አፎ
  english_pob_choice: mouths / openings / portals
  chosen_spanish: portales
  alternatives_spanish:
  - aberturas
  - boquetes
  - bocas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente del audit trail entiende አፎ como referente a portales/aberturas celestes en la cosmología enóquica. En español, «portales» conserva la imagen arquitectónica y apocalíptica sin volverla demasiado técnica o moderna. Se evita «bocas» en el texto principal por su posible dureza y porque aquí la tradición auditada favorece la lectura de portales.
- source_word: ይወጽኡ / ይወፅኡ
  english_pob_choice: come out / proceed
  chosen_spanish: salen
  alternatives_spanish:
  - salen hacia afuera
  - procede
  - emergen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Salen» reproduce con naturalidad el movimiento de salida desde los portales. Mantiene el paralelismo simple de la frase sin añadir una paráfrasis más interpretativa.
- source_word: ከዋክብተ ሰማይ
  english_pob_choice: the stars of heaven
  chosen_spanish: las estrellas del cielo
  alternatives_spanish:
  - las estrellas del firmamento
  - las estrellas del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Del cielo» es la forma española más transparente y digna para el ámbito cosmológico del pasaje. Conserva el registro elevado del original sin introducir una terminología astronómica ajena.
- source_word: ሙፃኣቲሆሙ
  english_pob_choice: their outlets
  chosen_spanish: sus salidas
  alternatives_spanish:
  - sus salidas
  - sus salidas de allí
  - sus puntos de salida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo derivado de «salir» se vierte de modo directo como «salidas», que en español puede designar los puntos o actos de salida. «Sus salidas» preserva la estructura enumerativa del texto sin forzar una explicación adicional.
- source_word: ለለ፩፩
  english_pob_choice: each one by itself
  chosen_spanish: cada una por sí misma
  alternatives_spanish:
  - una por una
  - cada una individualmente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase distributiva exige una formulación clara en español. «Cada una por sí misma» conserva la idea de individualización y registro separado de cada elemento.
- source_word: በኍልቆሙ
  english_pob_choice: according to their number
  chosen_spanish: conforme a su número
  alternatives_spanish:
  - según su número
  - de acuerdo con su número
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Conforme a su número» suena natural y mantiene la idea de correspondencia exacta con el conteo. Se evita una paraprasis que suavice la fuerza enumerativa.
- source_word: እስማቲሆሙ
  english_pob_choice: their names
  chosen_spanish: sus nombres
  alternatives_spanish:
  - sus nombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Traducción directa y transparente; el pasaje insiste en el orden catalogado de las estrellas.
- source_word: በደርጎሙ
  english_pob_choice: by their order
  chosen_spanish: por su orden
  alternatives_spanish:
  - según su orden
  - por su disposición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Por su orden» reproduce la secuencia del catálogo y mantiene la ambigüedad entre orden, rango y disposición.
- source_word: ወምገባሮሙ
  english_pob_choice: their activity
  chosen_spanish: su actividad
  alternatives_spanish:
  - sus funciones
  - su obra
  - su funcionamiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto astronómico, el término apunta a lo que las estrellas hacen o cómo operan. «Actividad» es suficientemente amplio y fiel al valor operativo del término.
- source_word: ወጊዜሆሙ
  english_pob_choice: their times
  chosen_spanish: sus tiempos
  alternatives_spanish:
  - sus tiempos
  - sus momentos
  - sus estaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sus tiempos» retiene la referencia a ritmos o tiempos establecidos. Es la opción más neutral para no imponer «estaciones» o una lectura calendárica más específica de la que permite el texto.
- source_word: ወአውራኂሆሙ
  english_pob_choice: their months
  chosen_spanish: sus meses
  alternatives_spanish:
  - sus meses
  - sus lunas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto menciona meses de manera directa; «meses» es la equivalencia natural y conserva el marco calendárico del pasaje.
- source_word: ኡርኤል መልአክ ዘምስሌየ ቅዱስ
  english_pob_choice: Uriel, the holy angel who was with me
  chosen_spanish: Uriel, el santo ángel que estaba conmigo
  alternatives_spanish:
  - Uriel, el ángel santo que estaba conmigo
  - Uriel, el santo mensajero que estaba conmigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva «ángel» para መልአክ en este contexto apocalíptico. «Santo» se mantiene como adjetivo, no como título, y «que estaba conmigo» refleja la relación acompañante del texto.
theological_decisions:
- issue: Imaginario cosmológico de portales celestes
  english_pob_reading: Preserve literal imagery of heavenly portals and stellar emergence rather than recasting the scene as ordinary astronomical observation.
  chosen_spanish_reading: Mantener la imagen literal de portales celestes y de las estrellas que salen por ellos, sin convertirla en una descripción abstracta del amanecer o de horizontes.
  alternative_spanish_readings:
  - describir simplemente dónde salen las estrellas
  - reducir los portales a una metáfora de los puntos de salida
  rationale: El pasaje pertenece a una cosmología apocalíptica concreta; la traducción debe respetar ese mundo imaginario tal como aparece en la fuente. Por eso se conserva el lenguaje de portales y salida visible.
  doctrine_reference: Principio de primacía del texto fuente y preservación de la imaginería apocalíptica.
translation_notes:
  revision_awareness: 'El audit trail mostró una corrección importante respecto de lecturas previas: el inicio ya no debe entenderse como «cómo salen» las estrellas ni como una enumeración añadida por «y conté», sino como una visión de los portales por donde salen las estrellas del cielo. La redacción española sigue esa revisión y mantiene el resto de la secuencia catalogadora del pasaje.'
  spanish_consistency_notes:
  - Se usa «portales» de manera consistente para el ámbito celeste del pasaje.
  - Se mantiene «ángel» y no «mensajero» por coherencia con el uso apocalíptico del término en la obra.
  - Se conserva la enumeración en serie con comas y la repetición de «por» para reflejar el ritmo del original.
