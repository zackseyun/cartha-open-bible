  yaml_path: translation/extra_canonical/1_enoch/033/001.yaml
  text: And from there I went to the ends of the earth[a], and there I saw great beasts, and they differed from one another; and the birds also differed in their appearance and their forms[c][b], and their voices also differed one from another.
  footnotes:
