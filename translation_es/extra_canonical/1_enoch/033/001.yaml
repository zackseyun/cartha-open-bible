    text: Literally, 'their faces.' The broader rendering 'appearance' is used here because the verse describes how the birds differed visibly as well as in bodily form and voice.
    reason: lexical_alternative
  - marker: b
    text: The term rendered 'the form of their bodies' is somewhat uncertain in this OCR witness; it likely refers to bodily shape or build.
    reason: textual_variant
  - marker: c
    text: Or 'and the birds also differed in their appearance and in the form of their bodies and in their voices, each from the other.'.
    reason: previous_rendering
