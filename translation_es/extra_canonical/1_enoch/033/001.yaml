translation:
  language: es
  text: Y desde allí fui hasta los confines de la tierra[a], y allí vi grandes bestias, y se distinguían unas de otras; y también las aves se distinguían en su apariencia y en sus formas[c][b], y también sus voces se distinguían unas de otras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva esta imagen espacial porque el verso describe un horizonte cósmico, no solo lugares remotos.
    reason: theological_explanation
  - marker: b
    text: El término subyacente es incierto en este testimonio OCR y probablemente alude a la forma o conformación corporal.
    reason: textual_variant
  - marker: c
    text: 'O: «y las aves también se distinguían en su apariencia, y en la forma de sus cuerpos, y en sus voces, cada una de la otra».'
    reason: previous_rendering
lexical_decisions:
- source_word: እምህየ
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión marca desplazamiento continuo en la visión. «Desde allí» conserva el valor de procedencia/deixis con español natural y solemne.
- source_word: ሖርኩ
  english_pob_choice: I went
  chosen_spanish: fui
  alternatives_spanish:
  - anduve
  - viajé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo relata movimiento simple en primera persona. «Fui» mantiene la sobriedad narrativa sin añadir colorido innecesario.
- source_word: አጽናፈ ምድር
  english_pob_choice: the ends of the earth
  chosen_spanish: los confines de la tierra
  alternatives_spanish:
  - los extremos de la tierra
  - los bordes de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Confines» expresa bien el idiomа cósmico y apocalíptico en español, preservando el alcance del horizonte terrestre sin reducirlo a lugares lejanos.
- source_word: ወርኢኩ በህየ
  english_pob_choice: and there I saw
  chosen_spanish: y allí vi
  alternatives_spanish:
  - y vi allí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la localización escénica con «allí», que en español mantiene el ritmo visionario del relato.
- source_word: አራዊተ ዐበይተ
  english_pob_choice: great beasts
  chosen_spanish: grandes bestias
  alternatives_spanish:
  - bestias grandes
  - grandes animales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Bestias» reproduce el tono elevado y salvaje del término; «grandes» refleja el adjetivo sin suavizar el matiz apocalíptico.
- source_word: ይትዌለጥ
  english_pob_choice: differed
  chosen_spanish: se distinguían
  alternatives_spanish:
  - diferían
  - eran distintas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo repetido señala contraste visible y audible entre seres. «Se distinguían» suena natural en español y comunica la diferenciación recíproca.
- source_word: ፩እምካልኡ
  english_pob_choice: from one another
  chosen_spanish: unas de otras
  alternatives_spanish:
  - las unas de las otras
  - entre sí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para aves y bestias en plural femenino en español, «unas de otras» expresa relación recíproca de modo idiomático y claro.
- source_word: አዕዋፍሂ
  english_pob_choice: the birds also
  chosen_spanish: las aves también
  alternatives_spanish:
  - las aves asimismo
  - y las aves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Aves» es más natural que «pájaros» en un registro bíblico amplio; «también» reproduce el valor aditivo del enclítico.
- source_word: ገጾሙ
  english_pob_choice: their appearance
  chosen_spanish: su apariencia
  alternatives_spanish:
  - su aspecto
  - sus rostros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque literalmente dice «sus rostros», en este contexto zoológico la referencia visible general es mejor expresada por «apariencia», como en el audit trail inglés.
- source_word: ስኖሙ
  english_pob_choice: their forms
  chosen_spanish: sus formas
  alternatives_spanish:
  - la forma de sus cuerpos
  - su conformación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es algo incierto; el rastro inglés revisado favorece una traducción breve y abierta. «Formas» conserva la ambigüedad sin sobredeterminar el detalle anatómico.
- source_word: ቃሎሙሂ
  english_pob_choice: their voices
  chosen_spanish: sus voces
  alternatives_spanish:
  - sus sonidos
  - sus trinos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene «voces» porque el texto subraya diferenciación audible. «Sonidos» sería más general y «trinos» demasiado específico.
theological_decisions:
- issue: Cómo verter el destino cósmico de la visión
  english_pob_reading: the ends of the earth
  chosen_spanish_reading: los confines de la tierra
  alternative_spanish_readings:
  - los extremos de la tierra
  - los bordes de la tierra
  rationale: La escena pertenece al mapeo apocalíptico del mundo. «Confines de la tierra» conserva la amplitud cósmica con español idiomático y digno.
  doctrine_reference: Principio de equivalencia óptima; preservación de imaginería apocalíptica
- issue: Cómo traducir el contraste visual de ገጾሙ sin forzar el literalismo
  english_pob_reading: their appearance
  chosen_spanish_reading: su apariencia
  alternative_spanish_readings:
  - sus rostros
  - su aspecto
  rationale: Como el sujeto son aves y el contexto enumera rasgos observables, «apariencia» comunica mejor la categoría visual que «rostros», sin perder anclaje textual.
  doctrine_reference: Claridad semántica sin borrar la base léxica del ge'ez
- issue: Cómo reflejar la repetición del verbo de diferencia en bestias, aves y voces
  english_pob_reading: differed
  chosen_spanish_reading: se distinguían
  alternative_spanish_readings:
  - diferían
  - eran distintas
  rationale: El ge'ez repite el verbo para enfatizar distinción. «Se distinguían» permite mantener esa repetición natural en español y expresa la diferencia mutua en los tres ámbitos.
  doctrine_reference: Preservación de énfasis retórico del original
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: se recuperó la repetición de ይትዌለጥ («se distinguían/diferían») y el valor aditivo de ቃሎሙሂ («sus voces también»). La versión española sigue esa revisión, evitando la expansión innecesaria de ስኖሙ a «la forma de sus cuerpos» en el cuerpo principal, pero la preserva como alternativa en nota para no borrar la tensión textual.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton ni un título divino explícito.
  - Se usa «bestias» y «aves» para conservar el registro apocalíptico; no se sustituye por términos zoológicos más neutros que atenúen el tono.
  - «Se distinguían» se repite de modo deliberado para reflejar la reiteración del original.
  - 'La puntuación divide las dos secuencias paralelas del verso para hacer visible la estructura: bestias / aves / voces.'
