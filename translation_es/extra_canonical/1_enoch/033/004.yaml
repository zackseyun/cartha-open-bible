translation:
  language: es
  text: Él me mostró todo y lo escribió para mí; y de nuevo escribió para mí sus nombres, sus órdenes[a][b] y sus compañías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «sus mandamientos», «sus instrucciones» o «sus ordenanzas». El término ge''ez puede denotar instrucciones con autoridad o regulaciones prescritas.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «sus mandamientos».'
    reason: previous_rendering
  - marker: c
    text: 'También: «sus asambleas» o «sus grupos». La frase probablemente se refiere a divisiones ordenadas dentro de la escena visionaria celestial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ኵሎ
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo eso
  - todas las cosas
  lexicon: Dillmann
  rationale: El término es totalizante y funciona como objeto de lo que fue mostrado. «Todo» es natural en español y conserva el alcance completo sin añadir contenido.
- source_word: አርአየኒ
  english_pob_choice: he showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me reveló
  lexicon: Dillmann
  rationale: El verbo de visión mantiene el carácter concreto de la escena apocalíptica. «Me mostró» es directo y fiel; «me reveló» sería más interpretativo.
- source_word: ጸሐፈ ሊተ
  english_pob_choice: wrote it down for me
  chosen_spanish: lo escribió para mí
  alternatives_spanish:
  - lo anotó para mí
  - lo registró para mí
  lexicon: Dillmann
  rationale: La repetición indica una acción de escritura o registro en beneficio de Enoch. «Lo escribió para mí» conserva esa idea sin sobreespecificar el soporte.
- source_word: ወዓዲ
  english_pob_choice: and again
  chosen_spanish: y de nuevo
  alternatives_spanish:
  - y otra vez
  - y además
  lexicon: Dillmann
  rationale: Marca una segunda acción después de la primera. «Y de nuevo» conserva la secuencia repetida de manera natural.
- source_word: አስማቲሆሙ
  english_pob_choice: their names
  chosen_spanish: sus nombres
  alternatives_spanish:
  - los nombres de ellos
  lexicon: Dillmann
  rationale: Es una traducción directa del sustantivo plural con sufijo pronominal. «Sus nombres» es claro y no añade matices innecesarios.
- source_word: ትእዛዞሙ
  english_pob_choice: their commands
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus órdenes
  - sus instrucciones
  - sus decretos
  lexicon: Dillmann
  rationale: La base ge'ez puede significar «mandamiento», «orden» o «ordinanza». En español, «mandamientos» mantiene la fuerza normativa y suena más estable que «órdenes» en este contexto visionario; no se adopta «leyes» porque el estado textual reciente volvió a «commands» en el audit trail inglés.
- source_word: ማኅበራቲሆሙ
  english_pob_choice: their companies
  chosen_spanish: sus compañías
  alternatives_spanish:
  - sus asambleas
  - sus grupos
  - sus divisiones
  lexicon: Dillmann
  rationale: El término sugiere agrupaciones u organizaciones ordenadas. «Compañías» conserva un registro elevado y permite el sentido de cuerpos ordenados sin reducir la imagen a un simple grupo.
theological_decisions:
- issue: Si el final del versículo debe sonar como grupos celestiales ordenados o como agrupaciones genéricas
  english_pob_reading: Render the final term as 'companies' to preserve the sense of ordered celestial groupings without over-interpreting.
  chosen_spanish_reading: Conservar «sus compañías» para mantener la idea de agrupaciones ordenadas sin convertirlas en una explicación más específica de lo que el texto da.
  alternative_spanish_readings:
  - sus asambleas
  - sus grupos
  - sus huestes
  rationale: El contexto visionario apunta a órdenes o agrupaciones reguladas. «Huestes» introduciría una carga militar/celestial más fuerte de la que exige el ge'ez; «grupos» sería demasiado plano.
  doctrine_reference: Preservar la imaginería apocalíptica sin neutralizarla ni sobredeterminarla.
translation_notes:
  revision_awareness: El rastro inglés muestra una oscilación reciente entre «their laws» y «their commands»; el último pase volvió a «commands» por mayor cercanía semántica al ge'ez ትእዛዞሙ. La versión española sigue esa lectura y evita «leyes» como elección principal, aunque reconoce la alternativa normativa del término.
  spanish_consistency_notes:
  - Mantengo «Yahvé» solo cuando el original lo requiera explícitamente; aquí no aparece.
  - Uso «mandamientos» para ትእዛዞሙ por su fuerza normativa, con nota de alternativas semánticas.
  - «Compañías» conserva el registro elevado y la idea de agrupaciones ordenadas propia del contexto apocalíptico.
  - La puntuación separa la serie de elementos con comas y la conjunción final, en español natural de lectura litúrgica o de estudio.
