translation:
  language: es
  text: Y sus obras están delante de él para cada año venidero,[a] y todas sus obras le están sujetas y no cambian; pero como Dios ha ordenado,[b] así todo se hace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para cada año que ha de venir». La frase ge'ez apunta al curso continuo de los años futuros.
    reason: lexical_alternative
  - marker: b
    text: O «están ordenadas para él» o «le obedecen», subrayando la conformidad de la creación con el orden fijo de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ምግባሩ
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo designa obras/hechos/acciones. «Obras» conserva el término repetido del verso y encaja bien con el marco del orden cósmico; «hechos» sonaría más moralizado en español.
- source_word: ቅድሜሁ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es relacional y espacial. «Delante de él» mantiene el registro elevado y la imagen de todo puesto abiertamente ante Dios.
- source_word: ለለ ዓመት ዘይከውን
  english_pob_choice: for every year that shall be
  chosen_spanish: por cada año que habrá
  alternatives_spanish:
  - por cada año venidero
  - año tras año por venir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase apunta a la sucesión continua de años futuros. «Que habrá» conserva ese avance hacia el porvenir sin sobreexplicar el matiz apocalíptico.
- source_word: ይትቀነይ ሎቱ
  english_pob_choice: are subject to him
  chosen_spanish: le están sujetas
  alternatives_spanish:
  - le sirven
  - están ordenadas para él
  - le obedecen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa estar bajo orden o sujeción respecto de Dios. «Le están sujetas» refleja mejor esa relación de subordinación que un simple «sirven», y suena natural en español.
- source_word: ኢይትመየጥ
  english_pob_choice: do not change
  chosen_spanish: no cambian
  alternatives_spanish:
  - no son alteradas
  - no se desvían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido es la estabilidad del orden creado. «No cambian» es claro y conserva el contraste con la ordenación divina.
- source_word: ሠርዐ አምላክ
  english_pob_choice: God has ordained
  chosen_spanish: Dios ha ordenado
  alternatives_spanish:
  - Dios ha establecido
  - Dios ha dispuesto
  - Dios ha decretado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo implica poner en orden, establecer o fijar un estatuto. «Ha ordenado» mantiene el matiz de ordenamiento fijo del cosmos sin cargar el texto con una formulación más técnica.
- source_word: ይትገበር ኵሉ
  english_pob_choice: everything is done
  chosen_spanish: todo se hace
  alternatives_spanish:
  - todo sucede
  - todo es hecho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva amplia resume la ejecución de la orden divina. «Todo se hace» es fiel y natural en español, sin introducir una providencia más explícita que la del original.
theological_decisions:
- issue: Referente del sufijo posesivo repetido en «sus obras»
  english_pob_reading: The suffix refers to God, so the verse speaks of God's works in creation.
  chosen_spanish_reading: 'El sufijo se entiende como referente de Dios: el verso habla de sus obras en la creación.'
  alternative_spanish_readings:
  - Podría referirse a otro antecedente cercano del discurso.
  - Podría ser una referencia ambigua a una realidad creada cercana al contexto.
  rationale: La cláusula final nombra a Dios explícitamente y todo el verso trata del orden estable de la creación; por eso, la lectura más coherente es que «sus» remite a Dios. Se mantiene la formulación sin armonizar más allá del pasaje.
  doctrine_reference: Conservar el sentido local del pasaje sin resolver artificialmente la referencia pronominal si hubiera ambigüedad real.
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés, incluyendo la revisión más reciente que prefirió «are subject to him» en vez de «serve him». Por eso la traducción española usa «le están sujetas» para reflejar con naturalidad la idea de subordinación/ordenación, sin perder el trasfondo de servicio u obediencia implicado por el ge'ez.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para አምላክ, conforme al estándar del proyecto.
  - Se evitó «SEÑOR» porque el texto fuente nombra a Dios de forma explícita, no mediante un mascaramiento del nombre divino.
  - «Obras» se conservó de manera uniforme para ምግባሩ.
  - «No cambian» preserva la estabilidad del orden creado, en paralelo con la ordenación divina.
  - La puntuación separa claramente las dos mitades del verso y conserva el contraste entre estabilidad creada y ordenación divina.
