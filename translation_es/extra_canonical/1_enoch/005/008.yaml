translation:
  language: es
  text: Y entonces se dará sabiduría a los escogidos[a], y todos estos vivirán y no volverán a pecar, sea por impiedad o por orgullo[b]; pero los que poseen sabiduría serán humildes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los elegidos”.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final también puede entenderse como: “pero serán humildes, porque la sabiduría les pertenece”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይትወሀቦሙ
  english_pob_choice: will be given to them
  chosen_spanish: se dará
  alternatives_spanish:
  - les será dada
  - será otorgada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El griego/etiópico expresa una recepción futura como don. En español, la pasiva refleja conserva la idea de que la sabiduría no se autoorigina, sino que se concede.
- source_word: ለሕሩያን
  english_pob_choice: the chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los electos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Escogidos” comunica con naturalidad la categoría apocalíptica de quienes han sido seleccionados, sin cargar el texto con un tecnicismo doctrinal posterior. “Electos” es posible, pero menos natural en español bíblico contemporáneo.
- source_word: ጥበብ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - prudencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto moral y escatológico, “sabiduría” mantiene mejor el sentido de vida recta otorgada por Dios que una noción meramente intelectual o técnica.
- source_word: የሐይዉ
  english_pob_choice: will live
  chosen_spanish: vivirán
  alternatives_spanish:
  - seguirán viviendo
  - tendrán vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El futuro simple expresa con claridad el valor verbal del original y su promesa de vida continuada en el orden renovado.
- source_word: ወኢይደግሙ አብሶ
  english_pob_choice: and will not again sin
  chosen_spanish: y no volverán a pecar
  alternatives_spanish:
  - y no pecarán otra vez
  - y no seguirán pecando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “No volverán a pecar” reproduce de modo idiomático la idea de cese definitivo con el matiz de “again” en el texto fuente.
- source_word: እበረሲዕ
  english_pob_choice: through ungodliness
  chosen_spanish: por impiedad
  alternatives_spanish:
  - por maldad
  - por irreligiosidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Impiedad” mantiene el matiz religioso del término mejor que “maldad”, que sería demasiado amplio.
- source_word: እበኅዕቢት
  english_pob_choice: through pride
  chosen_spanish: por orgullo
  alternatives_spanish:
  - por soberbia
  - por arrogancia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Orgullo” es claro y natural; “soberbia” también sería válida, pero “orgullo” conserva mejor el paralelismo directo con “impiedad” en español moderno.
- source_word: ይገንዩ
  english_pob_choice: will be humble
  chosen_spanish: serán humildes
  alternatives_spanish:
  - se mostrarán humildes
  - se mantendrán humildes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma copulativa expresa bien el estado moral resultante. “Serán humildes” es más directo y transparente que una perífrasis reflexiva.
- source_word: ዘቦሙ ጥበበ
  english_pob_choice: those who possess wisdom
  chosen_spanish: los que poseen sabiduría
  alternatives_spanish:
  - los que tienen sabiduría
  - los en quienes está la sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción relativa se traduce de forma natural como posesión de sabiduría. “Poseen” conserva el vínculo entre la sabiduría y la humildad sin forzar el español.
theological_decisions:
- issue: Identidad de ሕሩያን
  english_pob_reading: the chosen
  chosen_spanish_reading: los escogidos
  alternative_spanish_readings:
  - los electos
  rationale: Se mantiene la designación apocalíptica local del pasaje sin introducir connotaciones sistemáticas posteriores innecesarias. “Escogidos” es suficientemente preciso y comprensible en español.
  doctrine_reference: Translation philosophy §Contested terms / preserve local passage sense
- issue: Relación entre sabiduría, ausencia de pecado y humildad
  english_pob_reading: the verse describes a future state in which the chosen no longer sin and instead display humility
  chosen_spanish_reading: el versículo describe un estado futuro en el que los escogidos ya no pecan y, en contraste con la impiedad y el orgullo, son humildes
  alternative_spanish_readings:
  - una descripción general de justicia moral
  - una referencia más estrecha a pecados específicos
  rationale: La traducción conserva el alcance amplio de “no volverán a pecar” y también los vicios concretos nombrados, sin estrechar indebidamente el sentido ni diluir la tensión entre la afirmación general y los ejemplos particulares.
  doctrine_reference: Translation philosophy §Contested terms / preserve local passage sense
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; el borrador sigue de cerca el estado auditado final, manteniendo la elección de “chosen/escogidos” y la cláusula final con su ambigüedad interpretativa documentada.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto fuente lo requiera explícitamente; aquí no aparece ningún nombre divino, por lo que no se introduce.
  - Se conserva “sabiduría” como término principal para ጥበብ, en coherencia con el contexto moral y apocalíptico.
  - Se evita “siervo” o “justicia” porque no corresponden a los términos de este versículo.
  - La coordinación “por impiedad ni por orgullo” refleja la doble vía causal del original sin añadir matices ajenos.
