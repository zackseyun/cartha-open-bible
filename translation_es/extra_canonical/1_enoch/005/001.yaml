base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/005/001.yaml
  text: Observe how the trees are covered with green leaves and bear fruit[c][b][a], and understand concerning everything that the Ever-Living One has made all these things.
  footnotes:
  - marker: a
    text: The Ge'ez in the latter half of the verse is difficult. The clause rendered 'all of them know concerning themselves that they have made all these things' may reflect a corrupt or uncertain transmission; the general sense is that the trees themselves testify to the ordered pattern of creation.
    reason: textual_variant
  - marker: b
    text: The final phrase could also be understood as referring to 'the Ever-Living One' rather than 'the living forever.'
    reason: alternative_reading
  - marker: c
    text: 'Or ''But ask, please, the trees: when they have put forth green leaves, and are covered and bear fruit, all of them know concerning themselves that they have made all these things for the living forever.''.'
