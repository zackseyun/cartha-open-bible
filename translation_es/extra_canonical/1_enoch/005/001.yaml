translation:
  language: es
  text: Observen cómo los árboles están cubiertos de hojas verdes y dan fruto, y entiendan respecto de todo que el Viviente eterno ha hecho todas estas cosas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ጠይቁ
  english_pob_choice: Observe
  chosen_spanish: Observa
  alternatives_spanish:
  - Mira
  - Considera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto y la revisión muestran que el verbo introduce una exhortación a tomar nota de la creación; en español, «observa» conserva el valor imperativo y la fuerza didáctica sin añadir un objeto inexistente.
- source_word: ዕፀው
  english_pob_choice: the trees
  chosen_spanish: los árboles
  alternatives_spanish:
  - los árboles del bosque
  - los árboles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo es genérico y colectivo; «los árboles» es natural en español y mantiene el carácter de testimonio de la creación.
- source_word: በሐመልማለ አቍጽል ይትከደኑ
  english_pob_choice: are covered with green leaves
  chosen_spanish: están cubiertos de hojas verdes
  alternatives_spanish:
  - están revestidos de follaje verde
  - están cubiertos con verdor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia ge’ez describe cobertura foliar; «cubiertos de hojas verdes» comunica con precisión la imagen vegetal sin forzar un calco poco natural.
- source_word: ወይፈሪዩ
  english_pob_choice: bear fruit
  chosen_spanish: dan fruto
  alternatives_spanish:
  - producen fruto
  - fructifican
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Dan fruto» es idiomático, claro y fiel al sentido arbóreo/agropecuario del verbo.
- source_word: ወለበዉ በእንተ ኵሉ
  english_pob_choice: understand concerning everything
  chosen_spanish: entiende acerca de todo
  alternatives_spanish:
  - comprende respecto de todo
  - entérate de todo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión deja claro que se trata de un imperativo plural dirigido al lector. En español, «entiende acerca de todo» conserva la relación preposicional y el alcance global del objeto.
- source_word: ወአእምሩ
  english_pob_choice: know
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - reconoce
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el imperativo es plural, el español puede expresarlo con un segundo mandato paralelo sin sobrecargar la frase. «Sabe» mantiene la brevedad y la continuidad retórica.
- source_word: ዘሕያው ለዓለም
  english_pob_choice: the Ever-Living One
  chosen_spanish: el Eterno Viviente
  alternatives_spanish:
  - el que vive para siempre
  - el Viviente eterno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura auditada permite una referencia titular a Dios. «El Eterno Viviente» intenta reflejar el valor de eternidad y vida perpetua sin perder la tensión entre nombre descriptivo y título.
- source_word: ገበርክሙ
  english_pob_choice: has made
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha creado
  - ha realizado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge’ez es textualmente difícil, pero el contexto de creación exige un perfecto divino o creador. «Ha hecho» es más amplio y se ajusta al texto auditado sin resolver en exceso la dificultad.
- source_word: ለአሉንቱ ኵሎሙ
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - estas cosas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión totalizante se conserva de forma directa. «Todas estas cosas» es transparente y abarcará el conjunto del orden creado mencionado.
theological_decisions:
- issue: 'Referencia final: si habla de Dios como el Viviente eterno o de seres vivientes en perpetuidad'
  english_pob_reading: the Ever-Living One
  chosen_spanish_reading: el Eterno Viviente
  alternative_spanish_readings:
  - el que vive para siempre
  - el Viviente eterno
  rationale: La revisión del ge’ez favorece una referencia titular a Dios, no una descripción de criaturas vivientes. Se mantiene una formulación reverente que conserva la ambigüedad estilística entre título y descripción.
  doctrine_reference: Preservar la lectura teísta sin borrar la tensión lexical del original.
- issue: 'Segunda exhortación implícita en la cláusula final: si debe leerse como una sola idea o como dos mandatos paralelos'
  english_pob_reading: and understand concerning everything
  chosen_spanish_reading: y entiende acerca de todo
  alternative_spanish_readings:
  - y conoce todo
  - y comprende todo
  rationale: El audit trail indica que el texto contiene dos imperativos consecutivos. En español se conserva la fuerza exhortativa de la segunda orden para no aplanar la sintaxis del original.
  doctrine_reference: Respetar la retórica exhortativa del texto fuente.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente suavizó la segunda orden, pero la revisión técnica posterior corrigió la sintaxis ge’ez: aquí se sigue el ajuste que reconoce dos imperativos y la referencia a «el Eterno Viviente». Se evita repetir el error previo de convertir la cláusula final en una simple explicación subordinada sin mandato ni sujeto adecuado.'
  spanish_consistency_notes:
  - Se usa «Dios» solo cuando el texto lo exige de manera explícita; aquí se conserva la designación descriptiva «el Eterno Viviente».
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - «Hace/ha hecho» se prefiere por amplitud semántica frente a una traducción demasiado técnica de la forma verbal dudosa.
