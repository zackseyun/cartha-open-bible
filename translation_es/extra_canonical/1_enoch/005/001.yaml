revisions:
- from: Observa cómo los árboles están cubiertos de hojas verdes y dan fruto, y entiende acerca de todo que el Eterno Viviente ha hecho todas estas cosas.
  to: Observen cómo los árboles están cubiertos de hojas verdes y dan fruto, y entiendan respecto de todo que el Viviente eterno ha hecho todas estas cosas.
  rationale: Se ajustó el número de los imperativos al plural documentado en la evidencia fuente; se suavizó la sintaxis para un español natural ('entiendan respecto de todo que...'); y se sustituyó 'el Eterno Viviente' por 'el Viviente eterno', que transmite mejor la idea de 'the Ever-Living One' con dignidad y claridad en español. No hacen falta notas adicionales porque la revisión española sigue la resolución ya fijada en el expediente inglés sin crear una nueva ambigüedad relevante.
