translation:
  language: es
  text: Y por esto, ustedes maldecirán sus días, y acortarán los años de su vida; y aumentarán[a] los años de su destrucción en una maldición eterna, y no habrá misericordia para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se multiplicarán». El verbo expresa aumento; aquí se traduce «aumentarán» para seguir el sentido básico de incremento sin intensificar innecesariamente la imagen.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወበእንተዝ
  english_pob_choice: And because of this
  chosen_spanish: Y por causa de esto
  alternatives_spanish:
  - Y por esto
  - Por esta razón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce una consecuencia causal explícita. «Por causa de esto» conserva la fuerza causal sin volver la frase demasiado interpretativa.
- source_word: መዋዕሊክሙ
  english_pob_choice: your days
  chosen_spanish: sus días
  alternatives_spanish:
  - los días de ustedes
  - su vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el sustantivo concreto «días», que en este contexto apocalíptico y de juicio no debe reducirse a «vida» sin más. El pronombre plural de cortesía no es necesario aquí; «sus» conserva el referente plural.
- source_word: ትረግሙ
  english_pob_choice: you will curse
  chosen_spanish: maldecirán
  alternatives_spanish:
  - maldecirán ustedes
  - se maldecirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor activo de segunda persona plural se refleja con «maldecirán». En español, el sujeto pronominal puede omitirse sin perder claridad.
- source_word: ዓመታት ሕይወትክሙ
  english_pob_choice: the years of your life
  chosen_spanish: los años de su vida
  alternatives_spanish:
  - sus años de vida
  - los años de la vida de ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción genitiva se conserva de manera natural en español. «Vida» mantiene el registro solemne y evita una paráfrasis excesiva.
- source_word: ትኃጕሉ
  english_pob_choice: will shorten
  chosen_spanish: acortarán
  alternatives_spanish:
  - abreviarán
  - reducirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrigió la comprensión activa de la forma ge'ez. «Acortarán» expresa con naturalidad la reducción de la duración de la vida y preserva la culpabilidad del sujeto.
- source_word: ዓመታት ኀጕልክሙ
  english_pob_choice: the years of your destruction
  chosen_spanish: los años de su destrucción
  alternatives_spanish:
  - los años de su ruina
  - los años de su perdición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la noción de ruina/destrucción sin resolver demasiado el matiz exacto. «Destrucción» sigue de cerca la decisión inglesa auditable.
- source_word: ይበዝኅ
  english_pob_choice: will increase
  chosen_spanish: se multiplicarán
  alternatives_spanish:
  - aumentarán
  - crecerán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede expresar aumento o multiplicación. En español, «se multiplicarán» mantiene la idea de incremento de manera fuerte y acorde al paralelo negativo.
- source_word: በርገመት ዘለዓለም
  english_pob_choice: in an eternal curse
  chosen_spanish: en una maldición eterna
  alternatives_spanish:
  - bajo una maldición eterna
  - con una maldición eterna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Maldición eterna» conserva el valor de finalización perdurable del giro. Se prefiere la preposición «en» para reflejar la construcción del inglés auditado y una lectura fluida en español.
- source_word: ወኢይከውነክሙ ሣህል
  english_pob_choice: and there will be no mercy for you
  chosen_spanish: y no habrá misericordia para ustedes
  alternatives_spanish:
  - y no tendrán misericordia
  - y no se les concederá misericordia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «No habrá misericordia para ustedes» reproduce la negación existencial del original y evita suavizar la sentencia. «Misericordia» es el equivalente más estable y digno en español bíblico contemporáneo.
theological_decisions:
- issue: Sujeto activo de los verbos de juicio en segunda persona plural
  english_pob_reading: self-cursing in lament under judgment
  chosen_spanish_reading: ustedes actúan sobre sus propios días y años bajo juicio
  alternative_spanish_readings:
  - ustedes son maldecidos por otros
  - una maldición impersonal cae sobre ustedes
  rationale: La forma verbal ge'ez, confirmada por la revisión auditada y el testimonio griego, exige un sentido activo en segunda persona plural. La traducción española conserva esa responsabilidad directa sin borrar el trasfondo de juicio divino.
  doctrine_reference: Preservar la tensión local del texto; no neutralizar la agencia verbal del pasaje.
- issue: Valor escatológico de la expresión «en una maldición eterna»
  english_pob_reading: eternal/everlasting curse
  chosen_spanish_reading: maldición eterna
  alternative_spanish_readings:
  - maldición perpetua
  - maldición de duración indefinida
  rationale: En este contexto apocalíptico, la frase comunica permanencia y finalidad. «Eterna» es la opción más clara y solemne en español moderno sin convertirla en una fórmula doctrinal ajena al pasaje.
  doctrine_reference: Mantener el peso escatológico del juicio sin sobreinterpretar la fórmula.
translation_notes:
  revision_awareness: La redacción española toma en cuenta la corrección revisada del verbo ትኃጕሉ como forma activa de segunda persona plural, no como sujeto en tercera persona. Por eso se evita cualquier giro que haga de «los años» el sujeto de la acción y se mantiene el paralelismo de culpa y consecuencia. También se conserva el cierre con negación absoluta de misericordia, acorde con la revisión inglesa más reciente.
  spanish_consistency_notes:
  - Se mantiene «maldición» para በርገመት y no se sustituye por un eufemismo más suave.
  - «Misericordia» se usa con sentido existencial y no como simple compasión momentánea.
  - La traducción conserva el registro solemne y judicial del pasaje sin introducir vocabulario eclesiástico no motivado por la fuente.
  - No se introdujo «Mesías», «SEÑOR» ni otra terminología no presente en el texto fuente.
