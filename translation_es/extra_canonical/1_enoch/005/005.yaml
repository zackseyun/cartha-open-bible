    rationale: La fuerza causal puede conservarse con 'Y por esto', que es más natural y suficientemente explícito para el contexto.
  - severity: low
    issue: La nota [a] es innecesaria
    rationale: El conector causal no presenta una dificultad que requiera nota en español, y la anotación distrae más de lo que ayuda.
