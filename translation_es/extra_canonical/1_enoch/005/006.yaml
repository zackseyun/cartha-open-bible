translation:
  language: es
  text: En aquellos días ustedes darán sus nombres[a] para una maldición eterna a todos los justos, y los pecadores los maldecirán; y para ustedes habrá una unión con los pecadores[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Aquí «darán sus nombres» refleja el verbo activo del ge’ez: no es «serán dados», sino que el grupo entrega o pone sus nombres a disposición de esa maldición pública.'
    reason: lexical_alternative
  - marker: b
    text: La expresión final puede entenderse también como «ser contados con los pecadores» o «tener unión/compañía con los pecadores».
    reason: alternative_reading
lexical_decisions:
- source_word: በውእቱ መዋዕል
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En ese tiempo
  - En esa época
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula temporal apocalíptica estándar. «En aquellos días» conserva el registro profético elevado y suena natural en español bíblico contemporáneo.
- source_word: ትሁቡ
  english_pob_choice: will give
  chosen_spanish: darán
  alternatives_spanish:
  - entregarán
  - cederán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión gramatical mostró que el verbo ge’ez es activo de segunda persona plural: «ustedes darán». Mantengo ese sentido sin introducir pasividad.'
- source_word: ስመ ዚአክሙ
  english_pob_choice: your names
  chosen_spanish: sus nombres
  alternatives_spanish:
  - los nombres de ustedes
  - vuestros nombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El objeto directo es «sus nombres». En español, «sus nombres» comunica con claridad la referencia colectiva sin forzar una construcción más marcada.
- source_word: በርገመት ዘለዓለም
  english_pob_choice: to an everlasting curse
  chosen_spanish: para una maldición eterna
  alternatives_spanish:
  - para una maldición perpetua
  - en maldición eterna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Maldición eterna» preserva el peso judicial y escatológico. «Para» expresa bien el destino o resultado vinculado a sus nombres.
- source_word: ለኵሉ ጻድቃን
  english_pob_choice: for all the righteous
  chosen_spanish: a todos los justos
  alternatives_spanish:
  - para todos los justos
  - entre todos los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición ge’ez es algo amplia; «a todos los justos» mantiene la referencia de alcance o destinatarios de la fórmula sin sobreexplicar.
- source_word: ወኪያክሙ ይረግሙ ኃጥኣን
  english_pob_choice: and the sinners will curse by you
  chosen_spanish: y los pecadores los maldecirán
  alternatives_spanish:
  - y los pecadores maldecirán por ustedes
  - y por ustedes los pecadores maldecirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La corrección textual indica que «ustedes» es objeto directo, no instrumento. Por eso traduzco de forma directa: «los maldecirán». Conserva el contenido sin el calco instrumental erróneo.'
- source_word: ተኅቡረ ምስለ ኃጥኣን
  english_pob_choice: a joining together with the sinners
  chosen_spanish: una unión con los pecadores
  alternatives_spanish:
  - asociación con los pecadores
  - ser contados con los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo indica unión o agrupamiento. «Unión» es natural en español y conserva la ambigüedad entre asociación, compañía y destino compartido.
theological_decisions:
- issue: Función del nombre como fórmula de maldición
  english_pob_reading: The condemned will become a stock example invoked in cursing, especially in contrast with the righteous.
  chosen_spanish_reading: Los nombres de los condenados quedarán asociados con la maldición, como fórmula pública de oprobio.
  alternative_spanish_readings:
  - Sus nombres se volverán un refrán de maldición
  - Sus nombres serán usados al pronunciar maldiciones
  rationale: 'La frase sobre «sus nombres» sugiere más que una simple ofensa verbal: apunta a una fórmula o ejemplo público. Mantengo esa tensión sin resolverla de manera excesiva.'
  doctrine_reference: Conservar la ambigüedad documental en lugar de aplanar el motivo apocalíptico de vergüenza y juicio.
- issue: Relación final con los pecadores
  english_pob_reading: The clause announces that the addressed group will be joined with the sinners in fate or company.
  chosen_spanish_reading: El final anuncia una unión con los pecadores, abierta a matiz de compañía, conteo o destino compartido.
  alternative_spanish_readings:
  - Serán contados con los pecadores
  - Tendrán comunión con los pecadores
  - Se unirán a los pecadores
  rationale: El ge’ez permite una lectura amplia; «unión con los pecadores» conserva esa amplitud y no fuerza una sola explicación.
  doctrine_reference: Equivalencia óptima con ambigüedad transparente cuando la fuente no es unívoca.
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión gramatical que corrige dos puntos del borrador inglés previo: 1) ትሁቡ es activo («ustedes darán»), no pasivo; 2) ኪያክሙ es objeto directo («los/ustedes»), por lo que la frase final no debe traducirse con sentido instrumental. También conservé la ambigüedad reconocida por el POB inglés en la cláusula final, pero la expresé en español con un sustantivo más natural.'
  spanish_consistency_notes:
  - Usé «Yahvé» no porque aparezca aquí, sino porque es el estándar del proyecto cuando corresponda; en este versículo no aparece el nombre divino.
  - Preferí «maldición eterna» sobre «anatema» o fórmulas eclesiásticas para mantener el registro bíblico y la fuerza judicial del texto.
  - Elegí «justos» y «pecadores» como equivalentes transparentes de los términos del original, sin suavizarlos.
  - Mantuve un español publicable y natural, pero sin eliminar la dureza judicial ni la ambigüedad interpretativa del verso.
