base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/005/006.yaml
  text: In those days you will give your names for an everlasting curse to all the righteous[a], and the sinners will curse by you[d][c][b]; and for you there will be a joining together with sinners.
  footnotes:
  - marker: a
    text: The line likely means that their names will become a formula used when pronouncing curses—an image of public disgrace and judgment.
    reason: lexical_alternative
  - marker: b
    text: The final clause can also be understood as 'you will be counted with the sinners' or 'you will have fellowship with the sinners.'
    reason: alternative_reading
  - marker: c
    text: Or 'your names will be given over'.
    reason: previous_rendering
  - marker: d
    text: Or 'by you the sinners will swear curses'.
    reason: previous_rendering
