translation:
  language: es
  text: Y para los escogidos habrá luz, alegría y paz, y ellos heredarán la tierra[a]. Pero para ustedes, los impíos[b], habrá maldición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «heredarán la tierra» en el sentido de «la tierra/territorio». El término ge'ez para «tierra» también puede significar «territorio», pero el marco apocalíptico más amplio favorece «tierra» en sentido universal.
    reason: lexical_alternative
  - marker: b
    text: O «los malvados». «Impíos» conserva bien la oposición moral y judicial del pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሕሩያን
  english_pob_choice: the chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los electos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término plural designa al grupo seleccionado. «Los escogidos» conserva esa identificación apocalíptica sin cargarla de manera innecesaria con un matiz doctrinal posterior; «los elegidos» también es posible, pero puede sonar más técnico o eclesiástico en español.
- source_word: ብርሃን
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido básico es «luz». En español, «luz» es la opción más natural y transparente, y preserva bien la tríada de bendición.
- source_word: ፍሥሐ
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término expresa alegría o regocijo. «Alegría» es claro y digno en español moderno; «gozo» sería posible, pero puede sonar más marcado por registro religioso.
- source_word: ሰላም
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Paz» conserva el valor principal del término y funciona bien dentro de la secuencia bendicional. En este contexto no es necesario ampliar a «bienestar», aunque esa dimensión está implícita.
- source_word: ይወርስዋ ለምድር
  english_pob_choice: they shall inherit the earth
  chosen_spanish: ellos heredarán la tierra
  alternatives_spanish:
  - ellos heredarán el mundo
  - ellos poseerán la tierra
  - ellos heredarán la tierra prometida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa herencia/posesión por derecho. «Heredarán la tierra» sigue la lectura amplia de «earth» y evita estrecharla a un territorio local; «tierra» comunica bien el alcance apocalíptico en español.
- source_word: ረሲዓን
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los injustos
  - los malhechores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque «los wicked» en inglés suele traducirse por «los impíos», en español este término mantiene mejor la oposición moral y judicial del pasaje. «Impíos» es tradicional pero todavía inteligible y menos coloquial que «malvados».
- source_word: ርገመት
  english_pob_choice: a curse
  chosen_spanish: maldición
  alternatives_spanish:
  - una maldición
  - anatema
  - maldiciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo nombra un decreto o estado de maldición. «Maldición» reproduce ese valor con naturalidad; en este contexto el artículo indefinido puede omitirse en español para dar una formulación más fluida, sin cambiar el sentido.
theological_decisions:
- issue: Alcance de ምድር
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - mundo
  - país
  - suelo
  rationale: Aunque ምድር puede significar «tierra» o «land», el contexto apocalíptico amplio favorece una traducción que no limite la promesa a un territorio particular. «Tierra» mantiene el alcance cósmico/escatológico que el audit trail inglés ya defendía.
  doctrine_reference: Conservar el horizonte apocalíptico del pasaje sin reducir la promesa a una localización geográfica estrecha.
- issue: Contraste entre la bendición de los escogidos y el juicio de los impíos
  english_pob_reading: And for the chosen... But for you, the wicked...
  chosen_spanish_reading: Y para los escogidos... Pero para ustedes, los impíos...
  alternative_spanish_readings:
  - Y para los escogidos... y para ustedes, los impíos...
  - Mas para ustedes, los impíos...
  rationale: La pauta ge'ez distingue la conjunción simple al inicio y el giro adversativo en la segunda mitad. En español, «Y... Pero...» reproduce bien esa transición. Se conserva además la oposición directa entre dos grupos, sin suavizarla.
  doctrine_reference: Respetar la estructura contrastiva del texto fuente y su juicio dual sobre justos e impíos.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión gramatical del audit trail inglés: el ge''ez abre con una conjunción simple equivalente a «y» para los escogidos, y reserva el contraste adversativo para la segunda mitad. La redacción española refleja esa estructura sin duplicar el contraste con dos «pero».'
  spanish_consistency_notes:
  - Se prefirió «escogidos» en vez de «electos» para mantener un término bíblico claro y menos técnico.
  - Se usó «tierra» para ምድር siguiendo la lectura amplia defendida por el audit trail inglés.
  - Se evitó «SEÑOR» o equivalentes de máscara porque este versículo no contiene el nombre divino.
  - Se conservó un registro bíblico sobrio y legible, sin arcaísmos innecesarios.
