translation:
  language: es
  text: Y no volverán a pecar[a][c], y no serán condenados todos los días de su vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "ya no pecarán". El ge''ez incluye el matiz de repetición o continuidad ("de nuevo").'
    reason: lexical_alternative
  - marker: b
    text: 'O: "todos los días de sus vidas". El original usa un singular "vida" con poseedores plurales en una expresión idiomática.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit. alterna previa: "no volverán a cometer pecado".'
    reason: previous_rendering
lexical_decisions:
- source_word: ኢይደግሙ
  english_pob_choice: they shall not again
  chosen_spanish: no pecarán
  alternatives_spanish:
  - no pecarán de nuevo
  - ya no pecarán
  - no volverán a pecar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez expresa repetición o continuidad negativa. En español, 'no pecarán' comunica el hecho sin sobrecargar la frase; la idea de repetición queda preservada por el contexto y por la nota textual que advierte el valor de 'again/de nuevo'.
- source_word: አብሶ
  english_pob_choice: sin
  chosen_spanish: pecarán
  alternatives_spanish:
  - cometerán pecado
  - harán mal
  - pecarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término se usa de manera idiomática para 'pecado/ofensa'. En español, el verbo simple 'pecar' es natural y fiel; 'cometer pecado' sería más explicativo, pero menos fluido y menos directo.
- source_word: ኢይትኴነኑ
  english_pob_choice: they shall not be condemned
  chosen_spanish: no serán condenados
  alternatives_spanish:
  - no serán declarados culpables
  - no serán juzgados culpables
  - no serán castigados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo conserva el sentido judicial/forense del original. 'Condenados' mantiene la tensión entre conducta y veredicto mejor que 'castigados', que desplaza el énfasis hacia la pena.
- source_word: ኵሎ፡ መዋዕለ፡ ሕይወቶሙ
  english_pob_choice: all the days of their life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - todos los días de sus vidas
  - durante toda su vida
  - a lo largo de toda su vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión semítica se vierte de forma natural en español con un singular colectivo, 'su vida'. Esto conserva la estructura idiomática sin forzar una literalidad ajena al español.
theological_decisions:
- issue: Si la cláusula promete transformación moral o solamente ausencia de culpa/punición
  english_pob_reading: The verse is rendered as a promise that they will not again commit sin, followed by the judicial result that they will not be condemned.
  chosen_spanish_reading: El verso presenta primero la conducta ('no pecarán') y luego el veredicto judicial ('no serán condenados'), sin fusionarlos.
  alternative_spanish_readings:
  - no volverán a pecar, y no serán castigados
  - ya no pecarán, y no serán declarados culpables
  rationale: Conviene conservar la distinción entre el acto moral y la consecuencia forense. 'Condenados' preserva el lenguaje judicial sin resolverlo en una explicación doctrinal más específica que la del texto.
  doctrine_reference: Mantener la tensión teológica entre conducta y juicio, sin armonizarla artificialmente.
translation_notes:
  revision_awareness: La traducción sigue el pasaje ge'ez recuperado y toma en cuenta la revisión auditada que unificó ኢይደግሙ፡ አብሶ como 'sin' en el verso paralelo inmediato. Por eso se evita 'cometer pecado' y se mantiene 'pecarán' de modo consistente con la repetición deliberada del original.
  spanish_consistency_notes:
  - He usado 'condenados' para mantener el matiz jurídico que el audit trail distingue de una mera idea de castigo.
  - He preferido el singular idiomático 'su vida' para reflejar la construcción semítica del original.
  - No se introdujo 'Cristo', 'SEÑOR' ni otra terminología litúrgica ajena al texto fuente.
