  to: Miren cómo los mares y los ríos juntos realizan su obra.
  rationale: Se corrige el imperativo a plural para ajustarse mejor a ርእዩ sin afectar la naturalidad del español. Se mantiene 'realizan su obra', que comunica adecuadamente el sentido de 'accomplish their work' en un registro moderno y digno.
