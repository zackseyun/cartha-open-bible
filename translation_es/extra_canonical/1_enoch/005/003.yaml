translation:
  language: es
  text: Miren cómo los mares y los ríos juntos realizan su obra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ርእዩ
  english_pob_choice: Look at
  chosen_spanish: Mira
  alternatives_spanish:
  - Observa
  - Fíjate en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperativo plural de 'ver'; en español, 'Mira' funciona como llamado directo a observar. Aunque la forma plural exacta sería 'miren', el singular impersonal puede sonar más natural y sigue el tono exhortativo del pasaje.
- source_word: እፎ
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - así como
  - de qué manera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce una observación retórica; 'cómo' conserva el matiz exclamativo/observacional mejor que una traducción literal vacía.
- source_word: አብሕርት
  english_pob_choice: the seas
  chosen_spanish: los mares
  alternatives_spanish:
  - los mares
  - las aguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del texto ge'ez identifica el plural de 'mar'. En español, 'mares' expresa con claridad la pluralidad de cuerpos de agua grandes.
- source_word: ወአፍላግ
  english_pob_choice: and the rivers
  chosen_spanish: y los ríos
  alternatives_spanish:
  - y los ríos
  - y los cursos de agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura corregida entiende el término como plural de 'río'. 'Ríos' es la equivalencia directa y natural en español.
- source_word: ኅቡረ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - colectivamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverbio de coordinación; 'juntos' conserva el valor de acción conjunta de manera idiomática.
- source_word: ይፌጽሙ
  english_pob_choice: accomplish
  chosen_spanish: realizan
  alternatives_spanish:
  - acaban
  - cumplen
  - acometen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa llevar a cabo o efectuar su actividad propia. 'Realizan' mantiene la idea de ejecución sin cargar demasiado el matiz de finalización que 'completar' podía sugerir.
- source_word: ግብሮሙ
  english_pob_choice: their work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - su tarea
  - su labor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Obra'' mantiene un tono elevado y sigue la idea de la actividad propia de la creación; ''su trabajo'' sería más llano, pero menos solemne para este contexto sapiencial/cosmológico.'
translation_notes:
  revision_awareness: 'Se corrigió el error del borrador anterior que aplicaba por equivocación una lectura botánica a አብሕርት y ወአፍላግ. La versión actual sigue la revisión más reciente: mares y ríos. Se evitó además colocar notas al pie no ancladas en el texto, porque eso causó la validación fallida anterior.'
  spanish_consistency_notes:
  - Se mantuvo un registro digno y sobrio, acorde con POB.
  - No se usó 'SEÑOR' ni terminología doctrinal ajena al verso.
  - Se evitó traducir mecánicamente el inglés; la base fue el ge'ez corregido por la auditoría.
  - No hay notas al pie porque el verso no requiere alternativas textuales en español una vez resuelta la lectura de 'mares y ríos'.
