review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del ge''ez y el rastro auditado en inglés: contrasta la falta de obediencia con la transgresión, conserva la denuncia de palabras ofensivas contra la grandeza divina y mantiene la fórmula final de juicio con ''paz''. Sin embargo, hay dos desajustes menores pero significativos: 1) el inglés POB revisado fijó ''you have not endured'', y ''no han perseverado'' puede sonar más interpretativo o eclesial que el valor básico de soportar/aguantar; 2) el marcador [a] está anclado a ''perseverado'', pero la nota en realidad explica alternativas a ''endured'', no a ''his greatness'' como en el POB inglés, lo cual es aceptable como adaptación española, aunque conviene armonizar la palabra principal con una opción más directa.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. La sintaxis fluye bien y evita calcos duros. ''Antes bien'', ''bocas impuras'' y ''no tendrán paz'' funcionan bien en registro bíblico moderno. La principal mejora es lexical: ''no han soportado'' o ''no han resistido'' refleja mejor el matiz básico y evita que ''perseverado'' sugiera un concepto más desarrollado de constancia que el texto no exige. Además, la nota [c] es redundante porque repite casi exactamente la formulación del texto.'
  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: ''Señor'' para እግዚእ en este contexto, ''han transgredido'' conforme a la revisión adjudicada, ''impuras'' para ርኵሳት, ''su grandeza'' con nota alternativa válida, y ''paz'' preservada con su amplitud teológica. No hay conflicto con las preferencias macro del glosario.'
  issues:
  - severity: medium
    issue: '''No han perseverado'' sobreinterpreta አተዓገሥክሙ frente al POB revisado ''have not endured'''
    rationale: Aunque 'perseverado' es defendible, en español introduce un matiz de constancia programática más fuerte. 'No han soportado' conserva mejor la idea de no haber resistido o aguantado, en línea más directa con el valor lexical auditado.
  - severity: low
    issue: La nota [c] es innecesariamente redundante
    rationale: '''A causa de la dureza de su corazón'' y ''por la dureza de su corazón'' no representan una alternativa semántica real; la nota no añade valor exegético ni evita ambigüedad.'
  revised_spanish_text: Pero ustedes no han soportado[a], y no han hecho el mandato del Señor; antes bien, han transgredido y han hablado palabras soberbias y ásperas con sus bocas impuras contra su grandeza[b]. A causa de la dureza de su corazón, no tendrán paz.
  revised_footnotes:
  - marker: a
    text: También podría entenderse como “no han sido pacientes” o “no han perseverado”, pero “soportado” recoge mejor la idea de resistir con firmeza.
    reason: lexical_alternative
  - marker: b
    text: “Su grandeza” puede entenderse también como “su majestad”. El ge'ez señala el estatus exaltado de Dios, sin fijar del todo el matiz.
    reason: lexical_alternative
  revision_rationale: La revisión hace un ajuste lexical menor para acercar el español al valor básico de አተዓገሥክሙ y al POB inglés revisado, manteniendo el registro natural en español. También elimina una nota redundante y deja solo las notas que realmente aportan una alternativa significativa.
