base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/005/004.yaml
  text: But you have not endured[a], and you have not done the command of the Lord; rather, you have transgressed and spoken proud and harsh words with your unclean mouths against his greatness. Because of the hardness of your heart[d][c][b], you will have no peace.
  footnotes:
  - marker: a
    text: The phrase rendered 'his greatness' may also be understood as 'his majesty.' The Ge'ez points to God's exalted status, and the exact nuance is difficult to fix more narrowly here.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is a judgment formula: ''peace'' here likely means more than inner calm, extending to well-being and favorable outcome.'
    reason: cultural_note
  - marker: c
    text: Or 'turned away'.
    reason: previous_rendering
  - marker: d
    text: Or 'spoken proud and harsh words'.
    reason: previous_rendering
