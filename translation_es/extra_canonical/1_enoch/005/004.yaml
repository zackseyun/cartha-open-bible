  rationale: La revisión hace un ajuste lexical menor para acercar el español al valor básico de አተዓገሥክሙ y al POB inglés revisado, manteniendo el registro natural en español. También elimina una nota redundante y deja solo las notas que realmente aportan una alternativa significativa.
