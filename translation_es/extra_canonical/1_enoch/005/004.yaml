translation:
  language: es
  text: Pero ustedes no han soportado[a], y no han hecho el mandato del Señor; antes bien, han transgredido y han hablado palabras soberbias y ásperas con sus bocas impuras contra su grandeza[b]. A causa de la dureza de su corazón, no tendrán paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse como “no han sido pacientes” o “no han perseverado”, pero “soportado” recoge mejor la idea de resistir con firmeza.
    reason: lexical_alternative
  - marker: b
    text: “Su grandeza” puede entenderse también como “su majestad”. El ge'ez señala el estatus exaltado de Dios, sin fijar del todo el matiz.
    reason: lexical_alternative
lexical_decisions:
- source_word: አተዓገሥክሙ
  english_pob_choice: you have not endured
  chosen_spanish: no han perseverado
  alternatives_spanish:
  - no han resistido
  - no han sido pacientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa resistencia firme y continuada. 'Perseverado' conserva la idea de mantenerse fieles bajo presión mejor que una paciencia meramente momentánea.
- source_word: ትእዛዘ
  english_pob_choice: the command
  chosen_spanish: el mandato
  alternatives_spanish:
  - el mandamiento
  - la orden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular pide una sola instrucción del Señor. 'Mandato' mantiene la fuerza de una dirección divina concreta sin forzar el plural de 'mandamientos'.
- source_word: እግዚእ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí funciona como título divino de autoridad. 'Señor' es el equivalente natural en español para este registro elevado.
- source_word: ተዓደውክሙ
  english_pob_choice: you have transgressed
  chosen_spanish: han transgredido
  alternatives_spanish:
  - se han desviado
  - han traspasado el límite
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El audit trail revisado subraya el valor específico de ''transgredir'' para este verbo: cruzar un límite, no solo apartarse en general. ''Transgredido'' conserva esa precisión jurídica y moral.'
- source_word: ሐመይክሙ
  english_pob_choice: spoken proud and harsh words
  chosen_spanish: han hablado palabras soberbias y ásperas
  alternatives_spanish:
  - han dicho palabras altivas y duras
  - han pronunciado palabras arrogantes y crueles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite simplemente 'hablar/decir', y el contexto concentra la carga en las palabras. 'Soberbias y ásperas' refleja el tono ofensivo y no añade una acusación más específica que el texto no exige.
- source_word: ርኵሳት
  english_pob_choice: unclean
  chosen_spanish: impuras
  alternatives_spanish:
  - inmundas
  - contaminadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'impuras' comunica bien la resonancia moral y cultual de la impureza sin sonar demasiado arcaico. Conserva el peso de la denuncia apocalíptica.
- source_word: ዕበዩ ዚአሁ
  english_pob_choice: his greatness
  chosen_spanish: su grandeza
  alternatives_spanish:
  - su majestad
  - su gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Grandeza'' es la traducción más directa y evita fijar la expresión en un término más interpretativo como ''majestad'' o ''gloria''.'
- source_word: ይቡሳነ ልብ
  english_pob_choice: Hard of heart
  chosen_spanish: la dureza de su corazón
  alternatives_spanish:
  - corazón endurecido
  - corazón obstinado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El idioma español fluye mejor con una construcción nominal. 'Dureza de su corazón' conserva la misma imagen bíblica de insensibilidad moral.
- source_word: ኢትከውኑክሙ ሰላም
  english_pob_choice: you will have no peace
  chosen_spanish: no tendrán paz
  alternatives_spanish:
  - no habrá paz para ustedes
  - no tendrán bienestar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Paz'' debe mantenerse porque en el juicio apocalíptico no significa solo calma interior, sino plenitud y buen desenlace. La forma negativa directa preserva la cadencia profética.'
theological_decisions:
- issue: El valor de 'paz' al final de la sentencia
  english_pob_reading: you will have no peace
  chosen_spanish_reading: no tendrán paz
  alternative_spanish_readings:
  - no tendrán bienestar
  - no habrá paz para ustedes
  rationale: 'La cláusula funciona como fórmula de juicio. ''Paz'' retiene su alcance bíblico amplio: no solo tranquilidad interior, sino bienestar integral y favor en la situación de juicio.'
  doctrine_reference: Preservar la tensión teológica sin reducir el término a una sola esfera semántica.
- issue: Cómo expresar la ofensa contra la grandeza divina
  english_pob_reading: his greatness
  chosen_spanish_reading: su grandeza
  alternative_spanish_readings:
  - su majestad
  - su gloria
  rationale: El texto ge'ez apunta a la exaltación de Dios; no obliga a escoger un término más técnico. 'Grandeza' mantiene la referencia abierta y fiel al original.
  doctrine_reference: Evitar una equivalencia demasiado cerrada cuando el original conserva amplitud semántica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: se mantuvo ''transgredido'' por su valor lexical específico, se evitó añadir ''slanderous'' porque la revisión más reciente lo descartó como no sustentado, y se formuló la cláusula final como una sentencia de juicio más natural en español sin perder el alcance bíblico de ''paz''.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para እግዚእ como título divino.
  - Se conserva 'transgredido' para reflejar la infracción explícita del mandato.
  - '''Paz'' se conserva sin glosa en el texto principal para no estrechar su valor semántico.'
  - El registro es solemne pero moderno, evitando calcos innecesarios.
