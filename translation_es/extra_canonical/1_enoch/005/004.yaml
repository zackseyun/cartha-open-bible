revisions:
- from: Pero ustedes no han perseverado[a], y no han hecho el mandato del Señor; antes bien, han transgredido y han hablado palabras soberbias y ásperas con sus bocas impuras contra su grandeza[b]. A causa de la dureza de su corazón[c], no tendrán paz.
