base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/046/002.yaml
  text: And I asked one of the angels who was going with me[a], and who was showing me all the hidden things, concerning that Son of Man—who he was, and from where he came[c][b], and why he was going with the Head of Days.
  footnotes:
  - marker: a
    text: Or 'all the secrets.' The Ge'ez term refers to concealed heavenly matters disclosed in the vision.
    reason: lexical_alternative
  - marker: b
    text: '''Head of Days'' reflects the Ethiopic wording directly. A more traditional rendering would be ''Ancient of Days,'' influenced by Danielic phrasing.'
    reason: cross_reference
  - marker: c
    text: Or 'the one of the angels'.
    reason: previous_rendering
