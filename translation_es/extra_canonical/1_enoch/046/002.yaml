translation:
  language: es
  text: 'Y le pregunté a uno de los ángeles que iba conmigo, y que me mostraba todas las cosas ocultas[a], acerca de aquel Hijo del Hombre: quién era, de dónde venía, y por qué iba con la Cabeza de Días[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «secretos». El término ge’ez alude a realidades celestiales veladas que son dadas a conocer en la visión.'
    reason: lexical_alternative
  - marker: b
    text: También podría renderizarse «Anciano de Días»; esta forma es la más tradicional en español, pero aquí se conserva una traducción más literal del ge’ez.
    reason: cross_reference
lexical_decisions:
- source_word: ተስእልክዎ
  english_pob_choice: I asked him
  chosen_spanish: le pregunté
  alternatives_spanish:
  - le inquirí
  - le cuestioné
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción introduce una pregunta directa de Enoc al ángel que lo acompaña. «Le pregunté» conserva la fuerza narrativa simple y natural del verbo sin volverlo más solemne de lo que exige el ge’ez.
- source_word: እመላእክት
  english_pob_choice: one of the angels
  chosen_spanish: uno de los ángeles
  alternatives_spanish:
  - uno de los ángeles santos
  - uno de los mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El ge’ez es partitivo: uno tomado de entre los ángeles. En español, «uno de los ángeles» expresa ese valor sin añadir calificativos no presentes en el texto.'
- source_word: ዘየሐውር ምስሌየ
  english_pob_choice: who was going with me
  chosen_spanish: que iba conmigo
  alternatives_spanish:
  - que venía conmigo
  - que me acompañaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea es de movimiento conjunto en la visión. «Iba conmigo» mantiene la imagen del caminar compartido y evita una paráfrasis excesiva.
- source_word: ኵሎ ኅቡኣተ
  english_pob_choice: all the hidden things
  chosen_spanish: todas las cosas ocultas
  alternatives_spanish:
  - todos los secretos
  - todos los asuntos ocultos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cosas ocultas» conserva el sentido de realidades veladas reveladas en la visión. Se evita «secretos» como término más cargado, aunque sigue siendo una alternativa válida.
- source_word: ዘያርእየኒ
  english_pob_choice: who was showing me
  chosen_spanish: que me mostraba
  alternatives_spanish:
  - que me estaba mostrando
  - que me revelaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene un matiz visual y revelatorio. «Me mostraba» encaja naturalmente con el contexto apocalíptico y con «cosas ocultas».
- source_word: ወልደ ሰብእ
  english_pob_choice: Son of Man
  chosen_spanish: Hijo del Hombre
  alternatives_spanish:
  - hijo del hombre
  - ser humano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí funciona como designación apocalíptica fija de una figura distinta, no como una expresión genérica. La mayúscula conserva su fuerza titulary sin importar una conclusión doctrinal externa.
- source_word: እምአይቴ ይከውን
  english_pob_choice: from where he came
  chosen_spanish: de dónde venía
  alternatives_spanish:
  - de dónde había venido
  - de dónde procedía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pregunta apunta al origen o procedencia de la figura. «Venía» reproduce ese movimiento/origen de manera natural en español y mantiene el sentido relacional del interrogante.
- source_word: ርእሰ መዋዕል
  english_pob_choice: the Head of Days
  chosen_spanish: la Cabeza de Días
  alternatives_spanish:
  - el Cabeza de Días
  - el Anciano de Días
  - el Anciano de los Días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el giro etiopizante de manera literal, tal como exige la política de primacía del texto fuente. «Cabeza de Días» deja visible la diferencia frente a la forma tradicional «Anciano de Días».
theological_decisions:
- issue: Si ወልደ ሰብእ debe sonar como título apocalíptico o como expresión genérica
  english_pob_reading: Rendered as 'that Son of Man'
  chosen_spanish_reading: «aquel Hijo del Hombre»
  alternative_spanish_readings:
  - «aquel hijo del hombre»
  - «aquel ser humano»
  rationale: El contexto presenta una figura ya diferenciada en la visión. La mayúscula conserva el valor designativo sin convertir el pasaje en una explicación doctrinal posterior.
  doctrine_reference: Preservar el sentido local del pasaje y no homogeneizarlo con usos cristianos posteriores.
- issue: Si ርእሰ መዋዕል debe armonizarse con el tradicional «Anciano de Días»
  english_pob_reading: Rendered as 'the Head of Days'
  chosen_spanish_reading: «la Cabeza de Días»
  alternative_spanish_readings:
  - «el Anciano de Días»
  - «la Cabeza de los Días»
  rationale: La traducción mantiene la literalidad del etiopizante y deja abierta la tensión con la formulación daniélica tradicional, en vez de resolverla por armonización.
  doctrine_reference: Primacía del lenguaje fuente; conservar la tensión lexical y teológica del testimonio.
translation_notes:
  revision_awareness: Se tuvo en cuenta que el audit trail inglés revisó la frase equivalente a 'one of the angels' por naturalidad y que la última revisión prefirió 'from where he came'. En español se reflejó esa naturalidad con «uno de los ángeles» y «de dónde venía», manteniendo a la vez la literalidad de «Head of Days» como «Cabeza de Días» para no borrar la tensión textual documentada.
  spanish_consistency_notes:
  - Se conserva «Hijo del Hombre» como título apocalíptico, en consonancia con la decisión inglesa de mayúscula.
  - Se mantiene «cosa(s) ocultas» en lugar de «secretos» en el texto principal, siguiendo la preferencia de transparencia lexical.
  - Se usa «Y» inicial narrativa sin solemnizar el registro más allá de lo que exige el pasaje.
  - Se evita «Señor» o «SEÑOR» porque no hay un nombre divino en este versículo y la frase final debe reflejar el etiopizante con precisión.
