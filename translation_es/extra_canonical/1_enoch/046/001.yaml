translation:
  language: es
  text: Y allí vi a uno que tenía cabeza de días[a], y su cabeza era como lana blanca; y con él había otro, cuyo rostro era como la apariencia de un hombre, y su rostro estaba lleno de gracia[b][c], como uno de los ángeles santos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Anciano de días». El ge'ez dice más literalmente «cabeza de días», y la traducción conserva ese modismo en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: La expresión «lleno de gracia» traduce directamente el ge'ez y no debe leerse como una alusión dependiente de una formulación posterior del Nuevo Testamento.
    reason: cross_reference
  - marker: c
    text: O «cuyo rostro tenía la apariencia de un hombre».
    reason: previous_rendering
lexical_decisions:
- source_word: በህየ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en aquel lugar
  - entonces, allí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El deíctico locativo funciona bien en español con «allí», que conserva la sencillez escénica de la visión sin añadir explicación.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré y vi
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un reporte visionario, el pretérito «vi» comunica de forma natural la observación directa del vidente sin perder fuerza apocalíptica.
- source_word: ዘሎቱ ርእሰ መዋዕል
  english_pob_choice: one who had a head of days
  chosen_spanish: uno que tenía una cabeza de días
  alternatives_spanish:
  - uno que tenía la cabeza de los días
  - el Cabeza de días
  - el Anciano de días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el giro etiópico de manera transparente. «Cabeza de días» mantiene la imagen inusual del original y evita armonizarla de forma automática con el título tradicional de Daniel.
- source_word: ወርእሱ ከመ ፀምር ጻዕዳ
  english_pob_choice: and his head was like white wool
  chosen_spanish: y su cabeza era como lana blanca
  alternatives_spanish:
  - y su cabello era como lana blanca
  - y su cabeza era blanca como lana
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto dice literalmente «cabeza», no «cabello»; por eso se mantiene la referencia al miembro mencionado y la comparación explícita con la lana blanca.
- source_word: ወምስሌሁ ካልእ
  english_pob_choice: and with him was another
  chosen_spanish: y con él había otro
  alternatives_spanish:
  - y otro estaba con él
  - y junto a él había otro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La formulación española natural preserva la introducción de una segunda figura sin interpretarla más allá de lo que dice el texto.
- source_word: ዘገጹ ከመ ርእየተ ሰብእ
  english_pob_choice: whose face was like the appearance of a man
  chosen_spanish: cuyo rostro era como la apariencia de un hombre
  alternatives_spanish:
  - cuyo semblante era como la apariencia de un hombre
  - cuyo rostro era como un aspecto humano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la comparación repetida con «como», coherente con el Ge'ez, y se mantiene «hombre» para no generalizar indebidamente la figura.
- source_word: ወምሉእ ጸጋ ገጹ
  english_pob_choice: and his face was full of grace
  chosen_spanish: y su rostro estaba lleno de gracia
  alternatives_spanish:
  - y su rostro estaba lleno de favor
  - y su rostro rebosaba gracia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gracia» es el equivalente más directo de ጸጋ y conserva la fuerza del rasgo facial descrito; en español resulta plenamente inteligible sin depender de una alusión neotestamentaria.
- source_word: ከመ ፩እመላእክት ቅዱሳን
  english_pob_choice: like one of the holy angels
  chosen_spanish: como uno de los santos ángeles
  alternatives_spanish:
  - como uno de los ángeles santos
  - como uno de los ángeles de santidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación numérica-partitiva se expresa naturalmente con «uno de», y «santos ángeles» conserva el orden adjetival del original de manera fluida en español.
theological_decisions:
- issue: Si traducir ርእሰ መዋዕል con el título tradicional «Anciano de días» o mantener la imagen etiópica literal
  english_pob_reading: one who had a head of days
  chosen_spanish_reading: uno que tenía una cabeza de días
  alternative_spanish_readings:
  - Anciano de días
  - Cabeza de días
  rationale: La elección principal sigue de cerca el idiomático ge'ez y no borra la tensión lexical que el texto presenta. La expresión tradicional se preserva solo como alternativa, porque aquí la prioridad es dejar auditable la imagen original y no armonizarla con la fórmula daniélica conocida.
  doctrine_reference: Translation philosophy §§1, 3; fidelidad a la forma original sin armonización
- issue: Si identificar a la segunda figura como «el Hijo del Hombre»
  english_pob_reading: another, whose face was like the appearance of a man
  chosen_spanish_reading: otro, cuyo rostro era como la apariencia de un hombre
  alternative_spanish_readings:
  - el Hijo del Hombre
  - una figura semejante a un hombre
  rationale: Este versículo introduce a la figura solo descriptivamente. Mantener la descripción evita una identificación prematura y respeta la tensión interpretativa que el contexto desarrolla más adelante.
  doctrine_reference: Translation philosophy §§1, 3; contexto literario de 1 Enoc
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la relación comparativa explícita del ge'ez ከመ («como/as») en la frase sobre el rostro del segundo personaje. Por eso el español mantiene «como la apariencia de un hombre» y no suaviza la comparación a una formulación menos transparente. También se conservó la triple serie de comparaciones con «como» en todo el versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «gracia» para ጸጋ, en continuidad con la decisión auditada del POB inglés.
  - Se conservó «ángeles» en lugar de una paráfrasis como «mensajeros», porque el contexto visionario y la tradición auditada apuntan claramente a seres celestiales.
