translation:
  language: es
  text: Y estos son los que juzgan[a] las estrellas del cielo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo también puede entenderse como «rigen» o «gobiernan». Como esta sección se conserva de manera efectiva solo en ge'ez, el matiz exacto debe mantenerse con cautela.
    reason: lexical_alternative
  - marker: b
    text: En la literatura apocalíptica, «estrellas» puede referirse a cuerpos celestes o a símbolos de seres celestiales; el texto no obliga a decidirlo aquí.
    reason: cultural_note
lexical_decisions:
- source_word: እሙንቱ
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - aquellos
  - ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El demostrativo plural mantiene la fuerza deíctica del texto visionario y funciona de manera natural en español al introducir una identificación: «estos son los que...». '
- source_word: ኮኑ
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - eran
  - fueron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En una cláusula identificativa, el presente español «son» reproduce mejor el valor de caracterización del texto que un pasado narrativo.
- source_word: እለ
  english_pob_choice: those who
  chosen_spanish: los que
  alternatives_spanish:
  - quienes
  - aquellos que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relativa introduce a los identificados; «los que» conserva la estructura appositiva de manera clara y sobria en español.
- source_word: ይኴንኑ
  english_pob_choice: judge
  chosen_spanish: juzgan
  alternatives_spanish:
  - rigen
  - gobiernan
  - condenan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el núcleo judicial del verbo, como en el inglés POB. En español, «juzgan» mantiene la tensión apocalíptica sin resolverla prematuramente hacia mera administración o gobierno.
- source_word: ከዋክብተ ሰማይ
  english_pob_choice: the stars of heaven
  chosen_spanish: las estrellas del cielo
  alternatives_spanish:
  - las estrellas del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Del cielo» es la forma más natural en español para expresar el constructo ge'ez y conserva el registro cósmico/apocalíptico. «Cielo» evita una construcción demasiado literal que sonaría menos idiomática.
theological_decisions:
- issue: Si el verbo debe interpretarse como gobernar/rendir juicio sobre las estrellas
  english_pob_reading: judge the stars of heaven
  chosen_spanish_reading: juzgan las estrellas del cielo
  alternative_spanish_readings:
  - rigen las estrellas del cielo
  - gobiernan las estrellas del cielo
  rationale: Se preserva el lenguaje judicial porque el ge'ez admite esa lectura y el contexto apocalíptico también puede sugerir seres celestiales o poderes cósmicos. No se resuelve la ambigüedad hacia «gobernar» o «rendir juicio»; se deja la tensión textual abierta, como hace el POB inglés.
  doctrine_reference: Preservar la tensión exegética y la primacía del idioma fuente sobre la armonización interpretativa.
- issue: Si «estrellas» debe explicitar seres celestiales o mantenerse ambiguo
  english_pob_reading: stars can function as cosmic bodies or as symbols for heavenly beings; the text does not force the translator to decide here.
  chosen_spanish_reading: las estrellas del cielo
  alternative_spanish_readings:
  - los astros del cielo
  - los seres celestiales
  rationale: Se conserva «estrellas» sin glosa explicativa dentro del texto, porque el pasaje permite tanto lectura cósmica como simbólica. La ambigüedad es parte del valor apocalíptico y no debe ser resuelta por la traducción.
  doctrine_reference: Mantener ambigüedad literaria y teológica cuando el texto fuente no obliga a una sola interpretación.
translation_notes:
  revision_awareness: Se siguió la lectura estable del audit trail inglés sin cambios sustantivos respecto de la última pasada revisada; se mantuvieron la ambigüedad del verbo y la posible referencia apocalíptica de «estrellas», evitando aclaraciones no exigidas por el ge'ez.
  spanish_consistency_notes:
  - Se mantuvo «juzgan» para el verbo principal, en coherencia con la decisión léxica inglesa y con el tono judicial-apocalíptico del pasaje.
  - Se eligió «cielo» en lugar de «cielos» para reflejar el constructo y el registro idiomático natural en español.
  - No se introdujo terminología eclesiástica ajena al texto; la frase conserva una sintaxis simple y directa adecuada para POB.
