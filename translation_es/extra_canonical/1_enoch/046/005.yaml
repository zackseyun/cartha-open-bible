translation:
  language: es
  text: Y él derribará a los reyes de sus tronos y de sus reinos, porque no lo exaltan, ni lo alaban, ni reconocen[b] de dónde[a] les fue dado el reino[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de quién les fue dado el reino». El giro ge'ez puede apuntar al origen de manera general («de dónde») o de modo más personal («de quién»).
    reason: lexical_alternative
  - marker: b
    text: El verbo puede llevar la idea de reconocer, confesar o someterse; aquí se traduce de forma sobria como «reconocen».
    reason: lexical_alternative
  - marker: c
    text: «Reino» también puede entenderse como «realeza» o «autoridad real», no solo como territorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይገፈትኦሙ
  english_pob_choice: he will cast down them / cast them down
  chosen_spanish: derribará a
  alternatives_spanish:
  - destronará a
  - derrocará a
  - abatirá a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo pide una acción enérgica de remoción/caída. «Derribar» conserva bien la imaginería de juicio y caída, y en español suena natural junto con tronos y reinos.
- source_word: ነገሥት
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - gobernantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término básico es «kings». En español, «reyes» preserva la especificidad real del pasaje y su enlace con «tronos» y «reinos».
- source_word: መናብርቲሆሙ
  english_pob_choice: their thrones
  chosen_spanish: sus tronos
  alternatives_spanish:
  - sus asientos
  - sus sitiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un juicio contra reyes, «tronos» mantiene la carga simbólica de autoridad real mejor que opciones más neutrales.
- source_word: መንገሥቲሆሙ
  english_pob_choice: their kingdoms
  chosen_spanish: sus reinos
  alternatives_spanish:
  - sus dominios
  - su soberanía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Reinos» reproduce el paralelo con «tronos» y refleja la esfera de su poder. «Soberanía» sería más abstracto y menos paralelo al original.
- source_word: ኢያሌዕልዎ
  english_pob_choice: they do not exalt him
  chosen_spanish: no lo exaltan
  alternatives_spanish:
  - no lo ensalzan
  - no lo levantan en alto
  - no lo honran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Exaltar» conserva el matiz de elevar a alguien por encima de otros, que encaja con el contexto de reyes arrogantes y la crítica a su falta de reconocimiento.
- source_word: ኢይሴብሕዎ
  english_pob_choice: they do not praise him
  chosen_spanish: ni lo alaban
  alternatives_spanish:
  - ni lo glorifican
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Alabar» es el equivalente más directo y claro en español moderno para el acto de praise.
- source_word: ኢይገንዩ
  english_pob_choice: they do not acknowledge
  chosen_spanish: ni reconocen
  alternatives_spanish:
  - ni confiesan
  - ni se someten ante él
  - ni admiten
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual subrayó el matiz de humildad/submisión del verbo, pero el pasaje también implica reconocer la fuente de la autoridad. «Reconocen» permite ese sentido básico sin añadir explícitamente una formulación que el texto no exige.
- source_word: እምአይቴ
  english_pob_choice: from where
  chosen_spanish: de dónde
  alternatives_spanish:
  - de quién
  - de dónde fue
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión pregunta por el origen de su reino. «De dónde» conserva la apertura semántica del ge'ez entre origen general y posible referencia personal.
- source_word: ተውህበት ሎሙ መንግሥት
  english_pob_choice: the kingdom was given to them
  chosen_spanish: les fue dado el reino
  alternatives_spanish:
  - les fue dada la realeza
  - les fue dado el reinado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva se conserva con naturalidad en español. «Les fue dado el reino» mantiene la forma y el sentido de que su autoridad proviene de una concesión recibida.
theological_decisions:
- issue: Referente implícito de «él» y fuente de la autoridad real
  english_pob_reading: The verse refers to the Most High / Lord as the one whom the kings fail to exalt, praise, and acknowledge as the giver of their kingdom.
  chosen_spanish_reading: El versículo deja implícito al dador divino del reino, entendido por el contexto como Yahvé, sin nombrarlo directamente en la línea.
  alternative_spanish_readings:
  - un referent.e divino implícito sin nombrarlo
  - posible referencia al Elegido, si se lee el contexto inmediato más estrechamente
  rationale: El cierre del versículo afirma que el reino les fue dado, por lo que el texto presupone un dador superior. En español conviene no añadir un título ausente, pero sí dejar claro que el sujeto es divino por contexto.
  doctrine_reference: Preservar la tensión local del pasaje; no resolver el referente más allá de lo que el texto muestra.
- issue: Valor de ገነየ / acknowledge
  english_pob_reading: Or 'do not acknowledge'
  chosen_spanish_reading: ni reconocen
  alternative_spanish_readings:
  - ni confiesan
  - ni se someten
  - ni admiten
  rationale: La revisión señala un matiz de humildad/submisión en el verbo, pero la forma española debe permanecer sobria y no sobreexplicitarlo. «Reconocen» conserva el núcleo semántico y permite leer la actitud subyacente en el contexto.
  doctrine_reference: Mantener la fuerza del juicio contra la soberbia real sin introducir una glosa devocional ajena al verso.
translation_notes:
  revision_awareness: La auditoría inglesa pasó por una fase en la que se añadió «humbly» antes de «acknowledge», pero esa ampliación fue retirada por considerarse interpretativa. La versión española evita introducir ese adverbio y mantiene un verbo sobrio («reconocen») compatible con el matiz de la revisión sin sobrecargar el texto.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como nombre divino en coherencia con el estándar del proyecto, aunque aquí el referente esté implícito y no aparezca nombrado en el verso.
  - Se mantiene el paralelismo «tronos / reinos» para reflejar la estructura del original.
  - «Exaltan / alaban / reconocen» preserva la tríada verbal y evita homogeneizarla en un solo matiz.
  - Se usó «reino» y no «realeza» en el texto principal por el paralelismo con la versión inglesa y la transparencia del pasaje, dejando la alternativa en nota.
