  glossary_alignment: No hay conflictos con la terminología base del proyecto. El referente divino queda implícito sin introducir «Yahvé» donde el verso no lo nombra, en línea con la decisión teológica auditada. «Reconocen» es una opción sobria aceptable para ኢይገንዩ, especialmente con nota explicativa. «Reino» mantiene correctamente la alternativa más amplia «realeza/autoridad real» en nota.
