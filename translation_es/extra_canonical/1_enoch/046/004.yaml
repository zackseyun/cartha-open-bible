translation:
  language: es
  text: Y este Hijo del Hombre[a], a quien has visto, sacará a los reyes y a los poderosos de sus lechos[b], y a los fuertes de sus tronos; y aflojará los lomos[c] de los fuertes, y aplastará los dientes de los pecadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva aquí la forma titulada para señalar que se trata de la figura visionaria específica del contexto.
    reason: theological_explanatory
  - marker: b
    text: O 'de sus camas'. La imagen presenta a gobernantes forzados a abandonar sus lugares de reposo o seguridad.
    reason: lexical_alternative
  - marker: c
    text: O 'la cintura'. El término refleja un modismo bíblico de desceñir la fuerza o la firmeza de los poderosos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወልደ ሰብእ
  english_pob_choice: Son of Man
  chosen_spanish: Hijo del Hombre
  alternatives_spanish:
  - hijo del hombre
  - el Hijo del Hombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el carácter titular y apocalíptico de la expresión sin convertirla en una paráfrasis. En español, la mayúscula inicial ayuda a señalar que se trata de la figura visionaria específica ya identificada en el contexto.
- source_word: ዘርኢከ
  english_pob_choice: whom you have seen
  chosen_spanish: a quien has visto
  alternatives_spanish:
  - que has visto
  - a quien viste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la referencia directa a la visión de Enoc en un español natural y fiel al relativo del ge'ez.
- source_word: ያነሥኦሙ
  english_pob_choice: will remove
  chosen_spanish: quitará
  alternatives_spanish:
  - removerá
  - sacará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es de juicio y desposesión de poder. 'Quitar' expresa la acción de apartar o retirar de su posición sin sobreinterpretar como 'deponer'.
- source_word: እምስካበቲሆሙ
  english_pob_choice: from their couches
  chosen_spanish: de sus lechos
  alternatives_spanish:
  - de sus camas
  - de sus divanes
  - de sus lechos de descanso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen apunta a lugares de reposo y seguridad de gobernantes. 'Lechos' es más natural en español que 'couches' y conserva la imagen de comodidad/seguridad; se admite la alternativa inglesa 'beds' en el trasfondo, pero en español 'lechos' es más digno y claro.
- source_word: ጽኑዓን
  english_pob_choice: the strong
  chosen_spanish: los fuertes
  alternatives_spanish:
  - los poderosos
  - los robustos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la repetición del término para conservar el paralelismo. 'Fuertes' es suficientemente concreto y ecoa el valor de fuerza/solidez del original.
- source_word: መናብርቲሆሙ
  english_pob_choice: their thrones
  chosen_spanish: sus tronos
  alternatives_spanish:
  - sus asientos
  - sus sillas de poder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un marco real y judicial, 'tronos' reproduce con precisión la imaginería de autoridad.
- source_word: ይፈትሕ
  english_pob_choice: will loosen
  chosen_spanish: aflojará
  alternatives_spanish:
  - desatará
  - soltará
  - aflojará los
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Aflojar'' conserva la acción física de soltar o desceñir sin volverla abstracta. Funciona bien con el siguiente sustantivo en una imagen de despojo de fuerza.'
- source_word: ኃማተ
  english_pob_choice: the loins
  chosen_spanish: los lomos
  alternatives_spanish:
  - las caderas
  - la cintura
  - los riñones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail corrige el antiguo 'reins' inglés y apunta al idiomático bíblico 'lomos'. En español, 'lomos' conserva el modismo de desceñir la fuerza/entereza de alguien y evita la ambigüedad de 'riñones'.
- source_word: አስናነ ኃጥኣን
  english_pob_choice: the teeth of sinners
  chosen_spanish: los dientes de los pecadores
  alternatives_spanish:
  - los dientes de los malvados
  - las dentaduras de los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen corporal debe permanecer concreta. 'Pecadores' reproduce fielmente el término moral del original.
theological_decisions:
- issue: Título apocalíptico 'Son of Man'
  english_pob_reading: Title-like 'Son of Man' referring to the specific eschatological figure in the vision
  chosen_spanish_reading: Hijo del Hombre como título de la figura escatológica visionaria
  alternative_spanish_readings:
  - un hijo del hombre
  - el Ser Humano
  rationale: El contexto inmediato individualiza al personaje y lo presenta como figura de juicio. Traducirlo como título evita diluir su fuerza apocalíptica y respeta la terminología semítica del texto.
  doctrine_reference: 'Principio de traducción: preservar la forma y la tensión local del texto sin armonizarlo con usos posteriores ajenos al pasaje.'
- issue: Imagen de juicio contra reyes y poderosos
  english_pob_reading: Retain concrete images ('remove ... from their couches,' 'loosen the loins') rather than paraphrasing as 'depose' or 'humble'
  chosen_spanish_reading: Mantener imágenes concretas ('quitará ... de sus lechos', 'aflojará los lomos')
  alternative_spanish_readings:
  - depondrá a los reyes y a los poderosos
  - humillará a los poderosos
  rationale: La línea es visiblemente imagética y apocalíptica. Una abstracción moral o política perdería la tensión corporal y regia del original, además de ocultar la incertidumbre lexicográfica en el segundo hemistiquio.
  doctrine_reference: 'Contexto literario: conservar el lenguaje de juicio vívido y la posible alusión a Isaías 45:1 sin sobreexplicar la imagen.'
translation_notes:
  revision_awareness: El texto español sigue la última revisión auditada al preferir un verbo de desplazamiento/desposesión para ያነሥኦሙ ('quitará') en vez de una elevación literal, y corrige la antigua solución inglesa 'reins' interpretando ኃማተ según la revisión del auditorio como 'loins'; por eso se traduce con el modismo bíblico 'lomos'. También se conserva la imaginería concreta de tronos, lechos y dientes, evitando abstracciones como 'deponer' o 'humillar'.
  spanish_consistency_notes:
  - Se mantiene 'Hijo del Hombre' con mayúsculas como título apocalíptico.
  - Se conserva la repetición de 'fuertes' para ጽኑዓን, reforzando el paralelismo.
  - '''Tronos'' y ''lechos'' se usan para sostener el contraste entre poder público y seguridad privada.'
  - '''Aflojará los lomos'' evita el falso amigo de ''reins'' y sigue la revisión textual del audit trail.'
  - El tono es sobrio y bíblico moderno, sin arcaísmos innecesarios.
