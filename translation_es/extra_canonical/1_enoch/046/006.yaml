translation:
  language: es
  text: Y él derribará el rostro de los fuertes[a] y los llenará de vergüenza; y la oscuridad será su morada, y los gusanos[b] su lecho. Y no tendrán esperanza de levantarse de sus lechos[c], porque no exaltan el nombre del Señor de espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y el rostro de los fuertes será derribado, y la vergüenza los llenará».
    reason: previous_rendering
  - marker: b
    text: La palabra traducida «gusanos» proviene de una forma OCR algo incierta en este testimonio ge'ez; el sentido encaja con la imagen de juicio y corrupción en un lecho semejante a una tumba.
    reason: textual_variant
  - marker: c
    text: «Levantarse de sus lechos» puede significar simplemente incorporarse, pero en este contexto también puede implicar la negación de una restauración después del juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ገጸ
  english_pob_choice: the face of
  chosen_spanish: el rostro de
  alternatives_spanish:
  - el semblante de
  - la faz de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen concreta de «rostro» conserva la humillación visible del juicio y evita abstraer el giro a algo como «presencia», que debilitaría el cuadro apocalíptico.
- source_word: ጽኑዓን
  english_pob_choice: the strong ones
  chosen_spanish: los fuertes
  alternatives_spanish:
  - los poderosos
  - los valientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Fuertes» reproduce de manera directa el valor del término sin introducir una lectura sociopolítica más específica que el lexema no exige.
- source_word: ይገፈትእ
  english_pob_choice: shall be struck down / shall be cast down
  chosen_spanish: derribará
  alternatives_spanish:
  - abatirá
  - echará por tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo es activo y expresa un derribo/abatimiento fuerte. «Derribará» mantiene el sujeto activo y la idea de caída judicial, en español natural.
- source_word: ይመልኦሙ ኃፍረተ
  english_pob_choice: he will fill them with shame
  chosen_spanish: los llenará de vergüenza
  alternatives_spanish:
  - los llenará de shame
  - los colmará de vergüenza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La construcción es claramente resultativa: el agente los llena de un contenido. En español, «vergüenza» transmite bien el deshonor público del pasaje; «colmará» sería posible, pero «llenará» es más directo.'
- source_word: ጽልመት
  english_pob_choice: darkness
  chosen_spanish: la oscuridad
  alternatives_spanish:
  - las tinieblas
  - la sombra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oscuridad» es claro y natural en español moderno; mantiene el campo semántico de juicio y ocultamiento sin añadir un tono litúrgico innecesario.
- source_word: መንደሪሆሙ
  english_pob_choice: their dwelling
  chosen_spanish: su morada
  alternatives_spanish:
  - su habitación
  - su habitación de permanencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Morada» conserva el sentido de lugar de residencia con un registro digno y bíblico, apropiado para la imaginería escatológica.
- source_word: ዕፀያት
  english_pob_choice: worms
  chosen_spanish: los gusanos
  alternatives_spanish:
  - las lombrices
  - los gusanos/maggots
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dada la nota textual de incertidumbre en el testimonio ge'ez, «gusanos» sigue la imagen de corrupción del sepulcro sin volverla demasiado técnica. La forma plural con artículo conserva el paralelismo con el sujeto poseído.
- source_word: ምስካቦሙ
  english_pob_choice: their bed
  chosen_spanish: su lecho
  alternatives_spanish:
  - su cama
  - su descanso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lecho» mantiene el tono solemne y permite que la imagen funcione como cama funeraria o lecho de reposo/juzgamiento, sin cerrar la ambigüedad del original.
- source_word: ኢይሴፈዉ
  english_pob_choice: they shall have no hope
  chosen_spanish: no tendrán esperanza
  alternatives_spanish:
  - no esperarán
  - carecerán de esperanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula española más natural y fiel es «no tendrán esperanza», que preserva la negación absoluta de expectativa ante el levantarse.
- source_word: ይትነሥኡ
  english_pob_choice: rising
  chosen_spanish: levantarse
  alternatives_spanish:
  - alzarse
  - ponerse de pie
  - resucitar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Levantarse» permite conservar la ambigüedad entre incorporarse físicamente y una restauración posterior al juicio. «Resucitar» sería demasiado específico para el verbo y el contexto inmediato.
- source_word: ኢያሌዕሉ ስሞ
  english_pob_choice: they do not exalt the name
  chosen_spanish: no exaltan el nombre
  alternatives_spanish:
  - no alaban el nombre
  - no honran el nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Exaltan» conserva el matiz elevado del verbo y refleja bien la fórmula cultual/de alabanza propia del libro, sin reducirla solo a «alabar».
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  - el Señor de Espíritu[s]
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título fijo de 1 Enoc con la forma ya establecida en español. «Espíritus» en mayúscula inicial en «Señor» no es necesario aquí; la forma plural conserva el título distintivo.
theological_decisions:
- issue: Si ይትነሥኡ debe sonar a resurrección o solo a incorporarse desde el lecho
  english_pob_reading: Rendered as 'rising from their beds' without making resurrection explicit.
  chosen_spanish_reading: «levantarse de sus lechos» sin explicitar resurrección.
  alternative_spanish_readings:
  - «resucitar de sus lechos» con sobretono escatológico
  - «ponerse de pie de sus lechos» como literalismo físico
  rationale: El contexto es de juicio y corrupción, pero el verbo por sí mismo es más amplio que una resurrección explícita. La traducción debe preservar esa tensión y no cerrar la lectura de manera indebida.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Cómo presentar la omisión de esperanza en relación con la condena final
  english_pob_reading: They shall have no hope of rising from their beds because they do not exalt the name of the Lord of Spirits.
  chosen_spanish_reading: «no tendrán esperanza de levantarse de sus lechos, porque no exaltan el nombre del Señor de los Espíritus».
  alternative_spanish_readings:
  - «no tendrán esperanza de levantarse de sus lechos, pues no exaltaron el nombre...»
  - «no habrá esperanza para que se levanten de sus lechos...»
  rationale: 'La causalidad moral del verso debe permanecer clara: la falta de exaltación del nombre divino fundamenta el juicio. La forma escogida conserva el enunciado directo sin añadir interpretación doctrinal extra.'
  doctrine_reference: Primacía del sentido original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: 'He considerado la revisión gramatical que corrige la voz del verbo: el sujeto es activo («él») y por eso el español mantiene «derribará» y «los llenará», no un pasivo. También he integrado la alerta textual sobre la forma incierta de «gusanos» en el testimonio ge''ez y la ambigüedad de ይትነሥኡ, sin resolverla más allá de lo que el original permite.'
  spanish_consistency_notes:
  - Se mantiene «Señor de los Espíritus» como título fijo del libro, en línea con la terminología del POB en inglés.
  - 'Se conserva el paralelismo sintáctico del original: acción del agente divino, resultado de vergüenza, morada de oscuridad, lecho de gusanos, y clausura causal por falta de exaltación del nombre.'
  - El registro es solemne pero moderno, evitando giros arcaizantes que no añaden fidelidad semántica.
