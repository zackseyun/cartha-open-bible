base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/046/003.yaml
  text: And he answered me and said to me[a], “This is the Son of Man, to whom righteousness belongs, and righteousness dwells with him; and he will reveal all the treasuries of what is hidden, because the Lord of Spirits has chosen him[c][b], and his lot has prevailed before the Lord of Spirits forever in uprightness.”
  footnotes:
  - marker: a
    text: Or 'the storehouses/treasures of the hidden things.' The image is of concealed realities kept in heavenly reserve, not merely abstract 'secrets.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult in the Ge'ez. 'His lot has prevailed' may also be understood as 'his portion has triumphed' or, less likely, as referring to the lot of those associated with him.
    reason: alternative_reading
  - marker: c
    text: Or 'and his lot has prevailed'.
    reason: previous_rendering
