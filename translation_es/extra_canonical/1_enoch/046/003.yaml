translation:
  language: es
  text: 'Y me respondió y me dijo: «Este es el Hijo del Hombre, a quien le pertenece la justicia, y la justicia habita con él; y él revelará todos los tesoros[a] de lo oculto, porque el Señor de los Espíritus lo ha escogido, y su porción[b] ha prevalecido delante del Señor de los Espíritus para siempre en rectitud».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tesoros» conserva la imagen de realidades reservadas o almacenadas; no se trata solo de «secretos» abstractos.
    reason: lexical_alternative
  - marker: b
    text: «Porción» puede entenderse también como «lote» o «heredad»; el ge'ez deja aquí una relación de asignación difícil de precisar con total seguridad.
    reason: alternative_reading
lexical_decisions:
- source_word: ወልደ ሰብእ
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el hijo del hombre
  - el ser humano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez funciona aquí como designación titulativa en la escena visionaria. En español, la forma natural y reconocible para esa función es «el Hijo del Hombre», sin ampliar el sentido hacia formulaciones doctrinales posteriores.
- source_word: ዘሎቱ ኮነ ጽድቅ
  english_pob_choice: to whom righteousness belongs
  chosen_spanish: a quien le pertenece la justicia
  alternatives_spanish:
  - que tiene justicia
  - que es caracterizado por la justicia
  - que posee justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa pertenencia o relación, no solo una cualidad predicativa. «Le pertenece» conserva esa fuerza relacional en español, y «justicia» mantiene el término legal/covenantal del original.
- source_word: ወጽድቅ ምስሌሁ ኃደረ
  english_pob_choice: and righteousness dwells with him
  chosen_spanish: y la justicia habita con él
  alternatives_spanish:
  - y la justicia permanece con él
  - y la justicia mora con él
  - y la justicia está con él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Habita con él» reproduce la imagen personal y durativa del verbo, y evita suavizar la personificación de la justicia en el pasaje.
- source_word: መዛግብተ ዘኅቡእ
  english_pob_choice: the treasuries of what is hidden
  chosen_spanish: los tesoros de lo oculto
  alternatives_spanish:
  - las despensas de lo oculto
  - los almacenes de lo escondido
  - los tesoros de las cosas secretas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tesoros» conserva la imaginería de acumulación celestial. «Lo oculto» mantiene la referencia amplia a realidades reservadas sin reducirla a simples «secretos» abstractos.
- source_word: ይከሥት
  english_pob_choice: he will reveal
  chosen_spanish: él revelará
  alternatives_spanish:
  - él descubrirá
  - él hará manifiesto
  - él desvelará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Revelará» es claro, solemne y fiel a la acción de hacer visibles las realidades escondidas.
- source_word: እግዚአ መንፈሳት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  - el Dueño de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título distintivo de 1 Enoc en una forma plenamente natural para el español bíblico, sin sustituirlo por un equivalente genérico.
- source_word: ኀረዮ ኃርየ
  english_pob_choice: has chosen him
  chosen_spanish: lo ha escogido
  alternatives_spanish:
  - lo ha elegido
  - lo ha seleccionado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogido» refleja bien la elección divina y suena más bíblico que «seleccionado». La duplicación intensiva del ge'ez queda indicada por el sentido, no por una repetición artificial.
- source_word: ዘክፍሉ ሞአ
  english_pob_choice: his lot has prevailed
  chosen_spanish: su lote ha prevalecido
  alternatives_spanish:
  - su porción ha prevalecido
  - su suerte ha prevalecido
  - su parte ha vencido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lote» conserva el campo semántico de asignación o porción establecida. «Ha prevalecido» reproduce el matiz de victoria o permanencia efectiva del término ge'ez.
- source_word: በርቱዕ ለዓለም
  english_pob_choice: forever in uprightness
  chosen_spanish: para siempre en rectitud
  alternatives_spanish:
  - para siempre en justicia
  - eternamente en rectitud
  - por siempre en integridad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Rectitud» evita repetir «justicia» una tercera vez y conserva el matiz moral del final del verso. «Para siempre» expresa adecuadamente el valor temporal de ለዓለም.
theological_decisions:
- issue: Cómo traducir la figura de ወልደ ሰብእ en un contexto visionario sin sobreinterpretación cristológica posterior
  english_pob_reading: Rendered as the title-like 'the Son of Man.'
  chosen_spanish_reading: Se conserva «el Hijo del Hombre» como designación titulativa local.
  alternative_spanish_readings:
  - un hijo del hombre
  - el ser humano
  - el humano
  rationale: El contexto inmediato identifica a una figura reveladora y no a un humano indeterminado. La traducción mantiene el valor titular sin importar formulaciones doctrinales ajenas al pasaje.
  doctrine_reference: Preservar el sentido local del texto y no armonizar en exceso con usos posteriores.
- issue: Repetición intencional de la justicia asociada al Hijo del Hombre
  english_pob_reading: 'Retained both clauses: ''to whom righteousness belongs'' and ''righteousness dwells with him.'''
  chosen_spanish_reading: 'Se conservan ambas cláusulas: «a quien le pertenece la justicia» y «la justicia habita con él».'
  alternative_spanish_readings:
  - reducirlo a «el justo»
  - fusionar ambas frases en una sola
  rationale: El verso acumula afirmaciones para intensificar la relación entre la figura y la justicia. Mantener ambas preserva el énfasis poético y teológico del original.
  doctrine_reference: Conservar la repetición significativa y no suavizarla.
- issue: Interpretación de la cláusula final sobre el lote/porción del personaje
  english_pob_reading: Rendered 'his lot has prevailed before the Lord of Spirits forever in uprightness.'
  chosen_spanish_reading: Se traduce «su lote ha prevalecido delante del Señor de los Espíritus para siempre en rectitud».
  alternative_spanish_readings:
  - su porción ha triunfado
  - el lote de los que están con él ha prevalecido
  - su heredad ha prevalecido
  rationale: El ge'ez es difícil en este punto, y la versión española permanece cercana a la sintaxis probable sin resolver artificialmente la ambigüedad. «Delante de» mantiene la idea de presencia ante el Señor de los Espíritus.
  doctrine_reference: Cuando el sentido es incierto, preferir una traducción transparente que conserve la tensión del texto.
translation_notes:
  revision_awareness: La redacción española sigue el último estado del texto en inglés, sin adoptar la lectura corregida «whose lot» como cláusula independiente; se conservó la relación posesiva de la cadena relativa mediante «su lote», y se mantuvo la ambigüedad final en una formulación sobria y transparente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente lo requiere; aquí el título ge'ez correspondiente se mantiene como «el Señor de los Espíritus».
  - «Espíritus» se mantiene en plural por fidelidad al título fijo del libro.
  - Se evita «Cristo» y se conserva la forma titulativa «Hijo del Hombre» conforme al contexto visionario.
  - «Justicia» se usa de manera consistente para צְדָקָה/δικαιοσύνη; «rectitud» queda reservado para el cierre del verso.
  - La frase «lo oculto» refleja la referencia amplia a realidades reservadas, sin reducirla a secretos meramente psicológicos o privados.
