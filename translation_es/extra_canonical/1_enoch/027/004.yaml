translation:
  language: es
  text: En los días de su juicio, ellos lo bendecirán por la misericordia, conforme a lo que él les ha repartido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El final deja implícito el objeto de «repartido»; puede entenderse como una porción, un lote o una medida de misericordia o bendición.
    reason: lexical_alternative
lexical_decisions:
- source_word: መዋዕለ
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - tiempos
  - temporadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural temporal se conserva como marcador apocalíptico concreto; "días" es la equivalencia natural y más transparente en español.
- source_word: ኵነኔሆሙ
  english_pob_choice: their judgment
  chosen_spanish: su juicio
  alternatives_spanish:
  - su condenación
  - su castigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Juicio" mantiene la ambigüedad judicial del término ge''ez sin reducirlo a condena o castigo, acorde con el contexto inmediato de bendición y misericordia.'
- source_word: ይባርክዎ
  english_pob_choice: they will bless him
  chosen_spanish: ellos lo bendecirán
  alternatives_spanish:
  - lo bendecirán
  - ellos bendecirán a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal exige sujeto plural y objeto masculino singular; en español se expresa de manera directa con "ellos lo bendecirán".
- source_word: በምሕረት
  english_pob_choice: for the mercy
  chosen_spanish: por la misericordia
  alternatives_spanish:
  - con misericordia
  - a causa de la misericordia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición admite relación causal o instrumental; "por la misericordia" conserva bien la idea de motivo de la bendición en un español fluido.
- source_word: በከመ
  english_pob_choice: according as
  chosen_spanish: conforme a lo que
  alternatives_spanish:
  - según
  - como
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación de medida o modo se vierte con una construcción clara en español. "Conforme a lo que" mantiene la relación entre la respuesta de bendición y la porción asignada.
- source_word: ከፈሎሙ
  english_pob_choice: he has apportioned to them
  chosen_spanish: él les ha repartido
  alternatives_spanish:
  - él les ha asignado
  - él les ha distribuido
  - él les ha dado su porción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de dividir/asignar se transmite con "repartido" para conservar la idea de porción o reparto sin introducir un objeto explícito que el ge'ez deja implícito.
theological_decisions:
- issue: Relación entre juicio y misericordia en la frase
  english_pob_reading: Retain the broader 'judgment' while allowing the following blessing and mercy to define its positive outcome for this group.
  chosen_spanish_reading: Conservar "juicio" como término amplio, dejando que la bendición y la misericordia definan el resultado favorable para este grupo.
  alternative_spanish_readings:
  - su condenación
  - su castigo
  rationale: El texto no obliga a una lectura meramente punitiva; mantener la amplitud judicial evita resolver una tensión que el propio contexto preserva.
  doctrine_reference: Preservar la tensión teológica sin cerrarla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente corrige que el sujeto de ይባርክዎ es plural y el objeto es singular masculino; por eso la traducción usa «ellos lo bendecirán», no «él los bendecirá». También se evita duplicar la cláusula final y se conserva la relación de medida indicada por el texto ge'ez.
  spanish_consistency_notes:
  - Se usa «juicio» en sentido judicial amplio, no «condenación», para mantener la ambigüedad del original.
  - Se evita «SEÑOR» como sustituto; aquí el referente se expresa con el pronombre «lo», siguiendo el contexto previo del sujeto divino en el pasaje.
  - «Misericordia» se conserva como sustantivo explícito, no reducido a un adverbio, para respetar el peso léxico del ge'ez.
