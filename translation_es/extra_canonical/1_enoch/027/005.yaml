translation:
  language: es
  text: En aquel tiempo bendije al Señor de gloria[a], y hablé y canté alabanzas como conviene a su majestad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y hablé de él». La secuencia ge''ez aquí es difícil; otra propuesta de lectura es «y declaré su gloria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ውእቱ ጊዜ
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - Entonces
  - En ese tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula temporal narrativa estándar. «En aquel tiempo» conserva el valor de transición del relato y su tono solemne sin sonar forzado.
- source_word: ባረክዎ
  english_pob_choice: I blessed
  chosen_spanish: bendije
  alternatives_spanish:
  - di bendición a
  - alabé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo común expresa acción de bendecir. «Bendije» preserva la fuerza verbal directa; «alabé» se acerca demasiado al lenguaje de la segunda acción de alabar/cantar.
- source_word: ለእግዚአ ስብሐት
  english_pob_choice: the Lord of glory
  chosen_spanish: el Señor de gloria
  alternatives_spanish:
  - el Señor de majestad
  - el Señor de esplendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Señor» es el equivalente natural de እግዚአ en este contexto doxológico. «De gloria» conserva ስብሐት como cualidad divina elevada y mantiene el título compacto y reverente.
- source_word: ነገርኩ
  english_pob_choice: I spoke
  chosen_spanish: hablé
  alternatives_spanish:
  - declaré
  - reconté
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un verbo amplio de habla. «Hablé» deja abierta la relación con lo que sigue y no sobreinterpreta el complemento, conforme al contexto textual con la nota de dificultad.
- source_word: ዘመርኩ
  english_pob_choice: sang praise
  chosen_spanish: canté alabanzas
  alternatives_spanish:
  - canté
  - entoné alabanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo significa cantar o entonar. «Canté alabanzas» explicita el contexto de culto y conserva la idea de canto de alabanza sin añadir contenido ajeno.
- source_word: በከመ ይደሉ
  english_pob_choice: as is fitting
  chosen_spanish: como conviene
  alternatives_spanish:
  - como era apropiado
  - como era justo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La locución expresa conveniencia o propiedad. «Como conviene» suena natural en español y mantiene el sentido de adecuación formal al contexto de majestad.
- source_word: ለዕበዩ
  english_pob_choice: for his majesty
  chosen_spanish: a su majestad
  alternatives_spanish:
  - por su grandeza
  - para su grandeza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo expresa grandeza o majestad. «A su majestad» conserva el registro elevado y funciona bien con el verbo de cantar alabanzas; también evita repetir «gloria».
theological_decisions:
- issue: Título divino እግዚአ en contexto de doxología
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: En una alabanza dirigida a Dios, «Señor» es el título teológicamente y lingüísticamente más natural. «Dueño» o «Maestro» son posibles léxicamente, pero resultan demasiado marcados o poco litúrgicos en español.
  doctrine_reference: Tratamiento de títulos divinos; conservar el sentido de κύριος/אדון sin banalizarlo.
- issue: Ambigüedad textual de la secuencia verbal después de «bendije»
  english_pob_reading: I spoke / and I declared his glory (note reflects difficulty)
  chosen_spanish_reading: y hablé y canté alabanzas
  alternative_spanish_readings:
  - y declaré su gloria y canté alabanzas
  - y hablé de él y canté alabanzas
  rationale: El audit trail inglés muestra una dificultad lexical/textual y evita fijar un objeto que el testimonio ge'ez no sostiene con seguridad en esta forma de trabajo. La traducción española mantiene la secuencia verbal sin añadir un complemento no asegurado, preservando la tensión documentada.
  doctrine_reference: Principio de transparencia textual y conservación de variantes cuando el testimonio es incierto.
translation_notes:
  revision_awareness: 'La redacción española toma en cuenta la revisión crítica más reciente del contexto inglés: la propuesta anterior de «declaré su gloria» fue retirada en la última pasada, mientras que la nota del texto base sigue marcando dificultad en la secuencia verbal. Por eso se optó por una formulación sobria («hablé y canté alabanzas») que no fuerza un objeto ausente del testimonio proporcionado, pero deja constancia en nota de la alternativa interpretativa.'
  spanish_consistency_notes:
  - Se usó «Señor» para እግዚአ conforme al uso reverente del título divino en español, manteniendo «Yahvé» como norma general del proyecto solo cuando el fuente lo requiere explícitamente; aquí el texto recibido y la tradición de cita en el audit trail apuntan a un título de alabanza, no al tetragrámaton.
  - «Majestad» se reservó para ለዕበዩ, evitando duplicar «gloria» y conservando el tono doxológico.
  - No se introdujo «Cristo» ni otra terminología cristológica, pues el pasaje no la exige.
  - La secuencia verbal se mantuvo sobria para respetar la incertidumbre textual señalada en el material auditado.
