  rationale: 'Se propone una reparación menor: «juicio recto» preserva mejor el vínculo entre juicio y rectitud/justicia del original, y una coma tras «aquí» mejora la legibilidad. Se mantiene «Señor de gloria» porque el original presenta un título divino, no el nombre YHWH, por lo que no corresponde introducir «Yahvé».'
