review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura general del ge'ez y sigue la revisión inglesa más reciente en puntos clave como «aquí» para ዝየ y «los sabios» para ምሑራን. También conserva la incertidumbre textual de «para siempre». Sin embargo, «juicio justo» debilita levemente la unión de juicio con justicia/rectitud que el expediente inglés expresa como «righteous judgment», y «Señor de gloria» choca con la pauta terminológica del proyecto, que prefiere «Yahvé» solo para יהוה/YHWH; aquí el original no contiene el nombre divino, sino un título equivalente a «Señor de gloria».
  spanish_quality_summary: 'El español es claro, digno y legible. La frase fluye bien y evita calcos torpes. Conviene un ajuste menor a «juicio de justicia» o «juicio recto» para preservar mejor el matiz, y sustituir «Señor» por «Señor» no es problema de legibilidad sino de consistencia de proyecto: en este contexto debe mantenerse porque es título, no el tetragrámaton. También resulta más natural en español puntuar con coma tras «aquí» para separar el complemento temporal/locativo del sujeto.'
  glossary_alignment: 'Buena alineación general con el glosario: no hay Mesías/Cristo ni otros términos sensibles. Se debe conservar «Señor de gloria» y no cambiarlo a «Yahvé», porque la preferencia de «Yahvé» aplica a יהוה/YHWH, no a un título ge''ez de señorío. «Los justos» y «los sabios» son adecuados. Se recomienda «juicio recto» como mejor equilibrio entre fidelidad y naturalidad.'
  issues:
  - severity: medium
    issue: «juicio justo» puede sonar algo redundante y menos preciso que el matiz de «righteous judgment».
    rationale: La construcción ge'ez ኵነኔ ዘበ ጽድቅ une juicio con justicia/rectitud. En español, «juicio recto» o «juicio de justicia» transmite mejor esa cualidad moral que «juicio justo», que aunque comprensible puede sentirse más plano.
  - severity: low
    issue: Falta una coma tras «aquí».
    rationale: «Todos los días aquí, los sabios...» mejora la lectura al separar el complemento adverbial del sujeto; no cambia el sentido, pero sí la claridad sintáctica.
  revised_spanish_text: En los días postreros esto llegará a ser para ellos un espectáculo de juicio recto en presencia de los justos para siempre[a]; todos los días aquí, los sabios[b] bendecirán al Señor de gloria, el Rey eterno.
  revised_footnotes:
  - marker: a
    text: La lectura equivalente a «para siempre» es textualmente incierta en este testimonio, pues aparece entre corchetes en la fuente. Puede depender de la frase anterior o reflejar una variante.
    reason: textual_variant
  - marker: b
    text: La revisión del texto ge'ez favorece «los sabios» para ምሑራን; otra posibilidad más cercana al campo semántico de instrucción sería «los instruidos».
    reason: lexical_alternative
  revision_rationale: 'Se propone una reparación menor: «juicio recto» preserva mejor el vínculo entre juicio y rectitud/justicia del original, y una coma tras «aquí» mejora la legibilidad. Se mantiene «Señor de gloria» porque el original presenta un título divino, no el nombre YHWH, por lo que no corresponde introducir «Yahvé».'
