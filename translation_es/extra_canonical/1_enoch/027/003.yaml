translation:
  language: es
  text: En los días postreros esto llegará a ser para ellos un espectáculo de juicio recto en presencia de los justos para siempre[a]; todos los días aquí, los sabios[b] bendecirán al Señor de gloria, el Rey eterno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lectura equivalente a «para siempre» es textualmente incierta en este testimonio, pues aparece entre corchetes en la fuente. Puede depender de la frase anterior o reflejar una variante.
    reason: textual_variant
  - marker: b
    text: La revisión del texto ge'ez favorece «los sabios» para ምሑራን; otra posibilidad más cercana al campo semántico de instrucción sería «los instruidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: በዳኃሪ መዋዕል
  english_pob_choice: In the latter days
  chosen_spanish: En los días postreros
  alternatives_spanish:
  - En los últimos días
  - Al final de los días
  - En tiempos posteriores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión marca un marco escatológico. «Días postreros» conserva el registro apocalíptico sin sonar forzado en español.
- source_word: ይከውን
  english_pob_choice: this will become
  chosen_spanish: esto llegará a ser
  alternatives_spanish:
  - esto será
  - esto se convertirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo futuro expresa un estado resultante. «Llegará a ser» mantiene la idea de devenir sin endurecer la frase.
- source_word: ላዕሌሆሙ
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - sobre ellos
  - contra ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido relacional aquí es el de beneficio o referencia hacia los destinatarios del espectáculo, no una postura física sobre ellos.
- source_word: አርአያ
  english_pob_choice: a spectacle
  chosen_spanish: un espectáculo
  alternatives_spanish:
  - una señal
  - un ejemplo
  - una manifestación visible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de juicio visible, «espectáculo» preserva el carácter público y perceptible del término.
- source_word: ኵነኔ ዘበ ጽድቅ
  english_pob_choice: of righteous judgment
  chosen_spanish: de juicio justo
  alternatives_spanish:
  - de juicio en justicia
  - de juicio recto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Justo» expresa bien la cualidad moral/legal de la frase y suena más natural en español que una construcción más pesada.
- source_word: በቅድመ ጻድቃን
  english_pob_choice: in the presence of the righteous
  chosen_spanish: en presencia de los justos
  alternatives_spanish:
  - ante los justos
  - delante de los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La escena es pública y visible; «en presencia de» conserva ese matiz solemne y forense.
- source_word: ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por el siglo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura transmitida es textualmente incierta; «para siempre» es la equivalencia más clara en español y mantiene la duración continua.
- source_word: ዝየ
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - acá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente corrigió el sentido de esta forma a un adverbio locativo. «Aquí» lo refleja directamente.
- source_word: ምሑራን
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los instruidos
  - los doctos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión reciente entendió correctamente el término como derivado del campo de «sabiduría/instrucción» en este contexto. «Los sabios» conserva la fuerza sapiencial sin introducir una paráfrasis extensa.
- source_word: ለእግዚአ ስብሐት
  english_pob_choice: the Lord of glory
  chosen_spanish: el Señor de gloria
  alternatives_spanish:
  - el Señor glorioso
  - el Señor de majestad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez es un título divino directo; «Señor de gloria» lo reproduce con fidelidad y sin armonizarlo con fórmulas posteriores.
- source_word: ንጉሥ ዘለዓለም
  english_pob_choice: the eternal King
  chosen_spanish: el Rey eterno
  alternatives_spanish:
  - el Rey por siempre
  - el Rey de eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Rey eterno» conserva la dignidad del título y su referente a la realeza divina.
theological_decisions:
- issue: Titulación divina sin armonizar con fórmulas bíblicas posteriores
  english_pob_reading: the Lord of glory, the eternal King
  chosen_spanish_reading: el Señor de gloria, el Rey eterno
  alternative_spanish_readings:
  - el Señor glorioso, el Rey eterno
  - el Señor de majestad, el Rey perpetuo
  rationale: La frase ge'ez presenta dos títulos en aposición. Se conservan ambos de forma explícita, evitando sustituirlos por equivalentes litúrgicos más conocidos que podrían ocultar la formulación propia del texto.
  doctrine_reference: Traducir los títulos tal como aparecen; no armonizar con fórmulas de uso posterior.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente del audit trail: se corrigió ዝየ como «aquí» y se evitó la lectura errónea «los merciful/los misericordiosos». La formulación final conserva también la incertidumbre textual de ለዓለም mediante una nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto, pero este versículo usa el título ge'ez «Señor de gloria» para reproducir el texto transmitido.
  - Se prefirió «justo» para ጽድቅ por la naturalidad española en la construcción «juicio justo».
  - No se introdujo «Cristo» ni otra terminología no atestiguada en el pasaje.
  - El orden de las dos cláusulas sigue la sintaxis del original y del audit trail en inglés.
