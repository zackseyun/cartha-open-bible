  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Bendita» / «maldito» preserva adecuadamente la polaridad teológica blessed/accursed. No aparecen términos sensibles del glosario principal (Yahvé, Mesías, esclavo, etc.).
  issues:
