translation:
  language: es
  text: 'En ese tiempo dije: «¿Por qué razón es esta tierra bendita, toda ella llena de árboles[a], y este valle maldito en medio de ella?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El giro ge''ez es textual y léxicamente difícil; la imagen parece ser la de una tierra abundantemente cubierta de árboles o vegetación. O: «esta tierra bendita, toda ella llena de árboles».'
    reason: textual_variant
lexical_decisions:
- source_word: ውእቱ ጊዜ
  english_pob_choice: At that time
  chosen_spanish: En ese tiempo
  alternatives_spanish:
  - Entonces
  - En aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal introduce un marco narrativo/visionario solemne. «En ese tiempo» conserva el registro elevado sin volverse artificial en español.
- source_word: እቤ
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - dije,
  - hablé
  - pregunté
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma introduce el discurso de Enoc. Dado que sigue una pregunta directa, «dije» mantiene la fórmula de habla y deja que la interrogación haga la función inquisitiva.
- source_word: በእንተ ምንት
  english_pob_choice: For what reason
  chosen_spanish: ¿Por qué razón
  alternatives_spanish:
  - ¿Por qué?
  - ¿Con qué propósito?
  - ¿A causa de qué?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa indagación por causa o propósito. «¿Por qué razón?» conserva la formalidad y la exactitud causal del giro ge'ez.
- source_word: ዛቲ ምድር ቡርክት
  english_pob_choice: this blessed land
  chosen_spanish: esta tierra bendita
  alternatives_spanish:
  - esta tierra bienaventurada
  - este país bendito
  - esta región bendita
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ምድር» puede ser tierra, suelo o territorio. Aquí «tierra» funciona de modo natural en español y mantiene el contraste sacral con el valle maldito; «bendita» conserva el valor evaluativo de ቡርክት.
- source_word: ወኵለንታሃ ምልእት
  english_pob_choice: all of it full
  chosen_spanish: toda ella llena
  alternatives_spanish:
  - enteramente llena
  - completamente llena
  - toda llena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La estructura paratáctica se refleja con «toda ella llena», que expresa la totalidad del terreno sin perder fluidez. Evita «plenamente» porque no reproduce la imagen concreta de estar colmada.
- source_word: ዕፀወ ወዛ፡ ቈላ
  english_pob_choice: with trees
  chosen_spanish: de árboles
  alternatives_spanish:
  - con árboles
  - con árboles y plantas
  - de árboles y vegetación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto apunta a una cobertura arbórea/vegetal; «llena de árboles» es la formulación más natural y fiel al cuadro visual. «De árboles» evita duplicar preposiciones y suena más idiomático que «con árboles» en esta construcción.
- source_word: ርጉምት
  english_pob_choice: accursed
  chosen_spanish: maldito
  alternatives_spanish:
  - maldecido
  - cursed
  - maldito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el contraste fuerte con «bendita». «Maldito» mantiene el tono judicial/apocalíptico, aunque «maldecido» sería una alternativa más literal pero menos idiomática.
- source_word: ማእከሎሙ
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - en su medio
  - en su centro
  - entre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión sitúa el valle en posición central dentro del paisaje. «En medio de ellos» conserva la imagen espacial clara y es natural en español; el antecedente plural se entiende por el cuadro de la tierra y los árboles.
theological_decisions:
- issue: Contraste sacral entre la tierra y el valle
  english_pob_reading: Render ቡርክት / ርጉምት as 'blessed' / 'accursed'
  chosen_spanish_reading: «bendita» / «maldito»
  alternative_spanish_readings:
  - «bendita» / «maldecida»
  - «bienaventurada» / «maldita»
  - «favorecida» / «maldita»
  rationale: El versículo presenta una oposición de valor sagrado y judicial, no solo una descripción agrícola. «Bendita» y «maldito» preservan la polaridad teológica y el tono de juicio propio del marco enóquico.
  doctrine_reference: Preservar la imaginería apocalíptica y la tensión entre espacio bendecido y espacio juzgado.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail al mantener la parataxis del original y la idea de una tierra «llena de árboles», pero la expresa en español con una construcción más natural: «toda ella llena de árboles». También conserva el contraste bendita/maldito y la ubicación central del valle en medio del paisaje.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando haya un referente explícito del nombre divino; no aplica en este versículo.
  - Se mantuvo «tierra» por el valor espacial general de ምድር; «tierra bendita» comunica bien el paisaje visionario sin sobreinterpretar como territorio político.
  - «Maldito» se eligió para reflejar la fuerza judicial del contraste con «bendita», en lugar de suavizarlo a «cursed» o «maldecido».
  - 'La sintaxis española busca equilibrio entre literalidad y naturalidad: conserva la pregunta retórica y la estructura de acumulación del original.'
