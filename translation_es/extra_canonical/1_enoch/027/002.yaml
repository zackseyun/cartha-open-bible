base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/027/002.yaml
  text: At that time Uriel[a], one of the holy angels who was with me, answered me and said to me, “This accursed valley is for those who are accursed forever. Here all those will be gathered who speak with their mouths improper words against the Lord, and who utter harsh things concerning his glory. Here they will be gathered[b], and here will be their place of judgment.”
  footnotes:
  - marker: a
    text: Or 'unfitting words' or 'words that are not right.' The Ge'ez phrase denotes speech that is improper or not fitting before the Lord.
    reason: lexical_alternative
  - marker: b
    text: The expression rendered 'hard things' likely refers to harsh, shocking, or insolent speech concerning the Lord's glory.
    reason: lexical_alternative
