translation:
  language: es
  text: 'En aquel tiempo Uriel, uno de los santos ángeles[a] que estaba conmigo, me respondió y me dijo: «Este valle maldito es para los malditos para siempre. Aquí serán reunidos todos los que hablan con su boca palabras impropias contra Yahvé y dicen cosas ásperas[b] acerca de su gloria. Aquí serán reunidos, y aquí estará su lugar de juicio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ángeles santos». La expresión ge’ez designa seres celestiales consagrados; «santos ángeles» mantiene el registro apocalíptico.
    reason: lexical_alternative
  - marker: b
    text: O «cosas duras» o «cosas insolentes». El ge’ez sugiere habla áspera, hiriente o irreverente acerca de la gloria de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: አውሥአኒ
  english_pob_choice: answered me
  chosen_spanish: me respondió
  alternatives_spanish:
  - me contestó
  - me habló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo en ge’ez tiene sentido de responder o replicar dentro de un diálogo guiado; en español, «me respondió» conserva mejor esa interacción que un simple «me habló».
- source_word: ቅዱሳን መላእክት
  english_pob_choice: holy angels
  chosen_spanish: santos ángeles
  alternatives_spanish:
  - ángeles santos
  - ángeles sagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Santos ángeles» reproduce el registro apocalíptico y la cualidad de consagración celestial sin volver la frase antinatural en español.
- source_word: ዛቈላ
  english_pob_choice: valley
  chosen_spanish: valle
  alternatives_spanish:
  - cañada
  - hondonada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término topográfico del juicio se expresa naturalmente como «valle», que preserva la geografía visionaria sin restringir innecesariamente la imagen.
- source_word: ርጉምት
  english_pob_choice: accursed
  chosen_spanish: maldito
  alternatives_spanish:
  - maldito por Dios
  - abominado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo marca el lugar como bajo maldición divina; «maldito» es claro y solemne en español, y en este contexto evita una formulación demasiado rebuscada.
- source_word: ለርጉማን እስከ ለዓለም
  english_pob_choice: for those who are accursed forever
  chosen_spanish: para los malditos para siempre
  alternatives_spanish:
  - para los malditos por siempre
  - para los malditos hasta la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión indica destino permanente; «para siempre» transmite la finalidad escatológica de manera idiomática y fiel.
- source_word: ይትጋብኡ
  english_pob_choice: will be gathered
  chosen_spanish: serán reunidos
  alternatives_spanish:
  - serán congregados
  - serán juntados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva/reflexiva del verbo encaja con «serán reunidos», que conserva el motivo apocalíptico de reunión para juicio.
- source_word: በአፉሆሙ
  english_pob_choice: with their mouths
  chosen_spanish: con su boca
  alternatives_spanish:
  - con sus bocas
  - de su boca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge’ez menciona el órgano de la palabra de manera concreta; en español, «con su boca» mantiene la imagen corporal y la asociación con el habla ofensiva.
- source_word: ላዕለ እግዚአብሔር
  english_pob_choice: against the Lord
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra el Señor
  - en contra de Yahvé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Siguiendo el criterio del proyecto, se preserva el nombre divino «Yahvé» en lugar de ocultarlo con una sustitución devocional; la preposición aquí tiene fuerza adversativa.
- source_word: ቃለ ዘኢይደሉ
  english_pob_choice: improper words
  chosen_spanish: palabras impropias
  alternatives_spanish:
  - palabras no adecuadas
  - palabras que no convienen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase señala habla que no es apropiada o conveniente ante el Señor; «palabras impropias» conserva la falta moral sin volverla más técnica de lo que el texto exige.
- source_word: ስብሐቲ ዚአሁ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su majestad
  - su esplendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto, el sustantivo apunta a la gloria del Señor como objeto de discurso irreverente; «su gloria» es la equivalencia más transparente.
- source_word: ይትናገሩ ዕፁብተ
  english_pob_choice: utter harsh things
  chosen_spanish: dicen cosas ásperas
  alternatives_spanish:
  - pronuncian cosas duras
  - dicen cosas insolentes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge’ez comunica habla dura, hiriente o insolente; «cosas ásperas» mantiene la fuerza sin imponer una categoría doctrinal posterior más estrecha que el texto.
- source_word: ያስተጋብእዎሙ
  english_pob_choice: they will be gathered
  chosen_spanish: serán reunidos
  alternatives_spanish:
  - serán congregados
  - los reunirán allí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma causativa y el contexto de juicio favorecen una traducción pasiva que preserve la reunión escatológica y el paralelo con la primera mención del lugar.
- source_word: ምኵናኒሆሙ
  english_pob_choice: their place of judgment
  chosen_spanish: su lugar de juicio
  alternatives_spanish:
  - su sitio de juicio
  - el lugar donde serán juzgados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión une localización y juicio; «su lugar de juicio» mantiene ambos elementos de modo natural en español.
theological_decisions:
- issue: Naturaleza del discurso condenado
  english_pob_reading: The verse refers to hostile, improper, and grievous speech directed against the Lord and concerning his glory, without narrowing it to a later technical category such as formal blasphemy alone.
  chosen_spanish_reading: El versículo describe palabras impropias contra Yahvé y cosas ásperas acerca de su gloria, sin reducirlo a una sola categoría técnica posterior.
  alternative_spanish_readings:
  - blasfemia formal
  - habla simplemente malvada
  rationale: El ge’ez enfatiza la impropiedad del habla y la dureza de lo dicho. La redacción española conserva esa amplitud para no resolver una tensión interpretativa que el texto no resuelve por sí mismo.
  doctrine_reference: Priorizar el alcance del texto original antes que categorías doctrinales posteriores.
- issue: Relación entre el lugar y el juicio
  english_pob_reading: The valley is the locale where the accursed are gathered and where their judgment takes place.
  chosen_spanish_reading: El valle es el lugar donde los malditos son reunidos y donde ocurre su juicio.
  alternative_spanish_readings:
  - el valle mismo es su condenación
  - la frase solo habla del juicio sin lugar
  rationale: La repetición de «aquí» en el original subraya localización. «Su lugar de juicio» preserva ese énfasis espacial y judicial a la vez.
  doctrine_reference: Primacía de la fuente original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión del contexto inglés en dos puntos: usa una forma pasiva para la reunión final («serán reunidos») y una expresión más natural para la dureza del habla («cosas ásperas»). También conserva la repetición de «aquí» como marca espacial del juicio.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para el nombre divino.
  - Se mantiene «santos ángeles» como fórmula apocalíptica natural en español.
  - Se evita convertir el pasaje en una categoría doctrinal más estrecha que la del original; se conserva la ambigüedad entre habla impropia, áspera e irreverente.
  - La puntuación y las comillas siguen el uso estándar del español.
