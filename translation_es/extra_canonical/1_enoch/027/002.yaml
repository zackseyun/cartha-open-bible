  glossary_alignment: 'Buena alineación global con el glosario del proyecto: እግዚአብሔር se vierte como «Yahvé» en el texto principal, no se introduce «SEÑOR», y se conserva «gloria». No hay conflictos con otras políticas terminológicas. Solo debe ajustarse la nota [b] para que también use «Yahvé» o una formulación neutral coherente con el texto principal.'
