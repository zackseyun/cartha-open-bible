translation:
  language: es
  text: Y vi dos ríos de fuego, y la luz de ese fuego[a] resplandecía como jacinto[b], y caí sobre mi rostro ante el Señor de los espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión es algo comprimida en ge'ez y también podría entenderse más libremente como 'su resplandor ígneo'.
    reason: alternative_reading
  - marker: b
    text: El término ge'ez probablemente alude a una gema; 'jacinto' es una equivalencia tradicional, pero no puede fijarse con total certeza la identificación mineral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ክልኤተ
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - un par de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un numeral directo; ‘dos’ reproduce con naturalidad el valor exacto del original y conserva la imagen apocalíptica.
- source_word: አፍላገ
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - corrientes
  - canales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa cauces o corrientes de agua; ‘ríos’ mantiene mejor en español la fuerza visual de la expresión ‘ríos de fuego’.
- source_word: እሳት
  english_pob_choice: fire
  chosen_spanish: fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sustantivo básico. Se conserva en ambas apariciones para reproducir la repetición enfática del verso.
- source_word: ብርሃነ
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - el resplandor
  - la radiancia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase describe la visibilidad del fuego; ‘la luz’ es más directa y natural en español, sin perder la referencia a la luminosidad del fenómeno.
- source_word: ዝኩ
  english_pob_choice: that
  chosen_spanish: ese
  alternatives_spanish:
  - aquel
  - su
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo enlaza la luz con el fuego ya mencionado. ‘Ese’ conserva esa relación deíctica de manera idiomática en español.
- source_word: ከመ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - así como
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Partícula comparativa estándar; ‘como’ es la equivalencia más natural y fiel.
- source_word: ያክንት
  english_pob_choice: hyacinth
  chosen_spanish: jacinto
  alternatives_spanish:
  - jacinto
  - piedra preciosa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, ‘jacinto’ conserva la referencia tradicional a la gema y evita una identificación mineral demasiado específica que el original no asegura.
- source_word: ያበርህ
  english_pob_choice: shone
  chosen_spanish: resplandecía
  alternatives_spanish:
  - brillaba
  - fulguraba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa el acto de brillar/iluminar. ‘Resplandecía’ comunica bien la intensidad visual y encaja con el registro elevado del pasaje.
- source_word: ወወደቁ፡ በገጽየ
  english_pob_choice: and I fell on my face
  chosen_spanish: y caí sobre mi rostro
  alternatives_spanish:
  - y me postré
  - y caí postrado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión idiomática señala una postura corporal de reverencia o sobrecogimiento. ‘Caí sobre mi rostro’ preserva la imagen sin suavizarla en exceso.
- source_word: ቅድመ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición marca ubicación relacional; ‘delante de’ funciona bien en español y evita una formulación demasiado formal o abstracta.
- source_word: እግዚአ፡ መንፈሳት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un título divino recurrente en 1 Enoc. Se conserva como título fijo, con mayúsculas reverenciales en ‘Espíritus’ para reflejar su carácter honorífico y no meramente descriptivo.
theological_decisions:
- issue: Título divino እግዚአ መንፈሳት
  english_pob_reading: the Lord of Spirits
  chosen_spanish_reading: el Señor de los Espíritus
  alternative_spanish_readings:
  - el Señor de los espíritus
  rationale: Se mantiene el título establecido, no se reduce a una descripción genérica. En español, la mayúscula en ‘Espíritus’ ayuda a conservar el tono titular y devocional del original.
  doctrine_reference: Translation philosophy §Consistency of key terms, or documented exception
- issue: Comparación gemológica del fuego
  english_pob_reading: shone like hyacinth
  chosen_spanish_reading: resplandecía como jacinto
  alternative_spanish_readings:
  - resplandecía como jacinto
  - brillaba como una piedra preciosa
  rationale: El texto compara la luz con una gema de identificación incierta. Se conserva el término tradicional ‘jacinto’ para no resolver artificialmente esa tensión lexical.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto ge'ez recuperado y el criterio inglés auditado. Se conservaron la imagen doble de los ‘ríos de fuego’, la comparación gemológica incierta y el título divino fijo. No se introdujeron expansiones interpretativas no sustentadas por la fuente.
  spanish_consistency_notes:
  - Se mantiene ‘fuego’ en ambas apariciones para preservar la repetición del original.
  - Se traduce el título divino como ‘el Señor de los Espíritus’ de forma consistente con su función titulada.
  - Se eligió ‘jacinto’ para la gema, dejando la incertidumbre lexical en nota.
  - La sintaxis española conserva la secuencia narrativa y la postura corporal de reverencia sin suavizarla.
