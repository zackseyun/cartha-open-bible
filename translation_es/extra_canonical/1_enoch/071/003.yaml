  - severity: medium
    issue: La nota [a] está anclada al nombre Mika'el, pero en el inglés [a] corresponde a 'hidden things/secrets'.
    rationale: La disciplina de notas exige que los marcadores aparezcan donde pertenece la alternativa significativa. La nota sobre 'secretos' debe anclarse a 'cosas ocultas', no al nombre propio.
