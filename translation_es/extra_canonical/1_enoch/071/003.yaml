translation:
  language: es
  text: Y el ángel Mika'el, uno de los principales ángeles[b], tomó mi mano derecha, me levantó y me llevó a todas las cosas ocultas[a]; y me mostró todas las cosas ocultas de misericordia, y me mostró todas las cosas ocultas de rectitud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “a todos los secretos”. El ge'ez usa repetidamente un término para cosas escondidas u ocultas; esa repetición se conserva en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: “Principales ángeles” refleja más literalmente la idea de “cabezas/jefes de los ángeles”; “arcángeles” es una posible traducción, pero más técnica.
    reason: lexical_alternative
  - marker: c
    text: “Rectitud” también puede traducirse “justicia” aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: መልአከ ሚካኤል
  english_pob_choice: the angel Mika'el
  chosen_spanish: el ángel Mika'el
  alternatives_spanish:
  - el ángel Miguel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español se conserva el nombre transliterado Mika'el para seguir la política del proyecto y reflejar el nombre tal como aparece en el testimonio ge'ez; “ángel” mantiene el valor celestial de መልአከ.
- source_word: ፩እምአርእስተ መላእክት
  english_pob_choice: one of the chief angels
  chosen_spanish: uno de los principales ángeles
  alternatives_spanish:
  - uno de los arcángeles
  - uno de los jefes de los ángeles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Principales ángeles” comunica la idea de rango o jefatura sin imponer el término técnico “arcángeles”, que sería más fuerte de lo que el ge'ez afirma con certeza.
- source_word: አኃዘኒ እዴየ ዘየማን
  english_pob_choice: took hold of my right hand
  chosen_spanish: tomó mi mano derecha
  alternatives_spanish:
  - tomó de mi mano derecha
  - me asió la mano derecha
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez expresa una acción física concreta de sujeción y guía. En español, “tomó mi mano derecha” es natural y conserva la imagen sin sobrecargarla.
- source_word: አንሥአኒ
  english_pob_choice: raised me up
  chosen_spanish: me levantó
  alternatives_spanish:
  - me alzó
  - me hizo levantar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Me levantó” reproduce el gesto de elevación de manera directa y fluida, adecuado al orden narrativo del verso.
- source_word: አውፅአኒ
  english_pob_choice: brought me out
  chosen_spanish: me sacó
  alternatives_spanish:
  - me llevó afuera
  - me condujo fuera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Me sacó” conserva el movimiento de salida causado por el ángel y es la forma más natural en español para el verbo causativo de salida.
- source_word: ኀበ ኵሉ ኅቡአት
  english_pob_choice: to all the hidden things
  chosen_spanish: hacia todas las cosas ocultas
  alternatives_spanish:
  - a todos los secretos
  - hacia todos los secretos
  - hacia todas las cosas escondidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la repetición de ኅቡአት como “cosas ocultas”, preservando la lectura apocalíptica y la insistencia del original. “Hacia” refleja el desplazamiento narrativo tras “me sacó”.
- source_word: ኅቡአተ ምሕረት
  english_pob_choice: the hidden things of mercy
  chosen_spanish: las cosas ocultas de misericordia
  alternatives_spanish:
  - los secretos de misericordia
  - las cosas ocultas de compasión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Misericordia” es la correspondencia directa de ምሕረት. Se conserva la misma estructura “cosas ocultas de…” para reflejar el paralelismo del verso.
- source_word: ኅቡአተ ጽድቅ
  english_pob_choice: the hidden things of righteousness
  chosen_spanish: las cosas ocultas de justicia
  alternatives_spanish:
  - las cosas ocultas de rectitud
  - las cosas ocultas de justicia y rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí se opta por “justicia” como equivalente posible de ጽድቅ en un registro moral-apocalíptico, manteniendo la alternativa semántica abierta; la repetición estructural con “cosas ocultas” se preserva.
theological_decisions:
- issue: Rango angelical de Mika'el
  english_pob_reading: one of the chief angels
  chosen_spanish_reading: uno de los principales ángeles
  alternative_spanish_readings:
  - uno de los arcángeles
  - uno de los jefes de los ángeles
  rationale: Se evita fijar el título técnico “arcángel” porque el ge'ez literalmente expresa jefatura/principalidad entre ángeles, y el texto no obliga a un tecnicismo posterior. La elección conserva la tensión entre descripción funcional y título tradicional.
  doctrine_reference: 'Principio de traducción del proyecto: preservar la ambigüedad cuando el original no determina con certeza un título técnico posterior.'
- issue: 'ጽድቅ: justicia o righteousness'
  english_pob_reading: righteousness (with justice as alternative)
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: Aunque “justicia” y “rectitud” son ambos posibles, aquí se adopta “justicia” porque funciona bien en español y sigue el margen semántico reconocido por el audit trail. Se mantiene la posibilidad alternativa en la documentación para no borrar la tensión lexical.
  doctrine_reference: 'Tabla de términos del proyecto para δικαιοσύνη/ጽድቅ: “justicia” o “rectitud” según contexto; conservar alternativas cuando el campo semántico no queda cerrado.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y no requiere revisión adicional: conserva la repetición de “cosas ocultas”, mantiene la transliteración de Mika''el y evita imponer “arcángeles” donde el ge''ez solo indica rango principal entre ángeles.'
  spanish_consistency_notes:
  - Se mantiene “cosas ocultas” en ambas repeticiones para reflejar la repetición deliberada del ge'ez ኅቡአት.
  - Se usa “misericordia” para ምሕረት, en línea con el valor directo del término.
  - Se usa “justicia” para ጽድቅ en el texto principal, con “rectitud” preservado como alternativa documental.
  - La puntuación coordina las acciones en secuencia narrativa sin añadir contenido interpretativo.
