  language: en
  yaml_path: translation/extra_canonical/1_enoch/071/003.yaml
  text: And the angel Mika'el[a], one of the chief angels, took hold of my right hand and raised me up, and brought me out to all the hidden things; and he showed me all the hidden things of mercy[c][b], and he showed me all the hidden things of righteousness.
  footnotes:
