    text: Or 'to all the secrets.' The Ge'ez repeatedly uses a term for things hidden or concealed; the repetition is preserved in the main text.
    reason: lexical_alternative
  - marker: b
    text: '''Chief angels'' more literally reflects ''heads/chiefs of the angels''; ''archangels'' is a possible but more technical rendering.'
    reason: lexical_alternative
  - marker: c
    text: '''Righteousness'' could also be rendered ''justice'' here.'
    reason: lexical_alternative
