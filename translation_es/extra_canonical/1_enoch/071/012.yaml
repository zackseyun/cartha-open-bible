translation:
  language: es
  text: Y aquellas bendiciones que salieron de mi boca llegaron a ser aceptables[a] ante esa Cabeza de Días[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegaron a ser agradables». El término ge’ez traducido como «aceptables» también puede llevar el sentido de ser agradables o recibidas favorablemente.'
    reason: lexical_alternative
  - marker: b
    text: «Cabeza de Días» es el título ge’ez aquí. Se mantiene distinto de la forma más conocida «Anciano de Días» para no armonizar silenciosamente este pasaje con Daniel.
    reason: cross_reference
  - marker: c
    text: 'O: «la bendición que salió». Esto refleja una traducción previa en singular, no la mejor lectura gramatical del ge’ez en este contexto.'
    reason: previous_rendering
lexical_decisions:
- source_word: በረከት
  english_pob_choice: blessing
  chosen_spanish: bendiciones
  alternatives_spanish:
  - bendición
  - bendición pronunciada
  - bendiciones pronunciadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El griego/audit trail inglés entiende el sustantivo como ‘blessing’ y el contexto exige concordar con el plural recuperado por la revisión gramatical ge'ez. ‘Bendiciones’ conserva el valor de bendición/benedición sin perder la pluralidad del pasaje.
- source_word: ወፅኣ እምነ አፉየ
  english_pob_choice: went out from my mouth
  chosen_spanish: salieron de mi boca
  alternatives_spanish:
  - salieron de mi boca
  - salieron de mi boca y fueron pronunciadas
  - procedieron de mi boca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen concreta de lo que ‘sale de la boca’ se mantiene en español con una forma natural y fiel. ‘Salieron de mi boca’ preserva la dicción visionaria sin reducirla a ‘dije’.
- source_word: ሥሙረተ
  english_pob_choice: became acceptable
  chosen_spanish: llegaron a ser aceptables
  alternatives_spanish:
  - fueron aceptables
  - llegaron a ser agradables
  - fueron recibidas favorablemente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Llegaron a ser aceptables’ refleja el cambio de estado implícito en el verbo y evita fijar solo el matiz subjetivo de ‘agradables’. Mantiene abierta la alternativa semántica señalada en el audit trail.
- source_word: ቅድመ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  - delante de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Delante de’ expresa la relación espacial-relacional de forma clara y readable en español, manteniendo el matiz cortesano/apocalíptico de estar ante una figura celestial.
- source_word: ዝኩ ርእሰ መዋዕል
  english_pob_choice: that Head of Days
  chosen_spanish: ese Cabeza de Días
  alternatives_spanish:
  - esa Cabeza de Días
  - aquel Cabeza de Días
  - Cabeza de Días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título eocnochico distintivo sin armonizarlo con ‘Ancient of Days’. En español, ‘Cabeza de Días’ es una trasposición literal del título; el demostrativo ‘ese’ refleja ዝኩ. No se reemplaza por un equivalente tradicional porque el POB inglés subraya la distinción terminológica.
theological_decisions:
- issue: Mantener el título eocnochico ርእሰ መዋዕል sin armonizarlo con Daniel
  english_pob_reading: Head of Days
  chosen_spanish_reading: Cabeza de Días
  alternative_spanish_readings:
  - Anciano de Días
  - Ancient of Days
  - Cabeza de los Días
  rationale: El audit trail inglés insiste en preservar el título local del Libro de Enoc y no nivelarlo con Daniel. En español, ‘Cabeza de Días’ conserva esa distinción y evita imponer una tradición interpretativa externa.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; do not over-harmonize with later Christian usage.'
- issue: Valor semántico de ሥሙረተ como aceptación o agrado
  english_pob_reading: became acceptable
  chosen_spanish_reading: llegaron a ser aceptables
  alternative_spanish_readings:
  - fueron agradables
  - fueron recibidas favorablemente
  - fueron aprobadas
  rationale: La formulación deja intacta la tensión entre aceptación objetiva y agrado relacional señalada en las notas inglesas. ‘Llegaron a ser aceptables’ es suficientemente neutral para abarcar ambos matices sin elegir prematuramente uno solo.
  doctrine_reference: Preserve lexical/theological tension where source and audit trail leave it open.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió la gramática ge''ez al plural: el demostrativo, el relativo y los verbos exigen ‘aquellas bendiciones’ en plural, no singular. El español se ajusta a esa corrección y mantiene el valor de aceptación de ሥሙረተ sin sobreespecificar el matiz.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el tetragrámaton; aquí no ocurre.
  - Se preserva la terminología distintiva ‘Cabeza de Días’ en vez de armonizarla con fórmulas bíblicas más conocidas.
  - ‘Aceptables’ deja abierta la alternativa de ‘agradables’ indicada por el audit trail.
  - La pluralidad del sujeto se refleja de forma explícita en ‘aquellas bendiciones’.
