translation:
  language: es
  text: Y con ellos estaba la Cabeza de los Días[a], y su cabeza era como lana blanca y pura[c][b], y su vestidura no puede describirse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el Anciano de Días’. La forma tradicional refleja la resonancia daniélica del título, pero el ge'ez aquí dice más literalmente ‘Cabeza de los Días’.
    reason: lexical_alternative
  - marker: b
    text: La frase final también puede entenderse como ‘no puede explicarse’ o ‘no puede interpretarse’. El sentido es que la vestidura rebasa la descripción ordinaria.
    reason: lexical_alternative
  - marker: c
    text: O ‘y entre ellos’.
    reason: previous_rendering
lexical_decisions:
- source_word: ርእሰ መዋዕል
  english_pob_choice: the Head of Days
  chosen_spanish: el Cabeza de los Días
  alternatives_spanish:
  - el Anciano de Días
  - la Cabeza de los Días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue de cerca la expresión ge'ez, preservando el título tal como aparece en el texto fuente. Aunque “el Anciano de Días” es una equivalencia tradicional influida por Daniel, aquí se mantiene la literalidad del sintagma original para no armonizarlo automáticamente con la tradición posterior.
- source_word: ፀምር
  english_pob_choice: wool
  chosen_spanish: lana
  alternatives_spanish:
  - cabello
  - vellón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación introducida por el equivalente de ‘como’ apunta a un objeto de comparación concreto. ‘Lana’ conserva la imagen visual de blancura y pureza sin convertir indebidamente la comparación en una referencia a cabello.
- source_word: ጻዕዳ
  english_pob_choice: white
  chosen_spanish: blanca
  alternatives_spanish:
  - brillante
  - resplandeciente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Blanca’ expresa con naturalidad el valor cromático principal del adjetivo y encaja con la imaginería de visión.
- source_word: ንጹሕ
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - limpia
  - sin mancha
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Pura’ conserva tanto la cualidad visual como la resonancia de integridad del término, sin decidir de antemano entre pureza ritual o moral.
- source_word: ልብሱ
  english_pob_choice: his garment
  chosen_spanish: su vestidura
  alternatives_spanish:
  - su ropa
  - su manto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Vestidura’ suena digno y amplio, y evita precisar ‘manto’ donde el ge'ez usa un término más general para la ropa/vestimenta.
- source_word: ዘኢይትረጐም
  english_pob_choice: cannot be described
  chosen_spanish: no puede describirse
  alternatives_spanish:
  - no puede explicarse
  - no puede traducirse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto visionario, la idea central es la inefabilidad. ‘No puede describirse’ refleja mejor la imposibilidad de expresar adecuadamente la vestidura que una formulación más técnica como ‘no puede traducirse’.
theological_decisions:
- issue: Cómo renderizar el título ርእሰ መዋዕል sin imponer la forma tradicional ‘Anciano de Días’
  english_pob_reading: the Head of Days; note that the traditional rendering reflects Danielic resonance but the Ge'ez reads more literally
  chosen_spanish_reading: el Cabeza de los Días
  alternative_spanish_readings:
  - el Anciano de Días
  rationale: Se preserva la tensión entre la forma literal del ge'ez y la resonancia daniélica, evitando resolverla mediante la tradición interpretativa. La nota permite reconocer la equivalencia tradicional sin sustituir el texto recibido.
  doctrine_reference: Translation philosophy §Original-language primacy over translation tradition; preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión lexical que corrigió ‘among them’ por ‘with them’, porque el ge'ez ምስለ significa ‘con/with’ más propiamente que ‘entre’. También se afinó la última cláusula de ‘is beyond description’ a ‘cannot be described’ para mantener la narración en pasado y la inefabilidad del original. La versión española refleja esa decisión con ‘Y con ellos estaba…’ y ‘no puede describirse’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa ‘vestidura’ en vez de ‘manto’ por la amplitud semántica del ge'ez y por el registro visionario elevado.
  - La colocación ‘blanca y pura’ sigue el orden del original y de la auditoría inglesa, manteniendo la doble cualidad visual y simbólica.
