translation:
  language: es
  text: Y me mostró todas las cosas ocultas de los confines del cielo[a], y todos los almacenes de las estrellas y las luces[b], de donde todas ellas salen[c] delante del rostro de los seres santos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los extremos del cielo». El ge''ez expresa una imagen espacial cósmica de límite o confín.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las estrellas y los luminares». El ge''ez distingue las estrellas de una clase más amplia de luces celestes.'
    reason: lexical_alternative
  - marker: c
    text: «Todas ellas» refleja el énfasis explícito del ge'ez en que no solo algunas, sino todos los cuerpos celestes salen de esos almacenes.
    reason: source_note
  - marker: d
    text: 'Literalmente: «delante del rostro de los seres santos»; es decir, «en presencia de los seres santos». Se conserva la formulación semítica. También puede entenderse más brevemente como «los santos», pero aquí se mantiene una referencia más amplia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አርአየኒ
  english_pob_choice: he showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me reveló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma causativa narrativa se rinde de modo natural en español con «me mostró», conservando el marco de visión profética sin añadir interpretaciones.
- source_word: ኵሎ ኅቡኣተ
  english_pob_choice: all the hidden things
  chosen_spanish: todas las cosas ocultas
  alternatives_spanish:
  - todos los secretos
  - todas las cosas escondidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cosas ocultas» mantiene el campo semántico de lo revelado en visión apocalíptica. «Secretos» sería más interpretativo; «escondidas» suena más coloquial.
- source_word: አጽናፈ ሰማይ
  english_pob_choice: the ends of heaven
  chosen_spanish: los confines del cielo
  alternatives_spanish:
  - los extremos del cielo
  - los bordes del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Confines» preserva la imagen espacial cósmica en español con dignidad literaria y sin aplanar el giro semítico.
- source_word: መዛግብተ
  english_pob_choice: storehouses
  chosen_spanish: almacenes
  alternatives_spanish:
  - depósitos
  - tesoros
  - cámaras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cósmico, «almacenes» comunica bien la idea de lugares donde se guardan y de donde salen realidades celestes. «Tesoros» sonaría más libre; «cámaras» menos explícito.
- source_word: ከዋክብት ወብርሃናት
  english_pob_choice: the stars and the lights
  chosen_spanish: las estrellas y las luces
  alternatives_spanish:
  - las estrellas y los luminares
  - las estrellas y los resplandores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la distinción básica entre «estrellas» y un grupo más amplio de «luces», como en el audit trail inglés. «Luminares» es viable, pero «luces» es más directo y fiel al paralelo Ge'ez.
- source_word: ኵሎሙ
  english_pob_choice: they all
  chosen_spanish: todas ellas
  alternatives_spanish:
  - todas
  - todas ellas mismas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La adición explícita de «todas» reproduce el énfasis del Ge'ez recuperado en la revisión. «Ellas» ayuda a que el referente femenino plural de «estrellas y luces» quede claro en español.
- source_word: እምኀበ ወፅኡ
  english_pob_choice: from where they come forth
  chosen_spanish: de donde ... salen
  alternatives_spanish:
  - de donde emergen
  - de donde salen a la luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Salen» conserva el valor de procedencia y movimiento de salida sin forzar una paráfrasis. Se mantiene el tono elevado mediante la estructura «de donde».
- source_word: ለገጸ ቅዱሳን
  english_pob_choice: before the face of the holy ones
  chosen_spanish: delante del rostro de los santos
  alternatives_spanish:
  - en presencia de los santos
  - ante el rostro de los santos
  - delante de la presencia de los santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Delante del rostro» preserva la literalidad semítica del giro, mientras «santos» traduce el sustantivo con un término español claro. Se mantiene la tensión entre literalidad y comprensión, como en el inglés auditado.
theological_decisions:
- issue: Identidad de «los santos» en un contexto celestial
  english_pob_reading: the holy ones
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los seres santos
  - los santos celestiales
  - los ángeles
  rationale: El contexto de visión cósmica y almacenes celestes favorece una referencia celestial, pero el texto no precisa más. «Los santos» conserva la ambigüedad respetada por el POB inglés; no se resuelve dogmáticamente si son ángeles o justos.
  doctrine_reference: Preservar la tensión interpretativa local sin ampliar indebidamente el referente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que restituye el énfasis de ኵሎሙ (‘they all’ / ‘all of them’). Por eso la traducción incluye «todas ellas» y una nota explicativa. También se respetó la distinción entre «stars» y un conjunto más amplio de «lights» con una alternativa en nota.
  spanish_consistency_notes:
  - Se mantuvo «Y» al inicio para reflejar la coordinación narrativa de la visión.
  - Se optó por «Yahvé» no aplicable aquí; no aparece el Nombre divino en este versículo.
  - «Santos» se usó como equivalente de «holy ones» sin cerrar la referencia a ángeles o justos.
  - Se prefirió un registro bíblico moderno y legible, evitando un calco excesivamente rígido, pero conservando el sabor semítico del original.
