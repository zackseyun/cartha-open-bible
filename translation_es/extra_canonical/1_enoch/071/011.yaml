translation:
  language: es
  text: Y caí sobre mi rostro, y toda mi carne se derritió, y mi espíritu fue transformado[b]; y clamé a gran voz[a] ... en el espíritu de poder[c], y lo bendije, lo alabé y lo exalté.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula después de «clamé a gran voz» es textualmente difícil en este testimonio; los puntos suspensivos reflejan una laguna aparente o corrupción del texto derivado del OCR.
    reason: textual_variant
  - marker: b
    text: 'O: «mi espíritu cambió». El verbo ge’ez es difícil y el matiz exacto es incierto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «por un espíritu de poder» / «a través del espíritu de poder». La frase puede describir tanto el estado interior de Enoc como la agencia que lo capacitó para hablar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወወደቁ
  english_pob_choice: and I fell
  chosen_spanish: y caí
  alternatives_spanish:
  - y me desplomé
  - y me postré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Caí’ conserva el colapso repentino de la visión sin precisar indebidamente si fue caída involuntaria o postración deliberada.
- source_word: በገጽየ
  english_pob_choice: on my face
  chosen_spanish: sobre mi rostro
  alternatives_spanish:
  - ante mi rostro
  - boca abajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión mantiene el cuadro corporal concreto de caer postrado, con un registro natural en español.
- source_word: ኵሉ ሥጋየ
  english_pob_choice: all my flesh
  chosen_spanish: toda mi carne
  alternatives_spanish:
  - todo mi cuerpo
  - todo mi ser corporal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Carne’ preserva la fuerza antropológica del original y la textura apocalíptica, evitando suavizarlo a ‘cuerpo’.
- source_word: ተመስወ
  english_pob_choice: melted away
  chosen_spanish: se derritió
  alternatives_spanish:
  - se deshizo
  - se disolvió
  - se consumió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Se derritió’ reproduce la imagen vívida de disolución corporal que el contexto visionario exige.
- source_word: መንፈስየ
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi espíritu interior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario, ‘espíritu’ comunica mejor la dimensión interior/espiritual que un simple ‘aliento’.
- source_word: ተወለጠ
  english_pob_choice: was transformed
  chosen_spanish: fue transformado
  alternatives_spanish:
  - fue cambiado
  - fue alterado
  - se transformó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal es difícil; ‘fue transformado’ conserva el cambio interior sin afirmar más precisión de la que el ge’ez permite.
- source_word: ጸራኅኩ በቃል ዓቢይ
  english_pob_choice: I cried out with a great/loud voice
  chosen_spanish: clamé con gran voz
  alternatives_spanish:
  - grité con fuerte voz
  - exclamé con gran voz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Gran voz’ retiene el giro bíblico-apocalíptico y refleja el valor idiomático del original sin volverlo plano.
- source_word: በመንፈሰ ኃይል
  english_pob_choice: in the spirit of power
  chosen_spanish: en el espíritu de poder
  alternatives_spanish:
  - por el espíritu de poder
  - por un espíritu de poder
  - en un espíritu de poder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es ambigua; ‘en el espíritu de poder’ conserva esa ambigüedad entre estado interior y agencia que el audit trail documenta.
- source_word: ባረኩ
  english_pob_choice: I blessed
  chosen_spanish: lo bendije
  alternatives_spanish:
  - bendije
  - dije bendición sobre él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El objeto se sobreentiende por el contexto; en español conviene explicitarlo con ‘lo’ para una sintaxis natural y coherente con la alabanza dirigida a Dios.
- source_word: ሰብሕኩ
  english_pob_choice: praised
  chosen_spanish: lo alabé
  alternatives_spanish:
  - lo glorifiqué
  - le di alabanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Alabé’ es la equivalencia más natural y mantiene la secuencia de verbos de adoración.
- source_word: አልዓልኩ
  english_pob_choice: exalted him
  chosen_spanish: lo exalté
  alternatives_spanish:
  - lo ensalcé
  - lo engrandecí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Exalté’ conserva el paralelismo con ‘bendije’ y ‘alabé’ y el registro elevado del original.
theological_decisions:
- issue: Fuerza antropológica de ‘carne’ en la caída visionaria
  english_pob_reading: Retain 'all my flesh melted away'
  chosen_spanish_reading: toda mi carne se derritió
  alternative_spanish_readings:
  - todo mi cuerpo se derritió
  - mi cuerpo entero se deshizo
  rationale: El ge’ez dice literalmente ‘carne’, y la traducción mantiene esa textura antropológica para no diluir el impacto teológico-literario de la visión.
  doctrine_reference: Translation philosophy §1, §4; principio POB de preservar la textura del idioma fuente cuando el sentido literal es claro.
- issue: Sentido de la cláusula sobre el espíritu
  english_pob_reading: '''my spirit was transformed'''
  chosen_spanish_reading: mi espíritu fue transformado
  alternative_spanish_readings:
  - mi espíritu fue cambiado
  - mi espíritu se transformó
  rationale: La frase probablemente señala una alteración interior bajo la experiencia visionaria. Se conserva la ambigüedad sin resolverla hacia muerte, simple emoción o mera metáfora.
  doctrine_reference: Translation philosophy §3; directriz de transparencia ante lecturas difíciles y de no sobreprecisar el original.
- issue: Ambigüedad de la frase ‘en el espíritu de poder’
  english_pob_reading: '''in the spirit of power'''
  chosen_spanish_reading: en el espíritu de poder
  alternative_spanish_readings:
  - por el espíritu de poder
  - por un espíritu de poder
  - con espíritu de poder
  rationale: 'Se conserva la ambigüedad documentada por el audit trail: puede describir el estado interior de Enoc o la agencia mediante la cual habló.'
  doctrine_reference: Translation philosophy §3; nota lexical de mantener la oscilación entre modo y agencia.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que ajustó la frase idiomática a un equivalente natural de volumen vocal y que, en inglés, suplió el objeto de ‘exalted’ para fluidez; en español se mantuvo la explícita referencia pronominal ‘lo’ por la sintaxis natural y por la continuidad con el destinatario implícito del elogio.
  spanish_consistency_notes:
  - Se mantiene ‘carne’ y ‘espíritu’ con sus valores bíblico-literarios, sin sustituirlos por paráfrasis más neutras.
  - ‘Yahvé’ no aparece porque este versículo no contiene el Nombre divino; se preserva la referencia implícita con ‘lo’ en la doxología final.
  - La secuencia ‘bendije, alabé y exalté’ conserva el paralelismo del original y evita introducir sinónimos no atestiguados.
  - Los corchetes de notas se colocan solo donde hay alternativa textual o ambigüedad real documentada.
