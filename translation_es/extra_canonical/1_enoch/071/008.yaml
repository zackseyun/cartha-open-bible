translation:
  language: es
  text: Y vi ángeles sin número[a], miles de miles y diez mil veces diez mil, rodeando aquella casa; y Mikael y Rufael y Gabrʾel y Fanʾuel[b], y los ángeles santos que entran y salen de aquella casa sobre los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La fórmula de número inmenso es un modo apocalíptico convencional de expresar una multitud incalculable; aquí se conserva la estructura del geʽez en vez de reemplazarla por una expresión bíblica más conocida.
    reason: cultural_note
  - marker: b
    text: 'Los nombres se transliteran desde las formas geʽez: Mikael, Rufael, Gabrʾel y Fanʾuel. Las grafías más familiares serían Miguel, Rafael, Gabriel y Fanuel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y contemplé
  - Y miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el verbo visionario normal del relato apocalíptico. «Y vi» conserva la inmediatez narrativa sin volverlo arcaizante.
- source_word: መላእክተ
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto celestial el referente es inequívocamente de seres celestiales, por lo que «ángeles» es la equivalencia precisa y natural.
- source_word: እለ ኢይትኌለቍ
  english_pob_choice: without number
  chosen_spanish: sin número
  alternatives_spanish:
  - innumerables
  - que no se podían contar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa imposibilidad de contar. «Sin número» es breve, solemne y mantiene la fuerza hiperbólica sin sustituirla por una fórmula bíblica tradicional distinta.
- source_word: አእላፈ አእላፍ
  english_pob_choice: thousands of thousands
  chosen_spanish: miles de miles
  alternatives_spanish:
  - mil de miles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reproduce en español el patrón multiplicativo del original y su efecto acumulativo. «Miles de miles» es idiomático y conserva la escala apocalíptica.
- source_word: ወትእልፊተ ትእልፊት
  english_pob_choice: ten thousand times ten thousand
  chosen_spanish: diez mil veces diez mil
  alternatives_spanish:
  - miriadas de miriadas
  - diez mil de diez mil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigue de cerca la formulación del geʽez y evita introducir una fórmula tradicional ajena al texto. «Diez mil veces diez mil» es transparente y conserva la hipérbole.
- source_word: የአውድዎ ለውእቱ ቤት
  english_pob_choice: surrounding that house
  chosen_spanish: rodeando aquella casa
  alternatives_spanish:
  - alrededor de aquella casa
  - circundando aquella casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica estar alrededor, en torno. «Rodeando» mantiene la imagen visual de asedio/circunferencia celestial sin sobreinterpretar el lugar.
- source_word: ቤት
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - morada
  - palacio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto dice literalmente «casa». Aunque el contexto es celestial, conservar «casa» evita elevar interpretativamente el sustantivo a «palacio» o «morada».
- source_word: ሚካኤል ወሩፋኤል ወገብርኤል ወፋኑኤል
  english_pob_choice: Mikael and Rufael and Gabrʾel and Fanʾuel
  chosen_spanish: Mikael y Rufael y Gabrʾel y Fanʾuel
  alternatives_spanish:
  - Miguel y Rafael y Gabriel y Fanuel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se translitera desde las formas geʽez, siguiendo la preferencia del POB por reflejar la fuente primaria en vez de normalizar silenciosamente a las grafías más conocidas.
- source_word: መላእክተ ቅዱሳን
  english_pob_choice: the holy angels
  chosen_spanish: los santos ángeles
  alternatives_spanish:
  - los ángeles santos
  - los ángeles sagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Santos» reproduce bien el adjetivo atributivo y es plenamente natural en español bíblico contemporáneo. Mantiene la distinción de este grupo celestial.
- source_word: እለ መልዕልተ ሰማያት
  english_pob_choice: above the heavens
  chosen_spanish: arriba de los cielos
  alternatives_spanish:
  - sobre los cielos
  - por encima de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase marca altura/cosmología. «Arriba de los cielos» conserva la espacialidad del original de forma clara, aunque menos técnica que una paráfrasis cosmológica.
- source_word: ይበውኡ ወይወፅኡ
  english_pob_choice: go in and out
  chosen_spanish: entran y salen
  alternatives_spanish:
  - iban y venían
  - entraban y salían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja verbal describe movimiento repetido. El presente histórico «entran y salen» refleja la vivacidad visionaria y el orden del original.
theological_decisions:
- issue: Cómo tratar la fórmula apocalíptica de multitud innumerable
  english_pob_reading: without number, thousands of thousands and ten thousand times ten thousand
  chosen_spanish_reading: sin número, miles de miles y diez mil veces diez mil
  alternative_spanish_readings:
  - innumerables, miles de miles y miríadas de miríadas
  - sin número, miles de miles y diez mil de diez mil
  rationale: Se conserva la fuerza hiperbólica del texto sin sustituirla por una fórmula más familiar de otros pasajes bíblicos. La traducción permanece anclada en el geʽez y deja visible la enumeración acumulativa.
  doctrine_reference: Principio POB de primacía de la fuente original y de no importar fórmulas tradicionales ajenas al testimonio textual.
- issue: Si «casa» debe interpretarse como «templo», «palacio» o «morada»
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - morada
  - palacio
  - templo
  rationale: El geʽez usa un término simple que no especifica más. Conservar «casa» preserva la tensión interpretativa y evita resolver teológicamente la imagen más allá del texto.
  doctrine_reference: Principio POB de preservar la tensión semántica cuando el original no la resuelve.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó la colocación final para reflejar mejor el geʽez: los santos ángeles son los que están arriba de los cielos y entran y salen de aquella casa. El español sigue ese orden y evita invertir la relación espacial o temporal.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton ni un κύριος alusivo que exija nota especial.
  - Se conservaron las grafías transliteradas de los nombres propios para reflejar la forma de la fuente geʽez.
  - Se prefirió «casa» sobre una expansión interpretativa para no resolver el referente celestial del texto.
