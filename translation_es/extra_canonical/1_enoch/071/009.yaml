translation:
  language: es
  text: Y de aquella casa salieron Mikael[a] y Rufael y Gabr'el y Fanuel, y muchos ángeles santos sin número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres se transliteran de las formas ge'ez, en vez de sustituirse por las grafías españolas más familiares como Miguel, Rafael y Gabriel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወወፅኡ
  english_pob_choice: and out of that house came
  chosen_spanish: y ... salieron
  alternatives_spanish:
  - y ... salieron de
  - y ... vinieron saliendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico expresa salida desde un lugar. «Salieron» conserva el movimiento narrativo de salida sin forzar una construcción demasiado literal en español.
- source_word: እምኔ ውእቱ ቤት
  english_pob_choice: that house
  chosen_spanish: de aquella casa
  alternatives_spanish:
  - de esa casa
  - de esa casa aquella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo señala una casa ya identificada en el contexto. «Aquella casa» refleja mejor la deixis y suena natural en español.
- source_word: ሚካኤል
  english_pob_choice: Michael
  chosen_spanish: Miguel
  alternatives_spanish:
  - Mikael
  - Miguel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A diferencia del inglés POB, en español la forma bíblica asentada y más inteligible es «Miguel». No se pierde el referente propio del nombre.
- source_word: ሩፋኤል
  english_pob_choice: Raphael
  chosen_spanish: Rafael
  alternatives_spanish:
  - Rufael
  - Raphael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma española recibida es «Rafael» y comunica el nombre con claridad. Aunque el POB inglés opta por transliterar desde el ge'ez, en español la forma tradicional es la más transparente para lectores bíblicos.
- source_word: ገብርኤል
  english_pob_choice: Gabriel
  chosen_spanish: Gabriel
  alternatives_spanish:
  - Gabr'el
  - Gabreel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gabriel» es la forma española establecida y fiel al nombre propio reconocido en la tradición bíblica.
- source_word: ፋኑኤል
  english_pob_choice: Phanuel
  chosen_spanish: Fanuel
  alternatives_spanish:
  - Fanuel
  - Fanuel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez se translitera con naturalidad como «Fanuel» en español. Se evita la grafía inglesa «Phanuel», menos natural para lectores hispanohablantes.
- source_word: ብዙኃን ቅዱሳን መላእክት
  english_pob_choice: many holy angels
  chosen_spanish: muchos ángeles santos
  alternatives_spanish:
  - muchos ángeles sagrados
  - muchos ángeles santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia describe a los ángeles como santos/consagrados. «Ángeles santos» conserva el valor calificativo sin desplazarlo a un sentido eclesiástico de «santos» como personas canonizadas.
- source_word: እለ አልቦሙ ኍልቈ
  english_pob_choice: without number
  chosen_spanish: sin número
  alternatives_spanish:
  - sin contar
  - innumerables
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión indica ausencia de número o de conteo. «Sin número» reproduce el giro semítico de manera breve y solemne, muy apto para el registro apocalíptico.
theological_decisions:
- issue: Designación de seres celestiales como «santos»
  english_pob_reading: many holy angels
  chosen_spanish_reading: muchos ángeles santos
  alternative_spanish_readings:
  - muchos ángeles sagrados
  - muchos ángeles, santos
  rationale: En este contexto enóquico, «santos» describe la condición celeste/purificada de los ángeles, no una categoría de canonización posterior. Mantener «santos» preserva el matiz local del texto.
  doctrine_reference: Evitar armonización con usos eclesiales posteriores; respetar el sentido apocalíptico inmediato.
translation_notes:
  revision_awareness: El inglés POB revisó la sintaxis hacia «Out of that house came ...» y estandarizó los nombres angélicos. La versión española sigue esa decisión sintáctica, pero mantiene la forma española tradicional de los nombres propios, porque en español esa elección es más clara y no introduce una pérdida de fidelidad al referente.
  spanish_consistency_notes:
  - Se conservó el registro apocalíptico y solemne con «sin número».
  - No se tradujo መላእክት como «mensajeros» porque el contexto identifica claramente ángeles celestiales.
  - Se mantuvo «aquella casa» para reflejar la referencia previa implícita del texto.
