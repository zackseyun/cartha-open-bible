translation:
  language: es
  text: Y mi espíritu fue ocultado en el cielo de los cielos[a], y allí vi, en medio de aquella luz, algo construido de piedras de granizo[c][b], y en medio de aquellas piedras había lenguas de fuego viviente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La línea sobre lo que Enoc vio en la luz es difícil en el ge'ez. Se traduce con cautela como una cosa construida o edificación dentro del resplandor.
    reason: textual_variant
  - marker: b
    text: «Piedras de granizo» también puede entenderse como piedras de hielo o como granizo endurecido; la imagen se mantiene concreta y extraña.
    reason: lexical_alternative
  - marker: c
    text: 'O: «fue llevado arriba al».'
    reason: previous_rendering
lexical_decisions:
- source_word: መንፈስየ
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi ser espiritual
  - mi aliento/espíritu
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez nombra el espíritu personal de Enoc; «mi espíritu» conserva ese referente sin reducirlo a mente o alma.
- source_word: ውስተ ሰማየ ሰማያት
  english_pob_choice: into the heaven of heavens
  chosen_spanish: en el cielo de los cielos
  alternatives_spanish:
  - en el cielo más alto
  - en los cielos de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción doble expresa un superlativo celeste. En español, «cielo de los cielos» conserva el giro semítico y su elevación sin volverlo más interpretativo de lo necesario.
- source_word: ርኢኩ በህየ
  english_pob_choice: I saw there
  chosen_spanish: allí vi
  alternatives_spanish:
  - allí contemplé
  - allí miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula visionaria directa; «allí vi» es natural en español y mantiene el informe inmediato de visión.
- source_word: ማእከለ ዝኩ ብርሃን
  english_pob_choice: in the midst of that light
  chosen_spanish: en medio de aquella luz
  alternatives_spanish:
  - en el centro de aquella luz
  - dentro de aquel resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En medio de» reproduce bien la ubicación interna dentro del resplandor. «Aquella» conserva la fuerza demostrativa del original.
- source_word: ከመ ቦቱ ዘይትነደቅ
  english_pob_choice: something built
  chosen_spanish: algo construido
  alternatives_spanish:
  - una estructura construida
  - algo edificado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La sintaxis es difícil y el POB inglés opta por cautela. «Algo construido» mantiene esa reserva sin cerrar indebidamente la imagen apocalíptica.
- source_word: እምእብነ አስሐትያ
  english_pob_choice: stones of hail
  chosen_spanish: piedras de granizo
  alternatives_spanish:
  - piedras de hielo
  - guijarros de granizo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen concreta parece aludir a granizo; «piedras de granizo» conserva la dureza y rareza del cuadro sin normalizarlo.
- source_word: እበን ልሳናተ እሳት ሕያው
  english_pob_choice: tongues of living fire
  chosen_spanish: lenguas de fuego viviente
  alternatives_spanish:
  - lenguas de fuego vivo
  - llamas de fuego viviente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lenguas» preserva la forma literal de las llamas, y «fuego viviente» conserva el matiz animado del original y del POB inglés.
theological_decisions:
- issue: Naturaleza de la elevación/ocultamiento de Enoc
  english_pob_reading: And my spirit was covered in the heaven of heavens
  chosen_spanish_reading: Y mi espíritu fue cubierto en el cielo de los cielos
  alternative_spanish_readings:
  - Y mi espíritu fue ocultado en el cielo de los cielos
  - Y mi espíritu fue escondido en el cielo de los cielos
  rationale: El audit trail inglés pasó de «was taken up» a «was hidden/covered» para reflejar el valor del verbo ge'ez y la técnica enóquica de ser «oculto». En español se conserva la tensión entre visión y ocultamiento con «fue cubierto», sin resolver si la referencia es corporal o solo espiritual.
  doctrine_reference: Preservar la tensión textual y apocalíptica sin armonizarla con una doctrina sistemática de ascenso.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante del verbo clave: de «was taken up» a «was hidden», luego a «was covered», por una corrección filológica del ge''ez. La redacción española sigue la última decisión auditada y conserva el carácter visionario, la rareza de la imagen y la cautela ante la sintaxis difícil.'
  spanish_consistency_notes:
  - Se mantiene «espíritu» para መንፈስየ, no «alma», porque el texto nombra explícitamente el espíritu de Enoc.
  - Se usa «cielo de los cielos» para preservar el superlativo semítico; no se sustituye por «cielo más alto».
  - 'Se conserva el orden visionario y la concreción apocalíptica de la imagen: luz, piedras de granizo y lenguas de fuego.'
  - «Cubierto» refleja la última decisión auditada, pero la nota permite ver la alternativa textual de «ocultado».
