revisions:
- from: Y mi espíritu fue cubierto en el cielo de los cielos[a], y allí vi, en medio de aquella luz, algo construido de piedras de granizo[c][b], y en medio de aquellas piedras había lenguas de fuego viviente.
  to: Y mi espíritu fue ocultado en el cielo de los cielos[a], y allí vi, en medio de aquella luz, algo construido de piedras de granizo[c][b], y en medio de aquellas piedras había lenguas de fuego viviente.
  rationale: Se hace una reparación menor para que el español exprese de manera natural la decisión lexical documentada sobre el verbo ge'ez. «Fue ocultado en» preserva mejor el matiz enóquico de ocultamiento que «fue cubierto en», sin resolver en exceso la tensión teológica. Además, se corrige la nota c para que refleje la alternativa previa del audit trail inglés en vez de repetir una paráfrasis casi idéntica al texto principal.
