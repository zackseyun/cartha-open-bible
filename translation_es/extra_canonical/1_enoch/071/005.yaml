  yaml_path: translation/extra_canonical/1_enoch/071/005.yaml
  text: And my spirit was covered in the heaven of heavens[a], and I saw there, in the midst of that light, something built of stones of hail[c][b], and in the midst of those stones were tongues of living fire.
  footnotes:
