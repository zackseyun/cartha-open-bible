translation:
  language: es
  text: Y mi espíritu vio el recinto[a][d] que rodeaba aquella casa de fuego, y desde sus cuatro lados[c] había ríos llenos de fuego viviente[b], y rodeaban aquella casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La repetición del verbo de rodear/encerrar se conserva en la medida de lo posible para mantener el énfasis del verso en el espacio delimitado.
    reason: lexical_alternative
  - marker: b
    text: '''Fuego viviente'' es una traducción literal de una expresión poco común; puede sugerir fuego activo, animado o intensamente vital, más que simple llama ordinaria.'
    reason: lexical_alternative
  - marker: c
    text: '''Lados'' también puede abarcar extremos, bordes o cuadrantes; ''esquinas'' sería posible, pero es demasiado específico para el ge''ez.'
    reason: alternative_reading
  - marker: d
    text: 'O: ''el cerco que rodeaba aquella casa de fuego, y desde sus cuatro lados había ríos llenos de fuego viviente''.'
    reason: previous_rendering
lexical_decisions:
- source_word: መንፈስየ
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi alma
  lexicon: Dillmann Lexicon
  rationale: En contexto visionario, el término denota el espíritu del vidente como sujeto de percepción. 'Mi espíritu' conserva el registro apocalíptico y evita reducir la experiencia a mera vista física o a una psicologización indebida.
- source_word: አውዶ / ዘየአውዶ
  english_pob_choice: the enclosure that surrounded / the circuit that surrounded
  chosen_spanish: el recinto que rodeaba
  alternatives_spanish:
  - el recinto que envolvía
  - el cerco que rodeaba
  - la circunferencia que rodeaba
  lexicon: Dillmann Lexicon
  rationale: El hebraísmo/etiópico repetido enfatiza la acción de rodear o cercar. 'Recinto' transmite bien la idea de espacio delimitado sin introducir 'muro' que no está en el texto, y 'rodeaba' preserva la repetición del motivo de encierro.
- source_word: ቤተ እሳት
  english_pob_choice: house of fire
  chosen_spanish: casa de fuego
  alternatives_spanish:
  - casa ígnea
  - casa flamígera
  lexicon: Dillmann Lexicon
  rationale: La construcción genitiva se mantiene de forma transparente. 'Casa de fuego' conserva la imagen apocalíptica sin forzar un adjetivo menos natural en español.
- source_word: እምአርባዕቱ አጽናፊሁ
  english_pob_choice: from its four sides
  chosen_spanish: desde sus cuatro lados
  alternatives_spanish:
  - desde sus cuatro extremos
  - desde sus cuatro esquinas
  - desde sus cuatro partes
  lexicon: Dillmann Lexicon
  rationale: '''Lados'' es el equivalente más claro y amplio para አጽናፍ, que puede abarcar bordes, extremos o cuadrantes. ''Esquinas'' sería demasiado específico y ''extremos'' menos idiomático aquí.'
- source_word: አፍላገ
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - corrientes
  - canales de agua
  lexicon: Dillmann Lexicon
  rationale: El plural sugiere canales o cursos de gran tamaño. 'Ríos' reproduce la amplitud y solemnidad de la visión mejor que 'corrientes'.
- source_word: ምሉኣነ እሳተ ሕያው
  english_pob_choice: full of living fire
  chosen_spanish: llenos de fuego viviente
  alternatives_spanish:
  - llenos de fuego vivo
  - llenos de fuego viviente y activo
  - colmados de fuego viviente
  lexicon: Dillmann Lexicon
  rationale: La frase es inusual y no conviene normalizarla a 'ardiente' o 'ardiendo'. 'Fuego viviente' preserva el carácter literal y la posible fuerza personificada o dinámica del original. Se usa 'llenos de' para respetar la construcción del plural con contenido.
- source_word: የአውድዎ
  english_pob_choice: they surrounded
  chosen_spanish: rodeaban
  alternatives_spanish:
  - encircled
  - envolvían
  - cercaban
  lexicon: Dillmann Lexicon
  rationale: Se mantiene el mismo campo semántico del verbo anterior para conservar la insistencia del texto en la envoltura/cerco. 'Rodeaban' es natural en español y reproduce la repetición del motivo de encierro.
theological_decisions:
- issue: Percepción visionaria del sujeto
  english_pob_reading: And my spirit saw
  chosen_spanish_reading: Y mi espíritu vio
  alternative_spanish_readings:
  - Y vi en mi espíritu
  - Y mi alma vio
  rationale: El texto ge'ez identifica explícitamente al espíritu como sujeto que ve. Mantener 'mi espíritu' preserva el tono visionario y evita trivializar la escena como mera observación externa.
  doctrine_reference: Primacía del texto original; preservación del registro apocalíptico.
- issue: Fuego 'viviente' como imagen teológica y poética
  english_pob_reading: full of living fire
  chosen_spanish_reading: llenos de fuego viviente
  alternative_spanish_readings:
  - llenos de fuego vivo
  - llenos de fuego ardiente
  rationale: 'No se debe aplanar la rareza de la expresión. ''Viviente'' mantiene la tensión semántica: puede aludir a fuego activo, animado o intensamente vital, sin resolverla prematuramente.'
  doctrine_reference: Mantener tensiones léxicas del original; no domesticar imágenes apocalípticas.
- issue: 'Forma espacial: recinto sin introducir ''muro'''
  english_pob_reading: the enclosure / the circuit
  chosen_spanish_reading: el recinto
  alternative_spanish_readings:
  - el cerco
  - la circunferencia
  - el circuito
  rationale: La revisión textual advierte que no debe añadirse la idea específica de 'muro', ausente en el ge'ez. 'Recinto' conserva la noción de espacio delimitado y es suficientemente amplio para abarcar 'circuit/enclosure'.
  doctrine_reference: Fidelidad semántica al original; evitar ampliaciones no sustentadas.
translation_notes:
  revision_awareness: El texto sigue la última revisión que corrigió la sintaxis del segmento de los ríos y evitó introducir 'muro' en la imagen del recinto. También conserva la doble dinámica de encierro/rodear y la cláusula independiente con 'ríos llenos de fuego viviente'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se mantiene 'espíritu' para መንፈስ en contexto visionario.
  - No se introduce terminología eclesiástica ajena al texto; la imagen permanece apocalíptica y concreta.
  - '''Rodeaba/rodeaban'' conserva la repetición del motivo de circundación del original.'
