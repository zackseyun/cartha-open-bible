translation:
  language: es
  text: Y aquel Cabeza de los Días[a] vino con Miguel[b] y Rafael y Gabriel y Fanuel, y miles y diez miles de ángeles que no tienen número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El título se traduce de forma literal como 'Cabeza de los Días' para no armonizarlo con la fórmula más tradicional 'Anciano de Días'.
    reason: lexical_alternative
  - marker: b
    text: Se usan las formas españolas asentadas de los nombres angélicos, en lugar de transliteraciones más cercanas al ge'ez; el inglés POB revisado también normalizó estos nombres en este versículo.
    reason: cultural_note
lexical_decisions:
- source_word: ርእሰ መዋዕል
  english_pob_choice: Head of Days
  chosen_spanish: Cabeza de los Días
  alternatives_spanish:
  - Anciano de los Días
  - Anciano de Días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título literal y en forma nominal, siguiendo la decisión del POB de evitar la frase más tradicional 'Anciano de días' cuando eso podría armonizar en exceso con Daniel. 'Cabeza' mantiene la imagen y la fuerza titulativa del ge'ez.
- source_word: መጽአ
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se acercó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Vino'' reproduce bien el movimiento narrativo simple del verbo y suena natural en español para una escena visionaria.'
- source_word: ምስለ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - acompañado de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Con'' expresa de manera directa la compañía indicada por la preposición ge''ez sin añadir matices no necesarios.'
- source_word: ሚካኤል ወሩፋኤል ወገብርኤል ወፋኑኤል
  english_pob_choice: Michael and Raphael and Gabriel and Phanuel
  chosen_spanish: Miguel, Rafael, Gabriel y Fanuel
  alternatives_spanish:
  - Miguel, Rafael, Gabriel y Fanuel
  - Miguel, Rafael, Gabr'el y Fanuel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se usan las formas españolas asentadas y reconocibles para los nombres de ángeles, ya que el POB revisado también las normalizó en inglés. Esto favorece la legibilidad sin afectar el contenido fuente.
- source_word: አእላፍ ወትእልፊተ
  english_pob_choice: thousands and ten thousands
  chosen_spanish: miles y diez miles
  alternatives_spanish:
  - miles y miríadas
  - miles y decenas de miles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Diez miles'' refleja con mayor transparencia la segunda expresión numérica del ge''ez y preserva la repetición apocalíptica sin convertirla en un equivalente interpretativo como ''miríadas''.'
- source_word: መላእክት
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto celestial, 'ángeles' es el equivalente contextual más claro y fiel.
- source_word: እለ አልቦሙ ኍልቈ
  english_pob_choice: who have no number
  chosen_spanish: que no tienen número
  alternatives_spanish:
  - sin número
  - que son innumerables
  - que no pueden contarse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase conserva el giro de innumerabilidad del original. 'No tienen número' es una opción cercana y natural que mantiene el estilo apocalíptico.
theological_decisions:
- issue: Título divino ርእሰ መዋዕል
  english_pob_reading: Head of Days
  chosen_spanish_reading: Cabeza de los Días
  alternative_spanish_readings:
  - Anciano de los Días
  - Anciano de Días
  rationale: Se mantiene la literalidad y el carácter enigmático del título, evitando sustituirlo por la forma daniélica más conocida. Así se conserva la tensión teológica y literaria del texto enochico.
  doctrine_reference: 'Translation philosophy: primacía del original y preservación de la tensión terminológica.'
translation_notes:
  revision_awareness: El texto inglés del POB pasó por una revisión que estandarizó los nombres angélicos a las formas más naturales en inglés. Esta versión española sigue esa misma lógica de normalización, pero conserva el título 'Cabeza de los Días' por estar específicamente documentado como una elección lexical relevante frente a 'Anciano de días'.
  spanish_consistency_notes:
  - Se prefieren formas españolas establecidas de los nombres angélicos para consistencia con el uso eclesial amplio y con la revisión inglesa más reciente.
  - '''Cabeza de los Días'' mantiene la singularidad del título sin importar una frase tradicional ajena al testigo ge''ez.'
  - '''Diez miles'' preserva la estructura numérica del original mejor que ''miríadas'', que sería más interpretativo.'
