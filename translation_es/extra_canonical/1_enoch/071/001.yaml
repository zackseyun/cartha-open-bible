translation:
  language: es
  text: 'Y después de esto sucedió: mi espíritu fue llevado hacia arriba[a], y ascendió a los cielos; y vi a los hijos de los santos ángeles caminando sobre una llama de fuego, y sus vestiduras eran blancas, y sus rostros brillaban como nieve[b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión puede entenderse como transporte visionario; se conserva una formulación que expresa ascenso sin decidir entre 'levantado', 'arrebatado' o 'llevado'.
    reason: lexical_alternative
  - marker: b
    text: El elemento entre corchetes en el ge'ez es textualmente incierto. La traducción no lo convierte en una cláusula separada, sino que deja que la descripción clara del brillo cargue la frase.
    reason: textual_variant
  - marker: c
    text: '''Como nieve'' expresa en español la imagen de blancura y brillantez deslumbrantes, no una referencia meteorológica literal.'
    reason: cultural_note
lexical_decisions:
- source_word: እምድኅረዝ
  english_pob_choice: after this
  chosen_spanish: después de esto
  alternatives_spanish:
  - luego de esto
  - después de esas cosas
  lexicon: Dillmann
  rationale: La fórmula narrativa apocalíptica se vierte de manera natural como transición temporal en español. 'Después de esto' mantiene la secuencia visionaria sin sobrerrepresentar el giro.
- source_word: ትትከበት መንፈስየ
  english_pob_choice: my spirit was taken up
  chosen_spanish: mi espíritu fue tomado
  alternatives_spanish:
  - mi espíritu fue levantado
  - mi espíritu fue arrebatado
  lexicon: Dillmann
  rationale: La pasiva ge'ez sugiere transporte visionario. 'Fue tomado' conserva la idea de que el espíritu fue llevado/recibido hacia arriba sin introducir una interpretación más específica de la que permite el texto.
- source_word: ተዐርገ ውስተ ሰማያት
  english_pob_choice: it ascended into the heavens
  chosen_spanish: ascendió a los cielos
  alternatives_spanish:
  - ascendió a los cielos
  - subió a los cielos
  lexicon: Dillmann
  rationale: Se preserva el plural 'cielos', propio de la cosmología apocalíptica. 'Ascendió' mantiene el registro elevado del relato visionario.
- source_word: ለውሉዶሙ ለመላእክት ቅዱሳን
  english_pob_choice: the sons of the holy angels
  chosen_spanish: los hijos de los santos ángeles
  alternatives_spanish:
  - los hijos de los ángeles santos
  - la descendencia de los santos ángeles
  lexicon: Dillmann
  rationale: Se conserva la expresión familiar inusual del ge'ez, sin armonizarla con una simple referencia a 'ángeles'. 'Hijos' reproduce la tensión léxica documentada por la POB en inglés.
- source_word: ይከይዱ
  english_pob_choice: walking
  chosen_spanish: caminando
  alternatives_spanish:
  - andando
  - moviéndose
  lexicon: Dillmann
  rationale: El participio describe una acción continua visible en la escena. 'Caminando' es concreto y no suaviza la imagen corporal.
- source_word: ዲበ ላህበ እሳት
  english_pob_choice: upon a flame of fire
  chosen_spanish: sobre una llama de fuego
  alternatives_spanish:
  - sobre llamas de fuego
  - encima de una llama de fuego
  lexicon: Dillmann
  rationale: Se conserva la singularidad de la expresión y su carácter vívido. 'Llama de fuego' evita diluir la imagen en un mero 'en fuego'.
- source_word: አልባሶሙ ጻዓዳ
  english_pob_choice: their garments were white
  chosen_spanish: sus vestiduras eran blancas
  alternatives_spanish:
  - sus prendas eran blancas
  - sus ropas eran blancas
  lexicon: Dillmann
  rationale: '''Vestiduras'' es un término claro y digno en español bíblico sin depender de un tecnicismo eclesiástico. Mantiene la amplitud semántica de ''garments''.'
- source_word: '[ወዐጸፎሙ]'
  english_pob_choice: and their faces shone
  chosen_spanish: y sus rostros resplandecientes
  alternatives_spanish:
  - y sus rostros brillantes
  - y su apariencia resplandeciente
  lexicon: Dillmann
  rationale: El elemento entre corchetes es textualmente incierto en la línea ge'ez. En español se evita forzarlo como cláusula independiente y se integra la idea de resplandor que sí es clara en el contexto inmediato.
- source_word: ብሩሃን ገጾሙ ከመ በረድ
  english_pob_choice: their faces bright like snow
  chosen_spanish: sus rostros resplandecientes como nieve
  alternatives_spanish:
  - sus rostros brillantes como nieve
  - sus rostros radiantes como nieve
  lexicon: Dillmann
  rationale: '''Resplandecientes'' transmite la luminosidad de ብሩሃን, y ''como nieve'' preserva la imagen de blancura deslumbrante. ''Rostros'' traduce naturalmente ''faces'' sin introducir una lectura más interpretativa.'
theological_decisions:
- issue: Identidad de 'los hijos de los santos ángeles'
  english_pob_reading: Retain the literal familial expression rather than harmonizing it to 'the holy angels'.
  chosen_spanish_reading: Conservar 'los hijos de los santos ángeles' sin normalizarlo a 'los santos ángeles'.
  alternative_spanish_readings:
  - los santos ángeles
  - la descendencia de los santos ángeles
  rationale: El texto ge'ez presenta una expresión inusual que la POB en inglés retiene por fidelidad al original. La traducción española mantiene esa tensión en vez de resolverla interpretativamente.
  doctrine_reference: Primacía del original sobre la armonización traductora; preservar tensiones textuales documentadas.
- issue: Sentido de 'mi espíritu fue tomado'
  english_pob_reading: my spirit was taken up
  chosen_spanish_reading: mi espíritu fue tomado
  alternative_spanish_readings:
  - mi espíritu fue levantado
  - mi espíritu fue arrebatado
  rationale: La escena describe transporte visionario, no solo emoción interna. 'Fue tomado' permite esa ambigüedad controlada sin añadir una teología de experiencia extática que el texto no explicita.
  doctrine_reference: Lectura visionaria/apocalíptica del ascenso espiritual; evitar sobreexplicar la mecánica del acontecimiento.
translation_notes:
  revision_awareness: El estado revisado de la POB en inglés suprimió una inserción incómoda y dejó la línea final como 'their faces bright like snow'. En esta versión española se siguió esa revisión, pero se mantuvo la nota textual sobre el segmento incierto entre corchetes y se optó por una formulación idiomática ('sus rostros resplandecientes como nieve') que preserve la luminosidad del original sin sobrecargar el verso.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al tetragrámaton; aquí no aparece ninguna forma del nombre divino.
  - '''Espíritu'' se escribe en minúscula porque se refiere al espíritu del hablante, no al Espíritu Santo.'
  - '''Cielos'' se mantiene en plural por la cosmología apocalíptica del texto.'
  - Se evita 'Señor' y 'Cristo' porque no aparecen en este pasaje.
  - La elección de 'vestiduras' mantiene un registro bíblico amplio y comprensible en español moderno.
