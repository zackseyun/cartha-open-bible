    text: The bracketed word in the source line is textually uncertain. The translation reflects the clear sense of radiance in the clause as a whole without pressing that uncertain form too far.
    reason: textual_variant
  - marker: c
    text: '''Like snow'' renders the comparison naturally in context as an image of dazzling whiteness and brightness.'
    reason: cultural_note
