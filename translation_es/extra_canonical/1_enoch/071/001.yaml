  yaml_path: translation/extra_canonical/1_enoch/071/001.yaml
  text: 'And after this it happened: my spirit was taken up[a], and it ascended into the heavens; and I saw the sons of the holy angels walking upon a flame of fire, and their garments were white[d][c][b], and their faces bright like snow.'
  footnotes:
