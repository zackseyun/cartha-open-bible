  - severity: medium
    issue: '''y sus rostros resplandecientes como nieve'' deja una estructura sintáctica truncada'
    rationale: Tras una cadena de cláusulas verbales, la frase nominal final suena elíptica y menos natural. El ge'ez/POB describe el brillo de los rostros; un verbo explícito en español mejora la legibilidad sin añadir contenido.
  - severity: low
