translation:
  language: es
  text: Y alrededor de eso estaban los serafines, los querubines y los ofanim[a], y estos son los que no duermen y mantienen vigilancia sobre el trono de su gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ofanim» es una transliteración de un nombre de orden celestial; su sentido subyacente se relaciona con «ruedas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወአውዶ
  english_pob_choice: around it were
  chosen_spanish: Y alrededor de él estaban
  alternatives_spanish:
  - Y alrededor de él había
  - Y en torno a él estaban
  lexicon: Dillmann
  rationale: El sufijo posesivo del ge'ez apunta al objeto mencionado antes, por lo que «de él» preserva la referencia. «Alrededor de él estaban» reproduce la relación espacial sin forzar una paráfrasis.
- source_word: ሱራፌን
  english_pob_choice: seraphim
  chosen_spanish: serafines
  alternatives_spanish:
  - serafines
  - serafines ardientes
  lexicon: Dillmann
  rationale: La transliteración tradicional al español es «serafines», que conserva la clase celestial distinguida en el contexto apocalíptico. «Serafines ardientes» explicaría el sentido etimológico, pero el texto aquí funciona como nombre de orden.
- source_word: ኪሩቤን
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines
  - querubes
  lexicon: Dillmann
  rationale: «Querubines» es la forma española estable para este orden celestial y mantiene el tono elevado del listado paralelo.
- source_word: አፋኒን
  english_pob_choice: ophannim
  chosen_spanish: ofanim
  alternatives_spanish:
  - ofanim
  - ruedas
  lexicon: Dillmann
  rationale: Se conserva la transliteración del nombre de clase celestial para no reducir la figura a «ruedas», lo cual aplanaría la taxonomía apocalíptica del pasaje. La forma «ofanim» es la más transparente en español para un préstamo técnico.
- source_word: እሙንቱ
  english_pob_choice: these are those
  chosen_spanish: estos son los
  alternatives_spanish:
  - estos son aquellos que
  - éstos son los
  lexicon: Dillmann
  rationale: La identificación enfática se conserva con «estos son los», que suena natural en español y mantiene la fuerza demostrativa del original.
- source_word: እለ ኢይነውሙ
  english_pob_choice: who do not sleep
  chosen_spanish: que no duermen
  alternatives_spanish:
  - que no duermen jamás
  - que no se duermen
  lexicon: Dillmann
  rationale: El verbo simple de dormir se traduce directamente. «No duermen» preserva la afirmación sin añadir el matiz de «nunca» que el ge'ez no explicita.
- source_word: የዐቅቡ
  english_pob_choice: keep watch over
  chosen_spanish: guardan vigilancia sobre
  alternatives_spanish:
  - vigilan sobre
  - custodian
  lexicon: Dillmann
  rationale: «Guardar vigilancia sobre» expresa la vigilancia atenta y el cuidado protector que sugiere el verbo, con registro natural en español bíblico contemporáneo.
- source_word: መንበረ ስብሐተ ዚአሁ
  english_pob_choice: the throne of his glory
  chosen_spanish: el trono de su gloria
  alternatives_spanish:
  - el trono de su majestad
  - su glorioso trono
  lexicon: Dillmann
  rationale: Se conserva la construcción nominal «trono de su gloria» porque refleja más de cerca el genitivo del original y mantiene el peso apocalíptico sin suavizarlo en una frase adjetival.
theological_decisions:
- issue: Designación de los seres celestiales alrededor del trono
  english_pob_reading: Use transliterated class names 'seraphim,' 'cherubim,' and 'ophannim'
  chosen_spanish_reading: 'Usar nombres de orden celestial: «serafines», «querubines» y «ofanim»'
  alternative_spanish_readings:
  - Traducir «ofanim» como «ruedas»
  - Reemplazar los tres nombres por «ángeles»
  rationale: El pasaje enumera órdenes celestiales diferenciados en una escena de trono. Mantener los nombres preserva la especificidad cosmológica y evita reducir la visión a un lenguaje genérico de ángeles.
  doctrine_reference: 'Principio de traducción POB: preservar la imaginería apocalíptica y distinguir términos técnicos cuando el texto presenta categorías celestiales específicas.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del audit trail que corrige la referencia a «around it» y la redacción inglesa final «these are those who do not sleep». La versión española refleja explícitamente la referencia pronominal a «él» y conserva la identificación enfática sin depender de la forma inglesa previa.
  spanish_consistency_notes:
  - Se mantuvo un registro elevado y bíblico sin recurrir a SEÑOR para el nombre divino, aunque aquí no aparece el tetragrámaton.
  - «Ofanim» se dejó en transliteración para conservar la taxonomía celestial del texto; se añadió nota explicativa por la alternativa semántica «ruedas».
  - «Gloria» se conservó para መንበረ ስብሐተ ዚአሁ porque el genitivo del original no requiere adjetivación en español.
