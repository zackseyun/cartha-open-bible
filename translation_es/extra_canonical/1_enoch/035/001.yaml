translation:
  language: es
  text: Y desde allí fui hacia el oeste[a], a los confines de la tierra, y allí vi tres portales abiertos del cielo, tal como había visto en el oriente, que correspondían a sus portales y correspondían a sus salidas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La revisión del texto fuente indica que ዐረብ aquí significa 'oeste' (el lugar de la puesta del sol), no 'sur'.
    reason: source_note
  - marker: b
    text: O 'correspondían a sus salidas'; la frase probablemente indica que estos portales occidentales coincidían con los del oriente en su disposición o medida, incluyendo sus puntos de salida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወእምህየ
  english_pob_choice: And from there
  chosen_spanish: Y desde allí
  alternatives_spanish:
  - Y de allí
  - Y desde ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula narrativa de transición; 'desde allí' conserva el movimiento secuencial de la visión sin añadir matices innecesarios.
- source_word: ሖርኩ
  english_pob_choice: I went
  chosen_spanish: fui
  alternatives_spanish:
  - anduve
  - viajé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo simple de movimiento mantiene el reporte visionario sobrio y natural en español.
- source_word: መንገለ ዐረብ
  english_pob_choice: toward the west
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - hacia el occidente
  - rumbo al poniente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión auditada que corrige ዐረብ como 'oeste' y no 'sur'. 'Hacia el oeste' preserva la dirección cósmica y es idiomático en español.
- source_word: በአጽናፈ ምድር
  english_pob_choice: to the ends of the earth
  chosen_spanish: a los extremos de la tierra
  alternatives_spanish:
  - a los confines de la tierra
  - hasta los bordes de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Extremos'' conserva la imagen apocalíptica de límite cósmico. ''Confines'' sería posible, pero ''extremos'' mantiene mejor la literalidad de la expresión.'
- source_word: ሠለስተ ኆዋኅወ ሰማይ
  english_pob_choice: three open portals of heaven
  chosen_spanish: tres portales abiertos del cielo
  alternatives_spanish:
  - tres puertas abiertas del cielo
  - tres ventanas abiertas del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Portales'' conserva la imaginería arquitectónica/cósmica y evita reducir el término a ''ventanas''. ''Del cielo'' reproduce el genitivo de origen/ámbito.'
- source_word: ርኁዋተ
  english_pob_choice: open
  chosen_spanish: abiertos
  alternatives_spanish:
  - despejados
  - abiertas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adjetivo concordante con 'portales'; mantiene la sencillez del estado visible de las aperturas.
- source_word: በከመ ርኢኩ በምሥራቅ
  english_pob_choice: like what I had seen in the east
  chosen_spanish: como lo había visto en el oriente
  alternatives_spanish:
  - como había visto en el oriente
  - tal como lo había visto al oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Oriente'' es un equivalente digno y claro de ''east'' en un contexto cosmológico; el pluscuamperfecto mantiene la referencia a la visión anterior.'
- source_word: በአምጣነ ኆዋኅው
  english_pob_choice: corresponding to their portals
  chosen_spanish: correspondientes a los portales
  alternatives_spanish:
  - en correspondencia con los portales
  - según los portales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrigió el sentido para reflejar que el plural refiere a los mismos portales, no a 'sus aperturas'. 'Correspondientes a' preserva la relación estructural.
- source_word: ወበአምጣነ ሞፃእቱ
  english_pob_choice: and corresponding to their outlets
  chosen_spanish: y correspondientes a sus salidas
  alternatives_spanish:
  - y correspondientes a sus salidas de salida
  - y en correspondencia con sus salidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Salidas'' comunica la idea de egreso/apertura de manera natural y mantiene la simetría del verso con el primer paralelo.'
theological_decisions:
- issue: Geografía visionaria y arquitectura celestial
  english_pob_reading: Retain 'ends of the earth' and 'portals of heaven' as literal visionary imagery
  chosen_spanish_reading: Mantener 'a los extremos de la tierra' y 'portales abiertos del cielo' como imaginería visionaria literal
  alternative_spanish_readings:
  - '''hacia el oeste, hasta el confín del mundo, y allí vi tres aberturas del cielo'''
  - '''hacia el poniente... tres ventanas del cielo'''
  rationale: El libro de 1 Enoc presenta una cosmología apocalíptica estructurada; la traducción debe preservar esa arquitectura y no convertirla en prosa religiosa genérica.
  doctrine_reference: Principio de preservación de imaginería apocalíptica; no aplanar topografía celestial a lenguaje moderno.
translation_notes:
  revision_awareness: Se incorporó la corrección auditada de ዐረብ como 'oeste' y no 'sur', y se ajustó la segunda cláusula para reflejar que el paralelo habla de los portales mismos y de sus salidas. También se evitó traducir mecánicamente desde el inglés previo donde aparecía una formulación ya revisada.
  spanish_consistency_notes:
  - Se conservó 'portales' por coherencia con el vocabulario cósmico-apocalíptico del pasaje.
  - Se usó 'oeste' y 'oriente' para mantener el paralelismo direccional con una dicción natural en español.
  - Se mantuvo el lenguaje literal de visión ('vi', 'portales', 'salidas') sin añadir interpretación explicativa en el texto principal.
