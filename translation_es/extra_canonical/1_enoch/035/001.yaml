base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/035/001.yaml
  text: And from there I went toward the west[a], to the ends of the earth, and there I saw three open portals of heaven, like what I had seen in the east[d][c][b], corresponding to their portals and corresponding to their outlets.
  footnotes:
  - marker: a
    text: Or 'gates of heaven' or 'windows of heaven'; the Ge'ez term denotes heavenly openings and may refer to the apertures through which celestial bodies emerge.
