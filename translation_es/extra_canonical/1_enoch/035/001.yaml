  - marker: b
    text: The phrase rendered 'corresponding to their openings and corresponding to their outlets' likely indicates that the southern portals matched the eastern ones in arrangement or measure.
    reason: lexical_alternative
  - marker: c
    text: Or 'toward the south'.
    reason: previous_rendering
  - marker: d
    text: Or 'corresponding to their openings'.
    reason: previous_rendering
