  rationale: 'Se aplican solo ajustes menores: mejorar la naturalidad de la comparación con la visión oriental, hacer más idiomática la cláusula de correspondencia y afinar la nota para que coincida con el texto. El sentido fuente y la terminología POB se conservan.'
