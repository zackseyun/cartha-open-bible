  source_alignment_summary: 'El borrador sigue en gran parte la secuencia y el sentido del ge''ez y respeta correcciones clave del rastro POB: ኢትርሥዑ como maldad, la cláusula constructa ''palabra de...'', y el contraste final ''no son para justicia... sino para gran pecado''. Sin embargo, dos puntos no preservan fielmente ni el sentido ni el español natural: ''no declaréis falso la palabra'' es gramaticalmente incorrecto en español y debe expresarse como ''no declaréis falsa la palabra'' o mejor ''no tengáis por falsa la palabra''; y ''del Grande Santo'' suena forzado y menos fiel al título ya asentado en inglés como ''del Gran Santo'' / ''del Grande y Santo''.'
