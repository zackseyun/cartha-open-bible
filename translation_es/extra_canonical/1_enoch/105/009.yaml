translation:
  language: es
  text: No sean malvados en su corazón[a], y no mientan, y no perviertan la palabra de la rectitud, y no declaren falsa[b] la palabra del Gran Santo[c], y no consideren sus ídolos[d]; porque toda su falsedad y toda su impureza no son para justicia, sino para gran pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “En su corazón” conserva el lenguaje interior del original; también podría entenderse como “en su mente” o “dentro de ustedes”.
    reason: lexical_alternative
  - marker: b
    text: El causativo ge'ez aquí significa “declarar falsa”, es decir, atribuir falsedad a la palabra divina, no solo “hablar falsamente acerca de”.
    reason: lexical_alternative
  - marker: c
    text: El título puede expresarse también como “el Santo Grande” o “el Grande Santo”; aquí se usa “el Gran Santo” por claridad y naturalidad en español, manteniendo el valor titular del original.
    reason: lexical_alternative
  - marker: d
    text: La cláusula sobre los ídolos es difícil. El verbo probablemente significa “considerar, tener por, estimar”, de modo que también puede entenderse como “no estimen sus ídolos” o “no tengan en cuenta sus ídolos”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢትርሥዑ
  english_pob_choice: do not be wicked
  chosen_spanish: No seáis malvados
  alternatives_spanish:
  - No erréis
  - No os apartéis del bien
  - No actuéis con impiedad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; adjudicated revision from POB audit trail
  rationale: El verbo ge'ez ረሥዐ corresponde a “ser malvado / actuar con impiedad”, no a “errar”. En español, “malvados” conserva la fuerza moral del mandato y sigue la corrección del auditor.
- source_word: በልብክሙ
  english_pob_choice: in your hearts
  chosen_spanish: en vuestro corazón
  alternatives_spanish:
  - en vuestros corazones
  - dentro de vosotros
  - en vuestra mente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el lenguaje antropológico literal. En español, el singular colectivo “corazón” es natural y conserva el foco interior del texto.
- source_word: ተሐስዉ
  english_pob_choice: do not lie
  chosen_spanish: no mintáis
  alternatives_spanish:
  - no digáis falsedad
  - no habléis mentira
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Mentir” es la forma directa e idiomática para la prohibición verbal de falsedad.
- source_word: አትሚጥዋ ለነገረ ርትዕ
  english_pob_choice: do not alter the word of uprightness
  chosen_spanish: no pervirtáis la palabra de la rectitud
  alternatives_spanish:
  - no alteréis la palabra de la rectitud
  - no distorsionéis la palabra de la justicia
  - no torzáis la palabra de la rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa muestra que el verbo implica cambiar/distorsionar/pervertir. “Pervertir” expresa mejor esa fuerza en español. “Palabra de la rectitud” conserva el sustantivo en estado constructo y evita una paráfrasis excesiva.
- source_word: ነገረ
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - asunto
  - materia
  - dicho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es verbal y revelatorio; “palabra” mantiene el vínculo con las prohibiciones sobre mentira y declaración falsa.
- source_word: ርትዕ
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - rectitud moral
  - verdad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Rectitud” preserva el valor ético sin repetir “justicia” antes de la cláusula final, donde aparece ጽድቅ. En español suena natural y conserva la diferencia léxica del original.
- source_word: ታሐስውዋ ለነገረ ቅዱስ ዐቢይ
  english_pob_choice: do not declare false the word of the Great Holy One
  chosen_spanish: no declaréis falso la palabra del Grande Santo
  alternatives_spanish:
  - no falsifiquéis la palabra del Grande Santo
  - no hagáis mentirosa la palabra del Grande Santo
  - no declaréis mentira la palabra del Grande Santo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del POB señala que el causativo significa “declarar falso”, no solo “mentir acerca de”. “Declaréis falso” conserva esa precisión. Se mantiene el título divino como “el Grande Santo” por fidelidad al orden y a la titulación etiópica.
- source_word: ቅዱስ ዐቢይ
  english_pob_choice: the Great Holy One
  chosen_spanish: el Grande Santo
  alternatives_spanish:
  - el Santo Grande
  - el Gran Santo
  - el Santo Grande y Glorioso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez funciona como título divino sustantivado. “Grande Santo” sigue de cerca la forma del original; en español, con artículo, “el Grande Santo” conserva la combinación titulada sin forzar una reordenación interpretativa.
- source_word: ትሕስብዋ ለጣዖትክሙ
  english_pob_choice: do not regard your idols
  chosen_spanish: no consideréis vuestros ídolos
  alternatives_spanish:
  - no estiméis vuestros ídolos
  - no tengáis por nada vuestros ídolos
  - no tengáis en cuenta vuestros ídolos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo apunta a contar/reconocer/considerar. “Considerar” reproduce esa base cognitiva sin añadir una teología más desarrollada que la que el texto exige. El complemento implícito de valor queda en la amonestación misma.
- source_word: ጣዖትክሙ
  english_pob_choice: your idols
  chosen_spanish: vuestros ídolos
  alternatives_spanish:
  - vuestras imágenes
  - vuestros ídolos de culto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Ídolos” es el equivalente natural y teológicamente claro para objetos de culto falso.
- source_word: ሐሰትክሙ
  english_pob_choice: your falsehood
  chosen_spanish: vuestra falsedad
  alternatives_spanish:
  - vuestras mentiras
  - vuestra mentira
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular colectivo español “falsedad” recoge el campo semántico del término y suena más amplio que una sola mentira aislada.
- source_word: ርኩስነክሙ
  english_pob_choice: your uncleanness
  chosen_spanish: vuestra impureza
  alternatives_spanish:
  - vuestra inmundicia
  - vuestra suciedad ritual
  - vuestra contaminación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Impureza” mantiene bien la resonancia moral y cultual del término en lenguaje bíblico y apocalíptico, con buena inteligibilidad en español.
- source_word: ጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia salvadora
  - justicia divina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí la oposición ética culmina en “justicia” como término más natural y consistente con el cierre del verso. Se preserva el contraste con “rectitud” usado antes para ርትዕ.
- source_word: ኃጢአት ዐቢይ
  english_pob_choice: great sin
  chosen_spanish: gran pecado
  alternatives_spanish:
  - pecado grande
  - grave pecado
  - gran transgresión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Gran pecado” reproduce la gravedad intensiva sin añadir matiz doctrinal extra.
theological_decisions:
- issue: Cómo traducir el título divino ቅዱስ ዐቢይ sin borrar su forma enológico-etiópica
  english_pob_reading: the Great Holy One
  chosen_spanish_reading: el Grande Santo
  alternative_spanish_readings:
  - el Gran Santo
  - el Santo Grande
  rationale: La revisión inglesa confirma que se trata de un título fijo y no solo de adjetivos sueltos. En español, “el Grande Santo” mantiene la estructura titular con mínima intervención. Se evita sustituirlo por una fórmula más tradicional que borraría el eco del original.
  doctrine_reference: Preservar título divino y tensión lexical; primacía del texto fuente sobre la suavización litúrgica.
- issue: Valor del mandato contra la idolatría en ትሕስብዋ ለጣዖትክሙ
  english_pob_reading: do not regard your idols
  chosen_spanish_reading: no consideréis vuestros ídolos
  alternative_spanish_readings:
  - no estiméis vuestros ídolos
  - no tengáis por nada vuestros ídolos
  rationale: 'El verbo es de valoración/consideración. “Considerar” conserva el margen interpretativo: el texto prohíbe asignarles peso o reconocimiento, sin importar una glosa más fuerte como “confiar en”.'
  doctrine_reference: Mantener la ambigüedad lexical documentada; no sobre-interpretar la frase.
- issue: Cómo reflejar el contraste final entre ‘justicia’ y ‘gran pecado’
  english_pob_reading: are not for righteousness, but for great sin
  chosen_spanish_reading: no son para justicia, sino para gran pecado
  alternative_spanish_readings:
  - no son para rectitud, sino para gran pecado
  - no pertenecen a la justicia, sino al gran pecado
  rationale: La construcción española “no son para justicia” sigue de cerca la relación final del ge'ez y evita convertirla en un dicho distinto. Se mantiene el contraste moral directo sin resolverlo en una formulación más idiomática que perdería la estructura del original.
  doctrine_reference: Fidelidad sintáctica donde el contraste teológico depende de la forma.
translation_notes:
  revision_awareness: 'El texto inglés del POB fue revisado desde una lectura más débil (“do not err,” “the Holy Great One,” “do not speak falsely against”) hacia una lectura más precisa según el audit trail: 1) ኢትርሥዑ = ser malvados/impíos, no errar; 2) ነገረ + ቅዱስ ዐቢይ = ‘palabra de’ con título divino, no mero adjetivo sobre ‘word’; 3) el causativo de ተሐስዉ en la segunda cláusula = declarar falso. La versión española sigue esas correcciones y conserva la tensión entre “rectitud/justicia” y la terminología idolátrica sin normalizarla.'
  spanish_consistency_notes:
  - Se mantiene una distinción léxica entre “rectitud” (ርትዕ) y “justicia” (ጽድቅ) para reflejar la diferenciación del original.
  - Se usa “palabra” de manera consistente para ነገረ, dado su contexto verbal y revelatorio.
  - Se preserva el registro profético-apocalíptico con fórmulas claras, no arcaizantes.
  - La cláusula final mantiene el contraste directo sin convertirlo en una paráfrasis moralizante.
