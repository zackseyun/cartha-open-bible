revisions:
- from: La gloria del Grande[a], y vuestros nombres serán escritos delante de la gloria del Grande.
  to: La gloria del Gran Ser[a], y sus nombres serán escritos ante la gloria del Gran Ser.
  rationale: Se ajusta el pronombre a un español neutral latinoamericano ('sus nombres'), se eleva la naturalidad y fuerza titular de ለዐቢይ con 'Gran Ser' para reflejar mejor 'the Great One', y se sustituye 'delante de' por 'ante' para una dicción más digna y concisa. Se mantiene la repetición deliberada documentada por la auditoría inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:39:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español conserva correctamente la estructura básica del ge'ez y la repetición deliberada de la frase. Sin embargo, 'del Grande' no refleja tan bien como 'del Gran Ser' o 'del Grande' con más naturalidad reverente el título sustantivado 'the Great One'; además, 'vuestros' suena más peninsular que el estilo meta neutral latinoamericano solicitado. La omisión de la conjunción inicial no es grave, pero no hay necesidad de omitirla aquí.
  spanish_quality_summary: 'El texto es comprensible y solemne, pero puede mejorarse para un español más neutral y eclesialmente legible: ''sus nombres'' en vez de ''vuestros nombres'', y ''ante'' resulta más conciso y digno que ''delante de''. ''La gloria del Grande'' es inteligible, pero ''La gloria del Gran Ser'' sería menos idiomáticamente extraño; aun así, para no sobreinterpretar, ''La gloria del Grande'' puede mantenerse solo si se acepta el título. Mejor solución: ''La gloria del Gran Ser'' evita calco raro y preserva el título reverente.'
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. La decisión clave es ለዐቢይ: el inglés auditado exige ''of the Great One''. En español, ''del Grande'' es posible pero algo tosco; ''del Gran Ser'' comunica mejor el título divino substantivado sin paráfrasis excesiva. ''Gloria'' está bien alineado con la decisión léxica y teológica. No se requieren notas nuevas aparte de la ya presente sobre la repetición.'
  issues:
  - severity: medium
    issue: Uso de 'vuestros nombres'
    rationale: El objetivo de estilo pide español neutral latinoamericano; 'vuestros' es marcadamente peninsular. 'Sus nombres' mantiene la segunda persona plural de manera natural en el registro bíblico latinoamericano.
  - severity: medium
    issue: Renderización de ለዐቢይ como 'del Grande'
    rationale: Aunque formalmente posible, en español suena menos natural como título reverente que la intención documentada 'the Great One'. 'Del Gran Ser' o equivalente expresa mejor el sustantivo titular sin perder solemnidad.
  - severity: low
    issue: '''delante de'' puede afinarse a ''ante'''
    rationale: '''Ante'' preserva mejor el registro elevado y la concisión del original/apoyo inglés ''before''.'
  revised_spanish_text: La gloria del Gran Ser[a], y sus nombres serán escritos ante la gloria del Gran Ser.
  revised_footnotes:
  - marker: a
    text: La repetición de 'la gloria del Gran Ser' se conserva porque el ge'ez repite deliberadamente la expresión; esto intensifica la solemnidad de la promesa y no debe nivelarse como si fuera una simple paráfrasis.
    reason: lexical_alternative
  revision_rationale: Se ajusta el pronombre a un español neutral latinoamericano ('sus nombres'), se eleva la naturalidad y fuerza titular de ለዐቢይ con 'Gran Ser' para reflejar mejor 'the Great One', y se sustituye 'delante de' por 'ante' para una dicción más digna y concisa. Se mantiene la repetición deliberada documentada por la auditoría inglesa.
