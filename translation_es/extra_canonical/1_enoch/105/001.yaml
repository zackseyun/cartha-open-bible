translation:
  language: es
  text: La gloria del Gran Ser[a], y sus nombres serán escritos ante la gloria del Gran Ser.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La repetición de 'la gloria del Gran Ser' se conserva porque el ge'ez repite deliberadamente la expresión; esto intensifica la solemnidad de la promesa y no debe nivelarse como si fuera una simple paráfrasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ስብሐቲሁ
  english_pob_choice: his glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - su gloria
  - su alabanza
  - su esplendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez puede significar gloria, alabanza o esplendor, pero aquí funciona como el ámbito solemne ante el cual se escriben los nombres. En español, 'gloria' conserva mejor la imagen apocalíptica y la repetición retórica del verso.
- source_word: ለዐቢይ
  english_pob_choice: of the Great One
  chosen_spanish: del Grande
  alternatives_spanish:
  - del Gran Uno
  - del Grande, Uno
  - del Grande, el Uno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción con la preposición introduce un título divino substantivado. En español, 'el Grande' es breve y reverente; 'Grande' con artículo mantiene el valor titular sin forzar una perífrasis poco natural.
- source_word: ወእስማቲከሙ
  english_pob_choice: and your names
  chosen_spanish: vuestros nombres
  alternatives_spanish:
  - y vuestros nombres
  - y sus nombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma es plural y lleva sufijo de segunda persona plural; por eso se mantiene el plural dirigido a un grupo. Se omite la conjunción inicial en el español por fluidez, sin pérdida de sentido.
- source_word: ይጸሐፍ
  english_pob_choice: shall be written
  chosen_spanish: serán escritos
  alternatives_spanish:
  - serán inscriptos
  - serán escritos e inscritos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo significa 'escribir'. En español, el futuro pasivo expresa bien la promesa; 'escritos' evita un tecnicismo innecesario como 'inscriptos'.
- source_word: በቅድመ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición indica posición 'antes de' o 'en presencia de'. 'Delante de' preserva la imagen espacial y el registro solemne en español contemporáneo.
theological_decisions:
- issue: Cómo reflejar la repetición de 'la gloria del Grande' en ambos miembros del verso
  english_pob_reading: The glory of the Great One... before the glory of the Great One.
  chosen_spanish_reading: La gloria del Grande... delante de la gloria del Grande.
  alternative_spanish_readings:
  - Su gloria... delante de la gloria del Grande.
  - La gloria del Grande... delante de su gloria.
  rationale: La revisión auditada indica que el primer miembro no significa 'su gloria es grande', sino 'la gloria del Grande'. Mantener la repetición en español respeta la sintaxis ge'ez y preserva la solemnidad enfática del texto.
  doctrine_reference: Preservar la estructura y la intensidad retórica del testimonio apocalíptico; no suavizar la repetición deliberada del original.
translation_notes:
  revision_awareness: 'Se siguió la revisión adjudicada que corrige la lectura gramatical del grupo ge''ez ስብሐቲሁ ለዐቢይ: no significa ''su gloria es grande'', sino ''la gloria del Grande''. Por eso el español reproduce la misma frase en ambos miembros del verso y evita una interpretación predicativa no respaldada por la morfología.'
  spanish_consistency_notes:
  - Se usa 'del Grande' como título reverente y compacto, en línea con el valor substantivado del original.
  - Se mantiene el plural 'vuestros nombres' por el sufijo plural del ge'ez.
  - Se prefiere 'delante de' a 'ante' para una cadencia más natural en español sin perder el sentido de presencia/situación delante de una realidad divina.
