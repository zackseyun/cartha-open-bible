    issue: «Esperad» es ambiguo en español.
    rationale: Aunque formalmente posible, en español moderno «esperad» suele entenderse como ‘aguardad’. El ge'ez y el POB inglés apuntan a una exhortación a la esperanza, no a la espera temporal.
  - severity: low
    issue: La nota [a] intenta rescatar una lectura menos natural del texto principal.
    rationale: Si el texto principal dice «Esperad», la nota «O “esperad con esperanza”» suena correctiva. Es mejor que el texto principal exprese directamente el sentido y que la nota preserve la alternativa breve.
  - severity: low
    issue: La nota [c] es algo redundante.
    rationale: La decisión «portales» ya está bien sustentada por el audit trail. Puede mantenerse, pero conviene formularla con brevedad y claridad como nota léxica/cosmológica.
