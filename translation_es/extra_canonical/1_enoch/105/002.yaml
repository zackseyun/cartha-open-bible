translation:
  language: es
  text: Tened esperanza[a], porque antes fuisteis avergonzados por el mal y por la aflicción; pero ahora resplandeceréis como la luz del cielo, resplandeceréis y seréis vistos[b], y los portales del cielo[c] se abrirán para vosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Esperad». El ge'ez usa un imperativo plural breve de exhortación a la esperanza.
    reason: lexical_alternative
  - marker: b
    text: O «seréis manifiestos». El pasivo puede entenderse como hacerse visibles públicamente.
    reason: lexical_alternative
  - marker: c
    text: La expresión también se ha traducido «las ventanas del cielo», pero aquí «portales» refleja mejor el término ge'ez y la imaginería cosmológica de 1 Enoc.
    reason: source_note
lexical_decisions:
- source_word: ተስፈዉ
  english_pob_choice: Hope
  chosen_spanish: Esperad
  alternatives_spanish:
  - Tened esperanza
  - Esperad con esperanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo plural exhorta directamente al grupo; «esperad» conserva el tono breve y solemne, mientras que la nota aclara el valor exhortativo de la esperanza sin recargar la frase.
- source_word: ቀዳሚ
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - antes de esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca el contraste temporal entre el pasado de vergüenza y la vindicación futura. «Antes» es natural en español y suficiente para el valor adverbial.
- source_word: ኃሠርክሙ
  english_pob_choice: you were put to shame
  chosen_spanish: fuisteis avergonzados
  alternatives_spanish:
  - fuisteis deshonrados
  - fuisteis humillados
  - os avergonzaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva refleja la idea de sufrir vergüenza; «avergonzados» mantiene la vergüenza social y moral. Se evita suavizarlo a «humillados» para no perder el matiz de deshonra.
- source_word: በእኩይ
  english_pob_choice: by evil
  chosen_spanish: por el mal
  alternatives_spanish:
  - por la maldad
  - a causa del mal
  - mediante el mal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición ge'ez puede indicar causa o circunstancia. «Por el mal» conserva la compacta oposición apocalíptica sin decidir si se trata de agentes malos o de condición adversa.
- source_word: በምራኅ
  english_pob_choice: by affliction
  chosen_spanish: por la aflicción
  alternatives_spanish:
  - por el sufrimiento
  - por la angustia
  - por la miseria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Aflicción» preserva el registro elevado y corresponde al campo semántico de dificultad, opresión o angustia.
- source_word: ትበርሁ
  english_pob_choice: you will shine
  chosen_spanish: resplandeceréis
  alternatives_spanish:
  - brillaréis
  - os iluminaréis
  - daréis luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo repetido se conserva con una repetición equivalente en español. «Resplandeceréis» ofrece un tono más solemne y visual, apto para la imaginería apocalíptica.
- source_word: ብርሃነ ሰማይ
  english_pob_choice: the light of heaven
  chosen_spanish: la luz del cielo
  alternatives_spanish:
  - la luz de los cielos
  - la claridad del cielo
  - la luz celestial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción genitiva se traduce de forma directa. «Del cielo» comunica la procedencia/cualidad celestial sin forzar una perífrasis más interpretativa.
- source_word: ትትረአዩ
  english_pob_choice: be seen
  chosen_spanish: seréis vistos
  alternatives_spanish:
  - apareceréis
  - seréis visibles
  - seréis contemplados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La secuencia «resplandeceréis y seréis vistos» mantiene la progresión del texto: brillo seguido de manifestación pública. «Seréis vistos» preserva el pasivo sin explicar de más.'
- source_word: ኆኅተ ሰማይ
  english_pob_choice: the portals of heaven
  chosen_spanish: los portales del cielo
  alternatives_spanish:
  - las puertas del cielo
  - las entradas del cielo
  - los portales de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail favorece «portales» sobre «ventanas», porque ኆኅት designa puerta/portal y en 1 Enoc remite a una estructura cosmológica propia. En español, «portales» conserva mejor esa imaginería en lugar de importar la escena de Génesis.
- source_word: ይትረኀዉ ለክሙ
  english_pob_choice: will be opened for you
  chosen_spanish: se abrirán para vosotros
  alternatives_spanish:
  - serán abiertos para vosotros
  - se os abrirán
  - quedarán abiertos para vosotros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva con sentido de acceso concedido se expresa de manera natural en español. «Se abrirán para vosotros» preserva el foco en la apertura que beneficia a los destinatarios.
theological_decisions:
- issue: Imagen final de acceso celestial
  english_pob_reading: The verse promises vindication and heavenly access for the righteous, expressed through the apocalyptic image of heaven's windows being opened for them.
  chosen_spanish_reading: El verso promete vindicación y acceso celestial para los justos, expresado por la imagen apocalíptica de los portales del cielo abiertos para ellos.
  alternative_spanish_readings:
  - promete que les serán derramadas bendiciones desde el cielo
  - promete que ellos mismos entrarán en el cielo
  rationale: El ge'ez afirma que los portales del cielo se abrirán para los destinatarios, pero no explicita si descienden dones o si ellos entran. La traducción española conserva esa tensión interpretativa y no la resuelve más allá del texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: de «the windows of heaven» a «the portals of heaven». La presente versión sigue esa revisión, porque el Ge''ez ኆኅት significa puerta/portal y encaja mejor con la cosmología de 1 Enoc. También se conserva la tensión final del pasivo («seréis vistos» / «se abrirán para vosotros») sin explicitar si la apertura implica derramamiento de bendición o entrada al cielo.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento plural de segunda persona con formas de voseo plural no localista («esperad», «fuisteis», «resplandeceréis», «seréis»).
  - Se evita «Señor»/«SEÑOR» porque el pasaje no contiene el nombre divino ni una cita directa de YHWH.
  - «Portales» se usa de manera consistente con la revisión auditada y con el vocabulario cosmológico en 1 Enoc.
  - Se conserva el paralelismo verbal con una repetición explícita de «resplandeceréis» para reflejar el doble ትበርሁ.
