translation:
  language: es
  text: Tengan esperanza[a], y no abandonen su esperanza, porque tendrán[b] gran alegría, como los ángeles del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sean esperanzados».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «gran alegría será de ustedes». La construcción puede expresar posesión o un bien asignado; el texto principal usa una formulación natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ተስፈዉ
  english_pob_choice: Hope
  chosen_spanish: Tengan esperanza
  alternatives_spanish:
  - Mantengan la esperanza
  - Pongan su esperanza en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo exhorta directamente a esperar/confiar. ‘Tengan esperanza’ conserva el mandato breve y solemne sin añadir un objeto inexistente en el ge'ez.
- source_word: ወኢትኅድጉ
  english_pob_choice: and do not abandon
  chosen_spanish: y no abandonen
  alternatives_spanish:
  - y no dejen
  - y no forsaken
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La negación imperativa comunica la idea de no dejar atrás ni renunciar. ‘Abandonen’ conserva el peso formal y la fuerza exhortativa del original.
- source_word: ተስፋክሙ
  english_pob_choice: your hope
  chosen_spanish: su esperanza
  alternatives_spanish:
  - su confianza
  - su expectativa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto repite el sustantivo ‘esperanza’, y en español esa repetición retiene la intensidad retórica del original. El posesivo plural respeta el destinatario colectivo.
- source_word: እስመ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce la razón del mandato. ‘Porque’ expresa bien la relación causal en español natural y digno.
- source_word: ትከዉኑ ለክሙ
  english_pob_choice: will be yours
  chosen_spanish: tendrán
  alternatives_spanish:
  - será de ustedes
  - les corresponderá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción dativa expresa posesión o beneficio asignado. ‘Tendrán gran alegría’ comunica de manera natural la promesa sin perder el sentido de don recibido.
- source_word: ፍሥሓ ዐቢይ
  english_pob_choice: great joy
  chosen_spanish: gran alegría
  alternatives_spanish:
  - gran gozo
  - alegría grande
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Gran alegría’ es una equivalencia clara y digna para la combinación sustantivo + adjetivo. Evita el arcaismo, pero mantiene el tono de bendición.
- source_word: ከመ መላእክተ ሰማይ
  english_pob_choice: like the angels of heaven
  chosen_spanish: como los ángeles del cielo
  alternatives_spanish:
  - como los ángeles de los cielos
  - así como los ángeles del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación explícita debe conservarse. ‘Del cielo’ reproduce bien la imagen apocalíptica y es idiomático en español.
theological_decisions:
- issue: Alcance de la comparación con los ángeles
  english_pob_reading: The promise is of great joy comparable to the angels of heaven, without specifying full angelic transformation.
  chosen_spanish_reading: La promesa es de gran alegría comparada con la de los ángeles del cielo, sin afirmar que los destinatarios se transformen en ángeles.
  alternative_spanish_readings:
  - Los fieles tendrán la misma alegría que los ángeles del cielo
  - Los fieles se volverán como los ángeles del cielo
  rationale: El ge'ez usa una comparación simple (‘como’). Mantenerla evita resolver indebidamente una tensión teológica sobre si la semejanza es de alegría, estado o recompensa.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
translation_notes:
  revision_awareness: El inglés auditado pasó por ajustes menores de fluidez, pero el punto estable en el contexto es la exhortación a esperar y la promesa de gran alegría comparada con los ángeles del cielo. La traducción española sigue ese estado textual estable y conserva la comparación sin ampliarla.
  spanish_consistency_notes:
  - Se usó ‘esperanza’ dos veces para reflejar la repetición del ge'ez.
  - Se evitó ‘Cristo’/‘SEÑOR’ porque no aparecen en este verso ni en el texto fuente.
  - Se prefirió ‘ángeles del cielo’ para mantener la comparación explícita y transparente.
