translation:
  language: es
  text: Y ahora[a] les muestro que la luz y la oscuridad, el día y la noche, ven todos sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pasaje presenta la luz y la oscuridad, el día y la noche, como testigos que ven cada pecado; también puede sugerir «en público y en secreto, en todo tiempo».
    reason: cultural_note
lexical_decisions:
- source_word: ወይ እዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y en este momento
  - Y he aquí, ahora
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El marcador introduce un cambio discursivo-temporal; «Y ahora» reproduce de manera natural y fiel la transición sin añadir énfasis innecesario.
- source_word: አነ አርእየክሙ
  english_pob_choice: I show you
  chosen_spanish: les muestro
  alternatives_spanish:
  - les hago ver
  - les revelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez conserva fuerza visual/apocalíptica; «muestro» mantiene esa concreción mejor que una formulación más abstracta como «hago saber».
- source_word: እስመ
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí funciona como complementizador introduciendo la cláusula de contenido tras «muestro», no como causal en español.
- source_word: ብርሃን
  english_pob_choice: light
  chosen_spanish: la luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Equivalente directo y natural en español para el elemento cósmico del paralelismo.
- source_word: ወጽልመት
  english_pob_choice: and darkness
  chosen_spanish: y la oscuridad
  alternatives_spanish:
  - y las tinieblas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oscuridad» es un término claro y sobrio; «tinieblas» sería posible, pero suena más bíblico-tradicional y menos neutral. Ambas conservan el contraste merístico.
- source_word: ዕለት ወሌሊት
  english_pob_choice: day and night
  chosen_spanish: el día y la noche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el segundo merismo tal como aparece en el original, reforzando la totalidad del testimonio cósmico.
- source_word: ይሬእዩ
  english_pob_choice: see
  chosen_spanish: ven
  alternatives_spanish:
  - observan
  - ven como testigos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ven» mantiene la imagen de percepción activa atribuida a los elementos cósmicos. En español, la lectura personificante funciona de modo natural sin explicitar «testigos» en el texto principal.
- source_word: ኵሎ ኃጢአትክሙ
  english_pob_choice: all your sins
  chosen_spanish: todos sus pecados
  alternatives_spanish:
  - todos tus pecados
  - cada uno de sus pecados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el alcance totalizador de «all». Se eligió la tercera persona de cortesía textual/lectora «sus» para una redacción fluida de carácter público, sin cambiar el contenido semántico.
theological_decisions:
- issue: Si la creación cósmica es sujeto activo de testimonio o solo un modo de decir 'en público y en privado'
  english_pob_reading: Light and darkness, day and night, see all your sins.
  chosen_spanish_reading: La luz, la oscuridad, el día y la noche son presentados como realidades que ven los pecados.
  alternative_spanish_readings:
  - La frase significa solo que los pecados se cometen de día y de noche, en público y en secreto
  - El hablante dice que él mismo ha visto todos sus pecados en toda circunstancia
  rationale: El ge'ez asigna el verbo de ver al conjunto de pares cósmicos; por eso se mantiene la personificación como testimonio apocalíptico, en vez de rebajarla a un mero modismo temporal o moral.
  doctrine_reference: Preservar imaginería apocalíptica y testimonio de la creación; no aplanar el sujeto del verbo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió el vínculo de እስመ de «for» a complementizador «that». Por eso el español usa «que» y no una causal directa. También se respetó la lectura aprobada por el control posterior sin introducir cambios adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se conserva la imaginería cósmica activa del original: la luz, la oscuridad, el día y la noche actúan como sujetos de ''ver''.'
  - Se evitó el registro arcaizante cuando no era necesario; el resultado busca ser claro, solemne y publicable en español contemporáneo.
