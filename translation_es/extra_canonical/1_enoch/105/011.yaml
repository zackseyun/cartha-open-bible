revisions:
- from: Y cuando escriban todas las palabras con verdad en sus lenguas[a], y no alteren ni omitan nada de mis palabras, sino que escriban todo con verdad[b][c][d]—todas las cosas de antes—.
  to: Y cuando escriban todas las palabras fielmente en sus lenguas[a], y no alteren ni omitan nada de mis palabras, sino que escriban todo fielmente[b][c][d]—todas las cosas de antes—
  rationale: Se ajusta 'con verdad' a 'fielmente' para un español más natural y preciso en contexto de copia/transmisión textual; se corrige la puntuación final; y se mejora la claridad de la nota sobre 'lenguas' sin perder la cercanía al original ni las alternativas documentadas por el rastro de auditoría inglés.
