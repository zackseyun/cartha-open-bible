translation:
  language: es
  text: Y cuando escriban todas las palabras fielmente en sus lenguas[a], y no alteren ni omitan nada de mis palabras, sino que escriban todo fielmente[b][c][d]—todas las cosas de antes—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'sobre/en sus lenguas'; aquí se entiende como 'en sus idiomas' por el contexto de transmisión escrita entre distintas comunidades lingüísticas.
    reason: lexical_alternative
  - marker: b
    text: La frase final es condensada en el ge’ez y también puede leerse como 'todas las cosas de antes'.
    reason: alternative_reading
  - marker: c
    text: 'O: ''escriban todas mis palabras fielmente en sus lenguas, y no alteren''.'
    reason: previous_rendering
  - marker: d
    text: 'O: ''todas las cosas que estaban antes''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወሶበሰ፡
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y entonces cuando
  - Y al cuando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce una cláusula temporal de forma natural en español, conservando la conexión inicial y el sentido prospectivo.
- source_word: ኵሎ፡ ነገራተ፡
  english_pob_choice: all my words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todas las cosas
  - todos los asuntos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige la lectura posesiva: el ge’ez aquí no lleva el sufijo de primera persona; por eso se traduce simplemente como “todas las palabras”. El contexto inmediato confirma que se trata de palabras escritas/transmitidas.'
- source_word: በርትዕ፡
  english_pob_choice: truthfully
  chosen_spanish: con verdad
  alternatives_spanish:
  - verdaderamente
  - fielmente
  - correctamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, “con verdad” conserva la idea de fidelidad textual y rectitud. Es preferible a “correctamente” porque mantiene la tensión entre veracidad y exactitud scribal.
- source_word: ዲበ፡ ልሳናቲሆሙ፡
  english_pob_choice: in their languages
  chosen_spanish: en sus lenguas
  alternatives_spanish:
  - en sus idiomas
  - sobre sus lenguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro literal “sobre/en sus lenguas” se entiende naturalmente como plural lingüístico; “lenguas” mantiene el valor idiomático y el paralelismo con la transmisión multilingüe.
- source_word: ወኢይዌልጡ፡
  english_pob_choice: they neither alter
  chosen_spanish: y no alteren
  alternatives_spanish:
  - y no cambien
  - y no perviertan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Alterar” reproduce bien el matiz de cambio o distorsión textual, y encaja con la prohibición paralela de omitir.
- source_word: ወኢየሐጽጹ፡
  english_pob_choice: nor omit anything
  chosen_spanish: ni omitan nada
  alternatives_spanish:
  - ni quiten nada
  - ni sustraigan nada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo sugiere quitar o sustraer; “omitan nada” expresa con naturalidad el efecto práctico sobre el texto transmitido.
- source_word: እምነገራቲየ፡
  english_pob_choice: from my words
  chosen_spanish: de mis palabras
  alternatives_spanish:
  - de mis dichos
  - de lo que he dicho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí sí aparece el sufijo posesivo de primera persona; “de mis palabras” conserva explícitamente la autoría y autoridad del hablante.
- source_word: አላ፡
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - antes bien
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Después de una prohibición negativa, “sino que” transmite mejor el contraste correctivo: no esto, sino aquello.'
- source_word: ኵሎ፡ በርትዕ፡ ይጽሐፉ፡
  english_pob_choice: write down everything truthfully
  chosen_spanish: escriban todo con verdad
  alternatives_spanish:
  - escriban todo fielmente
  - escriban todo correctamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma activa exige un sujeto tácito en español y la repetición del mandato debe mantenerse sin volverlo pasivo. “Todo con verdad” conserva el énfasis en la fidelidad de la escritura.
- source_word: ኵሎ፡ ዘቀዳሚ፡
  english_pob_choice: all the former things
  chosen_spanish: todas las cosas de antes
  alternatives_spanish:
  - todas las cosas anteriores
  - todo lo de antes
  - todas las cosas primeras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditable favorece una lectura menos específica que “lo escrito antes”: el ge’ez dice literalmente “todo lo anterior/lo primero”. “Las cosas de antes” preserva la compresión sin sobreinterpretar el verbo.'
theological_decisions:
- issue: Transmisión textual fiel en varias lenguas
  english_pob_reading: The verse speaks of faithful transmission of Enoch's words into multiple languages without alteration or omission.
  chosen_spanish_reading: El versículo habla de copiar fielmente las palabras de Enoc en varias lenguas, sin alterarlas ni omitir nada.
  alternative_spanish_readings:
  - Una exhortación general a hablar con veracidad
  - Una referencia solo a la proclamación oral
  rationale: La doble prohibición de alterar y omitir, junto con la referencia a las lenguas, apunta a una transmisión textual exacta, no solo a una virtud moral general ni a una proclamación oral. El español debe dejar visible esa precisión documental.
  doctrine_reference: 'Translation philosophy §§1, 3, 4: primacía del original, preservar tensiones reales, consistencia terminológica.'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la corrección auditada que rechaza la lectura posesiva en ኵሎ፡ ነገራተ፡: el texto dice “todas las palabras”, no “todas mis palabras”. También se incorporó la revisión que prefiere una traducción menos sobreespecificada de ኵሎ፡ ዘቀዳሚ፡ como “las cosas de antes” o equivalentes cercanos, en lugar de fijarlo exclusivamente como “lo escrito antes”.'
  spanish_consistency_notes:
  - Se mantuvo “lenguas” para conservar el valor idiomático y multilingüe del original.
  - Se eligió “alteren/omitan” para reflejar la prohibición doble de cambio y sustracción textual.
  - Se evitó “Señor” o cualquier sustitución teológica ajena al pasaje, ya que aquí no aparece el nombre divino.
  - La puntuación reproduce el contraste final con guion largo para hacer visible la cláusula añadida de cierre.
  - No se usó voz pasiva en español porque el ge’ez revisado es activo y exige coherencia sintáctica.
