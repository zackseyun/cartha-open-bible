translation:
  language: es
  text: 'Y ahora conozco este misterio: que muchos pecadores alterarán la palabra de la justicia y la pervertirán[a], y hablarán palabras perversas y mentirán, y tramarán grandes fabricaciones[b], y escribirán libros acerca de sus propias palabras[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La revisión del texto base favorece una traducción activa: «alterarán ... y la pervertirán», no una pasiva ni una idea de simple descuido.'
    reason: textual_variant
  - marker: b
    text: «Fabricaciones» conserva el matiz negativo de obras o composiciones forjadas con intención engañosa; también podría leerse «invenciones» o «composiciones».
    reason: lexical_alternative
  - marker: c
    text: La frase apunta a libros producidos a partir de, o para promover, sus propias palabras; no implica una condena general de escribir libros.
    reason: theological_note
lexical_decisions:
- source_word: አአምር
  english_pob_choice: I know
  chosen_spanish: conozco
  alternatives_spanish:
  - sé
  - he llegado a conocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa conocimiento/entendimiento. «Conozco» conserva el valor declarativo en primera persona y suena natural en español bíblico contemporáneo.
- source_word: ምሥጢር
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto apocalíptico, «misterio» conserva la idea de conocimiento revelado y oculto, mejor que «secreto».
- source_word: ነገረ ርትዕ
  english_pob_choice: the word of righteousness
  chosen_spanish: la palabra de la justicia
  alternatives_spanish:
  - la palabra recta
  - el mensaje de justicia
  - la palabra de rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ነገር» admite matices de palabra/mensaje/materia. «Palabra de la justicia» mantiene la relación genitiva transparente y conserva el paralelismo con la tradición de POB sin forzar una lectura más interpretativa.
- source_word: ይመይጡ
  english_pob_choice: will alter
  chosen_spanish: alterarán
  alternatives_spanish:
  - pervertirán
  - cambiarán
  - corromperán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail indica que el verbo es activo y significa «alterar». «Alterarán» reproduce con precisión la acción sobre la palabra de la justicia.
- source_word: ወይ*የዐልዉ
  english_pob_choice: will turn aside / will be neglected (earlier draft tension)
  chosen_spanish: la pervertirán
  alternatives_spanish:
  - se desviarán
  - la desviarán
  - se apartarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto auditado preserva una tensión textual; el cierre verbal parece intensificar la acción sobre la palabra misma. «La pervertirán» expresa ese efecto sin eliminar la incertidumbre de la línea y evita una pasiva no sustentada.
- source_word: ነገራተ እኩያተ
  english_pob_choice: evil words
  chosen_spanish: palabras malas
  alternatives_spanish:
  - palabras perversas
  - cosas malas
  - palabras malignas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural puede referir palabras o asuntos; aquí el contexto inmediato de hablar y mentir favorece un equivalente verbal. «Malas» es sobrio y natural, aunque «perversas» también sería posible.
- source_word: ይሐስዉ
  english_pob_choice: lie
  chosen_spanish: mentirán
  alternatives_spanish:
  - dirán falsedades
  - falsificarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La acusación directa se conserva con el verbo simple «mentirán».
- source_word: ይፈጥሩ ፍጥረተ ዐቢየተ
  english_pob_choice: they will devise great fabrications
  chosen_spanish: tramarán grandes fabricaciones
  alternatives_spanish:
  - idearán grandes invenciones
  - producirán grandes composiciones
  - forjarán grandes inventos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el contexto de mentira y libros producidos en servicio de palabras propias, «tramarán» comunica intención maliciosa y «fabricaciones» conserva el matiz negativo de obras construidas/forjadas.
- source_word: መጻሕፍተ ይጽሐፉ ዲበ ነገራቲሆሙ
  english_pob_choice: they will write books concerning their own words
  chosen_spanish: escribirán libros acerca de sus propias palabras
  alternatives_spanish:
  - escribirán libros sobre sus dichos
  - escribirán libros acerca de sus enseñanzas
  - escribirán libros sobre sus asuntos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase reflexiva se mantiene explícita. «Acerca de sus propias palabras» evita suavizar la crítica y refleja que los libros derivan de, o promueven, su propio discurso.
theological_decisions:
- issue: Si el versículo habla de la destrucción o solo del falseamiento del mensaje recto
  english_pob_reading: The line is rendered as sinners altering and perverting the word of righteousness, without asserting more than the source warrants.
  chosen_spanish_reading: Muchos pecadores alterarán y pervertirán la palabra de la justicia.
  alternative_spanish_readings:
  - muchos pecadores harán que la palabra de la justicia sea olvidada
  - muchos pecadores desviarán la palabra de la justicia
  rationale: 'La revisión del audit trail corrige la sintaxis hacia una acción activa. En español conviene expresar ambas acciones sobre el objeto: alterarán y la pervertirán, sin convertir la línea en una pasiva ni exagerar el grado de ruina textual.'
  doctrine_reference: Preservar la tensión textual y no resolverla con más certeza de la que permite el ge'ez.
- issue: Cómo entender la relación entre la mentira y la producción de libros
  english_pob_reading: The condemnation falls on books written in service of sinners' own false words, not on writing books as such.
  chosen_spanish_reading: La condena recae sobre libros escritos acerca de sus propias palabras, es decir, al servicio de ese discurso falso.
  alternative_spanish_readings:
  - condena toda escritura de libros
  - simplemente describe actividad literaria neutral
  rationale: La redacción española conserva el vínculo entre hablar falsamente, mentir, fabricar y luego escribir libros. Así no se universaliza la crítica contra toda escritura, sino contra la escritura que promueve ese contenido.
  doctrine_reference: Primacía del texto fuente y cuidado de no importar polémicas posteriores al pasaje.
translation_notes:
  revision_awareness: 'El borrador anterior seguía la forma pasiva de una revisión temprana («será descuidada» / «será negada») y no reflejaba la adjudicación posterior, que identifica ይመይጡ como activo plural: «alterarán». También se ajustó la segunda mitad para reflejar mejor la secuencia verbal del ge''ez y se evitó la pasiva implícita. Se conservaron las tensiones léxicas relevantes en torno a ይፈጥሩ ፍጥረተ ዐቢየተ y a la relación de los libros con las palabras de ellos.'
  spanish_consistency_notes:
  - Se usa «Y ahora» para ወይእዜኒ, manteniendo la cadencia profética.
  - «Palabra de la justicia» se conserva para alinear con la terminología auditada y evitar una paráfrasis más libre.
  - «Misterio» se mantiene por su valor apocalíptico revelado.
  - Las notas [a]-[d] están todas ancladas en el texto español para cumplir la trazabilidad editorial.
