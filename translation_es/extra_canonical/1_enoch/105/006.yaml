translation:
  language: es
  text: Y ahora, justos, no teman cuando vean a los pecadores fortalecerse y prosperar en sus caminos. No sean sus compañeros, sino manténganse lejos de su violencia; porque ustedes serán compañeros de los buenos del cielo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la hueste del cielo» o «el ejército del cielo». Una traducción anterior siguió esa línea, pero la revisión textual favorece «los buenos del cielo», porque ኄራነ deriva de «bueno» y preserva mejor el contraste con «pecadores».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢትፍርሁ
  english_pob_choice: do not fear
  chosen_spanish: no teman
  alternatives_spanish:
  - no tengan miedo
  - no se atemoricen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo negativo se dirige directamente a los justos; "no teman" conserva el tono exhortativo y es natural en español bíblico contemporáneo.
- source_word: ጻድቃን
  english_pob_choice: righteous ones
  chosen_spanish: justos
  alternatives_spanish:
  - los justos
  - justos y rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, "justos" comunica mejor la categoría nominal colectiva que un calco como "los rectos"; el contexto contrasta con "pecadores".
- source_word: ትሬእይዎሙ
  english_pob_choice: you see
  chosen_spanish: vean
  alternatives_spanish:
  - miren
  - contemplen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de percepción visual en la cláusula temporal-condicional se expresa de modo natural con "vean".
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - los pecadores
  - malvados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Pecadores" mantiene el contraste moral establecido por el texto y corresponde al valor estándar del término en este contexto apocalíptico.'
- source_word: ይጸንዑ
  english_pob_choice: growing strong
  chosen_spanish: fortalecerse
  alternatives_spanish:
  - hacerse fuertes
  - volverse firmes
  - afianzarse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa aumento de fuerza o firmeza; "fortalecerse" preserva el proceso sin sobreinterpretar la razón de su éxito aparente.
- source_word: ይደልዉ
  english_pob_choice: prospering
  chosen_spanish: prosperar
  alternatives_spanish:
  - tener éxito
  - irles bien
  - triunfar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Prosperar" comunica éxito visible y encaja bien con el paralelismo de "fortalecerse".'
- source_word: ፍኖቶሙ
  english_pob_choice: their ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus vías
  - su conducta
  - su curso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Caminos" conserva la metáfora ética de conducta o modo de vida presente en el original.'
- source_word: ሱቱፋነ
  english_pob_choice: companions
  chosen_spanish: compañeros
  alternatives_spanish:
  - asociados
  - socios
  - participantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición del sustantivo exige un equivalente relacional claro en ambos miembros; "compañeros" mantiene el paralelismo y la proximidad moral.
- source_word: ርሐቁ
  english_pob_choice: keep far
  chosen_spanish: manténganse lejos
  alternatives_spanish:
  - aléjense
  - permanezcan apartados
  - manténganse apartados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma exhortativa expresa separación deliberada; "manténganse lejos" es idiomático y conserva la fuerza imperativa.
- source_word: ግፍዐ
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - injusticia violenta
  - abuso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término apunta a violencia o injusticia violenta; "violencia" es la opción más directa y evita suavizar la advertencia ética.
- source_word: ኄራነ ሰማይ
  english_pob_choice: the good ones of heaven
  chosen_spanish: los buenos del cielo
  alternatives_spanish:
  - los buenos de los cielos
  - la compañía celestial
  - la hueste celestial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión advirtió que ኄራነ deriva de ኄር, "bueno"; por eso se traduce literalmente como "los buenos". "Del cielo" conserva el genitivo y el contraste ético con los pecadores en la tierra.
theological_decisions:
- issue: Identidad del grupo celestial final
  english_pob_reading: the good ones of heaven refers broadly to the heavenly company rather than specifying angels alone
  chosen_spanish_reading: los buenos del cielo como compañía celestial general, no restringida a ángeles en sentido técnico
  alternative_spanish_readings:
  - los ángeles del cielo
  - la hueste del cielo
  - la compañía de los cielos
  rationale: El ge'ez es colectivo y ético, no una especificación angelológica estrecha. Mantener "los buenos del cielo" preserva el contraste moral con "los pecadores" y evita resolver una amplitud que el texto no restringe.
  doctrine_reference: Preservar la tensión apocalíptica y el alcance colectivo del lenguaje celestial sin estrechar indebidamente su referente.
translation_notes:
  revision_awareness: Se incorporó la revisión crítica que corrige la antigua lectura «host of heaven» y la sustituye por «the good ones of heaven» a partir de ኄራነ (plural de ኄር, «bueno»). La redacción española evita el error de militarizar o angelologizar indebidamente el cierre y mantiene el contraste ético del versículo.
  spanish_consistency_notes:
  - Se prefirió «justos» para ጻድቃን en lugar de «rectos» para conservar el uso nominal colectivo y la oposición clásica con «pecadores».
  - Se mantuvo «violencia» para ግፍዐ, conforme al tono severo del aviso y para no diluir la carga ética del término.
  - Se empleó «compañeros» para ሱቱፋነ en ambos casos, sosteniendo el paralelismo entre no asociarse con pecadores y sí pertenecer a los buenos del cielo.
  - Se evitó «SEÑOR» o equivalentes de máscara divina, pues el versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
