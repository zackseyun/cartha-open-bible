base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/105/006.yaml
  text: And now[a], righteous ones, do not fear when you see sinners growing strong and prospering in their ways. Do not become their companions, but keep far from their violence[b]; for you shall be companions of the good ones of heaven.
  footnotes:
