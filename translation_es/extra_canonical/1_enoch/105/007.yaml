translation:
  language: es
  text: 'Y porque ustedes, pecadores, dicen: «No somos investigados[a], ni están escritos todos nuestros pecados[b]»—todos sus pecados están siendo escritos[c] cada día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El ge''ez ኢትኅሥሡ puede leerse como 2ª persona plural activa: «ustedes no nos investigan» (los pecadores acusando a Dios o a sus ángeles de ignorarlos). Una revisión gramatical del texto ge''ez en el proceso de adjudicación favoreció esa lectura; la redacción final de la POB inglesa optó por la voz pasiva para preservar la coherencia de la cita en primera persona. La verificación cruzada registró acuerdo de 0,6 con problemas importantes, por lo que la tensión permanece abierta.'
    reason: textual_variant
  - marker: b
    text: 'O bien: «y todos nuestros pecados no están siendo escritos». El ge''ez ኢይጽሐፉ es 3ª persona plural negada («no escriben / no están escritos»); la construcción pasiva española sigue la redacción final de la POB inglesa y mantiene el paralelismo con la cláusula anterior.'
    reason: lexical_alternative
  - marker: c
    text: 'Ge''ez ይጽሐፉ ሀለዉ (yəṣḥafu hallawu): el auxiliar ሀለዉ («estar», 3ª persona plural) forma el presente continuo con el imperfecto ይጽሐፉ. Una versión anterior del borrador inglés interpretó erróneamente ሀለዉ como interjección enfática («he aquí»); la adjudicación lo corrigió como auxiliar verbal estándar. «Están siendo escritos» preserva el aspecto continuo del registro celestial.'
    reason: source_note
lexical_decisions:
- source_word: እስመ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conjunción causal estándar; introduce la razón de la declaración que sigue. 'Porque' es la correspondencia directa y es idiomática en español para introducir citas que justifican una respuesta.
- source_word: ትብሉ
  english_pob_choice: you say
  chosen_spanish: dicen
  alternatives_spanish:
  - están diciendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperfecto de 2ª persona plural ge'ez; el presente simple 'dicen' (con 'ustedes' explícito) refleja el discurso directo que se dirige a los pecadores. Se usa 'ustedes' para el español latinoamericano neutro.
- source_word: አንትሙ ኃጥኣን
  english_pob_choice: you sinners
  chosen_spanish: ustedes, pecadores
  alternatives_spanish:
  - vosotros, pecadores
  - ustedes los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Pronombre personal አንትሙ en aposición al verbo ትብሉ, confirmado por la adjudicación gramatical: está fuera de la cita directa. ''Ustedes, pecadores'' (con coma apositiva) reproduce esa estructura; ''ustedes'' es la forma estándar del español latinoamericano neutro.'
- source_word: ኢትኅሥሡ
  english_pob_choice: are not sought out
  chosen_spanish: no somos investigados
  alternatives_spanish:
  - no se nos investiga
  - no nos buscan
  - ustedes no nos investigan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El verbo ኀሠሠ tiene sentido judicial de ''buscar / investigar / escudriñar''. Una revisión gramatical (adjudicación Gemini) lo leyó como 2ª persona plural activa: ''ustedes no investigan''; la revisión final de la POB inglesa (azure-gpt-5.4) reconsideró y optó por la voz pasiva para preservar la coherencia de la cita en primera persona. El español sigue esa redacción pasiva, documentando la alternativa activa en la nota [a].'
- source_word: ኢይጽሐፉ ኵሎ ኃጢአትነ
  english_pob_choice: all our sins are not written down
  chosen_spanish: ni están escritos todos nuestros pecados
  alternatives_spanish:
  - y todos nuestros pecados no están escritos
  - ni se escriben todos nuestros pecados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez ኢይጽሐፉ es 3ª persona plural negada de ጸሐፈ ('escribir'). La construcción pasiva española 'ni están escritos' es idiomática para la doble negación con 'no somos investigados', usando 'ni' para enlazar las dos cláusulas negativas dentro de la cita. ኃጢአትነ ('nuestros pecados') confirma que la cita es en primera persona plural.
- source_word: ይጽሐፉ ሀለዉ
  english_pob_choice: are being written down
  chosen_spanish: están siendo escritos
  alternatives_spanish:
  - se están escribiendo
  - los están escribiendo
  - se escriben
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሀለዉ es el auxiliar de 3ª persona plural de ሀለወ ('estar/ser'), que forma el presente continuo con el imperfecto ይጽሐፉ. Una versión anterior confundió ሀለዉ con una interjección enfática ('he aquí'), error corregido en adjudicación. 'Están siendo escritos' preserva el aspecto continuo del registro celestial.
- source_word: ኵሎ ኃጢአትክሙ
  english_pob_choice: all your sins
  chosen_spanish: todos sus pecados
  alternatives_spanish:
  - todos vuestros pecados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'ኃጢአትክሙ es el genitivo de 2ª persona plural (''de ustedes''); ''sus pecados'' es la forma estándar latinoamericana neutra. Contrasta deliberadamente con ኃጢአትነ (''nuestros pecados'') dentro de la cita: los pecadores dicen ''nuestros'', pero el narrador les responde ''los de ustedes''.'
- source_word: በኵሉ ዕለት
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día a día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Frase distributiva que subraya el carácter continuo y exhaustivo del registro. 'Cada día' es natural y preciso en español; 'todos los días' sería igualmente válido pero levemente más coloquial.
theological_decisions:
- issue: Naturaleza del registro celestial de los pecados
  english_pob_reading: The verse speaks of an ongoing written record of the sinners' deeds before judgment.
  chosen_spanish_reading: todos sus pecados están siendo escritos cada día
  alternative_spanish_readings:
  - todos sus pecados quedan registrados cada día
  - se lleva cuenta de todos sus pecados cada día
  rationale: El verbo continuo ይጽሐፉ ሀለዉ y el marco apocalíptico de la Epístola de Enoc favorecen un registro celestial real y en curso, no meramente metafórico. 'Están siendo escritos' preserva el aspecto continuo y el motivo del libro judicial sin sobreexplicar la mecánica del registro. Se evita 'quedan registrados' porque aplana el dinamismo del presente continuo.
  doctrine_reference: Preservar la imagen apocalíptica del registro celestial; no aplanar las fórmulas de juicio en prosa genérica.
- issue: Tensión activo/pasivo en ኢትኅሥሡ dentro del discurso directo
  english_pob_reading: We are not sought out (passive, final POB revision)
  chosen_spanish_reading: No somos investigados
  alternative_spanish_readings:
  - ustedes no nos investigan (lectura activa, 2ª persona plural)
  - no se nos investiga
  rationale: La adjudicación gramatical (Gemini) argumentó que ኢትኅሥሡ es 2ª persona plural activa —los pecadores dirigiéndose a Dios o a los ángeles— lo que implicaría una acusación directa. La revisión final de la POB inglesa (azure-gpt-5.4) reconsideró y adoptó la voz pasiva para mantener la cita coherente en primera persona plural. El español sigue esa opción pero documenta la alternativa activa en la nota [a] porque la tensión gramatical no está resuelta (acuerdo 0,6 en la verificación cruzada).
  doctrine_reference: No borrar tensiones léxico-gramaticales documentadas; preservar la alternativa en nota.
translation_notes:
  revision_awareness: 'El borrador sigue el texto final de la POB inglesa tras tres pasadas de revisión. Correcciones integradas: (1) አንትሙ ኃጥኣን («ustedes, pecadores») es aposición externa al verbo ትብሉ, no parte de la cita —confirmado por adjudicación gramatical Gemini—; (2) ሀለዉ es auxiliar de presente continuo, no interjección, corrección aplicada en la segunda adjudicación; (3) la redacción final azure-gpt-5.4 reconsideró la lectura activa de ኢትኅሥሡ y adoptó la pasiva para coherencia en primera persona dentro de la cita. La verificación cruzada muestra acuerdo de 0,6 con veredicto «major-issues»: la ambigüedad activo/pasivo de ኢትኅሥሡ permanece documentada en la nota [a].'
  spanish_consistency_notes:
  - No aparecen el tetragramaton (יהוה) ni κύριος en este versículo; el parámetro de proyecto 'Yahvé' no aplica.
  - No hay terminología cristológica (Mesías/Cristo) en el pasaje.
  - ኃጥኣን ('pecadores') se traduce como 'pecadores', término estándar sin equivalente de proyecto que lo desplace.
  - El motivo del registro celestial ('están siendo escritos cada día') preserva la imagen apocalíptica sin aplanarla en prosa genérica, conforme a la decisión teológica de proyecto para fórmulas de juicio.
  - Se usan guillemets españoles (« ») para la cita directa, conforme a la convención tipográfica del español.
