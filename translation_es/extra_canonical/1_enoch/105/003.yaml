    reason: previous_rendering
  - marker: d
    text: La secuencia final es sintácticamente difícil. También podría entenderse con una relación algo distinta entre 'ayudaron' y 'te despojaron', pero el sentido básico de asistencia a los saqueadores se conserva.
    reason: alternative_reading
  revision_rationale: 'La revisión corrige tres puntos: (1) reemplaza ''se te hará visible'' por ''él te lo hará ver'' para seguir mejor la decisión auditada de revelación/manifiestación; (2) cambia ''entre'' por ''de'' en la cláusula judicial final para reflejar mejor el valor de procedencia o responsabilidad; y (3) reordena y corrige las notas para que cada marcador sea único y aparezca exactamente donde corresponde en el texto.'
