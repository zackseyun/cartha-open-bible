  to: Y en cuanto a tu clamor[a], clama, y él te lo hará ver[b]; porque toda tu aflicción será investigada de los ángeles[c] y de todos los que ayudaron a los que te despojaron[d].
  rationale: 'La revisión corrige tres puntos: (1) reemplaza ''se te hará visible'' por ''él te lo hará ver'' para seguir mejor la decisión auditada de revelación/manifiestación; (2) cambia ''entre'' por ''de'' en la cláusula judicial final para reflejar mejor el valor de procedencia o responsabilidad; y (3) reordena y corrige las notas para que cada marcador sea único y aparezca exactamente donde corresponde en el texto.'
