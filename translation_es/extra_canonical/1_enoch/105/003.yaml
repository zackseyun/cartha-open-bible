translation:
  language: es
  text: Y en cuanto a tu clamor[a], clama, y él te lo hará ver[b]; porque toda tu aflicción será investigada de los ángeles[c] y de todos los que ayudaron a los que te despojaron[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El original distingue un sustantivo relacionado con el clamor y un imperativo de clamar; en español se refleja con 'clamor' y 'clama'.
    reason: lexical_alternative
  - marker: b
    text: La cláusula 'él te lo hará ver' refleja un tramo difícil del ge'ez; también puede entenderse como 'te lo mostrará' o 'te lo revelará'.
    reason: lexical_alternative
  - marker: c
    text: O 'de entre los ángeles'.
    reason: previous_rendering
  - marker: d
    text: La secuencia final es sintácticamente difícil. También podría entenderse con una relación algo distinta entre 'ayudaron' y 'te despojaron', pero el sentido básico de asistencia a los saqueadores se conserva.
    reason: alternative_reading
lexical_decisions:
- source_word: ወጽራኅ / ጽርኁ
  english_pob_choice: and cry out
  chosen_spanish: clama / clamor
  alternatives_spanish:
  - grita / grito
  - clama en alta voz / clamor en alta voz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La evidencia auditada sugiere un sustantivo posesivo ('tu clamor') seguido de un imperativo ('clama'). En español conviene conservar ambos matices con un sustantivo y un verbo de proclamación intensa, sin suavizarlo a mera oración privada.
- source_word: ዚአክሙ
  english_pob_choice: your / on your behalf
  chosen_spanish: tu
  alternatives_spanish:
  - de ustedes
  - vuestro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El posesivo se refiere directamente a los destinatarios. 'Tu' mantiene la relación textual inmediata en singular genérico colectivo, habitual en español bíblico.
- source_word: ኵነኒ
  english_pob_choice: he will make it known / show / reveal
  chosen_spanish: se te hará visible
  alternatives_spanish:
  - se te hará conocido
  - se te revelará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La tradición auditada considera esta forma difícil y la relaciona con una acción de manifestación/disclosure. 'Se te hará visible' conserva la idea de aparecer o manifestarse sin forzar una glosa más específica que el texto no asegura.
- source_word: ወያስተርኢ
  english_pob_choice: and he will make it known / show / reveal
  chosen_spanish: se te hará visible
  alternatives_spanish:
  - y se te revelará
  - y se te mostrará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el campo semántico de revelación/manifestación. En español, el pasivo reflejo evita introducir un sujeto explícito no garantizado por el tramo griego/etéope problemático.
- source_word: እስመ
  english_pob_choice: for / because / since
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce la razón de la promesa anterior. 'Porque' es el equivalente natural y transparente en español.
- source_word: መላእክት
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  - gobernantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque hay una discusión lexical contextual, el marco apocalíptico de 1 Enoc favorece 'ángeles'. Se conserva el término celestial sin borrar la tensión interpretativa, que queda indicada en nota.
- source_word: ይትኃሠሥ
  english_pob_choice: will be sought out
  chosen_spanish: será investigada
  alternatives_spanish:
  - será buscada
  - será indagada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede expresar búsqueda/investigación. Dado el contexto de ajuste y examen, 'será investigada' comunica mejor el tono judicial-apocalíptico que 'será buscada'.
- source_word: ኵሉ ምንዳቤክሙ
  english_pob_choice: all your affliction
  chosen_spanish: toda tu aflicción
  alternatives_spanish:
  - todo tu sufrimiento
  - toda tu opresión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Aflicción'' conserva la amplitud del término sin reducirlo solo a persecución externa o a dolor interior.'
- source_word: እለ አርደእዎሙ
  english_pob_choice: those who helped
  chosen_spanish: los que ayudaron
  alternatives_spanish:
  - los que asistieron
  - los que socorrieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige la lectura previa: el verbo significa ayudar/asistir. ''Ayudaron'' es el equivalente directo y sobrio en español.'
- source_word: ለእለ የሀይዱክሙ
  english_pob_choice: those who plundered you
  chosen_spanish: a los que te despojaron
  alternatives_spanish:
  - a los que te saquearon
  - a los que te robaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada identifica el verbo como 'robar/despojar/plunder'. 'Despojaron' conserva fuerza formal y evita estrechar el sentido a un saqueo puramente militar.
theological_decisions:
- issue: Cómo resolver la forma difícil ኵነኒ / ወያስተርኢ sin introducir 'juicio'
  english_pob_reading: he will make it known / reveal it to you
  chosen_spanish_reading: se te hará visible
  alternative_spanish_readings:
  - se te revelará
  - se te mostrará
  rationale: La revisión reciente descartó 'juicio' por falta de apoyo suficiente en el tramo recuperado. En español, la forma impersonal pasiva conserva la revelación sin imponer un sujeto o un objeto demasiado definidos.
  doctrine_reference: Primacía del texto fuente y cautela ante lecturas no aseguradas; preservar la incertidumbre cuando el original es difícil.
- issue: Valor de መላእክት en este contexto
  english_pob_reading: angels
  chosen_spanish_reading: ángeles
  alternative_spanish_readings:
  - mensajeros
  - gobernantes
  rationale: Aunque existe una alternativa 'gobernantes' señalada en el aparato de revisión, el contexto de 1 Enoc y el audit trail reciente apoyan 'ángeles'. Se mantiene la lectura celestial sin negar la discusión léxica.
  doctrine_reference: Mantener el imaginario apocalíptico propio de 1 Enoc; la decisión se toma por contexto literario y no por traducción eclesiástica convencional.
- issue: Cómo expresar la secuencia final sin borrar su ambigüedad
  english_pob_reading: from all those who helped those who plundered you
  chosen_spanish_reading: entre todos los que ayudaron a los que te despojaron
  alternative_spanish_readings:
  - de entre todos los que ayudaron a los que te despojaron
  - entre todos los que ayudaron y te despojaron
  rationale: La frase final se conserva con una sintaxis transparente en español, evitando resolver por completo la relación exacta entre 'ayudaron' y 'despojaron'. Esto respeta la tensión textual del pasaje.
  doctrine_reference: Preferir transparencia y tensión textual antes que una armonización interpretativa no garantizada.
translation_notes:
  revision_awareness: 'La draft anterior fue corregida por dos problemas principales: introducía ''juicio'' sin apoyo suficiente y mal leía tanto el valor de መላእክት como la relación verbal del final. Esta versión alinea el texto español con la revisión reciente: elimina ''juicio'', mantiene ''ángeles'' como lectura principal, recupera ''ayudaron'' y ''despojaron'', y expresa la manifestación con un pasivo reflejo prudente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el pasaje lo exija; aquí no aparece el Tetragrámaton.
  - '''Ángeles'' se conserva como término celestial principal; la nota reconoce la alternativa léxica sin trasladarla al cuerpo del texto.'
  - Se evita 'SEÑOR' y se mantiene un registro apocalíptico sobrio.
  - La combinación de 'clamor' y 'clama' preserva la duplicación semántica del original sin literalismo torpe.
  - '''Despojaron'' se eligió por su fuerza y amplitud frente a ''robaron'' o ''saquearon''.'
