translation:
  language: es
  text: Y a él le pertenece la primera palabra[a]; bendecirán, exaltarán y alabarán[b] con sabiduría, y serán sabios en palabra y en el espíritu de vida[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el comienzo de la palabra».
    reason: lexical_alternative
  - marker: b
    text: O «alabarán en sabiduría»; la preposición puede expresar modo o medio.
    reason: alternative_reading
  - marker: c
    text: O «actuarán sabiamente en palabra y en el aliento de vida». La frase final es difícil en esta sección preservada solo en ge'ez de las Parábolas.
    reason: alternative_reading
lexical_decisions:
- source_word: ወለዉእቱ
  english_pob_choice: And to him belongs
  chosen_spanish: Y a él le pertenece
  alternatives_spanish:
  - Y a él pertenece
  - Y para él es
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción indica dativo de pertenencia o asignación, no una preposición local. «Le pertenece» expresa con naturalidad en español la relación de posesión/asignación preservada por el audit trail inglés.
- source_word: መቅድመ ቃለ
  english_pob_choice: the first word
  chosen_spanish: la primera palabra
  alternatives_spanish:
  - el comienzo de la palabra
  - la voz primera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa rechazó «beginning of speech» como demasiado pesado y prefirió una expresión más directa. En español, «la primera palabra» transmite mejor esa misma lectura de መቅድመ ቃለ sin forzar una frase abstracta.
- source_word: ይባርኩ
  english_pob_choice: they shall bless
  chosen_spanish: ellos bendecirán
  alternatives_spanish:
  - ellos alabarán con bendición
  - ellos darán bendición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Bendecirán» conserva el valor doxológico/cultual del verbo y es idiomático en español eclesial sin diluirse en una paráfrasis.
- source_word: ያሌዕሉ
  english_pob_choice: they shall exalt
  chosen_spanish: exaltarán
  alternatives_spanish:
  - levantarán en alto
  - magnificarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Exaltarán» mantiene el registro elevado y el paralelismo con «bendecirán» y «alabarán».
- source_word: ይሴብሑ
  english_pob_choice: praise
  chosen_spanish: alabarán
  alternatives_spanish:
  - glorificarán
  - celebrarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Alabarán» es la equivalencia más directa y natural para el verbo de alabanza en esta tríada litúrgica.
- source_word: በጥበብ
  english_pob_choice: with wisdom / in wisdom
  chosen_spanish: con sabiduría
  alternatives_spanish:
  - en sabiduría
  - sabia y prudentemente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición ge'ez admite un matiz instrumental o modal. «Con sabiduría» reproduce bien ese matiz sin convertir la abstracción en un adverbio excesivamente libre.
- source_word: ይጠብቡ
  english_pob_choice: they shall be wise
  chosen_spanish: serán sabios
  alternatives_spanish:
  - actuarán sabiamente
  - tendrán sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el enlace con ጥበብ en la línea anterior, «serán sabios» preserva la relación léxica que el inglés audita como importante.
- source_word: በነገር
  english_pob_choice: in word / in speech
  chosen_spanish: en palabra
  alternatives_spanish:
  - en discurso
  - en habla
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto paralelo a «el espíritu de vida», «palabra» conserva la densidad semántica y la cohesión con la frase anterior mejor que «habla» o «discurso».
- source_word: መንፈሰ ሕይወት
  english_pob_choice: the spirit of life
  chosen_spanish: el espíritu de vida
  alternatives_spanish:
  - el soplo de vida
  - el aliento de vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene «espíritu» para conservar la resonancia teológica señalada por el audit trail inglés, sin resolver la ambigüedad hacia una lectura fisiológica.
theological_decisions:
- issue: 'Ambigüedad de መንፈሰ ሕይወት: ¿‘espíritu’ o ‘soplo/aliento’?'
  english_pob_reading: the spirit of life
  chosen_spanish_reading: el espíritu de vida
  alternative_spanish_readings:
  - el soplo de vida
  - el aliento de vida
  rationale: En este contexto celestial de alabanza, la frase puede sugerir más que mera respiración. Se conserva la tensión teológica sin neutralizarla, siguiendo la decisión inglesa.
  doctrine_reference: Preservar la tensión teológica y evitar una desambiguación no garantizada por el texto.
translation_notes:
  revision_awareness: El texto español sigue la última revisión inglesa, que corrigió una mala lectura sintáctica y prefirió «the first word» para መቅድመ ቃለ. Por eso se evita cualquier giro de tipo «antes de él» o «con la voz», que el expediente de revisión marcó como erróneo. También se conserva la decisión de no resolver definitivamente la ambigüedad de መንፈሰ ሕይወት, manteniendo «espíritu de vida».
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando el texto lo requiera, pero este versículo no contiene el nombre divino.
  - Se mantiene «sabiduría»/«sabios» para reflejar la conexión léxica interna con ጥበብ.
  - Se evita «Cristo» y otra terminología cristiana no presente en el original.
  - La sintaxis española conserva el paralelismo de tres verbos de alabanza seguido de dos complementos instrumentales/locales.
  - No se introduce lenguaje eclesiástico extra como «glorificar» o «bendición» donde el español simple ya expresa adecuadamente el sentido.
