base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/061/009.yaml
  text: And when he lifts up his face to judge their hidden ways by the word of the name of the Lord of Spirits[a], and their conduct by the path of righteousness of the Lord of Spirits, then all of them will speak with one voice[d][c][b], and they will bless and praise and exalt and sanctify the name of the Lord of Spirits.
  footnotes:
  - marker: a
    text: 'Or ''their secret ways.'' The image is moral and judicial: their courses of life, though hidden, are exposed to judgment.'
    reason: lexical_alternative
  - marker: b
    text: The Ge'ez phrase rendered 'by the word of the name of the Lord of Spirits' is difficult. It may mean by the utterance, authority, or command associated with the divine name.
    reason: alternative_reading
  - marker: c
    text: The verb rendered 'he sets them' is uncertain in this line as transmitted by the Ethiopic witness; the sense appears to be that they are established or directed onto the path of righteousness.
    reason: textual_variant
  - marker: d
    text: Or 'and he sets them on the path of righteousness'.
    reason: previous_rendering
