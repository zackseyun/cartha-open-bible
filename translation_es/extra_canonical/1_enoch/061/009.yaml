translation:
  language: es
  text: Y cuando alce su rostro para juzgar sus caminos ocultos[a] por la palabra del nombre del Señor de los Espíritus[b], y su conducta por la senda de justicia del Señor de los Espíritus, entonces todos hablarán con una sola voz, y bendecirán y alabarán y exaltarán y santificarán el nombre del Señor de los Espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «sus sendas secretas». La imagen es moral y judicial: sus cursos de vida, aunque ocultos, quedan expuestos al juicio.'
    reason: lexical_alternative
  - marker: b
    text: La construcción ge'ez es difícil. Puede entenderse como la palabra, la autoridad o el mandato asociado al Nombre divino.
    reason: alternative_reading
lexical_decisions:
- source_word: ያሌዕል ገጾ
  english_pob_choice: he lifts up his face
  chosen_spanish: alce su rostro
  alternatives_spanish:
  - levante su rostro
  - alce su semblante
  - mire alzando el rostro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la imagen corporal solemne sin volverla una paráfrasis genérica. En español, «alzar el rostro» comunica la acción formal y judicial con naturalidad.
- source_word: ይኰንን
  english_pob_choice: to judge
  chosen_spanish: juzgar
  alternatives_spanish:
  - hacer juicio sobre
  - condenar
  - gobernar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto forense-apocalíptico pide «juzgar»; conserva la evaluación judicial sin adelantar necesariamente condena.
- source_word: ፍኖቶሙ እንተ ኅቡእ
  english_pob_choice: their hidden ways
  chosen_spanish: sus caminos ocultos
  alternatives_spanish:
  - sus sendas ocultas
  - sus vías secretas
  - sus caminos secretos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Caminos» conserva la metáfora moral de conducta; «ocultos» refleja lo que está escondido y sujeto a juicio.
- source_word: በነገረ ስሙ
  english_pob_choice: by the word of the name
  chosen_spanish: por la palabra del nombre
  alternatives_spanish:
  - por la orden del nombre
  - por la proclamación del nombre
  - por la autoridad del nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase ge'ez es difícil; se conserva su textura con una traducción transparente. «Palabra del nombre» evita suavizar la construcción y deja visible la solemnidad vinculada al Nombre divino.
- source_word: እግዚአ መናፍስት
  english_pob_choice: Lord of Spirits
  chosen_spanish: Señor de los Espíritus
  alternatives_spanish:
  - Señor de Espíritu
  - Señor de las Espiritudes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título en forma establecida y reverente, con artículo español natural. La mayúscula en «Espíritus» preserva el carácter titular.
- source_word: አሰረ
  english_pob_choice: he sets them
  chosen_spanish: su conducta
  alternatives_spanish:
  - sus pasos
  - los establece
  - los dirige
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión más reciente del audit trail muestra que el término no funciona como verbo con objeto, sino como sustantivo en paralelo con «caminos ocultos». Por eso se refleja como el segundo objeto de juicio: «su conducta».'
- source_word: በፍኖተ ጽድቅ
  english_pob_choice: on the path of righteousness
  chosen_spanish: por la senda de justicia
  alternatives_spanish:
  - por la senda de rectitud
  - en la senda de justicia
  - por el camino de justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Senda» suena natural en español y retiene el paralelo con «caminos». Se eligió «justicia» para conservar el alcance moral y forense de ጽድቅ, que aquí no es solo virtud interior sino norma recta ante Dios.
- source_word: በ፩ቃል
  english_pob_choice: with one voice
  chosen_spanish: con una sola voz
  alternatives_spanish:
  - con una voz
  - a una voz
  - en una sola voz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la unidad coral del original sin perder claridad idiomática.
- source_word: ይባርኩ ወይሴብሑ ወያሌዕሉ ወይቄድሱ
  english_pob_choice: they will bless and praise and exalt and sanctify
  chosen_spanish: bendecirán y alabarán y exaltarán y santificarán
  alternatives_spanish:
  - bendecirán y glorificarán y exaltarán y santificarán
  - bendecirán y alabarán y ensalzarán y santificarán
  - bendecirán y alabarán y elevarán y santificarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la serie cuádruple sin comprimirla. «Santificarán» mantiene la fuerza cultual y bíblica de ይቄድሱ.
theological_decisions:
- issue: Sujetos singulares implícitos de las acciones («he lifts up», «he judges» y la posible continuación)
  english_pob_reading: Retain the singular 'he' without identifying the referent in the main text.
  chosen_spanish_reading: Mantener el singular implícito («alce») sin identificar al sujeto en el texto principal.
  alternative_spanish_readings:
  - el Señor de los Espíritus alce
  - el Elegido alce
  - él alce
  rationale: El testimonio ge'ez conserva acción singular pero no restituye explícitamente el sujeto en este versículo. Como el referente depende del contexto amplio de las Parábolas, la traducción no lo fija dogmáticamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: La frase instrumental «por la palabra del nombre»
  english_pob_reading: Render it transparently as an instrumental phrase tied to divine authority.
  chosen_spanish_reading: Traducirla de manera transparente como una expresión de autoridad ligada al Nombre divino.
  alternative_spanish_readings:
  - por la orden del nombre
  - por la proclamación del nombre
  - por la autoridad del nombre
  rationale: La sintaxis ge'ez es difícil; se prefiere una versión visible y auditable antes que una paráfrasis que borre la estructura. El nombre divino conserva su peso de autoridad.
  doctrine_reference: Cuando el sentido es incierto, preferir transparencia más nota que falsa precisión.
- issue: El valor de ጽድቅ en «por la senda de justicia»
  english_pob_reading: path of righteousness
  chosen_spanish_reading: «justicia» con matiz de rectitud moral y forense.
  alternative_spanish_readings:
  - rectitud
  - justicia recta
  - integridad
  rationale: En el marco apocalíptico, ጽድቅ abarca rectitud moral y conformidad con el orden de Dios; «justicia» mantiene ambos aspectos y suena más bíblico en español.
  doctrine_reference: Conservar el valor ético y judicial del término sin reducirlo a moralismo.
translation_notes:
  revision_awareness: 'El audit trail inglés registra una corrección reciente importante: la frase ge''ez አሰረ ዚአሆሙ ya no debe entenderse como verbo «poner/establecer», sino como un sintagma nominal paralelo a «sus caminos ocultos». La versión española sigue esa revisión y evita la lectura errónea de «los pone en la senda de justicia».'
  spanish_consistency_notes:
  - Se conserva «Señor de los Espíritus» para mantener coherencia con la terminología POB ya establecida en 1 Enoc.
  - Se usa «justicia» para ጽድቅ, con nota de rectitud moral y forense, para no debilitar el campo semántico.
  - Se traduce በ፩ቃል como «con una sola voz» para naturalidad española y fidelidad al sentido coral.
  - No se introduce «Cristo» ni «SEÑOR» como máscara; el título se renderiza explícitamente según la política del proyecto.
