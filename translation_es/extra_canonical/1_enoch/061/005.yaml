revisions:
- from: Y estas revelarán todas las cosas escondidas en las profundidades de la tierra[a], y a los que fueron destruidos en el desierto, y a los que fueron devorados por las bestias salvajes, y a los que fueron devorados por los peces del mar, para que regresen y sean fortalecidos en el día del Elegido[b]; porque nadie perecerá delante del Señor de los Espíritus[c][d], y nadie puede ser destruido.
  to: Y estas revelarán todas las cosas escondidas en las profundidades de la tierra, y a los que fueron destruidos en el desierto, y a los que fueron devorados por las bestias salvajes, y a los que fueron devorados por los peces del mar, para que regresen y sean fortalecidos[a] en el día del Escogido[b]; porque nadie perecerá ante el Señor de los Espíritus[c][d], y nadie puede ser destruido.
  rationale: 'Se conserva la traducción base porque es sustancialmente fiel, pero se corrigen dos puntos para alinearla con la evidencia auditada: la nota léxica se mueve al verbo difícil ''sean fortalecidos'' y se rehace según el POB inglés, y el título se ajusta a ''el Escogido'' para reflejar mejor ''Chosen One'' como título local de las Parábolas. También se pule ''delante de'' a ''ante'' por naturalidad española sin cambiar el sentido.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:07:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del ge''ez y del POB inglés: revelación de lo oculto, catálogo de los muertos perdidos, retorno/restauración en el día del título escatológico, y cierre con la imposibilidad de perecer ante el Señor de los Espíritus. Sin embargo, hay dos desajustes importantes: el título ኅሩይ se tradujo como ''el Elegido'' cuando el proyecto pide normalmente ''el Escogido'' o mejor ''el Elegido/El Escogido'' solo si está documentado; aquí conviene alinearlo con la decisión inglesa ''Chosen One'' mediante ''el Escogido'' o ''el Elegido''. Más importante aún, la nota [a] no corresponde al problema léxico documentado en el POB inglés: allí la dificultad está en ይትመረጐዙ (''sean fortalecidos/sostenidos/reunidos''), no en ''las cosas escondidas''.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. 'En las profundidades de la tierra', 'fueron devorados', y 'nadie puede ser destruido' funcionan bien. Puede mejorarse la fluidez sustituyendo algunos 'y a los que' repetidos por una secuencia más tersa, pero no es necesario. 'Delante del Señor de los Espíritus' es comprensible, aunque 'ante' suena un poco más natural y solemne en español bíblico moderno.
  glossary_alignment: 'No hay conflicto con Yahvé, Mesías, Cristo, etc. ''Señor de los Espíritus'' preserva correctamente el título en 1 Enoc. El punto terminológico principal es ኅሩይ: para seguir de cerca ''Chosen One'' y la rationale teológica del POB, ''el Escogido'' es una opción más transparente que ''el Elegido'', aunque ''el Elegido'' no es erróneo. También debe corregirse la nota léxica para que se ancle a ''sean fortalecidos[a]'' y recoja las alternativas ''sean sostenidos'' o ''sean reunidos''.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada y redactada para el segmento equivocado.
    rationale: El POB inglés documenta la dificultad léxica en ይትመረጐዙ ('be supported/upheld/gathered together'), no en ኅቡኣተ ('the hidden things'). La nota española actual altera la evidencia auditada.
  - severity: medium
    issue: El título 'el Elegido' no sigue de la manera más fiel la decisión titulada 'Chosen One'.
    rationale: Aunque 'Elegido' es posible, 'Escogido' reproduce mejor el matiz de 'Chosen One' sin sonar eclesiástico ni introducir asociaciones distintas. Es un ajuste terminológico menor, no una mistraducción grave.
  - severity: low
    issue: La colocación de notas [c][d] después de 'Señor de los Espíritus' es aceptable pero podría ordenarse mejor con la nota del título escatológico antes en el verso.
    rationale: No es un error, pero conviene que las notas sigan la secuencia del texto y que cada una corresponda claramente a su frase ancla.
  revised_spanish_text: Y estas revelarán todas las cosas escondidas en las profundidades de la tierra, y a los que fueron destruidos en el desierto, y a los que fueron devorados por las bestias salvajes, y a los que fueron devorados por los peces del mar, para que regresen y sean fortalecidos[a] en el día del Escogido[b]; porque nadie perecerá ante el Señor de los Espíritus[c][d], y nadie puede ser destruido.
  revised_footnotes:
