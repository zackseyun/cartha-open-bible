base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/061/005.yaml
  text: And these shall reveal all the hidden things in the depths of the earth[a], and those who were destroyed in the wilderness, and those who were devoured by wild beasts, and those who were devoured by the fish of the sea, so that they may return and be strengthened on the day of the Chosen One; for none shall perish before the Lord of Spirits[d][c][b], and none can be destroyed.
  footnotes:
  - marker: a
    text: The verb rendered 'be supported' is difficult; it may also be understood as 'be upheld' or possibly 'be gathered together.'
    reason: lexical_alternative
  - marker: b
    text: '''The Chosen One'' is a title used in the Parables for the eschatological figure associated with judgment and vindication.'
    reason: cross_reference
  - marker: c
    text: The final clause is compressed in Ge'ez. The sense is that no one can finally perish in the presence of the Lord of Spirits.
    reason: textual_variant
  - marker: d
    text: Or 'And these shall reveal'.
    reason: previous_rendering
