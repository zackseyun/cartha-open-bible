    reason: textual_variant
  - marker: d
    text: 'O: ''Y estas revelarán''.'
    reason: previous_rendering
  revision_rationale: 'Se conserva la traducción base porque es sustancialmente fiel, pero se corrigen dos puntos para alinearla con la evidencia auditada: la nota léxica se mueve al verbo difícil ''sean fortalecidos'' y se rehace según el POB inglés, y el título se ajusta a ''el Escogido'' para reflejar mejor ''Chosen One'' como título local de las Parábolas. También se pule ''delante de'' a ''ante'' por naturalidad española sin cambiar el sentido.'
