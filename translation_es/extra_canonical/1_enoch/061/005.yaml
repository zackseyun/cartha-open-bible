translation:
  language: es
  text: Y estas revelarán todas las cosas escondidas en las profundidades de la tierra, y a los que fueron destruidos en el desierto, y a los que fueron devorados por las bestias salvajes, y a los que fueron devorados por los peces del mar, para que regresen y sean fortalecidos[a] en el día del Escogido[b]; porque nadie perecerá ante el Señor de los Espíritus[c][d], y nadie puede ser destruido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo es difícil; también puede entenderse como 'sean sostenidos' o posiblemente 'sean reunidos'.
    reason: lexical_alternative
  - marker: b
    text: '''El Escogido'' es un título usado en las Parábolas para la figura escatológica asociada con juicio y vindicación.'
    reason: cross_reference
  - marker: c
    text: La cláusula final es compacta en ge'ez; el sentido es que nadie puede finalmente ser destruido en presencia del Señor de los Espíritus.
    reason: textual_variant
  - marker: d
    text: 'O: ''Y estas revelarán''.'
    reason: previous_rendering
lexical_decisions:
- source_word: እሉ
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - ellas
  - éstas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el deíctico para mantener la referencia a los agentes mencionados antes. 'Estas' es natural en español y preserva la cercanía textual.
- source_word: ይከሥቱ
  english_pob_choice: shall reveal
  chosen_spanish: revelarán
  alternatives_spanish:
  - descubrirán
  - manifestarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Revelarán'' conserva el sentido apocalíptico de hacer manifiesto lo oculto, sin perder el tono futuro del verbo.'
- source_word: ኅቡኣተ
  english_pob_choice: the hidden things
  chosen_spanish: todas las cosas escondidas
  alternatives_spanish:
  - las cosas ocultas
  - todo lo escondido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural se expresa con claridad como 'las cosas escondidas'. Se añadió 'todas' por el alcance total del objeto directo en el contexto de la enumeración.
- source_word: ለዕመቀ ምድር
  english_pob_choice: in the depths of the earth
  chosen_spanish: en las profundidades de la tierra
  alternatives_spanish:
  - en la profundidad de la tierra
  - en los abismos de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Profundidades'' es el plural idiomático más natural en español y conserva la imaginería subterránea del original.'
- source_word: ተኃጕሉ
  english_pob_choice: were destroyed
  chosen_spanish: fueron destruidos
  alternatives_spanish:
  - perecieron
  - fueron consumidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la fuerza pasiva violenta del verbo con 'fueron destruidos', evitando suavizar el término.
- source_word: እምበድው
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto salvaje
  - en la soledad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque 'wilderness' puede traducirse como 'desierto', en español es la forma más transparente y natural para un registro bíblico-apocalíptico.
- source_word: እምአራዊት
  english_pob_choice: by wild beasts
  chosen_spanish: por las bestias salvajes
  alternatives_spanish:
  - por fieras
  - por animales salvajes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Bestias salvajes'' conserva el registro elevado del conjunto y la violencia implícita del ataque.'
- source_word: እምዓሣ ባሕር
  english_pob_choice: by the fish of the sea
  chosen_spanish: por los peces del mar
  alternatives_spanish:
  - por los peces del mar abierto
  - por los peces marinos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se respeta la construcción directa y acumulativa del listado, con una formulación clara en español.
- source_word: ከመ ይግብኡ
  english_pob_choice: so that they may return
  chosen_spanish: para que regresen
  alternatives_spanish:
  - para que vuelvan
  - a fin de que regresen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La finalidad/resolución del giro se expresa de modo natural con 'para que regresen', manteniendo la idea de restauración.
- source_word: ይትመረጐዙ
  english_pob_choice: be strengthened
  chosen_spanish: sean fortalecidos
  alternatives_spanish:
  - sean sostenidos
  - sean apoyados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sean fortalecidos'' recoge mejor la revisión inglesa más reciente y da una solución clara y digna en español, evitando una paráfrasis demasiado abierta.'
- source_word: በዕለተ ኅሩይ
  english_pob_choice: on the day of the Chosen One
  chosen_spanish: en el día del Elegido
  alternatives_spanish:
  - en el día del Elegido de Dios
  - en el día del Escogido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Elegido'' conserva el título sin imponer una cristología posterior; en español suena más natural que ''el Chosen One'' literalizado o ''Electo'' en este contexto.'
- source_word: አልቦቱ ዘይትኃጐል
  english_pob_choice: none shall perish
  chosen_spanish: nadie perecerá
  alternatives_spanish:
  - ninguno perecerá
  - no habrá quien perezca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La negación absoluta se expresa con un castellano llano y fuerte, adecuado al tono escatológico.
- source_word: በቅድመ እግዚአ መናፍስት
  english_pob_choice: before the Lord of Spirits
  chosen_spanish: delante del Señor de los Espíritus
  alternatives_spanish:
  - en presencia del Señor de los Espíritus
  - ante el Señor de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Delante de'' mantiene la dimensión de presencia/jucio del original y conserva el título tradicional propio de 1 Enoc.'
- source_word: ወአልቦ ዘይክል ተኃጕሎተ
  english_pob_choice: and none can be destroyed
  chosen_spanish: y nadie puede ser destruido
  alternatives_spanish:
  - y ninguno puede perecer
  - y no hay nadie que pueda ser destruido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión más reciente del inglés POB, que entendió el final como una imposibilidad general de destrucción/perdición; en español 'ser destruido' preserva la resonancia con el verbo anterior.
theological_decisions:
- issue: Restauración/resurrección de los muertos perdidos en distintos ámbitos
  english_pob_reading: The verse speaks of those lost in earth, wilderness, beasts, and sea being restored on the eschatological day associated with the Chosen One.
  chosen_spanish_reading: El versículo presenta a los perdidos en la tierra, el desierto, las bestias y el mar como restaurados en el día del Elegido.
  alternative_spanish_readings:
  - Solo se describen restos ocultos que serán expuestos para juicio.
  - La frase podría referirse a reunir sobrevivientes, no a resucitar muertos.
  rationale: La lista acumulativa y la finalidad de 'regresen' / 'sean fortalecidos' favorecen una lectura de restauración escatológica, no solo de descubrimiento de cadáveres.
  doctrine_reference: Mantener la imaginería apocalíptica y la tensión teológica sin reducirla a prosa general.
- issue: Título ኅሩይ en español
  english_pob_reading: Chosen One
  chosen_spanish_reading: Elegido
  alternative_spanish_readings:
  - Electo
  - Escogido
  rationale: '''Elegido'' preserva el valor titular con un español claro y evita una cristologización automática que el propio contexto de 1 Enoc aún no exige en esta línea.'
  doctrine_reference: Conservar el peso local del título antes de armonizarlo con usos posteriores.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se evitó introducir ''measures'', se prefirió una forma plural natural para ''depths'', se adoptó ''be strengthened'' en vez de una solución más débil, y se reflejó la clausula final como imposibilidad de destrucción. La traducción española sigue esa línea, pero ajusta el título final a una forma natural y transparente en español (''Elegido'') y mantiene la fuerza de ''destrucción'' en la última negación.'
  spanish_consistency_notes:
  - Se mantiene 'Señor de los Espíritus' como equivalente estable del título divino del pasaje.
  - No se usa 'Cristo' para el título ኅሩይ, para no imponer una equivalencia doctrinal posterior sin apoyo inmediato del texto.
  - Se conserva el registro apocalíptico y la enumeración acumulativa sin suavizar el lenguaje de destrucción.
  - La frase 'del día del Elegido' se usa de forma titular, no meramente descriptiva.
