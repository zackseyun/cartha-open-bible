translation:
  language: es
  text: 'Y me dijo el ángel que iba conmigo: «Estas son las medidas[a] de los justos y las cuerdas de los justos; vendrán a los justos[b], para que se apoyen[c] en el nombre de Yahvé de los Espíritus por los siglos de los siglos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «medidas» traduce el sustantivo ge'ez en sentido metrológico; también puede entenderse como «medida» o «plenitud», pero no como «abundancia».
    reason: lexical_alternative
  - marker: b
    text: El verbo ge'ez está en imperfecto; por eso se traduce «vendrán», no «han venido».
    reason: textual_variant
  - marker: c
    text: También puede entenderse como «confíen», «se sostengan» o «descansen» en el nombre de Yahvé de los Espíritus.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዘምስሌየ የሐውር
  english_pob_choice: who went with me
  chosen_spanish: que iba conmigo
  alternatives_spanish:
  - que fue conmigo
  - que caminaba conmigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la fórmula del ángel acompañante en un español natural. 'Iba conmigo' conserva la idea de acompañamiento sin forzar un calco.
- source_word: እሙንቱ
  english_pob_choice: these are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estos son
  - Son estas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La deixis apunta a realidades visibles en la visión; 'Estas son' identifica con claridad los elementos mostrados.
- source_word: እምጣነ ጻድቃን
  english_pob_choice: from the abundance / measures of the righteous
  chosen_spanish: las medidas de los justos
  alternatives_spanish:
  - la medida de los justos
  - las plenitudes de los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indica que no es una preposición 'de/desde' sino el sustantivo 'medida'. En español, 'medidas' preserva el sentido metrológico del contexto inmediato.
- source_word: ማእሰረ ጻድቃን
  english_pob_choice: the cords of the righteous
  chosen_spanish: las cuerdas de los justos
  alternatives_spanish:
  - los cordeles de los justos
  - los vínculos de los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión corrige la lectura anterior: el término refiere a cuerdas/cordeles, no a almacenes. ''Cuerdas'' es la correspondencia más directa y mantiene la imagen de medición.'
- source_word: ይመጽኡ ለጻድቃን
  english_pob_choice: will come to the righteous
  chosen_spanish: vendrán a los justos
  alternatives_spanish:
  - vienen a los justos
  - serán llevadas a los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El imperfecto ge''ez se refleja mejor con futuro en español: todavía no han llegado, sino que vendrán. Mantiene el movimiento hacia los justos.'
- source_word: ከመ ይትመረጐዙ
  english_pob_choice: so that they may rely on
  chosen_spanish: para que se apoyen
  alternatives_spanish:
  - para que confíen
  - para que se apoyen en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite la idea de apoyarse/ser sostenidos. En español, 'se apoyen' conserva la metáfora corporal de dependencia y soporte, acorde con el contexto de cuerdas y medida.
- source_word: ስሙ ለእግዚአ መናፍስት
  english_pob_choice: the name of the Lord of Spirits
  chosen_spanish: el nombre del Señor de los Espíritus
  alternatives_spanish:
  - el nombre del Señor de espíritu
  - el nombre del Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título en su forma establecida en el corpus enóquico, con mayúsculas reverenciales en 'Espíritus' para reflejar el título divino.
- source_word: ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre
  - por la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula idiomática española tradicional comunica bien la perpetuidad solemne del giro semítico sin perder registro litúrgico.
theological_decisions:
- issue: Relación entre 'medidas' y 'cuerdas' como provisión para los justos
  english_pob_reading: The verse speaks of measured/apportioned realities and cords associated with the righteous, arriving for their benefit.
  chosen_spanish_reading: El versículo presenta medidas y cuerdas vinculadas con los justos, que vendrán a ellos como parte de la escena visionaria.
  alternative_spanish_readings:
  - Habla de abundancia y almacenes de los justos
  - Habla solo de instrumentos de medición sin referencia a los justos como receptores
  rationale: 'La revisión textual corregida obliga a abandonar la lectura de ''abundancia/storehouses''. La frase conserva la tensión: los elementos pertenecen a ''los justos'' y además ''vendrán a los justos'', sin resolver más de lo que el texto permite.'
  doctrine_reference: Preservar la tensión textual según la revisión crítica y no armonizarla con una interpretación ajena al pasaje.
- issue: Sentido de 'se apoyen' en el nombre divino
  english_pob_reading: The final clause emphasizes reliance, leaning, support, or trust in the divine name.
  chosen_spanish_reading: '''se apoyen'' conserva la metáfora de sostén/dependencia, sin reducirla únicamente a ''creer''.'
  alternative_spanish_readings:
  - para que confíen en
  - para que descansen en
  - para que se sostengan en
  rationale: El contexto de cuerdas y medida favorece una imagen de soporte físico-figurativo. 'Apoyarse' deja abierta la gama de dependencia, confianza y sostén.
  doctrine_reference: Mantener la ambigüedad semántica del verbo sin cerrar indebidamente su alcance.
translation_notes:
  revision_awareness: 'Se revisó la lectura previa y se adoptó la corrección textual indicada por la adjudicación: እምጣነ y ማእሰረ no significan ''abundancia'' ni ''almacenes'', sino ''medidas'' y ''cuerdas''. También se ajustó ይመጽኡ como futuro (''vendrán'') en lugar de perfecto. La versión española refleja esa revisión crítica.'
  spanish_consistency_notes:
  - Se mantuvo 'Señor de los Espíritus' como título fijo del corpus enóquico.
  - Se prefirió 'justos' para conservar el término bíblico estable, aunque 'rectos' también sería posible en otros contextos.
  - Se evitó 'SEÑOR' como sustituto automático del nombre divino; aquí se conserva el título transmitido por la tradición enóquica en español.
  - La puntuación y la sintaxis buscan una lectura pública fluida sin eliminar la imaginería de medición y soporte.
