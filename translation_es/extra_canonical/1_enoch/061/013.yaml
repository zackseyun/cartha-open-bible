translation:
  language: es
  text: Porque abundante es la misericordia del Señor de los espíritus, y tarda en airarse[c]; y todas sus obras y toda la medida[a] de lo que ha hecho las ha revelado a los justos y los escogidos en el nombre[b] del Señor de los espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «y toda medida de lo que ha hecho». La frase ge’ez es difícil y puede referirse a la extensión ordenada o a la medida fijada de las obras de Dios.'
    reason: lexical_alternative
  - marker: b
    text: La expresión «en el nombre de» puede indicar la esfera, la autoridad o la invocación bajo la cual se hace esta revelación.
    reason: lexical_alternative
  - marker: c
    text: 'O: «y su ira está lejos». Sin embargo, el ge’ez usa aquí un giro idiomático que se entiende mejor como «tarda en airarse».'
    reason: previous_rendering
lexical_decisions:
- source_word: ብዙኅ
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - grande
  - mucha
  lexicon: Dillmann
  rationale: ‘Abundante’ conserva la idea de plenitud cuantitativa con registro digno y natural en español, especialmente con ‘misericordia’.
- source_word: ምሕረቱ
  english_pob_choice: his mercy
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su compasión
  - su piedad
  lexicon: Dillmann
  rationale: ‘Misericordia’ es el equivalente más estable y teológicamente preciso para la clemencia divina del texto.
- source_word: ለእግዚአ መናፍስት
  english_pob_choice: of the Lord of Spirits
  chosen_spanish: del Señor de los Espíritus
  alternatives_spanish:
  - del Señor de los espíritus
  lexicon: Dillmann
  rationale: Se preserva el título apocalíptico fijo ‘Lord of Spirits’ con la mayúscula reverencial habitual en español bíblico.
- source_word: ርሑቅ መዓት
  english_pob_choice: slow to anger
  chosen_spanish: lento para la ira
  alternatives_spanish:
  - tardo para la ira
  - tarda en airarse
  lexicon: Dillmann
  rationale: La revisión inglesa identifica aquí el modismo idiomático equivalente a ‘slow to anger’; en español, ‘lento para la ira’ mantiene la fuerza proverbial sin perder el paralelismo con misericordia abundante.
- source_word: ወኵሉ ግብሩ
  english_pob_choice: and all his works
  chosen_spanish: y todas sus obras
  alternatives_spanish:
  - y todas sus acciones
  - y todos sus hechos
  lexicon: Dillmann
  rationale: ‘Obras’ preserva el alcance amplio de la actividad divina, incluyendo creación y gobierno, sin moralizarlo como ‘hechos’.
- source_word: ወኵሉ እምጣነ
  english_pob_choice: and all the measure
  chosen_spanish: y toda la medida
  alternatives_spanish:
  - y toda la extensión
  - y todo el orden
  lexicon: Dillmann
  rationale: ‘Medida’ mantiene la frase oscura y apocalíptica del original, tal como la POB inglesa evitó resolverla en exceso.
- source_word: ገብረ
  english_pob_choice: what he has made
  chosen_spanish: de lo que ha hecho
  alternatives_spanish:
  - de lo que ha hecho/movido
  - de lo que ha creado
  lexicon: Dillmann
  rationale: En español, ‘lo que ha hecho’ conserva la amplitud posible entre hacer, obrar y producir; evita estrechar prematuramente el sentido a ‘crear’.
- source_word: ከሠተ
  english_pob_choice: he has revealed
  chosen_spanish: ha revelado
  alternatives_spanish:
  - ha mostrado
  - ha dado a conocer
  lexicon: Dillmann
  rationale: ‘Revelado’ corresponde bien al contexto visionario y a la apertura de realidades ocultas en el lenguaje enóquico.
- source_word: ለጻድቃን
  english_pob_choice: to the righteous
  chosen_spanish: a los justos
  alternatives_spanish:
  - a los rectos
  lexicon: Dillmann
  rationale: ‘Justos’ preserva el uso bíblico habitual para el grupo humano caracterizado por rectitud ante Dios.
- source_word: ወለኅሩያን
  english_pob_choice: and to the chosen
  chosen_spanish: y a los escogidos
  alternatives_spanish:
  - y a los elegidos
  lexicon: Dillmann
  rationale: ‘Escogidos’ mantiene el matiz de selección sin importar sobre el término una carga doctrinal adicional no exigida por el contexto inmediato.
- source_word: በስሙ
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por el nombre de
  - mediante el nombre de
  lexicon: Dillmann
  rationale: La preposición ‘en’ reproduce el valor reverencial y es la opción más natural en español para una fórmula de autoridad o esfera de revelación.
theological_decisions:
- issue: Sentido de ርሑቅ መዓት
  english_pob_reading: The phrase is the standard idiom ‘slow to anger,’ not merely a statement that wrath is distant.
  chosen_spanish_reading: lento para la ira
  alternative_spanish_readings:
  - su ira está lejos
  - tarde en airarse
  rationale: La revisión del audit trail corrige la lectura literal y confirma el modismo bíblico tradicional equivalente a ‘slow to anger’. En español conviene expresar la cualidad divina, no solo la distancia espacial de la ira.
  doctrine_reference: Éxodo 34:6; Números 14:18 (idioma de longanimidad divina).
- issue: Relación entre misericordia abundante y revelación a justos/escogidos
  english_pob_reading: God’s abundant mercy and slowness to anger frame the disclosure of his works to the righteous and chosen.
  chosen_spanish_reading: La misericordia abundante y la lentitud para la ira enmarcan la revelación de sus obras a los justos y a los escogidos.
  alternative_spanish_readings:
  - La misericordia abundante y la ira distante enmarcan la revelación...
  - La misericordia abundante precede la revelación...
  rationale: 'Se conserva la estructura de contraste del verso y su lógica apocalíptica: el carácter de Dios explica por qué comunica sus obras a ese grupo humano seleccionado.'
  doctrine_reference: Preservar la tensión literaria y teológica del pasaje sin armonizarla prematuramente.
- issue: “En el nombre de”
  english_pob_reading: The phrase may express sphere, authority, or invocation under which the revelation is made.
  chosen_spanish_reading: en el nombre de
  alternative_spanish_readings:
  - bajo el nombre de
  - por medio del nombre de
  rationale: '‘En el nombre de’ mantiene abierta la ambigüedad auditada: esfera, autoridad o invocación. Otras opciones aclaran demasiado.'
  doctrine_reference: Respeto a la ambigüedad semántica del sintagma preposicional.
translation_notes:
  revision_awareness: Seguí la revisión más reciente del audit trail que corrige la lectura literal de ርሑቅ መዓት a la locución idiomática ‘slow to anger’. También conservé la ambigüedad reconocida de ወኵሉ እምጣነ y la fórmula ‘en el nombre de’ sin resolverla de manera interpretativa.
  spanish_consistency_notes:
  - Se mantuvo ‘Señor de los Espíritus’ como título fijo.
  - Se usó ‘justos’ y ‘escogidos’ de modo consistente con la terminología del proyecto.
  - Se evitó traducir mecánicamente ‘slow to anger’ como una mera distancia espacial de la ira.
  - Se conservó la frase oscura ‘toda la medida’ para no sobreexplicar el original.
