  text: All who do not sleep in the heights of heaven shall bless him[a]; all the holy ones who are in heaven shall bless him, and all the chosen ones who dwell in the garden of life; and every spirit of light that is able to bless and glorify and exalt and sanctify your blessed name[d][c][b]; and all flesh shall exceedingly and with power praise and bless your name forever and ever.
  footnotes:
