  - marker: b
    text: '''Who do not sleep'' likely refers to wakeful heavenly beings in perpetual attendance, not merely to human vigilance.'
    reason: cultural_note
  - marker: c
    text: Or 'May all who do not sleep in the heights of heaven bless you; may all the holy ones who are in heaven bless you'.
    reason: previous_rendering
  - marker: d
    text: Or 'and all flesh beyond measure from power shall glorify and bless'.
