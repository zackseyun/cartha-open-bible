translation:
  language: es
  text: Todos los que no duermen en las alturas del cielo lo bendecirán; todos los santos que están en el cielo lo bendecirán, y todos los escogidos que habitan en el jardín de la vida; y todo espíritu de luz que puede bendecir y glorificar y exaltar y santificar tu nombre bendito; y toda carne alabará y bendecirá tu nombre sobremanera y con poder[a], por los siglos de los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cláusula ge''ez final es difícil, pero aquí se entiende adverbialmente: toda carne alabará y bendecirá el nombre divino con gran intensidad y poder, no que «toda carne» sea el elemento descrito como poderoso.'
    reason: source_note
lexical_decisions:
- source_word: ይባርክዎ / ትባርክ
  english_pob_choice: bless him / bless your name
  chosen_spanish: bendecir a él / bendecirá tu nombre
  alternatives_spanish:
  - bendecirlo
  - hablar bendición sobre él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo el verbo de bendición para mantener el tono litúrgico y la repetición del original. En la primera cláusula el objeto es de tercera persona («a él»), y en la segunda se mantiene la referencia directa al nombre divino como objeto de bendición.
- source_word: እለ ኢይነውሙ
  english_pob_choice: who do not sleep
  chosen_spanish: los que no duermen
  alternatives_spanish:
  - los insomnes
  - los que nunca duermen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «No duermen» preserva la imagen apocalíptica de seres celestiales vigilantes sin cargarla con una explicación interpretativa adicional.
- source_word: በመልዕልተ ሰማይ
  english_pob_choice: in the heights of heaven
  chosen_spanish: en las alturas del cielo
  alternatives_spanish:
  - en lo alto del cielo
  - en las alturas de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Alturas del cielo» reproduce la imagen espacial con una sintaxis natural en español y sin especificar indebidamente un nivel cosmológico técnico.
- source_word: ቅዱሳን
  english_pob_choice: holy ones
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - seres santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí opto por «santos» porque en español es una forma breve y reconocible para seres celestiales santos; no obstante, conserva suficiente apertura para no resolver su identidad ontológica.
- source_word: ኅሩያን
  english_pob_choice: chosen ones
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - los escogidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» mantiene el valor del término sin importar fórmulas doctrinales posteriores.
- source_word: ገነት ሕይወት
  english_pob_choice: the garden of life
  chosen_spanish: el jardín de la vida
  alternatives_spanish:
  - el paraíso de la vida
  - el huerto de la vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Jardín de la vida» conserva la imagen edénica-apocalíptica de forma directa y transparente en español.
- source_word: መንፈሰ ብርሃን
  english_pob_choice: spirit of light
  chosen_spanish: espíritu de luz
  alternatives_spanish:
  - espíritu luminoso
  - espíritu de resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión se mantiene literal para no reducir la imagen cósmica ni forzar una identificación más precisa de la que el texto ofrece.
- source_word: ባርኮተ ወሰብሖተ ወአልዕሎተ ወቀድሶተ
  english_pob_choice: to bless and glorify and exalt and sanctify
  chosen_spanish: bendecir y glorificar y exaltar y santificar
  alternatives_spanish:
  - bendecir y alabar y magnificar y santificar
  - bendecir, glorificar, exaltar y santificar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo la serie de cuatro verbos para respetar el paralelismo doxológico del original; «glorificar» y «santificar» mantienen mejor la progresión solemne que una simplificación a un solo verbo de alabanza.
- source_word: ለስምከ ቡሩክ
  english_pob_choice: your blessed name
  chosen_spanish: tu nombre bendito
  alternatives_spanish:
  - tu nombre, el bendito
  - tu nombre, bendito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción más natural en español es adjetivar «nombre» con «bendito», conservando la alabanza directa del nombre divino.
- source_word: ኵሉ ሥጋ
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda criatura
  - toda la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Toda carne» preserva el peso bíblico-apocalíptico de la expresión sin generalizarla indebidamente.
- source_word: ፈድፋደ እምኃይል
  english_pob_choice: all flesh shall exceedingly and with power praise and bless
  chosen_spanish: alabará[a] y bendecirá tu nombre[b] con gran poder[c]
  alternatives_spanish:
  - alabará y bendecirá con poder abundante
  - alabará y bendecirá con fuerza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la revisión más reciente del POB en la que el paralelo final queda como «praise and bless». En español, «con gran poder» expresa el valor adverbial de la cláusula difícil sin trasladarlo erróneamente al sujeto. He dejado la relación con «alabará» y «bendecirá» para reflejar la doble acción doxológica.
- source_word: ל᎓? / ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y siempre
  - por la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la equivalencia española más estable para la fórmula intensiva de perpetuidad.
theological_decisions:
- issue: Identidad de «los santos» y «los escogidos»
  english_pob_reading: Render both terms straightforwardly without specifying whether they are angels, glorified righteous humans, or a mixed heavenly company.
  chosen_spanish_reading: Traduzco ambos términos de manera abierta, sin decidir si se trata de ángeles, justos glorificados o una compañía celestial mixta.
  alternative_spanish_readings:
  - los santos = ángeles
  - los escogidos = creyentes redimidos
  rationale: El texto enumera grupos celestiales en una doxología visionaria, pero no obliga a resolver su identidad exacta. Mantengo la tensión interpretativa.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Valor de «toda carne»
  english_pob_reading: all flesh
  chosen_spanish_reading: Conservo «toda carne» como expresión bíblica de alcance total.
  alternative_spanish_readings:
  - toda la humanidad
  - toda criatura
  rationale: La expresión puede abarcar más que seres humanos, pero el texto no precisa la extensión; por eso conservo la formulación tradicional con fuerza bíblica.
  doctrine_reference: Original-language primacy over smoothing.
- issue: Cláusula difícil de poder/gran intensidad
  english_pob_reading: all flesh shall exceedingly and with power praise and bless
  chosen_spanish_reading: 'Entiendo la frase final como adverbial: la alabanza y bendición se realizan «con gran poder».'
  alternative_spanish_readings:
  - toda carne abundará en poder para alabar y bendecir
  - toda carne alabará y bendecirá con poder
  rationale: La revisión auditada corrige una lectura donde la fuerza se adosaba al sujeto. En español conviene reflejar el matiz de modo/intensidad sin inventar una sintaxis extraña.
  doctrine_reference: Preserve syntactic tension and revision awareness.
translation_notes:
  revision_awareness: Seguí la revisión más reciente del POB que corrige la primera persona/segunda persona en las cláusulas iniciales y reubica la expresión de poder como modificador adverbial de la alabanza y la bendición. También respeté la decisión revisada de mantener «praise and bless» en la cláusula final, sin volver a «glorify».
  spanish_consistency_notes:
  - Mantengo «bendecir» como verbo litúrgico principal para conservar la repetición del original.
  - Uso «espíritu» en minúscula porque aquí no hay indicación explícita de que se trate del Espíritu Santo.
  - Conservo «carne» en sentido bíblico, no como simple sinónimo de humanidad.
  - No resuelvo la identidad de los grupos celestiales más allá de la traducción básica.
  - La puntuación separa las series verbales para hacer visible el paralelismo del original.
