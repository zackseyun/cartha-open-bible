translation:
  language: es
  text: Y los elegidos habitarán con los elegidos[a], y estas son las medidas que serán dadas para la fe[d][c][b], y fortalecerán la justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La apertura también puede entenderse más plenamente como: ''los elegidos morarán y habitarán con los elegidos''; el ge''ez usa dos verbos estrechamente relacionados.'
    reason: lexical_alternative
  - marker: b
    text: O 'para la fidelidad' o 'para la firmeza' en lugar de 'para la fe'.
    reason: lexical_alternative
  - marker: c
    text: '''Medidas'' puede significar porciones medidas, partes asignadas o estándares; el matiz exacto en esta línea es incierto.'
    reason: textual_variant
  - marker: d
    text: 'O: ''Y los elegidos habitarán con los elegidos, y estas son las medidas''.'
    reason: previous_rendering
lexical_decisions:
- source_word: የሐድሩ
  english_pob_choice: shall dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - morarán
  - dwellarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa asentarse o vivir en un lugar; 'habitarán' comunica bien la permanencia estable sin sonar arcaico.
- source_word: ኅሩያን
  english_pob_choice: chosen ones
  chosen_spanish: los elegidos
  alternatives_spanish:
  - los escogidos
  - los escogidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Elegidos'' preserva el valor titular y apocalíptico del grupo sin cargarlo innecesariamente con terminología doctrinal posterior.'
- source_word: እምጣናት
  english_pob_choice: measures
  chosen_spanish: las medidas
  alternatives_spanish:
  - las porciones medidas
  - las porciones asignadas
  - las normas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Medidas'' mantiene la imagen concreta y deja abierta la posible oscilación entre porciones asignadas y estándares medidos.'
- source_word: ይትወሀቡ
  english_pob_choice: shall be given
  chosen_spanish: serán dadas
  alternatives_spanish:
  - serán otorgadas
  - serán concedidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva simple sigue de cerca el ge'ez y suena natural en español bíblico contemporáneo.
- source_word: ለሃይማኖት
  english_pob_choice: for faith
  chosen_spanish: para la fe
  alternatives_spanish:
  - para la fidelidad
  - para la firmeza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fe'' es la equivalencia más directa; se conserva la alternativa semántica de fidelidad/firmeza en notas porque el contexto puede sugerir constancia.'
- source_word: ያፀንዕዋ
  english_pob_choice: they shall strengthen
  chosen_spanish: fortalecerán
  alternatives_spanish:
  - harán firme
  - establecerán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fortalecerán'' reproduce la fuerza activa del verbo sin volverlo demasiado técnico.'
- source_word: ለጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - lo justo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí 'justicia' conserva el peso moral y comunitario del término; 'rectitud' queda como alternativa válida si se quiere enfatizar la conducta correcta.
theological_decisions:
- issue: Sentido de ሃይማኖት en contexto apocalíptico
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fidelidad
  - la firmeza
  rationale: Se mantiene el sentido más inmediato del término, pero se reconoce que el contexto puede implicar lealtad perseverante más que solo creencia interior.
  doctrine_reference: Translation philosophy § Preservar tensión lexical cuando el contexto no resuelve del todo el matiz.
- issue: Relación entre 'elegidos' y la repetición del grupo
  english_pob_reading: The chosen ones shall dwell with the chosen ones
  chosen_spanish_reading: Los elegidos habitarán con los elegidos
  alternative_spanish_readings:
  - Los elegidos descansarán con los elegidos
  - Los elegidos morarán con los elegidos
  rationale: La repetición se conserva porque el texto subraya una comunión escatológica entre el mismo grupo designado; no se suaviza la redundancia más de lo que el original permite.
  doctrine_reference: Book context § La imaginería de convivencia escatológica debe permanecer visible en la traducción.
translation_notes:
  revision_awareness: La revisión más reciente del expediente corrigió la lectura inglesa previa de 'begin to dwell' a 'dwell'; por eso la traducción española evita cualquier aspecto incoativo y refleja solo la idea de habitar. También se atiende la advertencia de que el plural demostrativo del ge'ez es 'estas', no 'esas' ni 'aquellas'.
  spanish_consistency_notes:
  - Se mantiene 'elegidos' de forma consistente para ኅሩያን.
  - '''Habitarán'' evita el calco de ''dwell'' y conserva solemnidad bíblica.'
  - '''La fe'' se usa en sentido directo, con nota para los matices alternativos.'
  - No se emplea 'Señor' ni terminología sustitutiva no presente en el texto.
  - La puntuación refleja una cláusula coordinada y una segunda afirmación nominal clara.
