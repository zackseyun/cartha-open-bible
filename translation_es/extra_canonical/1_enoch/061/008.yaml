translation:
  language: es
  text: Y el Señor de los espíritus sentó al Elegido[a] en el trono de gloria, y él juzgará todas las obras de los santos[b] en la altura del cielo, y pesará sus hechos en la balanza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Escogido». El título ge'ez ኅሩይ permite ambas posibilidades; se prefiere «el Elegido» por ser más natural en español actual y conservar el valor titular.
    reason: lexical_alternative
  - marker: b
    text: «Los santos» puede referirse a la comunidad santa, a seres celestiales santos, o abarcar intencionalmente ambos grupos; el texto ge'ez no obliga a una opción más estrecha.
    reason: alternative_reading
  - marker: c
    text: La imagen evoca pesar en una balanza o con balanzas, metáfora judicial de evaluación.
    reason: cultural_note
lexical_decisions:
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los espíritus
  alternatives_spanish:
  - el Dueño de los espíritus
  - el Señor de los espíritus celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo el título apocalíptico establecido como «Señor» y el genitivo «de los espíritus». En español «Señor de los espíritus» mantiene la elevación del título sin volverlo explicativo de más.
- source_word: መንበረ ስብሐት
  english_pob_choice: the throne of glory
  chosen_spanish: el trono de gloria
  alternatives_spanish:
  - el trono glorioso
  - el trono de esplendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Trono de gloria» conserva la imagen concreta y la formulación bíblica tradicional que también suena natural en español.
- source_word: አንበረ
  english_pob_choice: seated
  chosen_spanish: sentó
  alternatives_spanish:
  - hizo sentar
  - colocó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El causativo en este contexto de entronización se expresa con naturalidad en español con «sentó»; el sujeto sigue siendo el Señor de los espíritus, que coloca al Elegido en su trono.
- source_word: ለኅሩይ
  english_pob_choice: the Chosen One
  chosen_spanish: el Elegido
  alternatives_spanish:
  - el Escogido
  - el Elegido de Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El título puede traducirse como «Chosen One» o «Elect One». En español, «el Elegido» preserva el valor titular y suena más natural que «el Electo», que resulta más técnico.
- source_word: ይኴንን
  english_pob_choice: he will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - hará juicio sobre
  - dictará juicio sobre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa juicio judicial futuro; «juzgará» es directo y mantiene la fuerza forense sin añadir matices ajenos.
- source_word: ኵሎ ግብሮሙ
  english_pob_choice: all the works of them
  chosen_spanish: todas las obras
  alternatives_spanish:
  - todos sus trabajos
  - todas sus obras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obras» conserva el sustantivo del original y evita limitar el sentido a «hechos» demasiado estrechos. El complemento se sobreentiende por el contexto de los santos.
- source_word: ለቅዱሳን
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos seres
  - los seres santos
  - los consagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque la expresión puede abarcar una comunidad santa o seres celestiales, en español «los santos» preserva la ambigüedad con buena legibilidad. No se fuerza una identificación más estrecha.
- source_word: በመልዕልተ ሰማይ
  english_pob_choice: in the height of heaven
  chosen_spanish: en la altura del cielo
  alternatives_spanish:
  - en lo alto del cielo
  - en la altura de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Altura del cielo» reproduce la imagen espacial elevada del ge'ez y evita sobreinterpretar como «cielo más alto».
- source_word: በመዳልው
  english_pob_choice: in the balance
  chosen_spanish: en la balanza
  alternatives_spanish:
  - en la balanza de pesas
  - en las balanzas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen judicial de pesar se expresa de forma natural con «balanza» en español. Mantiene el símbolo de evaluación sin explicarlo de más.
- source_word: ይደሉ ምግባሮሙ
  english_pob_choice: he will weigh their deeds
  chosen_spanish: pesará sus hechos
  alternatives_spanish:
  - pesará sus obras
  - ponderará sus actos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa corrigió el pasivo y dejó claro que el sujeto pesa activamente. En español, «pesará» conserva esa agencia; «hechos» funciona bien aquí para distinguirlo de «obras» al principio del verso.
theological_decisions:
- issue: Identidad de «los santos» (ለቅዱሳን)
  english_pob_reading: retain 'the holy ones' without specifying whether these are righteous humans, heavenly holy beings, or both
  chosen_spanish_reading: mantener «los santos» sin precisar si se trata de seres humanos justos, seres celestiales santos o ambos
  alternative_spanish_readings:
  - los justos
  - los ángeles
  - la comunidad santa
  rationale: El contexto no obliga a una identificación única. Traducir de modo abierto preserva la tensión interpretativa documentada en el auditorio inglés.
  doctrine_reference: Preservar la ambigüedad textual donde el original la permite.
- issue: Título de ለኅሩይ
  english_pob_reading: translate as the title 'the Chosen One'
  chosen_spanish_reading: 'traducirlo como título: «el Elegido»'
  alternative_spanish_readings:
  - el Electo
  - el Escogido
  rationale: El pasaje presenta una figura singular y exaltada en contexto de entronización y juicio. En español, «el Elegido» comunica el valor titular con claridad y sin cargarlo con terminología eclesiástica posterior.
  doctrine_reference: Traducir títulos cuando el contexto los presenta como designación personal.
- issue: Agencia en «pesará sus hechos en la balanza»
  english_pob_reading: and he will weigh their deeds in the balance
  chosen_spanish_reading: y pesará sus hechos en la balanza
  alternative_spanish_readings:
  - y sus hechos serán pesados en la balanza
  - y pesará sus obras en la balanza
  rationale: La corrección textual/gramatical del inglés subraya que el sujeto realiza la acción. El español debe reflejar esa agencia explícita.
  doctrine_reference: Conservar la voz activa cuando el original la exige.
translation_notes:
  revision_awareness: 'La revisión más reciente del inglés corrigió la cláusula final de pasiva a activa: el sujeto no «será pesado», sino que «pesará» activamente los hechos. El español sigue esa corrección con «pesará sus hechos en la balanza». También se retuvo la decisión revisada de «on the throne of glory» como «sobre el trono de gloria», reflejada aquí con la fórmula natural «sentó al Elegido sobre el trono de gloria».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «Señor de los espíritus» para el título fijo del capítulo, no «Señor de los espíritus» como simple glosa.
  - «Elegido» se emplea como título, con mayúscula solo cuando el estilo editorial del proyecto lo requiera; aquí se conserva en forma nominal dentro de la cláusula.
  - Se evita resolver la identidad de «los santos», preservando la ambigüedad del original.
  - La metáfora de la balanza se mantiene literal para conservar el matiz judicial.
