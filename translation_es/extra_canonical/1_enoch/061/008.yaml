revisions:
- from: Y Yahvé, el Señor de los espíritus, sentó al Elegido[a] sobre el trono de gloria, y juzgará todas las obras de los santos[b] en la altura del cielo, y pesará sus hechos en la balanza[c].
  to: Y el Señor de los espíritus sentó al Elegido[a] en el trono de gloria, y él juzgará todas las obras de los santos[b] en la altura del cielo, y pesará sus hechos en la balanza[c].
  rationale: La revisión elimina una adición no apoyada por la fuente («Yahvé»), conserva el título atestiguado «el Señor de los espíritus», y ajusta «sobre» a «en» para un español más natural en contexto de entronización. Se mantiene la voz activa de «pesará» y las notas útiles del borrador.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:22:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura básica del verso: Yahvé/Señor de los espíritus entroniza al Elegido, este juzga y pesa activamente. Sin embargo, añade un doblete innecesario al inicio («Y Yahvé, el Señor de los espíritus»), cuando el ge''ez y el rastro inglés solo tienen el título «el Señor de los espíritus». También «los santos» estrecha y eclesiastiza más de lo deseable el ambiguo ለቅዱሳን, mejor preservado como «los santos» solo con nota o, preferiblemente, «los santos/los consagrados/los santos seres»; en español de proyecto conviene más «los santos» menos que «los santos»? Dado el rastro inglés, la mejor opción es «los santos» no es ideal; «los santos» puede funcionar pero carga más tradición eclesial que «los santos/los santos seres». La reparación principal necesaria es quitar la apposición añadida y mejorar la naturalidad con fidelidad.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero el arranque resulta torpe por redundante: «Y Yahvé, el Señor de los espíritus» suena como si hubiera dos designaciones donde la fuente tiene un solo título. «Sobre el trono» puede decirse, pero «en el trono de gloria» o «en el trono de gloria» suena más natural con el verbo «sentó». El resto fluye bien; las notas están bien formuladas.'
  glossary_alignment: Cumple con «Yahvé» como nombre divino, pero aquí el uso de «Yahvé» delante de «el Señor de los espíritus» no está justificado por la fuente. «El Elegido» corresponde bien a ኅሩይ y la nota alternativa está alineada. «Balanza» y la voz activa «pesará» reflejan correctamente la revisión auditada. Recomiendo «el Señor de los espíritus» como texto principal, sin anteponer «Yahvé».
  issues:
  - severity: high
    issue: Se añadió «Yahvé» antes de «el Señor de los espíritus»
    rationale: La fuente ge'ez presenta el título እግዚአ መናፍስት («el Señor de los espíritus»), no una secuencia equivalente a «Yahvé, el Señor de los espíritus». La adición introduce contenido no atestiguado y una apposición innecesaria.
  - severity: medium
    issue: La apertura española queda redundante y poco natural
    rationale: «Y Yahvé, el Señor de los espíritus» suena pesado en español y no reproduce limpiamente la sintaxis del verso. Quitar el doblete mejora fidelidad y legibilidad.
  - severity: low
    issue: La nota y traducción de «los santos» preservan la ambigüedad solo parcialmente
    rationale: Aunque la nota explica la amplitud posible, «los santos» en español puede sonar más eclesiástico que «los santos»/«los seres santos»/«los consagrados». No es un error grave, pero la ambigüedad del inglés «holy ones» se preserva mejor con «los santos» acompañado de nota, que aquí ya existe; por eso no requiere una reescritura mayor.
  revised_spanish_text: Y el Señor de los espíritus sentó al Elegido[a] en el trono de gloria, y él juzgará todas las obras de los santos[b] en la altura del cielo, y pesará sus hechos en la balanza[c].
  revised_footnotes:
  - marker: a
    text: O «el Escogido». El título ge'ez ኅሩይ permite ambas posibilidades; se prefiere «el Elegido» por ser más natural en español actual y conservar el valor titular.
    reason: lexical_alternative
  - marker: b
    text: «Los santos» puede referirse a la comunidad santa, a seres celestiales santos, o abarcar intencionalmente ambos grupos; el texto ge'ez no obliga a una opción más estrecha.
    reason: alternative_reading
  - marker: c
    text: La imagen evoca pesar en una balanza o con balanzas, metáfora judicial de evaluación.
    reason: cultural_note
  revision_rationale: La revisión elimina una adición no apoyada por la fuente («Yahvé»), conserva el título atestiguado «el Señor de los espíritus», y ajusta «sobre» a «en» para un español más natural en contexto de entronización. Se mantiene la voz activa de «pesará» y las notas útiles del borrador.
