base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/061/008.yaml
  text: And the Lord of Spirits seated the Chosen One on the throne of glory[a], and he will judge all the works of the holy ones in the height of heaven[d][c][b], and he will weigh their deeds in the balance.
  footnotes:
  - marker: a
    text: Or 'the Elect One.' The Ge'ez title ኅሩይ can be rendered either way; 'Chosen One' is preferred here for readable modern English.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the holy ones' may refer to the holy community, heavenly holy beings, or intentionally encompass both; the Ge'ez wording does not require a narrower choice.
    reason: alternative_reading
  - marker: c
    text: Literally evokes weighing in a balance or on scales, a standard image of judicial evaluation.
    reason: cultural_note
  - marker: d
    text: Or 'and their deeds will be weighed in the balance.'.
    reason: previous_rendering
