translation:
  language: es
  text: Y todos los que estaban[a] en la altura del cielo recibieron un mandato[b], y poder, y una voz, y luz como fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todos los que estaban en el cielo más alto'.
    reason: lexical_alternative
  - marker: b
    text: El texto etiópico en la segunda mitad del versículo es difícil en este testigo. La frase aquí traducida puede también entenderse con 'resplandor/radiancia' en lugar de 'luz'.
    reason: textual_variant
lexical_decisions:
- source_word: ወነሥኡ
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - tomaron
  - aceptaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa aquí recibir/tomar algo otorgado; con 'mandato' como objeto, 'recibieron' conserva el sentido de aceptar o recibir una carga dada sin introducir matices ajenos.
- source_word: ትእዛዘ
  english_pob_choice: the command
  chosen_spanish: un mandato
  alternatives_spanish:
  - un comando
  - una orden
  - una instrucción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Mandato'' mantiene el registro autoritativo y apocalíptico sin sonar excesivamente moderno; en español evita la ambigüedad de ''comando'' y preserva mejor la solemnidad del texto.'
- source_word: እለ በ‘መልዕልተ ሰማይ ኵሎሙ
  english_pob_choice: all those in the highest heaven
  chosen_spanish: todos los que están en la altura del cielo
  alternatives_spanish:
  - todos los que estaban en la altura del cielo
  - todos los del más alto cielo
  - todos los que están en el cielo más alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase identifica a los seres ubicados en la esfera superior del cielo. 'Altura del cielo' conserva la imagen espacial sin decidir demasiado sobre una jerarquía angélica específica.
- source_word: ኃይለ
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - mando
  - potencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Poder'' refleja bien la fuerza o capacidad conferida en coordinación con los otros objetos directos. Es una opción natural en español y menos física que ''fuerza''.'
- source_word: ቃለ
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - una voz sonora
  - un sonido
  - una palabra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario, 'voz' es la equivalencia más directa y mantiene el paralelismo con 'poder' y 'luz' sin desviar el sentido hacia 'palabra'.
- source_word: ብርሃነ
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - resplandor
  - brillo
  - radiancia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La tradición textual presenta una lectura difícil en esta sección, pero el sustantivo básico es 'luz'. 'Luz' es la opción más transparente en español; 'resplandor' o 'radiancia' quedan como alternativas interpretativas.
- source_word: ከመ እሳት
  english_pob_choice: like fire
  chosen_spanish: como fuego
  alternatives_spanish:
  - como el fuego
  - igual que fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación debe conservarse de forma directa. 'Como fuego' reproduce la simetría de la imagen sin añadir determinaciones no presentes en el original.
theological_decisions:
- issue: Identidad de 'todos los que están en la altura del cielo'
  english_pob_reading: A general reference to heavenly beings in the upper heaven
  chosen_spanish_reading: Una referencia general a seres celestiales situados en la altura del cielo
  alternative_spanish_readings:
  - una orden específica de ángeles
  - los ejércitos celestiales en conjunto
  rationale: El texto no nombra una clase angélica concreta. Se mantiene abierta la referencia para no importar una sistematización posterior ni resolver indebidamente la tensión del pasaje.
  doctrine_reference: Preservar la tensión teológica local sin sobreespecificar el referente.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que corrige la coordinación de los objetos directos: ''mandato, poder, voz y luz como fuego''. La versión española refleja esa lectura sin convertir los últimos elementos en sujeto de una cláusula nueva.'
  spanish_consistency_notes:
  - Se prefirió 'mandato' a 'orden' para mantener el tono solemne y evitar una lectura demasiado administrativa.
  - '''Poder'' y ''voz'' se dejaron como sustantivos coordinados, no como cualidades dependientes de ''luz''.'
  - No se añadió nota al pie porque no hay marcador anclado en el texto y el verso quedó suficientemente claro en español.
