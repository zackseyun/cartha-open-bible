translation:
  language: es
  text: 'Y pregunté al ángel, diciendo: «¿Por qué han tomado estos cordeles[a] y se han ido?». Y él me dijo: «Se han ido para que midan[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estas cuerdas». El término ge'ez aquí se refiere a objetos físicos tomados para medir, no a «bandas» o «grupos».
    reason: lexical_alternative
  - marker: b
    text: 'El verbo final se entiende aquí de forma activa: «midan», no pasiva: «sean medidos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ተስአልክዎ
  english_pob_choice: I asked
  chosen_spanish: pregunté
  alternatives_spanish:
  - le pregunté
  - interrogué
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez introduce una pregunta directa en primera persona. «Pregunté» es natural y mantiene el movimiento narrativo sin sobrecargar el español.
- source_word: መላእክ
  english_pob_choice: the angel
  chosen_spanish: al ángel
  alternatives_spanish:
  - al mensajero
  - al ángel celestial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto visionario apocalíptico, «ángel» es la equivalencia más precisa y transparente. El artículo definido sigue el interlocutor específico del pasaje.
- source_word: እንዘ እብሎ
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - mientras decía
  - al decir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción introductoria de habla se vierte de forma directa con «diciendo», que conserva el flujo semita del relato sin forzar una paráfrasis.
- source_word: ነሡ
  english_pob_choice: have ... taken
  chosen_spanish: han tomado
  alternatives_spanish:
  - tomaron
  - han llevado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indica que el verbo significa «tomar» y no «levantarse» o «irse». «Han tomado» reproduce la acción concreta y sigue el orden narrativo del original.
- source_word: እሎንቱ አኅበለ
  english_pob_choice: these cords
  chosen_spanish: estos cordeles
  alternatives_spanish:
  - estas cuerdas
  - estos lazos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La corrección adjudicada muestra que el sustantivo se refiere a cordones/cuerdas y no a grupos. «Cordeles» conserva la imagen física y la referencia a los instrumentos de medición.
- source_word: ሖሩ
  english_pob_choice: gone
  chosen_spanish: se han ido
  alternatives_spanish:
  - han partido
  - han salido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa desplazamiento. «Se han ido» es idiomático en español y mantiene la secuencia de movimiento del diálogo.
- source_word: ይመጥኑ
  english_pob_choice: so that they may measure
  chosen_spanish: para que midan
  alternatives_spanish:
  - a fin de medir
  - para que puedan medir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La lectura revisada entiende el verbo como activo: «medir». «Para que midan» conserva la finalidad sin introducir una pasiva interpretativa.'
theological_decisions:
- issue: 'Objeto de la acción final: medir vs. ser medidos'
  english_pob_reading: They have gone so that they may be measured.
  chosen_spanish_reading: Se han ido para que midan.
  alternative_spanish_readings:
  - Se han ido para que sean medidos.
  - Se han ido para que se determine su medida.
  rationale: El control revisado del ge'ez corrige la pasiva inicial. La traducción española mantiene la acción activa de medir y no convierte el propósito en un juicio o reparto implícito que el texto no afirma aquí.
  doctrine_reference: Preservar la tensión apocalíptica sin resolverla de forma interpretativa; fidelidad al verbo activo del original.
translation_notes:
  revision_awareness: 'El borrador inglés anterior fue corregido por la revisión adjudicada: ነሡ significa «tomar» y ይመጥኑ es activo («medir»). La versión española sigue esa corrección y evita la antigua lectura de «bandas» o de una pasiva en el final.'
  spanish_consistency_notes:
  - Se mantiene «ángel» para መላእክ por el contexto visionario.
  - Se usa «cordeles» para reflejar el objeto físico de medida señalado por la revisión textual.
  - Se evita «SEÑOR» u otras sustituciones teológicas no presentes en el texto.
  - La puntuación busca reflejar el diálogo directo y la clausura breve del original.
