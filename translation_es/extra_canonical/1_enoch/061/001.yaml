translation:
  language: es
  text: Y vi en aquellos días que se dieron largas cuerdas[a] a esos ángeles[b], y tomaron para sí alas y volaron, y fueron hacia el norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge’ez traducida «largas cuerdas» también puede entenderse como «largas sogas» o, posiblemente, «cuerdas de medir».
    reason: lexical_alternative
  - marker: b
    text: La expresión «esos ángeles» también puede leerse «los otros ángeles», según cómo se tome el demostrativo.
    reason: alternative_reading
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula visionaria se expresa de manera natural y directa en español con «vi», conservando el testimonio apocalíptico sin añadir solemnidad innecesaria.
- source_word: በእማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en ese tiempo
  - en aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En aquellos días» reproduce bien la fórmula apocalíptica heredada y mantiene el tono elevado del original.
- source_word: ተውህበ
  english_pob_choice: were given
  chosen_spanish: se dieron
  alternatives_spanish:
  - les fueron dadas
  - les fueron concedidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo se expresa con naturalidad en español mediante una pasiva refleja. Como el objeto directo es plural, «se dieron» conserva la concordancia sin perder la fuerza del otorgamiento.
- source_word: ለአልእቱ መላእክት
  english_pob_choice: to those angels
  chosen_spanish: a esos ángeles
  alternatives_spanish:
  - a aquellos ángeles
  - a los otros ángeles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Esos ángeles» mantiene la referencia demostrativa sin resolver indebidamente si el matiz es de distancia o contraste. «Ángeles» es el sentido normal de መላእክት en este contexto.
- source_word: አሕባል ነዋኃን
  english_pob_choice: long cords
  chosen_spanish: largas cuerdas
  alternatives_spanish:
  - largas sogas
  - cuerdas de gran longitud
  - cuerdas de medir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cuerdas» es un equivalente concreto y transparente; el adjetivo «largas» conserva la nota de longitud. No se impone «de medir» porque el contexto no obliga a esa precisión.
- source_word: ወነሡአ ሎሙ ክንፈ
  english_pob_choice: and they took for themselves wings
  chosen_spanish: y tomaron para sí alas
  alternatives_spanish:
  - y se tomaron alas
  - y tomaron alas para sí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Para sí» preserva el matiz reflexivo del posesivo dativo. En español, «alas» es más idiomático que «alas» singular-colectivo y mantiene la imagen visible.
- source_word: ወሰረሩ
  english_pob_choice: and flew
  chosen_spanish: y volaron
  alternatives_spanish:
  - y echaron a volar
  - y se elevaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Volaron» es el equivalente más directo y claro para el movimiento resultante de tomar alas, sin sobrerrecrear la imagen.
- source_word: ወሖሩ ሰመንገለ መስዕ
  english_pob_choice: and they went toward the north
  chosen_spanish: y fueron hacia el norte
  alternatives_spanish:
  - y caminaron hacia el norte
  - y viajaron hacia el norte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La orientación direccional se conserva con una expresión simple y natural. «Fueron hacia el norte» mantiene el desplazamiento sin imponer un modo específico de viaje.
theological_decisions:
- issue: Identidad y alcance de «esos ángeles»
  english_pob_reading: Render simply as 'those angels' without identifying them further.
  chosen_spanish_reading: «Esos ángeles», sin precisar más su identidad.
  alternative_spanish_readings:
  - «los otros ángeles»
  - «cierta clase de ángeles»
  rationale: El verso no explica quiénes son; por fidelidad al testimonio conviene no introducir una identificación interpretativa en el cuerpo del texto. La deixis se conserva abierta, como en el audit trail inglés.
  doctrine_reference: Preservar la tensión interpretativa; no resolverla en el texto principal.
translation_notes:
  revision_awareness: 'La redacción sigue el testimonio visionario del ge’ez y respeta la resolución prudente del English POB: se conserva la ambigüedad sobre la clase exacta de ángeles y sobre el alcance semántico de las cuerdas, sin forzar una identificación doctrinal ni una precisión técnica no asegurada por el contexto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Ángeles» se mantuvo para መላእክት, coherente con el contexto apocalíptico.
  - Se prefirió «alas» por naturalidad en español y correspondencia directa con el movimiento posterior de volar.
  - No se introdujeron términos eclesiásticos ajenos al pasaje.
  - La puntuación busca reflejar la sintaxis coordinada del original sin recargarla con conectores interpretativos.
