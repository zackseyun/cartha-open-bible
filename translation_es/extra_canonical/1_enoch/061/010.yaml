translation:
  language: es
  text: Y clamarán todas las huestes de los cielos, y todos los santos de arriba, y la hueste de Yahvé—los Kerubén, los Serafén y los Ofanines[a]—, y todos los ángeles de poder, y todos los ángeles de principados[b], y el Elegido, y los demás poderes que están en la tierra firme y sobre el agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ofanines» conserva el nombre de una orden celestial; algunos la entienden como «ruedas» por la imaginería del trono.
    reason: lexical_alternative
  - marker: b
    text: «Principados» refleja un término de rangos gobernantes; «dominios» también es posible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይጼውዑ
  english_pob_choice: shall cry out
  chosen_spanish: clamarán
  alternatives_spanish:
  - alzarán la voz
  - gritarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge’ez expresa un clamor o exclamación vocal. «Clamarán» conserva el tono colectivo y litúrgico/apocalíptico sin forzar la lectura a una mera conversación o llamado.
- source_word: ኵሉ ኃይለ ሰማያት
  english_pob_choice: all the hosts of the heavens
  chosen_spanish: todos los ejércitos de los cielos
  alternatives_spanish:
  - todas las huestes de los cielos
  - todos los poderes de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este catálogo celestial, ኃይል funciona como una colectividad ordenada de seres celestiales. «Ejércitos» reproduce bien la idea de multitud organizada y mantiene el registro elevado.
- source_word: ቅዱሳን በመልዕልተ
  english_pob_choice: the holy ones above
  chosen_spanish: los santos de arriba
  alternatives_spanish:
  - los santos en lo alto
  - los santos de lo alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge’ez apunta a seres santos en la esfera superior. «De arriba» es natural en español y conserva la ubicación celeste sin introducir una carga eclesial innecesaria.
- source_word: ኃይለ እግዚአብሔር
  english_pob_choice: the host of the Lord
  chosen_spanish: el ejército de Yahvé
  alternatives_spanish:
  - la hueste de Yahvé
  - el host de Yahvé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto enumera órdenes celestiales, por lo que la expresión es corporativa. Se usa «Yahvé» por la convención del proyecto para el nombre divino, y «ejército» para reflejar el carácter de host/hueste con fuerza militar-celestial.
- source_word: ኪሩቤን
  english_pob_choice: Keruben
  chosen_spanish: Querubines
  alternatives_spanish:
  - Keruben
  - querubines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque la POB inglesa translitera, en español «Querubines» es la forma más reconocible y fiel al referente celestial; no se traduce a una glosa como «seres alados» porque el texto nombra una orden específica.
- source_word: ሱራፌን
  english_pob_choice: Seraphen
  chosen_spanish: Serafines
  alternatives_spanish:
  - Serafenes
  - Seraphen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el nombre tradicional reconocible en español para esta orden celestial, manteniendo el paralelismo con Querubines.
- source_word: እፋኒን
  english_pob_choice: Ophannin
  chosen_spanish: Ofanines
  alternatives_spanish:
  - Ofanines
  - Ophanim
  - ruedas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa una orden celestial vinculada con la imaginería del trono. «Ofanines» preserva la sonoridad propia del ge’ez y evita reducirlo a la interpretación «ruedas» en el texto principal.
- source_word: መላእክተ ኃይል
  english_pob_choice: angels of power
  chosen_spanish: ángeles de poder
  alternatives_spanish:
  - ángeles poderosos
  - ángeles de fuerza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción es titulativa y ordenada. «Ángeles de poder» mantiene la forma formal y el sentido de rango celestial.
- source_word: መላእክተ አጋእዝት
  english_pob_choice: angels of principalities
  chosen_spanish: ángeles de principados
  alternatives_spanish:
  - ángeles de dominios
  - ángeles de gobernantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Principados» comunica una jerarquía de gobierno o rango y conserva el registro elevado del catálogo angelológico.
- source_word: ኅሩይ
  english_pob_choice: the Chosen One
  chosen_spanish: el Elegido
  alternatives_spanish:
  - el Elegido[a]
  - el Escogido
  - el Elegido Uno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto el término funciona como título singular. «El Elegido» es natural en español y preserva la capitalización funcional sin imponer una armonización doctrinal posterior.
- source_word: ካእአ ኃይል
  english_pob_choice: the other powers
  chosen_spanish: los demás poderes
  alternatives_spanish:
  - las demás huestes
  - los otros poderes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Demás» refleja la adición de un grupo restante dentro de la serie y conserva el carácter amplio y algo enigmático de ኃይል.
- source_word: እለ ውስተ የብስ ወዲበ ማይ
  english_pob_choice: that are on the dry land and over the water
  chosen_spanish: que están en la tierra seca y sobre el agua
  alternatives_spanish:
  - que están en el suelo seco y sobre el agua
  - que están en la tierra firme y sobre el agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: የብስ denota tierra seca o continente en contraste con el agua. «Tierra seca» sigue de cerca el valor léxico y evita ampliar innecesariamente a «mundo» o «tierra» en sentido general.
theological_decisions:
- issue: Cómo nombrar el nombre divino en la frase equivalente a «the host of the Lord»
  english_pob_reading: the host of the Lord
  chosen_spanish_reading: el ejército de Yahvé
  alternative_spanish_readings:
  - el ejército del Señor
  - la hueste del Señor
  rationale: La política del proyecto pide traducir el nombre divino como «Yahvé», no enmascararlo con «SEÑOR». Como la frase es una designación de la esfera celestial de Yahvé, se mantiene el referente divino explícito.
  doctrine_reference: Nombre divino y transparencia textual del POB
- issue: Si ኅሩይ debe sonar como título o como adjetivo común
  english_pob_reading: the Chosen One
  chosen_spanish_reading: el Elegido
  alternative_spanish_readings:
  - el escogido
  - el elegido
  rationale: En este pasaje forma parte de un catálogo de seres celestiales/figuras escatológicas y funciona titulativamente. «El Elegido» conserva la singularidad sin resolver la tensión interpretativa hacia una identificación cristológica posterior.
  doctrine_reference: Preservar la tensión local del texto sin harmonización doctrinal
- issue: Cómo presentar las órdenes angélicas sin domesticarlas a vocabulario eclesial ordinario
  english_pob_reading: Cherubim, Seraphim, Ophannim
  chosen_spanish_reading: Querubines, Serafines y Ofanines
  alternative_spanish_readings:
  - Querubines, Serafines y ruedas
  - Kerubines, Serafines y Ofanines
  rationale: El pasaje enumera órdenes celestiales específicas. Se conservan nombres reconocibles en español, pero sin convertir Ofanines en una glosa interpretativa como «ruedas», para no borrar la extrañeza apocalíptica del original.
  doctrine_reference: Traducir títulos; preservar nombres de órdenes celestiales
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que movió la cláusula verbal al inicio para aliviar la sintaxis y luego volvió a una forma más natural en inglés, además de estandarizar los nombres angélicos. La versión española sigue la estructura directa del ge’ez con el verbo inicial («clamarán») y mantiene los órdenes celestiales como catálogo formal, sin depender mecánicamente de la última redacción inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, de acuerdo con el marco del proyecto.
  - Se usa «El Elegido» como título singular, con mayúsculas funcionales por tratarse de una designación eschatológica.
  - Los nombres de órdenes celestiales se conservan en español reconocible y no se sustituyen por glosas explicativas en el texto principal.
  - «Tierra seca» refleja mejor የብስ que una simple «tierra» general, y distingue el contraste con el agua.
