revisions:
- from: Y clamarán todos los ejércitos de los cielos, y todos los santos de arriba, y el ejército de Yahvé[a] —los Querubines, los Serafines y los Ofanines[b]—, y todos los ángeles de poder, y todos los ángeles de principados[c], y el Elegido, y los demás poderes que están en la tierra seca y sobre el agua.
  to: Y clamarán todas las huestes de los cielos, y todos los santos de arriba, y la hueste de Yahvé—los Kerubén, los Serafén y los Ofanines[a]—, y todos los ángeles de poder, y todos los ángeles de principados[b], y el Elegido, y los demás poderes que están en la tierra firme y sobre el agua.
  rationale: Se elimina la nota sobre «Yahvé» porque aquí no hay base textual para afirmar que el nombre divino esté explícito en el source inmediato. Se ajusta «ejércitos» a «huestes» para reflejar mejor el valor colectivo celestial de ኃይል en español bíblico legible. Se revisan las órdenes celestiales para acercarse a la transliteración documentada por el expediente POB y así preservar la extrañeza apocalíptica del catálogo. Se mejora la puntuación y se sustituye «tierra seca» por «tierra firme», que conserva el contraste con el agua en español más natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:35:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español representa bien la estructura general del catálogo celestial y mantiene correctamente «Yahvé» y «el Elegido». Sin embargo, se aparta de una decisión teológica/lexical documentada al domesticar los nombres de las órdenes celestiales a «Querubines» y «Serafines» en vez de preservar la extrañeza formal que el rastro POB intentó mantener/transliterar. Además, «ejércitos de los cielos» y «los santos de arriba» son posibles, pero en español bíblico legible «huestes de los cielos» y «los santos en lo alto»/«los santos de arriba» compiten; aquí el problema principal no es fidelidad semántica sino textura y registro. También conviene quitar la nota [a] sobre Yahvé, porque el ge’ez aquí no contiene el tetragrámaton sino እግዚአብሔር ‘Señor/Lord’, y la nota actual sobre-explica una política de proyecto no activada por el origen inmediato.
  spanish_quality_summary: 'El texto es legible y digno, pero tiene algunos detalles mejorables: el espaciado con raya es poco natural («Yahvé[a] —los...»), «tierra seca» suena menos idiomático que «tierra firme» o «seco» en contexto, y «ejércitos» militariza más de la cuenta donde «huestes» suena más bíblico y menos rígido. «Ángeles de principados» funciona, aunque es una construcción algo pesada; aun así se puede mantener por fidelidad al catálogo titular.'
  glossary_alignment: 'Alineación parcial. Se respeta «Yahvé» y no se usa «SEÑOR», lo cual coincide con la política general del proyecto, pero aquí esa elección no debe justificarse con una nota como si el nombre divino estuviera explícito en el source inmediato. «El Elegido» está bien alineado con the Chosen One. La mayor desalineación está en las órdenes celestiales: el expediente inglés/theológico favorece transliteración de nombres, no domesticación tradicional. En español conviene reflejar eso al menos con «Kerubén, Serafén y Ofanín» o formas muy cercanas reconocibles, con nota para «Ofanín/Ofanines».'
  issues:
  - severity: medium
    issue: La nota [a] sobre «Yahvé» es engañosa para este versículo.
    rationale: El source ge’ez tiene እግዚአብሔር (‘Lord’), no el tetragrámaton explícito. Aunque la política del proyecto permita «Yahvé» en el texto, la nota actual afirma una situación textual que no está presente aquí.
  - severity: medium
    issue: «Querubines» y «Serafines» domestican los nombres de órdenes celestiales frente al rationale documentado.
    rationale: El rastro inglés y la decisión teológica insisten en preservar la textura apocalíptica mediante transliteración de los nombres de órdenes, no en sustituirlos por las formas tradicionales más familiarizadas.
  - severity: low
    issue: «Ejércitos de los cielos» suena más militar y menos idiomático que «huestes de los cielos».
    rationale: Ambas opciones son posibles, pero «huestes» preserva mejor el valor colectivo de ኃይል en un catálogo celestial y suena más natural en registro bíblico-literario español.
  - severity: low
    issue: Puntuación y espaciado de la aposición con raya mejorables.
    rationale: 'En español conviene integrar mejor la aposición: «Yahvé—los ...—» o con comas, evitando el espacio extraño antes de la raya tras la nota.'
  revised_spanish_text: Y clamarán todas las huestes de los cielos, y todos los santos de arriba, y la hueste de Yahvé—los Kerubén, los Serafén y los Ofanines[a]—, y todos los ángeles de poder, y todos los ángeles de principados[b], y el Elegido, y los demás poderes que están en la tierra firme y sobre el agua.
  revised_footnotes:
