base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/061/011.yaml
  text: On that day they shall raise one voice[a], and they shall bless and praise and exalt in the spirit of faith, and in the spirit of wisdom, and in the spirit of patience, and in the spirit of mercy, and in the spirit of righteousness and peace, and in the spirit of goodness; and all of them shall say with one voice, ‘Blessed be he[e][d][c][b], and blessed be the name of the Lord of Spirits forever and ever.’
  footnotes:
  - marker: a
    text: Or 'in a spirit of faithfulness'; the Ge'ez term can denote faith or fidelity.
    reason: lexical_alternative
  - marker: b
    text: The final virtue may also be rendered 'goodness,' 'kindness,' or 'nobility'; the Ge'ez term is broad.
    reason: lexical_alternative
  - marker: c
    text: The repeated expression 'spirit of ...' is left transparent. It may denote the disposition of praise, divinely given qualities, or more personified heavenly endowments.
    reason: alternative_reading
  - marker: d
    text: Or 'generosity'.
    reason: previous_rendering
  - marker: e
    text: Or 'Blessed be he, and blessed be'.
    reason: previous_rendering
