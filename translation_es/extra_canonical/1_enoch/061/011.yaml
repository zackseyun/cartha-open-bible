translation:
  language: es
  text: 'En aquel día, levantarán una sola voz, y bendecirán, alabarán y ensalzarán en el espíritu de fe[a], y en el espíritu de sabiduría, y en el espíritu de paciencia, y en el espíritu de misericordia, y en el espíritu de justicia y paz, y en el espíritu de bondad[b]; y todos ellos dirán con una sola voz: «Bendito sea él[c], y bendito sea el nombre del Señor de los Espíritus[d] por los siglos de los siglos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge’ez puede significar también ‘en un espíritu de fidelidad’; aquí se traduce ‘fe’ como glosa principal, sin descartar ese matiz.
    reason: lexical_alternative
  - marker: b
    text: También podría traducirse ‘benignidad’, ‘amabilidad’ o ‘generosidad’; aquí se opta por ‘bondad’ por su amplitud semántica en español.
    reason: lexical_alternative
  - marker: c
    text: La fórmula puede leerse como ‘Bendito sea él’ o, de manera más elíptica, ‘Bendito sea, y bendito sea...’. Se mantiene el pronombre para aclarar que la primera bendición se refiere a él mismo y la segunda a su nombre.
    reason: alternative_reading
  - marker: d
    text: ‘Señor de los Espíritus’ es el título tradicional y fijo en 1 Enoc, y se conserva de forma consistente.
    reason: cross_reference
lexical_decisions:
- source_word: ይነሥኡ
  english_pob_choice: they shall raise
  chosen_spanish: levantarán
  alternatives_spanish:
  - alzarán
  - elevarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con ‘una sola voz’, el verbo expresa de modo natural la acción de levantar una proclamación común; ‘levantarán’ conserva el gesto litúrgico y colectivo sin sonar forzado en español.
- source_word: አሐደ ቃለ / በአሐዱ ቃል
  english_pob_choice: one voice
  chosen_spanish: una sola voz
  alternatives_spanish:
  - una sola palabra
  - un solo clamor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es de alabanza unánime, así que ‘voz’ comunica bien el acento coral. ‘Una sola voz’ preserva la repetición enfática del original.
- source_word: ወይባርኩ ወይሴብሑ ወያሌዕሉ
  english_pob_choice: they shall bless and praise and exalt
  chosen_spanish: bendecirán, alabarán y ensalzarán
  alternatives_spanish:
  - bendecirán, glorificarán y exaltarán
  - bendecirán, ensalzarán y alabarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantienen tres verbos diferenciados para conservar la acumulación solemne del texto. ‘Ensalzarán’ responde bien a la idea de exaltar sin perder registro bíblico en español.
- source_word: በመንፈሰ ሃይማኖት
  english_pob_choice: in the spirit of faith
  chosen_spanish: en el espíritu de fe
  alternatives_spanish:
  - en un espíritu de fe
  - en el espíritu de fidelidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la fórmula repetida ‘en el espíritu de...’. ‘Fe’ es la glosa principal, mientras ‘fidelidad’ queda como posibilidad semántica sin imponerla en el texto principal.
- source_word: በመንፈሰ ጥበብ
  english_pob_choice: in the spirit of wisdom
  chosen_spanish: en el espíritu de sabiduría
  alternatives_spanish:
  - por el espíritu de sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Traducción directa y transparente de la lista de virtudes; ‘sabiduría’ preserva el paralelismo con las demás cualidades.
- source_word: በመንፈሰ ትዕግሥት
  english_pob_choice: in the spirit of patience
  chosen_spanish: en el espíritu de paciencia
  alternatives_spanish:
  - en el espíritu de perseverancia
  - en el espíritu de longanimidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Paciencia’ es claro en español moderno y mantiene la fuerza moral de la virtud listada; ‘perseverancia’ y ‘longanimidad’ son alternativas posibles pero más interpretativas.
- source_word: በመንፈሰ ምሕረት
  english_pob_choice: in the spirit of mercy
  chosen_spanish: en el espíritu de misericordia
  alternatives_spanish:
  - en el espíritu de compasión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Misericordia’ es la equivalencia más estable para el registro teológico de esta virtud, y encaja con la serie de dones/actitudes.
- source_word: በመንፈሰ ጽድቅ ወሰላም
  english_pob_choice: in the spirit of righteousness and peace
  chosen_spanish: en el espíritu de justicia y paz
  alternatives_spanish:
  - en el espíritu de rectitud y paz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘ጽድቅ’ admite ‘justicia’ o ‘rectitud’; se eligió ‘justicia’ por su naturalidad en español y por conservar el paralelo con ‘paz’ sin perder la fuerza ética del término.
- source_word: መንፈሰ ኂሩት
  english_pob_choice: in the spirit of goodness
  chosen_spanish: en el espíritu de bondad
  alternatives_spanish:
  - en el espíritu de bondad generosa
  - en el espíritu de benignidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa favoreció ‘goodness’ sobre ‘generosity’ por el alcance más amplio de ኂሩት. ‘Bondad’ es el equivalente natural en español y conserva esa amplitud semántica.
- source_word: ቡሩክ / ይትባረክ
  english_pob_choice: Blessed be he, and blessed be
  chosen_spanish: Bendito sea él, y bendito sea
  alternatives_spanish:
  - Bendito es él, y bendito sea
  - Sea bendito él, y sea bendito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El español litúrgico permite el subjuntivo desiderativo ‘bendito sea’ para reflejar la forma de bendición/jussivo del ge’ez, sin aplanar la distinción gramatical del original.
- source_word: ስሙ ለእግዚአ መናፍስት
  english_pob_choice: the name of the Lord of Spirits
  chosen_spanish: el nombre del Señor de los Espíritus
  alternatives_spanish:
  - el nombre del Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título fijo de 1 Enoc como ‘Señor de los Espíritus’, ya asentado en la tradición de esta obra, sin sustituirlo por una forma más genérica.
- source_word: ለዓለም ወእስከ፡ ለዓለም
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - por siempre jamás
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula doxológica se vierte con una expresión solemne y reconocible en español bíblico, manteniendo el énfasis de repetición temporal del ge’ez.
theological_decisions:
- issue: Sentido de las repeticiones de ‘en el espíritu de...’
  english_pob_reading: The phrases describe the manner or sphere in which the assembled beings offer praise, not necessarily distinct hypostatic spirits.
  chosen_spanish_reading: Las frases se entienden como la esfera o disposición de la alabanza, no como una definición cerrada de espíritus personales distintos.
  alternative_spanish_readings:
  - Como una lista de espíritus casi personificados
  - Como dones espirituales específicos concedidos a los adoradores
  rationale: Se conserva la transparencia de la estructura repetida sin resolver la ambigüedad metafísica. En español, repetir ‘en el espíritu de...’ preserva la tensión interpretativa del original.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar.
- issue: Referente de la fórmula final de bendición
  english_pob_reading: The first blessing is rendered 'Blessed be he' and refers to the Lord of Spirits, followed by an explicit blessing on his name.
  chosen_spanish_reading: La primera bendición se entiende como dirigida a él mismo; la segunda, al nombre del Señor de los Espíritus.
  alternative_spanish_readings:
  - ‘Bendito sea el nombre’ como referente único de ambas cláusulas
  - Una exclamación impersonal de bendición sin sujeto explícito
  rationale: El ge’ez distingue entre la bendición sobre la persona y la bendición sobre su nombre. ‘Bendito sea él’ mantiene esa lectura y hace natural la transición a ‘y bendito sea el nombre’.
  doctrine_reference: Respeto de la distinción litúrgica entre la persona divina y su nombre.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que ajustó ኂሩት desde una posible restricción a ‘generosity’ hacia el valor más amplio ‘goodness/bondad’, y la nota gramatical sobre ቡሩክ / ይትባረክ. Por eso el texto principal usa ‘bondad’ y ‘Bendito sea él’ para reflejar mejor la distinción del original ge’ez.
  spanish_consistency_notes:
  - Se mantiene la repetición de ‘en el espíritu de...’ para conservar la cadencia y la ambigüedad interpretativa del texto fuente.
  - ‘Señor de los Espíritus’ se usa como título fijo y no se paraphrasea.
  - Se evita ‘SEÑOR’ en mayúsculas como sustituto de Yahvé porque aquí el título fuente es específico de 1 Enoc, no una cita directa del Tetragrámaton.
  - La puntuación reproduce la estructura de doxología con cita final y cierre solemne.
