translation:
  language: es
  text: Y vi hasta que el Señor de las ovejas trajo una casa nueva, más grande y más alta que la primera, y la colocó en el lugar de la primera, la cual había sido doblada[a]; y todos sus pilares eran nuevos, y sus adornos eran nuevos y más grandes que los de la primera, la antigua, que él había quitado[b]; y todas las ovejas estaban dentro de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enrollada» o «envuelta»; el verbo ge'ez es difícil y puede describir la antigua casa como recogida antes de ser reemplazada.
    reason: lexical_alternative
  - marker: b
    text: La «casa» probablemente simboliza el santuario restaurado o escatológico, pero se mantiene la imaginería propia de la visión.
    reason: cultural_note
lexical_decisions:
- source_word: እግዚአ አባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el dueño de las ovejas
  - el amo de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título elevado y apocalíptico con «Señor», que en español comunica autoridad divina sin rebajarlo a un simple propietario. «Ovejas» mantiene la imagen simbólica del pasaje.
- source_word: ቤት ኀዲስ
  english_pob_choice: a new house
  chosen_spanish: una casa nueva
  alternatives_spanish:
  - un templo nuevo
  - una morada nueva
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo básico es «casa». Aunque el referente visionario probablemente alude al santuario restaurado, el texto mismo presenta la imagen como «casa», y se mantiene esa forma en el cuerpo principal.
- source_word: ዓቢይ ... ልዑል
  english_pob_choice: greater and loftier
  chosen_spanish: más grande y más alta
  alternatives_spanish:
  - mayor y más elevada
  - más grande y más elevada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La duplicación expresa aumento de tamaño y altura. «Más grande y más alta» es natural en español y conserva ambas dimensiones sin añadir interpretación.
- source_word: እምነ ዝኩ ቀዳማዊ
  english_pob_choice: than the first
  chosen_spanish: que la primera
  alternatives_spanish:
  - que la anterior
  - que la primera de antes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación se formula de modo idiomático en español con «que la primera». Evita una calca pesada y mantiene la referencia a la estructura original.
- source_word: አቀሞ ውስተ መካነ ቀዳማዊት
  english_pob_choice: set it up in the place of the first
  chosen_spanish: la colocó en el lugar de la primera
  alternatives_spanish:
  - la estableció en el lugar de la primera
  - la puso donde estaba la primera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Colocó» expresa la acción de poner/establecer en un sitio específico y resulta natural en español. La frase conserva la idea de reemplazo en el mismo lugar.
- source_word: እንተ ትጠብለለት
  english_pob_choice: which had been folded up
  chosen_spanish: la cual había sido doblada
  alternatives_spanish:
  - la cual había sido enrollada
  - la cual había sido envuelta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la imagen concreta y algo inusual del verbo ge'ez sin resolverla interpretativamente como destrucción. «Doblada» mantiene la tensión léxica y deja abierta la alternativa de «enrollada».
- source_word: አዕማዲ
  english_pob_choice: pillars
  chosen_spanish: pilares
  alternatives_spanish:
  - columnas
  - soportes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pilares» es el término arquitectónico más natural y solemne en español para el paralelo con el edificio visionario.
- source_word: ስና
  english_pob_choice: ornaments
  chosen_spanish: adornos
  alternatives_spanish:
  - ornamentos
  - decoraciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido preciso es algo incierto, pero alude a elementos decorativos del edificio. «Adornos» conserva esa amplitud sin estrechar demasiado el campo semántico.
- source_word: ብሊት
  english_pob_choice: old one
  chosen_spanish: la vieja
  alternatives_spanish:
  - la antigua
  - la vieja casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para la oposición con «la primera» y «la nueva», «la vieja» transmite bien el contraste. Se deja claro que se trata de la estructura anterior.
- source_word: አውፅአ
  english_pob_choice: had taken away
  chosen_spanish: había quitado
  alternatives_spanish:
  - había retirado
  - había apartado
  - había sacado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de reemplazo del edificio, «quitar» expresa bien la remoción de la estructura anterior sin imponer una lectura más fuerte que el ge'ez no exige.
- source_word: ማእከላ
  english_pob_choice: within it
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en medio de ella
  - en su interior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Dentro de ella» conserva la imagen de contención espacial y es fluido en español.
theological_decisions:
- issue: Si traducir ቤት como «casa» o interpretarlo como «templo/santuario»
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  - santuario
  rationale: La visión apocalíptica probablemente apunta al santuario restaurado, pero el texto transmite esa realidad mediante la imagen concreta de una «casa». Mantener «casa» preserva la textura simbólica y evita cerrar prematuramente la interpretación.
  doctrine_reference: 'Translation philosophy: primacía del texto fuente y preservación de la imaginería apocalíptica'
- issue: Cómo reflejar እንተ ትጠብለለት sin interpretar en exceso el destino de la primera casa
  english_pob_reading: which had been folded up
  chosen_spanish_reading: la cual había sido doblada
  alternative_spanish_readings:
  - la cual había sido enrollada
  - la cual había sido removida/demolida
  rationale: La expresión ge'ez es concreta y ambigua. Se conserva la imagen física de haber sido «doblada», en vez de sustituirla por una explicación teológica o arquitectónica más definitiva.
  doctrine_reference: 'Translation philosophy: preservar la tensión textual y no resolver la imagen por adelantado'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión inglesa: se mantuvo la forma breve «la primera» en lugar de una expresión más pesada, y se conservó «que él había quitado» con un relativo natural en español. También se respetó la preferencia editorial por un registro claro y fluido sin perder el simbolismo de la visión.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto solo cuando el hebreo subyacente lo exige; aquí el sujeto es el «Señor de las ovejas», siguiendo el dato ge'ez y el audit trail inglés.
  - Se conserva «casa» en vez de «templo» para no convertir la imagen visionaria en interpretación directa.
  - «Pilares» y «adornos» mantienen el registro arquitectónico sin sobreespecificar.
  - La cláusula final usa «dentro de ella» para reflejar el enclavamiento espacial de las ovejas en la nueva estructura.
