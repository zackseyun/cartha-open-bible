base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/029.yaml
  text: And I saw until the Lord of the sheep brought a new house[a], greater and loftier than the first, and set it up in the place of the first, which had been folded up; and all its pillars were new, and its ornaments were new and greater than those of the first old one that he had taken away[b], and all the sheep were within it.
  footnotes:
  - marker: a
    text: Or 'rolled up' or 'wrapped up'; the Ge'ez verb is difficult and may describe the former house as being folded together before replacement.
    reason: lexical_alternative
  - marker: b
    text: The 'house' likely symbolizes the restored or eschatological sanctuary, but the vision's own imagery is retained in the translation.
    reason: cultural_note
