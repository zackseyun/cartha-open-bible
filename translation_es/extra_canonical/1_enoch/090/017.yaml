review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en lo esencial el sentido del ge''ez y del audit trail inglés: mantiene la fórmula visionaria, conserva «aquel hombre», refleja correctamente que el libro trata de la destrucción causada por los doce pastores y preserva el título simbólico «Señor de las ovejas». Sin embargo, la cláusula final «mucho más que los anteriores a ellos» suena poco natural y puede sugerir comparación de personas en vez de comparación de destrucción; conviene una redacción española más clara que mantenga el sentido aprobado en la revisión inglesa: que ellos destruyeron más que sus predecesores.'
  spanish_quality_summary: 'La redacción es generalmente digna y legible, pero tiene dos asperezas de estilo: «vi hasta que» es fórmula aceptable, aunque marcada, y «los anteriores a ellos» resulta torpe en español eclesial general. También «por la palabra del Señor» es comprensible, pero dentro del proyecto conviene preferir «Yahvé» cuando no hay razón fuerte para exceptuarlo; aquí «Señor de las ovejas» sí debe mantenerse como título interno de la visión, pero «por la palabra de Yahvé» mejora la alineación terminológica sin afectar la lectura.'
  glossary_alignment: 'Hay una desviación menor respecto del glosario del proyecto: el borrador usa «Señor» en «por la palabra del Señor» donde el valor no es el título fijo «Señor de las ovejas», sino una referencia divina general que por defecto debería verterse «Yahvé». En cambio, «Señor de las ovejas» está bien conservado como título visionario propio. El resto de la terminología clave está alineado.'
  issues:
  - severity: medium
    issue: Uso de «Señor» en «por la palabra del Señor»
    rationale: El proyecto establece «Yahvé» como forma principal para el nombre divino en el texto español. Aquí no se trata del título simbólico «Señor de las ovejas», así que no hay una razón suficiente para apartarse del estándar del proyecto.
  - severity: medium
    issue: «los anteriores a ellos» es poco natural y algo ambiguo
    rationale: Aunque refleja el audit trail, en español suena forzado y puede hacer pensar en comparación de personas más que en comparación de la destrucción causada. «sus predecesores» comunica mejor el mismo sentido fuente sin añadir interpretación indebida.
  revised_spanish_text: Y vi hasta[a] que aquel hombre, que escribía un libro por la palabra de Yahvé, abrió aquel libro de destrucción que aquellos doce pastores habían causado, y mostró delante del Señor de las ovejas que habían destruido mucho más que sus predecesores.
  revised_footnotes:
  - marker: a
    text: 'El giro es fórmula visionaria: puede leerse también «y miré hasta»; se mantiene «vi hasta» para seguir la repetición del capítulo y no perder el ritmo narrativo.'
    reason: alternative_reading
  revision_rationale: Se ajusta «Señor» a «Yahvé» conforme al estándar terminológico del proyecto en la referencia divina general, mientras se conserva «Señor de las ovejas» como título propio de la alegoría. También se sustituye «los anteriores a ellos» por «sus predecesores» para lograr una expresión española más natural y precisa sin alterar el sentido aprobado por la revisión fuente.
