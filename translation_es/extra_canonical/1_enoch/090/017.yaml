revisions:
- from: Y vi hasta[a] que aquel hombre, que escribía un libro por la palabra del Señor, abrió aquel libro de destrucción que aquellos doce pastores habían causado, y mostró delante del Señor de las ovejas que habían destruido mucho más que los anteriores a ellos.
  to: Y vi hasta[a] que aquel hombre, que escribía un libro por la palabra de Yahvé, abrió aquel libro de destrucción que aquellos doce pastores habían causado, y mostró delante del Señor de las ovejas que habían destruido mucho más que sus predecesores.
  rationale: Se ajusta «Señor» a «Yahvé» conforme al estándar terminológico del proyecto en la referencia divina general, mientras se conserva «Señor de las ovejas» como título propio de la alegoría. También se sustituye «los anteriores a ellos» por «sus predecesores» para lograr una expresión española más natural y precisa sin alterar el sentido aprobado por la revisión fuente.
  reviewer_model: gpt-5.4
