translation:
  language: es
  text: Y vi hasta[a] que aquel hombre, que escribía un libro por la palabra de Yahvé, abrió aquel libro de destrucción que aquellos doce pastores habían causado, y mostró delante del Señor de las ovejas que habían destruido mucho más que sus predecesores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El giro es fórmula visionaria: puede leerse también «y miré hasta»; se mantiene «vi hasta» para seguir la repetición del capítulo y no perder el ritmo narrativo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወርኢክዎ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y seguí viendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula visionaria se expresa con un pasado simple natural en español y conserva el carácter de testimonio de la visión.
- source_word: ብእሲ
  english_pob_choice: man
  chosen_spanish: aquel hombre
  alternatives_spanish:
  - ese hombre
  - aquel ser
  - esa figura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el sustantivo humano del texto y, por el contexto visionario, se usa demostrativo para remitir a la figura ya vista sin identificarla más allá de lo que el texto permite.
- source_word: ዘይጽሕፍ መጽሐፈ
  english_pob_choice: who was writing a book
  chosen_spanish: que escribía un libro
  alternatives_spanish:
  - que estaba escribiendo un libro
  - que registraba en un libro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El participio relativo pide una acción en curso o habitual; en español, «escribía» reproduce esa continuidad sin sobreinterpretar el oficio exacto.
- source_word: በቃለ እግዚአ
  english_pob_choice: by the word of the Lord
  chosen_spanish: por la palabra del Señor
  alternatives_spanish:
  - por la palabra de Yahvé
  - según la palabra del Señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este pasaje la fuente inmediata es griega/etiópica con κύριος/egzi'a; la versión inglesa opta por «Lord». En español se mantiene «Señor» porque aquí funciona como título de comisión revelada, y «por la palabra de» conserva la idea de autorización.
- source_word: ፈትሖ ለውእቱ መጽሐፈ
  english_pob_choice: opened that book
  chosen_spanish: abrió aquel libro
  alternatives_spanish:
  - desató aquel libro
  - abrió ese libro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo significa de manera directa «abrir»; no se añade la imagen de «desatar» porque no está explicitada en el ge'ez de este versículo.
- source_word: መጽሐፈ ሐጕል
  english_pob_choice: book of destruction
  chosen_spanish: libro de destrucción
  alternatives_spanish:
  - libro de ruina
  - libro de perdición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el sustantivo abstracto sin intensificarlo con lenguaje técnico posterior. «Destrucción» refleja bien el juicio denunciado en el contexto.
- source_word: ዘአሕጐሉ
  english_pob_choice: which those twelve shepherds had wrought
  chosen_spanish: que aquellos doce pastores habían causado
  alternatives_spanish:
  - que aquellos doce pastores habían hecho
  - que aquellos doce pastores habían destruido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión crítica del inglés señaló que el ge'ez forma un giro causativo/cognado ligado a «destrucción». En español, «habían causado» evita la idea errónea de que destruyeron un libro físico y preserva que ellos produjeron la destrucción.
- source_word: ፲ወ፪የአቱ
  english_pob_choice: those twelve shepherds
  chosen_spanish: aquellos doce pastores
  alternatives_spanish:
  - esos doce pastores
  - los doce pastores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el término técnico propio de la alegoría animal, «pastores», para no sustituirlo por un equivalente eclesiástico ajeno al imaginario del libro.
- source_word: አርአዩ
  english_pob_choice: he showed
  chosen_spanish: y mostró
  alternatives_spanish:
  - y dio a ver
  - y reveló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Mostrar» conserva la fuerza demostrativa y judicial del verbo sin añadir un matiz teológico no requerido por el texto.
- source_word: ፈድፋደ እምቅድሜሆሙ
  english_pob_choice: much more than those before them
  chosen_spanish: mucho más que los anteriores a ellos
  alternatives_spanish:
  - mucho más que sus predecesores
  - mucho más que los que vinieron antes de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se sigue la corrección del audit trail: el ge''ez compara con los que vinieron antes, no con una comisión previa. «Los anteriores a ellos» preserva la referencia histórica sin interpolar ''lo mandado''.'
- source_word: ቅድመ እግዚአ አባግዕ
  english_pob_choice: before the Lord of the sheep
  chosen_spanish: delante del Señor de las ovejas
  alternatives_spanish:
  - ante el Señor de las ovejas
  - en presencia del Señor de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el título propio de la visión, «Señor de las ovejas», en lugar de generalizarlo a «Dios», porque forma parte del lenguaje simbólico interno del pasaje.
theological_decisions:
- issue: Identidad de «aquel hombre» que escribe el libro
  english_pob_reading: Render simply as 'that man' without identifying him more specifically in the main text.
  chosen_spanish_reading: Renderizar simplemente «aquel hombre» sin identificarlo más específicamente en el texto principal.
  alternative_spanish_readings:
  - aquel ángel
  - aquel escriba celestial
  - esa figura
  rationale: El ge'ez dice literalmente «hombre» y la visión suele presentar seres celestiales con apariencia humana. Mantener la designación simple evita una identificación interpretativa no garantizada por el texto.
  doctrine_reference: Preservar la tensión del texto original sin resolverla por adelantado.
- issue: Sentido de la destrucción atribuida a los doce pastores
  english_pob_reading: The twelve shepherds destroyed much more than those before them / exceeded what was assigned to them.
  chosen_spanish_reading: Los doce pastores causaron destrucción en exceso de la de los anteriores a ellos.
  alternative_spanish_readings:
  - destruyeron mucho más que los anteriores a ellos
  - excedieron lo que se les había asignado
  rationale: La revisión del inglés indica que el final es difícil y que la comparación correcta es con los que vinieron antes. En español se conserva la acusación de exceso sin introducir de nuevo la idea de un mandato explícito que el ge'ez de este versículo no expresa claramente.
  doctrine_reference: Primacía del original sobre una tradición de traducción; conservar la ambigüedad documentada.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pase de revisión que corrigió dos puntos importantes del inglés auditado: (1) el ge''ez ሐጕል፡ ዘአሕጐሉ no describe un libro destruido, sino la destrucción causada por los pastores; por eso el español usa «libro de destrucción que ... habían causado»; (2) እምቅድሜሆሙ compara con los anteriores, no con un encargo previo, así que se evitó toda interpolación de «mandado» o «asignado».'
  spanish_consistency_notes:
  - Se mantiene «Señor de las ovejas» como título técnico propio de la alegoría.
  - Se conserva «pastores» para ፲ወ፪የአቱ, evitando sustituciones eclesiásticas.
  - Se usa «destrucción» para መጽሐፈ ሐጕል, con la relación cognada explicada en las notas de decisión.
  - El tono es sobrio, literal en lo esencial y apto para publicación.
