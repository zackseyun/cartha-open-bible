base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/017.yaml
  text: And I saw until that man[a], who was writing a book by the word of the Lord, opened that book of destruction which those twelve shepherds had wrought[e][d][c][b], and he showed before the Lord of the sheep that they had destroyed much more than those before them.
  footnotes:
  - marker: a
    text: The final clause is difficult in the Ethiopic. The sense appears to be that the twelve shepherds destroyed beyond the limit or charge assigned to them.
    reason: textual_variant
  - marker: b
    text: '''Lord of the sheep'' is the vision''s own title within the animal imagery and is kept rather than replaced with a generic divine title.'
    reason: cultural_note
  - marker: c
    text: Or 'opened that book of destruction which those twelve shepherds had destroyed'.
    reason: previous_rendering
  - marker: d
    text: Or 'much more than what was commanded before them'.
    reason: previous_rendering
  - marker: e
    text: Or 'And I saw till'.
    reason: previous_rendering
