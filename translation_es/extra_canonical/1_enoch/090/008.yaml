translation:
  language: es
  text: Y vi en la visión que unos cuervos[a][b] bajaron volando sobre aquellos corderos, y se apoderaron de uno de aquellos corderos, y despedazaron a las ovejas y las devoraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El etíope distingue aquí a los miembros del rebaño atacados con términos que pueden solaparse entre 'corderos' y 'ovejas'; el español mantiene 'corderos' al inicio y 'ovejas' después para reflejar ese cambio léxico.
    reason: lexical_alternative
  - marker: b
    text: El verbo también podría entenderse más ampliamente como 'se lanzaron sobre' o 'vinieron contra'; se tradujo 'bajaron volando sobre' para conservar de forma explícita el movimiento aviar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula visionaria de primera persona se expresa de manera natural en español con 'vi', que conserva el carácter narrativo y revelado del pasaje sin añadir matiz interpretativo.
- source_word: በራእይ
  english_pob_choice: in the vision
  chosen_spanish: en la visión
  alternatives_spanish:
  - en una visión
  - en el visionario relato
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión marca el ámbito de la experiencia visionaria; 'en la visión' mantiene la referencia definida y el tono apocalíptico.
- source_word: ቋዓተ
  english_pob_choice: ravens
  chosen_spanish: cuervos
  alternatives_spanish:
  - cornejas
  - aves negras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cuervos'' reproduce con claridad la especie aviar y conserva la imaginería concreta del apocalipsis animal.'
- source_word: ከመ፡ ሰረሩ፡ ዲበ
  english_pob_choice: flew down upon
  chosen_spanish: descendieron sobre
  alternatives_spanish:
  - se lanzaron sobre
  - volaron hacia abajo sobre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'descendieron sobre' conserva el movimiento desde arriba y el carácter hostil sin sonar forzado; mantiene suficiente la imagen aviar documentada en la nota inglesa.
- source_word: እልክቱ፡ መዓስእ
  english_pob_choice: those lambs
  chosen_spanish: aquellos corderos
  alternatives_spanish:
  - aquellos corderitos
  - aquellas ovejas jóvenes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Siguiendo el contexto del rebaño y la distinción interna del versículo, 'corderos' preserva el contraste con las 'ovejas' posteriores sin sobreinterpretar la simbolización.
- source_word: ወአኀዝዎ፡ ለአሐዱ፡ እምዝኩ፡ መዓስእ
  english_pob_choice: and they seized one of those lambs
  chosen_spanish: y se apoderaron de uno de aquellos corderos
  alternatives_spanish:
  - y tomaron a uno de aquellos corderos
  - y agarraron a uno de aquellos corderos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Se apoderaron de'' expresa con fuerza la captura violenta implícita en el verbo y sugiere la acción predatoria mejor que un ''tomaron'' neutro.'
- source_word: ወቀጥቀጥዎሙ፡ ለአባግዕ
  english_pob_choice: and dashed the sheep to pieces
  chosen_spanish: y despedazaron a las ovejas
  alternatives_spanish:
  - y las hicieron pedazos
  - y quebrantaron a las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo reduplicado pide una equivalencia enérgica; 'despedazaron' comunica violencia extrema sin añadir una imagen ajena al texto.
- source_word: ወበልዕዎሙ
  english_pob_choice: and devoured them
  chosen_spanish: y se los comieron
  alternatives_spanish:
  - y las devoraron
  - y las consumieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El español idiomático 'se los comieron' mantiene la voracidad del acto y el cierre narrativo con naturalidad, evitando un calco menos fluido.
theological_decisions:
- issue: Mantener la imaginería animal concreta sin trasladar la escena a una interpretación histórica o política en el texto principal
  english_pob_reading: 'Retain literal animal imagery: ravens, lambs, sheep'
  chosen_spanish_reading: 'Conservar la imaginería literal: cuervos, corderos, ovejas'
  alternative_spanish_readings:
  - Convertir la imagen en naciones o dirigentes hostiles
  - Glosar el símbolo dentro del versículo
  rationale: La traducción debe preservar la superficie simbólica del Apocalipsis animal y no resolverla interpretativamente en el cuerpo del versículo.
  doctrine_reference: 'Principio POB: preservar la imaginería apocalíptica; evitar la paráfrasis interpretativa en el texto principal.'
translation_notes:
  revision_awareness: 'El audit trail inglés indica que no hubo revisiones aplicadas y que el acuerdo entre evaluaciones fue alto; por eso se mantiene una solución española directa, conservando las dos tensiones léxicas documentadas: el doblete corderos/ovejas y el movimiento aviar hostil.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece.
  - '''Cuervos'', ''corderos'' y ''ovejas'' mantienen la imaginería concreta del capítulo.'
  - Se evita introducir interpretación simbólica en el cuerpo del versículo.
  - El registro es digno y moderno, sin arcaísmos innecesarios.
