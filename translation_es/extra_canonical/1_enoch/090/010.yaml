translation:
  language: es
  text: 'Y miró hacia ellas[a], [y se les abrieron los ojos,] y gritó a las ovejas y les dijo: «¡Miren!», y todas corrieron hacia ello[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo aquí es de tercera persona singular, no la fórmula visionaria de primera persona «vi». Por eso se traduce con un sujeto en tercera persona.
    reason: source_note
  - marker: b
    text: El pronombre final también puede entenderse como «él» si la figura singular se toma de manera más personal. Aquí se usa «ello» para conservar la superficie simbólica de la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርእየ
  english_pob_choice: And it looked at them
  chosen_spanish: Y lo miró
  alternatives_spanish:
  - Y los miró
  - Y miró hacia ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez es de 3.ª persona singular perfecta, no una fórmula de primera persona. «Lo miró» conserva la escena visionaria y evita convertir el texto en relato en primera persona.
- source_word: ቦሙ
  english_pob_choice: among them
  chosen_spanish: lo
  alternatives_spanish:
  - entre ellos
  - en medio de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto corregido sugiere una mirada dirigida hacia el grupo; en español, el complemento directo con el pronombre «lo» refleja mejor el objeto singular de la visión que una simple localización.
- source_word: ወተፈትሐ አዕይንቲሆሙ
  english_pob_choice: '[their eyes were opened]'
  chosen_spanish: '[y se les abrieron los ojos]'
  alternatives_spanish:
  - '[y fueron abiertos sus ojos]'
  - '[se abrieron sus ojos]'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el motivo textual y la incertidumbre al mantener corchetes. En español, la pasiva refleja «se les abrieron los ojos» es natural y conserva la idea de apertura/percepción sin forzar un calco.
- source_word: ወጸርኀ
  english_pob_choice: it cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa una vocalización fuerte; «gritó» transmite mejor la urgencia de la escena que un verbo más neutro.
- source_word: ሎሙ ለአባግዕ
  english_pob_choice: to the sheep
  chosen_spanish: a las ovejas
  alternatives_spanish:
  - a los corderos
  - a la ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El dativo plural se expresa de manera directa como «a las ovejas», manteniendo el registro simbólico del Apocalipsis animal.
- source_word: ወይቤላት ርእይዎ
  english_pob_choice: and said to them, 'Look!'
  chosen_spanish: 'y les dijo: «¡Miren!»'
  alternatives_spanish:
  - 'y les dijo: «¡Miren eso!»'
  - 'y les dijo: «¡Vean!»'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión muestra que aquí hay un verbo de decir junto con un imperativo plural. «¡Miren!» preserva el llamado abrupto a la percepción sin añadir un objeto no explicitado.
- source_word: ወሮጹ ኵሎሙ ኀቤሁ
  english_pob_choice: And all of them ran to it
  chosen_spanish: y todas corrieron hacia él
  alternatives_spanish:
  - y todas corrieron hacia ello
  - y todas se apresuraron hacia él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica correr, y el plural concuerda con las ovejas. Se opta por «hacia él» para reflejar la lectura alternativa personalizable del referente final sin borrar la tensión simbólica.
theological_decisions:
- issue: Si el referente final debe mantenerse como figura simbólica o personalizarse
  english_pob_reading: Use the pronoun 'it' rather than 'him' in the main text
  chosen_spanish_reading: Usar «él» en el texto principal, con la posibilidad de entenderlo como figura simbólica o personalizable
  alternative_spanish_readings:
  - usar «ello»
  - usar «él» con nota de alternativa
  rationale: La revisión más reciente corrige el sentido del pasaje y deja abierta la identidad del referente. En español, «hacia él» permite conservar la tensión entre una figura del visionario y una posible personalización, sin resolverla de antemano.
  doctrine_reference: Preservar la tensión interpretativa local del pasaje; no cerrar prematuramente la imaginería del ciclo visionario.
translation_notes:
  revision_awareness: 'La traducción incorpora la corrección de la revisión más reciente: ወርእየ es tercera persona singular («lo miró»), ወይቤላት introduce un verbo de decir con imperativo («y les dijo: ¡Miren!»), y ርእይዎ no se trata como imperativo. Se evitó la lectura anterior de primera persona y la inserción de elementos no sustentados por el ge''ez.'
  spanish_consistency_notes:
  - Se mantiene «ovejas» para አባግዕ, siguiendo el registro simbólico del texto.
  - Se conserva el corchete para la cláusula textual incierta, como en el audit trail inglés.
  - Se usa puntuación directa y comillas angulares para un estilo bíblico moderno en español.
  - Se evita «SEÑOR» u otra sustitución que no corresponde en este versículo.
