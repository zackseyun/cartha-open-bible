  - marker: b
    text: El texto dice simplemente «aves», sin especificar «aves de rapiña», aunque el sentido depredador está implícito por la imagen de devorar.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'en mi sueño' a 'mientras dormía' para respetar la decisión auditada de literalidad ('in my sleep'), se cambia 'sobre aquel pastor' por 'por aquel pastor' para un español más natural, y se pule la nota [a] para alinearla mejor con la alternativa léxica documentada.
