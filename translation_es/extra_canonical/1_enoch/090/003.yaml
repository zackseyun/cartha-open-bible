    issue: '''en mi sueño'' no sigue la decisión auditada de ''in my sleep'''
    rationale: El rastro inglés documenta explícitamente la preferencia por la literalidad de 'sleep' frente a 'dream'. En español, 'mientras dormía' preserva mejor esa decisión que 'en mi sueño', que reinterpreta el sustantivo hacia el contenido onírico.
  - severity: medium
    issue: '''sobre aquel pastor'' es poco natural en español para el sentido de lamentación'
    rationale: Con verbos como 'lamentar' o 'llorar', 'por aquel pastor' expresa con más claridad que el lamento es respecto de él, no una ubicación metafórica 'sobre' él.
  - severity: low
    issue: La nota [a] necesita pulido formal y mejor alineación con la alternativa inglesa
    rationale: La redacción actual empieza con una comilla sobrante y ofrece solo 'lloré', mientras que el inglés preserva también la posibilidad de 'I watched and wailed'. Conviene reflejar de manera más limpia la variación posible sin introducir torpeza tipográfica.
