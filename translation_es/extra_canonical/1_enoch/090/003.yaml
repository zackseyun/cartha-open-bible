translation:
  language: es
  text: Y las ovejas clamaron porque su carne estaba siendo devorada por las aves[b], y yo miré y lamenté[a] mientras dormía por aquel pastor que pastoreaba a las ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «observé y lloré mientras dormía». El verbo que expresa la respuesta del visionario puede traducirse con distintos grados de dolor audible.'
    reason: lexical_alternative
  - marker: b
    text: El texto dice simplemente «aves», sin especificar «aves de rapiña», aunque el sentido depredador está implícito por la imagen de devorar.
    reason: lexical_alternative
lexical_decisions:
- source_word: አባግዕ
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural literal se conserva; en la visión apocalíptica conviene mantener la imagen animal concreta y no generalizarla como rebaño en el texto principal.
- source_word: ጸርኁ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - lanzaron un clamor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa un clamor audible de dolor o protesta. 'Clamaron' mantiene la intensidad sin forzar una lectura litúrgica o demasiado específica.
- source_word: ይትበልዑ
  english_pob_choice: was being devoured
  chosen_spanish: estaba siendo devorada
  alternatives_spanish:
  - era comida
  - estaba siendo comida
  - era devorada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva progresiva comunica bien la acción violenta y continua. Se ajusta al español con concordancia singular con 'carne', como en el audit trail inglés.
- source_word: ሥጋሆሙ
  english_pob_choice: their flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - sus cuerpos
  - su cuerpo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva 'carne' por su fuerza literal y visceral. En español, el singular colectivo 'su carne' funciona naturalmente con el sujeto plural 'las ovejas'.
- source_word: እምነ አዕዋፍ
  english_pob_choice: by the birds
  chosen_spanish: por las aves
  alternatives_spanish:
  - por los pájaros
  - por las aves de rapiña
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Aves'' reproduce el término genérico del texto, como en el POB inglés. No se especifica ''de rapiña'' en el cuerpo principal porque esa precisión es inferida, no explícita.'
- source_word: ነጸርኩ
  english_pob_choice: I looked
  chosen_spanish: miré
  alternatives_spanish:
  - observé
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo simple y natural para la secuencia visionaria; mantiene la observación sin añadir matices interpretativos.
- source_word: አውየውኩ
  english_pob_choice: lamented
  chosen_spanish: lamenté
  alternatives_spanish:
  - me dolí
  - me lamenté
  - lloré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lamenté'' conserva el registro sobrio y apocalíptico que el inglés POB eligió con ''lamented'', sin confundirlo con un mero llanto.'
- source_word: በንዋምየ
  english_pob_choice: in my sleep
  chosen_spanish: en mi sueño
  alternatives_spanish:
  - durante mi sueño
  - mientras dormía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el ge'ez dice literalmente 'en mi sueño', en español 'en mi sueño' resulta más natural y sigue la misma imagen onírica que el contexto del pasaje.
- source_word: ኖላዊ
  english_pob_choice: shepherd
  chosen_spanish: pastor
  alternatives_spanish:
  - pastor de ovejas
  - guía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pastor'' es el equivalente directo y natural en español. Se evita ''pastor'' en sentido eclesiástico porque aquí es una figura visionaria de cuidado de ovejas.'
- source_word: ዘይርዕዮሙ
  english_pob_choice: who was shepherding the sheep
  chosen_spanish: que pastoreaba a las ovejas
  alternatives_spanish:
  - que guiaba a las ovejas
  - que las apacentaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pastoreaba'' conserva el verbo de cuidado pastoral y reproduce el progresivo del original y del POB inglés. ''Apacentaba'' sería posible, pero menos transparente para lectores modernos.'
theological_decisions:
- issue: Mantener la imaginería apocalíptica animal sin convertirla en interpretación alegórica en el texto principal
  english_pob_reading: Retain the literal visionary imagery of sheep, birds, and shepherd.
  chosen_spanish_reading: Conservar la imagen literal de ovejas, aves y pastor.
  alternative_spanish_readings:
  - Traducir directamente a personas, enemigos y gobernantes
  - Explicitar el sentido alegórico en la línea principal
  rationale: El pasaje pertenece a una visión apocalíptica; el texto base debe preservar la imagen recibida. La identificación de referentes históricos pertenece al comentario, no al versículo.
  doctrine_reference: Principio de lectura literario-visionaria en literatura apocalíptica.
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa, que prefirió 'shepherding the sheep' frente a una formulación más genérica. En español, esto se reflejó con 'pastoreaba a las ovejas' para mantener naturalidad y cercanía semántica con 'pastor'.
  spanish_consistency_notes:
  - Se conservó 'ovejas' y 'pastor' de forma coherente con la imaginería del capítulo.
  - Se mantuvo 'carne' para preservar la crudeza del cuadro.
  - Se evitó 'SEÑOR' y otras sustituciones teológicas no presentes en el texto base.
  - Los marcadores de nota se colocan solo donde hay una alternativa léxica real en el español.
