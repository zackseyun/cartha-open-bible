revisions:
- from: Y vi hasta el tiempo cuando veintitrés estaban pastoreando[a], y cumplieron[b], en sus tiempos respectivos, cincuenta y ocho tiempos[c].
  to: Y vi hasta el tiempo cuando veintitrés ejercían de pastores[a], y completaron, en sus tiempos respectivos, cincuenta y ocho tiempos[b].
