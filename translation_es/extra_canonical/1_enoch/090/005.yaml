translation:
  language: es
  text: Y vi hasta el tiempo cuando veintitrés ejercían de pastores[a], y completaron, en sus tiempos respectivos, cincuenta y ocho tiempos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La revisión textual entiende aquí el verbo etiópico en el sentido de «ejercer de pastores» o «pastorear», no de «ver».
    reason: textual_variant
  - marker: b
    text: Literalmente, «cincuenta y ocho tiempos»; puede referirse a períodos o plazos contados, no necesariamente a acciones repetidas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y seguí viendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la fórmula narrativa visionaria normal; «vi» reproduce el informe apocalíptico sin añadir matiz innecesario.
- source_word: እስከ ዘመን
  english_pob_choice: until the time
  chosen_spanish: hasta el tiempo
  alternatives_spanish:
  - hasta un tiempo
  - hasta el momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el límite temporal de la visión con una construcción natural en español y fiel al valor delimitador del giro etiópico.
- source_word: ይሬዐዩ
  english_pob_choice: were shepherding
  chosen_spanish: estaban pastoreando
  alternatives_spanish:
  - estaban apacentando
  - estaban pastoreando los rebaños
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige el sentido desde 'ver' a 'pastorear'. En español, «estaban pastoreando» conserva el valor verbal y el trasfondo simbólico de los pastores sin introducir una interpretación más fuerte que la del texto.
- source_word: ፳ወ፫
  english_pob_choice: twenty-three
  chosen_spanish: veintitrés
  lexicon: Sistema numeral ge'ez
  rationale: Correspondencia directa del numeral.
- source_word: ወፈጸሙ
  english_pob_choice: and they completed
  chosen_spanish: y cumplieron
  alternatives_spanish:
  - y completaron
  - y terminaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cumplieron» conserva la idea de llevar a término un período o comisión, y resulta más idiomático en español que una repetición de «completaron».
- source_word: በበጊዜሆሙ
  english_pob_choice: in their respective times
  chosen_spanish: en sus tiempos respectivos
  alternatives_spanish:
  - cada uno en su tiempo
  - en sus tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fuerza distributiva se expresa de manera directa y transparente; «sus tiempos respectivos» evita perder la distribución individual.
- source_word: ፶ወ፰ጊዜያተ
  english_pob_choice: fifty-eight times
  chosen_spanish: cincuenta y ocho tiempos
  alternatives_spanish:
  - cincuenta y ocho períodos
  - cincuenta y ocho temporadas
  lexicon: Sistema numeral ge'ez
  rationale: Se mantiene el cómputo literal de la fuente. «Tiempos» preserva la ambigüedad del término de duración sin resolverla interpretivamente.
theological_decisions:
- issue: Sentido de la cronología simbólica y de las unidades contadas
  english_pob_reading: Render the final count literally as 'fifty-eight times' rather than interpretively as years, periods, or shepherding terms in the main text.
  chosen_spanish_reading: Traducir literalmente «cincuenta y ocho tiempos» sin convertirlo en años ni en otra unidad explicada.
  alternative_spanish_readings:
  - cincuenta y ocho períodos
  - cincuenta y ocho temporadas
  - cincuenta y ocho años
  rationale: 'La audibilidad textual favorece conservar la tensión interpretativa: el texto cuenta unidades simbólicas, pero no fuerza en esta cláusula una equivalencia histórica concreta. La traducción principal debe reflejar esa reserva.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
- issue: Identificación de los 'veintitrés' dentro del esquema de los pastores
  english_pob_reading: The Ethiopic wording is difficult here; the clause may refer to a counted sequence reaching twenty-three, but the exact verb sense is uncertain in this witness.
  chosen_spanish_reading: Mantener «veintitrés» con un verbo de pastoreo que respete la revisión textual, sin añadir identificación histórica explícita.
  alternative_spanish_readings:
  - veintitrés habían aparecido
  - veintitrés habían mirado
  rationale: La nota auditada muestra que el testimonio etiópico es difícil y que el sentido exacto del verbo no debe cerrarse indebidamente. El español conserva esa cautela y no sustituye el dato por una explicación interpretativa.
  doctrine_reference: 'POB translation principle: preserve documented uncertainty rather than smooth it away.'
translation_notes:
  revision_awareness: 'La base inglesa pasó por una corrección importante: la lectura inicial «when twenty-three had looked» fue revisada a «when twenty-three were shepherding/shepherding». La versión española sigue la lectura corregida, manteniendo además la ambigüedad cronológica del cierre («fifty-eight times») sin interpretarla.'
  spanish_consistency_notes:
  - Se prefirió el imperativo narrativo breve «Y vi» para el arranque visionario.
  - «Pastoreando» conserva la imaginería de los pastores y evita el falso amigo «ver».
  - «Tiempos» se mantiene como unidad literal y ambigua, coherente con el estilo de POB.
  - Las notas usan marcadores únicos y aparecen ancladas exactamente donde corresponde en el texto.
