    rationale: Aunque la preposición ge'ez es literalmente 'con', en español la expresión principal en un contexto de lucha se entiende mejor como 'contra él'. La nota puede conservar la observación filológica sin forzar una construcción menos idiomática.
  - severity: low
    issue: La nota c mezcla alternativa y comentario editorial
    rationale: La pista inglesa conserva una alternativa breve ('Or "to lay low"'/antes 'derribarlo'). En español conviene formular la nota como alternativa de traducción, no como explicación de historial de revisión dentro de la nota misma.
  - severity: low
    issue: El cierre puede sonar más completo con 'no pudieron prevalecer'
    rationale: '''No prevalecieron contra él'' es entendible, pero ''no pudieron prevalecer contra él'' refleja mejor el matiz de no lograr su propósito en español natural.'
