translation:
  language: es
  text: Y aquellos cuervos pelearon y combatieron contra él[a], y quisieron quitarle su cuerno[b][c], pero no pudieron prevalecer contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con él'; la preposición del ge'ez es literalmente 'con', pero el contexto es de conflicto hostil.
    reason: lexical_alternative
  - marker: b
    text: O 'derribarlo'.
    reason: previous_rendering
  - marker: c
    text: '''Cuerno'' se conserva literalmente como parte de la imaginería de la visión, en vez de traducirse de forma interpretativa como ''poder'' o ''fuerza''.'
    reason: cultural_note
lexical_decisions:
- source_word: እልኩ
  english_pob_choice: those ravens
  chosen_spanish: aquellos cuervos
  alternatives_spanish:
  - aquellos cuervos negros
  - aquellas aves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta y simbólica del apocalipsis animal. 'Cuervos' sigue la decisión inglesa de corvids y evita volverlo genérico con 'aves'.
- source_word: ቋዓት
  english_pob_choice: fought
  chosen_spanish: pelearon
  alternatives_spanish:
  - lucharon
  - hicieron guerra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa conflicto activo de forma natural en español. 'Pelearon' mantiene el tono narrativo y marcial sin volverse demasiado técnico.
- source_word: ይትጋደሉ
  english_pob_choice: battled
  chosen_spanish: combatieron
  alternatives_spanish:
  - contendieron
  - se esforzaron en lucha
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Distingue el segundo verbo de conflicto para conservar la intensificación repetida del original. 'Combatieron' refuerza la imagen bélica sin añadir contenido extra.
- source_word: ይትባአሱ ምስሌሁ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - contra él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la preposición literal del ge'ez, como hizo la traducción inglesa, aunque el contexto ya indica hostilidad. 'Con él' mantiene la cercanía formal al texto fuente.
- source_word: ፈቀዱ
  english_pob_choice: they wanted
  chosen_spanish: quisieron
  alternatives_spanish:
  - deseaban
  - intentaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'quisieron' expresa intención/voluntad sin sobretraducir a éxito ni a mera emoción. Encaja bien con una acción fallida.
- source_word: ያእትቱ
  english_pob_choice: to remove
  chosen_spanish: quitarle
  alternatives_spanish:
  - removerle
  - arrebatarle
  - derribarle
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa corrigió el sentido a 'remove'. 'Quitarle' comunica la acción de remover o privar del cuerno sin imponer una imagen más interpretativa.
- source_word: ቀርኖ
  english_pob_choice: his horn
  chosen_spanish: su cuerno
  alternatives_spanish:
  - su cuerno de fuerza
  - su poder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el símbolo literal del cuerno, siguiendo la decisión de no interpretarlo como 'poder' o 'fuerza' en el texto principal.
- source_word: አእህሉዎ
  english_pob_choice: they did not prevail against him
  chosen_spanish: no prevalecieron contra él
  alternatives_spanish:
  - no pudieron contra él
  - no lo vencieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la equivalencia más fiel y formal para el fracaso del ataque. Mantiene el sentido de no lograr la victoria sobre él.
theological_decisions:
- issue: Tratamiento del símbolo del cuerno
  english_pob_reading: Retain literal 'horn'
  chosen_spanish_reading: Mantener 'cuerno' literalmente
  alternative_spanish_readings:
  - poder
  - fuerza
  - reinado
  rationale: El pasaje pertenece a una visión apocalíptica con imaginería sostenida. Traducir el símbolo como abstracción aplana el texto y excede el testimonio ge'ez.
  doctrine_reference: Principio de preservar la imaginería apocalíptica sin reinterpretarla en la traducción principal.
- issue: Relación de combate expresada por 'with him'
  english_pob_reading: Keep 'with him' close to the Ge'ez while hostility is clear from context
  chosen_spanish_reading: Conservar 'con él' en vez de normalizar a 'contra él' en el texto principal
  alternative_spanish_readings:
  - contra él
  rationale: El ge'ez usa una preposición de compañía, pero el contexto bélico vuelve claro el antagonismo. En español, 'con él' reproduce esa tensión y deja visible la elección lexical.
  doctrine_reference: Respeto por la forma del testimonio fuente cuando la ambigüedad es significativa.
translation_notes:
  revision_awareness: 'La traducción inglesa auditada pasó por una revisión lexical importante en ያእትቱ: de ''to lay low'' a ''to remove''. La redacción española sigue esa corrección con ''quitarle'', evitando una imagen de derribo que no refleja con precisión el ajuste final. También se conserva la tensión documentada de ይትባአሱ ምስሌሁ con ''con él'' en el texto principal, señalando en nota la posibilidad contextual de ''contra él''.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y sobrio, sin arcaísmos innecesarios.
  - '''Cuervo'' se usa para conservar la concreción simbólica del pasaje.'
  - '''Cuerno'' se traduce literalmente, siguiendo el criterio de no explicar el símbolo dentro del versículo.'
  - Se evita 'Señor' o equivalentes no presentes en el texto fuente.
  - La sintaxis conserva el paralelismo de acciones sucesivas y el cierre negativo del verso.
