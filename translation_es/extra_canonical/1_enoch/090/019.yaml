translation:
  language: es
  text: Y vi hasta que se dio a las ovejas una gran espada, y las ovejas salieron contra todas las bestias del campo para matarlas; y todas las bestias y las aves del cielo huyeron de delante de su rostro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''De delante de su rostro'' conserva un giro semítico de presencia; en español también puede entenderse simplemente como ''huyeron ante ellos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la fórmula visionaria directa y natural en español, sin añadir explicación.
- source_word: እስከ ተውህበ
  english_pob_choice: until ... was given
  chosen_spanish: hasta que se dio
  alternatives_spanish:
  - hasta que fue dada
  - hasta que se había dado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el progreso temporal de la visión y la pasiva implícita del original, en un español fluido.
- source_word: ለአባግዕ
  english_pob_choice: to the sheep
  chosen_spanish: a las ovejas
  alternatives_spanish:
  - para las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La dativa del ge'ez se expresa de forma natural en español con 'a las ovejas'; se mantiene el símbolo visionario sin interpretarlo.
- source_word: ሰይፍ ዐቢይ
  english_pob_choice: a great sword
  chosen_spanish: una gran espada
  alternatives_spanish:
  - una espada grande
  - una espada poderosa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Gran espada'' reproduce el valor elevado y simbólico del adjetivo sin sobreinterpretar tamaño o poder.'
- source_word: ወወፅኡ አባግዕ
  english_pob_choice: and the sheep went out
  chosen_spanish: y las ovejas salieron
  alternatives_spanish:
  - y las ovejas fueron fuera
  - y las ovejas fueron y salieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Salieron'' transmite el avance narrativo con naturalidad y conserva el movimiento hacia la acción.'
- source_word: ዲበ ኵሉ አራዊተ ገዳም
  english_pob_choice: against all the beasts of the field
  chosen_spanish: contra todas las bestias del campo
  alternatives_spanish:
  - contra todas las fieras del campo
  - contra todas las bestias del desierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Bestias del campo'' sigue de cerca la imaginería del original y del inglés POB, manteniendo el carácter simbólico animal.'
- source_word: ከመ ይቅትልዎሙ
  english_pob_choice: to kill them
  chosen_spanish: para matarlas
  alternatives_spanish:
  - para matarlos
  - a fin de matarlas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Para matarlas'' expresa claramente el propósito; el femenino concuerda con ''las bestias''.'
- source_word: ነፍጹ እምቅድመ ገጾሙ
  english_pob_choice: fled from before their face
  chosen_spanish: huyeron de delante de su rostro
  alternatives_spanish:
  - huyeron de su presencia
  - huyeron delante de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el giro semítico de presencia/rostro que el POB inglés preservó con 'from before their face', evitando una paráfrasis que borre el matiz idiomático.
- source_word: አዕዋፈ ሰማይ
  english_pob_choice: the birds of heaven
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves del cielo y del aire
  - las aves celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopaicae
  rationale: '''Aves del cielo'' es el equivalente español más natural para el registro elevado del original.'
theological_decisions:
- issue: Mantener la imaginería zoomórfica del Apocalipsis de los Animales
  english_pob_reading: Retain 'sheep,' 'beasts,' and 'birds' literally as visionary symbols
  chosen_spanish_reading: Conservar 'ovejas', 'bestias' y 'aves' literalmente como símbolos visionarios
  alternative_spanish_readings:
  - Interpretar como Israel, naciones hostiles y poderes aliados
  - Explicar simbólicamente en el texto principal
  rationale: La visión funciona mediante símbolos sostenidos; traducirlos como tales respeta la evidencia del texto y el enfoque auditado de la POB, sin cerrar el sentido con una explicación interpretativa.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve apocalyptic imagery rather than smoothing it into generic prose.'
translation_notes:
  revision_awareness: El inglés auditado no muestra revisiones aplicadas; se ha seguido la lectura estable de la fuente ge'ez y del texto inglés POB, manteniendo la imaginería visionaria y la equivalencia óptima del giro idiomático final.
  spanish_consistency_notes:
  - Se mantiene 'ovejas' para el símbolo visionario, no 'corderos', porque el texto fuente y el POB inglés usan 'sheep'.
  - Se evita 'SEÑOR' u otras equivalencias de normalización porque el pasaje no contiene el nombre divino.
  - '''Aves del cielo'' conserva el registro elevado de ''birds of heaven'' sin introducir una lectura cosmológica adicional.'
