translation:
  language: es
  text: Y se les abrieron los ojos a todos, y vieron bien[a], y no hubo ninguno entre ellos que no viera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «vieron lo que era bueno»; el ge'ez permite una lectura adverbial o sustantiva, pero aquí se sigue la lectura adverbial adoptada en la revisión auditada.
    reason: lexical_alternative
lexical_decisions:
- source_word: አዕይን
  english_pob_choice: eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - la vista
  - la visión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez usa una imagen corporal concreta; «los ojos» conserva la metáfora de percepción restaurada sin abstraerla en «vista» o «visión».
- source_word: ተከሥታ
  english_pob_choice: were opened
  chosen_spanish: se les abrieron
  alternatives_spanish:
  - fueron abiertos
  - quedaron abiertos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva de apertura de los ojos se vuelve natural en español con la construcción reflexiva/pasiva «se les abrieron», manteniendo el matiz de restauración perceptiva.
- source_word: ሠናየ
  english_pob_choice: well
  chosen_spanish: bien
  alternatives_spanish:
  - lo bueno
  - cosas buenas
  - lo que era bueno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada confirma el valor adverbial de ሠናየ aquí. En español, «vieron bien» reproduce mejor esa lectura que una expresión sustantiva como «lo que era bueno».
- source_word: ዘኢይሬኢ አልቦ
  english_pob_choice: there was not one ... that did not see
  chosen_spanish: no hubo ninguno ... que no viera
  alternatives_spanish:
  - no faltó ninguno que viera
  - ninguno de ellos dejó de ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La doble negación reproduce la fuerza enfática del ge'ez sin introducir la idea no documentada de ceguera literal. «No hubo ninguno ... que no viera» conserva el alcance distributivo.
- source_word: በማእከሎሙ
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su medio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Entre ellos» es la equivalencia más natural en español para el sentido distributivo de «among them».
theological_decisions:
- issue: Restauración de la visión en la escena apocalíptica
  english_pob_reading: Render as literal-visionary restoration of perception without explicitly allegorizing it as spiritual enlightenment.
  chosen_spanish_reading: Presentar la escena como restauración de la capacidad de ver, sin convertirla en una alegoría explícita de iluminación espiritual.
  alternative_spanish_readings:
  - se les concedió entendimiento espiritual
  - les fue quitada la ceguera espiritual
  rationale: El texto ge'ez describe ojos que se abren y una visión efectiva; la traducción española preserva esa imagen sin resolver su sentido teológico dentro de la narración visionaria.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente confirmó que ሠናየ funciona aquí adverbialmente como «bien», corrigiendo la posibilidad anterior de «lo que era bueno». La redacción española sigue esa decisión y mantiene la escena como restauración de la visión en el marco narrativo.
  spanish_consistency_notes:
  - Se mantiene «ojos» para la imagen concreta de percepción restaurada.
  - Se evita «SEÑOR», «Cristo» u otra terminología ajena al pasaje, porque no aparecen en el texto fuente.
  - La doble negación española se usa para reflejar la fuerza enfática del original sin añadir una glosa interpretativa.
  - «Entre ellos» conserva el valor distributivo de la frase final.
