translation:
  language: es
  text: Y vi hasta que todas sus clases[a] fueron transformadas, y todas se volvieron ganado blanco; y el primero entre ellos se volvió un buey salvaje, y ese buey salvaje se volvió una gran bestia[b], y tenía grandes cuernos negros en su cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Clases» traduce el valor colectivo de አዝማዲሆሙ y mantiene la referencia a los tipos o grupos de animales de la visión.
    reason: lexical_alternative
  - marker: b
    text: La secuencia de la visión ha sido restituida aquí según la revisión más reciente, que entiende ነገር como una corrupción textual y no como «palabra», para preservar la imaginería zoomórfica del pasaje.
    reason: textual_variant
lexical_decisions:
- source_word: ተወለጠ
  english_pob_choice: were transformed
  chosen_spanish: fueron transformadas
  alternatives_spanish:
  - cambiaron
  - fueron alteradas
  - nacieron de nuevo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de visión apocalíptica, el verbo expresa cambio de forma o estado, no nacimiento literal. «Fueron transformadas» conserva la metamorfosis y suena natural en español.
- source_word: አዝማዲሆሙ
  english_pob_choice: their kinds
  chosen_spanish: sus clases
  alternatives_spanish:
  - sus especies
  - sus familias
  - sus formas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término agrupa categorías o tipos dentro de la visión. «Clases» mantiene ese valor colectivo sin sobrecargar el texto con un tecnicismo zoológico.
- source_word: አልህምተ ጻዕዳ
  english_pob_choice: white cattle
  chosen_spanish: ganado blanco
  alternatives_spanish:
  - bueyes blancos
  - bovinos blancos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ganado» preserva el valor colectivo del símbolo animal y evita fijar demasiado la edad o sexo del animal, mientras «blanco» conserva el rasgo central de la imagen.
- source_word: ቀዳማዊ
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el anterior
  - el principal
  - el más destacado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase marca primacía dentro del grupo. «El primero» es la equivalencia más directa y clara en español.
- source_word: ማእከሎሙ
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su centro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Entre ellos» reproduce de modo idiomático la ubicación dentro del grupo sin perder el sentido espacial original.
- source_word: አርዌ ዐቢየ
  english_pob_choice: a great beast
  chosen_spanish: una gran bestia
  alternatives_spanish:
  - un gran animal
  - una enorme bestia salvaje
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión apunta a un animal poderoso o salvaje. «Gran bestia» conserva el registro apocalíptico y la fuerza imagética del original.
- source_word: ቦ
  english_pob_choice: it had…
  chosen_spanish: tenía…
  alternatives_spanish:
  - poseía…
  - había en ella…
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El testimonio conservado queda abierto y, en español, «tenía» permite introducir la cláusula incompleta sin forzar una conclusión que no está explícita en el tramo transmitido.
theological_decisions:
- issue: Cómo tratar la lectura problemática de ነገር en una escena de transformación visionaria
  english_pob_reading: Retain the literal rendering 'word' in the main text, while acknowledging the textual difficulty in notes and revisions
  chosen_spanish_reading: No introducir «palabra» en el texto principal; seguir la revisión que entiende el pasaje como «buey salvaje» y «gran bestia»
  alternative_spanish_readings:
  - palabra
  - cosa
  - asunto
  rationale: El audit trail posterior corrige la lectura literal de «word» como un error que rompe el código zoomórfico de la visión. En español, conviene seguir la adjudicación más reciente y restituir la secuencia animal, sin ocultar que el tramo transmitido es textualmente difícil.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Cómo reflejar la incompletitud del testimonio final
  english_pob_reading: The verse as transmitted in the OCR appears to break off or continue into the next clause; the main text marks incompleteness with an ellipsis
  chosen_spanish_reading: Conservar la frase final abierta con puntos suspensivos
  alternative_spanish_readings:
  - cerrar la oración de forma interpretativa
  - omitir la cláusula final
  rationale: La señal de truncamiento debe permanecer visible para no aparentar una seguridad textual que el testimonio no ofrece. El español puede dejar la cláusula abierta con naturalidad editorial.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: He seguido la revisión posterior que corrige la lectura problemática de ነገር y completa la imagen con «grandes cuernos negros sobre su cabeza», en lugar de conservar la traducción literal anterior de «palabra». La versión española, por tanto, refleja la restitución del sentido zoomórfico y mantiene visible la apertura textual con puntos suspensivos.
  spanish_consistency_notes:
  - He usado «Yahvé» solo cuando el texto lo exige; aquí no aparece.
  - He preferido «gran bestia» y no «animal» para conservar el registro apocalíptico.
  - He evitado «SEÑOR» y otras sustituciones devocionales ajenas al pasaje.
  - He mantenido un español claro y sobrio, sin arcaísmos innecesarios.
