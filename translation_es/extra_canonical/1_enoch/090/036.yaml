translation:
  language: es
  text: Y vi que aquella casa se hizo grande y ancha y sumamente llena[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En el Apocalipsis de los Animales, 'casa' puede referirse simbólicamente al santuario o al templo, pero el texto ge'ez aquí dice simplemente 'casa'.
    reason: cross_reference
  - marker: b
    text: 'El término final funciona como intensificador de ''llena'': también puede expresarse como ''muy'' o ''sobremanera''. El matiz exacto es incierto, pero comunica plenitud superabundante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la fórmula visionaria en primera persona sin sonar arcaica en español. El matiz de reporte apocalíptico se mantiene con una construcción breve y natural.
- source_word: ከመ ኮነ
  english_pob_choice: became
  chosen_spanish: se hizo
  alternatives_spanish:
  - llegó a ser
  - se volvió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa cambio de estado dentro de la visión. 'Se hizo' reproduce bien ese devenir sin perder la fluidez del español.
- source_word: ውእቱ ቤት
  english_pob_choice: that house
  chosen_spanish: aquella casa
  alternatives_spanish:
  - la casa
  - esa casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo debe reflejarse en español. 'Aquella' conserva la distancia demostrativa del original mejor que un artículo simple.
- source_word: ዐቢየ
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - mayor
  - grandiosa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Grande'' comunica tamaño de forma directa y sobria. ''Grandiosa'' introduciría una valoración más interpretativa.'
- source_word: ወርኂበ
  english_pob_choice: broad
  chosen_spanish: ancha
  alternatives_spanish:
  - ancha y espaciosa
  - amplia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Ancha'' preserva el paralelismo con ''grande'' y refleja la idea de amplitud espacial sin añadir matices no explícitos.'
- source_word: ወምሉአ
  english_pob_choice: and it was full of
  chosen_spanish: y ... llena
  alternatives_spanish:
  - y ... llena de
  - y ... repleta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El predicado adjetival se expresa naturalmente con 'llena'. En español, la elipsis verbal tras 'se hizo' evita redundancia y conserva la sintaxis del original.
- source_word: ፈድፋደ
  english_pob_choice: exceedingly full
  chosen_spanish: extraordinariamente
  alternatives_spanish:
  - sobremanera
  - muy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail revisado aclara que aquí la palabra funciona como adverbio intensificador, no como sustantivo. 'Extraordinariamente' comunica la intensidad de 'exceedingly' sin convertirla en objeto abstracto.
theological_decisions:
- issue: ¿Conviene traducir ቤት como 'templo' por el contexto del Animal Apocalypse?
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  - santuario
  rationale: Aunque el contexto amplio puede sugerir una referencia simbólica al santuario restaurado, la palabra ge'ez literalmente dice 'casa'. Se preserva esa primacía del original y la posible identificación cultual queda abierta.
  doctrine_reference: Principio POB de primacía del texto fuente y de preservar tensiones interpretativas sin resolverlas prematuramente.
- issue: Cómo reflejar el valor de ፈድፋደ sin sustantivarlo
  english_pob_reading: exceedingly full
  chosen_spanish_reading: extraordinariamente llena
  alternative_spanish_readings:
  - muy llena
  - llena en gran manera
  rationale: La revisión textual indica que el término modifica al adjetivo 'llena'. Por eso se evita traducirlo como 'abundancia' y se mantiene su función intensificadora.
  doctrine_reference: Respeto a la sintaxis del original y a la decisión revisada del audit trail.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se descartó ''abundancia'' como sustantivo y se trató ፈድፋደ como adverbio intensificador de ''llena''. También se mantuvo la forma demostrativa de ''that house'' y la lectura simple de ''house'' frente a ''temple''.'
  spanish_consistency_notes:
  - Se conservó 'casa' y no 'templo' en el cuerpo principal para no resolver una identificación simbólica que el ge'ez no explicita.
  - Se evitó 'SEÑOR' o terminología litúrgica ajena al versículo, porque no aparecen en el texto fuente.
  - El tono es solemne pero moderno, con sintaxis española natural y sin calcos innecesarios.
