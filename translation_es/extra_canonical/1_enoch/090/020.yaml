translation:
  language: es
  text: Y vi hasta que fue colocado un trono en la tierra hermosa[a], y el Señor de las ovejas se sentó sobre él[b]; y tomó todos los libros sellados y abrió aquellos libros delante del Señor de las ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término etiópico vertido aquí como 'tierra hermosa' es incierto en este testimonio; puede indicar una tierra especialmente favorecida más que la tierra en general.
    reason: lexical_alternative
  - marker: b
    text: El verso repite 'el Señor de las ovejas' tanto para quien se sienta en el trono como para aquel delante de quien se abren los libros. Se conserva la repetición en lugar de suavizarla.
    reason: textual_variant
lexical_decisions:
- source_word: መንበር
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento
  - silla
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un contexto visionario y judicial, 'trono' conserva la imagen regia y forense mejor que 'asiento', que suena demasiado plano.
- source_word: ተሐንጸ፡
  english_pob_choice: was set up
  chosen_spanish: se levantó
  alternatives_spanish:
  - fue establecido
  - fue erigido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo indica que el trono aparece preparado o erigido en la visión; 'se levantó' transmite bien esa instalación sin volver demasiado técnico el español.
- source_word: ሐዋዝ
  english_pob_choice: the pleasant land
  chosen_spanish: la tierra agradable
  alternatives_spanish:
  - la tierra deseable
  - la tierra favorecida
  - la tierra habitable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma etíope es incierta; 'tierra agradable' mantiene el valor territorial concreto y deja visible que se trata de un calificativo interpretativo, no de una equivalencia segura con 'la tierra' en general.
- source_word: እግዚአ፡ አባግዕ፡
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el Dueño de las ovejas
  - el Amo de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título repetido del Apocalipsis de los animales. 'Señor' preserva la dignidad del título y su repetición intencional sin domesticarlo.
- source_word: መጻሕፍተ፡ ኅትማተ፡
  english_pob_choice: the sealed books
  chosen_spanish: los libros sellados
  alternatives_spanish:
  - los libros con sello
  - los libros sellados con sello
  - los rollos sellados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sellados'' reproduce la idea de libros marcados por un sello; ''libros sellados'' es la solución más directa y natural en español, sin forzar ''rollos'' que el texto etíope no exige.'
- source_word: ፈትሖን
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - deselló
  - los abrió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque la imagen de sellos está presente, el verbo básico es 'abrir'. 'Abrió' respeta el lexema y permite que la relación con los sellos quede implícita por el contexto.
theological_decisions:
- issue: Repetición de 'el Señor de las ovejas' para el entronizado y el destinatario ante quien se abren los libros
  english_pob_reading: 'Retain the Ge''ez wording as-is: the Lord of the sheep sits on the throne, and the books are opened before the Lord of the sheep.'
  chosen_spanish_reading: 'Se conserva la repetición: el Señor de las ovejas se sienta en el trono, y los libros se abren delante del Señor de las ovejas.'
  alternative_spanish_readings:
  - armonizar el pasaje cambiando una de las referencias
  - sustituir una instancia por otro agente celestial
  rationale: La transmisión etiópica presenta una repetición potencialmente incómoda, pero es coherente traducirla sin corregirla ni suavizarla. Mantenerla preserva la tensión documental y evita introducir una armonización no atestiguada.
  doctrine_reference: Primacía del testimonio textual sobre la armonización interpretativa; mantener tensiones del original cuando no hay base textual para resolverlas.
translation_notes:
  revision_awareness: Se siguió el pasaje etiópico recibido y el auditorio inglés de la POB; no se aplicaron revisiones posteriores. La versión española mantiene la tensión lexical de 'tierra agradable' y la repetición de 'el Señor de las ovejas' tal como aparece en el texto base.
  spanish_consistency_notes:
  - Se usa 'Señor de las ovejas' de manera uniforme para el título repetido.
  - '''Libros sellados'' mantiene la relación entre el sello y la apertura posterior sin introducir ''rollos'' ni ''deselló''.'
  - '''Tierra agradable'' refleja la incertidumbre del término ሐዋዝ sin convertirlo en una paráfrasis amplia.'
