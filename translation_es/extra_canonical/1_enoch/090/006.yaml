translation:
  language: es
  text: Y he aquí[a] que nacieron corderos de aquellas ovejas blancas, y comenzaron a abrir los ojos, y a ver, y a clamar[b] a las ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de estas ovejas blancas', si el demostrativo ge'ez ዝኩ (zekkū) se interpreta como proximal en lugar de distal.
    reason: lexical_alternative
  - marker: b
    text: 'La sintaxis también puede entenderse como una serie dependiente de ''comenzaron'': ''comenzaron a abrir los ojos, a ver y a clamar''. Esta traducción conserva esa dependencia probable de los tres verbos.'
    reason: syntactic_clarification
lexical_decisions:
- source_word: ነዋ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - He aquí que
  - Y he aquí que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነዋ es una partícula deíctica/interjective típica de la narrativa visionaria. 'Y he aquí' es la fórmula apocalíptica canónica en español, con el registro solemne que requiere la Apoca­lipsis Animal, superior al más llano 'mira'.
- source_word: መንስኣት
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - crías
  - vástagos
  - recentales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El simbolismo animal es sostenido a lo largo de la Apocalipsis Animal y no debe aplanarse en términos genéricos como 'crías'. 'Corderos' mantiene la imagen concreta y su carga simbólica (cf. ovejas blancas = grupo elegido).
- source_word: ተወልዱ
  english_pob_choice: were born
  chosen_spanish: nacieron
  alternatives_spanish:
  - fueron engendrados
  - vinieron al mundo
  - nacieron a la vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sentido pasivo de nacimiento; 'nacieron' es la voz media-pasiva natural en español para este evento y reproduce la concisión del ge'ez sin añadir coloratura.
- source_word: እምዝኩ አባግዕት ጻዓዳ
  english_pob_choice: from those white sheep
  chosen_spanish: de aquellas ovejas blancas
  alternatives_spanish:
  - de estas ovejas blancas
  - de entre aquellas ovejas blancas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo ዝኩ (zekkū) es distal y señala el grupo mencionado anteriormente en la visión. 'Aquellas' preserva esa fuerza referencial y mantiene el término de color 'blancas', simbólicamente central en esta visión.
- source_word: አኃዙ + አዕይንቲሆሙ ይከሠቱ
  english_pob_choice: their eyes began to be opened
  chosen_spanish: sus ojos comenzaron a abrirse
  alternatives_spanish:
  - empezaron a abrir sus ojos
  - sus ojos empezaron a ser abiertos
  - comenzaron a tener los ojos abiertos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El inceptivo አኃዙ ('comenzaron') rige a ይከሠቱ. La revisión final inglesa optó por una construcción estativo-pasiva ('their eyes began to be opened'). En español, 'sus ojos comenzaron a abrirse' usa el pronombre reflexivo de manera natural para expresar el sentido pasivo-incoativo, sin calco forzado.
- source_word: ወይርእዩ
  english_pob_choice: and they saw
  chosen_spanish: y vieron
  alternatives_spanish:
  - y a ver
  - y percibieron
  - y empezaron a ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión final inglesa trató este verbo como evento discreto ('and they saw') separado de la construcción inceptiva, siguiendo el flujo narrativo del ge'ez. 'Y vieron' reproduce ese evento discreto con naturalidad en español.
- source_word: ወይጸርኁ
  english_pob_choice: and they cried out
  chosen_spanish: y clamaron
  alternatives_spanish:
  - y gritaron
  - y llamaron
  - y brama­ron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Clamaron'' preserva la urgencia del verbo ge''ez (que denota outcry vocal) y mantiene el registro solemne del discurso apocalíptico; ''gritaron'' sería demasiado coloquial para este contexto.'
- source_word: ኀበ አባግዕ
  english_pob_choice: to the sheep
  chosen_spanish: a las ovejas
  alternatives_spanish:
  - hacia las ovejas
  - contra las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición ኀበ indica dirección. 'A las ovejas' es la expresión natural en español para el destinatario del clamor; 'hacia' implicaría un matiz espacial menos comprometido con la comunicación directa.
theological_decisions:
- issue: Preservación del simbolismo animal en una apocalipsis alegórica
  english_pob_reading: lambs ... white sheep ... the sheep
  chosen_spanish_reading: corderos ... ovejas blancas ... las ovejas
  alternative_spanish_readings:
  - crías ... las blancas ... el rebaño
  - vástagos ... ovejas blancas ... el rebaño
  rationale: 'La Apocalipsis Animal comunica su mensaje teológico mediante un simbolismo animal sostenido y preciso: las ovejas blancas representan un grupo fiel específico. Aplanar la imagen en términos colectivos genéricos (''el rebaño'', ''las blancas'') borraría esa carga simbólica deliberada. La traducción española mantiene los tres términos animales concretos.'
  doctrine_reference: 'Filosofía de traducción: preservar la imaginería apocalíptica; no aplanar el lenguaje simbólico (cf. decisión teológica del POB inglés).'
- issue: 'Secuencia verbal inceptiva: ¿los tres verbos son dependientes de አኃዙ o el primero lo es y los demás son eventos discretos?'
  english_pob_reading: their eyes began to be opened, and they saw, and they cried out to the sheep
  chosen_spanish_reading: sus ojos comenzaron a abrirse, y vieron, y clamaron a las ovejas
  alternative_spanish_readings:
  - sus ojos comenzaron a abrirse, a ver y a clamar a las ovejas
  - comenzaron a abrir sus ojos, a ver y a clamar a las ovejas
  rationale: 'Una revisión de nivel 3 (Gemini) argumentó que los tres imperfectos ge''ez (ይከሠቱ, ይርእዩ, ወይጸርኁ) dependen del inceptivo አኃዙ y deberían mantenerse como infinitivos coordinados. La revisión final inglesa (GPT-5.4) rompió esa dependencia para reflejar mejor la secuencia narrativa del texto. El español sigue la decisión de la revisión final: ''comenzaron a abrirse'' para el primer verbo y eventos discretos (''vieron'', ''clamaron'') para los dos restantes, lo que resulta más natural en prosa española narrativa sin sacrificar fidelidad.'
  doctrine_reference: 'Auditoría de revisiones: tier-3 revision 2026-04-22 vs. revision-pass 2026-04-23; el español sigue el estado final revisado.'
translation_notes:
  revision_awareness: La revisión de nivel 3 (2026-04-22) corrigió la dependencia sintáctica de los tres imperfectos ge'ez respecto del inceptivo አኃዙ, prefiriendo infinitivos coordinados. La revisión final (2026-04-23, GPT-5.4) revirtió parcialmente esa corrección, separando los dos últimos verbos como eventos narrativos discretos ('and they saw, and they cried out'). La traducción española sigue el estado final revisado, que el POB inglés marcó como definitivo. La nota al pie [b] documenta esta tensión para transparencia editorial.
  spanish_consistency_notes:
  - '''He aquí'' empleado para ነዋ como díctico apocalíptico solemne, coherente con el registro de la Apocalipsis Animal.'
  - '''Corderos'' y ''ovejas'' mantenidos en todos los sintagmas animales para preservar la consistencia simbólica interna del capítulo.'
  - '''Clamaron'' preferido sobre ''gritaron'' para conservar el registro elevado propio de la narrativa visionaria en español.'
  - No aparece el nombre divino (יהוה / Yahvé) ni terminología cristológica en este versículo; los valores terminológicos por defecto del proyecto no aplican aquí.
