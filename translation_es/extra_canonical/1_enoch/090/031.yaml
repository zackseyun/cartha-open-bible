translation:
  language: es
  text: Y después de eso[a], aquellos tres[b] vestidos de blanco, que me habían tomado de la mano y me habían hecho subir antes[c], junto con la mano de aquel carnero que me sostenía, me hicieron subir y me pusieron en medio de aquellas ovejas, antes de que ocurriera el juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula inicial es temporal; el valor de ‘después de eso’ sigue la lectura revisada del pasaje y evita la falsa idea de procedencia espacial.
    reason: textual_variant
  - marker: b
    text: ‘Aquellos tres’ mantiene abierta la identidad de las figuras, que el texto no nombra explícitamente en la línea conservada.
    reason: cultural_note
  - marker: c
    text: O ‘Y después de eso vi a tres vestidos de blanco, que me tomaron de la mano —los que habían subido antes me hicieron subir—, y la mano de aquel carnero me sostenía mientras me hacían subir y me ponían en medio de aquellas ovejas’. Esta parte del texto es difícil y depende de una línea ge’ez corrupta en el testimonio OCR.
    reason: previous_rendering
lexical_decisions:
- source_word: ወእምኔሁ
  english_pob_choice: After that
  chosen_spanish: Y después de eso
  alternatives_spanish:
  - Y luego
  - Y después de aquello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase ge'ez es temporal; en español natural se rinde con una secuencia adverbial que conserve el avance narrativo sin sobrecargar el texto.
- source_word: ፫እለ
  english_pob_choice: those three
  chosen_spanish: aquellos tres
  alternatives_spanish:
  - los tres
  - esos tres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El numeral no especifica categoría; ‘aquellos tres’ mantiene la referencia de visión sin añadir ‘ángeles’ o ‘hombres’.
- source_word: ይለብሱ ጸዓዳወ
  english_pob_choice: were clothed in white
  chosen_spanish: vestidos de blanco
  alternatives_spanish:
  - que estaban vestidos de blanco
  - revestidos de blanco
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, ‘vestidos de blanco’ comunica la imagen apocalíptica de manera natural y fiel al verbo de vestidura.
- source_word: አኃዙኒ በእዴየ
  english_pob_choice: they had taken me by the hand
  chosen_spanish: me habían tomado de la mano
  alternatives_spanish:
  - me habían llevado de la mano
  - me habían asido de la mano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idiomática de apoyo y guía se expresa mejor con ‘tomar de la mano’, evitando dureza innecesaria.
- source_word: እለ ቀደሙ አዕረጉኒ
  english_pob_choice: who had brought me up before
  chosen_spanish: que me habían hecho subir antes
  alternatives_spanish:
  - que me habían subido antes
  - que antes me habían hecho subir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura auditada entiende un ascenso guiado; ‘hacer subir’ conserva la acción sin introducir sujetos o identidades no explicitados.
- source_word: ዴቤላ / ይቤላ (corrupt line)
  english_pob_choice: the hand of that ram holding me
  chosen_spanish: la mano de aquel carnero que me sostenía
  alternatives_spanish:
  - la mano de aquel carnero que me llevaba
  - la mano de aquel carnero que me guiaba
  lexicon: Contextual recovery from audit trail and OCR adjudication
  rationale: El contexto revisado identifica aquí al ‘carnero’ y no un simple demostrativo; ‘que me sostenía’ conserva la acción de sostén/guía sin forzar el detalle textual corrupto.
- source_word: አንበሩኒ ማእከሎሙ ለዝኩ አባግዕት
  english_pob_choice: set me down in the midst of those sheep
  chosen_spanish: me pusieron en medio de aquellas ovejas
  alternatives_spanish:
  - me colocaron en medio de aquellas ovejas
  - me dejaron en medio de aquellas ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Poner en medio’ reproduce la posición espacial y mantiene la imagen simbólica de las ovejas sin explicarla.
- source_word: እንበለ ትኩን ኵነኔ
  english_pob_choice: before the judgment took place
  chosen_spanish: antes de que ocurriera el juicio
  alternatives_spanish:
  - antes de que tuviera lugar el juicio
  - antes de que llegara el juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Ocurriera el juicio’ conserva la temporalidad anticipatoria con español claro y solemne.
theological_decisions:
- issue: Identidad de los tres vestidos de blanco
  english_pob_reading: Render generically as 'three' who are clothed in white, without identifying them as angels in the main text.
  chosen_spanish_reading: Aquellos tres vestidos de blanco, sin precisar su clase o naturaleza en el texto principal.
  alternative_spanish_readings:
  - tres ángeles vestidos de blanco
  - tres hombres vestidos de blanco
  rationale: La línea ge'ez no obliga a una identificación explícita; se preserva la reserva interpretativa del POB en español.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: El símbolo de las ovejas en la Apocalipsis Animal
  english_pob_reading: '''Those sheep'' continues the Animal Apocalypse''s symbolic imagery.'
  chosen_spanish_reading: ‘Aquellas ovejas’ se mantiene como imagen simbólica sin explicación intratextual.
  alternative_spanish_readings:
  - esas ovejas
  - el rebaño
  rationale: Se conserva el simbolismo animal apocalíptico y se evita sustituirlo por un término interpretativo más abstracto.
  doctrine_reference: Literal-symbolic preservation in apocalyptic literature.
- issue: Momento del juicio
  english_pob_reading: Translate as 'before the judgment took place.'
  chosen_spanish_reading: ‘antes de que ocurriera el juicio’ conserva la expectativa narrativa previa al acto judicial.
  alternative_spanish_readings:
  - antes de que tuviera lugar el juicio
  - antes del juicio
  rationale: La frase debe reflejar la temporalidad de anticipación sin normalizarla en una fórmula doctrinal posterior.
  doctrine_reference: Original-language primacy over translation tradition; preserve apocalyptic judgment formulas.
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail: la apertura temporal se traduce como secuencia narrativa (‘después de eso’), se mantiene la referencia a los tres vestidos de blanco sin identificarlos, se recupera el ‘carnero’ del tramo corrupto, y se conserva la escena simbólica de las ovejas antes del juicio.'
  spanish_consistency_notes:
  - Se usa ‘juicio’ como equivalente de κ/ኵነኔ en sentido judicial-apocalíptico.
  - Se evita ‘SEÑOR’ o ‘Cristo’ porque no aparecen en el pasaje.
  - Se mantiene un registro solemne pero claro, apto para lectura pública.
  - La puntuación refleja una sola oración extensa, acorde con el flujo de la unidad.
  - No se introduce ‘ángeles’ para no resolver una ambigüedad que el texto base deja abierta.
