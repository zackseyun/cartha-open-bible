translation:
  language: es
  text: Y seguí observando hasta que el Señor de las ovejas vino a ellos con ira, y todos los que lo vieron huyeron, y todos cayeron en la sombra[b] de delante de su rostro[a][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de su rostro»; el giro ge'ez puede implicar el efecto abrumador de su presencia.
    reason: lexical_alternative
  - marker: b
    text: «En la sombra» es una traducción literal del ge'ez; la imagen puede sugerir un lugar oscuro de caída, pero se deja transparente en vez de interpretarla más estrechamente.
    reason: lexical_alternative
  - marker: c
    text: O «ante su rostro».
    reason: previous_rendering
lexical_decisions:
- source_word: ርኢኩ
  english_pob_choice: I watched
  chosen_spanish: seguí observando
  alternatives_spanish:
  - observé
  - vi
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un relato visionario, el verbo expresa observación continuada, no solo una percepción puntual. «Seguí observando» conserva el valor durativo y el tono apocalíptico.
- source_word: እስከ መጽአ
  english_pob_choice: until ... came
  chosen_spanish: hasta que ... vino
  alternatives_spanish:
  - hasta que ... llegó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia marca la continuidad de la visión hasta una llegada decisiva. «Vino» mantiene naturalidad en español y el matiz de arribo.
- source_word: እግዚአ አባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el amo de las ovejas
  - el Dueño de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un título clave de la Alegoría de los Animales para Dios como soberano del rebaño. «Señor» conserva el peso de autoridad y la imagen establecida; «ovejas» mantiene el campo metafórico.
- source_word: በመዓት
  english_pob_choice: in wrath
  chosen_spanish: con ira
  alternatives_spanish:
  - en ira
  - airado
  lexicon: Dillmann, Lexicon Lingeuae Aethiopicae
  rationale: El Ge'ez expresa la manera de su venida con un registro de juicio. En español, «con ira» suena natural y retiene la fuerza judicial sin suavizarla.
- source_word: እለ ርእይዎ ኵሎሙ
  english_pob_choice: all who saw him
  chosen_spanish: todos los que lo vieron
  alternatives_spanish:
  - todos los que le vieron
  - quienes lo vieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción relativa colectiva se vierte con una fórmula directa y transparente. Se mantiene el totalizador «todos».
- source_word: ነፍጹ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron huyendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo denota una huida súbita por temor ante la aparición divina. «Huyeron» conserva urgencia y dignidad de registro.
- source_word: ወወድቁ ኵሎሙ
  english_pob_choice: and they all fell
  chosen_spanish: y todos cayeron
  alternatives_spanish:
  - y todos se postraron
  - y todos cayeron de rodillas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se retiene la repetición de «todos» para mantener el carácter total de la escena de juicio. «Cayeron» deja abierto el sentido literal sin interpretar en exceso el gesto.
- source_word: ውስተ ጽላሎት
  english_pob_choice: into the shadow
  chosen_spanish: en la sombra
  alternatives_spanish:
  - en las sombras
  - en la oscuridad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez apunta literalmente a «sombra/sombra». En español, «en la sombra» preserva la imagen con transparencia, sin sustituirla por una interpretación más amplia como «oscuridad».
- source_word: እምቅድመ ገጹ
  english_pob_choice: before his face
  chosen_spanish: delante de su rostro
  alternatives_spanish:
  - de delante de su rostro
  - ante su presencia
  - delante de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El giro es literalmente ablativo: «de delante de». En español, «delante de su rostro» mantiene el idiomatismo corporal y el sentido de presencia sin borrar el matiz relacional del original.'
theological_decisions:
- issue: Identidad de «el Señor de las ovejas»
  english_pob_reading: A divine title within the Animal Apocalypse referring to God as sovereign judge over the flock.
  chosen_spanish_reading: Un título divino de la Alegoría de los Animales para Dios como soberano y juez del rebaño.
  alternative_spanish_readings:
  - Un amo más genérico de las ovejas dentro de la alegoría
  - Una figura simplemente simbólica sin carga teológica explícita
  rationale: El marco alegórico usa este título de manera consistente para el soberano trascendente que interviene en juicio. «Señor» preserva el peso teológico sin importar lenguaje cristológico posterior.
  doctrine_reference: 'Principio de traducción del POB: traducir títulos por su sentido en el pasaje y conservar el contexto local sin armonización doctrinal posterior.'
- issue: «Con ira» como lenguaje de juicio
  english_pob_reading: The Lord comes in wrath, not merely with emotional anger but in judicial severity.
  chosen_spanish_reading: La venida ocurre «con ira», entendida como severidad judicial.
  alternative_spanish_readings:
  - con enojo
  - airado
  rationale: «Ira» reproduce mejor el registro elevado y judicial del original que un término más coloquial. La formulación evita psicologizar indebidamente el texto.
  doctrine_reference: Lenguaje bíblico de juicio divino en literatura apocalíptica.
- issue: «En la sombra» y el alcance de la imagen
  english_pob_reading: The phrase is kept transparent; it may suggest a dark place of downfall but is not narrowed to a more specific interpretation.
  chosen_spanish_reading: Se conserva la imagen abierta de «la sombra» sin identificarla con una realidad más específica.
  alternative_spanish_readings:
  - en la oscuridad
  - en el abismo
  - en el Seol
  rationale: 'El español permite la misma transparencia que el inglés POB: mantener la metáfora sin cerrarla prematuramente. Así no se borra la tensión imagética del original.'
  doctrine_reference: Poética apocalíptica y principio de no sobreinterpretar imágenes cuando el texto no las define.
translation_notes:
  revision_awareness: La redacción sigue el estado más reciente del audit trail, que recupera el matiz ablativo de la expresión final sin introducir un «de» innecesario en inglés. En español se refleja ese sentido con «delante de su rostro», mientras se preserva la transparencia de la imagen de «sombra».
  spanish_consistency_notes:
  - Se usa «Señor» para el título fijo «Lord of the sheep», no «amo», por la carga teológica del conjunto alegórico.
  - Se mantiene «ira» como registro judicial, evitando suavizarlo a una mera emoción.
  - Se conserva «sombra» literalmente para no reemplazar una imagen abierta por una interpretación doctrinal cerrada.
  - Se respeta la repetición de «todos» para reflejar el carácter totalizador de la escena.
