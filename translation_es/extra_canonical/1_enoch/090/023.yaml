translation:
  language: es
  text: Y he aquí[a], vi a todos los prisioneros, y todos estaban de pie delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los atados» o «los cautivos». El término ge'ez subraya a quienes están bajo restricción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወናሁ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y ved
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la fórmula visionaria y el tono apocalíptico del original sin volverlo una simple conjunción narrativa.
- source_word: ኵሎሙ
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de ellos
  - todos y cada uno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el énfasis totalizante repetido en el versículo, primero con los presos y luego con la acción de estar delante de él.
- source_word: እሱራነ
  english_pob_choice: the prisoners
  chosen_spanish: los presos
  alternatives_spanish:
  - los atados
  - los cautivos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Presos» comunica de forma natural el estado de quienes están bajo restricción. «Los atados» es más literal, pero menos idiomático; «cautivos» es posible, pero puede sugerir guerra o captura con un matiz más específico que el ge'ez no exige aquí.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - observé
  - miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo simple y directo para el reporte visionario en primera persona; evita añadir matices inexistentes.
- source_word: ወቆሙ
  english_pob_choice: and they stood
  chosen_spanish: estuvieron
  alternatives_spanish:
  - se pusieron de pie
  - estaban de pie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «estuvieron delante de él» expresa la postura resultante y la comparecencia ante una figura superior. «Se pusieron de pie» sería más explícito, pero agrega un detalle no presente de manera inequívoca en el texto ge'ez.
- source_word: ቅድሜሁ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Delante de él» conserva la imagen espacial y judicial del texto. «Ante él» también sería válido, pero «delante de él» resulta más transparente y natural en español moderno.
theological_decisions:
- issue: Identidad del grupo detenido
  english_pob_reading: Render እሱራነ as 'the prisoners' without specifying whether they are stars, shepherds, or angelic offenders in the main text.
  chosen_spanish_reading: Traducir con «los presos» sin identificar en el cuerpo principal si se trata de estrellas, pastores u ઓફensores angélicos.
  alternative_spanish_readings:
  - los atados
  - los cautivos
  rationale: El término ge'ez describe primero su condición de restricción. La traducción debe preservar esa tensión interpretativa y no resolverla por anticipado; el contexto más amplio aporta la identificación alegórica.
  doctrine_reference: Preservar la tensión textual y la primacía del original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: La versión sigue la lectura y decisiones del audit trail inglés, sin cambios posteriores en la revisión más reciente; no se detectan modificaciones aplicadas en la pasada de revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, aunque este versículo no lo contiene.
  - Se conservó el paralelismo totalizante de «all ... all» con «todos ... todos».
  - No se introdujo terminología eclesiástica tradicional que altere el matiz judicial/apocalíptico del pasaje.
