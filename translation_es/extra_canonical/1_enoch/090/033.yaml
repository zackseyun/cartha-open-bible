translation:
  language: es
  text: Y todos los que habían sido esparcidos y dispersados[a], y todas las bestias del campo y todas las aves del cielo, fueron reunidos en aquella casa; y el Señor de las ovejas se alegró con gran gozo[b], porque todos ellos habían llegado a ser buenos y habían entrado en su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El par verbal puede intensificar una misma idea de dispersión; por eso la traducción conserva ambos términos.
    reason: lexical_alternative
  - marker: b
    text: ‘Aquella casa’ y luego ‘su casa’ se refieren a la imaginería de morada restaurada dentro de la visión, no a una casa ordinaria.
    reason: cultural_note
lexical_decisions:
- source_word: ተሐጕሉ
  english_pob_choice: had been scattered / had been destroyed
  chosen_spanish: habían sido destruidos
  alternatives_spanish:
  - habían sido dispersados
  - habían sido esparcidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; audit trail revision notes
  rationale: 'El rastro inglés muestra una tensión textual importante: la primera lectura fue ‘scattered’, pero la revisión más reciente volvió a ‘destroyed’ para reflejar mejor el verbo ge’ez ተሐጕሉ. En español, ‘destruidos’ conserva la fuerza narrativa y teológica de pérdida/muerte, sin borrar el paralelismo con el verbo siguiente de dispersión.'
- source_word: ተዘርዘሩ
  english_pob_choice: dispersed
  chosen_spanish: dispersados
  alternatives_spanish:
  - esparcidos
  - diseminados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene un segundo término distinto para no nivelar el par verbal del texto. ‘Dispersados’ reproduce la idea de dispersión y conserva la intensificación del original.
- source_word: አራዊተ ገዳም
  english_pob_choice: beasts of the field
  chosen_spanish: bestias del campo
  alternatives_spanish:
  - bestias del desierto
  - animales del campo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Bestias del campo’ sigue de cerca la fórmula bíblica y su registro apocalíptico, sin volverla técnica o excesivamente explicativa.
- source_word: አዕዋፈ ሰማይ
  english_pob_choice: birds of heaven
  chosen_spanish: aves del cielo
  alternatives_spanish:
  - aves del firmamento
  - pájaros del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Aves del cielo’ preserva el tono elevado de la expresión y es natural en español bíblico contemporáneo.
- source_word: ተጋብኡ
  english_pob_choice: were gathered
  chosen_spanish: fueron reunidos
  alternatives_spanish:
  - fueron congregados
  - se juntaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Fueron reunidos’ expresa el pasivo del original y funciona bien con la imaginería de restauración y reunión dentro de la visión.
- source_word: በውእቱ ቤት
  english_pob_choice: that house
  chosen_spanish: aquella casa
  alternatives_spanish:
  - esa casa
  - esa morada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Aquella casa’ conserva la referencia anafórica del texto y evita una domesticación excesiva. Además, puede abarcar la imaginería de morada/templo sin añadir una interpretación explícita en el cuerpo del versículo.
- source_word: እግዚኦሙ ለአባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el Señor de los corderos
  - el Dueño de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título simbólico del Animal Apocalypse. ‘Señor’ mantiene el rango teológico del designativo, y ‘ovejas’ reproduce la metáfora central del pasaje.
- source_word: ተፈሥሐ ዐቢየ ፍሥሐ
  english_pob_choice: rejoiced with great joy
  chosen_spanish: se alegró con gran gozo
  alternatives_spanish:
  - se regocijó con gran alegría
  - se alegró muchísimo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción cognada se conserva parcialmente con ‘alegró / gozo’, manteniendo intensidad sin sonar forzada en español. ‘Gran gozo’ refleja bien el carácter solemne y repetitivo del original.
- source_word: ኄራነ
  english_pob_choice: good
  chosen_spanish: buenos
  alternatives_spanish:
  - rectos
  - justos
  - buenas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Buenos’ sigue la lectura amplia del término en el contexto de restauración. Evita cargar el verso con un matiz técnico como ‘justos’ o ‘rectos’ que el ge’ez no obliga a introducir.
- source_word: ገብኡ ውስተ ቤቱ
  english_pob_choice: had entered into his house
  chosen_spanish: habían entrado en su casa
  alternatives_spanish:
  - habían ingresado en su casa
  - habían entrado a su casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Habían entrado en su casa’ refleja bien la acción completa y su resultado. Se mantiene el pronombre posesivo para que ‘su casa’ remita al Señor de las ovejas, como en el audit trail inglés.
theological_decisions:
- issue: Alcance de ተሐጕሉ en la escena de restauración
  english_pob_reading: The audit trail documents a revision conflict between 'destroyed' and 'scattered'; the latest cross-check supports a stronger loss/destruction sense.
  chosen_spanish_reading: ‘Habían sido destruidos’ en el texto principal, con nota que reconoce la alternativa de dispersión.
  alternative_spanish_readings:
  - habían sido dispersados
  - habían sido esparcidos
  rationale: 'La evidencia auditada no permite borrar la tensión: el propio expediente registra que una revisión importante corrigió ‘scattered’ a ‘destroyed’. En español conviene reflejar esa lectura fuerte, porque preserva la posible alusión a muerte/pérdida y la posterior restauración, sin negar el campo semántico vecino de dispersión.'
  doctrine_reference: Preservar la tensión textual y la imaginería restaurativa; no suavizar un posible motivo de pérdida/resurrección.
- issue: Identidad del 'Señor de las ovejas'
  english_pob_reading: A divine title within the Animal Apocalypse, rendered as 'the Lord of the sheep'.
  chosen_spanish_reading: ‘el Señor de las ovejas’ como título simbólico y no como simple dueño humano.
  alternative_spanish_readings:
  - el dueño de las ovejas
  - su señor, el de las ovejas
  rationale: El título es parte del código visionario de 1 Enoc. Traducirlo de forma literal conserva la figura teológica y evita rebajarla a un lenguaje meramente pastoril o administrativo.
  doctrine_reference: Mantener la imaginería apocalíptica y el referente divino del símbolo.
translation_notes:
  revision_awareness: 'El expediente inglés registra una corrección significativa: la primera traducción optó por ‘scattered’, pero la revisión posterior y el análisis crítico señalan que ተሐጕሉ exige un valor más fuerte (‘destroyed’/‘perished’/‘lost’). Por eso el español principal sigue la lectura revisada y deja constancia de la alternativa en nota, mientras conserva el segundo verbo de dispersión para no perder la estructura enfática del verso.'
  spanish_consistency_notes:
  - Se mantiene ‘Señor de las ovejas’ para preservar el título visionario del Animal Apocalypse.
  - Se usa ‘aquella casa’/‘su casa’ con el mismo referente para evitar ambigüedad.
  - El par verbal ‘destruidos y dispersados’ conserva dos movimientos distintos del original, sin fundirlos en un solo término.
  - ‘Aves del cielo’ y ‘bestias del campo’ siguen un registro bíblico claro y natural en español.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni terminología eclesial ajena al texto.
