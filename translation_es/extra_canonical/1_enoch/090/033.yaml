  - severity: low
    issue: Puede mejorarse la duplicación verbal para sonar más natural en español
    rationale: '''esparcidos y dispersados'' o ''dispersados y esparcidos'' preserva el par intensivo. ''Dispersados'' en ambos niveles semánticos suena repetitivo si la nota intenta resolver la tensión.'
