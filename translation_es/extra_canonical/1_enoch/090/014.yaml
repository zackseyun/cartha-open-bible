translation:
  language: es
  text: Y vi hasta que vino aquel hombre, el que había escrito los nombres de los pastores, y los presentó[a] ante el Señor de las ovejas; y lo ayudó y lo rescató, y le mostró todo[b] lo relativo a la caída de su ayudante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo puede implicar no solo movimiento, sino presentación formal ante el juez; literalmente también puede sugerir que los hizo subir ante él.
    reason: textual_variant
  - marker: b
    text: La cláusula final es difícil; puede aludir a la caída, al descenso o a la intervención de su ayudante, y no conviene fijar con demasiada rigidez una sola posibilidad.
    reason: textual_variant
lexical_decisions:
- source_word: ብእሲ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - figura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘ብእሲ’ denota normalmente un ser humano varón o ‘hombre’. En español, ‘hombre’ conserva la imagen concreta sin forzar una identificación interpretativa de la figura celestial.
- source_word: ዘጸሐፈ አስማቲሆሙ
  english_pob_choice: who had written down their names
  chosen_spanish: que había escrito los nombres
  alternatives_spanish:
  - que escribió sus nombres
  - que había registrado sus nombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Escrito los nombres’ mantiene el matiz documental/judicial del registro, y el pretérito perfecto compuesto refleja la acción anterior dentro de la visión.
- source_word: ለኖሎት
  english_pob_choice: of the shepherds
  chosen_spanish: de los pastores
  alternatives_spanish:
  - para los pastores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El genitivo es más natural en español como pertenencia o asociación con los pastores cuya conducta está en juicio.
- source_word: ያዐርግ ቅድሜሁ
  english_pob_choice: brought them up before him
  chosen_spanish: lo llevó ante
  alternatives_spanish:
  - lo hizo subir ante
  - lo presentó ante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Llevar ante’ preserva la idea de presentación en un contexto de juicio, sin recargar el español con una calca de ‘subir’.
- source_word: ለእግዚአ አባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el dueño de las ovejas
  - el Señor de los rebaños
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título divino con ‘Señor’, que en este apocalipsis funciona como designación elevada de Dios sobre su rebaño.
- source_word: ረዳኦ ወአድኃኖ
  english_pob_choice: helped ... and rescued
  chosen_spanish: lo ayudó y lo rescató
  alternatives_spanish:
  - lo asistió y lo libró
  - lo socorrió y lo salvó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Conviene distinguir ambos verbos: uno expresa ayuda, el otro liberación efectiva. ‘Rescató’ conserva la separación semántica sin cargar demasiado el registro.'
- source_word: አርአዮ ኵሎ መራደ
  english_pob_choice: showed him everything concerning the downfall of his helper
  chosen_spanish: le mostró todo lo relativo a la caída de su ayudante
  alternatives_spanish:
  - le mostró toda la caída de su ayudante
  - le mostró todo acerca del descenso de su ayudante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase ge'ez es difícil; ‘todo lo relativo a la caída’ conserva amplitud y evita decidir indebidamente por una concreción no segura. ‘Caída’ recoge la idea de descenso/ruina sin cerrar la ambigüedad textual.
- source_word: ለረዳኢቱ ለዝኩ ይቤላ
  english_pob_choice: that its helper had come down for this purpose
  chosen_spanish: de su ayudante
  alternatives_spanish:
  - de su auxiliador
  - de aquel que lo ayudaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El cierre es sintáctica y léxicamente concentrado; ‘su ayudante’ preserva el referente relacional y deja abierta la ambigüedad sobre el sentido exacto del descenso o intervención.
theological_decisions:
- issue: Identidad de ‘aquel hombre’
  english_pob_reading: Rendered simply as 'that man' without specifying angel, archangel, or heavenly being in the main text.
  chosen_spanish_reading: ‘aquel hombre’ sin especificar ángel u otra clase de ser celestial.
  alternative_spanish_readings:
  - aquel ángel
  - esa figura celestial
  rationale: El ge'ez dice ‘hombre’. Aunque el contexto sugiere una figura celestial, la traducción principal conserva el término local y no resuelve la identificación interpretativa.
  doctrine_reference: Preservar tensión teológica sin resolverla
- issue: Título divino እግዚአ አባግዕ
  english_pob_reading: '''the Lord of the sheep'''
  chosen_spanish_reading: ‘el Señor de las ovejas’
  alternative_spanish_readings:
  - el dueño de las ovejas
  - el Señor del rebaño
  rationale: En este apocalipsis el título funciona como designación de Dios. ‘Señor’ preserva el registro elevado y la fuerza teológica del dominio divino sobre el rebaño.
  doctrine_reference: Consistencia terminológica en títulos divinos
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión posterior que corrigió la identificación errónea del final como ‘por este propósito’ y la mala lectura de ይቤላ; por eso se evita traducirlo como finalidad y se conserva una formulación amplia y prudente para አርአዮ ኵሎ መራደ. También se retuvo la tensión textual en torno al referente humano/celestial y al sentido exacto de la última cláusula.
  spanish_consistency_notes:
  - Se mantiene ‘Señor’ para el título divino del rebaño en coherencia con el registro de la serie.
  - Se conserva ‘ayudante’ en el cierre para no forzar una identificación más precisa de la figura referida.
  - La puntuación busca reflejar el encadenamiento narrativo y judicial del pasaje sin sobreexplicación.
