base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/014.yaml
  text: And I saw until that man came[a], the one who had written down the names of the shepherds, and he brought them up before the Lord of the sheep; and he helped him and rescued him[c][b], and he showed him everything concerning the downfall of his helper.
  footnotes:
  - marker: a
    text: The final clause is difficult in the Ethiopic as transmitted here. It may mean that the sheep was shown everything concerning the descent or intervention of its helper.
    reason: textual_variant
  - marker: b
    text: The 'man who had written down the names of the shepherds' is the heavenly recorder figure already active in this vision's judgment scene.
    reason: cross_reference
  - marker: c
    text: Or 'and he helped that sheep and rescued it, and he showed it everything, that its helper had come down for this purpose.'.
    reason: previous_rendering
