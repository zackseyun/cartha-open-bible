translation:
  language: es
  text: Y todas las águilas, los buitres, los cuervos y los milanos se reunieron y vinieron con ellos, con todas las ovejas salvajes[a]; y todos vinieron juntos y se ayudaron unos a otros para hacer pedazos el cuerno de aquel carnero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ovejas del desierto». La frase ge'ez probablemente distingue a estas ovejas del rebaño principal por su entorno de desierto o su carácter no domesticado.
    reason: lexical_alternative
lexical_decisions:
- source_word: አንስርት
  english_pob_choice: eagles
  chosen_spanish: águilas
  alternatives_spanish:
  - buitres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la especie rapaz principal y el contraste con los demás aves de presa; en español, «águilas» es la opción más natural y distintiva para este término.
- source_word: ዓውስት
  english_pob_choice: vultures
  chosen_spanish: buitres
  alternatives_spanish:
  - zopilotes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la imagen de ave carroñera y el paralelismo con la lista de depredadores; «buitres» es más general y dignificado que «zopilotes» en este registro.
- source_word: ቋዓት
  english_pob_choice: ravens
  chosen_spanish: cuervos
  alternatives_spanish:
  - corvos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audio textual corregido indica que este término corresponde a «ravens/crows»; en español «cuervos» comunica bien la figura ominosa y escatológica.
- source_word: ሀባይ
  english_pob_choice: kites
  chosen_spanish: milanos
  alternatives_spanish:
  - gavilanes
  - halcones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Tras la revisión, este término corresponde a un ave rapaz menor tipo kite/hawk; «milanos» preserva mejor la diferenciación zoológica sin volver genérico el listado.
- source_word: ተጋብኡ
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la acción colectiva y coordinada del texto con naturalidad en español, sin perder el matiz de reunión hostil.
- source_word: አባግዕ ገዳም
  english_pob_choice: wild sheep
  chosen_spanish: ovejas salvajes
  alternatives_spanish:
  - ovejas del desierto
  - ovejas del campo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase distingue a estos animales del rebaño doméstico; en español, «ovejas salvajes» comunica de forma clara el sentido de ገዳም sin sobreexplicar.
- source_word: ኅቡረ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - a una
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reproduce la insistencia del pasaje en la acción unificada; «juntos» funciona de manera natural en la segunda cláusula reforzando el paralelismo.
- source_word: ትራድኡ
  english_pob_choice: helped one another
  chosen_spanish: se ayudaron unos a otros
  alternatives_spanish:
  - se apoyaron mutuamente
  - unieron fuerzas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserva la reciprocidad explícita del verbo sin convertirla en una interpretación militar más fuerte de la necesaria.
- source_word: ይቀትቅጥዎ
  english_pob_choice: shatter
  chosen_spanish: hacer pedazos
  alternatives_spanish:
  - romper
  - destrozar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa optó por una fuerza mayor que «break»; en español, «hacer pedazos» transmite destrucción violenta con claridad y sin sonar artificial.
- source_word: ቀርነ
  english_pob_choice: horn
  chosen_spanish: cuerno
  alternatives_spanish:
  - asta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Debe conservarse el símbolo zoomórfico literal; «cuerno» mantiene la imagen apocalíptica y es el equivalente más directo en español.
- source_word: ይቤላ
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho cabrío
  - macho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del auditor corrigió el error de «boar» y estableció que el referente es un carnero; en español, «carnero» preserva el código animal del libro.
theological_decisions:
- issue: Conservar la imaginería apocalíptica zoológica sin identificar referentes históricos en el texto principal
  english_pob_reading: Retain the literal animal imagery without identifying historical referents.
  chosen_spanish_reading: Conservar la imaginería animal literal sin identificar referentes históricos.
  alternative_spanish_readings:
  - Interpretar simbólicamente los animales en el texto principal
  - Introducir equivalencias históricas implícitas
  rationale: La escena es visionaria y simbólica; la traducción debe dejar el código animal intacto para no resolver la alegoría dentro del versículo.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten or over-harmonize.'
translation_notes:
  revision_awareness: 'Tomé en cuenta la corrección mayor del audit trail: ይቤላ no es «boar» sino «ram/carnero», y también la inversión corregida de ቋዓት y ሀባይ. Por eso el texto español sigue la lectura revisada y evita reproducir el error anterior. La versión inglesa más reciente también reforzó el verbo final con «shatter»; por ello se eligió una expresión española igualmente fuerte («hacer pedazos»).'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de la lista zoológica con artículos y conjunciones naturales en español.
  - Se evitó «Señor» o terminología doctrinal ajena porque el pasaje es puramente apocalíptico-animal.
  - «Carnero» se prefirió sobre «macho cabrío» porque la revisión fuente-auditada identifica ese referente animal específico.
  - Las notas a pie preservan alternativas reales cuando el ge'ez o la tradición de traducción presentan ambigüedad.
