  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la escena básica y refleja correctamente las correcciones auditadas clave: ይቤላ se vierte como «carnero», no «jabalí», y el orden/correspondencia principal de las aves queda como «cuervos y milanos». También conserva la imaginería animal literal y la acción colectiva del ataque. Sin embargo, la anotación al pie quedó desalineada con el texto y con el expediente inglés: la nota [a] está anclada en «con ellos» pero explica «ovejas salvajes / ovejas del desierto»; además [b] y [c] ya no corresponden al estado auditado y generan ruido o redundancia.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Águilas», «buitres», «cuervos», «milanos», «se reunieron», «se ayudaron unos a otros» y «el cuerno de aquel carnero» funcionan bien. El único problema de calidad real está en la gestión de notas: los marcadores múltiples sobre «ovejas salvajes» y la nota [a] mal ubicada dificultan la lectura y no cumplen la disciplina de anclaje.'
  glossary_alignment: Buena alineación con la terminología del proyecto y con las decisiones léxicas auditadas para este versículo. No hay conflicto con términos teológicos globales. La decisión «carnero» para ይቤላ es especialmente importante y está bien aplicada. «Milanos» para ሀባይ y «cuervos» para ቋዓት concuerda con la revisión auditada.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «con ellos» pero su contenido explica «ovejas salvajes / ovejas del desierto».
    rationale: Las notas deben aparecer en el lugar pertinente dentro de `spanish_text`. Tal como está, el lector entiende erróneamente que la alternativa afecta a «con ellos».
  - severity: medium
    issue: Las notas [b] y [c] no deben mantenerse en esta forma.
    rationale: En el expediente inglés, [b] y [c] pertenecían a una lectura previa errónea sobre «boar» y a un rendering anterior; tras la adjudicación, ya no corresponde conservar una nota que repita la lectura principal («O “el cuerno de aquel carnero”») ni una explicación editorial sobre la revisión interna del orden de aves. Eso no preserva una alternativa significativa del texto final, sino historial de auditoría.
  - severity: low
    issue: La acumulación de tres marcadores sobre «ovejas salvajes» recarga innecesariamente el texto.
    rationale: Una sola nota léxica basta para preservar la alternativa «ovejas del desierto / ovejas del campo abierto»; las demás no aportan claridad al lector final.
