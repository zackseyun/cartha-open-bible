translation:
  language: es
  text: Y vi a todas las ovejas que habían quedado, y a toda bestia que estaba sobre la tierra, y a todas las aves del cielo, caer y postrarse ante aquellas ovejas, y hacerles súplicas, y obedecerlas[a] en toda palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo traducido como «obedecerlas» es literalmente «oírlas». En este contexto de postración y súplica, probablemente lleva el sentido de prestarles atención u obedecerlas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢክዎሙ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y contemplé
  - Y miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo introduce el informe visionario en primera persona. «Y vi» es natural en español y conserva el tono apocalíptico sin añadir matiz interpretativo.
- source_word: ኵሎሙ አባግዕ እለ ተርፉ
  english_pob_choice: all the sheep that were left
  chosen_spanish: todas las ovejas que habían quedado
  alternatives_spanish:
  - todas las ovejas que quedaron
  - todas las ovejas restantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa el resto que permanece tras el juicio. «Habían quedado» mantiene el sentido de remanente sin especificar más de lo que el ge'ez permite.
- source_word: ኵሉ እንስሳ ዘዲበ ምድር
  english_pob_choice: every beast that was upon the earth
  chosen_spanish: toda bestia que estaba sobre la tierra
  alternatives_spanish:
  - todo animal que estaba sobre la tierra
  - toda bestia sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Bestia» conserva el registro simbólico del pasaje y encaja mejor que «animal» en la imaginería apocalíptica. «Sobre la tierra» reproduce la localización elevada del original.
- source_word: ኵሉ አዕዋፈ ሰማይ
  english_pob_choice: all the birds of heaven
  chosen_spanish: todas las aves del cielo
  alternatives_spanish:
  - todas las aves del cielo/firmamento
  - todas las aves de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Aves del cielo» comunica bien la expresión bíblico-apocalíptica y es idiomática en español. Se evita una construcción más literal que suene extraña sin aportar precisión adicional.
- source_word: ይወድቁ ወይሰግዱ
  english_pob_choice: falling down and bowing
  chosen_spanish: caían y se postraban
  alternatives_spanish:
  - caían y se inclinaban
  - caían rostro en tierra y se postraban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Los dos verbos describen sumisión corporal. «Se postraban» conserva con fuerza la imagen de inclinación total sin traducirla automáticamente como culto religioso.
- source_word: ለእልኩ አባግዕ
  english_pob_choice: to those sheep
  chosen_spanish: ante aquellas ovejas
  alternatives_spanish:
  - a aquellas ovejas
  - delante de aquellas ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo remite a las ovejas mencionadas antes. «Ante» expresa la relación espacial de postración; «aquellas» mantiene la referencia anafórica.
- source_word: ያስተበቍዕዎሙ
  english_pob_choice: making petition to them
  chosen_spanish: les hacían súplica
  alternatives_spanish:
  - les suplicaban
  - les dirigían petición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo implica ruego o petición insistente. «Hacían súplica» conserva un registro formal y reproduce bien la idea de suplicar desde una posición de sometimiento.
- source_word: ይሰምዕዎሙ በኵሉ ቃል
  english_pob_choice: obeying them in every word
  chosen_spanish: las obedecían en toda palabra
  alternatives_spanish:
  - las oían en todo
  - les hacían caso en todo cuanto decían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el verbo es literalmente «oír», en este contexto significa prestar atención obediente. «En toda palabra» conserva la concreción del ge'ez y la amplitud de la sumisión.
theological_decisions:
- issue: Si la escena debe traducirse como adoración religiosa o como sumisión política/escatológica
  english_pob_reading: 'Rendered as political/eschatological submission: ''falling down and bowing ... making petition ... obeying'''
  chosen_spanish_reading: Sumisión corporal y obediencia, no culto explícito
  alternative_spanish_readings:
  - adoraban a aquellas ovejas
  - les rendían homenaje
  rationale: La secuencia de caer, postrarse, suplicar y obedecer muestra sometimiento pleno, pero el texto no obliga a formularlo como adoración a Dios. Mantener la tensión evita imponer una categoría posterior sobre la simbología animal.
  doctrine_reference: Preservar la tensión teológica del pasaje sin armonizarla en exceso con usos cristianos posteriores.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente aclaró la sintaxis: solo «las ovejas» funcionan como objeto de «vi», mientras que «toda bestia» y «todas las aves» son los sujetos de los verbos de sumisión. La versión española sigue esa estructura y evita agrupar indebidamente a los tres grupos como objetos de la visión.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este verso no lo contiene.
  - Se traduce δοῦλος/relacionados con «esclavo» por norma del proyecto, pero no aplica aquí.
  - «Ovejas», «bestia» y «aves» conservan el registro simbólico del Apocalipsis animal sin suavizarlo con vocabulario más general.
  - La puntuación separa la oración inicial de visión de la serie de acciones subordinadas para reflejar la estructura revisada del inglés auditado.
