  to: Y vi a todas las ovejas que habían quedado, y a toda bestia que estaba sobre la tierra, y a todas las aves del cielo, caer y postrarse ante aquellas ovejas, y hacerles súplicas, y obedecerlas[a] en toda palabra.
  rationale: Se reubicó la nota al verbo final para reflejar correctamente la decisión léxica documentada en el POB inglés. También se ajustó la sintaxis para que el español conserve mejor la relación entre los sujetos colectivos y la cadena de acciones, manteniendo la sumisión corporal sin convertirla en adoración explícita. Se mantuvo «ante aquellas ovejas» con la postración, pero se enlazó claramente con los verbos siguientes mediante pronombres de objeto.
