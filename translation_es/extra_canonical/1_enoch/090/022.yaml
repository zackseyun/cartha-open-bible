translation:
  language: es
  text: 'Y le dijo a ese hombre que escribía delante de él, quien era uno de aquellos siete seres blancos, y le dijo: “Toma a aquellos setenta pastores a quienes entregué[a] las ovejas; y ellos, tomándolos[b][c], mataron a muchos más de los que les mandé.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «confié las ovejas a ellos». El verbo puede enfatizar el acto de ponerlas bajo su cuidado.'
    reason: lexical_alternative
  - marker: b
    text: La formulación sugiere que los pastores fueron más allá del límite de lo que se les había mandado.
    reason: alternative_reading
  - marker: c
    text: 'O: «Y le dijo a ese hombre que escribía delante de él, quien era uno de aquellos siete seres blancos, y le dijo: “Toma...»'
    reason: previous_rendering
lexical_decisions:
- source_word: ብእሲ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez suele designar a un ser humano masculino; en esta escena visionaria se trata del escriba celestial ya introducido en el contexto. “Hombre” conserva la imagen antropomórfica y la naturalidad narrativa en español.
- source_word: ዘይጽሕፍ
  english_pob_choice: who was writing
  chosen_spanish: que escribía
  alternatives_spanish:
  - que estaba escribiendo
  - que registraba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma relativa verbal expresa una acción en curso. “Que escribía” reproduce bien la continuidad pasada sin forzar una explicación interpretativa adicional.
- source_word: በቅድሜሁ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es literalmente espacial. “Delante de él” mantiene la escena de corte o audiencia celestial y evita una formulación demasiado abstracta.
- source_word: ፯እምነ ዝኩ ፯ጻዕዳው
  english_pob_choice: one of those seven white ones
  chosen_spanish: uno de aquellos siete blancos
  alternatives_spanish:
  - uno de aquellos siete seres blancos
  - uno de aquellos siete hombres blancos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Blancos” conserva la carga simbólica del color y sigue de cerca el identificador del grupo celestial. No se añade “seres” ni “hombres” en el cuerpo principal para no sobreexplicar el título visionario.
- source_word: ንሥኦሙ
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Lleva
  - Toma para ti
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo de tomar/coger es amplio. “Toma” es la opción más natural y mantiene abierta la instrucción judicial sin precisar el modo de custodia.
- source_word: ፸ኖሎት
  english_pob_choice: seventy shepherds
  chosen_spanish: setenta pastores
  alternatives_spanish:
  - setenta pastores/guardianes
  - setenta cuidadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Pastores” preserva la metáfora central del Apocalipsis de los animales. Traducirlo de otro modo diluiría la imagen visionaria establecida por el texto.
- source_word: መጠውክዎሙ
  english_pob_choice: I delivered
  chosen_spanish: entregué
  alternatives_spanish:
  - confié
  - puse bajo su cargo
  - entregué en custodia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo implica pasar algo a la responsabilidad de otro. “Entregué” reproduce la transferencia de autoridad y el tono de comisión judicial.
- source_word: አባግዐተ
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - las ovejas / el rebaño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural concreto “ovejas” es el equivalente más directo y mantiene la identidad simbólica del pueblo en la visión.
- source_word: ነሢኦሙ ቀተሉ
  english_pob_choice: taking them, killed
  chosen_spanish: tomándolos, mataron
  alternatives_spanish:
  - habiéndolos tomado, mataron
  - y al tomarlos, mataron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia participial seguida del verbo finito sugiere acciones encadenadas. “Tomándolos, mataron” conserva esa progresión sin suavizarla en exceso.
- source_word: ብዙኃነ እምዘ አዘዝክዎሙ
  english_pob_choice: many more than I commanded them
  chosen_spanish: a muchos más de los que les mandé
  alternatives_spanish:
  - muchos más de los que les ordené
  - más de lo que les mandé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase marca exceso respecto de una comisión previa. “A muchos más de los que les mandé” preserva tanto el abuso de la comisión como el matiz cuantitativo del original.
theological_decisions:
- issue: Identidad de los “setenta pastores”
  english_pob_reading: Retain the symbolic title 'seventy shepherds' without interpretive expansion in the main text.
  chosen_spanish_reading: Mantener “setenta pastores” sin explicarlos dentro del versículo.
  alternative_spanish_readings:
  - setenta ángeles
  - setenta gobernantes
  - setenta supervisores
  rationale: La visión del Apocalipsis de los animales usa lenguaje simbólico deliberado. Expandirlo en el texto principal resolvería prematuramente la imagen y reduciría su fuerza apocalíptica.
  doctrine_reference: Preservar el simbolismo apocalíptico; no convertir la imagen en prosa interpretativa.
- issue: Fuerza de la comisión divina frente a la violencia de los pastores
  english_pob_reading: Render the line so that the shepherds exceeded a real command rather than acted without any authorization.
  chosen_spanish_reading: Traducir de modo que mataron más de lo mandado, no que actuaron sin ninguna comisión.
  alternative_spanish_readings:
  - mataron aunque no se les había mandado
  - mataron sin que yo se los ordenara
  rationale: El ge'ez sugiere exceso respecto de una orden real, no ausencia total de mandato. Esto conserva la tensión teológica entre juicio delegado y abuso de esa delegación.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'He seguido el estado revisado más reciente del audio inglés: la cláusula parentética se mantiene como oración relativa restrictiva (“who was one of those seven white ones”) y el segundo marco de habla sigue presente. En español, esto se refleja conservando el inciso relativo y el doble marco narrativo sin fusionarlos en una sola frase simplificada.'
  spanish_consistency_notes:
  - Uso «Yahvé» no aplica aquí; no hay nombre divino explícito en este versículo.
  - He mantenido «pastores» y «ovejas» como términos simbólicos consistentes con la serie del Apocalipsis de los animales.
  - He usado «entregué» para reproducir la noción de puesta bajo encargo, evitando un término más débil como «di» o uno más explicativo como «confié».
  - He preferido «tomándolos» para reflejar el participio encadenado del ge'ez y no una paráfrasis más fluida que borre la estructura del original.
