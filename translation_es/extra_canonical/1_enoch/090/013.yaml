base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/013.yaml
  text: And I saw until the shepherds and the eagles and the vultures and the kites came[a], and they cried out to the ravens to break the horn of that ram; and they fought and battled with him, and he fought with them[c][b], and cried out that his help might come.
  footnotes:
  - marker: a
    text: Or 'that he-goat.' The Ge'ez term denotes a horned male goat.
    reason: lexical_alternative
  - marker: b
    text: Or 'that his helper might come.' The noun can be understood as 'help' or 'helper.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the eagles and the kites and the ravens came, and they cried out to the ravens that they should break the horn of that buck'.
    reason: previous_rendering
