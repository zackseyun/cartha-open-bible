translation:
  language: es
  text: Y vi hasta que llegaron los pastores y las águilas y los buitres y los milanos, y clamaron a los cuervos para que quebraran el cuerno de aquel carnero[a]; y pelearon y combatieron con él, y él peleó con ellos, y clamó para que viniera su ayuda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aquel macho cabrío». El término ge'ez designa un macho cabrío con cuernos.
    reason: lexical_alternative
  - marker: b
    text: O «su ayudante»; el sustantivo puede entenderse como «ayuda» o «ayudante».
    reason: lexical_alternative
lexical_decisions:
- source_word: ኖላዊያን
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los herdos
  - los cuidadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo el valor técnico-apocalíptico de la imagen. En español, «pastores» mantiene la metáfora establecida para los supervisores designados, sin reducirla a un sentido genérico.
- source_word: አንስርት
  english_pob_choice: the eagles
  chosen_spanish: las águilas
  alternatives_spanish:
  - los buitres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia enumera aves de presa distintas; «águilas» preserva la imagen aviar y coincide con la decisión auditada en inglés.
- source_word: አውስት
  english_pob_choice: the vultures
  chosen_spanish: los buitres
  alternatives_spanish:
  - los halcones
  - los falcones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez designa un ave rapaz/carroñera; «buitres» refleja mejor la revisión auditada que corrigió la omisión de esta especie y mantiene la serie zoológica diferenciada.
- source_word: ዝኩ
  english_pob_choice: the kites
  chosen_spanish: los milanos
  alternatives_spanish:
  - los halcones
  - los falcones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para un lector español, «milanos» es una equivalencia natural y reconocible para esta ave rapaz menor; conserva el matiz zoológico sin forzar una identificación demasiado técnica.
- source_word: ቋዓት
  english_pob_choice: the ravens
  chosen_spanish: los cuervos
  alternatives_spanish:
  - los cuervos negros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la lectura auditada de que el término corresponde al corvido al que se les clama. En español, «cuervos» es el término más natural y mantiene el tono oscuro/apocalíptico.
- source_word: ይቤላ
  english_pob_choice: that ram
  chosen_spanish: aquel carnero
  alternatives_spanish:
  - aquel macho cabrío
  - aquel chivo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige la identificación del animal atacado como carnero/ram. «Carnero» es claro en español y conserva la imagen cornuda sin introducir ambigüedad innecesaria.
- source_word: ይቀትቅጥዎ
  english_pob_choice: should break
  chosen_spanish: quebraran
  alternatives_spanish:
  - rompieran
  - destruyeran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa una ruptura violenta; «quebraran» comunica bien la acción sobre el cuerno y suena natural en español bíblico contemporáneo.
- source_word: ቀርኖ
  english_pob_choice: the horn
  chosen_spanish: el cuerno
  alternatives_spanish:
  - su cuerno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cuerno» reproduce el sustantivo concreto del original. Mantengo el artículo definido porque el contexto ya identifica el objeto atacado.
- source_word: ረዳኢቱ
  english_pob_choice: his help
  chosen_spanish: su ayuda
  alternatives_spanish:
  - su ayudante
  - su auxiliador
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo puede significar ayuda o ayudante. En el contexto de un clamor para que venga socorro, «su ayuda» es la opción más natural y fiel, dejando abierta la ambigüedad documentada.
theological_decisions:
- issue: Mantenimiento de la imaginería apocalíptica animal sin identificación histórica en la traducción principal
  english_pob_reading: Retain the literal animal imagery ('shepherds,' 'eagles,' 'vultures,' 'kites,' 'ravens,' 'ram') without interpretive expansion.
  chosen_spanish_reading: Conservar la imaginería literal («pastores», «águilas», «buitres», «milanos», «cuervos», «carnero») sin expansión interpretativa.
  alternative_spanish_readings:
  - Introducir identificaciones históricas en el texto principal
  - Generalizar a enemigos humanos o gobernantes
  rationale: La visión comunica mediante símbolos animales y pastores designados. La traducción debe preservar esa tensión apocalíptica en lugar de resolverla en una reconstrucción histórica concreta.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; preserve apocalyptic imagery.'
- issue: 'Ambigüedad de ረዳኢቱ: ''ayuda'' o ''ayudante'''
  english_pob_reading: Or 'that his helper might come.' The noun can be understood as 'help' or 'helper.'
  chosen_spanish_reading: «su ayuda» en el texto principal, con la alternativa de «su ayudante» preservada como posibilidad lexical.
  alternative_spanish_readings:
  - su ayudante
  - su auxiliador
  rationale: La ambigüedad del sustantivo se conserva mejor con «ayuda», porque el contexto inmediato es un clamor por socorro; aun así, no se elimina la posibilidad personal que reconoció el audit trail inglés.
  doctrine_reference: Lexical ambiguity should remain visible when the source supports more than one reading.
translation_notes:
  revision_awareness: 'El texto sigue la revisión auditada más reciente que corrigió la lista de aves y el animal atacado: no omite los buitres, no desplaza a los cuervos a la lista de sujetos, y lee el objetivo como «carnero» en vez de «macho cabrío» en el cuerpo principal. También conserva la ambigüedad de ረዳኢቱ («ayuda/ayudante») de forma explícita en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando aparezca el nombre divino; aquí no ocurre.
  - Se prefieren términos zoológicos concretos y naturales en español para las aves de presa, evitando calcos innecesarios.
  - La sintaxis sigue de cerca la estructura del original sin forzar giros arcaizantes.
  - La puntuación usa el patrón español con punto y coma para separar las cláusulas largas del versículo.
