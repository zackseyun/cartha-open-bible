translation:
  language: es
  text: Y les clamaron, pero no hicieron caso de sus palabras; más bien, estaban excesivamente sordos[a], y sus ojos estaban excesivamente cegados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez repite un intensificador equivalente a 'excesivamente' tanto para la sordera como para el cegamiento de sus ojos, subrayando una insensibilidad extrema.
    reason: lexical_alternative
  - marker: b
    text: La imagen de oídos sordos y ojos cegados puede leerse con fuerza moral y espiritual en la visión, pero la traducción conserva el lenguaje concreto del original.
    reason: cultural_note
lexical_decisions:
- source_word: ወአስርኅዎሙ
  english_pob_choice: And they cried out to them
  chosen_spanish: Y ellos clamaron a ellos
  alternatives_spanish:
  - Y ellos gritaron a ellos
  - Y ellos alzaron la voz hacia ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa un clamor fuerte dirigido a otros. 'Clamaron' conserva mejor que 'gritaron' el tono solemne y visionario del pasaje, y respeta el sujeto plural de la revisión auditada.
- source_word: ኢያጽምኡ ነገሮሙ
  english_pob_choice: they did not heed their words
  chosen_spanish: no hicieron caso de sus palabras
  alternatives_spanish:
  - no escucharon sus palabras
  - no obedecieron sus palabras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro negativo con el verbo de oír permite en español una falta de respuesta efectiva. 'No hicieron caso' mantiene la fuerza de desatender sin imponer de lleno la interpretación de 'obedecieron'.
- source_word: ፈድፋደ
  english_pob_choice: exceedingly
  chosen_spanish: excesivamente
  alternatives_spanish:
  - sobremanera
  - grandemente
  - muchísimo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio se repite para intensificar tanto la sordera como la ceguera. 'Excesivamente' reproduce esa intensificación repetida con un registro formal y transparente.
- source_word: ተጸመሙ
  english_pob_choice: were deaf
  chosen_spanish: estaban excesivamente sordos
  alternatives_spanish:
  - eran sordos
  - se volvieron sordos
  - quedaron sordos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es literal y no se debe diluir. 'Sordos' mantiene la concreción sensorial, y 'estaban' refleja el estado descrito por la forma verbal sin convertirlo en mera metáfora explicativa.
- source_word: ተጸለሉ አዕይንቲሆሙ
  english_pob_choice: their eyes were blinded
  chosen_spanish: sus ojos estaban excesivamente ciegos
  alternatives_spanish:
  - sus ojos fueron cegados
  - sus ojos estaban cegados
  - sus ojos quedaron ciegos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez presenta la incapacidad visual como un estado de los ojos. En español, 'estaban ciegos' conserva la fuerza imagística y la paralelidad con 'sordos'; no obstante, se reconoce la alternativa literal 'cegados'.
theological_decisions:
- issue: Sensory loss as visionary moral insensibility
  english_pob_reading: The main text preserves sensory language ('did not heed,' 'were deaf,' 'their eyes were blinded') without explicitly interpreting it as metaphor only.
  chosen_spanish_reading: El texto conserva el lenguaje sensorial ('no hicieron caso', 'sordos', 'ciegos') sin reducirlo a una paráfrasis espiritualizante.
  alternative_spanish_readings:
  - no obedecieron, porque estaban espiritualmente endurecidos
  - no podían oír, y sus ojos se oscurecieron
  rationale: En la visión apocalíptica, la sordera y la ceguera funcionan como imágenes de insensibilidad moral y espiritual, pero el versículo sigue hablando en términos corporales. La traducción mantiene esa tensión y no la resuelve por adelantado.
  doctrine_reference: Preservar la tensión teológica entre imagen corporal y significado moral.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección auditada del sujeto y los sufijos plurales: el texto no debe decir ''yo'', sino ''ellos''; tampoco ''mis palabras'', sino ''sus palabras''. También se respetó la revisión que elevó el registro de ''listen to'' a una forma más formal, aquí reflejada con ''no hicieron caso''.'
  spanish_consistency_notes:
  - Se conserva el paralelismo 'sordos/ciegos' para reproducir la simetría del ge'ez.
  - Se evita 'SEÑOR' u otros reemplazos no presentes en el pasaje.
  - '''Clamaron'' mantiene el tono visionario sin introducir un sentido litúrgico ajeno.'
  - Las notas distinguen entre ceguera literal e imagen moral sin resolver la ambigüedad del texto.
