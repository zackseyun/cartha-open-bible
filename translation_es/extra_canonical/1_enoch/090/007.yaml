base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/007.yaml
  text: And they cried out to them[a], but they did not heed their words; rather, they were exceedingly deaf[c][b], and their eyes were exceedingly blinded.
  footnotes:
  - marker: a
    text: The Ethiopic repeats an intensifier ('exceedingly') with both their deafness and the blinding of their eyes, emphasizing extreme insensibility.
    reason: lexical_alternative
  - marker: b
    text: The imagery of deafness and blinded eyes likely carries moral-spiritual force within the vision, but the translation keeps the concrete sensory language of the Ethiopic.
    reason: cultural_note
  - marker: c
    text: Or 'And I cried out over them, but they did not listen to my words'.
    reason: previous_rendering
