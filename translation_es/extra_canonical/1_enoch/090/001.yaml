translation:
  language: es
  text: Y vi hasta el tiempo en que[c] treinta y siete pastores estaban pastoreando de esta manera[a], y todos completaron sus períodos, cada uno en su tiempo, como los anteriores; y otros los recibieron en sus manos, para pastorearlos en sus tiempos, cada pastor en su tiempo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez es breve en la cláusula de relevo; la idea es que un grupo termina su período asignado y otro recibe la responsabilidad en sucesión.
    reason: textual_variant
  - marker: b
    text: La repetición de «tiempo» subraya períodos fijos y asignados de vigilancia, no una actividad indefinida.
    reason: cultural_note
  - marker: c
    text: O «hasta ese tiempo en que treinta y siete pastores estaban pastoreando».
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y observé
  - Y miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo visionario estándar; «vi» conserva la fórmula apocalíptica sin añadir interpretación.
- source_word: እስከ ዘመን ዘከመዝ
  english_pob_choice: until the time when ... in this way
  chosen_spanish: hasta el tiempo cuando ... de esta manera
  alternatives_spanish:
  - hasta el tiempo en que
  - hasta entonces, cuando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el progreso temporal y el matiz demostrativo de «como esto / de esta manera» en el ge'ez.
- source_word: ይርዕዩ
  english_pob_choice: were pasturing
  chosen_spanish: estaban pastoreando
  alternatives_spanish:
  - estaban apacentando
  - estaban pastoreando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pastoreando» preserva la imagen concreta del rebaño en el marco alegórico sin volverla abstracta.
- source_word: ፴ወ፯ ኖላዊያን
  english_pob_choice: thirty-seven shepherds
  chosen_spanish: treinta y siete pastores
  alternatives_spanish:
  - 37 pastores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Número en palabras por fluidez literaria; «pastores» es el equivalente natural del símbolo apocalíptico.
- source_word: ፈጸሙ ኵሎሙ በበጊዜሆሙ
  english_pob_choice: they all completed their periods, each in its time
  chosen_spanish: todos completaron sus períodos, cada uno en su tiempo
  alternatives_spanish:
  - todos terminaron sus períodos, cada uno en su tiempo
  - todos cumplieron sus períodos, cada uno en su tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Períodos» explicita el tramo asignado de vigilancia; «cada uno en su tiempo» conserva la distribución temporal.
- source_word: ከመ ቀዳማዊያን
  english_pob_choice: like the former ones
  chosen_spanish: como los anteriores
  alternatives_spanish:
  - como los primeros
  - como los de antes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Referencia natural a los pastores mencionados antes; «anteriores» es idiomático y fiel.
- source_word: በዐዳን ተመጠውዎሙ ውስተ እደዊሆሙ
  english_pob_choice: others received them into their hands
  chosen_spanish: otros los recibieron en sus manos
  alternatives_spanish:
  - otros los tomaron en sus manos
  - otros fueron encargados de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la imagen idiomática de entrega «en sus manos» sin diluirla en una paráfrasis.
- source_word: ከመ ይርዐይዎሙ በበጊዜሆሙ
  english_pob_choice: to pasture them in their times
  chosen_spanish: para pastorearlos en sus tiempos
  alternatives_spanish:
  - para apacentarlos en sus tiempos
  - para cuidarlos en sus tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El infinitivo final expresa propósito; «pastorearlos» mantiene el paralelismo con la imaginería animal.
- source_word: ኵሉ ኖላዊ በጊዜሁ
  english_pob_choice: each shepherd in its time
  chosen_spanish: cada pastor en su tiempo
  alternatives_spanish:
  - cada pastor en su propio tiempo
  - cada pastor en el suyo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Evita una formulación forzada en género; «su tiempo» preserva la distribución individual sin alterar el sentido.
theological_decisions:
- issue: Identidad de los «pastores» simbólicos
  english_pob_reading: Render as 'shepherds' without interpretive expansion
  chosen_spanish_reading: Traducir como «pastores» sin expandir el símbolo
  alternative_spanish_readings:
  - ángeles
  - gobernantes
  - supervisores
  rationale: El verso presenta la figura alegórica; resolverla en el texto principal iría más allá de la evidencia inmediata.
  doctrine_reference: Preservar la tensión interpretativa del texto apocalíptico sin cerrarla artificialmente.
translation_notes:
  revision_awareness: Se incorporó la fuerza demostrativa de ዘከመዝ con «de esta manera» y se mantuvo el paralelismo temporal y de relevo entre grupos de pastores. La redacción evita reducir la imagen alegórica a una explicación interpretativa.
  spanish_consistency_notes:
  - Se mantuvo «pastores» para conservar la imaginería apocalíptica, en paralelo con el inglés auditado.
  - «Períodos» traduce el matiz de tiempo asignado o delimitado, coherente con la lectura auditada del texto ge'ez.
  - 'La cláusula final conserva la distribución individual: «cada pastor en su tiempo».'
