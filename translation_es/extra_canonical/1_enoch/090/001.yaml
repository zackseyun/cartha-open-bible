  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Pastores» preserva correctamente la imagen alegórica; no hay nombres divinos ni términos doctrinales sensibles aquí. La decisión de mantener la expresión «en sus manos» es adecuada y fiel al rationale léxico documentado.
