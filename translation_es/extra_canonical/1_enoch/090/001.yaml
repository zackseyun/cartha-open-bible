base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/001.yaml
  text: And I saw until the time when thirty-seven shepherds were pasturing in this way[a], and they all completed their periods, each in its time, like the former ones; and others received them into their hands, to pasture them in their times[c][b], each shepherd in its time.
  footnotes:
  - marker: a
    text: The Ge'ez text is somewhat compressed in the handover clause; the sense is that one set of shepherds finishes its allotted period and another set receives charge in succession.
    reason: textual_variant
  - marker: b
    text: The repeated language of 'time' underscores fixed, allotted periods of oversight rather than indefinite activity.
    reason: cultural_note
  - marker: c
    text: Or 'until that time that thirty-seven shepherds were pasturing'.
    reason: previous_rendering
