revisions:
- from: Y llamó el Señor de las ovejas a esos siete primeros blancos y mandó que los trajeran[a] delante de él, comenzando con la primera estrella que iba delante de aquellas estrellas, cuyas partes íntimas eran como las de los caballos[c], esa primera que salió delante de ellos[b][d][e]; y los trajeron delante de él.
  to: Y llamó el Señor de las ovejas a esos siete primeros hombres blancos y mandó que los trajeran delante de él, comenzando con la primera estrella[a] que iba delante de aquellas estrellas, cuyas partes íntimas eran como las de los caballos[c], esa primera que salió delante de ellos[d][e][b]; y los trajeron delante de él.
  rationale: Se revisa principalmente para corregir «primeros blancos» a «primeros hombres blancos», porque el ge'ez incluye un sustantivo personal explícito y el español sin sustantivo queda poco natural. Además, se recolocan y reajustan las notas para que la nota textual documente la cláusula realmente difícil, en línea con el expediente inglés, mientras se conservan la imaginería de «estrellas», la formulación sexual fuerte y el valor inceptivo de «comenzando con».
