translation:
  language: es
  text: Y llamó el Señor de las ovejas a esos siete primeros hombres blancos y mandó que los trajeran delante de él, comenzando con la primera estrella[a] que iba delante de aquellas estrellas, cuyas partes íntimas eran como las de los caballos[c], esa primera que salió delante de ellos[d][e][b]; y los trajeron delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «comenzando desde la primera estrella que iba delante de aquellas estrellas, incluso esa primera estrella».'
    reason: alternative_reading
  - marker: b
    text: En esta visión, «estrellas» funciona simbólicamente para seres celestiales; se conserva la imagen en el texto principal en vez de sustituirla por su interpretación.
    reason: cross_reference
  - marker: c
    text: La comparación con los caballos es una imagen sexual deliberadamente vergonzosa, que evoca la transgresión de los seres rebeldes.
    reason: cultural_note
  - marker: d
    text: La cláusula sobre «esa primera que salió delante de ellos» es textualmente difícil en este testimonio etiópico y puede reiterar la identidad de la estrella principal en vez de introducir una figura distinta.
    reason: textual_variant
  - marker: e
    text: 'O: «esos siete primeros hombres blancos».'
    reason: previous_rendering
lexical_decisions:
- source_word: እግዚአ ሰብኡ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el Amo de las ovejas
  - el Dueño de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el simbolismo visionario de 1 Enoc, el título designa a Dios. «Señor» conserva el registro elevado y la autoridad del título; «ovejas» mantiene la imagen simbólica del rebaño sin interpretarla en el texto principal.
- source_word: ሰብአ ፯ጸዓድወ ቀዳማዊያን
  english_pob_choice: those seven first white ones
  chosen_spanish: esos siete primeros blancos
  alternatives_spanish:
  - esos siete primeros hombres blancos
  - esos siete primeros seres blancos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez presenta a siete seres caracterizados por blancura y primacía. «Blancos» conserva la imagen; «hombres blancos» añadiría un sustantivo que el POB inglés finalmente evitó en su última revisión, aunque el código visionario sugiere seres personales.
- source_word: ያምጽኡ ቅድሜሁ
  english_pob_choice: bring before him
  chosen_spanish: los trajeran delante de él
  alternatives_spanish:
  - los presentaran delante de él
  - los llevaran delante de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula es judicial/presentacional. «Traer delante de él» suena natural en español y preserva la escena de comparecencia.
- source_word: እምክቡበ ቀዳማዊ ዘይቀድም እምነ ዝኩ ከዋክብት
  english_pob_choice: from the first star that went before those stars
  chosen_spanish: comenzando con la primera estrella que iba delante de aquellas estrellas
  alternatives_spanish:
  - empezando por la primera estrella que precedía a aquellas estrellas
  - desde la primera estrella que iba delante de aquellas estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición እም funciona aquí de manera inceptiva, no meramente espacial. «Comenzando con» refleja el orden de ejecución. «Primera estrella» mantiene la referencia al astro concreto y el paralelismo del texto.
- source_word: ከዋክብት
  english_pob_choice: stars
  chosen_spanish: estrellas
  alternatives_spanish:
  - seres celestiales
  - ángeles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto dice «estrellas» y el género apocalíptico usa esa imagen para seres celestiales. Se conserva la metáfora en la traducción principal, como hace el POB en inglés.
- source_word: ኃፍረቶሙ ከመ ኃፍረተ አፍራስ
  english_pob_choice: whose private parts were like those of horses
  chosen_spanish: cuyas partes íntimas eran como las de los caballos
  alternatives_spanish:
  - cuyos genitales eran como los de los caballos
  - cuya desnudez era como la de los caballos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez es explícito y vergonzoso en su imagen sexual. «Partes íntimas» comunica el sentido sin caer en un tecnicismo clínico, preservando la fuerza deshonrosa del símil.
- source_word: ዘወፅአ ቅድመ
  english_pob_choice: that first one that went out before them
  chosen_spanish: esa primera que salió delante de ellos
  alternatives_spanish:
  - esa primera que iba delante de ellos
  - esa primera que salió antes que ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula reiterativa parece precisar al mismo astro principal. «Salió delante de ellos» conserva movimiento y precedencia; el femenino concuerda con «estrella» en español.
- source_word: ወአምጽእዎሙ ለእሎሙ ቅድሜሁ
  english_pob_choice: and they brought them before him
  chosen_spanish: y los trajeron delante de él
  alternatives_spanish:
  - y los presentaron delante de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición final de la acción se mantiene para respetar la estructura de juicio visionario. «Los trajeron delante de él» es idiomático y conserva el paralelismo del verso.
theological_decisions:
- issue: Cómo manejar el título divino «Lord of the sheep» sin sustituir la imaginería apocalíptica
  english_pob_reading: Retain the title as a divine designation within the animal-symbol vision
  chosen_spanish_reading: «el Señor de las ovejas» como título divino en la visión
  alternative_spanish_readings:
  - «el dueño de las ovejas»
  - «el amo de las ovejas»
  rationale: En la alegoría de los Animales, el título funciona como designación de Dios. «Señor» preserva la dignidad del título y evita rebajar el registro a propiedad doméstica.
  doctrine_reference: Conservar la imaginería apocalíptica sin interpretarla de más en el cuerpo del texto.
- issue: Si traducir las «stars» como ángeles o conservar la imagen astral
  english_pob_reading: Retain 'stars' in the main text
  chosen_spanish_reading: Conservar «estrellas» en el texto principal
  alternative_spanish_readings:
  - «ángeles»
  - «seres celestiales»
  rationale: La visión usa «estrellas» como símbolo. Traducir directamente por «ángeles» explicaría lo que el texto representa, pero perdería la forma visionaria.
  doctrine_reference: Preservar el símbolo apocalíptico en lugar de aplanarlo en prosa explicativa.
- issue: Cómo renderizar la imagen sexual deshonrosa de las estrellas rebeldes
  english_pob_reading: Use 'private parts were like those of horses'
  chosen_spanish_reading: «partes íntimas eran como las de los caballos»
  alternative_spanish_readings:
  - «genitales»
  - una formulación más eufemística
  rationale: La comparación es deliberadamente vergonzosa y grotesca. «Partes íntimas» conserva el contenido anatómico y el tono sin volverse excesivamente clínico.
  doctrine_reference: Mantener la fuerza imagística y moral del juicio visionario.
translation_notes:
  revision_awareness: El auditorio inglés pasó por una revisión que corrigió «men»/«ones» y afinó la cláusula inceptiva con «beginning with». La versión española sigue esa lectura revisada, conserva «estrellas» como imagen, y ajusta la concordancia femenina de «esa primera» por tratarse de «estrella».
  spanish_consistency_notes:
  - Se usa «Señor» para el título divino del rebaño, coherente con el registro elevado del POB.
  - Se mantiene «estrellas» en el texto principal para respetar la metáfora apocalíptica.
  - Se emplea «partes íntimas» como equivalente moderado de la imagen sexual explícita.
  - La concordancia femenina («esa primera», «salió») responde a «estrella» en español.
  - La secuencia «comenzando con» refleja la función inceptiva del antecedente ge'ez.
