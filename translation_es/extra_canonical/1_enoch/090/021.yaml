  yaml_path: translation/extra_canonical/1_enoch/090/021.yaml
  text: And the Lord of the sheep called those seven first white ones and commanded that they bring before him[a], beginning with the first star that went before those stars whose private parts were like those of horses, that first one which went out before them[e][d][c][b]; and they brought them before him.
