translation:
  language: es
  text: Y aquellas ovejas todas se volvieron blancas, y su lana[a] se hizo abundante[b] y pura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, 'pelo'. Como se trata de ovejas, aquí también puede entenderse como 'lana' o 'vellón'.
    reason: lexical_alternative
  - marker: b
    text: O 'grande'. Si se entendiera la palabra anterior como 'pelo', también podría expresarse de forma más idiomática como 'creció' o 'se hizo larga/espesa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: እልኩ
  english_pob_choice: those
  chosen_spanish: aquellas
  alternatives_spanish:
  - estas
  - esas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo mira hacia las ovejas ya presentadas en la visión; 'aquellas' conserva mejor ese valor anafórico que 'estas'.
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  - corderas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen animal debe mantenerse concreta; 'ovejas' reproduce el referente sin diluirlo en un colectivo abstracto.
- source_word: ኮኑ
  english_pob_choice: became
  chosen_spanish: se volvieron
  alternatives_spanish:
  - fueron
  - llegaron a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa un cambio de estado en la visión; 'se volvieron' conserva ese matiz de transformación.
- source_word: ኵሎሙ
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todas ellas
  - enteras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un totalizador directo y natural en español, manteniendo el alcance universal del enunciado.
- source_word: ጻዕዳ
  english_pob_choice: white
  chosen_spanish: blancas
  alternatives_spanish:
  - albas
  - brillantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El color es central en la imagen simbólica; 'blancas' es el equivalente más transparente y común.
- source_word: ጸጕረ
  english_pob_choice: wool
  chosen_spanish: lana
  alternatives_spanish:
  - pelo
  - vellón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el ge'ez es más literalmente 'pelo', el contexto de ovejas hace que en español 'lana' sea la forma más natural y fiel al referente, sin perder la base zoológica de la imagen.
- source_word: ዚአሆሙ
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellas
  - de cada una
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa señala que no conviene sobretraducir como distributivo; en español 'su' comunica el posesivo plural de forma idiomática.
- source_word: ዐቢየ
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - larga
  - espesa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para lana/pelo, el adjetivo apunta a abundancia o volumen; 'grande' mantiene la proximidad léxica al ge'ez sin introducir una interpretación excesiva.
- source_word: ንጹሐ
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - limpia
  - sin mancha
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pura'' conserva tanto la limpieza literal como la resonancia simbólica/cúltica que la POB busca no aplanar.'
theological_decisions:
- issue: Mantener la imaginería de transformación sin explicitar su sentido moral
  english_pob_reading: Retain the concrete visionary image without explicating its meaning in the main text.
  chosen_spanish_reading: Conservar la imagen concreta de transformación sin convertir 'blancas' en una glosa interpretativa como 'justas' o 'vindicadas'.
  alternative_spanish_readings:
  - y se volvieron justas
  - y quedaron vindicadas
  rationale: La visión apocalíptica comunica mediante símbolos; la traducción debe preservar la tensión teológica y no resolverla dentro del versículo.
  doctrine_reference: Preservar la tensión teológica en lenguaje apocalíptico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión inglesa: se adoptó ''lana'' en lugar de una traducción literal de ''hair'', y se mantuvo ''grande'' para ዐቢየ en vez de ''espesa'' o ''larga'' como interpretación contextual excesiva.'
  spanish_consistency_notes:
  - Se usó español neutro y readable para público eclesial.
  - Se evitó 'SEÑOR' u otro masking porque no aparece el Tetragrámaton en este versículo.
  - Se mantuvo una estructura simple de cambio de estado con 'se volvieron' para reflejar el giro narrativo.
  - Se eligió 'lana' por el contexto inmediato de ovejas, pero sin ampliar la imagen más allá de lo que el texto permite.
