  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'el Señor' es adecuado aquí porque el source/POB usa un título, no el nombre divino Yahvé. 'ovejas', 'espada' y 'casa' preservan correctamente la imaginería. Se mantiene 'convocadas' por el matiz formal de ተጸውዑ.
