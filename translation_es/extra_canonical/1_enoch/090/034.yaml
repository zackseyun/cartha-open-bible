translation:
  language: es
  text: Y vi hasta que dejaron a un lado aquella espada que había sido dada a las ovejas, y la llevaron a la casa y la sellaron en presencia[a] del Señor; y todas las ovejas fueron convocadas a esa casa[b][c], y esa casa no las contenía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Delante del rostro del Señor'' es un giro literal semítico que expresa ''en la presencia del Señor''.'
    reason: lexical_alternative
  - marker: b
    text: La frase final probablemente significa que la casa no podía contener a todas las ovejas.
    reason: lexical_alternative
  - marker: c
    text: En la visión, 'la casa' puede evocar el templo o la morada escatológica del pueblo de Dios, pero el texto solo dice 'casa'.
    reason: cultural_note
lexical_decisions:
- source_word: አሰከብዎ
  english_pob_choice: they laid aside
  chosen_spanish: dejaron a un lado
  alternatives_spanish:
  - la pusieron aparte
  - la depositaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez sugiere poner algo en reposo o apartarlo; 'dejaron a un lado' conserva la idea de apartar el arma sin volverla menos concreta.
- source_word: ሰይፍ
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - arma
  - hoja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el objeto concreto de la visión apocalíptica y su fuerza simbólica.
- source_word: ተውህበ
  english_pob_choice: had been given
  chosen_spanish: había sido dada
  alternatives_spanish:
  - fue dada
  - había sido entregada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pluscuamperfecto expresa bien la secuencia retrospectiva de la visión y el carácter pasivo de la acción.
- source_word: አባግዕ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  - borregas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imaginería animal del Apocalipsis de las Bestias, que representa grupos humanos.
- source_word: አግብእዎ ውስተ ቤት
  english_pob_choice: they brought it into the house
  chosen_spanish: la llevaron a la casa
  alternatives_spanish:
  - la condujeron a la casa
  - la transportaron a la casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el audit trail inglés dice 'brought it', el contexto y la revisión reconocen el matiz de retorno; en español, 'la llevaron a la casa' es natural y fiel sin añadir sobreinterpretación. No se incorpora 'de vuelta' porque la revisión inglesa lo eliminó como adición no sustentada en el texto final.
- source_word: ኀተማ እምቅድመ ገጹ ለእግዚእ
  english_pob_choice: sealed it up before the face of the Lord
  chosen_spanish: la sellaron delante del rostro del Señor
  alternatives_spanish:
  - la sellaron en la presencia del Señor
  - la sellaron ante el Señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Delante del rostro del Señor'' conserva el giro semítico de presencia solemne; ''rostro'' evita suavizar la expresión y mantiene la literalidad idiomática.'
- source_word: ተጸውዑ
  english_pob_choice: were summoned
  chosen_spanish: fueron convocadas
  alternatives_spanish:
  - fueron llamadas
  - se reunieron por convocatoria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Convocadas'' conserva el matiz formal y ceremonial del llamado, más preciso que un simple ''llamadas''.'
- source_word: ወኢያገምሮሙ
  english_pob_choice: it did not contain them
  chosen_spanish: no las contenía
  alternatives_spanish:
  - no podía contenerlas
  - no les cabían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La negación expresa incapacidad de contener; 'no las contenía' preserva la formulación directa sin expandirla.
theological_decisions:
- issue: Rendering of ለእግዚእ in a visionary Enochic setting
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Amo
  - el Dueño
  rationale: Se sigue la decisión inglesa de traducir el título divino con una forma reverente y reconocible en español, sin introducir cristología específica ni transliteración.
  doctrine_reference: Translate titles rather than transliterate names; preserve reverent divine reference.
- issue: House imagery in the symbolic vision
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - la morada
  rationale: El ge'ez dice simplemente 'casa'; se preserva la imagen sin resolverla interpretativamente. El posible valor simbólico queda implícito, no explicitado.
  doctrine_reference: Preserve theological tension rather than resolving symbolism in the main text.
translation_notes:
  revision_awareness: La revisión más reciente corrigió la adición injustificada de 'de vuelta' y 'arriba' en inglés. Por eso el español evita añadir equivalentes como 'de vuelta' o 'aparte' con valor interpretativo excesivo, aunque sí conserva la naturalidad requerida por el español. También incorpora el cierre 'no las contenía' en línea con la lectura final auditada.
  spanish_consistency_notes:
  - Se usa 'Señor' para ለእግዚእ, siguiendo la convención del proyecto para títulos divinos.
  - Se mantiene 'casa' en lugar de 'templo' para no sobreinterpretar la imagen.
  - Se conserva el plural femenino 'las' por concordancia con 'ovejas'.
  - Se evita 'Cristo' porque el pasaje no presenta un uso cristológico del título divino.
