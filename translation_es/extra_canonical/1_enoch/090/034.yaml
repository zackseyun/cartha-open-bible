base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/034.yaml
  text: And I saw until they laid aside that sword which had been given to the sheep[a], and they brought it into the house and sealed it before the face of the Lord; and all the sheep were summoned into that house[e][d][c][b], and it did not contain them.
  footnotes:
  - marker: a
    text: '''Before the face of the Lord'' is a literal idiom meaning ''in the Lord''s presence.'''
    reason: lexical_alternative
  - marker: b
    text: The final clause likely means that the house could not contain all the sheep.
    reason: lexical_alternative
  - marker: c
    text: In the vision's symbolism, 'the house' may evoke the temple or the eschatological dwelling of God's people, but the text itself says only 'house.'
    reason: cultural_note
  - marker: d
    text: Or 'they brought it'.
    reason: previous_rendering
  - marker: e
    text: Or 'it was not enough to hold them'.
    reason: previous_rendering
