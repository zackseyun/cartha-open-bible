translation:
  language: es
  text: Y aquellos pastores[a] fueron juzgados y fueron hallados pecadores[b], y fueron arrojados a aquel abismo de fuego[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El geez ኖላዊያን (nolawiyan) designa a «los pastores», en referencia a los setenta pastores angélicos de la Apocalipsis Animal (cf. 1 Enoc 90:22). Una revisión de nivel 3 corrigió una lectura OCR previa que identificaba erróneamente este término como «elefantes» y leía ወዝኩ como el verbo «y vi» en lugar del demostrativo «y aquellos».
    reason: textual_variant
  - marker: b
    text: O «fueron declarados culpables»; la frase geez ወኮኑ ኃጥኣነ puede funcionar en este contexto como declaración judicial de culpabilidad más que como descripción de estado moral.
    reason: lexical_alternative
  - marker: c
    text: 'Lectura anterior a la revisión de nivel 3: «Y vi que aquellos elefantes fueron juzgados y se convirtieron en pecadores, y fueron arrojados a aquel profundo abismo de fuego».'
    reason: source_note
lexical_decisions:
- source_word: ወዝኩ ኖላዊያን
  english_pob_choice: those shepherds
  chosen_spanish: aquellos pastores
  alternatives_spanish:
  - los pastores
  - esos pastores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión de nivel 3 estableció que ወዝኩ es demostrativo («y aquellos»), no el verbo «y vi» (ወርኢኩ), y que ኖላዊያን significa «pastores», no «elefantes». «Aquellos pastores» preserva la fuerza demostrativa y señala el referente específico: los setenta pastores angélicos mencionados en v. 22. Se prefiere «aquellos» sobre «esos» por su registro más solemne en contexto apocalíptico.'
- source_word: ተኰነኑ
  english_pob_choice: were judged
  chosen_spanish: fueron juzgados
  alternatives_spanish:
  - fueron condenados
  - fueron sentenciados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Pasivo judicial que preserva la ambigüedad entre veredicto y sentencia. «Fueron condenados» resolvería la tensión prematuramente; «fueron juzgados» mantiene el proceso judicial abierto, en consonancia con la escena de tribunal apocalíptico.
- source_word: ወኮኑ ኃጥኣነ
  english_pob_choice: were found to be sinners
  chosen_spanish: fueron hallados pecadores
  alternatives_spanish:
  - fueron declarados culpables
  - resultaron ser pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión de nivel 3 corrigió la lectura anterior («se convirtieron en pecadores») al constatar que en contexto judicial ወኮኑ ኃጥኣነ equivale a una declaración de culpabilidad. «Fueron hallados pecadores» reproduce el verbo de constatación judicial («hallados») y el término moral-religioso geez ኃጥኣነ («pecadores»). «Fueron declarados culpables» desplazaría el registro hacia lo jurídico puro, perdiendo la carga teológico-moral; queda como alternativa en nota.
- source_word: ወተወድዩ
  english_pob_choice: were cast
  chosen_spanish: fueron arrojados
  alternatives_spanish:
  - fueron lanzados
  - fueron echados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Pasivo de expulsión forzosa. «Fueron arrojados» es vívido y digno sin resultar hiperbólico; «fueron lanzados» tiene connotaciones más físicas, y «fueron echados» puede sonar coloquial en español neutro formal.
- source_word: ውስተ'ዛ ማዕምቀ እሳት
  english_pob_choice: into that abyss of fire
  chosen_spanish: a aquel abismo de fuego
  alternatives_spanish:
  - en aquel abismo de fuego
  - al abismo de fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión de nivel 3 eliminó el adjetivo «profundo» por redundante (ማዕምቀ ya contiene la idea de profundidad/abismo). El demostrativo geez se reproduce con «aquel» para mantener la referencia a un lugar específico evocado en la visión. La preposición «a» (dirección) es más natural que «en» (lugar de reposo) dado el movimiento verbal «fueron arrojados».
theological_decisions:
- issue: 'Referente simbólico: ¿«pastores» o «elefantes»?'
  english_pob_reading: those shepherds
  chosen_spanish_reading: aquellos pastores
  alternative_spanish_readings:
  - aquellos elefantes
  rationale: La revisión de nivel 3 (adjudicador Gemini, confianza 1.0) estableció que ኖላዊያን designa «pastores» —los setenta ángeles-pastores de la Apocalipsis Animal— y no «elefantes». El geez ኖላዊያን (nolawiyan) es el término técnico para estos agentes angélicos en 1 Enoc 89–90. La traducción española sigue el texto corregido.
  doctrine_reference: 'Filosofía del POB: primacía del texto en lengua original; no perpetuar errores de OCR ni aplanar la imaginería apocalíptica.'
- issue: 'ወኮኑ ኃጥኣነ: declaración moral o jurídica'
  english_pob_reading: were found to be sinners
  chosen_spanish_reading: fueron hallados pecadores
  alternative_spanish_readings:
  - fueron declarados culpables
  - se hallaron culpables
  rationale: 'El POB inglés preserva la tensión entre el sentido moral («pecadores») y el judicial («hallados»). El español «fueron hallados pecadores» reproduce esa doble carga: «hallados» aporta el matiz de verificación o veredicto, mientras «pecadores» mantiene el peso teológico-moral de ኃጥኣነ. Resolver la tensión a favor de una lectura puramente jurídica empobrecería el texto.'
  doctrine_reference: 'Principio del POB: preservar la tensión teológica antes que resolverla.'
translation_notes:
  revision_awareness: 'La revisión de nivel 3 (adjudicador Gemini-3.1-pro-preview, 2026-04-22, confianza 1.0) realizó cuatro correcciones al texto inglés de base: (1) ወዝኩ pasa de verbo «y vi» a demostrativo «y aquellos»; (2) ኖላዊያን pasa de «elefantes» a «pastores»; (3) ወኮኑ ኃጥኣነ pasa de «se convirtieron en pecadores» a «fueron hallados pecadores», reflejando el uso judicial del contexto; (4) se elimina «profundo» de «abismo de fuego» por redundante con ማዕምቀ. El borrador español sigue íntegramente el texto inglés post-revisión y refleja estas correcciones en las decisiones léxicas y en la nota [a].'
  spanish_consistency_notes:
  - «Pastores» para ኖላዊያን (nolawiyan) en contexto de la Apocalipsis Animal; diferente de términos para ángeles en general.
  - «Abismo de fuego» para ማዕምቀ እሳት, sin añadir «profundo», en concordancia con la corrección de la revisión de nivel 3.
  - «Fueron hallados pecadores» para ወኮኑ ኃጥኣነ en contexto judicial; coherente con el tratamiento de la misma frase en 90:24 según el adjudicador.
  - «Fueron arrojados» para ወተወድዩ; mantiene el registro apocalíptico sin hipérbole.
  - No interviene la terminología YHWH/Mesías/Espíritu en este versículo; no se requieren notas de terminología teológica del proyecto.
