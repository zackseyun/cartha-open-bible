  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/011.yaml
  text: And with that[a], all those eagles and vultures and ravens and kites kept snatching away the sheep even until now, and swooping down upon them and devouring them; but the sheep remained silent[e][d][c][b], and the rams lamented and cried out.
  footnotes:
  - marker: a
    text: The bird names are rendered as distinct kinds of predatory/scavenging birds to preserve the vision's concrete animal imagery; some individual identifications remain uncertain.
    reason: lexical_alternative
  - marker: b
    text: 'The wording presents a tension: the sheep are said to be silent, yet also to cry out and lament. The translation preserves both elements rather than smoothing the line.'
    reason: textual_variant
  - marker: c
    text: Or 'kites and ravens'.
    reason: previous_rendering
  - marker: d
    text: Or 'trampling on them'.
    reason: previous_rendering
  - marker: e
