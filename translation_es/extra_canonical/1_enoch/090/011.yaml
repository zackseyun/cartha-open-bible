translation:
  language: es
  text: Y con eso[a], todas aquellas águilas, buitres, cuervos y milanos siguieron arrebatando las ovejas hasta ahora, y lanzándose sobre ellas y devorándolas; pero las ovejas permanecieron en silencio, y los carneros lamentaron y gritaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres de las aves se mantienen como tipos concretos de aves depredadoras o carroñeras para preservar la imaginería animal de la visión; algunas identificaciones individuales siguen siendo inciertas.
    reason: lexical_alternative
lexical_decisions:
- source_word: አንስርት
  english_pob_choice: eagles
  chosen_spanish: águilas
  alternatives_spanish:
  - aves de rapiña
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva una especie concreta de ave rapaz, como hace el POB inglés, sin generalizar la imagen apocalíptica.
- source_word: አውስት
  english_pob_choice: vultures
  chosen_spanish: buitres
  alternatives_spanish:
  - águilas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la distinción entre esta ave carroñera y las águilas del comienzo de la lista.
- source_word: ቋዓት
  english_pob_choice: kites
  chosen_spanish: milanos
  alternatives_spanish:
  - halcones
  - gavilanes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Milanos'' preserva la idea de un ave rapaz más pequeña y evita precisar más de lo que permite el ge''ez.'
- source_word: ሆባይ
  english_pob_choice: ravens
  chosen_spanish: cuervos
  alternatives_spanish:
  - cornejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cuervos'' da una imagen natural en español y corresponde a un ave oscura y carroñera en el catálogo de la visión.'
- source_word: ይመስጥዎሙ
  english_pob_choice: kept snatching away
  chosen_spanish: siguieron arrebatando
  alternatives_spanish:
  - siguieron quitándolas
  - las iban arrebatando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa acción continua y violenta, como el imperfectivo del original y la decisión inglesa de continuidad.
- source_word: ይሰርሩ ዲቤሆሙ
  english_pob_choice: swooping down upon them
  chosen_spanish: lanzándose sobre ellas
  alternatives_spanish:
  - abatíendose sobre ellas
  - arremetiendo contra ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo describe el descenso/embate de las aves sobre las ovejas; 'lanzándose sobre ellas' evita el falso sentido de pisarlas y conserva el movimiento agresivo.
- source_word: ይበልዕዎሙ
  english_pob_choice: devouring them
  chosen_spanish: devorándolas
  alternatives_spanish:
  - comiéndolas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Devorar'' mantiene la violencia de la imagen mejor que el simple ''comer''.'
- source_word: ያረምሙ
  english_pob_choice: remained silent
  chosen_spanish: permanecieron en silencio
  alternatives_spanish:
  - guardaron silencio
  - quedaron mudas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el estado de silencio con un español natural y solemne.
- source_word: ይቤላት የአወይዉ ወይጸርኁ
  english_pob_choice: the rams lamented and cried out
  chosen_spanish: los carneros lamentaron y gritaron
  alternatives_spanish:
  - los carneros se lamentaron y clamaron
  - los carneros gemían y clamaban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez nombra explícitamente a los carneros en este final; la traducción debe atribuirles la lamentación y el clamor, sin trasladarlo a las ovejas.
theological_decisions:
- issue: Tensión entre el silencio de las ovejas y el llanto posterior
  english_pob_reading: The English POB preserves a tension, but the final clause attributes lament and cry to the rams, not the sheep.
  chosen_spanish_reading: 'Se mantiene la secuencia tal como está: las ovejas permanecen en silencio, y los carneros lamentan y gritan.'
  alternative_spanish_readings:
  - Las ovejas permanecieron en silencio, aunque los carneros lamentaban y gritaban.
  - Las ovejas permanecieron mudas y los carneros clamaron.
  rationale: La lectura ge'ez, según el control de revisión, distingue claramente entre ovejas y carneros; por eso no se debe suavizar ni trasladar el lamento a las ovejas. La traducción conserva ambas afirmaciones sin crear una contradicción artificial.
  doctrine_reference: Translation philosophy §Preserve textual distinctions and avoid harmonizing away the source
translation_notes:
  revision_awareness: 'El control de revisión indicó dos correcciones mayores respecto del borrador inglés previo: (1) el orden correcto de las aves es ''cuervos'' para ቋዓት y ''milanos'' para ሆባይ; (2) el verbo debe expresar el descenso/agresión de las aves, no ''trampling''. También señaló que la lamentación final corresponde a los carneros (ይቤላት), no a las ovejas; por eso se eliminó cualquier formulación que atribuya el llanto a las ovejas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica aquí; no hay tetragrámaton en este versículo.
  - Se prefieren nombres concretos de aves en lugar de un genérico 'aves de rapiña', en línea con el POB inglés.
  - Se conserva el contraste entre 'ovejas' y 'carneros' para respetar la distinción del texto ge'ez.
  - Se evita 'pisoteando' o 'trampeando', porque la revisión textual favorece un movimiento de ataque aéreo, no de pisoteo.
