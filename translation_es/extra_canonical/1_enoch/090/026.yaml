base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/026.yaml
  text: And I saw at that time that a similar deep abyss was opened in the middle of the earth[a], full of fire; and they brought those blinded sheep, and all of them were judged and were found to be sinners, and they were cast into that deep abyss of fire, and they burned[f][e][d][c][b]. And this abyss came to be at the right side of that house.
  footnotes:
  - marker: a
    text: Or 'a deep pit.' The Ge'ez term denotes a great depth; 'abyss' is chosen to preserve the apocalyptic setting.
    reason: lexical_alternative
  - marker: b
    text: '''Those blinded sheep'' continues the Animal Apocalypse''s symbolic imagery; the sheep represent people within the vision rather than literal animals.'
    reason: cultural_note
  - marker: c
    text: The clause 'were judged and became sinners' is rendered closely. It may mean that judgment exposed them as guilty, rather than that they then began to sin.
    reason: alternative_reading
  - marker: d
    text: Or 'a deep abyss was opened'.
    reason: previous_rendering
  - marker: e
    text: Or 'became sinners'.
    reason: previous_rendering
  - marker: f
    text: Or 'And that abyss'.
    reason: previous_rendering
