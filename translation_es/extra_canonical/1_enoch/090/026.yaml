translation:
  language: es
  text: Y vi en aquel tiempo que se abrió en medio de la tierra un abismo profundo semejante[a], lleno de fuego; y trajeron a aquellas ovejas cegadas, y todas fueron juzgadas y fueron halladas pecadoras, y fueron arrojadas a ese abismo profundo de fuego, y ardieron. Y este abismo quedó al lado derecho de aquella casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un foso profundo». El término ge''ez expresa gran profundidad; se prefiere «abismo» para conservar el tono apocalíptico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ተርኅወ፡
  english_pob_choice: was opened
  chosen_spanish: se abrió
  alternatives_spanish:
  - fue abierto
  - se descubrió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, la pasiva refleja transmite bien la apertura súbita de la visión apocalíptica sin volver la frase pesada. Mantiene el valor pasivo del ge'ez y la escena de revelación repentina.
- source_word: ከማሁ
  english_pob_choice: similar
  chosen_spanish: semejante
  alternatives_spanish:
  - similar
  - igual
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El comparativo indica que este abismo guarda correspondencia con el anterior, no identidad absoluta. 'Semejante' conserva esa relación sin borrar la conexión ya observada por el auditor inglés.
- source_word: ማዕምቅ
  english_pob_choice: deep abyss
  chosen_spanish: abismo
  alternatives_spanish:
  - profundidad
  - foso
  - abismo profundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Abismo'' conserva el tono apocalíptico. El adjetivo ''deep'' queda absorbido por el campo semántico del sustantivo en español, por lo que añadir ''profundo'' resultaría redundante y menos natural.'
- source_word: ምሉዕ እሳተ
  english_pob_choice: full of fire
  chosen_spanish: lleno de fuego
  alternatives_spanish:
  - colmado de fuego
  - lleno de llamas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lleno de fuego'' reproduce de forma directa la imagen concreta y el uso colectivo/singulativo del ge''ez. ''Llamas'' intensifica, pero cambia ligeramente la imagen.'
- source_word: አምጽእዎሙ
  english_pob_choice: they brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - los trajeron
  - los llevaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Trajeron'' conserva la acción de hacer venir a las ovejas sin introducir agentes explícitos que el texto no nombra. En español fluye con la secuencia judicial del versículo.'
- source_word: እልኩ አባግዕ ጽዑላነ
  english_pob_choice: those blinded sheep
  chosen_spanish: aquellas ovejas cegadas
  alternatives_spanish:
  - aquellas ovejas ciegas
  - aquellas ovejas que habían sido cegadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cegadas'' preserva la idea de una condición producida, no simplemente una incapacidad natural. Mantiene el simbolismo del Apocalipsis de los Animales sin explicitar de más la metáfora.'
- source_word: ተኰነኑ
  english_pob_choice: were judged
  chosen_spanish: fueron juzgadas
  alternatives_spanish:
  - fueron condenadas
  - fueron sentenciadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo es judicial y 'juzgadas' conserva la secuencia formal del texto. 'Condenadas' sería más específico, pero adelanta un resultado que el verso desarrolla en pasos posteriores.
- source_word: ኃጥኣነ
  english_pob_choice: sinners
  chosen_spanish: pecadoras
  alternatives_spanish:
  - pecadores
  - culpables
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El femenino concuerda con 'ovejas' en español y mantiene el valor nominal de pertenencia al pecado. 'Culpables' suaviza la carga moral; 'pecadoras' la conserva con más fidelidad narrativa.
- source_word: ተወድዩ
  english_pob_choice: were cast
  chosen_spanish: fueron arrojadas
  alternatives_spanish:
  - fueron echadas
  - fueron lanzadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Arrojadas'' mantiene la solemnidad de la acción pasiva y el sentido de expulsión violenta. En español suena más fuerte y más literario que ''echadas''.'
- source_word: ውዕዩ
  english_pob_choice: they burned
  chosen_spanish: ardieron
  alternatives_spanish:
  - se quemaron
  - fueron quemadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Ardieron'' reproduce la forma breve y activa de la escena. Evita añadir un agente causal que el texto no menciona y conserva el efecto apocalíptico concentrado.'
- source_word: በየማኑ ለዝኩ ቤት
  english_pob_choice: at the right side of that house
  chosen_spanish: al lado derecho de aquella casa
  alternatives_spanish:
  - a la derecha de aquella casa
  - del lado derecho de aquella casa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Al lado derecho'' expresa bien el valor espacial concreto del ge''ez y suena natural en español. ''Aquella casa'' mantiene la distancia demostrativa del original, tal como distingue la visión entre ''este'' abismo y ''aquella'' casa.'
theological_decisions:
- issue: Si la relación entre este abismo y el anterior debe conservarse explícitamente
  english_pob_reading: a similar deep abyss
  chosen_spanish_reading: un abismo semejante
  alternative_spanish_readings:
  - un abismo parecido
  - otro abismo profundo
  rationale: El ge'ez incluye una comparación explícita (ከማሁ), por lo que conviene conservarla. 'Semejante' evita borrar esa correspondencia apocalíptica entre escenas consecutivas.
  doctrine_reference: Consistencia de la imaginería apocalíptica y preservación de relaciones intertextuales.
- issue: Cómo traducir la cláusula judicial 'were judged and were found to be sinners'
  english_pob_reading: were judged and were found to be sinners
  chosen_spanish_reading: fueron juzgadas y fueron halladas pecadoras
  alternative_spanish_readings:
  - fueron juzgadas y se comprobó que eran pecadoras
  - fueron condenadas como pecadoras
  rationale: 'La secuencia mantiene dos actos distintos: juicio y constatación del estado moral. ''Halladas pecadoras'' preserva la tensión de que el juicio revela/declara su culpa, en vez de convertir el verso en una paráfrasis más cerrada.'
  doctrine_reference: Preservar la tensión lexical y judicial sin resolverla artificialmente.
- issue: Cómo reflejar el simbolismo de las ovejas dentro del Apocalipsis de los Animales
  english_pob_reading: those blinded sheep
  chosen_spanish_reading: aquellas ovejas cegadas
  alternative_spanish_readings:
  - aquellas ovejas ciegas
  - aquellas ovejas que habían sido cegadas
  rationale: '''Cegadas'' sugiere una condición impuesta dentro de la visión simbólica y no solo una discapacidad física. Así se conserva el carácter alegórico sin explicarlo en exceso.'
  doctrine_reference: Respeto del lenguaje simbólico original y de su carga narrativa.
translation_notes:
  revision_awareness: La redacción sigue el pasaje etíope recuperado y el audit trail inglés, incorporando la revisión que restituye la comparación explícita ('semejante') y el sentido judicial de 'halladas pecadoras' sin mecanizar desde el inglés. También se mantiene la distinción demostrativa entre 'este abismo' y 'aquella casa', aunque en español se optó por una formulación más natural ('al lado derecho') en vez de una calca rígida.
  spanish_consistency_notes:
  - Se preserva 'abismo' como término apocalíptico principal, en línea con la decisión inglesa.
  - Se mantiene el contraste demostrativo este/aquella para reflejar la oposición proximal/distal del original.
  - El género femenino de 'ovejas' exige concordancia en 'juzgadas', 'halladas' y 'arrojadas'.
  - No se añadió 'profundo' al sustantivo para evitar redundancia y respetar la intensidad ya contenida en 'abismo'.
