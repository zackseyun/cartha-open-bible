- from: Y vi en aquel tiempo que se abrió en medio de la tierra un abismo semejante[a], lleno de fuego; y trajeron a aquellas ovejas cegadas, y todas fueron juzgadas y fueron halladas pecadoras, y fueron arrojadas a ese abismo de fuego, y ardieron. Y este abismo quedó al lado derecho de aquella casa.
  to: Y vi en aquel tiempo que se abrió en medio de la tierra un abismo profundo semejante[a], lleno de fuego; y trajeron a aquellas ovejas cegadas, y todas fueron juzgadas y fueron halladas pecadoras, y fueron arrojadas a ese abismo profundo de fuego, y ardieron. Y este abismo quedó al lado derecho de aquella casa.
