review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia principal del ge''ez y sigue de cerca la auditoría inglesa: se conserva la apertura del abismo, la comparación con uno previo, la plenitud de fuego, la llegada de las ovejas cegadas, la secuencia judicial, su lanzamiento al abismo y la ubicación respecto de la casa. Sin embargo, omite en el texto principal el matiz de profundidad de ማዕምቅ, que el inglés preserva como ''deep abyss'' y que además queda explícitamente apoyado por la nota inglesa. También la nota a en español cambia indebidamente la alternativa inglesa: presenta ''un abismo profundo'' como alternativa, cuando la nota inglesa dice que una alternativa es ''a deep pit''.'
  spanish_quality_summary: 'El español es claro, digno y natural. ''Ovejas cegadas'', ''fueron juzgadas'', ''fueron halladas pecadoras'' y ''ardieron'' funcionan bien. ''Quedó al lado derecho'' es comprensible, aunque ''vino a estar a la derecha'' o ''quedó a la derecha'' serían también posibles; no es necesario cambiarlo. La reparación principal es léxica: conviene incluir ''profundo'' en el texto para no perder fuerza semántica del original y del POB inglés.'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Las decisiones judiciales y apocalípticas están bien alineadas. La principal desalineación es con la decisión léxica documentada para ማዕምቅ ('deep abyss'), que en español quedó reducida a 'abismo'. Además, la nota debe alinearse con la alternativa documentada 'foso profundo', no con 'abismo profundo'.
  issues:
  - severity: medium
    issue: Falta en el texto principal el matiz de profundidad de ማዕምቅ.
    rationale: El original y la auditoría inglesa preservan 'deep abyss'. En español, 'abismo' por sí solo no comunica necesariamente la intensificación presente en el término; 'abismo profundo' suena natural aquí y conserva mejor la fuerza apocalíptica.
  - severity: medium
    issue: La nota [a] no reproduce fielmente la alternativa léxica documentada en inglés.
    rationale: La nota inglesa ofrece 'a deep pit' como alternativa. La nota española dice 'un abismo profundo', que no es realmente una alternativa distinta al texto sino una variación interna. 'Un foso profundo' o 'una fosa profunda' reflejaría mejor la nota auditada.
  revised_spanish_text: Y vi en aquel tiempo que se abrió en medio de la tierra un abismo profundo semejante[a], lleno de fuego; y trajeron a aquellas ovejas cegadas, y todas fueron juzgadas y fueron halladas pecadoras, y fueron arrojadas a ese abismo profundo de fuego, y ardieron. Y este abismo quedó al lado derecho de aquella casa.
  revised_footnotes:
  - marker: a
    text: 'O: «un foso profundo». El término ge''ez expresa gran profundidad; se prefiere «abismo» para conservar el tono apocalíptico.'
    reason: lexical_alternative
  revision_rationale: Se añade 'profundo' en ambas menciones de 'abismo' para preservar la fuerza de ማዕምቅ tal como la conserva la auditoría inglesa ('deep abyss'). También se corrige la nota léxica para que la alternativa refleje fielmente la documentada en inglés ('deep pit' → 'foso profundo') en vez de repetir prácticamente la redacción principal.
