revisions:
- from: Y después de eso vi en mi visión a todas las aves del cielo llegando —águilas[a], buitres, milanos y cuervos—, y las águilas guiaban a todas las aves. Y comenzaron a devorar a aquellas ovejas[b][c], a sacarles los ojos y a devorar su carne.
  to: Y después de eso vi en mi visión a todas las aves del cielo que venían —águilas[a], buitres, milanos y cuervos—, y las águilas guiaban a todas las aves. Y comenzaron a devorar a aquellas ovejas[b][c], a arrancarles los ojos y a devorar su carne.
  rationale: 'Se proponen ajustes menores pero necesarios: 1) reemplazar ‘llegando’ por ‘que venían’ para un español más natural y fiel al movimiento narrativo; 2) fortalecer la violencia de la acción con ‘arrancarles los ojos’; 3) corregir la nota c para que refleje exactamente la alternativa/lectura previa documentada en la auditoría inglesa, incluyendo el quinto elemento ‘águilas’. No se requiere nueva adjudicación porque los cambios son claros y de bajo riesgo.'
