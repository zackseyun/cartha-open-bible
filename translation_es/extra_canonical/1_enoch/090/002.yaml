  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/002.yaml
  text: And after that I saw in my vision all the birds of heaven coming—eagles[a], vultures, kites, and ravens—and the eagles led all the birds. And they began to devour those sheep[c][b], and to peck out their eyes and devour their flesh.
  footnotes:
  - marker: a
    text: The bird list contains some lexical uncertainty in English taxonomy; the Ge'ez names denote predatory birds and corvids, and some could be rendered differently (for example, 'hawks' instead of 'kites,' or 'crows' instead of 'ravens').
    reason: lexical_alternative
  - marker: b
    text: The opening of the attack may also be understood as 'they seized them and devoured them,' depending on how the verbal sequence is construed.
    reason: lexical_alternative
  - marker: c
    text: Or 'eagles, vultures, kites, ravens, and eagles—and they led all the birds.'.
