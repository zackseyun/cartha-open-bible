translation:
  language: es
  text: Y después de eso vi en mi visión a todas las aves del cielo que venían —águilas[a], buitres, milanos y cuervos—, y las águilas guiaban a todas las aves. Y comenzaron a devorar a aquellas ovejas[b][c], a arrancarles los ojos y a devorar su carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El listado de aves admite cierta incertidumbre léxica; los nombres ge’ez designan aves rapaces y córvidos, y algunos podrían verterse de otra manera (por ejemplo, ‘halcones’ en lugar de ‘milanos’ o ‘cornejas’ en lugar de ‘cuervos’).
    reason: lexical_alternative
  - marker: b
    text: El inicio del ataque también puede entenderse como ‘se apoderaron de ellas y las devoraron’, según cómo se lea la secuencia verbal.
    reason: lexical_alternative
  - marker: c
    text: 'O bien: ‘águilas, buitres, milanos, cuervos y águilas; y ellos guiaban a todas las aves’.'
    reason: previous_rendering
lexical_decisions:
- source_word: ርኢኩ በራእየየ
  english_pob_choice: I saw in my vision
  chosen_spanish: vi en mi visión
  alternatives_spanish:
  - vi en la visión
  - miré en mi visión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el marco visionario explícito del Ge'ez y el valor posesivo de la expresión, con una formulación natural en español.
- source_word: ኵሉ አዕዋፈ ሰማይ
  english_pob_choice: all the birds of heaven
  chosen_spanish: todas las aves del cielo
  alternatives_spanish:
  - todas las aves del cielo
  - toda ave del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Aves del cielo’ mantiene el registro elevado de ‘birds of heaven’ sin sonar forzado en español; se eligió el plural por concordancia con el contexto.
- source_word: አንስርት
  english_pob_choice: eagles
  chosen_spanish: águilas
  alternatives_spanish:
  - aves rapaces
  - halcones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el uso bíblico etiópico suele corresponder a ‘águilas’; se conserva esa identificación tradicional y el valor de ave rapaz principal.
- source_word: አውስት
  english_pob_choice: vultures
  chosen_spanish: buitres
  alternatives_spanish:
  - zopilotes
  - aves carroñeras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Buitres’ expresa bien la carga carroñera y amenazante del catálogo de aves predadoras.
- source_word: ሆባይ
  english_pob_choice: kites
  chosen_spanish: milanos
  alternatives_spanish:
  - halcones
  - gavilanes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Milanos’ es una equivalencia natural en español para un ave rapaz menor, sin forzar una identificación más específica de la que admite el término.
- source_word: ቋዓት
  english_pob_choice: ravens
  chosen_spanish: cuervos
  alternatives_spanish:
  - cuervos negros
  - cornejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Cuervos’ es la equivalencia directa y mantiene el tono ominoso de la lista; en español la distinción entre cuervo y corneja no es necesaria aquí.
- source_word: ይመረሕዎሙ ለኵሎሙ አዕዋፍ
  english_pob_choice: they led all the birds
  chosen_spanish: las águilas guiaban a todas las aves
  alternatives_spanish:
  - las águilas conducían a todas las aves
  - las águilas encabezaban a todas las aves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada muestra que el sujeto explícito es la segunda mención de ‘águilas’; ‘guiaban’ conserva el matiz de dirigir/encabezar sin sobreinterpretar.
- source_word: አኃዙ ይብልዕዎሙ
  english_pob_choice: they began to devour
  chosen_spanish: comenzaron a devorar
  alternatives_spanish:
  - se pusieron a devorar
  - empezaron a devorar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción indica inicio de la acción violenta; ‘comenzaron a devorar’ reproduce bien el aspecto inceptivo y el tono brutal.
- source_word: ዝኩ አባግዕ
  english_pob_choice: those sheep
  chosen_spanish: aquellas ovejas
  alternatives_spanish:
  - esas ovejas
  - aquellas ovejas de entonces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Aquellas’ conserva la distancia narrativa del demostrativo y ‘ovejas’ es el equivalente natural y ya consolidado en esta alegoría.
- source_word: ይክረዩ አዕይንቲሆሙ
  english_pob_choice: to peck out their eyes
  chosen_spanish: a sacarles los ojos
  alternatives_spanish:
  - a arrancarles los ojos
  - a picotearles los ojos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el motivo literal es aviar, en español ‘sacarles los ojos’ comunica con claridad la violencia concreta sin sonar extraño; ‘picotearles los ojos’ sería más literal pero menos natural.
- source_word: ይበልዕዎሙ ለሥጋሆሙ
  english_pob_choice: devour their flesh
  chosen_spanish: devorar su carne
  alternatives_spanish:
  - comer su carne
  - consumir su carne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Carne’ preserva la equivalencia normal de σάρξ/literal flesh-like violence in this context, y ‘devorar’ mantiene la repetición y el tono.
theological_decisions:
- issue: Preservación literal de la imaginería apocalíptica
  english_pob_reading: Retain the animal imagery literally in translation ('birds,' 'sheep') rather than interpretively identifying historical groups in the main text.
  chosen_spanish_reading: Conservar literalmente la imaginería animal ('aves,' 'ovejas') sin identificar en el texto principal a los grupos históricos representados.
  alternative_spanish_readings:
  - Traducir con interpretación incorporada, nombrando naciones o gobernantes
  - Parafrasear la visión como una escena histórica alegorizada
  rationale: La fuente presenta una visión alegórica, pero la traducción debe mantener la imagen y no resolver su interpretación dentro del versículo. La identificación histórica pertenece al comentario, no al texto base.
  doctrine_reference: Preservar la tensión apocalíptica en lugar de aplanarla; distinción entre texto e interpretación.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección de revisión que aclara la sintaxis del Ge''ez: la segunda mención de ‘águilas’ es el sujeto explícito de ‘guiaban’, no un quinto elemento del catálogo de aves. La redacción española refleja esa estructura y evita repetir ‘águilas’ como parte de la lista.'
  spanish_consistency_notes:
  - Se usó ‘aves del cielo’ para conservar el registro elevado del original y mantener coherencia con el estilo apocalíptico de la obra.
  - Se prefirió ‘ovejas’ y no ‘corderos’ porque el término del original apunta al grupo simbólico ya establecido en la sección.
  - ‘Devorar’ se mantuvo de forma consistente para reproducir el motivo repetido de violencia y consumo del relato.
