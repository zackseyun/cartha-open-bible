base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/028.yaml
  text: And I stood watching until that old house was folded up[a]; and they carried out all the pillars, and all the beams and ornaments of that house were folded up with it[c][b], and they carried it out and set it down in one place in the south of the land.
  footnotes:
  - marker: a
    text: Literally, 'at the right hand of the land.' In biblical-style directional language this commonly means 'to the south.'
    reason: lexical_alternative
  - marker: b
    text: The repeated verb rendered 'was folded up' may also suggest 'was wrapped up' or 'taken down'; the image is of the old structure being gathered away, not merely ruined.
    reason: lexical_alternative
  - marker: c
    text: Or 'and they carried out all its pillars and all its plants and the beams of that house were folded up with it'.
    reason: previous_rendering
