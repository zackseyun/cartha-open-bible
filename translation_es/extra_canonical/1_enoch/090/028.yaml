translation:
  language: es
  text: Y me quedé observando hasta que aquella casa antigua fue recogida[b]; y sacaron todos los pilares, y todas las plantas y las vigas de aquella casa fueron recogidas con ella[c], y la sacaron y la pusieron en un solo lugar, en el sur de la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «a la derecha de la tierra». En el lenguaje direccional bíblico esto suele significar «al sur».
    reason: lexical_alternative
  - marker: b
    text: El verbo repetido puede sugerir también «envuelta», «plegada» o «desmontada»; la imagen es la de una estructura antigua que es reunida y retirada, no solo derribada.
    reason: lexical_alternative
  - marker: c
    text: 'O: «y sacaron todos los pilares, y todos sus pilares y todas sus plantas fueron sacados, y las vigas de aquella casa fueron recogidas con ella»; el pasaje presenta dificultades de agrupación sintáctica y de matiz léxico.'
    reason: previous_rendering
lexical_decisions:
- source_word: ቆምኩ
  english_pob_choice: I stood
  chosen_spanish: me quedé
  alternatives_spanish:
  - estuve de pie
  - permanecí de pie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En una fórmula visionaria, el valor narrativo es de permanencia atenta; en español, «me quedé» comunica mejor esa continuidad que un mero «me paré». El contexto de observación justifica mantener el matiz de atención sostenida.
- source_word: አርእይ
  english_pob_choice: watching
  chosen_spanish: observando
  alternatives_spanish:
  - mirando
  - viendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La visión es progresiva y contemplativa; «observando» expresa mejor el acto continuo que «viendo», que puede sonar demasiado estático en español.
- source_word: ተጠወም
  english_pob_choice: was folded up
  chosen_spanish: fue recogida
  alternatives_spanish:
  - fue plegada
  - fue envuelta
  - fue doblada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen no es simple destrucción, sino el acto de reunir y retirar la estructura. «Recogida» transmite mejor esa acción de reunir/retirar sin perder la tensión imagética; la pasiva perifrástica respeta el proceso descrito.
- source_word: ቤት ብሉይ
  english_pob_choice: old house
  chosen_spanish: aquella casa antigua
  alternatives_spanish:
  - la casa vieja
  - aquella antigua casa
  - la casa anterior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Casa antigua» conserva el valor de ብሉይ como antigua/vieja y, con «aquella», mantiene la referencia narrativa del visionario sin forzar aún la identificación simbólica. Se preserva la ambigüedad controlada entre casa y templo.
- source_word: አውፅእዎሙ
  english_pob_choice: they carried out
  chosen_spanish: sacaron
  alternatives_spanish:
  - trajeron fuera
  - removieron
  - sacaron hacia fuera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo causativo pide una acción concreta de extracción. «Sacaron» es natural en español y suficientemente físico para el traslado de pilares y de la casa misma.
- source_word: አዕማድ
  english_pob_choice: pillars
  chosen_spanish: pilares
  alternatives_spanish:
  - columnas
  - soportes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pilares» mantiene el sentido arquitectónico concreto y armoniza con el registro visual de la escena.
- source_word: አትክልት
  english_pob_choice: plants
  chosen_spanish: plantíos
  alternatives_spanish:
  - plantas
  - vegetación
  - plantaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés revisado pasó a «ornaments», el ge'ez respalda un término de plantación/vegetación. «Plantíos» conserva esa materialidad y evita suavizarla indebidamente; además, permite mantener la tensión textual entre la lectura revisada y el dato original.
- source_word: ሤስ
  english_pob_choice: beams
  chosen_spanish: vigas
  alternatives_spanish:
  - maderos
  - madera
  - entramado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Vigas» es el equivalente arquitectónico más natural en español para los elementos estructurales de madera.
- source_word: ምስሌሁ
  english_pob_choice: with it
  chosen_spanish: con ella
  alternatives_spanish:
  - junto con ella
  - con él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Como «casa» es femenino en español, la concordancia exige «ella». El referente sigue siendo la casa que es recogida junto con sus elementos.
- source_word: ወወደይዎ
  english_pob_choice: set it down
  chosen_spanish: la pusieron
  alternatives_spanish:
  - la dejaron
  - la colocaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Después de sacarla, el gesto final es de deposición/colocación en un lugar. «Pusieron» es sobrio y claro; evita sobreespecificar el modo.
- source_word: በ፪መካን
  english_pob_choice: in one place
  chosen_spanish: en un solo lugar
  alternatives_spanish:
  - en un lugar único
  - en un lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El numeral con «lugar» indica unidad de ubicación. «En un solo lugar» conserva esa precisión y suena natural en español.
- source_word: በየማነ ምድር
  english_pob_choice: in the south of the land
  chosen_spanish: al sur de la tierra
  alternatives_spanish:
  - a la derecha de la tierra
  - en el sur de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se adopta la interpretación direccional idiomática de «derecha» como sur, tal como refleja el inglés auditado. En español, «al sur de la tierra» es claro y mantiene el sentido geográfico visionario sin introducir una expresión literal confusa.
theological_decisions:
- issue: El carácter de la «casa antigua» entre casa común y templo simbólico
  english_pob_reading: old house
  chosen_spanish_reading: aquella casa antigua
  alternative_spanish_readings:
  - el antiguo templo
  - aquella antigua casa
  rationale: El texto apocalíptico animal usa imaginería arquitectónica simbólica. Traducir solo «casa» preserva la literalidad del giro ge'ez, mientras «aquella» y «antigua» dejan abierta la resonancia cultual sin resolverla de antemano. Esto evita imponer una identificación interpretativa no explicitada por el verso aislado.
  doctrine_reference: Preservar la tensión simbólica del texto sin cerrar su referencia más allá de lo que el verso exige.
- issue: El verbo repetido de recogida/plegado y la imagen de retiro estructural
  english_pob_reading: was folded up
  chosen_spanish_reading: fue recogida / fueron recogidos
  alternative_spanish_readings:
  - fue plegada
  - fue envuelta
  - fue levantada
  rationale: El inglés POB destaca que la imagen no es mera ruina sino recolección y retiro. «Recogida» conserva esa tensión y evita reducir la escena a demolición. Al repetir la misma familia verbal para la casa y sus elementos, se mantiene el paralelismo del original.
  doctrine_reference: Mantener la imagen apocalíptica de retirada ordenada y no banalizarla como simple destrucción.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió la relación gramatical de «plants» y ajustó la formulación de la escena: el ge''ez distingue entre los pilares sacados y los plantíos/vigas recogidos con la casa. También la nota sobre el «sur» refleja el valor direccional de «a la derecha de la tierra». La versión española intenta respetar ese ajuste, sin seguir mecánicamente la redacción inglesa revisada cuando se aparta del dato ge''ez.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando corresponda en el proyecto, pero este verso no lo contiene.
  - «Casa» se conserva por fidelidad al ge'ez; no se sustituye por «templo» para no cerrar la interpretación.
  - Se eligió «plantíos» para no perder la huella del ge'ez አትክልት, aun cuando el inglés auditado propusiera otra lexicalización.
  - La coordinación de género en «con ella» y «la pusieron» responde al referente español «casa».
