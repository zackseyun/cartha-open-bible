review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la revisión auditada clave: la secuencia indica que el juicio recae primero sobre las estrellas como primer grupo juzgado, no meramente ''delante de'' ellas. También conserva adecuadamente la triple recurrencia de ''juicio'' y la imaginería del abismo lleno de fuego. Sin embargo, ''halladas culpables de ser pecadoras'' añade una formulación algo forense y pesada que no refleja con sencillez el valor de ''were found to be sinners''.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'el juicio cayó primero sobre las estrellas' suena algo idiomáticamente duro, y 'halladas culpables de ser pecadoras' resulta redundante y menos natural en español. 'Lleno de fuego y llama' es aceptable, pero conviene mantener la nota léxica ya que el segundo término no es simplemente adjetival. La sintaxis mejora con 'tuvo lugar el juicio' y 'resultaron ser pecadoras'.
  glossary_alignment: 'No hay conflicto con la terminología doctrinal central del proyecto. ''Juicio'', ''abismo'' y ''columnas de fuego'' se alinean bien con las decisiones auditadas. La excepción relevante es estilística: para አዕማደ እሳት, ''columnas de fuego'' es aceptable en español aunque el inglés use ''pillars of fire''.'
  issues:
  - severity: medium
    issue: '''el juicio cayó primero sobre las estrellas'' es poco natural'
    rationale: Aunque comunica la idea básica, en español bíblico moderno suena más idiomático 'tuvo lugar el juicio primero sobre las estrellas' o 'se llevó a cabo el juicio primero sobre las estrellas', preservando la escena judicial sin metáfora añadida.
  - severity: medium
    issue: '''halladas culpables de ser pecadoras'' sobretraduce y recarga el original'
    rationale: 'El geʽez, según la auditoría inglesa, mantiene proceso y luego estado moral: ''were found to be sinners''. En español basta ''resultaron ser pecadoras'' o ''fueron halladas pecadoras''; añadir ''culpables de ser'' duplica innecesariamente el sentido forense.'
  - severity: low
    issue: La nota c propone 'arder', forma poco natural como alternativa nominal
    rationale: Como nota léxica española, conviene explicar la imagen como 'fuego y ardor/llamear' o mantener que 'llama' busca naturalidad, sin ofrecer una alternativa menos idiomática que el propio texto.
