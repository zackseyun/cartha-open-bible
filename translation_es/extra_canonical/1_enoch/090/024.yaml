  text: And judgment took place first upon the stars[a], and they were judged and were found to be sinners, and they went to the place of judgment; and they cast them into an abyss, full of fire and flaming[c][b], and full of pillars of fire.
  footnotes:
  - marker: a
    text: The phrase 'before the stars' may also be understood as 'in the presence of the stars.' In this vision the stars are personified heavenly beings, so the wording likely carries both spatial and judicial force.
    reason: lexical_alternative
  - marker: b
    text: The repeated judgment language is kept in English ('judgment,' 'were judged,' 'place of judgment') to reflect the Ge'ez repetition rather than smoothing it away.
    reason: cultural_note
