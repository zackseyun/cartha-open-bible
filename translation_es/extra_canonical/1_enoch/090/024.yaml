revisions:
- from: Y aconteció que el juicio cayó primero sobre las estrellas[a], y fueron juzgadas y halladas culpables de ser pecadoras, y fueron al lugar del juicio; y las arrojaron a un abismo, lleno de fuego y llama[c][b], y lleno de columnas de fuego.
  to: Y tuvo lugar el juicio primero sobre las estrellas[a], y fueron juzgadas y resultaron ser pecadoras, y fueron al lugar del juicio; y las arrojaron a un abismo, lleno de fuego y llama[c][b], y lleno de columnas de fuego.
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y la fidelidad semántica del español: ''tuvo lugar el juicio'' refleja mejor la escena judicial que ''el juicio cayó'', y ''resultaron ser pecadoras'' comunica con más claridad el hallazgo moral sin añadir la sobrecarga forense de ''culpables de ser''. También se afinó la nota léxica sobre ''llama'' para evitar una alternativa española poco idiomática.'
  reviewer_model: gpt-5.4
