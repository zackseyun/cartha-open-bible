translation:
  language: es
  text: Y tuvo lugar el juicio primero sobre las estrellas[a], y fueron juzgadas y resultaron ser pecadoras, y fueron al lugar del juicio; y las arrojaron a un abismo, lleno de fuego y llama[c][b], y lleno de columnas de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Primero sobre las estrellas» sigue la revisión auditada que entiende el giro como prioridad narrativa: las estrellas son el primer grupo sometido a juicio. La formulación también conserva el matiz judicial de que el juicio recae sobre ellas.'
    reason: theological_note
  - marker: b
    text: Se conserva la repetición del lenguaje de juicio con «juicio», «fueron juzgadas» y «lugar del juicio», para no suavizar la acumulación formal del geʽez.
    reason: cultural_note
  - marker: c
    text: También podría expresarse como «lleno de fuego y ardor» o de otra forma que preserve una segunda imagen ígnea. Aquí se usa «llama» por mayor naturalidad en español, sin perder la intensificación del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condenación
  - sentencia
  - justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el marco jurídico y escatológico del pasaje sin especificar demasiado el resultado. En español, «juicio» mantiene mejor la repetición verbal y nominal del original que «condenación», que adelantaría el veredicto.
- source_word: ቅድመ እምከዋክብት
  english_pob_choice: first upon the stars
  chosen_spanish: primero sobre las estrellas
  alternatives_spanish:
  - antes de las estrellas
  - en presencia de las estrellas
  - primero acerca de las estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada indica que aquí la idea es de prioridad narrativa, no simplemente de ubicación. «Primero sobre las estrellas» preserva esa secuencia y permite entender que las estrellas son el primer grupo juzgado.
- source_word: ተኰነኑ
  english_pob_choice: were judged
  chosen_spanish: fueron juzgadas
  alternatives_spanish:
  - fueron condenadas
  - fueron llevadas a juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el proceso judicial visible y evita colapsarlo en un veredicto ya resuelto. El femenino plural concuerda con «las estrellas» en español.
- source_word: ኃጥኣነ
  english_pob_choice: sinners
  chosen_spanish: pecadoras
  alternatives_spanish:
  - pecadores
  - culpables
  - malvadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Como «estrellas» es femenino plural en español, «pecadoras» conserva la concordancia gramatical y el cargo moral del término. «Pecadores» sería menos natural en este contexto.
- source_word: ሖሩ መካነ ኵነኔ
  english_pob_choice: went to the place of judgment
  chosen_spanish: fueron al lugar del juicio
  alternatives_spanish:
  - fueron al lugar de juicio
  - fueron al lugar de condenación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen espacial y la repetición del lenguaje judicial. «Lugar del juicio» resulta más idiomático en español que una construcción demasiado literal.
- source_word: ወደይዎሙ
  english_pob_choice: they cast them
  chosen_spanish: las arrojaron
  alternatives_spanish:
  - las echaron
  - las lanzaron
  - las echaron dentro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo transmite una acción forzosa y punitiva adecuada al imaginario apocalíptico. «Arrojaron» es natural y conserva fuerza sin suavizar el acto.
- source_word: ውስተ ዕሙቅ
  english_pob_choice: into an abyss
  chosen_spanish: a un abismo
  alternatives_spanish:
  - a un abismo profundo
  - al abismo
  - a la profundidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Abismo» comunica mejor la profundidad punitiva y la resonancia apocalíptica que «profundidad». La preposición «a» evita una calca innecesaria.
- source_word: ምሉእ እሳት ወይላህብ
  english_pob_choice: full of fire and flaming
  chosen_spanish: lleno de fuego y llama
  alternatives_spanish:
  - lleno de fuego y ardor
  - lleno de fuego y arder
  - lleno de fuego y resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La duplicación de imágenes ígneas se conserva con dos sustantivos coordinados. «Llama» comunica bien el segundo término sin convertirlo en simple adjetivo.
- source_word: አዕማደ እሳት
  english_pob_choice: pillars of fire
  chosen_spanish: columnas de fuego
  alternatives_spanish:
  - pilares de fuego
  - columnas ígneas
  - pilares ígneos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Columnas» es natural en español y mantiene la imagen vertical del original. Se evita una terminología más litúrgica o simbólica que no añade claridad al pasaje.
theological_decisions:
- issue: Cómo conservar la secuencia judicial del pasaje
  english_pob_reading: 'Retain process language: ''judgment took place first upon the stars,'' ''were judged,'' then ''were found to be sinners.'''
  chosen_spanish_reading: 'Conservar el proceso: «el juicio cayó primero sobre las estrellas», «fueron juzgadas» y luego «halladas culpables de ser pecadoras».'
  alternative_spanish_readings:
  - «se dictó condenación sobre las estrellas»
  - «las estrellas fueron condenadas»
  rationale: El geʽez repite la raíz de juicio y después añade la evaluación moral. En español, mantener juicio/proceso/veredicto evita borrar la tensión entre la escena judicial y el resultado punitivo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
- issue: Cómo rendir el final punitivo sin importar un término doctrinal posterior
  english_pob_reading: '''into an abyss, full of fire and flaming, and full of pillars of fire'''
  chosen_spanish_reading: «a un abismo, lleno de fuego y llama, y lleno de columnas de fuego»
  alternative_spanish_readings:
  - «al infierno»
  - «a un pozo de fuego»
  - «a una profundidad de fuego»
  rationale: El texto presenta imaginería apocalíptica concreta. Se preserva el abismo y el fuego en lugar de sustituirlos por un rótulo doctrinal más tardío como «infierno».
  doctrine_reference: 'Book context: no aplanar la imaginería apocalíptica ni armonizarla en exceso con el uso cristiano posterior'
translation_notes:
  revision_awareness: 'Se incorporó la revisión auditada que corrige la primera interpretación espacial de ቅድመ እምከዋክብት: aquí debe reflejar prioridad narrativa (''primero sobre'') y no solo ''antes de''. También se preservó el encadenamiento judicial del original y la imaginería del abismo ígneo sin sustituirla por una glosa doctrinal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - «Juicio/juzgadas/lugar del juicio» mantiene la misma familia léxica que el audit trail inglés preserva.
  - Se armonizó la concordancia en femenino plural con «las estrellas», ya que el español exige género gramatical donde el original no lo marca de la misma manera.
