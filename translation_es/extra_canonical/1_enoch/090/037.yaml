translation:
  language: es
  text: Y vi que nació un toro blanco[b], y sus cuernos eran grandes; y todas las bestias del campo y todas las aves del cielo le temían y le suplicaban[a][c] en todo tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo también puede entenderse con más fuerza como «le hacían súplicas» o «le dirigían peticiones».
    reason: lexical_alternative
  - marker: b
    text: El toro blanco funciona aquí como figura simbólica dentro del Apocalipsis de los Animales; la traducción conserva la imagen sin identificarla en el texto principal.
    reason: cultural_note
  - marker: c
    text: 'O: «buscaban su favor».'
    reason: previous_rendering
lexical_decisions:
- source_word: ተወልደ
  english_pob_choice: was born
  chosen_spanish: nació
  alternatives_spanish:
  - fue engendrado
  - salió a luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo ge'ez expresa un nacimiento real dentro de la visión; «nació» conserva esa sencillez narrativa sin añadir interpretación.
- source_word: ላህም
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - res
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Toro» comunica mejor el macho bovino y mantiene la fuerza simbólica del animal visionario; en español suena natural junto con «cuernos».},{
theological_decisions:
- issue: Mantener o resolver la identidad simbólica del toro blanco
  english_pob_reading: Retain the animal symbol without identifying the figure in the main text.
  chosen_spanish_reading: Conservar el símbolo animal sin identificarlo en el texto principal.
  alternative_spanish_readings:
  - Identificarlo como un gobernante humano
  - Añadir una explicación mesiánica en la línea principal
  rationale: La visión del Apocalipsis de los Animales presenta imágenes simbólicas propias; el verso debe respetar esa tensión sin cerrarla interpretativamente.
  doctrine_reference: Preservar la tensión teológica y simbólica del pasaje.
translation_notes:
  revision_awareness: El audit trail inglés preserva «bull» y revisa la frase verbal de «sought its favor» a «entreated it». En español se sigue esa revisión con «le suplicaban», que expresa la postura deferente y fuerte de súplica indicada por el ge'ez, sin suavizarla a un mero «buscar su favor».
  spanish_consistency_notes:
  - Se mantiene «Dios / Yahvé / Mesías» según las normas del proyecto, pero este versículo no requiere esos términos.
  - Se evita armonizar el símbolo del toro con una identificación doctrinal explícita en el texto principal.
  - «Le suplicaban» conserva la intensidad religiosa de ያስተበቍዕዎ, evitando el debilitamiento semántico de «buscar su favor».
