translation:
  language: es
  text: Y vi a aquellas ovejas mientras ardían[a], y sus huesos ardían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El etiópico repite el verbo equivalente a «arder» para las ovejas y para sus huesos; se conserva la repetición en español para mantener la intensidad de la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ርኢክዎሙ
  english_pob_choice: I saw them
  chosen_spanish: vi a aquellas
  alternatives_spanish:
  - los vi
  - las vi
  - vi a esas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de visión en primera persona se expresa de manera directa con «vi». El objeto pronominal se integra en «a aquellas» para conservar el carácter demostrativo y la referencia ya establecida de las ovejas, sin añadir más de lo que el texto exige.
- source_word: እልኩ አባግዕ
  english_pob_choice: those sheep
  chosen_spanish: aquellas ovejas
  alternatives_spanish:
  - esas ovejas
  - aquellas ovejas allí
  - esos rebaños
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ovejas» mantiene la imagen simbólica del Apocalipsis Animal. «Aquellas» conserva la distancia demostrativa del original y su valor visual en la visión.
- source_word: እንዘ ይውዕዩ
  english_pob_choice: while they were burning
  chosen_spanish: mientras ardían
  alternatives_spanish:
  - mientras estaban ardiendo
  - cuando ardían
  - mientras eran consumidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ardían» comunica el aspecto durativo y la simultaneidad del evento en la visión. Se evita añadir una pasiva que el original no obliga a leer.
- source_word: አዕፅምቲሆሙ
  english_pob_choice: their bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - sus esqueletos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Huesos» es la equivalencia natural y concreta para el término anatómico, manteniendo la crudeza de la imagen de juicio.
- source_word: ይውዕዩ
  english_pob_choice: were burning
  chosen_spanish: ardían
  alternatives_spanish:
  - estaban ardiendo
  - eran quemados
  - seguían ardiendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se repite en español el mismo verbo de la primera cláusula para conservar la intensificación retórica de la repetición etiopica. «Ardían» suena natural y preserva la repetición sin suavizarla.
theological_decisions:
- issue: Conservar la repetición de 'burning/ardían' en lugar de neutralizarla como destrucción general
  english_pob_reading: Retain explicit burning imagery
  chosen_spanish_reading: Mantener la imagen explícita del ardor, incluso al aplicarse a los huesos
  alternative_spanish_readings:
  - y fueron destruidas
  - y fueron consumidas
  - y estaban siendo destruidas
  rationale: La fuerza del versículo está en la repetición visionaria del ardor; extenderla a los huesos intensifica el juicio. Traducirlo como destrucción general borraría la severidad visible del texto.
  doctrine_reference: 'Poética apocalíptica: preservar imágenes de juicio sin atenuarlas ni explicarlas en exceso.'
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en su última revisión; esta propuesta sigue de cerca esa lectura y mantiene la repetición enfática del ardor en la cláusula paralela.
  spanish_consistency_notes:
  - Se usa «ovejas» de manera consistente con el símbolo animal del pasaje.
  - Se preserva la repetición verbal «ardían» para reflejar la duplicación del original.
  - No se introduce terminología eclesiástica ajena al texto; el registro es sobrio y apocalíptico.
