translation:
  language: es
  text: Y vi hasta que vino a ellos el Señor de las ovejas[a], y tomó en su mano el bastón de la ira[c] y golpeó la tierra, y la tierra fue abierta, y todas las bestias y todas las aves del cielo cayeron de entre aquellas ovejas[b] y se hundieron en la tierra, y ella las cubrió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el dueño de las ovejas». Se conserva «Señor» por la fuerza soberana del título en la alegoría.
    reason: lexical_alternative
  - marker: b
    text: Las «bestias» y las «aves del cielo» continúan el lenguaje simbólico de la visión; representan poderes hostiles, no solo animales ordinarios.
    reason: cultural_note
  - marker: c
    text: O «la vara de la ira». El ge'ez no tiene un pronombre posesivo aquí; por eso no se traduce «de su ira».
    reason: textual_variant
lexical_decisions:
- source_word: እግዚአ አባግዕ
  english_pob_choice: the Lord of the sheep
  chosen_spanish: el Señor de las ovejas
  alternatives_spanish:
  - el amo de las ovejas
  - el dueño de las ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título relacional y la imagen de la alegoría animal. «Señor» reproduce el valor de dominio sin reducirlo a un simple propietario, y es la forma más natural y reverente en español para este contexto visionario.
- source_word: በትር መዓተ
  english_pob_choice: the staff of wrath
  chosen_spanish: el bastón de la ira
  alternatives_spanish:
  - la vara de la ira
  - el bastón de la furia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «በትር» admite «vara» o «bastón»; en español, «bastón» mantiene mejor la imagen del implemento de pastor sin sonar excesivamente litúrgico. «Ira» traduce መዓት con fuerza judicial y evita suavizar el matiz de juicio.
- source_word: ዘበጣ ለምድር
  english_pob_choice: struck the earth
  chosen_spanish: golpeó la tierra
  alternatives_spanish:
  - hirió la tierra
  - azotó la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa un acto de golpeo decisivo. «Golpeó» es claro en español y conserva la energía del acto sin volverlo arcaico.
- source_word: ተሰጠተ ምድር
  english_pob_choice: the earth was split open
  chosen_spanish: la tierra fue abierta
  alternatives_spanish:
  - la tierra fue hendida
  - la tierra fue partida
  - la tierra se abrió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa subraya la pasividad del giro. En español, «fue abierta» preserva esa voz pasiva y deja intacta la ambigüedad entre abrirse y hendirse, que el contexto resuelve por la caída de las bestias y aves.
- source_word: ወድቁ እምዝኩ አባግዕ
  english_pob_choice: fell away from among those sheep
  chosen_spanish: cayeron de entre aquellas ovejas
  alternatives_spanish:
  - cayeron de entre esas ovejas
  - se apartaron de entre aquellas ovejas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «De entre» preserva la separación relacional dentro de la alegoría. «Aquellas ovejas» mantiene la referencia demostrativa y el tono narrativo del pasaje.
- source_word: ተሰጥሙ በምድር
  english_pob_choice: sank into the earth
  chosen_spanish: se hundieron en la tierra
  alternatives_spanish:
  - se sumergieron en la tierra
  - fueron tragadas por la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se hundieron» expresa descenso y engullimiento sin introducir una interpretación excesiva. En español suena más natural que una literalidad rígida y mantiene la secuencia del juicio.
- source_word: ከደነት ዲቤሆሙ
  english_pob_choice: it covered over them
  chosen_spanish: ella las cubrió
  alternatives_spanish:
  - los cubrió
  - la tierra las cubrió
  - quedaron cubiertas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La tierra es el referente implícito femenino singular. «Ella» conserva el antecedente y el movimiento de clausura/sepultura; el pronombre es más fiel que neutralizar el sujeto implícito.
theological_decisions:
- issue: Título soberano dentro de la alegoría animal
  english_pob_reading: the Lord of the sheep
  chosen_spanish_reading: el Señor de las ovejas
  alternative_spanish_readings:
  - el amo de las ovejas
  - el dueño de las ovejas
  rationale: Se mantiene el título elevado sin introducir un nombre propio ni una cristologización ajena al contexto. «Señor» sostiene tanto la autoridad divina como el registro apocalíptico de la visión.
  doctrine_reference: Preservar la imaginería apocalíptica y la autoridad soberana sin aplanar el símbolo.
- issue: Instrumento de juicio
  english_pob_reading: staff of wrath
  chosen_spanish_reading: bastón de la ira
  alternative_spanish_readings:
  - vara de la ira
  - vara de la cólera
  rationale: La expresión debe sonar como un instrumento pastoral transformado en arma de juicio. «Ira» conserva el peso judicial; no se suaviza a «enojo», porque el contexto es de castigo apocalíptico.
  doctrine_reference: Conservar la tensión entre imaginería pastoral y juicio divino.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que corrigió la pasiva de «split open» para reflejar mejor el ge'ez. También adopta la corrección textual de que በትር መዓተ no lleva sufijo posesivo, por lo que se evita «su ira».
  spanish_consistency_notes:
  - Se usó «Señor» como título en vez de «dueño» o «amo» para conservar la elevación del pasaje y la terminología POB sin convertirla en fórmula eclesiástica posterior.
  - Se eligió «ira» para መዓት porque el contexto es judicial y punitivo; «cólera» sería posible, pero menos estable en la tradición de lectura bíblica en español.
  - La pasiva «fue abierta» sigue la revisión del inglés auditado y evita una traducción demasiado interpretativa como «se abrió» si bien esa sigue siendo una alternativa legítima en español.
  - La cláusula final con «ella» refleja el antecedente femenino singular de «la tierra», evitando ambigüedad en la cadena de acciones.
