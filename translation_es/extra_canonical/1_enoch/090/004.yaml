  to: Y vi hasta que aquellas ovejas fueron devoradas por los perros, por las águilas y por los milanos[a], y no les dejaron nada de carne, ni piel, ni tendón, hasta que solo sus huesos quedaron en pie allí[b][c]; y hasta sus huesos cayeron sobre la tierra[d], y las ovejas quedaron pocas.
