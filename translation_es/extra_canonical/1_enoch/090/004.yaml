base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/090/004.yaml
  text: And I saw until those sheep were devoured by the dogs and by the eagles and by the kites[a], and they left them no flesh at all, nor skin, nor sinew, until only their bones stood there; and even their bones fell upon the earth[e][d][c][b], and the sheep became few.
  footnotes:
  - marker: a
    text: The bird term rendered 'kites' may also be understood more broadly as a kind of hawk or other bird of prey.
    reason: lexical_alternative
  - marker: b
    text: 'The phrase ''full flesh'' reflects an expression of completeness: no flesh remained intact on them.'
    reason: lexical_alternative
  - marker: c
    text: '''Only their bones stood there'' keeps the stark visual wording of the Ethiopic; the sense is that nothing remained but exposed bones.'
    reason: lexical_alternative
  - marker: d
    text: Or 'neither full flesh nor skin nor sinew'.
    reason: previous_rendering
  - marker: e
    text: Or 'and their bones too fell'.
