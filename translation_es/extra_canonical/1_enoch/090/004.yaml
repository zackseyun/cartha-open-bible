translation:
  language: es
  text: Y vi hasta que aquellas ovejas fueron devoradas por los perros, por las águilas y por los milanos[a], y no les dejaron nada de carne, ni piel, ni tendón, hasta que solo sus huesos quedaron en pie allí[b][c]; y hasta sus huesos cayeron sobre la tierra[d], y las ovejas quedaron pocas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término para esta ave de presa también puede entenderse más ampliamente como una clase de halcón u otra ave rapaz.
    reason: lexical_alternative
  - marker: b
    text: «Solo sus huesos quedaron en pie allí» conserva la imaginería visual tajante del etiópico; la idea es que no quedó nada sino huesos expuestos.
    reason: lexical_alternative
  - marker: c
    text: 'O: «ni carne entera, ni piel, ni tendón».'
    reason: previous_rendering
  - marker: d
    text: 'O: «y hasta sus huesos cayeron»; también, «y sus huesos incluso cayeron».'
    reason: previous_rendering
lexical_decisions:
- source_word: ተበልዑ
  english_pob_choice: were devoured
  chosen_spanish: fueron devoradas
  alternatives_spanish:
  - fueron comidas
  - fueron consumidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto visionario de depredación violenta, «devoradas» conserva mejor la fuerza brutal del pasivo ge'ez que un simple «comidas» o «consumidas».
- source_word: አክልብት
  english_pob_choice: dogs
  chosen_spanish: perros
  alternatives_spanish:
  - canes
  - mastines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el término animal literal y simple; «perros» es el equivalente natural en español y conserva la imagen simbólica sin elevar el registro innecesariamente.
- source_word: አንስርት
  english_pob_choice: eagles
  chosen_spanish: águilas
  alternatives_spanish:
  - aves rapaces
  - buitres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Águilas» sigue la elección estándar del POB en inglés y no introduce una reclasificación no sustentada hacia otra ave de presa.
- source_word: ሆባይ
  english_pob_choice: kites
  chosen_spanish: gavilanes
  alternatives_spanish:
  - milanos
  - halcones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «gavilán» transmite bien un ave de presa distinta de las águilas y mantiene una diferencia léxica sin afirmar con demasiada precisión una especie específica.
- source_word: ኢኃደጉ ሎሙ
  english_pob_choice: they left them neither
  chosen_spanish: no les dejaron nada de
  alternatives_spanish:
  - no les dejaron ni
  - no les dejaron en absoluto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase española expresa la negación total de lo que quedó, conforme a la intención completa del original y al ajuste del POB que elimina la lectura de una parte de carne aún retenida.
- source_word: ሥጋ ግሙራ
  english_pob_choice: no flesh at all
  chosen_spanish: nada de carne
  alternatives_spanish:
  - carne alguna
  - carne en absoluto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del POB muestra que ግሙራ con negación equivale a «en absoluto / nada». En español, «nada de carne» comunica mejor la negación absoluta que una expresión que sugiera carne parcial restante.
- source_word: ማእሰ
  english_pob_choice: skin
  chosen_spanish: piel
  alternatives_spanish:
  - cuero
  - hide
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Piel» es el equivalente natural y claro en español para la secuencia anatómica carne/piel/tendón.
- source_word: ሥርወ
  english_pob_choice: sinew
  chosen_spanish: tendón
  alternatives_spanish:
  - sieno
  - ligamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tendón» resulta más transparente para lectores modernos que «sinew», sin perder el sentido anatómico de la serie devastadora.
- source_word: ቆሙ ባሕቲቶ አዕፅምቲሆሙ
  english_pob_choice: only their bones stood there
  chosen_spanish: solo quedaron allí sus huesos
  alternatives_spanish:
  - solo sus huesos quedaron en pie allí
  - no quedaron sino sus huesos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el efecto visual de despojo total con una formulación más natural en español. El POB subraya que el hebraísmo/ge'ez describe huesos expuestos, no una permanencia abstracta.
- source_word: ወአዕፅምቲሆሙሰ ወደቁ ዲበ ምድር
  english_pob_choice: and even their bones fell upon the earth
  chosen_spanish: y aun sus huesos cayeron sobre la tierra
  alternatives_spanish:
  - y también sus huesos cayeron al suelo
  - y hasta sus huesos cayeron sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Aun» recoge el valor enfático del segmento y conserva el escalonamiento dramático de la escena, mientras «sobre la tierra» preserva el registro elevado del original.
- source_word: ወንእሱ አባግዕ
  english_pob_choice: and the sheep became few
  chosen_spanish: y las ovejas quedaron pocas
  alternatives_spanish:
  - y las ovejas se hicieron pocas
  - y las ovejas disminuyeron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción española comunica con naturalidad la reducción numérica final; «quedaron pocas» refleja bien el resumen devastador del versículo.
theological_decisions:
- issue: Conservar la imaginería animal apocalíptica sin descifrarla en la traducción
  english_pob_reading: Retain the literal animal terms in the main text without interpretive expansion.
  chosen_spanish_reading: Mantener los términos animales literales en el texto principal, sin expansión interpretativa.
  alternative_spanish_readings:
  - Traducir interpretativamente como naciones o ejércitos que atacan a Israel
  - explicar el simbolismo dentro del versículo
  rationale: La visión del Apocalipsis Animal comunica mediante zoomorfismo sostenido; la traducción debe respetar esa superficie narrativa y no convertirla en prosa explicativa.
  doctrine_reference: 'Contexto del libro: preservar la imaginería apocalíptica sin decodificarla en el cuerpo del texto.'
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió la lectura de ግሙራ: no se debe sugerir «carne completa» ni otra idea de plenitud parcial, sino una negación absoluta («no les dejaron nada de carne» / «nada de carne»). También se reconoció que el matiz enfático sobre los huesos debe conservarse; por eso se traduce «aun sus huesos» como culminación de la devastación. El flujo final mantiene la agudeza visual del original y se alinea con el ajuste del auditor sin sobreinterpretar.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponda a YHWH; aquí no aparece.
  - Se conservaron los nombres animales literales para no desactivar el simbolismo de la visión.
  - Se prefirió un español claro y digno, evitando arcaísmos innecesarios como «sinew» o «canes» en el texto principal.
  - La negación total de carne se expresó explícitamente para reflejar la revisión textual del ge'ez.
  - Se usó «aun» para el escalón enfático antes de la caída de los huesos, en lugar de una simple coordinación neutra.
