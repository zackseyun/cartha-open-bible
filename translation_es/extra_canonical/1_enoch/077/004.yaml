    text: Or 'days and times and years.' The Ge'ez term rendered 'seasons' can be understood more broadly as appointed times or periods.
    reason: lexical_alternative
  - marker: b
    text: The final clause uses ordinary language for time passing; here it refers to the elapsing of calendrical cycles, not to destruction.
    reason: cultural_note
  - marker: c
    text: Or 'And I saw'.
    reason: previous_rendering
  - marker: d
    text: Or 'pass away'.
