base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/077/004.yaml
  text: I saw seven high mountains[a], which are higher than all the mountains that are on the earth; and from them frost comes forth[d][c][b], and days and seasons and years pass.
  footnotes:
