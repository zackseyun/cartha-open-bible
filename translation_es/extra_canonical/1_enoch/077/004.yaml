translation:
  language: es
  text: Vi siete montañas altas[a], que son más altas que todas las montañas que están sobre la tierra; y de ellas sale escarcha, y pasan los días, las estaciones[b] y los años[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «altísimas». El adjetivo ge'ez puede expresar altura, grandeza o longitud; aquí se elige la altura por el contexto comparativo.
    reason: lexical_alternative
  - marker: b
    text: O «los tiempos» o «los períodos señalados». El término ge'ez puede entenderse de manera más amplia que «estaciones», pero aquí «estaciones» expresa bien la dimensión calendárica del contexto.
    reason: lexical_alternative
  - marker: c
    text: El verbo para «pasan» describe el transcurrir normal de ciclos calendáricos; no sugiere destrucción ni desaparición.
    reason: cultural_note
lexical_decisions:
- source_word: ሰብዓተ
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete (numeral)
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un numeral directo; conviene conservarlo de forma literal porque el número forma parte de la visión y de la estructura simbólica del pasaje.
- source_word: አድባረ
  english_pob_choice: mountains
  chosen_spanish: montañas
  alternatives_spanish:
  - cerros
  - colinas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez designa montañas o alturas. 'Montañas' es la equivalencia natural en español y mantiene la escala cósmica del texto.
- source_word: ነዋኃነ
  english_pob_choice: high
  chosen_spanish: altas
  alternatives_spanish:
  - elevadas
  - altísimas
  - lozanas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto comparativo de montañas superiores a todas las demás, el rasgo dominante es la altura. 'Altas' es claro y fiel en español moderno.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: Vi
  alternatives_spanish:
  - Vi en visión
  - Contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma narrativa es una declaración visionaria en primera persona. 'Vi' conserva la inmediatez sin añadir solemnidad innecesaria.
- source_word: እለ ይነውሑ እምኵሉ አድባር
  english_pob_choice: which are higher than all the mountains
  chosen_spanish: que son más altas que todas las montañas
  alternatives_spanish:
  - que son más elevadas que todas las montañas
  - que sobrepasan en altura a todas las montañas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación está expresada como superioridad de altura; 'más altas que' comunica la relación sin sobrecargar el verso.
- source_word: ውስተ ምድር
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en la superficie de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto cosmológico, 'sobre la tierra' suena natural en español y mantiene el alcance global de la comparación.
- source_word: ወእምኔሆሙ ይወፅእ
  english_pob_choice: and from them ... comes forth
  chosen_spanish: y de ellas sale
  alternatives_spanish:
  - y de ellas brota
  - y de ellas sale hacia afuera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica salida o emanación. 'Sale' es fluido en español y conserva la imagen de procedencia desde las montañas.
- source_word: አሰሐትያ
  english_pob_choice: frost
  chosen_spanish: escarcha
  alternatives_spanish:
  - frost
  - helada
  - cencellada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El campo semántico apunta a una exhalación fría o fenómeno helado. 'Escarcha' expresa bien el efecto meteorológico y evita un anglicismo.
- source_word: ወየኀልፍ
  english_pob_choice: and ... pass away
  chosen_spanish: y pasan
  alternatives_spanish:
  - y transcurren
  - y se pasan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aplicado a días, estaciones y años, el verbo significa transcurrir. 'Pasan' es natural y evita una connotación de muerte que tendría 'pasar away' en español si se volviera demasiado literal.
- source_word: መዋዕለ ወዘመን ወዓመት
  english_pob_choice: days and seasons and years
  chosen_spanish: los días, las estaciones y los años
  alternatives_spanish:
  - los días, los tiempos y los años
  - los días, los períodos y los años
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La tríada temporal debe mantenerse. 'Estaciones' refleja con precisión la dimensión calendárica del texto astronómico; 'tiempos' sería más amplio, pero menos específico.
theological_decisions:
- issue: Relación entre las montañas y el curso del tiempo
  english_pob_reading: The verse links the seven lofty mountains with the emergence of frost and with the passing of calendrical time, without explaining a mechanistic cosmology.
  chosen_spanish_reading: El verso vincula las siete montañas altas con la salida de escarcha y con el transcurrir de los ciclos temporales, sin explicar una cosmología mecánica.
  alternative_spanish_readings:
  - Las montañas son solo rasgos literales del paisaje
  - Las montañas simbolizan exclusivamente regiones celestes que gobiernan el tiempo
  rationale: El ge'ez presenta juntos el paisaje visionario, el fenómeno meteorológico y el lenguaje temporal. La traducción conserva esa tensión en vez de resolverla hacia un literalismo o una alegorización total.
  doctrine_reference: Preservar la tensión teológica y literaria sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail inglés: la lectura correcta omite una conjunción inicial añadida por error y conserva el valor de ''pass'' como transcurrir temporal, no como morir. También se mantiene la tríada temporal sin expandirla innecesariamente.'
  spanish_consistency_notes:
  - Se conserva 'montañas' como término geográfico principal, coherente con el uso de la imagen cósmica.
  - Se usa 'escarcha' para mantener la imaginería meteorológica concreta del pasaje.
  - '''Estaciones'' traduce la dimensión calendárica de መዋዕለ sin borrar la posible amplitud de ''tiempos''.'
  - 'El orden y la puntuación siguen la progresión visionaria del original: visión, comparación, emanación, tiempo.'
