base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/077/007.yaml
  text: And the four remaining ones go out by the north side to their own sea—two of them to the Eritrean Sea[d][c][b][a], and two to the Great Sea.
  footnotes:
  - marker: a
    text: Or 'as far as their sea.' The Ge'ez preposition can mark extent as well as destination.
    reason: lexical_alternative
  - marker: b
    text: '''Eritrean Sea'' reflects the ancient geographical name in the Ethiopic witness; it may overlap with what some readers would call the Erythraean or Red Sea region.'
    reason: cultural_note
  - marker: c
    text: '''The Great Sea'' is a traditional ancient designation, commonly referring to the Mediterranean.'
    reason: cultural_note
  - marker: d
    text: The parenthetical repetition in the source witness around 'two ... and two' suggests either scribal disturbance or an emphatic division; the translation renders the apparent sense.
    reason: textual_variant
