translation:
  language: es
  text: 'Y los cuatro restantes salen por el lado norte a su propio mar[d][c][b][a]: dos de ellos al Mar Eritreo, y dos al Mar Grande.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta su mar». La preposición geʽez puede indicar tanto extensión como destino.
    reason: lexical_alternative
  - marker: b
    text: «Mar Eritreo» refleja el nombre geográfico antiguo atestiguado en el testimonio etiópico; puede solaparse con lo que algunos lectores llamarían la región eritraica o del Mar Rojo.
    reason: cultural_note
  - marker: c
    text: «Mar Grande» es una designación antigua tradicional, comúnmente entendida como el Mediterráneo.
    reason: cultural_note
  - marker: d
    text: La repetición parentética en el testimonio fuente en torno a «dos ... y dos» sugiere perturbación textual o una división enfática; la traducción sigue el sentido aparente.
    reason: textual_variant
lexical_decisions:
- source_word: እለ ተርፉ
  english_pob_choice: the remaining ones
  chosen_spanish: los cuatro que quedan
  alternatives_spanish:
  - los restantes
  - el resto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la idea de grupo sobrante dentro de un esquema numérico; en español, ‘los cuatro que quedan’ mantiene la referencia explícita al número y evita una expresión demasiado vaga.
- source_word: አርባዕቱ
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - los cuatro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El número es parte de la estructura cosmológica del pasaje y debe permanecer explícito. En español, ‘cuatro’ se integra naturalmente en la frase sin perder la cuantificación.
- source_word: ይወፅኡ
  english_pob_choice: go out
  chosen_spanish: salen
  alternatives_spanish:
  - van fuera
  - salen hacia afuera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Salen’ expresa el movimiento direccional de manera natural en español moderno y conserva la imagen de salida del texto fuente.
- source_word: በገቦ መስዕ
  english_pob_choice: by the north side
  chosen_spanish: por el lado norte
  alternatives_spanish:
  - por la parte norte
  - por el costado norte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Por el lado norte’ comunica orientación espacial sin introducir un tecnicismo innecesario. Mantiene el valor direccional del geʽez sin sobreinterpretarlo.
- source_word: እስከ ባሕረ ዚአሆሙ
  english_pob_choice: to their own sea
  chosen_spanish: hacia su propio mar
  alternatives_spanish:
  - hasta su mar
  - hasta su propio mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición geʽez admite extensión direccional; ‘hacia’ preserva ese sentido de movimiento/alcance. ‘Su propio mar’ mantiene la posesión o pertenencia implícita del original sin suavizar la formulación esquemática.
- source_word: ባሕረ ኤርትራ
  english_pob_choice: the Eritrean Sea
  chosen_spanish: el Mar Eritreo
  alternatives_spanish:
  - el Mar Eritráico
  - el Mar Rojo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el nombre geográfico antiguo reflejado por el testimonio geʽez. ‘Mar Eritreo’ sigue de cerca la forma fuente y evita sustituirla prematuramente por ‘Mar Rojo’.
- source_word: ባሕር ዓቢይ
  english_pob_choice: the Great Sea
  chosen_spanish: el Mar Grande
  alternatives_spanish:
  - el gran mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la designación geográfica antigua como expresión fija. En español, la mayúscula en ‘Mar Grande’ ayuda a mostrar que se trata de un nombre tradicional, no solo de una descripción.
theological_decisions:
- issue: Geografía cósmica y nombres antiguos de mares
  english_pob_reading: Retain the schematic sea names and directional imagery as given
  chosen_spanish_reading: Conservar los nombres de mares y la orientación espacial tal como aparecen
  alternative_spanish_readings:
  - Reemplazar por equivalentes geográficos modernos
  - Generalizar a lenguaje de ‘océano’
  rationale: El pasaje pertenece a una descripción apocalíptico-astronómica. La traducción española preserva la imaginería esquemática y los topónimos antiguos en lugar de domesticarlos a geografía moderna.
  doctrine_reference: Principio de primacía de la fuente original y preservación de la imaginería apocalíptica.
translation_notes:
  revision_awareness: 'No se incorporaron revisiones posteriores: el estado más reciente indica que no hubo cambios necesarios y el control cruzado mostró alta concordancia con observaciones menores.'
  spanish_consistency_notes:
  - Se conservó ‘Yahvé’ como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió ‘Mar Eritreo’ y ‘Mar Grande’ para mantener la nomenclatura antigua del texto, en línea con la pauta del POB de no modernizar indebidamente la geografía apocalíptica.
  - Se mantuvo ‘hacia’ en el sintagma direccional para reflejar el valor de alcance de እስከ sin cerrar el matiz a un destino puramente estático.
