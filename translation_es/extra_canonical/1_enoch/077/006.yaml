translation:
  language: es
  text: Y los dos vienen desde el oeste hasta el mar, y derraman sus aguas en el mar Eritreo[a] del este.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Mar Eritreo" traduce el nombre ge''ez ባሕረ፡ ኤርትራ; puede corresponder al Mar Rojo o, en la geografía antigua, a una noción más amplia del mar Eritreo.'
    reason: cultural_note
lexical_decisions:
- source_word: ክልኤቱ፡ ክልኤ፡
  english_pob_choice: the two of them
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - los dos de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El doblet dual subraya una pareja; 'los dos' conserva esa explicitud con naturalidad en español.
- source_word: ይመጽኡ፡
  english_pob_choice: come
  chosen_spanish: vienen
  alternatives_spanish:
  - llegan
  - vienen hacia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En una descripción de recorrido, 'vienen' mantiene el movimiento narrativo sin sobrecargar el verbo.
- source_word: እመስዕ፡
  english_pob_choice: from the west
  chosen_spanish: desde el oeste
  alternatives_spanish:
  - desde el occidente
  - desde el norte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente corrige la dirección a 'west'; en español 'oeste' es la opción clara y precisa.
- source_word: እስከ፡ ባሕር፡
  english_pob_choice: as far as the sea
  chosen_spanish: hasta el mar
  alternatives_spanish:
  - hasta el mar
  - a la altura del mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hasta'' expresa bien el alcance o límite del trayecto; ''mar'' evita redundancia con el contexto.'
- source_word: ወይከዕዉ፡ ማዮሙ፡
  english_pob_choice: they pour out their waters
  chosen_spanish: derraman sus aguas
  alternatives_spanish:
  - vierten sus aguas
  - vacían sus aguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Derraman'' conserva la imagen vívida de una descarga de agua y suena natural en español.'
- source_word: በባሕረ፡ ኤርትራ፡ እምሥራቅ።
  english_pob_choice: into the Erythraean Sea in the east
  chosen_spanish: en el mar Eritreo[b] en el oriente
  alternatives_spanish:
  - en el mar Eritreo y en el oriente
  - hacia el mar Eritreo en el oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el nombre propio 'mar Eritreo' del ge'ez, junto con la indicación direccional 'en el oriente' para reflejar la frase completa y su localización cosmográfica.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrige la dirección a 'oeste' y preserva el nombre propio 'mar Eritreo' en el texto principal, sin colapsarlo a una mera referencia genérica al 'mar oriental'.
  spanish_consistency_notes:
  - Se mantuvo un registro digno y bíblico, pero sin calco excesivo del inglés.
  - Se prefirió 'oeste' frente a 'occidente' por claridad moderna y neutralidad.
  - Se preservó el nombre geográfico 'mar Eritreo' en lugar de sustituirlo por una paráfrasis.
  - Las notas sólo se anclaron donde el texto principal permite una lectura alternativa o una aclaración cultural.
