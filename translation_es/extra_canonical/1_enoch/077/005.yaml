translation:
  language: es
  text: Y vi siete ríos sobre la tierra, más grandes que todos los ríos[b]; y uno de ellos viene del occidente y derrama sus aguas en el Gran Mar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el gran mar». La frase puede leerse como una designación geográfica («el Gran Mar») o como una expresión descriptiva.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Y vi ríos sobre la tierra».'
    reason: previous_rendering
lexical_decisions:
- source_word: ፯ / seven
  english_pob_choice: seven rivers
  chosen_spanish: siete ríos
  alternatives_spanish:
  - siete corrientes
  - siete cauces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El numeral es explícito en el texto ge'ez y debe conservarse. 'Ríos' mantiene la imagen hidrográfica amplia usada por la POB en inglés, sin debilitar el dato numérico.
- source_word: አፍላገ
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - corrientes
  - arroyos
  - cauces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo plural denota ríos o corrientes de agua. 'Ríos' es la opción más natural en español y encaja con la comparación cósmico-geográfica del pasaje.
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - por toda la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La locución locativa se vierte de modo directo. 'Sobre la tierra' conserva el registro visionario y evita una paráfrasis excesiva.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - vi en visión
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La primera persona narrativa ya comunica la experiencia visionaria. 'Vi' es más natural en español; el contexto apocalíptico ya sugiere visión sin necesidad de añadirlo.
- source_word: ዓበይተ እምኵሎሙ አፍላገ
  english_pob_choice: greater than all the rivers
  chosen_spanish: más grandes que todos los ríos
  alternatives_spanish:
  - mayores que todos los ríos
  - más grandes que todas las corrientes
  - más poderosos que todos los ríos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El comparativo expresa superioridad de magnitud; 'más grandes' mantiene la amplitud semántica sin forzar a 'poderosos', que sería más interpretativo.
- source_word: አሐዱ እምኔሆሙ
  english_pob_choice: one of them
  chosen_spanish: uno de ellos
  alternatives_spanish:
  - uno entre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una expresión partititiva simple. 'Uno de ellos' resulta idiomático y fiel al sentido.
- source_word: ይመጽእ እምዓረብ
  english_pob_choice: comes from the west
  chosen_spanish: viene del occidente
  alternatives_spanish:
  - viene del oeste
  - proviene del occidente
  - sale del occidente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Occidente'' es una elección digna y precisa para un registro bíblico en español. Conserva la dirección geográfica del original sin perder claridad.'
- source_word: ውስተ ባሕር ዐቢይ
  english_pob_choice: into the Great Sea
  chosen_spanish: en el Gran Mar
  alternatives_spanish:
  - en el gran mar
  - hacia el Gran Mar
  - en el Mar Grande
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB en inglés trata la expresión como designación geográfica. 'Gran Mar' preserva esa posible nominalización; el artículo definido mantiene la referencia concreta a un mar conocido.
- source_word: ይከዑ ማዮ
  english_pob_choice: pours its waters
  chosen_spanish: derrama sus aguas
  alternatives_spanish:
  - vacía sus aguas
  - deposita sus aguas
  - vierte sus aguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo describe el flujo del río hacia el mar. 'Derrama sus aguas' conserva la imagen concreta y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Tratamiento de 'Gran Mar' como nombre geográfico o descripción genérica
  english_pob_reading: Great Sea
  chosen_spanish_reading: Gran Mar
  alternative_spanish_readings:
  - gran mar
  - el Gran Mar como designación geográfica
  rationale: La evidencia contextual y la decisión auditada de la POB inglesa favorecen entender la expresión como designación geográfica reconocible, no como mera descripción. En español, 'Gran Mar' conserva esa posibilidad sin imponer una explicación extra.
  doctrine_reference: 'Principio de transparencia textual: preservar la ambigüedad controlada y documentarla en lugar de normalizarla.'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió una omisión importante: el número explícito «siete» al comienzo del versículo. También eliminó una duplicación accidental al final. La presente redacción española incorpora el número y conserva el resto de la cláusula completa sin duplicaciones.'
  spanish_consistency_notes:
  - Se mantiene 'ríos' para አፍლაგ཈ en coherencia con la decisión inglesa y con el tono geográfico del pasaje.
  - Se usa 'occidente' para reflejar la dirección de origen con un registro bíblico natural en español.
  - '''Gran Mar'' se capitaliza para reflejar la posible designación geográfica, siguiendo la lectura auditada en inglés.'
  - El texto evita introducir explicaciones interpretativas no presentes en la fuente, salvo las notas de alternativa léxica necesarias.
