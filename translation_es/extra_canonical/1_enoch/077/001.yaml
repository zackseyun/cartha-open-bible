translation:
  language: es
  text: Y llaman al primer viento el este[a], porque es el primero; y llaman al segundo el sur, porque allí desciende el Altísimo[b], y allí, especialmente, desciende el Bendito[c] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término etiópico aquí tiene un matiz de amanecer o mañana; por eso también puede entenderse como «el oriental» o «el del amanecer».
    reason: lexical_alternative
  - marker: b
    text: La segunda mitad del versículo es difícil; el ge'ez parece decir que el sur recibe ese nombre porque «allí desciende el Altísimo», con una frase intensificadora antes de la doxología final.
    reason: textual_variant
  - marker: c
    text: «El Bendito» probablemente funciona aquí como título divino sustantivo, en paralelo con «el Altísimo», no como un simple adjetivo suelto.
    reason: lexical_theological_clarification
lexical_decisions:
- source_word: ይጼውዕዎ
  english_pob_choice: they call
  chosen_spanish: llaman
  alternatives_spanish:
  - nombran
  - se llama
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa nombrar o llamar; en español, «llaman» conserva el estilo descriptivo impersonal del pasaje astronómico.
- source_word: ለነፋስ
  english_pob_choice: the wind
  chosen_spanish: el viento
  alternatives_spanish:
  - el viento-dirección
  - el cuadrante del viento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantengo «viento» como imagen básica, aunque el contexto cosmográfico apunte a una región o dirección.
- source_word: ቀዳማዊ
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - primero
  - el principal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un ordinal directo y debe repetirse en la cláusula explicativa para reflejar el paralelismo del texto.
- source_word: ለጽባሓዊ
  english_pob_choice: the eastern one
  chosen_spanish: el este
  alternatives_spanish:
  - el oriental
  - el del amanecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el etiópico conserva un matiz de amanecer o mañana, aquí funciona direccionalmente; «el este» es claro y natural en español.
- source_word: እስመ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conjunción causal estándar que reproduce la explicación del nombre.
- source_word: ውእቱ
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - esto es
  - él es
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cópula basta en español; el pronombre explícito no es necesario.
- source_word: ለካልእ
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el otro
  - el siguiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto enumerativo, el valor ordinal es el más preciso.
- source_word: አዜብ
  english_pob_choice: the south
  chosen_spanish: el sur
  alternatives_spanish:
  - el viento del sur
  - la región meridional
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un término direccional; «el sur» es la equivalencia española más clara, mientras el contexto sigue evocando los vientos cósmicos.
- source_word: ልዑል
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Exaltado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un título divino establecido y natural en español bíblico; preserva el registro elevado sin suavizar la referencia a Dios.
- source_word: ህየ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverbio locativo adecuado y repetible para mantener la insistencia del pasaje.
- source_word: ይወርድ
  english_pob_choice: descends
  chosen_spanish: desciende
  alternatives_spanish:
  - baja
  - viene abajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Desciende» preserva la imaginería vertical y teofánica del texto apocalíptico.
- source_word: ወፈድፋደ
  english_pob_choice: and there especially
  chosen_spanish: y allí especialmente
  alternatives_spanish:
  - y allí con mayor énfasis
  - y allí más abundantemente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma es difícil; traduzco la intensificación sin fijar más de lo que el texto permite.
- source_word: ቡሩክ
  english_pob_choice: the Blessed One
  chosen_spanish: el Bendito
  alternatives_spanish:
  - el Bienaventurado
  - el Bendito sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí funciona como designación sustantiva divina; «el Bendito» preserva el paralelismo con «el Altísimo» y el tono doxológico.
- source_word: ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Equivalencia idiomática natural para duración eterna en español.
theological_decisions:
- issue: Cómo rendir el descenso del Altísimo y del Bendito sin racionalizar la cosmografía apocalíptica
  english_pob_reading: Retain 'the Most High descends there' as the main text; the phrase remains a literal theophanic descent
  chosen_spanish_reading: Mantener «allí desciende el Altísimo» y «allí especialmente desciende el Bendito para siempre» como afirmaciones literales
  alternative_spanish_readings:
  - «allí se derrama la bendición del Altísimo»
  - «desde allí el Altísimo envía bendición/lluvia»
  rationale: El ge'ez usa verbos de descenso con títulos divinos; conviene conservar la tensión apocalíptica en lugar de convertirla en paráfrasis meteorológica o simbólica.
  doctrine_reference: Preservar la tensión teológica del texto; no suavizar la imaginería revelada.
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que ajustó el orden a «there the Most High descends» y aclaró que «the Blessed One» funciona como sujeto divino sustantivado. La traducción española refleja esa lectura, manteniendo la paralelización de ambos títulos y el verbo «desciende» para los dos miembros.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para ልዑል y «Bendito» para ቡሩክ, evitando sustituirlos por fórmulas litúrgicas más comunes que diluyan el paralelismo.
  - «El este» y «el sur» se usan como direcciones, pero el contexto de «viento» conserva la imaginería cosmológica.
  - La puntuación separa con punto y coma las dos explicaciones coordinadas, reflejando la estructura del original y facilitando la lectura en español.
