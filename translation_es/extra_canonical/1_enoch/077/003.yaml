translation:
  language: es
  text: 'Y el cuarto viento[a], cuyo nombre es el Norte, está dividido en tres partes: una es una morada para la humanidad, y la otra está sobre los mares, y sobre los abismos[b], y sobre los bosques, y sobre los ríos, y sobre las tinieblas, y sobre la niebla[c]; y la tercera parte está en el jardín de la justicia[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término ge'ez መስዕ se entiende aquí como 'el Norte', es decir, la designación direccional de este viento.
    reason: lexical_alternative
  - marker: b
    text: La revisión de la fuente entiende ቀላያት como 'abismos' o 'profundidades', no como 'valles'.
    reason: source_note
  - marker: c
    text: El término es incierto; puede corresponder a 'niebla', 'bruma', 'neblina' o un vapor atmosférico semejante.
    reason: lexical_alternative
  - marker: d
    text: '''Jardín de la justicia'' conserva la expresión literal del ge''ez y no precisa si alude específicamente a Edén o al Paraíso.'
    reason: cross_reference
lexical_decisions:
- source_word: ነፋስ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este pasaje cosmológico, el término designa uno de los vientos cardinales y no 'espíritu' ni 'aliento'. 'Viento' conserva el marco astronómico y geográfico del texto.
- source_word: ዘስሙ መስዕ
  english_pob_choice: whose name is the North
  chosen_spanish: cuyo nombre es el Norte
  alternatives_spanish:
  - llamado el Norte
  - cuyo nombre es Norte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión del audit trail corrige la idea de un nombre propio opaco: መስዕ se entiende como ''el Norte''. En español, ''cuyo nombre es el Norte'' expresa con claridad la denominación del viento sin forzar una transliteración.'
- source_word: ይትከፈል ሠለስተ ክፍለ
  english_pob_choice: is divided into three parts
  chosen_spanish: está dividido en tres partes
  alternatives_spanish:
  - se divide en tres partes
  - está repartido en tres partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva describe una distribución tripartita. 'Está dividido en tres partes' es natural en español y conserva la estructura del original.
- source_word: አሐዱ እምኔሆሙ
  english_pob_choice: one of them
  chosen_spanish: una
  alternatives_spanish:
  - una de ellas
  - una de las partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Siguiendo la revisión inglesa, evito repetir innecesariamente 'parte' y dejo 'una' como referencia a una de las divisiones ya mencionadas.
- source_word: ማኅደር ለሰብእ
  english_pob_choice: a dwelling for humankind
  chosen_spanish: morada de la humanidad
  alternatives_spanish:
  - habitación de la humanidad
  - dwelling de la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Morada'' comunica bien el valor de ማኅደር como lugar de habitación. ''Humanidad'' evita un masculino genérico innecesario y conserva el sentido colectivo.'
- source_word: አብሕርት ማይ
  english_pob_choice: the seas
  chosen_spanish: los mares
  alternatives_spanish:
  - los mares de agua
  - los mares de las aguas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail muestra una revisión que omitió 'of water' por redundante en inglés. En español, 'mares' comunica con naturalidad el mismo referente sin perder el plural enfático.
- source_word: ቀላያት
  english_pob_choice: the abysses
  chosen_spanish: los abismos
  alternatives_spanish:
  - las profundidades
  - los fondos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión reconoce que el término no significa 'valleys' sino 'abysses/deeps'. 'Abismos' es la equivalencia española más natural y elevada.
- source_word: ዖም / ፆም
  english_pob_choice: the forests
  chosen_spanish: los bosques
  alternatives_spanish:
  - los árboles
  - las selvas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el texto base presenta una forma corrupta, el audit trail señala la lectura correcta como 'forests'. 'Bosques' es la solución española más idiomática y fiel al campo semántico.
- source_word: አፍላግ
  english_pob_choice: the rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - las corrientes
  - los cauces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la equivalencia directa y transparente para el flujo de agua del original.
- source_word: ጽልመት
  english_pob_choice: darkness
  chosen_spanish: las tinieblas
  alternatives_spanish:
  - la oscuridad
  - las sombras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Tinieblas'' conserva mejor el registro bíblico-cósmico que una oscuridad meramente cotidiana.'
- source_word: ጊሜ
  english_pob_choice: mist
  chosen_spanish: la niebla
  alternatives_spanish:
  - la bruma
  - la neblina
  - el vapor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es incierto y puede referir a un fenómeno atmosférico semejante a niebla/fog/cloud. 'Niebla' funciona bien en español y mantiene la indeterminación.
- source_word: ገነት ጽድቅ
  english_pob_choice: the garden of righteousness
  chosen_spanish: el jardín de justicia
  alternatives_spanish:
  - el jardín de rectitud
  - el jardín de la justicia
  - el jardín de righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Jardín'' mantiene la imagen literal. ''Justicia'' traduce ጽድቅ de modo natural en español, y deja abierta la posible resonancia con Edén sin resolverla interpretativamente.'
theological_decisions:
- issue: Identidad del 'Norte'
  english_pob_reading: whose name is the North
  chosen_spanish_reading: cuyo nombre es el Norte
  alternative_spanish_readings:
  - llamado el Norte
  - el viento del Norte
  rationale: El audit trail revisado descarta tratar መስዕ como nombre opaco; aquí funciona como designación direccional/cósmica. Mantener 'el Norte' evita introducir una transliteración injustificada y conserva la estructura de los cuatro vientos.
  doctrine_reference: Cosmología en 1 Enoc 77; respetar la designación direccional sin armonizarla con terminología litúrgica posterior.
- issue: '''Jardín de justicia'' como espacio sacro'
  english_pob_reading: A distinct sacred or paradisal locale within Enoch's cosmology, rendered literally as 'the garden of righteousness.'
  chosen_spanish_reading: el jardín de justicia
  alternative_spanish_readings:
  - el paraíso de justicia
  - el Edén de justicia
  rationale: No se debe fijar en el texto principal una identificación más específica que la que el ge'ez exige. 'Jardín de justicia' preserva la tensión entre un lugar sacro propio de la visión y posibles ecos edénicos.
  doctrine_reference: Mantener la tensión exegética y no sobre-harmonizar con Edén o Paraíso.
translation_notes:
  revision_awareness: 'El draft incorpora las correcciones más recientes del audit trail: መስዕ se traduce como ''el Norte'', ቀላያት como ''abismos'', y la corrupción textual asociada a ፆም se resuelve según la lectura revisada como ''bosques''. También se ha simplificado la estructura para reflejar el pasaje en español natural, manteniendo la secuencia de las tres partes del viento.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene 'viento' por el valor cosmológico de ነፋስ.
  - Se opta por 'justicia' para ጽድቅ, en coherencia con el estilo POB.
  - Se evita 'Cristo' o 'Mesías' porque no intervienen en este versículo.
  - Se preserva un registro bíblico sobrio con vocabulario moderno y claro.
