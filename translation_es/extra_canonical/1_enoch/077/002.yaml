translation:
  language: es
  text: Y el viento del oeste se llama Hegulá[a], porque allí todas las luces del cielo se atenúan y descienden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “se desvanecen y descienden”; el verbo puede indicar disminución o pérdida de brillo, no una extinción literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ነፋስ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - ráfaga
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este pasaje astronómico se trata de un viento direccional, no de “espíritu”; “viento” conserva el marco cosmológico y la referencia física.
- source_word: እምዕራብ
  english_pob_choice: from the west
  chosen_spanish: del oeste
  alternatives_spanish:
  - occidental
  - de occidente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición de origen se expresa naturalmente en español como “del oeste”, sin perder el valor direccional.
- source_word: ስሙ
  english_pob_choice: is named
  chosen_spanish: se llama
  alternatives_spanish:
  - es llamado
  - tiene por nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula de nominación queda natural en español con “se llama”, manteniendo la introducción del nombre propio.
- source_word: ኀጕላ
  english_pob_choice: Hegulā
  chosen_spanish: Hegulá
  alternatives_spanish:
  - Ḥegulá
  - Hagulá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se translitera el nombre propio; “Hegulá” sigue la forma adoptada por la POB inglesa, adaptada a acentuación española.
- source_word: በህየ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  - ahí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Allí” señala el lugar mencionado, es decir, la región occidental, con un español claro y elevado.
- source_word: የሐፅፁ
  english_pob_choice: fade
  chosen_spanish: se apagan
  alternatives_spanish:
  - se desvanecen
  - se atenúan
  - declinan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez indica disminución/merma de brillo; “se apagan” comunica la pérdida de luminosidad sin forzar una extinción literal.
- source_word: ኵሉ ብርሃናት ሰማይ
  english_pob_choice: all the lights of heaven
  chosen_spanish: todos los luceros del cielo
  alternatives_spanish:
  - todas las luces del cielo
  - todos los luminares del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Luceros del cielo” es una expresión natural y solemne para los astros luminosos; conserva el matiz cósmico sin tecnicismo excesivo.
- source_word: ወይወርዱ
  english_pob_choice: and go down
  chosen_spanish: y descienden
  alternatives_spanish:
  - y bajan
  - y se ponen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Descienden” preserva la imagen concreta del movimiento hacia abajo y deja abierta la alusión astronómica a la puesta.
theological_decisions:
- issue: Cómo rendir el fenómeno astronómico de los astros al occidente sin reducirlo demasiado a terminología técnica
  english_pob_reading: all the lights of heaven fade and go down
  chosen_spanish_reading: todos los luceros del cielo se apagan y descienden
  alternative_spanish_readings:
  - todos los luminares del cielo se apagan y bajan
  - todos los astros del cielo se desvanecen y se ponen
  rationale: El texto ge'ez conserva imaginería cósmica y no impone un tecnicismo estricto; “se apagan y descienden” mantiene la doble idea de pérdida de brillo y movimiento hacia el oeste.
  doctrine_reference: Translation philosophy §optimal equivalence; preservar imaginería apocalíptica
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que ajustó el verbo de “wane” a “fade” para naturalidad, pero también la observación crítica previa que señalaba la idea técnica de disminución/merma del brillo. Por eso el español evita “extinguirse” y usa una formulación que integra ambas lecturas posibles.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - Se translitera el nombre propio Hegulá para conservar el dato onomástico del texto.
  - Se eligió una formulación astronómica comprensible en español moderno sin perder el trasfondo cosmológico del Libro Astronómico.
