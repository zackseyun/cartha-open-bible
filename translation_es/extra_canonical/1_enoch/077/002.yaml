review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del ge''ez: viento occidental, nombre propio transliterado, referencia locativa (''allí'') y doble acción sobre las luces celestes. Sin embargo, dos elecciones suavemente desalinean el sentido auditado: 1) ''luceros del cielo'' estrecha ኵሉ ብርሃናት ሰማይ (''todas las luces/luminares del cielo'') a un subconjunto más idiomático pero menos exacto; 2) ''se apagan'' sugiere extinción más fuerte que el inglés auditado ''fade'' y que la revisión adjudicada desde ''wane'', donde el matiz principal es disminución/atenuación, no apagarse del todo.'
  spanish_quality_summary: El español es natural y legible, con buen tono. No obstante, 'todos los luceros del cielo se apagan y descienden' suena algo más poético-interpretativo que fiel al texto fuente. 'Las luces del cielo se atenúan y descienden' o 'se desvanecen y descienden' preserva mejor el sentido y evita la impresión de extinción literal. También conviene ajustar la nota para reflejar la decisión lexical ya adjudicada.
  glossary_alignment: 'Sin conflictos con la terminología teológica principal del proyecto. La transliteración ''Hegulá'' es adecuada. La revisión propuesta mantiene un español digno y más cercano a la evidencia léxica: ''luces'' para ብርሃናት y ''se atenúan'' para el verbo de disminución.'
  issues:
  - severity: medium
    issue: '''luceros del cielo'' es más interpretativo que el fuente'
    rationale: El ge'ez habla de 'todas las luces de cielo/celestes', no específicamente de 'luceros'. 'Luceros' puede sonar a estrellas brillantes concretas y reduce la amplitud imagética del pasaje astronómico.
  - severity: medium
    issue: '''se apagan'' sobrerrepresenta la fuerza del verbo'
    rationale: La cadena auditada muestra que el verbo fue corregido desde 'are blotted out' a 'wane/fade'. En español, 'se apagan' sugiere extinción, mientras que 'se atenúan' o 'se desvanecen' conserva mejor el matiz de pérdida o disminución de brillo.
  - severity: low
    issue: La nota al pie no queda del todo alineada con la mejor redacción principal
    rationale: Si el texto principal usa una forma más suave como 'se atenúan', la nota debe presentar la alternativa sin reiterar una interpretación demasiado fuerte como 'ser oscurecidos' sin necesidad.
  revised_spanish_text: Y el viento del oeste se llama Hegulá[a], porque allí todas las luces del cielo se atenúan y descienden.
  revised_footnotes:
