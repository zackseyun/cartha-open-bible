    text: 'O: “se desvanecen y descienden”; el verbo puede indicar disminución o pérdida de brillo, no una extinción literal.'
    reason: lexical_alternative
  revision_rationale: Se reemplazó 'luceros' por 'luces' para reflejar mejor ብርሃናት y evitar una reducción interpretativa. Se cambió 'se apagan' por 'se atenúan' para alinearse con la adjudicación léxica ('wane/fade') y con el matiz de disminución de brillo, no de extinción completa. La nota se ajustó para sostener esa misma decisión lexical de manera coherente.
