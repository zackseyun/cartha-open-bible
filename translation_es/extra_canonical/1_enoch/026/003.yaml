  yaml_path: translation/extra_canonical/1_enoch/026/003.yaml
  text: And I saw another mountain toward the east[a], higher than this one; and between them was a deep ravine, but not wide[d][c][b], and water was flowing in it toward the mountain.
  footnotes:
