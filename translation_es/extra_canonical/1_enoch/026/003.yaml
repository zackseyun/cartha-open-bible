translation:
  language: es
  text: Y vi otra montaña hacia el este[a], más alta que esta; y entre ellas había un profundo barranco, pero no era ancho[b], y el agua corría en él hacia la montaña[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Hacia el este'' sigue el valor literal de la raíz; ''hacia el noreste'' sería una especificación interpretativa no exigida por el ge''ez revisado.'
    reason: lexical_alternative
  - marker: b
    text: 'También posible: ''más larga que esta'' o ''más extensa que esta''; el comparativo ge''ez puede expresar longitud o extensión, pero en una montaña la altura resulta la lectura más natural.'
    reason: lexical_alternative
  - marker: c
    text: 'La frase final es difícil: el ge''ez sitúa el agua en el barranco y la describe moviéndose ''hacia la montaña''. Otra posibilidad de traducción previa fue ''hacia el noreste'' para la dirección anterior, pero el texto revisado prefiere ''hacia el este''.'
    reason: textual_variant
lexical_decisions:
- source_word: መንገለ ጽባሕ
  english_pob_choice: toward the east
  chosen_spanish: hacia el este
  alternatives_spanish:
  - hacia el oriente
  - al este
  - hacia la salida del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La raíz ligada a 'dawn/morning/east' pide una dirección geográfica simple. Tras la revisión del inglés, 'este' evita sobreespecificar 'noreste' y mantiene la equivalencia literal del ge'ez.
- source_word: ካልአ ደብረ
  english_pob_choice: another mountain
  chosen_spanish: otra montaña
  alternatives_spanish:
  - una segunda montaña
  - una montaña más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Otra'' reproduce de manera natural la secuencia visionaria y el valor de ''second/other'' sin forzar un tecnicismo.'
- source_word: ዘይነውኅ እምዝ
  english_pob_choice: higher than this one
  chosen_spanish: más alta que esta
  alternatives_spanish:
  - mayor que esta
  - más larga que esta
  - más extensa que esta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un contexto de montañas, 'más alta' comunica mejor la comparación topográfica que 'más larga', aunque se conserva la nota de posible amplitud en las alternativas.
- source_word: ማእከሎሙ
  english_pob_choice: between them
  chosen_spanish: entre ellas
  alternatives_spanish:
  - en medio de ellas
  - en su entremedio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural pronominal se refiere a las dos montañas; 'entre ellas' es la forma más clara y natural en español.
- source_word: ቈላ ዕሙቀ
  english_pob_choice: a deep ravine
  chosen_spanish: un profundo barranco
  alternatives_spanish:
  - un profundo valle
  - un profundo desfiladero
  - una hondonada profunda
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Barranco'' mantiene el relieve abrupto y encaja bien con la imagen apocalíptica; ''profundo'' conserva la intensidad del adjetivo ge''ez.'
- source_word: አልቦ ርሐበ
  english_pob_choice: but not wide
  chosen_spanish: pero no ancho
  alternatives_spanish:
  - pero no de gran anchura
  - y no era ancho
  - pero estrecho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''No ancho'' es una equivalencia cercana y transparente de ''there was no breadth'', sin suavizar el contraste topográfico.'
- source_word: ቦቱኒ ማይ
  english_pob_choice: water was flowing in it
  chosen_spanish: el agua corría en él
  alternatives_spanish:
  - había agua en él
  - el agua estaba en él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez sitúa el agua dentro del barranco; en español, 'corría' hace explícito el movimiento implícito en el verbo y conserva la lectura del POB inglés.
- source_word: የሐውር መንገለ ደብር
  english_pob_choice: toward the mountain
  chosen_spanish: hacia la montaña
  alternatives_spanish:
  - en dirección a la montaña
  - montaña arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La dirección final se conserva sin añadir precisión no garantizada por el texto; 'hacia' refleja el movimiento relativo del agua.
theological_decisions:
- issue: Topografía visionaria concreta frente a lectura simbólica o alegórica
  english_pob_reading: Retain mountain, ravine, and flowing water as literal visionary landscape features
  chosen_spanish_reading: Mantener montaña, barranco y agua que corre como rasgos concretos de la visión
  alternative_spanish_readings:
  - interpretar la geografía de modo simbólico en la traducción
  - generalizar a 'un lugar' o 'una región'
  rationale: El texto presenta una escena visual específica; la traducción no debe aplanar la imaginería apocalíptica ni convertirla en paráfrasis interpretativa.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten visionary prose.'
translation_notes:
  revision_awareness: La revisión más reciente corrigió la dirección de መንገለ ጽባሕ de 'toward the northeast' a 'toward the east'. La versión española sigue esa corrección y evita una sobreespecificación direccional. También se mantiene la tensión del final difícil sin resolverla de forma interpretativa excesiva.
  spanish_consistency_notes:
  - Se usa 'este' para mantener coherencia con la revisión del inglés y con la equivalencia literal del ge'ez.
  - Se conserva el registro visionario concreto, sin introducir lenguaje doctrinal ajeno al pasaje.
  - '''Barranco'' se eligió por su fuerza visual; ''valle'' quedaría demasiado neutro para la escena.'
  - Los corchetes de notas aparecen solo donde hay notas activas y se asignan de forma única.
