translation:
  language: es
  text: Y desde allí fui al centro de la tierra[a], y vi un lugar bendito, sombreado[b], en el cual había árboles con ramas que permanecían y brotaban de un árbol que había sido cortado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión apunta a una localización visionaria amplia. También puede entenderse como ‘medio de la tierra’; ‘centro’ conserva bien la imagen geográfica en español.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse como ‘con sombra’ o ‘lleno de sombra’. O: ‘con ramas que permanecían y brotaban’.'
    reason: previous_rendering
  - marker: c
    text: La descripción botánica del etiópico es difícil. La cláusula final probablemente describe crecimiento nuevo que sale de un árbol que había sido cortado, aunque la relación exacta entre los árboles, las ramas o los brotes y el árbol talado es textualmente incierta.
    reason: textual_variant
lexical_decisions:
- source_word: ማእከለ ምድር
  english_pob_choice: the middle of the earth
  chosen_spanish: el centro de la tierra
  alternatives_spanish:
  - el medio de la tierra
  - el centro del mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la imagen geográfico-cósmica del recorrido visionario. ‘Tierra’ mantiene el alcance amplio de la escena mejor que ‘país’ o ‘tierra’ en sentido local, y ‘centro’ reproduce con naturalidad la idea de un punto medio.
- source_word: መካነ ቡሩከ
  english_pob_choice: a blessed place
  chosen_spanish: un lugar bendito
  alternatives_spanish:
  - un lugar de bendición
  - una región bendita
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Bendito’ conserva el valor adjetival del término sin convertirlo en una interpretación litúrgica o simbólica más allá del texto. ‘Lugar’ mantiene la referencia concreta a una ubicación.
- source_word: ጥሉለ
  english_pob_choice: shaded
  chosen_spanish: sombreado
  alternatives_spanish:
  - con sombra
  - sombreado por la sombra
  - lleno de sombra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma describe un lugar caracterizado por sombra o cobertura. ‘Sombreado’ es una solución natural en español y conserva la imagen física de resguardo y frescura.
- source_word: ዕፀወ / አዕፁቀ
  english_pob_choice: branches
  chosen_spanish: ramas
  alternatives_spanish:
  - árboles
  - brotes
  - ramajes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El audit trail inglés reconoció la dificultad botánica y finalmente mantuvo ‘trees’ más ‘branches’. En español, ‘árboles con ramas’ reproduce mejor el sentido explícito del texto revisado: hay árboles y se los describe por sus ramas vivas. ‘Ramas’ es el equivalente más directo de la imagen de crecimiento continuo.'
- source_word: ዘይነብር ወይሠርፅ
  english_pob_choice: abiding and sprouting
  chosen_spanish: que permanecen y brotan
  alternatives_spanish:
  - que permanecen y retoñan
  - que duran y brotan
  - que subsisten y echan brotes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja verbal comunica continuidad y crecimiento nuevo. ‘Permanecen’ y ‘brotan’ preservan el contraste entre persistencia y surgimiento vital sin introducir un matiz más técnico de ‘retoñar’ que no es necesario.
- source_word: እምዕፅ ዘተመተረ
  english_pob_choice: from a tree that had been cut down
  chosen_spanish: de un árbol que había sido cortado
  alternatives_spanish:
  - de un árbol derribado
  - de un árbol talado
  - de un árbol que había sido talado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Había sido cortado’ expresa con claridad el hecho previo de la tala sin cargar el pasaje con una elección más específica que el estado del texto permite. Mantiene la relación temporal que la revisión inglesa destacó.
theological_decisions:
- issue: Si el pasaje debe resolverse como geografía ordinaria o como imagen sagrada/visionaria
  english_pob_reading: Retain concrete visionary geography ('middle of the earth,' 'blessed place,' shaded growth) without allegorical expansion.
  chosen_spanish_reading: Mantener la geografía visionaria concreta (‘centro de la tierra’, ‘lugar bendito’, sombra y crecimiento vegetal) sin nombrar explícitamente el sitio como paraíso o Edén.
  alternative_spanish_readings:
  - identificar el lugar como paraíso en el texto principal
  - generalizarlo como una región fértil cualquiera
  rationale: El texto no identifica el lugar por nombre; solo presenta una escena visionaria con resonancias sagradas. La traducción conserva esa tensión teológica sin resolverla por anticipado.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés, que corrigió la omisión de ‘trees’ y estabilizó la relación entre árboles, ramas y el árbol cortado. En español se preserva esa estructura: árboles con ramas que permanecen y brotan, provenientes de un árbol previamente cortado.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma estándar del proyecto cuando aparezca el nombre divino; aquí no aparece en el versículo.
  - Se mantiene ‘bendito’ para el estado del lugar, evitando ‘bendecido’ porque el foco es la cualidad del sitio más que una acción verbal.
  - Se evita introducir ‘paraíso’ o ‘Edén’, porque el original y el audit trail inglés no lo nombran.
  - La sintaxis intenta ser publicable y fiel, sin sobrecargar el pasaje con glosas dentro del cuerpo del texto.
