translation:
  language: es
  text: Y allí vi un monte santo[a], y debajo del monte agua del oriente, y su corriente hacia el norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez dice literalmente «agua del oriente»; la cláusula siguiente aclara que esa agua tiene un curso hacia el norte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ደብረ
  english_pob_choice: mountain
  chosen_spanish: monte
  alternatives_spanish:
  - montaña
  - monte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez puede designar una elevación montañosa; en español, "monte" conserva bien el registro bíblico y apocalíptico sin sonar tan técnico como "montaña".
- source_word: ቅዱሰ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - santo
  - sagrado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Santo" transmite mejor la consagración y la carga teológica que "sagrado", y encaja naturalmente con el sustantivo "monte".'
- source_word: መትሕተ ደብር
  english_pob_choice: beneath the mountain
  chosen_spanish: debajo del monte
  alternatives_spanish:
  - bajo el monte
  - debajo de la montaña
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica ubicación espacial directa; "debajo del monte" es claro, natural y mantiene el paralelismo con la escena visionaria.
- source_word: ማይ
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  - corriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término base es "agua". Aunque el contexto sugiere un flujo, el sustantivo principal no debe ampliarse innecesariamente.
- source_word: እመንገለ ጽባሕ
  english_pob_choice: from the east
  chosen_spanish: del oriente
  alternatives_spanish:
  - del este
  - desde el oriente
  - desde el este
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Oriente" mantiene un registro bíblico y literario adecuado, y reproduce la dirección de procedencia indicada por el ge''ez.'
- source_word: ውሕዘቱ
  english_pob_choice: its flow
  chosen_spanish: su corriente
  alternatives_spanish:
  - su flujo
  - su curso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma señala el movimiento o curso del agua; "corriente" es idiomático en español y conserva la idea de flujo sin introducir un verbo ajeno al texto.
- source_word: መንገለ ሰሜን
  english_pob_choice: toward the north
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - en dirección al norte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa dirección; "hacia el norte" comunica el movimiento con precisión y naturalidad.
theological_decisions:
- issue: Cómo expresar la cualidad sagrada del monte
  english_pob_reading: holy mountain
  chosen_spanish_reading: monte santo
  alternative_spanish_readings:
  - monte sagrado
  - montaña santa
  rationale: '"Santo" preserva mejor el peso teológico de la visión que una opción más genérica como "sagrado". "Monte santo" mantiene el tono apocalíptico sin explicitar más de lo que el texto dice.'
  doctrine_reference: Preservar la imaginería apocalíptica y su carga de santidad sin rebajarla a mera ambientación.
- issue: Evitar añadir un verbo que el texto no explicita
  english_pob_reading: its flow toward the north
  chosen_spanish_reading: su corriente hacia el norte
  alternative_spanish_readings:
  - su corriente va hacia el norte
  - su flujo hacia el norte
  rationale: La revisión inglesa eliminó el verbo explícito para ajustarse al ge'ez; en español se conserva igualmente una construcción nominal sin añadir movimiento verbal que el original no formula.
  doctrine_reference: Fidelidad formal al dato fuente y a la revisión auditada.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que quitó el verbo explícito en la última cláusula para ajustarse mejor al ge'ez, manteniendo una construcción nominal en español.
  spanish_consistency_notes:
  - Se prefirió "monte" en vez de "montaña" para conservar un tono bíblico y visionario.
  - Se usó "oriente" como equivalente de dirección geográfica con registro más literario que "este".
  - No se añadió verbo en la última cláusula, respetando la economía del original y la revisión inglesa.
  - '"Santo" se mantuvo por su fuerza teológica frente a "sagrado".'
