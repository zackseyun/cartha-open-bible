translation:
  language: es
  text: Y al oeste de esto había otro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez es breve y no nombra explícitamente qué es ‘otro’; el contexto amplio puede sugerir un elemento de la visión, pero aquí no se suplanta el sustantivo.
    reason: alternative_reading
lexical_decisions:
- source_word: መንገለ
  english_pob_choice: to the west
  chosen_spanish: al oeste de
  alternatives_spanish:
  - hacia el oeste de
  - del lado oeste de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto visionario, el término funciona de manera direccional, no como un sustantivo (‘camino’). Por eso se traduce con una construcción espacial natural en español, conservando la relación topográfica expresada en el ge'ez.
- source_word: ዐረቡ
  english_pob_choice: the west
  chosen_spanish: el oeste
  alternatives_spanish:
  - la región occidental
  - el lado occidental
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia es cardinal y debe permanecer explícita. ‘El oeste’ comunica con claridad la orientación sin añadir matices no exigidos por el texto.
- source_word: ለዝ
  english_pob_choice: for this / of this
  chosen_spanish: de esto
  alternatives_spanish:
  - para esto
  - a esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relación marcada por la preposición con el demostrativo se expresa en español de forma más natural como ‘de esto’, manteniendo la referencia al elemento cercano en la visión sin resolver cuál es exactamente.
- source_word: ካልእ
  english_pob_choice: another / other one
  chosen_spanish: otro
  alternatives_spanish:
  - otro más
  - el otro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez es elíptico y no nombra el referente. ‘Otro’ conserva esa indefinición en español y evita suplir un sustantivo ausente.
theological_decisions:
- issue: Referente elíptico en la descripción visionaria
  english_pob_reading: Retain the indefinite substantive 'other one' rather than supplying a noun such as 'mountain' or 'tree.'
  chosen_spanish_reading: Conservar ‘otro’ sin añadir el sustantivo implícito.
  alternative_spanish_readings:
  - otro monte
  - otro lugar
  - el otro
  rationale: El fragmento ge'ez conservado no dice explícitamente qué es ‘otro’. Añadir ‘monte’ o ‘lugar’ resolvería indebidamente una ambigüedad textual real. La traducción española mantiene la tensión documental y elipsis del original.
  doctrine_reference: Primacía del texto original y preservación de ambigüedades no resueltas por el testimonio fuente.
translation_notes:
  revision_awareness: La revisión del audit trail corrigió una lectura previa que entendía መንገለ como ‘camino’; el consenso posterior lo trata como un marcador direccional equivalente a ‘to the west’. La versión española sigue esa adjudicación y conserva la elipsis del referente.
  spanish_consistency_notes:
  - Se usa ‘oeste’ de manera consistente como dirección cardinal.
  - Se evita introducir ‘monte’ u otro sustantivo no atestiguado.
  - La nota a pie de página marca la ambigüedad textual sin resolverla.
