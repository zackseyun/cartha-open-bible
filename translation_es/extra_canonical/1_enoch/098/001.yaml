translation:
  language: es
  text: Y ahora les juro, a los sabios y a los necios, que verán mucho sobre la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y en este momento
  - Y ahora bien
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión introduce un nuevo giro exhortativo; 'Y ahora' conserva el cambio discursivo de manera natural en español.
- source_word: እኔ
  english_pob_choice: I
  chosen_spanish: yo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sujeto está explícito en la forma verbal de primera persona; en español no es necesario redundarlo en la traducción pública.
- source_word: እምሕል
  english_pob_choice: I swear
  chosen_spanish: juro
  alternatives_spanish:
  - declaro
  - prometo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail revisado corrige 'declare' a 'swear'; 'juro' reproduce con fidelidad el valor de juramento solemne.
- source_word: ለክሙ
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - a ustedes todos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se usa la forma neutra latinoamericana para un destinatario plural en registro público.
- source_word: ለጠቢባን
  english_pob_choice: to the wise
  chosen_spanish: a los sabios
  alternatives_spanish:
  - a los prudentes
  - a los entendidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Los sabios'' mantiene el contraste sapiencial directo con ''los necios'' y refleja el sustantivo colectivo del etíope.'
- source_word: ወለአብዳን
  english_pob_choice: and to the foolish
  chosen_spanish: y a los necios
  alternatives_spanish:
  - y a los foolish
  - y a los insensatos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Necios'' conserva mejor la oposición moral e intelectual fuerte que ''insensatos'' y sigue el paralelismo del texto.'
- source_word: እስመ
  english_pob_choice: that / for
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Tras el verbo de juramento en español, 'que' expresa de forma natural el contenido jurado y evita una construcción forzada con 'porque'.
- source_word: ብዙኅ
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - muchas cosas
  - en gran abundancia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo/quantificador etíope enfatiza abundancia; con 'verán' en español, 'mucho' suena natural y no reduce el alcance apocalíptico.
- source_word: ትሬእዩ
  english_pob_choice: you will see
  chosen_spanish: verán
  alternatives_spanish:
  - verán ustedes
  - han de ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El futuro simple transmite la certeza profética; el sujeto plural queda claro por la flexión verbal.
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la faz de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sobre la tierra'' preserva el registro amplio y elevado de ''upon the earth'' sin forzar un calco arcaizante.'
theological_decisions:
- issue: Alcance de 'los sabios y los necios'
  english_pob_reading: A universalized moral address including both discerning and undiscerning hearers
  chosen_spanish_reading: Un contraste moral directo entre quienes tienen sabiduría y quienes carecen de ella, sin restringirlo aún a un grupo histórico particular
  alternative_spanish_readings:
  - Una referencia interna a dos clases dentro de Israel
  - Un tono irónico dirigido principalmente a los impíos
  rationale: El versículo presenta la oposición sin más especificación; traducirla de modo directo preserva la tensión y deja que el contexto posterior determine el alcance exacto.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'Se corrigió la relación entre el verbo de juramento y la cláusula siguiente conforme al audit trail más reciente: la versión inglesa final prefiere ''that you will see much upon the earth'', y en español se reflejó como una oración completiva natural. También se evitó cualquier nota no anclada, porque la validación previa falló por un marcador sin inserción en el texto.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí, al no aparecer el nombre divino.
  - Se evitó 'Cristo/Mesías' por no estar en el pasaje.
  - '''Necios'' conserva el contraste sapiencial con ''sabios'' en un registro bíblico natural.'
  - La preposición 'a' en los destinatarios conserva el dativo de dirección/objeto indirecto del original.
