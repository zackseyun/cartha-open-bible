translation:
  language: es
  text: 'Juro[a] a ustedes, pecadores: así como un monte no se ha hecho esclavo, y una colina no se hace sierva de una mujer, así el pecado no fue enviado sobre la tierra; más bien, los hombres lo crearon por sí mismos[b], y los que lo practican caerán bajo una gran maldición.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La comparación inicial es textualmente difícil en ge''ez. Se conserva el sentido general atestiguado en el POB inglés: el juramento introduce una imagen de imposibilidad, donde un monte o una colina no entran en sujeción servil.'
    reason: textual_variant
  - marker: b
    text: El ge'ez dice literalmente algo como 'de sí mismos'. El giro con 'cabeza' funciona aquí como reflexivo idiomático, es decir, 'por sí mismos' o 'por su propia iniciativa', no como una metáfora de la mente.
    reason: lexical_alternative
lexical_decisions:
- source_word: መሐልኩ
  english_pob_choice: I swear
  chosen_spanish: Juro
  alternatives_spanish:
  - He jurado
  - Les hago juramento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo introduce una afirmación solemne de tipo juramentario. 'Juro' conserva mejor ese tono directo y bíblico en español que una paráfrasis más suave.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - malhechores
  - culpables
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto moral y judicial, 'pecadores' reproduce la designación ética fuerte del original y mantiene el tono de reprensión.
- source_word: ደብር
  english_pob_choice: mountain
  chosen_spanish: monte
  alternatives_spanish:
  - montaña
  - cerro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Monte'' es natural en español bíblico y conserva la imagen topográfica concreta sin rebajarla.'
- source_word: ገብረ
  english_pob_choice: has become a slave
  chosen_spanish: se ha hecho esclavo
  alternatives_spanish:
  - ha llegado a ser siervo
  - se ha vuelto servidor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fuerza del contraste requiere un término de sujeción fuerte. 'Esclavo' preserva mejor la intensidad semántica que 'siervo'.
- source_word: እማገር ለብእሲት
  english_pob_choice: a maidservant of a woman
  chosen_spanish: sierva de una mujer
  alternatives_spanish:
  - criada de una mujer
  - sirvienta de una mujer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sierva'' mantiene el paralelismo servil con ''esclavo'' y evita un registro demasiado doméstico o moderno.'
- source_word: ኃጢአትኒ ኢተፈነወት ዲበ ምድር
  english_pob_choice: sin was not sent upon the earth
  chosen_spanish: el pecado no fue enviado sobre la tierra
  alternatives_spanish:
  - el pecado no fue arrojado sobre la tierra
  - el pecado no fue soltado sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fue enviado'' sigue de cerca la pasiva del original y conserva la idea de que el pecado no es una imposición externa de la creación.'
- source_word: አላ ሰብእ እምርእሶሙ ፈጠርዋ
  english_pob_choice: men created it from themselves
  chosen_spanish: los hombres lo crearon de sí mismos
  alternatives_spanish:
  - los hombres lo idearon por sí mismos
  - los hombres lo crearon por su propia iniciativa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa correcta el idiomático 'from their own heads' hacia un reflexivo real. 'De sí mismos' refleja ese valor idiomático sin añadir una glosa interpretativa excesiva.
- source_word: ለመርገም ዐቢይ ይከውኑ
  english_pob_choice: will come under a great curse
  chosen_spanish: caerán bajo una gran maldición
  alternatives_spanish:
  - estarán bajo una gran maldición
  - llegarán a una gran maldición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Caerán bajo'' expresa bien la idea de quedar sujetos al juicio y suena natural en español sin perder la gravedad de la sentencia.'
theological_decisions:
- issue: Origen del pecado y agencia humana
  english_pob_reading: Sin is not portrayed as something divinely sent onto the earth; it is said to be created by humans themselves.
  chosen_spanish_reading: El pecado no se presenta como algo enviado por Dios a la tierra, sino como algo creado por los seres humanos desde sí mismos.
  alternative_spanish_readings:
  - El pecado no fue puesto por Dios sobre la tierra, sino inventado por el hombre.
  - El pecado no es una realidad impuesta desde arriba, sino producida por la humanidad.
  rationale: La pasiva 'no fue enviado' contrasta con 'lo crearon de sí mismos', por lo que conviene preservar la tensión entre no-imposición divina y causalidad humana. No se resuelve la frase más allá de lo que permite el texto.
  doctrine_reference: Preservar la tensión teológica sin armonizarla artificialmente.
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión auditada que corrige la antigua literalidad 'from their own heads' por el valor idiomático reflexivo de እምርእሶሙ ('de sí mismos'). Por eso el español evita 'cabezas' y adopta una solución reflexiva natural. También conserva la dificultad textual de la imagen de monte/colina sin normalizarla en exceso.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma por defecto para el nombre divino; aquí no aparece el Tetragrámaton.
  - '''pecadores'' conserva el registro moral del discurso y armoniza con el tono de advertencia.'
  - '''esclavo/sierva'' se usa para mantener la dureza léxica del contraste servil documentado por el POB inglés.'
  - La nota b evita una falsa imagen mental y explica el valor reflexivo del ge'ez.
  - La nota c ofrece una alternativa de lectura sin duplicar la función de la nota b.
