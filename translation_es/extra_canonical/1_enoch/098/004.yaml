base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/098/004.yaml
  text: 'I swear to you[a], sinners: as a mountain has not become a slave, and a hill does not become a maidservant of a woman, so sin was not sent upon the earth; rather, men created it from themselves[c][b], and those who do it will come under a great curse.'
  footnotes:
  - marker: a
    text: The opening comparison is textually difficult in Ge'ez. The sense appears to be that just as a mountain or hill does not become a slave or maidservant, so sin is not an imposed feature of creation.
    reason: textual_variant
  - marker: b
    text: Literally, 'from their own heads,' likely meaning from their own minds or initiative.
    reason: lexical_alternative
  - marker: c
    text: Or 'rather, men created it from their own heads'.
    reason: previous_rendering
