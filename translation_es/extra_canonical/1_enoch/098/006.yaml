revisions:
- from: He jurado a ustedes[a], pecadores, por el Gran Santo, que todas sus malas obras están reveladas en los cielos[b], y no hay en ustedes ninguna obra de violencia que esté cubierta u oculta.
  to: He jurado a ustedes[a], pecadores, por el Grande y Santo, que todas sus malas obras están reveladas en los cielos[b], y ninguna de sus obras de violencia está cubierta ni oculta.
  rationale: Se ajusta el título divino para reflejar mejor los dos adjetivos del original y sonar más natural en español, y se corrige la cláusula final para mantener el sentido plural/colectivo de «deeds of violence» establecido en la revisión inglesa adjudicada. También se mejora el paralelismo idiomático con «cubierta ni oculta».
  reviewer_model: gpt-5.4
