translation:
  language: es
  text: He jurado a ustedes[a], pecadores, por el Grande y Santo, que todas sus malas obras están reveladas en los cielos[b], y ninguna de sus obras de violencia está cubierta ni oculta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez se dirige directamente a los pecadores con una fórmula solemne de juramento en primera persona.
    reason: source_note
  - marker: b
    text: «En los cielos» conserva el plural del ge'ez y la imaginería apocalíptica; también puede entenderse como «en el cielo».
    reason: spanish_style_note
lexical_decisions:
- source_word: መሐልኩ
  english_pob_choice: I have sworn
  chosen_spanish: He jurado
  alternatives_spanish:
  - Juré
  - He hecho un juramento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal expresa un juramento solemne en primera persona; «He jurado» conserva el valor performativo y el tono judicial/apocalíptico sin sonar arcaico.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - los pecadores
  - personas pecadoras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pecadores» reproduce de modo directo la designación moral y judicial del texto, con naturalidad en español bíblico contemporáneo.
- source_word: በቅዱስ ዐቢይ
  english_pob_choice: by the Great Holy One
  chosen_spanish: por el Gran Santo
  alternatives_spanish:
  - por el Gran Santo Uno
  - por el Santo Grande
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula de juramento exige preservar ambos rasgos del epíteto. «Gran Santo» mantiene la solemnidad y evita imponer una fórmula litúrgica posterior; «por» expresa adecuadamente el juramento en español.
- source_word: ኵሉ ግብርክሙ እኩይ
  english_pob_choice: all your evil deeds
  chosen_spanish: todas sus malas obras
  alternatives_spanish:
  - todas sus obras malas
  - todos sus hechos malos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obras» traduce bien ግብር como actos/hechos, y «malas» comunica el valor moral de እኩይ con fluidez en español. Se mantiene el plural colectivo del original.
- source_word: ክሡት ውእቱ በሰማያት
  english_pob_choice: are revealed in the heavens
  chosen_spanish: están reveladas en los cielos
  alternatives_spanish:
  - están expuestas en los cielos
  - están descubiertas en los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo comunica revelación/exposición. «Los cielos» conserva el plural ge'ez y el marco cosmológico apocalíptico; «reveladas» es más natural que una traducción mecánica de «reveladas/expuestas».
- source_word: ግፍዕ
  english_pob_choice: deeds of violence
  chosen_spanish: obra de violencia
  alternatives_spanish:
  - obras de violencia
  - actos de violencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa violencia/opresión/agravio. En español, «obra de violencia» mantiene la concreción del sustantivo y evita ampliar innecesariamente el sentido; en el contexto colectivo queda cubierto por el plural del miembro principal y por la cláusula negativa.
- source_word: ክዱነ ወእኁቡአ
  english_pob_choice: are covered or hidden
  chosen_spanish: que esté cubierta u oculta
  alternatives_spanish:
  - que esté tapada o escondida
  - que esté encubierta u oculta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja verbal del ge'ez expresa la idea de estar cubierto/oculto. «Cubierta u oculta» conserva el paralelismo semántico y el tono legal de una cosa no escondida.
theological_decisions:
- issue: Juramento divino y título
  english_pob_reading: by the Great Holy One
  chosen_spanish_reading: por el Gran Santo
  alternative_spanish_readings:
  - por el Gran Santo Uno
  - por el Santo Grande
  rationale: Se preserva el carácter de título divino solemne sin normalizarlo a fórmulas eclesiásticas posteriores. El epíteto se mantiene descriptivo y reverente, pero no se reemplaza por una denominación tradicional ajena al testimonio del texto.
  doctrine_reference: Mantener la imaginería apocalíptica y la formulación local del juramento.
- issue: Revelación celestial y ocultamiento de la violencia
  english_pob_reading: evil deeds are revealed in the heavens ... none of your deeds of violence are covered or hidden
  chosen_spanish_reading: todas sus malas obras están reveladas en los cielos, y no hay en ustedes ninguna obra de violencia que esté cubierta u oculta
  alternative_spanish_readings:
  - todas sus malas obras están expuestas en los cielos, y ninguna de sus obras de violencia está cubierta u oculta
  - todas sus malas obras se dan a conocer en los cielos, y no hay en ustedes ninguna obra de violencia escondida
  rationale: 'La clausula final en ge''ez es negativa: no se trata de un segundo enunciado de inscripción, sino de la afirmación de que ninguna obra de violencia permanece cubierta u oculta. La traducción conserva esa tensión entre revelación y ausencia de ocultamiento, sin resolverla en una sola imagen.'
  doctrine_reference: Preservar la tensión textual y no armonizar imágenes judiciales distintas.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión crítica del inglés POB: la cláusula final no se entiende como «escritas y registradas», sino como una afirmación negativa de que ninguna obra de violencia está cubierta u oculta. La versión española sigue esa lectura revisada y conserva el paralelo con «reveladas en los cielos».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el original lo requiera explícitamente; aquí no aparece y no se introduce.
  - Se mantiene el plural «los cielos» para respetar el ge'ez y el registro apocalíptico.
  - Se evita «Señor» como sustituto del título divino, ya que el texto ofrece un epíteto propio.
  - Se conserva un español bíblico moderno y claro, sin calcos innecesarios del inglés.
