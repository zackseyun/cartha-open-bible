review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue correctamente la revisión inglesa ya adjudicada: mantiene el juramento solemne, el título divino, la revelación de las malas obras en los cielos y la negación de que las obras de violencia estén cubiertas u ocultas. Sin embargo, dos decisiones reducen la fidelidad fina al audit trail: «Gran Santo» suena incompleto frente a «the Great Holy One», y «ninguna obra de violencia» en singular debilita el sentido colectivo/plural de ግብረ ግፍዕ reflejado en la revisión inglesa final («none of your deeds of violence»).'
  spanish_quality_summary: El español es claro y legible, con tono digno. No obstante, «por el Gran Santo» resulta algo extraño e impreciso en español eclesial general, mientras que «por el Grande y Santo» suena más natural sin perder la forma titulada. También conviene mejorar la cláusula final a «ninguna de sus obras de violencia está cubierta ni oculta» para mayor naturalidad y paralelismo.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. La principal cuestión léxica es representar በቅዱስ ዐቢይ de forma más fiel y natural en español; «el Grande y Santo» preserva mejor ambos adjetivos que «el Gran Santo». Asimismo, ግብረ ግፍዕ debe mantenerse en plural colectivo como «obras de violencia».
  issues:
  - severity: medium
    issue: «por el Gran Santo» no refleja plenamente «the Great Holy One»
    rationale: El original y el English POB presentan un título divino con dos cualidades claramente conservadas. «Gran Santo» en español puede leerse como un solo sintagma adjetival menos preciso y suena poco idiomático. «el Grande y Santo» o «el Gran Santo» con nota podría funcionar, pero la primera opción es más clara.
  - severity: medium
    issue: 'La cláusula final usa singular: «ninguna obra de violencia»'
    rationale: 'La revisión inglesa final corrigió expresamente hacia un sentido plural/colectivo: «none of your deeds of violence are covered or hidden». El español debería reflejar ese valor con «ninguna de sus obras de violencia…» o «ninguna de sus obras violentas…».'
  - severity: low
    issue: La conjunción final «u oculta» es menos paralela que «ni oculta»
    rationale: 'Tras una negación existencial o una estructura con «ninguna», «ni» suena más natural y enfático en español jurídico/literario: «cubierta ni oculta».'
  revised_spanish_text: He jurado a ustedes[a], pecadores, por el Grande y Santo, que todas sus malas obras están reveladas en los cielos[b], y ninguna de sus obras de violencia está cubierta ni oculta.
