translation:
  language: es
  text: Y ahora sepan que han sido preparados para el día de destrucción[a], y no esperen vivir, ustedes pecadores[b]; más bien, se irán y morirán, porque no conocen ningún rescate[c], ya que han sido preparados para ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el día de matanza». El término ge'ez puede indicar ruina destructiva en un contexto de juicio y quizá llevar el sentido más fuerte de «matanza».
    reason: lexical_alternative
  - marker: b
    text: «Pecadores» funciona aquí como vocativo o aposición a «ustedes», no como sujeto de tercera persona.
    reason: source_note
  - marker: c
    text: «Rescate» alude aquí a un precio o medio de liberación del juicio venidero; el sentido es que ya no queda escape.
    reason: theological_note
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y en este momento
  - Mas ahora
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca transicional solemne y temporal; «Y ahora» conserva el arranque profético sin sonar arcaico.
- source_word: አእምሩ
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - reconozcan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo plural exhorta a asumir una realidad ominosa; «sepan» expresa con fuerza la advertencia pública.
- source_word: ድልዋን
  english_pob_choice: prepared
  chosen_spanish: están preparados
  alternatives_spanish:
  - están listos
  - han sido dispuestos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Preparados» conserva la idea de estar reados/dispuestos para un evento fijado sin especificar más de lo que el texto da.
- source_word: ለዕለተ ሐጕል
  english_pob_choice: for the day of destruction
  chosen_spanish: para el día de destrucción
  alternatives_spanish:
  - para el día de matanza
  - para el día de ruina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Destrucción» mantiene el alcance apocalíptico general; evita estrechar el sentido a «matanza» aunque ese matiz sea posible.
- source_word: ወኢትስፈዉ
  english_pob_choice: and do not hope
  chosen_spanish: y no esperen
  alternatives_spanish:
  - y no confíen
  - y no abriguen esperanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «esperar» reproduce bien la prohibición de albergar una expectativa falsa; la forma negativa intensifica el tono de advertencia.
- source_word: ከመ ትሕየዉ ኃጥኣን
  english_pob_choice: that sinners will live
  chosen_spanish: que ustedes, pecadores, vivan
  alternatives_spanish:
  - que vivan, ustedes pecadores
  - que ustedes pecadores sobrevivan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se adopta la revisión gramatical: el verbo es de segunda persona plural y «pecadores» funciona como vocativo/aposición. El español debe reflejar que se habla directamente a los oyentes.'
- source_word: አላ ትሐውሩ ወትመውቱ
  english_pob_choice: rather, you will go away and die
  chosen_spanish: más bien, irán y morirán
  alternatives_spanish:
  - más bien, se irán y morirán
  - antes bien, se irán y morirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia de movimiento + muerte se conserva con un español natural y sobrio; «irán» mantiene el valor solemne de la advertencia.
- source_word: ቤዛ
  english_pob_choice: ransom
  chosen_spanish: rescate
  alternatives_spanish:
  - ransom
  - precio de rescate
  - redención
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «rescate» comunica el precio o medio de liberación. Se evita «redención» para no cargar el término con desarrollos teológicos posteriores no explícitos aquí.
- source_word: ኢታእምሩ ቤዛ
  english_pob_choice: you do not know any ransom
  chosen_spanish: no conocen ningún rescate
  alternatives_spanish:
  - no saben de ningún rescate
  - no conocen rescate alguno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la idea de desconocer cualquier medio de salida o liberación; «ningún rescate» preserva la fuerza absoluta del original.
- source_word: ተደለውክሙ
  english_pob_choice: you have been prepared for it
  chosen_spanish: han sido preparados para ello
  alternatives_spanish:
  - han sido dispuestos para ello
  - han sido preparados para eso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva conserva la idea de haber sido puestos en estado de enfrentarse al día anunciado, sin decidir si el agente implícito es divino o providencial.
theological_decisions:
- issue: Sentido de «rescate» en un oráculo de juicio
  english_pob_reading: The verse warns the wicked that no release from the decreed judgment is available; 'ransom' preserves the concrete metaphor and theological tension.
  chosen_spanish_reading: La versión habla de «rescate» y no lo parafrasea como «liberación» o «expiación», para conservar la tensión de que no queda medio de escape ante el juicio.
  alternative_spanish_readings:
  - liberación
  - redención
  - precio de rescate
  rationale: «Rescate» mantiene el valor concreto y jurídico del término, sin resolverlo en categorías doctrinales posteriores.
  doctrine_reference: Preservar la tensión teológica del texto sin armonización interpretativa.
- issue: Lectura gramatical de «pecadores»
  english_pob_reading: The clause may be understood directly as addressing the wicked; later revision recognized the second-person plural verb with 'sinners' in vocative/apposition.
  chosen_spanish_reading: '«pecadores» se coloca en aposición/vocativo: «ustedes, pecadores», de modo que el mandato siga dirigido a los oyentes.'
  alternative_spanish_readings:
  - que ustedes pecadores vivan
  - que vivan, ustedes pecadores
  rationale: La revisión gramatical evita convertir a «pecadores» en sujeto de tercera persona y conserva el tono de invectiva directa.
  doctrine_reference: Atender a la gramática del ge'ez para no alterar la dirección del reproche.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente que corrigió la sintaxis de «que ustedes, pecadores, vivan» a una lectura de segunda persona plural. También se reflejó la preferencia revisada por un español más directo («irán») y por conservar «prepared» con una pasiva sencilla. La nota sobre «ransom» sigue la trayectoria del audit trail inglés, manteniendo la tensión léxica sin doctrinalizarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «rescate» de forma consistente con la política del proyecto para ቤዛ cuando el contexto es de liberación jurídica/judicial.
  - Se evita «SEÑOR» y «Cristo/Mesías», que no corresponden a este pasaje.
  - Se conserva un tono apocalíptico sobrio y público, sin suavizar la advertencia.
