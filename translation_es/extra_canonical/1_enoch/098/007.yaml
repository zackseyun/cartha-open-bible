  to: Y no imaginen en su espíritu[a], ni digan en su corazón[c] que no saben ni ven que cada pecado está escrito en el cielo cada día[b] ante el Altísimo.
  rationale: Se ajusta el registro al español neutral ('imaginen', 'su', 'digan', 'saben', 'ven'), se refuerza la fuerza distributiva con 'cada pecado', y se añade una nota [c] para reflejar la alternativa de formulación/discurso preservada en el audit trail. También se simplifica levemente la coordinación ('ni ven') y se prefiere 'ante el Altísimo' por fluidez solemne en español bíblico moderno.
  reviewer_model: gpt-5.4
