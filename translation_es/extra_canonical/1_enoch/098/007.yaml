translation:
  language: es
  text: Y no imaginen en su espíritu[a], ni digan en su corazón[c] que no saben ni ven que cada pecado está escrito en el cielo cada día[b] ante el Altísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en su mente'. Se mantiene 'espíritu' para conservar el lenguaje antropológico del texto.
    reason: lexical_alternative
  - marker: b
    text: 'La expresión ''cada día'' también puede sugerir presencia continua: el registro permanece ante el Altísimo día tras día.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''que no saben ni ven que cada pecado está escrito en el cielo cada día ante el Altísimo''. La cláusula puede entenderse como el contenido de lo que se dicen interiormente; se conserva aquí el discurso indirecto del texto principal.'
    reason: previous_rendering
lexical_decisions:
- source_word: ኢታምስሉ
  english_pob_choice: do not imagine
  chosen_spanish: no imaginéis
  alternatives_spanish:
  - no supongáis
  - no penséis
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La prohibición apunta a una presunción mental interna; 'imaginéis' conserva el matiz de autoengaño o formación de una idea interna sin reducirlo solo a opinión abstracta.
- source_word: በመንፈስክሙ
  english_pob_choice: in your spirit
  chosen_spanish: en vuestro espíritu
  alternatives_spanish:
  - en vuestra mente
  - dentro de vosotros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el lenguaje antropológico del original ('espíritu') en vez de sustituirlo por 'mente', porque el versículo contrapone facultades internas ('espíritu' / 'corazón').
- source_word: ኢትበሉ
  english_pob_choice: do not say
  chosen_spanish: no digáis
  alternatives_spanish:
  - no habléis
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una prohibición directa de decir algo; 'digáis' encaja con la cláusula siguiente que introduce el contenido del pensamiento/speech inner.
- source_word: በልብክሙ
  english_pob_choice: in your heart
  chosen_spanish: en vuestro corazón
  alternatives_spanish:
  - dentro de vosotros
  - en lo íntimo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el modismo bíblico 'corazón' como sede de la interioridad, sin modernizarlo a 'mente' o 'conciencia'.
- source_word: ኢታእምሩ
  english_pob_choice: that you do not know
  chosen_spanish: que no sabéis
  alternatives_spanish:
  - que no conocemos
  - que no sabéis reconocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión gramatical del audit trail corrige el inglés anterior: el ge''ez es segunda persona plural. En español se refleja como ''sabéis'', no como primera persona.'
- source_word: ወኢትሬእዩ
  english_pob_choice: and you do not see
  chosen_spanish: y no veis
  alternatives_spanish:
  - y no percibís
  - y no observáis
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el paralelismo con 'sabéis' y la imagen concreta de ceguera moral con 'ver'.
- source_word: ኵሉ ኃጢአት
  english_pob_choice: every sin
  chosen_spanish: todo pecado
  alternatives_spanish:
  - cada pecado
  - todo transgresión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular colectivo tiene fuerza distributiva; 'todo pecado' comunica que cada acto queda incluido sin sobrecargar el castellano con 'cada' en un contexto de generalidad.
- source_word: በሰማይ ይጸሐፍ
  english_pob_choice: is written in heaven
  chosen_spanish: está escrito en el cielo
  alternatives_spanish:
  - está escrito en el cielo
  - está inscrito en el cielo
  - está registrado en el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Escrito en el cielo'' preserva la imagen apocalíptica del registro celestial. ''Estar escrito'' suena natural en español y conserva la forma pasiva resultativa.'
- source_word: ሀሎ በኵሉ ዕለት
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - día tras día
  - cotidianamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión indica presencia continua; 'cada día' es natural y permite la nota sobre la continuidad sin volver la frase pesada.
- source_word: በቅድሜሁ ለልዑል
  english_pob_choice: before the Most High
  chosen_spanish: delante del Altísimo
  alternatives_spanish:
  - ante el Altísimo
  - en presencia del Altísimo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Delante del Altísimo'' conserva la imagen forense/de registro y el título divino reverente, con español claro y solemne.'
theological_decisions:
- issue: Registro celestial de los pecados
  english_pob_reading: The verse affirms an ongoing heavenly record in the presence of the Most High.
  chosen_spanish_reading: El versículo afirma un registro celestial continuo de los pecados delante del Altísimo.
  alternative_spanish_readings:
  - Los pecados son simplemente conocidos por Dios sin imagen de registro.
  - Se trata solo de una afirmación general de omnisciencia divina.
  rationale: El ge'ez usa lenguaje de escritura en el cielo; por eso no se debe diluir en una mera idea abstracta de omnisciencia. La traducción conserva la imagen apocalíptica del registro.
  doctrine_reference: Preservar la imaginería judicial/apocalíptica del juicio sin reducirla a prosa general sobre el conocimiento divino.
translation_notes:
  revision_awareness: 'El audit trail revisó la persona verbal del ge''ez: los verbos equivalen a segunda persona plural (''sabéis'', ''veis''), no a primera persona. También se corrigió en el inglés la forma de ‘written’. La traducción española refleja esa revisión y conserva la imagen de registro celestial.'
  spanish_consistency_notes:
  - Se usa 'Altísimo' como título reverente coherente con el original.
  - Se conserva 'espíritu' y 'corazón' como pares antropológicos distintivos, sin fusionarlos en 'mente'.
  - La imagen de 'escrito en el cielo' mantiene el carácter concreto del registro apocalíptico.
  - Se emplea 'vosotros' implícito en las formas verbales para reflejar la segunda persona plural del original.
