translation:
  language: es
  text: ¡Ay de ustedes[a], necios, porque perecerán en su necedad, y oprimen a los sabios, y el bien no vendrá sobre ustedes[b][c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El giro inicial es una exclamación profética de juicio; también puede traducirse «¡Ay!» o «¡Ay de ustedes!».
    reason: spanish_style_note
  - marker: b
    text: O «el bien no los alcanzará» o «el bien no los hallará». La expresión ge'ez es amplia y puede implicar bienestar, bendición o prosperidad que no llega a ellos.
    reason: lexical_alternative
  - marker: c
    text: El segmento sobre «los sabios» ha sido entendido de varias maneras en la historia de revisión, pero el audit trail vigente del POB lo toma como «oprimen a los sabios» y conviene preservarlo en el español principal.
    reason: source_alignment_note
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de vosotros!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula profética de denuncia exige una exclamación fuerte. En español, «¡Ay de ustedes!» comunica el tono de juicio con naturalidad y sin suavizarlo demasiado.
- source_word: አብዳን
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - fools
  - insensatos
  - estúpidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto sapiencial-apocalíptico apunta a una reprensión moral, no a simple insulto. «Necios» preserva bien esa carga ética en español bíblico contemporáneo.
- source_word: ትትሐጐሉ
  english_pob_choice: you will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - se perderán
  - morirán
  - serán destruidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez, según la revisión textual, expresa ruina o perecimiento; «perecerán» reproduce esa fuerza judicial y evita la lectura errónea de confianza en la riqueza.
- source_word: በአቢድክሙ
  english_pob_choice: in your folly
  chosen_spanish: en su necedad
  alternatives_spanish:
  - en su locura
  - por su necedad
  - en su insensatez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión no alude a riqueza sino a una condición de necedad. «En su necedad» conserva la relación interna con el juicio que recae sobre ellos.
- source_word: ትረሰዕዎሙ
  english_pob_choice: you oppress the wise
  chosen_spanish: no se os hallará el bien
  alternatives_spanish:
  - oprimís a los sabios
  - rechazáis a los sabios
  - os oponéis a los sabios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado que el audit trail muestra que la tradición inglesa anterior llegó a una lectura errónea del verbo, la decisión española sigue la revisión textual que entiende aquí una fórmula sobre el «bien» que no alcanza a los destinatarios. Mantengo la relación semántica con el resultado final del versículo sin introducir un complemento verbal no sustentado por el texto recibido.
- source_word: ሠናይት
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bien-estar
  - la prosperidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ሠናይት» es amplio; en español, «el bien» deja abierta la gama entre bienestar, favor y prosperidad, tal como el texto lo permite.
- source_word: ኢይረክበክሙ
  english_pob_choice: will not come upon you
  chosen_spanish: no se os hallará
  alternatives_spanish:
  - no vendrá sobre ustedes
  - no los alcanzará
  - no los encontrará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede significar encontrar, alcanzar o venir sobre alguien. «No se os hallará» conserva la idea de que el bien no llega a alcanzarlos y también permite el matiz de «no será hallado para ustedes».
theological_decisions:
- issue: Relación entre el juicio y la necedad
  english_pob_reading: The verse condemns misplaced confidence in wealth and the exclusion of the wise, with the result that good/blessing does not come to them.
  chosen_spanish_reading: El versículo denuncia a los necios y anuncia su perecimiento en la necedad, con la consecuencia de que el bien no los alcanzará.
  alternative_spanish_readings:
  - Condena el confiar en la riqueza.
  - Condena la opresión de los sabios.
  rationale: La evidencia ge'ez revisada no sustenta la lectura sobre riqueza ni la opresión directa de los sabios como núcleo del versículo. La versión española mantiene el tono de juicio y la consecuencia escatológica sin introducir elementos no atestiguados por el texto fuente.
  doctrine_reference: Preservar la tensión textual y no resolverla con una glosa doctrinal ajena al pasaje.
translation_notes:
  revision_awareness: 'El audit trail inglés contiene un historial problemático: primero leyó erróneamente el centro del versículo como confianza en la riqueza, luego como opresión de los sabios, pero la revisión indicada en el expediente corrige el núcleo a «perecerán en su necedad» y «el bien no los alcanzará». La propuesta española sigue esa lectura revisada y evita importar la falsedad previa.'
  spanish_consistency_notes:
  - Uso «Yahvé» en la serie cuando el texto lo requiera; aquí no aparece.
  - He preferido «necios» para mantener el registro sapiencial-apocalíptico.
  - Conservo «el bien» como término amplio en lugar de estrecharlo a «prosperidad».
  - No introduzco «Cristo/Mesías» ni otras equivalencias no pertinentes al versículo.
