    rationale: Se atribuye a ese verbo una traducción de la cláusula final, cuando en el audit trail ese verbo corresponde a la acción contra los sabios. Esto muestra una desalineación metodológica con la evidencia fuente y el POB inglés.
  revised_spanish_text: ¡Ay de ustedes[a], necios, porque perecerán en su necedad, y oprimen a los sabios, y el bien no vendrá sobre ustedes[b][c]!
