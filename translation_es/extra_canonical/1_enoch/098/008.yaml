translation:
  language: es
  text: Desde ahora, sepan[a] que toda su violencia[b] que cometen está siendo escrita cada día hasta el día de su juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sepan» conserva el imperativo plural y el tono de advertencia directa del original.
    reason: spanish_style_note
  - marker: b
    text: El término puede abarcar violencia e injusticia opresiva; aquí se mantiene «violencia» por la gravedad del reproche.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምይእዜ
  english_pob_choice: From now on
  chosen_spanish: Desde ahora
  alternatives_spanish:
  - De ahora en adelante
  - Desde este momento
  lexicon: Dillmann
  rationale: Marca temporal que introduce una advertencia urgente. 'Desde ahora' es natural en español y conserva la orientación hacia lo que sigue.
- source_word: ታእምሩ
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - entiendan
  lexicon: Dillmann
  rationale: El imperativo plural encaja con una exhortación directa. 'Sepan' mantiene la fuerza admonitiva mejor que una formulación más suave.
- source_word: ግፍዕክሙ
  english_pob_choice: your violence
  chosen_spanish: toda su violencia
  alternatives_spanish:
  - toda su opresión
  - todo su agravio
  lexicon: Dillmann
  rationale: El término ge'ez puede abarcar violencia e injusticia opresiva. 'Violencia' conserva la gravedad del cargo; se añade 'toda' para reflejar la totalidad del acto acumulado sin cambiar el sentido.
- source_word: ዘትገፍዑ
  english_pob_choice: which you commit
  chosen_spanish: que cometen
  alternatives_spanish:
  - que hacen
  - que ejercen violentamente
  lexicon: Dillmann
  rationale: La cláusula relativa retoma la misma raíz y describe actos en curso. 'Que cometen' es natural en español y conserva el sentido de acciones perpetradas.
- source_word: ይጸሐፍ
  english_pob_choice: is being written down
  chosen_spanish: está siendo escrita
  alternatives_spanish:
  - se está registrando
  - está escrita
  lexicon: Dillmann
  rationale: El pasivo imperfectivo sugiere un registro continuo. En español, 'está siendo escrita' preserva la duratividad; se sobreentiende 'la' violencia por el contexto, evitando una traducción más libre como 'registrando'.
- source_word: በኵሉ ዕለት
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día tras día
  lexicon: Dillmann
  rationale: Equivale de manera clara y idiomática a la repetición diaria del registro.
- source_word: እስከ ዕለተ ኵነኔክሙ
  english_pob_choice: until the day of your judgment
  chosen_spanish: hasta el día de su juicio
  alternatives_spanish:
  - hasta el día de su sentencia
  - hasta el día de su condena
  lexicon: Dillmann
  rationale: '''Juicio'' reproduce el alcance esjatológico amplio de la frase. ''Sentencia'' o ''condena'' estrecharían indebidamente el matiz del texto fuente.'
theological_decisions:
- issue: Registro celestial de las obras
  english_pob_reading: The verse refers to ongoing recording of the wicked's violent acts in preparation for final judgment.
  chosen_spanish_reading: El versículo alude a un registro continuo de las acciones violentas en preparación para el juicio final.
  alternative_spanish_readings:
  - Las obras solo son recordadas de manera figurada
  - Se trata de un registro meramente humano
  rationale: La forma pasiva y durativa sostiene la imagen apocalíptica de actos anotados para el día del juicio. La redacción española la conserva sin explicarla en exceso.
  doctrine_reference: Preservar la imaginería apocalíptica del libro de registros y no reducirla a mera memoria retórica.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés, en especial la lectura de un registro continuo («is being written down every day») y la preferencia por un alcance amplio de «judgment» frente a «condemnation». Se evita calcar el inglés donde el español requiere una estructura más natural, pero sin debilitar la imagen apocalíptica ni el peso acusatorio del texto.
  spanish_consistency_notes:
  - Se usa «juicio» para ኵነኔ, en línea con el valor esjatológico amplio indicado por el inglés POB.
  - Se mantiene «violencia» como término principal para գፍዕ, con nota de posible matiz de opresión.
  - Se evita introducir «Cristo», «SEÑOR» u otras terminologías no presentes en el pasaje.
  - La pasiva progresiva en español se usa para conservar la continuidad del acto de escritura, aunque el original ge'ez no exige una calca sintáctica exacta.
