translation:
  language: es
  text: Y la esterilidad no fue dada a una mujer[a]; más bien[b], por la obra de sus manos, muere[c] sin hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la falta de hijos». El ge'ez denota infertilidad o carencia de descendencia.
    reason: lexical_alternative
  - marker: b
    text: 'O «sino». La partícula marca un contraste fuerte: no se trata de esterilidad, sino de la muerte como juicio efectivo.'
    reason: alternative_reading
  - marker: c
    text: 'El presente refleja el valor gnómico del imperfecto etiópico: expresa una verdad general, no necesariamente un hecho puntual del pasado.'
    reason: spanish_style_note
lexical_decisions:
- source_word: ምክነት
  english_pob_choice: barrenness
  chosen_spanish: esterilidad
  alternatives_spanish:
  - esterilidad
  - esterilidad reproductiva
  - esterilidad o falta de hijos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término etiópico denota infertilidad o falta de hijos. En español, «esterilidad» preserva el sentido reproductivo concreto y suena más natural que una paráfrasis extensa.
- source_word: ለብእሲት
  english_pob_choice: to the woman
  chosen_spanish: a una mujer
  alternatives_spanish:
  - a la mujer
  - para una mujer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto gnómico del pasaje favorece un referente general, no una mujer específica. «A una mujer» conserva esa generalidad y evita imponer definitud no marcada en el ge'ez.
- source_word: ኢተውህበት
  english_pob_choice: was not given
  chosen_spanish: no fue dada
  alternatives_spanish:
  - no le fue concedida
  - no fue otorgada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un pasivo de «dar». «No fue dada» sigue de cerca la fuerza transparente del original y mantiene el tono de algo asignado o adjudicado.
- source_word: አላ
  english_pob_choice: rather
  chosen_spanish: sino
  alternatives_spanish:
  - más bien
  - antes bien
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula marca contraste fuerte. En español, «sino» expresa mejor la oposición inmediata entre la esterilidad no asignada y el juicio real.
- source_word: በእንተ
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición introduce causa. «Por la obra de sus manos» mantiene la relación causal de forma natural en español sin perder el matiz etiológico.
- source_word: ግብረ እዴሃ
  english_pob_choice: the work of her hands
  chosen_spanish: la obra de sus manos
  alternatives_spanish:
  - las obras de sus manos
  - lo que hicieron sus manos
  - sus acciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es idiomática para obras o acciones. «La obra de sus manos» conserva la metáfora concreta y deja visible la carga moral del acto.
- source_word: ትመውት
  english_pob_choice: she dies
  chosen_spanish: muere
  alternatives_spanish:
  - morirá
  - va a morir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperfecto tiene fuerza gnómica. El presente «muere» comunica mejor un principio general en español que un futuro simple.
- source_word: ዘእንበለ ውሉድ
  english_pob_choice: childless
  chosen_spanish: sin hijos
  alternatives_spanish:
  - sin descendencia
  - sin prole
  - estéril
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase significa literalmente «sin hijos/descendencia». «Sin hijos» es claro, sobrio y mantiene el paralelismo con la esterilidad del inicio.
theological_decisions:
- issue: Generalidad del enunciado sobre la mujer
  english_pob_reading: 'The verse is a general statement: barrenness is not divinely allotted to a specific woman; rather, death follows from her deeds.'
  chosen_spanish_reading: 'El verso se entiende como una afirmación general: la esterilidad no le es asignada a una mujer específica; más bien, la muerte sobreviene a causa de sus obras.'
  alternative_spanish_readings:
  - Se refiere a una mujer concreta y a un juicio individual.
  - La esterilidad misma es el castigo, no la muerte.
  rationale: El ge'ez no marca definitud para «mujer» y el contexto inmediato usa formulaciones gnómicas. La traducción española conserva esa generalidad para no estrechar indebidamente el alcance del texto.
  doctrine_reference: Primacía del texto original y preservación de la tensión interpretativa sin resolverla artificialmente.
- issue: Relación entre esterilidad y muerte
  english_pob_reading: The Ge'ez wording contrasts barrenness with death as the actual judgment.
  chosen_spanish_reading: La traducción mantiene el contraste entre una esterilidad no dada y la muerte como juicio efectivo.
  alternative_spanish_readings:
  - La esterilidad y la muerte son equivalentes aquí.
  - La esterilidad es el juicio principal.
  rationale: La sintaxis opone explícitamente la ausencia de esterilidad concedida y la muerte consecuente. Conviene conservar ese contraste sin convertirlo en una sola idea.
  doctrine_reference: Mantener la tensión lexical y teológica del original; no homogeneizar el juicio.
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión que prefirió un presente gnómico («she dies») y luego lo condensó como «childless». La versión española sigue esa línea con un presente general («muere») y cierra con «sin hijos», manteniendo tanto la generalidad como la claridad.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no presentes porque el versículo no contiene el Tetragrámaton ni κύριος.
  - Se prefirió «esterilidad» y «sin hijos» para conservar el campo semántico reproductivo sin mezclarlo con otras ideas como desgracia general.
  - Se usó el presente gnómico «muere» para reflejar el valor sentencioso del original.
  - La puntuación con coma antes de «sino» y la coma tras «manos» ayudan a reproducir el contraste y la causalidad del texto fuente.
