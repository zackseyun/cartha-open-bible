    rationale: Dice «O “esterilidad”...», pero «esterilidad» ya está en el texto. Debe ofrecer una alternativa real como «falta de hijos» o «infecundidad».
  - severity: low
    issue: La nota [b] puede alinearse mejor con la razón documentada
    rationale: La auditoría inglesa registra «Or ‘more precisely/rather’» como alternativa de renderización previa; en español conviene centrar la nota en la alternativa «más bien» sin expandirla demasiado.
