  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Esterilidad» es aceptable para ምክነት en este contexto, aunque «esterilidad» y «falta de hijos» siguen siendo alternativas cercanas. «La obra de sus manos» conserva la decisión lexical documentada. No aparecen términos teológicos del glosario principal que requieran intervención.
