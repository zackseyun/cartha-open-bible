    rationale: Después de «Y la esterilidad no fue dada a una mujer», el giro «sino, por la obra de sus manos...» resulta menos idiomático. El ge'ez አላ y el English POB «rather» se reflejan mejor con «más bien», que preserva el contraste fuerte sin rigidez.
