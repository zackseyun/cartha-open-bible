translation:
  language: es
  text: Porque ustedes, hombres, aman el adorno en sí mismos más que las mujeres[a], y el trato más que una virgen; en la realeza, en la grandeza, en la autoridad, en la plata y el oro, en la púrpura[b], en el honor y en el alimento, serán derramados como agua[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La construcción de los dos grupos comparados es difícil en ge'ez. El sentido comparativo de «más que» sigue la revisión del texto; la frase puede sugerir también una asociación o indulgencia con mujeres y con una virgen.
    reason: lexical_alternative
  - marker: b
    text: «La púrpura» probablemente alude a tela o tinte costoso, símbolo habitual de lujo y estatus.
    reason: cultural_note
  - marker: c
    text: La imagen final puede significar que esos bienes se derramarán desperdiciadamente o que ellos mismos se desvanecerán como agua.
    reason: alternative_reading
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce una explicación o fundamento del reproche anterior. En español, «Porque» conserva bien la fuerza causal sin volver la frase artificial.
- source_word: አንትሙ ዕደው
  english_pob_choice: you men
  chosen_spanish: ustedes, hombres
  alternatives_spanish:
  - vosotros, hombres
  - hombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual aclara que se trata de un vocativo/dirigido a varones. «Ustedes, hombres» suena natural y mantiene el señalamiento directo.
- source_word: ሥነ
  english_pob_choice: adornment
  chosen_spanish: adorno
  alternatives_spanish:
  - belleza
  - ornato
  - adorno externo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El campo semántico apunta a belleza, adorno o embellecimiento. «Adorno» es fiel y más natural que un calco pesado.
- source_word: ፈድፋደ
  english_pob_choice: more than
  chosen_spanish: más que
  alternatives_spanish:
  - en mayor grado que
  - por encima de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación es el punto clave del adverbio repetido. «Más que» transmite la relación comparativa de forma directa.
- source_word: ኅብረ
  english_pob_choice: companionship
  chosen_spanish: la compañía
  alternatives_spanish:
  - compañerismo
  - asociación
  - trato
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede expresar unión, asociación o trato. «La compañía» preserva la idea de cercanía relacional sin introducir una interpretación más precisa de la que permite el texto.
- source_word: እምድንግል
  english_pob_choice: from a virgin
  chosen_spanish: más que una virgen
  alternatives_spanish:
  - con una virgen
  - por encima de una virgen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción comparativa del contexto exige el sentido «más que». En español, «una virgen» mantiene la referencia literal sin sobrerresolver la relación sintáctica.
- source_word: በመንንግሥት
  english_pob_choice: in kingship
  chosen_spanish: en la realeza
  alternatives_spanish:
  - en el reinado
  - en el poder real
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Realeza» comunica de forma natural el ámbito de la dignidad o condición real y encaja con la serie de ámbitos de lujo y status.
- source_word: ወበዕበይ
  english_pob_choice: and in greatness
  chosen_spanish: en la grandeza
  alternatives_spanish:
  - en la magnificencia
  - en la elevación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo admite magnitud, eminencia o grandeza. «Grandeza» es amplio y fiel.
- source_word: ወበሥልጣን
  english_pob_choice: and in authority
  chosen_spanish: en la autoridad
  alternatives_spanish:
  - en el poder
  - en el dominio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Autoridad» evita repetir «poder» y conserva la idea de rango o potestad gobernante.
- source_word: ወበብሩር
  english_pob_choice: and in silver
  chosen_spanish: en la plata
  alternatives_spanish:
  - en plata
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Elemento de riqueza literal en la lista. «La plata» mantiene el material precioso como símbolo de lujo.
- source_word: ወወርቅ
  english_pob_choice: and gold
  chosen_spanish: y el oro
  alternatives_spanish:
  - y oro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Coordinado con plata como bien de lujo. Se conserva el artículo por paralelismo estilístico en español.
- source_word: ወሜላት
  english_pob_choice: and purple
  chosen_spanish: y la púrpura
  alternatives_spanish:
  - y telas púrpuras
  - y paños púrpura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen apunta a un bien de lujo asociado a tinte o tela costosa. «La púrpura» conserva el valor cultural del símbolo sin expandirlo innecesariamente en el texto principal.
- source_word: ወክብር
  english_pob_choice: and honor
  chosen_spanish: el honor
  alternatives_spanish:
  - la honra
  - la gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta serie de bienes y prestigio, «honor» resulta más sobrio y fiel que «gloria», que en español puede sonar más teológica.
- source_word: ወመብልዕት
  english_pob_choice: and in food
  chosen_spanish: el alimento
  alternatives_spanish:
  - la comida
  - los banquetes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo remite a comida o alimento. «El alimento» conserva literalidad y permite la carga de indulgencia sugerida por el contexto.
- source_word: ከመ ማይ ይትከዐዉ
  english_pob_choice: they will be poured out like water
  chosen_spanish: serán derramados como agua
  alternatives_spanish:
  - se derramarán como agua
  - se desharán como agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El cierre presenta una imagen de derramamiento/dilapidación. «Serán derramados» conserva la pasiva y el carácter vívido de la comparación.
theological_decisions:
- issue: 'La comparación central entre hombres y mujeres/virgen: ¿adorno, conducta o relaciones ilícitas?'
  english_pob_reading: 'The main line is rendered to preserve both: excess associated with women/virgins and a broader catalogue of royal, material, and culinary luxury.'
  chosen_spanish_reading: La traducción principal conserva la comparación explícita entre el adorno/compañía y los referentes femeninos, sin cerrar el texto a una sola lectura moral.
  alternative_spanish_readings:
  - Una lectura centrada en relaciones sexuales ilícitas
  - Una lectura centrada en el lujo y la ostentación social
  rationale: El ge'ez y el contexto permiten una denuncia amplia de la autoindulgencia, pero también dejan espacio para una connotación de conducta sexual desordenada. Conviene no resolver la tensión en el texto principal.
  doctrine_reference: Preservar la tensión interpretativa del pasaje, sin dogmatizar una sola lectura.
- issue: Valor de la lista de riquezas y estatus
  english_pob_reading: in kingship and in greatness and in authority and in silver and gold and purple and honor and in food
  chosen_spanish_reading: La lista se mantiene como catálogo de prestigio, riqueza y consumo, no como mera enumeración neutral.
  alternative_spanish_readings:
  - Lista de lujos materiales
  - Lista de rasgos de poder político
  rationale: El pasaje acumula ámbitos de poder y lujo para intensificar el reproche. La traducción debe mantener esa acumulación retórica.
  doctrine_reference: Retórica profética de denuncia del lujo y la soberbia.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la lectura previa de ዕደው como «hombres», ሥነ como «adorno» y ፈድፋደ como comparativo «más que». La traducción final sigue esa adjudicación y evita la antigua interpretación errónea de «deeds/excess». También se ajustó ክብር a «honor» según el pass final, y se conservó la pasiva del cierre.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aplica.
  - Se evitó «Cristo» y «SEÑOR» porque no aparecen en este versículo.
  - Se mantuvo un registro sobrio y eclesial, pero no arcaizante.
  - Se tradujeron las comparaciones con una sintaxis española natural sin perder la estructura acumulativa del original.
