translation:
  language: es
  text: Por tanto, no tienen instrucción[a] ni sabiduría; y por eso perecerán junto con sus posesiones, y con toda su gloria y su honor[c]. Y en vergüenza, y en matanza, y en gran destitución[b], sus espíritus serán arrojados al horno de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'enseñanza' para 'instrucción'. La pareja 'instrucción y sabiduría' probablemente funciona como una sola categoría sapiencial más que como dos ideas totalmente separadas.
    reason: lexical_alternative
  - marker: b
    text: La frase traducida 'gran destitución' es difícil; también puede entenderse más ampliamente como 'gran miseria' o 'gran aflicción'.
    reason: lexical_alternative
  - marker: c
    text: 'O: ''no tienen instrucción ni sabiduría; y por eso perecerán junto con sus posesiones, con toda su gloria''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ትምህርት
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - enseñanza
  - disciplina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto sapiencial y de juicio, el término expresa algo recibido que guía la conducta; 'instrucción' conserva bien la pareja con 'sabiduría' sin forzar una imagen escolar.
- source_word: ጥበብ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - habilidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí se trata de sabiduría moral y práctica, no de pericia técnica. 'Sabiduría' mantiene el valor categorial del par con 'instrucción'.
- source_word: ይትሐጐሉ
  english_pob_choice: they will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - desaparecerán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un oráculo de juicio, 'perecerán' transmite una pérdida real y solemne sin especificar más de lo que el texto dice.
- source_word: ኅቡረ ምስለ
  english_pob_choice: together with
  chosen_spanish: juntamente con
  alternatives_spanish:
  - junto con
  - en compañía de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción subraya una misma suerte compartida con sus posesiones y honores; 'juntamente con' suena natural y conserva ese énfasis.
- source_word: ንዋያቲሆሙ
  english_pob_choice: their possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus bienes
  - sus riquezas
  - su propiedad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término abarca bienes materiales en general; 'posesiones' evita restringirlo a dinero o riqueza líquida.
- source_word: ስብሐቶሙ
  english_pob_choice: their glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su esplendor
  - su fama
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Gloria'' preserva el registro elevado y el contraste irónico entre honor humano y juicio.'
- source_word: ክብሮሙ
  english_pob_choice: their honor
  chosen_spanish: su honor
  alternatives_spanish:
  - su dignidad
  - su estima
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Distingue el estatus social o público de 'gloria'; 'honor' mantiene el paralelismo visible en español.
- source_word: በጽእለት
  english_pob_choice: in shame
  chosen_spanish: en vergüenza
  alternatives_spanish:
  - en humillación
  - en deshonra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión marca la condición en que caen bajo juicio. 'Vergüenza' es directa y comprensible en español.
- source_word: በቅትል
  english_pob_choice: in slaughter
  chosen_spanish: en matanza
  alternatives_spanish:
  - en muerte violenta
  - en derramamiento de sangre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el tono duro y acumulativo de los términos de juicio con un sustantivo breve y fuerte.
- source_word: በንዴት ዐቢይ
  english_pob_choice: in great destitution
  chosen_spanish: en gran destitución
  alternatives_spanish:
  - en gran miseria
  - en gran aflicción
  - en gran pobreza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque la frase es difícil, el contexto de pérdida de bienes y honor favorece un matiz de carencia severa; 'destitución' preserva ese peso material-social.
- source_word: ትትወደይ መንፈሶሙ
  english_pob_choice: their spirits will be cast
  chosen_spanish: sus espíritus serán arrojados
  alternatives_spanish:
  - sus espíritus serán lanzados
  - sus espíritus serán echados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo indica una consignación forzosa. 'Arrojados' comunica la violencia del gesto apocalíptico sin añadir detalles no presentes.
- source_word: እቶነ እሳት
  english_pob_choice: the furnace of fire
  chosen_spanish: el horno de fuego
  alternatives_spanish:
  - el horno ardiente
  - el horno ígneo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Horno de fuego'' sigue de cerca la imagen ge''ez y conserva su fuerza sin convertirla en una paráfrasis más general.'
theological_decisions:
- issue: Relación entre la falta presente de instrucción/sabiduría y el castigo futuro
  english_pob_reading: Therefore they have no instruction or wisdom; and because of this they will perish...
  chosen_spanish_reading: Por tanto, no tienen instrucción ni sabiduría; y por eso perecerán...
  alternative_spanish_readings:
  - Por tanto, carecen de instrucción y sabiduría; y por eso perecerán...
  - Por tanto, no recibirán instrucción ni sabiduría; y por eso perecerán...
  rationale: El ge'ez presenta una carencia actual ('no tienen') que fundamenta la destrucción futura. Traducirlo así preserva la relación causal y evita mover el sentido hacia un futuro incierto.
  doctrine_reference: Preservar la tensión causal del juicio sin resolverla reductivamente.
- issue: Destino final de los 'espíritus'
  english_pob_reading: their spirits will be cast into the furnace of fire
  chosen_spanish_reading: sus espíritus serán arrojados al horno de fuego
  alternative_spanish_readings:
  - sus almas serán arrojadas al fuego
  - ellos mismos serán destruidos en el fuego
  rationale: El objeto explícito del texto es 'espíritus'; conviene mantener esa referencia, incluso si deja abierta la cuestión del estado postmórtem y del modo exacto de castigo.
  doctrine_reference: Preservar la tensión teológica entre juicio postmórtem y destrucción, sin armonizarla artificialmente.
translation_notes:
  revision_awareness: La base inglesa revisada eliminó duplicaciones accidentales y fijó la cláusula final con 'their spirits will be cast into the furnace of fire'. La versión española sigue esa revisión, conserva la secuencia causal del inicio y mantiene la acumulación de términos de juicio sin duplicaciones.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero aquí no aparece el tetragrámaton ni una cita directa de κύριος.
  - Se prefirió 'espíritus' en coherencia con el sustantivo ge'ez correspondiente y con la lectura auditada del inglés.
  - Se evitó 'Cristo'/'Mesías' porque no intervienen en este verso.
  - Se preservó la repetición retórica de 'y' antes de la serie final para reflejar la acumulación del original.
  - '''Gran destitución'' se deja con nota por su dificultad semántica, en lugar de suavizarla a una equivalencia más interpretativa.'
