translation:
  language: es
  text: Y vi escrito sobre ellos que generación tras generación transgredirá, hasta que surja una generación de justicia, y la iniquidad será destruida, y el pecado desaparecerá de la tierra, y todo lo bueno vendrá sobre ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma perfecta de primera persona expresa una visión reportada. «Vi» conserva la sencillez del marcador apocalíptico y evita cargarlo con matices no presentes en el ge'ez.
- source_word: ጽሑፈ
  english_pob_choice: written
  chosen_spanish: escrito
  alternatives_spanish:
  - inscrito
  - redactado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El participio pasivo pide una forma natural en español. «Escrito» es directo y transparente; «inscrito» puede sugerir una imagen más material de grabado, pero el contexto admite simplemente un texto escrito.
- source_word: በላዕሌሆሙ
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - acerca de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre ellos» sigue de cerca la relación espacial del original y funciona bien con la imagen de lo escrito sobre un soporte o registro.
- source_word: ትውልድ እምትውልድ
  english_pob_choice: generation after generation
  chosen_spanish: generación tras generación
  alternatives_spanish:
  - de generación en generación
  - generación después de generación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición intensiva del giro ge'ez se reproduce con una locución idiomática española equivalente. «Generación tras generación» mantiene el valor durativo y acumulativo.
- source_word: ትኤብስ
  english_pob_choice: will transgress
  chosen_spanish: se rebelará
  alternatives_spanish:
  - pecará
  - traspasará la ley
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez admite la idea de apartarse / actuar con impiedad. «Se rebelará» conserva una fuerza moral y relacional sin reducirlo solo a «pecar»; «traspasará la ley» sería demasiado explicativo en español.
- source_word: ትውልደ ጽድቅ
  english_pob_choice: a generation of righteousness
  chosen_spanish: una generación de justicia
  alternatives_spanish:
  - una generación de rectitud
  - una generación justa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Justicia» mantiene el sustantivo abstracto del original y respeta el contraste escatológico con la iniquidad y el pecado. «Rectitud» es posible, pero menos natural en este paralelismo; «justa» debilita la estructura nominal.
- source_word: አበሳ
  english_pob_choice: iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la maldad
  - la perversidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Iniquidad» es la equivalencia más estable para el registro bíblico-jurídico del término y conserva el peso moral y forense del pasaje.
- source_word: ኀጢአት
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - la falta
  - la culpa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pecado» es la correspondencia más directa y comprensible. Se distingue bien de «iniquidad» en el paralelismo sin forzar una sinonimia total.
- source_word: ሠናይ
  english_pob_choice: every good thing
  chosen_spanish: todo bien
  alternatives_spanish:
  - todo lo bueno
  - todo bien que hay
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término abarca bondad/bien. «Todo bien» reproduce la amplitud del sustantivo sin añadir un objeto implícito que el texto no precisa.
theological_decisions:
- issue: El alcance del juicio escatológico y la restauración final
  english_pob_reading: And every good thing comes upon it.
  chosen_spanish_reading: y todo bien venga sobre ella.
  alternative_spanish_readings:
  - y todo lo bueno venga sobre ella
  - y todo bien caerá sobre ella
  rationale: 'El pasaje culmina en una inversión escatológica: el mal desaparece y el bien llega a la tierra. «Venga sobre ella» preserva el movimiento descendente/sobrehumano del original y la metáfora de cobertura o llegada total.'
  doctrine_reference: 'Escatología bíblica: consumación del juicio y restauración de la creación.'
- issue: La distinción entre 'iniquidad' y 'pecado' en el paralelismo
  english_pob_reading: and iniquity is destroyed, and sin passes away from the earth
  chosen_spanish_reading: y la iniquidad sea destruida, y el pecado desaparezca de la tierra
  alternative_spanish_readings:
  - y la maldad sea destruida, y el pecado se quite de la tierra
  - y la iniquidad sea eliminada, y el pecado pase de la tierra
  rationale: Mantener dos términos distintos evita borrar el paralelismo del texto. «Iniquidad» y «pecado» pueden solaparse teológicamente, pero aquí funcionan como intensificación poética y jurídica.
  doctrine_reference: Lenguaje profético/apocalíptico de purificación moral y erradicación del mal.
- issue: El valor de 'generation after generation will transgress'
  english_pob_reading: generation after generation will transgress
  chosen_spanish_reading: generación tras generación se rebelará
  alternative_spanish_readings:
  - generación tras generación pecará
  - generación tras generación transgredirá
  rationale: «Se rebelará» expresa con fuerza el apartamiento persistente del orden divino y evita un tecnicismo español que suene demasiado académico. No borra la idea de transgresión, sino que la hace audible en español contemporáneo.
  doctrine_reference: 'Antropología bíblica: persistencia del pecado humano antes de la renovación final.'
translation_notes:
  revision_awareness: La base ge'ez corregida amplía considerablemente el verse text respecto al OCR/Charles 1906 truncado; la traducción española sigue la forma restaurada que incluye la visión escrita sobre ellos, la sucesión de generaciones, la aparición de una generación de justicia y el cierre con la desaparición del pecado y la llegada de todo bien. No se adopta la lectura truncada 'Y vi.' porque el expediente de revisión la marcó como omisión mayor y la fuente restaurada la corrige.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este verso no contiene el tetragrámaton ni una sustitución por κύριος.
  - «Justicia» se usa para ጽድቅ por coherencia con el valor abstracto y escatológico del término.
  - «Iniquidad» y «pecado» se conservan como dos términos distintos para no nivelar el paralelismo.
  - El registro se mantiene bíblico pero claro, evitando el arcaísmo innecesario de «he aquí» o «contemplé».
