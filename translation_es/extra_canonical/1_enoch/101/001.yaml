  rationale: 'Se ajusta el texto al español neutral latinoamericano usando formas de mandato plurales no peninsulares (''Observen'', ''témanle'', ''no hagan''). También se corrige la nota [a] para que refleje la alternativa preservada en la auditoría inglesa: una lectura de ''preguntar/inquirir'' con ''acerca de toda obra'', en vez de un simple sinónimo de la lectura principal. Se mantiene ''hijos del cielo'', ''Altísimo'' y ''delante de él'' por fidelidad y claridad.'
