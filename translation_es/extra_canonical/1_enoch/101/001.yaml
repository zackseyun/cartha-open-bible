    rationale: El uso de 'Observad... temedle... hagáis' corresponde al plural de 'vosotros', más propio de España. El encargo pide español neutral latinoamericano / ampliamente legible en iglesia. Conviene ajustar a 'Observen... témanle... no hagan...'.
