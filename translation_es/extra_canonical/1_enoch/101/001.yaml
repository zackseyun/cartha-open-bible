translation:
  language: es
  text: Observen el cielo[a], hijos del cielo, y toda obra del Altísimo; y témanle[b], y no hagan el mal delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pregunten al cielo, hijos del cielo, acerca de toda obra del Altísimo».

      '
    reason: lexical_alternative
  - marker: b
    text: 'O: «y reveréncienlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ጠይቅዋ
  english_pob_choice: Observe
  chosen_spanish: Observad
  alternatives_spanish:
  - Considerad
  - Mirad
  - Examinad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo en este contexto, según la revisión auditada, expresa observar o considerar, no 'preguntar'. 'Observad' conserva el imperativo plural y la fuerza exhortativa sin introducir una interpretación ajena.
- source_word: ለሰማይ
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo celestial
  - el firmamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el contexto es apocalíptico, en español 'cielo' comunica bien el ámbito cósmico y puede funcionar como objeto de observación. Se evita 'firmamento' porque estrecha el sentido físico y no refleja tan bien el registro del texto.
- source_word: ውሉደ ሰማይ
  english_pob_choice: you sons of heaven
  chosen_spanish: hijos del cielo
  alternatives_spanish:
  - hijos del cielo
  - hijos de los cielos
  - seres del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la expresión idiomática y su ambigüedad retórica. 'Hijos del cielo' suena natural en español y mantiene la tensión interpretativa sin resolver si designa humanos o seres celestiales.
- source_word: ወኵሎ ግብር
  english_pob_choice: every work
  chosen_spanish: toda obra
  alternatives_spanish:
  - toda obra
  - todo acto
  - toda acción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Obra'' preserva el alcance amplio de ''work'' y encaja con la construcción ''obra del Altísimo''. Se evita restringirlo a actos morales o a simples actividades.'
- source_word: ለልዑል
  english_pob_choice: of the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Altísimo
  - del Más Alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Altísimo'' es la forma española estable y reverente para el título divino, equivalente a ''the Most High''.'
- source_word: ወፍርሁ እምኔሁ
  english_pob_choice: and fear him
  chosen_spanish: y temedle
  alternatives_spanish:
  - y temedle
  - y temed a él
  - y reverenciadle
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo con pronombre enclítico reproduce el carácter directo y reverente del mandato. 'Temedle' conserva la tensión bíblica entre temor y reverencia sin suavizarla demasiado.
- source_word: ወኢትግበሩ እኩየ በቅድሜሁ
  english_pob_choice: and do not do evil before him
  chosen_spanish: y no hagáis el mal delante de él
  alternatives_spanish:
  - y no hagáis el mal delante de él
  - y no cometáis maldad en su presencia
  - y no obréis mal ante él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hacer el mal'' reproduce con naturalidad la prohibición y mantiene la relación espacial-relacional ''delante de él''. Se prefiere esta forma por claridad y fidelidad al ritmo del mandato.'
theological_decisions:
- issue: Ambigüedad de 'hijos del cielo'
  english_pob_reading: Retained as a literal address, without resolving whether this refers metaphorically to humans or to more exalted beings.
  chosen_spanish_reading: Se conserva 'hijos del cielo' sin aclarar la identidad de los destinatarios.
  alternative_spanish_readings:
  - hijos del cielo
  - seres celestiales
  - hombres del cielo
  rationale: El texto mantiene una ambigüedad significativa que no debe resolverse en la traducción. El español conserva la misma apertura interpretativa.
  doctrine_reference: Preservar la tensión teológica en vez de cerrarla interpretativamente.
translation_notes:
  revision_awareness: La revisión auditada corrigió una lectura previa de 'ask' a 'observe', indicando que el verbo ge'ez aquí exige un mandato de observar/considerar. También corrigió la sintaxis para que 'y toda obra del Altísimo' sea un objeto directo coordinado, no un complemento introducido por 'about'. La versión española sigue esa corrección y evita resolver la ambigüedad de 'hijos del cielo'.
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' como título divino estándar y reverente.
  - 'Se conserva el paralelismo imperativo: observar / temer / no hacer el mal.'
  - Se evita una traducción que convierta la primera cláusula en 'preguntar' o 'inquirir', en línea con la corrección del audit trail.
  - El pronombre enclítico en 'temedle' mantiene fluidez española y referencia clara a Dios.
  - '''Delante de él'' reproduce el valor relacional de ''before him'' sin perder naturalidad.'
