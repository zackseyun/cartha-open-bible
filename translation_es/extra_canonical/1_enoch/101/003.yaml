translation:
  language: es
  text: Y si él envía su ira sobre ustedes por todas sus obras[a], ¿no le rogarán? Pues hablan palabras grandes y duras[b][c] contra su justicia, y no tienen paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque ustedes no son los que pueden buscar su favor». El verbo ge''ez también puede expresar súplica o imploración.'
    reason: lexical_alternative
  - marker: b
    text: «Su justicia» también puede entenderse aquí como «su rectitud» o «su justo actuar»; el contexto es de juicio.
    reason: theological_note
  - marker: c
    text: 'O: «ustedes no son los que pueden rogarle».'
    reason: previous_rendering
lexical_decisions:
- source_word: ፈነወ
  english_pob_choice: sends
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - desata
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa el envío o hacer venir sobre alguien; «envía» conserva esa dirección activa sin añadir más interpretación de la necesaria.
- source_word: መዐቶ
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - ira ardiente
  - furia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «ira» comunica bien la fuerza judicial del pasaje. «Ira» es más natural que «furia» y evita sobrecargar el tono.
- source_word: በኵሉ ምግባሪክሙ
  english_pob_choice: for all your deeds
  chosen_spanish: por todas sus obras
  alternatives_spanish:
  - por todas sus acciones
  - a causa de todas sus obras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición causal está implícita en el contexto de juicio. «Por todas sus obras» mantiene la relación causal y el sentido moral del conjunto de la conducta.
- source_word: ታስተበቍዕዎ
  english_pob_choice: can entreat him
  chosen_spanish: lo rogarán
  alternatives_spanish:
  - le suplicarán
  - podrán implorarle
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El contexto retórico es una pregunta que espera una respuesta afirmativa: acudirán a suplicarle. «Rogar» transmite la idea de súplica personal con tono digno y bíblico en español.'
- source_word: ጽድቅ ዚአሁ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia recta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el contexto es judicial y de condena; en español «justicia» comunica mejor ese marco que «rectitud». Mantiene la tensión entre el valor moral y el acto de juzgar.
- source_word: ዐቢይተ ወጽኑዓተ
  english_pob_choice: great and harsh words
  chosen_spanish: palabras grandes y duras
  alternatives_spanish:
  - palabras grandes y ásperas
  - palabras fuertes y duras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la forma literal del idiomatismo etiópico, que el audit trail identifica como fórmula enóquica técnica. «Duras» mantiene la dureza/aspereza sin domesticar el giro.
- source_word: አልብክሙ ሰላመ
  english_pob_choice: you have no peace
  chosen_spanish: no tienen paz
  alternatives_spanish:
  - no hay paz para ustedes
  - ustedes no tienen paz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula breve de juicio se expresa de forma natural y directa en español. «No tienen paz» conserva la concisión del original.
theological_decisions:
- issue: Cómo reflejar el sujeto implícito de la ira enviada
  english_pob_reading: he sends his wrath
  chosen_spanish_reading: él envía su ira
  alternative_spanish_readings:
  - Dios envía su ira
  - Yahvé envía su ira
  rationale: El ge'ez usa un sujeto pronominal implícito. En español, «él» mantiene esa misma indeterminación gramatical y evita introducir un nombre divino que el texto no especifica explícitamente.
  doctrine_reference: Primacía del idioma original sobre la explicitación interpretativa
- issue: Si ጽድቅ debe ir como 'justicia' o 'justicia/rectitud'
  english_pob_reading: his righteousness
  chosen_spanish_reading: su justicia
  alternative_spanish_readings:
  - su rectitud
  - su justicia recta
  rationale: En este contexto de juicio, la ofensa recae sobre la justicia de Dios entendida como su recto actuar y veredicto. «Justicia» es la forma española más clara para ese campo semántico, sin perder la carga moral.
  doctrine_reference: Rendición contextual de términos de justicia
- issue: Cómo traducir la pregunta retórica sobre la súplica
  english_pob_reading: will you not entreat him?
  chosen_spanish_reading: ¿acaso no lo rogarán?
  alternative_spanish_readings:
  - ¿acaso no lo suplicarán?
  - ¿no lo implorarán?
  rationale: La revisión del audit trail corrige una lectura negativa equivocada. El texto pregunta retóricamente si, bajo juicio, ellos no acudirán a rogarle; en español conviene conservar ese valor expectativo con una pregunta retórica natural.
  doctrine_reference: Lectura interrogativa del አኮ en contexto retórico
- issue: Cómo manejar ዐቢይተ ወጽኑዓተ como idiomatismo enóquico
  english_pob_reading: great and harsh words
  chosen_spanish_reading: palabras grandes y duras
  alternative_spanish_readings:
  - palabras grandes y ásperas
  - palabras fuertes y duras
  rationale: El audit trail advierte contra una paráfrasis moralizante como «orgullosas e insolentes». Mantener el paralelismo literal preserva la tensión lexical y el posible eco técnico del idiomatismo.
  doctrine_reference: Respeto de idiomatismos y tensiones léxicas del texto
translation_notes:
  revision_awareness: 'El audit trail registra una revisión importante: la frase equivalente a «you are not those who can entreat him» fue corregida a una pregunta retórica afirmativa («will you not entreat him?»). También se corrigió la paráfrasis «proud and insolent words» por la lectura más literal e idiomática «great and harsh words». La presente propuesta sigue esas revisiones y mantiene el sujeto implícito del original, sin añadir un nombre divino explícito.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, pero aquí no se introduce porque el ge'ez conserva un sujeto pronominal implícito y el contexto ya lo identifica sin necesidad de explicitarlo.
  - Se usa «justicia» para ጽድቅ en coherencia con el patrón del proyecto, pero se reconoce la alternativa semántica «rectitud» en la nota.
  - Se conserva la literalidad de «palabras grandes y duras» para no borrar el idiomatismo enóquico señalado por el audit trail.
  - Se evita «siervo»/«señor» y otras formulaciones no presentes en el texto base.
  - Se opta por una pregunta retórica en español para reflejar el valor interrogativo de አኮ en este contexto.
