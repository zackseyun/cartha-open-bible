    rationale: La nota dice ««Su justicia» también puede entenderse aquí como «su justicia»...», lo cual no informa al lector. Debe contrastar claramente «justicia» con «rectitud» o «justo actuar».
  - severity: low
    issue: Acumulación de notas c-d-b sobre una sola frase
    rationale: Tres marcadores consecutivos en una frase breve cargan innecesariamente la lectura. Tras corregir la nota d y depurar la b, puede mantenerse solo lo que realmente aporta.
