    issue: La nota [c] está anclada a «ustedes», pero su contenido explica el inicio «Si» frente a «And if».
    rationale: El marcador debe aparecer en el lugar pertinente del texto. Tal como está, crea una asociación errónea para el lector y no refleja la disciplina de notas del proyecto.
