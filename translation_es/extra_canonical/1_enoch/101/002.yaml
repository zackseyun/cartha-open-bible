translation:
  language: es
  text: Si[c] él cierra las ventanas del cielo[a] y retiene la lluvia y el rocío, de modo que no descienda sobre la tierra por causa de ustedes, ¿qué harán[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen de «las ventanas del cielo» refleja un lenguaje cosmológico antiguo para el origen de la lluvia; se conserva la imagen en vez de convertirla en una expresión meteorológica moderna.
    reason: cultural_note
  - marker: b
    text: 'La pregunta final es retórica. También puede traducirse de forma más literal: «¿qué es lo que harán?».'
    reason: lexical_alternative
  - marker: c
    text: La versión inglesa previa permitía «And if he shuts»; el ajuste textual preferido aquí sigue el ge'ez, que empieza simplemente con «Si».
    reason: textual_variant
lexical_decisions:
- source_word: ዐፀወ
  english_pob_choice: shuts
  chosen_spanish: cierra
  alternatives_spanish:
  - sella
  - cierra de golpe
  - barre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cierra» expresa con naturalidad la acción concreta de cerrar y conserva la imagen apocalíptica de una apertura celestial. Evita un giro más pesado como «sella», que introduciría una matización no exigida por el texto.
- source_word: መስኮተ ሰማይ
  english_pob_choice: the windows of heaven
  chosen_spanish: las ventanas del cielo
  alternatives_spanish:
  - las aberturas del cielo
  - las ventanas de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la imagen cosmológica tradicional sin reducirla a una explicación meteorológica. «Del cielo» suena natural en español y mantiene el valor imagístico del original.
- source_word: ከለአ ዝናመ
  english_pob_choice: withholds the rain
  chosen_spanish: retiene la lluvia
  alternatives_spanish:
  - restringe la lluvia
  - detiene la lluvia
  - contiene la lluvia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Retiene» comunica la idea de impedir que algo se dé o se libere, con un tono bíblico claro en español. Mantiene la agencia divina implícita sin añadir interpretación.
- source_word: ወጠለ
  english_pob_choice: and the dew
  chosen_spanish: y el rocío
  alternatives_spanish:
  - y el rocío de la mañana
  - y el relente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Rocío» es la equivalencia más directa y comprensible para el segundo elemento de humedad agrícola. Conservar el paralelo con «lluvia» y «rocío» refleja la acumulación del juicio sobre la fertilidad.
- source_word: ከመ ኢይረድ ዲበ ምድር
  english_pob_choice: so that it does not come down upon the earth
  chosen_spanish: de modo que no desciendan sobre la tierra
  alternatives_spanish:
  - para que no caigan sobre la tierra
  - de manera que no bajen a la tierra
  - para que no descendiera sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural verbal en español puede abarcar lluvia y rocío como conjunto, sin perder claridad. «Desciendan sobre la tierra» conserva el movimiento vertical del texto y su registro elevado.
- source_word: በእንቲአክሙ
  english_pob_choice: because of you
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - a causa de ustedes
  - por ustedes
  - debido a ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Por causa de ustedes» transmite con precisión el matiz causal/judicial del pasaje. Se mantiene el tono de consecuencia y responsabilidad colectiva implícito en la escena.
- source_word: ሚሀለወክሙ ትግበሩ
  english_pob_choice: what will you do?
  chosen_spanish: ¿qué harán?
  alternatives_spanish:
  - ¿qué harán entonces?
  - ¿qué es lo que harán?
  - ¿qué podrán hacer?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pregunta funciona como desafío retórico sobre la impotencia humana frente al juicio divino. «¿Qué harán?» es fiel, sobrio y evita añadir un adverbio interpretativo que el texto revisado no requiere.
theological_decisions:
- issue: Sujeto implícito de la acción de cerrar el cielo
  english_pob_reading: Render the subject as singular 'he' rather than explicitly 'God' or 'the Lord.'
  chosen_spanish_reading: Conservar «él» sin explicitar «Dios» o «el Señor».
  alternative_spanish_readings:
  - Dios cierra las ventanas del cielo
  - El Señor cierra las ventanas del cielo
  rationale: El ge'ez presenta un sujeto singular no nombrado en este versículo. Mantener «él» respeta la sintaxis inmediata y evita resolver en la traducción una referencia que el texto no explicita, preservando la tensión teológica del pasaje.
  doctrine_reference: Primacía del texto fuente y preservación de la ambigüedad referencial cuando el original no nombra al agente.
translation_notes:
  revision_awareness: 'El contexto de revisión del POB inglés corrigió una lectura previa con «And if» a «If he shuts», y eliminó la adición interpretativa de «then». La redacción española sigue esa revisión: inicia con «Si», no añade equivalente de «then», y conserva la secuencia condicional y la pregunta retórica sin amplificaciones.'
  spanish_consistency_notes:
  - Se mantiene «ventanas del cielo» de forma consistente con la imaginería bíblica preservada por el POB inglés.
  - «Rocío» se usa como equivalente natural y directo de ወጠለ, sin sustituirlo por un término explicativo.
  - Se conserva el sujeto implícito «él» para reflejar la ausencia de un nombre divino explícito en el versículo.
  - La puntuación prioriza la fluidez formal española y mantiene la pregunta final como desafío retórico.
