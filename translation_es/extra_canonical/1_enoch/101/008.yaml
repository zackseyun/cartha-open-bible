revisions:
- from: ¿No fue él quien hizo el cielo y la tierra y todo lo que hay en ellos? ¿Quién dio instrucción y sabiduría a todos los que se mueven sobre la tierra y a los que están en el mar?[a][b][c]
  to: ¿No fue él quien hizo el cielo y la tierra y todo lo que hay en ellos? ¿Quién fue el que dio instrucción y sabiduría a todos los que se mueven sobre la tierra y a los que están en el mar?[a][b]
  rationale: Se ajusta la segunda pregunta a «¿Quién fue el que dio…?» para conservar en español la continuidad retórica con el antecedente ya introducido («él») y evitar que suene como una pregunta independiente de identificación. Se elimina la nota c porque documenta una alternativa («¿y quién dio?») que la auditoría inglesa ya descartó por no corresponder al ge'ez. Se mantienen las demás decisiones léxicas y notas, que son fieles y naturales.
