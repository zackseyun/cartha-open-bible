translation:
  language: es
  text: ¿No fue él quien hizo el cielo y la tierra y todo lo que hay en ellos? ¿Quién fue el que dio instrucción y sabiduría a todos los que se mueven sobre la tierra y a los que están en el mar?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «y todo lo que está dentro de ellos».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «los que están en el mar» puede aludir a marineros o, de manera más amplia, a quienes están asociados con el mar; el ge'ez es conciso.
    reason: lexical_alternative
lexical_decisions:
- source_word: አኮኑ
  english_pob_choice: Was it not
  chosen_spanish: ¿No fue
  alternatives_spanish:
  - ¿No es
  - ¿No fue acaso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pregunta retórica en ge'ez espera asentimiento; en español, el pretérito mantiene la referencia a la acción ya realizada de crear y dar, y conserva el tono enfático sin añadir materia interpretativa.
- source_word: ገብረ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - creó
  - fabricó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo es amplio y no exige el término técnico 'crear'. 'Hizo' reproduce esa amplitud y funciona naturalmente en español con el paralelismo de la pregunta retórica.
- source_word: ሰማየ ወምድረ
  english_pob_choice: heaven and earth
  chosen_spanish: el cielo y la tierra
  alternatives_spanish:
  - los cielos y la tierra
  - el cielo y la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, el singular colectivo 'el cielo y la tierra' es idiomático y conserva la merisma de toda la creación. Evita una pluralización no exigida por el ge'ez.
- source_word: ወኵሎ ዘሀሎ ውስቴቶሙ
  english_pob_choice: and everything that is in them
  chosen_spanish: y todo lo que hay en ellos
  alternatives_spanish:
  - y todo lo que está en ellos
  - y todo cuanto hay dentro de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase totalizante se traduce de forma natural sin perder el referente a 'el cielo y la tierra'. 'Hay en ellos' mantiene amplitud y evita un giro forzado.
- source_word: ወሀበ
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - ha dado
  - otorgó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto simple coordina bien con 'hizo' y reproduce la secuencia de acciones pasadas en la pregunta retórica.
- source_word: ትምህርተ
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - enseñanza
  - dirección
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Instrucción'' conserva el sentido de enseñanza impartida o guía comunicada, más cercano al sustantivo ge''ez que un abstracto como ''conocimiento''.'
- source_word: ጥበበ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - prudencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sabiduría'' es la equivalencia más natural y teológicamente reconocible en este contexto sapiencial-apocalíptico.'
- source_word: ለኵሉ እለ ይትኀወሱ ዲበ ምድር
  english_pob_choice: to all who move upon the earth
  chosen_spanish: a todos los que se mueven sobre la tierra
  alternatives_spanish:
  - a todos los que caminan sobre la tierra
  - a todos los que habitan sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Se mueven'' refleja el matiz amplio del verbo, que sugiere desplazamiento o actividad, no solo residencia. Conserva la amplitud del destinatario sin restringirlo a humanos.'
- source_word: ወለእለ ባሕር
  english_pob_choice: and to those in the sea
  chosen_spanish: y a los que están en el mar
  alternatives_spanish:
  - y a los que están en el mar
  - y a los que están en el mar o asociados al mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''En el mar'' sigue de cerca la revisión inglesa más reciente y mantiene el contraste con los que se mueven sobre la tierra. En español, ''mar'' es más natural que ''marino'' o una explicación más extensa.'
theological_decisions:
- issue: Alcance de los destinatarios de la instrucción y la sabiduría
  english_pob_reading: to all who move upon the earth and to those in the sea
  chosen_spanish_reading: a todos los que se mueven sobre la tierra y a los que están en el mar
  alternative_spanish_readings:
  - a todas las personas sobre la tierra y en el mar
  - a todas las criaturas de la tierra y del mar
  rationale: La formulación mantiene la amplitud del ge'ez y no restringe de antemano el alcance a humanos ni lo amplía explícitamente a todas las criaturas. Así se preserva la tensión interpretativa del texto.
  doctrine_reference: Translation philosophy §3 preserve theological tension rather than resolve it
- issue: Verbo para la acción creadora
  english_pob_reading: made
  chosen_spanish_reading: hizo
  alternative_spanish_readings:
  - creó
  - fabricó
  rationale: '''Hizo'' sigue el valor amplio del verbo ge''ez y evita introducir una precisión doctrinal que el término fuente no obliga a expresar. En el contexto, la pregunta afirma a Dios como autor de todo lo existente sin tecnicismo adicional.'
  doctrine_reference: Translation philosophy §1 original-language primacy over translation tradition
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que eliminó la conjunción inicial en la segunda pregunta por falta de base en el ge'ez; por eso se traduce «¿Quién dio...?» sin añadir «Y». También se alinea con la última revisión inglesa al usar «en el mar» para el contraste final, manteniendo la lectura amplia del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto interrogativo sin agregar el sujeto explícito, de acuerdo con la retórica de la pregunta.
  - Se eligió «sabiduría» en vez de «entendimiento» para conservar la pareja léxica natural con «instrucción».
  - La frase «el cielo y la tierra» se usa como merisma bíblica estándar y suena natural en español contemporáneo.
  - No se introdujo la forma tradicional «SEÑOR» ni «Cristo», porque el texto no lo requiere y el pasaje trata del creador universal.
