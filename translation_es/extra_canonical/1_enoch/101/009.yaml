translation:
  language: es
  text: ¿No temen esos reyes del mar al mar[a], mientras los pecadores no temen al Altísimo[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge'ez es difícil; puede aludir literalmente a 'reyes del mar' y, por extensión, a navegantes o marineros. Se conserva aquí la lectura literal para respetar la repetición con 101:4.
    reason: textual_variant
  - marker: b
    text: El POB inglés traduce aquí el título divino como 'the Most High'; en español se usa 'el Altísimo' como equivalente reverente y establecido.
    reason: theological_note
lexical_decisions:
- source_word: አኮኑ
  english_pob_choice: Do not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  - ¿No es así que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma introduce una pregunta retórica que espera asentimiento; en español, '¿No...?' conserva esa fuerza interrogativa y el tono admonitorio.
- source_word: ውእቶሙ
  english_pob_choice: those
  chosen_spanish: esos
  alternatives_spanish:
  - aquellos
  - ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo señala a un grupo ya identificado; 'esos' mantiene la deixis sin volverla demasiado distante.
- source_word: ተነገሥተ አሕማር
  english_pob_choice: kings of the sea
  chosen_spanish: reyes del mar
  alternatives_spanish:
  - gobernantes del mar
  - señores del mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la revisión más reciente del POB inglés que mantiene la idea literal del compuesto ge'ez. En español, 'reyes del mar' preserva la imagen y la repetición interna con 101:4, aunque suene figurado.
- source_word: ይፈርህዋ ለባሕር
  english_pob_choice: fear the sea
  chosen_spanish: temen al mar
  alternatives_spanish:
  - temen el mar
  - tienen miedo del mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Temer al mar'' reproduce el verbo de miedo con naturalidad en español y mantiene el paralelismo con el segundo miembro de la frase.'
- source_word: ወኃጥኣን
  english_pob_choice: while sinners
  chosen_spanish: mientras los pecadores
  alternatives_spanish:
  - y los pecadores
  - pero los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La conjunción funciona de modo contrastivo; 'mientras' expresa esa oposición entre los marineros y los pecadores.
- source_word: ለልዑል
  english_pob_choice: the Most High
  chosen_spanish: al Altísimo
  alternatives_spanish:
  - al Más Alto
  - al Exaltado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un título divino establecido en el uso judío y bíblico. 'Altísimo' es la equivalencia española más natural y reverente, sin perder el valor de título.
- source_word: ኢይፈርህዎ
  english_pob_choice: do not fear
  chosen_spanish: no temen
  alternatives_spanish:
  - no temen reverencia a
  - no temen de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repito el campo semántico de 'temor' para conservar el contraste deliberado del verso. En español, la negación simple en presente funciona bien dentro de la pregunta retórica.
theological_decisions:
- issue: ልዑል como título divino
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Más Alto
  - el Exaltado
  rationale: En este contexto el término designa a Dios, no un adjetivo comparativo ordinario. 'Altísimo' transmite con claridad la dignidad del título y preserva el registro teológico.
  doctrine_reference: Mantener títulos divinos con equivalentes semánticos claros; no neutralizar la referencia a Dios.
- issue: Repetición del verbo de temor en ambos miembros
  english_pob_reading: fear / do not fear
  chosen_spanish_reading: temen / no temen
  alternative_spanish_readings:
  - tienen miedo / no tienen miedo
  - temen / no reverencian
  rationale: La versión inglesa revisada insiste en conservar el mismo verbo para ambas mitades. 'Temen / no temen' mantiene esa simetría retórica y no suaviza la oposición.
  doctrine_reference: Preservar paralelismo y tensión retórica del texto fuente.
translation_notes:
  revision_awareness: Esta entrega corrige el fallo anterior asegurando que cada nota al pie esté anclada explícitamente en el texto principal. También sigue la revisión más reciente del audit trail inglés, que prefirió 'kings of the sea' y conservó el paralelismo verbal entre el temor del mar y el no-temor al Altísimo.
  spanish_consistency_notes:
  - He mantenido el mismo campo léxico de temor en ambos miembros ('temen' / 'no temen') para reflejar el paralelismo del ge'ez.
  - He preferido 'Altísimo' en lugar de 'SEÑOR' o 'Dios' porque el título ge'ez corresponde al divine title del texto fuente.
  - He usado 'reyes del mar' para reflejar la lectura auditada del POB inglés y su vínculo con 101:4.
  - La puntuación con coma marca el contraste de dos miembros coordinados dentro de una sola pregunta retórica.
