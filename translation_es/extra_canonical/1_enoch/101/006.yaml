translation:
  language: es
  text: ¿No es el mar entero[a], y todas sus aguas, y todos sus movimientos[b], la obra del Altísimo? Y ha medido todas sus obras y ha fijado sus costas con arena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mar entero» sigue la lectura singular del texto revisado; la redacción anterior «cada mar» no reflejaba bien el referente.
    reason: textual_variant
  - marker: b
    text: «Movimientos» puede entenderse también como oleaje, agitaciones u oleadas del mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: አኮ
  english_pob_choice: Is not
  chosen_spanish: ¿No es…?
  alternatives_spanish:
  - ¿No será…?
  - ¿Acaso no es…?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase introduce una pregunta retórica que espera asentimiento; en español, «¿No es…?» conserva bien ese valor interrogativo sin añadir matices innecesarios.
- source_word: ኵሉ ባሕር
  english_pob_choice: the whole sea / every sea
  chosen_spanish: el mar entero
  alternatives_spanish:
  - todo el mar
  - cada mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto y la revisión muestran que el referente es singular. «El mar entero» evita la lectura distributiva de «cada mar» y mantiene la idea de totalidad.
- source_word: ማያቲሃ
  english_pob_choice: its waters
  chosen_spanish: sus aguas
  alternatives_spanish:
  - su agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural se ajusta al ge'ez y al español natural para el contenido del mar.
- source_word: ሑሳታ
  english_pob_choice: movements
  chosen_spanish: movimientos
  alternatives_spanish:
  - oleajes
  - ondas
  - agitación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el término amplio «movimientos» para no restringir el sentido a «olas» u «oleajes», aunque esos matices siguen siendo posibles.
- source_word: ግብረ ልዑል
  english_pob_choice: the work of the Most High
  chosen_spanish: la obra del Altísimo
  alternatives_spanish:
  - la obra del Dios Altísimo
  - el trabajo del Altísimo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obra» mantiene la relación creadora del texto y «Altísimo» reproduce el título divino con dignidad y reconocimiento bíblico.
- source_word: ዐቀመ
  english_pob_choice: has measured
  chosen_spanish: ha medido
  alternatives_spanish:
  - ha establecido
  - ha determinado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ha medido» conserva la imagen cósmica de delimitación y ordenación que el verbo sugiere en el contexto.
- source_word: አሰረ
  english_pob_choice: bound
  chosen_spanish: ha ceñido
  alternatives_spanish:
  - ha atado
  - ha limitado
  - ha sujetado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ceñido» expresa la idea de fijar un límite o borde de manera idiomática en español, sin perder el carácter fuerte de restricción.
- source_word: እብንታሃ
  english_pob_choice: their foundations / their shores
  chosen_spanish: sus costas
  alternatives_spanish:
  - sus orillas
  - sus límites
  - sus fundamentos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente favorece una noción de borde o límite del mar; «costas» funciona como equivalente natural y mantiene la imagen espacial.
- source_word: ቡኖባ
  english_pob_choice: with sand
  chosen_spanish: con arena
  alternatives_spanish:
  - en arena
  - por arena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición «con» reproduce la imagen de un límite fijado por arena de modo claro y directo.
theological_decisions:
- issue: Título divino ልዑል
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Exaltado
  - el Más Alto
  rationale: «Altísimo» es la equivalencia bíblica directa y solemne en español, sin introducir una formulación cristiana posterior ajena al título apocalíptico.
  doctrine_reference: Traducir títulos divinos con peso teológico equivalente, evitando armonizaciones innecesarias.
translation_notes:
  revision_awareness: 'La redacción incorpora la revisión más reciente del audit trail: se evita la lectura distributiva «cada mar», se mantiene la idea de totalidad del mar singular y se refleja el cierre con arena como delimitación litoral, no como una abstracción de totalidad.'
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para ልዑል, en coherencia con la práctica bíblica en español.
  - Se conserva un registro solemne y claro, evitando un calco excesivo pero sin expandir el sentido más allá del texto.
  - Las notas a y b están ancladas explícitamente en el texto y corresponden a alternativas reales del audit trail.
