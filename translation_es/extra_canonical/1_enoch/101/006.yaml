revisions:
- from: ¿No es el mar entero[a], y todas sus aguas, y todos sus movimientos[b], la obra del Altísimo? Y ha medido todas sus obras y ha ceñido sus costas con arena.
  to: ¿No es el mar entero[a], y todas sus aguas, y todos sus movimientos[b], la obra del Altísimo? Y ha medido todas sus obras y ha fijado sus costas con arena.
  rationale: Se reemplaza «ha ceñido» por «ha fijado» para lograr un español más natural y fiel a la idea de límites establecidos por Dios. Se corrige además la nota léxica para eliminar «surgimientos», que no encaja bien con el contexto marítimo.
