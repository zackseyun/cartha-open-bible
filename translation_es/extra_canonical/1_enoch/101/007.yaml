base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/101/007.yaml
  text: And at his rebuke it will be afraid and dry up[a], and all its fish will die, and everything that is in it[c][b]. But you sinners who are upon the earth do not fear him.
  footnotes:
  - marker: a
    text: The repeated 'it' likely refers to the sea or waters in the preceding verse. The Ge'ez keeps the reference implicit.
    reason: cross_reference
  - marker: b
    text: The final line is literally 'you sinners who are upon the earth do not fear it,' probably contrasting the fear of creation under rebuke with the fearlessness of the wicked.
    reason: lexical_alternative
  - marker: c
    text: Or 'And at its rebuke it will be afraid and dry up, and all its fish will die, and everything that is in it. But you sinners who are upon the earth do not fear it.'.
