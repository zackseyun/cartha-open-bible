translation:
  language: es
  text: Y ante su reprensión, esta temblará y se secará, y todos sus peces morirán, y todo lo que está en ella. Pero ustedes, pecadores que están sobre la tierra, no le teman.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በተግሣጹ
  english_pob_choice: at his rebuke
  chosen_spanish: a su reprensión
  alternatives_spanish:
  - ante su reprensión
  - por su reprensión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo posesivo ge'ez exige referir la reprensión a Dios, no al mar. En español, 'a su reprensión' conserva el valor circunstancial y el tono judicial/apocalíptico mejor que una paráfrasis más libre.
- source_word: ትፈርህ
  english_pob_choice: it will be afraid
  chosen_spanish: él temblará
  alternatives_spanish:
  - temerá
  - se asustará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sujeto inmediato es el mar personificado, pero el español necesita una forma natural. 'Temblará' mantiene la reacción física del mar ante la reprensión divina sin perder la personificación.
- source_word: ትየብስ
  english_pob_choice: dry up
  chosen_spanish: se secará
  alternatives_spanish:
  - se pondrá seco
  - se desecará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para aguas, 'se secará' es la forma más idiomática y directa, conservando la imagen de juicio.
- source_word: ዓሣቲሃ
  english_pob_choice: its fish
  chosen_spanish: sus peces
  alternatives_spanish:
  - los peces de él
  - los peces que hay en él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El posesivo explícito se conserva con 'sus', ya que el ge'ez marca el vínculo con el cuerpo de agua.
- source_word: ይመውት
  english_pob_choice: will die
  chosen_spanish: morirán
  alternatives_spanish:
  - perecerán
  - van a morir
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: El futuro simple comunica la secuencia de consecuencias del juicio de manera natural en español.
- source_word: ኵሉ ዘሀሎ ውስቴታ
  english_pob_choice: everything that is in it
  chosen_spanish: todo lo que está en él
  alternatives_spanish:
  - todo lo que hay en él
  - todo lo que se encuentra en él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase amplía la devastación más allá de los peces. 'Todo lo que está en él' es suficientemente formal y conserva el contenido sin añadir explicaciones.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - malvados
  - impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pecadores'' mantiene el término moral estándar de la tradición apocalíptica y la oposición del versículo.'
- source_word: እለ ዲበ ምድር
  english_pob_choice: who are upon the earth
  chosen_spanish: que están sobre la tierra
  alternatives_spanish:
  - que están en la tierra
  - que habitan sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sobre la tierra'' reproduce bien el valor espacial elevado del original, sin convertirlo en una formulación doctrinal distinta.'
- source_word: ኢትፈርህዎ
  english_pob_choice: do not fear him
  chosen_spanish: no le teman
  alternatives_spanish:
  - no lo teman
  - no teman a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige el referente al masculino divino. En español, el clítico dativo 'le' evita la ambigüedad de género y mantiene el objeto personal de la prohibición.
theological_decisions:
- issue: Referente del posesivo y del pronombre objeto
  english_pob_reading: The final revised reading refers the rebuke and the feared object to God, while the sea remains the feminine personified subject.
  chosen_spanish_reading: La reprensión es de Dios y el temor prohibido es hacia él; el mar sigue siendo el sujeto personificado que tiembla y se seca.
  alternative_spanish_readings:
  - La reprensión es del mar y el temor se refiere a él
  - La frase final habla del mar como objeto temido
  rationale: El análisis ge'ez revisado distingue entre el sufijo masculino de በተግሣጹ y el sujeto femenino del mar. La traducción española debe reflejar esa distinción para no borrar la tensión gramatical y teológica del versículo.
  doctrine_reference: Preservar el referente divino distinguido por el texto fuente y evitar una neutralización que altere la escena apocalíptica.
- issue: Personificación del mar ante la reprensión divina
  english_pob_reading: The sea or body of water is personified as fearing and drying up under rebuke.
  chosen_spanish_reading: El mar aparece personificado, reaccionando con temor y sequedad ante la reprensión divina.
  alternative_spanish_readings:
  - Una referencia impersonal al agua
  - Una descripción puramente física sin personificación
  rationale: La personificación forma parte del estilo apocalíptico y del valor retórico del pasaje; conviene mantenerla en español en vez de suavizarla.
  doctrine_reference: Conservar la imaginería apocalíptica sin resolverla en prosa explicativa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión posterior que corrigió el referente de la reprensión y del mandato final desde un 'it' impersonal a un masculino referido a Dios ('his/him'). La versión española incorpora esa corrección y evita la lectura anterior.
  spanish_consistency_notes:
  - Se mantiene 'pecadores' como término moral estándar, coherente con el registro apocalíptico.
  - Se conserva la personificación del mar sin introducir 'océano' o 'aguas' porque el texto fuente no lo explicita aquí.
  - No se usa 'SEÑOR' ni 'Cristo'; el referente divino se expresa solo mediante pronombre, según el texto dado.
  - Se evita el calco excesivo en 'sobre la tierra' por fidelidad al giro ge'ez y por naturalidad del español.
