revisions:
- from: Y a su reprensión, él temblará y se secará, y todos sus peces morirán, y todo lo que está en él. Pero ustedes, pecadores que están sobre la tierra, no le teman.
  to: Y ante su reprensión, esta temblará y se secará, y todos sus peces morirán, y todo lo que está en ella. Pero ustedes, pecadores que están sobre la tierra, no le teman.
  rationale: Se ajusta el español para preservar con más fidelidad la distinción fuente entre Dios como referente masculino de 'su' y 'le', y el cuerpo de agua como referente no masculino personificado. También se mejora la naturalidad idiomática con 'ante su reprensión'. No hace falta nota porque la ambigüedad principal se resuelve directamente en el texto español sin perder el sentido auditado.
