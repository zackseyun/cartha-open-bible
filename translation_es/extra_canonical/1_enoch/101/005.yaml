base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/101/005.yaml
  text: And because of this they fear[a], for all their good possessions go out into the sea with them, and they do not think good in their hearts[b], for the sea will swallow them and they will sink in it.
  footnotes:
  - marker: a
    text: Or 'they will not think about their goods in their hearts.' The Ge'ez wording can be read either as moral 'the good' or as a backward reference to their possessions.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will be afraid, for all their good possessions will go out with them into the sea; yet they will not take thought for the good in their hearts, for the sea will swallow them and they will be destroyed'.
