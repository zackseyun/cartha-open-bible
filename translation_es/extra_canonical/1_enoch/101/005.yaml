translation:
  language: es
  text: Y por eso temen[a], pues todas sus buenas posesiones salen al mar con ellos, y no piensan en lo bueno en su corazón, porque el mar los traga y se hunden en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no piensan en sus bienes en su corazón». El ge''ez admite que «lo bueno» remita a sus posesiones buenas o a un bien moral/interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይፈርሁ
  english_pob_choice: they will be afraid
  chosen_spanish: temen
  alternatives_spanish:
  - tendrán miedo
  - se aterran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperfecto ge'ez expresa una descripción general o gnómica del temor; en español, el presente simple «temen» conserva ese valor y evita introducir futurización indebida.
- source_word: ኵሉ ንዋዮሙ ሠናይ
  english_pob_choice: all their good possessions
  chosen_spanish: todas sus buenas posesiones
  alternatives_spanish:
  - toda su riqueza
  - todos sus bienes valiosos
  - todas sus posesiones buenas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Nŭway» puede abarcar bienes, posesiones o riqueza; con «bueno» califica el valor de los bienes y mantiene la ambigüedad entre ‘bienes valiosos’ y una posible referencia moral al ‘bien’.
- source_word: ይወፅእ ውስተ ባሕር ምስሌሆሙ
  english_pob_choice: will go out with them into the sea
  chosen_spanish: salen al mar con ellos
  alternatives_spanish:
  - salen con ellos al mar
  - van al mar con ellos
  - son arrojadas al mar con ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez es literalmente ‘salir/ir hacia afuera’; en contexto, «salen al mar con ellos» conserva la relación de acompañamiento sin convertirla en pasiva interpretativa.
- source_word: ወሠናየ ኢይሐልዩ በልቦሙ
  english_pob_choice: they do not think good in their hearts
  chosen_spanish: no piensan lo bueno en su corazón
  alternatives_spanish:
  - no piensan en el bien en su corazón
  - no consideran lo bueno en su corazón
  - no toman en cuenta el bien en su corazón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La negación está en el verbo, no en un sustantivo aparte; por eso «no piensan lo bueno» refleja mejor la construcción que una paráfrasis moralizante. «En su corazón» mantiene el singular colectivo del ge'ez y su matiz interior.
- source_word: ባሕር ይውኅጦሙ
  english_pob_choice: the sea will swallow them
  chosen_spanish: el mar los tragará
  alternatives_spanish:
  - el mar los engullirá
  - el mar los devorará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tragar» reproduce con claridad la imagen concreta de absorción o ingestión violenta, equivalente al valor idiomático de ‘swallow’.
- source_word: ወይትኀጐሉ ውስቴታ
  english_pob_choice: and they will sink in it
  chosen_spanish: y se hundirán en él
  alternatives_spanish:
  - y perecerán en él
  - y se perderán en él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El final expresa ruina dentro del mar; «se hundirán en él» sigue de cerca la imagen sin añadir un matiz más fuerte que el del verbo base.
theological_decisions:
- issue: Relación entre ‘lo bueno’ y las posesiones
  english_pob_reading: The verse contrasts their valuable possessions with their failure to consider what is good inwardly.
  chosen_spanish_reading: El verso conserva la tensión entre bienes valiosos y la incapacidad interior de pensar en lo bueno, sin resolver de antemano si ‘lo bueno’ retoma las posesiones o introduce una reflexión moral.
  alternative_spanish_readings:
  - El verso podría leerse como que no piensan en sus bienes dentro de su corazón
  - El verso podría leerse como que no reflexionan sobre el bien interior
  rationale: El ge'ez permite una ambigüedad real en ሠናየ; la redacción española mantiene esa tensión con una formulación suficientemente abierta, sin moralizar ni eliminar la posibilidad de referencia a las posesiones.
  doctrine_reference: Preservar la ambigüedad semántica documentada; no forzar una resolución interpretativa.
- issue: Tiempo verbal gnómico de la escena
  english_pob_reading: Present-tense description of sailors in a storm rather than future prophecy.
  chosen_spanish_reading: Se usa presente gnómico en español («temen», «salen», «piensan», «tragará», «se hundirán»), con un cierre futuro que sigue el resultado anunciado por el texto.
  alternative_spanish_readings:
  - 'todo en presente: ‘el mar los traga y se hunden’'
  - 'todo en futuro: ‘temerán… saldrán… no pensarán…’'
  rationale: El ge'ez presenta una descripción vívida que puede sonar actual y proverbial; el español combina presente y futuro para mantener la vivacidad de la escena y la fuerza del desenlace sin desentonar con la sintaxis.
  doctrine_reference: Priorizar la fuerza aspectual y la claridad literaria sin perder la continuidad descriptiva.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente, que corrige el valor temporal de los verbos como descripción presente/gnómica y mantiene la negación de manera directa. La redacción española evita introducir un ‘yet’ adversativo no presente en el ge'ez y conserva la imagen final de hundimiento dentro del mar. También se atendió la tensión léxica de ሠናየ sin resolverla de forma excesiva.
  spanish_consistency_notes:
  - Se mantuvo ‘mar’ para ባሕር y no ‘océano’, por fidelidad léxica.
  - 'Se preservó la imagen concreta de acción y resultado: salir al mar, ser tragados, hundirse.'
  - Se evitó ‘SEÑOR’ u otras sustituciones teológicas no pertinentes; el versículo no contiene nombre divino.
  - La nota a pie de página está anclada explícitamente en ‘temen[a]’ para asegurar correspondencia entre texto y aparato.
