  to: Y por eso temen[a], pues todas sus buenas posesiones salen al mar con ellos, y no piensan en lo bueno en su corazón, porque el mar los traga y se hunden en él.
  rationale: 'Se hace una reparación menor para alinear mejor el español con la revisión inglesa auditada y con el valor gnómico de los verbos ge''ez: se unifica la escena en presente («los traga… se hunden») y se suaviza el calco «piensan lo bueno» a «piensan en lo bueno», que sigue preservando la ambigüedad documentada sin moralizar el sentido. No se requiere adjudicación adicional porque el ajuste es claro y de bajo riesgo.'
