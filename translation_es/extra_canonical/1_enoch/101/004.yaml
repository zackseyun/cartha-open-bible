translation:
  language: es
  text: ¿No has visto a los capitanes de los barcos[a], cómo los sacuden las olas, y sus barcos son zarandeados por los vientos[b], y se angustian?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión también se ha entendido como «los reyes de los barcos», pero en este contexto se refiere mejor a los capitanes o marineros de las embarcaciones.
    reason: lexical_alternative
  - marker: b
    text: 'La secuencia refleja la corrección textual: «por las olas» y «por los vientos», no «por el movimiento de sus almas».'
    reason: textual_variant
lexical_decisions:
- source_word: ኢትሬእይዎሙኑ
  english_pob_choice: Have you not seen
  chosen_spanish: ¿No has visto
  alternatives_spanish:
  - ¿No has visto acaso?
  - ¿No ves?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma introduce una pregunta retórica de reprensión. En español, «¿No has visto» conserva el matiz admonitorio y la referencia a una experiencia observable.
- source_word: ተነገሥተ አሕማር
  english_pob_choice: the captains of the ships
  chosen_spanish: los capitanes de los barcos
  alternatives_spanish:
  - los marineros de los barcos
  - los gobernantes de los barcos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ajuste adjudicado corrige la lectura errónea de «kings» y toma la expresión como una referencia a capitanes/marineros. «Capitanes» es natural en español y mantiene la imagen concreta del mar.
- source_word: ይትሀወኩ / እምሞገድ
  english_pob_choice: they are tossed by the waves
  chosen_spanish: son sacudidos por las olas
  alternatives_spanish:
  - son arrojados por las olas
  - son zarandeados por las olas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indica que la lectura correcta es «por las olas». «Son sacudidos» preserva la fuerza del movimiento sin recargarlo; «zarandeados» se usa luego para variar el segundo verbo y evitar repetición plana.
- source_word: ወያንቀለቅሉ
  english_pob_choice: and their ships are shaken
  chosen_spanish: y sus barcos son zarandeados
  alternatives_spanish:
  - y sus barcos son sacudidos
  - y sus barcos se balancean
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa agitación violenta o vaivén. «Zarandeados» comunica bien el sacudimiento marítimo y conserva un registro vivo sin cambiar el sentido.
- source_word: እምነፋሳት
  english_pob_choice: by the winds
  chosen_spanish: por los vientos
  alternatives_spanish:
  - por el viento
  - a causa de los vientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión confirma «por los vientos». En español, el plural mantiene la fuerza imagética del original y el paralelismo con «las olas».
- source_word: ወይትመነደቡ
  english_pob_choice: and they are distressed
  chosen_spanish: y quedan angustiados
  alternatives_spanish:
  - y quedan afligidos
  - y se turban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El cierre describe aflicción o agitación interior. «Quedan angustiados» es fiel, claro y no exagera hacia pánico total.
theological_decisions:
- issue: Si la imagen debe leerse literalmente como navegación o como metáfora de inestabilidad
  english_pob_reading: Retain the literal ship imagery in the main text while allowing metaphorical force to remain implicit
  chosen_spanish_reading: Conservar la imagen literal de navegación en el texto principal, dejando implícita su fuerza metafórica
  alternative_spanish_readings:
  - Parafrasear de modo abstracto como «los poderosos quedan confundidos»
  - Interpretarlo primordialmente como un estado interior de temor
  rationale: La fuente ge'ez y la revisión textual apuntan claramente a barcos, olas y vientos. En español, mantener la escena concreta respeta mejor la tensión apocalíptica y evita borrar el alcance figurado implícito.
  doctrine_reference: Poética profética/apocalíptica; lectura figurada sin desliteralizar el texto
translation_notes:
  revision_awareness: 'La base inglesa fue revisada tras una adjudicación de error mayor: el texto no habla de «reyes de los barcos» ni de «sus almas», sino de capitanes/marineros, olas y vientos. La redacción española sigue esa corrección y evita reproducir la lectura descartada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no lo contiene.
  - Se prefiere «barcos»/«barcos son zarandeados» para un español natural y concordante con la escena marítima.
  - «Angustiados» conserva la dimensión emocional final sin desplazar el énfasis físico del verso.
