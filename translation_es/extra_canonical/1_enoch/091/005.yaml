base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/091/005.yaml
  text: For I know that violence will endure upon the earth[a], and a great scourge will be carried out upon the earth; and all lawlessness will be brought to completion and be cut off from its roots[c][b], and every structure will pass away.
  footnotes:
  - marker: a
    text: Or 'a great plague' or 'a great punishment'; the Ge'ez term can denote a punitive affliction or scourge more broadly.
    reason: lexical_alternative
  - marker: b
    text: The clause 'all lawlessness will be brought to completion' may mean that wickedness reaches its full measure before judgment falls, not that it is approved or established.
    reason: alternative_reading
  - marker: c
    text: '''Every structure'' could also be read more concretely as ''every building,'' but the broader wording may intentionally include all human constructions or establishments.'
    reason: lexical_alternative
