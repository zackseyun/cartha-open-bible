translation:
  language: es
  text: Porque sé que la violencia durará sobre la tierra, y un gran azote[a] se llevará a cabo sobre la tierra; y toda iniquidad[b] llegará a su colmo y será cortada de raíz, y toda estructura[c] pasará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gran plaga» o «un gran castigo»; el término ge‘ez puede denotar una aflicción punitiva o un azote en sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: La cláusula puede significar que la iniquidad llega a su medida plena antes de que caiga el juicio, no que sea aprobada o establecida.
    reason: alternative_reading
  - marker: c
    text: «Estructura» también puede leerse de modo más concreto como «edificio», pero la expresión amplia puede abarcar toda construcción o establecimiento humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce la explicación causal o justificativa del dicho anterior. «Porque» conserva esa relación de motivo en español natural y solemne.
- source_word: አእምር
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - conozco
  - he sabido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa conocimiento directo y profético sin recargar el español. «Sé» mantiene la certeza del hablante.
- source_word: ይጸንዕ
  english_pob_choice: will endure
  chosen_spanish: durará
  alternatives_spanish:
  - permanecerá
  - persistirá
  - se mantendrá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo apunta a continuidad o permanencia. «Durará» comunica que la violencia seguirá presente, sin sugerir aprobación.
- source_word: ሀላዌ ግፍዕ
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - injusticia violenta
  - maltrato violento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión nombra la realidad de violencia injusta. «Violencia» es breve y fuerte, y conserva el peso apocalíptico.
- source_word: በዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por toda la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre la tierra» reproduce el registro elevado del juicio escatológico y su alcance global.
- source_word: ትትፈጸም
  english_pob_choice: will be carried out
  chosen_spanish: será ejecutado
  alternatives_spanish:
  - será llevado a cabo
  - será cumplido
  - será realizado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con «azote» como sujeto implícito de acción, «será ejecutado» conserva la idea de castigo administrado o desplegado, no meramente ocurrido.
- source_word: መቅሠፍት ዐቢይ
  english_pob_choice: a great scourge
  chosen_spanish: un gran azote
  alternatives_spanish:
  - una gran plaga
  - un gran castigo
  - una gran aflicción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La palabra abarca golpe, plaga o aflicción punitiva. «Azote» conserva ese sentido castigador sin limitarlo a enfermedad.
- source_word: ኵላ ዓመፃ
  english_pob_choice: all lawlessness
  chosen_spanish: toda la maldad
  alternatives_spanish:
  - toda la iniquidad
  - toda la rebelión
  - toda la injusticia
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: El término incluye conducta rebelde y perversa. «Maldad» mantiene amplitud semántica en español, aunque «iniquidad» también sería posible en registro bíblico.
- source_word: ትትፈጸም
  english_pob_choice: will be brought to completion
  chosen_spanish: será llevada a su pleno cumplimiento
  alternatives_spanish:
  - será completada
  - llegará a su plenitud
  - será consumada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia sugiere que la maldad alcanza su medida antes del juicio. «Pleno cumplimiento» preserva esa tensión sin convertirla en aprobación.
- source_word: ትትገዘም እምሥረዊሃ
  english_pob_choice: be cut off from its roots
  chosen_spanish: cortada desde sus raíces
  alternatives_spanish:
  - arrancada de sus raíces
  - cortada de raíz
  - desarraigada desde sus raíces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es de eliminación radical, ligada a raíces. «Desde sus raíces» conserva la metáfora y la idea de extirpación completa.
- source_word: ኵሉ ሕንጻ
  english_pob_choice: every structure
  chosen_spanish: toda estructura
  alternatives_spanish:
  - todo edificio
  - toda construcción
  - toda obra construida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede ser literal o más amplio. «Estructura» mantiene la amplitud y evita restringir indebidamente a edificios solamente.
- source_word: የኃልፍ
  english_pob_choice: will pass away
  chosen_spanish: pasará
  alternatives_spanish:
  - desaparecerá
  - perecerá
  - se desvanecerá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verb o de desaparición o cese. «Pasará» es breve y solemne; en contexto, implica que dejará de permanecer.
theological_decisions:
- issue: Si el versículo enseña mera continuidad del mal o una medida plena permitida antes del juicio
  english_pob_reading: Violence endures, lawlessness reaches completion, then is cut off from its roots; the sequence preserves judgment tension.
  chosen_spanish_reading: La violencia dura, la maldad llega a su pleno cumplimiento y luego es cortada desde sus raíces; así se conserva la secuencia de persistencia, plenitud y erradicación.
  alternative_spanish_readings:
  - La violencia simplemente continúa sin matiz judicial
  - La maldad es destruida de inmediato sin llegar a plenitud
  - La frase describe solo un estado moral sin juicio
  rationale: 'La sintaxis del original sugiere una progresión: persistencia, colmación y extirpación. La traducción evita suavizar o resolver esa tensión apocalíptica.'
  doctrine_reference: Preservar la tensión teológica sin armonizarla de más.
translation_notes:
  revision_awareness: La redacción sigue la lectura ya estabilizada en el audit trail inglés y no introduce cambios de fondo; solo ajusta el español para conservar el paralelismo entre persistencia del mal, plenitud y juicio final.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se prefiere «maldad» para abarcar la amplitud de ዓመፃ sin estrecharla a una sola noción jurídica.
  - «Azote» y «será ejecutado» mantienen el matiz punitivo de መቅሠፍት y del pasivo de acción divina.
  - Se evita «edificios» para no limitar indebidamente ኵሉ ሕንጻ.
  - La puntuación reproduce el paralelismo del verso y permite leer las tres acciones como una progresión.
