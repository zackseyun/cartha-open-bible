    reason: lexical_alternative
  - marker: b
    text: La cláusula puede significar que la iniquidad llega a su medida plena antes de que caiga el juicio, no que sea aprobada o establecida.
    reason: alternative_reading
  - marker: c
    text: «Estructura» también puede leerse de modo más concreto como «edificio», pero la expresión amplia puede abarcar toda construcción o establecimiento humano.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el anclaje de la nota léxica principal para que corresponda al término ge''ez de «gran azote», se ajusta «maldad» a «iniquidad» para acercarse mejor a «lawlessness», y se pulen dos giros para un español más natural y fiel: «se llevará a cabo» y «será cortada de raíz».'
