review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia principal del ge''ez y del POB inglés: la violencia perdura, viene un gran castigo sobre la tierra, la maldad/ilegalidad llega a su colmo y luego es extirpada, y toda construcción/estructura pasa. Sin embargo, hay dos desajustes relevantes: la nota [a] fue anclada a «violencia» aunque la alternativa inglesa sobre plaga/castigo corresponde a «un gran azote», y «toda la maldad» debilita el matiz más específico de ኵላ ዓመፃ = «toda la iniquidad / toda la rebeldía / toda la anarquía moral», que el POB auditó como «all lawlessness».'
  spanish_quality_summary: El español es claro y digno, pero requiere pequeños ajustes para mayor precisión y naturalidad. «Será ejecutado» con «azote» suena algo forzado en español bíblico-natural; «se llevará a cabo» o «será llevado a cabo» fluye mejor. «Cortada desde sus raíces» es comprensible, pero «cortada de raíz» o «arrancada de sus raíces» suena más idiomático. También conviene mover la nota [a] al sintagma correcto.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. El punto principal es lexical: para ኵላ ዓመፃ conviene una opción más cercana a «lawlessness», como «toda iniquidad» o «toda rebeldía». «Toda maldad» es demasiado amplia y pierde el matiz de desorden rebelde. «Azote» para መቅሠፍት ዐቢይ es defendible si se conserva la nota alternativa en ese lugar.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a «violencia», pero su contenido trata las alternativas de «un gran azote».
    rationale: En el POB inglés, la nota a explica መቅሠፍት ዐቢይ («great scourge/plague/punishment»), no ሀላዌ ግፍዕ («violence»). Tal como está, induce a error textual y léxico.
  - severity: medium
    issue: «Toda la maldad» suaviza el matiz de ኵላ ዓመፃ.
    rationale: El análisis auditado favorece «all lawlessness». En español, «toda iniquidad» o «toda rebeldía» preserva mejor la idea de transgresión rebelde que «maldad», que es más general.
  - severity: medium
    issue: «Será ejecutado» con «un gran azote» suena poco natural.
    rationale: Aunque comunica imposición, en español eclesial general «será llevado a cabo» o «se llevará a cabo» expresa mejor un juicio desplegado sin sonar mecánico.
  - severity: low
    issue: «Cortada desde sus raíces» es menos idiomático que otras opciones.
    rationale: La imagen del original se conserva mejor y con español más natural en «cortada de raíz» o «arrancada de sus raíces».
  revised_spanish_text: Porque sé que la violencia durará sobre la tierra, y un gran azote[a] se llevará a cabo sobre la tierra; y toda iniquidad[b] llegará a su colmo y será cortada de raíz, y toda estructura[c] pasará.
  revised_footnotes:
