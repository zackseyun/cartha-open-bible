  to: Porque sé que la violencia durará sobre la tierra, y un gran azote[a] se llevará a cabo sobre la tierra; y toda iniquidad[b] llegará a su colmo y será cortada de raíz, y toda estructura[c] pasará.
  rationale: 'Se corrige el anclaje de la nota léxica principal para que corresponda al término ge''ez de «gran azote», se ajusta «maldad» a «iniquidad» para acercarse mejor a «lawlessness», y se pulen dos giros para un español más natural y fiel: «se llevará a cabo» y «será cortada de raíz».'
  reviewer_model: gpt-5.4
