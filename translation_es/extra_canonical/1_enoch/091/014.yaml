    rationale: 'La nota inglesa [d] dice «Or ''the paths of uprightness''». El borrador español repite el singular ya adoptado («al camino de la rectitud»), en vez de registrar la alternativa plural pertinente: «los caminos de la rectitud».'
  - severity: low
