    rationale: Aunque fiel, «será inscrito» suena más natural en español y conserva mejor la idea de un registro/decreto escrito, sin domesticar en exceso la rareza de la imagen apocalíptica.
  - severity: low
    issue: «todos los hombres» restringe innecesariamente el alcance
    rationale: La base inglesa dice «all people». «Todas las personas» o «todos» refleja mejor el sentido inclusivo y evita que «hombres» suene masculino específico.
