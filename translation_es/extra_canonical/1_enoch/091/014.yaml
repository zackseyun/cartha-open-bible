translation:
  language: es
  text: Y después de esto[a], en la novena semana[b], se revelará el juicio justo a todo el mundo, y todas las obras de los impíos se apartarán de toda la tierra; y el mundo será inscrito para destrucción[c], y todas las personas mirarán al camino de la rectitud[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase que sigue sobre que «el mundo será inscrito para destrucción» es difícil en el ge'ez. Puede significar que se escribe un decreto o registro acerca de la ruina del mundo, o posiblemente «para destrucción eterna».
    reason: textual_variant
  - marker: b
    text: En este capítulo, «semana» designa una época simbólica de la historia sagrada, no una semana literal de siete días.
    reason: cultural_note
  - marker: c
    text: 'O: «será inscrito para la destrucción de la edad» o «del siglo».'
    reason: previous_rendering
  - marker: d
    text: 'O: «los caminos de la rectitud».'
    reason: previous_rendering
lexical_decisions:
- source_word: በሰንበት ታስዕ
  english_pob_choice: in the ninth week
  chosen_spanish: en la novena semana
  alternatives_spanish:
  - en el noveno sábado
  - durante el noveno período
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este esquema apocalíptico, ሰንበት funciona como ‘semana’ o heptada, no como sábado literal; por eso ‘semana’ comunica mejor la secuencia simbólica.
- source_word: ኵነኔ ጽድቅ
  english_pob_choice: the righteous judgment
  chosen_spanish: el juicio justo
  alternatives_spanish:
  - el juicio de justicia
  - la justicia judicial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Juicio justo’ conserva el matiz judicial y el enlace con la rectitud sin sobrecargar la frase en español.
- source_word: ትትከሠት
  english_pob_choice: will be revealed
  chosen_spanish: se revelará
  alternatives_spanish:
  - se manifestará
  - aparecerá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo/reflexivo encaja bien con ‘se revelará’, que mantiene el sentido apocalíptico de una realidad dada a conocer.
- source_word: ለኵሉ ዓለም
  english_pob_choice: to the whole world
  chosen_spanish: a todo el mundo
  alternatives_spanish:
  - para todo el mundo
  - a todo el orden del mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí ዓለም se refiere con naturalidad al mundo habitado, de modo que ‘a todo el mundo’ es claro y fiel.
- source_word: ተግባረ ረሲዓን
  english_pob_choice: the deeds of the wicked
  chosen_spanish: las obras de los impíos
  alternatives_spanish:
  - las obras de los malvados
  - los actos de los impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Obras’ preserva la concreción de acciones; ‘impíos’ reproduce bien el tono moral y bíblico del término.
- source_word: ይወፅእ እምዲበ ኵሉ ምድር
  english_pob_choice: will depart from all the earth
  chosen_spanish: se apartarán de toda la tierra
  alternatives_spanish:
  - serán quitadas de toda la tierra
  - saldrán de toda la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, ‘se apartarán’ comunica la desaparición o remoción de esas obras de la tierra sin añadir más de lo que dice el texto.
- source_word: ይጽሐፍ ለሐጕለ ዓለም
  english_pob_choice: the world will be written down for destruction
  chosen_spanish: el mundo será escrito para destrucción
  alternatives_spanish:
  - el mundo será escrito para la destrucción del siglo
  - será escrito el mundo para destrucción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual señalada por el audit trail favorece que ‘el mundo’ sea el sujeto de ‘será escrito’; en español, ‘será escrito para destrucción’ conserva la imagen extraña y apocalíptica sin suavizarla.
- source_word: ይኔጽሩ ለፍኖተ ርትዕ
  english_pob_choice: will look to the path of uprightness
  chosen_spanish: mirarán al camino de la rectitud
  alternatives_spanish:
  - mirarán a la senda de la rectitud
  - mirarán al camino de la justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La corrección adjudicada exige singular: ፍኖተ es ‘camino’. ‘Rectitud’ distingue ligeramente ርትዕ de ጽድቅ y conserva el color ético del término.'
theological_decisions:
- issue: Sintaxis difícil de ይጽሐፍ ለሐጕለ ዓለም
  english_pob_reading: the world will be written down for destruction
  chosen_spanish_reading: el mundo será escrito para destrucción
  alternative_spanish_readings:
  - el mundo será escrito para la destrucción del siglo
  - se escribirá el mundo para destrucción
  rationale: El audit trail revisado indica que el sujeto es ‘el mundo’ y que la frase debe conservar la imagen de inscripción/decreto con sentido de ruina. La traducción española evita resolver la ambigüedad de manera interpretativa y mantiene el impacto profético.
  doctrine_reference: Apocalíptica; preservar ambigüedad textual y el paralelismo entre revelación del juicio y ruina del mundo.
- issue: Valor simbólico de ‘semana’ en el esquema de las semanas
  english_pob_reading: in the ninth week
  chosen_spanish_reading: en la novena semana
  alternative_spanish_readings:
  - en el noveno sábado
  - en la novena etapa
  rationale: Según la nota de contexto, ‘week’ designa una época de la historia sagrada, no una semana literal. ‘Semana’ es la forma más transparente y reconocible en español.
  doctrine_reference: Apocalipsis de las Semanas; cronología simbólica, no literal.
translation_notes:
  revision_awareness: He tenido en cuenta la revisión adjudicada que corrige la sintaxis de ይጽሐፍ ለሐጕለ ዓለም para hacer de «el mundo» el sujeto de «será escrito», y la revisión gramatical que exige singular en ፍኖተ, por lo que uso «camino» y no plural. También incorporo la nota de que ሰንበት es una semana/heptada simbólica.
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando el texto lo requiera expresamente; aquí no aparece.
  - Mantengo «impíos» para ረሲዓን por coherencia con el registro moral del pasaje.
  - Conservo la tensión apocalíptica de la cláusula sobre la escritura del mundo sin convertirla en una paráfrasis explicativa.
  - No empleo «Cristo», «SEÑOR» ni otros equivalentes no presentes en la fuente.
