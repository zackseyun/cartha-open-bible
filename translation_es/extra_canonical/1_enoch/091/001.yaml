    issue: 'Calcos sintácticos no naturales: ''llama a mí'' y ''reúne a mí'''
    rationale: Aunque reflejan la dirección hacia el hablante, en español son construcciones incorrectas o muy torpes. Se puede preservar el sentido con 'llama ... junto a mí' y 'reúne ... junto a mí' sin perder fidelidad.
  - severity: high
    issue: 'Incongruencia pronominal: ''te muestre'' frente a ''ustedes'''
    rationale: 'El ge''ez/inglés se dirige al grupo reunido (''you'' plural en contexto). El español no debe pasar de singular a plural en la misma cláusula. Debe mantenerse plural coherente: ''les muestre ... les vendrá'' o ''les sobrevendrá''.'
  - severity: medium
    issue: '''hijos de tu madre'' estrecha el valor de ደቂቀ corregido en el audit trail a ''children'''
    rationale: La revisión inglesa documenta expresamente que no debe limitarse a 'sons'. En español, 'hijos' puede funcionar genéricamente, pero aquí el rationale pide evitar sobreinterpretar varones. 'los hijos de tu madre' deja esa ambigüedad; 'los hijos de tu madre' no mejora. La opción más fiel en español es 'todos los hijos de tu madre' only if accepted generically, but mejor y más claro es 'todos los hijos de tu madre' not; por ello se propone 'todos los hijos de tu madre' impossible. La salida más natural y suficientemente fiel es 'todos los hijos de tu madre' no. Se resuelve con 'todos los hijos de tu madre'??
