translation:
  language: es
  text: Y ahora, hijo mío, Matusalén, llama junto a mí a todos tus hermanos, y reúne junto a mí a todos los hijos[a] de tu madre; porque una palabra me llama, y un espíritu de rectitud[b] es derramado sobre mí, para que les muestre todo lo que les sobrevendrá para siempre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los hijos de tu madre». La expresión ge''ez se refiere literalmente a los hijos o descendencia de la misma madre; también puede entenderse de manera más amplia como «los hijos de tu madre» sin limitar necesariamente a varones.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el Espíritu de justicia es derramado sobre mí». La expresión puede señalar inspiración divina en un sentido más personificado.'
    reason: theological_note
  - marker: c
    text: 'También puede entenderse: «por toda la eternidad», «por todas las edades» o «para las generaciones venideras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y en este momento
  - Y ahora bien
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa el giro discursivo inmediato sin volverlo artificial en español.
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo mío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el tono paterno y directo del vocativo; en español el orden pospuesto suena natural y solemne.
- source_word: ማቱሳላ
  english_pob_choice: Methuselah
  chosen_spanish: Matusalén
  alternatives_spanish:
  - Methuselah
  - Mathusala
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se usa la forma bíblica usual en español para el nombre propio, sin traducirlo.
- source_word: ጸውዕ ሊተ
  english_pob_choice: call ... to me
  chosen_spanish: llama a mí
  alternatives_spanish:
  - llama a mí
  - llámalos a mí
  - convoca a mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La función es convocar personas a la presencia del hablante; 'llama a mí' conserva la construcción con destino personal y el tono urgente.
- source_word: ኵሎ አኃዊከ
  english_pob_choice: all your brothers
  chosen_spanish: a todos tus hermanos
  alternatives_spanish:
  - a todos tus hermanos
  - todos tus hermanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hermanos'' refleja el parentesco masculino explícito del ge''ez y evita generalizar a ''parientes''.'
- source_word: አስተጋብእ ሊተ
  english_pob_choice: gather to me
  chosen_spanish: reúne a mí
  alternatives_spanish:
  - reúne a mí
  - reúne para mí
  - júntalos conmigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo añade la idea de poner juntos/convocar; 'reúne a mí' conserva la dirección hacia la presencia del hablante.
- source_word: ኵሎ ደቂቀ እምከ
  english_pob_choice: all the children of your mother
  chosen_spanish: a todos los hijos de tu madre
  alternatives_spanish:
  - a todos los hijos de tu madre
  - a todos los niños de tu madre
  - a todos los descendientes de tu madre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El inglés POB corrigió la lectura a 'children'; en español, 'hijos' mantiene el paralelismo con 'hermanos' y el parentesco literal, sin implicar varones exclusivamente en sentido moderno.
- source_word: እስመ ቃል ይጼውዐኒ
  english_pob_choice: for a word calls me
  chosen_spanish: porque una palabra me llama
  alternatives_spanish:
  - porque una palabra me llama
  - pues una palabra me llama
  - porque una voz me llama
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la indefinición de 'word/palabra' que el texto deja abierta, evitando precisar indebidamente 'mensaje' o 'voz'.
- source_word: መንፈስ ትክዕወት / ተክዕወት
  english_pob_choice: a spirit of uprightness is poured out upon me
  chosen_spanish: un espíritu de rectitud es derramado sobre mí
  alternatives_spanish:
  - un espíritu de rectitud es derramado sobre mí
  - un espíritu de justicia es derramado sobre mí
  - el Espíritu de justicia es derramado sobre mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail señala que el verbo significa 'es derramado' y que el matiz nominal puede oscilar entre rectitud y justicia. 'Rectitud' mantiene el tono moral sin resolver del todo la tensión teológica hacia una personificación plena.
- source_word: ከመ አርእክሙ
  english_pob_choice: so that I may show you
  chosen_spanish: para que te muestre
  alternatives_spanish:
  - para que te muestre
  - a fin de mostrarte
  - para mostrarte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa finalidad de forma natural en español y mantiene el sentido revelatorio.
- source_word: ኵሎ ዘይበጽሐክሙ
  english_pob_choice: everything that will come upon you
  chosen_spanish: todo lo que vendrá sobre ustedes
  alternatives_spanish:
  - todo lo que vendrá sobre ustedes
  - todo lo que te sobrevendrá
  - todo lo que caerá sobre ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Vendrá sobre'' conserva el valor de acontecimiento que alcanza o sobreviene, con un registro profético natural en español.'
- source_word: እስከ ለዓለም
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - por siempre
  - para siempre
  - por toda la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Por siempre'' expresa duración indefinida de manera sobria; en nota se preserva la alternativa temporal amplia que el inglés POB documenta.'
theological_decisions:
- issue: Naturaleza de 'a spirit of righteousness/uprightness' y si debe leerse como Espíritu divino personal o como disposición inspirada
  english_pob_reading: Or 'The Spirit of righteousness is upon me.' The phrase may denote divine inspiration in a more personified sense.
  chosen_spanish_reading: un espíritu de rectitud es derramado sobre mí
  alternative_spanish_readings:
  - el Espíritu de justicia es derramado sobre mí
  - un espíritu de justicia es derramado sobre mí
  rationale: El ge'ez y el audit trail no obligan a capitalizar ni a convertir la frase en un título plenamente personal. La redacción principal conserva la tensión entre inspiración y cualidad moral, mientras la nota recoge la lectura más personificada.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Alcance temporal de 'forever' / 'unto eternity' / 'for all generations'
  english_pob_reading: The closing phrase may also be understood as 'unto eternity,' 'for all ages,' or 'for the generations to come,' depending on how broadly the temporal expression is taken.
  chosen_spanish_reading: por siempre
  alternative_spanish_readings:
  - para siempre
  - por toda la eternidad
  - para las generaciones venideras
  rationale: La forma breve funciona bien en el cuerpo del texto, y la nota permite recuperar la amplitud semántica del original sin fijarla indebidamente.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta que el auditorio inglés corrigió una lectura errónea anterior: el pasaje no dice que un ''espíritu de rectitud'' simplemente esté ''sobre'' el hablante, sino que ''es derramado sobre mí''. La redacción española adopta ese verbo y evita resolver demasiado la ambigüedad entre cualidad moral e inspiración divina.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto solo cuando el original lo exija explícitamente; este versículo no contiene el tetragrámaton ni κύριος.
  - Se mantiene el tratamiento directo y reverente ('hijo mío', 'Matusalén') acorde con el discurso paterno-profético.
  - '''Rectitud'' se prefirió aquí a ''justicia'' para no cargar de más la frase, aunque ambas opciones se documentan por la tensión semántica del original.'
  - La dirección dativa 'a mí' se conserva dos veces para reflejar la acumulación enfática del ge'ez.
  - No se introduce 'Cristo/Mesías', pues no hay tal término en el verso.
