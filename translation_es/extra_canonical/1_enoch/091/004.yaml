    issue: Marcador [a] mal anclado
    rationale: La nota [a] trata sobre la cláusula «ni os unáis con los que tienen doble corazón», pero el marcador aparece tras «justicia». Esto incumple la disciplina de anclar la nota en la palabra o frase pertinente.
  - severity: medium
    issue: Nota [c] confusa y mal enfocada
    rationale: 'La nota mezcla dos ideas distintas: la alternativa «la justicia os guiará» para el sujeto de «os guiará», y «la justicia será vuestra compañera», que en realidad corresponde a la cláusula final, no a la anterior. Debe limitarse a aclarar el sujeto implícito o eliminarse.'
  - severity: high
