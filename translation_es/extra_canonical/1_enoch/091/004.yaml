translation:
  language: es
  text: Y no os acerquéis a la justicia con doble corazón[a], ni os unáis[b] con los que tienen doble corazón; antes bien, andad en justicia, hijos míos, y ella[c] os guiará por un camino bueno, y la justicia será vuestra compañera[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Doble corazón» es un modismo literal para una lealtad dividida o una duplicidad interior.
    reason: cultural_note
  - marker: b
    text: La cláusula «ni os unáis con los que tienen doble corazón» está entre corchetes en el testimonio etiópico suministrado y puede reflejar una variante textual o una ampliación secundaria, aunque encaja bien con el paralelismo del versículo.
    reason: textual_variant
  - marker: c
    text: También puede entenderse explícitamente como «la justicia os guiará».
    reason: lexical_alternative
  - marker: d
    text: O «será vuestra asociada» o «estará unida a vosotros»; el término etiópico sugiere compañía o asociación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢትቅረቡ
  english_pob_choice: do not draw near
  chosen_spanish: no os acerquéis
  alternatives_spanish:
  - no os aproximéis
  - no os acerquéis a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo negativo prohíbe acercarse; en español, «acercarse» conserva la imagen moral y espacial mejor que una formulación más abstracta.
- source_word: ርትዕ
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - lo recto
  - la justicia/rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el término funciona como ideal moral de integridad. Se eligió «justicia» por coherencia con el resto del versículo y para mantener el campo semántico ético-jurídico sin perder naturalidad en español.
- source_word: በክልኤ ልብ
  english_pob_choice: with a double heart
  chosen_spanish: con doble corazón
  alternatives_spanish:
  - con dos corazones
  - de doble ánimo
  - con corazón dividido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen semítica del corazón dividido. «Corazón» es más fiel al idiomático original que sustituirlo por «ánimo», aunque «corazón dividido» también sería posible.
- source_word: ኢትኅበሩ ምስለ እለ በክልኤ ልብ
  english_pob_choice: nor join yourselves with those who are of a double heart
  chosen_spanish: ni os unáis con los que tienen doble corazón
  alternatives_spanish:
  - ni os asociéis con los de doble corazón
  - ni hagáis compañía con los de corazón dividido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa asociación o unión relacional. «Os unáis» preserva el movimiento reflexivo y social del mandato, sin suavizar el matiz de advertencia.
- source_word: ሑሩ
  english_pob_choice: walk
  chosen_spanish: andad
  alternatives_spanish:
  - volved
  - caminad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En exhortación ética, «andar» es un equivalente idiomático natural en español y mantiene la metáfora del camino que sigue en el versículo.
- source_word: በጽድቅ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición del término al final del versículo favorece uniformidad de traducción. «En justicia» preserva el sustantivo ético y enlaza con la justicia que acompaña al fiel al final.
- source_word: ደቂቅየ
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijitos míos
  - mis pequeños
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La apelación paternal es natural en español con «hijos míos» y mantiene el tono exhortativo e instructivo del hablante.
- source_word: ትመርሐክሙ
  english_pob_choice: it will lead you
  chosen_spanish: os guiará
  alternatives_spanish:
  - os conducirá
  - os llevará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede expresar guía o conducción. «Guiar» comunica bien la imagen de dirección moral sin forzar una personificación excesiva.
- source_word: በፍኖት ኄርት
  english_pob_choice: on a good path
  chosen_spanish: por un camino bueno
  alternatives_spanish:
  - en un buen camino
  - por una senda buena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular del sustantivo favorece «un camino». «Bueno» mantiene la cualidad moral de la ruta sin añadir elementos no presentes en el ge'ez.
- source_word: ይከውን ለክሙ ሱታፌ
  english_pob_choice: will be your companion
  chosen_spanish: será vuestra compañera
  alternatives_spanish:
  - será vuestra compañía
  - os acompañará
  - será vuestro compañero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሱታፌ indica asociación, compañerismo o acompañamiento. «Compañera» permite concordar con «la justicia» y conserva la idea de presencia acompañante.
theological_decisions:
- issue: Cómo rendir el idiomático "double heart" sin neutralizar la denuncia moral
  english_pob_reading: double heart / of a double heart
  chosen_spanish_reading: doble corazón
  alternative_spanish_readings:
  - corazón dividido
  - doble ánimo
  rationale: Se mantiene la imagen corporal del original para no psicologizarla ni volverla una simple cualidad interna abstracta. El texto denuncia la duplicidad moral y la lealtad partida.
  doctrine_reference: Preservar la tensión moral del texto; no suavizar la advertencia sobre la integridad interior.
- issue: Tratamiento de la cláusula entre corchetes en el testimonio etiópico
  english_pob_reading: Included in the main text
  chosen_spanish_reading: Incluida en el texto principal
  alternative_spanish_readings:
  - Omitirla como variante secundaria
  rationale: El testimonio la trae entre corchetes y la lógica paralelística la hace coherente con el versículo. Se conserva en el cuerpo con nota para transparencia textual.
  doctrine_reference: Cuando hay variante o posible expansión, preferir transparencia textual con nota, no omisión silenciosa.
- issue: Cómo entender la relación entre "camino bueno" y la clausura con "la justicia"
  english_pob_reading: on a good path ... and righteousness will be your companion
  chosen_spanish_reading: por un camino bueno ... y la justicia será vuestra compañera
  alternative_spanish_readings:
  - os acompañará la justicia
  - la justicia irá con vosotros
  rationale: El ge'ez distingue entre la guía por un camino bueno y la compañía final de la justicia. La traducción conserva ambas imágenes sin fundirlas en una sola idea.
  doctrine_reference: Respetar las metáforas paralelas y no fusionarlas artificialmente.
translation_notes:
  revision_awareness: 'He seguido la revisión que corrigió la pluralización de la ruta en el inglés: el ge''ez muestra un solo «camino» (በፍኖት ኄርት), por lo que el español mantiene el singular. También he conservado la clausula bracketed como variante textual visible, y he unificado la terminología moral con «justicia» para ambas apariciones de ጽድቅ/relacionados en el versículo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y cualquier terminología de máscara divina, ya que no aparece aquí el tetragrama.
  - Se conserva «justicia» en ambas ocurrencias relevantes para reflejar la cohesión léxica del versículo.
  - «Doble corazón» se mantiene como modismo transparente y consistente con la advertencia moral.
  - El singular de «camino» sigue la revisión crítica del ge'ez.
  - Se usa un registro bíblico moderno y digno, sin arcaísmos innecesarios.
