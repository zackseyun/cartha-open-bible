translation:
  language: es
  text: Y después de esto[a], en la décima semana, en la séptima parte, habrá juicio eterno, [y será ejecutado por los vigilantes del cielo eterno][b], un gran juicio que será ejecutado en medio de los ángeles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El etíope OCR de este versículo es difícil y parece preservar una redacción sustancialmente diferente, incluida una frase que puede leerse como ‘grande … en medio de los ángeles’. El texto principal sigue el sentido de la Apocalipsis de las Semanas que comúnmente se reconoce para este versículo, pero la línea transmitida debe tratarse como textualmente incierta.
    reason: textual_variant
  - marker: b
    text: 'O: «Y después de esto, en la séptima semana, surgirá una generación apóstata, y muchas de sus obras serán obras de apostasía; pero a su final será escogido el justo escogido de la planta eterna de justicia, a quien se le dará instrucción séptuple acerca de toda su creación».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወእምድኅረ ዝ
  english_pob_choice: And after this
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Y después de estas cosas
  - Y luego de esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la transición temporal directa del texto sin añadir paráfrasis.
- source_word: በሰንበት ዓሥርት ፯እደ
  english_pob_choice: in the tenth week, in the seventh part
  chosen_spanish: en la décima semana, en la séptima parte
  alternatives_spanish:
  - en la décima heptada, en la séptima parte
  - en la décima semana, en la séptima porción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto apocalíptico exige ‘semana’ para ሰንበት con ordinal. ‘Séptima parte’ sigue de cerca la división indicada por el original.
- source_word: ኵነኔ
  english_pob_choice: there shall be the eternal judgment
  chosen_spanish: habrá el juicio eterno
  alternatives_spanish:
  - habrá el juicio de la eternidad
  - existirá el juicio eterno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Juicio’ mantiene la fuerza judicial del sustantivo; ‘eterno’ reproduce el valor de እንተ ለዓለም como cualidad duradera.
- source_word: ዘይትቤቀል
  english_pob_choice: shall be exacted
  chosen_spanish: se impondrá
  alternatives_spanish:
  - se exigirá
  - será ejecutado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo transmite una acción pasiva/de imposición. En español, ‘se impondrá’ conserva esa idea sin introducir ‘venganza’ como contenido explícito no marcado por la revisión final inglesa.
- source_word: እማእከሎሙ ለመላእክት
  english_pob_choice: in the midst of the angels
  chosen_spanish: en medio de los ángeles
  alternatives_spanish:
  - entre los ángeles
  - en el seno de los ángeles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase espacial literal se conserva en español sin suavizar el referente angélico preservado por el texto transmitido.
theological_decisions:
- issue: El destinatario/ámbito del juicio en el clausulado final
  english_pob_reading: a great judgment that will be exacted in the midst of the angels
  chosen_spanish_reading: un gran juicio que se impondrá en medio de los ángeles
  alternative_spanish_readings:
  - un gran juicio que se ejecutará entre los ángeles
  - un gran juicio que se hará en presencia de los ángeles
  rationale: Se mantiene la referencia angélica del testimonio transmitido, evitando resolverla hacia una lectura más familiar o armonizada. El texto español conserva la tensión textual señalada por la auditoría.
  doctrine_reference: Preservar la tensión textual; no armonizar con otras secciones de 1 Enoc ni con terminología bíblica posterior.
translation_notes:
  revision_awareness: 'La auditoría inglesa indica que la versión previa era una grave desalineación con el ge''ez: confundía la ‘décima semana’ con la ‘séptima semana’ y sustituía el contenido de juicio por otro pasaje. La presente redacción sigue la lectura revisada del texto fuente: décima semana, séptima parte, juicio eterno y clausulado angélico final.'
  spanish_consistency_notes:
  - Usé ‘Yahvé’ solo cuando corresponda; este versículo no contiene el nombre divino.
  - Mantuve ‘juicio’ y no ‘condena’, porque el sustantivo ge'ez apunta al acto/judicio en sí.
  - Conservé ‘ángeles’ en la frase final para no borrar la tensión textual documentada.
  - Evité ‘Cristo’ o ‘Mesías’ porque el pasaje no los contiene ni la auditoría los sugiere.
