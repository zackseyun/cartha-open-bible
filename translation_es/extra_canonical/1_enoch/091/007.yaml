revisions:
- from: Y cuando el pecado y la transgresión y la blasfemia y la violencia aumenten en toda obra[a], y aumenten la iniquidad, el mal obrar y la impureza, una gran punición vendrá desde el cielo sobre todos ellos, y el Santo Señor saldrá en ira y punición[b], para ejecutar juicio sobre la tierra.
  to: Y cuando el pecado y la transgresión y la blasfemia y la violencia aumenten en toda obra, y aumenten la iniquidad, la mala conducta y la impureza, un gran castigo[a] vendrá desde el cielo sobre todos ellos, y el Santo Señor saldrá en ira y castigo[b], para ejecutar juicio sobre la tierra.
  rationale: Se corrige el anclaje de la nota léxica principal para que recaiga sobre 'castigo', que es el término realmente comentado por la auditoría inglesa. Se reemplaza 'punición' por 'castigo' por mayor naturalidad y legibilidad en español eclesial sin perder el sentido punitivo primario ni la repetición retórica del original. También se sustituye 'mal obrar' por 'mala conducta' para mejorar fluidez en la lista de vicios. El resto del versículo se mantiene sustancialmente igual porque refleja bien la estructura y el sentido del ge’ez.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:57:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura causal/temporal de ወእመኒ ('Y cuando') y la secuencia general de males crecientes que desembocan en juicio divino. También mantiene adecuadamente el título divino y la repetición del sustantivo de castigo. Sin embargo, la nota [a] está anclada en 'obra' cuando en realidad documenta la alternativa léxica de መቅሠፍት ዐቢይ ('gran castigo/plaga/azote'), por lo que el aparato no refleja fielmente la evidencia fuente ni la auditoría inglesa. Además, 'punición' y 'mal obrar' son posibles pero poco naturales en español eclesial general; conviene ajustar sin perder el sentido.
  spanish_quality_summary: 'El texto es mayormente claro, pero varias elecciones suenan forzadas o poco idiomáticas para un español bíblico moderno y digno: ''punición'' es culta pero rígida y menos legible que ''castigo''; ''mal obrar'' es torpe dentro de una lista nominal; y la ubicación de [a] crea confusión inmediata. ''Toda obra'' es aceptable, pero ''cada obra'' o ''toda obra'' funcionan; se puede mantener. La revisión propuesta mejora naturalidad, precisión del aparato y fluidez sin ampliar el sentido.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Este versículo no involucra Yahvé/Mesías/etc. La decisión principal es léxica: መቅሠፍት debe representarse de forma punitiva y repetir la misma base léxica en ambas ocurrencias; ''castigo'' cumple mejor en español que ''punición'' y aún permite conservar en nota las alternativas ''plaga'' y ''azote''. ''Lawlessness'' como ''iniquidad'' es defendible contextual y estilísticamente.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica alternativas para መቅሠፍት ዐቢይ ('gran castigo/plaga/azote'), pero el marcador aparece después de 'obra'. Esto desinforma al lector y rompe la correspondencia exigida entre nota y palabra relevante.
  - severity: medium
    issue: '''Punición'' es demasiado poco natural en este contexto.'
    rationale: Aunque semánticamente posible, en español bíblico general suena artificioso. 'Castigo' comunica mejor el sentido punitivo primario documentado en la auditoría inglesa y mantiene la dignidad del registro.
  - severity: medium
    issue: '''Mal obrar'' suena torpe dentro de la serie nominal.'
    rationale: La lista presenta sustantivos abstractos; 'mal obrar' introduce una construcción menos natural. 'Maldad' o 'mala conducta' serían más fluidas, pero 'maldad' corre el riesgo de colapsar matices; 'mala conducta' preserva mejor el campo semántico de wrongdoing.
  - severity: low
    issue: La nota [b] reproduce una alternativa inglesa de historial de redacción más que una verdadera nota útil en español.
    rationale: Aun así puede conservarse porque la auditoría inglesa la preserva, pero debe formularse con puntuación y anclaje más claros.
  revised_spanish_text: Y cuando el pecado y la transgresión y la blasfemia y la violencia aumenten en toda obra, y aumenten la iniquidad, la mala conducta y la impureza, un gran castigo[a] vendrá desde el cielo sobre todos ellos, y el Santo Señor saldrá en ira y castigo[b], para ejecutar juicio sobre la tierra.
  revised_footnotes:
  - marker: a
    text: O «una gran plaga» o «un gran azote»; el término ge’ez puede denotar una aflicción punitiva además de castigo.
    reason: lexical_alternative
  - marker: b
    text: 'O, con otra disposición sintáctica: «Y cuando el pecado y la transgresión y la blasfemia y la violencia aumenten en toda obra, y aumenten la iniquidad, la mala conducta y la impureza, un gran castigo vendrá desde el cielo sobre todos ellos»'
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota léxica principal para que recaiga sobre 'castigo', que es el término realmente comentado por la auditoría inglesa. Se reemplaza 'punición' por 'castigo' por mayor naturalidad y legibilidad en español eclesial sin perder el sentido punitivo primario ni la repetición retórica del original. También se sustituye 'mal obrar' por 'mala conducta' para mejorar fluidez en la lista de vicios. El resto del versículo se mantiene sustancialmente igual porque refleja bien la estructura y el sentido del ge’ez.
