translation:
  language: es
  text: Y cuando el pecado y la transgresión y la blasfemia y la violencia aumenten en toda obra, y aumenten la iniquidad, la mala conducta y la impureza, un gran castigo[a] vendrá desde el cielo sobre todos ellos, y el Santo Señor saldrá en ira y castigo[b], para ejecutar juicio sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gran plaga» o «un gran azote»; el término ge’ez puede denotar una aflicción punitiva además de castigo.
    reason: lexical_alternative
  - marker: b
    text: 'O, con otra disposición sintáctica: «Y cuando el pecado y la transgresión y la blasfemia y la violencia aumenten en toda obra, y aumenten la iniquidad, la mala conducta y la impureza, un gran castigo vendrá desde el cielo sobre todos ellos»'
    reason: alternative_reading
lexical_decisions:
- source_word: ትልህቅ / ትለህቅ
  english_pob_choice: will increase
  chosen_spanish: aumenten
  alternatives_spanish:
  - crezcan
  - se multipliquen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La serie verbal expresa escalada acumulativa del mal. «Aumenten» conserva la idea de incremento y suena natural en español bíblico actual.
- source_word: ኃጢአት
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado moral
  - falta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pecado» es el equivalente más directo y mantiene el peso ético-religioso del término.
- source_word: ዓመፃ
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - rebelión
  - violación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Transgresión» distingue este término del simple «pecado» y conserva la idea de quebrantar un orden o límite.
- source_word: ጽርፈት
  english_pob_choice: blasphemy
  chosen_spanish: blasfemia
  alternatives_spanish:
  - injuria impía
  - maldición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta lista de vicios, el término apunta a hablar contra Dios o de manera impía; «blasfemia» preserva ese matiz vertical.
- source_word: ግፍዕ
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - abuso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Violencia» es breve, fuerte y corresponde al uso profético/apocalíptico del término.
- source_word: በኵሉ ተግባር
  english_pob_choice: in every deed
  chosen_spanish: en toda obra
  alternatives_spanish:
  - en cada acto
  - en toda conducta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Toda obra» conserva el distributivo «every» y mantiene un registro bíblico claro; evita sonar demasiado abstracto.
- source_word: ዕልወት
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - anomia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el término está en una cadena moral densa. «Iniquidad» reproduce bien el carácter de desviación grave y evita un tecnicismo como «anomia».
- source_word: አበሳ
  english_pob_choice: wrongdoing
  chosen_spanish: mal obrar
  alternatives_spanish:
  - mala acción
  - maldad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión verbal mantiene la distinción respecto de «pecado» y «transgresión», y refleja una práctica continua de maldad.
- source_word: ርኵስ
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - contaminación ritual
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Impureza» conserva el alcance moral y ritual del término sin perder inteligibilidad en español contemporáneo.
- source_word: መቅሠፍት ዐቢይ
  english_pob_choice: a great punishment
  chosen_spanish: una gran punición
  alternatives_spanish:
  - un gran castigo
  - una gran plaga
  - un gran azote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se elige «punición» para reflejar la fuerza punitiva y formal del sustantivo, manteniendo abierta la posibilidad de aflicción castigadora sin fijarla solo como enfermedad o azote.
- source_word: ይከውን እምሰማይ
  english_pob_choice: will come from heaven
  chosen_spanish: vendrá desde el cielo
  alternatives_spanish:
  - vendrá del cielo
  - vendrá de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Desde el cielo» reproduce el origen celestial del juicio de modo natural en español y mantiene el registro elevado del texto.
- source_word: እግዚእ ቅዱስ
  english_pob_choice: the Holy Lord
  chosen_spanish: el Santo Señor
  alternatives_spanish:
  - el Señor Santo
  - el Señor, el Santo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase funciona como título divino compacto. En español, «Santo Señor» conserva la unión entre santidad y señorío sin convertirlo en una fórmula litúrgica posterior.
- source_word: ይወፅእ
  english_pob_choice: will come forth
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá afuera
  - aparecerá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Saldrá» conserva el movimiento teofánico de salida/aparición con una forma natural y solemne en español.
- source_word: በመዓት
  english_pob_choice: in wrath
  chosen_spanish: en ira
  alternatives_spanish:
  - con ira
  - airado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En ira» mantiene la densidad del estado divino de juicio y guarda el paralelismo con la siguiente frase.
- source_word: በመቅሠፍት
  english_pob_choice: in punishment
  chosen_spanish: y punición
  alternatives_spanish:
  - y castigo
  - y azote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición del sustantivo se conserva para reflejar la insistencia del original. «Punición» permite una correspondencia más marcada con el sustantivo previo que un mero verbo o una paráfrasis.
- source_word: ከመ ይግበር ኵነኔ
  english_pob_choice: to execute judgment
  chosen_spanish: para ejecutar juicio
  alternatives_spanish:
  - para hacer juicio
  - para impartir juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula judicial queda clara y solemne en español. «Ejecutar juicio» reproduce la finalidad activa del verbo sin suavizarla.
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - contra la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre la tierra» conserva el ámbito cósmico del juicio y suena natural en español bíblico.
theological_decisions:
- issue: Sentido de መቅሠፍት en un contexto de juicio
  english_pob_reading: punishment
  chosen_spanish_reading: punición
  alternative_spanish_readings:
  - castigo
  - plaga
  - azote
  rationale: El contexto culmina en juicio y acción retributiva divina. «Punición» mantiene el sentido punitivo sin cerrar la posibilidad de que la aflicción sea experimentada como plaga o azote, tensión que el inglés POB también deja abierta en nota.
  doctrine_reference: Preservar la tensión apocalíptica y no resolver demasiado pronto el modo exacto del castigo.
- issue: Título divino እግዚእ ቅዱስ
  english_pob_reading: the Holy Lord
  chosen_spanish_reading: el Santo Señor
  alternative_spanish_readings:
  - el Señor Santo
  - el Señor, el Santo
  rationale: Se trata de un título compacto y solemne. «El Santo Señor» conserva simultáneamente señorío y santidad sin importar una fórmula eclesiástica posterior ni diluir el carácter apocalíptico.
  doctrine_reference: Preservar el lenguaje de juicio y teofanía sin armonizarlo de manera excesiva con usos litúrgicos tardíos.
translation_notes:
  revision_awareness: La revisión del inglés restablece la estructura condicional-temporal del ge’ez con «And when…»; por eso el español comienza con «Y cuando…» y mantiene la cláusula de resultado. También se preserva la repetición de la idea punitiva al final, en vez de suavizarla a un solo equivalente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto general, pero este versículo no contiene el tetragrámaton; por eso no aparece aquí.
  - Se usa «Señor» para እግዚእ como título divino distinto del nombre propio Yahvé.
  - «Punición» se emplea de forma consistente para መቅሠፍት, con nota para sus alternativas contextuales.
  - «Pecado / transgresión / blasfemia / violencia» conserva la secuencia de vicios sin colapsarla en sinónimos.
  - La cláusula inicial «Y cuando» refleja la lectura revisada del ge’ez y evita una traducción plana de coordinadas independientes.
