translation:
  language: es
  text: En aquellos días[a], la violencia será cortada[b] de sus raíces, y la iniquidad junto con el engaño[c] serán quitados de debajo del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión temporal mira hacia atrás al período o 'semana' mencionado en el contexto visionario inmediato.
    reason: cross_reference
  - marker: b
    text: '''Cortada'' conserva la fuerza del verbo etíope, que también puede entenderse como ''acortada'' o ''llegará a su fin''.'
    reason: lexical_alternative
  - marker: c
    text: El término etíope es de sentido algo incierto aquí; además de 'engaño', puede sugerir 'astucia', 'fraude' o 'perfidia' según cómo se divida la frase.
    reason: textual_variant
lexical_decisions:
- source_word: በአማንቱ፡ መዋዕል፡
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - Y en aquellos días
  - En esos días
  lexicon: Dillmann
  rationale: La expresión demostrativa temporal apunta al período anterior del visionario; 'aquellos días' conserva la referencia anafórica sin sobreespecificar el referente.
- source_word: ትትገዘም፡
  english_pob_choice: shall be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será truncada
  - será acabada
  lexicon: Dillmann
  rationale: El verbo etíope transmite la idea de cortar o cortar de raíz. 'Será cortada' mantiene la imagen de juicio y no suaviza el matiz.
- source_word: ግፍዕ፡
  english_pob_choice: violence
  chosen_spanish: la violencia
  alternatives_spanish:
  - la iniquidad
  - la opresión
  - la maldad
  lexicon: Dillmann
  rationale: En este contexto, la opción inglesa revisada entiende ግፍዕ como 'violence'; el español conserva ese valor concreto y evita desplazarlo a un término más general.
- source_word: እምነ፡ ሥረዊሃ፡
  english_pob_choice: from its roots
  chosen_spanish: de sus raíces
  alternatives_spanish:
  - de su raíz
  - desde sus raíces
  lexicon: Dillmann
  rationale: El plural español reproduce bien la imagen de erradicación total. 'De sus raíces' es natural y fiel a la metáfora de destrucción desde el origen.
- source_word: ወዓመፃ፡
  english_pob_choice: iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la rebelión
  - la transgresión
  - la injusticia
  lexicon: Dillmann
  rationale: El término etíope cubre maldad/rebelión/transgresión; 'iniquidad' mantiene la amplitud moral y la relación con el listado de vicios.
- source_word: ምስለ፡ ጕሕሉት፡
  english_pob_choice: together with deceit
  chosen_spanish: junto con el engaño
  alternatives_spanish:
  - con el engaño
  - junto con la astucia
  - con la perfidia
  lexicon: Dillmann
  rationale: La frase expresa acompañamiento de otro mal. 'Engaño' es una opción prudente para ጕሕሉት y funciona bien en español junto a 'iniquidad'.
- source_word: እምታሕተ፡ ሰማይ፡
  english_pob_choice: from under heaven
  chosen_spanish: desde debajo del cielo
  alternatives_spanish:
  - desde debajo del cielo y la tierra
  - de debajo del cielo
  - desde bajo el cielo
  lexicon: Dillmann
  rationale: El giro cósmico se traduce de forma transparente. 'Debajo del cielo' comunica el ámbito del mundo habitado sin perder el tono apocalíptico.
theological_decisions:
- issue: Alcance cósmico de la purga moral
  english_pob_reading: The verse describes a cosmic removal of evil from the world order, not merely a local social reform.
  chosen_spanish_reading: El versículo anuncia la remoción escatológica del mal en el orden del mundo, no solo una reforma local.
  alternative_spanish_readings:
  - Una limpieza moral de una comunidad concreta
  - Una reducción de la duración de los días humanos
  rationale: La fórmula 'desde debajo del cielo' amplía el alcance a todo el mundo habitado; por eso la traducción española conserva la imagen cósmica y judicial.
  doctrine_reference: Mantener el registro apocalíptico y no reducir la profecía a una corrección ética general.
translation_notes:
  revision_awareness: 'Tomo en cuenta la revisión que corrigió la falsa sintaxis del borrador inglés anterior: el sintagma inicial es ''en aquellos días'' y el verbo rige a ''la violencia'', mientras que ''la iniquidad'' aparece como segundo elemento coordinado con ''el engaño''.'
  spanish_consistency_notes:
  - Conservo 'Yahvé' como norma del proyecto, pero este versículo no contiene el Nombre divino.
  - Uso 'violencia' para ግፍዕ siguiendo la revisión auditada, aunque el campo semántico puede solaparse con injusticia u opresión.
  - Mantengo 'iniquidad' para ዓመፃ porque el español lo hace amplio y solemne sin convertirlo en un término más estrecho.
  - '''Debajo del cielo'' preserva el giro cosmológico semítico sin modernizarlo a una expresión menos visible.'
