    text: 'Lit. «de su sueño». La redacción española se reformula para expresar con claridad el referente plural reflejado en la auditoría inglesa: «de su sueño de ellos / de su sueño colectivo».'
    reason: translation_clarity
  revision_rationale: Se corrige la frase para eliminar la alternativa descartada «de entre ellos», hacer explícita en español la referencia plural asociada a «sleep», y reparar la construcción no idiomática «le será dada a ellos». «De entre los que duermen» conserva el sentido de surgimiento desde el estado de sueño sin introducir la antigua lectura errónea de procedencia desde el grupo.
