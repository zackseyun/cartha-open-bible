translation:
  language: es
  text: Y el justo se levantará de entre los que duermen[a], y la sabiduría se levantará y les será dada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit. «de su sueño». La redacción española se reformula para expresar con claridad el referente plural reflejado en la auditoría inglesa: «de su sueño de ellos / de su sueño colectivo».'
    reason: translation_clarity
lexical_decisions:
- source_word: ይትነሣእ
  english_pob_choice: shall arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - resurgirá
  - se alzará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge’ez expresa levantarse o surgir. En español, «se levantará» conserva el registro elevado y la ambigüedad entre surgimiento y exaltación, sin cargar la frase con una interpretación adicional.
- source_word: ጻድቅ
  english_pob_choice: the righteous one
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - un justo
  - los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular ge’ez se conserva en singular. «El justo» es natural en español y mantiene la fuerza individualizante sin resolver si se trata de una figura representativa o específica.
- source_word: እምነዋሙ
  english_pob_choice: from their sleep
  chosen_spanish: de su sueño
  alternatives_spanish:
  - de su dormir
  - desde su sueño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma señala el sustantivo «sueño» con sufijo posesivo plural en el contexto. En español, «de su sueño» comunica la relación posesiva de manera fluida y evita una construcción forzada.
- source_word: ጥበብ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - discernimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico y revelatorio, el término denota sabiduría en sentido moral y revelado. «Sabiduría» reproduce mejor esa carga que un término más restringido como «entendimiento».
- source_word: ይትወሀብ ሎሙ
  english_pob_choice: be given to them
  chosen_spanish: le será dada a ellos
  alternatives_spanish:
  - les será dada
  - será dada a ellos
  - les será concedida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo con complemento indirecto expresa recepción de un don. Se conserva la pasiva con «será dada» para mantener el paralelismo con el inglés auditado; se añade «a ellos» para reflejar el referente plural explícito del original, aunque resulte algo menos idiomático en español.
theological_decisions:
- issue: Si ጻድቅ debe entenderse como figura individual o colectiva
  english_pob_reading: 'Rendered as singular: ''the righteous one'''
  chosen_spanish_reading: 'Se mantiene el singular: «el justo»'
  alternative_spanish_readings:
  - los justos
  - un justo
  rationale: La forma ge’ez es singular y el contexto permite una lectura individual o representativa. Mantener el singular preserva esa tensión interpretativa sin cerrarla de antemano.
  doctrine_reference: Preservar la tensión teológica donde el texto no obliga a resolverla.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un error importante en la interpretación de እምነዋሙ: no significa «de entre ellos», sino «de su sueño». La redacción española sigue esa corrección y evita reproducir la lectura descartada, aunque conserva una nota alternativa mínima por transparencia textual.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exija; aquí no aparece el nombre divino.
  - Se mantuvo «justo» para ጻድቅ, coherente con el valor singular individualizante del término.
  - Se optó por una pasiva en «será dada» para reflejar el valor del ge’ez, aun cuando el complemento «a ellos» suene ligeramente marcado en español.
  - La nota al pie se ancla en «su sueño» para registrar la alternativa histórica y la corrección de la lectura anterior.
