revisions:
- from: Y se levantará el justo de su sueño[a], y la sabiduría se levantará y le será dada a ellos.
  to: Y el justo se levantará de entre los que duermen[a], y la sabiduría se levantará y les será dada.
  rationale: Se corrige la frase para eliminar la alternativa descartada «de entre ellos», hacer explícita en español la referencia plural asociada a «sleep», y reparar la construcción no idiomática «le será dada a ellos». «De entre los que duermen» conserva el sentido de surgimiento desde el estado de sueño sin introducir la antigua lectura errónea de procedencia desde el grupo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:26:59Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en lo esencial la estructura y el sentido del verso: mantiene el singular de ጻድቅ como «el justo», traduce ጥበብ como «sabiduría», y conserva el doble «se levantará». Sin embargo, presenta dos problemas frente a la evidencia auditada: (1) «de su sueño» no refleja bien la decisión inglesa actual «from their sleep»; en español conviene explicitar el plural posesivo como «de su sueño de ellos» o, mejor, reformular con naturalidad. (2) La nota al pie conserva como alternativa «de entre ellos», pero esa lectura fue corregida como mistraducción en la auditoría; ya no debe presentarse como alternativa válida. Además, «le será dada a ellos» descoordina el dativo singular «le» con el referente plural.'
  spanish_quality_summary: El texto es comprensible, pero «le será dada a ellos» suena incorrecto y poco idiomático; debe ser «les será dada» o «será dada a ellos». También «de su sueño» es ambiguo en español, pues normalmente remite a un poseedor singular. Una leve reformulación mejora claridad y dignidad sin apartarse del original.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «El justo» para ጻድቅ y «sabiduría» para ጥበብ están bien. La revisión necesaria es gramatical y de fidelidad a la auditoría, no de glosario teológico.
  issues:
  - severity: high
    issue: La nota al pie mantiene «de entre ellos» como alternativa.
    rationale: La auditoría inglesa documenta que esa lectura fue corregida como mistraducción del ge’ez እምነዋሙ; no debe seguir ofreciéndose como opción española.
  - severity: medium
    issue: «de su sueño» no expresa claramente el posesivo plural reflejado en la decisión inglesa vigente.
    rationale: En español, «su» puede ser singular o plural, pero aquí la ambigüedad afecta la fidelidad; conviene una formulación que señale claramente el referente plural.
  - severity: medium
    issue: «le será dada a ellos» mezcla dativo singular con referente plural.
    rationale: Es una construcción gramaticalmente defectuosa y poco natural; debe corregirse a «les será dada».
  revised_spanish_text: Y el justo se levantará de entre los que duermen[a], y la sabiduría se levantará y les será dada.
  revised_footnotes:
