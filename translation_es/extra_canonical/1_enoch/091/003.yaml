translation:
  language: es
  text: 'Y les habló a todos, a todos los hijos de la justicia, y dijo: «Oigan, hijos de Enoc, cada palabra de su padre, y atiendan a las palabras rectas de mi boca[a]; porque les hablo y les digo, amados: amen la justicia y caminen en ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase ge'ez es difícil. También puede entenderse como «la palabra recta de mi boca» o, según una lectura anterior, «escuchen rectamente las palabras de mi boca». Se sigue aquí la revisión textual que entiende «recta(s)» como adjetivo que modifica «palabra(s)».
    reason: lexical_alternative
lexical_decisions:
- source_word: ውሉደ ጽድቅ
  english_pob_choice: children of righteousness
  chosen_spanish: hijos de la justicia
  alternatives_spanish:
  - hijos de la rectitud
  - hijos justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción es identitaria y programática. En español, «hijos de la justicia» conserva mejor la fórmula de pertenencia y la fuerza ética/apocalíptica que una paráfrasis más plana como «hijos justos».
- source_word: ደቂቀ ሄኖክ
  english_pob_choice: children of Enoch
  chosen_spanish: hijos de Enoc
  alternatives_spanish:
  - descendientes de Enoc
  - hijos de Henoc
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hijos de Enoc» mantiene el vocativo directo y la relación filial/discípular del texto. Se prefiere la forma española habitual del nombre, Enoc, para legibilidad pública.
- source_word: ኵሎ ነገረ አቡክሙ
  english_pob_choice: every word of your father
  chosen_spanish: toda palabra de su padre
  alternatives_spanish:
  - todo lo que dice su padre
  - toda la խոսa de su padre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular colectivo «toda palabra» reproduce mejor el énfasis del mandato que una perífrasis más explicativa. «Su padre» conserva el referente directo sin sobrecargar el español con repeticiones.
- source_word: አጽምኡ
  english_pob_choice: listen
  chosen_spanish: atiendan
  alternatives_spanish:
  - escuchen
  - oigan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí no basta solo «oigan», porque el paralelo exige una respuesta obediente y atenta. «Atiendan» recoge bien la idea de prestar oído con diligencia y suena natural en español formal.
- source_word: ቃለ አፉየ
  english_pob_choice: the speech of my mouth / the upright words of my mouth
  chosen_spanish: las palabras rectas de mi boca
  alternatives_spanish:
  - la palabra recta de mi boca
  - las palabras de mi boca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indica que el adjetivo modifica al sustantivo y no funciona como adverbio. Por eso se traduce como «palabras rectas», conservando el matiz de integridad/rectitud y evitando la lectura errónea de «escuchen rectamente».
- source_word: አሰምዕ
  english_pob_choice: I speak to you and tell you
  chosen_spanish: les hablo y les digo
  alternatives_spanish:
  - les anuncio y les digo
  - les exhorto y les digo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo causativo puede tener fuerza de exhortación, pero el último pase revisó el inglés hacia una formulación menos interpretativa. En español, «les hablo y les digo» preserva la solemnidad sin añadir un matiz exhortativo explícito que el texto no obliga.
- source_word: ፍቁራን
  english_pob_choice: beloved ones
  chosen_spanish: amados
  alternatives_spanish:
  - amados míos
  - queridos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Amados» mantiene el tono afectuoso y solemne del vocativo, con buena fluidez litúrgica en español bíblico contemporáneo.
- source_word: ባቲ ሑሩ
  english_pob_choice: walk in it
  chosen_spanish: caminen en ella
  alternatives_spanish:
  - anden en ella
  - vivan en ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La metáfora ética de caminar en un camino o esfera de conducta se conserva con «caminen en ella». «Ella» retoma «la justicia» de forma clara y natural.
theological_decisions:
- issue: 'Cómo renderizar ጽድቅ/ርትዕ: ¿«justicia» o «rectitud»?'
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: En este contexto exhortativo, el término funciona como cualidad ética y estilo de vida, no principalmente como categoría jurídica. «Justicia» mantiene la continuidad con el vocabulario enóquico y con la equivalencia auditada del inglés, sin cerrar la posible resonancia de rectitud.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented exception.'
- issue: Si አሰምዕ debe intensificarse como «exhortar»
  english_pob_reading: I speak to you and tell you
  chosen_spanish_reading: les hablo y les digo
  alternative_spanish_readings:
  - les exhorto y les digo
  - les hago oír y les digo
  rationale: Aunque el causativo puede implicar exhortación, el contexto y la última revisión inglesa prefirieron no cargar el verbo con fuerza interpretativa adicional. Por eso se mantiene una formulación directa y sobria en español.
  doctrine_reference: 'Translation philosophy: optimal-equivalence with source restraint.'
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del expediente: se descartó la lectura adverbial de «listen rightly» y se entendió el segmento como «upright words/word of my mouth», con «I speak to you and tell you» como formulación no intensificada. La traducción española refleja esa adjudicación y evita la antigua opción adverbial.'
  spanish_consistency_notes:
  - Se usa «Enoc» como forma española estable del nombre propio, coherente con el registro bíblico en español.
  - Se mantiene «justicia» para ጽድቅ/ርትዕ, en continuidad con el vocabulario ético del pasaje.
  - Se evita «SEÑOR» u otra sustitución teológica ajena al texto, porque aquí no aparece el Tetragrámaton ni κύριος.
  - 'El paralelismo imperativo se conserva con dos verbos: «oigan»/«atiendan», y el vocativo final «amados» queda pegado al llamado moral final.'
