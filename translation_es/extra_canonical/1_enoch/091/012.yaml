base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/091/012.yaml
  text: And after this there shall be another week[a], the eighth, of righteousness; and a sword shall be given to it, so that righteous judgment may be carried out against the oppressors[b], and sinners shall be delivered into the hands of the righteous.
  footnotes:
  - marker: a
    text: Or 'an eighth week.' The Ge'ez sequence marks symbolic periods of history rather than ordinary calendar weeks.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'into the hands of the righteous' is an idiom of being given over to another's power or control.
    reason: cultural_note
