translation:
  language: es
  text: Y después de esto habrá otra semana[a], la octava, de rectitud; y se le dará una espada, para que se ejecute un juicio recto contra los opresores, y los pecadores serán entregados en las manos de los justos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una octava semana». La secuencia etiópica señala períodos simbólicos de la historia, no semanas ordinarias del calendario.'
    reason: lexical_alternative
  - marker: b
    text: La expresión «en las manos de» es un modismo que indica quedar entregado al poder o control de otro.
    reason: cultural_note
lexical_decisions:
- source_word: ካልእት
  english_pob_choice: another
  chosen_spanish: otra
  alternatives_spanish:
  - una segunda
  - una adicional
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de las semanas simbólicas sucesivas, «otra» expresa continuidad natural en español sin sugerir una segunda semana cronológica ordinaria.
- source_word: ሳምንት ሰንበት
  english_pob_choice: week, the eighth
  chosen_spanish: semana, la octava
  alternatives_spanish:
  - octava semana
  - un heptad octavo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción etiópica conserva el número apocalíptico de la semana. «La octava» mantiene la referencia estructural y suena más fluido que repetir «octava semana» en la cláusula.
- source_word: እንተ ጽድቅ
  english_pob_choice: of righteousness
  chosen_spanish: de justicia
  alternatives_spanish:
  - de rectitud
  - caracterizada por justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí ጽድቅ puede expresar tanto justicia como rectitud. En español, «de justicia» es más natural en una frase apocalíptica y preserva el marco judicial del pasaje.
- source_word: ይትወሀብ ላቲ ሰይፍ
  english_pob_choice: a sword shall be given to it
  chosen_spanish: se le dará una espada
  alternatives_spanish:
  - una espada será dada a ella
  - se le concederá una espada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pronombre remite a «semana», de género femenino en español. «Se le dará» conserva el pasivo impersonal y la imaginería de juicio sin forzar una literalidad torpe.
- source_word: ከመ ይትገበር ኵነኔ ጽድቅ
  english_pob_choice: so that righteous judgment may be carried out
  chosen_spanish: para que se ejecute un juicio justo
  alternatives_spanish:
  - para que se haga un juicio de justicia
  - a fin de que se lleve a cabo un juicio justo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa finalidad y acción judicial. «Se ejecute» refleja el carácter impersonal/ejecutado del juicio; «juicio justo» mantiene en español la tensión entre rectitud moral y acto judicial.
- source_word: እምእለ ይገፍዑ
  english_pob_choice: against the oppressors
  chosen_spanish: contra los opresores
  alternatives_spanish:
  - contra los que oprimen
  - contra los violentos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo apunta a violencia u opresión ejercida por un grupo culpable. «Opresores» resume bien la clase de infractores en un registro bíblico claro.
- source_word: ይትሜጠዉ ኃጥኣን በእደዊሆሙ ለጻድቃን
  english_pob_choice: sinners shall be delivered into the hands of the righteous
  chosen_spanish: los pecadores serán entregados en manos de los justos
  alternatives_spanish:
  - los pecadores serán puestos en manos de los justos
  - los pecadores serán entregados al poder de los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «En manos de» conserva el modismo bíblico de quedar bajo el poder o control de otro, tal como la audit trail inglesa lo señala. «Entregados» mantiene la pasividad judicial de la construcción.
theological_decisions:
- issue: Cómo rendir ጽድቅ en la caracterización de la semana y del juicio
  english_pob_reading: Retain 'righteousness' in 'week of righteousness' and 'righteous judgment'
  chosen_spanish_reading: 'Mantener el campo semántico de justicia/rectitud: «semana de justicia» y «juicio justo»'
  alternative_spanish_readings:
  - semana de rectitud
  - semana de justicia y juicio de rectitud
  rationale: El texto etiópico vincula el mismo tema moral en la semana y en el juicio. En español, «justicia» y «juicio justo» preservan la continuidad temática sin sonar forzados; «rectitud» sería posible, pero menos natural en este encuadre judicial.
  doctrine_reference: Consistencia terminológica de ጽድቅ; preservación de la estructura moral-judicial del pasaje apocalíptico.
- issue: Mantener la imaginería de la espada como instrumento de juicio
  english_pob_reading: Keep 'a sword shall be given to it' as apocalyptic judgment imagery
  chosen_spanish_reading: Conservar «se le dará una espada» como imagen de juicio apocalíptico
  alternative_spanish_readings:
  - se le concederá autoridad para juzgar
  - se le dará poder para vencer
  rationale: La fuente dice literalmente «espada»; por tanto, la traducción no debe disolver la imagen en una abstracción. «Espada» conserva el símbolo de juicio sancionado sin sobreinterpretarlo.
  doctrine_reference: Preservación de imaginería apocalíptica y judicial; evitar aplanar el símbolo en prosa religiosa general.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura auditada del inglés POB y del ge''ez: secuencia simbólica de semanas, uso explícito de «espada», y el giro judicial «entregados en manos de los justos». No se suavizó la tensión entre justicia/rectitud y juicio; solo se adaptó a un español natural y publicable.'
  spanish_consistency_notes:
  - Se prefirió «Y después de esto» para reflejar la secuencia narrativa del original.
  - «Justicia» se usó para ጽድቅ en la descripción de la semana; «juicio justo» conserva la dimensión judicial del segundo miembro.
  - «Pecadores» y «opresores» distinguen los dos grupos del verso sin introducir categorías ajenas al texto.
  - La puntuación separa claramente las cláusulas coordinadas del original y mantiene el paralelismo apocalíptico.
