translation:
  language: es
  text: Y todos serán entregados con las naciones[a]; y las torres[b] serán quemadas con fuego; y serán quitados de toda la tierra, y serán arrojados al juicio de fuego, y perecerán en ira y en juicio poderoso para siempre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase también puede entenderse como 'entre las naciones', según cómo se tome la preposición en el contexto.
    reason: lexical_alternative
  - marker: b
    text: El término probablemente se refiere a una estructura o recinto; 'torres' mantiene una referencia arquitectónica sobria sin precisar más de lo que permite el texto.
    reason: lexical_alternative
  - marker: c
    text: '''Para siempre'' expresa la finalidad escatológica del verso; no debe cargarse automáticamente con un sistema doctrinal más específico que el texto mismo.'
    reason: cultural_note
lexical_decisions:
- source_word: ይትወሀብ
  english_pob_choice: will be handed over
  chosen_spanish: serán entregados
  alternatives_spanish:
  - serán dados
  - serán entregados en manos de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico tiene un sentido pasivo/jussivo de 'dar, entregar'. 'Serán entregados' conserva mejor el tono judicial que 'serán dados' y evita una ampliación innecesaria.
- source_word: ምስለ አሕዛብ
  english_pob_choice: with the nations
  chosen_spanish: con las naciones
  alternatives_spanish:
  - entre las naciones
  - junto con las naciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición favorece 'con'. 'Naciones' se mantiene por el marco de juicio; 'gentiles' introduciría un contraste cristiano posterior que el verso no exige.
- source_word: ማኅፈሪ
  english_pob_choice: assembly-place
  chosen_spanish: torres
  alternatives_spanish:
  - lugar de reunión
  - campamento
  - recinto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión crítica de que el texto refleja aquí una lectura errónea en la transmisión dada; el contexto y la revisión apuntan a una referencia a estructuras incendiadas. 'Torres' es la opción española más sobria y legible para ese referente.
- source_word: ትነድድ በእሳት
  english_pob_choice: will burn with fire
  chosen_spanish: serán quemadas con fuego
  alternatives_spanish:
  - arderán en fuego
  - serán consumidas por el fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen apocalíptica de fuego se conserva sin suavizarla. La pasiva española se adapta al flujo de la serie judicial.
- source_word: ይወፅእዎሙ
  english_pob_choice: they will be removed
  chosen_spanish: serán removidos
  alternatives_spanish:
  - serán expulsados
  - serán sacados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Removidos'' refleja bien el desplazamiento forzoso y mantiene el registro formal; ''expulsados'' añade un matiz más interpretativo.'
- source_word: እምኵሉ ምድር
  english_pob_choice: from all the earth
  chosen_spanish: de toda la tierra
  alternatives_spanish:
  - de toda la tierra
  - de la tierra entera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Tierra'' mantiene el alcance cósmico/apocalíptico mejor que ''país'' o ''tierra'' en sentido local. La frase española es natural y fiel al amplio alcance del texto.'
- source_word: ይትገደፉ
  english_pob_choice: they will be cast
  chosen_spanish: serán arrojados
  alternatives_spanish:
  - serán echados
  - serán lanzados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Arrojados'' preserva la violencia del acto de juicio con un verbo fuerte y natural en español.'
- source_word: በኵነኔ እሳት
  english_pob_choice: into the judgment of fire
  chosen_spanish: al juicio de fuego
  alternatives_spanish:
  - en el juicio de fuego
  - a un juicio de fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Al juicio de fuego'' mantiene la relación direccional y la estructura judicial sin sobreexplicar el genitivo.'
- source_word: ይትሐጐሉ
  english_pob_choice: they will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - se consumirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Perecerán'' ofrece una destrucción real sin especificar el mecanismo más allá de la imagen de fuego y juicio.'
- source_word: በመዓት
  english_pob_choice: in wrath
  chosen_spanish: en ira
  alternatives_spanish:
  - en furor
  - en indignación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Ira'' es el equivalente natural y digno en español; conserva el matiz de juicio divino.'
- source_word: በኵነኔ ኃያል
  english_pob_choice: in mighty judgment
  chosen_spanish: en juicio poderoso
  alternatives_spanish:
  - en juicio fuerte
  - en severo juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Poderoso'' transmite la fuerza del adjetivo sin convertirlo en un comentario interpretativo adicional. ''Juicio poderoso'' conserva el paralelismo solemne del texto.'
- source_word: እንተ ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Para siempre'' es la forma más idiomática y mantiene la finalización escatológica sin introducir un sistema doctrinal posterior.'
theological_decisions:
- issue: Alcance del juicio final y duración
  english_pob_reading: The verse describes final, enduring judgment on the wicked, expressed with expulsion from the earth, fiery judgment, wrath, and 'forever.'
  chosen_spanish_reading: El verso presenta un juicio final y duradero sobre los impíos, expresado con remoción de la tierra, juicio de fuego, ira y la fórmula 'para siempre'.
  alternative_spanish_readings:
  - El lenguaje puede leerse como imagen apocalíptica intensa sin definir un modelo doctrinal posterior de tormento consciente eterno.
  - '''Para siempre'' puede entenderse como final esatológico de larga duración, no necesariamente como una definición filosófica de infinitud.'
  rationale: La secuencia etiópica acumula fórmulas de juicio y culmina con una expresión de duración explícita. La traducción conserva esa fuerza sin importar categorías doctrinales posteriores que el verso no formula.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La base etiópica provista muestra un texto con inestabilidades de transmisión y una revisión posterior que corrige lecturas previas. He seguido el estado revisado del audit trail, que traduce el verso como juicio contra entidades/naciones y torres, manteniendo la estructura apocalíptica y la duración final.
  spanish_consistency_notes:
  - Se usa 'Dios/Yahvé' solo cuando el texto lo requiera; en este versículo no aparece un referente divino explícito.
  - Se mantiene 'juicio de fuego' como frase formal, sin suavizarla a una mera metáfora.
  - '''Para siempre'' se conserva como marca de duración escatológica.'
  - El registro español es bíblico-digno pero no arcaizante.
