base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/091/009.yaml
  text: And all will be given over with the nations[a], and the towers will be burned with fire; and they will be removed from all the earth, and they will be cast into the judgment of fire[d][c][b], and they will perish in wrath and in mighty judgment forever.
  footnotes:
  - marker: a
    text: The noun rendered 'assembly-place' is uncertain; it may denote a gathering-place, camp, or collective enclosure. The translation keeps a spatial sense without overdefining it.
    reason: lexical_alternative
  - marker: b
    text: '''With the nations'' could also be understood as ''among the nations'' depending on how the preposition is taken in context.'
    reason: lexical_alternative
  - marker: c
    text: The closing 'forever' marks enduring eschatological finality in the verse; readers should avoid importing a later doctrinal system more specific than the text itself states.
    reason: cultural_note
  - marker: d
    text: Or 'And all of them will be handed over with the nations, and the assembly-place'.
