translation:
  language: es
  text: Y después de esto[a], Matusalén fue y llamó a todos sus hermanos ante sí, y reunió a sus parientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión inicial también puede rendirse «entonces» o «a partir de esto».
    reason: lexical_alternative
lexical_decisions:
- source_word: እምኔሁ
  english_pob_choice: after this
  chosen_spanish: y después de esto
  alternatives_spanish:
  - entonces
  - a partir de esto
  - luego de esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma preposicional funciona aquí como transición temporal narrativa. «Después de esto» conserva el flujo sin volverlo rígidamente literal.
- source_word: ሖረ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - partió
  - se fue
  - procedió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un verbo simple de movimiento. «Fue» mantiene la naturalidad narrativa del hebraísta/etiópico sin añadir matices no presentes.
- source_word: ማቱሳላ
  english_pob_choice: Methuselah
  chosen_spanish: Matusalén
  alternatives_spanish:
  - Methuselah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español bíblico es más reconocible «Matusalén»; conserva la identificación tradicional del personaje.
- source_word: ጸውዖሙ
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - citó
  - mandó llamar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede ser «llamar» o «convocar». «Llamó» es amplio y no fuerza una connotación formal o meramente social.
- source_word: ለኵሎሙ አኃዊሁ
  english_pob_choice: all his brothers
  chosen_spanish: a todos sus hermanos
  alternatives_spanish:
  - a todos sus hermanos varones
  - a todos sus hermanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hermanos» reproduce la relación familiar directa. Se evita «brethren» por arcaico y no necesario en español.
- source_word: ኀቤሁ
  english_pob_choice: to him
  chosen_spanish: junto a él
  alternatives_spanish:
  - a él
  - ante él
  - a su presencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición indica acercamiento o presencia con él. «Junto a él» comunica bien la dirección relacional sin sonar forzado.
- source_word: አስተጋብኦሙ
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - agrupó
  - convocó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El causativo expresa traer a otros juntos. «Reunió» es preciso, sobrio y natural en castellano bíblico contemporáneo.
- source_word: አዝማዲ ዚአሁ
  english_pob_choice: his kindred
  chosen_spanish: a sus parientes
  alternatives_spanish:
  - a su parentela
  - a sus familiares
  - a su kindred
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa a los vinculados por parentesco. «Parientes» es claro para el lector moderno; evita un calco innecesario como «kindred».
theological_decisions:
- issue: Alcance del parentesco
  english_pob_reading: The verse refers to Methuselah's literal familial relations ('brothers' and 'kindred'), not a spiritualized community.
  chosen_spanish_reading: 'El versículo habla de relaciones familiares literales: sus hermanos y sus parientes.'
  alternative_spanish_readings:
  - hermanos como miembros de un clan amplio
  - hermanos en sentido espiritual
  rationale: El texto inmediato no exige un sentido metafórico. Mantener el parentesco literal respeta el sentido narrativo de la escena.
  doctrine_reference: Conservar el sentido local del pasaje antes de armonizar términos comunitarios en el corpus.
translation_notes:
  revision_awareness: 'Se corrigió la correspondencia entre nota y texto: el marcador [a] aparece en la frase inicial de la traducción. La redacción evita el antiguo desliz de duplicar la apertura y conserva la clausula final sin añadir «a sí mismo», que no está en el ge''ez.'
  spanish_consistency_notes:
  - Se prefiere «Matusalén» por consistencia bíblica en español.
  - Se usa «parientes» para አዝማዲ, evitando sobreinterpretar como «familia» o «parentela» si el contexto no lo exige.
  - «Junto a él» traduce la cercanía de ኀቤሁ sin introducir un matiz de formalidad excesiva.
