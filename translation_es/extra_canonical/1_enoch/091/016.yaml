    reason: textual_variant
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan exactamente a las palabras/frases que explican. Se cambia «desaparecerá» por «se irá» para reflejar mejor el matiz de partida de ይወፅእ sin sugerir aniquilación. Se mantiene «potencias de los cielos» por su ambigüedad fiel al ge'ez. Se ajusta la cláusula final a «siete veces más para siempre» para mejorar la fluidez y seguir el orden del POB inglés revisado, dejando la incertidumbre textual en la nota.
