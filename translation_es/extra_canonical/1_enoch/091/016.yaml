translation:
  language: es
  text: Y el primer cielo se irá y pasará, y un cielo nuevo aparecerá, y todas las potencias[a] de los cielos resplandecerán siete veces más para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la hueste de los cielos». El término ge'ez puede denotar potencias, fuerzas o huestes celestiales, e incluso incluir cuerpos celestes además de seres celestiales.
    reason: lexical_alternative
  - marker: b
    text: La frase final es difícil. Probablemente significa «siete veces» o «siete veces más brillantemente». Subsiste cierta incertidumbre porque la redacción etíope transmitida no está del todo clara en este testimonio OCR.
    reason: textual_variant
lexical_decisions:
- source_word: ሰማይ፡ ቀዳማይ፡
  english_pob_choice: the first heaven
  chosen_spanish: el primer cielo
  alternatives_spanish:
  - el cielo primero
  - el cielo anterior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'ቀዳማይ indica orden de secuencia: primero, anterior. «El primer cielo» mantiene la contraparte con «un cielo nuevo» y conserva la imaginería cósmica concreta.'
- source_word: ይወፅእ፡
  english_pob_choice: shall depart
  chosen_spanish: desaparecerá
  alternatives_spanish:
  - saldrá
  - se irá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo literalmente sugiere salir/ir fuera. En este contexto de transición cósmica, «desaparecerá» comunica la salida del cielo primero sin afirmar más de lo que el texto exige.
- source_word: የኃልፍ፡
  english_pob_choice: pass away
  chosen_spanish: pasará
  alternatives_spanish:
  - pasará de largo
  - se extinguirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa pasar, irse, desaparecer. Junto con «desaparecerá» refuerza la retirada del cielo antiguo sin volverlo una paráfrasis excesiva.
- source_word: ሰማይ፡ ሐዲስ፡
  english_pob_choice: a new heaven
  chosen_spanish: un cielo nuevo
  alternatives_spanish:
  - el cielo nuevo
  - un cielo renovado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሐዲስ significa nuevo/fresco. «Un cielo nuevo» es la traducción más directa y no introduce la idea interpretativa de «renovado».
- source_word: ይትረአይ፡
  english_pob_choice: shall appear
  chosen_spanish: aparecerá
  alternatives_spanish:
  - será visto
  - se hará visible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma tiene sentido pasivo/reflexivo de ser visto o aparecer. «Aparecerá» es natural en español y preserva el tono revelatorio.
- source_word: ኵሉ፡ ኃይለ፡ ሰማያት፡
  english_pob_choice: all the powers of the heavens
  chosen_spanish: todas las potencias de los cielos
  alternatives_spanish:
  - todo el ejército de los cielos
  - todas las fuerzas de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኃይለ puede significar poder, fuerza o hueste. En este contexto apocalíptico, «potencias» conserva la ambigüedad entre cuerpos celestes y seres celestiales sin reducir el sentido.
- source_word: ያበርህ፡
  english_pob_choice: shall shine
  chosen_spanish: resplandecerán
  alternatives_spanish:
  - brillarán
  - darán luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo denota brillar o dar luz. «Resplandecerán» es una opción digna y vívida que mantiene la imaginería cósmica.
- source_word: ሰብዓተ፡ ምእዕቢተ።
  english_pob_choice: sevenfold forever
  chosen_spanish: siete veces más, para siempre
  alternatives_spanish:
  - siete veces
  - siete veces más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia es difícil. El valor seguro de ሰብዓተ es la intensificación por siete; por eso se expresa como «siete veces más». Se mantiene también la continuidad temporal con «para siempre», aunque el final del etíope es textualmente incierto.
theological_decisions:
- issue: Si el versículo enseña sustitución absoluta o renovación transformada del cosmos
  english_pob_reading: The main text preserves the imagery of the first heaven departing and a new heaven appearing without specifying whether this is absolute replacement or transformed renewal.
  chosen_spanish_reading: El texto principal conserva la imagen del primer cielo que desaparece y pasa, y de un cielo nuevo que aparece, sin decidir si se trata de sustitución absoluta o de renovación transformada.
  alternative_spanish_readings:
  - sustitución absoluta del cosmos antiguo
  - renovación o transformación del cosmos existente
  rationale: El ge'ez presenta una secuencia visionaria y un contraste, no una cosmología sistemática. La traducción mantiene la tensión en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que reordenó «sevenfold» antes de «forever» para reflejar mejor el orden de la fuente y sonar más natural. En español se optó por una fórmula equivalente que conserva el énfasis intensivo y la continuidad temporal.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando no aplica aquí; este versículo no contiene el nombre divino explícito.
  - Se preservó «cielos» en plural para respetar el genitivo colectivo de la expresión, aunque el singular podría sonar más natural en español.
  - «Potencias» se eligió para mantener la ambigüedad apocalíptica de ኃይለ sin cerrar la referencia a huestes angélicas o astros.
  - La colocación «siete veces más, para siempre» mantiene la tensión del final difícil sin imponer una lectura más definida de la que permite la fuente.
