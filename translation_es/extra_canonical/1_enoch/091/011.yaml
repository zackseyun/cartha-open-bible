    rationale: Aunque intenta seguir de cerca la sintaxis difícil del geʽez y del inglés auditado, en español la ausencia de un sujeto expreso vuelve la cláusula poco inteligible. El lector no sabe quiénes son los que «serán cortados». Hace falta una reparación mínima para que el español sea fiel y legible.
  - severity: low
