translation:
  language: es
  text: Y de él serán cortadas las raíces de la opresión[a], y los pecadores serán entregados a la espada. De entre los blasfemos, serán cortados en todo lugar[b][c][d], y los que maquinan violencia y los que cometen blasfemia serán destruidos por la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La revisión textual del audit trail corrige aquí la antigua lectura errónea «diez semanas». El sentido sigue la imagen de «raíces» y no una medida temporal.
    reason: textual_variant
  - marker: b
    text: «Blasfemos» y «blasfemia» mantienen en español el vínculo léxico entre la persona y el acto, como en el audit trail inglés.
    reason: lexical_alternative
  - marker: c
    text: La secuencia «en todo lugar» conserva el alcance universal del juicio; también podría traducirse «por todas partes».
    reason: lexical_alternative
  - marker: d
    text: 'La puntuación refleja la separación de cláusulas en el ge''ez: el grupo de «los que maquinan violencia» pasa a la última acción de juicio, no a la anterior.'
    reason: source_note
lexical_decisions:
- source_word: ይትገዘሙ
  english_pob_choice: there shall be cut off
  chosen_spanish: serán cortadas
  alternatives_spanish:
  - serán quitadas
  - serán arrancadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo verbal comunica exclusión o eliminación judicial. «Serán cortadas» preserva la fuerza apocalíptica sin añadir una idea más específica que el texto no exige.
- source_word: አሥራወ ዓመፃ
  english_pob_choice: the roots of oppression
  chosen_spanish: las raíces de la opresión
  alternatives_spanish:
  - las raíces de la injusticia
  - las raíces de la violencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la revisión más reciente del audit trail, que corrige la confusión con «diez semanas». «Raíces de la opresión» conserva la imagen vegetal y la carga social/moral del término.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los culpables
  - los malhechores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pecadores» reproduce el registro moral-religioso del contexto enóquico y mantiene la correspondencia con el juicio divino del pasaje.
- source_word: ይትሐጐሉ
  english_pob_choice: shall be delivered up
  chosen_spanish: serán entregados
  alternatives_spanish:
  - serán puestos en manos de
  - serán entregados a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede expresar ser consignados o puestos en manos de un juicio. En español, «serán entregados» conserva esa nuancia judicial y permite que «a la espada» precise el medio.
- source_word: በሰይፍ
  english_pob_choice: by the sword
  chosen_spanish: a la espada
  alternatives_spanish:
  - por la espada
  - mediante la espada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «entregados a la espada» es más natural que «por la espada» y conserva la imagen de condena/ejecución asociada al instrumento.
- source_word: ጽሩፋን
  english_pob_choice: the blasphemers
  chosen_spanish: los blasfemos
  alternatives_spanish:
  - los blasfemadores
  - los injuriosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Blasfemos» mantiene la relación léxica con «blasfemia» en la cláusula siguiente y suena natural en español bíblico contemporáneo.
- source_word: በኵሉ መካን
  english_pob_choice: in every place
  chosen_spanish: en todo lugar
  alternatives_spanish:
  - en cada lugar
  - por todas partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase adverbial transmite amplitud total. «En todo lugar» es claro, formal y fiel al alcance universal del juicio.
- source_word: ይሔልይዋ ለግፍዕ
  english_pob_choice: devise violence
  chosen_spanish: maquinan violencia
  alternatives_spanish:
  - piensan violencia
  - planean violencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa idear o planear. «Maquinan violencia» conserva la intención deliberada y el matiz sombrío del texto apocalíptico.
- source_word: ይገብርዋ ለጽርፈት
  english_pob_choice: commit blasphemy
  chosen_spanish: cometen blasfemia
  alternatives_spanish:
  - practican blasfemia
  - hacen blasfemia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cometen blasfemia» es la forma más natural en español para un acto culpable, y conserva la relación léxica con «blasfemos».
- source_word: በመጥባሕት
  english_pob_choice: by the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - a la espada
  - mediante la espada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí la espada funciona como instrumento de destrucción. «Por la espada» mantiene el paralelismo con el inglés auditado y el valor instrumental del texto.
theological_decisions:
- issue: Cómo reflejar la imagen de «raíces» tras la revisión textual del audit trail.
  english_pob_reading: the roots of oppression
  chosen_spanish_reading: las raíces de la opresión
  alternative_spanish_readings:
  - las raíces de la injusticia
  - los fundamentos de la opresión
  rationale: La revisión corrigió el antiguo error de leer «diez semanas». La metáfora de las raíces debe mantenerse porque el texto presenta un corte radical del origen del mal, no solo de sus efectos.
  doctrine_reference: Preservar la imaginería apocalíptica y el alcance del juicio sobre el origen del pecado social.
- issue: Cómo traducir la secuencia judicial de ser «entregados» y luego ejecutados.
  english_pob_reading: shall be delivered up to the sword
  chosen_spanish_reading: serán entregados a la espada
  alternative_spanish_readings:
  - serán puestos en manos de la espada
  - serán entregados por la espada
  rationale: «Entregados a la espada» conserva la tensión entre ser consignados al juicio y la ejecución resultante. No se resuelve la imagen en una sola acción más explícita que el original.
  doctrine_reference: Preservar la tensión judicial y no aplanar el lenguaje de condena.
- issue: Cómo representar la cláusula final sobre violencia y blasfemia sin deshacer el paralelismo.
  english_pob_reading: those who devise violence and those who commit blasphemy shall be destroyed by the sword
  chosen_spanish_reading: los que maquinan violencia y los que cometen blasfemia serán destruidos por la espada
  alternative_spanish_readings:
  - los que planean violencia y los que practican blasfemia serán destruidos por la espada
  - los que traman violencia y los que blasfeman serán destruidos por la espada
  rationale: Se conserva el paralelismo entre pensar/hacer el mal y la repetición del juicio. «Destruidos por la espada» sigue el audit trail inglés y mantiene el peso del castigo apocalíptico.
  doctrine_reference: Preservar paralelismo, retribución y el lenguaje de juicio sin suavizarlo.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección crítica del audit trail: አሥራወ no significa «diez», sino «raíces de». También se siguió la revisión gramatical que separa las cláusulas y asigna la última pasiva a «los que maquinan violencia y los que cometen blasfemia».'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el texto lo requiere; aquí no aparece el nombre divino.
  - Se prefirió «blasfemos/blasfemia» para mantener el vínculo léxico observado en el audit trail.
  - Se mantuvo un registro bíblico-apocalíptico sobrio, sin suavizar la violencia judicial del pasaje.
  - La elección de «por/a la espada» se ajusta para evitar un calco rígido donde el español pide mayor naturalidad, sin perder el instrumento de juicio.
