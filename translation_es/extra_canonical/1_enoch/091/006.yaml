translation:
  language: es
  text: Y el desafuero[a] volverá a aumentar, y será llevado a su plenitud sobre la tierra[b]; y toda obra de desafuero, de violencia y de pecado volverá a aferrarse[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez usa un verbo de repetición junto con «otra vez»; por eso la idea no es solo que el mal regresa, sino que vuelve a incrementarse o renovarse. «Desafuero» procura expresar el sentido de transgresión del orden debido, no una «anarquía» política en sentido moderno.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «será cumplido» o «será completado», en el sentido sombrío de que la maldad llega a su medida plena.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «volverá a apoderarse». La imagen es la de las obras del mal recobrando su agarre o dominio sobre la tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ዓመፃ
  english_pob_choice: lawlessness
  chosen_spanish: anarquía
  alternatives_spanish:
  - ilegalidad
  - desobediencia
  - impiedad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez distingue una oposición activa al orden debido, no solo una falta moral genérica. En español, "anarquía" comunica bien esa ausencia de orden/ley; se evita "violencia" porque ese matiz ya aparece aparte en ግፍዕ.
- source_word: ትደገም ካዕበ
  english_pob_choice: will again increase / will be repeated
  chosen_spanish: volverá a aumentar
  alternatives_spanish:
  - volverá a repetirse
  - será repetida otra vez
  - volverá a suceder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa más reciente entiende el inicio como crecimiento/agravamiento, no mera repetición. "Volverá a aumentar" conserva la idea de recurrencia y además expresa intensificación, sin la tautología de "repetirse otra vez".
- source_word: ትትፈጸም
  english_pob_choice: will be brought to completion
  chosen_spanish: será llevada a su plenitud
  alternatives_spanish:
  - será completada
  - será cumplida
  - alcanzará su plenitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo pasivo sugiere llegar al término o medida plena. "Llevada a su plenitud" preserva la carga ominosa de maduración plena del mal, sin imponer un tecnicismo de cumplimiento profético.
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el país
  - sobre la superficie de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Sobre la tierra" mantiene el registro apocalíptico amplio y natural en español, y refleja mejor la extensión global que una localización territorial más estrecha.'
- source_word: ትትአኀዝ
  english_pob_choice: will again take hold
  chosen_spanish: volverá a tomar posesión
  alternatives_spanish:
  - volverá a apoderarse
  - volverá a prender
  - volverá a prevalecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo transmite la idea de agarrar, sujetar o tomar control. En español, "tomar posesión" expresa con fuerza la imagen de que esas obras retoman dominio; se evita "prevalecer" porque diluye la imagen física del verbo.
- source_word: ኵሉ ግብረ
  english_pob_choice: every work of
  chosen_spanish: toda obra de
  alternatives_spanish:
  - cada obra de
  - todo acto de
  - todas las obras de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción distributiva se conserva con "toda obra de", que suena natural en español y mantiene la acumulación de actos concretos de maldad.
- source_word: ግፍዕ
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - injusticia
  - vejación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se conserva "violencia" porque es el equivalente más inmediato y porque el verso forma una tríada distinta: anarquía, violencia y pecado. No conviene fundirlo con el primer término.'
- source_word: አበሳ
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - ofensa
  - transgresión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Pecado" es el equivalente más claro y tradicionalmente entendible en español. Aquí no se requiere destacar la noción de culpa jurídica, sino el mal moral en la serie final.'
theological_decisions:
- issue: Mantener la tríada diferenciada de maldad sin homogeneizarla
  english_pob_reading: 'Distinct triad: ''lawlessness and violence and sin'''
  chosen_spanish_reading: 'Tríada distinta: ''anarquía, violencia y pecado'''
  alternative_spanish_readings:
  - '''maldad, opresión y transgresión'''
  - '''rebeldía, violencia y culpa'''
  rationale: El texto ge'ez enumera tres términos coordinados. La traducción española conserva esa diferenciación para no perder la fuerza acumulativa del juicio apocalíptico ni borrar matices semánticos.
  doctrine_reference: Principio de consistencia terminológica y preservación de distinciones léxicas del texto fuente.
- issue: Cómo reflejar la intensificación inicial además de la idea de recurrencia
  english_pob_reading: will again increase
  chosen_spanish_reading: volverá a aumentar
  alternative_spanish_readings:
  - volverá a repetirse
  - aumentará de nuevo
  rationale: La revisión inglesa más reciente interpretó el comienzo como aumento renovado, no simple repetición. El español elegido conserva la recurrencia indicada por ካዕበ y añade la noción de incremento, que encaja mejor con el contexto ominoso.
  doctrine_reference: Decisión de equivalencia óptima basada en el ajuste textual más reciente del audit trail.
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión más reciente del audit trail inglés, que corrigió la frase inicial de 'will be repeated' a 'will again increase'. Por eso la versión española evita una repetición tautológica y opta por un verbo que exprese tanto recurrencia como intensificación. También conserva la lectura tripartita del cierre, siguiendo la decisión inglesa de mantener tres términos diferenciados.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; en este versículo no aparece el tetragrámaton.
  - '''Anarquía'' se emplea como equivalente técnico de ''lawlessness'' para mantener la distinción con ''violencia'' y ''pecado''.'
  - Se conserva un registro sobrio y apocalíptico, sin paraphrasear el movimiento del texto fuente.
  - La puntuación en serie con punto y coma sigue el encadenamiento del original y facilita la lectura en español.
