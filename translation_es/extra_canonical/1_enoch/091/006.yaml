    rationale: La imagen de «take hold» es de aferrarse o recobrar dominio. «Tomar posesión» suena menos idiomático aquí y queda incompleto sin un complemento directo. «Volverá a aferrarse» o «volverá a apoderarse» comunican mejor la metáfora; con nota puede aclararse «sobre la tierra».
