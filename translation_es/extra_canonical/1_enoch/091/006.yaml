    issue: «anarquía» para ዓመፃ
    rationale: Aunque intenta reflejar ausencia de orden/ley, en español moderno «anarquía» suele evocar caos sociopolítico o una ideología, no «lawlessness» en sentido moral-jurídico. «Desafuero» mantiene mejor el matiz de transgresión del orden debido y conserva la distinción con «violencia» y «pecado».
  - severity: medium
