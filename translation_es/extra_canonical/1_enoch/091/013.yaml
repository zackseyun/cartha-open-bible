translation:
  language: es
  text: Y al cumplirse esto[a], casas serán escogidas por su[b] justicia[c], y la casa del gran Rey será edificada en gloria para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando llegue a su cumplimiento»; la frase temporal del ge'ez apunta al término o consumación del período.
    reason: lexical_alternative
  - marker: b
    text: 'El posesivo refleja la lectura adoptada en esta revisión: la justicia se entiende como perteneciente a los sujetos implicados, no solo como un marco externo.'
    reason: textual_variant
  - marker: c
    text: O «rectitud»; ጽድቅ puede abarcar justicia, rectitud o conducta justa, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: በተፍጻሜታ
  english_pob_choice: at its completion
  chosen_spanish: al cumplirse
  alternatives_spanish:
  - en su cumplimiento
  - en su consumación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase temporal expresa llegada de un término o plenitud del período. «Al cumplirse» conserva la idea de culminación sin sobreinterpretar el matiz escatológico.
- source_word: ይመረዩ
  english_pob_choice: shall be chosen
  chosen_spanish: serán escogidas
  alternatives_spanish:
  - serán elegidas
  - serán seleccionadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor pasivo/jussivo del verbo se refleja bien con «serán escogidas». Mantiene registro formal y el sentido de selección sin añadir una agencia explícita.
- source_word: አብያተ
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - moradas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural concreto de «casa» permite conservar la imaginería arquitectónica del texto. «Casas» es la equivalencia más directa y sobria en español.
- source_word: እምጽድቅ
  english_pob_choice: in righteousness
  chosen_spanish: por su justicia
  alternatives_spanish:
  - en justicia
  - por la justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indica que el sustantivo está vinculado a un posesivo, por lo que el sentido es «por su justicia». «Justicia» mantiene la fuerza moral/covenantal de ጽድቅ sin reducirla a mera rectitud privada.
- source_word: ዚአሆሙ
  english_pob_choice: for them
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - su propia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Siguiendo la revisión auditada, el pronombre funciona como posesivo referido a la justicia de los sujetos. En español, «su» comunica esa posesión de forma natural y breve.
- source_word: ወይትሐነጽ
  english_pob_choice: and ... shall be built
  chosen_spanish: será edificada
  alternatives_spanish:
  - será construida
  - será levantada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Edificada» conserva el campo semántico de construcción con tono bíblico y solemne. Evita la rusticidad de «construida» en esta cláusula elevada.
- source_word: ቤት ንጉሥ ዐቢይ
  english_pob_choice: the house of the great King
  chosen_spanish: la casa del gran Rey
  alternatives_spanish:
  - la casa del gran Rey
  - el palacio del gran Rey
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene «casa» porque el término puede resonar tanto arquitectónica como dinásticamente; «Rey» va con mayúscula para señalar el probable referente divino sin imponerlo como glosa explicativa.
- source_word: በስብሐት
  english_pob_choice: in glory
  chosen_spanish: en gloria
  alternatives_spanish:
  - con gloria
  - en esplendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición y el sustantivo se reproducen de forma directa. «En gloria» mantiene el registro solemne y la imagen de honor resplandeciente.
- source_word: እስከ ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la solución idiomática más clara en español y transmite continuidad sin fin.
theological_decisions:
- issue: Identidad de «el gran Rey»
  english_pob_reading: likely refers to God in this eschatological context
  chosen_spanish_reading: probablemente alude a Dios, manteniendo el título sin expansión doctrinal
  alternative_spanish_readings:
  - puede entenderse como un rey terrenal idealizado
  - puede dejarse como título abierto sin precisar el referente
  rationale: La traducción conserva la ambigüedad reverente del título. La mayúscula en «Rey» orienta al lector sin cerrar el sentido más allá de lo que el contexto permite.
  doctrine_reference: Preservar la tensión interpretativa; no introducir fórmulas doctrinales ajenas al texto.
- issue: Sentido de la relación entre casas y justicia
  english_pob_reading: houses shall be chosen because of their righteousness
  chosen_spanish_reading: casas serán escogidas por su justicia
  alternative_spanish_readings:
  - casas serán escogidas en justicia
  - las casas de los justos serán escogidas
  rationale: La revisión textual favorece una lectura donde la justicia califica la posesión/relación de los sujetos, no una selección abstracta de personas. Se conserva la imagen de «casas» y el vínculo con la justicia sin resolverlo mediante paráfrasis.
  doctrine_reference: Respetar la tensión textual derivada de la revisión filológica y no neutralizar la imaginería apocalíptica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión crítica que corrige la lectura previa de «serán escogidas porque de su justicia» y favorece una relación posesiva: «por su justicia». También se preservó la imagen concreta de «casas» y la referencia al «gran Rey» como título reverente y probablemente divino, conforme al audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico formal pero con español natural.
  - «Casa» se conservó en singular para ቤት y en plural para አብያተ, respetando el contraste del original.
  - No se empleó «SEÑOR» como sustituto del nombre divino, ya que aquí no aparece YHWH explícitamente.
  - Se usó «Rey» con mayúscula en coherencia con la lectura teológica probable, sin convertirla en una glosa interpretativa.
