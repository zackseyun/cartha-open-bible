translation:
  language: es
  text: Bienaventurados ustedes, oh justos y escogidos, porque su porción[a] es gloriosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su parte» o «su lote». El término ge'ez denota una porción asignada o una parte con sentido de herencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ብፁዓን
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el tono de bienaventuranza elevado y solemne del original; «felices» sería demasiado leve para este contexto apocalíptico.
- source_word: አንትሙ
  english_pob_choice: are you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El etíope expresa el plural de segunda persona como destinatarios directos; en español, «ustedes» comunica naturalmente esa dirección plural sin forzar el orden.
- source_word: ጻድቃን
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - justificados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Justos» mantiene la fuerza ética y judicial del término en un registro bíblico claro; «rectos» sería posible, pero menos asentado en esta fórmula.
- source_word: ወኅሩያን
  english_pob_choice: chosen ones
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - escogidos y elegidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» preserva el valor sustantivo del plural sin introducir una terminología doctrinal más cargada que la necesaria; sigue de cerca la decisión inglesa de no imponer «electos» como forma principal.
- source_word: እስመ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce de manera natural la base causal de la bienaventuranza en español; «porque» es claro y no añade matices ajenos.
- source_word: ስቡሕ
  english_pob_choice: glorious
  chosen_spanish: gloriosa
  alternatives_spanish:
  - espléndida
  - honrosa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gloriosa» conserva el valor de esplendor/ gloria del término y funciona bien con «porción» en español bíblico.
- source_word: ክፍልክሙ
  english_pob_choice: your portion
  chosen_spanish: su porción
  alternatives_spanish:
  - su parte
  - su herencia
  - su lote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Porción» reproduce la imagen de una asignación o parte heredada; en español evita la ambigüedad de «lote» y mantiene el trasfondo de reparto/inherencia.
theological_decisions:
- issue: Tratamiento de ወኅሩያን como designación del grupo
  english_pob_reading: chosen ones
  chosen_spanish_reading: escogidos
  alternative_spanish_readings:
  - elegidos
  - electos
  rationale: Se mantiene la designación del grupo sin cargar el verso con un tecnicismo doctrinal posterior. «Escogidos» conserva la tensión bíblica entre elección y descripción del colectivo, de manera acorde con el POB en inglés.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: Valor de ክፍልክሙ como reparto/inherencia
  english_pob_reading: your portion
  chosen_spanish_reading: su porción
  alternative_spanish_readings:
  - su herencia
  - su parte
  rationale: «Porción» mantiene el campo semántico de asignación recibida y no reduce el término a una mera cantidad. Al mismo tiempo, evita imponer de entrada una lectura legal exclusiva si el contexto apocalíptico sugiere tanto reparto como destino asignado.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo de control reportó alta concordancia (1.0). Por ello, el borrador español sigue de cerca la lectura inglesa auditada y solo ajusta la naturalidad sintáctica al español.
  spanish_consistency_notes:
  - Se mantuvo «escogidos» en lugar de «electos» para conservar el tono del texto sin importar terminología doctrinal no exigida por el verso.
  - «Porción» se usa de manera consistente para reflejar la idea de asignación/inherencia del ge'ez.
  - El registro es solemne y bíblico, pero no arcaizante en exceso.
