translation:
  language: es
  text: Y comencé a pronunciar la tercera parábola[a] acerca de los justos y acerca de los escogidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tercera similitud». El término ge'ez puede designar un encabezado de discurso de tipo parábola o similitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: አኀዝኩ
  english_pob_choice: I began
  chosen_spanish: comencé
  alternatives_spanish:
  - empecé
  - tomé la palabra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa un inicio inceptivo del discurso. En español, «comencé» conserva ese valor de comienzo sin añadir matices innecesarios de posesión o captura.
- source_word: እበል
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - pronunciar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En una cabecera de discurso, «hablar» suena natural en español y refleja el valor infinitivo ligado al inicio de una nueva sección de revelación.
- source_word: ሣልሰ ምሳሌ
  english_pob_choice: the third parable
  chosen_spanish: la tercera parábola
  alternatives_spanish:
  - la tercera similitud
  - la tercera comparación
  - el tercer discurso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: POB eligió «parable» para ምሳሌ; en español, «parábola» es el equivalente más claro y lector-friendly. «Similitud» preserva una posibilidad léxica, pero resulta menos natural.
- source_word: በእንተ ጻድቃን
  english_pob_choice: concerning the righteous
  chosen_spanish: acerca de los justos
  alternatives_spanish:
  - acerca de los rectos
  - sobre los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El grupo apocalíptico se mantiene como designación de colectivo. «Justos» conserva la referencia bíblica habitual y evita aplanar el matiz forense/covenantal que puede tener el término.
- source_word: ወበእንተ ኅሩያን
  english_pob_choice: and concerning the chosen
  chosen_spanish: y acerca de los escogidos
  alternatives_spanish:
  - y acerca de los elegidos
  - y acerca de los seleccionados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» preserva el sentido de grupo elegido sin cargar de inmediato con terminología confesional posterior que a veces se asocia a «elegidos». Mantiene además el paralelo con el colectivo anterior.
theological_decisions:
- issue: Designación del grupo ኅሩያን
  english_pob_reading: the chosen
  chosen_spanish_reading: los escogidos
  alternative_spanish_readings:
  - los elegidos
  - los electos
  rationale: En el contexto del Libro de las Parábolas, se trata de una categoría identitaria recurrente. «Escogidos» conserva esa categoría sin importar sistematizaciones doctrinales ajenas al pasaje.
  doctrine_reference: Preservar el sentido local del corpus apocalíptico antes de armonizar con sistemas posteriores
- issue: Etiqueta literaria para ምሳሌ
  english_pob_reading: parable
  chosen_spanish_reading: parábola
  alternative_spanish_readings:
  - similitud
  - discurso
  rationale: La POB optó por una lectura moderna y legible de ምሳሌ. «Parábola» es el equivalente español más transparente y mantiene el registro literario sin arcaísmo innecesario.
  doctrine_reference: Claridad moderna sin perder el rótulo literario tradicional del pasaje
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el paquete fuente ge''ez y el andamiaje auditado en inglés. No se introdujeron expansiones interpretativas; se mantuvo la estructura de encabezado: inicio del discurso + designación de la tercera unidad + dos grupos destinatarios.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «escogidos» en lugar de «elegidos» para conservar continuidad con la terminología del grupo en el contexto apocalíptico.
  - La preposición repetida «acerca de» reproduce el valor tópico de በእንተ sin sonar demasiado literal en español.
