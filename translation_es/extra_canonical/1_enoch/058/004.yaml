  rationale: Se ajusta ጽድቀ a «rectitud» para seguir mejor la decisión léxica auditada y el paralelismo con «los justos». También se reubican las notas sobre el título final para que sus marcadores aparezcan en la frase que realmente comentan. Se conservan el tono, la sintaxis general y la decisión revisada «Señor de la Eternidad».
