translation:
  language: es
  text: Y buscarán la luz y hallarán[a] rectitud con el Señor de los Espíritus. Paz a los justos en el nombre del Señor de la Eternidad[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obtendrán rectitud»; el verbo ge'ez puede implicar tanto hallar como obtener.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «el Señor Eterno»; el título final tiene una amplitud semántica que la traducción no debe cerrar demasiado.
    reason: lexical_alternative
  - marker: c
    text: La fórmula también puede leerse como «el Señor del siglo/era»; se prefiere «de la Eternidad» por mayor claridad en español y por la revisión inglesa más reciente.
    reason: lexical_alternative
lexical_decisions:
- source_word: የኃሥሡ
  english_pob_choice: they will seek
  chosen_spanish: buscarán
  alternatives_spanish:
  - buscarán con afán
  - buscarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa la acción de buscar o procurar; en español, «buscarán» mantiene la fuerza verbal y el tono visionario sin añadir matices no atestiguados.
- source_word: ለብርሃን
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El objeto es la luz como imagen apocalíptica; el artículo definido conserva la referencia concreta del original y la simetría con el verbo de búsqueda.
- source_word: ይረክቡ
  english_pob_choice: find
  chosen_spanish: hallarán
  alternatives_spanish:
  - obtendrán
  - recibirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hallarán» reproduce de manera natural la pareja buscar/encontrar y deja abierta la posible idea de obtener algo, sin forzarla en el texto principal.
- source_word: ጽድቀ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - justicia
  - rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque la POB inglesa prefirió «righteousness», en español «justicia» comunica bien la fuerza moral y covenantal del término y suena más natural en esta construcción; «rectitud» queda como alternativa posible, pero menos idiomática aquí.
- source_word: በኀበ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - ante
  - en presencia de
  - junto a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Con» es la forma española más breve y fiel para expresar proximidad o relación con la fuente de la justicia, sin decidir en exceso si el matiz es presencia, relación o procedencia.
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título en forma establecida por la tradición POB y por el valor técnico del epíteto en 1 Enoc; el plural se mantiene porque es parte del título divino.
- source_word: ሰላም ለጻድቃን
  english_pob_choice: Peace be to the righteous
  chosen_spanish: Paz a los justos
  alternatives_spanish:
  - Paz sea con los justos
  - Paz sobre los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, la fórmula benedictoria se expresa de modo más natural como exclamación o declaración breve; «Paz a los justos» conserva el carácter de bendición sin introducir un verbo que el original no requiere explícitamente.
- source_word: በስመ
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por el nombre de
  - mediante el nombre de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La locución es formulaica y corresponde de manera transparente a la expresión española habitual, sin perder el valor litúrgico/jurídico del original.
- source_word: እግዚአ ዓለም
  english_pob_choice: the Lord of Eternity / the Lord of the Age
  chosen_spanish: el Señor de la Eternidad
  alternatives_spanish:
  - el Señor de la Era
  - el Señor del mundo
  - el Señor del siglo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa más reciente favorece «Lord of Eternity», y en español «Eternidad» comunica mejor el alcance cósmico y temporal del título que «Edad» o «Era», que sonarían restrictivas o ambiguas.
theological_decisions:
- issue: Título divino final እግዚአ ዓለም
  english_pob_reading: the Lord of Eternity
  chosen_spanish_reading: el Señor de la Eternidad
  alternative_spanish_readings:
  - el Señor del mundo
  - el Señor de la Era
  rationale: La decisión debe conservar la amplitud del título y no limitarlo a una época concreta. «Eternidad» evita la restricción de «edad» y mantiene el tono apocalíptico y soberano del pasaje.
  doctrine_reference: Preservar la tensión semántica del título divino sin aplanarla; primacía del sentido del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La auditoría inglesa muestra una revisión reciente del título final desde «the Lord of the Age» a «the Lord of Eternity», con confirmación posterior de que no hacía falta otro cambio. En español se sigue esa revisión y se evita «Edad», que sonaría demasiado limitada. También se mantiene abierta la alternativa verbal de ይረክቡ mediante nota, porque el ge'ez permite tanto encontrar como obtener.
  spanish_consistency_notes:
  - Se mantiene «Señor de los Espíritus» como título fijo en vez de normalizarlo a una forma más libre.
  - Se prefiere «justicia» sobre «rectitud» por fluidez y por la relación con «los justos» en la segunda cola.
  - El tono es benedictorio y apocalíptico, con puntuación que respeta la paralelismo del original.
