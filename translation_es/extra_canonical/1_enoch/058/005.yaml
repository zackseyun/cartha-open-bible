revisions:
- from: Y después de esto se dirá a los santos en el cielo[a][b][c].
  to: Y después de esto se dirá a los consagrados[b] en el cielo[a][c].
  rationale: 'Se revisa «los santos» a «los consagrados» para preservar mejor la decisión léxica documentada de mantener la apertura de «holy ones» sin importar connotaciones eclesiásticas posteriores. También se corrigen las notas para que reflejen con precisión la función de cada una en la auditoría inglesa: explicación de la impersonalidad, ambigüedad referencial y traducción previa.'
