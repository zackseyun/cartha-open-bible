review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del ge''ez: «Y después de esto» para ወእምድኅረዝ, «se dirá» para la pasiva impersonal ይትበሀል, y «en el cielo» para በሰማይ. Sin embargo, «a los santos» no preserva tan bien como debería la decisión léxica del POB de mantener «holy ones» sin las connotaciones eclesiásticas de «saints/santos».'
  spanish_quality_summary: 'El español es natural y claro. La única reparación importante es léxica/terminológica: «los santos» suena más cargado de tradición eclesiástica de lo deseado y reduce la transparencia del original. También conviene ajustar las notas: la nota a es redundante porque repite exactamente el texto principal como si fuera alternativa, y la nota c debería conservarse como historial de traducción previa, no como alternativa léxica principal.'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. Sí aplica la preferencia documental por una traducción transparente de «holy ones»; en español, «los santos» no refleja tan bien esa rationale como «los consagrados» o mejor «los santos[a?]»? Dado el contexto y la necesidad de apertura interpretativa, «los consagrados» preserva mejor la neutralidad que «los santos», aunque sigue siendo algo menos idiomático. Aquí la opción más fiel al rationale documentado es «los consagrados», apoyada por nota aclaratoria sobre posibles referentes.
  issues:
  - severity: medium
    issue: «a los santos» introduce connotaciones eclesiásticas no deseadas
    rationale: La documentación inglesa escogió «holy ones» precisamente para evitar el peso interpretativo de «saints». En español, «santos» activa de manera similar una lectura más confesional/tradicional y no es la mejor preservación de la rationale léxica.
  - severity: low
    issue: La nota a no aporta una alternativa real
    rationale: Dice «O “se dirá”» cuando el texto principal ya dice «se dirá». La nota debería explicar directamente la construcción impersonal pasiva, sin presentarla como variante.
  - severity: low
    issue: La nota c tiene razón histórica distinta de la que aparece en el borrador
    rationale: 'En la auditoría inglesa, «it will be spoken» quedó como rendering previo, no como alternativa preferida vigente. En español conviene reflejarlo como «Traducción anterior: “se hablará”».'
  revised_spanish_text: Y después de esto se dirá a los consagrados[b] en el cielo[a][c].
