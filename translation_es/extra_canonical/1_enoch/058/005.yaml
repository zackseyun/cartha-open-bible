translation:
  language: es
  text: Y después de esto se dirá a los consagrados[b] en el cielo[a][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez usa una expresión pasiva impersonal y no nombra al hablante.
    reason: lexical_alternative
  - marker: b
    text: «Consagrados» puede referirse a seres celestiales o a los justos que están en el cielo; la cláusula no lo especifica.
    reason: alternative_reading
  - marker: c
    text: 'Traducción anterior: «se hablará».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወእምድኅረዝ
  english_pob_choice: And after this
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Y después de aquello
  - Y luego de esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión temporal compuesta introduce la siguiente escena de la visión. «Después de esto» conserva la relación narrativa apocalíptica de manera natural en español.
- source_word: ይትበሀል
  english_pob_choice: it will be said
  chosen_spanish: se dirá
  alternatives_spanish:
  - será dicho
  - se hablará
  - será proclamado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez usa una construcción pasiva impersonal del verbo «decir». En español, «se dirá» reproduce mejor esa impersonalidad que añadir un hablante explícito no presente en el texto.
- source_word: ለቅዱሳን
  english_pob_choice: to the holy ones
  chosen_spanish: a los santos
  alternatives_spanish:
  - a los santos seres
  - a los santos seres celestiales
  - a los consagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Santos» es la forma más natural en español para el campo semántico de «holy ones», pero mantiene la apertura interpretativa del original sobre si se trata de seres celestiales o de los justos. Se evita forzar una glosa más específica.
- source_word: በሰማይ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  - en el cielo celestial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El testimonio ge'ez está en singular, así que «en el cielo» refleja con fidelidad la forma dada. En español, «cielo» funciona bien tanto para el espacio celestial como para el ámbito celeste del contexto apocalíptico.
theological_decisions:
- issue: Identidad de «los santos / holy ones»
  english_pob_reading: the phrase is left untranslated beyond its lexical sense, without deciding whether it refers to angels, the righteous dead, or the elect community
  chosen_spanish_reading: 'la frase queda abierta: puede referirse a seres celestiales o a los justos que están en el cielo, sin decidirlo'
  alternative_spanish_readings:
  - a los ángeles en el cielo
  - a los justos en el cielo
  - a la comunidad elegida / los santos
  rationale: El contexto breve no obliga a fijar una identificación única. Mantener «los santos» conserva la tensión teológica documentada por el POB en inglés y evita resolver indebidamente una ambigüedad del texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se siguió el último estado de revisión, que mantuvo sin cambios la lectura inglesa «it will be said» por ser más precisa para el verbo ge'ez ይትበሀል. La redacción española refleja esa precisión con una pasiva impersonal natural («se dirá») y conserva la ambigüedad sobre «los santos».
  spanish_consistency_notes:
  - Se mantiene «cielo» en singular por fidelidad al testimonio ge'ez.
  - Se usa «santos» como equivalente directo de «holy ones», sin cargarlo necesariamente con un sentido eclesiástico posterior.
  - La construcción impersonal en español preserva la ausencia de un hablante explícito en el original.
