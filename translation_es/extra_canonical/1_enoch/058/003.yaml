translation:
  language: es
  text: Y los justos estarán en la luz del sol, y los escogidos en la luz de la vida eterna; y no habrá fin a los días de su vida[b], y los santos tendrán días sin número[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los días de los santos serán sin número». El ge''ez es literal e idiomático, y enfatiza una duración ilimitada más que una mera gran cantidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y los santos no tendrán número de días».'
    reason: previous_rendering
lexical_decisions:
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La raíz etiópica designa a quienes son caracterizados por justicia/rectitud. En español, «justos» conserva bien el valor ético y relacional, y funciona de forma natural en un contexto visionario.
- source_word: በብርሃነ ፀሐይ
  english_pob_choice: in the light of the sun
  chosen_spanish: en la luz del sol
  alternatives_spanish:
  - por la luz del sol
  - en la luz del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la imagen cósmica de estar 'en' la luz, no solo iluminados por ella. «Del sol» conserva la referencia explícita al astro sin volver la frase más explicativa de lo que pide el texto.
- source_word: ኅሩያን
  english_pob_choice: the chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los escogidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» comunica la categoría de personas seleccionadas por Dios y suena menos marcadamente técnico que «elegidos» en español eclesial. Mantiene el paralelo con los justos sin introducir un matiz doctrinal ajeno.
- source_word: በብርሃነ ሕይወት ዘለዓለም
  english_pob_choice: in the light of eternal life
  chosen_spanish: en la luz de la vida eterna
  alternatives_spanish:
  - en la luz de vida eterna
  - en la luz de la vida eterna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase etiópica conserva la imagen de una esfera o resplandor asociado con la vida eterna. «Vida eterna» es la forma más clara y fiel en español, sin forzar una reformulación doctrinal.
- source_word: ማኅለቆተ አልቦቱ
  english_pob_choice: there shall be no end
  chosen_spanish: no habrá fin
  alternatives_spanish:
  - no tendrá fin
  - no habrá término
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La negación absoluta del final se expresa de forma natural en español con «no habrá fin». Esta opción preserva la fuerza del original sin añadir explicaciones.
- source_word: መዋዕለ ሕይወቶሙ
  english_pob_choice: the days of their life
  chosen_spanish: los días de su vida
  alternatives_spanish:
  - los días de su vida
  - su vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imaginería temporal explícita de «días», importante para el paralelismo del versículo. «Su vida» sería más fluido, pero borraría la repetición literal del texto.
- source_word: ቅዱሳን
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos
  - los consagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí «santos» es la traducción española más natural de «holy ones» y mantiene la categoría sacra del grupo. Aunque puede tener resonancias eclesiales, en este contexto sigue siendo una equivalencia adecuada y transparente.
- source_word: ኍልቈ መዋዕለ አልቦሙ
  english_pob_choice: shall have days without number
  chosen_spanish: tendrán días sin número
  alternatives_spanish:
  - tendrán días innumerables
  - sus días serán sin número
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión etiópica apunta a duración inagotable o incontable, no a ausencia de días. «Días sin número» conserva el giro idiomático y la ambigüedad productiva del original.
theological_decisions:
- issue: Cómo traducir ኅሩያን sin perder la categoría teológica del grupo enóquico
  english_pob_reading: the chosen
  chosen_spanish_reading: los escogidos
  alternative_spanish_readings:
  - los elegidos
  - los escogidos
  rationale: «Escogidos» mantiene la idea de elección divina sin cargar el texto con terminología confesional más rígida. En un contexto enóquico visionario, la claridad y la transparencia pesan más que una fórmula técnica.
  doctrine_reference: §Consistencia de términos clave; §Mantener categorías del texto sin importación doctrinal innecesaria
- issue: Cómo expresar la última cláusula sobre los días de los santos
  english_pob_reading: the holy ones shall have days without number
  chosen_spanish_reading: los santos tendrán días sin número
  alternative_spanish_readings:
  - los santos tendrán días sin número
  - los santos tendrán días innumerables
  rationale: La forma elegida deja visible la sintaxis y el paralelismo del original, evitando resolver la frase en una paráfrasis interpretativa. El español permite la expresión idiomática sin perder la literalidad audit-able del giro.
  doctrine_reference: §Preservar la tensión lexical; guía de transparencia en literatura enóquica
- issue: Si conviene usar 'santos' o una opción más literal como 'los santos/los consagrados'
  english_pob_reading: the holy ones
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los santos
  - los consagrados
  rationale: Aunque «los santos» puede sonar eclesial, es el equivalente más directo y reconocido de 'holy ones' en español. No se ha sustituido por una perífrasis menos natural que debilitaría el contraste con 'los justos' y 'los escogidos'.
  doctrine_reference: §Equivalencia funcional con control de connotación; consistencia léxica
translation_notes:
  revision_awareness: El audit trail inglés registró una revisión de la cláusula final desde una forma muy literal («no habrá número de días») hacia la idiomática «days without number» para evitar la falsa idea de cero días. La versión española adopta desde el inicio una solución idiomática equivalente («días sin número») para preservar el sentido de duración ilimitada sin perder la huella lexical del original.
  spanish_consistency_notes:
  - Se ha mantenido «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - «Mesías/Cristo» no aparece en el versículo.
  - 'Se conserva la serie paralela: justos / escogidos / santos, con diferencias semánticas visibles en español.'
  - La cláusula final conserva la rareza del hebreo/etiópico mediante una construcción comprensible pero no explicativa.
