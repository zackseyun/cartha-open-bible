review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del verso y la corrección adjudicada del ge''ez como pasivo/intransitivo: ‘no serán salvados … ni podrán huir’. También conserva correctamente el contraste entre la inutilidad de la riqueza y la imposibilidad de fuga. Sin embargo, la nota [b] introduce una alternativa española menos adecuada y comenta ‘causa o instrumento’ de forma algo imprecisa; además, por claridad contextual conviene preferir ‘librados’ en el texto principal para evitar lectura soteriológica cristiana posterior, en línea con la decisión teológica documentada.'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. No obstante, ‘serán salvados’ suena más doctrinal en español que ‘serán librados’, y la nota [b] es innecesaria o distractora porque no preserva una alternativa significativa del original sino una variación preposicional española. La redacción revisada mejora precisión contextual y fluidez.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión clave es contextual: para ኢይድኅኑ, aunque el inglés adjudicado usa ‘be saved’, en español ‘ser librados’ preserva mejor el sentido local de liberación del juicio sin activar con tanta fuerza la soteriología cristiana. ‘Huir’ para ጐይየ está bien y mantiene la imagen apocalíptica.'
  issues:
  - severity: medium
    issue: ‘serán salvados’ en el texto principal puede sonar excesivamente soteriológico en español
    rationale: Aunque el ge'ez debe reflejarse como pasivo/intransitivo, el contexto trata de librarse del juicio por medio de riquezas. En español eclesial, ‘salvados’ tiende a leerse en clave doctrinal; ‘librados’ comunica mejor el sentido inmediato sin apartarse del original.
  - severity: low
    issue: La nota [b] sobre ‘por oro ni por plata’ no preserva una alternativa textual significativa
    rationale: El inglés auditado no justifica una nota de traducción por la mera elección preposicional, y la explicación ‘causa o instrumento frustrado’ no añade claridad decisiva. Es mejor eliminarla para no sobreanotar.
  - severity: low
    issue: La nota [a] puede formular mejor la relación entre ‘librados’ y ‘salvados’
    rationale: Si el texto principal usa ‘librados’, la nota debe presentar ‘salvados’ como alternativa posible y explicar que el sentido aquí es quedar a salvo del juicio, no la salvación doctrinal posterior.
  revised_spanish_text: Y en aquellos días no serán librados[a] por oro ni por plata, ni podrán huir.
  revised_footnotes:
  - marker: a
    text: 'O ‘no serán salvados’. El verbo ge''ez aquí se entiende como pasivo/intransitivo: no lograrán quedar a salvo o ser librados del juicio por medio de riquezas.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto principal a ‘librados’ para preservar en español el sentido contextual de liberación del juicio sin sugerir innecesariamente la salvación doctrinal posterior. Se elimina la nota sobre la preposición porque no corresponde a una alternativa fuente de suficiente peso. Se mantiene la pasividad adjudicada del verbo ge'ez y la imagen de una huida imposible.
