revisions:
- from: Y en aquellos días no serán salvados[a] por oro ni por plata[b], ni podrán huir.
  to: Y en aquellos días no serán librados[a] por oro ni por plata, ni podrán huir.
  rationale: Se ajusta el texto principal a ‘librados’ para preservar en español el sentido contextual de liberación del juicio sin sugerir innecesariamente la salvación doctrinal posterior. Se elimina la nota sobre la preposición porque no corresponde a una alternativa fuente de suficiente peso. Se mantiene la pasividad adjudicada del verbo ge'ez y la imagen de una huida imposible.
