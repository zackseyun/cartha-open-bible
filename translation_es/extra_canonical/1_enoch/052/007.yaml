translation:
  language: es
  text: Y en aquellos días no serán librados[a] por oro ni por plata, ni podrán huir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ‘no serán salvados’. El verbo ge''ez aquí se entiende como pasivo/intransitivo: no lograrán quedar a salvo o ser librados del juicio por medio de riquezas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይከውን
  english_pob_choice: And ... will be
  chosen_spanish: Y
  alternatives_spanish:
  - Y acontecerá
  - Y sucederá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula introduce una continuación narrativa/apocalíptica; en español puede integrarse naturalmente con la referencia temporal sin añadir un verbo auxiliar pesado.
- source_word: በእማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión apocalíptica fija se conserva con el registro elevado y profético de ‘aquellos días’.
- source_word: ኢይድኅኑ
  english_pob_choice: they will not be saved
  chosen_spanish: no serán salvados
  alternatives_spanish:
  - no serán librados
  - no podrán ser salvos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se sigue la corrección textual/gramatical del Ge''ez: el verbo es intransitivo/pasivo en sentido de ‘ser salvados, librados, escapar’. En español, ‘ser salvados’ conserva mejor la pasividad que ‘salvarse’.'
- source_word: እበወርቅ
  english_pob_choice: by gold
  chosen_spanish: por oro
  alternatives_spanish:
  - con oro
  - mediante oro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición de instrumento/medio se vierte de forma natural con ‘por’ en este contexto de rescate o libramiento frustrado.
- source_word: ወእበብሩር
  english_pob_choice: by silver
  chosen_spanish: ni por plata
  alternatives_spanish:
  - ni con plata
  - ni mediante plata
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el paralelismo con ‘oro’ y la coordinación negativa de medios; ‘plata’ es el equivalente natural en español bíblico.
- source_word: ወኢይክሉ ጐይየ
  english_pob_choice: nor will they be able to flee
  chosen_spanish: ni podrán huir
  alternatives_spanish:
  - ni podrán escapar
  - ni tendrán القدرة de huir
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: La idea es de imposibilidad de fuga/escape. ‘Huir’ es breve, idiomático y conserva la imagen apocalíptica de una huida frustrada.
theological_decisions:
- issue: Alcance de ‘salvados’
  english_pob_reading: The verse speaks of self-deliverance from judgment by means of wealth, not spiritual salvation in a later doctrinal sense.
  chosen_spanish_reading: El verso habla de quedar librados del juicio mediante riquezas, no de la salvación cristiana en sentido doctrinal posterior.
  alternative_spanish_readings:
  - no serán salvados espiritualmente por oro ni plata
  - no podrán rescatarse del juicio con oro ni plata
  rationale: En español conviene evitar que ‘salvados’ se lea automáticamente en clave soteriológica cristiana. ‘Salvados’ aquí se entiende localmente como librados/puestos a salvo del juicio inminente.
  doctrine_reference: Mantener el sentido inmediato del pasaje apocalíptico; no sobrearmonizar con la soteriología posterior.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió la lectura del verbo ge''ez ይድኅኑ: no es reflexivo (‘salvarse a sí mismos’) sino intransitivo/pasivo (‘ser salvados’, ‘ser librados’). La versión española adopta esa corrección y evita la fuerza reflexiva.'
  spanish_consistency_notes:
  - Se conserva el paralelismo negativo ‘ni... ni...’ para reflejar la estructura del original.
  - Se usa ‘oro’ y ‘plata’ en lugar de ‘oro’ y ‘silver’ por la equivalencia léxica bíblica natural en español.
  - ‘Aquellos días’ mantiene el tono profético y la fórmula apocalíptica recurrente.
