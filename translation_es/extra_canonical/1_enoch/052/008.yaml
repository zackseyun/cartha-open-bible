translation:
  language: es
  text: Y el hierro no será para la guerra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El ge''ez es muy breve: literalmente, «y el hierro no será para la guerra». El sentido probable es que el hierro ya no se usará para hacer la guerra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወኢይከውን
  english_pob_choice: and ... shall not be
  chosen_spanish: Y ... no será
  alternatives_spanish:
  - Y ... no estará
  - Y ... no existirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperfecto negativo ge'ez ኢይከውን con ወ conserva un valor futurista/profético. En español, «no será» reproduce la cadencia breve sin añadir un verbo de existencia que estreche demasiado el sentido.
- source_word: ኃጺን
  english_pob_choice: iron
  chosen_spanish: hierro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo designa directamente el metal hierro. «Hierro» es el equivalente natural y preciso en español.
- source_word: ለፀብእ
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la batalla
  - para combatir
  - para el conflicto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición ለ expresa finalidad o uso. «Para la guerra» conserva el valor funcional del texto y mantiene el tono apocalíptico. «Guerra» es más idiomático que calcos como «para guerra».
theological_decisions:
- issue: Alcance de la negación en una cláusula muy breve
  english_pob_reading: The line means that iron will no longer serve a war-making function, not that iron ceases to exist altogether.
  chosen_spanish_reading: La línea indica que el hierro ya no servirá para la guerra, no que el hierro deje de existir.
  alternative_spanish_readings:
  - No habrá hierro
  - El hierro no llegará a existir
  rationale: El complemento final con ለ + término bélico señala uso o finalidad, así que la negación se entiende funcionalmente. La traducción evita resolver la tensión hacia una inexistencia del metal, manteniendo el sentido apocalíptico de desarme.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del pasaje base; se conserva la brevedad oracular del original y la lectura funcional de la negación.'
  spanish_consistency_notes:
  - Se mantiene «hierro» y «guerra» por correspondencia directa con el léxico del original.
  - Se evita «SEÑOR» u այլ terminología doctrinal no pertinente; el pasaje no contiene nombres divinos ni vocabulario cristológico.
  - La puntuación con punto y coma no es necesaria aquí; la frase breve queda con estilo bíblico sobrio y natural en español.
