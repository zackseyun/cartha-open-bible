translation:
  language: es
  text: 'Y le pregunté al ángel que iba conmigo[a], diciendo: «¿Qué son estas cosas que he visto en secreto?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un lugar oculto» / «ocultamente». La expresión ge'ez apunta a la ocultación, pero no es seguro si describe el lugar, el modo de ver o la naturaleza oculta de lo visto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ተስእልክዎ
  english_pob_choice: I asked him
  chosen_spanish: le pregunté
  alternatives_spanish:
  - le inquirí
  - le cuestioné
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa pedir información o preguntar; en español, «le pregunté» es la forma natural y digna que conserva el tono narrativo sin añadir énfasis innecesario.
- source_word: መልአክ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico, la referencia a un ser celestial es la lectura primaria; «ángel» comunica mejor el sentido que «mensajero».
- source_word: ዘምስሌየ የሐውር
  english_pob_choice: who went with me
  chosen_spanish: que iba conmigo
  alternatives_spanish:
  - que fue conmigo
  - que caminaba conmigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula relativa identifica al ángel acompañante. «Iba conmigo» conserva la idea de acompañamiento y funciona con naturalidad en español.
- source_word: እንዘ እብል
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - mientras decía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la fórmula introductoria normal del discurso directo; «diciendo» mantiene el registro formal sin sobreinterpretar el matiz.
- source_word: ምንት ውእቱ
  english_pob_choice: What are these things
  chosen_spanish: ¿Qué son estas cosas?
  alternatives_spanish:
  - ¿Qué es esto?
  - ¿Qué son estas?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque la construcción ge'ez presenta un perfil singular en parte, el contexto apunta a pluralidad de objetos vistos; en español «estas cosas» expresa con claridad el referente.
- source_word: እሙንቱ እሉ እለ
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - aquellas cosas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La acumulación demostrativa/relativa se reduce naturalmente en español a una referencia directa. «Estas cosas» conserva la identificación de lo visto sin pesadez.
- source_word: በኅቡእ
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - en un lugar oculto
  - ocultamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión puede señalar ocultamiento, modo de ver o lugar oculto. «En secreto» preserva esa tensión semántica sin decidirla de forma excesiva.
- source_word: ርኢኩ
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto español refleja bien la relevancia inmediata de la visión para la pregunta presente, como en la solución inglesa «I have seen».
theological_decisions:
- issue: Sentido de በኅቡእ en una visión apocalíptica
  english_pob_reading: in secret
  chosen_spanish_reading: en secreto
  alternative_spanish_readings:
  - secretamente
  - en un lugar oculto
  rationale: Conviene mantener visible la ambigüedad entre el carácter oculto de la realidad visionaria y el modo/lugar de la visión. «En secreto» conserva esa tensión revelatoria sin resolverla.
  doctrine_reference: Preservar la tensión textual y no cerrar una ambigüedad que el auditorio apocalíptico deja abierta.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la solución auditada en inglés y mantiene la única tensión interpretativa relevante: el alcance de በኅቡእ. No se detectaron revisiones aplicadas en el registro fuente, por lo que no se introducen cambios adicionales.'
  spanish_consistency_notes:
  - Se mantiene «ángel» para la figura celestial, no «mensajero», por el contexto apocalíptico.
  - «En secreto» conserva la ambigüedad semántica documentada en el aparato inglés.
  - Se usa «estas cosas» para reflejar el referente plural del pasaje y evitar un singular engañoso.
  - El tono general es formal y readable para uso eclesial sin adoptar fraseología tradicional no sustentada por el texto.
