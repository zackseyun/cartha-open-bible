    text: Or 'all the hidden visions.' The Ge'ez can be read either as 'visions of what is hidden' or as 'hidden visions.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'by a whirlwind of wind,' an emphatic expression for violent wind-borne transport.
    reason: cultural_note
  - marker: c
    text: Or 'I was snatched up by a whirlwind of wind, and it carried me westward.'.
