base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/052/001.yaml
  text: And after those days[a], in that place where I had seen all the visions of what is hidden, for I had been snatched up by a whirlwind[c][b], and it had carried me westward—
  footnotes:
