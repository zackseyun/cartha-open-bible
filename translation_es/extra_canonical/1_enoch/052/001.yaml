translation:
  language: es
  text: Y después de aquellos días, en aquel lugar donde había visto todas las visiones de lo oculto[a], porque había sido arrebatado por un torbellino[b], y me había llevado hacia el occidente—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las visiones ocultas». El ge'ez puede leerse tanto como «visiones de lo oculto» como «visiones ocultas».
    reason: lexical_alternative
  - marker: b
    text: Lit. «por un torbellino de viento»; la expresión es enfática y subraya un transporte violento impulsado por el viento.
    reason: cultural_note
lexical_decisions:
- source_word: እምድኅረ እማንቱ መዋዕል
  english_pob_choice: after those days
  chosen_spanish: después de aquellos días
  alternatives_spanish:
  - después de estos días
  - tras aquellos días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal expresa secuencia narrativa. «Aquellos» conserva la distancia deíctica de እማንቱ mejor que «estos», y «después de» es el equivalente natural y fiel en español.
- source_word: በውእቱ መካን
  english_pob_choice: in that place
  chosen_spanish: en aquel lugar
  alternatives_spanish:
  - en ese lugar
  - en aquel sitio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መካን indica ubicación concreta. «Aquel lugar» mantiene la referencia espacial visionaria y suena más natural y digno en español bíblico que un calco rígido.
- source_word: ርኢኩ ኵሎ ራእያተ ዘበኅቡእ
  english_pob_choice: I had seen all the visions of what is hidden
  chosen_spanish: había visto todas las visiones de lo oculto
  alternatives_spanish:
  - había visto todas las visiones ocultas
  - había visto todas las visiones de las cosas ocultas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la lectura que toma ዘበኅቡእ como complemento de las visiones, preservando la tensión apocalíptica de realidades escondidas. «De lo oculto» mantiene la ambigüedad entre «visiones de lo oculto» y «visiones ocultas» sin resolverla en exceso.
- source_word: ተመሠጥኩ
  english_pob_choice: I was snatched up
  chosen_spanish: había sido arrebatado
  alternatives_spanish:
  - había sido tomado
  - había sido llevado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo sugiere remoción súbita y forzada. «Arrebatado» conserva mejor esa fuerza que «tomado» o «llevado», y funciona bien en un contexto de transporte visionario.
- source_word: በአውሎጋኒ ነፋስ
  english_pob_choice: by a whirlwind
  chosen_spanish: por un torbellino
  alternatives_spanish:
  - por un remolino de viento
  - por un torbellino de viento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es intensiva y meteorológica. En español, «torbellino» comunica el movimiento violento sin sonar artificial; el complemento «de viento» puede explicitarse en nota, pero en el texto principal resulta más fluido.
- source_word: ወወሰደኒ ዓረበ
  english_pob_choice: and it carried me westward
  chosen_spanish: y lo había llevado hacia el occidente
  alternatives_spanish:
  - y me había llevado al occidente
  - y lo había llevado al oeste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ᓄ directionally indica occidente/oeste. «Hacia el occidente» conserva el valor direccional y mantiene un registro más literario; el sujeto implícito del viento queda claro por el contexto inmediato, por eso uso «lo» retomando el torbellino.
theological_decisions:
- issue: Naturaleza del transporte visionario
  english_pob_reading: I had been snatched up by a whirlwind... and it had carried me westward
  chosen_spanish_reading: había sido arrebatado por un torbellino, y lo había llevado hacia el occidente
  alternative_spanish_readings:
  - había sido llevado por un torbellino
  - había sido arrebatado por un torbellino de viento
  rationale: Conservo la imagen de traslado súbito y poderoso sin decidir si fue corporal, extático o ambas cosas. La redacción mantiene la tensión apocalíptica del original y no suaviza la experiencia en una simple metáfora.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La revisión inglesa restituyó el valor causal de እስመ («for») y simplificó la redundancia de «of wind». En español se conserva explícitamente «porque» para reflejar la sintaxis del ge'ez y se evita añadir un calco pesado como «de viento» en el texto principal, reservando esa precisión para la nota.
  spanish_consistency_notes:
  - He usado «Yahvé» solo donde hubiera un nombre divino explícito; este versículo no lo requiere.
  - Mantengo «occidente» en lugar de «oeste» para un registro bíblico más elevado y consistente con el tono del pasaje.
  - He conservado la ambigüedad del transporte visionario sin introducir interpretaciones doctrinales ajenas al texto.
