translation:
  language: es
  text: 'Y me dijo: «Todas estas cosas que has visto pertenecerán al dominio de su Ungido[a], para que él mande y sea poderoso[b] sobre la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «su Mesías»; también puede entenderse «el Ungido» o «el Mesías», pero el ge''ez incluye un sufijo posesivo: «su».'
    reason: lexical_alternative
  - marker: b
    text: «Sea poderoso» también puede entenderse como «prevalezca» o «ejerza poder». La línea enfatiza un gobierno efectivo sobre la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይቤለኒ
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Entonces me dijo
  - Y él me dijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula narrativa ge'ez introduce un dicho revelado de manera directa; en español, "me dijo" conserva la inmediatez, y el conector "Y" mantiene la continuidad del relato sin sobrecargarlo.
- source_word: እሉ ኵሎሙ
  english_pob_choice: All these
  chosen_spanish: Todas estas
  alternatives_spanish:
  - Estas todas
  - Todas ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo apunta a los elementos vistos en la visión. "Todas estas" preserva la deixis y suena natural en español.
- source_word: ዘርኢከ
  english_pob_choice: that you have seen
  chosen_spanish: que has visto
  alternatives_spanish:
  - que viste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia es a lo que Enoch vio en la visión; el perfecto compuesto español funciona bien para la experiencia visionaria y conserva la relación directa con el interlocutor.
- source_word: ለስልጣነ
  english_pob_choice: to the authority of / for the dominion of
  chosen_spanish: al dominio de
  alternatives_spanish:
  - a la autoridad de
  - bajo el dominio de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo ge'ez expresa autoridad, gobierno o dominio. "Dominio" reproduce bien el sentido de gobierno efectivo y encaja con el lenguaje apocalíptico de soberanía.
- source_word: መሲሑ
  english_pob_choice: his Anointed One
  chosen_spanish: su Ungido
  alternatives_spanish:
  - su Mesías
  - el Ungido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo posesivo -u exige "su". "Ungido" traduce el título sin convertirlo en nombre eclesiástico fijo; en español mantiene la relación posesiva con fidelidad al ge'ez.
- source_word: እሙንቱ ይከውኑ
  english_pob_choice: will belong
  chosen_spanish: pertenecerán
  alternatives_spanish:
  - serán
  - estarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción comunica que las cosas vistas pasan a quedar bajo la esfera del dominio mesiánico. "Pertenecerán" expresa esa relación de pertenencia/adscripción con naturalidad en español.
- source_word: ከመ ይእዝዝ
  english_pob_choice: so that he may command
  chosen_spanish: para que él mande
  alternatives_spanish:
  - para que ordene
  - a fin de que gobierne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica ordenar con autoridad. "Mande" conserva la fuerza de mandato soberano sin diluirla en un general "gobierne".
- source_word: ወይትኃየል
  english_pob_choice: and be mighty
  chosen_spanish: y sea poderoso
  alternatives_spanish:
  - y sea fuerte
  - y prevalezca
  - y ejerza poder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez alude a fortaleza/potencia efectiva. "Sea poderoso" es una solución idiomática que mantiene la idea de eficacia y vigor de gobierno.
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por toda la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Sobre la tierra" reproduce el alcance espacial elevado del original y su tono solemne.'
theological_decisions:
- issue: Título mesiánico y sufijo posesivo en መሲሑ
  english_pob_reading: his Anointed One
  chosen_spanish_reading: su Ungido
  alternative_spanish_readings:
  - su Mesías
  - el Ungido
  rationale: El ge'ez lleva el sufijo posesivo de tercera persona masculino singular, por lo que el texto no debe despojarse de esa relación. "Su Ungido" conserva tanto el título como la pertenencia implícita, sin introducir un nombre litúrgico fijo donde el original no lo exige.
  doctrine_reference: 'Translation philosophy: Translate titles; preserve pronominal force and theological linkage.'
- issue: Relación de las cosas vistas con el dominio mesiánico
  english_pob_reading: will belong to the dominion of his Anointed One
  chosen_spanish_reading: pertenecerán al dominio de su Ungido
  alternative_spanish_readings:
  - estarán bajo el dominio de su Ungido
  - serán para el dominio de su Ungido
  rationale: El ge'ez sugiere adscripción o sujeción a la esfera de gobierno del Ungido. "Pertenecerán al dominio" conserva la idea de pertenencia bajo soberanía sin convertirla en posesión material estricta.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolving it.'
translation_notes:
  revision_awareness: 'El texto inglés fue revisado desde ''authority'' a ''dominion'' para ስልጣነ, y la adjudicación posterior corrigió la traducción de መሲሑ a ''his Anointed One''. La versión española refleja ambos puntos: usa un equivalente de dominio y conserva el sufijo posesivo con ''su Ungido''.'
  spanish_consistency_notes:
  - Se mantiene "Ungido" para መሲሑ en lugar de "Mesías" para preservar la transparencia del título con su posesivo.
  - '"Dominio" se usa para ስልጣነ, consistente con la revisión inglesa más reciente y adecuado al contexto apocalíptico.'
  - No se añaden notas al pie porque la oración española no introduce una ambigüedad nueva que requiera anclaje explícito.
