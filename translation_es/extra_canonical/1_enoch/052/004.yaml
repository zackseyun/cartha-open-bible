base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/052/004.yaml
  text: And he said to me[a], “All these that you have seen will belong to the dominion of his Anointed One[c][b], so that he may command and be mighty upon the earth.”
  footnotes:
