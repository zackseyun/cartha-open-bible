translation:
  language: es
  text: Y aquellas montañas que tus ojos vieron —la montaña de hierro, la montaña de cobre, la montaña de plata, la montaña de oro, la montaña de estaño[a] y la montaña de plomo— todas estas estarán delante del Elegido[b] como cera delante del fuego, y como agua que desciende desde arriba sobre esas montañas; y se debilitarán ante sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación exacta del quinto metal no es segura en esta línea etiópica; aunque aquí se traduce como «estaño», algunos estudiosos proponen un metal más general o distinto.
    reason: lexical_alternative
  - marker: b
    text: 'O: «el Escogido». Este título es una designación importante en las Parábolas y se mantiene aquí en su forma local, sin armonizarlo con usos posteriores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አድባር
  english_pob_choice: mountains
  chosen_spanish: montañas
  alternatives_spanish:
  - sierras
  - cerros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural ge'ez denota masas montañosas; 'montañas' conserva la escala apocalíptica mejor que 'cerros' y evita una reducción indebida.
- source_word: ኃጺን
  english_pob_choice: iron
  chosen_spanish: hierro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término material directo y seguro dentro de la secuencia de montes de metal.
- source_word: ጸሪቅ
  english_pob_choice: copper
  chosen_spanish: cobre
  alternatives_spanish:
  - bronce
  - latón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'cobre' es la opción más amplia y menos interpretativa para el metal del texto; 'bronce' o 'latón' introducirían una aleación más específica que no exige el ge'ez.
- source_word: ብሩር
  english_pob_choice: silver
  chosen_spanish: plata
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Metal precioso inequívoco; 'plata' es la equivalencia natural y precisa.
- source_word: ወርቅ
  english_pob_choice: gold
  chosen_spanish: oro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Metal precioso inequívoco; 'oro' es la equivalencia natural y precisa.
- source_word: ነጠብጣብ
  english_pob_choice: soft metal
  chosen_spanish: estaño
  alternatives_spanish:
  - metal blando
  - electro
  - metal maleable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la revisión inglesa más reciente, que privilegió 'tin'; en español, 'estaño' mantiene la precisión y suena más natural que una glosa genérica. Aun así, la identificación histórica del término ge'ez sigue siendo discutida.
- source_word: ዐረር
  english_pob_choice: lead
  chosen_spanish: plomo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Correspondencia léxica estándar para el metal final de la lista.
- source_word: ለኅሩይ
  english_pob_choice: the Chosen One
  chosen_spanish: el Elegido
  alternatives_spanish:
  - el Escogido
  - el Elegido de Dios
  - el Elegido One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Elegido'' comunica el título con naturalidad en español y conserva el sentido local del epíteto sin importar formulaciones cristológicas posteriores. Se evita ''Mesías'' porque el pasaje no exige esa harmonización.'
- source_word: መዓረ፡ ግራ፡
  english_pob_choice: wax
  chosen_spanish: cera
  alternatives_spanish:
  - cera de abeja
  - cera blanda
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cera'' reproduce la imagen de algo que cede y se derrite ante el fuego; es idiomática y suficientemente literal.'
- source_word: ዘይወርድ፡ እምላዕሉ
  english_pob_choice: that runs down from above
  chosen_spanish: que desciende desde arriba
  alternatives_spanish:
  - que baja desde arriba
  - que corre desde arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el movimiento descendente de la imagen sin forzar una expresión torpe en español; 'desciende desde arriba' refleja bien la procedencia vertical del agua.
- source_word: ድኩማነ
  english_pob_choice: weak
  chosen_spanish: se debilitarán
  alternatives_spanish:
  - quedarán débiles
  - serán debilitadas
  - se volverán débiles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo español conserva la idea de pérdida de fuerza y resistencia frente al Elegido, sin añadir un colapso físico que el texto no explicita.
theological_decisions:
- issue: Tratamiento del título ለኅሩይ en el Similitudes de Enoc
  english_pob_reading: the Chosen One
  chosen_spanish_reading: el Elegido
  alternative_spanish_readings:
  - el Escogido
  - el Elegido de Dios
  - el Mesías
  rationale: La POB inglesa preserva el título local del pasaje y no lo armoniza con terminología posterior. En español, 'el Elegido' conserva esa tensión y evita introducir 'Mesías', que aquí sería una interpretación no exigida por el verso.
  doctrine_reference: Traducir títulos según su función local; no armonizar prematuramente con nomenclatura canónica posterior.
- issue: Secuencia de metales y la incertidumbre del quinto término
  english_pob_reading: soft metal / tin (revision)
  chosen_spanish_reading: estaño
  alternative_spanish_readings:
  - metal blando
  - electro
  - metal maleable
  rationale: La revisión inglesa reciente optó por 'tin' por mayor precisión y naturalidad. En español, 'estaño' sigue esa decisión y conserva la lista de metales como una serie concreta, aunque la identificación léxica original sigue siendo incierta.
  doctrine_reference: Fidelidad léxica con señalamiento de incertidumbre cuando la evidencia no permite mayor precisión.
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó 'soft metal' a 'tin' para mayor precisión. Esta redacción española sigue esa revisión con 'estaño', pero mantiene una nota de incertidumbre porque el término ge'ez subyacente sigue siendo discutido en la bibliografía.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma predeterminada solo cuando el texto la requiera; aquí no aparece.
  - Se conserva la mayúscula en el título 'Elegido' por su función titular en el pasaje.
  - Se usa 'cobre' y no 'bronce' para no sobre-especificar una aleación no exigida por el original.
  - La sintaxis busca fluidez moderna sin diluir la imaginería apocalíptica.
