base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/052/006.yaml
  text: And those mountains that your eyes saw—the mountain of iron[a], and the mountain of copper, and the mountain of silver, and the mountain of gold, and the mountain of tin, and the mountain of lead—all these will be before the Chosen One like wax before the fire, and like water that runs down from above upon those mountains[b]; and they will become weak before his feet.
  footnotes:
  - marker: a
    text: The exact identification of the fifth metal (rendered 'soft metal') is uncertain in this Ethiopic line; possibilities proposed in scholarship include tin or another softer metal.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Elect One.' The title is a major designation in the Parables and is left locally grounded here rather than harmonized with later usage.
    reason: lexical_alternative
