translation:
  language: es
  text: 'Allí mis ojos vieron todas las cosas ocultas del cielo que serán[a]: un monte de hierro, y un monte de cobre, y un monte de plata, y un monte de oro, y un monte de estaño[b], y un monte de plomo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cláusula final puede entenderse también de modo más estático: ''que estaban allí'' o simplemente ''que existían en el cielo''.'
    reason: alternative_reading
  - marker: b
    text: El quinto término metálico es incierto. También podría entenderse como un metal blando o mezclado; algunos intérpretes proponen más específicamente 'electro'.
    reason: lexical_alternative
lexical_decisions:
- source_word: በህየ
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Entonces allí
  - En ese lugar
  lexicon: Dillmann
  rationale: El adverbio es locativo y sitúa la escena visionaria; 'Allí' conserva la fuerza espacial con naturalidad en español.
- source_word: ርእዩ አዕይንትየ
  english_pob_choice: my eyes saw
  chosen_spanish: mis ojos vieron
  alternatives_spanish:
  - vi
  - mis ojos contemplaron
  lexicon: Dillmann
  rationale: El ge'ez menciona explícitamente 'mis ojos'; mantener el sujeto corporal conserva el registro vívido de la visión.
- source_word: ኵሎ ኅቡኣተ ሰማይ
  english_pob_choice: all the hidden things of heaven
  chosen_spanish: todas las cosas ocultas del cielo
  alternatives_spanish:
  - todos los secretos del cielo
  - todas las cosas ocultas en el cielo
  lexicon: Dillmann
  rationale: '''Cosas ocultas'' reproduce el sentido de lo escondido sin cargar el texto con una terminología técnica que el contexto no exige.'
- source_word: ዘይኩን ሀሎ
  english_pob_choice: will be
  chosen_spanish: serán
  alternatives_spanish:
  - estarán
  - habrán de ser
  lexicon: Dillmann
  rationale: La forma futura española expresa de manera directa la orientación prospectiva adoptada por el POB inglés revisado, sin resolver de más la ambigüedad del giro ge'ez.
- source_word: ደብረ
  english_pob_choice: a mountain of
  chosen_spanish: un monte de
  alternatives_spanish:
  - una montaña de
  - un cerro de
  lexicon: Dillmann
  rationale: '''Monte'' permite un tono más bíblico y solemne en español, y conserva la repetición catalogal del texto.'
- source_word: ኃጺን
  english_pob_choice: iron
  chosen_spanish: hierro
  lexicon: Dillmann
  rationale: Equivalente normal y preciso del metal designado.
- source_word: ጸሪቅ
  english_pob_choice: copper
  chosen_spanish: cobre
  alternatives_spanish:
  - bronce
  - latón
  lexicon: Dillmann
  rationale: '''Cobre'' es la base material más directa en español; las aleaciones quedan como alternativas contextuales.'
- source_word: ብሩር
  english_pob_choice: silver
  chosen_spanish: plata
  lexicon: Dillmann
  rationale: Equivalente estándar y natural en español.
- source_word: ወርቅ
  english_pob_choice: gold
  chosen_spanish: oro
  lexicon: Dillmann
  rationale: Equivalente estándar y natural en español.
- source_word: ነጠብጣብ
  english_pob_choice: tin
  chosen_spanish: estaño
  alternatives_spanish:
  - metal blando
  - electro
  - metal mezclado
  lexicon: Dillmann
  rationale: El auditor inglés revisó hacia 'tin'; 'estaño' es la correspondencia normal en español y comunica mejor la identificación metalúrgica propuesta.
- source_word: ዐረር
  english_pob_choice: lead
  chosen_spanish: plomo
  lexicon: Dillmann
  rationale: Equivalente estándar del metal final de la lista.
theological_decisions:
- issue: ¿La cláusula final debe leerse como presente estático o como futuro profético?
  english_pob_reading: 'future-oriented: ''the hidden things of heaven that will be'''
  chosen_spanish_reading: 'futuro profético: ''las cosas ocultas del cielo que serán'''
  alternative_spanish_readings:
  - '''las cosas ocultas del cielo que estaban allí'''
  - '''las cosas ocultas del cielo'''
  rationale: La revisión inglesa adoptó un futuro más directo, y el español sigue esa decisión para reflejar la orientación prospectiva sin eliminar la tensión textual del ge'ez, que sigue siendo discutida.
  doctrine_reference: Preservar la ambigüedad documental del texto fuente; no forzar una armonización interpretativa donde el testimonio es incierto.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más reciente: se adopta un futuro más directo para la cláusula final y se identifica el quinto metal como ''estaño'' en lugar de una paráfrasis genérica. Aun así, se conserva la nota sobre la alternativa estática porque el ge''ez sigue siendo interpretativamente difícil.'
  spanish_consistency_notes:
  - He usado 'monte' de forma repetida para conservar el catálogo solemne de los metales.
  - He preferido 'cielo' en vez de 'cielos' porque el sintagma source es singular en la designación del ámbito visionario.
  - '''Cosas ocultas'' mantiene la transparencia del término sin imponer el valor técnico de ''misterios''.'
  - La lista metálica se ha mantenido literal y paralelística para respetar el ritmo del original.
