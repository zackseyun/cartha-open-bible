translation:
  language: es
  text: 'Y aquel ángel de paz respondió, diciéndome: «Espera un poco[a], y todo lo oculto que el Señor de los Espíritus ha encerrado[b] se te revelará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «ten paciencia un poco» o «permanece un poco». El imperativo ge'ez puede llevar el matiz de esperar o quedarse.
    reason: lexical_alternative
  - marker: b
    text: El verbo detrás de «ha encerrado» también puede sugerir «ha cerrado», «ha mantenido oculto» o «ha guardado», destacando que estos misterios siguen bajo el control del Señor de los Espíritus hasta su manifestación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወአውሥአ
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió diciendo
  lexicon: Dillmann Lexicon
  rationale: El verbo ge'ez expresa la respuesta en un marco dialogal. «Respondió» conserva esa relación sin forzar una repetición innecesaria de la cita directa.
- source_word: እንዘ ይብለኒ
  english_pob_choice: saying to me
  chosen_spanish: diciéndome
  alternatives_spanish:
  - mientras me decía
  - al decirme
  lexicon: Dillmann Lexicon
  rationale: La construcción introduce el habla concomitante; «diciéndome» es natural en español y mantiene la dependencia del verbo de respuesta.
- source_word: መልአከ ሰላም
  english_pob_choice: angel of peace
  chosen_spanish: ángel de paz
  alternatives_spanish:
  - ángel pacífico
  - ángel de bienestar
  lexicon: Dillmann Lexicon
  rationale: 'Se preserva el genitivo característico como designación fija: no se parafrasea como cualidad abstracta, sino como título del mensajero.'
- source_word: ጽናሕ
  english_pob_choice: wait a little
  chosen_spanish: espera un poco
  alternatives_spanish:
  - ten paciencia un poco
  - permanece un poco
  lexicon: Dillmann Lexicon
  rationale: El imperativo pide pausa temporal ante la revelación. «Espera un poco» expresa bien el valor exhortativo sin endurecer el español.
- source_word: ንስቲተ
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - por un poco
  - por un momento
  lexicon: Dillmann Lexicon
  rationale: Adverbio temporal que matiza la espera; «un poco» es el equivalente más directo y claro en español.
- source_word: ይትከሠት
  english_pob_choice: will be revealed
  chosen_spanish: se te revelará
  alternatives_spanish:
  - se te mostrará
  - se te dará a conocer
  - será revelado para ti
  lexicon: Dillmann Lexicon
  rationale: La pasiva apocalíptica de revelación se conserva con «se te revelará», que suena natural en español y mantiene el registro de disclosure.
- source_word: ኵሉ ዘኅቡእ
  english_pob_choice: every hidden thing
  chosen_spanish: todo lo oculto
  alternatives_spanish:
  - toda cosa escondida
  - todo lo escondido
  lexicon: Dillmann Lexicon
  rationale: El original tiene un alcance comprehensivo e indefinido. «Todo lo oculto» preserva la totalidad sin sonar rígido en español.
- source_word: ዘከለለ
  english_pob_choice: has enclosed
  chosen_spanish: ha encerrado
  alternatives_spanish:
  - ha encerrado dentro
  - ha guardado
  - ha cerrado
  lexicon: Dillmann Lexicon
  rationale: El verbo sugiere encierro/contención bajo control divino. «Ha encerrado» conserva la imagen espacial sin sustituirla por una idea más abstracta de reserva.
- source_word: እግዚአ መናፈስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de Espíritu
  - el Dueño de los espíritus
  lexicon: Dillmann Lexicon
  rationale: Se mantiene el título en su forma enochica establecida. En español, «Señor de los Espíritus» es la reproducción más transparente del giro genitival y preserva la fórmula teológica.
theological_decisions:
- issue: Título divino እግዚአ መናፈስት
  english_pob_reading: the Lord of Spirits
  chosen_spanish_reading: el Señor de los Espíritus
  alternative_spanish_readings:
  - el Señor de los espíritus
  rationale: El texto presenta un título divino técnico y fijo del corpus enóquico. Se conserva la mayúscula reverencial en «Señor» y el plural explícito de «Espíritus» para reflejar la fórmula recibida, sin normalizarla a un giro más genérico.
  doctrine_reference: Consistencia terminológica y preservación de títulos divinos específicos.
- issue: Forma de la revelación
  english_pob_reading: will be revealed
  chosen_spanish_reading: se te revelará
  alternative_spanish_readings:
  - te será revelado
  - será revelado a ti
  rationale: La revelación es pasiva y dada por Dios; la formulación refleja una divulgación concedida, no una deducción humana. Se mantiene el tono apocalíptico del original.
  doctrine_reference: Lenguaje de revelación en literatura apocalíptica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail sobre la idiomática ge'ez equivalente a «respondió, diciendo». En español, la solución «respondió, diciéndome» conserva esa estructura sin trasladar mecánicamente el orden inglés previo.
  spanish_consistency_notes:
  - Se mantuvo «ángel de paz» como título fijo, no como simple adjetivo.
  - Se conservó la fórmula enochica «Señor de los Espíritus» de manera consistente.
  - Se optó por el futuro pasivo reflejo «se te revelará» para mantener naturalidad y el registro apocalíptico.
  - La cita directa usa comillas españolas y respeta la puntuación de introducción verbal.
