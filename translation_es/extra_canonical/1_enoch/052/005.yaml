base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/052/005.yaml
  text: And that angel of peace answered[a], saying to me, 'Wait a little[c][b], and every hidden thing that the Lord of Spirits has enclosed will be revealed to you.'
  footnotes:
  - marker: a
    text: The command may also be rendered 'be patient a little' or 'remain a little while'; the Ge'ez imperative can carry the sense of waiting or staying.
    reason: lexical_alternative
  - marker: b
    text: The verb behind 'has enclosed' may also suggest 'has shut up' or 'has kept hidden,' emphasizing that these mysteries remain under the Lord of Spirits' control until their disclosure.
    reason: lexical_alternative
  - marker: c
    text: Or 'And as he spoke to me, that angel of peace answered,'.
    reason: previous_rendering
