translation:
  language: es
  text: Y uno de ellos sacó una espada y se la dio a aquellos elefantes, camellos y burros[a], y comenzaron a golpearse unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El final del enunciado etiópico es difícil. El sentido es que, después de recibir la espada, estos animales se volvieron a la violencia mutua; «comenzaron a golpearse unos a otros» es una traducción prudente.
    reason: textual_variant
lexical_decisions:
- source_word: መላሕ
  english_pob_choice: drew
  chosen_spanish: sacó
  alternatives_spanish:
  - desenvainó
  - tomó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto con «espada», el verbo sugiere extraer o poner en acción el arma. «Sacó» es natural en español y conserva la acción sin introducir un matiz excesivo de desenvainar si el arma no estaba necesariamente envainada.
- source_word: ሰይፈ
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - arma blanca
  - hoja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el término concreto y directo para el arma de la visión. Mantener «espada» preserva la imaginería apocalíptica literal.
- source_word: ወወሀቦሙ
  english_pob_choice: gave it to them
  chosen_spanish: se la dio
  alternatives_spanish:
  - se la entregó
  - se la dio a ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se la dio» expresa con naturalidad la transferencia del objeto en español y mantiene la sencillez narrativa del texto base.
- source_word: ለእልኩ ነጌያት ወአገማል ወአእዱግ
  english_pob_choice: to those elephants and camels and donkeys
  chosen_spanish: a aquellos elefantes, camellos y asnos
  alternatives_spanish:
  - a aquellos elefantes, camellos y burros
  - a aquellos elefantes, camellos y jumentos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conservan los nombres animales del visionario sin interpretarlos alegóricamente en la traducción. «Asnos» refleja el valor más literal y respeta el registro bíblico.
- source_word: አንዘ እንዘ ይትደአ
  english_pob_choice: they began to strike one another
  chosen_spanish: comenzaron a golpearse unos a otros
  alternatives_spanish:
  - comenzaron a herirse mutuamente
  - empezaron a golpearse entre sí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal sugiere el inicio de una violencia recíproca. «Golpearse unos a otros» conserva la fisicidad y evita una interpretación demasiado específica como «pelearse» o «herirse», que podría exceder el alcance inmediato.
theological_decisions:
- issue: Mantenimiento de la imaginería animal visionaria
  english_pob_reading: Retain the literal animal terms in the main text as visionary symbols, without identifying their historical referents in translation.
  chosen_spanish_reading: Mantener en el texto principal los animales literales de la visión, sin identificar sus referentes históricos dentro de la traducción.
  alternative_spanish_readings:
  - Interpretar directamente a los animales como naciones o ejércitos en el texto principal
  - sustituir los animales por designaciones interpretativas
  rationale: El texto de 1 Enoc comunica mediante símbolos animales. La traducción debe conservar la imagen apocalíptica en vez de colapsar símbolo e interpretación en la redacción principal.
  doctrine_reference: 'Contexto del libro: prosa/poesía apocalíptica visionaria; no aplanar la imaginería visionaria.'
translation_notes:
  revision_awareness: La propuesta sigue el sentido del texto etiópico recuperado y coincide con la decisión auditada del POB inglés de mantener el lenguaje animal literal y de traducir con cautela el final difícil de la cláusula.
  spanish_consistency_notes:
  - Se mantiene el español moderno y digno, sin arcaísmos innecesarios.
  - «Asnos» se emplea por fidelidad al referente zoológico del original y para conservar el paralelo con la lista animal.
  - La nota a pie de página marca la dificultad textual sin forzar una interpretación más precisa de la que permite el etiópico.
