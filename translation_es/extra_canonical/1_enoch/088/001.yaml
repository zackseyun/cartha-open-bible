translation:
  language: es
  text: Y vi a uno de aquellos cuatro que había salido primero, y se apoderó de aquella primera estrella[a] que había caído del cielo, y le ató las manos y los pies, y la arrojó al abismo[b][c]. Y aquel abismo era estrecho y profundo y terrible y oscuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La 'estrella' aparece con manos y pies, señal de que el símbolo visionario representa un ser celestial personal sometido a juicio.
    reason: cultural_note
  - marker: b
    text: O 'lo profundo'. El término ge'ez denota una profundidad insondable; se prefiere 'abismo' para conservar el sentido apocalíptico de un lugar de confinamiento.
    reason: lexical_alternative
  - marker: c
    text: O 'que había salido antes'. La frase ge'ez admite un valor adverbial de prioridad; el texto principal opta por 'primero' para conservar ese matiz y el eco con 'primera estrella'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la forma natural y directa para la fórmula visionaria; conserva el marco apocalíptico sin añadir énfasis innecesario.
- source_word: አሐደ፡ እምእልኩ፡ ፬እለ
  english_pob_choice: one of those four
  chosen_spanish: uno de aquellos cuatro
  alternatives_spanish:
  - uno de los cuatro
  - uno entre aquellos cuatro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la referencia anafórica al grupo ya mencionado y suena natural en español.
- source_word: ወፅኡ፡ እምቅዳሚ
  english_pob_choice: who had come out first
  chosen_spanish: que había salido primero
  alternatives_spanish:
  - que había salido antes
  - que había salido en primer lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Primero'' conserva el valor adverbial de እምቅዳሚ y el eco con ''primera estrella'' del mismo versículo, evitando introducir un antecedente inexistente.'
- source_word: አሐዘ
  english_pob_choice: seized
  chosen_spanish: agarró
  alternatives_spanish:
  - se apoderó de
  - tomó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa con fuerza la acción de captura/arresto. 'Agarró' es más idiomático en español que un calco más solemne, sin perder energía narrativa.
- source_word: ለዝኩ፡ ኮከብ፡ ቀዳማይ
  english_pob_choice: that first star
  chosen_spanish: aquella primera estrella
  alternatives_spanish:
  - esa primera estrella
  - aquella estrella primera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el demostrativo y el ordinal como en el fuente, preservando la identidad específica del símbolo.
- source_word: ዘወድቀ፡ እምሰማየ
  english_pob_choice: which had fallen from heaven
  chosen_spanish: que había caído del cielo
  alternatives_spanish:
  - que cayó del cielo
  - que había caído del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Cielo'' es la equivalencia natural en español para el ámbito celestial del texto; el pluscuamperfecto sigue la anterioridad narrativa.'
- source_word: ወአሰረ፡ እደዊሁ፡ ወእገሪሁ
  english_pob_choice: and bound its hands and its feet
  chosen_spanish: y le ató las manos y los pies
  alternatives_spanish:
  - y ató sus manos y sus pies
  - y le sujetó las manos y los pies
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El dativo 'le' suena más natural que repetir 'sus'; 'manos y pies' preserva la imaginería corporal que en el texto señala una figura personal bajo juicio.
- source_word: ወወደዮ፡ ውስተ፡ ማዕምቅ
  english_pob_choice: and threw it into the abyss
  chosen_spanish: y la arrojó al abismo
  alternatives_spanish:
  - y la echó al abismo
  - y la lanzó al abismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Arrojó'' transmite bien el gesto de expulsión/encierro. ''Abismo'' conserva la carga apocalíptica del sustantivo ማዕምቅ.'
- source_word: ማዕምቅ
  english_pob_choice: abyss
  chosen_spanish: abismo
  alternatives_spanish:
  - profundidad
  - lo profundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Abismo'' es el equivalente español más estable en contextos apocalípticos y mantiene la idea de prisión subterránea o profundidad insondable.'
- source_word: ጸቢብ፡ ወዕሙቅ፡ ወዕጹብ፡ ወጽልመት
  english_pob_choice: narrow and deep and terrible and dark
  chosen_spanish: estrecho y profundo y terrible y oscuro
  alternatives_spanish:
  - angosto y profundo y terrible y oscuro
  - estrecho y hondo y terrible y oscuro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Terrible'' sigue la revisión inglesa más reciente y suena formal y natural; la serie coordinada conserva el ritmo acumulativo del original.'
theological_decisions:
- issue: Mantener el símbolo de 'estrella' sin convertirlo explícitamente en 'ángel'
  english_pob_reading: Retain 'star' in the main text while allowing the personal force to emerge through the binding of hands and feet.
  chosen_spanish_reading: Conservar 'estrella' en el texto principal y dejar que la acción de atar manos y pies revele su carácter personal.
  alternative_spanish_readings:
  - traducir directamente como 'ángel'
  - masculinizar los pronombres y tratarlo como persona explícita
  rationale: El texto fuente dice 'estrella'; traducirlo como 'ángel' resolvería una tensión interpretativa que el original deja en pie. La escena de atadura corporal ya comunica que el símbolo representa un ser personal sometido a juicio.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión simbólica/apocalíptica sin sobreinterpretación.
- issue: Valor de 'abismo' frente a 'lo profundo'
  english_pob_reading: Or 'the deep.' The Ge'ez term denotes a profound depth; 'abyss' is chosen to preserve the apocalyptic sense of a place of confinement.
  chosen_spanish_reading: '''Abismo'' en el texto principal, con alternativa semántica ''lo profundo''.'
  alternative_spanish_readings:
  - lo profundo
  - profundidad
  rationale: En español, 'abismo' comunica mejor que 'profundidad' la idea de confinamiento y el tono apocalíptico. No obstante, la nota preserva la alternativa semántica del término ge'ez.
  doctrine_reference: Conservar la imaginería apocalíptica sin neutralizarla.
translation_notes:
  revision_awareness: El borrador inicial inglés decía 'who had come out before them', pero la revisión posterior corrigió con razón el valor de እምቅዳሚ como 'first'/'previously'. Por eso el español evita cualquier complemento inexistente ('de ellos' o 'antes de ellos') y usa 'había salido primero'. También se incorporó la revisión inglesa que cambió 'dreadful' por 'terrible', reflejada aquí como 'terrible'.
  spanish_consistency_notes:
  - Se mantiene 'abismo' como término apocalíptico consistente con el uso POB de evitar eufemismos que debiliten el juicio o la prisión.
  - Se usa 'estrella' en femenino, siguiendo el sustantivo español y conservando el simbolismo del texto fuente.
  - Se prefiere 'Y' inicial para reproducir el encadenamiento narrativo sin sobrecargar la sintaxis.
  - Se evita 'Señor' u otras sustituciones teológicas ajenas al pasaje, ya que aquí no aparece el nombre divino ni un título cristológico.
