translation:
  language: es
  text: Y yo, Enoc, vi[a] solo la visión, los confines de todas las cosas[b]; y ningún ser humano verá como yo he visto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vi la visión solo yo». El adverbio ge'ez puede recalcar exclusividad personal; el español principal mantiene el énfasis con una construcción natural.
    reason: lexical_alternative
  - marker: b
    text: O «los extremos de todo». La expresión ge'ez puede denotar tanto los bordes más lejanos como la totalidad en su alcance cósmico.
    reason: lexical_alternative
lexical_decisions:
- source_word: አርአያ
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - aparición
  - espectáculo
  - vista
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico, el término remite a una revelación recibida, no solo a algo percibido. «Visión» conserva mejor esa fuerza profética que «aparición» o «vista».
- source_word: ባሕቲትየ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - por mí mismo
  - yo solo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio marca la singularidad de Enoc como receptor del revelación. «Solo» es natural en español y mantiene el énfasis exclusivo.
- source_word: አጽናፈ ኵሉ
  english_pob_choice: the ends of all things
  chosen_spanish: los confines de todas las cosas
  alternatives_spanish:
  - los extremos de todo
  - los límites de todas las cosas
  - el extremo de todo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Confines» expresa bien la idea de borde o extremidad y suena más natural en español que una calca. «De todas las cosas» conserva el alcance total/cósmico que el inglés POB preserva.
- source_word: አልቦ ዘይሬኢ እምሰብእ
  english_pob_choice: no human being will see
  chosen_spanish: ningún ser humano verá
  alternatives_spanish:
  - ningún hombre verá
  - nadie verá
  - no habrá ser humano que vea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión niega una capacidad humana comparable. «Ser humano» evita un masculino innecesario y mantiene el contraste con la experiencia única de Enoc.
- source_word: ከመ አነ ርኢኩ
  english_pob_choice: as I have seen
  chosen_spanish: como yo he visto
  alternatives_spanish:
  - como vi
  - así como yo he visto
  - tal como yo he visto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El comparativo subraya que ningún otro humano comparte su experiencia visionaria. «Como yo he visto» suena natural y conserva el testimonio personal culminado.
theological_decisions:
- issue: Alcance cósmico de la visión de Enoc
  english_pob_reading: Enoch claims uniquely to have seen a cosmic vision extending to 'the ends of all things,' not merely a private experience.
  chosen_spanish_reading: Enoc afirma haber visto de manera única una visión cósmica que alcanza los confines de todas las cosas, no solo una experiencia privada.
  alternative_spanish_readings:
  - Enoc vio los límites físicos de la tierra
  - Enoc vio el final o desenlace de todo
  rationale: La formulación ge'ez es amplia y cósmica. «Los confines de todas las cosas» preserva esa amplitud sin reducirla a geografía ni a un simple final temporal.
  doctrine_reference: Preservar la imaginería apocalíptica; no aplanar el lenguaje cósmico en prosa genérica.
translation_notes:
  revision_awareness: 'El texto inglés revisado estabiliza el orden y la puntuación: mantiene «alone», «the vision» y «the ends of all things». La versión española sigue esa lectura final y evita añadir matices no respaldados por el audit trail.'
  spanish_consistency_notes:
  - Se usa «Enoc» como forma castellana estándar del nombre.
  - Se preserva el contraste singular entre la experiencia de Enoc y la incapacidad humana general.
  - Se mantiene un registro digno y publicable, con terminología apocalíptica clara y sin domesticación excesiva.
