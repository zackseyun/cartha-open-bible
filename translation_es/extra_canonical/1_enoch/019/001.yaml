translation:
  language: es
  text: 'Y Uriel me dijo: «Aquí estarán los ángeles que se unieron con mujeres; y sus espíritus, habiendo tomado muchas formas[a], corrompen a la humanidad y la desvían, de modo que sacrifican a demonios como a dioses, hasta el día del gran juicio[d][c][b], en el cual serán juzgados hasta que sean acabados.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiéndose convertido en muchas apariencias»; la frase ge''ez es difícil y puede referirse a manifestaciones variadas por las cuales estos espíritus corrompen a la humanidad.'
    reason: lexical_alternative
  - marker: b
    text: La expresión «sus espíritus» se deja literal. En el contexto enóquico más amplio, hay diferencia de interpretación sobre si apunta a los espíritus de los propios seres caídos o a espíritus demoníacos asociados con su descendencia.
    reason: alternative_reading
  - marker: c
    text: 'O: «hasta que se complete su final». La cláusula final subraya la consumación completa del juicio, pero el matiz exacto es incierto.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «corrompen a la humanidad y la desvían, de modo que sacrifican».'
    reason: previous_rendering
lexical_decisions:
- source_word: ተደሚሮሙ
  english_pob_choice: joined themselves
  chosen_spanish: se unieron
  alternatives_spanish:
  - se juntaron
  - se mezclaron
  - se asociaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa unión/asociación; en este contexto con mujeres, «se unieron» conserva la fuerza reflexiva sin explicitar más de lo que el texto fuente dice.
- source_word: ይቀውሙ
  english_pob_choice: shall stand
  chosen_spanish: se pondrán de pie
  alternatives_spanish:
  - estarán de pie
  - permanecerán de pie
  - se alzarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En una escena visionaria, la forma verbal señala la posición/lugar de los ángeles. «Se pondrán de pie» conserva el matiz solemne y visible de la escena.
- source_word: መናፍስቲሆሙ
  english_pob_choice: their spirits
  chosen_spanish: sus espíritus
  alternatives_spanish:
  - los espíritus que proceden de ellos
  - sus seres espirituales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase se mantiene literal para no resolver una ambigüedad apocalíptica que el texto no define explícitamente.
- source_word: ብዙኃ ራእየ ከዊኖሙ
  english_pob_choice: having taken on many forms
  chosen_spanish: habiendo tomado muchas formas
  alternatives_spanish:
  - habiéndose convertido en muchas apariencias
  - apareciendo de muchas maneras
  - habiendo asumido muchos aspectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es difícil; «habiendo tomado muchas formas» sigue de cerca la lectura auditada y sugiere manifestaciones variadas sin cerrar el sentido.
- source_word: አርኰስዎሙ
  english_pob_choice: defiled
  chosen_spanish: han corrompido
  alternatives_spanish:
  - han contaminado
  - han profanado
  - han hecho impuros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene fuerza de impureza/polución. «Han corrompido» es claro en español y preserva el efecto moral amplio sin sonar excesivamente técnico.
- source_word: ለሰብእ
  english_pob_choice: humankind
  chosen_spanish: a la humanidad
  alternatives_spanish:
  - a la gente
  - a los seres humanos
  - a los hombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Humanidad» expresa bien el colectivo no restringido por sexo y suena natural en español moderno.
- source_word: ያስሕትዎሙ
  english_pob_choice: led them astray
  chosen_spanish: la desvían
  alternatives_spanish:
  - la extravían
  - la engañan
  - la hacen errar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el sentido causativo de desvío/error. Dado el ajuste verbal del original, se opta por un presente que mantiene la secuencia apocalíptica de acción continua.
- source_word: ይሡዑ
  english_pob_choice: they sacrificed
  chosen_spanish: sacrifican
  alternatives_spanish:
  - ofrecen sacrificios
  - sacrifican ofrendas
  - inmolan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El objeto inmediato son demonios, con la comparación «como a dioses»; «sacrifican» conserva el acto cultual específico.
- source_word: አጋንንት
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  - demonios malignos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Demonios» es la equivalencia directa y más reconocible para el ámbito apocalíptico.
- source_word: ከመ አማልክት
  english_pob_choice: as to gods
  chosen_spanish: como a dioses
  alternatives_spanish:
  - como dioses
  - en calidad de dioses
  - cual dioses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación indica el trato/culto dado a los demonios. «Como a dioses» mantiene el sentido de honor sacrificial hacia ellos.
- source_word: ዕለተ ዐባይ ኵነኔ
  english_pob_choice: the day of the great judgment
  chosen_spanish: el día del gran juicio
  alternatives_spanish:
  - el gran día del juicio
  - el día del juicio grande
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gran juicio» sigue el orden del ge'ez y conserva la fórmula apocalíptica solemne sin desplazarla a un giro más eclesiástico.
- source_word: ይትኴነኑ
  english_pob_choice: they will be judged
  chosen_spanish: serán juzgados
  alternatives_spanish:
  - será ejecutado juicio sobre ellos
  - serán condenados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo es judicial y pasivo. «Serán juzgados» mantiene abierta la implicación del resultado sin imponer una paráfrasis más fuerte.
- source_word: እስከ ይትፈጸሙ
  english_pob_choice: until they are finished
  chosen_spanish: hasta que se cumpla su fin
  alternatives_spanish:
  - hasta que su fin sea completo
  - hasta que terminen
  - hasta que queden consumados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula es breve y ambigua. «Hasta que se cumpla su fin» preserva la idea de consumación/completitud sin decidir entre aniquilación, término o consumación del castigo.
theological_decisions:
- issue: Identidad y alcance de «sus espíritus»
  english_pob_reading: The text is rendered literally as 'their spirits,' without resolving whether this refers to the spirits of the fallen angels themselves, their offspring, or their manifested operations.
  chosen_spanish_reading: Se mantiene «sus espíritus» de forma literal, sin precisar si se trata de los espíritus de los ángeles caídos, de sus descendientes o de sus operaciones manifiestas.
  alternative_spanish_readings:
  - sus espíritus malignos
  - los espíritus que proceden de ellos
  - los espíritus de su descendencia
  rationale: El pasaje no define el referente de manera explícita. La traducción conserva la tensión interpretativa en lugar de resolverla prematuramente.
  doctrine_reference: Preservar tensión teológica sin resolver la ontología apocalíptica del texto.
- issue: Duración y resultado del juicio final
  english_pob_reading: The clause is left broad, indicating the completion/consummation of judgment rather than specifying annihilation or endless duration.
  chosen_spanish_reading: La cláusula final se traduce de forma amplia, como consumación del fin, sin decidir si implica aniquilación o una duración indefinida del castigo.
  alternative_spanish_readings:
  - hasta que su condena se complete
  - hasta que lleguen a su fin
  - hasta que el juicio quede consumado
  rationale: El hebraísmo/giros apocalípticos del original señalan finalización, pero no fijan por sí mismos una conclusión dogmática sobre el modo exacto del castigo.
  doctrine_reference: Preservar tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente que ajusta la secuencia verbal al valor aspectual del ge''ez: una corrupción ya consumada seguida de una acción continua de extravío y sacrificio. Por eso se prefieren presentes en español para «desvían» y «sacrifican», manteniendo la progresión temporal apocalíptica sin aplastarla en pasado narrativo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - «Ángeles» se mantiene como término estándar del pasaje.
  - Se conserva «demonios» para አጋንንት, conforme al registro apocalíptico.
  - Se evita reemplazar «gran juicio» por fórmulas eclesiales más tradicionales que no están exigidas por la fuente.
  - La puntuación busca reproducir el tono solemne y visionario del original sin sobrecargar el período.
