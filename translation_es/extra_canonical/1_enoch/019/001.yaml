revisions:
- from: 'Y Uriel me dijo[a]: “Aquí se pondrán de pie los ángeles que se unieron con mujeres; y sus espíritus, habiendo tomado muchas formas, han corrompido a la humanidad y la desvían, de modo que sacrifican a demonios como a dioses, hasta el día del gran juicio[d][c][b], en el cual serán juzgados hasta que se cumpla su fin.”'
  to: 'Y Uriel me dijo: «Aquí estarán los ángeles que se unieron con mujeres; y sus espíritus, habiendo tomado muchas formas[a], corrompen a la humanidad y la desvían, de modo que sacrifican a demonios como a dioses, hasta el día del gran juicio[d][c][b], en el cual serán juzgados hasta que sean acabados.»'
  rationale: Se corrige un error evidente de idioma en la nota b, se mejora «shall stand» a «estarán» para un español visionario más natural, se alinea la secuencia verbal con la revisión auditada usando presentes iterativos, y se reemplaza la cláusula final por una formulación más cercana a la ambigüedad del original y del POB inglés. También se ajusta la clasificación de la nota d a previous_rendering. Aunque «sean acabados» es algo inusual, preserva mejor la tensión de «until they are finished» que «se cumpla su fin».
