base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/019/001.yaml
  text: And Uriel said to me[a], “Here shall stand the angels who joined themselves with women; and their spirits, having taken on many forms, defile humankind and lead them astray so that they sacrifice to demons as to gods, until the day of the great judgment[d][c][b], on which they will be judged until they are finished.”
  footnotes:
  - marker: a
    text: Or 'having become many appearances'; the Ge'ez phrase is difficult and may refer to varied manifestations by which these spirits corrupt humanity.
    reason: lexical_alternative
  - marker: b
    text: The expression 'their spirits' is left literal. In the wider Enochic context, interpreters differ on whether this points to the spirits of the fallen beings themselves or to demonic spirits associated with their offspring.
    reason: alternative_reading
  - marker: c
    text: Or 'until their end is completed.' The final clause emphasizes the full completion of judgment, but the exact nuance is uncertain.
    reason: lexical_alternative
  - marker: d
    text: Or 'defiled humankind and led them astray so that they sacrificed'.
    reason: previous_rendering
