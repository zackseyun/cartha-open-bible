translation:
  language: es
  text: Y sus mujeres[a], los ángeles que se desviaron[c][b], se volverán como los pacíficos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus esposas». El término ge'ez puede referirse a mujeres en general o a esposas específicamente.
    reason: lexical_alternative
  - marker: b
    text: La construcción con «los ángeles que se desviaron» es difícil. La comparación final es clara, pero «los pacíficos» puede describir a los ángeles o indicar un estado de paz al que las mujeres llegan.
    reason: alternative_reading
  - marker: c
    text: O «Y las mujeres de los que se desviaron se volverán como los ángeles, los pacíficos».
    reason: previous_rendering
lexical_decisions:
- source_word: አንስትያሆሙኒ
  english_pob_choice: the women of those / their wives
  chosen_spanish: sus mujeres
  alternatives_spanish:
  - sus esposas
  - las mujeres de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo etiópico puede significar mujeres o esposas según el contexto. En español, «sus mujeres» conserva la ambigüedad documentada sin forzar una lectura más específica de lo que el pasaje exige.
- source_word: ስሑታን
  english_pob_choice: who went astray
  chosen_spanish: que se desviaron
  alternatives_spanish:
  - que se extraviaron
  - los que se desviaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea central es de apartarse del camino recto. «Se desviaron» preserva el valor direccional y moral del término sin endurecerlo innecesariamente como «pecadores».
- source_word: መላእክት
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto apocalíptico señala seres celestiales, por lo que «ángeles» es la equivalencia natural y más transparente en español.
- source_word: ተከመ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - al modo de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula es comparativa; «como» evita convertir la comparación en identificación literal.
- source_word: ሰላማዊያት
  english_pob_choice: peaceful ones
  chosen_spanish: seres pacíficos
  alternatives_spanish:
  - personas pacíficas
  - los pacíficos
  - seres en paz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo derivado de «paz» funciona aquí de manera sustantiva. «Seres pacíficos» conserva el tono elevado y la idea de un estado de paz sin imponer una interpretación doctrinal cerrada.
- source_word: ይከውና
  english_pob_choice: will become
  chosen_spanish: se volverán
  alternatives_spanish:
  - llegarán a ser
  - vendrán a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa devenir o llegar a ser. «Se volverán» mantiene la dinámica de transformación futura con naturalidad en español.
theological_decisions:
- issue: Relación sintáctica entre «sus mujeres» y «los ángeles que se desviaron»
  english_pob_reading: The POB audit trail recognizes a difficult genitive/appositional construction and preserves tension rather than forcing a simplistic paraphrase.
  chosen_spanish_reading: «sus mujeres, las de los ángeles que se desviaron» deja en español la relación posesiva/apposicional sin resolverla de forma excesiva.
  alternative_spanish_readings:
  - «las mujeres de los ángeles que se desviaron»
  - «sus esposas, los ángeles que se desviaron»
  rationale: El texto ge'ez y su historia de revisión muestran una tensión sintáctica real. La formulación elegida mantiene la proximidad entre los elementos y evita imponer una lectura que suprima la ambigüedad del original.
  doctrine_reference: Preservar la tensión textual local; no armonizar más allá de la evidencia del pasaje.
- issue: Alcance de la comparación final
  english_pob_reading: 'Comparative transformation: they will become like angels / peaceful ones; do not over-identify the comparison target.'
  chosen_spanish_reading: «se volverán como seres pacíficos» conserva la comparación sin decir que ellas se transforman ontológicamente en ángeles.
  alternative_spanish_readings:
  - «se volverán como los ángeles, seres pacíficos»
  - «vivirán en paz»
  rationale: La comparación es clara, pero el texto no obliga a una identidad literal ni a una simplificación del rasgo final. «Seres pacíficos» reproduce el valor descriptivo y mantiene abierta la tensión exegética.
  doctrine_reference: Mantener la lectura comparativa del pasaje y no resolverla dogmáticamente.
translation_notes:
  revision_awareness: 'El texto base en inglés pasó por varias correcciones: primero se leyó como «the women of those who went astray», luego se advirtió la dificultad del genitivo ge''ez, y finalmente se reordenó hacia una lectura posesiva/apposicional. La versión española sigue esa última cautela sin eliminar la ambigüedad documentada.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y cualquier terminología cristiana ajena al pasaje; no aplica aquí, pero se mantiene la consistencia del proyecto.
  - Se eligió «ángeles» por el contexto apocalíptico.
  - Se prefirió una comparación explícita con «como» para respetar el marcador comparativo del original.
  - Se mantuvo un tono bíblico moderno y sobrio, sin archaismos innecesarios.
