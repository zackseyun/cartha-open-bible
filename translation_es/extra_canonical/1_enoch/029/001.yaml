translation:
  language: es
  text: Y de allí fui a otro lugar, lejos del desierto[b]; y me acerqué al oriente[a] de este monte[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez refiere literalmente la dirección de la mañana o del amanecer; por eso se traduce 'oriente'.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como 'desierto' o como una región árida y baldía.
    reason: lexical_alternative
  - marker: c
    text: 'O: ''y me acerqué a este monte por el oriente''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወእምህየኒ
  english_pob_choice: And from there
  chosen_spanish: Y de allí
  alternatives_spanish:
  - Y desde allí
  - Y de ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa con naturalidad el valor de transición narrativa del ge'ez sin añadir matices que no están en el texto.
- source_word: ሖርኩ
  english_pob_choice: I went
  chosen_spanish: fui
  alternatives_spanish:
  - me fui
  - caminé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo simple de movimiento se rinde con un pretérito directo y natural en español.
- source_word: ውስተ መካን ካልእ
  english_pob_choice: into another place
  chosen_spanish: a otro lugar
  alternatives_spanish:
  - a otro sitio
  - a otro lugar diferente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La estructura indica desplazamiento hacia otra localización; 'lugar' conserva la amplitud espacial sin sobreespecificar.
- source_word: እምነ መደባራ
  english_pob_choice: away from the wilderness
  chosen_spanish: lejos del desierto
  alternatives_spanish:
  - lejos del desierto yermo
  - fuera del desierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Desierto'' comunica el valor de región árida o inculta, y en español resulta más inmediato que un calco técnico de ''wilderness''.'
- source_word: ወመንገለ ጽባሕ
  english_pob_choice: the east / east
  chosen_spanish: el oriente
  alternatives_spanish:
  - el este
  - la dirección del amanecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez alude a la dirección del amanecer; 'oriente' mantiene el registro bíblico y la referencia direccional.
- source_word: ለደብር ዝንቱ
  english_pob_choice: this mountain
  chosen_spanish: este monte
  alternatives_spanish:
  - esta montaña
  - este monte de aquí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Monte'' conserva el tono bíblico y apocalíptico; el demostrativo preserva la deixis de ዝንቱ. '
translation_notes:
  revision_awareness: 'La revisión del audit trail corrige la sintaxis direccional: መንገለ ጽባሕ ለደብር ዝንቱ se entiende como ''el oriente de este monte'', no como un movimiento ''hacia este monte por el oriente''. La redacción española refleja esa relación genitiva/direccional revisada.'
  spanish_consistency_notes:
  - Se conservó 'oriente' para mantener la correlación con el sentido de 'dirección del amanecer' señalado en la auditoría.
  - Se evitó 'SEÑOR' o términos de carga teológica no pertinentes; el verso es narrativo y geográfico.
  - '''Monte'' se prefirió sobre ''montaña'' por registro bíblico, sin cambiar el sentido referencial.'
