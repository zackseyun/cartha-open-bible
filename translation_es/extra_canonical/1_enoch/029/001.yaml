  language: en
  yaml_path: translation/extra_canonical/1_enoch/029/001.yaml
  text: And from there I went into another place[a], away from the wilderness[c][b]; and I drew near to the east of this mountain.
  footnotes:
  - marker: a
    text: The Ge'ez phrase literally refers to the direction of morning or sunrise; hence 'east.'
    reason: lexical_alternative
  - marker: b
    text: The term rendered 'wilderness' may also be understood as 'desert' or a barren region.
    reason: lexical_alternative
