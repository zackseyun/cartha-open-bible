- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - vi
  - miré
  lexicon: Dillmann
  rationale: En primera persona singular, 'vi' es natural en español y conserva el carácter visionario del relato.
- source_word: ዕፀወ
  english_pob_choice: trees
  chosen_spanish: árboles
  alternatives_spanish:
  - árboles
  - plantas
  lexicon: Dillmann
  rationale: El sustantivo concreto 'árboles' corresponde bien al paisaje visionario del texto.
- source_word: ተኵነኔ
  english_pob_choice: of incense
  chosen_spanish: de incienso
  alternatives_spanish:
  - aromáticos
  - de fragancia
  lexicon: Dillmann
  rationale: Aunque la tradición de revisión inglesa osciló en esta línea, el Ge'ez aquí se entiende mejor como un calificativo aromático/cultual; 'incienso' mantiene ese campo semántico de forma transparente en español.
- source_word: ተፈድፋደ
  english_pob_choice: they were fragrant
  chosen_spanish: con el aroma
  alternatives_spanish:
  - con fragancia
  - desprendiendo aroma
  lexicon: Dillmann
  rationale: La forma expresa una cualidad olfativa intensa; en español, la construcción con 'con el aroma' evita una repetición forzada y sigue el valor sensorial del texto.
- source_word: ቈስቍስ
  english_pob_choice: sweet
  chosen_spanish: delicado
  alternatives_spanish:
  - dulce
  - suave
  lexicon: Dillmann
  rationale: El testigo OCR es incierto y el término parece intensificar la cualidad del olor; 'delicado' funciona como equivalente prudente en español sin sobreespecificar.
- source_word: መዓዛ
  english_pob_choice: scent
  chosen_spanish: aroma
  alternatives_spanish:
  - fragancia
  - olor
  lexicon: Dillmann
  rationale: '''Aroma'' es natural y digno en español para una descripción positiva del olor, sin sonar repetitivo.'
- source_word: ስኂን
  english_pob_choice: among them
  chosen_spanish: y también
  alternatives_spanish:
  - entre ellos
  - además
  lexicon: Dillmann
  rationale: Dada la dificultad del tramo final y la lectura revisada que lo vincula con otra lista de árboles, la frase se mantiene abierta y aditiva, sin resolver en exceso la sintaxis dudosa.
- source_word: ወከርቤ
  english_pob_choice: and among them were
  chosen_spanish: y también
  alternatives_spanish:
  - y entre ellos había
  - y además
  lexicon: Dillmann
  rationale: Se conserva la adición de otro elemento arbóreo sin introducir una relación sintáctica más precisa de la que el testigo permite.
- source_word: ወዕፀወሂ
  english_pob_choice: trees also
  chosen_spanish: árboles
  alternatives_spanish:
  - árboles también
  - otros árboles
  lexicon: Dillmann
  rationale: La frase final queda deliberadamente incompleta, reflejando el cierre abrupto del texto y evitando completar lo que el original no fija con claridad.
theological_decisions:
- issue: Valor semántico de ተኵነኔ en un contexto visionario aromático
  english_pob_reading: The revised English audit moved away from 'judgment' and retained 'trees of incense,' treating the line as aromatic imagery without explicit symbolic theology.
  chosen_spanish_reading: '''árboles de incienso'' mantiene el valor aromático sin convertir la imagen en una alegoría doctrinal.'
  alternative_spanish_readings:
  - árboles de fragancia
  - árboles de incienso sagrado
  rationale: El texto no explicita un significado teológico; conviene preservar la imagen sensorial y dejar abierta la interpretación, en fidelidad al primario original.
  doctrine_reference: Original-language primacy; preserve interpretive tension rather than importing symbolism.
- issue: Final abierto e incompleto de la cláusula
  english_pob_reading: 'The English audit retained an abrupt ending: ''and trees also,'''
  chosen_spanish_reading: '''y también árboles,'' reproduce el corte abrupto.'
  alternative_spanish_readings:
  - y árboles también,
  - y además árboles,
  rationale: Mantener la clausura incompleta evita suavizar o normalizar una línea textual que en el testimonio sigue truncada o difícil.
  doctrine_reference: Textual restraint and transparency to the source witness.
translation_notes:
  revision_awareness: 'Esta redacción toma en cuenta la corrección crítica indicada por la revisión: el pasaje debe mantenerse como imagen aromática de árboles y no como ''árboles de juicio''. A la vez, la línea final se conserva abierta y no se fuerza una reconstrucción sintáctica que el testimonio no garantiza. Frente al inglés de auditoría, la versión española sigue la lectura revisada pero evita añadir detalles no asegurados por el Ge''ez.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene 'incienso' para el valor aromático/cultual de la imagen, sin introducir 'frankincense' como préstamo.
  - Se conserva el final truncado con coma final para reflejar la discontinuidad del verso.
  - El registro es sobrio y publicable, evitando arcaísmos innecesarios.
