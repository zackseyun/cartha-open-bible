translation:
  language: es
  text: Y allí vi árboles de incienso[a], con el aroma de incienso y mirra, y árboles también[b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lectura del testimonio etiópico aquí es difícil, especialmente en la parte media del verso. El sentido general es que los árboles despedían una fragancia agradable; el matiz exacto también puede entenderse como 'agradable' o 'especiada'.
    reason: textual_variant
  - marker: b
    text: El final del verso es abrupto y difícil en este testimonio, y puede indicar árboles adicionales cerca de los árboles aromáticos o entre ellos.
    reason: alternative_reading
  - marker: c
    text: 'O bien: ''árboles de incienso, y eran fragantes con dulce aroma, y entre ellos había árboles también''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወበህየ
  english_pob_choice: And there
  chosen_spanish: Y allí
  alternatives_spanish:
