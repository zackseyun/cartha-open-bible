translation:
  language: es
  text: Y la sabiduría de Yahvé de los Espíritus lo ha revelado a los consagrados[a] y a los justos; porque han preservado el lote[b] de los justos, porque aborrecieron y despreciaron este mundo de injusticia, y aborrecieron todas sus obras y sus caminos en el nombre de Yahvé de los Espíritus. Porque por su nombre son salvados, y por su beneplácito su vida llegó a ser[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los santos'. El término ge'ez puede denotar colectivamente a personas consagradas o apartadas para Dios; aquí se evita un matiz eclesiástico posterior demasiado fuerte.
    reason: lexical_alternative
  - marker: b
    text: O 'la porción' o 'la parte asignada'. La expresión puede referirse al lote, heredad o parte que corresponde a los justos.
    reason: lexical_alternative
  - marker: c
    text: 'También puede leerse: ''y por su voluntad su vida fue establecida''. La cláusula subraya que la vida de los justos depende del propósito querido de Yahvé de los Espíritus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ጥበቡ
  english_pob_choice: the wisdom of the Lord of Spirits
  chosen_spanish: la sabiduría del Señor de los Espíritus
  alternatives_spanish:
  - la sabiduría del Señor de Espíritus
  - la sabiduría del Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sintagma posee al Señor de los Espíritus como complemento posesivo; en español conviene explicitarlo para no perder el sujeto teológico de la frase. Se mantiene 'sabiduría' como sustantivo principal, sin atenuar el peso apocalíptico del enunciado.
- source_word: ከሠተ
  english_pob_choice: has revealed
  chosen_spanish: ha revelado
  alternatives_spanish:
  - ha dado a conocer
  - ha manifestado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo se entiende como revelar/manifestar, no como 'derramar'. 'Ha revelado' sigue la corrección del audit trail y conserva la iniciativa divina y el tono de descubrimiento apocalíptico.
- source_word: ቅዱሳን
  english_pob_choice: the holy
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos consagrados
  - los consagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés auditado usa 'the holy', en español 'los santos' comunica de modo natural el grupo de consagrados. Se evita un calco extraño como 'los santos' sin matiz solo si el contexto eclesial lo desvirtúa; aquí, por tratarse de un grupo colectivo apocalíptico, la forma es adecuada y inteligible.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Los justos'' mantiene la categoría apocalíptica y la correspondencia con el inglés POB. En español resulta más natural que ''los rectos'', aunque esta última podría sugerir una virtud más abstracta.'
- source_word: ክፍሎሙ
  english_pob_choice: the portion / the lot
  chosen_spanish: la porción
  alternatives_spanish:
  - la suerte
  - la parte
  - la porción que les corresponde
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede implicar herencia, lote o parte asignada. 'La porción' conserva la ambigüedad útil del original y permite entender tanto 'parte' como 'lote' sin decidir prematuramente.
- source_word: ዘዓመፃ
  english_pob_choice: of unrighteousness
  chosen_spanish: de injusticia
  alternatives_spanish:
  - de maldad
  - de impiedad
  - de injusticia e iniquidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Injusticia'' expresa bien el contraste moral con ''los justos'' y evita introducir una categoría técnica como ''iniquidad'' si el lector moderno no la percibe con claridad. Se preserva la fuerza ética del genitivo.'
- source_word: ምግባሮ
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - acciones
  - hechos
  - prácticas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Obras'' es natural en español bíblico y conserva el paralelismo con ''caminos''. También mantiene el valor de conjunto de conductas, no solo actos aislados.'
- source_word: ፍናዊሁ
  english_pob_choice: its ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - su modo de andar
  - su manera de vivir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Caminos'' preserva la metáfora moral del original y es más bíblico y estable que una paráfrasis como ''manera de vivir''. En español suena natural dentro del paralelismo con ''obras''.'
- source_word: በስሙ
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por el nombre de
  - a causa del nombre de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula española fija el registro solemne y mantiene la idea de lealtad/autoridad inherente a la expresión semítica. No se reduce a mera causalidad.
- source_word: ይድኅኑ
  english_pob_choice: they are saved
  chosen_spanish: son salvados
  alternatives_spanish:
  - son librados
  - obtienen salvación
  - serán salvados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Son salvados'' conserva el sentido general y evita forzar tiempo futuro donde el ge''ez permite un valor gnómico o presente. ''Salvados'' mantiene fuerza teológica sin perder la pasiva implícita.'
- source_word: በፈቃዱ
  english_pob_choice: by his good pleasure
  chosen_spanish: por su buen querer
  alternatives_spanish:
  - por su voluntad
  - según su beneplácito
  - por su beneplácito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Buen querer'' refleja el matiz voluntario y benevolente del término sin sonar demasiado técnico. Alternativas más tradicionales como ''beneplácito'' son posibles, pero menos transparentes para lectura continua.'
- source_word: ኮነ ሕይወቶሙ
  english_pob_choice: their life came to be
  chosen_spanish: llegó a ser su vida
  alternatives_spanish:
  - su vida llegó a ser
  - su vida fue establecida
  - su vida vino a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción verbal enfatiza origen o surgimiento dependiente del querer divino. 'Llegó a ser' conserva ese movimiento sin convertirlo en una simple cópula estática.
theological_decisions:
- issue: Cómo traducir ቅዱሳን sin borrar el matiz de grupo consagrado ni imponer una carga eclesiástica posterior
  english_pob_reading: the holy
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los consagrados
  - los santos consagrados
  rationale: En español, 'los santos' comunica naturalmente un colectivo de personas apartadas para Dios. Dado que el contexto es enochino/apocalíptico, no se pretende una referencia litúrgica romana, sino una designación de pertenencia y separación.
  doctrine_reference: Mantener el matiz de consagración sin anular la inteligibilidad moderna.
- issue: Relación entre salvación y nombre del Señor de los Espíritus
  english_pob_reading: For by his name they are saved
  chosen_spanish_reading: Porque por su nombre son salvados
  alternative_spanish_readings:
  - Porque por su nombre serán salvados
  - Porque por su nombre encuentran salvación
  rationale: El ge'ez permite un valor gnómico o presente; el presente pasivo español conserva esa amplitud y deja abierta la tensión escatológica. No se fuerza una temporalidad futura que el texto no exige.
  doctrine_reference: Preservar la tensión entre salvación presente y esperanza futura.
- issue: Sentido de la última cláusula sobre la vida del justo
  english_pob_reading: and by his good pleasure their life came to be
  chosen_spanish_reading: y por su buen querer llegó a ser su vida
  alternative_spanish_readings:
  - y por su voluntad fue establecida su vida
  - y por su beneplácito su vida llegó a ser
  rationale: La formulación mantiene que la vida de los justos depende del querer divino, no de su propia autonomía. 'Llegó a ser' conserva la idea de surgimiento/constitución sin cerrar el sentido a creación, establecimiento o continuidad.
  doctrine_reference: Preferir una formulación transparente que conserve dependencia de la voluntad divina.
translation_notes:
  revision_awareness: 'La base auditada corrigió un error mayor: el ge''ez ከሠተ no significa ''was poured out'' sino ''has revealed''. Además, la frase contiene explícitamente ''la sabiduría del Señor de los Espíritus''. Esta versión española sigue esa lectura corregida, conserva la tensión sobre ይድኅኑ (''son salvados'') y mantiene abierta la alternativa sobre la última cláusula con una nota.'
  spanish_consistency_notes:
  - Se conserva 'Señor de los Espíritus' de forma uniforme para ለእግዚአ መናፍስት.
  - Se mantiene el paralelismo 'obras' / 'caminos' para reproducir la repetición del original.
  - '''Justos'' se usa de modo consistente como categoría apocalíptica, evitando alternar con ''rectos'' en el texto principal.'
  - Se evita 'Cristo' porque no hay base en el pasaje para ese título; el texto trata del 'Señor de los Espíritus'.
