revisions:
- from: Y la sabiduría del Señor de los Espíritus lo ha revelado a los santos y a los justos[a]; porque han preservado la porción de los justos[b], porque aborrecieron y despreciaron este mundo de injusticia, y aborrecieron todas sus obras y sus caminos en el nombre del Señor de los Espíritus. Porque por su nombre son salvados, y por su buen querer llegó a ser su vida[c].
  to: Y la sabiduría de Yahvé de los Espíritus lo ha revelado a los consagrados[a] y a los justos; porque han preservado el lote[b] de los justos, porque aborrecieron y despreciaron este mundo de injusticia, y aborrecieron todas sus obras y sus caminos en el nombre de Yahvé de los Espíritus. Porque por su nombre son salvados, y por su beneplácito su vida llegó a ser[c].
  rationale: 'La revisión mantiene el sentido del texto ge''ez y del audit trail inglés, pero corrige cuatro áreas: alineación terminológica del proyecto con ''Yahvé'', evitación del sobretono eclesiástico de ''los santos'', mejor precisión para ክፍሎሙ con ''lote'', y español más natural y teológicamente sólido en la cláusula final mediante ''beneplácito'' y ''su vida llegó a ser''. No hace falta adjudicación adicional: son ajustes de estilo/fidelidad de baja a media complejidad, no un caso doctrinalmente irresoluble.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:39:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la corrección principal del audit trail: la sabiduría del Señor de los Espíritus revela ''a él'', y conserva adecuadamente el rechazo del mundo injusto, sus obras y sus caminos, así como la salvación por su nombre. Sin embargo, hay varios puntos de fidelidad y naturalidad que conviene ajustar: ''Señor'' debería alinearse con la política del proyecto como ''Yahvé'' cuando se trata del nombre/título divino principal; ''los santos'' introduce un matiz eclesiástico que el propio POB evitó con ''the holy''; ''la porción'' es posible pero el audit trail revisado favorece más precisamente la idea de ''lote'' o ''parte asignada''; y la cláusula final ''llegó a ser su vida'' suena invertida y menos fiel al sentido de ''su vida llegó a ser / vino a existir''.'
  spanish_quality_summary: El español es generalmente claro, pero tiene algunas formulaciones poco idiomáticas o menos dignas para lectura bíblica continua. 'Buen querer' suena forzado en registro bíblico; 'beneplácito' o 'voluntad' funciona mejor. 'Son salvados' es entendible, pero 'son salvos' o 'son salvados' ambos sirven; aquí no exige cambio por sí solo. La mayor mejora de legibilidad está en evitar 'los santos' y en normalizar la última cláusula a un orden natural del español.
  glossary_alignment: Hay desalineación con la terminología del proyecto en 'Señor de los Espíritus', que debe revisarse a 'Yahvé de los Espíritus' salvo razón contextual en contra, la cual aquí no se documenta. 'Los justos' está bien para ጻድቃን. Para ቅዱሳን, mejor 'los consagrados' o 'los santos' solo con razón fuerte; dado el rationale inglés, 'los consagrados' preserva mejor la intención. El resto del léxico principal está razonablemente alineado.
  issues:
  - severity: medium
    issue: Uso de 'Señor de los Espíritus' en lugar de 'Yahvé de los Espíritus'
    rationale: La política terminológica del proyecto pide 'Yahvé' en el texto principal para el nombre divino, no la convención de enmascaramiento 'SEÑOR/Señor'. No hay aquí una justificación contextual suficiente para apartarse de esa norma.
  - severity: medium
    issue: '''Los santos'' para ቅዱሳን añade sobretono eclesiástico'
    rationale: El audit trail inglés evitó 'saints' precisamente para no importar resonancias posteriores. En español 'los santos' suena más cargado que en inglés; 'los consagrados' preserva mejor el sentido colectivo de personas apartadas.
  - severity: medium
    issue: '''La porción de los justos'' es menos precisa que ''el lote/la parte asignada de los justos'''
    rationale: El audit trail revisado favorece la noción de lote/allotted share. 'Porción' no es incorrecto, pero 'lote' o 'parte asignada' comunica mejor el matiz de heredad o suerte asignada sin perder apertura semántica.
  - severity: medium
    issue: '''Por su buen querer'' suena poco natural y débil en registro bíblico'
    rationale: Aunque intenta reflejar benevolencia, en español resulta extraño. 'Por su beneplácito' conserva mejor el peso teológico y la dignidad del registro.
  - severity: medium
    issue: Orden poco natural en 'llegó a ser su vida'
    rationale: 'La cláusula final debe expresar que la vida de ellos llegó a ser/existir por su beneplácito. En español natural y fiel: ''su vida llegó a ser'' o ''su vida vino a existir''.'
  revised_spanish_text: Y la sabiduría de Yahvé de los Espíritus lo ha revelado a los consagrados[a] y a los justos; porque han preservado el lote[b] de los justos, porque aborrecieron y despreciaron este mundo de injusticia, y aborrecieron todas sus obras y sus caminos en el nombre de Yahvé de los Espíritus. Porque por su nombre son salvados, y por su beneplácito su vida llegó a ser[c].
  revised_footnotes:
  - marker: a
    text: O 'los santos'. El término ge'ez puede denotar colectivamente a personas consagradas o apartadas para Dios; aquí se evita un matiz eclesiástico posterior demasiado fuerte.
    reason: lexical_alternative
  - marker: b
    text: O 'la porción' o 'la parte asignada'. La expresión puede referirse al lote, heredad o parte que corresponde a los justos.
    reason: lexical_alternative
  - marker: c
    text: 'También puede leerse: ''y por su voluntad su vida fue establecida''. La cláusula subraya que la vida de los justos depende del propósito querido de Yahvé de los Espíritus.'
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene el sentido del texto ge''ez y del audit trail inglés, pero corrige cuatro áreas: alineación terminológica del proyecto con ''Yahvé'', evitación del sobretono eclesiástico de ''los santos'', mejor precisión para ክፍሎሙ con ''lote'', y español más natural y teológicamente sólido en la cláusula final mediante ''beneplácito'' y ''su vida llegó a ser''. No hace falta adjudicación adicional: son ajustes de estilo/fidelidad de baja a media complejidad, no un caso doctrinalmente irresoluble.'
