base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/048/007.yaml
  text: And the wisdom of the Lord of Spirits has revealed him to the holy and to the righteous[a]; for they have preserved the lot of the righteous, because they hated and despised this world of unrighteousness, and they hated all its works and its ways in the name of the Lord of Spirits. For by his name they are saved[d][c][b], and by his good pleasure their life came to be.
  footnotes:
  - marker: a
    text: Or 'the holy ones.' The Ge'ez group term can denote consecrated people collectively.
    reason: lexical_alternative
  - marker: b
    text: '''The portion of the righteous'' may mean their allotted share, lot, or inheritance as righteous ones.'
    reason: lexical_alternative
  - marker: c
    text: Or 'by his will their life was established.' The final clause emphasizes that the life of the righteous depends on the Lord of Spirits' willing purpose.
    reason: lexical_alternative
  - marker: d
    text: Or 'And wisdom was poured out for the holy and for the righteous;'.
    reason: previous_rendering
