translation:
  language: es
  text: A esa hora fue nombrado aquel Hijo del Hombre[a] en presencia del Señor de los Espíritus, y su nombre estaba ante la Cabeza de los Días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue llamado». La pasiva puede expresar designación o nombramiento; se ha elegido «fue nombrado» porque la siguiente cláusula repite «su nombre».
    reason: lexical_alternative
  - marker: b
    text: «Cabeza de los Días» es una traducción literal de un título divino en las Parábolas. Se conserva la imagen en vez de sustituirla por un equivalente tradicional más fluido.
    reason: cultural_note
lexical_decisions:
- source_word: በይእቲ ሰዓት
  english_pob_choice: at that hour
  chosen_spanish: a aquella hora
  alternatives_spanish:
  - en aquella hora
  - en ese momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el marcador temporal solemne y específico del pasaje, y en español 'a aquella hora' suena natural sin perder el valor apocalíptico de 'hour'.
- source_word: ተጸውዐ
  english_pob_choice: was named
  chosen_spanish: fue nombrado
  alternatives_spanish:
  - fue llamado
  - recibió nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva aquí puede indicar designación o nominación. 'Fue nombrado' mantiene ese valor y hace visible la relación con la cláusula siguiente sobre 'su nombre'.
- source_word: ወልደ ሰብእ ዝኩ
  english_pob_choice: that Son of Man
  chosen_spanish: aquel Hijo del Hombre
  alternatives_spanish:
  - ese Hijo del Hombre
  - aquel hijo del hombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo requiere distancia deíctica; 'aquel' conserva el referente específico. Se mantiene la capitalización porque funciona como título en este contexto visionario.
- source_word: በኀበ እግዚአ መናፈስት
  english_pob_choice: in the presence of the Lord of Spirits
  chosen_spanish: en presencia del Señor de los Espíritus
  alternatives_spanish:
  - ante el Señor de los Espíritus
  - delante del Señor de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''En presencia de'' conserva la idea de estar ante una figura soberana celestial de modo idiomático en español y sin borrar el tono cortesano/apocalíptico.'
- source_word: ስሙ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la repetición temática de 'nombre', importante en la frase final del versículo.
- source_word: መቅድመ
  english_pob_choice: was before
  chosen_spanish: estaba antes de
  alternatives_spanish:
  - estaba delante de
  - fue puesto antes de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es compacta y algo ambigua; 'estaba antes de' mantiene la posibilidad de prioridad, presencia o preexistencia sin resolver la tensión.
- source_word: ርእሰ መዋዕል
  english_pob_choice: the Head of Days
  chosen_spanish: el Cabeza de los Días
  alternatives_spanish:
  - el Jefe de los Días
  - el Cabeza de Días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la literalidad del título como imagen distintiva. La forma es poco usual en español, pero evita reemplazarla por un equivalente tradicional que borre el rasgo particular del original.
theological_decisions:
- issue: Naturaleza del título 'Son of Man'
  english_pob_reading: that Son of Man
  chosen_spanish_reading: aquel Hijo del Hombre
  alternative_spanish_readings:
  - ese Hijo del Hombre
  - aquel hijo del hombre
  rationale: El texto presenta una figura concreta y exaltada dentro de las Parábolas; la traducción mantiene ese valor titulado sin forzar una armonización posterior.
  doctrine_reference: Mantener el sentido local del pasaje sin sobrearmonizar con usos posteriores del NT.
- issue: Relación entre el nombre y la posición 'before the Head of Days'
  english_pob_reading: his name was before the Head of Days
  chosen_spanish_reading: su nombre estaba antes de el Cabeza de los Días
  alternative_spanish_readings:
  - su nombre fue antes del Cabeza de los Días
  - su nombre estaba delante del Cabeza de los Días
  rationale: La construcción puede insinuar precedencia o preexistencia, pero el ge'ez es breve y no obliga a fijar una explicación doctrinal. El español conserva esa tensión.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Se siguió el auditable inglés POB como apoyo, pero la redacción española se ajustó directamente al ge''ez: se mantuvo el demostrativo distante, la pasiva de nombramiento y la ambigüedad de la cláusula final sin resolverla doctrinalmente.'
  spanish_consistency_notes:
  - Se conservó «Señor de los Espíritus» y no se sustituyó por una forma eclesiástica más conocida, para respetar el título del texto fuente.
  - Se mantuvo el paralelismo entre «fue nombrado» y «su nombre», que es central para la estructura del versículo.
  - La nota de pie b marca la literalidad del título divino y su efecto de extrañeza en español, en línea con el POB inglés.
