    text: Or 'was called.' The passive verb can denote designation or naming; 'was named' is chosen because the next clause repeats 'his name.'
    reason: lexical_alternative
  - marker: b
    text: '''Head of Days'' is a literal rendering of a divine title in the Parables. It is kept rather than replaced with a smoother traditional equivalent so the imagery remains visible.'
