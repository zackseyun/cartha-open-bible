review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del ge’ez: marcador temporal (''en el día de''), posesivo (''su''), descanso/reposo, futuro existencial-eventivo, y alcance cósmico (''sobre la tierra''). Conserva además la ambigüedad teológica del ''reposo''. Sin embargo, una nota al pie introduce inglés (''trouble''), lo que no es apropiado en una edición española, y conviene ajustar la redacción para ofrecer solo alternativas españolas fieles al expediente inglés.'
  spanish_quality_summary: La frase principal es clara, natural y digna en español bíblico contemporáneo. 'Y en el día de su aflicción, el reposo vendrá sobre la tierra' se lee bien. El principal problema de calidad está en la nota [a], que mezcla español con inglés y por eso rompe la legibilidad editorial. El resto requiere solo pulido menor.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Aflicción' y 'reposo' son opciones válidas y fieles al expediente léxico inglés. 'Vendrá sobre la tierra' preserva bien la fuerza eventiva de ትከውን sin forzar un calco.
  issues:
  - severity: medium
    issue: La nota [a] incluye la palabra inglesa 'trouble'.
    rationale: Las notas de una edición española deben estar íntegramente en español. Además, el expediente inglés presenta 'trouble' como alternativa inglesa, pero en español debe verterse como 'dificultad', 'angustia' o similar, no dejarse en inglés.
  - severity: low
    issue: La nota [a] puede ajustarse para reflejar mejor las alternativas españolas del matiz léxico.
    rationale: El inglés auditado dice 'affliction' o 'trouble' para 'distress'; en español conviene expresar las alternativas como 'tribulación' o 'dificultad/angustia', manteniendo la idea de presión o padecimiento sin anglicismo.
  revised_spanish_text: Y en el día de su aflicción[a], el reposo[b] vendrá sobre la tierra.
  revised_footnotes:
  - marker: a
    text: O ‘tribulación’ o ‘dificultad’ para el matiz de presión o padecimiento del término ge’ez; el alcance exacto no queda fijado por esta cláusula breve.
    reason: lexical_alternative
  - marker: b
    text: O ‘el reposo estará sobre la tierra’. El verbo también puede entenderse más literalmente como ‘será’ o ‘llegará a ser’.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que ya era fiel y natural, y solo se corrige la nota [a] para eliminar el anglicismo 'trouble' y ofrecer alternativas plenamente españolas acordes con la auditoría léxica inglesa.
