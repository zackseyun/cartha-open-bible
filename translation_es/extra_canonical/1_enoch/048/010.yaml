translation:
  language: es
  text: Y en el día de su aflicción[a], el reposo[b] vendrá sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tribulación’ o ‘trouble’ para el matiz de presión o dureza del término ge’ez; el alcance exacto no queda fijado por esta cláusula breve.
    reason: lexical_alternative
  - marker: b
    text: O ‘el reposo estará sobre la tierra’. El verbo también puede entenderse más literalmente como ‘será’ o ‘llegará a ser’.
    reason: lexical_alternative
lexical_decisions:
- source_word: በዕለተ
  english_pob_choice: on the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - en el tiempo de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión temporal conserva el marcador apocalíptico sin forzar un calco innecesario en español.
- source_word: ጻሕበ
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - aflicción
  - tribulación
  - trouble
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Aflicción’ reproduce el matiz de dureza o presión señalado por la auditoría inglesa y suena natural en español bíblico contemporáneo.
- source_word: ዚአሆሙ
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El posesivo español transmite la referencia genitiva al grupo mencionado en el contexto.
- source_word: ዕረፍት
  english_pob_choice: rest
  chosen_spanish: reposo
  alternatives_spanish:
  - reposo
  - descanso
  - alivio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Reposo’ conserva el sentido básico de cesación/resto y funciona bien en un registro elevado; deja abierta la ambigüedad entre quietud, alivio o paz.
- source_word: ትከውን
  english_pob_choice: shall come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá
  - será
  - llegará a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etíope expresa ser/llegar a ser; ‘vendrá’ da una futura aparición eventiva sin alejarse del valor existencial del original.
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - por toda la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Sobre la tierra’ mantiene el alcance cósmico y el tono solemne del original apocalíptico.
theological_decisions:
- issue: Alcance y destinatarios del reposo
  english_pob_reading: A general apocalyptic rest coming upon the earth
  chosen_spanish_reading: Un reposo apocalíptico general que llega sobre la tierra
  alternative_spanish_readings:
  - alivio específico para los justos
  - cese después del juicio
  - paz sobre la tierra
  rationale: El verso es demasiado breve para precisar beneficiarios o efecto exacto; la traducción conserva la ambigüedad en lugar de resolverla.
  doctrine_reference: Preservar la tensión teológica en vez de decidirla por adelantado.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió ‘distress’ por ‘affliction’; por eso la traducción usa ‘aflicción’ para alinearse con la decisión revisada y mantener la estructura breve del verso.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ o formulaciones tradicionales no atestiguadas porque el texto no contiene el nombre divino.
  - ‘Reposo’ se eligió en vez de ‘paz’ para no resolver la ambigüedad del sustantivo etíope.
  - Los corchetes de notas están anclados en el texto exactamente donde corresponden.
