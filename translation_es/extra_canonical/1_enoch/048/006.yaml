translation:
  language: es
  text: Por esta razón, fue escogido y ocultado[a] delante de él[b], antes de que fuera creado el mundo, y para siempre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escondido»; el ge'ez admite un matiz de ocultamiento o reserva deliberada.
    reason: lexical_alternative
  - marker: b
    text: La frase puede leerse también como «en su presencia»; se conserva aquí el valor más literal de «delante de él».
    reason: lexical_alternative
  - marker: c
    text: 'También: «hasta la eternidad» o «hasta el siglo / la era», según el matiz de ለዓለም.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በእንተዝ
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por esto
  - Por eso
  - Entonces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa con naturalidad en español el valor causal o explicativo del ge'ez sin perder la relación con lo dicho antes.
- source_word: ኅሩየ
  english_pob_choice: chosen
  chosen_spanish: escogido
  alternatives_spanish:
  - elegido
  - seleccionado
  - escogido por Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogido» conserva el sentido de selección divina o deliberada con un registro claro y bíblico, sin cargarlo con un tecnicismo doctrinal adicional.
- source_word: ወኅቡአ
  english_pob_choice: and hidden
  chosen_spanish: y ocultado
  alternatives_spanish:
  - y escondido
  - y mantenido oculto
  - y velado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ocultado» mantiene la idea de reserva deliberada; en español suena más formal que «escondido» y preserva el tono apocalíptico.
- source_word: በቅድሜሁ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  - frente a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase ge'ez es relacional y espacial; «delante de él» conserva esa proximidad sin convertirla en una paráfrasis interpretativa.
- source_word: ዘእንበለ ይትፈጠር ዓለም
  english_pob_choice: before the world was created
  chosen_spanish: antes de que fuera creado el mundo
  alternatives_spanish:
  - antes de que el mundo fuese creado
  - antes de la creación del mundo
  - antes de que el mundo llegara a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción deja intacta la prioridad temporal precreacional. Se eligió una pasiva natural en español para no forzar la sintaxis.
- source_word: ወእስከ ለዓለም
  english_pob_choice: and forever
  chosen_spanish: y para siempre
  alternatives_spanish:
  - y hasta la eternidad
  - y por los siglos
  - y por siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Para siempre» es la forma más idiomática de expresar la duración indefinida y continua que el ge'ez comunica al cierre.
theological_decisions:
- issue: Cómo expresar la relación de በቅድሜሁ sin resolverla interpretativamente
  english_pob_reading: '''before him'' preserves the Ge''ez relational wording; the referent is most naturally God, but the phrase should not be overinterpreted.'
  chosen_spanish_reading: «delante de él» mantiene la relación espacial-personal sin fijar más de lo que el texto dice.
  alternative_spanish_readings:
  - en su presencia
  - ante Dios
  - delante de Dios
  rationale: El texto sostiene una tensión apocalíptica entre proximidad personal y reserva. «Delante de él» deja abierta esa relación sin sustituirla por una explicación teológica posterior.
  doctrine_reference: Preservar la tensión literaria y no sobrearmonizar con fórmulas cristológicas o dogmáticas posteriores.
- issue: Cómo reflejar la afirmación precreacional sin importar terminología doctrinal posterior
  english_pob_reading: 'Retain the local apocalyptic wording: ''chosen and hidden before him before the world was created, and forever'''
  chosen_spanish_reading: Conservar la secuencia «escogido y ocultado... antes de que fuera creado el mundo, y para siempre».
  alternative_spanish_readings:
  - preordenado desde la eternidad
  - preexistente con Dios
  - destinado desde antes de la creación
  rationale: La frase afirma prioridad antes de la creación y permanencia futura, pero no obliga a introducir lenguaje técnico ajeno al verso. La traducción conserva esa afirmación en su marco literario.
  doctrine_reference: Preserve theological tension rather than resolve it; do not over-harmonize with later Christian usage.
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail, que corrigió la secuencia inglesa para volver más literal 'before him'; en español se reflejó esa literalidad con «delante de él», sin convertirla en una paráfrasis explicativa. También se mantuvo la prioridad temporal precreacional y el cierre durativo sin añadir fórmulas doctrinales no explícitas en el ge'ez.
  spanish_consistency_notes:
  - Se usó «escogido» para ኅሩየ, alineado con el valor electivo del texto y con un español bíblico claro.
  - Se prefirió «ocultado» para ወኅቡአ, evitando suavizar el sentido de reserva o ocultamiento.
  - Se evitó «SEÑOR» o «Cristo» porque este versículo no los exige y el texto fuente no los presenta explícitamente.
  - «Mundo» se mantuvo en el sentido temporal de la cláusula de creación, sin convertirlo en «edad» en el texto principal, aunque esa alternativa se reconoce en nota.
