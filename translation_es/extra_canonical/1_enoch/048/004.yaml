translation:
  language: es
  text: Él será un bastón para los justos, para que se apoyen en él y no caigan; y será la luz[a] de las naciones, y será esperanza para los angustiados[b] de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una luz para las naciones'. La frase ge'ez puede entenderse de cualquiera de las dos maneras; el texto principal conserva la forma compacta de la construcción.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: ''para los que sufren en el corazón'' o ''para los de corazón afligido''. La expresión ge''ez apunta a aflicción interior más que a una enfermedad física solamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በትረ
  english_pob_choice: staff
  chosen_spanish: bastón
  alternatives_spanish:
  - vara
  - cayado
  - apoyo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de sostén para que no caigan, 'bastón' comunica bien el objeto de apoyo sin sugerir necesariamente realeza como podría hacerlo 'cetro'. 'Vara' o 'cayado' son posibles, pero 'bastón' suena natural y conserva la imagen concreta de soporte.
- source_word: ለጻድቃን
  english_pob_choice: for the righteous
  chosen_spanish: para los justos
  alternatives_spanish:
  - para los rectos
  - para los justos y rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Justos'' es la forma más natural y estable en español para este grupo humano en contexto apocalíptico. ''Rectos'' sería posible, pero menos habitual aquí.'
- source_word: ይትመረጐዙ
  english_pob_choice: may lean on him
  chosen_spanish: se apoyen en él
  alternatives_spanish:
  - se reclinen en él
  - descansen sobre él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es de apoyo físico-metafórico. 'Se apoyen en él' mantiene la concreción del texto y suena natural en español. 'Apoyarse en' además prepara bien la continuación 'y no caigan'.
- source_word: ወኢይደቁ
  english_pob_choice: and not fall
  chosen_spanish: y no caigan
  alternatives_spanish:
  - y no tropiecen
  - y no se derrumben
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con la imagen del bastón, 'caigan' preserva la continuidad del apoyo y la falta de caída. 'Tropiecen' debilita la metáfora, y 'se derrumben' sería demasiado fuerte.
- source_word: ብርሃነ አሕዛብ
  english_pob_choice: the light of the nations
  chosen_spanish: la luz de las naciones
  alternatives_spanish:
  - una luz para las naciones
  - la luz de los gentiles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción genitiva se refleja mejor con 'la luz de las naciones'. Se evita 'gentiles' porque el alcance del pasaje es más amplio y cósmico, no una oposición intrajudía.
- source_word: ተስፋ
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - espera
  - confianza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Esperanza'' expresa bien la fuerza pastoral y escatológica del término, y es el equivalente más natural en español.'
- source_word: ለእለ የሐምሙ በልቦሙ
  english_pob_choice: for those who are troubled in their heart
  chosen_spanish: para los que están turbados[a] en el corazón
  alternatives_spanish:
  - para los que sufren en su corazón
  - para los que están enfermos en su corazón
  - para los de corazón afligido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión apunta a aflicción interior, no solo a enfermedad física. 'Turbados en el corazón' conserva el lenguaje antropológico y la tensión semántica del original. Se añade la nota para explicitar que el giro puede entenderse también como sufrimiento interior.
theological_decisions:
- issue: Referente del pronombre repetido 'él'
  english_pob_reading: Render with personal 'he' throughout, referring back to the Elect One / Son of Man figure in the immediate context.
  chosen_spanish_reading: Mantener 'él' como referente personal único de la figura exaltada del contexto inmediato.
  alternative_spanish_readings:
  - este
  - aquél
  - la figura
  rationale: El texto ge'ez usa una forma demostrativa/pronominal repetida, pero el contexto inmediato identifica a un personaje singular exaltado. En español, 'él' preserva mejor la referencia personal y la coherencia del pasaje.
  doctrine_reference: Preservar el sentido local del pasaje sin imponer formulaciones doctrinales posteriores.
- issue: La expresión final sobre el corazón
  english_pob_reading: '''those who are troubled in heart'' points to inward distress rather than physical illness alone.'
  chosen_spanish_reading: '''los que están turbados en el corazón'' como aflicción interior.'
  alternative_spanish_readings:
  - los que sufren en el corazón
  - los de corazón enfermo
  - los angustiados de corazón
  rationale: La frase ge'ez puede incluir la idea de sufrimiento o enfermedad, pero con 'en el corazón' el sentido principal es interior. 'Turbados' conserva esa amplitud sin convertirla en diagnóstico médico.
  doctrine_reference: Mantener la ambigüedad semántica de la fuente entre aflicción, sufrimiento y posible enfermedad interior.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa estable en el punto clave: ''light of the nations'' y ''hope for those who are troubled in heart'', evitando el arrastre del borrador anterior con ''will become'' y la duplicación accidental final. En español se refleja el valor eschatológico con futuro simple (''será'') y se mantiene la cláusula final completa, sin expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene 'justos' como término técnico coherente con el imaginario sapiencial/apocalíptico.
  - Se evita 'Cristo' porque el texto no lo exige; la referencia se deja en la figura personal implícita del contexto.
  - '''Naciones'' se conserva frente a ''gentiles'' por el alcance colectivo del pasaje.'
  - La nota [a] está anclada exactamente en la frase ambigua 'turbados[a]' para cumplir la exigencia de correspondencia entre texto y nota.
