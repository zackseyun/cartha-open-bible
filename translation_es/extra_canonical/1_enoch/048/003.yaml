translation:
  language: es
  text: Y antes de que fueran creados el sol y las señales, antes de que fueran hechas las estrellas del cielo, su nombre fue llamado ante[a] el Señor de los Espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en presencia del Señor de los Espíritus». El ge'ez puede expresar no solo posición «ante» alguien, sino también una comparecencia cortesana en su presencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዘእንበለ
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  - previo a que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta construcción temporal, el valor es claramente anterioridad. «Antes de que» transmite con naturalidad la relación temporal repetida en el verso sin introducir un matiz privativo como «sin».
- source_word: ትትፈጠር
  english_pob_choice: was created
  chosen_spanish: fueran creados
  alternatives_spanish:
  - fueron creados
  - eran creados
  - llegaran a ser creados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez expresa pasiva de creación. En español, el subjuntivo en la cláusula subordinada temporal conserva la anterioridad respecto de la acción principal y mantiene el sentido de creación formal del texto.
- source_word: ፀሐይ
  english_pob_choice: sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término cosmológico directo y natural en español.
- source_word: ታእምር
  english_pob_choice: signs
  chosen_spanish: las señales
  alternatives_spanish:
  - los signos
  - los portentos
  - las marcas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Señales» conserva el campo semántico de signos celestes sin restringirlo a una lectura técnica astronómica. En español bíblico resulta claro y publicable, aunque «signos» sigue siendo una alternativa viable.
- source_word: ይትገበሩ
  english_pob_choice: were made
  chosen_spanish: fueran hechos
  alternatives_spanish:
  - fueron hechos
  - fueran establecidos
  - fueran formados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva encaja con la serie paralela de actos creacionales. «Hechos» mantiene la pasiva sin añadir matices más específicos que el ge'ez no exige.
- source_word: ከዋክብተ ሰማይ
  english_pob_choice: the stars of heaven
  chosen_spanish: los astros del cielo
  alternatives_spanish:
  - las estrellas del cielo
  - los astros celestiales
  - las estrellas celestes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Astros» preserva un registro elevado y abarcativo; en un contexto cósmico y apocalíptico evita reducir el término a una sola especie astral, aunque «estrellas del cielo» sigue siendo una alternativa literal aceptable.
- source_word: ስሙ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El posesivo singular masculino se refiere al personaje implícito en el contexto inmediato. «Su nombre» evita forzar una identificación explícita en el verso mismo.
- source_word: ተጸውዐ
  english_pob_choice: was called
  chosen_spanish: fue llamado
  alternatives_spanish:
  - fue nombrado
  - era llamado
  - fue invocado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Fue llamado» mantiene la acción verbal de designación sin añadir una connotación cultual que «invocado» introduciría indebidamente. «Fue nombrado» es posible, pero menos fiel al eco tradicional de la fórmula.
- source_word: በቅድመ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez permite una lectura de presencia/corte. Dado el título divino, «delante de» expresa bien la solemnidad de comparecencia y conserva la ambivalencia entre anterioridad y presencia ya señalada en el audit trail inglés.
- source_word: እግዚአ መናፈስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  - el Dueño de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título en su forma eénoca habitual, con mayúsculas reverenciales. «Espíritus» refleja el plural del título y el registro solemne del original.
theological_decisions:
- issue: Identidad del referente implícito de «su nombre»
  english_pob_reading: Retain the pronoun 'his' without inserting an interpretive title in the main text.
  chosen_spanish_reading: Mantener el pronombre posesivo implícito en «su nombre», sin añadir en el cuerpo del verso un título interpretativo como «el Elegido» o «el Hijo del Hombre».
  alternative_spanish_readings:
  - «el nombre del Elegido fue llamado...»
  - «el nombre del Hijo del Hombre fue llamado...»
  - «su nombre fue invocado...»
  rationale: El contexto literario apunta a una figura exaltada, pero el verso mismo no la nombra. Mantener la referencia implícita preserva la tensión teológica y evita armonizar en exceso el pasaje.
  doctrine_reference: Preservar la tensión textual sin sobreidentificar títulos controvertidos.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió la sintaxis del ge''ez: «el sol y las señales» forman el sujeto de la primera cláusula, y «los astros del cielo» pertenecen a la segunda cláusula temporal. La redacción española sigue esa división y evita desplazar «señales» al segundo segmento. El estado de revisión indica que no se requieren más cambios tras esa corrección.'
  spanish_consistency_notes:
  - Se mantiene «Señor de los Espíritus» como título fijo de 1 Enoc, en paralelo con el audit trail inglés.
  - Se evita «Señor» como sustituto enmascarado de un nombre divino; aquí el título proviene directamente del ge'ez.
  - «Señales» se conserva para ታእምር, aunque «signos» sería una alternativa cercana; el contexto astral justifica el matiz.
  - La secuencia temporal se conserva con dos cláusulas de anterioridad, respetando la corrección sintáctica del adjudicador.
  - El tono es formal y publicable, sin cargar el verso con identificaciones cristológicas no explicitadas por el texto.
