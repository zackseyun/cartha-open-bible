  - severity: medium
    issue: La nota [c] no preserva la evidencia inglesa útil y resulta redundante.
    rationale: La nota inglesa c documenta una traducción anterior de toda la secuencia («before the sun was created... signs of the heaven's stars...»). En español, la nota actual solo repite casi literalmente la frase principal y no añade información textual relevante.
  - severity: low
    issue: «Astros del cielo» es menos preciso que «estrellas del cielo».
    rationale: El ge'ez ከዋክብተ ሰማይ se refiere específicamente a las estrellas del cielo. «Astros» es publicable, pero ensancha innecesariamente el referente.
  revised_spanish_text: Y antes de que fueran creados el sol y las señales, antes de que fueran hechas las estrellas del cielo, su nombre fue llamado ante[a] el Señor de los Espíritus.
