    reason: lexical_alternative
  - marker: b
    text: El texto ge'ez presenta una expresión difícil en torno a «alrededor de ella», con una forma repetida en el testimonio OCR; el sentido probable es que muchas fuentes de sabiduría estaban situadas alrededor de la fuente de rectitud. O «manantiales de sabiduría».
    reason: textual_variant
  - marker: c
    text: O «los santos». Se prefiere «los consagrados» para evitar asociaciones eclesiásticas posteriores y preservar el sentido de «los santos/los apartados para Dios» en la tríada.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores pero importantes para alinear el español con el audit trail y con la filosofía del POB: «rectitud» refleja mejor ጽድቅ aquí; el pretérito simple mantiene el registro narrativo formal de la revisión final inglesa; «los consagrados» evita la carga eclesiástica de «los santos» mientras conserva el valor de ቅዱሳን; y se añadieron notas para preservar alternativas léxicas significativas ya documentadas.'
