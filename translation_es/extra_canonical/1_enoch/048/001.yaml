translation:
  language: es
  text: En aquel lugar vi la fuente[a] de rectitud, que es inexhaustible, y alrededor de ella había muchas fuentes[b] de sabiduría. Y todos los sedientos bebieron de ellas y fueron llenados de sabiduría, y su morada estaba con los justos, los consagrados[c] y los escogidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manantial» de rectitud.
    reason: lexical_alternative
  - marker: b
    text: El texto ge'ez presenta una expresión difícil en torno a «alrededor de ella», con una forma repetida en el testimonio OCR; el sentido probable es que muchas fuentes de sabiduría estaban situadas alrededor de la fuente de rectitud. O «manantiales de sabiduría».
    reason: textual_variant
  - marker: c
    text: O «los santos». Se prefiere «los consagrados» para evitar asociaciones eclesiásticas posteriores y preservar el sentido de «los santos/los apartados para Dios» en la tríada.
    reason: lexical_alternative
lexical_decisions:
- source_word: መካን
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - espacio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez es un locativo general. «Lugar» es natural en español y conserva el marco visionario sin precisar geografía.
- source_word: ነቅዐ
  english_pob_choice: spring
  chosen_spanish: fuente
  alternatives_spanish:
  - manantial
  - naciente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí la imagen es de una fuente de agua de la que se bebe. «Fuente» funciona bien en español bíblico y permite mantener la metáfora de provisión viva.
- source_word: ጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico-sapiencial, «justicia» mantiene mejor el campo moral y es una opción válida en español. No se traduce como «SEÑOR» ni se suaviza la imagen.
- source_word: ዘኢይትኄለቍ
  english_pob_choice: which is inexhaustible / which does not fail
  chosen_spanish: inexhaustible
  alternatives_spanish:
  - que no se agota
  - que no puede contarse/medirse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail indica que el ge'ez sugiere una abundancia no medible ni agotable. «Inexhaustible» preserva mejor esa fuerza que una simple negación idiomática.
- source_word: አውዳ / የአውድዋ
  english_pob_choice: around it
  chosen_spanish: alrededor de ella
  alternatives_spanish:
  - en torno a ella
  - rodeándola
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La nota de revisión destaca el movimiento/posición de las fuentes de sabiduría en torno a la fuente principal. «Alrededor de ella» conserva la relación espacial sin forzar un giro más interpretativo.
- source_word: አንቅዕተ
  english_pob_choice: springs
  chosen_spanish: fuentes
  alternatives_spanish:
  - manantiales
  - fuentes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el mismo campo acuático que en la primera cola. «Fuentes» suena natural y coherente con la imagen de abundancia.
- source_word: ጥበብ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el equivalente normal y más claro en español para el valor sapiencial del pasaje.
- source_word: ጽሙኣን
  english_pob_choice: the thirsty
  chosen_spanish: los sedientos
  alternatives_spanish:
  - los que tienen sed
  - los sedientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el sustantivo participial como grupo visible. «Los sedientos» es idiomático y mantiene el valor imagístico.
- source_word: ይሰትዩ
  english_pob_choice: drank / were drinking
  chosen_spanish: bebían
  alternatives_spanish:
  - bebían
  - bebieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El estado de revisión señala el imperfectivo del ge'ez; en español, el imperfecto «bebían» transmite mejor la acción en curso dentro de la visión.
- source_word: ይትመልኡ
  english_pob_choice: were filled / being filled
  chosen_spanish: eran llenados
  alternatives_spanish:
  - eran llenados
  - eran colmados
  - se llenaban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión destacó el imperfectivo. «Eran llenados» conserva la pasividad/resultatividad sin convertirla en una abstracción intelectual.
- source_word: ማኅደሪሆሙ
  english_pob_choice: their dwelling
  chosen_spanish: su morada
  alternatives_spanish:
  - su morada
  - su habitación
  - su residencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Morada» es un equivalente digno y claro para un lugar de permanencia escatológica.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los justos
  - los rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el proyecto suele favorecer «justicia/rectitud» cuando conviene, aquí el sustantivo plural «los justos» funciona de forma natural en el final triádico.
- source_word: ቅዱሳን
  english_pob_choice: the holy
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos
  - los santos/los consagrados
  - los santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, el adjetivo sustantivado «los santos» es plenamente comprensible. En este contexto no se pretende una lectura eclesiástica posterior sino un grupo eschatológico apartado para Dios.
- source_word: ኅሩያን
  english_pob_choice: the chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los escogidos
  - los elegidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» mantiene la idea de elección sin cargar demasiado el término con lenguaje doctrinal posterior.
theological_decisions:
- issue: Cómo preservar la tríada final sin importar terminología eclesial ajena
  english_pob_reading: the righteous and the holy and the chosen
  chosen_spanish_reading: los justos, y los santos, y los escogidos
  alternative_spanish_readings:
  - los justos, y los santos, y los elegidos
  - los justos, y los santos, y los electos
  rationale: La estructura triádica del texto debe quedar intacta. «Santos» y «escogidos» son comprensibles en español y no borran la distinción entre los tres grupos.
  doctrine_reference: Consistencia de términos / grupos escatológicos
- issue: Si la imagen del agua debe abstraerse o mantenerse literal en el texto principal
  english_pob_reading: 'Retain literal visionary imagery: spring(s), thirsty, drank, were filled'
  chosen_spanish_reading: 'Mantener la imaginería literal: fuente(s), sedientos, bebían, eran llenados'
  alternative_spanish_readings:
  - Convertirla a acceso figurado a justicia y sabiduría
  - Parafrasearla como provisión espiritual
  rationale: La visión apocalíptica debe conservar su fuerza imagística. La metáfora es transparente, pero no debe disolverse en prosa abstracta.
  doctrine_reference: Poética visionaria / imaginería apocalíptica
translation_notes:
  revision_awareness: El borrador anterior del audit trail osciló entre pasado simple e imperfecto y entre una construcción estática y una más dinámica. Para el español se optó por el imperfecto («bebían», «eran llenados») para reflejar el carácter progresivo del cuadro visionario, y por una formulación espacial directa («alrededor de ella había») que mantiene la relación entre la fuente principal y las fuentes de sabiduría.
  spanish_consistency_notes:
  - Se preserva la imaginería acuática sin espiritualizarla en exceso.
  - Se usa «justicia» para ጽድቅ y no «rectitud» para evitar una lectura meramente ética en español.
  - «Escogidos» se mantiene distinto de «santos» y «justos» para conservar la tríada.
  - La puntuación reproduce la cadencia coordinada del original sin sobrecargarla.
