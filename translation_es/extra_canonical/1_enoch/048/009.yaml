    reason: lexical_alternative
  - marker: c
    text: The final clause means that nothing remained of them—no trace or remnant could be found.
    reason: lexical_alternative
  - marker: d
    text: Or 'of the chosen ones I saw them'.
    reason: previous_rendering
  - marker: e
    text: Or 'and they burned before the face of the holy ones like straw in the fire; and like lead in water they sank before the face of the righteous, and no trace was found'.
