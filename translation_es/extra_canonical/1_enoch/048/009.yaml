translation:
  language: es
  text: Y en las manos de mis elegidos los entregaré[a], y como paja[b] en el fuego, así arderán delante del rostro de los santos; y como plomo en el agua, se hundirán delante del rostro de los justos, y no se hallará para ellos rastro alguno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión es literalmente «en las manos de mis elegidos»; puede implicar que son entregados a su poder en juicio.
    reason: lexical_alternative
  - marker: b
    text: 'O: «como rastrojo en el fuego».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no se hallará para ellos ni rastro ni vestigio», es decir, no quedará absolutamente nada de ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ውስተ እዴሆሙ
  english_pob_choice: in the hands of them
  chosen_spanish: en las manos de
  alternatives_spanish:
  - en poder de
  - en manos de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conservo la imagen espacial literal de «manos», siguiendo la decisión POB de no resolverla de entrada en una abstracción; en español, «en las manos de» mantiene esa fuerza y deja implícita la idea de entrega judicial.
- source_word: ኅሩያን
  english_pob_choice: chosen ones
  chosen_spanish: mis elegidos
  alternatives_spanish:
  - los elegidos
  - los escogidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Elegidos» preserva el valor de grupo apocalíptico sin cargarlo innecesariamente con terminología confesional posterior. Añadí «mis» porque el ge'ez y el texto revisado indican posesivo de primera persona.
- source_word: እወድዮሙ
  english_pob_choice: I will deliver them
  chosen_spanish: los entregaré
  alternatives_spanish:
  - los pondré en manos de
  - los entregaré al juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica entregar/castar a disposición de otro; «entregaré» es la forma más directa y fiel en español, sin agregar explicaciones que el texto no expresa.
- source_word: ከመ ሣዕር ውስተ እሳት
  english_pob_choice: like straw in the fire
  chosen_spanish: como paja en el fuego
  alternatives_spanish:
  - como rastrojo en el fuego
  - como paja en el incendio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Paja» comunica naturalmente el simulacro de destrucción rápida; mantengo el paralelo literal con el fuego, como en el POB inglés.
- source_word: ይውዕዩ
  english_pob_choice: they will burn
  chosen_spanish: arderán
  alternatives_spanish:
  - se quemarán
  - serán consumidos por el fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperfecto apunta a acción futura de juicio; «arderán» conserva la imagen sin añadir una consumación explícita que el verbo no exige por sí solo.
- source_word: እምቅድመ ገጸ ቅዱሳን
  english_pob_choice: before the face of the holy ones
  chosen_spanish: delante del rostro de los santos
  alternatives_spanish:
  - ante la presencia de los santos
  - delante de los santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Delante del rostro de» preserva la fórmula semítica; en español, «rostro» es más natural que una calca rígida, y «santos» traduce el grupo designado en el pasaje.
- source_word: ዐረር ውስተ ማይ
  english_pob_choice: lead in water
  chosen_spanish: plomo en el agua
  alternatives_spanish:
  - plomo en el agua
  - metal en el agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El metal específico intensifica la imagen de hundimiento; «plomo» es la equivalencia más clara y estable en español.
- source_word: ይሠጠሙ
  english_pob_choice: they sank
  chosen_spanish: se hundirán
  alternatives_spanish:
  - se sumergirán
  - se irán al fondo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se hundirán» reproduce el movimiento descendente y mantiene la simetría con «arderán» en la primera mitad del versículo.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español bíblico «los justos» es la forma más natural y adecuada para este grupo vindicado; conserva la fuerza judicial del término.
- source_word: አሰር
  english_pob_choice: trace
  chosen_spanish: rastro alguno
  alternatives_spanish:
  - vestigio alguno
  - señal alguna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Rastro» expresa bien la idea de resto o vestigio desaparecido. La construcción negativa «no se hallará... rastro alguno» recoge el sentido de ausencia total.
theological_decisions:
- issue: Identidad y función de los «elegidos»
  english_pob_reading: chosen ones as a distinct apocalyptic group, with the hands imagery left literal and the judicial implication implicit
  chosen_spanish_reading: mis elegidos como grupo apocalíptico distinto, con la imagen de las manos mantenida de modo literal
  alternative_spanish_readings:
  - los elegidos
  - mis escogidos
  rationale: El texto no obliga a armonizar este grupo con categorías posteriores. Mantener «mis elegidos» deja intacta la designación local y el matiz de posesión divina en la primera persona.
  doctrine_reference: Preservar tensión teológica y terminología del texto antes de cualquier sistematización.
- issue: «Santos» y «justos» como grupos en paralelo
  english_pob_reading: Retained as distinct group labels in the verse
  chosen_spanish_reading: «santos» y «justos» conservados como designaciones paralelas distintas
  alternative_spanish_readings:
  - tomarlos como equivalentes
  - identificar a los santos con ángeles y a los justos con humanos fieles
  rationale: El verso los pone en paralelo sin definirlos exhaustivamente. La traducción mantiene la distinción sin imponer una identificación ontológica no explicitada.
  doctrine_reference: Mantener términos locales del pasaje antes de armonizarlos en todo el corpus.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un error importante de lectura del ge''ez en el segmento inicial: la frase no significa «vi a mis elegidos», sino «los entregaré en manos de mis elegidos». También ajustó los verbos al valor futuro del pasaje («arderán», «se hundirán», «no se hallará»). La presente versión sigue esa corrección y conserva la secuencia futura de juicio.'
  spanish_consistency_notes:
  - Usé «Y» al inicio por estilo narrativo formal, manteniendo la continuidad de un enunciado profético.
  - Conservé «rostro de los santos / rostro de los justos» para reflejar la fórmula repetida del original y del audit trail inglés.
  - No usé «Cristo» ni «SEÑOR»; el pasaje no contiene esos términos.
  - Evité resolver «santos» y «justos» en una sola categoría, ya que el texto los distingue en paralelo.
