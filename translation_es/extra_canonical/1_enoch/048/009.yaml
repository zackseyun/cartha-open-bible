  language: en
  yaml_path: translation/extra_canonical/1_enoch/048/009.yaml
  text: And into the hands of my chosen ones I will deliver them[a], and like straw in the fire, so they will burn before the face of the holy ones; and like lead in water, they will sink before the face of the righteous[e][d][c][b], and no trace will be found for them.
