translation:
  language: es
  text: Y todos los que habitan sobre la tierra seca[a] caerán y se inclinarán delante de él, y alabarán, bendecirán y cantarán al Señor de los Espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «los que habitan sobre la tierra»; el ge'ez dice más literalmente «sobre la tierra seca».
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወድቁ
  english_pob_choice: shall fall down
  chosen_spanish: caerán
  alternatives_spanish:
  - se postrarán
  - caerán postrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa un gesto físico de abatimiento o sumisión. En español, «caerán» conserva la imagen corporal; la secuencia inmediata «se postrarán» completa el matiz reverencial sin cargar el primer verbo con una interpretación excesiva.
- source_word: ይሰግዱ
  english_pob_choice: bow
  chosen_spanish: se postrarán
  alternatives_spanish:
  - se inclinarán
  - adorarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El griego/etiópico subyacente apunta a inclinarse o prosternarse. En español, «postrarse» reproduce mejor el gesto corporal de reverencia que un simple «inclinarse», y evita convertirlo de antemano en una traducción interpretativa de «adorar».
- source_word: ቅድሜሁ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Delante de él» mantiene la relación espacial directa del original y resulta natural en español para una escena de homenaje.
- source_word: ኵሎሙ
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Todos» conserva el alcance universal del sujeto sin añadir elementos innecesarios.
- source_word: እለ የኃድሩ ዲበ የብስ
  english_pob_choice: who dwell upon the dry land
  chosen_spanish: los que habitan sobre la tierra seca
  alternatives_spanish:
  - los que habitan la tierra
  - los que moran sobre el suelo seco
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La frase ge''ez es más literal que «tierra» a secas: alude a la tierra seca/continente. «Tierra seca» preserva esa concreción sin forzar un tecnicismo en español.'
- source_word: ይሴብሕዎ
  english_pob_choice: shall praise him
  chosen_spanish: alabarán
  alternatives_spanish:
  - lo alabarán
  - glorificarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor doxológico del verbo queda bien recogido con «alabarán». Aquí el objeto directo queda absorbido por el contexto y por la coordinación final de la alabanza al Señor de los Espíritus.
- source_word: ይባርክዎ
  english_pob_choice: shall bless him
  chosen_spanish: bendecirán
  alternatives_spanish:
  - lo bendecirán
  - pronunciarán bendición sobre él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el lenguaje de bendición sin reducirlo a honor genérico. En español, «bendecirán» es la forma más natural y digna.
- source_word: ይዜምሩ
  english_pob_choice: shall sing
  chosen_spanish: cantarán
  alternatives_spanish:
  - entonarán
  - cantarán alabanzas
  lexicon: Dillmann, Lexicon Linguae Aethiopiae
  rationale: El verbo indica canto de alabanza; «cantarán» es la equivalencia más directa y natural.
- source_word: ለእግዚአ መናፈስት
  english_pob_choice: to the Lord of Spirits
  chosen_spanish: al Señor de los Espíritus
  alternatives_spanish:
  - al Señor de las huestes espirituales
  - al Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título fijo de 1 Enoc en una forma española transparente. «Señor de los Espíritus» mantiene el registro apocalíptico y la repetición tradicional del título.
theological_decisions:
- issue: Relación entre el «él» de la postración y el destinatario final de la alabanza
  english_pob_reading: The repeated 'him' refers to the exalted figure of the immediate context, while the final clause 'to the Lord of Spirits' names God as the recipient of sung praise within the same scene.
  chosen_spanish_reading: Mantener el «él» de la postración como referente inmediato del personaje exaltado, sin cerrar la tensión, mientras el canto final se dirige explícitamente al Señor de los Espíritus.
  alternative_spanish_readings:
  - Todo el versículo se refiere sin distinción a una sola persona divina
  - El cambio final identifica plenamente al mismo referente del 'él'
  rationale: El texto ge'ez y la decisión inglesa conservan una tensión referencial real. El español debe dejarla visible, no resolverla por armonización. Por eso se traduce con un pronombre claro para la reverencia y una clausula final explícita para el título divino, sin explicar más de lo que el verso dice.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó pronombres objeto repetidos con los verbos coordinados para hacer más natural la fluidez. En español se adopta una solución igualmente fluida: se conservan los verbos de alabanza en coordinación y se deja claro su destino mediante el título final, sin repetir pronombres innecesarios.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma predeterminada para el nombre divino solo cuando aparezca explícitamente; aquí el título presente es «Señor de los Espíritus», por lo que se respeta esa formulación.
  - Se mantuvo «Espíritus» con mayúscula inicial por tratarse de un título divino fijado.
  - Se evitó «adorarán» para no convertir de antemano la reverencia corporal en una interpretación más amplia que el verbo no exige.
