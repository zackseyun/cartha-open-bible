review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del ge''ez y del POB inglés: mantiene la doble acción corporal de sumisión, la referencia pronominal «delante de él» y la cláusula final «al Señor de los Espíritus», preservando la tensión teológica documentada. También conserva correctamente la alternativa léxica sobre «tierra seca».'
  spanish_quality_summary: El texto es claro y digno, pero «se postrarán» sobredetermina el segundo verbo, donde el POB inglés eligió «bow» para mantener explícita la imagen corporal sin intensificarla a prosternación completa. Además, en español la secuencia «caerán y se inclinarán» suena más natural y distingue mejor los dos verbos. El resto del verso fluye bien.
  glossary_alignment: 'No hay conflicto con los términos de proyecto salvo el título divino: en este corpus y según el rastro inglés, «Lord of Spirits» debe conservarse como título fijo. «Señor de los Espíritus» es aceptable aquí. No aplica la preferencia de «Yahvé» porque el original no contiene el nombre divino. La nota léxica sobre «tierra seca» está bien preservada.'
  issues:
  - severity: medium
    issue: «se postrarán» intensifica demasiado el valor de ይሰግዱ
    rationale: La decisión auditada en inglés escogió «bow» en vez de «worship» o una prosternación más fuerte para no sobreinterpretar el gesto. En español, «se inclinarán» conserva mejor ese grado de reverencia corporal y deja que «caerán» exprese la otra mitad de la acción.
  - severity: low
    issue: Puntuación con punto y coma tras la nota anclada
    rationale: No es incorrecta, pero la revisión inglesa ya suavizó la puntuación con coma para mejor fluidez. En español también resulta más natural una coma en esta coordinación extensa.
  revised_spanish_text: Y todos los que habitan sobre la tierra seca[a] caerán y se inclinarán delante de él, y alabarán, bendecirán y cantarán al Señor de los Espíritus.
