- from: Y todos los que habitan sobre la tierra seca caerán y se postrarán delante de él[a]; y alabarán, bendecirán y cantarán al Señor de los Espíritus.
  to: Y todos los que habitan sobre la tierra seca[a] caerán y se inclinarán delante de él, y alabarán, bendecirán y cantarán al Señor de los Espíritus.
