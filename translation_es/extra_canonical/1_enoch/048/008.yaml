review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del ge''ez auditado: marco temporal escatológico, reyes/poderosos como grupo juzgado, causalidad por sus obras, y la imposibilidad de salvarse. Sin embargo, la frase ''poseen la tierra seca'' suena poco natural y puede inducir una lectura física extraña en español; el inglés POB preservó ''dry land'' con nota precisamente porque es literal pero potencialmente opaco. Conviene conservar la literalidad con una nota aclaratoria, como en el audit trail.'
  spanish_quality_summary: El texto es claro y digno, pero 'tierra seca' resulta rígido y algo antinatural en español bíblico corriente. 'Tierra firme' comunica mejor la imagen literal de 'dry land' sin perder concreción. El resto del verso es legible y fiel. La sintaxis general funciona bien.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Los poderosos'', ''obras de sus manos'' y ''no se salvarán a sí mismos'' están bien alineados. La principal mejora es estilístico-lexical: representar የብስ de forma literal pero idiomática en español, idealmente con nota.'
  issues:
  - severity: medium
    issue: '''la tierra seca'' es demasiado calcado y poco idiomático en español'
    rationale: Aunque literal, en español suena torpe y puede sugerir simplemente suelo sin humedad. 'Tierra firme' preserva mejor el contraste de 'dry land' y es más natural para lectores hispanos.
  - severity: medium
    issue: Falta una nota para la expresión literal equivalente a 'the dry land'
    rationale: El English POB documenta explícitamente que la expresión es literal y posiblemente significa la tierra habitada bajo dominio humano. En español, esta aclaración ayuda aún más debido a la posible rareza de la frase.
  revised_spanish_text: En aquellos días, los rostros de los reyes de la tierra y de los poderosos que poseen la tierra firme[a] serán humillados, a causa de las obras de sus manos; porque en el día de su angustia y aflicción no se salvarán a sí mismos.
  revised_footnotes:
  - marker: a
    text: '''La tierra firme'' es literal; también puede referirse simplemente a la tierra habitada o al territorio bajo dominio humano.'
    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente la expresión de የብስ para que conserve la literalidad de 'dry land' en un español más natural, y se añade la nota que el audit trail inglés ya consideró importante para evitar ambigüedad innecesaria.
