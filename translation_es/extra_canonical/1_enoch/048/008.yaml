revisions:
- from: En aquellos días, los rostros de los reyes de la tierra y de los poderosos que poseen la tierra seca serán humillados, a causa de las obras de sus manos; porque en el día de su angustia y aflicción no se salvarán a sí mismos.
  to: En aquellos días, los rostros de los reyes de la tierra y de los poderosos que poseen la tierra firme[a] serán humillados, a causa de las obras de sus manos; porque en el día de su angustia y aflicción no se salvarán a sí mismos.
  rationale: Se ajusta únicamente la expresión de የብስ para que conserve la literalidad de 'dry land' en un español más natural, y se añade la nota que el audit trail inglés ya consideró importante para evitar ambigüedad innecesaria.
