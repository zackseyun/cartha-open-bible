base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/048/008.yaml
  text: In those days the faces of the kings of the earth and the mighty who possess the dry land shall be humbled[a], because of the works of their hands; for on the day of their distress and affliction[d][c][b], they will not save themselves.
  footnotes:
  - marker: a
    text: Or possibly, 'their faces shall be cast down—the kings of the earth and the mighty.' The Ge'ez wording is somewhat compressed, and the relation of 'humble/lowly of face' to the following nouns is not fully certain.
    reason: alternative_reading
  - marker: b
    text: '''The dry land'' is literal. It may simply mean the inhabited earth/land under human rule.'
    reason: lexical_alternative
  - marker: c
    text: '''Works of their hands'' may carry an echo of self-made power or even idols, but the wording is left broad in the main text.'
    reason: cultural_note
  - marker: d
    text: Or 'the humble of face shall be put to shame, the kings of the earth and the mighty who possess the dry land'.
    reason: previous_rendering
