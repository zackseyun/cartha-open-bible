translation:
  language: es
  text: En aquellos días, los rostros de los reyes de la tierra y de los poderosos que poseen la tierra firme[a] serán humillados, a causa de las obras de sus manos; porque en el día de su angustia y aflicción no se salvarán a sí mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''La tierra firme'' es literal; también puede referirse simplemente a la tierra habitada o al territorio bajo dominio humano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በዝንቱ መዋዕል
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En ese tiempo
  - En esos días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula apocalíptica temporal estándar. 'En aquellos días' conserva el tono de inicio escatológico sin sonar arcaico.
- source_word: ትሑታነ ገጽ / ይከውኑ
  english_pob_choice: the faces ... shall be humbled
  chosen_spanish: los rostros ... serán humillados
  alternatives_spanish:
  - se abatirán sus rostros
  - quedarán humillados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada indica que el sujeto explícito son los reyes y poderosos y que la predicación recae sobre sus rostros/semblantes. 'Rostros' conserva el idiomatismo honor/vergüenza y 'serán humillados' refleja el resultado de abatimiento/disgracia sin suavizarlo.
- source_word: ነገሥተ ምድር
  english_pob_choice: the kings of the earth
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes de la tierra
  - los reyes del mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresión apocalíptica estable; 'tierra' preserva el alcance cósmico y político mejor que 'mundo'.
- source_word: ጽኑዓን
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los poderosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí 'los poderosos' resulta natural en español y conserva el paralelismo con 'reyes'.
- source_word: እለ ይእኅዝዋ ለየብስ
  english_pob_choice: who possess the dry land
  chosen_spanish: que poseen la tierra seca
  alternatives_spanish:
  - que poseen la tierra seca
  - que poseen la tierra
  - que dominan la tierra seca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la concreción de 'tierra seca' que el audit trail considera literal. En español, 'poseen' expresa la relación de tenencia sin añadir violencia de 'se apoderan'.
- source_word: በእንተ ምግባረ እደዊሆሙ
  english_pob_choice: because of the works of their hands
  chosen_spanish: a causa de las obras de sus manos
  alternatives_spanish:
  - por las obras de sus manos
  - a causa de lo que hicieron sus manos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reproduce el idiomatismo bíblico y deja abierta la posible resonancia de fabricación/poder autoconstruido sin especificarla de más.
- source_word: በዕለተ ጻዕቆሙ ወጻሕቦሙ
  english_pob_choice: on the day of their distress and affliction
  chosen_spanish: en el día de su angustia y aflicción
  alternatives_spanish:
  - en el día de su tribulación y opresión
  - en el día de su angustia y aflicción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el paralelismo de dos sustantivos de sufrimiento y conserva un registro bíblico claro y comprensible.
- source_word: ኢይድኅኑ ርእሶሙ
  english_pob_choice: they will not save themselves
  chosen_spanish: no se salvarán a sí mismos
  alternatives_spanish:
  - no se rescatarán a sí mismos
  - no se librarán por sí mismos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción reflexiva expresa bien la imposibilidad de auto-liberación en el juicio. 'Salvarse' respeta el valor del verbo sin importar una soteriología ajena al verso.
theological_decisions:
- issue: Relación entre 'los rostros' y 'los reyes/poderosos'
  english_pob_reading: The phrase describes the same judged group; their faces are humbled/downcast.
  chosen_spanish_reading: La frase describe a los reyes y poderosos como sujetos del abatimiento de su semblante, no a un grupo distinto.
  alternative_spanish_readings:
  - Los humildes de rostro serán avergonzados, junto con los reyes y poderosos
  - Los rostros de los reyes y poderosos quedarán abatidos
  rationale: La revisión textual apunta a una sintaxis donde el predicado se aplica a los gobernantes mismos. La traducción conserva la imagen facial de vergüenza/abatimiento sin convertirla en un sujeto separado.
  doctrine_reference: Preservar la tensión sintáctica del original y evitar resolverla con una paráfrasis interpretativa.
- issue: Alcance de 'obras de sus manos'
  english_pob_reading: Broad phrase that may echo idolatry or self-made power, but remains open.
  chosen_spanish_reading: La versión principal conserva la amplitud de la expresión sin especificar ídolos.
  alternative_spanish_readings:
  - por sus ídolos
  - por sus obras idólatras
  rationale: El testimonio no exige restringir la frase a idolatría, aunque esa resonancia puede estar presente. Mantenerla amplia respeta la evidencia y evita sobreinterpretación.
  doctrine_reference: Primacía de la fuente original sobre una inferencia devocional.
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente que corrige la lectura previa de 'shall become downcast of face' y reconoce a 'los reyes de la tierra y los poderosos' como sujeto explícito. También conserva la literalidad de 'tierra seca' y evita introducir notas no ancladas en el texto principal, para cumplir con la validación de marcadores.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene 'tierra seca' según la literalidad auditada del Ge'ez.
  - Se evita 'SEÑOR' y no se introduce terminología eclesiástica ajena al verso.
  - El tono es bíblico contemporáneo, no arcaizante.
