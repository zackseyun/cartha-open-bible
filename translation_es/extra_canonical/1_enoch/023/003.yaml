translation:
  language: es
  text: 'Y pregunté[a], diciendo[b]: «¿Qué es esto que no tiene descanso?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «esto» o «esta cosa»; el demostrativo ge'ez apunta al fenómeno que Henoc acaba de ver.
    reason: lexical_alternative
  - marker: b
    text: También puede rendirse «no tiene reposo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ተስእልኩ
  english_pob_choice: I asked
  chosen_spanish: pregunté
  alternatives_spanish:
  - inquirí
  - interrogué
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto de primera persona singular expresa una acción puntual de preguntar; «pregunté» comunica con naturalidad la forma directa del relato visionario sin perder el tono elevado.
- source_word: እንዘ እብል
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - mientras decía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción ge'ez introductoria de discurso directo se refleja de manera simple con «diciendo», que mantiene la función citativa sin añadir interpretación.
- source_word: ዝንቱ
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - esto mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo señala el fenómeno observado; «esto» preserva la deixis sin sobrecargar el español con un sustantivo explícito que el texto revisado en inglés decidió omitir.
- source_word: ምንት ውእቱ
  english_pob_choice: what is
  chosen_spanish: ¿qué es?
  alternatives_spanish:
  - ¿qué es ello?
  - ¿qué puede ser?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia interrogativa más la cópula se expresa de forma directa en español con «¿qué es?», manteniendo la sencillez y la inmediatez del original.
- source_word: ዘአልቦ ዕረፍተ
  english_pob_choice: that has no rest
  chosen_spanish: que no tiene descanso
  alternatives_spanish:
  - que no tiene reposo
  - que está sin descanso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ዕረፍተ» nombra descanso/reposo; «descanso» es la opción más natural en español y conserva la imagen de una realidad sin cese ni tregua.
theological_decisions:
- issue: Cómo rendir el valor de ዕረፍተ sin diluir la imagen apocalíptica
  english_pob_reading: '''Has no rest'' may also be rendered ''is without repose.'''
  chosen_spanish_reading: «no tiene descanso»
  alternative_spanish_readings:
  - «no tiene reposo»
  - «está sin descanso»
  rationale: Se conserva la tensión descriptiva del fenómeno observado, sin espiritualizarlo ni convertirlo en una afirmación doctrinal más amplia. «Descanso» comunica claramente la ausencia de cesación o alivio.
  doctrine_reference: Preservar la tensión del lenguaje original; primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que eliminó «thing» para hacer más natural el demostrativo; por eso el español usa «esto» y no añade un sustantivo explícito. La formulación final conserva el registro formal y la economía del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «descanso» como equivalente principal de ዕረፍተ, con «reposo» como alternativa nota a pie.
  - La puntuación reproduce la introducción de cita directa con dos puntos y comillas angulares, en estilo publicable para español.
