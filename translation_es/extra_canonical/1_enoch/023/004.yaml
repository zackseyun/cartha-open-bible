base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/023/004.yaml
  text: And at that time Raguel[a], one of the holy angels who was with me, answered me and said to me, “This course of fire which you saw toward the west[c][b], it is the fire that drives all the lights of heaven.”
  footnotes:
  - marker: a
    text: The Ge'ez wording around 'this spirit that leads astray' is difficult. The referent may also be understood as a wind or rushing force rather than a personal spirit.
