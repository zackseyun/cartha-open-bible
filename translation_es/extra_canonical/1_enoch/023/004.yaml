translation:
  language: es
  text: 'En aquel tiempo, Ragüel, uno de los santos ángeles que estaba conmigo, me respondió y me dijo: «Este trayecto de fuego que viste hacia el oeste[a] es el fuego que impulsa todas las luces del cielo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el camino del fuego del oeste». El etiópico deja una imagen espacial que también puede expresarse de manera más literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አውሥአኒ
  english_pob_choice: answered me
  chosen_spanish: me respondió
  alternatives_spanish:
  - me contestó
  - me habló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pide una respuesta dirigida al hablante, no solo un hablar genérico; en español, "me respondió" conserva bien el valor dialogal y visionario.
- source_word: ቅዱሳን መላእክት
  english_pob_choice: holy angels
  chosen_spanish: santos ángeles
  alternatives_spanish:
  - ángeles sagrados
  - ángeles santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Santos ángeles" mantiene el designativo apocalíptico sin volverlo una fórmula eclesiástica posterior; además sigue de cerca la estructura del original.'
- source_word: ዘርኢከ
  english_pob_choice: which you saw
  chosen_spanish: que viste
  alternatives_spanish:
  - que has visto
  - que contemplaste
  lexicon: Revisión comparada del audit trail inglés y la corrección del revisor
  rationale: 'La revisión indicada corrige el sentido: no es "espíritu", sino una relativa de segundo singular: "que viste". En español se expresa de forma natural con el imperfecto simple en una visión narrada.'
- source_word: ሩጸተ
  english_pob_choice: course
  chosen_spanish: curso
  alternatives_spanish:
  - trayecto
  - recorrido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Curso" reproduce la idea de movimiento o trayectoria en un contexto cósmico y mantiene la rareza apocalíptica del pasaje sin exagerarla.'
- source_word: ተወዝኒ
  english_pob_choice: goes out
  chosen_spanish: impulsa
  alternatives_spanish:
  - sale
  - se extiende
  - va
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A la luz de la revisión, la frase entera habla del fuego que actúa sobre las luces celestes; "impulsa" expresa adecuadamente la acción de causar movimiento de manera enérgica y natural en español.
- source_word: መንገለ ዐረብ እሳት
  english_pob_choice: by the path of the fire of the west
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - por el camino del fuego del oeste
  - por la senda del fuego occidental
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail inglés conserva la referencia al oeste como ubicación visionaria. En español, aquí se opta por una forma más fluida y fiel al sentido espacial básico, sin introducir una perífrasis que el texto revisado no exige.
- source_word: ይሰድድ
  english_pob_choice: drives
  chosen_spanish: impulsa
  alternatives_spanish:
  - empuja
  - arroja
  - conduce
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Impulsa" comunica fuerza motriz y encaja con el veredicto revisado de que el sujeto es el fuego que actúa sobre los astros; evita el matiz más mecánico de "empuja".'
- source_word: ብርሃናተ ሰማይ
  english_pob_choice: the lights of heaven
  chosen_spanish: las luces del cielo
  alternatives_spanish:
  - los luminares del cielo
  - las luminarias del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Luces del cielo" es claro, digno y suficientemente literal; conserva el registro cósmico de la expresión sin forzar un tecnicismo innecesario.'
theological_decisions:
- issue: Naturaleza del agente descrito en el verso
  english_pob_reading: The earlier English draft treated the phrase as 'this spirit that leads astray,' but the revision corrects it to 'this course of fire which you saw.'
  chosen_spanish_reading: Este curso de fuego que viste
  alternative_spanish_readings:
  - este espíritu que extravía
  - este viento de fuego
  rationale: La versión española sigue la corrección textual del revisor y no conserva la lectura errónea descartada. Se mantiene, no obstante, el carácter visionario y cósmico del pasaje sin racionalizarlo demasiado.
  doctrine_reference: Fidelidad textual; la decisión evita introducir una entidad espiritual no atestiguada por la corrección final.
translation_notes:
  revision_awareness: 'La traducción española sigue la revisión más reciente del audit trail: corrige la lectura anterior de ''espíritu que extravía'' y adopta el sentido de ''curso de fuego que viste''. También evita arrastrar al español la formulación descartada del borrador inglés anterior.'
  spanish_consistency_notes:
  - Se mantuvo "santos ángeles" para conservar el registro apocalíptico y evitar la sustitución por una fórmula litúrgica más interpretativa.
  - '"Luces del cielo" mantiene la imagen astral sin introducir un término técnico que el español no necesita en este contexto.'
  - Se preservó una sintaxis sobria y publicable, con puntuación española y nombre propio adaptado como Ragüel.
