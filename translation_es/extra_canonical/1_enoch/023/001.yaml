translation:
  language: es
  text: Y de allí fui a otro lugar[a], hacia el oeste[b], hasta los confines de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El etiópico indica un movimiento de salida desde el lugar anterior; «de allí» conserva esa referencia deíctica.
    reason: lexical_alternative
  - marker: b
    text: La lectura direccional correcta aquí es «oeste», según la revisión textual del audit trail; el inglés POB anterior había conservado una lectura errónea.
    reason: textual_variant
lexical_decisions:
- source_word: እምህየ
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma etiópica expresa un origen de movimiento desde un lugar previamente mencionado. «De allí» es natural en español y conserva el enlace deíctico sin añadir énfasis innecesario.
- source_word: ሖርኩ
  english_pob_choice: I went
  chosen_spanish: fui
  alternatives_spanish:
  - anduve
  - viajé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo describe un desplazamiento simple en pasado. «Fui» reproduce esa neutralidad mejor que opciones más literarias o interpretativas.
- source_word: ካልአ መካነ
  english_pob_choice: another place
  chosen_spanish: a otro lugar
  alternatives_spanish:
  - a otro sitio
  - a otro lugar distinto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión señala una localización diferente de la anterior. En español, «a otro lugar» es claro y fiel al sentido locativo.
- source_word: መንገለ ዓረብ
  english_pob_choice: toward the west
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - en dirección al oeste
  - occidente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indicada en el audit trail corrige la lectura direccional. «Hacia el oeste» conserva el valor direccional de la construcción y evita el error de la versión previa.
- source_word: እስከ አጽናፈ ምድር
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta los fines de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es una expresión apocalíptica de alcance cósmico/geográfico. «Confines de la tierra» preserva ese registro en español y suena más idiomático que una traducción demasiado literal.
theological_decisions:
- issue: Geografía visionaria y alcance cósmico
  english_pob_reading: to the ends of the earth
  chosen_spanish_reading: hasta los confines de la tierra
  alternative_spanish_readings:
  - hasta los extremos de la tierra
  - hasta el borde de la tierra
  rationale: Conviene mantener el lenguaje amplio de la visión. La expresión no debe reducirse a una geografía meramente local, porque el texto opera dentro del imaginario apocalíptico.
  doctrine_reference: Preservación de la imaginería apocalíptica del Libro de Enoc.
translation_notes:
  revision_awareness: 'El audit trail inglés registra una corrección importante: la dirección no es «este», sino «oeste». También conserva la imagen apocalíptica de los «ends of the earth», que en español se ha rendido como «los confines de la tierra».'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y bíblico, sin recurrir a mayúsculas litúrgicas para la dirección o para la expresión geográfica.
  - Se evita la traducción mecánica de la versión inglesa cuando el expediente textual etiópico exige una corrección direccional.
  - La puntuación refleja un relato de movimiento en una sola cláusula coordinada, acorde con el texto fuente.
