review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del geʽez: movimiento desde el lugar previo, traslado a otro lugar, dirección hacia el oeste según la corrección adjudicada, y alcance cósmico hasta los confines de la tierra. Sin embargo, la nota [a] no preserva la función del aparato inglés, que anotaba una alternativa léxica sobre «otro lugar», no una explicación de «de allí». La nota [b] tampoco corresponde idealmente al aparato auditado: en inglés se conservaron la historia de la lectura y la alternativa «toward the east», mientras que la nota española se centra en metacomentario del audit trail.'
  spanish_quality_summary: 'El español principal es claro, natural y digno: «Y de allí fui a otro lugar, hacia el oeste, hasta los confines de la tierra». La única reparación necesaria es alinear las notas con el significado y la razón documental, evitando una glosa editorial innecesaria y preservando mejor la alternativa relevante.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Confines de la tierra» preserva bien la imaginería apocalíptica. «Oeste» es la dirección correcta según la revisión adjudicada. El registro general es adecuado para una Biblia abierta en español.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «otro lugar» pero explica «de allí».
    rationale: Esto rompe la correspondencia entre marcador y palabra/frase anotada, y no refleja la nota inglesa sobre la posible fuerza de «another place / a second place».
  - severity: medium
    issue: La nota [b] usa metacomentario sobre el audit trail en vez de preservar la alternativa léxica documentada.
    rationale: El aparato inglés conserva la historia de una lectura alternativa («toward the east»). En español conviene presentar la alternativa al lector de forma limpia («O ‘hacia el este’») y, si se desea, dejar fuera la referencia editorial interna.
  revised_spanish_text: Y de allí fui a otro lugar[a], hacia el oeste[b], hasta los confines de la tierra.
  revised_footnotes:
  - marker: a
    text: O «un segundo lugar».
    reason: lexical_alternative
  - marker: b
    text: O «hacia el este».
    reason: previous_rendering
  revision_rationale: El texto principal no requiere cambio. Se revisan únicamente las notas para que coincidan con sus anclajes, preserven las alternativas significativas del aparato inglés y eviten comentario editorial interno innecesario.
