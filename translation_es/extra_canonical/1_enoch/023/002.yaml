  text: And I saw a fire that burned and flowed[a], and it did not rest or cease from its course by day or by night[c][b], but continued in the same way.
  footnotes:
  - marker: a
    text: 'The closing phrase is difficult. The Ge''ez appears to indicate continued action ''thus'' or ''in the same way''; alternatively, it may simply reinforce the description: ''but so it was.'''
