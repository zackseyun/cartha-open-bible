translation:
  language: es
  text: Y vi un fuego que ardía y fluía[a], y no descansaba ni cesaba de su curso[b] ni de día ni de noche, sino que continuaba de la misma manera[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fluía» sigue la revisión que corrige una lectura como «llameaba» o «ardía intensamente»; conserva la imagen de un fuego en movimiento continuo, que parece correr o fluir en vez de permanecer fijo.
    reason: lexical_alternative
  - marker: b
    text: «De su curso» puede entenderse también como «de su correr», «de su trayectoria» o «de su flujo». Se eligió «curso» por claridad y porque mantiene la idea de movimiento ininterrumpido.
    reason: lexical_alternative
  - marker: c
    text: 'La frase final es difícil en ge''ez. También puede entenderse de manera más breve: «sino que así era».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y miré
  - Y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula visionaria se expresa de modo natural en español con «vi», que conserva el testimonio directo de la visión sin recargar el estilo.
- source_word: እሳተ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - fuego
  - una llama
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El indefinido introduce un objeto de visión no previamente identificado; «un fuego» mantiene ese valor y suena idiomático en español.
- source_word: ዘይነድድ
  english_pob_choice: that burned
  chosen_spanish: que ardía
  alternatives_spanish:
  - que quemaba
  - ardiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo describe el estado activo del fuego; «ardía» conserva la acción continua sin volverlo una mera cualidad estática.
- source_word: ዘይረውፅ
  english_pob_choice: and flowed
  chosen_spanish: y fluía
  alternatives_spanish:
  - y corría
  - y se deslizaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa corrigió una lectura que hacía perder la imagen de movimiento; «fluía» comunica bien en español la acción continua y móvil del fuego, sin introducir una especificación excesiva como «corría».
- source_word: እንዘ ኢያዓርፍ
  english_pob_choice: and it did not rest
  chosen_spanish: y no descansaba
  alternatives_spanish:
  - y no reposaba
  - y no se detenía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «No descansaba» refleja la negación de reposo con naturalidad y mantiene el carácter imagístico del pasaje.
- source_word: ወኢይነትግ
  english_pob_choice: or cease
  chosen_spanish: ni cesaba
  alternatives_spanish:
  - ni se detenía
  - ni se apagaba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, la correlación «no... ni...» reproduce mejor la pareja negativa que un «o» literal; «cesaba» conserva la idea de interrupción o terminación sin precisar más de lo que da el texto.
- source_word: እምሩፀቱ
  english_pob_choice: from its course
  chosen_spanish: de su curso
  alternatives_spanish:
  - de su carrera
  - de su correr
  - de su flujo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Curso» es la opción más directa para la noción de movimiento continuo; además, conserva la relación léxica con la imagen de un fuego en movimiento.
- source_word: መዐልተ ወሌሊተ
  english_pob_choice: by day or by night
  chosen_spanish: ni de día ni de noche
  alternatives_spanish:
  - de día y de noche
  - sea de día o de noche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La estructura distributiva hebraizante/semítica se comunica de forma clara en español con «ni de día ni de noche», que mantiene la continuidad ininterrumpida.
- source_word: አላ ከማሁሙ
  english_pob_choice: but continued in the same way
  chosen_spanish: sino que continuaba de la misma manera
  alternatives_spanish:
  - pero seguía igual
  - sino que así seguía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El cierre es idiomático y algo difícil; «continuaba de la misma manera» preserva la idea de persistencia en el mismo estado sin forzar una precisión sintáctica no asegurada por el ge'ez.
translation_notes:
  revision_awareness: Esta redacción sigue la revisión más reciente del expediente, que corrigió la imagen de «blazed»/«ran» hacia «flowed» y mantuvo el final como una persistencia continua. La formulación española busca reflejar esa línea revisada sin perder la tensión imagística del original ge'ez.
  spanish_consistency_notes:
  - Se mantuvo «fuego» como imagen concreta y no se suavizó a una abstracción.
  - Se conservó la repetición negativa para reflejar la doble negación del original y la continuidad del movimiento.
  - Se eligió un español neutral y publicable, evitando arcaísmos innecesarios.
  - Los corchetes de nota aparecen solo donde el texto requiere una aclaración léxica significativa.
