  - marker: b
    text: The expression rendered 'from its course' may also be understood as 'from its rushing,' 'from its path,' or 'from its flow,' emphasizing the fire's unbroken movement.
    reason: lexical_alternative
  - marker: c
    text: Or 'And I saw a fire that burned and blazed, and it did not rest or cease from its course by day or by night, but kept on in the same way.'.
