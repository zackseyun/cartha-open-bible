  yaml_path: translation/extra_canonical/1_enoch/017/003.yaml
  text: And I saw the places of the lights and of the thunder[a], in the extremities, in the depth, where there was a bow of fire, and arrows and their quiver, and a sword of fire[d][c][b], and all the lightnings.
  footnotes:
  - marker: a
    text: The Ge'ez phrase rendered 'in the farthest depths' is difficult, literally involving 'extremity' and 'depth.' It refers to remote cosmic recesses rather than an ordinary earthly location.
    reason: lexical_alternative
  - marker: b
    text: The sequence 'bow ... arrows ... their quiver ... sword of fire' is preserved as weapon imagery in the vision, not paraphrased into a general storm description.
    reason: cultural_note
  - marker: c
    text: Or 'the storehouses'.
    reason: previous_rendering
  - marker: d
    text: Or 'in the farthest depths,'.
    reason: previous_rendering
