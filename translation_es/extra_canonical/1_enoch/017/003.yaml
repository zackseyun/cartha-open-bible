translation:
  language: es
  text: Y vi los lugares[a] de las luces y del trueno, en los confines, en la profundidad, donde había un arco de fuego, y flechas y su aljaba, y una espada de fuego, y todos los relámpagos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge’ez usa un término ordinario para ‘lugares’, no una palabra distinta para ‘tesorerías’ o ‘depósitos’. Aquí se conserva la referencia espacial sin convertirla en ‘almacenes’.
    reason: lexical_alternative
lexical_decisions:
- source_word: መካናተ
  english_pob_choice: places
  chosen_spanish: lugares
  alternatives_spanish:
  - sitios
  - moradas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge’ez es el plural de ‘lugar’, no ‘tesorerías’. Por eso en español conviene ‘lugares’, que conserva la elección léxica y evita introducir la idea de depósitos que el texto no expresa directamente.
- source_word: ብርሃናት
  english_pob_choice: lights
  chosen_spanish: luces
  alternatives_spanish:
  - lumbreras
  - astros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural se refiere a fenómenos o cuerpos luminosos en sentido amplio. ‘Luces’ es natural en español y mantiene la amplitud del término sin reducirlo de forma indebida a ‘relámpagos’.
- source_word: ነጐድጓድ
  english_pob_choice: thunder
  chosen_spanish: trueno
  alternatives_spanish:
  - truenos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, el singular colectivo ‘trueno’ funciona bien para representar el fenómeno como realidad cósmica, como hace el inglés auditado.
- source_word: አጽናፍ
  english_pob_choice: the extremities
  chosen_spanish: los extremos
  alternatives_spanish:
  - los confines
  - las extremidades
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge’ez apunta a los límites o extremos del espacio. ‘Los extremos’ preserva esa coordenada espacial sin sobreinterpretar.
- source_word: ዕመቃ
  english_pob_choice: depths
  chosen_spanish: la profundidad
  alternatives_spanish:
  - las profundidades
  - el abismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto distingue ‘extremos’ y ‘profundidad’. En español conviene mantener esa estructura con ‘en la profundidad’, que no añade la especificidad de ‘abismo’ y conserva la correspondencia con el original.
- source_word: ቀሥተ እሳት
  english_pob_choice: a bow of fire
  chosen_spanish: un arco de fuego
  alternatives_spanish:
  - un arco ígneo
  - un arco ardiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma literal ‘arco de fuego’ es clara y fiel. Se conserva la imaginería bélica/apocalíptica sin suavizarla.
- source_word: ሐጾ
  english_pob_choice: arrows
  chosen_spanish: flechas
  alternatives_spanish:
  - saetas
  - dardos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Flechas’ es el equivalente más transparente y mantiene la coherencia con el conjunto arco-flechas-aljaba.
- source_word: ምጕንጻቲሆሙ
  english_pob_choice: their quiver
  chosen_spanish: su aljaba
  alternatives_spanish:
  - su carcaj
  - su estuche para flechas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Aljaba’ es un término comprensible y tradicional para el contenedor de flechas; en español suena más natural que una calca técnica.
- source_word: ሰይፈ እሳት
  english_pob_choice: a sword of fire
  chosen_spanish: una espada de fuego
  alternatives_spanish:
  - una espada ardiente
  - una espada ígnea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión se mantiene casi de modo literal para preservar el fuerte simbolismo apocalíptico.
- source_word: መበርቅት ኵሉ
  english_pob_choice: all the lightnings
  chosen_spanish: todos los relámpagos
  alternatives_spanish:
  - todos los rayos
  - todas las centellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Relámpagos’ traduce bien el plural de fenómenos luminosos y evita confundirlos con el trueno, ya nombrado antes. ‘Todos’ conserva la idea de totalidad.
theological_decisions:
- issue: Naturaleza de los lugares cosmológicos
  english_pob_reading: places of the lights and of the thunder
  chosen_spanish_reading: lugares de las luces y del trueno
  alternative_spanish_readings:
  - depósitos de las luces y del trueno
  - moradas de las luces y del trueno
  rationale: El pasaje presenta una geografía cósmica visionaria sin especificar que sean almacenes. En español se mantiene la ambigüedad del ‘lugar’ y la ubicación remota, evitando añadir una interpretación que el ge’ez no exige.
  doctrine_reference: Conservar la imaginería apocalíptica sin ampliar indebidamente el sentido.
- issue: Secuencia bélica como imagen visionaria
  english_pob_reading: bow ... arrows ... their quiver ... sword of fire ... all the lightnings
  chosen_spanish_reading: arco de fuego, flechas, su aljaba, espada de fuego y todos los relámpagos
  alternative_spanish_readings:
  - arco ígneo, saetas, su carcaj, espada ígnea y todos los rayos
  rationale: La lista se conserva como inventario de imágenes, no como descripción meteorológica genérica. Se evita diluir la fuerza apocalíptica de los objetos armados y de los fenómenos de fuego.
  doctrine_reference: Preservar el carácter visionario y simbólico del texto.
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que corrigió la coordinación espacial (‘in the extremities, in the depth’) y mantuvo el orden de las imágenes armadas. La versión española sigue esa estructura y evita fusionar los complementos de lugar.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el original lo justifique explícitamente; en este versículo no aparece.
  - ‘Espada de fuego’ y ‘arco de fuego’ se mantienen literalmente para no suavizar la imaginería apocalíptica.
  - Se distingue ‘trueno’ de ‘relámpagos’ para no mezclar fenómenos distintos.
  - Se prefirió ‘aljaba’ por ser natural en español bíblico sin imponer una terminología eclesiástica rígida.
