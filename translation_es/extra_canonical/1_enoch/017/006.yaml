    text: 'La tradición textual revisada apoya la negación: «donde no anda carne alguna»; esto corrige la lectura anterior equivocada «donde toda carne camina / anda».'
    reason: textual_variant
  revision_rationale: Se propone una reparación menor para mejorar la naturalidad bíblica del español y alinear las notas con las decisiones auditadas más importantes. «No anda carne alguna» mantiene el semitismo, suena mejor en español que «ninguna carne camina», y las notas ahora preservan tanto la amplitud léxica de «carne» como la corrección textual de la negación.
