revisions:
- from: Y vi grandes ríos[a], y llegué hasta la gran oscuridad, y fui al lugar donde ninguna carne camina[b].
  to: Y vi grandes ríos, y llegué hasta la gran oscuridad, y fui al lugar donde no anda carne alguna[a][b].
  rationale: Se propone una reparación menor para mejorar la naturalidad bíblica del español y alinear las notas con las decisiones auditadas más importantes. «No anda carne alguna» mantiene el semitismo, suena mejor en español que «ninguna carne camina», y las notas ahora preservan tanto la amplitud léxica de «carne» como la corrección textual de la negación.
