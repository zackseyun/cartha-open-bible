translation:
  language: es
  text: Y vi grandes ríos, y llegué hasta la gran oscuridad, y fui al lugar donde no anda carne alguna[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Carne alguna» conserva la expresión semítica tradicional «toda carne», que puede referirse ampliamente a la humanidad o, más en general, a los seres vivientes.
    reason: lexical_alternative
  - marker: b
    text: 'La tradición textual revisada apoya la negación: «donde no anda carne alguna»; esto corrige la lectura anterior equivocada «donde toda carne camina / anda».'
    reason: textual_variant
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: and I saw
  chosen_spanish: y vi
  alternatives_spanish:
  - y miré
  - y contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo narrativo de visión en contexto de revelación se rinde de manera natural y directa con «vi», conservando la secuencia visionaria sin añadir matiz interpretativo.
- source_word: ዐበይተ
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - vastos
  - extensos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo expresa magnitud; «grandes» es claro en español y mantiene el tono apocalíptico sin sobrecargar el verso.
- source_word: አፍላገ
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - corrientes
  - arroyos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen apunta a cursos de agua de escala mayor; «ríos» conserva mejor la geografía cósmica que las alternativas más pequeñas o más genéricas.
- source_word: እስከ
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta donde
  - así como
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «llegué hasta» transmite adecuadamente el límite espacial del recorrido. La frase ya queda bien delimitada por el verbo de llegada.
- source_word: ዐቢይ ጽልመት
  english_pob_choice: the great darkness
  chosen_spanish: la gran oscuridad
  alternatives_spanish:
  - la gran tiniebla
  - la profunda oscuridad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la expresión de peso apocalíptico sin suavizarla. «Oscuridad» es la opción más directa y amplia; «gran» retiene la magnitud del sintagma.
- source_word: በጻሕኩ
  english_pob_choice: I reached
  chosen_spanish: llegué
  alternatives_spanish:
  - arribé
  - alcancé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor de llegada a un destino se expresa con naturalidad mediante «llegué», que mantiene el movimiento y la progresión del relato.
- source_word: ወሖርኩ
  english_pob_choice: and I went
  chosen_spanish: y fui
  alternatives_spanish:
  - y caminé
  - y me dirigí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición simple del movimiento se preserva mejor con «fui» que con perífrasis más explicativas.
- source_word: ኀበ
  english_pob_choice: to where
  chosen_spanish: al lugar donde
  alternatives_spanish:
  - a donde
  - hacia el lugar donde
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, la relación de destino queda más clara y fluida con «al lugar donde», evitando una construcción rígida.
- source_word: ኵሉ ሥጋ
  english_pob_choice: where no flesh walks / all flesh
  chosen_spanish: ninguna carne
  alternatives_spanish:
  - ningún ser humano
  - ningún ser viviente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión textual indica que el sentido correcto es negativo: «no flesh walks». Se traduce con una negación explícita y se conserva «carne» para mantener la fuerza semítica y la amplitud del hebraísmo/idioma bíblico.'
- source_word: (አ)ያንሶሱ / ኢያንሶሱ
  english_pob_choice: wanders / walks
  chosen_spanish: camina
  alternatives_spanish:
  - anda
  - va y viene
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El testimonio griego confirma el verbo de caminar/perambular, y el problema textual es la negación, no el léxico básico del movimiento. «Camina» funciona bien en español y evita introducir una lectura de vagar que no está asegurada.
theological_decisions:
- issue: El sentido de la expresión «all flesh / no flesh» en un contexto cosmológico-apocalíptico
  english_pob_reading: no flesh walks
  chosen_spanish_reading: ninguna carne camina
  alternative_spanish_readings:
  - ningún ser humano camina
  - ningún ser viviente camina
  rationale: La evidencia revisada corrige un error de lectura y exige mantener la negación. En español, «ninguna carne» preserva el semitismo y no estrecha indebidamente la amplitud de la expresión; al mismo tiempo, comunica que el lugar está fuera del ámbito de la vida mortal.
  doctrine_reference: Preservar la tensión semítica y la lectura textual corregida; no normalizar el giro a un lenguaje menos corpóreo sin base suficiente.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue corregida por revisión textual: donde el primer borrador entendía «where all flesh wanders», el dictamen posterior, apoyado por el griego, establece «where no flesh walks». La redacción española adopta esa lectura revisada y conserva el semitismo «carne» para no diluir la fuerza de la expresión.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente pero sobrio del lenguaje visionario, sin añadir explicaciones al cuerpo del verso.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, porque este verso no contiene el tetragrámaton ni un título divino directo.
  - «Carne» se conserva como término bíblico de amplitud semítica y no se sustituye por «ser humano» en el texto principal.
  - La negación se expresa de modo explícito en el verso y se documenta en nota por su importancia textual.
