translation:
  language: es
  text: Y me llevaron a un lugar donde los que estaban allí eran como fuego ardiente, y cuando querían, aparecían[a] como hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se mostraban como hombres». El verbo puede llevar el sentido de hacerse visibles en forma humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወነሥኡኒ
  english_pob_choice: and they took me
  chosen_spanish: y me llevaron
  alternatives_spanish:
  - y me tomaron
  - y me condujeron
  - y me transportaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico expresa tomar/llevar; «me llevaron» conserva el traslado visionario sin especificar más de lo que permite el texto.
- source_word: ውስተ አሐዱ መካን
  english_pob_choice: into a place
  chosen_spanish: a un lugar
  alternatives_spanish:
  - a un sitio
  - a un determinado lugar
  - a un lugar cualquiera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa optó por una formulación natural pero indefinida. En español, «a un lugar» comunica esa indefinición sin forzar «uno» de manera antinatural.
- source_word: ኀበ እለ ሀለዉ ህየ
  english_pob_choice: where those who were there
  chosen_spanish: donde los que estaban allí
  alternatives_spanish:
  - donde los allí presentes
  - donde los que allí se hallaban
  - donde estaban los que estaban allí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula identifica a los ocupantes del lugar. «Los que estaban allí» preserva la referencia local sin interpretar su identidad.
- source_word: ከመ እሳት ዘይነድድ
  english_pob_choice: were like burning fire
  chosen_spanish: eran como fuego ardiente
  alternatives_spanish:
  - eran como fuego que ardía
  - eran como una llama ardiente
  - eran como fuego encendido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Fuego ardiente» mantiene la comparación explícita y el énfasis repetitivo del ge'ez, sin diluir la imagen en una sola idea más suave.
- source_word: ወሶበ ይፈቅዱ
  english_pob_choice: and whenever they wished
  chosen_spanish: y cuando querían
  alternatives_spanish:
  - y cuando lo deseaban
  - y siempre que querían
  - y cada vez que lo deseaban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido es volitivo y repetido; «y cuando querían» reproduce esa libertad de acción en español natural. Se conserva el matiz de posibilidad repetida en el contexto.
- source_word: ያስተርእዩ
  english_pob_choice: they appeared
  chosen_spanish: se aparecían
  alternatives_spanish:
  - aparecían
  - se mostraban
  - se hacían ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene un matiz de manifestación visible. «Se aparecían» retiene mejor la idea de hacerse visibles que un simple «aparecían».
- source_word: ከመ ሰብእ
  english_pob_choice: like men
  chosen_spanish: como hombres
  alternatives_spanish:
  - como varones
  - como seres humanos
  - como personas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hombres» traduce de forma directa la comparación con forma humana, manteniendo el contraste con su apariencia de fuego.
theological_decisions:
- issue: Identidad de los seres resplandecientes
  english_pob_reading: Render descriptively as 'those who were there' without identifying them as angels in the main text.
  chosen_spanish_reading: Describirlos como «los que estaban allí» sin nombrarlos como ángeles, espíritus o vigilantes.
  alternative_spanish_readings:
  - ángeles
  - espíritus
  - vigilantes
  rationale: El verso describe su apariencia y su capacidad de manifestarse, pero no los identifica. La traducción conserva esa tensión teológica en lugar de resolverla por anticipado.
  doctrine_reference: Preservar la tensión teológica sin añadir una identificación que el verso no explicita.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente, que suavizó «into one place» a «into a place» por naturalidad. En español se refleja con la misma indefinición natural («a un lugar») y se conserva el resto de la estructura: traslado, descripción de los presentes como fuego ardiente y manifestación voluntaria en forma humana.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este verso no lo contiene.
  - Se conserva un registro sobrio y bíblico, sin introducir vocabulario eclesiástico no exigido por el texto.
  - «Se aparecían» se usa para mantener el matiz reflexivo/manifestativo del verbo, y la nota ofrece la alternativa más literal «se mostraban».
  - «Hombres» se prefiere a «seres humanos» por fidelidad directa a la comparación del original, aunque la nota deja abierta la equivalencia humana.
