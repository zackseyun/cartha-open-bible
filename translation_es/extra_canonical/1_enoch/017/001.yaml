    rationale: El ge'ez ያስተርእዩ expresa manifestarse o hacerse visible. En español neutral, «aparecían» o «se mostraban» transmite eso con claridad; «se aparecían» suele entenderse como uso pronominal no estándar.
  - severity: medium
    issue: La nota [a] está anclada en «fuego ardiente» pero explica una alternativa del verbo final.
    rationale: La disciplina de notas exige que el marcador aparezca en la palabra o frase relevante. Aquí la nota trata sobre «aparecían/se mostraban», no sobre la descripción ígnea.
  revised_spanish_text: Y me llevaron a un lugar donde los que estaban allí eran como fuego ardiente, y cuando querían, aparecían[a] como hombres.
  revised_footnotes:
  - marker: a
    text: O «se mostraban como hombres». El verbo puede llevar el sentido de hacerse visibles en forma humana.
    reason: lexical_alternative
