translation:
  language: es
  text: Y me llevaron hasta las aguas vivas[a], y hasta el fuego del occidente[c][b], que recibe cada puesta del sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez ማያት ሕያዋን significa literalmente «aguas vivas», no «aguas de vida»; por eso se conserva aquí la forma adjetival.
    reason: source_note
  - marker: b
    text: También puede entenderse como «el fuego occidental» o «el fuego del poniente»; se prefiere «occidente» para mantener el marco cósmico de la visión.
    reason: lexical_alternative
  - marker: c
    text: La palabra ge'ez entre corchetes después de «aguas vivas» es incierta en este testimonio y puede significar «que hablan» o reflejar una lectura corrupta; por eso no se representa en el texto principal.
    reason: textual_variant
lexical_decisions:
- source_word: ወነሥኡኒ
  english_pob_choice: and they took me
  chosen_spanish: y me llevaron
  alternatives_spanish:
  - y me tomaron
  - y me condujeron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ነሥአ puede expresar tomar, llevar o traer. En un contexto visionario, «me llevaron» comunica bien el movimiento guiado sin especificar innecesariamente si fue por carga o por conducción.
- source_word: እስከ
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - así como hasta
  - a lo largo de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí marca alcance o llegada a un destino sucesivo. En español, «hasta» transmite con naturalidad ese límite de recorrido visionario.
- source_word: ማያት ሕያዋን
  english_pob_choice: the living waters
  chosen_spanish: las aguas vivas
  alternatives_spanish:
  - las aguas vivientes
  - las aguas de vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez es una construcción sustantivo-adjetivo, literalmente «aguas vivas». En español, «aguas vivas» preserva esa forma y el registro apocalíptico sin convertirla en una genitiva que el original no exige.
- source_word: '[ዘይትናገር፡]'
  english_pob_choice: omitted from main text
  chosen_spanish: omitido del texto principal
  alternatives_spanish:
  - que habla
  - que es hablado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma entre corchetes es insegura en este testimonio y probablemente refleja una corrupción o intrusión textual. Como el versículo fluye bien sin ella, conviene no incorporarla al texto principal.
- source_word: እሳት ዐረብ
  english_pob_choice: the fire of the west
  chosen_spanish: el fuego del occidente
  alternatives_spanish:
  - el fuego del poniente
  - el fuego occidental
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዐረብ aquí se entiende mejor como occidente/poniente, no solo como «tarde». «Occidente» conserva el carácter cósmico y geográfico de la visión y suena elevado en español bíblico.
- source_word: ዘውእቱ ይነሥእ ኵሎ ዕርበተ ፀሐይ
  english_pob_choice: which receives every setting of the sun
  chosen_spanish: que recibe cada puesta del sol
  alternatives_spanish:
  - que recibe todo el ocaso del sol
  - que recoge cada ocaso del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El relativo describe al fuego occidental como receptor de cada acto de puesta del sol. «Cada puesta del sol» conserva la idea procesual del original mejor que una simplificación a «atardecer».
theological_decisions:
- issue: Conservación de la imaginería cósmica visionaria
  english_pob_reading: Preserve the concrete imagery of 'waters of life' and 'fire of the west' as visionary locations
  chosen_spanish_reading: Mantener las aguas vivas y el fuego del occidente como lugares visionarios concretos
  alternative_spanish_readings:
  - interpretarlos simbólicamente en el texto principal
  - volverlos fenómenos naturales genéricos
  rationale: El texto de 1 Enoc presenta geografía apocalíptica revelada. La traducción debe conservar su especificidad y extrañeza, no neutralizarla en una descripción ordinaria.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten visionary prose.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente: el análisis corrigió la lectura de ማያት ሕያዋን como una construcción adjetival («living waters»). La redacción española adopta esa corrección y evita la genitiva «aguas de vida» en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo «aguas vivas» para reflejar con precisión la morfología del ge'ez y evitar una paráfrasis genitiva no respaldada por el testimonio.
  - Se evitó «Señor» u otras convenciones de ocultamiento del nombre divino porque este versículo no las requiere.
  - Se prefirió un español sobrio y apocalíptico, con términos como «occidente» y «puesta del sol» para conservar la imaginería visionaria.
