  source_alignment_summary: 'El borrador español refleja bien el sentido del ge''ez: movimiento guiado, dos destinos visionarios sucesivos, y la cláusula relativa sobre el fuego occidental que recibe la puesta del sol. También acierta al seguir la revisión adjudicada de ማያት ሕያዋን como «aguas vivas». Sin embargo, falta una nota sobre la palabra ge''ez entre corchetes omitida del texto principal, la cual sí forma parte del rastro auditado inglés y debe preservarse como nota textual.'
  spanish_quality_summary: 'El español es natural, digno y claro. «Me llevaron», «aguas vivas» y «fuego del occidente» son lecturas fluidas y apropiadas para un registro bíblico moderno. «Cada puesta del sol» comunica bien la imagen procesual. La única reparación necesaria es documental: añadir la nota textual omitida y ordenar las marcas de notas de forma consistente con el texto.'
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. «Aguas vivas» sigue correctamente la decisión léxica adjudicada; «occidente» conserva la imaginería cósmica. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: Falta la nota textual sobre la palabra ge'ez entre corchetes omitida del texto principal.
    rationale: El English POB conserva explícitamente esta incertidumbre textual en nota. Dado que la omisión en el texto principal es una decisión significativa de traducción, el español debe documentarla también para mantener fidelidad al expediente auditado.
  - severity: low
    issue: El aparato de notas no refleja completamente las alternativas preservadas en el rastro inglés.
    rationale: Aunque la nota española sobre «aguas vivas» es útil, el expediente inglés además preserva la incertidumbre textual del término bracketed. Conviene incluirla; no es necesario replicar la nota histórica de ‘previous rendering’ si no aporta ambigüedad nueva en español.
  revised_spanish_text: Y me llevaron hasta las aguas vivas[a], y hasta el fuego del occidente[b], que recibe cada puesta del sol.
  revised_footnotes:
  - marker: a
    text: El ge'ez ማያት ሕያዋን significa literalmente «aguas vivas», no «aguas de vida»; por eso se conserva aquí la forma adjetival.
    reason: source_note
  - marker: b
    text: También puede entenderse como «el fuego occidental» o «el fuego del poniente»; se prefiere «occidente» para mantener el marco cósmico de la visión.
    reason: lexical_alternative
  - marker: c
    text: La palabra ge'ez entre corchetes después de «aguas vivas» es incierta en este testimonio y puede significar «que hablan» o reflejar una lectura corrupta; por eso no se representa en el texto principal.
    reason: textual_variant
  revision_rationale: El texto principal puede permanecer igual, pero debe completarse el aparato crítico con la nota sobre la forma ge'ez incierta omitida del texto principal. Esto preserva mejor la evidencia fuente y el rastro auditado inglés. También se mantiene «aguas vivas» conforme a la adjudicación léxica ya fijada.
