translation:
  language: es
  text: Y llegué a un río de fuego[a], cuyo fuego corría como agua, y desembocaba en el gran mar hacia el oeste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase final dice literalmente algo como «en dirección de ʿarab». Se vierte «hacia el oeste» porque la expresión puede indicar el cuadrante occidental; aun así, algunos pueden entender una referencia geográfica, como Arabia.
    reason: lexical_alternative
lexical_decisions:
- source_word: መጻእኩ
  english_pob_choice: I came
  chosen_spanish: Y llegué
  alternatives_spanish:
  - Y vine
  - Y fui
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa movimiento en primera persona dentro de una secuencia visionaria. «Llegué» conserva el valor narrativo de arribo sin añadir una dirección no explicitada en el español.
- source_word: ፈለገ
  english_pob_choice: river
  chosen_spanish: río
  alternatives_spanish:
  - arroyo
  - corriente
  - torrente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Río» comunica mejor la escala de la imagen y su relación con el «gran mar». «Corriente» o «torrente» serían posibles, pero menos naturales aquí.
- source_word: እሳት
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - fuego ardiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el sentido literal de la imagen apocalíptica. «Fuego» es el equivalente más directo y no suaviza la visión.
- source_word: ዘይውሕዝ እሳቱ
  english_pob_choice: whose fire flowed
  chosen_spanish: cuyo fuego corría
  alternatives_spanish:
  - cuyo fuego fluía
  - que corría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El relativo con posesivo se vierte de manera natural con «cuyo». «Corría» expresa el movimiento continuo del fuego con un español fluido y digno.
- source_word: ከመ፡ ማይ
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - como el agua
  - a manera de agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación es directa y debe conservarse sin explicar ni suavizar la imagen.
- source_word: ይትከዐው
  english_pob_choice: it emptied into
  chosen_spanish: se vaciaba en
  alternatives_spanish:
  - se vertía en
  - desembocaba en
  - fluía en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se vaciaba en» reproduce bien la idea de descargarse o derramarse hacia un cuerpo mayor sin perder la imagen de flujo.
- source_word: ባሕር ዐቢይ
  english_pob_choice: the great sea
  chosen_spanish: el gran mar
  alternatives_spanish:
  - el gran mar
  - el mar grande
  - el mar inmenso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gran mar» conserva el tono elevado y el referente geográfico amplio. Es una equivalencia natural y precisa en español.
- source_word: መንገለ ዐረብ
  english_pob_choice: toward the west
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - en dirección al oeste
  - hacia Arabia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión puede referirse al cuadrante occidental; en este contexto geográfico, «hacia el oeste» sigue la lectura adoptada por la POB en inglés. Se preserva la posible ambigüedad mediante nota.
theological_decisions:
- issue: Si el río de fuego debe desmitologizarse o mantenerse como visión literal apocalíptica
  english_pob_reading: 'Preserve it as a literal visionary description: ''a river of fire whose fire flowed like water.'''
  chosen_spanish_reading: 'Se mantiene como descripción visionaria literal: «un río de fuego, cuyo fuego corría como agua».'
  alternative_spanish_readings:
  - imagen simbólica de juicio
  - metáfora del juicio divino
  rationale: El texto de 1 Enoc presenta paisajes cósmicos imposibles como realidades vistas en la visión. Conviene no resolver la tensión ni convertir la escena en mera metáfora.
  doctrine_reference: Preservación de la imaginería apocalíptica y de la tensión teológica del texto
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del texto inglés, que añadió una coma tras «fire» por claridad. En español se refleja con la pausa natural tras «fuego» y se mantiene la traducción ya confirmada de la dirección final.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o equivalentes de máscara divina porque no aparecen en este verso.
  - Se usa «fuego» de forma literal y no se suaviza a lenguaje explicativo.
  - «Hacia el oeste» preserva la decisión auditada del inglés; la nota mantiene la alternativa geográfica.
  - El registro es reverente y bíblico sin arcaísmos innecesarios.
