translation:
  language: es
  text: Y me llevaron a un lugar de torbellino[a], y a un monte cuya cima alcanzaba el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un lugar de tempestad» o «un lugar de tormenta». El término ge'ez transmite una agitación atmosférica violenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወወሰዱኒ
  english_pob_choice: and they took me
  chosen_spanish: y me llevaron
  alternatives_spanish:
  - y me tomaron
  - y me condujeron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico puede implicar tomar, conducir o llevar. En español, «me llevaron» conserva bien la idea de traslado visionario sin precisar indebidamente el modo de movimiento.
- source_word: መካን
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - región
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un término locativo amplio. «Lugar» es claro, neutral y no añade matices geográficos que el texto no explicita.
- source_word: ዘዐውሎ
  english_pob_choice: of whirlwind
  chosen_spanish: de torbellino
  alternatives_spanish:
  - de viento huracanado
  - de tempestad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Torbellino» conserva la imagen de agitación atmosférica violenta. Se evita «tempestad» por ser más genérico y perder parte del dinamismo visual.
- source_word: ደብር
  english_pob_choice: mountain
  chosen_spanish: monte
  alternatives_spanish:
  - montaña
  - cerro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Monte» es natural en español bíblico y mantiene el tono elevado del escenario visionario. «Montaña» también sería válida, pero «monte» suena más acorde con lenguaje apocalíptico.
- source_word: ዘክተማ ርእሱ
  english_pob_choice: whose summit
  chosen_spanish: cuya cima
  alternatives_spanish:
  - cuya cumbre
  - cuya cabeza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sintagma literalmente dice «cabeza/top». «Cima» transmite de forma idiomática la elevación máxima del monte sin perder la imagen vertical.
- source_word: ይበጽሕ እስከ ሰማይ
  english_pob_choice: reached to heaven
  chosen_spanish: llegaba hasta el cielo
  alternatives_spanish:
  - alcanzaba el cielo
  - se extendía hasta el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa extensión hasta el límite superior. «Llegaba hasta el cielo» conserva la imagen cósmica; «cielo» funciona bien en español, aunque el audit trail inglés optó por «heaven» por el registro apocalíptico.
theological_decisions:
- issue: Rendering of ሰማይ in apocalyptic visionary context
  english_pob_reading: heaven
  chosen_spanish_reading: cielo
  alternative_spanish_readings:
  - cielo
  - cielos
  rationale: En español, «cielo» comunica con claridad tanto el ámbito celeste como la altura extrema en una visión. Se evita forzar una formulación doctrinal; el pasaje describe una topografía visionaria más que una afirmación teológica explícita sobre el cielo escatológico.
  doctrine_reference: Preservar la imaginería apocalíptica y la verticalidad cósmica sin sobreinterpretar.
translation_notes:
  revision_awareness: La versión inglesa reciente ajustó la preposición en el segundo miembro de 'into' a 'to' por naturalidad y fidelidad al contexto. En español se refleja con «a un monte» para evitar la implicación de entrar dentro del monte.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y legible en español contemporáneo.
  - Se evita traducir mecánicamente 'heaven' como 'cielo' solo por hábito; aquí se eligió 'cielo' como equivalente natural en español, manteniendo la verticalidad apocalíptica.
  - El marcado de nota [a] se coloca solo en el primer sintagma donde recae la alternativa léxica del ge'ez.
