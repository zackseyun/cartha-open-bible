revisions:
- from: Y todos los demás que estaban con ellos tomaron mujeres para sí[a], y cada uno escogió una para sí.
  to: Y todos los demás con ellos tomaron esposas para sí[a], y cada uno escogió una para sí.
  rationale: Se ajusta el término principal a «esposas» para seguir la decisión léxica auditada del POB inglés («wives») y se conserva «mujeres» como alternativa en nota, tal como documenta la evidencia. También se simplifica «que estaban con ellos» a «con ellos» para reflejar más directamente el original sin perder naturalidad. No se requiere adjudicación adicional porque la corrección es pequeña y está bien sustentada por la auditoría existente.
