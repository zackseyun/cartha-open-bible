translation:
  language: es
  text: Y todos los demás con ellos tomaron esposas para sí[a], y cada uno escogió una para sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomaron mujeres para sí». El sustantivo ge'ez puede denotar mujeres en general, pero en esta construcción comúnmente tiene el sentido de esposas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ባዕዳን
  english_pob_choice: the others
  chosen_spanish: los demás
  alternatives_spanish:
  - los otros
  - el resto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto se refiere al grupo restante ya introducido, no a «extraños» en sentido genérico. «Los demás» conserva el valor colectivo de los restantes miembros del grupo.
- source_word: ኵሉ
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno
  - el conjunto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma tiene valor distributivo y abarcador; «todos» expresa que el resto entero actuó de la misma manera.
- source_word: ምስሌሆሙ
  english_pob_choice: with them
  chosen_spanish: que estaban con ellos
  alternatives_spanish:
  - junto con ellos
  - con ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la idea de acompañamiento/asociación. La expansión mínima «que estaban con ellos» mejora la fluidez en español sin alterar la referencia al grupo asociado.
- source_word: ነሥኡ ሎሙ አንስተ
  english_pob_choice: took wives for themselves
  chosen_spanish: tomaron mujeres para sí
  alternatives_spanish:
  - tomaron esposas para sí
  - tomaron mujeres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo ge'ez puede significar «mujeres»; aquí el POB inglés optó por «wives» por el sentido marital implícito. En español, «mujeres» conserva esa ambigüedad documentada sin imponer una lectura más específica que el texto permite.
- source_word: ኃረዩ
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo simple de elección deliberada. «Escogió» es natural y mantiene el matiz voluntario del acto individual.
- source_word: ለለ ርእሱ አሐተ
  english_pob_choice: each chose one for himself
  chosen_spanish: cada uno escogió una para sí
  alternatives_spanish:
  - cada uno eligió una para sí
  - cada uno escogió una
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La construcción es distributiva y reflexiva: cada miembro eligió individualmente una sola. «Una para sí» preserva el reflexivo de ሎሙ/ርእሱ y el numeral implícito.'
theological_decisions:
- issue: 'አንስተ: ¿«mujeres» o «esposas»?'
  english_pob_reading: wives
  chosen_spanish_reading: mujeres
  alternative_spanish_readings:
  - esposas
  rationale: Aunque la escena describe uniones ilícitas, la palabra ge'ez permite «mujeres» y el contexto narrativo deja claro el carácter marital asumido por ellos. «Mujeres» preserva la tensión léxica sin cerrar prematuramente el sentido a una formulación más técnica o eclesiástica.
  doctrine_reference: Conservar el sentido local del pasaje sin armonizar ni suavizar la narración apocalíptica.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que ajustó el orden final a «each chose one for himself». El español refleja ese orden natural con «cada uno escogió una para sí», preservando el énfasis distributivo y reflexivo.
  spanish_consistency_notes:
  - Se evita «SEÑOR» y otras convenciones de ocultamiento del nombre divino porque este versículo no contiene el tetragrámaton ni una cita directa relevante.
  - Se mantiene un español neutral y digno, sin calco rígido del inglés, pero sin ampliar el contenido más allá del testimonio ge'ez.
  - La nota al pie conserva la alternativa léxica documentada entre «mujeres» y «esposas» para reflejar la tensión semántica del original.
