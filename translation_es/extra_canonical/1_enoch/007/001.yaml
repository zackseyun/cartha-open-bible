review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del ge''ez: «todos los demás… con ellos», «tomaron…», y la cláusula distributiva «cada uno… una». Sin embargo, en el punto léxico principal ነሥኡ ሎሙ አንስተ se aparta de la decisión auditada del POB inglés, que escogió «wives» como lectura principal y reservó «women» como alternativa en nota. En español, poner «mujeres» en el texto principal invierte esa jerarquía y debilita el sentido marital que la auditoría documentó como más probable en esta construcción.'
  spanish_quality_summary: El español es claro y natural, pero «tomaron mujeres para sí» suena algo menos idiomático y más ambiguo de lo deseado en contexto narrativo. «Tomaron esposas para sí» o «tomaron mujeres por esposas» comunica mejor el valor de la construcción. El resto de la frase es legible; «que estaban con ellos» es aceptable, aunque «con ellos» sería más directo. La nota actual también invierte innecesariamente la relación principal/alternativa del inglés.
  glossary_alignment: 'No hay conflicto con la terminología doctrinal principal del proyecto, pero sí con la racionalidad léxica auditada: donde el POB inglés fijó «wives» como principal y «women» como alternativa anotada, el español debe normalmente seguir «esposas» como principal y dejar «mujeres» en nota. Esto preserva mejor la decisión fuente y evita una paráfrasis interpretativa inversa.'
  issues:
  - severity: high
    issue: La palabra principal «mujeres» para አንስተ no sigue la decisión auditada del POB inglés («wives»).
    rationale: La evidencia y la auditoría indican que en esta construcción el sentido más probable es marital. En español, mantener «mujeres» en el texto principal y relegar «esposas» a nota invierte la elección documentada.
  - severity: medium
    issue: La nota al pie está invertida respecto del inglés auditado.
    rationale: La nota inglesa dice «Or 'took women for themselves'», es decir, «women» es la alternativa. En el borrador español, el texto principal usa «mujeres» y la nota ofrece «esposas», cambiando la prioridad léxica establecida.
  - severity: low
    issue: «Que estaban con ellos» añade una leve expansión no necesaria.
    rationale: No es infiel, pero «con ellos» refleja de forma más directa ምስሌሆሙ y mantiene una sintaxis más ceñida al original.
  revised_spanish_text: Y todos los demás con ellos tomaron esposas para sí[a], y cada uno escogió una para sí.
  revised_footnotes:
  - marker: a
    text: O «tomaron mujeres para sí». El sustantivo ge'ez puede denotar mujeres en general, pero en esta construcción comúnmente tiene el sentido de esposas.
    reason: lexical_alternative
  revision_rationale: Se ajusta el término principal a «esposas» para seguir la decisión léxica auditada del POB inglés («wives») y se conserva «mujeres» como alternativa en nota, tal como documenta la evidencia. También se simplifica «que estaban con ellos» a «con ellos» para reflejar más directamente el original sin perder naturalidad. No se requiere adjudicación adicional porque la corrección es pequeña y está bien sustentada por la auditoría existente.
