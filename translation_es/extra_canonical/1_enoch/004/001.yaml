base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/004/001.yaml
  text: And again[a], observe the days of summer—how the sun comes upon it at its beginning, and you seek shelter and shade because of the heat of the sun[c][b], and the earth is scorched with burning heat, and you cannot tread on the earth or upon a rock because of its heat.
  footnotes:
  - marker: a
    text: The clause 'how the sun comes upon it at its beginning' is difficult in the Ethiopic and may refer more specifically to the sun's strength at the onset of summer.
    reason: textual_variant
  - marker: b
    text: The paired expression rendered 'shelter and shade' preserves a doublet in the Ethiopic rather than reducing it to a single English term.
    reason: lexical_alternative
  - marker: c
    text: Or 'ask about'.
    reason: previous_rendering
