translation:
  language: es
  text: 'Y nuevamente, observen los días del verano: cómo el sol viene sobre él[a] al comienzo, y buscan refugio y sombra por el calor del sol, y la tierra se abrasa con calor ardiente, y no pueden andar sobre la tierra ni sobre una roca por su calor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula «cómo el sol viene sobre él al comienzo» es difícil en el etiópico y puede referirse más específicamente a la fuerza del sol al inicio del verano.
    reason: textual_variant
lexical_decisions:
- source_word: ዳግመ
  english_pob_choice: again
  chosen_spanish: y nuevamente
  alternatives_spanish:
  - y otra vez
  - una vez más
  lexicon: Dillmann
  rationale: Marcador discursivo de repetición. "Y nuevamente" conserva el valor iterativo y suena natural en español bíblico contemporáneo.
- source_word: ጠይቁ
  english_pob_choice: observe
  chosen_spanish: observen
  alternatives_spanish:
  - examinen
  - consideren
  lexicon: Dillmann
  rationale: La revisión inglesa aprobada corrigió la lectura de "ask about" hacia "observe" a la luz del Ge'ez y del paralelo griego. En español, "observen" reproduce mejor el valor de examinar atentamente los signos de la creación.
- source_word: መዋዕለ ሐጋይ
  english_pob_choice: the days of summer
  chosen_spanish: los días del verano
  alternatives_spanish:
  - la temporada de verano
  - los días del calor
  lexicon: Dillmann
  rationale: El giro es temporal y estacional. "Los días del verano" mantiene la concreción del original sin volverlo interpretativo.
- source_word: ከመ ኮነ ፀሐይ ላዕሌሃ በቅዳሜሃ
  english_pob_choice: how the sun comes upon it at its beginning
  chosen_spanish: cómo el sol cae sobre él al comenzar
  alternatives_spanish:
  - cómo el sol está sobre él al principio
  - cómo el sol se levanta sobre él al inicio
  lexicon: Dillmann
  rationale: El pasaje es difícil en Ge'ez. La formulación española conserva la imagen de la acción del sol al inicio del verano sin sobreprecisar el punto sintáctico oscuro. "Cae sobre él" comunica la incidencia del sol de manera idiomática.
- source_word: ትኃሡ
  english_pob_choice: you seek shelter
  chosen_spanish: buscan refugio
  alternatives_spanish:
  - buscan amparo
  - se resguardan
  lexicon: Dillmann
  rationale: El contexto de calor opresivo favorece un verbo de protección. "Buscan refugio" mantiene la idea de recurrir a resguardo y evita una dicción demasiado literal o rígida.
- source_word: ምጽላለ፡ ወጽላሎተ
  english_pob_choice: shelter and shade
  chosen_spanish: refugio y sombra
  alternatives_spanish:
  - amparo y sombra
  - cobijo y sombra
  lexicon: Dillmann
  rationale: La pareja léxica del original se conserva como doblete. "Refugio y sombra" es una equivalencia natural en español y preserva la duplicación semántica sin colapsarla.
- source_word: በእንተ፡ ዋዕየ፡ ፀሓይ
  english_pob_choice: because of the heat of the sun
  chosen_spanish: por el calor del sol
  alternatives_spanish:
  - a causa del calor del sol
  - por el ardor del sol
  lexicon: Dillmann
  rationale: La expresión apunta al calor opresivo del sol. "Por el calor del sol" es clara y fiel; evita introducir un matiz excesivo de juicio o simbolismo.
- source_word: ወምድርኒ፡ ትውዒ፡ እሙቀተ፡ ሐሩር
  english_pob_choice: and the earth is scorched with burning heat
  chosen_spanish: y la tierra se abrasa con calor ardiente
  alternatives_spanish:
  - y la tierra se quema con calor abrasador
  - y la tierra queda tostada por el calor
  lexicon: Dillmann
  rationale: '"Se abrasa" conserva la fuerza pasiva/resultativa del Ge''ez y la imagen física intensa. "Calor ardiente" refleja el duplicado semántico del original sin reducirlo a una sola palabra.'
- source_word: ወኢ፡ ኰኵሐ፡
  english_pob_choice: or upon a rock
  chosen_spanish: ni sobre una roca
  alternatives_spanish:
  - ni sobre piedra
  - ni encima de una roca
  lexicon: Dillmann
  rationale: El paralelismo con "la tierra" se mantiene. "Roca" es suficientemente literal y sobria para el registro del texto.
theological_decisions:
- issue: Pasaje descriptivo de orden creado sin moralización añadida
  english_pob_reading: Retain the verse as observational description of creation's ordered seasons rather than moralizing it in the translation.
  chosen_spanish_reading: Conservar el versículo como descripción observacional del verano y del calor de la creación, sin añadir una interpretación moral explícita.
  alternative_spanish_readings:
  - Convertirlo en una lección directa sobre juicio divino en la naturaleza
  - Parafrasearlo con un sentido sapiencial más interpretativo
  rationale: El contexto literario usa la naturaleza como evidencia observable; este versículo, en sí mismo, describe fenómenos estacionales. La traducción evita cargar el texto con una interpretación que el original no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica del apocalipticismo temprano sin resolverla por paráfrasis interpretativa.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección textual importante del expediente: el final del versículo fue restaurado desde el testimonio ge''ez completo de Beta maṣāḥǝft, porque la OCR de Charles 1906 estaba truncada. También se siguió la revisión que ajustó la primera cláusula desde "ask about" a "observe", en línea con el sentido mejor atestiguado por el contexto y el paralelo griego mencionado en el audit trail.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto solo cuando corresponda; en este versículo no aparece el nombre divino.
  - '"Refugio y sombra" preserva el doblete semántico que en inglés se explicó como "shelter and shade".'
  - La construcción "no pueden andar sobre la tierra ni sobre una roca" reproduce el paralelismo final sin suavizar el impedimento físico.
  - Se prefirió un español bíblico moderno, evitando arcaísmos innecesarios como "he aquí" o "más" donde no aportan precisión.
