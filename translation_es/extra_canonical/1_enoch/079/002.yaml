translation:
  language: es
  text: 'Y me mostró todas sus ordenanzas[a]: las de cada día y de cada estación, y de cada año, y de su salida y de su mandato[b], cada mes y cada sábado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ordenanzas» traduce el sentido de disposiciones fijas y reguladas del ge’ez ሥርዓቶሙ; también podría entenderse como «arreglos» o «cursos fijos», pero aquí se conserva la idea de orden prescrito.
    reason: lexical_alternative
  - marker: b
    text: «Mandato» conserva la posible fuerza de orden autoritativa del original; también podría leerse como «orden» o «prescripción» en un sentido más regulado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ፴አርአየኒ
  english_pob_choice: he showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me reveló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge’ez introduce una comunicación visionaria directa. «Me mostró» es natural en español y conserva el tono de relato sin sobrecargarlo como fórmula técnica de revelación.
- source_word: ኵሎ ሥርዓቶሙ
  english_pob_choice: all their ordinances
  chosen_spanish: todos sus ordenamientos
  alternatives_spanish:
  - todas sus ordenanzas
  - todos sus arreglos
  - todos sus cursos fijos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico, ሥርዓት expresa un orden fijo y regulado. «Ordenamientos» preserva la idea de disposición normativa sin sonar tan jurídico como «ordenanzas».
- source_word: ወበኵሉ ዕለት
  english_pob_choice: for every day
  chosen_spanish: de cada día
  alternatives_spanish:
  - para cada día
  - en cada día
  - cada día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase marca ámbito temporal recurrente. «De cada día» encaja bien en la enumeración de ciclos y evita una repetición demasiado mecánica de «para».
- source_word: ወበኵሉ ዘመን
  english_pob_choice: for every season
  chosen_spanish: de cada estación
  alternatives_spanish:
  - de cada tiempo
  - de cada período señalado
  - de cada tiempo fijado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዘመን puede ser tiempo, estación o período. En una lista calendárica, «estación» comunica una división ordenada del tiempo y mantiene la ambigüedad razonable del original.
- source_word: ወበኵሉ ዓመት
  english_pob_choice: and for every year
  chosen_spanish: y de cada año
  alternatives_spanish:
  - y para cada año
  - y en cada año
  - y año tras año
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Correspondencia directa y transparente con el patrón de la serie temporal.
- source_word: ወበሙጻኡ
  english_pob_choice: and in its going out
  chosen_spanish: y de su salida
  alternatives_spanish:
  - y de su salida al aparecer
  - y de su salida/proceder
  - y de su surgimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo derivado de «salir» puede aludir a la salida, aparición o salida técnica de los astros. «Salida» es literal y deja abierta esa posible referencia astronómica.
- source_word: ወበትእዛዙ
  english_pob_choice: and in its command
  chosen_spanish: y de su mandato
  alternatives_spanish:
  - y de su orden
  - y de su prescripción
  - y de su ordenamiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede denotar mandato u orden prescrita. «Mandato» conserva la fuerza de dirección/autoridad presente en el texto sin diluirla demasiado.
- source_word: በኵሉ ወርኅ
  english_pob_choice: in every month
  chosen_spanish: en cada mes
  alternatives_spanish:
  - para cada mes
  - mes por mes
  - en todo mes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Equivalencia simple y idiomática en español para una secuencia calendárica.
- source_word: ወ፵ኵሉ ሰንበት
  english_pob_choice: and every sabbath
  chosen_spanish: y en cada sábado
  alternatives_spanish:
  - y en cada sabbat
  - y cada sábado
  - y en cada semana
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el término cultual literal del ge’ez mediante «sábado», que es inteligible en español y mantiene la tensión entre observancia litúrgica y posible valor calendárico amplio. Se evita normalizarlo a «semana» sin una base textual más fuerte.
theological_decisions:
- issue: Cómo renderizar ሰንበት
  english_pob_reading: sabbath
  chosen_spanish_reading: sábado
  alternative_spanish_readings:
  - semana
  - sabbat
  rationale: El POB inglés retiene «sabbath» por literalidad y por la tensión cultual/calendárica. En español, «sábado» es la forma natural y tradicionalmente asociada al Sabbat, y preserva la fuerza religiosa del término sin forzar un préstamo innecesario. Se evita «semana» porque resolvería prematuramente una ambigüedad del original.
  doctrine_reference: Preservar la tensión léxica cuando el contexto no exige resolverla.
- issue: Cómo tratar la secuencia temporal con posible trasfondo astronómico
  english_pob_reading: all their ordinances—those for every day and every season, and for every year, and for its going out and its command, in every month and every sabbath
  chosen_spanish_reading: todos sus ordenamientos—los de cada día y de cada estación, y de cada año, y de su salida y de su mandato, en cada mes y en cada sábado
  alternative_spanish_readings:
  - todos sus ordenamientos—los de cada día y de cada tiempo, y de cada año, y de su salida y de su orden, en cada mes y en cada sábado
  - todos sus ordenamientos—los de cada día y de cada estación, y de cada año, y respecto de su salida y su orden, en cada mes y en cada sábado
  rationale: La lectura mantiene la enumeración temporal y el probable trasfondo astronómico sin reconstruir más de lo que el ge’ez permite. «Salida» y «mandato» conservan la estructura de dependencia/orden del original, en vez de suavizarla a una paráfrasis general.
  doctrine_reference: Primacía del texto fuente; evitar normalizaciones interpretativas no atestiguadas.
translation_notes:
  revision_awareness: La auditoría inglesa muestra que la frase previa con «three hundred and sixty-five» fue corregida por errores OCR y que la redacción final eliminó esa inserción. Por eso la versión española evita cualquier número inexistente y sigue la secuencia temporal establecida en la revisión más reciente. También se respeta el singular posesivo del original en «su salida» y «su mandato».
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros registros cuando corresponde al Tetragrámaton; aquí no aparece.
  - Se mantiene «sábado» como equivalente natural de ሰንበት para preservar el matiz cultual/calendárico.
  - Se evita introducir «Cristo», «Señor» o fórmulas eclesiásticas no presentes en la fuente.
  - La enumeración conserva la repetición preposicional del original para reflejar el catálogo temporal del pasaje.
