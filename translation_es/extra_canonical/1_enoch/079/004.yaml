translation:
  language: es
  text: 'Y el menguante que ocurre en la primera puerta en su estación, hasta que se completen ciento setenta y siete días, por el cómputo de las semanas: veinticinco semanas y dos días.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ታሕጻጼት
  english_pob_choice: waning
  chosen_spanish: menguante
  alternatives_spanish:
  - disminución
  - decrecimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto astronómico de 1 Enoc 79 exige el sentido técnico de la luna en fase descendente. «Menguante» conserva ese valor sin convertirlo en abstracción.
- source_word: በኆኅት ቀዳሚት
  english_pob_choice: in the first gate
  chosen_spanish: en la primera puerta
  alternatives_spanish:
  - en la primera entrada
  - en la primera abertura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige el OCR y confirma «gate». «Puerta» es el equivalente español más directo para el esquema astronómico de las puertas del cielo.
- source_word: በዘመኑ ዚአሁ
  english_pob_choice: in its season
  chosen_spanish: en su estación
  alternatives_spanish:
  - en su tiempo señalado
  - en su tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este pasaje calendárico, «estación» comunica el tiempo fijado o cíclico mejor que una expresión más general. Mantiene el tono técnico del texto.
- source_word: ይትፌጸም
  english_pob_choice: are completed
  chosen_spanish: se completen
  alternatives_spanish:
  - se cumplan
  - lleguen a completarse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa la terminación de un cómputo de días. «Se completen» respeta el valor de finalización sin añadir matiz teológico no requerido.
- source_word: መዋዕል ፻ወ፸ወ፯
  english_pob_choice: one hundred and seventy-seven days
  chosen_spanish: ciento setenta y siete días
  alternatives_spanish:
  - 177 días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el número completo en forma verbal por estilo literario y claridad. «Días» corresponde al conteo calendárico.
- source_word: በሥርዓተ ሰንበት
  english_pob_choice: by the reckoning of weeks
  chosen_spanish: según el orden de las semanas
  alternatives_spanish:
  - por el cómputo de las semanas
  - según la cuenta de semanas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión etíope es técnica y remite a una secuencia ordenada ligada a las semanas/sábados. «Orden de las semanas» conserva esa estructura sin forzar una paráfrasis.
- source_word: ፳ወ፭ ወ፶፮ ክልኤቱ መዋዕል
  english_pob_choice: twenty-five weeks and two days
  chosen_spanish: veinticinco semanas y dos días
  alternatives_spanish:
  - veinticinco y dos días
  - veintisiete días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual aclaró que «weeks» estaba implícito en la traducción auditada y que el total se entiende como 25 semanas + 2 días. El español lo explicita para evitar ambigüedad y reflejar el cálculo exacto.
theological_decisions:
- issue: Conservar el lenguaje técnico astronómico en lugar de suavizarlo
  english_pob_reading: Retain technical wording ('reckoning,' 'season,' 'sabbath-orderings')
  chosen_spanish_reading: Conservar «menguante», «primera puerta», «estación» y «orden de las semanas»
  alternative_spanish_readings:
  - sustituir por lenguaje más devocional o general
  - normalizar a una descripción menos técnica
  rationale: 1 Enoc 79 pertenece al Libro Astronómico, cuyo estilo es esquemático y calendárico. La traducción española debe preservar esa textura técnica para no diluir el contenido del testimonio ge'ez.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La base inglesa auditada pasó por correcciones importantes: se rectificó ''waning'' frente a ''reckoning'', ''first gate'' frente a ''nights'', y el valor numérico final para evitar un error de OCR. La redacción española sigue la lectura revisada y no la versión previa errónea.'
  spanish_consistency_notes:
  - Se usa «puerta» para el esquema astronómico de las puertas del cielo, coherente con la revisión textual.
  - «Menguante» evita confundir el fenómeno lunar con un cálculo o cuenta.
  - No se introducen notas al pie porque el texto español quedó suficientemente explícito y cada marcador requerido debía estar anclado en el cuerpo del versículo.
