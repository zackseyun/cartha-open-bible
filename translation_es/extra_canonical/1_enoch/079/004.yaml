    text: The phrase rendered 'fifty-four sabbath-orderings' may idiomatically mean 'fifty-four weeks.' The Ge'ez wording is kept more literally here because the exact construction is technical.
    reason: lexical_alternative
  - marker: b
    text: The final numeral sequence is textually difficult in the OCR witness. It may represent a total equivalent to twenty-seven days, but the present translation preserves the more literal wording of the Ethiopic as transmitted here.
    reason: textual_variant
  - marker: c
    text: Or 'And the reckoning'.
    reason: previous_rendering
  - marker: d
    text: Or 'in the nights, from the first'.
    reason: previous_rendering
  - marker: e
    text: Or 'by twenty-five and two days, in fifty-four sabbath-orderings.'.
