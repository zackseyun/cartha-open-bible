translation:
  language: es
  text: 'Y le pregunté al ángel que iba conmigo, que me mostró lo que estaba oculto[a]: «¿Qué son estas cosas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas ocultas» / «lo secreto». El término ge’ez apunta a realidades escondidas hasta que son mostradas en la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ተስእልክዎ
  english_pob_choice: I asked him
  chosen_spanish: le pregunté
  alternatives_spanish:
  - le consulté
  - le inquirí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge’ez expresa el acto de preguntar o inquirir. «Le pregunté» es la forma natural en español y conserva el tono narrativo directo del contexto.
- source_word: መልአክ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico, la figura acompañante funciona claramente como ser celestial revelador; «ángel» preserva mejor ese valor de género que «mensajero».
- source_word: ዘየሐውር ምስሌየ
  english_pob_choice: who went with me
  chosen_spanish: que iba conmigo
  alternatives_spanish:
  - que fue conmigo
  - que caminaba conmigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relación identifica al ángel acompañante. «Iba conmigo» suena natural en español y mantiene la idea de acompañamiento en el recorrido visionario.
- source_word: ዘአርአየኒ
  english_pob_choice: who showed me
  chosen_spanish: que me mostró
  alternatives_spanish:
  - que me reveló
  - que me hizo ver
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: El verbo tiene el sentido de mostrar o hacer ver. «Me mostró» conserva el registro de visión y evita sobrecargar con un término más interpretativo.
- source_word: ኅቡእ
  english_pob_choice: what was hidden
  chosen_spanish: lo que estaba oculto
  alternatives_spanish:
  - las cosas ocultas
  - lo secreto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término remite a realidades ocultas que luego son dadas a ver. «Lo que estaba oculto» preserva la ambigüedad entre singular y plural sin resolverla demasiado pronto.
- source_word: ምንት እሙንቱ እሉ
  english_pob_choice: What are these?
  chosen_spanish: ¿Qué son estas cosas?
  alternatives_spanish:
  - ¿Quiénes son estos?
  - ¿Qué son estas?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demonstrativo apunta a realidades u objetos vistos en la visión. «Estas cosas» evita una lectura personal no exigida por el texto y resulta claro en español.
theological_decisions:
- issue: Realidad revelada y ocultamiento apocalíptico
  english_pob_reading: what was hidden
  chosen_spanish_reading: lo que estaba oculto
  alternative_spanish_readings:
  - las cosas ocultas
  - lo secreto
  rationale: La frase mantiene la tensión apocalíptica entre ocultamiento y revelación, sin convertirla en un tecnicismo ni resolver de más el referente.
  doctrine_reference: Preservar la imaginería apocalíptica y la tensión teológica de la revelación progresiva.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto ge’ez y el auditorio inglés: mantiene al ángel como guía revelador, conserva la ambigüedad de «lo que estaba oculto» y traduce la pregunta final de modo natural en español sin forzar un referente personal.'
  spanish_consistency_notes:
  - Se usa «ángel» por el valor contextual celeste y revelador, no el más genérico «mensajero».
  - Se mantiene una formulación abierta para el objeto oculto, en línea con la nota inglesa sobre realidades escondidas hasta ser mostradas.
  - La puntuación con dos puntos introduce de forma natural la pregunta directa final.
  - El marcador de nota al pie aparece solo en el sintagma afectado y no altera el sentido principal.
