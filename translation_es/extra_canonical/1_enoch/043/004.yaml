  text: 'And he said to me[d][c][b][a], “The Lord of Spirits has shown you their names: these are the names of the holy ones who dwell upon the dry ground and believe in the name of the Lord of Spirits forever and ever.”'
  footnotes:
  - marker: a
    text: The phrase rendered 'with these' is textually and syntactically difficult in the Ethiopic witness. It may also be understood more loosely as 'concerning these.'
    reason: alternative_reading
  - marker: b
    text: '''Dry ground'' is a more literal rendering than ''earth'' or ''land'' and may underscore the contrast between earthly dwellers and heavenly beings in the vision.'
    reason: lexical_alternative
  - marker: c
    text: Or 'trust in the name of the Lord of Spirits.' The Ge'ez verb can carry the sense of believing or trusting.
    reason: lexical_alternative
  - marker: d
    text: 'Or ''those with these: these are their names for the holy ones''.'
