translation:
  language: es
  text: 'Y me dijo: «El Señor de los Espíritus[a] te ha mostrado sus nombres: estos son los nombres de los santos, que habitan sobre la tierra seca[b] y creen[c] en el nombre del Señor de los Espíritus por siempre jamás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Título apocalíptico fijo. Se traduce literalmente para conservar la forma estable del original y no diluirla en una expresión genérica.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «suelo seco» o «tierra seca»; la expresión preserva la imagen concreta del original frente a una generalización como «la tierra».
    reason: lexical_alternative
  - marker: c
    text: La POB inglesa también permite «confían en el nombre»; el verbo ge'ez puede abarcar creer y confiar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይቤለኒ
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Y me habló
  - Y me habló diciendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula narrativa estándar de discurso visionario; en español, «me dijo» conserva la inmediatez del reporte directo sin sobrecargar el texto.
- source_word: ምስለ ዘዚአሆሙ
  english_pob_choice: with these
  chosen_spanish: Y me dijo[a]
  alternatives_spanish:
  - con estas cosas
  - acerca de estas cosas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa más reciente entendió aquí un valor posesivo/relacional vinculado a la explicación de la visión. En español, se mantiene la referencia implícita mediante el marcador y la nota, sin forzar una glosa más interpretativa en el cuerpo.
- source_word: እግዚአ መንፈሳት
  english_pob_choice: Lord of Spirits
  chosen_spanish: Señor de los Espíritus
  alternatives_spanish:
  - Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Título en mayúsculas reverenciales; «Espíritus» conserva la forma estable del título apocalíptico y evita reducirlo a una expresión genérica.
- source_word: አርአየከ
  english_pob_choice: has shown you
  chosen_spanish: te ha mostrado
  alternatives_spanish:
  - te mostró
  - te ha hecho ver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto resulta natural en español para una revelación ya recibida y mantiene el carácter de visión comunicada.
- source_word: እሉ እሙንቱ አስማቲሆሙ
  english_pob_choice: these are their names
  chosen_spanish: 'sus nombres: estos son los nombres'
  alternatives_spanish:
  - 'los nombres de ellos: estos son los nombres'
  - sus nombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia ge'ez repite la idea de «nombres»; el español la conserva explícitamente para reflejar la insistencia lexical del original.
- source_word: ለቅዱሳን
  english_pob_choice: for the holy ones
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los santos pertenecientes a
  - para los santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «santos» es el equivalente más natural y reverente para ቅዱሳን. El genitivo se vuelve «de los» para fluidez, sin eliminar la relación posesiva o identificadora.
- source_word: እለ የኃድሩ ዲበ የብስ
  english_pob_choice: who dwell upon the dry ground
  chosen_spanish: que habitan sobre la tierra seca[c]
  alternatives_spanish:
  - que habitan sobre el suelo seco
  - que viven sobre la tierra seca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tierra seca» conserva la imagen concreta de የብስ (dry ground/land) y evita generalizar a «tierra» sin matiz. Se marca con nota porque la expresión puede también entenderse como «tierra seca» frente a «suelo seco» o incluso «tierra/land» según contexto.
- source_word: ወየአምኑ በስሙ
  english_pob_choice: and believe in the name
  chosen_spanish: y creen[d] en el nombre
  alternatives_spanish:
  - y confían en el nombre
  - y tienen fe en el nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Creen en el nombre» sigue de cerca el giro semítico del original y preserva el peso teológico del «nombre» como objeto de fe/confianza; la nota recoge la alternativa de «confiar» documentada por la POB inglesa.
- source_word: ל/እግዚአ መናፍስት
  english_pob_choice: Lord of Spirits
  chosen_spanish: Señor de los Espíritus
  alternatives_spanish:
  - Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la repetición del título al final del versículo para reflejar la estructura del original y la fórmula reverencial estable.
theological_decisions:
- issue: Identidad de los «santos» que habitan sobre la tierra seca
  english_pob_reading: human holy ones on earth, not heavenly angels
  chosen_spanish_reading: humanos santos sobre la tierra, no ángeles celestiales
  alternative_spanish_readings:
  - ángeles santos
  - una referencia mixta entre seres celestiales y fieles terrestres
  rationale: El modificador «que habitan sobre la tierra seca» y la cláusula «creen en el nombre» orientan la frase hacia fieles humanos en la tierra. La traducción conserva «santos» sin reinterpretar a seres angélicos.
  doctrine_reference: Respetar el sentido local del pasaje y la imaginería apocalíptica sin armonizar indebidamente el vocabulario.
- issue: Sentido del verbo «creer» en la fórmula del nombre
  english_pob_reading: believe in the name / trust in the name
  chosen_spanish_reading: creen en el nombre
  alternative_spanish_readings:
  - confían en el nombre
  - tienen fe en el nombre
  rationale: El texto ge'ez admite tanto creer como confiar. Se deja «creen» en el cuerpo por su claridad y se documenta la alternativa «confiar» en la nota, preservando la tensión semántica.
  doctrine_reference: Evitar estrechar indebidamente la fe a una sola formulación devocional cuando el original es más amplio.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la lectura de la frase inicial y la estructura de la cláusula de «los nombres de los santos». Por eso el texto español evita la antigua lectura errónea tipo «con estas / aquellos con estos» y conserva la repetición de «nombres» en el cuerpo. También se mantuvo la posibilidad semántica de «creer/confiar» y la imagen concreta de «tierra seca».
  spanish_consistency_notes:
  - Se traduce እግዚአ መንፈሳት como «Señor de los Espíritus» de manera consistente con el título apocalíptico.
  - Se usa «santos» para ቅዱሳን como equivalente natural y reverente en español.
  - Se conserva «nombre» en singular para respetar la fuerza teológica de la expresión.
  - La repetición de «nombres» en el texto refleja la repetición lexical del original ge'ez.
