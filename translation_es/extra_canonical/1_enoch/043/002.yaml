    rationale: La idea de fidelidad mutua se expresa de manera más natural en español con pronombre recíproco y «entre sí», sin perder el matiz relacional/cósmico.
  - severity: low
    issue: «su manifestación» puede mantenerse, pero «su aparición» sigue más de cerca el expediente revisado («their appearing»).
    rationale: Ambas son posibles; «aparición» es más directa y menos interpretativa que «manifestación».
