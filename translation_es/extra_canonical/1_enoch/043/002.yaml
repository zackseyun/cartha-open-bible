translation:
  language: es
  text: Y vi las balanzas de la justicia[a], cómo se pesan según sus luces, la anchura de sus lugares y el día de su aparición; y su revolución produce relámpagos, y su revolución es conforme al número de los ángeles, y se guardan fidelidad entre sí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula inicial es difícil. La revisión del ge'ez apunta aquí a balanzas o instrumentos de peso/medición, no a «luminarias».
    reason: textual_variant
  - marker: b
    text: La cláusula final también puede entenderse como que el orden de los cuerpos celestes se mantiene conforme al cómputo de los ángeles, no solo como fidelidad mutua entre ellos.
    reason: alternative_reading
lexical_decisions:
- source_word: መዳልወ
  english_pob_choice: balances
  chosen_spanish: balanzas
  alternatives_spanish:
  - escalas
  - pesos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión reciente corrige un error importante: el término ge''ez aquí no es “luminaries”, sino una imagen de balanza o medida. “Balanzas” conserva el valor concreto y apocalíptico mejor que un equivalente más abstracto.'
- source_word: ጽድቅ
  english_pob_choice: of righteousness
  chosen_spanish: de la justicia
  alternatives_spanish:
  - de la rectitud
  - de la justicia recta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, “justicia” mantiene el genitivo abstracto y el tono solemne del original; además, evita convertir prematuramente la frase en un adjetivo (“justas”).
- source_word: ይደለው
  english_pob_choice: are weighed
  chosen_spanish: son pesadas
  alternatives_spanish:
  - son medidas
  - se pesan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo pide una pasiva de peso/medición. “Son pesadas” refleja bien la imagen de ser sopesadas o valoradas según un criterio cósmico.
- source_word: ብርሃናቲሆሙ
  english_pob_choice: their lights
  chosen_spanish: sus luces
  alternatives_spanish:
  - sus resplandores
  - sus luminarias
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Luces” es la forma más natural en español para el plural concreto del término, sin perder el sentido de luminosidad propia de los cuerpos celestes.
- source_word: ሰረኃበ
  english_pob_choice: the width
  chosen_spanish: la anchura
  alternatives_spanish:
  - la amplitud
  - el ancho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La evidencia revisada apunta a una idea de anchura/expansión. “Anchura” conserva el sustantivo y su relación con lugares asignados.
- source_word: መካናቲሆሙ
  english_pob_choice: the places of their dwelling
  chosen_spanish: sus lugares
  alternatives_spanish:
  - sus lugares de morada
  - sus moradas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el contexto astronómico, “sus lugares” es breve y fiel; la especificación de morada puede sobrecargar una frase que en el original ya es espacial.
- source_word: ዕለተ
  english_pob_choice: day
  chosen_spanish: el día
  alternatives_spanish:
  - los días
  - el tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se conserva el singular tal como lo ofrece la lectura revisada en inglés: una referencia puntual al “día” de su manifestación/aparición.'
- source_word: ክነቶሙ
  english_pob_choice: their appearing
  chosen_spanish: su manifestación
  alternatives_spanish:
  - su aparición
  - su existencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El inglés revisado lo entiende como “appearing”. “Manifestación” comunica la idea de hacerse presente o patente sin reducirlo a un simple evento visible.
- source_word: ሚጠቶሙ
  english_pob_choice: their revolution
  chosen_spanish: su revolución
  alternatives_spanish:
  - su giro
  - su curso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Revolución” es el equivalente más técnico y preciso para el movimiento cíclico/celeste del original. “Giro” o “curso” son posibles, pero menos exactos en este registro.
- source_word: መብረቅ ይወልድ
  english_pob_choice: bring forth lightning
  chosen_spanish: produce relámpagos
  alternatives_spanish:
  - engendra relámpagos
  - dan relámpagos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen verbal admite una salida natural en español. “Produce relámpagos” retiene el sentido causal sin forzar un giro demasiado poético.
- source_word: ኍልቈ
  english_pob_choice: number
  chosen_spanish: el número
  alternatives_spanish:
  - la cuenta
  - la cantidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia es a un orden numerado; por eso se mantiene “número” en una construcción clara y sobria.
- source_word: መላእክት
  english_pob_choice: angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - los mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el marco visionario de 1 Enoc, “ángeles” es la traducción más adecuada y consistente con el contexto celestial.
- source_word: ሃይማኖቶሙ የዓቅቡ
  english_pob_choice: they keep faith
  chosen_spanish: guardan fidelidad
  alternatives_spanish:
  - permanecen fieles
  - mantienen la fidelidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión admite un matiz de fidelidad/fiabilidad mutua. “Guardan fidelidad” conserva ese valor relacional sin imponer una fórmula doctrinal posterior.
- source_word: በበይናቲሆሙ
  english_pob_choice: with one another
  chosen_spanish: unos con otros
  alternatives_spanish:
  - entre sí
  - entre ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Unos con otros” reproduce bien la reciprocidad del idiomático ge'ez y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Identidad de las ‘balanzas de la justicia’
  english_pob_reading: The opening clause describes ordered heavenly weighing/apportioning, not a direct reference to angels or moral persons.
  chosen_spanish_reading: La frase se traduce literalmente como una imagen cósmica de medición y orden.
  alternative_spanish_readings:
  - las luminarias de la justicia
  - los justos balances
  rationale: La revisión crítica muestra que el texto habla de balanzas/medición. La traducción española debe conservar esa imagen sin resolverla alegóricamente.
  doctrine_reference: Preservar la tensión teológica y no homogeneizar el símbolo.
- issue: ‘Su revolución’ y el orden astronómico
  english_pob_reading: The repeated term points to cyclic turning/revolution in the heavenly bodies.
  chosen_spanish_reading: Se mantiene dos veces “su revolución” para reflejar la repetición y el paralelismo del original.
  alternative_spanish_readings:
  - su giro
  - su curso
  rationale: Aunque “giro” o “curso” pueden ser más comunes, “revolución” es más técnico y conserva mejor la imagen astronómica, especialmente con el lenguaje de conteo y relámpago.
  doctrine_reference: Consistencia terminológica en imágenes cosmológicas.
- issue: Relación final de fidelidad mutua
  english_pob_reading: The heavenly entities/cycles are mutually ordered and faithful to one another.
  chosen_spanish_reading: “Guardan fidelidad unos con otros” conserva la lectura de coordinación confiable entre los seres/ciclos celestes.
  alternative_spanish_readings:
  - permanecen fieles entre sí
  - mantienen fidelidad mutua
  rationale: La frase puede sonar relacional o cósmico-administrativa; la traducción debe dejar ambas posibilidades abiertas sin añadir más interpretación de la necesaria.
  doctrine_reference: Preservar alternativas interpretativas documentadas.
translation_notes:
  revision_awareness: 'La traducción española sigue la revisión crítica más reciente del pasaje: corrige la lectura anterior basada en “luminarias” y adopta la interpretación de መዳልወ como “balanzas”, ይደለው como “son pesadas”, y ሰረኃበ como “anchura”. También distingue entre ክነቶሙ (“su manifestación”) y ሚጠቶሙ (“su revolución”), evitando fusionar ambos términos en un solo equivalente.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como término predeterminado solo cuando corresponda; aquí no aparece.
  - “Ángeles” se conserva por el contexto celestial de 1 Enoc.
  - Se evita introducir “Cristo”, “SEÑOR” o fórmulas litúrgicas no presentes en el pasaje.
  - La construcción “unos con otros” mantiene la reciprocidad del cierre sin añadir explicaciones.
  - La puntuación sigue el paralelismo del texto revisado en inglés para preservar el flujo apocalíptico.
