base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/043/002.yaml
  text: And I saw the balances of righteousness[a], how they are weighed according to their lights, the width of their places, and the day of their appearing; and their revolution brings forth lightning, and their revolution is according to the number of the angels[e][d][c][b], and they keep faith with one another.
  footnotes:
  - marker: a
    text: The opening clause is difficult. The Ge'ez likely describes the heavenly luminaries as being divided or apportioned in an ordered way.
    reason: textual_variant
  - marker: b
    text: The repeated temporal term rendered 'seasons' may also be understood as 'times' or 'courses.'
    reason: lexical_alternative
  - marker: c
    text: The final clause may mean either that the heavenly bodies keep faith with one another or that their order is maintained in accordance with the angels' reckoning.
    reason: alternative_reading
  - marker: d
    text: Or 'how the luminaries of righteousness were apportioned, and how the places of their dwelling rested in their lights; and their days'.
    reason: previous_rendering
  - marker: e
    text: Or 'and their seasons bring forth lightning. And their seasons were counted by'.
    reason: previous_rendering
