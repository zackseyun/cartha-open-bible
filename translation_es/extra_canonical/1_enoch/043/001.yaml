    rationale: 'El inglés preserva una rendering anterior concreta: «another thing: the lightning flashes». La nota española actual habla de «los relámpagos» o «los destellos de relámpago», que duplica alternativas léxicas ya cubiertas y pierde el dato editorial relevante.'
  - severity: low
    issue: «y ellos lo oyen» suena un poco más pesado de lo necesario en español.
    rationale: «y lo oyen» mantiene el mismo sentido y mejora la fluidez sin borrar la personificación cósmica.
