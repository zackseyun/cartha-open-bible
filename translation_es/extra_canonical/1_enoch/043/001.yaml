translation:
  language: es
  text: Y vi otros relámpagos y las estrellas del cielo, y vi cómo él los llama a todos por sus nombres respectivos[a][d], y lo oyen[b].[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada uno por su nombre»; la expresión etiópica tiene fuerza distributiva.
    reason: lexical_alternative
  - marker: b
    text: Aquí «oyen» puede implicar también obediencia responsiva.
    reason: lexical_alternative
  - marker: c
    text: 'Una traducción anterior entendió el inicio como: «otra cosa: los destellos de relámpago».'
    reason: previous_rendering
  - marker: d
    text: O «por sus nombres».
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: and I saw
  chosen_spanish: y vi
  alternatives_spanish:
  - y contemplé
  - y miré
  lexicon: Dillmann
  rationale: La fórmula visionaria se conserva de manera natural en español con «y vi», manteniendo el ritmo apocalíptico sin volver el texto arcaico.
- source_word: ካልአ መባርቅተ
  english_pob_choice: other lightnings
  chosen_spanish: otros relámpagos
  alternatives_spanish:
  - otras luces
  - otros rayos
  lexicon: Dillmann
  rationale: El adjetivo etiópico modificado por el plural inanimado se entiende como «otros»; «relámpagos» comunica el fenómeno celeste de manera idiomática en español y evita una traducción demasiado literal o pesada.
- source_word: ወከዋክብተ ሰማይ
  english_pob_choice: and the stars of heaven
  chosen_spanish: y las estrellas del cielo
  alternatives_spanish:
  - y las estrellas del firmamento
  - y las estrellas del cielo
  lexicon: Dillmann
  rationale: «Del cielo» reproduce con claridad la expresión celestial elevada sin introducir un tecnicismo innecesario; en español bíblico, «cielo» mantiene bien el registro apocalíptico.
- source_word: ከመ ይጼውዖሙ
  english_pob_choice: how he calls them
  chosen_spanish: cómo él los llama
  alternatives_spanish:
  - cómo los llama
  - que él los llama
  lexicon: Dillmann
  rationale: La construcción observacional se vierte con «cómo», que refleja el valor de la cláusula y conserva la vividez del testimonio visionario.
- source_word: ለኵሎሙ
  english_pob_choice: them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a cada uno de ellos
  lexicon: Dillmann
  rationale: El alcance totalizador se expresa con un complemento natural en español; el sentido distributivo queda reforzado en la frase siguiente mediante «por sus nombres respectivos».
- source_word: በበአስማቲሆሙ
  english_pob_choice: by their respective names
  chosen_spanish: por sus nombres respectivos
  alternatives_spanish:
  - por sus nombres
  - cada uno por su nombre
  lexicon: Dillmann
  rationale: La reduplicación preposicional expresa una distribución explícita; «respectivos» preserva ese matiz sin forzar una estructura poco española.
- source_word: ወይሰምዕዎ
  english_pob_choice: and they hear him
  chosen_spanish: y ellos lo oyen
  alternatives_spanish:
  - y lo escuchan
  - y le obedecen
  lexicon: Dillmann
  rationale: Se mantiene el sentido básico de «oír» como verbo principal. En este contexto cósmico puede implicar obediencia, pero esa intensificación se deja implícita en vez de volverse interpretación obligatoria.
theological_decisions:
- issue: Cómo traducir la relación entre los cuerpos celestes y la voz divina sin resolverla indebidamente
  english_pob_reading: he calls them all by their respective names, and they hear him
  chosen_spanish_reading: él los llama a todos por sus nombres respectivos, y ellos lo oyen
  alternative_spanish_readings:
  - él los convoca a todos por su nombre, y ellos le obedecen
  - ellos son llamados por nombre y responden
  rationale: La frase conserva la personificación celestial del pasaje y, a la vez, la ambigüedad entre simple audición y obediencia. No se reduce a metáfora ni se explicita una angelología que el texto no obliga a fijar.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: He tenido en cuenta la revisión más reciente que corrigió la sintaxis de ካልአ como adjetivo que modifica directamente el plural de «relámpagos», y la modificación que preserva la fuerza distributiva de በበ como «by their respective names». La redacción española sigue esa adjudicación y mantiene el sentido distributivo sin añadir glosa excesiva en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; aquí no interviene.
  - Se usa «relámpagos» para መባርቅተ en lugar de un calco como «luces», por claridad y fidelidad al fenómeno descrito.
  - La estructura con «y vi... y vi...» conserva el paralelismo narrativo del original.
  - «Sus nombres respectivos» traduce la distribución explícita sin perder naturalidad en español.
  - No se fuerza «obedecen» en el texto principal, porque el verbo base es «oír» y el contexto apocalíptico permite dejar la tensión abierta.
