translation:
  language: es
  text: 'Y este es el comienzo de la palabra de sabiduría que levanté para hablar y decir a los que moran en la tierra seca[a]: Oigan[b], ustedes los primeros, y vean, ustedes los postreros[b][c][d], las palabras santas que hablo delante del Señor de los Espíritus.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los que viven en la tierra». El ge'ez dice más literalmente «en la tierra seca».
    reason: lexical_alternative
  - marker: b
    text: «Los primeros» y «los postreros» probablemente aluden a generaciones anteriores y posteriores, conservando una convocatoria amplia a través del tiempo.
    reason: cultural_note
  - marker: c
    text: O «en presencia del Señor de los Espíritus».
    reason: lexical_alternative
  - marker: d
    text: O «la palabra del Santo que hablaré».
    reason: previous_rendering
lexical_decisions:
- source_word: ወዝ
  english_pob_choice: And this is
  chosen_spanish: Y este es
  alternatives_spanish:
  - Y esto es
  - Y estas son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Funciona como inicio demostrativo y encabezado solemne; en español, «Y este es» conserva la apertura discursiva sin sonar rígida.
- source_word: ርእሱ
  english_pob_choice: the beginning
  chosen_spanish: el comienzo
  alternatives_spanish:
  - el principio
  - la cabeza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido idiomático es el inicio de la declaración, no una «cabeza» literal; «el comienzo» comunica bien la estructura del pasaje.
- source_word: ነገረ ጥበብ
  english_pob_choice: the word of wisdom
  chosen_spanish: la palabra de sabiduría
  alternatives_spanish:
  - el dicho de sabiduría
  - el discurso de sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la formulación singular y elevada. «Palabra de sabiduría» mantiene el paralelismo con el audit trail inglés y el registro sapiencial.
- source_word: ዘአንሣእኩ እትናገር [እብል]
  english_pob_choice: that I lifted up to speak and say
  chosen_spanish: que levanté para hablar y decir
  alternatives_spanish:
  - que alcé para hablar y decir
  - que proclamé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Levanté» conserva la imagen de elevar/proclamar. Mantener los dos verbos ayuda a reflejar la intensificación retórica del original.
- source_word: ለእለ ይነድሩ ውስተ የብስ
  english_pob_choice: to those who dwell on the dry land
  chosen_spanish: a los que moran en la tierra seca
  alternatives_spanish:
  - a los que viven en la tierra
  - a los habitantes de la tierra firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta de «tierra seca» que refleja literalmente የብስ, sin aplanarla de entrada a «tierra» o «mundo».
- source_word: ስምዑ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Oíd
  - Escuchen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperativo solemne y plural, natural en español bíblico contemporáneo y apto para una audiencia amplia.
- source_word: ቀደምት
  english_pob_choice: you former ones
  chosen_spanish: ustedes los primeros
  alternatives_spanish:
  - ustedes los de antes
  - ustedes los antiguos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Los primeros» transmite la referencia a generaciones anteriores y mantiene el contraste con «los postreros».
- source_word: ወርእዩ ደኃርያን
  english_pob_choice: and see, you latter ones
  chosen_spanish: y vean, ustedes los postreros
  alternatives_spanish:
  - y vean, ustedes los últimos
  - y miren, ustedes los que vienen después
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Postreros» refleja la oposición temporal al igual que el inglés POB; es comprensible en registro bíblico y conserva la amplitud generacional.
- source_word: ነገረ ቅዱሰ
  english_pob_choice: the holy words
  chosen_spanish: las palabras santas
  alternatives_spanish:
  - las santas palabras
  - la palabra santa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada indica pluralidad y adjetivo concordante; por eso se traduce en plural. «Santas» preserva el valor cualitativo de ቅዱሰ sin convertirlo en título nominal.
- source_word: ቅድመ እግዚአ መንፈሳት
  english_pob_choice: before the Lord of Spirits
  chosen_spanish: delante del Señor de los Espíritus
  alternatives_spanish:
  - en presencia del Señor de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título divino característico de 1 Enoc. «Delante de» conserva la relación espacial/ceremonial y es un giro bíblico natural en español.
theological_decisions:
- issue: Título divino «Lord of Spirits»
  english_pob_reading: The Lord of Spirits
  chosen_spanish_reading: el Señor de los Espíritus
  alternative_spanish_readings:
  - el Señor de los espíritus
  rationale: Se conserva el título propio del libro y su mayúscula reverencial en español. No se sustituye por un equivalente más tradicional que borre la especificidad enóquica.
  doctrine_reference: Mantener títulos divinos del texto base sin armonizarlos con formulaciones eclesiales ajenas al pasaje.
- issue: Alcance de «los que moran en la tierra seca»
  english_pob_reading: Human inhabitants of the earth in general, rendered concretely as 'dry land'
  chosen_spanish_reading: seres humanos convocados con la imagen concreta de la tierra seca
  alternative_spanish_readings:
  - habitantes de la tierra
  - los que viven en el mundo
  rationale: La imagen de la tierra seca se mantiene por fidelidad al original, pero el contexto muestra una convocatoria humana general; el español no debe borrar esa concreción.
  doctrine_reference: Preferir imaginería transparente del texto fuente y dejar que el contexto delimite el referente.
- issue: Pluralidad de «holy words»
  english_pob_reading: the holy words that I speak
  chosen_spanish_reading: las palabras santas que hablo
  alternative_spanish_readings:
  - la palabra santa que hablo
  rationale: La revisión gramatical del ge'ez favorece el plural. El español debe reflejar esa pluralidad para no neutralizar una tensión textual ya resuelta por el audit trail.
  doctrine_reference: Respetar la decisión textual y gramatical documentada, sin volver a una lectura singular no sustentada.
translation_notes:
  revision_awareness: El audit trail en inglés fue revisado para corregir una lectura anterior singular («the word of the Holy One») hacia la lectura gramaticalmente mejor sustentada («the holy words»). También se mantuvo la imagen concreta de «dry land» y el título divino propio «Lord of Spirits». La traducción española sigue esa revisión y evita volver a la lectura singular descartada.
  spanish_consistency_notes:
  - Se usa «Señor de los Espíritus» de forma consistente con el título enóquico del inglés POB.
  - Se prefirió «palabra de sabiduría» y «palabras santas» para reflejar la tensión entre singular discursivo y plural gramatical sin fusionarlos indebidamente.
  - «Tierra seca» preserva la imagen concreta del ge'ez; la nota aclara la alternativa idiomática.
  - El registro es bíblico contemporáneo, evitando arcaísmos innecesarios como «oíd» salvo que el contexto requiriera una forma más litúrgica.
