  glossary_alignment: Se conserva correctamente 'Señor de los Espíritus' como título fijo de 1 Enoc. No hay conflicto con los defaults Yahvé/Mesías. La decisión 'lo que he recibido' sigue la revisión inglesa auditada, aunque el expediente conserva ambigüedad léxica; por ello es apropiado mantener una nota explicativa. La mayúscula en 'Espíritus' como parte del título es defendible.
