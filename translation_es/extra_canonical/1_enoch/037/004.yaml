translation:
  language: es
  text: Hasta ahora, no se me había dado[a] ante el Señor de los Espíritus[b] lo que he recibido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La relación entre ''dado'' y ''recibido'' es deliberadamente tensa en el texto de base: el ge''ez puede entenderse con un verbo de recibir, mientras que la tradición inglesa auditada conservó también la idea de algo no concedido previamente.'
    reason: theological_note
  - marker: b
    text: Se conserva el título apocalíptico propio del libro. 'Espíritus' va en mayúscula por tratarse de un título divino, no de una referencia genérica a espíritus.
    reason: theological_note
lexical_decisions:
- source_word: እስከ፡ ይእዜ፡
  english_pob_choice: Until now
  chosen_spanish: Hasta ahora
  alternatives_spanish:
  - Hasta este momento
  - Hasta el día de hoy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa con naturalidad el valor temporal de límite que marca que la concesión no había ocurrido antes del momento presente.
- source_word: ኢተውህበኒ፡
  english_pob_choice: it had not been given to me
  chosen_spanish: no me había sido dado
  alternatives_spanish:
  - no se me había concedido
  - no me había sido otorgado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo con sufijo de primera persona se rinde mejor en español con una construcción pasiva/reflexiva que conserva la idea de algo otorgado o concedido al hablante.
- source_word: እምቅድመ፡
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: Dillmann, Lexicon Linguae Aethiopicæ
  rationale: La locución ge'ez tiene un matiz espacial/cortés de presencia delante de alguien; 'delante de' mantiene mejor ese registro que un simple 'ante' en esta frase.
- source_word: እግዚአ፡ መንፈሳት፡
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de Espíritu[s]
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título divino característico de 1 Enoc con mayúsculas reverenciales en 'Espíritus', siguiendo su valor titular y no una referencia común.
- source_word: ዘነሣእኩ፡
  english_pob_choice: what I have taken up
  chosen_spanish: lo que he recibido
  alternatives_spanish:
  - lo que he tomado
  - lo que he levantado
  - lo que he pronunciado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa más reciente trata ነሣእኩ como 'have received', y esa lectura evita introducir un objeto no explicitado en el ge'ez. En español, 'lo que he recibido' mantiene la ambigüedad sin forzar una interpretación concreta.
theological_decisions:
- issue: Tensión entre 'dado' y 'recibido' en el final de la cláusula
  english_pob_reading: it had not been given to me ... what I have received
  chosen_spanish_reading: no me había sido dado ... lo que he recibido
  alternative_spanish_readings:
  - no me había sido dado ... lo que había recibido
  - no me había sido concedido ... lo que he recibido
  rationale: 'La frase ge''ez preserva una relación semántica entre dar/recibir. En español se mantiene esa tensión sin resolverla de modo explicativo: algo no había sido dado al hablante antes, y eso mismo es presentado como ''lo que he recibido''.'
  doctrine_reference: Preservar la tensión lexical del original; primacía del testimonio textual sobre la armonización interpretativa.
- issue: Título divino específico 'Lord of Spirits'
  english_pob_reading: the Lord of Spirits
  chosen_spanish_reading: el Señor de los Espíritus
  alternative_spanish_readings:
  - el Señor de los espíritus
  - el Señor de Espíritu
  rationale: Se conserva el título apocalíptico tradicional del libro, evitando sustituirlo por fórmulas litúrgicas más comunes que borrarían su carácter propio.
  doctrine_reference: Respeto al título divino distintivo de 1 Enoc y a su carga teológica propia.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la versión inglesa para reflejar mejor el valor de ነሣእኩ como 'recibir'. Por eso el español evita 'he tomado' y adopta 'lo que he recibido', mientras conserva la estructura de no haber sido dado previamente.
  spanish_consistency_notes:
  - Se usa 'Señor' para el título divino fijo 'Lord' y 'Espíritus' en mayúscula por tratarse de un nombre/título, no por ocultamiento del nombre divino.
  - Se evita 'SEÑOR' como convención de reemplazo; aquí el título no es YHWH sino el título apocalíptico propio del texto.
  - La sintaxis busca ser readable en español sin perder la ambigüedad textual del final.
