- from: La segunda visión de la sabiduría que vio Enoc, hijo de Jared, hijo de Mahalalel, hijo de Cainán, hijo de Enós, hijo de Set, hijo de Adán.
  to: La segunda visión de sabiduría que vio Enoc, hijo de Jared, hijo de Mahalalel, hijo de Cainán, hijo de Enós, hijo de Set, hijo de Adán.
  rationale: Se corrige 'de la sabiduría' a 'de sabiduría' para reflejar mejor el sentido caracterizador del original y sonar natural en español. Se mantiene la genealogía completa con la fórmula repetida 'hijo de', y no se añaden notas porque las alternativas del inglés no exigen aclaración adicional en español para esta versión.
