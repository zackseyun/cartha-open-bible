translation:
  language: es
  text: La segunda visión de sabiduría que vio Enoc, hijo de Jared, hijo de Mahalalel, hijo de Cainán, hijo de Enós, hijo de Set, hijo de Adán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ራእይ
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - revelación
  - aparición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este encabezado apocalíptico, "visión" conserva el registro revelatorio mejor que "aparición" y no desplaza el sentido hacia una explicación doctrinal ajena al texto.
- source_word: ካልእ
  english_pob_choice: second
  chosen_spanish: segunda
  alternatives_spanish:
  - otra
  - segunda/otra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un encabezado de secuencia, el adjetivo funciona como marcador ordinal dentro de las visiones; "segunda" comunica mejor esa función que el más ambiguo "otra".
- source_word: ጥበብ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez remite normalmente a sabiduría; mantenerlo evita diluir el rasgo característico de la visión que el encabezado destaca.
- source_word: ራእየ
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - vio
  - contempló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo simple de percepción se vierte de manera natural como "vio"; "contempló" sería más literario, pero menos directo y más interpretativo.
- source_word: ወልደ
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula genealógica repetida se conserva literalmente para respetar la presentación exacta del linaje en el encabezado.
- source_word: ሄኖክ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Henoc
  lexicon: standard transliteration
  rationale: Se usa la forma española reconocible y estándar del nombre propio, manteniendo transparencia con el testimonio ge'ez.
- source_word: ያሬድ
  english_pob_choice: Jared
  chosen_spanish: Jared
  alternatives_spanish:
  - Yared
  lexicon: standard transliteration
  rationale: La forma tradicional en español coincide con el nombre bíblico reconocible y conserva la identificación genealógica.
- source_word: መላልኤል
  english_pob_choice: Mahalalel
  chosen_spanish: Mahalalel
  alternatives_spanish:
  - Mahalaleel
  - Melelel
  lexicon: standard transliteration
  rationale: Se preserva la forma convencional más reconocible, sin normalizarla hacia otra tradición textual.
- source_word: ቃይናን
  english_pob_choice: Cainan
  chosen_spanish: Cainán
  alternatives_spanish:
  - Kenan
  - Qainán
  lexicon: standard transliteration
  rationale: La transliteración española habitual de esta forma del testimonio ge'ez es "Cainán", cercana al valor transmitido y fácil de reconocer en contexto genealógico.
- source_word: ሄኖስ
  english_pob_choice: Enos
  chosen_spanish: Enós
  alternatives_spanish:
  - Enosh
  lexicon: standard transliteration
  rationale: La forma española bíblica es clara y mantiene la línea genealógica sin introducir una normalización ajena al testimonio.
- source_word: ሴት
  english_pob_choice: Seth
  chosen_spanish: Set
  alternatives_spanish:
  - Sete
  lexicon: standard transliteration
  rationale: Se adopta la forma bíblica española breve y reconocible del nombre propio.
- source_word: አዳም
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - Adam
  lexicon: standard transliteration
  rationale: La forma española consagrada es "Adán" y comunica inmediatamente la genealogía primeva.
theological_decisions:
- issue: Encabezado genealógico completo hasta Adán
  english_pob_reading: Retain the full genealogy down to Adam in the main text.
  chosen_spanish_reading: Mantener la genealogía completa hasta Adán en el texto principal.
  alternative_spanish_readings:
  - Omitir parte de la genealogía para aligerar la frase
  - Normalizar los nombres a otra tradición
  rationale: La genealogía forma parte de la autopresentación literaria de la visión y enmarca a Enoc dentro de la historia primeva; debe conservarse íntegra.
  doctrine_reference: Translation philosophy §Original-language primacy; §Transliterate names
- issue: Relación entre "segunda" y "visión de sabiduría"
  english_pob_reading: Second vision of wisdom
  chosen_spanish_reading: La segunda visión de la sabiduría
  alternative_spanish_readings:
  - La otra visión de la sabiduría
  - La visión segunda de sabiduría
  rationale: El ge'ez permite un matiz secuencial; "segunda" respeta la posible organización del conjunto sin borrar la tensión semántica de "otra/segunda".
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión reciente detectó correctamente que el ge'ez contiene una frase appositiva con 'segunda visión' y luego 'visión de sabiduría'; la redacción española adopta una solución fluida que mantiene ese contenido sin duplicación innecesaria ni pérdida del elemento secuencial.
  spanish_consistency_notes:
  - Se mantiene un español neutral y bíblico sin calcos innecesarios.
  - Los nombres propios se españolizan en formas reconocibles y coherentes con la tradición bíblica hispana.
  - No se incluyen notas al pie porque el texto final no requiere ambigüedad adicional marcada en el verso breve.
