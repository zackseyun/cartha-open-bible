translation:
  language: es
  text: Es mejor hablar a los primeros,[a] pero tampoco a los últimos les negaremos el comienzo de la sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El etiópico de este versículo es difícil. La traducción sigue la lectura que entiende un contraste entre «los primeros» y «los últimos», y el verbo en la segunda cláusula como «no negar» o «no retener».
    reason: textual_variant
lexical_decisions:
- source_word: ይኄይስ
  english_pob_choice: It is better
  chosen_spanish: Es mejor
  alternatives_spanish:
  - Conviene más
  - Es preferible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico se entiende aquí como valoración comparativa, no como género literario. En español, «Es mejor» reproduce con naturalidad ese juicio de conveniencia o superioridad.
- source_word: ብሂል
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - hablar de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El infinitivo etiópico funciona como verbo de habla. «Hablar» es la opción más directa y sobria para un registro bíblico en español.
- source_word: ቀዳሚ
  english_pob_choice: former ones
  chosen_spanish: los primeros
  alternatives_spanish:
  - los anteriores
  - los primeros de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopic(a)e
  rationale: El contexto contrasta un grupo inicial con otro posterior. «Los primeros» conserva la referencia relacional sin introducir una explicación ajena al texto.
- source_word: ደኃርያንሂ
  english_pob_choice: latter ones
  chosen_spanish: los últimos
  alternatives_spanish:
  - los posteriores
  - los de después
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La contraposición con «los primeros» pide un equivalente correlativo en español. «Los últimos» mantiene la oposición temporal/relacional con claridad.
- source_word: ኢንከልእ
  english_pob_choice: we will not withhold
  chosen_spanish: no les ocultaremos
  alternatives_spanish:
  - no les negaremos
  - no se lo rehusaremos
  - no les rehusaremos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura corregida del audit trail apunta a «no retener/ocultar/denegar». En español, «ocultar» transmite la idea de no reservar o esconder la enseñanza, sin forzar una construcción demasiado literal.
- source_word: ርእሳ
  english_pob_choice: beginning
  chosen_spanish: comienzo
  alternatives_spanish:
  - principio
  - inicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo etiópico literalmente puede rozar «cabeza», pero aquí el sentido asumido por el audit trail es el de apertura o inicio de la enseñanza. «Comienzo» es natural y conserva el matiz de apertura.
- source_word: ለጥበብ
  english_pob_choice: of wisdom
  chosen_spanish: de la sabiduría
  alternatives_spanish:
  - de la sabiduría divina
  - del saber
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sabiduría» respeta el campo sapiencial del término y su registro elevado. El artículo en español es necesario para fluidez idiomática.
theological_decisions:
- issue: 'Relación entre grupos: primeros y últimos'
  english_pob_reading: It is better to speak to the former ones, but even from the latter ones we will not withhold the beginning of wisdom.
  chosen_spanish_reading: Es mejor hablar a los primeros, pero ni siquiera a los últimos les ocultaremos el comienzo de la sabiduría.
  alternative_spanish_readings:
  - Es mejor hablar a los anteriores, pero tampoco a los posteriores les negaremos el comienzo de la sabiduría.
  - Conviene más hablar a los primeros, pero aun a los últimos no les rehusaremos el comienzo de la sabiduría.
  rationale: El audit trail corregido muestra una contraposición entre dos grupos, no una nota sobre un «primer parable». La traducción española debe conservar esa tensión relacional y temporal sin resolverla interpretativamente. Por eso se mantiene la oposición «primeros/últimos» y el sentido de no retener la enseñanza.
  doctrine_reference: Preservar la tensión textual y evitar una paráfrasis doctrinalizante o armonizadora.
- issue: Sentido de «beginning of wisdom»
  english_pob_reading: the beginning of wisdom
  chosen_spanish_reading: el comienzo de la sabiduría
  alternative_spanish_readings:
  - el principio de la sabiduría
  - la apertura de la sabiduría
  rationale: La frase puede referirse al inicio de la instrucción sapiencial más que a una doctrina abstracta. «Comienzo» mantiene la ambigüedad útil entre inicio textual y comienzo de enseñanza, sin sobreinterpretar.
  doctrine_reference: Preferir una equivalencia transparente cuando el Ge'ez es difícil y el sentido permanece parcialmente incierto.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una corrección importante frente a una lectura previa errónea: ይኄይስ no significa «parábola», sino «es mejor»; ብሂል corresponde a un verbo de habla; y ኢንከልእ expresa «no retener/ocultar/denegar». La versión española adopta esa lectura revisada y evita la interpretación anterior, manteniendo el contraste entre dos grupos y la idea de no ocultar el inicio de la sabiduría.'
  spanish_consistency_notes:
  - Se usa «sabiduría» para ጥበብ, conforme al campo sapiencial.
  - 'Se prefieren formas naturales de español bíblico moderno: «Es mejor», «hablar», «no les ocultaremos».'
  - Se evita «Mesías», «Cristo» u այլ terminología no pertinente.
  - La nota textual se ancla en el contraste textual real del verso, no en la revisión descartada de «parábola».
