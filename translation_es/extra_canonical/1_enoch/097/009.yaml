translation:
  language: es
  text: Y ahora hagamos lo que planeamos[a], porque hemos reunido plata, y hemos llenado nuestros almacenes como agua[b][c], y muchos son los trabajadores de nuestras casas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que pensamos» o «lo que ideamos». El verbo geʽez puede abarcar tanto pensar como planear.'
    reason: lexical_alternative
  - marker: b
    text: «Como agua» es una comparación literal. Probablemente expresa abundancia o plenitud desbordante.
    reason: cultural_note
  - marker: c
    text: El término aquí traducido como «trabajadores» también puede referirse de manera más específica a trabajadores agrícolas; persiste cierta incertidumbre en esta cláusula.
    reason: lexical_alternative
lexical_decisions:
- source_word: ንግበር
  english_pob_choice: let us do
  chosen_spanish: hagamos
  alternatives_spanish:
  - hagámoslo
  - vamos a hacer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El jussivo/cohortativo de primera persona plural se expresa naturalmente en español con un exhortativo inclusivo; 'hagamos' preserva el impulso de autoexhortación del discurso.
- source_word: ዘኀለይነ
  english_pob_choice: what we planned
  chosen_spanish: lo que planeamos
  alternatives_spanish:
  - lo que pensamos
  - lo que ideamos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede abarcar pensar o planear. En este contexto de presunción y proyecto de los ricos, 'planeamos' comunica mejor la intención deliberada que un simple 'pensamos'.
- source_word: ብሩረ
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata acuñada
  - dinero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término concreto es 'silver'; en español, 'plata' conserva el valor material y la imaginería de riqueza sin reducirlo a un abstracto 'dinero'.
- source_word: አስተጋባእነ
  english_pob_choice: we have gathered
  chosen_spanish: hemos reunido
  alternatives_spanish:
  - hemos acumulado
  - hemos recogido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica juntar o traer junto; 'hemos reunido' es claro y mantiene el sentido de acumulación sin exceder el original.
- source_word: መዛግብቲነ
  english_pob_choice: our storehouses
  chosen_spanish: nuestros almacenes
  alternatives_spanish:
  - nuestros graneros
  - nuestros tesoros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo apunta a lugares de depósito/guardado. 'Almacenes' reproduce bien esa imagen física de depósitos llenos, mientras que 'tesoros' podría espiritualizar o desplazar el matiz.
- source_word: ከመ ማይ
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - como si fuera agua
  - como agua desbordante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación debe quedar literal para preservar la imagen extraña pero vívida de abundancia desbordante.
- source_word: ሐራስተ
  english_pob_choice: laborers
  chosen_spanish: trabajadores
  alternatives_spanish:
  - jornaleros
  - labradores
  - peones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término puede referirse a trabajadores agrícolas más que a 'farmers' en sentido estricto. 'Trabajadores' mantiene amplitud y claridad en español sin estrechar indebidamente el campo semántico.
- source_word: አብያቲነ
  english_pob_choice: our houses
  chosen_spanish: nuestras casas
  alternatives_spanish:
  - nuestras familias
  - nuestros hogares
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma literal es 'casas'. Dado el contexto de riqueza y servidumbre, 'casas' puede abarcar hogares/linajes/propiedades sin forzar una interpretación más específica.
theological_decisions:
- issue: Tono arrogante de los hablantes ricos en un contexto de denuncia
  english_pob_reading: Render the line as a boastful self-exhortation rather than neutral narration.
  chosen_spanish_reading: 'Mantenerlo como una autoexhortación jactanciosa: ''Y ahora hagamos lo que planeamos''.'
  alternative_spanish_readings:
  - Y ahora haremos lo que pensamos
  - Y ahora vamos a hacer lo que decidimos
  rationale: La escena forma parte de una amonestación apocalíptica contra los ricos impíos; el español debe conservar el tono de seguridad soberbia sin añadir moralización extra ni volver el enunciado neutral.
  doctrine_reference: Preservar la retórica de juicio apocalíptico sin aplanarla en prosa descriptiva.
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que reemplazó una formulación más estrecha ('farmhands of our estates') por otra más cercana al original ('laborers of our houses'). La redacción española sigue esa lectura más abierta y literal, evitando estrechar 'casas' en 'estados/haciendas' y evitando también un equivalente demasiado técnico.
  spanish_consistency_notes:
  - Se mantuvo 'plata' para ብሩረ, en línea con la decisión léxica inglesa de conservar el metal concreto.
  - Se evitó 'Señor' u otro equivalente confesional porque no hay aquí lenguaje divino; el verso es discurso humano de orgullo material.
  - '''Casas'' se conserva de forma literal, pero con nota para reflejar el posible alcance de hogares o propiedades sin imponer una expansión interpretativa.'
