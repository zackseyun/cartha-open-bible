translation:
  language: es
  text: '¡Ay de ustedes, los que adquieren plata y oro no por justicia[a], y dicen: «Nos hemos hecho ricos con riqueza, y hemos adquirido posesiones, y hemos adquirido todo lo que deseábamos»!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «no en justicia»; la frase puede describir tanto el modo de adquirir la riqueza como el carácter moral más general de la ganancia.
    reason: alternative_reading
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de vosotros!
  lexicon: Dillmann
  rationale: Conserva la fórmula profética de denuncia y su fuerza de juicio. «Ay de ustedes» es natural en español actual y mantiene el tono oracular.
- source_word: ታጠርዩ
  english_pob_choice: heap up
  chosen_spanish: adquieren
  alternatives_spanish:
  - amontonan
  - acumulan
  - recogen
  lexicon: Dillmann
  rationale: El contexto inmediato exige el sentido de obtener/acumular riqueza. «Adquieren» es amplio y se adapta bien al paralelismo con አጥረይነ; «amontonan» sería más imagético pero menos neutro.
- source_word: ብሩረ ወወርቀ
  english_pob_choice: silver and gold
  chosen_spanish: plata y oro
  alternatives_spanish:
  - plata y oro fino
  - dinero y oro
  lexicon: Dillmann
  rationale: Reproduce literalmente el par de metales preciosos y evita una generalización innecesaria.
- source_word: ዘአኮ በጽድቅ
  english_pob_choice: not by righteousness
  chosen_spanish: no por justicia
  alternatives_spanish:
  - no en justicia
  - no con rectitud
  - no por rectitud
  lexicon: Dillmann
  rationale: «Justicia» comunica de modo natural la categoría ética y jurídica de ጽድቅ en español. La opción también deja abierta la tensión entre el modo de adquirir y la calidad moral del lucro, sin borrar la ambigüedad documentada.
- source_word: ትብሉ
  english_pob_choice: say
  chosen_spanish: dicen
  alternatives_spanish:
  - afirman
  - declaran
  lexicon: Dillmann
  rationale: Verbo de habla simple y directo para introducir el orgullo citado.
- source_word: ብዕልነ
  english_pob_choice: we have become rich
  chosen_spanish: nos hemos hecho ricos
  alternatives_spanish:
  - hemos enriquecido
  - hemos prosperado
  - somos ricos
  lexicon: Dillmann
  rationale: Expresa un estado alcanzado como resultado de una acumulación previa, manteniendo el matiz de cambio de condición.
- source_word: ብዕለ
  english_pob_choice: with wealth
  chosen_spanish: con riqueza
  alternatives_spanish:
  - con abundancia
  - con bienes
  lexicon: Dillmann
  rationale: Mantiene la repetición interna del original entre el estado de riqueza y el sustantivo abstracto asociado. No se elimina la redundancia retórica.
- source_word: ወኮነ ለነ ንዋይ
  english_pob_choice: and we have acquired possessions
  chosen_spanish: y hemos adquirido posesiones
  alternatives_spanish:
  - y las posesiones se nos han dado
  - y la riqueza ha llegado a ser nuestra
  - y tenemos bienes
  lexicon: Dillmann
  rationale: La revisión del audit trail muestra que esta cláusula debe conservarse. «Hemos adquirido posesiones» es suficientemente literal y fluido en español, sin diluir el contenido de posesión material.
- source_word: አጥረይነ
  english_pob_choice: we have acquired
  chosen_spanish: hemos adquirido
  alternatives_spanish:
  - hemos amasado
  - hemos reunido
  lexicon: Dillmann
  rationale: Se mantiene la repetición deliberada del verbo de adquisición para respetar la retórica del verso.
- source_word: ኵሎ ዘፈቀድነ
  english_pob_choice: everything we desired
  chosen_spanish: todo lo que deseamos
  alternatives_spanish:
  - todo lo que queríamos
  - todo lo que anhelábamos
  lexicon: Dillmann
  rationale: Preserva el totalizador «todo» y el campo semántico del deseo/will con una formulación natural en español.
theological_decisions:
- issue: Render ጽድቅ in a denunciation of unjust wealth
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: En este contexto, el contraste apunta al modo moralmente recto o no recto de obtener riqueza. «Justicia» es una traducción sobria y bíblica en español, y no borra la dimensión ética del término. Se mantiene la ambigüedad de si describe el método de adquisición o la cualidad moral del beneficio.
  doctrine_reference: 'Translation philosophy: contested terms table, δικαιοσύνη → justice / righteousness'
translation_notes:
  revision_awareness: 'El audit trail inglés corrige una omisión importante: la cláusula «and we have possessions» debe conservarse. Por eso el español incluye explícitamente «y hemos adquirido posesiones». También respeta la repetición verbal del original y no reduce los tres reclamos de riqueza a dos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «justicia» para ጽድቅ por coherencia con el tratamiento proyectual de términos éticos, sin borrar la posible lectura de «rectitud».
  - Se mantuvo la repetición de «hemos adquirido» para reflejar el énfasis retórico del texto ge'ez.
  - No se empleó «Cristo/Mesías» ni vocabulario técnico adicional que no pertenece al verso.
