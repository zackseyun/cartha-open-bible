translation:
  language: es
  text: ¿Qué harán ustedes, pecadores, y adónde huirán en aquel día de juicio, cuando oigan la voz[a] de la oración de los justos[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sonido de la oración de los justos». El término ge'ez puede significar «voz», «sonido» o «palabra»; aquí se ha preferido «voz» por el matiz intercesor y apocalíptico del pasaje.
    reason: lexical_alternative
  - marker: b
    text: O «el sonido de la oración».
    reason: previous_rendering
lexical_decisions:
- source_word: ምንተ፡ ትገብሩ
  english_pob_choice: What will you do
  chosen_spanish: ¿Qué harán ustedes?
  alternatives_spanish:
  - ¿Qué van a hacer?
  - ¿Qué harán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pregunta retórica en futuro expresa desafío e inminencia judicial. En español, «¿Qué harán ustedes?» conserva el tono profético sin sonar artificial, y evita un presente que debilitaría la carga escatológica.
- source_word: ኃጥኣን
  english_pob_choice: you sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - ustedes, pecadores
  - los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El vocativo ya está marcado por el contexto y por el pronombre sujeto en el verbo. «Pecadores» funciona de modo natural como apelación directa; el pronombre «ustedes» se mantiene por la forma verbal plural y la confrontación profética.
- source_word: አይቴ፡ ትጐይዩ
  english_pob_choice: where will you flee
  chosen_spanish: ¿adónde huirán
  alternatives_spanish:
  - ¿adónde correrán
  - ¿adónde escaparán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Huirán» comunica mejor que «correrán» la idea de escape desesperado ante el juicio. «Adónde» conserva la dirección de fuga y suena más idiomático en español que una traducción literal más rígida.
- source_word: በይእቲ፡ ዕለት
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - para aquel día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión apocalíptica se mantiene con «en aquel día», que es natural en español bíblico y conserva la distancia escatológica del original.
- source_word: እንተ፡ ጽነፄ
  english_pob_choice: of judgment
  chosen_spanish: de juicio
  alternatives_spanish:
  - de condena
  - de castigo
  - de condenación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto, el sustantivo apunta al acto judicial y punitivo final. «Juicio» preserva esa amplitud sin forzar más allá del original.
- source_word: ሶበ፡ ትሰምዑ
  english_pob_choice: when you hear
  chosen_spanish: cuando oigan
  alternatives_spanish:
  - cuando escuchen
  - cuando oigan ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula temporal con futuro se vierte de manera fluida en español con subjuntivo/futuro de referencia contextual. «Oigan» mantiene la relación con la percepción auditiva del texto.
- source_word: ቃለ፡ ጸሎቶሙ፡ ለጻድቃን
  english_pob_choice: the voice of the prayer of the righteous
  chosen_spanish: la voz de la oración de los justos
  alternatives_spanish:
  - el sonido de la oración de los justos
  - la voz de la oración de los rectos
  - la palabra de la oración de los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez ቃል puede ser «voz», «sonido» o «palabra». Dado el marco apocalíptico y la personificación de la oración escuchada, «voz» es la mejor opción en español; «oración» conserva el sentido intercesor del complemento. «Justos» mantiene la categoría moral-jurídica del plural sustantivado.
theological_decisions:
- issue: Naturaleza de la oración de los justos en la escena de juicio
  english_pob_reading: The verse depicts the sinners hearing the voice of the prayer of the righteous as part of the judicial reversal on the day of judgment.
  chosen_spanish_reading: El versículo presenta a los pecadores oyendo la voz de la oración de los justos dentro de la inversión judicial del día del juicio.
  alternative_spanish_readings:
  - '...oyendo el clamor de los justos'
  - '...oyendo la voz con que los justos oran'
  rationale: Se conserva la referencia explícita a la «oración» porque el ge'ez la nombra directamente; no se diluye en un mero «clamor» ni se sustituye por una paráfrasis. Esto mantiene la tensión teológica de una intercesión que es escuchada y que forma parte del juicio.
  doctrine_reference: Preservar la primacía del original y no resolver la imagen apocalíptica más allá de lo que el texto dice.
- issue: Valor semántico de ቃል/qāl en este contexto
  english_pob_reading: The English audit trail preferred 'voice' over 'sound' or 'word'.
  chosen_spanish_reading: «voz»
  alternative_spanish_readings:
  - sonido
  - palabra
  rationale: Aunque ቃል puede abarcar «voz», «sonido» o «palabra», en español «voz» conserva mejor la idea de una oración que clama y es oída. «Sonido» reduce la personificación; «palabra» desplaza el foco del acto de orar.
  doctrine_reference: Mantener la tensión léxica sin banalizarla ni interpretarla de antemano.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el ajuste de revisión que corrigió una duplicación accidental en el borrador inglés y mantuvo «voice of the prayer of the righteous» como la solución preferida. La presente versión española sigue esa decisión y la vierte con una construcción natural: «la voz de la oración de los justos».'
  spanish_consistency_notes:
  - Se mantiene «justos» para traducir el plural sustantivado con fuerza moral-jurídica.
  - Se usa «juicio» en singular para reflejar el día escatológico de rendición de cuentas.
  - «Huirán» conserva el valor de escape urgente preferido por el audit trail inglés.
  - No se introduce «Cristo», «SEÑOR» ni otros equivalentes tradicionales no requeridos por el texto.
  - La puntuación sigue el registro bíblico contemporáneo en español, con pregunta retórica completa y cláusula temporal bien integrada.
