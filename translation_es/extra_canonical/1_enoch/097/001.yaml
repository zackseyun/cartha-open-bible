    rationale: La nota sobre «vergüenza» solo enumera sinónimos y no resuelve una ambigüedad significativa del texto fuente. Puede conservarse, pero no es necesaria. Si se mantiene, conviene enfocarla como matiz de «oprobio/deshonra».
  revised_spanish_text: Confíen[a], justos, porque los pecadores llegarán a ser una vergüenza[b], y perecerán en el día de la iniquidad.
