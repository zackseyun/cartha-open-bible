translation:
  language: es
  text: Confíen[a], justos, porque los pecadores llegarán a ser una vergüenza[b], y perecerán en el día de la iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El imperativo puede entenderse también como «Tengan confianza» o «Crean»; se eligió «Confíen» por su amplitud semántica y porque conserva la exhortación sin añadir un objeto explícito.
    reason: lexical_alternative
  - marker: b
    text: O «un oprobio» o «una deshonra»; la idea es que los pecadores llegarán a un estado de vergüenza pública y reproche.
    reason: lexical_alternative
lexical_decisions:
- source_word: ተአመኑ
  english_pob_choice: Trust
  chosen_spanish: Confíen
  alternatives_spanish:
  - Tengan confianza
  - Crean
  - Confíen en Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo plural expresa confianza/exhortación. «Confíen» conserva el tono de exhortación y la amplitud semántica de trust sin añadir un objeto explícito que el ge'ez no menciona.
- source_word: ጻድቃን
  english_pob_choice: you righteous
  chosen_spanish: ustedes, los justos
  alternatives_spanish:
  - los justos
  - ustedes, los rectos
  - ustedes, los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma es vocativa y plural. «Ustedes, los justos» mantiene el llamado directo mejor que un sintagma nominal impersonal.
- source_word: ለጽእለት
  english_pob_choice: a disgrace
  chosen_spanish: una vergüenza
  alternatives_spanish:
  - una deshonra
  - un oprobio
  - una vergüenza pública
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase señala un estado o destino de oprobio. «Vergüenza» comunica de manera natural en español la idea de degradación pública y juicio.
- source_word: ይከውኑ
  english_pob_choice: will become
  chosen_spanish: llegarán a ser
  alternatives_spanish:
  - serán
  - pasarán a ser
  - vendrán a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene matiz de llegar a ser o convertirse en. «Llegarán a ser» preserva mejor el resultado/transformación que un simple «serán».
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los impíos
  - los transgresores
  - los malos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la designación moral-religiosa estándar en contexto de juicio. «Los pecadores» mantiene el contraste con «los justos».
- source_word: ወይትሐጕሉ
  english_pob_choice: they will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - desaparecerán
  - morirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión adjudicada corrige la lectura: el verbo deriva de la raíz de destruir/perder. «Perecerán» es fiel, sobrio y no sobreinterpreta el modo de destrucción.'
- source_word: በዕለተ፡ ዓመፃ
  english_pob_choice: on the day of iniquity
  chosen_spanish: en el día de la iniquidad
  alternatives_spanish:
  - en el día de la maldad
  - en el día de la injusticia
  - en el día de la impiedad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La adjudicación corrige «violence» a «iniquity/lawlessness». «Iniquidad» conserva el registro bíblico y jurídico-moral del original.
theological_decisions:
- issue: Cómo traducir el imperativo inicial sin añadir un objeto explícito
  english_pob_reading: Trust
  chosen_spanish_reading: Confíen
  alternative_spanish_readings:
  - Crean
  - Tengan confianza
  rationale: El texto exhorta a los justos en un contexto escatológico. «Confíen» preserva la confianza/fe implícita sin introducir «en Dios» u otro complemento no expresado en el ge'ez.
  doctrine_reference: Preservar la tensión lexical entre confianza y fe sin explicitar más de lo que dice el texto.
- issue: Término de juicio para el destino de los pecadores
  english_pob_reading: will perish
  chosen_spanish_reading: perecerán
  alternative_spanish_readings:
  - serán destruidos
  - serán arruinados
  rationale: La revisión textual confirma el valor de destrucción/perdición del verbo. «Perecerán» mantiene la dureza apocalíptica sin suavizarla.
  doctrine_reference: Juicio escatológico y retribución moral.
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz de la adjudicación más reciente: se descartó la lectura «serán entregados» y se adoptó «perecerán», y se corrigió el valor de ዓመፃ de «violencia» a «iniquidad». La redacción española evita depender de la traducción inglesa previa y sigue el valor confirmado del ge''ez.'
  spanish_consistency_notes:
  - Se mantiene «los justos» / «los pecadores» como contraste moral estable.
  - Se evita «SEÑOR» y no hay nombre divino en este versículo.
  - «Iniquidad» conserva el registro técnico-moral frecuente en traducciones bíblicas y encaja con el juicio apocalíptico del texto.
