translation:
  language: es
  text: 'Y ustedes llegarán a ser como ellos[a], contra quienes esta palabra[b] dará testimonio: «Han llegado a ser compañeros[c] de pecadores».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «semejantes a ellos» o «igual que ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «este dicho», «esta declaración» o «este asunto».'
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como «asociados de pecadores» o «asociados con pecadores».
    reason: lexical_alternative
lexical_decisions:
- source_word: ትከውኑ
  english_pob_choice: you will become
  chosen_spanish: llegaréis a ser
  alternatives_spanish:
  - seréis
  - os convertiréis en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa un cambio de estado futuro. «Llegaréis a ser» conserva mejor ese matiz procesual que un simple «seréis» y evita volverlo demasiado interpretativo.
- source_word: ከማሆሙ
  english_pob_choice: like them
  chosen_spanish: como ellos
  alternatives_spanish:
  - semejantes a ellos
  - igual que ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación es directa y breve. «Como ellos» es natural en español y mantiene la equivalencia comparativa sin añadir énfasis no presente en el Ge'ez.
- source_word: ሰማዕተ ይከውን
  english_pob_choice: against whom this word will be a witness
  chosen_spanish: contra quienes esta palabra será testimonio
  alternatives_spanish:
  - de quienes esta palabra dará testimonio
  - contra quienes esta palabra será testigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige la lectura a «testimonio/testigo» en sentido judicial. En español, «será testimonio» conserva la fuerza forense de la expresión y evita la falsa lectura de simple ‘oír’.
- source_word: ዝንቱ ነገር
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este dicho
  - esta declaración
  - este asunto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta fórmula acusatoria, «palabra» funciona bien en español y mantiene la concisión del original. «Dicho» o «declaración» son posibles, pero menos directos aquí.
- source_word: ሱቱፋነ
  english_pob_choice: companions
  chosen_spanish: compañeros
  alternatives_spanish:
  - asociados
  - compañeros con
  - socios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Compañeros» reproduce la relación de asociación sin forzar un tecnicismo. En este contexto, comunica bien la cercanía moral/social implicada por el pasaje.
- source_word: ለኃጥኣን
  english_pob_choice: of sinners
  chosen_spanish: de pecadores
  alternatives_spanish:
  - con pecadores
  - entre pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pecadores» es la forma más natural y bíblica en español para ኃጥኣን. Se conserva la pertenencia/relación expresada por la construcción, sin cerrar indebidamente la ambigüedad asociativa.
theological_decisions:
- issue: Fuerza judicial del testimonio
  english_pob_reading: this word will be a witness against them
  chosen_spanish_reading: esta palabra será testimonio contra ellos
  alternative_spanish_readings:
  - esta palabra testificará contra ellos
  - esta palabra será testigo contra ellos
  rationale: La corrección del audit trail exige preservar el valor forense del enunciado. «Será testimonio» mantiene la imagen de acusación judicial sin convertirla en una paraphrase explicativa.
  doctrine_reference: Preservar la tensión textual y la imagen de testimonio judicial en lugar de neutralizarla.
- issue: Relación moral con los pecadores
  english_pob_reading: you will become like them ... you have become companions of sinners
  chosen_spanish_reading: llegaréis a ser como ellos ... habéis llegado a ser compañeros de pecadores
  alternative_spanish_readings:
  - seréis como ellos ... sois compañeros de pecadores
  - llegaréis a ser semejantes a ellos ... habéis llegado a ser asociados de pecadores
  rationale: 'El verso conserva una advertencia ética: el grupo se vuelve semejante a los pecadores por asociación. «Compañeros de pecadores» retiene el vínculo social sin resolverlo en una doctrina más amplia que el texto no formula.'
  doctrine_reference: Mantener el alcance local del pasaje y no expandirlo más allá de su advertencia moral.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección crítica del audit trail: la lectura previa de ሰማዕተ como ‘heard’ fue rechazada; la frase debe reflejar el valor de ‘witness/testimony’ y su fuerza judicial.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se evitó «Cristo» porque no corresponde a este versículo.
  - Se mantuvo un registro forense con «testimonio» para el valor de ሰማዕተ.
  - «Pecadores» se eligió como equivalente bíblico natural para ኃጥኣን.
  - El tono busca ser publicable y reverente sin arcaísmos innecesarios.
