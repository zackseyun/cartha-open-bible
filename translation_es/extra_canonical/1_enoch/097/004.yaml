review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la corrección principal del audit trail: ሰማዕተ se entiende en sentido forense como «testimonio» y no como «se oye». También conserva bien la estructura de advertencia: «llegaréis a ser como ellos» y la acusación citada sobre la asociación con pecadores. Sin embargo, «contra quienes esta palabra será testimonio» suena menos natural y menos directo en español que «contra quienes esta palabra dará testimonio» o «será un testimonio», y «llegaréis» introduce voseo peninsular innecesario para un objetivo latinoamericano neutral.'
  spanish_quality_summary: 'El texto es claro y digno, pero necesita una ligera normalización de registro para español latinoamericano neutral. «Llegarán a ser»/«llegarán a ser» no sirve por persona; la mejor reparación es «llegarán a ser» no corresponde al sujeto, así que «llegarán» no aplica. Para segunda persona plural ampliamente eclesial y neutral, «llegarán» sería incorrecto; conviene evitar la forma peninsular con una construcción impersonal del destinatario no es posible aquí. La opción más natural y panhispánica en traducción bíblica para un plural de destinatarios es «ustedes llegarán a ser», pero eso altera el registro. Mejor: «Y llegarán a ser» tampoco vale. Por tanto, la reparación mínima y clara es mantener la segunda plural pero con una formulación más natural en el predicado judicial: «contra quienes esta palabra dará testimonio». Además, «compañeros con» como nota alternativa es poco idiomático; debe ser «compañeros de pecadores», «compañeros con pecadores» o mejor «asociados
    con pecadores».'
  glossary_alignment: No hay términos del glosario maestro especialmente activados aquí (no aparece Yahvé, Mesías, etc.). «Pecadores», «palabra» y «testimonio» están bien alineados con las decisiones léxicas documentadas. La principal mejora es idiomática en español y en la formulación de la nota léxica sobre asociación.
  issues:
  - severity: medium
    issue: «contra quienes esta palabra será testimonio» es gramatical, pero poco idiomático en español bíblico corriente
    rationale: 'La fuerza judicial del Ge''ez se preserva mejor con una formulación verbal natural como «dará testimonio contra ellos» o nominal con artículo: «será un testimonio contra ellos». La redacción actual suena algo forzada.'
  - severity: low
    issue: Forma «llegaréis» marcada como peninsular frente al objetivo latinoamericano neutral
    rationale: Aunque comprensible, el proyecto pide español neutral latinoamericano. La segunda persona plural heredada puede tolerarse en citas bíblicas, pero aquí conviene reducir rasgos regionales si se puede hacer sin reestructuración excesiva.
  - severity: low
    issue: Nota c usa «compañeros con», expresión poco natural
    rationale: Como alternativa léxica, «compañeros con» no suena idiomático. «compañeros de pecadores», «compañeros con pecadores» o mejor «asociados con pecadores» expresa mejor la ambigüedad de asociación.
  revised_spanish_text: 'Y ustedes llegarán a ser como ellos[a], contra quienes esta palabra[b] dará testimonio: «Han llegado a ser compañeros[c] de pecadores».'
