    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor para adecuar el español al objetivo latinoamericano neutral y mejorar la naturalidad de la cláusula judicial sin alterar el sentido auditado. «Ustedes llegarán a ser» evita el voseo peninsular de «llegaréis», y «esta palabra dará testimonio» expresa con mayor claridad e idiomaticidad la fuerza forense de ሰማዕተ. También se corrige la alternativa de nota «compañeros con», que no es natural en español.
