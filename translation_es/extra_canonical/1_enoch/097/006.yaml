translation:
  language: es
  text: Y se leerán todas las palabras[a] de vuestra iniquidad delante del Gran Santo, y vuestros rostros serán avergonzados, y toda obra fundada en iniquidad[b] será rechazada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «todos los asuntos de vuestra iniquidad», si ነገረ se toma en un sentido más amplio que «palabras».'
    reason: lexical_alternative
  - marker: b
    text: 'También puede traducirse: «toda obra hecha en iniquidad será desechada» o «arrojada»; el verbo sugiere algo establecido o asentado, pero la matización exacta es incierta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይትነበብ
  english_pob_choice: shall be read out
  chosen_spanish: se leerán
  alternatives_spanish:
  - serán leídos
  - se proclamarán
  - se recitarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto judicial de revelación pública, español natural exige una pasiva refleja. 'Se leerán' conserva la idea de exposición pública sin volver la frase pesada o artificial.
- source_word: ኵሉ ነገረ
  english_pob_choice: all the words
  chosen_spanish: todos los dichos
  alternatives_spanish:
  - todas las palabras
  - todos los asuntos
  - todo lo dicho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገረ puede significar 'palabra', 'asunto' o 'cosa'. Dado que el verbo es 'serán leídos', 'dichos' mantiene la referencia a contenidos verbalmente registrados y suena más natural en español que una literalidad rígida.
- source_word: ዓመፃክሙ
  english_pob_choice: your lawlessness
  chosen_spanish: vuestra iniquidad
  alternatives_spanish:
  - vuestro pecado
  - vuestra maldad
  - vuestra injusticia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez tiene fuerza moral-judicial amplia, y en español 'iniquidad' conserva ese peso de culpa grave y desorden contra Dios sin reducirlo solo a violencia física.
- source_word: ቅድመ ዐቢይ ቅዱስ
  english_pob_choice: before the Great Holy One
  chosen_spanish: delante del Grande y Santo
  alternatives_spanish:
  - ante el Grande y Santo
  - delante del Gran Santo
  - ante el Gran Santo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título divino apocalíptico, pero en español 'Grande y Santo' suena más idiomático y reverente que una calca rígida. 'Delante de' mantiene la escena forense de exposición ante el juez divino.
- source_word: ይትኀፈር ገጽክሙ
  english_pob_choice: your faces shall be put to shame
  chosen_spanish: vuestros rostros serán puestos en vergüenza
  alternatives_spanish:
  - vuestros rostros serán avergonzados
  - vuestras caras serán puestas en vergüenza
  - seréis avergonzados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez expresa la vergüenza del rostro como portador visible de deshonra. 'Rostros' conserva la imaginería concreta, y 'puestos en vergüenza' evita añadir la metáfora de cubrir que no está en el original.
- source_word: ይገደፍ
  english_pob_choice: shall be rejected
  chosen_spanish: será rechazada
  alternatives_spanish:
  - será arrojada
  - será desechada
  - será descartada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el juicio, el énfasis es la repudiación de la obra malvada. 'Rechazada' comunica veredicto y exclusión sin sugerir una destrucción que el verbo no exige.
- source_word: ተግባረ
  english_pob_choice: deed
  chosen_spanish: obra
  alternatives_spanish:
  - acto
  - deed
  - acción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Obra'' funciona bien para un acto moral concreto y mantiene la resonancia ética del pasaje. En español bíblico es claro y digno.'
- source_word: ዘጸንዐ በዓመፃ
  english_pob_choice: that is founded in lawlessness
  chosen_spanish: que esté fundada en iniquidad
  alternatives_spanish:
  - que esté establecida en iniquidad
  - que haya sido hecha en iniquidad
  - que esté arraigada en iniquidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fundada en'' refleja el sentido de estar establecida o asentada sobre una base moral corrupta. ''Iniquidad'' mantiene coherencia con la primera cláusula y evita debilitar la fuerza judicial del texto.'
theological_decisions:
- issue: Título divino ዐቢይ ቅዱስ en un contexto de juicio apocalíptico
  english_pob_reading: the Great Holy One
  chosen_spanish_reading: el Grande y Santo
  alternative_spanish_readings:
  - el Gran Santo
  - el Grande Santo
  - el Grande y el Santo
  rationale: El pasaje presenta una designación reverente de Dios en un tribunal escatológico. Se conserva el valor titular sin expandir el texto con elementos ajenos. La coordinación 'y' ayuda a transmitir ambos atributos sin perder la unidad del título.
  doctrine_reference: Mantener la imaginería apocalíptica y el carácter judicial del pasaje; no neutralizar el título divino ni sustituirlo por una fórmula litúrgica no atestiguada.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje ya revisado en el audit trail: se evitó la imagen incorrecta de ''cubiertos con vergüenza'' y se conservó la triple secuencia judicial: lectura pública, vergüenza de los rostros y rechazo de toda obra fundada en iniquidad. La forma española procura ser fiel al original ge''ez y al ajuste revisado del inglés POB.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como término por defecto solo cuando aparezca el nombre divino explícito; aquí el texto usa un título reverencial, por lo que se tradujo como 'el Grande y Santo'.
  - Se optó por 'iniquidad' para sostener la carga moral-judicial del ge'ez ዓመፃ en toda la cláusula.
  - '''Rostros'' reproduce la imagen corporal del original y su valor de deshonra pública.'
  - No se introdujo una metáfora de cobertura de vergüenza, ya corregida en el audit trail inglés.
