review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del ge''ez y la línea principal del POB inglés: lectura pública de las acusaciones, vergüenza pública y rechazo judicial de las obras fundadas en iniquidad. Conserva correctamente la alternativa léxica de ነገረ y la nota sobre la cláusula final. Sin embargo, hay dos desajustes importantes: el título divino ዐቢይ ቅዱስ se volvió ''del Grande y Santo'', que añade una conjunción no presente y pierde la forma titular unitaria documentada; y ''vuestros rostros serán puestos en vergüenza'' es demasiado calcado y poco natural en español.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero varias elecciones suenan rígidas o poco idiomáticas: ''dichos'' aquí no funciona tan bien como ''palabras''; ''del Grande y Santo'' resulta extraño como título divino; y ''serán puestos en vergüenza'' es una construcción forzada. Una revisión ligera puede conservar la precisión y mejorar mucho la legibilidad.'
  glossary_alignment: 'No hay conflicto con los términos de proyecto mayores como Yahvé/Mesías. Sí conviene alinear mejor con la decisión auditada sobre el título divino: ''el Gran Santo'' o mejor ''el Gran Santo'' como título unitario sin añadir ''y''. También conviene mantener la fuerza judicial de ዓመፃ con ''iniquidad'' o ''maldad''; ''iniquidad'' es aceptable aquí.'
  issues:
  - severity: medium
    issue: Título divino 'del Grande y Santo'
    rationale: El ge'ez y la auditoría inglesa favorecen un título unitario ('the Great Holy One'), no una coordinación añadida con 'y'. En español, 'del Grande y Santo' además suena menos natural y menos claramente titular.
  - severity: medium
    issue: '''vuestros rostros serán puestos en vergüenza'' suena calcado'
    rationale: Aunque intenta respetar la imaginería del rostro, la formulación es poco idiomática en español. 'vuestros rostros serán avergonzados' conserva la referencia al rostro y comunica mejor el sentido pasivo documentado.
  - severity: low
    issue: '''dichos'' para ኵሉ ነገረ es menos claro que ''palabras'''
    rationale: La auditoría inglesa optó por 'words' por la imagen de cargos leídos públicamente. En español bíblico general, 'palabras' comunica mejor esa imagen que 'dichos', que puede sonar coloquial o sentencioso.
  revised_spanish_text: Y se leerán todas las palabras[a] de vuestra iniquidad delante del Gran Santo, y vuestros rostros serán avergonzados, y toda obra fundada en iniquidad[b] será rechazada.
