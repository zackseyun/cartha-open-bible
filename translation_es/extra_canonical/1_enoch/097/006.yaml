  - marker: b
    text: 'También puede traducirse: «toda obra hecha en iniquidad será desechada» o «arrojada»; el verbo sugiere algo establecido o asentado, pero la matización exacta es incierta.'
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene el sentido fuente y las alternativas documentadas, pero mejora tres puntos: (1) restituye el título divino como unidad sin añadir una conjunción ausente; (2) reemplaza una construcción española calcada por una forma natural y fiel para la vergüenza del rostro; y (3) usa ''palabras'' en vez de ''dichos'' para reflejar mejor la imagen forense de algo leído públicamente.'
