  yaml_path: translation/extra_canonical/1_enoch/097/006.yaml
  text: And all the words of your lawlessness shall be read out before the Great Holy One[a], and your faces shall be put to shame[c][b], and every deed that is founded in lawlessness shall be rejected.
  footnotes:
