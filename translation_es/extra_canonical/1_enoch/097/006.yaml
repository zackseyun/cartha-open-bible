revisions:
- from: Y se leerán todos los dichos[a] de vuestra iniquidad delante del Grande y Santo, y vuestros rostros serán puestos en vergüenza, y toda obra que esté fundada en iniquidad[b] será rechazada.
  to: Y se leerán todas las palabras[a] de vuestra iniquidad delante del Gran Santo, y vuestros rostros serán avergonzados, y toda obra fundada en iniquidad[b] será rechazada.
  rationale: 'La revisión mantiene el sentido fuente y las alternativas documentadas, pero mejora tres puntos: (1) restituye el título divino como unidad sin añadir una conjunción ausente; (2) reemplaza una construcción española calcada por una forma natural y fiel para la vergüenza del rostro; y (3) usa ''palabras'' en vez de ''dichos'' para reflejar mejor la imagen forense de algo leído públicamente.'
  reviewer_model: gpt-5.4
