review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del ge''ez: fórmula temporal apocalíptica, oraciones que llegan al Señor, y venida de días de juicio para los impíos. Sin embargo, se aparta innecesariamente del rastro POB al pasar de plural a singular en «la oración», y también endurece una opción léxica que el inglés preserva como «holy ones» al poner «santos» en el texto principal en vez de dejar esa alternativa en nota.'
  spanish_quality_summary: 'El español es claro y digno, pero conviene ajustar dos puntos para mayor fidelidad y legibilidad POB: usar plural «las oraciones» para reflejar el sujeto plural explícito, y preferir «los santos/consagrados» no como texto principal sino una forma que preserve mejor la ambigüedad local. Además, para español más natural conviene reemplazar «vuestro/vosotros» por «su/ustedes» dado el objetivo de español neutro latinoamericano.'
  glossary_alignment: 'No hay conflicto con terminología de proyecto en cuanto a «Señor», ya que la fuente no exige el nombre divino Yahvé aquí. El problema principal es terminológico-contextual: el inglés POB eligió «holy ones» precisamente para evitar asociaciones eclesiales posteriores; en español, «los santos» como texto principal inclina más de la cuenta esa lectura. «Los consagrados» sería demasiado raro; «los santos» puede quedar como alternativa en nota. Mejor texto principal: «los santos/los consagrados» no es elegante; la opción más fiel y legible es «los santos[a]» solo si la nota explica la literalidad «los santos/los seres santos», pero eso sigue sin reflejar la preferencia POB. Por ello propongo «los santos[a]» no; mejor «los consagrados[a]» tampoco. La solución más equilibrada en español es «los santos[a]» con nota mejorada, pero dado el criterio POB de preservar «holy ones», la revisión mínima más defendible es corregir el plural y el voseo, manteniendo la nota fortalecida.
    Aun así, señalo esta tensión como issue medio.'
  issues:
  - severity: medium
    issue: «la oración» traduce un plural explícito
    rationale: El ge'ez y el inglés POB tienen «the prayers». El singular colectivo suena natural, pero reduce un matiz importante de pluralidad corporativa que el audit trail quiso conservar.
  - severity: medium
    issue: Uso de «los santos» en el texto principal estrecha la ambigüedad de «holy ones»
    rationale: El rastro léxico-teológico inglés prefirió «holy ones» para evitar asociaciones eclesiales posteriores. En español no hay equivalente perfecto, pero la nota debe dejar más claro que el término es literalmente más amplio que «santos».
  - severity: low
    issue: «vuestro/vosotros» no encaja bien con el objetivo de español neutro latinoamericano
    rationale: Aunque es comprensible y solemne, suena peninsular/litúrgico. «su juicio… sobre ustedes» mantiene dignidad y mejora la neutralidad regional.
