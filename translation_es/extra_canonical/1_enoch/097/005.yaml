translation:
  language: es
  text: Y en aquellos días las oraciones de los santos[a] llegarán al Señor, y los días de su juicio[b] vendrán sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los santos». El término ge'ez significa literalmente «de los santos» o «de los seres santos/consagrados»; también puede entenderse de manera más amplia como «los consagrados» o «los santos» en sentido no eclesiástico.
    reason: lexical_alternative
  - marker: b
    text: La frase final es textualmente difícil en este testimonio. Probablemente alude a los días venideros de rendición de cuentas o castigo para los impíos a quienes se dirige el pasaje.
    reason: textual_variant
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquellos tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la fórmula apocalíptica temporal y el valor repetitivo de «días» sin volverlo una paráfrasis más vaga como «tiempos».
- source_word: ትበጽኅ ጸሎቶሙ
  english_pob_choice: the prayers ... will reach
  chosen_spanish: la oración ... llegará
  alternatives_spanish:
  - las oraciones ... llegarán
  - la oración ... alcanzará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa llegada o alcance de un destino; «llegará» mantiene la imagen de la oración que asciende hasta Dios. Se usa singular colectivo para un español natural, sin perder la idea corporativa.
- source_word: ለቅዱሳን
  english_pob_choice: of the holy ones
  chosen_spanish: de los santos[a]
  alternatives_spanish:
  - de los santos hombres
  - de los consagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «santos» comunica de forma natural el campo semántico de «holy ones» y permite una nota que preserve la alternativa lexical sin imponer la lectura eclesiástica posterior.
- source_word: ኀበ እግዚእ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - ante el Señor
  - hacia el Señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Al Señor» expresa dirección hacia una persona y es idiomático en español para la oración ascendente, manteniendo la imagen de acceso hacia Dios.
- source_word: ይበጽሕ መዋዕለ ኵነክሙ
  english_pob_choice: the days of your judgment will come upon you
  chosen_spanish: los días de vuestro juicio[b] vendrán sobre vosotros
  alternatives_spanish:
  - los días de vuestro castigo vendrán sobre vosotros
  - los días de vuestro juicio os alcanzarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura del sustantivo es difícil en este testimonio, pero el contexto apunta a un juicio adverso o ajuste de cuentas. «Juicio» conserva esa fuerza judicial sin decidir excesivamente entre condena, castigo o destrucción.
theological_decisions:
- issue: Identidad de «los santos» / ቅዱሳን
  english_pob_reading: the holy ones refers to the righteous/faithful whose petitions rise to God
  chosen_spanish_reading: «los santos» conserva la ambigüedad entre los justos fieles y una categoría más amplia de seres consagrados, sin fijarla innecesariamente
  alternative_spanish_readings:
  - los justos
  - los fieles
  - los santos hombres
  rationale: El contexto de lamentos y represalia sugiere a los justos oprimidos, pero el término queda deliberadamente abierto en la tradición de este pasaje. Mantener «santos» evita resolver una tensión que la fuente no resuelve de manera explícita.
  doctrine_reference: Preservar la tensión interpretativa local; no armonizar con una categoría eclesial posterior.
- issue: Naturaleza de «vuestro juicio» como evento futuro adverso
  english_pob_reading: likely refers to the coming days of reckoning or punishment for the addressed wicked
  chosen_spanish_reading: «vuestro juicio» se entiende como un juicio venidero adverso, de rendición de cuentas o condena
  alternative_spanish_readings:
  - vuestro castigo
  - vuestra condena
  - vuestro ajuste de cuentas
  rationale: El Ge'ez es textual y semánticamente difícil en esta línea. «Juicio» conserva la ambivalencia entre acto judicial y resultado punitivo, y permite que el lector perciba la dureza escatológica sin sobreespecificar.
  doctrine_reference: Mantener la tensión textual; no cerrar la lectura en una sola opción más estrecha de lo que la evidencia permite.
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del control cruzado: no se requieren cambios respecto del análisis base. Se mantuvo la fórmula temporal apocalíptica, la imagen de la oración que llega al Señor y la lectura difícil de la cláusula final como juicio venidero adverso.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí el equivalente correcto por el contexto es «Señor».
  - Se prefirió «santos» como equivalente natural de ቅዱሳን, con nota para preservar la alternativa «los santos» como glosa literal.
  - «Juicio» se mantuvo para no reducir la ambigüedad de la línea final a «castigo» o «destrucción».
  - La puntuación y el registro buscan un español bíblico moderno, digno y legible.
