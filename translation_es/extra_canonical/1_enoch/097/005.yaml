revisions:
- from: Y en aquellos días la oración de los santos[a] llegará al Señor, y los días de vuestro juicio[b] vendrán sobre vosotros.
  to: Y en aquellos días las oraciones de los santos[a] llegarán al Señor, y los días de su juicio[b] vendrán sobre ustedes.
  rationale: Se corrige «la oración» a «las oraciones» para reflejar el plural de la fuente y del POB inglés, y se adapta «vuestro/vosotros» a «su/ustedes» por neutralidad latinoamericana. Se conserva «los santos» por ser la opción española más natural disponible, pero se fortalece la nota para preservar la amplitud semántica de «holy ones» documentada en el audit trail.
