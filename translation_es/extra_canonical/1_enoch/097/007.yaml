translation:
  language: es
  text: ¡Ay de ustedes, pecadores, que están en medio del mar y sobre la tierra seca[a], y cuyo recuerdo[b] es malo contra ustedes!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La combinación «en medio del mar y sobre la tierra seca» probablemente funciona como una imagen totalizadora: abarca a quienes viven o se desplazan en cualquier lugar.'
    reason: cultural_note
  - marker: b
    text: La cláusula final es difícil. También puede entenderse como «su memoria es mala», «su memorial es malo» o «un mal recuerdo se aferra a ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de vosotros!
  - ¡Ay de ustedes, pecadores!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro ge'ez introduce una denuncia profética de juicio. En español, «¡Ay de ustedes!» conserva ese tono de amenaza oracular sin sonar tan mecánico como «¡Ay» solo ni tan solemne como una calca rígida.
- source_word: ለክሙ
  english_pob_choice: to you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Después de una exclamación de ay, el dativo se expresa naturalmente en español con «de ustedes» en la fórmula «¡Ay de…!», que transmite el destinatario del juicio.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - sinners
  - personas pecadoras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pecadores» es el equivalente directo y plenamente natural en español para la categoría moral bajo condena.
- source_word: ማእከለ ባሕር
  english_pob_choice: in the midst of the sea
  chosen_spanish: en medio del mar
  alternatives_spanish:
  - en el medio del mar
  - en medio del océano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase espacial se traduce de forma bastante literal, pero con «mar» en vez de una expansión interpretativa. «En medio del mar» mantiene la imagen vívida del original.
- source_word: ወዲበ የብስ
  english_pob_choice: and upon the dry land
  chosen_spanish: y sobre la tierra seca
  alternatives_spanish:
  - y sobre la tierra
  - y sobre el suelo seco
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tierra seca» conserva el contraste marcado con el mar. Aunque «tierra» bastaría en español, el adjetivo mantiene la oposición totalizadora que resalta el texto.
- source_word: ዝክርሙ
  english_pob_choice: your memory
  chosen_spanish: su memoria
  alternatives_spanish:
  - su recuerdo
  - su rememoración
  - su memoria de ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez es difícil y puede aludir a memoria, recuerdo o memorial. Se eligió «memoria» porque coincide con la revisión inglesa final y preserva la ambigüedad sin resolverla en exceso.
- source_word: እኩይ
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - maligna
  - mala/impía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «mala» suena más natural junto a «memoria» y evita una dureza innecesaria. Aun así, conserva el juicio negativo del original; no se suaviza la carga moral.
- source_word: ዴቤክሙ
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - respecto de ustedes
  - sobre ustedes
  - hacia ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma final es difícil en el testimonio ge'ez. «Contra ustedes» mantiene la fuerza adversativa/judicial indicada por el audit trail inglés y deja abierta la precisión exacta del sintagma.
theological_decisions:
- issue: La imagen totalizadora de mar y tierra
  english_pob_reading: The pairing 'in the midst of the sea and upon the dry land' likely functions as a totalizing image, extending the denunciation everywhere people dwell or travel.
  chosen_spanish_reading: La pareja «en medio del mar y sobre la tierra seca» funciona como una imagen totalizadora de alcance universal.
  alternative_spanish_readings:
  - en cualquier lugar, en el mar o en tierra
  - por todas partes, sobre mar y tierra
  rationale: Se conserva la imagen concreta sin convertirla en una paráfrasis explicativa. Así, el lector percibe que el juicio abarca todo espacio habitado o transitado, como indica el contexto auditado.
  doctrine_reference: Mantener la fuerza retórica del texto apocalíptico sin diluirla en explicación interpretativa.
- issue: Sentido de la cláusula final sobre la memoria
  english_pob_reading: whose memory is evil against you
  chosen_spanish_reading: cuya memoria es mala contra ustedes
  alternative_spanish_readings:
  - cuya memoria es mala
  - cuya memoria es mala respecto de ustedes
  - cuyo recuerdo es malo contra ustedes
  rationale: La cláusula es textual y léxicamente difícil. La traducción conserva la tensión sin decidir de más si se trata de memoria, recuerdo o memorial. «Contra ustedes» retiene la orientación adversativa/judicial del audit trail.
  doctrine_reference: Preservar la tensión léxica y no resolver prematuramente una lectura incierta.
translation_notes:
  revision_awareness: Se siguió el paquete fuente ge'ez y el rastro auditado en inglés. La versión inglesa revisó una alternativa previa de 'remembrance' a 'memory'; en español se optó por 'memoria' para reflejar esa decisión final y, al mismo tiempo, mantener la ambigüedad del cierre. La cláusula final se conservó con una sintaxis transparente pero no sobreexplicada, dado que el testimonio ge'ez es difícil en ese punto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto solo cuando el texto la exija; aquí no aparece.
  - Se evitó introducir vocabulario eclesiástico tradicional no atestiguado, como «malditos» o «condenados», para no intensificar más allá del grito profético del original.
  - «Memoria» se usó de forma consistente con la revisión inglesa y con la ambigüedad de recuerdo/memorial del término ge'ez.
  - Se prefirió «tierra seca» por fidelidad a la oposición mar/tierra, aunque «tierra» sería idiomáticamente posible.
