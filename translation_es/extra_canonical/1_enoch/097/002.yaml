translation:
  language: es
  text: Sepan[a] que el Altísimo recuerda su destrucción[b], y los ángeles del cielo se alegran por su destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tengan por cierto que»; también puede entenderse «Sepan que les vendrá esto, porque…» o «Sea conocido para ustedes que…».
    reason: lexical_alternative
  - marker: b
    text: O «su ruina» o «su perdición» para ambas ocurrencias del sustantivo traducido aquí como «destrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: እሙረ ይከውን ለክሙ
  english_pob_choice: Know that
  chosen_spanish: Sepan que
  alternatives_spanish:
  - Sepan
  - Sean ustedes conscientes de que
  - Tengan por cierto que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail identifica esta secuencia como un giro idiomático de certeza dirigido a los destinatarios. En español, «Sepan que» comunica esa advertencia solemne sin forzar el Amharic/Ge'ez ni convertir la expresión en una explicación perifrástica demasiado pesada.
- source_word: ልዑል
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Muy Alto
  - el Exaltado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Altísimo» es la forma natural y reverente en español para el título divino, y preserva el registro apocalíptico del original y del POB en inglés.
- source_word: ይዜከር
  english_pob_choice: remembers
  chosen_spanish: recuerda
  alternatives_spanish:
  - recordará
  - tiene presente
  - se acuerda
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa memoria divina con certeza presente/gnómica. «Recuerda» es breve, claro y mantiene la fuerza afirmativa del texto sin introducir un futuro que el contexto no exige.
- source_word: ሐጕልክሙ / ሐጕለ ዚአክሙ
  english_pob_choice: your destruction
  chosen_spanish: su destrucción
  alternatives_spanish:
  - su ruina
  - su perdición
  - su caída
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo admite ruina, perdición o destrucción. Se conserva «destrucción» por su severidad y por corresponder bien al tono de amenaza; el posesivo se adapta al español para concordar con el tratamiento de segunda persona de cortesía implícita en «Sepan».
- source_word: ይትፌሥሑ
  english_pob_choice: rejoice
  chosen_spanish: se alegran
  alternatives_spanish:
  - se regocijan
  - exultan
  - se gozan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo denota una alegría fuerte. «Se alegran» mantiene la afirmación directa y resulta idiomático en español; «se regocijan» o «exultan» serían más intensos, pero menos naturales aquí.
- source_word: መላእክተ ሰማይ
  english_pob_choice: the angels of heaven
  chosen_spanish: los ángeles del cielo
  alternatives_spanish:
  - los ángeles celestiales
  - los ángeles en el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Del cielo» reproduce con claridad la construcción genitiva y mantiene la imaginería apocalíptica sin añadir una formulación demasiado técnica o eclesiástica.
theological_decisions:
- issue: Mantener el cuadro apocalíptico de los ángeles que se alegran ante la destrucción de los impíos
  english_pob_reading: Retain the plain sense that the angels of heaven rejoice over the addressees' destruction.
  chosen_spanish_reading: 'Mantener el sentido directo: los ángeles del cielo se alegran por la destrucción anunciada.'
  alternative_spanish_readings:
  - Suavizar a «dan testimonio de» o «aprueban»
  - Releer la alegría como mera celebración de la justicia divina, no de la destrucción misma
  rationale: El Ge'ez presenta de forma explícita la alegría angélica y el tono de reprensión escatológica es severo. Conviene conservar esa tensión teológica sin amortiguarla para lectores modernos.
  doctrine_reference: Preservar la tensión apocalíptica en vez de resolverla; no domesticar la imaginería del juicio.
translation_notes:
  revision_awareness: La revisión más reciente corrigió una lectura anterior que separaba indebidamente el giro ge'ez እሙረ ይከውን ለክሙ como si fuera «Know that it shall come upon you». El audit trail confirma que la frase funciona como un modismo de certeza («Know that» / «Let it be known to you that»). La presente traducción refleja ese ajuste y evita introducir una cláusula causal o futurizante que el análisis del revisor descartó.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para el título divino; se usa «el Altísimo/Altísimo» conforme al estándar del proyecto.
  - Se mantiene «destrucción» en ambas apariciones del sustantivo para conservar la repetición enfática del original.
  - No se introduce «Cristo» ni otra terminología cristológica ajena al versículo.
  - El tono es solemne y apocalíptico, sin suavizar el juicio ni añadir explicaciones no presentes en el texto.
