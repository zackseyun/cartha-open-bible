base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/011/001.yaml
  text: And in those days I will open the storehouses of blessing that are in heaven[a], so that I may bring them down upon the earth, upon their work and upon their labor[g][f][e][d][c][b], for the children of men.
  footnotes:
  - marker: a
    text: Or gates/openings.
    reason: lexical_alternative
  - marker: b
    text: Or treasuries; the Geʿez term can denote storerooms or treasure-houses.
    reason: lexical_alternative
  - marker: c
    text: Or blessings (plural), taking the singular as a collective for multiple benefits.
    reason: lexical_alternative
  - marker: d
    text: Or seed, a Semitic idiom for descendants.
    reason: lexical_alternative
  - marker: e
    text: Or humankind; the phrase is a conventional idiom in Enoch.
    reason: lexical_alternative
  - marker: f
    text: Or 'the doors[a] of the storehouses[b]'.
    reason: previous_rendering
  - marker: g
    text: Or 'their offspring[d]'.
    reason: previous_rendering
