translation:
  language: es
  text: Y en aquellos días abriré los almacenes de bendición que están en el cielo, para hacerlos descender sobre la tierra, sobre sus obras y sobre su labor, para los hijos de los hombres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal apocalíptica se vierte de modo natural con un deíctico plural en español; «aquellos días» conserva el tono formular y narrativo.
- source_word: እፈትሕ
  english_pob_choice: I will open
  chosen_spanish: abriré
  alternatives_spanish:
  - voy a abrir
  - yo abriré
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: El verbo expresa una acción futura directa; el futuro simple en español comunica bien la promesa sin añadir énfasis innecesario.
- source_word: መዛግብተ
  english_pob_choice: storehouses
  chosen_spanish: almacenes
  alternatives_spanish:
  - tesoros
  - depósitos
  - graneros
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: «Almacenes» mantiene el valor concreto de lugar de reserva y evita forzar una lectura exclusivamente monetaria de «tesoros».
- source_word: በረከት
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendiciones
  - bienbendición
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: El singular geʿez funciona colectivamente; en español «bendición» conserva esa abstracción colectiva sin perder naturalidad.
- source_word: በሰማይ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  - en el cielo
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: En español bíblico y moderno, «el cielo» reproduce bien el singular geʿez y la ubicación celestial.
- source_word: አውርዶሙ
  english_pob_choice: bring them down
  chosen_spanish: los traiga abajo
  alternatives_spanish:
  - los haga descender
  - los baje
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: La forma causativa con objeto plural admite una solución idiomática en español; «traiga abajo» expresa el movimiento descendente sin sonar mecánico.
- source_word: ዲበ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: La preposición marca impacto o extensión sobre la superficie; «sobre» conserva ese sentido espacial y elevado.
- source_word: ግብሮሙ
  english_pob_choice: their work
  chosen_spanish: su trabajo
  alternatives_spanish:
  - sus obras
  - su labor
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: El sustantivo geʿez puede abarcar actividad o tarea; «su trabajo» es claro en español y mantiene el referente colectivo humano.
- source_word: ፃማሆሙ
  english_pob_choice: their labor
  chosen_spanish: su labor
  alternatives_spanish:
  - su esfuerzo
  - su fatiga
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: La revisión crítica confirma que el término denota labor/toil, no descendencia. «Labor» distingue este segundo miembro del paralelismo y respeta la repetición con matiz distinto.
- source_word: ውሉደ ሰብእ
  english_pob_choice: children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - la humanidad
  - los seres humanos
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: Se conserva la fórmula idiomática apocalíptica para mantener el registro y la resonancia intertextual del libro.
theological_decisions:
- issue: Identidad del hablante en primera persona
  english_pob_reading: The first person is God (the Most High) speaking.
  chosen_spanish_reading: La primera persona queda sin nombrar, como voz divina implícita.
  alternative_spanish_readings:
  - Dios habla
  - un ángel habla
  - Enoc narra
  rationale: El texto no añade un nombre divino, y la versión española debe preservar esa reserva. La voz puede leerse como divina por el contexto, sin sobreespecificar más allá del testimonio del pasaje.
  doctrine_reference: Lectura contextual de la voz en literatura apocalíptica; no se formula una identificación explícita donde el texto no la da.
- issue: Alcance colectivo de «bendición»
  english_pob_reading: Render the singular በረከት as mass-noun “blessing.”
  chosen_spanish_reading: «bendición» en singular colectivo.
  alternative_spanish_readings:
  - bendiciones
  - bienes
  rationale: El singular refleja mejor la forma del original y mantiene la densidad conceptual del don celestial, sin obligar a pluralizarlo artificialmente.
  doctrine_reference: No doctrinal; decisión semántica y morfosintáctica.
- issue: Fórmula idiomática «children of men»
  english_pob_reading: Retain “children of men” in the main text.
  chosen_spanish_reading: «los hijos de los hombres» se mantiene literalmente.
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  rationale: La expresión es un rasgo de estilo del corpus de Enoc; conservarla sostiene el registro apocalíptico y su intertextualidad.
  doctrine_reference: Uso idiomático convencional en literatura enóquica.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió errores graves en el borrador inglés anterior: no hay base en el geʿez para «doors» ni para «offspring»; el texto habla de «storehouses» y de «labor». La presente versión española sigue esa lectura corregida y no introduce marcadores de nota innecesarios.'
  spanish_consistency_notes:
  - Se usa «bendición» en singular colectivo para reflejar በረከት.
  - Se evita «Cristo»/«SEÑOR» porque el pasaje no nombra a Dios explícitamente.
  - «los hijos de los hombres» se conserva como fórmula fija del género.
  - La pareja paralela «su trabajo / su labor» intenta reflejar dos términos distintos del original sin fusionarlos.
