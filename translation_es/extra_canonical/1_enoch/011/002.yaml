translation:
  language: es
  text: Y la paz y la verdad estarán unidas[a] durante todos los días del mundo y durante todas las generaciones del mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez ሱቱፋነ ይከውኑ expresa asociación o participación mutua; también podría traducirse 'serán asociadas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሰላም
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - prosperidad
  lexicon: Leslau Ge'ez
  rationale: El término ge'ez designa paz en sentido amplio; en español 'paz' conserva la coordinación idiomática con 'verdad' sin perder la idea de orden y bienestar implícita en el contexto.
- source_word: ርትዕ
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - rectitud
  - estabilidad
  lexicon: Leslau Ge'ez
  rationale: La pareja fija 'paz y verdad' se entiende naturalmente en español con 'verdad'; 'rectitud' sería posible, pero desplaza el equilibrio semántico de la expresión.
- source_word: ሱቱፋነ ይከውኑ
  english_pob_choice: shall be partners
  chosen_spanish: serán compañeras
  alternatives_spanish:
  - serán compañeras y socias
  - estarán unidas
  - serán asociadas
  lexicon: Leslau Ge'ez
  rationale: El audit trail corrige una lectura previa de 'multiplicadas' y confirma la idea de asociación/participación. En español, 'compañeras' comunica la relación recíproca de modo natural; se evita 'socias' por su posible color comercial y 'asociadas' por su dureza técnica.
- source_word: በኵሉ መዋዕለ ዓለም
  english_pob_choice: throughout all the days of the world
  chosen_spanish: durante todos los días del mundo
  alternatives_spanish:
  - a lo largo de todos los días del mundo
  - en todos los días del mundo
  lexicon: Leslau Ge'ez
  rationale: La revisión más reciente del audit trail restablece literalmente 'días' para መዋዕለ. 'Durante todos los días del mundo' reproduce con claridad la extensión temporal total sin introducir una interpretación más abstracta como 'edades'.
- source_word: ትውልደ ዓለም
  english_pob_choice: throughout all the generations of the world
  chosen_spanish: durante todas las generaciones del mundo
  alternatives_spanish:
  - a lo largo de todas las generaciones del mundo
  - durante todas las generaciones humanas
  lexicon: Leslau Ge'ez
  rationale: Se conserva la referencia literal a 'generaciones del mundo' para mantener el alcance universal del texto y evitar restringir innecesariamente a 'humanas'.
theological_decisions:
- issue: Relación entre paz y verdad
  english_pob_reading: Peace and truth shall be partners
  chosen_spanish_reading: La paz y la verdad serán compañeras
  alternative_spanish_readings:
  - la paz y la verdad estarán unidas
  - la paz y la verdad serán asociadas
  rationale: El texto no pide una abstracción doctrinal, sino una relación de acompañamiento/participación. 'Compañeras' preserva la mutualidad sin forzar una terminología eclesiástica ni comercial.
  doctrine_reference: Ninguna; decisión semántica y sintáctica basada en el ge'ez y la revisión auditada.
- issue: Alcance temporal universal
  english_pob_reading: throughout all the days... and throughout all the generations...
  chosen_spanish_reading: durante todos los días del mundo y durante todas las generaciones del mundo
  alternative_spanish_readings:
  - por todas las edades del mundo y por todas las generaciones del mundo
  - a lo largo de todos los días del mundo y a lo largo de todas las generaciones del mundo
  rationale: Se retiene la amplitud temporal completa del texto sin reducirla a una sola era o a una lectura escatológica específica.
  doctrine_reference: Ninguna; solo se evita una restricción interpretativa no exigida por el original.
translation_notes:
  revision_awareness: 'Se integró la revisión más reciente del audit trail, que corrige dos problemas del borrador inglés previo: 1) ሱቱፋነ ይከውኑ debe leerse como ''serán compañeras/asociadas'', no como ''serán multiplicadas''; 2) መዋዕለ ዓለም se restituye como ''días del mundo'', no ''edades del mundo''. También se evitó duplicación textual y se conservó el paralelismo de las dos cláusulas temporales.'
  spanish_consistency_notes:
  - Se usa 'paz' y 'verdad' como pareja idiomática estable y transparente.
  - '''Compañeras'' mantiene una relación recíproca sin introducir un término técnico no atestiguado.'
  - Se conservó 'mundo' en ambas frases genitivas para reflejar el alcance del original.
  - La puntuación reproduce el ritmo coordinado de la oración sin añadir elementos interpretativos.
