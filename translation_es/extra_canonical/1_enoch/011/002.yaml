revisions:
- from: Y la paz y la verdad serán compañeras[a] durante todos los días del mundo y durante todas las generaciones del mundo.
  to: Y la paz y la verdad estarán unidas[a] durante todos los días del mundo y durante todas las generaciones del mundo.
  rationale: Se cambia 'serán compañeras' por 'estarán unidas' para expresar con más naturalidad en español la idea de asociación mutua entre dos abstracciones, sin introducir un matiz demasiado interpersonal. Se conserva 'días del mundo' y 'generaciones del mundo' conforme al audit trail. La nota se rehace para informar al lector sobre la alternativa léxica relevante, no sobre el proceso editorial.
