  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'Paz' y 'verdad' están bien. La revisión propuesta ajusta solo la expresión de ሱቱፋነ ይከውኑ para mayor fidelidad semántica y naturalidad española.
