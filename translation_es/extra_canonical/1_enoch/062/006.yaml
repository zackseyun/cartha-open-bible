    rationale: 'El inglés dice: Or ''all who hold the earth.'' La nota española actual dice «O ''todos los que poseen la tierra''», que duplica el texto principal y pierde la alternativa documentada.'
  - severity: low
    issue: «a él que gobierna» es menos idiomático que «al que gobierna».
    rationale: La construcción con preposición y relativo resulta forzada en español contemporáneo. «Al que gobierna» preserva el sentido sin añadir énfasis no exigido por la fuente.
  revised_spanish_text: Y los reyes y los poderosos y todos los que poseen la tierra[a] lo bendecirán, lo alabarán y lo exaltarán, al que gobierna sobre todo lo oculto[b].
  revised_footnotes:
  - marker: a
