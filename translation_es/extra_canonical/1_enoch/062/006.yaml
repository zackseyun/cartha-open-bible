    reason: lexical_alternative
  - marker: b
    text: La frase «al que gobierna sobre todo lo oculto» se mantiene descriptiva porque el versículo no da un título explícito para la figura.
    reason: alternative_reading
  revision_rationale: Se corrige la nota léxica para reflejar la verdadera alternativa preservada por la auditoría inglesa («hold»), y se mejora la naturalidad del español con «al que gobierna» sin alterar el sentido ni la cautela teológica del original.
