translation:
  language: es
  text: Y los reyes y los poderosos y todos los que poseen la tierra[a] lo bendecirán, lo alabarán y lo exaltarán, al que gobierna sobre todo lo oculto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los que sostienen la tierra». El verbo ge'ez puede denotar sostener o poseer; en este contexto probablemente alude a quienes ejercen poder terrenal.
    reason: lexical_alternative
  - marker: b
    text: La frase «al que gobierna sobre todo lo oculto» se mantiene descriptiva porque el versículo no da un título explícito para la figura.
    reason: alternative_reading
lexical_decisions:
- source_word: ይባርክዎ
  english_pob_choice: shall bless
  chosen_spanish: lo bendecirán
  alternatives_spanish:
  - lo bendecirán con bendición
  - le darán bendición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa bendecir en una secuencia futura/visionaria; en español, «lo bendecirán» conserva el tono elevado sin sobrecargar la frase con una perífrasis más explicativa.
- source_word: ይሴብሕዎ
  english_pob_choice: praise
  chosen_spanish: lo alabarán
  alternatives_spanish:
  - lo glorificarán
  - lo laudará n
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Alabar» reproduce de forma natural el valor doxológico del verbo en contexto de adoración y mantiene claridad en español bíblico contemporáneo.
- source_word: የልዕልዎ
  english_pob_choice: exalt him
  chosen_spanish: lo exaltarán
  alternatives_spanish:
  - lo magnificarán
  - lo levantarán en alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica elevar o engrandecer; «exaltar» conserva el registro regio y litúrgico del original sin alejarse del uso comprensible en español.
- source_word: ነገሥት
  english_pob_choice: kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los gobernantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido ordinario es «reyes», y esa concreción política corresponde al sujeto del pasaje.
- source_word: መዛዝእት
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los potentados
  - los poderosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «los poderosos» comunica mejor la clase social y política implícita que un calco más literal; mantiene el paralelo con «los reyes».
- source_word: ኵሎሙ እለ ይእሕዝዋ ለምድር
  english_pob_choice: all who possess the earth
  chosen_spanish: todos los que poseen la tierra
  alternatives_spanish:
  - todos los que tienen la tierra
  - todos los que dominan la tierra
  - todos los que se apoderan de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Poseer» refleja el valor básico de tener/poseer sin cerrar indebidamente la posible implicación de dominio; «la tierra» mantiene la concreción territorial del texto.
- source_word: ለዘይመልክ
  english_pob_choice: him who rules
  chosen_spanish: a él que gobierna
  alternatives_spanish:
  - al que reina
  - al que gobierna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción relativa apunta a una figura singular definida por su gobierno; «gobierna» expresa bien la realeza sin forzar un título no explicitado.
- source_word: ኵሎ ዘኅቡእ
  english_pob_choice: all that is hidden
  chosen_spanish: todo lo oculto
  alternatives_spanish:
  - todo lo escondido
  - todas las cosas ocultas
  - todos los secretos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es amplia y no debe restringirse a «secretos»; «todo lo oculto» preserva el alcance cósmico y revelatorio del original.
theological_decisions:
- issue: Identidad de la figura singular a quien se dirige la alabanza final
  english_pob_reading: Render descriptively without specifying the referent in the main text.
  chosen_spanish_reading: Traducir de forma descriptiva sin identificar al referente en el texto principal.
  alternative_spanish_readings:
  - el Señor de los Espíritus
  - el Hijo del Hombre / el Elegido
  - Dios, como quien conoce y gobierna lo oculto
  rationale: El ge'ez nombra a la figura mediante una cláusula relativa, no con un título explícito. Para preservar la tensión teológica del pasaje y evitar armonizaciones indebidas, el español mantiene la descripción abierta.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: La versión española sigue el estado más reciente del audit trail, que no reporta revisiones adicionales; se conservan las decisiones ya validadas sobre el valor futuro/visionario de los verbos, la ambigüedad de «poseer la tierra» y la falta de título explícito para la figura final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el nombre divino en el versículo.
  - Se usa «los poderosos» para መዛዝእት, siguiendo el valor social-político del término y el paralelo con «los reyes».
  - Se preserva «todo lo oculto» en vez de «todos los secretos» para no estrechar el campo semántico del ge'ez.
  - Se conserva la ambigüedad cristológica/teológica de la figura final mediante una construcción relativa descriptiva.
