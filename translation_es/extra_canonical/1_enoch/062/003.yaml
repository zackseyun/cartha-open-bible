  yaml_path: translation/extra_canonical/1_enoch/062/003.yaml
  text: And in that day all the kings and the mighty and the exalted[a], and those who possess the earth, shall stand up, and they shall see and recognize that he sits on the throne of his glory; and righteousness shall be judged before him[b], and no lying word shall be spoken before him.
  footnotes:
