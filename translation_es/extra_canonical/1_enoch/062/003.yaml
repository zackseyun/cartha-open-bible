    text: Or 'those who possess the earth' or 'those who rule the land/world.' The Ge'ez verb can denote holding, possessing, or exercising control.
    reason: lexical_alternative
  - marker: b
    text: The clause 'and righteousness shall be judged before him' is textually and syntactically difficult in the Ethiopic. The translation keeps the judicial sense of the wording rather than smoothing it into a more familiar expression.
