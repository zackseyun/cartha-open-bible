translation:
  language: es
  text: Y en aquel día se levantarán todos los reyes, los poderosos y los exaltados, y los que poseen la tierra[a]; y verán y reconocerán que él está sentado sobre el trono de su gloria; y la justicia será juzgada delante de él, y ninguna palabra mentirosa será dicha delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que gobiernan la tierra» o «los que gobiernan el mundo». La expresión ge''ez también puede denotar poseer, tener bajo dominio o ejercer control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይቀውሙ
  english_pob_choice: shall stand up
  chosen_spanish: se levantarán
  alternatives_spanish:
  - se pondrán de pie
  - se alzarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de teofanía judicial, el verbo pide una imagen corporal de comparecencia. 'Se levantarán' conserva la fuerza de ponerse en pie sin implicar por sí solo resurrección.
- source_word: በይእቲ ዕለት
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la fórmula apocalíptica típica; 'aquel' mantiene el tono solemne y escatológico del original.
- source_word: ኵሎሙ ነገሥት ወዐዚዛን ወልዑላን
  english_pob_choice: all the kings and the mighty and the exalted
  chosen_spanish: todos los reyes, los poderosos y los exaltados
  alternatives_spanish:
  - todos los reyes, los fuertes y los altos
  - todos los reyes, los poderosos y los altos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia enumera categorías sociales y políticas en ascenso. 'Poderosos' y 'exaltados' mantienen la progresión retórica sin fusionar los términos.
- source_word: ወእለ ይእኅዝዋ ለምድር
  english_pob_choice: those who possess the earth
  chosen_spanish: los que poseen la tierra
  alternatives_spanish:
  - los que dominan la tierra
  - los que tienen la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión inglesa favorece ''possess'' por ser más natural y preciso. En español, ''poseen la tierra'' conserva esa amplitud: posesión, dominio o control, sin estrechar el sentido a ''gobernar''.'
- source_word: ወይሬእይዎ ወያአምርዎ
  english_pob_choice: they shall see and recognize
  chosen_spanish: verán y reconocerán
  alternatives_spanish:
  - verán y sabrán
  - verán y entenderán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Reconocerán'' expresa no solo percepción sino identificación y admisión de quién es él, algo más fuerte que un mero saber.'
- source_word: ከመ ይነብር ዲበ መንበረ ስብሐቲሁ
  english_pob_choice: that he sits on the throne of his glory
  chosen_spanish: que él está sentado sobre el trono de su gloria
  alternatives_spanish:
  - que se sienta sobre el trono de su gloria
  - que está sentado en el trono de su gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Está sentado sobre el trono de su gloria'' conserva la imagen de entronización con español natural y solemne. ''Sobre'' mantiene la preposición elevada del cuadro apocalíptico.'
- source_word: ወጽድቅ ቅድሜሁ ይትኴነን
  english_pob_choice: and righteousness shall be judged before him
  chosen_spanish: y la justicia será juzgada delante de él
  alternatives_spanish:
  - y la justicia será juzgada ante él
  - y la rectitud será juzgada delante de él
  - y el justo juicio será delante de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase etíope es difícil y el inglés POB conserva el sentido judicial sin suavizarlo. 'La justicia será juzgada' preserva la rareza sintáctica y la tensión textual, evitando convertirla en una fórmula más familiar pero menos fiel.
- source_word: ወነገረ በከ አልቦ ዘይትበሀል በቅድሜሁ
  english_pob_choice: and no lying word shall be spoken before him
  chosen_spanish: y ninguna palabra mentirosa será dicha delante de él
  alternatives_spanish:
  - y ninguna palabra falsa será dicha delante de él
  - y no se dirá delante de él palabra mentirosa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Palabra mentirosa'' conserva el matiz singular y solemne de una declaración falsa, sin reducirlo solo a ''falsa'' ni ampliar el sentido a una noción abstracta de engaño.'
theological_decisions:
- issue: Identidad del personaje entronizado
  english_pob_reading: Render with the pronoun 'he' rather than specifying 'the Son of Man' or 'the Lord of Spirits.'
  chosen_spanish_reading: Conservar el pronombre 'él' sin identificarlo explícitamente en este versículo.
  alternative_spanish_readings:
  - el Hijo del Hombre
  - el Señor de los Espíritus
  rationale: El verso mismo usa un pronombre y describe el entronizamiento sin repetir el título. La versión española mantiene esa ambigüedad local, en lugar de resolverla desde el contexto amplio.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: Alcance de 'los que poseen la tierra'
  english_pob_reading: Leave the phrase broad and political-cosmic rather than narrowing it to landowners or world-rulers.
  chosen_spanish_reading: 'Mantener una formulación amplia: ''los que poseen la tierra''.'
  alternative_spanish_readings:
  - los que poseen la tierra como propietarios
  - los que gobiernan el mundo
  - los dueños de la tierra
  rationale: La expresión ge'ez puede abarcar posesión, control o dominio. En un contexto apocalíptico, conviene preservar esa amplitud en lugar de estrecharla a una sola categoría sociológica.
  doctrine_reference: No reducir indebidamente el alcance del lenguaje apocalíptico.
- issue: La cláusula difícil 'righteousness shall be judged before him'
  english_pob_reading: Keep the judicial sense of the wording rather than smoothing it into a more familiar expression.
  chosen_spanish_reading: 'Mantener la forma difícil: ''la justicia será juzgada delante de él''.'
  alternative_spanish_readings:
  - la justicia será establecida delante de él
  - el juicio de justicia estará delante de él
  rationale: La traducción conserva la aspereza del original etíope y la decisión del inglés POB de no normalizarla. Eso deja visible la tensión textual en vez de ocultarla.
  doctrine_reference: Preservar una variante textual/sintáctica difícil.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB que prefirió 'possess the earth' sobre 'hold the earth'. En español se reflejó con 'poseen la tierra', manteniendo la amplitud semántica y el registro apocalíptico. También se conservó la dificultad de la cláusula 'la justicia será juzgada delante de él', como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se tradujo ምድር con 'tierra' en coherencia con el matiz cósmico y de dominio del contexto.
  - Se conservó el pronombre 'él' para no sobreespecificar la identidad del entronizado más allá del texto inmediato.
  - Se prefirió 'justicia' para ጽድቅ, siguiendo el valor judicial del pasaje y la decisión inglesa de mantener la rareza sintáctica.
