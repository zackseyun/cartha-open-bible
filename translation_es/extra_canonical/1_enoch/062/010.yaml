translation:
  language: es
  text: Y el Señor de los espíritus los impulsará[a] para que se apresuren y salgan de delante de su rostro[b], y sus rostros se llenarán de vergüenza, y las tinieblas cubrirán sus rostros[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hará ir con rapidez». El ge'ez transmite una acción de impulso o conducción forzada.
    reason: lexical_alternative
  - marker: b
    text: O «de su presencia». El ge'ez dice más literalmente «de delante de su rostro».
    reason: lexical_alternative
  - marker: c
    text: La cláusula final también puede traducirse «las tinieblas se añadirán a sus rostros». La imagen es de vergüenza intensificada por la oscuridad del juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይጐጕኦሙ
  english_pob_choice: will drive them on
  chosen_spanish: los impulsará
  alternatives_spanish:
  - los empujará
  - los hará avanzar
  - los conducirá con fuerza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa una acción de mover o forzar con ímpetu. «Impulsará» conserva la fuerza coercitiva sin añadir una imagen demasiado concreta que el original no exige.
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un título fijo en 1 Enoc. En español, la forma con mayúscula en «Espíritus» mantiene el carácter titular y reverente del original.
- source_word: ከመ ይፍጥኑ
  english_pob_choice: so that they hasten
  chosen_spanish: para que se apresuren
  alternatives_spanish:
  - para que se den prisa
  - para que se aceleren
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La cláusula expresa finalidad o resultado: irán impulsados para salir con prisa. «Se apresuren» reproduce bien el movimiento forzado y natural en español.'
- source_word: ወይፃኡ እምቅድመ ገጹ
  english_pob_choice: and go out from before his face
  chosen_spanish: y salgan de delante de su rostro
  alternatives_spanish:
  - y salgan de su presencia
  - y salgan de delante de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez dice literalmente «de delante de su rostro». Se conserva la imagen antropomórfica y judicial con «rostro», sin suavizarla a la abstracción de «presencia».
- source_word: ገጾሙ ይመልእ ኃፍረተ
  english_pob_choice: their faces will be filled with shame
  chosen_spanish: sus rostros se llenarán de vergüenza
  alternatives_spanish:
  - sus caras se llenarán de vergüenza
  - sus rostros quedarán llenos de vergüenza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El original conserva la imagen de los rostros como portadores de honor o deshonra. «Vergüenza» recoge bien el matiz público y judicial del pasaje.
- source_word: ጽልመት ይትዌሰክ ገጾሙ
  english_pob_choice: darkness will be added to their faces
  chosen_spanish: la oscuridad se añadirá a sus rostros
  alternatives_spanish:
  - la oscuridad cubrirá sus rostros
  - la oscuridad será añadida a sus rostros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Tras la revisión auditada, el ge'ez ተወሰከ significa «ser añadido» o «aumentar». «Se añadirá» respeta mejor esa fuerza acumulativa que una traducción más interpretativa como «cubrirá».
theological_decisions:
- issue: Imagen antropomórfica de la presencia divina
  english_pob_reading: from before his face
  chosen_spanish_reading: de delante de su rostro
  alternative_spanish_readings:
  - de su presencia
  - de delante de él
  rationale: Se preserva el lenguaje imagístico del texto, que presenta una escena de juicio con referencia directa al rostro del Señor de los Espíritus. No se abstrae a «presencia» para no perder la vividez apocalíptica.
  doctrine_reference: Principio de primacía del lenguaje original y preservación de la imaginería apocalíptica.
- issue: Oscuridad como aumento de vergüenza bajo juicio
  english_pob_reading: darkness will be added to their faces
  chosen_spanish_reading: la oscuridad se añadirá a sus rostros
  alternative_spanish_readings:
  - la oscuridad cubrirá sus rostros
  - la oscuridad se pondrá sobre sus rostros
  rationale: 'La lectura revisada del ge''ez favorece la idea de incremento o añadidura, no simplemente cobertura. En español se mantiene esa tensión: la oscuridad intensifica la vergüenza visible en los rostros.'
  doctrine_reference: Criterio lexical revisado según la evidencia ge'ez y la nota de adjudicación.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail en inglés y la revisión posterior que corrigió el sentido de la cláusula final: el ge''ez ተወሰከ apoya «añadida/se añadirá», no una metáfora de «cubrir». También se preservó la imagen literal «de delante de su rostro» en lugar de suavizarla a «presencia».'
  spanish_consistency_notes:
  - Se usó «Señor de los Espíritus» como título fijo y reverente, en línea con el patrón de 1 Enoc.
  - Se mantuvo «rostro/rostros» para conservar la imaginería judicial del pasaje.
  - Se eligió «vergüenza» como equivalencia principal de ኃፍረተ, sin borrar la posible nota de deshonra pública.
  - 'La cláusula final quedó atada a la lectura revisada del ge''ez: aumento o añadidura de oscuridad, no mera cobertura.'
