  to: Y el Señor de los espíritus los impulsará[a] para que se apresuren y salgan de delante de su rostro[b], y sus rostros se llenarán de vergüenza, y las tinieblas cubrirán sus rostros[c].
  rationale: Se ajusta el texto principal a la redacción inglesa POB auditada final («cubrirán») mientras se preserva en nota la alternativa léxica ge'ez («se añadirán»). También se normaliza la capitalización de «espíritus», se añade la nota de alternativa para «de su presencia» que el expediente inglés conserva, y se mejora el registro bíblico con «tinieblas».
