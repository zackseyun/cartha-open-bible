translation:
  language: es
  text: Porque desde el principio[a] el Hijo del Hombre estaba oculto, y el Altísimo lo guardó en la presencia de su poder[b], y lo reveló a los escogidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La revisión del audit trail corrige aquí una lectura espacial: el etiópico de trabajo entiende esta expresión como temporal («desde el principio»), no como «ante él».'
    reason: textual_variant
  - marker: b
    text: También puede leerse «delante de su poder» o «ante su poder». La traducción conserva la imagen extraña de la expresión para no suavizarla.
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce una explicación o fundamento de lo dicho antes. En español, «Porque» preserva el valor causal/conectivo sin sonar arcaico.
- source_word: እምቅድሙ
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde antes
  - primeramente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail corrige la lectura espacial y establece un sentido temporal. «Desde el principio» conserva el motivo de preexistencia/antigüedad sin añadir más de lo que exige el texto.
- source_word: ኅቡእ ኮነ
  english_pob_choice: was hidden
  chosen_spanish: fue ocultado
  alternatives_spanish:
  - estuvo escondido
  - fue escondido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo expresa una condición de ocultamiento. «Fue ocultado» mantiene el matiz de ser puesto fuera de vista; se evita suavizarlo a una simple invisibilidad.
- source_word: ወልደ እጓለ እመሕያው
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el hijo del hombre
  - el Hijo del ser viviente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto enóquico funciona como designación titulada del personaje apocalíptico. «El Hijo del Hombre» conserva ese uso titular y sigue la decisión auditada en inglés.
- source_word: ዐቀቦ
  english_pob_choice: kept him
  chosen_spanish: lo guardó
  alternatives_spanish:
  - lo preservó
  - lo mantuvo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite guardar, preservar o mantener. «Lo guardó» es natural en español y conserva la idea de custodia divina previa a la revelación.
- source_word: ልዑል
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Muy Alto
  - el Exaltado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Título divino asentado y claro en español bíblico. «El Altísimo» es la equivalencia más reconocible y fiel.
- source_word: በቅድመ ኃይሉ
  english_pob_choice: in the presence of his power
  chosen_spanish: en la presencia de su poder
  alternatives_spanish:
  - delante de su poder
  - ante su poder
  - en presencia de su fuerza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción es difícil y la traducción inglesa preserva la imagen espacial. En español, «en la presencia de su poder» mantiene la tensión literal sin resolverla en paráfrasis.
- source_word: ከሠቶ
  english_pob_choice: revealed him
  chosen_spanish: lo reveló
  alternatives_spanish:
  - lo dio a conocer
  - lo mostró
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contraste con «ocultado» pide un verbo de manifestación. «Lo reveló» conserva el lenguaje apocalíptico de desvelamiento.
- source_word: ለኅሩያን
  english_pob_choice: to the chosen ones
  chosen_spanish: a los escogidos
  alternatives_spanish:
  - a los elegidos
  - a los seleccionados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo plural designa al grupo elegido. «Escogidos» es claro, sobrio y mantiene la resonancia bíblica sin imponer un tecnicismo eclesiástico.
theological_decisions:
- issue: Lectura temporal de እምቅድሙ
  english_pob_reading: from the beginning
  chosen_spanish_reading: desde el principio
  alternative_spanish_readings:
  - antes
  - desde siempre
  rationale: El audit trail identifica aquí una referencia temporal a la preexistencia o anterioridad, no una relación espacial. «Desde el principio» expresa ese valor sin ampliar indebidamente la afirmación metafísica.
  doctrine_reference: Preservar el motivo de preexistencia/concealment without overstatement.
- issue: Carácter titular de «Hijo del Hombre»
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el hijo del hombre
  - el hombre
  rationale: En este pasaje el sintagma funciona como título apocalíptico y no como genérico antropológico. La mayúscula ayuda a reflejar ese uso, conforme al criterio del texto auditado en inglés.
  doctrine_reference: Preserve local apocalyptic designation; avoid flattening into a generic human reference.
- issue: Tensión entre ocultamiento y revelación
  english_pob_reading: was hidden ... kept him ... revealed him
  chosen_spanish_reading: fue ocultado ... lo guardó ... lo reveló
  alternative_spanish_readings:
  - fue escondido ... lo preservó ... lo mostró
  - estuvo oculto ... lo reservó ... lo dio a conocer
  rationale: La línea conserva la secuencia de ocultamiento, custodia y manifestación sin resolverla en una doctrina explícita de predestinación o encarnación. La formulación española mantiene esa tensión del texto base.
  doctrine_reference: Preserve theological tension rather than harmonize it.
translation_notes:
  revision_awareness: 'El audit trail inglés registra una revisión importante: እምቅድሙ no debe leerse como «before him», sino como un adverbio temporal («from the beginning»). La redacción española sigue esa corrección y evita la lectura espacial. También conserva la imagen difícil de «in the presence of his power» sin convertirla en una paráfrasis más lisa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero en este versículo no aparece el nombre divino, sino el título «el Altísimo».
  - Se usa «escogidos» para ለኅሩያን en armonía con el registro apocalíptico y con el audit trail en inglés.
  - Se conserva «el Hijo del Hombre» como título; no se rebaja a minúscula por tratarse de una designación técnica del pasaje.
