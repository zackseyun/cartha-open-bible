  glossary_alignment: 'La terminología está mayormente alineada con el proyecto: «el Hijo del Hombre», «el Altísimo», «lo reveló», «a los escogidos». No hay conflicto con las directrices de Yahvé/Mesías/etc. La elección «escogidos» es aceptable para ለኅሩያን, aunque «los elegidos» también sería posible; no requiere cambio.'
