translation:
  language: es
  text: Y el dolor vendrá sobre ellos como sobre una mujer de parto[c], cuando su hijo llegue a la boca del vientre[a][b], y ella sea apremiada al dar a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «a la boca del vientre», una expresión anatómica que intensifica la imagen del parto.
    reason: lexical_alternative
  - marker: b
    text: La frase entre corchetes en el testigo fuente sugiere incertidumbre textual en la cláusula que describe la aflicción de la mujer en el parto; la traducción refleja el sentido recibido sin especificar de más la sintaxis.
    reason: textual_variant
  - marker: c
    text: 'O: «como sobre una mujer que está de parto».'
    reason: previous_rendering
lexical_decisions:
- source_word: ሕማም
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - angustia
  - sufrimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término denota dolor o aflicción corporal. En esta comparación de parto, «dolor» conserva la fuerza concreta y natural en español sin convertirla en una abstracción excesiva.
- source_word: ማሕምም
  english_pob_choice: in labor
  chosen_spanish: en trabajo de parto
  alternatives_spanish:
  - de parto
  - en dolores de parto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión marca a la mujer en la condición de parto. «En trabajo de parto» es idiomático y preciso en español, y mantiene la escena física sin arcaísmo innecesario.
- source_word: የዓፅብ / ተዐፅብ
  english_pob_choice: is constrained
  chosen_spanish: sea constreñida
  alternatives_spanish:
  - sea oprimida
  - sea apremiada
  - sufra presión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo transmite presión, constricción o ser apretada por la dificultad. «Sea constreñida» conserva esa fuerza corporal y refleja bien la pasiva del original.
- source_word: ወሊድ
  english_pob_choice: giving birth
  chosen_spanish: dar a luz
  alternatives_spanish:
  - parto
  - alumbrar
  - nacimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el sustantivo pertenece a la escena del nacimiento. En español, verbalizarlo como «dar a luz» da fluidez natural y mantiene la acción concreta.
- source_word: በአፈ ማሕፀን
  english_pob_choice: to the mouth of the womb
  chosen_spanish: a la boca del vientre
  alternatives_spanish:
  - a la abertura del vientre
  - a la boca del útero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es anatómica y vívida. «Boca del vientre» reproduce de modo más literal la imagen de «mouth of the womb» y conserva el golpe retórico del original.
theological_decisions:
- issue: Mantener o suavizar la imagen de parto en la descripción del castigo
  english_pob_reading: Retain the concrete simile of labor pain and constriction
  chosen_spanish_reading: Mantener la comparación concreta con el dolor del parto y la constricción física
  alternative_spanish_readings:
  - Generalizar como «les sobrevendrá angustia» sin la imagen de parto
  - Suavizar la imagen para hacerla más abstracta
  rationale: El texto usa una comparación sostenida con el parto, incluida la llegada del hijo a la abertura del vientre. Preservar la imagen concreta respeta el tono apocalíptico y evita aplanar el lenguaje.
  doctrine_reference: 'Estrategia de traducción: preservar la imaginería apocalíptica sin convertirla en prosa religiosa genérica.'
translation_notes:
  revision_awareness: La versión inglesa más reciente aclaró la comparación de modo que el dolor viene sobre ellos como sobre una mujer en trabajo de parto; la redacción española sigue esa lectura y conserva el detalle anatómico de la boca del vientre sin endurecer la sintaxis.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto cuando aparezca el nombre divino; aquí no aplica.
  - Se evitó «Cristo» porque no hay lenguaje mesiánico en este versículo.
  - «Constreñida» se eligió por su cercanía semántica al verbo de presión física del original y por mantener el paralelismo con el contexto del parto.
