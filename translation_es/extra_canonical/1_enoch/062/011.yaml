translation:
  language: es
  text: Y los entregará[a] a los ángeles para castigo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los pondrá en manos de los ángeles». El ge''ez permite entender la construcción como entrega a su custodia o como entrega con sentido instrumental.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con castigo». La construcción puede leerse con valor de propósito/resultado o de medio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይሜጥዎሙ
  english_pob_choice: and he will deliver them over
  chosen_spanish: y lo entregará
  alternatives_spanish:
  - y los entregará
  - y los pondrá en manos de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa poner a personas bajo la potestad o custodia de otro. «Entregará» conserva mejor el matiz judicial/apocalíptico que un simple «enviará», y la forma singular concuerda con la referencia implícita del agente en el contexto.
- source_word: ለመላእክት
  english_pob_choice: to the angels
  chosen_spanish: a los ángeles
  alternatives_spanish:
  - para los ángeles
  - en manos de los ángeles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición introduce el destinatario de la entrega. «A los ángeles» es la manera más directa en español; el contexto deja implícita su función de custodia punitiva sin añadir más de lo que dice el texto.
- source_word: በመቅሠፍት
  english_pob_choice: for punishment
  chosen_spanish: para castigo
  alternatives_spanish:
  - con castigo
  - para tormento
  - para azote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo señala castigo, azote o corrección. «Para castigo» reproduce bien la relación final o de resultado que permite la construcción ge'ez y mantiene el sentido judicial sin especificar indebidamente el tipo de pena.
theological_decisions:
- issue: Función de los ángeles en el juicio
  english_pob_reading: the angels are rendered without qualification as agents of punitive custody
  chosen_spanish_reading: los ángeles quedan sin especificación adicional como agentes de custodia punitiva
  alternative_spanish_readings:
  - los ángeles como seres celestiales genéricos
  - los ángeles como ejecutores explícitos del castigo
  rationale: El texto ge'ez solo dice «los ángeles»; no identifica una clase especial ni desarrolla su acción. La traducción mantiene esa reserva y expresa la función punitiva únicamente mediante «para castigo».
  doctrine_reference: Mantener la tensión interpretativa del texto apocalíptico sin armonizarla de más.
translation_notes:
  revision_awareness: La fuente ge'ez disponible para este versículo está truncada en el paquete aportado; el inglés auditado indica una lectura breve y revisada que reduce un exceso anterior. La versión española sigue la cláusula extantemente atestiguada en el texto fuente proporcionado y evita introducir material no presente.
  spanish_consistency_notes:
  - Se mantuvo «ángeles» sin especificarlos, conforme a la reserva del texto fuente.
  - Se usó «castigo» en vez de vocablos eclesiásticos más interpretativos como «condena» o «pena» para conservar el valor judicial del ge'ez.
  - Se prefirió una construcción breve y directa, acorde con la extensión del segmento disponible.
