translation:
  language: es
  text: Y la congregación de los escogidos y de los santos será sembrada[a][b][c], y todos los escogidos se pondrán en pie delante de él en aquel día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asamblea» para «congregación».
    reason: lexical_alternative
  - marker: b
    text: «Santos» puede designar a la comunidad santificada, aunque en literatura apocalíptica el término también puede solaparse con seres celestiales santos.
    reason: theological_note
  - marker: c
    text: O «será vista».
    reason: textual_variant
lexical_decisions:
- source_word: ይዘራእ / ወይዘራእ
  english_pob_choice: shall be sown / shall be seen
  chosen_spanish: será sembrada
  alternatives_spanish:
  - será vista
  - será revelada
  - será mostrada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico corresponde a 'sembrar', no a 'ver'. En español, 'será sembrada' conserva la imagen agrícola y el valor pasivo del texto, que en contexto enóquico apunta al destino de la comunidad justa.
- source_word: ማኅበረ
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - asamblea
  - reunión
  - compañía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Congregación'' reproduce bien el sustantivo colectivo y mantiene un registro elevado sin volverlo eclesiásticamente específico. ''Asamblea'' sería posible, pero algo más plano.'
- source_word: ኅሩያን
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - seleccionados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Escogidos'' es natural en español y conserva el sentido de elección divina sin cargar tanto el término como ''elegidos'' en algunos contextos teológicos.'
- source_word: ቅዱሳን
  english_pob_choice: holy ones
  chosen_spanish: santos
  alternatives_spanish:
  - santos consagrados
  - seres santos
  - los santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el sustantivo plural puede referirse a la comunidad santificada; en español, 'santos' mantiene la amplitud del término y deja abierta la tensión entre comunidad humana y seres celestiales.
- source_word: ወይቀውሙ
  english_pob_choice: shall stand
  chosen_spanish: se pondrán en pie
  alternatives_spanish:
  - estarán de pie
  - se presentarán
  - permanecerán en pie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Se pondrán en pie'' expresa mejor la acción resultativa ante un tribunal o presencia exaltada, sin perder la literalidad básica de ''estar de pie''.'
- source_word: በቅድሜሁ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  - frente a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Delante de él'' es claro y natural en español; conserva la relación de comparecencia judicial/presencial sin introducir un matiz más solemne de ''ante''.'
- source_word: ኵሎሙ
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - la totalidad de
  - cada uno de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la universalidad explícita del término con una forma breve y idiomática en español.
- source_word: በይእቲ ዕለት
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en ese tiempo
  - en aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''En aquel día'' conserva la fórmula escatológica tradicional y su valor de marcador apocalíptico temporal.'
theological_decisions:
- issue: 'Sentido de ቅዱሳን: comunidad humana fiel o seres celestiales'
  english_pob_reading: Rendered generically as 'holy ones' without narrowing the referent.
  chosen_spanish_reading: '''santos'' sin precisar si se trata solo de humanos fieles o también de seres celestiales'
  alternative_spanish_readings:
  - '''santos'' como los fieles humanos'
  - '''seres santos'' como entidades celestiales'
  - '''los santos'' con tono eclesial'
  rationale: El contexto apocalíptico permite más de una lectura y el texto no obliga a resolverla. Mantener la amplitud preserva la tensión teológica y la ambigüedad heredada del original.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla por adelantado.
- issue: Metáfora de 'ser sembrada' aplicada a la congregación
  english_pob_reading: '''shall be sown'' with apocalyptic imagery of the gathered righteous.'
  chosen_spanish_reading: La congregación 'será sembrada' como imagen escatológica de implantación/juicio.
  alternative_spanish_readings:
  - '''será plantada'''
  - '''será sembrada'' en sentido figurado sin explicitar'
  - '''será dispersada'''
  rationale: '''Sembrada'' conserva la metáfora agrícola del texto y su resonancia enóquica sin sustituirla por un equivalente interpretativo más libre como ''plantada''.'
  doctrine_reference: Mantener la imagen textual y su eco temático dentro de 1 Enoc.
translation_notes:
  revision_awareness: 'La fuente etiópica recuperada fue revisada por el adjudicador a partir de una corrección importante: el verbo no significa ''ser vista'', sino ''ser sembrada''. La versión española sigue esa revisión y evita reproducir la mistraducción anterior. También se ha conservado la ambigüedad de ''santos'' en lugar de cerrarla dogmáticamente.'
  spanish_consistency_notes:
  - Se mantiene 'escogidos' para ኅሩያን, en línea con el valor lexical de elección divina y la preferencia por español transparente.
  - Se evita 'SEÑOR' o 'Cristo' porque el versículo no contiene esos términos; se preserva la referencia pronominal 'él' del original.
  - '''Congregación'' y ''santos'' conservan el registro apocalíptico elevado sin volverlo eclesiástico moderno.'
