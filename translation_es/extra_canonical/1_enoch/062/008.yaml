review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del ge''ez y la revisión adjudicada clave: ወይዘራእ debe conservarse como «será sembrada», no «será vista». También mantiene adecuadamente «congregación», «escogidos», «santos», «delante de él» y el énfasis de «todos». Sin embargo, la nota al pie [c] contradice la revisión inglesa auditada al seguir ofreciendo «será vista» como alternativa, aunque esa lectura fue corregida explícitamente como error de traducción, no preservada como variante válida.'
  spanish_quality_summary: 'El español es claro, digno y legible. «Se pondrán en pie» es natural, aunque «estarán en pie» también habría funcionado; no requiere cambio. El único problema de calidad real es editorial y semántico: la nota [c] introduce una alternativa incorrecta y confusa para lectores hispanos. Conviene reemplazarla por una nota que explique la imagen agrícola o eliminarla. Mantener «en aquel día» es aceptable por su tono apocalíptico tradicional.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Escogidos» y «santos» concuerdan con las decisiones léxicas documentadas. No aparecen términos del glosario mayor como Yahvé, Mesías, Espíritu, etc. La principal exigencia terminológica aquí es sostener la metáfora de «sembrar», lo cual el texto principal sí hace.
  issues:
  - severity: high
    issue: La nota al pie [c] ofrece «O «será vista»»
    rationale: La auditoría inglesa muestra que «shall be seen» fue una traducción previa corregida por adjudicación como mistranslation; por tanto no debe preservarse en español como alternativa legítima ni como nota textual.
  - severity: medium
    issue: La razón de la nota [c] está etiquetada como textual_variant
    rationale: No se trata de una variante textual del original sino de una traducción previa errónea. Si se conserva una nota en esa posición, debe explicar la metáfora agrícola o una alternativa válida como «será plantada», aunque esta última es menos fiel.
  revised_spanish_text: Y la congregación de los escogidos y de los santos será sembrada[a][b][c], y todos los escogidos se pondrán en pie delante de él en aquel día.
  revised_footnotes:
  - marker: a
    text: O «asamblea» para «congregación».
    reason: lexical_alternative
  - marker: b
    text: «Santos» puede designar a la comunidad santificada, aunque en la literatura apocalíptica el término también puede solaparse con seres celestiales santos.
    reason: theological_note
  - marker: c
    text: La imagen «será sembrada» conserva la metáfora agrícola del original y su resonancia enóquica; no debe entenderse aquí como «será vista».
    reason: lexical_explanation
  revision_rationale: Se conserva el texto principal porque ya es fiel al original y a la adjudicación, pero se corrige la nota [c] para eliminar una alternativa explícitamente rechazada por la auditoría y reemplazarla por una explicación de la metáfora correcta.
