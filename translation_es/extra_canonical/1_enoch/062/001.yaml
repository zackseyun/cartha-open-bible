translation:
  language: es
  text: 'Y así el Señor mandó a los reyes, a los poderosos y a los exaltados, y a los que habitan en la tierra, y dijo: «Abran sus ojos y levanten sus cuernos[a], si pueden reconocer al Elegido[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cuernos» se mantiene literalmente para conservar la imagen apocalíptica de fuerza, poder o arrogancia; el contexto no obliga a reemplazarla por un término abstracto.
    reason: cultural_note
  - marker: b
    text: O «el Escogido». El término ge'ez funciona aquí como un título formal en las Parábolas, no solo como un adjetivo descriptivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: አዘዘ
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio mandato a
  lexicon: Dillmann Lexicon
  rationale: «Mandó» conserva la fuerza directiva del verbo sin sonar excesivamente rígido en español; mantiene el tono judicial-apocalíptico del contexto.
- source_word: እግዚእ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  - el Maestro
  lexicon: Dillmann Lexicon
  rationale: Aquí corresponde un título soberano para la figura que habla a los gobernantes terrenales; en español, «el Señor» comunica bien ese rango sin perder dignidad.
- source_word: ነገሥት
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - gobernantes
  lexicon: Dillmann Lexicon
  rationale: El término denota específicamente reyes; «reyes» preserva la referencia política concreta del juicio.
- source_word: ዐዚዛን
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los poderosos de la tierra
  lexicon: Dillmann Lexicon
  rationale: «Los poderosos» transmite bien la categoría social y el matiz de fuerza/poder sin volverlo abstracto en exceso.
- source_word: ልዑላን
  english_pob_choice: the exalted
  chosen_spanish: los exaltados
  alternatives_spanish:
  - los altos
  - los nobles
  lexicon: Dillmann Lexicon
  rationale: «Los exaltados» conserva la imagen de altura/status del original y sigue de cerca la decisión inglesa, evitando especificar una clase social no explicitada.
- source_word: እለ የሐድርዋ ለምድር
  english_pob_choice: those who dwell on the earth
  chosen_spanish: los que habitan la tierra
  alternatives_spanish:
  - los habitantes de la tierra
  - los que moran en la tierra
  lexicon: Dillmann Lexicon
  rationale: Esta fórmula apocalíptica se vuelve natural en español con «los que habitan la tierra», conservando el alcance universal y terrenal del grupo.
- source_word: ክሥቱ አዕይንቲክሙ
  english_pob_choice: Open your eyes
  chosen_spanish: Abrid vuestros ojos
  alternatives_spanish:
  - Abre tus ojos
  - Destapad vuestros ojos
  lexicon: Dillmann Lexicon
  rationale: Aunque el Ge'ez dice literalmente «abrid/descubrid», en español «abrid vuestros ojos» suena más natural y mantiene la imagen de revelación que exige el contexto.
- source_word: አንሥኡ አቅርንቲክሙ
  english_pob_choice: lift up your horns
  chosen_spanish: alzad vuestros cuernos
  alternatives_spanish:
  - levantad vuestros cuernos
  - alzad vuestra fuerza
  lexicon: Dillmann Lexicon
  rationale: Se conserva la imagen literal de «cuernos» porque en literatura apocalíptica funciona como símbolo de fuerza, poder o arrogancia; no se reduce a una abstracción.
- source_word: ትክሉ
  english_pob_choice: if you are able
  chosen_spanish: si podéis
  alternatives_spanish:
  - si sois capaces
  - si tenéis poder para
  lexicon: Dillmann Lexicon
  rationale: La forma corta «si podéis» expresa la misma prueba de capacidad con naturalidad en español y mantiene el desafío retórico.
- source_word: አእምሮቶ
  english_pob_choice: to recognize
  chosen_spanish: reconocer
  alternatives_spanish:
  - conocer
  - percibir
  - entender
  lexicon: Dillmann Lexicon
  rationale: «Reconocer» captura la idea de identificar al personaje revelado, no solo de saber algo de manera abstracta.
- source_word: ሐሩይ
  english_pob_choice: the Chosen One
  chosen_spanish: el Elegido
  alternatives_spanish:
  - el Escogido
  - el Elegido de Dios
  lexicon: Dillmann Lexicon
  rationale: «El Elegido» preserva el valor titular del término y es idiomático en español; evita importar «Cristo» donde el texto habla de un título apocalíptico propio.
theological_decisions:
- issue: Título ሐሩይ en el contexto de las Parábolas de 1 Enoc
  english_pob_reading: the Chosen One
  chosen_spanish_reading: el Elegido
  alternative_spanish_readings:
  - el Escogido
  rationale: El inglés POB opta por un título formal y no por una mera cualidad adjetival. En español, «el Elegido» conserva esa fuerza titular y mantiene la distancia respecto de fórmulas cristológicas posteriores.
  doctrine_reference: Consistencia de títulos apocalípticos; evitar anacronismo cristológico no sustentado por el texto.
- issue: Imagen de «horns» en la exhortación
  english_pob_reading: lift up your horns
  chosen_spanish_reading: alzad vuestros cuernos
  alternative_spanish_readings:
  - mostrad vuestro poder
  - levantad vuestra fuerza
  rationale: La POB inglesa conserva la imagen literal para no aplanar el simbolismo. En español se mantiene igualmente para respetar el registro apocalíptico y su posible carga de poder, orgullo o fuerza regia.
  doctrine_reference: Preservación de imaginería apocalíptica; no neutralizar metáforas del juicio.
translation_notes:
  revision_awareness: La base inglesa y el testimonio ge'ez presentan alta concordancia; no se registran revisiones aplicadas en el paquete auditado. Esta versión española sigue esa lectura estable y conserva las elecciones léxicas clave sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para እግዚእ, conforme al tono soberano del pasaje.
  - Se usa «el Elegido» para el título ሐሩይ, evitando la sustitución por «Cristo».
  - Se conserva la imagen de «cuernos» por coherencia con la decisión de la POB inglesa y con el género apocalíptico.
  - El imperativo plural peninsular se emplea de forma bíblica y solemne para reflejar el plural directo del original.
