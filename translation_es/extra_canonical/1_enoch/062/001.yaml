    reason: cultural_note
  - marker: b
    text: O «el Escogido». El término ge'ez funciona aquí como un título formal en las Parábolas, no solo como un adjetivo descriptivo.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el español al registro neutral latinoamericano, se mejora la naturalidad de la expresión apocalíptica «habitan en la tierra» y se corrige el aparato de notas para que preserve la evidencia y las decisiones documentadas del POB inglés: nota cultural en «cuernos» y alternativa léxica para el título «el Elegido».'
