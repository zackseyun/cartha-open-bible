review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del Ge''ez y del POB inglés: mandato del Señor a reyes/elites/los habitantes de la tierra, con los imperativos de abrir los ojos y alzar los cuernos, y el reto de reconocer a la figura titular. Sin embargo, hay dos desajustes menores: la nota [a] está anclada en «exaltados», cuando en el rastro inglés las notas corresponden a «cuernos» y a «Chosen/Elect One»; además, «el Señor» entra en tensión con la convención general del proyecto que prefiere «Yahvé», aunque aquí la evidencia inmediata solo da un título (''the Lord'') y no el tetragrámaton, por lo que no requiere cambio forzoso.'
  spanish_quality_summary: 'La redacción es clara y digna, pero mezcla voseo peninsular/litúrgico («abrid», «alzad», «podéis») con un objetivo declarado de español neutral latinoamericano. Conviene regularizar a imperativos y formas plurales más ampliamente legibles: «abran», «levanten», «pueden». También «habitan la tierra» puede mejorarse a la fórmula apocalíptica más natural «habitan en la tierra».'
  glossary_alignment: 'Buena alineación en términos clave: «reyes», «los poderosos», «los exaltados», «reconocer», «el Elegido». La imagen «cuernos» se conserva correctamente. No hay conflicto con Mesías/Cristo. Sobre «the Lord», se puede mantener «el Señor» por tratarse de un título en una obra extracanonica con fuente Ge''ez, no de una instancia explícita del nombre divino.'
  issues:
  - severity: medium
    issue: Registro pronominal no neutral para el objetivo español
    rationale: «Abrid / alzad / podéis / vuestros» suena marcado y menos neutral latinoamericano. Una formulación con «abran / levanten / pueden / sus» es más ampliamente legible sin perder dignidad.
  - severity: medium
    issue: Las notas no siguen la distribución del audit trail inglés
    rationale: El inglés documenta una nota sobre «horns» y otra alternativa léxica sobre «the Chosen One / the Elect One». El borrador español pone [a] en «exaltados», creando una nota nueva innecesaria y omitiendo la alternativa titular que sí debe preservarse.
  - severity: low
    issue: «Habitan la tierra» puede sonar menos natural que «habitan en la tierra»
    rationale: La segunda opción conserva mejor la expresión apocalíptica y suena más idiomática en español general.
