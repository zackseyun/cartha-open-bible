  yaml_path: translation/extra_canonical/1_enoch/062/001.yaml
  text: And thus the Lord commanded the kings and the mighty and the exalted[a], and those who dwell on the earth, and said, “Open your eyes and lift up your horns[b], if you are able to recognize the Chosen One.”
  footnotes:
