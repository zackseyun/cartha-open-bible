revisions:
- from: 'Y así el Señor mandó a los reyes, a los poderosos y a los exaltados[a], y a los que habitan la tierra, y dijo: «Abrid vuestros ojos y alzad vuestros cuernos[b], si podéis reconocer al Elegido».'
  to: 'Y así el Señor mandó a los reyes, a los poderosos y a los exaltados, y a los que habitan en la tierra, y dijo: «Abran sus ojos y levanten sus cuernos[a], si pueden reconocer al Elegido[b]».'
  rationale: 'Se ajusta el español al registro neutral latinoamericano, se mejora la naturalidad de la expresión apocalíptica «habitan en la tierra» y se corrige el aparato de notas para que preserve la evidencia y las decisiones documentadas del POB inglés: nota cultural en «cuernos» y alternativa léxica para el título «el Elegido».'
  reviewer_model: gpt-5.4
