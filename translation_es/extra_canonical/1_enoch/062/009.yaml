translation:
  language: es
  text: Y caerán todos los reyes, y los poderosos[a], y los exaltados, y los que gobiernan la tierra seca, delante de él sobre sus rostros, y se postrarán y pondrán su esperanza en aquel Hijo del Hombre[b], y le suplicarán y buscarán misericordia[c] de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los que gobiernan la tierra”. El ge'ez dice literalmente “los que gobiernan la tierra seca”, una expresión concreta de dominio terrestre.
    reason: lexical_alternative
  - marker: b
    text: O “ese Hijo del Hombre”. El demostrativo puede expresar cierta distancia solemne; en español, “aquel” la comunica con mayor naturalidad en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O “y le pedirán misericordia”. El texto repite la idea de petición; “le suplicarán” y “buscarán misericordia de él” conservan esa duplicación con español más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወድቁ
  english_pob_choice: shall fall down
  chosen_spanish: caerán
  alternatives_spanish:
  - se postrarán
  - caerán postrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa caída/prostración en actitud de sometimiento. En español, 'caerán' mantiene la imagen física y el tono de humillación apocalíptica; el complemento 'delante de él sobre sus rostros' ya explicita la postura.
- source_word: ነገሥት
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - soberanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido ordinario es 'reyes'. 'Reyes' conserva la concreción política del texto y el paralelismo con los demás grupos de poder.
- source_word: መዛዝእት
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los grandes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término abarca personas con poder o autoridad. 'Los poderosos' comunica bien el rango social elevado sin estrecharlo a una clase específica.
- source_word: ልዑላን
  english_pob_choice: the exalted
  chosen_spanish: los exaltados
  alternatives_spanish:
  - los altos
  - los nobles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Denota a los de alto rango. 'Los exaltados' conserva el registro elevado y la ironía del abatimiento ante el Hijo del Hombre.
- source_word: እለ ይመልከዋ ለየብስ
  english_pob_choice: those who rule the dry land
  chosen_spanish: los que gobiernan la tierra seca
  alternatives_spanish:
  - los que gobiernan la tierra
  - los que poseen la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez es literalmente 'gobernar la tierra seca'. 'Tierra seca' preserva la imagen concreta del original y evita suavizarla prematuramente a 'tierra' o 'mundo'.
- source_word: በቅድሜሁ በገጾሙ
  english_pob_choice: before him on their faces
  chosen_spanish: delante de él sobre sus rostros
  alternatives_spanish:
  - delante de él con el rostro en tierra
  - delante de él, rostro en tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Las dos expresiones intensifican la prostración corporal. 'Sobre sus rostros' conserva la imaginería literal y es natural en español bíblico moderno.
- source_word: ይሰግዱ
  english_pob_choice: they shall bow down
  chosen_spanish: se postrarán
  alternatives_spanish:
  - se inclinarán
  - adorarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede expresar homenaje reverente o adoración. Dado el contexto de postración física explícita, 'se postrarán' preserva la acción sin resolverla de antemano como 'adorar'.
- source_word: ይሴፈዉ
  english_pob_choice: set their hope on
  chosen_spanish: pondrán su esperanza en
  alternatives_spanish:
  - esperarán en
  - confiarán en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido es orientar la esperanza hacia alguien. 'Pondrán su esperanza en' reproduce bien la dirección del acto y el matiz de confianza.
- source_word: ለዝኩ ወልደ እጓለ እመሕያው
  english_pob_choice: that Son of Man
  chosen_spanish: ese Hijo del Hombre
  alternatives_spanish:
  - aquel Hijo del Hombre
  - ese hijo del hombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este pasaje funciona como título apocalíptico ya reconocible. 'Ese Hijo del Hombre' conserva el demostrativo y la función titular sin introducir formulaciones cristológicas ajenas al verso.
- source_word: ይስእልዎ
  english_pob_choice: they shall petition him
  chosen_spanish: le suplicarán
  alternatives_spanish:
  - le pedirán
  - le rogarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo implica pedir con insistencia o en actitud de súplica. 'Le suplicarán' comunica bien la deferencia y la intensidad del ruego en un marco real/apocalíptico.
- source_word: ወይስእሉ ኀቤሁ ምሕረተ
  english_pob_choice: they shall seek mercy from him
  chosen_spanish: y pedirán misericordia de él
  alternatives_spanish:
  - y buscarán misericordia de él
  - y implorarán misericordia de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto repite la idea de pedir; la traducción conserva ese segundo movimiento de petición. 'Misericordia' mantiene el sustantivo concreto del original; 'de él' refleja el régimen 'from him' del audit trail inglés, aunque en español también puede entenderse como procedencia de la misericordia.
theological_decisions:
- issue: Si la actitud ante el Hijo del Hombre debe expresarse como adoración explícita o como homenaje/prostración
  english_pob_reading: bow down
  chosen_spanish_reading: se postrarán
  alternative_spanish_readings:
  - lo adorarán
  - le rendirán homenaje
  rationale: El ge'ez admite un rango entre homenaje reverente y adoración. 'Se postrarán' preserva esa tensión sin decidirla de forma maximalista o minimalista.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Cómo reflejar la repetición de peticiones en la cláusula final
  english_pob_reading: petition him and seek mercy from him
  chosen_spanish_reading: le suplicarán y pedirán misericordia de él
  alternative_spanish_readings:
  - le pedirán y buscarán misericordia de él
  - le implorarán y pedirán misericordia de él
  rationale: El original repite la idea de pedir, y el audit trail inglés también preserva esa doblez. 'Suplicarán' + 'pedirán misericordia' mantiene la repetición semántica y el registro elevado sin sonar forzado en español.
  doctrine_reference: Mantener la repetición retórica del texto fuente
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una corrección reciente en la cláusula final para preservar la repetición del verbo de petición. La versión española sigue esa revisión al mantener dos movimientos verbales en la última cola: súplica + petición de misericordia.'
  spanish_consistency_notes:
  - Se mantiene 'Hijo del Hombre' como título con mayúscula, en línea con el uso apocalíptico local del pasaje.
  - Se evita 'SEÑOR' como máscara del nombre divino porque el versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
  - '''Tierra seca'' conserva la imagen concreta del ge''ez, aunque la nota aclara la alternativa natural ''tierra''.'
  - '''Se postrarán'' se usa para no fijar exegéticamente la cláusula como adoración explícita o mero homenaje.'
