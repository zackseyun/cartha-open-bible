review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del ge''ez: la caída/prostración de reyes y poderosos, la referencia concreta a ''la tierra seca'', la sumisión ante el Hijo del Hombre y la súplica por misericordia. También preserva razonablemente la tensión de ይሰግዱ con ''se postrarán''. Sin embargo, hay dos desajustes importantes de fidelidad/legibilidad: ''caerán'' pierde algo de la fuerza reverencial de ''fall down'' en este contexto, y sobre todo ''pedirán misericordia de él'' es español poco natural y puede sugerir erróneamente que piden misericordia acerca de él, no a él/des él.'
  spanish_quality_summary: El texto es en general digno y legible, pero contiene giros mejorables. 'Delante de él sobre sus rostros' es aceptable en registro bíblico, aunque 'con el rostro en tierra' sería más idiomático; no es imprescindible cambiarlo. En cambio, 'pedirán misericordia de él' suena antinatural en español y conviene repararlo. También 'ese Hijo del Hombre' funciona, pero 'aquel Hijo del Hombre' expresa mejor el matiz solemne del demostrativo en español bíblico.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Hijo del Hombre' está bien capitalizado como título local. No aplica Yahvé/Mesías/Cristo aquí. La decisión 'se postrarán' para el verbo de homenaje concuerda con la pauta de no resolver la tensión hacia 'adorar'.
  issues:
  - severity: medium
    issue: La frase final 'pedirán misericordia de él' es poco natural y potencialmente ambigua en español.
    rationale: El ge'ez y el audit trail inglés expresan petición dirigida a él/desde él. En español natural y fiel debe decirse 'buscarán misericordia de él' o 'le pedirán misericordia', evitando un giro que pueda malentenderse.
  - severity: low
    issue: '''Caerán'' es correcto pero algo débil para la prostración reverencial de ይወድቁ.'
    rationale: El contexto ('delante de él sobre sus rostros') ya compensa bastante, pero 'caerán rostro en tierra' o 'caerán postrados' transmitiría mejor la fuerza de 'fall down'.
  - severity: low
    issue: La nota [b] no refleja la alternativa documentada principal del audit trail inglés.
    rationale: La cuestión documentada en inglés para ese segmento no es tanto el matiz del demostrativo, sino la posibilidad de 'aquel Hijo del Hombre' como alternativa de formulación. Conviene afinar la nota para que sirva mejor al lector español.
  revised_spanish_text: Y caerán todos los reyes, y los poderosos[a], y los exaltados, y los que gobiernan la tierra seca, delante de él sobre sus rostros, y se postrarán y pondrán su esperanza en aquel Hijo del Hombre[b], y le suplicarán y buscarán misericordia[c] de él.
  revised_footnotes:
