  to: Y caerán todos los reyes, y los poderosos[a], y los exaltados, y los que gobiernan la tierra seca, delante de él sobre sus rostros, y se postrarán y pondrán su esperanza en aquel Hijo del Hombre[b], y le suplicarán y buscarán misericordia[c] de él.
  rationale: 'La revisión hace un ajuste pequeño pero necesario para mejorar la fidelidad idiomática del español: reemplaza ''pedirán misericordia de él'' por ''buscarán misericordia de él'', que preserva mejor la construcción del audit trail y evita una frase extraña o ambigua. También cambia ''ese'' por ''aquel'' para un tono más natural y solemne en español bíblico.'
