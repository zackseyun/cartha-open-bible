translation:
  language: es
  text: Y una mitad de ellos mirará a la otra mitad, y quedarán aterrados, y sus rostros se abatirán[a], y el dolor se apoderará de ellos cuando vean a aquel Hijo del Hombre[b] sentado en el trono de su gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «sus rostros caerán» o «sus rostros serán abatidos». El giro etiópico sugiere una imagen visible de vergüenza o pavor.'
    reason: lexical_alternative
  - marker: b
    text: Se conserva el valor titulado de «Hijo del Hombre» como designación apocalíptica propia de este pasaje, sin añadir formulaciones doctrinales externas.
    reason: theological_note
lexical_decisions:
- source_word: መንፈቆሙ ... ለመንፈቆሙ
  english_pob_choice: one half of them ... the other half
  chosen_spanish: una mitad de ellos ... la otra mitad
  alternatives_spanish:
  - sus mitades
  - cada uno al otro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro etiópico expresa una división concreta del grupo en dos partes. «Una mitad de ellos ... la otra mitad» conserva esa imagen sin diluirla en una reciprocidad más abstracta.
- source_word: ይሬእዩ
  english_pob_choice: shall look at / see
  chosen_spanish: mirará
  alternatives_spanish:
  - verá
  - contemplará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Aquí el verbo gobierna un objeto directo implícito: la otra mitad. «Mirará» reproduce mejor el acto dirigido de fijar la vista que un simple «verá».'
- source_word: ይደነግጹ
  english_pob_choice: shall be terrified
  chosen_spanish: quedarán aterrados
  alternatives_spanish:
  - serán aterrados
  - se estremecerán
  - quedarán alarmados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es de terror escatológico. «Quedarán aterrados» comunica intensidad y un estado resultante, más natural en español que un calco verbal fuerte.
- source_word: ይቴሕቱ ገጾሙ
  english_pob_choice: their faces shall fall
  chosen_spanish: sus rostros se abatirán
  alternatives_spanish:
  - sus rostros caerán
  - sus rostros se bajarán
  - sus semblantes se abatirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El modismo apunta a vergüenza, miedo o abatimiento visible. «Sus rostros se abatirán» mantiene la imagen descendente y suena más natural que traducir literalmente «caerán».
- source_word: ይእኅዞሙ ሕማም
  english_pob_choice: pain shall seize them
  chosen_spanish: el dolor se apoderará de ellos
  alternatives_spanish:
  - la angustia se apoderará de ellos
  - el dolor los asirá
  - la aflicción los tomará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene la idea de tomar o agarrar con fuerza. «Se apoderará de ellos» conserva la violencia de la imagen y evita precisar indebidamente si es dolor físico o angustia.
- source_word: ወልደ ብእሲ
  english_pob_choice: Son of Man
  chosen_spanish: Hijo del Hombre
  alternatives_spanish:
  - hijo del hombre
  - el ser humano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En las Parábolas funciona como título apocalíptico. Se conserva la capitalización española para señalar ese valor titular sin importar formulaciones doctrinales ajenas al pasaje.
- source_word: ይነብር
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - sentándose
  - permaneciendo
  - entronizado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con «en el trono» el valor natural en español es estar sentado. «Sentado» traduce el estado resultante y deja que el trono exprese la entronización.
- source_word: መንበረ ስብሐቲሁ
  english_pob_choice: the throne of his glory
  chosen_spanish: el trono de su gloria
  alternatives_spanish:
  - su trono glorioso
  - el trono de su majestad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la estructura posesiva y la fórmula de entronización apocalíptica. «Gloria» corresponde mejor al sustantivo base que «majestad».
theological_decisions:
- issue: Valor de ወልደ ብእሲ como título apocalíptico o expresión genérica
  english_pob_reading: Rendered as the title 'that Son of Man'
  chosen_spanish_reading: aquel Hijo del Hombre
  alternative_spanish_readings:
  - aquel hijo del hombre
  - aquel ser humano
  rationale: En este contexto la figura es una entidad escatológica identificable; por eso se mantiene el título. «Aquel» conserva la deixis visionaria del demonstrativo etiópico y evita convertirlo en una expresión genérica.
  doctrine_reference: Mantener el sentido local del texto sin armonizarlo prematuramente con usos posteriores; traducir el título por su fuerza en el pasaje.
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta ningún cambio: el texto etiópico y el audit trail inglés convergen claramente en la misma lectura, y esta versión española sigue esa convergencia sin suavizar ni sobreinterpretar las imágenes.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - Se mantiene «Hijo del Hombre» con capitalización por ser un título local del pasaje, no una frase genérica.
  - Se prefirió un español moderno y solemne, evitando el calco rígido pero conservando las imágenes apocalípticas.
