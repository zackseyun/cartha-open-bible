  revised_spanish_text: Y una mitad de ellos mirará a la otra mitad, y quedarán aterrados, y sus rostros se abatirán[a], y el dolor se apoderará de ellos cuando vean a aquel Hijo del Hombre[b] sentado en el trono de su gloria.
