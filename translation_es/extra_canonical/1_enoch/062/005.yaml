  yaml_path: translation/extra_canonical/1_enoch/062/005.yaml
  text: And one half of them shall look at the other half[a], and they shall be terrified, and their faces shall fall[b], and pain shall seize them when they see that Son of Man sitting on the throne of his glory.
  footnotes:
