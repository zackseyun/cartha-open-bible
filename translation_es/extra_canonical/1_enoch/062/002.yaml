translation:
  language: es
  text: Y el Señor de los Espíritus[a] lo sentó sobre el trono de su gloria, y el espíritu de rectitud[b] fue derramado sobre él, y la palabra de su boca mata a todos los pecadores, y todos los rebeldes son destruidos de delante de él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «el Señor de los Espíritus lo hizo sentar»; el ge''ez es causativo, no intransitivo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «espíritu de justicia».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «de delante de su rostro», un modismo judicial de remoción o destrucción ante la presencia del entronizado.'
    reason: cultural_note
lexical_decisions:
- source_word: እግዚእ መናፍስት
  english_pob_choice: Lord of Spirits
  chosen_spanish: Señor de los Espíritus
  alternatives_spanish:
  - Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el título fijo y su registro apocalíptico. En español, la mayúscula en "Espíritus" ayuda a reflejar el carácter titulativo, sin volverlo una fórmula eclesiástica ajena al texto.
- source_word: አንበረ
  english_pob_choice: seated him
  chosen_spanish: lo sentó
  alternatives_spanish:
  - lo hizo sentar
  - lo colocó sentado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El ge''ez es causativo: el Señor de los Espíritus no se sienta a sí mismo, sino que hace sentar al sujeto implícito. "Lo sentó" comunica con naturalidad esa causalidad y preserva el error corregido en la revisión.'
- source_word: መንበረ ስብሐቲሁ
  english_pob_choice: the throne of his glory
  chosen_spanish: el trono de su gloria
  alternatives_spanish:
  - su trono glorioso
  - el trono de su majestad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la estructura genitiva explícita del original y del audit trail inglés. "Gloria" conserva el tono visionario y judicial del pasaje.
- source_word: መንፈሰ ጽድቅ
  english_pob_choice: the spirit of righteousness
  chosen_spanish: el espíritu de justicia
  alternatives_spanish:
  - el espíritu de rectitud
  - un espíritu de justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí "justicia" expresa bien el sentido jurídico-moral del pasaje y su paralelismo con el juicio. Se evita fijar innecesariamente "rectitud" porque el contexto es de investidura y sentencia.
- source_word: ተክዕወ ዲቤሁ
  english_pob_choice: was poured out upon him
  chosen_spanish: fue derramado sobre él
  alternatives_spanish:
  - descansó sobre él
  - fue concedido sobre él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Derramado" conserva la imagen fuerte del verbo y evita debilitarla a un mero "reposó". El pasivo español mantiene la acción recibida por el sujeto implícito.'
- source_word: ነገረ አፉሁ
  english_pob_choice: the word of his mouth
  chosen_spanish: la palabra de su boca
  alternatives_spanish:
  - el dicho de su boca
  - lo que sale de su boca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Palabra" mantiene el singular colectivo y la fuerza judicial del dicho pronunciado. Es la opción más fiel y natural en español.'
- source_word: ይቀትል ኵሎሙ ኃጥኣነ
  english_pob_choice: slays all the sinners
  chosen_spanish: mata a todos los pecadores
  alternatives_spanish:
  - da muerte a todos los pecadores
  - mata a todos los impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperfecto en ge'ez permite un presente gnómico o durativo; en español, "mata" preserva el valor actual/general sin convertirlo en pasado. Se traduce con literalidad suficiente el sentido letal del verbo.
- source_word: ዐማፂያን
  english_pob_choice: the lawless
  chosen_spanish: los impíos
  alternatives_spanish:
  - los sin ley
  - los rebeldes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el sentido literal admite "sin ley" o "rebeldes", "impíos" funciona mejor en español bíblico para el conjunto del juicio moral del versículo, sin perder la oposición a Dios implícita en el término.
- source_word: እምገጹ ይትሐጐሉ
  english_pob_choice: were destroyed from before his face
  chosen_spanish: son destruidos de delante de su rostro
  alternatives_spanish:
  - perecen delante de él
  - son apartados de su presencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el idiomático "de delante de su rostro", aunque en español suena más natural con "su rostro" que con "su faz". El presente pasivo mantiene el aspecto imperfectivo y la escena judicial de presencia.
theological_decisions:
- issue: Referente de 'him' en 'the spirit of righteousness was poured out upon him'
  english_pob_reading: Retain the direct pronoun 'upon him' without interpretive substitution.
  chosen_spanish_reading: Conservar "sobre él" sin identificar explícitamente el referente.
  alternative_spanish_readings:
  - sobre el trono
  - sobre el Elegido
  - sobre el Hijo del Hombre
  rationale: El ge'ez no obliga a resolver el referente en esta línea. La traducción española preserva la ambigüedad controlada del texto y evita sobreinterpretar más allá de la evidencia disponible.
  doctrine_reference: Preservar tensión interpretativa sin resolverla
- issue: Fuerza judicial de la palabra de su boca
  english_pob_reading: 'Render as an effective judicial utterance: ''the word of his mouth put all the sinners to death.'''
  chosen_spanish_reading: La palabra de su boca ejecuta juicio mortal sobre los pecadores sin añadir una glosa interpretativa.
  alternative_spanish_readings:
  - la palabra de su boca pone a muerte a todos los pecadores
  - la palabra de su boca condena a muerte a todos los pecadores
  rationale: El texto presenta la palabra como instrumento eficaz de juicio. En español, "mata" mantiene la fuerza letal sin introducir vocabulario posterior ajeno al pasaje.
  doctrine_reference: Juicio por la palabra eficaz
- issue: Valor aspectual de los verbos finales
  english_pob_reading: '''slays'' / ''are destroyed'' in imperfect aspect, not a simple past.'
  chosen_spanish_reading: 'Usar presente gnómico: "mata" / "son destruidos".'
  alternative_spanish_readings:
  - matará / serán destruidos
  - mata / serán destruidos
  rationale: El imperfectivo ge'ez no debe aplastarse en pasado narrativo. El presente español conserva mejor el valor habitual, actual o profético del original.
  doctrine_reference: Respeto del aspecto verbal original
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un error importante: አንበረ es causativo, por lo que el sujeto es quien sienta a otro, no quien se sienta. También ajustó los verbos finales al imperfecto. La presente versión incorpora ambas correcciones y conserva la ambigüedad del referente de "sobre él".'
  spanish_consistency_notes:
  - Mantengo 'Señor de los Espíritus' como título estable, en paralelo con el inglés auditado.
  - Uso 'justicia' en lugar de 'rectitud' por fluidez bíblica y coherencia con el marco judicial del versículo.
  - Conservo el presente 'mata / son destruidos' para reflejar el valor imperfectivo del ge'ez.
  - Evito 'SEÑOR' como sustituto reverencial para no ocultar el título específico del texto.
  - '''rostro'' se mantiene en el modismo final para reflejar el hebraísmo/judicialism semítico subyacente.'
