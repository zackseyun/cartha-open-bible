translation:
  language: es
  text: Y por esto no os he asignado esposas[a], porque la morada de los seres espirituales del cielo[b][c] está en el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mujeres». El ge'ez puede entenderse de forma más general, pero en este contexto también sugiere esposas o parejas asignadas.
    reason: lexical_alternative
  - marker: b
    text: O «los espíritus del cielo» / «los seres espirituales celestiales». La expresión ge'ez puede entenderse de más de una manera estrechamente relacionada.
    reason: lexical_alternative
  - marker: c
    text: 'La repetición de «cielo» es deliberada: estos seres pertenecen al cielo, y su morada está en el cielo.'
    reason: cultural_note
lexical_decisions:
- source_word: ወበእንተዝ
  english_pob_choice: And because of this
  chosen_spanish: Y por esto
  alternatives_spanish:
  - Y debido a esto
  - Por esta causa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión introduce la causa de lo dicho antes; «Y por esto» conserva bien la relación causal en un español natural y sobrio.
- source_word: ኢረሰይኩ
  english_pob_choice: I have not appointed
  chosen_spanish: no os he asignado
  alternatives_spanish:
  - no os he nombrado
  - no os he destinado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo en contexto implica establecer o asignar. «Asignado» mantiene esa fuerza mejor que un simple «hecho» o «puesto».
- source_word: ለክሙ
  english_pob_choice: for you
  chosen_spanish: os
  alternatives_spanish:
  - para vosotros
  - a vosotros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con «asignar» el dativo se vuelve idiomático en español mediante el objeto indirecto «os».
- source_word: አንስቲያ
  english_pob_choice: wives
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  - mujeres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El inglés POB documenta la tensión entre una traducción más específica («wives») y una más amplia («women»). En español, «mujeres» preserva mejor la amplitud semántica del término sin fijar de más una relación matrimonial que el ge'ez puede no expresar de manera exclusiva.
- source_word: መንፈሳውያነ
  english_pob_choice: the spiritual ones
  chosen_spanish: los seres espirituales
  alternatives_spanish:
  - los espirituales
  - los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez es adjetival/substantiva. «Los seres espirituales» conserva la referencia a una clase de seres y evita resolver innecesariamente si se trata de «espíritus» en sentido estricto.
- source_word: ሰማይ
  english_pob_choice: of heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - celestiales
  - del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la repetición de la raíz «cielo/heaven» con un genitivo natural en español.
- source_word: ውስተ ሰማይ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La locución locativa se traduce de forma directa y clara, conservando la repetición enfática del término.
- source_word: መሓድሪሆሙ
  english_pob_choice: the dwelling ... is
  chosen_spanish: la morada ... está
  alternatives_spanish:
  - su morada ... es
  - su habitación ... está
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Morada» es un sustantivo natural y elevado en español; «está» expresa la localización explícita del original sin sonar forzado.
theological_decisions:
- issue: Cómo traducir መንፈሳውያነ ሰማይ sin cerrar el sentido angelológico o espiritual
  english_pob_reading: the spiritual ones of heaven
  chosen_spanish_reading: los seres espirituales del cielo
  alternative_spanish_readings:
  - los espíritus del cielo
  - los seres celestiales
  rationale: La elección conserva la tensión interpretativa del ge'ez. «Seres espirituales» mantiene abierta la posibilidad de un colectivo espiritual sin imponer una identificación doctrinal más específica.
  doctrine_reference: Preservar la ambigüedad controlada del texto fuente; primacía del lenguaje original.
- issue: Si አንስቲያ debe limitarse a 'esposas' o mantenerse más general
  english_pob_reading: wives
  chosen_spanish_reading: mujeres
  alternative_spanish_readings:
  - esposas
  - mujeres
  rationale: Aunque el inglés POB optó por 'wives' por la lógica contextual, el ge'ez permite una referencia más general a mujeres. En español, «mujeres» evita sobrerrestricción y deja visible la tensión textual.
  doctrine_reference: Equivalencia óptima con atención a la amplitud lexical documentada.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto ge'ez y del aparato auditado en inglés. La redacción española busca mantener la causalidad, la repetición de cielo/cielo y la ambigüedad controlada de las expresiones clave, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa «cielo» de forma consistente para ሰማይ en ambos miembros de la frase, manteniendo la repetición deliberada.
  - Se prefirió «seres espirituales» para conservar la categoría semántica sin fijarla como 'ángeles' o 'espíritus' de manera absoluta.
  - Se evitó traducir automáticamente አንስቲያ como «esposas» en el texto principal, dejando esa opción en nota por la tensión lexical documentada.
  - La frase verbal «está en el cielo» reproduce la localización explícita y la cadencia del original.
