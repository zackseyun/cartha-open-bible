translation:
  language: es
  text: 'Y me respondió y me dijo, y yo oí[a]: «No temas, Enoc, hombre justo y escriba de justicia. Acércate aquí y oye mi palabra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto etiópico parece repetir el verbo de oír ('y oí, oí'). El español lo comprime por claridad, sin añadir una palabra como 'voz', que no está explícita en el original.
    reason: lexical_alternative
lexical_decisions:
- source_word: አውሥአኒ
  english_pob_choice: he answered me
  chosen_spanish: me respondió
  alternatives_spanish:
  - me contestó
  - me respondió a mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la relación dialogal del verbo de respuesta y su tono solemne en un contexto revelatorio.
- source_word: ወይቤለኒ
  english_pob_choice: and said to me
  chosen_spanish: y me dijo
  alternatives_spanish:
  - y me habló
  - y me habló diciendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la fórmula narrativa ordinaria de habla directa; en español, 'me dijo' mantiene la sencillez y la cadencia del original.
- source_word: ወሰምኩ፡ ሰማዕኩ
  english_pob_choice: and I heard
  chosen_spanish: y yo oí
  alternatives_spanish:
  - y oí
  - y escuché
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición de 'oír' se conserva con un giro natural en español; no se añade 'voz' porque el texto etíope no lo explicita.
- source_word: አትፍራህ
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una prohibición directa de consuelo y revelación; 'No temas' es claro, solemne y fiel al registro.
- source_word: ብእሲ ጻድቅ
  english_pob_choice: righteous man
  chosen_spanish: hombre justo
  alternatives_spanish:
  - hombre recto
  - varón justo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Justo'' conserva la fuerza ética de ''righteous'' sin imponer una formulación más técnica de ''justicia'' donde el atributo es descriptivo.'
- source_word: ጻሓፊ ጽድቅ
  english_pob_choice: scribe of righteousness
  chosen_spanish: escriba de justicia
  alternatives_spanish:
  - escriba de rectitud
  - escriba de la justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Escriba'' preserva la función literaria y revelatoria; ''justicia'' traduce la raíz de δικαιοσύνη/צדק con un matiz más natural en español para esta construcción genitiva.'
- source_word: ቅረብ ዝየ
  english_pob_choice: Come near here
  chosen_spanish: Acércate aquí
  alternatives_spanish:
  - Ven acá
  - Acércate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Condensa el movimiento y el deíctico espacial en un español idiomático sin perder la invitación a proximidad inmediata.
- source_word: ወስማዕ ቃልየ
  english_pob_choice: and hear my word
  chosen_spanish: y oye mi palabra
  alternatives_spanish:
  - y escucha mi palabra
  - y oye mis palabras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Palabra'' conserva el singular revelatorio; ''oye'' mantiene el tono imperativo sobrio del original.'
theological_decisions:
- issue: Doble calificación de Enoch como justo y como escriba
  english_pob_reading: righteous man and scribe of righteousness
  chosen_spanish_reading: hombre justo y escriba de justicia
  alternative_spanish_readings:
  - hombre recto y escriba de rectitud
  - justo y escriba de justicia
  rationale: Se mantienen ambas designaciones para no diluir ni el carácter moral ni la función de mediador/escritor revelado que el texto atribuye a Enoch.
  doctrine_reference: Consistencia de términos clave; preservación de títulos y funciones en literatura apocalíptica
translation_notes:
  revision_awareness: 'Se corrigió la tendencia a introducir ''voz'' como complemento implícito. La versión española sigue la revisión más reciente del audit trail: el original dice simplemente ''y oí''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Justicia'' se usa para la construcción genitiva ''scribe of righteousness'', coherente con la decisión inglesa auditada.'
  - No se introduce 'Cristo', 'SEÑOR' ni vocabulario eclesiástico ajeno al registro del texto.
