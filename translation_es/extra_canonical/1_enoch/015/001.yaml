  glossary_alignment: No hay términos del glosario maestro especialmente problemáticos en este versículo. 'hombre justo' para 'righteous man' es aceptable en español, y 'escriba de justicia' preserva la decisión documentada de mantener la raíz de justicia/rectitud. No se detectan conflictos con Yahvé, Mesías, Espíritu, etc.
