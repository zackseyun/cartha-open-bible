    reason: lexical_alternative
  - marker: c
    text: 'The final designation may be understood as a naming formula: after leaving the flesh, these beings are called ''evil spirits.'''
    reason: alternative_reading
  - marker: d
    text: Or 'And the souls of the wicked'.
