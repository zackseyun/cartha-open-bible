translation:
  language: es
  text: Y salieron espíritus malignos de su carne[a], porque fueron creados de arriba; y de los santos Vigilantes[b] fue su comienzo y su primer fundamento[c][d]. Serán espíritus malignos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'salieron de sus cuerpos'. El ge'ez dice explícitamente 'de su carne', conservando la imaginería corporal.
    reason: lexical_alternative
  - marker: b
    text: '''Vigilantes'' traduce un término técnico de Enoc para el grupo angelical; ''santos'' conserva su carácter consagrado.'
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula final puede leerse como una fórmula de nombramiento: después de salir de la carne, estos seres son llamados ''espíritus malignos''.'
    reason: alternative_reading
  - marker: d
    text: O 'y de los santos Vigilantes fue su origen primero'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ነፍሳት
  english_pob_choice: souls / evil spirits (in context)
  chosen_spanish: espíritus
  alternatives_spanish:
  - almas
  - vidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto y la revisión gramatical indican que la expresión funciona como designación de seres espirituales, no como 'almas' humanas en sentido corriente. En español, 'espíritus' conserva mejor el valor del giro final y evita confundir el referente con simples almas de difuntos.
- source_word: እኩያን
  english_pob_choice: the wicked / evil
  chosen_spanish: malignos
  alternatives_spanish:
  - malvados
  - malos
  - impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Como adjetivo sustantivado modifica a ነፍሳት y expresa su calidad moral. 'Malignos' permite mantener el tono de maldad espiritual del pasaje sin sonar demasiado técnico ni suavizar la fuerza ética.
- source_word: ወጽኡ እምሥጋሆሙ
  english_pob_choice: came out from their flesh
  chosen_spanish: salieron de su carne
  alternatives_spanish:
  - salieron de sus cuerpos
  - partieron de su carne
  - salieron de sus cuerpos mortales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imaginería corporal literal del ge'ez con 'carne', tal como el texto fuente la enfatiza. 'Salir de su carne' es natural en español y mantiene la tensión antropológica del pasaje.
- source_word: እስመ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce la razón explicativa de su condición y origen. 'Porque' es claro y directo en español moderno.
- source_word: እመልዕልት
  english_pob_choice: from above
  chosen_spanish: de arriba
  alternatives_spanish:
  - de lo alto
  - del cielo
  - de la altura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''De arriba'' reproduce la imaginería vertical del original sin forzar una especificación interpretativa como ''del cielo'', que podría ir más allá del texto.'
- source_word: ተፈጥሩ
  english_pob_choice: they were created
  chosen_spanish: fueron creados
  alternatives_spanish:
  - fueron hechos
  - fueron formados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Crear'' preserva el peso de origen y dependencia de la criatura respecto de su fuente. El masculino plural concuerda con el referente colectivo masculino del pasaje.'
- source_word: እምቅዱሳን ትጉሃን
  english_pob_choice: from the holy Watchers
  chosen_spanish: de los santos Vigilantes
  alternatives_spanish:
  - de los santos, los vigilantes
  - de los santos centinelas
  - de los santos observadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el término técnico 'Vigilantes' por ser el equivalente tradicional en este corpus enochico y por corresponder al grupo angelical del contexto. 'Santos' conserva el valor de consagración, no simple bondad moral.
- source_word: ቀዳሚቶሙ
  english_pob_choice: their beginning
  chosen_spanish: su comienzo
  alternatives_spanish:
  - su principio
  - su origen primero
  - su inicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Comienzo'' es natural y suficientemente cercano al matiz de origen inicial del término. Evita la redundancia o la rigidez de ''origen primero''.'
- source_word: ወቀዳሚ መሰረት
  english_pob_choice: and first foundation
  chosen_spanish: y su primer fundamento
  alternatives_spanish:
  - y su fundamento primero
  - y su base primera
  - y su fundamento original
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Fundamento'' refleja la imagen de base u origen fundacional. ''Primer fundamento'' conserva la repetición enfática del texto y mantiene el paralelismo con ''comienzo''.'
- source_word: መንፈሰ እኩየ
  english_pob_choice: evil spirits
  chosen_spanish: espíritus malignos
  alternatives_spanish:
  - espíritus malos
  - espíritus perversos
  - espíritus de maldad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma final se traduce como designación de seres espirituales. 'Espíritus malignos' preserva la cualidad negativa sin recargar el verso con una frase explicativa ajena al original.
theological_decisions:
- issue: Identidad de los seres descritos tras salir de la carne
  english_pob_reading: The verse speaks of the disembodied offspring of the Watchers and women, whose souls become 'evil spirits.'
  chosen_spanish_reading: El verso habla de seres espirituales vinculados a la descendencia de los Vigilantes, cuya condición final se nombra como 'espíritus malignos'.
  alternative_spanish_readings:
  - El verso se refiere de manera general a almas humanas perversas.
  - La expresión final es solo descriptiva, no una fórmula de nombramiento.
  rationale: El contexto inmediato de 1 Enoc 15 explica el origen y el destino de esos seres en relación con los Vigilantes. La redacción española debe conservar esa categoría enochica local sin absorberla en antropología humana ordinaria ni neutralizar la fuerza nominativa del cierre.
  doctrine_reference: Preservar el sentido local del pasaje y no armonizarlo artificialmente con categorías doctrinales posteriores.
- issue: Sentido de 'de arriba'
  english_pob_reading: It indicates a supernal/heavenly component in their origin, not moral approval.
  chosen_spanish_reading: '''De arriba'' señala un componente supernal o celestial en su origen, no una aprobación moral.'
  alternative_spanish_readings:
  - Significa simplemente 'antes' o 'al principio'.
  - Implica que eran plenamente ángeles.
  rationale: La frase conserva una procedencia vertical/heavenly sin borrar la tensión del texto, que distingue entre su procedencia superior y su estado espiritual anómalo. No se debe resolver la ambigüedad ampliando o reduciendo indebidamente su identidad.
  doctrine_reference: Preservar la tensión teológica del pasaje sin resolverla en exceso.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió una lectura previa basada en 'souls of the wicked' y la adjudicación que señala que el ge'ez ነፍሳት እኩያን es una construcción adjetival equivalente a 'evil spirits' o 'evil souls'. Por ello, el español evita 'almas de los impíos' y opta por 'espíritus malignos', manteniendo además la secuencia de origen 'de su carne... de los santos Vigilantes...'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este verso no lo requiere.
  - Se usa 'Vigilantes' como término técnico coherente con el corpus enochico y con el audit trail inglés.
  - Se evita 'Cristo' o terminología litúrgica ajena al pasaje.
  - La puntuación conserva dos miembros coordinados y el cierre nominativo del verso.
  - Las notas a pie de página preservan la alternativa corporal ('cuerpos') y la posible lectura de fórmula de nombramiento.
