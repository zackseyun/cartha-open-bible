translation:
  language: es
  text: Pero ustedes antes eran seres espirituales[a], viviendo una vida eterna[c] que no muere a través de todas las generaciones del mundo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘espíritus’. El término ge’ez también puede verterse de forma más breve, pero la redacción completa conserva mejor el carácter predicativo de la línea.
    reason: lexical_alternative
  - marker: b
    text: ‘Mundo’ también puede entenderse aquí como ‘edad’, dando el sentido de ‘a través de todas las generaciones para siempre’.
    reason: lexical_alternative
  - marker: c
    text: O ‘viviendo vida eterna’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ቀዳሚ
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - antes de eso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Antes’ reproduce con naturalidad el contraste temporal del pasaje sin cargarlo de matices cronológicos que el ge'ez no exige.
- source_word: ኮንክሙ
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  - habían sido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperfecto ‘eran’ funciona como predicación de estado, coherente con la descripción de lo que eran previamente.
- source_word: መንፈሳውያነ
  english_pob_choice: spiritual beings
  chosen_spanish: seres espirituales
  alternatives_spanish:
  - espíritus
  - los espirituales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Seres espirituales’ conserva el valor descriptivo del adjetivo y evita reducir demasiado pronto la frase a un tecnicismo ('espíritus') cuando el contexto sigue desarrollando su condición.
- source_word: ሕያዋነ
  english_pob_choice: living
  chosen_spanish: viviendo
  alternatives_spanish:
  - vivos
  - que vivían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El gerundio ayuda a mantener la construcción predicativa del original y enlaza con la frase nominal siguiente.
- source_word: ሕይወት ዘለዓለም
  english_pob_choice: an eternal life
  chosen_spanish: una vida eterna
  alternatives_spanish:
  - vida eterna
  - una existencia eterna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia ge'ez refleja una construcción directa de 'vida eterna'; en español, 'una vida eterna' preserva el sustantivo 'vida' y la fuerza cualitativa del sintagma.
- source_word: ዘኢይመውት
  english_pob_choice: that does not die
  chosen_spanish: que no muere
  alternatives_spanish:
  - que no perece
  - que no está sujeta a muerte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Que no muere’ mantiene la contundencia literal del relativo sin suavizarlo hacia abstracciones menos directas.
- source_word: ለኵሉ ትውልደ ዓለም
  english_pob_choice: through all the generations of the world
  chosen_spanish: a través de todas las generaciones del mundo
  alternatives_spanish:
  - por todas las generaciones del mundo
  - a lo largo de todas las generaciones de la edad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase conserva la duración extendida del original y mantiene 'mundo' como traducción primaria de ዓለም, dejando abierta la posible lectura de 'edad' sin imponerla en el texto principal.
theological_decisions:
- issue: 'Cómo traducir el estado original de los Vigilantes: ¿''espíritus'' o una descripción más amplia?'
  english_pob_reading: spiritual beings
  chosen_spanish_reading: seres espirituales
  alternative_spanish_readings:
  - espíritus
  - seres espirituales creados
  rationale: 'La versión española conserva la tensión ontológica del pasaje: no resuelve en exceso qué clase de seres eran, sino que retiene la caracterización dada por el ge''ez. ''Seres espirituales'' deja abierto el contraste con su condición posterior.'
  doctrine_reference: Mantener primacía del texto fuente y no cerrar una tensión teológica que el pasaje no desarrolla explícitamente.
- issue: 'Cómo reflejar ዓለም: ¿''mundo'' o ''edad''?'
  english_pob_reading: World may also be understood as age here
  chosen_spanish_reading: mundo
  alternative_spanish_readings:
  - edad
  - siglo
  rationale: Se mantiene 'mundo' en el texto principal por ser la traducción directa y más transparente; la posible acepción de 'edad' queda como alternativa interpretativa, no como imposición.
  doctrine_reference: Preservar ambigüedad semántica documentada sin borrar ninguna de las dos posibilidades.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del audit trail, que corrigió la frase inglesa a 'living an eternal life' para reflejar la construcción cognata del ge'ez. Por eso la versión española usa 'viviendo una vida eterna' en vez de una paráfrasis con 'con'.
  spanish_consistency_notes:
  - Se conservó 'mundo' para ዓለም, en línea con la práctica POB de no resolver prematuramente la ambigüedad 'mundo/edad'.
  - Se evitó 'Cristo', 'Señor' u otra terminología no presente en el verso.
  - Se eligió 'seres espirituales' como equivalente funcional de 'spiritual beings' para mantener claridad sin perder la tensión lexical.
  - La puntuación busca naturalidad en español bíblico moderno, sin imitar mecánicamente el orden inglés.
