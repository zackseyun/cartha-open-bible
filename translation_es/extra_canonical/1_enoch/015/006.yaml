  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Seres espirituales' respeta la decisión documentada frente a 'espíritus'. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La traducción mantiene bien la racionalidad léxica documentada.
