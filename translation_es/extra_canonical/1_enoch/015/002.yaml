translation:
  language: es
  text: 'Y ve[a], y di a los vigilantes del cielo que te han enviado a suplicar por ellos: «Ustedes deben suplicar por los hombres[b], y no los hombres por ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ustedes deberían pedir por los hombres». El verbo ge''ez es un verbo general de pedir/solicitar; aquí se prefirió «suplicar» por el contexto formal de apelación por misericordia.'
    reason: lexical_alternative
  - marker: b
    text: «Hombres» aquí significa la humanidad en conjunto, no solo varones.
    reason: cultural_note
lexical_decisions:
- source_word: ሑር
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - ve y
  - parte
  - procede
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo de movimiento se expresa naturalmente en español con «ve». Mantiene la sencillez y la dirección inmediata del mandato sin añadir matices no presentes en el ge'ez.
- source_word: በሎሙ
  english_pob_choice: say to them
  chosen_spanish: di a los
  alternatives_spanish:
  - diles
  - habla con ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción de discurso directo con complemento plural queda bien representada por «di a los», que conserva el tono formal y explícito del envío.
- source_word: ለትጉሃነ ሰማይ
  english_pob_choice: to the watchers of heaven
  chosen_spanish: a los vigilantes del cielo
  alternatives_spanish:
  - a los vigilantes celestiales
  - a los observadores del cielo
  - a los ángeles del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Vigilantes» preserva el título técnico de la literatura de Enoc y evita diluirlo en un término genérico como «ángeles». «Del cielo» sigue el complemento del original.
- source_word: እለ ፈነዉከ
  english_pob_choice: who have sent you
  chosen_spanish: que te han enviado
  alternatives_spanish:
  - que te enviaron
  - que te mandaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto español «han enviado» refleja la acción completada con relevancia presente, como en la elección inglesa. «Mandaron» sería más coloquial y menos adecuado al registro.
- source_word: ትስአል በእንቲአሆሙ
  english_pob_choice: to petition on their behalf
  chosen_spanish: a suplicar por ellos
  alternatives_spanish:
  - a pedir por ellos
  - a interceder por ellos
  - a presentar petición por ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez es un verbo general de pedir/suplicar; en este contexto solemne, «suplicar» comunica bien la apelación formal y misericordiosa sin importar terminología sacerdotal posterior. Se evita «interceder» como más técnico y menos directo.
- source_word: አንትሙ መፍትው ትስአሉ
  english_pob_choice: you ought to petition
  chosen_spanish: ustedes deben suplicar
  alternatives_spanish:
  - ustedes deberían suplicar
  - les corresponde suplicar
  - es debido que ustedes supliquen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa conveniencia u obligación. «Deben» conserva la reprensión y el orden invertido entre vigilantes y humanos, sin suavizarla demasiado.
- source_word: በእንተ ሰብእ
  english_pob_choice: on behalf of men
  chosen_spanish: por los hombres
  alternatives_spanish:
  - por la humanidad
  - en favor de los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hombres» reproduce el contraste conciso del texto y sigue la decisión inglesa, pero aquí se entiende colectivamente como humanidad. La preposición «por» es la forma natural de expresar la petición en beneficio de otros.
- source_word: ወአኮ ሰብእ በእንቲአክሙ
  english_pob_choice: and not men on your behalf
  chosen_spanish: y no los hombres por ustedes
  alternatives_spanish:
  - y no los hombres en favor de ustedes
  - y no la humanidad por ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se conserva la inversión retórica del original: quienes deben suplicar son los vigilantes por los humanos, no al revés. El español fluye mejor con la repetición pronominal explícita.'
theological_decisions:
- issue: Título de los seres celestiales
  english_pob_reading: watchers of heaven
  chosen_spanish_reading: vigilantes del cielo
  alternative_spanish_readings:
  - ángeles del cielo
  - vigilantes celestiales
  rationale: Se mantiene visible el título propio de la tradición enóquica. Traducirlo como «ángeles» borraría una categoría literaria y teológica importante dentro del relato de los Vigilantes.
  doctrine_reference: Preservar el imaginario apocalíptico y sus términos técnicos.
- issue: Sentido de la reprensión sobre la intercesión
  english_pob_reading: you ought to petition on behalf of men, and not men on your behalf
  chosen_spanish_reading: ustedes deben suplicar por los hombres, y no los hombres por ustedes
  alternative_spanish_readings:
  - ustedes deberían interceder por los hombres, y no los hombres por ustedes
  - les corresponde suplicar por la humanidad, y no la humanidad por ustedes
  rationale: La formulación conserva la censura moral y la inversión del orden correcto entre seres celestiales y humanos, sin resolver ni sistematizar la angelología más de lo que hace el texto.
  doctrine_reference: Preservar la tensión teológica en lugar de suavizarla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto ge'ez y el audit trail inglés, sin cambios respecto a la lectura revisada más reciente; conserva el título técnico «vigilantes» y la inversión retórica sobre quién debe suplicar por quién.
  spanish_consistency_notes:
  - Se usa «vigilantes» de forma consistente para el título enóquico, no «ángeles», salvo que el contexto exija una aclaración distinta.
  - «Suplicar» se mantiene como equivalente de petición formal para evitar un registro demasiado técnico o eclesiástico.
  - «Hombres» se emplea en sentido colectivo de humanidad, y queda aclarado en la nota.
  - La puntuación reproduce el contraste final con coma y negación directa, como en el inglés auditado.
