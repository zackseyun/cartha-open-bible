translation:
  language: es
  text: Y ahora[a], los gigantes que nacieron de espíritus y de carne serán llamados espíritus malos sobre la tierra[b], y en la tierra estará su morada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sustantivo inicial se entiende contextualmente como la descendencia gigantesca de los Vigilantes y las mujeres humanas; una traducción más general, como 'descendencia', también es posible en el nivel léxico.
    reason: lexical_alternative
  - marker: b
    text: Se conserva la repetición de 'tierra' para reflejar el ge’ez y la insistencia del verso en que estos espíritus pertenecen al ámbito terrenal, no al celestial.
    reason: cultural_note
lexical_decisions:
- source_word: ረዓይት
  english_pob_choice: the giants
  chosen_spanish: los gigantes
  alternatives_spanish:
  - la descendencia
  - los vástagos
  - los seres poderosos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto el término designa a la descendencia híbrida de los Vigilantes y las mujeres humanas; 'gigantes' conserva el sentido contextual y el peso apocalíptico mejor que una opción más genérica como 'descendencia'.
- source_word: ተወልዱ
  english_pob_choice: were born
  chosen_spanish: nacieron
  alternatives_spanish:
  - fueron engendrados
  - fueron nacidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva expresa nacimiento/begetting. 'Nacieron' es natural en español y mantiene la relación de origen sin endurecer el ritmo de la frase.
- source_word: እመናፍስት ወሥጋ
  english_pob_choice: from spirits and flesh
  chosen_spanish: de espíritus y de carne
  alternatives_spanish:
  - de espíritus y carne
  - de seres espirituales y carne
  - de espíritus y de cuerpo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge’ez yuxtapone explícitamente espíritu y carne para marcar el origen mixto. 'De espíritus y de carne' preserva esa tensión y suena natural en español, sin suavizarla a una formulación interpretativa.
- source_word: መንፈሳት እኩያን
  english_pob_choice: evil spirits
  chosen_spanish: espíritus malos
  alternatives_spanish:
  - espíritus malignos
  - espíritus perversos
  - espíritus impuros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo significa malo o perverso. 'Espíritus malos' sigue de cerca el valor léxico y evita introducir 'impuros', que sería terminología posterior no exigida por el verso.
- source_word: ይሰመዩ
  english_pob_choice: will be called
  chosen_spanish: serán llamados
  alternatives_spanish:
  - serán nombrados
  - serán conocidos como
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula pasiva de denominación es importante en este lenguaje clasificatorio apocalíptico. 'Serán llamados' conserva esa fuerza formal en español.
- source_word: በዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - encima de la tierra
  - sobre el suelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición indica esfera o ubicación. 'Sobre la tierra' mantiene el registro elevado y reproduce bien la repetición del verso.
- source_word: ወውስተ ምድር ይከውን መሓድሪሆሙ
  english_pob_choice: and on the earth will be their dwelling
  chosen_spanish: y en la tierra estará su morada
  alternatives_spanish:
  - y su morada estará sobre la tierra
  - y en la tierra será su habitación
  - y su habitación será en la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula señala el lugar de permanencia de estos espíritus. 'Morada' es claro y digno en español, y conserva la repetición de 'tierra' sin alisarla.
theological_decisions:
- issue: Identidad de los seres que pasan a ser espíritus
  english_pob_reading: The verse speaks of the giants, the mixed offspring of the Watchers and women, who after their bodily origin are designated 'evil spirits' on earth.
  chosen_spanish_reading: El verso habla de los gigantes, la descendencia mixta de los Vigilantes y las mujeres, que después de su origen corporal son designados 'espíritus malos' en la tierra.
  alternative_spanish_readings:
  - El verso podría leerse de manera más general como 'descendencia' en vez de 'gigantes'.
  - Podría suavizarse a 'espíritus impuros', pero eso introduciría una terminología no exigida por el verso.
  rationale: El contexto inmediato de 15:8-12 explica el origen y la actividad posterior de los espíritus de los gigantes. 'Gigantes' hace explícito el referente sin añadir una demonología posterior ajena a la lógica del pasaje.
  doctrine_reference: Mantener la tensión teológica local sin resolverla; dejar que el pasaje determine el sentido inmediato.
translation_notes:
  revision_awareness: El borrador sigue el texto ge’ez transmitido y el análisis auditado en inglés. No se aplicaron revisiones posteriores; el pasaje permanece con acuerdo alto y solo observaciones menores.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al nombre divino; aquí no aparece.
  - Se mantiene 'espíritus' en minúscula porque designa seres/entidades, no el Espíritu Santo.
  - Se eligió 'gigantes' por la fuerza contextual del pasaje y su coherencia con la tradición crítica del capítulo.
  - No se normalizó 'carne' a 'naturaleza humana' para no perder la oposición lexical explícita del ge’ez.
