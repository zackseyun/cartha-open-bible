translation:
  language: es
  text: Por tanto, les di mujeres[a], para que engendraran hijos con ellas y naciera descendencia de ellas[b], de modo que así no les faltara obra alguna en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'sembraran semilla sobre ellas'. El ge'ez conserva una metáfora procreativa tomada del acto de sembrar.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final es difícil. El sentido parece ser que, por medio de la procreación, continuaran en la tierra la vida y la actividad humanas conforme al orden establecido.
    reason: textual_variant
lexical_decisions:
- source_word: በእንተዝ
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así pues
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el valor consecutivo del conector inicial sin hacerlo más fuerte de lo que exige el texto. 'Por tanto' es natural en español y conserva el tono explicativo.
- source_word: ወሀብክዎሙ
  english_pob_choice: I gave them
  chosen_spanish: les di
  alternatives_spanish:
  - y les di
  - yo les di
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal reproduce la primera persona divina y el objeto indirecto plural. Se omite el pronombre explícito 'yo' porque el español verbal ya lo implica.
- source_word: አንስቲያ
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  - hembras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Mujeres'' refleja el sustantivo general del ge''ez sin añadir el matiz marital de ''esposas''. ''Hembras'' sería demasiado zoológico y no corresponde al registro.'
- source_word: ከመ ይዝርኡ
  english_pob_choice: so that they might sow seed
  chosen_spanish: para que engendraran hijos
  alternatives_spanish:
  - para que sembraran semilla
  - para que sembraran simiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB inglesa preserva el trasfondo metafórico de 'sembrar', pero en español 'engendrar hijos' comunica con claridad la finalidad procreativa sin sonar forzado. Se mantiene el sentido, aunque se atenúa la metáfora agrícola por fluidez idiomática.
- source_word: ላዕሌሆን
  english_pob_choice: into them
  chosen_spanish: por medio de ellas
  alternatives_spanish:
  - en ellas
  - sobre ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro español evita una literalidad extraña y expresa la relación procreativa indicada por el contexto. 'Por medio de ellas' conserva la función mediadora de las mujeres sin borrar la referencia biológica.
- source_word: ወይትወለዱ ውሉደ በላዕሌሆን
  english_pob_choice: and children might be born by them
  chosen_spanish: y les naciera descendencia
  alternatives_spanish:
  - y nacieran hijos de ellas
  - y se les diera descendencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Descendencia'' cubre el valor amplio de ውሉደ (''children/offspring'') y el verbo impersonal ''les naciera'' conserva la idea de nacimiento sin atribuir agencia indebida al sujeto. Esta formulación también evita restringir el término a ''hijos'' varones.'
- source_word: ከመ ከማሁ
  english_pob_choice: so that thus
  chosen_spanish: de modo que así
  alternatives_spanish:
  - para que de este modo
  - así que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La doble marca de finalidad/resultados se reproduce con una combinación explícita pero natural en español. 'De modo que así' conserva la insistencia del original sin resultar mecánica.
- source_word: ኢይትኀጐ ግብር
  english_pob_choice: no work ... might be lacking
  chosen_spanish: no les faltara ninguna obra
  alternatives_spanish:
  - no faltara ningún trabajo
  - no les faltara ninguna labor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Obra'' traduce ግብር en un registro amplio y algo más solemne, acorde con el texto. La construcción ''no les faltara'' expresa la idea de carencia o ausencia que subyace al verbo, siguiendo el sentido contextual que la POB inglesa identificó como continuidad de la actividad humana sobre la tierra.'
- source_word: በዲበ ምድር
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la faz de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sobre la tierra'' reproduce la localización cósmica de forma clara y tradicional en español, sin desplazar el foco hacia una frase más expansiva que el original.'
theological_decisions:
- issue: Finalidad de dar mujeres a los seres terrestres
  english_pob_reading: The line presents procreation as part of the divinely ordered pattern for earthly creatures, in contrast to the Watchers' improper crossing of boundaries.
  chosen_spanish_reading: La línea presenta la procreación como parte del orden dispuesto por Dios para las criaturas terrenales, en contraste con el cruce indebido de límites por parte de los Vigilantes.
  alternative_spanish_readings:
  - Una concesión meramente sexual o matrimonial
  - Un acto punitivo después de la caída de los Vigilantes
  rationale: 'La formulación española conserva el carácter ordenado y explicativo del versículo. No suaviza la tensión del contexto enochico: la donación de mujeres se entiende en función del ciclo de vida de las criaturas terrestres, no como legitimación genérica de una unión cualquiera.'
  doctrine_reference: Preservar la tensión teológica del pasaje sin armonizarlo con lecturas posteriores; traducir primero el sentido local del texto.
translation_notes:
  revision_awareness: Este borrador sigue el texto etiópico recuperado y toma la POB inglesa como guía auditada, pero no la copia mecánicamente. En particular, reexpresa la metáfora de 'sembrar semilla' con una equivalencia española más natural ('engendraran hijos') y conserva la idea de continuación de la actividad en la cláusula final ('no les faltara ninguna obra').
  spanish_consistency_notes:
  - Se usa 'mujeres' y no 'esposas' para no añadir un matiz marital inexistente en el término fuente.
  - '''Descendencia'' se eligió para abarcar el valor colectivo de ውሉደ sin limitarlo a un sexo o número específico.'
  - '''Obra'' se prefirió a ''trabajo'' para mantener un registro bíblico amplio y porque el contexto alude a actividad/quehacer humano en la tierra.'
  - La nota a explica la metáfora agrícola que el español principal atenúa por claridad; la nota b preserva la dificultad del cierre del versículo.
