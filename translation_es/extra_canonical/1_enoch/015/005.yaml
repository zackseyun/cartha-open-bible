    rationale: 'El ge''ez y la auditoría inglesa mantienen una relación más directa: hijos/descendencia que nacen por/de ellas o para ellos. ''Les naciera descendencia'' convierte la idea en un dativo de posesión menos transparente.'
  - severity: low
    issue: '''Engendraran hijos por medio de ellas'' es comprensible, pero algo rígido.'
    rationale: En español bíblico natural, 'tuvieran hijos con ellas' o una solución semejante fluye mejor; sin embargo, para conservar mayor cercanía al POB puede mantenerse 'engendraran hijos con ellas'.
  - severity: low
    issue: La cláusula final puede sonar más idiomática.
    rationale: '''No les faltara ninguna obra sobre la tierra'' es aceptable, pero ''no les faltara obra alguna en la tierra'' expresa mejor la carencia sin sonar calcado.'
