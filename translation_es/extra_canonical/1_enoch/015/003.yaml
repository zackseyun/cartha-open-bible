review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva en general el sentido del ge''ez y sigue bien las decisiones del POB inglés: «abandonaron», «se acostaron con», «se contaminaron», «esposas» e «hijos gigantes» reflejan adecuadamente el original y su carga moral. Sin embargo, omite una nota importante equivalente a la del inglés sobre «children of the earth», y la frase «hicieron como hacen los hijos de la tierra» suena algo áspera en español y puede mejorarse sin perder el contraste apocalíptico.'
  spanish_quality_summary: El texto es claro y digno, pero necesita un ajuste menor de naturalidad sintáctica y de aparato de notas. «Hicieron como hacen» es comprensible, aunque menos idiomático que «hicieron como hacen los hijos de la tierra»; mejor aún, «hicieron lo que hacen los hijos de la tierra» o «obraron como los hijos de la tierra». Además, falta la nota cultural para «hijos de la tierra», preservada en el POB inglés. El resto del registro es bueno y ampliamente legible en español eclesial moderno.
  glossary_alignment: 'No hay conflictos con la terminología global del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. Las decisiones léxicas principales concuerdan con el rastro auditado: «abandonaron», «se acostaron con», «se contaminaron», «esposas» y «hijos gigantes». Conviene mantener «hijos de la tierra» con nota explicativa para no aplanar el contraste entre seres celestiales y humanos mortales.'
  issues:
  - severity: medium
    issue: Falta la nota explicativa para «hijos de la tierra»
    rationale: El POB inglés conserva una nota cultural clave para evitar que la expresión se reduzca a «personas». En español también conviene explicarla, porque la frase puede sonar opaca sin el contraste apocalíptico.
  - severity: low
    issue: «Hicieron como hacen los hijos de la tierra» es poco natural
    rationale: No es incorrecto, pero en español resulta más fluido «hicieron lo que hacen los hijos de la tierra», manteniendo el mismo sentido y el contraste del original.
  revised_spanish_text: ¿Por qué abandonaron el cielo alto, santo y eterno, y se acostaron con mujeres, y se contaminaron con las hijas de los hombres, y tomaron para ustedes esposas, e hicieron lo que hacen los hijos de la tierra[a], y engendraron hijos gigantes?[b]
  revised_footnotes:
  - marker: a
    text: «Hijos de la tierra» contrasta a los Vigilantes celestiales con los seres humanos mortales; la expresión no debe aplanarse simplemente a «personas».
    reason: cultural_note
  - marker: b
    text: «Hijos gigantes» conserva la forma breve del POB inglés; también puede entenderse como «hijos que eran gigantes».
    reason: lexical_alternative
  revision_rationale: Se añadió la nota faltante para «hijos de la tierra», porque preserva una distinción interpretativa importante documentada en el POB inglés. También se ajustó «hicieron como hacen» a «hicieron lo que hacen» para lograr un español más natural sin alterar el sentido del ge'ez ni la decisión léxica auditada.
