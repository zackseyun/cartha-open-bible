translation:
  language: es
  text: ¿Por qué abandonaron el cielo alto, santo y eterno, y se acostaron con mujeres, y se contaminaron con las hijas de los hombres, y tomaron para ustedes esposas, e hicieron lo que hacen los hijos de la tierra[a], y engendraron hijos gigantes?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos de la tierra» contrasta a los Vigilantes celestiales con los seres humanos mortales; la expresión no debe aplanarse simplemente a «personas».
    reason: cultural_note
  - marker: b
    text: «Hijos gigantes» conserva la forma breve del POB inglés; también puede entenderse como «hijos que eran gigantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ኃደግሙ
  english_pob_choice: abandon
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - desampararon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico expresa un dejar atrás fuerte, con tono de reproche. «Abandonaron» conserva mejor la fuerza acusatoria que «dejaron».
- source_word: ሰማየ ልዑለ ወቅዱሰ ዘለዓለም
  english_pob_choice: the high, holy, eternal heaven
  chosen_spanish: el cielo alto, santo y eterno
  alternatives_spanish:
  - el cielo excelso, santo y eterno
  - el cielo elevado, santo, eterno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La acumulación de adjetivos se mantiene en español con una coordinación natural. «Cielo alto, santo y eterno» conserva el registro elevado sin sobrecargar la sintaxis.
- source_word: ሰከብክሙ
  english_pob_choice: lie with
  chosen_spanish: se acostaron con
  alternatives_spanish:
  - durmieron con
  - tuvieron relaciones con
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se acostaron con» es una expresión directa, digna y suficientemente transparente para la unión sexual sin vulgaridad ni excesiva paráfrasis.
- source_word: እዋለደ ሰብእ
  english_pob_choice: the daughters of men
  chosen_spanish: las hijas de los hombres
  alternatives_spanish:
  - las hijas de la humanidad
  - las mujeres de los hombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la contraposición antropológica tradicional entre seres celestiales y humanos. «Las hijas de los hombres» evita aplanar el contraste.
- source_word: ረኩስክሙ
  english_pob_choice: defile yourselves
  chosen_spanish: se contaminaron
  alternatives_spanish:
  - se volvieron impuros
  - se mancillaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico lleva fuerza de impureza/contaminación moral y cultual. «Se contaminaron» conserva esa acusación sin sonar excesivamente técnico.
- source_word: አንስተ
  english_pob_choice: wives
  chosen_spanish: esposas
  alternatives_spanish:
  - mujeres
  - cónyuges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el giro «tomaron para ustedes», «esposas» expresa mejor el matiz matrimonial que el simple «mujeres».
- source_word: ከመ ውሉደ ምድር ገበርክሙ
  english_pob_choice: do as the children of the earth do
  chosen_spanish: hicieron como hacen los hijos de la tierra
  alternatives_spanish:
  - obraron como obran los hijos de la tierra
  - actuaron como los hijos de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hijos de la tierra» preserva la imagen apocalíptica y la oposición con los seres celestiales. La repetición verbal mantiene el paralelismo del original.
- source_word: ውሉደ ረዓይተ
  english_pob_choice: giant sons
  chosen_spanish: hijos gigantes
  alternatives_spanish:
  - hijos de gigantes
  - hijos que eran gigantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hijos gigantes» sigue de cerca la forma breve del original y conserva la tensión lexical documentada en el inglés POB entre una lectura nominal y una descriptiva.
theological_decisions:
- issue: Valor moral de la unión de los Vigilantes con mujeres
  english_pob_reading: Render the act as self-defilement rather than merely intermarriage
  chosen_spanish_reading: Presentar el acto como contaminación moral, no como simple matrimonio mixto
  alternative_spanish_readings:
  - mencionarlo como unión o mezcla con mujeres
  - suavizarlo como cruce de límites
  rationale: El ge'ez usa un verbo de impureza, por lo que la versión española debe conservar el juicio moral y ritual. Traducirlo como mera unión borraría la acusación del texto.
  doctrine_reference: Primacía del lenguaje original y conservación de la tensión teológica del pasaje.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail, que ajustó la coordinación adjetival y la naturalidad de la cláusula comparativa en inglés; en español se reproduce esa naturalidad con una secuencia fluida: «alto, santo y eterno» y «hicieron como hacen los hijos de la tierra».'
  spanish_consistency_notes:
  - Se mantiene «hijos de la tierra» para no diluir el contraste antropológico con los seres celestiales.
  - Se usa «se contaminaron» para preservar la carga de impureza del verbo original.
  - Se conserva el registro reverente sin adoptar fórmulas eclesiásticas ajenas al texto.
