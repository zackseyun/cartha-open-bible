base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/015/003.yaml
  text: Why did you abandon the high[a], holy, eternal heaven, and lie with women, and defile yourselves with the daughters of men, and take wives for yourselves, and do as the children of the earth do[b], and beget giant sons?
  footnotes:
  - marker: a
    text: '"Children of the earth" contrasts the heavenly Watchers with mortal human beings; the phrase should not be flattened into merely ''people.'''
    reason: cultural_note
  - marker: b
    text: The final expression denotes the abnormal offspring produced by this union; 'giant sons' is the main rendering, though 'sons who were giants' is also possible.
    reason: lexical_alternative
