translation:
  language: es
  text: Pero ustedes eran santos[a], seres espirituales, viviendo vida eterna. Pero se contaminaron con las mujeres, y por la sangre de carne engendraron hijos, y desearon la sangre de los hombres, e hicieron como ellos hacen, produciendo carne y sangre[b]—los que mueren y perecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez enfatiza repetidamente la sangre y la carne, subrayando el traslado ilícito de los Vigilantes desde una existencia espiritual hacia la generación y el deseo propios de seres mortales y corporales.
    reason: cultural_note
  - marker: b
    text: La cláusula final también puede traducirse 'los que mueren y son destruidos'; el matiz exacto del último verbo es difícil, pero claramente señala mortalidad y ruina humanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ቅዱሳን
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - santos/consagrados
  lexicon: Dillmann
  rationale: En español, 'santos' comunica con naturalidad el estado original de pureza/consecración. 'Sagrados' suena más a cualidad de cosas que de seres personales, y 'consagrados' añade una idea no explicitada aquí.
- source_word: መንፈሳውያን
  english_pob_choice: spiritual beings
  chosen_spanish: seres espirituales
  alternatives_spanish:
  - espíritus
  - espirituales
  lexicon: Dillmann
  rationale: La expresión necesita mantener que son seres personales y no solo una cualidad abstracta. 'Seres espirituales' conserva esa fuerza y evita reducir el término a un simple adjetivo suelto.
- source_word: ሕያዋነ ሕይወት ዘለዓለም
  english_pob_choice: living eternal life
  chosen_spanish: viviendo la vida eterna
  alternatives_spanish:
  - viviendo vida eterna
  - viviendo una vida eterna
  lexicon: Dillmann
  rationale: La construcción ge'ez es enfática y duplicada; 'viviendo la vida eterna' preserva ese tono solemne en español sin volver la frase torpe. Se mantiene la idea de vida eterna como estado propio de su existencia original.
- source_word: በደቡ አንስት ረኩስክሙ
  english_pob_choice: you defiled yourselves with women
  chosen_spanish: se contaminaron con las mujeres
  alternatives_spanish:
  - se profanaron con mujeres
  - se mancharon con las mujeres
  lexicon: Dillmann
  rationale: El verbo ge'ez expresa impureza/contaminación moral y ritual. 'Contaminaron' comunica bien esa mancha, y el complemento 'con las mujeres' sigue la relación del original sin añadir un matiz más fuerte de lo que exige el texto.
- source_word: በደመ ሥጋ አውለድክሙ
  english_pob_choice: by the blood of flesh you fathered children
  chosen_spanish: por la sangre de carne engendraron hijos
  alternatives_spanish:
  - por la sangre de la carne engendraron hijos
  - engendraron hijos por sangre carnal
  lexicon: Dillmann
  rationale: Se conserva la imagen cruda de 'sangre' y 'carne', que en el pasaje subraya la generación corpórea frente al estado espiritual anterior. 'Engendraron hijos' naturaliza el verbo implícito sin borrar la imaginería del original.
- source_word: በደመ ሰብእ ፈተውክሙ
  english_pob_choice: you desired the blood of men
  chosen_spanish: desearon la sangre de los hombres
  alternatives_spanish:
  - codiciaron la sangre de los hombres
  - ansiaron la sangre de los hombres
  lexicon: Dillmann
  rationale: El ge'ez enfatiza deseo/craving. 'Desearon' mantiene el registro sobrio y directo; 'sangre de los hombres' preserva la referencia humana del término ሰብእ y el paralelo con la repetición de sangre en la línea.
- source_word: ወገበርክሙ ከመ እሙንቱ ይገብሩ
  english_pob_choice: you did as they do
  chosen_spanish: hicieron como ellos hacen
  alternatives_spanish:
  - obraron como ellos obran
  - actuaron como ellos actúan
  lexicon: Dillmann
  rationale: La repetición verbal debe sentirse en español. 'Hicieron como ellos hacen' conserva la simetría y suena más cercano al paralelismo del original que una paráfrasis más libre.
- source_word: ሥጋ ወደመ
  english_pob_choice: blood and flesh
  chosen_spanish: carne y sangre
  alternatives_spanish:
  - sangre y carne
  - flesh and blood
  lexicon: Dillmann
  rationale: Aunque el orden ge'ez destaca 'sangre', en español 'carne y sangre' es la fórmula más intelligible y ya comunica la condición mortal/corpórea. Se mantiene el par material sin forzar una secuencia extraña al oído hispano.
- source_word: እለ እሙንቱ ይመውቱ ወይትሐጐሉ
  english_pob_choice: those who die and perish
  chosen_spanish: los que mueren y perecen
  alternatives_spanish:
  - los que mueren y son destruidos
  - los que mueren y se pierden
  lexicon: Dillmann
  rationale: '''Perecen'' conserva el peso judicial y apocalíptico de la cláusula final mejor que un giro más suave. El par ''mueren y perecen'' mantiene la doble afirmación de mortalidad y ruina.'
theological_decisions:
- issue: Contraste entre estado espiritual original y generación mortal transgresora
  english_pob_reading: The verse is rendered to stress that the Watchers were originally holy, spiritual, and eternal, but crossed into mortal, blood-bound generation and desire.
  chosen_spanish_reading: El español conserva el contraste entre su estado original de santidad y vida eterna, y su caída hacia una generación marcada por sangre, carne y muerte.
  alternative_spanish_readings:
  - Una versión más suave podría hablar simplemente de 'seres celestiales' y 'hijos mortales'.
  - Una versión más literal podría repetir 'sangre' todavía más mecánicamente, aunque sonara menos natural en español.
  rationale: 'La teología del pasaje depende del cruce de un límite creado: de seres espirituales a reproducción corporal y mortal. La redacción española mantiene visible esa tensión sin resolverla ni suavizarla.'
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence.
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión más reciente, que corrigió la relación entre 'sangre', 'mujeres', 'hombres' y 'carne y sangre'. Por eso el español conserva la serie de imágenes corporales y la progresión del texto, evitando mover 'carne y sangre' a una cláusula distinta o diluir la repetición de sangre. También se evita una construcción demasiado literal que rompa la lectura en español.
  spanish_consistency_notes:
  - Se usa 'santos' para ቅዱሳን y 'seres espirituales' para መንፈሳውያን, manteniendo la distinción entre santidad y naturaleza espiritual.
  - '''Sangre'' y ''carne'' se conservan como campo semántico dominante del verso, en lugar de reemplazarlos por expresiones más interpretativas.'
  - '''Perecen'' se reserva para el cierre apocalíptico, donde el tono de ruina debe permanecer fuerte.'
  - Se evita 'Cristo', 'Señor' y otras fórmulas ajenas al pasaje; el texto no contiene terminología cristológica ni un uso directo del nombre divino.
