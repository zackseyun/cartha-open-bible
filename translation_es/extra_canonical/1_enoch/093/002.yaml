translation:
  language: es
  text: 'Y dijo Enoc: «Con respecto a los hijos de la justicia, y con respecto a los escogidos del mundo[a], y con respecto a la planta de la rectitud, les hablaré y les daré a conocer, hijos míos —yo, Enoc—, lo que me fue mostrado desde una visión del cielo[b], y lo que aprendí de las palabras de los santos ángeles, y entendí de las tablas del cielo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escogidos de la edad», si ዓለም se entiende en el sentido de una edad u orden del mundo, más que del mundo creado en sí.
    reason: lexical_alternative
  - marker: b
    text: O «en una visión del cielo». La preposición puede entenderse también como el ámbito de la visión, no solo como su procedencia.
    reason: previous_rendering
  - marker: c
    text: La imagen de las «tablas del cielo» refleja un motivo enóquico de registros celestiales; también puede entenderse de manera más general como la escritura o los libros del cielo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ውሉደ፡ ጽድቅ
  english_pob_choice: children of righteousness
  chosen_spanish: hijos de la justicia
  alternatives_spanish:
  - hijos de la rectitud
  - descendencia de la justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la metáfora filial y el genitivo cualitativo. En español, 'justicia' comunica con mayor naturalidad el campo semántico de ጽድቅ que un abstracto como 'los justos'.
- source_word: ኅሩያነ፡ ዓለም
  english_pob_choice: chosen of the world
  chosen_spanish: los escogidos del mundo
  alternatives_spanish:
  - los elegidos del mundo
  - los escogidos de la era
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Escogidos'' mantiene la elección divina sin importar un tecnicismo doctrinal. ''Del mundo'' sigue de cerca el Ge''ez; la nota textual puede recordar la posible lectura ''edad/orden''.'
- source_word: ተክለ፡ ርትዕ
  english_pob_choice: plant of uprightness
  chosen_spanish: la planta de la rectitud
  alternatives_spanish:
  - el plantío de la rectitud
  - el brote de la justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Planta'' preserva la imagen apocalíptica vegetal. ''Rectitud'' refleja bien ርትዕ y evita reducir la expresión a un mero título colectivo.'
- source_word: እሎንተ፡ እብለክሙ፡ ወአየድዐክሙ
  english_pob_choice: I will speak to you and make known to you
  chosen_spanish: les hablaré y les daré a conocer
  alternatives_spanish:
  - les diré y les informaré
  - les hablaré y les haré saber
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Recoge los dos verbos: hablar y comunicar/revelar. ''Dar a conocer'' es una fórmula española natural para el matiz revelatorio.'
- source_word: ደቂቅየ፡
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - mis niños
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el tono familiar y directo de la vocación profética sin sonar infantil en español.
- source_word: በዘ፡ አስተርአየኒ፡ እምራእየ፡ ሰማይ
  english_pob_choice: what was shown to me from a vision of heaven
  chosen_spanish: lo que me fue mostrado desde una visión del cielo
  alternatives_spanish:
  - lo que me fue mostrado de una visión del cielo
  - lo que se me mostró desde una visión celestial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Respeta el valor de እም ('desde/de, desde el origen') y evita introducir 'en' cuando el texto dice 'desde'. 'Cielo' es una traducción sobria de 'heaven' en un contexto revelatorio.
- source_word: እምቃለ፡ ቅዱሳን፡ መላእክት፡ አእመርኩ
  english_pob_choice: what I learned from the words of the holy angels
  chosen_spanish: lo que aprendí de la palabra de los santos ángeles
  alternatives_spanish:
  - lo que aprendí de las palabras de los santos ángeles
  - lo que conocí por la palabra de los santos ángeles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El Ge'ez usa un singular constructo ('palabra/voz'), por lo que 'la palabra' evita forzar plural. 'Santos ángeles' preserva la dignidad de los mediadores celestiales.
- source_word: እምነ፡ ጸፍጸፈ፡ ሰማይ፡ ለበውኩ
  english_pob_choice: understood from the tablets of heaven
  chosen_spanish: entendí de las tablas del cielo
  alternatives_spanish:
  - entendí de las tablas celestiales
  - comprendí de las tablas del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Tablas del cielo'' conserva la imagen concreta e intertextual propia de la literatura enóquica. ''Entendí de'' refleja el origen de la comprensión sin añadir un objeto no presente.'
theological_decisions:
- issue: Identidad de los grupos nombrados
  english_pob_reading: The verse names eschatological righteous groups in Enochic idiom without specifying later sectarian or Christian categories.
  chosen_spanish_reading: El verso nombra grupos escatológicos justos en idiomática enóquica sin convertirlos en categorías sectarias o cristianas posteriores.
  alternative_spanish_readings:
  - Son solo sinónimos poéticos de los justos
  - Se refieren a grupos distintos dentro de la comunidad fiel
  rationale: 'Se conserva la tensión del texto: las tres designaciones están yuxtapuestas pero no explicadas como idénticas o distintas. La traducción no resuelve esa ambigüedad.'
  doctrine_reference: Preservar la tensión teológica del original; no armonizar indebidamente.
- issue: Sentido de ዓለም
  english_pob_reading: chosen of the world
  chosen_spanish_reading: escogidos del mundo
  alternative_spanish_readings:
  - escogidos de la era
  - elegidos del orden presente
  rationale: Se mantiene la literalidad básica del Ge'ez y se evita fijar una lectura doctrinal estrecha. En nota puede quedar abierta la posibilidad de 'edad/orden'.
  doctrine_reference: Primacía del lenguaje fuente; ambigüedad léxica preservada con nota.
- issue: Relación entre 'visión del cielo', 'palabra de los ángeles' y 'tablas del cielo'
  english_pob_reading: The verse presents layered revelatory sources.
  chosen_spanish_reading: 'El verso presenta fuentes revelatorias en capas: visión, palabra angélica y tablas celestiales.'
  alternative_spanish_readings:
  - Una sola fuente revelatoria expresada de tres maneras
  - Tres medios distintos de conocimiento celestial
  rationale: La traducción mantiene la acumulación sin reducirla a una sola modalidad. Esto respeta el estilo apocalíptico y la progresión revelatoria del texto.
  doctrine_reference: Respeto por la estructura revelatoria del texto enóquico.
translation_notes:
  revision_awareness: Se incorporó la corrección gramatical que separa el discurso directo de Enoc del marco narrativo y se evitó añadir 'estas cosas' como objeto explícito. También se respetó la revisión que exige 'desde' para እም y el singular 'palabra' para ቃል.
  spanish_consistency_notes:
  - Se usa 'escogidos' en vez de 'elegidos' por consistencia con el tono bíblico moderno y la transparencia léxica.
  - Se emplea 'cielo' como equivalente de 'heaven' por claridad y dignidad en español, manteniendo el registro apocalíptico.
  - La puntuación conserva la cita directa con comillas españolas y el inciso 'I, Enoch' se mantiene como autoidentificación enfática del hablante.
