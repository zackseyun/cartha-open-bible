base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/093/002.yaml
  text: And Enoch said[a], “Concerning the children of righteousness, and concerning the chosen of the world, and concerning the plant of uprightness, I will speak to you and make known to you, my children—I, Enoch—what was shown to me from a vision of heaven, and what I learned from the words of the holy angels[e][d][c][b], and understood from the tablets of heaven.”
