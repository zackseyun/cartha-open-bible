  rationale: Se revisa la cláusula de «visiones» para evitar una lectura posesiva demasiado fuerte en español y preservar mejor la ambigüedad semántica del original y de la auditoría inglesa. Se simplifica la sintaxis final y se cambia «cercado» por «recinto» para mayor naturalidad sin perder cautela léxica. Se reducen las notas a las realmente significativas para el lector y se anclan correctamente en el texto revisado.
