translation:
  language: es
  text: Y después de esto, en la cuarta semana, al completarse, se verán visiones de los santos y justos[a], y una ley para generación tras generación y un recinto[b] se hará para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los santos y de los justos». La expresión ge'ez también puede entenderse de manera sustantiva, «los santos y los justos», y el referente exacto queda algo abierto en este contexto apocalíptico.
    reason: lexical_alternative
  - marker: b
    text: El término final es difícil; puede sugerir algo cercado, plantado o preparado para ellos. También podría entenderse como «cercado» o incluso, en otro sentido posible, «jardín» o «plantación».
    reason: lexical_alternative
lexical_decisions:
- source_word: እምድኅረዝ
  english_pob_choice: after this
  chosen_spanish: y después de esto
  alternatives_spanish:
  - y luego de esto
  - y después de ello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula introduce una transición temporal clara. «Después de esto» conserva la secuencia del original y funciona naturalmente en español bíblico contemporáneo.
- source_word: ራብዕት ሰንበት
  english_pob_choice: the fourth week
  chosen_spanish: la cuarta semana
  alternatives_spanish:
  - el cuarto heptad
  - la cuarta sabana
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el esquema de las Semanas del Apocalipsis de las Semanas, ሰንበት nombra la unidad semanal/heptádica. «Semana» es la opción más clara y fiel en español.
- source_word: በተፍጻሜታ
  english_pob_choice: at its completion
  chosen_spanish: al completarse
  alternatives_spanish:
  - al final
  - cuando se complete
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo remite a la semana mencionada. «Al completarse» conserva el matiz formal de culminación sin introducir interpretación adicional.
- source_word: ራእያተ
  english_pob_choice: visions
  chosen_spanish: las visiones
  alternatives_spanish:
  - las revelaciones
  - las apariciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término pertenece al lenguaje apocalíptico de visiones. «Visiones» mantiene el género literario y la imagen del texto.
- source_word: ቅዱሳን ወጻድቃን
  english_pob_choice: the holy and the righteous
  chosen_spanish: los santos y los justos
  alternatives_spanish:
  - los santos y los rectos
  - los consagrados y los justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ambos adjetivos funcionan sustantivamente. «Santos y justos» transmite bien la referencia a personas fieles y evita una frase demasiado pesada en español; «santos» aquí no pretende imponer un sentido eclesiástico técnico.
- source_word: ይትረአይ
  english_pob_choice: shall be seen
  chosen_spanish: se verán
  alternatives_spanish:
  - serán vistas
  - aparecerán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva/reflexiva permite una traducción simple y fiel. «Se verán» preserva la ambigüedad entre ser reveladas y hacerse manifiestas.
- source_word: ሥርዐት
  english_pob_choice: a law
  chosen_spanish: una ley
  alternatives_spanish:
  - un orden
  - una norma
  - un estatuto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se adopta «ley» por la revisión más reciente y por el paralelismo histórico-teológico con 93:4, donde el término corresponde a la ley dada a los pecadores. En este contexto, la palabra no debe diluirse en un sentido meramente abstracto de «orden».
- source_word: ለትውልደ ትውልድ
  english_pob_choice: for generation after generation
  chosen_spanish: para generación tras generación
  alternatives_spanish:
  - para todas las generaciones
  - para sucesivas generaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición del sustantivo expresa continuidad sucesiva. «Para generación tras generación» conserva esa fuerza iterativa de manera natural en español.
- source_word: ይትገበር ሎሙ
  english_pob_choice: shall be made for them
  chosen_spanish: se hará para ellos
  alternatives_spanish:
  - será hecho para ellos
  - se establecerá para ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva/impersonal del ge'ez admite una construcción natural en español. «Se hará» evita sobreespecificar el tipo de acción y puede gobernar tanto la ley como el cercado en la sintaxis del verso.
- source_word: ዐጸድ
  english_pob_choice: an enclosure
  chosen_spanish: un cercado
  alternatives_spanish:
  - un recinto
  - un cercamiento
  - un jardín
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término es difícil y puede sugerir algo cercado o preparado. «Cercado» preserva la imagen concreta sin imponer de entrada «jardín» o «plantación».
theological_decisions:
- issue: Identidad de «los santos y los justos»
  english_pob_reading: A class of faithful people disclosed in the apocalyptic vision, not specifically angels in the main text.
  chosen_spanish_reading: Una referencia a los fieles vindicados o revelados en la visión apocalíptica, sin concretarlos como ángeles.
  alternative_spanish_readings:
  - los santos celestiales
  - una mezcla de ángeles y humanos justos
  rationale: El par «santos / justos» favorece una lectura humana y ética, aunque el lenguaje apocalíptico mantiene amplitud referencial. La traducción conserva esa tensión sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión interpretativa sin cerrarla dogmáticamente.
- issue: Sentido de ሥርዐት en este contexto
  english_pob_reading: '''law'' as the intended referent, paralleling 93:4 and the Sinai/Tabernacle framework of the fourth week.'
  chosen_spanish_reading: «Ley» como disposición normativa revelada, en paralelismo con 93:4.
  alternative_spanish_readings:
  - orden
  - norma
  - ordenamiento
  rationale: La revisión textual y el esquema narrativo favorecen el mismo campo léxico que en 93:4. «Ley» mantiene el paralelismo y la coherencia interna del pasaje.
  doctrine_reference: Preservar la coherencia interna del esquema de las Semanas.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que corrige la versión previa de «order» a «law» en paralelo con 93:4 y mantiene la ambigüedad de ዐጸድ como un «enclosure» difícil. También incorpora la suavización estilística de la última pasada, sin perder la distinción entre «holy» y «righteous».
  spanish_consistency_notes:
  - Se conserva el paralelismo entre 93:4 y 93:6 mediante «ley».
  - «Santos y justos» traduce el binomio sustantivado sin cargarlo con tecnicismo eclesiástico.
  - «Cercado» mantiene la dificultad semántica de ዐጸድ y evita una especificación indebida.
  - La puntuación mantiene una sola cadena coordinada, como en el original.
  - No se introduce «SEÑOR» ni otra sustitución para nombres divinos, porque no aparece un tetragrama en este verso.
