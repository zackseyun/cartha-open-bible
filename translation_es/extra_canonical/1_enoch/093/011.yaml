translation:
  language: es
  text: Porque, ¿quién entre todos los hijos de los hombres es capaz de oír la voz del Santo y no ser sacudido? ¿Y quién es capaz de comprender sus pensamientos? ¿Y quién es capaz de contemplar todas las obras del cielo?[a][b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Voz» sigue la lectura principal del término ge'ez, pero también puede abarcar «palabra» o «habla»; se eligió «voz» porque se une con naturalidad a «oír».
    reason: lexical_alternative
  - marker: b
    text: «Las obras del cielo» puede aludir de forma amplia a las operaciones, estructuras u orden de los cielos, no solo a objetos visibles.
    reason: cultural_note
  - marker: c
    text: «Comprender sus pensamientos» también podría expresarse como «entender sus pensamientos» o «concebir sus pensamientos».
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces una explicación o fundamento del enunciado. En español, «Porque» conserva bien la fuerza justificativa y encaja naturalmente al inicio de una pregunta retórica solemne.
- source_word: ውሉደ ሰብእ
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el giro semítico elevado del original. «Los hijos de los hombres» conserva el registro apocalíptico sin reemplazarlo por una generalización más plana.
- source_word: ዘይክል
  english_pob_choice: is able
  chosen_spanish: es capaz de
  alternatives_spanish:
  - puede
  - tiene poder para
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reproduce la repetición retórica de capacidad. «Es capaz de» suena formal y evita volver mecánica la serie de preguntas.
- source_word: ሰሚዐ ቃሉ ለቅዱስ
  english_pob_choice: to hear the voice of the Holy One
  chosen_spanish: oír la voz del Santo
  alternatives_spanish:
  - oír la palabra del Santo
  - oír el habla del Santo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ቃል» puede abarcar voz, palabra o habla. Aquí «voz» sigue la elección del inglés auditado y funciona con naturalidad junto a «oír». «El Santo» conserva el título divino sin añadir una formulación cristológica ajena al contexto.
- source_word: ወኢይትሀወክ
  english_pob_choice: and not be shaken
  chosen_spanish: y no ser conmovido
  alternatives_spanish:
  - y no ser perturbado
  - y no ser turbado
  - y no ser sacudido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Conmovido» comunica la inestabilidad interior o el estremecimiento causado por la voz divina. Es más idiomático en español que una calca literal y conserva el sentido de reverente sacudimiento.
- source_word: ከመ የሐሊ፡ ኅሊናሁ
  english_pob_choice: to comprehend his thoughts
  chosen_spanish: comprender sus pensamientos
  alternatives_spanish:
  - entender sus pensamientos
  - concebir sus pensamientos
  - comprender su mente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase se refiere a la capacidad de abarcar o entender el pensamiento del Santo. «Comprender sus pensamientos» sigue la lectura revisada del audit trail y evita la interpretación incorrecta de tomar «su mente» como sujeto.
- source_word: ነጽሮተ
  english_pob_choice: to look upon
  chosen_spanish: contemplar
  alternatives_spanish:
  - mirar
  - ver
  - observar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En un contexto visionario y elevado, «contemplar» preserva mejor la solemnidad que «ver» o «mirar».
- source_word: ምግባረ ሰማይ
  english_pob_choice: the works of heaven
  chosen_spanish: las obras del cielo
  alternatives_spanish:
  - las obras de los cielos
  - los trabajos del cielo
  - las operaciones del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obras» traduce bien el valor amplio de ምግባር y «del cielo» mantiene el ámbito cosmológico. «Obras del cielo» es más natural en español que «obras de los cielos» y conserva la amplitud del término sin estrecharlo a objetos visibles.
theological_decisions:
- issue: Título divino para ለቅዱስ
  english_pob_reading: the Holy One
  chosen_spanish_reading: el Santo
  alternative_spanish_readings:
  - el Santo Dios
  - el Santo Uno
  - el Santo
  rationale: El contexto presenta una voz divina sobrecogedora. «El Santo» conserva el valor titular de ለቅዱስ sin introducir una identificación posterior ajena al pasaje ni diluir la reverencia del título.
  doctrine_reference: Mantener el sentido local del título divino y evitar armonización cristológica indebida.
- issue: Relación entre oír la voz, comprender los pensamientos y contemplar las obras
  english_pob_reading: hear... comprehend his thoughts... look upon all the works of heaven
  chosen_spanish_reading: oír... comprender sus pensamientos... contemplar todas las obras del cielo
  alternative_spanish_readings:
  - oír... entender sus pensamientos... ver todas las obras del cielo
  rationale: 'Se preserva la serie ascendente de incapacidad humana ante la revelación divina: oído, mente y visión. «Comprender» mantiene el matiz de alcanzar intelectualmente lo que pertenece al Santo, sin reducirlo a simple audición o a una lectura demasiado abstracta.'
  doctrine_reference: No suavizar la antropología limitada del texto ni borrar la distancia entre lo humano y lo divino.
translation_notes:
  revision_awareness: 'El audit trail inglés pasó de «for his mind to comprehend» a «think His thoughts» y luego a «comprehend his thoughts» tras revisión. La versión española sigue la lectura revisada y evita el error señalado en la adjudicación: no toma el sufijo pronominal como sujeto («su mente»), sino como referencia al Santo en «sus pensamientos».'
  spanish_consistency_notes:
  - Se conservó «el Santo» como título divino, en línea con la decisión inglesa de evitar una cristología importada.
  - 'Se prefirió un registro elevado pero natural: «es capaz de», «contemplar», «comprender».'
  - Se mantuvo la triple estructura retórica de la pregunta para reflejar la progresión del original.
