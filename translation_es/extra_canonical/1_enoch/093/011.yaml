base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/093/011.yaml
  text: For who among all the children of men is able to hear the voice of the Holy One and not be shaken? And who is able to comprehend his thoughts? And who is able to look upon all the works of heaven?[a][b][c]
  footnotes:
  - marker: a
    text: Or 'hear the word/speech of the Holy One'; the Ge'ez noun can cover voice, word, or utterance. 'Voice' is chosen because it follows 'hear' most naturally in English.
    reason: lexical_alternative
  - marker: b
    text: '''The works of heaven'' may refer broadly to the operations, structures, or ordered phenomena of the heavens, not merely visible objects.'
    reason: cultural_note
  - marker: c
    text: Or 'for his mind to comprehend'.
    reason: previous_rendering
