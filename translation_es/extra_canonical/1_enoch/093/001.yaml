translation:
  language: es
  text: Y después de esto, Enoc comenzó a hablar[a] de los libros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula ge'ez es comprimida y difícil. La evidencia revisada entiende aquí que Enoc inició el acto de hablar, no que se deba expresar explícitamente algo como 'dio voz'.
    reason: textual_variant
  - marker: b
    text: También puede entenderse como 'a partir de los libros' o 'desde los libros'. 'De los libros' intenta conservar la idea de fuente u origen sin precisar más de lo que el texto permite.
    reason: alternative_reading
lexical_decisions:
- source_word: ወእምድኅረዝ
  english_pob_choice: And after that
  chosen_spanish: Y después de eso
  alternatives_spanish:
  - Y después de aquello
  - Y luego de eso
  lexicon: Dillmann
  rationale: Expresa la transición temporal de manera natural en español y conserva la secuencia narrativa sin añadir contenido.
- source_word: ሄኖክ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Enoch
  - Henoc
  lexicon: Dillmann
  rationale: Se usa la forma bíblica y ampliamente reconocible en español, manteniendo el referente personal del nombre propio.
- source_word: ወአኀዘኒ ይትናገር
  english_pob_choice: began to speak
  chosen_spanish: comenzó a hablar
  alternatives_spanish:
  - empezó a hablar
  - comenzó a hablar a
  - dio comienzo a hablar
  lexicon: Dillmann
  rationale: La construcción ge'ez es difícil y la revisión inglesa concluye que el sentido natural es que Enoch inició la acción de hablar. 'Comenzó a hablar' conserva ese valor inceptivo sin forzar un sujeto u objeto ausente.
- source_word: እመጻሕፍት
  english_pob_choice: from the books
  chosen_spanish: de los libros
  alternatives_spanish:
  - a partir de los libros
  - desde los libros
  lexicon: Dillmann
  rationale: '''De los libros'' reproduce la idea de fuente u origen de manera idiomática en español, manteniendo el vínculo con los escritos sin explicitar más de lo que el texto permite.'
theological_decisions:
- issue: Sujeto implícito y lectura del verbo en la cláusula difícil
  english_pob_reading: The clause is compressed and textually difficult; Enoch began to speak from the books.
  chosen_spanish_reading: Enoc comenzó a hablar de los libros.
  alternative_spanish_readings:
  - Enoc fue habilitado para hablar a partir de los libros.
  - Le fue dado hablar a Enoc desde los libros.
  rationale: La evidencia revisada corrige la lectura que hacía de Enoc un objeto indirecto. El texto apunta a Enoc como sujeto que habla; no se resuelve con más precisión quién le da la voz ni si hay mediación divina o angélica, por lo que se preserva esa tensión sin añadir un sujeto teológico no atestado.
  doctrine_reference: Preservar la ambigüedad textual y no identificar indebidamente al agente implícito.
translation_notes:
  revision_awareness: 'Se incorporó la corrección crítica del audit trail: el ge''ez no hace de Enoc el objeto indirecto de ''dio a mí'', sino el sujeto de la acción; por eso se evitó toda lectura como ''le dio voz'' y se siguió la revisión inglesa más reciente, aunque manteniendo la idea de procedencia ''de los libros''.'
  spanish_consistency_notes:
  - Se mantiene 'Enoc' como forma española estándar del nombre propio.
  - Se evita 'SEÑOR' o terminología doctrinal ajena porque el versículo no contiene vocabulario divino explícito.
  - '''Hablar'' se eligió por fluidez y porque respeta la incepción verbal del original sin sobretraducir.'
