  yaml_path: translation/extra_canonical/1_enoch/093/008.yaml
  text: And after this[a], in the sixth week, all who are in it will be blind, and the hearts of all of them will forget wisdom. And in it a man will ascend, and at its completion the house of the kingdom will be burned with fire[d][c][b], and in it the whole stock of the chosen root will be scattered.
  footnotes:
