    text: Or 'all within it will be blind/darkened.' The Ge'ez wording likely describes the people of the sixth week as spiritually blinded.
    reason: lexical_alternative
  - marker: b
    text: Or 'a man will arise.' The verb can suggest rising or ascending; the more literal 'ascend' is kept to preserve the text's ambiguity.
    reason: lexical_alternative
  - marker: c
    text: '''House of the kingdom'' may refer broadly to the royal order or dynasty, not necessarily only a physical building.'
    reason: lexical_alternative
  - marker: d
    text: '''Chosen root'' combines lineage imagery with plant imagery; it may denote an elect line or remnant.'
    reason: lexical_alternative
