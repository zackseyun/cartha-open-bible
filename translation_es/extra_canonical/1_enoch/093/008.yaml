translation:
  language: es
  text: Y después de esto, en la sexta semana, todos los que estén en ella[a] serán ciegos, y los corazones de todos ellos olvidarán la sabiduría. Y en ella un hombre ascenderá[b], y al completarse será quemada con fuego la casa del reino[c], y en ella será dispersado todo el linaje de la raíz escogida[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los que están en ella serán cegados» o «todos los que están dentro de ella serán oscurecidos». La redacción ge''ez probablemente describe a la gente de la sexta semana como espiritualmente ciega.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «surgirá» o «se levantará». El verbo puede sugerir subir o ascender; se conserva «ascenderá» para mantener la ambigüedad del texto.'
    reason: lexical_alternative
  - marker: c
    text: «Casa del reino» puede referirse en sentido amplio al orden o a la dinastía real, no necesariamente solo a un edificio físico.
    reason: lexical_alternative
  - marker: d
    text: «Raíz escogida» combina imagen de linaje con imagen vegetal; puede denotar una línea elegida o un remanente escogido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሳድስት ሰንበት
  english_pob_choice: the sixth week
  chosen_spanish: la sexta semana
  alternatives_spanish:
  - el sexto heptad
  - el sexto período de semana
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico, ሰንበት designa una unidad simbólica de tiempo, no el sábado literal. "Semana" comunica con claridad el período de la visión y conserva la periodización del pasaje.
- source_word: ውስቴታ ጽሉላነ ኵሎሙ
  english_pob_choice: all who are in it will be blind
  chosen_spanish: todos los que estén en ella serán ciegos
  alternatives_spanish:
  - todos los que estén en ella serán cegados
  - todos los que están dentro de ella estarán ciegos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura del POB inglés preserva el estado resultante de ceguera. En español, "serán ciegos" mantiene esa condición sin forzar una traducción más interpretativa como "cegados".
- source_word: ይትረሣዕ ልቦሙ ለኵሎሙ እምጥበብ
  english_pob_choice: the hearts of all of them will forget wisdom
  chosen_spanish: los corazones de todos ellos olvidarán la sabiduría
  alternatives_spanish:
  - sus corazones se apartarán de la sabiduría
  - los corazones de todos serán extrañados de la sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Olvidarán la sabiduría" sigue de cerca la fuerza verbal y conserva el vínculo con la tradición sapiencial sin ampliar el sentido hacia apartarse o ser alienados.'
- source_word: ባቲ የዓርግ ብእሲ
  english_pob_choice: in it a man will ascend
  chosen_spanish: en ella un hombre ascenderá
  alternatives_spanish:
  - en ella un hombre surgirá
  - en ella un hombre subirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Ascenderá" conserva la ambigüedad del verbo ge''ez y evita identificar al personaje con una figura específica. En español, "ascender" mantiene mejor el matiz elevado que "surgirá".'
- source_word: ቤተ መንግሥት
  english_pob_choice: the house of the kingdom
  chosen_spanish: la casa del reino
  alternatives_spanish:
  - la casa de la realeza
  - la casa real
  - el palacio del reino
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Casa del reino" reproduce de manera transparente la construcción del original y conserva la posible amplitud del sintagma: dinastía, orden real o institución regia, sin cerrarlo prematuramente.'
- source_word: ይውዒ ... በእሳት
  english_pob_choice: will be burned with fire
  chosen_spanish: será quemada con fuego
  alternatives_spanish:
  - será consumida por el fuego
  - arderá en fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Será quemada con fuego" es idiomático en español y mantiene la imagen de juicio sin intensificarla ni suavizarla.'
- source_word: ኵሉ ዘመደ ሥርወ ኀሩይ
  english_pob_choice: the whole stock of the chosen root
  chosen_spanish: todo el linaje de la raíz escogida
  alternatives_spanish:
  - toda la estirpe de la raíz escogida
  - todo el linaje del tronco escogido
  - todo el linaje del retoño escogido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Linaje" conserva la dimensión genealógica, mientras "raíz escogida" mantiene la metáfora vegetal y la carga de elección. "Stock" en inglés se traduce de forma natural por "linaje" en español para este contexto.'
theological_decisions:
- issue: Identidad de 'a man will ascend'
  english_pob_reading: Rendered generically as 'a man will ascend' without identifying him
  chosen_spanish_reading: 'Traducido de manera genérica: ''un hombre ascenderá'', sin identificarlo'
  alternative_spanish_readings:
  - ascenderá un líder concreto
  - se levantará una figura mesiánica
  - subirá un sacerdote
  rationale: El texto ge'ez no nombra a esta persona. La traducción conserva la ambigüedad para no resolverla con una identificación posterior que el versículo no explicita.
  doctrine_reference: Preservar la tensión teológica y no resolverla prematuramente.
- issue: Meaning of 'house of the kingdom'
  english_pob_reading: Kept as 'house of the kingdom'
  chosen_spanish_reading: Mantenido como 'casa del reino'
  alternative_spanish_readings:
  - dinastía real
  - palacio
  - templo asociado con el reino
  rationale: La expresión puede apuntar al orden real o dinástico en sentido amplio. "Casa del reino" mantiene la literalidad y deja abierta la referencia institucional o dinástica.
  doctrine_reference: Primacía del original sobre la tradición interpretativa; conservar ambigüedad con documentación transparente.
- issue: Force of 'chosen root'
  english_pob_reading: Retained as election language without specifying a later canonical referent
  chosen_spanish_reading: Retenido como lenguaje de elección sin identificar un referente canónico posterior
  alternative_spanish_readings:
  - remanente elegido
  - raíz mesiánica
  - raíz/ramo escogido
  rationale: La expresión combina imagen genealógica y vegetal con elección divina, pero el versículo no la identifica con una sola figura. La traducción conserva esa tensión sin armonizarla con usos canónicos posteriores.
  doctrine_reference: No sobre-harmonizar con uso cristiano posterior.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: mantiene la lectura directa de estado en ''serán ciegos'' en lugar de una pasiva más explicativa, y conserva la ambigüedad de ''ascenderá''. También evita ampliar innecesariamente el sintagma final, manteniendo la imagen de juicio y la metáfora genealógica/vegetal.'
  spanish_consistency_notes:
  - Se usó 'casa del reino' para reflejar la ambigüedad de 'house of the kingdom' sin convertirla automáticamente en 'dinastía' o 'palacio'.
  - Se prefirió 'raíz escogida' por coherencia con la metáfora del original y con el lenguaje de elección preservado por el POB inglés.
  - La puntuación distribuye las tres acciones principales con comas y una coordinación final para una lectura fluida en español.
  - Los marcadores de nota [a]-[d] aparecen exactamente una vez cada uno en el texto, anclados a las expresiones correspondientes.
