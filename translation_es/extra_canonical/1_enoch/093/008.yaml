  source_alignment_summary: 'El borrador español refleja en general bien la secuencia y las ambigüedades clave del ge''ez y del POB inglés: la sexta semana como período simbólico, la ceguera de quienes están en ella, el olvido de la sabiduría, el ascenso de un hombre sin identificarlo, la quema de la casa del reino y la dispersión del linaje de la raíz escogida. Sin embargo, la nota [a] no preserva una alternativa real, porque repite exactamente el texto principal; y faltan notas para dos ambigüedades significativas que el POB inglés documenta: «casa del reino» y «raíz escogida».'
  spanish_quality_summary: 'El español es claro y digno, pero tiene pequeños problemas editoriales. «todos los que estén en ella» suena algo menos directo que «todos los que están en ella», aunque es aceptable. «al completarse» queda algo suelto y más natural sería «al completarse esta» o mejor «al llegar ella a su fin», pero no es indispensable. El problema principal es de aparato crítico: las notas actuales no corresponden bien al audit trail inglés. También conviene alinear el orden de las marcas con el proyecto, evitando una nota superflua y añadiendo las que preservan ambigüedades semánticas importantes.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. «raíz escogida» conserva bien el lenguaje de elección; «casa del reino» respeta la decisión de no reducir el sintagma a «casa real» o «dinastía».
  issues:
