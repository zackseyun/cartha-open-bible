translation:
  language: es
  text: Y después de mí[a], en la segunda semana, se levantará un gran mal, y el engaño brotará en ella. Y en ella habrá el primer fin, y en ella un hombre[b] será salvado; y después de que se haya completado, crecerá la injusticia, y se hará una ley para los pecadores[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La 'segunda semana' pertenece a la estructura simbólica de las semanas de Enoc; no debe leerse necesariamente como un período literal de siete días.
    reason: cultural_note
  - marker: b
    text: Se conserva el singular de la frase. Muchos lectores lo entienden como una alusión a Noé, pero el versículo no lo nombra.
    reason: cross_reference
  - marker: c
    text: También puede entenderse como una ley/ordenanza promulgada respecto de los pecadores, o incluso contra ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይቀውም
  english_pob_choice: there shall arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - surgirá
  - aparecerá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico, un verbo de surgimiento o levantamiento transmite mejor la aparición de una nueva etapa histórica que un calco como "estará en pie".
- source_word: እምድኅሬየ
  english_pob_choice: after me
  chosen_spanish: después de mí
  alternatives_spanish:
  - tras de mí
  - siguiéndome
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia temporal se conserva de forma directa y natural en español.
- source_word: በካልእት ሰንበት
  english_pob_choice: in the second week
  chosen_spanish: en la segunda semana
  alternatives_spanish:
  - durante la segunda semana
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la estructura simbólica de las "semanas" de Enoch sin forzar una literalidad cronológica ajena al género.
- source_word: ዐቢይ እኩይ
  english_pob_choice: great evil
  chosen_spanish: un gran mal
  alternatives_spanish:
  - gran maldad
  - una gran maldad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Mal" conserva la fuerza moral amplia del término; el artículo indefinido ayuda a la fluidez del español y mantiene el peso apocalíptico.'
- source_word: ትሕሱት
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - falsedad
  - engañosidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Engaño" expresa bien la corrupción moral y la acción de seducir o desviar; en español resulta más natural que un abstracto como "falsedad" en esta secuencia.'
- source_word: በቀለት
  english_pob_choice: shall have sprung up / shall spring up
  chosen_spanish: brotará
  alternatives_spanish:
  - surgirá
  - florecerá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo retiene la imagen orgánica de algo que emerge o brota dentro del período señalado.
- source_word: ቀዳሚት ፍጻሜ
  english_pob_choice: the first end
  chosen_spanish: un primer fin
  alternatives_spanish:
  - el primer fin
  - la primera culminación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Un primer fin" conserva el valor esquemático y apocalíptico sin sobreinterpretar el sintagma.'
- source_word: ይድኅን ብእሲ
  english_pob_choice: a man shall be saved
  chosen_spanish: un hombre será salvado
  alternatives_spanish:
  - un hombre será librado
  - un hombre será preservado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el singular y la idea de salvación/deliverancia sin identificar al personaje en el texto principal.
- source_word: ተፈጸመ
  english_pob_choice: has been completed
  chosen_spanish: haya sido completada
  alternatives_spanish:
  - haya sido terminada
  - se haya cumplido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La subordinada temporal exige un perfecto subjuntivo en español; "completada" conserva el sentido de culminación del período.
- source_word: ትእህቱ ዓመፃ
  english_pob_choice: unrighteousness shall grow
  chosen_spanish: crecerá la injusticia
  alternatives_spanish:
  - se multiplicará la injusticia
  - aumentará la iniquidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Injusticia" refleja el campo semántico de ዓመፃ y mantiene el tono ético-judicial del pasaje.'
- source_word: ሥርዐት
  english_pob_choice: a law
  chosen_spanish: una ley
  alternatives_spanish:
  - un decreto
  - una ordenanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Ley" es la opción más clara y formal en español; conserva la fuerza normativa del término sin estrecharlo innecesariamente.'
- source_word: ይትገበር ለኃጥኣን
  english_pob_choice: shall be made for the sinners
  chosen_spanish: se hará para los pecadores
  alternatives_spanish:
  - se promulgará para los pecadores
  - se establecerá para los pecadores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción impersonal reproduce bien el pasivo/impersonal del ge'ez y mantiene la ambigüedad documentada sobre si la ley es para, sobre o contra los pecadores.
theological_decisions:
- issue: Identidad del hombre singular que será salvado
  english_pob_reading: Retain the singular as 'a man shall be saved' without specifying Noah in the main text.
  chosen_spanish_reading: 'Mantener el singular: ''un hombre será salvado'', sin identificarlo como Noé en el texto principal.'
  alternative_spanish_readings:
  - Noé será salvado
  - la humanidad será salvada
  rationale: El texto conserva un singular deliberado y no nombra al personaje. La traducción debe respetar esa restricción textual y no resolverla en el cuerpo principal.
  doctrine_reference: Preservar la tensión interpretativa documentada; primacía del dato textual sobre la armonización.
- issue: Sentido de 'a law shall be made for the sinners'
  english_pob_reading: Translate straightforwardly as a law/ordinance being made for sinners, with ambiguity preserved.
  chosen_spanish_reading: Traducir de manera directa como una ley hecha para los pecadores, preservando la ambigüedad de la relación normativa.
  alternative_spanish_readings:
  - una ley será promulgada contra los pecadores
  - se dictará un decreto para los pecadores
  rationale: El ge'ez admite varias relaciones semánticas. "Para" conserva la literalidad y deja abierta la posibilidad de un sentido concerniente, dirigido o incluso adverso, sin fijarlo prematuramente.
  doctrine_reference: Primacía de la fuente original; mantener la ambigüedad documentada.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: mantiene el orden natural de ''en la segunda semana'', conserva el carácter futuro de la secuencia, y respeta la lectura singular de ''un hombre será salvado'' junto con la ambigüedad de ''una ley para los pecadores''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se evita 'Cristo' y 'Señor' porque no aparecen en la unidad textual.
  - '''Engaño'' y ''mal'' se prefieren por claridad y por el tono apocalíptico del pasaje.'
  - Los marcadores de nota aparecen exactamente en el texto donde corresponden.
