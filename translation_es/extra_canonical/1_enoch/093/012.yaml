base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/093/012.yaml
  text: And who is there that can behold heaven? And who is there that can understand the works of heaven? Or see a soul—or[a], if not[e][d][c][b], a spirit—and tell of it? Or else ascend and see all their ends?
  footnotes:
  - marker: a
    text: '''Storehouses of heaven'' may also be rendered ''treasuries of heaven'' or ''chambers of heaven.'' The image is cosmic and should not be reduced to a generic reference to heaven.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'see a soul—or, if not, a spirit' is textually and semantically difficult. The translation keeps the Ge'ez wording transparent rather than smoothing it into an interpretation.
    reason: textual_variant
  - marker: c
    text: The final expression is uncertain. It may mean 'all their ends/extremities,' with some possibility of a more literal sense related to 'wings.'
    reason: lexical_alternative
  - marker: d
    text: Or 'behold the storehouses of heaven'.
    reason: previous_rendering
  - marker: e
    text: Or 'Or, if he has not gone up, can he see'.
    reason: previous_rendering
