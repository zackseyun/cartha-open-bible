translation:
  language: es
  text: ¿Y quién hay que pueda contemplar el cielo? ¿Y quién hay que pueda entender las obras del cielo? ¿O ver un alma[a] —o, si no[b], un espíritu— y hablar de ello? ¿O, de otro modo[c], subir y ver todos sus extremos[d]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «alma» traduce aquí ነፍሰ; la frase mantiene su dureza y no intenta explicarla como una mera metáfora.
    reason: lexical_alternative
  - marker: b
    text: La cláusula «ver un alma —o, si no, un espíritu—» es textual y semánticamente difícil. La traducción conserva de forma transparente la redacción del ge'ez en vez de suavizarla interpretativamente.
    reason: textual_variant
  - marker: c
    text: También podría entenderse una lectura anterior como «o, si no ha subido, ¿puede ver?», pero la revisión textual favorece la continuación idiomática «subir y ver».
    reason: previous_rendering
  - marker: d
    text: «extremos» intenta reproducir la idea difícil de ኵሎ አክናፊሆሙ; otras posibilidades son «confines» o, más literalmente pero con más oscuridad, «alas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ምነት
  english_pob_choice: who is there
  chosen_spanish: ¿quién hay
  alternatives_spanish:
  - ¿quién
  - ¿qué persona hay
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pregunta retórica pide cualquier persona capaz de realizar las acciones descritas; en español, «¿quién hay?» conserva bien ese matiz idiomático y natural.
- source_word: ዘይክል
  english_pob_choice: that can
  chosen_spanish: que pueda
  alternatives_spanish:
  - que puede
  - capaz de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa capacidad. «Que pueda» mantiene la fuerza potencial y el tono de desafío retórico sin sonar rígido.
- source_word: ነጽሮተ ሰማይ
  english_pob_choice: behold heaven
  chosen_spanish: contemplar el cielo
  alternatives_spanish:
  - ver el cielo
  - mirar el cielo
  - behold heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto ge'ez dice literalmente «behold heaven»; en español, «contemplar» comunica mejor la acción de mirar con atención solemne. No se introduce ninguna idea de 'almacenes' o 'tesoros' que no está en el texto.
- source_word: አእምሮ ግብረ ሰማይ
  english_pob_choice: understand the works of heaven
  chosen_spanish: entender las obras del cielo
  alternatives_spanish:
  - comprender las obras del cielo
  - entender los hechos del cielo
  - percibir los movimientos del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obras» conserva la relación con ግብረ (obras, hechos, acciones). «Del cielo» sigue el genitivo del original sin forzar una explicación interpretativa.
- source_word: ነፍሰ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - soul
  - vida
  - aliento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí se conserva el término antropológico básico como «alma», que en español bíblico es claro y natural, y mantiene la distinción con «espíritu» en la frase siguiente.
- source_word: መንፈሰ
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - espíritu
  - aliento
  - viento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto antropológico/cósmico favorece «espíritu». Se mantiene la oposición textual con «alma» sin suavizarla.
- source_word: ይክል ነጊረ
  english_pob_choice: can ... tell of it
  chosen_spanish: declararlo
  alternatives_spanish:
  - decirlo
  - contarlo
  - declararlo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo combina capacidad con acto verbal. «Declararlo» conserva el sentido de dar testimonio o reportar lo visto, con un registro digno.
- source_word: ዐሪገ
  english_pob_choice: has gone up
  chosen_spanish: subir
  alternatives_spanish:
  - ascender
  - haber subido
  - ir al cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada indica que el giro es una continuación idiomática: «subir y ver». «Subir» preserva la imagen ascensional de manera natural en español.'
- source_word: ኵሎ አክናፊሆሙ
  english_pob_choice: all their ends
  chosen_spanish: todos sus extremos
  alternatives_spanish:
  - todos sus confines
  - todas sus extremidades
  - todas sus alas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase final es difícil; la traducción de trabajo mantiene una opción general y transparente, sin imponer «alas» ni otra solución más especulativa.
theological_decisions:
- issue: Distinción antropológica entre «alma» y «espíritu»
  english_pob_reading: Rendered distinctly as 'soul' and 'spirit' without collapsing them.
  chosen_spanish_reading: «alma» y «espíritu» se traducen de forma distinta y no se fusionan.
  alternative_spanish_readings:
  - «vida» y «aliento»
  - suavizar ambos términos en una sola noción antropológica
  rationale: El pasaje conserva una tensión antropológica deliberada. La versión española mantiene la distinción sin resolverla, siguiendo la prudencia del texto fuente.
  doctrine_reference: Preservar la tensión teológica en lugar de armonizarla artificialmente.
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada que corrige dos puntos clave del inglés: 1) ነጽሮተ፡ ሰማይ significa «behold heaven» y no «storehouses of heaven»; 2) ወእመ፡ አኮ፡ ዐሪገ debe leerse como una continuación idiomática: «or else ascend and see», no como una condicional invertida. La redacción española evita ambas lecturas erróneas.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o fórmulas de sustitución porque no hay aquí el Tetragrámaton.
  - Se mantuvo el contraste «alma / espíritu» como en el aparato auditado.
  - Se prefirió un registro bíblico claro, sin arcaísmo innecesario, pero sin banalizar la pregunta retórica apocalíptica.
  - No se usó «Cristo» ni terminología cristológica ajena al pasaje.
