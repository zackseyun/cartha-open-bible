translation:
  language: es
  text: Y después de esto[a], en la quinta semana, al completarse[b], la casa de gloria y realeza será edificada para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la casa gloriosa y la realeza será edificada para siempre», si መንግሥት se toma como un segundo elemento coordinado y no como parte de la descripción de la casa.
    reason: alternative_reading
  - marker: b
    text: En el Apocalipsis de las Semanas, «semana» designa un período simbólico en la visión de Enoc, no necesariamente un lapso literal de siete días.
    reason: cultural_note
lexical_decisions:
- source_word: እምድኅረዝ
  english_pob_choice: after this
  chosen_spanish: y después de esto
  alternatives_spanish:
  - después de esto
  - luego de esto
  lexicon: Dillmann
  rationale: La fórmula temporal introduce la siguiente etapa de la visión. «Y después de esto» conserva el enlace secuencial y el valor apocalíptico de transición sin añadir interpretación.
- source_word: ኃምስ ሰንበት
  english_pob_choice: the fifth week
  chosen_spanish: la quinta semana
  alternatives_spanish:
  - el quinto periodo
  - la quinta heptada
  lexicon: Dillmann
  rationale: En este contexto de la Apocalypse of Weeks, el término se entiende como una unidad simbólica de tiempo. «Semana» es la opción más transparente en español y mantiene la estructura del esquema visionario.
- source_word: በተፍጻሜታ
  english_pob_choice: at its completion
  chosen_spanish: al cumplirse
  alternatives_spanish:
  - al completarse
  - en su término
  lexicon: Dillmann
  rationale: El sufijo retoma la semana mencionada. «Al cumplirse» expresa bien la idea de alcanzar su plenitud o término sin forzar una construcción demasiado literal en español.
- source_word: ቤተ ስብሐት
  english_pob_choice: the house of glory
  chosen_spanish: la casa de gloria
  alternatives_spanish:
  - la casa gloriosa
  - la casa de alabanza
  lexicon: Dillmann
  rationale: «Casa» conserva la imagen concreta del edificio/santuario. «Gloria» sigue la lectura preferida por el POB inglés y mantiene el tono cultual y exaltado del término.
- source_word: መንግሥት
  english_pob_choice: kingship
  chosen_spanish: realeza
  alternatives_spanish:
  - reinado
  - reyecía
  - reino
  lexicon: Dillmann
  rationale: El inglés opta por «kingship» para mantener el matiz abstracto de soberanía y no reducirlo a un territorio. «Realeza» comunica ese campo semántico en español con dignidad y evita convertirlo de inmediato en «reino».
- source_word: ይትሐነጽ
  english_pob_choice: shall be built
  chosen_spanish: será edificado
  alternatives_spanish:
  - será construido
  - será levantado
  lexicon: Dillmann
  rationale: El pasivo futuro conserva la imagen de construcción. «Edificado» funciona bien para un contexto de templo/santuario y mantiene un registro bíblico sobrio sin caer en formulaciones eclesiásticas tradicionales no necesarias.
- source_word: እስከ ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por toda la eternidad
  - hasta la eternidad
  lexicon: Dillmann
  rationale: Es la equivalencia idiomática más natural en español para la permanencia indefinida del enunciado.
theological_decisions:
- issue: Si መንግሥት debe separarse de la casa o integrarse como cualidad de ella
  english_pob_reading: A sanctuary-like 'house' characterized by glory and kingship
  chosen_spanish_reading: Una sola casa/santuario caracterizada por gloria y realeza
  alternative_spanish_readings:
  - la casa de gloria, y el reino será edificado
  - la casa gloriosa y el reino
  rationale: La sintaxis ge'ez permite leer los dos sustantivos siguientes como atributos o como elementos coordinados. Siguiendo el POB inglés, se preserva la tensión sin resolverla en dos construcciones distintas. «Realeza» mantiene el matiz de soberanía asociado a la casa.
  doctrine_reference: Preservar la tensión apocalíptica y la ambigüedad lexical cuando el texto fuente la permite.
translation_notes:
  revision_awareness: La versión sigue de cerca el pasaje ge'ez y el trazado auditado del POB inglés. Se conserva la estructura temporal, la imagen concreta de la «casa» y la ambigüedad entre cualidad del santuario y posible coordinación con «realeza». No se requieren revisiones adicionales según el control cruzado disponible.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiriera; aquí no aparece el Tetragrámaton.
  - «Casa» se mantuvo por la imagen arquitectónica/santuarial del original.
  - «Realeza» evita reducir መንግሥት a un simple «reino» territorial y conserva el valor abstracto de soberanía.
  - La puntuación y el orden reflejan la secuencia apocalíptica del original sin expandir el contenido.
