    rationale: Debe decir «el Apocalipsis de las Semanas», no «la Apocalipsis de las Semanas».
  - severity: medium
    issue: La nota c mantiene una incertidumbre textual presentada de forma demasiado fuerte frente al audit trail ya revisado.
    rationale: El expediente aplicado y la revisión posterior ya estabilizaron la traducción inglesa en una pareja ética positiva. La nota puede conservar cautela, pero no debe justificar un texto principal desalineado.
