  - severity: medium
    issue: «Desde los libros» es poco natural en español para esta construcción.
    rationale: Aunque literalmente posible, en español bíblico y general suena más idiomático «hablar de los libros» o «hablar a partir de los libros». Para conservar la idea de fuente textual sin paráfrasis excesiva, «de los libros» funciona mejor.
  - severity: low
