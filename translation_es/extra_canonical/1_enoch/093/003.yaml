translation:
  language: es
  text: 'Y ahora Enoc comenzó a hablar de los libros[a], y dijo: «Yo nací el séptimo en la primera semana[b], mientras la rectitud y la justicia aún perduraban[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «de los libros» probablemente presenta a Enoc hablando a partir de registros escritos, no improvisando espontáneamente.
    reason: cultural_note
  - marker: b
    text: «Primera semana» se refiere a la periodización simbólica del Apocalipsis de las Semanas, no necesariamente a una semana literal de siete días.
    reason: cross_reference
  - marker: c
    text: 'La revisión del texto favorece aquí una lectura retrospectiva de duración continua: no es una proyección futura, sino un estado que todavía persistía. El par ético se entiende en sentido positivo, como «rectitud y justicia».'
    reason: textual_note
lexical_decisions:
- source_word: አኀዘ
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - se puso a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca el inicio de la acción de hablar; en español, «comenzó» conserva el valor narrativo sin sonar forzado.
- source_word: እንከ
  english_pob_choice: now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y ahora mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce transición discursiva; «Y ahora» reproduce la función de enlace y el cambio de escena.
- source_word: ይትናገር
  english_pob_choice: to speak / speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - discursar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hablar» es el equivalente natural en la construcción «comenzó a hablar» y no añade contenido indebido.
- source_word: እመጻሕፍት
  english_pob_choice: from the books
  chosen_spanish: desde los libros
  alternatives_spanish:
  - de los libros
  - a partir de los libros
  - según los libros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición sugiere origen o fuente del discurso; «desde» preserva mejor esa procedencia textual que una paráfrasis más interpretativa.
- source_word: ሳብዕ
  english_pob_choice: the seventh
  chosen_spanish: el séptimo
  alternatives_spanish:
  - séptimo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal que identifica la posición de Enoc dentro de la serie genealógica; el artículo ayuda a la fluidez en español.
- source_word: ተወለድኩ
  english_pob_choice: I was born
  chosen_spanish: yo nací
  alternatives_spanish:
  - fui nacido
  - fui engendrado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Nací» es la forma natural en español para la fórmula de nacimiento y conserva el sentido pasivo/perfectivo del ge'ez.
- source_word: በቀዳሚት ሰንበት
  english_pob_choice: in the first week
  chosen_spanish: en la primera semana
  alternatives_spanish:
  - en el primer heptad
  - en el primer sábado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico «semana» comunica la periodización simbólica; «heptad» es exacto pero menos natural para lectores en español.
- source_word: እስከ አመ
  english_pob_choice: until the time when / while
  chosen_spanish: mientras
  alternatives_spanish:
  - hasta que
  - hasta el tiempo en que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente del audit trail entiende la construcción como simultaneidad temporal, no como meta futura; «mientras» conserva ese valor aspectual.
- source_word: ጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia moral
  - la justicia y rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se sigue la lectura revisada del audit trail, que privilegia una pareja semántica con el término anterior; «justicia» es el equivalente más estable en español bíblico para ጽድቅ en este contexto.
- source_word: ጽጌነ / ኵነኔ
  english_pob_choice: uprightness / judgment
  chosen_spanish: la rectitud
  alternatives_spanish:
  - el juicio
  - la justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dado el conflicto textual reconocido en el expediente, «rectitud» mantiene la cualidad ética sin resolver de manera excesiva la lectura dudosa; además permite una pareja clara con «justicia».
- source_word: ትዓገሠ
  english_pob_choice: shall endure / still endured
  chosen_spanish: aún perduraban
  alternatives_spanish:
  - aún duraban
  - seguían vigentes
  - todavía permanecían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión adjudicada indica un valor pasado progresivo/continuativo en el marco histórico; «aún perduraban» refleja duración en curso y un cierre temporal no futurista.
theological_decisions:
- issue: La frase «from the books» y la autoconciencia textual de Enoc
  english_pob_reading: Enoch is speaking from written records, not merely improvising.
  chosen_spanish_reading: Enoc comenzó a hablar desde los libros, manteniendo la idea de que recita o expone a partir de registros escritos.
  alternative_spanish_readings:
  - hablaba de los libros
  - hablaba según los libros
  rationale: La formulación conserva la referencia a una fuente escrita sin convertirla en una afirmación más fuerte de canonicidad o autoridad documental de la que el texto exige.
  doctrine_reference: Principio de transparencia textual y preservación de la autodescripción del relato
- issue: El sintagma temporal final y el conflicto entre lectura futura y pasada
  english_pob_reading: while righteousness and justice still endured
  chosen_spanish_reading: mientras la justicia y la rectitud aún perduraban
  alternative_spanish_readings:
  - hasta que la justicia y la rectitud perduraran
  - cuando la justicia y la rectitud aún existían
  rationale: El expediente de revisión corrige una lectura futura y favorece una escena retrospectiva; en español, «mientras... aún perduraban» comunica coexistencia temporal y duración continua.
  doctrine_reference: Preservar la tensión filológica sin forzar una armonización doctrinal
- issue: 'Pareja ética final: justicia/rectitud frente a otras combinaciones posibles'
  english_pob_reading: righteousness and justice
  chosen_spanish_reading: la justicia y la rectitud
  alternative_spanish_readings:
  - la rectitud y la justicia
  - la justicia y el juicio
  - la rectitud y la verdad
  rationale: La combinación mantiene dos términos éticos positivos sin sobrecargar el verso con decisiones más especulativas; además respeta el movimiento del audit trail hacia una pareja semántica estable.
  doctrine_reference: Consistencia terminológica y respeto por la incertidumbre textual
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado más reciente del expediente, que corrige una lectura anterior de futuro («shall endure») y prefiere una escena pasada continuativa. También se registró el conflicto textual sobre el segundo término ético, por lo que la traducción española evita una solución demasiado cerrada y conserva la tensión documental.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - Se mantuvo el tono bíblico sobrio y contemporáneo, sin arcaísmos innecesarios.
  - Se evitó «Señor» como sustituto del nombre divino, pues no corresponde a este verso.
  - Se eligió «justicia» y «rectitud» como pareja ética estable para conservar la fluidez y la incertidumbre textual.
  - Se prefirió la puntuación española con comillas angulares y coma antes de la cita directa.
