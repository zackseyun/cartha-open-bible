  language: en
  yaml_path: translation/extra_canonical/1_enoch/093/005.yaml
  text: And after this[a], in the third week, at its completion, a man shall be chosen as the plant of righteous judgment[c][b], and after him there shall come forth the plant of righteousness forever and ever.
  footnotes:
  - marker: a
    text: The 'third week' belongs to the symbolic sequence of the Apocalypse of Weeks; it is not a literal seven-day week.
    reason: cultural_note
  - marker: b
    text: The chosen 'man' is left unidentified in the text. Interpreters have connected him with a notable righteous ancestor or leader, but the verse itself does not name him.
    reason: alternative_reading
  - marker: c
    text: The repeated image 'plant of righteousness' may point to a righteous line, growth, or enduring community, but the agricultural metaphor is kept in translation.
    reason: lexical_alternative
