translation:
  language: es
  text: Y después de esto[a], en la tercera semana, al cumplirse[b], un hombre[c] será escogido como la planta de juicio justo[d]; y después de él saldrá la planta de justicia[d] para siempre jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La «tercera semana» pertenece a la secuencia simbólica del Apocalipsis de las Semanas; no se trata de una semana literal de siete días.
    reason: cultural_note
  - marker: b
    text: La frase señala el momento de cierre de esa semana simbólica.
    reason: spanish_style_note
  - marker: c
    text: El «hombre» escogido no es identificado por el texto. Algunos intérpretes lo relacionan con un antepasado o líder justo notable, pero el versículo mismo no lo nombra.
    reason: alternative_reading
  - marker: d
    text: Se conserva la imagen vegetal del texto. La primera expresión combina lenguaje judicial y moral («juicio justo»), mientras que la segunda repite «planta de justicia»; ambas pueden sugerir una persona, un linaje, un crecimiento o una comunidad justa, pero aquí se mantiene la metáfora.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሣልስት ሰንበት
  english_pob_choice: the third week
  chosen_spanish: la tercera semana
  alternatives_spanish:
  - la tercera semana simbólica
  - el tercer período de siete
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto del Apocalipsis de las Semanas, el término designa una serie simbólica de períodos heptádicos, no una semana literal de siete días. «Semana» comunica con claridad la secuencia simbólica y mantiene el paralelismo con la tradición de la obra.
- source_word: በተፍጻሜታ
  english_pob_choice: at its completion
  chosen_spanish: al cumplirse
  alternatives_spanish:
  - al completarse
  - al final de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión remite a la terminación de la semana simbólica. «Al cumplirse» conserva la idea de consumación sin sonar rígido en español.
- source_word: ይትኃረይ
  english_pob_choice: shall be chosen
  chosen_spanish: será escogido
  alternatives_spanish:
  - será elegido
  - será seleccionado
  - será nombrado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogido» mantiene la pasividad del original y la idea de selección sin introducir lenguaje institucional de nombramiento.
- source_word: ብእሲ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo etiópico normalmente significa «hombre» o «ser humano». Se conserva el singular personal sin identificar al personaje.
- source_word: ለተክለ
  english_pob_choice: as the plant of
  chosen_spanish: como la planta de
  alternatives_spanish:
  - como el retoño de
  - como el plantío de
  - como la rama de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen vegetal de forma concreta. «Planta» es la opción más transparente en español para mantener la metáfora sin forzar una interpretación más específica.
- source_word: ኵነኔ ጽድቅ
  english_pob_choice: righteous judgment
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio justo
  - juicio de justicia
  - justo juicio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia etiópica combina un campo judicial con uno de rectitud moral. En español, «de justicia» permite conservar esa tensión y enlaza naturalmente con la repetición final de «planta de justicia».
- source_word: ይወፅእ
  english_pob_choice: there shall come forth
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá a la luz
  - brotará
  - surgirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa salida o emergencia. «Saldrá» es sobrio y adecuado al paralelismo vegetal, sin añadir una imagen distinta.
- source_word: ለተክለ ጽድቅ
  english_pob_choice: the plant of righteousness
  chosen_spanish: la planta de justicia
  alternatives_spanish:
  - la planta de rectitud
  - el retoño de justicia
  - la planta recta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la metáfora vegetal y el sustantivo «justicia», que en este contexto retiene mejor el peso judicial y moral que una simple paráfrasis abstracta.
- source_word: ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: para siempre jamás
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre
  - por eternidad de eternidades
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión duplicada indica duración perpetua. «Para siempre jamás» es idiomático en español y conserva el énfasis del hebraísmo/semítismo de eternidad reforzada.
theological_decisions:
- issue: Identidad del «hombre» escogido al final de la tercera semana
  english_pob_reading: Render generically as 'a man' without identifying him in the main text.
  chosen_spanish_reading: Se traduce genéricamente como «un hombre», sin identificarlo en el texto principal.
  alternative_spanish_readings:
  - Enoc
  - Noé
  - Abraham
  - un líder justo representativo
  rationale: El verso no nombra al personaje. Mantener la ambigüedad evita resolver una cuestión interpretativa que el propio texto deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de la imagen de la planta
  english_pob_reading: Retain the agricultural metaphor 'plant' in both clauses.
  chosen_spanish_reading: Se conserva la metáfora agrícola con «planta» en ambas cláusulas.
  alternative_spanish_readings:
  - linaje
  - retoño
  - descendencia
  - comunidad
  rationale: El original ge'ez usa imaginería vegetal explícita. Traducirla de forma abstracta diluiría el simbolismo apocalíptico y podría imponer una interpretación prematura.
  doctrine_reference: 'Book context: do not flatten apocalyptic imagery into generic prose.'
translation_notes:
  revision_awareness: El texto sigue de cerca el auditorio en inglés con la misma decisión de mantener la ambigüedad del personaje y la metáfora vegetal. No se introdujeron revisiones textuales nuevas respecto del último pase, y la concordancia de la revisión previa indica alta conformidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el nombre divino, aunque este versículo no lo contiene.
  - Se usa «justicia» para ኵነኔ ጽድቅ y «planta» para ለተክለ / ለተክለ ጽድቅ, conservando la imagen agrícola.
  - «Será escogido» y «saldrá» reflejan la secuencia pasiva/emergente del original sin añadir identificación del sujeto.
