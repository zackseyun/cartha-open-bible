translation:
  language: es
  text: Y al llegar a su fin, los escogidos, los justos, serán seleccionados[a] de la planta eterna de justicia[b], y a ellos se les dará[c] la instrucción de siete partes acerca de toda su creación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán escogidos»; el verbo ge'ez puede expresar elección o selección, y el contexto ya incluye la idea de «escogidos».
    reason: lexical_alternative
  - marker: b
    text: O «plantío eterno de justicia» o «plantación eterna de justicia»; se conserva la imagen agrícola para no reducirla a una idea abstracta.
    reason: lexical_alternative
  - marker: c
    text: 'O «las siete instrucciones» o «las siete clases de instrucción». El ge''ez aquí es difícil, y el numeral puede calificar la enseñanza como un conjunto completo de siete partes. También puede entenderse con una relación más estrecha: «a quienes se les dará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: በተፍጻሜታ
  english_pob_choice: at its completion
  chosen_spanish: al completarse
  alternatives_spanish:
  - en su completación
  - cuando se complete
  lexicon: Dillmann
  rationale: La expresión indica el momento conclusivo del período previo. «Al completarse» conserva la idea temporal sin añadir un antecedente no explicitado en el texto.
- source_word: ይትኃረዩ
  english_pob_choice: will be selected
  chosen_spanish: serán seleccionados
  alternatives_spanish:
  - serán escogidos
  - serán apartados
  lexicon: Dillmann
  rationale: El verbo pasivo/reflexivo expresa elección o selección. «Serán seleccionados» mantiene el matiz de ser apartados por elección sin repetir innecesariamente la idea ya contenida en «escogidos».
- source_word: ኅሩያን ጻድቃን
  english_pob_choice: the chosen righteous ones
  chosen_spanish: los escogidos, los justos
  alternatives_spanish:
  - los elegidos justos
  - los escogidos justos
  lexicon: Dillmann
  rationale: 'Se conservan ambos rasgos: elección y justicia. En español, «justos» resulta natural y mantiene la terminología moral/covenantal. La repetición appositiva evita diluir uno de los dos calificativos.'
- source_word: እምተክለ ጽድቅ ዘለዓለም
  english_pob_choice: from the eternal plant of righteousness
  chosen_spanish: de la planta eterna de justicia
  alternatives_spanish:
  - del plantío eterno de justicia
  - de la plantación eterna de justicia
  lexicon: Dillmann
  rationale: Se preserva la imagen agrícola concreta. «Planta» es la forma más natural en español para mantener el paralelismo con la metáfora de crecimiento sin convertirla en una idea abstracta. «Justicia» mantiene el valor ético/covenantal de צֶדֶק/צְדָקָה.
- source_word: ይትወሀብ ሎሙ
  english_pob_choice: to them will be given
  chosen_spanish: se les dará
  alternatives_spanish:
  - les será dada
  - será dada a ellos
  lexicon: Dillmann
  rationale: El pasivo impersonal español reproduce bien la voz pasiva ge'ez y su registro solemne. «Se les dará» evita una construcción rígida y mantiene el destinatario explícito.
- source_word: ሰብዓቱ
  english_pob_choice: sevenfold
  chosen_spanish: séptupla
  alternatives_spanish:
  - de siete partes
  - en siete formas
  lexicon: Dillmann
  rationale: La forma sugiere una totalidad de siete, no solo el numeral aislado. «Séptupla» conserva esa cualidad totalizante con un registro elevado, sin decidir demasiado la estructura exacta del sintagma.
- source_word: መክዕቢተ ትምህርት
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - enseñanza
  - doctrina
  lexicon: Dillmann
  rationale: «Instrucción» sigue de cerca la opción inglesa y encaja con el contexto de revelación/aprendizaje. Se evita «doctrina» por su carga confesional posterior y «enseñanza» por ser más genérica.
- source_word: በኵሉ ፍጥረት ዚአሁ
  english_pob_choice: concerning all his creation
  chosen_spanish: acerca de toda su creación
  alternatives_spanish:
  - sobre toda su creación
  - respecto de toda su creación
  lexicon: Dillmann
  rationale: «Acerca de» expresa bien el ámbito temático de la instrucción. «Su creación» mantiene el referente singular del poseedor, y «toda» conserva la amplitud total del alcance.
theological_decisions:
- issue: Elección y justicia como rasgos coordinados
  english_pob_reading: the chosen righteous ones
  chosen_spanish_reading: los escogidos, los justos
  alternative_spanish_readings:
  - los elegidos justos
  - los justos escogidos
  rationale: El texto une elección y rectitud sin fusionarlas. Mantener ambas expresiones evita reducir la línea a mera predestinación o solo a mérito moral.
  doctrine_reference: Preservar la tensión teológica documentada; no resolverla por armonización.
- issue: Imagen agrícola para el origen de los elegidos
  english_pob_reading: the eternal plant of righteousness
  chosen_spanish_reading: la planta eterna de justicia
  alternative_spanish_readings:
  - el plantío eterno de justicia
  - la plantación eterna de justicia
  rationale: La metáfora vegetal debe permanecer visible. Traducirla por una abstracción como «fundamento» borraría una imagen apocalíptica central del pasaje.
  doctrine_reference: Primacía del original y preservación de imaginería apocalíptica.
- issue: Forma del don de la instrucción
  english_pob_reading: the sevenfold instruction
  chosen_spanish_reading: la instrucción séptupla
  alternative_spanish_readings:
  - las siete instrucciones
  - la instrucción de siete partes
  rationale: El ge'ez es difícil aquí; la opción española conserva la idea de plenitud septenaria sin fijar en exceso si se trata de siete piezas, tipos o modalidades. Se deja abierta la ambigüedad documentada por la POB inglesa.
  doctrine_reference: Conservar ambigüedad léxica documentada; no cerrar una dificultad textual sin base suficiente.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que ajustó la última cláusula a una relación relativa más natural en inglés. En español, esa relación se conserva de forma idiomática con «y a ellos se les dará», manteniendo el flujo de la oración y la pasiva de donación. También se atendió a la dificultad reconocida en el sintagma numérico, optando por una solución que preserve la fuerza septenaria sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se emplea «Dios/Yahvé» según corresponda en otros contextos, pero aquí el verso no contiene ninguno de esos términos.
  - «Justicia» se usa para mantener la terminología de צֶדֶק/צְדָקָה, coherente con otros pasajes de POB.
  - Se preserva la imagen vegetal («planta») en lugar de abstraerla, en coherencia con la política de imaginería apocalíptica.
  - El marcador [c] se coloca en la cláusula de donación para señalar la variante relativa posible documentada en el audit trail.
