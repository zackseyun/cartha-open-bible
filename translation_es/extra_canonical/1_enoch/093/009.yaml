translation:
  language: es
  text: Y después de esto[a], en la séptima semana se levantará una generación apóstata, y sus obras serán muchas, y todas sus obras serán apostasía.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «séptimo sábado/semana». En esta sección el término designa el período simbólico de la visión histórica, no un día de reposo literal.
    reason: cultural_note
  - marker: b
    text: El sustantivo también puede traducirse «error», «perversión» o «rebeldía». Se escogió «apostasía» para conservar la fuerza religiosa de la descripción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሳብዕት ሰንበት
  english_pob_choice: the seventh week
  chosen_spanish: la séptima semana
  alternatives_spanish:
  - el séptimo sábado
  - el séptimo heptad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este pasaje de la serie apocalíptica, el término designa un período simbólico de la visión histórica, no un sábado literal. «Semana» conserva la estructura heptádica y es natural en español.
- source_word: ትትነሣእ
  english_pob_choice: will arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - aparecerá
  - será levantada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa surgir o levantarse. «Se levantará» mantiene la secuencia histórica-apocalíptica y suena fluido en español.
- source_word: ትውልድ
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - linaje
  - raza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí describe un colectivo histórico caracterizado moralmente. «Generación» es la opción más transparente y fiel al contexto.
- source_word: ዕሉት
  english_pob_choice: apostate
  chosen_spanish: apóstata
  alternatives_spanish:
  - perversa
  - malvada
  - rebelde
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término sugiere desviación o apartamiento religioso-moral. «Apóstata» conserva esa fuerza y evita rebajar la acusación a simple maldad general.
- source_word: ብዙኅ
  english_pob_choice: many will be
  chosen_spanish: muchos serán
  alternatives_spanish:
  - abundantes serán
  - numerosos serán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Funciona de manera predicativa con la frase siguiente. «Muchos serán» expresa con naturalidad la multiplicidad indicada.
- source_word: ምግባራቲሃ
  english_pob_choice: its deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus prácticas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo alude a acciones u obras. «Hechos» mantiene el peso moral sin sonar artificial en español.
- source_word: ዕልወት
  english_pob_choice: apostasy
  chosen_spanish: apostasía
  alternatives_spanish:
  - error
  - perversión
  - rebeldía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El abstracto corresponde al carácter de la generación descrita como apóstata. «Apostasía» preserva el vínculo temático y la fuerza religiosa del término.
theological_decisions:
- issue: Cómo traducir la caracterización moral de la generación en términos generales o en términos religiosos/covenantales
  english_pob_reading: apostate generation ... all its deeds will be apostasy
  chosen_spanish_reading: generación apóstata ... todos sus hechos serán apostasía
  alternative_spanish_readings:
  - generación perversa ... todos sus hechos serán perversidad
  - generación malvada ... todos sus hechos serán maldad
  rationale: 'Los pares ዕሉት / ዕልወት señalan más que simple inmoralidad: implican apartamiento o defección. Mantener «apóstata» y «apostasía» conserva esa tensión teológica en lugar de neutralizarla.'
  doctrine_reference: Preservar la tensión teológica y la consistencia terminológica, según el principio del texto fuente.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el análisis cruzado informó alta concordancia y acuerdo pleno con la lectura auditada.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología del proyecto cuando el texto la requiera; aquí no aparece.
  - Se mantiene la distinción entre una semana simbólica y una semana literal, siguiendo la nota auditada del inglés.
  - «Apóstata/apostasía» se usan de forma coherente para reflejar el vínculo léxico entre ዕሉት y ዕልወት.
  - El registro es bíblico y sobrio, sin calcos excesivamente rígidos.
