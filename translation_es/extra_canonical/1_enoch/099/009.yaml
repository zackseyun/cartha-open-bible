translation:
  language: es
  text: Por medio de ellos se corromperán y temerán, porque hicieron todas sus obras en falsedad, adoraron una piedra y perecerán de repente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቦሙ
  english_pob_choice: through them
  chosen_spanish: Por medio de ellos
  alternatives_spanish:
  - por ellos
  - por medio de eso
  - a causa de ellos
  lexicon: Leslau; Dillmann
  rationale: El verbo inicial depende del contexto inmediato de los ídolos o sueños de los versículos previos; «por medio de ellos» conserva la relación instrumental o mediadora sin forzar una lectura demasiado estrecha.
- source_word: ይረሰዑ
  english_pob_choice: they will become corrupt
  chosen_spanish: se volverán corruptos
  alternatives_spanish:
  - se volverán impíos
  - se corromperán
  - se harán malvados
  lexicon: Leslau; Dillmann
  rationale: El valor aquí no es «olvidar», sino volverse corruptos o impíos. «Se volverán corruptos» comunica bien el deterioro moral futuro y mantiene la fuerza del verbo.
- source_word: ይፈርሁ
  english_pob_choice: be afraid
  chosen_spanish: temerán
  alternatives_spanish:
  - tendrán miedo
  - se asustarán
  - estarán aterrados
  lexicon: Dillmann
  rationale: «Temerán» sigue el sentido simple del futuro plural y es más sobrio que una intensificación como «estarán aterrados».
- source_word: በሐሰት
  english_pob_choice: in falsehood
  chosen_spanish: en falsedad
  alternatives_spanish:
  - con engaño
  - falsamente
  - en mentira
  lexicon: Dillmann
  rationale: «En falsedad» conserva el matiz moral y de mentira o falsedad de la frase preposicional, sin suavizarla a un mero adverbio de modo.
- source_word: ኵሎ ገብሮሙ
  english_pob_choice: all their works
  chosen_spanish: todas sus obras
  alternatives_spanish:
  - todas sus acciones
  - todo lo que hicieron
  - todos sus hechos
  lexicon: Dillmann
  rationale: «Obras» reproduce la concreción del sustantivo en un lenguaje de juicio; «acciones» o «hechos» serían posibles, pero menos acordes con la formulación tradicional y el registro del pasaje.
- source_word: ለአብን
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - la piedra
  - una piedra idolátrica
  - un ídolo de piedra
  lexicon: Dillmann
  rationale: El original es singular y concreto. «Una piedra» preserva esa imagen sin generalizarla en plural ni explicar de más lo que el texto no explicita.
- source_word: ይትሐጐሉ
  english_pob_choice: they will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - serán consumidos
  - morirán
  lexicon: Dillmann
  rationale: El verbo apunta a ruina o destrucción. «Perecerán» es directo y fiel, y evita sobreespecificar el modo de la destrucción.
- source_word: በምዕር
  english_pob_choice: in an instant
  chosen_spanish: de repente
  alternatives_spanish:
  - en un instante
  - súbitamente
  - en un momento
  lexicon: Leslau; Dillmann
  rationale: La evidencia revisada para este término favorece una idea temporal de súbita rapidez. «De repente» transmite bien la irrupción inesperada del juicio en español natural.
theological_decisions:
- issue: Relación causal/instrumental del inicio del versículo
  english_pob_reading: through them they will become corrupt
  chosen_spanish_reading: Por medio de ellos se volverán corruptos
  alternative_spanish_readings:
  - Por ellos se corromperán
  - A causa de ellos se volverán corruptos
  rationale: El inicio parece conectar la corrupción con los objetos o medios mencionados antes. «Por medio de ellos» deja abierta la relación exacta sin perder el vínculo causal/instrumental.
  doctrine_reference: Translation philosophy §1, §3
- issue: Crítica de idolatría con objeto singular
  english_pob_reading: they worshiped a stone
  chosen_spanish_reading: adoraron una piedra
  alternative_spanish_readings:
  - adoraron piedras
  - adoraron un ídolo de piedra
  rationale: La forma singular del etiópico se conserva en español para mantener la imagen concreta y el reproche directo de idolatría.
  doctrine_reference: Translation philosophy §1, §4
- issue: Cierre de juicio súbito
  english_pob_reading: they will perish in an instant
  chosen_spanish_reading: perecerán de repente
  alternative_spanish_readings:
  - perecerán en un instante
  - serán destruidos de repente
  rationale: La revisión textual favorece un adverbio temporal de súbita rapidez, no de vergüenza. «De repente» conserva la inmediatez del juicio sin añadir matices ajenos.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: This draft follows the latest revision pass that corrected the opening clause to a causal/instrumental reading ('through them') and corrected the final phrase to a temporal-sudden reading ('in an instant' / 'de repente'), while also preserving the established sense of moral corruption, fear, false works, stone idolatry, and sudden perishing.
  spanish_consistency_notes:
  - Se usó «corruptos» para mantener la fuerza moral del verbo revisado, evitando la falsa amistad con «olvidarán».
  - Se conservó el singular «una piedra» para no suavizar la concreción idolátrica del texto.
  - Se eligió «de repente» como equivalente idiomático de una destrucción súbita, en línea con la revisión textual más reciente.
