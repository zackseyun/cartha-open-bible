revisions:
- from: Por medio de ellos se volverán corruptos y temerán, porque todas sus obras las hicieron en falsedad, y adoraron una piedra, y perecerán de repente.
  to: Por medio de ellos se corromperán y temerán, porque hicieron todas sus obras en falsedad, adoraron una piedra y perecerán de repente.
  rationale: 'Se mantiene la línea semántica ya adoptada en el borrador —incluido el inicio con ቦሙ y la idea de corrupción moral—, pero se pule la sintaxis para un español más natural y eufónico: «se corromperán» en lugar de «se volverán corruptos», y «hicieron todas sus obras en falsedad» en lugar de la construcción redundante «todas sus obras las hicieron». No hacen falta notas al pie nuevas.'
