  source_alignment_summary: 'El borrador español sigue bien la revisión inglesa adjudicada: mantiene la fórmula de ay, la corrupción de la ''palabra de justicia'' y de la ''ordenanza eterna'', y entiende correctamente el giro ge''ez como autoevaluación (''se consideran...'') en vez de la antigua lectura corporal. También conserva la imagen de juicio final con ''serán pisoteados''. Sin embargo, la construcción ''se consideran no ser pecadores'' es poco natural en español y no refleja del todo bien el valor de ''reckon themselves not to be sinners''; conviene ajustarla a una formulación idiomática que preserve la misma fuerza semántica.'
