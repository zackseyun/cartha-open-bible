translation:
  language: es
  text: ¡Ay de aquellos que pervierten la palabra de justicia y la ordenanza eterna, y se consideran no pecadores[a]; serán pisoteados sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cláusula es textualmente difícil. El etiópico parece expresar una afirmación de inocencia propia o una autoevaluación moral: ''se consideran no pecadores''. Otras interpretaciones entienden la línea de otra manera, pero aquí se conserva la tensión del texto transmitido sin resolverla del todo.'
    reason: textual_variant
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de aquellos que!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula profética de denuncia se expresa en español con «¡Ay de!», que conserva el tono judicial y de lamento del original mejor que un simple «Ay».
- source_word: ይዌልጥዎሙ
  english_pob_choice: pervert
  chosen_spanish: pervierten
  alternatives_spanish:
  - alteran
  - distorsionan
  - cambian
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo sugiere torcer algo de su forma correcta. «Pervierten» mantiene la fuerza moral y judicial que el contexto exige.
- source_word: ለነገረ ርትዕ
  english_pob_choice: the word of righteousness
  chosen_spanish: la palabra de justicia
  alternatives_spanish:
  - el mensaje de justicia
  - la palabra de rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ነገር» puede ser palabra, asunto o mensaje. «Palabra de justicia» reproduce bien la función discursiva y el contenido normativo del giro, y «justicia» conserva el peso legal/covenantal.
- source_word: ሥርዐተ እንተ ለዓለም የኃልዉ
  english_pob_choice: the eternal ordinance
  chosen_spanish: la ordenanza eterna
  alternatives_spanish:
  - el orden eterno
  - la ordenanza que permanece para siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ሥርዐት» tiene sentido de orden, regla u ordenanza. «Ordenanza eterna» preserva el tono legal y solemne del conjunto sin suavizarlo.
- source_word: ወይሬስዩ ርእሶሙ
  english_pob_choice: reckon themselves
  chosen_spanish: se consideran
  alternatives_spanish:
  - se tienen por
  - se reputan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa corrigió la lectura anterior de un gesto corporal y la llevó a una reflexión sobre sí mismos. «Se consideran» transmite con naturalidad esa autopercepción sin añadir más de lo que el texto permite.
- source_word: ዘአኮኑ [ኃጥኣነ] ዲበ ምድር
  english_pob_choice: not to be sinners; they shall be trampled upon the earth
  chosen_spanish: no ser pecadores
  alternatives_spanish:
  - no ser pecadores en la tierra
  - no haber sido pecadores en la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasaje es textualmente difícil, y la lectura inglesa revisada conserva la idea de autojuicio o autoevaluación moral. En español, «no ser pecadores» mantiene esa tensión sin resolverla artificialmente.
- source_word: ይትከየዱ
  english_pob_choice: they shall be trampled upon the earth
  chosen_spanish: serán pisoteados
  alternatives_spanish:
  - serán hollados
  - serán trodden underfoot
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Pisoteados» comunica la imagen concreta de juicio y humillación en español actual, preservando el sentido pasivo del castigo.
theological_decisions:
- issue: Denuncia profética y juicio apocalíptico
  english_pob_reading: A judicial-apocalyptic woe against those who distort righteous teaching/order
  chosen_spanish_reading: Una denuncia profética de juicio contra quienes pervierten la enseñanza justa y la ordenanza eterna
  alternative_spanish_readings:
  - Una simple lamentación moral
  - Una advertencia ética sin tono judicial
  rationale: El contexto de las 'ayes' de 1 Enoc exige mantener la dimensión de juicio, no rebajarla a una observación moral general.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery and judgment formulas.'
- issue: Cláusula difícil sobre no ser pecadores
  english_pob_reading: Retain the difficult wording in the main text with minimal smoothing
  chosen_spanish_reading: Conservar la dificultad del texto al decir que se consideran no ser pecadores
  alternative_spanish_readings:
  - Resolverla como 'se presentan como sin pecado'
  - Omitir la tensión y hacerla más fluida
  rationale: La transparencia textual requiere mantener la tensión del original y de la revisión inglesa, sin resolver de modo interpretativo lo que sigue siendo incierto.
  doctrine_reference: Preserve theological tension rather than resolve it; prefer transparent English plus a footnote over false confidence.
translation_notes:
  revision_awareness: 'La revisión más reciente del audit trail corrigió una lectura anterior errónea del giro reflexivo: ya no se entiende como un gesto corporal, sino como una autovaloración moral. La versión española sigue esa corrección y evita la antigua paráfrasis. También conserva la fuerza de juicio del pasaje y la dificultad textual de la cláusula final.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en el sistema general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «justicia» para ርትዕ por su fuerza normativa y jurídica, coherente con el registro del pasaje.
  - Se evitó «siervos» o vocabulario eclesiástico no presente en el texto.
  - La puntuación y el tono buscan ser bíblicos y modernos a la vez, sin sonar arcaizantes.
