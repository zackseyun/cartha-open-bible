  source_alignment_summary: 'El borrador español sigue en gran parte la revisión inglesa adjudicada: imperativo/vocativo dirigido a los justos, oraciones elevadas como memorial, testimonio delante de los ángeles, y acción subsiguiente de ellos delante del Altísimo. Sin embargo, altera indebidamente በቅድመ ልዑል (''delante del Altísimo'') al poner ''delante de Yahvé''. Aquí la fuente usa un título divino, no el Nombre; la política de ''Yahvé'' no autoriza reemplazar títulos explícitos. También conviene alinear la nota alternativa con la lectura inglesa previa: los ángeles ''las lean/reciten/presenten'' delante del Altísimo, no simplemente ''las presenten'' si se quiere conservar la dificultad textual documentada.'
