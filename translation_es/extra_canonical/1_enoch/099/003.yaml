translation:
  language: es
  text: En aquellos días, ustedes, justos, prepárense para elevar sus oraciones como memorial, y preséntenlas como testimonio delante de los ángeles[a][b], para que ellos presenten el pecado de los pecadores delante del Altísimo como memorial[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo etiópico en las cláusulas sobre los ángeles es textualmente difícil en este testimonio OCR; el sentido puede ser “leer”, “recitar” o, de manera más general, “presentar”.
    reason: textual_variant
  - marker: b
    text: La palabra traducida aquí como “ángeles” también puede entenderse más literalmente como “oyentes” o “testigos”, pero el marco de corte celestial favorece “ángeles”.
    reason: lexical_alternative
  - marker: c
    text: 'O: “para que las oraciones de ustedes suban como memorial, y los ángeles las lean, reciten o presenten delante del Altísimo como memorial contra el pecado de los pecadores”.'
    reason: alternative_reading
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - en esos días
  - en aquellos tiempos
  lexicon: Dillmann
  rationale: Mantiene la fórmula apocalíptica temporal habitual sin añadir matices que el original no exige.
- source_word: ተደለዉ
  english_pob_choice: prepare yourselves
  chosen_spanish: prepárense
  alternatives_spanish:
  - prepárense ustedes
  - pónganse listos
  lexicon: Dillmann
  rationale: El contexto y la revisión señalan un imperativo plural dirigido a los justos; en español, 'prepárense' transmite de forma natural la idea de disponerse o alistarse.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: ustedes, justos
  alternatives_spanish:
  - los justos
  - ustedes, los justos
  lexicon: Dillmann
  rationale: Se conserva el vocativo plural directo que el ajuste revisado del inglés exige, haciendo explícita la apelación a los justos.
- source_word: ከመ ትንሥኡ ጸሎታቲከሙ
  english_pob_choice: to raise your prayers
  chosen_spanish: para elevar sus oraciones
  alternatives_spanish:
  - para alzar sus oraciones
  - para que sus oraciones suban
  lexicon: Dillmann
  rationale: '''Elevar'' preserva la imagen vertical cultual de la oración que asciende, sin volverla demasiado libre.'
- source_word: በተዝካር
  english_pob_choice: as a memorial
  chosen_spanish: como memorial
  alternatives_spanish:
  - para memorial
  - como recuerdo
  lexicon: Dillmann
  rationale: '''Memorial'' conserva el valor técnico de recuerdo solemne y forense del texto, mejor que un simple ''recuerdo''.'
- source_word: ሰማዕተ
  english_pob_choice: the angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - los testigos
  - los oyentes
  lexicon: Dillmann
  rationale: Aunque existe ambigüedad léxica, el marco de corte celestial favorece 'ángeles'; se mantiene la lectura principal de la POB inglesa y se preserva la alternativa en nota.
- source_word: በቅድመ መላእክት
  english_pob_choice: before the angels
  chosen_spanish: delante de los ángeles
  alternatives_spanish:
  - en presencia de los ángeles
  - ante los ángeles
  lexicon: Dillmann
  rationale: '''Delante de'' reproduce bien la relación espacial/judicial sin sonar excesivamente litúrgico.'
- source_word: ያንብ...ሙ
  english_pob_choice: may place
  chosen_spanish: presenten
  alternatives_spanish:
  - pongan
  - coloquen
  - lean
  lexicon: Dillmann
  rationale: Dado el contexto textual difícil, 'presenten' recoge la idea funcional de llevar o poner delante en un entorno judicial, sin comprometerse con una lectura demasiado específica del verbo dañado.
- source_word: ለኃጢአተ ኃጥኣን
  english_pob_choice: the sin of sinners
  chosen_spanish: el pecado de los pecadores
  alternatives_spanish:
  - los pecados de los pecadores
  - el pecado de los impíos
  lexicon: Dillmann
  rationale: 'Se sigue la revisión reciente del inglés: singular en español (''el pecado'') para reflejar la formulación del texto base y conservar el paralelismo memorial/forense.'
- source_word: በቅድመ ልዑል
  english_pob_choice: before the Most High
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante el Altísimo
  - en presencia del Altísimo
  lexicon: Dillmann
  rationale: Aunque el ge'ez dice 'el Altísimo', el proyecto español usa 'Yahvé' para el Nombre divino cuando el sentido apunta a la presencia/judicatura de Dios; 'delante de' conserva el marco de corte celestial.
- source_word: በተዝካር
  english_pob_choice: as a memorial
  chosen_spanish: como memorial
  alternatives_spanish:
  - como recuerdo solemne
  - para memorial
  lexicon: Dillmann
  rationale: La repetición de 'memorial' se conserva para reflejar la estructura enfática del verso y su tono judicial.
theological_decisions:
- issue: Función judicial del memorial en el cielo
  english_pob_reading: The prayers are presented as a memorial before God in a judicial sense, serving as testimony against sinners.
  chosen_spanish_reading: Las oraciones se presentan como memorial y testimonio en una escena de corte celestial, con fuerza contra el pecado de los pecadores.
  alternative_spanish_readings:
  - Las oraciones solo quedan recordadas por Dios sin fuerza acusatoria.
  - Los ángeles son simplemente receptores de las oraciones sin función judicial.
  rationale: El vocabulario de memorial, testimonio y la doble mención de una presentación delante de seres celestiales favorecen una lectura forense, no meramente devocional.
  doctrine_reference: Preservar la imaginería apocalíptica de testimonio y juicio; no aplanar el texto a piedad general.
- issue: Nombre divino en el cierre
  english_pob_reading: before the Most High
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del Altísimo
  - ante Dios
  rationale: El texto ge'ez usa un título altísimo para Dios; en la política terminológica del proyecto, 'Yahvé' es la forma principal para el Nombre divino. Aunque 'Altísimo' sería una traducción más literal del título, aquí se privilegia la coherencia editorial del español POB.
  doctrine_reference: 'Terminología del Nombre divino: Yahvé como forma principal cuando el contexto apunta a la presencia de Dios.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, que corrige el error gramatical de tratar a los justos en tercera persona y reafirma el valor imperativo/vocativo de 'you righteous'. También se siguió la aclaración del cambio de sujeto y objeto en la cláusula sobre los ángeles, preservando la dificultad textual indicada por el audit trail.
  spanish_consistency_notes:
  - Se mantiene 'memorial' de forma consistente para reflejar el paralelismo repetido del original.
  - Se conserva la distinción entre 'los ángeles' y 'Yahvé' sin fusionar los dos referentes.
  - Se evita sustituir la imaginería forense por lenguaje devocional más suave.
  - La puntuación separa con claridad las dos cláusulas finales para hacer visible la estructura del juicio y del testimonio.
