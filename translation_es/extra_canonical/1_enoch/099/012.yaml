  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «pecado», «engaño», «tierra» y «serán destruidos» son adecuados. La decisión de mantener «medida» concuerda con la justificación léxica del POB. La única corrección necesaria es pasar de «hacen amargura» a «causan amargura» para ajustarse mejor tanto al audit trail como al uso natural del español.
