translation:
  language: es
  text: ¡Ay de ustedes, los que hacen la medida del pecado y del engaño[a], y causan amargura sobre la tierra[b], porque por ello serán destruidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase detrás de «la medida del pecado» es difícil. El término ge'ez puede significar «medida» o «norma/estándar», de modo que también podría entenderse como «la medida completa del pecado» o «la norma del pecado».
    reason: lexical_alternative
  - marker: b
    text: El verbo subyacente es incierto en esta forma y el testimonio textual revisado apunta a la idea de causar amargura. También podría entenderse como «provocan amargura», «siembran amargura» o, en una lectura más libre, «esparcen el mal sobre la tierra».
    reason: textual_variant
lexical_decisions:
- source_word: እሌ ለክሙ
  english_pob_choice: Woe to you
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay de vosotros!
  - ¡Ay de ustedes, los que...
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula introduce una denuncia profética de juicio. «¡Ay de ustedes!» conserva la fuerza exclamativa y apocalíptica en un español natural y público.
- source_word: ትገብርዋ
  english_pob_choice: practice
  chosen_spanish: hacen
  alternatives_spanish:
  - practican
  - cometen
  - realizan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa hacer o llevar a cabo. Aquí «hacen» permite mantener una construcción directa con el objeto difícil sin imponer una paráfrasis excesiva.
- source_word: ለመስፈርት ኃጢአት
  english_pob_choice: the measure of sin
  chosen_spanish: la medida del pecado
  alternatives_spanish:
  - la medida del pecado y del engaño
  - la medida para el pecado
  - la medida completa del pecado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Medida» conserva la imagen concreta del término ge'ez y evita diluirla en una abstracción. «Del pecado» refleja ኃጢአት con el valor nominal de mal moral.
- source_word: ወትሐሱት
  english_pob_choice: and deceit
  chosen_spanish: y del engaño
  alternatives_spanish:
  - y de la falsedad
  - y de la mentira
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El grupo nominal apunta a falsedad o engaño. «Engaño» es natural en español y mantiene el peso moral y social del término.
- source_word: ተያእምሩ
  english_pob_choice: provoke it
  chosen_spanish: hacen amargura
  alternatives_spanish:
  - provocan amargura
  - siembran amargura
  - excitan eso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A la luz del ajuste crítico del audit trail, la lectura revisada apunta a «causan amargura». «Hacen amargura» conserva cercanía formal al original y al mismo tiempo suena idiomático en español bíblico sobrio.
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - por toda la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre la tierra» mantiene el alcance cósmico y la elevación estilística de la expresión ge'ez.
- source_word: እስመ ቦቱ ይትዌደኡ
  english_pob_choice: for by it they will be destroyed
  chosen_spanish: porque por ello serán destruidos
  alternatives_spanish:
  - porque a causa de ello perecerán
  - pues por ello serán consumidos
  - porque por eso perecerán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula final expresa causalidad o instrumento. «Porque por ello serán destruidos» conserva el tono de juicio y la relación causal con el mal precedente.
theological_decisions:
- issue: Cómo reflejar la expresión difícil sobre la 'medida' sin suavizarla en una moralidad genérica
  english_pob_reading: the measure of sin
  chosen_spanish_reading: la medida del pecado
  alternative_spanish_readings:
  - la medida completa del pecado
  - la norma del pecado
  - la medida para el pecado
  rationale: El texto conserva una imagen concreta y algo oscura. Se mantiene «medida» para no borrar la tensión semántica, siguiendo la filosofía de no paraphrasear más allá de lo que el fuente permite.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Cómo expresar la relación final entre el mal cometido y la destrucción anunciada
  english_pob_reading: for by it they will be destroyed
  chosen_spanish_reading: porque por ello serán destruidos
  alternative_spanish_readings:
  - porque a causa de ello perecerán
  - porque serán juzgados por ello
  - porque por ello perecerán
  rationale: La construcción sugiere una relación causal/instrumental entre el mal y su ruina. «Serán destruidos» conserva el tono judicial sin introducir una explicación doctrinal ajena al verso.
  doctrine_reference: Translation philosophy §3
- issue: Cómo tratar la lectura revisada del segundo hemistiquio tras el ajuste crítico del audit trail
  english_pob_reading: and who cause bitterness upon the earth
  chosen_spanish_reading: y hacen amargura sobre la tierra
  alternative_spanish_readings:
  - y causan amargura sobre la tierra
  - y provocan amargura sobre la tierra
  - y esparcen amargura sobre la tierra
  rationale: El seguimiento crítico del texto recuperado apunta a una idea de causar amargura. Se adopta una redacción conservadora que preserve esa acción sin fijar más de lo que el estado textual garantiza.
  doctrine_reference: Textual criticism and translation philosophy
translation_notes:
  revision_awareness: 'El texto fuente recibido presenta señales de reconstrucción y el audit trail inglés registra una revisión crítica importante: se corrigió una lectura previa que entendía el hemistiquio final como ''provocar'' algo, y la documentación también señala una dificultad en el grupo nominal inicial. Esta versión española sigue la lectura más reciente del contexto auditado, pero conserva la tensión de ''medida'' y la causalidad final sin resolverlas artificialmente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - Se mantiene un registro profético solemne y no litúrgico.
  - Se prefirió «pecado», «engaño» y «amargura» por claridad bíblica en español, sin domesticar el tono apocalíptico.
  - La puntuación reproduce una cadencia de denuncia en una sola frase, adecuada para publicación y lectura en voz alta.
