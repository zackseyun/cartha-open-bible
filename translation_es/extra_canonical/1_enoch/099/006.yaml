translation:
  language: es
  text: 'Y otra vez les juro, pecadores: el pecado[a] ha sido preparado para el día de sangre que no cesa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el castigo / juicio ha sido preparado para el día de derramamiento de sangre». El ge''ez dice «pecado», pero la línea puede usar el término de modo comprimido para su consecuencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወካዕበ
  english_pob_choice: And again
  chosen_spanish: Y otra vez
  alternatives_spanish:
  - Y de nuevo
  - Y además
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula más el adverbio iterativo expresan continuidad del oráculo; «otra vez» conserva el tono repetido sin endurecer el español.
- source_word: እኔ እምሕል ለክሙ
  english_pob_choice: I swear to you
  chosen_spanish: les juro a ustedes
  alternatives_spanish:
  - les declaro bajo juramento
  - les afirmo solemnemente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo comunica una aseveración solemne y no meramente un decir; «les juro» mantiene la fuerza profética/apocalíptica en español natural.
- source_word: ለኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - ustedes pecadores
  - malvados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el vocativo de reproche dirigido a la clase de los impíos. En español, «pecadores» es claro y directo, aunque el original también puede llevar fuerza de apelación.
- source_word: ለዕለተ ደም
  english_pob_choice: for the day of blood
  chosen_spanish: para el día de sangre
  alternatives_spanish:
  - para el día de derramamiento de sangre
  - para el día de sangre derramada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez dice literalmente «día de sangre»; se mantiene la imagen sin expandirla a una paráfrasis interpretativa.
- source_word: ዘአየሀድአ
  english_pob_choice: that does not cease
  chosen_spanish: que no cesa
  alternatives_spanish:
  - que no se detiene
  - sin cesar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma relativa describe algo que no se detiene. «Que no cesa» sigue de cerca el valor del texto fuente y el ajuste revisado del POB inglés.
- source_word: ተደለወት
  english_pob_choice: has been prepared
  chosen_spanish: ha sido preparado
  alternatives_spanish:
  - ha sido dispuesto
  - está preparado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto pasivo indica algo ya dispuesto de antemano. «Ha sido preparado» conserva la pasividad y el sentido judicial de preparación previa.
- source_word: ኃጢአት
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - la culpa
  - el castigo por el pecado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el valor léxico directo del término etiópico, aunque el contexto permite una carga metonímica de consecuencia. En español, «el pecado» preserva esa tensión sin resolverla.
theological_decisions:
- issue: Si ኃጢአት debe entenderse como el acto/estado de pecado o como su consecuencia judicial
  english_pob_reading: Retain 'sin' in the main text
  chosen_spanish_reading: Mantener «el pecado» en el texto principal
  alternative_spanish_readings:
  - «el castigo» ha sido preparado
  - «el juicio por el pecado» ha sido preparado
  rationale: 'Se conserva la tensión del original: el texto dice literalmente «pecado», pero el contexto puede insinuar su consecuencia. No se suaviza la ambigüedad ni se la resuelve en el cuerpo principal.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente sustituyó «unceasing bloodshed» por una formulación más literal: «blood that does not cease». Por eso el español sigue la literalidad con «sangre que no cesa», evitando ampliar la imagen a «derramamiento de sangre» en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma predeterminada en el proyecto cuando corresponda, pero aquí no aparece el nombre divino en el versículo.
  - Se evitó «SEÑOR» como sustituto de nombre divino porque el verso no contiene una cita directa del tetragrama ni del κύριος griego.
  - «Pecado» se mantiene como traducción principal de ኃጢአት para no eliminar la ambigüedad léxica observada en el audit trail.
  - 'La puntuación busca reproducir la cadencia oracular con dos segmentos: juramento directo y declaración apocalíptica.'
