review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del ge''ez y del POB en inglés: mantiene la fórmula de denuncia, la práctica activa del mal, la aprobación pública de la falsedad, la amenaza de perecer y la negación de una ''vida buena''. Sin embargo, hay un desajuste menor pero significativo en la nota [a]: la nota inglesa auditada para este punto ya no trata de ''hacer maldad'', sino de la expresión singular ወበነገረ ሐሰት, explicando alternativas como ''un asunto falso'' o ''discurso falso''. El español ancló [a] en ''hacen el mal'', lo cual no preserva la pista auditada correcta.'
  spanish_quality_summary: El español es claro, natural y de registro digno. No obstante, la construcción 'y que alaban' después de 'los que hacen el mal' suena un poco menos tersa que una coordinación paralela con 'y alaban'. Además, 'la palabra de mentira' es fiel al singular, pero en español bíblico y general suena más idiomático 'la palabra mentirosa' o 'la palabra de falsedad'; de esas, 'la palabra mentirosa' conserva bien la fuerza concreta. La exclamación final con signo de cierre es aceptable, pero una coma antes de la cláusula final mejora el flujo.
  glossary_alignment: No hay conflictos con la terminología doctrinal global del proyecto. El verso no contiene términos de glosario sensibles como Yahvé, Mesías, Espíritu, etc. La decisión 'perecerán' concuerda con la revisión inglesa. La única corrección necesaria es realinear la nota léxica con 'la palabra mentirosa'/'la palabra de falsedad' en vez de con 'hacen el mal'.
  issues:
  - severity: medium
    issue: La nota [a] está anclada y redactada para la frase equivocada.
    rationale: El audit trail inglés conserva una nota léxica sobre ወበነገረ ሐሰት ('the word of falsehood'), no sobre እለ ትገብሩ ርሰናናተ ('who do wickedness'). En español, esto debe corregirse para preservar la justificación documentada.
  - severity: low
    issue: La coordinación 'y que alaban' suena menos natural tras 'los que hacen el mal'.
    rationale: En español resulta más fluido 'los que hacen el mal y alaban y honran...' sin introducir un relativo adicional innecesario.
  - severity: low
    issue: '''La palabra de mentira'' es fiel pero algo rígida en español.'
    rationale: Una formulación como 'la palabra mentirosa' mantiene el singular y mejora la naturalidad sin perder el sentido de falsehood/false speech.
  revised_spanish_text: '¡Ay de ustedes, los que hacen el mal y alaban y honran la palabra mentirosa[a]: perecerán[b], y no tendrán una vida buena!'
  revised_footnotes:
