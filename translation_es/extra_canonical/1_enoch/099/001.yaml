translation:
  language: es
  text: '¡Ay de ustedes, los que hacen el mal y alaban y honran la palabra mentirosa[a]: perecerán[b], y no tendrán una vida buena!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge'ez también puede entenderse más ampliamente como «un asunto falso» o «discurso falso».
    reason: lexical_alternative
  - marker: b
    text: 'O: «serán destruidos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para una fórmula profética de denuncia, «¡Ay de ustedes!» conserva el tono de reprensión y juicio. Mantiene la interpelación directa sin sonar demasiado arcaica.
- source_word: ለክሙ
  english_pob_choice: to you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Después de la exclamación de juicio, el dativo se vuelve natural en español como destinatario de la condena. «De ustedes» funciona fluidamente dentro de «¡Ay de ustedes!».
- source_word: እለ ትገብሩ ርሰናናተ
  english_pob_choice: who do wickedness
  chosen_spanish: los que hacen el mal
  alternatives_spanish:
  - los que practican la maldad
  - los que cometen obras malas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro semítico expresa una práctica activa. «Hacen el mal» conserva la concreción verbal sin añadir una categoría jurídica más específica de la que el ge'ez exige.
- source_word: ወበነገረ ሐሰት
  english_pob_choice: the word of falsehood
  chosen_spanish: la palabra de mentira
  alternatives_spanish:
  - la palabra de falsedad
  - el dicho de mentira
  - el asunto de mentira
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa ya corrigió el plural implícito y apunta a un singular constructo. En español, «la palabra de mentira» preserva esa unidad y suena más natural que una construcción abstracta como «el asunto de mentira».
- source_word: ትሴብሑ ወታከብሩ
  english_pob_choice: praise and honor
  chosen_spanish: alaban y honran
  alternatives_spanish:
  - alaban y estiman
  - glorifican y honran
  - elogian y exaltan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja verbal expresa aprobación pública intensificada. «Alaban y honran» es claro, digno y conserva el paralelismo sin sobrecargar el registro.
- source_word: ተሐጕልክሙ
  english_pob_choice: you will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - se perderán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa prefirió «perish» por su inmediatez. «Perecerán» reproduce bien la fuerza judicial y el matiz de ruina sin introducir una pasiva innecesaria.
- source_word: ወአልብክሙ ሕይወተ ሠናይተ
  english_pob_choice: no good life will be yours
  chosen_spanish: no tendrán una vida buena
  alternatives_spanish:
  - no les pertenecerá una vida buena
  - no tendrán una vida de bien
  - no disfrutarán de vida buena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula niega la posesión de una vida buena. «No tendrán una vida buena» comunica esa ausencia de bienestar vital sin forzar una lectura doctrinal más precisa que el texto no explicita.
theological_decisions:
- issue: Alcance de la amenaza final sobre la 'vida buena'
  english_pob_reading: A denial of blessed well-being/life, likely in the moral-apocalyptic sense rather than merely earthly prosperity
  chosen_spanish_reading: Una negación de vida buena o bienaventuranza, manteniendo abierta la posibilidad de un sentido moral y escatológico
  alternative_spanish_readings:
  - Pérdida de prosperidad en esta vida solamente
  - Pérdida total de la vida física
  rationale: 'El texto no define el alcance exacto de la pérdida. En español conviene conservar la tensión: no reducirlo solo a prosperidad material ni cerrarlo por completo a una consumación escatológica.'
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: el inglés pasó de «be destroyed» a «perish», y la base ge''ez fue corregida de una idea plural de «words of falsehood» a la construcción singular «word of falsehood». La versión española refleja ambas decisiones al usar «perecerán» y «la palabra de mentira».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra máscara para el nombre divino porque este versículo no lo contiene.
  - Se eligió un registro profético solemne pero natural en español contemporáneo.
  - «Palabra de mentira» mantiene el singular constructo y evita inflar el sentido a plural.
  - No se usó «Cristo», «Yahvé» ni terminología doctrinal ajena al versículo.
  - La puntuación separa con dos puntos la denuncia de la sentencia, como en el flujo del original y del audit trail inglés.
