lexical_decisions:
- source_word: እሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de ustedes!
  - ¡Ay de vosotros!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El auditorio etíope usa la interjección de lamento/juicio እሌ, que el audit trail inglés identifica como 'Woe'. En español, '¡Ay!' comunica la misma fuerza profética sin introducir palabras no atestiguadas. Como el contexto del texto previo ya fija la fórmula, la traducción puede conservar la brevedad abrupta del fragmento.
- source_word: ለክሙ
  english_pob_choice: for you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición con pronombre plural de segunda persona se refleja de modo natural en español dentro de una exclamación de juicio. 'De ustedes' mantiene la referencia directa al destinatario plural sin forzar una estructura completa que el fragmento ge'ez no preserva plenamente.
- source_word: እለ
  english_pob_choice: these
  chosen_spanish: '[a]'
  alternatives_spanish:
  - estos
  - estas
  - los cuales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El expediente inglés ya revisó y corrigió la lectura previa: እለ aquí no debe tratarse como demostrativo sino como parte de la fórmula ''Woe to you...''. Dado que el fragmento suministrado no conserva un complemento seguro para esta forma, no se introduce una palabra española adicional que pudiera falsear el testimonio; en su lugar, se marca la continuidad fragmentaria con la nota.'
theological_decisions:
- issue: Tratamiento de un testimonio etíope fragmentario e incompleto
  english_pob_reading: Translate the surviving words only, preserving their abruptness
  chosen_spanish_reading: Traducir solo la interjección y la referencia directa preservando la abrupta concisión del fragmento
  alternative_spanish_readings:
  - Reconstruir la frase completa a partir de la tradición posterior
  - Suavizar el texto como una oración completa
  rationale: La transparencia textual exige no importar una cláusula no atestiguada. El valor teológico y filológico del pasaje depende precisamente de mostrar que el testimonio conservado es mínimo y que la repetición/junción final no puede completarse con seguridad.
  doctrine_reference: Primacía del texto fuente y preservación de la incertidumbre textual
translation_notes:
  revision_awareness: Se atendió la revisión más reciente que corrigió la lectura previa errónea de la secuencia como un demostrativo. El inglés auditado ya había reducido el segmento a 'Woe to you...', y la presente versión sigue esa corrección sin ampliar el fragmento más allá de lo atestiguado.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y toda terminología no pertinente; el texto no contiene el nombre divino.
  - Se usa '¡Ay!' como equivalente profético estándar para la interjección de juicio.
  - No se añade un complemento sintáctico no seguro; la nota explica la fragmentariedad en lugar de rellenarla.
