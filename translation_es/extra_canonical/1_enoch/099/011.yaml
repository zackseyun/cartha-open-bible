- source_word: እለ ትሰፍሕዋ ለእኩይ
  english_pob_choice: who spread out evil
  chosen_spanish: que esparcen el mal
  alternatives_spanish:
  - que extienden el mal
  - que propagan el mal
  - que hacen abundar el mal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene la idea concreta de expandir o esparcir. «Esparcen el mal» conserva esa imagen sin volverla demasiado abstracta.
- source_word: በቢጽክሙ
  english_pob_choice: your neighbors
  chosen_spanish: sus prójimos
  alternatives_spanish:
  - sus vecinos
  - sus semejantes
  - sus compañeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa más reciente entiende aquí la relación como objetivo o dirección del mal, no asociación instrumental. En español, «prójimos» comunica bien el sentido de personas cercanas/afectadas sin introducir una lectura más doméstica que «vecinos».
- source_word: እስመ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce la razón del ay con causalidad directa. «Porque» es claro y fiel al vínculo explicativo del texto.
- source_word: በቢጸል
  english_pob_choice: by your neighbors
  chosen_spanish: por sus prójimos
  alternatives_spanish:
  - por medio de sus prójimos
  - a manos de sus prójimos
  - por sus prójimos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Sigo el sentido revisado de la fuente: el paralelismo reaparece con una inversión retributiva. «Por» mantiene la posibilidad instrumental/mediadora sin obligar a una sola matización en español.'
- source_word: ትትቀተሉ
  english_pob_choice: you will be slain
  chosen_spanish: serán muertos
  alternatives_spanish:
  - serán asesinados
  - serán muertos a espada
  - serán abatidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En una denuncia de juicio, el pasivo conserva el carácter de sentencia. «Serán muertos» es sobrio y sigue el tono solemne del original.
theological_decisions:
- issue: Forma de retribución medida-por-medida
  english_pob_reading: those who spread evil with/against neighbors will be slain by/through neighbors
  chosen_spanish_reading: los que esparcen el mal contra sus prójimos serán muertos por sus prójimos
  alternative_spanish_readings:
  - los que hacen abundar el mal con sus asociados serán muertos por sus asociados
  - los que propagan el mal entre sus vecinos perecerán por medio de sus vecinos
  rationale: 'La lectura debe conservar el paralelismo retributivo visible en el verso: el mismo término reaparece en ambas cláusulas y articula una inversión de juicio. El español mantiene esa reciprocidad sin explicar de más la mecánica de la retribución.'
  doctrine_reference: Preservar fórmulas apocalípticas de juicio y su lógica de medida por medida.
translation_notes:
  revision_awareness: La revisión más reciente corrige una lectura previa que dependía de una confusión textual; el verso fue reanclado en el paralelismo retributivo de la fuente etiopica, y la traducción española evita introducir una referencia ajena al manuscrito base. Se conservó el carácter de amenaza judicial y el juego de repetición del término clave en ambas cláusulas.
  spanish_consistency_notes:
  - Se prefirió un español neutral latinoamericano y de registro bíblico digno.
  - Se evitó «SEÑOR» o equivalentes de ocultación porque aquí no aparece el nombre divino.
  - Se mantuvo el pasivo solemne «serán muertos» para conservar el tono de sentencia.
  - Los términos relacionales se resolvieron con «prójimos» para no forzar una lectura doméstica de «vecinos».
