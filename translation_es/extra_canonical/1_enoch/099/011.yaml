- from: ¡Ay de ustedes, que esparcen el mal contra sus prójimos[a], porque por sus prójimos[b] serán muertos[c].
  to: ¡Ay de ustedes, que esparcen el mal a sus prójimos[a], porque por sus prójimos[b] serán matados[c]!
