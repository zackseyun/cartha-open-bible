    rationale: El English POB fijado traduce «to your neighbors», no «against your neighbors». La traducción española debería dejar abierta la relación sin cargarla con oposición explícita, especialmente dado que las notas inglesas conservan ambigüedad.
  - severity: medium
    issue: «serán muertos» es poco idiomático en español moderno neutral
    rationale: Aunque se entiende, suena forzado. Un equivalente más natural que mantiene el tono judicial/apocalíptico es «serán matados» o una construcción como «morirán a manos de...».
  - severity: low
