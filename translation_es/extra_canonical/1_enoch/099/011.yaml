  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La interjección de denuncia profética/apocalíptica se expresa naturalmente en español con «¡Ay de…!», que conserva el tono oracular de juicio sin suavizarlo.
- source_word: ለክሙ
