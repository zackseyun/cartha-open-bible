translation:
  language: es
  text: ¡Ay de ustedes, que esparcen el mal a sus prójimos[a], porque por sus prójimos[b] serán matados[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra sus vecinos». La frase también puede entenderse con matiz de dirección hostil hacia personas cercanas.
    reason: lexical_alternative
  - marker: b
    text: 'El mismo término relacional reaparece en ambas cláusulas, creando una inversión retributiva: quienes difunden el mal respecto de sus prójimos perecerán por sus prójimos.'
    reason: lexical_alternative
  - marker: c
    text: O «serán muertos». Se prefiere «serán matados» por ser más natural en español actual, mientras conserva el pasivo de sentencia judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: እሌ
  english_pob_choice: Woe to
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay de ti!
