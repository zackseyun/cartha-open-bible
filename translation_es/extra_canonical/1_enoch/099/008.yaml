translation:
  language: es
  text: Y se volverán insensatos por la locura de su corazón, y sus ojos se oscurecerán[a] por el temor de su corazón y por las visiones de sus sueños[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán oscurecidos». La imagen puede describir percepción empañada, visión trastornada por el terror, o una pérdida figurada de claridad.
    reason: lexical_alternative
  - marker: b
    text: La expresión «visiones de sus sueños» conserva tanto el lenguaje de ver como el de soñar del ge'ez, en vez de reducirlo simplemente a «sueños».
    reason: lexical_alternative
lexical_decisions:
- source_word: ይትረሰዑ
  english_pob_choice: will become senseless
  chosen_spanish: se volverán insensatos
  alternatives_spanish:
  - serán insensatos
  - perderán el juicio
  - se volverán locos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico, según la revisión auditada, expresa perder el juicio o volverse insensato más que temor. «Se volverán insensatos» conserva esa fuerza y evita la lectura incorrecta de «terror».
- source_word: እበደ
  english_pob_choice: madness
  chosen_spanish: locura
  alternatives_spanish:
  - insensatez
  - demencia
  - delirio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo apunta a un desorden mental/moral fuerte. «Locura» mantiene el peso del término sin suavizarlo demasiado.
- source_word: ልቦሙ
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  - su ser interior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Corazón» preserva el uso semítico donde el corazón incluye pensamiento, voluntad y afecto; no conviene reducirlo a «mente».
- source_word: ይጼለሉ
  english_pob_choice: will grow dark
  chosen_spanish: se oscurecerán
  alternatives_spanish:
  - se pondrán oscuros
  - se apagarán
  - serán oscurecidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es de oscurecimiento o empañamiento de la visión. «Se oscurecerán» es natural en español y mantiene la metáfora ominosa.
- source_word: አዕይንቲሆሙ
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - su vista
  - su visión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta de los ojos, como en el original y en la tradición auditada del inglés POB.
- source_word: በፍርሃተ ልቦሙ
  english_pob_choice: through the fear of their heart
  chosen_spanish: por el temor de su corazón
  alternatives_spanish:
  - a causa del temor de su corazón
  - por miedo en su corazón
  - debido al temor de su corazón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición puede ser causal o instrumental. «Por» conserva esa amplitud y mantiene el paralelismo con «corazón».
- source_word: በርእየ ሕልሞሙ
  english_pob_choice: through the visions of their dreams
  chosen_spanish: por las visiones de sus sueños
  alternatives_spanish:
  - a causa de las visiones de sus sueños
  - por lo que ven en sus sueños
  - por la visión de sus sueños
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la doble capa de visión/sueño del ge'ez sin reducirla a «sueños» a secas. «Visiones de sus sueños» refleja mejor la textura del original.
theological_decisions:
- issue: Relación entre locura interior y oscurecimiento exterior
  english_pob_reading: The verse depicts inward terror and darkened perception as judgment-linked consequences, without specifying whether the dreams are divinely sent, psychologically generated, or both.
  chosen_spanish_reading: El verso presenta una insensatez interior y un oscurecimiento de la percepción como consecuencias de juicio, sin precisar si las visiones oníricas son enviadas por Dios, psicológicas, o ambas.
  alternative_spanish_readings:
  - Las visiones son castigo divino directo
  - Solo describe culpa y miedo subjetivo
  rationale: El texto ge'ez da los efectos, no el mecanismo. Mantener esa ambigüedad evita resolver una tensión que el pasaje no resuelve explícitamente.
  doctrine_reference: Preservar la tensión teológica cuando el texto no decide el mecanismo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrige ይትረሰዑ como «se volverán insensatos / perderán el juicio» y rechaza la lectura previa de «serán aterrorizados». La redacción española evita esa traducción errónea y conserva el paralelismo con la «locura de su corazón».
  spanish_consistency_notes:
  - Se mantiene «corazón» para ልቦሙ por coherencia con el uso semítico del original.
  - Se usa «por» para las relaciones causales/instrumentales del verso, sin forzar una decisión cerrada.
  - Se conserva el plural «visiones de sus sueños» para no aplanar la doble imagen del ge'ez.
  - No se introduce vocabulario eclesiástico tradicional donde el original no lo exige.
