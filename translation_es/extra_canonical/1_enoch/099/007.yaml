translation:
  language: es
  text: Y los que se postran ante la piedra[a], y los que hacen imágenes de oro, de plata, de madera y de arcilla[c], y los que se postran ante espíritus malignos[b] y demonios, y ante todo ídolo sin entendimiento, no hallarán de ellos ayuda alguna[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase inicial dice literalmente «piedra»; el singular probablemente funciona de manera genérica para objetos de piedra usados en el culto.
    reason: lexical_alternative
  - marker: b
    text: La expresión puede entenderse también de manera más literal como «almas malignas» o «almas perversas»; se prefiere «espíritus» por el contexto de idolatría y demonios.
    reason: lexical_alternative
  - marker: c
    text: La serie conserva la repetición de la preposición «de» para reflejar mejor la acumulación material del ge'ez.
    reason: source_note
  - marker: d
    text: 'O: «no encontrarán de ellos ninguna ayuda».'
    reason: alternative_reading
lexical_decisions:
- source_word: ይሰግዱ
  english_pob_choice: bow down
  chosen_spanish: se postran
  alternatives_spanish:
  - se inclinan
  - adoran
  - se prosternan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se postran» conserva el gesto físico y la carga cultual del verbo sin convertirlo automáticamente en el término técnico «adorar» en todos los casos.
- source_word: ለአብን
  english_pob_choice: to stone
  chosen_spanish: ante la piedra
  alternatives_spanish:
  - ante una piedra
  - ante la roca
  - ante una piedra idolátrica
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez menciona literalmente «piedra». En español, «ante la piedra» reproduce con fuerza la materialidad contrastante del listado posterior de materiales.
- source_word: ይገብሩ
  english_pob_choice: make images
  chosen_spanish: hacen imágenes
  alternatives_spanish:
  - fabrican imágenes
  - hacen
  - forjan imágenes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hacen imágenes» sigue la decisión del texto inglés de mantener el objeto implícito sin añadir «ídolos» prematuramente. En contexto, se entiende como fabricación cultual.
- source_word: ምስለ ዘወርቅ ወዘብሩር ወዘዕፅ ወዘልሕኵት
  english_pob_choice: of gold and silver and wood and clay
  chosen_spanish: de oro, de plata, de madera y de arcilla
  alternatives_spanish:
  - de oro, plata, madera y barro
  - de oro, plata, madera y barro cocido
  - de oro, de plata, de madera y de barro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la serie material y la repetición preposicional, que refleja mejor la acumulación del ge'ez. «Arcilla» expresa de manera clara el último material sin perder el contraste con los metales y la madera.
- source_word: ነፍሳት እኩያት
  english_pob_choice: evil spirits
  chosen_spanish: espíritus malignos
  alternatives_spanish:
  - espíritus malos
  - almas malignas
  - espíritus perversos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de idolatría, «espíritus malignos» conserva la referencia sobrenatural sin imponer la lectura menos probable de «almas». «Malignos» mantiene el tono apocalíptico y evita un lenguaje demasiado coloquial.
- source_word: አጋንንት
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - demonios impuros
  - espíritus inmundos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Demonios» es el equivalente directo y natural en español para seres sobrenaturales maléficos, manteniendo el paralelismo con «espíritus malignos».
- source_word: ጣዖት
  english_pob_choice: idol
  chosen_spanish: ídolo
  alternatives_spanish:
  - imagen
  - ídolo culto
  - ídolo sin vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ídolo» es el término establecido para el objeto de culto idolátrico y funciona bien junto con la calificación moral «sin entendimiento».
- source_word: ኢበተምሃር
  english_pob_choice: without understanding
  chosen_spanish: sin entendimiento
  alternatives_spanish:
  - sin conocimiento
  - sin discernimiento
  - no instruido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sin entendimiento» sigue de cerca el sentido intelectual-moral de la expresión y permite conservar la dureza del juicio sin aclararlo más de lo que el texto permite.
- source_word: ረድኤተ ኢይረክቡ እምኔሆሙ
  english_pob_choice: they will find no help at all from them
  chosen_spanish: no hallarán de ellos ayuda alguna
  alternatives_spanish:
  - no encontrarán de ellos ninguna ayuda
  - no recibirán de ellos ayuda alguna
  - no obtendrán de ellos ayuda
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Hallarán» reproduce el verbo de encontrar y «ayuda alguna» expresa la negación total señalada por la revisión inglesa. La construcción «de ellos» conserva el vínculo irónico con las entidades adoradas.
theological_decisions:
- issue: 'Cómo traducir el primer objeto de la idolatría: ¿piedra, piedra-idolo o ídolo de piedra?'
  english_pob_reading: stone
  chosen_spanish_reading: piedra
  alternative_spanish_readings:
  - piedra idolátrica
  - ídolo de piedra
  - ante una piedra
  rationale: La fuente ge'ez dice literalmente «piedra». Mantener «piedra» preserva la dureza material del contraste con oro, plata, madera y arcilla, sin introducir una explicación interpretativa que el texto no ofrece explícitamente.
  doctrine_reference: Primacía del dato de la lengua original sobre la armonización interpretativa
- issue: 'Cómo entender «espíritus malignos y demonios»: seres sobrenaturales o almas humanas malvadas'
  english_pob_reading: evil spirits and demons
  chosen_spanish_reading: espíritus malignos y demonios
  alternative_spanish_readings:
  - almas malignas y demonios
  - espíritus malos y demonios
  rationale: En el marco inmediato de la idolatría, la lectura sobrenatural es la más coherente. Sin embargo, se conserva «espíritus» en vez de resolverlo como «almas» para no borrar la ambigüedad léxica que el ge'ez permite.
  doctrine_reference: Preservar la tensión semántica documentada sin cerrarla artificialmente
- issue: Cómo reflejar la imposibilidad total de ayuda
  english_pob_reading: they will find no help at all from them
  chosen_spanish_reading: no hallarán de ellos ayuda alguna
  alternative_spanish_readings:
  - no recibirán ayuda de ellos
  - no encontrarán ninguna ayuda en ellos
  rationale: '«Alguna» reproduce bien el alcance total de la negación presente en la revisión inglesa, y «hallarán» sigue el verbo de encontrar. La formulación mantiene el tono de ironía profética: los objetos y seres adorados no pueden socorrer a sus devotos.'
  doctrine_reference: Coherencia lexical con el verbo de la fuente y la negación enfática
translation_notes:
  revision_awareness: 'El texto español incorpora la corrección revisada del pasaje: el ge''ez no exige «an image» singular, sino una enumeración de imágenes hechas de distintos materiales; además, el cierre debe reflejar el verbo «hallar/encontrar» y la negación total de ayuda. Se mantuvo la decisión inglesa de traducir la primera mención como «piedra» sin expandirla a «ídolo», y se preservó la tensión interpretativa sobre «espíritus malignos» frente a «almas malignas».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando la fuente lo requiera; este verso no contiene el nombre divino.
  - «Ídolo» se reserva para ጣዖት, mientras que «imágenes» se emplea para el acto de fabricar objetos cultuales.
  - Se eligió «espíritus malignos» en lugar de «espíritus impuros» para mantener la correspondencia con la nota inglesa y la fuerza apocalíptica del contexto.
  - La puntuación con guiones largos y la acumulación de miembros en la lista busca reflejar el ritmo enumerativo del original.
