translation:
  language: es
  text: En aquellos días las naciones quedarán sumidas en confusión[a], y los clanes[b] de las naciones se levantarán en el día de la matanza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán perturbadas» / «serán sacudidas». El verbo ge'ez ይትሀወኩ evoca desorden impuesto externamente sobre las naciones; «quedarán sumidas en confusión» preserva la fuerza pasiva o resultativa y el carácter de catástrofe social del original.
    reason: lexical_alternative
  - marker: b
    text: O «los linajes» / «las tribus» / «las estirpes de las naciones». El término ge'ez አዝማደ designa grupos de parentesco o pueblos emparentados que constituyen subdivisiones dentro de las naciones.
    reason: lexical_alternative
  - marker: c
    text: O «de la destrucción» o «de la ruina», dependiendo del peso que se otorgue al término ge'ez ሐጕል. «Matanza» sigue la revisión del texto inglés POB (2026-04-23) y refleja más estrechamente el campo semántico de violencia y aniquilación del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En aquellos tiempos
  - En esos días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula temporal apocalíptica estándar. 'En aquellos días' es el equivalente más natural en el registro profético español y preserva el plural de መዋዕል ('días/tiempos'). La alternativa 'En aquellos tiempos' es levemente menos precisa respecto al sentido de 'días' del original.
- source_word: ይትሀወኩ
  english_pob_choice: shall be thrown into confusion
  chosen_spanish: serán sumidas en confusión
  alternatives_spanish:
  - serán perturbadas
  - serán sacudidas
  - quedarán en desconcierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Serán sumidas en confusión'' preserva la fuerza pasiva del verbo ge''ez —algo se impone sobre las naciones desde fuera— y la imagen de un hundimiento colectivo en el caos. Evita el calco poco natural ''serán lanzadas a la confusión'' sin perder el carácter de perturbación apocalíptica. ''Perturbadas'' y ''sacudidas'' aplanan la intensidad; ''desconcierto'' resulta demasiado psicológico.'
- source_word: አሕዛብ
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Las naciones'' es la traducción más natural para un oráculo de juicio apocalíptico con horizonte geopolítico colectivo. ''Los gentiles'' importaría un contraste judeo-cristiano no explícito en el texto ge''ez. El artículo definido refleja la revisión POB del inglés (2026-04-23) que añadió ''the'' ante ambas ocurrencias; en español el artículo es gramaticalmente necesario y la revisión queda incorporada de forma natural.'
- source_word: ወይትነሥኡ
  english_pob_choice: shall rise up
  chosen_spanish: se levantarán
  alternatives_spanish:
  - se alzarán
  - surgirán
  - serán levantados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Se levantarán'' preserva el movimiento ascendente y amenazante sin especificar si se trata de una revuelta, movilización militar o simple emergencia. La ambigüedad es intencionalmente conservada conforme a la política del proyecto. ''Se alzarán'' también es válido y de registro ligeramente más elevado; ''surgirán'' pierde el sentido de movimiento insurgente; ''serán levantados'' vira hacia una voz pasiva no atestiguada por el ge''ez.'
- source_word: አዝማደ አሕዛብ
  english_pob_choice: the clans of the nations
  chosen_spanish: los clanes de las naciones
  alternatives_spanish:
  - los linajes de las naciones
  - las tribus de las naciones
  - las estirpes de las naciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Clanes'' es el equivalente más natural en español contemporáneo para subgrupos de parentesco dentro de naciones más amplias, y posee suficiente dignidad para el registro profético. ''Linajes'' y ''estirpes'' ofrecen un registro levemente más arcaico-bíblico; ''tribus'' podría sugerir un nivel étnico distinto al de simple subgrupación de parentesco.'
- source_word: በዕለት እንተ ሐጕል
  english_pob_choice: on the day of slaughter
  chosen_spanish: en el día de la matanza
  alternatives_spanish:
  - en el día de la destrucción
  - en el día de la ruina
  - en el día del exterminio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Matanza'' sigue la revisión inglesa POB (2026-04-23) que actualizó ''destruction'' a ''slaughter'' para aproximarse más al campo semántico de ሐጕል. ''Destrucción'' y ''ruina'' permanecen como alternativas legítimas dependiendo del peso que se otorgue al término ge''ez; se preservan en la nota al pie [c].'
theological_decisions:
- issue: Alcance de አሕዛብ en un oráculo de juicio apocalíptico
  english_pob_reading: Rendered as 'nations' in a collective geopolitical sense
  chosen_spanish_reading: Traducido como 'las naciones' en sentido geopolítico colectivo
  alternative_spanish_readings:
  - los pueblos
  - los gentiles
  rationale: El versículo describe una convulsión internacional en el día del juicio, no un contraste teológico judío-gentil. 'Las naciones' preserva el horizonte apocalíptico-político sin imponer una taxonomía religiosa posterior. 'Los gentiles' no está justificado por el contexto ge'ez ni por la política del proyecto.
  doctrine_reference: Filosofía de traducción POB §Primacía del texto en lengua original sobre la tradición traductora
- issue: Ambigüedad de la acción de levantarse de los clanes
  english_pob_reading: Left ambiguous as 'shall rise up'
  chosen_spanish_reading: Ambigüedad preservada con 'se levantarán'
  alternative_spanish_readings:
  - se rebelarán
  - serán movilizados para la batalla
  - se reunirán en armas
  rationale: El ge'ez indica movimiento ascendente o insurgente pero no exige una glosa militar específica. 'Se levantarán' mantiene la tensión entre revuelta, movilización y emergencia, conforme a la política del proyecto de no resolver ambigüedades genuinas más allá del testimonio del texto.
  doctrine_reference: Filosofía de traducción POB §Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: 'La revisión inglesa POB del 2026-04-23 (modelo azure-gpt-5.4) introdujo dos cambios sobre el borrador anterior: (1) añadió el artículo definido «the» ante ambas ocurrencias de «nations»; (2) revisó «destruction» a «slaughter» para reflejar con mayor fidelidad el vocablo ge''ez ሐጕል. El borrador español incorpora ambos cambios: «las naciones» incluye el artículo definido de forma gramaticalmente necesaria en español, y «matanza» sigue la lectura revisada de ሐጕል frente a la primera opción «destrucción», que queda documentada como alternativa en la nota [c].'
  spanish_consistency_notes:
  - No aparece ningún nombre divino (YHWH/Yahvé, θεός/Dios, πνεῦμα/Espíritu) en este versículo; no se aplican las convenciones de terminología divina del proyecto POB.
  - No hay terminología cristológica (Mesías, Cristo, Jesús) en el versículo.
  - El versículo pertenece a 1 Enoc, texto extra-canónico tratado con el mismo rigor de base en fuentes primarias que los textos canónicos del proyecto.
  - La fórmula «En aquellos días» es coherente con el uso profético-apocalíptico estándar en traducciones bíblicas modernas en español (cf. Jer 3:16; Dan 10:2 en versiones contemporáneas), lo que garantiza legibilidad eclesial sin recurrir a arcaísmos de la Reina-Valera.
  - «Clanes» se adopta como calco funcional moderno para אֲזמָּד / አዝማደ en contextos de parentesco geopolítico; si el proyecto adopta un equivalente fijo para este término en otros pasajes de 1 Enoc, deberá armonizarse en una revisión terminológica posterior.
