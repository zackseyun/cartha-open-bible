    text: El verbo ge'ez aquí es intransitivo y describe que la descendencia 'se caerá' o se perderá, no que alguien la golpee. La expresión puede aludir a pérdida gestacional.
    reason: textual_variant
  - marker: c
    text: 'También puede entenderse: ''no volverán junto a ellos''.'
    reason: alternative_reading
  - marker: d
    text: '''Seres amados'' conserva el sentido afectivo de ''beloved ones'' sin restringirlo a un uso litúrgico.'
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia de género para que el español sea natural y fiel al referente del pasaje, y se mejora 'sus hijos se les caerán' a 'su descendencia se les caerá' para reflejar mejor el valor de 'offspring' y evitar una formulación demasiado coloquial. El resto del borrador conserva adecuadamente el sentido fuente y el registro apocalíptico.
