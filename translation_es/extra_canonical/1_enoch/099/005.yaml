    text: The opening sequence after 'in those days' is textually difficult in the Ethiopic OCR. The rendering follows the verse's evident pattern of childbirth, violent taking, and abandonment, but some words could be understood differently, such as 'go out' or 'bring out' instead of 'seize.'
    reason: textual_variant
  - marker: b
    text: The repeated references to children, infants, and beloved ones intensify the picture of judgment by portraying the collapse of ordinary family mercy.
    reason: cultural_note
  - marker: c
    text: Or 'they will bring forth and seize their children'.
    reason: previous_rendering
