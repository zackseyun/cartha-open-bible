translation:
  language: es
  text: Y en aquellos días, las que estén encinta saldrán y abandonarán a sus hijos[a]; y su descendencia se les caerá[b]. Y mientras estén amamantando, abandonarán a sus hijos y no volverán a ellos[c], y no tendrán misericordia de sus seres amados[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase ge'ez revisada indica embarazo ('las que estén encinta') y no parto; el verbo de salida se traduce literalmente como 'saldrán'.
    reason: textual_variant
  - marker: b
    text: El verbo ge'ez aquí es intransitivo y describe que la descendencia 'se caerá' o se perderá, no que alguien la golpee. La expresión puede aludir a pérdida gestacional.
    reason: textual_variant
  - marker: c
    text: 'También puede entenderse: ''no volverán junto a ellos''.'
    reason: alternative_reading
  - marker: d
    text: '''Seres amados'' conserva el sentido afectivo de ''beloved ones'' sin restringirlo a un uso litúrgico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal apocalíptica se conserva mejor con una expresión elevada y natural en español; 'en aquellos días' mantiene el tono profético sin sonar forzado.
- source_word: እለ ይጼንሱ
  english_pob_choice: those who are pregnant
  chosen_spanish: los que estén encinta
  alternatives_spanish:
  - las que estén embarazadas
  - las que conciban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del inglés aclara que el sentido es embarazo, no parto. 'Encinta' es sobrio, bíblico y preciso; en español neutral funciona mejor que una paráfrasis más explicativa.
- source_word: ይወፅኡ
  english_pob_choice: go out
  chosen_spanish: saldrán
  alternatives_spanish:
  - salgan
  - irán fuera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez literalmente expresa salir; después de la revisión, no se debe cargar con el sentido de 'seize'. 'Saldrán' respeta el valor verbal directo.
- source_word: ይመሥጡ ደቂቆሙ
  english_pob_choice: cast away their children
  chosen_spanish: abandonarán a sus hijos
  alternatives_spanish:
  - arrojarán a sus hijos
  - descartarán a sus hijos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cadena revisada favorece la idea de abandono/expulsión violenta. En español, 'abandonarán a sus hijos' expresa con claridad la ruptura de la relación sin introducir una imagen no segura como 'arrojar'.
- source_word: ወእምኔሆሙ ይደህፁ ውሉዶሙ
  english_pob_choice: their offspring will slip from them
  chosen_spanish: sus hijos se les caerán
  alternatives_spanish:
  - su descendencia se les escapará
  - sus criaturas se les caerán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión confirma un verbo intransitivo de deslizar/caer, con sentido de aborto o pérdida gestacional. 'Se les caerán' conserva la imagen de pérdida sin precisar más de lo que el ge'ez permite.
- source_word: እንዘ ይጠብዉ
  english_pob_choice: while they are nursing
  chosen_spanish: mientras estén amamantando
  alternatives_spanish:
  - mientras amamanten
  - mientras estén criando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La corrección textual exige 'amamantar/nurse', no 'mirar'. 'Mientras estén amamantando' comunica la escena de lactancia con claridad y dignidad.
- source_word: ኢይገብኡ ኀቤሆሙ
  english_pob_choice: will not return to them
  chosen_spanish: no volverán a ellos
  alternatives_spanish:
  - no regresarán a ellos
  - no volverán junto a ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relación rota se expresa de modo natural con 'volverán a ellos'. Mantiene el matiz de no restablecer el vínculo tras el abandono.
- source_word: ኢይምሕርዎሙ ለፍቁራኒሆሙ
  english_pob_choice: they will have no mercy on their beloved ones
  chosen_spanish: no tendrán misericordia de sus seres amados
  alternatives_spanish:
  - no perdonarán a sus seres amados
  - no mostrarán compasión a los suyos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Misericordia'' conserva el registro bíblico del término y ''seres amados'' refleja el valor afectivo de ''beloved ones'' sin introducir una terminología eclesial más estrecha.'
theological_decisions:
- issue: Relación entre embarazo, aborto/pérdida y abandono en el verso
  english_pob_reading: The verse foregrounds familial violence and abandonment within a judgment setting.
  chosen_spanish_reading: 'El español mantiene la escena de juicio: embarazo, pérdida de los hijos y abandono de los recién nacidos o lactantes, sin suavizar la dureza del pasaje.'
  alternative_spanish_readings:
  - Una lectura más general de crueldad social
  - Una versión que enfatice solo el infanticidio
  rationale: La evidencia revisada muestra una secuencia de embarazo, salida, pérdida de los hijos, lactancia y no retorno. El español debe conservar esa tensión sin reducir el verso a una sola acción violenta.
  doctrine_reference: Preservar el carácter apocalíptico y la dureza del juicio sin homogeneizar la imaginería familiar.
- issue: 'Término afectivo final: ''beloved ones'''
  english_pob_reading: beloved ones
  chosen_spanish_reading: seres amados
  alternative_spanish_readings:
  - amados
  - amados suyos
  - seres queridos
  rationale: '''Seres amados'' comunica el vínculo afectivo de manera amplia y clara; evita la posible lectura exclusivamente devocional de ''amados'' y mantiene el contraste con la falta de misericordia.'
  doctrine_reference: Conservar el colapso de la compasión familiar descrito por el texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió dos errores mayores del borrador inglés: 1) ይጼንሱ significa ''estar encinta/embarazadas'', no ''dar a luz''; 2) ይደህፁ ውሉዶሙ describe que los hijos ''se caerán/se perderán'', no una acción de golpear. También se asumió la corrección de እንዘ ይጠብዉ como ''mientras amamantan''. La redacción española sigue esos ajustes y evita las lecturas rechazadas por la auditoría.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantiene un registro profético sobrio y no se sustituye la imaginería por lenguaje moderno explicativo.
  - '''Encinta'', ''amamantando'' y ''misericordia'' preservan el tono bíblico sin arcaísmo excesivo.'
