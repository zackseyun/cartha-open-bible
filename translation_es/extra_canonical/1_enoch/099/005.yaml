review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien las correcciones principales del expediente inglés: እለ ይጼንሱ como ''los/las que estén encinta/embarazadas'', ይወፅኡ como ''saldrán'', ወእምኔሆሙ ይደህፁ ውሉዶሙ como pérdida/malparto (''su descendencia se les caerá''), y እንዘ ይጠብዉ como ''mientras amamantan''. También preserva el tema del colapso de la misericordia familiar bajo juicio. Sin embargo, hay un problema importante de concordancia natural y precisión referencial: ''los que estén encinta'' es gramaticalmente posible como genérico, pero en este contexto biológico y narrativo el español debe decir ''las que estén encinta'' o ''las embarazadas''. Además, ''sus hijos se les caerán'' puede sonar demasiado coloquial y ambiguo; conviene una formulación más digna y más cercana al matiz de ''offspring''/''descendencia''.'
  spanish_quality_summary: El texto es legible y de registro digno, pero requiere pulido para sonar natural en español eclesial amplio. 'Los que estén encinta' resulta chocante; 'las que estén encinta' corrige eso. 'Se les caerán' es entendible, pero algo brusco/coloquial; 'su descendencia se les caerá' o 'sus criaturas se les caerán' transmite mejor el sentido de pérdida gestacional. 'Seres amados' es aceptable, aunque 'seres queridos' o simplemente 'sus amados' suena más idiomático; no obstante, no es un error grave.
  glossary_alignment: 'No hay conflicto con la terminología doctrinal principal del proyecto. El léxico clave se mantiene dentro de la justificación auditada. La única desviación relevante es estilístico-gramatical: el participio relativo de embarazo debe concordar con referente femenino en español natural. ''Misericordia'' preserva bien el registro. No hay términos como Yahvé/Mesías/esclavo implicados aquí.'
  issues:
  - severity: high
    issue: Concordancia antinatural en 'los que estén encinta'
    rationale: Aunque el ge'ez usa una construcción relativa general, el referente en contexto es claramente femenino. En español neutral y digno, 'los que estén encinta' suena incorrecto o distractor; debe ser 'las que estén encinta' o 'las que estén embarazadas'.
  - severity: medium
    issue: '''Sus hijos se les caerán'' suena coloquial y algo impreciso'
    rationale: La revisión inglesa ya aclaró que se trata de ውሉዶሙ 'offspring/descendencia' que 'slip from them'. En español, 'hijos' puede sonar demasiado posnatal; 'descendencia' o 'criaturas' conserva mejor el matiz de pérdida gestacional sin sobredeterminarlo.
  - severity: low
    issue: La nota [d] defiende 'seres amados', pero la frase puede sonar menos idiomática que alternativas sencillas
    rationale: No es necesariamente errónea, pero 'seres amados' es un poco rígido. 'Seres queridos' sería más natural; aun así, se puede mantener 'seres amados' si se quiere conservar cercanía a 'beloved ones'.
  revised_spanish_text: Y en aquellos días, las que estén encinta saldrán y abandonarán a sus hijos[a]; y su descendencia se les caerá[b]. Y mientras estén amamantando, abandonarán a sus hijos y no volverán a ellos[c], y no tendrán misericordia de sus seres amados[d].
  revised_footnotes:
