  rationale: Se corrige la concordancia de género para que el español sea natural y fiel al referente del pasaje, y se mejora 'sus hijos se les caerán' a 'su descendencia se les caerá' para reflejar mejor el valor de 'offspring' y evitar una formulación demasiado coloquial. El resto del borrador conserva adecuadamente el sentido fuente y el registro apocalíptico.
