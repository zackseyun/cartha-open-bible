translation:
  language: es
  text: Y en aquellos días[a], bienaventurados todos los que aceptan la palabra de sabiduría[b], y la entienden, y la ponen por obra, y siguen el camino del Altísimo, y andan en el camino de su justicia, y no actúan impíamente con los que actúan impíamente[c][d]; porque ellos serán salvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «En aquellos días». La expresión funciona como una introducción temporal solemne.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el mensaje de sabiduría». La expresión ge''ez también puede significar «palabra», «asunto» o «mensaje» de sabiduría.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no se corrompen con los que se corrompen». El verbo ge''ez también puede entenderse como «perderse» o «perecer», pero la revisión crítica favorece «actuar impíamente» por su vínculo técnico con «los impíos».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «no actúan impíamente junto con los que actúan impíamente». La repetición del verbo resalta el contraste deliberado entre los justos y los impíos.'
    reason: alternative_reading
lexical_decisions:
- source_word: ብፁዓን
  english_pob_choice: blessed
  chosen_spanish: bienaventurados
  alternatives_spanish:
  - benditos
  - felices
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto sapiencial y apocalíptico, el término expresa favor y dicha conferidos por Dios, no mera emoción. 'Bienaventurados' conserva ese registro bíblico y solemne en español.
- source_word: ይትሜጠዉ
  english_pob_choice: accept
  chosen_spanish: aceptan
  alternatives_spanish:
  - reciben
  - acogen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo gobierna 'la palabra/materia/mensaje de sabiduría' y expresa recibirla con acogida efectiva. 'Aceptan' comunica esa recepción obediente sin perder naturalidad en español.
- source_word: ነገረ ጥበብ
  english_pob_choice: the word of wisdom
  chosen_spanish: la palabra de sabiduría
  alternatives_spanish:
  - el asunto de sabiduría
  - el mensaje de sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር puede ser 'palabra', 'asunto' o 'mensaje'. 'Palabra de sabiduría' preserva la forma singular elevada que usa la tradición textual y sigue siendo inteligible en español.
- source_word: ያእምርዎን
  english_pob_choice: understand it
  chosen_spanish: la entienden
  alternatives_spanish:
  - la conocen
  - la perciben
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia aceptar-entender-hacer sugiere comprensión práctica, no solo cognición. 'Entienden' refleja bien esa dimensión.
- source_word: ይገብርዎን
  english_pob_choice: do it
  chosen_spanish: la ponen por obra
  alternatives_spanish:
  - la hacen
  - la practican
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo implica ejecución concreta de lo comprendido. 'Poner por obra' es una forma clara y bíblicamente establecida en español para expresar la obediencia práctica sin simplificar el matiz.
- source_word: ፍኖተ ልዑል
  english_pob_choice: the way of the Most High
  chosen_spanish: el camino del Altísimo
  alternatives_spanish:
  - la senda del Altísimo
  - el camino del Excelso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ፍኖት es 'camino' o 'senda'; 'camino' preserva la imagen ética-bíblica. ልዑል es un título divino, por lo que 'Altísimo' mantiene la referencia teológica.
- source_word: የሐውሩ በፍኖተ ጽድቅ ዚአሁ
  english_pob_choice: walk in the way of his righteousness
  chosen_spanish: andan en el camino de su justicia
  alternatives_spanish:
  - andan en la senda de su justicia
  - andan en su camino de justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El idioma de 'andar/caminar en un camino' reproduce la imagen ética del original. 'Justicia' traduce ጽድቅ de manera consistente con el valor legal y moral del término en el proyecto.
- source_word: ኢይረሰዑ ... እለ ይረሰዑ
  english_pob_choice: do not act wickedly with those who act wickedly
  chosen_spanish: no actúan impíamente con los que actúan impíamente
  alternatives_spanish:
  - no se corrompen con los que se corrompen
  - no se pierden con los que se pierden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión crítica señala que ረሰዐ significa 'actuar impíamente' o 'obrar malvadamente', y que en Enoch es un verbo técnico ligado a 'los impíos'. 'Impíamente' conserva esa conexión y evita suavizar el contraste moral.
- source_word: ይድኅኑ
  english_pob_choice: they shall be saved
  chosen_spanish: serán salvados
  alternatives_spanish:
  - serán librados
  - serán rescatados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa rescate o liberación escatológica. 'Serán salvados' mantiene la fuerza de promesa final sin forzar una fórmula doctrinal ajena al texto.
theological_decisions:
- issue: Contraste entre la sabiduría recibida y la compañía con los impíos
  english_pob_reading: The verse contrasts receiving wisdom, walking in righteousness, and final salvation with acting wickedly alongside the wicked.
  chosen_spanish_reading: El verso contrasta aceptar y poner por obra la sabiduría, seguir el camino del Altísimo y andar en justicia, con no imitar la impiedad de los impíos.
  alternative_spanish_readings:
  - El verso contrasta recibir el mensaje de sabiduría con apartarse de los impíos.
  - El verso contrasta practicar la sabiduría con no corromperse junto con los corruptos.
  rationale: 'La redacción española conserva el paralelismo ético-apocalíptico del original y de la lectura inglesa: sabiduría recibida, conducta recta y salvación final, frente a la impiedad compartida con los impíos. Se evita resolver la tensión con una paráfrasis más explicativa.'
  doctrine_reference: Mantener la tensión moral-escatológica del texto; no armonizarla con categorías doctrinales posteriores.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección importante: primero se había entendido ለ como preposición ''en'', pero la revisión mostró que funciona como marcador acusativo; además, el verbo ረሰዐ fue corregido de ''corromperse'' a ''actuar impíamente''. La presente traducción española sigue esas revisiones y evita la lectura anterior. También incorpora la estructura final ''do it'' antes de ''follow the way of the Most High'', acorde con el texto ge''ez.'
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' para ልዑል como título divino.
  - Se traduce ጽድቅ como 'justicia' para conservar consistencia terminológica.
  - Se usa 'impíamente' para ረሰዐ, evitando 'corrupto' salvo en la nota de alternativa textual.
  - '''Serán salvados'' conserva el matiz escatológico sin añadir formulación dogmática posterior.'
