base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/099/010.yaml
  text: And in those days[a], blessed are all those who accept the word of wisdom, and understand it, and do it, and follow the way of the Most High, and walk in the way of his righteousness, and do not act wickedly with those who act wickedly[d][c][b]; for they shall be saved.
  footnotes:
  - marker: a
    text: Or 'receive the message of wisdom.' The Ge'ez expression can mean 'word,' 'matter,' or 'message' of wisdom.
    reason: lexical_alternative
  - marker: b
    text: The repeated verb rendered 'become corrupt' may also be understood as 'perish' or 'go astray,' depending on how the Ge'ez is construed in this line.
    reason: lexical_alternative
  - marker: c
    text: Or 'and do it in the way of the Most High'.
    reason: previous_rendering
  - marker: d
    text: Or 'do not become corrupt with those who become corrupt'.
    reason: previous_rendering
