translation:
  language: es
  text: Y salió un mandamiento de delante de Yahvé[a] contra los que habitan en la tierra seca, para que llegara su fin; porque conocieron todas las cosas ocultas de los ángeles, y toda la violencia de los satanes[b], y todos sus poderes secretos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la presencia de Yahvé». La expresión ge'ez es una fórmula reverencial para algo que procede de delante de Dios.
    reason: lexical_alternative
  - marker: b
    text: «Satanes» reproduce el plural del ge'ez y no el nombre propio singular «Satanás».
    reason: lexical_alternative
  - marker: c
    text: La expresión final es difícil en este testimonio etíope; el sentido puede ser «todos sus poderes secretos» o aludir a poderes ocultos, pero no se añade aquí una referencia a practicantes de artes ocultas porque no está sustentada por el texto proporcionado.
    reason: textual_variant
lexical_decisions:
- source_word: ትእዛዝ
  english_pob_choice: command
  chosen_spanish: mandamiento
  alternatives_spanish:
  - orden
  - decreto
  lexicon: Dillmann Lexicon
  rationale: El término ge'ez expresa una disposición autoritativa. En español, 'mandamiento' conserva mejor el peso de una orden emitida con autoridad, sin forzar un registro jurídico excesivo.
- source_word: ወጽአ እምቅድመ ገጸ እግዚአ
  english_pob_choice: went out from before the Lord
  chosen_spanish: salió de delante del Señor
  alternatives_spanish:
  - salió de la presencia del Señor
  - vino de delante del Señor
  lexicon: Dillmann Lexicon
  rationale: La fórmula semítica se mantiene con 'de delante del Señor', que reproduce bien el valor reverencial y la imagen de procedencia desde la presencia divina.
- source_word: ዲበ እለ የሐድሩ የብስ
  english_pob_choice: against those who dwell on the dry land
  chosen_spanish: contra los que habitan en la tierra seca
  alternatives_spanish:
  - contra los que habitan en la tierra
  - contra los que viven en la tierra seca
  lexicon: Dillmann Lexicon
  rationale: '''Tierra seca'' conserva el sentido literal de የብስ y la imagen contrastiva del juicio en contexto de diluvio; ''habitan'' transmite bien el participio con sentido durativo.'
- source_word: ከመ ውእቱ ይኩን ሕልቀትሙ
  english_pob_choice: that their end should come
  chosen_spanish: para que viniera su fin
  alternatives_spanish:
  - para que llegara su fin
  - para que viniera su destrucción
  lexicon: Dillmann Lexicon
  rationale: '''Fin'' reproduce la amplitud de ሕልቀት, que puede ser fin o destrucción, sin especificar más de lo que exige el texto. La subordinación final expresa el propósito o resultado del mandamiento.'
- source_word: አእመሩ
  english_pob_choice: they knew
  chosen_spanish: conocieron
  alternatives_spanish:
  - supieron
  - llegaron a conocer
  lexicon: Dillmann Lexicon
  rationale: '''Conocieron'' refleja el conocimiento adquirido sin cargarlo de inferencia interpretativa; en español suena natural y mantiene el matiz de posesión de conocimiento.'
- source_word: ኵሎ ኅቡኣተ መላእክት
  english_pob_choice: all the hidden things of the angels
  chosen_spanish: todas las cosas ocultas de los ángeles
  alternatives_spanish:
  - todos los secretos de los ángeles
  - todos los misterios de los ángeles
  lexicon: Dillmann Lexicon
  rationale: '''Cosas ocultas'' es fiel a ኅቡኣት y evita introducir un tecnicismo como ''misterios'' que el texto no requiere.'
- source_word: ግፍዐ ሰይጣናት
  english_pob_choice: the violence of the satans
  chosen_spanish: la violencia de los satanes
  alternatives_spanish:
  - la violencia de los satánes
  - la violencia de los adversarios
  - la violencia de los satanes
  lexicon: Dillmann Lexicon
  rationale: Se conserva el plural del ge'ez, evitando singularizarlo como nombre propio. 'Satanes' funciona en español como plural transliterado y preserva la rareza demonológica del texto.
- source_word: ኃይሎሙ
  english_pob_choice: their secret powers
  chosen_spanish: todos sus poderes secretos
  alternatives_spanish:
  - sus poderes ocultos
  - todas sus fuerzas secretas
  lexicon: Dillmann Lexicon
  rationale: El plural español responde al plural contextual ya ajustado en el audit trail y mantiene el sentido de fuerzas/poderes ocultos.
theological_decisions:
- issue: Plural de ሰይጣናት
  english_pob_reading: satans
  chosen_spanish_reading: satanes
  alternative_spanish_readings:
  - Satanás
  - adversarios
  - demonios
  rationale: El ge'ez usa plural; la traducción conserva esa pluralidad para no armonizar el pasaje con el uso posterior de Satanás como nombre singular. Así se preserva la textura demonológica propia de 1 Enoc.
  doctrine_reference: Preservar el número gramatical y el horizonte semántico del texto fuente.
- issue: Alcance de 'los que habitan en la tierra seca'
  english_pob_reading: a terrestrial humanity under flood judgment
  chosen_spanish_reading: humanidad sometida al juicio del diluvio
  alternative_spanish_readings:
  - habitantes de la tierra en general
  - un grupo específico de pecadores
  rationale: La imagen de la tierra seca encaja con el marco del diluvio y sugiere a la humanidad expuesta al juicio. La traducción conserva la imagen sin volverla una categoría moral abstracta.
  doctrine_reference: Mantener la imaginería apocalíptica y el trasfondo narrativo del juicio.
- issue: Última frase sobre poderes secretos
  english_pob_reading: all their secret powers
  chosen_spanish_reading: todos sus poderes secretos
  alternative_spanish_readings:
  - todo su poder secreto
  - sus poderes ocultos
  rationale: Se sigue la revisión del auditor que elimina una frase final no sustentada por el ge'ez dado, y se mantiene el plural para concordar con el contexto de 'todos'.
  doctrine_reference: Respetar la base textual recibida y evitar expansiones no apoyadas por el testimonio fuente.
translation_notes:
  revision_awareness: 'He seguido la revisión más reciente del audit trail: no añadí la frase sobre practicantes de artes ocultas, que fue descartada por no estar apoyada por el ge''ez provisto. También ajusté el final a plural («poderes secretos») para concordar con el contexto plural y con el cierre del pasaje en el testimonio dado.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' como equivalente de እግዚአ en la fórmula reverencial, tal como el audit trail inglés usa 'the Lord'.
  - Se preserva el plural demonológico 'satanes' para no neutralizar el número gramatical del original.
  - Se evita 'tierra' sin más para no perder la imagen literal de 'tierra seca' en un contexto de juicio por diluvio.
  - '''Mandamiento'' se usa como término elevado y autoritativo, coherente con la procedencia desde delante del Señor.'
