base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/065/006.yaml
  text: And a command went out from before the Lord against those who dwell on the dry land[a], that their end should come; for they knew all the hidden things of the angels, and all the violence of the satans[c][b], and all their secret powers.
  footnotes:
  - marker: a
    text: Or 'from the presence of the Lord.' The Ge'ez expression is a reverential formula for something issuing from before God.
    reason: lexical_alternative
  - marker: b
    text: '''The satans'' renders a plural form, not the later singular proper name ''Satan.'''
    reason: lexical_alternative
  - marker: c
    text: The final words are difficult in this Ethiopic witness. The sense may be 'all their hidden powers' or may refer to practitioners of hidden arts/sorcery.
    reason: textual_variant
