translation:
  language: es
  text: 'Y vino mi abuelo Enoc, se puso junto a mí y me dijo: «¿Por qué has clamado a mí con amargo clamor y llanto?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወመጽአ
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se acercó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de movimiento se traduce de manera natural con «vino» en narrativa directa. Mantiene la sencillez del evento sin añadir matices no exigidos por el Ge'ez.
- source_word: አምኄውየ / መጽአ (según la revisión del texto)
  english_pob_choice: my grandfather Enoch came
  chosen_spanish: mi abuelo Enoc
  alternatives_spanish:
  - mi antepasado Enoc
  - mi abuelo Enoc vino
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se sigue la revisión adjudicada: el pasaje no dice «desde mi morada», sino que identifica a Enoc como «mi abuelo». En español, «abuelo» expresa con claridad la relación de parentesco y evita conservar un error textual ya corregido.'
- source_word: ቆመ ኀቤየ
  english_pob_choice: stood beside me
  chosen_spanish: se puso junto a mí
  alternatives_spanish:
  - estuvo junto a mí
  - se detuvo junto a mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción indica cercanía física inmediata. «Se puso junto a mí» comunica bien la postura y la proximidad en un español fluido y reverente.
- source_word: በምንት
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - para qué razón
  - con qué motivo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la interrogación causal normal en español y conserva el tono directo de la pregunta.
- source_word: ጸራሕከ
  english_pob_choice: have you cried out
  chosen_spanish: has clamado
  alternatives_spanish:
  - has gritado
  - has alzado un clamor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo sugiere un clamor fuerte, no un simple hablar. «Clamar» preserva esa intensidad y funciona bien en español bíblico contemporáneo.
- source_word: ጽራኀ መሪረ
  english_pob_choice: with a bitter cry
  chosen_spanish: con un clamor amargo
  alternatives_spanish:
  - con un grito amargo
  - con un clamor acerbo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la fuerza afectiva del sintagma. «Clamor amargo» es una opción digna y transparente; «amargo» conserva la carga de dolor del original.
- source_word: ብካየ
  english_pob_choice: weeping
  chosen_spanish: con llanto
  alternatives_spanish:
  - llorando
  - con lamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término remite a llanto o lamentación. «Con llanto» armoniza con el paralelismo del verso y evita redundancia excesiva.
theological_decisions:
- issue: Identidad de Enoc y corrección del error OCR en la frase inicial
  english_pob_reading: And Enoch came from my dwelling-place
  chosen_spanish_reading: Mi abuelo Enoc vino y se puso junto a mí
  alternative_spanish_readings:
  - Enoc vino desde mi morada
  - Enoc vino desde mi casa
  rationale: La revisión crítica indicada en el expediente corrige la lectura previa. No se debe conservar una traducción basada en un OCR erróneo que introduce una procedencia inexistente y oscurece la identidad del sujeto. La traducción española sigue la revisión adjudicada y deja fuera la falsa idea de «morada».
  doctrine_reference: Preservar la corrección textual y no armonizar contra la evidencia del manuscrito revisado.
translation_notes:
  revision_awareness: 'Se aplicó la revisión adjudicada que corrige la lectura OCR errónea sobre el supuesto origen «de mi morada». Por ello, no se conserva la nota anterior ni la ambigüedad textual asociada a esa falsa lectura. La redacción española sigue la forma corregida: Enoc como sujeto de la acción, con relación familiar explícita.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - Se mantiene «Enoc» como nombre propio tradicional y reconocible en español.
  - Se eligió un registro bíblico contemporáneo, claro y digno, sin calcos innecesarios.
  - No se añadieron notas al pie porque la revisión elimina la ambigüedad textual previa y el verso queda suficientemente transparente en español.
