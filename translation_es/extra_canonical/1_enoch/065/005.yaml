  rationale: Se corrige «contra mí» a «a mí» para reflejar fielmente la dirección del clamor en la fuente y en el expediente inglés auditado. Se pule además la frase final a «con amargo clamor y llanto» por mejor naturalidad en español sin alterar el sentido.
