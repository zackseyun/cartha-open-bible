translation:
  language: es
  text: 'Y le dije: «Dime, ¿qué es esto que se está haciendo sobre la tierra? Porque la tierra ha padecido así[a] y ha sido sacudida[b][c]; quizá perezca yo con ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha trabajado así» o «ha sufrido dolores así». El verbo ge''ez es difícil; el texto principal opta por un verbo más amplio para el padecimiento de la tierra, sin perder la imagen de conmoción violenta.'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final también puede entenderse más explícitamente como temor: «temo que perezca yo con ella».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Porque la tierra ha padecido de esta manera y ha sido sacudida, no sea que yo perezca con ella».'
    reason: previous_rendering
lexical_decisions:
- source_word: ንግረኒ
  english_pob_choice: Tell me
  chosen_spanish: Dime
  alternatives_spanish:
  - Declárame
  - Explícame
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo con sufijo de primera persona pide una solicitud directa al interlocutor; «Dime» suena natural en español y conserva la inmediatez del ruego.
- source_word: ምንት ውእቱ ዘይትገበር
  english_pob_choice: what is this that is being done
  chosen_spanish: ¿qué es esto que se está haciendo
  alternatives_spanish:
  - ¿qué es esto que ha sucedido
  - ¿qué es este hecho que se hace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma relativa sugiere una acción presente o en curso; «se está haciendo» conserva ese matiz sin forzar un pasado cerrado. «Esto» mantiene la fuerza deíctica.
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - por encima de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sobre la tierra» comunica bien la locución locativa, pero «sobre la tierra» dentro de la pregunta y en registro bíblico puede sonar más natural como «sobre la tierra». Se mantiene la idea de lo que ocurre en la esfera terrenal.
- source_word: እስመ ከመዝ ሰርሐት ምድር
  english_pob_choice: For the earth has labored thus
  chosen_spanish: Porque la tierra ha padecido así
  alternatives_spanish:
  - Porque la tierra ha trabajado así
  - Porque la tierra ha dado a luz así
  - Porque la tierra ha trabajado de este modo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez es difícil y el audit trail inglés preserva la tensión entre «labored» y la posible imagen de angustia/travail. «Ha padecido» conserva el sentido de aflicción o dolor cósmico sin fijar innecesariamente una metáfora obstétrica en el texto principal.
- source_word: ወአንቀልቅለት
  english_pob_choice: and has been shaken
  chosen_spanish: y ha sido sacudida
  alternatives_spanish:
  - y ha temblado
  - y ha sido agitada
  - y ha sido conmovida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma expresa movimiento violento; «ha sido sacudida» es claro, solemne y suficientemente amplio para el estremecimiento cósmico.
- source_word: ዮጊ አነ እትኃጐል ምስሌሃ
  english_pob_choice: perhaps I will perish with it
  chosen_spanish: quizá perezca yo con ella
  alternatives_spanish:
  - quizá perezca con ella
  - tal vez yo perezca con ella
  - quizá perezca yo con ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El particle ዮጊ admite un valor de «perhaps» según la revisión del auditorio inglés; en español «quizá» refleja bien la incertidumbre o aprensión. «Perezca yo» mantiene el matiz solemne y la referencia femenina a la tierra se conserva con «ella».
theological_decisions:
- issue: Dolor cósmico de la tierra
  english_pob_reading: The verse depicts cosmic upheaval affecting the earth itself, not merely human activity on earth.
  chosen_spanish_reading: El verso presenta a la tierra misma en padecimiento y sacudida, no solo actividades humanas sobre la tierra.
  alternative_spanish_readings:
  - El verso se limita a una catástrofe natural
  - La frase solo describe corrupción moral en la tierra
  rationale: La pareja verbal «ha padecido» / «ha sido sacudida» mantiene la personificación y el alcance cósmico del cuadro apocalíptico, sin reducirlo ni a moralización abstracta ni a un simple dato meteorológico o sísmico.
  doctrine_reference: Conservar la imaginería apocalíptica sin diluirla en prosa genérica.
- issue: Valor de ዮጊ
  english_pob_reading: perhaps I will perish with it
  chosen_spanish_reading: quizá perezca yo con ella
  alternative_spanish_readings:
  - para que no perezca yo con ella
  - temo que perezca yo con ella
  rationale: La revisión inglesa reciente corrigió el inglés hacia una lectura de probabilidad/aprehensión; el español sigue esa decisión. Se evita una lectura finalista de «para que no» que no refleja bien el giro sintáctico aquí.
  doctrine_reference: Respetar la ambigüedad modal del original sin imponer una finalidad inexistente.
translation_notes:
  revision_awareness: He tenido en cuenta la revisión más reciente del inglés POB, que cambió «like this» por «thus» y consolidó la lectura de ዮጊ como «perhaps». En español se refleja con «así» y «quizá», manteniendo el tono formal y la ambigüedad modal señalada por el auditor.
  spanish_consistency_notes:
  - Se usa «tierra» para ምድር en concordancia con el registro bíblico y con la imaginería cósmica del pasaje.
  - Se preserva la referencia femenina en «con ella», acorde con la personificación de la tierra.
  - No se emplea «SEÑOR» ni terminología eclesiástica ajena al pasaje.
  - «Padecido» se eligió para respetar la tensión léxica del verbo ge'ez sin imponer una sola metáfora en el texto principal.
