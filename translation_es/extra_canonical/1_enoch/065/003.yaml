base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/065/003.yaml
  text: And I said to him[a], “Tell me, what is this that is being done upon the earth? For the earth has labored thus and has been shaken[c][b]; perhaps I will perish with it.”
  footnotes:
