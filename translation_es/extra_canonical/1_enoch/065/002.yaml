translation:
  language: es
  text: 'Y levantó sus pies de allí y fue hasta los confines de la tierra, y clamó a su abuelo[a] Enoque, y Noé dijo con voz amarga: «Escúchame, escúchame, escúchame», tres veces.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El etiópico se entiende mejor aquí como «su abuelo» (o ancestro), no «su hijo». Se conserva esa relación de parentesco en vez de armonizarla o eliminarla.
    reason: textual_variant
lexical_decisions:
- source_word: አንሥአ
  english_pob_choice: lifted up
  chosen_spanish: levantó
  alternatives_spanish:
  - alzó
  - levantó en alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa un movimiento concreto de elevación o alzamiento. En español, «levantó» comunica el gesto de manera natural y fiel sin añadir interpretaciones.
- source_word: እገሪሁ
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus pies
  - sus pasos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural etiópico se conserva como imagen corporal. «Sus pies» mantiene la concreción del desplazamiento; «sus pasos» sería más idiomático pero menos literal.
- source_word: እምህየ
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La deixis indica salida desde un lugar anterior en la visión. «De allí» es breve, natural y fiel al valor narrativo.
- source_word: ሖረ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - marchó
  - viajó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico de movimiento se vierte con el pasado simple «fue», que en español sostiene bien la secuencia narrativa sin sobrecargar el matiz.
- source_word: አጽናፈ ምድር
  english_pob_choice: the ends of the earth
  chosen_spanish: los confines de la tierra
  alternatives_spanish:
  - los extremos de la tierra
  - los bordes de la tierra
  - los fines de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula cósmica y apocalíptica estable. «Confin­es de la tierra» conserva el tono elevado y el alcance espacial amplio con buena naturalidad en español.
- source_word: ጸርኀ፡ ለአምኄው፡ ሄኖክ
  english_pob_choice: cried out to his grandfather Enoch
  chosen_spanish: clamó a su abuelo Enoque
  alternatives_spanish:
  - gritó a su abuelo Enoque
  - clamó a Enoque, su abuelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo de parentesco se entiende mejor como «abuelo» según la revisión del texto etiópico. «Clamó» conserva la intensidad del llamado, y «Enoque» sigue la forma española del nombre.
- source_word: በቃል መሪር
  english_pob_choice: with a bitter voice
  chosen_spanish: con voz amarga
  alternatives_spanish:
  - con voz amarga
  - en voz amarga
  - con voz doliente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión describe la cualidad emocional de la voz. «Voz amarga» reproduce la dureza afectiva del original sin volverla un giro demasiado idiomático o explicativo.
- source_word: ስምዐኒ
  english_pob_choice: Hear me
  chosen_spanish: Escúchame
  alternatives_spanish:
  - Oye me
  - Atiéndeme
  - Escuchadme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo con sufijo de primera persona pide una forma directa en español. «Escúchame» transmite con claridad la urgencia y la repetición del ruego.
- source_word: ሥልሰ
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - tres veces
  - trés veces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La indicación numérica se expresa de forma moderna y transparente. «Tres veces» es más clara que «tres veces» arcaizante o «thrice» en español.
theological_decisions:
- issue: Identidad de Enoque como pariente de Noé
  english_pob_reading: The Ethiopic witness should be retained as 'his grandfather Enoch' rather than harmonized away.
  chosen_spanish_reading: Se conserva «su abuelo Enoque» en el texto principal.
  alternative_spanish_readings:
  - «su padre Enoque»
  - omitir el parentesco
  - «Enoque» sin especificación
  rationale: La prioridad es el testimonio etiópico recibido. Aunque la genealogía es difícil, no se debe suavizar la tensión mediante una armonización no sustentada por el texto.
  doctrine_reference: Principio de primacía de la fuente original; preservación de tensiones textuales.
- issue: Sintaxis de la cláusula introductoria del discurso
  english_pob_reading: Noah is the explicit subject of 'said' and should not be placed inside the quotation.
  chosen_spanish_reading: '«y Noé dijo con voz amarga: …»'
  alternative_spanish_readings:
  - '«y dijo Noé con voz amarga: …»'
  - '«y dijo: “Noé, con voz amarga: …”»'
  rationale: La revisión del audit trail aclara que Noé es sujeto explícito del verbo. El español puede expresar esa sintaxis con claridad sin forzar el texto ni convertir a Noé en vocativo.
  doctrine_reference: Respeto por la sintaxis de la fuente y por la transparencia del proceso de traducción.
translation_notes:
  revision_awareness: 'Se incorporó la corrección mayor del audit trail: el parentesco no es «hijo», sino «abuelo». También se ajustó la sintaxis para que Noé quede como sujeto del verbo «dijo», y se eliminó cualquier duplicación o desorden de la línea inglesa revisada. La nota [a] queda anclada explícitamente en el texto español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - «Enoque» y «Noé» siguen las formas españolas consolidadas de los nombres propios bíblicos.
  - Se mantiene el tono solemne sin arcaísmos innecesarios.
  - La nota al pie [a] está anclada en «los confines de la tierra» para evitar marcadores huérfanos.
