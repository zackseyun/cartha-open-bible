translation:
  language: es
  text: Y después de aquel tiempo hubo una gran conmoción[a] sobre la tierra, y se oyó una voz desde el cielo, y caí sobre mi rostro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término etiópico también puede entenderse como «tumulto», «confusión» o «estremecimiento». «Conmoción» procura conservar la fuerza apocalíptica del pasaje sin limitarlo a un terremoto.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final es textualmente difícil en el OCR: la forma verbal parece plural («cayeron»), pero el sufijo de «mi rostro» apunta al sentido «caí sobre mi rostro». La traducción sigue la lectura que mejor encaja con el contexto narrativo en primera persona.'
    reason: textual_variant
lexical_decisions:
- source_word: በድኅሬ ውእቱ ጊዜ
  english_pob_choice: after that time
  chosen_spanish: después de aquel tiempo
  alternatives_spanish:
  - después de ese tiempo
  - luego de aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la secuencia temporal y el matiz demostrativo de ‘aquel’ sin volverlo rígido.
- source_word: ሀውክ ዐቢይ
  english_pob_choice: a great upheaval
  chosen_spanish: un gran [a]sobre
  alternatives_spanish:
  - un gran tumulto
  - un gran estremecimiento
  - una gran confusión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Hauwk’ abarca disturbio, tumulto o desorden. En español, ‘sobre’ no es una solución aceptable por sí sola; la auditoría inglesa favorece un sustantivo de fuerte carga apocalíptica. Sin embargo, para una publicación final se requiere una forma léxicamente completa; aquí se preserva el punto de tensión con una marca que deberá resolverse editorialmente antes de cierre.
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - sobre el mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Tierra’ refleja mejor el alcance cósmico-apocalíptico que ‘país’ o ‘tierra’ en sentido local.
- source_word: ተሰምዐ ቃል እምሰማይ
  english_pob_choice: a voice was heard from heaven
  chosen_spanish: se oyó una voz desde el cielo
  alternatives_spanish:
  - se escuchó una voz desde el cielo
  - se oyó un sonido desde el cielo
  - se oyó una palabra desde el cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Voz’ es la mejor opción en un contexto revelatorio; evita imponer ‘palabra’ o ‘sonido’ donde el texto permite ambas cosas pero la escena sugiere habla celestial.
- source_word: ወወደቁ በገጽየ
  english_pob_choice: and I fell on my face
  chosen_spanish: y caí sobre mi rostro
  alternatives_spanish:
  - y caí sobre mi cara
  - y me postré
  - y caí postrado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma del verbo en el OCR es problemática, pero el sufijo posesivo de primera persona en ‘mi rostro’ favorece una lectura en primera persona. ‘Sobre mi rostro’ conserva el idioma bíblico sin oscurecer la prostración.
theological_decisions:
- issue: Naturaleza del evento descrito por ሀውክ ዐቢይ
  english_pob_reading: cosmic/apocalyptic upheaval rather than a narrowly psychological or merely political turmoil
  chosen_spanish_reading: un gran disturbio/apocalipsis sobre la tierra, sin reducirlo a un fenómeno psicológico o meramente político
  alternative_spanish_readings:
  - un gran tumulto
  - una gran confusión
  - un gran estremecimiento
  rationale: La escena pertenece a un marco visionario apocalíptico; conviene mantener su amplitud cósmica y no rebajarla a prosa general.
  doctrine_reference: Conservar la imaginería apocalíptica y su ambigüedad fenomenológica.
translation_notes:
  revision_awareness: El español debe revisarse antes de publicación porque la solución provisional para ሀውክ ዐቢይ necesita una forma completa y natural en español. La auditoría inglesa apoya un término apocalíptico fuerte, pero no permite dejar un fragmento incompleto.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general, pero este versículo no contiene el nombre divino.
  - ‘Tierra’ se usa en sentido cosmológico/apocalíptico.
  - ‘Voz’ se prefiere a ‘palabra’ por el contexto de revelación celestial.
  - La primera persona en ‘caí sobre mi rostro’ sigue la lectura contextual más coherente.
