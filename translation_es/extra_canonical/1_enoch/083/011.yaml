translation:
  language: es
  text: Y cuando salí abajo[a] y vi el cielo, y el sol que salía por el oriente, y la luna que se ponía en el occidente, y unas pocas estrellas, y toda la tierra, y todo tal como él lo había conocido al principio, entonces bendije al Señor del juicio y lo exalté, porque había sacado el sol por las ventanas del oriente, y este subió y se levantó sobre la faz del cielo[b][c], y salió y siguió el camino que él le había mostrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Abajo» conserva el valor espacial del término ge’ez; también podría traducirse como «debajo» o «más abajo», según el marco narrativo más amplio.
    reason: lexical_alternative
  - marker: b
    text: El objeto en el ge’ez es simplemente «lo»/«a él»; el verso mismo no vuelve a identificar explícitamente la figura.
    reason: alternative_reading
  - marker: c
    text: 'O: «Y cuando salí abajo, lo vi».'
    reason: previous_rendering
lexical_decisions:
- source_word: ሶበ
  english_pob_choice: when
  chosen_spanish: y cuando
  alternatives_spanish:
  - cuando
  - al tiempo que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula temporal introduce la secuencia narrativa; en español conviene mantener el enlace coordinante y temporal con «y cuando» para reflejar la continuidad del relato sin forzar una subordinación más pesada.
- source_word: ወፃእኩ
  english_pob_choice: I went out
  chosen_spanish: salí
  alternatives_spanish:
  - me fui
  - salí afuera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa movimiento hacia fuera; «salí» es la forma más natural y fiel en español, y evita redundancia innecesaria.
- source_word: ታሕተ
  english_pob_choice: below
  chosen_spanish: de abajo
  alternatives_spanish:
  - abajo
  - bajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La indicación espacial se entiende mejor en español como origen o localización inferior; «de abajo» conserva la imagen sin decidir más de lo que el etíope permite.
- source_word: ወርኢክዎ
  english_pob_choice: I saw him
  chosen_spanish: vi el cielo
  alternatives_spanish:
  - lo vi
  - vi a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Siguiendo la corrección auditada, el sufijo objeto anticipa al antecedente del siguiente sintagma («el cielo»), no introduce un nuevo objeto personal. En español se integra como «vi el cielo» para resolver la referencia según el contexto restaurado.
- source_word: ለሰማይ
  english_pob_choice: the heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el firmamento
  - los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cielo» comunica de modo claro y natural el referente cósmico del pasaje; «firmamento» sería más técnico, pero no necesario para la fluidez de esta sección.
- source_word: ለፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo corresponde al astro visible; «sol» es la equivalencia directa y plenamente idiomática en español.
- source_word: ለወርቅ
  english_pob_choice: the moon setting in the west
  chosen_spanish: la luna que se ponía en el occidente
  alternatives_spanish:
  - la luna que se ocultaba al oeste
  - la luna que descendía en el oeste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen astronómica del ocaso lunar se mantiene con un giro natural en español; «occidente» preserva el paralelismo direccional con el oriente.
- source_word: ለቡንቱ ኮከብ
  english_pob_choice: a few stars
  chosen_spanish: unas pocas estrellas
  alternatives_spanish:
  - unas cuantas estrellas
  - pocas estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cantidad es imprecisa y reducida; «unas pocas» conserva esa vaguedad cuantitativa sin exagerar.
- source_word: ወተርእዮ
  english_pob_choice: everything as He had known it in the beginning
  chosen_spanish: todo tal como él lo había conocido al principio
  alternatives_spanish:
  - todo como él lo había sabido desde el principio
  - todo según lo había conocido al comienzo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido de conocimiento previo se expresa con «había conocido»; la cláusula comparativa «tal como» conserva la relación de conformidad que el pasaje exige.
- source_word: አመስገንኩ
  english_pob_choice: then I blessed
  chosen_spanish: entonces bendije
  alternatives_spanish:
  - entonces alabé
  - entonces glorifiqué
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo en contexto doxológico admite «bendecir»; en español «bendije» conserva la acción reverente sin confundirla con una mera alabanza verbal.
- source_word: ለጌታ ዘፍርድ
  english_pob_choice: the Lord of judgment
  chosen_spanish: al Señor del juicio
  alternatives_spanish:
  - al Señor del juzgamiento
  - al Señor que juzga
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la construcción titular con «del juicio», que refleja la relación nominal del original y evita diluir el título en una frase relativa más interpretativa.
- source_word: አክበርኩ
  english_pob_choice: and extolled Him
  chosen_spanish: y lo alabé
  alternatives_spanish:
  - y lo ensalcé
  - y lo exaltemos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo pide una expresión de exaltación reverente; «alabé» funciona bien en español litúrgico amplio y mantiene el paralelo con «bendije».
- source_word: ወለተውጣአ ፀሐይ
  english_pob_choice: because He had brought forth the sun
  chosen_spanish: porque había sacado el sol
  alternatives_spanish:
  - porque había hecho salir el sol
  - porque había traído al sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Había sacado» reproduce la idea de hacer salir o sacar hacia fuera sin añadir causalidad extra; el sujeto divino queda explícito por el contexto.
- source_word: ምዕራፍ ወርቅ
  english_pob_choice: from the windows of the east
  chosen_spanish: por las ventanas del oriente
  alternatives_spanish:
  - desde las ventanas del oriente
  - a través de las ventanas del oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen poética de las «ventanas» y la dirección oriental con un español transparente.
- source_word: ወዐረገ ወወጣ
  english_pob_choice: and it ascended and rose
  chosen_spanish: y este subió y apareció
  alternatives_spanish:
  - y subió y salió
  - y ascendió y se levantó
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: 'La duplicación verbal expresa elevación y manifestación. En español, «subió y apareció» preserva ambos movimientos: ascenso y aparición visible.'
- source_word: በፊት ሰማይ
  english_pob_choice: on the face of the heaven
  chosen_spanish: en la faz del cielo
  alternatives_spanish:
  - sobre la faz del cielo
  - ante la faz del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Faz» conserva el matiz bíblico y solemne del rostro/superficie celeste; es una elección marcada pero todavía inteligible en español religioso.
- source_word: ወወጣ ወተከተለ
  english_pob_choice: and set out and followed
  chosen_spanish: y salió y siguió
  alternatives_spanish:
  - y partió y siguió
  - y se puso en camino y siguió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la secuencia de movimiento y obediencia. «Salió y siguió» traduce con sobriedad el doble verbo sin sobreexplicar.
- source_word: መንገድ
  english_pob_choice: the path
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la ruta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Camino» es la equivalencia más natural en español para el itinerario prescrito o mostrado.
theological_decisions:
- issue: Identidad del referente masculino en el objeto pronominal y en las frases subsiguientes
  english_pob_reading: The English audit notes that the verse does not restate the figure's identity; the restored context continues with the heaven/sun rather than a new personal referent.
  chosen_spanish_reading: Se evita fijar un nuevo referente personal; la traducción integra el contexto restaurado y deja que el pronombre y los sujetos se lean según la secuencia narrativa del pasaje.
  alternative_spanish_readings:
  - «lo vi» con pronombre ambiguo
  - «vi a él» con lectura personal
  rationale: La corrección auditada muestra que el texto etiópico está truncado y que el objeto anticipa al sintagma siguiente. Por eso no se resuelve artificialmente una identidad personal donde el contexto restaurado no la exige.
  doctrine_reference: Preservar la tensión textual y la primacía del original, sin introducir una identificación teológica no avalada por el pasaje.
- issue: Tratamiento del título divino
  english_pob_reading: Lord of judgment
  chosen_spanish_reading: Se traduce como «Señor del juicio», conservando el título nominal.
  alternative_spanish_readings:
  - «Señor que juzga»
  - «Señor del juzgamiento»
  rationale: La forma nominal preserva la densidad del título y evita convertirlo prematuramente en una paráfrasis explicativa.
  doctrine_reference: Respeto por la estructura titular del original y por la carga judicial del pasaje.
- issue: Imagen cosmológica de las ventanas del oriente
  english_pob_reading: He had brought forth the sun from the windows of the east
  chosen_spanish_reading: Se mantiene la metáfora «ventanas del oriente».
  alternative_spanish_readings:
  - «aberturas del oriente»
  - «ventanas del este»
  rationale: La metáfora es fuerte y tradicional en literatura apocalíptica; conviene conservarla para no diluir la imaginería del texto.
  doctrine_reference: Fidelidad a la imaginería apocalíptica y a la textura poética del testimonio.
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección auditada que señala que el texto ge’ez suministrado estaba truncado y que la lectura inicial «I saw him» era errónea. Por ello, la versión española incorpora la continuación restaurada del verso (cielo, sol, luna, estrellas, tierra, bendición y recorrido del sol) y evita fijar un objeto personal indebido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero en este versículo no aparece el tetragrámaton; el título presente es «Señor del juicio» y se traduce de manera literal.
  - Se usa «cielo» para ሰማይ por fluidez; «firmamento» queda como alternativa contextual si el aparato editorial posterior lo prefiere.
  - Se conserva la imaginería apocalíptica sin modernizarla excesivamente, en línea con el registro digno del proyecto.
  - Se traduce «alabé» junto con «bendije» para reflejar la doble respuesta doxológica del versículo sin fusionar ambos verbos.
