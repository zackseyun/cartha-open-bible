  to: Y cuando salí abajo[a] y vi el cielo, y el sol que salía por el oriente, y la luna que se ponía en el occidente, y unas pocas estrellas, y toda la tierra, y todo tal como él lo había conocido al principio, entonces bendije al Señor del juicio y lo exalté, porque había sacado el sol por las ventanas del oriente, y este subió y se levantó sobre la faz del cielo[b][c], y salió y siguió el camino que él le había mostrado.
