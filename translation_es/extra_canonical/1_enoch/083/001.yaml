translation:
  language: es
  text: Y ahora[a], hijo mío, Matusalén, te mostraré todas mis visiones que he visto ante ti; las relataré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La frase combina dos verbos de divulgación: primero «mostrar» y luego «relatar». Se conservan ambos para reflejar que las visiones son tanto presentadas como narradas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y en este momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca discursiva de transición que introduce un nuevo acto de habla. «Y ahora» suena natural en español y conserva el cambio de escena sin volverla pesada.
- source_word: አርእየከ፡
  english_pob_choice: I will show you
  chosen_spanish: te mostraré
  alternatives_spanish:
  - te he mostrado
  - déjame mostrarte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo causativo con objeto de segunda persona singular introduce una exposición futura en el discurso. «Te mostraré» refleja bien la intención de revelar lo visto.
- source_word: ወልድየ፡
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - oh hijo mío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un vocativo filial directo. «Hijo mío» conserva la cercanía afectiva y el tono instructivo del original.
- source_word: ማቱሳላ፡
  english_pob_choice: Methuselah
  chosen_spanish: Matusalén
  alternatives_spanish:
  - Methuselah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la transliteración bíblica usual en español para el nombre propio, priorizando legibilidad e identificabilidad.
- source_word: ኵሎ፡ ራእያትየ፡
  english_pob_choice: all my visions
  chosen_spanish: todas mis visiones
  alternatives_spanish:
  - todas mis revelaciones
  - todas las visiones mías
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Visiones» conserva el registro apocalíptico del sustantivo original y evita ampliar indebidamente a «revelaciones».
- source_word: እለ፡ ርኢኩ፡
  english_pob_choice: that I have seen
  chosen_spanish: que he visto
  alternatives_spanish:
  - que vi
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El relativo califica las visiones con una experiencia ya cumplida. El pretérito perfecto de español resulta natural para un relato que presenta experiencias previas todavía vigentes en la narración.
- source_word: በቅድሜከ፡
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es espacial/presencial. «Delante de ti» mantiene esa fuerza sin sonar rígido; también conserva la relación de exposición ante el oyente.
- source_word: እነግር።
  english_pob_choice: I will recount them
  chosen_spanish: las relataré
  alternatives_spanish:
  - las contaré
  - las declararé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de dicción tiene valor narrativo. «Relatar» refleja mejor una exposición ordenada de visiones que el más general «contar».
theological_decisions:
- issue: 'Doble verbo de divulgación: mostrar y narrar'
  english_pob_reading: 'Retain both verbs distinctly: ''I will show you ... I will recount them.'''
  chosen_spanish_reading: 'Conservar ambos verbos de manera distinta: «te mostraré ... las relataré».'
  alternative_spanish_readings:
  - «te diré ...»
  - fusionar en un solo verbo de comunicación
  rationale: 'El ge''ez usa dos verbos de revelación: uno de mostrar y otro de narrar. Mantener ambos preserva la textura visionaria del pasaje, donde lo visto primero se expone y luego se cuenta.'
  doctrine_reference: Translation philosophy §Consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del expediente inglés: la frase equivalente a «before you» se integró con el verbo de ver, no con el de relatar. Por eso la versión española dice «que he visto delante de ti» y luego separa claramente el segundo acto de habla con «las relataré».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este verso no aplica.
  - Se eligió «Matusalén» por uso estándar español y coherencia onomástica.
  - Se mantuvo el paralelismo verbal del original para no borrar la diferencia entre ver y narrar.
  - El tono es elevado pero no arcaizante, buscando legibilidad e ինտeligibilidad eclesial.
