translation:
  language: es
  text: 'Y Malyal[a], mi abuelo, me levantó mientras yo yacía junto a él, y me dijo: «¿Por qué clamas así, hijo mío, y por qué lamentas[b] así?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre 'Malyal' probablemente refleja al patriarca Mahalalel en forma etiópica; algunos traductores normalizan el nombre.
    reason: lexical_alternative
  - marker: b
    text: 'El texto distingue dos acciones relacionadas: primero un clamor fuerte, luego lamentación o duelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: መላእያል
  english_pob_choice: Malyal
  chosen_spanish: Malyal
  alternatives_spanish:
  - Mahalalel
  - Mahalal'el
  lexicon: Tradición de nombres propios en etiópico/ge'ez de 1 Enoc
  rationale: Se conserva la forma etiópica del nombre en el texto principal, siguiendo la primacía de la fuente inmediata; la normalización a Mahalalel queda como alternativa identificable.
- source_word: እምሔውየ
  english_pob_choice: my grandfather
  chosen_spanish: mi abuelo
  alternatives_spanish:
  - mi abuelo paterno
  - mi antepasado
  lexicon: Gé'ez, uso de parentesco
  rationale: La revisión del inglés auditado muestra que no es un complemento de lugar, sino un sustantivo de parentesco con sufijo posesivo. En español, 'mi abuelo' transmite el vínculo generacional de manera natural y fiel.
- source_word: አንሥአኒ
  english_pob_choice: lifted me up
  chosen_spanish: me levantó
  alternatives_spanish:
  - me alzó
  - me levantó en alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa levantar o alzar; 'me levantó' es claro y mantiene la acción física sin añadir matices no exigidos por el contexto.
- source_word: እንዘ እነ እስክብ
  english_pob_choice: while I was lying
  chosen_spanish: mientras yo yacía
  alternatives_spanish:
  - mientras estaba acostado
  - mientras yacía
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción indica un estado simultáneo de estar tendido. 'Yacía' conserva el tono solemne y evita introducir la idea de sueño, que no aparece explícitamente en el texto.
- source_word: ኀቤሁ
  english_pob_choice: beside him
  chosen_spanish: junto a él
  alternatives_spanish:
  - al lado de él
  - cerca de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición señala proximidad espacial; 'junto a él' suena natural en español y mantiene la relación física.
- source_word: ትጸርኅ
  english_pob_choice: you cry out
  chosen_spanish: clamas
  alternatives_spanish:
  - gritas
  - clamas en voz alta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo implica un clamor o grito fuerte. 'Clamas' conserva intensidad y un registro bíblico digno sin volverlo excesivamente arcaico.
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - hijo mío amado
  - hijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La apelación afectiva y jerárquica se expresa bien con 'hijo mío', forma natural y solemne en español.
- source_word: ትአወዩ
  english_pob_choice: you lament
  chosen_spanish: lamentas
  alternatives_spanish:
  - lloras
  - te lamentas
  - dueles
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: 'Se mantiene la distinción con el verbo anterior: no es repetición, sino una segunda expresión de duelo o lamento.'
theological_decisions:
- issue: Tratamiento del nombre propio etiópico መላእያል
  english_pob_reading: Retain the Ethiopic name-form 'Malyal' in the main text
  chosen_spanish_reading: Conservar 'Malyal' sin armonizarlo en el texto principal
