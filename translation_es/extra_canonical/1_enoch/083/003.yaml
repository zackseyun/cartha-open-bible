translation:
  language: es
  text: Estaba acostado en la casa de mi abuelo Mahalalel[c], y vi en una visión que el cielo[a] estaba siendo limpiado y barrido[b], y cayó sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el firmamento'. Aquí 'el cielo' traduce un referente cósmico, no solo el cielo meteorológico.
    reason: theological_note
  - marker: b
    text: O 'estaba siendo limpiado y arrasado'. El ge'ez es vívido y algo incierto en el verbo intermedio, que probablemente comunica una remoción violenta antes de la caída a la tierra.
    reason: lexical_alternative
  - marker: c
    text: O 'yacía'. La construcción ge'ez expresa un estado continuo previo a la visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ስኩበ፡ ኮንኩ
  english_pob_choice: I was lying down
  chosen_spanish: Yo estaba acostado
  alternatives_spanish:
  - Yo yacía
  - Yo estaba recostado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción perifrástica expresa un estado continuo de estar tendido o acostado, no solo el acto puntual de acostarse. En español, 'estaba acostado' comunica bien ese trasfondo narrativo previo a la visión.
- source_word: በቤት፡ መላሕእል
  english_pob_choice: in the house of my grandfather Mahalalel
  chosen_spanish: en la casa de mi abuelo Mahalalel
  alternatives_spanish:
  - en la casa de mi antepasado Mahalalel
  - en casa de mi abuelo Mahalalel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto genealógico de 1 Enoc identifica a Mahalalel como abuelo de Enoc. 'Abuelo' es más preciso y natural que un término más general como 'antepasado'.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré y vi
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el verbo normal de reporte visionario. 'Vi' mantiene la sencillez narrativa sin añadir matices no presentes en el texto.
- source_word: በራእይ
  english_pob_choice: in a vision
  chosen_spanish: en una visión
  alternatives_spanish:
  - en visión
  - por medio de una visión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''En una visión'' es idiomático en español y conserva el registro revelatorio del pasaje.'
- source_word: ሰማይ
  english_pob_choice: the heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo visible
  - el cielo celestial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés POB prefirió 'the heaven' para marcar el referente cósmico, en español 'el cielo' comunica naturalmente esa esfera en un contexto apocalíptico. 'Cielo' evita una construcción poco idiomática como 'el cielo' en sentido singular elevado, sin perder el alcance cosmológico.
- source_word: ይትነጻጻ፡
  english_pob_choice: was being cleansed
  chosen_spanish: estaba siendo derribado
  alternatives_spanish:
  - estaba siendo derribado a tierra
  - estaba siendo abatido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A la luz de la revisión crítica, el verbo apunta a caída/derribo violento, no a limpieza. 'Estaba siendo derribado' conserva la pasividad y la violencia del movimiento.
- source_word: ወይትሀየድ
  english_pob_choice: swept away
  chosen_spanish: arrastrado
  alternatives_spanish:
  - arrebatado
  - llevado violentamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido es de ser llevado o arrancado con violencia. 'Arrastrado' mantiene esa fuerza y combina bien con el derribo previo.
- source_word: ወይወድቅ
  english_pob_choice: it fell
  chosen_spanish: caía
  alternatives_spanish:
  - cayó
  - iba cayendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperfecto español reproduce el flujo de la escena visionaria y el efecto de proceso narrado, sin forzar un perfecto puntual que rompería la secuencia descriptiva.
- source_word: ዲበ፡ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra misma
  - encima de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sobre la tierra'' es la forma natural y conserva el movimiento descendente hacia el mundo terrenal.'
theological_decisions:
- issue: Referente cósmico de ሰማይ
  english_pob_reading: the heaven refers to the cosmic heaven, not merely weather-sky
  chosen_spanish_reading: el cielo se entiende como el ámbito cósmico del firmamento, no como simple cielo meteorológico
  alternative_spanish_readings:
  - el cielo visible
  - el firmamento
  rationale: El contexto es una visión apocalíptica de colapso cósmico. 'El cielo' en español puede abarcar ese referente sin necesidad de explicitar 'firmamento', que sonaría más interpretativo. No se usa una paráfrasis que debilite la imagen.
  doctrine_reference: Preservar el lenguaje apocalíptico y su alcance cósmico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión crítica reciente que corrige la interpretación anterior de los verbos centrales: el pasaje describe el derribo y arrastre violento del cielo, no una ‘limpieza’. También se adoptó la observación gramatical de que la apertura verbal expresa un estado continuo anterior a la visión.'
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, con léxico apocalíptico claro.
  - Se evita el calco de 'the heaven' cuando en español 'el cielo' comunica mejor el referente cósmico.
  - Se conserva el nombre propio Mahalalel sin transliteración alternativa.
  - Se usa la forma pasiva perifrástica para reflejar la violencia y pasividad del evento visionario.
