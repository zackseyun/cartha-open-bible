translation:
  language: es
  text: Y cuando cayó sobre la tierra, vi que la tierra era tragada por un gran abismo[a], y montes eran suspendidos sobre montes[b], y collados se hundían sobre collados, y los árboles altos fueron cortados de sus troncos[c] y fueron arrojados y se hundieron en el abismo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «un gran profundo» o «una gran sima». El término ge''ez designa una profundidad inmensa; «abismo» conserva mejor la fuerza apocalíptica.'
    reason: lexical_alternative
  - marker: b
    text: La imagen de «montes sobre montes» se conserva a propósito, como visión extraña, en vez de suavizarla a una descripción más ordinaria.
    reason: cultural_note
  - marker: c
    text: También puede entenderse más generalmente como que fueron cercenados o separados de su base o tocón.
    reason: lexical_alternative
  - marker: d
    text: 'O: «se hundieron en la profundidad». La repetición de «abismo» en el texto principal preserva mejor la coherencia imagística del verso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወድቅ
  english_pob_choice: it fell
  chosen_spanish: cayó
  alternatives_spanish:
  - estaba cayendo
  - descendió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto narrativo en esta secuencia visionaria se vierte mejor con un pasado simple natural en español. «Cayó» conserva la inmediatez del acontecimiento sin añadir matices no presentes en el texto.
- source_word: ትትወሐጥ
  english_pob_choice: being swallowed
  chosen_spanish: era tragada
  alternatives_spanish:
  - era engullida
  - era absorbida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo/reflexivo comunica que la tierra está siendo devorada por el abismo. «Era tragada» mantiene la imagen apocalíptica con claridad en español.
- source_word: ቀላይ ዐቢይ
  english_pob_choice: a great abyss
  chosen_spanish: un gran abismo
  alternatives_spanish:
  - un gran profundo
  - un gran chasm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Abismo» preserva el peso cósmico y de juicio del término ge'ez mejor que una paráfrasis más común como «hondura» o «profundidad».
- source_word: አድባር ዲበ አድባር ይስቀሉ
  english_pob_choice: mountains were suspended upon mountains
  chosen_spanish: montes eran suspendidos sobre montes
  alternatives_spanish:
  - montes eran colgados sobre montes
  - montes eran puestos sobre montes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen extraña debe conservarse. «Suspendidos» refleja mejor la idea de estar colgados o mantenidos en el aire que una simple acumulación.
- source_word: አውግር ዲበ አውግር ይሰጠሙ
  english_pob_choice: hills sank down upon hills
  chosen_spanish: collados se hundían sobre collados
  alternatives_spanish:
  - collados se sumergían sobre collados
  - collados se desplomaban sobre collados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se hundían» reproduce el sentido de bajar, ceder o sumergirse, manteniendo la imagen catastrófica sin suavizarla.
- source_word: ዕፀወ ነዋኃት
  english_pob_choice: tall trees
  chosen_spanish: los árboles altos
  alternatives_spanish:
  - los árboles altos y grandes
  - los árboles lozanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo indica altura o lozanía; «altos» es la opción más directa y comprensible en español.
- source_word: ይትገዘሙ እምጕንዶቲሆሙ
  english_pob_choice: were cut off from their trunks
  chosen_spanish: fueron cortados de sus troncos
  alternatives_spanish:
  - fueron seccionados de sus troncos
  - fueron cortados de sus bases
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual y lexical favorece «cortados» frente a «arrancados». El ge'ez apunta a corte/separación violenta del tronco o base, no necesariamente a arrancamiento de raíz.
- source_word: ይትገደፉ
  english_pob_choice: were thrown down
  chosen_spanish: fueron arrojados abajo
  alternatives_spanish:
  - fueron lanzados abajo
  - fueron echados abajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Arrojados abajo» conserva el movimiento descendente y la fuerza pasiva de la caída expulsiva. Es fiel y natural en español.
- source_word: ይሰጠሙ ውስተ ቀላይ
  english_pob_choice: sank into the abyss
  chosen_spanish: se hundieron en el abismo
  alternatives_spanish:
  - se sumergieron en el abismo
  - descendieron al abismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición de «abismo» mantiene la coherencia léxica del verso. «Se hundieron» conserva el movimiento hacia abajo y el hundimiento final.
theological_decisions:
- issue: Conservación de la imaginería cósmica apocalíptica
  english_pob_reading: Render the scene as literal visionary imagery of creation collapsing, without reducing it to a mere metaphor for political upheaval in the main text.
  chosen_spanish_reading: Presentar la escena como imaginería visionaria concreta de la creación desmoronándose, sin reducirla a metáfora histórica o política.
  alternative_spanish_readings:
  - tratar montes y árboles sólo como símbolos
  - generalizar la escena como terremoto o inundación
  rationale: El texto pertenece a una visión apocalíptica y usa imágenes materiales deliberadamente extrañas. Conviene preservar esa fuerza visionaria en lugar de domesticarla para una lectura más abstracta.
  doctrine_reference: Preservar la tensión teológica del lenguaje apocalíptico; no aplanar la visión.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión aplicada que corrigió el valor de ገዘመ (gazama): no se traduce como «arrancados» sino como «cortados». La redacción final sigue el estado de alta concordancia y el último pase sin cambios, manteniendo la decisión revisada.'
  spanish_consistency_notes:
  - Se mantuvo «abismo» de forma consistente para ቀላይ ዐቢይ en lugar de alternar con «profundo» o «chasm», por coherencia léxica y apocalíptica.
  - Se conservó la construcción visionaria extraña «montes eran suspendidos sobre montes» sin normalizarla.
  - Se usó «fueron cortados de sus troncos» para respetar la corrección textual sobre ገዘመ y evitar la idea de arrancamiento de raíz.
