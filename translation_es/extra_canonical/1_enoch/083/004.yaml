  language: en
  yaml_path: translation/extra_canonical/1_enoch/083/004.yaml
  text: And when it fell upon the earth[a], I saw the earth being swallowed into a great abyss, and mountains were suspended upon mountains, and hills sank down upon hills[d][c][b], and tall trees were cut off from their trunks and were thrown down and sank into the abyss.
  footnotes:
  - marker: a
    text: Or 'a great deep' or 'a great chasm.' The Ge'ez term denotes a vast depth; 'abyss' best preserves the apocalyptic force.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'mountains were suspended upon mountains' is intentionally retained as a strange visionary image rather than smoothed into a more ordinary description.
    reason: cultural_note
  - marker: c
    text: The wording about the trees may also be understood more generally as being severed from their base or stock.
    reason: lexical_alternative
  - marker: d
    text: Or 'were torn up from their trunks'.
    reason: previous_rendering
