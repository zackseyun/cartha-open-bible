base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/083/007.yaml
  text: 'And I told him all the vision that I had seen[a], and he said to me, “Severe is the sight you have seen, my son, and mighty is the vision of your dream: it reveals all the hidden sin of the earth[f][e][d][c][b], and it is about to sink into the abyss and be destroyed with a great destruction.”'
  footnotes:
  - marker: a
    text: The clause 'it has hidden all the sin of the earth' is difficult. The Ethiopic appears to use a verb meaning 'hide' or 'conceal'; some interpreters understand the line more broadly as the dream exposing or encompassing the earth's sin and its judgment.
    reason: lexical_alternative
  - marker: b
    text: '''Abyss'' renders a term that can also denote the deep or sea; the apocalyptic context favors the more cosmic sense.'
    reason: lexical_alternative
  - marker: c
    text: The final expression is textually and lexically difficult; the sense is that of being enclosed or covered over in overwhelming darkness or gloom.
    reason: textual_variant
  - marker: d
    text: Or 'it has hidden all the sin of the earth'.
    reason: previous_rendering
  - marker: e
    text: Or 'and it will sink while it is in the abyss'.
    reason: previous_rendering
  - marker: f
    text: Or 'and it will be wrapped in great darkness'.
    reason: previous_rendering
