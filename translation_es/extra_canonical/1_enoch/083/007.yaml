translation:
  language: es
  text: 'Y le conté toda la visión que había visto, y me dijo: «Severa es la visión que has visto[a], hijo mío, y poderosa es la visión de tu sueño: revela todo el pecado oculto de la tierra, y está a punto de hundirse en el abismo[b] y ser destruida con una gran destrucción[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «la visión que has visto» reproduce el énfasis del ge'ez en la repetición de la raíz de ver; también puede entenderse como «lo que has visto».
    reason: lexical_alternative
  - marker: b
    text: «Abismo» traduce un término que también puede significar la profundidad o el mar; en contexto apocalíptico, aquí se prefiere el sentido cósmico.
    reason: lexical_alternative
  - marker: c
    text: La duplicación «destruida con una gran destrucción» refleja el giro cognado del ge'ez y su énfasis intensivo; también puede expresarse como «perecer con gran ruina».
    reason: lexical_alternative
lexical_decisions:
- source_word: ነገርክዎ
  english_pob_choice: I told him
  chosen_spanish: le conté
  alternatives_spanish:
  - le dije
  - se lo narré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo introduce el relato de Enoc a su interlocutor; «le conté» conserva el carácter de comunicación de un informe sin sonar pesado en español.
- source_word: ራእየ
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - visión profética
  - aparición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto apocalíptico, el término designa una experiencia visionaria; «visión» es la equivalencia más directa y clara.
- source_word: ጽኑዐ
  english_pob_choice: severe
  chosen_spanish: severa
  alternatives_spanish:
  - terrible
  - dura
  - grave
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo expresa dureza o severidad ante una visión de juicio. «Severa» conserva la fuerza ominosa sin exagerar más de lo que permite el texto.
- source_word: ርኢከ
  english_pob_choice: the sight you have seen
  chosen_spanish: la visión que has visto
  alternatives_spanish:
  - lo que has visto
  - tu visión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez repite la raíz de ver para dar énfasis. En español, «la visión que has visto» reproduce esa concreción visionaria sin sonar artificial.
- source_word: ኃያለ
  english_pob_choice: mighty
  chosen_spanish: poderosa
  alternatives_spanish:
  - fuerte
  - mía
  - poderosa y fuerte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aplicado al sueño/visión, el término expresa fuerza o impacto abrumador; «poderosa» comunica bien ese peso en español.
- source_word: ኅቡኣተ
  english_pob_choice: it reveals / the hidden
  chosen_spanish: los secretos
  alternatives_spanish:
  - las cosas ocultas
  - lo oculto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail corrige la lectura verbal y entiende ኅቡኣተ como sustantivo plural de «cosas ocultas/secretos». En español, «los secretos» es la forma más natural y fiel para este valor nominal.
- source_word: ኃጢአተ ምድር
  english_pob_choice: the hidden sin of the earth
  chosen_spanish: toda la iniquidad de la tierra
  alternatives_spanish:
  - todo el pecado de la tierra
  - la iniquidad de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular colectivo puede expresarse como corrupción o iniquidad global. «Iniquidad» mantiene el registro moral/judicial y evita reducir el alcance del pasaje a actos aislados.
- source_word: ትሰጠም
  english_pob_choice: it is about to sink
  chosen_spanish: está a punto de hundirse
  alternatives_spanish:
  - se hunde
  - va a hundirse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción sugiere inminencia. «Está a punto de hundirse» preserva ese matiz mejor que un futuro simple.
- source_word: ቀላይት
  english_pob_choice: the abyss
  chosen_spanish: el abismo
  alternatives_spanish:
  - la profundidad
  - el mar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este marco apocalíptico, «abismo» conserva la resonancia cósmica y de juicio que el inglés POB también privilegia.
- source_word: ተሐጕል ኅጕለ ዐቢየ
  english_pob_choice: be destroyed with a great destruction
  chosen_spanish: ser destruida con una gran destrucción
  alternatives_spanish:
  - perecer con gran ruina
  - ser arrasada con gran destrucción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro cognado del ge'ez expresa destrucción real e intensa; la redundancia de «gran destrucción» reproduce el énfasis semítico sin suavizarlo.
theological_decisions:
- issue: Referente de «ella» en la cláusula final
  english_pob_reading: The pronouns are rendered impersonally and left somewhat open, referring to the ominous dream-vision and its disclosed judgment on earthly sin.
  chosen_spanish_reading: «Ella» se deja deliberadamente abierta y puede referirse a la visión/sueño, no se identifica de manera dogmática.
  alternative_spanish_readings:
  - se refiere a la tierra
  - se refiere a la iniquidad/pecado
  - se refiere al sueño mismo
  rationale: El ge'ez es comprimido y admite más de una referencia. Mantener la ambigüedad evita resolver artificialmente una tensión textual.
  doctrine_reference: Preservar la tensión del texto donde el referente no es explícito.
- issue: Valor de ኅቡኣተ como «secretos» frente a una lectura verbal
  english_pob_reading: 'Revised to a nominal sense: concerning the secrets of all the sin of the earth / it reveals all the hidden sin of the earth.'
  chosen_spanish_reading: Se traduce nominalmente como «los secretos», siguiendo la revisión más reciente del audit trail.
  alternative_spanish_readings:
  - lo oculto
  - las cosas ocultas
  rationale: La revisión identifica correctamente una forma nominal plural; la traducción española debe reflejar ese ajuste y no conservar una lectura verbal incorrecta.
  doctrine_reference: Fidelidad textual y morfológica al ge'ez.
translation_notes:
  revision_awareness: 'El audit trail revisó una lectura previa errónea de ኅቡኣተ: ya no se entiende como verbo («it reveals/it has hidden») sino como sustantivo plural («secrets»). También corrigió la cláusula final para reflejar destrucción, no oscuridad. La versión española sigue esas correcciones y evita resolver indebidamente los referentes pronominales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton cuando aparezca en pasajes relacionados, aunque este versículo no lo contiene.
  - Se usa «abismo» por coherencia con el registro apocalíptico del proyecto.
  - Se evita «pecado» en singular simple donde el contexto colectivo/judicial favorece «iniquidad» o «secretos de la iniquidad».
  - Se conserva un tono digno y bíblico, pero con español contemporáneo natural.
