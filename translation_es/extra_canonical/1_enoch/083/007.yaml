    text: La duplicación «destruida con una gran destrucción» refleja el giro cognado del ge'ez y su énfasis intensivo; también puede expresarse como «perecer con gran ruina».
    reason: lexical_alternative
  revision_rationale: 'Se corrige el error gramatical «todo el vision» a «toda la visión» y se ajusta la cláusula central para alinearla con la revisión inglesa auditada final: «revela todo el pecado oculto de la tierra». Esto preserva mejor la decisión lexical y teológica más reciente, evita volver a una lectura intermedia de «secretos», y mantiene un español natural y fiel. También se reubica la nota [a] al lugar donde la repetición de «ver» realmente aparece en el texto.'
