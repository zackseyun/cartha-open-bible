review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran parte la revisión inglesa más reciente: preserva la inminencia de «está a punto de hundirse», mantiene «abismo» y refleja la destrucción intensiva final. Sin embargo, introduce dos problemas de fidelidad: «todo el vision» debe ser «toda la visión», y «revela los secretos de toda la iniquidad de la tierra» no reproduce bien la formulación inglesa auditada «reveals all the hidden sin of the earth» ni la decisión teológica de dejar el objeto como «el pecado oculto de la tierra», no como «los secretos de la iniquidad».'
  spanish_quality_summary: El texto es generalmente legible y digno, pero contiene un error gramatical claro («todo el vision») y una formulación menos natural y más interpretativa en «los secretos de toda la iniquidad de la tierra». También conviene suavizar la puntuación para que el español fluya mejor sin perder la compresión apocalíptica.
  glossary_alignment: 'No hay conflictos mayores con la terminología base del proyecto. «Abismo» está bien. «Visión» está bien. El problema principal es léxico-semántico en ኅቡኣተ + ኃጢአተ ምድር: el español debería alinearse con la revisión POB final hacia «revela todo el pecado oculto de la tierra» o equivalente, no hacia «los secretos de toda la iniquidad».'
  issues:
  - severity: high
    issue: Error gramatical en «todo el vision»
    rationale: «Visión» es femenino; la frase correcta es «toda la visión». Tal como está, el borrador no es publicable.
  - severity: high
    issue: «revela los secretos de toda la iniquidad de la tierra» se aparta de la revisión auditada final
    rationale: El audit trail terminó en «it reveals all the hidden sin of the earth», no en «the secrets of all the sin». La versión española vuelve parcialmente a una etapa intermedia y cambia además el foco desde «pecado oculto» a «secretos ... de la iniquidad», lo que altera el sentido.
  - severity: medium
    issue: «iniquidad» aquí sobreinterpreta el singular colectivo
    rationale: Aunque «iniquidad» es posible, en este lugar «pecado» refleja mejor el inglés POB final y la relación con «oculto». «Todo el pecado oculto de la tierra» conserva mejor la estructura y evita una abstracción adicional.
  - severity: low
    issue: La nota [a] no corresponde al punto exacto de dificultad del texto español
    rationale: La nota habla de «la visión que has visto», pero el ancla está puesta tras «había visto». Es mejor anclarla directamente en la frase repetitiva dentro de la cita, donde ocurre el énfasis relevante.
