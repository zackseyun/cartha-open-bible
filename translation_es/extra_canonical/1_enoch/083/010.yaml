translation:
  language: es
  text: Y después de esto me levanté y oré, e hice súplicas y pedí, y escribí mi oración para las generaciones del mundo[a]; y te mostré todo[b], mi hijo Matusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «para todas las generaciones futuras» o «para las generaciones de la eternidad»; la frase ge''ez puede abarcar generaciones perdurables más allá de la era presente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y mostré todo para ti» o «y mostré todo a ti». El orden puede expresarse de otra manera en español sin cambiar el sentido básico.'
    reason: previous_rendering
lexical_decisions:
- source_word: እምኔሁ
  english_pob_choice: after this
  chosen_spanish: Y después de esto
  alternatives_spanish:
  - Entonces
  - Luego de esto
  - Tras esto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión marca transición narrativa temporal. «Después de esto» conserva el valor secuencial de manera natural en español y mantiene el tono elevado del pasaje.
- source_word: ተንሣእኩ
  english_pob_choice: I arose
  chosen_spanish: me levanté
  alternatives_spanish:
  - me puse en pie
  - me alcé
  - me incorporé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «me levanté» comunica el gesto corporal de manera clara y digna. «Arose» en inglés tiene un registro elevado, pero en español «me levanté» evita arcaísmo innecesario sin perder la acción.
- source_word: ጸለይኩ
  english_pob_choice: I prayed
  chosen_spanish: oré
  alternatives_spanish:
  - oré a Dios
  - hice oración
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal simple transmite fielmente la acción de orar y mantiene el paralelo acumulativo del verso.
- source_word: አስተብቋዕኩ
  english_pob_choice: entreated
  chosen_spanish: hice súplicas
  alternatives_spanish:
  - suplicué
  - rogué
  - imploré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo intensifica la oración hacia ruego insistente. «Hice súplicas» refleja esa fuerza sin imponer un giro demasiado coloquial o excesivamente arcaico.
- source_word: ሰአልኩ
  english_pob_choice: asked
  chosen_spanish: pedí
  alternatives_spanish:
  - solicité
  - pregunté
  - suplicé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se conserva la diferencia respecto del verbo anterior: después de orar y suplicar, el hablante «pidió». «Pedí» es transparente y mantiene la secuencia acumulativa.'
- source_word: ጸሐፍኩ
  english_pob_choice: I wrote down
  chosen_spanish: escribí
  alternatives_spanish:
  - anoté
  - registré
  - escribí por escrito
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido es el de poner por escrito la oración. «Escribí» es suficiente en español; el matiz de fijación escrita queda implícito por el objeto «mi oración».
- source_word: ጸሎትየ
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi súplica
  - mi plegaria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oración» es el equivalente más natural y consistente para el sustantivo de oración, y evita introducir un matiz devocional distinto como «plegaria».
- source_word: ለትውልደ ዓለም
  english_pob_choice: for the generations of the world
  chosen_spanish: para las generaciones del mundo
  alternatives_spanish:
  - para las generaciones futuras
  - para las generaciones de la era
  - para las generaciones de la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la estructura cercana al Ge'ez para no resolver prematuramente la ambigüedad de ዓለም. «Del mundo» conserva la literalidad audit-able, mientras las alternativas más interpretativas quedan reservadas para nota.
- source_word: ኵሎ
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - todas las cosas
  - el conjunto de ello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Todo» es el equivalente más natural al alcance comprehensivo del término y suena mejor en español junto a «te mostré».
- source_word: አርእየከ / አርአየከ
  english_pob_choice: I showed ... to you
  chosen_spanish: te mostré
  alternatives_spanish:
  - te revelé
  - te hice ver
  - te mostraré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A partir del audit trail, se adopta el pasado simple en español como forma natural del relato. «Mostré» preserva el valor causativo de «hacer ver» sin cargar el verbo con un matiz interpretativo mayor que el del original.
- source_word: ወልድየ ማቱሳላ
  english_pob_choice: my son Methuselah
  chosen_spanish: hijo mío Matusalén
  alternatives_spanish:
  - mi hijo Matusalén
  - Matusalén, hijo mío
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la relación filial y el nombre propio en forma castellana usual. El orden «hijo mío Matusalén» refleja la aposición del original sin introducir una coma que el español no necesita obligatoriamente.
theological_decisions:
- issue: Alcance de «las generaciones del mundo»
  english_pob_reading: for the generations of the world
  chosen_spanish_reading: para las generaciones del mundo
  alternative_spanish_readings:
  - para todas las generaciones futuras
  - para las generaciones de la eternidad
  - para las generaciones de la era
  rationale: La frase del Ge'ez parece apuntar a una proyección más allá del momento presente, pero la amplitud exacta de ዓለም es ambigua (mundo/edad/eternidad). La redacción principal conserva esa tensión en vez de resolverla interpretativamente.
  doctrine_reference: Preservar la ambigüedad lexical cuando el testigo fuente no obliga a una sola lectura.
- issue: Valor del verbo final de comunicación a Matusalén
  english_pob_reading: and I showed everything to you
  chosen_spanish_reading: y te mostré todo
  alternative_spanish_readings:
  - y te revelé todo
  - y te haré ver todo
  rationale: El aparato de revisión indica que el texto ge'ez debe leerse en pasado, no en futuro. La traducción española sigue ese dato crítico y evita proyectar una promesa futura no sostenida por la forma final aceptada.
  doctrine_reference: Priorizar el estado textual más probable y la secuencia narrativa del pasaje.
translation_notes:
  revision_awareness: 'El contexto de revisión señala una corrección importante en el verbo final: el testigo ge''ez presentado por OCR fue discutido como posible error, pero el pasaje fue finalmente estabilizado en lectura pasada («te mostré»), no futura. La versión española sigue esa lectura revisada y mantiene la secuencia narrativa completa: levantarse, orar, suplicar, pedir, escribir la oración y comunicar todo a Matusalén.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no ocurre.
  - Se conserva un registro bíblico sobrio, pero sin arcaísmos fuertes.
  - «Oré / hice súplicas / pedí» mantiene la acumulación de verbos distinta del original.
  - El nombre propio se presenta como «Matusalén», forma castellana asentada y fácilmente reconocible.
