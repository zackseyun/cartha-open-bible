translation:
  language: es
  text: Hijo mío, del cielo vendrá todo esto[a] sobre la tierra[b], y sobre la tierra habrá una gran destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión traducida 'todo esto' también puede entenderse de manera más general como 'todo' o 'todas estas cosas'; la forma ge'ez es algo difícil en este testimonio OCR.
    reason: lexical_alternative
  - marker: b
    text: '''Tierra'' en algunos contextos también podría traducirse ''país'' o ''tierra'' en sentido local, pero el contexto apocalíptico más amplio favorece el sentido cósmico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo posesivo de primera persona exige expresar la relación personal. En español, 'hijo mío' conserva el trato directo vocativo y suena natural en un registro elevado.
- source_word: እምሰማይ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde el cielo arriba
  - del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea ablativa se expresa bien con 'desde'. 'Cielo' mantiene la imaginería apocalíptica en español y evita una calca pesada.
- source_word: ኵሉዝ
  english_pob_choice: all this
  chosen_spanish: todo esto
  alternatives_spanish:
  - todo
  - todas estas cosas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma apunta a totalidad con referencia deíctica cercana. 'Todo esto' conserva esa cercanía y la ambigüedad referencial del texto.
- source_word: ዲበ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sobre'' reproduce el movimiento descendente hacia la tierra sin forzar un giro arcaico.'
- source_word: ምድር
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español bíblico, 'la tierra' puede abarcar tanto el suelo/país como la esfera terrestre; aquí conserva la amplitud apocalíptica sin imponer 'el mundo'.
- source_word: ይከውን
  english_pob_choice: there shall be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  - ocurrirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor existencial se expresa con naturalidad mediante 'habrá'. Mantiene la construcción impersonal del original en español idiomático.
- source_word: ሐጕል
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - devastación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Destrucción'' es el equivalente más amplio y directo para el colapso judicial/apocalíptico del término ge''ez.'
- source_word: ዐቢይ
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - mucha
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Gran'' es el intensificador más natural ante un sustantivo abstracto en español y conserva la magnitud del juicio.'
theological_decisions:
- issue: Identidad de 'my son'
  english_pob_reading: Retain the familial expression literally as 'my son' without interpreting it as a messianic title in the translation.
  chosen_spanish_reading: Conservar el apelativo familiar 'hijo mío' sin convertirlo en un título mesiánico.
  alternative_spanish_readings:
  - mi hijo
  - el Hijo mío
  - el Mesías
  rationale: El versículo no aporta suficiente información para resolver la identidad del interlocutor. La traducción preserva la ambigüedad y evita introducir categorías posteriores no exigidas por el texto.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla.
translation_notes:
  revision_awareness: 'Se siguió la revisión que corrige la interpretación de ይሄሉ: no significa ''decir'', por lo que no se introduce cita ni habla directa. También se respetó que ወልድየ funciona como vocativo, no como sujeto con ''y''.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y otras sustituciones no presentes en el original.
  - Se mantuvo un registro bíblico sobrio y legible en español latinoamericano.
  - No se añadieron marcadores de nota porque no había notas ancladas necesarias en la redacción final.
