translation:
  language: es
  text: 'Y por ello cayó una palabra en mi boca[a][b], y alcé un grito y dije: «La tierra está destruida»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «de ello», «desde ello» o «entonces». La expresión puede señalar causa, origen o secuencia a partir de la visión anterior.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cayó una palabra en mi boca», un giro idiomático para una expresión que sobreviene al hablante.
    reason: cultural_note
lexical_decisions:
- source_word: እምኔሁ
  english_pob_choice: because of it
  chosen_spanish: de ello
  alternatives_spanish:
  - por ello
  - a causa de ello
  - desde ello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El preverbio con sufijo puede expresar causa, origen o secuencia. En este contexto visionario, «de ello» conserva la relación con lo anterior sin fijarla demasiado en una sola matización, y permite leer la frase como resultativa o causal.
- source_word: ወድቀ ነገር ውስተ አፉየ
  english_pob_choice: a word fell into my mouth
  chosen_spanish: cayó una palabra en mi boca
  alternatives_spanish:
  - una palabra cayó en mi boca
  - me vino una palabra a la boca
  - cayó una palabra en mi boca, a mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el giro idiomático en vez de reducirlo a «hablé». «Palabra» es la opción más transparente en español y mantiene la idea de una expresión que irrumpe sobre el hablante.
- source_word: አንሣእኩ
  english_pob_choice: I lifted up
  chosen_spanish: alcé
  alternatives_spanish:
  - levanté
  - elevé
  - alzé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Alcé» reproduce con naturalidad el gesto de elevar la voz o el clamor, conservando el dinamismo del verbo sin volverlo interpretativo.
- source_word: እጽራሕ
  english_pob_choice: a cry
  chosen_spanish: un grito
  alternatives_spanish:
  - un clamor
  - un alarido
  - una voz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Grito» comunica bien el carácter fuerte e inmediato del sustantivo, con un registro claro y digno en español.
- source_word: ተሐጕለት
  english_pob_choice: is destroyed
  chosen_spanish: está destruida
  alternatives_spanish:
  - ha sido destruida
  - perece
  - está arruinada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige el valor del verbo frente al versículo anterior: aquí no significa «ser tragada» sino «ser destruida / perecer». «Está destruida» conserva la afirmación directa y el impacto apocalíptico.'
- source_word: ምድር
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  - el suelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «tierra» mantiene la amplitud cósmica del pasaje y permite la lectura apocalíptica sin forzar «mundo» ni restringirlo a un terreno local.
theological_decisions:
- issue: Alcance cósmico de ምድር en visión apocalíptica
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el mundo
  - la tierra/país
  rationale: La visión opera en escala amplia; «la tierra» preserva ese alcance universal y no rebaja el lenguaje a una geografía limitada. A la vez, sigue siendo natural en español bíblico contemporáneo.
  doctrine_reference: Conservar imaginería apocalíptica sin aplanar el lenguaje cósmico.
- issue: Valor semántico de ተሐጕለት frente al verbo del versículo anterior
  english_pob_reading: is destroyed
  chosen_spanish_reading: está destruida
  alternative_spanish_readings:
  - ha sido destruida
  - perece
  - está arruinada
  rationale: La nota de revisión indica un cambio léxico deliberado respecto del verbo anterior. «Está destruida» refleja el estado resultante con fuerza declarativa, sin confundirlo con «ser tragada».
  doctrine_reference: Respetar el contraste léxico del texto etiópico y no armonizarlo indebidamente con el versículo precedente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección más reciente del audit trail: el verbo final no debe verterse como «tragada» o «engullida», sino como destruida / perece. También se evitó duplicar la cláusula inicial y se mantuvo el orden natural del español sin perder el matiz causal del comienzo.'
  spanish_consistency_notes:
  - Se usó «tierra» para ምድር, coherente con el alcance apocalíptico y con el uso bíblico natural en español.
  - Se evitó «Cristo» o terminología cristológica ajena al pasaje, ya que no aparece en la fuente.
  - Se mantuvo «palabra» para el giro idiomático, en vez de paraphrasearlo como mera declaración.
  - La puntuación y las comillas siguen normas tipográficas españolas y conservan el tono solemne del texto.
