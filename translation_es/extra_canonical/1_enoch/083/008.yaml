translation:
  language: es
  text: Y ahora[a], hijo mío, levántate y presenta tu petición al Señor de gloria, porque eres fiel[b], para que quede un remanente sobre la tierra y no destruya toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez usa una expresión duplicada para lo que queda o permanece tras el juicio; por eso se traduce «quede un remanente» para conservar ese énfasis.
    reason: lexical_alternative
  - marker: b
    text: Se conserva el valor de መሃይምን como una cualidad de fidelidad religiosa, no sólo como creencia intelectual.
    reason: theological_note
lexical_decisions:
- source_word: ወይእዜኒ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y en este momento
  - Ahora, pues
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula introduce la exhortación inmediata; «Y ahora» conserva la transición directa sin sobrecargar el tono.
- source_word: ተንሥእ
  english_pob_choice: rise
  chosen_spanish: levántate
  alternatives_spanish:
  - levántate en pie
  - árate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo pide ponerse de pie/levantarse para actuar; «levántate» es natural en español y mantiene la urgencia exhortativa.
- source_word: አስተብቍዖ
  english_pob_choice: make your petition
  chosen_spanish: eleva tu petición
  alternatives_spanish:
  - presenta tu petición
  - haz tu súplica
  - ruega
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa súplica formal e intercesión. «Eleva tu petición» conserva el matiz reverente y deliberado de la acción.
- source_word: ለእግዚአ ስብሐት
  english_pob_choice: to the Lord of glory
  chosen_spanish: al Señor de gloria
  alternatives_spanish:
  - al Señor glorioso
  - al Señor, el Glorioso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el título genitivo solemne sin diluirlo en una paráfrasis adjetival. «Señor de gloria» preserva la formulación apocalíptica.
- source_word: መሃይምን
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - creyente
  - confiable
  - leal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto el término justifica la aptitud del hijo para interceder ante el juicio divino; «fiel» mantiene la cualidad moral y religiosa sin reducirla a mera creencia intelectual.
- source_word: ይትረፍ ትራፍ
  english_pob_choice: a remnant may remain
  chosen_spanish: quede un remanente
  alternatives_spanish:
  - permanezca un remanente
  - queden sobrevivientes
  - sea dejado un resto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión duplicada intensifica la idea de lo que queda tras el juicio. «Remanente» reproduce bien el sentido de resto preservado, y «quede» evita rigidez sintáctica.
- source_word: ወኢይደምስሳ ለኵላ ምድር
  english_pob_choice: and that he may not wipe out the whole earth
  chosen_spanish: y él no borre toda la tierra
  alternatives_spanish:
  - y no destruya toda la tierra
  - y no borre por completo la tierra
  - y no aniquile toda la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo connota destrucción total/obliteración; «borre» comunica bien esa totalidad en español y mantiene el paralelismo con la idea de eliminación completa.
theological_decisions:
- issue: Cómo reflejar el título divino ለእግዚአ ስብሐት sin neutralizar su solemnidad
  english_pob_reading: Lord of glory
  chosen_spanish_reading: Señor de gloria
  alternative_spanish_readings:
  - Señor glorioso
  - Señor, el Glorioso
  rationale: El POB inglés conserva el título como epiteto formal. En español, «Señor de gloria» reproduce la misma estructura titular y mantiene la elevación apocalíptica.
  doctrine_reference: Preservar el título divino documentado sin convertirlo en adjetivo devocional general.
- issue: Cómo interpretar መሃይምን en relación con la aptitud para la intercesión
  english_pob_reading: faithful
  chosen_spanish_reading: fiel
  alternative_spanish_readings:
  - creyente
  - confiable
  - leal
  rationale: Aquí el término no sólo describe creencia interior sino la confiabilidad religiosa de quien suplica en un contexto de juicio cósmico. «Fiel» conserva esa tensión entre fe y lealtad.
  doctrine_reference: Preservar la tensión lexical sin resolverla unilateralmente hacia una abstracción doctrinal moderna.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto ge'ez y el audit trail en inglés. No se aplicaron revisiones posteriores; el pase más reciente indica que no hubo cambios necesarios y que la concordancia fue alta.
  spanish_consistency_notes:
  - Se usa «Señor de gloria» de forma consistente con el tratamiento del título divino en el POB inglés.
  - Se evita «SEÑOR» mayúsculo como máscara de nombre divino porque el texto de base aquí da un título, no una sustitución editorial del Tetragrámaton.
  - «Fiel» se mantiene como elección principal para መሃይምን, dejando «creyente» como alternativa cuando el lector quiera oír más explícitamente la fe interior.
  - «Remanente» conserva el matiz apocalíptico de resto preservado tras juicio, en vez de neutralizarlo con «resto» sin contexto.
