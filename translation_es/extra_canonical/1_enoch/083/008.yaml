base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/083/008.yaml
  text: And now[a], my son, rise and make your petition to the Lord of glory, since you are faithful[b], that a remnant may remain upon the earth and that he may not wipe out the whole earth.
  footnotes:
  - marker: a
    text: The Ge'ez uses a doubled expression for what is left over ('remain a remnant' / 'be left as residue'), which is rendered here as 'a remnant may remain' to preserve the emphasis.
    reason: lexical_alternative
  - marker: b
    text: The title 'Lord of glory' is kept as a formal divine epithet rather than simplified to 'glorious Lord.'
    reason: cultural_note
