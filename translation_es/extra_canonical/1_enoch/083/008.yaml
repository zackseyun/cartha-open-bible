review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del ge''ez y del POB inglés: exhortación inmediata, mandato de levantarse, súplica intercesora al «Señor de gloria», cualidad de «fiel», preservación de un remanente y no destrucción total de la tierra. Sin embargo, la cláusula final «y él no borre toda la tierra» suena menos natural y algo más débil en español que el valor de destrucción/obliteración indicado en la evidencia léxica. También conviene reflejar mejor en la nota [a] la idea doble de remanencia.'
  spanish_quality_summary: El texto es claro y digno, pero «eleva tu petición» y sobre todo «borre toda la tierra» tienen un matiz algo forzado. «Presenta tu petición» y «no destruya toda la tierra» leen con mayor naturalidad e igual solemnidad en español eclesial general. La sintaxis general es buena.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Señor de gloria» respeta la decisión documentada; aquí no interviene el nombre divino Yahvé. «Fiel» preserva adecuadamente መሃይምን según la justificación teológica inglesa. «Remanente» también está bien alineado.
  issues:
  - severity: medium
    issue: «y él no borre toda la tierra» suena poco idiomático y algo ambiguo en español
    rationale: Aunque «borrar» puede comunicar obliteración, en español bíblico general suele sonar menos natural con «tierra» como objeto directo. «No destruya toda la tierra» preserva mejor el sentido catastrófico documentado.
  - severity: low
    issue: La nota [a] no refleja plenamente la duplicación intensiva del ge'ez
    rationale: La evidencia inglesa destaca la expresión doble de lo que queda. La nota española habla de expresión duplicada, pero puede precisar mejor que la traducción intenta conservar el énfasis de «remanente»/«quedar».
  - severity: low
    issue: «eleva tu petición» es aceptable, pero menos natural que otras opciones
    rationale: No es incorrecto, pero «presenta tu petición» o «haz tu súplica» comunica mejor la intercesión formal sin sonar calcado.
  revised_spanish_text: Y ahora[a], hijo mío, levántate y presenta tu petición al Señor de gloria, porque eres fiel[b], para que quede un remanente sobre la tierra y no destruya toda la tierra.
  revised_footnotes:
