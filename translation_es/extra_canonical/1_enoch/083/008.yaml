    text: El ge'ez usa una expresión duplicada para lo que queda o permanece tras el juicio; por eso se traduce «quede un remanente» para conservar ese énfasis.
    reason: lexical_alternative
  - marker: b
    text: Se conserva el valor de መሃይምን como una cualidad de fidelidad religiosa, no sólo como creencia intelectual.
    reason: theological_note
  revision_rationale: 'Se ajusta la redacción para un español más natural y fiel al valor léxico documentado: «presenta tu petición» mantiene el tono formal de intercesión, y «no destruya toda la tierra» expresa mejor la idea de destrucción total que «no borre toda la tierra». También se afina la nota [a] para reflejar con más precisión la duplicación enfática del ge''ez.'
