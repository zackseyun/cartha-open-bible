translation:
  language: es
  text: 'Vi dos visiones antes de tomar esposa[a], y una de ellas no se parecía a la otra: la primera, cuando estaba aprendiendo el libro; y la segunda, antes de tomar a tu madre, vi una visión poderosa[d][b]; y acerca de ellas[c] hice súplica al Señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando estaba siendo instruido en el libro». El verbo ge''ez puede implicar aprender o recibir instrucción.'
    reason: lexical_alternative
  - marker: b
    text: «Poderosa» también puede entenderse como «fuerte» o «severa», según el matiz que se quiera destacar en la visión.
    reason: lexical_alternative
  - marker: c
    text: «Acerca de ellas» también puede entenderse como «a causa de ellas», indicando que las visiones motivaron la oración de Enoc.
    reason: lexical_alternative
  - marker: d
    text: 'O: «y la segunda, antes de tomar a tu madre, vi una visión poderosa».'
    reason: previous_rendering
lexical_decisions:
- source_word: ክልኤተ ራእየ
  english_pob_choice: two visions
  chosen_spanish: dos visiones
  alternatives_spanish:
  - dos sueños-visión
  - dos revelaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión ge'ez indica claramente un par de experiencias visionarias. «Visiones» conserva el registro apocalíptico sin añadir matices no sustentados.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un reporte visionario en primera persona. «Vi» es natural en español y mantiene la sencillez del testimonio.
- source_word: እንበለ እንሣእ ብእሲተ
  english_pob_choice: before I took a wife
  chosen_spanish: antes de tomar esposa
  alternatives_spanish:
  - antes de casarme
  - antes de tomar una mujer como esposa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase marca una etapa anterior al matrimonio. «Tomar esposa» conserva el giro idiomático del original mejor que una paráfrasis más moderna.
- source_word: ወአሐዱሂ እምኔሆሙ ኢይትማሰል ምስለ ካልኡ
  english_pob_choice: and one of them was not like the other
  chosen_spanish: y una de ellas no se parecía a la otra
  alternatives_spanish:
  - y una de ellas no era semejante a la otra
  - y eran distintas entre sí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez enfatiza la disimilitud entre las dos visiones. «No se parecía a la otra» reproduce esa diferencia de forma idiomática en español.
- source_word: ቀዳማየ
  english_pob_choice: the first
  chosen_spanish: la primera
  alternatives_spanish:
  - la primera de ellas
  - la anterior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se refiere a la primera de las dos visiones. «La primera» es claro y mantiene la correlación con «la segunda».
- source_word: አመ እትሜሀር መጽሐፈ
  english_pob_choice: when I was learning the book
  chosen_spanish: cuando estaba aprendiendo el libro
  alternatives_spanish:
  - cuando estaba siendo instruido en el libro
  - cuando estudiaba el libro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite el sentido de aprender o de ser instruido. Se conserva «aprendiendo» porque refleja bien el forcejeo semántico sin volverlo demasiado técnico.
- source_word: ወካልአ
  english_pob_choice: and the second
  chosen_spanish: y la segunda
  alternatives_spanish:
  - y la otra
  - y la segunda de ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto, el término remite a la segunda visión del par. «La segunda» conserva la simetría con «la primera».
- source_word: እንበለ እንሥእ ለእምከ
  english_pob_choice: before I took your mother
  chosen_spanish: antes de tomar a tu madre
  alternatives_spanish:
  - antes de casarme con tu madre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto usa un giro matrimonial directo. «Tomar a tu madre» preserva el idiomatismo y la dirección familiar del discurso sin suavizarlo demasiado.
- source_word: ራእየ ጽኑዐ
  english_pob_choice: a mighty vision
  chosen_spanish: una visión poderosa
  alternatives_spanish:
  - una visión fuerte
  - una visión severa
  - una visión imponente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽኑዐ puede expresar fuerza, firmeza o intensidad. «Poderosa» comunica bien la intensidad de la revelación en español y evita restringir indebidamente el matiz a «severa».
- source_word: ወበእንቲአሆሙ አስተብቋዕክዎ ለእግዚእ
  english_pob_choice: and concerning them I made supplication to the Lord
  chosen_spanish: y por ellas supliqué al Señor
  alternatives_spanish:
  - y a causa de ellas supliqué al Señor
  - y acerca de ellas hice súplica al Señor
  - y por causa de ellas rogué al Señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase preposicional puede significar «con respecto a» o «a causa de» ellas. «Por ellas» deja abierta esa ambigüedad y se adapta al español bíblico sin perder el sentido causal o temático.
- source_word: ለእግዚእ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  - el Dueño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de súplica, el término funciona como designación divina. «Señor» es la forma española más natural para la dirección de Enoch a Dios, sin necesidad de la convención de máscara tipográfica.
theological_decisions:
- issue: Tratamiento de ለእግዚእ como referencia a Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Amo
  - el Dueño
  rationale: Aunque el sustantivo puede significar «señor» en sentido general, aquí aparece en una oración dirigida a Dios. «El Señor» conserva la lectura teológica del pasaje y su tono de súplica.
  doctrine_reference: Uso contextual de κύριος / ለእግዚእ como designación divina en oraciones y apelaciones directas.
- issue: Ambigüedad de la relación causal o temática en 'concerning them'
  english_pob_reading: concerning them
  chosen_spanish_reading: por ellas
  alternative_spanish_readings:
  - acerca de ellas
  - a causa de ellas
  rationale: El ge'ez permite una relación de tema o de causa. «Por ellas» mantiene esa tensión sin decidirla de forma excesiva, y deja ver que las visiones motivan la oración.
  doctrine_reference: Principio de preservar ambigüedades textuales cuando el original no fija un único valor semántico.
translation_notes:
  revision_awareness: La redacción española sigue la última forma inglesa revisada, que aclara la relación sintáctica de «the second» mediante una pausa fuerte antes de la cláusula «vi una visión poderosa». También conserva la ambigüedad del preverbio final, que en el audit trail se reconoce como temáticamente o causalmente orientado.
  spanish_consistency_notes:
  - Se emplea «Señor» para ለእግዚእ, coherente con el uso devocional directo en la oración.
  - Se conserva «visiones» y no se rebaja a «sueños» para mantener el registro apocalíptico.
  - «Tomar esposa» y «tomar a tu madre» preservan el idioma matrimonial directo del original.
  - Se mantiene la correspondencia «la primera / la segunda» para reflejar la pareja de visiones.
