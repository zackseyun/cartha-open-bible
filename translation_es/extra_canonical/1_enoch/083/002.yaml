  language: en
  yaml_path: translation/extra_canonical/1_enoch/083/002.yaml
  text: 'I saw two visions before I took a wife[a], and one of them was not like the other: the first when I was learning the book, and the second before I took your mother—I saw a mighty vision[d][c][b]; and concerning them I made supplication to the Lord.'
