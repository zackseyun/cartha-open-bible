translation:
  language: es
  text: Y acontecerá en aquellos días que los elegidos y santos descenderán[a] del alto cielo[b], y su descendencia llegará a ser una[c] con los hijos de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'descenderán los hijos de los elegidos y santos'. El término ge'ez puede entenderse de forma filial; aquí se sigue la formulación más general del texto principal.
    reason: lexical_alternative
  - marker: b
    text: O 'del cielo más alto'. La expresión señala un origen celestial elevado, pero no precisa por sí sola la identidad exacta del grupo.
    reason: cultural_note
  - marker: c
    text: O 'su simiente será una con los hijos de los hombres'. El texto sugiere unión o mezcla, pero no especifica el mecanismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይከውን
  english_pob_choice: will happen / will be
  chosen_spanish: Y acontecerá
  alternatives_spanish:
  - Y será
  - Y sucederá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la fórmula apocalíptica introductoria sin volverla pesada; 'acontecerá' transmite bien el valor futurativo-eventivo.
- source_word: በዝኩ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Equivale a la fórmula temporal estándar de registro profético/apocalíptico en español bíblico y conserva la cadencia solemne.
- source_word: ይወርዱ
  english_pob_choice: will descend
  chosen_spanish: descenderán
  alternatives_spanish:
  - bajarán
  - vendrán abajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Descenderán'' mantiene la imagen vertical y celestial del original mejor que un simple ''bajarán''.'
- source_word: ደቂቅ
  english_pob_choice: children
  chosen_spanish: los elegidos y santos
  alternatives_spanish:
  - los hijos
  - la descendencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El ajuste al español sigue la revisión auditada: aquí el sintagma atributivo ''elegidos y santos'' modifica al sustantivo implícito del grupo, preservado en el predicado por economía natural en español. Se evita introducir ''hijos'' en el sujeto porque la revisión textual favorece ''the chosen and holy ones''.'
- source_word: ኅሩያን
  english_pob_choice: chosen
  chosen_spanish: elegidos
  alternatives_spanish:
  - escogidos
  - seleccionados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Elegidos'' es transparente, solemne y plenamente equivalente al valor de ''chosen'' sin añadir carga doctrinal ajena.'
- source_word: ቅዱሳን
  english_pob_choice: holy ones
  chosen_spanish: santos
  alternatives_spanish:
  - santos consagrados
  - sagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español bíblico, 'santos' reproduce bien el sustantivo plural; aquí no se usa 'santos' para importar una lectura eclesial, sino como equivalente léxico de plural sustantivado.
- source_word: እምልዑል ሰማይ
  english_pob_choice: from the high heaven
  chosen_spanish: del alto cielo
  alternatives_spanish:
  - del cielo alto
  - del cielo más alto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Alto cielo'' conserva la elevación y el singular del giro ge''ez sin forzar una cosmología más precisa de la que el verso ofrece.'
- source_word: አሐደ ይከውን
  english_pob_choice: will become one
  chosen_spanish: se hará una
  alternatives_spanish:
  - será uno
  - se unirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pronominalización 'se hará una' expresa unión o fusión de manera natural en español y mantiene el matiz verbal sin explicitar el mecanismo.
- source_word: ዘርኦሙ
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su simiente
  - sus descendientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Descendencia'' comunica claramente la idea genealógica y evita un calco de ''seed'' que en español suena más técnico o arcaizante.'
- source_word: ምስለ ውሉደ ሰብእ
  english_pob_choice: with the children of men
  chosen_spanish: con los hijos de los hombres
  alternatives_spanish:
  - con la humanidad
  - con los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la frase tradicional y elevada del registro apocalíptico, sin diluirla en una paráfrasis más abstracta.
theological_decisions:
- issue: Identidad de 'los elegidos y santos'
  english_pob_reading: Rendered as a heavenly group whose 'children' descend from heaven, without specifying whether they are angels, the righteous, or another exalted class.
  chosen_spanish_reading: '''Los elegidos y santos'' se deja sin identificar más allá de su procedencia celestial implícita por el contexto.'
  alternative_spanish_readings:
  - ángeles elegidos
  - los justos y santos
  - una compañía celestial mixta o simbólica
  rationale: El texto ge'ez y la auditoría inglesa no resuelven la identidad; el español debe conservar esa tensión y no cerrar la cuestión con una equivalencia doctrinal más específica.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Fuerza de 'se hará una con los hijos de los hombres'
  english_pob_reading: Rendered as intermingling or union ('will become one with') rather than explicitly sexual marriage language.
  chosen_spanish_reading: '''Se hará una con los hijos de los hombres'' mantiene la idea de unión sin especificar el mecanismo.'
  alternative_spanish_readings:
  - se mezclarán con la humanidad
  - se unirán a los hijos de los hombres
  - se aparearán con los hijos de los hombres
  rationale: El verso por sí solo no obliga a una formulación sexual explícita; el español debe conservar la ambigüedad del original y de la nota auditada.
  doctrine_reference: Primacía del original sobre la expansión interpretativa.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada más reciente: el ge''ez ደቂቅ se trató con cautela, sin convertir el sintagma en un genitivo no sustentado. El español evita ''hijos de los elegidos y santos'' como sujeto principal y conserva la lectura de un grupo celestial sin resolver su identidad. También se preservó la fórmula introductoria apocalíptica ''Y acontecerá en aquellos días''.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico solemne y moderno, sin arcaísmos innecesarios.
  - '''Elegidos'' y ''santos'' se usan como equivalentes léxicos de los títulos del grupo, no como definición doctrinal cerrada.'
  - '''Alto cielo'' conserva la elevación del original y evita imponer una cosmología detallada.'
  - No se introduce 'Mesías', 'Señor' ni otra terminología no presente en el verso.
  - La nota [a] está anclada a 'descenderán', [b] a 'alto cielo' y [c] a 'se hará una', de modo que cada marcador aparece exactamente en el texto.
