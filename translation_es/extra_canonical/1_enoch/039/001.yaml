base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/039/001.yaml
  text: And it will happen in those days that the chosen and holy ones will descend from the high heaven[d][c][b][a], and their offspring will become one with the children of men.
  footnotes:
  - marker: a
    text: Or 'sons of the chosen and holy ones.' The Ge'ez filial term can be rendered either way; 'children' is chosen here to avoid unnecessarily restricting the group to males.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'from the high heaven' indicates heavenly origin, but this verse alone does not fully identify who the 'chosen and holy ones' are.
    reason: cultural_note
  - marker: c
    text: Or 'their seed will be one with the children of men.' The line likely describes some form of union or mingling, but the exact nuance is left unstated in the Ge'ez wording here.
    reason: lexical_alternative
  - marker: d
    text: Or 'And in those days the children of the chosen and holy ones will descend'.
    reason: previous_rendering
