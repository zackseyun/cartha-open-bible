translation:
  language: es
  text: Y mis ojos vieron en aquel lugar[a], y lo bendijeron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «allí, en aquel lugar».
    reason: previous_rendering
  - marker: b
    text: El sujeto de «bendijeron» no está expresado en esta breve línea del ge'ez; el sentido puede ser que los seres celestiales allí lo bendijeron.
    reason: lexical_alternative
lexical_decisions:
- source_word: ትንዳየ
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - los ojos míos
  - mi vista
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma se entiende como una expresión posesiva en primera persona referida a los ojos de Enoch. «Mis ojos» conserva el valor visionario de forma natural en español.
- source_word: ርእዩ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - miraron
  - contemplaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico es «ver». En español, «vieron» comunica el informe visionario de manera clara y sobria sin sobrecargar el tono.
- source_word: በውእቱ መካን
  english_pob_choice: there, in that place
  chosen_spanish: en aquel lugar
  alternatives_spanish:
  - allí, en aquel lugar
  - en ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión combina una localización deíctica con «lugar». «En aquel lugar» conserva la fuerza situacional sin redundancia excesiva en español.
- source_word: ባረክዎ
  english_pob_choice: they blessed [him]
  chosen_spanish: ellos lo bendijeron
  alternatives_spanish:
  - lo bendijeron
  - lo alabaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo es «bendecir» y el objeto masculino singular está marcado. Como el sujeto no se explicita en el fragmento, «ellos» mantiene la pluralidad verbal sin resolver indebidamente la identidad del sujeto.
theological_decisions:
- issue: Sujeto no explícito del verbo final
  english_pob_reading: they blessed him
  chosen_spanish_reading: ellos lo bendijeron
  alternative_spanish_readings:
  - lo bendijeron
  - yo lo bendije
  rationale: El ge'ez transmitido presenta una forma verbal plural con objeto masculino, pero no nombra al sujeto. La traducción conserva esa ambigüedad, evitando imponer una lectura singular o primera persona que el fragmento no exige.
  doctrine_reference: Preservar la tensión textual sin resolverla indebidamente.
translation_notes:
  revision_awareness: Se ajustó la redacción para que no dependa de una nota no anclada y para reflejar el plural verbal del texto transmitido sin añadir elementos no sustentados por el fragmento.
  spanish_consistency_notes:
  - Se mantuvo un español moderno y solemne.
  - Se evitó «Señor» u otras sustituciones no presentes en este versículo.
  - «Bendijeron» conserva el valor de bless/blessed sin paraphrase teológica.
