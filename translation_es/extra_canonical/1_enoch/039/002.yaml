translation:
  language: es
  text: Y en aquellos días Enoc recibió libros de celo y de ira, y libros de tumulto[a] y confusión; y no habrá misericordia sobre ellos, dice el Señor de los Espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El Ge’ez de la parte media del versículo es difícil en este testimonio. La pareja traducida aquí como «tumulto y confusión» también puede entenderse, de manera más general, como disturbio, clamor o desorden.
    reason: textual_variant
lexical_decisions:
- source_word: መዋዕል
  english_pob_choice: days
  chosen_spanish: aquellos días
  alternatives_spanish:
  - esos días
  - en aquellos tiempos
  lexicon: Dillmann
  rationale: La fórmula temporal apocalíptica se conserva de manera natural en español con «en aquellos días», sin añadir precisión histórica que el ge’ez no exige.
- source_word: ነሥአ
  english_pob_choice: received
  chosen_spanish: recibió
  alternatives_spanish:
  - tomó
  - levantó
  lexicon: Dillmann
  rationale: «Recibió» expresa mejor la relación de Enoch como receptor de los libros y evita la idea de apropiación o de una acción física no indicada por el contexto.
- source_word: መጻሕፍተ
  english_pob_choice: books
  chosen_spanish: libros
  alternatives_spanish:
  - escritos
  - rollos
  lexicon: Dillmann
  rationale: El plural pide una forma plural clara; «libros» reproduce directamente el valor básico sin introducir materialidad específica como «rollos».
- source_word: ቅንአት
  english_pob_choice: zeal
  chosen_spanish: celo
  alternatives_spanish:
  - celos
  - ardor
  lexicon: Dillmann
  rationale: En español «celo» conserva el matiz de fervor intenso y evita la ambigüedad negativa de «celos» en un contexto de juicio divino.
- source_word: መዐት
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - cólera
  lexicon: Dillmann
  rationale: «Ira» mantiene la fuerza judicial del término y suena natural en español bíblico contemporáneo.
- source_word: ጐጕአ
  english_pob_choice: tumult
  chosen_spanish: tumulto
  alternatives_spanish:
  - alboroto
  - clamor
  - disturbio
  lexicon: Dillmann
  rationale: La lectura del término es difícil en este testimonio; «tumulto» conserva el campo de disturbio público y queda bien emparejado con «confusión».
- source_word: ሀውክ
  english_pob_choice: confusion
  chosen_spanish: confusión
  alternatives_spanish:
  - desorden
  - pánico
  lexicon: Dillmann
  rationale: «Confusión» es suficientemente amplia para reflejar la incertidumbre del pasaje y no fija más de lo que permite el ge’ez.
- source_word: ምሕረት
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - piedad
  lexicon: Dillmann
  rationale: «Misericordia» es la correspondencia más natural y reverente en español para el juicio divino mencionado al final del versículo.
- source_word: ኢይከውን ላዕሌሆሙ
  english_pob_choice: shall not be upon them
  chosen_spanish: no habrá ... sobre ellos
  alternatives_spanish:
  - no estará sobre ellos
  - no vendrá sobre ellos
  lexicon: Dillmann
  rationale: La construcción española «no habrá ... sobre ellos» conserva la fórmula solemne y la relación espacial/metafórica del original sin volverla demasiado idiomática.
- source_word: እግዚአ መናፈስት
  english_pob_choice: Lord of Spirits
  chosen_spanish: Señor de los Espíritus
  alternatives_spanish:
  - Señor de espíritu
  - Señor de las almas
  lexicon: Dillmann
  rationale: Se mantiene el título fijo de la tradición de Enoc. «Espíritus» conserva el plural y la majestad del apelativo divino.
theological_decisions:
- issue: Lista de «libros» como conjunto revelatorio de juicio
  english_pob_reading: Enoch is said to receive revelatory books characterized by zeal, wrath, tumult, and confusion.
  chosen_spanish_reading: Enoc recibe libros revelatorios marcados por celo, ira, tumulto y confusión.
  alternative_spanish_readings:
  - Enoc recibe un solo libro descrito por esas cualidades.
  - Enoc recibe escritos cuyo contenido produce tumulto y confusión.
  rationale: Se mantiene el plural «libros» porque el ge’ez lo sostiene y el sentido apocalíptico es el de una revelación múltiple o al menos de varios escritos. No se resuelve la ambigüedad del medio verso, para preservar la tensión textual.
  doctrine_reference: Primacía del texto original; preservar ambigüedad donde el testimonio ge’ez es incierto.
- issue: Sentido de «no habrá misericordia sobre ellos»
  english_pob_reading: The pronoun refers to the judged opponents in the surrounding context, not to the books.
  chosen_spanish_reading: La falta de misericordia recae sobre los adversarios juzgados del contexto.
  alternative_spanish_readings:
  - La falta de misericordia recae sobre los libros.
  - La falta de misericordia recae sobre Enoc.
  rationale: La traducción mantiene el referente personal implícito sin nombrarlo, porque la cláusula funciona como oráculo de juicio y el contexto narrativo apunta a personas, no a libros ni a Enoc.
  doctrine_reference: Lectura contextual con respeto al carácter oracular del pasaje.
translation_notes:
  revision_awareness: 'El texto español sigue la lectura ya aprobada por el audit trail inglés: conserva el plural «libros», el título fijo «Señor de los Espíritus» y la solución amplia «tumulto y confusión» para la zona textual incierta, sin introducir una armonización interpretativa adicional.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí el título correspondiente es «Señor de los Espíritus», conforme al testimonio enociano.
  - Se mantiene «misericordia» para la cláusula final, en paralelo con la decisión inglesa y con el registro solemne del juicio.
  - «Celo» se prefirió a «celos» para evitar connotación sentimental o negativa.
  - No se introdujo «Cristo» ni terminología eclesial posterior, porque el pasaje no la presenta.
