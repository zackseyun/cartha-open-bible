translation:
  language: es
  text: Y en aquel lugar mis ojos vieron al Elegido de justicia y de fe[a]; y habrá justicia en sus días[c]; y los justos y los elegidos serán sin número[b] delante de él por siempre jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad». El término ge'ez puede denotar fe, fidelidad o firmeza en esta frase titulada y comprimida.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no hay número para ellos delante de él».'
    reason: lexical_alternative
  - marker: c
    text: O «estará».
    reason: lexical_alternative
lexical_decisions:
- source_word: መካን
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - ubicación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez es un sustantivo común de localización. «Lugar» conserva el marco espacial de la visión sin sobreespecificar.
- source_word: ኀሩየ
  english_pob_choice: Chosen One
  chosen_spanish: Elegido
  alternatives_spanish:
  - Escogido
  - Elegido de Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí funciona como título sustantivo. En español, «Elegido» comunica mejor la función titulativa que una simple perífrasis. Se evita añadir «de Dios» porque no está explícito en el verso.
- source_word: ለጽድቅ
  english_pob_choice: of righteousness
  chosen_spanish: de justicia
  alternatives_spanish:
  - de rectitud
  - para justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Justicia» mantiene el campo semántico de צְדָקָה / ጽድቅ y es natural en español. «Rectitud» es posible, pero aquí «justicia» conserva mejor el registro bíblico y judicial.
- source_word: ወዘሃይማኖት
  english_pob_choice: and of faith
  chosen_spanish: y de fe
  alternatives_spanish:
  - y de fidelidad
  - y de firmeza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La palabra puede significar «fe» o «fidelidad». Se conserva «fe» en el texto principal para reflejar la decisión inglesa, y se documenta la alternativa en nota porque la frase es compacta y ambigua.
- source_word: ይከውን
  english_pob_choice: shall be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  - llegará a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez es el imperfecto de «ser/estar». «Estará» reproduce bien el valor futurо simple sin introducir la fuerza interpretativa de «prevalecer».
- source_word: በመዋዕሊሁ
  english_pob_choice: in his days
  chosen_spanish: en sus días
  alternatives_spanish:
  - durante sus días
  - en el tiempo de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la expresión temporal estándar y se vierte de forma directa e idiomática.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos de corazón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Justos» mantiene la correspondencia con ጽድቅ y suena natural en español religioso.
- source_word: ኄራያን
  english_pob_choice: the chosen
  chosen_spanish: los elegidos
  alternatives_spanish:
  - los escogidos
  - los seleccionados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la relación léxica con «Elegido» mediante el plural «elegidos».
- source_word: ኈልቈ አልቦሙ
  english_pob_choice: will be without number
  chosen_spanish: serán sin número
  alternatives_spanish:
  - serán innumerables
  - no tendrán número
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La locución idiomática expresa innumerabilidad. «Serán sin número» mantiene el tono elevado y la cercanía formal al original.
- source_word: ቅድሜሁ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Delante de él» es natural en español y conserva la relación de presencia/corte celestial.
- source_word: ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: por siempre jamás
  alternatives_spanish:
  - para siempre y para siempre
  - por los siglos de los siglos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se busca un equivalente solemne y bíblico en español. «Por siempre jamás» preserva el énfasis durativo sin importar una fórmula litúrgica específica.
theological_decisions:
- issue: Cómo representar el título ኀሩየ sin reducirlo a adjetivo común
  english_pob_reading: Rendered as the title 'Chosen One'
  chosen_spanish_reading: «Elegido» como título sustantivo
  alternative_spanish_readings:
  - «el elegido»
  - «Escogido»
  rationale: El personaje funciona como designación titular en este contexto apocalíptico. En español, un sustantivo con mayúscula inicial en el texto principal comunica esa función sin añadir contenido no explicitado.
  doctrine_reference: Preservar la función literaria del título sin sobrerreferenciar identificaciones doctrinales posteriores.
- issue: Ambigüedad de ሃይማኖት entre fe y fidelidad
  english_pob_reading: Main text 'faith' with footnote noting 'faithfulness'
  chosen_spanish_reading: «fe» en el texto principal, con nota de «fidelidad»
  alternative_spanish_readings:
  - «fidelidad»
  - «confianza»
  rationale: La ambigüedad léxica debe permanecer visible. «Fe» sigue la decisión principal del audit trail, y la nota preserva la alternativa semántica importante sin cerrarla artificialmente.
  doctrine_reference: Preservar la tensión léxica y no resolverla dogmáticamente.
- issue: Cómo traducir la cláusula sobre la presencia de justicia en sus días
  english_pob_reading: '''righteousness shall be in his days'''
  chosen_spanish_reading: «la justicia estará en sus días»
  alternative_spanish_readings:
  - «la justicia prevalecerá en sus días»
  - «habrá justicia en sus días»
  rationale: El ge'ez ይከውን admite el valor simple de «ser/estar». Dado el ajuste final del audit trail, «estará» evita añadir la interpretación de «prevalecer» y mantiene el enunciado directo.
  doctrine_reference: Mantener la simplicidad del verbo original sin intensificar indebidamente el sentido.
translation_notes:
  revision_awareness: La audit trail inglesa registra una revisión que pasó de «shall prevail» a «shall be», y el último control indicó alta concordancia sin cambios adicionales. Por eso el español usa un futuro simple («estará») y evita introducir un matiz de predominio no exigido por el ge'ez ይከውን. También se respetó la decisión estable de mantener la ambigüedad de ሃይማኖት entre «fe» y «fidelidad».
  spanish_consistency_notes:
  - Se mantiene la correspondencia léxica Elegido/elegidos para conservar la relación singular-plural del título.
  - Se usa «justicia» para ጽድቅ y «justos» para ጻድቃን, preservando la familia semántica en español.
  - Se evita «SEÑOR» o fórmulas sustitutivas porque el texto recibido no contiene el Tetragrámaton ni una cita directa de κύριος.
  - La cadencia de «por siempre jamás» busca equivalencia solemne con ለዓለመ ዓለም sin forzar una fórmula litúrgica fija.
