translation:
  language: es
  text: Y en aquellos días, un torbellino de vientos me arrebató de la faz de la tierra y me puso al extremo de los cielos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la extremidad de los cielos». La expresión ge'ez se refiere al límite exterior o al confín más lejano del cosmos visionario.
    reason: lexical_alternative
lexical_decisions:
- source_word: መዋዕል
  english_pob_choice: days
  chosen_spanish: aquellos días
  alternatives_spanish:
  - esos días
  - en aquellos tiempos
  - en ese período
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula narrativa apocalíptica se conserva mejor con «en aquellos días», que reproduce el valor temporal y el tono formular sin volverlo vago.
- source_word: መሠጠኒ
  english_pob_choice: carried me away
  chosen_spanish: me arrebató
  alternatives_spanish:
  - me llevó
  - me transportó
  - me levantó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico expresa un movimiento fuerte causado por una fuerza externa. «Me arrebató» comunica mejor esa acción impetuosa que un simple «me llevó».
- source_word: ዐውሎ ነፋሳት
  english_pob_choice: a whirlwind of winds
  chosen_spanish: un torbellino de vientos
  alternatives_spanish:
  - un remolino de vientos
  - un torbellino de viento
  - una tempestad de vientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Torbellino de vientos» preserva la imagen intensificada del doblete y evita aplanarla a «viento» singular o a una expresión más genérica.
- source_word: እምገጸ ሰምድር
  english_pob_choice: from the face of the earth
  chosen_spanish: de la faz de la tierra
  alternatives_spanish:
  - de la superficie de la tierra
  - de la tierra
  - de la faz del mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Faz» reproduce el idiomático «face» del original y mantiene el registro elevado y semítico del giro.
- source_word: አንበረኒ
  english_pob_choice: set me down
  chosen_spanish: me puso
  alternatives_spanish:
  - me colocó
  - me estableció
  - me dejó
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «me puso» en combinación con el destino explicitado comunica colocación efectiva al llegar; es natural y suficientemente preciso para la escena visionaria.
- source_word: ጽንፈ ሰማያት
  english_pob_choice: the end of the heavens
  chosen_spanish: al extremo de los cielos
  alternatives_spanish:
  - al fin de los cielos
  - a la extremidad de los cielos
  - al borde del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Extremo» conserva la idea de límite o frontera cósmica. «Cielos» en plural refleja el plural etiópico sin forzar una singularización tradicional.
theological_decisions:
- issue: Geografía cósmica visionaria
  english_pob_reading: the end of the heavens
  chosen_spanish_reading: al extremo de los cielos
  alternative_spanish_readings:
  - al borde del cielo
  - a la extremidad de los cielos
  rationale: Se conserva la espacialidad apocalíptica en vez de espiritualizarla. El verso describe transporte visionario a un límite del cosmos, no solo una experiencia religiosa interior.
  doctrine_reference: Mantener la imaginería apocalíptica y la geografía visionaria del texto.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta versión sigue el mismo sentido del texto inglés auditado y conserva la alternativa léxica sobre la expresión cosmológica final.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico solemne sin recurrir a una paráfrasis expansiva.
  - «Cielos» en plural se conserva para respetar la forma del original y la geografía visionaria.
  - No se reemplaza la fuerza de «arrebató» por un verbo más débil que diluya el impulso del pasaje.
