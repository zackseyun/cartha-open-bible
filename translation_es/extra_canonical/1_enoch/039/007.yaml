translation:
  language: es
  text: Y vi la morada debajo de las alas del Señor de los Espíritus[c]; y todos los justos y los escogidos[a] brillaban delante de él como la luz de fuego, y sus bocas se llenaban de bendición, y sus labios alababan el nombre del Señor de los Espíritus. Y la justicia no falla delante de él[b], y la rectitud no falla delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'los elegidos' para 'los escogidos'.
    reason: lexical_alternative
  - marker: b
    text: El verbo final repetido también puede traducirse 'no perece', 'no pasa' o 'no llega a su fin'.
    reason: lexical_alternative
  - marker: c
    text: La imagen 'debajo de las alas' se mantiene literal para conservar el simbolismo visionario de amparo y cercanía al Señor de los Espíritus.
    reason: cultural_note
lexical_decisions:
- source_word: ማኅደረ
  english_pob_choice: dwelling place
  chosen_spanish: morada
  alternatives_spanish:
  - morada
  - dwelling place
  - habitación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo designa un lugar de residencia o habitación. 'Morada' comunica el espacio visionario con naturalidad en español y conserva el valor concreto de un lugar habitado.
- source_word: መትሕተ
  english_pob_choice: beneath
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - debajo de
  - bajo de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición expresa una relación espacial literal. 'Debajo de' mantiene el símbolo de amparo bajo las alas sin sonar forzado en español.
- source_word: አክናፈ
  english_pob_choice: wings
  chosen_spanish: alas
  alternatives_spanish:
  - alas
  - plumas
  - pínnulas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen apocalíptica debe conservarse de forma literal. 'Alas' es la opción natural y transparente para preservar el simbolismo de protección y cercanía.
- source_word: እግዚአ መናፍስት
  english_pob_choice: Lord of Spirits
  chosen_spanish: Señor de los Espíritus
  alternatives_spanish:
  - Señor de los espíritus
  - Señor de Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula es un título fijo en 1 Enoc. En español, 'Señor de los Espíritus' conserva el plural y la mayúscula reverencial propia del título.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los justos
  - los rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí la clase de personas justas ante Dios se expresa de manera natural con 'los justos'. En este contexto español comunica bien la calidad moral y relacional sin perder el sentido del término.
- source_word: ኄሩያን
  english_pob_choice: the chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los escogidos
  - los elegidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Escogidos'' mantiene el sentido de quienes han sido seleccionados por Dios sin introducir de inmediato la carga doctrinal de ''elegidos'' en español eclesiástico.'
- source_word: ይትሰሐዩ
  english_pob_choice: shone
  chosen_spanish: brillaban
  alternatives_spanish:
  - brillaban
  - resplandecían
  - lucían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo transmite radiación luminosa en una visión. 'Brillaban' es claro y fiel; conserva la imagen sin exagerarla.
- source_word: ከመ ብርሃነ እሳት
  english_pob_choice: like the light of fire
  chosen_spanish: como la luz de fuego
  alternatives_spanish:
  - como la luz de fuego
  - como la claridad del fuego
  - como luz de fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación es extraña y debe permanecer visible. 'Como la luz de fuego' reproduce de cerca la imagen original sin suavizarla.
- source_word: አፉሆሙ ይመልእ በረከተ
  english_pob_choice: their mouths were filled with blessing
  chosen_spanish: sus bocas se llenaban de bendición
  alternatives_spanish:
  - sus bocas se llenaban de bendición
  - sus bocas estaban llenas de bendición
  - sus bocas rebosaban de bendición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto habla específicamente de 'bendición', no solo de alabanza. La forma pasiva/reflexiva en español conserva la idea de plenitud sin añadir agentes inexistentes.
- source_word: ከናፍሪሆሙ ይሴብሑ
  english_pob_choice: their lips praised
  chosen_spanish: sus labios alababan
  alternatives_spanish:
  - sus labios alababan
  - sus labios glorificaban
  - sus labios bendecían
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Alababan'' corresponde bien al verbo de elogio y mantiene el paralelismo con ''bocas''. Se conserva ''labios'' para no borrar la poesía corporal del texto.'
- source_word: ጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la justicia
  - la rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta cláusula abstracta delante de Dios, 'justicia' expresa bien el valor moral y relacional. Se mantiene la posibilidad de 'rectitud' en la cláusula paralela para no homogeneizar ambos términos.
- source_word: ወርትዕ
  english_pob_choice: uprightness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la rectitud
  - la integridad
  - lo recto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término sugiere rectitud/linealidad moral. 'Rectitud' preserva el paralelismo con 'justicia' sin perder la distinción semántica.
- source_word: ኢየኃልቅ
  english_pob_choice: does not fail
  chosen_spanish: no falla
  alternatives_spanish:
  - no falla
  - no perece
  - no llega a su fin
  - no desaparece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede abarcar idea de no perecer o no llegar a término. 'No falla' ofrece una equivalencia breve y moderna para expresar permanencia delante de Dios sin cerrar la ambigüedad textual.
theological_decisions:
- issue: Título divino እግዚአ መናፍስት en una fórmula apocalíptica fija
  english_pob_reading: Lord of Spirits
  chosen_spanish_reading: Señor de los Espíritus
  alternative_spanish_readings:
  - Señor de los espíritus
  - Señor de Espíritus
  rationale: Se conserva el título como fórmula reverente y recurrente en 1 Enoc. La mayúscula en 'Espíritus' ayuda a marcar que no es un plural genérico sino un título divino establecido.
  doctrine_reference: Transparencia textual y respeto al título propio del texto fuente, sin sustituirlo por equivalentes litúrgicos más conocidos.
- issue: La pareja final de 'justicia' y 'rectitud' antes de Dios
  english_pob_reading: righteousness does not fail before him, and uprightness does not fail before him
  chosen_spanish_reading: la justicia no falla delante de él, y la rectitud no falla delante de él
  alternative_spanish_readings:
  - la justicia no pasa away delante de él
  - la justicia no perece delante de él
  - la justicia no termina delante de él
  rationale: El texto insiste en permanencia o perduración ante Dios. 'No falla' preserva la ambigüedad del verbo y sugiere que ambas cualidades permanecen intactas en su presencia.
  doctrine_reference: 'Mantener la tensión semántica del original: persistencia, no desaparición y estabilidad moral ante Dios.'
- issue: Identidad de los 'justos' y 'escogidos' en el escenario visionario
  english_pob_reading: all the righteous and the chosen
  chosen_spanish_reading: todos los justos y los escogidos
  alternative_spanish_readings:
  - todos los justos y los elegidos
  - todos los rectos y los escogidos
  rationale: Se conservan dos grupos o una doble designación sin fusionarlos artificialmente. 'Escogidos' evita importar un término técnico dogmático innecesario mientras preserva la categoría apocalíptica.
  doctrine_reference: Evitar sobredeterminar la relación entre justicia y elección más allá de lo que el verso afirma.
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del inglés, que prefiere 'dwelling place' convertido en una forma más natural y conserva 'righteous and chosen' sin artículo duplicado. En español, se mantuvo la estructura simple del verso, con el título fijo 'Señor de los Espíritus' y la imagen literal de las alas. La última cláusula se rindió con un verbo de permanencia abierto ('no falla') para respetar la ambigüedad del original y la nota inglesa sobre posibles alternativas.
  spanish_consistency_notes:
  - Se mantiene 'Señor de los Espíritus' de forma consistente para el título divino.
  - Se distinguen 'justicia' y 'rectitud' para conservar el paralelismo final.
  - '''Escogidos'' se usa de manera estable para ኄሩያን, con nota alternativa a ''elegidos''.'
  - Se conserva la imagen corporal-poética de 'bocas' y 'labios' sin reducirla a una mera paráfrasis.
  - La puntuación sigue una sola secuencia narrativa con punto y coma para separar las cláusulas mayores.
