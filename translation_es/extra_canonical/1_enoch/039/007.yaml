base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/039/007.yaml
  text: And I saw the dwelling place beneath the wings of the Lord of Spirits[a]; and all the righteous and chosen shone before him like the light of fire, and their mouths were filled with blessing, and their lips praised the name of the Lord of Spirits. And righteousness does not fail before him[c][b], and uprightness does not fail before him.
  footnotes:
  - marker: a
    text: Or 'the elect' for 'the chosen.'
    reason: lexical_alternative
  - marker: b
    text: The final repeated verb can also be rendered 'does not perish,' 'does not pass away,' or 'does not come to an end.'
    reason: lexical_alternative
  - marker: c
    text: The image 'beneath the wings' is kept literal to preserve the visionary symbolism of shelter and nearness to the Lord of Spirits.
    reason: cultural_note
