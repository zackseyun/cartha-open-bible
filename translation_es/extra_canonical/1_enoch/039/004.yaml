translation:
  language: es
  text: 'Y allí vi otra visión: las moradas de los seres santos, y los lugares de reposo[a] de los justos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término aquí podría sugerir más literalmente «camas», «lechos» o «lugares para dormir». Se mantiene el sentido más amplio porque el verso describe, en imágenes visionarias, las moradas preparadas para los justos.
    reason: lexical_alternative
lexical_decisions:
- source_word: በህየ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: Dillmann
  rationale: Adverbio locativo que sitúa la escena visionaria. «Allí» suena natural en español y conserva la referencia de lugar sin sobrecargar el texto.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - contemplé
  lexicon: Dillmann
  rationale: Primera persona de relato visionario. «Vi» es directo y mantiene el tono narrativo apocalíptico.
- source_word: ራእየ ካልአ
  english_pob_choice: another vision
  chosen_spanish: otra visión
  alternatives_spanish:
  - una segunda visión
  - otro espectáculo
  lexicon: Dillmann
  rationale: La frase introduce una revelación visionaria adicional. «Otra visión» preserva el registro apocalíptico y evita precisar numéricamente más de lo que el texto exige.
- source_word: ማኅደሪሆሙ
  english_pob_choice: the dwelling places
  chosen_spanish: las moradas
  alternatives_spanish:
  - las viviendas
  - los lugares de habitación
  lexicon: Dillmann
  rationale: El término señala lugar de habitación o residencia. «Moradas» es breve, digno y apto para un texto visionario en español.
- source_word: ለቅዱሳን
  english_pob_choice: of the holy ones
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los santos consagrados
  - de los seres santos
  lexicon: Dillmann
  rationale: En español, «santos» comunica bien la referencia a seres santos sin introducir una expresión extraña. Aunque la auditoría inglesa prefirió «holy ones» para evitar una lectura eclesiástica cerrada, en español «santos» es el equivalente natural más transparente; se conserva la amplitud del término sin decidir si se trata de ángeles o del pueblo vindicado de Dios.
- source_word: ወምስካባቲሆሙ
  english_pob_choice: and the resting places
  chosen_spanish: y los lugares de reposo
  alternatives_spanish:
  - y sus camas
  - y sus lechos
  - y los lugares para descansar
  lexicon: Dillmann
  rationale: El sustantivo se relaciona con acostarse, cama o descanso. Se opta por una forma amplia que preserve el sentido imaginativo de reposo sin fijarlo innecesariamente en «camas» o «lechos».
- source_word: ለጻድቃን
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los rectos de corazón
  lexicon: Dillmann
  rationale: «Justos» es una equivalencia bíblica natural para el campo semántico de los justos/righteous. Mantiene el valor moral y judicial del término en un español claro.
theological_decisions:
- issue: Cómo rendir ቅዱሳን sin resolver si alude a ángeles, a los fieles vindicados o a una categoría amplia de seres santos.
  english_pob_reading: holy ones
  chosen_spanish_reading: santos
  alternative_spanish_readings:
  - seres santos
  - santos consagrados
  rationale: Se conserva la amplitud apocalíptica del término sin introducir una interpretación restrictiva. «Santos» es suficientemente amplio en español y no obliga a una identificación doctrinal específica.
  doctrine_reference: Mantener la tensión interpretativa local del texto; no cerrar la referencia más allá de lo que el pasaje permite.
- issue: Cómo traducir ወምስካባቲሆሙ, cuya imagen puede ser de camas, lechos o lugares de descanso.
  english_pob_reading: resting places
  chosen_spanish_reading: lugares de reposo
  alternative_spanish_readings:
  - camas
  - lechos
  - lugares para descansar
  rationale: La elección conserva el campo semántico del descanso y el carácter visionario de las moradas preparadas, sin perder inteligibilidad ni volver demasiado concreta la imagen.
  doctrine_reference: Preservar la imagen escatológica de reposo preparado para los justos.
translation_notes:
  revision_awareness: Con base en el texto ge’ez y el audit trail inglés, no se introdujeron cambios de sentido sustantivos. La versión española mantiene la secuencia visionaria, la amplitud de «santos» y la imagen de reposo para los justos.
  spanish_consistency_notes:
  - Se mantiene «justos» para ለጻድቃን, en coherencia con la terminología bíblica habitual del corpus.
  - Se prefiere «moradas» y «lugares de reposo» por ser naturales en español y respetar el tono visionario del pasaje.
  - No se usa «SEÑOR» ni vocabulario eclesiástico ajeno al contexto, ya que el verso no contiene un nombre divino explícito.
