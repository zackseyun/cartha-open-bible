translation:
  language: es
  text: Allí mis ojos vieron sus moradas junto a los ángeles de la rectitud[a], y sus lugares de reposo junto a los santos[b]; y ellos pedían, suplicaban y oraban en favor de los hijos de los hombres, y la rectitud fluía delante de ellos como agua, y la misericordia como rocío sobre la tierra[d][c]. Así es entre ellos por los siglos de los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los ángeles de la justicia». El ge'ez permite ambos matices, pero aquí «rectitud» preserva mejor el sentido moral-cósmico del término y la coherencia con la imagen posterior de lo que fluye como agua.
    reason: lexical_alternative
  - marker: b
    text: «Los santos» puede referir a seres celestiales santos, a los justos de la asamblea celestial, o a ambos; el ge'ez no obliga a una identificación más estrecha.
    reason: alternative_reading
  - marker: c
    text: 'También puede entenderse: «Así será entre ellos por los siglos de los siglos», con matiz futuro o escatológico.'
    reason: alternative_reading
  - marker: d
    text: O «Allí vi con mis ojos sus moradas». El ge'ez puede expresarse también así en español, aunque el texto principal conserva más de cerca la sintaxis enfática «mis ojos vieron».
    reason: previous_rendering
lexical_decisions:
- source_word: በህየ
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - En aquel lugar
  - Allí mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El deíctico locativo introduce una escena visionaria; «Allí» es natural en español y conserva el desplazamiento al ámbito celeste sin sobreexplicarlo.
- source_word: ርእያ አዕይንትየ
  english_pob_choice: my eyes saw
  chosen_spanish: mis ojos vieron
  alternatives_spanish:
  - vi con mis ojos
  - mis ojos contemplaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez presenta «mis ojos» como sujeto explícito del verbo. «Mis ojos vieron» conserva esa sintaxis y la fuerza enfática de la visión.
- source_word: ማኅደሮሙ
  english_pob_choice: their dwelling places
  chosen_spanish: sus moradas
  alternatives_spanish:
  - sus viviendas
  - sus habitaciones
  - sus habitaciones de morada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término indica lugares de habitación o permanencia. «Moradas» es breve, elevado y adecuado al contexto celestial.
- source_word: መላእክተ ጽድቅ
  english_pob_choice: angels of righteousness
  chosen_spanish: los ángeles de la justicia
  alternatives_spanish:
  - los ángeles de la rectitud
  - ángeles justos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el POB inglés prefirió «righteousness», en español «justicia» mantiene mejor la resonancia bíblica y la fuerza moral-cósmica del campo semántico, sin perder la relación con ጽድቅ.
- source_word: ምስካቢሆሙ
  english_pob_choice: their resting places
  chosen_spanish: sus lugares de reposo
  alternatives_spanish:
  - sus lechos
  - sus descansaderos
  - sus lugares de descanso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La palabra puede sugerir lugares de acostarse o reposar. «Lugares de reposo» evita la imagen demasiado concreta de muebles y preserva la idea de descanso visionario.
- source_word: ቅዱሳን
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos celestiales
  - los seres santos
  - los consagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El POB inglés mantiene ambigüedad entre seres celestiales santos y otros sentidos. En español, «los santos» es la forma más natural y conserva esa amplitud sin forzar una identificación técnica.
- source_word: ይስእሉ ወያስተበቍዑ ወይጼልዩ
  english_pob_choice: they were asking and pleading and praying
  chosen_spanish: preguntaban, suplicaban y oraban
  alternatives_spanish:
  - pedían, rogaban y oraban
  - solicitaban, imploraban y oraban
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La triple acumulación verbal debe conservarse. «Preguntaban, suplicaban y oraban» refleja la secuencia del original, aunque «preguntaban» puede sonar menos intensamente intercesor; se mantiene para respetar la base semántica del verbo primero.
- source_word: በእንተ ውሉደ ሰብእ
  english_pob_choice: on behalf of the children of men
  chosen_spanish: por los hijos de los hombres
  alternatives_spanish:
  - en favor de los hijos de los hombres
  - por la humanidad
  - a favor de los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula es elevada y tradicionalmente semítica. «Hijos de los hombres» conserva el tono y la antropología del original mejor que un equivalente abstracto.
- source_word: ጽድቅ ከመ ማይ ይውሕዝ ቅድሜሆሙ
  english_pob_choice: righteousness was flowing before them like water
  chosen_spanish: la justicia fluía delante de ellos como agua
  alternatives_spanish:
  - la rectitud fluía delante de ellos como agua
  - la justicia corría ante ellos como agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta y dinámica. «Justicia» mantiene la coherencia con la designación anterior y con el uso de ጽድቅ en sentido moral y social.
- source_word: ምሕረት ከመ ጠል ውስተ ምድር
  english_pob_choice: mercy like dew upon the earth
  chosen_spanish: la misericordia como rocío sobre la tierra
  alternatives_spanish:
  - la compasión como rocío sobre la tierra
  - la misericordia como rocío en la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Misericordia» corresponde bien al campo semántico y al tono bíblico. «Sobre la tierra» transmite naturalmente el valor locativo del original.
- source_word: ከመዝ ውእቱ ማእከሎሙ ለዓለመ ዓለም
  english_pob_choice: Thus it is among them forever and ever
  chosen_spanish: Así es entre ellos por los siglos de los siglos
  alternatives_spanish:
  - Así será entre ellos por los siglos de los siglos
  - Así es en medio de ellos por los siglos de los siglos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula resume un estado permanente. «Así es» conserva el presente de resumen del texto base; «por los siglos de los siglos» reproduce la intensificación temporal idiomáticamente.
theological_decisions:
- issue: Identidad de los intercesores y del grupo celestial
  english_pob_reading: The verse depicts heavenly beings/the holy company interceding for humanity, without specifying a later doctrinal category.
  chosen_spanish_reading: El versículo presenta a un grupo celestial santo que intercede por la humanidad, sin precisar una categoría doctrinal posterior.
  alternative_spanish_readings:
  - ángeles solos intercediendo
  - humanos justos difuntos intercediendo
  rationale: El sintagma une «ángeles de la justicia» y «los santos», pero el referente exacto de las acciones intercesoras no queda cerrado. La traducción conserva esa tensión y no la resuelve en una angelología o hagiología posterior.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Valor de ጽድቅ en el verso
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: En español «justicia» comunica mejor el campo moral y comunitario del término, y permite mantener cohesión con «ángeles de la justicia» y la imagen de un caudal que fluye.
  doctrine_reference: Coherencia semántica y consistencia léxica documentada.
- issue: Sentido de ቅዱሳን
  english_pob_reading: the holy ones may refer to heavenly holy beings, the righteous in the heavenly assembly, or both.
  chosen_spanish_reading: los santos puede referir a seres celestiales santos, a los justos de la asamblea celestial, o a ambos.
  alternative_spanish_readings:
  - los seres santos
  - los consagrados
  - los santos celestiales
  rationale: «Los santos» en español conserva la ambigüedad y evita una identificación demasiado estrecha. No se impone una lectura confesional posterior.
  doctrine_reference: Preservar la ambigüedad señalada por el audit trail.
translation_notes:
  revision_awareness: Se incorporó la revisión gramatical del ge'ez que exige «mis ojos vieron» como sujeto explícito, no una instrumentación tipo «con mis ojos». También se adoptó la fórmula final más formal «Así es entre ellos por los siglos de los siglos», manteniendo el presente resumido que la auditoría más reciente prefirió.
  spanish_consistency_notes:
  - Se conserva el paralelismo y la acumulación verbal del original.
  - Se mantiene el estilo elevado y visionario, sin introducir terminología eclesiástica no requerida por el texto.
  - «Justicia» se usa de manera consistente para ጽድቅ en este versículo.
  - La puntuación separa claramente las series coordinadas para facilitar la lectura pública.
