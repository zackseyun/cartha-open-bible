base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/039/005.yaml
  text: There my eyes saw their dwelling places with the angels of righteousness[a], and their resting places with the holy ones; and they were asking and pleading and praying on behalf of the children of men, and righteousness was flowing before them like water, and mercy like dew upon the earth[d][c][b]. Thus it is among them forever and ever.
  footnotes:
  - marker: a
    text: Or 'their beds/couches'; the Ge'ez term suggests places of repose, but 'resting places' better fits the heavenly vision without over-specifying furniture.
    reason: lexical_alternative
  - marker: b
    text: '''Holy ones'' may refer to heavenly holy beings, the righteous in the heavenly assembly, or both; the Ge''ez wording does not force a narrower identification.'
    reason: alternative_reading
  - marker: c
    text: The final clause may also be understood as 'thus it shall be in their midst forever and ever.' The main text keeps a present-state summary, but a future nuance is possible from context.
    reason: alternative_reading
  - marker: d
    text: Or 'There I saw with my eyes their dwelling places'.
    reason: previous_rendering
