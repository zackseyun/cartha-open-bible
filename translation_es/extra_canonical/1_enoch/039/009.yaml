translation:
  language: es
  text: En aquellos días alabé y exalté el nombre del Señor de Espíritus con bendición y con alabanza[a], porque me ha fortalecido con bendición y con alabanza[b], conforme a la voluntad del Señor de Espíritus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me hizo firme» / «me estableció». El verbo ge'ez puede expresar fortalecer o hacer firme; la auditoría inglesa también señala una posible conexión léxica con el verso 8.
    reason: lexical_alternative
  - marker: b
    text: O «me ha establecido con bendición y con alabanza». La auditoría inglesa registra una revisión previa hacia «established me», aunque la lectura final adoptada vuelve a «strengthened me».
    reason: previous_rendering
lexical_decisions:
- source_word: በውእቱን መዋዕል
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula temporal apocalíptica estándar. «En aquellos días» conserva el registro elevado y la cadencia visionaria mejor que una formulación más genérica.
- source_word: ሰባሕኩ
  english_pob_choice: I praised
  chosen_spanish: alabé
  alternatives_spanish:
  - glorifiqué
  - di alabanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Alabé» es natural en español y mantiene el acto de praise sin sobrecargarlo con un matiz más técnico o litúrgico que el texto no exige.
- source_word: ወአልዐልኩ ስሞ
  english_pob_choice: and exalted the name
  chosen_spanish: y exalté el nombre
  alternatives_spanish:
  - y engrandecí el nombre
  - y levanté su nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Exalté el nombre» preserva el giro idiomático de honrar el nombre divino sin reducirlo a una paráfrasis abstracta.
- source_word: ለእግዚአ መናፍስት
  english_pob_choice: of the Lord of Spirits
  chosen_spanish: del Señor de los Espíritus
  alternatives_spanish:
  - del Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título fijo en forma reverente y reconocible. En español, «Espíritus» mayúsculo ayuda a señalar el título divino propio de 1 Enoc.
- source_word: በረከተ ወስብሐተ
  english_pob_choice: with blessing and with praise
  chosen_spanish: con bendición y con alabanza
  alternatives_spanish:
  - en bendición y en alabanza
  - por bendición y alabanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición preposicional se mantiene para conservar el ritmo solemne. «Bendición» aquí se entiende como acto de bendecir, no como beneficio recibido.
- source_word: እስመ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce la causa de la alabanza de modo claro y natural en español.
- source_word: አጽንዐኒ
  english_pob_choice: he has strengthened me
  chosen_spanish: me ha fortalecido
  alternatives_spanish:
  - me ha hecho firme
  - me ha establecido
  - me ha confirmado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede expresar fortalecer o hacer firme. En español, «me ha fortalecido» comunica bien la acción divina sin perder la fuerza causal del original; se documenta la alternativa «me ha establecido» por la revisión textual señalada en el auditoría inglesa.
- source_word: በበረከት ወስብሐት
  english_pob_choice: with blessing and with praise
  chosen_spanish: con bendición y con alabanza
  alternatives_spanish:
  - en bendición y en alabanza
  - por bendición y alabanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la misma frase en la segunda ocurrencia para conservar la repetición deliberada del verso y su paralelismo.
- source_word: በከመ ፈቃዱ
  english_pob_choice: according to the will
  chosen_spanish: conforme a la voluntad
  alternatives_spanish:
  - según la voluntad
  - de acuerdo con la voluntad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Conforme a la voluntad» reproduce la idea de ajuste a la volición divina con un español bíblico claro y sin introducir matices ajenos.
theological_decisions:
- issue: Sentido de «bendición y alabanza»
  english_pob_reading: Describen el modo o esfera de la adoración y del fortalecimiento divino, no necesariamente beneficios materiales concedidos a Enoch.
  chosen_spanish_reading: Describen el modo de la alabanza de Enoc y la manera en que Dios lo fortalece, sin convertir la frase en una promesa de prosperidad o recompensa material.
  alternative_spanish_readings:
  - Podría leerse como «bendiciones y gloria» en sentido más estático.
  - Podría entenderse dinámicamente como que Dios lo capacita para bendecir y alabar.
  rationale: La repetición ge'ez conserva lenguaje doxológico. En español, mantener «bendición y alabanza» preserva el foco litúrgico y evita resolver la ambigüedad en una sola dirección.
  doctrine_reference: Preservar la tensión léxica y teológica sin armonizarla de manera excesiva.
- issue: Título divino «Señor de los Espíritus»
  english_pob_reading: Lord of Spirits
  chosen_spanish_reading: Señor de los Espíritus
  alternative_spanish_readings:
  - Señor de los espíritus
  - Señor de los espíritus creados
  rationale: Se conserva como título propio de 1 Enoc, no como una frase descriptiva común. La mayúscula en «Espíritus» ayuda a marcar su carácter titular.
  doctrine_reference: Primacía del original y consistencia terminológica en títulos divinos.
- issue: 'Verbo አጽንዐኒ: «fortalecer» frente a «establecer»'
  english_pob_reading: The English audit trail notes a tension between 'strengthened me' and 'established me' tied to the causative form and the lexical link with verse 8.
  chosen_spanish_reading: me ha fortalecido
  alternative_spanish_readings:
  - me ha establecido
  - me ha hecho firme
  rationale: La evidencia principal del enunciado inglés más reciente favorece «strengthened me». En español, «fortaleció» es una equivalencia natural y exacta; se deja constancia de la alternativa «estableció» porque la auditoría identifica una conexión literaria con el verso 8.
  doctrine_reference: Mantener visible la tensión textual/lexical cuando no puede resolverse sin perder una de las dos lecturas.
translation_notes:
  revision_awareness: 'La auditoría inglesa registra una revisión significativa en el verbo አጽንዐኒ: una fase anterior tradujo «he has established me», luego otra pasó a «he has strengthened me». También se señaló el vínculo léxico con el verso 8 por el uso de la raíz de «establecer/fijar». La presente versión mantiene «me ha fortalecido» como lectura principal por alinearse con la última decisión inglesa, pero documenta «me ha establecido» como alternativa viable para no borrar la tensión textual.'
  spanish_consistency_notes:
  - Se mantiene «Señor de los Espíritus» de manera uniforme como título divino.
  - Se conserva la repetición de «con bendición y con alabanza» en ambas mitades del verso.
  - Se evita sustituir «alabanza» por términos más interpretativos como «gloria» o «adoración», para no desplazar el paralelo léxico del original.
  - Se usa «Espíritus» con mayúscula en el título para reflejar su estatus titular en 1 Enoc.
