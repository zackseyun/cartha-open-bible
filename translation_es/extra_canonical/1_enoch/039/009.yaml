    issue: 'Título divino traducido con artículo interno: «Señor de los Espíritus»'
    rationale: 'La auditoría inglesa documenta un título fijo de 1 Enoc: «Lord of Spirits», no una frase descriptiva genérica. Añadir «los» lo acerca a una descripción común y se aparta de la forma titular preservada por el POB.'
  - severity: low
