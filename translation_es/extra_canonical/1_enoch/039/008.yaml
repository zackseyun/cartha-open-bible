  rationale: Se hace una reparación menor para mejorar la naturalidad del español ('ya estaba antes') sin apartarse del sentido auditado ni introducir una asignación pasiva no presente en el verbo ge’ez. También se alinean mejor las notas con el audit trail inglés, preservando la alternativa de lectura sobre 'mi porción' y la nota sobre el título 'Señor de los Espíritus'.
