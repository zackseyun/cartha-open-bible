translation:
  language: es
  text: Allí deseé habitar[a], y mi espíritu anheló ese lugar de morada; allí mi porción ya estaba antes[b], porque así había sido establecido para mí delante del Señor de los Espíritus[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quise habitar»; el matiz de ፈቀድኩ puede ser volitivo o desiderativo.
    reason: lexical_alternative
  - marker: b
    text: O «allí mi porción había sido antes»; el ge’ez es compacto en torno a «mi porción» y «antes», y puede leerse de manera algo más formal sin introducir en el texto principal una pasiva de asignación.
    reason: lexical_alternative
  - marker: c
    text: «Señor de los Espíritus» es un título divino característico de las Parábolas y debe leerse según el propio idioma de esta obra, sin armonizarlo con fórmulas posteriores.
    reason: cross_reference
lexical_decisions:
- source_word: ህየ
  english_pob_choice: there
  chosen_spanish: Allí
  alternatives_spanish:
  - en ese lugar
  - allá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma locativa introduce el lugar visionario. «Allí» conserva la deixis sin añadir información geográfica.
- source_word: ፈቀድኩ
  english_pob_choice: I desired
  chosen_spanish: deseé
  alternatives_spanish:
  - quise
  - quise habitar
  - anhelé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa volición o deseo. En español, «deseé» reproduce bien la intención contemplativa del sujeto; se mantiene la relación con el infinitivo siguiente.
- source_word: አኅድር
  english_pob_choice: to dwell
  chosen_spanish: habitar
  alternatives_spanish:
  - morar
  - residir
  - permanecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El infinitivo indica residencia estable, no una estancia breve. «Habitar» es natural y conserva el sentido de morada permanente.
- source_word: ወፈተወት መንፈስየ
  english_pob_choice: and my spirit longed
  chosen_spanish: y mi espíritu anheló
  alternatives_spanish:
  - y mi espíritu deseó
  - y mi espíritu se complació
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica inclinación o gusto interior hacia ese lugar. «Anheló» preserva la fuerza afectiva sin reducirla a simple preferencia.
- source_word: ለውእቱ ማኅደር
  english_pob_choice: for that dwelling place
  chosen_spanish: ese lugar de morada
  alternatives_spanish:
  - esa morada
  - ese lugar de habitación
  - esa habitación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ማኅደር denota un sitio para habitar. «Lugar de morada» evita la ambigüedad de «habitación» en español moderno y mantiene la imagen espacial.
- source_word: ኮነ ክፍለየ
  english_pob_choice: my portion was before
  chosen_spanish: mi porción estaba antes
  alternatives_spanish:
  - mi porción era antes
  - mi parte estaba antes
  - mi porción fue antes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail indica que ኮነ es simplemente «ser/estar/llegar a ser», sin introducir un pasivo de asignación. «Estaba antes» conserva la prioridad temporal y evita sobreinterpretar el verbo.
- source_word: ቅድመ
  english_pob_choice: before
  chosen_spanish: antes
  alternatives_spanish:
  - delante de
  - anteriormente
  - en tiempos previos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el valor es temporal. «Antes» expresa con claridad que la porción existía o quedaba fijada con anterioridad.
- source_word: እስመ ከመዝ
  english_pob_choice: for thus
  chosen_spanish: porque así
  alternatives_spanish:
  - pues de este modo
  - ya que así
  - porque de esta manera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce la razón de la afirmación. «Porque así» mantiene la relación causal sin excesiva formalización.
- source_word: ጸንዐ
  english_pob_choice: it was established
  chosen_spanish: había sido establecido
  alternatives_spanish:
  - había sido fijado
  - había quedado firme
  - se había establecido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo lleva la idea de firmeza y establecimiento. El pluscuamperfecto refleja que la determinación era anterior al momento de la visión.
- source_word: በእንቲአየ
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - en mi favor
  - concerniente a mí
  - por mí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La referencia personal es directa. «Para mí» es la forma más natural y fiel para indicar la asignación en primera persona.
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Dueño de los Espíritus
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título divino característico de esta obra. «Señor de los Espíritus» reproduce el nombre propio teológico sin armonizarlo con fórmulas posteriores.
theological_decisions:
- issue: Naturaleza de la «porción» de Enoch en la escena celestial
  english_pob_reading: The verse speaks of a divinely assigned place or share for the seer in the heavenly dwelling.
  chosen_spanish_reading: El versículo habla de un lugar o porción que existe para el vidente en la morada celestial, con prioridad previa y establecimiento divino implícito, pero sin añadir un verbo explícito de asignación que no está en el ge’ez.
  alternative_spanish_readings:
  - Puede leerse más simplemente como que su porción «estaba antes», sin desarrollar el modo en que llegó a ser suya.
  - También podría entenderse como una expresión de deseo espiritual más que como una afirmación local concreta.
  rationale: 'El texto ge’ez combina deseo de habitar, anhelo interior y la afirmación de que su porción estaba antes. En español conviene mantener esa tensión: hay una ubicación real en la visión y, al mismo tiempo, una expresión de anhelo y prerrogativa previa, sin introducir una pasiva de asignación que el verbo no exige.'
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de más; documentar la ambigüedad en vez de aplanarla.
translation_notes:
  revision_awareness: El draft incorpora la revisión más reciente que corrigió la expansión interpretativa de «had been assigned» y volvió al simple valor de ኮነ («was/became»). Por eso el español evita expresar una asignación pasiva explícita y conserva la prioridad temporal con «estaba antes». También se tuvo en cuenta la estabilidad del título divino «Lord of Spirits», que se vierte de modo consistente como «Señor de los Espíritus».
  spanish_consistency_notes:
  - Se mantiene «Espíritu» no aplica aquí; el ge’ez usa «mi espíritu» en minúscula, por lo que no se eleva innecesariamente.
  - «Señor de los Espíritus» conserva el título propio del corpus enochiano y no se sustituye por «Señor» a secas.
  - «Porción» traduce ክፍል con su sentido de lote o parte asignada, sin convertirlo en una abstracción teológica más amplia.
  - La preposición final «del Señor de los Espíritus» reproduce la relación de dependencia/antecedencia del original sin sobrerreformularla.
  - La sintaxis busca ser publicable en español actual, pero con suficiente literalidad para que el lector perciba el paralelo entre deseo, morada y porción previa.
