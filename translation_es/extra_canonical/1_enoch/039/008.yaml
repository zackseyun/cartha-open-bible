    rationale: El inglés preserva una alternativa de lectura más formal ('there my portion had been assigned before'). En español conviene mantener una nota equivalente sin imponerla al texto principal.
  - severity: low
    issue: La razón de la nota b actual dice 'textual_variant' cuando en realidad explica una decisión léxica/interpretativa derivada del audit trail.
    rationale: No afecta gravemente al texto, pero una nota más precisa y clara ayuda a la trazabilidad del proyecto.
