translation:
  language: es
  text: 'Y vi otra cosa acerca del relámpago: cómo algunas de las estrellas se levantan y se convierten en relámpago[a][b], y no pueden dejarlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abandonarlo»; el final del verso es incierto, aunque el ge'ez probablemente quiere decir «dejarlo» o «cesar», y también podría significar «apartarse de ello».
    reason: lexical_alternative
  - marker: b
    text: O «cómo algunas de las estrellas surgen y se convierten en relámpago, y no pueden dejar de hacerlo».
    reason: previous_rendering
lexical_decisions:
- source_word: ካልእተ
  english_pob_choice: another thing
  chosen_spanish: otra cosa
  alternatives_spanish:
  - otra
  - una segunda cosa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase introduce una nueva visión; «otra cosa» conserva el giro resumptivo sin sonar forzado en español.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - vi
  - contemplé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula visionaria en primera persona; «vi» es natural y fiel al reporte de visión.
- source_word: በእንተ
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa adecuadamente la relación temática sin añadir interpretación extra.
- source_word: መብረቅ
  english_pob_choice: lightning
  chosen_spanish: relámpago
  alternatives_spanish:
  - rayo
  - fulgor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Relámpago» mantiene la imagen apocalíptica y funciona bien en español bíblico; aquí también evita la posible confusión de «rayo» como golpe o como proyectil.
- source_word: እፎ
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce de forma directa el contenido de la visión.
- source_word: ይቀውሙ
  english_pob_choice: stand out / arise
  chosen_spanish: se levantan
  alternatives_spanish:
  - se alzan
  - surgen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail revisado corrige la idea de «stand out» hacia «arise». «Se levantan» conserva movimiento ascendente sin imponer una interpretación más fuerte.
- source_word: እምከዋክብተ
  english_pob_choice: some of the stars
  chosen_spanish: algunos de los astros
  alternatives_spanish:
  - algunas de las estrellas
  - algunos de los cuerpos celestes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura partitiva está respaldada por la revisión. «Astros» es amplio y evita decidir de antemano si se trata de estrellas literales o de imágenes celestiales personales.
- source_word: ወይከውኑ
  english_pob_choice: and become
  chosen_spanish: y se convierten en
  alternatives_spanish:
  - y llegan a ser
  - y pasan a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se convierten en» expresa con claridad el cambio de estado o forma implicado por el verbo de devenir.
- source_word: ወኢይክሉ
  english_pob_choice: and they are not able
  chosen_spanish: y no pueden
  alternatives_spanish:
  - y no son capaces
  - y no les es posible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La incapacidad explícita se conserva de manera natural en español.
- source_word: ኃዲገ
  english_pob_choice: to leave off / depart
  chosen_spanish: dejarlo
  alternatives_spanish:
  - abandonarlo
  - dejar de hacerlo
  - apartarse de ello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El objeto implícito en el final revisado se entiende mejor con un pronombre neutro. «Dejarlo» preserva la ambigüedad entre cesar y abandonar sin forzar una especificación.
theological_decisions:
- issue: Identidad de los astros que se convierten en relámpago
  english_pob_reading: Retain the imagery as visionary-cosmic transformation without identifying the stars as angels or spirits in the main text.
  chosen_spanish_reading: Conservar la imagen como una transformación visionaria-cósmica sin identificar en el texto principal si los astros son estrellas literales o seres celestiales personales.
  alternative_spanish_readings:
  - interpretar los astros como ángeles
  - interpretar la línea como un fenómeno natural
  rationale: El pasaje por sí solo no explicita la referencialidad de los astros; la traducción debe preservar esa tensión interpretativa en vez de resolverla.
  doctrine_reference: Preservar la ambigüedad apocalíptica sin sobreinterpretar el símbolo.
translation_notes:
  revision_awareness: 'El audit trail inglés fue revisado: la lectura de ይቀውሙ debe entenderse como «se levantan/surgen» y እምከዋክብተ como partitivo («algunos de los astros»). La redacción española sigue esa revisión y evita la antigua idea de «stand out». También conserva la incertidumbre del cierre con una formulación neutra («dejarlo») y una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «astros» de forma amplia para no fijar prematuramente una identificación exegética.
  - Se mantiene «relámpago» para conservar la imaginería repetida del verso.
  - La puntuación refleja una lectura visionaria continua, con dos participios coordinados y cierre incierto.
