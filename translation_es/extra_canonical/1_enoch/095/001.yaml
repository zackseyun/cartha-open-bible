translation:
  language: es
  text: ¿Quién me concederá que mis ojos se vuelvan una nube de agua[a], para que llore sobre ustedes y derrame mis lágrimas como una nube de agua[c][b], y halle descanso del dolor de mi corazón?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una nube de lluvia». La imagen ge’ez se repite dos veces y puede evocar intencionalmente ojos que se vuelven una nube tormentosa de lágrimas.
    reason: lexical_alternative
  - marker: b
    text: El «ustedes» del destinatario es plural en el contexto y probablemente se refiere a los pecadores o malvados a quienes se dirigen los lamentos y ayes del entorno.
    reason: cross_reference
  - marker: c
    text: 'O: «¿Quién me concederá que mis ojos se vuelvan una nube de agua, para que llore sobre ustedes y derrame mis lágrimas como una nube de agua, y halle descanso?»'
    reason: alternative_reading
lexical_decisions:
- source_word: መኑ
  english_pob_choice: Who will grant
  chosen_spanish: ¿Quién me concederá
  alternatives_spanish:
  - ¿Quién me dará
  - ¿Quién me permitirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El inicio tiene fuerza optativa de lamento, no una mera pregunta informativa. «Concederá» conserva la idea de otorgar una posibilidad deseada mejor que un simple «dar».
- source_word: ይሁበኒ
  english_pob_choice: will grant to me
  chosen_spanish: me concederá
  alternatives_spanish:
  - me dará
  - me otorgará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo de primera persona debe quedar explícito en español. «Me concederá» comunica habilitación o concesión, en línea con el valor idiomático del original.
- source_word: ለአዕይንትየ
  english_pob_choice: to my eyes
  chosen_spanish: que mis ojos
  alternatives_spanish:
  - a mis ojos
  - para mis ojos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El dativo se expresa de manera natural en español como sujeto de la transformación: «que mis ojos se vuelvan». Así se mantiene la imagen sin sonar forzado.'
- source_word: ከመ ይኩና ደመና ማይ
  english_pob_choice: that they might become a cloud of water
  chosen_spanish: una nube de agua
  alternatives_spanish:
  - una nube de lluvia
  - una nube de agua de lluvia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la metáfora repetida «nube de agua» en vez de aplanarla a «lluvia» o «ojos llenos de lágrimas». La repetición tiene fuerza poética y apocalíptica.
- source_word: እብኪ
  english_pob_choice: I may weep
  chosen_spanish: yo llore
  alternatives_spanish:
  - yo pueda llorar
  - yo llore de llanto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El valor de finalidad/resultado se expresa con el subjuntivo en español: «para que yo llore». Mantiene la relación sintáctica del original.'
- source_word: ዲቤክሙ
  english_pob_choice: over you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - por ustedes
  - contra ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural queda claro y visible en español. «Sobre ustedes» conserva el matiz de llanto dirigido a los destinatarios sin decidir excesivamente entre compasión o reproche.
- source_word: እክዐው አንብዐየ
  english_pob_choice: pour out my tears
  chosen_spanish: derrame mis lágrimas
  alternatives_spanish:
  - haga fluir mis lágrimas
  - vierta mis lágrimas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Derramar» reproduce bien la imagen de vertido intenso y es idiomático en español para lágrimas.
- source_word: ከመ ደመና ማይ
  english_pob_choice: like a cloud of water
  chosen_spanish: como una nube de agua
  alternatives_spanish:
  - como una nube de lluvia
  lexicon: Dillmann, Lexicon Liguae Aethiopicae
  rationale: La segunda repetición mantiene la misma metáfora para conservar el paralelismo retórico del verso.
- source_word: አዕርፍ
  english_pob_choice: I would find rest
  chosen_spanish: halle descanso
  alternatives_spanish:
  - encuentre descanso
  - me alivie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Halle descanso» suena más bíblico y conserva la idea de alivio/reposo emocional sin introducir una paráfrasis.
- source_word: እምሐዘነ ልብየ
  english_pob_choice: from the sorrow of my heart
  chosen_spanish: del dolor de mi corazón
  alternatives_spanish:
  - de la tristeza de mi corazón
  - del pesar de mi corazón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Dolor» comunica bien el peso afectivo del lamento en español moderno y mantiene la imagen del corazón afligido.
theological_decisions:
- issue: Conservar la imagen poética de las lágrimas como nube en vez de normalizarla
  english_pob_reading: Retain 'cloud of water' in the main text
  chosen_spanish_reading: Mantener «nube de agua» en el texto principal
  alternative_spanish_readings:
  - «nube de lluvia»
  - paráfrasis como «ojos llenos de lágrimas»
  rationale: La imagen es deliberadamente extraña y debe permanecer visible. El español puede sostenerla sin perder inteligibilidad, y así se preserva el valor poético del original.
  doctrine_reference: 'Translation philosophy: preserve source-text imagery and avoid flattening poetic/apocalyptic language.'
- issue: Interpretación del destinatario plural
  english_pob_reading: The addressee 'you' is plural in context and likely refers to the sinners/wicked addressed in the surrounding woes.
  chosen_spanish_reading: «ustedes» en plural
  alternative_spanish_readings:
  - «vosotros»
  - «ti»
  rationale: El plural es importante para no individualizar indebidamente el reproche/lamento. «Ustedes» es neutral y claro para lectura eclesial amplia.
  doctrine_reference: Contextual grammar and discourse flow in the surrounding woes.
translation_notes:
  revision_awareness: 'El ajuste editorial reciente corrige la omisión del objeto de primera persona en ይሁበኒ y favorece una cadena continua de finalidad/resultado. La versión española refleja ese encadenamiento con subjuntivos coordinados: «me concederá... para que yo llore... y derrame... y halle descanso».'
  spanish_consistency_notes:
  - Se mantiene «nube de agua» por consistencia con la decisión léxica principal y con la repetición retórica del original.
  - Se usa «ustedes» para el plural del destinatario, evitando singularizar el texto.
  - Se conserva un registro bíblico moderno con «halle descanso» y sin arcaísmos innecesarios.
