translation:
  language: es
  text: No teman a los pecadores[a], oh justos, porque otra vez Yahvé[b] los entregará en sus manos, para que ejecuten juicio sobre ellos conforme a su deseo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No teman a causa de los pecadores». El giro etiópico con እም puede expresar separación o causa; en español se optó por una forma idiomática.
    reason: lexical_alternative
  - marker: b
    text: El ge'ez usa un título divino («el Señor»), pero en el texto principal del POB español se emplea «Yahvé» por la convención terminológica del proyecto para referirse al Dios de Israel.
    reason: theological_note
  - marker: c
    text: O «según su voluntad» / «como quieran». La expresión conserva la idea de una autoridad de reversión sobre quienes antes oprimían a los justos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢትፍርሁ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No se asusten
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma es un imperativo negativo plural dirigido a los justos. «No teman» es natural en español y conserva la fuerza exhortativa directa.
- source_word: ጻድቃን
  english_pob_choice: righteous ones
  chosen_spanish: justos
  alternatives_spanish:
  - los justos
  - los rectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo plural señala al grupo de los justos. «Justos» es el equivalente más claro y bíblico en español; se mantiene el valor colectivo sin forzar una calificación extra.
- source_word: እምኃጥኣን
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los pecadores por causa de quienes no teman
  - a causa de los pecadores
  - los impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro etiópico con እም admite el matiz de «a causa de / por causa de». En español, «No teman a los pecadores» comunica de forma idiomática la misma referencia a los opresores sin perder el objeto temido.
- source_word: ካዕበ
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverbio de reiteración. «Otra vez» conserva la idea de reversión repetida con un tono sobrio y natural.
- source_word: ያገብኦሙ
  english_pob_choice: will deliver them
  chosen_spanish: los entregará
  alternatives_spanish:
  - los pondrá
  - los pasará
  - los entregará en poder de ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de «en sus manos», el verbo expresa cederlos al poder de los destinatarios. «Entregará» reproduce bien esa transferencia judicial/apocalíptica.
- source_word: ውስተ እዴክሙ
  english_pob_choice: into your hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en vuestras manos
  - en manos de ustedes
  - bajo su poder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el idiomatismo de poder/control. En español actual, «en sus manos» es la forma más fluida y reconocible para este giro.
- source_word: ከመ ትግበሩ
  english_pob_choice: so that you may execute
  chosen_spanish: para que ejecuten
  alternatives_spanish:
  - para que hagan
  - a fin de que pronuncien
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula expresa propósito. «Ejecuten» conserva la relación con el sustantivo judicial siguiente y mantiene el tono forense.
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - juicio
  - sentencia
  - castigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término pertenece al ámbito judicial. «Juicio» en español puede abarcar tanto veredicto como acto de juzgar, y preserva la tensión apocalíptica mejor que una simplificación a «castigo».
- source_word: በከመ ፈቀድክሙ
  english_pob_choice: according to your pleasure
  chosen_spanish: conforme a su deseo
  alternatives_spanish:
  - según su voluntad
  - como quieran
  - según su deseo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica adecuación a la voluntad/deseo de los justos. «Conforme a su deseo» mantiene el registro elevado y deja abierta la amplitud semántica del giro.
theological_decisions:
- issue: Participación activa de los justos en el juicio
  english_pob_reading: The righteous are addressed as agents who will 'execute judgment' on the sinners once the Lord gives the sinners into their hands.
  chosen_spanish_reading: Los justos son presentados como agentes que ejecutarán juicio cuando el Señor entregue a los pecadores en sus manos.
  alternative_spanish_readings:
  - Los justos solo presencian el juicio de Dios
  - Los justos reciben autoridad sobre los pecadores sin juzgarlos directamente
  rationale: La cláusula de propósito («para que ejecuten juicio») y el idiomatismo de ser entregados «en sus manos» favorecen una participación activa. La redacción española conserva esa tensión apocalíptica sin suavizarla.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: Se revisó la correspondencia con el texto ge'ez y el audit trail en inglés. No se detectaron cambios editoriales posteriores que alteren el sentido; la versión permanece alineada con el pass más reciente, que indica sin cambios.
  spanish_consistency_notes:
  - Se mantiene el registro judicial con «juicio» y «ejecuten» para conservar la fuerza forense del verso.
  - Se usa «Señor» como traducción del título presente en el texto fuente auditado; no se sustituye por un marcador tipográfico.
  - Se conserva el plural de destinatarios con «ustedes/sus» en una forma natural de español neutral, evitando calco arcaizante.
