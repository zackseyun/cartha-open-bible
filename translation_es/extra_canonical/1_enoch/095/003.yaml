base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/095/003.yaml
  text: Do not fear the sinners[a], O righteous ones, for again the Lord will deliver them into your hands[c][b], so that you may execute judgment upon them according to your pleasure.
  footnotes:
  - marker: a
    text: Or 'Do not be afraid because of the sinners.' The Ge'ez construction with እም can be rendered more literally with 'from/because of,' but idiomatic English favors 'fear the sinners.'
    reason: lexical_alternative
  - marker: b
    text: '''Into your hands'' is an idiom for being given into someone''s power or control.'
    reason: cultural_note
  - marker: c
    text: Or 'as you wish' / 'according to your will.' The line depicts the reversal in which the righteous receive authority over those who oppressed them.
    reason: lexical_alternative
