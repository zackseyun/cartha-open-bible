  glossary_alignment: 'Alineación parcial: ''justos'', ''pecadores'', ''juicio'' y la sintaxis general están bien. La desviación importante es እግዚአብሔር renderizado como ''el Señor'' en vez de ''Yahvé'', contra la pauta global del proyecto. No hay motivo suficiente en el expediente para mantener la máscara reverencial.'
  issues:
  - severity: high
    issue: Uso de 'el Señor' en lugar de 'Yahvé'
    rationale: La guía del proyecto exige 'Yahvé' en el texto español principal para el nombre/título divino correspondiente, no 'SEÑOR' ni 'el Señor' como convención de enmascaramiento. La nota actual incluso sugiere 'Yahvé' solo como opción secundaria, lo que invierte la política establecida.
  - severity: low
    issue: La nota b refleja una racionalidad editorial contraria al proyecto
    rationale: Presenta 'el Señor' como elección reverente principal y 'Yahvé' como mera posibilidad. Debe reformularse para explicar que, aunque el ge'ez usa un título divino, el POB español emplea 'Yahvé' por consistencia terminológica.
  revised_spanish_text: No teman a los pecadores[a], oh justos, porque otra vez Yahvé[b] los entregará en sus manos, para que ejecuten juicio sobre ellos conforme a su deseo[c].
  revised_footnotes:
  - marker: a
    text: O «No teman a causa de los pecadores». El giro etiópico con እም puede expresar separación o causa; en español se optó por una forma idiomática.
    reason: lexical_alternative
  - marker: b
    text: El ge'ez usa un título divino («el Señor»), pero en el texto principal del POB español se emplea «Yahvé» por la convención terminológica del proyecto para referirse al Dios de Israel.
    reason: theological_note
  - marker: c
    text: O «según su voluntad» / «como quieran». La expresión conserva la idea de una autoridad de reversión sobre quienes antes oprimían a los justos.
    reason: lexical_alternative
