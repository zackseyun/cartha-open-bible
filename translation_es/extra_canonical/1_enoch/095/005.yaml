translation:
  language: es
  text: ¡Ay de ustedes, que devuelven mal a su prójimo[a], porque se les devolverá según sus hechos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El ge''ez usa la misma raíz verbal en ambas cláusulas: quienes «devuelven» mal recibirán que «se les devolverá» de la misma manera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de vosotros!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula introduce una denuncia profética; en español, «¡Ay de ustedes!» comunica bien el valor oracular de juicio sin sonar demasiado arcaico.
- source_word: ለክሙ
  english_pob_choice: to you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con «ay» en español, la construcción natural es «ay de ustedes», que conserva el tono de reproche dirigido al grupo.
- source_word: ትፈድዩ
  english_pob_choice: repay
  chosen_spanish: pagan
  alternatives_spanish:
  - repagan
  - retribuyen
  - pagan de vuelta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo se entiende aquí como devolver en retribución. «Pagan mal» expresa esa reciprocidad sin volver la frase poco idiomática; el eco verbal se preserva en la segunda cláusula con «se les pagará».
- source_word: እኩየ
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - malvadamente
  - maligno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Mal» es más natural en español dentro de la expresión «pagar mal a alguien», y conserva el peso moral del término ge'ez.
- source_word: ለቢጽክሙ
  english_pob_choice: to your neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - a su semejante
  - a su compañero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Prójimo» comunica una relación ética cercana y es el equivalente bíblico más transparente en español para este contexto.
- source_word: ትትፈደዩ
  english_pob_choice: you will be repaid
  chosen_spanish: se les pagará
  alternatives_spanish:
  - serán retribuidos
  - se les retribuirá
  - se les pagará de vuelta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasivo mantiene la forma de retribución sin nombrar explícitamente al agente, igual que la lectura auditada en inglés. «Se les pagará» conserva la relación léxica con «pagan».
- source_word: በከመ
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - conforme a
  - de acuerdo con
  - en proporción a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Según» expresa medida o norma de retribución de modo breve y natural.
- source_word: ምግባሪክሙ
  english_pob_choice: your deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - su conducta
  - sus acciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obras» es fiel al campo semántico de acciones juzgadas y mantiene el registro bíblico sin forzar una lectura técnica.
theological_decisions:
- issue: Pasivo de retribución y agente implícito
  english_pob_reading: 'A divine or judicial passive is implied: the evildoers will themselves receive recompense proportionate to their actions.'
  chosen_spanish_reading: Se conserva un pasivo impersonal que deja implícito al agente de la retribución, en el marco de una sentencia de juicio.
  alternative_spanish_readings:
  - Dios les pagará según sus obras.
  - la consecuencia moral recaerá sobre ellos según sus hechos.
  rationale: El texto no nombra explícitamente al agente; mantener el pasivo respeta esa tensión y preserva la formulación de juicio sin sobreespecificar la acción divina.
  doctrine_reference: Preservar la tensión teológica entre pasivo divino y formulación impersonal del juicio.
translation_notes:
  revision_awareness: La redacción española sigue la revisión auditada que ajustó el orden para reflejar de manera más natural la idea de «pagar mal al prójimo», manteniendo el paralelismo entre la acción humana y la retribución recibida.
  spanish_consistency_notes:
  - Se usa «prójimo» como equivalente bíblico natural de la relación interpersonal cercana.
  - Se mantiene la reciprocidad léxica con «pagan / se les pagará» para reflejar la raíz repetida del ge'ez.
  - Se evita nombrar explícitamente a Dios como sujeto, siguiendo el pasivo judicial implícito del inglés auditado.
