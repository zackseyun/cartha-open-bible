translation:
  language: es
  text: ¡Ay de ustedes, los que pronuncian maldiciones que no pueden deshacerse[a], y la curación está lejos de ustedes por causa de sus pecados!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «anatemas que no pueden ser desatados»; la expresión ge’ez indica una maldición u obligación pronunciada que no puede revocarse fácilmente.
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de vosotros!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la fuerza profética de denuncia y lamentación del interjección ge’ez, en un español natural y apto para lectura pública.
- source_word: ለክሙ
  english_pob_choice: to you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, después de «¡Ay!», la relación dativa se expresa de forma más natural con «de ustedes» en una fórmula de reproche dirigida al auditorio.
- source_word: ታወግዙ ግዘታተ
  english_pob_choice: who weigh out silver
  chosen_spanish: los que pronuncian maldiciones
  alternatives_spanish:
  - los que pesan plata
  - los que pesan dinero
  - los que imponen maldiciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El estado textual y la revisión señalada en el audit trail muestran que la lectura correcta no es la imagen de plata, sino la de anatemas/maldiciones. «Pronuncian maldiciones» refleja la fuerza performativa del acto sin sobreinterpretarlo como una práctica específica no explicitada en el testimonio base.
- source_word: ከመ እ ይትፈትሑ
  english_pob_choice: so that you may be judged
  chosen_spanish: que no pueden deshacerse
  alternatives_spanish:
  - que no pueden soltarse
  - que no pueden ser anuladas
  - para que no sean levantadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual del audit trail indica que la forma contiene la idea de «no ser desatadas/absoltas»; en español, «deshacerse» comunica de manera clara y natural esa imposibilidad de revocación o liberación.
- source_word: ወፈውስ
  english_pob_choice: and healing
  chosen_spanish: la sanidad
  alternatives_spanish:
  - la curación
  - el remedio
  - la sanación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sanidad» conserva el campo semántico de curación/restauración y suena bien en registro bíblico moderno, sin reducir la idea a lo meramente físico.
- source_word: ርኁቅ እምኔክሙ
  english_pob_choice: is far from you
  chosen_spanish: está lejos de ustedes
  alternatives_spanish:
  - está distante de ustedes
  - se ha alejado de ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa de modo directo y claro la metáfora espacial de distancia para la sanidad/restauración ausente.
- source_word: በእንተ ኃጢአተ ዚአክሙ
  english_pob_choice: because of your sins
  chosen_spanish: por causa de sus pecados
  alternatives_spanish:
  - a causa de sus pecados
  - por sus pecados
  - debido a sus pecados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la relación causal explícita del original y preserva el tono de reprensión colectiva.
theological_decisions:
- issue: Naturaleza de las «maldiciones» / anatemas en el texto
  english_pob_reading: Woe to you who pronounce curses that cannot be undone
  chosen_spanish_reading: ¡Ay de ustedes, los que pronuncian maldiciones que no pueden deshacerse!
  alternative_spanish_readings:
  - ¡Ay de ustedes, los que pronuncian anatemas que no pueden desatarse!
  - ¡Ay de ustedes, los que imponen maldiciones irrevocables!
  rationale: El audit trail corrigió una lectura equivocada de plata/silver y señaló una idea de anatemas o maldiciones irrevocables. En español, «maldiciones que no pueden deshacerse» conserva esa tensión entre palabra pronunciada y su carácter no revocable sin introducir tecnicismos eclesiásticos ajenos al pasaje.
  doctrine_reference: Preservar la lectura corregida del original y no suavizar el juicio profético.
- issue: Relación entre el juicio implícito y la imposibilidad de deshacer la maldición
  english_pob_reading: who pronounce curses that cannot be undone
  chosen_spanish_reading: los que pronuncian maldiciones que no pueden deshacerse
  alternative_spanish_readings:
  - los que pronuncian maldiciones irrevocables
  - los que pronuncian maldiciones que no pueden ser retiradas
  rationale: La formulación española evita resolver el matiz técnico de «looser/absolver» en una sola lectura doctrinal; mantiene la idea de irreversibilidad, que es lo decisivo en el pasaje.
  doctrine_reference: Cuando el testimonio es difícil, conservar la ambigüedad útil en vez de sobreespecificar.
- issue: Sentido de «healing» en el contexto de reprensión apocalíptica
  english_pob_reading: and healing is far from you because of your sins
  chosen_spanish_reading: y la sanidad está lejos de ustedes por causa de sus pecados
  alternative_spanish_readings:
  - y la curación está lejos de ustedes por causa de sus pecados
  - y la sanación está lejos de ustedes por causa de sus pecados
  rationale: «Sanidad» mantiene apertura entre restauración física y restauración integral, coherente con el campo bíblico del término y con el contexto de juicio.
  doctrine_reference: No reducir el alcance del remedio/restauración donde el original no lo hace.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección importante: se descartó la lectura de «weigh out silver» y se adoptó la de maldiciones/anatemas que no pueden desatarse. La redacción española sigue esa revisión textual y evita arrastrar la interpretación errónea anterior.'
  spanish_consistency_notes:
  - Se usa «ustedes» por neutralidad latinoamericana y lectura pública amplia.
  - Se evita «SEÑOR» porque no aparece aquí el Tetragrámaton ni una cita directa del nombre divino.
  - Se evita «Cristo/Mesías» porque el versículo no los contiene.
  - «Sanidad» se mantiene uniforme para el campo de healing/restoration en este verso.
  - Las notas usan marcadores únicos a, b, c y aparecen ancladas en el texto en el punto pertinente.
