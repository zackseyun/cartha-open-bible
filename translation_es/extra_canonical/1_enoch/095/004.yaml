  verdict: revise
  source_alignment_summary: 'El borrador español sigue la corrección principal del audit trail: ya no traduce la frase como dinero/plata ni como juicio legal, sino como maldiciones irrevocables. Eso alinea bien con la revisión adjudicada del ge’ez. Sin embargo, el texto y las notas conservan rastros confusos del historial inglés anterior, y una nota afirma como alternativa precisamente la misma frase ya usada en el texto. También conviene ajustar la expresión española de ፈውስ a una forma más natural y ampliamente legible.'
  spanish_quality_summary: La frase principal es comprensible y digna, pero «la sanidad» suena algo regional/eclesial y menos natural que «la curación» o «la sanación» en español general. «Que no pueden deshacerse» funciona, aunque «ser revocadas» sería más preciso; aun así, puede mantenerse para claridad. El uso de tres notas sobre la misma expresión sobrecarga el verso y no mejora la lectura.
  glossary_alignment: 'No hay términos del glosario principal en juego como Yahvé/Mesías/Espíritu. La decisión clave es léxica: ታወግዙ ግዘታተ debe reflejar maldiciones/anatemas, no plata. El borrador acierta en eso. También preserva la causalidad de «por causa de sus pecados».'
  issues:
  - severity: medium
    issue: «la sanidad» suena menos natural en español general
    rationale: Aunque no es imposible, «sanidad» puede percibirse como regional o denominacional. «La curación» comunica mejor ፈውስ en registro neutral y claro.
  - severity: medium
    issue: Las notas repiten y confunden el historial textual
    rationale: La nota c presenta como alternativa «que no pueden deshacerse», que ya está en el texto; la nota a habla del error anterior de plata, pero eso pertenece al historial de revisión más que a una nota útil para el lector final.
  - severity: low
    issue: Exceso de notas en una sola frase
    rationale: Tres notas sobre el mismo segmento hacen pesada la lectura y no añaden valor proporcional. Una sola nota léxica basta para preservar la alternativa «anatemas»/«desatadas».
  revised_spanish_text: ¡Ay de ustedes, los que pronuncian maldiciones que no pueden deshacerse[a], y la curación está lejos de ustedes por causa de sus pecados!
  revised_footnotes:
