revisions:
- from: Ustedes que han hecho el bien[a], esperen por esos días hasta que[b] aquellos que hacen el mal[c] sean[b] llevados a su fin, y el poder de los pecadores llegue a su fin.
  to: Ustedes que han hecho el bien[a], esperen esos días hasta que aquellos que hacen el mal sean llevados a su fin[b], y el poder de los pecadores llegue a su fin[c].
  rationale: La revisión corrige el uso indebido de marcadores repetidos, reancla cada nota al lugar semánticamente correcto, y mejora levemente la naturalidad del español sin apartarse del sentido documentado del ge'ez ni de la auditoría inglesa. Se conserva «pecadores» por coherencia teológica y «sean llevados a su fin» para reflejar el valor pasivo de ይትፌጸሙ.
