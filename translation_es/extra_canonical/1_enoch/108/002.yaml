translation:
  language: es
  text: Ustedes que han hecho el bien[a], esperen esos días hasta que aquellos que hacen el mal sean llevados a su fin[b], y el poder de los pecadores llegue a su fin[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo exhortativo también puede entenderse como «permanezcan firmes» o «resistan»; el sentido es de perseverancia paciente hasta la caída de los impíos.
    reason: lexical_alternative
  - marker: b
    text: O «sean terminados».
    reason: previous_rendering
  - marker: c
    text: 'La cláusula final repite la idea de consumación o fin: tanto los malhechores mismos como su poder llegan a su término.'
    reason: cross_reference
lexical_decisions:
- source_word: እለ ገበርክሙ ሠናየ
  english_pob_choice: You who have done good
  chosen_spanish: Ustedes que han hecho el bien
  alternatives_spanish:
  - Ustedes que han practicado el bien
  - Ustedes que han hecho lo bueno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma relativa con perfecto describe a un grupo caracterizado por su conducta recta. «Han hecho el bien» conserva la polaridad moral y suena natural en español, sin diluir el contraste con los que hacen el mal.
- source_word: ትጸንሑ
  english_pob_choice: wait
  chosen_spanish: esperen
  alternatives_spanish:
  - permanezcan firmes
  - soporten
  - sean pacientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto exhortativo y temporal, «esperen» comunica la paciencia orientada al futuro que el pasaje requiere. Las alternativas conservan matices reales del verbo, pero «esperen» es la opción más clara y directa.
- source_word: ለእሉ መዋዕል
  english_pob_choice: for those days
  chosen_spanish: por esos días
  alternatives_spanish:
  - para esos días
  - hasta esos días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición ge'ez es flexible; en español «por esos días» mantiene la referencia temporal sin forzar una repetición pesada de la idea de espera, que queda precisada por la cláusula siguiente.
- source_word: እስከ ይትፌጸሙ
  english_pob_choice: until ... are brought to an end
  chosen_spanish: hasta que sean llevados a su fin
  alternatives_spanish:
  - hasta que sean terminados
  - hasta que lleguen a su fin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva ge'ez expresa la terminación de los propios malvados. «Sean llevados a su fin» evita la ambigüedad de una lectura activa y conserva el tono de juicio escatológico. La nota de «are brought to an end» se refleja aquí de manera idiomática.
- source_word: እለ ይገብሩ እኩየ
  english_pob_choice: those who do evil
  chosen_spanish: aquellos que hacen el mal
  alternatives_spanish:
  - los que hacen el mal
  - los malhechores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la correspondencia con «han hecho el bien» y se conserva el contraste ético-verbal del original. «Aquellos que hacen el mal» es suficientemente literal y claro en español bíblico contemporáneo.
- source_word: ወይትፌጸም ኃይሎሙ ለመአብሳን
  english_pob_choice: and the power of the sinners comes to an end
  chosen_spanish: y el poder de los pecadores llegue a su fin
  alternatives_spanish:
  - y la fuerza de los pecadores llegue a su fin
  - y el poder de los malvados llegue a su fin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Poder» traduce ኃይል sin perder su fuerza. «Pecadores» conserva el registro moral-religioso que la POB ya documentó para መአብሳን. Se eligió una formulación simétrica con la cláusula anterior y con el mismo final idiomático.
theological_decisions:
- issue: Si መአብሳን debe rendirse como «pecadores» o «malvados»
  english_pob_reading: sinners
  chosen_spanish_reading: pecadores
  alternative_spanish_readings:
  - malvados
  - malhechores
  rationale: La lectura inglesa preserva el término moral-religioso específico, no solo una valoración general de maldad. «Pecadores» mantiene ese registro y la tensión teológica del juicio, mientras la cláusula anterior ya usa «hacen el mal» para el acto concreto.
  doctrine_reference: Preservar la tensión semántica y terminológica documentada; no neutralizar el lenguaje de juicio.
- issue: Cómo reflejar el valor pasivo de ይትፌጸሙ
  english_pob_reading: are brought to an end
  chosen_spanish_reading: sean llevados a su fin
  alternative_spanish_readings:
  - sean terminados
  - lleguen a su fin
  rationale: La nota revisada del POB aclara que no se trata de una acción que ellos realicen, sino de su terminación o destrucción. En español, la pasiva perifrástica «sean llevados a su fin» comunica mejor esa pasividad que una simple forma intransitiva.
  doctrine_reference: 'Mantener la dirección del juicio: los impíos no se agotan por sí mismos, sino que son puestos fin.'
translation_notes:
  revision_awareness: El inglés auditado pasó de «are finished» a «are brought to an end» para evitar ambigüedad sobre si los malvados terminan la maldad o son terminados ellos mismos. La redacción española sigue esa revisión y mantiene la pasividad del juicio. También conserva la distinción entre la acción malvada («hacen el mal») y el grupo moralmente definido («pecadores»).
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Yahvé» fuera de este verso porque no aparecen en el texto base.
  - «Han hecho el bien» y «hacen el mal» forman un par verbal paralelo y comprensible en español.
  - La coma antes de la cláusula final preserva el paralelismo sintáctico del original.
  - Se usó «pecadores» de manera consistente con el registro moral-religioso documentado en el audit trail inglés.
