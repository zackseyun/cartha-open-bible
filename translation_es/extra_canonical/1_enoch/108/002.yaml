    reason: cross_reference
  revision_rationale: La revisión corrige el uso indebido de marcadores repetidos, reancla cada nota al lugar semánticamente correcto, y mejora levemente la naturalidad del español sin apartarse del sentido documentado del ge'ez ni de la auditoría inglesa. Se conserva «pecadores» por coherencia teológica y «sean llevados a su fin» para reflejar el valor pasivo de ይትፌጸሙ.
