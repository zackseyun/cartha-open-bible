review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del ge''ez y ya incorpora las dos correcciones mayores del rastro de auditoría en inglés: ጽንሑ como «esperen» y ዘኢያስተርኢ como «invisible / no se ve». Conserva adecuadamente «libro de la vida», el plural «libros», la extrañeza de «allí no hay tierra» y la imaginería apocalíptica de juicio y fuego. Sin embargo, hay varios puntos donde el español no refleja de la mejor manera ni el texto fuente ni las decisiones léxicas documentadas.'
  spanish_quality_summary: 'El texto es mayormente claro y legible, pero presenta formulaciones poco naturales o menos fieles para un español bíblico digno: «sus espíritus serán muertos» suena torpe; «de los libros de los santos» introduce una carga eclesiástica que el proyecto busca evitar; «que es invisible» añade una predicación menos cauta que «que no se ve / no se puede ver»; y las notas c y d arrastran alternativas inglesas ya superadas o irrelevantes.'
  glossary_alignment: 'Hay desalineación con la preferencia del proyecto y del English POB para እመጻሕፍተ ቅዱሳን: debe evitarse «santos» cuando «holy ones» se preserva mejor como «los santos/consagrados» solo si hay razón documentada; aquí conviene «los seres santos» o «los santos»? Dado el rationale auditado, lo más fiel y menos eclesiástico en español es «los santos» no ideal, mejor «los seres santos». También debe mantenerse una nota cauta para la expresión difícil de visibilidad, y eliminar notas heredadas que contradicen revisiones aplicadas.'
  issues:
  - severity: high
    issue: «de los libros de los santos» no preserva bien la decisión auditada de evitar sobretonos eclesiásticos de 'saints'
    rationale: El English POB eligió explícitamente 'holy ones' sobre 'saints'. En español, «los santos» es comprensible pero activa con más fuerza una categoría eclesiástica tradicional. En este contexto apocalíptico conviene una formulación más abierta, como «los seres santos», que conserva el plural y el carácter celestial.
  - severity: medium
    issue: «sus espíritus serán muertos» es español poco natural
    rationale: Aunque intenta conservar la violencia judicial, en español resulta forzado. «Sus espíritus serán exterminados» o «serán matados» son opciones; la más equilibrada y natural, sin perder severidad, es «sus espíritus serán exterminados» o «serán muertos a espada» si el texto lo sugiriera, pero aquí no. Se recomienda «serán exterminados» para legibilidad.
  - severity: medium
    issue: «que es invisible» es más interpretativo que la cautela auditada
    rationale: La revisión inglesa corrigió el sentido a 'unseen', pero además mantuvo nota por la dificultad. «Que no se ve» o «que no puede verse» en el texto principal preserva mejor la cautela que una etiqueta ontológica como «invisible».
  - severity: medium
    issue: Las notas c y d son residuos no sustentados por el rastro final
    rationale: La nota d («que no puede mostrarse») contradice una revisión aplicada. La nota c («ardiente con fuerza») no está apoyada por las decisiones léxicas finales del English POB para este versículo. Deben eliminarse para no reintroducir lecturas descartadas.
