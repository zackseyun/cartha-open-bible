revisions:
- from: Pero ustedes, esperen hasta que pase el pecado; porque sus nombres serán borrados del libro de la vida y de los libros de los santos, y su descendencia será destruida para siempre. Y sus espíritus serán muertos, y ellos clamarán y se lamentarán en un lugar desolado, que es invisible[a], y en fuego ardiente[c][d][b]; porque allí no hay tierra.
  to: Pero ustedes, esperen hasta que pase el pecado; porque sus nombres serán borrados del libro de la vida y de los libros de los seres santos, y su descendencia será destruida para siempre. Y sus espíritus serán exterminados, y clamarán y se lamentarán en un lugar desolado, que no se ve[a], y en fuego ardiente[b]; porque allí no hay tierra.
  rationale: 'Se revisa para alinear el español con la evidencia fuente y con el rastro auditado: 1) se reemplaza «los santos» por «los seres santos» para evitar un matiz eclesiástico posterior y conservar el sentido apocalíptico abierto de ''holy ones''; 2) se sustituye «sus espíritus serán muertos» por «serán exterminados» para lograr español natural sin suavizar el juicio; 3) se cambia «que es invisible» por «que no se ve» para mantener mayor cautela frente a una expresión ge''ez difícil; 4) se eliminan las notas heredadas c y d, que reintroducen alternativas ya descartadas o no sustentadas. La nota sobre «allí no hay tierra» se conserva, pero se reancla solo una vez al sintagma relevante.'
