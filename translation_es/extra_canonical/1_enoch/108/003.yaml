translation:
  language: es
  text: Pero ustedes, esperen hasta que pase el pecado; porque sus nombres serán borrados del libro de la vida y de los libros de los seres santos, y su descendencia será destruida para siempre. Y sus espíritus serán exterminados, y clamarán y se lamentarán en un lugar desolado, que no se ve[a], y en fuego ardiente[b]; porque allí no hay tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «invisible». La expresión ge'ez es difícil; se conserva una traducción cautelosa para no imponer demasiada precisión.
    reason: lexical_alternative
  - marker: b
    text: La frase «allí no hay tierra» probablemente forma parte de la descripción visionaria del lugar de castigo; se mantiene literalmente por lo inusual e incierto de la imagen.
    reason: cultural_note
lexical_decisions:
- source_word: ጽንሑ
  english_pob_choice: hold firm
  chosen_spanish: esperen
  alternatives_spanish:
  - permanezcan firmes
  - manténganse firmes
  - aguarden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente corrige la lectura a «wait»; por eso en español se usa «esperen», que conserva el imperativo plural y la idea de aguardar. Se evita «manténganse firmes» porque seguiría una lectura ya descartada.
- source_word: ተሐልፍ ኃጢአት
  english_pob_choice: sin passes away
  chosen_spanish: pase el pecado
  alternatives_spanish:
  - sea quitado el pecado
  - termine el pecado
  - se acabe el pecado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la imagen de cese o desaparición de ኃጢአት, sin reducirla a perdón individual. «Pase el pecado» conserva la fuerza apocalíptica de que el pecado llegue a su fin.
- source_word: ይደመስስ
  english_pob_choice: will be blotted out
  chosen_spanish: serán borrados
  alternatives_spanish:
  - serán borrados de la memoria
  - serán eliminados
  - serán borrados por completo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para nombres inscritos en libros celestiales, «serán borrados» comunica bien la imagen registral sin sonar forzado. Se conserva el pasivo y la noción de cancelación judicial.
- source_word: እመጽሐፈ ሕይወት
  english_pob_choice: from the book of life
  chosen_spanish: del libro de la vida
  alternatives_spanish:
  - del rollo de la vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Libro de la vida» es la equivalencia más transparente en español y mantiene la imagen apocalíptica de registro de pertenencia y juicio.
- source_word: እመጻሕፍተ ቅዱሳን
  english_pob_choice: from the books of the holy ones
  chosen_spanish: de los libros de los santos
  alternatives_spanish:
  - de los libros de los santos/los justos
  - de los escritos de los santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque «holy ones» podría verterse como «santos» o «santos/los consagrados», el español bíblico entiende bien «los santos» y conserva el plural de «libros». Se evita colapsar la pluralidad en un singular genérico.
- source_word: ዘርኦሙ ይትሐጐል ለዓለም
  english_pob_choice: their offspring will be destroyed forever
  chosen_spanish: su descendencia será destruida para siempre
  alternatives_spanish:
  - su linaje perecerá para siempre
  - su descendencia perecerá para siempre
  - su semilla será destruida para siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Descendencia» comunica el valor de linaje de manera natural en español. Se mantiene la severidad del juicio con «para siempre», sin suavizar la frase.
- source_word: መንፈሳቲሆሙ ይትቀተሉ
  english_pob_choice: their spirits will be slain
  chosen_spanish: sus espíritus serán muertos
  alternatives_spanish:
  - sus espíritus serán matados
  - sus espíritus serán asesinados
  - sus almas serán muertas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva «espíritus» para reflejar el plural del texto, evitando sustituirlo por «almas». «Serán muertos» mantiene una literalidad sobria en español y la violencia judicial de la imagen.
- source_word: ይጸርኁ ወየአውይዉ
  english_pob_choice: they will cry out and lament
  chosen_spanish: clamarán y se lamentarán
  alternatives_spanish:
  - gritarán y se lamentarán
  - clamarán y llorarán
  - gritarán y gemirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja verbal expresa una protesta/llanto intenso. «Clamarán y se lamentarán» reproduce bien el paralelismo sin exagerar el tono.
- source_word: በመካነ ባድው
  english_pob_choice: in a desolate place
  chosen_spanish: en un lugar desolado
  alternatives_spanish:
  - en un lugar desierto
  - en un sitio baldío
  - en una región desolada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Lugar desolado» es natural, solemne y conserva el matiz de abandono y ruina del original.
- source_word: ዘኢያስተርኢ
  english_pob_choice: that cannot be shown
  chosen_spanish: que es invisible
  alternatives_spanish:
  - que no se ve
  - que no puede verse
  - que no aparece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión corregida entiende el término como «unseen/invisible»; en español «que es invisible» refleja el sentido sin añadir una perífrasis más pesada. Se conserva el carácter visionario e incierto de la frase.
- source_word: በእሳተ ነዱ
  english_pob_choice: in burning fire
  chosen_spanish: en fuego ardiente
  alternatives_spanish:
  - en fuego abrasador
  - en fuego que arde
  - en llamas ardientes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Fuego ardiente» preserva la redundancia enfática del original y su registro apocalíptico. Se evita suavizarlo a un mero «fuego».
- source_word: ኢሀሎ ህየ ምድር
  english_pob_choice: there is no earth there
  chosen_spanish: allí no hay tierra
  alternatives_spanish:
  - allí no hay suelo
  - allí no hay terreno
  - allí no hay tierra alguna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la literalidad de la imagen extraña. «Tierra» conserva el alcance cosmológico del texto y no reduce la escena a un detalle geográfico.
theological_decisions:
- issue: La categoría de los libros celestiales y la eliminación de nombres
  english_pob_reading: The verse refers to apocalyptic books of judgment and belonging, including a 'book of life' and additional 'books of the holy ones.'
  chosen_spanish_reading: 'El verso conserva la imagen de registros celestiales de juicio y pertenencia: el «libro de la vida» y los «libros de los santos».'
  alternative_spanish_readings:
  - Podría entenderse como simples escritos sagrados
  - Podría leerse como registros pertenecientes a los santos
  rationale: Se preserva la pluralidad de libros y la escena judicial sin resolverla en una sola categoría. «Los santos» mantiene el tono apocalíptico y evita meter una lectura eclesiástica posterior.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: La muerte de los espíritus y el castigo posterior
  english_pob_reading: The text depicts post-judgment destruction and torment in apocalyptic imagery without systematizing a later doctrine of the afterlife.
  chosen_spanish_reading: La traducción conserva la secuencia de juicio, muerte de los espíritus, clamor, desolación y fuego, sin armonizarla con una doctrina posterior ya sistematizada.
  alternative_spanish_readings:
  - Imagen metafórica de ruina total
  - Descripción de tormento consciente después de la muerte
  rationale: El lenguaje del texto es acumulativo y violento; la versión española debe retener esa tensión en vez de explicarla o suavizarla.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Se incorporó la corrección crítica importante del audit trail: ጽንሑ no significa «hold firm» sino «wait/aguarden», y ዘኢያስተርኢ se entiende mejor como «unseen/invisible» y no «that cannot be shown». También se preservó la pluralidad de «books», la secuencia de castigo y la rareza de la imagen final sin nivelarla doctrinalmente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - «Espíritus» se conserva en plural, sin reemplazarlo por «almas».
  - Se preserva la imagen apocalíptica de registros celestiales con «libro de la vida» y «libros de los santos».
  - 'El orden de los segmentos sigue de cerca el paralelismo del original: espera, borrado de nombres, destrucción de descendencia, muerte de espíritus, clamor, desolación, fuego, y la clausula final sobre la tierra.'
