  yaml_path: translation/extra_canonical/1_enoch/108/003.yaml
  text: But you[a], wait until sin passes away; for their names will be blotted out from the book of life and from the books of the holy ones, and their offspring will be destroyed forever. And their spirits will be slain, and they will cry out and lament in a desolate place that is unseen, and in burning fire[d][c][b]; for there is no earth there.
