translation:
  language: es
  text: Y allí vi algo semejante a una nube invisible[a], porque, a causa de su profundidad, no podía mirarla; y vi una llama de fuego ardiendo gloriosamente, y algo semejante a montañas gloriosas[b] daba vueltas y se movía de un lado a otro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La tradición textual de esta frase es difícil. Una lectura anterior entendía algo como «mirar por encima de ella» o «más allá de su extensión», pero la auditoría final favorece el sentido de que, por su profundidad, el vidente no podía mirarla directamente.
    reason: textual_variant
  - marker: b
    text: 'La redacción etíope deja abierta la relación entre la imagen y su número: puede percibirse como una sola masa semejante a montañas o como varias formas montañosas en movimiento.'
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como «se sacudía de un lado a otro» o «era sacudido de un lado a otro», según cómo se tome el movimiento repetido del etíope.
    reason: lexical_alternative
lexical_decisions:
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - contemplé
  lexicon: Dillmann
  rationale: Verbo visionario directo en primera persona; «vi» es natural en español y conserva el carácter testimonial de la visión.
- source_word: በህየ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en aquel lugar
  - ahí
  lexicon: Dillmann
  rationale: Adverbio locativo breve y claro para situar la escena visionaria.
- source_word: ከመ ደመና
  english_pob_choice: something like a cloud
  chosen_spanish: algo semejante a una nube
  alternatives_spanish:
  - como una nube
  - algo como una nube
  lexicon: Dillmann
  rationale: «ከመ» introduce comparación; «algo semejante a» conserva la aproximación visionaria sin identificarla plenamente como una nube ordinaria.
- source_word: ዘኢይትረአይ
  english_pob_choice: invisible
  chosen_spanish: invisible
  alternatives_spanish:
  - que no podía verse
  - no visible
  lexicon: Dillmann
  rationale: «Invisible» recoge de forma compacta el valor de «no visto/no visible» y mantiene el contraste con la visión del narrador.
- source_word: እምዕሙቁ
  english_pob_choice: because
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  lexicon: Dillmann
  rationale: La relación causal es importante aquí; «a causa de» expresa bien la dificultad de visión atribuida a la profundidad.
- source_word: አክሀልኩ / ኢክህልኩ
  english_pob_choice: I was unable
  chosen_spanish: no podía
  alternatives_spanish:
  - no pude
  - no era capaz de
  lexicon: Dillmann
  rationale: La revisión textual favorece el sentido de incapacidad. «No podía» es fluido en español y preserva la imposibilidad de mirar más allá de la nube.
- source_word: ላዕለ ነጽሮ
  english_pob_choice: look upon it
  chosen_spanish: mirar por encima de ella
  alternatives_spanish:
  - mirarla
  - verla
  lexicon: Dillmann
  rationale: La frase etíope sugiere la imposibilidad de mirar por sobre/atravesar el objeto; en español, «mirar por encima de ella» conserva esa relación espacial y la tensión del texto.
- source_word: ላህበ እሳት
  english_pob_choice: a flame of fire
  chosen_spanish: una llama de fuego
  alternatives_spanish:
  - un resplandor de fuego
  - un fogonazo de fuego
  lexicon: Dillmann
  rationale: Expresión semítica enfática conservada de manera literal y comprensible.
- source_word: እንዘ ይነድድ
  english_pob_choice: burning
  chosen_spanish: ardiendo
  alternatives_spanish:
  - mientras ardía
  - en llamas
  lexicon: Dillmann
  rationale: Participio/acción continua bien reflejada por «ardiendo».
- source_word: ስቡሕ
  english_pob_choice: gloriously
  chosen_spanish: gloriosamente
  alternatives_spanish:
  - espléndidamente
  - en gloria
  lexicon: Dillmann
  rationale: Mantiene el valor de gloria/esplendor con un adverbio directo y de registro solemne.
- source_word: ይትከበቡ
  english_pob_choice: was circling
  chosen_spanish: daba vueltas
  alternatives_spanish:
  - giraba
  - estaba girando
  lexicon: Dillmann
  rationale: El verbo plural/repetitivo describe movimiento circular; «daba vueltas» comunica bien la acción iterativa sin forzar una interpretación demasiado técnica.
- source_word: ከመ አድባር ስቡሓን
  english_pob_choice: something like glorious mountains
  chosen_spanish: algo semejante a montañas gloriosas
  alternatives_spanish:
  - como montañas gloriosas
  - algo como montañas gloriosas
  lexicon: Dillmann
  rationale: Se preserva la comparación y el plural visible en español. «Montañas gloriosas» mantiene la imagen elevada sin suavizarla.
- source_word: ይትሀወኩ ለፌ ወለፌ
  english_pob_choice: moving this way and that way
  chosen_spanish: se movía de un lado a otro
  alternatives_spanish:
  - se agitaba de un lado a otro
  - se movía acá y allá
  lexicon: Dillmann
  rationale: La repetición direccional sugiere alternancia; esta fórmula española es clara y conserva el vaivén del original.
theological_decisions:
- issue: Cómo traducir la nube «invisible» que, sin embargo, es vista en la visión
  english_pob_reading: something like an invisible cloud
  chosen_spanish_reading: algo semejante a una nube invisible
  alternative_spanish_readings:
  - algo semejante a una nube que no se veía
  - algo semejante a una nube no visible
  rationale: 'La escena es visionaria y paradójica: el narrador ve algo que, por su condición o profundidad, no se deja ver plenamente. Se conserva esa tensión en vez de resolverla en una imagen meteorológica ordinaria.'
  doctrine_reference: Preservar la tensión apocalíptica de la visión, no armonizarla en exceso.
- issue: Lectura causal de la incapacidad de mirar más allá de la nube
  english_pob_reading: for because of its depth I was unable to look upon it
  chosen_spanish_reading: porque, a causa de su profundidad, no podía mirar por encima de ella
  alternative_spanish_readings:
  - porque, por su profundidad, no podía verla bien
  - pues, debido a su profundidad, no podía mirarla
  rationale: La revisión textual favorece la negación de capacidad («no podía») y la causa en la profundidad. La expresión española intenta reflejar el obstáculo visual sin introducir una explicación ajena al texto.
  doctrine_reference: Seguir la corrección textual indicada en la auditoría y conservar el sentido de imposibilidad.
- issue: Si la frase final describe una sola entidad o varias cosas semejantes a montañas
  english_pob_reading: and something like glorious mountains was circling and moving this way and that way
  chosen_spanish_reading: y algo semejante a montañas gloriosas daba vueltas y se movía de un lado a otro
  alternative_spanish_readings:
  - y cosas semejantes a montañas gloriosas daban vueltas y se movían de un lado a otro
  - y algo semejante a montañas gloriosas giraba y se movía de un lado a otro
  rationale: La auditoría muestra tensión entre singularidad aparente y verbos plurales en el etíope. En español se opta por una formulación que conserve la ambigüedad visual del conjunto sin cerrar demasiado la imagen.
  doctrine_reference: Conservar la ambigüedad del testimonio visionario y la posible oscilación entre singularidad aparente y pluralidad verbal.
translation_notes:
  revision_awareness: 'La versión anterior del audit trail fue revisada por un problema mayor en la lectura de አክሀልኩ / ኢክህልኩ y por el tratamiento de los verbos finales como singulares. Esta propuesta sigue la corrección aprobada: la nube no se describe como algo cuya medida el narrador logra mirar, sino como un objeto cuya profundidad impide la visión; además, conserva la dificultad del tramo final con una redacción española que no aplana la posible oscilación entre singular y plural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en general para el proyecto, pero aquí no aparece el Tetragrámaton.
  - Se usa «gloriosamente» para ስቡሕ, en línea con el valor de gloria/esplendor del término.
  - Se evita «siervo» porque no hay δοῦλος en este versículo.
  - Se conserva un registro apocalíptico sobrio, sin modernizar la imagen hasta volverla explicativa.
