  to: Y allí vi algo semejante a una nube invisible[a], porque, a causa de su profundidad, no podía mirarla; y vi una llama de fuego ardiendo gloriosamente, y algo semejante a montañas gloriosas[b] daba vueltas y se movía de un lado a otro[c].
  rationale: Se corrige una frase española que retenía una formulación inglesa previamente descartada («mirar por encima de ella»). «No podía mirarla» refleja mejor la revisión auditada final («I was unable to look upon it»), mejora la naturalidad del español y evita sobreinterpretar la relación espacial. Se conservan la paradoja visionaria, la ambigüedad de la imagen montañosa y las alternativas léxicas en notas.
