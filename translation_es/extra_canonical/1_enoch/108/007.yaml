  language: en
  yaml_path: translation/extra_canonical/1_enoch/108/007.yaml
  text: For there are writings and records concerning them in heaven above[a], so that the angels may read them and know what will come upon the sinners, and upon the humble in spirit, and upon those who afflicted their bodies and received recompense from God[d][c][b], and those who were put to shame by evil men.
  footnotes:
  - marker: a
    text: The paired expression rendered 'writings and records' is difficult. The second term can be understood in more than one way; the translation follows the sense of heavenly written records because the next clause says the angels read them.
    reason: lexical_alternative
  - marker: b
    text: Or 'the humble souls.' The Ge'ez literally speaks of 'humble spirits/souls.'
    reason: lexical_alternative
  - marker: c
    text: The final clause may also be rendered 'those who were reproached/despised by evil men.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the humble in spirit'.
