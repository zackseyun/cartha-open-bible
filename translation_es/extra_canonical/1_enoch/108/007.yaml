review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura general del versículo: existencia de documentos celestiales, lectura angélica, y conocimiento de lo que sobrevendrá a varios grupos. Sin embargo, hay dos puntos de fidelidad mejorables. Primero, «en el cielo arriba» suena calcado y poco natural para ላዕለ በሰማይ; «arriba en el cielo» conserva mejor la imagen sin español forzado. Segundo, y más importante, «los humildes de espíritu» se aparta del dato gramatical ge''ez señalado en el propio expediente, donde መናፍስት ትኁታን es literalmente «espíritus humildes». Aunque el inglés volvió a una forma más idiomática, el rastro de auditoría documenta que la frase nominal literal refleja mejor la estructura fuente. En español, «los espíritus humildes» es suficientemente claro y más fiel que una formulación disposicional.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «en el cielo arriba» resulta poco idiomático. El resto fluye bien. «Hombres malos» es comprensible, aunque algo llano; no requiere cambio obligatorio porque preserva el valor moral de እኩያን. «Recompensa de parte de Dios» es natural y teológicamente prudente.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto (Dios, etc.). La revisión propuesta no afecta términos base. Sí conviene alinear la frase sobre መናፍስት ትኁታን con la documentación lexical del expediente mediante «espíritus humildes», manteniendo la nota alternativa si se desea reflejar la opción idiomática.
  issues:
  - severity: medium
    issue: «los humildes de espíritu» suaviza una frase nominal que el expediente lexical identifica como «espíritus humildes»
    rationale: La propia auditoría registra que el ge'ez es sustantivo + adjetivo, no una construcción equivalente a «humildes en/de espíritu». En este caso, el español puede conservar la literalidad sin volverse ininteligible.
  - severity: low
    issue: «en el cielo arriba» suena poco natural en español
    rationale: Es un calco comprensible, pero «arriba en el cielo» o «en lo alto del cielo» expresa mejor el locativo elevado sin rigidez.
