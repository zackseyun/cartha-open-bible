translation:
  language: es
  text: Porque hay escritos y registros acerca de ellos arriba en el cielo[a], para que los ángeles los lean y sepan lo que vendrá sobre los pecadores, y sobre los espíritus humildes[b], y sobre los que afligieron sus cuerpos y recibieron recompensa de parte de Dios, y sobre los que fueron avergonzados por hombres malos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La pareja etiópica traducida aquí como «escritos y registros» es difícil. El segundo término puede entenderse de más de una manera; se sigue el sentido de documentos celestiales porque la cláusula siguiente dice que los ángeles los leen.
    reason: lexical_alternative
  - marker: b
    text: O «los humildes de espíritu». El ge'ez dice literalmente «espíritus humildes».
    reason: lexical_alternative
  - marker: c
    text: La última cláusula también puede verterse «los que fueron reprochados/despreciados por hombres malos».
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Puesto que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce la explicación o base de lo dicho antes; en español, «Porque» preserva claramente la relación causal/explicativa sin sonar forzado.
- source_word: ጽሑፋን
  english_pob_choice: writings
  chosen_spanish: escritos
  alternatives_spanish:
  - escrituras
  - documentos
  - libros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término remite a cosas escritas; «escritos» mantiene amplitud y naturalidad en español sin especificar más de lo que el etíope exige.
- source_word: እኩያን
  english_pob_choice: records
  chosen_spanish: registros
  alternatives_spanish:
  - memoriales
  - archivos
  - asientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el sentido es difícil, pero el contexto de lectura angelical y conocimiento de destinos favorece documentos celestiales; «registros» conserva esa idea sin sobretraducir como «libros».
- source_word: ላዕለ በሰማይ
  english_pob_choice: in heaven above
  chosen_spanish: en el cielo arriba
  alternatives_spanish:
  - en los cielos arriba
  - arriba en el cielo
  - en el cielo de arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción conserva tanto la localización celestial como el matiz enfático de «arriba». «En el cielo arriba» suena algo marcado, pero reproduce bien la imagen apocalíptica.
- source_word: ከመ ይንብብዎሙ መላእክት
  english_pob_choice: so that the angels may read them
  chosen_spanish: para que los ángeles los lean
  alternatives_spanish:
  - a fin de que los ángeles los lean
  - de modo que los ángeles los lean
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula de propósito pide un equivalente natural; el objeto pronominal «los» retoma «escritos y registros» de manera clara.
- source_word: ወይእምሩ
  english_pob_choice: and know
  chosen_spanish: y sepan
  alternatives_spanish:
  - y conozcan
  - y entiendan
  - y aprendan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Saber»/«conocer» es directo; en esta secuencia con lectura de registros, «sepan» funciona bien y mantiene el resultado cognitivo.
- source_word: ዘሀሎ ይብጽሖሙ
  english_pob_choice: what will come upon
  chosen_spanish: lo que vendrá sobre
  alternatives_spanish:
  - lo que les acontecerá
  - lo que les sobrevendrá
  - lo que caerá sobre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión apunta a algo que ha de acontecer a esos grupos; «vendrá sobre» conserva la fuerza apocalíptica de lo que se cierne sobre ellos.
- source_word: ለኃጥኣን
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los pecadores culpables
  - los impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una categoría moral estándar; «pecadores» es la equivalencia natural y fiel en español.
- source_word: ለመናፍስት ትኁታን
  english_pob_choice: the humble in spirit
  chosen_spanish: los humildes de espíritu
  alternatives_spanish:
  - los espíritus humildes
  - los humildes en espíritu
  - los de espíritu humilde
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión de la evidencia ge'ez favorece una frase nominal literal («espíritus humildes»), pero en español «los humildes de espíritu» preserva la referencia interior y evita una formulación extraña; mantiene el contraste con los otros grupos nombrados.
- source_word: እለ አሕመሙ ሥጋሆሙ
  english_pob_choice: those who afflicted their bodies
  chosen_spanish: los que afligieron sus cuerpos
  alternatives_spanish:
  - los que maltrataron sus cuerpos
  - los que mortificaron sus cuerpos
  - los que padecieron en sus cuerpos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Afligieron» sigue de cerca el verbo y conserva la severidad sin introducir necesariamente una lectura ascética más específica que el texto no obliga a adoptar.
- source_word: ወተፈድዩ በኀበ አምላክ
  english_pob_choice: and received recompense from God
  chosen_spanish: y recibieron recompensa de parte de Dios
  alternatives_spanish:
  - y recibieron recompensa de Dios
  - y fueron recompensados por Dios
  - y recibieron retribución de Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Recompensa» conserva la posibilidad de vindicación o recompensa positiva que el audit trail destaca, sin cerrar indebidamente el matiz de retribución; «de parte de Dios» evita endurecer la construcción.
- source_word: እለ ኀሥሡ እምእኩያን ሰብእ
  english_pob_choice: those who were put to shame by evil men
  chosen_spanish: los que fueron avergonzados por hombres malos
  alternatives_spanish:
  - los que fueron avergonzados por hombres perversos
  - los que fueron reprochados por hombres malos
  - los que fueron despreciados por hombres malos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula es difícil; «avergonzados» recoge bien el posible sentido de deshonra. «Hombres malos» mantiene el valor moral de እኩያን sin suavizarlo.
theological_decisions:
- issue: Sentido de los escritos celestiales
  english_pob_reading: The verse refers to heavenly written records that angels read in order to know the destinies of various human groups.
  chosen_spanish_reading: El versículo habla de escritos y registros celestiales que los ángeles leen para conocer lo que ha de sobrevenir a distintos grupos humanos.
  alternative_spanish_readings:
  - El versículo podría referirse a libros de juicio en el cielo.
  - Podría entenderse como memoriales celestiales de obras humanas.
  rationale: La sintaxis y la imagen de los ángeles leyendo favorecen claramente una escena de documentación celestial. La traducción conserva la ambigüedad de «escritos y registros» sin reducirla a una sola forma de libro.
  doctrine_reference: Conservar la imaginería apocalíptica de libros celestiales; no banalizarla como simple metáfora administrativa.
- issue: Valor de la recompensa divina para los que afligieron sus cuerpos
  english_pob_reading: The recompense is presented positively, referring to vindication or reward from God for suffering/endurance.
  chosen_spanish_reading: «Recompensa» se mantiene como un término deliberadamente amplio, capaz de abarcar vindicación o remuneración divina sin fijar de antemano si es estrictamente premio o retribución.
  alternative_spanish_readings:
  - «Retribución» podría sonar más neutral o incluso punitiva.
  - «Premio» sería más claramente positivo.
  rationale: El contexto sugiere un trato favorable hacia quienes sufrieron, pero el término etíope admite cierta amplitud. «Recompensa» preserva esa tensión y evita cerrar el sentido demasiado pronto.
  doctrine_reference: Respetar la tensión lexical y no imponer una lectura ascética posterior que el texto no exige.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió la gramática del ge'ez para entender መናፍስት ትኁታን como «espíritus humildes» y no como una construcción equivalente a «humilde en espíritu». En español, sin embargo, se optó por una formulación natural y eclesialmente legible («los humildes de espíritu») sin perder la referencia interior del grupo ni el contraste estructural del versículo. También se conservó el valor documental de «writings and records» y el alcance abierto de «recompensa» según el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para አምላክ y no se introdujo «Señor».
  - Se evitó «Cristo» porque el versículo no contiene Χριστός/Mesías.
  - Se prefirió «pecadores» para ኃጥኣን y «hombres malos» para እኩያን, conservando el paralelismo moral del pasaje.
  - Se usó «recompensa» en vez de «premio» o «retribución» para preservar la ambigüedad valorativa documentada en el contexto inglés.
