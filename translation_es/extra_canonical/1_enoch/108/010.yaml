base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/108/010.yaml
  text: And I have spoken of all their blessings in the books[a], and I have appointed them for their leaders, because these are found to love heaven more than their life in the world; and while they are oppressed by evil men[e][d][c][b], they hear from them abuse and reviling and suffer shame while blessing me.
  footnotes:
  - marker: a
    text: Literally, 'their heads.' The phrase may mean their leaders or chiefs; the Ge'ez wording is difficult.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'their breath in the world.' Here 'breath' is rendered as 'life' to convey the idiom.
    reason: lexical_alternative
  - marker: c
    text: The final clause reads 'while blessing me.' The first-person object is retained as written, though some interpreters suspect a difficult or corrupt reading here.
    reason: textual_variant
  - marker: d
    text: Or 'and I have set them down for their leaders'.
    reason: previous_rendering
  - marker: e
    text: Or 'and hear from them abuse and reviling, they endure it while blessing me.'.
    reason: previous_rendering
