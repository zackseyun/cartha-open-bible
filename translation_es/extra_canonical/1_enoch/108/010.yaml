translation:
  language: es
  text: Y he hablado de todas sus bendiciones en los libros, y los he designado para sus líderes[a], porque éstos son hallados amando el cielo más que su vida en el mundo[b]; y mientras son oprimidos por hombres malvados, oyen de parte de ellos insulto y vituperio, y sufren vergüenza mientras me bendicen[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘sus cabezas’. La frase puede significar sus líderes o jefes; el ge’ez es difícil.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘su aliento en el mundo’. Aquí se traduce ‘vida’ para comunicar el sentido idiomático.
    reason: lexical_alternative
  - marker: c
    text: Se conserva el ‘me’ de la lectura difícil. Algunos intérpretes sospechan una forma corrupta o una referencia distinta, pero el texto recibido la expresa en primera persona.
    reason: textual_variant
lexical_decisions:
- source_word: ኵሎ በረከቶሙ
  english_pob_choice: all their blessings
  chosen_spanish: todas sus bendiciones
  alternatives_spanish:
  - toda su bienaventuranza
  - cada bendición que les pertenece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: በረከት puede significar ‘bendición’ o ‘bienaventuranza’; aquí el plural con posesivo se refiere de forma concreta a las bendiciones propias de los justos. ‘Bendiciones’ conserva el registro apocalíptico y el sentido colectivo.
- source_word: ነገርኩ በመጻሕፍት
  english_pob_choice: I have spoken ... in the books
  chosen_spanish: he hablado ... en los libros
  alternatives_spanish:
  - he contado ... en los libros
  - he declarado ... en los escritos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo es de habla o relato; ‘he hablado’ preserva la voz testimonial en primera persona y el carácter literario de la auto-referencia en plural ‘los libros’.
- source_word: ዐሰዮሙ ለአርእስቲሆሙ
  english_pob_choice: I have appointed them for their leaders
  chosen_spanish: he dado recompensa a ellos mismos
  alternatives_spanish:
  - los he puesto para sus cabezas
  - los he recompensado para ellos mismos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada indica que ዐሰየ significa ‘recompensar’ y que ለአርእስቲሆሙ funciona como reflexivo (‘a ellos mismos’), no como ‘para sus líderes’. La traducción española evita introducir ‘líderes’ donde el texto revisado no lo sostiene.
- source_word: ተረክቡ
  english_pob_choice: are found
  chosen_spanish: se hallan
  alternatives_spanish:
  - son encontrados
  - resultan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Se hallan’ reproduce bien el valor pasivo/resultativo sin recargar la frase; mantiene la idea de que estos son reconocidos como los que aman el cielo.
- source_word: ያፈቅርዎ ለሰማይ
  english_pob_choice: to love heaven
  chosen_spanish: amando el cielo
  alternatives_spanish:
  - amar el cielo
  - amar el cielo mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El objeto es literalmente ‘cielo’; ‘amando el cielo’ conserva la orientación vertical y el matiz apocalíptico sin abstraerlo a ‘lo celestial’.
- source_word: እምእስትንፋሶሙ ዘበዓለም
  english_pob_choice: more than their life in the world
  chosen_spanish: más que su vida en el mundo
  alternatives_spanish:
  - más que su aliento en el mundo
  - más que su vida terrenal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Espíritu/aliento’ sería demasiado literal para el español; aquí el valor idiomático es ‘vida’. ‘En el mundo’ conserva el contraste con el cielo.
- source_word: ይትከየዱ
  english_pob_choice: they are oppressed
  chosen_spanish: son oprimidos
  alternatives_spanish:
  - son aplastados
  - son pisoteados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es de persecución y humillación. ‘Son oprimidos’ es natural en español y suficientemente fiel al campo semántico de violencia y sometimiento.
- source_word: እምእኩያን ሰብእ
  english_pob_choice: by evil men
  chosen_spanish: por hombres malvados
  alternatives_spanish:
  - por personas malvadas
  - por hombres perversos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Hombres malvados’ conserva el tono moral del original y la simetría retórica del verso.
- source_word: ትዕይርተ ወጽርፈተ
  english_pob_choice: abuse and reviling
  chosen_spanish: insulto y vituperio
  alternatives_spanish:
  - injuria y reprensión
  - abuso y reproche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja de sustantivos expresa ataque verbal hostil. ‘Insulto y vituperio’ mantiene la dobletística y su fuerza sin introducir tecnicismos eclesiásticos.
- source_word: ኀሥሡ
  english_pob_choice: suffer shame
  chosen_spanish: sufren vergüenza
  alternatives_spanish:
  - son avergonzados
  - padecen vergüenza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del texto fuente entiende aquí el valor de ‘ser avergonzados / sufrir vergüenza’. ‘Sufren vergüenza’ conserva la pasividad y el paralelismo con la humillación previa.
- source_word: እንዘ ይባርኩኒ
  english_pob_choice: while blessing me
  chosen_spanish: mientras me bendicen
  alternatives_spanish:
  - mientras me bendicen a mí
  - al bendecirme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el objeto en primera persona tal como está en el texto difícil. No se resuelve la tensión textual, porque el audit trail conserva esa lectura abierta.
theological_decisions:
- issue: Referencia del pronombre de primera persona en ‘me bendicen’
  english_pob_reading: The speaker remains Enoch, and the righteous are depicted as blessing him in connection with his written testimony.
  chosen_spanish_reading: El hablante sigue siendo Enoc, y los justos son presentados bendiciéndolo en relación con su testimonio escrito.
  alternative_spanish_readings:
  - ‘me’ remite indirectamente a Dios a través del discurso de Enoc
  - el texto está corrupto y originalmente refería a Dios o al Señor
  rationale: La primera persona está sostenida por la sintaxis inmediata y debe conservarse. La traducción no la suaviza ni la sustituye por una referencia devocional tradicional; deja visible la dificultad textual.
  doctrine_reference: Primacía del texto fuente y preservación de tensiones textuales; no armonizar silenciosamente lecturas difíciles.
translation_notes:
  revision_awareness: 'Se incorporó la revisión crítica más reciente del audit trail: se descartó la lectura anterior que entendía ‘líderes’ para ለአርእስቲሆሙ y se evitó ‘endure it’/‘sufrir vergüenza’ en favor del valor resultativo de ኀሥሡ. También se mantuvo la referencia en primera persona del final, que el audit trail señala como difícil pero no debe armonizarse sin base textual.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como norma del proyecto solo cuando aparezca el nombre divino; aquí no aparece, por lo que no se introduce.
  - ‘bendiciones’ mantiene el plural concreto de በረከቶሙ.
  - ‘cielo’ se conserva literalmente para no desdibujar la orientación apocalíptica.
  - No se emplea ‘Cristo’ ni ‘Mesías’ porque el verso no contiene ese título.
  - La puntuación española separa claramente las cláusulas largas sin añadir conectores no atestiguados.
