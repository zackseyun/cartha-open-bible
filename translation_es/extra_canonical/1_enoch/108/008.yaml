translation:
  language: es
  text: los que aman a Dios, y no amaron el oro ni la plata ni ninguna de las cosas buenas que están en el mundo[b], sino que entregaron sus cuerpos[a] a la aflicción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Geʽez ሥጋ puede traducirse como «carne» o «cuerpo»; aquí se elige «cuerpos» por mayor claridad en español, aunque la expresión sigue enfatizando un padecimiento encarnado.
    reason: lexical_alternative
  - marker: b
    text: La frase equivalente a «las cosas buenas que están en el mundo» refleja una formulación algo áspera en el testimonio etiópico transmitido; puede entenderse de forma amplia como bienes deseables del mundo.
    reason: textual_variant
lexical_decisions:
- source_word: እለ
  english_pob_choice: those who
  chosen_spanish: los que
  alternatives_spanish:
  - aquellos que
  - las personas que
  lexicon: Dillmann
  rationale: El marcador relativo plural introduce un grupo caracterizado; «los que» conserva esa relación de manera natural en español.
- source_word: ያፈቅርዎ ለአምላክ
  english_pob_choice: love God
  chosen_spanish: aman a Dios
  alternatives_spanish:
  - aman a Dios
  - aman a Dios con devoción
  - aman a Dios
  lexicon: Dillmann
  rationale: El verbo expresa amor dirigido a Dios; «aman a Dios» mantiene la fuerza relacional sin añadir una glosa excesiva.
- source_word: ወኢወርቀ ወኢብሩረ አፍቀሩ
  english_pob_choice: did not love gold or silver
  chosen_spanish: no amaron el oro ni la plata
  alternatives_spanish:
  - no amaron el oro ni la plata
  - no desearon el oro ni la plata
  - no amaron el oro ni la plata
  lexicon: Dillmann
  rationale: Se conserva el paralelismo con «aman a Dios» mediante «amar»; «oro» y «plata» representan fielmente los metales preciosos mencionados.
- source_word: ወኢኵሎ ሠናየ ዘውስተ ዓለም
  english_pob_choice: or any of the good things that are in the world
  chosen_spanish: ni ninguna de las cosas buenas que están en el mundo
  alternatives_spanish:
  - ni ninguna de las cosas buenas que están en el mundo
  - ni todo lo bueno que hay en el mundo
  - ni ninguna cosa buena del mundo
  lexicon: Dillmann
  rationale: La formulación inglesa es algo áspera por la evidencia textual; el español mantiene la amplitud distributiva de «ninguna de las cosas buenas» sin resolver demasiado la ambigüedad.
- source_word: አላ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - sino
  lexicon: Dillmann
  rationale: Hay un contraste fuerte entre no amar bienes mundanos y la acción positiva final; «sino que» expresa mejor esa oposición en español.
- source_word: ወሀቡ ሥጋሆሙ
  english_pob_choice: gave their bodies to affliction
  chosen_spanish: entregaron sus cuerpos a la aflicción
  alternatives_spanish:
  - entregaron sus cuerpos a la aflicción
  - dieron sus cuerpos a la aflicción
  - entregaron su carne a la aflicción
  lexicon: Dillmann
  rationale: «Cuerpos» traduce ሥጋ de modo claro y auditable en un contexto de sufrimiento corporal; «entregaron» preserva el valor voluntario de la acción.
- source_word: ለጻዕር
  english_pob_choice: to affliction
  chosen_spanish: a la aflicción
  alternatives_spanish:
  - a la aflicción
  - al sufrimiento
  - a la tribulación
  lexicon: Dillmann
  rationale: «Aflicción» mantiene el tono de padecimiento y la amplitud semántica del término sin reducirlo a trabajo o mera fatiga.
theological_decisions:
- issue: Naturaleza del contraste entre amor a Dios y rechazo de bienes materiales
  english_pob_reading: A deliberate renunciation of worldly goods out of devotion to God
  chosen_spanish_reading: Una renuncia deliberada a los bienes mundanos por devoción a Dios
  alternative_spanish_readings:
  - Una mera descripción de pobreza material
  - Una condena general solo de la avaricia
  rationale: El enlace entre amar a Dios y no amar oro/plata, seguido del sufrimiento corporal voluntario, apunta a renuncia intencional y no solo a carencia económica. La redacción española mantiene esa tensión sin suavizarla.
  doctrine_reference: Preservar la tensión local entre devoción, renuncia y padecimiento; no resolverla en una sola categoría moral o social.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para eliminar «over» de la clausula final y dejar «gave their bodies to affliction»; la redacción española sigue esa decisión con una construcción directa y formal: «entregaron sus cuerpos a la aflicción».'
  spanish_consistency_notes:
  - Se mantiene «Dios» conforme al valor del término divino en el proyecto.
  - Se conserva «aflicción» para no aplanar el matiz ascético/sufriente del cierre.
  - Se usa «cuerpos» en lugar de «carne» para mayor claridad, aunque la nota reconoce la alternativa léxica del original.
