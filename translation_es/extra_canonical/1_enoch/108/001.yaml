translation:
  language: es
  text: Otro libro que Enoc escribió para su hijo Matusalén, y para los que vendrán después de él y guardarán la ordenanza[a] en los postreros días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el orden», «la ordenanza» o «el camino prescrito». El término ge'ez puede denotar una norma establecida o un patrón que debe observarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ካልእ
  english_pob_choice: Another
  chosen_spanish: Otro
  alternatives_spanish:
  - Un segundo
  - Un adicional
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «Otro» transmite de modo natural la idea de un escrito adicional distinto del anterior sin sobreespecificar secuencia ni introducir matices innecesarios.
- source_word: መጽሐፍ
  english_pob_choice: book
  chosen_spanish: libro
  alternatives_spanish:
  - escrito
  - rollo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido ordinario de መጽሐፍ es «libro» o «escrito». «Libro» conserva el tono de encabezamiento o superscripción y es la equivalencia más transparente en español.
- source_word: ዘጸሐፈ
  english_pob_choice: that ... wrote
  chosen_spanish: que ... escribió
  alternatives_spanish:
  - que ... compuso
  - el cual ... escribió
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción relativa se refleja de manera directa con «que ... escribió», manteniendo el valor verbal del ge'ez sin pasar a una paráfrasis más interpretativa como «compuso».
- source_word: ለወልዱ ማቱሳላ
  english_pob_choice: for his son Methuselah
  chosen_spanish: para su hijo Matusalén
  alternatives_spanish:
  - a su hijo Matusalén
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El dativo puede expresarse como «para» o «a». Aquí «para» comunica bien que el libro está destinado a su hijo como destinatario previsto.
- source_word: ለእለ ይመጽኡ እምድኅሬሁ
  english_pob_choice: for those who will come after him
  chosen_spanish: para los que vendrán después de él
  alternatives_spanish:
  - para los que vienen después de él
  - para las generaciones que vendrán después de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase apunta a personas posteriores a Matusalén. «Vendrán después de él» conserva la orientación futura del texto y su referencia personal.
- source_word: የዓቅቡ
  english_pob_choice: keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - mantendrán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo abarca la idea de guardar, observar o preservar. En español, «guardarán» funciona bien con una norma prescrita y conserva la fuerza de observancia activa.
- source_word: ሥርዐተ
  english_pob_choice: the ordinance
  chosen_spanish: la ordenanza
  alternatives_spanish:
  - el orden
  - la regla
  - el precepto
  lexicon: Dillmann, Lexicon Linguae Aethiopiae
  rationale: El sustantivo puede denotar orden, norma, reglamento u ordenanza establecida. «Ordenanza» refleja el carácter normativo y formal que la revisión inglesa privilegió con «ordinance».
- source_word: በደኃሪ መዋዕል
  english_pob_choice: in the latter days
  chosen_spanish: en los postreros días
  alternatives_spanish:
  - en los últimos días
  - al final de los días
  - en los días postreros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión conserva el registro escatológico del original. «Postreros días» mantiene una resonancia bíblica digna en español sin convertirla en una explicación doctrinal ajena al texto.
theological_decisions:
- issue: Valor escatológico de «በደኃሪ መዋዕል»
  english_pob_reading: in the latter days
  chosen_spanish_reading: en los postreros días
  alternative_spanish_readings:
  - en los últimos días
  - al final de los días
  - en tiempos posteriores
  rationale: En el marco apocalíptico de 1 Enoc, la expresión tiene una carga de tiempos finales. Se conserva esa tensión escatológica sin imponer una cronología doctrinal posterior más allá de lo que el texto dice.
  doctrine_reference: Preservar la tensión apocalíptica del texto; no resolverla con un esquema doctrinal posterior.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «rule» por «ordinance» para ሥርዐተ, reforzando un matiz normativo y formal. La versión española sigue esa decisión con «ordenanza» y mantiene la estructura sintáctica del texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto solo cuando aparezca el tetragrámaton; aquí no aparece, así que no se usa.
  - Se conserva «Matusalén» como forma castellana usual del nombre propio.
  - «Ordenanza» se emplea aquí en sentido normativo y no como término eclesiástico tradicional, siguiendo el valor léxico del ge'ez y la revisión auditada.
  - La puntuación y el orden de las cláusulas siguen de cerca la estructura del original, sin añadir sujetos o verbos ajenos al texto.
