base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/108/006.yaml
  text: 'And he said to me[a], “This is the place that you see: here the spirits of sinners and blasphemers and those who do evil will be cast, and those who pervert everything that the Lord has spoken by the mouth of the prophets[f][e][d][c][b], all that will come to pass.”'
  footnotes:
  - marker: a
    text: The term rendered 'blasphemers' may also carry the broader sense of revilers or abusive speakers; the exact nuance of the Ge'ez word is uncertain in this OCR witness.
    reason: lexical_alternative
  - marker: b
    text: The final clause could also be rendered 'all will come to pass' or 'everything will be fulfilled.' The more literal 'will be done' is kept to avoid smoothing the wording into a familiar formula.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'the prophets' is followed by an awkward qualifier in the Ge'ez ('who were/are'), which may simply identify the prophets rather than add new meaning.
    reason: textual_variant
  - marker: d
    text: Or 'that you have seen'.
    reason: previous_rendering
  - marker: e
    text: Or 'will be gathered together'.
    reason: previous_rendering
  - marker: f
    text: Or 'the prophets—everything will be done.'.
    reason: previous_rendering
