translation:
  language: es
  text: 'Y me dijo[a]: «Este es el lugar que ves: aquí serán arrojados los espíritus de los pecadores, de los blasfemadores y de los que hacen el mal, y de los que pervierten todo lo que el Señor ha hablado por boca de los profetas[b], todo aquello que ha de cumplirse[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término vertido como ‘blasfemadores’ puede tener un matiz más amplio de injuriadores o habladores abusivos; el contexto lo acerca aquí al habla impía contra la palabra del Señor.
    reason: lexical_alternative
  - marker: b
    text: La expresión ‘de los profetas’ traduce una construcción etíope algo áspera; puede funcionar simplemente como identificación de los profetas sin añadir un matiz nuevo.
    reason: textual_variant
  - marker: c
    text: La cláusula final también puede entenderse como ‘todo vendrá a suceder’ o ‘todo será cumplido’. Se conserva ‘ha de cumplirse’ para reflejar la realización futura determinada sin suavizar la fuerza del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: መካን
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - paraje
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Lugar’ mantiene la sencillez locativa del etíope y funciona bien en un contexto visionario sin sobreespecificar el espacio.
- source_word: ዘትሬኢ
  english_pob_choice: that you see
  chosen_spanish: que ves
  alternatives_spanish:
  - que has visto
  - que estás viendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etíope está en imperfectivo y pide una referencia directa a la visión presente de Enoc; ‘que ves’ refleja mejor esa forma que un perfecto español.
- source_word: ይትወደዩ
  english_pob_choice: will be cast
  chosen_spanish: serán arrojados
  alternatives_spanish:
  - serán echados
  - serán lanzados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrigió la lectura anterior; el pasivo expresa deposición violenta en un lugar de juicio. ‘Serán arrojados’ comunica mejor esa fuerza que ‘reunidos’ o ‘juntados’.
- source_word: መናፍስተ
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - almas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto enóquico de juicio, ‘espíritus’ preserva la antropología sobrenatural del texto y evita introducir ‘almas’ sin necesidad.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - malvados
  - personas pecadoras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Pecadores’ da el paralelo moral esperado y mantiene la dicción estándar del juicio sin suavizarla.
- source_word: ጽኁፋን
  english_pob_choice: blasphemers
  chosen_spanish: blasfemadores
  alternatives_spanish:
  - revoltosos
  - injuriadores
  - reviladores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La evidencia contextual vincula este grupo con el habla impía contra lo que el Señor dijo; ‘blasfemadores’ preserva esa gravedad. Se elige una forma española transparente aunque menos común que ‘blasfemos’.
- source_word: እኩየ
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - maldad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Hacen el mal’ es idiomático en español y conserva el alcance moral general del objeto de la acción.
- source_word: ይመይጡ
  english_pob_choice: pervert
  chosen_spanish: pervierten
  alternatives_spanish:
  - tuercen
  - alteran
  - falsifican
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión final del audit trail favorece una forma más formal y teológicamente cargada. ‘Pervierten’ mantiene la idea de distorsión activa del discurso profético mejor que ‘tuercen’.
- source_word: ኵሎ ዘነገረ እግዚእ በኣፈ ነቢያት
  english_pob_choice: everything that the Lord has spoken by the mouth of the prophets
  chosen_spanish: todo lo que el Señor ha hablado por boca de los profetas
  alternatives_spanish:
  - todo lo que el Señor habló por boca de los profetas
  - todo lo que el Señor declaró por boca de los profetas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Por boca de los profetas’ conserva la expresión semítica literal. ‘Ha hablado’ reproduce con naturalidad el valor de ነገረ y mantiene el énfasis en la mediación profética.
- source_word: እለ ሀለዉ
  english_pob_choice: the prophets
  chosen_spanish: de los profetas
  alternatives_spanish:
  - los profetas que fueron
  - los profetas que están
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción relativa es oscura en etíope y el audit trail la trata como posible identificador o resto gramatical. En español se integra de forma natural dentro de ‘por boca de los profetas’ sin forzar una glosa innecesaria.
- source_word: ኵሉ ይትገበር
  english_pob_choice: all that will come to pass
  chosen_spanish: todo lo que ha de cumplirse
  alternatives_spanish:
  - todo lo que ocurrirá
  - todo lo que será hecho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción final expresa una futura realización determinada. ‘Ha de cumplirse’ conserva la inevitabilidad y evita la banalidad de ‘ocurrirá’, mientras mantiene la tensión entre realización y cumplimiento ya reconocida en el audit trail.
theological_decisions:
- issue: Destino de los impíos en el lugar visionario
  english_pob_reading: here the spirits of sinners and blasphemers and those who do evil will be cast
  chosen_spanish_reading: aquí serán arrojados los espíritus de los pecadores y blasfemadores y de los que hacen el mal
  alternative_spanish_readings:
  - aquí serán echados los espíritus de los pecadores y blasfemadores y de los que hacen el mal
  - aquí serán depositados los espíritus de los pecadores y blasfemadores y de los que hacen el mal
  rationale: La escena es claramente judicial y penal; el verbo debe sonar a sentencia, no a simple localización. ‘Serán arrojados’ conserva la fuerza del pasivo etíope y la lectura corregida del audit trail.
  doctrine_reference: Translation philosophy §1, §3
- issue: Naturaleza de la frase final sobre lo profético
  english_pob_reading: all that will come to pass
  chosen_spanish_reading: todo lo que ha de cumplirse
  alternative_spanish_readings:
  - todo lo que vendrá a suceder
  - todo lo que será cumplido
  rationale: La cláusula final tiene valor de realización futura determinada. ‘Ha de cumplirse’ preserva el carácter inevitable de lo dicho por el Señor sin convertirlo en una fórmula eclesiástica cerrada ni borrar la relación entre palabra profética y acontecimiento.
  doctrine_reference: Translation philosophy §1, §4
- issue: Término para ጽኁፋን en un contexto de corrupción verbal
  english_pob_reading: blasphemers
  chosen_spanish_reading: blasfemadores
  alternative_spanish_readings:
  - blasfemos
  - reviladores
  rationale: El contexto inmediato vincula el grupo con la perversión de lo que el Señor habló. ‘Blasfemadores’ mantiene la dimensión de habla impía y el peso teológico del juicio.
  doctrine_reference: Translation philosophy §3, §4
translation_notes:
  revision_awareness: 'La redacción incorpora la revisión más reciente del audit trail: se adopta la lectura correcta de ይትወደዩ como ‘serán arrojados’, y se respeta la resolución final que entiende ኵሉ ይትገበር como una afirmación de cumplimiento futuro, traducida aquí con ‘ha de cumplirse’. También se conserva la decisión formal de ‘pervierten’ para ይመይጡ, acorde con la última pasada editorial.'
  spanish_consistency_notes:
  - Se mantiene ‘Señor’ para ἥ?; en este pasaje el etíope corresponde a እግዚእ y el audit trail lo vierte como ‘Lord/Señor’; no se requiere el nombre divino Yahvé en este versículo por tratarse de la fórmula recibida en el contexto auditado.
  - Se usa ‘espíritus’ de modo consistente con la antropología del pasaje, evitando ‘almas’.
  - Se conserva un registro reverente pero legible, con sintaxis suficientemente cercana al original sin calco pesado.
