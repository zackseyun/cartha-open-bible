translation:
  language: es
  text: Y verán a los que nacieron en tinieblas, arrojados a las tinieblas, mientras los justos resplandecen[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «mientras los justos brillan» o «son iluminados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይሬ
  english_pob_choice: And they will see
  chosen_spanish: Y verán
  alternatives_spanish:
  - Y vieron
  - Y mirarán
  lexicon: Dillmann
  rationale: La forma verbal etiópica es futura en tercera persona plural; por eso el español debe expresar acción futura, no un pasado. «Verán» conserva el valor escénico de la visión apocalíptica.
- source_word: እይዎሙ ለእለ ተወልዱ በጽልመት
  english_pob_choice: those who were born in darkness
  chosen_spanish: a los que fueron nacidos en tinieblas
  alternatives_spanish:
  - a los nacidos en tinieblas
  - a los que nacieron en tinieblas
  lexicon: Dillmann
  rationale: El giro relativo señala a un grupo definido por su origen en la oscuridad. «Fueron nacidos» conserva el matiz pasivo de la construcción, mientras que «en tinieblas» mantiene la repetición enfática del original.
- source_word: ይትወደዩ በጽልመት
  english_pob_choice: being loved in darkness
  chosen_spanish: arrojados a las tinieblas
  alternatives_spanish:
  - echados a las tinieblas
  - lanzados a las tinieblas
  lexicon: Dillmann
  rationale: 'La revisión gramatical muestra que el verbo no es ‘amar’, sino un pasivo de ‘arrojar/poner’. Por eso el español debe expresar juicio y movimiento hacia la oscuridad: «arrojados a las tinieblas».'
- source_word: በጽልመት
  english_pob_choice: in darkness
  chosen_spanish: a las tinieblas
  alternatives_spanish:
  - en tinieblas
  - en la oscuridad
  lexicon: Dillmann
  rationale: En esta cláusula el valor de la preposición es direccional, no meramente locativo; por eso «a las tinieblas» refleja mejor el destino de los sujetos que «en tinieblas».
- source_word: እንዘ ይትወሐውሑ
  english_pob_choice: while ... were shining
  chosen_spanish: mientras los justos resplandecen
  alternatives_spanish:
  - mientras los justos brillan
  - mientras los justos están resplandeciendo
  lexicon: Dillmann
  rationale: El verbo imperfectivo en cláusula circunstancial pide un presente de escena o un presente atemporal en español. «Resplandecen» mantiene la imagen luminosa y el contraste con tinieblas.
- source_word: ጻድቃን
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos
  lexicon: Dillmann
  rationale: «Los justos» es la equivalencia estable para este término en contextos enóquicos y conserva la categoría moral y comunitaria del original.
theological_decisions:
- issue: La cláusula difícil sobre los que están asociados con tinieblas
  english_pob_reading: The English POB preserved the difficult wording 'being loved in darkness' to avoid smoothing the text into a conventional judgment formula.
  chosen_spanish_reading: La traducción española sigue la revisión gramatical del ge'ez y expresa la sentencia con 'arrojados a las tinieblas'.
  alternative_spanish_readings:
  - siendo amados en tinieblas
  - siendo guardados en tinieblas
  - abandonados a las tinieblas
  rationale: La evidencia textual revisada indica que el verbo corresponde a 'arrojar/poner', no a 'amar'. En español no sería fiel conservar una lectura basada en un falso cognado; por eso se adopta la lectura corregida y se mantiene la imagen de condena en el movimiento hacia las tinieblas.
  doctrine_reference: 'Principio editorial POB: priorizar la gramática del texto fuente y no preservar una falsa dificultad cuando la revisión crítica la ha resuelto.'
- issue: La temporalidad de la visión
  english_pob_reading: The English POB used 'And they will see' after revision from the earlier first-person rendering.
  chosen_spanish_reading: «Y verán»
  alternative_spanish_readings:
  - Y verán
  - Y verán ellos
  rationale: El español debe seguir el sujeto plural y el valor futuro del verbo etiópico. La forma simple «Y verán» es la más natural y fiel al informe visionario.
  doctrine_reference: 'Principio editorial POB: mantener la referencia verbal corregida por la revisión textual.'
translation_notes:
  revision_awareness: 'La base inglesa pasó por correcciones importantes: la forma verbal inicial se corrigió de un supuesto pasado en primera persona a un futuro en tercera persona plural; además, el segmento difícil ya no se entiende como ''being loved in darkness'', sino como ''cast into darkness''. La versión española adopta esas correcciones críticas y evita reproducir el error de lectura anterior.'
  spanish_consistency_notes:
  - He usado «tinieblas» en lugar de alternar con «oscuridad» para conservar la repetición del original y el registro bíblico.
  - He mantenido «los justos» como término técnico estable para ጻድቃን.
  - He evitado «Cristo» o fórmulas eclesiásticas porque este versículo no las exige.
  - La puntuación sigue un único período coordinado con contraste final, adecuado al tono apocalíptico.
