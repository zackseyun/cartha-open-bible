    rationale: Esa opción suena antinatural en español. Si se conserva una nota, conviene limitarla a alternativas naturales como «brillan» o «son iluminados».
  revised_spanish_text: Y verán a los que nacieron en tinieblas, arrojados a las tinieblas, mientras los justos resplandecen[a].
