    text: '''Glorious thing'' could also be rendered ''glorious place'' or ''splendor.'' The wording is kept broad because the referent is not yet explicitly named in the verse itself.'
    reason: lexical_alternative
  - marker: c
    text: Or 'only a blazing fire'.
    reason: previous_rendering
