base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/108/005.yaml
  text: And I asked the two holy angels who were with me[a], and I said to him, “What is this glorious thing? For it is not heaven, but only a burning flame of fire[c][b], and the sound of weeping and crying out and lamentation and grievous pain.”
  footnotes:
