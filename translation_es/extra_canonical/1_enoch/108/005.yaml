translation:
  language: es
  text: 'Y les pregunté a los dos ángeles santos que estaban conmigo, y le[a] dije: «¿Qué es esta cosa gloriosa[b]? Pues no es el cielo, sino solo una ardiente llama de fuego[c], y el sonido de llanto, de gritos, de lamentación y de dolor intenso».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez dice «le dije» en singular, aunque antes menciona a «los dos ángeles santos». Puede tratarse de un portavoz entre ambos o de una irregularidad textual.
    reason: textual_variant
  - marker: b
    text: «Cosa gloriosa» también puede entenderse como «lugar glorioso» o «esplendor». Se mantiene amplio porque el referente no se nombra aún en el versículo.
    reason: lexical_alternative
  - marker: c
    text: 'O: «una llama de fuego que arde».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ተስእልክዎ
  english_pob_choice: I asked
  chosen_spanish: le pregunté
  alternatives_spanish:
  - le inquirí
  - le cuestioné
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo introduce la consulta de Enoc a sus guías angélicos; en español, «pregunté» es natural y conserva la inmediatez narrativa.
- source_word: ፪አመላእክት ቅዱሳን
  english_pob_choice: the two holy angels
  chosen_spanish: los dos ángeles santos
  alternatives_spanish:
  - los dos ángeles sagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El numeral es explícito y ቅዱሳን se rinde con «santos», término habitual y fiel al registro apocalíptico.
- source_word: እለ ምስሌየ
  english_pob_choice: who were with me
  chosen_spanish: que estaban conmigo
  alternatives_spanish:
  - que me acompañaban
  - que iban conmigo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase relativa identifica a los ángeles como acompañantes de Enoc; «estaban conmigo» es natural en español y conserva la relación de compañía.
- source_word: እቤሎ
  english_pob_choice: I said to him
  chosen_spanish: le dije
  alternatives_spanish:
  - les dije
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez conservado está en singular, aunque el antecedente inmediato es plural. En español se mantiene esa tensión con «le dije», que respeta la lectura del texto y la posible referencia a un portavoz.
- source_word: ምንት ውእቱ ዝስቡሕ
  english_pob_choice: What is this glorious thing?
  chosen_spanish: ¿Qué es esta cosa gloriosa?
  alternatives_spanish:
  - ¿Qué es este ser glorioso?
  - ¿Qué es esta gloria?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la amplitud del referente, todavía no identificado en el verso, mediante «cosa»; «gloriosa» reproduce la cualidad de esplendor sin decidir prematuramente si se trata de lugar, realidad o manifestación.
- source_word: አኮኑ ሰማየ
  english_pob_choice: it is not heaven
  chosen_spanish: no es cielo
  alternatives_spanish:
  - no es el cielo
  - no son cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contraste es con el cielo en sentido celestial; «cielo» en español moderno es claro y evita una formulación demasiado pesada.
- source_word: ላህበ እሳት
  english_pob_choice: a burning flame of fire
  chosen_spanish: una llama de fuego que arde
  alternatives_spanish:
  - una llama ardiente de fuego
  - una llama de fuego ardiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva el idiomático apocalíptico «llama de fuego» y se añade «que arde» para mantener la idea de combustión del participio sin borrar la redundancia expresiva del original.
- source_word: ባሕቲቱ ዘይነድድ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '«Solo» conserva la exclusión contrastiva: no es cielo, sino únicamente una realidad ígnea. En español suena natural y mantiene la fuerza del contraste.'
- source_word: ቃለ ብካይ
  english_pob_choice: the sound of weeping
  chosen_spanish: el sonido de llanto
  alternatives_spanish:
  - la voz del llanto
  - el sonido del llorar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En una serie auditiva, «sonido» es más natural que «voz» y «llanto» comunica el lamento sin sobreinterpretar la emoción concreta.
- source_word: ጽራሕ
  english_pob_choice: crying out
  chosen_spanish: gritos
  alternatives_spanish:
  - clamores
  - exclamaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término intensifica el lamento; «gritos» mantiene la fuerza sonora de manera directa y legible en español.
- source_word: አውያት
  english_pob_choice: lamentation
  chosen_spanish: lamentación
  alternatives_spanish:
  - lamento
  - queja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el término formal y elevado, adecuado al registro apocalíptico y distinguible de «llanto» y «gritos».
- source_word: ሕማም ኀያል
  english_pob_choice: grievous pain
  chosen_spanish: dolor intenso
  alternatives_spanish:
  - dolor grave
  - sufrimiento intenso
  - pena grave
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión denota padecimiento severo; «dolor intenso» es clara, solemne y suficientemente cercana al sentido fuerte del original.
theological_decisions:
- issue: Cómo mantener la imaginería apocalíptica sin suavizarla en una abstracción general
  english_pob_reading: Retain concrete apocalyptic imagery of fire, weeping, crying out, lamentation, and pain
  chosen_spanish_reading: Conservar la imaginería concreta de fuego, llanto, gritos, lamentación y dolor
  alternative_spanish_readings:
  - Convertirlo en una referencia general a tormento
  - Resumirlo como castigo o aflicción
  rationale: La fuerza del versículo está en la acumulación sensorial. La traducción conserva esa densidad en lugar de condensarla en una idea más general.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten judgment formulas.'
- issue: Tensión textual entre el antecedente plural y el pronombre singular
  english_pob_reading: The Ge'ez reads 'I said to him' although the previous phrase mentions 'the two holy angels.'
  chosen_spanish_reading: Mantener «le dije» con antecedente plural inmediato
  alternative_spanish_readings:
  - normalizar a «les dije»
  - reformular para evitar el problema
  rationale: El singular del ge'ez se preserva de forma mínima en español, sin ocultar la posible irregularidad textual ni forzar una armonización interpretativa.
  doctrine_reference: 'Textual criticism and source transparency: preserve documented irregularities rather than smoothing them away.'
translation_notes:
  revision_awareness: 'He tomado en cuenta las revisiones posteriores del audit trail: se corrigió una redacción que diluía ላህበ እሳት y ዘይነድድ; por eso conservo «llama de fuego» y añado «que arde» para reflejar tanto la locución apocalíptica como el participio de combustión. También mantengo el contraste «solo» frente a «no es cielo» y la serie auditiva completa.'
  spanish_consistency_notes:
  - He usado «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
  - He evitado «Cristo/Mesías» porque no corresponde al pasaje.
  - He mantenido el registro apocalíptico sin sustituirlo por vocabulario eclesiástico tradicional.
  - La puntuación y el uso de comillas angulares siguen la convención tipográfica del español.
  - El pronombre singular «le» conserva la tensión textual documentada en la fuente.
