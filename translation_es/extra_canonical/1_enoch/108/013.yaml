    rationale: No es error; más bien explicita una posibilidad semántica útil en español. La elección principal sigue siendo fiel al expediente POB.
  - severity: low
    issue: «Senderos de rectitud» podría también formularse como «caminos de rectitud».
    rationale: Es una preferencia de estilo, no un problema de fidelidad. «Senderos» mantiene bien la imaginería concreta y la pluralidad del original.
