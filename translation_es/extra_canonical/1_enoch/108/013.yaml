translation:
  language: es
  text: Y resplandecerán en tiempos sin número[a], porque la justicia[b] pertenece a Dios; porque dará fe[c] a los fieles en la morada de los senderos de rectitud[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por edades sin número». La expresión ge''ez habla de tiempos que no pueden contarse.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «rectitud». Aquí el término puede referirse a la justicia moral de Dios; el contexto también admite ‘rectitud’.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «fidelidad» o «firmeza». El término puede abarcar fe, fidelidad o constancia.'
    reason: lexical_alternative
  - marker: d
    text: La frase conserva la imagen concreta de un lugar caracterizado por caminos rectos, en vez de reducirla a una expresión abstracta.
    reason: cultural_note
lexical_decisions:
- source_word: ይትወሐውሑ
  english_pob_choice: they will shine
  chosen_spanish: resplandecerán
  alternatives_spanish:
  - brillarán
  - lucirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez indica ‘brillar, ser resplandeciente’. ‘Resplandecerán’ comunica bien esa idea en español bíblico actual y mantiene el tono escatológico.
- source_word: በእዝማን ዘአልቦ ኍልቈ
  english_pob_choice: in times without number
  chosen_spanish: en tiempos sin número
  alternatives_spanish:
  - en tiempos innumerables
  - por edades sin número
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la imagen temporal y la negación de conteo sin imponer una interpretación más técnica que el texto no exige.
- source_word: ጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el contexto permite ‘justicia’ en sentido de rectitud moral divina. En español suena natural y preserva la posible fuerza ética/legal del término.
- source_word: አነኒሁ ለአምላክ
  english_pob_choice: belongs to God
  chosen_spanish: pertenece a Dios
  alternatives_spanish:
  - es de Dios
  - está con Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relación posesiva/atributiva se expresa de forma idiomática con ‘pertenece a Dios’, sin convertirla en una frase más interpretativa.
- source_word: ሃይማኖተ
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - firmeza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Fe’ es la equivalencia directa y natural. Se conserva la tensión semántica con la posible idea de fidelidad, que se anota aparte.
- source_word: ለመሃይምናን
  english_pob_choice: to the faithful
  chosen_spanish: a los fieles
  alternatives_spanish:
  - a los creyentes
  - a los leales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Los revisores señalaron correctamente que el término significa ‘fieles/creyentes’, no ‘sabios’. ‘Fieles’ mantiene el vínculo léxico con ‘fe’ en la misma línea.
- source_word: በማኅደረ ፍናዋተ ርትዕ
  english_pob_choice: in the dwelling of the paths of uprightness
  chosen_spanish: en la morada de los senderos de rectitud
  alternatives_spanish:
  - en el hogar de los caminos de justicia
  - en la habitación de las sendas rectas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta de un lugar caracterizado por caminos rectos. ‘Morada’ y ‘senderos de rectitud’ suenan naturales en español y preservan la densidad poética.
theological_decisions:
- issue: Relación entre ‘justicia’ y Dios en la primera cláusula
  english_pob_reading: the righteousness belongs to God
  chosen_spanish_reading: la justicia pertenece a Dios
  alternative_spanish_readings:
  - la justicia es de Dios
  - la rectitud pertenece a Dios
  rationale: La frase mantiene la lectura posesiva/atributiva, sin convertirla en una explicación doctrinal más amplia. En español, ‘pertenece a Dios’ preserva la tensión de que la justicia está en Dios como realidad propia.
  doctrine_reference: Translation philosophy § Preserve theological tension rather than resolve it.
- issue: Sentido de ‘fe’ dada por Dios
  english_pob_reading: he will give faith to the faithful
  chosen_spanish_reading: dará fe a los fieles
  alternative_spanish_readings:
  - dará fidelidad a los fieles
  - dará firmeza a los fieles
  rationale: Se deja ‘fe’ como término principal, pero el contexto permite también la idea de fidelidad o constancia. El español conserva esa ambigüedad mediante la nota textual.
  doctrine_reference: Translation philosophy § Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió el verbo a ‘resplandecerán’ y la lectura de መሃይምናን como ‘fieles’, no ‘sabios’. También se consideró la corrección textual que favorece ‘la justicia pertenece a Dios’ frente a lecturas erróneas del pasaje ge'ez.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para אֱלֹהִים/አምላክ según el estándar del proyecto.
  - Se usa ‘fe’ con nota para preservar la posible amplitud semántica hacia ‘fidelidad’.
  - ‘Fieles’ traduce መሃይምናን en armonía con el paralelismo interno con ‘fe’.
  - Se evita ‘SEÑOR’ porque el texto fuente aquí habla de Dios de forma directa y no de un equivalente contextual del Tetragrámaton.
