base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/108/013.yaml
  text: And they will shine in times without number[a], for the righteousness belongs to God[f][e][d][c][b]; for he will give faith to the faithful in the dwelling of the paths of uprightness.
  footnotes:
  - marker: a
    text: Or 'for unnumbered ages.' The Ge'ez phrase speaks of times that cannot be counted.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will give steadfastness/faithfulness to the wise.' The noun rendered 'faith' may also carry the sense of fidelity.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'dwelling of the paths of uprightness' preserves the text's concrete imagery of a place characterized by righteous ways, rather than reducing it to a simple abstract expression.
    reason: cultural_note
  - marker: d
    text: Or 'And they will rejoice'.
    reason: previous_rendering
  - marker: e
    text: Or 'righteousness belongs to God'.
    reason: previous_rendering
  - marker: f
    text: Or 'to the wise'.
    reason: previous_rendering
