translation:
  language: es
  text: aquellos que, desde el tiempo en que llegaron a ser, no desearon la comida que está en la tierra, sino que consideraron sus almas[a] como un aliento que pasa, y guardaron esto, y Yahvé los probó mucho, y sus espíritus fueron hallados puros, para que bendijeran su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un espíritu que pasa»; la palabra ge'ez puede denotar espíritu, viento o aliento. Una lectura anterior entendía la cláusula como «entregaron sus almas», pero el verbo aquí se entiende mejor como «consideraron» o «tuvieron por».
    reason: lexical_alternative_and_previous_rendering
lexical_decisions:
- source_word: ኢፈተዉ
  english_pob_choice: did not desire
  chosen_spanish: no desearon
  alternatives_spanish:
  - no amaron
  - no tomaron placer en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa deseo o deleite interno, no solo negativa externa. «No desearon» conserva la orientación volitiva y la fuerza ascética del pasaje sin volverse demasiado literal o artificial en español.
- source_word: መብልዕተ
  english_pob_choice: food
  chosen_spanish: la comida
  alternatives_spanish:
  - el alimento
  - la nutrición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo apunta concretamente a lo que se come. «La comida» es claro y natural en español, y mantiene el contraste con lo terrenal.
- source_word: ዘውስተ ምድር
  english_pob_choice: that is on the earth
  chosen_spanish: que está sobre la tierra
  alternatives_spanish:
  - que está en la tierra
  - de la tierra
  - mundana
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen espacial de lo que está «sobre la tierra» sin ampliar el sentido a una categoría moral más general que el ge'ez no explicita.
- source_word: ረሰዩ ነፍሳቶሙ
  english_pob_choice: regarded their souls as a passing breath
  chosen_spanish: consideraron sus almas como un aliento que pasa
  alternatives_spanish:
  - consideraron sus vidas como un aliento que pasa
  - estimaron sus almas como un soplo pasajero
  - vieron sus almas como un aliento fugaz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ረሰየ significa «considerar, tener por, estimar», no «abandonar». Mantener «consideraron» evita la mistraducción documentada. «Almas» corresponde a ነፍሳቶሙ, y «aliento que pasa» comunica el valor de transitoriedad del símil con መንፈስ.
- source_word: ከመ መንፈስ እንተ ተሐልፍ
  english_pob_choice: as a passing breath
  chosen_spanish: como un aliento que pasa
  alternatives_spanish:
  - como espíritu que pasa
  - como viento que pasa
  - como un soplo pasajero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este símil, መንፈስ puede ser espíritu, viento o aliento/breath. «Aliento» expresa mejor la fugacidad sin borrar el rango semántico; la nota preserva la alternativa de traducción.
- source_word: ዐቀቡ
  english_pob_choice: kept this
  chosen_spanish: guardaron esto
  alternatives_spanish:
  - observaron esto
  - conservaron esto
  - guardaron esa disciplina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede significar guardar u observar. «Guardaron esto» mantiene la concisión y deja abierta la referencia al contenido exacto de lo que se conserva o practica.
- source_word: ብዙኃ አመከሮሙ
  english_pob_choice: tested them greatly
  chosen_spanish: los probó mucho
  alternatives_spanish:
  - los probó en gran manera
  - los puso a prueba severamente
  - los examinó mucho
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto favorece la idea de prueba o examen. «Los probó mucho» conserva el valor intenso del adverbio sin añadir una especificación que el texto no requiere.
- source_word: ተረክቡ መንፈሳቲሆሙ ንጹሕተ
  english_pob_choice: their spirits were found pure
  chosen_spanish: sus espíritus fueron hallados puros
  alternatives_spanish:
  - sus espíritus resultaron puros
  - sus espíritus fueron reconocidos como puros
  - sus espíritus se hallaron puros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pasiva de resultado encaja bien con «fueron hallados puros», que suena natural en registro bíblico y conserva el matiz probativo del juicio tras la prueba.
- source_word: ከመ ይባርክዎ ለስሙ
  english_pob_choice: so that they might bless his name
  chosen_spanish: para que bendijeran su nombre
  alternatives_spanish:
  - para que bendigan su nombre
  - a fin de que bendijeran su nombre
  - para bendecir su nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la finalidad con «para que» y el sentido bíblico de «bendecir su nombre».
theological_decisions:
- issue: Sentido de la renuncia a la comida terrenal y de «considerar sus almas como un aliento que pasa»
  english_pob_reading: The verse commends radical renunciation of earthly sustenance or pleasure as part of faithful endurance, without importing later monastic technical language.
  chosen_spanish_reading: El verso alaba una renuncia radical a lo terrenal y una valoración de la propia alma como transitoria, sin convertirlo en tecnicismo monástico posterior.
  alternative_spanish_readings:
  - Una alusión a ayuno extremo o hasta la muerte
  - Una metáfora general contra los placeres del mundo
  rationale: El ge'ez menciona de manera concreta la comida de la tierra y el autojuicio respecto del alma; la traducción conserva esa concreción y no resuelve el pasaje en una institución o práctica posterior no explicitada.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá de la evidencia textual.
- issue: Valor semántico de መንፈስ en el símil
  english_pob_reading: Rendered as 'breath' to emphasize transience rather than a disembodied personal spirit.
  chosen_spanish_reading: Se rinde como «aliento» para destacar la fugacidad, sin negar que el término pueda abarcar espíritu o viento según el contexto.
  alternative_spanish_readings:
  - espíritu
  - viento
  - soplo
  rationale: En este símil la idea principal es la transitoriedad. «Aliento» comunica bien esa fragilidad en español y mantiene abierta la gama semántica documentada.
  doctrine_reference: Consistencia terminológica con excepción documentada por el contexto inmediato.
translation_notes:
  revision_awareness: 'La versión inglesa auditada corrigió una lectura anterior de ረሰዩ ነፍሳቶሙ: no significa «gave up their souls/lives», sino «regarded/considered their souls». Por eso el español evita toda traducción de abandono o entrega y refleja el contraste entre la renuncia a la comida terrenal y la consideración de sus almas como transitorias. También se preserva la coordinación final del texto: prueba, hallazgo de pureza y propósito de bendecir el nombre.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando el original lo exija; en este versículo el texto ge'ez tiene «el Señor», por lo que se traduce con «el Señor» siguiendo el contexto de la fuente inmediata.
  - Se mantiene «almas» y «espíritus» como términos distintos porque el pasaje contrasta ነፍሳቶሙ con መንፈሳቲሆሙ.
  - «Aliento» fue preferido sobre «espíritu» en la comparación para no confundir el símil con el resultado final sobre los espíritus.
  - «Los probó mucho» conserva el énfasis de la prueba intensa sin sobreinterpretar el modo concreto de esa prueba.
