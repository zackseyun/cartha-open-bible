translation:
  language: es
  text: Y los pecadores clamarán y los verán mientras resplandecen[a], y ellos mismos irán adonde les han sido escritos los días y tiempos[b]. La visión de las cosas ocultas de Enoc[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La revisión del texto indica que el verbo significa «resplandecer»; no describe que vaguen o deambulen.
    reason: textual_variant
  - marker: b
    text: La expresión «les han sido escritos» conserva el motivo apocalíptico de tiempos fijados o inscritos de antemano.
    reason: cultural_note
  - marker: c
    text: 'La frase final puede leerse como un título o colofón independiente: «La visión de las cosas ocultas de Enoc».'
    reason: textual_variant
lexical_decisions:
- source_word: ወይጸርኁ
  english_pob_choice: and the sinners will cry out
  chosen_spanish: y los pecadores clamarán
  alternatives_spanish:
  - y los pecadores gritarán
  - y los pecadores lamentarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa un clamor fuerte o una exclamación de angustia. «Clamarán» conserva la fuerza apocalíptica sin cerrar demasiado el matiz entre grito y lamento.
- source_word: ወ*ይሬእይዎሙ
  english_pob_choice: and see them
  chosen_spanish: y los verán
  alternatives_spanish:
  - y los contemplarán
  - y los mirarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma con sufijo directo pide un objeto explícito; «los verán» es la equivalencia más natural y fiel en español.
- source_word: ኃጥኣን
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los malos
  - los impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el registro apocalíptico, el término designa a la clase de los impíos. «Pecadores» mantiene una designación clara y bíblica sin suavizar el contraste moral.
- source_word: እንዘ ይትወሐውሑ
  english_pob_choice: while they shine
  chosen_spanish: mientras resplandecen
  alternatives_spanish:
  - mientras brillan
  - cuando resplandecen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige una lectura errónea de «wander about»; el verbo significa «resplandecer/ser radiantes». «Resplandecen» preserva el carácter luminoso y solemne.
- source_word: ወየሐውሩ
  english_pob_choice: and they will go
  chosen_spanish: y ellos mismos irán
  alternatives_spanish:
  - y irán
  - y partirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico es de movimiento. «Irán» es directo; se añadió «ellos mismos» para reflejar el énfasis del pronombre enfático siguiente.
- source_word: እሙንቱሂ
  english_pob_choice: and they themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - también ellos
  - precisamente ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pronombre enfático subraya que esos mismos pecadores son los que van al destino señalado. En español, «ellos mismos» reproduce bien esa insistencia.
- source_word: በኀበ
  english_pob_choice: where
  chosen_spanish: adonde
  alternatives_spanish:
  - donde
  - a donde
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor direccional del preposición exige una expresión de destino. «Adonde» conserva el movimiento hacia un lugar determinado.
- source_word: ተጽሕፉ ሎሙ መዋዕለ ወእዝማን
  english_pob_choice: the days and times have been written down for them
  chosen_spanish: han sido escritos para ellos los días y los tiempos
  alternatives_spanish:
  - les han sido escritos los días y los tiempos
  - están inscritos para ellos los días y los tiempos
  - les fueron fijados los días y los tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La voz pasiva y el dativo expresan determinación previa. «Han sido escritos» preserva el motivo apocalíptico de tiempos fijados o inscritos en libros celestiales.
- source_word: ራእየ ኅቡኣት
  english_pob_choice: the vision of the hidden things
  chosen_spanish: La visión de las cosas ocultas
  alternatives_spanish:
  - La visión de los secretos
  - La revelación de las cosas ocultas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cosas ocultas» reproduce el sentido de misterios revelados sin volverlo coloquial. «Visión» mantiene el carácter apocalíptico del encabezado o colofón.
- source_word: ዘሄኖክ
  english_pob_choice: that Enoch saw
  chosen_spanish: de Enoc
  alternatives_spanish:
  - que Enoc vio
  - que vio Enoc
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión textual más sólida entiende la frase como un título o colofón independiente, no como una oración subordinada. Por eso se traduce de forma nominal: «de Enoc».'
theological_decisions:
- issue: 'Función de la frase final: colofón/título o parte de la oración'
  english_pob_reading: 'The phrase may function as a subscription or title: ''The vision of the hidden things that Enoch saw,'' rather than as part of the sinners'' movement clause.'
  chosen_spanish_reading: 'Como título o colofón: «La visión de las cosas ocultas de Enoc».'
  alternative_spanish_readings:
  - 'Como parte de la oración: «La visión de las cosas ocultas que Enoc vio»'
  - «en la visión de las cosas ocultas que Enoc vio»
  rationale: El audit trail revisado indica que la frase carece de las partículas necesarias para funcionar como circunstancial. En español conviene reflejarla como sintagma nominal independiente, preservando la posible función editorial.
  doctrine_reference: Preservar la ambigüedad cuando el texto base es genuinamente incierto.
- issue: Valor del verbo de 108:15 corregido por revisión auditada
  english_pob_reading: while they shine
  chosen_spanish_reading: mientras resplandecen
  alternative_spanish_readings:
  - mientras brillan
  - mientras refulgen
  rationale: La revisión confirma que el verbo no expresa movimiento errante sino luminosidad. Traducirlo como resplandor mantiene la continuidad con el contexto inmediato y evita una lectura falsa.
  doctrine_reference: Fidelidad al sentido léxico confirmado por la revisión crítica.
- issue: Destino de los pecadores y tiempos fijados
  english_pob_reading: the days and times have been written down for them
  chosen_spanish_reading: han sido escritos para ellos los días y los tiempos
  alternative_spanish_readings:
  - les han sido escritos los días y los tiempos
  - les han sido fijados los días y los tiempos
  rationale: La formulación conserva el motivo apocalíptico de tiempos establecidos por decreto celestial. «Escritos» retiene mejor el eco de registro/inscripción que «fijados», sin perder la idea de determinación previa.
  doctrine_reference: Motivo apocalíptico de juicio y tiempos predeterminados.
translation_notes:
  revision_awareness: 'Se incorporó la corrección crítica principal del audit trail: ይትወሐውሑ significa «resplandecer» y no «vagar». También se ajustó la cláusula final para reflejar la revisión gramatical que la entiende como colofón o título independiente, no como complemento de la frase anterior.'
  spanish_consistency_notes:
  - Se mantuvo «pecadores» para ኃጥኣን por consistencia con el registro apocalíptico.
  - Se usó «Enoc» como forma española estándar del nombre propio.
  - Se evitó «SEÑOR» o fórmulas de sustitución porque no hay aquí un tetragrámaton ni cita directa del divino nombre.
  - Se eligió «resplandecen» para reflejar el matiz luminoso confirmado por la revisión crítica.
  - Se prefirió una sintaxis española clara pero cercana al orden del original en la cláusula principal.
