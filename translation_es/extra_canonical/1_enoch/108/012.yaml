revisions:
- from: Y sacaré a la luz resplandeciente a los que amaron mi santo nombre[a], y sentaré a cada uno en el trono de su gloria[b].
  to: Y haré salir a la luz resplandeciente a los que amaron mi santo nombre[a], y sentaré a cada uno en el trono de su gloria[b].
  rationale: 'Se reemplaza ''sacaré a la luz'' por ''haré salir a la luz'' para evitar un modismo español que puede introducir el sentido de ''revelar'' más que el movimiento hacia la luz. Se simplifican y corrigen las notas para alinearlas con la evidencia auditada: la nota a conserva la alternativa aspectual; la nota b mantiene la alternativa ''trono glorioso'' sin sobredesarrollar una ambigüedad doctrinal que la auditoría ya trató con mayor precisión. El texto principal sigue siendo natural, fiel y eclesialmente legible.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:32:06Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura principal: sacar a los que amaron el santo nombre a una luz intensa y sentar a cada uno en un trono. Sin embargo, no sigue del todo la trayectoria auditada más reciente sobre la frase final. La nota b mantiene como ambigua una referencia pronominal que en la revisión aplicada quedó sustancialmente restringida: el texto inglés auditado conserva ''the throne of his glory'' con artículo definido, y la disputa principal ya no es Dios vs. entronizado de forma abierta en el texto español, sino cómo reflejar en traducción una construcción definida con posesivo. Además, ''sacaré a la luz'' introduce en español un matiz idiomático de ''poner en evidencia/revelar'' que puede sobrecargar el sentido más espacial de ''bring out into bright light''.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para sonar menos idiomático y más fiel a la imagen apocalíptica concreta. 'Sacaré a la luz resplandeciente' suena algo forzado en español; 'haré salir a la luz resplandeciente' o 'los sacaré a la luz resplandeciente' expresa mejor el movimiento. La frase final es legible, pero la nota actual explica una ambigüedad de manera demasiado abierta respecto de la evidencia auditada.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Santo nombre', 'trono' y la sintaxis reverencial son adecuados. La cuestión principal no es glosaria sino de fidelidad sintáctica y de cómo presentar la referencia pronominal final sin sobredeclarar una ambigüedad ya parcialmente resuelta en la auditoría.
  issues:
  - severity: medium
    issue: La expresión 'sacaré a la luz resplandeciente' añade un modismo español con matiz de revelación pública.
    rationale: El ge'ez y la auditoría inglesa priorizan movimiento hacia una luz brillante. En español, 'sacar a la luz' suele significar descubrir o revelar algo oculto, lo que puede ir más allá del sentido básico del original.
  - severity: medium
    issue: La nota b presenta como indecidida una ambigüedad teológica/pronominal más amplia de la que permite la revisión auditada.
    rationale: La historia de revisión muestra que la relación del posesivo y de la construcción definida fue ya evaluada. El español puede conservar 'su gloria', pero la nota no debería plantearlo simplemente como neutral entre Dios y el entronizado sin matizar que la tradición auditada discutió el referente y que aquí se preserva la formulación literal.
  - severity: low
    issue: Falta una nota para la posible lectura perfectiva 'han amado' si se desea conservar la alternativa del inglés, y la nota actual a la frase del nombre santo es aceptable pero podría formularse con más precisión.
    rationale: No es un error grave, pero conviene alinear mejor la nota con la alternativa aspectual real en vez de sugerir una ambigüedad mayor.
  revised_spanish_text: Y haré salir a la luz resplandeciente a los que amaron mi santo nombre[a], y sentaré a cada uno en el trono de su gloria[b].
  revised_footnotes:
  - marker: a
    text: 'También puede entenderse: «a los que han amado mi santo nombre».'
    reason: alternative_reading
  - marker: b
    text: La expresión también puede entenderse más generalmente como «el trono glorioso». Aquí se conserva la construcción más literal «el trono de su gloria».
    reason: alternative_reading
  revision_rationale: 'Se reemplaza ''sacaré a la luz'' por ''haré salir a la luz'' para evitar un modismo español que puede introducir el sentido de ''revelar'' más que el movimiento hacia la luz. Se simplifican y corrigen las notas para alinearlas con la evidencia auditada: la nota a conserva la alternativa aspectual; la nota b mantiene la alternativa ''trono glorioso'' sin sobredesarrollar una ambigüedad doctrinal que la auditoría ya trató con mayor precisión. El texto principal sigue siendo natural, fiel y eclesialmente legible.'
