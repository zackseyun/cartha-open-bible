translation:
  language: es
  text: Y haré salir a la luz resplandeciente a los que amaron mi santo nombre[a], y sentaré a cada uno en el trono de su gloria[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «a los que han amado mi santo nombre».'
    reason: alternative_reading
  - marker: b
    text: La expresión también puede entenderse más generalmente como «el trono glorioso». Aquí se conserva la construcción más literal «el trono de su gloria».
    reason: alternative_reading
lexical_decisions:
- source_word: ወ*እወፅኦሙ
  english_pob_choice: I will bring them out
  chosen_spanish: sacaré a la luz
  alternatives_spanish:
  - los sacaré
  - los sacaré fuera
  - los haré salir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa hacer salir o sacar a un grupo. En español, 'sacaré a la luz' conserva el movimiento de salida y la imagen apocalíptica de manifestación, sin forzar un calco innecesario.
- source_word: በብሩህ ብርሃን
  english_pob_choice: into the bright light
  chosen_spanish: a la luz resplandeciente
  alternatives_spanish:
  - en luz resplandeciente
  - a la luz brillante
  - en la luz brillante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La duplicación intensifica la luminosidad. 'Luz resplandeciente' comunica bien esa intensificación en español y funciona con el verbo de salida/movimiento.
- source_word: ለእለ አፍቀርዎ ለስምየ ቅዱስ
  english_pob_choice: those who loved my holy name
  chosen_spanish: a los que amaron mi santo nombre
  alternatives_spanish:
  - a los que han amado mi santo nombre
  - a los que amaron mi nombre santo
  - a quienes amaron mi santo nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción ge'ez identifica a las personas caracterizadas por amar el nombre santo del hablante divino. En español, 'a los que amaron' conserva la relación directa del objeto y la referencia reverencial a 'mi santo nombre'.
- source_word: አነብር
  english_pob_choice: I will seat them
  chosen_spanish: sentaré
  alternatives_spanish:
  - los sentaré
  - los estableceré
  - los colocaré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de entronización, el verbo pide una solución que preserve la imagen de ser colocado en un lugar de honor. 'Sentaré' es idiomático y mantiene el acto soberano de instalar.
- source_word: አሐደ አሐደ
  english_pob_choice: one by one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - uno por uno
  - cada uno individualmente
  - uno a uno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición distributiva señala individualidad. 'A cada uno' expresa con claridad esa distribución personal; el valor 'uno por uno' queda implícito sin sobrecargar la frase.
- source_word: መንበረ ክብር
  english_pob_choice: the throne of his glory
  chosen_spanish: el trono de su gloria
  alternatives_spanish:
  - el trono glorioso
  - el asiento de su gloria
  - el trono de la gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Trono'' conserva el valor real/judicial de መንበር. La construcción genitiva ''de su gloria'' reproduce mejor la relación del original que una simple adjetivación.'
- source_word: ዚአሁ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - suya
  - de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La posesiva se mantiene con 'su' por naturalidad y fidelidad. Dado el debate en la tradición auditada, en español se conserva la ambigüedad pronominal sin resolverla de antemano.
theological_decisions:
- issue: Alcance de la frase inicial de salida/muestra pública
  english_pob_reading: The righteous are brought out into bright light as a vindicating act.
  chosen_spanish_reading: Los fieles son sacados a una luz resplandeciente como acto de vindicación y manifestación.
  alternative_spanish_readings:
  - Los fieles son conducidos a la luz resplandeciente.
  - Son sacados públicamente a la luz resplandeciente.
  rationale: El contexto apocalíptico favorece una salida que no es solo física, sino también de revelación y honra. 'Sacar a la luz' permite conservar esa doble fuerza sin añadir contenido no sustentado.
  doctrine_reference: Preservar la tensión semántica entre liberación, revelación y vindicación.
- issue: Referencia de 'su gloria' en el trono final
  english_pob_reading: The pronoun refers to God/the Lord, so the righteous are seated on the throne associated with his glory.
  chosen_spanish_reading: Se conserva la referencia pronominal como 'su gloria', sin explicitar en el texto si remite a Dios o al propio justo.
  alternative_spanish_readings:
  - el trono de la gloria de Dios
  - el trono de su propia gloria
  - el trono glorioso
  rationale: La revisión auditada muestra una tensión real sobre el referente del pronombre. En español se mantiene la forma pronominal para no cerrar indebidamente la ambigüedad; el texto principal sigue la construcción del original sin resolver el referente.
  doctrine_reference: Preservar la ambigüedad relevante y no sobreinterpretar el pronombre.
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión más reciente que mantuvo la frase final como 'on the throne of his glory', pero también la nota adjudicada que señaló una tensión gramatical y pronominal en el material auditado. Por eso la traducción española conserva la estructura posesiva y evita explicitar un referente no resuelto.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando aparezca el nombre divino explícito; en este versículo el hablante es primera persona, así que no se introduce.
  - '''Santo nombre'' sigue el valor reverencial del original y la práctica POB de preservar la solemnidad sin recurrir a paráfrasis.'
  - '''Trono'' se mantiene como término técnico de entronización/juicio, no se suaviza a ''asiento'' salvo necesidad contextual.'
  - La puntuación conserva una única oración compuesta, acorde con el paralelismo del original.
