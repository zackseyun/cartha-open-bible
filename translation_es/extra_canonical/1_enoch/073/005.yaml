translation:
  language: es
  text: 'Y su mitad distante es una séptima parte[a], y todo su disco está vacío, sin luz[b][c], excepto una séptima parte de él: una decimocuarta parte de su luz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La formulación numérica en el testimonio ge'ez es difícil. El término repetido, literalmente «mano», funciona aquí como unidad o porción en el ciclo medido del luminar; en esta revisión se entiende fraccionalmente.
    reason: lexical_alternative
  - marker: b
    text: El versículo parece describir las porciones iluminadas y oscurecidas de la luna en el estilo esquemático del Libro Astronómico, más que en términos de astronomía moderna.
    reason: cultural_note
  - marker: c
    text: 'O: «siete partes de una, y todo su disco está vacío de luz, excepto siete partes de él: catorce partes de su luz».'
    reason: previous_rendering
lexical_decisions:
- source_word: መንፈቀ
  english_pob_choice: half
  chosen_spanish: mitad
  alternatives_spanish:
  - medio
  - semiparte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto astronómico, el término designa una porción dividida; «mitad» conserva el valor cuantitativo sin sobreexplicar.
- source_word: ርኁቅ
  english_pob_choice: distant
  chosen_spanish: distante
  alternatives_spanish:
  - lejano
  - remoto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Distante» mantiene el registro cosmológico y es natural en español para una descripción espacial del luminar.
- source_word: ሳብዐተ እደ
  english_pob_choice: one seventh part
  chosen_spanish: una séptima parte
  alternatives_spanish:
  - una parte de siete
  - siete partes de una
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige la lectura numérica: la sintaxis ge''ez funciona aquí como fracción. En español, «una séptima parte» preserva el sentido matemático de manera transparente.'
- source_word: ኵሉ ክበበ ዚአሁ
  english_pob_choice: all its disk
  chosen_spanish: todo su disco
  alternatives_spanish:
  - todo su círculo
  - toda su redondez
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Disco» conserva la imagen astronómica visible del cuerpo celeste y corresponde al valor de círculo/forma redonda en el contexto.
- source_word: ባክ
  english_pob_choice: empty of
  chosen_spanish: vacío
  alternatives_spanish:
  - vacío de
  - desprovisto de
  - falto de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «está vacío» expresa con naturalidad la privación indicada por el término sin cargar la frase con una construcción más pesada.
- source_word: ዘአልቦ ብርሃነ
  english_pob_choice: empty of light
  chosen_spanish: sin luz
  alternatives_spanish:
  - vacío de luz
  - sin resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB inglesa opta por una formulación de privación de luz; en español, «sin luz» es más idiomático y mantiene la oposición con la parte iluminada.
- source_word: ዘእንበለ
  english_pob_choice: except for
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - a excepción de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Partícula exceptiva simple; «excepto» es claro y sobrio en español moderno.
- source_word: ሳብዐተ እዴሁ
  english_pob_choice: seven parts of it
  chosen_spanish: una séptima parte de él
  alternatives_spanish:
  - sus siete partes
  - siete partes de él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual muestra que aquí la expresión funciona fraccionalmente; se traduce como «una séptima parte de él» para evitar la lectura incorrecta de siete unidades enteras.
- source_word: ዐሠርተ ራብዐተ እደ ብርሃኑ
  english_pob_choice: fourteen parts of its light
  chosen_spanish: una decimocuarta parte de su luz
  alternatives_spanish:
  - catorce partes de su luz
  - catorce medidas de su luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión numérica también es fraccionaria en el contexto del cálculo lunar. «Una decimocuarta parte de su luz» preserva la precisión y evita una falsa lectura de cantidad total.
theological_decisions:
- issue: Descripción astronómica apocalíptica
  english_pob_reading: Retain the verse as a technical-apocalyptic astronomical measurement rather than smoothing it into a generalized statement about waxing or waning.
  chosen_spanish_reading: Mantener la frase como una medición astronómica apocalíptica, sin convertirla en una explicación generalizada de fases lunares.
  alternative_spanish_readings:
  - Parafrasearla como una simple fase de la luna
  - normalizar los números en fracciones modernas sin conservar el estilo del texto
  rationale: El texto pertenece al Libro Astronómico y usa lenguaje repetitivo de medición. La traducción española conserva esa tensión técnica en lugar de resolverla o modernizarla en exceso.
  doctrine_reference: Translation philosophy §Original-language primacy; §Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción incorpora la revisión auditada que corrige la lectura anterior de «siete partes» y «catorce partes» por valores fraccionales («una séptima parte» y «una decimocuarta parte»), conforme al análisis del sintagma ge'ez con እድ como unidad fraccionaria.
  spanish_consistency_notes:
  - Se mantiene «luz» para ብርሃን por coherencia terminológica.
  - Se usa «disco» para ክበብ dentro del registro astronómico.
  - La traducción evita «SEÑOR» u otras equivalencias no pertinentes, dado que este versículo no contiene el nombre divino.
