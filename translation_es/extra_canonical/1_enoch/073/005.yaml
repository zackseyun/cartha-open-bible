  yaml_path: translation/extra_canonical/1_enoch/073/005.yaml
  text: And its distant half is one seventh part[a], and all its disk is empty, without light[c][b], except for a seventh part of it—a fourteenth part of its light.
  footnotes:
  - marker: a
    text: The numerical phrasing is difficult in the Ethiopic witness. The repeated term rendered 'parts' is literally 'hand,' but in this context it functions as a unit or portion in the luminary's measured cycle.
    reason: lexical_alternative
  - marker: b
    text: The verse appears to describe the moon's illuminated and darkened portions in the schematic style of the Astronomical Book rather than in modern scientific terms.
    reason: cultural_note
  - marker: c
    text: Or 'seven parts of one, and all its disk is empty of light except for seven parts of it—fourteen parts of its light.'.
