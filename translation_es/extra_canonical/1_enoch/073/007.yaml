translation:
  language: es
  text: Y se pone con el sol[a]; y cuando sale el sol, la luna sale con él y toma media porción de luz[b]. Y en esa noche, al comienzo de su mañana, antes del día[c], la luna se pone con el sol y permanece oscura durante esa noche—siete partes y media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La formulación mantiene la dificultad del movimiento astronómico en el verso; no se ha intentado armonizarla con una explicación moderna del cielo.
    reason: textual_variant
  - marker: b
    text: El capítulo mide la iluminación lunar en «partes»; por eso se conserva aquí el lenguaje cuantificado de «media porción de luz».
    reason: cultural_note
  - marker: c
    text: También puede entenderse, con una ligera variación de orden, como «antes de que llegue el día»; la traducción mantiene la secuencia temporal del testimonio ge'ez.
    reason: alternative_reading
lexical_decisions:
- source_word: የዓርብ
  english_pob_choice: sets
  chosen_spanish: se pone
  alternatives_spanish:
  - se oculta
  - se oculta tras el horizonte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto astronómico, el verbo describe la puesta de un luminar. «Se pone» es el equivalente natural en español y conserva el movimiento técnico sin sobreexplicar.
- source_word: ይሠርቅ
  english_pob_choice: rises
  chosen_spanish: sale
  alternatives_spanish:
  - asoma
  - sale a la luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para sol y luna, «sale» expresa bien el ascenso/aparición del astro y suena idiomático en español sin perder el paralelo con la puesta.
- source_word: ምስሌሁ
  english_pob_choice: with it
  chosen_spanish: con él
  alternatives_spanish:
  - con ello
  - junto a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El referente inmediato es el sol como luminario; en español, el pronombre masculino concuerda con el sustantivo «sol» y mantiene la relación de acompañamiento.
- source_word: ይነሥእ
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  - adquiere
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La luna «toma» una cantidad medida de luz; «toma» conserva la fuerza concreta del verbo sin introducir una explicación mecánica ajena al texto.
- source_word: መንፈቀ እደ ብርሃን
  english_pob_choice: half a portion of light
  chosen_spanish: media porción de luz
  alternatives_spanish:
  - media medida de luz
  - media parte de luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase combina la idea de mitad con una unidad de medida de luz. «Media porción de luz» conserva el lenguaje cuantificado y el sistema de partes del capítulo.
- source_word: በርእሰ ጽባሐ ዚአሁ
  english_pob_choice: at the beginning of its morning
  chosen_spanish: al comienzo de su mañana
  alternatives_spanish:
  - al inicio de su alba
  - al principio de su amanecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es literalmente temporal y algo extraña; «al comienzo de su mañana» conserva la secuencia y resulta más fluido en español sin borrar la imagen original.
- source_word: በቅድመ ዕለቱ
  english_pob_choice: before the day
  chosen_spanish: antes del día
  alternatives_spanish:
  - antes de que llegue el día
  - antes del amanecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La versión española mantiene la referencia temporal breve y directa. No se añade una explicación astronómica que el texto no ofrece.
- source_word: ይጸልም
  english_pob_choice: is dark
  chosen_spanish: está oscura
  alternatives_spanish:
  - se oscurece
  - permanece oscura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, aplicar el estado a «la luna» con «está oscura» transmite la oscuridad descrita por el verbo sin forzar un calco duro.
- source_word: ፯ሳብዓተ እደ ወንፍቃ
  english_pob_choice: seven parts and a half
  chosen_spanish: siete partes y media
  alternatives_spanish:
  - siete y media partes
  - siete porciones y media
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase final conserva la unidad medida del capítulo. «Siete partes y media» es natural en español y mantiene explícita la cuantificación.
theological_decisions:
- issue: Mantener la imaginería astronómica premoderna sin armonizarla con astronomía moderna
  english_pob_reading: Retain concrete rising/setting and measured 'parts' of light
  chosen_spanish_reading: Conservar la puesta y salida concretas de los luminares, y la medición de la luz en partes
  alternative_spanish_readings:
  - Parafrasear como fases lunares
  - Explicar como conjunción o eclipse
  rationale: 1 Enoc presenta un orden celeste revelado en su propio lenguaje. La traducción española conserva esa tensión y evita convertir el pasaje en una explicación científica moderna.
  doctrine_reference: Principio de preservación de la tensión teológica y literaria del texto
- issue: Ambigüedad temporal en la secuencia «al comienzo de su mañana, antes del día»
  english_pob_reading: Retain the temporal sequence fairly literal rather than smoothing it into a modern astronomical explanation
  chosen_spanish_reading: Mantener la secuencia temporal literal, aunque suene inusual en español
  alternative_spanish_readings:
  - Reordenar para mayor claridad interpretativa
  - Explicarlo como referencia al alba
  rationale: La expresión parece deliberadamente arcaica o técnica; suavizarla demasiado borraría una dificultad real del ge'ez. La versión española conserva el orden y la rareza controlada del original.
  doctrine_reference: Principio de no borrar tensiones textuales documentadas
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail inglés, especialmente la decisión de no añadir lecturas no sustentadas como «del día de la luna». También conserva la secuencia temporal difícil del ge'ez en vez de resolverla con una paráfrasis astronómica moderna.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando aparezca el nombre divino; en este versículo no aplica.
  - Se mantuvo el lenguaje de luminarios con «sol» y «luna» para conservar el paralelo del original.
  - «Parte/porción» se trató como unidad de medida del capítulo, no como simple metáfora.
  - No se introdujo terminología eclesiástica ajena al texto; el estilo es bíblico-sobrio pero en español moderno.
