base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/073/007.yaml
  text: And it sets with the sun[a]; and when the sun rises, the moon rises with it and takes half a portion of light. And on that night, at the beginning of its morning, before the day[c][b], the moon sets with the sun and is dark through that night—seven parts and a half.
  footnotes:
  - marker: a
    text: The Ge'ez wording is difficult in the middle of the verse, especially around 'at the beginning of its morning, before the day.' The translation keeps the temporal sequence fairly literal rather than smoothing it into a modern astronomical explanation.
    reason: textual_variant
  - marker: b
    text: The chapter repeatedly measures lunar light in numbered 'parts.' The phrase rendered 'half a portion of light' likely refers to that same system of fractional illumination.
    reason: cultural_note
  - marker: c
    text: Or 'before the day, the moon sets'.
    reason: previous_rendering
