    text: También podría traducirse «orden» u «ordenanza» para ambos usos de ትእዛዝ; el término ge'ez puede denotar una disposición prescrita o una directiva.
    reason: lexical_alternative
  - marker: b
    text: O «Y después de este mandato vi otro mandato».
    reason: previous_rendering
