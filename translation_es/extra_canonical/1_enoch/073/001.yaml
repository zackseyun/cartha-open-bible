translation:
  language: es
  text: Y después de esta ley[b] vi otra ley para el luminar menor[a], cuyo nombre es la luna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «orden» u «ordenanza» para ambos usos de ትእዛዝ; el término ge'ez puede denotar una disposición prescrita o una directiva.
    reason: lexical_alternative
  - marker: b
    text: O «Y después de este mandato vi otro mandato».
    reason: previous_rendering
lexical_decisions:
- source_word: ወድኅሬሁ
  english_pob_choice: And after this
  chosen_spanish: Y después de esta
  alternatives_spanish:
  - Y luego de esta
  - Y después de esto
  lexicon: Dillmann
  rationale: La fórmula marca transición temporal entre visiones o disposiciones; «después de esta» conserva la secuencia sin cargar el texto con una paráfrasis innecesaria.
- source_word: ትእዛዝ
  english_pob_choice: command / law
  chosen_spanish: ley
  alternatives_spanish:
  - orden
  - ordenanza
  - mandato
  lexicon: Dillmann
  rationale: En este contexto astronómico, el término funciona como disposición normativa o regularidad estable del orden celeste. «Ley» recoge mejor esa fuerza técnica en español que «mandato», que suena a acto puntual de ordenar.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - observé
  lexicon: Dillmann
  rationale: La forma visionaria directa queda bien en pretérito simple español; «vi» es natural y mantiene el testimonio apocalíptico en primera persona.
- source_word: ካልአ
  english_pob_choice: another
  chosen_spanish: otra
  alternatives_spanish:
  - una segunda
  - una ulterior
  lexicon: Dillmann
  rationale: «Otra» conserva la idea de una disposición adicional correspondiente a la anterior sin sugerir necesariamente mera repetición mecánica.
- source_word: ለብርሃን ንኡስ
  english_pob_choice: for the lesser light
  chosen_spanish: para la luz menor
  alternatives_spanish:
  - para el luminar menor
  - para la lumbrera menor
  lexicon: Dillmann
  rationale: «Luz menor» preserva la imagen cósmica y la relación comparativa con la luz mayor, sin introducir un término más técnico que el texto no exige.
- source_word: ዘስሙ
  english_pob_choice: whose name is
  chosen_spanish: cuyo nombre es
  alternatives_spanish:
  - que se llama
  - de nombre
  lexicon: Dillmann
  rationale: La construcción relativa introduce la identificación nominal de forma clara y fluida en español.
- source_word: ወርኅ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna
  - el satélite lunar
  lexicon: Dillmann
  rationale: Es la identificación normal y transparente del luminar menor; «la luna» mantiene el paralelismo cósmico del pasaje.
theological_decisions:
- issue: Valor técnico de ትእዛዝ en el libro astronómico
  english_pob_reading: law / command
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - orden
  - mandato
  - ordenanza
  rationale: El contexto describe el régimen regular de los astros, no una orden aislada. «Ley» expresa mejor la idea de disposición normativa y cíclica, en línea con la revisión auditada del inglés POB.
  doctrine_reference: Optimal equivalence; preservar la imagen apocalíptica del orden cósmico y su regularidad normativa.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que prefirió «law» frente a «command» para ትእዛዝ en este pasaje del Libro Astronómico, y mantiene la identificación del segundo miembro como «la luna».
  spanish_consistency_notes:
  - Se mantiene «ley» para ትእዛዝ en este contexto astronómico, por coherencia con el valor técnico señalado en el audit trail.
  - «Luz menor» conserva la imaginería cosmológica del original y evita una terminología más eclesiástica o interpretativa.
  - La puntuación y el orden sintáctico buscan sonar naturales en español sin diluir la repetición conceptual del texto fuente.
