base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/073/003.yaml
  text: And in every month its going out and its returning vary[a], and its days are like the days of the sun; and when its light is full[c][b], it is a seventh part of the light of the sun.
  footnotes:
  - marker: a
    text: The verse speaks of a luminary's cyclical 'going out' and 'returning,' likely technical or semi-technical astronomical language for its course. More interpretive renderings such as 'rising' and 'setting' are possible but not certain from the Ge'ez alone.
    reason: lexical_alternative
  - marker: b
    text: The darkening language likely refers to the moon's waning light in comparison with the sun, here quantified as one-seventh.
    reason: cultural_note
  - marker: c
    text: Or 'when it becomes dark, its light amounts to'.
    reason: previous_rendering
