translation:
  language: es
  text: Y en cada mes, su salida y su retorno varían[a], y sus días son como los días del sol; y cuando su luz es plena[c][b], es una séptima parte de la luz del sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Salida’ y ‘retorno’ siguen el paralelismo técnico del ge'ez. También podría entenderse como ‘salir’ y ‘entrar’, o, en contexto astronómico, ‘salir’ y ‘ponerse’; se prefirió una forma menos interpretativa.
    reason: lexical_alternative
  - marker: b
    text: El pasaje parece describir la luna cuando su luz está completa o plena; el sentido no es que se oscurezca, sino que, en esa fase, su luz equivale a una séptima parte de la del sol.
    reason: theological_note
  - marker: c
    text: 'También puede traducirse: ‘cuando su luz se completa’ o ‘cuando su luz llega a plenitud’.'
    reason: alternative_reading
lexical_decisions:
- source_word: ሙፃኢሁ
  english_pob_choice: its going out
  chosen_spanish: su salida
  alternatives_spanish:
  - su salida fuera
  - su salida al exterior
  - su salida / su salir
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea básica es de 'salir' o 'ir fuera'. En español, 'su salida' conserva la formalidad y el paralelo con 'su retorno' sin añadir una imagen más específica como 'salida del sol' o 'salida' astronómica.
- source_word: ምብዋኢሁ
  english_pob_choice: its returning
  chosen_spanish: su retorno
  alternatives_spanish:
  - su regreso
  - su entrada
  - su vuelta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El par con 'salida' pide un sustantivo paralelo en español. 'Retorno' mantiene la correspondencia formal y puede abarcar regreso o reentrada sin cerrar indebidamente el sentido astronómico.
- source_word: ይትዌለጥ
  english_pob_choice: vary
  chosen_spanish: varían
  alternatives_spanish:
  - cambian
  - se distinguen
  - se alteran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa alteración o diferenciación. 'Varían' es natural en español y conserva el sentido observacional/calendárico del texto.
- source_word: መዋዕሊሁ
  english_pob_choice: its days
  chosen_spanish: sus días
  alternatives_spanish:
  - sus días señalados
  - la duración de sus días
  - sus jornadas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma más directa y fiel es 'sus días'. Otras opciones añaden interpretación calendárica que no está exigida por el ge'ez.
- source_word: ከመ መዋዕለ ፀሐይ
  english_pob_choice: like the days of the sun
  chosen_spanish: como los días del sol
  alternatives_spanish:
  - igual que los días del sol
  - según los días del sol
  - como los días del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El comparativo ከመ pide 'como'. 'Del sol' es la forma natural y transparente en español para conservar la comparación sin forzar explicaciones adicionales.
- source_word: ይፄሪ
  english_pob_choice: when its light is full
  chosen_spanish: cuando su luz es plena
  alternatives_spanish:
  - cuando su luz está llena
  - cuando su luz está completa
  - cuando su luz llega a plenitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto astronómico y la revisión del audit trail indican que el verbo describe luminosidad clara/plena, no oscuridad. 'Es plena' refleja ese estado sin introducir un giro interpretativo excesivo.
- source_word: ከዊነ ብርሃኑ ይከውን
  english_pob_choice: it is a seventh part
  chosen_spanish: es una séptima parte
  alternatives_spanish:
  - llega a ser una séptima parte
  - equivale a una séptima parte
  - representa una séptima parte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula final expresa equivalencia cuantitativa. 'Es una séptima parte' es la versión más directa y natural en español, manteniendo la precisión numérica del texto.
- source_word: ሳብዓደ እደ
  english_pob_choice: a seventh part
  chosen_spanish: una séptima parte
  alternatives_spanish:
  - un séptimo
  - la séptima parte
  - una parte séptima
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Una séptima parte'' es idiomático y exacto en español, y conserva el valor fraccional del original.'
- source_word: እምብርሃነ ፀሐይ
  english_pob_choice: of the light of the sun
  chosen_spanish: de la luz del sol
  alternatives_spanish:
  - de la luz del sol
  - de la claridad del sol
  - del resplandor del sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Luz del sol'' reproduce con sencillez la relación genitiva y evita sobreinterpretar el matiz como ''resplandor'' o ''claridad'' salvo necesidad contextual.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente que corrigió una lectura errónea de oscuridad: el audit trail indica que ይፄሪ describe plenitud/claridad de la luz lunar, no oscurecimiento. Por eso el español evita cualquier referencia a ‘ponerse oscuro’ y conserva la relación cuantitativa final tal como quedó en la última pasada revisada.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento impersonal y astronómico del sujeto (‘su salida’, ‘su retorno’, ‘su luz’) para respetar el paralelismo del original.
  - Se evitó ‘SEÑOR’ y no hay terminología teológica que requiera adaptación doctrinal en esta línea.
  - La puntuación reproduce una cadencia bíblica moderna y clara, adecuada para un registro publicable en español.
