translation:
  language: es
  text: Y su circuito es como el circuito del cielo, y sus carros, por los cuales sale, son impulsados por el viento[a]; y la luz le es dada por medida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula sobre el viento es difícil en el testimonio etiópico. El sentido puede ser que sus carros avanzan impulsados por el viento, o que proceden adonde sopla el viento.
    reason: textual_variant
  - marker: b
    text: También puede entenderse «según medida» o «con medida fija», subrayando una distribución ordenada y regulada de la luz.
    reason: lexical_alternative
lexical_decisions:
- source_word: ክበቡ
  english_pob_choice: its circuit
  chosen_spanish: su circuito
  alternatives_spanish:
  - su circunferencia
  - su curso
  - su órbita
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Circuito» conserva la idea de un contorno o recorrido circular sin imponer una terminología astronómica moderna que el texto ge'ez no exige de manera explícita.
- source_word: ከመ፡ ክበበ፡ ሰማይ
  english_pob_choice: like the circuit of heaven
  chosen_spanish: como el circuito del cielo
  alternatives_spanish:
  - como la circunferencia del cielo
  - como el circuito de los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la comparación formal y el registro cósmico; «cielo» comunica bien en español sin sobrecargar con una formulación más interpretativa.
- source_word: ሰረገላተ፡ ዚአሁ
  english_pob_choice: its chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - sus carros de guerra
  - sus carros-carruajes
  - sus chariots
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «carros» preserva la imagen vehicular antigua con naturalidad; «carros de guerra» sería más interpretativo y «chariots» no es idiomático.
- source_word: በኀበ፡ ይጼዓን
  english_pob_choice: by which it goes out
  chosen_spanish: por medio de los cuales sale
  alternatives_spanish:
  - por los cuales sale
  - con los cuales sale
  - en los cuales sale
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula es difícil y el inglés POB la entendió en sentido de salida/avance. «Por medio de los cuales sale» conserva esa idea sin decidir en exceso entre locomoción, salida o envío.
- source_word: ነፋስ፡ ትነፍስ
  english_pob_choice: are driven by the wind
  chosen_spanish: son impulsados por el viento
  alternatives_spanish:
  - son llevados por el viento
  - son arrastrados por el viento
  - son impulsados por los vientos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Impulsados» refleja bien la fuerza motriz del viento y evita una imagen demasiado mecánica. Se conserva el singular de la versión revisada en inglés, aunque el griego/etiópico admite un matiz colectivo.
- source_word: በመስፈርት
  english_pob_choice: by measure
  chosen_spanish: por medida
  alternatives_spanish:
  - según medida
  - de acuerdo con una medida
  - con medida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Por medida» reproduce la pasiva/indirecta del original y mantiene la idea de distribución ordenada y regulada de la luz.
- source_word: ይትወሀብ ሎቱ ብርሃን
  english_pob_choice: light is given to it
  chosen_spanish: la luz le es dada
  alternatives_spanish:
  - se le da luz
  - la luz le es concedida
  - recibe luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva se conserva en español para reflejar que la luz es otorgada, no autooriginada. «Le es dada» mantiene el tono formal y la relación de dativo del original.
theological_decisions:
- issue: Cómo traducir la imagen cósmica sin modernizarla
  english_pob_reading: Retain cosmic imagery with 'circuit' and 'chariots' rather than modernizing to 'orbit' or 'pathways.'
  chosen_spanish_reading: Mantener «circuito» y «carros» como imágenes cósmicas, sin convertirlas en terminología astronómica moderna.
  alternative_spanish_readings:
  - su órbita ... sus vehículos
  - su curso ... sus movimientos
  - su trayectoria ...
  rationale: El pasaje pertenece al registro visionario del Libro Astronómico; conviene preservar la imaginería apocalíptica en vez de neutralizarla con vocabulario técnico moderno que no está en el testimonio ge'ez.
  doctrine_reference: 'Principio de traducción: preservar la imaginería apocalíptica y no aplanarla en prosa moderna.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del expediente inglés, que restituye la cláusula sobre los carros y matiza el movimiento con «by which it goes out, are driven by the wind». La redacción española intenta conservar esa restitución del sentido sin adoptar un calco extraño en español.
  spanish_consistency_notes:
  - Se siguió el estilo de POB para lenguaje cósmico y apocalíptico, manteniendo imaginería concreta.
  - Se evitó reemplazar «circuito» por «órbita» para no introducir modernización no documentada.
  - Se conservó la pasiva en «la luz le es dada» para reflejar el otorgamiento de la luz.
  - Se usó «viento» en singular dentro del cuerpo del texto, con nota sobre la ambigüedad del original y la posible colectividad de la imagen.
