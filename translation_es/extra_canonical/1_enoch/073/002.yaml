base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/073/002.yaml
  text: And its circuit is like the circuit of heaven[a], and its chariots, by which it goes out, are driven by the wind[c][b]; and light is given to it by measure.
  footnotes:
  - marker: a
    text: The clause about the winds is difficult in the Ethiopic witness. The sense may be that its chariots proceed where the wind blows, or that they are driven along by winds.
    reason: textual_variant
  - marker: b
    text: Or 'according to measure' or 'by fixed measure.' The phrase emphasizes regulated, ordered distribution of light.
    reason: lexical_alternative
  - marker: c
    text: Or 'and its chariots are borne along by the winds'.
    reason: previous_rendering
