translation:
  language: es
  text: Y ese día toma una séptima parte de la mitad de su luz[a][b], y su luz llega a ser una parte y media de un séptimo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Séptima parte» traduce aquí la fracción indicada por el ge'ez; el texto no dice «siete partes».
    reason: textual_variant
  - marker: b
    text: La expresión es matemática y algo difícil; el orden exacto de las fracciones se conserva sin intentar normalizarlo más de lo que permite el original.
    reason: source_note
  - marker: c
    text: La cláusula final es numéricamente difícil en el original. Esta redacción intenta reflejar la idea de «una parte y media de un séptimo», en vez de simplificarla como si fuera «un séptimo y medio» en un sentido más libre.
    reason: textual_variant
