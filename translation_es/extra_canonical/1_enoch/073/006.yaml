theological_decisions:
- issue: Personificación lunar
  english_pob_reading: Use feminine pronouns ('she,' 'her') for the rising luminary
  chosen_spanish_reading: Usar un referente impersonal («su luz») y no introducir género personal
  alternative_spanish_readings:
  - ella / su luz
  - él / su luz
  rationale: La revisión auditada corrige la lectura personificada anterior y señala que el ge'ez usa un posesivo masculino para la luna. Por eso el español debe evitar una personificación no apoyada por el texto y mantener el registro astronómico descriptivo.
  doctrine_reference: Principio de fidelidad textual y preservación de la corrección filológica frente a la personificación literaria.
translation_notes:
  revision_awareness: 'El borrador anterior seguía una lectura ya corregida por la revisión auditada: confundía el verbo único, invertía la fracción principal y personificaba la luna con pronombres femeninos. Este borrador adopta la lectura revisada: acción única de tomar/recibir, fracción de una séptima parte, y referencia impersonal al brillo/luz.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra convención de sustitución porque el pasaje no involucra el Tetragrámaton.
  - Se conserva un registro sobrio y técnico, acorde con el discurso astronómico del libro.
  - «Luz» se mantiene literal para bərhānu, sin añadir matices de «brillo» salvo en alternativas.
  - Las fracciones se expresan de forma legible para el lector español sin borrar la dificultad del cierre del versículo.
