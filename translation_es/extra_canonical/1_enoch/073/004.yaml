  language: en
  yaml_path: translation/extra_canonical/1_enoch/073/004.yaml
  text: And in this way it rises[a], and its front, which is toward the east, comes out on the thirtieth morning, and on that day it becomes visible, and it shall be for you the beginning of the month, on the thirtieth day with the sun[e][d][c][b], in the gate from which the sun comes out.
