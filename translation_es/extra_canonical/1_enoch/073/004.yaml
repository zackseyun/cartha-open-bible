translation:
  language: es
  text: Y de esta manera se levanta[a], y su frente, que está hacia el oriente,[b] sale en la trigésima mañana, y en aquel día se hace visible, y para ustedes será el comienzo del mes[c], en el trigésimo día con el sol,[d] en la puerta por la cual sale el sol.[e]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y de esta manera se oculta». Una interpretación anterior entendía aquí el verbo ge''ez como ‘ocultarse’, pero en este contexto astronómico se refiere al levantarse o surgir del astro.'
    reason: previous_rendering
  - marker: b
    text: 'O: «y su cabeza, que está hacia el oriente, sale». El ge''ez conserva una imagen corporal para la parte que emerge; la revisión inglesa optó por ‘frente’ para mayor naturalidad.'
    reason: lexical_alternative
  - marker: c
    text: Lit. «la cabeza del mes». El ge'ez usa un modismo concreto para el comienzo del mes.
    reason: lexical_alternative
  - marker: d
    text: 'O: «treinta días». En este contexto calendárico, la expresión funciona mejor como una fecha ordinal: «en el trigésimo día».'
    reason: previous_rendering
  - marker: e
    text: La «puerta» forma parte de la imaginería recurrente del Libro Astronómico para los cuerpos celestes que salen por portales ordenados del cielo.
    reason: cultural_note
lexical_decisions:
- source_word: ይሠርቅ
  english_pob_choice: it rises
  chosen_spanish: se levanta
  alternatives_spanish:
  - sale
  - resplandece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto astronómico exige el sentido de levantarse/ascender, no el de ocultarse. En español, 'se levanta' conserva la imagen de un astro que emerge sin introducir una paráfrasis moderna.
- source_word: ርእሱ
  english_pob_choice: its front
  chosen_spanish: su frente
  alternatives_spanish:
  - su cabeza
  - su comienzo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La nota inglesa pasó de 'head' a 'front' para mayor naturalidad, pero el ge'ez mantiene la imagen concreta de 'cabeza'. En español, 'frente' permite conservar la orientación espacial hacia el oriente sin perder el valor corporal/metafórico del original.
- source_word: ዘመንገለ ጽባሕ
  english_pob_choice: toward the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - en dirección al oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Oriente'' preserva el registro más digno y bíblico-cósmico, y corresponde al campo semántico de la salida del sol.'
- source_word: በሠላሳ ጽባሕ
  english_pob_choice: on the thirtieth morning
  chosen_spanish: en la trigésima mañana
  alternatives_spanish:
  - en la mañana treinta
  - al amanecer trigésimo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción temporal del ge'ez se rinde de manera directa. 'Trigésima mañana' conserva el paralelismo con la primera cláusula y evita normalizarla a un día genérico.
- source_word: ያስተርኢ
  english_pob_choice: it becomes visible
  chosen_spanish: se hace visible
  alternatives_spanish:
  - aparece
  - se muestra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El causativo aquí describe el resultado observable de la aparición lunar; 'se hace visible' expresa ese valor sin añadir interpretación.
- source_word: ርእሰ ወርኅ
  english_pob_choice: the beginning of the month
  chosen_spanish: el comienzo del mes
  alternatives_spanish:
  - la cabeza del mes
  - el principio del mes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La POB inglesa optó por el sentido idiomático, y en español 'comienzo del mes' comunica con claridad la función calendárica. Se evita 'cabeza del mes' por resultar menos natural para lectores hispanos, sin perder el valor de inicio.
- source_word: ሠላሳ ዕለት
  english_pob_choice: on the thirtieth day
  chosen_spanish: en el día treinta
  alternatives_spanish:
  - el trigésimo día
  - en treinta días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto calendárico, el número cardinal funciona como fecha ordinal. 'Día treinta' sigue fielmente la función temporal que el audit trail ya corrigió en inglés.
- source_word: ምስለ ፀሐይ
  english_pob_choice: with the sun
  chosen_spanish: con el sol
  alternatives_spanish:
  - junto con el sol
  - al mismo tiempo que el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Con el sol'' mantiene la asociación calendárica y la coordinación de los cuerpos celestes sin amplificar el sentido.'
- source_word: በኆኅት
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de entrada
  - en el portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Puerta'' conserva la imagen cosmológica recurrente del Libro Astronómico. En español, ''puerta'' comunica mejor que ''portal'' la concreción del motivo, aunque el término sigue siendo figurado.'
- source_word: እንተ ይወፅእ ፀሐይ
  english_pob_choice: from which the sun comes out
  chosen_spanish: por la cual sale el sol
  alternatives_spanish:
  - de la cual sale el sol
  - por donde sale el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sale el sol'' reproduce la salida concreta del astro, y ''por la cual'' hace explícita la relación con la puerta sin desviar el sentido.'
theological_decisions:
- issue: Conservar la imaginería cosmológica en vez de modernizarla
  english_pob_reading: Retain concrete cosmological imagery such as 'front,' 'gate,' and the sun's 'coming out.'
  chosen_spanish_reading: Conservar 'frente', 'puerta' y 'sale el sol' como imágenes cosmológicas concretas.
  alternative_spanish_readings:
  - normalizar a 'horizonte oriental' y 'salida del sol'
  - reducir a lenguaje astronómico moderno
  rationale: El texto pertenece al Libro Astronómico y su valor literario depende de un sistema revelado de portales y salidas celestes. Modernizarlo borraría el mundo simbólico y apocalíptico del pasaje.
  doctrine_reference: 'Tradición de traducción POB: preservar la imaginería apocalíptico-cosmológica sin aplanarla a prosa científica moderna.'
translation_notes:
  revision_awareness: 'El audit trail inglés corrige un error anterior que entendía ይሠርቅ como ''it is hidden''; la revisión establece ''it rises''. También ajusta la sintaxis para mostrar que ''its head/front'' está en relación relativa con ''toward the east'', y precisa que ሠላሳ ዕለት es una fecha ordinal: ''on the thirtieth day''. La versión española sigue esas correcciones y evita cualquier lectura de ocultamiento.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto base lo requiera; aquí no aparece el nombre divino.
  - Se mantiene 'sol' y no 'astro' porque el contexto concreto identifica el cuerpo celeste sin ambigüedad.
  - '''Puerta'' se conserva por coherencia con la imaginería del Libro Astronómico, no como metáfora arquitectónica general.'
  - '''Oriente'' y ''sale'' se eligen por registro bíblico-natural en español, coherente con el sistema cosmológico del pasaje.'
