translation:
  language: es
  text: Y transformaré la tierra seca[a] y la haré una bendición; y haré que mis escogidos[b] habiten en ella; pero los que cometen pecado y transgresión no pondrán pie en ella[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra seca». El término ge'ez denota tierra o suelo reseco; el matiz exacto puede abarcar más que una sola porción de terreno.
    reason: lexical_alternative
  - marker: b
    text: O «elegidos». Se mantiene el sentido apocalíptico de los seleccionados por Dios sin introducir un tecnicismo eclesial posterior.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «no irán/caminarán en ella» o «sobre ella». «No pondrán pie en ella» expresa con naturalidad la exclusión de acceso a la tierra renovada.
    reason: lexical_alternative
lexical_decisions:
- source_word: እዌልጦ
  english_pob_choice: I will transform
  chosen_spanish: transformaré
  alternatives_spanish:
  - cambiaré
  - alteraré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa un cambio de estado fuerte. «Transformaré» conserva mejor el giro escatológico y la inversión de condiciones que un simple «cambiaré».
- source_word: ለየብስ
  english_pob_choice: the dry land
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - la tierra seca
  - la tierra firme
  - el suelo seco
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ge'ez apunta a tierra/terreno seco. «La tierra seca» mantiene el sentido concreto y la escala amplia de la renovación cósmica mejor que una referencia a un terreno localizado.
- source_word: እገብራ በበረከት
  english_pob_choice: make it a blessing
  chosen_spanish: la haré una bendición
  alternatives_spanish:
  - la haré bendecida
  - la convertiré en bendición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La construcción expresa un resultado: la tierra pasa a estar caracterizada por bendición. «La haré una bendición» conserva ese valor resultativo y la inversión de maldición a bendición.'
- source_word: ሕሩያነ
  english_pob_choice: my chosen ones
  chosen_spanish: mis escogidos
  alternatives_spanish:
  - mis elegidos
  - mis escogidos/as
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escogidos» preserva la categoría apocalíptica sin cargarla con asociaciones eclesiales posteriores. Es natural en español y mantiene el vínculo posesivo con Dios.
- source_word: አነብሮሙ ውስቴታ
  english_pob_choice: I will cause them to dwell in it
  chosen_spanish: haré que ... habiten en ella
  alternatives_spanish:
  - los haré morar en ella
  - los estableceré en ella
  - haré que vivan en ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El causativo importa: el hablante establece activamente a los escogidos en la tierra renovada. «Habiten» es digno y claro; «en ella» se ajusta al referente femenino de «la tierra».'
- source_word: ኃጢአተ ወጌጋየ
  english_pob_choice: sin and transgression
  chosen_spanish: pecado y transgresión
  alternatives_spanish:
  - pecado y rebelión
  - pecados y ofensas
  - pecado y pecado de transgresión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja intensifica la culpabilidad moral. «Pecado y transgresión» preserva la duplicación semántica sin diluirla en un solo término genérico.
- source_word: ኢይከይዱ ውስቴታ
  english_pob_choice: shall not set foot in it
  chosen_spanish: no la pisarán
  alternatives_spanish:
  - no caminarán sobre ella
  - no pasarán por ella
  - no pondrán pie en ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo base es de ir/caminar, pero en contexto marca exclusión de acceso. «No la pisarán» comunica con concisión la prohibición y conserva la imagen física del ingreso negado.
theological_decisions:
- issue: Identidad de los 'escogidos' en el contexto apocalíptico
  english_pob_reading: Render as 'my chosen ones' without harmonizing to later Christian terminology.
  chosen_spanish_reading: «mis escogidos» sin añadir terminología eclesial posterior.
  alternative_spanish_readings:
  - mis electos
  - mis santos
  rationale: El término ge'ez designa a los seleccionados/favorecidos por Dios en este marco apocalíptico. «Escogidos» conserva la categoría local sin importar cargas doctrinales ajenas al pasaje.
  doctrine_reference: 'Principio del proyecto: preservar la tensión teológica y el contexto literario local sin resolverlo prematuramente.'
- issue: Alcance de la tierra renovada
  english_pob_reading: Translate concretely as renewed 'dry land' becoming blessed land.
  chosen_spanish_reading: «la tierra seca» como realidad renovada y bendecida.
  alternative_spanish_readings:
  - la tierra en general
  - el desierto
  rationale: El pasaje presenta una inversión escatológica de sequedad a bendición. Mantener la concreción de «tierra seca» preserva la imagen sin reducirla a una alegoría abstracta.
  doctrine_reference: 'Contexto del libro: preservar la imaginería cósmica/apocalíptica en vez de aplanarla.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del contexto inglés: la preferencia por ''dry land'' sobre ''dry ground'' para conservar la escala cósmica, la alineación de la localización con ''in it'', y la naturalidad de la prohibición final. En español, «la tierra seca» mantiene esa escala sin perder la imagen física, y se reflejó la exclusión con un verbo breve y visible.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente en este versículo, sino porque el hablante divino del contexto apocalíptico se conserva como voz de Dios sin sustituirla por una máscara litúrgica.
  - Se evitó «Cristo» y cualquier armonización cristiana posterior; el texto habla de una categoría apocalíptica de escogidos.
  - Se mantuvo un registro formal y bíblico, pero con sintaxis española natural.
  - Los marcadores de nota aparecen solo donde hay una alternativa real o una aclaración de estilo necesaria.
