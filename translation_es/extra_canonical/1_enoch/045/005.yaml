  yaml_path: translation/extra_canonical/1_enoch/045/005.yaml
  text: And I will transform the dry land and make it a blessing[a], and I will cause my chosen ones to dwell in it[c][b]; but those who commit sin and transgression shall not set foot in it.
  footnotes:
  - marker: a
    text: Or 'the dry land.' The Ge'ez term denotes parched or dry ground; the exact nuance may be broader than a single plot of soil.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause literally uses a verb of going or walking: ''shall not go/walk upon it.'' ''Tread upon it'' is chosen to make the exclusion from the renewed land explicit in English.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the dry ground'.
