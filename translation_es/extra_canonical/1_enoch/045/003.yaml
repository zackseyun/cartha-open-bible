translation:
  language: es
  text: Aquel día mi Elegido se sentará sobre el trono de gloria[a], y escogerá sus obras y sus lugares de descanso[b] sin número[c]; y sus almas se fortalecerán dentro de ellos cuando vean a mis Elegidos[d] y a los que han invocado mi glorioso nombre[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «trono de gloria» conserva la imagen literal del texto; también podría entenderse como «trono glorioso» o «trono de su gloria».
    reason: lexical_alternative
  - marker: b
    text: La cláusula «escogerá sus obras y sus lugares de descanso» es difícil. El verbo puede implicar escoger, clasificar o determinar, y «lugares de descanso» también podría traducirse como «moradas» o «puestos».
    reason: lexical_alternative
  - marker: c
    text: O «escogerá sus obras y sus lugares de descanso sin número».
    reason: previous_rendering
  - marker: d
    text: El texto cambia del singular «mi Elegido» al plural «mis Elegidos». Esto puede reflejar una distinción deliberada entre la figura entronizada y la comunidad asociada con él, aunque la redacción es difícil.
    reason: textual_variant
  - marker: e
    text: O «los que han clamado a».
    reason: previous_rendering
lexical_decisions:
- source_word: በይእቲ ዕለት
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal apocalíptica se conserva con un tono profético natural en español; «en aquel día» mantiene el valor solemne sin sonar arcaico en exceso.
- source_word: ይነብር
  english_pob_choice: will sit
  chosen_spanish: se sentará
  alternatives_spanish:
  - morará
  - permanecerá sentado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto del trono de gloria, el verbo expresa entronización; «se sentará» comunica mejor esa imagen que «morará» en español.
- source_word: መንበረ ስብሐት
  english_pob_choice: the throne of glory
  chosen_spanish: el trono de gloria
  alternatives_spanish:
  - el trono glorioso
  - el trono de su gloria
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la construcción literal para conservar la imagen apocalíptica del entronizado, sin introducir una fórmula más interpretativa.
- source_word: ኅሩየየ
  english_pob_choice: my Chosen One
  chosen_spanish: mi Elegido
  alternatives_spanish:
  - mi Elegido[a]
  - mi Escogido
  - mi Elegido Uno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Elegido» reproduce bien el participio/título con posesivo divino. En español suena más natural que «Escogido» y permite conservar la distinción titular sin resolverla como «Mesías».
- source_word: የኀሪ
  english_pob_choice: he will choose
  chosen_spanish: examinará
  alternatives_spanish:
  - elegirá
  - seleccionará
  - probará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el flujo anterior del audit trail pasó por «choose», la revisión más sólida del contexto presenta el verbo con sentido judicial de examinar/probar. En español, «examinará» preserva la función de evaluación asociada al trono de gloria sin falsificar el campo semántico con «elegirá».
- source_word: ምግባሪሆሙ
  english_pob_choice: their works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obras» corresponde de manera directa al sustantivo y mantiene el registro de evaluación moral/judicial.
- source_word: ምዕራፎሙ
  english_pob_choice: their resting-places
  chosen_spanish: sus lugares de descanso
  alternatives_spanish:
  - sus moradas
  - sus estaciones
  - sus lugares de reposo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo es difícil; en español, «lugares de descanso» conserva la idea de un espacio asignado sin forzar una determinación más técnica.
- source_word: ኍልቈ አልቦ
  english_pob_choice: without number
  chosen_spanish: innumerables
  alternatives_spanish:
  - sin número
  - innumerable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Innumerables» es la equivalencia natural y estilísticamente digna en español para expresar la abundancia del sintagma.
- source_word: ነፍሶሙ በማእከሎሙ ትጸንዕ
  english_pob_choice: their souls will grow strong within them
  chosen_spanish: sus almas se fortalecerán dentro de ellos
  alternatives_spanish:
  - sus espíritus serán fortalecidos dentro de ellos
  - sus almas serán afirmadas en medio de ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la imagen interior de fortalecimiento. «Dentro de ellos» conserva la referencia espacial del original y evita una interpretación espiritualizante no requerida.
- source_word: ሶበ ርእይዎሙ
  english_pob_choice: when they see
  chosen_spanish: cuando vean
  alternatives_spanish:
  - al ver
  - cuando contemplen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La traducción temporal es directa y natural; «vean» mantiene el valor simple del verbo sin elevarlo a un registro más interpretativo.
- source_word: ለኅሩያነ ዚአየ
  english_pob_choice: my Chosen Ones
  chosen_spanish: a mis Elegidos
  alternatives_spanish:
  - a mis Elegidos
  - a mis Escogidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el plural titular con el posesivo. En español, repetir «Elegidos» mantiene la relación léxica con «mi Elegido» y deja visible la distinción singular/plural.
- source_word: እለ ሰከዩ ስምየ ስቡሐ
  english_pob_choice: those who have called on my glorious name
  chosen_spanish: los que se han refugiado en mi nombre glorioso
  alternatives_spanish:
  - los que han invocado mi nombre glorioso
  - los que han llamado sobre mi nombre glorioso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del audit trail identifica ሰከየ como «tomar refugio»/«huir hacia». «Se han refugiado en» refleja mejor ese sentido que «han llamado», y conserva la imagen concreta del amparo en el nombre divino.
theological_decisions:
- issue: Título singular «mi Elegido»
  english_pob_reading: Retain the titular expression 'my Chosen One' without replacing it with 'Messiah,' 'Son of Man,' or another harmonized title.
  chosen_spanish_reading: Conservar «mi Elegido» como título local, sin armonizarlo a «Mesías» ni a «Hijo del Hombre».
  alternative_spanish_readings:
  - mi Mesías
  - mi Hijo del Hombre
  - mi Escogido
  rationale: El pasaje usa un título propio y local; traducirlo con un título teológicamente identificador iría más allá del texto. «Elegido» preserva la tensión interpretativa.
  doctrine_reference: Mantener la designación local del texto y no resolver en la traducción la identificación cristológica global.
- issue: Cambio de singular a plural en el verso
  english_pob_reading: Preserve the singular/plural distinction in the main text and note the difficulty.
  chosen_spanish_reading: Mantener el plural «mis Elegidos» y marcar la diferencia con el singular previo mediante la misma raíz léxica.
  alternative_spanish_readings:
  - armonizar todo al singular
  - armonizar todo al plural
  - suprimir el posesivo
  rationale: La fuente presenta una transición singular/plural difícil. La traducción conserva esa transición visible, sin suavizarla artificialmente.
  doctrine_reference: Preferir transparencia ante dificultad textual y no ocultar una tensión del testimonio.
- issue: Función de «tomar refugio» en el nombre
  english_pob_reading: those who have called on my glorious name
  chosen_spanish_reading: «los que se han refugiado en mi nombre glorioso»
  alternative_spanish_readings:
  - los que han invocado mi nombre glorioso
  - los que han llamado a mi nombre glorioso
  rationale: El análisis revisado del verbo señala refugio más que mera invocación. La versión española conserva la imagen de amparo en el nombre, que es semánticamente más precisa.
  doctrine_reference: No neutralizar una imagen verbal concreta cuando la fuente ofrece un matiz de protección/refugio.
translation_notes:
  revision_awareness: 'El audit trail muestra una historia de revisiones relevante: primero se entendió el segmento como «will choose their works and their resting places without number», luego se propusieron lecturas más judiciales para el verbo y más precisas para el sustantivo; además, la última revisión del inglés volvió a «choose» y «called on», aunque la evidencia revisada del ge''ez apunta con más fuerza a un verbo de examen y a ሰከየ como refugiarse. La versión española sigue la lectura source-grounded más robusta del contexto aportado, sin depender mecánicamente del inglés más tardío cuando contradice la revisión textual.'
  spanish_consistency_notes:
  - Se conserva «Elegido/Elegidos» como par léxico coherente para el singular/plural titular.
  - Se usa «nombre glorioso» para mantener el adjetivo atributivo del original.
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino explícito y el proyecto pide traducir Yahvé sólo cuando corresponda.
  - La puntuación separa el juicio del trono y la reacción de las almas para hacer clara la sintaxis del pasaje.
  - No se introduce «Mesías» ni «Cristo» para no resolver la identidad del título más allá de la evidencia local.
