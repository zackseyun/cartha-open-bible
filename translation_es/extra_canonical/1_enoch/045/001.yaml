review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del ge''ez y sigue la revisión inglesa en «la segunda parábola», «los que niegan» y la construcción literal difícil. Sin embargo, en dos puntos se aparta de manera significativa del rastro auditado: traduce ቅዱሳን como «los santos», cuando la POB inglesa conservó deliberadamente «the holy ones» para evitar la carga eclesiástica de «saints»; y usa «Señor de los Espíritus», donde la mayúscula en «Espíritus» introduce una interpretación reverencial no exigida por la fuente ni por el inglés. Además, la nota c debe reflejar mejor que «otra parábola» es una traducción previa/alternativa de ካልእ, no una mera alternativa léxica sin contexto.'
  spanish_quality_summary: El español es claro y digno, pero «los santos» suena más tradicional y más definido de lo que conviene aquí. «Los santos seres» sería torpe, pero «los seres santos» preserva mejor la ambigüedad sin caer en una glosa doctrinal cerrada. También conviene usar «espíritus» en minúscula dentro del título para no sugerir que el texto distingue una clase técnica llamada «Espíritus».
  glossary_alignment: 'No hay conflicto con los términos nucleares del glosario general como Yahvé/Mesías. Sí hay que alinear mejor con la política contextual de preservar ambigüedad: ቅዱሳን debe evitar «santos» si eso empuja hacia «saints». El título «Lord of Spirits» se traduce correctamente como «Señor de los espíritus», manteniendo el plural contextual sin mayúscula interpretativa.'
  issues:
  - severity: medium
    issue: «los santos» estrecha indebidamente ቅዱሳን
    rationale: La documentación inglesa escogió «the holy ones» precisamente para preservar una ambigüedad entre seres celestiales y los justos. En español, «los santos» suele activar con más fuerza la idea eclesiástica de «saints», por lo que no conserva igual de bien la tensión del original.
  - severity: low
    issue: Mayúscula en «Espíritus» dentro de «Señor de los Espíritus»
    rationale: La fuente y el POB inglés no exigen esa capitalización. En español puede introducir una distinción teológica innecesaria. «Señor de los espíritus» es más neutral y fiel.
  - severity: low
    issue: La nota c clasifica imperfectamente la alternativa «otra parábola»
    rationale: El inglés la marca como previous_rendering. En español, la nota debería dejar claro que es una traducción alternativa o previa de ካልእ, no una preferencia paralela de igual peso en este contexto ya adjudicado.
