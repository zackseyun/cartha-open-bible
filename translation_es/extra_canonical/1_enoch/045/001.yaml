- from: Y esta es la segunda parábola acerca de los que niegan el nombre de la morada de los santos[a] y del Señor de los Espíritus[b][c].
  to: Y esta es la segunda parábola acerca de los que niegan el nombre de la morada de los seres santos[a] y del Señor de los espíritus[b][c].
  rationale: 'La revisión mantiene la literalidad necesaria de una construcción ge''ez difícil, pero corrige dos matices importantes para la filosofía de la POB: preservar mejor la ambigüedad de ቅዱሳን y evitar una capitalización interpretativa en «espíritus». También se ajusta la nota c para reflejar la historia de revisión documentada. Aunque «seres santos» no es tan elegante como «santos», aquí sirve mejor al objetivo auditado de no resolver la referencia.'
  reviewer_model: gpt-5.4
