translation:
  language: es
  text: Y esta es la segunda parábola acerca de los que niegan el nombre de la morada de los seres santos[a] y del Señor de los espíritus[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge'ez después de «niegan el nombre» es difícil. La frase puede significar «el nombre de la morada de los seres santos y del Señor de los espíritus», aunque también son posibles otras construcciones. «Seres santos» puede referirse a seres celestiales santos, a los justos, o a una idea deliberadamente superpuesta en este contexto apocalíptico.
    reason: textual_variant
  - marker: b
    text: «Seres santos» puede referirse a seres celestiales santos, a los justos, o a una idea deliberadamente superpuesta en este contexto apocalíptico.
    reason: lexical_alternative
  - marker: c
    text: 'O, en una traducción anterior: «otra parábola».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወዝ
  english_pob_choice: And this is
  chosen_spanish: Y esta es
  alternatives_spanish:
  - Y esta
  - Y estas son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El giro introductorio marca transición a una nueva unidad visionaria; en español, «Y esta es» conserva la copulativa y la deixis sin forzar una formulación más pesada.
- source_word: ካልእ ምሳሌ
  english_pob_choice: the second parable
  chosen_spanish: la segunda parábola
  alternatives_spanish:
  - otra parábola
  - la otra parábola
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto redaccional de las Parábolas indica una serie numerada; «segunda» reproduce mejor esa estructura que «otra» y evita perder la señal ordinal presente en la revisión inglesa.
- source_word: ዲበ
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - concerniente a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición introduce el tema de la parábola; «acerca de» es natural en español y mantiene el valor temático sin añadir interpretación.
- source_word: እለ ይክሕዱ
  english_pob_choice: those who deny
  chosen_spanish: los que niegan
  alternatives_spanish:
  - los que rechazan
  - los que reniegan de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor sustantivado del relativo con el verbo imperfectivo se expresa de modo claro con «los que niegan». Conserva la fuerza de repudiación sin precisar indebidamente si es verbal, práctica o covenantal.
- source_word: ስሞ
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - su nombre
  - la fama
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene «el nombre» por la evidencia léxica directa del ge'ez y porque la construcción siguiente es sintácticamente difícil; no se sustituye por «autoridad» o «majestad».
- source_word: ለማኅደረ ቅዱሳን
  english_pob_choice: of the dwelling of the holy ones
  chosen_spanish: de la morada de los santos
  alternatives_spanish:
  - de la morada de los santos seres
  - de la habitación de los santos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Morada» comunica de manera natural la idea de lugar de habitación y conserva la imaginería espacial apocalíptica. «Santos» es la opción más transparente en español, aunque el término puede abarcar seres celestiales o el pueblo justificado.
- source_word: ቅዱሳን
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los seres santos
  - los consagrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «santos» es más idiomático y puede abarcar la ambigüedad entre seres celestiales y la comunidad de los justos. Se evita forzar una glosa técnica que resolvería indebidamente la referencia.
- source_word: ወእግዚአ መናፍስት
  english_pob_choice: and of the Lord of Spirits
  chosen_spanish: y del Señor de los Espíritus
  alternatives_spanish:
  - y del Señor de los espíritus
  - y del Dueño de los Espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título divino tradicionalmente reconocido en 1 Enoc, traducido al español. «Señor de los Espíritus» mantiene la mayúscula reverente y el plural, sin convertirlo en una fórmula eclesiástica distinta.
theological_decisions:
- issue: Ambigüedad de «los santos / la morada de los santos»
  english_pob_reading: left ambiguous as 'the holy ones'
  chosen_spanish_reading: se deja ambigua la referencia de «los santos»
  alternative_spanish_readings:
  - los ángeles santos
  - la comunidad de los justos
  rationale: El contexto apocalíptico permite varias identificaciones posibles. La traducción conserva la ambigüedad en vez de resolverla, siguiendo la disciplina de la POB de no cerrar indebidamente una tensión del texto fuente.
  doctrine_reference: Preservar la tensión teológica y referencial cuando el original no la resuelve.
- issue: Construcción difícil de «niegan el nombre de la morada de los santos y del Señor de los Espíritus»
  english_pob_reading: rendered literally with minimal smoothing
  chosen_spanish_reading: 'se mantiene una estructura cercana al original: «niegan el nombre de la morada de los santos y del Señor de los Espíritus»'
  alternative_spanish_readings:
  - niegan el nombre por el que habitan los santos
  - niegan la morada de los santos y del Señor de los Espíritus
  rationale: El ge'ez es sintácticamente difícil y no conviene una paráfrasis que oculte esa dificultad. La versión española conserva la relación genitiva problemática con el mínimo de suavizado necesario para legibilidad.
  doctrine_reference: Primacía del idioma fuente; cuando la sintaxis es incierta, preferir transparencia antes que una solución demasiado segura.
- issue: Título divino «Señor de los Espíritus»
  english_pob_reading: and of the Lord of Spirits
  chosen_spanish_reading: y del Señor de los Espíritus
  alternative_spanish_readings:
  - y del Señor de los espíritus
  - y del Dueño de los Espíritus
  rationale: Se conserva el título tal como un nombre reverente y técnico de 1 Enoc. «Espíritus» con mayúscula puede ayudar a distinguir el título divino de un uso genérico del sustantivo.
  doctrine_reference: Mantener títulos divinos tradicionales del corpus enóquico sin diluirlos.
translation_notes:
  revision_awareness: La revisión inglesa más reciente resolvió ካልእ como «second» en lugar de «another», por la secuencia numerada de las Parábolas. La redacción española adopta «segunda parábola» para reflejar esa decisión adjudicada y mantiene la ambigüedad sintáctica documentada en la nota sobre la construcción difícil.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton en general, pero aquí el texto fuente trae el título «Señor de los Espíritus», por lo que se traduce ese título sin sustituirlo por «Yahvé».
  - Se conserva «Espíritus» con mayúscula en el título divino para distinguirlo del uso común del sustantivo.
  - La opción «santos» se emplea aquí como equivalente de «holy ones» para lograr naturalidad en español, aunque la nota mantiene la ambigüedad entre seres celestiales y los justos.
  - Se evita «Cristo/Mesías» porque no aparece en el pasaje ni en el título fuente.
  - La puntuación y el orden de los complementos siguen de cerca la sintaxis problemática del original para no borrar la tensión textual documentada.
