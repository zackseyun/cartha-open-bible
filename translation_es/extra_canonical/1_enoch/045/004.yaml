    text: O «una bendición y luz eternas».
    reason: previous_rendering
  revision_rationale: Se mantiene el sentido principal del borrador, pero se corrigen las notas para alinearlas con la evidencia fuente y la auditoría inglesa. «Mi Elegido» se conserva como la mejor opción principal; la alternativa adecuada es «mi Escogido», no «mi Elegido Escogido». La nota final ahora refleja la alternativa histórica relevante («una bendición y luz eternas»), en lugar de una explicación gramatical técnica que no sustituye la nota del POB. También se reubican las marcas para que cada nota ancle exactamente la expresión a la que corresponde.
