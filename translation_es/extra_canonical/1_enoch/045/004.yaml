translation:
  language: es
  text: En aquel día haré que habite mi Elegido[b] entre ellos[a], y transformaré el cielo y lo haré una bendición y una luz para siempre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en medio de ellos».
    reason: lexical_alternative
  - marker: b
    text: O «mi Escogido».
    reason: lexical_alternative
  - marker: c
    text: O «una bendición y luz eternas».
    reason: previous_rendering
lexical_decisions:
- source_word: በይእቲ ዕለት
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal apocalíptica se reproduce con un giro natural y solemne en español. «En aquel día» conserva el registro profético sin sonar arcaico en exceso.
- source_word: አነብር
  english_pob_choice: I will cause ... to dwell
  chosen_spanish: haré que habite
  alternatives_spanish:
  - haré morar
  - haré que resida
  - lo estableceré para habitar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa causar que alguien habite o sea colocado para morar. «Haré que habite» mantiene la fuerza causativa y suena natural en español bíblico contemporáneo.
- source_word: ማእከሎሙ
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su midst
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Entre ellos» comunica bien la presencia relacional; la alternativa más literal «en medio de ellos» queda preservada en nota porque el original admite ese matiz espacial.
- source_word: ለኅሩየ ዚአየ
  english_pob_choice: my Chosen One
  chosen_spanish: mi Elegido
  alternatives_spanish:
  - mi Elegido Escogido
  - mi Escogido
  - mi Elegido Uno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El título se traduce de forma transparente y directa. «Mi Elegido» reproduce el valor nominal del sintagma sin imponer de más la fórmula cristológica posterior de «Mesías» o «Cristo».
- source_word: ወእዌልጦ
  english_pob_choice: and I will transform
  chosen_spanish: y transformaré
  alternatives_spanish:
  - y cambiaré
  - y alteraré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Transformaré» conserva la idea de cambio radical y renovador, apropiado al contexto cósmico del pasaje.
- source_word: ለሰማይ
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo
  - el firmamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «el cielo» es natural y puede abarcar el ámbito cósmico en este contexto apocalíptico; «firmamento» resultaría más restringido y menos idiomático.
- source_word: ወእገብራ
  english_pob_choice: and make it
  chosen_spanish: y lo haré
  alternatives_spanish:
  - y lo convertiré
  - y lo haré ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pronombre retoma «el cielo» de manera explícita. «Lo haré» permite después completar con el predicativo en una construcción natural.
- source_word: በረከተ
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - bendición
  - una bienaventuranza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La palabra remite a una cualidad benefactora; «bendición» es la equivalencia más estable y transparente en español.
- source_word: ወብርሃነ
  english_pob_choice: and light
  chosen_spanish: y una luz
  alternatives_spanish:
  - y luz
  - y resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen concreta de luminosidad. Añadir el artículo indefinido refleja la coordinación nominal del original y mantiene la cadencia de la frase.
- source_word: ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por la eternidad
  - para la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa reciente corrigió el valor sintáctico a un adverbio de duración, no a un adjetivo. «Para siempre» refleja de forma natural y precisa ese valor adverbial.
theological_decisions:
- issue: Identidad y título de ለኅሩየ ዚአየ
  english_pob_reading: my Chosen One
  chosen_spanish_reading: mi Elegido
  alternative_spanish_readings:
  - mi Escogido
  - mi Elegido Escogido
  rationale: Se conserva el título local del pasaje sin armonizarlo con terminología cristiana posterior. La traducción mantiene la tensión textual entre «Elegido» y la posible literalidad «Escogido», sin convertirlo en «Mesías» o «Cristo».
  doctrine_reference: Traducir títulos con sobriedad; no sobrearmonizar con el vocabulario cristiano posterior.
- issue: Alcance de la renovación cósmica del cielo
  english_pob_reading: I will transform heaven and make it a blessing and a light forever
  chosen_spanish_reading: transformaré el cielo y lo haré una bendición y una luz para siempre
  alternative_spanish_readings:
  - transformaré el cielo en bendición y luz para siempre
  - lo convertiré en una bendición y una luz para siempre
  rationale: La frase conserva la imagen apocalíptica de una transformación real del cielo, no una mera mejora moral o metafórica. «Para siempre» mantiene el valor durativo correcto de ለዓለም.
  doctrine_reference: Preservar imaginería apocalíptica; no aplanar el lenguaje cósmico.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «an eternal blessing and light» a «a blessing and a light forever» para corregir el valor sintáctico de ለዓለም como adverbial. La redacción española adopta directamente ese ajuste con «para siempre», y además conserva la opción literal de «en medio de ellos» y la variación titular de «mi Elegido» en notas.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» sin necesidad en este versículo, ya que el texto no lo contiene explícitamente.
  - Se traduce el título ኅሩየ ዚአየ de manera transparente como «mi Elegido», evitando importar «Cristo».
  - Se usa «cielo» en singular porque el referente es cósmico y el original es singular.
  - Las notas se han anclado todas en el texto mediante marcadores visibles [a], [b], [c], sin notas sueltas.
