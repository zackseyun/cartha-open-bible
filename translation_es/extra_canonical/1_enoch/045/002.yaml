review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue correctamente la revisión adjudicada del ge''ez en la cláusula inicial: los pecadores son el sujeto implícito y no ascienden al cielo ni llegan/vienen sobre la tierra. También conserva bien ''porción'', ''pecadores'', ''negaron el nombre'' y el pasivo escatológico ''son guardados''. Sin embargo, el borrador omite el matiz más literal de la English POB vigente en ''come upon the earth'' y, sobre todo, usa ''Señor'' para እግዚአ መናፍስት, lo que choca con la directriz española del proyecto de usar ''Yahvé'' para el nombre divino/título correspondiente en el texto principal salvo razón documentada, razón que aquí no se aportó.'
  spanish_quality_summary: 'El español es claro, digno y legible. ''No subirán al cielo'' funciona bien; ''porción'' mantiene buen tono bíblico. Dos mejoras menores aumentan fidelidad y naturalidad: ''vendrán sobre la tierra'' refleja mejor la POB inglesa actual que ''llegarán a la tierra'', y ''Yahvé de los Espíritus'' alinea mejor la terminología del proyecto. La nota b actual sobre mayúscula en ''Espíritus'' deja de ser necesaria si se corrige el título.'
  glossary_alignment: 'Hay desalineación con la terminología marco del proyecto: donde el español por defecto exige ''Yahvé'' en el texto principal, el borrador usa ''Señor''. Aunque el inglés conserva ''Lord of Spirits'' como título técnico de 1 Enoc, la política española pide explicar las excepciones; aquí no hay carve-out documentado que justifique mantener ''Señor''. El resto del léxico clave está bien alineado.'
  issues:
  - severity: medium
    issue: Uso de 'Señor de los Espíritus' en lugar de 'Yahvé de los Espíritus'
    rationale: La guía del proyecto establece 'Yahvé' en el texto principal para el nombre divino. No se documenta aquí una excepción litúrgica o contextual suficientemente fuerte para mantener 'Señor'.
  - severity: low
    issue: '''llegarán a la tierra'' suaviza la formulación inglesa auditada ''come upon the earth'''
    rationale: Aunque no es erróneo, 'vendrán sobre la tierra' refleja más de cerca la redacción POB actual y preserva mejor la rareza imagística del original difícil.
  - severity: low
    issue: La nota b queda innecesariamente centrada en la mayúscula de 'Espíritus'
    rationale: Si se revisa el título divino conforme al glosario del proyecto, conviene rehacer la nota para explicar la decisión terminológica, no solo la capitalización.
  revised_spanish_text: Y no subirán al cielo[a], ni vendrán sobre la tierra; así será la porción de los pecadores que negaron el nombre de Yahvé de los Espíritus[b], que así son guardados para el día de aflicción y angustia[c].
  revised_footnotes:
