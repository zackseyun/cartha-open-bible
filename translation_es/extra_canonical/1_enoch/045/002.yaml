revisions:
- from: Y no subirán al cielo[a], ni llegarán a la tierra; así será la porción de los pecadores que negaron el nombre del Señor de los Espíritus[b], que así son guardados para el día de aflicción y angustia[c].
  to: Y no subirán al cielo[a], ni vendrán sobre la tierra; así será la porción de los pecadores que negaron el nombre de Yahvé de los Espíritus[b], que así son guardados para el día de aflicción y angustia[c].
  rationale: La revisión es pequeña pero necesaria para alinear el texto con la terminología española del proyecto y con la redacción inglesa auditada más reciente. Se conserva la sintaxis correcta de la cláusula inicial, se mantiene la rareza apocalíptica del original, y se ajusta el título divino a 'Yahvé'.
