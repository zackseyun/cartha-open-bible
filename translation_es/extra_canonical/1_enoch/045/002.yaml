translation:
  language: es
  text: Y no subirán al cielo[a], ni vendrán sobre la tierra; así será la porción de los pecadores que negaron el nombre de Yahvé de los Espíritus[b], que así son guardados para el día de aflicción y angustia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula inicial es difícil en ge'ez. El sentido puede ser que los impíos quedan excluidos tanto del cielo como de la tierra, o más generalmente que no les queda refugio cósmico alguno.
    reason: textual_variant
  - marker: b
    text: Se usa «Yahvé» conforme a la convención principal del proyecto para el nombre divino; «de los Espíritus» conserva el título distintivo de 1 Enoc.
    reason: terminology
  - marker: c
    text: O «el día de opresión y angustia». La pareja de expresiones intensifica el juicio venidero.
    reason: lexical_alternative
lexical_decisions:
- source_word: የዐርጉ
  english_pob_choice: will not ascend
  chosen_spanish: no subirán
  alternatives_spanish:
  - no ascenderán
  - no irán hacia arriba
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa movimiento ascendente; en español, «subirán» comunica con naturalidad la imagen sin perder el sentido direccional. «Ascenderán» es posible, pero más marcado y menos fluido.
- source_word: ይበጽሑ
  english_pob_choice: come upon / reach
  chosen_spanish: llegarán
  alternatives_spanish:
  - alcanzarán
  - arribarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor básico es «llegar, alcanzar». En esta cláusula paralela, «llegarán» conserva la idea de no alcanzar la tierra. «Llegar a la tierra» o «alcanzarán la tierra» serían equivalentes, pero «llegarán a la tierra» sonaría más pesado.
- source_word: ክፍለ
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - lote
  - heredad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Porción» reproduce bien el sentido apocalíptico de lo asignado o adjudicado a un grupo. Mantiene el tono bíblico sin forzar una lectura patrimonial.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - malvados
  - inicuos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La categoría moral es directa; «pecadores» es transparente y fiel. «Malvados» o «inicuos» serían posibles, pero desplazan el matiz hacia la maldad general.
- source_word: ክሕዱ
  english_pob_choice: denied
  chosen_spanish: negaron
  alternatives_spanish:
  - renegaron de
  - rechazaron
  - desmintieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de repudiar el nombre divino, «negaron» conserva la fuerza de rechazo y la conexión con la identidad/autoridad del Nombre sin importar un vocabulario confesional posterior.
- source_word: ስሞ
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - su nombre
  - su santo nombre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene «el nombre» porque el texto resalta la categoría teológica del Nombre. «Su nombre» es posible, pero en español podría sonar menos preciso respecto de la construcción del original.
- source_word: እግዚአ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Dueño de los espíritus
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el título establecido en 1 Enoc; «Señor de los Espíritus» preserva la fórmula propia del libro. Se evita «Dios» o «Señor» a secas para no borrar el epíteto específico.
- source_word: ይትዐቀቡ
  english_pob_choice: are kept
  chosen_spanish: son guardados
  alternatives_spanish:
  - son reservados
  - permanecen guardados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El pasivo es importante: indica preservación para un fin escatológico. «Son guardados» conserva la pasividad y la idea de custodia; «son reservados» sería un equivalente más interpretativo.'
- source_word: ዕለተ ስራሕ ወምንዳቤ
  english_pob_choice: the day of affliction and distress
  chosen_spanish: el día de aflicción y angustia
  alternatives_spanish:
  - el día de aflicción y tribulación
  - el día de opresión y angustia
  - el día de aflicción y apuro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Aflicción» y «angustia» reproducen la pareja de términos de juicio sin sobretraducirla. «Tribulación» es posible, pero «angustia» comunica de forma más inmediata el carácter opresivo del día.
theological_decisions:
- issue: Cláusula inicial sobre cielo y tierra
  english_pob_reading: 'The line depicts cosmic refusal or exclusion of the sinners: heaven does not receive them and earth does not reach them, or they do not ascend/reach those realms.'
  chosen_spanish_reading: No se presenta el cielo como sujeto que recibe, sino a los pecadores como incapaces de subir al cielo ni llegar a la tierra.
  alternative_spanish_readings:
  - Y el cielo no los recibirá, ni la tierra los alcanzará.
  - No ascenderán al cielo ni arribarán a la tierra.
  rationale: 'El ge''ez favorece la lectura de dirección: subir al cielo / llegar a la tierra. La traducción conserva la imagen apocalíptica sin convertirla indebidamente en una personificación de cielo y tierra como sujetos gramaticales.'
  doctrine_reference: Preservar la tensión textual y la sintaxis del original ge'ez; evitar una resolución doctrinal o retórica no respaldada por el texto.
- issue: Título divino 'Lord of Spirits'
  english_pob_reading: the Lord of Spirits
  chosen_spanish_reading: el Señor de los Espíritus
  alternative_spanish_readings:
  - el Señor de los espíritus
  - el Dueño de los espíritus
  rationale: Se conserva el título técnico de 1 Enoc como designación propia, con mayúscula en «Espíritus» para reflejar su función titular en el libro. No se sustituye por una fórmula más común de la Biblia española porque aquí el epíteto es literariamente distintivo.
  doctrine_reference: Respetar la nomenclatura interna de 1 Enoc y su teología apocalíptica propia.
translation_notes:
  revision_awareness: 'Se revisó la línea inicial a partir de la corrección del auditor: el ge''ez no hace de «cielo» y «tierra» los sujetos, sino que marca dirección («al cielo», «a la tierra»). Por eso la base española sigue la lectura «subirán» / «llegarán», evitando la antigua paráfrasis que personificaba a cielo y tierra. También se ajustó el final para reflejar el par léxico de juicio con un español natural, manteniendo la reserva escatológica de «son guardados».'
  spanish_consistency_notes:
  - Se mantiene «Señor de los Espíritus» como título fijo, consistente con la tradición interna de 1 Enoc.
  - «Pecadores» se conserva para la categoría moral sin suavizarla.
  - «Porción» refleja el lenguaje de asignación escatológica y no debe sustituirse por una formulación más genérica.
  - La pasiva «son guardados» preserva el matiz de preservación para juicio futuro.
