base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/092/001.yaml
  text: The book written by Hanok—[Hanok indeed wrote every sign of wisdom[a], praised among all people and a judge of all the earth]—for all my children who will dwell on the dry land[d][c][b], and for the generations to come who practice righteousness and peace.
  footnotes:
  - marker: a
    text: The bracketed clause in the Ethiopic witness appears textually unstable in this OCR line; the translation retains it in a cautious, literal form rather than omitting it.
    reason: textual_variant
  - marker: b
    text: '"Dry land" is a literal rendering of the Ethiopic expression; some translators smooth it to "earth" or "world."'
    reason: lexical_alternative
  - marker: c
    text: The syntax around "the generations to come" and "the chosen ones" is compressed and may also be understood as "for a future generation, the chosen, who practice righteousness and peace."
    reason: alternative_reading
  - marker: d
    text: Or 'Written by Hanok—the book that Hanok wrote, all the signs of wisdom among all humankind, praised and ruling over all the earth—for all my children, and for the generations to come who will dwell on the dry land, the chosen ones who practice righteousness and peace.'.
