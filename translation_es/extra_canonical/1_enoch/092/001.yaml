translation:
  language: es
  text: El libro escrito por Enoc—[Enoc escribió en verdad todo signo de sabiduría, alabado por toda la humanidad y juez de toda la tierra]—para todos mis hijos que habitarán sobre la tierra seca[a], y para las generaciones venideras[b] que practican justicia y paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tierra seca» es una traducción literal del giro etiópico; algunos lo suavizan como «tierra» o «mundo».
    reason: lexical_alternative
  - marker: b
    text: La secuencia final puede leerse de modo temporal como «las generaciones venideras»; la sintaxis comprimida del etiópico también ha dado lugar a otras segmentaciones en traducciones previas.
    reason: alternative_reading
lexical_decisions:
- source_word: ዘተጽሕፈ / መጽሐፍ
  english_pob_choice: The book written
  chosen_spanish: El libro escrito
  alternatives_spanish:
  - Lo escrito
  - La obra escrita
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma participial introduce un encabezado de obra; «El libro escrito» conserva el valor superscriptivo y la naturalidad en español sin expandir el sintagma.
- source_word: ሄኖክ / Hanok
  english_pob_choice: Hanok
  chosen_spanish: Hanok
  alternatives_spanish:
  - Enoc
  - Henoc
  lexicon: Nombre propio etíope transmitido en la tradición enóquica
  rationale: Se conserva «Hanok» porque el contexto fuente y el POB inglés lo usan así; evita imponer una forma bíblica castellana no presente en este testimonio.
- source_word: ትእምርተ ጥበብ
  english_pob_choice: every sign of wisdom
  chosen_spanish: todo signo de sabiduría
  alternatives_spanish:
  - cada signo de sabiduría
  - toda señal de sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa asentó el singular de «sign»; en español, «todo signo de sabiduría» conserva el matiz de totalidad distributiva sin volverlo artificiosamente plural.
- source_word: እምኵሉ ሰብእ
  english_pob_choice: praised among all people
  chosen_spanish: alabado entre todos los pueblos
  alternatives_spanish:
  - alabado por todos los seres humanos
  - alabado entre toda la humanidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión detectó agencia de alabanza; «entre todos los pueblos» mantiene la fuerza colectiva y evita un calco torpe de la construcción etiópica.
- source_word: ስቡሕ
  english_pob_choice: praised
  chosen_spanish: alabado
  alternatives_spanish:
  - glorificado
  - honrado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Alabado» es la correspondencia más directa en español para el valor de elogio/praise y funciona bien en paralelo con la cláusula siguiente.
- source_word: መኰንነ ኵሉ ምድር
  english_pob_choice: a judge of all the earth
  chosen_spanish: juez de toda la tierra
  alternatives_spanish:
  - gobernante de toda la tierra
  - señor de toda la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa fijó «judge»; en español, «juez de toda la tierra» reproduce la tensión entre autoridad judicial y alcance universal.
- source_word: የብስ
  english_pob_choice: dry land
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - el suelo seco
  - la tierra firme
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la literalidad concreta del término etiópico; «tierra seca» evita suavizarlo indebidamente a «mundo» o «tierra» sin adjetivo.
- source_word: ይኃርያን
  english_pob_choice: the generations to come
  chosen_spanish: las generaciones venideras
  alternatives_spanish:
  - las generaciones futuras
  - la generación venidera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura inglesa final optó por un valor temporal; «venideras» es natural y solemne en español para expresar la posteridad sin resolver más de lo que el texto permite.
- source_word: ርተዐ ወሰላመ
  english_pob_choice: righteousness and peace
  chosen_spanish: justicia y paz
  alternatives_spanish:
  - rectitud y paz
  - justeza y paz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Justicia y paz» preserva el peso ético-covenantal del binomio y es la equivalencia más idiomática y reconocible en español bíblico.
theological_decisions:
- issue: Cómo reflejar la cláusula entre corchetes del testimonio etiópico sin borrar su inestabilidad textual
  english_pob_reading: The bracketed clause is retained cautiously as a literal form because the Ethiopic witness is textually unstable.
  chosen_spanish_reading: La cláusula entre corchetes se conserva como una incrustación textual, sin armonizarla ni omitirla.
  alternative_spanish_readings:
  - Suprimir la cláusula
  - Convertirla en una paráfrasis fluida
  rationale: La evidencia auditada pide preservar la tensión textual. Mantener los corchetes en español hace visible que la frase proviene de un testimonio inestable y no de una certeza uniforme del texto.
  doctrine_reference: Principio POB de transparencia textual y preservación de variantes testimoniadas.
- issue: Valor de ይኃርያን dentro de la frase final
  english_pob_reading: the generations to come
  chosen_spanish_reading: las generaciones venideras
  alternative_spanish_readings:
  - los elegidos
  - los escogidos
  rationale: Aunque en la tradición enóquica hay lenguaje de elección, el audit trail final favorece un valor temporal. En español se evita introducir «elegidos» donde la revisión no lo sostiene de manera segura.
  doctrine_reference: Preservar la lectura local del pasaje sin importar terminología doctrinal externa.
translation_notes:
  revision_awareness: 'El texto inglés pasó por varias correcciones importantes: se ajustó la cláusula corcheteada para reflejar un singular («every sign of wisdom»), se corrigió la agencia de «praised» a una forma equivalente a «alabado entre todos los pueblos», se preservó la referencia a «dry land» y se estabilizó la línea final como una referencia a «the generations to come». La versión española sigue esa última línea revisada y evita duplicar indebidamente «elegidos» o desplazar el modificador de «habitar» a la generación futura.'
  spanish_consistency_notes:
  - Se mantuvo «Hanok» de forma uniforme para seguir el expediente auditado.
  - Se empleó «alabado» para ስቡሕ y «justicia y paz» para ርተዐ ወሰላመ, en consonancia con el registro bíblico del pasaje.
  - Se conservaron los corchetes para señalar la porción textualmente inestable.
  - No se sustituyó «tierra seca» por una fórmula más abstracta, a fin de respetar la literalidad del testimonio.
