review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del ge''ez y preserva la ambigüedad teológica de «del sueño». También refleja correctamente el singular de «el camino de la justicia». Sin embargo, el texto español tiene un error claro de anclaje de nota y una repetición léxica infiel al matiz documentado en la frase final: «en bondad y en bondad eterna» colapsa dos términos distintos (በኂሩት / በሣህል ዘለዓለም) en la misma palabra española.'
  spanish_quality_summary: La redacción es generalmente legible y digna, pero «en bondad y en bondad eterna» suena torpe y poco natural. Además, aparece una marca de nota inexistente ([m]) en el texto, lo cual invalida la consistencia formal. «Curso» es aceptable aunque algo rígido; no requiere cambio forzoso.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «El justo», «justicia» y el mantenimiento de la imagen de levantarse del sueño están bien. El problema principal es lexical: para በሣህል ዘለዓለም conviene una opción distinta de «bondad» para no borrar la diferencia con በኂሩት; «benignidad eterna» o «bondad eterna» pueden funcionar, pero dado que ya se usó «bondad» para el término previo, aquí debe diferenciarse.'
  issues:
  - severity: high
    issue: Marcador de nota inválido [m] en el texto español
    rationale: Las notas presentes solo usan a, b, c y d. La marca [m] no existe y viola el requisito de correspondencia exacta entre texto y notas.
  - severity: high
    issue: La frase final repite «bondad» para dos términos ge'ez distintos
    rationale: El source y la auditoría inglesa distinguen በኂሩት («en bondad») de በሣህል ዘለዓለም («en eterna benignidad/kindness/mercy/favor»). Repetir «bondad» en ambos lugares elimina una distinción semántica significativa.
  - severity: medium
    issue: La nota b no está anclada en la frase final correspondiente
    rationale: En el borrador, [b] aparece tras «justicia», pero su contenido explica la frase final sobre በሣህል ዘለዓለም. Debe moverse al sintagma final para una lectura clara y formalmente correcta.
  revised_spanish_text: Y el justo se levantará del sueño[a], y se levantará y andará en el camino de la justicia[c][d]; y todo su camino y su curso serán en bondad y en benignidad eterna[b].
  revised_footnotes:
