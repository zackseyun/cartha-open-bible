translation:
  language: es
  text: Y el justo se levantará del sueño[a], y se levantará y andará en el camino de la justicia[c][d]; y todo su camino y su curso serán en bondad y en benignidad eterna[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Del sueño» puede leerse como sueño literal o como imagen de despertar a una vida renovada; el versículo no obliga a una sola interpretación.
    reason: lexical_alternative
  - marker: b
    text: La frase final también podría traducirse «en misericordia eterna» o «en favor eterno», pues el término ge'ez abarca misericordia, clemencia y benevolencia.
    reason: lexical_alternative
  - marker: c
    text: 'O: «en la senda de la justicia».'
    reason: alternative_reading
  - marker: d
    text: 'O: «y se levantará».'
    reason: alternative_reading
lexical_decisions:
- source_word: ይትነሣእ
  english_pob_choice: shall rise
  chosen_spanish: se levantará
  alternatives_spanish:
  - resucitará
  - se alzará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo admite la idea de levantarse o ser levantado. En español, «se levantará» conserva la imagen de ascenso/despertar sin resolver de antemano si el sentido es literal, escatológico o metafórico.
- source_word: ጻድቅ
  english_pob_choice: the righteous one
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el justo uno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular se mantiene de manera natural en español con «el justo». Conserva la individualización sin introducir un matiz más técnico que el fuente no exige.
- source_word: እምንዋም
  english_pob_choice: from sleep
  chosen_spanish: del sueño
  alternatives_spanish:
  - del dormir
  - de su sueño
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Del sueño» reproduce la imagen de origen o salida expresada por la preposición y el sustantivo ge'ez, de forma idiomática y concisa.
- source_word: የኃልፍ
  english_pob_choice: walk
  chosen_spanish: andará
  alternatives_spanish:
  - caminará
  - irá
  - procederá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el verbo puede significar pasar o ir, en el contexto del «camino de la justicia» el español «andará» mantiene la metáfora ética del andar en un camino.
- source_word: በፍኖተ ጽድቅ
  english_pob_choice: in the path of righteousness
  chosen_spanish: en el camino de la justicia
  alternatives_spanish:
  - en la senda de la justicia
  - en el camino de rectitud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La evidencia gramatical favorece el singular «camino», no el plural. «Justicia» conserva el valor moral y legal de ג/ጽድቅ sin perder claridad en español.
- source_word: ኵሉ ፍኖቱ
  english_pob_choice: all his path
  chosen_spanish: todo su camino
  alternatives_spanish:
  - toda su senda
  - todos sus caminos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El singular transmitido puede funcionar colectivamente. «Todo su camino» preserva esa textura sin forzar una pluralización que el texto no requiere.
- source_word: ምሕዋሩ
  english_pob_choice: his course
  chosen_spanish: su curso
  alternatives_spanish:
  - su proceder
  - su trayectoria
  - su andar
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: «Curso» conserva la idea de movimiento o proceder y permite una buena correspondencia con «camino» sin sobreinterpretarlo moralmente.
- source_word: በኂሩት
  english_pob_choice: in goodness
  chosen_spanish: en bondad
  alternatives_spanish:
  - en bien
  - en benevolencia
  - en benignidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Bondad» es amplio y natural, y refleja el carácter benevolente del término sin reducirlo a una sola vertiente semántica.
- source_word: በሣህል ዘለዓለም
  english_pob_choice: in everlasting kindness
  chosen_spanish: en bondad eterna
  alternatives_spanish:
  - en misericordia eterna
  - en favor eterno
  - en benignidad eterna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez puede abarcar misericordia, clemencia, gentileza y favor benevolente. «Bondad eterna» comunica esa amplitud en español sin fijar prematuramente un matiz jurídico o sentimental.
theological_decisions:
- issue: Si el verso afirma resurrección corporal o imagen de despertar
  english_pob_reading: The main text preserves the image 'rise from sleep' without specifying resurrection.
  chosen_spanish_reading: El texto principal conserva la imagen de levantarse del sueño sin declarar explícitamente resurrección corporal.
  alternative_spanish_readings:
  - resurrección física
  - despertar espiritual o moral
  rationale: El ge'ez usa lenguaje de sueño y levantarse, pero no añade aquí una formulación más explícita sobre muerte o resurrección. Conviene preservar la tensión teológica en lugar de resolverla.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Alineé el castellano con las correcciones gramaticales del audit trail: el ge''ez favorece singular en «camino», y la segunda aparición de «se levantará» no debe perderse en la repetición asindética. También tuve en cuenta la revisión posterior que suavizó la última cualidad hacia un término más natural en inglés; en español, «bondad eterna» conserva la amplitud semántica sin estrecharla a un solo matiz.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto fuente lo exigiera; aquí no aparece el Tetragrámaton.
  - Mantuve «justicia» para ג/ጽድቅ por su fuerza ética y legal, en lugar de «rectitud», que en español puede sonar más técnico o abstracto.
  - Preservé la duplicación verbal «se levantará... se levantará» para reflejar el paralelo asindético del ge'ez.
  - No pluralicé «camino», porque la corrección auditada señala singular constructo en la forma ge'ez.
  - No introduje lenguaje confesional ajeno al verso, como «Cristo» o «Señor».
