revisions:
- from: Y el justo se levantará del sueño[a], y se levantará y andará en el camino de la justicia[c][d][b]; y todo su camino y su curso serán en bondad y en bondad[m] eterna.
  to: Y el justo se levantará del sueño[a], y se levantará y andará en el camino de la justicia[c][d]; y todo su camino y su curso serán en bondad y en benignidad eterna[b].
  rationale: Se corrigió el marcador de nota inválido, se reubicó la nota b para anclarla a la frase que realmente comenta, y se sustituyó la segunda «bondad» por «benignidad eterna» para conservar la distinción entre los dos términos ge'ez finales y mejorar la naturalidad del español sin resolver en exceso el matiz semántico.
  reviewer_model: gpt-5.4
