translation:
  language: es
  text: No dejen que su espíritu se aflija por los tiempos, porque el Santo y el Grande ha destinado días para todos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para todo». La frase ge''ez final es amplia y puede referirse tanto a todos en sentido de personas como al conjunto de todo en sentido general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አትሕዝኑ
  english_pob_choice: Do not let ... be grieved
  chosen_spanish: No dejen que ... se aflija
  alternatives_spanish:
  - No se entristezcan
  - No permitan que su espíritu se entristezca
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa prohibición de entristecerse/afligirse. En español, la construcción impersonal con 'dejen que' reproduce bien el foco interno sobre el espíritu sin sonar forzada.
- source_word: መንፈስክሙ
  english_pob_choice: your spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su alma
  - su mente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Espíritu'' conserva el registro antropológico elevado y la amplitud semántica del término, mejor que reducirlo a ''mente'' o ''alma''.'
- source_word: በአዝማን
  english_pob_choice: because of the times
  chosen_spanish: por los tiempos
  alternatives_spanish:
  - a causa de los tiempos
  - en los tiempos
  - por las edades
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición causal se expresa naturalmente en español con 'por' o 'a causa de'. 'Por los tiempos' mantiene brevedad y el sentido de épocas históricas o períodos adversos.
- source_word: መዋዕለ
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - períodos
  - tiempos señalados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo es literalmente 'días'; se conserva esa concreción sin perder el valor de períodos asignados por Dios.
- source_word: ወሀበ
  english_pob_choice: has appointed
  chosen_spanish: ha destinado
  alternatives_spanish:
  - ha dado
  - ha señalado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el sentido básico es 'dar', en este contexto de tiempos/días ordenados divinamente 'ha destinado' comunica mejor la idea de asignación temporal sin exceder el texto.
- source_word: ቅዱስ ወዐቢይ
  english_pob_choice: the Holy and Great One
  chosen_spanish: el Santo y Grande
  alternatives_spanish:
  - el Santo y el Grande
  - el Santo Grande
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la doble epíteto reverencial como título divino. En español, omitir 'Uno' evita aspereza y sigue la economía del ge'ez, donde la frase funciona como designación honorífica.
- source_word: ለኵሉ
  english_pob_choice: for all
  chosen_spanish: para todos
  alternatives_spanish:
  - para todo
  - para todos y cada uno
  - para todo ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase final es amplia; 'para todos' reproduce la apertura referencial sin cerrar la posibilidad de alcance general sobre personas o cosas, conforme a la nota inglesa sobre la ambigüedad.
theological_decisions:
- issue: Alcance de la provisión divina en 'para todos'
  english_pob_reading: for all
  chosen_spanish_reading: para todos
  alternative_spanish_readings:
  - para todos y cada uno
  - para todo
  rationale: La evidencia ge'ez permite una lectura amplia. 'Para todos' conserva la ambigüedad entre personas y totalidad de lo creado, evitando resolver de manera prematura el alcance exacto de la provisión/ordenación divina.
  doctrine_reference: Preservar la tensión semántica documentada; no estrechar el alcance más de lo que exige la fuente.
translation_notes:
  revision_awareness: Seguí la revisión más reciente del POB inglés, que redujo 'for all things' a 'for all' para ajustarse más de cerca al ge'ez. Por eso la versión española evita añadir 'cosas' o 'todo' como explicación intratextual y deja 'para todos' con amplitud controlada.
  spanish_consistency_notes:
  - Se mantiene 'espíritu' para መንፈስ, en línea con el registro antropológico del texto.
  - Se usa 'Santo y Grande' como título divino reverencial, sin sustituirlo por fórmulas litúrgicas tradicionales no atestiguadas aquí.
  - '''Destinado'' expresa la asignación temporal divina de manera natural en español y conserva la relación entre días y orden providencial.'
