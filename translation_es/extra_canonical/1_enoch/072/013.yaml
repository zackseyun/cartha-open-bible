translation:
  language: es
  text: Y entra al alba y sale por la sexta[a], y sale y se pone en la sexta puerta por treinta y dos mañanas[b], según su signo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La sintaxis ge'ez es compacta y repetitiva aquí; «la sexta» se entiende como la sexta puerta o abertura dentro de la secuencia descrita en este capítulo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «treinta y dos mañanas». El texto mide el lapso por mañanas, no por una paráfrasis más fluida como «días».
    reason: lexical_alternative
  - marker: c
    text: O «a causa de su signo» o «por razón de su signo». La frase ge'ez también puede leerse con matiz causal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይገብእ
  english_pob_choice: enters
  chosen_spanish: entra
  alternatives_spanish:
  - ingresa
  - se introduce
  lexicon: Dillmann
  rationale: El verbo expresa movimiento de entrada; en español, «entra» es natural y conserva la imagen concreta del recorrido astral.
- source_word: ጽባሐ
  english_pob_choice: at dawn
  chosen_spanish: al alba
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: Dillmann
  rationale: El término se refiere al tiempo de la aurora/mañana temprana. «Al alba» mantiene la referencia temporal con dignidad y concisión.
- source_word: ይወፅእ
  english_pob_choice: goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale hacia afuera
  - emerge
  lexicon: Dillmann
  rationale: El verbo de salida se traduce con el equivalente más directo y repetitivo, acorde al estilo técnico del pasaje.
- source_word: ውስተ ሳድስት
  english_pob_choice: through the sixth
  chosen_spanish: por la sexta
  alternatives_spanish:
  - a través de la sexta
  - por el sexto
  lexicon: Dillmann
  rationale: La construcción ge'ez es elíptica y alude a la sexta puerta/abertura del esquema. «Por la sexta» conserva la referencia espacial sin sobreespecificar en el cuerpo principal.
- source_word: ወየዓርብ
  english_pob_choice: it sets
  chosen_spanish: se pone
  alternatives_spanish:
  - se oculta
  - declina
  lexicon: Dillmann
  rationale: En contexto astronómico, el verbo apunta a la puesta del sol. «Se pone» es la forma española más natural y precisa.
- source_word: ኆኅት
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portal
  - ventana
  lexicon: Dillmann
  rationale: Aunque «gate» puede renderizarse como «puerta», en español «puerta» preserva mejor la arquitectura cósmica del relato que «ventana» y sigue siendo inteligible para el lector.
- source_word: ሠላሳ ወ፪ ጽባሕ
  english_pob_choice: thirty-two mornings
  chosen_spanish: treinta y dos mañanas
  alternatives_spanish:
  - treinta y dos días
  - durante treinta y dos mañanas
  lexicon: Dillmann
  rationale: Se mantiene literalmente «mañanas», porque el texto cuenta el período con ese sustantivo y no con una normalización a «días».
- source_word: በእንተ ትእምርተ ዚአሃ
  english_pob_choice: according to its sign
  chosen_spanish: a causa de su signo
  alternatives_spanish:
  - según su signo
  - por su signo
  lexicon: Dillmann
  rationale: La revisión del auditorio indica que በእንተ expresa causalidad («a causa de», «por motivo de») más que conformidad. En español conviene reflejar esa relación causal sin perder la idea de la señal ordenadora.
theological_decisions:
- issue: Imagen astronómica de puertas celestiales
  english_pob_reading: Retain concrete 'gate' imagery rather than naturalizing into modern astronomical description.
  chosen_spanish_reading: Conservar la imagen concreta de «puerta» para la abertura celeste.
  alternative_spanish_readings:
  - ventana
  - sector
  - posición
  rationale: El pasaje pertenece al esquema visionario de las luminarias; en español, «puerta» preserva el carácter revelado y arquitectónico del texto sin modernizarlo indebidamente.
  doctrine_reference: 'Philosophy of translation: preserve apocalyptic imagery; optimal equivalence'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del auditorio: se corrigió la omisión del segundo verbo de salida y la distinción entre las preposiciones espaciales, además de la lectura causal de በእንተ. Por eso el español conserva la doble secuencia verbal («sale... y sale y se pone») y traduce el cierre con una relación causal, no meramente conformativa.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico contemporáneo, no arcaizante.
  - Se preservó la imagen de las aberturas celestes como «puerta».
  - Se evitó sustituir «mañanas» por «días» en el cuerpo principal.
  - La lectura causal final se dejó explícita para reflejar la corrección textual más reciente.
