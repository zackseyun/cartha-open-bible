    rationale: Si el texto principal se corrige a una forma equivalente a 'becomes', la alternativa puede ser 'será'; pero con el texto actual la nota resulta redundante o invertida respecto del audit trail.
  - severity: low
    issue: La construcción 'será once partes' es menos natural en español que una formulación con 'de'.
    rationale: Aunque comprensible, 'pasa a ser de once partes' o 'consta de once partes' suena más idiomático sin perder el tecnicismo de 'partes'.
  revised_spanish_text: Y en aquel día la noche pasa a ser de once partes[a][b], y el día siete partes.
  revised_footnotes:
  - marker: a
    text: El versículo mide la noche y el día por «partes» numeradas, un rasgo técnico del calendario esquemático del Libro Astronómico, no de horas ordinarias.
    reason: cultural_note
