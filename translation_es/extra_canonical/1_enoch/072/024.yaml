translation:
  language: es
  text: Y en aquel día la noche pasa a ser de once partes[a][b], y el día siete partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El versículo mide la noche y el día por «partes» numeradas, un rasgo técnico del calendario esquemático del Libro Astronómico, no de horas ordinarias.
    reason: cultural_note
  - marker: b
    text: 'O: «será».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወበይእቲ፡ ዕለት
  english_pob_choice: And on that day
  chosen_spanish: Y en aquel día
  alternatives_spanish:
  - Y en ese día
  - Y en aquel mismo día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión deíctica introduce un momento específico del ciclo astronómico. «En aquel día» conserva la referencia puntual y es natural en español bíblico sin volverlo arcaico en exceso.
- source_word: ትከውን
  english_pob_choice: becomes
  chosen_spanish: será
  alternatives_spanish:
  - se convierte en
  - llega a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez imperfecto describe el estado resultante de la proporción nocturna en ese punto del esquema astronómico. En español, «será» expresa bien el valor copulativo/futuro del cálculo; se evita «se convierte en» por sonar demasiado dinámico para una medida fija.
- source_word: ሌሊት
  english_pob_choice: the night
  chosen_spanish: la noche
  alternatives_spanish:
  - noche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se conserva el sustantivo concreto y con artículo, porque el verso contrapone dos periodos medidos: noche y día.'
- source_word: ዓሠርተ፡ ወአሐደ፡ ክፍለ፡
  english_pob_choice: eleven parts
  chosen_spanish: once partes
  alternatives_spanish:
  - once porciones
  - once divisiones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Partes» preserva el valor técnico del esquema calendárico del Libro Astronómico y mantiene la terminología adoptada en la POB inglesa.
- source_word: ወዕለት፡ ሰብዓተ፡ ክፍለ
  english_pob_choice: and the day seven parts
  chosen_spanish: y el día siete partes
  alternatives_spanish:
  - y el día siete porciones
  - mientras que el día siete partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el paralelismo sintáctico del ge'ez y la misma unidad de medida que en la primera mitad del verso.
theological_decisions:
- issue: Medición astronómica en «partes»
  english_pob_reading: The verse measures night and day by numbered 'parts,' a technical feature of the Astronomical Book's schematic calendar rather than ordinary clock-hours.
  chosen_spanish_reading: El versículo mide la noche y el día por «partes» numeradas, rasgo técnico del calendario esquemático del Libro Astronómico, no por horas ordinarias.
  alternative_spanish_readings:
  - horas
  - segmentos
  rationale: Conviene preservar el carácter técnico y no modernizarlo a un sistema horario distinto. «Partes» refleja la división esquemática sin borrar la rareza del dato.
  doctrine_reference: No doctrinal issue; calendrical/astronomical description.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió la elección verbal de «will be» a «becomes» para armonizar con los versos cercanos (72:20, 72:22, 72:26). La redacción española sigue esa lectura progresiva con «será» en sentido copulativo/resultativo, sin introducir una noción aspectual que el español no requiere de manera explícita.
  spanish_consistency_notes:
  - Se conserva «partes» de forma uniforme para las divisiones del día y de la noche.
  - Se evita «SEÑOR» u otra convención de sustitución nominal, porque el texto fuente no la requiere.
  - «Aquel día» mantiene la deixis puntual sin sobrecargarla con un sentido escatológico ajeno al contexto astronómico.
