revisions:
- from: Y en aquel día la noche será once partes[a][b], y el día siete partes.
  to: Y en aquel día la noche pasa a ser de once partes[a][b], y el día siete partes.
  rationale: Se revisa el verbo para alinearlo con la decisión auditada del POB inglés, que entiende ትከውን en esta fórmula astronómica como un cambio dentro de la secuencia ('becomes'), no solo como futuro estático. 'Pasa a ser de once partes' conserva ese matiz y mejora la naturalidad en español. Se mantiene 'partes' por su valor técnico. La nota b se conserva como alternativa anterior, ahora correctamente subordinada al texto revisado.
