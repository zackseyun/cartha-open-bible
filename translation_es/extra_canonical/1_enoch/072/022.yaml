translation:
  language: es
  text: Y ese día la noche excede al día[a], y la noche aumenta de noche en noche, y el día se acorta de día en día, hasta treinta mañanas[b], y la noche queda exactamente[d] en diez partes[c], y el día en ocho partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión comparativa «excede al día» conserva la fuerza del giro comparativo del ge'ez; también podría traducirse «supera al día».
    reason: lexical_alternative
  - marker: b
    text: «Treinta mañanas» puede funcionar como conteo de días sucesivos o de albas dentro del ciclo estacional; el ge'ez es literalmente «treinta mañanas».
    reason: cultural_note
  - marker: c
    text: La palabra que acompaña la medida de «diez partes» es difícil en este testimonio y puede significar «exactamente», «pleno» o un matiz similar de medida.
    reason: textual_variant
  - marker: d
    text: «Exactamente» recoge la precisión explícita del término ge'ez ጥንቁቀ y evita perder el énfasis matemático del pasaje.
    reason: source_note
lexical_decisions:
- source_word: በይእቲ ዕለት
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal marca una secuencia astronómica y narrativa; «en aquel día» conserva el valor deíctico sin sonar arcaica.
- source_word: ትነሡኅ
  english_pob_choice: increases
  chosen_spanish: aumenta
  alternatives_spanish:
  - crece
  - se incrementa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de medidas luminares, «aumenta» transmite el aumento de duración o extensión de manera natural en español.
- source_word: ሌሊት እምዕለት
  english_pob_choice: the night exceeds the day
  chosen_spanish: la noche excede al día
  alternatives_spanish:
  - la noche supera al día
  - la noche va más allá del día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relación comparativa del preposición እም se expresa mejor con «excede a» en español, que conserva la fuerza de comparación sin perder claridad.
- source_word: ወሌሊት እምሌሊት ትነሡኅ
  english_pob_choice: and the night increases from night to night
  chosen_spanish: y la noche aumenta de noche en noche
  alternatives_spanish:
  - y la noche crece de noche en noche
  - y la noche aumenta de una noche a otra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición distributiva se refleja con «de noche en noche», que reproduce el progreso continuo señalado por la estructura ge'ez.
- source_word: ወተሐጽር ዕለት እምዕለት
  english_pob_choice: and the day grows shorter from day to day
  chosen_spanish: y el día se acorta de día en día
  alternatives_spanish:
  - y el día disminuye de día en día
  - y el día se hace más corto de día en día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se acorta» expresa de modo idiomático el valor de disminuir en duración, y «de día en día» mantiene la progresión distributiva del original.
- source_word: እስከ ሠላሳ ጸባሕ
  english_pob_choice: until thirty mornings
  chosen_spanish: hasta treinta mañanas
  alternatives_spanish:
  - hasta treinta albas
  - hasta treinta amaneceres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Mañanas» conserva la literalidad de ጸባሕ y el tono astronómico del pasaje; evita normalizarlo a «días».
- source_word: ዐሠርተ ክፍለ
  english_pob_choice: ten parts
  chosen_spanish: diez partes
  alternatives_spanish:
  - diez porciones
  - diez divisiones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Partes» es el equivalente más transparente para el lenguaje técnico de medición del libro astronómico.
- source_word: ጥንቁቀ
  english_pob_choice: full measure / exactly
  chosen_spanish: exactamente
  alternatives_spanish:
  - con exactitud
  - plenamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio subraya precisión matemática; en español conviene expresarlo de forma explícita para no perder la exactitud técnica del texto.
- source_word: ስመንተ ክፍለ
  english_pob_choice: eight parts
  chosen_spanish: ocho partes
  alternatives_spanish:
  - ocho porciones
  - ocho divisiones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el paralelismo con «diez partes» y el mismo campo técnico de medición.
theological_decisions:
- issue: Medición astronómica esquemática
  english_pob_reading: Retain the technical 'parts' of night and day rather than converting into hours or a paraphrastic seasonal statement.
  chosen_spanish_reading: Conservar «partes» como unidad técnica de medida, sin convertirla en horas ni en una paráfrasis estacional.
  alternative_spanish_readings:
  - las noches se alargan y los días se acortan
  - la noche tiene diez horas y el día ocho horas
  rationale: El pasaje pertenece al Libro Astronómico y describe una cosmología esquemática; conservar la terminología de partes respeta el mundo conceptual del texto y evita introducir precisión moderna ajena a la fuente.
  doctrine_reference: Principio de primacía del idioma fuente y preservación de imaginería apocalíptica/cosmológica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la progresión distributiva a «de noche en noche» y «de día en día», así como la pass posterior que hizo explícita la precisión de ጥንቁቀ como «exactamente». La redacción española incorpora ambas correcciones y mantiene el carácter técnico del pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se mantiene «partes» como término técnico consistente con el Libro Astronómico.
  - Se evita «Cristo» por no haber cristología en el pasaje.
  - La comparación se expresa con verbos naturales en español («excede», «aumenta», «se acorta») sin perder la estructura progresiva del original.
