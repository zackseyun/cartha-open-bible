revisions:
- from: En aquel día el día disminuye[a] en dos partes, y el día queda en diez partes[b], y la noche en ocho partes.
  to: En aquel día el día disminuye en dos partes[a], y el día pasa a ser de diez partes[b], y la noche de ocho partes.
  rationale: Se corrige la preposición para evitar que «en dos partes» se entienda como división en vez de disminución cuantificada, y se ajusta la segunda cláusula para reflejar mejor el sentido resultativo de la sintaxis ge'ez auditada. También se reemplazan las notas por unas que preservan la explicación cultural y la alternativa de traducción ya documentadas en el rastro inglés.
