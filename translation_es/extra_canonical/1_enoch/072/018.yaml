translation:
  language: es
  text: En aquel día el día disminuye en dos partes[a], y el día pasa a ser de diez partes[b], y la noche de ocho partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El Libro Astronómico mide regularmente la duración del día y de la noche en «partes». Aquí se describe la disminución estacional de la luz del día: el día queda en diez partes y la noche en ocho.'
    reason: cultural_note
  - marker: b
    text: O «se acorta en dos partes, y el día llega a ser de diez partes y la noche de ocho partes».
    reason: previous_rendering
lexical_decisions:
- source_word: በይእቲ ዕለት
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal introduce un momento específico del ciclo astral; «En aquel día» conserva la deixis demostrativa del ge'ez y suena natural en español.
- source_word: ተሐፅፅ
  english_pob_choice: diminishes
  chosen_spanish: disminuye
  alternatives_spanish:
  - se acorta
  - se reduce
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa reducción de la duración del día. «Disminuye» mantiene el valor de decrecimiento sin forzar una imagen demasiado literal.
- source_word: ተክልኤተ፡† ክፍል
  english_pob_choice: by two parts
  chosen_spanish: en dos partes
  alternatives_spanish:
  - por dos partes
  - en dos porciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico la expresión cuantifica la variación del día; en español, «en dos partes» comunica de modo claro la medida resultante sin sugerir división arbitraria.
- source_word: ወትከውን
  english_pob_choice: and it becomes
  chosen_spanish: y el día queda
  alternatives_spanish:
  - y el día se hace
  - y llega a ser
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa reconoce que el sujeto explícito es «day». «Queda» transmite el estado resultante y evita una construcción pesada en español.
- source_word: ዕለት ዓሠርተ ክፍለ
  english_pob_choice: ten parts for the day
  chosen_spanish: en diez partes
  alternatives_spanish:
  - diez partes para el día
  - el día en diez partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez presenta la medida del día en partes fijas; en español, repetir «el día» en la segunda cláusula sería redundante, por lo que «queda en diez partes» conserva el contenido cuantitativo de forma idiomática.
- source_word: ወሌሊት ስመንተ ክፍለ
  english_pob_choice: and eight parts for the night
  chosen_spanish: y la noche en ocho partes
  alternatives_spanish:
  - y ocho partes para la noche
  - la noche en ocho partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el paralelismo con la cláusula anterior y la terminología técnica de la división astronómica de la noche.
translation_notes:
  revision_awareness: 'La redacción sigue el texto ge''ez de forma directa y toma en cuenta la revisión registrada en el audit trail: se mantiene el verbo de disminución como proceso («disminuye») y se hace explícito que «el día» es el sujeto de la cláusula resultativa. La formulación española evita el calco del borrador inglés más antiguo («se acorta... se convierte en...») y preserva el paralelismo astronómico del pasaje.'
  spanish_consistency_notes:
  - Se usa «día/noche» sin artículos adicionales en la segunda mención para mantener el paralelismo y la economía del original.
  - «Partes» conserva el término técnico astronómico del pasaje; no se reemplaza por «horas» porque el texto no usa una división moderna del tiempo.
  - No hay contenido doctrinal explícito en este versículo; la traducción se limita al registro descriptivo astronómico.
