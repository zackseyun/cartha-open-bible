translation:
  language: es
  text: Y el sol se levanta, de modo que el día se acorta y la noche se alarga[a]; y el sol vuelve al oriente y entra en la sexta puerta[c][b], y sale de ella y se pone por treinta mañanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La última cláusula es difícil en el testimonio textual. «Por treinta mañanas» probablemente apunta a un tramo de treinta días del curso del sol al usar esta puerta.
    reason: textual_variant
  - marker: b
    text: El lenguaje repetido de las puertas forma parte del esquema cósmico del Libro Astronómico y debe leerse dentro del mundo de la visión, no como mera metáfora de las estaciones.
    reason: cultural_note
  - marker: c
    text: 'O: «vuelve al oriente por la mañana y entra en».'
    reason: alternative_reading
lexical_decisions:
- source_word: ይትነሣእ
  english_pob_choice: rises
  chosen_spanish: se levanta
  alternatives_spanish:
  - sale
  - asciende
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo describe el ascenso/rise del sol. «Se levanta» es natural en español y conserva el movimiento astronómico sin añadir interpretación.
- source_word: ትሕጽር ዕለት
  english_pob_choice: the day grows shorter
  chosen_spanish: el día se acorta
  alternatives_spanish:
  - el día se hace más corto
  - el día es acortado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula expresa un efecto progresivo o resultativo sobre la duración del día. «Se acorta» comunica bien ese valor en español.
- source_word: ትኑኅ ሌሊት
  english_pob_choice: the night lengthens
  chosen_spanish: la noche se alarga
  alternatives_spanish:
  - la noche se extiende
  - la noche aumenta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El paralelismo con el día que se acorta pide un verbo simétrico. «Se alarga» mantiene la antítesis y la naturalidad del español.
- source_word: ይገብእ
  english_pob_choice: returns to the east
  chosen_spanish: vuelve al oriente
  alternatives_spanish:
  - retorna al oriente
  - regresa al oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La revisión auditada corrige una lectura meramente temporal: el movimiento es espacial. «Oriente» preserva el eje cosmológico del texto mejor que una expresión solo horaria.'
- source_word: ይበውእ
  english_pob_choice: enters
  chosen_spanish: entra
  alternatives_spanish:
  - penetra
  - ingresa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí sí corresponde el verbo de entrada propiamente dicha. «Entra» es claro y fiel al esquema técnico de las puertas celestiales.
- source_word: ሳድስት ኆኅት
  english_pob_choice: the sixth gate
  chosen_spanish: la sexta puerta
  alternatives_spanish:
  - el sexto portal
  - la sexta abertura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque «gate» puede ser «puerta», en castellano «puerta» es la forma más transparente y mantiene la imagen concreta del ciclo cósmico de las puertas.
- source_word: ይሠርቅ እምኔሃ
  english_pob_choice: rises from it
  chosen_spanish: sale de ella
  alternatives_spanish:
  - surge de ella
  - aparece de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo de salida/emergencia del sol desde la puerta se expresa con más naturalidad como «sale de ella». Mantiene el movimiento sin forzar una repetición innecesaria de «se levanta».
- source_word: የዓርብ ሠላሳ ጽባሐ
  english_pob_choice: sets for thirty mornings
  chosen_spanish: se pone por treinta mañanas
  alternatives_spanish:
  - se oculta por treinta mañanas
  - se pone durante treinta mañanas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase final es textualmente difícil. «Se pone» conserva el lenguaje solar; «por treinta mañanas» sigue de cerca la secuencia del testimonio, dejando abierta la posible equivalencia funcional con un tramo de treinta días.
theological_decisions:
- issue: Cosmic gates in the Astronomical Book
  english_pob_reading: The repeated language of gates is part of the Astronomical Book's cosmic schema and should be read literally within the vision's world, not reduced to a mere metaphor for seasons.
  chosen_spanish_reading: Las puertas se conservan como parte del esquema cósmico visionario, no como metáfora simplificada de las estaciones.
  alternative_spanish_readings:
  - las puertas son solo una imagen estacional
  - las puertas representan el clima
  rationale: El texto pertenece a una cosmología visionaria propia; la traducción no debe desactivar esa literalidad interna. Mantener «puerta» preserva el mundo conceptual del pasaje.
  doctrine_reference: Lectura literaria del género apocalíptico/visionario; no se formula doctrina bíblica normativa a partir de este versículo.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada que corrigió la lectura previa de ይገብእ: el movimiento es de retorno al oriente, y በጽባሕ aquí se entiende como referencia espacial vinculada al lugar del amanecer. También se respetó la nota de dificultad textual en la cláusula final.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió «oriente» para reflejar el movimiento espacial del sol hacia el este.
  - 'Se conservó el registro astronómico visionario con vocabulario concreto: sol, día, noche, puerta.'
  - No se usó «Cristo», «SEÑOR» ni lenguaje eclesiástico ajeno al género del pasaje.
