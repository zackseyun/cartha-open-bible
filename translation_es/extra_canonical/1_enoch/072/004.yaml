translation:
  language: es
  text: Y primero sale una gran luz, cuyo nombre es el sol, y su disco[a] es como el disco del cielo, y está completamente lleno de fuego[b] que alumbra y calienta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su orbe» o «su círculo»; el término ge'ez puede denotar una forma redonda o un circuito. Se eligió «disco» porque la comparación parece referirse a la forma visible.
    reason: lexical_alternative
  - marker: b
    text: La última pareja verbal también puede entenderse como «que da luz y arde» o «que resplandece y calienta».
    reason: lexical_alternative
lexical_decisions:
- source_word: ቀዳማዊ
  english_pob_choice: the first
  chosen_spanish: primero
  alternatives_spanish:
  - el primero
  - la primera
  lexicon: Dillmann
  rationale: Se toma adverbialmente, como en la revisión inglesa, para no convertirlo en sujeto y para respetar la sintaxis del ge'ez.
- source_word: ይወፅእ
  english_pob_choice: comes forth
  chosen_spanish: sale
  alternatives_spanish:
  - sale hacia afuera
  - emerge
  - aparece
  lexicon: Dillmann
  rationale: «Sale» comunica con naturalidad la idea de surgimiento/movimiento hacia fuera sin perder el tono elevado del pasaje.
- source_word: ብርሃን ዓቢይ
  english_pob_choice: a great light
  chosen_spanish: una gran luz
  alternatives_spanish:
  - un gran luminar
  - una gran luminaria
  lexicon: Dillmann
  rationale: «Luz» refleja directamente el sintagma ge'ez y evita introducir un tecnicismo innecesario en español.
- source_word: ዘስሙ ፀሐይ
  english_pob_choice: whose name is the sun
  chosen_spanish: cuyo nombre es el sol
  alternatives_spanish:
  - que se llama el sol
  - llamado el sol
  lexicon: Dillmann
  rationale: La fórmula posesiva relativa se vierte de modo natural en español con «cuyo nombre es», conservando el valor de denominación.
- source_word: ክበቡ
  english_pob_choice: its disk
  chosen_spanish: su disco
  alternatives_spanish:
  - su órbita
  - su circunferencia
  - su orbe
  lexicon: Dillmann
  rationale: «Disco» sigue la decisión inglesa y preserva la comparación visual con una forma redonda y visible.
- source_word: ከመ ክበበ ሰማይ
  english_pob_choice: like the disk of heaven
  chosen_spanish: como el disco del cielo
  alternatives_spanish:
  - como el círculo del cielo
  - como la bóveda del cielo
  lexicon: Dillmann
  rationale: Se conserva la comparación concreta y la repetición de la imagen circular sin suavizarla a una expresión más genérica.
- source_word: ኵሉ ምሉእ
  english_pob_choice: wholly full of
  chosen_spanish: completamente lleno de
  alternatives_spanish:
  - totalmente lleno de
  - plenamente lleno de
  lexicon: Dillmann
  rationale: La doble idea de totalidad se reproduce con un adverbio explícito y una formulación fluida en español.
- source_word: እሳት
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: Dillmann
  rationale: «Fuego» es el equivalente elemental más directo y mantiene la imaginería cósmica del texto.
- source_word: ዘያበርህ ወያውዒ
  english_pob_choice: giving light and heat
  chosen_spanish: que alumbra y calienta
  alternatives_spanish:
  - que da luz y calor
  - que resplandece y arde
  lexicon: Dillmann
  rationale: Se prefiere una pareja verbal natural en español que conserve el paralelo funcional de iluminar y producir calor, sin oscurecer el sentido por una literalidad rígida.
theological_decisions:
- issue: Naturaleza del sol en una descripción visionaria
  english_pob_reading: The verse describes the sun as a created cosmic luminary characterized by fiery brightness, without mythologizing it as a deity.
  chosen_spanish_reading: El versículo describe al sol como un luminar creado, intensamente luminoso y ardiente, sin presentarlo como una deidad.
  alternative_spanish_readings:
  - El texto personifica más fuertemente al sol.
  - Puede leerse como una imagen casi mítica del sol.
  rationale: La traducción mantiene la imaginería apocalíptica y astronómica sin introducir categorías doctrinales posteriores ni rebajar el lenguaje visionario a prosa científica.
  doctrine_reference: Preservar la imaginería apocalíptica sin mitologizar ni racionalizar en exceso.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés, especialmente la sintaxis corregida en la que «a great light» es el sujeto de «comes forth». También refleja el ajuste final de la cláusula última hacia una pareja verbal más directa y natural («que alumbra y calienta»), manteniendo la tensión entre literalidad e inteligibilidad.
  spanish_consistency_notes:
  - Se usó «sol» en minúscula porque el ge'ez lo presenta como nombre común dentro de la descripción, no como título divino.
  - Se evitó «Señor» u otra terminología de sustitución porque el pasaje no trata del nombre divino.
  - «Disco» se mantuvo de forma consistente en el cuerpo y en la nota para conservar la imagen geométrica del original.
  - No se añadió puntuación interpretativa adicional más allá de la necesaria para la fluidez en español.
