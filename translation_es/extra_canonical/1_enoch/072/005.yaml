  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. 'Carros', 'viento', 'cielo', 'oriente' y 'puerta' son compatibles con las decisiones documentadas. La única mejora léxica recomendada es usar 'brillar' en vez de 'alumbrar' para corresponder mejor a 'shine' y al ge'ez ያበርህ.
