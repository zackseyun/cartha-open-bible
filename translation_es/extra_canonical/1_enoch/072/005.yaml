translation:
  language: es
  text: Y los carros por los cuales asciende son impulsados por el viento[a], y el sol desciende desde el cielo y vuelve por el norte para llegar al oriente; y es conducido para entrar por la puerta[b] y brillar sobre la faz del cielo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia ge'ez es difícil; más literalmente podría sugerir 'el viento de ascenso' o 'el viento ascendente'.
    reason: lexical_alternative
  - marker: b
    text: '''Puerta'' traduce aquí una forma singular; en este libro la imagen puede también abarcar un ''portal'' o ''entrada'' celestial.'
    reason: lexical_alternative
  - marker: c
    text: '''Faz del cielo'' conserva una imagen apocalíptica del original; también puede traducirse ''rostro del cielo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ሰረገላት
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo plural designa vehículos/carros; en este contexto astral y apocalíptico, 'carros' conserva la imagen sin sobrecargarla con una especificación bélica que el pasaje no exige.
- source_word: የዓርግ ነፋስ
  english_pob_choice: the winds
  chosen_spanish: el viento
  alternatives_spanish:
  - los vientos
  - el viento de ascenso
  - el viento ascendente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia ge'ez es difícil. La revisión indica que 'viento' es el sujeto de 'impulsados'; en español, el singular 'el viento' reproduce mejor ese funcionamiento sintáctico, mientras que las alternativas más literales pueden explicarse aparte.
- source_word: ይነፍኅ
  english_pob_choice: drive on / are driven
  chosen_spanish: son impulsados
  alternatives_spanish:
  - son llevados
  - son movidos
  - son dirigidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene la idea de soplar/impulsar. Con 'carros' como referente, 'son impulsados' comunica el movimiento provocado por el viento sin perder la dependencia causal del original.
- source_word: የዓርብ ፀሐይ
  english_pob_choice: the sun goes down
  chosen_spanish: el sol desciende
  alternatives_spanish:
  - el sol se pone
  - el sol baja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor verbal es de descenso; 'desciende' conserva más de cerca la imagen cosmológica del texto que 'se pone', aunque ambas son posibles en español.
- source_word: እምሰማይ
  english_pob_choice: from the sky
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde el cielo
  - desde el firmamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez puede abarcar 'cielo' y 'cielo/heaven'. En un pasaje astronómico, 'cielo' funciona de manera natural en español y mantiene el registro elevado.
- source_word: እንተ መስዕ
  english_pob_choice: through the north
  chosen_spanish: por el norte
  alternatives_spanish:
  - a través del norte
  - por la región del norte
  - por el lado norte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica la zona o trayectoria norteña del recorrido solar. 'Por el norte' es la forma más natural en español y evita añadir precisión espacial no explicitada.
- source_word: ከመ ይሑር ምሥራቀ
  english_pob_choice: in order to reach the east
  chosen_spanish: para llegar al oriente
  alternatives_spanish:
  - para ir al oriente
  - a fin de alcanzar el oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula expresa propósito. 'Oriente' conserva el tono bíblico-apocalíptico de la imagen, sin dejar de ser comprensible en español moderno.
- source_word: ወይትመራኅ
  english_pob_choice: it is led
  chosen_spanish: es conducido
  alternatives_spanish:
  - es guiado
  - es dirigido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasaje presenta el curso del sol como ordenado por una agencia externa. 'Es conducido' mantiene la pasividad/causatividad sin sonar demasiado abstracto.
- source_word: ኆኅተ
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta
  - la entrada
  - el portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La adjudicación textual corregida exige singular. En español, 'puerta' es la opción más directa y transparente; 'portal' puede reservarse como alternativa interpretativa en nota.
- source_word: ያበርህ በገጸ ሰማይ
  english_pob_choice: shine on the face of heaven
  chosen_spanish: alumbrar sobre el rostro del cielo
  alternatives_spanish:
  - brillar sobre el rostro del cielo
  - alumbrar en la faz del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen idiomática de 'rostro/faz del cielo', importante en el lenguaje apocalíptico. 'Alumbrar' expresa el efecto del sol con claridad moderna y dignidad textual.
theological_decisions:
- issue: Cómo traducir el movimiento solar cosmológico sin domesticación excesiva
  english_pob_reading: The sun descends from the sky and returns through the north in order to reach the east; it is led so that it may enter the gate and shine on the face of heaven.
  chosen_spanish_reading: El sol desciende desde el cielo y vuelve por el norte para llegar al oriente; es conducido para entrar por la puerta y alumbrar sobre el rostro del cielo.
  alternative_spanish_readings:
  - el sol se pone desde el cielo y regresa por el norte
  - el sol baja del cielo y vuelve por el norte
  rationale: La lectura española mantiene la cosmovisión del pasaje como descripción ordenada del recorrido solar, sin reducirla a una fórmula idiomática más moderna que borraría el carácter apocalíptico y astronómico.
  doctrine_reference: Principio de preservación de la imaginería cosmológica del texto fuente.
- issue: Si traducir ሰማይ como 'cielo' o 'cielo/heaven' en el marco astronómico
  english_pob_reading: from the sky ... on the face of heaven
  chosen_spanish_reading: desde el cielo ... sobre el rostro del cielo
  alternative_spanish_readings:
  - desde el cielo ... sobre el rostro del cielo
  - desde el cielo ... sobre la faz del cielo
  rationale: En español, 'cielo' funciona bien tanto para el espacio visible como para el registro elevado del pasaje. La expresión fija 'rostro del cielo' preserva el eco apocalíptico sin forzar una distinción artificial entre sky/heaven.
  doctrine_reference: Principio de claridad moderna con preservación de fórmula imagética significativa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió el sujeto de 'impulsados por el viento' y la lectura singular de ኆኅተ como 'la puerta'. La redacción española evita el error anterior de hacer a los carros el sujeto de 'impulsar' y conserva la dirección cosmológica final con una frase que respeta tanto la literalidad como la inteligibilidad.
  spanish_consistency_notes:
  - Se usa 'oriente' para mantener un registro bíblico-apocalíptico coherente con el pasaje.
  - Se evita 'Señor' o 'SEÑOR' porque el verso no contiene el nombre divino.
  - Se conserva el tono impersonal y cosmológico del original, sin introducir explicaciones interpretativas adicionales.
