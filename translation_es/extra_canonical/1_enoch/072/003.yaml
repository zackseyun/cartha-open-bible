translation:
  language: es
  text: Y vi seis portales por donde sale el sol[a], y seis portales donde se pone el sol, y la luna sale y se pone en esos portales. Y los jefes de las estrellas, junto con aquellos a quienes guían, son seis en el oriente y seis en el occidente; y todos ellos, uno tras otro, en orden exacto[c][b], con muchas ventanas a la derecha y a la izquierda de esos portales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez usa un término para los seis grandes huecos cósmicos («portales») y luego una expresión más difícil que puede referirse a aberturas secundarias o ventanas junto a ellos.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final es textualmente difícil. El sentido parece ser que los portales están dispuestos en secuencia correcta, con muchas aberturas laterales tanto a la derecha como a la izquierda.
    reason: textual_variant
  - marker: c
    text: 'O: «y seis portales en los que se ponen el sol y la luna; y en esos portales salen y se ponen».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Y contemplé
  - Y miré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene el testimonio visionario en primera persona de manera natural en español, sin añadir solemnidad arcaizante innecesaria.
- source_word: ስሱ
  english_pob_choice: six
  chosen_spanish: seis
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Número directo y repetido para conservar la estructura astronómica ordenada del texto.
- source_word: ኃዋኅወ
  english_pob_choice: portals
  chosen_spanish: portales
  alternatives_spanish:
  - puertas
  - aberturas
  - ventanas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Portales» preserva mejor la imaginería cósmica apocalíptica que «puertas» y evita confundir las grandes aberturas principales con las «ventanas» laterales mencionadas al final.
- source_word: እለ ኀበ ይወፅእ ፀሐይ
  english_pob_choice: from which the sun rises
  chosen_spanish: por donde sale el sol
  alternatives_spanish:
  - por donde el sol sale
  - de donde sale el sol
  - por donde el sol emerge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Sale el sol» es idiomático en español y conserva el sentido direccional de salida desde esos portales.
- source_word: እለ ኀበ የዓርብ ፀሐይ
  english_pob_choice: where the sun sets
  chosen_spanish: donde se pone el sol
  alternatives_spanish:
  - por donde se pone el sol
  - donde el sol se oculta
  - por donde el sol se pone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La lectura revisada del inglés y el ge'ez separan claramente el ponerse del sol y la cláusula siguiente sobre la luna; «se pone el sol» evita forzar un sujeto plural.
- source_word: ወወርኅ ... ይሠርቅ ወየዓርብ
  english_pob_choice: the moon rises and sets in those portals
  chosen_spanish: la luna sale y se pone en esos portales
  alternatives_spanish:
  - la luna sale y se pone en aquellos portales
  - la luna sale y se pone por esos portales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Refleja la cláusula separada del ge''ez: la luna tiene un ciclo de salida y puesta en esos mismos portales, sin mezclarla con el sol.'
- source_word: መራኄሆሙ ለከዋክብት
  english_pob_choice: the leaders of the stars
  chosen_spanish: los jefes de las estrellas
  alternatives_spanish:
  - los líderes de las estrellas
  - los guías de las estrellas
  - los dirigentes de las estrellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Jefes» conserva la idea de conducción/precedencia del término sin resolverla explícitamente como «ángeles», algo que el texto no exige en la formulación principal.
- source_word: ምስለ እለ ይመርኅዎሙ
  english_pob_choice: together with those whom they lead
  chosen_spanish: junto con aquellos a quienes guían
  alternatives_spanish:
  - junto con los que guían
  - con aquellos que están bajo su guía
  - junto con quienes ellos conducen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la relación recíproca entre quienes encabezan y quienes son guiados, en español claro y sin especificar más de lo que el texto dice.
- source_word: ፮በጽባሕ ወ፮በምዕራብ
  english_pob_choice: six in the east and six in the west
  chosen_spanish: seis en el oriente y seis en el occidente
  alternatives_spanish:
  - seis en el este y seis en el oeste
  - seis al oriente y seis al occidente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oriente/occidente» mantiene un registro más digno y tradicional, adecuado para geografía cósmica, sin perder claridad.
- source_word: ኵሎሙ ፩፩እምድኅረ ካልኡ
  english_pob_choice: all of them, one after another
  chosen_spanish: todos ellos, uno tras otro
  alternatives_spanish:
  - todos ellos, uno después de otro
  - todos ellos, cada uno tras el otro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa sucesión ordenada de manera natural y auditable, evitando un calco pesado.
- source_word: ርቱዕ
  english_pob_choice: in exact order
  chosen_spanish: en orden exacto
  alternatives_spanish:
  - según el orden correcto
  - en orden recto
  - con arreglo exacto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Exacto» comunica la idea de orden recto/correcto del contexto astronómico y respeta la precisión del esquema.
- source_word: መላክወ ብዙኃት
  english_pob_choice: many windows
  chosen_spanish: muchas ventanas
  alternatives_spanish:
  - muchas aberturas
  - muchas aperturas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se mantiene la elección difícil del texto fuente con la misma ambigüedad útil: parecen aberturas laterales asociadas a los portales principales.'
- source_word: እምየማኑ ወእምፀጋሙ
  english_pob_choice: to the right and to the left
  chosen_spanish: a la derecha y a la izquierda
  alternatives_spanish:
  - a la diestra y a la izquierda
  - del lado derecho y del izquierdo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Corresponde de forma directa al detalle espacial del ge'ez y sujeta las ventanas a los costados de los portales.
theological_decisions:
- issue: Identificación de los jefes de las estrellas
  english_pob_reading: Render neutrally as 'the leaders of the stars' without adding 'angels' in the main text.
  chosen_spanish_reading: «los jefes de las estrellas» sin añadir «ángeles» en el texto principal.
  alternative_spanish_readings:
  - los ángeles jefes de las estrellas
  - los ángeles que guían las estrellas
  rationale: El ge'ez y el marco del pasaje permiten una lectura ordenada/celestial, pero no obligan a nombrarlos como ángeles. Se conserva la tensión interpretativa sin resolverla de más.
  doctrine_reference: Preservar tensión teológica sin sobreespecificar el agente celestial.
- issue: Relación del sol y la luna con los portales
  english_pob_reading: The revision clarifies that the sun rises from six portals, sets in six portals, and the moon rises and sets in those portals.
  chosen_spanish_reading: El sol sale por unos portales y se pone por otros; la luna sale y se pone en esos portales.
  alternative_spanish_readings:
  - el sol y la luna salen y se ponen en los mismos portales
  - el sol sale y se pone, y la luna también, en esos portales
  rationale: La revisión auditada corrige una mala agrupación sintáctica. El español sigue la separación de cláusulas del ge'ez para no atribuir al sol y a la luna un sujeto plural donde no lo hay.
  doctrine_reference: Fidelidad sintáctica al texto fuente y a la revisión adjudicada.
translation_notes:
  revision_awareness: 'Se incorporó la revisión adjudicada que corrige la sintaxis: el ge''ez separa claramente la salida del sol, la puesta del sol y el ciclo de la luna. Por eso la traducción española no combina al sol y la luna como sujeto de una sola acción de ponerse. También se conservó la ambigüedad de las «ventanas» laterales, conforme al audit trail.'
  spanish_consistency_notes:
  - Se mantiene «portales» para las aberturas principales y «ventanas» para las secundarias, siguiendo la distinción del inglés POB y el ge'ez.
  - Se usa «oriente/occidente» por registro y consistencia en geografía cósmica.
  - No se introduce «ángeles» en el texto principal para no resolver una identificación que el pasaje no formula explícitamente.
  - Las notas [a] y [b] corresponden exactamente a las dos ambigüedades documentadas en el audit trail.
