base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/072/003.yaml
  text: And I saw six portals from which the sun rises[a], and six portals where the sun sets, and the moon rises and sets in those portals. And the leaders of the stars, together with those whom they lead, are six in the east and six in the west; and all of them, one after another, in exact order[c][b], with many windows to the right and to the left of those portals.
  footnotes:
  - marker: a
    text: The Ge'ez uses one term for the six main cosmic openings ('portals') and later a different difficult phrase that may refer to subsidiary openings or windows beside them.
    reason: lexical_alternative
  - marker: b
    text: The final clause is textually difficult. The sense appears to be that the portals are arranged in proper sequence, with many side-openings on both the right and the left.
    reason: textual_variant
  - marker: c
    text: Or 'and six portals in which the sun and the moon set; and in those portals they rise and set.'.
    reason: previous_rendering
