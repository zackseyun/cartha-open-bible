translation:
  language: es
  text: Y el sol sale desde el oeste[a], desde esa sexta puerta, y viaja hacia el oriente, y se eleva por la quinta puerta durante treinta mañanas[b], y se pone de nuevo en el oeste, en la quinta puerta occidental.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Una traducción anterior decía: ''desde allí, desde el oeste''.'
    reason: previous_rendering
  - marker: b
    text: Literalmente, 'treinta mañanas'. Puede funcionar como un conteo de días, pero se preserva el giro etiópico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይወፅእ
  english_pob_choice: and ... goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale fuera
  - sale hacia fuera
  - sale
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa salida o emergencia. En español, 'sale' comunica con naturalidad el movimiento del sol sin introducir una paráfrasis innecesaria.
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el referente astronómico directo del pasaje.
- source_word: እምነ ምዕራብ
  english_pob_choice: from the west
  chosen_spanish: desde el oeste
  alternatives_spanish:
  - desde el occidente
  - del oeste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición indica procedencia. 'Desde el oeste' refleja bien el origen de la salida del sol y mantiene el paralelismo espacial del texto.
- source_word: እምይእቲ ሳድስት ኆኅት
  english_pob_choice: from that sixth gate
  chosen_spanish: desde esa sexta puerta
  alternatives_spanish:
  - desde aquel sexto portal
  - desde esa sexta abertura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Puerta'' preserva el término técnico repetido en el libro astronómico. ''Esa'' transmite la referencia anafórica sin sobrecargar el castellano.'
- source_word: ወየሐውር ምሥራቀ
  english_pob_choice: and travels eastward
  chosen_spanish: y viaja hacia el oriente
  alternatives_spanish:
  - y se dirige al oriente
  - y avanza hacia el oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El movimiento direccional es explícito; 'viaja hacia el oriente' es natural y conserva la orientación cósmica del pasaje. Se prefirió 'oriente' para el paralelismo con 'occidente/oeste'.
- source_word: ወይሠርቅ
  english_pob_choice: and rises
  chosen_spanish: y sale
  alternatives_spanish:
  - y se alza
  - y amanece
  - y sale
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés POB usa 'rises', en español 'sale' es la forma más idiomática para el salir del sol y mantiene la imagen astronómica sin forzar una construcción menos natural.
- source_word: በኃምስት ኆኅት
  english_pob_choice: in the fifth gate
  chosen_spanish: por la quinta puerta
  alternatives_spanish:
  - en la quinta puerta
  - a través de la quinta puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicum
  rationale: La preposición del ge'ez admite un valor locativo o instrumental. 'Por' expresa el paso del sol a través de la abertura y suena más natural en español que un simple 'en'.
- source_word: ሠላሳ ጽባሐ
  english_pob_choice: for thirty mornings
  chosen_spanish: durante treinta mañanas
  alternatives_spanish:
  - por treinta mañanas
  - durante treinta días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la literalidad de 'mañanas', como en la tradición auditada en inglés, porque el texto etíope cuenta con vocabulario matutino y la imagen puede funcionar como conteo de amaneceres.
- source_word: ወየዓርብ
  english_pob_choice: and sets
  chosen_spanish: y se pone
  alternatives_spanish:
  - y se oculta
  - y desciende
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto solar, 'se pone' es la equivalencia natural para la puesta del sol.
- source_word: ካዕበ
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca la repetición del ciclo de manera clara y sobria.
- source_word: ኃምስተ ኆኅተ እንተ ምዕራብ
  english_pob_choice: in the fifth western gate
  chosen_spanish: en la quinta puerta occidental
  alternatives_spanish:
  - en la quinta puerta del oeste
  - en la quinta puerta de occidente
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: Se conserva la simetría con la primera mención de la puerta y se mantiene 'occidental' para distinguirla como la correspondiente del lado oeste.
theological_decisions:
- issue: Imagen cosmológica de las puertas
  english_pob_reading: Retain literal 'gate/gates' language for the sun's movement.
  chosen_spanish_reading: Conservar 'puerta/puertas' de manera literal para el movimiento del sol.
  alternative_spanish_readings:
  - aberturas
  - portales
  - horizontes
  rationale: El libro astronómico presenta una cosmología visionaria estructurada. Traducirlo por 'puerta' preserva la imaginería apocalíptica y evita suavizarla en una descripción astronómica genérica.
  doctrine_reference: 'Principio traductor del texto apocalíptico: conservar la imaginería visionaria sin neutralizarla.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrige la sobretraducción 'from there, from the west' a simplemente 'from the west'. La formulación española evita añadir un equivalente de 'allí' o 'de allí', y mantiene la procedencia directa indicada por el ge'ez.
  spanish_consistency_notes:
  - Se usa 'oeste/oriente' de forma consistente para el eje espacial del pasaje.
  - '''Puerta'' se mantiene como término técnico apocalíptico, no como mero sinónimo decorativo.'
  - '''Sol'' y sus verbos se han traducido con español natural sin perder la secuencia de salida, viaje y puesta.'
