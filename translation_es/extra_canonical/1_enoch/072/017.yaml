    text: 'Una traducción anterior decía: ''desde allí, desde el oeste''.'
    reason: previous_rendering
  - marker: b
    text: Literalmente, 'treinta mañanas'. Puede funcionar como un conteo de días, pero se preserva el giro etiópico.
    reason: lexical_alternative
  revision_rationale: Se corrigieron las notas para que coincidan exactamente con sus anclajes y con el rastro auditado inglés. También se cambió el segundo 'sale' por 'se eleva' para distinguir mejor el acto de surgir del amanecer, sin perder naturalidad en español. Se mantuvo 'puerta' como término técnico cosmológico y la literalidad de 'treinta mañanas' en el texto principal.
