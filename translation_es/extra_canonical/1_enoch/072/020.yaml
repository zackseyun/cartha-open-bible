translation:
  language: es
  text: En aquel día el día se hace igual a la noche, [y se hace igual][a], y la noche se hace de nueve partes[b][c], y el día también de nueve partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula «y se hace igual» está entre corchetes en el testimonio y puede reflejar una adición textual o una lectura incierta; se conserva de forma transparente en vez de omitirse.
    reason: textual_variant
  - marker: b
    text: Las «partes» son divisiones esquemáticas usadas en las descripciones calendáricas del Libro Astronómico, no horas modernas.
    reason: cultural_note
  - marker: c
    text: 'O: «y la noche llega a ser de nueve partes, y el día también de nueve partes».'
    reason: alternative_reading
lexical_decisions:
- source_word: በይእቲ ዕለት
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es temporal y deíctica; «En aquel día» conserva el valor observacional y es natural en español bíblico contemporáneo sin sonar arcaico en exceso.
- source_word: ይትዓረይ
  english_pob_choice: becomes equal
  chosen_spanish: se hace igual
  alternatives_spanish:
  - se vuelve igual
  - queda igual
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa llegar a estar en igualdad o equivalencia. «Se hace igual» mantiene el proceso de devenir y funciona bien con la formulación astronómica del pasaje.
- source_word: መዓልት ምስለ ሌሊት
  english_pob_choice: the day with the night
  chosen_spanish: el día ... a la noche
  alternatives_spanish:
  - el día con la noche
  - el día y la noche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción compara día y noche como magnitudes equivalentes. En español, la relación se expresa de modo más natural con «igual a la noche» que con un calco rígido de la preposición ge'ez.
- source_word: '[ወይከውን ዕሩየ]'
  english_pob_choice: '[and it becomes even]'
  chosen_spanish: '[y se hace igual]'
  alternatives_spanish:
  - '[y se vuelve igual]'
  - '[y queda igual]'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase está entre corchetes en el testimonio base, así que debe conservarse de manera transparente como lectura incierta. «Igual» refleja el sentido de even/equal sin introducir interpretación adicional.
- source_word: ተስዓተ ክፍለ
  english_pob_choice: nine parts
  chosen_spanish: nueve partes
  alternatives_spanish:
  - nueve porciones
  - nueve divisiones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Partes» es el término más sobrio para estas divisiones esquemáticas del calendario astronómico del libro, y evita modernizarlo como si fueran horas.
- source_word: ወትከውን ሌሊት ... ወመዓልትኒ
  english_pob_choice: and the night becomes ... and the day also
  chosen_spanish: y la noche se hace ... y el día también
  alternatives_spanish:
  - y la noche llega a ... y el día también
  - y la noche queda ... y el día también
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La serie verbal del capítulo usa una fórmula de cambio de proporción; «se hace» mantiene el patrón de devenir y respeta la consistencia técnica señalada en la revisión.
theological_decisions:
- issue: Naturaleza del lenguaje astronómico y calendárico
  english_pob_reading: Treat the verse as describing the equinox-like balancing of day and night in schematic 'parts,' not as symbolic theological imagery.
  chosen_spanish_reading: Tratar el versículo como una descripción técnica del equilibrio proporcional entre día y noche, expresado en partes esquemáticas.
  alternative_spanish_readings:
  - Leerlo como una imagen simbólica de armonía cósmica
  - Espiritualizar el balance entre día y noche
  rationale: El contexto inmediato pertenece al Libro Astronómico y utiliza lenguaje de medición. Conviene conservar ese registro técnico y no convertirlo en metáfora religiosa general.
  doctrine_reference: Preservar el sentido local del pasaje; no espiritualizar ni homogeneizar la imaginería.
- issue: Valor de la cláusula entre corchetes
  english_pob_reading: The clause 'and it becomes even' is bracketed in the source witness and may reflect a textual addition or uncertain reading; it is retained transparently rather than omitted.
  chosen_spanish_reading: La cláusula entre corchetes se conserva como lectura incierta, sin omitirla.
  alternative_spanish_readings:
  - Omitir la cláusula dudosa
  - Integrarla sin marcar la incertidumbre
  rationale: La transparencia textual exige señalar la incertidumbre del testimonio. Mantener los corchetes evita borrar una posible variante y respeta el aparato auditado.
  doctrine_reference: Principio textual de transparencia y trazabilidad del testimonio.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustantivos; el punto observado por el adjudicador fue la necesidad de mantener consistencia con la fórmula verbal técnica del capítulo. Por eso se eligió «se hace» para reproducir el patrón de devenir en todo el versículo.
  spanish_consistency_notes:
  - Se mantiene «partes» para la unidad calendárica, en coherencia con el registro técnico del capítulo.
  - Se conserva la cláusula bracketed entre corchetes en español para reflejar la incertidumbre textual del testimonio.
  - Se usa «En aquel día» como equivalente natural y reverente de la referencia temporal deíctica.
  - No se introduce lenguaje de horas, cronometraje moderno ni simbolización teológica ajena al contexto astronómico.
