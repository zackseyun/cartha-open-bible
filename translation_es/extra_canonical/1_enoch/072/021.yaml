translation:
  language: es
  text: Y el sol sale de aquella puerta[a], y se pone en el occidente, y vuelve al oriente, y sale de la tercera puerta durante treinta mañanas[b], y se pone en el occidente en la tercera puerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ventana' en cada ocurrencia de 'puerta'; el Libro Astronómico describe el cielo con aberturas fijas para los astros, aunque aquí la lectura principal preserva la arquitectura de 'puertas' documentada en la revisión textual.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'durante treinta mañanas'; el texto cuenta por mañanas, no simplemente por días.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይወፅእ
  english_pob_choice: comes out / goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - sale de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa salida o emergencia; en español, 'sale' comunica con naturalidad el movimiento del sol sin perder la concreción astronómica.
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Referente astronómico directo; se mantiene el sustantivo común sin figurarlo.
- source_word: ኆኅት
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - entrada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del inglés POB corrige 'window' por 'gate'; en español 'puerta' transmite mejor la abertura/umbral cosmológico que 'ventana' y conserva la arquitectura apocalíptica.
- source_word: ያዓርብ በምዕራብ
  english_pob_choice: sets in the west
  chosen_spanish: se pone en el occidente
  alternatives_spanish:
  - se pone en el oeste
  - se oculta en el occidente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Se pone'' es el equivalente natural para la puesta del sol. ''Occidente'' conserva un registro bíblico y geográfico más elevado que ''oeste''.'
- source_word: ወይገብእ በጽባሕ
  english_pob_choice: returns to the east
  chosen_spanish: vuelve hacia el oriente
  alternatives_spanish:
  - vuelve al oriente
  - regresa hacia el oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa entiende ጽባሕ como 'east' en este contexto espacial. 'Hacia el oriente' preserva el sentido direccional y evita mezclarlo con 'mañana' en la misma línea.
- source_word: ሠላሳ ጸባሐ
  english_pob_choice: for thirty mornings
  chosen_spanish: para treinta mañanas
  alternatives_spanish:
  - por treinta mañanas
  - durante treinta mañanas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la literalidad de 'mornings' para no suavizar a 'días'; el texto cuenta por amaneceres/madrugadas en su imaginería astronómica.
theological_decisions:
- issue: Arquitectura cósmica de ኆኅት
  english_pob_reading: gate, not window
  chosen_spanish_reading: puerta, no ventana
  alternative_spanish_readings:
  - portal
  - entrada
  rationale: La escena presenta aberturas fijas del cielo por donde el sol entra y sale. 'Puerta' preserva la imaginería apocalíptica y evita borrar la distinción señalada por la revisión textual.
  doctrine_reference: Preservar la imaginería cosmológica del libro astronómico sin aplanarla en prosa general.
- issue: Valor de ጽባሕ en 1 Enoc 72:21
  english_pob_reading: east, not morning, in the directional clause
  chosen_spanish_reading: oriente, no mañana, en la cláusula direccional
  alternative_spanish_readings:
  - este
  - oriente
  rationale: La revisión inglesa muestra que aquí la palabra funciona espacialmente. Traducirla como 'mañana' en esa posición introduciría una ambigüedad ajena al movimiento descrito del sol.
  doctrine_reference: Respetar el sentido contextual del léxico geográfico dentro de una cosmología poética.
translation_notes:
  revision_awareness: 'La base inglesa pasó por una corrección léxica importante: ኆኅት se adjudicó correctamente como ''gate'' y ጽባሕ se leyó como ''east'' en la cláusula direccional. La versión española sigue esa corrección y evita la lectura previa ''ventana''/''mañana'' donde el contexto exige arquitectura cósmica y orientación espacial.'
  spanish_consistency_notes:
  - Se mantiene 'puerta' para ኆኅት en toda la sección.
  - '''Occidente'' y ''oriente'' se usan de forma consistente como pares direccionales.'
  - '''Mañanas'' se conserva solo en la expresión cuantificadora de treinta amaneceres, no como dirección.'
  - Se evita 'SEÑOR' o lenguaje de máscara divina, pues el verso no contiene el nombre divino.
