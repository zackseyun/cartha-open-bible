  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se conserva la imaginería cosmológica con «puerta», y no aparecen términos sensibles del glosario mayor. La elección «oriente» es adecuada para el registro. «Vuelve» concuerda con la revisión auditada sobre el movimiento solar.
