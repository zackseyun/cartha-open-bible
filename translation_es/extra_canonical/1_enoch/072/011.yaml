translation:
  language: es
  text: Y el sol sale de aquella cuarta puerta, y se pone en la cuarta puerta, y vuelve a la quinta puerta del oriente[a] por treinta mañanas[b][c]; luego sale de ella y se pone en la quinta puerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez incluye aquí un modificador direccional, «del oriente», importante para la secuencia cosmológica.
    reason: textual_variant
  - marker: b
    text: El ge'ez cuenta el período como «treinta mañanas», una expresión característica de esta sección; algunas versiones la suavizan a «treinta días».
    reason: lexical_alternative
  - marker: c
    text: 'O: «durante treinta mañanas».'
    reason: alternative_reading
lexical_decisions:
- source_word: ወይወፅእ
  english_pob_choice: and ... comes out
  chosen_spanish: y sale
  alternatives_spanish:
  - y sale hacia fuera
  - y emerge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo básico expresa salir/ir fuera. En este contexto astronómico, «sale» conserva el movimiento del sol sin añadir una paráfrasis moderna de tipo científico.
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el referente estándar del pasaje y mantiene el registro astronómico del texto apocalíptico.
- source_word: እምዘክቱ ራብዕ ኆኅት
  english_pob_choice: from that fourth gate
  chosen_spanish: de aquella cuarta puerta
  alternatives_spanish:
  - de esa cuarta puerta
  - desde aquella cuarta puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo mira hacia atrás en la secuencia; «aquella» refleja mejor esa referencia retrospectiva. «Puerta» se conserva por la imagen cosmológica del libro.
- source_word: ወየዓርብ
  english_pob_choice: and sets
  chosen_spanish: y se pone
  alternatives_spanish:
  - y se oculta
  - y declina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «se pone» es la forma natural y digna para el ocaso del sol, sin perder el sentido astronómico.
- source_word: በራብዕት
  english_pob_choice: in the fourth
  chosen_spanish: en la cuarta
  alternatives_spanish:
  - en la cuarta puerta
  - por la cuarta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición breve del ge'ez queda implícita en español; por contexto, se sobreentiende «puerta». Se evita repetir de forma pesada, aunque el sentido está presente.
- source_word: እንተ ጽባሕ ሠላሳ ጽባሐ
  english_pob_choice: for thirty mornings
  chosen_spanish: por treinta mañanas
  alternatives_spanish:
  - durante treinta mañanas
  - por treinta días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el valor literal de la expresión característica del pasaje. «Mañanas» mantiene la textura del original y evita normalizarlo a «días».
- source_word: እምኔሃ
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - desde ella
  - de ahí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pronombre femenino remite a la puerta; «de ella» es natural en español y conserva la anáfora.
- source_word: ወይገብእ ውስተ ኃምስት ኆኅት
  english_pob_choice: and enters the fifth gate
  chosen_spanish: y vuelve a la quinta puerta
  alternatives_spanish:
  - y regresa a la quinta puerta
  - y entra en la quinta puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A la luz de la revisión auditada, el verbo no se debe tomar como simple «entrar», sino como «volver/retornar» en la trayectoria solar. «Vuelve a» preserva esa tensión de movimiento circular sin perder inteligibilidad.
- source_word: እንተ ጽባሕ
  english_pob_choice: of the east
  chosen_spanish: del oriente
  alternatives_spanish:
  - del este
  - de oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La nota auditada muestra que el modificador direccional es crucial; «oriente» mantiene el registro bíblico y cosmológico. Se evita borrar la dirección con una formulación genérica.
- source_word: ኃምስት ኆኅት
  english_pob_choice: the fifth gate
  chosen_spanish: la quinta puerta
  alternatives_spanish:
  - el quinto portal
  lexicon: Dillmann, Lexicon Aethiopicae
  rationale: Se mantiene «puerta» como término técnico uniforme del pasaje, coherente con la imaginería del libro.
theological_decisions:
- issue: Preservar la imaginería cosmológica de puertas en lugar de modernizarla
  english_pob_reading: Retain 'gate' imagery and the sun's entering/exiting movement
  chosen_spanish_reading: Conservar la imaginería de puertas y el movimiento de salida/retorno del sol
  alternative_spanish_readings:
  - Sustituir por una formulación astronómica moderna como «sector» o «posición»
  - Parafrasear la secuencia como una simple trayectoria solar
  rationale: El pasaje pertenece a una cosmología apocalíptica revelada; no conviene aplanarla en lenguaje científico moderno. La imagen de las puertas forma parte del sentido del texto y debe permanecer auditable.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not paraphrase beyond the witness.'
- issue: Interpretación del movimiento final del sol
  english_pob_reading: The sun returns to the fifth gate of the east for thirty mornings
  chosen_spanish_reading: El sol vuelve a la quinta puerta del oriente por treinta mañanas
  alternative_spanish_readings:
  - El sol entra en la quinta puerta del oriente por treinta mañanas
  - El sol se dirige a la quinta puerta del oriente por treinta mañanas
  rationale: La revisión textual indica que el verbo debe expresar retorno, no mera entrada. La traducción española debe dejar visible ese matiz y la dirección oriental, que es parte del dato textual y cosmológico.
  doctrine_reference: Source-critical reading of the Ge'ez text and audit revisions
translation_notes:
  revision_awareness: 'La redacción incorpora la revisión más reciente: se conserva la imagen de la quinta puerta y se corrige el sentido del verbo final hacia «vuelve/retorna», además de mantener explícito el modificador direccional «del oriente».'
  spanish_consistency_notes:
  - Se usa «puerta» de manera uniforme para ኆኅት.
  - Se mantiene «mañanas» para reflejar la expresión característica del pasaje.
  - Se evita «SEÑOR» u otras sustituciones ajenas; no hay léxico divino en este versículo.
  - La secuencia conserva el paralelismo de salida, ocaso, retorno y nuevo ocaso sin modernizar la cosmología.
