  yaml_path: translation/extra_canonical/1_enoch/072/026.yaml
  text: And on that day the night increases and becomes nine parts[a], and the night becomes twelve parts and two parts exactly[d][c][b], and the day six parts.
  footnotes:
  - marker: a
    text: The numerical wording in this verse is difficult in the Ethiopic witness. The text appears to preserve a schematic measurement of day and night in parts, but the arithmetic and syntax are awkward; some interpreters would normalize the numbers from the surrounding context.
    reason: textual_variant
  - marker: b
    text: The phrase rendered 'of a division' may also mean 'of the measure' or 'of the reckoning.'
    reason: lexical_alternative
  - marker: c
    text: Or 'decreases'.
    reason: previous_rendering
  - marker: d
    text: Or 'of a division'.
    reason: previous_rendering
