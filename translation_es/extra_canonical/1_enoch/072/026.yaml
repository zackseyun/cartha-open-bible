translation:
  language: es
  text: Y en aquel día la noche aumenta y llega a ser nueve partes[a], y la noche llega a ser doce partes y dos partes exactamente, y el día, seis partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La redacción numérica de este versículo es difícil en el testimonio etiópico. Parece conservar una medición esquemática del día y de la noche en partes, pero la aritmética y la sintaxis son difíciles; algunos intérpretes normalizarían los números a partir del contexto circundante.
    reason: textual_variant
lexical_decisions:
- source_word: በይእቲ ዕለት
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión temporal demostrativa se conserva con un giro natural en español que mantiene el valor puntual y repetitivo del reporte astronómico.
- source_word: ትነውኅ ሌሊት
  english_pob_choice: the night increases
  chosen_spanish: la noche aumenta
  alternatives_spanish:
  - la noche se alarga
  - la noche crece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo corregido por la revisión significa alargarse o aumentar, no disminuir. «Aumenta» es claro y no invierte el sentido del texto.
- source_word: ፵ዕበታ
  english_pob_choice: nine parts
  chosen_spanish: nueve partes
  alternatives_spanish:
  - nueve porciones
  - nueve divisiones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Partes» conserva el lenguaje técnico esquemático de la obra astronómica sin interpretar de más la medida.
- source_word: ፲ወ፪ተ ወ፪እቲ
  english_pob_choice: twelve parts and two parts
  chosen_spanish: doce partes y dos partes
  alternatives_spanish:
  - doce y dos partes
  - catorce partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la forma aditiva y la dificultad textual visible, en lugar de armonizarla silenciosamente como «catorce».
- source_word: ክፍለ ጥንቅቀ
  english_pob_choice: exactly
  chosen_spanish: exactamente
  alternatives_spanish:
  - con precisión
  - precisamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión muestra que ጥንቅቀ es un adverbio de precisión; en español, «exactamente» comunica mejor ese valor que una frase nominal como «de una división».
- source_word: ማዓልት ስድስተ ክፍለ
  english_pob_choice: the day six parts
  chosen_spanish: el día en seis partes
  alternatives_spanish:
  - el día seis partes
  - el día se convierte en seis partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula es telegráfica; «en seis partes» conserva la elipsis y la idea de medida sin forzar una paráfrasis excesiva.
theological_decisions:
- issue: Cómo tratar la secuencia numérica difícil sin normalizarla
  english_pob_reading: Retain the awkward numerical sequence as transmitted in the Ge'ez, with minimal smoothing
  chosen_spanish_reading: Mantener la secuencia numérica difícil, con mínima suavización sintáctica
  alternative_spanish_readings:
  - Normalizar la noche a catorce partes
  - Rehacer la línea según el paralelo contextual
  rationale: No hay un problema doctrinal, sino de transparencia textual. Se preserva la tensión del testimonio ge'ez en vez de armonizarlo en silencio.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un error importante: el verbo ge''ez no significa «disminuye», sino «aumenta / se alarga». También ajustó la frase equivalente a ጥንቅቀ, que debe entenderse como un adverbio de exactitud («exactamente»), no como una construcción nominal. La traducción española refleja esas correcciones y evita introducir «de la división» o armonizar el número a catorce.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se conserva «partes» para la medida astronómica técnica, coherente con el estilo de 1 Enoc.
  - Se evita «Cristo» y cualquier terminología eclesial ajena al pasaje.
  - La puntuación reproduce la cadencia acumulativa del original y mantiene la repetición de «la noche» para no ocultar la estructura del verso.
