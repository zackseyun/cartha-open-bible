revisions:
- from: Así sale en el primer mes por la gran puerta[a][b], que es la cuarta de esas seis puertas que están hacia la salida del sol.
  to: Así sale en el primer mes por la puerta grande[a][b], que es la cuarta de esas seis puertas que están hacia la salida del sol.
  rationale: Se corrige la nota b para que refleje fielmente la alternativa documentada en el rastro de auditoría inglés, y se ajusta «gran puerta» a «puerta grande» para mejorar la naturalidad del español sin alterar el sentido fuente.
