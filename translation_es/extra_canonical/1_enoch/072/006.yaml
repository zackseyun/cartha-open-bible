translation:
  language: es
  text: Así sale en el primer mes por la puerta grande[a][b], que es la cuarta de esas seis puertas que están hacia la salida del sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La última cláusula sobre «esas seis puertas que están hacia la salida del sol» aparece entre corchetes en el testigo suministrado; puede ser una expansión explicativa o una frase textualmente incierta, aunque encaja con la descripción repetida de seis puertas orientales en el capítulo.
    reason: textual_variant
  - marker: b
    text: 'O: «que es la cuarta—esas seis puertas que están hacia la salida del sol».'
    reason: previous_rendering
lexical_decisions:
- source_word: ከመዝ
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce la secuencia o modo de la descripción astronómica. «Así» conserva el valor conectivo formal sin volver la frase innecesariamente rígida en español.
- source_word: ይወፅእ
  english_pob_choice: it comes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - emerge
  - sale por
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa salir o salir hacia afuera. En español, «sale» transmite de forma natural la imagen concreta del astro pasando por una abertura, sin interpretar demasiado con «sale por» en exceso ni con «sale afuera» de manera redundante.
- source_word: በወርኅ ቀዳማዊ
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  alternatives_spanish:
  - durante el primer mes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una expresión temporal directa. «En el primer mes» es idiomática y fiel al orden del original.
- source_word: በኆኅት ዓቢይ
  english_pob_choice: through the great gate
  chosen_spanish: por la gran puerta
  alternatives_spanish:
  - a través de la gran puerta
  - por la gran abertura
  - por el gran portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La palabra designa una puerta o abertura. En español, «por» comunica el paso a través de ella de manera natural. «Puerta» mantiene la coherencia con el conjunto de imágenes de las puertas del capítulo.
- source_word: እንተ ይእቲ ራብዕት
  english_pob_choice: which is the fourth
  chosen_spanish: que es la cuarta
  alternatives_spanish:
  - que es la cuarta una
  - la cual es la cuarta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula relativa identifica la puerta dentro de una serie numérica. «Que es la cuarta» conserva el tono clasificatorio y evita una paráfrasis excesiva.
- source_word: ኃዋኅወ ፮
  english_pob_choice: those six gates
  chosen_spanish: esas seis puertas
  alternatives_spanish:
  - las seis puertas
  - aquellas seis puertas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural y el demostrativo señalan el conjunto ya mencionado o presupuesta. «Esas seis puertas» mantiene esa deixis y el vínculo con la serie de puertas del texto.
- source_word: እለ መንገለ ምሥራቀ ፀሐይ
  english_pob_choice: that are toward the sunrise
  chosen_spanish: que están hacia la salida del sol
  alternatives_spanish:
  - que están hacia el amanecer
  - que miran al nacimiento del sol
  - que están orientadas al sol naciente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del POB inglés y la adjudicación muestran que la frase significa «sunrise» o «rising of the sun», no «east of the sun». «Salida del sol» expresa bien ese valor y resulta claro en español, preservando la orientación cosmológica del pasaje.
theological_decisions:
- issue: Imaginería cosmológica de las puertas del sol
  english_pob_reading: Retain the concrete cosmological picture of the sun coming out through a numbered gate.
  chosen_spanish_reading: Mantener la imagen concreta del sol saliendo por una puerta numerada.
  alternative_spanish_readings:
  - Interpretar el pasaje como una forma poética de decir que el sol amanece en cierto sector del cielo
  - suavizar la imagen para hacerla más astronómica en lenguaje moderno
  rationale: El texto pertenece a la Imaginería astronómica de 1 Enoc y describe el movimiento de los luminares mediante puertas numeradas. Conservar esa escena respeta el mundo conceptual del libro y evita aplanarlo en una explicación moderna.
  doctrine_reference: 'Principio traductológico: preservar la imaginería apocalíptica/cosmológica sin neutralizarla.'
translation_notes:
  revision_awareness: 'Tomé en cuenta la corrección revisada del POB inglés: la frase ge''ez ምሥራቀ ፀሐይ se entiende como «salida del sol» o «amanecer», no como «este del sol». También respeté el ajuste partititvo que hace de «la cuarta de esas seis puertas» la relación más clara entre la puerta individual y el conjunto.'
  spanish_consistency_notes:
  - Se mantuvo «puerta» para coherencia con la imaginería repetida del capítulo.
  - Se evitó «SEÑOR» o equivalentes porque el verso no contiene el nombre divino ni su sustituto.
  - Se prefirió un español claro y digno, sin arcaísmos innecesarios.
  - Las notas distinguen entre la cláusula segura y la porción bracketed/textualmente incierta.
