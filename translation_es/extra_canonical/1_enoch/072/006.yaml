    reason: textual_variant
  - marker: b
    text: 'O: «que es la cuarta—esas seis puertas que están hacia la salida del sol».'
    reason: previous_rendering
  revision_rationale: Se corrige la nota b para que refleje fielmente la alternativa documentada en el rastro de auditoría inglés, y se ajusta «gran puerta» a «puerta grande» para mejorar la naturalidad del español sin alterar el sentido fuente.
