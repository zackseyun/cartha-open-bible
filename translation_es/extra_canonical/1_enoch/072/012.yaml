  yaml_path: translation/extra_canonical/1_enoch/072/012.yaml
  text: And at that time the day grows longer by two parts[a], and the day becomes eleven parts[b], and the night grows shorter and becomes seven parts.
  footnotes:
  - marker: a
    text: The Ethiopic text marks the word for 'two' as uncertain in this witness. The sense required by the verse is that the day is reduced by two parts, yielding eleven parts for the day and seven for the night.
