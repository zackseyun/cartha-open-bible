translation:
  language: es
  text: Y en aquel tiempo el día se alarga en dos partes[a], y el día llega a once partes[b], y la noche se acorta y llega a siete partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El etiópico marca la palabra para «dos» como incierta en este testimonio; el sentido del verso exige que el día se prolonga en dos partes, dando once partes al día y siete a la noche.
    reason: textual_variant
  - marker: b
    text: 'O: «el día disminuye en dos partes, y llega a once partes».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወእሜሃ
  english_pob_choice: and at that time
  chosen_spanish: y en aquel tiempo
  alternatives_spanish:
  - y entonces
  - y en ese tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula marca transición temporal y secuencia observacional. «En aquel tiempo» conserva el valor de encuadre sin añadir interpretación.
- source_word: ይነኍኅ
  english_pob_choice: diminishes / grows longer (revised)
  chosen_spanish: se alarga
  alternatives_spanish:
  - se prolonga
  - crece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El expediente revisado corrige la lectura previa: el verbo significa alargarse o crecer en extensión. «Se alarga» es natural en español y respeta el aumento medido del día.'
- source_word: ዕለት
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - la luz del día
  - la jornada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí designa el período diurno medido por partes. «El día» mantiene el contraste repetido con la noche sin introducir un equivalente más interpretativo.
- source_word: †ክልኤ†
  english_pob_choice: two parts
  chosen_spanish: dos partes
  alternatives_spanish:
  - por dos partes
  - dos porciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cifra es textualmente incierta en el testimonio etiópico, pero el sentido exigido por la frase es una variación de dos unidades medidas. En español se explicita el valor cuantitativo con la unidad técnica «partes».
- source_word: ክፍለ
  english_pob_choice: parts
  chosen_spanish: partes
  alternatives_spanish:
  - porciones
  - divisiones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el término técnico de medición astronómica del capítulo. «Partes» es breve, coherente y mantiene la terminología del cómputo.
- source_word: ወትከውን
  english_pob_choice: and becomes
  chosen_spanish: y llega a
  alternatives_spanish:
  - y se vuelve
  - y se convierte en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia formulaica describe un resultado cuantificable. «Llega a» suena más natural en español para indicar el total alcanzado, sin perder la idea de cambio de estado.
- source_word: ዓሠርተ ወአሐደ
  english_pob_choice: eleven
  chosen_spanish: once
  alternatives_spanish:
  - diez y uno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se traduce con el numeral estándar en español para expresar el total medido, manteniendo claridad y fluidez.
- source_word: ወተሐጽር ሌሊት
  english_pob_choice: and the night grows shorter
  chosen_spanish: y la noche se acorta
  alternatives_spanish:
  - y la noche se hace más corta
  - y la noche se abrevia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica acortamiento. «Se acorta» comunica directamente la reducción de la noche en un registro natural y preciso.
- source_word: ሌሊት
  english_pob_choice: night
  chosen_spanish: la noche
  alternatives_spanish:
  - la noche oscura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término temporal básico; se conserva sin ampliación semántica.
- source_word: ሰብዓተ ክፍለ
  english_pob_choice: seven parts
  chosen_spanish: siete partes
  alternatives_spanish:
  - siete porciones
  - siete divisiones
  lexicon: Dillmann, Lexicon Linguae Aethiopaicae
  rationale: Mantiene el paralelismo técnico con las once partes del día y conserva la medida exacta del texto.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado a partir de una lectura errónea de ይነኍኅ como «diminishes»; el expediente de revisión lo corrige explícitamente a «grows longer». La versión española sigue esa corrección y conserva el sujeto explícito «el día» en ambas cláusulas, reflejando el paralelismo del original etiópico.
  spanish_consistency_notes:
  - Se conserva la unidad técnica «partes» para los cómputos astronómicos del capítulo.
  - Se mantiene el paralelismo día/noche sin introducir glosas interpretativas en el cuerpo del texto.
  - Se evita «SEÑOR» u otra terminología teológica no pertinente, porque el verso no contiene el nombre divino ni títulos cristológicos.
