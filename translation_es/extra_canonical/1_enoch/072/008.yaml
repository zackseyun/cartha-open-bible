translation:
  language: es
  text: Y cuando el sol sale del cielo, sale por aquella cuarta puerta durante treinta mañanas[a][c], y por la cuarta puerta en el occidente del cielo se pone rectamente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «durante treinta días»; el ge'ez dice literalmente «treinta mañanas», una unidad de tiempo usada en esta secuencia astronómica.
    reason: lexical_alternative
  - marker: b
    text: O «directamente» o «en línea recta»; el adverbio también puede expresar un matiz geométrico de curso recto o preciso.
    reason: lexical_alternative
  - marker: c
    text: O «Y cuando el sol sale del cielo, sale por aquella cuarta puerta durante treinta mañanas, y por la cuarta puerta en el occidente del cielo baja rectamente».
    reason: previous_rendering
lexical_decisions:
- source_word: ይሠርቅ
  english_pob_choice: rises / comes out
  chosen_spanish: sale
  alternatives_spanish:
  - amanece
  - se levanta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico, con el sol como sujeto, el verbo describe su salida o ascenso visible. 'Sale' conserva el movimiento y suena natural en español; 'amanece' sería menos exacto como acción del sol y 'se levanta' puede sonar más interpretativo.
- source_word: ይወፅእ
  english_pob_choice: comes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale hacia fuera
  - sale de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El texto presenta una salida a través de una puerta celestial. 'Sale' mantiene la imagen concreta sin recargar el español.
- source_word: ኆኅት
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque 'gate' se puede traducir literalmente por 'puerta', en español 'puerta' es la opción más clara y natural para la imagen cosmológica. 'Portal' sería más solemne, pero menos directo; 'portón' sugiere una puerta terrenal demasiado grande.
- source_word: ራብዕት
  english_pob_choice: fourth
  chosen_spanish: cuarta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el ordinal de forma literal para mantener la secuencia de las puertas solares.
- source_word: ሠላሳ ጽባሐ
  english_pob_choice: for thirty mornings
  chosen_spanish: durante treinta mañanas
  alternatives_spanish:
  - por treinta mañanas
  - durante treinta días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez dice literalmente 'mañanas'. En español, 'durante treinta mañanas' conserva la unidad temporal explícita y su rareza técnica; 'durante treinta días' sería una interpretación contextual válida pero menos literal.
- source_word: ምዕራበ ሰማይ
  english_pob_choice: the west of the sky
  chosen_spanish: el occidente del cielo
  alternatives_spanish:
  - el oeste del cielo
  - la parte occidental del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Occidente'' reproduce bien el registro cosmológico y mantiene la dirección espacial del pasaje; ''oeste'' sería más simple, pero menos elevado.'
- source_word: ርቱዐ
  english_pob_choice: straightway / exactly
  chosen_spanish: rectamente
  alternatives_spanish:
  - directamente
  - en línea recta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige la idea de inmediatez temporal y señala exactitud espacial o geométrica. 'Rectamente' transmite ese desplazamiento recto/preciso sin cargar la frase con temporalidad.
- source_word: ይወርድ
  english_pob_choice: it goes down / it sets straight down
  chosen_spanish: se pone
  alternatives_spanish:
  - desciende
  - baja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para el ocaso del sol, 'se pone' es el equivalente español más natural. Se acompaña con 'rectamente' para conservar la nota de dirección exacta del original.
theological_decisions:
- issue: Imaginería cosmológica de puertas celestiales
  english_pob_reading: Retain literal heavenly 'gates' and motion language.
  chosen_spanish_reading: Conservar puertas celestiales literales y lenguaje de movimiento.
  alternative_spanish_readings:
  - Reducirlo a lenguaje fenomenológico de amanecer y atardecer
  - Parafrasear las puertas como metáfora de los puntos cardinales
  rationale: El contexto del Libro Astronómico presenta una cosmología visionaria estructurada. La traducción española mantiene esa arquitectura en vez de volverla una descripción común del clima o del cielo visible.
  doctrine_reference: 'Contexto literario del Libro Astronómico: preservar la imaginería apocalíptica/cosmológica sin aplanarla.'
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una corrección importante en ርቱዐ: de un valor temporal (''straightway'') a uno espacial/geométrico (''exactly''), y luego a una formulación más natural (''sets straight down''). Por eso la española evita equivalentes temporales y opta por ''rectamente'', manteniendo la precisión direccional del pasaje. También se conserva la literalidad de ''treinta mañanas'' como unidad técnica del texto ge''ez, con nota alternativa a ''días''.'
  spanish_consistency_notes:
  - Se mantiene 'sol' sin mayúscula por uso común en español.
  - '''Puerta'' se usa de forma consistente para las aberturas celestiales del esquema astronómico.'
  - Se evita 'SEÑOR', 'Cristo' u otra terminología eclesial no pertinente al pasaje.
  - La fórmula 'se pone rectamente' conserva el movimiento de descenso sin introducir una lectura doctrinal ajena al texto.
