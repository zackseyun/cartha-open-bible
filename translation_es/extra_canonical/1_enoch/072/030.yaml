revisions:
- from: Y en aquel día la noche se acorta de su longitud[a], y la noche llega a diez partes[b], y el día, a ocho partes.
  to: Y en aquel día la noche se acorta desde su duración[a], y la noche queda en diez partes[b], y el día, en ocho partes.
  rationale: 'Se ajustó el español para mayor naturalidad temporal («duración» en lugar de «longitud»), se afinó el verbo de estado resultante («queda en diez partes»), y se devolvió la nota [b] a la función documentada en el rastro inglés: preservar la alternativa previa «doce partes», sin convertirla en una nota crítica textual extensa dentro del texto meta.'
