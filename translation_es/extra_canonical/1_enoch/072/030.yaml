review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del ge''ez y sigue la corrección auditada de «diez partes» frente a la lectura OCR errónea de «doce». También conserva la secuencia astronómica: la noche se reduce y el día queda en ocho partes. Sin embargo, «de su longitud» suena poco idiomático en este contexto temporal, y la nota [b] introduce una explicación textual que no corresponde al rastro inglés, donde la alternativa «doce partes» se conserva como lectura/traducción previa, no como nota crítica textual principal.'
  spanish_quality_summary: El texto es claro, pero puede ganar naturalidad y dignidad con «desde su duración» o «desde su extensión». Además, «la noche llega a diez partes» funciona, pero «la noche queda en diez partes» o «pasa a ser de diez partes» expresa mejor el estado resultante del original. La puntuación general es correcta y el registro es adecuado.
  glossary_alignment: No hay términos teológicos de proyecto en juego. El tratamiento de «partes» está bien y conviene mantenerlo. Debe alinearse la nota [b] con el inglés auditado como alternativa de traducción previa, no como afirmación de crítica textual en la edición española del verso.
  issues:
  - severity: medium
    issue: «de su longitud» es español poco natural para duración de la noche
    rationale: Aunque semánticamente posible, «longitud» en español se asocia más fácilmente con extensión espacial. En un contexto de duración temporal y proporciones astronómicas, «duración» o «extensión» comunican mejor el valor del original sin sonar calcado.
  - severity: medium
    issue: La nota [b] cambia la función de la nota inglesa
    rationale: El rastro inglés registra «Or 'twelve parts'» como lectura/traducción previa, mientras que el borrador español la reformula como explicación de OCR y revisión textual. Esa información existe en el historial de revisión, pero no debería reemplazar sin más la nota breve vinculada al texto salvo que el proyecto decida ampliar explícitamente ese tipo de notas.
  - severity: low
    issue: «la noche llega a diez partes» puede afinarse
    rationale: Es comprensible, pero el ge'ez describe el estado resultante medido. «queda en diez partes» suena más natural y técnico en español para este tipo de cómputo.
  revised_spanish_text: Y en aquel día la noche se acorta desde su duración[a], y la noche queda en diez partes[b], y el día, en ocho partes.
  revised_footnotes:
  - marker: a
    text: El verso usa la división esquemática del Libro Astronómico de día y noche en «partes» numeradas, como manera técnica de describir el cambio estacional más que horas de reloj.
    reason: cultural_note
  - marker: b
    text: O «doce partes».
    reason: previous_rendering
  revision_rationale: 'Se ajustó el español para mayor naturalidad temporal («duración» en lugar de «longitud»), se afinó el verbo de estado resultante («queda en diez partes»), y se devolvió la nota [b] a la función documentada en el rastro inglés: preservar la alternativa previa «doce partes», sin convertirla en una nota crítica textual extensa dentro del texto meta.'
