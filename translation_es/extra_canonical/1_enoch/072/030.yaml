translation:
  language: es
  text: Y en aquel día la noche se acorta desde su duración[a], y la noche queda en diez partes[b], y el día, en ocho partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verso usa la división esquemática del Libro Astronómico de día y noche en «partes» numeradas, como manera técnica de describir el cambio estacional más que horas de reloj.
    reason: cultural_note
  - marker: b
    text: O «doce partes».
    reason: previous_rendering
lexical_decisions:
- source_word: በይእቲ ዕለት
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es temporal y deíctica; «en aquel día» conserva esa referencia puntual con un registro natural en español.
- source_word: ተኃጽጸ ሌሊት
  english_pob_choice: the night is shortened
  chosen_spanish: la noche se acorta
  alternatives_spanish:
  - la noche es acortada
  - la noche se disminuye
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo describe reducción de duración. En español, «se acorta» transmite bien el cambio proporcional y suena más idiomático que una pasiva rígida.
- source_word: እምኑኃ
  english_pob_choice: from its length
  chosen_spanish: de su longitud
  alternatives_spanish:
  - de su extensión
  - de su medida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase marca el punto desde el cual disminuye la noche. «Longitud» mantiene el matiz de medida/duración dentro del esquema astronómico del texto.
- source_word: ትከውን ሌሊት ፲ወ፪ተ ክፍለ
  english_pob_choice: the night becomes ten parts
  chosen_spanish: la noche llega a diez partes
  alternatives_spanish:
  - la noche se vuelve diez partes
  - la noche es de diez partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indica que aquí debe leerse «diez» y no «doce». «Llega a diez partes» expresa el resultado medido sin forzar una construcción poco natural en español.
- source_word: ማዓልት ፰ ክፍለ
  english_pob_choice: the day eight parts
  chosen_spanish: el día, a ocho partes
  alternatives_spanish:
  - el día llega a ocho partes
  - el día en ocho partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la construcción enumerativa y el paralelismo con la noche. El español necesita suplir la relación copulativa implícita del ge'ez.
theological_decisions:
- issue: Lectura numérica correcta del verso
  english_pob_reading: the night becomes ten parts
  chosen_spanish_reading: la noche llega a diez partes
  alternative_spanish_readings:
  - la noche llega a doce partes
  rationale: La evidencia de revisión textual corrige el OCR que daba «doce». Dado el sistema matemático del Libro Astronómico, la lectura de «diez» preserva la coherencia interna del pasaje.
  doctrine_reference: Crítica textual y coherencia interna del Libro Astronómico
translation_notes:
  revision_awareness: Se siguió el texto base ge'ez con apoyo del audit trail inglés. Se atendió la revisión que corrige la lectura numérica de 12 a 10, porque la secuencia astronómica del capítulo exige una noche de diez partes y un día de ocho. No se adoptaron fórmulas eclesiásticas tradicionales que ocultaran la estructura técnica del pasaje.
  spanish_consistency_notes:
  - Se mantuvo «partes» para conservar el lenguaje técnico del Libro Astronómico.
  - Se prefirió «en aquel día» por su valor deíctico y su tono bíblico natural.
  - Se evitó «SEÑOR» o terminología cristológica, pues el verso no contiene esos elementos.
  - La puntuación conserva el paralelismo del original y facilita la lectura pública.
