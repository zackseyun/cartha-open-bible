translation:
  language: es
  text: Y cuando se completan treinta mañanas[a], el día disminuye exactamente en una parte, y el día queda en once partes[b], y la noche en siete[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «treinta mañanas». En esta sección la expresión funciona como un intervalo contado dentro del calendario solar.
    reason: lexical_alternative
  - marker: b
    text: El capítulo mide repetidamente el día y la noche en «partes» numeradas; aquí se afirma que el día ha bajado a once partes.
    reason: cultural_note
  - marker: c
    text: 'O también: «el día disminuye en una parte, y queda en once partes para el día y siete para la noche».'
    reason: previous_rendering
lexical_decisions:
- source_word: ተፈጸመ
  english_pob_choice: are completed
  chosen_spanish: se completan
  alternatives_spanish:
  - se cumplen
  - llegan a su fin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa la terminación de un período contado. «Se completan» conserva la idea de culminación sin añadir matices ajenos.
- source_word: ሠላሳ ጽባሕ
  english_pob_choice: thirty mornings
  chosen_spanish: treinta mañanas
  alternatives_spanish:
  - treinta días
  - treinta amaneceres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez dice literalmente «mañanas». En este contexto astronómico funciona como intervalo contado, pero la imagen concreta se mantiene en español.
- source_word: ተሐፅፅ ማዓልት
  english_pob_choice: the day decreases
  chosen_spanish: el día disminuye
  alternatives_spanish:
  - el día se reduce
  - el día se acorta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase describe la reducción cuantitativa de la luz del día dentro del esquema astronómico. «Disminuye» conserva ese carácter técnico y formal.
- source_word: ክፍለ አሐደ
  english_pob_choice: by exactly one part
  chosen_spanish: exactamente en una parte
  alternatives_spanish:
  - en una sola parte
  - por una parte
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción señala disminución por una unidad. «Exactamente» preserva el énfasis adverbial recuperado en la revisión, y «en una parte» refleja la medida.
- source_word: ዕለት ዓሠርተ ወአሐደ ክፍለ
  english_pob_choice: the day becomes eleven parts
  chosen_spanish: el día se vuelve de once partes
  alternatives_spanish:
  - el día queda en once partes
  - el día se hace de once partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sujeto es «el día», que pasa a un estado medido. «Se vuelve de once partes» conserva el cambio de estado y la terminología de partición.
- source_word: ወሌሊት ስብዓተ
  english_pob_choice: and the night seven
  chosen_spanish: y la noche de siete
  alternatives_spanish:
  - y la noche siete
  - y la noche en siete partes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La noche aparece como contraparte numérica del mismo sistema. La forma breve mantiene la simetría del original sin sobreexplicar «partes» cuando ya está implícito por el contexto.
translation_notes:
  revision_awareness: 'La redacción sigue la corrección más reciente del audit trail: se conserva «disminuye» en lugar de «diminishes/grows shorter», se explicita el adverbio de precisión con «exactamente», y se respeta la sintaxis donde «el día» es el sujeto de «se vuelve».'
  spanish_consistency_notes:
  - Se mantiene «partes» para el esquema técnico de medición astronómica del capítulo.
  - Se conserva la imagen concreta de «mañanas» en vez de normalizarla a «días», siguiendo el valor literal documentado.
  - La frase «de once partes» y la nota sobre la noche evitan forzar una elipsis no presente en el ge'ez.
