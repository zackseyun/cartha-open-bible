    reason: cultural_note
  - marker: c
    text: 'O también: «el día disminuye en una parte, y queda en once partes para el día y siete para la noche».'
    reason: previous_rendering
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad y claridad del español sin apartarse del original ni del POB inglés. «Queda en once partes» expresa mejor el estado resultante que «se vuelve de once partes», y «la noche en siete» evita una elipsis demasiado áspera. También se ajustó la nota c para reflejar la alternativa documentada en la auditoría inglesa.
