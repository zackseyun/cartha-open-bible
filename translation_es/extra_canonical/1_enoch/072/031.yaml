translation:
  language: es
  text: Y en aquel día el sol sale de aquella puerta y se pone en el occidente[a], y vuelve al oriente y sale por la tercera puerta por treinta y un mañanas[b], y se pone en el occidente del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo subyacente después de 'se pone' puede significar 'entrar' o 'volver'. Aquí se traduce 'vuelve' porque la secuencia describe el retorno del sol al oriente para su siguiente salida.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'treinta y un mañanas'. El texto cuenta el período por amaneceres sucesivos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወፅእ
  english_pob_choice: goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - sale de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto astronómico, el verbo expresa la salida del sol desde una abertura celeste. 'Sale' conserva la imagen concreta sin sonar forzado en español.
- source_word: ኆኅት
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - portal
  - ventana
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto describe aberturas fijas del cielo por donde transitan los luminares. 'Puerta' mantiene la imaginería arquitectónica y es natural para el lector español; 'ventana' debilitaría la estructura cosmológica.
- source_word: የዓርብ
  english_pob_choice: sets
  chosen_spanish: se pone
  alternatives_spanish:
  - se oculta
  - desciende
  - entra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para el movimiento del sol, 'se pone' es el equivalente idiomático en español y conserva el registro astronómico del texto.
- source_word: ይገብእ
  english_pob_choice: returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - entra
  - retorna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede significar 'entrar', pero aquí la secuencia indica un retorno cíclico al oriente para la siguiente salida. 'Vuelve' comunica ese movimiento con sencillez y fidelidad.
- source_word: በምስራቅ
  english_pob_choice: to the east
  chosen_spanish: al oriente
  alternatives_spanish:
  - al este
  - hacia el oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Oriente'' conserva el paralelismo cosmológico del texto y suena más elevado que la simple coordenada cardinal moderna, sin perder claridad.'
- source_word: ይሠርቅ
  english_pob_choice: rises
  chosen_spanish: sale
  alternatives_spanish:
  - amanece
  - asoma
  - se levanta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto, el verbo se refiere al ascenso del sol. Repetir 'sale' para la salida al amanecer preserva el patrón verbal y la imagen del itinerario solar.
- source_word: በሣልስት ኆኅት
  english_pob_choice: through the third gate
  chosen_spanish: por la tercera puerta
  alternatives_spanish:
  - a través de la tercera puerta
  - en la tercera puerta
  - mediante la tercera puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Por'' expresa con naturalidad el tránsito del sol a través de la abertura celeste y mantiene la sobriedad del original.'
- source_word: ሠላሳ ወአሐደ ጸባሐ
  english_pob_choice: for thirty-one mornings
  chosen_spanish: por treinta y un mañanas
  alternatives_spanish:
  - durante treinta y un días
  - por treinta y un amaneceres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez cuenta literalmente 'mañanas'. Mantener 'mañanas' preserva la forma de conteo observacional del texto y evita aplanarlo a 'días'.
- source_word: ምዕራብ ሰማይ
  english_pob_choice: the west of heaven
  chosen_spanish: el occidente del cielo
  alternatives_spanish:
  - el oeste del cielo
  - la parte occidental del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Occidente del cielo'' mantiene el tono cosmológico y la imagen espacial estructurada del original, sin reducirla a una expresión meteorológica moderna.'
theological_decisions:
- issue: Arquitectura cósmica de los cielos
  english_pob_reading: Retain 'gate' and 'west of heaven' as literal visionary-astronomical imagery
  chosen_spanish_reading: Conservar 'puerta' y 'occidente del cielo' como imaginería astronómica visionaria
  alternative_spanish_readings:
  - Rebajar a 'horizonte' o 'cielo'
  - Parafrasear como lenguaje descriptivo moderno
  rationale: El pasaje presenta un cosmos estructurado con aberturas celestes. La traducción debe preservar esa visión en vez de sustituirla por un lenguaje moderno más general.
  doctrine_reference: 'Philosophical translation principle: preserve apocalyptic imagery; avoid flattening cosmic language.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto ge''ez y coincide con la decisión auditada de la POB en inglés: mantener la imaginería astronómica literal, traducir el retorno del sol con un verbo que exprese movimiento cíclico, y conservar el conteo por ''mañanas'' como marca observacional. No se registran revisiones posteriores en el paquete.'
  spanish_consistency_notes:
  - Se prefirió 'puerta' para ኆኅት por consistencia con la terminología cósmica de la sección.
  - Se eligió 'oriente/occidente' en lugar de 'este/oeste' para sostener el registro elevado y la simetría del verso.
  - '''Mañanas'' se mantuvo en el texto principal por fidelidad lexical, con nota para aclarar el conteo temporal.'
