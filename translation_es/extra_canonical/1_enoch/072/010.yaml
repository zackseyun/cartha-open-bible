translation:
  language: es
  text: En aquel día, el día se hace más largo que la noche[a] en una novena parte[b], y el día queda exactamente en diez partes[c], y la noche exactamente en ocho partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto etiópico incluye una palabra difícil entre corchetes después de «se hace más largo»; sin embargo, el sentido del versículo permanece claro: el día excede a la noche, y luego se indica la duración de ambos.'
    reason: textual_variant
  - marker: b
    text: «Una novena parte» traduce la fracción del etíope y evita el error de leer «nueve partes». En el sistema del capítulo, la suma de diez partes para el día y ocho para la noche equivale a esa diferencia.
    reason: textual_variant
  - marker: c
    text: «Partes» designa las divisiones convencionales usadas en este capítulo para medir la duración relativa del día y la noche.
    reason: cultural_note
lexical_decisions:
- source_word: በውእቱ፡ ዕለት፡
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula deíctica introduce un momento específico dentro del ciclo anual/solar. «En aquel día» conserva la referencia temporal demostrativa con español natural y digno.
- source_word: ትነኍኅ፡
  english_pob_choice: becomes longer
  chosen_spanish: se alarga
  alternatives_spanish:
  - se hace más largo
  - es alargado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa extensión o aumento de duración. «Se alarga» es idiomático en español y mantiene el sentido dinámico del cambio de duración.
- source_word: እምሌሊት፡
  english_pob_choice: than the night
  chosen_spanish: sobre la noche
  alternatives_spanish:
  - más que la noche
  - frente a la noche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto comparativo es de excedencia en duración. «Sobre la noche» preserva la comparación de superioridad, aunque en una nota se admite que el sentido es «más que la noche».
- source_word: ታስዕተ፡ እደ፡
  english_pob_choice: a ninth part
  chosen_spanish: en una novena parte
  alternatives_spanish:
  - por una novena parte
  - en una novena porción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión auditada corrige que no son «nueve partes» sino «una novena parte» (1/9). El español debe reflejar esa fracción con precisión matemática y sin ambigüedad.
- source_word: ጥንቁቀ፡
  english_pob_choice: exactly
  chosen_spanish: exactamente
  alternatives_spanish:
  - con precisión
  - de manera exacta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término marca exactitud en el cómputo. Se repite con valor intensivo en ambos miembros para conservar el tono técnico de la medición astronómica.
- source_word: ዓሠርተ፡ ክፍለ፡
  english_pob_choice: ten parts
  chosen_spanish: diez partes
  alternatives_spanish:
  - diez divisiones
  - diez porciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Parte» comunica bien la unidad técnica de división astronómica del libro, sin sobrecargar el español con un tecnicismo ajeno al uso contextual.
- source_word: ስመንተ፡ ክፍለ፡
  english_pob_choice: eight parts
  chosen_spanish: ocho partes
  alternatives_spanish:
  - ocho divisiones
  - ocho porciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el mismo término técnico que en «diez partes» para conservar consistencia en el sistema de medición del pasaje.
- source_word: '[ካዕበተ፡]'
  english_pob_choice: The Ethiopic text includes a difficult bracketed word after 'becomes longer'; the sense of the verse remains clear
  chosen_spanish: se alarga
  alternatives_spanish:
  - otra vez se alarga
  - se alarga de nuevo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El elemento entre corchetes es incierto y no indispensable para el sentido. La traducción sigue la sintaxis segura y evita cargar el texto con una lectura dudosa.
theological_decisions:
- issue: Lenguaje numérico y astronómico del pasaje
  english_pob_reading: Treat the numbers as technical astronomical divisions of day and night, not symbolic theological numerology.
  chosen_spanish_reading: Tratar los números como divisiones técnicas del día y la noche, no como numerología simbólica.
  alternative_spanish_readings:
  - Tomarlos como números apocalípticos simbólicos
  - Entenderlos como una descripción meramente idiomática de la estación
  rationale: En contexto, el capítulo describe con medición precisa la variación de la duración del día y la noche dentro del marco cosmológico del libro. La traducción debe conservar ese carácter observacional y técnico.
  doctrine_reference: 'Principio de la POB: preservar la tensión léxica y contextual sin resolverla artificialmente; contexto del Libro Astronómico de 1 Enoc'
- issue: Relación comparativa entre día y noche
  english_pob_reading: the day becomes longer than the night by a ninth part
  chosen_spanish_reading: el día se alarga sobre la noche en una novena parte
  alternative_spanish_readings:
  - el día es más largo que la noche por una novena parte
  - el día excede a la noche en una novena parte
  rationale: La revisión crítica subraya que la fracción correcta es «una novena parte». El español elegido conserva la comparación y la precisión fraccionaria sin convertirla en una formulación matemática torpe.
  doctrine_reference: 'Doctrina de traducción de la POB: fidelidad auditable al texto fuente y a las correcciones críticas documentadas'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada que corrige la lectura numérica: ታስዕተ፡ እደ፡ significa «una novena parte», no «nueve partes». También se preservó la repetición de la exactitud («exactamente») para el día y la noche, conforme a la observación crítica más reciente.'
  spanish_consistency_notes:
  - Se mantuvo «partes» de manera uniforme para la unidad técnica de medida.
  - Se usó «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
  - Se evitó una paráfrasis expansiva y se respetó el tono técnico-astronómico del pasaje.
  - La comparación se expresó en español natural sin perder la precisión fraccionaria del original.
