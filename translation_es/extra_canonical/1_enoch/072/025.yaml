base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/072/025.yaml
  text: And on that day the sun comes out from that second gate[a], and sets in the west at the second gate, and returns to the east at the first gate for thirty-one mornings[d][c][b], and sets at the first gate in the west of heaven.
  footnotes:
  - marker: a
    text: Literally 'thirty-one mornings'; this functions as a day-count in the luminary scheme.
    reason: cultural_note
  - marker: b
    text: 'The Ge''ez wording is somewhat repetitive: the sun sets at the second gate, then returns eastward and enters by one gate for thirty-one mornings, and afterward sets by one gate in the west of heaven. The sequence likely reflects the stepwise movement of the sun through the heavenly gates rather than a stylistic redundancy.'
    reason: textual_variant
  - marker: c
    text: '''By one gate'' could also be rendered ''through one gate.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'to the east, entering by one gate for thirty-one mornings, and sets by one gate'.
    reason: previous_rendering
