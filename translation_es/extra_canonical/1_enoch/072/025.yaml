translation:
  language: es
  text: Y en aquel día el sol sale por la segunda puerta, y se pone en el occidente por la segunda puerta, y vuelve al oriente por la primera puerta durante treinta y una mañanas[a][b][c][d], y se pone por la primera puerta en el occidente del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “treinta y una mañanas”; en este esquema luminar funciona como conteo de días.
    reason: cultural_note
  - marker: b
    text: 'El ge’ez es algo repetitivo en la secuencia: el sol se pone en la segunda puerta, luego vuelve al oriente por la primera puerta durante treinta y una mañanas, y después se pone por la primera puerta en el occidente del cielo. La secuencia probablemente refleja el movimiento escalonado del sol por las puertas celestiales más que una mera redundancia estilística.'
    reason: textual_variant
  - marker: c
    text: “Por la primera puerta” también podría verterse “a través de la primera puerta”.
    reason: lexical_alternative
  - marker: d
    text: 'Otra posibilidad de puntuación y agrupación sería: “vuelve al oriente por la primera puerta durante treinta y una mañanas, y se pone por la primera puerta”.'
    reason: previous_rendering
lexical_decisions:
- source_word: ይወፅእ
  english_pob_choice: comes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - sale de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para el sol, “sale” conserva el movimiento concreto sin sonar forzado en español; expresa bien la imagen astronómica de emerger por una puerta celestial.
- source_word: ኆኅት
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portal
  - portón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Puerta” es la equivalencia más natural y clara en español para estas aberturas cósmicas. Mantiene la imagen de paso fijado en la arquitectura celestial del texto.
- source_word: ያዓርብ
  english_pob_choice: sets
  chosen_spanish: se pone
  alternatives_spanish:
  - se oculta
  - se oculta al atardecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, “se pone” es el modo idiomático de decir que el sol se oculta. Conserva el sentido astronómico sin volverlo técnico o pesado.
- source_word: ይገብእ
  english_pob_choice: returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - entra de nuevo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo comunica el movimiento cíclico del sol. “Vuelve” preserva la idea de retorno al oriente que documenta la auditoría inglesa.
- source_word: በአሐቲ ኆኅት
  english_pob_choice: by one gate / first gate
  chosen_spanish: por la primera puerta
  alternatives_spanish:
  - por una puerta
  - a través de la primera puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual mostró que aquí el numeral funciona como ordinal (“primera”), no como simple “una”. Por eso se traduce “la primera puerta”, evitando borrar el progreso enumerativo de las puertas celestiales.
- source_word: ሠላሳ ወ፩ ጸባሐ
  english_pob_choice: thirty-one mornings
  chosen_spanish: treinta y una mañanas
  alternatives_spanish:
  - treinta y un días
  - treinta y una auroras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene “mañanas” para conservar el sustantivo literal del ge’ez y la imagen calendárica. En este contexto funciona como conteo de días por mañanas, no como mera referencia poética.
- source_word: ምዕራበ ሰማይ
  english_pob_choice: the west of heaven
  chosen_spanish: el occidente del cielo
  alternatives_spanish:
  - el oeste del cielo
  - la parte occidental del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: “Occidente del cielo” reproduce la estructura cosmológica del original con dignidad bíblica en español, sin reducirla a un mero dato meteorológico o geográfico.
translation_notes:
  revision_awareness: 'Se incorporó la revisión que corrige la lectura de አሐቲ como ordinal (“primera”) y evita añadir una glosa verbal no presente en el ge’ez. También se respetó el orden ajustado del recorrido solar: salida por la segunda puerta, puesta por la segunda puerta, retorno al oriente por la primera puerta durante treinta y una mañanas, y puesta por la primera puerta en el occidente del cielo.'
  spanish_consistency_notes:
  - Se mantiene “puerta” de forma uniforme para ኆኅት, conforme al lenguaje cosmológico de 1 Enoc.
  - Se conserva “occidente del cielo” para ምዕራበ ሰማይ, evitando suavizar la imagen a un simple “oeste”.
  - Se usa “mañanas” en lugar de “días” para reflejar el conteo literal del ge’ez y no normalizarlo sin nota.
  - El numeral se traduce como ordinal en “la primera puerta” de acuerdo con la revisión textual documentada.
