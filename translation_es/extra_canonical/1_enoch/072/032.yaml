translation:
  language: es
  text: En aquel día la noche decrece y queda en nueve partes[a], y el día queda en nueve partes, y la noche es igual al día, y el año llega a su exactitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La repetición de «nueve partes» refleja la división esquemática del día y de la noche en el sistema astronómico del libro.
    reason: cultural_note
  - marker: b
    text: La frase final también puede traducirse como «el año llega a ser exacto» o «el año queda completo», según cómo se entienda el término ge'ez para exactitud o completitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: በይእቲ ዕለት
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión deíctica introduce un momento concreto del ciclo solar. «En aquel día» conserva la referencia temporal y suena natural en español bíblico contemporáneo.
- source_word: ትኃፅፅ ሌሊት
  english_pob_choice: the night decreases
  chosen_spanish: la noche decrece
  alternatives_spanish:
  - la noche disminuye
  - la noche se acorta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa reducción medible. «Decrece» mantiene el matiz técnico y astronómico sin introducir una imagen más libre como «se acorta».
- source_word: ትስዓተ ክፍለ
  english_pob_choice: nine parts
  chosen_spanish: nueve partes
  alternatives_spanish:
  - nueve porciones
  - nueve divisiones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Partes» reproduce de forma breve y clara la división esquemática del día y la noche en el sistema astronómico del libro.
- source_word: ይትዓረይ ሌሊት ምስለ ማዓልት
  english_pob_choice: the night equals the day
  chosen_spanish: la noche es igual al día
  alternatives_spanish:
  - la noche se iguala al día
  - la noche queda igual al día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción señala equivalencia entre noche y día. «Es igual al día» conserva la idea de balance y evita un giro más interpretativo.
- source_word: ዓመት ጥንቅቀ
  english_pob_choice: the year becomes exact
  chosen_spanish: el año llega a su exactitud
  alternatives_spanish:
  - el año se vuelve exacto
  - el año queda completo
  - el año se hace preciso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término ge'ez comunica exactitud, corrección o precisión calendárica. «Llega a su exactitud» preserva el valor técnico sin forzar una formulación doctrinal.
theological_decisions:
- issue: Carácter astronómico y no simbólico de la línea
  english_pob_reading: Render the line as an astronomical observation of equalized night and day, not as symbolic or liturgical language.
  chosen_spanish_reading: Traducir la línea como observación astronómica de equilibrio entre noche y día, no como lenguaje simbólico o litúrgico.
  alternative_spanish_readings:
  - Leer el verso como una declaración sobre perfección cósmica
  - Entender la igualdad como una imagen devocional
  rationale: El contexto inmediato del Libro de las Lumbreras es técnico y calendárico. La traducción española debe mantener ese sentido local y no cargar el texto con un marco teológico posterior.
  doctrine_reference: Principio POB de respetar el sentido del pasaje y no importar una lectura teológica ajena al contexto.
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra cambios aplicados en la última pasada; el consenso de revisión es alto y coincide plenamente con la lectura óptima del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se preserva el tono técnico-calendárico del pasaje con léxico medido y no devocional.
  - «Exactitud» se eligió para reflejar el valor de precisión/completitud señalado por el audit trail, evitando una paráfrasis excesiva.
