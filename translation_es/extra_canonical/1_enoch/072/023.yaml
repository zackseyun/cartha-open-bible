translation:
  language: es
  text: Y el sol sale por aquella tercera puerta, y se pone en la tercera puerta, al occidente, y vuelve al oriente, y sale por la segunda puerta en el oriente por treinta mañanas[a]; y así se pone en la segunda puerta, al occidente del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «treinta mañanas». Esto probablemente señala un intervalo de treinta días en el curso del sol, pero el texto principal conserva la formulación del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወፅእ
  english_pob_choice: comes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - sale por
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo describe salir o venir hacia afuera. En español, «sale» conserva el movimiento recurrente y técnico del sol por las puertas celestiales sin sonar forzado.
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Referente astronómico directo; no se requiere otra especificación.
- source_word: ሣልስት ኆኅት
  english_pob_choice: third gate
  chosen_spanish: tercera puerta
  alternatives_spanish:
  - tercera abertura
  - tercer portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Puerta» preserva la imaginería cosmológica concreta del libro astronómico. En español, «puerta» es más natural que «gate» transliterado y mantiene la estructura numerada.
- source_word: ያዓርብ
  english_pob_choice: sets
  chosen_spanish: se pone
  alternatives_spanish:
  - se oculta
  - se oculta al ponerse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto del curso solar, «se pone» es la equivalencia española natural para la puesta del sol y conserva el valor astronómico del verbo.
- source_word: በዐረብ
  english_pob_choice: in the west
  chosen_spanish: al occidente
  alternatives_spanish:
  - en el occidente
  - hacia el occidente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma espacial debe quedar clara en español. «Occidente» conserva el paralelismo con «oriente» y el registro cosmológico elevado del texto.
- source_word: ይገብእ
  english_pob_choice: returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - retorna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El movimiento cíclico del sol queda bien expresado con «vuelve», que es claro y no añade matices extra.
- source_word: ውስተ ምሥራቅ
  english_pob_choice: to the east
  chosen_spanish: al oriente
  alternatives_spanish:
  - al este
  - hacia el oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oriente» mantiene el paralelismo con «occidente» y suena más acorde con el registro cosmológico del pasaje.
- source_word: ካልእ ኆኅት
  english_pob_choice: second gate
  chosen_spanish: segunda puerta
  alternatives_spanish:
  - otra puerta
  - segundo portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La secuencia numerada exige «segunda puerta»; «otra» oscurecería el esquema ordenado del texto.
- source_word: ሠላሳ ጸባሐ
  english_pob_choice: for thirty mornings
  chosen_spanish: por treinta mañanas
  alternatives_spanish:
  - durante treinta mañanas
  - por treinta días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la expresión literal «treinta mañanas», como en la POB inglesa, para no suavizar la cuenta solar del original.
- source_word: በምዕራበ ሰማይ
  english_pob_choice: in the west of heaven
  chosen_spanish: al occidente del cielo
  alternatives_spanish:
  - en el occidente del cielo
  - al occidente del firmamento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Cielo» reproduce bien el marco cósmico elevado; «occidente del cielo» mantiene la estructura direccional del original.
theological_decisions:
- issue: Imaginería cosmológica de puertas solares
  english_pob_reading: Retain concrete gate-language and directional movement as described
  chosen_spanish_reading: Conservar el lenguaje concreto de puertas y el movimiento direccional tal como aparece
  alternative_spanish_readings:
  - Reducirlo a puntos de salida y puesta del sol en el horizonte
  - Parafrasearlo como descripción astronómica moderna
  rationale: El pasaje pertenece al Libro Astronómico y presenta una cosmología estructurada. La traducción conserva esa imaginería apocalíptica en lugar de aplanarla a lenguaje observacional moderno.
  doctrine_reference: 'Principio de traducción: preservar la imaginería apocalíptica; no convertirla en prosa moderna genérica.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «comes out» por naturalidad y consistencia. En español se optó por «sale», que mantiene la misma repetición verbal del original sin perder naturalidad. También se respetó la decisión inglesa de conservar «thirty mornings» de forma literal.
  spanish_consistency_notes:
  - Se mantuvo «oriente/occidente» para sostener el paralelismo cosmológico.
  - Se conservó «puerta» para ኆኅት conforme al esquema astronómico del texto.
  - No se sustituyó el registro cósmico por un lenguaje astronómico moderno.
  - La nota [a] marca la misma tensión lexical que en la POB inglesa entre literalidad y clarificación temporal.
