  revised_spanish_text: Y el sol sale por aquella tercera puerta, y se pone en la tercera puerta, al occidente, y vuelve al oriente, y sale por la segunda puerta en el oriente por treinta mañanas[a]; y así se pone en la segunda puerta, al occidente del cielo.
