translation:
  language: es
  text: 'Y esta es la primera ley[a] de los luminares: el sol, una luz, tiene su salida en los portales del cielo al oriente[b][c], y su puesta en los portales occidentales del cielo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse 'ordenanza' o 'regla' de los luminares. El término señala el orden fijo que gobierna a los cuerpos celestes.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ''por los portales del cielo del camino del alba... por los portales del cielo del occidente''. La traducción explicita la dirección para que el español sea claro.'
    reason: lexical_alternative
  - marker: c
    text: 'Otra posibilidad de traducción es: ''entra por los portales del cielo al oriente y sale por los portales occidentales del cielo''. La versión principal sigue la revisión auditada que entiende la sintaxis nominal como ''su salida'' y ''su puesta''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ትእዛዝ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - ordenanza
  - mandamiento
  - regla
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico, el término no introduce un mandato moral, sino el orden fijo que rige a los cuerpos celestes. 'Ley' conserva bien la idea de disposición estable y regulada.
- source_word: ቀዳማዊ
  english_pob_choice: first
  chosen_spanish: primera
  alternatives_spanish:
  - primer
  - principal
  - anterior
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca el primer elemento de una serie de disposiciones cósmicas; 'primera' es natural en español y mantiene el valor enumerativo.
- source_word: ብርሃናት
  english_pob_choice: luminaries
  chosen_spanish: luminares
  alternatives_spanish:
  - luces
  - luces celestes
  - astros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Luminares'' preserva el registro elevado y la referencia astronómica de los cuerpos celestes gobernados por un orden fijo.'
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Identificación directa del astro mencionado en el texto.
- source_word: ብርሃን
  english_pob_choice: a light
  chosen_spanish: una luz
  alternatives_spanish:
  - luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez lo presenta en aposición al sol; 'una luz' conserva el valor nominal sin añadir explicación innecesaria.
- source_word: መዋፅኢሁ / OCR መባእ
  english_pob_choice: has its rising
  chosen_spanish: tiene su salida
  alternatives_spanish:
  - tiene su levantamiento
  - sale
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión crítica muestra que el sentido correcto es la salida/asalida del sol por el oriente. 'Tiene su salida' suena más natural en español que una calca y mantiene el valor astronómico de 'rising'.
- source_word: ኃዋኅወ
  english_pob_choice: portals
  chosen_spanish: portales
  alternatives_spanish:
  - puertas
  - umbrales
  - gates
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Portales'' preserva la imaginería apocalíptico-cósmica de aberturas celestiales sin reducirla a un giro demasiado doméstico.'
- source_word: መንገለ ጽባሕ
  english_pob_choice: in the east
  chosen_spanish: al oriente
  alternatives_spanish:
  - en el oriente
  - hacia el oriente
  - por el oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sintagma expresa dirección oriental vinculada al amanecer. 'Al oriente' es sobrio, claro y conservador respecto del sentido direccional.
- source_word: ወምዕራቢሁ
  english_pob_choice: its setting
  chosen_spanish: su puesta
  alternatives_spanish:
  - su ocaso
  - su ocaso o puesta
  - su establecimiento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término señala la puesta del sol. 'Su puesta' mantiene la correspondencia astronómica y evita forzar el verbo con una perífrasis innecesaria.
- source_word: ዘምዕራብ
  english_pob_choice: western
  chosen_spanish: occidentales
  alternatives_spanish:
  - del occidente
  - del oeste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Occidentales'' conserva el contraste direccional con el oriente y encaja bien con ''portales del cielo'' en español culto y comprensible.'
theological_decisions:
- issue: Cosmic order language in 1 Enoch
  english_pob_reading: Rendered ትእዛዝ as 'law' to preserve fixed astronomical order rather than a human command.
  chosen_spanish_reading: '''ley'' en vez de ''mandamiento'' o ''ordenanza'''
  alternative_spanish_readings:
  - mandamiento
  - ordenanza
  - regla
  rationale: El pasaje describe la regularidad del cosmos, no una exhortación ética. 'Ley' comunica mejor la estructura estable y gobernada de los luminares, siguiendo la lectura auditada del inglés POB.
  doctrine_reference: Preservar el sentido local del texto apocalíptico y su imaginería cósmica sin moralizarlo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió una inversión del movimiento solar causada por un error de OCR en el texto ge'ez. Por eso el español refleja la salida del sol en el oriente y su puesta en los portales occidentales, en consonancia con la revisión crítica más reciente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma de proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se conserva el registro astronómico elevado con 'luminares', 'portales' y 'oriente/occidentales'.
  - No se introduce lenguaje eclesiástico tradicional ajeno al texto; la redacción sigue de cerca la estructura del original cuando es idiomático en español.
