translation:
  language: es
  text: En aquel día, el día se hace más largo que la noche[a], y el día llega a ser dos veces la noche[b], y el día se hace de doce partes, y la noche se acorta y se hace de seis partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El versículo usa el sistema esquemático de este capítulo, que divide el día y la noche en 'partes' numeradas.
    reason: cultural_note
  - marker: b
    text: La auditoría textual inglesa corrige una lectura OCR errónea de 'nueve' y entiende aquí 'dos veces', lo cual concuerda con las doce partes del día frente a las seis de la noche.
    reason: textual_variant
lexical_decisions:
- source_word: በይእቲ ዕለት
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal introductoria se vierte de modo natural en español con 'En aquel día', conservando el tono secuencial y solemne del pasaje astronómico.
- source_word: ትነውኅ
  english_pob_choice: becomes longer
  chosen_spanish: se hace más largo
  alternatives_spanish:
  - se alarga
  - se vuelve más largo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa el proceso de hacerse largo; 'se hace más largo' mantiene ese sentido observacional y la estructura repetida del texto.
- source_word: ዕለት እምሌሊት
  english_pob_choice: the day than the night
  chosen_spanish: que la noche
  alternatives_spanish:
  - que la noche
  - respecto de la noche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relación es comparativa. En español, 'más largo que la noche' expresa con claridad la comparación de duración sin forzar una calca.
- source_word: ትከውን
  english_pob_choice: becomes
  chosen_spanish: se hace
  alternatives_spanish:
  - llega a ser
  - se vuelve
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reproduzco la estructura repetitiva del Ge'ez con una forma verbal simple y consistente, sin convertir el pasaje en prosa resumida.
- source_word: ፱ዕበተ ሌሊት / ዕፅበተ ሌሊት
  english_pob_choice: twice the night
  chosen_spanish: doble de la noche
  alternatives_spanish:
  - dos veces la noche
  - el doble de la noche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La auditoría inglesa corrige la lectura errónea de 'nueve' a 'doble/twice'. En español, 'doble de la noche' preserva el valor proporcional y evita ambigüedad.
- source_word: ክፍለ ፲ወ፪
  english_pob_choice: twelve parts
  chosen_spanish: doce partes
  alternatives_spanish:
  - doce divisiones
  - doce porciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Partes'' refleja el vocabulario técnico de división temporal del capítulo y es la opción más transparente en español.'
- source_word: ትኃጽር
  english_pob_choice: grows shorter
  chosen_spanish: se acorta
  alternatives_spanish:
  - se hace más corta
  - se vuelve más corta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Se acorta'' conserva el proceso de disminución y corresponde bien al paralelismo con ''se hace más largo''.'
- source_word: ስድስተ ክፍል
  english_pob_choice: six parts
  chosen_spanish: seis partes
  alternatives_spanish:
  - seis divisiones
  - seis porciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la terminología técnica de partición temporal del pasaje.
theological_decisions:
- issue: Cómo reflejar la fórmula astronómica repetitiva sin suavizarla demasiado
  english_pob_reading: Preserve the repetitive proportional language ('becomes ... parts')
  chosen_spanish_reading: Conservar la repetición de 'se hace' y de 'partes'
  alternative_spanish_readings:
  - Reducirlo a una paráfrasis fluida sin repetición
  - Condensar la secuencia en una sola cláusula
  rationale: El libro astronómico presenta esquemas y proporciones; la repetición forma parte del registro apocalíptico-científico. Mantenerla evita borrar el diseño del texto fuente.
  doctrine_reference: 'Principio de traducción: conservar fórmulas repetidas y el carácter técnico-apocalíptico del pasaje.'
- issue: Lectura proporcional de 'doble' frente a la OCR errónea 'nueve'
  english_pob_reading: and the day becomes twice the night
  chosen_spanish_reading: y el día se hace doble de la noche
  alternative_spanish_readings:
  - y el día se hace nueve partes de la noche
  - y el día se hace nueve veces la noche
  rationale: La revisión textual inglesa identifica un error de OCR y confirma la proporcionalidad exacta de 2:1. El español debe reflejar esa lectura revisada, no la lectura errónea.
  doctrine_reference: 'Principio de crítica textual: seguir la lectura corregida por la auditoría cuando está justificada por el contexto matemático del verso.'
translation_notes:
  revision_awareness: La auditoría inglesa del texto corrigió una aparente lectura de 'nueve' a 'doble/twice' por probable error de OCR en el ge'ez. Esta versión española sigue esa revisión y mantiene la estructura repetitiva de 'se hace... partes' para respetar el registro técnico del Libro Astronómico.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni términos divinos que requieran decisión terminológica adicional.
  - '''Partes'' se mantiene de forma consistente para las divisiones temporales, evitando alternar con ''porciones'' o ''divisiones'' dentro del mismo versículo.'
  - Se conserva el paralelismo verbal ('se hace' / 'se acorta') para reflejar la cadencia del original.
