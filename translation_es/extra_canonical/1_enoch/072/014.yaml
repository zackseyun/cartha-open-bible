  yaml_path: translation/extra_canonical/1_enoch/072/014.yaml
  text: On that day the day becomes longer than the night[a], and the day becomes twice the night, and the day becomes twelve parts[b], and the night grows shorter and becomes six parts.
  footnotes:
  - marker: a
    text: The verse uses the chapter's schematic system of dividing day and night into numbered 'parts.' The clause 'the day becomes nine parts of the night' is rendered closely from the Ge'ez, though the proportional wording is somewhat compressed in English.
