  to: El libro de los cursos de las luminarias del cielo[a], cómo son, cada una según sus clases, y según su dominio y sus estaciones, según sus nombres y sus orígenes[b], y según sus meses[c], que Uriel, el santo ángel que estaba conmigo, me mostró —él, que es su guía—; y todo su registro, como me lo mostró, y cómo es en cuanto a todo el año del mundo[d] y para siempre, hasta que se realice una nueva obra[e] que permanecerá para siempre.
  rationale: Se requiere una reparación menor para mejorar la naturalidad del español y la coherencia con el expediente léxico. Se conserva el contenido básico del borrador, pero se ajusta la frase media-final a un español más claro («en cuanto a»), se corrige la puntuación de la aposición con rayas y se añade una nota en «meses» para reflejar la decisión léxica documentada frente a la variante previa «caminos/sendas». No hace falta una reescritura mayor ni una adjudicación adicional.
