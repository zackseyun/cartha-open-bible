translation:
  language: es
  text: El libro de los cursos de las luminarias del cielo[a], cómo son, cada una según sus clases, y según su dominio y sus estaciones, según sus nombres y sus orígenes[b], y según sus meses[c], que Uriel, el santo ángel que estaba conmigo, me mostró —él, que es su guía—; y todo su registro, como me lo mostró, y cómo es en cuanto a todo el año del mundo[d] y para siempre, hasta que se realice una nueva obra[e] que permanecerá para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Luminarias» traduce el término celestial elevado del original; también podría entenderse como «luces» o «astros», pero «luminarias» conserva mejor el registro.
    reason: lexical_alternative
  - marker: b
    text: El término subyacente puede sugerir «nacimientos» o puntos de salida/origen en contexto astronómico; «orígenes» mantiene esa amplitud sin decidirla en exceso.
    reason: lexical_alternative
  - marker: c
    text: Aquí se sigue la corrección léxica que entiende el término como «meses» en contexto calendárico; en etapas previas se había entendido como «caminos» o «sendas».
    reason: lexical_alternative
  - marker: d
    text: La expresión corresponde al ciclo total o «año cósmico» de la cosmología enóquica; no se trata simplemente de un año civil ordinario.
    reason: cultural_note
  - marker: e
    text: También puede entenderse como «una nueva creación» o «un nuevo acto»; se conserva «obra» para no cerrar la tensión del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: መጽሐፈ
  english_pob_choice: book
  chosen_spanish: libro
  alternatives_spanish:
  - escrito
  - registro
  lexicon: Leslau; Dillmann
  rationale: Título de una obra/discurso delimitado. En español, «libro» conserva bien el valor de composición completa y mantiene la dignidad del encabezado.
- source_word: ሚጠተ
  english_pob_choice: courses
  chosen_spanish: cursos
  alternatives_spanish:
  - ordenamientos
  - recorridos
  lexicon: Dillmann; Leslau
  rationale: En contexto astronómico, «cursos» comunica el movimiento regular y ordenado de los cuerpos celestes sin introducir un tecnicismo ajeno.
- source_word: ብርሃናት
  english_pob_choice: luminaries
  chosen_spanish: luminarias
  alternatives_spanish:
  - luces
  - astros luminosos
  lexicon: Leslau; Dillmann
  rationale: «Luminarias» preserva el registro elevado y el referente celestial de «luminaries» mejor que un simple «luces».
- source_word: ሰማይ
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielos
  lexicon: Leslau
  rationale: Aquí el referente es cosmológico; «cielo» suena natural en español y evita la carga teológica adicional de «los cielos» cuando no es necesaria.
- source_word: በበሕዝቢሆሙ
  english_pob_choice: companies
  chosen_spanish: cada una según sus clases
  alternatives_spanish:
  - según sus grupos
  - según sus compañías
  lexicon: Leslau; Dillmann
  rationale: El audit trail corrigió la lectura a una disposición distributiva. «Cada una según sus clases» expresa la categorización de las luminarias sin forzar un calco de «pueblos/compañías».
- source_word: ሥልጣኖሙ
  english_pob_choice: dominion
  chosen_spanish: dominio
  alternatives_spanish:
  - autoridad
  - poder
  lexicon: Leslau; Dillmann
  rationale: «Dominio» conserva la idea de potestad/autoridad asignada en un registro solemne y se ajusta al paralelismo del pasaje.
- source_word: ዘመኖሙ
  english_pob_choice: seasons
  chosen_spanish: estaciones
  alternatives_spanish:
  - tiempos
  - épocas
  lexicon: Leslau
  rationale: En un contexto de calendario cósmico, «estaciones» es la equivalencia española más transparente para ciclos temporales astronómicos.
- source_word: ስሞሙ
  english_pob_choice: names
  chosen_spanish: nombres
  lexicon: Leslau
  rationale: Correspondencia directa y estable.
- source_word: ሙላዳቲሆሙ
  english_pob_choice: origins
  chosen_spanish: orígenes
  alternatives_spanish:
  - nacimientos
  - principios
  lexicon: Leslau; Dillmann
  rationale: 'Mantiene la ambigüedad útil del término: puede abarcar origen, procedencia o punto de salida/rising en sentido astronómico, sin decidir demasiado.'
- source_word: አውራኂሆሙ
  english_pob_choice: months
  chosen_spanish: meses
  alternatives_spanish:
  - caminos
  - rutas
  lexicon: Leslau; Dillmann
  rationale: 'Se sigue la corrección del audit trail: el término aquí refiere a «meses», no a caminos. «Meses» preserva el marco calendárico del pasaje.'
- source_word: ኡርኤል
  english_pob_choice: Uriel
  chosen_spanish: Uriel
  lexicon: —
  rationale: Nombre propio transliterado.
- source_word: መልአክ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: Leslau; Dillmann
  rationale: En literatura enóquica, el sentido natural es un ser celestial; «ángel» es el equivalente directo y legible.
- source_word: ቅዱስ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  lexicon: Leslau
  rationale: Adjetivo cultual normal en español bíblico para un ser celeste consagrado.
- source_word: መራኂ
  english_pob_choice: guide
  chosen_spanish: guía
  alternatives_spanish:
  - conductor
  - líder
  lexicon: Leslau; Dillmann
  rationale: 'Se sigue la revisión del audit trail: el término expresa la función de conducir/dirigir; «guía» es natural y exacto en español.'
- source_word: መጽሐፎሙ
  english_pob_choice: the whole record of them
  chosen_spanish: todo su registro
  alternatives_spanish:
  - todo su libro
  - todo su escrito
  lexicon: Leslau
  rationale: El audit trail señala que el singular con ኵሎ comunica un total/compendio. «Registro» da una solución natural en español para un inventario astronómico sin obligar a «libro».
- source_word: ዓመተ ዓለም
  english_pob_choice: the year of the world
  chosen_spanish: todo el año del mundo
  alternatives_spanish:
  - el año del mundo
  - el año cósmico
  lexicon: Leslau; Dillmann
  rationale: Conserva la referencia al ciclo total del mundo/cosmos. Añadir «todo» refleja la idea de totalidad implícita en el contexto y en la revisión inglesa.
- source_word: ግብር ኃዲስ
  english_pob_choice: a new work
  chosen_spanish: una nueva obra
  alternatives_spanish:
  - una nueva creación
  - un nuevo acto
  lexicon: Leslau; Dillmann
  rationale: La expresión puede señalar una intervención divina escatológica. «Obra» preserva el valor léxico de ግብር y deja abierta la tensión entre acto, obra o creación.
- source_word: ይነብር
  english_pob_choice: will endure
  chosen_spanish: permanecerá
  alternatives_spanish:
  - durará
  - perdurará
  lexicon: Leslau; Dillmann
  rationale: En este cierre solemne, «permanecerá» comunica la duración continua requerida por el contexto; la idea de permanencia está explícitamente reforzada por «para siempre».
theological_decisions:
- issue: Cómo traducir ግብር ኃዲስ sin cerrar su alcance escatológico
  english_pob_reading: a new work ... that will endure forever
  chosen_spanish_reading: una nueva obra ... que permanecerá para siempre
  alternative_spanish_readings:
  - una nueva creación ...
  - un nuevo acto ...
  rationale: 'La frase admite más de una lectura: obra, acto divino o incluso creación nueva. Mantener «obra» conserva la ambigüedad del Geʿez y evita imponer una formulación doctrinal posterior; al mismo tiempo, el contexto escatológico queda claro por la cláusula final.'
  doctrine_reference: Principio POB de preservar tensiones léxicas y no sustituirlas por formulaciones dogmáticas posteriores.
- issue: Relación entre el “año del mundo” y el orden cósmico
  english_pob_reading: how it is with regard to every year of the world and forever
  chosen_spanish_reading: y cómo es con respecto a todo el año del mundo y para siempre
  alternative_spanish_readings:
  - y cómo se ordena el año del mundo
  - y cómo es cada año del mundo
  rationale: El texto no exige añadir un verbo de orden explícito. La construcción española mantiene la referencia al ciclo completo del año cósmico y respeta la austeridad del original, dejando abierta la explicación de la secuencia astronómica.
  doctrine_reference: Respeto al género apocalíptico-astronómico de 1 Enoc sin harmonización con vocabulario bíblico posterior.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés más reciente, especialmente las correcciones de ሀለዉ como «how they are», አውራኂሆሙ como «their months» y la necesidad de un equivalente más natural para መጽሐፎሙ. La redacción española sigue esas revisiones y evita el error anterior de leer «caminos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el Tetragrámaton aparezca explícitamente; aquí no aparece, por lo que no se introduce.
  - Se usa un registro solemne pero claro, apto para lectura eclesial amplia.
  - Se conserva la ambigüedad de «nueva obra» con nota, en línea con la filosofía POB de no eliminar tensiones documentadas.
