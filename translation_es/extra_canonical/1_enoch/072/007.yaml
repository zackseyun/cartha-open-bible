translation:
  language: es
  text: Y en aquella cuarta puerta[a], de donde sale el sol en el primer mes, hay doce ventanas abiertas[b][c], de donde sale una llama cuando se abren en sus tiempos señalados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lectura revisada del ge'ez entiende aquí simplemente «ventanas abiertas»; no se mantiene en español la antigua conjetura sobre el viento o su administración.
    reason: textual_variant
  - marker: b
    text: En este libro, las puertas y ventanas del cielo funcionan como aberturas cósmicas por las que salen los luminarios y otros fenómenos según un orden fijo.
    reason: cultural_note
  - marker: c
    text: La fuente auditada corrigió una lectura anterior relacionada con el viento; aquí se sigue la revisión textual que da «ventanas abiertas».
    reason: source_note
lexical_decisions:
- source_word: ኆኅት ራብዕት
  english_pob_choice: fourth gate
  chosen_spanish: cuarta puerta
  alternatives_spanish:
  - cuarto portal
  - cuarta abertura
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Puerta» conserva la imagen cosmológica de acceso/apertura en el marco visionario del Libro de las Luminarias. «Ventana» no corresponde aquí a este primer miembro del verso, y «abertura» sería demasiado general.
- source_word: ይወፅእ ፀሐይ
  english_pob_choice: the sun comes out
  chosen_spanish: sale el sol
  alternatives_spanish:
  - el sol sale
  - el sol emerge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa salir/venir fuera. «Sale el sol» es natural en español y conserva el movimiento concreto del astro a través de la puerta.
- source_word: በወርኅ ቀዳማዊ
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  alternatives_spanish:
  - durante el primer mes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es temporal directa; «en el primer mes» es fiel, breve y idiomática.
- source_word: ባቲ ፲፪ መስኮተ
  english_pob_choice: twelve open windows
  chosen_spanish: doce ventanas abiertas
  alternatives_spanish:
  - doce ventanas abiertas de paso
  - doce aberturas abiertas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasaje describe aperturas celestes. «Ventanas abiertas» sigue de cerca el sentido y evita forzar una glosa técnica innecesaria. El adjetivo «abiertas» recoge el valor de la fuente revisada.
- source_word: ዘእምኔሆን
  english_pob_choice: from which
  chosen_spanish: de donde
  alternatives_spanish:
  - de las cuales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una relativa de procedencia. «De donde» suena natural en español y conserva la relación sintáctica con las ventanas.
- source_word: ላህብ
  english_pob_choice: a flame
  chosen_spanish: una llama
  alternatives_spanish:
  - una flama
  - fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Llama» reproduce el carácter vívido y físico del término sin diluirlo en un genérico «fuego».
- source_word: ሶበ ይትረሐዉ
  english_pob_choice: when they are opened
  chosen_spanish: cuando son abiertas
  alternatives_spanish:
  - cuando se abren
  - al abrirse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción pasiva mantiene el tono mecánico-cósmico del texto y refleja bien el evento de apertura de las ventanas.
- source_word: እምዘመነ ዚአሆሙ
  english_pob_choice: at their appointed times
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - en su tiempo asignado
  - a su tiempo fijado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tiempo señalado» expresa la idea de tiempos establecidos y ordenados dentro del esquema astronómico del libro. Opto por singular genérico en español para una lectura más fluida, sin perder la noción de orden fijo.
theological_decisions:
- issue: Lectura del primer sintagma difícil antes de 'ventanas abiertas'
  english_pob_reading: The English audit trail originally proposed a wind/dominion phrase, but the adjudicated revision identifies an OCR error and reads simply 'open windows'.
  chosen_spanish_reading: «ventanas abiertas» sin referencia al viento ni a dominio/administración
  alternative_spanish_readings:
  - ventanas del dominio del viento
  - ventanas de los ángeles de los vientos
  rationale: La fuente revisada corrige el error OCR y elimina la necesidad de introducir una administración del viento. Para no perpetuar una lectura ya adjudicada como errónea, la traducción española sigue la revisión más segura y transparente.
  doctrine_reference: 'Principio de fidelidad textual: preferir la lectura corregida y evitar sobreinterpretaciones angelológicas no sustentadas por el witness dado.'
- issue: Valor de la imagen celeste de puertas y ventanas
  english_pob_reading: The Astronomical Book regularly depicts the heavens with gates and openings through which luminaries, winds, and fiery heat emerge according to fixed times.
  chosen_spanish_reading: Mantener literalmente puertas y ventanas celestes como parte del orden cósmico.
  alternative_spanish_readings:
  - abridores
  - huecos
  - pasajes
  rationale: La imaginería apocalíptica del libro depende de estructuras celestes concretas. Traducirlas como «puertas» y «ventanas» preserva la cosmología del pasaje y su ritmo paralelo.
  doctrine_reference: Poética apocalíptica y cosmología literaria del Libro de las Luminarias.
translation_notes:
  revision_awareness: 'La revisión adjudicada corrigió una lectura previa errónea: el Ge''ez no exige una frase sobre el dominio o los ángeles del viento, sino que describe simplemente doce ventanas abiertas. La redacción española sigue esa corrección y evita reproducir la conjetura descartada.'
  spanish_consistency_notes:
  - He usado «puerta» para ኆኅት ራብዕት y «ventanas abiertas» para ባቲ ፲፪ መስኮተ, manteniendo la distinción entre el primer elemento y el segundo.
  - «Yahvé» no aparece en este versículo; no aplica la terminología del nombre divino aquí.
  - He preferido «sale el sol» y no una paráfrasis más interpretativa, para conservar la concreción del movimiento astral.
  - La estructura con relativa «de donde» reproduce el vínculo causal/local del original sin añadir nexos explicativos innecesarios.
