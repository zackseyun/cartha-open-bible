  - marker: b
    text: En este libro, las puertas y ventanas del cielo funcionan como aberturas cósmicas por las que salen los luminarios y otros fenómenos según un orden fijo.
    reason: cultural_note
  - marker: c
    text: La fuente auditada corrigió una lectura anterior relacionada con el viento; aquí se sigue la revisión textual que da «ventanas abiertas».
    reason: source_note
  revision_rationale: 'Se ajusta la cláusula final para que el español suene natural y a la vez refleje mejor el plural implícito de los tiempos asignados: «cuando se abren en sus tiempos señalados». El resto del verso preserva bien la revisión textual adjudicada y la imaginería del original.'
