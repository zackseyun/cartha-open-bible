translation:
  language: es
  text: Y el sol completa sus cursos, y otra vez va por esos cursos; y entra por esa puerta durante treinta mañanas, y en el occidente se pone frente a ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ፈጸመ
  english_pob_choice: completed
  chosen_spanish: completa
  alternatives_spanish:
  - termina
  - cumple
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El perfecto aquí se integra mejor en español como presente narrativo, porque la secuencia sigue describiendo el movimiento continuo del sol. ‘Completa’ conserva la idea de llevar a término sin introducir una noción teológica de ‘cumplimiento’.
- source_word: ጸሐይ
  english_pob_choice: sun
  chosen_spanish: sol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Referente astronómico directo; ‘sol’ es la forma natural y transparente en español.
- source_word: አርእስቲሁ
  english_pob_choice: its chief course
  chosen_spanish: sus cursos
  alternatives_spanish:
  - su curso principal
  - sus trayectos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indica que el término es plural y alude a las ‘estaciones’ o recorridos del sol, no a un único ‘curso principal’. ‘Sus cursos’ preserva el plural y la repetición del pasaje sin forzar una terminología técnica ajena.
- source_word: ዳግመ
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa de forma natural la repetición cíclica del movimiento solar.
- source_word: የሐውር
  english_pob_choice: it goes along
  chosen_spanish: va por
  alternatives_spanish:
  - viaja por
  - procede por
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase española mantiene la idea de desplazamiento por una ruta ya establecida, sin sobrecargar el verso.
- source_word: ዲበ ዝኩ አርእስቲሁ
  english_pob_choice: that chief course
  chosen_spanish: esos cursos
  alternatives_spanish:
  - aquellos cursos
  - esa misma ruta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El demostrativo y el plural se reflejan mejor en plural español. ‘Esos cursos’ enlaza con el antecedente y conserva la referencia reiterada del texto.
- source_word: ይበውእ
  english_pob_choice: it enters
  chosen_spanish: entra
  alternatives_spanish:
  - ingresa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo simple y natural para la entrada por la puerta celestial.
- source_word: ኆኅት
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español ‘puerta’ comunica bien la imagen cosmológica de una abertura por la que pasa el sol. ‘Portal’ sería más solemne, pero menos directo.
- source_word: ሠላሳ ጸባሐ
  english_pob_choice: for thirty mornings
  chosen_spanish: durante treinta mañanas
  alternatives_spanish:
  - por treinta mañanas
  - durante treinta días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen literal de ‘mañanas’, que en este contexto sugiere un conteo de apariciones diarias. ‘Durante’ hace fluida la duración en español.
- source_word: በምዕራብኒ
  english_pob_choice: in the west
  chosen_spanish: en el occidente
  alternatives_spanish:
  - en el oeste
  - hacia el occidente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Occidente’ mantiene el registro digno y el paralelismo cosmológico del pasaje.
- source_word: በመንጸሩ / OCR misread in audit context
  english_pob_choice: sets opposite it
  chosen_spanish: se pone enfrente de ella
  alternatives_spanish:
  - se pone opuesto a ella
  - se pone frente a ella
  lexicon: Charles 1906 / reviewer correction
  rationale: La revisión textual corrigió la lectura errónea del OCR y mostró que el sentido es ‘enfrente de ella / opuesto a ella’. En español, ‘se pone enfrente de ella’ conserva la relación espacial entre el sol, la puerta y el punto de puesta.
theological_decisions:
- issue: Imaginería cosmológica concreta del libro astronómico
  english_pob_reading: Retain concrete gate-and-course language
  chosen_spanish_reading: Conservar el lenguaje concreto de cursos, puerta y puesta del sol
  alternative_spanish_readings:
  - modernizarlo en una descripción astronómica abstracta
  - parafrasearlo en términos generales de movimiento solar
  rationale: El texto pertenece a una descripción visionaria del orden cósmico. La traducción mantiene la imaginería de rutas y puerta en vez de sustituirla por lenguaje científico moderno, para no borrar la estructura apocalíptica del pasaje.
  doctrine_reference: Poética apocalíptica y preservación de imagen; no aplanar el lenguaje cósmico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión posterior que corrigió dos problemas mayores del borrador inglés: el plural de አርእስቲሁ y la lectura errónea de la clausula final. Por eso la versión española evita ‘curso principal’ singular y evita cualquier equivalente de ‘by its own guidance’, usando una lectura espacial fiel al texto corregido.'
  spanish_consistency_notes:
  - Se preservó un registro bíblico sobrio sin recurrir a fórmulas eclesiásticas innecesarias.
  - Se eligieron plurales donde el texto revisado exige repetición de recorridos solares.
  - Se evitó ‘SEÑOR’ u otras sustituciones no pertinentes; aquí no aparece el nombre divino.
  - ‘Occidente’ y ‘enfrente de ella’ mantienen la orientación espacial del original sin modernización excesiva.
