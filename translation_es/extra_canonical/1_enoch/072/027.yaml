base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/072/027.yaml
  text: And the sun completes its courses[a], and again it travels upon those courses; and it enters through that gate for thirty mornings[e][d][c][b], and in the west it sets opposite it.
  footnotes:
  - marker: a
    text: Or 'its principal path.' The Ge'ez term literally relates to 'head' or 'chief' and here likely denotes the sun's appointed main course.
    reason: lexical_alternative
  - marker: b
    text: Literally 'thirty mornings'; this likely marks a thirty-day span of appearances through the same gate.
    reason: lexical_alternative
  - marker: c
    text: The phrase rendered 'by its own guidance' is difficult and may also mean 'according to its order' or 'by its appointed reckoning.'
    reason: textual_variant
  - marker: d
    text: Or 'completed its chief course, and again it goes along that chief course'.
    reason: previous_rendering
  - marker: e
    text: Or 'goes down by its own guidance'.
    reason: previous_rendering
