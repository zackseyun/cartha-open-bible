  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. ‘Puerta’ preserva correctamente la imaginería cósmica. ‘Señales’ es una opción válida para ትእምርታቲሃ, aunque ‘signos’ también sería posible; no requiere cambio. ‘Treinta y una mañanas’ sigue fielmente el texto fuente.
  issues:
