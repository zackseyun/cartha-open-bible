translation:
  language: es
  text: Y el sol sale de aquella quinta puerta[a], y se pone en la quinta puerta en el oeste, y se levanta en la cuarta puerta según sus señales[b] durante treinta y una mañanas[c], y se pone en el oeste[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Puerta’ traduce el lenguaje de las aberturas celestiales del texto; no se intenta precisar aquí una estructura física moderna.
    reason: lexical_alternative
  - marker: b
    text: La expresión ge'ez puede entenderse como ‘según sus señales’ o ‘de acuerdo con sus señales’.
    reason: lexical_alternative
  - marker: c
    text: O ‘treinta y un días’. El texto dice literalmente ‘mañanas’, en coherencia con el marco observacional del pasaje.
    reason: lexical_alternative
  - marker: d
    text: 'La cláusula final es breve en ge''ez: ‘y se pone en el oeste’. Algunos traductores añaden ‘en esa puerta’, pero el testimonio base no repite ‘puerta’ aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: ይወፅእ
  english_pob_choice: comes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - sale de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto astronómico, el verbo expresa el movimiento del sol desde una abertura celestial. ‘Sale’ es natural en español y conserva la imagen concreta de salida/emergencia.
- source_word: ኆኅት
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portal
  - entrada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El inglés auditado preserva la imagen de ‘gate’. En español, ‘puerta’ comunica el mismo campo semántico y mantiene la imaginería cósmica sin volverla técnica de más.
- source_word: የዓርብ / ያዓርብ
  english_pob_choice: sets
  chosen_spanish: se pone
  alternatives_spanish:
  - se oculta
  - se baja
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Para el sol, ‘se pone’ es el equivalente idiomático más claro y fiel al valor astronómico de la forma ge'ez.
- source_word: ምዕራብ
  english_pob_choice: the west
  chosen_spanish: el oeste
  alternatives_spanish:
  - occidente
  - el poniente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘El oeste’ conserva la referencia direccional de manera clara y moderna; evita un registro demasiado arcaizante.
- source_word: ይሠርቅ
  english_pob_choice: rises
  chosen_spanish: sale
  alternatives_spanish:
  - amanece
  - asoma
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el inglés opta por ‘rises’, en español la repetición de ‘sale’ para el movimiento del sol en este esquema paralelo resulta natural y preserva la estructura formular de la línea.
- source_word: በራብዕት ኆኅት
  english_pob_choice: in the fourth gate
  chosen_spanish: en la cuarta puerta
  alternatives_spanish:
  - por la cuarta puerta
  - junto a la cuarta puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ajuste revisado en el audit trail muestra la misma preposición espacial que en la cláusula anterior. ‘En la cuarta puerta’ reproduce esa simetría y evita una distinción artificial.
- source_word: ትእምርታቲሃ
  english_pob_choice: its signs
  chosen_spanish: sus señales
  alternatives_spanish:
  - sus signos
  - sus marcas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Señales’ comunica bien la idea de indicios observables o marcas del curso solar y funciona de manera natural en español sin perder el carácter técnico.
- source_word: ሠላሳ ወአሐዱ ጽባሕ
  english_pob_choice: thirty-one mornings
  chosen_spanish: treinta y una mañanas
  alternatives_spanish:
  - treinta y un días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva ‘mañanas’ porque el ge'ez dice literalmente eso, y el contexto astronómico-observacional del libro valora esa precisión.
theological_decisions:
- issue: Imaginería cosmológica de las ‘puertas’ celestiales
  english_pob_reading: Retain literal 'gate/gates' language
  chosen_spanish_reading: Conservar el lenguaje literal de ‘puerta/puertas’
  alternative_spanish_readings:
  - ventanas
  - aberturas
  rationale: El texto pertenece al Libro Astronómico y presenta el cosmos en claves visionarias. Mantener ‘puertas’ preserva esa arquitectura apocalíptica y evita modernizarla indebidamente.
  doctrine_reference: 'Contexto literario del Libro de Enoc: preservar la imaginería cósmica sin aplanarla.'
translation_notes:
  revision_awareness: 'Tomé en cuenta las revisiones auditadas del inglés: se mantuvo la simetría espacial de las dos cláusulas con ‘en la quinta puerta’ / ‘en la cuarta puerta’, y se reflejó el valor causal/relacional de በእንተ con ‘según’ para evitar una lectura de finalidad. También se respetó la observación de que la cláusula final no repite explícitamente ‘puerta’.'
  spanish_consistency_notes:
  - Se conserva el lenguaje cósmico literal de ‘puerta’ en todo el versículo.
  - ‘Oeste’ se mantiene como dirección geográfica uniforme; no se alterna con ‘occidente’ o ‘poniente’.
  - ‘Mañanas’ se conserva para reflejar el ge'ez literal y el marco astronómico del capítulo.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni vocabulario eclesiástico ajeno al pasaje.
