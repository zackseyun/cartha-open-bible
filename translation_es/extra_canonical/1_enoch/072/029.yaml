translation:
  language: es
  text: Y el sol vuelve y entra por la segunda puerta[a], que está en el oriente; y vuelve a ese curso principal por treinta mañanas, surgiendo y poniéndose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La frase de la puerta se entiende aquí según la revisión textual que corrige la lectura inglesa anterior: no es ‘la otra puerta’ en sentido indiferenciado, sino la segunda en la serie de puertas orientales.'
    reason: textual_variant
lexical_decisions:
- source_word: ገብአ
  english_pob_choice: returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - retorna
  - regresa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ajuste del audit trail corrige la lectura anterior que lo hacía ‘salir’ o ‘nacer’ y confirma el valor de movimiento de retorno. En español, ‘vuelve’ expresa ese retorno del sol de manera natural y fiel.
- source_word: ቦአ ውስተ
  english_pob_choice: enters
  chosen_spanish: entra
  alternatives_spanish:
  - ingresa
  - penetra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es la de una puerta/cauce de paso; ‘entra’ preserva la concreción espacial sin volver la frase artificiosa.
- source_word: ካልእ ኆኅት
  english_pob_choice: the second gate
  chosen_spanish: la segunda puerta
  alternatives_spanish:
  - la otra puerta
  - la puerta segunda
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto secuencial del capítulo pide un ordinal, no solo una oposición genérica. ‘Segunda’ sigue la revisión inglesa y encaja mejor que ‘otra’.
- source_word: እንተ በምሥራቅ
  english_pob_choice: which is in the east
  chosen_spanish: que está en el oriente
  alternatives_spanish:
  - que está en el este
  - que es en el oriente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Oriente’ conserva el registro bíblico y geográfico. Es una equivalencia natural para la ubicación del portal sin perder precisión.
- source_word: ይገብእ ዲበ
  english_pob_choice: it returns to
  chosen_spanish: vuelve a
  alternatives_spanish:
  - retorna a
  - regresa a
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión inglesa aclaró que el verbo debe entenderse como ‘return’; por eso en español se repite el movimiento de retorno para no suavizar la imagen astronómica.
- source_word: አርእስቲሁ
  english_pob_choice: that principal course
  chosen_spanish: ese curso principal
  alternatives_spanish:
  - ese trayecto principal
  - ese recorrido principal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Curso’ mantiene la noción de trayectoria/ciclo astronómico. ‘Principal’ traduce el valor de cabeza, jefatura o primacía del sustantivo etiópico sin introducir interpretaciones adicionales.
- source_word: ጸባሐ
  english_pob_choice: mornings
  chosen_spanish: mañanas
  alternatives_spanish:
  - albas
  - días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término apunta al tiempo de la mañana o alba; ‘mañanas’ es claro en español y mantiene la duración contada.
- source_word: ይሠርቅ
  english_pob_choice: rising
  chosen_spanish: saliendo
  alternatives_spanish:
  - amaneciendo
  - naciendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el verbo puede referirse al salir del sol, la versión inglesa lo conserva como participio junto con ‘setting’. En español, ‘saliendo’ evita la contradicción con ‘vuelve’ y preserva el par rítmico de movimiento solar.
- source_word: የዓርብ
  english_pob_choice: setting
  chosen_spanish: poniéndose
  alternatives_spanish:
  - ocultándose
  - menguando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Poniéndose’ es la forma idiomática para el ocaso del sol en español y conserva el paralelo con ‘saliendo’.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, que corrigió la lectura de ገብአ como ‘returns/vuelve’, de ካልእ como ‘second/segunda’ y de ይገብእ como ‘returns to/vuelve a’. También se evitó repetir el error anterior de ‘rises’ para ገብአ. El remate con ‘saliendo y poniéndose’ conserva el paralelismo astronómico final del verso.
  spanish_consistency_notes:
  - Se mantuvo ‘oriente’ para la ubicación espacial, coherente con el registro bíblico y con el resto del pasaje.
  - Se prefirió ‘curso principal’ en singular para reflejar la trayectoria central del sol, no una descripción genérica.
  - Se evitó ‘puerta otra’ o ‘otra puerta’ porque la secuencia numérica del contexto exige ‘segunda’.
