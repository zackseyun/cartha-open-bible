base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/072/029.yaml
  text: And the sun returns and enters the second gate[a], which is in the east; and it returns to that principal course for thirty mornings[c][b], rising and setting.
  footnotes:
  - marker: a
    text: The clause rendered 'upon this one it goes in for thirty mornings' is textually awkward in the OCR witness. The sense appears to be that the sun uses this eastern gate for a period of thirty mornings before the sequence advances.
    reason: textual_variant
  - marker: b
    text: Literally the opening verb can mean 'enters' or 'comes in'; because the subject is the sun and the verse ends with 'rising and setting,' the main text uses the idiomatic English 'rises' at the start of the verse.
    reason: lexical_alternative
  - marker: c
    text: Or 'And the sun rises and enters the other gate, the one in the east; and upon this one it goes in for thirty mornings'.
    reason: previous_rendering
