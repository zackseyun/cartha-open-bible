translation:
  language: es
  text: Y en aquel día la noche disminuye en una novena parte[a] de su longitud, es decir, una parte, y la noche llega a ser once partes[b], y el día, siete partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto ge'ez es difícil en este punto, y hubo incertidumbre de lectura en la frase numeral. El sentido es que la noche se reduce en una novena parte de su longitud, es decir, en una parte.
    reason: textual_variant
  - marker: b
    text: 'O: «Y en aquel día la noche disminuye de su longitud en una parte de nueve, y la noche llega a ser once partes, y el día, siete partes».'
    reason: previous_rendering
lexical_decisions:
- source_word: ኀፀፀት
  english_pob_choice: decreases
  chosen_spanish: disminuye
  alternatives_spanish:
  - decrece
  - se reduce
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa disminución o acortamiento; en el contexto astronómico, «disminuye» conserva la idea de reducción medible sin sonar arcaico.
- source_word: ሌሊት
  english_pob_choice: night
  chosen_spanish: noche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el equivalente directo y natural en español para el período de oscuridad que se mide en partes.
- source_word: እምኑኃ
