  rationale: 'La revisión inglesa corrigió la lectura anterior: el ge''ez indica «desde su longitud». «Longitud» conserva el valor espacial/medible de la expresión astronómica.'
- source_word: ታስዕተ
  english_pob_choice: a ninth part
  chosen_spanish: una novena parte
  alternatives_spanish:
  - una novena
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma ordinal-fractionaria se expresa mejor en español como «una novena parte», que es clara y fiel a la partición técnica del texto.
- source_word: እደ
  english_pob_choice: by
  chosen_spanish: en
  alternatives_spanish:
  - por
  - a razón de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, con «disminuye» la construcción más natural es «disminuye en una novena parte», que preserva el valor instrumental/medida del ge'ez.
- source_word: ክፍለ አሐደ
  english_pob_choice: one part
  chosen_spanish: una parte
  alternatives_spanish:
  - una división
  - un segmento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Parte» mantiene el esquema técnico de particiones del Libro Astronómico y evita modernizarlo con unidades horarias.
- source_word: ወኮነት
  english_pob_choice: and ... becomes
  chosen_spanish: y ... llega a ser
  alternatives_spanish:
  - y ... se vuelve
  - y ... queda en
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma resultativa se vierte con una perífrasis verbal natural en español, indicando el estado alcanzado después de la disminución.
- source_word: ፲ወ፪ተ ወአሐደ ክፍለ
  english_pob_choice: eleven parts
  chosen_spanish: once partes
  alternatives_spanish:
  - once porciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor numérico resulta ser once partes; «once partes» conserva el lenguaje técnico de la partición astronómica.
- source_word: መዓልት
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - el día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Término estándar y directo para el contrapunto de «noche» en la fórmula de repartición del tiempo.
- source_word: ሰብዓተ ክፍለ
  english_pob_choice: seven parts
  chosen_spanish: siete partes
  alternatives_spanish:
  - siete porciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la división numérica literal del día en siete partes, siguiendo el esquema técnico del texto.
theological_decisions:
- issue: Mantener el lenguaje técnico de partición astronómica
  english_pob_reading: Keep the technical 'parts' terminology rather than smoothing into hours or proportions.
  chosen_spanish_reading: Conservar «partes» en vez de convertirlo en horas o medidas modernas.
  alternative_spanish_readings:
  - horas
  - segmentos de tiempo
  - porciones
  rationale: La sección pertenece al Libro Astronómico de 1 Enoc y describe una cosmología esquemática. «Partes» preserva la terminología interna del pasaje sin introducir cronología moderna.
  doctrine_reference: Translation philosophy §Original-language primacy; §Readable modern Spanish, not archaic or academic
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que corrige la lectura anterior de «from nine» a «from its length» y conserva la precisión de «a ninth part, that is, one part». La versión española sigue esa lectura revisada y mantiene la terminología técnica de «partes».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponde al Tetragrámaton; en este versículo no aparece.
  - Se mantiene «partes» para la partición astronómica, evitando equivalencias modernas como «horas».
  - Se optó por «disminuye de su longitud en una novena parte» para reflejar la corrección textual señalada por la auditoría inglesa.
