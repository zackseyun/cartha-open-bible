translation:
  language: es
  text: Porque él es poderoso en todas las cosas ocultas[a] de la justicia, y la iniquidad pasará como sombra y no tendrá permanencia[b]; porque el Elegido[c] está de pie delante del Señor de los Espíritus[d], y su gloria es para siempre jamás, y su poder de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativamente: «secretos de la justicia» o «realidades ocultas de la justicia». El ge''ez puede referirse a cosas o dimensiones ocultas pertenecientes a la justicia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no tendrá continuancia». La expresión niega duración o permanencia a la iniquidad.'
    reason: lexical_alternative
  - marker: c
    text: «El Elegido» es un título recurrente en las Parábolas para la figura exaltada vinculada con el juicio y la vindicación.
    reason: cross_reference
  - marker: d
    text: 'O: «en la presencia del Señor de los Espíritus». La expresión conserva la imaginería cortesana de estar delante de él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ኃያል
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - poderoso
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo expresa fuerza/poder en registro elevado. En español, «poderoso» mantiene la dignidad apocalíptica sin sonar rígido o insuficiente como «fuerte».
- source_word: ኅቡአተ
  english_pob_choice: hidden things
  chosen_spanish: secretos
  alternatives_spanish:
  - cosas ocultas
  - misterios
  - cosas escondidas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El plural concreto pide una forma plural natural. «Secretos» conserva la idea de realidades ocultas sin forzar un tecnicismo más fuerte que el ge'ez.
- source_word: ጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí se trata del polo opuesto a la impiedad/lawlessness. «Justicia» comunica bien el campo moral y judicial; «rectitud» queda como alternativa posible, pero menos directa en este contexto.
- source_word: ዓመፃ
  english_pob_choice: lawlessness
  chosen_spanish: impiedad
  alternatives_spanish:
  - anarquía moral
  - iniquidad
  - ilegalidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La antítesis con justicia exige una palabra amplia para maldad rebelde. «Impiedad» funciona en español bíblico para la oposición a Dios y evita reducir el término solo a falta de ley civil.
- source_word: ጽላሎት
  english_pob_choice: shadow
  chosen_spanish: sombra
  alternatives_spanish:
  - sombra
  - sombra pasajera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La imagen es simple y concreta. «Sombra» reproduce el símil de algo sin consistencia duradera.
- source_word: የኃልፍ
  english_pob_choice: will pass away
  chosen_spanish: pasará
  alternatives_spanish:
  - desaparecerá
  - se irá
  - pasará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El futuro comunica el movimiento del símil sin sobredeterminarlo. El verbo solo ya expresa la caducidad en español.
- source_word: ምቅዋመ አልቦ
  english_pob_choice: have no permanence
  chosen_spanish: no tendrá permanencia
  alternatives_spanish:
  - no tendrá permanencia
  - no permanecerá
  - no tendrá continuidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión niega duración/estabilidad. «No tendrá permanencia» recoge mejor la revisión inglesa más reciente y mantiene la fuerza de la negación.
- source_word: ኅሩይ
  english_pob_choice: Chosen One
  chosen_spanish: el Elegido
  alternatives_spanish:
  - el Elegido
  - el Escogido
  - el Elegido de Dios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En 1 Enoc funciona como título. «El Elegido» preserva el carácter titular sin imponer una formulación cristológica posterior; evita también un calco demasiado técnico como «el Escogido».
- source_word: ቆመ
  english_pob_choice: stands
  chosen_spanish: está en pie
  alternatives_spanish:
  - está en pie
  - permanece de pie
  - está de pie
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La forma verbal ge''ez es estativa: describe una posición presente. «Está en pie» comunica la presencia estable delante de Dios y evita el matiz de acción completada que tendría «ha estado de pie».'
- source_word: በቅድመ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Delante de» mantiene la imagen espacial y judicial del verso; «en presencia de» es una alternativa válida, pero menos directa.
- source_word: እግዚአ መናፍስት
  english_pob_choice: Lord of Spirits
  chosen_spanish: Señor de los Espíritus
  alternatives_spanish:
  - Señor de los Espíritus
  - Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título en su forma establecida en 1 Enoc. La mayúscula en «Espíritus» sigue el valor titular del epíteto divino.
- source_word: ስብሐቲሁ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su gloria
  - su esplendor
  - su honra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Gloria» encaja con el registro bíblico-apocalíptico y con la fórmula final de eternidad.
- source_word: ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: por siempre y para siempre
  alternatives_spanish:
  - por siempre y para siempre
  - por los siglos de los siglos
  - por la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula española reproduce el énfasis reiterativo del original con naturalidad y solemnidad.
- source_word: ኃይሉ
  english_pob_choice: his power
  chosen_spanish: su poder
  alternatives_spanish:
  - su poder
  - su fuerza
  - su potencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Poder» mantiene el paralelismo con «gloria» y ofrece un equivalente amplio y digno.
- source_word: ለትውልደ ትውልድ
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - de generación en generación
  - por todas las generaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula idiomática española reproduce con precisión la repetición generacional del original.
theological_decisions:
- issue: Si ኅሩይ debe tratarse como título o como adjetivo descriptivo
  english_pob_reading: Rendered as the title 'the Chosen One'
  chosen_spanish_reading: «el Elegido» como título
  alternative_spanish_readings:
  - «el escogido» como adjetivo
  - «el Elegido» como título
  - «el Electo»
  rationale: En este pasaje enociano funciona como designación estable de una figura exaltada. Se capitaliza y se mantiene como título para no diluir su valor técnico ni proyectar fórmulas cristianas ajenas al texto.
  doctrine_reference: Conservar el sentido local del texto sin armonizarlo de más con uso cristológico posterior.
- issue: Cómo entender ቆመ delante del Señor de los Espíritus
  english_pob_reading: Rendered 'stands before the Lord of Spirits'
  chosen_spanish_reading: «está en pie delante del Señor de los Espíritus»
  alternative_spanish_readings:
  - «está en pie delante del Señor de los Espíritus»
  - «está delante del Señor de los Espíritus»
  - «ha estado en pie delante del Señor de los Espíritus»
  rationale: La forma verbal ge'ez es estativa, no meramente pasada. «Está en pie» conserva la presencia actual ante Dios y la solemnidad de la escena de corte.
  doctrine_reference: Respetar la gramática aspectual del ge'ez y la imaginería de presencia judicial/cortesana.
- issue: Sentido de ዓመፃ en contraste con ጽድቅ
  english_pob_reading: Rendered 'lawlessness'
  chosen_spanish_reading: «impiedad»
  alternative_spanish_readings:
  - «impiedad»
  - «iniquidad»
  - «anarquía moral»
  rationale: Aunque «lawlessness» resalta la ausencia de ley, en español «impiedad» expresa mejor la rebelión contra Dios que está en contraste directo con la justicia.
  doctrine_reference: Mantener la polaridad moral y teológica del verso sin reducirlo a un marco meramente jurídico.
translation_notes:
  revision_awareness: La redacción sigue el audit trail inglés y toma en cuenta la revisión reciente que prefirió una lectura estativa para ቆመ (‘stands’). En español se optó por «está en pie», que conserva esa estatividad. También se reflejó la revisión de ምቅዋመ አልቦ con «no tendrá permanencia», en vez de una fórmula más literal de ‘estar de pie’.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; aquí el título es «Señor de los Espíritus», por tratarse del epíteto fijo en 1 Enoc.
  - Se preserva «el Elegido» como título en mayúscula para respetar el valor técnico enociano.
  - «Espíritus» se capitaliza por formar parte del título divino fijo.
  - La cadencia final reproduce el paralelismo de gloria/poder y la fórmula temporal de generaciones.
