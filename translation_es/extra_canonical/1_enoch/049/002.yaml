  - severity: low
    issue: '''está en pie'' en lugar de ''está de pie'''
    rationale: Ambas son válidas, pero 'está de pie' es más natural en español general y comunica igual de bien el valor estativo de ቆመ.
  - severity: low
    issue: Fórmula 'por siempre y para siempre'
    rationale: No es infiel, pero 'para siempre jamás' suele sonar más fluido y solemne en español bíblico moderno para una fórmula enfática de eternidad.
  - severity: medium
