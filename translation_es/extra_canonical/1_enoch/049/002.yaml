    text: Or 'hidden matters of righteousness.' The Ge'ez phrase may refer to concealed dimensions or secrets belonging to righteousness.
    reason: lexical_alternative
  - marker: b
    text: Or 'will have no continuance.' The expression literally denies standing or abiding to lawlessness.
    reason: lexical_alternative
  - marker: c
    text: '''Chosen One'' is a recurring title in the Parables for the exalted figure associated with judgment and vindication.'
    reason: cross_reference
  - marker: d
    text: Or 'has stood'.
    reason: previous_rendering
