- from: Porque él es poderoso en todos los secretos[a] de la justicia, y la impiedad pasará como sombra y no tendrá permanencia[b]; porque el Elegido[c] está en pie[d] delante del Señor de los Espíritus, y su gloria es por siempre y para siempre, y su poder de generación en generación.
  to: Porque él es poderoso en todas las cosas ocultas[a] de la justicia, y la iniquidad pasará como sombra y no tendrá permanencia[b]; porque el Elegido[c] está de pie delante del Señor de los Espíritus[d], y su gloria es para siempre jamás, y su poder de generación en generación.
  rationale: Se ajusta ዓመፃ a «iniquidad» para mantenerse más cerca de la decisión auditada 'lawlessness' sin forzar un calco poco idiomático; se cambia «secretos» por «cosas ocultas» para reflejar mejor el plural concreto de ኅቡአተ; se mejora la naturalidad con «está de pie»; y se pule la fórmula final a «para siempre jamás». También se rehacen las notas para que reflejen estas decisiones y se elimine la nota previa sobre «ha estado en pie», ya superada por la adjudicación que fijó el sentido presente estativo.
