  language: en
  yaml_path: translation/extra_canonical/1_enoch/049/002.yaml
  text: For he is mighty in all the hidden things of righteousness[a], and lawlessness will pass away like a shadow and have no permanence; for the Chosen One stands before the Lord of Spirits, and his glory is forever and ever[d][c][b], and his power from generation to generation.
  footnotes:
