  source_alignment_summary: 'El borrador español refleja bien la evidencia fuente y la pista de auditoría inglesa: conserva correctamente «en él» para ቦቱ, el valor durativo/presente de የኃድር con «mora», la serie repetida de «espíritu», el matiz verbal de ዘያሌቡ con «que da entendimiento», y la imagen apocalíptica de «los que duermen en justicia». No resuelve indebidamente la tensión del último sintagma.'
