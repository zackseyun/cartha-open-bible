translation:
  language: es
  text: Y en él mora el espíritu de sabiduría[a], y el espíritu que da entendimiento[b], y el espíritu de instrucción y poder[c], y el espíritu de los que duermen en justicia[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habita en él». El verbo ge'ez puede expresar permanencia o residencia continua.
    reason: lexical_alternative
  - marker: b
    text: O «el espíritu de entendimiento». La expresión puede describir al espíritu por su efecto o como una cualidad de entendimiento.
    reason: lexical_alternative
  - marker: c
    text: O «fuerza». «Poder» conserva mejor el tono elevado de la enumeración.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «los que duermen en justicia»; probablemente una referencia apocalíptica a los justos muertos, aunque también puede entenderse como «los que reposan en justicia».
    reason: alternative_reading
lexical_decisions:
- source_word: የኃድር
  english_pob_choice: dwells
  chosen_spanish: mora
  alternatives_spanish:
  - habita
  - reside
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperfecto ge'ez expresa una realidad continua o vigente; en español, «mora» conserva la idea de permanencia sin convertirla en un pasado. «Habita» es posible, pero «mora» suena más natural en registro bíblico y mantiene el matiz de residencia estable.
- source_word: መንፈሰ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - viento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En esta lista de dones o cualidades, el sentido personal/carismático es el adecuado. «Espíritu» conserva el alcance teológico y la elevación del pasaje.
- source_word: ጥበብ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - conocimiento
  - habilidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término remite a sabiduría en sentido moral e intelectual; «sabiduría» es la equivalencia directa y más clara en español.
- source_word: ዘያሌቡ
  english_pob_choice: that gives understanding
  chosen_spanish: que da entendimiento
  alternatives_spanish:
  - de entendimiento
  - que hace entender
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma verbal sugiere efecto o impartición, no solo una cualidad estática. «Que da entendimiento» preserva esa fuerza verbal mejor que una frase nominal.
- source_word: ትምህርት
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - enseñanza
  - disciplina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Instrucción» funciona bien en una serie de dones espirituales y evita cargar el término con una nuance pedagógica más amplia de la necesaria.
- source_word: ኃይል
  english_pob_choice: might
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - fortaleza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque «might» puede ser «poder», en español «poder» suena más natural dentro de la enumeración y mantiene el registro elevado. Se conserva la amplitud de capacidad/energía/autoridad sin reducirla a fuerza física.
- source_word: እለ ኖሙ በጽድቅ
  english_pob_choice: those who sleep in righteousness
  chosen_spanish: los que duermen en justicia
  alternatives_spanish:
  - los que reposan en justicia
  - los que han dormido en justicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Dormir» conserva la imagen apocalíptica y la tensión interpretativa del original. «Justicia» mantiene el término de rectitud/covenantalidad sin suavizarlo a una expresión más devocional.
theological_decisions:
- issue: 'Sentido del último grupo: ¿los justos vivos o los muertos justos?'
  english_pob_reading: The line refers to a spirit associated with the righteous who have fallen asleep, likely the righteous dead rather than merely the living righteous at rest.
  chosen_spanish_reading: La frase se mantiene como una alusión probable a los justos que han muerto, sin resolver la imagen en una paráfrasis más explícita.
  alternative_spanish_readings:
  - el espíritu de los que reposan en justicia
  - el espíritu perteneciente a los justos
  rationale: El verbo de dormir/reposar en uso apocalíptico normalmente evoca a los muertos, pero el texto no lo desarrolla de forma explícita. «Los que duermen en justicia» preserva la tensión y deja abierta la referencia, como hace la lectura inglesa auditada.
  doctrine_reference: Preservar la tensión teológica y apocalíptica del pasaje; no expandir más allá de lo que el texto sostiene.
translation_notes:
  revision_awareness: La revisión reciente corrigió la lectura gramatical de የኃድር como presente continuo («dwells») y de ቦቱ como «en él», no «sobre él». Por eso el español usa una forma presente de permanencia («mora») y evita una preposición que sugiera ubicación superior o contacto externo. También se ha mantenido la serie de dones espirituales sin resolver la última frase en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantiene «espíritu» en toda la serie para reflejar la repetición del ge'ez.
  - Se usa «justicia» para በጽድቅ, manteniendo la conexión con rectitud/covenantalidad y evitando un giro demasiado devocional como «rectitud» si sonara menos natural en serie.
  - La puntuación en serie con comas reproduce la acumulación del original y del audit trail inglés.
  - Se evita «SEÑOR» o sustitución similar porque el pasaje no contiene aquí el Tetragrámaton ni un caso de κύριος aludido.
