translation:
  language: es
  text: Porque la sabiduría ha sido derramada como agua[c], y la gloria no llegará a su fin[b] delante de él[a] para siempre jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre 'él' queda sin especificar en el ge'ez aquí; el contexto más amplio puede apuntar a una figura exaltada mencionada antes, pero este versículo no nombra al referente.
    reason: alternative_reading
  - marker: b
    text: 'O: ''la gloria no faltará delante de él''.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''será derramada''. El ge''ez usa un perfecto, por lo que el texto principal refleja mejor una acción ya realizada o un estado establecido.'
    reason: previous_rendering
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduce la relación explicativa con naturalidad en español. 'Porque' conserva la fuerza causal/expositiva del ge'ez sin volver la línea artificial.
- source_word: ጥበብ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - prudencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido básico y más seguro es 'sabiduría'. Mantiene el tono sapiencial del versículo sin estrechar indebidamente el término.
- source_word: ክዕወ
  english_pob_choice: has been poured out
  chosen_spanish: ha sido derramada
  alternatives_spanish:
  - ha sido vertida
  - se derrama
  - ha sido desbordada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo perfecto ge'ez indica una acción cumplida o estado establecido; por eso se refleja como perfecto en español. 'Derramada' conserva la imagen de abundancia y evita convertir el aspecto en futuro.
- source_word: ከመ ማይ
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - cual agua
  - igual que agua
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La comparación es directa y debe permanecer literal para preservar la imaginería de efusión.
- source_word: ወስብሐት
  english_pob_choice: and glory
  chosen_spanish: y la gloria
  alternatives_spanish:
  - y el esplendor
  - y la alabanza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Gloria'' es la opción más natural y fiel en este registro elevado. Se conserva la posible amplitud semántica, pero sin desplazar el valor principal hacia ''alabanza''.'
- source_word: ኢትኃልቅ
  english_pob_choice: will not fail
  chosen_spanish: no dejará de estar
  alternatives_spanish:
  - no llegará a su fin
  - no cesará
  - no se agotará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo negado expresa no cesar, no acabarse ni agotarse. 'No dejará de estar' permite un español fluido y mantiene la idea de permanencia continua.
- source_word: ቅድሜሁ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  - frente a él
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición indica localización relacional directa. 'Delante de él' conserva la referencia abierta sin especificar el antecedente del pronombre.
- source_word: ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: para siempre jamás
  alternatives_spanish:
  - por los siglos de los siglos
  - por siempre jamás
  - por la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Equivale a la fórmula enfática de duración eterna. 'Para siempre jamás' mantiene la intensificación del original y su registro solemne.
theological_decisions:
- issue: Referente de 'él' en 'delante de él'
  english_pob_reading: Retain the pronoun as 'him' without specifying the antecedent in the main text.
  chosen_spanish_reading: Mantener el pronombre 'él' sin identificar su antecedente en el texto principal.
  alternative_spanish_readings:
  - delante del Señor de los Espíritus
  - delante del Elegido
  - delante del Hijo del Hombre
  rationale: El ge'ez sólo ofrece un pronombre, y el contexto inmediato no fija de manera segura el referente. Preservar la ambigüedad evita resolver por anticipado una tensión teológica y respeta el auditable original.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El audit trail inglés registró una revisión importante: la primera formulación ''will be poured out'' fue corregida a ''has been poured out'' por el valor perfecto del ge''ez ክዕወ. La versión española adopta ese ajuste aspecto-temporal y conserva la ambigüedad del pronombre final, alineándose con la confirmación posterior de que no se requerían cambios adicionales.'
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' para ጥበብ, evitando variantes como 'entendimiento' salvo contexto explícito.
  - '''Gloria'' conserva el término POB preferente sin sustituirlo por ''esplendor'' o ''alabanza''.'
  - El verbo principal se traduce en perfecto compuesto ('ha sido derramada') para respetar el valor aspectual del ge'ez.
  - La frase final usa 'para siempre jamás' como equivalente solemne de la fórmula enfática eterna.
  - No se explicita el antecedente de 'él' en el cuerpo del texto, preservando la tensión interpretativa del original.
