translation:
  language: es
  text: Y él juzgará las cosas ocultas, y nadie podrá hablar una palabra vacía[a] delante de él, porque él es el Elegido[b] delante del Señor de los Espíritus[c], conforme a lo que él ha querido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La línea ge'ez es textual y semánticamente difícil en este testimonio. La cláusula traducida «nadie podrá hablar una palabra vacía delante de él» también puede entenderse como «nadie podrá pronunciar falsedad delante de él».
    reason: textual_variant
  - marker: b
    text: Título apocalíptico. «Elegido» conserva el carácter titular sin importar una formulación cristológica posterior; otra posibilidad es «Escogido».
    reason: theological_note
  - marker: c
    text: 'O: «Y en él mora el espíritu de sabiduría, y el espíritu que da entendimiento, y el espíritu de comprensión y de poder, y el espíritu de los que se durmieron en justicia». Esta fue una renderización previa asociada al versículo en otra tradición de división o transmisión.'
    reason: previous_rendering
lexical_decisions:
- source_word: ይኴንን
  english_pob_choice: he will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - juzga
  - discernirá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico apunta a acción judicial, no solo a percepción. «Juzgará» conserva el valor forense y el tono escatológico del pasaje.
- source_word: ዘኅቡአተ
  english_pob_choice: the hidden things
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - los secretos
  - lo oculto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma plural apocalíptica se rinde mejor como «las cosas ocultas» para evitar una reducción demasiado abstracta y mantener la referencia a realidades escondidas.
- source_word: ወነገረ
  english_pob_choice: and he will declare
  chosen_spanish: y hablará
  alternatives_spanish:
  - y declarará
  - y hará conocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el glosado inglés usa «declare», aquí el contexto inmediato se centra en la imposibilidad de hablar delante de él. «Hablará» mantiene la relación verbal sin forzar una repetición innecesaria en español.
- source_word: በከ፡ አልቦ፡ ዘይክል፡ ብሂለ፡ በቅድሜሁ
  english_pob_choice: for there is none able to speak an empty word before him
  chosen_spanish: nadie podrá hablar una palabra vacía delante de él
  alternatives_spanish:
  - nadie podrá pronunciar vanidad delante de él
  - nadie podrá hablar falsedad en su presencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es textual y semánticamente difícil. «Palabra vacía» conserva la literalidad del etiópico y permite incluir tanto el matiz de vanidad como el de falsedad sin decidir de manera excesiva entre ambos.
- source_word: ኅሩይ
  english_pob_choice: the Chosen One
  chosen_spanish: el Escogido
  alternatives_spanish:
  - el Elegido
  - el Elegido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene el valor titular sin introducir terminología cristológica posterior. «Escogido» comunica el título con naturalidad en español y conserva la fuerza pasiva del participio.
- source_word: እግዚአ፡ መናፍስት
  english_pob_choice: the Lord of Spirits
  chosen_spanish: el Señor de los Espíritus
  alternatives_spanish:
  - el Señor de los espíritus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el título apocalíptico establecido. La mayúscula en «Espíritus» refleja el nombre/título divino del pasaje y evita una lectura meramente genérica.
- source_word: በከመ፡ ውእቱ፡ ፈቀደ
  english_pob_choice: according as he has willed
  chosen_spanish: conforme a lo que él ha querido
  alternatives_spanish:
  - según lo que él ha querido
  - como él ha querido
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción expresa voluntad soberana. «Conforme a lo que él ha querido» conserva el orden causal/formal sin sonar rígido en español.
theological_decisions:
- issue: Título escatológico ኅሩይ
  english_pob_reading: the Chosen One
  chosen_spanish_reading: el Escogido
  alternative_spanish_readings:
  - el Elegido
  - el Escogido
  rationale: El texto funciona como designación titulada dentro de 1 Enoc. Se evita traducirlo con fórmulas cristológicas posteriores o con minúsculas genéricas que diluyan su carácter titular.
  doctrine_reference: Conservar títulos apocalípticos locales sin armonizarlos con fórmulas posteriores; distinguir título de adjetivo ordinario.
- issue: Naturaleza de la imposibilidad de hablar delante de él
  english_pob_reading: no one will be able to speak an empty word before him
  chosen_spanish_reading: nadie podrá hablar una palabra vacía delante de él
  alternative_spanish_readings:
  - nadie podrá hablar falsedad en su presencia
  - nadie podrá pronunciar vanidad delante de él
  rationale: El etiópico puede abarcar vacío, vanidad o falsedad. La traducción mantiene la tensión sin resolverla de forma excesiva, como hace el aparato inglés.
  doctrine_reference: Preservar ambigüedad textual cuando el testimonio fuente es difícil y el audit trail la documenta.
translation_notes:
  revision_awareness: 'La base inglesa revisada corrige una duplicación errónea de 49:3 y sigue ahora el ge''ez de 49:4: juicio de las cosas ocultas, imposibilidad de hablar palabra vacía delante de él, y el título del Chosen One delante del Señor de los Espíritus. La versión española refleja esa corrección y evita toda dependencia del texto inglés pre-revisión.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo/árameo subyacente lo exija; aquí el título correspondiente es «Señor de los Espíritus», por lo que no se introduce «Yahvé».
  - Se mantiene «Espíritus» con mayúscula por tratarse del título divino fijo del libro.
  - Se conserva el registro solemne y apocalíptico, evitando reformular el verso como prosa explicativa.
