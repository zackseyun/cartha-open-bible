base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/049/004.yaml
  text: And he will judge the hidden things[a], and no one will be able to speak an empty word before him, for he is the Chosen One before the Lord of Spirits[c][b], according as he has willed.
  footnotes:
  - marker: a
    text: The Ge'ez line is textually difficult in this witness. The clause rendered 'there is none able to speak an empty word before him' may also be understood as 'none can utter falsehood before him.'
    reason: textual_variant
  - marker: b
    text: The OCR witness supplied appears closer to the sense traditionally associated with 49:4 about judging hidden things and exposing vain speech than to some later English verse divisions. The translation follows the Ge'ez wording as given.
    reason: alternative_reading
  - marker: c
    text: Or 'And in him dwells the spirit of wisdom, and the spirit that gives insight, and the spirit of understanding and of might, and the spirit of those who have fallen asleep in righteousness.'.
