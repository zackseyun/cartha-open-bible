translation:
  language: es
  text: Y la luna alterará su orden[a], y no aparecerá en su tiempo[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su curso». El término ge'ez puede expresar el patrón u orden fijo de la luna.
    reason: lexical_alternative
  - marker: b
    text: O «no se verá en su tiempo». La frase puede señalar simplemente el momento debido de visibilidad, no una cita calendárica técnica.
    reason: lexical_alternative
  - marker: c
    text: La repetición de la idea de tiempo conserva el paralelismo del texto y su insistencia en la alteración del ciclo normal.
    reason: translation_note
lexical_decisions:
- source_word: ወርኅ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna
  - el mes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de los luminarios del Libro Astronómico, el sentido de ወርኅ es claramente el astro lunar y no el calendario de un mes. En español, «la luna» conserva ese referente celeste de forma natural.
- source_word: ይዌልጥ
  english_pob_choice: will alter
  chosen_spanish: alterará
  alternatives_spanish:
  - cambiará
  - se volverá diferente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa cambio o alteración. «Alterará» conserva el matiz de desviación respecto de un patrón fijo sin añadir causa ni explicación.
- source_word: ሥርዓቶ
  english_pob_choice: its order
  chosen_spanish: su orden
  alternatives_spanish:
  - su curso
  - su reglamento
  - su disposición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico, el término remite al patrón ordenado o dispuesto de la luna. «Su orden» mantiene la fuerza del texto y la tensión teológica sobre el orden cósmico.
- source_word: ወኢይትረአይ
  english_pob_choice: and it will not appear
  chosen_spanish: y no aparecerá
  alternatives_spanish:
  - y no se verá
  - y no será visible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea central es la visibilidad del cuerpo celeste. «Aparecerá» es una forma natural en español para un astro y preserva el sentido concreto de manifestación visual.
- source_word: በዘመኑ
  english_pob_choice: in its season
  chosen_spanish: en su temporada
  alternatives_spanish:
  - en su tiempo
  - en su estación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión reciente del audit trail favorece una traducción consistente de la frase como «en su temporada» / «en su tiempo», sin introducir la palabra «apuntado» o «designado». «Temporada» comunica el carácter cíclico y regular del contexto astronómico.
- source_word: ዚአሁ
  english_pob_choice: its
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  - su propio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pronombre retoma la luna o su tiempo de aparición. En español, el posesivo simple «su» es la solución más idiomática y fiel.
theological_decisions:
- issue: Cómo reflejar la tensión entre fenómeno astronómico y orden cósmico establecido
  english_pob_reading: 'The wording preserves both: the moon alters ''its order'' and fails to appear ''in its season.'''
  chosen_spanish_reading: La luna altera su orden y no aparece en su temporada.
  alternative_spanish_readings:
  - La luna cambia solo de fase.
  - La luna altera su curso y no aparece en su tiempo.
  rationale: La redacción conserva tanto la alteración del patrón como la falta de aparición en el tiempo propio, sin resolver la tensión hacia una explicación técnica o doctrinal que el versículo no da.
  doctrine_reference: Preservar la tensión teológica sin suavizarla.
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión de coherencia para በዘመኑ፡ ዚአሁ, favoreciendo 'in its season' frente a 'at its appointed time'. Por eso el español evita 'apuntado' o 'designado' y mantiene una formulación natural que respeta la repetición y el ritmo del verso.
  spanish_consistency_notes:
  - Se mantuvo «luna» y no «mes» por el contexto de luminarios.
  - Se conservó un término de orden/patrón («orden») para reflejar ሥርዓቶ sin banalizarlo.
  - «Temporada» se usa de manera consistente con el valor cíclico y no agrícola del pasaje.
  - No se introdujo terminología eclesiástica ajena al texto.
