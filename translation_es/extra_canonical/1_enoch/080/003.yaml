    rationale: Aunque semánticamente comprensible, en español natural el fruto o la cosecha normalmente «se retrasa» más que «es retrasado». La forma actual suena calcada y resta fluidez.
  - severity: medium
    issue: «temporada» debilita el matiz de tiempo debido
    rationale: El ge'ez apunta al tiempo/sezón señalado u oportuno. «Temporada» no es imposible, pero «tiempo» o «debido tiempo» encaja mejor con el registro bíblico y con la idea de orden temporal alterado.
  - severity: low
