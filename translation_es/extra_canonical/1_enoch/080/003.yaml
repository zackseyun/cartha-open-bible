translation:
  language: es
  text: Y en aquellos tiempos el fruto de la tierra se retrasará[a], y no brotará en su tiempo; y el fruto de los árboles será retenido[b] en su tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegará tarde». El ge''ez enfatiza la demora con respecto al tiempo oportuno.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «será impedido» o «será obstaculizado», con el sentido de que el fruto esperado queda retenido en el momento debido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አዝማን
  english_pob_choice: times
  chosen_spanish: tiempos
  alternatives_spanish:
  - días
  - épocas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término plural señala un marco temporal amplio; «tiempos» conserva ese alcance apocalíptico sin limitarlo a días concretos ni a estaciones agrícolas.
- source_word: ፍሬ፡ ምድር
  english_pob_choice: the fruit of the earth
  chosen_spanish: el fruto de la tierra
  alternatives_spanish:
  - el producto de la tierra
  - la cosecha de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Fruto de la tierra» mantiene la imagen concreta y el registro agrícola-cósmico del pasaje mejor que un equivalente más económico o genérico.
- source_word: ደሓራዊ
  english_pob_choice: will be delayed
  chosen_spanish: será retrasado
  alternatives_spanish:
  - llegará tarde
  - será demorado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea es que el fruto no llega a su tiempo debido. «Será retrasado» conserva la noción de demora impuesta por circunstancias externas, y evita suavizarla en exceso.
- source_word: ወኢይበቍል
  english_pob_choice: and it will not sprout
  chosen_spanish: y no brotará
  alternatives_spanish:
  - y no germinará
  - y no echará brotes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo apunta a salir o brotar; «brotará» es natural en español y preserva la imagen de crecimiento esperado que no aparece.
- source_word: በዘመኑ
  english_pob_choice: in its season
  chosen_spanish: en su temporada
  alternatives_spanish:
  - en su tiempo
  - a su debido tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En contexto agrícola, «temporada» comunica bien la referencia al momento apropiado de fruto y cosecha.
- source_word: ፍሬ፡ ዕፅ
  english_pob_choice: the fruit of the trees
  chosen_spanish: el fruto de los árboles
  alternatives_spanish:
  - el fruto de las plantas
  - el fruto del bosque
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Árboles» es la equivalencia idiomática más clara para ዕፅ en este contexto agrícola.
- source_word: ይትከላእ
  english_pob_choice: will be withheld
  chosen_spanish: será retenido
  alternatives_spanish:
  - será contenido
  - será impedido
  - será retenido de aparecer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva expresa que el fruto queda detenido o retenido; «retenido» transmite esa idea con naturalidad en español.
- source_word: በዘመኑ፡ ዚአሁ
  english_pob_choice: in its season
  chosen_spanish: en su temporada
  alternatives_spanish:
  - en su propio tiempo
  - en el tiempo que le corresponde
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El posesivo singular del ge'ez se refleja en «su». Mantengo «temporada» para paralelismo con la primera mitad del verso y por su tono agrícola.
theological_decisions:
- issue: Imagen de juicio cósmico-agricícola
  english_pob_reading: 'The verse describes cosmic-agricultural disorder as a sign of judgment: normal fertility and timing fail.'
  chosen_spanish_reading: 'El verso describe un desorden agrícola-cósmico como señal de juicio: la fertilidad normal y el tiempo debido fracasan.'
  alternative_spanish_readings:
  - Solo describe malas cosechas naturales.
  - Es una metáfora moral general sin fuerza agrícola literal.
  rationale: En el contexto de 1 Enoc, la alteración de tiempos y frutos funciona como señal apocalíptica concreta. La traducción mantiene la imagen literal sin convertirla en una abstracción moral.
  doctrine_reference: Preservar la imaginería apocalíptica; no aplanar el lenguaje cósmico en prosa genérica.
translation_notes:
  revision_awareness: 'La base inglesa pasó por ajustes menores: primero se prefirió «delayed» sobre «late», y luego se simplificó «its own season» a «its season». La versión española sigue esa decisión general de naturalidad formal, pero conserva la fuerza de demora y el paralelo agrícola del verso, reflejando también que el ge''ez usa un posesivo singular enfático en la clausula final.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre «fruto de la tierra» y «fruto de los árboles».
  - Se usa un único campo semántico agrícola («brotará», «temporada», «retenido») para reflejar la unidad del verso.
  - El posesivo singular «su» en ambas cláusulas evita perder la referencia al momento debido de cada fruto.
  - Se evita «SEÑOR» u otra terminología de sustitución porque el verso no contiene el nombre divino.
