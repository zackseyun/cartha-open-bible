revisions:
- from: Y en aquellos tiempos el fruto de la tierra será retrasado[a], y no brotará en su temporada; y el fruto de los árboles será retenido[b] en su temporada.
  to: Y en aquellos tiempos el fruto de la tierra se retrasará[a], y no brotará en su tiempo; y el fruto de los árboles será retenido[b] en su tiempo.
  rationale: La revisión conserva el sentido del original y del POB inglés, pero mejora la naturalidad y dignidad del español. «Se retrasará» expresa mejor la demora del fruto que «será retrasado», y «en su tiempo» refleja con más precisión el marco calendárico-apocalíptico del ge'ez que «en su temporada». No hace falta adjudicación adicional porque el ajuste es estilístico y léxico, no doctrinal ni textualmente incierto.
