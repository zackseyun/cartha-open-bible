  language: en
  yaml_path: translation/extra_canonical/1_enoch/080/001.yaml
  text: And in those days Uriel the angel answered me and said to me[a], “Behold, I have shown you everything, Enoch, and I have revealed everything to you, that you may see this sun and this moon and those who lead the stars of heaven[c][b], and all those who make them turn—their works and their times and their risings.”
  footnotes:
  - marker: a
    text: Or 'guide' the stars of heaven. The wording presents the stars as directed by personal agents, not merely by impersonal laws.
    reason: lexical_alternative
  - marker: b
    text: The final term may refer more specifically to the heavenly bodies' goings out, transitions, or courses; 'departures' is a transparent rendering of the motion imagery.
    reason: lexical_alternative
  - marker: c
    text: Or 'and their departures'.
    reason: previous_rendering
