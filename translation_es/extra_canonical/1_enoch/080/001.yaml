translation:
  language: es
  text: 'Y en aquellos días el ángel Uriel me respondió y me dijo: «Mira, te he mostrado[a] todo, Enoc, y te lo he revelado todo, para que veas este sol y esta luna y a los que guían[b] las estrellas del cielo, y a todos los que las hacen girar: sus obras, sus tiempos y sus apariciones[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «te he hecho ver».
    reason: lexical_alternative
  - marker: b
    text: O «dirigen»; el texto conserva la idea de agentes personales, no solo de leyes impersonales.
    reason: lexical_alternative
  - marker: c
    text: El término final se refiere al movimiento o manifestación de los astros; también puede traducirse «salidas», y algunos lo entienden más específicamente como sus entradas o su puesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: አውሥአኒ
  english_pob_choice: answered me
  chosen_spanish: me respondió
  alternatives_spanish:
  - me contestó
  - me habló
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa respuesta en un intercambio discursivo; en español, «me respondió» conserva ese matiz mejor que un simple «me habló».
- source_word: ነዋ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Mira bien
  - He aquí
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una partícula de llamada de atención. «Mira» mantiene la inmediatez y resulta natural en español contemporáneo sin perder el tono solemne.
- source_word: አርአይኩከ
  english_pob_choice: I have shown you
  chosen_spanish: te he mostrado
  alternatives_spanish:
  - te he hecho ver
  - te mostré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma es causativa/visual y expresa una acción ya completada con efecto presente; el perfecto español refleja bien esa divulgación consumada.
- source_word: ከሠትኩ ለከ
  english_pob_choice: I have revealed ... to you
  chosen_spanish: te lo he revelado todo
  alternatives_spanish:
  - te lo he dado a conocer todo
  - te lo he manifestado todo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido es de descubrimiento apocalíptico, no de explicación pedagógica. «Revelado» preserva el registro de desvelamiento celestial.
- source_word: ትርአዮ
  english_pob_choice: that you may see / look upon
  chosen_spanish: para que veas
  alternatives_spanish:
  - para que contemples
  - para que observes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La finalidad se expresa con naturalidad en español con «para que veas», sin añadir intensidad no garantizada por el texto.
- source_word: ይመርኅዎሙ
  english_pob_choice: lead
  chosen_spanish: guían
  alternatives_spanish:
  - dirigen
  - conducen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El POB inglés conserva la idea de agentes personales; «guían» preserva ese matiz personal y evita reducirlo a mecanismos impersonales.
- source_word: ከዋክብተ ሰማይ
  english_pob_choice: the stars of heaven
  chosen_spanish: las estrellas del cielo
  alternatives_spanish:
  - las estrellas del firmamento
  - las estrellas del cielo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Del cielo» reproduce de modo claro y bíblico el genitivo del original ge'ez sin volverlo artificial.
- source_word: ይመይጥዎሙ
  english_pob_choice: turn them
  chosen_spanish: las hacen girar
  alternatives_spanish:
  - las ponen en movimiento
  - las hacen revolver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma tiene valor causativo y expresa movimiento continuo. «Las hacen girar» es fiel, claro y evita interpretar mecánicamente la cosmología.
- source_word: ግብሮሙ
  english_pob_choice: their works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus funciones
  - sus actividades
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto astronómico puede aludir a funciones u operaciones; «obras» preserva el campo semántico amplio que el POB inglés retuvo.
- source_word: አዝማኖሙ
  english_pob_choice: their times
  chosen_spanish: sus tiempos
  alternatives_spanish:
  - sus estaciones
  - sus momentos señalados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tiempos» es la opción más directa y mantiene el paralelismo del texto sin sobreinterpretar a «estaciones».
- source_word: ሙባኢሆሙ
  english_pob_choice: their departures / settings
  chosen_spanish: sus salidas
  alternatives_spanish:
  - sus entradas
  - sus puestas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La discusión textual señala tensión entre «salidas» y el matiz astronómico de «entradas/puestas». «Salidas» traduce con transparencia el nombre del movimiento, y la nota recoge la alternativa interpretativa del marco astronómico.
theological_decisions:
- issue: Agentes personales que guían y hacen girar los astros
  english_pob_reading: Render the clauses personally ('those who lead... all those who turn them') rather than impersonal astronomical forces.
  chosen_spanish_reading: 'Conservar la estructura personal: «a los que guían las estrellas del cielo, y a todos los que las hacen girar»'
  alternative_spanish_readings:
  - las leyes que las gobiernan
  - los movimientos de las estrellas
  rationale: El ge'ez usa construcciones personales; mantener ese rasgo preserva la cosmología apocalíptica del pasaje y evita convertirla en lenguaje astronómico moderno e impersonal.
  doctrine_reference: Mantener la imaginería apocalíptica sin despersonalizar el orden cósmico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión inglés: el pasaje pasó de «departures» a una solución astronómica más precisa para el término final. En español se optó por una redacción pública y fluida («salidas») sin borrar la tensión textual, y se preservó el lenguaje personal para los agentes cósmicos. También se siguió la revisión que mantiene la acción causativa de «hacer girar» y la estructura de revelación completa.'
  spanish_consistency_notes:
  - Se usa «ángel Uriel» de forma concordante con el nombre propio y el orden natural del español.
  - Se conserva «Enoch» como forma usual de nombre propio en esta sección del POB español; si el proyecto exige «Enoc», puede ajustarse de manera uniforme en todo el corpus.
  - Se evita «SEÑOR» u otras sustituciones no motivadas, porque el texto no contiene aquí el Tetragrámaton.
  - La puntuación mantiene el discurso directo solemnemente legible para lectura litúrgica o de estudio.
