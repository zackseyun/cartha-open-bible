translation:
  language: es
  text: Y en los días de los pecadores los años serán acortados, y su semilla[a] será retrasada en su tierra y en sus campos; y todas las obras sobre la tierra cambiarán y no aparecerán en sus tiempos, y la lluvia será retenida, y el cielo retendrá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «descendencia» o «semilla/producto agrícola»; el contexto deja la expresión deliberadamente abierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: መዋዕለ
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - tiempos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la fórmula apocalíptica «en los días de...», natural en español y fiel al valor temporal básico del término.
- source_word: ኃጥኣን
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - los impíos
  - los malvados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva el registro moral y judicial del original; «pecadores» es transparente y corresponde bien al sustantivo.
- source_word: ክረማት
  english_pob_choice: years
  chosen_spanish: años
  alternatives_spanish:
  - estaciones
  - ciclos anuales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto cósmico-agropecuario favorece el ciclo anual; «años» es la equivalencia más directa y natural.
- source_word: የኀጽሩ
  english_pob_choice: shall be shortened
  chosen_spanish: serán acortados
  alternatives_spanish:
  - serán disminuidos
  - se reducirán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Acortados» conserva la imagen de tiempo truncado sin reinterpretarla como mera reducción abstracta.
- source_word: ዘርአ ዚአሆሙ
  english_pob_choice: their seed
  chosen_spanish: su semilla[a]
  alternatives_spanish:
  - su descendencia
  - su prole
  - su simiente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Semilla» preserva la ambigüedad documentada entre descendencia humana y semilla/produce agrícola, tal como el contexto de tierra, campos y lluvia lo sugiere.
- source_word: ዳኃራዊ
  english_pob_choice: late / delayed
  chosen_spanish: retrasada
  alternatives_spanish:
  - tardía
  - demorada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «retrasada» expresa con claridad la idea de demora o postergación que el inglés POB decidió mantener.
- source_word: ምድረሙ
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su suelo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Tierra» es natural en paralelo con «campos» y evita una traducción demasiado técnica o moderna.
- source_word: ወፍሮሙ
  english_pob_choice: their fields
  chosen_spanish: sus campos
  alternatives_spanish:
  - sus terrenos cultivados
  - sus parcelas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Campos» refleja el ámbito agrícola de manera clara y sobria.
- source_word: ኵሉ ግብር ዘዲበ ምድር
  english_pob_choice: all the works on the earth
  chosen_spanish: todas las obras sobre la tierra
  alternatives_spanish:
  - todas las obras que hay sobre la tierra
  - todo lo que se hace sobre la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Obras» conserva el enlace léxico con el ámbito de acciones/operaciones terrestres; «sobre la tierra» sigue de cerca la construcción sin sobreexplicar.
- source_word: ይትመየጥ
  english_pob_choice: shall change
  chosen_spanish: cambiarán
  alternatives_spanish:
  - serán alteradas
  - se trastornarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo general «cambiarán» expresa la mutación cósmica y agrícola sin añadir un matiz más fuerte de alteración del que exige el texto.
- source_word: ኢያስተርኢ ለአዝማኖሙ
  english_pob_choice: shall not appear in their times
  chosen_spanish: no aparecerán en sus tiempos
  alternatives_spanish:
  - no se mostrarán en su tiempo
  - no se manifestarán en su estación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el plural «sus tiempos», ya indicado por la revisión del inglés POB, y la imagen de ausencia estacional del fenómeno esperado.
- source_word: ዝናም ይትከላእ
  english_pob_choice: the rain shall be withheld
  chosen_spanish: la lluvia será retenida
  alternatives_spanish:
  - la lluvia será contenida
  - la lluvia se detendrá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Retenida» mantiene la idea de impedimento impuesto sin personificar demasiado la lluvia.
- source_word: ሰማይ ታቀውም
  english_pob_choice: heaven shall withhold
  chosen_spanish: el cielo se contendrá
  alternatives_spanish:
  - el cielo se abstendrá
  - el cielo se retendrá
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se contendrá» busca reproducir la personificación del cielo que retiene/cesa su acción, sin convertir el giro en una explicación meteorológica.
theological_decisions:
- issue: Ambigüedad de «their seed» en un contexto de desorden agrícola y generacional
  english_pob_reading: Rendered as 'their seed' to preserve ambiguity between offspring and sown produce.
  chosen_spanish_reading: «Su semilla» conserva la misma ambigüedad entre descendencia y semilla/produce agrícola.
  alternative_spanish_readings:
  - «su descendencia»
  - «su simiente»
  - «su produce»
  rationale: El contexto de tierra, campos y lluvia favorece una lectura agrícola, pero el término puede también aludir a descendencia; mantener la ambigüedad evita resolver indebidamente la tensión léxica.
  doctrine_reference: Preservar la tensión léxica documentada; no imponer una interpretación única donde el texto admite más de una.
- issue: Relación entre lluvia, cielo y desorden cósmico
  english_pob_reading: 'The line depicts cosmic and agricultural disorder: what should appear in its proper season fails to do so.'
  chosen_spanish_reading: La formulación española mantiene la desarmonía cósmica y agrícola sin reducirla a mera meteorología.
  alternative_spanish_readings:
  - Interpretarlo solo como un fenómeno climático
  - explicarlo como falta de lluvia estacional
  rationale: El texto enlaza tiempo, tierra, campos, obras y cielo; conviene conservar ese marco amplio de desorden en vez de restringirlo a una observación climática.
  doctrine_reference: Lectura literaria y profética del pasaje; respetar la amplitud del juicio anunciado.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «all the works on the earth» y «their times»; por eso se traduce con plural explícito («todas las obras», «sus tiempos»). También se respetó la simplificación idiomática de la última pass y la consistencia del cierre con el verbo de retención para el cielo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conservó «semilla» para mantener la ambigüedad auditada por el POB inglés.
  - Se prefirió un español sobrio y bíblico, sin sustituir el lenguaje apocalíptico por paráfrasis explicativas.
