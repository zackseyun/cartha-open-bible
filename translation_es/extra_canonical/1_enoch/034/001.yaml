translation:
  language: es
  text: Y desde allí fui hacia el norte, a los confines[a] de la tierra, y allí vi una gran maravilla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los extremos de la tierra». «Confines» conserva mejor el tono apocalíptico del pasaje.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un gran prodigio». La lectura revisada del ge''ez apunta a una maravilla o prodigio, no a una idea de «reposo».'
    reason: textual_variant
lexical_decisions:
- source_word: እምህየ
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: Dillmann
  rationale: La expresión deíctica marca continuación del recorrido visionario. «Desde allí» conserva la referencia espacial y suena natural en español actual.
- source_word: ሖርኩ
  english_pob_choice: I went
  chosen_spanish: fui
  alternatives_spanish:
  - anduve
  - viajé
  lexicon: Dillmann
  rationale: El verbo expresa movimiento simple en pasado. «Fui» mantiene la sobriedad narrativa del texto sin añadir color literario innecesario.
- source_word: መንገለ መስዕ
  english_pob_choice: toward the north
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - rumbo al norte
  lexicon: Dillmann
  rationale: La revisión textual corrige la dirección a «norte». «Hacia el norte» preserva el valor direccional sin sugerir un destino más cerrado de lo que el ge'ez exige.
- source_word: በአጽናፈ ምድር
  english_pob_choice: to the ends of the earth
  chosen_spanish: a los confines de la tierra
  alternatives_spanish:
  - a los extremos de la tierra
  - a los límites de la tierra
  lexicon: Dillmann
  rationale: «Confines» reproduce el lenguaje cosmográfico/apocalíptico con un registro digno y claro. Mantiene la imagen de los bordes del mundo sin volverla prosaica.
- source_word: ርኢኩ
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - contemplé
  - vi con mis ojos
  lexicon: Dillmann
  rationale: Es el verbo habitual de reporte visionario. «Vi» es directo y fiel; no hace falta una forma más elevada como «contemplé».
- source_word: መንክረ ዐቢየ
  english_pob_choice: a great wonder
  chosen_spanish: una gran maravilla
  alternatives_spanish:
  - un gran prodigio
  - una gran asombro
  lexicon: Charles 1906 / reviewer correction
  rationale: La lectura revisada identifica መንክረ (mankəra) como «wonder, marvel». En español, «maravilla» comunica el carácter extraordinario sin perder el valor de asombro/maravilla del original.
theological_decisions:
- issue: Lectura de መንክረ ዐቢየ como maravilla/prodigio y no como lugar de reposo
  english_pob_reading: a great wonder
  chosen_spanish_reading: una gran maravilla
  alternative_spanish_readings:
  - un gran prodigio
  - una gran señal
  rationale: La revisión del texto fuente corrige la lectura errónea previa. Dado que el ge'ez apuntala una maravilla y no un lugar, conviene reflejar el asombro de la visión sin introducir una geografía de reposo que el verso no sostiene.
  doctrine_reference: Preservar la lectura revisada del texto y evitar añadir contenido no atestiguado.
- issue: Dirección cardinal corregida en la travesía visionaria
  english_pob_reading: toward the north
  chosen_spanish_reading: hacia el norte
  alternative_spanish_readings:
  - al norte
  - rumbo al norte
  rationale: La revisión textual indica que el cardinal correcto es el norte. La traducción debe seguir esa corrección para no invertir la orientación del recorrido profético.
  doctrine_reference: Fidelidad textual frente a error de transmisión/OCR.
translation_notes:
  revision_awareness: 'El expediente de revisión señala dos correcciones mayores: la dirección cardinal debe ser «norte» y la frase final no significa «lugar de reposo», sino «gran maravilla». La versión española sigue esas correcciones y abandona la lectura anterior errónea.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exija; en este versículo no aparece.
  - Se usa un registro sobrio y visionario, evitando arcaísmos innecesarios como «contemplé» o «prodigio» salvo como alternativa.
  - «Confines» conserva el valor cosmográfico apocalíptico mejor que opciones más modernas o geográficas.
