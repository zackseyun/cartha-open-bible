translation:
  language: es
  text: Y sana la tierra que los ángeles han corrompido[a], y da a conocer la restauración de la tierra, para que ellos sanen la tierra, y para que todos los hijos de los hombres no perezcan a causa de todos los secretos que los Vigilantes[b] han revelado[c] y enseñado a sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula «da a conocer la restauración de la tierra» es textualmente y sintácticamente difícil. El ge'ez también puede entenderse más literalmente como «da a conocer la vida/restauración de la tierra».
    reason: textual_variant
  - marker: b
    text: «Vigilantes» traduce el título técnico del libro para este grupo angelical; no se trata simplemente de un adjetivo descriptivo.
    reason: source_note
  - marker: c
    text: El ge'ez literalmente dice «mataron» (za-qatalu), reflejando una corrupción en la transmisión griega subyacente; la traducción principal sigue el sentido entendido de «revelaron».
    reason: textual_variant
lexical_decisions:
- source_word: አሕይዋ
  english_pob_choice: heal
  chosen_spanish: sana
  alternatives_spanish:
  - haz viva
  - restaura a la vida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo/jusivo se entiende en contexto como un mandato de restauración para la tierra dañada. 'Sana' conserva la imagen de reparación concreta y suena natural en español bíblico moderno.
- source_word: አማሰኑ
  english_pob_choice: have corrupted
  chosen_spanish: han corrompido
  alternatives_spanish:
  - han arruinado
  - han contaminado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Corrompido'' conserva tanto el daño moral como el daño cósmico del texto, sin restringirlo solo a una impureza ritual.'
- source_word: ሕይወታ
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - vida
  - restauración
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque la forma está emparentada con 'vida', el paralelismo inmediato con sanar/restaurar la tierra favorece un sustantivo que exprese remedio efectivo. 'Sanidad' mantiene el vínculo con el verbo 'sana'.
- source_word: አይድዕ ከመ
  english_pob_choice: make known ... so that
  chosen_spanish: da a conocer ... para que
  alternatives_spanish:
  - haz saber ... para que
  - que se conozca ... a fin de que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción introduce una divulgación con propósito. 'Da a conocer' conserva la fuerza causativa y se integra bien con la cláusula final de resultado.
- source_word: ይሕይዋ
  english_pob_choice: they may heal
  chosen_spanish: sanen la tierra
  alternatives_spanish:
  - la tierra sea sanada
  - puedan sanar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La sintaxis etiópica es difícil, pero el contexto trata del remedio de la tierra. 'Sanen la tierra' mantiene la finalidad práctica sin añadir la lectura del 'plaga' que no está en el base ge'ez.
- source_word: ኢይትሐጐሉ
  english_pob_choice: may not perish
  chosen_spanish: no perezcan
  alternatives_spanish:
  - no sean destruidos
  - no sean borrados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Perezcan'' es elevado, claro y adecuado al tono apocalíptico del pasaje.'
- source_word: በምሥጢር ኵሉ
  english_pob_choice: through all the secrets
  chosen_spanish: por todos los secretos
  alternatives_spanish:
  - a causa de todos los secretos
  - por todos los misterios
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Secretos'' conserva el registro de conocimiento oculto e ilícito del contexto de los Vigilantes. ''Por'' reproduce de forma natural el valor causal/instrumental de la construcción.'
- source_word: ትጉሃን
  english_pob_choice: the Watchers
  chosen_spanish: los Vigilantes
  alternatives_spanish:
  - los Vigilantes/los Observadores
  - los despiertos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En 1 Enoc el término es título técnico para el grupo angelical. 'Vigilantes' preserva el valor semántico del nombre y es suficientemente transparente en español; se evita 'ángeles vigilantes' para no redundar ni suavizar el título propio.
- source_word: መሀሩ ለውሉዶሙ
  english_pob_choice: taught to their sons
  chosen_spanish: han enseñado a sus hijos
  alternatives_spanish:
  - han instruido a sus hijos
  - han enseñado a su descendencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hijos'' mantiene la literalidad del parentesco del texto y no neutraliza el lenguaje familiar. ''Enseñado a sus hijos'' conserva el paralelismo con ''revelado'' y el carácter de transmisión ilícita.'
theological_decisions:
- issue: Restauración de la tierra frente a reformulación moral
  english_pob_reading: The verse speaks of actual healing/restoration of a corrupted earth, not merely moral reform of humanity.
  chosen_spanish_reading: El versículo habla de la sanidad/restauración real de una tierra corrompida, no solo de reforma moral de la humanidad.
  alternative_spanish_readings:
  - El texto se refiere principalmente a sanar la sociedad humana
  - La línea significa simplemente 'que la tierra viva'
  rationale: Las referencias repetidas a 'la tierra' como objeto directo, junto con el lenguaje de corrupción y remedio, exigen mantener una restauración cósmica concreta. No conviene diluirla en una lectura moral general.
  doctrine_reference: Preservar la imaginería apocalíptica y la restauración de la creación sin moralizar el texto.
- issue: Lectura de la cláusula sobre los secretos revelados
  english_pob_reading: The disclosed secrets are those revealed by the Watchers.
  chosen_spanish_reading: Los secretos son los que los Vigilantes revelaron y enseñaron.
  alternative_spanish_readings:
  - La frase podría aludir de manera general a conocimientos ocultos entre los humanos
  - Los secretos podrían entenderse solo como misterios divinos
  rationale: El contexto atribuye explícitamente la revelación y la enseñanza a los Vigilantes. La traducción debe mantener esa referencia directa y no generalizarla.
  doctrine_reference: Mantener los términos anclados localmente en el pasaje antes de armonizar con otras tradiciones.
translation_notes:
  revision_awareness: 'Tomé en cuenta las revisiones recientes que corrigieron el error de leer ''la plaga'' en el ge''ez: el base text dice ''la tierra'', así que la frase se mantiene como ''la tierra''. También preservé la nota necesaria sobre el literal ''mataron'' del ge''ez, porque el audit trail indica que la traducción principal debe seguir el sentido de ''revelaron'' pero sin borrar la tensión textual. La versión publicada conserva esa decisión en una nota breve y auditable.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en este proyecto por norma general, pero este versículo no lo contiene.
  - Se usa 'Vigilantes' como título técnico coherente con 1 Enoc, sin explicarlo dentro del cuerpo principal para no sobrecargar el verso.
  - '''Sanidad de la tierra'' preserva el paralelismo con ''sana la tierra'' y evita introducir ''plaga'', que no pertenece al ge''ez base.'
  - Se conserva el plural 'los hijos de los hombres' como equivalente natural de la expresión semítica del contexto, aunque aquí se simplifica a 'los hijos de los hombres' en estilo bíblico natural.
