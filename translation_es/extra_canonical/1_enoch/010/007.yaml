  language: en
  yaml_path: translation/extra_canonical/1_enoch/010/007.yaml
  text: And heal the earth which the angels have corrupted[a], and make known the healing of the earth, so that they may heal the earth, and all the children of men may not perish through all the secrets that the Watchers have disclosed^[The Ge'ez literally reads "killed" (za-qatalu), reflecting a corruption in the underlying Greek transmission (ἐπάταξαν for ὑπέδειξαν[e][d][c][b], "showed/disclosed").] and taught to their sons.
  footnotes:
  - marker: a
    text: The clause rendered 'make known the healing of the earth' is textually and syntactically difficult. The Ge'ez wording may also be understood more literally as 'make known the life/restoration of the earth.'
    reason: textual_variant
  - marker: b
    text: The phrase rendered 'they may heal the plague' is uncertain in the surviving Ethiopic wording. Some interpreters understand the line more generally as the earth being restored or made to live.
    reason: lexical_alternative
  - marker: c
    text: '''Secrets'' here refers to illicit hidden knowledge disclosed by the Watchers in this section, not necessarily to divine mysteries revealed legitimately.'
    reason: cultural_note
  - marker: d
    text: Or 'so that they may heal the plague'.
    reason: previous_rendering
  - marker: e
    text: Or 'disclosed'.
    reason: previous_rendering
