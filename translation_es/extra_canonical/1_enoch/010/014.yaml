    reason: textual_variant
  - marker: b
    text: '''Generaciones de generaciones'' conserva la repetición idiomática del original para expresar una larga sucesión de edades.'
    reason: lexical_alternative
  revision_rationale: Se corrigió la colocación de las notas para que cada una quede anclada en la frase pertinente, se suavizó 'juntamente' a 'junto con ellos' para mejor legibilidad, y se reemplazó 'consumación' por 'culminación' para reflejar mejor el valor de 'completion' sin sobrecarga teológica. También se simplificó el sistema de notas a las que realmente aportan información útil y fiel al historial auditado.
