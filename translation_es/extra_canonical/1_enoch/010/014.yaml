translation:
  language: es
  text: Y cuando él arde y perece[a], desde ahora serán atados junto con ellos hasta la culminación de las generaciones de generaciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La tradición textual etiópica de la primera cláusula fue discutida en etapas previas de revisión; la lectura auditada aquí entiende 'arde y perece', no 'se levanta' ni 'ellos y sus hijos se levantan'.
    reason: textual_variant
  - marker: b
    text: '''Generaciones de generaciones'' conserva la repetición idiomática del original para expresar una larga sucesión de edades.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሶበ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y al cuando
  - Y al tiempo que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conserva la relación temporal y el valor conjuntivo del original sin volverlo pesado en español.
- source_word: †ይውዒ፡†
  english_pob_choice: he burns
  chosen_spanish: él arde
  alternatives_spanish:
  - arde
  - se consume
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del texto etiópico indica claramente el sentido de 'arder', no 'levantarse'. En español, 'él arde' mantiene la referencia verbal directa y la imagen de juicio.
- source_word: ወይማስን
  english_pob_choice: and perishes
  chosen_spanish: y perece
  alternatives_spanish:
  - y se destruye
  - y muere
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Perece'' reproduce bien el valor de destrucción o desaparición final sin añadir una explicación interpretativa.'
- source_word: እምይእዜ
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - a partir de ahora
  - desde entonces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión marca inicio temporal inmediato y preserva el matiz de 'from now on' del audit trail inglés.
- source_word: ምስሌሆሙ
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  - con éstos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es la forma más natural y fiel para expresar asociación en el castigo.
- source_word: ኅቡረ
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - en conjunto
  - en común
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sostiene el matiz colectivo del encadenamiento sin sobreexplicar.
- source_word: ይትአሰሩ
  english_pob_choice: shall be bound
  chosen_spanish: serán atados
  alternatives_spanish:
  - serán encadenados
  - serán sujetos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Atados'' conserva la imagen verbal de restricción y castigo judicial. ''Encadenados'' sería una opción posible, pero introduce un detalle no explicitado aquí.'
- source_word: እስከ
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  - hasta el momento en que
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Equivale con naturalidad al límite temporal del texto.
- source_word: ተፍጻሜተ
  english_pob_choice: the completion
  chosen_spanish: la consumación
  alternatives_spanish:
  - el cumplimiento
  - la завершación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Consumación'' preserva un final fijado y solemne; mantiene el tono escatológico sin forzar terminología posterior.'
- source_word: ትውልደ፡ ትውልድ
  english_pob_choice: the generations of generations
  chosen_spanish: las generaciones de las generaciones
  alternatives_spanish:
  - de generación en generación
  - las generaciones sucesivas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la repetición idiomática del original, que expresa una sucesión prolongada de edades y no se debe aplanar en una fórmula más libre.
theological_decisions:
- issue: Duración del castigo y alcance temporal
  english_pob_reading: The verse speaks of collective binding extending through an appointed succession of generations, not necessarily an abstract timeless eternity.
  chosen_spanish_reading: El versículo habla de un atamiento colectivo que se extiende hasta la consumación de una sucesión de generaciones, sin convertirlo automáticamente en una noción abstracta de eternidad.
  alternative_spanish_readings:
  - atados para siempre
  - encarcelados hasta el juicio final
  rationale: La sintaxis etiópica combina un límite temporal ('hasta') con un idiomático pluralizado ('generaciones de generaciones'); la traducción española debe preservar esa tensión en vez de resolverla dogmáticamente.
  doctrine_reference: Preservar la tensión teológica del texto apocalíptico sin armonizarla prematuramente con categorías doctrinales posteriores.
translation_notes:
  revision_awareness: 'El borrador anterior hallucinaba un sujeto plural y una idea de ''levantarse'' en la primera cláusula. La revisión del audit trail corrige ese error: el texto etiópico leído aquí habla de ''arder y perecer''. También se actualizó la expresión temporal a ''desde ahora'' y se mantuvo el límite ''hasta la consumación de las generaciones de las generaciones''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - '''Atados'' se conserva por su fuerza judicial y su cercanía al inglés POB ''bound''.'
  - Se preserva la repetición 'las generaciones de las generaciones' para no diluir el énfasis idiomático del texto.
