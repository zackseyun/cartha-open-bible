revisions:
- from: Y cuando él arde y perece[a][b][c], desde ahora serán atados juntamente con ellos hasta la consumación de las generaciones de las generaciones.
  to: Y cuando él arde y perece[a], desde ahora serán atados junto con ellos hasta la culminación de las generaciones de generaciones[b].
  rationale: Se corrigió la colocación de las notas para que cada una quede anclada en la frase pertinente, se suavizó 'juntamente' a 'junto con ellos' para mejor legibilidad, y se reemplazó 'consumación' por 'culminación' para reflejar mejor el valor de 'completion' sin sobrecarga teológica. También se simplificó el sistema de notas a las que realmente aportan información útil y fiel al historial auditado.
