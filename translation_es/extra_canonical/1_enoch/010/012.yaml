  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del ge''ez y del POB inglés: preserva la destrucción mutua de los hijos, la visión de la destrucción de sus amados, la orden física de atarlos, el plazo de setenta generaciones, la localización subterránea y la fórmula enfática de juicio eterno. También conserva las alternativas léxicas documentadas en notas. La única debilidad relevante está en la naturalidad y precisión idiomática de algunas expresiones españolas.'
  spanish_quality_summary: En general es claro y fiel, con buen registro digno y legible. Sin embargo, 'debajo de las colinas de la tierra' suena menos natural que 'bajo las colinas de la tierra', y 'el juicio que es por toda la eternidad' resulta calcado y algo forzado en español. Una leve revisión mejora la legibilidad sin perder la tensión del original. Además, conviene reflejar en el texto la doble nota sobre 'consumación' y la fórmula de eternidad con el orden de marcadores del inglés auditado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones clave ('juicio', 'consumación', 'átenlos') se alinean con la racionalidad léxica documentada. 'Sus amados' es aceptable, aunque 'sus seres queridos' sería más idiomático; no exige cambio porque el POB prioriza el matiz afectivo elevado. La principal mejora necesaria es estilística, no glosarial.
  issues:
  - severity: medium
    issue: 'Expresión locativa algo rígida: ''debajo de las colinas de la tierra'''
    rationale: Aunque es comprensible, en español bíblico-natural 'bajo las colinas de la tierra' suena más fluido y conserva el mismo valor semántico. La nota ya cubre la alternativa 'montañas'.
  - severity: medium
    issue: 'Calco poco natural: ''el juicio que es por toda la eternidad'''
    rationale: La frase reproduce demasiado de cerca la estructura inglesa. 'El juicio que es para toda la eternidad' o 'el juicio para toda la eternidad' suena mejor en español y conserva la fuerza temporal. Dado que la nota explica la fórmula enfática, no hace falta mantener un giro tan literalista.
  - severity: low
    issue: Marcadores de notas en 'consumación' y la cláusula final no reflejan el orden auditado del inglés
    rationale: El inglés ancla [c][b] tras 'consummation' para cubrir tanto el matiz léxico como la explicación de la fórmula final. En español conviene anclar ambos en el mismo segmento final para mantener trazabilidad del audit trail.
  revised_spanish_text: Y cuando todos sus hijos se hayan matado unos a otros[a], y cuando hayan visto la destrucción de sus amados, átenlos por setenta generaciones bajo las colinas de la tierra, hasta el día de su juicio y de su consumación[c][b], hasta que se complete el juicio que es para toda la eternidad.
