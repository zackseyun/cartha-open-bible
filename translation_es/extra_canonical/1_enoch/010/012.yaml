translation:
  language: es
  text: Y cuando todos sus hijos se hayan matado unos a otros[a], y cuando hayan visto la destrucción de sus amados, átenlos por setenta generaciones bajo las colinas de la tierra, hasta el día de su juicio y de su consumación[c][b], hasta que se complete el juicio que es para toda la eternidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "bajo las montañas de la tierra". El término ge''ez admite "colinas" o "montañas".'
    reason: lexical_alternative
  - marker: b
    text: '"Consumación" también puede entenderse como "fin" o "cumplimiento final".'
    reason: lexical_alternative
  - marker: c
    text: La expresión final es una fórmula enfática de eternidad; literalmente, algo como "el juicio de la edad de la eternidad" o "de edades eternas".
    reason: lexical_alternative
lexical_decisions:
- source_word: ይትራገዙ
  english_pob_choice: have slain one another
  chosen_spanish: se hayan matado unos a otros
  alternatives_spanish:
  - luchen unos con otros
  - se hieran unos a otros
  - se destruyan unos a otros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es de violencia apocalíptica y destrucción mutua; en español, "se hayan matado unos a otros" conserva la reciprocidad y la gravedad del verbo, mejor que opciones más débiles como "luchen".
- source_word: ሐጕሎሙ
  english_pob_choice: the destruction of them
  chosen_spanish: la destrucción
  alternatives_spanish:
  - su ruina
  - su caída
  - su destrucción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo indica destrucción o ruina. En español, "la destrucción" mantiene la amplitud semántica sin añadir especificaciones que el término fuente no exige.
- source_word: ለፍቁራኒሆሙ
  english_pob_choice: their beloved ones
  chosen_spanish: sus amados
  alternatives_spanish:
  - los que amaban
  - sus seres queridos
  - sus amados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Amados" preserva el registro elevado y afectivo del original. "Sus seres queridos" sería natural, pero algo más explicativo y menos literal respecto del campo léxico del amor.'
- source_word: እሰሮሙ
  english_pob_choice: bind them
  chosen_spanish: átenlos
  alternatives_spanish:
  - enciérrenlos
  - aprísionenlos
  - confínenlos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La orden es concreta y física. "Átenlos" conserva la imagen de sujeción propia de la tradición apocalíptica y evita abstraer el mandato en "prisión".
- source_word: ለ፸ ትውልድ
  english_pob_choice: for seventy generations
  chosen_spanish: por setenta generaciones
  alternatives_spanish:
  - a través de setenta generaciones
  - durante setenta generaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Por setenta generaciones" es la correspondencia más directa y mantiene el valor simbólico y temporal de la fórmula.'
- source_word: በመትሕተ አውግርተ ምድር
  english_pob_choice: beneath the hills of the earth
  chosen_spanish: debajo de las colinas de la tierra
  alternatives_spanish:
  - bajo las colinas de la tierra
  - debajo de las montañas de la tierra
  - bajo los montes de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez permite "colinas" o "montañas". Se conserva "colinas" para seguir la lectura base del POB en inglés y reflejar con precisión la forma atestiguada aquí, sin forzar una equivalencia más grandiosa.
- source_word: ዕለተ ኵነኔሆሙ
  english_pob_choice: the day of their judgment
  chosen_spanish: el día de su juicio
  alternatives_spanish:
  - el día de su condena
  - el día de su sentencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Juicio" mantiene el registro judicial y apocalíptico. "Condena" estrecha demasiado el sentido, mientras que "sentencia" desplaza el foco del acto al veredicto.'
- source_word: ተፍጻሜቶሙ
  english_pob_choice: their consummation
  chosen_spanish: su consumación
  alternatives_spanish:
  - su fin
  - su final cumplimiento
  - su conclusión
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '"Consumación" conserva la tensión teológica del término: puede implicar fin, conclusión o cumplimiento final. Evita resolver prematuramente el matiz del original.'
- source_word: ኵነኔ ዘለዓለመ ዓለም
  english_pob_choice: the judgment that is for all eternity
  chosen_spanish: el juicio que es por toda la eternidad
  alternatives_spanish:
  - el juicio eterno
  - el juicio de la edad de la eternidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la fórmula enfática de eternidad sin reducirla a un adjetivo plano. "Por toda la eternidad" refleja mejor el eco semítico de "edad"/"siempre" que un simple "eterno".
theological_decisions:
- issue: Si el verso describe simple contienda o asesinato mutuo
  english_pob_reading: The sons have slain one another
  chosen_spanish_reading: los hijos se hayan matado unos a otros
  alternative_spanish_readings:
  - los hijos contiendan unos con otros
  - los hijos se hagan daño unos a otros
  rationale: El contexto inmediato de 1 Enoc 10 es un juicio severo y violento sobre la descendencia de los Vigilantes. Traducir con "se hayan matado" preserva la intensidad judicial y no rebaja la escena a mera disputa.
  doctrine_reference: Preservar la imaginería apocalíptica y la severidad del juicio.
- issue: Sentido de 'their consummation'
  english_pob_reading: A formal eschatological completion/end of the Watchers' judgment process
  chosen_spanish_reading: su consumación como cierre escatológico del juicio
  alternative_spanish_readings:
  - su final castigo
  - su destrucción
  - su término
  rationale: '"Consumación" mantiene abierta la tensión entre fin, cumplimiento y cierre judicial, sin decidir de antemano si el énfasis es aniquilación o culminación del proceso.'
  doctrine_reference: Preservar la tensión teológica en vez de resolverla demasiado pronto.
translation_notes:
  revision_awareness: Se siguió el pasaje ge'ez dado como texto base, con concordancia alta respecto del auditor inglés. No se aplicaron revisiones posteriores; se mantuvo la solución optimal-equivalence del POB en inglés, preservando la tensión entre juicio, consumación y eternidad.
  spanish_consistency_notes:
  - Se usó "juicio" para ኵነኔ y se evitó "condenación" como generalización excesiva.
  - Se mantuvo "consumación" para ተፍጻሜቶሙ para respetar su ambigüedad escatológica.
  - Se eligió "colinas" en el texto principal siguiendo la lectura base del POB, con nota sobre la variante "montañas".
  - Se evitó introducir terminología eclesiástica ajena al registro apocalíptico del pasaje.
