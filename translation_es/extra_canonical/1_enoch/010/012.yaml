base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/010/012.yaml
  text: And when all their sons have slain one another[a], and when they have seen the destruction of their beloved ones, bind them for seventy generations beneath the hills of the earth, until the day of their judgment and of their consummation[c][b], until the judgment that is for all eternity is completed.
  footnotes:
  - marker: a
    text: Or 'under the mountains of the earth.' The Ge'ez term can be rendered 'hills' or 'mountains.'
    reason: lexical_alternative
  - marker: b
    text: '''Their consummation'' may also be understood as ''their end'' or ''their final completion.'''
    reason: lexical_alternative
  - marker: c
    text: The closing phrase is an emphatic eternity formula, literally along the lines of 'the judgment of the age of eternity' or 'of eternal ages.'
    reason: lexical_alternative
