translation:
  language: es
  text: Y en aquellos días los llevarán al abismo de fuego[a], y al tormento y a la casa de confinamiento[b]; y allí serán encerrados para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge'ez es literalmente un lugar profundo o inferior relacionado con el fuego; puede entenderse también como 'profundidad de fuego' o 'abismo ígneo'.
    reason: lexical_alternative
  - marker: b
    text: La frase literal es 'casa de confinamiento' o 'casa de prisión', manteniendo la imagen concreta de encarcelamiento en la escena de juicio.
    reason: cultural_note
lexical_decisions:
- source_word: መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal apocalíptica se reproduce de forma natural en español con 'en aquellos días', conservando el tono esjatológico del original y del audit trail en inglés.
- source_word: ይወስድዎሙ
  english_pob_choice: they will lead them
  chosen_spanish: los llevarán
  alternatives_spanish:
  - los conducirán
  - los tomarán
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez puede expresar tomar o llevar; en este contexto judicial, 'los llevarán' mantiene la idea de traslado forzado sin sobreespecificar el agente, y funciona de manera más fluida en español que 'los conducirán'.
- source_word: መትሕተ እሳት
  english_pob_choice: the abyss of fire
  chosen_spanish: el abismo de fuego[a]
  alternatives_spanish:
  - la profundidad de fuego
  - el abismo ígneo
  - la hondura de fuego
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la imagen espacial y apocalíptica del 'lugar profundo/de abajo' asociado al fuego. 'Abismo de fuego' es la equivalencia más clara en español para no aplanar la metáfora ni imponer el rótulo doctrinal 'infierno'.
- source_word: በጻዕር
  english_pob_choice: into torment
  chosen_spanish: al tormento
  alternatives_spanish:
  - al sufrimiento
  - a la aflicción
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo denota aflicción dolorosa en un marco punitivo; 'tormento' conserva el peso judicial y la intensidad del texto.
- source_word: ቤት ሞቅሕ
  english_pob_choice: the prison-house
  chosen_spanish: la casa de prisión[b]
  alternatives_spanish:
  - la casa de confinamiento
  - la prisión
  - la casa de cautiverio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión literal es 'casa de confinamiento/prisión'. 'Casa de prisión' preserva la construcción concreta del original y deja visible la imagen arquitectónica sin sustituirla por un término más abstracto como 'prisión'.
- source_word: ይትዓፀዉ
  english_pob_choice: they will be shut up
  chosen_spanish: serán encerrados
  alternatives_spanish:
  - serán cerrados dentro
  - serán confinados
  - serán recluidos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sentido es el de quedar cerrados o confinados; 'serán encerrados' comunica bien la clausura final y suena natural en español, manteniendo la fuerza del cierre judicial.
- source_word: ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - para la era venidera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto de juicio, la expresión idiomática comunica duración interminable; 'para siempre' es la forma más directa y transparente en español.
theological_decisions:
- issue: Si traducir el lugar de castigo con un término doctrinal tradicional como 'infierno'
  english_pob_reading: the abyss of fire
  chosen_spanish_reading: el abismo de fuego
  alternative_spanish_readings:
  - el infierno
  - el lago de fuego
  - la gehena
  rationale: La formulación ge'ez es imagística y espacial, no un rótulo doctrinal posterior. Mantener 'abismo de fuego' conserva la tensión apocalíptica y evita importar una categoría teológica no explícita en el versículo.
  doctrine_reference: Prioridad del texto original sobre la tradición de traducción; preservación de la imaginería apocalíptica.
- issue: Cómo expresar la duración del encierro
  english_pob_reading: forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - por siempre
  - para la eternidad
  - por la era
  rationale: La expresión mantiene la fuerza absoluta del juicio final sin suavizarla ni resolver la tensión escatológica del texto.
  doctrine_reference: Preservación de la gravedad del juicio y de la duración indefinida/absoluta según el contexto.
translation_notes:
  revision_awareness: 'Coincide con el contenido del audit trail en inglés: la escena enumera el abismo de fuego, el tormento y la casa de prisión, y culmina con el encierro perpetuo. No se introdujeron cambios revisionales conocidos ni se atenuó la imaginería punitiva.'
  spanish_consistency_notes:
  - Se mantuvo 'abismo de fuego' para conservar la metáfora espacial y no doctrinalizar el término.
  - '''Casa de prisión'' sigue el paralelismo concreto con ''prison-house'' del audit trail inglés.'
  - '''Para siempre'' traduce la duración absoluta de ለዓለም de manera idiomática y consistente con el registro apocalíptico.'
