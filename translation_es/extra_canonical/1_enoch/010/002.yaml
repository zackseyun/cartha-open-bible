    rationale: La nota inglesa c preserva una traducción anterior completa de la oración, donde «And say to Noah, in my name...» metía erróneamente «and reveal to him» dentro del discurso directo. La nota española actual solo cita la cláusula del diluvio, perdiendo la información histórica relevante del audit trail.
