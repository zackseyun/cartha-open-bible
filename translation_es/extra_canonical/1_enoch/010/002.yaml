translation:
  language: es
  text: 'Ve a Noé y dile en mi nombre: «¡Escóndete!». Y hazle saber[a] el fin que está por venir; porque toda la tierra será destruida, y un diluvio de aguas[b] está por venir sobre toda la tierra, y destruirá todo lo que hay en ella.[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hazle conocer el fin que está por venir». El ge''ez permite un orden de palabras algo distinto sin cambiar el sentido.'
    reason: lexical_alternative
  - marker: b
    text: La expresión «diluvio de aguas» conserva el énfasis del ge'ez; no se reduce simplemente a «diluvio».
    reason: cultural_note
  - marker: c
    text: 'Traducción anterior: «Y di a Noé, en mi nombre: “¡Escóndete!, y hazle saber el fin que está por venir; porque toda la tierra será destruida, y un diluvio de aguas está por venir sobre toda la tierra, y destruirá todo lo que hay en ella”».

      '
    reason: previous_rendering
lexical_decisions:
- source_word: ሖር፡ ለኖኅ፡ ወ / Go to Noah
  english_pob_choice: Go to Noah
  chosen_spanish: Ve a Noé
  alternatives_spanish:
  - Vete hacia Noé
  - Anda a Noé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo inicial está presente en el texto ge'ez y no debe omitirse. «Ve a Noé» es natural en español y conserva el envío directo.
- source_word: በስመ፡ ዚአየ / in my name
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - en el nombre de mí
  - por mi autoridad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula expresa delegación de autoridad para el mensaje. «En mi nombre» es idiomática y fiel.
- source_word: ኅባእ፡ ርእሰከ / Hide yourself
  english_pob_choice: Hide yourself
  chosen_spanish: ¡Escóndete!
  alternatives_spanish:
  - ¡Ocúltate!
  - ¡Cúbrete!
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El mandato reflexivo pide retirarse o ponerse fuera de vista. «Escóndete» mantiene la urgencia y suena natural en español.
- source_word: አግህድ፡ ሎቱ / reveal to him
  english_pob_choice: reveal to him
  chosen_spanish: hazle saber
  alternatives_spanish:
  - revélaselo
  - dáselo a conocer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico, la acción es comunicar una realidad oculta o futura. «Hazle saber» comunica la idea de revelación sin confundir al destinatario de la orden, que es el mensajero, no Noé.
- source_word: ፍጻሜ ዘይመጽእ / the end that is coming
  english_pob_choice: the end that is coming
  chosen_spanish: el fin que está por venir
  alternatives_spanish:
  - el final que viene
  - el fin venidero
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «ፍጻሜ» puede ser fin, consumación o desenlace, pero aquí el contexto de juicio por diluvio favorece «fin». «Está por venir» conserva la inminencia.
- source_word: ይትኃጐል፡ ምድር፡ ኵሉ / the whole earth will be destroyed
  english_pob_choice: the whole earth will be destroyed
  chosen_spanish: toda la tierra será destruida
  alternatives_spanish:
  - toda la tierra perecerá
  - toda la tierra será arruinada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo tiene sentido destructivo fuerte; «será destruida» es directo y conserva la pasiva de juicio.
- source_word: ማየ፡ አይኅ / a flood of waters
  english_pob_choice: a flood of waters
  chosen_spanish: un diluvio de aguas
  alternatives_spanish:
  - un diluvio de agua
  - unas aguas del diluvio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es enfática y no conviene reducirla a un simple «diluvio». «Diluvio de aguas» conserva la duplicación semítica del término sin perder claridad.
- source_word: ሀሎ ዲበ ኵሉ ምድር / is about to come upon all the earth
  english_pob_choice: is about to come upon all the earth
  chosen_spanish: está por venir sobre toda la tierra
  alternatives_spanish:
  - va a venir sobre toda la tierra
  - está viniendo sobre toda la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción señala inminencia. «Está por venir» preserva ese valor mejor que un futuro simple.
- source_word: ያኀጕል ዘሀሎ ውስቴታ / it will destroy whatever is in it
  english_pob_choice: it will destroy whatever is in it
  chosen_spanish: destruirá todo lo que hay en ella
  alternatives_spanish:
  - destruirá lo que hay dentro de ella
  - acabará con todo lo que hay en ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El objeto es totalizante. «Todo lo que hay en ella» conserva el alcance universal sin añadir matices no explicitados.
theological_decisions:
- issue: Dirección de la orden «reveal to him»
  english_pob_reading: The command to reveal is addressed to the angel Uriel; 'to him' refers to Noah. The direct speech to Noah ends after 'Hide yourself!'
  chosen_spanish_reading: «Hazle saber» queda fuera de la cita dirigida a Noé y se entiende como instrucción al mensajero; la cita a Noé termina en «¡Escóndete!»
  alternative_spanish_readings:
  - «…Escóndete y hazle saber…»
  - «…Escóndete. Y revélale…»
  rationale: La revisión auditada corrige un error de encuadre discursivo. En español conviene separar claramente la orden dada al mensajero de las palabras dirigidas a Noé para no invertir los roles.
  doctrine_reference: Fidelidad al encuadre discursivo del texto fuente
- issue: Sentido de «el fin»
  english_pob_reading: Rendered as impending destructive end in relation to the flood judgment, not as an abstract eschatological consummation.
  chosen_spanish_reading: «el fin que está por venir» se entiende como fin inminente de juicio, ligado al diluvio, no como una consumación escatológica abstracta
  alternative_spanish_readings:
  - el fin consumado
  - la consumación venidera
  rationale: El contexto inmediato es el anuncio del diluvio sobre la tierra. La traducción conserva la gravedad apocalíptica sin importar categorías técnicas posteriores.
  doctrine_reference: Prioridad del contexto local sobre armonizaciones posteriores
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió dos puntos del borrador inglés: la inclusión del imperativo inicial «Go»/«Ve» y la separación sintáctica de «reveal to him», que no debe quedar dentro de la cita dirigida a Noé. También se atendió la revisión posterior que suavizó en inglés «a flood of waters» a «a flood», pero aquí se mantiene la expresión más enfática del ge''ez con una solución española natural y auditable.'
  spanish_consistency_notes:
  - Se usa «Noé» como nombre propio estándar en español.
  - Se mantiene «tierra» para ምድር con sentido global/cósmico, no solo el suelo local.
  - Se evita «SEÑOR» porque el pasaje no contiene el Tetragrámaton; la fórmula es «en mi nombre».
  - Se emplea «diluvio» para conservar la referencia clara al evento de inundación total, y se añade el complemento «de aguas» para reflejar la intensidad del original.
  - Se mantiene un registro sobrio y bíblico sin recurrir a arcaísmos innecesarios.
