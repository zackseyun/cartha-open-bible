translation:
  language: es
  text: Y destruye estos espíritus de los bastardos y a sus hijos[a], los opresores[b][c][d], porque han oprimido a la humanidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos ilegítimos». El término ge'ez es severo y probablemente alude a la descendencia mixta e ilícita producida por los Vigilantes.
    reason: lexical_alternative
  - marker: b
    text: O «han hecho violencia a la humanidad». El verbo puede tener un sentido más fuerte que un simple agravio moral.
    reason: lexical_alternative
  - marker: c
    text: O «destruye estos espíritus».
    reason: previous_rendering
  - marker: d
    text: O «han agraviado».
    reason: previous_rendering
lexical_decisions:
- source_word: አኅጕሎሙ
  english_pob_choice: destroy them
  chosen_spanish: destruye
  alternatives_spanish:
  - aniquila
  - hazlos desaparecer
  - arrástralos a su fin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo/jusivo de juicio divino se expresa con fuerza natural en español con «destruye», sin añadir matiz técnico de modo de destrucción.
- source_word: መናፍስተ
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - almas
  - seres espirituales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico se trata de entidades espirituales; «espíritus» conserva el valor no corporal del término sin simplificarlo a «almas».
- source_word: ተውኔት
  english_pob_choice: bastards
  chosen_spanish: bastardos
  alternatives_spanish:
  - hijos ilegítimos
  - engendros ilegítimos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la dureza polémica del término. «Bastardos» refleja la carga severa del original, aunque en español moderno pueda sonar insultante; por eso se acompaña con nota alternativa.
- source_word: ውሉዶሙ
  english_pob_choice: their children
  chosen_spanish: de sus hijos
  alternatives_spanish:
  - de su descendencia
  - de sus vástagos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El posesivo plural del ge'ez se refleja de forma directa y natural con «de sus hijos». La estructura conserva la relación con los «espíritus» mencionados antes.
- source_word: ትጉሃን
  english_pob_choice: the Watchers
  chosen_spanish: los opresores
  alternatives_spanish:
  - los Vigilantes
  - los vigilantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque la tradición enochiana conoce «los Vigilantes», el texto fuente y la revisión resaltan la cualidad descriptiva de los seres violentos en esta línea; por eso se incorpora «los opresores» como aposición interpretativa, sin perder la referencia a los agentes del castigo.
- source_word: ገፍዕዎሙ
  english_pob_choice: have oppressed
  chosen_spanish: han oprimido
  alternatives_spanish:
  - han hecho violencia a
  - han maltratado
  - han agraviado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual subraya que el verbo es más fuerte que «wronged». «Oprimido» conserva la violencia y la carga activa del verbo ge'ez.
- source_word: ሰብእ
  english_pob_choice: humankind
  chosen_spanish: la humanidad
  alternatives_spanish:
  - el género humano
  - la gente
  - las personas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se opta por un equivalente inclusivo y natural en español para el colectivo humano del texto.
theological_decisions:
- issue: Relación entre «espíritus» y «sus hijos» en la línea de juicio
  english_pob_reading: The verse is rendered as referring to the spirits of the illicit offspring, alongside the children of the Watchers.
  chosen_spanish_reading: 'El versículo queda como una designación compuesta: «los espíritus de los bastardos y de sus hijos», manteniendo juntos los elementos sin resolverlos por completo.'
  alternative_spanish_readings:
  - «los espíritus de los bastardos, es decir, sus hijos»
  - «los espíritus de los bastardos y, esto es, los hijos de los Vigilantes»
  rationale: El ge'ez presenta una tensión interpretativa real entre los «espíritus» y los «hijos»; la redacción española conserva esa ambigüedad controlada en lugar de armonizarla demasiado.
  doctrine_reference: Preservar la tensión teológica y textual sin sobreexplicarla.
- issue: Identidad de ትጉሃን en este versículo
  english_pob_reading: the Watchers
  chosen_spanish_reading: los opresores
  alternative_spanish_readings:
  - los Vigilantes
  - los vigilantes
  rationale: La revisión del archivo inglés señala una relectura del segmento como referencia a los seres violentos/opresores. En español se adopta esa lectura descriptiva para reflejar el sentido inmediato del juicio.
  doctrine_reference: Atender a la revisión textual más reciente sin borrar la tradición enochiana subyacente.
translation_notes:
  revision_awareness: Se incorporó la corrección de la revisión reciente que exige el demostrativo «estos» y la fuerza verbal «han oprimido». También se tuvo en cuenta la pass más reciente que reinterpreta el segmento final como «los opresores», por lo que la traducción española refleja esa lectura en aposición.
  spanish_consistency_notes:
  - Se conservó el tono de juicio y la dureza léxica del original.
  - Se evitó traducir mecánicamente desde el inglés cuando la revisión textual del ge'ez pedía mayor precisión.
  - La puntuación y la sintaxis buscan ser publicables en español bíblico moderno sin suavizar el contenido.
