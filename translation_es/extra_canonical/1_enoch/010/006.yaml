translation:
  language: es
  text: Y en el gran día del juicio será enviado fuera al fuego[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto es singular en el ge'ez («será enviado»), y remite a la figura mencionada en el contexto cercano.
    reason: cross_reference
  - marker: b
    text: «Gran día del juicio» es una fórmula apocalíptica fija; «juicio» también podría entenderse en un sentido más estrecho como «sentencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: በዕለት
  english_pob_choice: on the day
  chosen_spanish: en el día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La preposición temporal con ዕለት expresa el momento en que ocurre la acción. En español, «en el día» conserva la relación temporal sin forzar una glosa más interpretativa.
- source_word: ዓባይ
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - mismo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adjetivo intensifica el día del juicio con tono apocalíptico. «Gran» mantiene el registro elevado y natural en español.
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - condenación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí el sustantivo apunta al acto/escena judicial. «Juicio» preserva esa amplitud y permite la resonancia apocalíptica sin reducirlo solo al veredicto.
- source_word: ይትፈኖ
  english_pob_choice: he shall be sent away
  chosen_spanish: será enviado
  alternatives_spanish:
  - será apartado
  - será arrojado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma pasiva/imperfecta indica que alguien es remitido o consignado a un destino. «Será enviado» refleja ese movimiento sin añadir una imagen más fuerte de la que exige el ge'ez.
- source_word: ውስተ
  english_pob_choice: into
  chosen_spanish: al
  alternatives_spanish:
  - hacia el
  - dentro del
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con un verbo de envío, el español suele preferir «al» para expresar dirección hacia un lugar. En la frase completa, el sentido de ingreso al fuego queda claro y natural.
- source_word: ዋዕይ
  english_pob_choice: the fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El término designa fuego como destino punitivo. En español, «fuego» conserva la imagen apocalíptica concreta mejor que una abstracción como «castigo».
theological_decisions:
- issue: Conservar la imagen apocalíptica concreta o abstraerla a una noción general de castigo
  english_pob_reading: into the fire
  chosen_spanish_reading: al fuego
  alternative_spanish_readings:
  - al castigo
  - a la condena
  rationale: El ge'ez usa un sustantivo concreto de fuego. Mantener «al fuego» preserva la imaginería apocalíptica y evita aplanar la escena en un lenguaje más abstracto.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten judgment formulas.'
- issue: Alcance del sujeto verbal
  english_pob_reading: he shall be sent away
  chosen_spanish_reading: será enviado
  alternative_spanish_readings:
  - será enviado lejos
  - será arrojado
  rationale: La audit trail en inglés señala que el sujeto es singular y vuelve al personaje del contexto inmediato. El español mantiene la pasiva impersonal clara sin perder esa referencia singular.
  doctrine_reference: Cross-reference to surrounding context and singular verbal agreement in Ge'ez.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; el texto sigue el último pase de revisión, que quedó sin cambios y con acuerdo alto en la verificación cruzada.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé/Mesías» solo cuando corresponden por norma del proyecto; este versículo no los contiene.
  - Se prefirió «fuego» como imagen concreta, en coherencia con la política de no abstraer fórmulas apocalípticas.
  - Se usó «juicio» para ኵነኔ por amplitud semántica y naturalidad bíblica en español.
