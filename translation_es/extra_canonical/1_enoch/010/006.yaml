  source_alignment_summary: 'El borrador español transmite bien el sentido básico del ge''ez y sigue de cerca la auditoría inglesa: tiempo apocalíptico, sujeto singular, juicio y destino en el fuego. Sin embargo, «será enviado al fuego» debilita ligeramente el matiz de ይትፈኖ como «ser enviado lejos / apartado / consignado» que el inglés explicitó como ''sent away''.'
  spanish_quality_summary: El texto es claro y natural, pero puede mejorarse con una formulación más fiel y idiomática. «En el gran día del juicio» funciona bien en español bíblico moderno. La mejora principal es añadir «fuera» para reflejar mejor la idea de expulsión/alejamiento sin caer en «arrojado», que sería más fuerte que la evidencia fuente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Juicio» y «fuego» están bien elegidos. No hay nombres divinos ni términos doctrinales del glosario mayor implicados aquí.
  issues:
  - severity: medium
    issue: Pérdida parcial del matiz de alejamiento en ይትፈኖ
    rationale: La auditoría inglesa justifica 'he shall be sent away', no solo 'he shall be sent'. En español, «será enviado» puede sonar meramente direccional; «será enviado fuera al fuego» conserva mejor la idea de remoción/consignación sin sobretraducir.
  - severity: low
    issue: Ligera tensión entre la decisión léxica documentada («en el día») y el texto final («en el gran día»)
    rationale: No afecta el sentido, pero la documentación interna sería más coherente si reconociera que en español la construcción natural final es «en el gran día del juicio», no la forma más literal y menos idiomática «en el día».
