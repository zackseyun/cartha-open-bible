base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/010/004.yaml
  text: And again the Lord said to Raphael[a], “Bind Azazel by his hands and his feet, and cast him into the darkness; and open the desert that is in Dudael[b], and cast him there.”
  footnotes:
  - marker: a
    text: Dudael is left transliterated as a place-name. The verse presents it as a specific wilderness location associated with Azazel's confinement.
    reason: cultural_note
  - marker: b
    text: The command rendered 'split open the desert' is textually difficult; some interpreters understand a command to open or prepare a pit-like place in the wilderness. The Ge'ez here is kept as concretely as possible without adding details not explicit in the witness.
