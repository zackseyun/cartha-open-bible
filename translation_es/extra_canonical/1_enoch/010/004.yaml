translation:
  language: es
  text: 'Y de nuevo el Señor dijo a Rafael: «Ata a Azazel por sus manos y sus pies, y arrójalo a la oscuridad; y abre el desierto que está en Dudael[a], y arrójalo allí».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dudael se conserva como topónimo, no como descripción del lugar. El texto lo presenta como una ubicación concreta asociada con el encierro de Azazel.
    reason: cultural_note
  - marker: b
    text: La orden sobre el desierto es textualmente difícil. Algunos la entienden como «abrir» o preparar un lugar hundido en el desierto; aquí se mantiene la formulación más cercana al testimonio disponible sin añadir un «pozo» explícito.
    reason: textual_variant
lexical_decisions:
- source_word: ካዕበ
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La partícula introduce una repetición del habla; «de nuevo» conserva esa secuencia narrativa con naturalidad en español.
- source_word: እግዚእ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  - Señor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aquí funciona como título divino en una fórmula de habla. «El Señor» mantiene el registro elevado y corresponde al uso consagrado del giro, sin afectar la referencia al nombre divino en este contexto narrativo.
- source_word: እሰሮ
  english_pob_choice: bind
  chosen_spanish: Azael por sus manos y sus pies
  alternatives_spanish:
  - átalo
  - sujétalo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez expresa el mandato de atar de manera corporal y concreta. En español, la lectura más natural exige completar el verbo implícito con el objeto directo en la frase principal; la fórmula se conserva en el imperativo del contexto, mientras la puntuación refleja el mandato de sujeción física.
- source_word: በእዴሁ ወእግሩ
  english_pob_choice: by his hands and his feet
  chosen_spanish: por sus manos y sus pies
  alternatives_spanish:
  - de sus manos y de sus pies
  - con sus manos y sus pies
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión nombra ambas extremidades de modo explícito. «Por sus manos y sus pies» mantiene la concreción corporal del castigo.
- source_word: ወድዮ
  english_pob_choice: cast him
  chosen_spanish: arrójalo
  alternatives_spanish:
  - échalo
  - tíralo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperativo comunica expulsión violenta. «Arrójalo» conserva la fuerza física y el tono de juicio apocalíptico.
- source_word: ውስተ ጽልመት
  english_pob_choice: into the darkness
  chosen_spanish: a la oscuridad
  alternatives_spanish:
  - en la oscuridad
  - en las tinieblas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase indica un destino de oscuridad punitiva. En español, «a la oscuridad» expresa movimiento hacia ese ámbito sin forzar una imagen más específica que la fuente no explicita.
- source_word: አብቅዋ ለገዳም
  english_pob_choice: open the desert
  chosen_spanish: abre el desierto
  alternatives_spanish:
  - abre el yermo
  - abre la tierra del desierto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Sigo la revisión inglesa que prefirió «open» frente a una lectura más expansiva. «Abre el desierto» reproduce la dificultad textual sin añadir una precisión como «hoyo» o «pozo» que no está explicitada en este testimonio.
- source_word: እንተ ሀለወት በዱዳኤል
  english_pob_choice: that is in Dudael
  chosen_spanish: que está en Dudael
  alternatives_spanish:
  - que se halla en Dudael
  - que yace en Dudael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relativa localiza el desierto en un lugar propio. «Dudael» se conserva transliterado como topónimo, conforme a la decisión auditada en inglés.
- source_word: ህየ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El adverbio retoma el lugar recién mencionado. «Allí» es claro, breve y mantiene la referencia espacial del mandato final.
theological_decisions:
- issue: Naturaleza del castigo de Azazel
  english_pob_reading: A concrete act of binding and banishment into a dark desert prison
  chosen_spanish_reading: Un mandato físico de atar, arrojar a la oscuridad y desterrar a Azazel a un lugar desértico concreto
  alternative_spanish_readings:
  - Una condena general a prisión
  - Un envío simbólico a la tiniebla espiritual
  rationale: 'La sintaxis y el léxico del pasaje son corpóreos: manos, pies, oscuridad, desierto y el acto repetido de arrojar. La traducción española preserva esa violencia concreta y no la abstrae en un castigo meramente espiritual o figurado.'
  doctrine_reference: Conservar la imaginería apocalíptica y el carácter material del juicio en el texto
- issue: Tratamiento del topónimo Dudael
  english_pob_reading: Dudael is left transliterated as a place-name
  chosen_spanish_reading: Dudael se conserva como nombre propio de lugar
  alternative_spanish_readings:
  - traducirlo descriptivamente como un desierto
  - identificarlo con un pozo o foso
  rationale: El testimonio inglés mantiene el nombre propio sin traducir. En español conviene hacer lo mismo para no imponer una identificación geográfica o interpretativa que el texto no resuelve.
  doctrine_reference: Respetar los topónimos transmitidos por la tradición textual
- issue: Problema textual del verbo sobre el desierto
  english_pob_reading: The command rendered 'split open the desert' is textually difficult; some interpreters understand a command to open or prepare a pit-like place in the wilderness.
  chosen_spanish_reading: «abre el desierto» como traducción prudente de una orden textual difícil
  alternative_spanish_readings:
  - «abre un pozo en el desierto»
  - «abre la tierra del desierto»
  - «abre el yermo»
  rationale: La evidencia auditada señala dificultad textual; por eso la versión española evita resolverla con un elemento no explicitado. «Abre el desierto» conserva la dureza del mandato y deja visible la ambigüedad.
  doctrine_reference: No añadir detalles no asegurados por el testimonio base
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que cambió «split open the desert» por «open the desert», por lo que en español se optó por «abre el desierto» en vez de una versión más interpretativa. También se mantuvo la transliteración de Dudael y la imaginería física del castigo según el expediente auditado.
  spanish_consistency_notes:
  - Se conserva «Señor» para el título divino en la fórmula narrativa, acorde con el registro elevado del pasaje.
  - «Azael» sigue la forma usual en español para el nombre propio del ángel caído en esta tradición textual.
  - No se introdujo «Cristo», «SEÑOR» en versales, ni una paráfrasis doctrinalizante; el texto sigue el tono apocalíptico concreto del original.
  - Las notas al pie se limitan a las dos decisiones donde el español necesita explicitar una ambigüedad o un topónimo transliterado.
