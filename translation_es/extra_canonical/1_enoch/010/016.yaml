translation:
  language: es
  text: ¡Destruye toda violencia de la faz de la tierra[b], y toda mala obra llegará a su fin; y la planta[a] de justicia y rectitud aparecerá, y se convertirá en bendición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la plantación de justicia y rectitud». El sustantivo ge'ez puede referirse tanto a lo plantado como al acto o resultado de plantar.
    reason: lexical_alternative
  - marker: b
    text: O «Y toda violencia será removida». Esta fue una redacción anterior, pero la revisión auditada favorece el imperativo directo del original.
    reason: previous_rendering
lexical_decisions:
- source_word: አሕጕል
  english_pob_choice: Destroy / shall be removed
  chosen_spanish: ¡Destruye!
  alternatives_spanish:
  - ¡Haz desaparecer!
  - Será removida
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto y la revisión auditada indican un imperativo directo, no una forma pasiva. En español, «¡Destruye!» conserva la fuerza del mandato divino con naturalidad y sin suavizar la orden.
- source_word: ኵሎ፡ ግፍዓ
  english_pob_choice: all violence
  chosen_spanish: toda violencia
  alternatives_spanish:
  - toda opresión
  - todo mal violento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Violencia» recoge bien el alcance social y moral de ግፍዓ en este contexto de purificación y juicio. «Opresión» sería posible, pero estrecha el campo semántico.
- source_word: እምገጸ፡ ምድር
  english_pob_choice: from the face of the earth
  chosen_spanish: de la faz de la tierra
  alternatives_spanish:
  - de la tierra
  - de la superficie de la tierra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Faz de la tierra» preserva el giro semítico y el registro apocalíptico del original, como en la traducción inglesa auditada.
- source_word: ኵሉ፡ ምግባረ፡ እኩይ
  english_pob_choice: every evil deed
  chosen_spanish: toda mala obra
  alternatives_spanish:
  - cada obra mala
  - toda obra perversa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El grupo nominal es colectivo y totalizante; «toda mala obra» comunica esa amplitud de manera idiomática en español. «Obra» mantiene la idea de acción realizada.
- source_word: ይኅልቅ
  english_pob_choice: shall come to an end
  chosen_spanish: llegará a su fin
  alternatives_spanish:
  - será destruida
  - perderá existencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede implicar cesación o perecimiento. En español, «llegará a su fin» conserva la idea de terminación sin personificar innecesariamente la obra.
- source_word: ያስተርኢ
  english_pob_choice: shall appear
  chosen_spanish: aparecerá
  alternatives_spanish:
  - será revelada
  - se hará visible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Aparecerá» es breve y fiel al sentido de manifestación/visibilidad del verbo, y funciona bien con la imagen vegetal.
- source_word: ተክለ
  english_pob_choice: the plant
  chosen_spanish: la planta
  alternatives_spanish:
  - el plantío
  - la plantación
  - el brote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Planta» preserva la imagen agrícola concreta que la POB inglesa retuvo. «Brote» sería más específico de crecimiento inicial y podría estrechar la metáfora.
- source_word: ጽድቅ ወርትዕ
  english_pob_choice: of righteousness and uprightness
  chosen_spanish: de justicia y rectitud
  alternatives_spanish:
  - de justicia y uprightness
  - de rectitud y verdad
  - de justicia y honestidad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Justicia» es el equivalente normal de ጽድቅ, y «rectitud» recoge bien el sentido de ርትዕ como lo recto/enderezado. Esta pareja conserva el peso ético y bíblico del original.
- source_word: ይከውን ለበረከት
  english_pob_choice: it shall become a blessing
  chosen_spanish: se convertirá en bendición
  alternatives_spanish:
  - será para bendición
  - llegará a ser bendición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción resultativa se expresa naturalmente en español con «se convertirá en». «Bendición» conserva el valor de resultado favorable y consagrado.
theological_decisions:
- issue: Imperativo divino y continuidad del mandato
  english_pob_reading: Destroy all violence...
  chosen_spanish_reading: ¡Destruye toda violencia...!
  alternative_spanish_readings:
  - Que toda violencia sea destruida
  - Será destruida toda violencia
  rationale: 'La revisión auditada corrige una falsa pasiva: el texto manda destruir. Mantener el imperativo evita borrar la dirección divina del discurso y respeta la fuerza del original ge''ez.'
  doctrine_reference: Lectura gramatical del imperativo en el texto fuente; fidelidad sintáctica al mandato apocalíptico.
- issue: Imagen agrícola de la «planta de justicia y rectitud»
  english_pob_reading: the plant of righteousness and uprightness shall appear
  chosen_spanish_reading: la planta de justicia y rectitud aparecerá
  alternative_spanish_readings:
  - la siembra de justicia y rectitud aparecerá
  - el plantío de justicia y rectitud aparecerá
  rationale: Se preserva la imagen concreta en vez de abstraerla a un simple florecimiento moral. Esto mantiene la textura visionaria del pasaje y la tensión entre lo visible y lo ético.
  doctrine_reference: Preservación de imaginería apocalíptica; equivalencia óptima con primacía del texto fuente.
translation_notes:
  revision_awareness: 'La revisión auditada corrigió un error importante de modo verbal: el ge''ez አሕጕል fue confirmado como imperativo («destruye»), no como pasivo futuro. La versión española adopta esa corrección y mantiene el resto de las decisiones léxicas alineadas con el expediente inglés y con la imaginería apocalíptica del pasaje.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; aquí no aparece explícitamente en el verso, así que no se introduce.
  - Se prefirió «justicia» para ጽድቅ y «rectitud» para ርትዕ, conservando la pareja ética del original.
  - Se mantuvo «faz de la tierra» para reproducir el giro semítico sin perder claridad.
  - La puntuación sigue el español moderno y el tono solemne del texto apocalíptico.
