  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Justicia y rectitud» sigue bien la decisión auditada para ጽድቅ ወርትዕ. La conservación de «planta» en vez de una abstracción también se alinea con la racionalidad teológica documentada.
