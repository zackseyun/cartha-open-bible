translation:
  language: es
  text: Y ahora dale instrucciones[a] para que huya[b] y su descendencia[c] permanezca por todas las generaciones, para siempre[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enséñale» o «hazle saber». El verbo expresa un mandato de comunicarle algo con autoridad y urgencia, sin exigir necesariamente el matiz más fuerte de «advertir».
    reason: lexical_alternative
  - marker: b
    text: O «escape» o «salga huyendo». El verbo expresa huida urgente ante el juicio inminente.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «su semilla»; también puede entenderse como «su linaje» o «sus descendientes».
    reason: lexical_alternative
  - marker: d
    text: O «por todas las generaciones para siempre». La frase final intensifica la duración continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: መሀሮ
  english_pob_choice: instruct
  chosen_spanish: instrúyele
  alternatives_spanish:
  - enséñale
  - adóstrale
  - advíertele
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El mandato dirigido a un intermediario angélico exige una forma imperativa natural en español; «instrúyele» conserva la idea de comunicar con autoridad y urgencia sin añadir un matiz más fuerte de reprensión.
- source_word: ይጐይዝ
  english_pob_choice: he may flee
  chosen_spanish: huya
  alternatives_spanish:
  - escape
  - se vaya
  - salga huyendo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto es de juicio inminente y retiro para salvación; «huya» mantiene la urgencia y el movimiento de escape mejor que una opción más neutra.
- source_word: ይተርፍ / ይገበር
  english_pob_choice: preserve
  chosen_spanish: permanezca
  alternatives_spanish:
  - subsista
  - quede
  - sea preservada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual indicada por el audit trail favorece un verbo intransitivo con «su descendencia» como sujeto. «Permanezca» refleja la idea de continuidad/supervivencia sin forzar una acción transitiva sobre «descendencia».
- source_word: ዘርኡ
  english_pob_choice: his seed
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su semilla
  - su linaje
  - su prole
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Descendencia» comunica de forma digna el valor genealógico y de continuidad del término sin la extrañeza de «semilla» en español, aunque se conserva la referencia a la línea familiar.
- source_word: ለኵሎሙ ትውልድ ለዓለም
  english_pob_choice: for all generations forever
  chosen_spanish: para todas las generaciones, para siempre
  alternatives_spanish:
  - por todas las generaciones de la eternidad
  - a través de todas las generaciones para siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La duplicación temporal intensifica la duración; en español, «para todas las generaciones, para siempre» conserva el paralelo y la solemnidad del original sin sonar artificioso.
theological_decisions:
- issue: Cómo reflejar la revisión textual sobre el sujeto de la cláusula final
  english_pob_reading: The revised reading treats 'his seed' as the subject of an intransitive verb, not as the object of 'preserve.'
  chosen_spanish_reading: «su descendencia permanezca» presenta a la descendencia como sujeto de un verbo intransitivo.
  alternative_spanish_readings:
  - «preserva su descendencia»
  - «y su descendencia sea preservada»
  rationale: La nota de revisión indica que la forma ge'ez y la corrección textual favorecen que la descendencia sea el sujeto de la permanencia. La traducción española debe respetar esa tensión y no volver al objeto directo.
  doctrine_reference: Preserve textual and grammatical tension; do not collapse subject/object distinctions when the source review flags them.
- issue: Cómo traducir el alcance temporal final sin perder el tono elevado
  english_pob_reading: for all the generations forever / for all generations of eternity
  chosen_spanish_reading: «para todas las generaciones, para siempre»
  alternative_spanish_readings:
  - «por todas las generaciones de la eternidad»
  - «por todas las generaciones eternamente»
  rationale: La expresión conserva la duplicación enfática del original y su sentido de duración ilimitada, en un español publicado y claro.
  doctrine_reference: Consistency of key temporal phrases; avoid flattening elevated apocalyptic diction.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrige la lectura anterior de «preservar su semilla» y la reemplaza por una construcción donde «su descendencia» es el sujeto de la permanencia. Por eso la versión española evita tratar la descendencia como objeto directo y adopta «permanezca». También se reflejó el ajuste temporal final hacia una fórmula más natural en español sin perder la duplicación enfática.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones que oculten el valor léxico del texto fuente, aunque aquí no aparece el tetragrámaton.
  - Se optó por «descendencia» en lugar de «semilla» porque el español bíblico moderno lo comunica con claridad sin perder el registro genealógico.
  - La puntuación mantiene la coordinación breve y solemne del original, con coma antes de «para siempre» para reflejar la intensificación final.
