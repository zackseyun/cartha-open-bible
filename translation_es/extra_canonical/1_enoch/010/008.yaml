translation:
  language: es
  text: Y toda la tierra ha sido corrompida por la enseñanza de las obras de Azazel[a]; y atríbuyele[b] todo pecado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la instrucción en sus hechos». El giro ge'ez puede reunir enseñanza y actos concretos; por eso se mantiene la densidad del original en vez de reducirla a una sola idea.
    reason: lexical_alternative
  - marker: b
    text: La cláusula también puede entenderse con matiz forense como «contra él» o «sobre él», es decir, como imputación formal de culpa en el juicio contra Azazel.
    reason: lexical_alternative
  - marker: c
    text: O «escribe contra él todo pecado» o «consigna contra él todo pecado». El original permite la idea de registrar judicialmente toda culpa contra Azazel.
    reason: alternative_reading
lexical_decisions:
- source_word: ማሰነት
  english_pob_choice: has been corrupted
  chosen_spanish: ha sido corrompida
  alternatives_spanish:
  - ha sido arruinada
  - se ha pervertido
  - ha sido contaminada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo etiópico expresa corrupción o deterioro moral/cósmico. «Ha sido corrompida» conserva bien el juicio total del contexto apocalíptico sin debilitarlo a una simple desviación.
- source_word: ኵላ ምድር
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - la entera tierra
  - todo el mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En este contexto apocalíptico la frase es universal. «Toda la tierra» suena natural en español y preserva el alcance global del enunciado.
- source_word: በትምህርተ ግብሩ
  english_pob_choice: by the teaching of the works
  chosen_spanish: por la enseñanza de las obras
  alternatives_spanish:
  - por la instrucción en sus hechos
  - por la enseñanza de sus prácticas
  - por la instrucción de sus obras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez combina la idea de enseñar/instruir con la de obras/hechos concretos. «Enseñanza de las obras» conserva esa densidad sin resolverla prematuramente en una sola noción abstracta.
- source_word: ለአዛዝኤል
  english_pob_choice: of Azazel
  chosen_spanish: de Azazel
  alternatives_spanish:
  - de Azazel
  - pertenecientes a Azazel
  - procedentes de Azazel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La relación preposicional vincula las obras con Azazel como su autor o fuente. «De Azazel» es breve y fiel a la atribución.
- source_word: ጸሐፍ
  english_pob_choice: write down
  chosen_spanish: escribe
  alternatives_spanish:
  - escribe
  - registra
  - anota
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, el imperativo puede expresar mejor la orden judicial con un verbo breve. «Escribe» mantiene el acto formal de consignar culpabilidad; el contexto ya aporta el matiz de registro.
- source_word: ኵሎ ኃጢአተ
  english_pob_choice: all sin
  chosen_spanish: todo pecado
  alternatives_spanish:
  - todo pecado
  - todo el pecado
  - cada pecado
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase suma culpabilidad total. «Todo pecado» conserva la amplitud del juicio; «todo el pecado» sonaría más pesado en español sin añadir claridad.
theological_decisions:
- issue: 'Sentido de la cláusula final: registro de culpa o atribución contra Azazel'
  english_pob_reading: to him ascribe all sin / write down all sin against him
  chosen_spanish_reading: contra él escribe todo pecado
  alternative_spanish_readings:
  - y a él atribuye todo pecado
  - y contra él registra todo pecado
  - y escribe contra él todo pecado
  rationale: La revisión más reciente del POB en inglés reconoce el valor forense de la cláusula. En español, «contra él escribe todo pecado» conserva el matiz judicial de escribir/registrar una imputación y refleja mejor la preposición etiópica «sobre/contra él» que una dativa simple. Al mismo tiempo, se mantiene la ambigüedad entre escribir y atribuir, sin resolverla en exceso.
  doctrine_reference: Preservar la tensión lexical y forense; no suavizar la imputación de culpa que el contexto apocalíptico exige.
translation_notes:
  revision_awareness: 'El antecedente inglés pasó por una corrección importante en la cláusula final: de una dativa suave («to him») a una lectura forense con la preposición correcta («against him»), aunque luego se volvió a formular de modo más natural como «to him ascribe all sin». La versión española sigue el último sentido aprobado, pero conserva el matiz judicial de la revisión anterior mediante la preposición «contra él» y el verbo «escribe».'
  spanish_consistency_notes:
  - Se mantiene «Azazel» como nombre propio transliterado, sin adaptar a una forma tradicional inexistente en español.
  - Se evita «SEÑOR» o equivalentes porque el pasaje no contiene el Tetragrámaton ni lenguaje divino a traducir.
  - Se conserva el paralelismo entre corrupción universal y imputación judicial final.
  - La puntuación y la coordinación replican la estructura compacta del original sin amplificarla con explicaciones en el cuerpo del versículo.
