review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en lo esencial la revisión inglesa adjudicada: la petición se entiende como cosas pedidas de la segunda persona, no como personas que preguntan; la cláusula principal expresa que no serán concedidas a sus padres; ይሴፈዉ se vierte correctamente como esperanza/expectativa; y la longevidad de quinientos años se conserva. Sin embargo, hay dos fallas formales importantes: el verbo en subjuntivo «pidan» no corresponde al futuro/declarativo del original, y las notas al pie están intercambiadas respecto de sus anclajes en el texto.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «que ellos pidan de ti» suena menos natural que «que te piden» o «que piden de ti», y el subjuntivo introduce un matiz impropio. Además, la colocación de las notas es incorrecta: la nota sobre «quinientos inviernos» debe anclarse en «quinientos años», mientras que la nota sobre la ambigüedad de «por causa de ellos» debe anclarse allí.'
  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto en este versículo. La decisión «vida eterna» es aceptable aquí por cercanía al sentido de ዘለዓለም, aunque «vida perdurable» sería posible; no hace falta cambiarla. «Padres» y «esperan» concuerdan bien con el expediente léxico auditado.
  issues:
  - severity: medium
    issue: Uso de subjuntivo en «que ellos pidan de ti»
    rationale: 'El original y el POB inglés expresan una relativa declarativa/factual: «that they ask of you». En español natural y fiel corresponde «que te piden» o «que piden de ti», no un subjuntivo potencial.'
  - severity: high
    issue: Notas al pie intercambiadas
    rationale: La marca [a] está puesta tras «por causa de ellos», pero su nota habla de «quinientos inviernos». La marca [b] está puesta tras «quinientos años», pero su nota habla de la ambigüedad de «por causa de ellos». Esto rompe la trazabilidad exigida por el proyecto.
  - severity: low
    issue: «Pedir de ti» es algo forzado en español
    rationale: Aunque intenta conservar la orientación al interlocutor, «te piden» suena más natural y sigue siendo fiel al valor de petición dirigida a la segunda persona.
  revised_spanish_text: Y estas cosas que te piden no serán concedidas a sus padres por causa de ellos[a]; porque esperan vivir una vida eterna, y cada uno de ellos vivirá quinientos años[b].
  revised_footnotes:
  - marker: a
    text: 'La referencia de «por causa de ellos» queda deliberadamente abierta: puede aludir a los padres o a los descendientes, y el ge''ez es compacto en ese punto.'
    reason: alternative_reading
  - marker: b
    text: O «quinientos inviernos»; el giro literal ge'ez usa «inviernos» como modismo por años.
    reason: cultural_note
  revision_rationale: Se corrige el modo verbal a una relativa declarativa más fiel y natural en español («que te piden») y se reordenan las notas para que cada marcador corresponda al lugar correcto del texto. No se requieren cambios sustantivos adicionales.
