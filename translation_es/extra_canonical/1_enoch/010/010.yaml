- from: Y estas cosas que ellos pidan de ti no serán concedidas a sus padres por causa de ellos[a]; porque esperan vivir una vida eterna, y cada uno de ellos vivirá quinientos años[b].
  to: Y estas cosas que te piden no serán concedidas a sus padres por causa de ellos[a]; porque esperan vivir una vida eterna, y cada uno de ellos vivirá quinientos años[b].
  rationale: Se corrige el modo verbal a una relativa declarativa más fiel y natural en español («que te piden») y se reordenan las notas para que cada marcador corresponda al lugar correcto del texto. No se requieren cambios sustantivos adicionales.
