base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/010/010.yaml
  text: And these things that they ask of you shall not be granted to their fathers on their behalf[a]; for they hope to live an everlasting life[d][c][b], and each one of them will live five hundred years.
  footnotes:
  - marker: a
    text: Literally 'five hundred winters,' an idiom for years.
    reason: cultural_note
  - marker: b
    text: The clause 'on their account' may refer either to the fathers or to the descendants; the Ge'ez leaves the reference somewhat compressed.
    reason: alternative_reading
  - marker: c
    text: Or 'And those who ask concerning you shall not become like their fathers on their account;'.
    reason: previous_rendering
  - marker: d
    text: Or 'for they shall be cut off, but they shall live an everlasting life,'.
    reason: previous_rendering
