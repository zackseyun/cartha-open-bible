translation:
  language: es
  text: Y estas cosas que te piden no serán concedidas a sus padres por causa de ellos[a]; porque esperan vivir una vida eterna, y cada uno de ellos vivirá quinientos años[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La referencia de «por causa de ellos» queda deliberadamente abierta: puede aludir a los padres o a los descendientes, y el ge''ez es compacto en ese punto.'
    reason: alternative_reading
  - marker: b
    text: O «quinientos inviernos»; el giro literal ge'ez usa «inviernos» como modismo por años.
    reason: cultural_note
lexical_decisions:
- source_word: ዘይስእሉከ
  english_pob_choice: that they ask of you
  chosen_spanish: que ellos pidan de ti
  alternatives_spanish:
  - que te soliciten
  - que ellos pregunten por ti
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor básico es el de pedir/solicitar algo dirigido a la segunda persona; en español, «pedir de ti» preserva la orientación al interlocutor sin cargar de más el matiz de consulta o indagación.
- source_word: ኢይከውኑ
  english_pob_choice: shall not be granted
  chosen_spanish: no serán concedidas
  alternatives_spanish:
  - no serán dadas
  - no llegarán a concederse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión del inglés muestra que la cláusula trata de algo que no se otorga a los padres; en español, «serán concedidas» conserva esa voz pasiva de concesión o concesión denegada.
- source_word: ለአበዊሆሙ
  english_pob_choice: to their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus progenitores
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo puede leerse como padres/antepasados; «padres» es la forma más directa y mantiene la relación generacional sin introducir una especificación no requerida.
- source_word: በእንቲአሆሙ
  english_pob_choice: on their behalf
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - a favor de ellos
  - por ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa causalidad o referencia beneficiaria. «Por causa de ellos» conserva la ambigüedad del nexo sin fijar demasiado si se refiere a los padres o a los descendientes.
- source_word: ይሴፈዉ
  english_pob_choice: hope
  chosen_spanish: esperan
  alternatives_spanish:
  - tienen esperanza de
  - aguardan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El pasaje revisado en inglés identifica aquí el sentido de esperar/aguardar, no de ser cortado. «Esperan» refleja de modo natural el valor de expectativa del verbo.
- source_word: ይኅየዉ ሕይወተ ዘለዓለም
  english_pob_choice: to live an everlasting life
  chosen_spanish: vivir una vida eterna
  alternatives_spanish:
  - vivir vida eterna
  - vivir para siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción ge'ez es literalmente «vivir una vida de eternidad». «Una vida eterna» conserva la forma y evita imponer una fórmula teológica más marcada que el original inmediato.
- source_word: አሐዱ አሐዱ እምኔሆሙ
  english_pob_choice: each one of them
  chosen_spanish: cada uno de ellos
  alternatives_spanish:
  - uno por uno de ellos
  - cada uno
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición distributiva se vierte de forma idiomática en español con «cada uno de ellos», que mantiene el sentido individual sin sonar forzado.
- source_word: ኃምስተ ምእተ ክረምተ
  english_pob_choice: five hundred years
  chosen_spanish: quinientos años
  alternatives_spanish:
  - quinientos inviernos
  - quinientas estaciones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Aunque el término literal es «inviernos», en el modismo cuenta años; «quinientos años» es la equivalencia clara en español, con el matiz idiomático anotado en nota.
theological_decisions:
- issue: Relación causal/comprensiva entre la petición y el beneficio o no beneficio a los padres
  english_pob_reading: 'The verse keeps a compressed relation: what they ask of you is not granted to their fathers on their behalf; the reference can remain somewhat open.'
  chosen_spanish_reading: La traducción mantiene la ambigüedad de a quién beneficia o afecta la petición, usando «por causa de ellos» para no cerrar el referente.
  alternative_spanish_readings:
  - por ellos
  - a favor de ellos
  - por causa de sus padres
  rationale: El testimonio base es compacto y admite más de una lectura de referencia. Conviene conservar esa tensión en español en vez de resolverla de forma dogmática.
  doctrine_reference: Preservar tensión teológica/textual en lugar de armonizarla artificialmente.
- issue: Promesa de longevidad frente a juicio sobre la generación previa
  english_pob_reading: The English audit trail retained the idea of everlasting life and extended longevity without flattening the verse into a generic promise.
  chosen_spanish_reading: Se mantiene «vivir una vida eterna» y «quinientos años» como expectativa/longitud de vida, sin convertirlo en una promesa espiritualizada.
  alternative_spanish_readings:
  - vida eterna
  - vida perdurable
  - eternidad
  rationale: La formulación española debe reflejar la expectativa de duración extraordinaria sin importar una teología posterior ajena al pasaje.
  doctrine_reference: Evitar proyección doctrinal posterior donde el texto no la exige.
translation_notes:
  revision_awareness: 'El inglés auditado sufrió una revisión importante: la lectura anterior de «shall not become like their fathers» / «shall be cut off» fue corregida por los revisores a una construcción sobre peticiones dirigidas a «you» y sobre esperanza de vivir una vida eterna. La versión española sigue esa corrección adjudicada y evita reproducir la mistraducción anterior.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; aquí no aparece.
  - «Vida eterna» se usa en sentido literal del pasaje, no como término técnico cristiano.
  - Se evita «Señor» o «Cristo» porque no pertenecen a este versículo.
  - «Padres» se conserva por fidelidad al parentesco/grupo generacional del original y no se expande a «antepasados» en el texto principal.
