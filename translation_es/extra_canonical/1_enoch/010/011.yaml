translation:
  language: es
  text: 'Y a Miguel el Señor le dijo: «Ve, ata a Shemihazá y a los otros con él[a], quienes se unieron a mujeres para contaminarse con ellas en su inmundicia[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Los otros con él» reproduce el valor colectivo del ge'ez sin añadir una precisión como «compañeros» o «asociados» que no está explicitada en la frase.
    reason: lexical_alternative
  - marker: b
    text: «Contaminarse» e «inmundicia» procuran conservar el registro de profanación moral y cultual del original, sin reducirlo a una lectura exclusivamente sexual ni exclusivamente ritual.
    reason: theological_note
lexical_decisions:
- source_word: ለሚካኤል
  english_pob_choice: to Michael / to Mikael
  chosen_spanish: a Miguel
  alternatives_spanish:
  - a Miguel
  - a Mikael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El nombre se vierte con la forma española corriente «Miguel», que comunica de inmediato al lector la identidad del ángel. «Mikael» conservaría más transparentemente la transliteración ge'ez, pero sería menos natural en español y menos reconocible.
- source_word: እግዚእ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - Yahvé
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez incluye un título divino explícito. En español, «el Señor» traduce con naturalidad ese título en una cita angélica directa. «Yahvé» sería más específico para el nombre divino, pero aquí el texto fuente usa el título, no el nombre propio.
- source_word: ይቤ
  english_pob_choice: he said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - le dijo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la introducción de habla con un dativo natural en español, porque el destinatario está marcado explícitamente por la frase precedente. «Le dijo» fluye mejor que una repetición más pesada de sujeto y objeto.
- source_word: እግዚእ ሑር
  english_pob_choice: Go, bind
  chosen_spanish: Ve, ata
  alternatives_spanish:
  - Ve, ata
  - Ve, encadena
  - Ve, sujeta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto de juicio angélico exige una acción coercitiva, y la revisión inglesa ya reconoce que el verbo oscuro apunta a «bind». En español, «ata» preserva ese valor sin sobrerinterpretar con un término más técnico o más gráfico.
- source_word: ለስምያዛ
  english_pob_choice: Shemihazah
  chosen_spanish: Shemihazá
  alternatives_spanish:
  - Shemihazá
  - Semjaza
  - Semyaza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene una transliteración del nombre del líder de los Vigilantes, adaptada a ortografía española con acento final para la pronunciación. Esto conserva la forma del source sin imponer una tradición inglesa fija.
- source_word: ወለካልኣን እለ ምስሌሁ
  english_pob_choice: and the others with him
  chosen_spanish: y a los otros con él
  alternatives_spanish:
  - y a los otros con él
  - y a los demás con él
  - y a sus compañeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión identifica a los asociados de Shemihazá de modo colectivo. «Los otros con él» sigue de cerca el sentido del ge'ez sin introducir una relación jerárquica o explicativa que no está en el texto.
- source_word: እለ ሐብሩ ምስለ አንስት
  english_pob_choice: who joined themselves with women
  chosen_spanish: los que se unieron con mujeres
  alternatives_spanish:
  - los que se unieron con mujeres
  - los que se juntaron con mujeres
  - los que se asociaron con mujeres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Se unieron con mujeres» mantiene el acto deliberado de asociación/adhesión del verbo ge'ez y conserva la tensión moral del pasaje. Evita suavizar el sentido o volverlo meramente relacional.
- source_word: ከመ ይማስኑ
  english_pob_choice: so as to defile themselves
  chosen_spanish: para contaminarse
  alternatives_spanish:
  - para contaminarse
  - para defilearse
  - para volverse impuros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo comunica profanación/impureza en registro cultual-moral. «Contaminarse» funciona en español para esa idea sin sonar artificial; por eso se explicita luego con «impureza».
- source_word: በርኵሶ ዚአሆን
  english_pob_choice: in their uncleanness
  chosen_spanish: en su impureza
  alternatives_spanish:
  - en su impureza
  - en su contaminación
  - en su inmundicia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez habla de un estado de impureza/uncleanness ligado a su acción. «Impureza» es el equivalente más claro en español; «contaminación» se usa arriba para el proceso, y aquí se conserva el estado resultante.
theological_decisions:
- issue: Naturaleza de la transgresión de los Vigilantes
  english_pob_reading: Preserve defilement and uncleanness language without narrowing it to one later doctrinal category.
  chosen_spanish_reading: Conservar el lenguaje de contaminarse e impureza sin especificar si el énfasis es solo sexual, solo ritual o una combinación.
  alternative_spanish_readings:
  - corrupción sexual
  - impureza ritual solamente
  - maldad general
  rationale: El texto ge'ez enfatiza la contaminación y la impureza como consecuencia de la unión ilícita. El español mantiene esa tensión sin resolverla, porque el pasaje no obliga a una sola categoría teológica posterior.
  doctrine_reference: Preservar la tensión teológica del texto apocalíptico en lugar de cerrarla.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió dos puntos importantes del audit trail: mantuvo explícito «the Lord» y eliminó el añadido «all» antes de «their uncleanness». El español sigue esa corrección al incluir «el Señor» y al decir simplemente «en su impureza», sin intensificador adicional. También se evita trasladar mecánicamente la forma anglicada «Michael» cuando el objetivo español puede representar mejor el nombre mediante «Miguel».'
  spanish_consistency_notes:
  - Se mantiene la transliteración «Shemihazá» con acento final para facilitar lectura española, mientras que el ángel receptor se vierte como «Miguel» por uso común en español.
  - Se conserva «el Señor» para el título divino presente en el ge'ez, en coherencia con la fuente, sin sustituirlo por un ocultamiento del nombre divino.
  - Se usa «contaminarse»/«impureza» para sostener la tensión entre acto y estado resultante en el pasaje.
  - La puntuación y las comillas siguen el uso español moderno de cita directa.
