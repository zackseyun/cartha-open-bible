translation:
  language: es
  text: 'Entonces el Altísimo, el Grande y el Santo, habló y envió a Uriel[b] al hijo de Lamec[a], y le dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El destinatario de esta comisión se identifica solo como «el hijo de Lamec» en este versículo; el contexto más amplio muestra que se trata de Noé.
    reason: cross_reference
  - marker: b
    text: El nombre «Uriel» se infiere del testimonio etiópico, que aquí parece levemente corrompido; el sentido está fuertemente apoyado por el contexto inmediato del ángel comisionado.
