lexical_decisions:
- source_word: አሜሃ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y entonces
  - Luego
  lexicon: Dillmann
  rationale: Marca una transición narrativa inmediata; 'Entonces' conserva el orden secuencial sin añadir matiz interpretativo.
- source_word: ልዑል
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Exaltado
  lexicon: Dillmann
  rationale: Título divino idiomático en español que preserva la idea de supremacía y el registro solemne.
- source_word: ዓቢይ
  english_pob_choice: the Great
  chosen_spanish: el Grande
  alternatives_spanish:
  - el grande
  - el Magnífico
  lexicon: Dillmann
  rationale: Retiene el epíteto divino como calificativo solemne; 'Grande' refleja la acumulación titulativa del original.
- source_word: ቅዱስ
  english_pob_choice: Holy One
  chosen_spanish: Santo
  alternatives_spanish:
  - el Santo
  - el Santo One
  lexicon: Dillmann
  rationale: Aquí funciona en aposición con los títulos divinos; en español, 'el Grande y Santo' conserva la pila de epítetos sin forzar una sustantivación extraña.
- source_word: ተናገረ
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: Dillmann
  rationale: Verbo de habla directo y elevado; 'habló' mantiene el tono narrativo solemne.
- source_word: ወፈነወ
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: Dillmann
  rationale: La acción es de comisión/encargo; 'envió' es la forma natural y formal en español.
- source_word: አሰርየ፡ ልዩር
  english_pob_choice: Uriel
  chosen_spanish: Uriel
  alternatives_spanish:
  - el ángel Uriel
  lexicon: Dillmann
  rationale: Se translitera el nombre propio siguiendo el criterio del texto inglés auditado; no se añade 'ángel' porque el original aquí solo aporta el nombre.
- source_word: ወልደ፡ ላሜክ
  english_pob_choice: the son of Lamech
  chosen_spanish: al hijo de Lamec
  alternatives_spanish:
  - al hijo de Lamek
  - a Lamec hijo
  lexicon: Dillmann
  rationale: Conserva la estructura filial formal del original; 'Lamec' es la adaptación española habitual del nombre.
- source_word: ወይቤሎ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y dijo a él
  lexicon: Dillmann
  rationale: El sufijo pronominal exige un destinatario explícito; 'le dijo' es la formulación natural en español.
theological_decisions:
- issue: Acumulación de títulos divinos
  english_pob_reading: the Most High, the Great and Holy One
  chosen_spanish_reading: el Altísimo, el Grande y Santo
  alternative_spanish_readings:
  - el Altísimo, el grande y santo
  - el Exaltado, el Grande y el Santo
  rationale: El ge'ez apila epítetos de Dios; la versión española conserva esa densidad titulativa sin resolverla en un solo nombre. Se mantiene la solemnidad y la tensión reverencial del original.
  doctrine_reference: Apocalíptica y teología del título divino; preservar epítetos acumulados sin aplanarlos.
translation_notes:
  revision_awareness: Se siguió el testimonio ge'ez de manera directa y se contrastó con el audit trail inglés para conservar los títulos divinos acumulados, el envío de Uriel y la identificación contextual del destinatario sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; aquí el texto dice un título divino, no el nombre.
  - Se prefirió «Lamec» como forma española estable del nombre propio.
  - Se mantuvo el tono apocalíptico solemne con verbos directos y títulos en mayúscula inicial solo donde forman parte del título reverencial.
