    issue: Falta una nota equivalente a la nota inglesa c sobre la alternativa de traducción de los adjetivos.
    rationale: El expediente inglés preserva una alternativa de formulación previa ('jagged stones and sharp stones'). El español debe conservar esa alternativa significativa, idealmente en una nota separada.
  - severity: medium
    issue: La nota b del borrador no refleja con suficiente precisión la razón documentada en el POB inglés.
    rationale: 'La nota inglesa explica que cubrir el rostro aclara la cláusula siguiente: exclusión de toda luz. El borrador la generaliza a ''encierro total y duradero'', perdiendo el vínculo exegético inmediato.'
  - severity: low
