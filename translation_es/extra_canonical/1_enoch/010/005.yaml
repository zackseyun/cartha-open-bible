translation:
  language: es
  text: Y amontona sobre él piedras ásperas y afiladas[a], y cúbrelo con oscuridad; y allí permanecerá para siempre[b][c]. Y cubre su rostro, para que no vea la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La pareja de adjetivos puede entenderse como una sola serie intensiva: «piedras ásperas y afiladas», o, de modo alternativo, «piedras ásperas y puntiagudas».'
    reason: lexical_alternative
  - marker: b
    text: 'Cubrir su rostro explica la cláusula siguiente: el condenado queda excluido de toda luz, una imagen concreta de confinamiento total.'
    reason: cultural_note
  - marker: c
    text: O «piedras escabrosas y afiladas».
    reason: previous_rendering
lexical_decisions:
- source_word: ደይ
  english_pob_choice: heap
  chosen_spanish: amontona
  alternatives_spanish:
  - apila
  - amasa
  - echa encima
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El mandato es de acumulación punitiva sobre la persona condenada; «amontona» comunica la acción de poner una masa de piedras encima sin sonar forzado en español.
- source_word: እብነ
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - rocas
  - guijarros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo básico denota piedras; «piedras» conserva la imagen concreta de encierro y sepultura simbólica.
- source_word: ጠያያተ / በሊሓተ
  english_pob_choice: jagged and sharp
  chosen_spanish: escabrosas y filosas
  alternatives_spanish:
  - ásperas y puntiagudas
  - quebradas y agudas
  - rugosas y cortantes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La pareja de adjetivos intensifica la dureza de las piedras. «Escabrosas» y «filosas» mantienen la fuerza física de la imagen sin repetir innecesariamente «piedras» ni introducir una glosa explicativa excesiva.
- source_word: ክድኖ
  english_pob_choice: cover
  chosen_spanish: cúbrelo / cubre
  alternatives_spanish:
  - tápalo
  - velo
  - ocúltalo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el imperativo repetido para oscuridad y rostro; «cubrir» mantiene la fórmula de juicio concreta y la relación con el acto siguiente.
- source_word: ጽልመተ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - gloom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Oscuridad» es la opción más natural y sobria en español; preserva la imagen apocalíptica sin cargarla con un registro demasiado arcaico.
- source_word: ይኅድር ለዓለም
  english_pob_choice: he shall remain forever
  chosen_spanish: permanecerá para siempre
  alternatives_spanish:
  - morará para siempre
  - estará para siempre
  - habitará para siempre
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En el contexto de confinamiento, «permanecerá» comunica duración indefinida mejor que un verbo de residencia más neutro. «Para siempre» mantiene el valor de duración total.
- source_word: ለገጹ
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su semblante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El objeto directo de «cubrir» se entiende literalmente; «rostro» suena digno en español bíblico y enlaza con la clausura visual del verso.
- source_word: ከመ ኢይርአይ ብርሃነ
  english_pob_choice: so that he may not see light
  chosen_spanish: para que no vea la luz
  alternatives_spanish:
  - para que no vea luz
  - a fin de que no vea la luz
  - para no ver la luz
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula de propósito se vierte con naturalidad en español. «La luz» conserva el valor absoluto de la imagen de exclusión total, sin debilitarla a una mera penumbra.
theological_decisions:
- issue: Fuerza de la imagen de castigo
  english_pob_reading: A literal stony covering and darkness are retained as concrete judgment imagery.
  chosen_spanish_reading: Se mantiene una cobertura literal de piedras, oscuridad y rostro cubierto, como imagen concreta de juicio y confinamiento.
  alternative_spanish_readings:
  - Sólo una imagen metafórica de aflicción
  - Encierro general sin imagen de sepultura
  rationale: El ge'ez acumula mandatos materiales y visuales. La traducción conserva la severidad corporal y apocalíptica del castigo, sin convertirla en una abstracción.
  doctrine_reference: Preservar la imaginería apocalíptica; no suavizar fórmulas de juicio en prosa genérica.
translation_notes:
  revision_awareness: Se corrigió un posible residuo en inglés al reemplazar cualquier calco innecesario por español idiomático natural, manteniendo el contenido concreto del ge'ez y la secuencia de imperativos de juicio.
  spanish_consistency_notes:
  - Se usa «Yahvé» sólo cuando el texto fuente lo exige; aquí no aparece el nombre divino.
  - Se mantiene el paralelismo de imperativos («amontona», «cúbrelo», «cubre») para reproducir la cadena de acciones punitivas.
  - «Oscuridad» y «luz» se conservan como imágenes absolutas, no como metáforas debilitadas.
