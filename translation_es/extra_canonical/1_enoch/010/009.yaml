translation:
  language: es
  text: 'Y a Gabriel le dijo el Señor: «Ve contra los bastardos[a] y los réprobos, y contra los hijos de fornicación; destruye a los hijos de fornicación y a los hijos de los Vigilantes[b] de entre los hombres. Haz que vayan unos contra otros[c], y que perezcan en la batalla[d], porque no tendrán largos días».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los ilegítimos». El término ge'ez es un calificativo áspero para descendencia de unión ilícita.
    reason: lexical_alternative
  - marker: b
    text: El texto es difícil en la frase traducida como «hijos de los Vigilantes». La lectura se toma del contexto inmediato de los Vigilantes; subsiste cierta incertidumbre textual.
    reason: textual_variant
  - marker: c
    text: Una lectura entre corchetes en el testimonio incluye la idea de «y envíalos»; el sentido de oposición mutua es claro aunque la secuencia verbal exacta sea incierta.
    reason: textual_variant
  - marker: d
    text: O «y que se destruyan unos a otros en la batalla».
    reason: previous_rendering
lexical_decisions:
- source_word: ወለገብርኤል፡ ይቤሎ፡ እግዚእ፡
  english_pob_choice: And to Gabriel the Lord said
  chosen_spanish: Y a Gabriel le dijo el Señor
  alternatives_spanish:
  - Y el Señor dijo a Gabriel
  - Y el Señor le dijo a Gabriel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Mantiene la estructura de destinatario directo y habla divina en un orden natural para el español. «Señor» preserva la referencia al hablante divino en este oráculo de juicio.
- source_word: ሑር፡ ዲቤሆሙ፡
  english_pob_choice: Go against them
  chosen_spanish: Ve contra
  alternatives_spanish:
  - Ve sobre
  - Procede contra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase expresa un movimiento hostil y punitivo, no simple desplazamiento. «Ve contra» conserva el tono de mandato judicial.
- source_word: ለመንዝራን፡
  english_pob_choice: the bastards
  chosen_spanish: los bastardos
  alternatives_spanish:
  - los ilegítimos
  - los nacidos de unión ilícita
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el insulto duro del original y del audit trail inglés. En este contexto apocalíptico, suavizarlo debilitaría la fuerza condenatoria.
- source_word: ወለማኑናን፡
  english_pob_choice: the reprobates
  chosen_spanish: los réprobos
  alternatives_spanish:
  - los desechados
  - los rechazados
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Réprobos» reproduce la fuerza de rechazo/jucio que el audit trail atribuye al término, sin introducir una interpretación más amplia que la del pasaje.
- source_word: ወዲበ፡ ውሉደ፡ ዘማ፡
  english_pob_choice: and against the children of fornication
  chosen_spanish: y contra los hijos de fornicación
  alternatives_spanish:
  - y contra los hijos de prostitución
  - y contra los descendientes de unión ilícita
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el lenguaje genealógico y moral directo del original. «Fornicación» refleja la transgresión sexual sin convertirla en un tecnicismo posterior.
- source_word: ወአኅጕሎሙ፡
  english_pob_choice: destroy
  chosen_spanish: destruye
  alternatives_spanish:
  - borra
  - extermina
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo demanda una acción fuerte de aniquilación en contexto de juicio. «Destruye» es claro y suficientemente intenso en español.
- source_word: ለውሉደ፡ ትጉሃን፡ እምሰብእ፡
  english_pob_choice: the children of the Watchers from among humankind
  chosen_spanish: a los hijos de los Vigilantes de entre los hombres
  alternatives_spanish:
  - a los hijos de los Vigilantes de entre la humanidad
  - a los hijos de los Vigilantes entre los hombres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene «Vigilantes» como término técnico ya establecido para el grupo en 1 Enoc. «De entre los hombres» conserva el contraste con la esfera humana del relato.
- source_word: ወአውፅኦሙ፡ [ወፈንዎሙ፡] በበይናቲሆሙ፡
  english_pob_choice: Send them out against one another
  chosen_spanish: Haz que vayan unos contra otros
  alternatives_spanish:
  - Envíalos unos contra otros
  - Haz que se vuelvan unos contra otros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción quiere expresar la oposición recíproca. «Haz que vayan unos contra otros» comunica ese sentido sin forzar una voz verbal que el texto no exige de forma exacta.
- source_word: እሙንቱ፡ ወስሊሆሙ፡ በቀትል፡ ይትሐጐሉ፡
  english_pob_choice: let them perish in battle
  chosen_spanish: y que perezcan en la batalla
  alternatives_spanish:
  - y que mueran en batalla
  - y que sean destruidos en la batalla
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión textual/gramatical señala que el verbo es intransitivo o pasivo-reflexivo, por lo que «perezcan» refleja mejor el valor del original que una forma activa recíproca. «En la batalla» preserva el marco bélico del pasaje.
- source_word: እስመ፡ ኑሐ፡ መዋዕል፡ አልቦሙ።
  english_pob_choice: for length of days shall not be theirs
  chosen_spanish: porque no tendrán largos días
  alternatives_spanish:
  - porque no les pertenecerá larga vida
  - pues no habrá largos días para ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la fórmula solemne de juicio, pero se adapta a un español natural y publicable. «Largos días» mantiene la imagen semítica de duración de vida.
theological_decisions:
- issue: Identidad de los destinatarios del juicio
  english_pob_reading: The verse targets the illicit offspring associated with the Watchers and their human unions, not humanity in general.
  chosen_spanish_reading: El versículo se dirige a la descendencia ilícita asociada con los Vigilantes y sus uniones humanas, no a la humanidad en general.
  alternative_spanish_readings:
  - El versículo se dirige solo a gigantes
  - El versículo se dirige a pecadores humanos en general
  rationale: La secuencia de apelativos y el marco narrativo de los Vigilantes apuntan a un grupo específico dentro del relato. Mantener esa restricción evita una generalización ajena al contexto.
  doctrine_reference: Preservar el sentido local del pasaje; no armonizar más allá del contexto narrativo.
- issue: Mantenimiento del lenguaje insultante y genealógico
  english_pob_reading: Retain the harsh condemnation in the main text rather than softening it.
  chosen_spanish_reading: Se conserva el lenguaje duro de condena en el texto principal, sin suavizarlo.
  alternative_spanish_readings:
  - Usar únicamente expresiones neutralizadas como 'ilegítimos'
  - Reformular en términos más explicativos
  rationale: El pasaje es un oráculo de juicio apocalíptico. Su dureza forma parte del efecto retórico y no debe atenuarse en la traducción principal.
  doctrine_reference: Preservar la imaginería apocalíptica y las fórmulas de juicio tal como aparecen en la fuente.
translation_notes:
  revision_awareness: 'He incorporado la revisión gramatical más reciente: el verbo ge''ez ይትሐጐሉ se refleja mejor con un valor intransitivo/pasivo-reflexivo («perezcan») que con una construcción activa recíproca. También mantuve el tratamiento textual cauteloso de la frase «hijos de los Vigilantes» y la nota sobre la lectura con o sin «y envíalos» en la secuencia.'
  spanish_consistency_notes:
  - Se usa «Vigilantes» como término técnico consistente para ትጉሃን en 1 Enoc.
  - Se conserva «Yahvé» como norma del proyecto, pero aquí el testimonio base y el audit trail inglés presentan «el Señor»; por fidelidad al expediente y al habla oracular se mantuvo «el Señor» en el texto principal.
  - Se mantiene el registro de juicio apocalíptico con vocabulario fuerte («bastardos», «réprobos», «fornicación»).
  - «Perezcan» evita alterar la voz verbal del ge'ez revisado y conserva el valor de destrucción por derrota bélica.
