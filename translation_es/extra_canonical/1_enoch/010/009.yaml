base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/010/009.yaml
  text: And to Gabriel the Lord said[a], “Go against the bastards and the reprobates, and against the children of fornication; destroy the children of fornication and the children of the Watchers from among humankind. Send them out against one another, and let them perish in battle[d][c][b]; for length of days shall not be theirs.”
  footnotes:
