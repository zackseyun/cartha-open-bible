    text: Or 'the illegitimate ones.' The Ge'ez term is a harsh label for offspring of illicit union.
    reason: lexical_alternative
  - marker: b
    text: The text is difficult in the phrase rendered 'the children of the Watchers.' The OCR shows ለውሉደ፡ ትጉሃን, and the sense is taken from the immediate Watchers context; some uncertainty remains.
    reason: textual_variant
  - marker: c
    text: A bracketed reading in the witness includes 'and send them out'; the sense of mutual conflict is clear even if the exact verbal sequence is uncertain.
    reason: textual_variant
  - marker: d
    text: Or 'let them destroy each other in battle'.
    reason: previous_rendering
