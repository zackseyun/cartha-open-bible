translation:
  language: es
  text: 'Y todos le respondieron y dijeron[a]: «Hagamos todos un juramento, y atémonos unos a otros con una maldición, para que no abandonemos este plan[b], sino que llevemos a cabo este acto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez emplea tanto la idea de un juramento como la de atarse con una maldición; la traducción mantiene ambos elementos como una fórmula solemne reforzada.
    reason: lexical_alternative
  - marker: b
    text: 'La frase final es repetitiva en el testigo: «este plan ... este acto/acción». Se conserva la transición de la deliberación a la ejecución.'
    reason: textual_variant
lexical_decisions:
- source_word: አውሥኡ
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - replicaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo introduce la réplica colectiva en un marco narrativo formal. 'Respondieron' conserva el tono dialogal y evita una repetición innecesaria con 'dijeron'.
- source_word: መሐላ
  english_pob_choice: oath
  chosen_spanish: juramento
  alternatives_spanish:
  - oath
  - promesa jurada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, 'juramento' comunica con naturalidad el acto solemne de obligarse bajo pacto. Mantiene el peso legal y ritual del término sin suavizarlo.
- source_word: ንምሐል
  english_pob_choice: let us swear
  chosen_spanish: Juremos
  alternatives_spanish:
  - Hagamos un juramento
  - Juremos un juramento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma exhortativa/volitiva se expresa de manera natural con el subjuntivo exhortativo 'Juremos'. La redundancia 'jurar un juramento' se evita en la línea principal, aunque se conserva la solemnidad.
- source_word: ናውግዝ
  english_pob_choice: let us bind one another with a curse
  chosen_spanish: atemos unos a otros con una maldición
  alternatives_spanish:
  - vinculemos unos a otros con una maldición
  - pongamos unos a otros bajo una maldición
  - nos comprometamos mutuamente con una maldición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Atar'' conserva la fuerza de un vínculo autoimprecatorio y pactal; ''maldición'' mantiene el contenido amenazante del acto sin convertirlo en un simple insulto o desahogo emocional.'
- source_word: በበይናቲነ
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - mutuamente
  - entre nosotros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se preserva el sentido recíproco explícito: el juramento y la maldición obligan a todo el grupo en relación mutua, no de forma general.'
- source_word: ከመ፡ ኢንምጠ
  english_pob_choice: so that we do not abandon this plan
  chosen_spanish: para que no abandonemos este plan
  alternatives_spanish:
  - para que no nos retiremos de este plan
  - para que no demos la espalda a este plan
  - para que no nos apartemos de este plan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Abandonemos'' sigue de cerca el sentido de no retirarse del acuerdo ya propuesto y suena natural en español. Evita sobrecargar la frase con una imagen más idiomática pero menos directa.'
- source_word: ለዛቲ፡ ምክር
  english_pob_choice: from this plan
  chosen_spanish: este plan
  alternatives_spanish:
  - este consejo
  - esta resolución
  - este proyecto
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Mikhr'' puede significar consejo o plan; aquí el contexto es una propuesta colectiva de conspiración. ''Plan'' es la mejor equivalencia moderna y mantiene la referencia deliberativa.'
- source_word: ንግብራ፡ ለዛቲ፡ ግብር
  english_pob_choice: carry out this deed
  chosen_spanish: llevemos a cabo este hecho
  alternatives_spanish:
  - realicemos esta acción
  - ejecutemos este acto
  - hagamos esta obra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La repetición del sustantivo intensifica la concreción de la acción pactada. 'Llevar a cabo' expresa ejecución deliberada; 'hecho' conserva el valor de algo efectivamente realizado sin suavizar su gravedad.
theological_decisions:
- issue: Fuerza jurídica y moral del juramento colectivo
  english_pob_reading: A self-binding pact reinforced by mutual curse
  chosen_spanish_reading: Un pacto de autoobligación reforzado por una maldición mutua
  alternative_spanish_readings:
  - una simple promesa
  - una maldición general sin fuerza pactal
  - un acuerdo informal entre ellos
  rationale: La pareja 'juramento' + 'maldición' no se reduce a promesa ordinaria. La redacción española conserva la gravedad jurídica y la dimensión autoimprecatoria del acto, que estructuran la rebelión del relato.
  doctrine_reference: Preservar la tensión teológica y judicial del texto apocalíptico; no neutralizar fórmulas solemnes ni convertirlas en lenguaje genérico.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió 'abandonar' frente a una formulación más literal de 'dar la vuelta' o 'retirarse', por ser una equivalencia más directa y natural del sentido. También respeta la decisión de mantener la duplicación formular entre juramento y maldición, así como la transición entre plan y hecho.
  spanish_consistency_notes:
  - Se mantiene 'plan' para מִכְר en consonancia con el valor deliberativo del contexto.
  - Se usa 'maldición' para נָוְגְּז sin atenuar la fuerza autoimprecatoria.
  - Se conserva el paralelismo 'juramento' / 'maldición' para no borrar la doble fórmula del original.
  - La puntuación con comillas angulares sigue el uso editorial moderno en español.
