base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/006/004.yaml
  text: And they all answered him and said[a], "Let us all swear an oath, and let us all bind one another with a curse, so that we do not abandon this plan[b], but carry out this deed."
  footnotes:
  - marker: a
    text: The Ge'ez uses both 'swear an oath' and 'bind with a curse,' a doubled formula emphasizing a solemn mutual pact.
    reason: lexical_alternative
  - marker: b
    text: The final phrase is textually repetitive in the witness ('this plan ... this deed/action'); the translation preserves the sense of moving from counsel to execution.
    reason: textual_variant
