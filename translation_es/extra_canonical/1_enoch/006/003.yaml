translation:
  language: es
  text: 'Y Semyaza[a], quien era su líder, les dijo: «Temo que quizá no estén dispuestos a hacer este acto, y yo solo seré responsable[b] de un gran pecado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión ge'ez detrás de “su líder” es literalmente más cercana a “su ángel” o “su mensajero principal”, pero aquí identifica a Semyaza como cabeza del grupo.
    reason: lexical_alternative
  - marker: b
    text: “Seré responsable” también puede entenderse como “pagaré la pena” o “seré tenido por responsable”, reflejando la fuerza jurídico-moral del término.
    reason: lexical_alternative
lexical_decisions:
- source_word: ስምያዛ
  english_pob_choice: Semyaza
  chosen_spanish: Semyaza
  alternatives_spanish:
  - Shemyaza
  lexicon: Knibb
  rationale: Nombre propio transliterado, no traducido, siguiendo el uso del POB inglés y la práctica habitual para nombres en textos de Enoch.
- source_word: መልአኮሙ
  english_pob_choice: their leader
  chosen_spanish: su líder
  alternatives_spanish:
  - su ángel
  - su principal mensajero
  - su jefe
  lexicon: Dillmann
  rationale: El término ge'ez es literalmente cercano a “ángel/mensajero”, pero en este contexto identifica la función de mando de Semyaza dentro del grupo. “Su líder” comunica esa función sin introducir una lectura confusa o excesivamente literal.
- source_word: እፈርህ
  english_pob_choice: I fear
  chosen_spanish: Temo
  alternatives_spanish:
  - Tengo miedo
  - Me temo
  lexicon: Dillmann
  rationale: Primera persona de temor; “Temo” es natural, directo y conserva el tono de vacilación de la frase.
- source_word: ኢትፍቅዱ
  english_pob_choice: you may not be willing
  chosen_spanish: quizá no estén dispuestos
  alternatives_spanish:
  - quizá no quieran
  - quizá no consientan
  - quizá no estén dispuestas
  lexicon: Dillmann
  rationale: El verbo apunta a disposición/consentimiento más que a capacidad. “Estén dispuestos” reproduce bien esa fuerza volitiva en español contemporáneo.
- source_word: ይትገበር
  english_pob_choice: do this deed
  chosen_spanish: hacer este hecho
  alternatives_spanish:
  - hacer este acto
  - realizar esta obra
  - llevar a cabo este hecho
  lexicon: Dillmann
  rationale: La forma se refiere a que la acción sea hecha/efectuada. “Hacer este hecho” sigue de cerca el valor verbal y mantiene la referencia concreta a la acción propuesta, aunque en español suene ligeramente marcado; se conserva para no diluir la correspondencia con el original.
- source_word: ግብር
  english_pob_choice: deed
  chosen_spanish: hecho
  alternatives_spanish:
  - acto
  - obra
  - deed
  lexicon: Dillmann
  rationale: Término amplio para acción u obra. “Hecho” funciona en español como sustantivo neutro para la acción mencionada, aunque conserva cierta aspereza; se mantiene por cercanía semántica.
- source_word: ባሕቲትየ
  english_pob_choice: I alone
  chosen_spanish: yo solo
  alternatives_spanish:
  - solo yo
  - yo por mi parte
  - yo únicamente
  lexicon: Dillmann
  rationale: Exprime la exclusividad de la carga personal que Semyaza asume si los demás se niegan.
- source_word: ፈዳዪ
  english_pob_choice: become liable
  chosen_spanish: quedaré responsable
  alternatives_spanish:
  - seré responsable
  - quedaré bajo responsabilidad
  - pagaré la pena
  lexicon: Dillmann
  rationale: El término tiene matiz jurídico-moral de asumir responsabilidad o pena. “Quedaré responsable” preserva ese peso sin especificar una pena concreta que el texto no detalla.
- source_word: ለኃጢአት ዐባይ
  english_pob_choice: for a great sin
  chosen_spanish: de un gran pecado
  alternatives_spanish:
  - por un gran pecado
  - por una grave culpa
  - de una gran falta
  lexicon: Dillmann
  rationale: La expresión denota una transgresión grave. “Gran pecado” conserva la gravedad moral del original y la formulación del POB inglés.
theological_decisions:
- issue: Cómo expresar el rol de Semyaza respecto del grupo
  english_pob_reading: their leader
  chosen_spanish_reading: su líder
  alternative_spanish_readings:
  - su ángel
  - su jefe
  rationale: En el contexto narrativo, Semyaza habla como cabeza del grupo. “Su líder” conserva la función sin hacer una afirmación adicional sobre ontología que podría oscurecer el sentido inmediato del pasaje.
  doctrine_reference: Traducir funciones y títulos por su sentido contextual cuando el pasaje los usa de manera narrativa y no doctrinal.
- issue: Carga legal-moral de la expresión final
  english_pob_reading: become liable
  chosen_spanish_reading: quedaré responsable
  alternative_spanish_readings:
  - pagaré la pena
  - seré tenido por responsable
  rationale: La frase comunica responsabilidad/culpa asumida. “Quedaré responsable” mantiene el matiz jurídico-moral y evita sobretraducir el tipo exacto de castigo.
  doctrine_reference: Conservar la fuerza legal del original sin añadir especificaciones punitivas no explicitadas.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que prefirió “do this deed” frente a “carry out this deed” por ser más directa. Por ello se mantuvo un verbo simple de acción y se evitó expandir el sintagma más allá de lo que el original exige. También se preservó la lectura funcional de መልአኮሙ como rol de liderazgo, conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se usa Semyaza como transliteración del nombre propio, en coherencia con el POB inglés.
  - Se conserva un tono solemne y narrativo, sin lenguaje eclesiástico tradicional innecesario.
  - Se respeta la tensión jurídico-moral de ፈዳዪ con una formulación de responsabilidad, no solo de sentimiento subjetivo.
  - La puntuación de discurso directo sigue la convención española con comillas angulares.
  - La palabra “pecado” mantiene la gravedad moral del final del versículo; no se suaviza a “falta”.
