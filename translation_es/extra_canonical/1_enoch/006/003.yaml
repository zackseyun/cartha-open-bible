base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/006/003.yaml
  text: And Semyaza[a], who was their leader, said to them, “I fear that you may not be willing to do this deed[b], and I alone will become liable for a great sin.”
  footnotes:
  - marker: a
    text: The Ge'ez expression behind “their leader” is literally closer to “their angel” or “their chief messenger,” but in context it identifies Semyaza as the head of the group.
    reason: lexical_alternative
  - marker: b
    text: “Become liable” may also be rendered “pay the penalty” or “be held responsible,” reflecting the legal-moral force of the term.
    reason: lexical_alternative
