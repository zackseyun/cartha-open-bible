translation:
  language: es
  text: Entonces todos juraron juntos y se ligaron unos a otros con una maldición sobre esto[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El verbo puede llevar aquí fuerza de juramento vinculante: es decir, se comprometieron bajo juramento o bajo una promesa mutua.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "se comprometieron unos con otros".'
    reason: previous_rendering
  - marker: c
    text: 'O: "se ataron unos a otros".'
    reason: previous_rendering
lexical_decisions:
- source_word: አሜሃ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y entonces
  - Luego
  - En aquel momento
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marca la sucesión narrativa inmediata y suena natural en español sin añadir contenido.
- source_word: መሐሉ
  english_pob_choice: they all spoke together
  chosen_spanish: todos juraron juntos
  alternatives_spanish:
  - todos hablaron juntos
  - todos dijeron juntos
  - todos hicieron un juramento juntos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto y la corrección del audit trail muestran que el verbo es de juramento, no de simple habla. 'Juraron juntos' conserva el acto colectivo y evita suavizarlo a mera խոսa.
- source_word: ኵሎሙ
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - la totalidad del grupo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa participación total y refuerza la unanimidad del grupo.
- source_word: ኅቡረ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - como uno solo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repite la idea de acción colectiva con una forma natural en español.
- source_word: ወአውገዙ
  english_pob_choice: and they bound themselves
  chosen_spanish: y se impusieron una maldición
  alternatives_spanish:
  - y se maldijeron
  - y se ataron con maldición
  - y se vincularon con una maldición
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El audit trail identifica un valor de anatema/maldición ligado al juramento. En español, 'imponerse una maldición' conserva la fuerza imprecatoria sin perder claridad, y evita reducirlo a un simple compromiso.
- source_word: በበይናቲሆሙ
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - mutuamente
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresa la reciprocidad del vínculo de manera idiomática y clara.
- source_word: ቦቱ
  english_pob_choice: concerning it
  chosen_spanish: acerca de ello
  alternatives_spanish:
  - sobre ello
  - en cuanto a ello
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reproduce el referente indefinido del pronombre sin especificarlo más allá de lo que el texto permite.
theological_decisions:
- issue: Cómo representar el acto de juramento y la maldición en una sola cláusula
  english_pob_reading: bound one another with a curse concerning it
  chosen_spanish_reading: se impusieron una maldición unos a otros acerca de ello
  alternative_spanish_readings:
  - juraron juntos y se maldijeron mutuamente acerca de ello
  - juraron juntos y se ataron con una maldición unos a otros acerca de ello
  rationale: El Ge'ez y el audit trail sostienen tanto el juramento colectivo como la maldición/anatema mutua. La redacción española debe conservar ambos elementos sin reducir uno al otro.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Si explicitar la mutualidad del juramento solo con 'unos a otros' o con una formulación más fuerte
  english_pob_reading: bound themselves to one another concerning it
  chosen_spanish_reading: se impusieron una maldición unos a otros acerca de ello
  alternative_spanish_readings:
  - se juramentaron mutuamente acerca de ello
  - se comprometieron entre sí con maldición acerca de ello
  rationale: '''Unos a otros'' mantiene la reciprocidad visible; la forma verbal elegida preserva el componente de anatema que el contexto exige y que el audit trail corrigió como error importante.'
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'El audit trail corrige dos puntos importantes: መሐሉ no significa ''hablaron'', sino ''juraron''; y ወአውገዙ no debe suavizarse a una simple vinculación, porque en el contexto del pacto de los Vigilantes tiene fuerza de anatema/maldición. La redacción española refleja ambos ajustes y evita repetir el error de traducción anterior.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque este versículo no contiene el nombre divino.
  - '''Juraron'' se eligió para el valor oath-binding del verbo ge''ez, sin sustituirlo por un simple ''dijeron''.'
  - '''Se impusieron una maldición'' busca conservar el peso ritual/jurídico del anatema sin perder legibilidad en español.'
  - '''Acerca de ello'' conserva el pronombre indefinido del original sin precisar innecesariamente el objeto del juramento.'
