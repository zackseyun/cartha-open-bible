revisions:
- from: Entonces todos juraron juntos y se impusieron una maldición unos a otros acerca de ello[a][b][c].
  to: Entonces todos juraron juntos y se ligaron unos a otros con una maldición sobre esto[a][b][c].
  rationale: 'Se revisa para alinear mejor el español con la decisión auditada en inglés: el pasaje no solo habla de maldecirse, sino de ligarse mutuamente con una maldición en el contexto de un juramento. ''Se ligaron unos a otros con una maldición'' preserva mejor esa fuerza concreta y recíproca. También se cambia ''acerca de ello'' por ''sobre esto'' para una lectura más natural y digna en español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:53:07Z'
review_pass:
