  glossary_alignment: 'No hay términos del glosario teológico principal en juego. La transliteración «Ardis» es adecuada. La elección verbal debe reflejar la decisión auditada del POB inglés: preferencia por una forma narrativa natural equivalente a «came down», con «descended/descendieron» como alternativa más formal.'
