translation:
  language: es
  text: Y todos ellos eran doscientos[a], y bajaron a Ardis[b], que es la cumbre del monte Hermón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre del lugar «Ardis» es incierto en la transliteración. El ge'ez lo presenta como la ubicación identificada con la cumbre del monte Hermón.
    reason: lexical_alternative
  - marker: b
    text: Algunos traductores vierten el verbo con más formalidad como «descendieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: ኵሎሙ
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - todos juntos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sufijo pronominal expresa la totalidad del grupo ya mencionado; «todos ellos» conserva esa referencia colectiva de forma natural en español.
- source_word: ክልኤ ምእት
  english_pob_choice: two hundred
  chosen_spanish: doscientos
  alternatives_spanish:
  - doscientos en número
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión es numérica directa; el español idiomático simple transmite con fidelidad la cantidad.
- source_word: ወወረዱ
  english_pob_choice: they came down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - vinieron abajo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo indica movimiento vertical hacia abajo. «Descendieron» mantiene mejor la elevación topográfica y el matiz narrativo de la bajada desde lo alto.
- source_word: ውስተ
  english_pob_choice: onto
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - hasta
  - hacia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Con un monte o altura, el valor locativo apunta a llegada a un lugar elevado. En español, «a Ardis» resulta más natural que una preposición demasiado literal.
- source_word: አርዲስ
  english_pob_choice: Ardis
  chosen_spanish: Ardis
  alternatives_spanish:
  - Ardish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es un nombre propio transliterado. Se conserva la forma más directa y auditable; la vocalización exacta es incierta.
- source_word: ዝውእቱ ድማኁ ለደብረ አርሞን
  english_pob_choice: which is the summit of Mount Hermon
  chosen_spanish: que es la cumbre del monte Hermón
  alternatives_spanish:
  - que es la cima del monte Hermón
  - que es la parte más alta del monte Hermón
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La cláusula identifica Ardis con el punto más alto del monte Hermón. «Cumbre» es claro, elevado y fiel al valor topográfico del original.
theological_decisions:
- issue: Movimiento descendente de los Vigilantes
  english_pob_reading: they came down
  chosen_spanish_reading: descendieron
  alternative_spanish_readings:
  - bajaron
  - vinieron abajo
  rationale: La escena conserva la imaginería apocalíptica de un descenso real desde lo alto. «Descendieron» es preciso sin añadir formulación doctrinal ajena al texto.
  doctrine_reference: Preservar la imagen narrativa del descenso transgresor sin suavizarla.
translation_notes:
  revision_awareness: 'Se siguió el texto ge''ez y el audit trail en inglés: se mantuvo la cifra exacta, el descenso vertical y la identificación geográfica de Ardis con la cumbre del monte Hermón. No hubo revisiones aplicadas en la pasada más reciente.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y terminología cristiana tradicional no pertinente; este versículo no contiene nombres divinos ni cristológicos.
  - «Hermón» se conserva como nombre propio conocido en español bíblico.
  - La preposición se ajustó a la sintaxis natural del español, sin perder la idea de llegada a una altura.
