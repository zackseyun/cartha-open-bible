translation:
  language: es
  text: 'Y los ángeles[a], los hijos del cielo, las vieron y las desearon. Y se dijeron entre sí: «Vengan, escojamos para nosotros esposas[b] de entre los hijos de los hombres[c], y engendremos para nosotros hijos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre objeto remite a las mujeres mencionadas en el versículo anterior; el ge'ez no repite explícitamente «mujeres».
    reason: cross_reference
  - marker: b
    text: «Esposas» explicita el matiz marital que el contexto requiere; la expresión subyacente también podría traducirse de manera más literal como «mujeres».
    reason: lexical_alternative
  - marker: c
    text: «Hijos de los hombres» conserva el giro elevado y contrastivo del original; también puede entenderse como «hijos de la humanidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርእዩ
  english_pob_choice: and they saw
  chosen_spanish: y los vieron
  alternatives_spanish:
  - y los miraron
  - y los observaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez expresa visión directa y narrativa; «vieron» conserva esa sencillez sin añadir matiz interpretativo.
- source_word: ኪያሆን
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - las
  - a ellos/ellas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El referente son las mujeres del verso anterior; en español se requiere marcar el objeto directo. «Los» funciona aquí como objeto pronominal plural en estilo neutral, aunque el referente semántico sea femenino.
- source_word: መላእክት ውሉደ ሰማያት
  english_pob_choice: the angels, the sons of heaven
  chosen_spanish: los ángeles, los hijos del cielo
  alternatives_spanish:
  - los ángeles, hijos del cielo
  - los seres celestiales
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la apposición explícita entre «ángeles» e «hijos del cielo». «Cielo» traduce el contraste elevado del sintagma sin neutralizarlo en una categoría más genérica.
- source_word: ወፈተውዎን
  english_pob_choice: and they desired them
  chosen_spanish: y los desearon
  alternatives_spanish:
  - y los codiciaron
  - y sintieron deseo por ellos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Desearon» reproduce la fuerza del verbo sin añadir de forma demasiado explícita una carga sexual que el ge'ez no formula de manera literal. La gravedad moral queda en el contexto.
- source_word: በበይናቲሆሙ
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - entre ellos mismos
  - unos con otros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locución idiomática natural en español para hablar en consejo interno o conspirativo.
- source_word: ንዑ
  english_pob_choice: Come
  chosen_spanish: Venid
  alternatives_spanish:
  - Ven
  - Vamos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Como discurso colectivo, el imperativo plural comunica mejor la exhortación dirigida al grupo que habla.
- source_word: ንሕረይ ለነ አንስተ
  english_pob_choice: let us choose for ourselves wives
  chosen_spanish: escojamos para nosotros esposas
  alternatives_spanish:
  - tomemos para nosotros esposas
  - elijamos para nosotros mujeres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Escojamos» conserva el valor de seleccionar/elegir; «esposas» explicita la relación marital que el contexto sugiere y que el inglés POB también interpretó así.
- source_word: እምውሉደ ሰብእ
  english_pob_choice: from the children of men
  chosen_spanish: de entre los hijos de los hombres
  alternatives_spanish:
  - de entre los hijos de la humanidad
  - de entre los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se mantiene la expresión elevada y tradicional «hijos de los hombres» para conservar el contraste apocalíptico con los seres celestiales. El añadido «de entre» expresa mejor la selección del grupo.
- source_word: ወንለድ ለነ ውሉደ
  english_pob_choice: and let us beget children for ourselves
  chosen_spanish: y engendremos para nosotros hijos
  alternatives_spanish:
  - y seamos padres de hijos para nosotros
  - y procreemos para nosotros hijos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Engendremos» refleja con precisión el sentido de procrear/beget sin sonar demasiado técnico; «hijos» es el término más natural en español para el resultado del engendramiento.
theological_decisions:
- issue: Identificación doble de los seres como ángeles e hijos del cielo
  english_pob_reading: 'Preserve both designations appositionally: ''the angels, the sons of heaven'''
  chosen_spanish_reading: 'Conservar ambas designaciones en aposición: «los ángeles, los hijos del cielo»'
  alternative_spanish_readings:
  - «los ángeles» solamente
  - «los hijos del cielo» solamente
  - «los ángeles celestiales»
  rationale: El ge'ez nombra explícitamente a estos seres con ambos títulos. Mantenerlos evita aplanar la autoidentificación del texto y respeta la tensión propia de la escena de los Vigilantes.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: Grado de fuerza del verbo de deseo
  english_pob_reading: Use 'desired them' in the main text
  chosen_spanish_reading: Usar «los desearon»
  alternative_spanish_readings:
  - «los codiciaron»
  - «se encapricharon de ellos»
  - «los amaron»
  rationale: El contexto deja claro que se trata de un deseo ilícito, pero el verbo fuente expresa deseo sin exigir una glosa sexual más fuerte. «Desearon» preserva esa tensión y deja que el contexto haga el resto.
  doctrine_reference: Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail, que prefirió un registro formal para el cierre verbal («beget children»). En español se optó por «engendremos» para reflejar ese ajuste y mantener cercanía léxica al ge''ez, sin perder fluidez. También se respetó la corrección sintáctica observada en la revisión: los ángeles son el sujeto de «vieron» y «desearon», no el objeto.'
  spanish_consistency_notes:
  - Se conserva «ángeles» y no se sustituye por una perífrasis más doctrinalmente interpretativa.
  - Se traduce el contraste «hijos del cielo / hijos de los hombres» de forma paralela para mantener la estructura apocalíptica.
  - «Desearon» se mantiene como término medio entre literalidad y claridad, sin intensificar indebidamente el verbo.
  - El discurso directo mantiene un plural exhortativo («Venid», «escojamos», «engendremos») acorde con el sujeto plural.
