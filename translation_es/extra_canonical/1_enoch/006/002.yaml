base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/006/002.yaml
  text: And the angels[a], the sons of heaven, saw them and desired them. And they said among themselves, “Come, let us choose for ourselves wives from the children of men[d][c][b], and let us beget children for ourselves.”
  footnotes:
  - marker: a
    text: The pronoun 'them' refers back to the women mentioned in the previous verse; the Ge'ez here does not restate 'women' explicitly.
    reason: cross_reference
  - marker: b
    text: '''Children of men'' is a literal, elevated expression contrasting human offspring with the heavenly beings in this scene; it may also be rendered ''children of humankind.'''
    reason: lexical_alternative
  - marker: c
    text: The final clause literally has the sense of begetting offspring; 'father children' is used for natural modern English.
    reason: lexical_alternative
  - marker: d
    text: Or 'And they saw them, the angels, the sons of heaven, and they desired them.'.
    reason: previous_rendering
