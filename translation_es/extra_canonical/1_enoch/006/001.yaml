translation:
  language: es
  text: Y aconteció[a], cuando los hijos de los hombres se habían multiplicado en aquellos días, que les nacieron hijas, hermosas y agraciadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos de los hombres». La expresión ge'ez es un designación humana convencional y prepara el contraste con los Vigilantes en los versículos siguientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወኮነ
  english_pob_choice: And it came to pass
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y vino a pasar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula narrativa solemne que introduce un nuevo episodio. «Aconteció» conserva el registro elevado sin sonar arcaico en exceso.
- source_word: እምዘ በዝኁ
  english_pob_choice: when ... had multiplied
  chosen_spanish: cuando los hijos de los hombres se habían multiplicado
  alternatives_spanish:
  - después de que los hijos de los hombres se multiplicaron
  - cuando los hijos de los hombres aumentaron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La construcción marca la circunstancia temporal del evento. El pluscuamperfecto en español refleja bien la idea de que la multiplicación ya había ocurrido en ese momento narrativo.
- source_word: ውሉደ ሰብእ
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los hijos de la humanidad
  - los seres humanos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la expresión idiomática tradicional y su contraste con los vigilantes en el contexto inmediato. En español, «hijos de los hombres» sigue siendo comprensible y mantiene la fuerza literaria del giro.
- source_word: በእማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquel tiempo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es una fórmula temporal apocalíptica estable. «Aquellos días» preserva el tono narrativo y la distancia temporal.
- source_word: ተወልዳ ሎሙ አዋልድ
  english_pob_choice: daughters were born to them
  chosen_spanish: les nacieron hijas
  alternatives_spanish:
  - les fueron nacidas hijas
  - hijas les nacieron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez expresa la pasiva de manera natural; en español, la construcción con dativo resulta más fluida y fiel. Mantiene la idea de que las hijas fueron dadas a ellos por nacimiento.
- source_word: ሠናያት
  english_pob_choice: beautiful
  chosen_spanish: hermosas
  alternatives_spanish:
  - bellas
  - bonitas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Denota belleza física o agradable apariencia. «Hermosas» es natural, digno y no reduce el alcance semántico.
- source_word: ወላሕያት
  english_pob_choice: comely
  chosen_spanish: agraciadas
  alternatives_spanish:
  - atractivas
  - lozanas
  - compuestas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La segunda cualidad intensifica la primera y añade gracia/apariencia agradable. «Agraciadas» conserva la distinción sin repetir simplemente «bellas» y mantiene el matiz estilístico elevado.
theological_decisions:
- issue: La expresión antropológica frente a seres celestiales en el contexto inmediato
  english_pob_reading: the children of men
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - los hijos de la humanidad
  - los seres humanos
  rationale: Se preserva la fórmula idiomática para no diluir el contraste narrativo con los vigilantes que aparece en los versículos siguientes. La traducción no resuelve la tensión antropológica; la deja visible como parte del texto.
  doctrine_reference: Preservar la tensión lexical y narrativa sin harmonizarla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto ge'ez y el aparato auditado en inglés POB. Se conservó la fórmula narrativa, el valor temporal de la cláusula y la expresión antropológica tradicional, ajustando solo la sintaxis para un español natural y publicable.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantuvo «hijos de los hombres» como equivalente idiomático de la fórmula ge'ez, en vez de generalizar a «seres humanos».
  - «Hermosas y agraciadas» reproduce la doble descripción del original sin fusionar los dos adjetivos en uno solo.
