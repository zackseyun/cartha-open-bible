translation:
  language: es
  text: La Sabiduría no halló lugar donde pudiera habitar, y su morada estaba en los cielos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge’ez usa el plural «cielos», una forma apocalíptica común para hablar del ámbito celestial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ጥበብ
  english_pob_choice: Wisdom
  chosen_spanish: la Sabiduría
  alternatives_spanish:
  - la sabiduría
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva la personificación del sustantivo, como en el audit trail inglés. La mayúscula ayuda a marcar que no se trata solo de una cualidad abstracta, sino de una figura actuante.
- source_word: መካነ
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - lugar de morada
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Lugar’ es el equivalente más natural y fiel para el término espacial básico, sin forzar una ampliación innecesaria.
- source_word: ኢረከበት
  english_pob_choice: found no place
  chosen_spanish: no halló lugar
  alternatives_spanish:
  - no encontró lugar
  - no obtuvo lugar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Halló’ reproduce bien el valor de encontrar, y ‘no halló lugar’ conserva la concisión idiomática del sentido original.
- source_word: ኀበ ተኃድር
  english_pob_choice: where she might dwell
  chosen_spanish: donde pudiera habitar
  alternatives_spanish:
  - donde pudiera morar
  - en que pudiera habitar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Habitar’ preserva el registro elevado de ‘dwell’ y sugiere residencia estable. El subjuntivo ‘pudiera’ refleja adecuadamente la posibilidad buscada.
- source_word: ወ
  english_pob_choice: and ... was
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - e
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión más reciente del audit trail prefiere el valor copulativo/consecutivo de la conjunción ge’ez. En español, ‘y’ preserva esa parataxis sin imponer contraste.
- source_word: ማኅደራ
  english_pob_choice: her dwelling
  chosen_spanish: su morada
  alternatives_spanish:
  - su habitación
  - su residencia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ‘Morada’ mantiene el tono bíblico y el paralelo con ‘habitar’, a la vez que suena natural en español actual.
- source_word: ውስተ ሰማያት
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se conserva el plural ‘cielos’, que refleja mejor la forma ge’ez y el registro apocalíptico que la singularización.
theological_decisions:
- issue: Personificación de la Sabiduría
  english_pob_reading: 'Preserve personification: ''Wisdom found no place where she might dwell'''
  chosen_spanish_reading: 'Preservar la personificación: ''La Sabiduría no halló lugar donde pudiera habitar'''
  alternative_spanish_readings:
  - No había lugar para que la sabiduría habitara
  - La sabiduría no encontró morada
  rationale: El pasaje presenta a la Sabiduría como sujeto activo. Traducirla como figura personificada mantiene la imaginería sapiencial-apocalíptica y evita reducirla a una abstracción.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it; book-context note on preserving visionary imagery.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión reciente: la conjunción ge’ez ወ pasó de una lectura adversativa (''but'') a una copulativa/consecutiva (''and''). La versión española sigue esa adjudicación y evita introducir contraste que el texto no exige.'
  spanish_consistency_notes:
  - Se usa ‘Sabiduría’ con mayúscula para reflejar la personificación, siguiendo el criterio del POB en inglés.
  - Se prefirió ‘cielos’ en plural para mantener el matiz del ge’ez y la tonalidad apocalíptica.
  - ‘Habitar’ y ‘morada’ conservan el campo semántico de residencia estable sin rebajar el registro.
