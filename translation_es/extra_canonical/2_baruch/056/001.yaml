  language: en
  yaml_path: translation/extra_canonical/2_baruch/056/001.yaml
  text: 'That great cloud which you saw ascending from the sea and going to cover the earth—understand this: it is the ordering of the world which the Mighty One made when he resolved to create it.[1][2] And it came to pass that, when the word went forth from before him, the establishment of the world arose—fair and small—and it was prepared as it was fitting to be.[3]


    And as for the first black waters which you saw descending from that cloud, this is the sin and transgression which the first Adam committed first. For when he transgressed, death was stirred up before its time, and mourning became known, and afflictions were prepared, and pains were created, and toil was completed; and greatness began to wane.


    And the last day, which appeared in a form and took on a likeness—you will know that the time will be sought, and the measure of humanity will be measured, and its strength will be tested.[4][5]


    Therefore, because Adam—when he heard from God something of what was to be, and understood that the release of the dead had been given, and had been commanded by God—considered, and he thought five thoughts: for he was condemning himself; he was also condemning the angels; and even at the time when he was created in it, there was for him a seen vision, and the fierce living creatures, and the elements with fire.[6][7]


    And thus God gathered in time, in the likeness in which they had been created.'
  footnotes:
  - marker: a
    text: Or 'this is the transgression which Adam the first transgressed'.
    reason: previous_rendering
  - marker: b
    text: Or 'five thoughts were thought'.
    reason: previous_rendering
