  - severity: medium
    issue: ‘La muerte fue removida antes de su tiempo’ no representa bien el verbo siriaco.
    rationale: ܐܬܬܙܝܥ se entiende mejor como ‘fue agitada’, ‘fue despertada’ o ‘se puso en marcha’; ‘removida’ en español sugiere quitar/eliminar, casi lo contrario del sentido contextual.
  - severity: medium
    issue: ‘En una forma’ borra el matiz de pequeñez/diminución de ܒܨܘܪܬܐ.
    rationale: La auditoría léxica documenta ‘in littleness/smallness’; aunque el pasaje sea difícil, el español debe conservar ese rasgo o al menos señalarlo con mayor fidelidad.
  - severity: medium
    issue: ‘El perdón de los muertos’ queda ambiguo en español.
    rationale: Puede leerse como un genitivo posesivo (‘el perdón que pertenece a los muertos’) en vez de ‘el perdón para los que habían muerto’; una pequeña aclaración mejora la fidelidad semántica.
  - severity: low
    issue: ‘Había para él una visión vista’ es excesivamente torpe.
    rationale: La tautología del siriaco puede preservarse con una formulación más española, como ‘se le mostró una visión’ o ‘tuvo una visión manifiesta’, sin domesticar del todo la rareza.
