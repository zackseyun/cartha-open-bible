revisions:
- from: 'Esa gran nube que viste subir del mar y cubrir la tierra —entiende esto— es el ordenamiento del mundo que el Poderoso hizo cuando resolvió crearlo.[a][b] Y aconteció que, cuando salió la palabra de delante de él, se levantó el establecimiento del mundo —hermoso y pequeño— y fue preparado como era conveniente que fuera.[c]


    Y en cuanto a las primeras aguas negras que viste descender de esa nube, esto es el pecado y la transgresión que el primer Adán cometió primero. Porque, cuando transgredió, la muerte fue removida antes de su tiempo, y el lamento llegó a ser conocido, y se prepararon las aflicciones, y se crearon los dolores, y se completó el toil; y la grandeza comenzó a declinar.


    Y el último día, que apareció en una forma y tomó una semejanza —sabrás que el tiempo será demandado, y la medida de la humanidad será medida, y su fuerza será probada.[d][e]


    Por tanto, debido a que Adán —cuando oyó de Dios algo de lo que iba a suceder, y entendió que el perdón de los muertos había sido dado, y había recibido un mandamiento de Dios— consideró, y pensó cinco pensamientos: pues él mismo se hacía culpable; también se hacía culpable ante los ángeles; y aun en el tiempo en que fue creado en él, había para él una visión vista, y las criaturas vivientes feroces, y los elementos con fuego.[f][g]


    Y así Dios reunió en su tiempo, en la semejanza en que habían sido creados.'
