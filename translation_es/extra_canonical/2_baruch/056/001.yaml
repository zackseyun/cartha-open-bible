  - juntó en el tiempo
  lexicon: Sokoloff (Syriac)
  rationale: Conserva la idea de orden temporal divino sin añadir ‘todas las cosas’ que no está explícito en el texto base.
- source_word: ܒܕܡܘܬܐ
  english_pob_choice: in the likeness
  chosen_spanish: en la semejanza
  alternatives_spanish:
  - en la imagen
  - según la semejanza
  lexicon: Sokoloff (Syriac)
  rationale: ‘Semejanza’ mantiene la raíz semántica y la conexión con la línea anterior sobre la forma del último día.
theological_decisions:
- issue: Sentido de la gran nube que sube del mar
  english_pob_reading: It symbolizes the Creator’s ordering/arrangement of the world at creation as the word goes forth.
  chosen_spanish_reading: Simboliza el ordenamiento del mundo al momento de la creación, cuando sale la palabra divina.
  alternative_spanish_readings:
  - Simboliza un imperio
  - Simboliza el avance del juicio
  rationale: La explicación inmediata del texto la vincula con la creación, no con un poder político ni con un simple esquema de juicio.
  doctrine_reference: Creación y providencia divina
- issue: ‘La muerte fue removida antes de su tiempo’ tras el pecado de Adán
  english_pob_reading: Adam’s sin introduced mortality and its train prematurely, contrary to the original order.
  chosen_spanish_reading: El pecado de Adán introdujo la muerte y sus consecuencias antes del tiempo previsto.
  alternative_spanish_readings:
  - Adán murió antes de su tiempo personal
  - La muerte era inevitable pero no prematura
  rationale: La expresión apunta a una dislocación del orden creacional, no solo a la biografía individual de Adán.
  doctrine_reference: Caída y mortalidad
- issue: La frase sobre el último día y la prueba de la humanidad
  english_pob_reading: An eschatological note signals that the end will be marked by the demanded time, the erasure of the semblance of humanity, and the breaking of its power.
  chosen_spanish_reading: 'La sección anuncia un horizonte escatológico de rendición de cuentas: el tiempo será exigido y la humanidad será medida y probada.'
  alternative_spanish_readings:
  - Solo una referencia al día de muerte de Adán
  - Una metáfora de otro periodo histórico
  rationale: El contexto apocalíptico de medida y prueba favorece una lectura de juicio final.
  doctrine_reference: Escatología y juicio
- issue: ‘El perdón de los muertos’ asociado con Adán
  english_pob_reading: Adam understood that forgiveness would be given to those who had died.
  chosen_spanish_reading: Adán entendió que Dios otorgaría perdón respecto de los muertos.
  alternative_spanish_readings:
  - Adán perdonó a los muertos
  - El perdón era solo para Adán
  rationale: La pasiva y el marco teológico indican un don divino, no una acción de Adán como otorgante.
  doctrine_reference: Misericordia divina y esperanza futura
- issue: La ambigua clausula final sobre visión, criaturas vivientes y elementos con fuego
  english_pob_reading: References to a seen vision, fierce living creatures, and the elements, likely in an eschatological register.
  chosen_spanish_reading: Se conserva la secuencia críptica de visión, criaturas vivientes feroces y elementos con fuego sin resolverla artificialmente.
  alternative_spanish_readings:
  - Aludir a bestias literales
  - Convertirlo en categorías filosóficas griegas
  rationale: El texto es deliberadamente denso; es preferible no borrar su ambigüedad ni domesticarla con una explicación no apoyada.
  doctrine_reference: Visión apocalíptica
translation_notes:
  revision_awareness: 'Alineado con la última revisión inglesa auditada y con las correcciones de control: se sigue ‘ordering of the world’, se evita cualquier expansión no explícita, se mantiene ‘sin and transgression’, se conserva la rareza de la lista sobre Adán y se respeta la lectura de ‘five thoughts’. Donde la fuente siriaca y la tradición inglesa muestran tensión (especialmente en la clausula final), el español la deja visible en vez de resolverla con paráfrasis.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el Tetragrámaton; aquí el texto presenta una designación divina general, por lo que se traduce ‘Dios’ / ‘el Poderoso’.
  - Se mantiene ‘Adán’ con artículo solo en la expresión ‘el primer Adán’ para reflejar la función adjetival del original.
  - 'Se conserva el paralelismo de dos pares semánticos: ‘pecado y transgresión’ y ‘aflicciones / dolores’.'
  - La traducción procura ser publicable, pero deja notas donde el siriaco es oscuro o la tradición auditada discierne entre varias posibilidades.
