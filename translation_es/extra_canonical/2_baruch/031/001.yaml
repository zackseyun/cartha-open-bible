translation:
  language: es
  text: 'Y sucedió después de estas cosas que fui al pueblo y les dije: «Reúnan para mí a sus ancianos y a sus hijos, y les comunicaré mis palabras[a]».


    Y todos se reunieron en el valle de Quedrón.


    Y les pregunté y les dije:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y hablaré mis palabras con ellos».'
    reason: El inglés auditado conserva de cerca el posesivo y la relación interlocutiva del siríaco; la nota preserva esa alternativa más literal, mientras el texto principal usa un español más natural.
lexical_decisions:
- source_word: ܗܘܐ ܡܢ ܒܬܪ ܗܠܝܢ
  english_pob_choice: And it happened after these things
  chosen_spanish: Y sucedió después de estas cosas
  alternatives_spanish:
  - Y aconteció después de estas cosas
  - Y ocurrió después de estas cosas
  lexicon: Smith
  rationale: Mantiene la fórmula narrativa solemne sin sonar arcaica de más. «Sucedió» conserva el inicio de transición histórica.
- source_word: ܐܙܠܬ ܐܢܐ ܠܘܬ ܥܡܐ
  english_pob_choice: I went to the people
  chosen_spanish: fui al pueblo
  alternatives_spanish:
  - me acerqué al pueblo
  - fui hacia el pueblo
  lexicon: Smith
  rationale: El Syriac indica movimiento hacia el pueblo; «al pueblo» suena natural en español y mantiene el sentido colectivo.
- source_word: ܣܒܝܟܘܢ
  english_pob_choice: your elders
  chosen_spanish: sus ancianos
  alternatives_spanish:
  - sus viejos
  - sus mayores
  lexicon: Smith
  rationale: La lectura controlada es «ancianos» en sentido de líderes respetados del pueblo, no simplemente personas de edad avanzada.
- source_word: ܒܢܝ̈ܟܘܢ
  english_pob_choice: your children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus descendientes
  - sus pequeños
  lexicon: Smith
  rationale: La forma más directa y transparente en español es «hijos». Mantiene el paralelo familiar del texto.
- source_word: ܟܢܫܘ
  english_pob_choice: Gather
  chosen_spanish: Reúnan
  alternatives_spanish:
  - Junten
  - Congreguen
  lexicon: Smith
  rationale: «Reúnan» conserva el mandato colectivo y es natural en español bíblico sin cargarlo con registro eclesiástico específico.
- source_word: ܡܠܝ
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis palabras propias
  lexicon: Smith
  rationale: El sufijo posesivo obliga a expresar la posesión en español. «Mis palabras» reproduce de manera limpia el énfasis del original.
- source_word: ܥܡܗܘܢ
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - entre ellos
  - para ellos
  lexicon: Smith
  rationale: La preposición «con» refleja la relación de discurso compartido indicada por el Syriac y evita una idea de dirección incorrecta.
- source_word: ܒܚܠܬܐ ܕܩܕܪܘܢ
  english_pob_choice: in the valley of Kidron
  chosen_spanish: en el valle de Quedrón
  alternatives_spanish:
  - en el valle de Cedrón
  - en el valle de Kidrón
  lexicon: Smith
  rationale: Se conserva el topónimo tradicional en español bíblico con la grafía «Quedrón», equivalente de Kidron/Cedron.
- source_word: ܐܡܪ
  english_pob_choice: said
  chosen_spanish: les dije
  alternatives_spanish:
  - les hablé
  - les pregunté
  lexicon: Smith
  rationale: El verbo de habla requiere una traducción directa en primera persona. «Les dije» mantiene la introducción del discurso.
- source_word: ܫܡܥ
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Oíd
  lexicon: Smith
  rationale: Aunque el texto disponible de este versículo concluye antes de la exhortación completa, si el mandamiento apareciera en la continuidad inmediata, «Escuchen» sería el equivalente español más natural del llamado solemne.
theological_decisions:
- issue: Alcance del mandato comunitario
  english_pob_reading: Gather to me your elders and your children
  chosen_spanish_reading: Reúnan para mí a sus ancianos y a sus hijos
  alternative_spanish_readings:
  - Traigan para mí a sus ancianos y a sus hijos
  - Congréguenme a sus ancianos y a sus hijos
  rationale: 'La instrucción preserva la amplitud comunitaria del original: no sólo líderes, sino también los hijos. Se evita reducirlo a una convocatoria genérica.'
  doctrine_reference: Preserve theological tension and covenantal imagery rather than flattening it.
- issue: Verbo de interlocución final
  english_pob_reading: And I asked and said to them
  chosen_spanish_reading: Y les pregunté y les dije
  alternative_spanish_readings:
  - Y les interrogué y les dije
  - Y les hablé y les dije
  rationale: El Syriac audit trail señala un verbo que no conviene suavizar. «Pregunté» conserva la apertura del intercambio y respeta la revisión textual frente a una lectura más libre.
  doctrine_reference: Do not flatten prophetic or liturgical imagery.
translation_notes:
  revision_awareness: The English audit trail shows a narrowing of 31:1 to exclude material from the following verses and a later correction from a misread addressee ('you') back to the source's 'with them'. The Syriac packet also contains a likely OCR/edition instability around the final verbal phrase, so the Spanish follows the audited English revision and the source note without importing extra verse material.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «Quedrón» para el topónimo bíblico de uso reconocible en español.
  - Se evita «congregar» para no imponer un registro eclesiástico más marcado que el del mandato simple del texto.
  - La puntuación abre y cierra la cita directa de forma estándar en español.
  - No se añaden notas al pie porque el versículo no presenta una ambigüedad española que requiera anclaje textual en este recorte.
