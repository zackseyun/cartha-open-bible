translation:
  language: es
  text: ¿O quién de entre los nacidos puede esperar llegar a estas cosas, a menos que sea uno a quien muestras misericordia y tratas con gracia[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'le concedes tu favor'. La expresión procura conservar la distinción entre 'misericordia' y 'gracia' presente en el texto, en un español natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: who among those born
  english_pob_choice: who among those born
  chosen_spanish: quién de los nacidos
  alternatives_spanish:
  - cuál de los nacidos
  - quién entre los nacidos
  lexicon: relative interrogative + participial adjective
  rationale: Mantiene la pregunta retórica y el matiz inclusivo de pertenencia al grupo humano nacido; 'de los nacidos' conserva la generalidad antropológica del original sin introducir una paráfrasis como 'ser humano'.
- source_word: hope to come to these things
  english_pob_choice: can hope to come to these things
  chosen_spanish: puede esperar llegar a estas cosas
  alternatives_spanish:
  - puede esperar alcanzar estas cosas
  - puede anhelar llegar a estas cosas
  lexicon: vernacular aspect of hope + motion toward a goal
  rationale: '''Esperar llegar'' reproduce la idea de aspiración con un destino alcanzado; ''llegar a estas cosas'' es más natural en español que un calco rígido y conserva la referencia deíctica a ''estas cosas''.'
- source_word: show mercy
  english_pob_choice: you show mercy
  chosen_spanish: tú muestras misericordia
  alternatives_spanish:
  - tú tienes misericordia
  - tú ejerces misericordia
  lexicon: רחם/ἐλεέω-style mercy lexeme
  rationale: '''Muestras misericordia'' expresa el acto divino de conceder compasión de manera directa y readable; se mantiene el complemento verbal sin sustituirlo por un sustantivo abstracto.'
- source_word: are gracious
  english_pob_choice: are gracious
  chosen_spanish: eres benigno
  alternatives_spanish:
  - eres clemente
  - eres lleno de gracia
  lexicon: gracious / favor-giving descriptor
  rationale: '''Benigno'' preserva la cualidad de benevolencia activa y evita duplicar mecánicamente ''gracia'' con ''gracioso'' o una repetición pleonástica de ''misericordia''. En español bíblico, ''benigno'' comunica bien la disposición favorable y gratuita.'
theological_decisions:
- issue: Relación entre 'misericordia' y 'gracia/benignidad' como dos rasgos divinos
  english_pob_reading: you show mercy and are gracious
  chosen_spanish_reading: tú muestras misericordia y eres benigno
  alternative_spanish_readings:
  - tú tienes misericordia y eres clemente
  - tú muestras misericordia y eres lleno de gracia
  rationale: El inglés distingue dos atributos relacionados pero no idénticos. El español mantiene esa tensión con 'misericordia' y 'benigno', evitando colapsarlos en una sola idea. 'Benigno' conserva la gratuidad favorable sin borrar la diferencia semántica.
  doctrine_reference: Sal 103:8; Ex 34:6; Ef 2:4-5
translation_notes:
  revision_awareness: La revisión inglesa reciente solo suavizó la apertura de 'which of those born' a 'who among those born'. La traducción española sigue ya esa lectura natural con 'quién de los nacidos', sin depender de la forma anterior corregida.
  spanish_consistency_notes:
  - Se mantiene 'misericordia' para el rasgo compasivo y 'benigno' para el segundo predicado, a fin de no perder la distinción del inglés POB.
  - Se conserva el registro reverente pero moderno, evitando arcaísmos innecesarios.
  - No se introduce 'SEÑOR' ni 'Cristo', pues el versículo no contiene esos términos.
