translation:
  language: es
  text: Pero nosotros, los que vivimos[a], si sabemos por qué hemos venido y nos sometemos[b] a aquel que nos sacó[c] de Egipto, volveremos, y recordaremos lo que ha pasado, y nos regocijaremos por lo que fue.
