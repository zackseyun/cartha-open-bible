lexical_decisions:
- source_word: ḥya
  english_pob_choice: we who live
  chosen_spanish: los que vivimos
  alternatives_spanish:
  - los que permanecemos
  - los que quedamos
  lexicon: Syriac ḥya
  rationale: El contexto y la revisión auditada indican que el verbo significa 'vivir', no 'quedar/ permanecer'. 'Los que vivimos' preserva esa lectura con español natural y sobrio.
- source_word: mšaʿbdînan
  english_pob_choice: submit ourselves
  chosen_spanish: nos sometemos
  alternatives_spanish:
  - nos sujetamos
  - nos hemos sometido
  lexicon: Syriac participial form
  rationale: La forma participial pide una acción o condición en curso, no un acto concluido. 'Nos sometemos' conserva ese valor presente y la fuerza de la dependencia/subordinación.
- source_word: npaq
  english_pob_choice: brought us out
  chosen_spanish: nos sacó
  alternatives_spanish:
  - nos hizo salir
  - nos sacó fuera
  lexicon: Syriac npaq
  rationale: La revisión textual documenta que el verbo significa 'sacar' o 'hacer salir', especialmente en el marco del éxodo. 'Nos sacó' es fiel y fluido en español.
- source_word: Egypt
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: Topónimo bíblico
  rationale: '''Egipto'' es la forma estándar en español y mantiene la referencia histórica y bíblica sin expansión innecesaria.'
theological_decisions:
- issue: La condición de retorno y memoria aparece ligada a la obediencia/subordinación al Dios del éxodo.
  english_pob_reading: if we know why we came, and submit ourselves to him who brought us out from Egypt—we shall come again, and we shall remember what has passed, and rejoice over what was.
  chosen_spanish_reading: si sabemos por qué hemos venido y nos sometemos a aquel que nos sacó de Egipto, volveremos, y recordaremos lo que ha pasado, y nos alegraremos por lo que fue.
  alternative_spanish_readings:
  - si reconocemos por qué vinimos, y nos sujetamos...
  - si sabemos por qué llegamos, y nos subordinamos...
  rationale: La redacción conserva la estructura condicional y la relación causal del pasaje sin suavizar la obediencia exigida. 'Nos sometemos' mantiene la tensión teológica de sujeción al libertador del éxodo.
  doctrine_reference: Ex 20–24; memoria del éxodo y fidelidad del pueblo a Yahvé
translation_notes:
  revision_awareness: 'Se incorporaron las revisiones auditadas del inglés POB: se prefirió ''los que vivimos'' frente a ''los que permanecemos'', ''nos sometemos'' frente a un perfecto concluido, y ''nos sacó'' frente a ''nos hizo subir/traer''. No se añadieron cambios doctrinales no atestiguados por el texto fuente.'
  spanish_consistency_notes:
  - Se mantuvo 'Egipto' como topónimo bíblico estándar en español.
  - Se evitó 'SEÑOR' porque aquí el referente es el Dios del éxodo expresado por el contexto, no una convención de máscara editorial.
  - '''Volveremos'' y ''recordaremos'' conservan el futuro del resultado en la secuencia del pasaje.'
