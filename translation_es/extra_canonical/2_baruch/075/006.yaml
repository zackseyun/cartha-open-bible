translation:
  language: es
  text: Pues si tú, por compasión, no tienes misericordia de los seres humanos, los que están bajo tu mano derecha no pueden llegar a estas cosas, excepto los llamados en el número excelente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: human beings
  english_pob_choice: human beings
  chosen_spanish: los seres humanos
  alternatives_spanish:
  - la humanidad
  - los hombres
  lexicon: human beings
  rationale: «Seres humanos» conserva el alcance general y evita el masculino genérico ambiguo; mantiene el sentido antropológico amplio del inglés POB.
- source_word: in compassion, you have mercy
  english_pob_choice: in compassion, you have mercy
  chosen_spanish: en compasión, tengas misericordia
  alternatives_spanish:
  - por compasión, tengas misericordia
  - compadecido, tengas misericordia
  lexicon: have mercy
  rationale: Se conserva la relación semántica entre compasión y misericordia sin volverla una paráfrasis excesiva. «Tengas misericordia» refleja la acción verbal de la fuente.
- source_word: under your right hand
  english_pob_choice: under your right hand
  chosen_spanish: bajo tu mano derecha
  alternatives_spanish:
  - bajo tu diestra
  - sometidos a tu diestra
  lexicon: right hand
  rationale: «Mano derecha» es transparente y fiel; «diestra» sería posible, pero aquí la formulación literal resulta clara en español y conserva la imagen de dominio/protección.
- source_word: cannot come to these things
  english_pob_choice: cannot come to these things
  chosen_spanish: no pueden llegar a estas cosas
  alternatives_spanish:
  - no pueden venir a estas cosas
  - no pueden alcanzar estas cosas
  lexicon: come to
  rationale: «Llegar a estas cosas» mantiene la idea de acceso/arribo sin forzar un matiz interpretativo no explícito en el inglés POB.
- source_word: those who are called in the excellent number
  english_pob_choice: those who are called in the excellent number
  chosen_spanish: los que son llamados en el número excelente
  alternatives_spanish:
  - los llamados en el número excelente
  - los llamados al número excelente
  lexicon: called / excellent number
  rationale: Se preserva la construcción inusual «número excelente» tal como aparece en el inglés POB, porque el texto parece conservar una fórmula técnica o figurada que no debe normalizarse sin evidencia adicional.
theological_decisions:
- issue: Dependencia de la misericordia divina para el acceso a los bienes prometidos
  english_pob_reading: For unless, in compassion, you have mercy on human beings, those who are under your right hand cannot come to these things
  chosen_spanish_reading: Porque, a menos que tú, en compasión, tengas misericordia de los seres humanos, los que están bajo tu mano derecha no pueden llegar a estas cosas
  alternative_spanish_readings:
  - Porque, si no tienes compasión de los seres humanos...
  - Porque, a menos que tengas misericordia de la humanidad...
  rationale: 'La redacción española mantiene la condición explícita: el acceso a «estas cosas» depende de la misericordia divina. No se suaviza la necesidad ni se reemplaza la estructura condicional de la fuente.'
  doctrine_reference: Misericordia divina y elección en literatura judía del Segundo Templo
translation_notes:
  revision_awareness: Se siguió el texto inglés POB tal como quedó tras la revisión más reciente, sin cambios registrados; no se introdujeron notas textuales adicionales porque no hay aparato de variantes ni decisiones léxicas inestables en el paquete proporcionado.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y sobrio, acorde con una traducción bíblica auditada.
  - Se evitó sustituir «mano derecha» por una equivalencia litúrgica más interpretativa sin respaldo en el paquete de fuente.
  - Se conservó «número excelente» como rasgo distintivo del testimonio disponible, aun cuando suene inusual en español, para no borrar la tensión léxica del original.
