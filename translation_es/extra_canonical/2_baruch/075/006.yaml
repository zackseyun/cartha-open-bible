  revision_rationale: Se ajusta la sintaxis para un español más natural sin alterar la lógica condicional ni el contenido teológico. «Por compasión» mejora la idiomaticidad; «si tú... no tienes misericordia» expresa con claridad el valor de «unless»; y «los llamados» simplifica la frase final manteniendo la formulación técnica «número excelente».
