translation:
  language: es
  text: ¿O quién puede abarcar tu entendimiento?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܐܘ ܡܢܘ / “who can”
  english_pob_choice: who can
  chosen_spanish: ¿o quién puede
  alternatives_spanish:
  - ¿y quién puede
  - ¿quién puede
  lexicon: interrogative + modal
  rationale: Conserva la pregunta retórica del original y la opción disyuntiva inicial del inglés POB (“Or who...”), naturalizada en español con «¿o quién puede...?».
- source_word: ܡܕܥܟܘܢ / “grasp”
  english_pob_choice: grasp
  chosen_spanish: abarcar
  alternatives_spanish:
  - comprender
  - aprehender
  - captar
  lexicon: cognitive verb
  rationale: El verbo inglés apunta a entender plenamente, no solo a conocer. «Abarcar» comunica la imposibilidad de contener o comprender por completo el entendimiento divino sin forzar una lectura más técnica que el texto no exige.
- source_word: ܣܘܟܠܟ / “your understanding”
  english_pob_choice: your understanding
  chosen_spanish: tu entendimiento
  alternatives_spanish:
  - tu inteligencia
  - tu sabiduría
  - tu discernimiento
  lexicon: abstract noun
  rationale: «Entendimiento» reproduce de forma directa el sustantivo abstracto y mantiene el paralelismo con la pregunta retórica. Evita «inteligencia», que en español puede sonar más psicológica o moderna, y «sabiduría», que desplaza el foco.
theological_decisions:
- issue: Inaccesibilidad del entendimiento divino
  english_pob_reading: Or who can grasp your understanding?
  chosen_spanish_reading: ¿O quién puede abarcar tu entendimiento?
  alternative_spanish_readings:
  - ¿O quién puede comprender tu entendimiento?
  - ¿O quién puede conocer plenamente tu entendimiento?
  rationale: La frase expresa la incapacidad humana para abarcar plenamente la mente/entendimiento de Dios. «Abarcar» preserva esa tensión de amplitud e imposibilidad sin suavizarla.
  doctrine_reference: Job 11:7-9; Rom 11:33
translation_notes:
  revision_awareness: 'La revisión reciente no alteró el texto inglés: se mantuvo la lectura interrogativa breve y directa, sin notas añadidas. La versión española sigue esa misma concisión.'
  spanish_consistency_notes:
  - Se usa «Dios» solo cuando el texto lo requiera explícitamente; aquí el poseedor implícito del entendimiento permanece en segunda persona.
  - Se mantiene el tono retórico breve del original, sin expansión explicativa.
  - No se introduce vocabulario eclesiástico tradicional que no esté sustentado por el segmento fuente.
