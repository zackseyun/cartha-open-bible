translation:
  language: es
  text: ¿O quién puede contar los pensamientos de tu mente?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: count / recount
  english_pob_choice: count
  chosen_spanish: contar
  alternatives_spanish:
  - recontar
  - enumerar
  lexicon: 'Syríaco: verbo de contar/recontar en contexto interrogativo retórico'
  rationale: ‘Contar’ expresa de manera directa y natural la imposibilidad de medir o enumerar el contenido mental. Sigue la revisión inglesa que prefirió ‘count’ por su sentido más inmediato, sin añadir matices ajenos al original.
- source_word: thoughts
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - pensares
  - ideas
  lexicon: Sustantivo abstracto de contenido mental
  rationale: ‘Pensamientos’ conserva el valor amplio de contenidos de la mente y es la opción más transparente y bíblicamente reconocible en español, sin reducir el alcance a ‘ideas’ ni volverlo demasiado coloquial.
- source_word: mind
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - inteligencia
  - corazón
  lexicon: Término mental de referencia interior
  rationale: ‘Mente’ reproduce bien el campo semántico de la interioridad cognitiva. Se evita ‘corazón’ porque en español puede desplazar el foco hacia lo afectivo, y ‘entendimiento’ estrecha demasiado el sentido.
theological_decisions:
- issue: Pregunta retórica sobre la incomprensibilidad de Dios
  english_pob_reading: Or who can count the thoughts of your mind?
  chosen_spanish_reading: ¿O quién puede contar los pensamientos de tu mente?
  alternative_spanish_readings:
  - ¿Y quién puede contar los pensamientos de tu mente?
  - ¿O quién puede enumerar los pensamientos de tu mente?
  rationale: La formulación mantiene el tono interrogativo retórico y la imposibilidad implícita de abarcar la mente divina. Se conserva la segunda persona directa, que en contexto conserva la fuerza de la súplica o alabanza dirigida a Dios.
  doctrine_reference: Apocalíptica judía / incomprensibilidad divina
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de ‘recount’ a ‘count’ para acercarse más al sentido directo del original. El español refleja esa decisión con ‘contar’, evitando un verbo más explicativo.
  spanish_consistency_notes:
  - Se mantiene la segunda persona singular (‘tu’) como en la traducción inglesa auditada.
  - No se introduce ‘Señor’ ni ‘Cristo’; el versículo solo presenta un hablante que se dirige a Dios de forma implícita.
  - La puntuación española conserva la pregunta retórica simple y fluida.
