translation:
  language: es
  text: 'Y respondí y dije: «¿Quién puede comprender tu bondad, Señor? Porque es incomprensible[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque está más allá de toda comprensión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ܛܒܬܐ / bonitati tuae
  english_pob_choice: your goodness
  chosen_spanish: tu bondad
  alternatives_spanish:
  - tu benevolencia
  - tu benignidad
  lexicon: Payne Smith
  rationale: Se conserva la amplitud del atributo divino sin reducirlo solo a “amabilidad” o “beneficencia”. En español, “bondad” comunica con naturalidad una cualidad moral y benéfica de Dios.
- source_word: ܡܬܬܚܡܐ / incomprehensibilis
  english_pob_choice: beyond comprehension
  chosen_spanish: es incomprensible
  alternatives_spanish:
  - está más allá de toda comprensión
  - es inescrutable
  lexicon: Payne Smith
  rationale: La revisión auditada indica que la alternativa debe ser realmente distinta; “es incomprensible” preserva la tensión original y evita una paráfrasis excesiva. Como predicado en español suena natural y mantiene el sentido de lo inabarcable.
- source_word: ܡܪܝܐ / domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Señor mío
  lexicon: Uso bíblico común; el contexto mantiene apelación directa a Dios
  rationale: Aquí no hay indicio de que se quiera explicitar el nombre divino; la forma de vocativo litúrgico “Señor” reproduce la apelación reverente del original y del POB inglés.
theological_decisions:
- issue: Cómo rendir la imposibilidad de comprender la bondad divina
  english_pob_reading: For it is beyond comprehension.
  chosen_spanish_reading: Porque es incomprensible.
  alternative_spanish_readings:
  - Porque está más allá de toda comprensión.
  - Porque no se puede comprender.
  rationale: 'La frase preserva la afirmación teológica sin suavizarla: la bondad de Dios supera el alcance humano. Se evita resolver la tensión con una explicación más interpretativa que el texto.'
  doctrine_reference: Inasequibilidad/inefabilidad de los atributos divinos
- issue: Si debía introducirse una nota alternativa sobre el predicado
  english_pob_reading: Or 'For it is incomprehensible.'
  chosen_spanish_reading: 'Oración alternativa: «Porque es incomprensible» ya incorporada en el texto principal; se añade nota solo de variante léxica en inglés audit trail.'
  alternative_spanish_readings:
  - Porque es inescrutable.
  - Porque es inabarcable.
  rationale: El expediente inglés fue corregido porque la nota previa repetía la misma idea. En español, la redacción principal ya cubre adecuadamente la opción; la nota solo señala la posibilidad léxica sin duplicar el texto.
  doctrine_reference: Preservar tensión lexical sin redundancia editorial
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección auditada que exige una alternativa real para el adjetivo final; por eso la nota no repite exactamente la expresión del texto principal. También se añadió la clausura de comillas en la cita, conforme a la revisión tipográfica.
  spanish_consistency_notes:
  - Se usa «Señor» como vocativo directo, no como sustituto editorial del nombre divino.
  - La puntuación española cierra la cita de manera explícita.
  - Se evita una calca rígida de la sintaxis inglesa; la estructura responde al español natural sin añadir contenido interpretativo.
