  text: ¿O quién puede sondear tus misericordias, que no tienen fin?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mercies
  english_pob_choice: mercies
  chosen_spanish: misericordias
  alternatives_spanish:
  - compasiones
  - misericordias tuyas
  lexicon: Syriac ܪܚܡܐ / ḥemînā? (semantic field of mercy/compassion)
  rationale: «Misericordias» conserva el plural intensivo del inglés POB y expresa bien en español la amplitud de la compasión divina sin reducirla a una sola acción puntual.
- source_word: search out
  english_pob_choice: search out
  chosen_spanish: sondear
  alternatives_spanish:
  - buscar hasta descubrir
  - investigar a fondo
  lexicon: Syriac root for seeking/searching (context of unsearchable divine attributes)
  rationale: «Sondear» comunica en español la idea de explorar hasta el fondo lo insondable, manteniendo la fuerza retórica de una pregunta sobre lo imposible de agotar.
- source_word: without end
  english_pob_choice: without end
  chosen_spanish: que no tienen fin
  alternatives_spanish:
  - sin fin
  - infinitas
  lexicon: Syriac idiom of endlessness / boundlessness
  rationale: La frase «que no tienen fin» es natural en español y conserva la cualidad ilimitada sin convertirla en un adjetivo más interpretativo como «infinitas».
theological_decisions:
- issue: La misericordia divina como atributo inagotable
  english_pob_reading: your mercies, which are without end
  chosen_spanish_reading: tus misericordias, que no tienen fin
  alternative_spanish_readings:
  - tus compasiones, que son sin fin
  - tus misericordias infinitas
  rationale: Se conserva el atributo divino como algo inexhaustible e imposible de medir, sin suavizar la afirmación ni sustituirla por una paráfrasis devocional.
  doctrine_reference: Atributos incomprensibles de Dios; salmos y oraciones de alabanza sobre la misericordia divina
