translation:
  language: es
  text: Y no solo mataron a los impíos que estaban vivos, sino que también sacaron de las tumbas los huesos de los muertos y los quemaron con fuego.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: impious
  english_pob_choice: the impious
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los injustos
  lexicon: N/A
  rationale: «Impíos» conserva el matiz moral-religioso del término inglés y sugiere falta de reverencia hacia Dios, sin debilitarlo a un simple juicio social como «malvados».
- source_word: living
  english_pob_choice: who were living
  chosen_spanish: que estaban vivos
  alternatives_spanish:
  - vivos
  - que vivían
  lexicon: N/A
  rationale: «Que estaban vivos» reproduce con naturalidad la condición de los sujetos en español y mantiene el contraste explícito con «los muertos».
- source_word: bones
  english_pob_choice: the bones of the dead
  chosen_spanish: los huesos de los muertos
  alternatives_spanish:
  - los huesos de los difuntos
  - los huesos de los cadáveres
  lexicon: N/A
  rationale: «Los muertos» sigue de cerca la construcción inglesa y preserva el contraste entre vivos y muertos, sin añadir una nota funeraria ajena al texto.
- source_word: graves
  english_pob_choice: from the graves
  chosen_spanish: de las tumbas
  alternatives_spanish:
  - de los sepulcros
  - de las sepulturas
  lexicon: N/A
  rationale: «Tumbas» es claro y natural en español contemporáneo y mantiene el sentido locativo del original.
- source_word: burned with fire
  english_pob_choice: burned them with fire
  chosen_spanish: los quemaron con fuego
  alternatives_spanish:
  - los incendiaron
  - los quemaron en el fuego
  lexicon: N/A
  rationale: 'La expresión conserva el doble énfasis verbal del original: quemar y hacerlo con fuego, sin suavizar la violencia del acto.'
theological_decisions:
- issue: Violencia contra vivos y muertos en paralelo
  english_pob_reading: They killed the impious who were living, and also desecrated the dead by removing and burning the bones.
  chosen_spanish_reading: Mataron a los impíos vivos y profanaron a los muertos al sacar sus huesos de las tumbas y quemarlos.
  alternative_spanish_readings:
  - Mataron a los impíos que estaban vivos y además sacaron los huesos de los muertos de las tumbas y los quemaron con fuego.
  - No solo mataron a los impíos vivos, sino que también desenterraron los huesos de los muertos y los quemaron.
  rationale: La frase española mantiene el paralelismo entre homicidio y profanación funeraria que el inglés POB deja visible. No se introduce una interpretación más fuerte que el texto no exija; la profanación queda implícita en la acción de sacar y quemar los huesos.
  doctrine_reference: Respeto por los muertos / profanación de sepulcros
- issue: Sujeto plural consistente
  english_pob_reading: they
  chosen_spanish_reading: ellos/they implícito en el verbo
  alternative_spanish_readings:
  - él
  - ellos
  rationale: El texto griego/siríaco reflejado en la revisión inglesa armoniza el sujeto en plural; el español lo conserva con la flexión verbal, sin necesidad de pronombre explícito.
  doctrine_reference: Coherencia narrativa del sujeto
translation_notes:
  revision_awareness: La traducción inglesa fue revisada de «he» a «they» para armonizar el sujeto. La versión española sigue esa decisión y evita introducir un sujeto singular donde el audit trail final ya lo descartó.
  spanish_consistency_notes:
  - Se conserva el registro sobrio y violento del pasaje sin eufemismos.
  - Se evita la terminología eclesiástica posterior; «tumbas» funciona mejor que un término litúrgico más cargado.
  - No se introducen notas porque el texto español no genera una ambigüedad nueva que requiera marcar alternativa textual.
