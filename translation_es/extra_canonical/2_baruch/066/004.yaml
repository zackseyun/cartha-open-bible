translation:
  language: es
  text: Y a los hechiceros los quemó con fuego; y a los profetas mentirosos que estaban extraviando al pueblo, también los entregó a ser quemados. Y al pueblo que los había escuchado mientras ellos vivían, lo arrojó al arroyo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: workers of magic
  english_pob_choice: workers of magic
  chosen_spanish: hechiceros
  alternatives_spanish:
  - magos
  - hechiceros practicantes de magia
  lexicon: סריאק lexical equivalent for practitioners of magic
  rationale: En español, 'hechiceros' comunica con naturalidad la idea de personas dedicadas a prácticas mágicas, sin perder el matiz condenatorio del contexto. 'Magos' puede sonar demasiado amplio o positivo.
- source_word: burned with fire / gave over to burning
  english_pob_choice: he burned with fire / gave over to burning
  chosen_spanish: los quemó con fuego / los entregó a ser quemados
  alternatives_spanish:
  - los quemó con fuego / los entregó a la quema
  - los hizo quemar
  lexicon: verb of burning / causative handing over
  rationale: La primera mitad conserva la imagen directa de la acción con fuego. La segunda preserva la distinción del inglés entre quemar activamente y 'entregar' a esa ejecución, manteniendo el paralelo del fuente.
- source_word: lying prophets
  english_pob_choice: lying prophets
  chosen_spanish: profetas mentirosos
  alternatives_spanish:
  - falsos profetas
  - profetas falsos
  lexicon: prophets with deceptive falsehood
  rationale: '''Profetas mentirosos'' reproduce el juicio moral explícito del texto fuente y evita sustituirlo automáticamente por la fórmula eclesiástica más fija ''falsos profetas'' sin necesidad.'
- source_word: leading the people astray
  english_pob_choice: leading the people astray
  chosen_spanish: que estaban extraviando al pueblo
  alternatives_spanish:
  - que estaban desviando al pueblo
  - que engañaban al pueblo
  lexicon: deceptive leading astray
  rationale: '''Extraviar'' mantiene la idea de desorientar y apartar del camino, con buen registro bíblico en español. El progresivo ''estaban extraviando'' refleja la acción en curso del original.'
- source_word: cast into the brook
  english_pob_choice: cast into the brook
  chosen_spanish: lo arrojó al arroyo
  alternatives_spanish:
  - lo echó al arroyo
  - lo lanzó al arroyo
  lexicon: throw into stream/brook
  rationale: '''Arroyo'' es la opción más natural en español para un curso pequeño de agua y conserva el descenso físico del acto. ''Arrojó'' mantiene la violencia verbal del original.'
theological_decisions:
- issue: Retribución judicial contra prácticas mágicas y profecía engañosa
  english_pob_reading: The workers of magic he burned with fire; and the lying prophets... he gave over to burning.
  chosen_spanish_reading: Y a los hechiceros los quemó con fuego; y a los profetas mentirosos... también los entregó a ser quemados.
  alternative_spanish_readings:
  - Y a los magos los quemó con fuego; y a los falsos profetas...
  - Y a los hechiceros los hizo morir quemados...
  rationale: La versión española conserva la severidad judicial del pasaje sin suavizarla. Mantiene la diferencia entre la quema directa y la entrega a ser quemados, porque el texto distingue ambos actos.
  doctrine_reference: Retribución divina/judicial en narrativa apocalíptica; fidelidad al paralelismo del texto fuente
- issue: Responsabilidad de quienes escucharon a los profetas mientras vivían
  english_pob_reading: the people who had listened to them while they were alive
  chosen_spanish_reading: al pueblo que los había escuchado mientras vivían
  alternative_spanish_readings:
  - al pueblo que los oyó mientras estaban vivos
  - al pueblo que los había escuchado cuando aún vivían
  rationale: Se conserva la idea de escucha previa y la referencia temporal a la vida de esos profetas. La ambigüedad de 'mientras vivían' se mantiene porque forma parte del relieve narrativo del pasaje.
  doctrine_reference: Responsabilidad asociada a la escucha de falsos líderes en literatura judía apocalíptica
translation_notes:
  revision_awareness: El audit trail en inglés muestra una corrección de duplicación accidental tras el punto y coma; la base revisada deja una sola secuencia continua. La traducción española se ha construido sobre la forma depurada, sin duplicar la segunda mitad del versículo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece el Tetragrámaton.
  - '''Hechiceros'' y ''profetas mentirosos'' mantienen un registro bíblico comprensible sin reetiquetar el pasaje con fórmulas más tradicionales que el fuente no exige.'
  - Se evita 'falsos profetas' como sustituto automático para preservar el juicio verbal explícito de 'mentirosos'.
  - La construcción 'los entregó a ser quemados' conserva la pasiva causativa del inglés POB y la diferencia respecto de 'los quemó con fuego'.
