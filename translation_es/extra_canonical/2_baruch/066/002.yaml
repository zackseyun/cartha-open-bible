  text: And he cleansed the land from idols, and sanctified the vessels that had been defiled, and restored the offerings to the altar, and raised the horn of the holy ones, and exalted the righteous, and honored all who were wise in understanding. He also brought the priests back to their service, and removed the sorcerers, diviners, and wizards from the land.
