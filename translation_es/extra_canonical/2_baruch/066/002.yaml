translation:
  language: es
  text: Y limpió la tierra de los ídolos, y santificó los vasos que habían sido profanados, y devolvió las ofrendas al altar, y levantó el cuerno de los santos[a], y exaltó a los justos, y honró a todos los que eran sabios en entendimiento. También devolvió a los sacerdotes a su servicio, y quitó de la tierra a los hechiceros, adivinos y sortílegos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levantó el poder de los santos».
    reason: alternative_rendering_of_metaphor
  - marker: b
    text: O «hechiceros, adivinos y espiritistas».
    reason: alternative_rendering_of_occult_term
lexical_decisions:
- source_word: cleansed the land from idols
  english_pob_choice: cleansed the land from idols
  chosen_spanish: limpió la tierra de los ídolos
  alternatives_spanish:
  - purificó la tierra de los ídolos
  - limpió la tierra de idolatría
  lexicon: limpiar / purificar; ídolos
  rationale: ‘Limpió’ conserva la acción concreta y directa del POB inglés; ‘de los ídolos’ mantiene el objeto explícito sin suavizarlo a una abstracción más general.
- source_word: sanctified the vessels that had been defiled
  english_pob_choice: sanctified the vessels that had been defiled
  chosen_spanish: santificó los vasos que habían sido profanados
  alternatives_spanish:
  - consagró los vasos que habían sido profanados
  - santificó los utensilios que habían sido profanados
  lexicon: santificar; vasos
  rationale: ‘Santificó’ refleja el verbo cultual; ‘vasos’ conserva el término litúrgico tradicional y compatible con el contexto del templo, aunque ‘utensilios’ sería más explicativo.
- source_word: restored the offerings to the altar
  english_pob_choice: restored the offerings to the altar
  chosen_spanish: devolvió las ofrendas al altar
  alternatives_spanish:
  - restituyó las ofrendas al altar
  - volvió a llevar las ofrendas al altar
  lexicon: devolver / restituir; ofrendas; altar
  rationale: ‘Devolvió’ reproduce la idea de restauración de lo que había sido apartado; ‘ofrendas’ mantiene el sentido sacrificial general sin añadir precisión no explicitada.
- source_word: raised the horn of the holy ones
  english_pob_choice: raised the horn of the holy ones
  chosen_spanish: levantó el cuerno de los santos
  alternatives_spanish:
  - exaltó el poder de los santos
  - levantó el poder de los santos
  lexicon: cuerno; santos
  rationale: Se preserva la metáfora bíblica del ‘cuerno’ como símbolo de fuerza/exaltación, sin sustituirla por una paráfrasis interpretativa. ‘Santos’ traduce el grupo designado por el adjetivo sustantivado.
- source_word: exalted the righteous
  english_pob_choice: exalted the righteous
  chosen_spanish: exaltó a los justos
  alternatives_spanish:
  - elevó a los justos
  - ensalzó a los justos
  lexicon: exaltar; justo
  rationale: ‘Exaltó’ mantiene el paralelismo con el inglés POB y con el registro solemne del pasaje.
- source_word: honored all who were wise in understanding
  english_pob_choice: honored all who were wise in understanding
  chosen_spanish: honró a todos los que eran sabios en entendimiento
  alternatives_spanish:
  - honró a todos los entendidos
  - honró a todos los sabios de entendimiento
  lexicon: honrar; sabios en entendimiento
  rationale: ‘Todos los que eran sabios en entendimiento’ conserva la amplitud de ‘all’ y la cualidad de discernimiento sin fusionarla en una sola categoría más estrecha.
- source_word: brought the priests back to their service
  english_pob_choice: brought the priests back to their service
  chosen_spanish: volvió a poner a los sacerdotes en su servicio
  alternatives_spanish:
  - restituyó a los sacerdotes a su servicio
  - devolvió a los sacerdotes a su servicio
  lexicon: volver a poner / restituir; sacerdotes; servicio
  rationale: ‘Volvió a poner’ expresa restauración funcional de manera natural en español y mantiene la idea de reintegro al ministerio sacerdotal.
- source_word: removed the sorcerers, diviners, and wizards from the land
  english_pob_choice: removed the sorcerers, diviners, and wizards from the land
  chosen_spanish: quitó de la tierra a los hechiceros, adivinos y espiritistas
  alternatives_spanish:
  - expulsó de la tierra a los hechiceros, adivinos y espiritistas
  - quitó de la tierra a los magos, adivinos y espiritistas
  lexicon: hechiceros; adivinos; espiritistas
  rationale: ‘Espiritistas’ intenta capturar el tercer término como categoría de consulta/mediación oculta sin confundirlo con ‘pecadores’; ‘hechiceros’ y ‘adivinos’ siguen de cerca el triángulo de oficios prohibidos del contexto bíblico.
theological_decisions:
- issue: La metáfora del 'cuerno' en la elevación de los santos
  english_pob_reading: raised the horn of the holy ones
  chosen_spanish_reading: levantó el cuerno de los santos
  alternative_spanish_readings:
  - levantó el poder de los santos
  - exaltó la fuerza de los santos
  rationale: Se conserva la imagen bíblica concreta porque el texto la usa como símbolo de vigor/vindicación; traducirla como ‘poder’ o ‘fuerza’ aclararía, pero perdería la tensión metafórica documentada.
  doctrine_reference: Sal 132:17; 1 Sam 2:10; Dan 7:8
- issue: La identificación del tercer grupo expulsado
  english_pob_reading: sorcerers, diviners, and wizards
  chosen_spanish_reading: hechiceros, adivinos y espiritistas
  alternative_spanish_readings:
  - hechiceros, adivinos y wizards
  - hechiceros, adivinos y encantadores
  rationale: El audit trail corrige una mala lectura previa como ‘sinners’. ‘Espiritistas’ es una aproximación española funcional para yadu'e, manteniendo la categoría de practicantes ocultistas/mediúmnicos sin moralizar el término.
  doctrine_reference: Dt 18:10-12; 2 Re 23:24
- issue: Restauración cultual de sacerdotes y ofrendas
  english_pob_reading: restored the offerings to the altar; brought the priests back to their service
  chosen_spanish_reading: devolvió las ofrendas al altar; volvió a poner a los sacerdotes en su servicio
  alternative_spanish_readings:
  - restituyó las ofrendas al altar; restituyó a los sacerdotes a su servicio
  rationale: 'La formulación española mantiene la doble restauración: objetos de culto y personal sacerdotal, evitando reducir el pasaje a una mera reforma moral.'
  doctrine_reference: Esd 6:18; 2 Cr 29:35
translation_notes:
  revision_awareness: 'Se verificó el ajuste del audit trail: la cláusula recuperada ‘raised the horn of the holy ones’ debe aparecer explícitamente en español, y el tercer grupo no puede rebajarse a ‘pecadores’. La redacción sigue la revisión fuente-centrada sin introducir paráfrasis adicionales.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Santos’ se usa como sustantivo plural para qadishe, en paralelo con ‘justos’.
  - Se preserva el registro cultual (‘vasos’, ‘altar’, ‘sacerdotes’, ‘ofrendas’) y el registro antiidolátrico/antiocultista sin modernizarlo en exceso.
  - La puntuación sigue el ritmo acumulativo del original y del inglés POB.
