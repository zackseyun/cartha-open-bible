translation:
  language: es
  text: Y la impiedad de Manasés creció tanto que expulsó del santuario la gloria del Altísimo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "la gloria del Altísimo fue quitada del santuario".'
    reason: Preserva la alternativa previa documentada en el English POB, mientras el texto principal mantiene correctamente la voz activa del siríaco.
lexical_decisions:
- source_word: impiety
  english_pob_choice: the impiety of Manasseh
  chosen_spanish: la impiedad de Manasés
  alternatives_spanish:
  - la maldad de Manasés
  - la irreligión de Manasés
  lexicon: impiedad
  rationale: El sustantivo abstracto conserva el énfasis moral y religioso del original. 'Impiedad' refleja mejor el registro fuerte que 'maldad' y evita suavizar la causalidad teológica del versículo.
- source_word: Manasseh
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasse
  lexicon: nombre propio bíblico
  rationale: Se usa la forma bíblica común en español para el rey de Judá, con la acentuación habitual en español.
- source_word: grew so great
  english_pob_choice: grew so great
  chosen_spanish: llegó a ser tan grande
  alternatives_spanish:
  - creció tanto
  - se hizo tan grande
  lexicon: expresión intensificadora
  rationale: La construcción española expresa aumento de manera natural sin perder la intensificación del original.
- source_word: removed
  english_pob_choice: it removed
  chosen_spanish: quitó
  alternatives_spanish:
  - apartó
  - removió
  - expulsó
  lexicon: verbo de desplazamiento
  rationale: '''Quitó'' comunica con claridad la acción activa atribuida a la impiedad en el audit trail, manteniendo el sentido de expulsar o hacer salir la gloria del santuario sin volverlo demasiado técnico.'
- source_word: glory
  english_pob_choice: the glory of the Most High
  chosen_spanish: la gloria del Altísimo
  alternatives_spanish:
  - la gloria del Dios Altísimo
  - la gloria del Muy Alto
  lexicon: gloria
  rationale: Se conserva la formulación reverente y directa del título divino. 'Altísimo' reproduce bien el epíteto y su solemnidad.
- source_word: Most High
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  lexicon: título divino
  rationale: '''Altísimo'' es el equivalente natural y reverente en español para el título teológico, sin sustituirlo por una glosa interpretativa.'
- source_word: sanctuary
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  - lugar santo
  lexicon: lugar sagrado
  rationale: '''Santuario'' preserva el espacio sagrado indicado por el original y mantiene una correspondencia bíblica clara en español.'
theological_decisions:
- issue: Sujeto activo de la expulsión de la gloria
  english_pob_reading: it removed the glory of the Most High from the sanctuary
  chosen_spanish_reading: la impiedad ... quitó la gloria del Altísimo del santuario
  alternative_spanish_readings:
  - la gloria del Altísimo fue quitada del santuario
  - la impiedad ... hizo que la gloria del Altísimo se apartara del santuario
  rationale: 'Se sigue la revisión auditada que reconoce el verbo activo: la impiedad de Manasés es presentada como agente causal directo. Esto conserva la fuerza teológica del pasaje y evita una pasiva que debilitaría el énfasis.'
  doctrine_reference: Providencia y juicio divino; presencia/gloria divina en el santuario
translation_notes:
  revision_awareness: La revisión más reciente confirmó que no había más cambios necesarios. También se aceptó la corrección gramatical que privilegia el verbo activo ('it removed') por corresponder al sujeto femenino 'impiety' en siriaco, y ese sentido se reflejó en el español con 'quitó'.
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' como título divino coherente con el estilo bíblico en español.
  - No se introduce 'Señor' ni 'Cristo' porque el verso no los requiere.
  - '''Santuario'' se conserva para el espacio sagrado, evitando una paráfrasis más general.'
