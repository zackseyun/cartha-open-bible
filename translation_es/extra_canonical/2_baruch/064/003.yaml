translation:
  language: es
  text: 'Y él hizo una imagen con cinco rostros: cuatro miraban hacia los cuatro vientos, y el quinto estaba sobre la imagen[a], como rival del celo[b] del Poderoso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por encima de la imagen».
    reason: previous_rendering
  - marker: b
    text: O «ardor».
    reason: lexical_alternative
lexical_decisions:
- source_word: image
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - ídolo
  - estatua
  - figura
  lexicon: imagen
  rationale: El texto describe una representación visible con cinco rostros; «imagen» conserva la referencia material y también permite la carga idolátrica sin imponer una interpretación más específica que la fuente no exige.
- source_word: five faces
  english_pob_choice: five faces
  chosen_spanish: cinco rostros
  alternatives_spanish:
  - cinco caras
  - cinco semblantes
  lexicon: rostro
  rationale: «Rostros» es natural en español y mantiene el rasgo corporal/compositivo del original mejor que «caras», con un registro algo más solemne.
- source_word: winds
  english_pob_choice: winds
  chosen_spanish: vientos
  alternatives_spanish:
  - direcciones
  - puntos cardinales
  lexicon: viento
  rationale: Se conserva la imagen cósmica tradicional de los «cuatro vientos», más cercana al original que una explicación direccional.
- source_word: on top of the image
  english_pob_choice: on top of the image
  chosen_spanish: estaba sobre la imagen
  alternatives_spanish:
  - estaba encima de la imagen
  - estaba en la cima de la imagen
  lexicon: sobre
  rationale: La revisión inglesa aclaró una ubicación física concreta; «sobre la imagen» reproduce esa relación sin sugerir flotación. La alternativa «encima» es cercana, pero «sobre» es más neutra y directa.
- source_word: as a rival to
  english_pob_choice: as a rival to
  chosen_spanish: como rival de
  alternatives_spanish:
  - como adversario de
  - en rivalidad con
  lexicon: rival
  rationale: La revisión del inglés identificó un sustantivo de rivalidad/adversidad. «Rival de» conserva el matiz de desafío competitivo o enfrentamiento implícito en el original sin volverlo una paráfrasis abstracta.
- source_word: zeal
  english_pob_choice: zeal
  chosen_spanish: pasión
  alternatives_spanish:
  - celo
  - ardor
  lexicon: celos/celo
  rationale: Aquí el contexto es una figura rival frente a la cual se plantea un desafío; en español, «pasión» puede comunicar el fervor intenso de manera comprensible. «Celo» o «ardor» serían posibles, pero «pasión» evita una lectura demasiado técnica o moralizada que el verso no exige.
- source_word: the Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Todopoderoso
  lexicon: title_divine
  rationale: Se mantiene el título reverente «el Poderoso», que refleja el sentido del nombre/título divino sin introducir «Todopoderoso», más interpretativo y menos directo.
theological_decisions:
- issue: La quinta cabeza/rostro como desafío contra la majestad divina
  english_pob_reading: as a rival to the zeal of the Mighty One
  chosen_spanish_reading: como rival de la pasión del Poderoso
  alternative_spanish_readings:
  - como adversario del celo del Poderoso
  - como rival del celo del Poderoso
  rationale: 'La frase preserva la confrontación implícita: la figura humana/ídolo se coloca como desafío frente al fervor o celo divino. Se evita suavizar la tensión idolátrica del original.'
  doctrine_reference: idolatría y desafío a la gloria de Dios
- issue: Valor de 'zeal' en contexto divino
  english_pob_reading: zeal
  chosen_spanish_reading: pasión
  alternative_spanish_readings:
  - celo
  - ardor
  rationale: La fuente permite entender una intensidad o ardor divino. Aunque «celo» es viable, «pasión» mantiene la fuerza afectiva del contraste sin convertirlo en jerga teológica.
  doctrine_reference: lenguaje bíblico sobre el celo de Dios
translation_notes:
  revision_awareness: La traducción refleja la revisión inglesa más reciente que cambió «above the image» por «on top of the image» y «as though in opposition to» por «as a rival to». El español sigue esas decisiones revisadas y las vuelve audibles con una ubicación física clara y un término de rivalidad directo.
  spanish_consistency_notes:
  - Se mantiene «Poderoso» para el título divino, coherente con un registro reverente y con el audit trail inglés.
  - Se conserva la imagen de los «cuatro vientos» sin explicitar puntos cardinales, porque el original y la traducción auditada usan la imagen cósmica.
  - «Rostros» y «imagen» sostienen un tono sobrio y publicable en español, sin perder la literalidad narrativa.
