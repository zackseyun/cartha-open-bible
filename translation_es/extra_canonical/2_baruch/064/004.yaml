lexical_decisions:
- source_word: wrath
  english_pob_choice: wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - la indignación
  lexicon: 'lexical decision: implicit from source Syriac + English POB'
  rationale: El término expresa bien el juicio encendido que sale de la presencia divina sin suavizarlo; en español, «ira» conserva la fuerza semántica y el registro bíblico.
- source_word: from before the Mighty One
  english_pob_choice: from before the Mighty One
  chosen_spanish: de delante del Poderoso
  alternatives_spanish:
  - de la presencia del Poderoso
  - de ante el Poderoso
  lexicon: 'lexical decision: implicit from source Syriac + English POB'
  rationale: «De delante de» mantiene la imagen espacial del origen inmediato ante la presencia divina. «Poderoso» reproduce el título reverente del original sin sustituirlo por una paráfrasis más interpretativa.
- source_word: Zion should be uprooted
  english_pob_choice: that Zion should be uprooted
  chosen_spanish: para que Sión fuera arrancada de raíz
  alternatives_spanish:
  - para que Sión fuera desarraigada
  - para que Sión fuese arrancada
  lexicon: 'lexical decision: implicit from source Syriac + English POB'
  rationale: «Arrancada de raíz» comunica el sentido violento y total de la imagen vegetal del derribo/extracción, que en español suena más natural y más fuerte que una forma literal menos idiomática.
theological_decisions:
- issue: La ira sale de delante de Dios como agente de juicio
  english_pob_reading: Then wrath went out from before the Mighty One
  chosen_spanish_reading: Entonces la ira salió de delante del Poderoso
  alternative_spanish_readings:
  - Entonces salió la ira de la presencia del Poderoso
  - Entonces el furor salió de delante del Poderoso
  rationale: Se mantiene la personificación del juicio que procede de la presencia divina, sin convertirla en una explicación abstracta ni atenuar el lenguaje forense/apocalíptico del pasaje.
  doctrine_reference: Juicio divino en literatura apocalíptica; conservación de la personificación del acto de juicio sin dogmatizar más allá del texto.
- issue: Referencia a la destrucción de Sión y su relación con la experiencia histórica de los destinatarios
  english_pob_reading: as it also happened in your days
  chosen_spanish_reading: como también aconteció en vuestros días
  alternative_spanish_readings:
  - como también sucedió en vuestros días
  - tal como ocurrió también en vuestros días
  rationale: Se conserva la comparación histórica directa del texto, con un plural reverencial/comunitario natural en español. No se explicita más de lo que el verso afirma.
  doctrine_reference: Memoria histórica comunitaria en texto apocalíptico; fidelidad al alcance temporal del enunciado.
