  text: Y también salió un decreto contra las dos tribus y media, para que ellas también fueran llevadas cautivas, como ahora has visto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: decree
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - edicto
  - mandato
  lexicon: N/A
  rationale: «Decreto» conserva el valor jurídico-formal de una orden promulgada. «Edicto» sería posible, pero en español actual puede sonar más administrativo o imperial; «mandato» pierde el matiz de proclamación oficial.
- source_word: two and a half tribes
  english_pob_choice: the two and a half tribes
  chosen_spanish: las dos tribus y media
  alternatives_spanish:
  - las dos tribus y media de Israel
  - las dos tribus y media
  lexicon: N/A
  rationale: Se mantiene la expresión tradicional y numérica del grupo tribal, sin añadir información que el versículo no explicita en sí mismo.
- source_word: led away captive
  english_pob_choice: led away captive
  chosen_spanish: fueran llevadas cautivas
  alternatives_spanish:
  - fueran llevadas al cautiverio
  - fueran deportadas
  lexicon: N/A
  rationale: «Llevadas cautivas» conserva el sentido de traslado forzado en condición de cautividad, cercano al inglés y adecuado al registro profético-histórico. «Deportadas» moderniza demasiado y puede estrechar el sentido.
theological_decisions:
- issue: Destino conjunto de las tribus y medio
  english_pob_reading: a decree also went out against the two and a half tribes, that they too should be led away captive
  chosen_spanish_reading: salió un decreto contra las dos tribus y media, para que ellas también fueran llevadas cautivas
  alternative_spanish_readings:
  - salió un decreto contra las dos tribus y media, para que también ellas fueran llevadas cautivas
  rationale: 'Se conserva la fuerza de juicio colectivo: no solo Judá, sino también las tribus transjordanas quedan incluidas en la sentencia. El español mantiene la referencia sin atenuarla ni reinterpretarla.'
  doctrine_reference: Juicio divino sobre Israel; continuidad de las tribus en el marco del castigo nacional.
translation_notes:
  revision_awareness: El contexto inglés revisado quedó marcado como sin cambios necesarios y con alto acuerdo entre cotejos, así que el español sigue de cerca la lectura POB sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se preserva «cautivas» para mantener el paralelismo con la voz pasiva implícita del inglés.
  - No se usó «SEÑOR» ni terminología de sustitución porque el versículo no contiene el Nombre divino.
  - El registro es sobrio y bíblico, pero en español contemporáneo legible.
