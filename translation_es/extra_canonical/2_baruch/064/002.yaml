translation:
  language: es
  text: 'Porque cometió mucha impiedad: mató a los justos, torció la justicia, derramó sangre inocente, ultrajó por la fuerza a mujeres casadas, derribó los altares, abolió sus ofrendas y expulsó a los sacerdotes para que no pudieran ministrar en el santuario.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: much impiety
  english_pob_choice: committed much impiety
  chosen_spanish: cometió mucha impiedad
  alternatives_spanish:
  - practicó mucha impiedad
  - hizo mucha maldad
  lexicon: impiedad
  rationale: Impiety preserves the religious-moral force of the source and the English POB. 'Maldad' would be broader and less specific.
- source_word: the righteous
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los inocentes
  lexicon: justos
  rationale: '''Justos'' is the most direct Spanish equivalent and matches the juridical-ethical force of the source.'
- source_word: twisted judgment
  english_pob_choice: twisted judgment
  chosen_spanish: torció la justicia
  alternatives_spanish:
  - pervirtió el juicio
  - tuvo juicio torcido
  lexicon: justicia
  rationale: '''Justicia'' renders the legal force naturally in Spanish and fits the parallel accusations; ''juicio'' is possible but more abstract here.'
- source_word: innocent blood
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - sangre de inocentes
  - sangre inocente derramada
  lexicon: sangre
  rationale: Keeps the compact accusatory idiom of the source while remaining idiomatic in Spanish.
- source_word: violated married women by force
  english_pob_choice: violated married women by force
  chosen_spanish: ultrajó por la fuerza a mujeres casadas
  alternatives_spanish:
  - violó por la fuerza a mujeres casadas
  - deshonró por la fuerza a mujeres casadas
  lexicon: ultrajar
  rationale: '''Ultrajó'' can cover sexual violation with force without narrowing the sense only to a modern legal category; it preserves the shame/abuse force of the source.'
- source_word: overturned altars
  english_pob_choice: overturned altars
  chosen_spanish: derribó los altares
  alternatives_spanish:
  - volcó los altares
  - derrumbó los altares
  lexicon: derribar
  rationale: '''Derribó'' is natural and concrete for destroying cultic structures.'
- source_word: abolished their offerings
  english_pob_choice: abolished their offerings
  chosen_spanish: abolió sus ofrendas
  alternatives_spanish:
  - suprimió sus ofrendas
  - canceló sus ofrendas
  lexicon: abolir
  rationale: Matches the English POB's legal-cultic force and preserves the cessation of sacrificial practice.
- source_word: drove out the priests
  english_pob_choice: drove out the priests
  chosen_spanish: expulsó a los sacerdotes
  alternatives_spanish:
  - echó a los sacerdotes
  - desterró a los sacerdotes
  lexicon: expulsar
  rationale: '''Expulsó'' is direct and fits the force of forcible removal from cultic service.'
- source_word: minister in the sanctuary
  english_pob_choice: minister in the sanctuary
  chosen_spanish: ministrar en el santuario
  alternatives_spanish:
  - servir en el santuario
  - oficiar en el santuario
  lexicon: ministrar
  rationale: '''Ministrar'' preserves the established churchly register of the source while remaining understandable in Spanish; ''oficiar'' would imply a narrower liturgical nuance.'
theological_decisions:
- issue: Catalog of sins as legal-cultic and sexual violence
  english_pob_reading: The verse lists concrete acts of impiety, injustice, bloodshed, sexual violation, and cultic desecration.
  chosen_spanish_reading: El versículo conserva la lista concreta de impiedad, injusticia, derramamiento de sangre, violencia sexual y profanación cultual.
  alternative_spanish_readings:
  - Una paráfrasis moral generalizada
  - Una formulación más suave de la violencia sexual
  rationale: The source and English POB present a stacked accusation list; Spanish should keep the itemized force without smoothing or euphemizing.
  doctrine_reference: N/A (descriptive historical-theological catalog)
- issue: '''Sanctuary'' as cultic holy place'
  english_pob_reading: The priests are barred from ministering in the sanctuary.
  chosen_spanish_reading: '''Santuario'' retains the sacred-space reference without over-specifying temple architecture.'
  alternative_spanish_readings:
  - templo
  - santuario sagrado
  rationale: '''Santuario'' is broad enough for the source and faithful to the cultic setting; ''templo'' could be too specific if the Syriac term is more general.'
  doctrine_reference: N/A (cultic terminology)
