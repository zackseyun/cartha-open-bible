translation:
  language: es
  text: Y en cuanto a las novenas aguas negras[a], esto es toda la maldad que hubo en los días de Manasés, hijo de Ezequías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estas son toda la maldad». El siriaco usa un demostrativo singular con un predicado resumidor; en español, «esto es» conserva mejor ese valor explicativo aunque el antecedente sea plural.'
    reason: alternative_reading
lexical_decisions:
- source_word: ܚܫ̈ܟܐ
  english_pob_choice: black waters
  chosen_spanish: aguas negras
  alternatives_spanish:
  - aguas oscuras
  lexicon: Payne Smith
  rationale: Mantengo el color apocalíptico explícito del símbolo, sin suavizarlo a un término genérico; en español, «negras» conserva mejor el contraste seriado con las aguas claras que «oscuras».
- source_word: ܟܠܗ + ܚܒܠܐ
  english_pob_choice: this is all the wickedness
  chosen_spanish: son toda la maldad
  alternatives_spanish:
  - es toda la maldad
  - son la maldad
  lexicon: Payne Smith
  rationale: El Syriac incluye la idea de totalidad (ܟܠܗ), por lo que «toda» debe aparecer. Opto por «maldad» para reflejar el sentido moral del contexto histórico de Manasés, y por el plural verbal «son» para concordar con el sujeto plural de «aguas».
- source_word: ܒܝܘ̈ܡܬܐ
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante los días de
  - en tiempos de
  lexicon: Payne Smith
  rationale: Es la equivalencia natural y fiel para una fórmula temporal bíblica; conserva el matiz histórico sin añadir explicación.
- source_word: Manasseh son of Hezekiah
  english_pob_choice: Manasseh son of Hezekiah
  chosen_spanish: Manasés, hijo de Ezequías
  alternatives_spanish:
  - Manasés hijo de Ezequías
  - Manasés, hijo de Hizquías
  lexicon: Standard biblical Spanish names
  rationale: Uso las formas bíblicas más reconocibles en español y mantengo la aposición para claridad genealógica.
theological_decisions:
- issue: Demostrativo y predicación sobre las aguas negras
  english_pob_reading: this is all the wickedness
  chosen_spanish_reading: son toda la maldad
  alternative_spanish_readings:
  - es toda la maldad
  - estas son toda la maldad
  rationale: El texto siríaco usa un demostrativo singular con un predicado nominal que resume el símbolo; en español, el sujeto «las novenas aguas negras» pide concordancia verbal plural, pero el contenido doctrinal queda intacto al traducir el predicado resumidor como una afirmación totalizante de la maldad asociada a Manasés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Identificación histórica de la maldad con los días de Manasés
  english_pob_reading: that was in the days of Manasseh son of Hezekiah
  chosen_spanish_reading: que hubo en los días de Manasés, hijo de Ezequías
  alternative_spanish_readings:
  - que estaba en los días de Manasés, hijo de Ezequías
  - que se manifestó en los días de Manasés, hijo de Ezequías
  rationale: 'Sigo la lectura histórica del original: no se trata de una abstracción, sino de la maldad situada en un reinado concreto. «Hubo» preserva el valor existencial e histórico sin añadir interpretación.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se incorpora la revisión que recupera la idea de totalidad («all») omitida antes; además, se conserva el valor resumidor del demostrativo siríaco sin forzar una traducción impropia en español. La nota a pie de página se ancla explícitamente en el texto con [a] para cumplir la validación.
  spanish_consistency_notes:
  - «Manasés» y «Ezequías» se mantienen en formas bíblicas estándar en español.
  - «Maldad» traduce el juicio moral del contexto sin diluirlo en «corrupción» o «destrucción».
  - Se evita la máscara litúrgica «SEÑOR» porque aquí no aparece el Tetragrámaton.
  - La concordancia verbal plural con «aguas» es necesaria en español, aunque el siríaco use una construcción resumidora singular.
