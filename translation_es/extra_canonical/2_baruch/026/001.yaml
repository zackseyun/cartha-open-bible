review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite bien la pregunta general del inglés POB y mantiene la deixis lejana en «esa tribulación». Sin embargo, no preserva de manera suficientemente fiel la distinción semántica documentada entre la tribulación venidera y el segundo sustantivo, porque «necesidad» suena demasiado material o circunstancial en español y debilita el sentido apocalíptico de ܐܘܠܨܢܐ. Además, la nota al pie introduce una explicación sobre inestabilidad textual que no corresponde al motivo de la nota inglesa, que solo preserva una alternativa de demostrativo.
  spanish_quality_summary: 'El texto es claro y legible, con buen registro. La sintaxis de la pregunta funciona bien en español. La principal mejora necesaria es léxica: «aflicción» o «tribulación» comunica mejor la presión/angustia solemne del contexto que «necesidad».'
  glossary_alignment: No hay términos teológicos de proyecto mayor en juego. La decisión «esa» para ܗܘ está alineada con la auditoría inglesa. La renderización de ܐܘܠܨܢܐ como «necesidad» no sigue bien la rationale documentada, que favorece affliction/distress/tribulation. Conviene usar «aflicción» para mantener la distinción con «tribulación» sin perder el campo semántico.
  issues:
  - severity: medium
    issue: «necesidad» para ܐܘܠܨܢܐ
    rationale: Aunque literalmente puede sugerir apremio, en español bíblico actual «necesidad» suele sonar demasiado débil o material. «Aflicción» conserva mejor la presión, angustia y solemnidad del contexto apocalíptico, y además mantiene la distinción con «tribulación».
  - severity: low
    issue: La nota al pie añade una justificación no reflejada en la nota inglesa
    rationale: La nota inglesa dice solo «Or 'this tribulation'». La explicación española sobre inestabilidad de la línea y cercanía contextual va más allá de la evidencia preservada en esa nota concreta. Conviene simplificarla para que corresponda a la alternativa textual/deíctica.
  revised_spanish_text: 'Y yo respondí y dije: «¿Continuará por mucho tiempo esa tribulación[a] que ha de venir, y abarcará esta aflicción muchos años?»'
  revised_footnotes:
  - marker: a
    text: O «esta tribulación».
    reason: alternative_rendering
  revision_rationale: 'Se cambió «necesidad» por «aflicción» para reflejar mejor ܐܘܠܨܢܐ según la evidencia léxica y el tono apocalíptico, manteniendo a la vez la distinción con «tribulación». Se simplificó la nota al pie para ajustarla a la alternativa preservada por el inglés POB sin añadir explicación editorial innecesaria. No se requiere adjudicación adicional: es una corrección léxica y de nota menor, autoaplicable.'
