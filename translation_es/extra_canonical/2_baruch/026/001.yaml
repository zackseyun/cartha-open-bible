translation:
  language: es
  text: 'Y yo respondí y dije: «¿Continuará por mucho tiempo esa tribulación[a] que ha de venir, y abarcará esta aflicción muchos años?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta tribulación».
    reason: alternative_rendering
lexical_decisions:
- source_word: ܢܬܬܒܪ
  english_pob_choice: shall be broken
  chosen_spanish: continuará
  alternatives_spanish:
  - será quebrantada
  - será destruida
  lexicon: Smith
  rationale: El contexto de la pregunta no exige repetir literalmente la imagen de “ser quebrantada” en la cláusula principal; en español, la pregunta natural por la duración de una tribulación futura se expresa mejor con “continuará”. Mantiene la fuerza profética sin forzar un calco menos idiomático.
- source_word: ܐܘܠܨܢܐ
  english_pob_choice: affliction
  chosen_spanish: necesidad
  alternatives_spanish:
  - aflicción
  - tribulación
  - angustia
  lexicon: Payne Smith
  rationale: Aquí el término apunta a presión, aflicción o necesidad apremiante. “Necesidad” refleja la carga de constricción y apuro que aparece en el texto, aunque en español puede sentirse menos teológico; por eso se preserva también “tribulación” en la primera cláusula para el matiz escatológico.
- source_word: ܗܘ
  english_pob_choice: that
  chosen_spanish: esa
  alternatives_spanish:
  - aquella
  - esta
  lexicon: gramatical/Deixis siriaca
  rationale: El demostrativo lejano del siriaco favorece “esa/ aquella” más que “esta”. Se eligió “esa” por sonar más natural en español actual y conservar la distancia deíctica señalada por la revisión inglesa.
theological_decisions:
- issue: Distinción entre ܐܘܠܨܢܐ y la tribulación escatológica
  english_pob_reading: that tribulation that is to come ... this necessity
  chosen_spanish_reading: esa tribulación ... y esta necesidad
  alternative_spanish_readings:
  - aquella tribulación ... y esta aflicción
  - esa aflicción ... y esta necesidad
  rationale: El texto distingue entre una tribulación venidera y una necesidad/apuro presente o abarcador. En español se conservó esa diferencia con dos sustantivos distintos, evitando uniformarlos a una sola palabra.
  doctrine_reference: Apocalíptica judía; distinción semántica del discurso de aflicción futura y necesidad presente
translation_notes:
  revision_awareness: La versión inglesa revisó la frase incompleta «is to be» por «is to come» y luego ajustó el demostrativo de «this» a «that» conforme al siriaco. La presente redacción sigue esa lectura revisada, pero conserva una nota de variante porque la unidad fuente muestra inestabilidad en el borde textual.
  spanish_consistency_notes:
  - Se usa «tribulación» para el término escatológico principal y «necesidad» para ܐܘܠܨܢܐ, evitando colapsar ambos en un solo vocablo.
  - Se mantuvo la sintaxis de pregunta directa con «¿Continuará...?» para reflejar el tono interrogativo del original.
  - Se prefirió «Y yo respondí y dije» como fórmula narrativa fiel y natural en español bíblico.
  - La nota al pie solo se aplica a «esa tribulación» porque la variante afecta el demostrativo, no toda la cláusula.
