translation:
  language: es
  text: 'Y aconteció después de estas cosas que yo, Baruc, estaba de pie en la orilla del río[a], y una voz vino de lo alto y me dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Otra tradición de control lee «Monte Sión»; aquí se sigue el siríaco primario, que dice «la orilla del río».
    reason: textual_variant
lexical_decisions:
- source_word: ܥܠ ܚܙܝܬܐ ܕܐܬܬ / after these things
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - luego de estas cosas
  - tras estas cosas
  lexicon: Payne Smith
  rationale: La expresión formulaica introduce una secuencia narrativa sin añadir interpretación. «Después de estas cosas» conserva el registro bíblico y la relación temporal directa.
- source_word: ܨܝܕܐ ܕܢܗܪܐ
  english_pob_choice: the bank of the river
  chosen_spanish: la orilla del río
  alternatives_spanish:
  - la ribera del río
  - el lado del río
  lexicon: Payne Smith
  rationale: El audit trail privilegia el escenario de ribera frente a la armonización con Mount Zion. «Orilla» es natural en español y mantiene el valor espacial concreto del siríaco.
- source_word: ܩܠܐ ܐܙܐ ܡܢ ܡܪܘܡܐ
  english_pob_choice: a voice came from the height
  chosen_spanish: una voz vino desde lo alto
  alternatives_spanish:
  - una voz vino desde las alturas
  - una voz descendió desde lo alto
  lexicon: Payne Smith
  rationale: La frase indica procedencia elevada, no necesariamente una localización técnica. «Desde lo alto» conserva la elevación y el tono revelatorio sin forzar más de lo que el texto dice.
- source_word: ܘܐܡ̇ܪ ܠܝ
  english_pob_choice: and said to me
  chosen_spanish: y me dijo
  alternatives_spanish:
  - y habló conmigo
  - y me habló
  lexicon: Payne Smith
  rationale: La forma directa y breve es la más fiel al movimiento del siríaco y fluye bien en español narrativo.
theological_decisions:
- issue: Ubicación de la escena revelatoria
  english_pob_reading: The draft retains Ceriani’s riverbank setting rather than harmonizing to Mount Zion.
  chosen_spanish_reading: Se mantiene la escena junto al río, no una corrección hacia Sión.
  alternative_spanish_readings:
  - Baruc estaba en el monte Sión
  - Debe armonizarse con la tradición de control
  rationale: La base siríaca primaria sitúa la escena en la orilla del río. Traducirla así evita borrar una tensión textual documentada y respeta el testigo principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Alcance de la voz celestial
  english_pob_reading: a voice came from the height and said to me
  chosen_spanish_reading: La voz procede de lo alto, subrayando su origen celestial.
  alternative_spanish_readings:
  - la voz venía de una montaña
  - la voz era una figura puramente simbólica
  rationale: El texto no identifica la fuente con precisión topográfica; solo marca altura/lo alto. Mantener esa ambigüedad preserva el tono apocalíptico sin añadir un referente no atestiguado.
  doctrine_reference: 'Apocalíptica judía: voz celestial como medio de revelación'
translation_notes:
  revision_awareness: 'El contexto editorial señala una corrección previa importante: el texto no debe armonizarse con «Monte Sión», sino traducir el siríaco primario «la orilla del río». También hubo una omisión previa de la segunda mitad del verso; por eso la forma final incluye tanto la ubicación como la voz que viene desde lo alto y habla a Baruc.'
  spanish_consistency_notes:
  - Se conserva «Baruc» como forma española del nombre.
  - Se usa «orilla del río» de modo consistente con el testigo siríaco primario.
  - «Desde lo alto» mantiene la elevación sin especificar una topografía no segura.
  - 'La puntuación introduce dos miembros coordinados: escenario narrativo y voz celestial.'
