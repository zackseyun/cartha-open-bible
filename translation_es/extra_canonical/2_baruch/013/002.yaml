translation:
  language: es
  text: 'Y una voz vino de lo alto y me dijo: «Ponte de pie, Baruc, y oye la palabra del Poderoso».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: voice came from on high
  english_pob_choice: And a voice came from on high
  chosen_spanish: Y una voz vino de lo alto
  alternatives_spanish:
  - Y una voz descendió desde lo alto
  - Y una voz llegó de arriba
  lexicon: φωνή / qālā
  rationale: «Vino de lo alto» conserva el movimiento de procedencia con un español natural y solemne; evita sobretraducir con una imagen más interpretativa que el original.
- source_word: Stand on your feet
  english_pob_choice: Stand on your feet
  chosen_spanish: Ponte de pie
  alternatives_spanish:
  - Levántate
  - Estate sobre tus pies
  lexicon: קום / ἵστημι
  rationale: La orden es idiomática en español como «ponte de pie», que preserva el sentido exhortativo sin sonar mecánica o redundante.
- source_word: word
  english_pob_choice: the word of the Mighty One
  chosen_spanish: la palabra
  alternatives_spanish:
  - la palabra dicha
  - el mensaje
  lexicon: מלתא / λόγος
  rationale: «Palabra» mantiene la fórmula revelatoria breve del original y del inglés POB, sin añadir explicaciones.
- source_word: the Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Todopoderoso
  lexicon: גִּבַּר / שַׁדַּי
  rationale: El epíteto divino se vierte como «el Poderoso» para conservar el matiz de fuerza/mayestad que el inglés POB fijó con «the Mighty One», evitando sustituirlo por un equivalente más dogmático o más amplio que podría borrar la precisión léxica.
theological_decisions:
- issue: Epiteto divino en 2 Baruch
  english_pob_reading: the Mighty One
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
