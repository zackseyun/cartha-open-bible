  - el Dios poderoso
  rationale: Se mantiene el epíteto funcional del texto como designación de poder soberano, siguiendo la revisión del inglés POB que restauró «the Mighty One» por precisión lexical dentro de 2 Baruch.
  doctrine_reference: 2 Baruch 13:2; revisión auditada del POB
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del texto inglés POB, que corrigió el epíteto divino de «mighty God» a «the Mighty One» y cerró la cita final. La versión española refleja esa misma precisión léxica con «el Poderoso».
  spanish_consistency_notes:
  - Se conservó el nombre propio «Baruc» conforme al uso español estándar.
  - Se evitó «SEÑOR» para el epíteto divino, ya que el audit trail inglés fija aquí una expresión de poder, no el tetragrama.
  - La puntuación reproduce la cita directa y el cierre interrogativo/imperativo del contenido no requiere notas adicionales.
