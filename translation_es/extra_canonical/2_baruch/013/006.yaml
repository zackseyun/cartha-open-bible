translation:
  language: es
  text: Por tanto, fueron disciplinados en aquel tiempo, para que fueran perdonados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܐܬܪܕܝܘ
  english_pob_choice: were disciplined
  chosen_spanish: fueron disciplinados
  alternatives_spanish:
  - fueron corregidos
  - fueron castigados
  lexicon: disciplinar
  rationale: El sujeto recibe una acción correctiva/punitiva; «disciplinados» conserva la idea de disciplina en sentido de corrección divina y sigue de cerca el valor del verbo sin cargarlo solo hacia «castigados».
- source_word: ܗܝܕܝܢ
  english_pob_choice: at that time / then
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese momento
  lexicon: tiempo
  rationale: La partícula temporal expresa una referencia puntual al momento de la disciplina; «en aquel tiempo» preserva esa deixis temporal con buen español bíblico actual.
- source_word: ܢܫܬܒܩܘܢ
  english_pob_choice: be forgiven
  chosen_spanish: fueran perdonados
  alternatives_spanish:
  - quedaran perdonados
  - fueran librados
  lexicon: perdonar
  rationale: En este contexto de disciplina con finalidad restaurativa, la lectura «ser perdonados» refleja la posibilidad de remisión/indulto que el audit trail inglés ya fijó frente a «remain».
theological_decisions:
- issue: Finalidad de la disciplina
  english_pob_reading: they were disciplined at that time so that they might be forgiven
  chosen_spanish_reading: fueron disciplinados en aquel tiempo, para que fueran perdonados
  alternative_spanish_readings:
  - fueron disciplinados en aquel tiempo, para que quedaran perdonados
  - fueron corregidos en aquel tiempo, para que recibieran perdón
  rationale: El versículo presenta una disciplina con propósito de restauración y perdón, no un castigo meramente retributivo. La formulación elegida mantiene esa relación causal-final sin añadir elementos ajenos al texto.
  doctrine_reference: Disciplina divina con finalidad remedial/restaurativa
translation_notes:
  revision_awareness: El contexto auditado corrige una lectura previa errónea que introducía «las naciones»; el sujeto del versículo continúa el de v. 5 («sus hijos»), por lo que la traducción española evita cualquier referencia a las naciones y conserva el valor temporal y final del pasaje.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - «Disciplinados» se conserva para reflejar la fuerza correctiva del pasaje sin desplazarlo a un mero castigo.
  - No se añade nota textual porque el español publicado puede expresar la solución adoptada sin ambigüedad residual.
