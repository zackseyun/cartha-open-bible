theological_decisions:
- issue: Scope of culpability addressed to nations and peoples
  english_pob_reading: But now, you nations and peoples, you are guilty
  chosen_spanish_reading: Pero ahora, ustedes, naciones y pueblos, son culpables
  alternative_spanish_readings:
  - Pero ahora, naciones y pueblos, son culpables
  - Pero ahora, ustedes, naciones y pueblos, están en culpa
  rationale: Mantengo la acusación universal directa del texto, sin suavizarla ni convertirla en mera descripción sociológica.
  doctrine_reference: Responsabilidad moral colectiva en el juicio profético/apocalíptico.
- issue: Rendering of the creation-related moral violation
  english_pob_reading: dealt with creation without righteousness
  chosen_spanish_reading: han tratado a la creación sin justicia
  alternative_spanish_readings:
  - han obrado respecto de la creación sin justicia
  - han tratado la creación sin rectitud
  rationale: Conservo la referencia amplia a la creación como ámbito afectado por la conducta humana, sin limitarla a una sola criatura o al solo mundo material.
  doctrine_reference: Mayordomía humana y rendición de cuentas ante el orden creado por Dios.
