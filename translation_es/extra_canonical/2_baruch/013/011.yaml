  source_alignment_summary: 'El borrador español sigue bien el sentido del inglés POB y la acusación profética del siríaco según la evidencia disponible: una interpelación a naciones y pueblos, culpabilidad presente, continuidad temporal de la falta, y doble cargo de hollar la tierra y tratar la creación injustamente. No obstante, hay un ajuste de naturalidad y de focalización retórica: el vocativo directo funciona mejor sin ''ustedes'', que en español suena redundante antes de ''naciones y pueblos''.'
