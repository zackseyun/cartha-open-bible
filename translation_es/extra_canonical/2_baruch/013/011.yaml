  glossary_alignment: No hay términos de glosario mayor en disputa. 'Justicia' para righteousness está bien. 'Creación' preserva el alcance amplio documentado. No aparecen nombres divinos ni títulos mesiánicos. La elección 'culpables' concuerda con el valor moral/jurídico del pasaje.
