  rationale: El inglés POB usa un verbo que puede abarcar corrección disciplinaria más que castigo retributivo. En español, 'corregidos' comunica la idea de disciplina orientada a enmienda sin endurecer indebidamente el matiz.
- source_word: so that they might be sanctified
  english_pob_choice: so that they might be sanctified
  chosen_spanish: para que fueran santificados
  alternatives_spanish:
  - a fin de que fueran santificados
