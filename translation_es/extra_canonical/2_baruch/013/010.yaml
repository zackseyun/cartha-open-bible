  rationale: '''Santificados'' preserva el valor pasivo y cultual/moral de ''sanctified''. Se evita sustituirlo por una formulación más explicativa que debilite la conexión directa entre corrección y santificación.'
theological_decisions:
- issue: Relación entre disciplina/corrección y santificación
  english_pob_reading: Therefore they were then chastened, so that they might be sanctified.
  chosen_spanish_reading: Por eso entonces fueron corregidos, para que fueran santificados.
  alternative_spanish_readings:
  - Por eso entonces fueron castigados, para que fueran santificados.
  - Por eso entonces fueron disciplinados, para que fueran santificados.
  rationale: 'La relación causal se conserva: la acción divina de corregir tiene como fin la santificación. ''Corregidos'' evita cargar el texto con una idea penal que el contexto no exige y mantiene la tensión entre disciplina y propósito santificador.'
  doctrine_reference: Santificación por disciplina correctiva; pedagogía divina del juicio/corrección.
