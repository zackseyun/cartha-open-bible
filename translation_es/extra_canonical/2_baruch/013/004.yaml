translation:
  language: es
  text: 'Si las ciudades que ahora prosperan llegaran a decir: «¿Por qué el Dios poderoso ha traído sobre nosotros esta retribución?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: cities that now prosper
  english_pob_choice: the cities that now prosper
  chosen_spanish: las ciudades que ahora prosperan
  alternatives_spanish:
  - las ciudades que hoy están en prosperidad
  - las ciudades que en este momento florecen
  lexicon: cities / prosper
  rationale: Conservo la referencia a ciudades concretas y el contraste temporal de 'now' con 'prosper' usando un presente descriptivo natural en español. 'Prosperan' mantiene la idea de bienestar visible sin añadir un matiz no atestiguado de esplendor material.
- source_word: mighty God
  english_pob_choice: the mighty God
  chosen_spanish: el Dios poderoso
  alternatives_spanish:
  - el Dios todopoderoso
  - el Dios fuerte
  lexicon: God / mighty
  rationale: '''Dios poderoso'' reproduce el adjetivo de fuerza/poder sin forzar el equivalente teológico más técnico ''todopoderoso'', que podría estrechar innecesariamente el matiz. Mantiene la dignidad del título y la transparencia léxica.'
- source_word: brought this retribution upon us
  english_pob_choice: brought this retribution upon us
  chosen_spanish: ha traído sobre nosotros esta retribución
  alternatives_spanish:
  - nos ha traído este castigo
  - ha hecho venir sobre nosotros esta retribución
  lexicon: bring upon / retribution
  rationale: '''Traído sobre nosotros'' conserva la imagen de hacer venir una consecuencia sobre alguien. ''Retribución'' mantiene la fuerza judicial o retributiva del término, evitando suavizarlo a una explicación más general como ''castigo''.'
theological_decisions:
- issue: La pregunta hipotética sobre el juicio divino en ciudades prósperas
  english_pob_reading: If the cities that now prosper should ever say...
  chosen_spanish_reading: Si las ciudades que ahora prosperan llegaran a decir...
  alternative_spanish_readings:
  - Si las ciudades que ahora prosperan dijeran...
  - Si alguna vez las ciudades que ahora prosperan dijeran...
  rationale: El condicional hipotético se mantiene sin convertirlo en una afirmación. 'Llegaran a decir' conserva el valor eventual e hipotético del original. No se añade interpretación sobre la identidad de las ciudades ni sobre la oportunidad exacta del juicio.
  doctrine_reference: Providencia divina y justicia retributiva en el discurso profético.
translation_notes:
  revision_awareness: La versión inglesa aprobada permanece sin cambios según el control más reciente y el cotejo cruzado reporta alto acuerdo; por tanto, la redacción española sigue de cerca la estructura semántica del inglés auditado y del original siriaco sin introducir expansiones.
  spanish_consistency_notes:
  - Se usa 'Dios' para el original 'mighty God' conforme al patrón bíblico del proyecto.
  - '''Retribución'' se conserva por su valor forense y retributivo; no se sustituye por ''castigo'' en el texto principal para no perder la tensión jurídica del pasaje.'
  - La construcción 'llegaran a decir' preserva el carácter hipotético del enunciado.
