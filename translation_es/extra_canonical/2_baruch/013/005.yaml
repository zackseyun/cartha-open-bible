translation:
  language: es
  text: 'Dirás a ellos y a otros como ellos: «Ustedes que han visto esta calamidad y esta retribución que ha venido sobre ustedes y sobre su ciudad en el tiempo señalado para ella—»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: You shall say
  english_pob_choice: You shall say
  chosen_spanish: Dirás
  alternatives_spanish:
  - Dirán
  - Debes decir
  lexicon: decir
  rationale: El imperativo/futuro exhortativo en español se expresa con naturalidad como ‘Dirás’, manteniendo el mandato dirigido al mensajero sin sobrecargarlo.
- source_word: to them, and to those like them
  english_pob_choice: to them, and to those like them
  chosen_spanish: a ellos y a los que son como ellos
  alternatives_spanish:
  - a ellos y a los semejantes a ellos
  - a ellos y a los de su misma clase
  lexicon: como / semejante
  rationale: La formulación conserva el paralelo y evita una paráfrasis excesiva; ‘los que son como ellos’ refleja bien el sentido comparativo del original.
- source_word: this calamity
  english_pob_choice: this calamity
  chosen_spanish: esta calamidad
  alternatives_spanish:
  - este desastre
  - esta desgracia
  lexicon: calamidad
  rationale: ‘Calamidad’ sigue de cerca el valor semántico y suena formal y bíblico en español.
- source_word: this retribution
  english_pob_choice: this retribution
  chosen_spanish: esta retribución
  alternatives_spanish:
  - este castigo
  - esta represalia
  lexicon: retribución
  rationale: Se conserva ‘retribución’ para mantener el matiz retributivo del texto y no suavizarlo a ‘castigo’ sin necesidad.
- source_word: has come upon you and upon your city
  english_pob_choice: has come upon you and upon your city
  chosen_spanish: que ha venido sobre ustedes y sobre su ciudad
  alternatives_spanish:
  - que ha caído sobre ustedes y sobre su ciudad
  - que ha llegado sobre ustedes y sobre su ciudad
  lexicon: venir sobre
  rationale: ‘Ha venido sobre’ reproduce el alcance de una desgracia que irrumpe sobre personas y ciudad, en un español idiomático y solemne.
- source_word: at its appointed time
  english_pob_choice: at its appointed time
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - a su tiempo señalado
  - en el tiempo fijado
  lexicon: tiempo señalado
  rationale: ‘En su tiempo señalado’ comunica con claridad la idea de un momento determinado por designio, respetando el singular indicado por el control textual.
theological_decisions:
- issue: Singular de ‘retribución’ y del pronombre posesivo
  english_pob_reading: this retribution ... at its appointed time
  chosen_spanish_reading: esta retribución ... en su tiempo señalado
  alternative_spanish_readings:
  - estas retribuciones ... en su tiempo señalado
  - en su tiempo señalado (con antecedente plural implícito)
  rationale: El control textual corrigió el plural previo y el pronombre singular; el español debe reflejar esa unidad sin ambigüedad.
  doctrine_reference: Coherencia textual y precisión semántica; no aplica una doctrina específica.
- issue: ‘your city’ frente a ‘your people’
  english_pob_reading: your city
  chosen_spanish_reading: su ciudad
  alternative_spanish_readings:
  - su pueblo
  - la ciudad de ustedes
  rationale: El testimonio fuente revisado identifica ‘madīnatkōn’ como ‘su ciudad’; traducir ‘pueblo’ falsearía el referente de Jerusalén/Sión.
  doctrine_reference: Fidelidad al referente histórico-redentor del texto.
translation_notes:
  revision_awareness: 'La revisión crítica corrige tres puntos del borrador inglés previo: el referente es ‘su ciudad’ y no ‘su pueblo’; la frase es singular (‘esta retribución’), no plural; y el posesivo debe ser singular (‘su tiempo señalado’). La redacción española incorpora esas correcciones directamente.'
  spanish_consistency_notes:
  - Se usa ‘ustedes’ para mantener el tratamiento plural dirigido a los destinatarios, coherente con ‘a ellos y a los que son como ellos’.
  - Se evita ‘SEÑOR’ o equivalentes porque este verso no contiene el Tetragrámaton ni una cita explícita del nombre divino.
  - Se mantiene un registro bíblico sobrio sin introducir términos eclesiásticos no exigidos por el texto.
