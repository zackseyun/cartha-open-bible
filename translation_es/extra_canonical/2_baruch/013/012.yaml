lexical_decisions:
- source_word: good to you
  english_pob_choice: I did good to you
  chosen_spanish: te hice bien
  alternatives_spanish:
  - te hice el bien
  - te traté bien
  lexicon: Syriac ܛܒ / ܛܒܐ (hacer bien, tratar bien)
  rationale: El giro español más natural y fiel a la acción benevolente es «te hice bien». Conserva la idea de beneficio concreto sin introducir un sustantivo abstracto innecesario.
- source_word: my kindness
  english_pob_choice: my kindness
  chosen_spanish: mi bondad
  alternatives_spanish:
  - mi benevolencia
  - mi bondad amorosa
  lexicon: Syriac ܛܒܘܬܐ / sentido de favor-bondad
  rationale: «Bondad» comunica de forma clara y digna el favor benévolo implícito en el contexto. «Benevolencia» sería más técnico; «bondad amorosa» añade un matiz no explícito aquí.
- source_word: denied
  english_pob_choice: you denied
  chosen_spanish: negaste
  alternatives_spanish:
  - rechazaste
  - desconociste
  lexicon: Syriac ܟܦܪ (negar, repudiar)
  rationale: «Negaste» preserva la fuerza de rechazo o repudiación del verbo sin cargarlo con un tono más interpretativo que el inglés auditado.
theological_decisions:
- issue: Repetición de «en todo tiempo» como acusación enfática
  english_pob_reading: For at all times I did good to you, but at all times you denied my kindness.
  chosen_spanish_reading: Porque en todo tiempo te hice bien, pero en todo tiempo negaste mi bondad.
  alternative_spanish_readings:
  - Porque siempre te hice bien, pero siempre negaste mi bondad.
  - Porque en todo momento te hice bien, pero en todo momento negaste mi bondad.
  rationale: Se conserva la repetición enfática del original y del inglés POB, sin suavizarla a una sola vez. «En todo tiempo» mantiene un registro sobrio y reiterativo acorde con la acusación.
  doctrine_reference: Énfasis retórico del texto; no añade doctrina externa.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada solo en puntuación, sin cambios de sentido. La traducción española sigue esa lectura estable y no introduce variantes textuales adicionales.
