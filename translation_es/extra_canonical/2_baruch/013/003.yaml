translation:
  language: es
  text: Porque fuiste sacudido[a] por lo que le ha sucedido a Sión, por tanto, ciertamente serás preservado hasta la consumación de los tiempos, para que seas un testimonio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘conmovido’ o ‘estremecido’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: shaken
  english_pob_choice: you were shaken
  chosen_spanish: fuiste sacudido[a]
  alternatives_spanish:
  - fuiste conmocionado
  - fuiste estremecido
  lexicon: The Syriac verb indicates being shaken/disturbed; the English POB chose a concrete passive verb without adding interpretive weight.
  rationale: ‘Sacudido’ conserva la imagen de perturbación física o emocional sin añadir una explicación que el texto no da. Se mantiene el pasivo y el tono causal del contexto.
- source_word: by what has happened to Zion
  english_pob_choice: by what has happened to Zion
  chosen_spanish: por lo que le ha sucedido a Sión
  alternatives_spanish:
  - a causa de lo que le ha sucedido a Sión
  - por lo ocurrido a Sión
  lexicon: The construction expresses cause related to the events affecting Zion; the English revision moved from a looser 'over' to 'by'.
  rationale: ‘Por lo que le ha sucedido a Sión’ reproduce la causalidad directa y mantiene ‘Sión’ como nombre propio bíblico. ‘Le ha sucedido’ evita una paráfrasis más libre.
- source_word: until the consummation of the times
  english_pob_choice: until the consummation of the times
  chosen_spanish: hasta la consumación de los tiempos
  alternatives_spanish:
  - hasta el fin de los tiempos
  - hasta la consumación de la historia
  lexicon: The English POB keeps 'consummation' rather than simplifying to 'end'.
  rationale: ‘Consumación’ preserva la idea de culminación/consumación escatológica sin reducirla a mero final cronológico. ‘De los tiempos’ sigue de cerca la pluralidad del original y del inglés.
- source_word: that you may be a testimony
  english_pob_choice: that you may be a testimony
  chosen_spanish: para que seas un testimonio
  alternatives_spanish:
  - para que seas testimonio
  - para que sirvas de testimonio
  lexicon: The English revision prefers the noun phrase 'a testimony' over the older 'for a testimony'.
  rationale: ‘Un testimonio’ conserva el sustantivo y su función resultativa. Se evita ‘sirvas de testimonio’ porque introduce una formulación más interpretativa que el original no requiere.
theological_decisions:
- issue: Preservation until the eschatological consummation
  english_pob_reading: you will surely be preserved until the consummation of the times
  chosen_spanish_reading: ciertamente serás preservado hasta la consumación de los tiempos
  alternative_spanish_readings:
  - serás guardado hasta el fin de los tiempos
  - serás preservado hasta la consumación de la historia
  rationale: ‘Preservado’ mantiene la idea de protección providencial sin especificar el modo. ‘Ciertamente’ reproduce la fuerza de seguridad del enunciado.
  doctrine_reference: Providence / eschatological perseverance
- issue: Testimony as purpose
  english_pob_reading: that you may be a testimony
  chosen_spanish_reading: para que seas un testimonio
  alternative_spanish_readings:
  - para que seas testigo
  - para que sirvas como testimonio
  rationale: El texto presenta a la persona como un signo/testimonio; ‘testimonio’ conserva mejor el valor nominal y la finalidad. ‘Testigo’ desplaza el foco a la persona como agente, no como señal.
  doctrine_reference: Witness / sign function in prophetic discourse
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado en tres puntos: ''over'' → ''by'', ''to'' → ''until'', y ''for a testimony'' → ''a testimony''. La versión española sigue esas decisiones y evita volver a una formulación más libre. No hay notas textuales adicionales en el paquete de origen.'
  spanish_consistency_notes:
  - Se mantiene ‘Sión’ como nombre propio sin articularlo ni sustituirlo por ‘Jerusalén’.
  - Se usa ‘preservado’ en lugar de ‘guardado’ para sostener el registro formal y la idea de conservación providencial.
  - ‘Consumación de los tiempos’ conserva el plural y el tono escatológico del original.
  - La cláusula final usa un sustantivo (‘testimonio’) coherente con el cierre revisado del inglés POB.
