review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del siríaco tal como lo refleja la auditoría inglesa: causalidad por lo ocurrido a Sión, preservación segura hasta la consumación de los tiempos y finalidad de servir como testimonio. No hay desvíos teológicos importantes. Sin embargo, una elección léxica principal y su nota requieren ajuste para mejor español y mayor fidelidad al matiz de perturbación interior del contexto profético.'
  spanish_quality_summary: El texto es claro y digno, pero “fuiste sacudido[a]” suena más físico y menos natural en este contexto que “fuiste conmovido”. Además, el marcador inclusivo “[a]” incrustado en la palabra no es apropiado para el texto bíblico corrido y la nota es innecesaria si se adopta una opción española más natural. El resto del verso fluye bien.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. “Sión”, “consumación de los tiempos”, “preservado” y “testimonio” están bien alineados. El ajuste propuesto es solo de naturalidad y matiz contextual en “shaken”.
  issues:
  - severity: medium
    issue: “fuiste sacudido[a]” es una renderización poco natural en español bíblico aquí
    rationale: Aunque puede calcar la imagen de ‘shaken’, en contexto de aflicción por Sión suena demasiado físico. “Conmovido” preserva mejor la perturbación profunda sin sobreinterpretar.
  - severity: medium
    issue: Uso de “[a]” dentro de “sacudido[a]”
    rationale: Ese formato no corresponde a una nota léxica normal ni a la práctica esperada para el texto principal. Si hay nota, el marcador debe anclar una palabra o frase, no una solución de género editorial dentro del texto.
  - severity: low
    issue: La nota léxica deja de ser necesaria con una opción española más idiomática
    rationale: Si se adopta “conmovido”, no hace falta conservar alternativas para resolver una dificultad creada por la propia elección del borrador.
  revised_spanish_text: Porque fuiste conmovido por lo que le ha sucedido a Sión, por tanto, ciertamente serás preservado hasta la consumación de los tiempos, para que seas un testimonio.
  revision_rationale: Se reemplaza “sacudido[a]” por “conmovido” para reflejar de manera más natural en español la perturbación causada por lo ocurrido a Sión, manteniendo el pasivo y la fuerza causal del original. Se elimina la nota porque ya no resuelve una ambigüedad real ni preserva una alternativa necesaria.
