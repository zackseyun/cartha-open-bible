translation:
  language: es
  text: 'Les digo: «Ustedes que han bebido vino colado, también beberán su poso. Porque el juicio del Altísimo no muestra favoritismo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: I say to you
  english_pob_choice: I say to you
  chosen_spanish: Yo les digo
  alternatives_spanish:
  - Les digo
  - Yo les digo a ustedes
  lexicon: decir
  rationale: El siríaco, según el audio editorial, conserva un hablante divino directo a las naciones; el español debe mantener esa primera persona explícita y el destinatario plural sin cambiar la dinámica del discurso.
- source_word: you who have drunk strained wine
  english_pob_choice: You who have drunk strained wine
  chosen_spanish: Ustedes que han bebido vino colado
  alternatives_spanish:
  - los que han bebido vino filtrado
  - ustedes que bebieron vino colado
  lexicon: vino colado / colar
  rationale: «Strained wine» expresa vino pasado por filtro o colado; «vino colado» es claro, idiomático y conserva la imagen concreta sin suavizarla.
- source_word: its dregs
  english_pob_choice: its dregs
  chosen_spanish: sus heces
  alternatives_spanish:
  - su poso
  - sus sedimentos
  lexicon: heces / poso
  rationale: Para mantener la fuerza material de la imagen, «heces» reproduce mejor el residuo espeso que «poso», sin perder inteligibilidad en español bíblico contemporáneo.
- source_word: the judgment of the Most High
  english_pob_choice: the judgment of the Most High
  chosen_spanish: el juicio del Altísimo
  alternatives_spanish:
  - la sentencia del Altísimo
  - el juicio del Dios Altísimo
  lexicon: juicio
  rationale: «Juicio» conserva tanto el sentido forense como el acto divino de decidir, coherente con el tono profético del pasaje.
- source_word: shows no partiality
  english_pob_choice: shows no partiality
  chosen_spanish: no muestra favoritismo
  alternatives_spanish:
  - no hace acepción de personas
  - no mira a las personas
  lexicon: hacer acepción de personas / favoritismo
  rationale: La formulación española debe comunicar imparcialidad sin introducir una fórmula más eclesiástica de la necesaria; «favoritismo» es transparente y natural.
theological_decisions:
- issue: Speaker dynamics in the divine address
  english_pob_reading: I say to you
  chosen_spanish_reading: Yo les digo
  alternative_spanish_readings:
  - Les digo
  rationale: La revisión auditada corrigió un error que hacía hablar a los destinatarios; el texto dirige la palabra desde Dios a las naciones, y el español debe reflejar esa voz directa.
  doctrine_reference: Divine speech / prophetic address
- issue: Impartiality in divine judgment
  english_pob_reading: the judgment of the Most High shows no partiality
  chosen_spanish_reading: el juicio del Altísimo no muestra favoritismo
  alternative_spanish_readings:
  - el juicio del Altísimo no hace acepción de personas
  rationale: Se preserva el énfasis teológico de imparcialidad divina sin imponer una formulación litúrgica fija si el contexto no la exige.
  doctrine_reference: Divine justice and impartiality
translation_notes:
  revision_awareness: 'La base inglesa ya incorporó una corrección importante: donde antes se leía ''you shall say to them'', la revisión estableció ''I say to you''. También se añadió la comilla de cierre final; el español sigue esa lectura revisada y no introduce notas textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento plural de segunda persona con «ustedes» por coherencia con el destinatario plural del siriaco y del inglés revisado.
  - Se usa «Altísimo» como traducción reverente y estable de 'Most High'.
  - No se emplea 'SEÑOR' ni 'Cristo' porque no aparecen en el segmento ni responden a una necesidad lexical aquí.
