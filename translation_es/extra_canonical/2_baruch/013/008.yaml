    issue: «sus heces» para «its dregs»
    rationale: Aunque literalmente puede apuntar al residuo, en español contemporáneo «heces» se asocia fuertemente con excremento y puede distraer o distorsionar la imagen en un contexto de vino. «Su poso» o «sus sedimentos» preservan mejor el sentido en español natural y bíblicamente legible.
