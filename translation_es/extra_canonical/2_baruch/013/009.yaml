  rationale: La revisión del texto fuente subraya un marcador temporal relevante. 'Anteriormente' deja clara la distinción histórica sin doctrinalizar el versículo.
  doctrine_reference: providencia y juicio divino en 2 Baruch
- issue: Intensidad del trato hacia los hijos propios
