  rationale: 'Se conserva la tensión retórica: el objeto del juicio no es externo sino doméstico, reforzando la severidad del ejemplo bíblico.'
  doctrine_reference: juicio familiar/corporativo en literatura apocalíptica
- issue: Comparación hostil
  english_pob_reading: like his enemies
  chosen_spanish_reading: como a sus enemigos
