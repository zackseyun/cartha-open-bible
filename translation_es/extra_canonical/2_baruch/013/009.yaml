translation:
  language: es
  text: Por tanto, antes no eximió ni siquiera a sus propios hijos; más bien, los afligió como a sus enemigos porque pecaron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mn qdīm / formerly
  english_pob_choice: formerly
  chosen_spanish: anteriormente
  alternatives_spanish:
  - antes
  - en otro tiempo
  - antes, en el pasado
  lexicon: adverbio temporal
  rationale: El marcador temporal es crucial para el contraste histórico de la sentencia; 'anteriormente' conserva esa anterioridad sin sonar tan arcaico como 'en otro tiempo'.
- source_word: did not spare
  english_pob_choice: did not spare
  chosen_spanish: no perdonó
  alternatives_spanish:
  - no tuvo piedad de
  - no eximió a
  - no escatimó a
  lexicon: verbo de misericordia/exención
  rationale: '''Perdonar'' comunica bien la idea de no mostrar indulgencia o clemencia en español bíblico readable; mantiene la fuerza del juicio sin sobrecargar el verso.'
- source_word: even his own sons
  english_pob_choice: even his own sons
  chosen_spanish: ni siquiera a sus propios hijos
  alternatives_spanish:
  - ni a sus propios hijos
  - ni aun a sus propios hijos
  lexicon: intensificador + parentesco
  rationale: '''Ni siquiera'' reproduce la intensificación de exclusión; ''hijos'' es el equivalente natural y fiel de ''sons'' en este contexto, y ''propios'' refleja el sufijo posesivo.'
- source_word: afflicted
  english_pob_choice: afflicted
  chosen_spanish: los afligió
  alternatives_spanish:
  - los castigó
  - los hizo sufrir
  - los oprimió
  lexicon: verbo de sufrimiento/castigo
  rationale: '''Afligió'' conserva el matiz de causar sufrimiento, sin convertirlo de forma interpretativa en un castigo más específico de lo que el texto exige.'
- source_word: like his enemies
  english_pob_choice: like his enemies
  chosen_spanish: como a sus enemigos
  alternatives_spanish:
  - como a sus enemigos
  - como enemigos
  - igual que a sus enemigos
  lexicon: comparación con tratamiento hostil
  rationale: La preposición 'a' mantiene la referencia personal implícita en la comparación; el posesivo 'sus' refleja el sufijo del siríaco.
- source_word: because they sinned
  english_pob_choice: because they sinned
  chosen_spanish: porque pecaron
  alternatives_spanish:
  - porque habían pecado
  - pues pecaron
  - ya que pecaron
  lexicon: causal moral
  rationale: '''Pecaron'' es directo y fiel; el aoristo/pretérito simple español funciona bien para la causalidad moral sin añadir aspecto no documentado.'
