revisions:
- from: Por tanto, anteriormente no perdonó ni siquiera a sus propios hijos, sino que los afligió como a sus enemigos, porque pecaron.
  to: Por tanto, antes no eximió ni siquiera a sus propios hijos; más bien, los afligió como a sus enemigos porque pecaron.
  rationale: Se ajusta 'did not spare' a 'no eximió' para evitar la ambigüedad de 'perdonó' y reflejar mejor la idea de no librar del juicio. Se sustituye 'anteriormente' por 'antes' por mayor naturalidad, y se mejora la fluidez del contraste con 'más bien'. No se requieren notas, porque las alternativas inglesas registradas son variantes de redacción previa, no ambigüedades que deban preservarse en español.
