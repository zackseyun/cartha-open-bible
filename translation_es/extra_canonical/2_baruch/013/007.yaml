  philosophy: optimal-equivalence
lexical_decisions:
- source_word: when / 'When?'
  english_pob_choice: '''When?'''
  chosen_spanish: «¿Cuándo?»
  alternatives_spanish:
  - «¿En qué momento?»
  - «¿Para cuándo?»
  lexicon: Interrogativo temporal
  rationale: El sentido directo es una pregunta por el tiempo. «¿Cuándo?» reproduce con naturalidad la brevedad del original y la puntuación interrogativa del castellano sin añadir matices no atestiguados.
- source_word: at that time
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - para entonces
  lexicon: Expresión temporal
  rationale: «At that time» se vierte mejor como «en aquel tiempo» o «en ese tiempo» en español. Opté por «en aquel tiempo» por su tono más formal y bíblico, manteniendo la referencia temporal sin recalcar una localización que el original no exige.
translation_notes:
  revision_awareness: La revisión inglesa cambió 'in that time' por 'at that time' para hacer más idiomática la expresión temporal. La versión española sigue esa misma idiomaticidad con 'en aquel tiempo', sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Conservo una formulación breve y abierta, acorde con el carácter fragmentario de la unidad y con la economía del texto fuente.
  - No se añadieron notas porque no hay variantes textuales, tensiones lexicográficas mayores ni decisiones teológicas explícitas en este versículo.
