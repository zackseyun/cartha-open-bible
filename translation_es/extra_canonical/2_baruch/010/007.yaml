theological_decisions:
- issue: Lamento comunitario ante el juicio sobre Sion y Jerusalén
  english_pob_reading: we have seen the afflictions of Zion and what has happened to Jerusalem
  chosen_spanish_reading: hemos visto las aflicciones de Sion y lo que le ha sucedido a Jerusalén
  alternative_spanish_readings:
  - hemos visto las tribulaciones de Sion
  - hemos visto la aflicción de Sion y lo ocurrido a Jerusalén
  rationale: El texto presenta una confesión de duelo histórico por la devastación de la ciudad santa. «Aflicciones» preserva el plural o la amplitud de los sufrimientos sin adelantar una interpretación más específica que la atestiguada por el contexto.
  doctrine_reference: Lamento penitencial y memoria del juicio sobre Jerusalén en la literatura judía tardía
