translation:
  language: es
  text: 'Y tú, vid, ¿por qué sigues dando tu vino?


    Pues ya no se ofrecerá en Sion ofrenda alguna,


    ni se aceptarán[a] primicias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘serán recibidas’.
    reason: previous_rendering
lexical_decisions:
- source_word: ܟܪܡܐ / vine
  english_pob_choice: vine
  chosen_spanish: vid
  alternatives_spanish:
  - parra
  - viña
  lexicon: N/A
  rationale: ‘Vid’ conserva la imagen agrícola directa y funciona bien como vocativo en español; ‘viña’ tendería a nombrar el terreno, no la planta, y ‘parra’ suena menos neutral en este contexto poético.
- source_word: ܚܡܪܟ / your wine
  english_pob_choice: your wine
  chosen_spanish: tu vino
  alternatives_spanish:
  - tu mosto
  - tu bebida
  lexicon: N/A
  rationale: ‘Vino’ reproduce con precisión la bebida producida por la vid y mantiene el paralelo retórico del pasaje.
- source_word: ܡܬܩܪܒ / offered
  english_pob_choice: offered
  chosen_spanish: se ofrecerá
  alternatives_spanish:
  - se presentará
  - se traerá
  lexicon: N/A
  rationale: Sigo la corrección auditada que distingue este verbo sacrificial como ‘ofrecer’ y lo llevo a una pasiva refleja natural en español.
- source_word: ܩܪܒ in sacrificial context
  english_pob_choice: offered
  chosen_spanish: ofrenda
  alternatives_spanish:
  - sacrificio
  - oblación
  lexicon: N/A
  rationale: ‘Ofrenda’ mantiene el sentido cultual sin cargar innecesariamente el término con un matiz más técnico que el texto exige.
- source_word: Zion
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Sión
  lexicon: N/A
  rationale: ‘Sion’ es una forma plenamente inteligible en español bíblico; evito la tilde para mantener una grafía usual en ediciones bíblicas y literarias en español.
- source_word: ܩܒܠ / accepted
  english_pob_choice: accepted
  chosen_spanish: se aceptarán
  alternatives_spanish:
  - serán recibidas
  - serán admitidas
  lexicon: N/A
  rationale: Conservo la voz pasiva y el matiz de recepción/cobro cultual; en español ‘aceptar’ transmite bien la distinción frente a ‘ofrecer’.
- source_word: firstfruits
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  - ofrendas de primicias
  lexicon: N/A
  rationale: ‘Primicias’ es el equivalente bíblico consolidado y comunica de forma precisa la categoría cultual.
theological_decisions:
- issue: Distinción entre dos verbos cultuales distintos en el syríaco
  english_pob_reading: no offering from you will again be offered ... and no firstfruits will again be accepted
  chosen_spanish_reading: ya no se ofrecerá ... ninguna ofrenda, ni se aceptarán primicias
  alternative_spanish_readings:
  - ya no se recibirá ... ninguna ofrenda, ni se aceptarán primicias
  - ya no se ofrecerá ... ninguna ofrenda, ni se recibirán primicias
  rationale: La revisión auditada corrige ‘received’ a ‘offered’ para el primer verbo; en español mantengo la distinción entre ‘ofrecer’ y ‘aceptar’ para reflejar dos acciones cultuales diferentes.
  doctrine_reference: lexical distinction in sacrificial context
translation_notes:
  revision_awareness: 'La auditoría final confirmó sin cambios la lectura revisada: el primer verbo debe expresarse como ‘ofrecer’ y no como ‘recibir/aceptar’; el segundo conserva el sentido de ‘aceptar/recibir’. La versión española refleja esa distinción léxica y evita importar el error corregido en la revisión previa.'
  spanish_consistency_notes:
  - Uso ‘vid’ como vocativo para la planta, coherente con la imagen del texto.
  - Mantengo ‘Sion’ y ‘primicias’ como términos bíblicos estables en español.
  - Conservo una cadencia paralela en dos líneas negativas para reflejar la estructura del original.
