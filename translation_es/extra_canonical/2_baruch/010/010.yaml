  rationale: Se elimina la nota errónea del primer verbo porque contradice la decisión léxica auditada que distingue ‘ofrecer’ de ‘aceptar/recibir’. Se conserva solo una nota para el segundo verbo, donde sí existe una alternativa legítima (‘serán recibidas’). Además, se pule ligeramente la frase a ‘ofrenda alguna’ para mejorar la naturalidad del español sin alterar el sentido.
