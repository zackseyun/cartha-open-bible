translation:
  language: es
  text: 'Y él fue con el pueblo, pero yo, Baruc, volví y me senté delante de las puertas del templo, y levanté este lamento sobre Sión, y dije:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: went with the people
  english_pob_choice: went with the people
  chosen_spanish: fue con el pueblo
  alternatives_spanish:
  - anduvo con el pueblo
  - se fue con el pueblo
  lexicon: go
  rationale: El griego/siríaco de la idea de ‘ir’ se expresa de modo natural en español con ‘fue’. ‘Con el pueblo’ conserva el valor colectivo del sujeto sin añadir matices no documentados.
- source_word: returned
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: return
  rationale: ‘Volvió’ es claro, natural y fiel al movimiento de retorno indicado por el original; no introduce un matiz más formal que el texto no exige.
- source_word: sat before the gates of the temple
  english_pob_choice: sat before the gates of the temple
  chosen_spanish: me senté delante de las puertas del templo
  alternatives_spanish:
  - me senté ante las puertas del templo
  - me senté frente a las puertas del templo
  lexicon: sit; gate; temple
  rationale: ‘Delante de’ reproduce bien la relación espacial de ‘before’. Se mantiene el plural ‘puertas’ como en la fuente inglesa, sin simplificar a ‘puerta’, porque el acceso del templo puede concebirse como conjunto de entradas o portones.
- source_word: lifted up this lament over Zion
  english_pob_choice: lifted up this lament over Zion
  chosen_spanish: levanté este lamento sobre Sión
  alternatives_spanish:
  - elevé este lamento sobre Sión
  - pronuncié este lamento sobre Sión
  lexicon: lament; Zion
  rationale: ‘Levanté’ conserva la imagen verbal de elevar una voz/lamento, mientras ‘lamento’ traduce de forma directa el sustantivo. ‘Sobre Sión’ mantiene la preposición figurada del original, sin sustituirla por una paráfrasis interpretativa.
theological_decisions:
- issue: Referencia a Sión como objeto del lamento
  english_pob_reading: over Zion
  chosen_spanish_reading: sobre Sión
  alternative_spanish_readings:
  - acerca de Sión
  - por Sión
  rationale: Se conserva la imagen espacial/retórica del original, que presenta el lamento como pronunciado ‘sobre’ Sión. Cambiarlo a ‘acerca de’ suavizaría indebidamente la fuerza poética y lamentativa.
  doctrine_reference: Poética bíblica y lamentación profética
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios y con acuerdo alto entre controles; por eso se mantiene la redacción simple y cercana a la POB inglesa, sin introducir notas textuales o variantes no atestiguadas en el paquete recibido.
  spanish_consistency_notes:
  - Se mantiene ‘Baruc’ para el nombre propio según el uso español habitual.
  - Se conserva la puntuación introductoria con dos puntos al final, en correspondencia con el discurso directo que sigue en el versículo siguiente.
  - No se introduce ‘Yahvé’ porque este versículo no contiene el nombre divino en el texto base proporcionado.
