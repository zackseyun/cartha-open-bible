    changes_summary: Changed “I will speak to you” to “I will speak with you” to reflect the Syriac preposition (’ammak, “with you”).
translation:
  language: es
  text: Pero tú, quédate aquí en la desolación de Sion, y después de estos días hablaré contigo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “remain here” / stay here
  english_pob_choice: remain here
  chosen_spanish: quédate aquí
  alternatives_spanish:
  - permanece aquí
  - quédate aquí mismo
  lexicon: quedarse
  rationale: «Quédate» expresa de modo natural la permanencia ordenada del texto, sin añadir matices ajenos. Conserva la cercanía directiva del original mejor que una forma más rígida.
- source_word: desolation of Zion
  english_pob_choice: the desolation of Zion
  chosen_spanish: la desolación de Sion
  alternatives_spanish:
  - la devastación de Sion
  - el desierto de Sion
  lexicon: desolación
  rationale: «Desolación» reproduce bien el estado de ruina o abandono del sustantivo del pasaje; «Sion» mantiene la transliteración usual en español bíblico para Zion.
- source_word: after these days
  english_pob_choice: after these days
  chosen_spanish: después de estos días
  alternatives_spanish:
  - tras estos días
  - luego de estos días
  lexicon: después
  rationale: La frase es directa y fiel al valor temporal del original, sin forzar una interpretación escatológica que el Syriac no explicita en este versículo.
- source_word: I will speak with you
  english_pob_choice: I will speak with you
  chosen_spanish: hablaré contigo
  alternatives_spanish:
  - hablaré con usted
  - me comunicaré contigo
  lexicon: hablar con
  rationale: «Contigo» refleja de manera natural la preposición de compañía/relación indicada por el Syriac ’ammak («con/together with you»), manteniendo el tono personal del enunciado.
theological_decisions:
- issue: Ausencia de la interpolación apocalíptica en la segunda mitad del versículo
  english_pob_reading: I will speak with you
  chosen_spanish_reading: hablaré contigo
  alternative_spanish_readings:
  - te mostraré lo que ha de suceder en los últimos tiempos
  - te hablaré acerca de los últimos tiempos
  rationale: Se sigue la lectura corregida del Syriac controlado, que no contiene una promesa de revelación sobre «los últimos tiempos», sino simplemente una futura conversación con el destinatario.
  doctrine_reference: Crítica textual y fidelidad al testimonio siríaco; no corresponde introducir contenido escatológico no atestiguado en el control base.
translation_notes:
  revision_awareness: Se aplicó la revisión que corrige la interpolación apocalíptica heredada en la tradición inglesa y la revisión posterior que ajusta el valor del Syriac ’ammak a «con/contigo», por lo que el texto español evita tanto la promesa de «mostrar» como la traducción simple de «a ti».
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo en segunda persona singular, coherente con el hebraísmo/semítica del contexto y con el inglés auditado.
  - «Sion» se conserva como forma bíblica estable en español; no se moderniza a «Zion».
  - No se añade nota al pie porque no hay en este versículo una alternativa textual que deba anclarse en el texto español.
