lexical_decisions:
- source_word: springs
  english_pob_choice: springs
  chosen_spanish: manantiales
  alternatives_spanish:
  - fuentes
  - vertientes
  lexicon: source-generic noun for a water source
  rationale: «Manantiales» es un equivalente natural y amplio en español para springs en este contexto poético, sin añadir un matiz demasiado técnico ni perder la imagen de fuentes de agua que deben cesar su flujo.
- source_word: withhold
  english_pob_choice: withhold your waters
  chosen_spanish: retened vuestras aguas
  alternatives_spanish:
  - detened vuestras aguas
  - contened vuestras aguas
  lexicon: imperative of restraint/cessation
  rationale: «Retened» expresa con claridad la orden de no dejar salir el agua y conserva el valor de restricción del verbo inglés y del imperativo siriaco subyacente.
- source_word: waters
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  lexicon: plural noun for water in poetic/register use
  rationale: Se mantiene el plural «aguas» porque el expediente inglés revisado cambió a plural para reflejar el plural siriaco, y el español lo admite de forma natural en estilo poético.
- source_word: streams of water
  english_pob_choice: your streams of water
  chosen_spanish: vuestros arroyos de agua
  alternatives_spanish:
  - vuestros torrentes de agua
  - vuestras corrientes de agua
  lexicon: flowing-water noun phrase
  rationale: «Arroyos de agua» conserva la imagen de corrientes que brotan y fluyen; aunque no es la única opción, suena claro y bíblicamente comprensible en español sin diluir el paralelismo.
theological_decisions:
- issue: Paralelismo poético de dos mandatos a las aguas
  english_pob_reading: And you, springs, withhold your waters / And do not pour out your streams of water.
  chosen_spanish_reading: Y tú, manantiales, retened vuestras aguas / Y no derraméis vuestros arroyos de agua.
  alternative_spanish_readings:
  - Y vosotros, manantiales, retened vuestras aguas
  - Y no dejéis fluir vuestros arroyos de agua
  rationale: El texto es una exhortación poética dirigida a las fuentes de agua; la traducción preserva el paralelismo imperativo sin introducir una lectura alegórica no atestiguada. Se conserva el carácter directo y figurado del mandato.
  doctrine_reference: Poetic imperative in apocalyptic lament/curse imagery; no doctrinal expansion
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió una lectura gravemente errónea a «withhold your water» y la corrección posterior que pluralizó «waters» y añadió «your» para paralelismo. La versión española refleja ese estado revisado y evita cualquier lectura ajena al siriaco.
  spanish_consistency_notes:
  - Se prefirió un español moderno y digno, evitando el calco rígido.
  - Se conservó el tono poético de mandato directo.
  - No se usó «SEÑOR» ni terminología teológica ajena, porque el versículo no contiene el nombre divino ni cristología explícita.
  - Se mantuvo la pluralidad de «aguas» para corresponder al expediente revisado y al plural siriaco.
