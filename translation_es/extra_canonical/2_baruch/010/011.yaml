review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del siriaco auditado por el POB: un doble mandato poético dirigido a los manantiales para que retengan sus aguas y no las hagan correr. Conserva el plural de «aguas» y la posesión en ambas líneas. Sin embargo, hay una discordancia pronominal y verbal: «Y tú, manantiales» mezcla singular y plural, cuando el vocativo y los imperativos deben concordar en plural.'
  spanish_quality_summary: El español es legible y digno, pero «Y tú, manantiales, retened…» es gramaticalmente incorrecto. Además, «vuestros arroyos de agua» suena algo pesado y menos natural para un mandato a manantiales; «vuestras corrientes de agua» o simplemente «vuestras corrientes» fluye mejor en español bíblico moderno. Se recomienda una reparación menor.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Manantiales» para springs y «aguas» para waters están bien. El imperativo de restricción también es adecuado. El ajuste propuesto mejora la naturalidad sin apartarse del expediente fuente.
  issues:
  - severity: medium
    issue: Discordancia entre «tú» y «manantiales… retened / derraméis»
    rationale: El texto se dirige a un plural personificado («manantiales») y ya usa imperativos de segunda persona plural. «Tú» debe cambiarse a «vosotros» o eliminarse para mantener corrección y fidelidad al vocativo plural.
  - severity: low
    issue: «vuestros arroyos de agua» suena poco natural en este paralelismo
    rationale: Aunque no es incorrecto, «arroyos» nombra cauces más que corrientes emitidas por manantiales. «Corrientes de agua» preserva mejor la imagen de flujo y suena más idiomático en español neutro.
  revised_spanish_text: 'Y vosotros, manantiales, retened vuestras aguas


    Y no derraméis vuestras corrientes de agua.'
  revision_rationale: Se corrige la concordancia gramatical del vocativo plural y se ajusta la segunda línea a una expresión más natural en español, manteniendo el paralelismo y el sentido del siriaco/POB sin añadir ni quitar contenido.
