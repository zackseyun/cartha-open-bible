lexical_decisions:
- source_word: barren
  english_pob_choice: the barren
  chosen_spanish: la estéril
  alternatives_spanish:
  - la que no puede tener hijos
  - la mujer estéril
  lexicon: estéril
  rationale: El inglés POB usa un término directo y sobrio; «estéril» conserva la fuerza lexical y la contraposición con quienes tienen hijos, sin suavizarla hacia una paráfrasis explicativa.
- source_word: no children
  english_pob_choice: those who have no children
  chosen_spanish: las que no tienen hijos
  alternatives_spanish:
  - las sin hijos
  - las que carecen de hijos
  lexicon: hijos
  rationale: Se mantiene el contraste natural en español con el grupo anterior. «No tienen hijos» es claro, bíblico y evita la rareza de una formulación demasiado técnica.
- source_word: children
  english_pob_choice: those who have children
  chosen_spanish: las que tienen hijos
  alternatives_spanish:
  - las con hijos
  - las que poseen hijos
  lexicon: hijos
  rationale: La frase conserva el paralelismo del inglés POB y el sentido literal del siríaco, con un español idiomático y transparente.
theological_decisions:
- issue: La exhortación paradójica a alegrarse o lamentarse según la condición de fertilidad
  english_pob_reading: Rather... let the barren rejoice... but let those who have children grieve.
  chosen_spanish_reading: Más bien, que se alegre la estéril... pero que lloren las que tienen hijos.
  alternative_spanish_readings:
  - Sin embargo, que se alegre la estéril...
  - Antes bien, que se alegre la estéril...
  rationale: 'Se conserva el tono exhortativo y la inversión retórica del texto: la esterilidad es presentada como motivo de gozo y la maternidad como motivo de duelo en este contexto profético. No se atenúa la tensión teológica ni se introduce explicación que no está en la fuente.'
  doctrine_reference: Profética lamentación/inversión retórica del juicio; no se añade interpretación doctrinal externa.
