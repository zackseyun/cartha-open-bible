  lexicon: Verb of entry within the wedding context.
  rationale: El verbo simple «entrar» conserva la prohibición directa del original y evita añadir un objeto o lugar que no está explícito en el verso.
- source_word: virgins
  english_pob_choice: virgins
  chosen_spanish: las vírgenes
  alternatives_spanish:
  - las doncellas
  - las jóvenes
  lexicon: Term for unmarried women/virgins in ceremonial context.
  rationale: «Vírgenes» mantiene la referencia sexual/social del término y sigue de cerca la elección inglesa sin suavizarla a una categoría más amplia.
- source_word: adorn themselves
  english_pob_choice: adorn themselves
  chosen_spanish: se aderecen
  alternatives_spanish:
  - se adornen
  - se engalanen
  lexicon: Reflexive adornment verb.
  rationale: «Aderezarse» expresa el acto de arreglarse o adornarse para resaltar la apariencia; conserva la idea de preparación ornamental sin forzar un sentido demasiado moderno o demasiado solemne.
- source_word: women
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  - madres
  lexicon: General female referent.
  rationale: «Mujeres» es la designación general más directa y no introduce una relación matrimonial específica que el texto no desarrolla aquí.
- source_word: pray
  english_pob_choice: do not pray
  chosen_spanish: no oren
  alternatives_spanish:
  - no recen
  - no hagan oración
  lexicon: Verb of petition to God.
  rationale: «Orar» es el equivalente más amplio y reverente en español bíblico contemporáneo, adecuado para una prohibición de súplica.
- source_word: bear children
  english_pob_choice: to bear children
  chosen_spanish: para tener hijos
  alternatives_spanish:
  - para concebir hijos
  - para dar a luz hijos
  lexicon: Purpose phrase concerning childbearing.
  rationale: «Tener hijos» reproduce de forma clara y natural la finalidad negativa del verso; es menos técnico que «concebir» o «dar a luz» y evita estrechar el sentido a un solo momento del proceso.
