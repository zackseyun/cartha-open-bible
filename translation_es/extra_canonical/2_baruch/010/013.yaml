lexical_decisions:
- source_word: bridegrooms
  english_pob_choice: bridegrooms
  chosen_spanish: los novios
  alternatives_spanish:
  - los desposados
  - los recién casados
  lexicon: Lexical rendering of the wedding-state referent in context.
  rationale: «Novios» comunica de manera natural en español el grupo masculino en contexto de bodas sin introducir una formulación más eclesiástica o más técnica que el texto no exige.
- source_word: enter
  english_pob_choice: do not enter
  chosen_spanish: no entren
  alternatives_spanish:
