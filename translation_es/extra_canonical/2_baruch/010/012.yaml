translation:
  language: es
  text: 'Y tú, sol, detén tus rayos de luz;


    y tú, luna, extingue la abundancia de tu luz.


    Porque, ¿por qué habría de salir de nuevo la luz,


    donde la luz de Sion ha sido oscurecida?'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sun
  english_pob_choice: sun
  chosen_spanish: sol
  alternatives_spanish:
  - astro solar
  lexicon: standard Spanish common noun
  rationale: «sol» es el equivalente natural y directo; «astro solar» sería innecesariamente técnico para el registro poético del verso.
- source_word: withhold your rays of light
  english_pob_choice: withhold your rays of light
  chosen_spanish: retén tus rayos de luz
  alternatives_spanish:
  - detén tus rayos de luz
  - contén tus rayos de luz
  lexicon: rays of light -> rayos de luz; withhold -> retener
  rationale: La revisión inglesa fijó la idea de «your rays of light» como unidad. «Retén» conserva bien la imagen de impedir la emisión de luz sin añadir interpretación.
- source_word: moon
  english_pob_choice: moon
  chosen_spanish: luna
  alternatives_spanish:
  - satélite
  lexicon: standard Spanish common noun
  rationale: «luna» es el término transparente y poéticamente adecuado.
- source_word: extinguish the abundance of your light
  english_pob_choice: extinguish the abundance of your light
  chosen_spanish: extingue la abundancia de tu luz
  alternatives_spanish:
  - apaga la abundancia de tu luz
  - apaga la plenitud de tu luz
  lexicon: extinguish -> extinguir; abundance -> abundancia
  rationale: Se conserva la fuerza verbal de «extinguish» y el sustantivo concreto «abundancia», evitando suavizar la expresión a un mero «apaga».
- source_word: light
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  lexicon: standard Spanish noun
  rationale: «luz» mantiene la repetición retórica del verso y no fuerza un matiz interpretativo distinto.
- source_word: Zion
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Sión
  lexicon: proper name biblical
  rationale: «Sion» es la forma usual en español bíblico sin tilde; se mantiene el nombre propio sin expansión.
- source_word: has been darkened
  english_pob_choice: has been darkened
  chosen_spanish: ha sido oscurecida
  alternatives_spanish:
  - ha sido entenebrecida
  - se ha oscurecido
  lexicon: darken -> oscurecer (passive)
  rationale: «ha sido oscurecida» expresa bien la pasiva resultativa y conserva el registro poético sin un arcaísmo innecesario.
theological_decisions:
- issue: Personificación cósmica del sol y la luna como mandatados a cesar su luz
  english_pob_reading: Direct imperatives to sun and moon preserve the lament-poetic personification without doctrinal adjustment.
  chosen_spanish_reading: Imperativos directos al sol y a la luna, preservando la personificación poética sin reinterpretarla.
  alternative_spanish_readings:
  - sol y luna como meras metáforas de fuentes de luz
  - paráfrasis explicativa
  rationale: No hay razón textual para despersonificar la imagen; el español puede conservar la invocación poética tal como aparece en el original y en la POB inglesa.
  doctrine_reference: Poética bíblica; no implica cosmología literal normativa.
translation_notes:
  revision_awareness: La redacción sigue el texto inglés POB más reciente, especialmente la unidad «rayos de luz» en el primer hemistiquio, y conserva la repetición de «luz» en el final para reflejar la acumulación retórica del original. No se introdujeron notas textuales porque no hay variantes auditadas en el paquete proporcionado.
  spanish_consistency_notes:
  - Se usa «luz» de manera consistente en los tres miembros del verso.
  - Se mantiene el paralelismo imperativo con «Y tú...; y tú...» para reproducir la estructura retórica.
  - Se conserva «Sion» como topónimo bíblico estable en español.
  - No se emplea «SEÑOR» ni lenguaje de sustitución teológica porque el verso no contiene el nombre divino.
