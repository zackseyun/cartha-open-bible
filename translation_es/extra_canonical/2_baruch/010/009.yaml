review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura tripartita del siríaco reflejada en el POB inglés: vocativo a los labradores, apóstrofe a la tierra, e imperativo final de retención. Sin embargo, «fruto de tu cosecha» desplaza el sentido de «fruit of your produce» hacia el resultado cosechado, cuando el inglés auditado conserva más bien la idea de rendimiento/producto de la tierra. El resto del contenido se preserva sustancialmente.'
  spanish_quality_summary: El español es claro y digno, con buena personificación de la tierra. No obstante, «Ustedes, los labradores» suena algo pesado en vocativo; «Labradores» solo es más natural. Además, «Retén dentro de ti» es correcto, pero «Guarda dentro de ti» suena más idiomático en este contexto exhortativo.
  glossary_alignment: No hay términos del glosario doctrinal mayor en juego. «Labradores» y «tierra» son adecuados. Conviene ajustar «fruto de tu cosecha» a «fruto de tu producción» para reflejar mejor la doble expresión del POB auditado sin introducir una cosecha ya realizada.
  issues:
  - severity: medium
    issue: «el fruto de tu cosecha» no refleja con precisión «the fruit of your produce»
    rationale: «Cosecha» enfoca la recolección/resultante, mientras que «produce» aquí apunta al rendimiento o producción de la tierra. «Producción» preserva mejor la relación semántica entre fruto y aquello que la tierra produce.
  - severity: low
    issue: 'Vocativo inicial algo rígido: «Ustedes, los labradores»'
    rationale: En español bíblico-natural, «Labradores» basta para el llamado directo y evita una explicitación pronominal innecesaria.
  - severity: low
    issue: «Retén dentro de ti» es menos idiomático que una alternativa simple
    rationale: «Guarda dentro de ti» comunica la misma idea de mantener retenida la dulzura sin sonar tan forzado.
  revised_spanish_text: 'Labradores, no siembren otra vez;


    y tú, tierra, ¿por qué sigues produciendo el fruto de tu producción?


    Guarda dentro de ti la dulzura de tu alimento.'
  revision_rationale: Se ajusta el vocativo para mayor naturalidad en español, se corrige «cosecha» a «producción» para alinearlo mejor con el sentido preservado por el POB inglés, y se suaviza el imperativo final a una formulación más idiomática sin cambiar el significado.
