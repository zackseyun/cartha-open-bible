  rationale: Se ajusta el vocativo para mayor naturalidad en español, se corrige «cosecha» a «producción» para alinearlo mejor con el sentido preservado por el POB inglés, y se suaviza el imperativo final a una formulación más idiomática sin cambiar el significado.
