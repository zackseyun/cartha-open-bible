translation:
  language: es
  text: 'Labradores, no siembren otra vez;


    y tú, tierra, ¿por qué sigues produciendo el fruto de tu producción?


    Guarda dentro de ti la dulzura de tu alimento.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: farmers / labradores
  english_pob_choice: farmers
  chosen_spanish: labradores
  alternatives_spanish:
  - agricultores
  - campesinos
  lexicon: Spanish common usage; agricultural vocative
  rationale: «Labradores» conserva el vocativo directo y el matiz de quienes trabajan la tierra, sin volverlo técnico ni demasiado regional.
- source_word: sow again
  english_pob_choice: do not sow again
  chosen_spanish: no siembren otra vez
  alternatives_spanish:
  - no vuelvan a sembrar
  - no siembren de nuevo
  lexicon: Spanish verbal idiom for repeated sowing
  rationale: «No siembren otra vez» reproduce la prohibición de repetir la siembra con un castellano natural y claro.
- source_word: earth
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - suelo
  - terruño
  lexicon: Spanish noun for the ground producing crops
  rationale: «Tierra» mantiene la personificación de la tierra que produce frutos y es la forma más transparente en español.
- source_word: bring forth
  english_pob_choice: bring forth
  chosen_spanish: sigues produciendo
  alternatives_spanish:
  - sigues dando
  - sigues sacando
  lexicon: Spanish verbal phrase for yielding produce
  rationale: «Seguir produciendo» refleja el acto continuado de la tierra al dar fruto, sin perder la idea de permanencia del original.
- source_word: fruit of your produce
  english_pob_choice: fruit of your produce
  chosen_spanish: el fruto de tu cosecha
  alternatives_spanish:
  - el fruto de tu producción
  - el fruto de tu producto
  lexicon: Spanish agricultural semantic field
  rationale: «Fruto de tu cosecha» preserva el doble campo agrícola de fruto/cosecha con una expresión idiomática en español.
- source_word: sweetness of your nourishment
  english_pob_choice: sweetness of your nourishment
  chosen_spanish: la dulzura de tu alimento
  alternatives_spanish:
  - la dulzura de tu sustento
  - el dulzor de tu nutrición
  lexicon: Spanish lexical overlap for sustenance and taste
  rationale: «Dulzura» y «alimento» mantienen el sentido sensorial y de sustento del original de manera directa y comprensible.
theological_decisions:
- issue: Personificación de la tierra y suspensión de la fertilidad
  english_pob_reading: The earth is addressed as a responsive participant whose produce should cease.
  chosen_spanish_reading: La tierra es tratada como interlocutora y se le pide que detenga su producir.
  alternative_spanish_readings:
  - la tierra, ¿por qué sigues dando fruto?
  - ¿por qué sigues dando el fruto de tu producción?
  rationale: La versión española conserva la personificación sin suavizarla, porque forma parte del imperativo profético del pasaje.
  doctrine_reference: Poetic-prophetic personification; cf. rhetoric of creation in lament/judgment contexts
translation_notes:
  revision_awareness: This draft follows the latest English revision that changed 'give' to 'bring forth' and preserves that sense with a more idiomatic Spanish 'sigues produciendo' rather than a bare 'das'.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo en tres miembros: labradores / tierra / alimento.'
  - Se conserva el tono imperativo y la personificación profética.
  - No se introduce 'SEÑOR' ni terminología doctrinal ajena al verso.
