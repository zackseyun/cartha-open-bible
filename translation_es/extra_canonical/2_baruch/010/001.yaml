  text: '# Source page p0224 (printed 118)

    ܡܒܥܕܝ̈ܒܘܗܝ ܘܐܘ ܣܢ̈ܝܐ

    ܐܦܝܩ ܓܝܪ ܗܘ̣ ܕܢܛܪ

    ܒܝܬ̣ܐ ܘܐܬܒܥ ܒܝܬ ܐܢ

    ܒܪܘ̣ܗܝ ܗܘ̣ܘ ܡܢ ܒܝܬ

    ܗܠܝܢ. ܐܠܐ ܚܢܢ ܕܒܚܪܢ.

    ܘܐܝܕܘܗܝ ܒܥܝܢܐ ܘܠܒܝܫܝܢ

    ܕܚ̈ܠܬܘܗܝ. ܡܠܒܟܝܢ ܚܒܘ

    ܘܡܢܝܚܝܢ ܩܘ̣ܫܬܐ. ܘܠܝܬܝܗܘܢ

    ܡܥܪܒܝܢ ܦܓܪܗ ܘܡܕܡܝܗܘܢ

    ..ܠܘܬ ܡܥܒܕܐ ܕܒܝܫܬܐ. ܘ܀܀܀܀.

    9 ܘ ܐܬܒܥ ܐܢ ܒܪܘ̣ܗܝ

    ܘܐܬܩܒܠ ܗܘ̣ ܕܐܫܬܡܥ.

    ܀ ܕܟܕ ܠܒܝܫ ܡܢ ܚܛܝ̈ܗ̣ܐ

    ܗܘ̣ ܕܠܐ ܐܬܚܙܝ ܒܥܒܕܘܗܝ

    ܕܡܕܝܢܬܐ ܘܕܢܝ ܡܕ̈ܢܝܗ

    ܘܒܩ̈ܝ. ܘܐܬܒܥܝ ܘܕܩ̈ܝ

    10 .. ܝܡܝܟ ܐܘ ܡ̈ܢܝ ܆܀܆ ܗܘ̣ܘ

    ܡܢ ܒܝܬ ܝܡܝܟ ܝܘܡ̈ܝ.

    ܗܘ̣ ܒܠܥܕ ܦܘ ܨܒܘܬ

    ܕܐܠܗܐ ܘܐܡ̣ܪ ܠܝ. ܐܡ̣

    ܠܒܒܝܠ܂ ܐܢܬ ܕܝܢ ܩܘܡ

    ܗܟܝܠ ܒܚܘܫܒܝܟ ܕܢܗܘܘܢ܂

    ܘܠܐ ܡܚܘܐ ܐܢܐ ܠܟ

    ܡܢ ܒܬܪ ܗܠܝܢ ܝܘܡ̈ܬܐ܂

    ܡܕܡ ܕܥܬܝܕ ܕܢܓܕܫ

    ܒܙܒܢܐ ܝܘܡ̈ܝܐ܂

    ܘܐܡܪܬ ܠܐܪܡܝܐ ܐܚܝ

    ܕܦܩܕܢܝ ܡܪܝܐ܂ ܘܗܘ

    ܕܝܢ ܐܙܠ ܥܡ ܥܡܐ܂

    ܐܢܐ ܕܝܢ ܒܪܘܟ ܐܦܩܬ

    ܐܢܘܢ܂ ܘܝܬܒܬ ܩܕܡ

    ܬܪ̈ܥܘܗܝ ܕܗܝܟܠܐ ܘܐܠܝܬ

    ܐܠܝܬܐ ܗܕܐ ܥܠ

    ܨܗܝܘܢ ܘܐܡܪܬ܆ ܛܘܒܘܗܝ

    ܠܗܘ ܕܠܐ ܐܬܝܠܕ܂ ܐܘ

    ܠܗܘ ܕܐܬܝܠܕ ܘܡܝܬ܂

    ܠܢ ܕܝܢ ܠܐܝܠܝܢ ܕܚܝ̈ܝܢ ܚܙ

    ܠܢ܂ ܕܚ̈ܙܝܢܢ ܒܩ̈ܠܢܐ ܕܨܗܝܘܢ܂

    ܘܡܕܡ ܕܓܕܫܗ ܠܐܘܪܫܠܡ܂

    ܐܩܪܐ ܠܣܝܪ̈ܝܢܘܣ ܡܢ

    ܝܡܐ ܘܐܢܬܝܢ ܠܝ̈ܠܝܬܐ

    ܡܢ ܡܕܒܪܐ ܐ̈ܬܝ܆ ܘܫܐ̈ܕܐ


    # Source page p0223 (printed 119)

    ܘܝܕܘܥܐ ܡܢ ܥܒ̈ܕܐ.

    ܐܬܬܥܝܪܘ ܘܐܣܗܕܘ

    ܚܝ̈ܝܟܘܢ ܠܡܘܡܬܐ.

    ܘܣܒܘ ܒܗܘܢ ܐܪ̈ܒܥܬܐ

    ܘܐܡܪܘ ܒܫܡܝ ܕܐܢܬܘܢ

    ܦܠܚܝ̈ܢ ܠܐ ܬܙܥܘܢ ܬܘܒ.

    ܘܐܢܬ ܐܢܒܐ ܠܡܢܝ

    ܚܘܒܐ ܦܐܪ̈ܐ ܕܒ̈ܠܠܝܘܗܝ.

    ܐܝܟܢܐ ܒܨܝܪܝܢ ܚܠܝܡܘܬܐ

    ܕܡܙܘ̈ܢܝܟܝ. ܘܐܢܬ ܐܪܥܐ

    ܠܡܢܐ ܡܘܣܦܐܢܬܝ ܕܬܬܠܝܢ

    ܚܛܝ̈ܛܝܟܝ. ܕܠܐ ܬܘܒ

    ܡܬܩܒܠ ܡܢܟܝ ܒܨܝܪܘܬܝ.

    ܘܠܐ ܬܘܒ ܢܚܬ ܦܐܪ̈ܐ

    ܡܬܩܒܠܝܢ. ܘܐܢܬܘܢ

    ܡܥܝܢ̈ܐ ܐܝܟܘ ܠܒܟܘܢ.

    ܘܠܐ ܬܦܩܘܢ ܐܪ̈ܙܐ

    ܕܡܣܝܪܐ. ܘܐܢܬ ܝܡܡܐ

    ܐܝܟܘ ܢܘܗܪܟܘܢ ܕܠܚܫܟܘܢ.

    ܘܐܢܬ ܫܡܫܐ ܐܢܒܝ

    ܙܠܝ̈ܩܝܟ ܕܢܘܗܪܐ.

    ܠܡܢܐ ܓܝܪ ܗܘܝ ܠܝܠܝ

    ܢܘܗܪܐ ܐܢܘܢ ܕܡܘܬܐ

    ܕܐܝܟ ܗܟܢܐ. ܘܬܘܒ

    ܚܫܟܐ ܠܐ ܬܥܒܕܘܢ.

    ܘܒܬܪܘܬ ܟܘܟܒܐ ܠܐ

    ܢܨܡܚܘܢ ܘܠܝܡܐ ܢܗܪ

    ܠܐ ܬܪܟܢܘܢ ܕܬܒܘܢ. ܥܡܗܘܢ

    ܓܝܪ ܚܠܝܛܝܬܘܢ ܒܡܘܬܐ.

    ܘܚܕܝܬܘܢ ܥܡܗܘܢ ܕܠܝܬ ܠܗܘܢ

    ܟܐܒܐ. ܘܐܢܬܘܢ ܕܐܝܬ ܠܗܘܢ

    ܟܐܒܐ ܢܬܬܚܡܘܢ. ܠܡܢܐ

    ܓܝܪ ܚܕܝܢ ܒܘܪ̈ܟܐ ܘܡܒܪܟ

    ܒܬܘܠܬܝܐ. ܐܘ ܠܡܢܐ

    ܗܘܝ ܣܒܪܝܢ ܢܫܝ̈ܐ ܡ̈ܢܝ

    ܒܛܢܝ̈ܗܝܢ. ܐܘ ܐܢܫܐ

    ܕܡܘܠܕܝܢ ܠܡܢܐ ܗܘܝ

    ܡܣܒܪܝܢ. ܐܢܘܢ ܕܐܝܬ

    ܐܡܐ ܚܕܝܬܐ. ܘܒܢܝ̈ܗ

    ܐܬܬܒܝܘ. ܡܢ ܗܫܐ

    ܠܐ ܗܘܝ ܬܙܡܪܘܢ ܥܠ

    ܫܘܦܪܐ. ܘܠܐ ܬܚܬܘܢ'
