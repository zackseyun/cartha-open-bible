translation:
  language: es
  text: 'Invocaré a las sirenas del mar,


    y ustedes, Lilits, vengan del desierto,


    y los demonios y chacales[a] de los bosques:


    despierten y cíñanse la cintura para el lamento,


    y entonen lamentación conmigo,


    y laméntense conmigo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘y los demonios de los bosques:’.
    reason: lexical_alternative
lexical_decisions:
- source_word: Sirens
  english_pob_choice: Sirens
  chosen_spanish: sirenas
  alternatives_spanish:
  - sirenas
  lexicon: lexical alignment
  rationale: La figura mitológica se mantiene como término conocido en español; la fuente y la versión inglesa conservan el nombre propio común sin domesticarlo.
- source_word: Liliths
  english_pob_choice: Liliths
  chosen_spanish: liliths
  alternatives_spanish:
  - lilits
  - lilitas
  lexicon: lexical alignment
  rationale: Se conserva el plural transliterado como en el inglés POB para no borrar el referente demonológico particular del texto fuente.
- source_word: demons
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  - demonias
  lexicon: lexical alignment
  rationale: ‘Demonios’ es el equivalente directo y conserva la fuerza sobrenatural del término sin suavizarlo.
- source_word: jackals
  english_pob_choice: jackals
  chosen_spanish: chacales
  alternatives_spanish:
  - lobos
  - animales salvajes
  lexicon: lexical alignment
  rationale: El ajuste inglés revisado añade el segundo ser nombrado en el texto siríaco; ‘chacales’ es la correspondencia zoológica natural en español.
- source_word: awake
  english_pob_choice: awake
  chosen_spanish: despierten
  alternatives_spanish:
  - velen
  - levántense
  lexicon: lexical alignment
  rationale: El imperativo plural transmite el llamado a responder de inmediato, sin añadir sentidos como ‘testificar’ que no están en el original.
- source_word: gird your loins
  english_pob_choice: gird your loins
  chosen_spanish: ciñan sus lomos
  alternatives_spanish:
  - ceñan sus cinturas
  - prepárense
  lexicon: lexical alignment
  rationale: ‘Lomos’ conserva el giro semítico y la imagen corporal concreta del original, en lugar de una paráfrasis más abstracta.
- source_word: for mourning
  english_pob_choice: for mourning
  chosen_spanish: para el lamento
  alternatives_spanish:
  - para duelo
  - para llanto
  lexicon: lexical alignment
  rationale: El contexto poético admite ‘lamento’ como sustantivo de duelo/clamor; evita introducir ‘saco’ o ‘cilicio’, que el texto revisado explícitamente no contiene.
- source_word: take up lamentation
  english_pob_choice: take up lamentation
  chosen_spanish: tomen el lamento
  alternatives_spanish:
  - asuman el duelo
  - entonen lamento
  lexicon: lexical alignment
  rationale: La fórmula preserva el acto de asumir o tomar el lamento junto con el hablante, sin agregar una modalidad litúrgica no indicada por la fuente.
- source_word: mourn
  english_pob_choice: mourn
  chosen_spanish: laméntense
  alternatives_spanish:
  - guarden duelo
  - lloren
  lexicon: lexical alignment
  rationale: El verbo refleja la repetición final del llamado al duelo compartido con el hablante.
theological_decisions:
- issue: Enumeración de criaturas/seres convocados del mar, desierto y bosques
  english_pob_reading: The verse summons multiple non-human beings from distinct habitats; the revised English specifically includes both demons and jackals from the forests.
  chosen_spanish_reading: El verso convoca a varios seres no humanos desde hábitats distintos; la revisión incluye explícitamente a los demonios y a los chacales de los bosques.
  alternative_spanish_readings:
  - demonios de los bosques
  - demonios y animales salvajes de los bosques
  rationale: La redacción sigue la corrección fuente-adjudicada y mantiene la tensión entre seres demoníacos y bestiales sin fusionarlos en una categoría vaga.
  doctrine_reference: poetic demonology / apocalyptic imagery
- issue: ‘gird your loins for mourning’ vs. interpretive additions like ‘sackcloth’ or ‘testify’
  english_pob_reading: The corrected English restores a concrete mourning image and removes unsupported additions.
  chosen_spanish_reading: ‘ciñan sus lomos para el lamento’ conserva la imagen concreta del duelo y evita añadidos no atestiguados.
  alternative_spanish_readings:
  - ‘prepárense para el duelo’
  - ‘ciñan sus cinturas para el lamento’
  rationale: La imagen corporal es parte del efecto profético-apocalíptico; la traducción debe conservarla sin introducir elementos penitenciales ajenos al testimonio del texto.
  doctrine_reference: textual fidelity / prophetic imagery
translation_notes:
  revision_awareness: Se incorporó la corrección fuente-adjudicada que añade ‘y chacales’ junto a ‘demonios’ en los bosques, y se evitó reproducir la lectura errónea anterior de ‘testificar’ y ‘cilicio’. La versión española sigue el texto siríaco controlado y el cierre del vacío de concordancia del POB inglés revisado.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usó ‘liliths’ transliterado para preservar el nombre de la criatura, en paralelo con el inglés auditado.
  - Se evitó ‘siervo’, ‘señor’ y otras sustituciones no requeridas por la fuente.
  - La única nota al pie está anclada en el texto con [a], tal como exige la validación.
