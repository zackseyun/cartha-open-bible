    changes_summary: Improved natural English by moving “again” after “be named” and removing the redundant “away” from “gone away into captivity,” while preserving all source elements and formal tone.
translation:
  language: es
  text: ¿O por qué habría de tener hijos de nuevo la gente, o por qué habría de nombrarse de nuevo la simiente de su naturaleza, cuando esta madre yace desolada y sus hijos han marchado al cautiverio?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: people again have children
  english_pob_choice: people again have children
  chosen_spanish: las personas ... tener hijos de nuevo
  alternatives_spanish:
  - la gente ... volver a tener hijos
  - los hombres ... procrear otra vez
  lexicon: people / children
  rationale: En español, «las personas» mantiene el sentido general e impersonal de la pregunta retórica. «Tener hijos de nuevo» conserva la repetición del acto reproductivo sin añadir una carga estilística excesiva.
- source_word: the seed of their nature
  english_pob_choice: the seed of their nature
  chosen_spanish: la simiente de su naturaleza
  alternatives_spanish:
  - la descendencia de su naturaleza
  - la semilla de su naturaleza
  lexicon: seed
  rationale: «Simiente» reproduce el valor más cercano al término de descendencia/progenie del original y mantiene el tono bíblico. «De su naturaleza» conserva la conexión posesiva y cualitativa del giro fuente.
- source_word: be named again
  english_pob_choice: be named again
  chosen_spanish: ser nombrarse de nuevo / nombrarse de nuevo
  alternatives_spanish:
  - ser nombrada otra vez
  - volver a ser llamada
  lexicon: name
  rationale: La secuencia «ser nombrarse» no es idiomática en español; por eso se resuelve como «nombrarse de nuevo», preservando la idea de que la descendencia vuelva a ser contada/registrada. La repetición de «de nuevo» mantiene el énfasis del original sin forzar una paráfrasis mayor.
- source_word: this mother lies desolate
  english_pob_choice: this mother lies desolate
  chosen_spanish: esta madre yace desolada
  alternatives_spanish:
  - esta madre está desolada
  - esta madre permanece desierta
  lexicon: desolate
  rationale: «Yace desolada» conserva la imagen de ruina/abandonamiento y el matiz estático del original mejor que una simple copula. «Madre» se mantiene literal como personificación de la comunidad o tierra.
- source_word: have gone into captivity
  english_pob_choice: have gone into captivity
  chosen_spanish: han ido al cautiverio
  alternatives_spanish:
  - han sido llevados cautivos
  - han caído en cautiverio
  lexicon: captivity
  rationale: «Han ido al cautiverio» sigue de cerca la formulación del texto fuente y mantiene la idea de destino histórico de deportación. Se evita imponer una interpretación más específica que el original no exige.
theological_decisions:
- issue: Personificación de la comunidad como madre
  english_pob_reading: this mother lies desolate
  chosen_spanish_reading: esta madre yace desolada
  alternative_spanish_readings:
  - esta madre está desolada
  - esta madre permanece desierta
  rationale: Se conserva la personificación sin explicitarla como nación o Jerusalén, porque el pasaje la deja en imagen poética. La traducción mantiene la ambigüedad reverente del original.
  doctrine_reference: poetic imagery / communal lament
- issue: Captivity as historical judgment
  english_pob_reading: have gone into captivity
  chosen_spanish_reading: han ido al cautiverio
  alternative_spanish_readings:
  - han sido llevados cautivos
  - han caído en cautiverio
  rationale: La frase se traduce de forma directa para no suavizar el juicio histórico implícito ni convertirlo en un mero estado espiritual.
  doctrine_reference: exile/judgment motif
- issue: Repetition and rhetorical force
  english_pob_reading: again ... again
  chosen_spanish_reading: de nuevo ... de nuevo
  alternative_spanish_readings:
  - otra vez ... otra vez
  - nuevamente ... nuevamente
  rationale: Se mantiene la duplicación retórica, ya que intensifica la pregunta de lamento. No se reduce la repetición porque forma parte de la fuerza poética del pasaje.
  doctrine_reference: rhetorical parallelism
translation_notes:
  revision_awareness: El inglés POB fue revisado para mejorar naturalidad manteniendo todos los elementos de la fuente; la versión española sigue esa lectura revisada, preservando la repetición retórica y la sintaxis de pregunta con desolación y cautiverio. No se añadieron notas textuales porque el paquete fuente no aporta variantes relevantes para este versículo.
  spanish_consistency_notes:
  - Se usó «cautiverio» para mantener el registro bíblico y la correspondencia con el inglés POB.
  - Se prefirió «simiente» por consistencia con terminología bíblica tradicional de descendencia, sin introducir un tecnicismo moderno.
  - No se introdujo «Mesías», «Yahvé» ni otros términos no presentes en el versículo.
