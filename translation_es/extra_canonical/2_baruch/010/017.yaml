    changes_summary: Removed the ellipsis for completeness and normalized phrasing to more natural English (“do not speak again of” instead of “do not again speak of”). Retained “think about” reflecting the Syriac Ethpael of r’y (consider/meditate).
translation:
  language: es
  text: 'Desde ahora, no hables más de la belleza,

    y no pienses en la hermosura.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “speak again of” / Syriac speech verb
  english_pob_choice: do not speak again of beauty
  chosen_spanish: no hables más de la belleza
  alternatives_spanish:
  - no vuelvas a hablar de la belleza
  - no hables otra vez de la belleza
  lexicon: speak
  rationale: El inglés POB ya descartó una lectura verbal sustantivada y la revisión confirmó el valor de 'hablar'. 'No hables más de' reproduce bien el matiz de cese repetido sin sonar arcaico en español.
- source_word: “think about” / Syriac Ethpael of r'y
  english_pob_choice: do not think about loveliness
  chosen_spanish: no pienses en la hermosura
  alternatives_spanish:
  - no medites en la hermosura
  - no consideres la hermosura
  lexicon: think
  rationale: La revisión auditada indica que el verbo significa principalmente 'considerar, pensar o meditar'. En español, 'pensar en' es la opción más natural y fiel; 'meditar' o 'considerar' serían posibles pero algo más marcadas.
- source_word: beauty / loveliness
  english_pob_choice: beauty / loveliness
  chosen_spanish: belleza / hermosura
  alternatives_spanish:
  - hermosura / belleza
  - belleza / encanto
  lexicon: beauty
  rationale: Mantengo dos términos distintos como en el inglés POB para conservar el paralelismo poético y la pequeña variación semántica. 'Belleza' y 'hermosura' son equivalentes naturales y dignos en español; 'hermosura' suele sonar algo más literaria, útil para el segundo colon.
translation_notes:
  revision_awareness: 'Se siguió la última revisión del inglés POB: se conserva ''think about'' en vez de una formulación ligada a ''hablar'', y se elimina cualquier elipsis final, manteniendo el cierre completo del verso.'
  spanish_consistency_notes:
  - Se preservó el paralelismo de dos miembros con imperativo negativo.
  - No se introdujo léxico eclesiástico innecesario; el verso es poético y exhortativo.
  - '''Belleza'' y ''hermosura'' se diferenciaron levemente para reflejar la duplicación del inglés POB sin forzar un calco exacto.'
