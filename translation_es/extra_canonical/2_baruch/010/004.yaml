  text: Y hablé a mi hermano Jeremías, como Yahvé me había mandado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: spoke
  english_pob_choice: spoke
  chosen_spanish: hablé
  alternatives_spanish:
  - le hablé
  - dije
  lexicon: hablar
  rationale: El verbo indica acto de comunicación directa y queda bien en español con valor simple y narrativo. «Le hablé» explicita el objeto indirecto, pero no es necesario si el contexto ya identifica a Jeremías; «dije» sería más general y menos fiel al acto de hablar con alguien.
- source_word: brother
  english_pob_choice: my brother Jeremiah
  chosen_spanish: mi hermano Jeremías
  alternatives_spanish:
  - Jeremías, mi hermano
  - mi hermano, Jeremías
  lexicon: hermano
  rationale: Se conserva el parentesco explícito del original y del inglés auditado. El orden «mi hermano Jeremías» es natural en español bíblico y mantiene la apposición sin añadir énfasis interpretativo.
- source_word: Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: Lord / divine title
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה en textos donde ese nombre es el referente directo, aquí la evidencia disponible en el audit trail es la forma inglesa fija «the Lord». Sin un marcador textual adicional del nombre divino en el paquete fuente, se mantiene la designación reverencial tradicional «el Señor» para no forzar una identificación que el expediente no documenta explícitamente.
- source_word: had commanded
  english_pob_choice: had commanded me
  chosen_spanish: me había mandado
  alternatives_spanish:
  - me había ordenado
  - me había dado mandamiento
  lexicon: command
  rationale: «Mandar» transmite la fuerza directiva del verbo sin sonar excesivamente jurídico en español moderno. «Ordenado» es posible, pero «mandado» resulta más idiomático en la narración bíblica. Se preserva el pasado anterior de la acción respecto del habla.
theological_decisions:
- issue: Referencia al nombre divino en un contexto de mandato
  english_pob_reading: as the Lord had commanded me
  chosen_spanish_reading: como el Señor me había mandado
  alternative_spanish_readings:
  - como Yahvé me había mandado
  - según me había mandado el Señor
  rationale: El expediente inglés no documenta una decisión lexical específica sobre el tetragrámaton en este versículo. Por ello, la traducción española conserva el valor reverencial de «el Señor» tal como está atestiguado en el audit trail, evitando introducir una identificación nominal más fuerte sin respaldo explícito del material provisto.
  doctrine_reference: Uso reverencial del título divino; cautela textual en ausencia de señalación explícita del nombre.
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado solo por el orden del aposicional: de «Jeremiah my brother» a «my brother Jeremiah». La versión española refleja esa forma final sin necesidad de nota, manteniendo la misma relación sintáctica y el mismo sentido global.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y directo.
  - No se introducen glosas explicativas que excedan el sentido del versículo.
  - La puntuación conserva la pausa natural de la apposición con coma antes de la cláusula comparativa.
