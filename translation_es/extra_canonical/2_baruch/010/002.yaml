translation:
  language: es
  text: «Dile a Jeremías que vaya y acompañe a los cautivos del pueblo hasta Babilonia».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “Tell” (implied command to Jeremiah)
  english_pob_choice: Tell Jeremiah to go
  chosen_spanish: Dile a Jeremías que vaya
  alternatives_spanish:
  - Dile a Jeremías que se vaya
  - Ordénale a Jeremías que vaya
  lexicon: implied imperative / reportative command
  rationale: El original transmite una orden indirecta dirigida a Jeremías. «Dile a Jeremías que vaya» conserva ese mandato sin añadir dureza innecesaria ni perder la estructura de habla reportada.
- source_word: accompany
  english_pob_choice: accompany
  chosen_spanish: acompañe
  alternatives_spanish:
  - vaya con
  - acompañe a
  lexicon: הלך/acompañar (contextual directive)
  rationale: «Acompañe» reproduce la idea de ir junto con ellos de manera personal y deliberada. En español suena natural y mantiene la fuerza de la comisión.
- source_word: captives
  english_pob_choice: captives
  chosen_spanish: los cautivos
  alternatives_spanish:
  - los exiliados
  - la cautividad
  lexicon: person-focused noun
  rationale: Sigo la revisión inglesa que pasó de «captivity» a «captives» porque el referente son personas, no una condición abstracta. «Cautivos» conserva esa focalización personal y es más fiel que «cautividad».
- source_word: the people
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - del pueblo de Israel
  - de la gente
  lexicon: collective people-group
  rationale: «Del pueblo» mantiene el colectivo sin sobreespecificar. El contexto permite entender el grupo sin añadir elementos no explicitados por la fuente.
- source_word: Babylon
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilón
  lexicon: toponym
  rationale: Se usa la forma española estable y reconocible del topónimo bíblico, sin alterar el referente geográfico.
theological_decisions:
- issue: Treatment of the destination and exile context
  english_pob_reading: accompany the captives of the people as far as Babylon
  chosen_spanish_reading: acompañe a los cautivos del pueblo hasta Babilonia
  alternative_spanish_readings:
  - acompañe a la cautividad del pueblo hasta Babilonia
  - acompañe al pueblo cautivo hasta Babilonia
  rationale: 'La frase mantiene el carácter pastoral y narrativo del envío: Jeremías debe ir con personas concretas en su desplazamiento hacia el exilio. Evito abstraer el grupo en «cautividad», porque la revisión inglesa documenta una decisión explícita en favor de «captives».'
  doctrine_reference: Exilio y acompañamiento profético en 2 Baruch; fidelidad al referente humano del grupo desplazado
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió «captivity» por «captives» para centrar el referente en personas concretas y añadió la puntuación final. La redacción española refleja esa decisión con «los cautivos» y conserva el sentido directo de la orden sin introducir paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como topónimo estándar en español.
  - Se prefiere «cautivos» frente a «cautividad» para seguir la revisión inglesa y evitar abstracción innecesaria.
  - El registro es bíblico y claro, sin arcaísmos innecesarios.
