translation:
  language: es
  text: '¿Por qué han de dar a luz con dolor

    y sepultar con gemidos?'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Syriac verb ܝܠܕ (n'ldn)
  english_pob_choice: give birth
  chosen_spanish: dar a luz
  alternatives_spanish:
  - parir
  - alumbrar
  lexicon: ܝܠܕ
  rationale: El audit trail inglés corrigió la ambigüedad de 'bear' hacia 'give birth'. En español, 'dar a luz' transmite de forma natural y fiel la acción de alumbrar, sin sugerir 'soportar' ni 'cargar con'.
- source_word: pain / groaning
  english_pob_choice: pain / groaning
  chosen_spanish: dolor / gemidos
  alternatives_spanish:
  - penas / lamentos
  - dolores / gemir
  lexicon: dolor; gemido
  rationale: 'Mantengo el paralelismo afectivo del hebreo/siríaco reflejado en el inglés: el nacimiento ocurre en dolor y el entierro en gemido. ''Gemidos'' conserva el matiz auditivo y solemne mejor que un simple ''llanto''.'
- source_word: bury
  english_pob_choice: bury
  chosen_spanish: sepultar
  alternatives_spanish:
  - enterrar
  - inhumar
  lexicon: sepultar
  rationale: '''Sepultar'' es una opción digna y bíblica en español, cercana a ''bury'' pero con un registro más solemne. ''Enterrar'' también sería válido, pero ''sepultar'' encaja mejor con el tono poético de la pregunta retórica.'
theological_decisions:
- issue: La pregunta retórica contrasta nacimiento y muerte sin añadir doctrina extra.
  english_pob_reading: For why should they give birth in pain and bury in groaning?
  chosen_spanish_reading: ¿Por qué han de dar a luz con dolor y sepultar entre gemidos?
  alternative_spanish_readings:
  - ¿Por qué han de parir con dolor y enterrar entre gemidos?
  - ¿Por qué deben dar a luz con dolor y sepultar con gemidos?
  rationale: No hay una decisión doctrinal compleja aquí; la tarea es preservar el paralelismo y la interrogación retórica. Evito introducir interpretación causal o moral no presente en el texto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente confirma que el cambio inglés de 'bear' a 'give birth' resuelve la ambigüedad moderna; la versión española sigue esa corrección y no conserva la lectura ambigua.
  spanish_consistency_notes:
  - Uso 'dar a luz' para reflejar con claridad el verbo de parto indicado por el siríaco.
  - Mantengo el paralelismo 'dolor / gemidos' para no diluir la estructura poética.
  - El registro es bíblico y sobrio, sin arcaísmos innecesarios.
