- from: 'Y yo, Baruc, fui de allí y llegué al pueblo, y los reuní desde el grande hasta el pequeño. Y les dije: «Escuchen, hijos de Israel. Vean cuán pocos de ustedes han quedado de las doce tribus de Israel. A ustedes y a sus padres Yahvé les dio la ley más que a todas las naciones. Y porque sus hermanos transgredieron los mandamientos del Altísimo, él trajo sobre ellos lo que ustedes han visto. Pero ustedes también, si no hacen lo recto, como hicieron sus hermanos, el Justo juzgará sus obras, porque él es el Poderoso a quien buscan y el Poderoso en quien esperan. Y él mira para preservar, no para abandonar. ¿No han visto lo que le sucedió a Sión? ¿O piensan que el lugar pecó, y por eso fue derribado? ¿O que la tierra hizo algún mal, y por eso fue entregada? ¿Y no saben que por causa de ustedes fueron destruidas las cosas que no pecaron, y por lo que ustedes hicieron fue entregado aquello que no hizo mal?». Y todo el pueblo me respondió y dijo: «Porque recordamos los buenos testimonios
    que el Poderoso hizo con usted, y también los que no hemos visto, el Ungido[a] vendrá. Pero ahora, pida por nosotros desde lo alto, y escriba también a nuestros hermanos en Babilonia una carta de instrucción y un escrito de esperanza, para que también les muestre algo de lo que no se ha apartado de ustedes. Porque los pastores de Israel han perecido, y las lámparas que daban luz se han apagado, y los manantiales de los que solíamos beber han cesado. Y nos hemos quedado en tinieblas, y en la espesura del bosque, y en la sed del desierto».'
  to: 'Y yo, Baruc, fui de allí y llegué al pueblo, y los reuní desde el grande hasta el pequeño. Y les dije: «Escuchen, hijos de Israel. Vean cuán pocos de ustedes han quedado de las doce tribus de Israel. A ustedes y a sus padres Yahvé les dio la ley más que a todas las naciones. Y porque sus hermanos transgredieron los mandamientos del Altísimo, él trajo sobre ellos lo que ustedes han visto. Pero ustedes también, si no hacen lo recto, como hicieron sus hermanos, el Justo juzgará sus obras, porque él es el Poderoso a quien buscan y el Poderoso en quien esperan. Y él vela por preservar, no por abandonar. ¿No han visto lo que le sucedió a Sión? ¿O piensan que el lugar pecó, y por eso fue derribado? ¿O que la tierra hizo algún mal, y por eso fue entregada? ¿Y no saben que por causa de ustedes fueron destruidas las cosas que no pecaron, y por lo que ustedes hicieron fue entregado aquello que no hizo mal?». Y todo el pueblo me respondió y dijo: «Porque recordamos los buenos testimonios que
    el Poderoso hizo con usted, como hemos visto, y también los que no hemos visto, el Mesías[a] vendrá. Pero ahora, pida por nosotros desde lo alto, y escriba también a nuestros hermanos en Babilonia una carta de instrucción y un escrito de esperanza, para que también les muestre algo de lo que no se ha apartado de usted. Porque los consejos de Israel han perecido, y las lámparas que daban luz se han apagado, y los manantiales de los que solíamos beber han cesado. Y nos hemos quedado en tinieblas, y en la espesura del bosque, y en la sed del desierto».'
  rationale: 'Se corrige la desalineación más importante con la auditoría fuente-controlada: ܪ̈ܥܘܬܐ pasa de ‘pastores’ a ‘consejos’. También se ajusta Χριστός a ‘Mesías’ según la pauta terminológica del proyecto, conservando ‘Ungido’ en nota como alternativa. Además, se mejora la naturalidad de ‘he sees to preserve’ con ‘vela por preservar’ y se corrige el referente singular ‘de usted’ para corresponder al discurso del pueblo a Baruc.'
