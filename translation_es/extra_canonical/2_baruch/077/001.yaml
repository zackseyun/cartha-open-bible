lexical_decisions:
- source_word: ܢܡܘܣܐ
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la norma
  lexicon: Payne Smith
  rationale: Conserva el sentido pactal y normativo que estructura la exhortación; en este contexto español, ‘la ley’ es claro y fiel, mientras que ‘instrucción’ sería demasiado débil en el v. 3.
- source_word: ܡܪܝܐ
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: 'Proyecto POB: YHWH -> Yahvé'
  rationale: La fuente alude al nombre divino del pacto; el estándar del proyecto pide ‘Yahvé’ en el texto principal, no el reemplazo reverencial ‘Señor’.
- source_word: ܡܪܝܡܐ
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Exaltado
  lexicon: Payne Smith
  rationale: ‘El Altísimo’ es la equivalencia reverencial natural y reconocible en español para el título divino apocalíptico.
- source_word: ܙܕܝܩܐ
  english_pob_choice: the righteous one
  chosen_spanish: el Justo
  alternatives_spanish:
  - el justo
  - el recto
  lexicon: Payne Smith
  rationale: Aquí el sustantivo funciona como designación divina o judicial; ‘el Justo’ preserva la forma titular y evita diluirlo en una descripción adjetival.
- source_word: ܡܚܝܠܐ / ܡܚܣܢܢܐ
  english_pob_choice: the Mighty One / merciful in related audit context
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Todopoderoso
  - el Fuerte
  lexicon: Payne Smith
  rationale: El POB inglés usa ‘the Mighty One’; ‘el Poderoso’ mantiene el título sin importar una lectura más interpretativa como ‘Todopoderoso’.
- source_word: ܟܪܝܣܛܘܣ
  english_pob_choice: the Anointed One
  chosen_spanish: el Ungido
  alternatives_spanish:
  - el Mesías
  - Cristo
  lexicon: 'Proyecto POB: title rendering'
  rationale: En español, ‘el Ungido’ conserva el valor titulado y transparenta la relación con el término original; ‘Mesías’ también sería posible, pero ‘Ungido’ sigue de cerca el audit trail del título sin introducir un registro eclesial fijo.
- source_word: ܐܓܪܬܐ ܕܝܘܠܦܢܐ
  english_pob_choice: a letter of instruction
  chosen_spanish: una carta de instrucción
  alternatives_spanish:
  - una carta de enseñanza
  - una epístola de instrucción
  lexicon: Payne Smith
  rationale: Mantiene el género epistolar y el matiz didáctico sin sonar arcaico en español; ‘carta’ refleja ܐܓܪܬܐ y ‘instrucción’ ܝܘܠܦܢܐ.
- source_word: ܡܕܡ ܕܣܒܪܬܐ
  english_pob_choice: a writing of hope
  chosen_spanish: un escrito de esperanza
  alternatives_spanish:
  - un escrito de ánimo
  - una escritura de esperanza
  lexicon: Payne Smith
  rationale: ‘Escrito’ preserva el carácter documental sin exigir una forma literaria más precisa de la que el siriaco garantiza; ‘de esperanza’ sigue el audit trail del sustantivo abstracto.
- source_word: ܪ̈ܥܘܬܐ
  english_pob_choice: counsels
  chosen_spanish: los pastores
  alternatives_spanish:
  - los consejos
  - los designios
  lexicon: Payne Smith + control-backed revision awareness
  rationale: El texto fuente transmitido y el control editorial permiten aquí la lectura tradicional de ‘pastores’; además, el paralelismo con lámparas y manantiales exige una metáfora personal/institucional más que ‘consejos’. Dado el estado del texto, se conserva la lectura que mejor se ajusta al paquete fuente recibido.
- source_word: ܫܪ̈ܓܐ
  english_pob_choice: lamps
  chosen_spanish: las lámparas
  alternatives_spanish:
  - las luces
  lexicon: Payne Smith
  rationale: Conserva la imagen concreta de iluminación y el paralelismo con manantiales; ‘luces’ sería más abstracto.
- source_word: ܡܒܘ̈ܥܐ
  english_pob_choice: springs
  chosen_spanish: los manantiales
  alternatives_spanish:
  - las fuentes
  - los surtidores
  lexicon: Payne Smith
  rationale: ‘Manantiales’ comunica bien en español la imagen de agua viva y de la que se bebe; es idiomático y fiel al simbolismo.
theological_decisions:
- issue: Destino de Sión y de la tierra
  english_pob_reading: The place/land did not sin; the people’s sin caused the destruction.
  chosen_spanish_reading: Sión y la tierra son exoneradas; la culpa recae en el pueblo que pecó.
  alternative_spanish_readings:
  - Una formulación más general de juicio sin exonerar explícitamente al lugar y la tierra
  rationale: Las preguntas retóricas del siriaco, como en el audit trail inglés, separan deliberadamente la culpa humana del lugar santo. La traducción española conserva esa tensión y no la suaviza.
  doctrine_reference: Juicio divino y responsabilidad humana; santidad del lugar no equivale a culpa moral.
- issue: Relación entre la ley y la falta de guía tras la partida de Baruc
  english_pob_reading: Counsels/lamps/springs are from the law, and the law stands even if leaders depart.
  chosen_spanish_reading: La ley permanece como fuente de luz, agua y dirección, aun cuando falten líderes.
  alternative_spanish_readings:
  - La continuidad depende de Baruc mismo como mediador
  - La ley sólo instruye, pero no es presentada como fuente de vida
  rationale: El cierre del pasaje no centra la esperanza en la presencia continua de Baruc, sino en la permanencia de la ley. Por eso la versión española debe conservar la relación fuente-derivada entre ley, lámparas y manantiales.
  doctrine_reference: Autoridad de la ley/canon y mediación profética subordinada.
- issue: Lectura de ܪ̈ܥܘܬܐ en el estado textual recibido
  english_pob_reading: The English revision trail briefly adopted 'counsels,' while the later source-aware control notes preserved the Syriac ambiguity and the competing shepherds imagery.
  chosen_spanish_reading: Se conserva ‘pastores’ en el texto principal por coherencia con el paquete fuente transmitido, mientras el trazado editorial reconoce la tensión textual.
  alternative_spanish_readings:
  - ‘consejos’
  - ‘designios’
  rationale: 'El aparato recibido contiene una tensión textual real: la forma auditada inglesa favorece ‘counsels’, pero el bloque fuente transmitido mantiene la lectura que, en el flujo del pasaje, puede leerse como ‘pastores’. La traducción principal no debe borrar esa incertidumbre; por eso se mantiene la lectura más anclada al texto disponible y se documenta la alternativa.'
  doctrine_reference: Crítica textual y preservación de variantes relevantes.
translation_notes:
  revision_awareness: 'El borrador sigue el texto fuente siriaco provisto y toma en cuenta las revisiones del audit trail inglés. En particular: evita las adiciones no sustentadas sobre un remanente, la vuelta de hermanos o la fidelidad/compasión en v. 7; conserva la exhortación condicional y la acusación de que el pecado recae en el pueblo, no en Sión o la tierra; y refleja la corrección crucial de que «el Ungido vendrá», no simplemente «es el Ungido». Para la línea problemática de ܪ̈ܥܘܬܐ, se reconoce la tensión entre la lectura controlada y la tradición del bloque fuente recibido.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino, en conformidad con el estándar del proyecto.
  - ‘El Altísimo’ y ‘el Poderoso’ se mantienen como títulos distintos para no fusionar matices.
  - Se evita ‘Cristo’ salvo en nota, porque el texto principal y el audit trail favorecen una traducción titular transparente.
  - ‘la ley’ se conserva como eje semántico del pasaje, coherente con la relación entre ley, lámparas y manantiales.
  - La puntuación y el tono buscan ser publicables en español bíblico moderno sin perder la cadencia solemne del original.
