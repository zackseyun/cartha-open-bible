translation:
  language: es
  text: 'Y sucederá en aquellos días: los segadores no se cansarán, y los constructores no laborarán; porque las obras seguirán adelante por sí mismas con los que las hacen, en mucha tranquilidad.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܘܐܢܬ ܙܒܢܐ ܕܡܫܝܚܐ / eschatological ‘time’ expression at the chapter boundary
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - entonces, en aquellos días
  lexicon: control-backed Syriac chapter corpus; POB English audit trail
  rationale: ‘En aquellos días’ conserva el giro profético tradicional y expresa el marco temporal escatológico sin añadir contenido ajeno.
- source_word: probable Syriac harvesters-reapers term
  english_pob_choice: the reapers
  chosen_spanish: los segadores
  alternatives_spanish:
  - los cosechadores
  - los que siegan
  lexicon: Payne Smith
  rationale: ‘Segadores’ mantiene la imagen agrícola concreta y reproduce mejor el paralelo con ‘constructores’ que un término más general.
- source_word: probable Syriac builders term
  english_pob_choice: the builders
  chosen_spanish: los constructores
  alternatives_spanish:
  - los edificadores
  - los que construyen
  lexicon: Payne Smith
  rationale: ‘Constructores’ es claro en español contemporáneo y conserva el oficio concreto del texto sin volverlo demasiado eclesial.
- source_word: non fatigabuntur ... neque laborabunt
  english_pob_choice: will not grow weary ... will not labor
  chosen_spanish: no se cansarán ... no trabajarán fatigados
  alternatives_spanish:
  - no se fatigarán ... no trabajarán
  - no se cansarán ... no se fatigarán
  lexicon: Payne Smith
  rationale: 'Se distinguen los dos verbos: ‘cansarse’ para el desgaste personal y ‘trabajar fatigados’ para la carga del laborar, preservando el paralelismo del original y del audit trail inglés.'
- source_word: sponte erunt currentia opera
  english_pob_choice: the works will proceed of themselves
  chosen_spanish: las obras seguirán adelante por sí mismas
  alternatives_spanish:
  - las obras procederán por sí mismas
  - las obras correrán por sí solas
  lexicon: Payne Smith
  rationale: ‘Seguirán adelante por sí mismas’ comunica la idea de avance espontáneo sin mecanizarla; ‘por sí mismas’ evita que el giro parezca mero automatismo técnico.
- source_word: with those who do them
  english_pob_choice: with those who do them
  chosen_spanish: con los que las hacen
  alternatives_spanish:
  - con los que las realizan
  - con quienes las hacen
  lexicon: Payne Smith
  rationale: ‘Las hacen’ conserva la referencia inmediata a ‘las obras’ y evita una expansión interpretativa innecesaria.
- source_word: tranquillitate multa
  english_pob_choice: in much tranquility
  chosen_spanish: en mucha tranquilidad
  alternatives_spanish:
  - en gran tranquilidad
  - con mucha tranquilidad
  - en mucha paz
  lexicon: Payne Smith
  rationale: ‘Tranquilidad’ reproduce la calma restaurada del pasaje y evita reducir el cierre solo a ‘paz’; la preposición ‘en’ sigue de cerca la construcción del texto fuente.
theological_decisions:
- issue: How strongly to render the effortless character of labor in the messianic age
  english_pob_reading: the works will proceed of themselves
  chosen_spanish_reading: las obras seguirán adelante por sí mismas
  alternative_spanish_readings:
  - las obras se harán fácilmente
  - las obras prosperarán
  rationale: La frase española conserva la imagen apocalíptica de un orden restaurado donde el trabajo avanza sin resistencia, pero sin sugerir automatización absoluta ni borrar la cooperación humana (‘con los que las hacen’).
  doctrine_reference: Retain apocalyptic restoration imagery where the witness warrants it.
- issue: How to render the closing atmosphere term
  english_pob_reading: in much tranquility
  chosen_spanish_reading: en mucha tranquilidad
  alternative_spanish_readings:
  - en gran paz
  - en profundo reposo
  rationale: ‘Tranquilidad’ mantiene el matiz de sosiego ordenado y estable, no solo productividad eficiente; así se preserva el tono de paz cósmica/restaurada del pasaje.
  doctrine_reference: Do not flatten eschatological peace into merely efficient labor.
translation_notes:
  revision_awareness: The Spanish draft follows the high-agreement English audit trail while returning to the Syriac image of effortless, peaceful work in an eschatological setting. I kept the temporal frame, the agrarian/building parallel, the paired negatives, and the closing tranquility without introducing traditional masking for the divine name, which is not present in this verse.
  spanish_consistency_notes:
  - Usé ‘en aquellos días’ para mantener un registro bíblico sobrio y consistente con el tono profético del pasaje.
  - Elegí ‘segadores’ y ‘constructores’ para conservar el paralelismo imagístico y el carácter concreto de la escena.
  - Mantengo ‘obras’ en plural, como en el audit trail inglés, para reflejar el sujeto colectivo del texto.
  - No añadí notas al pie porque el sentido está suficientemente asegurado por el control siriaco y el audit trail inglés, sin variantes textuales relevantes en este versículo.
