review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura general y la imaginería del inglés auditado: marco escatológico, segadores/constructores, avance espontáneo de las obras y ambiente de tranquilidad. Sin embargo, la pareja verbal clave no queda fielmente preservada en español, porque ‘no trabajarán fatigados’ cambia ‘no laborarán’ por una idea adverbial (‘trabajar sin fatiga’) en vez de mantener el segundo verbo independiente y paralelo al primero.'
  spanish_quality_summary: El texto es legible y natural en español neutro, pero ‘no trabajarán fatigados’ suena algo forzado y menos equilibrado que el original auditado. ‘Las obras seguirán adelante por sí mismas’ funciona bien; ‘en mucha tranquilidad’ es comprensible, aunque algo literal. La principal mejora necesaria es restaurar el paralelismo verbal sin perder fluidez.
  glossary_alignment: No hay conflictos con la terminología doctrinal por defecto del proyecto. ‘Mesías/Cristo’, ‘Yahvé’, etc., no aparecen aquí. ‘Segadores’ y ‘constructores’ están bien escogidos. ‘Tranquilidad’ concuerda con la decisión teológica documentada.
  issues:
  - severity: medium
    issue: La segunda mitad de la pareja verbal fue reformulada como ‘no trabajarán fatigados’.
    rationale: 'El audit trail inglés preserva dos verbos distintos: ‘will not grow weary’ y ‘will not labor’. En español, ‘no trabajarán fatigados’ introduce el matiz de trabajar pero sin cansancio, en vez de expresar directamente que no laborarán/toilarán. Esto debilita el paralelismo y altera levemente el sentido.'
  - severity: low
    issue: ‘En mucha tranquilidad’ es correcto pero algo rígido en español.
    rationale: No es un error; reproduce de cerca el audit trail. Sin embargo, ‘con mucha tranquilidad’ o ‘en gran tranquilidad’ sonarían más idiomáticos. Dado que la decisión inglesa privilegia cercanía formal, puede mantenerse ‘en mucha tranquilidad’.
  revised_spanish_text: 'Y sucederá en aquellos días: los segadores no se cansarán, y los constructores no laborarán; porque las obras seguirán adelante por sí mismas con los que las hacen, en mucha tranquilidad.'
  revision_rationale: 'Se reemplaza ‘no trabajarán fatigados’ por ‘no laborarán’ para preservar con mayor fidelidad la distinción y el paralelismo de los dos verbos del texto auditado: primero ausencia de cansancio, luego ausencia de labor penosa. El resto del versículo puede mantenerse, ya que refleja adecuadamente la imaginería y la atmósfera escatológica del pasaje.'
