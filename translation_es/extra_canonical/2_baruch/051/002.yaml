  lexicon: forma
  rationale: El inglés POB conserva una expresión abstracta y directa. En español, «la forma» mantiene esa referencia a la condición o configuración externa sin añadir interpretación no exigida por el texto.
- source_word: those who now act wickedly
  english_pob_choice: those who now act wickedly
  chosen_spanish: los que ahora obran mal
  alternatives_spanish:
  - los que ahora hacen maldad
  - los que ahora actúan perversamente
  lexicon: obrar / mal
  rationale: «Obran mal» reproduce el valor ético general del verbo sin cargarlo con un matiz más técnico que el del original. «Ahora» conserva el presente temporal del enunciado.
- source_word: will become worse than it is
  english_pob_choice: will become worse than it is
  chosen_spanish: se volverá peor que ahora
  alternatives_spanish:
  - será peor que es
  - se hará peor de lo que es
  lexicon: peor / volverse
  rationale: La comparación de deterioro se expresa de forma natural en español con «se volverá peor». «Que ahora» explicita la comparación implícita del inglés con el estado presente.
- source_word: that they may endure torment
  english_pob_choice: so that they may endure torment
  chosen_spanish: para que soporten tormento
  alternatives_spanish:
  - para que sufran tormento
  - a fin de que soporten tormento
  lexicon: soportar / tormento
  rationale: «Soporten tormento» conserva el sentido de resistencia o padecimiento bajo castigo, sin suavizarlo. «Tormento» mantiene la intensidad penal del término.
theological_decisions:
- issue: Destino punitivo de los impíos
  english_pob_reading: the form of those who now act wickedly will become worse than it is, so that they may endure torment
