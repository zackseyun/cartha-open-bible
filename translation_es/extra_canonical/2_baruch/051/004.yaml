  yaml_path: translation/extra_canonical/2_baruch/051/004.yaml
  text: And above all, those who come after will be grieved, because they despised my law and stopped their ears so that they would not hear wisdom or receive understanding.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:43Z'
    unchanged: false
    changes_summary: Smoothed the opening phrase to 'come after' for natural English while preserving the source meaning; retained the rest of the draft as accurate and complete.
translation:
  language: es
  text: Y, sobre todo, se entristecerán los que vengan después, porque despreciaron mi ley y cerraron sus oídos para no oír la sabiduría ni recibir entendimiento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: those who come after
  english_pob_choice: those who come after
  chosen_spanish: los que vengan después
  alternatives_spanish:
  - los que vendrán después
  - los posteriores
  lexicon: posterioridad temporal; secuencia futura
  rationale: El inglés POB suaviza el sentido hacia una posteridad futura sin atarlo a una fórmula rígida. «Los que vengan después» conserva la referencia temporal y suena natural en español.
- source_word: will be grieved
  english_pob_choice: will be grieved
  chosen_spanish: se entristecerán
  alternatives_spanish:
  - serán afligidos
  - estarán apenados
  lexicon: aflicción emocional
  rationale: La pasiva inglesa expresa el resultado emocional. «Se entristecerán» comunica con claridad el efecto de dolor o pena sin introducir una formulación más dura de la que permite el contexto.
- source_word: they despised my law
  english_pob_choice: they despised my law
  chosen_spanish: despreciaron mi ley
  alternatives_spanish:
  - rechazaron mi ley
  - menospreciaron mi ley
  lexicon: desprecio por la ley
  rationale: «Despreciaron» reproduce bien la fuerza moral de la desobediencia y el desdén por la instrucción divina. «Ley» se mantiene como traducción directa de la referencia legal/covenantal.
- source_word: stopped their ears
  english_pob_choice: stopped their ears
  chosen_spanish: cerraron sus oídos
  alternatives_spanish:
  - taparon sus oídos
  - se taponaron los oídos
  lexicon: gesto idiomático de rechazo auditivo
  rationale: El giro se conserva con una expresión española natural y transparente. «Cerrar los oídos» comunica la negativa voluntaria a escuchar, que es el punto del original y del POB inglés.
- source_word: wisdom
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  - la sabiduría divina
  lexicon: sabiduría como don/verdad instruccional
  rationale: Se mantiene el término simple «sabiduría» porque el contexto contrasta oírla con rechazarla; no hace falta explicitar «divina» en el texto principal.
- source_word: understanding
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - discernimiento
  lexicon: facultad de comprender
  rationale: «Entendimiento» conserva la pareja tradicional de sabiduría/entendimiento sin perder claridad moderna. Es la forma más directa para la recepción interior del mensaje.
theological_decisions:
- issue: Relación entre ley, sabiduría y entendimiento
  english_pob_reading: The verse links despising the law with refusing wisdom and understanding.
  chosen_spanish_reading: 'El texto español mantiene la cadena causal: despreciaron la ley, por eso no quisieron oír la sabiduría ni recibir entendimiento.'
  alternative_spanish_readings:
  - despreciaron mi ley y así no escucharon la sabiduría ni recibieron entendimiento
  - despreciaron mi ley, cerrando así sus oídos a la sabiduría y al entendimiento
  rationale: La formulación española conserva la conexión moral y causal del verso sin añadir interpretaciones externas. No se diluye la correspondencia entre rechazo de la ley y pérdida de sabiduría.
  doctrine_reference: Sabiduría bíblica; obediencia a la instrucción divina
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó 'then come' a 'come after' por naturalidad. La versión española sigue directamente ese sentido posterior sin necesidad de nota textual adicional, y preserva íntegro el resto del contenido de la cláusula.
  spanish_consistency_notes:
  - Se usa «ley» para la instrucción divina, en coherencia con el campo semántico del pasaje.
  - Se evita «SEÑOR» porque no aparece aquí ningún sustituto del nombre divino ni una cita directa del tetragrámaton.
  - Se mantiene paralelismo entre «sabiduría» y «entendimiento» para reflejar el hebraísmo/siríaco subyacente y el inglés POB.
