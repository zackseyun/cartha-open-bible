translation:
  language: es
  text: ¿Para qué, entonces, perdieron los hombres su vida, y para qué los que habitan en la tierra cambiaron su alma?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܠܡܢ / “for what then”
  english_pob_choice: For what then
  chosen_spanish: ¿Pues para qué...
  alternatives_spanish:
  - ¿Para qué entonces...
  - ¿Pues por qué...
  lexicon: adverbial interrogative/causal
  rationale: El Syriaco plantea una pregunta de finalidad/razón; en español, «para qué» reproduce mejor esa fuerza que «por qué». «Pues» conserva el matiz discursivo de conclusión inferida que aporta «then».
- source_word: ܐܒܕ / lose
  english_pob_choice: lost
  chosen_spanish: perdieron
  alternatives_spanish:
  - destruyeron
  - se perdieron
  lexicon: verbal loss/privation
  rationale: «Perdieron» expresa con naturalidad la privación de la vida sin introducir un matiz reflexivo o demasiado técnico que el contexto no exige.
- source_word: ܚܝܐ / life
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - la vida
  lexicon: life
  rationale: «Vida» es la equivalencia directa y idiomática para el sustantivo abstracto del original.
- source_word: ܢܦܫܐ / soul
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  lexicon: soul/inner self
  rationale: La POB inglesa mantiene «soul»; en español, «alma» es la equivalencia más natural y ampliamente inteligible para el mismo campo semántico, sin borrar la distinción con «vida» en la primera cola del paralelismo.
theological_decisions:
- issue: Paralelismo entre «vida» y «alma» como dos realidades humanas distintas
  english_pob_reading: life ... soul
  chosen_spanish_reading: vida ... alma
  alternative_spanish_readings:
  - vida ... vida
  - vida ... ser interior
  rationale: Conservo el paralelismo del texto fuente sin nivelarlo. Traducir ambas palabras con el mismo término español borraría la tensión semántica que el original y la POB sostienen entre la vida entregada/perdida y el alma intercambiada.
  doctrine_reference: Antropología bíblica; preservación del paralelismo semítico
translation_notes:
  revision_awareness: La revisión inglesa solo corrigió la formulación idiomática de «For why then» a «For what then»; la estructura interrogativa y el paralelismo del verso permanecen estables, por lo que no se requiere nota crítica adicional en español.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y claro.
  - Se evita la calca de «for why» en favor de un español natural con la misma fuerza interrogativa.
  - No se introducen marcadores de nota porque no hay variantes textuales ni alternativas necesarias que anclar.
