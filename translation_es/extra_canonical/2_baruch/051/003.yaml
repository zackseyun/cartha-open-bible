translation:
  language: es
  text: Pero en cuanto a la gloria de aquellos que ahora han sido vindicados por mi ley[a]—de aquellos que tuvieron entendimiento en su vida, y de aquellos que plantaron en su corazón la raíz de la sabiduría—, su esplendor entonces será glorificado en transformaciones, y la forma de su rostro será convertida en la luz de su hermosura, para que reciban el mundo que no muere, que les fue prometido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero en cuanto a la gloria de aquellos que ahora han sido vindicados por mi ley—de aquellos que tuvieron entendimiento en su vida, y de aquellos que plantaron en su corazón la raíz de la sabiduría—, entonces su esplendor será glorificado».'
    reason: alternative_reading
lexical_decisions:
- source_word: glory / splendor
  english_pob_choice: glory / splendor
  chosen_spanish: gloria / esplendor
  alternatives_spanish:
  - resplandor
  - honor
  - brillo
  lexicon: gloria; esplendor
  rationale: El inglés distingue entre la 'glory' inicial como tópico y el 'splendor' del sujeto de la cláusula principal. En español, 'gloria' mantiene el tópico y 'esplendor' conserva la idea visual de brillo o magnificencia sin borrar la distinción sintáctica marcada por la revisión del texto inglés.
- source_word: vindicated
  english_pob_choice: vindicated
  chosen_spanish: vindicados
  alternatives_spanish:
  - justificados
  - reivindicados
  - defendidos
  lexicon: vindicar
  rationale: '''Vindicados'' conserva la fuerza forense o declarativa del término en contexto de juicio/reconocimiento, sin reducirlo a una noción puramente moral ni introducir un lenguaje teológico más específico de lo que el pasaje requiere.'
- source_word: law
  english_pob_choice: my law
  chosen_spanish: mi ley
  alternatives_spanish:
  - mi Torá
  - mi instrucción
  lexicon: ley
  rationale: La fuente y el audit trail inglés mantienen 'my law'. 'Mi ley' es el equivalente directo y legible; 'Torá' sería más interpretativo y no está exigido por este versículo.
- source_word: understanding
  english_pob_choice: had understanding
  chosen_spanish: tuvieron entendimiento
  alternatives_spanish:
  - fueron entendidos
  - tuvieron inteligencia
  lexicon: entendimiento
  rationale: '''Entendimiento'' refleja la cualidad intelectual/moral del pasaje sin forzar una paráfrasis. ''Tuvieron entendimiento'' sigue de cerca la construcción y evita elevarlo indebidamente a una categoría más técnica.'
- source_word: root of wisdom
  english_pob_choice: the root of wisdom
  chosen_spanish: la raíz de la sabiduría
  alternatives_spanish:
  - el raíz de la sabiduría
  - la raíz sapiencial
  lexicon: raíz; sabiduría
  rationale: La imagen vegetal se conserva literalmente porque es central al paralelismo del texto. 'La raíz de la sabiduría' es natural en español y mantiene la metáfora.
- source_word: transformations
  english_pob_choice: transformations
  chosen_spanish: transformaciones
  alternatives_spanish:
  - cambios
  - transfiguraciones
  lexicon: transformación
  rationale: '''Transformaciones'' reproduce la pluralidad del término y la idea de cambio de estado sin imponer una lectura doctrinal más específica. ''Transfiguraciones'' sería más interpretativo.'
- source_word: form of their face
  english_pob_choice: the form of their face
  chosen_spanish: la forma de su rostro
  alternatives_spanish:
  - la figura de su rostro
  - el aspecto de su rostro
  lexicon: forma; rostro
  rationale: '''Forma de su rostro'' sigue el original y el inglés POB, manteniendo la imagen corporal. ''Rostro'' es preferible a ''cara'' por registro literario.'
- source_word: light of their beauty
  english_pob_choice: the light of their beauty
  chosen_spanish: la luz de su hermosura
  alternatives_spanish:
  - la luz de su belleza
  - el resplandor de su hermosura
  lexicon: luz; hermosura
  rationale: '''Luz'' conserva el imaginario luminoso del original; ''hermosura'' mantiene un registro más elevado que ''belleza'' y encaja bien con el paralelismo de gloria/esplendor/luz.'
- source_word: world that does not die
  english_pob_choice: the world that does not die
  chosen_spanish: el mundo que no muere
  alternatives_spanish:
  - el mundo inmortal
  - el mundo imperecedero
  lexicon: mundo; no muere
  rationale: La formulación directa conserva la negación de muerte sin introducir un adjetivo interpretativo. 'Mundo inmortal' sería más fluido pero menos transparente respecto de la construcción del texto.
- source_word: promised to them
  english_pob_choice: promised to them
  chosen_spanish: les ha sido prometido
  alternatives_spanish:
  - les fue prometido
  - prometido a ellos
  lexicon: prometer
  rationale: La pasiva perifrástica en español comunica bien la recepción de la promesa y mantiene el enfoque en el don prometido.
theological_decisions:
- issue: La cláusula tópica 'But as for...' y el sujeto real de la oración principal
  english_pob_reading: 'The revision recognizes a casus pendens: the initial glory-topic is not the subject of the main verb; ''their splendor'' is.'
  chosen_spanish_reading: Pero en cuanto a la gloria... su esplendor entonces será glorificado...
  alternative_spanish_readings:
  - Y también la gloria... será glorificada
  - Pero la gloria... será glorificada
  rationale: El español necesita marcar el tópico suspendido para evitar reproducir el error corregido en la revisión inglesa. 'Pero en cuanto a' ayuda a conservar el desplazamiento sintáctico y a dejar claro que el sujeto de la cláusula principal es 'su esplendor'.
  doctrine_reference: Estilo/sintaxis; no implica doctrina específica.
- issue: '''vindicated by my law'' en marco sapiencial/jurídico'
  english_pob_reading: The vindication is a declarative recognition tied to God's law.
  chosen_spanish_reading: han sido vindicados por mi ley
  alternative_spanish_readings:
  - han sido justificados por mi ley
  - han sido reivindicados por mi ley
  rationale: '''Vindicados'' mantiene la ambigüedad controlada entre reivindicación y pronunciamiento favorable, sin desplazar el valor de justicia del texto ni convertirlo en una formulación técnico-dogmática ajena al pasaje.'
  doctrine_reference: Justicia/vindicación en contexto judicial-sapiencial.
- issue: '''glorified in transformations'' as a future change in the righteous'
  english_pob_reading: Their splendor will then be glorified in transformations.
  chosen_spanish_reading: su esplendor entonces será glorificado en transformaciones
  alternative_spanish_readings:
  - su esplendor entonces será glorificado por transformaciones
  - su esplendor entonces será transformado gloriosamente
  rationale: Se conserva la pasiva y la pluralidad de 'transformations' para no aplanar el proceso. 'En transformaciones' es un calco controlado pero legible en español bíblico y mantiene la relación con la metamorfosis descrita por el texto.
  doctrine_reference: Escatología de transformación de los justos; lenguaje descriptivo, no sistemático.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió un problema sintáctico importante: el tópico inicial no es el sujeto de la cláusula principal; el sujeto real es ''their splendor''. La versión española refleja esa corrección con ''Pero en cuanto a...'' y ''su esplendor entonces será glorificado''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por política general del proyecto cuando aparezca el nombre divino; aquí no aparece el tetragrámaton, por lo que no hay intervención.
  - '''Gloria/esplendor'' se distinguen para respetar la estructura del original y la corrección de la revisión.'
  - No se introduce 'Cristo', 'Mesías' ni vocabulario doctrinal ajeno al pasaje.
