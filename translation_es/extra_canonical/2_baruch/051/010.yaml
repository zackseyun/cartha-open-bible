translation:
  language: es
  text: Porque habitarán en las alturas de ese mundo, y serán hechos semejantes a los ángeles, y serán hechos iguales a las estrellas; y serán transformados en toda forma que deseen, de la belleza a la hermosura, y de la luz al resplandor de la gloria.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “dwell in the heights”
  english_pob_choice: they will dwell in the heights of that world
  chosen_spanish: habitarán en las alturas de ese mundo
  alternatives_spanish:
  - morarán en las alturas de ese mundo
  - vivirán en las alturas de ese mundo
  lexicon: dwell / habitar
  rationale: “Habitar” conserva la idea durativa de residencia estable y funciona bien en español bíblico contemporáneo sin sonar arcaico.
- source_word: “angels”
  english_pob_choice: made like the angels
  chosen_spanish: hechos semejantes a los ángeles
  alternatives_spanish:
  - hechos como los ángeles
  - hechos parecidos a los ángeles
  lexicon: angelos / ángeles
  rationale: Se conserva la comparación sin convertirla en identidad absoluta; “semejantes” refleja bien la relación indicada por el inglés.
- source_word: “equal to the stars”
  english_pob_choice: be made equal to the stars
  chosen_spanish: puestos al nivel de las estrellas
  alternatives_spanish:
  - hechos iguales a las estrellas
  - equiparados con las estrellas
  lexicon: equal / igualar
  rationale: “Al nivel de” expresa equivalencia de rango o condición en español natural, manteniendo el paralelismo con “made equal” sin sobredeterminarlo.
- source_word: “changed into every form they desire”
  english_pob_choice: they will be changed into every form they desire
  chosen_spanish: serán transformados en toda forma que deseen
  alternatives_spanish:
  - serán cambiados a toda forma que deseen
  - serán mudados en toda forma que deseen
  lexicon: change / transformar
  rationale: “Transformados” comunica mejor la mutación de estado o forma que un simple cambio superficial.
- source_word: “beauty / loveliness”
  english_pob_choice: from beauty into loveliness
  chosen_spanish: de la belleza a la hermosura
  alternatives_spanish:
  - de la belleza al encanto
  - de la hermosura a la gracia
  lexicon: beauty / loveliness
  rationale: Se conserva la distinción intensiva entre dos términos cercanos. “Hermosura” permite distinguir matiz sin perder naturalidad en español.
- source_word: “light / splendor of glory”
  english_pob_choice: from light into the splendor of glory
  chosen_spanish: de la luz al resplandor de la gloria
  alternatives_spanish:
  - de la luz al esplendor de la gloria
  - de la luz al brillo de la gloria
  lexicon: light / splendor / glory
  rationale: “Resplandor” recoge la intensificación de “splendor” y mantiene el paralelismo poético con “luz” y “gloria”.
theological_decisions:
- issue: Nature of the eschatological transformation
  english_pob_reading: they will be changed into every form they desire
  chosen_spanish_reading: serán transformados en toda forma que deseen
  alternative_spanish_readings:
  - serán cambiados a toda forma que deseen
  - serán convertidos en toda forma que deseen
  rationale: La formulación mantiene la amplitud imaginativa del texto sin reducirla a una metamorfosis física literal o a una mera metáfora moral. El español conserva la tensión del original entre elevación, semejanza y cambio de forma.
  doctrine_reference: escatología; lenguaje visionario/apocalíptico
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el inglés POB permanece sin alteraciones y el presente borrador sigue de cerca su equivalencia óptima, con ajustes mínimos para fluidez natural en español.
  spanish_consistency_notes:
  - Se mantiene “ángeles” y “estrellas” en sentido comparativo, sin reinterpretarlos como títulos simbólicos.
  - Se conserva el paralelismo poético de la frase final con series de ‘de… a…’ en un español natural.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni otra terminología no presente en el versículo.
