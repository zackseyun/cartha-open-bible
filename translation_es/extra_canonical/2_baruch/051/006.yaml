lexical_decisions:
- source_word: '“For first they will see” (Syriac sense reflected in English POB: “For first they will see”)'
  english_pob_choice: For first they will see
  chosen_spanish: Pues primero verán
  alternatives_spanish:
  - Porque primero verán
  - Primero verán, y después
  lexicon: first / before, see
  rationale: 'Conservo la secuencia temporal del original y del texto inglés auditado: primero la visión, luego la partida. “Pues” enlaza naturalmente con el contexto; “primero verán” es claro y fiel sin sobreexplicar.'
- source_word: depart
  english_pob_choice: will depart
  chosen_spanish: se irán
  alternatives_spanish:
  - partirán
  - saldrán
  lexicon: depart / go away
  rationale: “Se irán” expresa movimiento de salida de forma natural en español y mantiene el valor verbal simple del inglés. “Partirán” es posible, pero puede sonar más literario; “saldrán” desplaza el matiz hacia mera salida.
- source_word: to be tormented
  english_pob_choice: to be tormented
  chosen_spanish: para ser atormentados
  alternatives_spanish:
  - para sufrir tormento
  - para ser torturados
  lexicon: torment / torment
  rationale: “Atormentados” conserva el sentido de castigo aflictivo del inglés y del trasfondo del original. Evito “torturados”, que en español puede sugerir un matiz más físico o técnico que el texto no exige.
theological_decisions:
- issue: 'Secuencia escatológica: visión previa seguida de condena/tormento'
  english_pob_reading: For first they will see, and afterward they will depart to be tormented.
  chosen_spanish_reading: Pues primero verán, y después se irán para ser atormentados.
  alternative_spanish_readings:
  - Porque primero verán, y después se irán para ser atormentados.
  - Primero verán, y luego se irán para ser atormentados.
  rationale: 'Mantengo la tensión narrativa del juicio: la visión inicial no es salvación sino reconocimiento previo a la retribución. La traducción no suaviza ni moraliza el desenlace.'
  doctrine_reference: 2 Baruch 51:6; juicio retributivo final
translation_notes:
  revision_awareness: 'El inglés POB ya había sido revisado y quedó sin cambios (high_agreement; unchanged: true). Esta versión española sigue ese estado estable, sin introducir expansiones interpretativas.'
  spanish_consistency_notes:
  - 'Uso de pasado/futuro perifrástico evitado: el futuro simple reproduce la previsión del original.'
  - No se introduce terminología eclesiástica ajena al texto; se conserva un registro sobrio y directo.
  - Se mantiene la ambigüedad mínima del original sobre quiénes son ‘ellos’, como en el inglés auditado.
