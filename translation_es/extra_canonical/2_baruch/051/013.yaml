lexical_decisions:
- source_word: first
  english_pob_choice: the first
  chosen_spanish: los primeros
  alternatives_spanish:
  - los de antes
  - los primeros en llegar
  lexicon: primero
  rationale: El paralelismo exige un sustantivo plural natural en español; «los primeros» conserva la relación ordenal del original sin añadir una noción ajena de prioridad moral.
- source_word: receive
  english_pob_choice: will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - acogerán
  - obtendrán
  lexicon: recibir
  rationale: «Recibirán» reproduce el verbo general de aceptación/obtención del enunciado sin sobreinterpretar el tipo de recepción.
- source_word: last
  english_pob_choice: the last
  chosen_spanish: los últimos
  alternatives_spanish:
  - los de después
  - los postreros
  lexicon: último
  rationale: «Los últimos» mantiene el contraste antitético directo con «los primeros» y es idiomático en español bíblico contemporáneo.
- source_word: those for whom they were waiting
  english_pob_choice: those for whom they were waiting
  chosen_spanish: a aquellos por quienes estaban esperando
  alternatives_spanish:
  - a quienes esperaban
  - a aquellos que esperaban
  lexicon: esperar
  rationale: Se conserva la relación de espera hacia personas determinadas; el relativo «por quienes» refleja la referencia personal del inglés auditado, aunque en español también puede expresarse más brevemente.
- source_word: passed away
  english_pob_choice: had passed away
  chosen_spanish: habían desaparecido
  alternatives_spanish:
  - habían fallecido
  - habían muerto
  lexicon: desaparecer
  rationale: El inglés POB eligió una formulación atenuada y no explícitamente funeraria; «habían desaparecido» preserva esa suavización sin introducir una equivalencia interpretativa más fuerte que el testimonio auditado.
theological_decisions:
- issue: Relación entre «los primeros» y «los últimos» como inversión de expectativa
  english_pob_reading: For the first will receive the last... and the last...
  chosen_spanish_reading: Porque los primeros recibirán a los últimos... y los últimos...
  alternative_spanish_readings:
  - Los primeros recibirán a los últimos...
  - Los primeros recibirán después a los últimos...
  rationale: No se añade una explicación doctrinal; se mantiene la inversión escatológica implícita en el paralelismo, que el inglés ya deja intacta.
  doctrine_reference: Escatología judía tardía / inversión de expectativas
