translation:
  language: es
  text: Porque las extensiones del Paraíso se desplegarán delante de ellos; y la belleza de la majestad de los seres vivientes debajo del trono se les mostrará, y todos los ejércitos de los ángeles —los que ahora están retenidos por mi palabra para que no aparezcan, y los que están guardados por mi mandato, para permanecer en sus puestos hasta su llegada[a]—.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta que llegue el momento de su venida».
    reason: Alternativa que preserva la formulación más literal del expediente inglés sin caer en una expresión española defectuosa.
lexical_decisions:
- source_word: expanses
  english_pob_choice: expanses
  chosen_spanish: extensiones
  alternatives_spanish:
  - espacios
  - amplias extensiones
  lexicon: expansion / spread-out space
  rationale: «Extensiones» conserva la idea de amplitud y despliegue sin forzar una imagen técnica; en español suena natural con el verbo «se desplegarán».
- source_word: Paradise
  english_pob_choice: Paradise
  chosen_spanish: Paraíso
  alternatives_spanish:
  - Paraíso
  lexicon: paradise
  rationale: El término propio en español es «Paraíso»; mantiene la referencia escatológica del texto sin añadir interpretación.
- source_word: beauty of the majesty
  english_pob_choice: beauty of the majesty
  chosen_spanish: la belleza de la majestad
  alternatives_spanish:
  - el esplendor de la majestad
  - la hermosura de la majestad
  lexicon: beauty / majesty
  rationale: Conserva la doble idea de belleza y majestad del original, sin fusionarlas ni intensificar demasiado el registro.
- source_word: living beings
  english_pob_choice: living beings
  chosen_spanish: seres vivientes
  alternatives_spanish:
  - seres vivientes
  - criaturas vivientes
  lexicon: living beings
  rationale: «Seres vivientes» es una equivalencia clara y sobria que mantiene la ambigüedad reverente del giro original.
- source_word: angels
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - ángeles
  lexicon: angelos
  rationale: Se traduce de manera directa y estable como «ángeles», como en el uso bíblico estándar en español.
- source_word: held fast by my word so that they may not appear
  english_pob_choice: held fast by my word so that they may not appear
  chosen_spanish: los que ahora están retenidos por mi palabra para que no aparezcan
  alternatives_spanish:
  - los que ahora están sujetos por mi palabra para que no aparezcan
  - los que ahora mi palabra retiene para que no se muestren
  lexicon: hold fast / appear
  rationale: «Retenidos por mi palabra» preserva la pasividad del participio y la fuerza causal de la palabra divina; «aparezcan» reproduce bien el sentido de manifestarse o salir a la vista.
- source_word: kept by my command
  english_pob_choice: kept by my command
  chosen_spanish: los que están guardados por mi mandato
  alternatives_spanish:
  - los que están preservados por mi mandato
  - los que mi mandato guarda
  lexicon: keep / command
  rationale: «Guardados por mi mandato» es fiel y fluido; evita sobreexplicar el matiz de custodia ordenada por el mandato divino.
- source_word: until their arrival
  english_pob_choice: until their arrival
  chosen_spanish: hasta su llegada
  alternatives_spanish:
  - hasta su llegada
  - hasta que ellos lleguen
  lexicon: arrival
  rationale: «Llegada» reproduce el sustantivo del POB y conserva la idea de un momento fijado de manifestación.
theological_decisions:
- issue: La palabra divina como agente de restricción y custodia
  english_pob_reading: those now held fast by my word ... and those kept by my command
  chosen_spanish_reading: los que ahora están retenidos por mi palabra ... y los que están guardados por mi mandato
  alternative_spanish_readings:
  - los que mi palabra retiene ... y los que mi mandato guarda
  rationale: Se mantiene la agencia divina explícita sin diluirla en expresiones impersonales; el paralelismo entre «mi palabra» y «mi mandato» queda visible.
  doctrine_reference: Providencia y soberanía divina en la custodia de los poderes celestiales
- issue: Referente escatológico de la manifestación de los ángeles
  english_pob_reading: so that they may not appear ... until their arrival
  chosen_spanish_reading: para que no aparezcan ... hasta su llegada
  alternative_spanish_readings:
  - para que no se muestren ... hasta que ellos lleguen
  rationale: «Aparezcan» conserva la posibilidad de manifestación pública y se ajusta al intervalo escatológico implícito en el texto.
  doctrine_reference: Escatología de la revelación ordenada de las huestes celestiales
translation_notes:
  revision_awareness: El texto inglés auditado pasó de una formulación redundante («until their coming arrives») a una más natural («until their arrival»). La traducción española adopta directamente la forma natural equivalente («hasta su llegada») sin perder la idea de un tiempo señalado de manifestación.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como forma preferida del nombre divino cuando aparezca en este libro; aquí el texto usa «mi palabra» y «mi mandato», por lo que no hay sustitución nominal directa.
  - Se mantiene «Paraíso» con mayúscula como término escatológico establecido.
  - Se evita «siervos» o «Señor» porque el pasaje no los exige y el inglés auditado enfatiza palabra/mandato divinos y no títulos relacionales.
