revisions:
- from: Porque las extensiones del Paraíso se desplegarán delante de ellos; y la belleza de la majestad de los seres vivientes debajo del trono se les mostrará, y todos los ejércitos de los ángeles —los que ahora están retenidos por mi palabra para que no aparezcan, y los que están guardados por mi mandato, para estar en sus puestos hasta su llegada[a]—.
  to: Porque las extensiones del Paraíso se desplegarán delante de ellos; y la belleza de la majestad de los seres vivientes debajo del trono se les mostrará, y todos los ejércitos de los ángeles —los que ahora están retenidos por mi palabra para que no aparezcan, y los que están guardados por mi mandato, para permanecer en sus puestos hasta su llegada[a]—.
  rationale: Se mantiene casi todo el borrador por su fidelidad al sentido fuente, pero se corrige «para estar» a «para permanecer» para lograr español natural y reflejar mejor la idea de ser mantenidos en sus lugares hasta el tiempo señalado. También se rehace la nota para expresar la alternativa de manera inteligible en español.
