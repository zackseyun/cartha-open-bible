review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del inglés POB y del testimonio fuente: la apertura del Paraíso, la manifestación de la majestad de los seres vivientes bajo el trono y la mención de las huestes angélicas retenidas por la palabra/mandato divinos hasta el momento señalado. Sin embargo, hay un problema de sintaxis española en el tramo final: «para estar en sus puestos hasta su llegada» suena como infinitivo de propósito mal conectado, cuando el sentido es más bien un estado de permanencia/espera en sus lugares hasta su llegada. La nota alternativa también calca de forma poco natural el inglés previo.'
  spanish_quality_summary: El español es mayormente claro y digno, pero necesita una reparación menor para sonar natural y preciso. «Extensiones del Paraíso» es aceptable aunque algo rígido; no exige cambio. El mayor problema es «para estar en sus puestos», que en español resulta forzado después de «están guardados por mi mandato». También conviene mejorar la nota para evitar la expresión extraña «llegue su llegada».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Paraíso», «seres vivientes», «ángeles», «mi palabra», «mi mandato» y «llegada» concuerdan bien con el expediente inglés y con un español bíblico moderno. No intervienen términos sensibles como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: 'Construcción final poco natural: «para estar en sus puestos hasta su llegada»'
    rationale: Después de «están guardados por mi mandato», el infinitivo con «para» introduce una finalidad torpe en español. El sentido del inglés POB es que están mantenidos para permanecer/de pie en sus lugares hasta el momento de su llegada/aparición.
  - severity: low
    issue: 'Nota al pie demasiado literal y poco idiomática: «hasta que llegue su llegada»'
    rationale: La nota intenta reflejar la formulación previa del inglés, pero en español suena redundante e impropia. Debe conservar el valor alternativo sin producir una frase antinatural.
  revised_spanish_text: Porque las extensiones del Paraíso se desplegarán delante de ellos; y la belleza de la majestad de los seres vivientes debajo del trono se les mostrará, y todos los ejércitos de los ángeles —los que ahora están retenidos por mi palabra para que no aparezcan, y los que están guardados por mi mandato, para permanecer en sus puestos hasta su llegada[a]—.
  revised_footnotes:
  - marker: a
    text: O «hasta que llegue el momento de su venida».
    reason: Alternativa que preserva la formulación más literal del expediente inglés sin caer en una expresión española defectuosa.
  revision_rationale: Se mantiene casi todo el borrador por su fidelidad al sentido fuente, pero se corrige «para estar» a «para permanecer» para lograr español natural y reflejar mejor la idea de ser mantenidos en sus lugares hasta el tiempo señalado. También se rehace la nota para expresar la alternativa de manera inteligible en español.
