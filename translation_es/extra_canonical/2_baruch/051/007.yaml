translation:
  language: es
  text: Pero para aquellos que fueron salvados por sus obras, y para quienes la ley fue esperanza, y el entendimiento una expectación,[a] y la sabiduría una confianza, aparecerán maravillas en su tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expectativa». Se prefiere «expectación» para expresar mejor en español la idea de anticipación esperanzada y conservar el paralelismo con «la sabiduría una confianza».
    reason: spanish_lexical_clarity
lexical_decisions:
- source_word: '"saved by their works"'
  english_pob_choice: have been saved by their works
  chosen_spanish: fueron salvados por sus obras
  alternatives_spanish:
  - han sido salvados por sus obras
  - fueron rescatados por sus obras
  lexicon: σώζω / equivalente conceptual en contexto
  rationale: Mantengo el sentido de salvación lograda «por sus obras» como en el inglés POB, con pretérito perfecto simple natural en español para una afirmación gnómica/profética. «Salvados» conserva la fuerza soteriológica sin introducir explicación adicional.
- source_word: '"the law"'
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Torá
  - la instrucción
  lexicon: νόμος / ley
  rationale: «La ley» es la correspondencia directa y readable en español; «Torá» sería más técnico y aquí no es requerido por el registro del texto ni por el audit trail inglés.
- source_word: '"hope"'
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza
  - expectativa
  lexicon: ἐλπίς / hope
  rationale: «Esperanza» mantiene la primera designación sustantiva de la cláusula y evita sobreinterpretar una noción más fuerte que el texto no exige.
- source_word: '"understanding"'
  english_pob_choice: understanding
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - la comprensión
  - el discernimiento
  lexicon: σύνεσις / understanding
  rationale: «Entendimiento» conserva el sustantivo abstracto y la relación paralela con «esperanza» y «sabiduría».
- source_word: '"an expectation"'
  english_pob_choice: an expectation
  chosen_spanish: una expectativa
  alternatives_spanish:
  - una espera
  - una esperanza
  lexicon: προσδοκία / expectation
  rationale: Sigo el ajuste del audit trail inglés que insertó artículo para preservar el paralelismo nominal. «Expectativa» reproduce la idea de anticipación sin colapsarla con «esperanza», que ya traduce el término anterior.
- source_word: '"wisdom"'
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: σοφία / wisdom
  rationale: «Sabiduría» es la equivalencia natural; con artículo definido mantiene la serie nominal coordinada del verso.
- source_word: '"confidence"'
  english_pob_choice: confidence
  chosen_spanish: una confianza
  alternatives_spanish:
  - confianza
  - seguridad
  lexicon: παρρησία / confidence
  rationale: «Una confianza» sigue la construcción del inglés POB («wisdom a confidence») para conservar la paralelidad retórica y el valor nominal. «Seguridad» sería más interpretativo.
- source_word: '"wonders"'
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - portentos
  - prodigios
  lexicon: θαύματα / wonders
  rationale: «Maravillas» es natural en español bíblico y conserva el campo semántico de hechos extraordinarios sin forzar un matiz técnico adicional.
- source_word: '"in their time"'
  english_pob_choice: in their time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en aquel tiempo
  lexicon: ἐν καιρῷ αὐτῶν / in their time
  rationale: «En su tiempo» mantiene la referencia temporal de forma directa y elegante en español.
theological_decisions:
- issue: Salvación vinculada a las obras
  english_pob_reading: those who have been saved by their works
  chosen_spanish_reading: aquellos que fueron salvados por sus obras
  alternative_spanish_readings:
  - aquellos que han sido salvados por sus obras
  - aquellos que se han salvado por sus obras
  rationale: 'Conservo la afirmación tal como la refleja el POB inglés y la fuente: la salvación se presenta, en este dicho, vinculada a las obras. No se suaviza ni se armoniza con otras formulaciones canónicas porque el encargo pide fidelidad al texto fuente y a la huella inglesa auditable.'
  doctrine_reference: Soteriological tension retained; no harmonization with Pauline formulations
- issue: Serie conceptual ley/esperanza/entendimiento/sabiduría/confianza
  english_pob_reading: the law was hope, and understanding an expectation, and wisdom a confidence
  chosen_spanish_reading: la ley fue esperanza, y el entendimiento una expectativa, y la sabiduría una confianza
  alternative_spanish_readings:
  - la ley fue esperanza, y el entendimiento expectativa, y la sabiduría confianza
  rationale: Mantengo la estructura nominal y la tensión retórica del original, incluyendo el artículo «una» donde el audit trail inglés lo aclaró. No convierto la secuencia en una paráfrasis explicativa.
  doctrine_reference: Rhetorical parallelism preserved; lexical tension maintained
- issue: Manifestación futura de maravillas
  english_pob_reading: wonders will appear in their time
  chosen_spanish_reading: aparecerán maravillas en su tiempo
  alternative_spanish_readings:
  - se manifestarán maravillas en su tiempo
  - maravillas aparecerán a su tiempo
  rationale: «Aparecerán» conserva la pasiva/impersonalidad de la aparición futura sin añadir agencia no explicitada. La frase sigue siendo sobria y profética.
  doctrine_reference: Eschatological manifestation without embellishment
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del POB inglés que aclaró «understanding an expectation» añadiendo el artículo «an»; la versión española lo refleja con «una expectativa» para preservar el paralelismo nominal y evitar una lectura adjetival ambigua.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto solo cuando el texto lo requiera; este versículo no presenta el tetragrámaton.
  - Se usa «ley», «esperanza», «entendimiento», «sabiduría» y «confianza» de forma nominal y coordinada, sin glosas interpretativas.
  - El orden y la puntuación reproducen el paralelismo del texto fuente y del POB inglés.
  - «Maravillas» se prefiere a «prodigios» por mayor naturalidad en español general, sin perder el sentido de hechos extraordinarios.
