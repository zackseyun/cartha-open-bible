translation:
  language: es
  text: Porque escogieron para sí este tiempo que no puede pasar sin angustia, y escogieron para sí ese tiempo cuyo fin está lleno de lamentos y males, y rechazaron el mundo que no envejece[a] a los que llegan a él, y rechazaron el tiempo de gloria, para que no llegaran al honor del que antes les hablé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que no envejece para los que llegan a él'.
    reason: Conserva la alternativa previa documentada por la auditoría inglesa, aunque el texto principal mantiene con razón el sentido causativo.
lexical_decisions:
- source_word: this time that cannot pass away without anguish
  english_pob_choice: this time that cannot pass away without anguish
  chosen_spanish: este tiempo que no puede pasar sin angustia
  alternatives_spanish:
  - este tiempo que no puede transcurrir sin angustia
  - este tiempo que no pasa sin aflicción
  lexicon: tiempo / angustia
  rationale: Conserva la fuerza temporal y la negación de pasar sin sufrimiento. 'Angustia' refleja bien la carga de aflicción del contexto sin suavizarla.
- source_word: that time whose end is full of laments and evils
  english_pob_choice: that time whose end is full of laments and evils
  chosen_spanish: ese tiempo cuyo fin está lleno de lamentos y males
  alternatives_spanish:
  - ese tiempo cuyo final está lleno de lamentos y males
  - ese tiempo cuyo término está lleno de lamentaciones y males
  lexicon: fin / lamentos / males
  rationale: '''Fin'' mantiene el sentido de término consumado; ''lamentos y males'' preserva el paralelismo moral y emocional del original y de la versión inglesa.'
- source_word: the world that does not age those who come to it
  english_pob_choice: the world that does not age those who come to it
  chosen_spanish: el mundo que no envejece a los que llegan a él
  alternatives_spanish:
  - el mundo que no hace envejecer a los que llegan a él
  - el mundo que no da vejez a los que llegan a él
  lexicon: world / age
  rationale: 'Se conserva el valor causativo de ''age'' indicado por la revisión auditada: no es que el mundo ''no envejezca'', sino que ''no envejece a'' quienes llegan a él.'
- source_word: the time of glory
  english_pob_choice: the time of glory
  chosen_spanish: el tiempo de gloria
  alternatives_spanish:
  - el tiempo glorioso
  - el tiempo de la gloria
  lexicon: glory / time
  rationale: Mantiene la construcción nominal simple del inglés auditado y la oposición retórica con 'este tiempo' y 'ese tiempo'.
- source_word: the honor of which I told you before
  english_pob_choice: the honor of which I told you before
  chosen_spanish: el honor del cual antes les hablé
  alternatives_spanish:
  - el honor del que antes les hablé
  - el honor que antes les mencioné
  lexicon: honor
  rationale: '''Honorable/ honor'' conserva el referente abstracto sin añadir contenido; ''les hablé'' reproduce la referencia previa explícita en la frase final.'
theological_decisions:
- issue: Retained contrast between the two chosen temporal destinies and the rejected world/time of glory
  english_pob_reading: The verse contrasts self-chosen temporal suffering with rejection of the world and the time of glory.
  chosen_spanish_reading: La frase conserva la oposición entre tiempos escogidos para sufrimiento y el rechazo del mundo y del tiempo de gloria.
  alternative_spanish_readings:
  - La frase podría leerse como una simple secuencia de elecciones negativas
  - Podría atenuarse la oposición entre 'mundo' y 'tiempo de gloria'
  rationale: La sintaxis en español mantiene las repeticiones de 'escogieron' y 'rechazaron' para que el contraste escatológico permanezca visible.
  doctrine_reference: Eschatology / final judgment contrast
- issue: Causative sense of 'age' as preventing aging in those who enter the world
  english_pob_reading: The world does not age those who come to it.
  chosen_spanish_reading: El mundo no envejece a los que llegan a él.
  alternative_spanish_readings:
  - El mundo no hace envejecer a los que llegan a él
  - El mundo no los envejece
  rationale: La revisión auditada corrigió un posible intransitivo; la forma española elegida conserva el sentido causativo sin perder naturalidad.
  doctrine_reference: Lexical causative nuance / anthropology
translation_notes:
  revision_awareness: The English audit trail included a tier-2 correction from 'does not grow old for those who come to it' to 'does not age those who come to it.' The Spanish draft reflects that correction causatively with 'no envejece a'. No footnote is needed because the ambiguity is resolved directly in the main text.
  spanish_consistency_notes:
  - Se usa 'tiempo' de forma consistente para las tres menciones, como en el inglés auditado.
  - Se mantiene 'mundo' para el término cosmológico/orden de existencia, no 'siglo' ni 'edad', para evitar distorsionar la oposición del pasaje.
  - Se conserva el paralelismo verbal 'escogieron... rechazaron...' para reflejar la estructura retórica del verso.
