translation:
  language: es
  text: 'Cuando, por tanto, vean que aquellos sobre quienes ahora están por encima serán entonces exaltados y glorificados más que ellos, entonces estos y aquellos serán transformados: estos últimos, al esplendor de los ángeles; pero aquellos primeros se consumirán aún más, de asombro ante las visiones y ante la vista de las formas.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vean a aquellos sobre quienes ahora están por encima, que entonces son exaltados'.
    reason: Preserva en nota la alternativa más cercana a la construcción proléptica reflejada en la nota inglesa previa.
lexical_decisions:
- source_word: see / proleptic seeing
  english_pob_choice: see that those over whom they are now exalted are then exalted
  chosen_spanish: vean que aquellos sobre quienes ahora están exaltados entonces están exaltados
  alternatives_spanish:
  - vean a aquellos sobre quienes ahora están exaltados, que entonces están exaltados
  - vean que aquellos sobre quienes ahora están exaltados serán entonces exaltados
  lexicon: n/a
  rationale: El siríaco conserva una construcción proléptica que en inglés quedó resuelta como una sola cláusula objetiva. En español, 'vean que...' comunica esa percepción sin forzar la sintaxis ni perder la relación entre ver y constatar.
- source_word: exalted / glorified
  english_pob_choice: exalted and glorified
  chosen_spanish: exaltados y glorificados
  alternatives_spanish:
  - enaltecidos y glorificados
  - elevados y glorificados
  lexicon: n/a
  rationale: '''Exaltados'' y ''glorificados'' preservan la duplicidad del original y del inglés POB sin reemplazarla por una sola idea más débil.'
- source_word: will be changed
  english_pob_choice: will be changed
  chosen_spanish: serán transformados
  alternatives_spanish:
  - serán cambiados
  - serán alterados
  lexicon: n/a
  rationale: '''Transformados'' expresa bien el cambio total de estado implícito en el pasivo futuro, en un español digno y natural, sin reducirlo a un simple cambio externo.'
- source_word: splendor of angels
  english_pob_choice: the splendor of angels
  chosen_spanish: el esplendor de los ángeles
  alternatives_spanish:
  - la gloria de los ángeles
  - el resplandor de los ángeles
  lexicon: n/a
  rationale: '''Esplendor'' mantiene la imagen visual y la cualidad gloriosa del término, y conserva el paralelo con las visiones y las formas.'
- source_word: waste away
  english_pob_choice: will waste away
  chosen_spanish: se desvanecerán
  alternatives_spanish:
  - se consumirá[n]
  - se marchitarán
  lexicon: n/a
  rationale: '''Se desvanecerán'' reproduce la idea de debilitamiento/disolución gradual con un verbo español claro y de registro bíblico sin exagerar la materialidad del término.'
theological_decisions:
- issue: Destino contrastivo de 'unos y otros' frente a la transformación angelical
  english_pob_reading: the latter into the splendor of angels, but the former will waste away yet more
  chosen_spanish_reading: los de atrás en el esplendor de los ángeles, pero los de antes se desvanecerán aún más
  alternative_spanish_readings:
  - los unos en el esplendor de los ángeles, pero los otros se desvanecerán aún más
  - los posteriores en el esplendor de los ángeles, pero los primeros se desvanecerán aún más
  rationale: La frase conserva el contraste escatológico entre dos grupos sin suavizar la asimetría. 'Los de atrás' y 'los de antes' reflejan la relación comparativa del texto con suficiente claridad en español, evitando introducir una ordenación doctrinal no explicitada.
  doctrine_reference: 2 Baruch 51:5; contraste de glorificación y disminución en la visión escatológica
- issue: Asombro ante las visiones y la vista de las formas
  english_pob_reading: in wonder at the visions and at the sight of the forms
  chosen_spanish_reading: en asombro ante las visiones y ante la vista de las formas
  alternative_spanish_readings:
  - maravillados ante las visiones y ante la vista de las formas
  - en estupor ante las visiones y la contemplación de las formas
  rationale: '''Asombro'' preserva el estado afectivo sin convertirlo en una explicación interpretativa. ''Visiones'' y ''formas'' se mantienen literales para no borrar la imaginería visionaria del pasaje.'
  doctrine_reference: 2 Baruch 51:5; lenguaje apocalíptico de visión y revelación
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo ajustó una cláusula proléptica para hacerla más natural; la traducción española adopta esa misma solución sintáctica sin volver al orden más literal y ambiguo. El control cruzado indicó acuerdo alto y no introdujo cambios doctrinales o textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Dios' no aplica aquí; el pasaje no contiene nombres divinos explícitos.
  - Se conserva el paralelismo de dos grupos y la oposición transformados/desvanecerse.
  - No se introdujeron notas al pie porque no hay una variante decisiva que requiera anclaje en el texto español.
