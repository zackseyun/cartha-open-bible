    text: O 'vean a aquellos sobre quienes ahora están por encima, que entonces son exaltados'.
    reason: Preserva en nota la alternativa más cercana a la construcción proléptica reflejada en la nota inglesa previa.
  revision_rationale: 'La revisión corrige tres problemas principales: 1) reemplaza una sintaxis comparativa poco idiomática por ''están por encima de''; 2) aclara la referencia de los dos grupos con ''estos y aquellos ... estos últimos ... aquellos primeros''; y 3) mantiene en nota la alternativa proléptica documentada en el rastro inglés. También se ajusta ''se desvanecerán'' a ''se consumirán'' para reflejar mejor ''waste away'' en este contexto de deterioro progresivo.'
