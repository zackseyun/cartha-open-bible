revisions:
- from: 'Cuando, por tanto, vean que aquellos sobre quienes ahora están exaltados entonces están exaltados y glorificados más que ellos, entonces unos y otros serán transformados: los de atrás en el esplendor de los ángeles, pero los de antes se desvanecerán aún más, en asombro ante las visiones y ante la vista de las formas.'
  to: 'Cuando, por tanto, vean que aquellos sobre quienes ahora están por encima serán entonces exaltados y glorificados más que ellos, entonces estos y aquellos serán transformados: estos últimos, al esplendor de los ángeles; pero aquellos primeros se consumirán aún más, de asombro ante las visiones y ante la vista de las formas.[a]'
