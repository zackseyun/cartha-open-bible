  spanish_quality_summary: 'El español es comprensible, pero varias expresiones resultan poco naturales o ambiguas en registro bíblico claro: ''sobre quienes ahora están exaltados'', ''los de atrás'', y ''los de antes''. La revisión propuesta mantiene dignidad y cercanía al original, pero mejora la legibilidad y la precisión referencial.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Glorificados', 'esplendor', 'ángeles', 'visiones' y 'formas' son adecuados. El ajuste principal es sintáctico y de referencia pronominal, no terminológico.
  issues:
  - severity: medium
    issue: '''sobre quienes ahora están exaltados'' es una construcción poco natural en español'
    rationale: Aunque calca el inglés, en español suena forzado. 'están por encima de' expresa con claridad la relación comparativa sin perder el sentido de exaltación relativa.
  - severity: high
    issue: '''los de atrás'' y ''los de antes'' no comunican bien ''the latter / the former'''
    rationale: Estas expresiones pueden sugerir ubicación espacial o temporal y oscurecen qué grupo recibe cada destino. 'estos' y 'aquellos' retoma mejor 'these and those' y permite identificar 'estos últimos' y 'aquellos primeros' sin ambigüedad excesiva.
  - severity: medium
    issue: La repetición de 'entonces están exaltados' es tosca y puede malinterpretarse
    rationale: En contexto futuro-escatológico, 'serán entonces exaltados' o una reestructuración equivalente comunica mejor el contraste temporal y evita una lectura estática confusa.
  revised_spanish_text: 'Cuando, por tanto, vean que aquellos sobre quienes ahora están por encima serán entonces exaltados y glorificados más que ellos, entonces estos y aquellos serán transformados: estos últimos, al esplendor de los ángeles; pero aquellos primeros se consumirán aún más, de asombro ante las visiones y ante la vista de las formas.[a]'
  revised_footnotes:
