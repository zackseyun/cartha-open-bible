translation:
  language: es
  text: Entonces la excelencia de los justos será mayor que la de los ángeles.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: righteous
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justificados
  lexicon: δικαίοις / צדיקיא
  rationale: En este contexto escatológico, el inglés POB usa un sustantivo plural sustantivado. "Justos" conserva la referencia a personas caracterizadas por justicia/rectitud sin introducir una formulación técnica más fuerte de lo que el texto exige. "Rectos" es posible, pero menos natural en español bíblico; "justificados" añadiría una lectura soteriológica no explicitada aquí.
- source_word: excellence
  english_pob_choice: excellence
  chosen_spanish: excelencia
  alternatives_spanish:
  - gloria
  - preeminencia
  - superioridad
  lexicon: ܝܬܪܘܬܐ / semantic field of superiority
  rationale: La noción comparativa de superioridad se preserva bien con "excelencia", que funciona en español como cualidad de eminencia sin obligar a un matiz técnico. "Gloria" desplazaría el sentido hacia esplendor/manifestación; "preeminencia" o "superioridad" son posibles, pero menos idiomáticas en esta frase.
- source_word: angels
  english_pob_choice: angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - los mensajeros
  lexicon: ܡܠܐܟܐ
  rationale: Se mantiene "ángeles" porque es el equivalente claro y estándar para el ser celestial referido por el término siríaco. "Mensajeros" sería demasiado amplio y podría oscurecer la referencia angelológica establecida por el contexto.
theological_decisions:
- issue: Comparación entre justos y ángeles
  english_pob_reading: The excellence of the righteous will be greater than that of the angels.
  chosen_spanish_reading: La excelencia de los justos será mayor que la de los ángeles.
  alternative_spanish_readings:
  - La gloria de los justos será mayor que la de los ángeles.
  - Los justos serán más excelentes que los ángeles.
  rationale: El POB inglés conserva una comparación real entre la condición de los justos y la de los ángeles, sin suavizarla. La versión española mantiene esa misma tensión comparativa con una estructura nominal paralela. No se cambia a un comparativo sobre personas enteras ('serán más excelentes') porque el texto enfatiza la 'excelencia' como cualidad o estado, no simplemente una característica moral individual.
  doctrine_reference: Angelología comparada / escatología de los justos
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios y el cotejo cruzado reporta acuerdo alto (1.0). Por ello, el borrador español sigue de cerca la lectura inglesa auditada sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene el plural sustantivado "los justos" para corresponder al valor colectivo del original.
  - Se usa "será" en singular concordando con "la excelencia"; la comparación se entiende en términos de cualidad, no de sujeto plural.
  - No se agrega 'Cristo', 'Señor' ni otras fórmulas de tradición ajenas al verso.
