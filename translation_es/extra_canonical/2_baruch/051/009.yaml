translation:
  language: es
  text: y verán el tiempo que ahora les está oculto; y el tiempo ya no los hará envejecer.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: time that is now hidden from them
  english_pob_choice: the time that is now hidden from them
  chosen_spanish: el tiempo que ahora les está oculto
  alternatives_spanish:
  - el tiempo que ahora les está escondido
  - el tiempo que ahora se les oculta
  lexicon: Syriac temporal expression; χρόνος/ܙܒܢܐ-like temporal idiom
  rationale: Conservo la idea de un tiempo actualmente inaccesible o velado para ellos. «Oculto» mantiene el valor pasivo/estado del inglés POB sin añadir interpretación excesiva; «les» refleja el dative of concern/indirect object implícito.
- source_word: time will no longer make them grow old
  english_pob_choice: time will no longer make them grow old
  chosen_spanish: el tiempo ya no los hará envejecer
  alternatives_spanish:
  - el tiempo ya no los envejecerá
  - el tiempo ya no les hará envejecer
  lexicon: Syriac verb of aging/oldness; temporal agentive construction
  rationale: «Hará envejecer» reproduce bien la idea de que el tiempo deja de producir envejecimiento. Evito «envejecerá» porque puede sonar menos explícito respecto del agente causal 'tiempo'.
theological_decisions:
- issue: Escatological vision of hidden time and cessation of aging
  english_pob_reading: they will see the time that is now hidden from them; and time will no longer make them grow old.
  chosen_spanish_reading: verán el tiempo que ahora les está oculto; y el tiempo ya no los hará envejecer.
  alternative_spanish_readings:
  - verán el tiempo que ahora les está escondido; y el tiempo ya no los envejecerá
  - verán el tiempo que ahora se les oculta; y el tiempo ya no los hará envejecer
  rationale: 'Mantengo la tensión apocalíptica sin explicarla más allá del texto: primero, conocimiento de un tiempo presente-oculto; después, reversión del poder del tiempo sobre el envejecimiento. No se introduce una doctrina adicional sobre inmortalidad más allá de lo que la frase afirma.'
  doctrine_reference: No aplica; texto apocalíptico descriptivo sin formulación doctrinal explícita.
translation_notes:
  revision_awareness: El control cruzado reporta alta concordancia (1.0) y no hubo cambios en la última revisión; la redacción española sigue de cerca el sentido ya estabilizado del inglés POB, con ajuste natural de sintaxis al español.
  spanish_consistency_notes:
  - Se usa «tiempo» de forma consistente para ambos miembros de la frase, preservando el paralelismo del original.
  - Se evita sustituir «oculto» por un giro más interpretativo que diluya la pasividad del estado.
  - Se mantiene un registro digno y publicable, sin arcaísmos innecesarios.
