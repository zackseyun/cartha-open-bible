translation:
  language: es
  text: Pues han sido librados de este mundo de aflicción y han dejado atrás la carga de las aflicciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “this world of affliction”
  english_pob_choice: this world of affliction
  chosen_spanish: este mundo de aflicción
  alternatives_spanish:
  - este mundo de sufrimiento
  - este mundo atribulado
  lexicon: mundo / aflicción
  rationale: Conservo la estructura nominal del inglés POB y el contraste de esfera presente frente a liberación. «Aflicción» mantiene un registro bíblico claro sin desplazar el sentido hacia una paráfrasis más amplia como «atribulado».
- source_word: “have been delivered”
  english_pob_choice: have been delivered
  chosen_spanish: han sido librados
  alternatives_spanish:
  - han sido salvados
  - han sido rescatados
  lexicon: liberar / librar
  rationale: «Librados» reproduce el sentido de liberación efectiva sin introducir una carga doctrinal adicional que «salvados» podría sugerir en español. También mantiene el paralelismo con la entrega de una carga en la segunda cláusula.
- source_word: “laid down”
  english_pob_choice: have laid down
  chosen_spanish: han dejado
  alternatives_spanish:
  - han depositado
  - han echado a un lado
  lexicon: dejar / quitar
  rationale: «Han dejado» comunica bien el acto de soltar o abandonar una carga en español natural, evitando una imagen demasiado literal o pesada.
- source_word: “the burden of distresses”
  english_pob_choice: the burden of distresses
  chosen_spanish: la carga de los sufrimientos
  alternatives_spanish:
  - el peso de las angustias
  - la carga de las aflicciones
  lexicon: carga / sufrimientos
  rationale: Mantengo la metáfora de peso/carga y traduzco el plural abstracto con «sufrimientos» para preservar la intensidad del original. «Angustias» y «aflicciones» son alternativas posibles, pero «sufrimientos» resulta más transparente en español contemporáneo.
theological_decisions:
- issue: Liberación del “mundo de aflicción” como estado escatológico o de opresión presente
  english_pob_reading: For they have been delivered from this world of affliction
  chosen_spanish_reading: Pues han sido librados de este mundo de aflicción
  alternative_spanish_readings:
  - Porque han sido librados de este mundo de aflicción
  - Pues han sido rescatados de este mundo de aflicción
  rationale: La frase se mantiene abierta respecto de la naturaleza exacta de la liberación, siguiendo la sobriedad del inglés POB. «Librados» no fuerza una identificación doctrinal más específica y conserva la tensión entre liberación presente y condición del mundo.
  doctrine_reference: Escatología y liberación final del justo
- issue: Relación entre “burden” y “distresses” como metáfora acumulativa
  english_pob_reading: and have laid down the burden of distresses
  chosen_spanish_reading: y han dejado la carga de los sufrimientos
  alternative_spanish_readings:
  - y han dejado el peso de las angustias
  - y han descargado el peso de las aflicciones
  rationale: 'Conservo la redundancia intensificadora del original: no se trata solo de sufrimientos, sino de sufrimientos entendidos como carga. Evito diluir la metáfora en una sola palabra abstracta.'
  doctrine_reference: Imágenes bíblicas de carga, alivio y descanso
translation_notes:
  revision_awareness: La versión en inglés POB se mantuvo sin cambios en la última pasada y el control cruzado reportó alta concordancia; por ello no hay señales de revisión textual que obliguen a reflejar variantes o reservas adicionales en español.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, sin recurrir a perífrasis devocionales añadidas.
  - No se introduce terminología confesional ajena al expediente; «librados» conserva el valor semántico de deliver without doctrinal over-specification.
  - La metáfora de carga se conserva de manera explícita para respetar la imagen del verso.
