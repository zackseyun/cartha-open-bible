translation:
  language: es
  text: Y sucederá que, después de que haya pasado aquel día señalado, entonces la forma de los condenados será transformada, y también la gloria de los reivindicados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܒܬܪ ܕ / after that appointed day has passed
  english_pob_choice: after that appointed day has passed
  chosen_spanish: después de que haya pasado aquel día señalado
  alternatives_spanish:
  - tras pasar aquel día
  - después de aquel día fijado
  lexicon: Payne Smith
  rationale: Conserva la relación temporal y el carácter determinado del día sin añadir matices ajenos. "Señalado" expresa bien el valor de un día fijado o determinado.
- source_word: ܨܘܪܬܐ / ܨܘܪܬܗܘܢ
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - apariencia
  - figura
  lexicon: Payne Smith
  rationale: '"Forma" mantiene el término concreto y relativamente estable de la cadena de transformaciones del capítulo, sin reducirlo a mera apariencia externa.'
- source_word: ܐܙܕܩܘ
  english_pob_choice: vindicated
  chosen_spanish: los justificados
  alternatives_spanish:
  - los vindicados
  - los declarados justos
  lexicon: Payne Smith
  rationale: En español, "justificados" conserva el sentido judicial de ser aprobados o reivindicados, y refleja la decisión inglesa de evitar una sola carga doctrinal de "justified". En este contexto apocalíptico, también deja ver la relación con justicia/vindicación sin imponerse como tecnicismo posterior.
theological_decisions:
- issue: Relación entre transformación escatológica y vindicación
  english_pob_reading: The form of those who are condemned will be changed, and also the glory of those who are vindicated.
  chosen_spanish_reading: la forma de los condenados será cambiada, y también la gloria de los justificados
  alternative_spanish_readings:
  - la forma de los condenados será cambiada, y también la gloria de los vindicados
  - la forma de los condenados será transformada, y también la gloria de los declarados justos
  rationale: Se conserva la paralelidad entre condena y vindicación, sin armonizar el texto con categorías doctrinales externas. "Gloria" se mantiene como término de exaltación escatológica, no se sustituye por una formulación moralizante.
  doctrine_reference: Vindicación escatológica y recompensas finales en literatura apocalíptica judía
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior eliminando toda nota no anclada: no se incluye ninguna marca de pie de página porque el verso en español no necesita una variante textual explícita para esta forma de la línea.'
  spanish_consistency_notes:
  - Se usó "forma" para ܨܘܪܬܐ de manera coherente con el motivo de transformación del capítulo.
  - Se evitó "SEÑOR" y otras sustituciones litúrgicas; aquí no aparece el nombre divino.
  - '"Justificados" se eligió como solución española natural para el valor judicial de ܐܙܕܩܘ, manteniendo la tensión entre vindicación y justicia sin sobreexplicar.'
  - La oración conserva el orden y la relación causal/temporal del original de forma publicable en español.
