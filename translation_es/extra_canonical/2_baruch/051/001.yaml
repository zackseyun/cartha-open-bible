revisions:
- from: Y sucederá que, después de que haya pasado aquel día señalado, entonces la forma de los condenados será cambiada, y también la gloria de los justificados.
  to: Y sucederá que, después de que haya pasado aquel día señalado, entonces la forma de los condenados será transformada, y también la gloria de los reivindicados.
  rationale: Se ajusta ܐܙܕܩܘ a 'reivindicados' para reflejar mejor la decisión auditada de 'vindicated' y evitar una lectura doctrinalmente más cargada de 'justificados'. Además, 'transformada' expresa con mayor naturalidad e intensidad el motivo de transformación escatológica del capítulo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:50:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura temporal y la antítesis principal del siríaco/POB inglés: después del día señalado, cambia la forma de los condenados y la gloria de los reivindicados. Sin embargo, ''los justificados'' no preserva tan bien como debería la decisión auditada de ܐܙܕܩܘ como ''vindicated'', que busca evitar carga doctrinal posterior.'
  spanish_quality_summary: El español es claro, natural y digno. 'Será cambiada' es comprensible, pero 'será transformada' suena más idiomático y encaja mejor con el motivo de transformación del capítulo. El resto fluye bien.
  glossary_alignment: No hay términos de glosario mayor involucrados salvo la decisión judicial para ܐܙܕܩܘ. Conviene preferir 'reivindicados' sobre 'justificados' para alinearse con la rationale inglesa y evitar resonancias paulinas más fuertes de las deseadas.
  issues:
  - severity: medium
    issue: '''los justificados'' para ܐܙܕܩܘ debilita la decisión auditada ''vindicated'''
    rationale: El English POB documenta explícitamente que evitó 'justified' por su carga teológica posterior. En español, 'justificados' reintroduce justamente esa carga y pierde parte del matiz forense de reivindicación escatológica.
  - severity: low
    issue: '''será cambiada'' puede mejorarse a ''será transformada'''
    rationale: Aunque fiel, 'cambiada' suena más genérico. 'Transformada' refleja mejor el campo semántico apocalíptico de cambio de forma que domina el contexto.
  revised_spanish_text: Y sucederá que, después de que haya pasado aquel día señalado, entonces la forma de los condenados será transformada, y también la gloria de los reivindicados.
  revision_rationale: Se ajusta ܐܙܕܩܘ a 'reivindicados' para reflejar mejor la decisión auditada de 'vindicated' y evitar una lectura doctrinalmente más cargada de 'justificados'. Además, 'transformada' expresa con mayor naturalidad e intensidad el motivo de transformación escatológica del capítulo.
