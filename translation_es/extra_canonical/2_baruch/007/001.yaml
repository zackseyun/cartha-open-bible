revisions:
- from: 'Y después de estas cosas oí a aquel ángel decir a los ángeles que sostenían las antorchas: «Ahora derriben los soportes de sus muros y arrójenlos abajo, para que los enemigos no se jacten y digan: “Nosotros mismos hemos derribado el muro de Sion y hemos quemado el lugar del Dios poderoso”. Y pónganse allí en el lugar donde yo había estado antes».'
  to: 'Y después de estas cosas oí a aquel ángel decir a los ángeles que sostenían las antorchas: «Ahora derriben los soportes de sus murallas y échenlas abajo, para que los enemigos no se jacten y digan: “Nosotros mismos hemos derribado el muro de Sion y hemos quemado el lugar del Dios poderoso”. Y pónganse allí, en el lugar donde yo había estado antes».'
  rationale: 'Se hizo una reparación menor de estilo y precisión: «murallas» sitúa mejor el referente defensivo de la ciudad, y «échenlas abajo» evita la aspereza y ambigüedad de «arrójenlos abajo», conservando la fuerza de demolición del mandato angélico. No se requieren notas adicionales.'
