translation:
  language: es
  text: 'Y después de estas cosas oí a aquel ángel decir a los ángeles que sostenían las antorchas: «Ahora derriben los soportes de sus murallas y échenlas abajo, para que los enemigos no se jacten y digan: “Nosotros mismos hemos derribado el muro de Sion y hemos quemado el lugar del Dios poderoso”. Y pónganse allí, en el lugar donde yo había estado antes».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܫܡܥܬ / oír
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  - oí decir
  lexicon: Payne Smith
  rationale: El sentido narrativo es de percepción auditiva de una orden pronunciada; en español, «oí» reproduce con naturalidad el valor de «I heard» sin desplazar la escena hacia una interpretación de simple informe.
- source_word: ܠܡܦܐܕ̈ܐ / ܠܡܦܝܕܐ
  english_pob_choice: torches
  chosen_spanish: antorchas
  alternatives_spanish:
  - lámparas
  - brandones
  lexicon: Smith Syriac Dictionary
  rationale: En este contexto de destrucción y fuego, «antorchas» conserva la imaginería ardiente y la fuerza apocalíptica mejor que «lámparas».
- source_word: ܣܡܝܟܘܬ ܫܘܪ̈ܝܗ
  english_pob_choice: the supports of its walls
  chosen_spanish: los soportes de sus muros
  alternatives_spanish:
  - los fundamentos de sus muros
  - los contrafuertes de sus muros
  lexicon: Payne Smith
  rationale: La expresión remite a los elementos que sostienen el muro; «soportes» conserva esa amplitud sin imponer una precisión arquitectónica que el siriaco no obliga a adoptar.
- source_word: ܣܚܦܢܝܗܝ
  english_pob_choice: have cast down
  chosen_spanish: hemos derribado
  alternatives_spanish:
  - hemos hecho caer
  - hemos abatido
  lexicon: Smith Syriac Dictionary
  rationale: «Derribado» comunica la demolición violenta que el verbo exige y encaja bien en la jactancia enemiga.
- source_word: ܕܘܟܬܐ ܕܐܠܗܐ ܚܝܒܬܐ
  english_pob_choice: the place of the Mighty God
  chosen_spanish: el lugar del Dios poderoso
  alternatives_spanish:
  - el lugar del Dios fuerte
  - el lugar del Dios todopoderoso
  lexicon: Payne Smith
  rationale: «Dios poderoso» reproduce el peso honorífico del título siriaco sin sustituirlo por una formulación más litúrgica que no es exigida por el texto.
- source_word: ܘܐܬܩܝܡܘ
  english_pob_choice: stand there
  chosen_spanish: pónganse allí
  alternatives_spanish:
  - permanezcan allí
  - estén allí
  lexicon: Payne Smith
  rationale: La forma es un imperativo plural; «pónganse allí» expresa la orden de ocupar la posición indicada y evita leerlo como una narración en primera persona.
theological_decisions:
- issue: Agencia en la caída de Jerusalén
  english_pob_reading: The wall is overthrown by heavenly command through angels, so the enemies are denied ultimate credit.
  chosen_spanish_reading: La caída del muro ocurre por mandato celestial ejecutado por ángeles, de modo que los enemigos no reciben el crédito final.
  alternative_spanish_readings:
  - El muro simplemente cae
  - La destrucción se atribuye solo a los enemigos humanos
  rationale: La orden a los ángeles muestra que la destrucción no se presenta como triunfo autónomo del enemigo, sino como juicio administrado desde arriba. La traducción española conserva esa tensión de juicio divino y burla impedida.
  doctrine_reference: Providencia divina y juicio; Isaías 10; Daniel 4
- issue: El título divino en la frase de jactancia
  english_pob_reading: the place of the Mighty God
  chosen_spanish_reading: el lugar del Dios poderoso
  alternative_spanish_readings:
  - el lugar del Dios fuerte
  - el lugar del Dios todopoderoso
  rationale: Se preserva el valor reverencial del título sin ocultar su componente descriptivo. «Poderoso» mantiene la formulación abierta y evita sustituir el término por una equivalencia más doctrinal que la fuente no exige.
  doctrine_reference: Nombres y títulos divinos; Éxodo 15:11
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del audit trail: la orden final pertenece al ángel en plural («pónganse allí»), y la escena se mantiene como discurso directo hasta el final de la frase. También se evitó la lectura incorrecta de una narración en primera persona al cierre. La redacción española busca ser publicable sin perder la fuerza del mandato y de la burla enemiga.'
  spanish_consistency_notes:
  - Se mantuvo «ángel» y «ángeles» para el agente celestial, en consonancia con el contexto de mandato.
  - Se usó «Dios poderoso» como traducción del título honorífico siriaco, no «SEÑOR».
  - Se eligió «antorchas» para el implemento de fuego, por su mayor intensidad imaginativa.
  - Se mantuvo el discurso directo con comillas latinas y comillas internas para reflejar la cita dentro de la cita.
  - Se evitó convertir el imperativo plural final en una observación narrativa sobre Baruc.
