  text: And after these things I heard that angel say to those angels who were holding the torches, “Now pull down the supports of its walls and overthrow them, lest the enemies boast and say, ‘We ourselves have cast down the wall of Zion, and we have burned the place of the mighty God.’ And stand there in the place where I had been standing before.”
