translation:
  language: es
  text: Porque también ellos pecaron, y sus hijos, y vieron muchas señales que fueron hechas por aquel que los hizo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ap hennon geyr htaw w-bnayhon
  english_pob_choice: For they also sinned, and their children
  chosen_spanish: Porque también ellos pecaron, y sus hijos
  alternatives_spanish:
  - Pues también ellos pecaron, y sus hijos
  - Porque ellos también pecaron, junto con sus hijos
  lexicon: for / also / they / sinned / and / their children
  rationale: 'El siríaco conserva una secuencia simple: causal-consecutiva, énfasis de inclusión con ''también'', el sujeto plural ''ellos'' y la mención coordinada de ''sus hijos''. Mantengo esa estructura sin introducir ''Israel'', ''en los días de los jueces'' ni ''se contaminaron'', porque el control textual los excluye.'
- source_word: w-zaw b-sagge' atvatha
  english_pob_choice: and they saw many signs
  chosen_spanish: y vieron muchas señales
  alternatives_spanish:
  - y vieron muchas maravillas
  - y contemplaron muchas señales
  lexicon: and / saw / many / signs
  rationale: '''Señales'' traduce con precisión el valor de signos/maravillas visibles del original y conserva el tono bíblico sin forzar ''milagros'', que sería más interpretativo.'
- source_word: d-eth'abedn menaw
  english_pob_choice: that were done by him who made them
  chosen_spanish: hechas por aquel que los hizo
  alternatives_spanish:
  - realizadas por aquel que los creó
  - hechas por quien los hizo
  lexicon: that were done / by him who made them
  rationale: '''Aquel que los hizo'' refleja el participio relativo del original y evita una nominalización más pesada. ''Hizo'' mantiene la referencia creadora del texto; ''creó'' es posible, pero ''hizo'' sigue más de cerca el verbo usado y el paralelismo bíblico.'
theological_decisions:
- issue: Referencia al acto creador de Dios como fundamento de la acusación
  english_pob_reading: by him who made them
  chosen_spanish_reading: por aquel que los hizo
  alternative_spanish_readings:
  - por aquel que los creó
  - por su Hacedor
  rationale: El texto vincula las señales con el Creador de quienes las vieron. Conservé una formulación que deja visible la relación creador-criatura sin añadir explicitamente 'Dios' donde el original habla de manera relativa.
  doctrine_reference: Creación; Dios como Hacedor y juez de su pueblo
translation_notes:
  revision_awareness: 'La revisión reciente corrigió una lectura anterior que añadía ''Israel'', ''se contaminó con pecados'' y ''en los días de los jueces''. La presente línea sigue el control siríaco: ''Porque también ellos pecaron, y sus hijos, y vieron muchas señales hechas por aquel que los hizo''. No requiere nota alternativa porque el texto español puede reflejar el sentido directo sin ambigüedad residual relevante.'
  spanish_consistency_notes:
  - Se mantiene 'señales' para el paralelo bíblico con el inglés auditado y el siríaco.
  - Se evita 'Cristo', 'SEÑOR' o 'Yahvé' porque el versículo no nombra explícitamente el nombre divino; la referencia queda en la perífrasis 'aquel que los hizo'.
  - El orden de cláusulas sigue el original y preserva la coordinación entre el pecado de ellos, el de sus hijos y la visión de las señales.
