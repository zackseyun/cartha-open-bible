translation:
  language: es
  text: 'Y él me respondió y me dijo: «Porque has rogado que te muestre lo que te acontecerá después de estas cosas, por esta causa te he mostrado esta visión, para que veas lo que te acontecerá después de estas cosas. Porque ciertamente partirás de esta tierra[a], pero no para morir; más bien, serás guardado para los tiempos señalados[b]. Por tanto, sube a la cumbre de aquel monte, y las regiones de aquella tierra pasarán delante de ti, y la forma del mundo habitado[c], y las cimas de los montes, y las profundidades de los valles, y las profundidades de los mares, y el número de los ríos, para que veas lo que dejas y adónde vas. Y esto será después de cuarenta días. Ve, pues, ahora, durante estos días, e instruye al pueblo cuanto puedas, para que aprendan, no sea que mueran en el tiempo postrero[d], sino que aprendan para que vivan en el tiempo postrero».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «de esta tierra»; el texto no precisa el modo de la partida.
    reason: source_note
  - marker: b
    text: O «serás reservado para los tiempos señalados».
    reason: lexical_alternative
  - marker: c
    text: O «la ecúmene», es decir, el mundo habitado.
    reason: lexical_alternative
  - marker: d
    text: O «en el último tiempo». El siríaco está en singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܡܫܢܐ / ܡܢ ܗܕܐ ܐܪܥܐ
  english_pob_choice: depart from this earth
  chosen_spanish: saldrás de esta tierra
  alternatives_spanish:
  - partirás de esta tierra
  - serás quitado de esta tierra
  lexicon: Payne Smith
  rationale: El verbo inglés elegido expresa salida solemne sin especificar el modo; en español, «saldrás de esta tierra» conserva esa sobriedad y evita añadir una imagen de traslado o rapto que el siríaco no obliga a leer aquí.
- source_word: ܠܢܛܘܪܐ ܕܙܒܢ̈ܐ
  english_pob_choice: be kept for the appointed times
  chosen_spanish: serás guardado para los tiempos señalados
  alternatives_spanish:
  - serás reservado para los tiempos señalados
  - serás conservado para los tiempos señalados
  lexicon: Payne Smith
  rationale: «Guardado» reproduce el valor de custodia/protección del término y mantiene la tensión escatológica. «Tiempos señalados» comunica el matiz de tiempos fijados o designados sin forzar una fórmula litúrgica.
- source_word: ܦܢܝ̈ܬܗ̇
  english_pob_choice: regions
  chosen_spanish: regiones
  alternatives_spanish:
  - partes
  - comarcas
  - distritos
  lexicon: Payne Smith
  rationale: Es la opción más natural y amplia en español para las varias zonas de la tierra que pasan ante la vista.
- source_word: ܬܒܝܠ
  english_pob_choice: inhabited world
  chosen_spanish: mundo habitado
  alternatives_spanish:
  - mundo poblado
  - tierra habitada
  lexicon: Payne Smith
  rationale: «Mundo habitado» conserva la noción técnica de la ecúmene sin reducirla a «mundo» a secas ni a «tierra» en sentido demasiado físico.
- source_word: ܙܒܢܐ ܐܚܪܝܐ
  english_pob_choice: the last time
  chosen_spanish: el tiempo postrero
  alternatives_spanish:
  - el último tiempo
  - el tiempo final
  lexicon: Payne Smith
  rationale: La POB inglesa retiene el singular; en español, «el tiempo postrero» suena natural, solemne y mantiene el singular escatológico. Se evita pluralizar para no introducir una lectura no atestiguada por el texto base de este tramo.
- source_word: ܘܐܦܝܣܢܝ
  english_pob_choice: you have prayed / you have asked me
  chosen_spanish: has rogado
  alternatives_spanish:
  - has pedido
  - me has suplicado
  lexicon: Payne Smith
  rationale: El contexto de la versión inglesa audita la petición de Baruc con lenguaje de súplica; «has rogado» conserva el tono reverente y encaja con la estructura causal del siríaco.
- source_word: ܚܘܝ
  english_pob_choice: show
  chosen_spanish: mostrar
  alternatives_spanish:
  - enseñar
  - hacer ver
  lexicon: Payne Smith
  rationale: «Mostrar» es la equivalencia más directa y mantiene la relación entre visión y revelación sin añadir comentario interpretativo.
theological_decisions:
- issue: Salida de Baruc de la tierra sin muerte ordinaria
  english_pob_reading: you shall surely depart from this earth—but not unto death; rather, you shall be kept for the appointed times
  chosen_spanish_reading: saldrás de esta tierra, pero no para muerte; más bien, serás guardado para los tiempos señalados
  alternative_spanish_readings:
  - partirás de esta tierra, pero no para morir; antes bien, serás reservado para los tiempos señalados
  - serás quitado de esta tierra, pero no para muerte; sino que serás conservado para los tiempos señalados
  rationale: 'La traducción conserva la tensión doctrinal: no se explica el modo de la salida ni se armoniza con doctrinas posteriores. Se mantiene la negación explícita de la muerte ordinaria y la reserva para un tiempo futuro determinado.'
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: El 'tiempo postrero' en singular
  english_pob_reading: the last time
  chosen_spanish_reading: el tiempo postrero
  alternative_spanish_readings:
  - los últimos tiempos
  - el fin
  rationale: Dado que el testimonio siríaco aquí usa singular, conviene no pluralizar. «Tiempo postrero» preserva el valor escatológico y la forma singular con dignidad bíblica.
  doctrine_reference: Ceriani primary-witness priority
translation_notes:
  revision_awareness: 'Se siguió la revisión que restituye el sentido correcto de 2 Baruc 76:1 según el siríaco controlado: la escena incluye la explicación de la visión, la salida de Baruc de la tierra sin muerte, la custodia para tiempos señalados, la subida al monte, el panorama de la tierra, y la exhortación a enseñar al pueblo. Se evitó la lectura errónea centrada en Adán, el pecado y la enfermedad, que no corresponde a este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma habitual del nombre divino en el proyecto, aunque este versículo no lo requiere explícitamente.
  - Se usa un registro solemne pero claro, evitando arcaísmos innecesarios.
  - Se conserva el singular de «tiempo postrero» por fidelidad al testimonio siríaco y a la decisión inglesa auditada.
  - No se introduce «Cristo» ni otro término teológico ajeno al pasaje.
  - Las notas a pie de página se anclan solo donde hay alternativas reales o aclaración de fuente.
