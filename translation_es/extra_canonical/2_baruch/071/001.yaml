  revised_spanish_text: Y la tierra santa tendrá misericordia de los suyos, y en aquel tiempo protegerá a sus habitantes.
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y precisión referencial del español: «de los suyos» comunica mejor el sentido idiomático de pertenencia personal que «de lo suyo», mientras conserva la personificación apocalíptica y el paralelismo del original/POB inglés.'
