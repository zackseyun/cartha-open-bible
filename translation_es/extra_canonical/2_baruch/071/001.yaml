translation:
  language: es
  text: Y la tierra santa tendrá misericordia de los suyos, y en aquel tiempo protegerá a sus habitantes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܐܪܥܐ ܩܕܝܫܬܐ
  english_pob_choice: the holy land
  chosen_spanish: la tierra santa
  alternatives_spanish:
  - la tierra sagrada
  - la tierra apartada
  lexicon: Payne Smith
  rationale: La personificación apocalíptica del territorio se conserva mejor con «tierra santa», que en español mantiene tanto la sacralidad como la fuerza teológica del sintagma.
- source_word: ܬܪܚܡ
  english_pob_choice: shall have mercy on
  chosen_spanish: tendrá misericordia de
  alternatives_spanish:
  - mostrará compasión a
  - se apiadará de
  lexicon: Payne Smith
  rationale: El verbo expresa misericordia activa; «tendrá misericordia de» preserva el registro solemne y la resonancia bíblica sin suavizar el sentido.
- source_word: ܕܝܠܗ̇
  english_pob_choice: its own
  chosen_spanish: de lo suyo
  alternatives_spanish:
  - de los suyos
  - de aquello que le pertenece
  lexicon: Payne Smith
  rationale: La expresión apunta a pertenencia/posesión propia. En español, «de lo suyo» conserva la brevedad idiomática y evita introducir un referente más explícito de lo que el siríaco exige.
- source_word: ܬܢܛܪ
  english_pob_choice: it shall protect
  chosen_spanish: protegerá
  alternatives_spanish:
  - guardará
  - mantendrá a salvo
  lexicon: Payne Smith
  rationale: «Protegerá» comunica la idea de custodia preservadora con claridad y dignidad. En este contexto breve evita la posible dureza de «guardará» en español sin perder el valor protector.
theological_decisions:
- issue: La tierra como sujeto agente en una promesa escatológica
  english_pob_reading: the holy land shall have mercy on its own
  chosen_spanish_reading: la tierra santa tendrá misericordia de lo suyo
  alternative_spanish_readings:
  - Dios tendrá misericordia por medio de la tierra
  - el pueblo de la tierra recibirá misericordia
  rationale: El siríaco presenta la tierra como sujeto personificado. La traducción conserva esa imagen apocalíptica en vez de reinterpretarla como una acción indirecta de Dios o como una referencia solo al pueblo, porque esa personificación forma parte del testimonio textual.
  doctrine_reference: Conservar la personificación bíblico-apocalíptica cuando el texto fuente la exige.
- issue: Relación entre misericordia y protección en la misma cláusula
  english_pob_reading: and at that time it shall protect its inhabitants
  chosen_spanish_reading: y en aquel tiempo protegerá a sus habitantes
  alternative_spanish_readings:
  - y en aquel tiempo guardará a sus habitantes
  - y entonces preservará a sus moradores
  rationale: El siríaco separa la compasión hacia «lo suyo» de la acción de proteger a sus habitantes. En español conviene mantener ambas acciones como paralelas, sin fusionarlas ni ampliarlas.
  doctrine_reference: No fusionar acciones distintas del original cuando el paralelismo es significativo.
translation_notes:
  revision_awareness: 'El expediente inglés contiene una revisión previa claramente desalineada con este versículo, basada en 2 Baruc 68:5–69:1, y luego corregida por revisión crítica. Aquí se sigue el sentido del siríaco proporcionado para 2 Baruc 71:1: la tierra santa como sujeto personificado que muestra misericordia y protege a sus habitantes.'
  spanish_consistency_notes:
  - Se mantiene «tierra santa» como equivalente principal de ܐܪܥܐ ܩܕܝܫܬܐ.
  - Se usa «misericordia» en lugar de un término más débil o meramente afectivo.
  - No se introduce «Mesías», «Cristo» ni vocabulario no presente en el versículo.
  - La sintaxis sigue el paralelismo breve del siríaco y evita expansión explicativa.
