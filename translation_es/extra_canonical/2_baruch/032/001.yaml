translation:
  language: es
  text: 'Pero tú, si preparas tu corazón para sembrar en él los frutos de la ley, eso te protegerá en aquel tiempo cuando el Poderoso haga temblar toda la creación.


    Porque después de un poco de tiempo será sacudida la edificación de Sión, para que de nuevo sea reconstruida. Sin embargo, esa misma edificación no permanecerá; antes bien, después de un tiempo volverá a ser arrancada de su lugar y quedará desolada hasta el tiempo. Y después deberá ser renovada en gloria y establecida para siempre.


    Por tanto, no debemos entristecernos tanto por el mal que ha venido ahora, como por el que ha de venir.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܐܠܦ ܣܛܪ̈ܝܢ / fructus legis
  english_pob_choice: the fruit(s) of the law
  chosen_spanish: los frutos de la ley
  alternatives_spanish:
  - el fruto de la ley
  - los productos de la ley
  lexicon: Syriac ܦܐܪ̈ܐ / Latin fructus
  rationale: El plural del original y del audit trail inglés debe mantenerse; en español, 'frutos' conserva la imagen agrícola y el vínculo explícito con 'la ley' sin paraplasear a 'obediencia'.
- source_word: ܬܥܒܕ / praeparaveritis corda vestra
  english_pob_choice: prepare your hearts
  chosen_spanish: preparas tu corazón
  alternatives_spanish:
  - preparen sus corazones
  - dispone tu corazón
  lexicon: Syriac idiom of inward preparation
  rationale: El singular de la dirección en español sigue el tratamiento del destinatario colectivo/típico en la exhortación. 'Preparar el corazón' mantiene la fuerza moral e interior sin diluirla en una frase más general.
- source_word: proteget vos
  english_pob_choice: it will protect you
  chosen_spanish: te protegerá
  alternatives_spanish:
  - os protegerá
  - les protegerá
  lexicon: Latin protego
  rationale: La revisión auditada indica voz activa y sujeto implícito vinculado con la preparación del corazón y los frutos de la ley; por eso el español también va en activo, sin pasar a pasiva.
- source_word: Fortis
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Poderoso Uno
  lexicon: Latin Fortis
  rationale: Como título divino, 'el Poderoso' es natural en español y conserva la carga reverencial del epíteto sin volverlo un simple adjetivo.
- source_word: concutiat omnem creaturam
  english_pob_choice: shakes the whole creation
  chosen_spanish: haga temblar toda la creación
  alternatives_spanish:
  - estremezca toda la creación
  - sacuda toda la creación
  lexicon: Latin concutere
  rationale: '''Hacer temblar'' transmite la sacudida apocalíptica sin exagerar más allá del texto y preserva el alcance cósmico de ''toda la creación''.'
- source_word: aedificatio Sion
  english_pob_choice: the building of Zion
  chosen_spanish: la edificación de Sión
  alternatives_spanish:
  - el edificio de Sión
  - la construcción de Sión
  lexicon: Latin aedificatio
  rationale: '''Edificación'' conserva el sentido de una realidad construida sin sonar demasiado técnico; además permite incluir la tensión entre ciudad/santuario/estructura que el original deja abierta.'
- source_word: renovari in gloria
  english_pob_choice: renewed in glory
  chosen_spanish: renovada en gloria
  alternatives_spanish:
  - renovada gloriosamente
  - hecha nueva en gloria
  lexicon: Latin renovare
  rationale: La frase mantiene restauración y esplendor; 'en gloria' reproduce la preposición del original sin convertirla en un adverbio interpretativo.
- source_word: perficietur in perpetuum
  english_pob_choice: be established forever
  chosen_spanish: establecida para siempre
  alternatives_spanish:
  - consumada para siempre
  - perfeccionada para siempre
  lexicon: Latin perficere
  rationale: '''Establecida para siempre'' suena natural en español y conserva la durabilidad final del destino de Sión. Se evita ''perfeccionada'' porque puede sonar menos idiomático aquí.'
- source_word: contristari tantopere
  english_pob_choice: grieve so greatly
  chosen_spanish: entristecernos tanto
  alternatives_spanish:
  - afligirnos tanto
  - dolernos tanto
  lexicon: Latin contristari
  rationale: '''Entristecernos tanto'' expresa bien el lamento sin elevarlo a un registro demasiado literario o arcaico.'
theological_decisions:
- issue: Agencia divina en la protección
  english_pob_reading: 'The text uses an active sense: the prepared heart and the fruits of the law protect the hearer in the coming crisis.'
  chosen_spanish_reading: te protegerá
  alternative_spanish_readings:
  - serás protegido
  - te guardará
  rationale: La revisión auditada rechaza la pasiva; en español se conserva el activo para no borrar la relación causal entre la preparación interior y la protección prometida.
  doctrine_reference: Primacía del texto fuente y de la revisión crítica sobre la suavización teológica.
- issue: Título divino en el juicio cósmico
  english_pob_reading: Fortis is rendered as a reverential divine title.
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
  - el Fuerte
  - el Poderoso Uno
  rationale: En el contexto de sacudir toda la creación, el epíteto funciona como título de Dios; 'el Poderoso' preserva esa solemnidad sin forzar una fórmula tradicional que el texto no exige.
  doctrine_reference: Mantener el peso teológico del título divino sin sustituirlo por lenguaje eclesial heredado.
- issue: 'Secuencia de Sión: sacudida, reconstrucción, nueva desolación y renovación final'
  english_pob_reading: The restoration block is retained as an important but textually uncertain sequence.
  chosen_spanish_reading: sacudida / reconstruida / arrancada / desolada / renovada en gloria
  alternative_spanish_readings:
  - omitir el bloque intermedio
  - presentarlo como totalmente seguro
  rationale: La secuencia preserva la tensión histórica y escatológica del pasaje. Aunque la frontera textual es inestable, traducirla íntegramente evita borrar un elemento doctrinalmente relevante y fuente-dependiente.
  doctrine_reference: Transparencia textual ante la incertidumbre; no falsear precisión donde el testimonio es tentativo.
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que corrige la voz pasiva a activa en la cláusula de protección, y se mantuvo el plural 'frutos' acorde con el control síriaco y la auditoría inglesa. También se respetó el bloque intermedio sobre Sión como secuencia completa, dado que el expediente señala incertidumbre de frontera textual pero no una omisión segura.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' solo cuando el texto base lo exija explícitamente; aquí no aparece.
  - '''Mesías'' no corresponde en este versículo.'
  - Se mantuvo 'Sión' con tilde conforme al uso bíblico en español.
  - '''creación'' traduce el alcance cósmico y no ''criatura'', para no reducir el ámbito del sacudimiento.'
