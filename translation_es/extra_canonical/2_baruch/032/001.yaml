  text: 'But you, if you prepare your hearts so as to sow in them the fruits of the law, it will protect you in that time when the Mighty One shakes the whole creation.


    For after a little time the building of Zion will be shaken, so that it may be rebuilt again. Yet that very building will not remain; rather, after a time it will again be uprooted and will remain desolate until the time. And afterward it must be renewed in glory and be established forever.


    Therefore we should not grieve so greatly over the evil that has come now, as over that which is to come.'
  footnotes:
  - marker: a
    text: Or 'you will be protected'.
    reason: previous_rendering
  - marker: b
    text: Or 'fruit'.
    reason: previous_rendering
