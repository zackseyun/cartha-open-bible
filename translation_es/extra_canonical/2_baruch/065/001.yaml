revisions:
- from: Y después de Manasés, Amon se levantó, y en su tiempo pensó que el Poderoso no pediría cuentas de estas cosas.
  to: Y después de Manasés, Amón surgió, y en su propio tiempo pensó que el Poderoso no pediría cuentas de estas cosas.
  rationale: Se corrige la ortografía del nombre a 'Amón', se sustituye 'se levantó' por 'surgió' para un español más natural y fiel al ingreso narrativo sin matiz físico innecesario, y se añade 'propio' para reflejar mejor el matiz temporal documentado en la auditoría inglesa.
