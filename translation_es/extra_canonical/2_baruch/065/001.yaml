translation:
  language: es
  text: Y después de Manasés, Amón surgió, y en su propio tiempo pensó que el Poderoso no pediría cuentas de estas cosas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܘܒܬܪ ... ܡܢܫܐ
  english_pob_choice: And after Manasseh
  chosen_spanish: Y después de Manasés
  alternatives_spanish:
  - Y tras Manasés
  - Y luego de Manasés
  lexicon: Payne Smith
  rationale: La relación temporal es simple y debe conservarse sin añadir matices. 'Después de' es natural en español y mantiene el orden histórico.
- source_word: ܗܘܐ ܐܡܘܢ
  english_pob_choice: Amon arose
  chosen_spanish: Amon se levantó
  alternatives_spanish:
  - Amon surgió
  - Amon apareció
  lexicon: Payne Smith
  rationale: El texto siríaco dice literalmente que Amon 'fue / estuvo' en el marco narrativo; el sentido contextual es el de entrada o aparición en escena. 'Se levantó' conserva esa transición narrativa sin añadir una valoración moral inexistente en el original.
- source_word: ܒܙܒܢܗ
  english_pob_choice: in his own time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - en sus días
  - en aquel tiempo
  lexicon: Payne Smith
  rationale: La frase apunta al período de su reinado o época, no a una reflexividad temporal. 'En su tiempo' conserva el valor temporal de forma idiomática en español.
- source_word: ܡܬܚܫܒ
  english_pob_choice: he thought
  chosen_spanish: pensó
  alternatives_spanish:
  - consideró
  - supuso
  lexicon: Payne Smith
  rationale: El verbo expresa una suposición o cálculo interior. 'Pensó' es la opción más directa y fiel en español, manteniendo la interioridad sin exagerar el matiz.
- source_word: ܚܝܒܘܬܐ
  english_pob_choice: call ... to account
  chosen_spanish: pedir cuentas
  alternatives_spanish:
  - llamar a cuentas
  - requerir cuentas
  lexicon: Payne Smith
  rationale: La expresión judicial de 'call to account' se naturaliza en español como 'pedir cuentas'. Preserva la idea de rendición de cuentas sin forzar 'castigar', que sería más específico de lo que el texto exige.
- source_word: ܡܥܒܕܐ ܕܗܠܝܢ / clause context
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas obras
  - esto
  lexicon: Payne Smith
  rationale: El antecedente remite a los actos mencionados en la sección previa. 'Estas cosas' mantiene la referencia amplia del original y evita precisar indebidamente el objeto de la cuenta.
theological_decisions:
- issue: La frase sobre Amon no debe moralizarse como impiedad sin base textual.
  english_pob_reading: Amon arose ... he thought that the Mighty One would not call these things to account.
  chosen_spanish_reading: Amon se levantó ... pensó que el Poderoso no pediría cuentas de estas cosas.
  alternative_spanish_readings:
  - Amon se levantó ... pensó que el Poderoso no castigaría estas cosas
  - Amon surgió ... supuso que el Poderoso no investigaría esto
  rationale: El texto siríaco no contiene aquí una calificación explícita como 'obró impíamente'. La revisión inglesa corrigió una adición no sustentada; por eso la versión española evita cualquier juicio moral no presente en el original y conserva solo la expectativa equivocada de no rendir cuentas.
  doctrine_reference: Fidelidad textual y evitación de ampliación interpretativa no atestiguada por el texto base.
translation_notes:
  revision_awareness: La auditoría inglesa corrigió una adición indebida previa ('Amon acted impiously') y estableció que el siríaco dice simplemente que Amon 'was/arose'. La versión española sigue esa corrección y no introduce valoración moral ajena al texto. También se ha preservado el sentido judicial de 'call to account' con una expresión española natural.
  spanish_consistency_notes:
  - Se mantiene 'Poderoso' para ܡܪܐ/ܚܝܠܬܢܐ según el audit trail inglés ('the Mighty One').
  - No se usa 'SEÑOR' porque el pasaje no contiene el nombre divino יהוה/YHWH ni una cita que lo requiera.
  - La puntuación respeta una sola oración narrativa breve, acorde con la unidad versicular.
