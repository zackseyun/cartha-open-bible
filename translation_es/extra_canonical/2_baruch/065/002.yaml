translation:
  language: es
  text: Porque cometió mucha impiedad, y mató a los justos, y pervirtió la ley, y derramó sangre inocente, y profanó el santuario, y llevó al pueblo a pecar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: much impiety
  english_pob_choice: committed much impiety
  chosen_spanish: cometió mucha impiedad
  alternatives_spanish:
  - practicó gran impiedad
  - hizo mucha maldad
  lexicon: impiedad
  rationale: «Impiedad» conserva la fuerza religiosa y moral del término y sigue de cerca la elección inglesa; «mucha» reproduce el cuantificador intensivo de la fuente sin suavizarlo.
- source_word: the righteous
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los inocentes
  lexicon: justos
  rationale: La fuente apunta a personas justas en sentido moral/jurídico; «justos» es la correspondencia más directa y clara en español.
- source_word: the law
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Torá
  - la instrucción
  lexicon: ley
  rationale: El contexto exige el sentido normativo de la ley divina; «ley» mantiene la equivalencia semántica más transparente para el lector hispanohablante.
- source_word: innocent blood
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - sangre de inocentes
  - sangre sin culpa
  lexicon: sangre inocente
  rationale: 'Se conserva la construcción idiomática bíblica con el mismo peso acusatorio: no solo sangre derramada, sino sangre de personas inocentes.'
- source_word: polluted the sanctuary
  english_pob_choice: polluted the sanctuary
  chosen_spanish: profanó el santuario
  alternatives_spanish:
  - contaminó el santuario
  - manchó el santuario
  lexicon: profanar
  rationale: «Profanó» expresa mejor la violación de lo sagrado que un mero ensuciar o contaminar; «santuario» mantiene el referente cultual.
- source_word: caused the people to sin
  english_pob_choice: caused the people to sin
  chosen_spanish: llevó al pueblo a pecar
  alternatives_spanish:
  - hizo pecar al pueblo
  - hizo que el pueblo pecara
  lexicon: hacer pecar / llevar a pecar
  rationale: «Llevó al pueblo a pecar» transmite causalidad moral sin añadir matices no presentes; evita una formulación demasiado rígida y conserva la acusación de inducir al pecado.
theological_decisions:
- issue: Acusación acumulativa contra el rey inicuo
  english_pob_reading: A chained list of sins describing a ruler's culpability.
  chosen_spanish_reading: Una cadena acumulativa de culpas que describe la responsabilidad del rey en múltiples actos perversos.
  alternative_spanish_readings:
  - Una lista simple de pecados sin valor acumulativo
  - Una paráfrasis más interpretativa sobre su corrupción general
  rationale: La sintaxis española mantiene la serie coordinada con repetición de «y», preservando el efecto de acumulación y el peso judicial/moral del texto.
  doctrine_reference: Énfasis bíblico sobre responsabilidad moral personal y juicio por obras
- issue: Profanación del santuario
  english_pob_reading: He polluted the sanctuary.
  chosen_spanish_reading: Profanó el santuario.
  alternative_spanish_readings:
  - Contaminó el santuario
  - Deshonró el santuario
  rationale: La profanación es una categoría cultual y teológica, no solo higiénica o social; «profanó» preserva esa tensión sagrada.
  doctrine_reference: Santidad del lugar consagrado y pecado de sacrilegio
- issue: Relación entre ley y pecado del pueblo
  english_pob_reading: He perverted the law, and he caused the people to sin.
  chosen_spanish_reading: Pervirtió la ley y llevó al pueblo a pecar.
  alternative_spanish_readings:
  - Alteró la ley y hizo pecar al pueblo
  - Corrompió la ley e indujo al pueblo al pecado
  rationale: La formulación española separa la corrupción de la norma y la inducción del pueblo, manteniendo ambos cargos sin fusionarlos.
  doctrine_reference: Responsabilidad de liderazgo y escándalo moral
translation_notes:
  revision_awareness: El texto inglés auditado fue corregido desde una lectura truncada o mal alineada de 65:1 hacia la lista completa de maldades de 65:2. Esta versión española sigue la lectura completa atestiguada por la revisión reciente y evita cualquier fragmento de la versión errónea anterior.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando aparece el nombre divino explícito; aquí no aparece, así que no se introduce.
  - Se conserva un registro bíblico sobrio y coordinado, sin modernizaciones que borren la acusación moral acumulativa.
  - No se añade nota textual porque el español no introduce ambigüedad nueva que requiera alternativa en el verso mismo.
