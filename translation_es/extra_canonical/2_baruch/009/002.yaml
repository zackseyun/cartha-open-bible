lexical_decisions:
- source_word: tore our garments
  english_pob_choice: we tore our garments
  chosen_spanish: rasgamos nuestras vestiduras
  alternatives_spanish:
  - rompimos nuestras vestiduras
  - desgarramos nuestras vestiduras
  lexicon: rasgar
  rationale: El acto de desgarrar la ropa expresa en español de forma natural el gesto de duelo intensificado del texto; «vestiduras» conserva el registro bíblico sin caer en un calco áspero.
- source_word: wept
  english_pob_choice: wept
  chosen_spanish: lloramos
  alternatives_spanish:
  - sollozamos
  - llorábamos
  lexicon: llorar
  rationale: «Lloramos» comunica directamente el llanto comunitario en un español claro y sobrio; no exige matices adicionales no presentes en el original.
- source_word: mourned
  english_pob_choice: mourned
  chosen_spanish: nos lamentamos
  alternatives_spanish:
  - hicimos duelo
  - estuvimos de duelo
  lexicon: lamentarse
  rationale: La secuencia del texto acumula gestos de aflicción; «nos lamentamos» reproduce ese lamento sin imponer una formulación más interpretativa que «hicimos duelo».
- source_word: fasted
  english_pob_choice: fasted
  chosen_spanish: ayunamos
  alternatives_spanish:
  - nos abstuvimos de comer
  - practicamos ayuno
  lexicon: ayunar
  rationale: «Ayunamos» es el equivalente bíblico directo y de uso amplio en español; mantiene la referencia concreta al ayuno ritual o penitencial.
- source_word: seven days
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - durante siete días
  - por siete días
  lexicon: siete días
  rationale: La cifra simple «siete días» conserva la duración exacta sin añadir preposición que el español no requiere en esta coordinación verbal.
theological_decisions:
- issue: Acumulación de signos de duelo y arrepentimiento comunitario
  english_pob_reading: And we tore our garments and wept and mourned and fasted seven days.
  chosen_spanish_reading: Y rasgamos nuestras vestiduras, y lloramos, y nos lamentamos, y ayunamos siete días.
  alternative_spanish_readings:
  - Y rompimos nuestras vestiduras...
  - Y hicimos duelo...
  rationale: El verso presenta una cadena de acciones corporales y comunitarias de aflicción. La traducción conserva la progresión y no reduce los gestos a una sola idea abstracta, para mantener visible la intensidad ritual y emocional del pasaje.
  doctrine_reference: No doctrinal claim beyond the text; narrative of communal mourning.
translation_notes:
  revision_awareness: La base inglesa fue ajustada solo en puntuación para hacer más fluido el polisíndeton, sin cambios léxicos. La versión española conserva esa misma estructura acumulativa con coordinación repetida y sin añadir interpretaciones.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y transparente, con verbos de acción concretos.
  - No se introduce «duelo» como único equivalente porque el original encadena varios actos distintos de aflicción.
  - El orden y la repetición de «y» reflejan el efecto acumulativo del texto fuente y del inglés auditado.
