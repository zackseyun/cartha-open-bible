translation:
  language: es
  text: Y yo, Baruc, vine con Jeremías, cuyo corazón había sido hallado puro de pecados, y que no había sido tomado en la toma de la ciudad. Y rasgamos nuestras vestiduras, lloramos, lamentamos y ayunamos siete días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܐܬܒܥ
  english_pob_choice: came
  chosen_spanish: vine
  alternatives_spanish:
  - llegué
  - volví
  lexicon: Payne Smith
  rationale: En este contexto narrativo, el movimiento se expresa de manera simple y directa. «Vine» reproduce el desplazamiento sin añadir matices de regreso que el contexto no exige.
- source_word: ܕܟܝ ... ܡܢ ܚܛܝ̈ܗ̣ܐ
  english_pob_choice: whose heart had been found pure from sins
  chosen_spanish: cuyo corazón había sido hallado puro de pecados
  alternatives_spanish:
  - cuyo corazón era limpio de pecados
  - cuyo corazón había sido hallado inocente de pecados
  lexicon: Payne Smith
  rationale: «Puro de pecados» conserva la fuerza moral de la frase sin convertirla en una afirmación doctrinal absoluta de impecabilidad. «Corazón» mantiene el sujeto interior que el inglés POB también explicita.
- source_word: ܒܥܒܕܘܗܝ ܕܡܕܝܢܬܐ
  english_pob_choice: in the capture of the city
  chosen_spanish: en la toma de la ciudad
  alternatives_spanish:
  - durante la captura de la ciudad
  - cuando la ciudad fue tomada
  lexicon: Smith Syriac Dictionary
  rationale: «Toma» expresa naturalmente el sentido militar de la ciudad conquistada o apresada, y es más idiomático en español que un calco más pesado.
- source_word: ܘܒܩ̈ܝ
  english_pob_choice: wept, mourned
  chosen_spanish: lloramos, lamentamos
  alternatives_spanish:
  - lloramos, gemimos
  - lloramos, nos lamentamos
  lexicon: Payne Smith
  rationale: Conservo dos verbos distintos para reflejar la doble acción de duelo. «Lamentamos» funciona como verbo de luto y evita perder la progresión emocional del original.
- source_word: ܘܫܒܩܬܗ... ܠܡܠܐܟܐ
  english_pob_choice: And I, Baruch, came with Jeremiah... And we rent our garments...
  chosen_spanish: Y yo, Baruc, vine con Jeremías... Y rasgamos nuestras vestiduras...
  alternatives_spanish:
  - Y yo, Baruc, llegué con Jeremías...
  - Y Baruc, con Jeremías, vine...
  lexicon: Contextual Syriac reading
  rationale: La línea compuesta preserva la secuencia completa del verso que el audit trail inglés había quedado corto en mostrar. «Rasgamos nuestras vestiduras» traduce el gesto de duelo con naturalidad bíblica en español.
- source_word: ܫܒܥܐ ܝܘܡܝ̈ܢ
  english_pob_choice: seven days
  chosen_spanish: siete días
  lexicon: Common numeral phrase
  rationale: Se mantiene la duración exacta sin variación estilística.
theological_decisions:
- issue: Jeremías descrito como moralmente puro respecto de los pecados
  english_pob_reading: The line presents Jeremiah as innocent with respect to the city's guilt and overthrow, not as making an abstract claim that he was absolutely sinless in every sense.
  chosen_spanish_reading: La línea presenta a Jeremías como hallado limpio respecto de los pecados y de la culpa ligada a la caída de la ciudad, no como una afirmación abstracta de impecabilidad absoluta.
  alternative_spanish_readings:
  - Jeremías era totalmente sin pecado
  - La frase es principalmente ritual, no moral
  rationale: '«Puro de pecados» y «corazón había sido hallado» dejan visible la tensión: se habla de una evaluación contextual de Jeremías en relación con el juicio sobre la ciudad, sin convertirla en una doctrina sistemática sobre su perfección moral.'
  doctrine_reference: DOCTRINE.md
translation_notes:
  revision_awareness: 'La versión inglesa auditada había sido corregida para recuperar la segunda mitad del verso: el rasgar de vestiduras, el llanto, el lamento y el ayuno por siete días. La presente redacción española incorpora esa parte omitida y mantiene el juicio contextual sobre Jeremías sin endurecerlo en una afirmación absoluta de sin pecado.'
  spanish_consistency_notes:
  - Se usa «Baruc» para el nombre propio de forma coherente con la tradición española bíblica.
  - Se mantiene «Jeremías» y no «Yeremías» para la legibilidad eclesial estándar.
  - 'Se conserva la secuencia verbal completa del duelo: rasgar, llorar, lamentar y ayunar.'
  - No se emplean notas al pie porque no es necesaria una alternativa textual anclada en el verso para esta entrega.
