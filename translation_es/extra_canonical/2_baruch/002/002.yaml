translation:
  language: es
  text: Porque tus obras son para esta ciudad como una columna firme, y tu oración es como un muro fuerte.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: deeds / works
  english_pob_choice: deeds
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - obras realizadas
  lexicon: Syriac context for recompense/protection imagery
  rationale: '"Obras" conserva la idea de actos concretos y, en contexto bíblico, funciona con naturalidad para acciones con peso moral o religioso. Evita un calco demasiado literal de "hechos" y mantiene la fuerza auditiva de la comparación.'
- source_word: like a firm pillar
  english_pob_choice: like a firm pillar
  chosen_spanish: como una columna firme
  alternatives_spanish:
  - como un pilar firme
  - como una columna sólida
  lexicon: imagery of support/stability
  rationale: '"Columna" es una imagen clara y digna en español para una estructura de sostén; "firme" reproduce la idea de estabilidad y resistencia. "Pilar" es viable, pero "columna" suena más natural en un registro bíblico-esperado sin perder el sentido.'
- source_word: your prayer
  english_pob_choice: your prayer
  chosen_spanish: tu oración
  alternatives_spanish:
  - tus oraciones
  - tu plegaria
  lexicon: singular prayer noun in the revised English text
  rationale: Se sigue la revisión inglesa que prefirió el singular. "Oración" es el término más transparente y bíblicamente amplio en español; "plegaria" sería posible, pero menos neutra y más estilizada.
- source_word: like a strong wall
  english_pob_choice: like a strong wall
  chosen_spanish: como un muro fuerte
  alternatives_spanish:
  - como una muralla fuerte
  - como un muro sólido
  lexicon: defensive fortification imagery
  rationale: '"Muro" traduce de forma directa la imagen de defensa/protección. "Muralla" intensifica el matiz militar, pero "muro" mantiene mejor la correspondencia general con el inglés POB y su tono sobrio.'
theological_decisions:
- issue: Valor de las obras y de la oración como medios de protección para la ciudad
  english_pob_reading: For your deeds are to this city like a firm pillar, and your prayer is like a strong wall.
  chosen_spanish_reading: Porque tus obras son para esta ciudad como una columna firme, y tu oración como un muro fuerte.
  alternative_spanish_readings:
  - Porque tus obras son para esta ciudad como un pilar firme, y tu oración es como una muralla fuerte.
  - Porque tus obras son para esta ciudad como un sostén firme, y tu oración como una defensa fuerte.
  rationale: La frase preserva la comparación sin convertirla en una afirmación doctrinal sistemática. Se mantiene la relación entre obras y oración como elementos de apoyo/protección para la ciudad, tal como lo presenta el texto, sin suavizar la fuerza de la imagen.
  doctrine_reference: Intercesión y valor de la fidelidad en la literatura parabíblica; no se formula aquí una doctrina soteriológica explícita.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió "prayers" por el singular "prayer" y añadió "is" en la segunda cláusula para paralelismo y claridad. La redacción española sigue esa revisión con "tu oración" en singular y una cópula explícita solo donde el español la requiere naturalmente.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando aparezca el nombre divino; en este versículo no aplica.
  - Se evita "Cristo"/"Mesías" porque el versículo no contiene terminología mesiánica.
  - Se conserva el registro bíblico sobrio con sintaxis natural en español.
  - No se añaden notas textuales porque el paquete fuente y la revisión inglesa no documentan variantes relevantes para este versículo.
