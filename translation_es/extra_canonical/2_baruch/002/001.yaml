translation:
  language: es
  text: Pero ahora te digo, y a Jeremías, y a todos los que son como ustedes, que salgan[a] de esta ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «mírense desde»; es un modismo siríaco que significa retirarse o salir de un lugar.
    reason: lexical_choice
lexical_decisions:
- source_word: ܐܡܪ ܐܢܐ ܠܟ
  english_pob_choice: I say to you
  chosen_spanish: les digo a ustedes
  alternatives_spanish:
  - os digo
  - les hablo
  lexicon: Payne Smith
  rationale: El sujeto explícito y el verbo de decir se conservan de manera directa; ‘les digo’ comunica el habla dirigida sin forzar un registro arcaico. Se añade ‘ustedes’ para claridad natural en español.”
- source_word: ܘܠܐܪܡܝܐ
  english_pob_choice: and to Jeremiah
  chosen_spanish: y a Jeremías
  alternatives_spanish:
  - y a Yeremías
  - y a el profeta Jeremías
  lexicon: Nombre propio bíblico estándar
  rationale: Se conserva el nombre propio reconocido en español bíblico. No se añade glosa porque el texto no la exige.
- source_word: ܘܠܟܠ ܐܝܠܝܢ ܕܕܡ̇ܝܢ ܠܟܘܢ
  english_pob_choice: and to all those who are like you
  chosen_spanish: y a todos los que son como ustedes
  alternatives_spanish:
  - y a todos los que se les parecen
  - y a todos los semejantes a ustedes
  lexicon: Payne Smith
  rationale: Mantiene la comparación personal y concreta del siríaco. ‘Son como ustedes’ reproduce la relación de semejanza sin volverla abstracta ni suavizarla.
- source_word: ܕܬܚܙܘܢ ܠܟܘܢ ܡܢ
  english_pob_choice: that you should depart
  chosen_spanish: que se aparten[a]
  alternatives_spanish:
  - que salgan
  - que se retiren
  - que se alejen
  lexicon: Payne Smith
  rationale: El siríaco usa un modismo literal de ‘mirar por sí mismos desde’ con valor de retirarse o partir. ‘Se aparten’ conserva el sentido de separación y retiro sin imponer una equivalencia demasiado interpretativa.
- source_word: ܡܢ ܗܕܐ ܡܕܝܢܬܐ
  english_pob_choice: from this city
  chosen_spanish: de esta ciudad
  alternatives_spanish:
  - de la ciudad esta
  - de la ciudad
  - fuera de esta ciudad
  lexicon: Uso normal de la preposición + demostrativo
  rationale: Se mantiene la referencia local exacta y el demostrativo cercano del original. ‘Esta ciudad’ sigue de cerca el source y su valor de inmediatez.
translation_notes:
  revision_awareness: El expediente inglés confirma que la unidad textual correcta es solo 2 Baruch 2:1; por eso no se incorporan las imágenes de ‘pilar’ y ‘muro’ que pertenecen al versículo siguiente. También se respeta la decisión auditada de entender el modismo siríaco como una orden de partir o apartarse, no como una mera observación.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene un español bíblico claro y moderno, evitando calcos innecesarios.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni otras sustituciones no presentes en el versículo.
  - La expresión ‘les digo a ustedes’ conserva la fuerza del discurso directo sin arcaísmo.
