theological_decisions:
- issue: Identificación final de las aguas en un pasaje visionario truncado
  english_pob_reading: these are they...
  chosen_spanish_reading: estas son ellas...
  alternative_spanish_readings:
  - son estas...
  - estas son...
  rationale: El testimonio textual disponible se corta abruptamente; por eso la traducción debe reflejar una identificación incompleta, sin añadir interpretación ausente como «del mundo entero» u otra expansión no atestiguada.
  doctrine_reference: 'Principio de suficiencia textual y cautela ante lagunas del testimonio: no ampliar el sentido más allá de lo que la fuente permite.'
