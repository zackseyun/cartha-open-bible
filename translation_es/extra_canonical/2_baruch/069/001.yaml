  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y publicable.
  - Se prefirió «aguas últimas» sobre «aguas finales» para evitar rigidez y conservar el paralelismo visionario.
  - No se añadió nota al pie porque la única alternativa relevante ya queda indicada por la suspensión textual en el cuerpo del texto.
