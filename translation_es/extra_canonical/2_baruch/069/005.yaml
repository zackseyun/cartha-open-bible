translation:
  language: es
  text: Por tanto, las horas no se cuentan con las horas, ni los tiempos con los tiempos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: hours
  english_pob_choice: hours
  chosen_spanish: horas
  alternatives_spanish:
  - momentos
  - horarios
  lexicon: hour
  rationale: El siríaco distingue primero 'hours' y el POB inglés mantiene ese orden; 'horas' conserva la repetición y el paralelismo sin añadir interpretación.
- source_word: times
  english_pob_choice: times
  chosen_spanish: tiempos
  alternatives_spanish:
  - épocas
  - momentos
  lexicon: time
  rationale: '''Tiempos'' reproduce el segundo sustantivo del paralelismo y mantiene la diferencia respecto de ''horas''; ''épocas'' introduciría una lectura más histórica de la que el breve verso no exige.'
- source_word: counted with
  english_pob_choice: are not counted with
  chosen_spanish: no se cuentan con
  alternatives_spanish:
  - no se computan con
  - no se miden con
  lexicon: count
  rationale: '''No se cuentan con'' expresa con naturalidad la pasiva impersonal y conserva la idea de no ser contabilizados unos con otros, que es la fuerza del inglés POB y del original.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió el orden de 'hours/times' en el texto inglés; por eso el español conserva primero 'horas' y después 'tiempos' para reflejar el paralelismo del siríaco.
  spanish_consistency_notes:
  - Se mantiene el paralelismo binario del verso con repetición exacta del patrón 'X no se cuentan con X, ni Y con Y'.
  - No se introducen términos interpretativos como 'épocas' o 'momentos' para no debilitar la correspondencia léxica con el texto fuente.
