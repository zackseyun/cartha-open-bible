translation:
  language: es
  text: Porque los males y las cosas buenas que han de ser[a] están delante de él[b] como un solo recuerdo fijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que iban a ser».
    reason: previous_rendering
  - marker: b
    text: O «que han de ser estarán delante de él».
    reason: previous_rendering
lexical_decisions:
- source_word: ‘atīdān / future-destined events
  english_pob_choice: that are to be
  chosen_spanish: que han de ser
  alternatives_spanish:
  - que serán
  - que van a ser
  lexicon: tiempo/futuro destinado
  rationale: El participio siríaco indica hechos futuros o destinados, no un pasado aproximado; por eso 'han de ser' comunica destino/futuridad con un tono natural en español y evita el choque temporal de 'iban a ser' o 'que serán' si se quiere conservar la noción de estar asignados.
- source_word: qāymān / stand before him
  english_pob_choice: stand before him
  chosen_spanish: estarán delante de él
  alternatives_spanish:
  - se mantendrán delante de él
  - permanecerán delante de él
  lexicon: comparecer/presentarse ante
  rationale: La imagen es de comparecencia continua ante Dios; en español, 'estarán delante de él' reproduce la idea de permanecer en presencia divina sin forzar una metáfora judicial demasiado técnica.
- source_word: one fixed remembrance
  english_pob_choice: as one fixed remembrance
  chosen_spanish: como un solo recuerdo fijo
  alternatives_spanish:
  - como un recuerdo único y firme
  - como una memoria fija
  lexicon: memoria/recordatorio
  rationale: El sintagma expresa una memoria unificada e inmutable; 'un solo recuerdo fijo' conserva la unidad ('one') y la estabilidad ('fixed') sin añadir un matiz devocional no asegurado por el texto.
- source_word: the evils and the good things
  english_pob_choice: the evils and the good things
  chosen_spanish: los males y las cosas buenas
  alternatives_spanish:
  - los males y los bienes
  - las cosas malas y las buenas cosas
  lexicon: mal/bien
  rationale: '''Los males y las cosas buenas'' mantiene la contraposición moral del original y evita una simetría excesivamente abstracta; ''bienes'' sería posible, pero ''cosas buenas'' conserva el tono amplio del siríaco.'
theological_decisions:
- issue: Presencia de Dios y memoria divina de actos futuros
  english_pob_reading: stand before him as one fixed remembrance
  chosen_spanish_reading: estarán delante de él como un solo recuerdo fijo
  alternative_spanish_readings:
  - permanecerán delante de él como un único recuerdo fijo
  - comparecerán ante él como un recuerdo fijo
  rationale: La frase no habla solo de conocimiento abstracto, sino de hechos que permanecen en presencia de Dios como memoria estable. 'Delante de él' preserva la dimensión de presencia divina sin convertirla en juicio explícito que el texto no enuncia.
  doctrine_reference: omnisciencia divina; memoria divina; preservación del sentido figurativo del texto
- issue: Tensión temporal entre futuro y presencia
  english_pob_reading: that are to be ... stand
  chosen_spanish_reading: que han de ser estarán
  alternative_spanish_readings:
  - que serán estarán
  - que van a ser estarán
  rationale: El texto combina futuridad/destinación con una permanencia actualizada ante Dios. En español, 'han de ser' y 'estarán' permiten mantener esa tensión sin resolverla artificialmente en un solo tiempo verbal.
  doctrine_reference: providencia divina; futuro decretado/presente ante Dios
translation_notes:
  revision_awareness: La POB inglesa fue revisada para corregir la tensión temporal ('that are to be') y el orden de palabras de 'stand before him'. La versión española sigue esa lectura revisada, reflejando futuridad destinada y la colocación natural de 'delante de él' con 'estarán'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito en el 'él' porque el contexto y la audit trail inglesa remiten a la presencia divina.
  - No se usa 'SEÑOR' ni 'Yahvé' porque el pronombre del verso no nombra explícitamente el tetragrámaton; la referencia se conserva por contexto.
  - '''recuerdo fijo'' se eligió para evitar introducir una terminología litúrgica o devocional que el original no exige.'
