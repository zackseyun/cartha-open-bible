    issue: 'Construcción verbal poco natural: «que han de ser estarán»'
    rationale: Aunque intenta reflejar «that are to be ... stand», en español resulta forzado y difícil de leer. Reordenar a «están delante de él» con la nota alternativa permite conservar mejor el valor presente del verbo principal inglés/siríaco y la inteligibilidad española.
  - severity: low
    issue: Faltan notas que preserven alternativas auditadas en inglés
    rationale: El registro inglés conserva dos alternativas relevantes de traducción previa. Dado que el español también enfrenta una decisión temporal y de orden sintáctico, conviene reflejarlas en notas para mantener la trazabilidad del expediente.
