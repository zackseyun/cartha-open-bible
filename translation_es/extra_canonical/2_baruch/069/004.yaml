translation:
  language: es
  text: y los fines de los tiempos de los justos, que iban a cumplirse delante de él, permanecen como una sola memoria permanente, además de las cosas que él va a hacer en la consumación del siglo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: and the ends of the times
  english_pob_choice: the ends of the times
  chosen_spanish: los fines de los tiempos
  alternatives_spanish:
  - los extremos de los tiempos
  - los finales de los tiempos
  lexicon: fin / tiempo
  rationale: Conservo la construcción plural y abstracta del sintagma. «Fines» refleja bien la idea de término o culminación, sin convertirla en una paráfrasis más libre.
- source_word: of the righteous
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los piadosos
  lexicon: justicia / justo
  rationale: «Justos» es el equivalente más natural y fiel para el grupo de los que son caracterizados por rectitud ante Dios, sin desplazar el matiz bíblico.
- source_word: which were going to be accomplished before him
  english_pob_choice: which were going to be accomplished before him
  chosen_spanish: que iban a cumplirse delante de él
  alternatives_spanish:
  - que iban a realizarse ante él
  - que estaban por cumplirse delante de él
  lexicon: cumplir / delante de
  rationale: «Cumplirse» conserva la idea de cumplimiento de un designio o plazo; «delante de él» mantiene la orientación relacional del original sin añadir explicaciones.
- source_word: stand as one fixed remembrance
  english_pob_choice: stand as one fixed remembrance
  chosen_spanish: quedan como un único recuerdo fijo
  alternatives_spanish:
  - permanecen como un recuerdo fijo único
  - se alzan como un solo memorial fijo
  lexicon: memoria / recuerdo
  rationale: «Recuerdo fijo» expresa el carácter estable y memorial de la frase. «Memorial» sería posible, pero «recuerdo» evita introducir un término cultual no asegurado por el contexto.
- source_word: besides those things
  english_pob_choice: besides those things
  chosen_spanish: además de las cosas
  alternatives_spanish:
  - aparte de las cosas
  - junto con las cosas
  lexicon: además / aparte
  rationale: «Además de» reproduce la adición del inglés POB con claridad y sin sobreinterpretar la relación exacta entre las dos series de actos mencionadas.
- source_word: that he is going to do
  english_pob_choice: that he is going to do
  chosen_spanish: que él va a hacer
  alternatives_spanish:
  - que hará
  - que va a realizar
  lexicon: hacer / realizar
  rationale: Mantengo el futuro perifrástico del POB para conservar la inminencia prospectiva del original, sin imponer un tiempo más cerrado.
- source_word: at the consummation of the age
  english_pob_choice: at the consummation of the age
  chosen_spanish: en la consumación del siglo
  alternatives_spanish:
  - al consumarse la era
  - en la consumación de la era
  lexicon: consumación / siglo
  rationale: «Consumación» conserva el carácter técnico-escatológico. «Siglo» es una opción tradicional y cercana al registro del POB; «era» sería más interpretativa y menos acorde con el inglés auditado.
theological_decisions:
- issue: Escatological term for 'the age'
  english_pob_reading: consummation of the age
  chosen_spanish_reading: la consumación del siglo
  alternative_spanish_readings:
  - la consumación de la era
  - el fin del mundo
  rationale: La frase apunta a un cierre escatológico, pero el POB usa «age» y no una expresión más expansiva. «Siglo» preserva la terminología estable y la tensión entre tiempo presente e intervención final de Dios.
  doctrine_reference: escatología bíblica; consumación del tiempo presente
- issue: Fixed remembrance / memorial nuance
  english_pob_reading: one fixed remembrance
  chosen_spanish_reading: un único recuerdo fijo
  alternative_spanish_readings:
  - un memorial fijo
  - un recuerdo permanente
  rationale: Opto por una formulación directa que conserve la estabilidad y unidad del testimonio memorial sin forzar una lectura litúrgica o ceremonial que el contexto no exige.
  doctrine_reference: memoria divina y registro de actos escatológicos
translation_notes:
  revision_awareness: The English POB record is marked unchanged after review, with high-agreement cross-checks and no lexical or theological revisions applied. The Spanish draft therefore follows the audited English reading closely, while staying attentive to the Syriac-driven imagery of fixed remembrance and consummation.
  spanish_consistency_notes:
  - He mantenido un registro sobrio y bíblico, evitando arcaísmos innecesarios.
  - No he introducido «Mesías», «SEÑOR» ni otras sustituciones no presentes en este versículo.
  - He preservado la secuencia sintáctica del original para reflejar el paralelismo entre memoria fija y acciones futuras.
  - He usado «siglo» en sentido escatológico, conforme al uso bíblico tradicional y al audit trail en inglés.
