    issue: '''quedan'' debilita el matiz de ''stand'''
    rationale: La traducción inglesa auditada presenta una idea de permanencia establecida ('stand as'), no solo resultado residual. 'Permanecen' o 'están' expresa mejor ese valor.
  - severity: medium
    issue: '''un único recuerdo fijo'' suena poco natural y reduce el matiz memorial'
    rationale: En español bíblico general, 'recuerdo fijo' es extraño. 'Memoria permanente' o 'memorial permanente' reflejan mejor 'fixed remembrance' sin rigidez innecesaria.
  - severity: low
    issue: '''único'' puede sonar más enfático de lo necesario'
    rationale: '''One'' aquí puede entenderse como unidad más que exclusividad enfática. ''Una sola'' encaja mejor con la sintaxis y naturalidad del español.'
