lexical_decisions:
- source_word: ܕܝܢ / causal sense (because)
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: cause/conjunction
  rationale: El valor causal del sintagma se expresa de forma natural y precisa con «porque» en español, manteniendo la relación lógica sin añadir matices explicativos que el breve enunciado no exige.
- source_word: ܗܘ ܒܠܚܘܕ / exclusivity (he alone)
  english_pob_choice: he alone
  chosen_spanish: solo él
  alternatives_spanish:
  - él solamente
  - únicamente él
  lexicon: exclusivity
  rationale: «Solo él» reproduce la exclusividad de manera idiomática y mantiene el foco en la singularidad del sujeto sin volverse enfático o arcaizante.
- source_word: ידע / knows
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  lexicon: knowledge
  rationale: «Sabe» es la opción más natural para indicar conocimiento de hechos o acontecimientos futuros. «Conoce» podría sonar más relacional que epistémico en este contexto.
- source_word: מה דהוה / what is going to happen
  english_pob_choice: what is going to happen
  chosen_spanish: lo que va a suceder
  alternatives_spanish:
  - lo que va a pasar
  - qué va a ocurrir
  lexicon: future-event
  rationale: «Lo que va a suceder» conserva el sentido futuro y formal del original sin sobreinterpretar el tipo de acontecimiento. «Suceder» es algo más elevado que «pasar», adecuado para un texto bíblico.
theological_decisions:
- issue: Conocimiento exclusivo de Dios sobre el futuro
  english_pob_reading: because he alone knows what is going to happen.
  chosen_spanish_reading: porque solo él sabe lo que va a suceder.
  alternative_spanish_readings:
  - porque únicamente él sabe lo que va a suceder
  - porque él solo sabe lo que va a suceder
  rationale: La frase mantiene la afirmación de exclusividad epistémica sin ampliar el contenido doctrinal. No se introduce ningún sujeto implícito distinto ni se suaviza la singularidad del conocimiento atribuido.
  doctrine_reference: omniscience divina / conocimiento exclusivo del futuro
