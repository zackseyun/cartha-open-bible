review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del siríaco y del rastro de auditoría inglés: recepción de la carta, lectura pública en asambleas, atención reforzada a sus palabras, referencia literal a «los días de las semanas» y finalidad de recordar y ser corregidos. Sin embargo, «consideren con más cuidado sus palabras en los días de las semanas» puede leerse como si las palabras fueran pronunciadas en esos días, cuando el alcance adverbial del sintagma temporal se entiende mejor con una ubicación más clara en español.'
  spanish_quality_summary: 'El español es generalmente claro y digno. La principal mejora es de fluidez y ambigüedad sintáctica: conviene reubicar el complemento temporal para que modifique toda la acción de considerar, y usar «más atentamente» o «con mayor cuidado» como intensificación más natural. El resto del registro está bien.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas clave están bien resueltas: ܒܒܛܝܠܘܬܐ = «con diligencia», ܬܬܥܗܕܘܢ = «recuerden», ܬܬܪܨܘܢ = «sean corregidos». La literalidad de ܝܘܡ̈ܬܐ ܕܒ ܫܒ̈ܘܥܐ se preserva correctamente con nota.'
  issues:
  - severity: medium
    issue: Ambigüedad en la colocación de «en los días de las semanas»
    rationale: En español, la secuencia «consideren con más cuidado sus palabras en los días de las semanas» puede hacer que el complemento temporal parezca adjuntarse a «sus palabras» en vez de a la acción exhortativa. Reordenar mejora la legibilidad sin perder literalidad.
  - severity: low
    issue: «con más cuidado» es correcto pero algo menos natural que una formulación adverbial
    rationale: Para el tono exhortativo, «consideren sus palabras más atentamente» suena más idiomático y mantiene la fuerza de ܝܬܝܪܐܝܬ sin ampliar el sentido.
  revised_spanish_text: Así pues, cuando reciban la carta, léanla en sus asambleas con diligencia. Y en los días de las semanas[a], consideren sus palabras más atentamente, para que recuerden y sean corregidos.
