translation:
  language: es
  text: Así pues, cuando reciban la carta, léanla en sus asambleas con diligencia. Y en los días de las semanas[a], consideren sus palabras más atentamente, para que recuerden y sean corregidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en los días de la semana»; el siríaco recibido es literalmente «en los días de las semanas».'
    reason: alternative_reading
lexical_decisions:
- source_word: ܒܒܛܝܠܘܬܐ
  english_pob_choice: with diligence
  chosen_spanish: con diligencia
  alternatives_spanish:
  - con cuidado
  - con atención
  - con quietud
  lexicon: Payne Smith
  rationale: El término puede sugerir quietud, ocio o atención no apresurada. En un contexto de lectura pública, «con diligencia» conserva la idea de atención seria y empeño sin perder naturalidad en español.
- source_word: ܬܬܗܪܘܢ
  english_pob_choice: consider more carefully
  chosen_spanish: consideren con más cuidado
  alternatives_spanish:
  - reflexionen
  - mediten
  - tengan en cuenta
  lexicon: Payne Smith
  rationale: El verbo expresa prestar atención cuidadosa o considerar con esmero. «Consideren con más cuidado» reproduce la intensificación del texto y el tono exhortativo.
- source_word: ܝܘܡ̈ܬܐ ܕܒ ܫܒ̈ܘܥܐ
  english_pob_choice: on the days of the weeks
  chosen_spanish: en los días de las semanas
  alternatives_spanish:
  - en los días de la semana
  - en los días semanales
  - en los días de los ayunos
  lexicon: Payne Smith
  rationale: El siríaco transmitido es literal respecto de «días» y «semanas». Dado que la línea tiene cierta inestabilidad de borde, se conserva esa literalidad en español, sin introducir una lectura litúrgica más interpretativa.
- source_word: ܬܬܥܗܕܘܢ
  english_pob_choice: you may remember
  chosen_spanish: recuerden
  alternatives_spanish:
  - traigan a la memoria
  - tengan presente
  - se acuerden
  lexicon: Payne Smith
  rationale: La raíz apunta naturalmente a recordar o traer a la memoria. «Recuerden» es claro, directo y fiel al paralelismo exhortativo del versículo.
- source_word: ܬܬܪܨܘܢ
  english_pob_choice: be corrected
  chosen_spanish: sean corregidos
  alternatives_spanish:
  - sean enderezados
  - sean puestos en orden
  - sean instruidos
  lexicon: Payne Smith
  rationale: El verbo sugiere ser enderezados o corregidos. «Sean corregidos» conserva el valor moral y disciplinario del pasaje con buena idiomaticidad en español.
theological_decisions:
- issue: Si suavizar la exhortación hacia lenguaje devocional o litúrgico posterior
  english_pob_reading: A restrained communal-reading exhortation ending with remembrance and correction
  chosen_spanish_reading: Una exhortación comunitaria sobria para la lectura pública, culminando en recuerdo y corrección
  alternative_spanish_readings:
  - Una paráfrasis litúrgica centrada en días de ayuno
  - Una exhortación meditativa más general
  rationale: El pasaje es práctico y exhortativo, no doctrinal. Se evita importar formulaciones eclesiales posteriores y se conserva su tono comunitario y moral.
  doctrine_reference: Exhortación comunitaria; disciplina moral; práctica de lectura pública
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: mantuve el incremento de intensidad en ܝܬܝܪܐܝܬ con «con más cuidado», y preferí «con diligencia» y «sean corregidos» para reflejar con más precisión el registro exhortativo y moral del siríaco, en lugar de suavizarlo hacia un lenguaje devocional general.'
  spanish_consistency_notes:
  - Se mantiene «asambleas» para ܟܢܘܫܬܟܘܢ en un sentido congregacional neutral, no como término técnico de una tradición particular.
  - Se conserva un registro moderno, digno y transparente, sin reemplazar la literalidad textual por una paráfrasis amplia.
  - La nota a pie de página preserva la ambigüedad de la expresión temporal, dada la inestabilidad textual señalada en el aparato inglés.
