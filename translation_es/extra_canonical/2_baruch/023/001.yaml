translation:
  language: es
  text: 'Y yo respondí y dije: «No, Señor, mi Señor». Y él respondió y me dijo: «¿Por qué te turbas por lo que no sabes, y por qué te perturbas acerca de lo que ignoras? Porque, así como no has olvidado a los que ahora existen y a los que han pasado, así recuerdo yo a los que han de venir. Pues cuando Adán pecó y se decretó la muerte para los que nacerían, entonces fue fijado el número de los que nacerían, y para ese número fue preparado un lugar, donde los vivos habitarían y los muertos serían guardados. Por tanto, a menos que se complete ese número que fue determinado de antemano, la criatura no volverá a vivir. Porque mi Espíritu[a] es el dador de vida, y el Seol recibe a los muertos. Además, se te ha concedido oír lo que vendrá después de estos tiempos. Porque mi salvación se ha acercado verdaderamente y no está tan lejos como antes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva «Espíritu» con mayúscula para reflejar la referencia divina y vivificante del hablante.
    reason: theological_note
lexical_decisions:
- source_word: ܡܥܝܪ
  english_pob_choice: troubled
  chosen_spanish: turbas
  alternatives_spanish:
  - te inquietas
  - te angustias
  - te alteras
  lexicon: Payne Smith
  rationale: El campo semántico apunta a agitación interior. «Turbas» conserva el matiz de desasosiego sin intensificarlo indebidamente; «perturbas» queda como refuerzo paralelo para el segundo miembro, respetando la doble formulación del original y del POB inglés.
- source_word: ܡܥܝܪ
  english_pob_choice: disturbed
  chosen_spanish: perturbas
  alternatives_spanish:
  - te turbas
  - te inquietas
  - te alborotas
  lexicon: Payne Smith
  rationale: Se mantiene el paralelismo retórico con un segundo verbo distinto en español. «Perturbar» comunica alteración mental/emocional y reproduce bien la repetición escalonada del reproche.
- source_word: ܡܢܝܢܐ
  english_pob_choice: number
  chosen_spanish: número
  alternatives_spanish:
  - conteo
  - cantidad
  - total
  lexicon: Sokoloff
  rationale: «Número» conserva la idea de un total fijado previamente y es el equivalente más natural en español para el uso apocalíptico de una cifra determinada.
- source_word: ܫܝܘܠ
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - Sheol
  - el sepulcro
  - el reino de los muertos
  lexicon: Payne Smith
  rationale: Se translitera como nombre propio bíblico para no aplanar el trasfondo judío-apocalíptico. «Seol» es la forma castellana más transparente para lectores bíblicos y conserva la distinción conceptual.
- source_word: ܪܘܚܝ
  english_pob_choice: my Spirit
  chosen_spanish: mi Espíritu
  alternatives_spanish:
  - mi espíritu
  - mi aliento
  lexicon: Payne Smith
  rationale: La mayúscula sigue la lectura divina del POB inglés y, en español, mantiene la referencia personal a la acción vivificante de Dios. Se evita «aliento» porque debilita la agencia personal que el contexto atribuye al hablante.
- source_word: ܦܘܪܩܢܐ
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  - redención
  lexicon: Payne Smith
  rationale: «Salvación» recoge el sentido amplio de rescate divino y coincide con el POB inglés. En este contexto apocalíptico no se reduce a un simple alivio temporal.
theological_decisions:
- issue: Relación entre Adán, el decreto de muerte y la humanidad futura
  english_pob_reading: death was decreed for those who would be born
  chosen_spanish_reading: se decretó la muerte para los que nacerían
  alternative_spanish_readings:
  - la muerte fue fijada para la descendencia de Adán
  - se determinó la mortalidad para la humanidad
  rationale: La redacción conserva el alcance corporativo y prospectivo del texto sin introducir formulaciones doctrinales posteriores. «Los que nacerían» sigue de cerca el sentido apocalíptico del pasaje y evita restringir el alcance a una sola categoría teológica.
  doctrine_reference: DOCTRINE.md §§ Theological stance; Translation philosophy §3
- issue: Agencia vivificante del Espíritu frente al ámbito de los muertos
  english_pob_reading: For my Spirit is the giver of life, and Sheol receives the dead.
  chosen_spanish_reading: Porque mi Espíritu es el dador de vida, y el Seol recibe a los muertos.
  alternative_spanish_readings:
  - Porque mi Espíritu da vida, y el Seol recibe a los muertos.
  - Porque mi Espíritu vivifica, y el Seol guarda a los muertos.
  rationale: Se mantiene el contraste vida/muerte sin sobreprecisar la forma exacta del verbo. «Dador de vida» reproduce la función del Espíritu como agente vivificante y preserva la lectura teológica del POB inglés.
  doctrine_reference: DOCTRINE.md §§ Theological stance; Translation philosophy §1
- issue: Forma de nombrar la muerte/de los muertos y su lugar
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - el Seol
  - Sheol
  - el reino de los muertos
  rationale: La transliteración evita sustituir un término técnico del mundo judío por una expresión más genérica. En español, «Seol» funciona como término bíblico estable y conserva la tensión conceptual del original.
  doctrine_reference: DOCTRINE.md §§ Translation principles; lexical consistency
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés y la fuente siriaca directa. El texto español sigue la lectura de POB sin depender mecánicamente del inglés: se conservaron los paralelismos retóricos, el nombre técnico «Seol», y la diferencia entre agitación interior, total fijado y agencia vivificante del Espíritu. No se incorporaron notas textuales porque el paquete fuente no ofrece variantes decisivas para este versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se mantiene «Seol» como transliteración estable para el עולם/Sheol apocalíptico.
  - «Espíritu» va con mayúscula por la referencia divina, coherente con el POB inglés.
  - El pareado «turbas/perturbas» conserva la duplicación retórica del original sin recurrir a un único verbo repetido.
