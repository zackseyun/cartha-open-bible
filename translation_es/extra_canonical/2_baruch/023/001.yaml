    text: Se conserva «Espíritu» con mayúscula para reflejar la referencia divina y vivificante del hablante.
    reason: theological_note
  revision_rationale: Se corrige la lógica condicional del pasaje para reflejar con precisión el 'unless' del POB inglés y del sentido siríaco auditado. También se mejora la naturalidad de 'fue contado el número' a 'fue fijado el número', en línea con la idea de un total previamente determinado. Se eliminan notas léxicas no esenciales y se conserva solo la nota teológica útil sobre «Espíritu».
