  yaml_path: translation/extra_canonical/2_baruch/006/002.yaml
  text: And behold, suddenly a spirit of strength lifted me up and carried me above the wall of Jerusalem; and I saw four angels standing at the four corners of the city, each one holding a flaming torch in his hands.
  footnotes:
  - marker: a
    text: Or 'each one holding a torch'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5
    timestamp: '2026-05-03T05:07:38Z'
    unchanged: false
    changes_summary: 'Removed “aloft” from “carried me aloft above” to avoid redundancy and improve natural English while preserving the meaning. Retained the Syriac-specific details: “flaming torch” (d-nūrā) and “in his hands” (b-’īdawhy).'
translation:
  language: es
  text: Y he aquí que, de repente, un espíritu de fuerza me levantó y me llevó por encima del muro de Jerusalén; y vi cuatro ángeles de pie en las cuatro esquinas de la ciudad, cada uno con una antorcha de fuego en sus manos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: spirit of strength
  english_pob_choice: a spirit of strength
  chosen_spanish: un espíritu de fuerza
  alternatives_spanish:
  - un espíritu poderoso
  - un espíritu de vigor
  lexicon: ruḥā d-gabrutā / strength-spirit
  rationale: Conservo el sustantivo 'espíritu' porque el texto fuente presenta una entidad/impulso espiritual, no solo una cualidad abstracta. 'De fuerza' reproduce la idea de fuerza/poder sin volverlo una paráfrasis excesiva.
- source_word: lifted me up
  english_pob_choice: lifted me up
  chosen_spanish: me levantó
  alternatives_spanish:
  - me alzó
  - me elevó
  lexicon: verb of raising/lifting
  rationale: '''Me levantó'' es natural en español y conserva la acción de ser alzado sin añadir matices no atestiguados.'
- source_word: carried me above the wall of Jerusalem
  english_pob_choice: carried me above the wall of Jerusalem
  chosen_spanish: me llevó por encima del muro de Jerusalén
  alternatives_spanish:
  - me transportó sobre el muro de Jerusalén
  - me condujo por encima de la muralla de Jerusalén
  lexicon: movement above a wall
  rationale: '''Por encima del muro'' conserva la relación espacial del original. ''Muro'' mantiene la imagen textual; ''muralla'' sería posible, pero ''muro'' es más cercano y directo.'
- source_word: four corners of the city
  english_pob_choice: the four corners of the city
  chosen_spanish: las cuatro esquinas de la ciudad
  alternatives_spanish:
  - los cuatro extremos de la ciudad
  - los cuatro rincones de la ciudad
  lexicon: city corners
  rationale: '''Esquinas'' reproduce la metáfora geométrica con claridad. ''Extremos'' sería más interpretativo; ''rincones'' suena menos preciso.'
- source_word: each one holding a flaming torch in his hands
  english_pob_choice: each one holding a flaming torch in his hands
  chosen_spanish: cada uno con una antorcha de fuego en sus manos
  alternatives_spanish:
  - cada uno sosteniendo una antorcha encendida en sus manos
  - cada uno con una antorcha llameante en sus manos
  lexicon: torch of fire / in his hands
  rationale: '''Antorcha de fuego'' refleja de forma transparente el detalle añadido en la revisión auditada del inglés POB. ''En sus manos'' preserva el rasgo explícito del fuente; no se omite ni se diluye en un simple ''sosteniendo''.'
theological_decisions:
- issue: Nature of the 'spirit of strength'
  english_pob_reading: a spirit of strength lifted me up
  chosen_spanish_reading: un espíritu de fuerza me levantó
  alternative_spanish_readings:
  - un espíritu poderoso me levantó
  - un espíritu de vigor me levantó
  rationale: Mantengo la formulación abierta sin identificar el espíritu como el Espíritu Santo, porque el texto no lo especifica. El español conserva la ambigüedad original entre entidad espiritual y cualidad poderosa.
  doctrine_reference: 2 Baruch 6:2; no se impone una identificación pneumatológica no explicitada por el texto
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB, que retiró ''aloft'' como redundante y conservó los detalles específicos del siríaco: ''flaming torch'' y ''in his hands''. En español se reflejan esos dos rasgos sin suavizarlos ni omitirlos.'
  spanish_consistency_notes:
  - Se usa 'espíritu' en minúscula para la entidad/impulso descrito, no como título divino.
  - Se conserva 'Jerusalén' con ortografía española estándar.
  - No se introduce 'Cristo', 'SEÑOR' ni vocabulario eclesiástico ajeno al texto.
  - La puntuación reproduce una sola oración narrativa con dos cláusulas unidas por punto y coma, adecuada al estilo bíblico en español.
