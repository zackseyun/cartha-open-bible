  text: And it happened on the next day that, behold, the forces of the Chaldeans surrounded the city. And at evening time I, Baruch, left the people, and I went out and stood by the oak, and I was grieving over Zion and lamenting over the captivity that had come upon the people. And I was filled with a spirit of strength, and I was lifted up on high above the square of Jerusalem. And I saw, behold, four angels standing at the four corners of the city, each of them holding a torch.
