translation:
  language: es
  text: Y aconteció al día siguiente[a] que las fuerzas de los caldeos rodearon la ciudad. Y al atardecer yo, Baruc, me aparté del pueblo, y salí y me detuve junto al encinar, y estaba afligido por Sión y lamentaba el cautiverio que había venido sobre el pueblo. Y fui lleno de un espíritu de fortaleza, y fui elevado a lo alto sobre la plaza de Jerusalén. Y vi entonces a cuatro ángeles, parados en las cuatro esquinas de la ciudad, cada uno de ellos sosteniendo una antorcha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Y aconteció al día siguiente que las fuerzas de los caldeos rodearon la ciudad. Y al atardecer yo, Baruc, me aparté del pueblo, y salí y me detuve junto al encinar, y estaba afligido por Sión y lamentaba el cautiverio que había venido sobre el pueblo.»'
    reason: Preserva la nota de alternativa previa documentada en la auditoría inglesa POB.
lexical_decisions:
- source_word: ܡܢܐ ܕܡܚܪ
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - al otro día
  - el día después
  lexicon: Smith Syriac Dictionary
  rationale: Expresa con naturalidad el marcador temporal narrativo sin perder la secuencia inmediata del relato.
- source_word: ܚܝ̈ܠܐ ܕܒ̈ܥܝܕܐ
  english_pob_choice: the forces of the Chaldeans
  chosen_spanish: las fuerzas de los caldeos
  alternatives_spanish:
  - el ejército de los caldeos
  - el hueste de los caldeos
  lexicon: Payne Smith
  rationale: Conserva el valor militar amplio de 'forces' y sigue la lectura controlada que entiende a los caldeos como el sujeto militar del asedio.
- source_word: ܘܐܬܬܙܝܥܝ ... ܒܟܝܐ
  english_pob_choice: I was grieving ... and lamenting
  chosen_spanish: estaba afligido ... y lamentaba
  alternatives_spanish:
  - estaba dolido ... y lloraba
  - me angustiaba ... y gemía
  lexicon: Smith Syriac Dictionary
  rationale: '''Afligido'' comunica el estado interior, y ''lamentaba'' preserva el tono de duelo expresado por la pareja verbal.'
- source_word: ܪܘܚܐ ܕܚܝ̈ܠܐ
  english_pob_choice: a spirit of strength
  chosen_spanish: un espíritu de fortaleza
  alternatives_spanish:
  - un espíritu de poder
  - un espíritu de fuerza
  lexicon: Payne Smith
  rationale: '''Fortaleza'' suena natural en español y mantiene el sentido de capacitar/animar sin introducir una formulación doctrinal no requerida por el pasaje.'
- source_word: ܫܘܩܐ ܕܐܘܪܫܠܡ
  english_pob_choice: the square of Jerusalem
  chosen_spanish: la plaza de Jerusalén
  alternatives_spanish:
  - el mercado de Jerusalén
  - la calle de Jerusalén
  lexicon: Smith Syriac Dictionary
  rationale: '''Plaza'' conserva el espacio urbano abierto que permite la visión elevada y evita estrechar el término a ''mercado'' o ''calle''.'
- source_word: ܠܡܦܝܕܐ
  english_pob_choice: a torch
  chosen_spanish: una antorcha
  alternatives_spanish:
  - una lámpara
  lexicon: Payne Smith
  rationale: '''Antorcha'' reproduce mejor la imagen apocalíptica y el implemento de fuego que ''lámpara'' en este contexto.'
theological_decisions:
- issue: Alusión al cautiverio como resultado del asedio
  english_pob_reading: the captivity that had come upon the people
  chosen_spanish_reading: el cautiverio que había venido sobre el pueblo
  alternative_spanish_readings:
  - la cautividad que había venido sobre el pueblo
  - el destierro que había venido sobre el pueblo
  rationale: '''Cautiverio'' mantiene la amplitud del término sin desplazarlo hacia una sola forma de exilio, y conserva la imagen de opresión histórica del texto.'
  doctrine_reference: N/A (histórico-narrativo)
- issue: El 'espíritu de fortaleza' como empoderamiento visionario
  english_pob_reading: I was filled with a spirit of strength
  chosen_spanish_reading: fui llenado de un espíritu de fortaleza
  alternative_spanish_readings:
  - fui lleno de un espíritu de fortaleza
  - me fue dado un espíritu de fortaleza
  rationale: La pasiva refleja que el protagonista recibe una fuerza que lo capacita para la visión; evita convertirla en una experiencia técnica posterior o en una fórmula pneumatológica cerrada.
  doctrine_reference: N/A (visión narrativa/apocalíptica)
translation_notes:
  revision_awareness: La versión inglesa auditada omitía por error la segunda mitad del testimonio siríaco; la presente redacción española incorpora también la elevación de Baruc y la visión de los cuatro ángeles con antorchas, siguiendo la revisión documentada.
  spanish_consistency_notes:
  - Se mantiene 'Baruc' para el nombre propio del narrador.
  - Se usa 'caldeos' para el grupo militar asediante conforme al contexto histórico del pasaje.
  - '''Sión'' se conserva como topónimo teológico-histórico estándar.'
  - Se evita 'SEÑOR' porque este versículo no introduce aquí el nombre divino directo.
  - Se conserva el registro narrativo apocalíptico sin añadir explicaciones no presentes en el fuente.
