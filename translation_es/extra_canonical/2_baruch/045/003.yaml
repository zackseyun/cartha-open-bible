    issue: «se desvanece en nada» sobretraduce «comes to nothing»
    rationale: La locución española introduce la imagen de desvanecerse, mientras que el inglés auditado apunta más directamente a terminar en nulidad o quedar en nada. «queda en nada» o «llega a nada» preserva mejor el valor semántico.
  - severity: medium
    issue: «ni después de esto se lo busca en memoria» es poco idiomático
    rationale: En español general, «buscarlo en memoria» suena forzado y el pronombre «lo» resulta innecesario. «Ni después de esto se busca en el recuerdo» conserva la idea de ser buscado en la remembranza y suena natural.
  revised_spanish_text: Porque todo lo corruptible pasa y queda en nada, y el tiempo que fue ya está olvidado; ni después de esto se busca en el recuerdo.
  revision_rationale: 'Se hicieron dos ajustes menores para alinear mejor el español con el sentido del POB auditado y mejorar la naturalidad: «queda en nada» en lugar de «se desvanece en nada», y «se busca en el recuerdo» en lugar de «se lo busca en memoria». El resto del versículo puede mantenerse.'
