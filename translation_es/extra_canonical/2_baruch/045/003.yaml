translation:
  language: es
  text: Porque todo lo corruptible pasa y queda en nada, y el tiempo que fue ya está olvidado; ni después de esto se busca en el recuerdo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: corruptible
  english_pob_choice: corruptible
  chosen_spanish: corruptible
  alternatives_spanish:
  - perecedero
  - caducable
  - lo que se corrompe
  lexicon: semantic field of decay and impermanence
  rationale: El inglés POB conserva la idea de aquello que está sujeto a corrupción o decadencia. En español, «corruptible» mantiene esa fuerza formal y amplia mejor que «perecedero», que enfatiza más la duración que la descomposición.
- source_word: passes away
  english_pob_choice: passes away
  chosen_spanish: pasa
  alternatives_spanish:
  - desaparece
  - se va
  - se extingue
  lexicon: semantic field of passing/vanishing
  rationale: «Pasa» reproduce la noción simple de tránsito o desaparición sin añadir una interpretación más fuerte. El complemento «y se desvanece en nada» retiene la intensificación del resultado final.
- source_word: comes to nothing
  english_pob_choice: comes to nothing
  chosen_spanish: se desvanece en nada
  alternatives_spanish:
  - llega a nada
  - queda en nada
  - se reduce a nada
  lexicon: semantic field of nullification
  rationale: La expresión española «se desvanece en nada» comunica con naturalidad la nulidad final sin sonar mecánica. Mantiene la pérdida total implícita en el inglés POB.
- source_word: the time that has been
  english_pob_choice: the time that has been
  chosen_spanish: el tiempo que fue
  alternatives_spanish:
  - el tiempo que ha sido
  - el tiempo pasado
  - el tiempo que existió
  lexicon: temporal reference
  rationale: «El tiempo que fue» conserva la referencia al tiempo ya transcurrido y ya no presente. Es breve, digno y coherente con el tono sentencioso del texto.
- source_word: is now forgotten
  english_pob_choice: is now forgotten
  chosen_spanish: ya está olvidado
  alternatives_spanish:
  - ahora está olvidado
  - se ha olvidado
  - ya no se recuerda
  lexicon: semantic field of memory/forgetting
  rationale: La pasiva «está olvidado» refleja bien el estado resultante del olvido. «Ya» expresa el matiz del inglés «now» en sentido de estado actual.
- source_word: is it sought in remembrance
  english_pob_choice: it is sought in remembrance
  chosen_spanish: se lo busca en memoria
  alternatives_spanish:
  - se lo busca al recordarlo
  - se lo busca en el recuerdo
  - se lo busca para recordarlo
  lexicon: memory/remembrance phrase
  rationale: La construcción refleja la búsqueda posterior en la esfera del recuerdo. «En memoria» es más sobrio y conciso que opciones más explicativas, y conserva la relación con la memoria como ámbito mental.
theological_decisions:
- issue: La caducidad de todo lo creado frente a la permanencia divina
  english_pob_reading: For everything corruptible passes away and comes to nothing
  chosen_spanish_reading: Porque todo lo corruptible pasa y se desvanece en nada
  alternative_spanish_readings:
  - Porque todo lo perecedero pasa y queda en nada
  - Porque todo lo corruptible pasa y llega a nada
  rationale: El enunciado presenta una afirmación general sobre la finitud de lo corruptible. La traducción mantiene esa universalidad sin introducir una doctrina extra, preservando el contraste implícito entre lo temporal y lo perdurable.
  doctrine_reference: 2 Baruch 45:3; cf. theme of transience in wisdom literature
- issue: El olvido del tiempo pasado y su falta de recuperación en la memoria
  english_pob_reading: the time that has been is now forgotten; nor after this is it sought in remembrance
  chosen_spanish_reading: y el tiempo que fue ya está olvidado; ni después de esto se lo busca en memoria
  alternative_spanish_readings:
  - y el tiempo que ha sido ahora está olvidado; ni después de esto se busca en el recuerdo
  - y el tiempo pasado ya se ha olvidado; ni después de esto se procura recordarlo
  rationale: La frase mantiene la afirmación de que el tiempo pasado cae fuera del recuerdo efectivo. No se suaviza la fuerza del olvido ni se transforma en una mera dificultad de evocación.
  doctrine_reference: 2 Baruch 45:3
