  source_alignment_summary: 'El borrador sigue bien el sentido general del inglés auditado: una exhortación inferencial (''Therefore''), dirigida a quienes desean ''verlo'', con dos mandatos coordinados: guardarse del tiempo ya mencionado y pasar más allá de la carga del tiempo problemático. Sin embargo, ''tiempo de angustia'' reduce ligeramente el matiz de ''troubled time'', que en contexto apocalíptico y por paralelismo con ''burden'' se expresa mejor como ''tiempo de tribulación'' o ''tiempo turbulento''.'
