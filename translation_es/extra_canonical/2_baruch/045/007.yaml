  glossary_alignment: No hay términos del glosario mayor en juego (Yahvé, Mesías, etc.). La elección 'verlo' es adecuada. 'Se guarden de' preserva bien 'beware of'. 'La carga' mantiene correctamente la imagen. La revisión propuesta solo afina legibilidad y el valor contextual de 'troubled time'.
