lexical_decisions:
- source_word: “what exists now”
  english_pob_choice: what exists now
  chosen_spanish: lo que existe ahora
  alternatives_spanish:
  - lo que hay ahora
  - lo que existe en este momento
  lexicon: existir
  rationale: Conserva la referencia general a la realidad presente sin añadir matices que el texto no exige. «Lo que existe ahora» mantiene la abstracción del original y su contraste con el futuro.
- source_word: “is nothing”
  english_pob_choice: is nothing
  chosen_spanish: no es nada
  alternatives_spanish:
  - no vale nada
  - no cuenta para nada
  lexicon: ser
  rationale: La construcción española reproduce de manera directa la negación absoluta del estado presente. «No es nada» es la forma más sobria y fiel al contraste con lo venidero.
- source_word: “what is to come”
  english_pob_choice: what is to come
  chosen_spanish: lo que ha de venir
  alternatives_spanish:
  - lo que vendrá
  - lo que está por venir
  lexicon: venir
  rationale: «Ha de venir» conserva el sentido futuro y esperado del participio sustantivado, con un tono digno y natural en español.
- source_word: “will be exceedingly great”
  english_pob_choice: will be exceedingly great
  chosen_spanish: será sumamente grande
  alternatives_spanish:
  - será extraordinariamente grande
  - será muy grande
  lexicon: grande
  rationale: «Sumamente» transmite la intensidad de «exceedingly» sin exagerar ni cambiar el sentido. «Grande» mantiene la evaluación positiva general sin introducir contenido adicional.
theological_decisions:
- issue: Contraste escatológico entre el presente y lo venidero
  english_pob_reading: For what exists now is nothing; but what is to come will be exceedingly great.
  chosen_spanish_reading: Porque lo que existe ahora no es nada; pero lo que ha de venir será sumamente grande.
  alternative_spanish_readings:
  - Porque lo presente no es nada; pero lo futuro será muy grande.
  - Porque lo que hay ahora no vale nada; pero lo que vendrá será extraordinariamente grande.
  rationale: El texto contrapone una realidad presente despreciable o insuficiente con una realidad futura de grandeza excepcional. La redacción española preserva esa tensión sin suavizarla ni moralizarla.
  doctrine_reference: Esperanza escatológica / contraste entre el orden presente y el venidero
