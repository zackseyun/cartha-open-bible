translation:
  language: es
  text: Porque cuando llega el tiempo que no pasa y llega su tiempo señalado, pone en orden sus obras y examina sus pecados. Los que le pertenecen no añaden angustia a la destrucción.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: time that does not pass away
  english_pob_choice: the time that does not pass away
  chosen_spanish: el tiempo que no pasa
  alternatives_spanish:
  - el tiempo imperecedero
  - el tiempo que no se desvanece
  lexicon: tiempo / pasar
  rationale: Mantiene la idea de duración no perecedera con español natural. "No pasa" conserva la fuerza verbal del original sin introducir una abstracción más lejana como "imperecedero".
- source_word: season
  english_pob_choice: its season
  chosen_spanish: su temporada
  alternatives_spanish:
  - su estación
  - su tiempo
  lexicon: temporada / estación
  rationale: '"Temporada" comunica el sentido de período señalado de forma clara en español actual. Se evita "estación" por posible ambigüedad litúrgica o climática, y "tiempo" porque repetiría demasiado el verso anterior.'
- source_word: sets its deeds in order
  english_pob_choice: it sets its deeds in order
  chosen_spanish: pone en orden sus obras
  alternatives_spanish:
  - ordena sus obras
  - dispone sus obras
  lexicon: poner en orden / obras
  rationale: '"Pone en orden" reproduce la imagen de ordenar o arreglar lo que le pertenece sin forzar un matiz técnico. "Obras" conserva el valor de actos/hechos del sujeto.'
- source_word: examines its sins
  english_pob_choice: examines its sins
  chosen_spanish: examina sus pecados
  alternatives_spanish:
  - investiga sus pecados
  - juzga sus pecados
  lexicon: examinar / pecados
  rationale: '"Examina" preserva el sentido de revisión o escrutinio. "Pecados" es la equivalencia directa y más estable para el término moral del original.'
- source_word: Those who belong to it
  english_pob_choice: Those who belong to it
  chosen_spanish: Los que le pertenecen
  alternatives_spanish:
  - Los que son suyos
  - Sus pertenecientes
  lexicon: pertenecer
  rationale: Mantiene la relación de pertenencia personal/posesiva del original con una construcción idiomática en español. "Le" retiene el referente neutro del antecedente.
- source_word: do not add anguish to destruction
  english_pob_choice: do not add anguish to destruction
  chosen_spanish: no añaden angustia a la destrucción
  alternatives_spanish:
  - no añaden aflicción a la ruina
  - no aumentan la angustia de la destrucción
  lexicon: angustia / destrucción
  rationale: '"Angustia" sigue de cerca el afecto negativo del inglés POB y su fuerza intensificadora. "Destrucción" conserva el final catastrófico sin suavizarlo en "ruina".'
theological_decisions:
- issue: Temporal ordenamiento y juicio de la comunidad/entidad descrita
  english_pob_reading: when the time that does not pass away comes and its season arrives, it sets its deeds in order and examines its sins
  chosen_spanish_reading: cuando llega el tiempo que no pasa y arriba su temporada, pone en orden sus obras y examina sus pecados
  alternative_spanish_readings:
  - cuando viene el tiempo imperecedero y llega su estación
  - cuando sobreviene el tiempo eterno
  rationale: Se conserva la secuencia de llegada del tiempo señalado y la respuesta moral de ordenar y examinar. El español no atenúa el aspecto de rendición de cuentas implícito en el original.
  doctrine_reference: escatología y juicio moral
- issue: Relación entre pertenencia y ausencia de angustia en la destrucción
  english_pob_reading: Those who belong to it do not add anguish to destruction
  chosen_spanish_reading: Los que le pertenecen no añaden angustia a la destrucción
  alternative_spanish_readings:
  - Sus miembros no aumentan la aflicción de la ruina
  - Los suyos no agregan dolor a la destrucción
  rationale: Se mantiene la idea de un grupo definido por pertenencia y una consecuencia negativa que no incrementan. No se suaviza "destruction" ni se transforma en una lectura moralizante más explícita de lo que el verso dice.
  doctrine_reference: responsabilidad colectiva y destino escatológico
translation_notes:
  revision_awareness: La revisión más reciente reporta alto acuerdo y ningún cambio necesario; por ello, la redacción española sigue de cerca el sentido de la POB inglesa y el control siríaco sin introducir expansiones.
  spanish_consistency_notes:
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - '"Yahvé" no aparece en este versículo; no se requiere decisión sobre el nombre divino.'
  - Se mantiene la tensión semántica entre tiempo señalado, orden moral y desenlace destructivo sin explicaciones añadidas.
