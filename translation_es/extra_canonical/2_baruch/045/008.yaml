translation:
  language: es
  text: Pero los que se volvieron hacia la oscuridad, y recibieron mentiras, y perdieron la firmeza de la esperanza, y buscaron vanidades, y no mostraron misericordia, ni se mantuvieron en el camino de la disciplina—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: darkness / ܚܫܘܟܐ
  english_pob_choice: turned themselves toward darkness
  chosen_spanish: se volvieron hacia la oscuridad
  alternatives_spanish:
  - se volvieron hacia las tinieblas
  - se inclinaron hacia la oscuridad
  lexicon: darkness
  rationale: La revisión del POB corrigió el sentido desde 'anguish' a 'darkness'; en español, 'oscuridad' comunica bien el contraste moral con la luz sin introducir un registro demasiado arcaico.
- source_word: lies
  english_pob_choice: received lies
  chosen_spanish: recibieron mentiras
  alternatives_spanish:
  - aceptaron mentiras
  - recibieron falsedad
  lexicon: lies
  rationale: '''Recibieron mentiras'' sigue de cerca la imagen del texto y conserva la pasividad moral de acoger lo falso.'
- source_word: settledness of hope
  english_pob_choice: lost the settledness of hope
  chosen_spanish: perdieron la firmeza de la esperanza
  alternatives_spanish:
  - perdieron la estabilidad de la esperanza
  - perdieron la seguridad de la esperanza
  lexicon: settledness
  rationale: La expresión apunta a estabilidad, firmeza o constancia interior; 'firmeza de la esperanza' reproduce ese valor sin sonar artificial en español.
- source_word: vanities
  english_pob_choice: sought out vanities
  chosen_spanish: buscaron vanidades
  alternatives_spanish:
  - buscaron cosas vanas
  - se dedicaron a vanidades
  lexicon: vanities
  rationale: La forma activa de la revisión inglesa permite traducir con un verbo directo. 'Vanidades' mantiene la fuerza moral del término y su resonancia bíblica.
- source_word: mercy
  english_pob_choice: did not show mercy
  chosen_spanish: no mostraron misericordia
  alternatives_spanish:
  - no tuvieron misericordia
  - no ejercieron misericordia
  lexicon: mercy
  rationale: La revisión descartó 'spare mercy' y favoreció la idea de no actuar misericordiosamente; 'mostrar misericordia' es natural y fiel.
- source_word: path of discipline
  english_pob_choice: keep the path of discipline
  chosen_spanish: guardaron el camino de la disciplina
  alternatives_spanish:
  - guardaron la senda de la disciplina
  - mantuvieron el camino de la disciplina
  lexicon: discipline
  rationale: '''Camino de la disciplina'' conserva la imagen moral de una senda recta y el sentido formativo del término sin sustituirlo por una paráfrasis.'
theological_decisions:
- issue: Contraste moral luz/oscuridad
  english_pob_reading: turned themselves toward darkness
  chosen_spanish_reading: se volvieron hacia la oscuridad
  alternative_spanish_readings:
  - se volvieron hacia las tinieblas
  - se inclinaron hacia la oscuridad
  rationale: La revisión textual corrigió el término subyacente a 'darkness'. En español, 'oscuridad' mantiene el contraste ético-teológico con la luz de manera clara y sobria.
  doctrine_reference: Motivo bíblico de luz y oscuridad; no implica una doctrina técnica específica, sino una oposición moral recurrente.
- issue: Misericordia como acción ética
  english_pob_reading: did not show mercy
  chosen_spanish_reading: no mostraron misericordia
  alternative_spanish_readings:
  - no tuvieron misericordia
  - no ejercieron misericordia
  rationale: La observación editorial indica que el inglés anterior era torpe; la lectura correcta enfatiza la falta de actos de misericordia, no una mera omisión verbal.
  doctrine_reference: Ética de la misericordia en la tradición bíblica y sapiencial.
translation_notes:
  revision_awareness: 'Se siguió la última revisión establecida: se corrigió ''anguish'' por ''darkness'' y se adoptaron las enmiendas ''sought out vanities'' y ''did not show mercy''. No se introdujeron notas al pie porque la traducción española puede reflejar directamente esas decisiones sin ambigüedad residual que requiera anclaje textual.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y publicado, evitando calcos ingleses innecesarios.
  - Se tradujo 'hope' como 'esperanza' y 'discipline' como 'disciplina' para conservar el paralelismo conceptual del versículo.
  - No se usó 'SEÑOR' ni terminología cristológica, porque este versículo no lo requiere.
