  rationale: Se hace una reparación mínima para mejorar la naturalidad del último miembro en español, preservando la imagen de perseverar en una senda de disciplina y el sentido de 'keep the path'. No se añaden notas porque no hay una ambigüedad nueva en español ni una nota inglesa que deba trasladarse.
