translation:
  language: es
  text: Porque lo que ha pasado[a] a la corrupción, y lo que se corrompe cae y se olvida. Pero lo que ha de venir es lo que se busca; lo que ha salido de la mano ya no se cuenta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pasa».'
    reason: alternative_rendering_preserved_from_english_audit
lexical_decisions:
- source_word: passed away into corruption
  english_pob_choice: has passed away into corruption
  chosen_spanish: ha pasado a corrupción
  alternatives_spanish:
  - ha pasado a la corrupción
  - ha perecido en corrupción
  lexicon: עבר / φθείρεσθαι (sentido de pasar, llegar a un estado de corrupción)
  rationale: Conserva la idea de transición fuera del estado actual sin endurecerla en una formulación más interpretativa. "A corrupción" expresa el destino/resultante del paso, y mantiene una frase breve y natural en español.
- source_word: corrupted
  english_pob_choice: is corrupted
  chosen_spanish: se corrompe
  alternatives_spanish:
  - está corrompido
  - está en corrupción
  lexicon: corromperse / corruptus
  rationale: El presente general de español comunica bien el estado/resultado continuo del deterioro. "Se corrompe" conserva la fuerza verbal y el paralelo con lo que pasa a corrupción.
- source_word: falls
  english_pob_choice: falls
  chosen_spanish: cae
  alternatives_spanish:
  - se derrumba
  - se desploma
  lexicon: caer
  rationale: '"Cae" sigue de cerca la imagen original sin añadir matices físicos excesivos. En español funciona como consecuencia natural del deterioro.'
- source_word: is forgotten
  english_pob_choice: is forgotten
  chosen_spanish: se olvida
  alternatives_spanish:
  - queda olvidado
  - es olvidado
  lexicon: olvidar / forgotten
  rationale: La pasiva refleja es idiomática en español y mantiene la idea de desaparición de la memoria sin alargar la línea.
- source_word: what is to come
  english_pob_choice: what is to come
  chosen_spanish: lo que ha de venir
  alternatives_spanish:
  - lo por venir
  - lo venidero
  lexicon: venir
  rationale: '"Ha de venir" conserva el matiz de futurición y expectativa del texto, con un tono bíblico sobrio y claro.'
- source_word: what is sought
  english_pob_choice: what is sought
  chosen_spanish: es lo que se busca
  alternatives_spanish:
  - eso es lo buscado
  - eso es lo que se procura
  lexicon: buscar / ζητέω
  rationale: Mantiene el paralelismo y la idea de deseo/indagación. "Se busca" es transparente y natural en español.
- source_word: has passed from the hand
  english_pob_choice: has passed from the hand
  chosen_spanish: ha pasado de la mano
  alternatives_spanish:
  - ha salido de la mano
  - ha pasado de sus manos
  lexicon: mano
  rationale: Conserva la imagen idiomática de posesión/control. "De la mano" sigue de cerca el original sin forzar una explicación perifrástica.
- source_word: is no longer reckoned
  english_pob_choice: is no longer reckoned
  chosen_spanish: ya no se cuenta
  alternatives_spanish:
  - ya no se considera
  - ya no se computa
  lexicon: contar / reckoned
  rationale: '"Contar" en sentido de contabilizar/considerar refleja bien la exclusión del cómputo o valoración. Es conciso y comprensible, y evita introducir una carga técnica no explicitada.'
theological_decisions:
- issue: Contraste entre lo perecedero y lo buscado/valorado
  english_pob_reading: What has passed into corruption is lost; what is to come is what is sought; what has passed from the hand is no longer reckoned.
  chosen_spanish_reading: Lo corruptible queda excluido por su deterioro; lo venidero es lo deseado y buscado; lo que ya no está en la mano pierde su cuenta o consideración.
  alternative_spanish_readings:
  - Lo que pasa a corrupción cae y se olvida; pero lo futuro es lo que se busca.
  - Lo que sale de la mano ya no cuenta.
  rationale: La frase preserva el juicio sapiencial del original sobre la fugacidad de lo corruptible y el valor relativo de lo venidero. No se añade una lectura moralizante; se mantiene la tensión entre desaparición, búsqueda y pérdida de cómputo.
  doctrine_reference: Eclesiastés 1:14; 1 Juan 2:17; Sabiduría 5:15
- issue: Ambigüedad de "reckoned" entre contar, estimar o considerar
  english_pob_reading: is no longer reckoned
  chosen_spanish_reading: ya no se cuenta
  alternative_spanish_readings:
  - ya no se considera
  - ya no se computa
  rationale: El texto puede apuntar tanto a cómputo como a valoración. "Se cuenta" preserva esa ambigüedad sin escoger prematuramente una sola acepción.
  doctrine_reference: Léxica, no doctrinal
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que corrigió la forma de 'has passed' y conservó el sentido de 'passes away'. También se respetó la nota inglesa que ofrecía la alternativa 'passes over'/'passes away' como decisión léxica, trasladando esa tensión al español con una formulación natural y breve.
  spanish_consistency_notes:
  - Evité 'SEÑOR' y otras convenciones de sustitución porque el texto no contiene el Tetragrámaton.
  - 'Mantengo el paralelismo sintáctico del original: corrupción / caída y olvido / lo venidero y lo buscado / lo que pasa de la mano y ya no cuenta.'
  - '''La mano'' se conserva como imagen idiomática sin ampliar a ''sus manos'', porque el singular es suficiente y más cercano al patrón semítico del original.'
