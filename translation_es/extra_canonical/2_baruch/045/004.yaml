  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones sobre 'corrupción', 'se corrompe', 'cae', 'se olvida' y 'ya no se cuenta' son compatibles con el proyecto. La nota debe ajustarse para reflejar una alternativa española real y no depender innecesariamente de la explicación inglesa.
