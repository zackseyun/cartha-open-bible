translation:
  language: es
  text: Y si hay algunos destinados para ello, no se les retiene; y los que viven en ello no serán llevados a destrucción.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no hay conducción a destrucción».
    reason: 'Preserva en español la alternativa registrada en la nota inglesa anterior: «there is no leading to destruction».'
lexical_decisions:
- source_word: appointed for it
  english_pob_choice: appointed for it
  chosen_spanish: destinados para ello
  alternatives_spanish:
  - señalados para ello
  - designados para ello
  lexicon: appointed
  rationale: El inglés POB conserva una noción de destino o designación. En español, «destinados para ello» comunica esa idea sin forzar un tecnicismo eclesiástico. «Señalados» y «designados» quedan como alternativas posibles, pero «destinados» suena más natural y mantiene la pasividad de la frase.
- source_word: it is not withheld from them
  english_pob_choice: it is not withheld from them
  chosen_spanish: no les es retenido
  alternatives_spanish:
  - no se les retiene
  - no se les niega
  lexicon: withheld
  rationale: «Retener» refleja bien la idea de no impedir el acceso o la posesión. La construcción impersonal «no les es retenido» mantiene un tono más próximo al original y a la pasiva del inglés POB. «No se les retiene» sería más natural, pero aquí se preserva mejor la relación formal entre sujeto implícito y complemento dativo.
- source_word: those who live in it
  english_pob_choice: those who live in it
  chosen_spanish: los que viven en ello
  alternatives_spanish:
  - los que habitan en ello
  - los que moran en ello
  lexicon: live
  rationale: El texto habla de vivir «en ello»; en español, «los que viven en ello» expresa con claridad la permanencia o participación en esa realidad. «Habitan» o «moran» sonarían más literarios o arcaizantes sin aportar más precisión.
- source_word: will not be led to destruction
  english_pob_choice: they will not be led to destruction
  chosen_spanish: no serán llevados a destrucción
  alternatives_spanish:
  - no serán conducidos a destrucción
  - no serán guiados a destrucción
  lexicon: led to destruction
  rationale: La revisión inglesa pasó de la forma nominal awkward («there is no leading to destruction») a una pasiva verbal más clara. En español, «no serán llevados a destrucción» reproduce esa claridad y la pasiva de proceso. «Conducidos» o «guiados» son posibles, pero «llevados» es más idiomático y fiel al movimiento implícito.
theological_decisions:
- issue: Destino/designación de los que reciben el beneficio
  english_pob_reading: if there are any who are appointed for it
  chosen_spanish_reading: si hay algunos destinados para ello
  alternative_spanish_readings:
  - si hay algunos señalados para ello
  - si hay algunos designados para ello
  rationale: No se suaviza la fuerza de la designación. El español mantiene que hay algunos previstos o destinados para esa realidad; no se convierte en mera posibilidad general ni se elimina la tensión entre elección y acceso concedido.
  doctrine_reference: Providencia / elección divina
- issue: Negación de la destrucción para los que viven en ello
  english_pob_reading: they will not be led to destruction
  chosen_spanish_reading: no serán llevados a destrucción
  alternative_spanish_readings:
  - no serán conducidos a destrucción
  - no se los llevará a destrucción
  rationale: Se conserva la promesa negativa con la misma fuerza del inglés POB. La formulación evita diluir el contraste entre los destinados/los que viven en ello y el resultado de no ser conducidos a destrucción.
  doctrine_reference: Preservación / juicio
translation_notes:
  revision_awareness: La revisión inglesa reciente aclaró la segunda cláusula pasando de una nominalización torpe a una pasiva verbal («they will not be led to destruction») y añadió una coma. La traducción española sigue esa lectura revisada y no reproduce la versión inglesa anterior más ambigua.
  spanish_consistency_notes:
  - Se mantuvo «destrucción» para conservar el valor semántico del inglés POB y no reemplazarlo por un eufemismo.
  - Se evitó introducir «condenación» porque el contexto fuente habla de destrucción, no de un término judicial explícito.
  - La sintaxis en español procura reflejar la estructura de dos miembros coordinados del original, con una pausa clara entre ambas cláusulas.
