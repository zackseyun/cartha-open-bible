  to: Y si hay algunos destinados para ello, no se les retiene; y los que viven en ello no serán llevados a destrucción.[a]
  rationale: Se hace una reparación menor para mejorar la naturalidad del español sin alterar el sentido del original ni del POB inglés. «No se les retiene» expresa mejor la idea de que no se les niega o retiene aquello para lo que fueron destinados. Se añade una nota para conservar la alternativa de formulación que el historial inglés documentó explícitamente.
