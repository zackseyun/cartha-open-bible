translation:
  language: es
  text: Ellos desean indagar la angustia oculta del pueblo venidero; pero no verán la intervención en ese asunto, por medio del cual[a] muchos fueron justificados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «por el cual muchos fueron justificados».'
    reason: alternative_reading
lexical_decisions:
- source_word: they desire to inquire
  english_pob_choice: they desire to inquire
  chosen_spanish: Ellos desean indagar
  alternatives_spanish:
  - Ellos quieren investigar
  - Ellos anhelan averiguar
  lexicon: desear + indagar
  rationale: Conserva el matiz voluntativo de 'desire' y el de indagación profunda de 'inquire' sin endurecer la frase con un calco innecesario.
- source_word: hidden anguish
  english_pob_choice: hidden anguish
  chosen_spanish: la angustia oculta
  alternatives_spanish:
  - el sufrimiento oculto
  - la aflicción escondida
  lexicon: angustia / oculto
  rationale: '''Angustia'' comunica la carga interior y dolorosa del sustantivo sin diluirlo en un término más genérico como ''sufrimiento''.'
- source_word: the people to come
  english_pob_choice: the people to come
  chosen_spanish: del pueblo venidero
  alternatives_spanish:
  - del pueblo futuro
  - de la gente que ha de venir
  lexicon: venir / venidero
  rationale: '''Venidero'' mantiene el valor prospectivo de la construcción y conserva el tono profético.'
- source_word: the visitation of that matter
  english_pob_choice: the visitation of that matter
  chosen_spanish: la visita de ese asunto
  alternatives_spanish:
  - la intervención de ese asunto
  - la visita de esa cuestión
  lexicon: visita / asunto
  rationale: Se conserva 'visita' para reflejar la elección léxica del audit trail, aunque en español resulte menos habitual; 'asunto' sigue el objeto de esa 'visitation' sin sobreinterpretarlo.
- source_word: by which many were justified
  english_pob_choice: by which many were justified
  chosen_spanish: por medio del cual muchos fueron justificados
  alternatives_spanish:
  - mediante el cual muchos fueron justificados
  - por el cual muchos fueron justificados
  lexicon: justificar
  rationale: Mantiene la relación causal/instrumental expresada en el original y en el inglés POB, preservando 'justificados' por el testimonio del texto auditado.
theological_decisions:
- issue: Elipsis final en la traducción inglesa y completitud de la cláusula
  english_pob_reading: the visitation of that matter by which many were justified they will not see
  chosen_spanish_reading: la visita de ese asunto, por medio del cual muchos fueron justificados, no la verán
  alternative_spanish_readings:
  - no verán la visita de ese asunto por medio del cual muchos fueron justificados
  - no verán esa visita, por la cual muchos fueron justificados
  rationale: Se evita reproducir la omisión corregida del inglés y se expresa la cláusula completa con un objeto explícito retomado por 'la' para una lectura fluida y fiel.
  doctrine_reference: coherencia textual y completitud de la cláusula
translation_notes:
  revision_awareness: La revisión más reciente confirmó que no había más cambios necesarios, pero el historial de revisión corregía una omisión importante en la cláusula final inglesa; por eso la versión española traduce la oración completa y no deja suspensión de sentido.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Justificados'' conserva la elección auditada del inglés POB y queda anotada la alternativa de relación instrumental para reflejar la tensión interpretativa.'
  - Se evita 'SEÑOR' y otras sustituciones devocionales no presentes en el texto fuente.
  - La puntuación divide claramente las dos cláusulas para reflejar el contraste entre el deseo de indagar y la incapacidad de ver.
