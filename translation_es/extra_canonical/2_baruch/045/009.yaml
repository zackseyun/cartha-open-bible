review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido global del siríaco según el rastro inglés: el deseo de investigar, la angustia oculta del pueblo futuro y la cláusula final completa con ''no la verán''. Sin embargo, ''la visita de ese asunto'' suena poco natural y además debilita el valor semántico de ''visitation'' en contexto, donde en español bíblico y legible ''la intervención'' o ''la visitación'' comunican mejor una acción/consideración decisiva. También conviene evitar el pronombre anticipado ''la'' por pesadez sintáctica.'
  spanish_quality_summary: 'El texto es mayormente claro, pero ''la visita de ese asunto'' resulta torpe e idiomáticamente extraña en español moderno eclesial. ''Pueblo venidero'' es aceptable, aunque algo rígido; puede mantenerse. La frase mejora notablemente con una formulación más natural: ''pero no verán la intervención en ese asunto...'' o ''la visitación de ese asunto...''. La nota al pie actual no es incorrecta, pero conviene ajustarla al anclaje exacto del texto revisado.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Justificados' preserva correctamente la decisión auditada. No hay términos divinos o cristológicos relevantes aquí.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: ''la visita de ese asunto'''
    rationale: Aunque intenta reflejar literalmente el inglés POB, en español 'visita' con 'asunto' no comunica bien el sentido de una visitación/intervención sobre una cuestión. La fidelidad al sentido fuente pide una expresión más idiomática.
  - severity: low
    issue: 'Construcción pesada: ''..., no la verán'''
    rationale: La duplicación con objeto anticipado y clítico es gramatical, pero aquí suena innecesariamente forzada. 'No verán...' fluye mejor sin pérdida de sentido.
  - severity: low
    issue: Nota al pie mejorable
    rationale: La nota actual es válida, pero debe corresponder exactamente a la frase anclada en el texto revisado y puede formularse con más concisión.
  revised_spanish_text: Ellos desean indagar la angustia oculta del pueblo venidero; pero no verán la intervención en ese asunto, por medio del cual[a] muchos fueron justificados.
