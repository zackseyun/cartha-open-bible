revisions:
- from: …que pertenecen a la corrupción y a sus caminos, caminos que no pueden ser investigados[a], cualquiera que sea su condición. Pero si perseveras y permaneces en su temor y no te desvias de su ley, los tiempos serán cambiados en su temporada para bien, y verás la consolación de Sion.
  to: …que pertenecen a la corrupción y a sus caminos, caminos que no pueden ser investigados[a], sean como sean. Pero si perseveras y permaneces en su temor y no te desvías de su ley, los tiempos serán cambiados en su tiempo para bien, y verás la consolación de Sion.
  rationale: 'Se corrigen tres puntos: el idiomatismo final para reflejar mejor ''whatever they may be'', la expresión temporal para un español natural y fiel, y la ortografía de ''desvías''. También se ajusta la nota para que preserve una alternativa real documentada por el expediente inglés sin duplicación inútil. No se requiere adjudicación adicional porque las correcciones son claras y de bajo riesgo doctrinal.'
