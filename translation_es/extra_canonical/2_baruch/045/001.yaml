translation:
  language: es
  text: …que pertenecen a la corrupción y a sus caminos, caminos que no pueden ser investigados[a], sean como sean. Pero si perseveras y permaneces en su temor y no te desvías de su ley, los tiempos serán cambiados en su tiempo para bien, y verás la consolación de Sion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "caminos que no pueden ser rastreados".'
    reason: previous_rendering
lexical_decisions:
- source_word: ܒܘܝܐܐ
  english_pob_choice: consolation
  chosen_spanish: consolación
  alternatives_spanish:
  - consuelo
  - encouragement
  lexicon: Payne Smith
  rationale: Conserva el registro escatológico y comunitario de la frase “la consolación de Sion”, sin reducirla a alivio emocional.
- source_word: ܡܬܚܠܦܝܢ ... ܙܒ̈ܢܐ ܠܛܒܬܐ
  english_pob_choice: the times will be changed ... for good
  chosen_spanish: los tiempos serán cambiados ... para bien
  alternatives_spanish:
  - los tiempos se transformarán ... para bien
  - las épocas se volverán para bien
  lexicon: Payne Smith
  rationale: “Tiempos” preserva el contraste apocalíptico entre el orden presente y el venidero, y “para bien” refleja la dirección favorable del cambio sin sobreinterpretarlo.
- source_word: ܡܬܚܒܠ
  english_pob_choice: corruptible
  chosen_spanish: corrupción / corruptibles
  alternatives_spanish:
  - perecedero
  - sujeto a ruina
  lexicon: Payne Smith
  rationale: En este versículo el sustantivo y la idea verbal se agrupan en torno a “corrupción”; el español mantiene el campo léxico visible para no perder la repetición temática del capítulo.
- source_word: ܒܥܘܗܕܢܐ
  english_pob_choice: in remembrance
  chosen_spanish: en recuerdo
  alternatives_spanish:
  - en memoria
  - para ser recordado
  lexicon: Payne Smith
  rationale: La expresión inglesa (“in remembrance”) se vierte de forma natural en español como “en recuerdo”, manteniendo el contraste con lo que queda olvidado.
- source_word: ܚܘܒܐ
  english_pob_choice: burden
  chosen_spanish: caminos
  alternatives_spanish:
  - carga
  - peso
  - obligación
  lexicon: Payne Smith
  rationale: En este versículo concreto, la cláusula no desarrolla ܚܘܒܐ; por eso no se introduce una decisión lexical que no esté anclada directamente en la porción traducida del versículo.
theological_decisions:
- issue: Esperanza escatológica centrada en Sion
  english_pob_reading: you will see the consolation of Zion
  chosen_spanish_reading: verás la consolación de Sion
  alternative_spanish_readings:
  - verás el consuelo de Sion
  - verás el alivio de Sion
  rationale: La referencia no se generaliza a una esperanza abstracta; se conserva el foco en Sion como objeto de restauración y consuelo final.
  doctrine_reference: restauración escatológica / Sion
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'traced out' por 'searched out' y luego añadió la matización 'whatever they may be'; la redacción española incorpora ambas decisiones con ‘investigados’ y ‘cualquiera que sea su condición’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en el proyecto cuando el texto lo exige, pero en este versículo no aparece el nombre divino explícito; por eso no se introduce aquí.
  - Se mantuvo ‘Sion’ por la forma tradicional y ampliamente inteligible en español bíblico.
  - La frase ‘caminos que no pueden ser investigados’ conserva el plural y la incompletitud del original, evitando suavizarla a una simple idea de misterio.
