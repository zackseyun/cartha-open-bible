translation:
  language: es
  text: Porque ¿dónde buscaremos otra vez la ley, o quién nos distinguirá entre la muerte y la vida?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «o quién nos separará entre la muerte y la vida».'
