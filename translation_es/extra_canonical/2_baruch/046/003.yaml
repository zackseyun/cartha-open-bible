  text: Porque ¿dónde buscaremos otra vez la ley, o quién distinguirá para nosotros entre la muerte y la vida?
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: law
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Torá
  - la instrucción
  lexicon: lexical correspondence grounded in Syriac and English POB audit trail
  rationale: El contexto conserva el sentido de la ley como norma divina a la que el pueblo vuelve a recurrir; 'la ley' reproduce con claridad la forma del inglés POB y evita introducir un matiz interpretativo adicional que no exige el siríaco.
- source_word: distinguish between
  english_pob_choice: distinguish between death and life
  chosen_spanish: nos distinguirá entre la muerte y la vida
  alternatives_spanish:
  - nos separará entre la muerte y la vida
  - nos discernirá entre la muerte y la vida
  - nos guiará de la casa de la muerte a la vida
  lexicon: Syriac prš = separate/distinguish; English revision corrected earlier misreading
  rationale: El siríaco leído en la revisión dice 'distinguir/separar entre', no 'guiar'. 'Distinguirá entre' conserva la idea de discernimiento/separación y respeta la corrección textual del audit trail.
- source_word: death
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: standard semantic correspondence
  rationale: Se mantiene el sustantivo abstracto con artículo para sonar natural en español y conservar el paralelismo con 'la vida'.
- source_word: life
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  lexicon: standard semantic correspondence
  rationale: Mantiene el paralelismo antitético con 'la muerte' y refleja fielmente el binomio del texto fuente.
theological_decisions:
- issue: La pregunta retórica expresa incapacidad humana para recuperar la ley y para discernir entre muerte y vida.
  english_pob_reading: For where shall we seek the law again, or who will distinguish for us between death and life?
  chosen_spanish_reading: Porque ¿dónde buscaremos otra vez la ley, o quién nos distinguirá entre la muerte y la vida?
  alternative_spanish_readings:
  - Porque ¿dónde buscaremos de nuevo la ley, o quién nos separará entre la muerte y la vida?
  rationale: 'La redacción mantiene el tono de lamento y dependencia: no se afirma que alguien ya los haya guiado, sino que falta quien pueda operar esa distinción vital. Esto sigue la lectura corregida del siríaco y preserva la tensión teológica del pasaje.'
  doctrine_reference: 2 Baruch 46:3; revisión textual del siríaco 'bayn mawta l-ḥayye'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del expediente: el inglés POB fue corregido desde una lectura errónea de ''guiar desde la casa de la muerte'' a la lectura correcta ''distinguir entre la muerte y la vida''. La traducción española refleja esa corrección y evita la antigua interpretación.'
  spanish_consistency_notes:
  - Se mantiene 'ley' para coherencia con el inglés POB y porque el siríaco no obliga a especificar 'Torá'.
  - Se evita 'Cristo', 'SEÑOR' u otro reemplazo no presente en el texto.
  - La pregunta retórica se conserva con puntuación española y orden natural.
  - '''Distinguir'' se usa como opción principal por ajuste al siríaco y para no perder la relación semántica entre separar/discernir.'
