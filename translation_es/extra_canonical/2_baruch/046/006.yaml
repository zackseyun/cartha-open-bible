lexical_decisions:
- source_word: if you do these things
  english_pob_choice: if you do these things
  chosen_spanish: si haces estas cosas
  alternatives_spanish:
  - si ustedes hacen estas cosas
  - si las haces
  lexicon: conditional exhortation
  rationale: Conserva la condición directa y el tono exhortativo del original. "Haces" en singular impersonal/intimista refleja bien el destinatario individual del discurso sin forzar un plural inexistente en el texto.
- source_word: hope will be given to you
  english_pob_choice: hope will be given to you
  chosen_spanish: se te dará esperanza
  alternatives_spanish:
  - te será dada esperanza
  - recibirás esperanza
  lexicon: hope as bestowed gift
  rationale: Mantiene la pasiva perifrástica con valor receptivo del original y el matiz de que la esperanza es algo concedido, no auto-generado. "Se te dará" es natural en español y preserva la fuerza del verbo pasivo.
- source_word: these things that were spoken to you before
  english_pob_choice: these things that were spoken to you before
  chosen_spanish: estas cosas que antes se te dijeron
  alternatives_spanish:
  - estas cosas que te fueron dichas antes
  - estas cosas que antes te fueron habladas
  lexicon: speak/tell in passive sense
  rationale: '"Se te dijeron" reproduce de forma idiomática el hecho de haber sido comunicadas previamente. Evita el calco excesivo de una pasiva más pesada y conserva el orden temporal "antes".'
theological_decisions:
- issue: Nature of the promised hope
  english_pob_reading: hope will be given to you
  chosen_spanish_reading: se te dará esperanza
  alternative_spanish_readings:
  - recibirás esperanza
  - te será dada esperanza
  rationale: La formulación en español mantiene la esperanza como don otorgado en el marco de la obediencia/acción previa, sin introducir especificaciones doctrinales ajenas al verso.
  doctrine_reference: Esperanza como don escatológico en contexto exhortativo
- issue: Reference to previously spoken instructions
  english_pob_reading: these things that were spoken to you before
  chosen_spanish_reading: estas cosas que antes se te dijeron
  alternative_spanish_readings:
  - estas cosas que te fueron dichas antes
  - estas cosas que antes te fueron habladas
  rationale: Se conserva la referencia a enseñanzas previas sin identificar innecesariamente el contenido ni suavizar la dependencia del oyente respecto de una palabra ya recibida.
  doctrine_reference: Autoridad de la instrucción previa en contexto sapiencial/exhortativo
