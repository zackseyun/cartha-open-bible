translation:
  language: es
  text: Pero preparen sus corazones para escuchar la ley y sométanse a aquellos que son sabios y entendidos con temor reverente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: prepare your hearts
  english_pob_choice: prepare your hearts
  chosen_spanish: preparen sus corazones
  alternatives_spanish:
  - dispongan sus corazones
  - preparen su interior
  lexicon: corazón
  rationale: La imagen semítica de ‘corazón’ se conserva en español por su fuerza bíblica y porque el mandato es volitivo y preparatorio, no meramente emocional.
- source_word: listen to the law
  english_pob_choice: listen to the law
  chosen_spanish: escuchar la ley
  alternatives_spanish:
  - oír la ley
  - prestar atención a la ley
  lexicon: escuchar
  rationale: ‘Escuchar’ comunica mejor la respuesta obediente implícita en el contexto que un mero acto auditivo.
- source_word: be subject to
  english_pob_choice: be subject to
  chosen_spanish: sométanse a
  alternatives_spanish:
  - estén sujetos a
  - se subordinen a
  lexicon: someterse
  rationale: La idea de sujeción/obediencia se preserva con un verbo directo y natural en español, sin suavizar la fuerza relacional del mandato.
- source_word: those who are wise and understanding in fear
  english_pob_choice: those who are wise and understanding in fear
  chosen_spanish: aquellos que son sabios y entendidos en temor
  alternatives_spanish:
  - los que son sabios y entendidos con temor
  - los que, en temor, son sabios y entendidos
  lexicon: sabio / entendido / temor
  rationale: 'Se mantiene la construcción final según la revisión: no ‘atentos a entender’, sino personas caracterizadas por sabiduría y entendimiento ‘en temor’. ‘En temor’ conserva la conexión con la frase adverbial del siríaco y evita interpretar indebidamente el sustantivo.'
theological_decisions:
- issue: Relación entre sabiduría, entendimiento y temor
  english_pob_reading: who are wise and understanding in fear
  chosen_spanish_reading: sabios y entendidos en temor
  alternative_spanish_readings:
  - sabios y entendidos por temor
  - sabios y entendidos con temor reverente
  rationale: La revisión del audit trail exige conservar que el temor califica a los sabios y entendidos. ‘En temor’ es algo más literal y deja abierta la ambigüedad del original sin imponer una paráfrasis doctrinalmente cargada.
  doctrine_reference: Proverbios 1:7; Job 28:28
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail, que corrigió una truncación previa y restableció la cláusula completa: someterse a los que son sabios y entendidos en temor. También se evitó la lectura anterior que desplazaba el foco a ‘estar atentos al entendimiento’.'
  spanish_consistency_notes:
  - 'Se conservó un registro bíblico claro y no litúrgico: ‘ley’, ‘someterse’, ‘sabios y entendidos’.'
  - No se introdujo ‘Señor’ ni otra terminología no sustentada por el pasaje.
  - Se prefirió la estructura plural imperativa (‘preparen’, ‘sométanse’) para reflejar el tono exhortativo general del verso.
