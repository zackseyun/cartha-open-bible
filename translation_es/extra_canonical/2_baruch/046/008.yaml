translation:
  language: es
  text: Pero la noticia[a] de que yo iba a ser llevado no la revelé ni a ellos ni a mi hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mensaje’. El siríaco puede entenderse aquí como una comunicación o anuncio más que como ‘palabra’ en sentido literal.
    reason: alternative_reading
lexical_decisions:
- source_word: melta (Syriac)
  english_pob_choice: the news that I was being taken away
  chosen_spanish: la noticia de que yo iba a ser llevado
  alternatives_spanish:
  - el mensaje de que yo iba a ser llevado
  - la palabra de que yo iba a ser llevado
  - la noticia de que me iban a llevar
  lexicon: not applicable (source packet only; no lexicon entry numbers provided)
  rationale: El contexto favorece una comunicación recibida o anunciada, no una ‘palabra’ en sentido abstracto; ‘noticia’ sigue la revisión inglesa y suena natural en español sin perder el valor informativo del término.
- source_word: being taken away
  english_pob_choice: I was being taken away
  chosen_spanish: yo iba a ser llevado
  alternatives_spanish:
  - yo era llevado
  - me llevaban
  - yo iba a ser arrebatado
  lexicon: not applicable (source packet only; no lexicon entry numbers provided)
  rationale: ‘Iba a ser llevado’ expresa bien la acción pasiva futura/inminente implícita en la noticia, manteniendo el matiz de desplazamiento impuesto sin forzar un lenguaje más interpretativo.
- source_word: not reveal
  english_pob_choice: I did not reveal
  chosen_spanish: no la revelé
  alternatives_spanish:
  - no la di a conocer
  - no la manifesté
  lexicon: not applicable (source packet only; no lexicon entry numbers provided)
  rationale: ‘Revelé’ conserva la idea de dar a conocer algo reservado y se ajusta al tono del pasaje; el pronombre ‘la’ remite a ‘la noticia’.
- source_word: to them, nor to my son
  english_pob_choice: to them, nor to my son
  chosen_spanish: ni a ellos ni a mi hijo
  alternatives_spanish:
  - ni a ellos ni a mi hijo tampoco
  - ni a ellos ni siquiera a mi hijo
  lexicon: not applicable (source packet only; no lexicon entry numbers provided)
  rationale: La coordinación negativa española normal ‘ni… ni…’ reproduce fielmente la exclusión de ambos destinatarios, sin añadir énfasis no atestiguado.
theological_decisions:
- issue: None substantive beyond the ambiguity of Syriac melta
  english_pob_reading: news/message rather than literal 'word'
  chosen_spanish_reading: noticia más que ‘palabra’
  alternative_spanish_readings:
  - palabra
  - mensaje
  - hecho
  rationale: La revisión inglesa ya resolvió la expresión hacia ‘news’ para evitar un calco incómodo; en español, ‘noticia’ preserva mejor la comunicación de algo conocido o comunicado y evita un falso literalismo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés mantuvo sin cambios la lectura ‘the news that I was being taken away’, y la presente versión española la sigue con una solución natural equivalente, evitando el calco literal ‘palabra’.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico sin arcaísmos innecesarios.
  - La pasiva ‘iba a ser llevado’ conserva la fuerza del original sin introducir una interpretación doctrinal adicional.
  - El pronombre clítico ‘la’ enlaza claramente con ‘la noticia’, haciendo fluida la sintaxis española.
