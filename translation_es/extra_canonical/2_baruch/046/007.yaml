translation:
  language: es
  text: Y no caerás en el tormento que te anuncié de antemano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: And you will not fall
  english_pob_choice: And you will not fall
  chosen_spanish: Y no caerás
  alternatives_spanish:
  - Y no caerás en
  - Y no sucumbirás
  lexicon: fall
  rationale: El verbo «caer» conserva la imagen verbal del original y del inglés POB, con una negación directa y natural en español. «Sucumbir» sería más interpretativo y menos transparente.
- source_word: the torment
  english_pob_choice: the torment
  chosen_spanish: el tormento
  alternatives_spanish:
  - el sufrimiento
  - la tortura
  lexicon: torment
  rationale: «Tormento» mantiene la fuerza punitiva del término sin suavizarlo. «Sufrimiento» sería más general; «tortura» podría exceder el matiz si no se quiere precisar el tipo de castigo.
- source_word: that I told you about beforehand
  english_pob_choice: that I told you about beforehand
  chosen_spanish: que te anuncié de antemano
  alternatives_spanish:
  - que te dije de antemano
  - que te hablé antes acerca de
  lexicon: tell beforehand
  rationale: 'La revisión textual muestra que el sujeto es la primera persona singular activa: Baruc dice que él mismo avisó antes. «Anuncié de antemano» transmite bien el aviso previo y evita la lectura pasiva rechazada por la revisión.'
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «that was told to you beforehand» a «that I told you about beforehand» por una adjudicación de nivel 2, porque el siriaco refleja un verbo activo en primera persona singular. La versión española adopta explícitamente esa lectura activa y evita cualquier forma pasiva.
  spanish_consistency_notes:
  - Se mantiene «tormento» para preservar la dureza del castigo sin atenuarlo.
  - Se usa segunda persona singular («te», «caerás») porque el contexto inglés la presenta así.
  - No se introduce «Señor» ni otra terminología eclesiástica ajena al versículo.
  - La puntuación final conserva el cierre entrecomillado del enunciado profético.
