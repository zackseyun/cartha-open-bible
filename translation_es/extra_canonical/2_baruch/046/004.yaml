translation:
  language: es
  text: 'Y les dije:


    «No puedo oponerme a la voluntad del Poderoso.

    Sin embargo, Israel no carecerá de un sabio,

    ni la descendencia de Jacob de un hijo de la ley.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: the Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Todopoderoso
  - el Fuerte
  lexicon: מקור implícito en tradición siríaca; título divino de poder
  rationale: ‘Poderoso’ conserva el tono de título divino con énfasis en poder, evita la sustitución automática por ‘Señor’ y sigue de cerca la elección inglesa sin volverse artificial en español.
- source_word: wise man
  english_pob_choice: wise man
  chosen_spanish: un sabio
  alternatives_spanish:
  - un hombre sabio
  - un hombre prudente
  lexicon: חכם / σοφός (valor sapiencial general)
  rationale: En español, ‘un sabio’ transmite de forma natural la idea de una persona sabia sin añadir matices no evidentes en el contexto.
- source_word: son of the law
  english_pob_choice: son of the law
  chosen_spanish: un hijo de la ley
  alternatives_spanish:
  - un hombre de la Ley
  - un discípulo de la ley
  lexicon: expresión semítica de pertenencia/formación normativa
  rationale: Se mantiene la expresión literal ‘hijo de la ley’ porque el texto juega con una formulación de pertenencia o caracterización; ‘de la Ley’ en mayúscula puede sugerir una referencia técnica más fuerte, pero la forma simple preserva mejor la imagen original.
- source_word: will not lack
  english_pob_choice: will not lack
  chosen_spanish: no carecerá de
  alternatives_spanish:
  - no faltará
  - no quedará sin
  lexicon: negación de carencia futura
  rationale: ‘No carecerá de’ reproduce bien la estructura y es idiomático en español bíblico contemporáneo sin sonar rebuscado.
theological_decisions:
- issue: Referencia al nombre divino mediante un título de poder
  english_pob_reading: the Mighty One
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
  - el Todopoderoso
  - el Fuerte
  rationale: No hay indicación en el verso de que deba usarse ‘Yahvé’; el inglés POB conserva un título genérico de poder. ‘El Poderoso’ mantiene la solemnidad y evita introducir una identificación no explicitada en el pasaje.
  doctrine_reference: Teología del nombre divino y títulos reverenciales en traducción bíblica
- issue: ‘Son of the law’ como designación identitaria
  english_pob_reading: nor the seed of Jacob a son of the law
  chosen_spanish_reading: ni la descendencia de Jacob de un hijo de la ley
  alternative_spanish_readings:
  - ni la descendencia de Jacob de un hombre de la Ley
  - ni la descendencia de Jacob de un discípulo de la ley
  rationale: La frase se conserva como designación semítica y no se paraphrasea a una categoría eclesiástica posterior. La ambigüedad entre pertenencia, formación y fidelidad legal se deja visible en la literalidad.
  doctrine_reference: Identidad del pueblo y transmisión de la instrucción/ley en literatura judía antigua
translation_notes:
  revision_awareness: La versión inglesa POB y el control de revisión indican que no hubo cambios necesarios; el español sigue esa lectura estable, manteniendo el paralelismo y la fuerza declarativa del original sin añadir notas textuales.
  spanish_consistency_notes:
  - Se usa puntuación de cita en estilo español con dos puntos tras la introducción narrativa.
  - Se mantiene ‘Israel’ y ‘Jacob’ sin transliteraciones ni sustituciones tradicionales.
  - Se conserva la distinción entre título divino (‘el Poderoso’) y designación humana (‘un sabio’, ‘un hijo de la ley’).
