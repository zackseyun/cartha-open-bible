translation:
  language: es
  text: 'Y mi hijo y los ancianos del pueblo me respondieron y dijeron: «¿Acaso el Poderoso[a] nos ha humillado tanto, al quitarte de nosotros de repente?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Poderoso» conserva el título solemne del original; en este pasaje no se sustituye por una designación genérica.
    reason: theological_note
lexical_decisions:
- source_word: ܚܝܠܬܢܐ
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Todopoderoso
  lexicon: Payne Smith
  rationale: El título divino conserva el tono solemne y apocalíptico del original. «Poderoso» mantiene la fuerza de ܚܝܠܬܢܐ sin convertirlo en una fórmula eclesiástica más habitual que podría ocultar el matiz del título.
- source_word: ܡܟܟܢ
  english_pob_choice: humbled us
  chosen_spanish: nos ha humillado
  alternatives_spanish:
  - nos ha abajado
  - nos ha rebajado
  lexicon: Payne Smith
  rationale: El verbo expresa ser puestos en un estado bajo o humillante. «Humillado» es natural en español y conserva el dolor colectivo de la lamentación.
- source_word: ܫܠܝ
  english_pob_choice: so suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - tan de pronto
  - súbitamente
  lexicon: Payne Smith
  rationale: La idea principal es la brusquedad de la partida de Baruc. «De repente» reproduce bien la sorpresa y el golpe emocional del contexto.
theological_decisions:
- issue: Título divino apocalíptico
  english_pob_reading: Retain 'the Mighty One' as the divine title.
  chosen_spanish_reading: 'Conservar un título personal y solemne: «el Poderoso».'
  alternative_spanish_readings:
  - «Dios»
  - «el Todopoderoso»
  rationale: El texto depende de un apelativo elevado, no de una sustitución genérica. Mantener un título visible conserva la continuidad retórica del lamento y evita borrar la carga del original.
  doctrine_reference: 2 Baruc 46:1; uso de epítetos divinos en literatura apocalíptica
- issue: Matiz de la partida de Baruc
  english_pob_reading: take you from us suddenly
  chosen_spanish_reading: quitarte de nosotros de repente
  alternative_spanish_readings:
  - apartarte de nosotros súbitamente
  - llevarte de nosotros de una vez
  rationale: El original presenta la salida como abrupta y dolorosa. La formulación elegida mantiene la intensidad del duelo sin añadir interpretación doctrinal.
  doctrine_reference: 2 Baruc 46:1
translation_notes:
  revision_awareness: La auditoría inglesa revisó la línea para añadir «indeed» y ajustar el matiz de la partida como brusca; para esta primera cláusula del verso, el español sigue esa lectura de cercanía léxica y conserva el tono directo del lamento. El resto del versículo continúa en la misma sección y se completará en el siguiente tramo del registro.
  spanish_consistency_notes:
  - Se mantiene «el Poderoso» como equivalente de ܚܝܠܬܢܐ para conservar el título divino recurrente.
  - «De repente» traduce el valor temporal/emotivo de ܫܠܝ sin volverlo una paráfrasis larga.
  - El registro es solemne pero natural en español latinoamericano, evitando calcos innecesarios.
