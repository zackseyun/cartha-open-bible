translation:
  language: es
  text: 'Yahvé respondió y me dijo:


    «Tienes razón al asombrarte[a] por lo pasajero del hombre, pero tu juicio acerca de los males que sobrevienen a los pecadores no es recto.


    Y en cuanto a lo que dijiste sobre los justos que son llevados y los impíos que prosperan, y en cuanto a lo que dijiste: que el hombre no conoce tu juicio,


    por esto, escucha ahora, y te hablaré; presta atención, y haré que mis palabras sean oídas.


    En verdad, el hombre no habría entendido mi juicio si no hubiera recibido la Ley y si yo no lo hubiera instruido en entendimiento.


    Pero ahora, porque ha transgredido con entendimiento, ciertamente será castigado por causa de ese entendimiento.


    Y en cuanto a los justos, de quienes dijiste que el mundo vino por causa de ellos: también lo venidero es por causa de ellos.


    Porque para ellos este mundo es una lucha y un trabajo con mucha aflicción, pero lo que está por venir es una corona con gran gloria.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «quedarte atónito». El verbo subraya una reacción fuerte ante la transitoriedad del hombre, no solo curiosidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ܐܬܡܗܬ
  english_pob_choice: to be astonished
  chosen_spanish: asombrarte
  alternatives_spanish:
  - maravillarte
  - quedarte atónito
  lexicon: Payne Smith
  rationale: El inglés POB tomó el valor de asombro/sorpresa fuerte, no mera curiosidad. En español, «asombrarte» conserva esa reacción ante el paso del hombre y sigue siendo natural y digna.
- source_word: ܢܡܘܣܐ
  english_pob_choice: the Law
  chosen_spanish: la Ley
  alternatives_spanish:
  - la ley
  - la Torá
  lexicon: Payne Smith
  rationale: Aquí el sentido es covenantal y definido; el POB inglés usa «the Law». En español, «la Ley» mantiene esa referencia tradicional y específica sin rebajarla a una ley genérica.
- source_word: ܚܟܡܬܐ / ܡܕܥܐ
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - sabiduría
  lexicon: Payne Smith
  rationale: El pasaje enlaza instrucción, capacidad cognitiva y responsabilidad moral. «Entendimiento» preserva ese eje intelectual y evita reducirlo a «sabiduría», que en español suena más amplio o sapiencial.
- source_word: ܟܐܢܘܬܐ
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: Payne Smith
  rationale: El POB inglés ya fija el grupo como «the righteous». «Los justos» es la correspondencia idiomática y teológicamente clara en español.
- source_word: ܥܠܡܐ
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - esta era
  - este siglo
  lexicon: Payne Smith
  rationale: El contexto contrapone el orden presente con lo venidero. «El mundo» conserva la formulación del POB inglés y la oposición escatológica sin forzar un tecnicismo.
- source_word: ܟܠܝܠܐ
  english_pob_choice: a crown
  chosen_spanish: una corona
  alternatives_spanish:
  - un premio
  - un adorno real
  lexicon: Payne Smith
  rationale: La imagen es metafórica de recompensa y honor. «Corona» preserva la figura bíblica sin explicarla en exceso.
theological_decisions:
- issue: Responsabilidad aumentada por el conocimiento
  english_pob_reading: Understanding deepens accountability; transgression with knowledge brings stricter judgment.
  chosen_spanish_reading: El entendimiento recibido aumenta la responsabilidad, de modo que transgredir con entendimiento trae castigo por esa misma luz recibida.
  alternative_spanish_readings:
  - El conocimiento solo aclara el pecado, sin agravar la responsabilidad.
  - La culpa no cambia, aunque cambie el grado de conciencia.
  rationale: 'El argumento del pasaje es explícito: la Ley y el entendimiento recibido hacen al hombre responsable, y pecar con ese entendimiento fundamenta un juicio/punición más directa. La traducción debe conservar esa tensión moral y judicial.'
  doctrine_reference: 'null'
- issue: Relación de los justos con este mundo y el venidero
  english_pob_reading: The righteous endure the struggle of the present world, but the coming world belongs to them as vindication and glory.
  chosen_spanish_reading: Los justos padecen la lucha del mundo presente, pero lo que viene les pertenece y culmina en gloria.
  alternative_spanish_readings:
  - Este mundo es ya la recompensa de los justos.
  - Solo el futuro importa para los justos.
  rationale: 'El POB inglés mantiene ambos horizontes: aflicción presente y gloria futura. En español conviene conservar esa tensión sin espiritualizar ni reducir el texto a un solo tiempo.'
  doctrine_reference: 'null'
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente: el formato por versículo se había depurado en inglés, pero el sentido global del pasaje quedó igual. Por eso la versión española conserva la estructura discursiva continua de la respuesta divina y no introduce numeración en el cuerpo principal.'
  spanish_consistency_notes:
  - Usé «Yahvé» como nombre divino conforme al criterio del proyecto, en lugar de enmascarar con «Señor».
  - Mantuve «la Ley» con mayúscula para reflejar el valor definido y covenantal del término.
  - Conservé «entendimiento» de manera uniforme para la capacidad moral-cognitiva mencionada dos veces.
  - Elegí «mundo» para ܥܠܡܐ porque el contraste con «lo que está por venir» funciona bien en español y sigue el marco del POB inglés.
  - Evité sustituir «justos» por perífrasis explicativas para no diluir la oposición entre justos e impíos.
