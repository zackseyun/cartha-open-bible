  language: en
  yaml_path: translation/extra_canonical/2_baruch/011/001.yaml
  text: 'Then I, Baruch, said: “And I said to you, O Babylon: ‘If you had prospered, and Zion had dwelt in her glory, our grief would still have been great that you had been made equal to Zion. But now, behold, the grief is infinite and the lamentation beyond measure, because Babylon has prospered and Zion has been destroyed. For who can judge concerning these things, or to whom shall we complain about what has come upon us? O Lord, how could you endure this? Our fathers went to rest without grief, and behold, the righteous sleep in the earth in quietness, because they did not know this distress, nor had they heard what has happened to us. Would that you had ears, O earth, and that you had a heart, O dust, so that you might go and announce in Sheol and say to the dead, ‘Blessed are you more than we who live.’”'
  footnotes:
  - marker: a
    text: Or 'answered and said, “Why, O Israel, do you trouble yourself in your mind, and why are you grieved, O land, because of what has happened? For if you had prospered, O Zion, and Babylon had been destroyed, our grief would still have been great that Babylon had been made equal to Zion.'.
