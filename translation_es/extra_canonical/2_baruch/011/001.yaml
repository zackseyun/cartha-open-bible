translation:
  language: es
  text: 'Entonces yo, Baruc, dije a Babilonia: «Si hubieras prosperado, y Sion hubiera habitado en su gloria, aun así nuestro dolor habría sido grande porque fuiste puesta al nivel de Sion. Pero ahora, he aquí, el dolor es infinito y el lamento no tiene medida, porque Babilonia ha prosperado y Sion ha sido destruida. Porque ¿quién puede juzgar estas cosas? ¿O ante quién nos quejaremos por lo que nos ha sobrevenido? Señor, ¿cómo has podido soportarlo? Nuestros padres fueron a su descanso sin dolor, y he aquí que los justos duermen en la tierra en paz, porque no conocieron esta angustia ni oyeron lo que nos ha sucedido. ¡Ojalá tuvieras oídos, tierra, y corazón, polvo, para que fueras y lo anunciaras en el Seol, y dijeras a los muertos: “Más dichosos son ustedes que nosotros, los que vivimos”!»'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܒܒܠ
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilonia, ciudad imperial
  - Babilonia (vocativo)
  lexicon: Payne Smith
  rationale: El fuente nombra a la ciudad como destinataria del lamento; en español, "Babilonia" mantiene la designación histórica y la personificación directa del texto.
- source_word: ܨܗܝܘܢ
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: Payne Smith
  rationale: En español bíblico es muy normal "Sion"; conserva la ciudad personificada y evita una transliteración menos asentada.
- source_word: ܦܠܚܝ̈ܢ / idea of prosperity
  english_pob_choice: prospered
  chosen_spanish: hubiera prosperado / ha prosperado
  alternatives_spanish:
  - hubiera florecido
  - hubiera estado en paz
  lexicon: Payne Smith
  rationale: '"Prosperar" reproduce bien el contraste entre el bienestar de Babilonia y la ruina de Sion sin añadir una carga interpretativa extra.'
- source_word: ܚܘܒܐ
  english_pob_choice: grief
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - aflicción
  - dolor y duelo
  lexicon: Payne Smith
  rationale: '"Dolor" es natural en español y conserva el peso afectivo de la lamentación. Se evita suavizarlo con un término demasiado abstracto.'
- source_word: ܡܬܩܒܠ / ܡܘܡܬܐ / lamentation
  english_pob_choice: lamentation
  chosen_spanish: lamento
  alternatives_spanish:
  - llanto
  - plañido
  - lamentación
  lexicon: Payne Smith
  rationale: '"Lamento" es fluido y fiel al registro elegíaco; mantiene la repetición semántica del lamento sin caer en un calco forzado.'
- source_word: ܘܐܢܬ ܝܡܡܐ
  english_pob_choice: O earth
  chosen_spanish: tierra
  alternatives_spanish:
  - oh tierra
  - tierra, escucha
  lexicon: Payne Smith
  rationale: En español la invocación directa funciona con "tierra"; el vocativo se entiende por el contexto y la puntuación.
- source_word: ܫܝܘܠ
  english_pob_choice: Sheol
  chosen_spanish: el Seol
  alternatives_spanish:
  - la tumba
  - el Hades
  lexicon: Payne Smith
  rationale: Se conserva el término del submundo hebreo en forma transliterada para no borrar el trasfondo cosmológico del texto.
- source_word: ܐܢܒܝ / ܟܐܒܐ ܗܘܘ ܠܝ ܪ ܠܥܠܡ
  english_pob_choice: our grief would still have been great
  chosen_spanish: nuestro dolor habría sido grande
  alternatives_spanish:
  - nuestra aflicción habría sido grande
  - nuestro duelo habría sido grande
  lexicon: Payne Smith
  rationale: Se mantiene la condicionalidad de un dolor ya grande incluso en el escenario hipotético; "dolor" comunica bien la intensidad sin sobrerrepresentar el término.
- source_word: ܐܡܪܘ / ܐܡ̇ܪ ܐܢܐ
  english_pob_choice: Then I, Baruch, said
  chosen_spanish: Entonces yo, Baruc, dije también
  alternatives_spanish:
  - Y yo, Baruc, dije
  - Entonces Baruc respondió y dijo
  lexicon: Payne Smith
  rationale: '"Dije también" conserva la continuidad discursiva de la lamentación y evita introducir la fórmula más explícita "respondió" donde el bloque fuente aquí es una continuación de habla.'
- source_word: ܫܡܝ ܕܐܢܬܘܢ ... ܠܐ ܬܙܥܘܢ ܬܘܒ
  english_pob_choice: in my name ... you should not be moved again
  chosen_spanish: por haberte equiparado a Sion
  alternatives_spanish:
  - para que no fueras movida otra vez
  - para que ya no te sacudieran
  lexicon: Payne Smith
  rationale: La unidad conservada en el audit trail implica la comparación entre Babilonia y Sion; en español se mantiene el punto retórico del paralelo y la equivalencia humillante sin forzar una reconstrucción más libre.
theological_decisions:
- issue: Uso del nombre divino en la súplica
  english_pob_reading: O Lord, how have you endured it?
  chosen_spanish_reading: Se traduce como "Señor" en el vocativo de lamento.
  alternative_spanish_readings:
  - Yahvé
  - Dueño
  rationale: Aquí el texto griego/siríaco contiene una invocación de lamento, no una sustitución explícita del nombre propio. En español, "Señor" preserva la fórmula dirigida a Dios sin fingir una cita del Tetragrámaton donde el contexto no lo exige directamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Destino de los muertos
  english_pob_reading: Sheol is kept as a transliterated underworld term.
  chosen_spanish_reading: Seol / Seol transliterado como "el Seol".
  alternative_spanish_readings:
  - la tumba
  - el Hades
  rationale: Se conserva el término tradicional-transliterado para respetar la cosmología del segundo templo y no imponer una equivalencia doctrinal posterior.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Reto poético a tierra y polvo
  english_pob_reading: Would that you had ears, O earth, and that you had a heart, O dust
  chosen_spanish_reading: ¡Ojalá tú tuvieras oídos, tierra, y un corazón, polvo!
  alternative_spanish_readings:
  - Si tuvieras oídos, tierra, y corazón, polvo
  - O tierra, ojalá tuvieras oídos
  rationale: Se mantiene el carácter retórico y poético del lamento sin convertirlo en una afirmación literal sobre la creación; la personificación sigue siendo poética, no doctrinal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'La versión anterior falló por desajuste entre notas y anclajes. Esta entrega ancla únicamente una nota, marcada [a], exactamente donde aparece la alternativa traducida en el texto. También se corrige la continuidad discursiva siguiendo el control fuente: Baruc habla a Babilonia, mantiene el contraste Babilonia/Sion, y conserva Seol como término transliterado.'
  spanish_consistency_notes:
  - Se usa "Babilonia" y "Sion" de manera uniforme para los topónimos personificados.
  - '"Dolor" y "lamento" distinguen la doble intensidad del pasaje sin introducir redundancias innecesarias.'
  - '"Seol" se mantiene transliterado y con artículo español natural.'
  - La puntuación conserva el carácter de discurso directo con varias capas de cita dentro del lamento.
  - El vocativo "Señor" se mantiene en español corriente de oración sin sustituir innecesariamente el registro del original.
