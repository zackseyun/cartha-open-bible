review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido principal atestiguado en la POB inglesa: dos cargas insoportables para el hablante, no abandonar a una parte del pueblo de Dios y no soportar ver la destrucción de su madre. La estructura y los referentes se preservan con fidelidad. El único problema relevante estaba en la nota: presentaba como primera alternativa exactamente la misma lectura del texto principal, lo que no corresponde al audit trail inglés, donde la nota conserva una lectura alternativa previa distinta.'
  spanish_quality_summary: El español es claro, natural y digno. 'Porque estas dos cosas son demasiado para mí' y 'ni mi alma puede soportar ver' son plenamente legibles. 'Abandonar' funciona bien para 'forsake'. No se requirieron cambios en el cuerpo del versículo. Se reparó la nota para que sea informativa y no redundante.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'tu pueblo', 'mi alma', 'destrucción' y 'mi madre' están bien alineados con el registro y la racionalidad documentada. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal como alternativa.
    rationale: 'El texto de la nota decía primero ''O: «no puedo abandonar la mitad de tu pueblo»'', que no es una alternativa sino la misma lectura del texto principal. El audit trail inglés conserva como alternativa una lectura previa diferente relacionada con ''morir con los muchos o con mi asamblea''.'
  - severity: low
    issue: La formulación 'algunas tradiciones anteriores' es menos precisa que el motivo documentado.
    rationale: La evidencia proporcionada habla de una 'previous rendering', es decir, una traducción/entendimiento previo del pasaje, no necesariamente de 'tradiciones' textuales. Una formulación más neutra evita insinuar una base textual más fuerte de la que consta.
  revised_spanish_text: 'Porque estas dos cosas son demasiado para mí: no puedo abandonar la mitad de tu pueblo[a], ni mi alma puede soportar ver la destrucción de mi madre.'
  revised_footnotes:
  - marker: a
    text: 'O: «no puedo morir con los muchos o con mi asamblea»; esta fue una interpretación anterior del pasaje.'
    reason: alternative_reading
  revision_rationale: Se mantiene intacto el texto principal porque es fiel, idiomático y bien alineado con la POB inglesa. Solo se corrigió la nota para reflejar una verdadera lectura alternativa documentada, sin repetir la lectura principal ni sugerir una tradición textual no demostrada.
