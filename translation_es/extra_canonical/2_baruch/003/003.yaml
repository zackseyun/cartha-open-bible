lexical_decisions:
- source_word: two things
  english_pob_choice: these two things
  chosen_spanish: estas dos cosas
  alternatives_spanish:
  - estas dos cuestiones
  - estas dos circunstancias
  lexicon: dual/amount expression
  rationale: ‘Estas dos cosas’ conserva la referencia dual simple y natural del texto sin añadir interpretación.
- source_word: too much for me
  english_pob_choice: are too much for me
  chosen_spanish: son demasiado para mí
  alternatives_spanish:
  - me resultan demasiado
  - son más de lo que puedo soportar
  lexicon: excess/burden expression
  rationale: ‘Demasiado para mí’ reproduce la idea de sobrecarga o exceso de manera idiomática y fiel.
- source_word: forsake
  english_pob_choice: forsake
  chosen_spanish: abandonar
  alternatives_spanish:
  - dejar
  - desamparar
  lexicon: desert/leave behind
  rationale: ‘Abandonar’ expresa con claridad la fuerza de dejar atrás o renunciar a una parte del pueblo.
- source_word: half of your people
  english_pob_choice: half of your people
  chosen_spanish: la mitad de tu pueblo
  alternatives_spanish:
  - la mitad de tu gente
  - media parte de tu pueblo
  lexicon: quantity + covenant people
  rationale: Se mantiene ‘la mitad’ de forma literal y ‘tu pueblo’ conserva el matiz comunitario/covenantal del original.
- source_word: my soul bear to see
  english_pob_choice: my soul bear to see
  chosen_spanish: mi alma puede soportar ver
  alternatives_spanish:
  - mi alma soporte ver
  - mi ser puede soportar contemplar
  lexicon: inner capacity/affect
  rationale: ‘Mi alma puede soportar ver’ mantiene el lenguaje interior y la carga afectiva sin volverlo más abstracto de lo necesario.
- source_word: destruction
  english_pob_choice: destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - la ruina
  - el exterminio
  lexicon: destruction/ruin
  rationale: ‘Destrucción’ es la equivalencia más directa y no suaviza la gravedad del término.
- source_word: my mother
  english_pob_choice: my mother
  chosen_spanish: mi madre
  alternatives_spanish:
  - mi madre patria
  - mi madre
  lexicon: metaphorical mother/community
  rationale: Se conserva ‘mi madre’ porque el texto y el audit trail permiten una referencia metafórica o simbólica sin explicitarla en la línea principal.
theological_decisions:
- issue: ‘Tu pueblo’ frente a una posible lectura comunitaria más amplia
  english_pob_reading: half of your people
  chosen_spanish_reading: la mitad de tu pueblo
  alternative_spanish_readings:
  - la mitad de tu gente
  - la mitad de tu comunidad
  rationale: Se preserva el lenguaje de pertenencia del pueblo sin sustituirlo por una paráfrasis sociológica; el texto no exige aclaración doctrinal adicional.
  doctrine_reference: pueblo de Dios / comunidad del pacto
- issue: ‘Mi madre’ como imagen de la comunidad o de Sión
  english_pob_reading: my mother
  chosen_spanish_reading: mi madre
  alternative_spanish_readings:
  - mi madre [como figura de la comunidad]
  - mi madre [Sión]
  rationale: La POB inglesa no impone una aclaración interpretativa en el cuerpo; por fidelidad, la traducción deja la imagen abierta y no la fija en una glosa interpretativa.
  doctrine_reference: Sión como madre simbólica
