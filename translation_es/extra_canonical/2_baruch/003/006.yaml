translation:
  language: es
  text: ¿O cómo se hablará de tu alabanza? ¿O a quién se explicará lo que está en tu ley?
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: teshbḥātāk / praises
  english_pob_choice: your praise
  chosen_spanish: tu alabanza
  alternatives_spanish:
  - tus alabanzas
  - tu elogio
  lexicon: teshbḥā (praise, laudation)
  rationale: El siríaco usa un sustantivo singular de alabanza; por eso mantengo el singular en español (“alabanza”), como indica la última revisión inglesa. “Elogio” sería más abstracto y menos natural en registro bíblico.
- source_word: netpashaq mā d-b-nāmōsāk
  english_pob_choice: what is in your law be explained
  chosen_spanish: lo que está en tu ley se explicará
  alternatives_spanish:
  - lo que hay en tu ley se interpretará
  - lo que está en tu ley se dará a conocer
  lexicon: pashaq / pšq (explain, interpret, expound)
  rationale: “Explicar” reproduce bien la idea de exponer o interpretar el contenido de la ley para oyentes concretos, sin cargar innecesariamente hacia el comentario técnico. Mantiene el valor pasivo/impersonal del giro interrogativo.
- source_word: nāmōsā / law
  english_pob_choice: your law
  chosen_spanish: tu ley
  alternatives_spanish:
  - tu Torá
  - tu instrucción
  lexicon: nāmōsā (law, teaching)
  rationale: “Ley” es la opción más directa y transparente aquí, y corresponde al inglés POB. “Torá” añadiría una terminología más técnica que el verso no obliga a usar.
- source_word: aw aykannā nēmar
  english_pob_choice: Or how will one speak
  chosen_spanish: ¿O cómo se hablará
  alternatives_spanish:
  - ¿O cómo hablará uno
  - ¿O de qué modo se hablará
  lexicon: ʾykannā / nēmar (how / it will be said, one will speak)
  rationale: La construcción impersonal en español (“se hablará”) conserva el matiz general e indefinido del siríaco mejor que un sujeto explícito. Además suena natural en un registro litúrgico-formal.
theological_decisions:
- issue: Relación entre alabanza divina y ley revelada
  english_pob_reading: Or how will one speak of your praise? Or to whom will what is in your law be explained?
  chosen_spanish_reading: ¿O cómo se hablará de tu alabanza? ¿O a quién se explicará lo que está en tu ley?
  alternative_spanish_readings:
  - ¿O cómo se proclamará tu alabanza? ¿O a quién se interpretará lo que está en tu ley?
  - ¿O cómo se hablará de tus alabanzas? ¿O a quién se explicará lo que hay en tu ley?
  rationale: 'El verso formula dos preguntas retóricas paralelas: la insuficiencia del lenguaje humano para abarcar la alabanza de Dios y la necesidad de un destinatario apto para recibir la enseñanza de la ley. La traducción conserva esa tensión sin fusionar ambas cláusulas ni convertirlas en una sola idea.'
  doctrine_reference: Poética de la incomprensibilidad divina y de la revelación pedagógica de la ley; no es una afirmación doctrinal sistemática, sino retórica sapiencial/apocalíptica.
translation_notes:
  revision_awareness: Tomé en cuenta la corrección auditada que restauró la segunda pregunta y ajustó el primer miembro a singular (“tu praise / tu alabanza”) conforme al siríaco teshbḥā. No seguí la lectura anterior errónea que hablaba de “aquellos que son como tu pueblo”.
  spanish_consistency_notes:
  - Mantengo el registro bíblico formal y la sintaxis paralela de dos preguntas retóricas.
  - Evito “SEÑOR” porque no aparece un sustituto del nombre divino en este verso; el texto se dirige a Dios en segunda persona.
  - Uso “ley” para nāmōsā por coherencia con el propio verso y con el paralelismo de instrucción/exposición.
