  text: Si en verdad destruyes tu ciudad y entregas tu santuario por un tiempo y dispersas a tu pueblo entre las naciones para que ya no exista,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: destroy your city
  english_pob_choice: destroy your city
  chosen_spanish: destruyes tu ciudad
  alternatives_spanish:
  - arrasas tu ciudad
  - destruyes la ciudad
  lexicon: destruir
  rationale: El inglés POB mantiene el sentido de destrucción total sin añadir matices no atestiguados; en español, «destruyes tu ciudad» conserva esa fuerza de forma natural y directa.
- source_word: give over your sanctuary
  english_pob_choice: give over your sanctuary
  chosen_spanish: entregas tu santuario
  alternatives_spanish:
  - entregas tu santuario en manos de אחרים
  - abandonas tu santuario
  lexicon: entregar
  rationale: El ajuste inglés a «give over» favorece un giro idiomático de rendición/cesión. «Entregas tu santuario» reproduce esa cesión sin sobreespecificar el modo.
- source_word: for a time
  english_pob_choice: for a time
  chosen_spanish: por un tiempo
  alternatives_spanish:
  - por un tiempo determinado
  - por un tiempo breve
  lexicon: tiempo
  rationale: La expresión española más fiel y sobria es «por un tiempo»; mantiene la indeterminación temporal del original sin intensificarla.
- source_word: scatter your people among the nations
  english_pob_choice: scatter your people among the nations
  chosen_spanish: dispersas a tu pueblo entre las naciones
  alternatives_spanish:
  - esparces a tu pueblo entre las naciones
  - dispersas a tu pueblo entre los pueblos
  lexicon: dispersar
  rationale: «Dispersas» conserva la imagen de dispersión de un pueblo entre naciones, que el inglés POB mantiene con claridad.
- source_word: so that they may be no more
  english_pob_choice: so that they may be no more
  chosen_spanish: para que ya no exista más
  alternatives_spanish:
  - para que ya no sean más
  - hasta que dejen de existir
  lexicon: existir
  rationale: La cláusula final expresa la finalidad extrema del juicio. En español, «ya no exista más» comunica esa desaparición total sin añadir un sujeto explícito que el texto no exige.
theological_decisions:
- issue: Destierro y aniquilación aparente del pueblo
  english_pob_reading: If indeed you destroy your city and give over your sanctuary for a time and scatter your people among the nations so that they may be no more
  chosen_spanish_reading: Si en verdad destruyes tu ciudad y entregas tu santuario por un tiempo, y dispersas a tu pueblo entre las naciones, para que ya no exista más
  alternative_spanish_readings:
  - Si realmente destruyes tu ciudad y entregas tu santuario por un tiempo, y dispersas a tu pueblo entre las naciones, para que ya no haya más
  - Si en verdad destruyes tu ciudad y cedes tu santuario por un tiempo, y dispersas a tu pueblo entre las naciones, para que desaparezca
  rationale: 'El texto presenta una fórmula de juicio severo: destrucción de la ciudad, cesión del santuario, dispersión entre naciones y resultado de desaparición. La redacción española conserva ese encadenamiento sin suavizar la gravedad ni convertirla en mera metáfora.'
  doctrine_reference: 2 Baruch 3:5; tema del juicio/exilio del pueblo
- issue: Condicional enfático inicial
  english_pob_reading: If indeed
  chosen_spanish_reading: Si en verdad
  alternative_spanish_readings:
  - Si realmente
  - Si de veras
  rationale: «If indeed» refuerza la condición con énfasis. «Si en verdad» comunica ese matiz con sobriedad y naturalidad en español.
  doctrine_reference: 2 Baruch 3:5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó «give your sanctuary over» a «give over your sanctuary» por idiomaticidad; por eso el español usa una construcción verbal simple y directa («entregas tu santuario») en lugar de una perífrasis más pesada.
  spanish_consistency_notes:
  - Se preservó el tono condicional enfático del inglés POB con «Si en verdad».
  - No se introdujo lenguaje litúrgico sustitutivo como «SEÑOR» o «templo»; se mantuvo «Yahvé» implícito solo en caso de que aparezca en el contexto inmediato, pero aquí el versículo conserva la segunda persona directa del original.
  - Se evitó suavizar «so that they may be no more»; la versión española mantiene la idea de desaparición total con «ya no exista más».
