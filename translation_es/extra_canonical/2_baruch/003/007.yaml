translation:
  language: es
  text: Y para que vean respecto de esta ciudad, por causa de la maldad de sus obras, que esta ciudad es como una viuda amarga, y que su humillación es como botín dulce.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mn / concerning this city
  english_pob_choice: see concerning this city
  chosen_spanish: vean acerca de esta ciudad
  alternatives_spanish:
  - vean respecto de esta ciudad
  - vean sobre esta ciudad
  lexicon: mn
  rationale: El preposición siríaca expresa el objeto de la visión/consideración; ‘acerca de’ comunica bien el matiz de ‘concerning’ sin sugerir movimiento físico desde la ciudad.
- source_word: evil of her deeds
  english_pob_choice: because of the evil of her deeds
  chosen_spanish: por causa de la maldad de sus obras
  alternatives_spanish:
  - a causa de la maldad de sus obras
  - por el mal de sus obras
  lexicon: ra / evil; 'deeds'
  rationale: ‘Maldad’ conserva el juicio moral fuerte del pasaje, y ‘sus obras’ mantiene la referencia a las acciones de la ciudad/personificación femenina sin suavizarla.
- source_word: bitter widow
  english_pob_choice: a bitter widow
  chosen_spanish: una viuda amarga
  alternatives_spanish:
  - una viuda triste
  - una viuda dolorosa
  lexicon: widow metaphor
  rationale: Se conserva la metáfora literal. ‘Amarga’ mantiene la cualidad afectiva negativa que el inglés POB recoge con ‘bitter’ sin explicitarla como mero estado emocional.
- source_word: humiliation
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - afrenta
  - deshonra
  lexicon: lexical field of shame/abjection
  rationale: ‘Humillación’ es la correspondencia más directa y clara en español moderno para el abatimiento vergonzoso expresado en el texto.
- source_word: sweet spoil
  english_pob_choice: sweet spoil
  chosen_spanish: botín dulce
  alternatives_spanish:
  - presa dulce
  - saqueo agradable
  lexicon: booty/spoil metaphor
  rationale: ‘Botín’ preserva la imagen de ganancia obtenida por conquista o saqueo; ‘dulce’ conserva la paradoja valorativa del original y del inglés POB.
theological_decisions:
- issue: Personificación femenina de la ciudad
  english_pob_reading: this city is like a bitter widow, and that her humiliation is like sweet spoil
  chosen_spanish_reading: esta ciudad es como una viuda amarga, y que su humillación es como botín dulce
  alternative_spanish_readings:
  - esta ciudad es como una viuda amarga, y su humillación como botín dulce
  - esta ciudad es como una viuda amarga, y que su humillación es como presa dulce
  rationale: Mantener la ciudad como sujeto personificado y femenino respeta el paralelismo del texto y la imagen profética sin convertirla en una abstracción neutra.
  doctrine_reference: Personificación profética y lamento sobre Sion/Jerusalén en la literatura bíblica
- issue: Evaluación moral de la ruina de la ciudad
  english_pob_reading: because of the evil of her deeds
  chosen_spanish_reading: por causa de la maldad de sus obras
  alternative_spanish_readings:
  - a causa de la maldad de sus obras
  - por su maldad en las obras
  rationale: 'La frase conserva la causalidad moral explícita: la ruina/aflicción no es accidental sino atribuida a la maldad de sus actos.'
  doctrine_reference: Responsabilidad moral y retribución en literatura deuterocanónica/parenética
translation_notes:
  revision_awareness: La redacción sigue el último estado inglés auditado, que aclaró la relación causal y el paralelismo final. En español se resolvió el mismo punto con una coordinación clara (‘y que... y que...’) sin añadir contenido nuevo ni suavizar las metáforas.
  spanish_consistency_notes:
  - Se mantiene ‘ciudad’ y la personificación femenina con pronombres y posesivos femeninos.
  - Se evita ‘SEÑOR’ u otras sustituciones innecesarias porque el verso no contiene el nombre divino.
  - Se conservan metáforas concretas (‘viuda amarga’, ‘botín dulce’) en lugar de paráfrasis explicativas.
