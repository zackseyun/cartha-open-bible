    rationale: Aunque refleja de cerca 'see concerning this city', en español 'ver acerca de' no es una construcción idiomática. Un ajuste menor mejora la legibilidad sin apartarse del valor semántico de la preposición siríaca.
  - severity: low
    issue: '''botín dulce'' suena extraño en español'
    rationale: La extrañeza parece intencional y viene del original/POB inglés; no requiere cambio obligatorio, pero conviene reconocer que es una metáfora dura y poco idiomática.
  revised_spanish_text: Y para que vean respecto de esta ciudad, por causa de la maldad de sus obras, que esta ciudad es como una viuda amarga, y que su humillación es como botín dulce.
  revision_rationale: 'Se hizo una reparación mínima de naturalidad en español: ''acerca de'' se cambió por ''respecto de'' después de ''vean'', porque expresa mejor el sentido de ''concerning'' sin introducir paráfrasis ni la idea física de ''desde''. No se alteraron las metáforas principales ni la estructura paralela del versículo.'
