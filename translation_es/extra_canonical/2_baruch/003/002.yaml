review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien el contenido siríaco y la corrección principal del audit trail en inglés: incluye la cláusula condicional inicial (''Si he hallado gracia...''), mantiene ''tus misericordias'', ''mi espíritu'', ''ir a mis padres'' y ''la destrucción de mi madre''. No obstante, la expresión ''para ti'' para ܠܘܬܟ suena menos fiel y menos idiomática que una formulación de dirección personal como ''a ti mismo'' o simplemente ''a ti''.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'tomen pronto mi espíritu para ti' suena poco natural en español. También conviene evitar una nota léxica innecesaria sobre 'gracia/favor' cuando el inglés POB no la exige; el español principal ya funciona bien sin nota. Una ligera reparación mejora naturalidad sin perder literalidad.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto. ''gracia'', ''misericordias'' y ''espíritu'' están bien elegidos. No aparece vocabulario sujeto a carve-outs especiales. La decisión principal a ajustar es sintáctica: ܠܘܬܟ se expresa mejor como ''a ti'' en español en este contexto de recepción del espíritu.'
  issues:
  - severity: medium
    issue: '''para ti'' es una realización poco idiomática de ''to yourself'''
    rationale: En español, 'que tus misericordias tomen pronto mi espíritu para ti' suena forzado. 'te lleven pronto mi espíritu a ti' o 'tomen pronto mi espíritu a ti' sería más natural; mejor aún, reestructurar a 'recibas pronto mi espíritu' evita torpeza y conserva el sentido.
  - severity: low
    issue: La nota [a] sobre 'gracia/favor' no está respaldada por una necesidad del audit trail
    rationale: El inglés POB no conserva aquí una nota léxica obligatoria; además, 'gracia' es plenamente adecuado en el texto principal. Mantener una nota opcional puede distraer sin resolver una ambigüedad real en español.
  revised_spanish_text: Si he hallado gracia delante de ti, que tus misericordias reciban pronto mi espíritu ante ti, para que yo vaya a mis padres y no vea la destrucción de mi madre.
  revision_rationale: Se ajusta la cláusula central para evitar el giro poco natural 'para ti'. 'Reciban pronto mi espíritu ante ti' busca expresar la recepción del espíritu en la presencia de Dios con mejor español, manteniendo el sentido de movimiento hacia él. También se elimina la nota innecesaria sobre 'gracia/favor' porque no hace falta para la comprensión ni está exigida por la evidencia auditada.
