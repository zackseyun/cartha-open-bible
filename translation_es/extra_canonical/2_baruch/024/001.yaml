translation:
  language: es
  text: Porque vienen días en que se abrirán los libros, en los cuales están escritos los pecados de todos los que han pecado, y también los depósitos[a] en los que se reúne la justicia de todos los que han sido justos en la creación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Depósitos» traduce el valor concreto de ܓܙ̈ܐ; también puede entenderse como «tesorerías» o «almacenes», pero se conserva la imagen de un reservorio donde algo se guarda y se reúne.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܟܬܒ̈ܐ
  english_pob_choice: books
  chosen_spanish: libros
  alternatives_spanish:
  - registros
  - rollos
  lexicon: Payne Smith
  rationale: El registro auditado del POB prefiere mantener la imagen judicial de escritos celestiales. En español, «libros» conserva esa transparencia y la fuerza apocalíptica sin convertir la metáfora en una explicación.
- source_word: ܓܙ̈ܐ
  english_pob_choice: storehouses
  chosen_spanish: almacenes
  alternatives_spanish:
  - tesoros
  - tesorerías
  - depósitos
  lexicon: Payne Smith
  rationale: El contexto habla de algo en lo que la justicia «se recoge»; por eso «almacenes» comunica mejor la idea de reservorio concreto que una palabra más cultual o monetaria.
- source_word: ܙܕܝܩܘܬܐ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  - obras de justicia
  lexicon: Payne Smith
  rationale: La serie semántica del pasaje abarca tanto condición como conducta preservada ante Dios. «Justicia» permite sostener esa amplitud sin reducir el término a meras obras.
- source_word: ܙܕܝ̈ܩܐ
  english_pob_choice: those who are righteous
  chosen_spanish: los que han sido justos
  alternatives_spanish:
  - los justos
  - los rectos
  lexicon: Payne Smith
  rationale: Se eligió una forma verbal que refleje el estado reconocido en el texto y siga el ajuste del POB inglés a «have been righteous». «Los justos» sería más breve, pero menos explícito sobre el perfecto resultativo.
- source_word: ܒܩܕܝܡ / ܒܒܪܝܬܐ
  english_pob_choice: in creation
  chosen_spanish: en la creación
  alternatives_spanish:
  - desde la creación
  - en la obra creada
  lexicon: Payne Smith
  rationale: La frase española sigue de cerca el sintagma del original y del POB, sin introducir una paráfrasis causal o temporal que el siriaco no exige.
theological_decisions:
- issue: La imagen de los libros y los almacenes celestiales
  english_pob_reading: Heavenly books record sins; heavenly storehouses gather righteousness.
  chosen_spanish_reading: Los libros registran los pecados, y los almacenes recogen la justicia preservada ante Dios.
  alternative_spanish_readings:
  - Los libros contienen los pecados y los depósitos guardan la justicia
  - Los rollos registran los pecados y las tesorerías guardan la justicia
  rationale: 'La traducción conserva la tensión judicial del original: no se trata solo de memoria abstracta, sino de un registro y un reservorio preparados para el juicio. No se estrecha «justicia» a meros méritos, porque el texto es más amplio.'
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition) y §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó el inglés de «forbearance» a «patience» y «were righteous» a «have been righteous». En español se optó por una construcción que ya incorpora ese resultado perfecto («han sido justos») y por un léxico concreto («almacenes») coherente con el control siríaco.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o «Eterno» porque el versículo no contiene aquí el Tetragrámaton ni una cita directa de κύριος.
  - Se prefirió «justicia» en lugar de «rectitud» para mantener la continuidad con el campo jurídico-apocalíptico del pasaje.
  - Se mantuvo el orden del período para reflejar el paralelismo del original y no desactivar la imaginería dual de libros/almacenes.
