translation:
  language: es
  text: 'Y yo respondí y dije: «Pero mira, Señor, nadie conoce el número de las cosas que han pasado, ni de las que han de venir».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܘܥܢܝܬ ܘܐܡܪܬ
  english_pob_choice: And I answered and said
  chosen_spanish: Y yo respondí y dije
  alternatives_spanish:
  - Y contesté y dije
  - Y respondí y hablé
  lexicon: respuesta + decir
  rationale: Conserva la doble formulación semítica de responder y decir sin volverla redundante en español. «Respondí y dije» suena natural y mantiene el énfasis narrativo del original y de la versión inglesa.
- source_word: ܡܪܝܐ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: kyrios / mar
  rationale: En este contexto, la forma de tratamiento reverente y directa en español es «Señor». No se introduce «Yahvé» porque aquí el hablante se dirige a una figura con vocativo de respeto en el relato, no a una sustitución explícita del nombre divino en el texto fuente.
- source_word: ܠܐ ܝܕܥ ܐܢܫ ܡܢܝܢܐ
  english_pob_choice: no one knows the number
  chosen_spanish: nadie conoce el número
  alternatives_spanish:
  - nadie sabe el número
  - ninguna persona conoce la cantidad
  lexicon: know + number
  rationale: «Conocer el número» reproduce con fidelidad la construcción fuente y la de la traducción inglesa, manteniendo la idea de cuantificación exacta más que una simple vaguedad.
- source_word: ܕܥܒܪܘ
  english_pob_choice: of the things that have passed
  chosen_spanish: de las cosas que han pasado
  alternatives_spanish:
  - de las cosas pasadas
  - de lo que ya pasó
  lexicon: pass by / past
  rationale: «Han pasado» preserva el valor de acontecimientos ya transcurridos sin introducir interpretaciones adicionales. «Cosas» sigue la amplitud del original y de la inglesa.
- source_word: ܘܕܥܬܝܕܐ
  english_pob_choice: nor of the things that are to come
  chosen_spanish: ni de las que han de venir
  alternatives_spanish:
  - ni de las cosas que vendrán
  - ni de lo que está por venir
  lexicon: future come
  rationale: «Han de venir» conserva el matiz de futuro esperado o debido, cercano al inglés «are to come», sin endurecerlo en una mera predicción cronológica.
theological_decisions:
- issue: Forma de tratamiento al dirigirse a la figura divina
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Soberano
  rationale: El contexto inmediato muestra una oración o respuesta dirigida reverentemente; la traducción española debe sonar como vocativo directo. No hay base suficiente en este versículo para forzar el nombre propio Yahvé.
  doctrine_reference: Discernimiento del vocativo divino en contexto narrativo y orante; coherencia con el texto fuente y la lectura auditada de POB.
translation_notes:
  revision_awareness: La traducción inglesa auditada permanece sin cambios tras revisión. No hay notas textuales ni decisiones léxicas adicionales en el aparato inglés para este versículo; la versión española sigue directamente el patrón semítico del original Syriac con español idiomático y reverente.
  spanish_consistency_notes:
  - Se mantiene «Señor» como vocativo respetuoso en lugar de sustituirlo por «Yahvé», ya que el versículo no ofrece una señal textual explícita del nombre divino.
  - «No one knows the number» se vierte como «nadie conoce el número» para conservar la fuerza cuantificadora del original y la equivalencia con el audit trail inglés.
  - La coordinación «y respondí y dije» refleja la redundancia estilística semítica sin volverla rígida ni arcaizante.
