translation:
  language: es
  text: Y en ese tiempo tú y los muchos que están contigo verán la paciencia del Altísimo[a], que se ha manifestado a través de todas las generaciones, cómo ha tenido paciencia con todos los que nacen, tanto con los que pecan como con los que son justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «verás —tú, junto con los muchos que están contigo— la paciencia».'
    reason: Conserva la alternativa de orden/scope documentada en inglés, pero en una forma española gramatical y natural.
lexical_decisions:
- source_word: the patience of the Most High
  english_pob_choice: the patience of the Most High
  chosen_spanish: la paciencia del Altísimo
  alternatives_spanish:
  - la longanimidad del Altísimo
  - la paciencia del Dios Altísimo
  lexicon: patience
  rationale: '"Paciencia" expresa con naturalidad la cualidad divina de soportar y esperar; "Altísimo" conserva el título reverencial del original sin sustituirlo por una fórmula eclesiástica distinta. "Longanimidad" sería posible, pero suena más técnica y menos transparente para una lectura pública amplia.'
- source_word: you and the many who are with you
  english_pob_choice: you and the many who are with you
  chosen_spanish: tú y los muchos que están contigo
  alternatives_spanish:
  - tú y los muchos que contigo están
  - tú y la multitud que está contigo
  lexicon: many
  rationale: Conserva el sujeto compuesto y el matiz de pluralidad numerosa. "Los muchos" sigue de cerca el sentido del original y del inglés auditado, sin introducir una paráfrasis como "la multitud" que suaviza la forma.
- source_word: have been patient
  english_pob_choice: has been patient
  chosen_spanish: ha tenido paciencia
  alternatives_spanish:
  - ha sido paciente
  - ha mostrado paciencia
  lexicon: patience
  rationale: '"Ha tenido paciencia" es idiomático en español y mantiene la acción continua atribuida a Dios. "Ha sido paciente" también sería válido, pero "tener paciencia" reproduce mejor la dinámica verbal del texto.'
- source_word: those who sin and those who are righteous
  english_pob_choice: those who sin and those who are righteous
  chosen_spanish: los que pecan como con los que son justos
  alternatives_spanish:
  - los que pecan y los que son justos
  - los pecadores y los justos
  lexicon: righteous
  rationale: '"Los que son justos" conserva el paralelismo de participio descriptivo del original y evita convertirlo en una etiqueta más abstracta o moralizante. "Pecan" mantiene el sentido de acción continua o característica en el presente.'
theological_decisions:
- issue: El título divino "Most High" aplicado a Dios y su paciencia universal
  english_pob_reading: the patience of the Most High that has been through all generations
  chosen_spanish_reading: la paciencia del Altísimo, que ha estado a través de todas las generaciones
  alternative_spanish_readings:
  - la paciencia del Altísimo de todas las generaciones
  - la paciencia del Dios Altísimo a través de todas las generaciones
  rationale: Se mantiene la referencia directa a la paciencia divina como atributo permanente que atraviesa toda la historia humana. "Ha estado a través de todas las generaciones" preserva la idea de continuidad temporal sin convertirla en una explicación doctrinal añadida.
  doctrine_reference: atributos divinos; providencia y longanimidad de Dios
- issue: Inclusión de ambos grupos morales bajo la paciencia divina
  english_pob_reading: how he has been patient with all who are born, both those who sin and those who are righteous
  chosen_spanish_reading: cómo ha tenido paciencia con todos los que nacen, tanto con los que pecan como con los que son justos
  alternative_spanish_readings:
  - cómo ha tenido paciencia con todos los nacidos, tanto pecadores como justos
  - cómo es paciente con todos los nacidos, tanto con los que pecan como con los justos
  rationale: 'Se conserva el alcance universal del enunciado: la paciencia divina se extiende a todos los nacidos, sin excluir ni a quienes pecan ni a quienes son justos. El paralelismo se mantiene sin armonizarlo en una afirmación doctrinal más sistemática de la necesaria.'
  doctrine_reference: pecado humano universal; paciencia divina hacia justos e injustos
translation_notes:
  revision_awareness: La revisión inglesa reciente reordenó la cláusula para hacer más natural el verbo «will see» con su objeto; en español se siguió ese mismo flujo sintáctico, colocando primero el sujeto compuesto («tú y los muchos que están contigo») antes de «verán». No se adoptó una traducción con guiones porque el orden español ya resuelve la ambigüedad sin romper la fluidez.
  spanish_consistency_notes:
  - Se usa «Altísimo» para el divine title, coherente con la norma del proyecto para YHWH/κύριος cuando el contexto apunta al Dios de Israel.
  - Se mantiene «paciencia» en todo el versículo para conservar la cohesión léxica del atributo divino.
  - Se usa «justos» como adjetivo sustantivado, no «rectos», para reflejar el paralelismo más transparente en español bíblico moderno.
