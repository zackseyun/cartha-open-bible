    reason: Conserva la alternativa de orden/scope documentada en inglés, pero en una forma española gramatical y natural.
  revision_rationale: Se ajusta una expresión temporal-teológica torpe a una formulación idiomática que mantiene la misma idea de continuidad histórica, y se corrige la nota alternativa para que su español sea natural y concordante.
