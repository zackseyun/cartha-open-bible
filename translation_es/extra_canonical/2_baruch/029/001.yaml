  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. 'está destinado' refleja bien ܕܥܬܝܕ según la justificación auditada, y 'lo experimentarán' sigue la decisión POB para ܢܪܓܫܘܢ con una nota que preserva 'percibirán'/'sentirán' como alternativas.
  issues:
