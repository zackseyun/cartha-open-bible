translation:
  language: es
  text: 'Y él me respondió y dijo: «Todo lo que está destinado a suceder en aquel tiempo sucederá sobre toda la tierra; por tanto, todos los que viven lo experimentarán[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «percibirán» o «sentirán».
    reason: lexical_alternative
lexical_decisions:
- source_word: ܘܥܢܐ ܘܐܡܪ ܠܝ
  english_pob_choice: And he answered and said to me
  chosen_spanish: Y él me respondió y dijo a mí
  alternatives_spanish:
  - Y me respondió y dijo
  - Y él respondió y me dijo
  lexicon: CAL
  rationale: Se conserva la fórmula narrativa semítica con verbo de respuesta y verbo de habla. En español, 'me dijo' suena más natural; aquí se mantiene 'dijo a mí' implícitamente en la secuencia para no perder el paralelismo del original.
- source_word: ܕܥܬܝܕ
  english_pob_choice: destined
  chosen_spanish: está destinado
  alternatives_spanish:
  - está por suceder
  - está preparado
  - está destinado a ocurrir
  lexicon: CAL
  rationale: La lexicalización inglesa capta el matiz de destino/preparación más que un simple futuro. En español, 'está destinado' preserva esa fuerza apocalíptica sin volverla excesivamente interpretativa.
- source_word: ܕܥܬܝܕ ܠܡܗܘܐ
  english_pob_choice: Whatever is destined to happen
  chosen_spanish: Todo lo que está destinado a suceder
  alternatives_spanish:
  - Lo que esté por suceder
  - Todo lo que vaya a ocurrir
  - Todo lo que está preparado para ocurrir
  lexicon: CAL
  rationale: Se mantiene el valor global de inevitabilidad del evento futuro. 'Suceder' es más natural en español que una calca de 'happen' y conserva el rango general del original.
- source_word: ܒܗܘ ܙܒܢܐ
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  - en aquel momento
  lexicon: CAL
  rationale: '''Aquel tiempo'' conserva la referencia escatológica y la deixis temporal solemne del contexto apocalíptico.'
- source_word: ܥܠ ܟܠܗ̇ ܐܪܥܐ
  english_pob_choice: upon the whole earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - en toda la tierra
  - sobre la tierra entera
  - por toda la tierra
  lexicon: CAL
  rationale: '''Sobre'' reproduce bien la preposición de alcance que da la idea de impacto extendido; ''toda la tierra'' mantiene la totalidad territorial del juicio o evento.'
- source_word: ܢܪܓܫܘܢ
  english_pob_choice: will experience
  chosen_spanish: lo experimentarán
  alternatives_spanish:
  - lo percibirán
  - lo sentirán
  - lo notarán
  lexicon: CAL
  rationale: Se sigue la decisión inglesa de traducir el verbo de percepción/sensación como 'experimentar', porque el contexto indica atravesar o padecer el acontecimiento, no solo percibirlo mentalmente.
translation_notes:
  revision_awareness: La versión inglesa revisada restringe correctamente el pasaje a 2 Baruc 29:1 y evita material de los versículos siguientes; el español sigue solo el contenido de este versículo, sin incorporar elementos de 29:2-8.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque aquí no aparece el Tetragrámaton ni una cita del nombre divino.
  - Se mantiene un tono apocalíptico solemne sin arcaísmos innecesarios.
  - '''Experimentarán'' conserva la elección lexical del audit trail inglés para ܢܪܓܫܘܢ.'
  - La puntuación y las comillas siguen el uso español moderno, con la cita directa marcada claramente.
