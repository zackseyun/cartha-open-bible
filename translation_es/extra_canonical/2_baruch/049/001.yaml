translation:
  language: es
  text: 'Pero aun así, te preguntaré, oh Poderoso, e imploraré misericordia al que hizo todo: ¿en qué forma vivirán los que vivan en sus días? ¿O cómo se preservará el esplendor de los que vengan después de ese tiempo? ¿Tomarán entonces esta forma presente, y esas figuras humanas permanecerán entonces y quedarán establecidas como seres vivientes? ¿O quizá cambiarás estas cosas que han estado en el mundo, así como el mundo mismo?'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܐܡܪ / ܐܫܐܠ
  english_pob_choice: I will ask you / seek mercy
  chosen_spanish: te preguntaré / buscaré misericordia
  alternatives_spanish:
  - te haré una petición
  - pediré misericordia
  lexicon: Payne Smith
  rationale: 'El paralelismo conserva dos movimientos distintos: dirigir la palabra al destinatario y luego suplicar misericordia. En español, ''buscaré misericordia'' refleja bien el matiz de súplica persistente del contexto apocalíptico.'
- source_word: ܚܝܠܬܢܐ
  english_pob_choice: O Mighty One
  chosen_spanish: oh Poderoso
  alternatives_spanish:
  - oh Todopoderoso
  - oh Fuerte
  lexicon: Payne Smith
  rationale: La forma vocativa apunta a la fortaleza/poder divino. 'Poderoso' mantiene la fuerza del apelativo sin introducir una perífrasis más interpretativa.
- source_word: ܕܥܒܕ ܟܠ
  english_pob_choice: him who made all
  chosen_spanish: aquel que hizo todo
  alternatives_spanish:
  - el que hizo todo
  - al que hizo todo
  lexicon: Payne Smith
  rationale: '''Hizo todo'' conserva el alcance total del creador sin añadir ''cosas'' de manera innecesaria; ''aquel que'' funciona bien como relativo reverente en español.'
- source_word: ܕܡܘܬܐ
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - semejanza
  - aspecto
  lexicon: Payne Smith
  rationale: Aquí no se trata de 'muerte' sino de condición o configuración visible. 'Forma' es la opción española más directa y suficientemente amplia para la pregunta sobre la continuidad corporal.
- source_word: ܙܥܘܪܬܗ
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - brillo
  - gloria
  lexicon: Payne Smith
  rationale: La tradición textual en el contexto apunta a una idea de resplandor o magnificencia. 'Esplendor' preserva esa intensidad sin cerrar el sentido a una sola imagen.
- source_word: ܒܢܝܢܫܐ
  english_pob_choice: human likenesses
  chosen_spanish: semblantes humanos
  alternatives_spanish:
  - figuras humanas
  - apariencias humanas
  lexicon: Payne Smith
  rationale: '''Likenesses'' aquí puede referirse a configuraciones humanas visibles. ''Semblantes humanos'' mantiene la idea de apariencia/forma humana sin volverla demasiado técnica.'
- source_word: ܢܬܩܢܘܢ / ܢܬܩܢܢ
  english_pob_choice: be established as living beings
  chosen_spanish: serán establecidos como seres vivos
  alternatives_spanish:
  - serán constituidos como vivientes
  - serán afirmados como vivos
  lexicon: Payne Smith
  rationale: La frase final no dice simplemente 'vivirán', sino que sugiere quedar establecidos en vida. 'Serán establecidos como seres vivos' conserva ese matiz de constitución/confirmación en vida.
- source_word: ܡܚܠܦ
  english_pob_choice: change
  chosen_spanish: cambiarás
  alternatives_spanish:
  - alterarás
  - transformarás
  lexicon: Payne Smith
  rationale: El verbo mantiene la pregunta abierta entre continuidad y transformación. 'Cambiarás' es lo bastante amplio para no resolver la tensión apocalíptica que el texto deja en suspenso.
theological_decisions:
- issue: Continuidad y transformación de los justos y del mundo en la era venidera
  english_pob_reading: 'Render Baruch’s question as genuinely open: present form may either remain in some way or be changed.'
  chosen_spanish_reading: 'La pregunta queda genuinamente abierta: la forma presente podría permanecer de algún modo, o bien ser cambiada.'
  alternative_spanish_readings:
  - La traducción afirmaría continuidad corporal idéntica
  - La traducción afirmaría transformación total en un nuevo modo de ser
  rationale: El pasaje formula una consulta, no una solución. La redacción española conserva la tensión entre permanencia y cambio sin forzar una doctrina cerrada sobre la resurrección.
  doctrine_reference: 2 Baruch 49:1; continuidad/resurrección escatológica
translation_notes:
  revision_awareness: 'Se ha corregido la discordancia anterior entre nota y texto: no se incluyen notas sin anclaje. La formulación española sigue de cerca el sentido del siríaco y del auditrial en inglés, manteniendo la ambigüedad sobre forma, esplendor y cambio.'
  spanish_consistency_notes:
  - Se emplea 'Dios' implícito solo donde el original lo requiere por contexto; aquí el vocativo es 'oh Poderoso'.
  - '''Forma'' traduce ܕܡܘܬܐ en sentido de configuración/apariencia, no como ''muerte''.'
  - '''Esplendor'' conserva la lectura difícil del contexto sobre la condición futura.'
  - No se usan marcas de nota al pie para evitar anclajes no presentes en el texto.
