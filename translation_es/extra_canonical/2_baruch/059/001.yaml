translation:
  language: es
  text: 'Escucha lo que es la gran nube que viste subir del mar e ir y cubrir esta tierra: es el mundo que su poder hizo cuando consideró hacer la creación. Y cuando la palabra salió de delante de él, la estructura del mundo se alzó, muy pequeña, y fue establecida conforme a lo que se buscaba que llegara a ser.


    Y en cuanto a las primeras aguas negras que viste descender sobre ella desde la nube, esto es el primer pecado, la transgresión que cometió el primer Adán. Porque cuando pecó, la muerte fue puesta en movimiento, aunque no era su tiempo; y el duelo fue dado a conocer, y los dolores fueron preparados, y el sufrimiento fue creado, y el trabajo penoso se completó, y la grandeza comenzó a ser abatida.


    Y en cuanto al último día, que fue mostrado en una forma y tomó una semejanza, sabe que el tiempo será examinado, y la ley de la humanidad[a] será medida, y su fuerza será probada. Por tanto, Adán, mientras era uno que había escuchado de Dios algo de lo que había de suceder, consideró la liberación de los muertos que le había sido dada, y lo que le había sido mandado por Dios. Siguió considerándolo, e ideó cinco pensamientos. Porque se hizo a sí mismo responsable; también hizo responsables a los ángeles. Y aun en aquel tiempo en que fue creado, se le mostró una visión: las fieras, y los elementos con fuego. Así que Dios reunió en Edén, a la semejanza de los que habían sido creados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la medida de la humanidad».'
    reason: alternative_reading
lexical_decisions:
- source_word: ܩܘܝܡܐ ܕܥܠܡܐ
  english_pob_choice: the structure of the world
  chosen_spanish: la estructura del mundo
  alternatives_spanish:
  - el establecimiento del mundo
  - la fundación del mundo
  - el armazón del mundo
  lexicon: Payne Smith
  rationale: Mantiene la idea concreta de algo que se alza/queda en pie y luego es establecido, sin reducirla a una abstracción demasiado teológica.
- source_word: ܚܛܗܐ / ܡܬܒܪܝܢܘܬܐ
  english_pob_choice: the first sin, the transgression
  chosen_spanish: el primer pecado, la transgresión
  alternatives_spanish:
  - la primera falta, la transgresión
  - el primer pecado, el sobrepasamiento
  lexicon: Payne Smith
  rationale: Conserva la doble expresión enfática del siríaco con dos términos españoles que distinguen falta moral y cruce de límite.
- source_word: ܐܬܬܙܝܥ ܡܘܬܐ
  english_pob_choice: death was stirred up
  chosen_spanish: la muerte fue puesta en movimiento
  alternatives_spanish:
  - la muerte fue despertada
  - la muerte fue agitada
  lexicon: Payne Smith
  rationale: En español, 'puesta en movimiento' comunica activación causal sin sonar artificial; conserva la fuerza del verbo sin suavizarla demasiado.
- source_word: ܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ
  english_pob_choice: greatness began to be brought low
  chosen_spanish: la grandeza comenzó a ser abatida
  alternatives_spanish:
  - la majestad comenzó a ser humillada
  - la grandeza empezó a descender
  lexicon: Payne Smith
  rationale: '''Abatida'' preserva el movimiento descendente y la pérdida de altura/dignidad con tono bíblico natural en español.'
- source_word: ܢܘܡܫܐ ܕܐܢܫܘܬܐ
  english_pob_choice: the measure of humanity
  chosen_spanish: la ley de la humanidad
  alternatives_spanish:
  - la norma de la humanidad
  - la medida de la humanidad
  - la regla de la humanidad
  lexicon: Payne Smith
  rationale: La revisión textual señala que ܢܘܡܫܐ/ܢܘܡܣܐ remite a 'ley', 'norma' o 'regla'. En este contexto, 'ley' es la opción más clara y fiel, porque el pasaje enumera examen, medición y prueba como lenguaje judicial/escatológico.
- source_word: ܫܘܒܩܢܐ ܕܡ̈ܝܬܐ
  english_pob_choice: the release of the dead
  chosen_spanish: la liberación de los muertos
  alternatives_spanish:
  - la liberación de los difuntos
  - el rescate de los muertos
  - la salida de los muertos
  lexicon: Payne Smith
  rationale: El sintagma es difícil; 'liberación' mantiene la apertura semántica de 'release' y suena más natural que una calca rígida en español.
- source_word: ܡܚܝܒܢܘܗܝ
  english_pob_choice: made liable
  chosen_spanish: se hizo a sí mismo responsable
  alternatives_spanish:
  - se hizo a sí mismo culpable
  - se volvió responsable
  - se hizo sujeto a culpa
  lexicon: Payne Smith
  rationale: El siríaco tiene fuerza judicial. 'Responsable' conserva la idea de quedar bajo carga/obligación; en el contexto, el reflexivo transmite que Adán incurre en esa condición por su acto.
- source_word: ܐܣܛܘܟܣܐ
  english_pob_choice: the elements
  chosen_spanish: los elementos
  alternatives_spanish:
  - los principios elementales
  - las fuerzas elementales
  - los rudimentos
  lexicon: Payne Smith
  rationale: El préstamo griego se entiende de forma más directa como 'elementos' en un listado cosmológico junto a las fieras.
- source_word: ܚܝܘܬܐ ܡܪܝܪܬܐ
  english_pob_choice: the fierce beasts
  chosen_spanish: las fieras
  alternatives_spanish:
  - las bestias fieras
  - los animales feroces
  - las bestias salvajes
  lexicon: Payne Smith
  rationale: La expresión es visionaria y compacta; 'fieras' comunica bien la imagen de animales terribles o feroces sin sobreexplicar.
- source_word: ܒܥܕܢ
  english_pob_choice: in Eden
  chosen_spanish: en Edén
  alternatives_spanish:
  - en el Edén
  lexicon: Payne Smith
  rationale: 'La revisión corrige una lectura errónea: aquí el siríaco indica claramente el lugar ''en Edén''.'
- source_word: ܝܘܡܐ ܐܚܪܝܐ
  english_pob_choice: the last day
  chosen_spanish: el último día
  alternatives_spanish:
  - el día postrero
  - el último tiempo
  lexicon: Payne Smith
  rationale: ܝܘܡܐ significa 'día', por lo que 'día' debe conservarse para no perder el matiz escatológico concreto.
theological_decisions:
- issue: Adán como desencadenante de la muerte y del sufrimiento
  english_pob_reading: The text links Adam's first transgression with death being activated before its appointed time.
  chosen_spanish_reading: El texto vincula el primer pecado de Adán con la activación de la muerte antes de su tiempo señalado.
  alternative_spanish_readings:
  - El texto solo dice que la muerte fue conocida.
  - La frase podría leerse de modo puramente retórico, sin causalidad.
  rationale: 'La sintaxis siríaca presenta una cadena causal: pecado, muerte, duelo, dolores, sufrimiento y trabajo. La traducción conserva esa teología apocalíptica sin expandirla más allá de lo que el texto afirma.'
  doctrine_reference: 'Cartha project doctrine: preserve original-witness theological force without smoothing'
- issue: La responsabilidad de los ángeles
  english_pob_reading: The draft retains the difficult statement that Adam also made the angels liable.
  chosen_spanish_reading: Se conserva la afirmación difícil de que Adán también hizo responsables a los ángeles.
  alternative_spanish_readings:
  - El texto podría aludir a testigos celestiales y no a culpa angélica estricta.
  - La frase quizá refleje una corrupción textual.
  rationale: Aunque es una expresión comprimida y difícil, el siríaco transmitido menciona ángeles en relación con la responsabilidad derivada del acto de Adán. Conviene no diluir esa afirmación.
  doctrine_reference: 'Cartha project doctrine: transparency where the source is difficult'
- issue: La liberación de los muertos
  english_pob_reading: The phrase is left deliberately literal as 'the release of the dead.'
  chosen_spanish_reading: Se traduce de manera deliberadamente abierta como 'la liberación de los muertos'.
  alternative_spanish_readings:
  - la resurrección de los muertos
  - la remisión respecto de los muertos
  rationale: El siríaco no obliga con certeza a una formulación doctrinal específica; 'liberación' mantiene la ambigüedad útil y la evidencia textual.
  doctrine_reference: 'Cartha project doctrine: prefer honesty over false exactness'
translation_notes:
  revision_awareness: Se incorporó la corrección crítica que lee ܢܘܡܫܐ como 'ley/norma' más que 'medida', la lectura correcta de ܒܥܕܢ como 'en Edén', la de ܝܘܡܐ ܐܚܪܝܐ como 'el último día', y la identificación de ܚܝܘܬܐ ܡܪܝܪܬܐ como 'las fieras'. También se mantuvo la transparencia sobre la dificultad de 'los muertos' y sobre la responsabilidad atribuida a los ángeles.
  spanish_consistency_notes:
  - Se usa 'Dios' para ܐܠܗܐ y 'Adán' para el primer hombre.
  - Se conserva 'carne' no porque aparezca aquí, sino para mantener consistencia terminológica del proyecto cuando surjan pasajes afines.
  - Se evita 'SEÑOR' como sustituto del nombre divino, ya que este versículo no lo requiere.
  - La puntuación separa con claridad las tres unidades del pasaje, siguiendo la progresión del siríaco.
