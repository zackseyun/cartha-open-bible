translation:
  language: es
  text: Porque ciertamente la ira se encenderá contra ustedes a su tiempo señalado; pues ahora está contenida por la longanimidad, como con un freno.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: wrath
  english_pob_choice: wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - el furor
  - la cólera
  lexicon: ira
  rationale: El sustantivo español 'ira' comunica bien la fuerza de 'wrath' sin añadir matiz más coloquial o excesivamente emotivo. Mantiene el tono judicial y escatológico del pasaje.
- source_word: will be aroused
  english_pob_choice: will be aroused
  chosen_spanish: se levantará
  alternatives_spanish:
  - será despertada
  - será suscitada
  lexicon: levantarse
  rationale: La imagen verbal de un despertar o surgimiento de la ira se vierte con naturalidad en español como 'se levantará', conservando el carácter inminente y activo del original.
- source_word: at its appointed time
  english_pob_choice: at its appointed time
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - en su momento designado
  - a su tiempo fijado
  lexicon: tiempo señalado
  rationale: '''Tiempo señalado'' expresa bien una fecha o momento determinado por designio, y refleja el valor de appointment/appointed time sin forzar una expresión técnica.'
- source_word: longsuffering
  english_pob_choice: longsuffering
  chosen_spanish: la longanimidad
  alternatives_spanish:
  - la paciencia
  - la longanimidad de Dios
  lexicon: longanimidad
  rationale: Se conserva el término 'longanimidad' para mantener la precisión teológica y la diferencia entre paciencia ordinaria y paciencia perseverante, acorde con la tradición léxica bíblica.
- source_word: as by a bridle
  english_pob_choice: as by a bridle
  chosen_spanish: como con un freno
  alternatives_spanish:
  - como con rienda
  - como con un bocado
  lexicon: freno
  rationale: '''Freno'' reproduce de forma clara la imagen de restricción o control. Es un equivalente idiomático y comprensible en español para la metáfora ecuestre del original.'
theological_decisions:
- issue: La ira futura aparece retenida por la longanimidad
  english_pob_reading: for now it is restrained by longsuffering
  chosen_spanish_reading: pues ahora está contenida por la longanimidad
  alternative_spanish_readings:
  - pues ahora se la contiene por la paciencia
  - pues ahora está frenada por la paciencia
  rationale: La redacción preserva la tensión entre juicio futuro e impedimento presente. 'Está contenida' mantiene la idea de restricción pasiva sin resolverla en una explicación más interpretativa.
  doctrine_reference: Escatología de juicio diferido; paciencia divina como restricción temporal del castigo.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió 'awaken' por 'be aroused' y 'in its appointed season' por 'at its appointed time'. La propuesta española refleja esa lectura revisada con una pasiva/intransitiva natural ('se levantará') y 'tiempo señalado', evitando introducir nociones no presentes en el audit trail.
  spanish_consistency_notes:
  - Se eligió 'la ira' en lugar de 'furor' o 'cólera' para mantener un registro bíblico sobrio y consistente.
  - '''Longanimidad'' se conserva como término doctrinal estable, no sustituido por ''paciencia'', para no perder el matiz de paciencia perseverante.'
  - La puntuación y el orden de cláusulas siguen de cerca la estructura del inglés POB, pero con sintaxis española natural.
