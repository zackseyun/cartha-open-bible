lexical_decisions:
- source_word: meṭṭul d-
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: conjunction causal
  rationale: La conjunción causal del siríaco introduce la razón del enunciado; 'Porque' conserva con claridad el enlace lógico y el tono formal del registro bíblico.
- source_word: noonday blaze
  english_pob_choice: the noonday blaze
  chosen_spanish: el fulgor del mediodía
  alternatives_spanish:
  - el ardor del mediodía
  - la llama del mediodía
  lexicon: noun phrase
  rationale: '''Blaze'' expresa una luz intensa y ardiente; ''fulgor'' mantiene la imagen de brillo sin obligar a un calco demasiado físico. ''Del mediodía'' preserva el valor temporal del original.'
- source_word: does not burn forever
  english_pob_choice: does not burn forever
  chosen_spanish: no arde para siempre
  alternatives_spanish:
  - no quema para siempre
  - no permanece ardiendo para siempre
  lexicon: verb phrase
  rationale: '''Arder'' es la equivalencia más natural para el fuego/luz intensa aquí, y ''para siempre'' reproduce la duración negada por el texto.'
- source_word: rays of the sun
  english_pob_choice: rays of the sun
  chosen_spanish: los rayos del sol
  alternatives_spanish:
  - los rayos del sol
  - las radiaciones del sol
  lexicon: noun phrase
  rationale: La expresión es directa y transparente en español; conserva la imagen física del original sin introducir tecnicismos.
- source_word: continue to give light
  english_pob_choice: continue to give light
  chosen_spanish: continúan dando luz
  alternatives_spanish:
  - siguen dando luz
  - continúan alumbrando
  lexicon: verb phrase
  rationale: '''Continuar dando luz'' sigue de cerca la estructura del original y del audit trail inglés, manteniendo el paralelismo con la primera cláusula.'
