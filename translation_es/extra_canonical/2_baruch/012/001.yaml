lexical_decisions:
- source_word: ܐܝܟ ܕܡܫܬܡܥ ܐܢܐ
  english_pob_choice: as I understand
  chosen_spanish: como entiendo
  alternatives_spanish:
  - según entiendo
  - como lo entiendo
  - según lo que comprendo
  lexicon: Payne Smith
  rationale: La frase puede leerse de manera más literal como «como oigo», pero en este contexto de exhortación y lamento Baruc habla conforme a su comprensión; «como entiendo» conserva esa reflexión sin volverla demasiado interpretativa.
- source_word: ܐܡܪ
  english_pob_choice: I will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - hablaré y diré
  lexicon: Payne Smith
  rationale: El verbo comunica una declaración pública y directa; «hablaré» suena natural en español y mantiene el tono solemne del anuncio.
- source_word: ܥܠ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - en contra de ti
  lexicon: Payne Smith
  rationale: La preposición expresa oposición o reprensión dirigida a la tierra personificada. «Contra ti» es la forma más clara y fiel en español.
- source_word: ܐܪܥܐ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - territorio
  lexicon: Payne Smith
  rationale: «Tierra» mantiene el alcance bíblico y poético del término sin restringirlo a un estado político moderno.
- source_word: ܫܦܝܪܐ / ܦܠܚܐ de prosperar
  english_pob_choice: that prospers
  chosen_spanish: que prosperas
  alternatives_spanish:
  - que floreces
  - que te va bien
  lexicon: Payne Smith
  rationale: El inglés POB conserva la idea de prosperidad; «que prosperas» reproduce esa personificación en segunda persona y evita suavizar el juicio.
theological_decisions:
- issue: Personificación de la tierra en el reproche
  english_pob_reading: land that prospers
  chosen_spanish_reading: tierra que prosperas
  alternative_spanish_readings:
  - tierra próspera
  - tierra que florece
  rationale: Mantengo la segunda persona y la personificación porque el discurso se dirige a la tierra como interlocutora. «Tierra próspera» sería más descriptivo, pero perdería la fuerza retórica del apóstrofe.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La división del capítulo en el paquete fuente es estable para 2 Baruc 12:1; esta línea corresponde solo al inicio del discurso y no incorpora material de los versículos siguientes ni del siguiente escenario narrativo.
  spanish_consistency_notes:
  - Se mantiene «tierra» como vocativo personificado para conservar la figura retórica.
  - Se evita «SEÑOR» u otra sustitución teológica porque el texto no contiene el Nombre divino en este versículo.
  - El registro es formal y sobrio, acorde con una apertura profética breve.
