review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del siríaco según el rastro inglés: una doble prohibición sobre esperar/esperanzarse en prosperidad y gozo permanentes, seguida por dos prohibiciones éticas dirigidas en plural. Sin embargo, ''confíen'' desplaza el campo semántico de ''hope'' hacia ''trust'', y la nota [a] ya no es necesaria porque el español plural queda claro en la flexión verbal.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para mayor fidelidad y naturalidad. 'No esperen ni tengan esperanza de que...' o una formulación equivalente preserva mejor la pareja 'expect / hope' que 'esperen ni confíen'. El resto del verso fluye bien. La nota actual añade pesadez explicativa innecesaria y además comenta un literalismo que no hace falta mantener en español.
  glossary_alignment: No hay términos del glosario principal comprometidos aquí. 'Prosperidad', 'alegría', 'exalten' y 'opriman' son compatibles con el estilo del proyecto. La principal corrección léxica requerida es evitar 'confiar' como equivalente de 'hope'.
  issues:
  - severity: medium
    issue: '''confíen'' no refleja con precisión ''hope'''
    rationale: El inglés POB distingue 'expect' y 'hope'. En español, 'confiar en que' introduce más bien la idea de confiar, no de esperar con esperanza. 'esperen ni tengan esperanza de que' o similar preserva mejor la doble noción.
  - severity: low
    issue: La nota [a] es innecesaria
    rationale: La pluralidad ya está suficientemente clara en 'esperen', 'tendrán', 'se exalten' y 'opriman'. Además, explicar 'literalmente, “a sí mismos”' no aporta una alternativa útil al lector español.
  revised_spanish_text: No esperen ni tengan esperanza de que siempre tendrán prosperidad y alegría. No se exalten demasiado, ni opriman.
  revision_rationale: Se reemplaza 'confíen' por 'tengan esperanza' para reflejar con más precisión la pareja semántica 'expect or hope' sin introducir la idea distinta de confianza. Se elimina la nota porque el plural ya queda claro en el español y no hay ambigüedad que justificar. El resto del texto se mantiene por ser fiel, claro y natural.
