translation:
  language: es
  text: No esperen ni tengan esperanza de que siempre tendrán prosperidad y alegría. No se exalten demasiado, ni opriman.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: do not expect or hope
  english_pob_choice: Do not expect or hope
  chosen_spanish: No esperen ni confíen
  alternatives_spanish:
  - No esperen o no esperen con esperanza
  - No esperen ni aguarden
  lexicon: esperar / confiar
  rationale: El paralelo inglés une expectativa y esperanza; en español, “esperar” y “confiar” expresan bien la doble idea sin sonar mecánicos. Mantengo el sentido exhortativo y la amplitud semántica del original siríaco.
- source_word: prosperity and joy
  english_pob_choice: prosperity and joy
  chosen_spanish: prosperidad y alegría
  alternatives_spanish:
  - bienestar y gozo
  - prosperidad y gozo
  lexicon: prosperidad / alegría
  rationale: “Prosperidad” conserva el matiz de bienestar externo o estado favorable; “alegría” refleja la alegría/ gozo del texto sin cargarlo con terminología litúrgica innecesaria.
- source_word: exalt yourselves too highly
  english_pob_choice: exalt yourselves too highly
  chosen_spanish: No se exalten demasiado
  alternatives_spanish:
  - No se encumbren demasiado
  - No se eleven demasiado
  lexicon: exaltar(se)
  rationale: “Exaltarse” reproduce bien el movimiento de autoensalzamiento y mantiene un registro digno. “Demasiado” conserva la intensificación sin volver la frase coloquial.
- source_word: do not oppress
  english_pob_choice: do not oppress
  chosen_spanish: ni opriman
  alternatives_spanish:
  - ni hagan violencia
  - ni aplasten
  lexicon: oprimir
  rationale: “Oprimir” es la correspondencia directa y amplia para el imperativo negativo del texto. Evita especificar un tipo de abuso que el verso no precisa.
theological_decisions:
- issue: Plural address to the audience
  english_pob_reading: yourselves (plural)
  chosen_spanish_reading: se exalten demasiado / opriman (plural implícito de ustedes)
  alternative_spanish_readings:
  - te exaltes demasiado / oprimas
  - se exalten demasiado / opriman
  rationale: El audit trail corrige el inglés a plural, coherente con el siríaco. En español, el imperativo plural y el reflexivo plural ya comunican esa lectura sin nota aparte.
  doctrine_reference: No aplica; decisión gramatical-discursiva.
translation_notes:
  revision_awareness: La versión española sigue la revisión final inglesa que suaviza la coordinación negativa (“No esperen ni confíen”) y conserva el plural del destinatario. No se añadió contenido ajeno al verso; se mantuvo la doble prohibición y el tono exhortativo del siríaco.
  spanish_consistency_notes:
  - Se usa trato de ustedes en todo el versículo.
  - Se conserva un registro bíblico actual, claro y no arcaizante.
  - “Opriman” mantiene el paralelismo verbal con la advertencia final sin ampliar el campo semántico.
