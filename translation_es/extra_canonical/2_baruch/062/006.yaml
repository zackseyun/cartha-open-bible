lexical_decisions:
- source_word: ܫܠܡܢܐܣܪ (Shalmaneser)
  english_pob_choice: Shalmaneser
  chosen_spanish: Shalmanéser
  alternatives_spanish:
  - Salmanasar
  - Shalmanséser
  lexicon: nombre propio
  rationale: Se conserva el nombre histórico del rey asirio con una grafía española reconocible y cercana a la forma tradicional, sin forzar una transliteración extraña al lector moderno.
- source_word: ܡܠܟܐ דܐܬܘܪ (king of Assyria)
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - monarca de Asiria
  - soberano de Asiria
  lexicon: sustantivo nominal + gentilicio geopolítico
  rationale: «Rey de Asiria» reproduce con naturalidad el título y mantiene la relación política exacta del original.
- source_word: ܐܬܐ / came
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - entró
  lexicon: verbo de movimiento
  rationale: «Vino» es una equivalencia directa y bíblica, suficientemente natural en español para un movimiento narrativo simple.
- source_word: ܫܒܝ / carried away captive
  english_pob_choice: carried them away captive
  chosen_spanish: los llevó cautivos
  alternatives_spanish:
  - los deportó cautivos
  - los llevó al cautiverio
  lexicon: verbo causativo + adjetivo predicativo
  rationale: «Los llevó cautivos» conserva la fuerza de traslado forzado del original sin agregar una explicación interpretativa mayor que la requerida por el contexto.
theological_decisions:
- issue: Identidad del agente histórico y lectura narrativa
  english_pob_reading: And Shalmaneser king of Assyria came and carried them away captive.
  chosen_spanish_reading: Y Shalmanéser, rey de Asiria, vino y los llevó cautivos.
  alternative_spanish_readings:
  - Y Shalmanéser, rey de Asiria, llegó y los deportó.
  - Y Shalmanéser, rey de Asiria, vino y los desterró.
  rationale: No hay tensión teológica especial aquí; se mantiene el relato histórico directo. «Los llevó cautivos» preserva el hecho de la deportación sin reemplazarlo por un término más técnico que podría desdibujar la imagen narrativa.
  doctrine_reference: Historiografía bíblica / cautiverio asirio
translation_notes:
