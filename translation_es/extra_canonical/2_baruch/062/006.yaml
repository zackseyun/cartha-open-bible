  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparece el nombre divino; este versículo no contiene referencia a Yahvé.
  - Se mantiene un registro bíblico sobrio y narrativo, sin ampliar el texto con información histórica ajena al versículo.
  - Se evita «SEÑOR» como sustituto automático, ya que aquí no corresponde ningún término divino.
