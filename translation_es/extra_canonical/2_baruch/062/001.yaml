revisions:
- from: Y la séptima agua negra que viste[a]—esta es la perversión[b] causada por el consejo de Jeroboam, quien deliberó hacer dos becerros de oro.
  to: 'Y las séptimas aguas negras que viste[a]: esta es la perversión[b] causada por el consejo de Jeroboam, quien deliberó hacer dos becerros de oro.'
  rationale: Se corrige 'agua negra' a 'aguas negras' para preservar la imagen fuente y la decisión léxica POB, manteniendo a la vez 'esta es' porque la predicación singular concuerda con 'perversión' en el siriaco. Se ajusta la nota para explicar esa tensión gramatical sin presentar el plural como mera alternativa secundaria.
