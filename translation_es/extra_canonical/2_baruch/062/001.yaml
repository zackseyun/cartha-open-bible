translation:
  language: es
  text: 'Y las séptimas aguas negras que viste[a]: esta es la perversión[b] causada por el consejo de Jeroboam, quien deliberó hacer dos becerros de oro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aunque la imagen aparece en plural, el siriaco usa luego una formulación femenina singular ('esta es') que concuerda con 'la perversión'.
    reason: grammatical_explanation
  - marker: b
    text: También puede entenderse «corrupción»; se prefiere «perversión» para reflejar la deformación moral y cultual indicada por el contexto de Jeroboam.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܡ̈ܝܐ ܚܫ̈ܟܐ / "black waters"
  english_pob_choice: black waters
  chosen_spanish: agua negra
  alternatives_spanish:
  - aguas negras
  - aguas oscuras
  lexicon: Payne Smith
  rationale: El símbolo apocalíptico conserva mejor su fuerza en español con un adjetivo directo y concreto. Aunque el plural sería más natural en español, el singular del original y el valor predicativo del texto favorecen mantener la construcción próxima al siriaco en la frase principal, con una nota si se desea explicitar la lectura plural.
- source_word: ܚܒܠܬܐ
  english_pob_choice: perversion
  chosen_spanish: perversión
  alternatives_spanish:
  - corrupción
  - ruina
  lexicon: Payne Smith
  rationale: El siriaco apunta a una deformación moral y cultual introducida por el consejo de Jeroboam. 'Perversión' conserva esa idea de desviación torcido-distorsionada sin convertirla en un término demasiado general como 'corrupción'.
- source_word: ܡܠܟܐ ܝܘܪܒܥܡ / Jeroboam
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Joroboam
  lexicon: Uso bíblico estándar
  rationale: El nombre propio se mantiene en la forma bíblica usual en español para identificación inmediata del rey de Israel.
- source_word: ܬܪ̈ܝܢ ܥܓ̈ܠܐ ܕܕܗܒܐ / two calves of gold
  english_pob_choice: two calves of gold
  chosen_spanish: dos becerros de oro
  alternatives_spanish:
  - dos terneros de oro
  - dos novillos de oro
  lexicon: Uso bíblico estándar
  rationale: '''Becerros de oro'' es la manera bíblica más reconocible en español y comunica el referente cultual del relato con claridad. ''Becerros'' además reproduce mejor el valor idolátrico del episodio que un término zoológico más neutro.'
theological_decisions:
- issue: Relación entre 'esta es' y el antecedente 'agua negra'
  english_pob_reading: '''this is the perversion'' (singular agreement preserved in the revision note against a pluralizing adjustment)'
  chosen_spanish_reading: '''esta es la perversión'''
  alternative_spanish_readings:
  - '''estas son las aguas negras'''
  - '''esto es la perversión'''
  rationale: El siriaco documentado usa un demostrativo/cópula femenina singular que concuerda con el predicado 'perversión'. Por eso se mantiene 'esta es' en español, aun cuando 'agua(s)' en la imagen previa pueda sugerir pluralidad. La elección protege la gramática del original y la tensión textual señalada por la auditoría.
  doctrine_reference: No aplica; decisión gramatical y semántica, no doctrinal.
translation_notes:
  revision_awareness: La auditoría inglesa registra una revisión que osciló entre 'this is'/'these are' y entre 'corruption'/'perversion'. La evidencia siriaca favorece la concordancia singular ('esta es') y el valor semántico de desviación moral/cultual ('perversión'). También se tuvo en cuenta que el texto fuente presenta una imagen de 'aguas negras' dentro de una cadena visionaria, pero la cláusula definitoria inmediata es singular en siriaco.
  spanish_consistency_notes:
  - Se emplea 'perversión' de manera consistente con la lectura auditada del siriaco ܚܒܠܬܐ.
  - Se conserva 'Jeroboam' y 'becerros de oro' como formas bíblicas estándar y reconocibles en español.
  - La puntuación con raya introduce la cláusula explicativa, siguiendo la función del original y la práctica del POB en inglés.
