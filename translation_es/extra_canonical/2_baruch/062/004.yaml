translation:
  language: es
  text: Y la retención de la lluvia, y las hambrunas que ocurrieron hasta que las mujeres comieron el fruto de su vientre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: withholding of rain
  english_pob_choice: withholding of rain
  chosen_spanish: la retención de la lluvia
  alternatives_spanish:
  - la falta de lluvia
  - el cese de la lluvia
  - la privación de lluvia
  lexicon: retener / retención; lluvia
  rationale: El sintagma expresa la idea de que la lluvia fue contenida o retenida, no solo que faltó. «Retención» conserva mejor la fuerza pasiva/causativa del original que una simple ausencia meteorológica.
- source_word: famines
  english_pob_choice: famines
  chosen_spanish: las hambres
  alternatives_spanish:
  - los famines
  - las hambrunas
  - las carestías
  lexicon: hambre
  rationale: «Hambres» reproduce con sobriedad el plural intensivo del texto y mantiene el sentido de crisis alimentaria severa. «Hambrunas» sería igualmente posible, pero «hambres» sigue más de cerca la formulación breve del original.
- source_word: until women ate the fruit of their womb
  english_pob_choice: until women ate the fruit of their womb
  chosen_spanish: hasta que las mujeres comieron el fruto de su vientre
  alternatives_spanish:
  - hasta que las mujeres comieron el fruto de su seno
  - hasta que las mujeres comieron el fruto de su matriz
  lexicon: fruit of their womb
  rationale: «Fruto de su vientre» es la expresión bíblica más natural en español y conserva el giro figurado para designar a los hijos. Se mantiene la dureza del enunciado sin suavizarla ni explicitar más de lo que el fuente dice.
theological_decisions:
- issue: Imagen extrema de hambre que culmina en canibalismo materno
  english_pob_reading: the famines that came to pass until women ate the fruit of their womb
  chosen_spanish_reading: las hambres que ocurrieron hasta que las mujeres comieron el fruto de su vientre
  alternative_spanish_readings:
  - las hambres que se produjeron hasta que las mujeres comieron el fruto de su vientre
  - las hambrunas que llegaron hasta el punto de que las mujeres comieran el fruto de su vientre
  rationale: No se atenúa la crudeza del pasaje. La formulación española conserva el valor narrativo y moral del texto, dejando visible la gravedad del juicio descrito.
  doctrine_reference: Lamento profético y juicio por hambre en literatura judía del Segundo Templo
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; por ello se mantiene una traducción directa y estable, sin introducir notas textuales ni alternativas innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este verso no contiene el nombre divino.
  - «hambres» se usa en plural como sustantivo de crisis alimentarias, coherente con el tono del pasaje.
  - Se preserva el giro bíblico «fruto de su vientre» para mantener la imaginería semítica del original.
