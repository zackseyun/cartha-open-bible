translation:
  language: es
  text: Y las obras de Jezabel, y la adoración de los ídolos que Israel practicó en aquel tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܥܒܕܝܗ̇ / deeds
  english_pob_choice: deeds
  chosen_spanish: obras
  alternatives_spanish:
  - acciones
  - hechos
  lexicon: N/A
  rationale: El ajuste revisado del POB muestra que el término siriaco significa 'deeds'/'actions' y no 'curse'. En español, 'obras' comunica de manera natural y fiel las acciones concretas aludidas, sin introducir una carga interpretativa adicional.
- source_word: worship of idols
  english_pob_choice: worship of idols
  chosen_spanish: adoración de los ídolos
  alternatives_spanish:
  - culto a los ídolos
  - idolatría
  lexicon: N/A
  rationale: '''Adoración de los ídolos'' conserva el sustantivo y el objeto del original, manteniendo la referencia explícita al acto de culto. ''Idolatría'' sería más sintético, pero aquí se prefiere la transparencia lexical.'
- source_word: Israel
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: N/A
  rationale: Se mantiene el nombre propio tal como aparece en el texto fuente y en el POB inglés.
- source_word: at that time
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: N/A
  rationale: '''En aquel tiempo'' es una fórmula natural en español bíblico y conserva la referencia temporal del original sin sobreexplicarla.'
theological_decisions:
- issue: Corrección del sentido de la primera unidad semántica
  english_pob_reading: deeds
  chosen_spanish_reading: obras
  alternative_spanish_readings:
  - acciones
  - hechos
  rationale: La revisión crítica del POB corrige una lectura anterior de 'curse' a 'deeds'. La traducción española debe reflejar esa lectura revisada y no conservar la interpretación errónea.
  doctrine_reference: Fidelidad al texto fuente y a la revisión textual aplicada; no aplica una doctrina específica.
translation_notes:
  revision_awareness: La edición inglesa del POB fue revisada desde una lectura errónea ('curse') a 'deeds' a partir del siriaco ܥܒܕܝܗ̇. La presente versión española sigue esa revisión y evita cualquier huella de la lectura anterior.
  spanish_consistency_notes:
  - Se evita 'maldición' o 'maldiciones' porque el expediente de revisión indica explícitamente que el siriaco significa 'deeds/actions' y no 'curse'.
  - Se usa 'obras' como equivalente natural de 'deeds' en un registro bíblico claro y publicable.
  - No se introduce nota al pie porque la validación exige que todo marcador aparezca en el texto; aquí no es necesaria ninguna nota adicional.
