translation:
  language: es
  text: Y el tiempo del cautiverio que sobrevino a las nueve tribus y media, a causa de sus muchos pecados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: the time of the captivity
  english_pob_choice: the time of the captivity
  chosen_spanish: el tiempo del cautiverio
  alternatives_spanish:
  - el tiempo del exilio
  - el tiempo de la cautividad
  lexicon: time; captivity
  rationale: «Tiempo» conserva la referencia temporal del sintagma, y «cautiverio» refleja con naturalidad la condición de estar llevado cautivo sin suavizar la fuerza del término.
- source_word: that came upon
  english_pob_choice: that came upon
  chosen_spanish: que vino sobre
  alternatives_spanish:
  - que llegó sobre
  - que cayó sobre
  lexicon: come upon
  rationale: «Vino sobre» mantiene la idea de un acontecimiento que sobreviene a un pueblo, con un registro bíblico natural en español.
- source_word: the nine and a half tribes
  english_pob_choice: the nine and a half tribes
  chosen_spanish: las nueve tribus y media
  alternatives_spanish:
  - las nueve tribus y medio
  - las nueve tribus y media de Israel
  lexicon: nine and a half tribes
  rationale: Se conserva la formulación exacta y extraña del original/POB, sin normalizarla, porque el texto distingue deliberadamente ese número de tribus.
- source_word: because of their many sins
  english_pob_choice: because of their many sins
  chosen_spanish: a causa de sus muchos pecados
  alternatives_spanish:
  - por sus muchos pecados
  - debido a sus muchos pecados
  lexicon: because of; many sins
  rationale: «A causa de» expresa bien la relación causal y evita una reconstrucción más interpretativa. «Pecados» mantiene el plural y la culpabilidad moral explícita.
theological_decisions:
- issue: Relación causal entre pecado y cautiverio
  english_pob_reading: because of their many sins
  chosen_spanish_reading: a causa de sus muchos pecados
  alternative_spanish_readings:
  - por sus muchos pecados
  - debido a sus muchos pecados
  rationale: La versión preserva la conexión teológica directa del texto entre la multitud de pecados y la llegada del cautiverio, sin atenuarla ni convertirla en una mera coincidencia histórica.
  doctrine_reference: Retribución/castigo por el pecado en la literatura deuteronomista y apocalíptica
translation_notes:
  revision_awareness: El inglés auditado fue revisado para evitar la torpeza de 'their captivity' y para naturalizar el semitismo 'were in many sins'. La presente redacción sigue el sentido ya estabilizado en el POB inglés sin introducir las notas anteriores, ya que no pueden anclarse aquí sin marcadores en el texto.
  spanish_consistency_notes:
  - Se mantiene 'cautiverio' en lugar de 'exilio' para no debilitar la imagen de sujeción y deportación implícita en el contexto.
  - No se usa 'SEÑOR' ni vocabulario cristianizado adicional, porque el versículo no contiene un referente divino directo.
  - La frase completa queda en un registro bíblico claro y publicable, con sintaxis española natural pero suficientemente cercana al original.
