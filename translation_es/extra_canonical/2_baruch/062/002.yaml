translation:
  language: es
  text: Y toda la maldad que los reyes después de él cometieron en injusticia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: all the wickedness
  english_pob_choice: all the wickedness
  chosen_spanish: toda la maldad
  alternatives_spanish:
  - toda la perversidad
  - toda la malicia
  lexicon: N/A
  rationale: «Maldad» comunica de manera natural y amplia el alcance total del sustantivo inglés, sin sobrecargar el tono ni restringir el campo semántico a una sola clase de mal.
- source_word: the kings after him
  english_pob_choice: the kings after him
  chosen_spanish: los reyes después de él
  alternatives_spanish:
  - los reyes que vinieron después de él
  - los reyes posteriores a él
  lexicon: N/A
  rationale: Se conserva la referencia sucesiva e histórica del original. «Después de él» es directo y fiel, y mantiene la relación temporal sin añadir interpretación.
- source_word: committed
  english_pob_choice: committed
  chosen_spanish: cometieron
  alternatives_spanish:
  - hicieron
  - practicaron
  lexicon: N/A
  rationale: «Cometer» es la forma más natural en español para actos moralmente negativos y preserva la fuerza acusatoria del texto.
- source_word: in unrighteousness
  english_pob_choice: in unrighteousness
  chosen_spanish: con injusticia
  alternatives_spanish:
  - en injusticia
  - con maldad
  - injustamente
  lexicon: N/A
  rationale: Se eligió «con injusticia» para reflejar el matiz adverbial/instrumental del inglés sin borrar el sustantivo de justicia/rectitud que el texto presupone. «Injustamente» sería más fluido, pero suaviza la correspondencia con el sustantivo subyacente.
theological_decisions:
- issue: Relación entre maldad e injusticia
  english_pob_reading: The line accumulates wickedness and unrighteousness, distinguishing the moral evil from the manner or sphere of action.
  chosen_spanish_reading: La maldad se presenta como el contenido de las acciones, y «con injusticia» conserva la dimensión de obrar fuera de la justicia.
  alternative_spanish_readings:
  - toda la maldad que los reyes después de él cometieron injustamente
  - toda la maldad que los reyes posteriores a él practicaron en injusticia
  rationale: 'La redacción evita fusionar ambos términos en una sola idea demasiado genérica. Así se mantiene la tensión moral del original: no solo hicieron mal, sino que lo hicieron fuera de la justicia.'
  doctrine_reference: justicia / injusticia
- issue: Referencia histórica a los reyes sucesivos
  english_pob_reading: the kings after him
  chosen_spanish_reading: los reyes después de él
  alternative_spanish_readings:
  - los reyes posteriores a él
  - los reyes que vinieron después de él
  rationale: No se introduce especificación adicional sobre qué reyes son; se mantiene el alcance abierto que permite al lector seguir el hilo histórico sin añadir nombres o precisiones no presentes en el verso.
  doctrine_reference: narrativa histórica
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la única línea inglesa del registro POB, pero no depende mecánicamente de ella: se ha respetado la sintaxis española natural y se ha conservado la tensión entre «maldad» e «injusticia» sin reinterpretaciones doctrinales. No hay revisiones aplicadas en el registro inglés ni notas textuales que exijan variantes.'
  spanish_consistency_notes:
  - Se usa «injusticia» en lugar de «maldad» para traducir el segundo término, evitando duplicación semántica.
  - Se mantiene el registro sobrio y bíblico, sin arcaísmos innecesarios.
  - No se introducen marcadores de nota, porque el verso no presenta variantes o ambigüedades que requieran anotación en español.
