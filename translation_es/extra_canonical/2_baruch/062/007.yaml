  text: Pero, en cuanto a las naciones, sería demasiado contar cómo actuaban continuamente en impiedad y maldad, y nunca se mostraron justas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: concerning the nations
  english_pob_choice: But concerning the nations
  chosen_spanish: en cuanto a las naciones
  alternatives_spanish:
  - acerca de las naciones
  - respecto de las naciones
  lexicon: nations
  rationale: Conserva el alcance temático del original sin convertirlo en un giro más interpretativo; «en cuanto a» reproduce bien el marco de referencia de «concerning» en español natural.
- source_word: it would be too much to tell
  english_pob_choice: it would be too much to tell
  chosen_spanish: sería demasiado contar
  alternatives_spanish:
  - sería mucho relatar
  - sería excesivo decir
  lexicon: tell
  rationale: «Contar» mantiene el sentido de relatar o enumerar hechos; «sería demasiado» refleja la insuficiencia o exceso implícito del original.
- source_word: continually acted
  english_pob_choice: they continually acted
  chosen_spanish: continuamente actuaron
  alternatives_spanish:
  - actuaron sin cesar
  - obraron continuamente
  lexicon: acted
  rationale: «Actuaron» preserva la acción reiterada; «continuamente» expresa la duración habitual sin añadir matices no presentes en la fuente.
- source_word: impiety
  english_pob_choice: impiety
  chosen_spanish: impiedad
  alternatives_spanish:
  - irreligión
  - falta de piedad
  lexicon: impiety
  rationale: «Impiedad» es el equivalente directo y mantiene el peso religioso-moral del término.
- source_word: wickedness
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - perversidad
  - iniquidad
  lexicon: wickedness
  rationale: «Maldad» es claro y natural en español; conserva la valoración ética general del original sin sobrecargarla con un término más técnico.
- source_word: never showed themselves righteous
  english_pob_choice: never showed themselves righteous
  chosen_spanish: nunca se mostraron justas
  alternatives_spanish:
  - nunca se presentaron como justas
  - nunca se mostraron rectas
  lexicon: righteous
  rationale: Se conserva la idea de una manifestación visible de justicia/rectitud. Se eligió el femenino plural por concordancia con «las naciones» y para mantener la referencia colectiva.
theological_decisions:
- issue: La ausencia de justicia en las naciones como evaluación moral general
  english_pob_reading: they never showed themselves righteous
  chosen_spanish_reading: nunca se mostraron justas
  alternative_spanish_readings:
  - nunca se mostraron rectas
  - nunca se justificaron
  rationale: La frase expresa una evaluación moral pública y continua, no un acto puntual de justificación. «Justas» conserva el juicio ético global sin introducir lenguaje técnico adicional.
  doctrine_reference: justicia/rectitud como evaluación moral general
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura inglesa auditada, sin cambios textuales revisados en el registro más reciente; se mantiene la equivalencia óptima con ajuste natural al español.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» solo cuando el texto lo requiere; aquí no aparecen.
  - «Naciones» se conserva en plural colectivo, coherente con el sujeto del original.
  - La concordancia femenina plural en «justas» refleja el referente colectivo implícito en español.
