translation:
  language: es
  text: Oh, tú que creaste la tierra, óyeme—tú que estableciste el firmamento por la palabra, y afirmaste la altura del cielo por el espíritu[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El siríaco ruha puede significar «espíritu» o «aliento»; el paralelismo con «palabra» evoca el Salmo 33:6.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܐܘ ܡܢ ܕܒܪܐ ܐܪܥܐ
  english_pob_choice: O You who created the earth
  chosen_spanish: Oh Tú que creaste la tierra
  alternatives_spanish:
  - Oh Tú que hiciste la tierra
  - Oh Tú, creador de la tierra
  lexicon: Payne Smith
  rationale: El participio/relativo siríaco introduce una invocación directa a Dios como creador. «Creaste» conserva la acción pasada y la relación vocativa del original, sin convertirla en un título más libre como «creador».
- source_word: ܫܡܥܝܢܝ
  english_pob_choice: hear me
  chosen_spanish: óyeme
  alternatives_spanish:
  - escúchame
  - oye mi voz
  lexicon: Payne Smith
  rationale: «Óyeme» es natural en español y mantiene la súplica breve del original. «Escúchame» también es posible, pero «óyeme» preserva mejor el tono inmediato de invocación.
- source_word: ܬܩܢܬ
  english_pob_choice: established
  chosen_spanish: estableciste
  alternatives_spanish:
  - afirmaste
  - ordenaste
  - fijaste
  lexicon: Payne Smith
  rationale: El POB inglés opta por «established», que en español puede expresarse con «estableciste» para la acción fundacional sobre el firmamento. «Afirmaste» se reserva para la segunda cláusula, donde el sentido de hacer firme es especialmente claro.
- source_word: ܪܩܝܥܐ
  english_pob_choice: the firmament
  chosen_spanish: el firmamento
  alternatives_spanish:
  - la bóveda
  - el cielo
  lexicon: Payne Smith
  rationale: «Firmamento» es el equivalente tradicional y preciso para la extensión celeste del término. «Bóveda» explicita la imagen, pero «firmamento» conserva mejor la correspondencia técnica y literaria del texto.
- source_word: ܒܡܠܬܐ
  english_pob_choice: by the word
  chosen_spanish: por la palabra
  alternatives_spanish:
  - con la palabra
  - mediante la palabra
  lexicon: Payne Smith
  rationale: «Por la palabra» reproduce la causalidad instrumental del siríaco y coincide con el paralelismo bíblico aludido en la nota inglesa (Salmo 33:6).
- source_word: ܪܘܚܐ
  english_pob_choice: spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el aliento
  - el soplo
  lexicon: Payne Smith
  rationale: Sigo la elección inglesa «spirit» por su peso teológico en literatura apocalíptica y porque en español «el espíritu» mantiene la amplitud semántica entre fuerza vivificante y agencia divina. «Aliento» o «soplo» serían posibles si se privilegiara el eco poético de Salmo 33:6, pero aquí se conserva la lectura teológica principal.
- source_word: ܘܫܪܪܬ
  english_pob_choice: and made firm
  chosen_spanish: y afirmaste
  alternatives_spanish:
  - y consolidaste
  - y confirmaste
  - y hiciste firme
  lexicon: Payne Smith
  rationale: El verbo siríaco expresa hacer estable o firme. «Afirmaste» es una solución natural y fiel que conserva el matiz de dar solidez, y además evita una repetición demasiado mecánica de «estableciste».
- source_word: ܪܘܡܐ ܕܫܡܝܐ
  english_pob_choice: the height of heaven
  chosen_spanish: la altura del cielo
  alternatives_spanish:
  - la elevación del cielo
  - la cumbre del cielo
  lexicon: Payne Smith
  rationale: «Altura del cielo» traduce de manera directa y fluida la idea de elevación celeste. «Altura» mantiene la imaginería de verticalidad sin introducir una concreción no atestiguada por el texto.
theological_decisions:
- issue: 'Ruha en paralelo con «palabra»: ¿espíritu o aliento?'
  english_pob_reading: the spirit[a]
  chosen_spanish_reading: el espíritu[a]
  alternative_spanish_readings:
  - el aliento[a]
  - el soplo[a]
  rationale: La nota inglesa reconoce la ambigüedad lexical, pero privilegia «spirit» por el uso teológico en literatura apocalíptica. La traducción española conserva esa decisión, aunque mantiene abierta la posibilidad poética de «aliento/soplo» en la nota.
  doctrine_reference: Creación divina por la palabra y el espíritu; paralelismo con Salmo 33:6.
translation_notes:
  revision_awareness: 'Se respetó la corrección de límite de versículo: esta entrada contiene solo 2 Baruc 54:1, sin material de los versículos siguientes. La sintaxis española sigue la revisión inglesa que separa claramente «hear me» del relativo sobre Dios, evitando ambigüedad.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos según la norma del proyecto, pero aquí el texto dirige una invocación creadora a Dios sin el tetragrámaton explícito en el siríaco, por lo que no corresponde introducirlo.
  - Se mantuvo «firmamento» como término técnico estable para ܪܩܝܥܐ.
  - Se prefirió «el espíritu» conforme a la decisión auditada del POB inglés, conservando la ambigüedad lexical en nota.
