translation:
  language: es
  text: '… al polvo donde nació. Y la posesión de la riqueza ya no volverá atrás, sino que buscará la muerte en su ansia. Y los que arrebatan los salarios sacarán a la luz la muerte antes de su tiempo, y la muerte que es el salario de los sufrimientos será quitada. Y ninguna cosa de gozo quedará para deleite. Y el dominio del cambio será convertido en conflicto consumado, y no habrá escucha para los pecadores en el Seol.


    Puesto que, entonces, todas estas cosas ahora suceden, ¿piensas que no son retribuidas? Un día, por tanto, los habitantes de la tierra … Si, pues, les he dado a conocer estas cosas mientras aún vivo —porque grande es el peso de culpa de los que pertenecen a la falsedad, y expongo su medida completa, porque de la falsedad fueron engendrados desde el principio, para muerte— y he dicho que deben ser instruidos: escuchen, hagan y digan.


    «Si quebrantan la ley, serán dispersados, y serán quitados de su tierra.» Jeremías también les habló mientras estaba con ustedes, cuando sus padres estuvieron cuarenta años en el desierto. Y después de la muerte de Josué, y después de que Moisés fue quitado de entre ustedes, sus tribus siguieron firmemente establecidas. Moisés les dijo de antemano que estas cosas vendrían sobre ustedes; y cuando vinieron sobre ustedes, sepan que fue conforme a la ley.


    Así que ahora yo también les digo, después de lo que han visto: no se desvíen tras aquellas cosas que les han sobrevenido. Recibirán del Poderoso el reino que permanece, y lo que ha sido guardado para ustedes. Pero sepan, hijos, que no fueron entregados al vacío cuando los mandamientos del Poderoso les fueron dados; y nadie sale por el espíritu antes del lugar del juicio. Más bien, vuelvan para reconocer su voluntad y su ley, y al pueblo santo, y las asambleas, y sus santuarios, y las obras hermosas. No se desvíen …'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܠܥܦܪܐ ܝܠܝܕ
  english_pob_choice: into dust where it was born
  chosen_spanish: al polvo donde nació
  alternatives_spanish:
  - al polvo de donde fue formado
  - al polvo donde fue engendrado
  lexicon: ܥܦܪܐ = dust/earth; ܝܠܝܕ = born/begotten
  rationale: Conservo la imagen concreta de origen y retorno al polvo sin añadir una formulación no atestiguada; 'nació' es natural en español y mantiene el paralelismo con el origen.
- source_word: ܩܢܝܢ
  english_pob_choice: the possession of wealth
  chosen_spanish: la posesión de la riqueza
  alternatives_spanish:
  - la posesión de bienes
  - la propiedad de la riqueza
  lexicon: ܩܢܝܢ = possession/property/wealth
  rationale: '''Riqueza'' preserva el campo semántico de posesión material; evito ''bienes'' por ser más interpretativo y menos directo al sustantivo abstracto.'
- source_word: ܕܬܘܒ ܢܗܘܐ ܗܘܦܟ
  english_pob_choice: will no longer turn back
  chosen_spanish: ya no volverá
  alternatives_spanish:
  - ya no dará vuelta atrás
  - ya no regresará
  lexicon: ܗܘܦܟ = turn back/return
  rationale: La construcción apunta al cese del retorno/cambio de rumbo; 'volverá' comunica bien el movimiento sin mecanicismo.
- source_word: ܚܛܘ̈ܦܝ ܕܐܓܪܐ
  english_pob_choice: the snatchers of wages
  chosen_spanish: los que arrebatan los salarios
  alternatives_spanish:
  - los raptadores de salario
  - los que roban el salario
  lexicon: ܚܛܘܦܝ = snatchers/those who seize; ܐܓܪܐ = wages/reward
  rationale: '''Arrebatan'' conserva la fuerza violenta de ܚܛܘܦܝ; ''salarios'' refleja el sentido retributivo laboral que la POB destacó.'
- source_word: ܡܘܬܐ ܕܐܓܪܐ ܕܚ̈ܫܐ
  english_pob_choice: the death that is the wage of sufferings
  chosen_spanish: la muerte que es el salario de los sufrimientos
  alternatives_spanish:
  - la muerte que es paga de sufrimientos
  - la muerte, salario de padecimientos
  lexicon: ܐܓܪܐ = wage/wages/reward; ܚ̈ܫܐ = sufferings
  rationale: Mantengo la relación salario/retribución para reflejar el paralelismo del texto, sin suavizar 'muerte' ni 'sufrimientos'.
- source_word: ܨܒܘܬܐ ܕܚܕܘܬܐ
  english_pob_choice: matter of joy
  chosen_spanish: asunto de gozo
  alternatives_spanish:
  - cosa de gozo
  - materia de gozo
  lexicon: ܨܒܘܬܐ = matter/thing/desire; ܚܕܘܬܐ = joy
  rationale: '''Asunto'' es una solución sobria para el sustantivo general, evitando sobretraducir la expresión a una emoción más intensa que la del original.'
- source_word: ܚܛܝܐ ܒܫܝܘܠ
  english_pob_choice: sinners in Sheol
  chosen_spanish: pecadores en el Seol
  alternatives_spanish:
  - pecadores en el abismo
  - pecadores en el Hades
  lexicon: ܫܝܘܠ = Sheol
  rationale: Conservo 'Seol' como término técnico bíblico; no lo sustituyo por 'infierno' para no borrar la referencia al ámbito de los muertos.
- source_word: ܗܘܦܟ ܥܒܝܕܐ ܡܠܚܡܘܬܐ
  english_pob_choice: will be turned into accomplished conflict
  chosen_spanish: será convertido en conflicto consumado
  alternatives_spanish:
  - se volverá conflicto consumado
  - será tornado en lucha cumplida
  lexicon: ܡܠܚܡܘܬܐ = conflict/battle
  rationale: '''Conflicto consumado'' conserva la idea de conflicto ya efectuado o realizado; evito una paráfrasis que borre la rareza expresiva.'
- source_word: ܐܘ̈ܕܥܬܗܘܢ
  english_pob_choice: I have made these things known to you
  chosen_spanish: os he dado a conocer estas cosas
  alternatives_spanish:
  - os he hecho saber estas cosas
  - os he hecho conocer estas cosas
  lexicon: ܐܘܕܥ = make known/inform
  rationale: Formulación idiomática y fiel al valor informativo del verbo sin perder la relación directa con el destinatario plural.
- source_word: ܚܝܒܘܬܐ
  english_pob_choice: burden of guilt
  chosen_spanish: peso de culpa
  alternatives_spanish:
  - carga de culpa
  - peso de culpabilidad
  lexicon: ܚܝܒܘܬܐ = debt/guilt/liability
  rationale: '''Peso de culpa'' conserva la metáfora de carga/deuda y suena natural en español litúrgico contemporáneo.'
- source_word: ܕܡܢ ܫܘܩܪܐ ܐܬܝܠܕܘ
  english_pob_choice: from falsehood they were begotten
  chosen_spanish: de la falsedad fueron engendrados
  alternatives_spanish:
  - de la mentira fueron engendrados
  - nacieron de la falsedad
  lexicon: ܫܘܩܪܐ = falsehood/lie; ܐܬܝܠܕܘ = were begotten/born
  rationale: '''Falsedad'' preserva el tono abstracto y moral del término; ''engendrados'' mantiene la genealogía retórica del original.'
theological_decisions:
- issue: Retribución presente de los males anunciados
  english_pob_reading: Since, then, all these things now come to pass, do you think they are not requited?
  chosen_spanish_reading: Puesto que, entonces, todas estas cosas ahora suceden, ¿piensas que no son retribuidas?
  alternative_spanish_readings:
  - ¿piensas que no reciben su paga?
  - ¿piensas que no son recompensadas?
  rationale: '''Retribuidas'' conserva la lógica de retribución moral sin reducirla a recompensa positiva; mantiene la tensión judicial del pasaje.'
  doctrine_reference: justicia retributiva divina
- issue: El Seol como ámbito de los muertos
  english_pob_reading: there will be no hearing for sinners in Sheol
  chosen_spanish_reading: no habrá oído para los pecadores en el Seol
  alternative_spanish_readings:
  - no habrá audiencia para los pecadores en el Seol
  - no se oirá a los pecadores en el Seol
  rationale: Conservo 'Seol' para no confundir el lugar de los muertos con el infierno de tradición posterior; 'oído' refleja la imagen de acceso/escucha del original.
  doctrine_reference: estado de los muertos / terminología bíblica del más allá
- issue: Reino duradero otorgado por el Poderoso
  english_pob_reading: You will receive from the Mighty One the kingdom that endures
  chosen_spanish_reading: Recibiréis del Poderoso el reino que permanece
  alternative_spanish_readings:
  - Recibiréis del Poderoso el reino duradero
  - Recibiréis del Poderoso el reino que perdura
  rationale: '''Que permanece'' expresa la permanencia del reino sin agregar categorías doctrinales ajenas; mantiene la referencia al Poderoso como dador.'
  doctrine_reference: reino escatológico
- issue: Salir 'en espíritu' antes del juicio
  english_pob_reading: no one goes forth by the spirit before the place of judgment
  chosen_spanish_reading: nadie sale en espíritu antes del lugar del juicio
  alternative_spanish_readings:
  - nadie sale por el espíritu antes del lugar del juicio
  - nadie parte en espíritu antes del juicio
  rationale: Mantengo 'en espíritu' porque la frase es oscura pero parece deliberadamente elíptica; no la explico como muerte o alma sin base suficiente.
  doctrine_reference: antropología bíblica / juicio
- issue: Pueblo santo, asambleas y santuarios
  english_pob_reading: the holy people, and the assemblies, and his sanctuaries
  chosen_spanish_reading: al pueblo santo, y las asambleas, y sus santuarios
  alternative_spanish_readings:
  - al pueblo santo, y las congregaciones, y sus santuarios
  - al pueblo santo, y las reuniones, y sus santuarios
  rationale: '''Asambleas'' conserva la posibilidad de cuerpos congregados sin imponer una terminología eclesial posterior; ''santuarios'' mantiene el plural del original.'
  doctrine_reference: comunidad/culto israelita
translation_notes:
  revision_awareness: Se revisó el control de salida previo, que falló por marcadores de nota no anclados en el texto. En esta versión no se incluyen notas al pie, para evitar desalineaciones entre el cuerpo y los metadatos. También se respetó el estado de revisión 'unchanged' y el contexto de mayor revisión del control cruzado, priorizando una traducción sobria y directamente anclada en el siriaco con apoyo del audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'Poderoso' de forma consistente para ܚܝܠܬܐ / The Mighty One, conforme al contexto de 2 Baruc.
  - Se preserva 'Seol' como tecnicismo bíblico y no se normaliza a 'infierno'.
  - Se mantiene el paralelismo salario/muerte/sufrimientos sin suavizar la estructura retributiva.
  - No se introduce 'Cristo', 'SEÑOR' ni vocabulario eclesiástico no atestiguado por el texto aquí.
  - El pasaje conserva la elipsis con '…' donde el inglés POB también deja corte textual.
