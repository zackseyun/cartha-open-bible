    Puesto que, entonces, todas estas cosas ahora suceden, ¿piensas que no son retribuidas? Un día, por tanto, los habitantes de la tierra … Si, pues, les he dado a conocer estas cosas mientras aún vivo —porque grande es el peso de culpa de los que pertenecen a la falsedad, y expongo su medida completa, porque de la falsedad fueron engendrados desde el principio, para muerte— y he dicho que deben ser instruidos: escuchen, hagan y digan.


    «Si quebrantan la ley, serán dispersados, y serán quitados de su tierra.» Jeremías también les habló mientras estaba con ustedes, cuando sus padres estuvieron cuarenta años en el desierto. Y después de la muerte de Josué, y después de que Moisés fue quitado de entre ustedes, sus tribus siguieron firmemente establecidas. Moisés les dijo de antemano que estas cosas vendrían sobre ustedes; y cuando vinieron sobre ustedes, sepan que fue conforme a la ley.


    Así que ahora yo también les digo, después de lo que han visto: no se desvíen tras aquellas cosas que les han sobrevenido. Recibirán del Poderoso el reino que permanece, y lo que ha sido guardado para ustedes. Pero sepan, hijos, que no fueron entregados al vacío cuando los mandamientos del Poderoso les fueron dados; y nadie sale por el espíritu antes del lugar del juicio. Más bien, vuelvan para reconocer su voluntad y su ley, y al pueblo santo, y las asambleas, y sus santuarios, y las obras hermosas. No se desvíen …'
