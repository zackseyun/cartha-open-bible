translation:
  language: es
  text: 'Escucha qué es la gran nube que viste subir del mar y cubrir esta tierra: es el mundo que su poder hizo cuando planeó hacer la creación. Y cuando la palabra salió de delante de él, el comienzo del mundo se alzó, muy pequeño, y fue ordenado conforme a lo que había de llegar a ser.


    Y las primeras aguas negras que viste descender de la nube: estas son el pecado, la transgresión que cometió el primer Adán. Porque cuando pecó, la muerte fue puesta en movimiento antes de su tiempo, y el luto fue dado a conocer, y los dolores fueron preparados, y la angustia fue creada, y la fatiga se completó, y la grandeza comenzó a ser abatida.


    Y en cuanto al último día, que se mostró en la forma que había tomado semejanza, sabe que el tiempo será examinado, y la medida de la humanidad será tomada, y su fuerza será probada. Por tanto, porque Adán, cuando oyó de Dios algo de lo que había de ser, reflexionó sobre la liberación de los muertos que le había sido dada y sobre lo que Dios le había mandado, lo siguió considerando e ideó cinco pensamientos[a]. Pues quedó sujeto a culpa, y por medio de él también los ángeles quedaron sujetos a culpa. Y en el tiempo en que fue creado, se le mostró una visión: la vida amarga y los elementos con fuego. Así Dios reunió de antemano estas cosas, en semejanza de los que fueron creados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siguió considerándolo e ideó cinco pensamientos».'
    reason: previous_rendering
lexical_decisions:
- source_word: ܩܘܝܡܐ ܕܥܠܡܐ
  english_pob_choice: the beginning of the world
  chosen_spanish: el comienzo del mundo
  alternatives_spanish:
  - el origen del mundo
  - la fundación del mundo
  - el ordenamiento del mundo
  lexicon: Payne Smith
  rationale: 'La imagen no es solo cronológica sino cosmogónica: el mundo ‘se alzó’ en su estado inicial. ‘Comienzo’ conserva esa apertura primordial y suena natural en español, sin reducirlo a mera secuencia temporal.'
- source_word: ܚܛܗܐ / ܡܬܒܪܝܢܘܬܐ
  english_pob_choice: the transgression
  chosen_spanish: la transgresión
  alternatives_spanish:
  - el pecado
  - la infracción
  - el sobrepasamiento
  lexicon: Payne Smith
  rationale: Sigo la fuerza de límite cruzado que el POB destacó en inglés. Mantener ‘transgresión’ preserva la tensión lexical junto con ‘pecado’ en la misma cláusula.
- source_word: ܐܬܬܙܝܥ ܡܘܬܐ
  english_pob_choice: death was stirred up
  chosen_spanish: la muerte fue puesta en movimiento
  alternatives_spanish:
  - la muerte fue despertada
  - la muerte fue agitada
  lexicon: Payne Smith
  rationale: ‘Puesta en movimiento’ comunica activación/irrupción sin volverlo una simple personificación. Evita además el choque estilístico de ‘agitó’ en español con un sujeto abstracto.
- source_word: ܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ
  english_pob_choice: greatness began to be brought low
  chosen_spanish: la grandeza comenzó a ser abatida
  alternatives_spanish:
  - la majestad comenzó a ser humillada
  - la grandeza comenzó a caer
  - la grandeza empezó a ser rebajada
  lexicon: Payne Smith
  rationale: Conserva el movimiento descendente y la pérdida de altura/estatus. ‘Abatida’ es suficientemente fuerte y mantiene la pasiva iniciada por el original.
- source_word: ܢܘܡܫܐ ܕܐܢܫܘܬܐ
  english_pob_choice: the measure of humanity
  chosen_spanish: la medida de la humanidad
  alternatives_spanish:
  - la norma de la humanidad
  - la regla de la humanidad
  - la medida del ser humano
  lexicon: Payne Smith
  rationale: La secuencia de ‘tiempo’, ‘medida’ y ‘fuerza’ pide un término evaluativo y cuantificable. ‘Humanidad’ mantiene el alcance colectivo del syriaco sin singularizar indebidamente.
- source_word: ܫܘܒܩܢܐ ܕܡ̈ܝܬܐ
  english_pob_choice: the release of the dead
  chosen_spanish: la liberación de los muertos
  alternatives_spanish:
  - la remisión respecto de los muertos
  - la liberación de los difuntos
  - el desatar de los muertos
  lexicon: Payne Smith
  rationale: El contexto es difícil y el POB deja la frase relativamente abierta. ‘Liberación de los muertos’ conserva la ambigüedad entre rescate y desatamiento sin imponer una glosa doctrinal precisa.
- source_word: ܡܚܝܒܢܘܗܝ
  english_pob_choice: made liable
  chosen_spanish: se hizo responsable ante sí mismo
  alternatives_spanish:
  - quedó bajo culpa
  - se hizo culpable
  - quedó obligado
  lexicon: Payne Smith
  rationale: La raíz tiene un matiz judicial de quedar sujeto a responsabilidad/culpa. En español, ‘responsable’ evita una dureza interpretativa excesiva y refleja que la acción recae sobre sí mismo; la adición ‘ante sí mismo’ aclara el giro reflexivo del contexto.
- source_word: ܐܣܛܘܟܣܐ
  english_pob_choice: the elements
  chosen_spanish: los elementos
  alternatives_spanish:
  - las sustancias elementales
  - las potencias elementales
  - los rudimentos
  lexicon: Payne Smith
  rationale: La palabra de préstamo griego apunta a los elementos cósmicos; ‘los elementos’ es la opción más fiel y reconocible en español.
theological_decisions:
- issue: La causalidad de la caída de Adán y la entrada de la muerte
  english_pob_reading: Adam's first transgression is rendered as the decisive primal act that stirs up untimely death and the chain of human misery.
  chosen_spanish_reading: La transgresión de Adán se presenta como el acto primordial que pone en marcha la muerte prematura y la secuencia de aflicción humana.
  alternative_spanish_readings:
  - Se suaviza como una afirmación general sobre la fragilidad humana.
  - Se lee más descriptivamente, no como causalidad directa.
  rationale: El siríaco vincula directamente el pecado de Adán con muerte, luto, dolores, angustia y trabajo agotador. La traducción mantiene esa lógica causal-apocalíptica en lugar de diluirla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1-3
- issue: La cláusula difícil sobre la ‘liberación de los muertos’
  english_pob_reading: The phrase is left relatively literal rather than harmonized into a clearer doctrinal statement about resurrection.
  chosen_spanish_reading: La expresión se deja relativamente abierta, sin convertirla en una afirmación doctrinal explícita sobre la resurrección.
  alternative_spanish_readings:
  - Referencia a la resurrección
  - Referencia al juicio o sentencia de la muerte
  rationale: La sintaxis del testimonio base es oscura. Una glosa más precisa afirmaría más de lo que el paquete fuente permite asegurar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: ‘Se hizo responsable’ como equivalencia de culpabilidad/obligación
  english_pob_reading: For he made himself liable, and through him the angels also were made liable.
  chosen_spanish_reading: Adán quedó sujeto a responsabilidad, y por medio de él también los ángeles quedaron sujetos a responsabilidad.
  alternative_spanish_readings:
  - Adán se hizo culpable, y por medio de él también los ángeles se hicieron culpables.
  - Adán quedó bajo culpa, y por medio de él también los ángeles quedaron bajo culpa.
  rationale: El término admite un matiz forense más que psicológico. En español, ‘responsable’ conserva la idea de carga o imputación sin forzar una única lectura de ‘culpable’.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: 'La base inglesa más reciente corrigió una duplicación accidental (‘the first Adam committed first’) y una revisión posterior añadió el sujeto explícito ‘he’ para evitar una ruptura gramatical. La redacción española sigue esa versión estabilizada: conserva ‘el primer Adán’ sin duplicación y articula claramente el verbo principal (‘siguió considerándolo’).'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino explícito.
  - Se usa ‘Espíritu’/‘espíritu’ según contexto, pero en este versículo no ocurre.
  - Se conserva la distinción entre ‘pecado’ y ‘transgresión’ para reflejar el par siríaco y la decisión inglesa.
  - ‘Los elementos’ se deja sin explicación adicional porque el préstamo griego ya funciona como término técnico en español bíblico.
  - La pasiva ‘fue/será’ se usa para mantener el tono apocalíptico y la secuencia del original.
