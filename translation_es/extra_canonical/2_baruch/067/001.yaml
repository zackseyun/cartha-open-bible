translation:
  language: es
  text: 'Y las once aguas negras[a] que viste: esta es la calamidad que ahora ha venido sobre Sion.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «aguas oscuras».'
    reason: Alternativa léxica para ܐܘܟ̈ܡܐ preservada del expediente inglés; «negras» sigue siendo la mejor opción principal por el contraste visionario.
lexical_decisions:
- source_word: ܡ̈ܝܐ ܐܘܟ̈ܡܐ
  english_pob_choice: black waters
  chosen_spanish: aguas negras
  alternatives_spanish:
  - aguas oscuras
  lexicon: Payne Smith
  rationale: Conservo el emblema visionario con el color explícito. «Negras» reproduce el contraste estructural con las aguas claras y mantiene la fuerza imagética del pasaje mejor que una generalización como «oscuras».
- source_word: ܫܘܚܬܐ
  english_pob_choice: the calamity
  chosen_spanish: la calamidad
  alternatives_spanish:
  - la desgracia
  - el desastre
  lexicon: Payne Smith
  rationale: El sustantivo español «calamidad» conserva el valor de juicio funesto y el tono apocalíptico del contexto. Otras opciones suavizan demasiado el peso del término.
- source_word: ܗܕܐ ܗܝ
  english_pob_choice: this is
  chosen_spanish: esta es
  alternatives_spanish:
  - esto es
  lexicon: Payne Smith
  rationale: El demostrativo femenino singular concuerda con «calamidad» y refleja con fidelidad la gramática siriaca. «Esto es» sería menos preciso en español porque desatiende ese acuerdo de género.
- source_word: ܨܗܝܘܢ
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: Payne Smith
  rationale: En español bíblico es tradicional y legible «Sion», que mantiene la referencia geográfica y teológica al monte/pueblo de Jerusalén sin introducir una forma menos asentada en la tradición cristiana hispana.
theological_decisions:
- issue: Relación entre las aguas negras y la calamidad sobre Sion
  english_pob_reading: This is the calamity that has now come upon Zion.
  chosen_spanish_reading: Esta imagen señala la calamidad que ahora ha venido sobre Sion.
  alternative_spanish_readings:
  - Estas son la calamidad que ahora ha venido sobre Sion.
  - Esta es la calamidad que ahora ha venido sobre Sion.
  rationale: La fuente siriaca usa un demostrativo singular que concuerda con una calamidad singular; por eso mantengo «esta es». La frase conserva la identificación simbólica entre la visión de las aguas negras y el juicio histórico sobre Sion, sin suavizar la carga profética del signo.
  doctrine_reference: Apocalíptica profética; juicio divino sobre Sion en el marco de 2 Baruc
translation_notes:
  revision_awareness: La redacción sigue el acuerdo singular del siriaco (demostrativo femenino singular + sustantivo singular) y conserva el paralelo visionario con la serie de aguas del capítulo. Se adopta la equivalencia óptima ya establecida en la auditoría inglesa, sin introducir una pluralización no respaldada por el texto.
  spanish_consistency_notes:
  - Se usa «Sion» de manera consistente con el registro bíblico hispano y con la referencia profética al centro simbólico de Judá/Jerusalén.
  - «Calamidad» mantiene el tono de juicio fuerte del original y armoniza con el estilo de la obra en español.
  - La nota alternativa se reserva para el matiz cromático de ܐܘܟ̈ܡܐ, que puede también entenderse como «oscuras».
