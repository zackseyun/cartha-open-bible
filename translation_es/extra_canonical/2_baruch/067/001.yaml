    issue: Falta «que viste»
    rationale: El inglés POB auditado dice «And the eleventh black waters that you saw». Esa referencia a la visión forma parte de la identificación del símbolo y no debería omitirse sin evidencia fuerte en contra.
  - severity: low
    issue: Puntuación y fluidez de la frase inicial
    rationale: '«Y las once aguas negras[a] — esta es...» se entiende, pero en español queda más natural «Y las once aguas negras[a] que viste: esta es...» o con una pausa equivalente.'
  revised_spanish_text: 'Y las once aguas negras[a] que viste: esta es la calamidad que ahora ha venido sobre Sion.'
