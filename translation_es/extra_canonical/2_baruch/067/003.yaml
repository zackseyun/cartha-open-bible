translation:
  language: es
  text: ¿Piensas que el Altísimo se complace en estas cosas, o que su nombre es glorificado por ellas?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Most High
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Supremo
  lexicon: epíteto divino
  rationale: ‘Altísimo’ es el equivalente español natural y reverente para el título divino del original; conserva la elevación y el valor tradicional sin sustituir el nombre divino.
- source_word: rejoices
  english_pob_choice: rejoices
  chosen_spanish: se complace
  alternatives_spanish:
  - se alegra
  - se regocija
  lexicon: verbo de agrado/divina complacencia
  rationale: En este contexto interrogativo, ‘se complace’ comunica mejor la idea de deleite o aprobación divina que un simple ‘alegrarse’, y evita una lectura demasiado emocional en español.
- source_word: name
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: nombre divino
  rationale: Se mantiene la referencia directa al ‘nombre’ como expresión de la reputación o manifestación divina; ‘su nombre’ suena natural y fiel al sentido semítico.
- source_word: glorified
  english_pob_choice: is glorified
  chosen_spanish: es glorificado
  alternatives_spanish:
  - recibe gloria
  - es honrado
  lexicon: pasiva de honor/atribución de gloria
  rationale: La pasiva ‘es glorificado’ preserva la estructura del original y el valor de atribución de gloria al nombre divino, sin desplazarlo hacia una paráfrasis más libre.
theological_decisions:
- issue: Placer divino frente a gloria del nombre
  english_pob_reading: Do you think the Most High rejoices in these things, or that his name is glorified by them?
  chosen_spanish_reading: ¿Piensas que el Altísimo se complace en estas cosas, o que su nombre es glorificado por ellas?
  alternative_spanish_readings:
  - ¿Crees que el Altísimo se alegra de estas cosas, o que su nombre es honrado por ellas?
  - ¿Piensas que el Altísimo se regocija en estas cosas, o que su nombre recibe gloria por ellas?
  rationale: 'La pregunta contrapone dos ideas: la complacencia del Altísimo en ciertos actos y la glorificación de su nombre por medio de ellos. En español conviene mantener ambas proposiciones sin fusionarlas, porque el argumento depende de esa tensión retórica.'
  doctrine_reference: Teología bíblica del honor del nombre divino; juicio moral sobre actos externos sin aprobación divina.
translation_notes:
  revision_awareness: Se tuvo en cuenta el control textual descrito como de alta concordancia y sin revisiones aplicadas; por ello no se introdujeron variantes textuales ni notas de aparato, y la redacción sigue de cerca el sentido estabilizado del inglés POB y del siríaco de control.
  spanish_consistency_notes:
  - Se preservó ‘Altísimo’ como título divino consistente con el registro bíblico en español.
  - No se usó ‘SEÑOR’ para el nombre divino, conforme a la política del proyecto.
  - ‘su nombre’ se mantuvo sin expansión interpretativa para conservar la densidad semítica del original.
  - El tono interrogativo se conservó para reflejar la fuerza retórica del verso.
