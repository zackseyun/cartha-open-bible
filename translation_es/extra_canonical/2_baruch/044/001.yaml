translation:
  language: es
  text: 'Y yo, Baruc, me fui de allí y llegué al pueblo. Y llamé a mi primogénito, a sus habitantes, a los ancianos de sus principales, y a los humildes de entre los ancianos del pueblo, y les dije:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܒܘܟܪܝ
  english_pob_choice: my firstborn
  chosen_spanish: mi primogénito
  alternatives_spanish:
  - mi primero
  - mi hijo mayor
  lexicon: Payne Smith
  rationale: La forma puede referirse literalmente al primogénito; en este contexto de convocatoria cívica también puede aludir a los principales. En español, 'mi primogénito' conserva la forma del texto sin forzar una reinterpretación no explícita.
- source_word: ܥܡܘܪܝܗ
  english_pob_choice: its inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los habitantes de ella
  - sus moradores
  lexicon: Payne Smith
  rationale: El sufijo posesivo remite a una entidad femenina/implícita del contexto; 'sus habitantes' reproduce de manera natural la relación posesiva sin añadir contenido.
- source_word: ܩܫܝܫܝ ܪ̈ܘܪܒܢܘܗܝ
  english_pob_choice: the elders of its great ones
  chosen_spanish: los ancianos de sus grandes
  alternatives_spanish:
  - los ancianos de sus notables
  - los ancianos de sus principales
  lexicon: Payne Smith
  rationale: La cadena constructa es difícil; el español mantiene el orden relacional de manera bastante directa. 'Sus grandes' preserva la referencia a los prominentes sin convertirla en una paráfrasis más libre.
- source_word: ܡܟܝܟܐ
  english_pob_choice: the lowly
  chosen_spanish: los humildes
  alternatives_spanish:
  - los bajos
  - los de condición humilde
  lexicon: Payne Smith
  rationale: Aquí el término señala una condición social baja o humilde. 'Los humildes' es natural en español y conserva la resonancia de contraste con los grandes y ancianos.
theological_decisions:
- issue: Listado social del llamado de Baruc
  english_pob_reading: its inhabitants, and the elders of its great ones, and the lowly from the elders of the people
  chosen_spanish_reading: a sus habitantes, y a los ancianos de sus grandes, y a los humildes entre los ancianos del pueblo
  alternative_spanish_readings:
  - a los grandes del pueblo y a los ancianos
  - a los principales del pueblo y a los ancianos
  rationale: El texto siríaco conserva un listado social escalonado. La versión española evita nivelarlo y mantiene la tensión entre prominencia y humildad que el pasaje presenta.
  doctrine_reference: Remanente y orden comunitario en 2 Baruc 44:1
