translation:
  language: es
  text: Pero recuerda y amonesta al pueblo que queda, no sea que se aparten de los mandamientos del Poderoso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: remember
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - acuérdate de
  lexicon: No aplica
  rationale: El imperativo simple conserva el valor exhortativo breve del original y fluye naturalmente en español; 'acuérdate de' sería posible, pero aquí la coordinación con 'amonesta' favorece una forma más concisa.
- source_word: admonish
  english_pob_choice: admonish
  chosen_spanish: amonesta
  alternatives_spanish:
  - advierte
  - exhorta
  lexicon: No aplica
  rationale: '''Amonesta'' mantiene el matiz de reprensión exhortativa presente en el contexto profético; ''advierte'' perdería algo de fuerza moral y ''exhorta'' sería más general.'
- source_word: the people who remain
  english_pob_choice: the people who remain
  chosen_spanish: al pueblo que queda
  alternatives_spanish:
  - al pueblo que permanece
  - al resto del pueblo
  lexicon: No aplica
  rationale: '''Que queda'' traduce de manera directa el grupo remanente sin introducir un término técnico no presente en el texto; ''resto'' podría sonar interpretativo.'
- source_word: withdraw
  english_pob_choice: withdraw
  chosen_spanish: se aparten
  alternatives_spanish:
  - se retiren
  - se desvíen
  lexicon: No aplica
  rationale: En este contexto de obediencia a mandamientos, 'se aparten' expresa bien la desviación moral o religiosa implícita en el verbo.
- source_word: commandments
  english_pob_choice: commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - los mandatos
  lexicon: No aplica
  rationale: '''Mandamientos'' es el equivalente más estable en español bíblico para las órdenes normativas divinas y conserva la resonancia legal-covenantal.'
- source_word: the Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Todopoderoso
  lexicon: No aplica
  rationale: El epíteto divino se vierte con una mayúscula sustantivada que mantiene el título sin sustituirlo por una formulación más tradicional o interpretativa. 'Poderoso' sigue de cerca el valor semántico del inglés POB.
theological_decisions:
- issue: Título divino 'the Mighty One'
  english_pob_reading: The English POB preserves the epithet 'Mighty One' rather than masking it as 'LORD'.
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
  - el Todopoderoso
  - el Fuerte
  rationale: Se conserva el carácter de título divino y su fuerza descriptiva sin ocultarlo tras un término genérico. 'El Poderoso' reproduce el epíteto con sobriedad y claridad en español.
  doctrine_reference: Divine title rendering / source transparency
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés vigente permanece sin modificaciones sustantivas. Se respetó la eliminación del comillado final erróneo en el testigo inglés, aunque no afecta la formulación española.
  spanish_consistency_notes:
  - Se mantiene 'Poderoso' como título divino, coherente con la política de no ocultar el nombre/título tras 'SEÑOR'.
  - Se usa un registro bíblico moderno y sobrio, sin arcaísmos innecesarios.
  - No se añadió nota al pie porque la única nota inglesa era una variante ya resuelta en la redacción española y no requiere anclaje textual.
