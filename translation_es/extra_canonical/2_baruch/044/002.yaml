base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_baruch/044/002.yaml
  text: But you, do not withdraw from the way of the law, but guard and admonish the people who remain, lest they withdraw from the commandments of the Mighty One.
  footnotes:
  - marker: a
    text: Or 'Hear, O Israel, behold, I am going the way of all the earth; but do not withdraw from the statutes of the Mighty One.'.
    reason: previous_rendering
