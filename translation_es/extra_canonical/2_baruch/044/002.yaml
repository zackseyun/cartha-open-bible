    issue: Cambio injustificado de segunda persona plural a singular
    rationale: El expediente léxico mismo admite que el siríaco/inglés apunta a una dirección plural («ܐܢܬܘܢ», alternativa «Pero ustedes»), pero el texto principal dice «Pero tú, no te apartes». Este cambio no está justificado por la evidencia dada y afecta la fidelidad formal y discursiva del versículo.
  - severity: medium
    issue: Incoherencia de concordancia pragmática dentro del versículo
    rationale: 'Pasar de «tú» a «el pueblo que queda ... para que no se aparten» no es imposible, pero el flujo resulta menos natural que una exhortación plural continua: «ustedes ... guarden y amonesten».'
  - severity: low
    issue: La nota [a] es útil pero no estrictamente necesaria para el lector final
    rationale: La nota explica una corrección editorial del historial inglés, no una ambigüedad del texto español. Puede mantenerse por trazabilidad, pero conviene formularla con concisión.
  revised_spanish_text: Pero ustedes, no se aparten del camino de la ley, sino guarden y amonesten al pueblo que queda, para que no se aparten de los mandamientos del Poderoso.[a]
