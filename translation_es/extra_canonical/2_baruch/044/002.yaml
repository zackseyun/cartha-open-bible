    changes_summary: Adjusted the draft to remove the conflated opening phrase from the prior verse and retain the warning to guard and admonish the people who remain, while preserving the source sense as given in the current draft and note.
translation:
  language: es
  text: Pero ustedes, no se aparten del camino de la ley, sino guarden y amonesten al pueblo que queda, para que no se aparten de los mandamientos del Poderoso.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La nota inglesa anterior pertenecía al versículo previo y mezclaba 44:1 con 44:2. Aquí el texto fuente comienza con la advertencia «Pero ustedes, no se aparten...», y no con «Oye, Israel» ni «voy por el camino de toda la tierra».
    reason: source_note
lexical_decisions:
- source_word: ܐܢܬܘܢ ܕܝܢ / But you
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Pero ustedes
  - Y tú
  lexicon: contrastive particle + 2nd person address
  rationale: El contraste inicial debe conservarse con «Pero», y el sujeto explícito «tú» refleja el address personal del texto sin sobrecargarlo. Aunque el inglés usa plural formal, el sentido aquí funciona naturalmente en singular enfático en español.
- source_word: ܠܐ ܬܥܕܘܢ / do not withdraw
  english_pob_choice: do not withdraw
  chosen_spanish: no te apartes
  alternatives_spanish:
  - no te retires
  - no te desvies
  lexicon: verb of turning away / leaving
  rationale: «Apartarse» comunica la idea de desviarse o abandonar una vía normativa en español bíblico contemporáneo sin sonar mecánico. «Retirarse» es posible, pero es menos preciso para el valor moral de la advertencia.
- source_word: ܐܘܪܚܐ ܕܢܡܘܣܐ / the way of the law
  english_pob_choice: the way of the law
  chosen_spanish: del camino de la ley
  alternatives_spanish:
  - de la senda de la ley
  - de la vía de la ley
  lexicon: way/path + law
  rationale: Mantengo «camino» por su correspondencia natural con una ruta normativa de conducta. «Ley» preserva el término jurídico-religioso del original; no lo sustituyo por «mandamiento» aquí porque el texto distingue luego los mandamientos.
- source_word: ܛܪ / guard
  english_pob_choice: guard
  chosen_spanish: guarda
  alternatives_spanish:
  - vigila
  - custodia
  lexicon: keep/watch carefully
  rationale: «Guardar» en español bíblico transmite conservar y velar por algo de manera activa. Aquí funciona bien junto con «amonesta» como par de verbos pastorales.
- source_word: ܐܕܡܘܪ / admonish
  english_pob_choice: admonish
  chosen_spanish: amonesta
  alternatives_spanish:
  - advierte
  - exhorta
  lexicon: admonish/exhort/warn
  rationale: «Amonestar» conserva mejor el matiz de corrección seria y exhortación moral que «advertir», que podría sonar más débil. «Exhorta» es viable, pero «amonesta» refleja mejor la tonalidad del pasaje.
- source_word: ܥܡܐ ܕܫܪܝܢ / the people who remain
  english_pob_choice: the people who remain
  chosen_spanish: al pueblo que queda
  alternatives_spanish:
  - al pueblo que permanece
  - a la gente que queda
  lexicon: remnant / remaining people
  rationale: «Pueblo que queda» reproduce de forma clara el sentido de remanente sin introducir terminología técnica adicional. «Permanece» también es posible, pero «queda» es más directo en español.
- source_word: ܕܠܡܐ / lest
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: negative purpose / prevention
  rationale: «Para que no» expresa bien la finalidad preventiva del giro de temor. Es más fluido que «no sea que» en este contexto y no altera la advertencia.
- source_word: ܦܘܩܕܢܐ / commandments
  english_pob_choice: commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - las ordenanzas
  - los preceptos
  lexicon: commandments / instructions
  rationale: «Mandamientos» mantiene la equivalencia directa con el inglés auditado y distingue este término de «ley» en la cláusula anterior. La repetición es intencional y refleja la distinción del texto.
- source_word: ܓܒܪܐ ܚܝܠܬܢܐ / the Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Todopoderoso
  lexicon: divine epithet of power
  rationale: «El Poderoso» conserva el epíteto divino sin sobreespecificar más allá del original. Evito «Todopoderoso» porque intensifica el título más de lo que exige el texto.
theological_decisions:
- issue: Distinción entre «ley» y «mandamientos»
  english_pob_reading: the way of the law ... the commandments of the Mighty One
  chosen_spanish_reading: el camino de la ley ... los mandamientos del Poderoso
  alternative_spanish_readings:
  - el camino de la ley ... las ordenanzas del Poderoso
  - la senda de la ley ... los preceptos del Poderoso
  rationale: Conservo la diferencia conceptual entre la norma general («ley») y sus expresiones concretas («mandamientos»). El texto advertía contra apartarse de uno y de los otros, así que la traducción mantiene ambos niveles.
  doctrine_reference: sabiduría/obediencia de la Torá en literatura judía del Segundo Templo
- issue: Referencia divina en «el Poderoso»
  english_pob_reading: the Mighty One
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
  - Dios poderoso
  - el Todopoderoso
  rationale: El epíteto se traduce de manera directa y reverente sin convertirlo en un título más doctrinalmente cargado. «El Poderoso» deja visible la forma original y evita ocultar la textura del texto.
  doctrine_reference: atributos divinos en lenguaje bíblico y parabíblico
translation_notes:
  revision_awareness: 'El audit trail inglés registra una corrección importante: la versión anterior confundía 44:1 con 44:2. Esta redacción española sigue la forma corregida, manteniendo la advertencia central de no apartarse del camino de la ley y de cuidar/admonestar al pueblo restante. También conserva la distinción entre «ley» y «mandamientos» que está explícita en la línea fuente.'
  spanish_consistency_notes:
  - He usado «Poderoso» para el epíteto divino según el patrón de la serie POB.
  - He evitado «SEÑOR» y «Cristo» porque no corresponden a este versículo.
  - He mantenido un registro sobrio y bíblico, sin arcaísmos innecesarios.
