translation:
  language: es
  text: Y acontecerá que, cuando se reconozcan unos a otros—los que ahora se conocen—, entonces el aspecto de los que ahora están condenados se volverá más terrible.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: recognize one another
  english_pob_choice: recognize one another
  chosen_spanish: se reconozcan unos a otros
  alternatives_spanish:
  - se conozcan unos a otros
  - se identifiquen mutuamente
  lexicon: reconocer
  rationale: El sentido principal es el reconocimiento mutuo; en español, 'reconocerse' comunica bien la idea de volver a identificar a alguien que ya es conocido, y preserva la relación recíproca del enunciado.
- source_word: those who now know one another
  english_pob_choice: those who now know one another
  chosen_spanish: los que ahora se conocen unos a otros
  alternatives_spanish:
  - los que ahora se conocen
  - los que ahora están mutuamente conocidos
  lexicon: conocer
  rationale: La frase funciona como aclaración explicativa del primer miembro. 'Se conocen unos a otros' mantiene la reciprocidad y evita perder el matiz relacional del texto fuente.
- source_word: appearance
  english_pob_choice: appearance
  chosen_spanish: la apariencia
  alternatives_spanish:
  - el aspecto
  - la apariencia visible
  lexicon: apariencia
  rationale: '''Apariencia'' reproduce de manera directa el valor visual del término sin añadir interpretaciones sobre esencia o identidad.'
- source_word: those who are now condemned
  english_pob_choice: those who are now condemned
  chosen_spanish: los que ahora están condenados
  alternatives_spanish:
  - los que ahora son condenados
  - los que ahora han sido condenados
  lexicon: condenar
  rationale: El participio pasivo expresa el estado resultante de condena. 'Están condenados' comunica bien ese estado actual y suena natural en español.
- source_word: more dreadful
  english_pob_choice: more dreadful
  chosen_spanish: más terrible
  alternatives_spanish:
  - más espantosa
  - más temible
  lexicon: terrible
  rationale: '''Terrible'' conserva la fuerza de juicio aterrador del original y funciona como equivalente sobrio y comprensible en español.'
theological_decisions:
- issue: Secuencia temporal de la frase
  english_pob_reading: when they recognize one another ... that then ... will become more dreadful
  chosen_spanish_reading: cuando se reconozcan unos a otros ... entonces ... se volverá más terrible
  alternative_spanish_readings:
  - cuando se reconozcan unos a otros ... y ... se volverá más terrible
