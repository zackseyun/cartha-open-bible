  rationale: 'La estructura mantiene la relación temporal y consecutiva del texto: el reconocimiento mutuo desencadena un aumento de terror en la apariencia de los condenados. ''Se volverá'' conserva el cambio de estado indicado por el verbo inglés.'
  doctrine_reference: Eschatological judgment imagery in 2 Baruch 52:3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés, que simplifica la secuencia temporal redundante y deja una estructura más natural; por eso se usó 'cuando... entonces...' en español para reflejar el mismo progreso lógico sin sobrecargar la frase.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y literario, adecuado para literatura apocalíptica.
  - No se introdujo terminología eclesiástica ajena al texto; se conservaron los valores descriptivos y relacionales del pasaje.
  - La referencia recíproca 'unos a otros' se repite solo donde el español lo necesita para claridad y fluidez.
