    issue: Redundancia pesada con 'unos a otros' repetido en ambas cláusulas
    rationale: Aunque no es incorrecto, 'cuando se reconozcan unos a otros —los que ahora se conocen unos a otros—' suena innecesariamente mecánico en español. La segunda cláusula puede decir simplemente 'los que ahora se conocen' sin perder reciprocidad.
  - severity: low
    issue: '''Apariencia'' es menos idiomático que ''aspecto'' en este contexto'
    rationale: El inglés 'appearance' puede verterse como 'apariencia', pero en español 'el aspecto de los condenados' suena más natural para referirse a cómo se verán y mantiene el sentido visual sin insinuar superficialidad.
  revised_spanish_text: Y acontecerá que, cuando se reconozcan unos a otros—los que ahora se conocen—, entonces el aspecto de los que ahora están condenados se volverá más terrible.
