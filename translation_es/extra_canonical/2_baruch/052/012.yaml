translation:
  language: es
  text: Maravillas[a] aparecerán ante ellos a su tiempo. Porque verán ese mundo que ahora les es invisible, y ese tiempo que ahora les está oculto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aparecerán maravillas»'
