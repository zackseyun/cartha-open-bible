lexical_decisions:
- source_word: wonders
  english_pob_choice: Wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - señales
  lexicon: N/A
  rationale: El inglés POB entiende el sustantivo como hechos extraordinarios y visibles, no como mera curiosidad; en español, 'maravillas' conserva ese valor y suena natural en registro bíblico sin forzar una teología específica.
- source_word: appear
  english_pob_choice: will appear
  chosen_spanish: se les aparecerán
  alternatives_spanish:
  - aparecerán
  - serán vistas por ellos
  lexicon: N/A
  rationale: El pasivo/medio inglés admite una lectura de manifestación dirigida a ellos; 'se les aparecerán' mantiene la idea de aparición para su percepción y evita una pasiva dura en español.
- source_word: that world
  english_pob_choice: that world
  chosen_spanish: ese mundo
  alternatives_spanish:
  - aquel mundo
  - ese siglo
  lexicon: N/A
  rationale: '''Mundo'' traduce de manera directa el referente cósmico/orden de realidad del contexto; ''ese'' conserva cercanía textual sin sustituir el sentido por una glosa.'
- source_word: invisible
  english_pob_choice: invisible
  chosen_spanish: invisible
  alternatives_spanish:
  - oculto a la vista
  - no visible
  lexicon: N/A
  rationale: Se conserva el término transparente 'invisible', que refleja bien la oposición con 'verán' y no añade una interpretación excesiva.
- source_word: that time
  english_pob_choice: that time
  chosen_spanish: ese tiempo
  alternatives_spanish:
  - aquel tiempo
  - ese momento
  lexicon: N/A
  rationale: '''Tiempo'' mantiene la amplitud del original, que apunta a un período/era más que a un instante puntual.'
- source_word: hidden
  english_pob_choice: hidden
  chosen_spanish: les está oculto
  alternatives_spanish:
  - está escondido para ellos
  - se les oculta
  lexicon: N/A
  rationale: La construcción 'les está oculto' reproduce la relación de ocultamiento respecto de ellos con estilo sobrio y idiomático.
theological_decisions:
- issue: Visión del mundo venidero y del tiempo oculto
  english_pob_reading: they will see that world which is now invisible to them, and that time which is now hidden from them
  chosen_spanish_reading: verán ese mundo que ahora les es invisible, y ese tiempo que ahora les está oculto
  alternative_spanish_readings:
  - verán aquel mundo que ahora no pueden ver, y aquel tiempo que ahora no conocen
  rationale: 'La formulación mantiene la tensión escatológica del texto: hay una realidad y un tiempo presentes pero velados, no simplemente inexistentes. Se evita banalizarlo como ignorancia subjetiva בלבד.'
  doctrine_reference: escatología / revelación futura
translation_notes:
  revision_awareness: La decisión editorial inglesa reciente solo ajustó mayúscula inicial ('Wonders'); la traducción española no depende de esa diferencia, pero conserva el tono declarativo y la lectura alternativa del verbo/estructura mediante nota.
  spanish_consistency_notes:
  - Se mantiene 'mundo' y 'tiempo' de forma consistente para las dos cláusulas paralelas.
  - No se introduce vocabulario doctrinal ajeno al texto; el énfasis permanece en la manifestación futura y la invisibilidad/ocultamiento presentes.
