review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien el sentido del inglés POB y, en líneas generales, la evidencia fuente: se anuncian maravillas en el tiempo correspondiente y luego se explica que verán un mundo ahora invisible y un tiempo ahora oculto. Sin embargo, la frase inicial usa una construcción dativa pronominal innecesariamente marcada (''Se les aparecerán maravillas'') que suena menos natural y además invierte el orden más claro en español.'
  spanish_quality_summary: 'El texto es mayormente claro, digno y legible. La segunda oración está bien lograda. La mejora principal es estilística y de naturalidad: ''Maravillas[a] aparecerán ante ellos a su tiempo'' o ''Maravillas[a] se les aparecerán a su tiempo'' serían posibles, pero la forma más limpia y fiel al POB es ''Maravillas[a] aparecerán ante ellos a su tiempo''. También conviene alinear la nota con la alternativa inglesa real, no repetir prácticamente la misma redacción.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Maravillas', 'mundo', 'tiempo', 'invisible' y 'oculto' son adecuados. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión léxica central solo requiere una mejora de naturalidad sintáctica en 'appear'.
  issues:
  - severity: medium
    issue: 'Construcción inicial poco natural: ''Se les aparecerán maravillas'''
    rationale: Aunque comprensible, la secuencia suena forzada en español bíblico moderno y no mejora la fidelidad frente a una opción más natural. El inglés POB dice 'Wonders will appear to them', donde el foco recae en la aparición de las maravillas ante ellos, no en una construcción pronominal marcada.
  - severity: low
    issue: La nota al pie no refleja bien la alternativa inglesa documentada
    rationale: 'La nota inglesa dice ''Or "wonders will appear"''. La nota española ''O: «se aparecerán maravillas»'' ofrece una variante menos natural y muy cercana al texto principal, en vez de conservar una alternativa significativa como ''Aparecerán maravillas''.'
  revised_spanish_text: Maravillas[a] aparecerán ante ellos a su tiempo. Porque verán ese mundo que ahora les es invisible, y ese tiempo que ahora les está oculto.
  revised_footnotes:
  - marker: a
    text: 'O: «Aparecerán maravillas»'
    reason: alternative_rendering_preserving_english_note
  revision_rationale: 'Se ajusta la primera cláusula para sonar natural en español contemporáneo y conservar el énfasis del POB: las maravillas se manifestarán ante ellos. La segunda oración se mantiene porque es fiel, clara y teológicamente adecuada. La nota se corrige para corresponder mejor a la alternativa documentada en inglés.'
