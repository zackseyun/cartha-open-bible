lexical_decisions:
- source_word: “those who rejected the law”
  english_pob_choice: those who rejected the law
  chosen_spanish: los que rechazaron la ley
  alternatives_spanish:
  - los que desecharon la ley
  - los que repudiaron la ley
  lexicon: ley
  rationale: «Rechazaron» conserva la fuerza voluntaria del verbo y permite una formulación natural en español sin suavizar la oposición a la ley.
- source_word: “stopped their ears”
  english_pob_choice: stopped their ears
  chosen_spanish: taparon sus oídos
  alternatives_spanish:
  - cerraron sus oídos
  - se taparon los oídos
  lexicon: oídos
  rationale: «Taparon sus oídos» expresa una acción deliberada y idiomática en español, manteniendo la imagen corporal de negarse a escuchar.
- source_word: “wisdom”
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - la prudencia
  - el saber
  lexicon: sabiduría
  rationale: «Sabiduría» es el equivalente directo y conserva el valor sapiencial del término en un contexto de instrucción rechazada.
- source_word: “understanding”
  english_pob_choice: understanding
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - la inteligencia
  - la comprensión
  lexicon: entendimiento
  rationale: «Entendimiento» preserva la pareja sapiencial con «sabiduría» y mantiene el tono bíblico sin volverlo más explicativo de lo que permite el texto.
theological_decisions:
- issue: La fuerza de la condena sobre quienes rechazan la instrucción divina
  english_pob_reading: But they will especially be confounded—those who rejected the law and stopped their ears so as not to hear wisdom and not to receive understanding—
  chosen_spanish_reading: Pero serán especialmente confundidos los que rechazaron la ley y taparon sus oídos para no oír la sabiduría ni recibir el entendimiento.
  alternative_spanish_readings:
  - Pero quedarán especialmente avergonzados los que rechazaron la ley...
  - Pero serán especialmente avergonzados...
  rationale: «Confundidos» sigue de cerca la elección inglesa de «confounded» y evita imponer por adelantado una lectura moralizante más fuerte como «avergonzados», que el contexto puede sugerir pero no exige inequívocamente en esta línea.
  doctrine_reference: 'Sapiencial/judicial: rechazo culpable de la instrucción divina y sus consecuencias.'
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el texto inglés auditado, que no tuvo revisiones ni notas, y mantiene la misma estructura semántica principal: resultado de confusión, rechazo de la ley, oídos cerrados, y negación de sabiduría y entendimiento.'
  spanish_consistency_notes:
  - Se conserva el paralelismo entre «sabiduría» y «entendimiento», como en el inglés auditado.
  - No se introduce terminología eclesiástica ajena; «ley» y «entendimiento» permanecen en registro bíblico sobrio.
  - 'El orden de las cláusulas reproduce el énfasis del original: primero el resultado, luego la caracterización de quienes lo experimentan.'
