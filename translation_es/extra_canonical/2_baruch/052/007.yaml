  to: entonces su esplendor será glorificado en transformaciones, y la forma de sus rostros será transformada en la luz de su belleza, para que adquieran y reciban el mundo que no muere, que les ha sido prometido.
  rationale: Se reemplaza 'será cambiada en' por 'será transformada en' para reflejar con mejor español la idea de cambio resultativo del original y del POB inglés revisado, sin introducir paráfrasis ni alterar el sentido teológico o escatológico del pasaje.
