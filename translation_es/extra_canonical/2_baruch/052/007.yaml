translation:
  language: es
  text: entonces su esplendor será glorificado en transformaciones, y la forma de sus rostros será transformada en la luz de su belleza, para que adquieran y reciban el mundo que no muere, que les ha sido prometido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: their splendor / nštbḥ b-šwḥlp'
  english_pob_choice: their splendor will be glorified in transformations
  chosen_spanish: su esplendor será glorificado en transformaciones
  alternatives_spanish:
  - sus esplendores se despertarán
  - su esplendor despertará
  - sus esplendores serán exaltados en cambios
  lexicon: splendor -> esplendor; glorified -> glorificado; transformations -> transformaciones
  rationale: El siríaco expresa exaltación mediante una pasiva de glorificación asociada con 'transformaciones'; por eso en español conviene mantener la relación entre gloria y cambio sin reducirla a un simple 'despertar' o 'brillar'. 'Esplendor' conserva el sentido de brillo/gloria, y 'transformaciones' refleja el plural o la idea de múltiples cambios del original.
- source_word: the form of their faces / nšthlp
  english_pob_choice: the form of their faces will be changed into
  chosen_spanish: la forma de sus rostros será cambiada en
  alternatives_spanish:
  - la forma de sus rostros será transformada en
  - el aspecto de sus rostros cambiará a
  - la forma de sus rostros se volverá
  lexicon: form -> forma; faces -> rostros; changed into -> será cambiada en
  rationale: '''Forma'' y ''rostros'' siguen de cerca la imagen concreta del texto. ''Será cambiada en'' conserva la idea de transformación resultativa sin convertirla en una paráfrasis más libre.'
- source_word: the light of their beauty
  english_pob_choice: the light of their beauty
  chosen_spanish: la luz de su belleza
  alternatives_spanish:
  - la claridad de su hermosura
  - la luz de su esplendor
  - el resplandor de su belleza
  lexicon: light -> luz; beauty -> belleza
  rationale: '''Luz de su belleza'' reproduce la imagen luminosa del original y del inglés POB, con español natural y digno. Se evita ''hermosura'' por registro menos uniforme, aunque sería posible.'
- source_word: the world that does not die
  english_pob_choice: the world that does not die
  chosen_spanish: el mundo que no muere
  alternatives_spanish:
  - el mundo imperecedero
  - el mundo inmortal
  - el siglo que no muere
  lexicon: world -> mundo; does not die -> no muere
  rationale: 'Se conserva la tensión literal del texto: no se sustituye por una abstracción como ''siglo'' o ''edad'', porque el POB inglés mantiene ''world'' y el siríaco apunta a un mundo venidero no sujeto a muerte.'
theological_decisions:
- issue: Naturaleza del 'mundo que no muere'
  english_pob_reading: the world that does not die, which is promised to them
  chosen_spanish_reading: el mundo que no muere, que les ha sido prometido
  alternative_spanish_readings:
  - la vida inmortal que les ha sido prometida
  - la era imperecedera prometida a ellos
  rationale: La formulación mantiene la promesa de un orden futuro real y recibido, sin espiritualizarlo indebidamente. 'Les ha sido prometido' conserva el pasivo de promesa y el carácter donado del destino escatológico.
  doctrine_reference: escatología de resurrección y herencia futura
translation_notes:
  revision_awareness: La versión inglesa fue revisada para abandonar lecturas erróneas como 'awake/shine' y fijar la base en 'glorified in transformations' y 'changed into', de modo que la traducción española sigue esa corrección y no reproduce el estado anterior descartado por el revisor.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando el calco excesivo.
  - '''Esplendor'' se usa para conservar la fuerza de gloria/brillo sin imponer terminología litúrgica ajena al pasaje.'
  - No se introducen títulos cristológicos ni vocabulario tradicional no presente en el texto.
  - 'La sintaxis conserva el encadenamiento de resultados del original: glorificación -> cambio de forma -> recepción del mundo prometido.'
