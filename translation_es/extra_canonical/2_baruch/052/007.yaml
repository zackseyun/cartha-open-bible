review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la línea del POB inglés revisado y preserva los elementos clave del siríaco: glorificación vinculada con transformaciones, cambio de la forma de los rostros, luz de la belleza, y recepción del mundo que no muere prometido. Sin embargo, hay un ajuste importante de español y de matiz semántico en la construcción ''será cambiada en'', que en español suena menos natural y menos preciso para ''changed into'' que ''será transformada en''.'
  spanish_quality_summary: El texto es claro y digno, pero 'la forma de sus rostros será cambiada en la luz de su belleza' resulta algo rígido e idiomáticamente débil. 'Transformada en' mejora la legibilidad sin perder fidelidad. El resto del verso es natural y comprensible en español eclesial amplio.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Esplendor', 'glorificado', 'transformaciones', 'rostros', 'luz', 'belleza' y 'mundo que no muere' son consistentes con el expediente inglés y con un español fiel. La revisión propuesta solo corrige la expresión española de 'changed into'.
  issues:
  - severity: medium
    issue: La expresión 'será cambiada en' es poco natural en español para un resultado transformativo.
    rationale: Aunque calca el inglés 'changed into', en español bíblico contemporáneo 'será transformada en' o 'será cambiada a' comunican mejor la idea de conversión resultativa. Dado que el siríaco revisado enfatiza transformación, 'transformada en' preserva mejor forma y sentido.
  revised_spanish_text: entonces su esplendor será glorificado en transformaciones, y la forma de sus rostros será transformada en la luz de su belleza, para que adquieran y reciban el mundo que no muere, que les ha sido prometido.
  revision_rationale: Se reemplaza 'será cambiada en' por 'será transformada en' para reflejar con mejor español la idea de cambio resultativo del original y del POB inglés revisado, sin introducir paráfrasis ni alterar el sentido teológico o escatológico del pasaje.
