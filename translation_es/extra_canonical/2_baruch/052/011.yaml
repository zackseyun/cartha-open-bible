translation:
  language: es
  text: Pero para aquellos que fueron librados por sus obras, y para quienes la ley fue esperanza, y el entendimiento, expectativa, y la sabiduría, confianza, y la pureza, una corona.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: for those who were delivered by their works
  english_pob_choice: those who were delivered by their works
  chosen_spanish: aquellos que fueron librados por sus obras
  alternatives_spanish:
  - aquellos que fueron salvados por sus obras
  - los que fueron rescatados por sus obras
  lexicon: librar
  rationale: ‘Delivered’ expresa una liberación obtenida; ‘librados’ conserva esa fuerza sin introducir un lenguaje más técnico que el texto no exige. ‘Salvados’ podría sonar más teológico de lo que aquí asegura el siríaco.
- source_word: the law was hope
  english_pob_choice: the law was hope
  chosen_spanish: la ley fue esperanza
  alternatives_spanish:
  - la ley era esperanza
  - la ley les fue esperanza
  lexicon: ley / esperanza
  rationale: Se mantiene la estructura predicativa breve del original. ‘Fue’ reproduce la afirmación sentenciosa y evita añadir un sujeto explícito que el texto no da.
- source_word: understanding expectation
  english_pob_choice: understanding expectation
  chosen_spanish: el entendimiento expectación
  alternatives_spanish:
  - el entendimiento fue expectación
  - la inteligencia, expectativa
  lexicon: entendimiento / expectativa
  rationale: ‘Expectación’ conserva el sustantivo abstracto y la relación nominal compacta del original. ‘Entendimiento’ traduce el valor cognitivo de la base léxica sin forzar una perífrasis.
- source_word: wisdom confidence
  english_pob_choice: wisdom confidence
  chosen_spanish: la sabiduría confianza
  alternatives_spanish:
  - la sabiduría fue confianza
  - la sabiduría, seguridad
  lexicon: sabiduría / confianza
  rationale: La yuxtaposición de cualidades se preserva en español. ‘Confianza’ sigue el peso relacional del término sin suavizarlo a una abstracción más débil como ‘seguridad’.
- source_word: purity a crown
  english_pob_choice: purity a crown
  chosen_spanish: la pureza una corona
  alternatives_spanish:
  - la pureza, una corona
  - la pureza fue una corona
  lexicon: pureza / corona
  rationale: Se corrige la antigua lectura errónea de ‘endurance strength’ siguiendo el siríaco ‘dkyuthā klilā’. ‘Pureza’ y ‘corona’ mantienen el paralelo nominativo y el sentido de recompensa/ornamento sin añadir metáforas ajenas.
theological_decisions:
- issue: Reading the final phrase as purity rather than endurance/strength
  english_pob_reading: The revised English POB reads 'and purity a crown,' rejecting the prior mistranslation 'and endurance strength'.
  chosen_spanish_reading: y la pureza una corona
  alternative_spanish_readings:
  - y la pureza fue una corona
  - y la pureza como corona
  rationale: El testigo siríaco citado en el audit trail favorece claramente ‘pureza’ y ‘corona’. La traducción española sigue esa corrección y evita reproducir una lectura ya adjudicada como errónea.
  doctrine_reference: Textual criticism / source fidelity
translation_notes:
  revision_awareness: 'El audit trail registra una corrección aplicada: la frase final no significa ''and endurance strength'', sino ''and purity a crown''. La versión española sigue la lectura revisada y no conserva la glosa errónea anterior.'
  spanish_consistency_notes:
  - Se mantiene el registro sentencioso y acumulativo del original con cláusulas coordinadas por 'y'.
  - No se introduce puntuación interpretativa adicional más allá de la coma necesaria para la fluidez en español.
  - Se usa 'librados' para conservar el matiz de liberación sin cargar la frase con una soteriología posterior.
