revisions:
- from: Porque los primeros recibirán a los últimos, a quienes ellos esperaban, y los últimos a los que habían oído que habían pasado a la muerte.
  to: Porque los primeros recibirán a los últimos, a quienes esperaban, y los últimos a aquellos de quienes habían oído que habían fallecido.[a]
  rationale: Se suaviza un pronombre innecesario y se reemplaza un giro poco idiomático por «habían fallecido», que conserva el eufemismo de 'passed away' en español natural. Además, se añade una nota para reflejar la alternativa de formulación registrada en la auditoría inglesa.
