review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura contrastiva del siríaco/POB: «los primeros»/«los últimos», con recepción mutua de grupos esperados o dados por muertos. Sin embargo, en la última cláusula «habían pasado a la muerte» no refleja con naturalidad el sentido de ''had passed away'' y suena forzado en español; además, el inglés auditado ya simplificó una construcción literal para ganar legibilidad sin pérdida de sentido.'
  spanish_quality_summary: La frase es generalmente clara, pero «a quienes ellos esperaban» suena algo pesada por el pronombre explícito innecesario, y «habían pasado a la muerte» resulta poco idiomático y más duro que el eufemismo esperado. Una pequeña revisión mejora la fluidez y mantiene el tono digno.
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. «Los primeros/los últimos» y «recibirán» están bien. Para 'passed away', el mejor equivalente español aquí es «habían fallecido», con nota que preserve la alternativa más literal heredada del inglés si se desea.
  issues:
  - severity: medium
    issue: «a quienes ellos esperaban» es gramatical pero poco natural en español.
    rationale: El pronombre «ellos» no añade información necesaria y vuelve la frase más rígida que el original exige. «a quienes esperaban» preserva el referente y mejora la lectura.
  - severity: medium
    issue: «habían pasado a la muerte» suena calcado y poco idiomático.
    rationale: Aunque intenta conservar solemnidad, en español eclesial general no es una expresión natural para 'passed away'. «habían fallecido» mantiene el eufemismo del inglés POB y evita una formulación extraña.
  - severity: low
    issue: Falta reflejar la alternativa auditada del inglés en nota al pie.
    rationale: El inglés POB conserva una variante de formulación ('those of whom they had heard...'). En español conviene preservar esa alternativa como nota, ya que la sintaxis puede formularse también como «de quienes habían oído...».
  revised_spanish_text: Porque los primeros recibirán a los últimos, a quienes esperaban, y los últimos a aquellos de quienes habían oído que habían fallecido.[a]
  revised_footnotes:
  - marker: a
    text: O «a aquellos de quienes habían oído que habían pasado de esta vida»
    reason: Preserva en español la alternativa sintáctica/estilística que el inglés POB documentó para la última cláusula, evitando ambigüedad y manteniendo el matiz eufemístico.
  revision_rationale: Se suaviza un pronombre innecesario y se reemplaza un giro poco idiomático por «habían fallecido», que conserva el eufemismo de 'passed away' en español natural. Además, se añade una nota para reflejar la alternativa de formulación registrada en la auditoría inglesa.
