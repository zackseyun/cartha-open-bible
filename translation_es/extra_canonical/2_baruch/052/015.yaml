translation:
  language: es
  text: Porque los primeros recibirán a los últimos, a quienes esperaban, y los últimos a aquellos de quienes habían oído que habían fallecido.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a aquellos de quienes habían oído que habían pasado de esta vida»
    reason: Preserva en español la alternativa sintáctica/estilística que el inglés POB documentó para la última cláusula, evitando ambigüedad y manteniendo el matiz eufemístico.
lexical_decisions:
- source_word: the first
  english_pob_choice: the first
  chosen_spanish: los primeros
  alternatives_spanish:
  - los primeros en llegar
  - los primeros de ellos
  lexicon: first
  rationale: El texto contrasta dos grupos en orden; «los primeros» conserva el paralelismo y el valor ordinal sin añadir matices no presentes.
- source_word: will receive
  english_pob_choice: will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - recibirán a
  - acogerán
  lexicon: receive
  rationale: «Recibirán» reproduce la relación directa del verbo sin ampliar a una acción más interpretativa como «acogerán».
- source_word: the last
  english_pob_choice: the last
  chosen_spanish: los últimos
  alternatives_spanish:
  - los postreros
  - los últimos de ellos
  lexicon: last
  rationale: «Los últimos» es claro, natural y mantiene la simetría con «los primeros».
- source_word: whom they were expecting
  english_pob_choice: whom they were expecting
  chosen_spanish: a quienes ellos esperaban
  alternatives_spanish:
  - a quienes esperaban
  - a quienes aguardaban
  lexicon: expect
  rationale: Se conserva el sentido de expectativa personal. Mantener «ellos» hace visible la referencia pronominal implícita del original, aunque en español pueda omitirse sin pérdida.
- source_word: those they had heard had passed away
  english_pob_choice: those they had heard had passed away
  chosen_spanish: a los que habían oído que habían pasado a la muerte
  alternatives_spanish:
  - a los que habían oído que habían fallecido
  - de quienes habían oído que habían muerto
  lexicon: pass away
  rationale: «Habían pasado a la muerte» sigue de cerca el giro semítico-siríaco y conserva la solemnidad del eufemismo, evitando aplanarlo demasiado pronto en «murieron».
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión reciente que simplificó la cláusula final en inglés para reflejar con mayor claridad la sintaxis siríaca subyacente. En español se preservó esa relación sintáctica sin añadir una nota al pie, porque la traducción resultante ya es legible y no requiere una alternativa textual anclada.
  spanish_consistency_notes:
  - Se mantuvo el contraste paralelo «los primeros / los últimos» para respetar la estructura retórica del versículo.
  - Se conservó el orden relativo de la segunda cláusula para reflejar el encadenamiento de participios y subordinadas del original.
  - No se usó «Cristo», «SEÑOR» ni terminología eclesiástica añadida, ya que este verso no los requiere.
