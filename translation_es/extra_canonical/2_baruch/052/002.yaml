translation:
  language: es
  text: 'Porque esto es necesario: para que se muestre a los vivos que los muertos han vuelto a la vida, y que los que habían partido han regresado.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܘܠܗܢܐ ܥܒܕܬܐ / equivalent of “For this is required”
  english_pob_choice: For this is required
  chosen_spanish: Porque esto es necesario
  alternatives_spanish:
  - Pues esto es requerido
  - Porque esto se requiere
  lexicon: n/a
  rationale: La idea central es de necesidad o exigencia, no solo de conveniencia. «Es necesario» conserva la fuerza de obligación implícita del giro fuente y suena natural en español bíblico contemporáneo.
- source_word: to be shown
  english_pob_choice: that it may be shown
  chosen_spanish: para que se muestre
  alternatives_spanish:
  - para que sea mostrado
  - para que se haga ver
  lexicon: n/a
  rationale: El pasivo/impersonal transmite bien la finalidad sin forzar una construcción pesada. «Se muestre» mantiene claridad y puede abarcar la manifestación pública del hecho.
- source_word: the living
  english_pob_choice: the living
  chosen_spanish: a los vivos
  alternatives_spanish:
  - a los que viven
  - a los vivientes
  lexicon: n/a
  rationale: «A los vivos» es la expresión más natural en español para designar a quienes están vivos, manteniendo el contraste con «los muertos».
- source_word: the dead have come to life
  english_pob_choice: the dead have come to life
  chosen_spanish: que los muertos han vuelto a la vida
  alternatives_spanish:
  - que los muertos han resucitado
  - que los muertos han revivido
  lexicon: n/a
  rationale: «Han vuelto a la vida» conserva el sentido general de retorno a la vida sin imponer de manera innecesaria una terminología doctrinal más técnica. En español, «resucitado» podría sonar más fuerte teológicamente; aquí la fuente solo afirma el hecho de volver a vivir.
- source_word: those who had departed
  english_pob_choice: those who had departed
  chosen_spanish: los que habían partido
  alternatives_spanish:
  - los que se habían ido
  - los que habían salido
  lexicon: n/a
  rationale: El participio «partido» funciona bien como eufemismo reverente para los muertos y reproduce el matiz de alejamiento/separación que el inglés POB preserva.
- source_word: have returned
  english_pob_choice: have returned
  chosen_spanish: han regresado
  alternatives_spanish:
  - han vuelto
  - han retornado
  lexicon: n/a
  rationale: «Han regresado» mantiene la idea de volver al estado/presencia anterior. «Han vuelto» también sería posible, pero «regresado» da un registro ligeramente más formal y estable.
theological_decisions:
- issue: La expresión sobre los muertos que vuelven a la vida
  english_pob_reading: the dead have come to life
  chosen_spanish_reading: los muertos han vuelto a la vida
  alternative_spanish_readings:
  - los muertos han resucitado
  - los muertos han revivido
  rationale: La fuente afirma la vivificación o retorno a la vida de los muertos, sin necesidad de fijar en el español una lectura doctrinal más específica que el texto no explicita aquí. Se evita sobrecargar el versículo con una formulación más técnica que podría cerrar matices.
  doctrine_reference: resurrection / revivification
translation_notes:
  revision_awareness: Se siguió el sentido del texto fuente y el auditable inglés POB sin cambios detectados en la pasada más reciente; no se incorporaron notas textuales porque no hubo variantes ni tensiones léxicas documentadas en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno.
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita explícita de κύριος en el paquete proporcionado.
  - Se preservó el contraste vivos/muertos y el paralelismo de las dos cláusulas finales.
