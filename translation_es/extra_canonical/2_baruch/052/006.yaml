translation:
  language: es
  text: Pero la gloria de los que fueron justificados en su tiempo, y de los que tuvieron entendimiento en su vida, y de los que plantaron en su corazón la raíz de la sabiduría—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “the glory” (Syriac equivalent of honor/splendor in context)
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el esplendor
  - el honor
  lexicon: glory
  rationale: La cadena del versículo enumera cualidades o estados de honra final; en español, «gloria» conserva la amplitud semántica y el tono elevado del inglés POB sin reducirla a solo «esplendor» u «honor».
- source_word: “those who were justified”
  english_pob_choice: those who were justified
  chosen_spanish: los que fueron justificados
  alternatives_spanish:
  - los que fueron declarados justos
  - los que fueron vindicados
  lexicon: justify
  rationale: «Justificados» reproduce de forma fiel la fuerza forense del participio pasivo y mantiene la conexión con el campo bíblico de δικαιόω, sin forzar una paráfrasis interpretativa.
- source_word: “in their time”
  english_pob_choice: in their time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - en su época
  - en su momento
  lexicon: time
  rationale: «En su tiempo» es la forma más directa y natural en español para conservar la referencia temporal precisa del original.
- source_word: “those who had understanding”
  english_pob_choice: those who had understanding
  chosen_spanish: los que tuvieron entendimiento
  alternatives_spanish:
  - los que entendieron
  - los de entendimiento
  lexicon: understanding
  rationale: «Tuvieron entendimiento» mantiene el carácter de posesión o adquisición de discernimiento, evitando reducir el sentido a mera comprensión intelectual momentánea.
- source_word: “in their life”
  english_pob_choice: in their life
  chosen_spanish: en su vida
  alternatives_spanish:
  - durante su vida
  - en su existencia
  lexicon: life
  rationale: «En su vida» sigue de cerca la estructura del original y conserva la relación existencial del entendimiento con toda la vida de esas personas.
- source_word: “those who planted”
  english_pob_choice: those who planted
  chosen_spanish: los que plantaron
  alternatives_spanish:
  - los que sembraron
  - los que echaron raíces
  lexicon: plant
  rationale: «Plantaron» preserva la imagen agrícola explícita del texto. «Sembraron» sería posible, pero cambiaría la imagen; «echaron raíces» sería interpretativo.
- source_word: “in their heart”
  english_pob_choice: in their heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en su interior
  - en lo más profundo de su ser
  lexicon: heart
  rationale: «Corazón» mantiene la antropología bíblica del asiento interior de la voluntad, el pensamiento y el afecto, sin diluirla en una fórmula más psicológica moderna.
- source_word: “the root of wisdom”
  english_pob_choice: the root of wisdom
  chosen_spanish: la raíz de la sabiduría
  alternatives_spanish:
  - el fundamento de la sabiduría
  - la raíz del saber
  lexicon: root
  rationale: «La raíz de la sabiduría» reproduce literalmente la metáfora y conserva la tensión imagética del original; no se suaviza a «fundamento» porque el texto usa una figura vegetal concreta.
theological_decisions:
- issue: La relación entre “justificados” y el lenguaje bíblico forense
  english_pob_reading: those who were justified
  chosen_spanish_reading: los que fueron justificados
  alternative_spanish_readings:
  - los que fueron declarados justos
  - los que fueron vindicados
  rationale: Se mantiene el término técnico «justificados» porque el español bíblico lo entiende bien y conserva la resonancia judicial del pasivo del original, sin adelantar una interpretación más amplia que el versículo no explicita.
  doctrine_reference: justificación / lenguaje forense bíblico
- issue: La imagen sapiencial de “la raíz de la sabiduría”
  english_pob_reading: the root of wisdom
  chosen_spanish_reading: la raíz de la sabiduría
  alternative_spanish_readings:
  - el principio de la sabiduría
  - el fundamento de la sabiduría
  rationale: No se sustituye la metáfora vegetal por un concepto abstracto. El texto presenta la sabiduría como algo arraigado interiormente, y eso se conserva para respetar la imaginería del pasaje.
  doctrine_reference: sabiduría bíblica / formación interior
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión aplicada; por eso se mantiene una traducción conservadora, muy cercana al inglés POB y al valor imagístico del original siríaco, sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene la coordinación acumulativa con «y» para reflejar la serie del original.
  - Se conserva el guion final al final de la cláusula, en continuidad con el inglés POB y el carácter de enumeración abierta del versículo.
  - Se usa «justificados» como término bíblico estable y «sabiduría» para sostener el paralelismo con la imagen de la raíz.
