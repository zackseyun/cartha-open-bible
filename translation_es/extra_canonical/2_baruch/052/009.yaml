  text: cuando vean que aquellos a quienes ahora consideran como nada descansan y son glorificados con los ángeles,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “those whom they now count as nothing”
  english_pob_choice: those whom they now count as nothing
  chosen_spanish: aquellos a quienes ahora consideran como nada
  alternatives_spanish:
  - aquellos a quienes ahora tienen por nada
  - los que ahora estiman en nada
  lexicon: count as nothing → considerar como nada / tener por nada
  rationale: La imagen expresa desdén o desprecio presente hacia esas personas. En español, «consideran como nada» conserva el valor idiomático y la fuerza relacional sin volverlo más interpretativo de lo que permite el texto.
- source_word: “are at rest”
  english_pob_choice: are at rest
  chosen_spanish: descansan
  alternatives_spanish:
  - están en reposo
  - reposan
  lexicon: rest → descansar / reposar
  rationale: El verbo español «descansan» comunica de manera natural la idea de reposo final o alivio, y mantiene la sobriedad del enunciado. «Reposan» sería igualmente posible, pero «descansan» fluye mejor junto al paralelismo con la glorificación.
- source_word: “glorified”
  english_pob_choice: glorified
  chosen_spanish: son glorificados
  alternatives_spanish:
  - están glorificados
  - han sido glorificados
  lexicon: glorify → glorificar
  rationale: Se conserva la pasiva verbal para reflejar el estado conferido a esos justos. «Son glorificados» mantiene la tensión entre estado y acción divina sin añadir explicaciones.
- source_word: “with the angels”
  english_pob_choice: with the angels
  chosen_spanish: con los ángeles
  alternatives_spanish:
  - junto con los ángeles
  - en compañía de los ángeles
  lexicon: angel → ángel
  rationale: La preposición «con» reproduce la relación directa del original y de la traducción inglesa auditada. No se introduce una formulación más expansiva porque el texto no lo exige.
theological_decisions:
- issue: 'Destino de los despreciados por los impíos: descanso y glorificación'
  english_pob_reading: those whom they now count as nothing are at rest and glorified with the angels
  chosen_spanish_reading: aquellos a quienes ahora consideran como nada descansan y son glorificados con los ángeles
  alternative_spanish_readings:
  - aquellos que ahora tienen por nada reposan y son glorificados con los ángeles
  - los que ahora estiman en nada descansan y están glorificados con los ángeles
  rationale: La frase mantiene el contraste teológico entre el juicio humano actual y la vindicación futura de los justos. Se conserva tanto el descanso como la glorificación, sin convertirlos en una sola idea ni atenuar la inversión escatológica implícita.
  doctrine_reference: escatología; vindicación de los justos
translation_notes:
  revision_awareness: La versión en inglés POB fue marcada como sin cambios necesarios tras revisión de alta concordancia; por ello el español sigue de cerca esa solución, conservando el paralelismo breve y la tensión escatológica sin ampliar el sentido.
  spanish_consistency_notes:
  - Se mantiene «ángeles» en plural, conforme al texto fuente y a la traducción inglesa auditada.
  - Se evita «SEÑOR» u otra terminología de sustitución porque no aparece ningún tetragrámaton ni equivalente en este versículo.
  - El registro es sobrio y litúrgicamente legible, con preferencia por construcciones naturales del español moderno.
