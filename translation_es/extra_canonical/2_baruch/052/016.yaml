translation:
  language: es
  text: Porque han sido liberados de este mundo de aflicción y han dejado el peso de las angustias.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “delivered” / Syriac passive of release
  english_pob_choice: have been delivered
  chosen_spanish: han sido liberados
  alternatives_spanish:
  - han sido entregados
  - han sido rescatados
  lexicon: N/A
  rationale: «Liberados» comunica con naturalidad el pasivo de liberación del inglés POB y del trasfondo siriaco, sin introducir una connotación de rescate más fuerte de la que exige el texto.
- source_word: “this world of affliction”
  english_pob_choice: this world of affliction
  chosen_spanish: este mundo de aflicción
  alternatives_spanish:
  - este mundo de sufrimiento
  - este mundo de tribulación
  lexicon: N/A
  rationale: «Aflicción» preserva el sustantivo abstracto del inglés POB y mantiene el tono bíblico; «mundo» evita una paráfrasis cosmológica más específica que la fuente no obliga.
- source_word: “laid down”
  english_pob_choice: have laid down
  chosen_spanish: han dejado
  alternatives_spanish:
  - han puesto a un lado
  - han soltado
  lexicon: N/A
  rationale: «Han dejado» reproduce la imagen de abandonar/cargar dejar caer el peso sin forzar un objeto físico explícito que el español puede expresar de manera más natural.
- source_word: “the burden of distresses”
  english_pob_choice: the burden of distresses
  chosen_spanish: el peso de las angustias
  alternatives_spanish:
  - la carga de las aflicciones
  - el peso de las tribulaciones
  lexicon: N/A
  rationale: «Peso» conserva la metáfora de carga y «angustias» comunica la cualidad opresiva de «distresses» con un registro claro y digno en español.
theological_decisions:
- issue: Liberación del “mundo de aflicción” como estado de opresión terrenal
  english_pob_reading: they have been delivered from this world of affliction
  chosen_spanish_reading: han sido liberados de este mundo de aflicción
  alternative_spanish_readings:
  - han sido rescatados de este mundo de aflicción
  - han salido de este mundo de aflicción
  rationale: La redacción mantiene la idea de salida/liberación de un ámbito de sufrimiento sin introducir una doctrina adicional sobre la forma de esa liberación. Se conserva la ambigüedad salutífera del original.
  doctrine_reference: No aplica; lectura descriptiva de liberación escatológica.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el cotejo cruzado reporta alta concordancia; por ello la propuesta sigue de cerca la lectura estable del inglés POB sin innovaciones textuales.
  spanish_consistency_notes:
  - Se mantiene «aflicción» y «angustias» para conservar la distinción retórica entre el ámbito y su carga.
  - Se evita «SEÑOR» u otras sustituciones doctrinales porque no aparece el nombre divino en este versículo.
  - El español es neutro y publicable, con sintaxis simple alineada al paralelismo del original.
