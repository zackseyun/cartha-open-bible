translation:
  language: es
  text: Y aquel tiempo ya no envejecerá para ellos. Porque las extensiones del Paraíso se desplegarán delante de ellos, y se les mostrará la hermosura de la majestad de los seres vivientes bajo el trono, y también todas las compañías de los ángeles, que ahora están retenidas por mi palabra para que no sean vistas, y guardadas por mandato para mantenerse en sus lugares hasta su venida señalada.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: that time
  english_pob_choice: that time
  chosen_spanish: aquel tiempo
  alternatives_spanish:
  - ese tiempo
  - ese momento
  lexicon: time
  rationale: «Aquel tiempo» conserva la referencia temporal futura y algo distante del original sin reducirla a un simple «momento».
- source_word: will no longer grow old
  english_pob_choice: will no longer grow old
  chosen_spanish: ya no envejecerá
  alternatives_spanish:
  - ya no se hará viejo
  - ya no pasará
  lexicon: grow old
  rationale: La imagen del tiempo que «envejece» se expresa de manera natural en español con «envejecerá», manteniendo la personificación del tiempo.
- source_word: the expanses of Paradise
  english_pob_choice: the expanses of Paradise
  chosen_spanish: las extensiones del Paraíso
  alternatives_spanish:
  - los vastos espacios del Paraíso
  - las amplitudes del Paraíso
  lexicon: expanses
  rationale: «Extensiones» reproduce la idea espacial amplia sin introducir una paráfrasis excesiva.
- source_word: will be spread out before them
  english_pob_choice: will be spread out before them
  chosen_spanish: se desplegarán delante de ellos
  alternatives_spanish:
  - se extenderán ante ellos
  - serán desplegadas delante de ellos
  lexicon: spread out
  rationale: «Desplegarse» conserva la imagen de apertura o expansión visual del original y suena idiomático en español.
- source_word: the beauty of the majesty
  english_pob_choice: the beauty of the majesty
  chosen_spanish: la hermosura de la majestad
  alternatives_spanish:
  - la belleza de la majestad
  - la belleza majestuosa
  lexicon: beauty/majesty
  rationale: «Hermosura» da un tono digno y evita una repetición plana de «belleza»; «majestad» conserva la elevación del referente.
- source_word: the living beings beneath the throne
  english_pob_choice: the living beings beneath the throne
  chosen_spanish: los seres vivientes debajo del trono
  alternatives_spanish:
  - los seres vivientes bajo el trono
  - los vivientes debajo del trono
  lexicon: living beings
  rationale: «Seres vivientes» mantiene la referencia personal/celestial del original, y «debajo del trono» conserva la localización exacta.
- source_word: the companies of the angels
  english_pob_choice: the companies of the angels
  chosen_spanish: todas las compañías de los ángeles
  alternatives_spanish:
  - todos los ejércitos de ángeles
  - todas las huestes de los ángeles
  lexicon: companies
  rationale: «Compañías» sigue el valor de agrupaciones o órdenes sin desplazar el registro a un término militar más interpretativo.
- source_word: now restrained by my word
  english_pob_choice: now restrained by my word
  chosen_spanish: que ahora están restringidas por mi palabra
  alternatives_spanish:
  - que ahora son contenidas por mi palabra
  - que ahora están sujetas por mi palabra
  lexicon: restrained
  rationale: «Restringidas» conserva la idea de limitación impuesta por mandato divino, cercana al sentido auditado.
- source_word: not seen
  english_pob_choice: not seen
  chosen_spanish: para que no sean vistas
  alternatives_spanish:
  - para que no se vean
  - para que no sean observadas
  lexicon: seen
  rationale: La pasiva refleja la invisibilidad impuesta; «sean vistas» preserva el matiz de ocultamiento.
- source_word: kept by command
  english_pob_choice: kept by command
  chosen_spanish: guardadas por mandato
  alternatives_spanish:
  - retenidas por mandato
  - mantenidas por mandato
  lexicon: kept
  rationale: «Guardadas» conserva la idea de custodia bajo orden, sin suavizar el control.
- source_word: to stand in their places
  english_pob_choice: to stand in their places
  chosen_spanish: para mantenerse en sus lugares
  alternatives_spanish:
  - para permanecer en sus puestos
  - para estar de pie en sus lugares
  lexicon: stand in their places
  rationale: «Mantenerse en sus lugares» comunica permanencia/estación asignada sin forzar una imagen corporal que en español podría sonar pesada.
- source_word: until their appointed coming
  english_pob_choice: until their appointed coming
  chosen_spanish: hasta su llegada señalada
  alternatives_spanish:
  - hasta su venida señalada
  - hasta el tiempo fijado para su llegada
  lexicon: appointed coming
  rationale: «Llegada señalada» conserva el carácter determinado de un evento futuro sin añadir términos doctrinales no explícitos.
theological_decisions:
- issue: Visibility of angelic beings under divine restriction
  english_pob_reading: angels are now restrained by my word so that they are not seen, and are kept by command
  chosen_spanish_reading: los ángeles están ahora restringidos por la palabra divina para que no sean vistos, y guardados por mandato
  alternative_spanish_readings:
  - los ángeles son ocultados por la palabra divina
  - los ángeles permanecen invisibles por orden
  rationale: 'La formulación mantiene la doble acción: restricción por la palabra y custodia por mandato, sin colapsarla en una sola idea. Esto preserva la tensión entre ocultamiento y permanencia ordenada.'
  doctrine_reference: Angelology / divine command
- issue: Majesty of the beings beneath the throne
  english_pob_reading: the beauty of the majesty of the living beings beneath the throne
  chosen_spanish_reading: la hermosura de la majestad de los seres vivientes debajo del trono
  alternative_spanish_readings:
  - la belleza de la majestad de los vivientes bajo el trono
  - la hermosura majestuosa de los seres vivientes
  rationale: Se conserva la cadena genitiva sin simplificarla, porque el texto parece acumular esplendor y rango celestial. La traducción evita resolver la relación semántica a favor de una sola imagen.
  doctrine_reference: Heavenly throne imagery / apocalyptic vision
- issue: Temporal consummation and fixed appointment
  english_pob_reading: until their appointed coming
  chosen_spanish_reading: hasta su llegada señalada
  alternative_spanish_readings:
  - hasta su venida señalada
  - hasta el tiempo fijado de su llegada
  rationale: La expresión mantiene la noción de cita o momento establecido por Dios, sin especificar más de lo que el texto permite.
  doctrine_reference: Providence / appointed times
translation_notes:
  revision_awareness: Conforme al informe de revisión más reciente, no hubo cambios requeridos y el acuerdo con el control es alto; por ello se mantiene una traducción directa y estable, sin introducir notas de variante textual.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino donde corresponda; en este versículo no aparece explícitamente y no se introduce ninguna sustitución.
  - Se mantiene «ángeles» y no se sustituye por términos litúrgicos más libres.
  - No se añaden corchetes ni notas al pie porque la validación previa exigía que todo marcador apareciera en el texto; en este borrador no hay marcadores de nota.
