translation:
  language: es
  text: Porque eligieron para sí este tiempo presente, que no puede pasar sin angustia; y eligieron para sí aquel tiempo cuyos resultados están llenos de gemidos y males; y rechazaron el mundo que no envejece a los que vienen a él[a], y rechazaron el tiempo de gloria, para que no llegaran al honor del cual antes les hablé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede expresarse: «que no hace envejecer a los que vienen a él».'
    reason: Aclaración de traducción para hacer explícita la fuerza transitiva del verbo.
lexical_decisions:
- source_word: this present time
  english_pob_choice: this present time
  chosen_spanish: este tiempo presente
  alternatives_spanish:
  - el tiempo presente
  - este tiempo
  lexicon: tiempo
  rationale: Conserva la referencia temporal concreta y el énfasis de inmediatez del original; 'presente' explicita la cualidad que en español no debe quedar implícita.
- source_word: cannot pass apart from anguish
  english_pob_choice: cannot pass apart from anguish
  chosen_spanish: no puede pasar sin angustia
  alternatives_spanish:
  - no puede pasar aparte de la angustia
  - no puede transcurrir sin angustia
  lexicon: pasar
  rationale: '''Pasar'' mantiene la idea de transitoriedad del tiempo; ''sin angustia'' reproduce la imposibilidad de separación respecto al sufrimiento de modo natural en español.'
- source_word: that time whose outcomes are full of groanings and evils
  english_pob_choice: that time whose outcomes are full of groanings and evils
  chosen_spanish: aquel tiempo cuyos resultados están llenos de gemidos y males
  alternatives_spanish:
  - aquel tiempo cuyos desenlaces están llenos de gemidos y males
  - aquel tiempo cuyas consecuencias están llenas de gemidos y males
  lexicon: outcomes
  rationale: '''Resultados'' comunica el sentido de consecuencias o desenlaces sin imponer una técnica más interpretativa que el texto no exige; ''gemidos y males'' sigue de cerca la carga negativa del original.'
- source_word: they rejected the world that does not age those who come to it
  english_pob_choice: they rejected the world that does not age those who come to it
  chosen_spanish: rechazaron el mundo que no envejece a los que vienen a él
  alternatives_spanish:
  - rechazaron el mundo que no hace envejecer a los que vienen a él
  - rechazaron el mundo que no envejece a quienes llegan a él
  lexicon: does not age
  rationale: 'Sigue la revisión auditable del inglés POB: el verbo es transitivo, por lo que en español se debe expresar que el mundo ''no envejece a'' sus habitantes, no que simplemente ''no envejece'' él mismo.'
- source_word: the time of glory
  english_pob_choice: the time of glory
  chosen_spanish: el tiempo de gloria
  alternatives_spanish:
  - el tiempo glorioso
  - el tiempo de la gloria
  lexicon: glory
  rationale: Mantiene la formulación nominal breve del original, sin expandirla a una paráfrasis más libre.
- source_word: the honor of which I told you before
  english_pob_choice: the honor of which I told you before
  chosen_spanish: el honor del cual antes les hablé
  alternatives_spanish:
  - el honor del que antes les hablé
  - el honor del que ya les hablé
  lexicon: honor
  rationale: '''Honor'' conserva el valor de dignidad/promoción escatológica; la referencia pronominal mantiene la anticipación del discurso previo sin añadir contenido.'
theological_decisions:
- issue: Temporal contrast between present age and age of glory
  english_pob_reading: The present time and the time of glory are contrasted as mutually chosen destinies, with the present bound to anguish and the future associated with honor.
  chosen_spanish_reading: El presente queda ligado a la angustia y el tiempo de gloria al honor, como destinos contrapuestos elegidos por las personas.
  alternative_spanish_readings:
  - El presente está unido a la angustia y el tiempo de gloria al honor.
  - Estos dos tiempos se presentan como opciones opuestas con consecuencias distintas.
  rationale: La sintaxis española conserva el paralelismo y la oposición moral/escatológica del pasaje sin suavizarla ni convertirla en mero contraste literario.
  doctrine_reference: Escatología ética; contraste entre el siglo presente y la gloria futura.
- issue: Transitive force of 'does not age'
  english_pob_reading: The world is not described as merely not aging itself, but as not aging those who come to it.
  chosen_spanish_reading: El mundo futuro conserva a sus llegados sin hacerlos envejecer.
  alternative_spanish_readings:
  - El mundo no envejece a los que llegan a él.
  - El mundo no hace viejos a los que vienen a él.
  rationale: 'Se preserva la tensión lexical documentada por la revisión: el sujeto actúa sobre quienes llegan, y esa fuerza debe quedar visible también en español.'
  doctrine_reference: Antropología escatológica; preservación de los habitantes del mundo venidero.
translation_notes:
  revision_awareness: El inglés POB fue revisado por un error de valencia verbal en la cláusula del mundo que 'no envejece'. La presente versión española refleja la lectura transitiva del participio siríaco señalada en la revisión, evitando la falsa intransitividad. No se introducen otras expansiones interpretativas fuera de las exigidas por la sintaxis española.
  spanish_consistency_notes:
  - Se mantiene 'tiempo' para 'time' en toda la cláusula, preservando el paralelismo.
  - '''Angustia'', ''gemidos'' y ''males'' conservan el tono de aflicción sin suavizarlo.'
  - '''Honor'' se usa de manera consistente como contrapunto de ''gloria'' en el marco escatológico.'
  - Se evita 'SEÑOR' o 'Cristo' porque el pasaje no los contiene.
  - La nota [a] marca la única alternativa relevante derivada de la revisión textual/lexical del verbo 'envejecer'.
