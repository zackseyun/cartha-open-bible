review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del inglés POB y, en general, preserva bien la secuencia: ser contados entre acumulaciones de pecado, el deterioro progresivo, y luego ver antes de ir al tormento. No obstante, «se va desgastando» suena algo mecánico para el deterioro de «sus formas» y «se van para ser atormentados» resulta poco natural en español bíblico moderno; conviene una formulación más idiomática sin perder el valor final.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero hay dos puntos de estilo importantes: 1) «el mal de sus formas se va desgastando» suena extraño en español, porque «desgastarse» suele asociarse con objetos o con desgaste por uso; 2) «se van para ser atormentados» es gramatical pero poco elegante y algo coloquial. Una revisión menor mejora la dignidad y naturalidad del texto.'
  glossary_alignment: No hay términos del glosario maestro especialmente activados aquí. Las decisiones «pecados», «mal», «ven» y «atormentados» son compatibles con el proyecto. La excepción principal es estilística, no terminológica.
  issues:
  - severity: medium
    issue: «se va desgastando» para el deterioro de «sus formas»
    rationale: Aunque refleja la idea de decaimiento progresivo, en español suena poco idiomático con «formas». «se va consumiendo aún más» o «se deteriora todavía más» expresan mejor el desgaste del aspecto/forma.
  - severity: medium
    issue: «se van para ser atormentados» es poco natural
    rationale: La construcción con «para» suena algo coloquial o torpe en este registro. «van a ser atormentados» o «parten para ser atormentados» mejora la fluidez sin alterar el sentido temporal/final.
  revised_spanish_text: mientras ellos mismos son contados entre los montones de pecados, y el mal de sus formas se va consumiendo aún más. Porque primero ven, y después van a ser atormentados.
  revision_rationale: 'Se conservó el sentido del texto fuente y del inglés POB, pero se ajustaron dos expresiones para un español más natural y digno: «se va consumiendo aún más» comunica mejor el deterioro progresivo de «sus formas», y «van a ser atormentados» evita la torpeza de «se van para ser atormentados» manteniendo la secuencia de ver primero y luego pasar al tormento.'
