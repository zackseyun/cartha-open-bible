translation:
  language: es
  text: mientras ellos mismos son contados entre los montones de pecados, y el mal de sus formas se va consumiendo aún más. Porque primero ven, y después van a ser atormentados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: '''itbwn / reckoned among'
  english_pob_choice: are reckoned among
  chosen_spanish: son contados entre
  alternatives_spanish:
  - son considerados entre
  - se los cuenta entre
  lexicon: חשב / contar, considerar; passive reckoning formula
  rationale: La idea no es solo ubicación física sino inclusión por cálculo/registro. «Son contados entre» conserva la pasividad y el valor de adjudicación que sugiere el inglés POB.
- source_word: '''kūmē d-ḥṭāyē / heaps of sins'
  english_pob_choice: heaps of sins
  chosen_spanish: los montones de pecados
  alternatives_spanish:
  - los montones de pecado
  - las montañas de pecados
  lexicon: acúmulo, montón, masa
  rationale: Se mantiene la imagen concreta de acumulación. «Montones de pecados» es natural en español y conserva el plural enfático del inglés POB.
- source_word: bīšūtā d-ṣalmayhon / the evil of their forms
  english_pob_choice: the evil of their forms
  chosen_spanish: el mal de sus formas
  alternatives_spanish:
  - la maldad de sus formas
  - el mal de su apariencia
  lexicon: mal / evil; form, appearance, bodily form
  rationale: «Formas» reproduce con sobriedad la referencia a la conformación visible sin explicitar más de lo que el texto permite. «Mal» mantiene la ambigüedad entre corrupción moral y deterioro visible.
- source_word: mttpḥ / wastes away still more
  english_pob_choice: wastes away still more
  chosen_spanish: se va desgastando todavía más
  alternatives_spanish:
  - se va consumiendo aún más
  - se deteriora todavía más
  lexicon: waste away, decay, diminish
  rationale: La imagen de decadencia gradual queda clara en español sin endurecer el verbo. «Todavía más» conserva el incremento del proceso.
- source_word: lqdm / for first
  english_pob_choice: For first
  chosen_spanish: Porque primero
  alternatives_spanish:
  - Pues primero
  - Porque en primer lugar
  lexicon: first, beforehand
  rationale: 'Se conserva el orden causal y temporal del original: primero ven la realidad, luego ocurre la retribución.'
- source_word: ḥzyn / they see
  english_pob_choice: they see
  chosen_spanish: ven
  alternatives_spanish:
  - ven esto
  - perciben
  lexicon: see, perceive
  rationale: «Ven» es la forma más directa y fiel; el contexto muestra una percepción seguida de destino punitivo.
- source_word: btr / afterward
  english_pob_choice: afterward
  chosen_spanish: y después
  alternatives_spanish:
  - luego
  - más tarde
  lexicon: afterward, later
  rationale: Mantiene la secuencia temporal explícita del texto fuente.
- source_word: '''zl / go away'
  english_pob_choice: they go away
  chosen_spanish: se van
  alternatives_spanish:
  - se apartan
  - parten
  lexicon: go, depart
  rationale: «Se van» reproduce la idea simple de partir/retirarse sin añadir matices no evidentes.
- source_word: l-mzlm / to be tormented
  english_pob_choice: to be tormented
  chosen_spanish: para ser atormentados
  alternatives_spanish:
  - para ser torturados
  - para sufrir tormento
  lexicon: torment, affliction, punishment
  rationale: «Atormentados» conserva el tono de castigo sufriente del inglés POB y evita estrechar indebidamente el sentido a tortura física.
theological_decisions:
- issue: Relación entre corrupción visible y retribución futura
  english_pob_reading: the evil of their forms wastes away still more; For first they see, and afterward they go away to be tormented
  chosen_spanish_reading: el mal de sus formas se va desgastando todavía más. Porque primero ven, y después se van para ser atormentados.
  alternative_spanish_readings:
  - la maldad de sus formas se consume todavía más
  - el mal de su apariencia se deteriora cada vez más
  rationale: El pasaje contrapone un deterioro presente con una retribución posterior. La traducción conserva ambos planos sin interpretar más allá de la imagen de corrupción y castigo.
  doctrine_reference: Retribución escatológica; deterioro de los impíos antes del castigo final
- issue: Alcance de 'heaps of sins' como imagen moral
  english_pob_reading: reckoned among the heaps of sins
  chosen_spanish_reading: contados entre los montones de pecados
  alternative_spanish_readings:
  - incluidos entre los montones de pecados
  - puestos entre acumulaciones de pecado
  rationale: Se mantiene la fuerza imagética de acumulación moral sin convertirla en una categoría doctrinal sistemática. La pasiva conserva la imputación externa.
  doctrine_reference: Imputación / contabilidad moral en literatura apocalíptica
translation_notes:
  revision_awareness: Se siguió el texto fuente siríaco controlado y el audit trail inglés sin cambios editoriales recientes; la versión inglesa final fue marcada como estable y de alta concordancia, sin notas ni revisiones aplicadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se usa «atormentados» para conservar la crudeza punitiva del inglés POB.
  - No se introducen términos eclesiásticos ajenos al tono apocalíptico del pasaje.
  - 'La sintaxis respeta la secuencia temporal del original: primero ver, luego partir, luego tormento.'
