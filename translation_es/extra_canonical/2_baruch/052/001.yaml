translation:
  language: es
  text: Porque entonces la tierra ciertamente devolverá a los muertos que ahora recibe para preservarlos, sin cambiar nada en su forma; pero así como los recibió, así también los restituirá, y así como yo los entregué a ella, así también los levantará.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܡܦܩܢܗ / ܡܩܝܡܐ
  english_pob_choice: give back / restore / raise
  chosen_spanish: devolverá / restituirá / levantará
  alternatives_spanish:
  - hará volver / restaurará / resucitará
  - restituirá / alzará
  lexicon: Payne Smith
  rationale: El par verbal en siríaco expresa devolución con continuidad y luego elevación a nueva vida. «Devolverá» y «restituirá» mantienen la idea de retorno; «levantará» conserva la fuerza de alzamiento sin forzar un tecnicismo que el contexto no exige en la primera cláusula.
- source_word: ܒܨܘܪܬܗܘܢ
  english_pob_choice: in their form
  chosen_spanish: en su forma
  alternatives_spanish:
  - en su apariencia
  - en su figura
  lexicon: Payne Smith
  rationale: «Forma» conserva la amplitud del término y permite la continuidad reconocible de la persona sin restringirlo a sola apariencia externa.
- source_word: ܕܬܢܛܪ ܐܢܘܢ
  english_pob_choice: in order to preserve them
  chosen_spanish: para preservarlos
  alternatives_spanish:
  - para guardarlos
  - para conservarlos
  lexicon: Payne Smith
  rationale: La cláusula de propósito en siríaco muestra a la tierra como depósito custodio de los muertos; «preservarlos» refleja mejor esa función que una mera recepción pasiva.
theological_decisions:
- issue: Continuidad entre los muertos recibidos por la tierra y su retorno final
  english_pob_reading: The earth receives the dead to preserve them and later gives them back, keeping continuity of form and identity.
  chosen_spanish_reading: La tierra recibe a los muertos para preservarlos y luego los devuelve, sin cambiar su forma.
  alternative_spanish_readings:
  - La tierra simplemente los aloja hasta el fin, sin matiz de preservación
  - La tierra los devuelve como si fueran distintos
  rationale: El siríaco insiste en recepción, preservación, restitución y alzamiento. La traducción mantiene esa continuidad corporal e identitaria sin introducir explicaciones adicionales.
  doctrine_reference: Continuidad personal en la resurrección; fidelidad al paralelo siríaco
- issue: Matiz de resurrección en 'raise them'
  english_pob_reading: and as I delivered them to it, so it will raise them
  chosen_spanish_reading: y así como yo los entregué a ella, así también los levantará
  alternative_spanish_readings:
  - los resucitará
  - los alzará
  rationale: «Levantará» conserva el verbo amplio del texto y evita sobrecargar el versículo con un tecnicismo donde el contexto ya comunica la resurrección. En español, el campo semántico sigue siendo claro dentro de la cadena recibir–preservar–devolver–levantar.
  doctrine_reference: Resurrección corporal implícita por el contexto
translation_notes:
  revision_awareness: Se corrigió la redacción para reflejar explícitamente la cláusula de propósito del siríaco («para preservarlos») y el contraste adversativo («pero»), conforme a la revisión crítica más reciente. No se añadieron notas al pie para evitar anclajes no utilizados.
  spanish_consistency_notes:
  - Se usó «tierra» de manera literal como sujeto agente, en coherencia con el original y con la POB inglesa.
  - Se evitó «SEÑOR» u այլ mascaramiento porque el versículo no contiene el nombre divino.
  - Se mantuvo un registro digno y publicable, sin calcos rígidos.
  - No se introdujeron términos doctrinales adicionales fuera de los que el texto exige.
