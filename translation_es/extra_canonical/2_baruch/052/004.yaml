translation:
  language: es
  text: Y sucederá que, después de que haya pasado aquel día señalado, las formas de los condenados serán cambiadas, y también la gloria de los justificados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: after that appointed day has passed
  english_pob_choice: after that appointed day has passed
  chosen_spanish: después de que haya pasado aquel día señalado
  alternatives_spanish:
  - después de que haya pasado aquel día designado
  - tras pasar aquel día establecido
  lexicon: N/A
  rationale: El inglés POB expresa un día ya fijado; en español, «señalado» comunica bien la idea de un día determinado o fijado sin introducir un matiz más jurídico que el origen no exige necesariamente. Se mantiene el orden temporal con una construcción natural en español.
- source_word: the forms of those who are condemned
  english_pob_choice: the forms of those who are condemned
  chosen_spanish: las formas de los que son condenados
  alternatives_spanish:
  - las figuras de los condenados
  - las apariencias de los condenados
  lexicon: N/A
  rationale: «Formas» conserva la referencia visible/externa del término sin cargarlo con una interpretación filosófica. «Los que son condenados» sigue la estructura participial del inglés y deja abierta la fuerza judicial del pasaje.
- source_word: will be changed
  english_pob_choice: will be changed
  chosen_spanish: serán cambiadas
  alternatives_spanish:
  - serán transformadas
  - cambiarán
  lexicon: N/A
  rationale: La pasiva refleja en español mantiene la acción futura sobre las «formas» y evita convertir el verso en una expresión más libre como «transformadas», que podría ser demasiado interpretativa.
- source_word: the glory of those who are justified
  english_pob_choice: the glory of those who are justified
  chosen_spanish: la gloria de los que son justificados
  alternatives_spanish:
  - la gloria de los justificados
  - la gloria de los que han sido justificados
  lexicon: N/A
  rationale: «Gloria» corresponde de forma directa al sustantivo fuente; «los que son justificados» conserva el valor pasivo y jurídico del original sin sustituirlo por una formulación más doctrinalmente cargada o más abstracta.
theological_decisions:
- issue: Contraste entre condenados y justificados
  english_pob_reading: the forms of those who are condemned... the glory of those who are justified
  chosen_spanish_reading: las formas de los que son condenados... la gloria de los que son justificados
  alternative_spanish_readings:
  - las apariencias de los condenados... la gloria de los justificados
  - las formas de los condenados... la gloria de los justificados
  rationale: Se conserva el paralelismo entre dos grupos opuestos y entre el cambio de «formas» y la permanencia/manifestación de «gloria». La traducción no suaviza la tensión judicial entre condena y justificación.
  doctrine_reference: Justificación/condemnación en lenguaje judicial escatológico
- issue: Referente escatológico de 'that appointed day'
  english_pob_reading: after that appointed day has passed
  chosen_spanish_reading: después de que haya pasado aquel día señalado
  alternative_spanish_readings:
  - después de que haya pasado aquel día establecido
  - después de que haya pasado ese día determinado
  rationale: «Señalado» mantiene la idea de un día fijado de antemano sin especificar más allá de lo que el texto soporta. No se introduce lenguaje litúrgico ni se identifica el día con una fiesta o evento concreto.
  doctrine_reference: Escatología/tiempo fijado por Dios
translation_notes:
  revision_awareness: La versión inglesa revisada aclaró el encaje sintáctico inicial a «And it shall be that, after that appointed day has passed...». La española sigue esa misma lectura sintáctica con «Y sucederá que, después de que haya pasado aquel día señalado...», manteniendo el sentido y la fluidez sin depender de una calca del inglés previo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino.
  - «Justificados» se mantuvo como término jurídico-teológico, coherente con el paralelismo del pasaje.
  - «Formas» se conservó para no reemplazar una imagen textual amplia por una interpretación más estrecha.
