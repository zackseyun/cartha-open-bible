review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del inglés POB: una doble pregunta retórica sobre perder la vida y trocar el alma, dirigida a la humanidad terrenal. Sin embargo, «por qué» desplaza el valor de «for what», que aquí se entiende mejor como precio/objeto de intercambio, no como causa. Además, «perdió la gente su vida» mezcla singular con sujeto colectivo de forma menos natural que el plural.'
  spanish_quality_summary: El texto es comprensible, pero puede mejorar en naturalidad y precisión semántica. «¿Con qué…?» funciona, pero «¿Por qué, entonces…?» refleja mejor la partícula inferencial del inglés. «¿…y por qué cambiaron su alma…?» suena causal; «¿…y por qué cosa entregaron/cambiaron su alma…?» expresa mejor la idea de intercambio. La sintaxis revisada suena más idiomática en español general.
  glossary_alignment: No hay términos del glosario principal involucrados de manera conflictiva. «Alma» y «vida» preservan bien la tensión antropológica del original mediado por el inglés POB. No se requieren notas.
  issues:
  - severity: medium
    issue: «por qué» no refleja bien «for what»
    rationale: La pregunta no parece ser causal («por qué razón»), sino de intercambio/contraprestación («por qué cosa», «a cambio de qué»). Mantener «por qué» debilita el paralelismo comercial de «exchange their soul».
  - severity: low
    issue: «perdió la gente su vida» es menos natural que un plural verbal
    rationale: Aunque «la gente» admite singular, en este contexto el segundo miembro ya usa plural («los que estaban»). Un plural impersonal con «los seres humanos» o «los hombres» mejora la fluidez y la simetría.
  - severity: low
    issue: «cambiaron su alma» puede sonar incompleto en español
    rationale: Con el verbo «cambiar», el español suele esperar el término del intercambio. «Entregaron su alma» o «cambiaron su alma por…» comunica mejor la fuerza del trueque sin perder fidelidad.
  revised_spanish_text: ¿Por qué, entonces, perdieron los seres humanos su vida, y por qué cosa entregaron su alma los que estaban sobre la tierra?
  revision_rationale: Se ajusta «By what, then» a «¿Por qué, entonces…?» como pregunta instrumental/explicativa más natural en español retórico; se reemplaza «la gente» por «los seres humanos» para concordancia y fluidez; y se cambia «por qué cambiaron» por «por qué cosa entregaron» para reflejar el sentido de intercambio implícito en «for what … exchange their soul» sin introducir una paráfrasis extensa.
