translation:
  language: es
  text: ¿Por qué, entonces, perdieron los seres humanos su vida, y por qué cosa entregaron su alma los que estaban sobre la tierra?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: lost their life
  english_pob_choice: lost their life
  chosen_spanish: perdió la gente su vida
  alternatives_spanish:
  - perdieron la vida
  - se les fue la vida
  lexicon: lose / perder; life / vida
  rationale: El inglés POB mantiene la idea de pérdida activa, no simplemente de muerte. En español, «perdió la gente su vida» conserva ese matiz de pérdida y funciona de modo natural en una pregunta retórica.
- source_word: exchange their soul
  english_pob_choice: exchange their soul
  chosen_spanish: cambiaron su alma
  alternatives_spanish:
  - intercambiaron su alma
  - cambiaron su vida
  lexicon: exchange / cambiar; soul / alma
  rationale: «Alma» corresponde de manera directa al término del original y preserva la tensión entre vida/soul del versículo. «Cambiar» reproduce el verbo de trueque sin sobrecargar con una glosa interpretativa.
- source_word: those who were on the earth
  english_pob_choice: those who were on the earth
  chosen_spanish: los que estaban sobre la tierra
  alternatives_spanish:
  - los que estaban en la tierra
  - los habitantes de la tierra
  lexicon: earth / tierra
  rationale: Se conserva la referencia espacial concreta del inglés POB. «Sobre la tierra» es plenamente idiomático y mantiene el contraste con la pérdida de la vida/alma.
theological_decisions:
- issue: Relación entre vida y alma en la pregunta retórica
  english_pob_reading: The verse asks about losing life and exchanging soul without harmonizing the terms.
  chosen_spanish_reading: 'La versión española conserva dos miembros distintos: «vida» y «alma»; no los funde ni los explica como equivalentes.'
  alternative_spanish_readings:
  - ¿… perdieron su vida y cambiaron su alma?
  - ¿… perdieron la vida y cambiaron el alma?
  rationale: El testimonio inglés no resuelve la tensión semántica; la redacción española debe mantenerla visible. Así se respeta la pregunta del texto y el posible paralelismo entre dos aspectos de la existencia humana.
  doctrine_reference: Antropología bíblica; preservación de tensión textual sin armonización dogmática
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia y sin cambios necesarios; por eso se mantiene la estructura interrogativa y el paralelismo básico del texto inglés POB, solo ajustados a un español natural y fiel.
  spanish_consistency_notes:
  - Se usa «alma» para soulish/soul language, coherente con el valor del término en el español bíblico cuando el contexto contrapone vida y alma.
  - Se evita «espíritu» porque el versículo no lo pide; la oposición es entre vida y alma.
  - Se mantiene «tierra» sin mayúscula, pues designa el planeta o la esfera humana, no un nombre propio.
