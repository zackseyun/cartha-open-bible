revisions:
- from: ¿Con qué, entonces, perdió la gente su vida, y por qué cambiaron su alma los que estaban sobre la tierra?
  to: ¿Por qué, entonces, perdieron los seres humanos su vida, y por qué cosa entregaron su alma los que estaban sobre la tierra?
  rationale: Se ajusta «By what, then» a «¿Por qué, entonces…?» como pregunta instrumental/explicativa más natural en español retórico; se reemplaza «la gente» por «los seres humanos» para concordancia y fluidez; y se cambia «por qué cambiaron» por «por qué cosa entregaron» para reflejar el sentido de intercambio implícito en «for what … exchange their soul» sin introducir una paráfrasis extensa.
