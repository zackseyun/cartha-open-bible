  yaml_path: translation/extra_canonical/2_baruch/027/001.yaml
  text: 'And I answered and said to him, “After this, that time is divided into twelve parts, and each one of them is known for what has been appointed in it. In the first part: the beginning of upheavals. In the second part: the slaying of the great ones. In the third part: the fall of many. In the fourth part: the sending forth of the sword. In the fifth part: famine. In the sixth part: earthquakes. In the seventh part: terrors and plagues. In the eighth part: assaults of spirits and of demons of apparitions. In the ninth part: the fall of fire. In the tenth part: plundering and much oppression.”'
  footnotes:
  - marker: a
    text: Or 'assaults of spirits and demons of apparitions'.
    reason: previous_rendering
