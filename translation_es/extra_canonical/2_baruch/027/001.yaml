review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del siríaco y del audit trail inglés: mantiene las doce partes, la secuencia de calamidades y la distinción entre conmociones y terremotos. También conserva adecuadamente los seres sobrenaturales del octavo período y el tono apocalíptico general. Sin embargo, hay un problema de fidelidad sintáctica y claridad en «demonios de apariciones», que en español suena poco natural y ambiguo; conviene reflejar mejor la relación de ܕܫ̈ܐܕܐ ... ܕܦܪ̈ܨܘܦܐ sin perder la rareza del original.'
  spanish_quality_summary: El español es en general claro, digno y legible. «Después de esto, ese tiempo se divide en doce partes» funciona bien, y casi toda la lista mantiene buen ritmo. Los puntos más débiles son «se conoce por lo que le ha sido asignado en ella», que resulta algo trabado aunque aceptable, y sobre todo «demonios de apariciones», expresión gramaticalmente posible pero poco idiomática y propensa a confusión. Una pequeña reparación mejora notablemente la naturalidad sin apartarse del original.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. Las decisiones «conmociones», «los grandes», «terrores», «plagas», «saqueo» y «opresión» están alineadas con el expediente inglés. La única decisión léxica que requiere ajuste es ܦܪ̈ܨܘܦܐ en combinación con ܫ̈ܐܕܐ: en español conviene explicitar «demonios de apariciones» como «demonios que se manifiestan en apariciones» mediante nota o reestructuración breve.'
  issues:
  - severity: medium
    issue: «demonios de apariciones» es ambiguo y poco natural en español.
    rationale: 'Aunque reproduce de cerca el inglés y la doble relación genitival del siríaco, en español puede sonar como una categoría extraña o confusa. Una formulación como «demonios de apariciones[a]» puede mantenerse si la nota aclara «o: demonios que se manifiestan en apariciones», preservando la dificultad del original y mejorando la comprensión.'
  - severity: low
    issue: La nota actual no ayuda a resolver la ambigüedad.
    rationale: «O “ataques de espíritus y de demonios de apariciones”» solo sustituye «asaltos» por «ataques», pero no esclarece la construcción difícil del sintagma final. La nota debería registrar la alternativa estructural relevante.
  revised_spanish_text: 'Y yo le respondí y le dije: «Después de esto, ese tiempo se divide en doce partes, y cada una de ellas se conoce por lo que le ha sido asignado en ella. En la primera parte: el comienzo de las conmociones. En la segunda parte: la matanza de los grandes. En la tercera parte: la caída de muchos. En la cuarta parte: el envío de la espada. En la quinta parte: hambre. En la sexta parte: terremotos. En la séptima parte: terrores y plagas. En la octava parte: asaltos de espíritus y de demonios de apariciones[a]. En la novena parte: la caída del fuego. En la décima parte: saqueo y mucha opresión.»'
  revised_footnotes:
  - marker: a
    text: O «asaltos de espíritus y de demonios que se manifiestan en apariciones».
    reason: Aclara en español la relación difícil entre «demonios» y «apariciones» sin borrar la ambigüedad del original.
  revision_rationale: 'Se conserva casi intacto el texto principal porque es globalmente fiel y legible, pero se reemplaza la nota para atender la única dificultad real del pasaje: la construcción «demonios de apariciones». La nueva nota aporta una alternativa estructural útil para lectores en español y refleja mejor la rareza del siríaco y del audit trail inglés.'
