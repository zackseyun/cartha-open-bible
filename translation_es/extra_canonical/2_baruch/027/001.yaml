translation:
  language: es
  text: 'Y yo le respondí y le dije: «Después de esto, ese tiempo se divide en doce partes, y cada una de ellas se conoce por lo que le ha sido asignado en ella. En la primera parte: el comienzo de las conmociones. En la segunda parte: la matanza de los grandes. En la tercera parte: la caída de muchos. En la cuarta parte: el envío de la espada. En la quinta parte: hambre. En la sexta parte: terremotos. En la séptima parte: terrores y plagas. En la octava parte: asaltos de espíritus y de demonios de apariciones[a]. En la novena parte: la caída del fuego. En la décima parte: saqueo y mucha opresión.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ataques de espíritus y de demonios de apariciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ܡܢܝܢ ... ܙܒܢܝ̈ܢ
  english_pob_choice: is divided into twelve parts
  chosen_spanish: se divide en doce partes
  alternatives_spanish:
  - se cuenta en doce tiempos
  - consiste en doce períodos
  lexicon: Payne Smith
  rationale: La secuencia enumerada exige una partición ordenada; «se divide en doce partes» conserva el valor estructural sin introducir una reinterpretación temporal excesiva.
- source_word: ܡܬܬܝܕܥܐ
  english_pob_choice: is known
  chosen_spanish: se conoce
  alternatives_spanish:
  - se reserva
  - se hace saber
  lexicon: Smith
  rationale: En este contexto apocalíptico, el matiz no es solo de divulgación sino de correspondencia con lo destinado; «se conoce» mantiene la ambigüedad útil del audit trail inglés sin forzar «se reserva».
- source_word: ܙ̈ܘܥܐ
  english_pob_choice: upheavals
  chosen_spanish: conmociones
  alternatives_spanish:
  - tumultos
  - sacudidas
  - terremotos
  lexicon: Payne Smith
  rationale: La primera instancia es más amplia que «terremotos», ya que después aparece un término específico para eso; «conmociones» conserva la amplitud de disturbio general.
- source_word: ܪ̈ܘܪܒܢܐ
  english_pob_choice: the great ones
  chosen_spanish: los grandes
  alternatives_spanish:
  - los poderosos
  - los nobles
  lexicon: Payne Smith
  rationale: La expresión apunta a personas prominentes o de alto rango; «los grandes» reproduce el alcance social sin cerrar demasiado la referencia.
- source_word: ܫܕܪܘܬܐ ܕܚܪܒܐ
  english_pob_choice: the sending forth of the sword
  chosen_spanish: el envío de la espada
  alternatives_spanish:
  - el despacho de la espada
  - el lanzamiento de la espada
  lexicon: Smith
  rationale: «Envío» mantiene la imagen de una acción comisionada o puesta en marcha, como en el texto fuente y en el inglés POB.
- source_word: ܬܗܪ̈ܐ
  english_pob_choice: terrors
  chosen_spanish: terrores
  alternatives_spanish:
  - horrores
  - espantos
  lexicon: Payne Smith
  rationale: Es el equivalente más natural y directo para el registro apocalíptico de la lista.
- source_word: ܡܚܘ̈ܬܐ
  english_pob_choice: plagues
  chosen_spanish: plagas
  alternatives_spanish:
  - azotes
  - golpes
  - aflicciones
  lexicon: Payne Smith
  rationale: «Plagas» conserva el lenguaje de juicio y calamidad de forma idiomática en español bíblico contemporáneo.
- source_word: ܫܘ̈ܕܐ ܕܢܦܫ̈ܬܐ
  english_pob_choice: assaults of spirits
  chosen_spanish: asaltos de espíritus
  alternatives_spanish:
  - ataques de espíritus
  - estímulos de espíritus
  lexicon: Smith
  rationale: El catálogo es hostil y apocalíptico; «asaltos» comunica mejor la agresión espiritual que una lectura neutral o psicológica.
- source_word: ܫ̈ܐܕܐ
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  - shedim
  lexicon: Payne Smith
  rationale: El término designa seres demoníacos; «demonios» es la equivalencia transparente y estable en español.
- source_word: ܦܪ̈ܨܘܦܐ
  english_pob_choice: apparitions
  chosen_spanish: apariciones
  alternatives_spanish:
  - formas
  - fantasmas
  - visiones
  lexicon: Smith
  rationale: En español, «apariciones» recoge el matiz de manifestaciones visibles y ominosas sin sobreinterpretar la ontología del término.
- source_word: ܚܛܘܦܝܐ
  english_pob_choice: plundering
  chosen_spanish: saqueo
  alternatives_spanish:
  - rapiña
  - despojo
  - robos
  lexicon: Payne Smith
  rationale: «Saqueo» traduce bien la acción violenta de tomar bienes y encaja con la cadencia de la lista.
- source_word: ܐܢܘܣܝܐ
  english_pob_choice: oppression
  chosen_spanish: opresión
  alternatives_spanish:
  - violencia
  - coacción
  - aflicción
  lexicon: Smith
  rationale: La pareja con «saqueo» pide una palabra de violencia social sostenida; «opresión» mantiene el sentido profético y jurídico-social.
theological_decisions:
- issue: Esquema numérico de las calamidades
  english_pob_reading: twelve parts
  chosen_spanish_reading: doce partes
  alternative_spanish_readings:
  - treinta tiempos/períodos
  rationale: Aunque el bucket siríaco muestra inestabilidad óptica en la cifra, el listado ordenado y la tradición de control favorecen claramente doce unidades; el español sigue esa lectura estable.
  doctrine_reference: No aplica; decisión textual-numeral.
- issue: Naturaleza de los agentes del octavo período
  english_pob_reading: assaults of spirits and of demons of apparitions
  chosen_spanish_reading: asaltos de espíritus y de demonios de apariciones
  alternative_spanish_readings:
  - ataques de espíritus y demonios de apariciones
  - agitación de espíritus y demonios
  rationale: Se preserva el tono sobrenatural del pasaje y no se lo reduce a terrores subjetivos o fenómenos genéricos; la frase mantiene la referencia a entidades espirituales reales en la retórica del visionario.
  doctrine_reference: Apocalíptica judía / demonología narrativa del texto.
translation_notes:
  revision_awareness: 'El texto inglés de auditoría pasó por una revisión que eliminó la numeración de versículos dentro de la traducción continua, ajustó «plunder» a «plundering» por naturalidad y restauró el paralelismo «of spirits / of demons». La versión española sigue esa misma línea: texto continuo, lista fluida y paralelismo explícito con repetición de «de».'
  spanish_consistency_notes:
  - Se mantuvo «Y yo le respondí y le dije» para conservar el doble verbo semítico presente en el original y en el inglés auditado.
  - Se prefirió «Yahvé» como forma por defecto cuando el original mencione el nombre divino; aquí no aparece en este versículo.
  - «Espíritus» y «demonios» se dejan sin suavizar para no neutralizar el campo sobrenatural del pasaje.
  - La lista conserva la secuencia retórica del original, con segmentos breves separados por punto para facilitar la lectura pública.
