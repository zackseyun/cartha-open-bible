  to: 'Y vi que entró en el Santo de los Santos, y tomó de allí los velos, el efod, el altar, el propiciatorio, las dos tablas, las vestiduras santas de los sacerdotes, el incensario, las cuarenta y ocho piedras preciosas y todos los utensilios santos del tabernáculo. Y dijo a la tierra con voz fuerte: «Tierra, tierra, tierra, escucha la palabra del Dios poderoso, y recibe lo que te encomiendo, y guárdalos hasta los últimos tiempos, para que, cuando se te ordene, los restituyas, de modo que los extranjeros no se jacten de ellos. Porque se ha acercado el tiempo en que Jerusalén también será entregada por un tiempo, hasta que se diga que será restaurada para siempre».'
