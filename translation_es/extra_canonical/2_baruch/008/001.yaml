review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el inventario cultual y la apelación triple a la tierra, y conserva la línea teológica principal de custodia providencial y restauración futura. Sin embargo, presenta un problema de concordancia referencial en los pronombres del encargo a la tierra: comienza con singular colectivo («lo que te encomiendo», «guárdalo», «lo restituyas») pero termina con plural («sobre ellos»), mientras el referente real son múltiples objetos sagrados. Conviene unificar en plural para reflejar mejor el sentido del pasaje y la lógica del inventario.'
  spanish_quality_summary: 'El español es claro, digno y mayormente natural. La fraseología cultual está bien lograda: «Santo de los Santos», «efod», «propiciatorio», «incensario». La única aspereza importante es la inconsistencia pronominal singular/plural dentro de la cita, que afecta fluidez y precisión. También «se jacten sobre ellos» suena menos natural en español bíblico contemporáneo; «se jacten de ellos» o «se gloríen sobre ellos» funciona mejor.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no aparecen términos problemáticos de Yahvé/Mesías, y los tecnicismos cultuales siguen de cerca el audit trail inglés y las decisiones léxicas documentadas. «Propiciatorio» para mercy seat e «incensario» para censer están bien justificadas. «Dios poderoso» también respeta la decisión inglesa sin sobredeterminarla.'
  issues:
  - severity: medium
    issue: Inconsistencia pronominal en la custodia de los objetos sagrados
    rationale: El texto pasa de singular («lo que te encomiendo», «guárdalo», «lo restituyas») a plural («sobre ellos»), aunque el antecedente concreto es un conjunto de varios objetos. El sentido del pasaje pide plural coherente.
  - severity: low
    issue: 'Expresión poco natural: «se jacten sobre ellos»'
    rationale: Aunque comprensible, en español suena más natural «se jacten de ellos». Esto preserva la idea de presumir respecto de esos objetos sin calco innecesario.
  revised_spanish_text: 'Y vi que entró en el Santo de los Santos, y tomó de allí los velos, el efod, el altar, el propiciatorio, las dos tablas, las vestiduras santas de los sacerdotes, el incensario, las cuarenta y ocho piedras preciosas y todos los utensilios santos del tabernáculo. Y dijo a la tierra con voz fuerte: «Tierra, tierra, tierra, escucha la palabra del Dios poderoso, y recibe lo que te encomiendo, y guárdalos hasta los últimos tiempos, para que, cuando se te ordene, los restituyas, de modo que los extranjeros no se jacten de ellos. Porque se ha acercado el tiempo en que Jerusalén también será entregada por un tiempo, hasta que se diga que será restaurada para siempre».'
  revision_rationale: Se corrige la concordancia referencial del encargo a la tierra, pasando a plural coherente con los múltiples objetos sagrados del inventario («guárdalos», «los restituyas», «de ellos»). También se suaviza una construcción poco natural en español («se jacten sobre ellos» > «se jacten de ellos») sin alterar el sentido fuente ni las decisiones teológicas documentadas.
