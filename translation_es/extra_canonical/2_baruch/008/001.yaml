translation:
  language: es
  text: 'Y vi que entró en el Santo de los Santos, y tomó de allí los velos, el efod, el altar, el propiciatorio, las dos tablas, las vestiduras santas de los sacerdotes, el incensario, las cuarenta y ocho piedras preciosas y todos los utensilios santos del tabernáculo. Y dijo a la tierra con voz fuerte: «Tierra, tierra, tierra, escucha la palabra del Dios poderoso, y recibe lo que te encomiendo, y guárdalos hasta los últimos tiempos, para que, cuando se te ordene, los restituyas, de modo que los extranjeros no se jacten de ellos. Porque se ha acercado el tiempo en que Jerusalén también será entregada por un tiempo, hasta que se diga que será restaurada para siempre».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܒܝܬ ܩܘܕܫܐ ܩܘܕܫܐ
  english_pob_choice: the Holy of Holies
  chosen_spanish: el Santo de los Santos
  alternatives_spanish:
  - el Lugar Santísimo
  - el Santo de Santidad
  lexicon: Payne Smith
  rationale: La expresión siriaca es el superlativo cultual estándar del santuario. En español, «Santo de los Santos» es la forma tradicional y precisa, y conserva mejor el carácter técnico del lugar que una paráfrasis.
- source_word: ܦܪ̈ܘܟܬܐ
  english_pob_choice: the veils
  chosen_spanish: los velos
  alternatives_spanish:
  - las cortinas
  lexicon: Payne Smith
  rationale: El término designa los paños o colgaduras del santuario. «Velos» mantiene el tono cultual y coincide con el valor adoptado en el contexto inglés.
- source_word: ܚܘܣܝܐ
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta de expiación
  - el asiento de misericordia
  lexicon: Payne Smith
  rationale: En contexto se trata del objeto cultual sobre el arca. «Propiciatorio» es el equivalente español tradicional y más estable para este término técnico.
- source_word: ܘܬܪ̈ܬܝܢ ܟܘܪ̈ܣܘ
  english_pob_choice: the two tables
  chosen_spanish: las dos tablas
  alternatives_spanish:
  - las dos tablas de la ley
  - las dos tabletas
  lexicon: Smith Syriac Dictionary
  rationale: Aunque la lectura del testimonio es algo inestable, el sentido inventarial apunta claramente a las tablas del pacto. «Tablas» preserva esa referencia sin sobreespecificar más allá de la evidencia.
- source_word: ܦܝܪܡܐ
  english_pob_choice: the censer
  chosen_spanish: el incensario
  alternatives_spanish:
  - el pectoral
  - el adorno sagrado
  lexicon: Payne Smith
  rationale: La lista cultual y la revisión posterior favorecen «incensario» como objeto litúrgico. Es la opción española más directa y evita una vaguedad innecesaria.
- source_word: ܐܪܥܐ ܐܪܥܐ ܐܪܥܐ
  english_pob_choice: Earth, earth, earth
  chosen_spanish: Tierra, tierra, tierra
  alternatives_spanish:
  - Suelo, suelo, suelo
  - País, país, país
  lexicon: Smith Syriac Dictionary
  rationale: Se conserva la triple vocación retórica. «Tierra» reproduce el vocativo solemne y es preferible a «país», que debilitaría el efecto del llamado.
- source_word: ܡܦܪܕܐ / ܡܦܪܕܝܟܘܢ
  english_pob_choice: receive what I commit to you
  chosen_spanish: recibe lo que te encomiendo
  alternatives_spanish:
  - recibe lo que deposito en ti
  - acoge lo que te confío
  lexicon: Payne Smith
  rationale: El verbo expresa una entrega confiada para custodia. «Encomiendo» recoge la idea de poner algo al cuidado de otro sin perder la solemnidad del encargo.
- source_word: ܣܓܝܐܐ / ܡܠܐܟܐ ܡܥܢܐ
  english_pob_choice: the word of the mighty God
  chosen_spanish: la palabra del Dios poderoso
  alternatives_spanish:
  - la palabra del Dios fuerte
  - la palabra del Dios todopoderoso
  lexicon: Payne Smith
  rationale: «Poderoso» refleja fielmente el adjetivo siriaco y mantiene la formulación del audit trail inglés. No se eleva a «todopoderoso» porque esa precisión no está explicitada aquí.
theological_decisions:
- issue: Custodia sagrada de los objetos del templo en la tierra
  english_pob_reading: The earth is commanded to receive and keep the holy items until the appointed restoration.
  chosen_spanish_reading: La tierra recibe los objetos santos como depósito confiado para guardarlos hasta el tiempo de su restitución.
  alternative_spanish_readings:
  - La tierra los recibe como entierro simbólico hasta el final
  - La tierra solo es un lugar de ocultamiento
  rationale: El pasaje presenta una custodia activa y providencial, no mera sepultura accidental. La redacción española conserva la idea de depósito y restitución futura.
  doctrine_reference: Providencia divina y preservación de lo santo
- issue: Jerusalén entregada por un tiempo, no de manera definitiva
  english_pob_reading: Jerusalem also will be delivered up for a time, until it is said that it will be restored again forever.
  chosen_spanish_reading: Jerusalén será entregada por un tiempo, con restauración futura definitiva.
  alternative_spanish_readings:
  - Jerusalén será destruida sin más
  - Jerusalén quedará perdida para siempre
  rationale: La frase debe conservar la tensión entre juicio temporal y restauración final. «Por un tiempo» y «para siempre» mantienen esa estructura escatológica.
  doctrine_reference: Juicio temporal y restauración escatológica
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del audit trail: ‘Holy of Holies’, ‘mercy seat’ y ‘censer’ ya estaban corregidos en la revisión posterior, y la puntuación se mantuvo con la voz narrativa cerrando después del discurso directo.'
  spanish_consistency_notes:
  - 'Se preservó el registro cultual técnico con terminología estable: Santo de los Santos, propiciatorio, incensario.'
  - Se evitó sustituir «Dios poderoso» por «Dios todopoderoso» para no intensificar sin base explícita el adjetivo siriaco.
  - «Entregada por un tiempo» conserva el matiz temporal sin convertirlo en una destrucción final.
  - No se añadieron notas al pie porque no hubo ambigüedad suficiente en el español final que requiriera marcador textual.
