translation:
  language: es
  text: '«Ahora, derriba sus muros y derríbalos hasta sus cimientos, para que los enemigos no se jacten y digan: “Nosotros mismos hemos derribado el muro de Sion, y hemos quemado la morada del Dios poderoso”».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Now
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues bien
  - Entonces
  lexicon: adverbio temporal/discursivo
  rationale: El inglés POB toma el inicio como una instrucción inmediata; en español «Ahora» conserva esa inmediatez sin añadir matices narrativos ajenos.
- source_word: pull down
  english_pob_choice: pull down
  chosen_spanish: derriba
  alternatives_spanish:
  - demuele
  - derrumba
  lexicon: verbo de destrucción/desmontaje
  rationale: «Derribar» comunica bien la acción de abatir una estructura y mantiene un registro claro y digno.
- source_word: its walls
  english_pob_choice: its walls
  chosen_spanish: sus muros
  alternatives_spanish:
  - su muro
  - sus paredes
  lexicon: sustantivo arquitectónico
  rationale: Aunque el trasfondo siríaco del control señaló singularidad, el texto auditado en inglés habla de «walls»; en español, «sus muros» conserva la imagen estructural sin forzar una literalidad técnica que oscurezca la instrucción.
- source_word: overturn them to their foundations
  english_pob_choice: overturn them to their foundations
  chosen_spanish: arrójalos hasta sus cimientos
  alternatives_spanish:
  - volcándolos hasta sus cimientos
  - derríbalos hasta sus cimientos
  lexicon: verbo de ruina estructural
  rationale: «Arrójalo/arrójalos» transmite la idea de abatimiento completo con movimiento violento; se eligió plural para concordar con «muros» en la forma inglesa revisada y para una lectura natural en español.
- source_word: the enemies
  english_pob_choice: the enemies
  chosen_spanish: los enemigos
  alternatives_spanish:
  - los adversarios
  lexicon: sustantivo de oposición
  rationale: Es la correspondencia directa y clara en español.
- source_word: boast
  english_pob_choice: boast
  chosen_spanish: se jacten
  alternatives_spanish:
  - se gloríen
  - presuman
  lexicon: verbo de arrogancia
  rationale: «Jactarse» reproduce bien el matiz de vanagloria ofensiva del pasaje.
- source_word: the wall of Zion
  english_pob_choice: the wall of Zion
  chosen_spanish: el muro de Sion
  alternatives_spanish:
  - la muralla de Sion
  lexicon: topónimo + arquitectura
  rationale: «Muro» sigue el singular del contenido citado y permite contraste con «sus muros» en la orden; «Sion» es la forma tradicional y transparente.
- source_word: the dwelling place of the mighty God
  english_pob_choice: the dwelling place of the mighty God
  chosen_spanish: la morada del Dios poderoso
  alternatives_spanish:
  - la habitación del Dios poderoso
  - el lugar de morada del Dios poderoso
  lexicon: sustantivo de habitación divina
  rationale: «Morada» es la forma natural y reverente para el lugar donde Dios habita; «Dios poderoso» sigue de cerca el epíteto del inglés POB sin introducir formulación doctrinal adicional.
theological_decisions:
- issue: Referencia a la destrucción de Sion y a la morada divina
  english_pob_reading: The enemies claim to have pulled down Zion's wall and burned the dwelling place of the mighty God.
  chosen_spanish_reading: Los enemigos se jactan de haber derribado el muro de Sion y quemado la morada del Dios poderoso.
  alternative_spanish_readings:
  - los enemigos dicen que ellos mismos derribaron el muro de Sion y quemaron la morada del Dios poderoso
  - los enemigos se enorgullecen de haber destruido el muro de Sion y la morada del Dios poderoso
  rationale: 'Se conserva la tensión del discurso directo y la jactancia enemiga sin suavizar el alcance teológico: el daño recae sobre Sion y sobre la morada de Dios, tal como en el texto auditado.'
  doctrine_reference: Teología bíblica de Sion / presencia divina
translation_notes:
  revision_awareness: La redacción sigue el alcance restringido de 2 Baruch 8:2 según la revisión reciente, evitando incorporar material de los versículos vecinos. Se tomó como base la forma inglesa revisada ('Now... walls... overturn them') para reflejar la pauta visible en el audit trail, aunque el control siríaco señalado en la revisión menciona singularidad en otra fase del debate textual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología general del proyecto, pero aquí no aparece porque el versículo usa una perífrasis divina, no el Tetragrámaton.
  - «Dios poderoso» se conserva para reproducir el epíteto del inglés auditado sin sustituirlo por una formulación litúrgica más conocida.
  - El estilo usa comillas angulares españolas y puntuación de cierre conforme al español.
