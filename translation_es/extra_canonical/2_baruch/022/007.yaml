translation:
  language: es
  text: ¿O si una mujer encinta da a luz antes de tiempo[a], no mata al niño en su vientre[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''antes de tiempo'' traduce el sentido siriaco de ''sin su tiempo'', no ''sin dolores''.'
    reason: lexical_alternative
  - marker: b
    text: '''mata al niño'' expresa que ella causa la muerte del niño en su vientre; no significa meramente esperar un niño muerto.'
    reason: textual_variant
lexical_decisions:
- source_word: b-la zabnah
  english_pob_choice: gives birth prematurely
  chosen_spanish: da a luz prematuramente
  alternatives_spanish:
  - da a luz antes de tiempo
  - alumbra antes de tiempo
  lexicon: prematurely
  rationale: El giro siriaco indica nacimiento 'sin su tiempo' o 'antes de tiempo', no 'sin dolores'. En español, 'da a luz prematuramente' conserva con claridad la idea temporal y el registro natural de la pregunta retórica.
- source_word: la mamyta yalda
  english_pob_choice: does she not kill the child
  chosen_spanish: no mata al niño
  alternatives_spanish:
  - no da muerte al niño
  - no mata al hijo
  lexicon: kill
  rationale: 'La revisión fuente-auditada corrige la lectura errónea de ''expect a dead child''. El verbo debe expresar acción causal directa: la madre provoca la muerte del niño por el parto prematuro; ''no mata al niño'' refleja esa fuerza con naturalidad en español.'
- source_word: yalda
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el hijo
  - la criatura
  lexicon: child
  rationale: El término es general en el contexto del embarazo y el nacimiento. 'El niño' es claro y directo en español; 'criatura' sonaría más perifrástico, y 'hijo' introduce una relación filial no explícita en el texto.
- source_word: pregnant woman
  english_pob_choice: pregnant woman
  chosen_spanish: una mujer encinta
  alternatives_spanish:
  - una mujer embarazada
  lexicon: pregnant woman
  rationale: '''Encinta'' es plenamente comprensible y algo más cercano al registro literario del texto. ''Embarazada'' también es posible, pero ''encinta'' evita una modernización excesiva y mantiene dignidad estilística.'
theological_decisions:
- issue: Relación causal entre parto prematuro y muerte del niño
  english_pob_reading: does she not kill the child in her womb?
  chosen_spanish_reading: no mata al niño en su vientre
  alternative_spanish_readings:
  - no da muerte al niño en su vientre
  - ¿no hace morir al niño en su vientre?
  rationale: 'La fuente y la revisión auditada señalan una afirmación fuerte de causalidad: el nacimiento prematuro resulta en la muerte del niño. El español conserva esa tensión sin suavizarla ni convertirla en mera expectativa de muerte.'
  doctrine_reference: Sin referencia doctrinal específica; decisión de fidelidad semántica al testimonio textual.
translation_notes:
  revision_awareness: 'Se incorporó la corrección auditada del siriaco: la frase no significa ''sin dolores'' ni ''espera un niño muerto'', sino ''da a luz prematuramente'' y ''mata al niño''. También se adoptó una estructura española fluida equivalente a la pregunta retórica del inglés POB revisado.'
  spanish_consistency_notes:
  - Se preserva el tono interrogativo-retórico del original.
  - '''Encinta'' y ''niño'' mantienen un registro claro y respetuoso sin añadir interpretaciones ajenas.'
  - No se introduce 'Cristo', 'SEÑOR' ni otros términos no presentes en este versículo.
