translation:
  language: es
  text: O si alguien planta una viña, a menos que produzca fruto en su tiempo, ¿puede el que la plantó recibir fruto de ella?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: vineyard
  english_pob_choice: a vineyard
  chosen_spanish: una viña
  alternatives_spanish:
  - un viñedo
  lexicon: viña / viñedo
  rationale: El inglés POB habla de un objeto plantado que produce fruto; en español, «viña» es la forma más natural y bíblica para la planta/plantación de vid en este contexto, sin introducir un matiz agrícola distinto que «viñedo» podría sugerir.
- source_word: produces fruit in its season
  english_pob_choice: it produces fruit in its season
  chosen_spanish: produzca fruto en su tiempo
  alternatives_spanish:
  - dé fruto a su tiempo
  - produzca fruto en su sazón
  lexicon: producir / fruto / tiempo
  rationale: 'La revisión inglesa corrigió la lógica del pasaje para reflejar el sentido del siriaco: el punto es que la viña llegue a su tiempo de dar fruto. «En su tiempo» mantiene el carácter temporal y evita forzar una expresión demasiado idiomática o interpretativa.'
- source_word: can ... receive
  english_pob_choice: can the one who planted it receive fruit from it?
  chosen_spanish: ¿puede el que la plantó recibir fruto de ella?
  alternatives_spanish:
  - ¿puede el que la plantó tomar fruto de ella?
  - ¿puede el que la plantó esperar recibir fruto de ella?
  lexicon: can receive / receive
  rationale: Sigo la corrección auditada del POB inglés, que eliminó «expect to» y dejó el verbo directo «receive». En español, «recibir fruto de ella» conserva la pregunta retórica sin añadir una expectativa implícita que el texto revisado no exige.
theological_decisions:
- issue: Proceso ordenado y tiempo señalado para dar fruto
  english_pob_reading: The vineyard must produce fruit in its season; the planter may receive fruit from it.
  chosen_spanish_reading: La viña debe llegar a producir fruto en el tiempo que le corresponde; entonces el plantador puede recibir fruto de ella.
  alternative_spanish_readings:
  - La viña produce fruto en su sazón; entonces el plantador recibe fruto de ella.
  - Si no produce fruto a su tiempo, el plantador no puede recibir fruto de ella.
  rationale: El contexto de 2 Baruc 22 enfatiza la llegada de algo a su momento designado. La redacción española conserva esa tensión temporal sin convertir la cláusula en una simple afirmación agrícola ni añadir una negación no presente de forma explícita en esta frase.
  doctrine_reference: 'Contexto literario de 2 Baruc 22: maduración/consumación en el tiempo señalado'
translation_notes:
  revision_awareness: La base inglesa fue revisada para corregir una lectura contradictoria y establecer que el siriaco habla de que la viña produzca fruto en su tiempo, no de que el plantador tome fruto para alimento. También se eliminó la expansión innecesaria «expect to», reduciendo la frase a «receive».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este verso no contiene el nombre divino.
  - Se usó «viña» por claridad y naturalidad en español bíblico; no se introdujo terminología eclesiástica.
  - La estructura interrogativa retórica se conservó para reflejar el paralelismo argumentativo del contexto.
