translation:
  language: es
  text: ¿Acaso quien va por un camino deja de completarlo[a]? ¿O acaso quien navega por el mar encuentra descanso, si no llega al puerto?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «deja de terminarlo». El verbo siríaco revisado expresa completar o terminar, no «encontrarlo».'
    reason: previous_rendering_and_lexical_clarification
lexical_decisions:
- source_word: goes on a road
  english_pob_choice: goes on a road
  chosen_spanish: va por un camino
  alternatives_spanish:
  - anda por un camino
  - recorre un camino
  lexicon: camino
  rationale: El giro describe a un viajero en curso; «va por un camino» conserva la imagen simple y natural del original sin agregar matices innecesarios.
- source_word: fail to complete it
  english_pob_choice: fail to complete it
  chosen_spanish: no lo completa
  alternatives_spanish:
  - no lo termina
  - no llega a completarlo
  lexicon: completar
  rationale: El control siríaco revisado indica la idea de «completar/terminar», no de «encontrar». En español, «completarlo» mantiene el paralelo con el viaje y evita perder la fuerza del verbo revisado.
- source_word: sails on the sea
  english_pob_choice: sails on the sea
  chosen_spanish: navega por el mar
  alternatives_spanish:
  - va por el mar
  - surca el mar
  lexicon: navegar
  rationale: «Navega por el mar» es claro y idiomático; conserva la acción marítima del texto fuente.
- source_word: find rest
  english_pob_choice: find rest
  chosen_spanish: encuentra descanso
  alternatives_spanish:
  - halla descanso
  - descansa
  lexicon: descanso
  rationale: La pregunta retórica apunta a la imposibilidad de reposar en el trayecto sin destino; «encuentra descanso» reproduce bien esa idea en español.
- source_word: harbor
  english_pob_choice: harbor
  chosen_spanish: puerto
  alternatives_spanish:
  - muelle
  - abrigo
  lexicon: puerto
  rationale: «Puerto» es la correspondencia más directa y transparente para el lugar de llegada del navegante.
theological_decisions:
- issue: Paralelismo retórico de viajero y navegante
  english_pob_reading: A road traveler and a sailor are compared to show that completion/rest require reaching the destination.
  chosen_spanish_reading: Se conserva el paralelismo entre el caminante y el navegante como imagen de meta cumplida y descanso alcanzado al llegar.
  alternative_spanish_readings:
  - Se podría acentuar más la metáfora con un estilo más libre.
  - Se podría optar por un tono más bíblico tradicional.
  rationale: No hay tensión doctrinal especial; la prioridad es conservar la estructura sapiencial/rhetórica del versículo y su cierre condicional.
  doctrine_reference: None
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada que corrige la lectura inglesa anterior de «fail to find it» a «fail to complete it», basada en el verbo siríaco mšallem (< šlm). La redacción española refleja esa corrección con «no lo completa».
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico sin arcaísmos innecesarios.
  - «Puerto» y «descanso» sostienen la imagen de culminación del viaje sin sobreinterpretación.
  - La nota al pie queda anclada explícitamente en «descanso[a]» para evitar markers huérfanos.
