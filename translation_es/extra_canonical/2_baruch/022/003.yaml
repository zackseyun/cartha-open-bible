  glossary_alignment: No hay conflictos con la terminología base del proyecto. «camino», «navega por el mar», «descanso» y «puerto» están bien elegidos. La decisión principal es mantener para el siríaco šlm una forma española de «completar/terminar» y no «encontrar».
