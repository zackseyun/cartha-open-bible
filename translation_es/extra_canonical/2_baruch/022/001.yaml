translation:
  language: es
  text: 'Y sucedió después de estas cosas que, he aquí, oí una voz, y vi una fuerza posarse sobre mí. Y se oyó una voz desde lo alto que me dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܘܗܘܐ ܡܢ ܒܬܪ ܗܠܝܢ
  english_pob_choice: And it happened after these things
  chosen_spanish: Y sucedió después de estas cosas
  alternatives_spanish:
  - Y aconteció después de estas cosas
  - Y ocurrió después de estas cosas
  lexicon: Payne Smith
  rationale: La fórmula narrativa se rinde de manera sobria y bíblica en español, sin volverla arcaica en exceso. 'Sucedió' conserva el valor de transición narrativa del original.
- source_word: ܫܡܥܬ ܩܠܐ
  english_pob_choice: I heard a voice
  chosen_spanish: oí una voz
  alternatives_spanish:
  - escuché una voz
  - oí la voz
  lexicon: Payne Smith
  rationale: '''Oí'' es la forma más directa y natural; mantiene la inmediatez visionaria del relato. Se evita ''escuché'' por sonar menos inmediato aquí.'
- source_word: ܚܝܠܐ ܕܐܬܩܒܥ ܠܝ
  english_pob_choice: a strength that was fixed upon me
  chosen_spanish: una fuerza fijada sobre mí
  alternatives_spanish:
  - un poder fijado sobre mí
  - una fuerza establecida sobre mí
  lexicon: Payne Smith
  rationale: Se conserva la imagen de algo objetivo que cae o queda asentado sobre el profeta. 'Fuerza' responde mejor al campo semántico del siríaco que una mera impresión interior, y 'fijada sobre mí' preserva el carácter pasivo y visionario.
- source_word: ܘܩܠܐ ܡܢ ܡܪܘܡܐ
  english_pob_choice: And a voice was heard from on high
  chosen_spanish: Y se oyó una voz desde lo alto
  alternatives_spanish:
  - Y una voz fue oída desde lo alto
  - Y se escuchó una voz desde lo alto
  lexicon: Payne Smith
  rationale: '''Desde lo alto'' traduce bien el valor celestial/trascendente del siríaco. ''Se oyó'' mantiene una construcción natural en español y conserva la pasividad del original.'
- source_word: ܐܡܪ ܠܝ
  english_pob_choice: said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - dijo a mí
  lexicon: Payne Smith
  rationale: La forma reflexiva indirecta es la opción idiomática normal en español y no altera el sentido.
theological_decisions:
- issue: Naturaleza de la experiencia revelatoria
  english_pob_reading: 'The speech is rendered as a concrete apocalyptic encounter: a voice from on high and a strength fixed upon the prophet.'
  chosen_spanish_reading: Se conserva una voz desde lo alto y una fuerza fijada sobre mí, como encuentro objetivo y visionario.
  alternative_spanish_readings:
  - una sensación interior
  - un impulso espiritual vago
  rationale: El siríaco presenta la revelación como algo externo, intenso y no meramente psicológico. La traducción evita interiorizar la escena para no debilitar su carácter apocalíptico.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Matiz de ܚܝܠܐ
  english_pob_reading: a might fixed upon me
  chosen_spanish_reading: una fuerza fijada sobre mí
  alternative_spanish_readings:
  - un poder fijado sobre mí
  - una potencia fijada sobre mí
  rationale: '''Fuerza'' comunica mejor en español moderno la energía/eficacia impresionante del término sin cargarlo con un matiz demasiado abstracto. Se preserva la tensión entre poder y experiencia física/visionaria.'
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés, que ajustó 'a might' a 'a strength' y mantuvo el cierre incompleto del pasaje; en español se reflejó el texto recibido para 22:1 sin expandirlo con el material siguiente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término estándar del proyecto cuando aparezca el nombre divino; en este verso no corresponde.
  - Se evita calcar demasiado el inglés, pero se conserva la estructura de paralelismo narrativa y la pasividad del original.
  - No se añaden notas al pie porque este verso no presenta una alternativa textual o lexical que requiera anclaje explícito en el texto español.
