translation:
  language: es
  text: O si se da un tesoro a alguien, ¿no pone en él su confianza, y ya no es sacudido?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: treasure
  english_pob_choice: treasure
  chosen_spanish: tesoro
  alternatives_spanish:
  - riqueza
  - caudal
  lexicon: sustantivo común
  rationale: El original habla de un bien valioso depositado en alguien; «tesoro» reproduce esa imagen de manera natural en español y conserva la concreción semántica del inglés POB.
- source_word: given to someone
  english_pob_choice: given to someone
  chosen_spanish: se entrega a alguien
  alternatives_spanish:
  - se da a alguien
  - le es confiado a alguien
  lexicon: construcción verbal
  rationale: «Se entrega» mantiene la pasiva impersonal del sentido original y sugiere una transferencia real de posesión o custodia sin añadir matices no presentes en el texto fuente.
- source_word: trust in it
  english_pob_choice: trust in it
  chosen_spanish: pone en él su confianza
  alternatives_spanish:
  - confía en él
  - se apoya en él
  lexicon: verbo + complemento preposicional
  rationale: «Poner la confianza en» expresa de forma idiomática y clara la dependencia o seguridad depositada en el tesoro, conservando el objeto de confianza.
- source_word: shaken
  english_pob_choice: shaken
  chosen_spanish: sacado
  alternatives_spanish:
  - conmovido
  - tambaleado
  - perturbado
  lexicon: participio adjetival
  rationale: El inglés POB conserva la imagen de inestabilidad; «sacado» en la pregunta final comunica menos bien esa imagen, por eso se eligió «sacudido», que preserva el verbo pasivo y la fuerza de la metáfora.
theological_decisions:
- issue: La imagen de seguridad/estabilidad ligada a la confianza en un tesoro
  english_pob_reading: does he not trust in it, so that he is no longer shaken?
  chosen_spanish_reading: ¿no pone en él su confianza, de modo que ya no sea sacudido?
  alternative_spanish_readings:
  - ¿no confía en él, de modo que ya no vacile?
  - ¿no se apoya en él para no ser sacudido?
  rationale: No hay una afirmación doctrinal explícita, sino una imagen moral y psicológica de estabilidad. La traducción conserva la relación causal entre confiar y no ser sacudido, sin convertirla en una afirmación espiritual más fuerte de la que el texto permite.
  doctrine_reference: sabiduría/prudencia; no aplica una doctrina específica
translation_notes:
  revision_awareness: El control cruzado indica alta concordancia y no se registraron revisiones aplicadas; por tanto, el español se alinea directamente con el sentido estable del texto fuente y con la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico en español moderno.
  - No se introducen términos confesionales ajenos al texto; la metáfora de ser «sacudido» conserva la imagen de inestabilidad sin interpretarla en exceso.
  - La sintaxis reproduce la pregunta retórica del original y del inglés POB.
