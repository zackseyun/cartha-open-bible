  text: O si alguno siembra en la tierra, a menos que pierda la semilla en la tierra, ¿cómo después recibe sus frutos?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: siembra la tierra
  english_pob_choice: sows the earth
  chosen_spanish: siembra la tierra
  alternatives_spanish:
