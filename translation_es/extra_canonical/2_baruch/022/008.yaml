translation:
  language: es
  text: ¿O quién ha adquirido riqueza y no la ha dejado?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: qna qenyana
  english_pob_choice: has acquired wealth
  chosen_spanish: ha adquirido riqueza
  alternatives_spanish:
  - ha ganado riqueza
  - ha obtenido bienes
  - ha adquirido bienes
  lexicon: qna = adquirir/obtener; qenyana = riqueza, posesión, bienes
  rationale: El siríaco indica la acción de adquirir y el objeto como riqueza/posesión. ‘Ha adquirido riqueza’ conserva el sentido posesivo y la pregunta retórica sin introducir matices ajenos. ‘Bienes’ es posible, pero ‘riqueza’ refleja mejor el paralelo semántico del contexto.
- source_word: w-la shbaqhw
  english_pob_choice: and not left it
  chosen_spanish: y no la ha dejado
  alternatives_spanish:
  - y no la ha abandonado
  - y no la ha soltado
  - y no la ha dejado atrás
  lexicon: shbaq = dejar, abandonar; sufijo de objeto = lo/la según antecedente implícito
  rationale: La negación con verbo de ‘dejar’ se conserva de forma directa. ‘La’ concuerda con ‘riqueza’ como antecedente implícito en español. ‘Abandonado’ es posible, pero ‘dejar’ reproduce mejor la sobriedad del original.
theological_decisions:
- issue: Pregunta retórica sobre la posesión terrenal
  english_pob_reading: Or who has acquired wealth and not left it?
  chosen_spanish_reading: ¿O quien ha adquirido riqueza y no la ha dejado?
  alternative_spanish_readings:
  - ¿O quien ha adquirido bienes y no los ha dejado?
  - ¿O quien ha acumulado riqueza y no la ha dejado?
  rationale: El texto no desarrolla una doctrina explícita, sino una pregunta retórica sobre la imposibilidad de retener posesiones terrenales. Se mantiene sin explicación añadida para no suavizar la tensión del aforismo.
  doctrine_reference: Eclesiastés 5:15; 1 Timoteo 6:7
translation_notes:
  revision_awareness: El contexto de revisión muestra que se corrigieron lecturas erróneas anteriores que hablaban de ‘construir una casa’; el control siríaco confirmado lee ‘adquirir riqueza/posesión’. La versión española sigue esa lectura revisada y no incorpora la variante descartada.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin calco excesivo.
  - Se usa ‘riqueza’ en singular para reflejar el sustantivo abstracto del siríaco; ‘bienes’ queda como alternativa contextual.
  - Se conserva la pregunta retórica con ‘O’, siguiendo el arranque disyuntivo del inglés POB.
