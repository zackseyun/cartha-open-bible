  yaml_path: translation/extra_canonical/2_baruch/035/001.yaml
  text: 'And I, Baruch, went to the holy gate, and sat down in humility, and I wept and said:


    “O my eyes, become springs,

    and eyelids of water, a fountain of tears.

    For how can I find rest over Zion?

    And how can I weep for Jerusalem?

    For the people whom I nourished

    and who were formerly greater than I in vision

    have been shaken with trembling.”'
  footnotes:
  - marker: a
    text: Or 'And how can I weep for the mourning and find it?'.
    reason: previous_rendering
