translation:
  language: es
  text: 'Y yo, Baruc, fui a la puerta santa, y me senté en humildad, y lloré y dije:


    “¡Oh, mis ojos, conviértanse en manantiales,

    y párpados de agua, una fuente de lágrimas!


    Pues ¿cómo encontraré descanso sobre Sion?

    ¿Y cómo lloraré por Jerusalén?

    Porque el pueblo que yo crié,

    y que antes era mayor que yo en visión,

    ha sido sacudido con temblor.”'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܬܪܥܐ ܩܕܝܫܐ
  english_pob_choice: the holy gate
  chosen_spanish: la puerta santa
  alternatives_spanish:
  - la puerta sagrada
  - el portón santo
  lexicon: Payne Smith
  rationale: El sustantivo pide una imagen concreta de acceso/entrada. En español, "puerta santa" conserva la literalidad y suena natural; "santa" mantiene el valor cultual del recinto sin volverlo una paráfrasis abstracta.
- source_word: ܡ̈ܟܝܟܐܝܬ
  english_pob_choice: in humility
  chosen_spanish: en humildad
  alternatives_spanish:
  - humildemente
  - en bajeza
  lexicon: Payne Smith
  rationale: El adverbio expresa abatimiento y postura interior. "En humildad" preserva el gesto de Baruc al sentarse, y evita una formulación demasiado adverbial que pierda la matiz de disposición.
- source_word: ܡܒܘ̈ܥܐ
  english_pob_choice: springs
  chosen_spanish: manantiales
  alternatives_spanish:
  - fuentes
  - nacimientos de agua
  lexicon: Payne Smith
  rationale: La imagen es poética y plural. "Manantiales" da el valor de brotar continuamente, como en el inglés "springs", y funciona bien en el paralelismo con "fuente de lágrimas".
- source_word: ܐܡܘ̈ܬܐ
  english_pob_choice: eyelids
  chosen_spanish: párpados
  alternatives_spanish:
  - pestañas
  - ojos
  lexicon: Payne Smith
  rationale: La tradición de control favorece una parte del rostro/campo visual. "Párpados" reproduce la decisión del POB inglés de mantener la anatomía del lamento; en español, "párpados de agua" suena poético y evita sustituir la imagen por una explicación.
- source_word: ܐܬܬܢܝܚ
  english_pob_choice: find rest
  chosen_spanish: encontraré descanso
  alternatives_spanish:
  - hallaré reposo
  - me sosegaré
  lexicon: Payne Smith
  rationale: 'El verbo conserva el sentido de reposo/alivio. "Encontraré descanso" refleja la tensión afectiva: Baruc no logra reposar por causa de Sion.'
- source_word: ܐܒܠܐ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - duelo
  - lamentación
  lexicon: Payne Smith
  rationale: Siguiendo la decisión auditada del POB, se lee el pasaje hacia el paralelismo Sion/Jerusalén. En español, "Jerusalén" restituye ese balance poético y la revisión textual aceptada por el equipo.
- source_word: ܕܡ̈ܥܐ
  english_pob_choice: tears
  chosen_spanish: lágrimas
  alternatives_spanish:
  - llanto
  - sollozos
  lexicon: Payne Smith
  rationale: El contexto exige el líquido del llanto, no solo el acto de llorar. "Fuente de lágrimas" conserva la metáfora acuosa y el ritmo del verso.
- source_word: ܒܪܘܟ
  english_pob_choice: Baruch
  chosen_spanish: Baruc
  alternatives_spanish:
  - Baruj
  - Baruch
  lexicon: transliteration_project_standard
  rationale: Se adopta la forma hispana habitual "Baruc" para la transliteración del nombre propio, manteniendo legibilidad para lectores de español.
theological_decisions:
- issue: Paralelismo cultual entre Sion y Jerusalén
  english_pob_reading: The lament is directed to Zion and Jerusalem as the devastated sanctuary-city complex.
  chosen_spanish_reading: La queja se dirige a Sion y Jerusalén como el complejo ciudad-santuario devastado.
  alternative_spanish_readings:
  - Una lamentación general por la ciudad
  - Un duelo solo emocional sin referencia cultual
  rationale: 'El contexto del capítulo y la lectura auditada insisten en que no es solo nostalgia urbana: la pérdida es cultual y comunitaria. Mantener "Sion" y "Jerusalén" explícitos ayuda a que el lector perciba esa carga histórica y religiosa.'
  doctrine_reference: 2 Baruc 35:1; contexto del duelo por el santuario
- issue: Imagen corporal extrema en el lamento
  english_pob_reading: Eyes become springs and eyelids of water, a fountain of tears.
  chosen_spanish_reading: Se conserva la hipérbole corporal del llanto como imagen poética literal.
  alternative_spanish_readings:
  - Parafrasear como 'llorar sin cesar'
  - Suavizar a 'ojos llorosos'
  rationale: La fuente presenta una metáfora intensificada que no debe diluirse. Traducir literalmente la imaginería preserva el tono profético y la fuerza del lamento.
  doctrine_reference: Poética semítica del llanto; cf. lamentaciones bíblicas
translation_notes:
  revision_awareness: 'Se revisó la salida anterior a la luz del control auditado: se eliminaron añadidos cultuales que no aparecen aquí, se conservó el cierre con el pueblo sacudido con temblor, y se alineó la línea final con la decisión textual documentada para leer «Jerusalén» en lugar de una reconstrucción defectuosa del OCR. También se corrigió la metáfora a «párpados» para seguir la decisión léxica registrada.'
  spanish_consistency_notes:
  - Se usa «Baruc» como forma hispana estable del nombre propio.
  - Se mantiene «Sion» sin artículo por consistencia bíblica en español.
  - «Puerta santa» conserva la concreción espacial del original sin convertirla en un término genérico.
  - La puntuación reproduce el encabalgamiento poético y la estructura del discurso directo.
