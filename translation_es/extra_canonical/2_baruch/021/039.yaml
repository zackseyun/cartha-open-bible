translation:
  language: es
  text: Acerca a los que son buscados, y que lo que comenzó en aflicción se regocije con la llegada de tu gloria.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Bring near
  english_pob_choice: Bring near
  chosen_spanish: Haz que se acerquen
  alternatives_spanish:
  - Acerca
  - Trae cerca
  lexicon: Imperative causativo de acercar
  rationale: 'El sentido pedido es causativo: no solo ‘acercar’ como movimiento, sino hacer venir o aproximarse a quienes deben ser reunidos. ‘Haz que se acerquen’ conserva el mandato y su matiz causativo en español natural.'
- source_word: those who are sought
  english_pob_choice: those who are sought
  chosen_spanish: los que son buscados
  alternatives_spanish:
  - los buscados
  - aquellos que son buscados
  lexicon: Participio pasivo descriptivo
  rationale: La construcción pasiva refleja el valor de ‘sought’ sin introducir una identificación más específica de la que ofrece el texto. ‘Los que son buscados’ mantiene el proceso de búsqueda y la tensión de ser objeto de esa búsqueda.
- source_word: what began
  english_pob_choice: what began
  chosen_spanish: lo que comenzó
  alternatives_spanish:
  - lo que empezó
  - aquello que comenzó
  lexicon: Relativo neutro
  rationale: ‘Lo que’ reproduce el valor indefinido del referente y evita concretar de más el sujeto del verbo. ‘Comenzó’ es una forma clara y digna en español.
- source_word: in toil
  english_pob_choice: in toil
  chosen_spanish: en el trabajo penoso
  alternatives_spanish:
  - en el esfuerzo
  - en la fatiga
  - en el duro trabajo
  lexicon: Trabajo penoso / esfuerzo fatigoso
  rationale: El término requiere expresar la carga de fatiga o penuria. ‘Trabajo penoso’ comunica bien el esfuerzo sufrido sin convertirlo en una paráfrasis más amplia que el source.
- source_word: rejoice
  english_pob_choice: rejoice
  chosen_spanish: se regocije
  alternatives_spanish:
  - se alegre
  - goce
  lexicon: Verbo de gozo intensificado
  rationale: ‘Regocijarse’ conserva un tono elevado y festivo acorde con el registro poético. Es fiel al movimiento de alegría plena del original.
- source_word: at the arrival of your glory
  english_pob_choice: at the arrival of your glory
  chosen_spanish: al llegar tu gloria
  alternatives_spanish:
  - con la llegada de tu gloria
  - cuando llegue tu gloria
  lexicon: Llegada / venida de la gloria
  rationale: La revisión inglesa prefirió ‘at the arrival’ para un valor locativo-temporal natural; en español, ‘al llegar’ reproduce esa relación sin sobrecargar la frase. ‘Tu gloria’ se mantiene como posesivo directo del texto.
theological_decisions:
- issue: Sujetos reunidos y buscados
  english_pob_reading: those who are sought
  chosen_spanish_reading: los que son buscados
  alternative_spanish_readings:
  - los elegidos
  - los que son buscados y reunidos
  rationale: 'Se evita identificar teológicamente al grupo con una categoría doctrinal no explicitada por el verso. La pasiva conserva la apertura del texto: son personas en estado de búsqueda, sin imponer un sistema interpretativo adicional.'
  doctrine_reference: Salvación y reunión del pueblo; no se explicita una doctrina de elección aquí.
- issue: Gloria como presencia triunfante
  english_pob_reading: your glory
  chosen_spanish_reading: tu gloria
  alternative_spanish_readings:
  - la gloria que es tuya
  - la gloria de ti
  rationale: Se conserva la referencia directa a la gloria como atributo o manifestación del destinatario. No se expande a una glosa teológica, porque el verso enfatiza la llegada de esa gloria como motivo del gozo.
  doctrine_reference: Doxología y esperanza escatológica
translation_notes:
  revision_awareness: La redacción inglesa fue ajustada en la revisión de ‘in the arrival’ a ‘at the arrival’ por naturalidad. La versión española sigue ese matiz con ‘al llegar’, que mantiene una relación temporal/ocasional natural sin introducir otra interpretación.
  spanish_consistency_notes:
  - Se conserva ‘gloria’ como término clave, evitando alternativas más interpretativas como ‘majestad’ o ‘presencia gloriosa’.
  - ‘Buscados’ mantiene la pasiva del origen y no se reemplaza por un sustantivo más doctrinalizado.
  - El registro es poético y sobrio, acorde con un libro extra-canónico de tono orante/escatológico.
