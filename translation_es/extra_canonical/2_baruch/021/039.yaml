revisions:
- from: Haz que se acerquen los que son buscados, y que lo que comenzó en el trabajo penoso se regocije al llegar tu gloria.
  to: Acerca a los que son buscados, y que lo que comenzó en aflicción se regocije con la llegada de tu gloria.
  rationale: Se simplifica el imperativo a 'Acerca' para mayor naturalidad y fuerza litúrgica, se sustituye 'trabajo penoso' por 'aflicción' para reflejar mejor el campo semántico de penuria/toil, y se ajusta la frase final a 'con la llegada de tu gloria' por fluidez y fidelidad temporal en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:09:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del inglés auditado: un ruego para acercar a los buscados y para que aquello que comenzó en aflicción se alegre ante la llegada de la gloria divina. Sin embargo, ''Haz que se acerquen'' suena más perifrástico de lo necesario para un imperativo litúrgico, y ''trabajo penoso'' reduce ''toil'' a labor/trabajo en vez de expresar mejor fatiga, penuria o aflicción. También ''al llegar tu gloria'' es comprensible, pero ''con la llegada de tu gloria'' refleja con más naturalidad en español la relación temporal de ''at the arrival of your glory''.'
  spanish_quality_summary: El texto es legible y digno, pero puede mejorarse para sonar más natural y poético en español eclesial sin perder precisión. 'Acerca' es más directo y elegante que 'Haz que se acerquen'; 'aflicción' o 'fatiga' encajan mejor que 'trabajo penoso' en un contexto de sufrimiento. La cláusula final gana fluidez con 'con la llegada de tu gloria'.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. El borrador no contradice la terminología del proyecto. La revisión propuesta mantiene el registro moderno y digno y evita calcos innecesarios.
  issues:
  - severity: medium
    issue: Imperativo inicial demasiado perifrástico
    rationale: '''Haz que se acerquen'' transmite el valor causativo, pero en español bíblico-natural resulta menos directo que ''Acerca'', que también puede funcionar transitivamente con personas.'
  - severity: medium
    issue: '''trabajo penoso'' estrecha el sentido de ''toil'''
    rationale: La expresión puede sugerir labor ocupacional más que sufrimiento esforzado. En este contexto poético-orante, 'aflicción' expresa mejor el inicio en penuria o sufrimiento.
  - severity: low
    issue: Cláusula final algo menos natural
    rationale: '''Al llegar tu gloria'' es entendible, pero ''con la llegada de tu gloria'' suena más idiomático y refleja bien el inglés auditado ''at the arrival of your glory''.'
  revised_spanish_text: Acerca a los que son buscados, y que lo que comenzó en aflicción se regocije con la llegada de tu gloria.
  revision_rationale: Se simplifica el imperativo a 'Acerca' para mayor naturalidad y fuerza litúrgica, se sustituye 'trabajo penoso' por 'aflicción' para reflejar mejor el campo semántico de penuria/toil, y se ajusta la frase final a 'con la llegada de tu gloria' por fluidez y fidelidad temporal en español.
