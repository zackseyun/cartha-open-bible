translation:
  language: es
  text: Mira, porque solo tú puedes sustentar a todos los que existen, los que han pasado y los que han de venir.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: l-kullhōn aylēn d-ītayhōn
  english_pob_choice: all who are
  chosen_spanish: a todos los que existen
  alternatives_spanish:
  - a todos los que son
  - a todos los que están
  lexicon: ܐܝܬ / ܐܝܬܝܗܘܢ (existir, ser)
  rationale: El siríaco apunta a la idea de existencia/presencia real, no solo a una mera categoría abstracta. "Los que existen" conserva mejor el sentido de all who are y evita volverlo innecesariamente pesado en español.
- source_word: ṭʿn
  english_pob_choice: sustain
  chosen_spanish: sustentar
  alternatives_spanish:
  - sostener
  - llevar
  lexicon: ܛܥܢ
  rationale: '"Sustentar" comunica mejor la acción de mantener en vida o en ser a todos, y corresponde al ajuste del POB inglés desde el literal "bear" hacia el sentido teológico de sostener la existencia.'
- source_word: d-ʿabbrīn
  english_pob_choice: those who have passed
  chosen_spanish: a los que han pasado
  alternatives_spanish:
  - a los que han fallecido
  - a los que han partido
  lexicon: עבר
  rationale: La forma española mantiene el paralelismo temporal sin introducir una interpretación más específica de muerte que el contexto no exige explícitamente.
- source_word: d-ʿātīdīn
  english_pob_choice: those who are to come
  chosen_spanish: a los que han de venir
  alternatives_spanish:
  - a los que vendrán
  - a los que están por venir
  lexicon: עתד
  rationale: '"Han de venir" es una fórmula natural y solemne en español para el futuro venidero, preservando el valor prospectivo del siríaco.'
theological_decisions:
- issue: Alcance universal de la sustentación divina
  english_pob_reading: you alone are able to sustain all who are, those who have passed, and those who are to come
  chosen_spanish_reading: solo tú puedes sustentar a todos los que existen, a los que han pasado y a los que han de venir
  alternative_spanish_readings:
  - solo tú puedes sostener a todos los que existen...
  - solo tú puedes llevar a todos los que existen...
  rationale: 'La frase expresa la exclusividad divina en el mantenimiento de toda la realidad: presente, pasada y futura. "Sustentar" mantiene esa carga teológica sin perder naturalidad.'
  doctrine_reference: Providencia divina; preservación de toda la creación
translation_notes:
  revision_awareness: La lectura revisada del POB corrige una mala lectura previa ('the petition of those before you') y estabiliza el sentido como 'all who are'; también prefiere 'sustain' frente a 'bear'. La versión española sigue esa revisión y evita cualquier glosa que introduzca un objeto inexistente en el siríaco.
  spanish_consistency_notes:
  - Se usa "Yahvé" como terminología por defecto solo cuando el texto lo requiere; aquí no aparece el nombre divino explícito.
  - '"Los que existen / han pasado / han de venir" conserva el paralelismo temporal y evita un lenguaje excesivamente eclesiástico.'
  - No se usan notas al pie porque la revisión del POB ya despeja la ambigüedad principal y el español no introduce una nueva.
