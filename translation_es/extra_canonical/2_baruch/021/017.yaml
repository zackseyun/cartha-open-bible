  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen nombres divinos ni términos con glosario sensible. Las decisiones léxicas principales ('sustentar', 'los que existen', 'los que han pasado', 'los que han de venir') son coherentes con el expediente inglés y con el siríaco.
