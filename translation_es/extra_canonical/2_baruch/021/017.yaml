  source_alignment_summary: 'El borrador español refleja bien el sentido siríaco y el ajuste del POB inglés: la exclusividad divina, el verbo de sostener/sustentar, y la triple referencia a los que existen, los que han pasado y los que han de venir. No obstante, la inserción de la preposición repetida (''a todos..., a los que..., y a los que...'') hace la serie un poco menos paralela que el inglés auditado y menos fluida en español.'
