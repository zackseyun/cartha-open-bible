translation:
  language: es
  text: Y que se dé a conocer a los que están con ellos, que son como ellos, que este es el tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܢܕܥ / let it be known
  english_pob_choice: And let it be known
  chosen_spanish: Y que se dé a conocer
  alternatives_spanish:
  - Y que se sepa
  - Y sea dado a conocer
  lexicon: knowledge/revelation verb
  rationale: El giro impersonal con subjuntivo conserva el valor exhortativo o declarativo del original y del inglés POB sin volverlo demasiado rígido. 'Se dé a conocer' expresa bien una difusión pública del conocimiento.
- source_word: those who are with them
  english_pob_choice: to those who are with them
  chosen_spanish: a los que están con ellos
  alternatives_spanish:
  - a los que están junto a ellos
  - a quienes están con ellos
  lexicon: preposition + relational phrase
  rationale: La fórmula mantiene la relación de compañía/adhesión de manera natural en español, sin añadir matices ausentes en el texto.
- source_word: who are like them
  english_pob_choice: who are like them
  chosen_spanish: que son como ellos
  alternatives_spanish:
  - que son semejantes a ellos
  - que se parecen a ellos
  lexicon: comparative resemblance
  rationale: '''Como ellos'' es la forma más directa y sobria. Conserva la comparación abierta del original sin precisar más de lo que el texto dice.'
- source_word: this is the time
  english_pob_choice: that this is the time
  chosen_spanish: que este es el tiempo
  alternatives_spanish:
  - que este es el momento
  - que este es el tiempo señalado
  lexicon: temporal designation
  rationale: '''Tiempo'' reproduce la expresión del inglés POB y mantiene el sentido de una coyuntura decisiva. ''Momento'' sería más idiomático, pero algo menos marcado; ''tiempo señalado'' introduce una interpretación no explícita.'
theological_decisions:
- issue: Identificación de un tiempo decisivo o escatológico
  english_pob_reading: that this is the time
  chosen_spanish_reading: que este es el tiempo
  alternative_spanish_readings:
  - que este es el momento
  - que este es el tiempo señalado
  rationale: El texto afirma una hora determinada sin desarrollar más su contenido. En español se conserva la ambigüedad controlada de 'tiempo', que puede leerse como período o coyuntura decisiva, sin añadir explicación doctrinal.
  doctrine_reference: Escatología / tiempo señalado
translation_notes:
  revision_awareness: La versión inglesa POB permanece sin cambios en la última revisión y muestra alto acuerdo en la verificación cruzada; no se documentan variantes textuales ni decisiones léxicas adicionales en el audit trail, por lo que el español se apoya directamente en la lectura establecida.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y publicable, con sintaxis clara y sin calcos innecesarios.
  - No se introducen términos eclesiásticos tradicionales no requeridos por el texto.
  - '''Tiempo'' se conserva como equivalente semántico amplio de la expresión inglesa y del original, sin especificación adicional.'
