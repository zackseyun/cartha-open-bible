translation:
  language: es
  text: Porque el espíritu del hombre[a] es el gobernante del mundo; sin embargo, ellos no saben lo que le pertenece al hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: “La multitud del mundo es el espíritu del hombre”.'
    reason: alternative_reading
lexical_decisions:
- source_word: Syriac root for govern/administer (behind English “ruler/administrator”)
  english_pob_choice: ruler / administrator
  chosen_spanish: gobernante
  alternatives_spanish:
  - regente
  - administrador
  - señor
  lexicon: governar / regir
  rationale: El audit trail inglés corrigió una lectura anterior errónea y consolidó la idea de gobierno/administración. En español, “gobernante” comunica autoridad y función de mando sin sonar tan técnico como “administrador” ni cargar matiz feudal como “señor”.
- source_word: spirit of man
  english_pob_choice: spirit of man
  chosen_spanish: el espíritu del hombre
  alternatives_spanish:
  - el espíritu humano
  - el espíritu de la humanidad
  lexicon: espíritu
  rationale: Se conserva la estructura posesiva del original y la distinción antropológica. “Espíritu humano” sería posible, pero “el espíritu del hombre” refleja mejor el paralelo con el texto fuente y mantiene la tensión entre persona humana y su espíritu.
- source_word: world
  english_pob_choice: world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra
  - la creación
  lexicon: mundo
  rationale: “Mundo” es la equivalencia directa y mantiene la amplitud del dominio referido en el contexto. Otras opciones reducirían el alcance más de lo que el texto permite.
- source_word: what belongs to it
  english_pob_choice: what belongs to it
  chosen_spanish: lo que le pertenece
  alternatives_spanish:
  - lo que es suyo
  - sus cosas
  lexicon: pertenecer
  rationale: La frase expresa posesión o incumbencia de manera natural en español. “Lo que es suyo” también es posible, pero “lo que le pertenece” conserva la referencia indeterminada del original y su tono formal.
theological_decisions:
- issue: El sujeto humano como regente del mundo
  english_pob_reading: For the spirit of man is the ruler of the world
  chosen_spanish_reading: Porque el espíritu del hombre es el gobernante del mundo
  alternative_spanish_readings:
  - Porque el espíritu del hombre gobierna el mundo
  - Porque el espíritu del hombre es administrador del mundo
  rationale: El verso atribuye al espíritu humano una función de gobierno respecto del mundo. “Gobernante” conserva el matiz de autoridad derivado del contexto y evita suavizarlo a una mera capacidad abstracta.
  doctrine_reference: Antropología bíblica / mayordomía humana en la creación
- issue: Ignorancia humana sobre lo que le pertenece
  english_pob_reading: yet they do not know what belongs to it
  chosen_spanish_reading: y ellos no saben lo que le pertenece
  alternative_spanish_readings:
  - y no saben lo que es suyo
  - y no conocen sus cosas
  rationale: Se mantiene la afirmación de ignorancia real respecto de aquello que corresponde al ámbito humano o al espíritu mismo. No se explicita más allá de lo que el verso afirma.
  doctrine_reference: Limitación del conocimiento humano
translation_notes:
  revision_awareness: 'Se tomó en cuenta la cadena de revisiones inglesas: una lectura previa oscura fue descartada en favor de una interpretación de gobierno/administración, y luego se normalizó a “ruler”. La versión española sigue esa línea semántica y evita reproducir la lectura errónea anterior.'
  spanish_consistency_notes:
  - Se usa “espíritu” en sentido antropológico, no como Espíritu Santo.
  - Se mantiene “mundo” sin ampliar a “creación”, porque el contexto no exige esa especificación.
  - La nota alternativa preserva la tensión interpretativa documentada por el audit trail inglés.
