  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Adán», «hijos de los hombres» y «vanidad» son coherentes con el expediente. La decisión de mantener la fórmula semítica es apropiada. No se requieren ajustes teológicos ni terminológicos mayores.
