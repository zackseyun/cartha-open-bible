  source_alignment_summary: 'El borrador español sigue bien el sentido global del siríaco y del POB inglés: conserva el conector inferencial, el sujeto genérico, la observación sobre los hijos de los hombres y el giro restrictivo «nothing but». Sin embargo, hay dos problemas de alineación auditiva: (1) la nota [b] está anclada en «pocos», pero su contenido corresponde a la cláusula final «no eran sino la vanidad de Adán»; (2) «eran pocos» estrecha un poco el valor de «were not many», que en español se refleja mejor como «no eran muchos».'
