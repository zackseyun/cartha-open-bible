translation:
  language: es
  text: Porque, si solo se diera esta vida a los seres humanos, nada sería más amargo que esto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: '"this life"'
  english_pob_choice: this life
  chosen_spanish: '"esta vida"'
  alternatives_spanish:
  - '"la vida presente"'
  - '"esta vida terrenal"'
  lexicon: contextual phrase
  rationale: Se conserva la referencia de proximidad de "this" y el sustantivo concreto "life" sin ampliar más allá del texto. "Esta vida" es natural y fiel en español; las alternativas añaden especificación no exigida por el fuente.
- source_word: '"human beings"'
  english_pob_choice: human beings
  chosen_spanish: '"los seres humanos"'
  alternatives_spanish:
  - '"los hombres"'
  - '"la humanidad"'
  lexicon: anthrōpoi / generic human reference
  rationale: El inglés revisado sustituyó "sons of men" por una formulación natural y genérica. "Seres humanos" preserva el valor inclusivo y evita un calco masculino que en español podría sonar más restrictivo o idiomático.
- source_word: '"alone / only"'
  english_pob_choice: life alone
  chosen_spanish: '"sola"'
  alternatives_spanish:
  - '"solamente"'
  - '"únicamente"'
  lexicon: exclusive particle
  rationale: '"Sola" reproduce de forma natural la exclusividad de la vida presente como única dada. En español, la colocación adjetival mantiene el énfasis sin introducir una glosa adverbial pesada.'
- source_word: '"more bitter"'
  english_pob_choice: more bitter
  chosen_spanish: '"más amargo"'
  alternatives_spanish:
  - '"más cruel"'
  - '"más doloroso"'
  lexicon: taste/affective metaphor
  rationale: Se conserva la metáfora gustativa del original y del inglés POB. "Amargo" comunica bien la idea de una experiencia intolerable o penosa sin desdibujar la imagen.
theological_decisions:
- issue: Condición hipotética sobre la vida presente como único don concedido
  english_pob_reading: For if this life alone were given to human beings...
  chosen_spanish_reading: Porque, si esta vida sola fuera dada a los seres humanos...
  alternative_spanish_readings:
  - Porque, si solo se diera esta vida a los seres humanos...
  - Porque, si esta vida únicamente les fuera dada a los seres humanos...
  rationale: La cláusula condicional se mantiene en modo hipotético, como en el inglés revisado. No se convierte en afirmación directa ni se añade inferencia doctrinal; la frase conserva su fuerza argumentativa sobre la insuficiencia de una vida limitada.
  doctrine_reference: Sabiduría/antropología bíblica sobre la vida presente y la esperanza más allá de ella; no implica una formulación dogmática añadida.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, especialmente la normalización de "sons of men" a una expresión más natural y neutral. No se introdujeron notas porque el verso no presenta una variante textual o ambigüedad lexical que requiera anotación adicional en español.
  spanish_consistency_notes:
  - Se mantiene "esta vida" como equivalente principal de "this life" para coherencia con pasajes afines.
  - '"Seres humanos" se usa como referente genérico inclusivo, evitando masculinizar innecesariamente una expresión antropológica general.'
  - Se preserva el tono sentencioso y comparativo del versículo sin expandirlo con interpretaciones sobre el sufrimiento o la mortalidad que no están explícitas en el texto.
