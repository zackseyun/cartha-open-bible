translation:
  language: es
  text: Que se vea tu gloria, y que se conozca la grandeza de tu bondad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: glory
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: glory
  rationale: «Gloria» es el equivalente natural y reverente en español para el término de la fuente y conserva la idea de manifestación visible de la majestuosidad divina sin añadir explicaciones ajenas al texto.
- source_word: goodness
  english_pob_choice: goodness
  chosen_spanish: bondad
  alternatives_spanish:
  - benevolencia
  - bondad benevolente
  lexicon: goodness
  rationale: «Bondad» comunica de forma directa la cualidad moral y benéfica expresada por la fuente. «Benevolencia» sería más interpretativo y menos natural en esta petición poética.
- source_word: greatness
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - magnitud
  - grandeza
  lexicon: greatness
  rationale: «Grandeza» reproduce bien la idea de amplitud o excelsitud de la bondad y mantiene el paralelismo poético con «gloria».
- source_word: let ... be seen / let ... be known
  english_pob_choice: Let ... be seen / let ... be known
  chosen_spanish: Que se vea ... y que se conozca ...
  alternatives_spanish:
  - Hágase visible ... y hágase conocido ...
  - Sea vista ... y sea conocida ...
  lexicon: let imperative optative
  rationale: La construcción con «Que» expresa adecuadamente el valor optativo/jussivo del original y suena natural en español bíblico contemporáneo sin volverla mecánica.
theological_decisions:
- issue: Manifestación de la gloria divina en lenguaje optativo
  english_pob_reading: Let your glory be seen, and let the greatness of your goodness be known.
  chosen_spanish_reading: Que se vea tu gloria, y que se conozca la grandeza de tu bondad.
  alternative_spanish_readings:
  - Que sea vista tu gloria, y que sea conocida la grandeza de tu bondad.
  - Haz que se vea tu gloria, y haz que se conozca la grandeza de tu bondad.
  rationale: La línea conserva el deseo dirigido a Dios de que su gloria se manifieste públicamente y de que su bondad sea reconocida. No se introduce un mandato fuerte ni una paráfrasis devocional; se mantiene el tono de súplica poética de la fuente.
  doctrine_reference: Teología bíblica de la revelación de la gloria de Dios y de la bondad divina en petición litúrgica
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta notas ni revisiones relevantes; el control cruzado indica alto acuerdo y no hubo cambios necesarios. La redacción española sigue de cerca la sintaxis optativa de la fuente y no introduce matices textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente en segunda persona singular («tu») por coherencia con la súplica directa al destinatario divino.
  - No se emplea «Señor» ni sustitución litúrgica porque el verso no contiene el nombre divino ni un título que requiera ese recurso.
  - La frase conserva paralelismo semántico y ritmo breve, aptos para un texto poético-litúrgico.
