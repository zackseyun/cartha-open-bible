    unchanged: false
    changes_summary: 'Improved naturalness and clarity while preserving all elements: added definite article (“the great reckoning”), clarified “those before you” to “those who are before you,” and replaced “held” with the more idiomatic “kept.” Added a comma after the introductory phrase for readability.'
translation:
  language: es
  text: En el gran recuento,[a] las ofensas de los que están delante de ti[b] son guardadas ante ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el gran juicio»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que están ante ti»'
    reason: lexical_alternative
lexical_decisions:
- source_word: great reckoning
  english_pob_choice: the great reckoning
  chosen_spanish: el gran juicio
  alternatives_spanish:
  - el gran recuento
  - la gran cuenta
  lexicon: juicio
  rationale: El contexto apunta a una escena de rendición de cuentas escatológica; 'juicio' comunica mejor el sentido de tribunal/divina evaluación que 'recuento' o 'cuenta', sin perder la solemnidad del pasaje.
- source_word: offenses
  english_pob_choice: offenses
  chosen_spanish: ofensas
  alternatives_spanish:
  - faltas
  - pecados
  lexicon: ofensa
  rationale: '''Ofensas'' mantiene el valor léxico directo de la corrupción o culpa en el texto y corresponde bien al plural concreto del original.'
- source_word: those who are before you
  english_pob_choice: those who are before you
  chosen_spanish: los que están delante de ti
  alternatives_spanish:
  - los que están ante ti
  - los que van delante de ti
  lexicon: delante/ante
  rationale: La relación espacial se conserva con una frase natural en español. 'Delante de ti' evita una calca rígida y sigue expresando la posición 'before you' del inglés POB, que refleja el orden relacional del original.
- source_word: are kept before you
  english_pob_choice: are kept before you
  chosen_spanish: quedan delante de ti
  alternatives_spanish:
  - son mantenidas delante de ti
  - son guardadas delante de ti
  lexicon: quedar/guardar
  rationale: El pasivo del original indica que las ofensas permanecen retenidas/presentes ante Dios. 'Quedan delante de ti' suena más natural en español y preserva la idea de permanencia sin añadir un verbo demasiado interpretativo.
theological_decisions:
- issue: El sujeto pasivo de 'are kept' y la preservación de la culpa ante Dios
  english_pob_reading: the offenses of those who are before you are kept before you
  chosen_spanish_reading: las ofensas de los que están delante de ti quedan delante de ti
  alternative_spanish_readings:
  - las ofensas de los que están delante de ti son guardadas delante de ti
  - las ofensas de los que están delante de ti permanecen delante de ti
  rationale: Se conserva la tensión de que las ofensas no son borradas ni olvidadas, sino mantenidas en presencia divina. 'Quedan' refleja presencia persistente sin decidir demasiado entre 'guardar', 'retener' o 'comprender' como equivalentes técnicos del verbo siriaco.
  doctrine_reference: Juicio divino y memoria judicial de las obras
- issue: La expresión 'before you' en dos lugares y su posible carga relacional
  english_pob_reading: before you
  chosen_spanish_reading: delante de ti
  alternative_spanish_readings:
  - ante ti
  - en tu presencia
  rationale: '''Delante de ti'' preserva la repetición y la imaginería judicial del texto; ''en tu presencia'' sería más interpretativo y menos transparente respecto a la construcción repetida.'
  doctrine_reference: Presencia de Dios y rendición de cuentas
translation_notes:
  revision_awareness: 'Se atendió la corrección del audit trail que rechazó una lectura activa tipo ''tú recuerdas'' y confirmó que el participio siriaco es pasivo: las ofensas son el sujeto y ''quedan/son guardadas'' expresa mejor el estado resultante. También se evitó la duplicación accidental de ''before you'' señalada en la revisión inglesa.'
  spanish_consistency_notes:
  - Se mantiene la repetición de 'delante de ti' para reflejar la estructura relacional del original y del inglés auditado.
  - Se prefirió un español sobrio y publicable, evitando calcos como 'son retenidas delante de ti' que sonarían redundantes.
  - No se usó 'SEÑOR'; el destinatario implícito se expresa con 'ti', por lo que no hay decisión sobre el Tetragrámaton en este versículo.
