revisions:
- from: En el gran juicio[a], las ofensas de los que están delante de ti[b] quedan delante de ti.
  to: En el gran recuento,[a] las ofensas de los que están delante de ti[b] son guardadas ante ti.
  rationale: Se sustituye 'juicio' por 'recuento' para seguir más de cerca 'reckoning' y la evidencia auditada, dejando 'juicio' como alternativa. Se cambia 'quedan delante de ti' por 'son guardadas ante ti' para reflejar mejor el pasivo de preservación/memoria judicial del original y del inglés POB actual. Se mantiene la repetición de la referencia espacial con una leve mejora estilística final ('ante ti').
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:11:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del siriaco auditado: un sintagma inicial temporal/circunstancial (''en el gran...''), luego ''las ofensas de los que están delante de ti'', y finalmente una predicación pasiva de permanencia/preservación ''quedan delante de ti''. Sin embargo, ''juicio'' introduce una interpretación más estrecha que el inglés POB documentado (''reckoning'') y que la nota alternativa ya reconoce; el sentido principal parece ser rendición de cuentas/recuento más que tribunal formal. Además, para el verbo final, ''quedan'' es comprensible pero atenúa la idea de que las ofensas son mantenidas/preservadas ante Dios, que el inglés actual expresa con ''are kept before you''.'
  spanish_quality_summary: El español es legible y digno, pero 'quedan delante de ti' suena algo flojo y menos preciso que 'son guardadas' o 'se mantienen'. 'Delante de ti' funciona, aunque 'ante ti' sería más natural en registro bíblico-jurídico; no obstante, la opción actual sigue siendo aceptable. La revisión propuesta mejora precisión semántica y mantiene naturalidad.
  glossary_alignment: 'No hay términos del glosario mayor en juego salvo el tratamiento reverente de la segunda persona. La decisión problemática es léxica: ''great reckoning'' se alinea mejor con ''gran recuento'' o ''gran rendición de cuentas'' que con ''gran juicio''. ''Offenses'' -> ''ofensas'' está bien. La repetición de ''before you'' se preserva adecuadamente.'
  issues:
  - severity: medium
    issue: '''el gran juicio'' sobretraduce ''the great reckoning'''
    rationale: El audit trail inglés distingue 'reckoning' y preserva 'recounting/accounting' como alternativa; 'juicio' mueve el sentido hacia tribunal/veredicto y reduce la amplitud de 'rendición de cuentas'.
  - severity: medium
    issue: '''quedan delante de ti'' debilita el pasivo de preservación'
    rationale: El siriaco fue revisado explícitamente de una lectura activa ('you remember') a una pasiva ('are held/kept before you'). 'Quedan' expresa estado resultante, pero menos claramente que 'son guardadas ante ti' o 'se mantienen ante ti'.
  revised_spanish_text: En el gran recuento,[a] las ofensas de los que están delante de ti[b] son guardadas ante ti.
  revised_footnotes:
  - marker: a
    text: 'O: «en el gran juicio»'
    reason: lexical_alternative
