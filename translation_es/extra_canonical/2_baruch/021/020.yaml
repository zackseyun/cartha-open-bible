    changes_summary: Added commas to clarify the causal clause and changed “dwelling” to “dwelling place” for natural English while preserving meaning.
translation:
  language: es
  text: Y vi que, a causa de un solo hombre, llegaron a existir los que viven, y también la morada de los que han de venir.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: one man
  english_pob_choice: one man
  chosen_spanish: un solo hombre
  alternatives_spanish:
  - un hombre
  - un único hombre
  lexicon: n/a
  rationale: Mantiene la idea causal singular del texto fuente y conserva la fuerza de 'one' como énfasis en un individuo específico, sin añadir interpretación adicional.
- source_word: those who live
  english_pob_choice: those who live
  chosen_spanish: los que viven
  alternatives_spanish:
  - los vivientes
  - los que viven ahora
  lexicon: n/a
  rationale: Refleja de manera natural la frase participial con valor sustantivo, sin forzar una abstracción que no está explícita en el fuente.
- source_word: came to be
  english_pob_choice: came to be
  chosen_spanish: llegaron a existir
  alternatives_spanish:
  - vinieron a ser
  - fueron hechos existir
  lexicon: n/a
  rationale: Expresa el sentido de surgimiento/existencia sin introducir una voz pasiva más fuerte de la que el contexto exige.
- source_word: dwelling place
  english_pob_choice: dwelling place
  chosen_spanish: morada
  alternatives_spanish:
  - lugar de morada
  - habitación
  - vivienda
  lexicon: n/a
  rationale: '''Morada'' conserva el tono bíblico y el sentido de lugar habitado; en español es más natural que una calca como ''lugar de habitación''.'
- source_word: those who are to come
  english_pob_choice: those who are to come
  chosen_spanish: los que han de venir
  alternatives_spanish:
  - los venideros
  - los que vendrán
  lexicon: n/a
  rationale: Mantiene el valor futurivo y la referencia a personas por venir, con una formulación idiomática y sobria en español.
theological_decisions:
- issue: Relación causal entre el hombre singular y la humanidad posterior
  english_pob_reading: because of one man, those who live came to be
  chosen_spanish_reading: a causa de un solo hombre, llegaron a existir los que viven
  alternative_spanish_readings:
  - por un solo hombre, llegaron a existir los que viven
  - debido a un solo hombre, existieron los que viven
  rationale: El español conserva la causalidad explícita del texto y evita suavizar la conexión antropológica del pasaje. 'A causa de' reproduce el peso explicativo sin añadir interpretación doctrinal extra.
  doctrine_reference: Antropología bíblica / causalidad histórica en la literatura apocalíptica
- issue: La frase paralela sobre la 'morada' de los venideros
  english_pob_reading: and also the dwelling place of those who are to come
  chosen_spanish_reading: y también la morada de los que han de venir
  alternative_spanish_readings:
  - y también el lugar de morada de los que han de venir
  - y también la vivienda de los que vendrán
  rationale: Se conserva la paralelidad del miembro final y sugiere, sin explicitar más de la cuenta, que se trata de un ámbito o destino preparado para los futuros venideros.
  doctrine_reference: Escatología / destino de los venideros
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, especialmente la puntuación que aclara la cláusula causal y la expansión de 'dwelling' a 'dwelling place'. En español, 'morada' ya expresa naturalmente esa expansión, por lo que no requiere nota aparte.
  spanish_consistency_notes:
  - Se usa 'Dios' no aplica aquí; no aparece el Tetragrámaton ni vocabulario cristológico.
  - Se evita 'Cristo'/'Mesías' porque no hay léxico correspondiente en este versículo.
  - Se mantiene un registro bíblico claro y sobrio, sin arcaísmos innecesarios.
  - No se introduce nota textual porque el paquete fuente muestra alto acuerdo y no hay variantes relevantes en el audit trail.
