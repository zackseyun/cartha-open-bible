revisions:
- from: Y porque el mundo fue creado para un tiempo, y los que en él están son sostenidos con mucho[a] trabajo[b], manda respecto al mal.
  to: Y porque el mundo fue creado [a]por un tiempo, y los que están en él son sostenidos con mucha aflicción[b], manda respecto al mal.
  rationale: Se cambia «para un tiempo» por «por un tiempo» para lograr español natural sin perder la temporalidad limitada del original, conservando la alternativa en nota. Se reemplaza «mucho trabajo» por «mucha aflicción» para reflejar mejor el sentido de penuria/trouble del siríaco auditado. También se alisa la sintaxis a «los que están en él» y se corrige la colocación del marcador de nota [a]. El cierre abrupto «manda respecto al mal» puede mantenerse porque reproduce la ambigüedad y el encabalgamiento del texto auditado.
