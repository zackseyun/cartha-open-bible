translation:
  language: es
  text: Y porque el mundo fue creado [a]por un tiempo, y los que están en él son sostenidos con mucha aflicción[b], manda respecto al mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para un tiempo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «afán» o «fatiga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: world
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra
  - este mundo
  lexicon: κόσμος / ܥܠܡܐ (conceptual world-order / inhabited world)
  rationale: ‘Mundo’ conserva el sentido amplio de la esfera creada y transitoria. ‘La tierra’ estrecha demasiado el referente, y ‘este mundo’ introduce énfasis no explicitado por el texto.
- source_word: for a time
  english_pob_choice: for a time
  chosen_spanish: para un tiempo
  alternatives_spanish:
  - por un tiempo
  - para tiempo
  lexicon: זְמַן / temporal limitation
  rationale: La frase marca temporalidad limitada. ‘Para un tiempo’ sigue de cerca la estructura y mantiene la idea de provisionalidad; ‘por un tiempo’ también es posible, pero ‘para un tiempo’ refleja mejor la construcción del original y el auditable ‘for a time’ del inglés revisado.
- source_word: those in it
  english_pob_choice: those in it
  chosen_spanish: los que en él están
  alternatives_spanish:
  - los que están en él
  - sus habitantes
  lexicon: referencia interna a los habitantes del mundo
  rationale: La perífrasis evita ambigüedad y conserva la referencia inclusiva del inglés auditado sin añadir un término interpretativo como ‘habitantes’.
- source_word: sustained with much trouble
  english_pob_choice: sustained with much trouble
  chosen_spanish: son sostenidos con mucho trabajo
  alternatives_spanish:
  - son sustentados con mucho afán
  - son mantenidos con mucho esfuerzo
  - son sostenidos con gran fatiga
  lexicon: ܥܡܠܐ / labor, toil, trouble
  rationale: ‘Trabajo’ en español puede expresar labor penosa o afanosa, y mantiene la conexión semántica con ‘trouble/toil’. Se evita ‘sustentados’ como forma más eclesiástica y menos natural en este contexto; ‘fatiga’ o ‘afán’ son posibles, pero ‘trabajo’ conserva mejor la tensión entre sostenimiento y penuria.
- source_word: command concerning evil
  english_pob_choice: command concerning evil
  chosen_spanish: manda respecto al mal
  alternatives_spanish:
  - ordena acerca del mal
  - da mandato sobre el mal
  - manda contra el mal
  lexicon: imperative / directive
  rationale: 'El giro español reproduce la ambigüedad del inglés: puede ser una orden ‘respecto al’ tema del mal, o una orden ‘contra’ el mal. ‘Respecto al’ preserva mejor la neutralidad del texto auditable sin resolver prematuramente la relación sintáctica.'
theological_decisions:
- issue: Temporalidad de la creación
  english_pob_reading: the world was created for a time
  chosen_spanish_reading: el mundo fue creado para un tiempo
  alternative_spanish_readings:
  - el mundo fue creado por un tiempo
  - el mundo fue creado temporalmente
  rationale: La formulación expresa que la creación presente no es definitiva sino limitada. Se evita ‘temporalmente’ por sonar más interpretativo; la traducción mantiene la tensión escatológica sin desarrollarla más allá del texto.
  doctrine_reference: escatología de la creación temporal y transitoria
- issue: Tensión sintáctica del cierre
  english_pob_reading: command concerning evil
  chosen_spanish_reading: manda respecto al mal
  alternative_spanish_readings:
  - ordena contra el mal
  - manda acerca del mal
  rationale: El final abrupto se conserva sin fabricar una cláusula explicativa. Dado que el inglés revisado también mantiene el cierre abierto, el español no debe resolverlo artificialmente.
  doctrine_reference: respeto a la forma textual y al encabalgamiento versicular
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés auditado: ‘for a time’ y ‘those in it are sustained with much trouble’, evitando repetir el error anterior que dejaba ‘much’ sin sustantivo y manteniendo el final abrupto de la unidad textual.'
  spanish_consistency_notes:
  - Se usa ‘mundo’ para el ámbito creado y transitorio, coherente con el registro bíblico general del proyecto.
  - Se evita ‘Cristo’, ‘SEÑOR’ o equivalentes no presentes en el pasaje.
  - ‘Mucho trabajo’ se entiende en sentido de labor penosa, no de mera actividad; por eso se ofrece ‘afán’/‘fatiga’ como alternativas.
  - La puntuación conserva la apertura del cierre versicular sin añadir una subordinada inexistente.
