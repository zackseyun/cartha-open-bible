  text: Ven lo que es, pero no lo que ha de ser.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܗܘܐ / ܕܐܝܬ (what is)
  english_pob_choice: what is
  chosen_spanish: lo que es
  alternatives_spanish:
  - lo existente
  - lo que existe
  lexicon: existencia / estado presente
  rationale: El inglés POB revisó ‘what exists’ a ‘what is’ para mayor naturalidad sin perder el contraste. En español, ‘lo que es’ conserva el valor breve y abierto del original, sin introducir una formulación más explicativa de lo que el texto permite.
- source_word: ܕܗܘܐ (what is to be)
  english_pob_choice: what is to be
  chosen_spanish: lo que ha de ser
  alternatives_spanish:
  - lo que será
  - lo que vendrá a ser
  lexicon: futuro / devenir
  rationale: ‘Ha de ser’ comunica bien el matiz de futuro determinado o por venir y mantiene el paralelismo con ‘lo que es’. ‘Lo que será’ sería posible, pero suena más lineal y menos matizado respecto del futuro implícito.
theological_decisions:
- issue: Contraste entre presente visible y futuro no visible
  english_pob_reading: They see what is, but not what is to be.
  chosen_spanish_reading: Ven lo que es, pero no lo que ha de ser.
  alternative_spanish_readings:
  - Ven lo que es, pero no lo que será.
  rationale: No hay aquí una carga doctrinal técnica, sino una observación sapiencial sobre el límite de la percepción humana. La traducción conserva el contraste temporal y epistemológico sin ampliar el sentido hacia predicción específica.
  doctrine_reference: Epistemología bíblica / limitación humana
- issue: Valor impersonal de ‘they’
  english_pob_reading: They see...
  chosen_spanish_reading: Ven...
  alternative_spanish_readings:
  - Ellos ven...
  rationale: El sujeto plural es genérico en el enunciado inglés y no requiere un pronombre explícito en español. Omitir ‘ellos’ preserva la concisión y evita forzar una referencia personal no indicada por el texto.
  doctrine_reference: Estilo bíblico general
translation_notes:
  revision_awareness: La versión inglesa vigente pasó de ‘what exists’ a ‘what is’ para mejorar la naturalidad manteniendo el sentido. La redacción española sigue esa corrección y conserva el paralelismo breve del verso.
  spanish_consistency_notes:
  - Se mantiene ‘lo que es’ para el presente y ‘lo que ha de ser’ para el futuro, evitando introducir vocabulario interpretativo como ‘existencia’ o ‘destino’.
  - No se añade nota textual porque el material fuente y el audit trail no registran variantes ni tensiones léxicas que exijan una glosa visible.
