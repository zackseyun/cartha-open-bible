translation:
  language: es
  text: Y me alejé de allí y me senté en el valle de Cedrón, en una cueva de la tierra. Y allí santifiqué mi alma. No comí pan, y no tuve hambre; y no bebí agua, y no tuve sed. Y permanecí allí hasta el séptimo día, como me lo había mandado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܢܚܠܐ / valley of Kidron
  english_pob_choice: valley of Kidron
  chosen_spanish: valle de Cedrón
  alternatives_spanish:
  - torrente de Cedrón
  - arroyo de Cedrón
  lexicon: Bible Atlas / toponymic usage
  rationale: El contexto geográfico en español se expresa de manera natural como 'valle de Cedrón'; evita una imagen hidráulica que el control textual revisado no exige y mantiene el topónimo bíblico reconocible.
- source_word: ܡܥܪܬܐ / cave of the earth
  english_pob_choice: cave of the earth
  chosen_spanish: cueva de la tierra
  alternatives_spanish:
  - caverna de la tierra
  - cueva subterránea
  lexicon: Payne Smith
  rationale: Se conserva la duplicación imagética del siriaco, que no es solo una cueva genérica sino una 'cueva de la tierra'. 'Cueva de la tierra' suena algo más literal y preserva el matiz ascético y sepulcral.
- source_word: ܩܕܫ / sanctified
  english_pob_choice: sanctified
  chosen_spanish: santifiqué
  alternatives_spanish:
  - consagré
  - purifiqué
  lexicon: Syriac usage + biblical Spanish
  rationale: El verbo expresa una acción deliberada de apartamiento/consagración de la persona en contexto de ayuno y retiro. 'Santifiqué' mantiene el registro bíblico sin forzar una explicación adicional.
- source_word: ܠܥܡܠܡ / until the seventh day
  english_pob_choice: until the seventh day
  chosen_spanish: hasta el séptimo día
  alternatives_spanish:
  - hasta el día séptimo
  - hasta que llegó el séptimo día
  lexicon: Spanish temporal phrasing
  rationale: La expresión es transparente y fiel al orden temporal del siriaco. No requiere nota adicional porque el sentido literal queda claro en español.
theological_decisions:
- issue: Ascetismo como preparación profética
  english_pob_reading: Baruch withdraws, fasts, and remains in a consecrated state until the commanded seventh day.
  chosen_spanish_reading: Baruc se retira, ayuna y permanece consagrado hasta el séptimo día mandado.
  alternative_spanish_readings:
  - Baruc se purifica
  - Baruc se dedica a la oración
  rationale: El versículo presenta un retiro ascético concreto, no solo una devoción interior general. 'Santifiqué mi alma' conserva la disciplina de apartamiento sin suavizarla a una piedad genérica.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue la revisión aprobada que prefiere 'valley of Kidron' sobre una formulación más hidráulica. En español se refleja como 'valle de Cedrón', que conserva el ajuste geográfico y el topónimo bíblico. No se incorporan las secciones posteriores del capítulo porque el encargo se limita a 2 Baruc 21:1.
  spanish_consistency_notes:
  - Se mantiene 'Cedrón' como forma topográfica habitual en español bíblico.
  - Se evita 'SEÑOR' porque en este versículo el referente es la narración del retiro y no aparece el tetragrámaton.
  - 'La sintaxis reproduce las cinco acciones principales del versículo: alejarse, sentarse, santificar el alma, no comer/beber, permanecer hasta el día séptimo.'
