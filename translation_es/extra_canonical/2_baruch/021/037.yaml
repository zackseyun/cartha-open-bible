- from: Y los tesoros de las almas devuelvan a los que están encerrados en ellos, para que haya una reunión de los hijos de los hombres, como mandaste desde antiguo.
  to: Y que los depósitos de las almas devuelvan a los que están encerrados en ellos, para que haya una reunión de los hijos de los hombres, como mandaste desde antiguo.
  rationale: Se cambia solo ‘tesoros’ por ‘depósitos’ para reflejar mejor en español la idea de cámaras o lugares de resguardo de las almas, sin alterar la sintaxis ni la imagen básica del original. Se mantiene el resto porque ya refleja fielmente la revisión auditada del siríaco.
