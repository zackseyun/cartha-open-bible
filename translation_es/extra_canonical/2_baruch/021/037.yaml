    issue: ‘tesoros de las almas’ suena ambiguo en español
    rationale: Aunque calca la imagen del inglés, en español ‘tesoro’ suele sugerir riqueza más que depósito o cámara de resguardo. El contexto pide más claramente un lugar donde las almas están guardadas.
  - severity: low
    issue: ‘hijos de los hombres’ es una formulación algo pesada
    rationale: No es incorrecta, pero ‘hijos de la humanidad’ no sería fiel, y ‘seres humanos’ perdería la fórmula semítica. Puede mantenerse; la revisión principal no depende de este punto.
  revised_spanish_text: Y que los depósitos de las almas devuelvan a los que están encerrados en ellos, para que haya una reunión de los hijos de los hombres, como mandaste desde antiguo.
  revision_rationale: Se cambia solo ‘tesoros’ por ‘depósitos’ para reflejar mejor en español la idea de cámaras o lugares de resguardo de las almas, sin alterar la sintaxis ni la imagen básica del original. Se mantiene el resto porque ya refleja fielmente la revisión auditada del siríaco.
