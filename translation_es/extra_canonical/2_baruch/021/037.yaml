translation:
  language: es
  text: Y que los depósitos de las almas devuelvan a los que están encerrados en ellos, para que haya una reunión de los hijos de los hombres, como mandaste desde antiguo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: treasuries of the souls
  english_pob_choice: the treasuries of the souls
  chosen_spanish: los tesoros de las almas
  alternatives_spanish:
  - los depósitos de las almas
  - los reservorios de las almas
  lexicon: tesoros/depósitos para ܓܙܐ / ܡܐܢܐ según contexto
  rationale: ‘Tesoros’ conserva la imagen concreta del lugar que contiene almas, tal como la versión inglesa. ‘Almas’ mantiene el genitivo de pertenencia sin convertirlo en una abstracción doctrinal.
- source_word: restore
  english_pob_choice: restore
  chosen_spanish: devuelvan
  alternatives_spanish:
  - restauren
  - restituyan
  lexicon: devolver/restaurar para sentido de retorno de los cautivos
  rationale: En español, ‘devuelvan’ expresa con naturalidad el acto de sacar de su encierro y hacer regresar a los contenidos; evita una carga excesivamente teológica que ‘restauren’ podría sugerir aquí.
- source_word: those who are shut up in them
  english_pob_choice: those who are shut up in them
  chosen_spanish: a los que están encerrados en ellos
  alternatives_spanish:
  - a los que están aprisionados en ellos
  - a los cautivos que están en ellos
  lexicon: encerrar/estar encerrado para ܚܒܫ
  rationale: ‘Encerrados’ sigue de cerca la imagen de reclusión del siríaco sin añadir matices punitivos no requeridos por el contexto.
- source_word: a gathering
  english_pob_choice: a gathering
  chosen_spanish: una reunión
  alternatives_spanish:
  - un recogimiento
  - una asamblea
  lexicon: reunión/asamblea para ܟܢܘܫܝܐ
  rationale: ‘Reunión’ comunica el sustantivo de acción de manera clara y sobria; ‘asamblea’ podría sonar más institucional que el movimiento de congregación que aquí se describe.
- source_word: sons of men
  english_pob_choice: sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  lexicon: hijos de los hombres para ܒܢܝܢܫܐ
  rationale: Se conserva la fórmula semítica tradicional reflejada por la versión inglesa y adecuada al tono del libro.
- source_word: from of old
  english_pob_choice: from of old
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde tiempos antiguos
  - de antiguo
  lexicon: antiguo/antigüedad para ܡܢ ܩܕܡ
  rationale: ‘Desde antiguo’ es idiomático en español y preserva la idea de una orden previa y remota.
theological_decisions:
- issue: Cómo entender el movimiento de los contenidos de los ‘tesoros de las almas’
  english_pob_reading: restore those who are shut up in them, that there may be a gathering of the sons of men
  chosen_spanish_reading: devuelvan a los que están encerrados en ellos, para que haya una reunión de los hijos de los hombres
  alternative_spanish_readings:
  - restauren a los que están encerrados en ellos, para que haya una reunión de los hijos de los hombres
  - restituyan a los que están encerrados en ellos, para que haya una reunión de los hijos de los hombres
  rationale: La revisión auditada corrige la sintaxis para que ‘los tesoros de las almas’ sea el sujeto de ‘devuelvan’, y ‘para que haya una reunión...’ exprese correctamente la cláusula final. El español mantiene la tensión entre imagen cósmica y lenguaje de congregación sin explicitar más de lo que el siríaco requiere.
  doctrine_reference: No doctrinal interpolation; syntax and imagery follow the Syriac control-backed reading.
translation_notes:
  revision_awareness: 'The English audit trail records a prior mistranslation that attached ''sons of men'' to the wrong clause; the current Spanish follows the revised source-grounded syntax: subject = ''the treasuries of the souls'', verb = ''restore'', purpose clause = ''that there may be a gathering of the sons of men''.'
  spanish_consistency_notes:
  - Se mantiene ‘hijos de los hombres’ para conservar la fórmula semítica coherente con otros pasajes.
  - Se evita ‘SEÑOR’ y otras sustituciones porque no hay nombre divino en este verso.
  - ‘Almas’ se conserva literal para no reducir el alcance antropológico del siríaco.
