lexical_decisions:
- source_word: “his kingdom”
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - el reino de él
  - su dominio
  lexicon: 'Syriac control-backed corpus: possessive + realm/kingship sense'
  rationale: «Reino» comunica de manera natural la esfera de gobierno sin añadir matices ajenos. El posesivo «su» conserva la referencia al gobernante del contexto sin forzar una paráfrasis.
- source_word: “the death of the sons of men”
  english_pob_choice: the death of the sons of men
  chosen_spanish: la muerte de los hijos de los hombres
  alternatives_spanish:
  - la muerte de los seres humanos
  - la mortalidad de los hijos de los hombres
  lexicon: Syriac noun phrase with human-collective genitive
  rationale: Se conserva la imagen semítica «hijos de los hombres» porque el texto la usa con valor humano-colectivo. «Muerte» mantiene la afirmación concreta del pasaje sin suavizarla a una abstracción como «mortalidad».
- source_word: “what truly exists”
  english_pob_choice: what truly exists
  chosen_spanish: qué es lo que verdaderamente existe
  alternatives_spanish:
  - qué verdaderamente existe
  - qué es lo que realmente existe
  lexicon: interrogative existential clause
  rationale: La revisión inglesa corrigió la torpeza de «what is there that truly is» hacia una pregunta más natural. En español, «qué es lo que verdaderamente existe» preserva la fuerza filosófica y evita una calca rígida.
- source_word: “whose end is not known”
  english_pob_choice: whose end is not known
  chosen_spanish: de lo cual no se conoce el fin
  alternatives_spanish:
  - cuyo fin no se conoce
  - de quien no se conoce el fin
  lexicon: restrictive relative clause
  rationale: «De lo cual» mantiene la referencia no personal y amplia del original, donde la pregunta abarca cualquier realidad cuya consumación o término sea desconocido. «Cuyo fin» sería posible, pero en español puede sonar más cerrado o literario de un modo menos preciso aquí.
theological_decisions:
- issue: La afirmación de la mortalidad humana dentro del reino divino
  english_pob_reading: For in his kingdom the death of the sons of men is seen.
  chosen_spanish_reading: Porque en su reino se ve la muerte de los hijos de los hombres.
  alternative_spanish_readings:
  - Porque en su reino se observa la muerte de los seres humanos.
  - Porque en su reino se manifiesta la muerte de los hijos de los hombres.
  rationale: El texto no niega la realidad de la muerte; la presenta como algo visible dentro de ese reino. «Se ve» conserva la observación directa sin ampliar el contenido doctrinal más allá del enunciado.
  doctrine_reference: Anthropology / mortality; no doctrinal expansion beyond the source statement
- issue: La pregunta filosófica sobre la existencia y el fin
  english_pob_reading: And what truly exists whose end is not known?
  chosen_spanish_reading: ¿Y qué es lo que verdaderamente existe, de lo cual no se conoce el fin?
  alternative_spanish_readings:
  - ¿Y qué verdaderamente existe, cuyo fin no se conoce?
  - ¿Y qué es lo que realmente existe, y cuyo fin no se conoce?
  rationale: La formulación mantiene la tensión entre existencia real y límite desconocido, sin convertir la pregunta en una afirmación doctrinal sobre ontología. La pregunta retórica preserva el tono sapiencial del verso.
  doctrine_reference: Wisdom / philosophical anthropology; rhetorical question preserved
translation_notes:
  revision_awareness: El texto inglés fue revisado para suavizar la cláusula existencial («what truly exists») y para mejorar la puntuación de la relativa («exists whose end is not known»). La versión española sigue esa lectura revisada y la adapta a una sintaxis natural, manteniendo la pregunta retórica y el peso filosófico del original siriaco.
  spanish_consistency_notes:
  - Se mantiene «hijos de los hombres» por consistencia con el registro semítico y la carga antropológica del original.
  - Se evita «SEÑOR» y otras sustituciones convencionales porque el verso no contiene el Tetragrámaton ni una cita directa que lo exija.
  - La segunda pregunta queda con una estructura suficientemente amplia para no estrechar indebidamente el referente de «what truly exists».
