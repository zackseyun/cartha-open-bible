revisions:
- from: Y lo que permanece queda para lo que ha de ser hecho nuevo.
  to: Y lo conservado queda para lo que será hecho nuevo.
  rationale: Se sustituye 'lo que permanece' por 'lo conservado' para reflejar mejor el matiz de preservación presente en el inglés POB ('what is preserved'). Se mantiene 'queda para' por su buena adecuación teleológica. Se simplifica 'ha de ser hecho nuevo' a 'será hecho nuevo' para conservar la pasiva con mejor naturalidad en español.
  reviewer_model: gpt-5.4
