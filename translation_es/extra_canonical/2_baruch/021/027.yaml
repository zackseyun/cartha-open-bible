translation:
  language: es
  text: Y lo conservado queda para lo que será hecho nuevo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: syriac participial contrast equivalent to “what is preserved”
  english_pob_choice: what is preserved
  chosen_spanish: lo que permanece
  alternatives_spanish:
  - lo conservado
  - lo preservado
  - lo que es preservado
  lexicon: preservar / permanecer
  rationale: El inglés POB expresa una idea de continuidad y conservación. En español, “permanece” comunica con naturalidad la persistencia de aquello que no se pierde, sin introducir una pasiva innecesaria ni sonar artificial. Se mantiene la tensión entre conservación y continuidad temporal.
- source_word: equivalent to “remains for”
  english_pob_choice: remains for
  chosen_spanish: queda para
  alternatives_spanish:
  - permanece para
  - queda destinado a
  - subsiste para
  lexicon: quedar / permanecer
  rationale: '“Queda para” reproduce bien la orientación teleológica del enunciado: lo que permanece no se agota en sí mismo, sino que está reservado respecto de otra realidad futura. “Permanece para” sería comprensible, pero menos idiomático en español.'
- source_word: equivalent to “what is made new”
  english_pob_choice: what is made new
  chosen_spanish: lo que ha de ser hecho nuevo
  alternatives_spanish:
  - lo que será renovado
  - lo que es hecho nuevo
  - la nueva creación
  lexicon: hacer nuevo / renovar
  rationale: Se conserva la pasividad y el énfasis en que la novedad es realizada por otro agente, como sugiere el inglés POB. “Hecho nuevo” evita reemplazar el matiz por un término más interpretativo como “renovado” o “nueva creación”.
theological_decisions:
- issue: Relación entre lo que permanece y la novedad futura
  english_pob_reading: And what is preserved remains for what is made new.
  chosen_spanish_reading: Y lo que permanece queda para lo que ha de ser hecho nuevo.
  alternative_spanish_readings:
  - Y lo conservado queda para lo renovado.
  - Y lo que ha sido preservado permanece para lo nuevo.
  rationale: La frase mantiene una correspondencia escatológica o de transición entre una realidad preservada y otra futura hecha nueva, sin especificar más de lo que permite el texto. Se evita cargar “nuevo” con una teología adicional que el versículo, aislado, no explicita.
  doctrine_reference: Escatología / renovación final, sin ampliación doctrinal más allá del enunciado textual.
translation_notes:
  revision_awareness: El control de revisión indica que el texto inglés POB fue revisado y quedó sin cambios; por tanto, esta versión española sigue de cerca la formulación aprobada y no introduce variantes textuales adicionales.
  spanish_consistency_notes:
  - Se evita “SEÑOR” y otros términos no presentes en el verso.
  - Se mantiene un registro sobrio y publicable, con sintaxis breve y paralela al inglés POB.
  - No se añaden notas al pie porque el verso no presenta variantes textuales ni ambigüedades léxicas que requieran marcación explícita en español.
