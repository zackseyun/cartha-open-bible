review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del inglés POB: una realidad preservada/permanente que sigue existiendo con miras a una realidad futura hecha nueva. Sin embargo, ''lo que permanece'' desplaza levemente el matiz de ''what is preserved'' desde preservación hacia mera permanencia. También la secuencia ''permanece queda'' en dos verbos cercanos resulta algo redundante frente al paralelismo del original auditado.'
  spanish_quality_summary: El español es comprensible y digno, pero puede afinarse para mayor fidelidad y naturalidad. 'Lo preservado' suena algo técnico; 'lo conservado' expresa mejor la idea de algo guardado/preservado sin perder legibilidad. 'Ha de ser hecho nuevo' es fiel pero un poco pesado; 'será hecho nuevo' mantiene la pasiva y suena más natural en español bíblico contemporáneo.
  glossary_alignment: No hay términos de glosario mayor implicados. La revisión propuesta respeta la filosofía POB de no parafrasear y de conservar el matiz pasivo de 'made new'.
  issues:
  - severity: medium
    issue: '''lo que permanece'' no refleja con suficiente precisión ''what is preserved'''
    rationale: El inglés auditado distingue preservación de mera duración. 'Permanecer' enfatiza continuidad, pero no necesariamente el hecho de haber sido guardado o conservado.
  - severity: low
    issue: Redundancia estilística entre 'permanece' y 'queda'
    rationale: Aunque no es incorrecto, la combinación debilita la concisión sentenciosa del versículo.
  - severity: low
    issue: '''ha de ser hecho nuevo'' suena algo forzado'
    rationale: Preserva la pasiva, pero en español actual 'será hecho nuevo' resulta más limpio sin perder el sentido.
  revised_spanish_text: Y lo conservado queda para lo que será hecho nuevo.
  revision_rationale: Se sustituye 'lo que permanece' por 'lo conservado' para reflejar mejor el matiz de preservación presente en el inglés POB ('what is preserved'). Se mantiene 'queda para' por su buena adecuación teleológica. Se simplifica 'ha de ser hecho nuevo' a 'será hecho nuevo' para conservar la pasiva con mejor naturalidad en español.
