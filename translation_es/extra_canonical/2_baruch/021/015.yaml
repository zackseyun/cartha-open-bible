translation:
  language: es
  text: No decretas la lluvia ni el diluvio[a] sino a causa[b] del hombre pecador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hablas»; el sentido autoritativo del verbo permite ambas posibilidades, pero «decretas» expresa mejor aquí el acto eficaz.
    reason: lexical_alternative
  - marker: b
    text: O «con respecto a»; se prefiere «a causa de» porque el contexto indica motivo o razón, no solo tema.
    reason: lexical_alternative
lexical_decisions:
- source_word: '''emar / say, command'
  english_pob_choice: decree
  chosen_spanish: decretas
  alternatives_spanish:
  - mandas
  - pronuncias
  lexicon: N/A
  rationale: El contexto no es un hablar ordinario, sino un acto verbal con fuerza autoritativa sobre la lluvia y el diluvio. «Decretas» conserva ese valor de orden eficaz mejor que un simple «dices» y suena natural en español bíblico moderno.
- source_word: metul / on account of, because of
  english_pob_choice: on account of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - por causa de
  lexicon: N/A
  rationale: La preposición expresa motivo o razón, no tema. «A causa de» refleja con claridad la relación causal indicada por el syriaco y evita el matiz inadecuado de «con respecto a».
- source_word: sinful man
  english_pob_choice: sinful man
  chosen_spanish: el hombre pecador
  alternatives_spanish:
  - el ser humano pecador
  - el hombre en pecado
  lexicon: N/A
  rationale: «Hombre pecador» mantiene la fuerza moral de la expresión y funciona bien como categoría general. No se expande a «ser humano» porque el texto fuente y la tradición de la frase no obligan a neutralizar el sustantivo.
theological_decisions:
- issue: La relación entre el decreto divino y la culpa humana
  english_pob_reading: You do not decree rain and flood except on account of sinful man.
  chosen_spanish_reading: No decretas lluvia ni diluvio sino a causa del hombre pecador.
  alternative_spanish_readings:
  - No decretas lluvia ni diluvio excepto a causa del hombre pecador.
  - No decretas lluvia ni diluvio sino por el hombre pecador.
  rationale: 'Conservo la estructura exclusiva de la frase: la lluvia y el diluvio no se describen como actos arbitrarios, sino vinculados causalmente al pecado humano. «Sino a causa de» preserva tanto la exclusión como la razón subyacente.'
  doctrine_reference: Responsabilidad humana y juicio divino en lenguaje de retribución/castigo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantuvo el texto sin cambios; el par de ajustes previos («speak» > «decree» y «concerning» > «on account of») confirma una lectura de mandato eficaz y causalidad, que aquí se refleja con «decretas» y «a causa de».
  spanish_consistency_notes:
  - Se mantiene «diluvio» para flood, término bíblico claro y estable en español.
  - Se evita «SEÑOR» porque el versículo no contiene explícitamente el tetragrámaton en el material proporcionado.
  - La construcción negativa «No decretas... sino...» reproduce la exclusión del original sin sobreexplicarla.
