revisions:
- from: Sólo tú conoces el arreglo de los tiempos, sin vacilar.
  to: Solo tú conoces la disposición de los tiempos, sin vacilar.
  rationale: Se reemplaza 'arreglo' por 'disposición' para reflejar mejor el sentido de ordenamiento soberano de los tiempos documentado en la auditoría inglesa, manteniendo al mismo tiempo una expresión natural y digna en español. Se conserva 'sin vacilar' como equivalente idiomático aceptable de 'without being shaken'.
  reviewer_model: gpt-5.4
