lexical_decisions:
- source_word: times
  english_pob_choice: the times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - las épocas
  - los siglos
  lexicon: n/a
  rationale: Mantiene el sustantivo plural y el matiz apocalíptico de la secuencia histórica bajo control divino. 'Épocas' sería posible, pero 'tiempos' es más directo y cercano al inglés POB sin perder naturalidad.
- source_word: arrangement
  english_pob_choice: arrangement
  chosen_spanish: arreglo
  alternatives_spanish:
  - orden
  - disposición
  - decreto
  lexicon: n/a
  rationale: El inglés POB corrigió 'instruction' hacia la idea de orden/decreto. En español, 'arreglo' comunica 'arrangement' de forma natural y conserva la noción de disposición soberana sin cargar demasiado en un término técnico.
- source_word: without being shaken
  english_pob_choice: without being shaken
  chosen_spanish: sin vacilar
  alternatives_spanish:
  - sin ser sacudido
  - sin moverse
  lexicon: n/a
  rationale: La imagen de 'being shaken' expresa firmeza/inmutabilidad. 'Sin vacilar' conserva esa estabilidad en español con fluidez idiomática; 'sin ser sacudido' sería más literal, pero menos natural en este contexto.
theological_decisions:
- issue: Conocimiento exclusivo de Dios sobre el orden de la historia
  english_pob_reading: You alone know the arrangement of the times, without being shaken.
  chosen_spanish_reading: Sólo tú conoces el arreglo de los tiempos, sin vacilar.
  alternative_spanish_readings:
  - Sólo tú conoces el orden de los tiempos, sin vacilar.
  - Sólo tú conoces el decreto de los tiempos, sin vacilar.
  rationale: La frase atribuye a Dios conocimiento exclusivo del plan temporal y presenta ese orden como estable e inmutable. 'Arreglo' deja abierta la tensión entre 'orden' y 'decreto' que el audit trail preserva, sin forzar una elección dogmática donde el siriaco puede admitir más de una posibilidad léxica.
  doctrine_reference: Providencia divina; soberanía de Dios sobre los tiempos.
translation_notes:
  revision_awareness: El audit trail muestra una revisión de 'instruction' hacia 'decree/arrangement' y luego la consolidación en 'arrangement'; la versión española sigue esa decisión final y evita una traducción que sugiera 'instrucción'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' para el nombre divino porque este versículo no contiene el Tetragrámaton en la base aportada.
  - Se mantiene un registro sobrio y bíblico, con español moderno pero digno.
  - No se introduce 'Mesías', 'Cristo' ni otras terminologías no presentes en el verso.
