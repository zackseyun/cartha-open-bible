translation:
  language: es
  text: Tú, que has ordenado el aire con una seña y has visto las cosas que han de venir.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: d-pqdt
  english_pob_choice: have commanded
  chosen_spanish: has comandado
  alternatives_spanish:
  - has ordenado
  - has mandado
  lexicon: commandar
  rationale: El inglés POB mantiene el sentido fuerte de autoridad divina sobre el aire; en español, «comandar» comunica ese mando con dignidad y evita suavizarlo demasiado.
- source_word: l-a'r
  english_pob_choice: the air
  chosen_spanish: el aire
  alternatives_spanish:
  - el cielo
  - la atmósfera
  lexicon: aire
  rationale: Se conserva el referente literal del texto siríaco y la elección auditada del POB en inglés.
- source_word: b-rmz'
  english_pob_choice: by a nod
  chosen_spanish: con un gesto
  alternatives_spanish:
  - con un ademán
  - con un signo
  lexicon: gesto
  rationale: «Gesto» transmite el movimiento breve e intencional de un signo de autoridad; en español suena más natural que una calca rígida de «asentimiento» o «cabeceo» en este contexto.
- source_word: w-ḥzyt alyn d-'tydn
  english_pob_choice: have seen the things that are to come
  chosen_spanish: has visto las cosas que han de venir
  alternatives_spanish:
  - has visto lo que vendrá
  - has visto las cosas venideras
  lexicon: ver
  rationale: Se preserva la idea de una visión anticipada del futuro sin añadir la comparación explicativa que apareció en un borrador anterior en inglés y que fue retirada por no estar en el siríaco.
theological_decisions:
- issue: El sujeto está apostrofado directamente en segunda persona, con una confesión de conocimiento y poder divinos.
  english_pob_reading: You who have commanded the air by a nod and have seen the things that are to come.
  chosen_spanish_reading: Tú, que has comandado el aire con un gesto y has visto las cosas que han de venir.
  alternative_spanish_readings:
  - Tú, que has ordenado el aire con un gesto y has visto las cosas que han de venir.
  rationale: La línea mantiene la invocación reverente a Dios sin cambiarla a lenguaje litúrgico más tradicional. No se introduce «Señor» porque el verso, tal como está atestiguado, funciona como vocativo directo y no contiene el Tetragrámaton explícito en la forma fuente dada.
  doctrine_reference: 2 Baruc 21:5; vocativo de soberanía divina
- issue: La temporalidad futura debe quedar abierta sin sobreexplicar el alcance profético.
  english_pob_reading: the things that are to come
  chosen_spanish_reading: las cosas que han de venir
  alternative_spanish_readings:
  - las cosas futuras
  - lo que va a suceder
  rationale: «Han de venir» conserva el matiz de futuro previsto y mantiene la solemnidad del enunciado sin convertirlo en una paráfrasis interpretativa.
  doctrine_reference: 2 Baruc 21:5; visión profética
translation_notes:
  revision_awareness: La versión sigue la corrección de 2026-05-03 que eliminó la glosa ajena al siríaco («mis lágrimas… sueño…»). También evita la expansión anterior «como las cosas que estás haciendo», porque el texto revisado dejó simplemente «las cosas que han de venir».
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverente de segunda persona singular («Tú... has...»), coherente con la apelación directa del original.
  - No se usó «SEÑOR» como sustituto del nombre divino, porque el texto fuente aquí no lo exige y la política española pide «Yahvé» solo cuando el nombre aparece explícitamente.
  - Se prefirió una sintaxis española fluida pero cercana al orden del original, sin añadir contenido explicativo.
