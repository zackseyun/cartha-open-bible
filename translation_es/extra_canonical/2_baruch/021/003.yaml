- source_word: ܘܥܢܝܬ ܘܐܡܪܬ
  english_pob_choice: 'And I answered and said:'
  chosen_spanish: 'Y yo respondí y dije:'
  alternatives_spanish:
  - 'Y respondí y dije:'
  - 'Y contesté y dije:'
  lexicon: Respuesta/verbo de respuesta + decir
  rationale: El siriaco standard aquí expresa una fórmula narrativa de respuesta seguida de habla directa. «Respondí» conserva el valor de ܥܢܐ sin añadir contenido como «desde allí», que fue corregido en la revisión del POB inglés. «Dije» mantiene la fórmula bíblica directa y solemne.
translation_notes:
  revision_awareness: La evidencia revisada del texto siriaco apoya «And I answered and said»; la lectura anterior «And I said from there» fue corregida por mistranslation. La redacción española sigue la forma confirmada por el control textual y evita añadir cualquier matiz locativo no sustentado.
  spanish_consistency_notes:
  - Se conserva el orden retórico «respondí y dije» como fórmula narrativa bíblica natural en español.
  - No se introduce «allí/desde allí», porque la revisión textual la descartó como lectura errónea.
