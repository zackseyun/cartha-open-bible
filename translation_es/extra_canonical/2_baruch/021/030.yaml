translation:
  language: es
  text: para que la ruina del hombre no vuelva a aparecer como si el hombre no hubiera sido creado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: man's ruin
  english_pob_choice: man's ruin
  chosen_spanish: la ruina del hombre
  alternatives_spanish:
  - la destrucción del hombre
  - la ruina humana
  lexicon: ruina
  rationale: Conserva el sustantivo concreto de la ruina/destrucción sin suavizar el golpe semántico; 'del hombre' mantiene la referencia genérica de 'man' en el inglés POB, que aquí sigue al sujeto humano en general del siríaco.
- source_word: appear
  english_pob_choice: appear
  chosen_spanish: aparecer
  alternatives_spanish:
  - manifestarse
  - volverse a mostrar
  lexicon: aparecer
  rationale: '''Aparecer'' reproduce con naturalidad la idea de hacerse visible o presentarse de nuevo sin añadir interpretación extra.'
- source_word: as if he had not been created
  english_pob_choice: as if man had not been created
  chosen_spanish: como si el hombre no hubiera sido creado
  alternatives_spanish:
  - como si el hombre no hubiera existido
  - como si no hubiera sido creado
  lexicon: como si + pasiva
  rationale: Mantiene la comparación hipotética y la pasiva con 'haber sido creado', que expresa fielmente la noción de no haber llegado a ser creado.
theological_decisions:
- issue: La frase final expresa una negación de la creación del hombre en la comparación hipotética.
  english_pob_reading: as if man had not been created
  chosen_spanish_reading: como si el hombre no hubiera sido creado
  alternative_spanish_readings:
  - como si el hombre no hubiese sido creado
  - como si el hombre nunca hubiera sido creado
  rationale: 'La traducción conserva la fuerza teológica del contraste: la ruina del hombre no debe presentarse de tal modo que borre su creación. No se intensifica a ''nunca'' para no añadir énfasis no atestiguado.'
  doctrine_reference: Creación del ser humano y preservación de su creación frente a la ruina
translation_notes:
  revision_awareness: Tomé como base la última revisión inglesa que clarifica la ambigüedad pronominal, pero la redacción española evita el problema sin necesidad de notas, manteniendo la estructura causal-final y la comparación hipotética del texto fuente.
  spanish_consistency_notes:
  - Usé 'hombre' como término genérico, en continuidad con el inglés POB y con el sentido humano universal del pasaje.
  - Evité 'SEÑOR' u otras sustituciones no presentes, ya que este versículo no contiene un término divino explícito.
  - La sintaxis busca ser publicable y fiel al original sin reproducir las rarezas del inglés corregido.
