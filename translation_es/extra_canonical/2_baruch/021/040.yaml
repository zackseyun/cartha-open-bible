translation:
  language: es
  text: Y que nadie que reine y haya llegado a ser rey se gloríe ni se enorgullezca por la soberbia humana.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: no one who reigns and has become king
  english_pob_choice: no one who reigns and has become king
  chosen_spanish: nadie que reine y haya llegado a ser rey
  alternatives_spanish:
  - ninguno que reine y haya llegado a ser rey
  - nadie que reine, y que haya sido hecho rey
  lexicon: nadie / reinar / llegar a ser rey
  rationale: El sintagma apunta a una persona concreta con ejercicio de poder real, por lo que 'nadie' es más natural que un literal 'ninguno'. 'Haya llegado a ser rey' conserva el valor de estado adquirido sin imponer una fórmula más interpretativa como 'ser hecho rey'.
- source_word: boast
  english_pob_choice: boast
  chosen_spanish: se gloríe
  alternatives_spanish:
  - se jacte
  - presuma
  lexicon: gloriarse / jactarse
  rationale: '''Gloriarse'' comunica con claridad el sentido de jactancia orgulllosa y mantiene un registro bíblico digno. ''Jactarse'' sería posible, pero suena más coloquial; ''presuma'' podría desplazar el matiz a mera vanidad.'
- source_word: grow proud
  english_pob_choice: grow proud
  chosen_spanish: se engrandezca
  alternatives_spanish:
  - se enorgullezca
  - se haga altivo
  lexicon: engrandecerse / enorgullecerse
  rationale: La fuente expresa un aumento de soberbia, no solo orgullo interno. 'Engrandecerse' conserva la idea de elevarse a sí mismo y funciona bien junto a 'gloriarse' como paralelismo verbal.
- source_word: through the pride of man
  english_pob_choice: through the pride of man
  chosen_spanish: por el orgullo del hombre
  alternatives_spanish:
  - a causa del orgullo humano
  - por la soberbia humana
  lexicon: orgullo / hombre
  rationale: Se mantiene la construcción causal directa de la fuente. 'Del hombre' conserva la referencia antropológica del original sin sustituirla por una abstracción más moderna; 'humano' suavizaría el vínculo con la formulación bíblica.
theological_decisions:
- issue: Advertencia contra la arrogancia del gobernante
  english_pob_reading: A ruler who has become king must not boast or become proud because of human pride.
  chosen_spanish_reading: Un gobernante que ha llegado al trono no debe gloriarse ni engrandecerse por el orgullo humano.
  alternative_spanish_readings:
  - No debe jactarse ni volverse soberbio por el orgullo de los hombres.
  - Nadie que reine debe vanagloriarse por la soberbia humana.
  rationale: La línea transmite una amonestación moral, no una tesis política abstracta. La traducción conserva la prohibición y el vínculo causal entre el ascenso al poder y la soberbia, sin suavizar la fuerza ética del texto.
  doctrine_reference: Humildad ante Dios; crítica bíblica de la soberbia del poder.
translation_notes:
  revision_awareness: 'La redacción inglesa fue ajustada en varias pasadas por razones de fluidez (''nothing'' -> ''no one''; reordenamiento de la cláusula relativa; ''grown proud'' -> ''grow proud''). La versión española sigue el sentido consolidado: un único sujeto humano que reina y ha sido elevado a rey, al cual se prohíbe gloriarse y ensoberbecerse por orgullo humano.'
  spanish_consistency_notes:
  - Se mantiene 'rey/reina' con lenguaje claro y sin introducir títulos eclesiásticos.
  - '''Orgullo del hombre'' conserva el contraste antropológico del original; no se reemplaza por ''orgullo humano'' en el texto principal para evitar borrar la forma más concreta.'
  - El par verbal 'se gloríe ni se engrandezca' reproduce la doble prohibición con paralelismo natural en español.
