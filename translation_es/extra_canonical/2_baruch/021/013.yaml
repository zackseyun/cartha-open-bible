translation:
  language: es
  text: Porque, si las cosas que han sido no son recordadas, las cosas que están delante de ti son tuyas, y las cosas que han de venir son recordadas en sus tiempos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: the things that have been
  english_pob_choice: the things that have been
  chosen_spanish: las cosas que han sido
  alternatives_spanish:
  - las cosas pasadas
  - lo que ha existido
  lexicon: N/A
  rationale: Mantiene la referencia amplia al pasado sin añadir matices no presentes en el texto fuente; 'han sido' conserva el aspecto de existencia anterior.
- source_word: remembered
  english_pob_choice: remembered
  chosen_spanish: recordadas
  alternatives_spanish:
  - memorizadas
  - traídas a la memoria
  lexicon: N/A
  rationale: '''Recordadas'' comunica bien el sentido pasivo de ser tenidas en cuenta o evocadas, sin forzar una psicología moderna ajena al contexto.'
- source_word: the things that stand before you
  english_pob_choice: the things that stand before you
  chosen_spanish: las cosas que están delante de ti
  alternatives_spanish:
  - las cosas que están en tu presencia
  - las cosas que se hallan ante ti
  lexicon: N/A
  rationale: El giro 'delante de ti' preserva la relación espacial/personal con segunda persona singular, reflejando la corrección textual señalada por el audit trail.
- source_word: are yours
  english_pob_choice: are yours
  chosen_spanish: son tuyas
  alternatives_spanish:
  - te pertenecen
  - son de ti
  lexicon: N/A
  rationale: '''Son tuyas'' expresa posesión directa y transparente en español, sin perder la fuerza relacional del original.'
- source_word: the things that are to come
  english_pob_choice: the things that are to come
  chosen_spanish: las cosas que han de venir
  alternatives_spanish:
  - las cosas futuras
  - lo que vendrá
  lexicon: N/A
  rationale: '''Han de venir'' conserva el valor de futuro con cierta solemnidad y evita reducir el alcance a una mera abstracción temporal.'
- source_word: remembered in their times
  english_pob_choice: are remembered in their times
  chosen_spanish: son recordadas en sus tiempos
  alternatives_spanish:
  - son recordadas a su tiempo
  - son traídas a la memoria en su tiempo
  lexicon: N/A
  rationale: 'La pasiva refleja mantiene el paralelismo con el inglés POB y deja intacta la tensión temporal: el recuerdo ocurre en tiempos determinados.'
theological_decisions:
- issue: Secuencia temporal pasado-presente-futuro
  english_pob_reading: The verse contrasts what has been, what stands before God, and what is to come, each with a distinct temporal relation.
  chosen_spanish_reading: 'El versículo mantiene tres miembros distintos: lo pasado no recordado, lo presente ante Dios y lo futuro recordado en sus tiempos.'
  alternative_spanish_readings:
  - Confluir las dos últimas cláusulas en una sola idea
  - Reducir la frase a una reflexión general sobre el tiempo
  rationale: La revisión del audit trail corrige una omisión previa y exige conservar la estructura tripartita del versículo; la traducción debe reflejar esa arquitectura sin fusionar cláusulas.
  doctrine_reference: No aplica; decisión de estructura textual y temporal.
translation_notes:
  revision_awareness: 'El audit trail corrige dos problemas previos: una mala lectura de ''before you'' como ''near one another'' y la omisión de la cláusula inicial y del sujeto de la tercera cláusula. La traducción española conserva explícitamente las tres cláusulas y la segunda persona singular implícita en ''delante de ti''.'
  spanish_consistency_notes:
  - Se usa 'tú/ti/tuyas' para preservar la segunda persona singular del texto siriaco.
  - Se mantiene 'cosas' de forma amplia para abarcar el paralelismo con pasado, presente y futuro sin estrechar el referente.
  - No se añaden notas al pie porque no hay ambigüedad textual que requiera marcador anclado en esta redacción.
