lexical_decisions:
- source_word: And
  english_pob_choice: And it belongs to you alone to search out the origin of the whole order.
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Además
  lexicon: conjunción coordinante
  rationale: Se conserva la conexión del versículo con el contexto anterior, reflejando el waw inicial del siríaco y la revisión inglesa que restituyó el comienzo con 'And'.
- source_word: to you alone
  english_pob_choice: it belongs to you alone
  chosen_spanish: a ti solo
  alternatives_spanish:
  - solo a ti
  - a ti únicamente
  lexicon: expresión pronominal de exclusividad
  rationale: Se mantiene la exclusividad del destinatario sin sobrecargar la frase; 'a ti solo' comunica de modo natural la restricción enfática del original y del inglés revisado.
- source_word: to search out
  english_pob_choice: to search out
  chosen_spanish: buscar
  alternatives_spanish:
  - inquirir
  - indagar
  lexicon: verbo de búsqueda/indagación
  rationale: '''Buscar'' es la opción más transparente en español; conserva la idea de investigar o rastrear el origen sin introducir un matiz demasiado técnico que el contexto no exige.'
- source_word: the origin
  english_pob_choice: the origin
  chosen_spanish: el origen
  alternatives_spanish:
  - el comienzo
  - la fuente
  lexicon: sustantivo de procedencia/origen
  rationale: '''Origen'' refleja con precisión el sustantivo abstracto del source y del inglés POB, manteniendo la noción de procedencia primordial.'
- source_word: the whole order
  english_pob_choice: the whole order
  chosen_spanish: todo el orden
  alternatives_spanish:
  - el orden entero
  - todo el arreglo
  lexicon: orden/estructura total
  rationale: '''Orden'' preserva la idea de un sistema o disposición completa; ''todo el'' mantiene la amplitud total del sintagma sin añadir explicación interpretativa.'
theological_decisions:
- issue: Exclusividad del conocimiento o del acceso a la investigación
  english_pob_reading: it belongs to you alone to search out
  chosen_spanish_reading: a ti solo te corresponde buscar
  alternative_spanish_readings:
  - solo a ti te corresponde buscar
  - te corresponde buscar solo a ti
  rationale: La frase española conserva la fuerza de atribución exclusiva sin convertirla en una afirmación doctrinal más fuerte de lo que el texto exige; expresa privilegio o incumbencia singular, no omnisciencia.
  doctrine_reference: No doctrinal expansion; lexical exclusivity only
translation_notes:
  revision_awareness: 'El inglés revisado pasó de ''To you alone'' a ''And it belongs to you alone'', recuperando la conjunción inicial y una formulación más natural. La versión española conserva ambos elementos: la conjunción ''Y'' y la exclusividad con ''a ti solo''.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o cualquier sustitución no atestiguada, pues el pasaje no contiene el Tetragrámaton ni un equivalente directo en este versículo.
  - '''Orden'' se mantiene como término general para la disposición total; no se especifica ''creación'' ni ''universo'' porque el source y el inglés auditado no lo exigen.'
  - La nota al pie queda anclada correctamente en '[a]' dentro del texto español, evitando pies de página sin anclaje.
