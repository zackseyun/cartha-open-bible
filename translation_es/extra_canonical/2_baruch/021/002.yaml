lexical_decisions:
- source_word: ܘܒܬܪ (and afterward)
  english_pob_choice: And afterward
  chosen_spanish: Y después
  alternatives_spanish:
  - Y luego
  - Y más tarde
  lexicon: afterward
  rationale: «Después» comunica la secuencia temporal de forma natural en español y mantiene el valor narrativo simple del original sin añadir matices no presentes.
- source_word: אתר / מקום (the place)
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - aquel lugar
  lexicon: place
  rationale: «Lugar» es el equivalente más directo y claro en español para el espacio concreto al que el narrador regresó.
- source_word: ܐܝܟܐ ܕܡܠܠ ܥܡܝ (where he had spoken with me)
  english_pob_choice: where he had spoken with me
  chosen_spanish: donde él había hablado conmigo
  alternatives_spanish:
  - donde me había hablado
  - en el que había hablado conmigo
  lexicon: speak
  rationale: «Había hablado conmigo» conserva la relación personal expresada por el original y mantiene el pretérito pluscuamperfecto del inglés POB para reflejar anterioridad respecto al movimiento narrado.
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto inglés quedó sin cambios y con alto acuerdo en la verificación cruzada; por ello, la versión española sigue de cerca la lectura ya aprobada, sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y lineal.
  - No se introducen términos técnicos ni equivalentes doctrinales que el versículo no requiere.
  - La elección de «él» conserva la referencia masculina implícita del interlocutor del narrador en el contexto inmediato.
