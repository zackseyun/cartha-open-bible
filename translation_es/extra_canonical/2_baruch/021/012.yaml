  source_alignment_summary: 'El borrador sigue bien el sentido básico del siriaco según el rastro inglés: conserva el «Porque», «las cosas» en vez de «ofensas», el participio de lo pasado, y la idea de que no están lejos. El punto débil está en «sus poseedores», que en español suena demasiado literal y poco natural para «former things»; el propio audit trail deja abierta una lectura más relacional/autoral que de mera posesión.'
  spanish_quality_summary: El texto es mayormente claro, pero «las cosas de antes» y sobre todo «sus poseedores» suenan algo torpes. Para un español bíblico natural y digno, «las cosas anteriores» fluye mejor que «las cosas de antes», y «sus autores» comunica mejor la relación con «cosas» sin introducir connotación criminal. El resto es idiomático.
  glossary_alignment: No hay términos del glosario principal en juego. La revisión propuesta respeta la decisión documentada de no moralizar ܩܕܡܝܬܐ como «ofensas» y maneja ܡܪܝܗܝܢ de forma contextual en español, evitando un calco poco legible.
