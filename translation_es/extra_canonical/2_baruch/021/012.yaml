translation:
  language: es
  text: Porque incluso las cosas anteriores, que han pasado, no están lejos de ti, con todos sus autores y su memoria.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܓܝܪ (ger)
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: conjunción causal/expletiva
  rationale: El marcador Syriac introduce la afirmación con valor explicativo; «Porque» conserva el enlace discursivo natural en español y refleja el arranque causal del verso.
- source_word: ܩܕܡܝܬܐ (qadmayatha)
  english_pob_choice: the former things
  chosen_spanish: las cosas de antes
  alternatives_spanish:
  - las cosas primeras
  - las cosas antiguas
  lexicon: lexema de anterioridad temporal
  rationale: La revisión inglesa corrigió «former offenses» a «former things». En español, «las cosas de antes» expresa anterioridad sin añadir la carga moral de «ofensas».
- source_word: ܕܥܒܪܢ (that have passed away)
  english_pob_choice: that have passed away
  chosen_spanish: que han pasado
  alternatives_spanish:
  - que han desaparecido
  - que se han ido
  lexicon: perfecto verbal de cese/paso
  rationale: El participio/complemento de paso temporal se vierte de modo natural como «han pasado», manteniendo la idea de algo ya transcurrido.
- source_word: ܠܐ ... ܪܚܝܩܢ ܡܢܟ (are not distant from you)
  english_pob_choice: are not distant from you
  chosen_spanish: no están lejos de ti
  alternatives_spanish:
  - no están apartadas de ti
  - no te quedan lejanas
  lexicon: distancia/alejamiento
  rationale: «No están lejos de ti» es una correspondencia clara y idiomática del valor de alejamiento sin introducir matices no atestiguados.
- source_word: ܡܪܝܗܝܢ (their lords/owners/possessors)
  english_pob_choice: their perpetrators / possessors
  chosen_spanish: sus poseedores
  alternatives_spanish:
  - sus dueños
  - sus autores
  lexicon: sustantivo relacional de posesión/autoría
  rationale: El audit trail muestra una oscilación entre «perpetrators» y «possessors» por el uso idiomático siriaco. Para el español, «poseedores» conserva la noción relacional sin forzar una lectura criminal que el texto corregido ya no exige.
- source_word: ܕܟܪܢܗܝܢ (their remembrance)
  english_pob_choice: their remembrance
  chosen_spanish: su memoria
  alternatives_spanish:
  - su recuerdo
  - el recuerdo de ellas
  lexicon: memoria/recuerdo
  rationale: «Memoria» reproduce el sustantivo abstracto y mantiene un tono digno; «recuerdo» sería igualmente posible, pero «memoria» armoniza mejor con el registro bíblico.
theological_decisions:
- issue: Si «poseedores» implica dueños literales o agentes responsables de las cosas pasadas
  english_pob_reading: The English audit trail retains 'possessors' after correcting the source to 'former things,' leaving the Syriac idiom open between possessors/owners and those associated with them.
  chosen_spanish_reading: '«Sus poseedores» mantiene la apertura semántica: puede sugerir los que las tuvieron o los que estuvieron ligados a ellas, sin convertirlas en «ofensas».'
  alternative_spanish_readings:
  - sus dueños
  - sus autores
  rationale: No hay base suficiente para moralizar el término en español. La redacción conserva la tensión lexical documentada sin resolverla artificialmente.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La revisión inglesa corrigió dos puntos clave: (1) «former things» en lugar de «former offenses», y (2) «possessors» en lugar de «perpetrators». La versión española sigue esa corrección y evita tanto la moralización indebida como la literalidad extraña.'
  spanish_consistency_notes:
  - Se evitó «ofensas» porque el control fuente y la revisión inglesa indican «cosas de antes».
  - Se evitó «perpetradores» porque depende de la lectura errónea anterior y no conviene reintroducir una connotación criminal.
  - Se prefirió «memoria» como abstracto bíblico más estable que una simple paráfrasis.
  - No se usaron notas al pie porque no había un punto textual que exigiera alternativa visible sin anclaje en el verso.
