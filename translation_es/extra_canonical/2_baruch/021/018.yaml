translation:
  language: es
  text: de los que viven y de los que son como nada. Porque una vida que no está alegrada no es vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: those who live
  english_pob_choice: those who live
  chosen_spanish: los que viven
  alternatives_spanish:
  - los vivos
  - quienes viven
  lexicon: participial construction / present participle sense
  rationale: Mantiene el contraste natural entre personas vivas y otra categoría opuesta, sin introducir un matiz más técnico de ‘vivientes’ que sonaría menos fluido en español.
- source_word: those who are as nothing
  english_pob_choice: those who are as nothing
  chosen_spanish: los que son como nada
  alternatives_spanish:
  - los que no son nada
  - los que valen nada
  - los que son como nada en este mundo
  lexicon: comparative negation / existential valuation
  rationale: Conserva la fuerza degradante de la comparación sin absolutizar más de lo que el texto permite; ‘como nada’ refleja bien la expresión ponderativa del original y de la POB inglesa.
- source_word: life
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - la vida
  - existencia
  lexicon: noun of existence
  rationale: '‘Vida’ es el equivalente natural y mantiene el juego retórico: no toda mera existencia merece el nombre de vida.'
- source_word: not gladdened
  english_pob_choice: not gladdened
  chosen_spanish: no se alegra
  alternatives_spanish:
  - no es alegrada
  - no está llena de alegría
  - no se goza
  lexicon: joy / gladness state
  rationale: La pasiva literal ‘no es alegrada’ suena artificial en español; ‘no se alegra’ conserva la idea de vida sin gozo, respetando el sentido verbal y el tono sapiencial del enunciado.
theological_decisions:
- issue: Definición de vida verdadera vs. mera existencia
  english_pob_reading: For life that is not gladdened is no life.
  chosen_spanish_reading: Porque una vida que no se alegra no es vida.
  alternative_spanish_readings:
  - Porque una vida que no es alegrada no es vida.
  - Porque la vida sin alegría no es vida.
  rationale: 'La formulación española conserva la afirmación paradójica: solo merece llamarse vida la vida animada por gozo. Se evita reducirlo a un mero comentario psicológico o moralizante.'
  doctrine_reference: Sabiduría / antropología bíblica sobre la vida plena
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó una coma innecesaria después de ‘live’; en español se optó por una coordinación fluida equivalente (‘viven y de los que son como nada’) sin necesidad de marcar pausa adicional.
  spanish_consistency_notes:
  - Se mantiene ‘vida’ de forma consistente para life, ya que el contexto contrasta existencia plena con mera apariencia de vida.
  - No se introduce terminología eclesiástica añadida; el registro es sobrio y directo, acorde con un dicho sapiencial breve.
