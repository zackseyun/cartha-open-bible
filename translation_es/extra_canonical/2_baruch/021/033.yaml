theological_decisions:
- issue: Imperative/comediante opening bracketed in English POB
  english_pob_reading: '[Have regard to]'
  chosen_spanish_reading: '[Tengan] en cuenta'
  alternative_spanish_readings:
  - '[Considéren]'
  - '[Miren]'
  rationale: El inglés auditado marca un mandato implícito y entre corchetes. En español, 'tener en cuenta' conserva la idea de prestar atención/considerar. Se usa el plural reverencial/indefinido 'tengan' para una publicación litúrgica o exhortativa sin forzar un sujeto explícito.
  doctrine_reference: None
- issue: Possessive person in 'your name'
  english_pob_reading: your name
  chosen_spanish_reading: tu nombre
  alternative_spanish_readings:
  - su nombre
  rationale: El contexto no exige formalidad reverencial añadida; 'tu' mantiene la cercanía directiva que el inglés POB deja abierta. No se sustituye por 'su' sin evidencia contextual adicional.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La versión inglesa fue suavizada para unir ''the love of your name'' con ''that is before you''. La traducción española sigue esa relación sintáctica de manera natural con una sola cláusula relativa: ''el amor de tu nombre, que está delante de ti''.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' como sustituto de un nombre divino porque el texto fuente y el inglés auditado hablan de 'name', no de un término de título.
  - No se añade puntuación ni segmentación interpretativa fuera de lo requerido por la sintaxis española.
  - La forma verbal entre corchetes conserva el carácter exhortativo implícito del inglés auditado.
