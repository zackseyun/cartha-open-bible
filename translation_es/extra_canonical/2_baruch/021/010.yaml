translation:
  language: es
  text: Tú mandas el relámpago a tu señal, y has visto las cosas que han de venir, igual que las que han pasado.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: command the lightning
  english_pob_choice: You command the lightning
  chosen_spanish: Tú mandas el relámpago
  alternatives_spanish:
  - Tú ordenas el relámpago
  - Tú dispones del relámpago
  lexicon: mandar
  rationale: El verbo expresa con claridad la idea de autoridad eficaz sobre el relámpago, sin sobrecargar el verso. 'Mandar' conserva el paralelo directo con el inglés POB y la fuerza de dominio implícita en el texto siríaco.
- source_word: at your signal
  english_pob_choice: at your signal
  chosen_spanish: a tu señal
  alternatives_spanish:
  - por tu señal
  - según tu señal
  lexicon: señal
  rationale: '''A tu señal'' reproduce con naturalidad la relación temporal y de obediencia indicada por el audit trail, evitando una calca menos idiomática como ''por tu señal''.'
- source_word: the things that are to come
  english_pob_choice: the things that are to come
  chosen_spanish: las cosas que han de venir
  alternatives_spanish:
  - las cosas por venir
  - las cosas futuras
  lexicon: venir
  rationale: Se conserva el futuro prospectivo del original con una fórmula española clara y reverente. 'Han de venir' mantiene el sentido de destino aún no realizado.
- source_word: the things that have passed
  english_pob_choice: the things that have passed
  chosen_spanish: las que han pasado
  alternatives_spanish:
  - las que pasaron
  - las cosas pasadas
  lexicon: pasar
  rationale: La revisión textual corrige la lectura anterior y exige un contraste temporal explícito. 'Han pasado' refleja el sentido de ܕܥܒܪ̈ܝ ('que han pasado') y preserva el paralelismo con 'han de venir'.
theological_decisions:
- issue: Divine sovereignty over lightning and history
  english_pob_reading: You command the lightning at your signal, and you have seen the things that are to come, as the things that have passed.
  chosen_spanish_reading: Tú mandas el relámpago a tu señal, y has visto las cosas que han de venir, como las que han pasado.
  alternative_spanish_readings:
  - Tú ordenas el relámpago a tu señal
  - Tú dispones del relámpago a tu señal
  rationale: La frase mantiene la soberanía divina sobre la creación y la historia sin añadir interpretaciones devocionales que el verso no exige. El contraste entre futuro y pasado se conserva como una afirmación de conocimiento pleno de Dios.
  doctrine_reference: Providencia divina; omnisciencia de Dios
translation_notes:
  revision_awareness: 'La traducción sigue la revisión más reciente del texto inglés POB: mantiene ''at your signal'' como ''a tu señal'' y corrige la antigua confusión entre ''have passed'' y una lectura de ''doing''. El español refleja el contraste temporal establecido por la lectura siríaca controlada.'
  spanish_consistency_notes:
  - Se mantiene el registro formal y bíblico, sin sustituir 'Yahvé' porque el verso no contiene el nombre divino explícito.
  - '''Relámpago'' se eligió para evitar ambigüedad con ''lightning'' en español contemporáneo; el contexto de control divino sobre el fenómeno atmosférico lo justifica.'
  - Se preserva el paralelismo temporal 'han de venir' / 'han pasado' para respetar la tensión textual documentada.
