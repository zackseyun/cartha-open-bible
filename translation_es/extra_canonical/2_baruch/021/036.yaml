translation:
  language: es
  text: Que se selle el Seol[a], para que desde ahora no reciba a los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que se agite el Seol, para que desde ahora no retenga a los muertos». Esta lectura corresponde a una traducción anterior, pero no al verbo siríaco confirmado por la revisión.'
    reason: textual_variant
lexical_decisions:
- source_word: ܬܬܚܬܡ (tethkhtem)
  english_pob_choice: be sealed
  chosen_spanish: se selle
  alternatives_spanish:
  - sea sellado
  - quede sellado
  - sea cerrado
  lexicon: seal / close with a seal
  rationale: El siríaco indica sellado, no agitación. En español, «se selle» conserva la imagen de un acto pasivo-jussivo y mantiene el valor de cierre efectivo sin introducir una metáfora distinta.
- source_word: ܩܒܠ (tqabbel)
  english_pob_choice: receive
  chosen_spanish: reciba
  alternatives_spanish:
  - albergue
  - retenga
  - admita
  lexicon: receive / accept
  rationale: El verbo señala recibir o aceptar, no simplemente retener. «Reciba» reproduce mejor la capacidad de acoger a los muertos dentro del Seol, manteniendo la corrección frente a la lectura anterior.
- source_word: ܫܝܘܠ (Sheol)
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - Sheol
  - sepulcro
  - mundo de los muertos
  lexicon: Sheol (underworld / abode of the dead)
  rationale: Se conserva el término técnico bíblico en forma castellanizada «Seol», que es comprensible y evita sustituirlo por un equivalente interpretativo más amplio.
- source_word: ܡܝܬܐ / the dead
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los difuntos
  - los que han muerto
  lexicon: dead
  rationale: «Los muertos» es la correspondencia directa y conserva el alcance colectivo del original sin suavizarlo.
theological_decisions:
- issue: Estado del Seol y su relación con los muertos
  english_pob_reading: Let Sheol be sealed, so that from now on it may not receive the dead.
  chosen_spanish_reading: Que se selle el Seol, para que desde ahora no reciba a los muertos.
  alternative_spanish_readings:
  - Que se cierre el Seol, para que desde ahora no reciba a los muertos.
  - Que el Seol quede sellado, para que desde ahora no admita a los muertos.
  rationale: 'La revisión auditada corrige una lectura errónea anterior: el texto no pide que el Seol sea «agitado», sino «sellado». La formulación española debe preservar ese cambio conceptual, evitando una imagen incompatible con el siríaco y con el sentido revisado.'
  doctrine_reference: N/A; textual/lexical correction from Syriac source
translation_notes:
  revision_awareness: La versión inglesa fue corregida por revisión auditada desde «Let Sheol be stirred up...» a «Let Sheol be sealed...», porque el verbo siríaco ܬܬܚܬܡ significa «ser sellado». También se corrigió ܬܩܒܠ como «receive/recibir» en lugar de «hold/retener». La traducción española sigue la lectura revisada y conserva la variante previa solo como nota.
  spanish_consistency_notes:
  - Se usa «Seol» como término técnico bíblico consistente con el proyecto y con la naturaleza del pasaje.
  - Se mantiene el paralelismo verbal pasivo-jussivo con «Que se selle... para que... no reciba...» para reflejar la estructura breve del original.
  - No se introduce «infierno» ni «sepulcro», porque desplazarían el ámbito semántico del Seol bíblico.
