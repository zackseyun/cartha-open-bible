translation:
  language: es
  text: Por tanto, desde ahora manifiesta tu grandeza, y no pases por alto lo que queda reducido a nada bajo el reino de la muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: show your greatness
  english_pob_choice: show your greatness
  chosen_spanish: manifiesta tu grandeza
  alternatives_spanish:
  - muestra tu grandeza
  - demuestra tu grandeza
  lexicon: greatness
  rationale: «Manifiesta» conserva el valor exhortativo de hacer visible o poner de relieve la grandeza, sin reducirla a una simple exhibición externa. «Grandeza» traduce directamente el sustantivo y mantiene el tono solemne del contexto.
- source_word: do not overlook
  english_pob_choice: do not overlook
  chosen_spanish: no pases por alto
  alternatives_spanish:
  - no ignores
  - no descuides
  lexicon: overlook
  rationale: La expresión idiomática española «pasar por alto» reproduce bien la idea de no desatender ni tratar como irrelevante aquello que se menciona.
- source_word: what is brought to nothing
  english_pob_choice: what is brought to nothing
  chosen_spanish: lo que queda reducido a nada
  alternatives_spanish:
  - lo que es aniquilado
  - lo que se vuelve nada
  lexicon: brought to nothing
  rationale: «Queda reducido a nada» conserva la pasividad y el resultado de anulación sin añadir una interpretación más fuerte que la evidencia disponible.
- source_word: under the kingdom of death
  english_pob_choice: under the kingdom of death
  chosen_spanish: bajo el reino de la muerte
  alternatives_spanish:
  - bajo el dominio de la muerte
  - bajo el reinado de la muerte
  lexicon: kingdom
  rationale: «Reino de la muerte» mantiene la imagen política/real del original y coincide con el registro de la POB, evitando reemplazarla por una abstracción menos concreta.
theological_decisions:
- issue: El valor metafórico de «kingdom of death»
  english_pob_reading: kingdom of death
  chosen_spanish_reading: reino de la muerte
  alternative_spanish_readings:
  - dominio de la muerte
  - poder de la muerte
  rationale: Se conserva la personificación del poder de la muerte como un reino, porque el texto no exige suavizarla. Esto respeta el paralelismo retórico del pasaje.
  doctrine_reference: Imaginería apocalíptica / personificación del poder de la muerte
- issue: La exhortación a «show your greatness» en contexto de intercesión
  english_pob_reading: show your greatness
  chosen_spanish_reading: manifiesta tu grandeza
  alternative_spanish_readings:
  - muestra tu grandeza
  - haz patente tu grandeza
  rationale: «Manifiesta» suena natural en español bíblico y conserva el tono de acción pública o revelada que la frase pide, sin forzar una lectura doctrinal específica.
  doctrine_reference: Retórica de petición / exhortación divina
translation_notes:
  revision_awareness: La versión inglesa POB está en acuerdo alto con el control fuente y no presenta notas ni revisiones aplicadas; por tanto, la redacción española sigue de cerca la lectura auditada sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene «reino de la muerte» de forma consistente con el patrón POB de conservar imágenes concretas cuando la fuente las expresa así.
  - No se introduce «Mesías», «Yahvé» ni otro término técnico porque este versículo no los contiene en el testigo auditado.
