lexical_decisions:
- source_word: what is reserved for the world
  english_pob_choice: what is reserved for the world
  chosen_spanish: lo que está reservado para el mundo
  alternatives_spanish:
  - lo que está guardado para el mundo
  - lo que está almacenado para el mundo
  lexicon: reservado
  rationale: «Reservado» conserva bien la idea de algo destinado o apartado de antemano, y refleja la opción inglesa revisada sin volverla más técnica de lo necesario. En español suena natural y mantiene la carga de algo preparado para el orden del mundo.
- source_word: were not in them
  english_pob_choice: were not in them
  chosen_spanish: no estuviera en ellos
  alternatives_spanish:
  - no hubiera en ellos
  - no estuviese en ellos
  lexicon: estar en
  rationale: La construcción impersonal inglesa se vierte de forma idiomática en español con «no estuviera en ellos», que conserva la relación interna entre lo reservado y las personas sin introducir explicaciones ajenas al texto.
- source_word: they would be comforted
  english_pob_choice: they would be comforted
  chosen_spanish: serían consolados
  alternatives_spanish:
  - serían confortados
  - se consolarían
  lexicon: consolar
  rationale: «Serían consolados» mantiene la pasiva verbal del inglés y expresa claramente el efecto recibido. «Confortados» sería posible, pero «consolados» es más natural y preciso en español bíblico actual.
- source_word: their hope
  english_pob_choice: their hope
  chosen_spanish: su esperanza
  alternatives_spanish:
  - la esperanza de ellos
  lexicon: esperanza
  rationale: Se conserva el posesivo simple para una lectura fluida y directa. No hay necesidad de explicitar el genitivo; el sentido queda claro en español.
theological_decisions:
- issue: Sentido de lo «reservado para el mundo» como realidad escatológica o asignada
  english_pob_reading: what is reserved for the world
  chosen_spanish_reading: lo que está reservado para el mundo
  alternative_spanish_readings:
  - lo que el mundo tiene reservado
  - lo destinado al mundo
  rationale: 'La redacción española mantiene la ambigüedad controlada del original y de la traducción inglesa: puede aludir a lo destinado al mundo o a lo que le corresponde en su orden. No se especifica más allá de lo que el texto sostiene.'
  doctrine_reference: escatología/orden providencial
translation_notes:
  revision_awareness: La revisión inglesa movió la frase a una construcción más natural («what is reserved for the world») y suavizó el arcaísmo («that which was laid up»). La versión española sigue esa revisión con «lo que está reservado para el mundo», sin introducir un giro interpretativo adicional.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología litúrgica no pertinente, porque el versículo no la contiene.
  - Se mantiene un registro bíblico sobrio y moderno, pero no paraprástico.
  - La nota al pie está anclada explícitamente en «reservado» mediante [a], para evitar marcas huérfanas.
