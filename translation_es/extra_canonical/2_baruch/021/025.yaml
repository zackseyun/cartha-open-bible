translation:
  language: es
  text: Si[a] lo que está reservado para el mundo no estuviera en ellos, serían consolados por su esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Si no estuviera en ellos lo que está reservado para el mundo»; o «lo que está guardado para el mundo».'
