translation:
  language: es
  text: Y llegué al lugar donde tú me hablaste, y me senté en la cueva de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: where you spoke with me
  english_pob_choice: where you spoke with me
  chosen_spanish: donde tú me hablaste
  alternatives_spanish:
  - donde hablaste conmigo
  - en el lugar donde me hablaste
  lexicon: d- (relative adverb of place); verb of speaking
  rationale: El relativo de lugar se expresa naturalmente con «donde». El inglés ya descartó el redundante «there» del siriaco; por eso no se añade ningún refuerzo espacial en español. «Me hablaste» conserva la relación directa y personal del diálogo sin sobretraducción.
- source_word: the place
  english_pob_choice: the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - al sitio
  - a ese lugar
  lexicon: ʾatra / maqom (place, site)
  rationale: «Lugar» es el término más neutral y fiel para un espacio concreto. Se usa «al» por el movimiento hacia ese sitio.
- source_word: I came
  english_pob_choice: And I came
  chosen_spanish: Y llegué
  alternatives_spanish:
  - Y vine
  - Y me acerqué
  lexicon: ʾtʾ / ʾty (come, arrive)
  rationale: En español, «llegué» comunica mejor la llegada a un destino específico que un simple «vine», sin cambiar el sentido del movimiento.
- source_word: I sat
  english_pob_choice: I sat
  chosen_spanish: me senté
  alternatives_spanish:
  - me sentaba
  - me senté allí
  lexicon: ytb (sit down)
  rationale: El perfecto simple expresa la acción puntual de sentarse en ese lugar, en concordancia con la narración.
- source_word: in the cave of the earth
  english_pob_choice: in the cave of the earth
  chosen_spanish: en la cueva de la tierra
  alternatives_spanish:
  - en la caverna de la tierra
  - en la cueva terrenal
  lexicon: gwrʾ / ḥwrʾ (cave); ʾrʿʾ (earth, ground)
  rationale: «Cueva» es natural y fiel para el espacio subterráneo indicado. Se mantiene «de la tierra» para respetar la construcción original y su imagen concreta; no se interpreta como metáfora ni se suaviza a otra formulación.
theological_decisions:
- issue: Topographical concreteness of the setting
  english_pob_reading: in the cave of the earth
  chosen_spanish_reading: en la cueva de la tierra
  alternative_spanish_readings:
  - en la cueva terrenal
  - en una cueva bajo tierra
  rationale: La frase se conserva de manera concreta, sin alegorizarla. El texto presenta un lugar físico, y la traducción mantiene esa materialidad.
  doctrine_reference: No aplica; decisión de imaginería narrativa.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó el redundante 'there' de la frase relativa porque el siriaco ya contiene un adverbio resumptivo en la estructura. El español evita añadir cualquier equivalente redundante y mantiene la relación simple 'donde tú me hablaste'.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y actual, sin arcaísmos innecesarios.
  - No se introduce nota al pie porque no hay alternativa textual relevante que anclar en esta línea.
  - «Cueva de la tierra» conserva la imagen concreta del original sin explicar en exceso.
