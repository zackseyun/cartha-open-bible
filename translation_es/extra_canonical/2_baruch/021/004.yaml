translation:
  language: es
  text: «¡Ay de mi corazón, porque se abre de golpe[a] en un manantial de aflicción, y de allí fluyen lágrimas de mis ojos, y no me sacio de llorar!»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «queda abierto en el manantial de aflicción»; otra posibilidad: «revienta» o «se revienta».'
    reason: Preserva en español las alternativas documentadas por la auditoría inglesa para la imagen verbal central (“cut open at the spring of grief” / “bursts open”).
lexical_decisions:
- source_word: “Woe to my heart”
  english_pob_choice: Woe to my heart
  chosen_spanish: «¡Ay de mi corazón!
  alternatives_spanish:
  - «¡Ay de mi pecho!
  - «¡Ay de mi alma!
  lexicon: —
  rationale: ‘Ay de’ conserva la exclamación de lamento sin añadir interpretación. ‘Corazón’ sigue el órgano/centro afectivo del original y del inglés POB.
- source_word: bursts open
  english_pob_choice: bursts open
  chosen_spanish: se abre de golpe
  alternatives_spanish:
  - estalla
  - se revienta
  lexicon: —
  rationale: La imagen pide ruptura súbita. ‘Se abre de golpe’ comunica la violencia del quiebre sin sonar demasiado física o moderna para un lamento poético.
- source_word: into a spring of grief
  english_pob_choice: into a spring of grief
  chosen_spanish: en un manantial de dolor
  alternatives_spanish:
  - en una fuente de dolor
  - en un pozo de dolor
  lexicon: —
  rationale: ‘Manantial’ mantiene la imagen de una fuente que brota, coherente con el verbo de apertura y con el flujo de lágrimas. ‘Dolor’ expresa el sustantivo afectivo sin sobreespecificar.
- source_word: from there
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ahí
  lexicon: —
  rationale: '‘De allí’ es natural en español y preserva la relación espacial/originaria del texto: desde ese manantial surgen las lágrimas.'
- source_word: tears flow from my eyes
  english_pob_choice: tears flow from my eyes
  chosen_spanish: fluyen lágrimas de mis ojos
  alternatives_spanish:
  - brotan lágrimas de mis ojos
  - corren lágrimas de mis ojos
  lexicon: —
  rationale: ‘Fluyen’ conserva la imagen acuática y enlaza con ‘manantial’. El orden español resulta más fluido que calcar literalmente el inglés.
- source_word: I am not satisfied with weeping
  english_pob_choice: I am not satisfied with weeping
  chosen_spanish: no me sacio de llorar
  alternatives_spanish:
  - no me harto de llorar
  - no estoy satisfecho con el llanto
  lexicon: —
  rationale: ‘No me sacio de’ es una expresión española natural para una insatisfacción continua e inagotable; mantiene la fuerza intensiva de ‘not satisfied’.
theological_decisions:
- issue: Lamento intensivo y poético del yo hablante
  english_pob_reading: The verse is rendered as a first-person lament, preserving the poetic grief imagery without doctrinal smoothing.
  chosen_spanish_reading: El verso queda como lamento en primera persona, con imágenes de ruptura y flujo de llanto conservadas.
  alternative_spanish_readings:
  - Parafrasear emocionalmente el lamento
  - Suavizar la imagen de ruptura
  rationale: 'No hay base para atenuar la intensidad; la traducción debe sostener el pathos del texto fuente y su progresión imagética: corazón roto → manantial de dolor → lágrimas → llanto inagotable.'
  doctrine_reference: Poetic lament; no specific doctrinal point
- issue: Relación imagen-corazón-manantial-lágrimas
  english_pob_reading: The English preserves the concrete water imagery rather than abstracting it.
  chosen_spanish_reading: Se conserva la cadena concreta de imágenes acuáticas sin convertirla en mera abstracción.
  alternative_spanish_readings:
  - ‘fuente de tristeza’
  - ‘dolor que me desborda’
  rationale: El texto fuente encadena metáforas físicas. En español conviene respetar esa concreción para no borrar la tensión poética documentada por el POB.
  doctrine_reference: Poetic imagery; no specific doctrinal point
translation_notes:
  revision_awareness: 'The English audit trail shows two revisions: a correction from the awkward ''cut open at the spring of grief'' to ''bursts open into a spring of grief'', and then a smoothing of word order around ''from there''. The Spanish draft follows the final meaning while preserving the burst/opening image and the source-linked flow from the spring of grief to tears.'
  spanish_consistency_notes:
  - Se usa ‘manantial’ para mantener la metáfora de origen y flujo, consistente con ‘fluyen lágrimas’.
  - Se evita ‘SEÑOR’ u otra adaptación teológica porque no aparece el Tetragrámaton ni un título divino en este versículo.
  - ‘Ay de’ conserva el registro lamentatorio bíblico sin depender de una fórmula eclesiástica fija.
