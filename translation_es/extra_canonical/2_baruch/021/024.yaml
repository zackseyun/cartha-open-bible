  text: ¿Y cómo fue revelado si después no lo entienden?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: And how was it revealed
  english_pob_choice: And how was it revealed
  chosen_spanish: ¿Y cómo fue revelado?
  alternatives_spanish:
  - ¿Y cómo se les reveló?
  - ¿Y cómo se dio a conocer?
  lexicon: revelar
  rationale: El pasivo en español conserva la pregunta sobre la manifestación de la revelación sin introducir un agente que el texto no explicita. "Se dio a conocer" suaviza demasiado la fuerza de "was revealed".
- source_word: they do not understand
  english_pob_choice: they do not understand
  chosen_spanish: no lo entienden
  alternatives_spanish:
  - no comprenden
  - no lo perciben
  lexicon: entender
  rationale: '"Entender" reproduce el valor cognitivo directo del inglés y evita añadir matices interpretativos. El pronombre "lo" mantiene el objeto implícito de lo revelado.'
theological_decisions:
- issue: Relación entre revelación e incomprensión posterior
  english_pob_reading: And how was it revealed if afterward they do not understand?
  chosen_spanish_reading: ¿Y cómo fue revelado, si después no lo entienden?
  alternative_spanish_readings:
  - ¿Y cómo fue revelado si luego no lo comprenden?
  - ¿Y cómo se reveló si después no lo entienden?
  rationale: 'La construcción conserva la tensión lógica del original: una revelación que, sin comprensión posterior, queda cuestionada en su efectividad. No se resuelve la tensión porque el texto tampoco la resuelve.'
  doctrine_reference: Epistemología de la revelación; incomprensión humana frente a la manifestación divina
