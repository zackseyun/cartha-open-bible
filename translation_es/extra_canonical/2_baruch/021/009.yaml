translation:
  language: es
  text: Desde el principio del mundo, llamas a las cosas que no existen, y te escuchan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “From the beginning of the world”
  english_pob_choice: From the beginning of the world
  chosen_spanish: Desde el principio del mundo
  alternatives_spanish:
  - Desde el comienzo del mundo
  - Desde la fundación del mundo
  lexicon: source temporal phrase
  rationale: Conserva el marco temporal total del original con una formulación natural en español. «Principio» reproduce bien la idea de origen, y «del mundo» mantiene el alcance cósmico del enunciado sin añadir matices no presentes.
- source_word: “you call”
  english_pob_choice: you call
  chosen_spanish: llamas
  alternatives_spanish:
  - invocas
  - llamas
  lexicon: verb of calling
  rationale: «Llamas» es la correspondencia directa y más natural aquí. «Invocas» podría sugerir una connotación cultual o ritual que el texto no exige explícitamente.
- source_word: “the things that do not exist”
  english_pob_choice: the things that do not exist
  chosen_spanish: las cosas que no existen
  alternatives_spanish:
  - las cosas que no son
  - las cosas que aún no existen
  lexicon: nonexistence expression
  rationale: La frase española refleja con fidelidad la ausencia de existencia sin introducir el adverbio «aún», que la revisión inglesa descartó por añadir una interpretación temporal. «Las cosas que no son» sería más literal, pero menos idiomático en español.
- source_word: “and they listen to you”
  english_pob_choice: and they listen to you
  chosen_spanish: y ellas te escuchan
  alternatives_spanish:
  - y te escuchan
  - y te oyen
  lexicon: response/hearing verb
  rationale: «Te escuchan» conserva la idea de respuesta atenta, no solo de percepción auditiva. El pronombre explícito «ellas» mantiene la referencia a «las cosas» y hace fluida la sintaxis en español.
theological_decisions:
- issue: Creación y llamada eficaz de Dios sobre realidades inexistentes
  english_pob_reading: the things that do not exist
  chosen_spanish_reading: las cosas que no existen
  alternative_spanish_readings:
  - las cosas que no son
  - las cosas que aún no existen
  rationale: 'Se mantiene la fuerza ontológica del original: Dios llama a realidades inexistentes sin que el texto añada la noción de «todavía». La traducción evita suavizar la tensión teológica del enunciado.'
  doctrine_reference: Creación; omnipotencia divina; llamado eficaz
translation_notes:
  revision_awareness: 'La versión inglesa revisada movió la frase temporal al inicio y eliminó «yet» de «do not yet exist». La redacción española sigue esa decisión: coloca «Desde el principio del mundo» al inicio y usa «no existen» sin añadir «todavía/aún».'
  spanish_consistency_notes:
  - Se conserva «Dios» implícito en la segunda persona del discurso, sin introducir sujeto explícito que el texto no requiere.
  - No se usa «Mesías», «Cristo», ni terminología eclesial ajena al versículo.
  - La puntuación refleja una sola cláusula coordinada final, en paralelo con el inglés auditado.
