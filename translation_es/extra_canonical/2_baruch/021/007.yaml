translation:
  language: es
  text: Y tú conoces el número de los que pasan y de los que permanecen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: w-ydʿ ʾnt / you know
  english_pob_choice: And you know
  chosen_spanish: Y tú conoces
  alternatives_spanish:
  - Y sabes
  lexicon: ידע / conocer
  rationale: La forma verbal expresa conocimiento directo y personal; «conoces» conserva mejor ese matiz que un mero «sabes» en este contexto solemne. El arranque con «Y» refleja el ajuste del POB inglés al inicial conjuntivo del siríaco.
- source_word: mnyanʾ / number
  english_pob_choice: the number
  chosen_spanish: el número
  alternatives_spanish:
  - la cantidad
  - el total
  lexicon: מנה / número, conteo
  rationale: «Número» es la correspondencia más directa y natural en español para un conteo preciso; «cantidad» suaviza demasiado la idea de cómputo exacto.
- source_word: ʿbrn / those who pass away
  english_pob_choice: those who pass away
  chosen_spanish: los que pasan
  alternatives_spanish:
  - los que perecen
  - los que mueren
  lexicon: עבר / pasar, pasar de aquí
  rationale: El participio describe a los transitorios, literalmente «los que pasan». En español, «pasan» mantiene la brevedad y la oposición con «permanecen» sin añadir una interpretación más fuerte que el texto no exige.
- source_word: d-mqwyn / those who abide
  english_pob_choice: those who abide
  chosen_spanish: los que permanecen
  alternatives_spanish:
  - los que se quedan
  - los que perduran
  lexicon: קוה / permanecer, esperar; aquí en contraste de permanencia
  rationale: «Permanecen» conserva la idea de continuidad/estabilidad frente a los que pasan. Es más natural y precisa que un calco como «abitan».
theological_decisions:
- issue: Contraste entre lo transitorio y lo estable
  english_pob_reading: those who pass away and those who abide
  chosen_spanish_reading: los que pasan y los que permanecen
  alternative_spanish_readings:
  - los que perecen y los que permanecen
  - los mortales y los que permanecen
  rationale: 'El sentido central no es moral sino ontológico/temporal: unos pasan, otros permanecen. Mantengo esa tensión sin convertirla en juicio moral ni en una paráfrasis explicativa.'
  doctrine_reference: Tema sapiencial/apocalíptico de la transitoriedad humana frente a la permanencia divina o de los elegidos; no introduce una doctrina nueva en el versículo.
translation_notes:
  revision_awareness: La versión inglesa pasó de una mala lectura («sinful men... wrath») a una corrección fiel al siríaco, y luego afinó la sintaxis a una oración principal con «And». La traducción española sigue la lectura corregida y conserva el paralelismo binario sin cargar el verso con glosas no presentes en el fuente.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, pero con español moderno natural.
  - No se introdujo terminología doctrinal ajena al contraste textual.
  - Se prefirió la transparencia semántica sobre un estilo más literalista que sonaría antinatural en español.
