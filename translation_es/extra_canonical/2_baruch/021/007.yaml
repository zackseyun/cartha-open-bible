    issue: Leve énfasis pronominal en «Y tú conoces»
    rationale: El siríaco/inglés no exige necesariamente el pronombre explícito; «Y conoces» o «Y sabes» serían más sobrios. Sin embargo, el uso de «tú» no distorsiona el sentido ni vuelve antinatural la línea.
