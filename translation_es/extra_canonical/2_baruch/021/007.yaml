  source_alignment_summary: 'El borrador español refleja fielmente el siríaco según la auditoría inglesa: mantiene la cláusula principal inicial con conjunción («Y»), el conocimiento del «número», y el contraste entre «los que pasan» y «los que permanecen». No reintroduce la lectura errónea previa sobre «hombres pecadores» ni «palabras llenas de ira».'
  spanish_quality_summary: El español es claro, natural y digno. «Y tú conoces» suena algo enfático, pero sigue siendo plenamente legible y aceptable en contexto bíblico; la frase completa fluye bien. «Los que pasan» frente a «los que permanecen» conserva bien el paralelismo y evita sobreinterpretar con «mueren» o «perecen».
  glossary_alignment: 'No hay términos del glosario base especialmente activados aquí. Las decisiones léxicas son coherentes con el POB: «conoces» para conocimiento personal, «número» para mnyanʾ, y el contraste temporal/ontológico sin moralización añadida.'
