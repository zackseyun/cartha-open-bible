translation:
  language: es
  text: Y las huestes del cielo lo saben por el espíritu.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: hosts of heaven
  english_pob_choice: hosts of heaven
  chosen_spanish: huestes del cielo
  alternatives_spanish:
  - ejércitos del cielo
  - milicias del cielo
  lexicon: host/hosts (celestial army imagery)
  rationale: ‘Huestes’ conserva la imagen de un conjunto ordenado y poderoso de seres celestiales sin imponer una lectura más específica que el arameo/siríaco no exige. ‘Del cielo’ mantiene la referencia espacial y reverencial del original.
- source_word: know
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - reconocen
  lexicon: ידע / cognate knowing
  rationale: ‘Saben’ comunica conocimiento real y directo de forma natural en español. ‘Conocen’ sería posible, pero ‘saben’ es más conciso y mantiene el tono afirmativo del verso.
- source_word: by the spirit
  english_pob_choice: by the spirit
  chosen_spanish: por el espíritu
  alternatives_spanish:
  - por el Espíritu
  - mediante el espíritu
  - por medio del espíritu
  lexicon: ruḥa / spirit
  rationale: Se mantiene ‘espíritu’ en minúscula porque el texto y el control editorial preservan la ambigüedad no trinitaria. ‘Por el Espíritu’ capitalizaría indebidamente y resolvería una tensión que la fuente deja abierta. ‘Por medio del espíritu’ explicita demasiado la relación.
theological_decisions:
- issue: Capitalización de ‘espíritu’ y alcance referencial
  english_pob_reading: the spirit
  chosen_spanish_reading: el espíritu
  alternative_spanish_readings:
  - el Espíritu
  - el Espíritu Santo
  rationale: La revisión doctrinal indica evitar una capitalización que importe pneumatología cristiana posterior a un texto judío del siglo I. Por eso se conserva la minúscula, dejando abierta la referencia precisa del ‘espíritu’.
  doctrine_reference: DOCTRINE.md §3
translation_notes:
  revision_awareness: Se siguió la revisión aplicada que cambió ‘Spirit’ a ‘spirit’ para preservar la tensión teológica. La versión española mantiene esa decisión con minúscula y evita aclaraciones cristianizantes no justificadas por la fuente.
  spanish_consistency_notes:
  - Se usa ‘espíritu’ en minúscula de manera consistente con la decisión editorial del corpus.
  - ‘Huestes del cielo’ conserva el plural colectivo y el registro bíblico sin sobreinterpretar el término.
