  - ¿Qué hay de visible en ellos? ¿O qué esperanza visible hay? ¿O qué morada visible no es vanidad?
  rationale: El texto plantea una cadena de preguntas retóricas sobre la apariencia externa y su insuficiencia. Mantener “visible” en las tres cláusulas preserva el paralelismo resaltado por la revisión inglesa y evita diluir la fuerza retórica.
  doctrine_reference: Sapiencial/retórica de la vanidad de lo terrenal; no se introduce doctrina adicional.
