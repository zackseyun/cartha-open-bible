theological_decisions:
- issue: Valor retórico de tres preguntas sucesivas sobre lo visible y su falta de consistencia
  english_pob_reading: For what is visible in them? Or what visible hope is there? Or what visible dwelling is not vanity?
  chosen_spanish_reading: ¿Qué es lo visible en ellos? ¿O qué esperanza visible hay? ¿O qué morada visible no es vanidad?
