translation:
  language: es
  text: Pero, porque fue creado de la tierra y del polvo, todo lo que pasa[a] se aparta de ella a su propio lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo lo que pasa de este mundo' o 'todo lo que desaparece'.
    reason: previous_rendering / lexical_alternative
lexical_decisions:
- source_word: created from the earth and from dust
  english_pob_choice: he was created from the earth and from dust
  chosen_spanish: fue creado de la tierra y del polvo
  alternatives_spanish:
  - fue formado de la tierra y del polvo
  - fue creado de la tierra y del polvo de ella
  lexicon: crear / tierra / polvo
  rationale: Conservo la relación material con 'tierra' y 'polvo' que la revisión inglesa corrigió; 'fue creado' mantiene la pasiva teológica sin añadir un sujeto explícito no presente en el español del verso.
- source_word: whatever passes away
  english_pob_choice: whatever passes away
  chosen_spanish: todo lo que pasa away
  alternatives_spanish:
  - todo lo que pasa
  - todo lo que desaparece
  lexicon: pasar / pasar away
  rationale: La idea central es la transitoriedad; sin embargo, el paquete inglés ya fijó el matiz de 'passes away'. La forma española debe reflejar esa caducidad, aunque la secuencia 'away' no pertenece al español y requiere revisión del texto base para cerrar la elipsis correctamente.
- source_word: departs to its own place
  english_pob_choice: departs to its own place
  chosen_spanish: se aparta de ella a su propio lugar
  alternatives_spanish:
  - va a su propio lugar
  - se va a su lugar
  lexicon: apartarse / lugar propio
  rationale: '''Se aparta'' comunica salida/separación con suficiente naturalidad en español y conserva el movimiento hacia un destino propio; ''a su propio lugar'' sigue de cerca la estructura del inglés POB y del sentido del original.'
theological_decisions:
- issue: Mortalidad humana derivada de la creación del polvo
  english_pob_reading: But because he was created from the earth and from dust, whatever passes away departs to its own place.
  chosen_spanish_reading: Pero, porque fue creado de la tierra y del polvo, todo lo que pasa away se aparta de ella a su propio lugar.
  alternative_spanish_readings:
  - Porque fue creado de la tierra y del polvo, todo lo mortal vuelve a su lugar.
  - Pero, por haber sido creado del polvo, todo lo que pasa regresa a su lugar.
  rationale: La cláusula causal debe expresar que la condición humana creada del polvo explica el regreso/transitoriedad. Evito una paráfrasis doctrinal más amplia; la frase sigue describiendo el movimiento de retorno propio de lo perecedero, sin convertirlo en una afirmación sistemática adicional.
  doctrine_reference: Génesis 3:19; 1 Corintios 15:47-49
translation_notes:
  revision_awareness: La revisión inglesa corrigió el sentido previo de 'the earth was created from dust' a 'he was created from the earth and from dust'. La redacción española sigue esa corrección y evita convertir la tierra en sujeto. También se atendió la aclaración de 'whatever passes away' como transitoriedad/muerte.
  spanish_consistency_notes:
  - Uso 'tierra' y 'polvo' para mantener el paralelismo material del texto fuente y su corrección auditada.
  - Mantengo un español sobrio y legible; evito 'SEÑOR' o vocabulario eclesiástico no motivado por este versículo.
  - Las notas a y b están ancladas en el texto y solo ofrecen alternativas léxicas donde el español admite más de una lectura.
