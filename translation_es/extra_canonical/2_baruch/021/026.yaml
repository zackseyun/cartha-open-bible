review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la corrección clave del inglés auditado: el sujeto implícito es humano (''fue creado de la tierra y del polvo''), no ''la tierra''. Sin embargo, falla gravemente al conservar el anglicismo ''away'' dentro del texto y al introducir una nota innecesaria sobre ''a su propio lugar'' que no corresponde a una ambigüedad preservada en el rastro inglés. El sentido fuente es de transitoriedad/mortalidad y retorno a su lugar propio.'
  spanish_quality_summary: La frase base es mayormente legible, pero 'todo lo que pasa away' es inaceptable en español y rompe la dignidad y naturalidad del registro. 'Se aparta de ella' suena algo forzado pero aceptable; no obstante, 'se va de ella' sería más coloquial. La mejor reparación mínima es 'todo lo que pasa[a] se aparta de ella a su propio lugar', conservando la alternativa inglesa en nota.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'tierra', 'polvo', 'creado' y 'lugar' son adecuados. La decisión importante es representar 'whatever passes away' con español natural; aquí conviene usar 'todo lo que pasa' con nota que preserve 'pasa away / desaparece / pasa de este mundo' como alternativa contextual, ya que el inglés POB mantiene la variante 'whatever passes'.
  issues:
  - severity: high
    issue: 'Anglicismo crudo en el texto: ''pasa away'''
    rationale: No es español aceptable ni fiel al estilo objetivo. Debe repararse a una forma española natural que exprese transitoriedad/muerte.
  - severity: medium
    issue: La nota b sobre 'a su propio lugar' no está motivada por el rastro fuente
    rationale: El inglés POB no preserva aquí una alternativa textual equivalente; añadir 'destino propio' introduce matiz interpretativo no necesario.
  - severity: low
    issue: '''Se aparta de ella'' es algo rígido'
    rationale: No es incorrecto, pero suena menos natural que otras opciones. Aun así, puede conservarse como reparación mínima sin perder fidelidad.
  revised_spanish_text: Pero, porque fue creado de la tierra y del polvo, todo lo que pasa[a] se aparta de ella a su propio lugar.
  revised_footnotes:
  - marker: a
    text: O 'todo lo que pasa de este mundo' o 'todo lo que desaparece'.
    reason: previous_rendering / lexical_alternative
  revision_rationale: Se corrige el anglicismo 'away' y se conserva en nota la alternativa auditada inglesa ('whatever passes'). Se elimina la nota innecesaria sobre 'a su propio lugar' porque no añade una ambigüedad fuente relevante y en español introduce interpretación extra. El resto del verso puede mantenerse con ajuste mínimo.
