lexical_decisions:
- source_word: ܐܚܪ̈ܝܐ / final
  english_pob_choice: final
  chosen_spanish: últimas
  alternatives_spanish:
  - finales
  - postreras
  lexicon: Payne Smith
  rationale: En español, «últimas» conserva la idea de cierre culminante con un registro natural y bíblico, sin endurecer la frase con un calco excesivamente literal.
- source_word: ܡ̈ܝܐ ܐܘܟܡ̈ܐ / black waters
  english_pob_choice: black waters
  chosen_spanish: aguas negras
  alternatives_spanish:
  - aguas oscuras
  - aguas tenebrosas
  lexicon: Payne Smith
  rationale: «Negras» reproduce el color simbólico y la imagen apocalíptica del original; «oscuras» o «tenebrosas» suavizan demasiado la forma concreta del sustantivo.
- source_word: ܐܚܪ̈ܝܐ ... ܕܒܬܪ / that follow
  english_pob_choice: that follow
  chosen_spanish: que siguen a
  alternatives_spanish:
  - que vienen después de
  - que van tras
  lexicon: Payne Smith
  rationale: «Que siguen a» mantiene la relación sucesiva de la imagen sin añadir matices interpretativos.
- source_word: ܦܫܡܐ / interpretation
  english_pob_choice: interpretation
  chosen_spanish: interpretación
  alternatives_spanish:
  - explicación
  - sentido
  lexicon: Payne Smith
  rationale: «Interpretación» es la opción más directa y transparente para un texto apocalíptico que introduce una lectura simbólica.
- source_word: ܡܠܬܐ / word
  english_pob_choice: This is the word
  chosen_spanish: Esta es la palabra
  alternatives_spanish:
  - Esta es la declaración
  - Este es el dicho
  lexicon: Payne Smith
  rationale: «Palabra» conserva la fórmula introductoria breve del original y encaja con el estilo bíblico castellano sin elevar innecesariamente el registro.
theological_decisions:
- issue: How to render the symbolic water image without flattening it
  english_pob_reading: The final black waters culminate in worldwide upheaval, followed by deliverance into the hands of the Messiah.
  chosen_spanish_reading: Las últimas aguas negras se presentan como una imagen simbólica culminante, en una secuencia de anuncio e interpretación.
  alternative_spanish_readings:
  - Una simple descripción de catástrofe natural.
  - Una metáfora menos precisa de oscuridad general.
  rationale: El versículo abre con la fórmula interpretativa y la imagen simbólica; en español conviene conservar esa tensión sin explicar más de lo que el texto dice en este punto.
  doctrine_reference: 2 Baruc 70:1 (contexto inmediato del ciclo de las aguas)
