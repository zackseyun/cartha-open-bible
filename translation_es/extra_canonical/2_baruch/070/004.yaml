review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del siríaco según la auditoría inglesa: inversión apocalíptica de poder, riqueza y honor. Sin embargo, dos giros españoles pueden mejorarse para fidelidad idiomática y claridad: ''en manos de los pocos'' suena menos natural que ''en manos de unos pocos'', y ''Los que eran nada'' es demasiado abrupto en español; ''Los que no eran nada'' preserva mejor la idea de insignificancia/nulidad social documentada en el POB inglés.'
  spanish_quality_summary: El texto es mayormente claro y solemne, pero tiene leve aspereza no idiomática en dos lugares. La sintaxis y el paralelismo funcionan bien. 'Se enaltecerán sobre los valientes' es entendible y digno; no requiere cambio.
  glossary_alignment: 'No hay términos del glosario mayor en disputa. ''Impíos'', ''valientes'', ''pobres'' y ''ricos'' están bien elegidos. La excepción recomendada es estilística/semántica: ajustar ''los pocos'' a ''unos pocos'' y ''eran nada'' a ''no eran nada'' para español natural sin perder la fuerza literal del original ni la rationale inglesa sobre ''those who were nothing''.'
  issues:
  - severity: medium
    issue: 'Frase poco idiomática: ''en manos de los pocos'''
    rationale: Aunque comprensible, en español bíblico y general suena más natural 'en manos de unos pocos' para expresar dominio por una minoría. Preserva exactamente el sentido de 'the few'.
  - severity: medium
    issue: 'Giro abrupto: ''Los que eran nada'''
    rationale: Calca demasiado el inglés y resulta forzado en español. 'Los que no eran nada' comunica mejor la idea de personas sin importancia o de ninguna cuenta, en línea con la nota inglesa alternativa 'Those who were nobodies', sin rebajar el tono solemne.
  revised_spanish_text: Muchos serán entregados en manos de unos pocos. Los que no eran nada[a] gobernarán a los fuertes; los pobres tendrán más que los ricos, y los impíos se enaltecerán sobre los valientes.
  revised_footnotes:
  - marker: a
    text: 'O: "Los que eran nada".'
    reason: Preserva la literalidad más estrecha del giro fuente/POB inglés, mientras el texto principal usa un español más natural.
  revision_rationale: Se aplican dos ajustes menores para mejorar la naturalidad del español sin alterar el sentido fuente. Además, se conserva en nota la formulación más literal cercana al inglés auditado.
