translation:
  language: es
  text: Muchos serán entregados en manos de unos pocos. Los que no eran nada[a] gobernarán a los fuertes; los pobres tendrán más que los ricos, y los impíos se enaltecerán sobre los valientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Los que eran nada".'
    reason: Preserva la literalidad más estrecha del giro fuente/POB inglés, mientras el texto principal usa un español más natural.
lexical_decisions:
- source_word: Many
  english_pob_choice: Many will be delivered
  chosen_spanish: Muchos serán entregados
  alternatives_spanish:
  - Serán entregados muchos
  - A muchos se los entregará
  lexicon: muchos / entregar
  rationale: Conserva la pasiva del inglés POB y el sentido de entrega en manos ajenas, con español natural y solemne.
- source_word: the hands of the few
  english_pob_choice: into the hands of the few
  chosen_spanish: en manos de los pocos
  alternatives_spanish:
  - en manos de unos pocos
  - a manos de los pocos
  lexicon: mano / pocos
  rationale: Mantiene la imagen de dominio o control y traduce 'the few' con un sustantivo sustantivado idiomático en español.
- source_word: Those who were nothing
  english_pob_choice: Those who were nothing
  chosen_spanish: Los que eran nada
  alternatives_spanish:
  - Los que no eran nada
  - Los que eran insignificantes
  lexicon: nada
  rationale: Sigue de cerca la fuerza literal del texto y conserva el contraste apocalíptico entre nulidad y poder, sin suavizarlo a una paráfrasis.
- source_word: rule over
  english_pob_choice: will rule over
  chosen_spanish: gobernarán a
  alternatives_spanish:
  - se impondrán sobre
  - dominarán a
  lexicon: gobernar
  rationale: '''Gobernarán a'' preserva la relación de dominio sobre otros de modo claro y sobrio en español.'
- source_word: the strong
  english_pob_choice: the strong
  chosen_spanish: los fuertes
  alternatives_spanish:
  - los poderosos
  - los robustos
  lexicon: fuerte
  rationale: '''Los fuertes'' corresponde de manera directa al contraste social y físico del pasaje.'
- source_word: the poor
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los indigentes
  lexicon: pobre
  rationale: Mantiene el paralelo con 'los ricos' y el sentido socioeconómico evidente del contexto.
- source_word: the rich
  english_pob_choice: the rich
  chosen_spanish: los ricos
  alternatives_spanish:
  - los adinerados
  - los acomodados
  lexicon: rico
  rationale: Traducción directa y contrastiva, adecuada al paralelismo del versículo.
- source_word: the impious
  english_pob_choice: the impious
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los profanos
  lexicon: impío
  rationale: Conserva el término de carga moral-religiosa del original y del POB inglés.
- source_word: the brave
  english_pob_choice: the brave
  chosen_spanish: los valientes
  alternatives_spanish:
  - los heroicos
  - los audaces
  lexicon: valiente
  rationale: '''Valientes'' es el equivalente más natural y fiel para el contraste final.'
theological_decisions:
- issue: Inversion of social status in eschatological judgment
  english_pob_reading: The weak and poor are elevated over the strong and rich; the impious over the brave.
  chosen_spanish_reading: Los que eran nada gobernarán a los fuertes; los pobres tendrán más que los ricos, y los impíos se enaltecerán sobre los valientes.
  alternative_spanish_readings:
  - Los insignificantes gobernarán a los fuertes
  - Los pobres poseerán más que los ricos
  rationale: La formulación conserva el patrón de reversión social y moral sin introducir explicaciones interpretativas ajenas al texto.
  doctrine_reference: Apocalyptic reversal motif; cf. analogous reversal themes in biblical wisdom and prophecy
- issue: Literal force of 'those who were nothing'
  english_pob_reading: Those who were nothing
  chosen_spanish_reading: Los que eran nada
  alternative_spanish_readings:
  - Los que no eran nada
  - Los que eran insignificantes
  rationale: Se preserva la tensión lexical del original, evitando una atenuación que perdería la contundencia del contraste.
  doctrine_reference: Lexical fidelity in apocalyptic humiliation/exaltation imagery
translation_notes:
  revision_awareness: The English POB was revised from 'Those who were nobodies' to 'Those who were nothing' for solemn register and literal Syriac force. The Spanish draft follows the revised reading with a similarly sober, literal expression and avoids colloquial terms.
  spanish_consistency_notes:
  - Se mantiene 'los impíos' para conservar la terminología moral-religiosa uniforme.
  - '''Los fuertes'' y ''los valientes'' se distinguen para reflejar dos términos contrastivos distintos del inglés POB.'
  - No se usa 'Cristo', 'Mesías' ni vocabulario cristológico porque el versículo no lo requiere.
