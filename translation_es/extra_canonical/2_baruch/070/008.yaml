translation:
  language: es
  text: Y cualquiera que escape de la guerra morirá en el terremoto; y cualquiera que escape del terremoto será quemado por el fuego; y cualquiera que escape del fuego perecerá de hambre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: whoever escapes
  english_pob_choice: whoever escapes
  chosen_spanish: cualquiera que escape
  alternatives_spanish:
  - quien escape
  - el que escape
  lexicon: escape
  rationale: La construcción distributiva conserva el valor repetido de sujeto indefinido del original y del inglés POB, sin volverlo genérico abstracto. 'Cualquiera que escape' suena natural en español bíblico moderno.
- source_word: war
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - el combate
  - la batalla
  lexicon: war
  rationale: '''Guerra'' es la correspondencia más directa y amplia para el término de conflicto armado de la secuencia. ''Batalla'' reduciría el alcance; ''combate'' sería menos idiomático aquí.'
- source_word: earthquake
  english_pob_choice: earthquake
  chosen_spanish: el terremoto
  alternatives_spanish:
  - el temblor
  - el sismo
  lexicon: earthquake
  rationale: '''Terremoto'' mantiene el tono solemne y la imagen catastrófica del pasaje. ''Sismo'' es más técnico; ''temblor'' es más coloquial.'
- source_word: burned by fire
  english_pob_choice: burned by fire
  chosen_spanish: será quemado por el fuego
  alternatives_spanish:
  - será abrasado por el fuego
  - será consumido por el fuego
  lexicon: burn
  rationale: '''Quemado por el fuego'' conserva la pasiva y la repetición enfática del elemento destruidor. ''Abrasado'' o ''consumido'' intensificarían o interpretarían más de lo que exige la fuente.'
- source_word: perish by famine
  english_pob_choice: perish by famine
  chosen_spanish: perecerá de hambre
  alternatives_spanish:
  - morirá de hambre
  - perecerá por el hambre
  lexicon: famine
  rationale: El contexto de destrucción final permite 'de hambre' como forma natural y idiomática en español. 'Perecerá por el hambre' es posible, pero menos fluido; 'morirá de hambre' debilita el paralelismo con 'perecerá'.
theological_decisions:
- issue: Secuencia acumulativa de juicios
  english_pob_reading: And whoever escapes from the war will die in the earthquake, and whoever escapes from the earthquake will be burned by fire, and whoever escapes from the fire will perish by famine.
  chosen_spanish_reading: La cadena mantiene el patrón escalonado de juicio sin añadir explicación interpretativa.
  alternative_spanish_readings:
  - La progresión escalonada de castigos...
  - Quien logre escapar...
  rationale: El texto presenta una sucesión de desenlaces inevitables; la traducción debe preservar la acumulación retórica y la repetición, no suavizarla ni moralizarla.
  doctrine_reference: No aplica; es una descripción apocalíptica de juicio sucesivo.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y la coincidencia interrevisores fue alta (acuerdo 1.0). No se aplicaron revisiones adicionales.
  spanish_consistency_notes:
  - Se conservó la repetición de 'cualquiera que escape' para reflejar el paralelismo del original y del POB inglés.
  - Se eligió 'perecerá de hambre' para mantener el registro bíblico y la simetría con 'morirá' / 'será quemado'.
  - No se introdujeron notas textuales ni variantes porque el expediente inglés no documenta tensiones léxicas o textuales en este versículo.
