translation:
  language: es
  text: Y acontecerá que cualquiera que escape y sea librado de todas estas cosas antes mencionadas[a] —tanto los que vencieron como los que fueron vencidos— será entregado en las manos de mi siervo, el Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: “de todas estas cosas”.'
    reason: Alternativa de traducción que refleja la omisión de la cláusula anafórica, conforme a la nota inglesa auditada.
lexical_decisions:
- source_word: “all these things” with relative clause “which were spoken of above”
  english_pob_choice: from all these aforementioned things
  chosen_spanish: de todas estas cosas dichas antes
  alternatives_spanish:
  - de todas estas cosas mencionadas arriba
  - de todas estas cosas antes dichas
  lexicon: adjective clause / referential phrase
  rationale: El ajuste revisado del inglés subraya que no son solo “estas cosas”, sino las ya mencionadas previamente. En español, “dichas antes” conserva la referencia anafórica sin sonar forzado, y evita perder la corrección auditada del texto fuente.
- source_word: servant
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: δοῦλος / servant terminology
  rationale: Aunque aquí el inglés usa “servant”, el sintagma posesivo y el contexto profético permiten “siervo” como equivalente bíblico natural en español. “Esclavo” sería demasiado áspero para esta construcción titulativa, y “servidor” suavizaría en exceso la fuerza del vínculo.
- source_word: Messiah
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  - el Ungido
  lexicon: Χριστός / Messiah title
  rationale: Se mantiene “Mesías” como título, conforme al criterio del proyecto para el lenguaje mesiánico. “Cristo” introduciría una forma más litúrgica que aquí no es necesaria, y “Ungido” explicitaría el sentido pero se alejaría del uso titulado habitual.
theological_decisions:
- issue: Destino de los que escapan y son librados
  english_pob_reading: anyone who escapes and is delivered from all these aforementioned things
  chosen_spanish_reading: cualquiera que escape y sea librado de todas estas cosas dichas antes
  alternative_spanish_readings:
  - cualquiera que escape y sea rescatado de todas estas cosas dichas antes
  - todo el que escape y sea librado de todas estas cosas dichas antes
  rationale: Se conserva la secuencia doble de escape y liberación, sin armonizarla en una sola idea. “Sea librado” respeta la pasiva del original y mantiene la tensión entre escapar y ser entregado/liberado.
  doctrine_reference: Narrativa apocalíptica; juicio y preservación de un remanente
translation_notes:
  revision_awareness: La revisión más reciente corrigió la omisión de la cláusula relativa que equivale a “aforementioned”. Por eso la versión española incluye explícitamente “dichas antes” y ancla la nota a esa expresión para reflejar la alternativa resumida del audit trail anterior.
  spanish_consistency_notes:
  - Se mantiene “Mesías” para el título mesiánico, coherente con la terminología por defecto del proyecto.
  - Se usa “siervo” por el valor bíblico-titular del contexto, no como simple elección estilística.
  - La pasiva “será entregado” conserva la fuerza del pasaje sin reescribirlo en voz activa.
