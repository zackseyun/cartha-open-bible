revisions:
- from: Y acontecerá que cualquiera que escape y sea librado de todas estas cosas dichas antes[a] —tanto los que vencieron como los que fueron vencidos— será entregado en manos de mi siervo, el Mesías.
  to: Y acontecerá que cualquiera que escape y sea librado de todas estas cosas antes mencionadas[a] —tanto los que vencieron como los que fueron vencidos— será entregado en las manos de mi siervo, el Mesías.
  rationale: Se ajusta la expresión anafórica a un español más natural ('antes mencionadas'), se mejora la idiomaticidad con 'en las manos de', y se corrige la nota al pie para que refleje una alternativa de traducción y no una supuesta variante textual.
