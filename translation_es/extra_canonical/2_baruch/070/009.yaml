review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura principal del siríaco según la auditoría inglesa: escape, liberación, inclusión de vencedores y vencidos, y entrega a ''mi siervo, el Mesías''. También preserva la corrección auditada de la cláusula anafórica (''aforementioned''). Sin embargo, ''dichas antes'' suena algo poco natural y la nota al pie no corresponde bien al motivo documentado en inglés (''Or...'' como alternativa de formulación previa, no variante textual).'
  spanish_quality_summary: El texto es comprensible y mayormente digno, pero puede ganar naturalidad con 'antes mencionadas' o 'ya mencionadas'. Además, en español bíblico natural 'entregado en las manos de' es más idiomático que 'entregado en manos de'. La puntuación con raya está bien. La nota debe reformularse para evitar sugerir una variante textual inexistente.
  glossary_alignment: '''el Mesías'' está alineado con la terminología del proyecto. ''mi siervo'' es aceptable aquí como excepción contextual bien justificada frente al valor por defecto más fuerte de ''esclavo''. No hay conflictos con Yahvé, espíritu, gracia u otros términos de glosario. La cláusula ''aforementioned'' debe mantenerse de forma clara en español.'
  issues:
  - severity: medium
    issue: La frase 'dichas antes' es algo forzada en español actual.
    rationale: Aunque conserva el sentido anafórico, 'antes mencionadas' o 'ya mencionadas' suena más natural y claro para lectura eclesial amplia sin perder fidelidad.
  - severity: medium
    issue: La nota al pie está clasificada y formulada de manera inexacta.
    rationale: El inglés auditado dice 'Or “from all these things”' como alternativa de redacción previa, no como 'textual_variant'. En español conviene presentarla como alternativa de traducción, no como variante textual.
  - severity: low
    issue: '''entregado en manos de'' es menos idiomático que ''entregado en las manos de''.'
    rationale: La forma con artículo es más natural en español bíblico y mantiene el mismo sentido.
  revised_spanish_text: Y acontecerá que cualquiera que escape y sea librado de todas estas cosas antes mencionadas[a] —tanto los que vencieron como los que fueron vencidos— será entregado en las manos de mi siervo, el Mesías.
  revised_footnotes:
  - marker: a
    text: 'También puede traducirse: “de todas estas cosas”.'
    reason: Alternativa de traducción que refleja la omisión de la cláusula anafórica, conforme a la nota inglesa auditada.
  revision_rationale: Se ajusta la expresión anafórica a un español más natural ('antes mencionadas'), se mejora la idiomaticidad con 'en las manos de', y se corrige la nota al pie para que refleje una alternativa de traducción y no una supuesta variante textual.
