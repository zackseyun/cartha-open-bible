translation:
  language: es
  text: Cuando aquellas cosas que fueron predichas se hayan cumplido, caerá confusión sobre todos. Unos caerán en la guerra, otros perecerán en tribulaciones, y otros serán destruidos por los suyos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El siríaco de esta cláusula es ambiguo; «por los suyos» puede referirse a sus allegados o a los suyos propios, sin precisar más el sentido.
    reason: lexical_ambiguity
lexical_decisions:
- source_word: foretold
  english_pob_choice: foretold
  chosen_spanish: predichas
  alternatives_spanish:
  - anunciadas de antemano
  - profetizadas
  lexicon: prophesy / foretell
  rationale: «Predichas» comunica de forma natural la idea de eventos anunciados previamente sin forzar un tecnicismo más explícito que el texto español necesita aquí.
- source_word: confusion
  english_pob_choice: confusion
  chosen_spanish: confusión
  alternatives_spanish:
  - consternación
  - desorden
  lexicon: confusion / turmoil
  rationale: Mantengo «confusión» porque conserva el alcance de desconcierto general del original y coincide con la opción inglesa del POB.
- source_word: tribulations
  english_pob_choice: tribulations
  chosen_spanish: tribulaciones
  alternatives_spanish:
  - aflicciones
  - angustias
  lexicon: tribulation / distress
  rationale: «Tribulaciones» preserva el tono bíblico y la correspondencia léxica del POB; «aflicciones» o «angustias» serían más interpretativas.
- source_word: their own
  english_pob_choice: their own
  chosen_spanish: los suyos
  alternatives_spanish:
  - los de ellos
  - por los suyos
  lexicon: their own / by their own
  rationale: 'El giro «por los suyos» refleja la ambigüedad del sintagma final del siríaco y mantiene la tensión: puede aludir a personas cercanas, a los propios allegados o a una causa proveniente de los suyos. «Los suyos» es la forma más breve y publicable en español.'
theological_decisions:
- issue: Alcance de la tercera cláusula final
  english_pob_reading: and some will be destroyed by their own
  chosen_spanish_reading: y otros serán destruidos por los suyos
  alternative_spanish_readings:
  - y otros serán destruidos por los suyos mismos
  - y otros serán destruidos por los propios
  rationale: El audit trail indica que la cláusula omitida debe restaurarse. El siríaco admite una lectura relacionada con ser dañados o destruidos por los propios allegados/propios agentes; la formulación española conserva esa ambigüedad sin resolverla artificialmente.
  doctrine_reference: 2 Baruch 70:6; control backed Syriac reading noted in revision review
translation_notes:
  revision_awareness: 'El borrador inglés revisado restablece la tercera cláusula del versículo, que había quedado omitida en una versión previa. La presente traducción española sigue esa revisión y conserva el encadenamiento completo: guerra, tribulaciones y destrucción por los suyos.'
  spanish_consistency_notes:
  - He evitado traducir mecánicamente desde el inglés cuando el siríaco sugiere ambigüedad en la última cláusula.
  - «Tribulaciones» se mantiene por coherencia con el POB en inglés y por su registro bíblico natural en español.
  - No se emplea «SEÑOR» ni terminología no presente en este versículo.
  - El marcador de nota [a] se ancla en la frase con ambigüedad semántica para señalar la alternativa textual sin romper la lectura fluida.
