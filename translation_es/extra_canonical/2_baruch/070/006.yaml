revisions:
- from: Cuando aquellas cosas que fueron predichas se hayan cumplido, caerá la confusión sobre todo el pueblo. Unos caerán en la guerra, otros perecerán en las tribulaciones, y otros serán destruidos por los suyos.[a]
  to: Cuando aquellas cosas que fueron predichas se hayan cumplido, caerá confusión sobre todos. Unos caerán en la guerra, otros perecerán en tribulaciones, y otros serán destruidos por los suyos.[a]
  rationale: 'Se ajusta el alcance de «all people» con «sobre todos», que evita la restricción implícita de «todo el pueblo». También se suaviza la redacción de la primera cláusula principal y se conserva la ambigüedad de la última mediante una nota más directa. No hace falta adjudicación adicional: la corrección es menor y coherente con la auditoría inglesa.'
