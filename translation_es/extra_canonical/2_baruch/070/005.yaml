translation:
  language: es
  text: Los sabios callarán y los necios hablarán. Entonces no se cumplirá el pensamiento de los hombres, ni el consejo de los fuertes, ni la esperanza de los que esperan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: wise
  english_pob_choice: The wise will be silent
  chosen_spanish: los sabios callarán
  alternatives_spanish:
  - los sabios estarán en silencio
  - los prudentes callarán
  lexicon: wise
  rationale: ‘Sabios’ conserva el contraste de sabiduría/insensatez del texto y mantiene el paralelismo con ‘necios’. ‘Callarán’ comunica la idea de no hablar sin volverlo demasiado interpretativo.
- source_word: foolish
  english_pob_choice: the foolish will speak
  chosen_spanish: los necios hablarán
  alternatives_spanish:
  - los insensatos hablarán
  - los necios dirán
  lexicon: foolish
  rationale: ‘Necios’ reproduce el término bíblico habitual para el polo opuesto de ‘sabios’ y conserva el tono sapiencial del contraste.
- source_word: thought
  english_pob_choice: the thought of men
  chosen_spanish: el pensamiento de los hombres
  alternatives_spanish:
  - el plan de los hombres
  - la intención de los hombres
  lexicon: thought
  rationale: ‘Pensamiento’ sigue de cerca el sustantivo abstracto y deja abierta la gama entre pensamiento, intención y proyecto, como lo hace el inglés POB.
- source_word: counsel
  english_pob_choice: the counsel of the strong
  chosen_spanish: el consejo de los fuertes
  alternatives_spanish:
  - el plan de los poderosos
  - la deliberación de los fuertes
  lexicon: counsel
  rationale: ‘Consejo’ conserva la idea de designio o resolución, y ‘fuertes’ mantiene el adjetivo concreto del texto sin sustituirlo por una categoría interpretativa más amplia.
- source_word: hope
  english_pob_choice: the hope of those who hope
  chosen_spanish: la esperanza de los que esperan
  alternatives_spanish:
  - la esperanza de los que confían
  - la expectativa de los que esperan
  lexicon: hope
  rationale: La repetición en español reproduce el énfasis del original y del inglés POB. ‘Esperanza’ y ‘los que esperan’ conservan la estructura enfática del sintagma.
theological_decisions:
- issue: Paralelismo sapiencial y contraste moral
  english_pob_reading: The wise will be silent and the foolish will speak.
  chosen_spanish_reading: Los sabios callarán y los necios hablarán.
  alternative_spanish_readings:
  - Los sabios guardarán silencio y los necios hablarán
  - Los sabios estarán en silencio y los necios hablarán
  rationale: No hay una controversia doctrinal específica, pero el español debe preservar el paralelismo moral sin añadir contenido. ‘Callarán’ es breve, natural y mantiene el contraste antitético.
  doctrine_reference: Sabiduría bíblica / contraste entre sabios y necios
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés POB vigente fue confirmado con acuerdo alto con el control siríaco.
  spanish_consistency_notes:
  - Se mantiene ‘sabios/necios’ como par antitético estable para el registro sapiencial.
  - Se conserva la repetición de ‘esperanza/esperan’ para reflejar el énfasis del original.
  - No se introducen términos eclesiásticos o doctrinales ajenos al pasaje.
