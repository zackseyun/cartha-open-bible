translation:
  language: es
  text: «Miren bien, vienen días en que el tiempo del mundo ha madurado y ha llegado la siega de la semilla de los malos y de los buenos[a]. Entonces el Poderoso traerá confusión de espíritu y consternación de corazón sobre la tierra, sus habitantes y sus gobernantes.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus semillas malas y buenas».'
    reason: previous_rendering
lexical_decisions:
- source_word: the time of the world has ripened
  english_pob_choice: the time of the world has ripened
  chosen_spanish: el tiempo del mundo habrá madurado
  alternatives_spanish:
  - el tiempo del mundo habrá llegado a madurez
  - el tiempo del mundo estará maduro
  lexicon: tiempo; mundo; madurar
  rationale: Conservo la imagen temporal de maduración con un verbo natural en español. 'Habrá madurado' mantiene el valor de proceso culminado sin volverlo demasiado libre.
- source_word: the harvest of the seed of the evil and the good
  english_pob_choice: the harvest of the seed of the evil and the good
  chosen_spanish: la siega de la semilla de los malos y de los buenos
  alternatives_spanish:
  - la siega de la semilla de los malvados y de los justos
  - la cosecha de la semilla de los malos y de los buenos
  lexicon: siega; semilla; malos; buenos
  rationale: Sigo la revisión auditada que entiende 'evil and good' como sustantivos plurales referidos a personas, no como cualidades de las semillas. 'Semilla' conserva la metáfora agrícola; 'siega' es más sobria y bíblica que 'cosecha' en este contexto.
- source_word: Then the Mighty One will bring confusion of spirit and consternation of heart
  english_pob_choice: Then the Mighty One will bring confusion of spirit and consternation of heart
  chosen_spanish: Entonces el Poderoso traerá confusión de espíritu y consternación de corazón
  alternatives_spanish:
  - Entonces el Poderoso traerá confusión en el espíritu y consternación en el corazón
  - Entonces el Poderoso causará confusión de espíritu y consternación de corazón
  lexicon: Poderoso; confusión de espíritu; consternación de corazón
  rationale: '''El Poderoso'' refleja el título divino con mayúscula y evita reemplazarlo por un término más interpretativo. ''Confusión de espíritu'' y ''consternación de corazón'' reproducen la construcción nominal del original sin diluir el paralelismo.'
theological_decisions:
- issue: Referente de 'the evil and the good' in the genitive phrase
  english_pob_reading: '''the seed of the evil and the good'' (not ''its evil and good seeds'')'
  chosen_spanish_reading: '''la semilla de los malos y de los buenos'''
  alternative_spanish_readings:
  - '''la semilla de las cosas malas y buenas'''
  - '''la semilla de lo malo y de lo bueno'''
  rationale: La revisión del POB corrige una lectura que convertía 'evil' y 'good' en adjetivos de 'seeds'. En español, la solución más fiel y clara es conservar los sustantivos humanos 'malos' y 'buenos', manteniendo el genitivo de pertenencia implícito.
  doctrine_reference: No doctrinal claim beyond preserving the social/moral referent of the Syriac genitives.
- issue: How to render the divine epithet for 'the Mighty One'
  english_pob_reading: the Mighty One
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
  - el Todopoderoso
  - el Fuerte
  rationale: '''El Poderoso'' conserva el epíteto reverente sin añadir un matiz de omnipotencia que el contexto inmediato no explicita. ''Todopoderoso'' sería posible, pero más interpretativo; ''Poderoso'' es más directo.'
  doctrine_reference: General divine epithet; no special doctrinal controversy in this verse.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la frase inglesa desde 'its evil and good seeds' a 'the seed of the evil and the good'. La versión española evita replicar la lectura errónea y preserva el genitivo humano implícito.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el original lo exige explícitamente; aquí no aparece el tetragrámaton.
  - '''Poderoso'' se mantiene con mayúscula como título divino consistente con el estilo POB.'
  - Se prefiere 'siega' para mantener la imaginería agrícola del pasaje y la cadencia bíblica.
  - '''espíritu'' y ''corazón'' se conservan literalmente por el paralelismo semítico; no se explicitan como estados psicológicos modernos.'
