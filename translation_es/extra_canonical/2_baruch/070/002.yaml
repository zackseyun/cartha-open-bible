    issue: La nota al pie no conserva la alternativa textual/documentada del inglés.
    rationale: La nota inglesa dice 'Or its evil and good seeds', es decir, preserva la lectura previa ahora rechazada. La nota española debería reflejar esa alternativa de forma sucinta, no repetir la lectura principal con explicación metalingüística.
  - severity: low
    issue: '''Miren'' suena algo coloquial para un anuncio profético solemne.'
    rationale: Aunque comprensible, 'Miren' puede rebajar el registro. 'Miren bien' o 'Miren' no es grave, pero 'Miren bien' o 'Miren' ajustado a comillas puede sonar más enfático; la opción más natural y digna aquí es 'Miren' o 'Miren bien', con ligera preferencia por una fórmula menos conversacional. Dado el alcance menor, basta una pequeña mejora estilística.
  revised_spanish_text: «Miren bien, vienen días en que el tiempo del mundo ha madurado y ha llegado la siega de la semilla de los malos y de los buenos[a]. Entonces el Poderoso traerá confusión de espíritu y consternación de corazón sobre la tierra, sus habitantes y sus gobernantes.»
  revised_footnotes:
