  revision_rationale: 'Se hizo una reparación menor de estilo y uso léxico: "mutuamente" evita una repetición dura sin alterar la reciprocidad, e "innoble" sustituye a "ignoble" para lograr español más natural y claro, manteniendo el contraste con "ilustre" y la fuerza del inglés POB.'
