  glossary_alignment: No hay términos del glosario principal comprometidos en este versículo. Las decisiones léxicas centrales son aceptables, salvo que "ignoble" debería ajustarse a "innoble" por mejor uso español. "Vil", "honorable" e "ilustre" encajan bien con la lógica del contraste social y moral.
