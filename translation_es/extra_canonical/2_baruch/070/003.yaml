translation:
  language: es
  text: Se odiarán unos a otros y se provocarán mutuamente para pelear; el vil gobernará sobre el honorable, y el innoble será exaltado sobre el ilustre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: They will hate one another
  english_pob_choice: They will hate one another
  chosen_spanish: Se odiarán unos a otros
  alternatives_spanish:
  - Se aborrecerán unos a otros
  - Se odiarán mutuamente
  lexicon: odio / odiarse
  rationale: El verbo refleja con naturalidad el valor fuerte de hostilidad mutua del original y del inglés POB; "unos a otros" conserva la reciprocidad sin volver la frase pesada.
- source_word: provoke one another to fight
  english_pob_choice: provoke one another to fight
  chosen_spanish: se provocarán unos a otros para pelear
  alternatives_spanish:
  - se incitarán unos a otros a pelear
  - se provocarán mutuamente para luchar
  lexicon: provocar / incitar
  rationale: '"Provocar" mantiene la idea de incitación agresiva que el inglés POB presenta. "Pelear" comunica la acción resultante en español común, sin suavizar el conflicto.'
- source_word: the base
  english_pob_choice: the base
  chosen_spanish: el vil
  alternatives_spanish:
  - el bajo
  - el indigno
  lexicon: bajo, vil, indigno
  rationale: '"Vil" preserva el contraste moral/social fuerte que el inglés POB expresó con "base" y funciona en registro bíblico castellano sin sonar arcaico en exceso.'
- source_word: the honorable
  english_pob_choice: the honorable
  chosen_spanish: el honorable
  alternatives_spanish:
  - el honrado
  - el noble
  lexicon: honorable
  rationale: Se conserva "honorable" porque el inglés POB usa el mismo término y en español se entiende bien como contraste de rango o dignidad.
- source_word: the ignoble
  english_pob_choice: the ignoble
  chosen_spanish: el ignoble
  alternatives_spanish:
  - el vil
  - el innoble
  lexicon: ignoble / innoble
  rationale: '"Ignoble" es un cognado útil y preciso en español culto; mantiene la degradación de estatus y carácter que el original contrasta con "illustrious".'
- source_word: the illustrious
  english_pob_choice: the illustrious
  chosen_spanish: el ilustre
  alternatives_spanish:
  - el ilustre y distinguido
  - el esclarecido
  lexicon: ilustre
  rationale: '"Ilustre" reproduce directamente el valor de prestigio y distinción del término, y permite conservar el paralelismo del verso.'
theological_decisions:
- issue: Jerarquía social invertida como juicio de desorden
  english_pob_reading: the base will rule over the honorable, and the ignoble will be exalted over the illustrious
  chosen_spanish_reading: el vil gobernará sobre el honorable, y el ignoble será exaltado sobre el ilustre
  alternative_spanish_readings:
  - el vil dominará sobre el honorable, y el ignoble será puesto por encima del ilustre
  - el bajo gobernará sobre el honorable, y el innoble será exaltado sobre el ilustre
  rationale: 'La traducción conserva la inversión social sin suavizarla: no es solo una descripción neutral, sino una imagen de desorden donde los rangos legítimos quedan subvertidos. "Gobernará sobre" y "será exaltado sobre" mantienen la preposición de superioridad del inglés POB.'
  doctrine_reference: 2 Baruch 70:3; juicio escatológico y reversión del orden social
translation_notes:
  revision_awareness: The latest revision pass reported no changes needed and the cross-check summary indicates high agreement (1.0), so the Spanish draft is aligned directly with the stabilized English POB reading without needing corrective adjustment.
  spanish_consistency_notes:
  - Mantener "el vil" / "el ignoble" como pares diferenciados para reflejar dos matices del contraste original.
  - Conservar el paralelismo sintáctico de dos miembros coordinados unidos por coma y "y".
  - Evitar sustituir "honorable" o "ilustre" por equivalentes más modernos que debiliten el contraste jerárquico del verso.
