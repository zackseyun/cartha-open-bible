translation:
  language: es
  text: Porque toda la tierra devorará a sus habitantes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: the whole earth
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - la tierra entera
  - todo el mundo
  lexicon: tierra
  rationale: El inglés POB conserva el alcance total del sujeto. «Toda la tierra» mantiene esa extensión universal de manera natural en español y evita introducir una lectura más cosmológica o más restringida que el original.
- source_word: devour
  english_pob_choice: devour
  chosen_spanish: devorará
  alternatives_spanish:
  - consumirá
  - se tragará
  lexicon: devorar
  rationale: «Devorar» reproduce la imagen fuerte del verbo y conserva el tono de juicio o destrucción del enunciado. «Consumirá» sería más abstracto; «se tragará» es menos formal y menos estable en registro bíblico.
- source_word: its inhabitants
  english_pob_choice: its inhabitants
  chosen_spanish: a sus habitantes
  alternatives_spanish:
  - a quienes la habitan
  - a sus moradores
  lexicon: habitar
  rationale: «Habitantes» expresa con claridad el complemento del objeto y mantiene el sentido colectivo. «Moradores» es válido pero más literario; «quienes la habitan» añade una estructura explicativa que el original no exige.
theological_decisions:
- issue: Alcance universal del juicio sobre la tierra
  english_pob_reading: For the whole earth will devour its inhabitants.
  chosen_spanish_reading: Porque toda la tierra devorará a sus habitantes.
  alternative_spanish_readings:
  - Porque la tierra entera devorará a sus habitantes.
  - Porque todo el mundo devorará a sus habitantes.
  rationale: La formulación mantiene el sujeto universal sin suavizar la imagen de juicio. No se introduce un sujeto personal ni una paráfrasis causal adicional; simplemente se conserva el alcance total del enunciado.
  doctrine_reference: Juicio divino y lenguaje profético de devastación
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el control cruzado reportó alta concordancia; por eso se mantiene una versión directa y estable, sin notas textuales adicionales.
  spanish_consistency_notes:
  - 'Se preserva el orden semántico básico del inglés POB: sujeto universal + verbo de destrucción + objeto colectivo.'
  - Se evita sustituir la imagen fuerte por un término más débil o interpretativo.
  - El registro es bíblico y sobrio, pero con español natural y publicable.
