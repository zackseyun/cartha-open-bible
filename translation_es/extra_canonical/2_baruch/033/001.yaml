translation:
  language: es
  text: '«¿Son estos los mandatos que tu compañero[a] Jeremías te mandó, diciendo: “Cuiden de este pueblo mientras yo voy y consuelo al resto de nuestros hermanos en Babilonia, los que han caído en cautiverio”? Y ahora, si también tú nos dejas, sería mejor que todos muriéramos antes que tú te apartes de nosotros.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «compañero» traduce el término relacional para Jeremías; no se añade el título «profeta», ausente en el siriaco.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܦܘܩ̈ܕܢܐ
  english_pob_choice: commands
  chosen_spanish: mandamientos
  alternatives_spanish:
  - órdenes
  - mandatos
  lexicon: Payne Smith
  rationale: El sustantivo expresa instrucciones o cargos con fuerza normativa. «Mandamientos» comunica bien esa fuerza en español y conserva el tono solemne del reclamo.
- source_word: ܚܒܪܟ
  english_pob_choice: your companion
  chosen_spanish: tu compañero
  alternatives_spanish:
  - tu asociado
  - tu amigo
  lexicon: Payne Smith
  rationale: El término señala a Jeremías como un cercano colaborador de Baruc. «Compañero» es natural en español y evita suavizar demasiado la relación.
- source_word: ܐܦܝܣ
  english_pob_choice: comfort
  chosen_spanish: consuelo
  alternatives_spanish:
  - ruego
  - animo
  - persuado
  lexicon: Payne Smith
  rationale: La revisión inglesa corrigió «prepare» por «comfort», y el verbo siríaco admite el campo de rogar, persuadir y confortar. En español, «consuelo» expresa mejor la idea de aliviar o confortar a los hermanos en el exilio.
- source_word: ܐܚ̈ܝ
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros hermanos de fe
  - nuestros hermanos
  lexicon: Payne Smith
  rationale: Se conserva la relación fraterna y comunitaria del siriaco. «Hermanos» es el equivalente más directo y natural.
- source_word: ܕܢܦܠܘ ...
  english_pob_choice: those who have fallen into captivity
  chosen_spanish: los que han caído en cautiverio
  alternatives_spanish:
  - los que fueron llevados al cautiverio
  - los cautivos
  lexicon: Payne Smith
  rationale: La lectura inglesa sigue el sentido de exilio/cautiverio. «Han caído en cautiverio» mantiene el matiz de caída bajo servidumbre o destierro sin introducir una paráfrasis más fuerte que la fuente.
- source_word: ܫܪܘܟ
  english_pob_choice: depart from us
  chosen_spanish: te apartes de nosotros
  alternatives_spanish:
  - te vayas de nosotros
  - nos dejes
  lexicon: Payne Smith
  rationale: La revisión inglesa distinguió este cierre de «leave us» en la parte anterior. En español, «apartarte de nosotros» preserva la idea de separación relacional y el tono de abandono.
theological_decisions:
- issue: Ausencia del título «el profeta» para Jeremías
  english_pob_reading: Jeremiah
  chosen_spanish_reading: Jeremías
  alternative_spanish_readings:
  - Jeremías el profeta
  rationale: El siriaco nombra simplemente a Jeremías, sin título. Por fidelidad al testigo fuente, se omite «el profeta».
  doctrine_reference: Principio de equivalencia óptima y control de adiciones no atestiguadas
- issue: Matiz entre «dejar» y «apartarse» en la despedida final
  english_pob_reading: leave us / depart from us
  chosen_spanish_reading: nos dejas / te apartes de nosotros
  alternative_spanish_readings:
  - nos abandonas / te vas de nosotros
  rationale: 'El inglés POB conserva dos matices: salir de la comunidad y apartarse de ella. El español reproduce la diferencia con «dejas» para la primera mitad y «te apartes» para la segunda, evitando homogeneizar ambos verbos.'
  doctrine_reference: Lectura atenta del paralelo retórico y de la progresión emotiva del lamento
- issue: Valor del verbo relativo a los hermanos de Babilonia
  english_pob_reading: comfort the rest of our brothers in Babylon
  chosen_spanish_reading: consuelo a los demás de nuestros hermanos en Babilonia
  alternative_spanish_readings:
  - anime a los demás de nuestros hermanos en Babilonia
  - conforte a los demás de nuestros hermanos en Babilonia
  rationale: La fuente y la revisión inglesa señalan una acción de consolar/animar a los hermanos. «Consuelo» es adecuado y mantiene el vínculo afectivo y pastoral del pasaje.
  doctrine_reference: Semántica del campo de consolación/animación en contexto de exilio
translation_notes:
  revision_awareness: 'Se incorporó la corrección auditada de la revisión inglesa: el verbo corresponde a «consuelo/consolar», no a «preparar»; también se evitó añadir «el profeta» porque la fuente siriaca no lo contiene. El cierre final mantiene la distinción entre dejar y apartarse, y la cláusula sobre Babilonia conserva el sentido de cautiverio.'
  spanish_consistency_notes:
  - Se evitó el calco de «prepare» porque el audit trail corrigió ese punto a «comfort».
  - Se mantuvo una sintaxis sobria y pública, adecuada para un registro bíblico transparente.
  - Los dos verbos de salida se diferenciaron en español para reflejar la progresión emocional del original y del audit trail inglés.
