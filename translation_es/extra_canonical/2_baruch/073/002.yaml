translation:
  language: es
  text: Y entonces descenderá la sanidad en rocío[a], y la enfermedad se retirará, y la tristeza, la angustia y los gemidos huirán de los hijos de los hombres; y habrá alegría en toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «con rocío». La imagen expresa un descenso suave y vivificante, sin exigir identidad literal entre la sanidad y el rocío.
    reason: Preservar mejor la formulación del inglés POB «in dew» y aclarar la imagen poética en español.
lexical_decisions:
- source_word: healing
  english_pob_choice: healing
  chosen_spanish: la sanidad
  alternatives_spanish:
  - la curación
  - el remedio
  lexicon: Syriac equivalent for healing/restoration
  rationale: «Sanidad» comunica el efecto restaurador del término mejor que un calco médico estrecho; conserva la amplitud de sanación física y restauración general implícita en el contexto escatológico.
- source_word: dew
  english_pob_choice: dew
  chosen_spanish: rocío
  alternatives_spanish:
  - llovizna
  - niebla fina
  lexicon: Syriac equivalent for dew
  rationale: «Rocío» es la correspondencia normal y transparente en español para la imagen de descenso suave desde lo alto.
- source_word: sickness
  english_pob_choice: sickness
  chosen_spanish: la enfermedad
  alternatives_spanish:
  - la dolencia
  - el mal
  lexicon: Syriac equivalent for sickness
  rationale: «Enfermedad» mantiene la referencia general a la afección que se va, sin especificar más de lo que el texto permite.
- source_word: grief
  english_pob_choice: grief
  chosen_spanish: la tristeza
  alternatives_spanish:
  - el duelo
  - la aflicción
  lexicon: Syriac equivalent for grief
  rationale: «Tristeza» es un equivalente claro y natural; evita introducir un matiz funerario más fuerte que el del contexto.
- source_word: anguish
  english_pob_choice: anguish
  chosen_spanish: la angustia
  alternatives_spanish:
  - el tormento
  - la aflicción
  lexicon: Syriac equivalent for anguish
  rationale: «Angustia» preserva el peso emocional intenso del término inglés sin forzar una lectura física o legal.
- source_word: groanings
  english_pob_choice: groanings
  chosen_spanish: los gemidos
  alternatives_spanish:
  - los lamentos
  - los suspiros
  lexicon: Syriac equivalent for groanings
  rationale: «Gemidos» conserva el sonido/expresión de dolor que la imagen sugiere, y funciona bien junto a «tristeza» y «angustia».
- source_word: sons of men
  english_pob_choice: sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - la humanidad
  - los mortales
  lexicon: Syriac idiom for humanity
  rationale: Se mantiene la expresión idiomática heredada del original, porque la POB en inglés la conserva y el español la entiende como un semitismo para la humanidad.
- source_word: gladness
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: Syriac equivalent for gladness
  rationale: «Alegría» es la opción más natural y amplia en español; no añade un registro devocional más específico que no exige el texto.
theological_decisions:
- issue: Alcance de la sanidad prometida
  english_pob_reading: healing will descend in dew, and sickness will withdraw
  chosen_spanish_reading: la sanidad descenderá como rocío, y la enfermedad se retirará
  alternative_spanish_readings:
  - la curación descenderá como rocío
  - la salud descenderá como rocío
  rationale: La formulación conserva la imagen poética de una sanidad que viene de manera suave y abundante, sin restringirla a un mero acto médico puntual.
  doctrine_reference: Eschatological restoration and healing imagery in prophetic/apocalyptic texts
translation_notes:
  revision_awareness: La versión inglesa final fue revisada y quedó sin cambios; no se documentan variantes textuales ni notas en el audit trail, así que el español se construye directamente desde el testimonio siríaco controlado y la traducción inglesa auditada, preservando el paralelismo y la imagen poética.
  spanish_consistency_notes:
  - Se usa «sanidad» y no «salud» para conservar el matiz de restauración/healing del original.
  - Se mantiene «los hijos de los hombres» como semitismo transparente, coherente con el registro del POB.
  - Se conserva la coordinación acumulativa de aflicciones con «tristeza, angustia y gemidos» para reflejar el ritmo enumerativo del verso.
