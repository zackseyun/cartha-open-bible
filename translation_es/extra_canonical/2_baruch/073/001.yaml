translation:
  language: es
  text: Y sucederá que, después de abatir todo lo que hay en el mundo y sentarse en paz para siempre sobre el trono de su reino, entonces se revelará la alegría y aparecerá el reposo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܕܪ̈ܚܡܐ ܘܬܘܟܠܢܐ ܕܥܒܕܐ
  english_pob_choice: joy ... rest
  chosen_spanish: la alegría ... el reposo
  alternatives_spanish:
  - el gozo ... el descanso
  - la alegría ... el descanso
  lexicon: Payne Smith
  rationale: El paralelismo favorece sustantivos breves y solemnes. 'Reposo' conserva el matiz de quietud estable que el contexto escatológico requiere, mientras 'alegría' traduce con naturalidad la manifestación de gozo.
- source_word: ܘܠܘܬܝܗܘܢ ܚܕ ܐܠܐ ܚܕ ܒܩܘܒܥܐ
  english_pob_choice: has brought low everything that is in the world
  chosen_spanish: ha humillado todo lo que hay en el mundo
  alternatives_spanish:
  - ha abatido todo lo que hay en el mundo
  - ha sometido todo lo que hay en el mundo
  lexicon: Payne Smith
  rationale: El verbo apunta a rebajar/abatir; 'humillado' conserva la idea de poner bajo. 'Todo lo que hay en el mundo' sigue de cerca el alcance universal del giro y evita acotarlo indebidamente.
- source_word: ܘܠܐܬܢܝܡܘܢ
  english_pob_choice: rest
  chosen_spanish: el reposo
  alternatives_spanish:
  - el descanso
  - la quietud
  lexicon: Payne Smith
  rationale: El término no es mero alivio momentáneo sino un estado duradero de paz. 'Reposo' es más solemne y bíblico en español, y evita reducir el sentido a simple relajación.
theological_decisions:
- issue: Identidad del soberano entronizado
  english_pob_reading: the reign of the Messiah over his kingdom
  chosen_spanish_reading: el rey mesiánico entronizado en su reino
  alternative_spanish_readings:
  - el Mesías sobre su reino
  - un reinado final e indefinido
  rationale: El contexto inmediato de 2 Baruc 72 sitúa la escena en el tiempo del Mesías, por lo que conviene mantener esa lectura sin volverla vaga. En español, 'rey mesiánico' comunica la función regia sin añadir terminología no exigida por esta línea.
  doctrine_reference: 2 Baruc 72–73; lectura escatológica mesiánica
- issue: Alcance de la humillación previa
  english_pob_reading: after he has brought low everything that is in the world
  chosen_spanish_reading: después de haber humillado todo lo que hay en el mundo
  alternative_spanish_readings:
  - después de haber abatido todo lo que hay en el mundo
  - después de haber sometido todo lo que hay en el mundo
  rationale: La frase describe una reducción universal del orden presente antes de la paz final. 'Humillado' mantiene el valor de rebajar sin forzar un sentido exclusivamente político o militar.
  doctrine_reference: Escatología restaurativa en 2 Baruc
translation_notes:
  revision_awareness: Se siguió la revisión final inglesa que afina la frase como 'everything that is in the world' y mantiene 'joy'/'rest' como clausura de la primera unidad. No se incorporaron las secciones posteriores del contexto auditado porque el encargo pide solo 2 Baruc 73:1.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo exigiera; aquí no aparece.
  - Se evitó 'Cristo' porque el pasaje no usa Χριστός en esta línea y la audiencia de 2 Baruc se beneficia de 'mesiánico' como descriptor contextual.
  - Se mantuvo un registro solemne pero contemporáneo, con sintaxis directa y sin arcaísmos innecesarios.
