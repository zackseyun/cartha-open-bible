review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la línea tal como la fijó el POB inglés para 73:1: una secuencia futura después de que el soberano haya abatido todo lo que hay en el mundo, se siente en paz sobre el trono de su reino, y entonces se manifiesten alegría y reposo. Sin embargo, el español puede ajustarse ligeramente para reflejar mejor el matiz perfectivo y la naturalidad del encadenamiento temporal.'
  spanish_quality_summary: El texto es claro, digno y legible. La sintaxis general funciona, pero 'después de haber humillado' suena algo pesada y 'humillado' puede sugerir afrenta moral más que abatimiento/sometimiento escatológico. Un ajuste mínimo mejora la naturalidad y la precisión semántica sin apartarse del audit trail.
  glossary_alignment: 'No hay términos del glosario mayor en conflicto. La elección ''alegría'' y ''reposo'' es adecuada. La principal cuestión léxica es ܘܠܘܬܝܗܘܢ... / la acción de poner bajo todo lo del mundo: en español ''abatido'' preserva mejor el sentido de reducción/sometimiento que ''humillado'' en este contexto.'
  issues:
  - severity: medium
    issue: '''humillado'' puede sonar demasiado moral o psicológica'
    rationale: El contexto escatológico apunta a abatir/someter todo lo que hay en el mundo antes del reinado en paz, no necesariamente a avergonzarlo o humillarlo en sentido interpersonal.
  - severity: low
    issue: 'Encadenamiento verbal algo pesado: ''después de haber ... y de haberse sentado'''
    rationale: En español bíblico moderno suena más fluido 'después de abatir ... y sentarse ...', sin pérdida de sentido ni de solemnidad.
  - severity: low
    issue: Coma antes de 'y aparecerá el reposo' innecesaria
    rationale: 'La coordinación final fluye mejor sin esa pausa, manteniendo el paralelismo: ''se revelará la alegría y aparecerá el reposo''.'
  revised_spanish_text: Y sucederá que, después de abatir todo lo que hay en el mundo y sentarse en paz para siempre sobre el trono de su reino, entonces se revelará la alegría y aparecerá el reposo.
  revision_rationale: 'Revisión menor para mejorar precisión léxica y naturalidad española: ''abatir'' refleja mejor la idea de poner bajo o rebajar todo lo que hay en el mundo; además, se aligera la sintaxis verbal y se limpia la puntuación final sin cambiar el contenido.'
