  rationale: 'Revisión menor para mejorar precisión léxica y naturalidad española: ''abatir'' refleja mejor la idea de poner bajo o rebajar todo lo que hay en el mundo; además, se aligera la sintaxis verbal y se limpia la puntuación final sin cambiar el contenido.'
