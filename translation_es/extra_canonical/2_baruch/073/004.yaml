translation:
  language: es
  text: Y los juicios, y las acusaciones, y las contiendas, y las represalias, y el derramamiento de sangre, y los deseos, y la envidia, y el odio, y todo lo semejante a ellas pasarán a la condenación cuando sean quitadas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: judgments
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - fallos
  lexicon: juicio
  rationale: El siríaco enumera actos/realidades de juicio dentro de la serie de males que cesan; 'juicios' conserva la amplitud semántica del inglés POB y funciona en español sin forzar una lectura exclusivamente judicial o exclusivamente ética.
- source_word: accusations
  english_pob_choice: accusations
  chosen_spanish: acusaciones
  alternatives_spanish:
  - denuncias
  - reproches
  lexicon: acusación
  rationale: '''Acusaciones'' sigue de cerca la idea de cargos o imputaciones y mantiene el paralelismo nominal de la lista.'
- source_word: contentions
  english_pob_choice: contentions
  chosen_spanish: contiendas
  alternatives_spanish:
  - disputas
  - pleitos
  lexicon: contienda
  rationale: '''Contiendas'' es un equivalente español digno y estable para disputas o querellas, manteniendo el tono enumerativo.'
- source_word: retaliations
  english_pob_choice: retaliations
  chosen_spanish: represalias
  alternatives_spanish:
  - venganzas
  - retribuciones
  lexicon: represalia
  rationale: '''Represalias'' conserva la fuerza de una respuesta retributiva o vengativa sin reducirla a un solo matiz.'
- source_word: bloodshed
  english_pob_choice: bloodshed
  chosen_spanish: derramamiento de sangre
  alternatives_spanish:
  - homicidio
  - matanza
  lexicon: derramamiento de sangre
  rationale: La locución española reproduce la imagen concreta del original y del inglés POB, evitando estrechar el sentido sólo a asesinato.
- source_word: desires
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - apetitos
  - ansias
  lexicon: deseo
  rationale: '''Deseos'' mantiene la amplitud moral de la lista sin introducir una especificación psicológica no atestiguada por el contexto inmediato.'
- source_word: envy
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: envidia
  rationale: '''Envidia'' es el equivalente directo y más transparente en español para el vicio nombrado en la serie.'
- source_word: hatred
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - aborrecimiento
  lexicon: odio
  rationale: '''Odio'' es la correspondencia natural en español y preserva el tono moral de la enumeración.'
- source_word: everything like these
  english_pob_choice: everything like these
  chosen_spanish: todo lo semejante a estas cosas
  alternatives_spanish:
  - todo lo parecido a ellas
  - todo cuanto sea de esta clase
  lexicon: semejante
  rationale: La construcción mantiene la cláusula inclusiva del original sin añadir elementos; 'estas cosas' ayuda a referir la serie previa con claridad en español.
- source_word: will pass away into condemnation
  english_pob_choice: will pass away into condemnation
  chosen_spanish: pasarán a la condenación
  alternatives_spanish:
  - desaparecerán en condenación
  - pasarán a la sentencia de condena
  lexicon: condenación
  rationale: '''Pasarán a la condenación'' conserva la dirección resultativa del inglés POB y el sentido de destino judicial sin sobreexplicar el mecanismo.'
- source_word: when they are removed
  english_pob_choice: when they are removed
  chosen_spanish: cuando sean quitados
  alternatives_spanish:
  - cuando sean eliminados
  - cuando se los aparte
  lexicon: quitar
  rationale: '''Ser quitados'' reproduce la pasiva del original y mantiene la idea de remoción o retirada sin especificar agente cuando el texto no lo hace.'
theological_decisions:
- issue: Destino judicial de la lista de males
  english_pob_reading: These realities do not merely cease; they pass into condemnation when removed.
  chosen_spanish_reading: Estas realidades pasarán a la condenación cuando sean quitadas.
  alternative_spanish_readings:
  - Estas realidades desaparecerán cuando sean quitadas.
  - Estas realidades terminarán en condena cuando sean quitadas.
  rationale: La formulación española preserva que el final de estas prácticas está ligado a un juicio/condena, no sólo a su desaparición. 'Condenación' mantiene la carga judicial del inglés POB.
  doctrine_reference: Escatología moral y juicio final en la literatura apocalíptica judía
- issue: Enumeración de vicios y prácticas hostiles
  english_pob_reading: A catalog of social and moral evils is listed without sharpening any single term beyond the source.
  chosen_spanish_reading: Se conserva una enumeración amplia y paralela de males sociales y morales.
  alternative_spanish_readings:
  - Se interpreta la lista como una serie de delitos concretos.
  - Se reduce la lista a conflictos interpersonales.
  rationale: Se evita estrechar la lista a una sola categoría ética o legal. El español mantiene el paralelismo y la amplitud semántica del testimonio siríaco y del inglés POB.
  doctrine_reference: Lectura literaria y semántica de listas viciosas en apocalíptica judía
translation_notes:
  revision_awareness: No applied revisions are recorded in the English audit trail; the latest revision pass marked the English text unchanged and the cross-check status is high agreement, so the Spanish draft follows the established English reading without introducing new variants.
  spanish_consistency_notes:
  - Se mantuvo 'condenación' para traducir el valor judicial resultativo de 'into condemnation'.
  - Se prefirió 'ser quitados' para conservar la pasiva y la no especificación del agente.
  - La lista se dejó en serie nominal con 'y' repetida para reflejar el ritmo enumerativo del texto fuente.
