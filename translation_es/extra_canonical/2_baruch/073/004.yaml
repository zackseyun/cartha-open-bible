review_pass:
  verdict: revise
  source_alignment_summary: 'La traducción española sigue de cerca la enumeración del inglés POB y preserva bien la secuencia de males y la clausura judicial final. Sin embargo, hay un problema de concordancia en español: el antecedente compuesto y mayormente femenino de la serie exige "quitadas", no "quitados". Además, "todo lo semejante a estas cosas" es comprensible pero algo rígido; una formulación más natural y fiel al tono enumerativo en español es "todo lo semejante a ellas".'
  spanish_quality_summary: 'El borrador es generalmente claro, digno y legible. La lista nominal funciona bien en español. La principal corrección necesaria es gramatical: "cuando sean quitados" no concuerda naturalmente con la serie enumerada. También conviene aligerar la frase inclusiva final para mejorar fluidez sin perder sentido.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los términos elegidos —"juicios", "acusaciones", "contiendas", "represalias", "derramamiento de sangre", "envidia", "odio", "condenación"— son apropiados y conservan el valor del inglés POB. No se detectan problemas con nombres divinos o títulos mesiánicos en este versículo.
  issues:
  - severity: medium
    issue: Discordancia de género/número en "cuando sean quitados"
    rationale: La serie enumerada refiere realidades mayormente femeninas y se resume en "estas cosas"; en español, la concordancia natural de la pasiva perifrástica aquí es "quitadas".
  - severity: low
    issue: Rigidez estilística en "todo lo semejante a estas cosas"
    rationale: La frase es inteligible, pero suena más pesada de lo necesario. "Todo lo semejante a ellas" conserva la referencia anafórica y mejora la naturalidad del español eclesial moderno.
  revised_spanish_text: Y los juicios, y las acusaciones, y las contiendas, y las represalias, y el derramamiento de sangre, y los deseos, y la envidia, y el odio, y todo lo semejante a ellas pasarán a la condenación cuando sean quitadas.
  revision_rationale: Se corrige la concordancia gramatical de la cláusula final cambiando "quitados" por "quitadas". También se mejora la naturalidad de la referencia inclusiva con "todo lo semejante a ellas", sin alterar el sentido ni la estructura enumerativa del original auditado.
