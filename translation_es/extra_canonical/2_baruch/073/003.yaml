    issue: Orden sintáctico poco natural en «ni sobrevendrá repentinamente [a] ninguna enfermedad»
    rationale: Aunque comprensible, la frase suena algo forzada en español bíblico moderno. Reordenar a «ni ninguna enfermedad sobrevendrá repentinamente» o similar mejora la legibilidad sin cambiar el sentido.
  - severity: low
    issue: «Ninguno» es menos idiomático que «nadie»
    rationale: Ambos son correctos, pero «nadie» es la opción más natural y ampliamente legible en español neutral para una negación absoluta de persona.
