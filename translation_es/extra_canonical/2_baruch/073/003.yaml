translation:
  language: es
  text: Y nadie morirá de nuevo antes de su tiempo, ni ninguna enfermedad sobrevendrá repentinamente.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ninguna cosa repentina sucederá»; el audit trail revisado favorece aquí «enfermedad» por el sustantivo subyacente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ܟܘܪܚܢܐ / kurhana
  english_pob_choice: any sickness happen suddenly
  chosen_spanish: enfermedad
  alternatives_spanish:
  - dolencia
  - mal
  lexicon: N/A
  rationale: El ajuste del audit trail corrige la omisión previa y exige reflejar el sustantivo de enfermedad/dolencia; «enfermedad» es la opción más clara y natural en español.
- source_word: ܒܫܠܝܐ / b-shelya
  english_pob_choice: suddenly
  chosen_spanish: repentinamente
  alternatives_spanish:
  - de repente
  - súbitamente
  lexicon: N/A
  rationale: La evidencia auditada indica valor adverbial; «repentinamente» conserva la noción de ocurrencia súbita sin convertirla en modificador de «cualquier cosa».
- source_word: die before his time
  english_pob_choice: will again die before his time
  chosen_spanish: morirá de nuevo antes de su tiempo
  alternatives_spanish:
  - morirá antes de su tiempo
  - volverá a morir antes de su tiempo
  lexicon: N/A
  rationale: «De nuevo» reproduce el alcance reiterativo de la cláusula inglesa y mantiene la idea de muerte prematura sin añadir interpretación extra.
theological_decisions:
- issue: Muerte prematura y enfermedad súbita en el horizonte escatológico
  english_pob_reading: no one will again die before his time, nor will any sickness happen suddenly
  chosen_spanish_reading: Y ninguno morirá de nuevo antes de su tiempo, ni sobrevendrá repentinamente ninguna enfermedad.
  alternative_spanish_readings:
  - Y nadie volverá a morir antes de su tiempo, ni ninguna enfermedad aparecerá de repente.
  - Y ninguno morirá antes de su tiempo, ni ninguna enfermedad vendrá súbitamente.
  rationale: 'Se mantiene la doble afirmación del texto: cese de muerte prematura y ausencia de irrupción súbita de enfermedad; no se suaviza ni se espiritualiza el enunciado.'
  doctrine_reference: Esperanza escatológica de restauración y paz final en 2 Baruc
translation_notes:
  revision_awareness: El borrador anterior seguía la lectura antigua «anything sudden come to pass», pero el registro de revisión la corrigió a una lectura con sustantivo explícito de enfermedad y valor adverbial de «repentinamente». Esta versión incorpora esa corrección de forma visible y auditada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece.
  - «Repentinamente» se emplea como adverbio, coherente con la revisión textual.
  - La negación doble en español se ajusta a la sintaxis natural sin cambiar el sentido del original.
