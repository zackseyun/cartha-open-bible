  yaml_path: translation/extra_canonical/2_baruch/053/001.yaml
  text: 'And when I had said these things, I slept there, and I saw a vision by night. And behold, I saw a cloud ascending from the great sea, and it was full of white and black waters, and there were many colors in those waters, and at its head there appeared the likeness of a great lightning. And I looked, and that cloud passed swiftly in a violent rush and covered the whole earth. And after this, waters began to descend from it upon the earth, and I saw that the appearance of those waters was not one and the same. And after these things again I saw black, and after these things again bright, again black, and again bright. And this happened up to twelve times, but in all of them the black were more than the bright.


    And it came to pass, at the end of the cloud, that black waters, darker than all the former waters, descended, and there was a mingling in them, and wherever those waters descended they produced devastation and destruction. And after these things I saw the lightning that I had seen at the head of the cloud, and it seized it and shook it over all the earth. And after this I saw, and behold, twelve rivers [Footnote: Or *twelve lights*] were ascending from the sea, and they surrounded that lightning and became subject to it, and they rejoiced over that proclamation and praised it. And I awoke because of my fear.'
  footnotes:
  - marker: a
    text: Or 'twelve rivers'.
    reason: previous_rendering
  - marker: b
    text: Or 'rejoiced over it and praised it'.
    reason: previous_rendering
