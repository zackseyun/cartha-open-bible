translation:
  language: es
  text: 'Y cuando hube dicho estas cosas, dormí allí, y vi una visión de noche. Y he aquí, vi una nube que subía desde el gran mar, y estaba llena de aguas blancas y negras, y en esas aguas había muchos colores, y en su parte superior apareció la semejanza de un gran relámpago. Y miré, y aquella nube pasó rápidamente con ímpetu violento y cubrió toda la tierra. Y después de esto comenzaron a descender de ella aguas sobre la tierra, y vi que la apariencia de aquellas aguas no era la misma. Y otra vez, después de estas cosas, vi aguas negras, y después de estas cosas otra vez aguas brillantes, otra vez negras y otra vez brillantes. Y esto sucedió hasta doce veces, pero en todas ellas las negras eran más que las brillantes.


    Y aconteció que, al final de la nube, descendieron aguas negras, más oscuras que todas las aguas anteriores, y hubo mezcla en ellas, y dondequiera que aquellas aguas descendían producían devastación y destrucción. Y después de estas cosas vi el relámpago que había visto en la parte superior de la nube, y se apoderó de ella y la sacudió sobre toda la tierra. Y después de esto vi, y he aquí, doce ríos[a] subían del mar, y rodearon a aquel relámpago y se sometieron a él, y se alegraron por esa proclamación y la alabaron. Y desperté a causa de mi temor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «doce luces».'
    reason: textual_variant
lexical_decisions:
- source_word: ܥܢܢܐ
  english_pob_choice: cloud
  chosen_spanish: nube
  alternatives_spanish:
  - nube de tormenta
  lexicon: Payne Smith; Brockelmann
  rationale: Es el término normal para ܥܢܢܐ. En español, «nube» conserva la imagen sin añadir más especificación que no exige el siriaco; «nube de tormenta» sería una ampliación interpretativa.
- source_word: ܩ̈ܝܐ
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - lluvias
  - aguaceros
  lexicon: Payne Smith
  rationale: El texto siriaco usa plural con valor de corrientes/caídas de agua dentro de la visión. «Aguas» conserva mejor la materialidad del símbolo que «lluvias», que en español fijaría demasiado el sentido meteorológico.
- source_word: ܐܘܟܡܐ
  english_pob_choice: black
  chosen_spanish: negras
  alternatives_spanish:
  - oscuras
  - negras y oscuras
  lexicon: Payne Smith
  rationale: Se conserva la oposición básica con «brillantes». En español, «negras» mantiene la fuerza visual y la simetría del contraste.
- source_word: ܢܗܝܪܐ
  english_pob_choice: bright
  chosen_spanish: brillantes
  alternatives_spanish:
  - luminosas
  - resplandecientes
  lexicon: Payne Smith
  rationale: «Brillantes» reproduce el contraste léxico con «negras» y evita sobrecargar la imagen con un matiz técnico de luminosidad que el contexto no requiere.
- source_word: ܒܪܩܐ
  english_pob_choice: lightning
  chosen_spanish: relámpago
  alternatives_spanish:
  - rayo
  - fulgor
  lexicon: Payne Smith
  rationale: La visión compara algo en la cabeza de la nube con un gran relámpago. «Relámpago» es idiomático en español y conserva el carácter de fulgor súbito; se evita «rayo» por ser menos preciso como imagen visual aquí.
- source_word: ܡܣܬܝܟܐ
  english_pob_choice: covered
  chosen_spanish: cubrió
  alternatives_spanish:
  - se extendió sobre
  - oversombreó
  lexicon: Payne Smith
  rationale: El verbo expresa expansión sobre la tierra. «Cubrió» es el equivalente natural en español y conserva la totalidad del alcance sin introducir una metáfora distinta.
- source_word: ܒܪܗܛܐ ܩܫܝܐ
  english_pob_choice: with a violent rush
  chosen_spanish: con un impulso violento
  alternatives_spanish:
  - con carrera violenta
  - con gran rapidez y violencia
  lexicon: Payne Smith
  rationale: La expresión intensifica velocidad y fuerza. «Impulso violento» transmite el dinamismo sin sonar rígido en español; «carrera» puede sugerir agencia demasiado personal.
- source_word: ܚܫܘܟܝܢ
  english_pob_choice: dark
  chosen_spanish: oscuras
  alternatives_spanish:
  - negras
  - tenebrosas
  lexicon: Payne Smith
  rationale: En la frase comparativa «más oscuras que todas las aguas anteriores», el español fluye mejor con «oscuras». Aquí se mantiene la tensión con «negras» del resto del pasaje sin perder la intensificación.
- source_word: ܐܒܕܢܐ
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: Payne Smith
  rationale: «Destrucción» es el valor directo y transparente de ܐܒܕܢܐ. Se acompaña con «devastación» para reproducir la doble acumulación del siriaco y del audit trail inglés.
- source_word: ܐܚܕ ... ܘܐܬܚܬ
  english_pob_choice: seized ... and shook it
  chosen_spanish: se apoderó de ella y la sacudió
  alternatives_spanish:
  - la agarró y la sacudió
  - la tomó y la sacudió
  lexicon: Payne Smith
  rationale: El audit trail revisado eliminó ampliaciones no sustentadas y conservó una acción de dominio físico. «Se apoderó de ella» reproduce la toma con fuerza; «la sacudió» mantiene el movimiento violento sin añadir «la sacó de la nube».
- source_word: ܢܗ̈ܪܐ / ܢܘܗ̈ܪܐ
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - luces
  lexicon: Payne Smith; comparative with Kmosko Latin
  rationale: Se sigue la lectura de control y la decisión auditada a favor de «rivers». En español, «ríos» es natural y preserva la imagen de algo que asciende desde el mar; la alternativa «luces» queda reservada para nota por la variante.
- source_word: ܩܪܘܙܐ
  english_pob_choice: proclamation
  chosen_spanish: proclamación
  alternatives_spanish:
  - anuncio
  - heraldo
  lexicon: Payne Smith
  rationale: Se conserva el sustantivo abstracto del audit trail. «Proclamación» permite mantener el complemento «por aquella proclamación» sin transformar el objeto en pronombre genérico.
- source_word: ܐܫܬܠܛ
  english_pob_choice: exercised dominion
  chosen_spanish: se sometieron a él
  alternatives_spanish:
  - dominaron
  - ejercieron dominio
  lexicon: Payne Smith; control Latin “dominatum est”
  rationale: 'Aquí el español del texto refleja el resultado de la relación de dominio: los ríos se someten al relámpago. Esta formulación evita introducir un verbo de soberanía que el tramo conservado no demanda explícitamente en español, manteniendo la subordinación implícita del audit trail.'
theological_decisions:
- issue: No interpretar simbólicamente las aguas negras y brillantes dentro del versículo.
  english_pob_reading: Leave the imagery uninterpreted in ch. 53; render symbols plainly as seen.
  chosen_spanish_reading: Dejar la imaginería sin identificación histórica en este versículo y traducir lo visto de manera directa.
  alternative_spanish_readings:
  - Identificar las aguas con épocas históricas específicas en la traducción
  - Introducir glosas explicativas dentro del texto
  rationale: El propio libro desarrolla la interpretación más adelante. En esta sección conviene no anticipar la exégesis y respetar el orden revelado del pasaje.
  doctrine_reference: Principio de progresión interna del texto apocalíptico; evitar sobreinterpretación en el nivel de traducción.
- issue: Lectura de 'doce ríos' frente a 'doce luces'.
  english_pob_reading: 'twelve rivers [Footnote: Or ''twelve lights'']'
  chosen_spanish_reading: doce ríos, con nota sobre la variante 'doce luces'.
  alternative_spanish_readings:
  - doce luces
  - doce corrientes
  rationale: La evidencia de control favorece 'ríos', pero la variante sigue siendo relevante y debe quedar visible. La nota mantiene la transparencia textual sin debilitar la lectura principal.
  doctrine_reference: Transparencia textual y crítica de variantes; preservación de lecturas alternativas cuando la evidencia lo requiere.
translation_notes:
  revision_awareness: 'La base inglesa fue revisada para eliminar expansiones no sustentadas y para ajustar la sintaxis a un calco más cercano al siriaco en puntos clave: ''at its head'', ''at the end of the cloud'', la secuencia de aguas negras y brillantes, y la relación de los ríos con el relámpago. La traducción española sigue esa versión revisada y conserva la advertencia de variante textual en ''doce ríos''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Relámpago'' se usa de manera constante para בְּרָק/ܒܪܩܐ, evitando alternar innecesariamente con ''rayo''.'
  - '''Negras'' y ''brillantes'' se conservan como pareja contrastiva principal; ''oscuras'' aparece solo en la comparación intensiva donde el español lo requiere.'
  - '''Proclamación'' se conserva para ܩܪܘܙܐ y no se reduce a un pronombre, preservando la decisión lexical auditada.'
  - La nota al pie usa un marcador único y está anclada en el sintagma correspondiente del texto.
