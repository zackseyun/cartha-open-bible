review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el siriaco y el audit trail inglés en la secuencia de la visión: nube, aguas blancas y negras, alternancia de negras/brillantes hasta doce veces, aguas finales más oscuras, devastación, relámpago, y doce ríos con variante en nota. También preserva correctamente «proclamación». Sin embargo, hay varios puntos de ajuste: «en su cabeza» suena menos natural y preciso que «en su parte superior» o «a su cabeza» para el referente de la nube; la frase «vi negras ... brillantes» omite el sustantivo y queda demasiado elíptica en español; «con un impulso violento» es comprensible pero menos fiel al matiz de curso/ímpetu violento; y «se alegraron por aquella proclamación» puede mejorarse a «por esa proclamación» para fluidez. El sentido global no se pierde, pero conviene una reparación menor para mayor fidelidad y legibilidad.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta algunas construcciones algo rígidas o calcadas: «una sola y la misma», la elipsis de «aguas» en la alternancia, y «en su cabeza». La nota textual está bien anclada y formulada. El registro es apropiado para una Biblia de lectura eclesial, pero una revisión leve mejora naturalidad sin alejarse del origen.'
  glossary_alignment: 'No hay conflictos con la terminología marco del proyecto. Las decisiones léxicas principales son adecuadas: «nube», «aguas», «negras», «brillantes», «relámpago», «devastación y destrucción», «ríos», «proclamación». La variante «doce luces» se conserva correctamente en nota. No aparecen términos sensibles del glosario general (Yahvé, Mesías, esclavo, etc.) en este versículo.'
  issues:
  - severity: medium
    issue: Elipsis excesiva en «vi negras ... brillantes».
    rationale: En inglés y siriaco el contraste puede sostenerse por el contexto, pero en español repetir «aguas» mejora claridad y evita que «negras/brillantes» parezcan referentes ambiguos.
  - severity: low
    issue: «En su cabeza» suena poco idiomático para una nube.
    rationale: Aunque calca el inglés, en español bíblico-natural «en su parte superior» o «a su cabeza» comunica mejor la imagen visual sin perder fidelidad.
  - severity: low
    issue: «Con un impulso violento» debilita el matiz de movimiento impetuoso/curso violento.
    rationale: «Con ímpetu violento» o «en una carrera violenta» refleja mejor el dinamismo del siriaco y del audit trail.
  - severity: low
    issue: «Una sola y la misma» es calco poco natural.
    rationale: «No era una misma» o «no era igual» suena más idiomático en español sin cambiar el sentido.
