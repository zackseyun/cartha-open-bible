translation:
  language: es
  text: 'Y el Señor respondió y me dijo: «Con el Altísimo no hay cómputo de muchos años ni de pocos años. Porque, ¿qué le aprovechó a Adán haber vivido novecientos treinta años, si transgredió lo que se le había mandado? Así, la multitud de tiempo que vivió no le benefició, sino que trajo muerte y acortó los años de los que nacieron de él. ¿Y qué le faltó a Moisés porque vivió solo ciento veinte años? Porque estaba sujeto al que lo formó, acercó la ley a la descendencia de Jacob y encendió una lámpara para el pueblo de Israel».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܥܢܐ ... ܘܐܡܪ
  english_pob_choice: answered and said
  chosen_spanish: respondió y me dijo
  alternatives_spanish:
  - me dijo
  - respondió
  lexicon: Payne Smith
  rationale: El siríaco incluye dos verbos; en español, 'respondió y me dijo' conserva la respuesta explícita sin volver la frase pesada. 'Me dijo' solo perdería el matiz de réplica, y 'respondió' solo podría sonar incompleto.
- source_word: ܡܪܝܐ
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: equivalencia contextual del POB para esta obra extra canónica
  rationale: En el contexto de esta sección, el audit trail inglés usa 'the Lord'. En español, 'el Señor' reproduce esa forma discursiva directa y mantiene la voz del diálogo; no se introduce 'Yahvé' aquí porque el testimonio fuente disponible y el POB inglés no documentan un reclamo explícito del nombre divino en esta línea.
- source_word: ܡܢܝܗܝ
  english_pob_choice: reckoning
  chosen_spanish: cómputo
  alternatives_spanish:
  - recuento
  - cálculo
  lexicon: Payne Smith
  rationale: 'El contraste es cuantitativo y casi contable: muchos años / pocos años. ''Cómputo'' conserva la idea de contar o hacer cuenta sin sonar mecánico ni jurídico en exceso.'
- source_word: ܙܒܘ̈ܢܝ / ܫ̈ܢܝܗܝ
  english_pob_choice: many years or few years
  chosen_spanish: muchos años ni de pocos años
  alternatives_spanish:
  - muchos años ni pocos años
  - mucho tiempo ni poco tiempo
  lexicon: Payne Smith
  rationale: La oposición temporal se mantiene con una formulación natural en español. 'Ni de pocos años' refleja el paralelismo del original y la negación inclusiva de la cláusula.
- source_word: ܡܘܬܪܐ
  english_pob_choice: profit / benefit
  chosen_spanish: aprovechó / benefició
  alternatives_spanish:
  - sirvió
  - tuvo ganancia
  lexicon: Payne Smith
  rationale: El argumento es moral y retórico; 'aprovechó' en la pregunta y 'benefició' en la conclusión reproducen el valor de utilidad del término sin comercializarlo.
- source_word: ܡܒܣܪܝܢ
  english_pob_choice: kindled
  chosen_spanish: encendió
  alternatives_spanish:
  - prendió
  - avivó
  lexicon: Payne Smith
  rationale: Con 'lámpara' en el mismo miembro, 'encendió' es la opción más clara y natural en español para la imagen de iluminación reveladora.
- source_word: ܢܣܘܒܘܬ ܒܪܢܫܐ ܕܒܣܘܪ
  english_pob_choice: the people of Israel
  chosen_spanish: el pueblo de Israel
  alternatives_spanish:
  - la descendencia de Israel
  - la raza de Israel
  lexicon: Payne Smith
  rationale: La referencia es colectiva y nacional. 'El pueblo de Israel' es la forma más transparente en español y conserva la dimensión comunitaria del original.
theological_decisions:
- issue: Valor salvífico de la duración de la vida
  english_pob_reading: The chapter teaches that length of life has no saving value apart from obedience.
  chosen_spanish_reading: La duración de la vida no tiene valor por sí misma ante Dios si falta la obediencia.
  alternative_spanish_readings:
  - La longevidad no aprovecha sin obediencia.
  - El tiempo vivido no salva por sí mismo.
  rationale: El contraste con Adán y Moisés indica que la mera extensión de años no justifica ni salva; el texto pone el peso en la obediencia y en el propósito de Dios.
  doctrine_reference: obediencia, juicio divino y valor relativo de la longevidad
- issue: Imagen de la lámpara de Moisés
  english_pob_reading: The lamp imagery refers to Moses bringing revelatory guidance through the law to Israel.
  chosen_spanish_reading: La lámpara alude a la función reveladora de la ley que Moisés acercó a Israel.
  alternative_spanish_readings:
  - La lámpara se refiere a Moisés como ejemplo.
  - La lámpara simboliza la guía moral dada a Israel.
  rationale: En el miembro final aparecen juntos 'la ley' y 'una lámpara'; por eso conviene conservar ambos elementos y no reducir la imagen solo a Moisés o solo a la ley.
  doctrine_reference: revelación, ley mosaica y guía para Israel
translation_notes:
  revision_awareness: Se incorporó la revisión que exige 'respondió y me dijo' al inicio, en lugar de una simple fórmula de habla. También se evitó una nota a pie sin anclaje, corrigiendo el problema de validación anterior.
  spanish_consistency_notes:
  - Se mantuvo 'el Señor' para ܡܪܝܐ, coherente con el audit trail inglés de esta línea y con el estilo discursivo del pasaje.
  - Se eligió 'cómputo' para expresar la noción de reckoning sin perder la fuerza comparativa entre muchos y pocos años.
  - '''Lámpara'' se conservó literalmente para respetar la imagen de iluminación unida a la ley.'
  - '''Pueblo de Israel'' mantiene el alcance colectivo del cierre sin introducir un tecnicismo étnico innecesario.'
