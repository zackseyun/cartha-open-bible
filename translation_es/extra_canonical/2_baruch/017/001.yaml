  yaml_path: translation/extra_canonical/2_baruch/017/001.yaml
  text: And the Lord answered and said to me, “With the Most High there is no reckoning of many years or few years. For what did it profit Adam that he lived nine hundred and thirty years, yet transgressed what had been commanded him? So the multitude of time that he lived did not benefit him, but brought death and cut short the years of those born from him. And what did Moses lack because he lived only one hundred and twenty years? Because he was subject to the one who formed him, he brought the law near to the offspring of Jacob and kindled a lamp for the people of Israel.”
  footnotes:
