translation:
  language: es
  text: y también en mi oración. Y ustedes también han aprendido de ellos los mandamientos de esta carta, y serán subyugados en excelencia[a], las naciones para la promesa; y serán amados, y serán consolados, no sea que caigan y sean atormentados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula siriaca desde «serán subyugados en excelencia» hasta «las naciones para la promesa» es difícil y probablemente refleja un texto transmitido con corrupción o una lectura muy incierta. Por eso se conserva una versión cercana a la formulación recibida, sin convertirla en una interpretación conjetural como «serán fortalecidos para gobernar».
    reason: textual_difficulty
lexical_decisions:
- source_word: ܒܒܥܘܬܝ
  english_pob_choice: in my prayer also
  chosen_spanish: en mi oración también
  alternatives_spanish:
  - en mi petición también
  - y en mi súplica
  lexicon: Payne Smith
  rationale: El término siriaco admite oración, petición o súplica. “Oración” es la opción natural y amplia en español, y “también” conserva el enlace continuativo con la mención anterior.
- source_word: ܝܠܦܬܘܢ
  english_pob_choice: you also have learned
  chosen_spanish: han aprendido también
  alternatives_spanish:
  - aprenden también
  - deben ser instruidos también
  lexicon: Payne Smith
  rationale: El verbo expresa recibir instrucción o aprender. En español, “han aprendido” refleja el matiz de haber recibido y retenido la enseñanza, manteniendo el tono exhortativo del cierre.
- source_word: ܡܢܗܘܢ
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - por ellos
  - de estas cosas
  lexicon: Payne Smith
  rationale: El referente permanece algo abierto en el tramo de solapamiento. “De ellos” conserva la transparencia del siriaco y deja abierto si el antecedente son los instructores o el contenido previo.
- source_word: ܦܘ̈ܩܕܢܐ
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - las instrucciones
  lexicon: Payne Smith
  rationale: El término denota mandatos o preceptos con fuerza autoritativa. “Mandamientos” preserva mejor el registro de exhortación y pacto que “instrucciones”.
- source_word: ܡܠܬܐ ܕܦܪܨܘܦܝ
  english_pob_choice: of this letter
  chosen_spanish: de esta carta
  alternatives_spanish:
  - de esta epístola
  - de esta carta escrita
  lexicon: Payne Smith
  rationale: La frase remite a la carta misma; “carta” es la opción más directa y clara en español, sin introducir un tono demasiado eclesiástico.
- source_word: ܘܬܬܟܦܘܢ
  english_pob_choice: you will be subdued in excellence
  chosen_spanish: serán subyugados en excelencia
  alternatives_spanish:
  - serán sometidos en excelencia
  - serán doblegados en excelencia
  lexicon: Payne Smith
  rationale: El siriaco, tal como está transmitido, no apoya “fortalecidos” ni “para gobernar”. Se conserva la idea difícil de ser “subyugados/sometidos”, y se mantiene la ambigüedad interpretativa de la cláusula.
- source_word: ܠܡܘܠܟܢܐ
  english_pob_choice: the nations for the promise
  chosen_spanish: las naciones para la promesa
  alternatives_spanish:
  - las naciones de la promesa
  - las naciones por la promesa
  lexicon: Payne Smith
  rationale: Se sigue la lectura del control revisado que entiende ܡܘܠܟܢܐ como “promesa”, no como raíz de reinar. En español, “para la promesa” conserva la rareza sintáctica del pasaje sin normalizarla en exceso.
- source_word: ܬܬܪܚܡܘܢ
  english_pob_choice: you will be loved
  chosen_spanish: serán amados
  alternatives_spanish:
  - serán queridos
  - recibirán amor
  lexicon: Payne Smith
  rationale: El pasivo simple es natural en español y preserva la promesa de favor afectivo sin explicitar más de lo que el siriaco ofrece.
- source_word: ܬܬܢܚܡܘܢ
  english_pob_choice: you will be comforted
  chosen_spanish: serán consolados
  alternatives_spanish:
  - serán alentados
  - recibirán consuelo
  lexicon: Payne Smith
  rationale: “Consolados” mantiene el valor pastoral y bíblico habitual de consuelo, cercano al siriaco y más sobrio que una paráfrasis.
- source_word: ܬܦܠܘܢ
  english_pob_choice: you fall
  chosen_spanish: caigan
  alternatives_spanish:
  - caigan en ello
  - se aparten
  lexicon: Payne Smith
  rationale: El verbo expresa caer o tropezar. “Caigan” respeta la imagen breve y directa del texto.
- source_word: ܬܫܬܢܩܘܢ
  english_pob_choice: be tormented
  chosen_spanish: sean atormentados
  alternatives_spanish:
  - sean afligidos
  - sufran tormento
  lexicon: Payne Smith
  rationale: “Atormentados” reproduce el sentido de sufrimiento intenso sin añadir especificación doctrinal o escatológica que el verso no desarrolla.
theological_decisions:
- issue: Cláusula textual difícil sobre el destino de los destinatarios
  english_pob_reading: you will be subdued in excellence, the nations for the promise
  chosen_spanish_reading: serán subyugados en excelencia, las naciones para la promesa
  alternative_spanish_readings:
  - serán fortalecidos para gobernar a las naciones con excelencia
  - serán sometidos en excelencia, para la promesa
  rationale: La tradición textual aquí parece inestable y el siriaco transmitido es áspero. Se evita suavizar el problema con una solución doctrinalmente atractiva pero no sustentada. La traducción conserva la dificultad y la rareza del pasaje.
  doctrine_reference: Principio de cautela textual y transparencia en variantes
translation_notes:
  revision_awareness: Se incorporó la revisión que corrige la antigua expansión interpretativa de la cláusula difícil; también se sincronizó la decisión léxica con el estado revisado del texto (“han aprendido”).
  spanish_consistency_notes:
  - Se usa “carta” para ܐܓܪܬܐ y no “epístola”, por claridad contemporánea.
  - Se mantiene “mandamientos” para ܦܘ̈ܩܕܢܐ por su fuerza normativa.
  - Se conserva el pasivo en las promesas finales para respetar la sintaxis y el paralelismo del siriaco.
  - El segmento oscuro se marca con nota para no ocultar la incertidumbre textual.
