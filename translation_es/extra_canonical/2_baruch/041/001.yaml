  text: 'And I said, “For whom and for how many will these things be? And who will be counted worthy to see that time?[a]

    But I will speak with you of all that I think, and I will ask of you concerning those of your people whom I have seen in great number, who withdrew from your covenant and cast from themselves the yoke of your law.

    But others again I have seen who left their vanity[b] and fled beneath your wings.

    What then will happen to these? Or how will that last time receive them?

    Or will the time of these perhaps be weighed, and as the balance inclines, so will they be judged?”'
