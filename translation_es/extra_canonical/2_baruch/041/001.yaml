translation:
  language: es
  text: 'Y yo dije: «¿Para quién y para cuántos serán estas cosas? ¿Y quién será hallado digno de ver aquel tiempo?[a]


    Pero hablaré contigo de todo lo que pienso, y te preguntaré acerca de aquellos de tu pueblo que he visto en gran número, que se apartaron de tu pacto y se quitaron de encima el yugo de tu ley.


    Pero también he visto a otros que dejaron su vanidad[b] y huyeron bajo tus alas.


    ¿Qué ocurrirá entonces con estos? ¿O cómo los recibirá aquel último tiempo?


    ¿O acaso será pesado el tiempo de estos, y, conforme se incline la balanza, así serán juzgados?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión “ser hallado digno” traduce una valoración de merecimiento o aptitud para contemplar ese tiempo, sin suavizar la idea de dignidad ante el juicio divino.
    reason: theological_note
  - marker: b
    text: “Vanidad” mantiene el sentido de vaciedad moral y espiritual; también puede entenderse como ilusión o falsedad, pero se conserva el término más cercano al campo semántico señalado por el control textual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܩܝܡܐ / ܩܝܡ̈ܐ (OCR-corrupt in Ceriani line)
  english_pob_choice: your covenant
  chosen_spanish: tu pacto
  alternatives_spanish:
  - tus promesas
  - tus compromisos de pacto
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: En este contexto apocalíptico judío, “pacto” comunica mejor la relación de alianza que el simple valor de “promesas” o “compromisos”. Mantiene además la fuerza covenantal que el audit trail inglés señaló para el siriaco problemático.
- source_word: ܢܡܘܣܐ
  english_pob_choice: law
  chosen_spanish: tu ley
  alternatives_spanish:
  - tu instrucción
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: “Ley” conserva la fuerza normativa y de alianza del término, y reproduce la expresión idiomática “yugo de tu ley” de modo natural en español.
- source_word: ܡܘܒܠܐ / locally uncertain phrase
  english_pob_choice: their vanity
  chosen_spanish: su vanidad
  alternatives_spanish:
  - su vacío
  - su ilusión
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: “Vanidad” conserva el matiz moral-espiritual de vacío o falsedad sin suavizarlo. También mantiene la correspondencia con el control latino indicado por el audit trail.
- source_word: ܓܢܦ̈ܐ / phrase preserved by control witness
  english_pob_choice: beneath your wings
  chosen_spanish: bajo tus alas
  alternatives_spanish:
  - bajo tu protección
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: Se conserva la imagen concreta del refugio divino. “Bajo tu protección” explicaría el sentido, pero perdería la metáfora bíblica que el POB inglés decidió retener.
- source_word: ܡܬܬܚܒܘ / balance-weighing expression (OCR-uncertain)
  english_pob_choice: be weighed
  chosen_spanish: será pesando
  alternatives_spanish:
  - será medido
  - será evaluado
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: La imagen está ligada a la balanza, así que “pesando” mantiene el campo semántico de ponderación/juzgamiento. La formulación conserva la tensión metafórica sin convertirla en una explicación abstracta.
theological_decisions:
- issue: El destino de los que se apartaron y de los que regresaron bajo las alas divinas
  english_pob_reading: The chapter leaves the matter as an open question placed before God, rather than resolving it in advance.
  chosen_spanish_reading: El pasaje deja la cuestión abierta delante de Dios, sin resolverla antes de la respuesta del capítulo siguiente.
  alternative_spanish_readings:
  - Una resolución anticipada y más categórica ya en este versículo
  - Una sentencia final explícita sobre ambos grupos
  rationale: 'La secuencia conserva la tensión narrativa: Baruc pregunta por el modo en que el tiempo final recibirá a estos grupos, y la respuesta completa continúa después. No conviene cerrar aquí una cuestión que el texto todavía mantiene abierta.'
  doctrine_reference: 2 Baruc 41–42 (continuidad narrativa y juicio final)
- issue: La imagen de refugio 'bajo tus alas'
  english_pob_reading: A literal metaphor of divine refuge is retained.
  chosen_spanish_reading: Se mantiene una metáfora literal de refugio divino.
  alternative_spanish_readings:
  - una paráfrasis como 'bajo tu protección'
  - una explicación moralizante del regreso
  rationale: 'La metáfora tiene peso teológico: el retorno no es solo reforma ética, sino huida al amparo de Dios. Traducirla literalmente preserva su textura bíblica y su resonancia devocional.'
  doctrine_reference: Sal 17:8; 36:7; 91:4
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés con sus decisiones ya consolidadas: covenant/pacto, law/ley, vanity/vanidad, beneath your wings/bajo tus alas y be weighed/ser juzgados mediante la imagen de la balanza. También se preservó la estructura interrogativa y la apertura del problema narrativo, sin anticipar la resolución del capítulo siguiente. La única adaptación estilística relevante fue volver más natural en español la transición discursiva entre preguntas y afirmaciones, manteniendo el paralelismo del original.'
  spanish_consistency_notes:
  - Se usó “Y yo dije” para mantener el inicio narrativo y la conexión con la intervención previa de Baruc.
  - “Tu pacto” y “tu ley” conservan el paralelismo covenantal del original.
  - “Bajo tus alas” se mantuvo literal por coherencia con la metáfora bíblica y con el criterio inglés auditado.
  - La pregunta final se dejó con la imagen de la balanza para no neutralizar el juicio implícito.
  - Se evitó “Cristo” o “Mesías” porque este versículo no los requiere.
  - Se evitó “SEÑOR” como sustituto de un nombre divino, ya que el texto aquí usa segunda persona directa en español.
