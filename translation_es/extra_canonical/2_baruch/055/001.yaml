    changes_summary: 'Revised several phrases for closer Syriac alignment and more natural formal English: changed “Man” to “Son of man,” “before you were formed” to “before you were created,” clarified “these things that are to come,” replaced the unclear clause about what was not shown with “from what until what,” rendered testimony as “for righteousness,” adjusted “many kinds” to “a multitude,” restored sitting “on the chariot of a cloud,” and refined the closing line to “works and labors are preserved … acted well/wickedly.”'
translation:
  language: es
  text: 'Y aconteció que, cuando yo estaba orando, pronunciando las primeras palabras de esta oración, me turbé y temblé; y meditaba sobre la descendencia humana: cuántos son los que se han ido, y cuán pocos los que son guardados. Y mientras consideraba estas cosas, oí una voz que me decía:


    «Hijo de hombre, ¿por qué te turbas, y por qué te alarmas? Porque antes de que fueras creado, eras conocido por mí, y antes de que salieras del vientre de tu madre, me fuiste prometido. Y por eso te fueron mostradas[a] estas cosas que han de venir».


    Y yo le dije: «Señor, tú me has mostrado la multitud de los tiempos, y lo que ha sucedido en ellos; pero no me has mostrado cuánto durará[c]. Por tanto, te ruego que me sea dado oír acerca de los que han dado testimonio por la justicia, cuál es la recompensa que les está reservada». Y una multitud de cosas buenas y de cosas malas que vienen me fue prometida, y entonces subí al monte.


    Y sucedió, después de siete días, que llegué a aquel lugar donde había una fuente. Y mientras estaba sentado allí, fui llevado sobre un carro de nube[b] —no en el cuerpo, y yo no lo sabía—. Y se me mostró un misterio, y oí una voz que me decía: «Mira y entiende cómo, en este mundo, sus obras y sus labores son guardadas, las de los que han obrado bien y las de los que han obrado mal».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse: «se te mostraron estas cosas que han de venir».'
    reason: alternative_rendering
  - marker: b
    text: 'O: «fui llevado sobre la carroza de una nube».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «desde qué hasta qué»; es decir, «cuánto durará».'
    reason: literal_clarification
lexical_decisions:
- source_word: ܙܪܥܗ ܕܐܢܫܐ
  english_pob_choice: seed of humankind
  chosen_spanish: semilla del género humano
  alternatives_spanish:
  - descendencia de la humanidad
  - linaje humano
  - simiente de la humanidad
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Conservo la metáfora de 'seed' con un sustantivo natural en español ('semilla'), y 'género humano' evita reducirlo a un varón individual.
- source_word: ܡܬܕܘܕ
  english_pob_choice: troubled
  chosen_spanish: me turbó el ánimo
  alternatives_spanish:
  - me turbó
  - me inquietó
  - me perturbó
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Refleja una turbación interior sin volverla excesivamente psicológica; 'el ánimo' hace natural el español.
- source_word: ܡܬܪܗܒ
  english_pob_choice: afraid / alarmed
  chosen_spanish: me alarmas
  alternatives_spanish:
  - temes
  - te asustas
  - te sobresaltas
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: En el paralelismo con 'te turbas', 'alarmas' conserva el segundo matiz de temor/alarma.
- source_word: ܬܬܒܪܐ
  english_pob_choice: were created / were formed
  chosen_spanish: fueras creado
  alternatives_spanish:
  - fueras formado
  - fueras hecho
  - fueras modelado
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: '''Creado'' es idiomático en español y mantiene la idea de ser constituido antes de nacer; se evita una inferencia metafísica añadida.'
- source_word: ܐܬܝܕܥܬ ܠܝ
  english_pob_choice: you were known to me
  chosen_spanish: tú me eras conocido
  alternatives_spanish:
  - yo te conocía
  - tú eras conocido por mí
  - te conocí
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: La forma pasiva/dativa del siríaco se conserva mejor con 'me eras conocido', cercano a la sintaxis original y al valor de conocimiento personal.
- source_word: ܐܬܚܘܝܬ
  english_pob_choice: these things that are to come were shown to you
  chosen_spanish: te fueron mostradas
  alternatives_spanish:
  - te han sido mostradas
  - te fueron reveladas
  - se te mostraron
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Corrige la lectura activa y sigue el valor pasivo/reflexivo del siríaco; 'mostradas' mantiene el paralelismo con la revelación.
- source_word: ܡܢ ܐܝܕܐ ܥܕܡܐ ܠܐܝܕܐ
  english_pob_choice: how long it will be / from what until what
  chosen_spanish: desde qué hasta qué
  alternatives_spanish:
  - cuánto durará
  - de qué tiempo a qué tiempo
  - desde qué momento hasta qué momento
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Respeta la estructura interrogativa del siríaco y mantiene abierta la duración temporal sin forzar una sola paráfrasis.
- source_word: ܬܘܪܨܐ
  english_pob_choice: for righteousness
  chosen_spanish: por la justicia
  alternatives_spanish:
  - por la rectitud
  - por la justicia de Dios
  - por lo recto
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Aquí el contexto de testimonio pide el valor ético/covenantal de 'justice'; 'por la justicia' conserva la fuerza de la expresión.
- source_word: ܐܫܬܘܕܝܘ
  english_pob_choice: were promised / were made known
  chosen_spanish: me fue prometida
  alternatives_spanish:
  - me fue dada a conocer
  - me fue revelada
  - me fue anunciada
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: 'Sigo la revisión que corrigió la glosa activa previa: el contexto de promesa futura hace natural ''fue prometida'', sin perder el matiz revelatorio.'
- source_word: ܡܪܟܒܬܐ ܕܥܢܢܐ
  english_pob_choice: chariot of a cloud
  chosen_spanish: carroza de una nube
  alternatives_spanish:
  - carro de una nube
  - carroza de nube
  - carro celestial
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: '''Carroza'' comunica la imagen apocalíptica en español con dignidad, y ''de una nube'' mantiene el genitivo literal del siríaco.'
- source_word: ܐܬܢܣܒܬ
  english_pob_choice: I was taken up
  chosen_spanish: fui tomado
  alternatives_spanish:
  - fui llevado
  - fui arrebatado
  - fui levantado
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: '''Fui tomado'' conserva la pasiva breve del original; el contexto de visión aclara el sentido de elevación sin añadir interpretación.'
- source_word: ܪܐܙܐ
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  - revelación
  - arcano
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: '''Misterio'' preserva el registro apocalíptico y la ambigüedad revelatoria del término siríaco.'
- source_word: ܢܬܢܛܪܘܢ
  english_pob_choice: are kept
  chosen_spanish: son guardadas
  alternatives_spanish:
  - son preservadas
  - son custodiadas
  - son conservadas
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: '''Guardadas'' conserva el posible matiz de custodia para juicio y suena natural en español.'
- source_word: ܥܒܕܝ̈ܗܘܢ / ܥܡܠܝ̈ܗܘܢ
  english_pob_choice: their deeds / their labors
  chosen_spanish: sus obras y sus labores
  alternatives_spanish:
  - sus hechos y sus trabajos
  - sus actos y sus fatigas
  - sus obras y su esfuerzo
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Mantengo la distinción lexical entre actos y esfuerzo, con 'obras' y 'labores' como pareja transparente en español.
- source_word: ܐܢܫܝܢ ܕܫܦܝܪ / ܐܢܫܝܢ ܒܝܫܐܝܬ
  english_pob_choice: of those who have acted well / of those who have acted wickedly
  chosen_spanish: de los que han obrado bien / de los que han obrado mal
  alternatives_spanish:
  - de los que hicieron el bien / de los que hicieron el mal
  - de los que actuaron rectamente / de los que actuaron perversamente
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: '''Obrado bien/mal'' reproduce el contraste moral sin sobrecargar con categorías forenses que el siríaco aquí no explicita.'
theological_decisions:
- issue: Conocimiento previo y elección divina del vidente
  english_pob_reading: before you were created, you were known to me ... you were promised to me
  chosen_spanish_reading: antes de que fueras creado, tú me eras conocido ... antes de que salieras del vientre de tu madre, tú me fuiste prometido
  alternative_spanish_readings:
  - yo te conocía ... yo te había prometido
  - antes de que fueras formado, tú me eras conocido
  rationale: La traducción conserva la afirmación de conocimiento personal y promesa divina sin convertirla automáticamente en una fórmula profética ajena al pasaje.
  doctrine_reference: Presciencia y vocación divina
- issue: Visión y transporte de Baruc
  english_pob_reading: I was taken up on the chariot of a cloud—not in the body, and I did not know it
  chosen_spanish_reading: fui tomado en la carroza de una nube —no en el cuerpo, y sin saberlo yo—
  alternative_spanish_readings:
  - fui arrebatado en la carroza de una nube
  - fui levantado en la carroza de una nube
  rationale: Se mantiene la aclaración explícita de que no fue una traslación corporal, sino una experiencia visionaria.
  doctrine_reference: Naturaleza de la revelación visionaria
- issue: Valor de la pregunta 'from what until what'
  english_pob_reading: how long it will be / from what until what
  chosen_spanish_reading: desde qué hasta qué
  alternative_spanish_readings:
  - cuánto durará
  - de qué tiempo a qué tiempo
  rationale: La pregunta queda abierta como consulta sobre el lapso temporal, sin forzar una cronología más precisa que la del texto.
  doctrine_reference: Apocalíptica y tiempo revelado
- issue: Recompensa de los testigos por la justicia
  english_pob_reading: those who have borne witness for righteousness
  chosen_spanish_reading: los que han dado testimonio por la justicia
  alternative_spanish_readings:
  - los que han testificado por la rectitud
  - los mártires por la justicia
  rationale: Evito restringir 'borne witness' a un término técnico posterior; 'por la justicia' conserva el horizonte ético-religioso del pasaje.
  doctrine_reference: Testimonio justo y recompensa
- issue: Obras y labores guardadas
  english_pob_reading: their works and their labors are preserved/kept
  chosen_spanish_reading: sus obras y sus labores son guardadas
  alternative_spanish_readings:
  - son preservadas
  - quedan reservadas
  rationale: No cierro el sentido a simple archivo ni a castigo inmediato; la fórmula deja abierta la custodia divina para evaluación.
  doctrine_reference: Responsabilidad y juicio
translation_notes:
  revision_awareness: 'He atendido las correcciones del control: el siríaco favorece lectura pasiva en ܐܬܚܘܝܬ, la cláusula temporal final debe quedar como una pregunta abierta sobre duración, y la escena de la nube debe situar la toma mientras Baruc estaba sentado allí, no ya sentado en la carroza. También ajusté el lenguaje de ''testimonio por la justicia'' y mantuve la ambigüedad de ''guardadas'' para obras y labores. Las notas a/b/c están ancladas en el texto y corresponden a alternativas reales o aclaración literal.'
  spanish_consistency_notes:
  - Usé 'Yahvé' no porque aparezca en este versículo, sino como norma editorial del proyecto; aquí el hablante es 'Señor'.
  - Mantuve 'Hijo de hombre' como vocativo directo, en consonancia con el original y la revisión inglesa.
  - '''Carroza de una nube'' preserva la imagen apocalíptica sin sustituirla por un equivalente más interpretativo.'
  - '''Guardadas'' deja abierta la tensión entre preservación, custodia y registro, como pide el audit trail.'
