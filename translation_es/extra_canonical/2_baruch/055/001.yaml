  yaml_path: translation/extra_canonical/2_baruch/055/001.yaml
  text: 'And it happened, when I was praying, speaking the first words of this prayer, that I was disturbed and I trembled; and I was reflecting on the seed of humankind—how many are those who have gone, and how few are those who are kept. And as I was considering these things, I heard a voice that said to me:


    “Son of man, why are you troubled, and why are you alarmed? For before you were created, you were known to me, and before you came forth from your mother’s womb, you were promised to me. And for this reason these things that are to come were shown to you.”


    And I said to him, “Lord, you have shown me the multitude of the times, and what has happened in them; but you have not shown me how long it will be. Therefore I ask that I may hear concerning those who have borne witness for righteousness, what is the reward kept for them.” And a multitude of good things and of evil things that are coming was promised to me, and then I went up to the mountain.


    And it came to pass, after seven days, that I came to that place where there was a spring. And as I was sitting there, I was taken up on the chariot of a cloud—not in the body, and I did not know it. And a mystery was shown to me, and I heard a voice that said to me: “See and know how, in this world, their works and their labors are preserved, of those who have acted well and of those who have acted wickedly.”'
  footnotes:
  - marker: a
    text: Or 'I have shown you these things that are to come.'.
    reason: previous_rendering
  - marker: b
    text: Or 'And as I was sitting there on the chariot of a cloud, I was taken up'.
    reason: previous_rendering
  - marker: c
    text: Or 'from what until what'.
    reason: previous_rendering
