revisions:
- from: 'Y aconteció que, cuando yo estaba orando, al comenzar las primeras palabras de esta oración, me turbó el ánimo y temblé; y meditaba sobre la semilla del género humano: cuántos son los que se han ido, y cuán pocos los que son guardados. Y mientras consideraba estas cosas, oí una voz que me decía:


    «Hijo de hombre, ¿por qué te turbas, y por qué te alarmas? Porque antes de que fueras creado, tú me eras conocido, y antes de que salieras del vientre de tu madre, tú me fuiste prometido[a]. Y por eso te fueron mostradas[b] estas cosas que han de venir».


    Y yo le dije: «Señor, tú me has mostrado la multitud de los tiempos, y lo que ha sucedido en ellos; pero no me has mostrado desde qué hasta qué[c]. Por tanto, te ruego que me sea dado oír acerca de los que han dado testimonio por la justicia, cuál es la recompensa que les está reservada». Y una multitud de cosas buenas y de cosas malas que vienen me fue prometida, y entonces subí al monte.


    Y sucedió, después de siete días, que llegué a aquel lugar donde había una fuente. Y mientras estaba sentado allí, fui tomado en la carroza de una nube —no en el cuerpo, y sin saberlo yo—. Y se me mostró un misterio, y oí una voz que me decía: «Mira y entiende cómo, en este mundo, sus obras y sus labores son guardadas, las de los que han obrado bien y las de los que han obrado mal».'
  to: 'Y aconteció que, cuando yo estaba orando, pronunciando las primeras palabras de esta oración, me turbé y temblé; y meditaba sobre la descendencia humana: cuántos son los que se han ido, y cuán pocos los que son guardados. Y mientras consideraba estas cosas, oí una voz que me decía:


    «Hijo de hombre, ¿por qué te turbas, y por qué te alarmas? Porque antes de que fueras creado, eras conocido por mí, y antes de que salieras del vientre de tu madre, me fuiste prometido. Y por eso te fueron mostradas[a] estas cosas que han de venir».


    Y yo le dije: «Señor, tú me has mostrado la multitud de los tiempos, y lo que ha sucedido en ellos; pero no me has mostrado cuánto durará[c]. Por tanto, te ruego que me sea dado oír acerca de los que han dado testimonio por la justicia, cuál es la recompensa que les está reservada». Y una multitud de cosas buenas y de cosas malas que vienen me fue prometida, y entonces subí al monte.


    Y sucedió, después de siete días, que llegué a aquel lugar donde había una fuente. Y mientras estaba sentado allí, fui llevado sobre un carro de nube[b] —no en el cuerpo, y yo no lo sabía—. Y se me mostró un misterio, y oí una voz que me decía: «Mira y entiende cómo, en este mundo, sus obras y sus labores son guardadas, las de los que han obrado bien y las de los que han obrado mal».'
  rationale: Se revisa para mejorar fidelidad funcional y naturalidad española sin alejarse del siríaco ni del rastro POB auditado. Se sustituye «desde qué hasta qué» por «cuánto durará» en el texto principal y se conserva la literalidad en nota; se cambia «carroza» por «carro» y «fui tomado en» por «fui llevado sobre» para expresar mejor el ascenso visionario; se simplifica «me turbó el ánimo» a «me turbé»; se mejora «semilla del género humano» a «descendencia humana» para legibilidad; y se corrige la nota de «mostradas», eliminando la alternativa engañosa sobre «prometido».
