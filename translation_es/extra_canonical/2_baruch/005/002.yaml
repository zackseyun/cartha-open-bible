review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del verso: la permanencia eterna del nombre y la gloria divinos, y la idea de que el juicio/justicia divina conserva su derecho en el tiempo señalado. Sin embargo, la nota al pie está anclada dos veces con el mismo marcador [a], lo cual incumple la disciplina de notas. Además, en este contexto la elección de «mi juicio» se alinea mejor con el inglés POB «my judgment» y con la frase jurídica subsiguiente «mantiene su derecho», sin perder la matización vindicativa.'
  spanish_quality_summary: El español es claro y digno. «Yahvé me dijo» y «permanecen para siempre» suenan naturales. La secuencia «mi justicia mantiene su derecho» es inteligible, pero «mi juicio mantiene su derecho» resulta más ceñida al texto auditado y mantiene la tensión legal. También conviene eliminar el segundo anclaje [a] al cierre de la cita.
  glossary_alignment: Buen alineamiento con la política de usar «Yahvé». No hay conflicto con la glosa mesiánica u otras entradas del glosario. La principal mejora es preferir «juicio» sobre «justicia» aquí por correspondencia directa con «judgment», dejando la alternativa literal documentada en nota.
  issues:
  - severity: medium
    issue: Marcador de nota [a] duplicado en el texto
    rationale: La instrucción del proyecto exige no reutilizar un mismo marcador para dos anclajes distintos en el mismo registro. La nota debe aparecer una sola vez en el punto pertinente.
  - severity: medium
    issue: «mi justicia» suaviza un poco la correspondencia con «my judgment»
    rationale: Aunque el razonamiento sobre el matiz vindicativo es válido, el texto inglés auditado conserva «judgment». En español, «mi juicio mantiene su derecho» sigue siendo comprensible y más fiel al punto de partida, especialmente con la nota alternativa.
  revised_spanish_text: 'Yahvé me dijo: «Mi nombre y mi gloria permanecen para siempre, pero mi juicio[a] mantiene su derecho en su tiempo».'
