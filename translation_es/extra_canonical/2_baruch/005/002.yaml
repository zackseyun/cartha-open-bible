translation:
  language: es
  text: 'Yahvé me dijo: «Mi nombre y mi gloria permanecen para siempre, pero mi juicio[a] mantiene su derecho en su tiempo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mantiene su propio derecho».
    reason: alternative_rendering_preserved_from_english_audit
lexical_decisions:
- source_word: Lord / Yahweh (implicit divine speaker)
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Yahvé
  lexicon: YHWH
  rationale: La voz divina del contexto se expresa de manera transparente con el nombre propio Yahvé, conforme al criterio POB en español, en vez de ocultarlo bajo un título genérico. Aunque el inglés dice 'the Lord', el trasfondo aquí corresponde al nombre divino.
- source_word: name
  english_pob_choice: My name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi fama
  - mi reputación
  lexicon: שם
  rationale: '''Nombre'' conserva el sentido literal y el valor teológico de identidad y presencia. ''Fama'' o ''reputación'' serían interpretativos y más débiles aquí.'
- source_word: glory
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi honra
  - mi esplendor
  lexicon: כבוד / doxa
  rationale: '''Gloria'' es el equivalente más directo y adecuado para la carga de honor manifiesto del término.'
- source_word: endure forever
  english_pob_choice: endure forever
  chosen_spanish: permanecen para siempre
  alternatives_spanish:
  - duran para siempre
  - subsisten para siempre
  lexicon: עוֹלָם / לנצח
  rationale: '''Permanecen para siempre'' es natural en español y conserva la idea de continuidad indefinida sin añadir matices ajenos.'
- source_word: judgment
  english_pob_choice: my judgment
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi juicio
  - mi sentencia
  lexicon: משפט / דין
  rationale: La frase fuente y la revisión inglesa destacan una matiz legal-vindicativo ('maintains its right'). En español, 'justicia' comunica mejor esa dimensión de rectitud/vindicación que 'juicio', que podría sonar solo a acto de condena.
- source_word: maintains its right
  english_pob_choice: maintains its right
  chosen_spanish: mantiene su derecho
  alternatives_spanish:
  - conserva su derecho
  - sostiene su justicia
  lexicon: נטר + צדק
  rationale: '''Mantiene su derecho'' reproduce con claridad la metáfora legal de que la justicia/judicio de Dios preserva su propia legitimidad y se impone en el tiempo señalado. Se evita una paráfrasis más amplia para no perder la tensión jurídica del hebreo/siríaco subyacente.'
- source_word: in its time
  english_pob_choice: in its time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - cuando le llegue su tiempo
  lexicon: בעתו
  rationale: '''En su tiempo'' mantiene la estructura breve y la idea de momento señalado por Dios.'
theological_decisions:
- issue: Nombre divino frente a título genérico
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El texto fuente presupone la voz de Yahvé; en el proyecto POB español se prefiere no enmascarar el nombre divino con un título. Esto hace auditable la relación entre el original y la traducción.
  doctrine_reference: Tetragrámaton / nombre divino
- issue: '''judgment maintains its right'' como justicia vindicativa'
  english_pob_reading: my judgment maintains its right in its time
  chosen_spanish_reading: mi justicia mantiene su derecho en su tiempo
  alternative_spanish_readings:
  - mi juicio mantiene su derecho en su tiempo
  - mi sentencia mantiene su derecho en su tiempo
  rationale: 'La formulación conserva la tensión jurídica del enunciado: no solo un juicio abstracto, sino la vindicación justa de Dios que llega en el momento apropiado. ''Justicia'' en español comunica mejor esa fuerza que un mero ''juicio''.'
  doctrine_reference: justicia divina / vindicación
translation_notes:
  revision_awareness: La versión inglesa más reciente solo ajustó puntuación y no cambió el contenido. El punto clave del historial es la evolución desde una traducción más literal ('keeps its own right') a una más natural en inglés ('maintains its right'); la versión española conserva esa claridad jurídica sin perder la fuerza del original.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para el nombre divino según el proyecto.
  - Se usa 'justicia' para preservar el matiz vindicativo/legal señalado por la lectura inglesa revisada.
  - La nota al pie se ancla en 'derecho' para ofrecer la alternativa literal sin duplicar el marcador.
