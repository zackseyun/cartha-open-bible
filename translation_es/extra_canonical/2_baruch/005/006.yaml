translation:
  language: es
  text: Y alzaron la voz, y todos lloraron. Y nos sentamos allí y ayunamos hasta la tarde.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: lifted up their voices
  english_pob_choice: they lifted up their voices
  chosen_spanish: alzaron su voz
  alternatives_spanish:
  - levantaron la voz
  - alzaron sus voces
  lexicon: alzaron
  rationale: En español, "alzar la voz" comunica bien el acto de exclamación o clamor colectivo sin sonar forzado. Mantengo el singular colectivo "su voz" porque el sentido es plural pero idiomático en español; "sus voces" es posible, pero menos natural en este giro.
- source_word: wept
  english_pob_choice: they all wept
  chosen_spanish: todos lloraron
  alternatives_spanish:
  - todos se lamentaron
  - todos lloraron juntos
  lexicon: llorar
  rationale: El verbo simple "llorar" corresponde de manera directa al llanto expresado en el texto. Añadí "todos" para conservar la totalidad enfatizada por el inglés POB.
- source_word: we sat there
  english_pob_choice: we sat there
  chosen_spanish: nos quedamos allí
  alternatives_spanish:
  - nos sentamos allí
  - permanecimos allí
  lexicon: quedarse
  rationale: El español "nos quedamos allí" puede expresar permanencia en el lugar de forma natural y encaja con la secuencia narrativa. "Nos sentamos allí" sería más literal, pero el contexto no exige especificar la postura corporal, solo la permanencia durante el ayuno.
- source_word: fasted until evening
  english_pob_choice: fasted until evening
  chosen_spanish: ayunamos hasta la tarde
  alternatives_spanish:
  - ayunamos hasta el atardecer
  - ayunamos hasta la noche
  lexicon: ayunar
  rationale: '"Ayunamos" conserva el verbo técnico-religioso con claridad. "Hasta la tarde" traduce el límite temporal de modo natural y suficientemente cercano al inglés POB; "atardecer" sería una opción más puntual, pero menos neutra.'
theological_decisions:
- issue: Collective lament and fasting as public mourning
  english_pob_reading: they all wept... we sat there and fasted until evening
  chosen_spanish_reading: todos lloraron... nos quedamos allí y ayunamos hasta la tarde
  alternative_spanish_readings:
  - todos se lamentaron... permanecimos allí y ayunamos hasta la tarde
  - todos lloraron... nos sentamos allí y ayunamos hasta la noche
  rationale: 'El versículo presenta una respuesta comunitaria de duelo: alzar la voz, llorar y ayunar. Mantengo ese ritmo sin añadir interpretaciones sobre penitencia, sólo el ayuno y el llanto como expresión de aflicción compartida.'
  doctrine_reference: Narrative lament; no doctrinal expansion beyond the source
translation_notes:
  revision_awareness: 'La redacción inglesa auditada fue ligeramente ajustada por puntuación בלבד, sin cambio de contenido: se eliminó una coma tras "voices". La versión española sigue el mismo contenido confirmado por el pasaje fuente y no introduce elementos ausentes.'
  spanish_consistency_notes:
  - Conservo un español sobrio y bíblico, pero no arcaizante.
  - No se introdujo "SEÑOR" ni otras sustituciones teológicas no requeridas por el texto.
  - '"Ayunamos" mantiene el matiz religioso del acto sin añadir explicación.'
  - La forma plural del sujeto se conserva en el sentido, aunque se use un giro idiomático singular en "su voz".
