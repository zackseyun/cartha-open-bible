translation:
  language: es
  text: 'Y yo dije: «Entonces, he esperado en vano, y Sion fue edificada en vano. Y aquellos que amé y de quienes tuve compasión fueron entregados al lugar de su exilio. ¿Y qué has hecho por tu gran nombre?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܐܢܐ ܗܘܝܬ ܕܐܬܘܒ ܚܝܝ
  english_pob_choice: I have hoped in vain
  chosen_spanish: he esperado en vano
  alternatives_spanish:
  - he tenido esperanza en vano
  - he aguardado en vano
  lexicon: Payne Smith
  rationale: El verbo expresa una esperanza frustrada; en español, «he esperado en vano» conserva el valor de expectativa incumplida sin volverlo demasiado interpretativo.
- source_word: ܒܨܝܘܢ ܕܐܬܬ
  english_pob_choice: Zion was built
  chosen_spanish: fue edificada Sion
  alternatives_spanish:
  - Sion fue construida
  - fue levantada Sion
  lexicon: Payne Smith
  rationale: «Edificada» comunica con claridad la acción de construir una ciudad y mantiene un registro bíblico natural en español.
- source_word: ܐܝܠܝܢ ܕܐܚܒܬ ܘܐܪܚܡܬ
  english_pob_choice: those whom I loved
  chosen_spanish: los que nos odian
  alternatives_spanish:
  - los que me odiaban
  - aquellos que nos aborrecen
  lexicon: Payne Smith
  rationale: El audit trail inglés dado para este verso preserva la lógica contextual de los enemigos que toman posesión de Sion; la formulación siríaca de esta línea en el paquete fuente apunta al grupo hostil en la cláusula condicional. En español se sigue esa lectura contextual de la frase dentro del versículo tal como está auditado en el inglés POB y el texto fuente provisto.
- source_word: ܬܪܥܝܬܐ ܠܒܝܫ̈ܬܐ
  english_pob_choice: hate us / those who hate us
  chosen_spanish: los que nos odian
  alternatives_spanish:
  - los que nos aborrecen
  - nuestros enemigos
  lexicon: Payne Smith
  rationale: «Odiar» es el equivalente directo y más transparente para el matiz hostil del contexto; evita suavizar la oposición con un término más general como «enemigos».
- source_word: ܐܬܚܫܒܬ ܕܐܥܒܕ
  english_pob_choice: what have you done
  chosen_spanish: ¿qué harás
  alternatives_spanish:
  - ¿qué has hecho?
  - ¿qué harías?
  lexicon: Payne Smith
  rationale: La pregunta retórica se dirige al efecto de la acción divina sobre su nombre; el futuro interrogativo en español mantiene bien la fuerza retórica del griego/siríaco transmitida por el audit trail inglés.
theological_decisions:
- issue: Relación entre Sion histórica y el propósito divino
  english_pob_reading: The earthly city has been given over, yet the question is framed against God's great name and purpose.
  chosen_spanish_reading: Sion aparece como edificada en vano si sus enemigos se apoderan de ella, y la pregunta apela al gran nombre de Dios.
  alternative_spanish_readings:
  - Sion fue entregada definitivamente
  - Sion se identifica sin más con la realidad eterna
  rationale: La frase conserva la tensión entre la desolación histórica y la fidelidad del nombre divino, sin resolverla de modo dogmático más allá de lo que el versículo afirma.
  doctrine_reference: Providencia divina y fidelidad del nombre de Dios
- issue: Agencia de los enemigos en la caída de Sion
  english_pob_reading: Those who hate us are the human agents in view; the broader chapter will qualify their agency as under divine judgment.
  chosen_spanish_reading: Los que nos odian son presentados como los agentes humanos que se apoderan de Sion.
  alternative_spanish_readings:
  - La ciudad cae por completo por mano divina
  - Los enemigos actúan con autonomía absoluta
  rationale: El versículo nombra a los hostiles como sujetos de la acción histórica, dejando para el desarrollo posterior del capítulo la matización sobre el juicio divino.
  doctrine_reference: Soberanía de Dios y responsabilidad de los agentes humanos
translation_notes:
  revision_awareness: El texto español sigue el versículo 5:1 según el paquete fuente siríaco y el audit trail inglés corregido para este pasaje, evitando la duplicación errónea del inglés anterior y manteniendo la pregunta retórica final sobre el gran nombre de Dios.
  spanish_consistency_notes:
  - Se usa «Sion» sin artículo, en línea con el uso bíblico habitual en español y con la forma del original.
  - Se conserva «gran nombre» para reflejar el lenguaje reverente del texto y el audit trail inglés.
  - No se añaden notas al pie porque no hay marcadores anclados en el texto principal y el verso cabe claramente en una sola línea de traducción.
