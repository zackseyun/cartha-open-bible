translation:
  language: es
  text: Y fui y tomé a Jeremías, a Addo, a Seraías, a Jabis, a Gedalías y a todos los hombres honorables del pueblo, y los hice bajar[a] al valle de Cedrón, y les dije todo lo que se me había dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los llevé abajo».'
    reason: alternative_rendering
lexical_decisions:
- source_word: ܢܚܬ (Aphel)
  english_pob_choice: brought them down
  chosen_spanish: los llevé al valle
  alternatives_spanish:
  - los conduje al valle
  - los hice bajar al valle
  lexicon: ܢܚܬ
  rationale: El verbo siríaco expresa descenso/traslado hacia abajo. En español, «los llevé al valle» comunica el movimiento descendente con naturalidad, y el complemento «al valle de Cedrón» conserva la precisión geográfica del texto.
- source_word: ܩܕܪܘܢ / Kidron
  english_pob_choice: Kidron
  chosen_spanish: Cedrón
  alternatives_spanish:
  - Kidrón
  lexicon: topónimo bíblico
  rationale: «Cedrón» es la forma tradicional y ampliamente reconocible en español bíblico para este valle; mantiene la identificación del lugar sin alterar el referente.
- source_word: honorable men of the people
  english_pob_choice: all the honorable men of the people
  chosen_spanish: todos los hombres honorables del pueblo
  alternatives_spanish:
  - todos los nobles del pueblo
  - todos los hombres de honor del pueblo
  lexicon: expresión social
  rationale: Se conserva la referencia a un grupo destacado por honor/reputación, sin convertirlo en un título técnico inexistente en el texto.
- source_word: everything that had been said to me
  english_pob_choice: everything that had been said to me
  chosen_spanish: todo lo que me había sido dicho
  alternatives_spanish:
  - todo lo que se me había dicho
  - todo cuanto me había sido dicho
  lexicon: pasiva perifrástica / voz pasiva
  rationale: La pasiva refleja con matiz impersonal en español mantiene el sentido receptivo del original sin añadir al hablante o la agencia.
theological_decisions:
- issue: Movimiento descendente hacia el valle de Cedrón
  english_pob_reading: brought them down to the valley of Kidron
  chosen_spanish_reading: los llevé al valle de Cedrón
  alternative_spanish_readings:
  - los bajé al valle de Cedrón
  - los conduje hacia abajo al valle de Cedrón
  rationale: 'No hay cambio doctrinal, pero sí un matiz narrativo importante: el verbo de descenso del siríaco se preserva en español sin exagerarlo con una construcción extraña. El valle de Cedrón se trata como un lugar real y concreto, no como símbolo.'
  doctrine_reference: Ninguna; decisión narrativa y geográfica
translation_notes:
  revision_awareness: La revisión reciente del inglés corrigió «brought them» a «brought them down» por el valor lexical del verbo siríaco de descenso. La versión española incorpora ese matiz con «los llevé al valle de Cedrón», evitando perder la idea de bajada y manteniendo una fluidez natural en español.
  spanish_consistency_notes:
  - Se usa «Cedrón» en lugar de «Kidron» por consistencia con el uso bíblico tradicional en español.
  - 'Se conserva el orden narrativo del original: ir, tomar a los nombrados, bajarlos al valle, y comunicarles el mensaje recibido.'
  - 'Los nombres propios se mantienen transliterados de forma cercana a la tradición española: Jeremías, Addo, Seraías, Jabis, Gedalías.'
