  text: And you will see with your eyes that it is not the enemies who overthrow Zion, nor those who burn Jerusalem, but that they are ministers of the Judge for a time.
  footnotes:
  - marker: a
    text: Or 'serving judgment'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5
    timestamp: '2026-05-03T05:07:30Z'
    unchanged: false
    changes_summary: Improved natural English and clarity by supplying an explicit subject in the second negative clause (“nor those who burn Jerusalem”); no semantic change from the draft.
translation:
  language: es
  text: Y verás con tus ojos que no son los enemigos los que derriban a Sión, ni los que queman Jerusalén, sino que por un tiempo son ministros del Juez.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mshamshane
  english_pob_choice: ministers
  chosen_spanish: ministros
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: N/A
  rationale: El siriaco denota agentes que prestan servicio; en español, «ministros» conserva la idea de funcionarios al servicio de una autoridad, y corresponde al giro ya corregido en el texto inglés. «Siervos» sería posible, pero aquí atenúa la función representativa.
- source_word: dayana
  english_pob_choice: the Judge
  chosen_spanish: el Juez
  alternatives_spanish:
  - el juez
  - el Juez
  lexicon: N/A
  rationale: Se mantiene el título con artículo definido y mayúscula reverencial en el nombre/función divina, siguiendo el sentido del original y del inglés auditado.
- source_word: overthrow Zion
  english_pob_choice: overthrow Zion
  chosen_spanish: derriban a Sión
  alternatives_spanish:
  - derriban Sión
  - subvierten a Sión
  lexicon: N/A
  rationale: «Derribar» reproduce bien el acto de ruina/destrucción. Se añade la preposición «a» por fluidez al personificar el nombre propio en español.
- source_word: burn Jerusalem
  english_pob_choice: those who burn Jerusalem
  chosen_spanish: los que queman Jerusalén
  alternatives_spanish:
  - quienes queman Jerusalén
  - los incendiarios de Jerusalén
  lexicon: N/A
  rationale: Se conserva el sujeto explícito introducido en la revisión inglesa para claridad, sin añadir interpretación.
theological_decisions:
- issue: Agencia divina de los destructores
  english_pob_reading: they are ministers of the Judge for a time
  chosen_spanish_reading: sino que por un tiempo son ministros del Juez
  alternative_spanish_readings:
  - sino que por un tiempo sirven al juicio del Juez
  - sino que por un tiempo son siervos del Juez
  rationale: 'La frase preserva la tensión teológica: quienes ejecutan la destrucción no quedan exculpados, pero son descritos como instrumentos temporales bajo la autoridad del Juez. No se suaviza la agencia ni se transforma en una abstracción de «juicio».'
  doctrine_reference: Providencia divina y juicio soberano en literatura apocalíptica
- issue: Duración limitada de la función
  english_pob_reading: for a time
  chosen_spanish_reading: por un tiempo
  alternative_spanish_readings:
  - por un tiempo solamente
  - durante un tiempo
  rationale: Se mantiene la limitación temporal explícita del original, importante para evitar que la función de estos agentes se lea como permanente o autónoma.
  doctrine_reference: Soberanía divina sobre agentes históricos
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés, que aclara el segundo miembro negativo como «los que queman Jerusalén» y corrige el sentido de la frase siriaca a «ministers of the Judge». No se adoptó la lectura anterior «serving judgment», porque el audit trail la identifica como mistranslation.
  spanish_consistency_notes:
  - Se conserva «Sión» con mayúscula por tratarse del nombre propio bíblico.
  - «Juez» se usa como título sustantivado; no se reemplaza por «juez» común para mantener el paralelismo con el inglés auditado.
  - No se introducen notas al pie porque el verso no requiere una variante alternativa textual o lexical que deba anclarse en el texto.
