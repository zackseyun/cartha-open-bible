    reason: lexical_alternative
  revision_rationale: Se elimina la nota [b] porque no aclara una variante útil y más bien confunde la lectura correcta del texto principal. Se conserva la nota [a], que sí refleja una alternativa léxica real entre ‘tomó’ y ‘recibió’.
