translation:
  language: es
  text: 'Y respondí y dije: «El que tomó[a] de la luz es capaz de conocerla. Pero los muchos que existen tomaron de la oscuridad de Adán, y no se alegraron en la luz de Moisés».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «el que recibió de la luz es capaz de conocerla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ܢܣܒܬ / ܢܣܒܘ
  english_pob_choice: took
  chosen_spanish: tomó / tomaron
  alternatives_spanish:
  - recibió / recibieron
  - derivó / derivaron
  lexicon: Payne Smith
  rationale: El verbo siríaco mantiene un sentido concreto de tomar/recibir desde una fuente. En español, ‘tomó’ conserva mejor la relación activa con ‘de la luz’ y permite reflejar la repetición verbal del verso sin forzar una abstracción.
- source_word: ܢܘܗܪܐ
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - iluminación
  lexicon: Payne Smith
  rationale: ‘Luz’ preserva la imagen apocalíptica y revelatoria directa del texto; ‘iluminación’ sería más explicativa de lo que el siríaco exige.
- source_word: ܚܫܘܟܐ ܕܐܕܡ
  english_pob_choice: Adam’s darkness
  chosen_spanish: la oscuridad de Adán
  alternatives_spanish:
  - la oscuridad de Adam
  - la tiniebla de Adán
  lexicon: Payne Smith
  rationale: Se conserva la relación posesiva personal con Adán. ‘Oscuridad’ comunica con naturalidad el contraste con ‘luz’ en español moderno, sin diluir el vínculo adámico.
- source_word: ܐܬܒܣܣܘ / ܐܬܒܣܡܘ
  english_pob_choice: did not rejoice
  chosen_spanish: no se alegraron
  alternatives_spanish:
  - no se gozaron
  - no se deleitaron
  lexicon: Payne Smith
  rationale: La revisión auditada indica que el valor correcto aquí es ‘rejoiced’. En español, ‘se alegraron’ es natural y fiel; ‘gozaron’ sería posible pero algo más marcado litúrgicamente.
- source_word: ܢܘܗܪܐ ܕܡܘܫܐ
  english_pob_choice: the light of Moses
  chosen_spanish: la luz de Moisés
  alternatives_spanish:
  - la luz mediada por Moisés
  - la luz de Moisés
  lexicon: Payne Smith
  rationale: El texto nombra a Moisés de modo directo, y en español se conserva la construcción posesiva simple. No se reemplaza por ‘ley’ ni por una paráfrasis mediadora, porque el audit trail preserva la referencia personal.
theological_decisions:
- issue: Contraste Adán / Moisés
  english_pob_reading: The verse contrasts darkness inherited in Adam with revelatory light associated with Moses.
  chosen_spanish_reading: El verso contrasta la oscuridad heredada en Adán con la luz revelatoria asociada a Moisés.
  alternative_spanish_readings:
  - Un contraste general entre ignorancia e instrucción
  - Una oposición meramente moral sin fuerza representativa
  rationale: Se mantienen Adán y Moisés como figuras nominadas del argumento, porque el original estructura la idea mediante esos referentes históricos. Eso evita aplanar el texto en una oposición genérica.
  doctrine_reference: Lectura representativa/histórico-simbólica del lenguaje adámico y mosaico
- issue: Naturaleza de la relación con la luz
  english_pob_reading: Moses is presented as a bearer of received light rather than an independent source of it.
  chosen_spanish_reading: Moisés aparece como portador de la luz, no como su fuente independiente.
  alternative_spanish_readings:
  - Moisés como origen autónomo de la luz
  - Moisés solo como ejemplo de conocimiento
  rationale: Aunque el verso dice ‘la luz de Moisés’, el conjunto del pasaje preserva una luz que no es autónoma sino recibida. En español conviene no exagerar el estatus de Moisés más allá de lo que el texto permite.
  doctrine_reference: Revelación derivada, no autosuficiente
translation_notes:
  revision_awareness: 'La traducción sigue la última revisión crítica en dos puntos: mantiene la lectura en tercera persona (‘el que tomó... los muchos...’) y adopta ‘no se alegraron’ conforme a la corrección textual del siríaco frente al OCR defectuoso. Se evitó la versión en segunda persona rechazada por el control revisado.'
  spanish_consistency_notes:
  - Se usa ‘luz’ de forma consistente para ܢܘܗܪܐ, sin alternar con ‘iluminación’.
  - Se conserva ‘Adán’ y ‘Moisés’ como nombres propios en las expresiones genitivas.
  - Se mantiene un registro bíblico contemporáneo, evitando arcaísmos innecesarios.
  - Las notas al pie están ancladas en el texto con [a] y [b], sin marcadores huérfanos.
