translation:
  language: es
  text: Y después lo matará, y protegerá al resto de mi pueblo, a los que se hallen en el lugar que yo he escogido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: he will put him to death
  english_pob_choice: he will put him to death
  chosen_spanish: lo pondrá a muerte
  alternatives_spanish:
  - lo hará morir
  - lo matará
  lexicon: none
  rationale: Conserva la fuerza verbal del inglés POB sin suavizarla. «Poner a muerte» mantiene el matiz de ejecución/causar la muerte, y evita reducir el énfasis del acto a una forma más general como «matará».
- source_word: he will protect
  english_pob_choice: he will protect
  chosen_spanish: protegerá
  alternatives_spanish:
  - guardará
  - amparará
  lexicon: none
  rationale: «Protegerá» comunica bien la acción de resguardar al remanente con español natural y digno. «Guardar» podría sonar más bíblico, pero «proteger» es más claro sin perder el sentido.
- source_word: the rest of my people
  english_pob_choice: the rest of my people
  chosen_spanish: el resto de mi pueblo
  alternatives_spanish:
  - los demás de mi pueblo
  - el remanente de mi pueblo
  lexicon: none
  rationale: Se mantiene la referencia al grupo restante de manera transparente. No se fuerza «remanente» porque el texto disponible no exige un término técnico; «resto» conserva la idea básica del inglés POB.
- source_word: those who are found
  english_pob_choice: those who are found
  chosen_spanish: a los que se hallen
  alternatives_spanish:
  - a los que sean hallados
  - a los que se encuentren
  lexicon: none
  rationale: «Se hallen» refleja el sentido pasivo/resultativo de «are found» en español natural. Evita una construcción demasiado literal o pesada.
- source_word: in the place that I have chosen
  english_pob_choice: in the place that I have chosen
  chosen_spanish: en el lugar que yo he escogido
  alternatives_spanish:
  - en el sitio que yo he elegido
  - en el lugar que escogí
  lexicon: none
  rationale: «He escogido» conserva el sentido de elección divina y el tiempo perfecto del inglés POB. «Escogido» suena más elevado que «elegido» y mantiene el registro bíblico sin arcaísmo.
theological_decisions:
- issue: Destino del grupo restante y el lugar escogido por Dios
  english_pob_reading: the rest of my people, those who are found in the place that I have chosen
  chosen_spanish_reading: el resto de mi pueblo, a los que se hallen en el lugar que yo he escogido
  alternative_spanish_readings:
  - el remanente de mi pueblo, a los que se encuentren en el lugar que yo he escogido
  - el resto de mi pueblo, los que sean hallados en el lugar que yo he escogido
  rationale: La formulación conserva la idea de un grupo preservado por Dios y vinculado a un lugar elegido por él, sin añadir interpretaciones que no están en el texto base. «Resto» mantiene la ambigüedad útil entre resto y remanente.
  doctrine_reference: Providencia divina y preservación del pueblo elegido; no se especifica más allá del texto.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre el control siríaco y la traducción inglesa POB, sin revisiones aplicadas ni discrepancias relevantes; por ello la propuesta española sigue de cerca el sentido del texto base y preserva la estructura semántica del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece en el texto fuente; aquí no aparece en la formulación inglesa del verso, por lo que no se introduce.
  - Se mantiene un registro bíblico claro y moderno, evitando tanto calcos rígidos como paráfrasis expansivas.
  - «Resto» se conserva sin convertirlo automáticamente en término técnico de «remanente», porque el contexto entregado no obliga a una terminología especializada.
