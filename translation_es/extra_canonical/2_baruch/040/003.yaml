translation:
  language: es
  text: Y su dominio permanecerá para siempre, hasta que llegue a su fin el mundo de la corrupción, y hasta que se cumplan los tiempos anunciados de antemano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: dominion
  english_pob_choice: dominion
  chosen_spanish: dominio
  alternatives_spanish:
  - reino
  - señorío
  lexicon: dominion
  rationale: «Dominio» conserva la idea de gobierno efectivo y coincide con el tono formal del inglés POB sin introducir una imagen más específica como «reino».
- source_word: will stand forever
  english_pob_choice: will stand forever
  chosen_spanish: permanecerá para siempre
  alternatives_spanish:
  - se mantendrá para siempre
  - estará firme para siempre
  lexicon: stand
  rationale: En español, «permanecerá» comunica continuidad estable de manera natural; «para siempre» refleja el alcance temporal absoluto del original.
- source_word: the world of corruption
  english_pob_choice: the world of corruption
  chosen_spanish: el mundo de la corrupción
  alternatives_spanish:
  - la era de la corrupción
  - el mundo corrompido
  lexicon: world
  rationale: Se mantiene la expresión sustantiva directa «mundo de la corrupción» para preservar la fuerza apocalíptica del contraste entre el orden presente y su fin.
- source_word: comes to its end
  english_pob_choice: comes to its end
  chosen_spanish: llegue a su fin
  alternatives_spanish:
  - termine
  - se acabe
  lexicon: end
  rationale: «Llegue a su fin» reproduce con claridad el cierre definitivo del período descrito y evita ambigüedad sobre un simple cese temporal.
- source_word: the times spoken of before
  english_pob_choice: the times spoken of before
  chosen_spanish: los tiempos anunciados de antemano
  alternatives_spanish:
  - los tiempos mencionados antes
  - los tiempos de los que se habló antes
  lexicon: times
  rationale: «Anunciados de antemano» recoge el sentido de tiempos ya referidos previamente y hace explícita la anticipación profética implícita en el contexto.
theological_decisions:
- issue: Duración del dominio del Mesías/rey escatológico
  english_pob_reading: His dominion will stand forever.
  chosen_spanish_reading: Su dominio permanecerá para siempre.
  alternative_spanish_readings:
  - Su dominio se mantendrá para siempre
  - Su reino permanecerá para siempre
  rationale: La formulación mantiene la permanencia absoluta del gobierno sin decidir innecesariamente entre «dominio» y «reino» más allá de lo que exige el texto.
  doctrine_reference: Escatología real mesiánica
- issue: Finalidad del tiempo presente corrupto
  english_pob_reading: until the world of corruption comes to its end
  chosen_spanish_reading: hasta que llegue a su fin el mundo de la corrupción
  alternative_spanish_readings:
  - hasta que termine el mundo de la corrupción
  - hasta que se acabe el mundo de la corrupción
  rationale: Se conserva la expectativa de un fin histórico del orden corrupto, sin suavizar el contraste moral del término «corrupción».
  doctrine_reference: Juicio y consumación escatológica
- issue: Cumplimiento de tiempos previamente anunciados
  english_pob_reading: until the times spoken of before are fulfilled
  chosen_spanish_reading: y hasta que se cumplan los tiempos anunciados de antemano
  alternative_spanish_readings:
  - y hasta que se cumplan los tiempos de los que se habló antes
  - y hasta que se realicen los tiempos ya mencionados
  rationale: La frase subraya cumplimiento profético previo; «de antemano» preserva la prioridad temporal sin recargar el verso.
  doctrine_reference: Profecía y cumplimiento
translation_notes:
  revision_awareness: The English POB text is unchanged in the latest revision pass and the cross-check reports high agreement with no issues; the Spanish draft therefore follows the stable English audit reading while preserving source-aligned apocalyptic diction.
  spanish_consistency_notes:
  - Se usa «dominio» de forma consistente para el gobierno del soberano.
  - Se evita «SEÑOR» porque no hay un tetragrámaton explícito en este verso fuente.
  - «Corrupción» se conserva como término moral-apocalíptico, no solo físico.
  - La estructura paralela «hasta que... y hasta que...» refleja la repetición enfática del original.
