translation:
  language: es
  text: El último gobernante de aquel tiempo quedará con vida, cuando la multitud de sus ejércitos haya sido derribada por la espada; y será atado, y lo harán subir a Monte Sión. Y mi Mesías lo condenará por todas sus impiedades[a], y pondrá delante de él las obras perversas de sus ejércitos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «maldades» o «iniquidades». Se mantiene «impiedades» para conservar la fuerza de una culpa dirigida contra Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «huestes» o «tropas». Se traduce «ejércitos» para sostener el alcance colectivo del pasaje y su tono apocalíptico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ܐܚܪܝܐ / last ruler
  english_pob_choice: the last ruler of that time
  chosen_spanish: el último gobernante de aquel tiempo
  alternatives_spanish:
  - el último soberano de aquel tiempo
  - el postrer gobernante de aquel tiempo
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: «Gobernante» preserva el sentido político-apocalíptico sin introducir un matiz demasiado técnico; «último» mantiene la secuencia temporal del original y del audit trail inglés.
- source_word: ܡܠܟܘܬܐ / rule, reign sense
  english_pob_choice: rule / dominion background
  chosen_spanish: gobernante
  alternatives_spanish:
  - reino
  - reinado
  - dominio
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: En esta cláusula el foco está en la persona final que ejerce autoridad, no solo en la institución; por eso «gobernante» resulta más preciso en español que «reino» o «dominio».
- source_word: ܒܝܫܘܬܗ
  english_pob_choice: impieties
  chosen_spanish: impiedades
  alternatives_spanish:
  - maldades
  - impiedad
  - iniquidades
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: «Impiedades» conserva el carácter de culpa contra Dios que el inglés POB quiso resaltar, y evita rebajar el término a simple maldad moral o política.
- source_word: ܥܒ̈ܕܝܗܘܢ ܕܒܝܫܘܬܗܘܢ
  english_pob_choice: the wicked deeds of his hosts
  chosen_spanish: las malas obras de sus ejércitos
  alternatives_spanish:
  - las obras perversas de sus huestes
  - las obras malas de sus tropas
  - las obras impías de sus huestes
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: «Obras» reproduce el sustantivo de acción del siriaco y «ejércitos» conserva el alcance colectivo del pasaje; «malas» comunica la valoración moral sin sobrecargar el estilo.
- source_word: ܨܗܝܘܢ
  english_pob_choice: Mount Zion
  chosen_spanish: monte Sión
  alternatives_spanish:
  - Monte Sión
  - monte de Sión
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: «Monte Sión» es la forma natural y reverente en español bíblico contemporáneo, y mantiene el escenario judicial del texto.
theological_decisions:
- issue: Naturaleza del juicio del Mesías sobre el último gobernante
  english_pob_reading: The passage presents a personal messianic ruler who judges the last enemy on Mount Zion.
  chosen_spanish_reading: El texto conserva un Mesías personal que condena al último gobernante en Sión.
  alternative_spanish_readings:
  - Un Mesías meramente simbólico que representa la victoria final
  - Un agente ungido no identificado explícitamente como Mesías
  rationale: El siriaco dice explícitamente «mi Mesías» y le atribuye una acción judicial concreta; la traducción debe dejar visible esa identidad personal y su función de juicio.
  doctrine_reference: DOCTRINE.md translation philosophy §3
- issue: Alcance de las impiedades y de las malas obras
  english_pob_reading: The Messiah convicts the ruler of all his impieties and sets before him the wicked deeds of his hosts.
  chosen_spanish_reading: El Mesías lo confronta con todas sus impiedades y con las malas obras de sus ejércitos.
  alternative_spanish_readings:
  - El Mesías lo acusa de toda su maldad y de los actos perversos de sus tropas
  - El Mesías le muestra sus impiedades y las obras malas de sus huestes
  rationale: El verbo y la escena forense requieren mantener tanto la acusación personal como la exposición pública de las obras de su ejército; no conviene suavizarlo a una mera descripción general.
  doctrine_reference: DOCTRINE.md translation philosophy §3
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior incorporando los marcadores de nota exactamente en el texto español: [a] y [b]. El contenido mantiene la lectura del audit trail inglés y la escena siriaca de juicio en Sión, sin añadir información no atestiguada.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» según el contexto de título personal y el audit trail inglés.
  - «Impiedades» preserva la carga teológica fuerte del siriaco y del inglés POB.
  - «Monte Sión» sigue la convención bíblica española natural, sin ocultar el lugar concreto del juicio.
  - Se usa «ejércitos» para reflejar el alcance corporativo del pasaje; no se atenúa a una referencia individual.
