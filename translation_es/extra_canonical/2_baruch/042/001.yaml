translation:
  language: es
  text: 'Y él me respondió y me dijo: «También estas cosas te las mostraré».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܘܥܢܝ ܘܐܡܪ ܠܝ
  english_pob_choice: And he answered and said to me
  chosen_spanish: Y él me respondió y me dijo
  alternatives_spanish:
  - Y respondió y me dijo
  - Y él respondió y me dijo
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: Conservo la fórmula narrativa directa del siríaco con verbo de respuesta y verbo de decir, natural en español bíblico sin volverla arcaizante.
- source_word: ܐܦ ܗܠܝܢ
  english_pob_choice: These things also
  chosen_spanish: También estas cosas
  alternatives_spanish:
  - Estas cosas también
  - También esto
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: El adverbio ܐܦ introduce adición; «también» reproduce bien ese matiz. «Estas cosas» mantiene el plural del original y el alcance de la promesa.
- source_word: ܐܚܘܝܟ
  english_pob_choice: I will show you
  chosen_spanish: te las mostraré
  alternatives_spanish:
  - te mostraré
  - te las haré ver
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: «Mostrar» conserva el valor revelatorio del verbo; el pronombre «las» retoma naturalmente el objeto plural implícito en «estas cosas».
theological_decisions:
- issue: Naturaleza de la respuesta prometida
  english_pob_reading: 'The verse is a simple promise of disclosure: the speaker will show the addressee additional things.'
  chosen_spanish_reading: La frase se entiende como promesa de revelación adicional, no como enseñanza abstracta ni como exhortación.
  alternative_spanish_readings:
  - También te enseñaré estas cosas
  - También te explicaré estas cosas
  rationale: El contexto inmediato es de revelación apocalíptica; «mostrar» preserva el acto de dar a conocer lo que aún no se ha visto.
  doctrine_reference: Revelación/apocalíptica; función profética de manifestar lo oculto
translation_notes:
  revision_awareness: Se siguió el acuerdo alto entre el siríaco controlado y la audición inglesa; no hubo revisiones aplicadas en el último pase, y el verso es breve, por lo que la traducción se mantiene muy cercana al patrón sintáctico del original.
  spanish_consistency_notes:
  - Se usa «me respondió y me dijo» como fórmula narrativa estable y transparente.
  - Se mantiene el plural «estas cosas» para reflejar ܗܠܝܢ.
  - Se evita introducir léxico doctrinal no presente en el verso.
