    ܡܛܠ ܕܗܘ ܚܙܐ ܐܢܐ

    ܣܓܝ̈ܐܐ ܡܢ ܥܡܟܝ

    ܕܐܢܚܢܢ ܡܢ ܩܝܡܝܗܘܢ

