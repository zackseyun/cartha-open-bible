    ܘܠܡܒܪܐ ܪ̈ܦܝܝ ܙܒܢܝܢ.

    ܘ ܝܕܥܬ ܕܫܘܐ ܕܢܚܙܐ

    ܒܗܘ ܙܒܢܐ ܐܡܠܠ ܕܝܢ

    ܥܡܟܝ ܟܠ ܕܡܬܚܫܒ

    ܐܢܐ. ܘܐܒܥܐ ܡܢܟܝ

