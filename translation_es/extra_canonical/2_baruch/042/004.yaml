translation:
  language: es
  text: Los que antes estaban bajo sujeción y después se apartaron y se mezclaron con la descendencia de los pueblos mezclados[a]—su tiempo anterior se cuenta como nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pueblos mezclados» traduce de forma más literal la idea del inglés auditado; también puede entenderse como «pueblos de mezcla» o «gentes mezcladas».
    reason: lexical_alternative
lexical_decisions:
- source_word: under subjection
  english_pob_choice: formerly under subjection
  chosen_spanish: bajo sujeción
  alternatives_spanish:
  - sometidos
  - en sujeción
  - bajo dominio
  lexicon: subjection
  rationale: La imagen es de estar en estado de sujeción; «bajo sujeción» conserva el valor relacional y evita añadir un matiz más fuerte de opresión que no aparece explícitamente en el audit trail inglés.
- source_word: withdrew
  english_pob_choice: withdrew
  chosen_spanish: se apartaron
  alternatives_spanish:
  - se retiraron
  - se desviaron
  - se alejaron
  lexicon: withdraw
  rationale: El verbo debe expresar separación deliberada del estado anterior. «Se apartaron» es natural en español y mantiene la idea de distanciamiento sin introducir una connotación moral no documentada.
- source_word: mingled themselves with
  english_pob_choice: mingled themselves with
  chosen_spanish: se mezclaron con
  alternatives_spanish:
  - se juntaron con
  - se asociaron con
  - se entremezclaron con
  lexicon: mix/mingle
  rationale: «Se mezclaron con» reproduce bien la acción de integrarse o contaminarse por asociación, con una carga suficientemente neutra y fiel al inglés auditado.
- source_word: seed of the mixed peoples
  english_pob_choice: the seed of the mixed peoples
  chosen_spanish: la descendencia de los pueblos mezclados
  alternatives_spanish:
  - la simiente de los pueblos mezclados
  - la descendencia de la mezcla de pueblos
  - la prole de los pueblos mezclados
  lexicon: seed/descendants
  rationale: «Seed» en este contexto debe entenderse como descendencia. «Descendencia» es más clara y readable en español bíblico actual que «simiente», aunque esta última se mantiene como alternativa posible.
- source_word: their former time is reckoned as nothing
  english_pob_choice: their former time is reckoned as nothing
  chosen_spanish: su tiempo anterior se cuenta como nada
  alternatives_spanish:
  - su tiempo anterior no se considera
  - su pasado se tiene por nada
  - su tiempo anterior se reputa por nada
  lexicon: reckon/count as nothing
  rationale: La pasiva inglesa se traslada con «se cuenta como nada», que conserva la fuerza de evaluación sin forzar una construcción más arcaica. «Tiempo anterior» sigue de cerca el audit trail de «former time».
theological_decisions:
- issue: La frase «seed of the mixed peoples» puede sonar étnica o socialmente cargada en español.
  english_pob_reading: the seed of the mixed peoples
  chosen_spanish_reading: la descendencia de los pueblos mezclados
  alternative_spanish_readings:
  - la simiente de los pueblos mezclados
  - la descendencia de los pueblos mezclados y mezclados con ellos
  rationale: Se preserva la referencia a una descendencia formada por mezcla de pueblos sin exagerar ni suavizar el contraste. La traducción mantiene la tensión del original sin convertirla en una categoría doctrinal más específica de la que el texto ofrece.
  doctrine_reference: No aplica; nota semántica y social del pasaje.
translation_notes:
  revision_awareness: 'El inglés final del audit trail ajustó «were subject» a «were formerly under subjection» para mayor formalidad, manteniendo «withdrew and mingled themselves with» y «their former time is reckoned as nothing». La versión española sigue esa revisión: conserva la referencia a un estado previo de sujeción, la secuencia de apartarse y mezclarse, y la valoración final de que el tiempo anterior no cuenta.'
  spanish_consistency_notes:
  - Se mantuvo «sujeción» para respetar la fuerza relacional del original y evitar una paráfrasis doctrinal.
  - «Descendencia» se prefirió a «simiente» por claridad en español, aunque ambas son posibles según el registro deseado.
  - La pasiva refleja «se cuenta como nada» conserva la impersonalidad del inglés auditado.
