translation:
  language: es
  text: 'Y en cuanto a lo que dijiste: «¿Para quiénes y para cuántos serán estas cosas?», para los que han creído habrá los bienes anunciados de antemano; pero para los que desprecian estas cosas, lo contrario de estas cosas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: those who have believed
  english_pob_choice: those who have believed
  chosen_spanish: los que han creído
  alternatives_spanish:
  - los creyentes
  - los que creen
  lexicon: πιστεύω
  rationale: Conserva la referencia participial al acto de creer sin convertirla en un sustantivo eclesial más técnico. «Los que han creído» refleja bien el valor resultativo del perfecto y mantiene el contraste con quienes desprecian.
- source_word: the good things spoken beforehand
  english_pob_choice: the good things spoken beforehand
  chosen_spanish: los bienes anunciados de antemano
  alternatives_spanish:
  - las cosas buenas dichas de antemano
  - los buenos beneficios predichos
  lexicon: προειρημένα ἀγαθά
  rationale: «Bienes» comunica de forma más natural y sustantiva el alcance de ἀγαθά que un adjetivo suelto. «Anunciados de antemano» preserva la idea de una promesa previa sin introducir una interpretación demasiado específica.
- source_word: those who despise them
  english_pob_choice: those who despise them
  chosen_spanish: los que los desprecian
  alternatives_spanish:
  - los que desprecian esas cosas
  - los que los rechazan
  lexicon: καταφρονέω
  rationale: Se mantiene la fuerza de desprecio activo del verbo. El objeto implícito se hace explícito con «los» para evitar ambigüedad en español y seguir la aclaración del audit trail en inglés.
- source_word: the opposite of these things
  english_pob_choice: the opposite of these things
  chosen_spanish: lo contrario de estas cosas
  alternatives_spanish:
  - lo opuesto a estas cosas
  - el reverso de estas cosas
  lexicon: ἀντίθετα / ἐναντία
  rationale: «Lo contrario» es la forma más clara y fiel para una oposición directa. «Estas cosas» conserva la referencia al conjunto de realidades prometidas y rechazadas.
theological_decisions:
- issue: Destino contrastivo entre creyentes y despectores
  english_pob_reading: for those who have believed, there will be the good things spoken beforehand; but for those who despise them, the opposite of these things
  chosen_spanish_reading: para los que han creído habrá los bienes anunciados de antemano; pero para los que los desprecian, lo contrario de estas cosas
  alternative_spanish_readings:
  - para los que creen habrá los bienes prometidos; pero para los que los desprecian, lo opuesto
  - para los que han creído habrá los bienes anunciados de antemano; pero para los que los rechazan, lo contrario
  rationale: La cláusula establece una correspondencia estricta entre dos grupos humanos y dos destinos. Se evita suavizar «desprecian» o convertir la promesa en una formulación más genérica como «prometidos», porque el audit trail inglés conserva la idea de bienes ya anunciados de antemano.
  doctrine_reference: Eschatological recompense / juicio contrastivo
translation_notes:
  revision_awareness: La revisión inglesa reciente aclaró el objeto final ('them/things') y suavizó la última cláusula; la versión española sigue esa clarificación explícita con «los desprecian» y «lo contrario de estas cosas», sin introducir una glosa adicional.
  spanish_consistency_notes:
  - Se usa «bienes» para ἀγαθά en sentido sustantivo, no «cosas buenas», por fluidez y precisión.
  - Se conserva el paralelismo sintáctico de dos grupos introducidos por «para los que…».
  - No se introduce «Cristo», «Señor» ni otra terminología no presente en el versículo.
