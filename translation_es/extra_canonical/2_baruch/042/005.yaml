translation:
  language: es
  text: Pero en cuanto a los que antes no conocían la vida, y después llegaron a conocerla, y se mezclaron con la semilla del pueblo que se ha separado, también su tiempo anterior es contado como nada.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: those who formerly did not know life
  english_pob_choice: those who formerly did not know life
  chosen_spanish: a los que antes no conocían la vida
  alternatives_spanish:
  - a los que anteriormente no conocían la vida
  - a quienes antes ignoraban la vida
  lexicon: conocer / vida
  rationale: El pasaje contrapone ignorancia previa y conocimiento posterior; ‘conocer la vida’ conserva el contraste sin forzar una paráfrasis. ‘No conocían’ mantiene el imperfecto y el valor durativo del estado anterior.
- source_word: afterward came to know it
  english_pob_choice: afterward came to know it
  chosen_spanish: y después llegaron a conocerla
  alternatives_spanish:
  - y luego la conocieron
  - y después la conocieron
  lexicon: llegar a conocer
  rationale: ‘Llegaron a conocerla’ expresa el proceso de adquisición del conocimiento con naturalidad en español y mantiene el matiz de entrada a una condición nueva.
- source_word: mingled with the seed of the people which has separated itself
  english_pob_choice: mingled with the seed of the people which has separated itself
  chosen_spanish: y se mezclaron con la semilla del pueblo que se ha separado
  alternatives_spanish:
  - y se mezclaron con la descendencia del pueblo que se ha apartado
  - y se unieron con la simiente del pueblo que se ha separado
  lexicon: seed / people / separated
  rationale: ‘Semilla’ conserva el paralelo semítico del original y el audit trail inglés. Aunque ‘descendencia’ sería más idiomático, ‘semilla’ retiene mejor la imagen heredada del texto fuente y el valor colectivo-genealógico de ‘people’.
- source_word: their former time is also reckoned as nothing
  english_pob_choice: their former time is also reckoned as nothing
  chosen_spanish: también su tiempo anterior es contado como nada
  alternatives_spanish:
  - también su tiempo pasado se considera como nada
  - también su tiempo anterior se estima como nada
  lexicon: reckon as nothing
  rationale: ‘Es contado como nada’ reproduce la valoración de nulidad/insignificancia del original y del inglés, evitando una reinterpretación más fuerte que ‘no vale nada’.
theological_decisions:
- issue: Identidad del pueblo que ‘se ha separado’
  english_pob_reading: the seed of the people which has separated itself
  chosen_spanish_reading: la semilla del pueblo que se ha separado
  alternative_spanish_readings:
  - la descendencia del pueblo que se ha apartado
  - la simiente del pueblo que se ha separado
  rationale: Se mantiene la formulación reflexiva sin especificar más de lo que el texto sostiene. ‘Se ha separado’ conserva la ambigüedad entre auto-separación y separación identitaria del pueblo, como en el inglés POB.
  doctrine_reference: No aplica; decisión de fidelidad lexical y sintáctica al testimonio textual.
