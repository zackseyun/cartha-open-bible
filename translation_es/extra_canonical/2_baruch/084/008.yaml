translation:
  language: es
  text: Recuerda la ley y Sión, y la tierra santa, y a tus hermanos, y el pacto de tus padres; y no olvides las fiestas y los sábados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: law
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - torá
  - instrucción
  lexicon: Lexical equivalent for legal/covenantal norm.
  rationale: El contexto enumera memorias identitarias de Israel; «ley» conserva la forma breve y natural del texto en español sin forzar una paráfrasis. «Torá» e «instrucción» serían posibles, pero aquí el sustantivo general mantiene la correspondencia directa con el inglés auditado y con el paralelismo de la lista.
- source_word: Zion
  english_pob_choice: Zion
  chosen_spanish: Sión
  alternatives_spanish:
  - Zion
  lexicon: Proper name / theological toponym.
  rationale: «Sión» es la forma española establecida y transparente del topónimo bíblico. No se traduce ni se adapta, porque funciona como nombre propio cargado de valor teológico e histórico.
- source_word: holy land
  english_pob_choice: holy land
  chosen_spanish: la tierra santa
  alternatives_spanish:
  - la tierra consagrada
  - la tierra sagrada
  lexicon: Adjectival phrase for consecrated land.
  rationale: «Tierra santa» es la expresión más natural en español y conserva el valor sacral del sintagma. «Santa» mantiene la referencia a su consagración, sin desplazar el sentido hacia un uso geográfico moderno ajeno al texto.
- source_word: your brothers
  english_pob_choice: your brothers
  chosen_spanish: a tus hermanos
  alternatives_spanish:
  - a tus hermanos de pueblo
  - a tus hermanos
  lexicon: Kinship / covenant community.
  rationale: Se conserva el matiz de parentesco y comunidad del pueblo sin añadir explicaciones. El dativo con preposición en español fluye con el imperativo enumerativo.
- source_word: covenant
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - testamento
  lexicon: Covenantal treaty term.
  rationale: «Pacto» es fiel, claro y ampliamente entendido en español bíblico. «Alianza» también sería posible, pero «pacto» suele reflejar mejor la fuerza bilateral y jurídica del término en este tipo de enumeración histórica.
- source_word: festivals
  english_pob_choice: festivals
  chosen_spanish: las fiestas
  alternatives_spanish:
  - las solemnidades
  - las festividades
  lexicon: Cultic calendrical observances.
  rationale: «Fiestas» reproduce de manera natural las celebraciones cultuales del calendario bíblico. En español eclesial es inteligible y evita una formulación demasiado técnica.
- source_word: sabbaths
  english_pob_choice: sabbaths
  chosen_spanish: los sábados
  alternatives_spanish:
  - los días de reposo
  - los shabbat
  lexicon: Weekly sacred rest day.
  rationale: «Los sábados» mantiene el vínculo directo con el término hebreo/sabático en una forma comprensible y breve. Aunque «día de reposo» explicitaría la función, el texto fuente menciona la observancia calendárica y la equivalencia habitual en español es clara.
translation_notes:
  revision_awareness: La redacción sigue de cerca la traducción inglesa auditada, sin necesidad de notas textuales o variantes en esta unidad breve; el original siríaco disponible no introduce una tensión semántica que exija ampliación en español.
  spanish_consistency_notes:
  - Se mantuvo el estilo enumerativo y exhortativo del inglés POB con imperativos simples.
  - Se preservó la secuencia de memorias sagradas y comunitarias sin reordenarlas.
  - No se introdujo «SEÑOR» ni «Cristo», ya que no aparecen en el segmento fuente.
  - Se usó español bíblico contemporáneo y natural, evitando arcaísmos innecesarios.
