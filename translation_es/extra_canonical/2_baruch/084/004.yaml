  text: Pero después de su muerte, los apartaron de ustedes, y por causa de esto les sobrevino lo que había sido anunciado de antemano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: '"cast them away from yourselves"'
  english_pob_choice: you cast them away from yourselves
  chosen_spanish: ustedes los desecharon de entre ustedes
  alternatives_spanish:
  - ustedes los echaron fuera de ustedes
  - ustedes los apartaron de ustedes mismos
  lexicon: N/A
  rationale: El inglés refleja un acto deliberado de rechazo y expulsión. En español, «desechar» conserva la fuerza de repudiar o rechazar, mientras que «de entre ustedes» comunica con naturalidad la separación comunitaria expresada por la construcción inglesa sin volverla demasiado literal.
- source_word: '"what had been foretold"'
  english_pob_choice: what had been foretold
  chosen_spanish: lo que había sido anunciado de antemano
  alternatives_spanish:
  - lo que había sido predicho
  - lo que había sido profetizado
  lexicon: N/A
  rationale: «Anunciado de antemano» mantiene el sentido de predicción previa sin obligar a un matiz específicamente técnico de profecía si el contexto no lo exige de manera explícita. También suena claro y sobrio en español bíblico moderno.
theological_decisions:
- issue: Relación entre la muerte del referido y el juicio subsiguiente
  english_pob_reading: But after his death you cast them away from yourselves, and because of this what had been foretold came upon you.
  chosen_spanish_reading: Pero después de su muerte, ustedes los desecharon de entre ustedes, y por causa de esto sobre ustedes vino lo que había sido anunciado de antemano.
  alternative_spanish_readings:
  - Pero después de su muerte ustedes los rechazaron, y por eso sobre ustedes vino lo que había sido anunciado de antemano.
  - Pero tras su muerte los expulsaron de entre ustedes, y por eso les sobrevino lo que había sido anunciado de antemano.
  rationale: 'La secuencia causal se conserva: el rechazo posterior a la muerte está presentado como la ocasión que desencadena el cumplimiento de lo anunciado. «Sobre ustedes vino» mantiene el lenguaje de visita o irrupción de juicio sin añadir interpretación doctrinal ajena al texto.'
  doctrine_reference: Relación bíblica entre rechazo del enviado y cumplimiento del anuncio/jucio divino; sin formulación dogmática específica.
translation_notes:
  revision_awareness: El texto inglés POB no presenta notas ni revisiones aplicadas; la versión actual fue confirmada como sin cambios tras la última revisión y con alto acuerdo en la verificación cruzada. Por ello, el español sigue de cerca la lectura auditada sin introducir alternativas textuales no atestiguadas.
  spanish_consistency_notes:
  - Se usa «ustedes» para la segunda persona plural acorde con español latinoamericano neutral.
  - Se mantiene un registro bíblico sobrio y directo, evitando arcaísmos innecesarios.
  - No se introduce «Mesías», «Cristo» ni otros términos no presentes en el segmento.
  - «Lo que había sido anunciado de antemano» evita forzar una glosa profética más específica de la que el inglés auditado exige.
