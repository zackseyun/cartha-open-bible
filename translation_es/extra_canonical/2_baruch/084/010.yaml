translation:
  language: es
  text: Y en todo tiempo insistan con fervor, y oren diligentemente con todo su corazón, para que el Poderoso se reconcilie con ustedes[a] y no tenga en cuenta la multitud de sus pecados, sino que recuerde la rectitud de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tenga misericordia de ustedes'.
    reason: alternative_reading
lexical_decisions:
- source_word: Ethpael of r'h
  english_pob_choice: be reconciled to you
  chosen_spanish: se reconcilie con ustedes
  alternatives_spanish:
  - les muestre favor
  - tenga misericordia de ustedes
  lexicon: r'h
  rationale: El ajuste revisado del POB en inglés favorece una relación restaurada, no solo compasión general. En español, 'reconciliarse con' comunica bien esa restauración relacional sin forzar una paráfrasis doctrinal.
- source_word: whole heart
  english_pob_choice: with your whole heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - de todo corazón
  - con pleno corazón
  lexicon: heart
  rationale: La expresión es idiomática en español y conserva la totalidad/intensidad exigida por el contexto.
- source_word: uprightness
  english_pob_choice: the uprightness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la justicia
  - la integridad
  lexicon: uprightness
  rationale: '''Rectitud'' mantiene la cualidad moral del término y evita reducirlo solo a un sentido forense de ''justicia'' o a una mera ''integridad'' moral general.'
- source_word: reckon
  english_pob_choice: may not reckon
  chosen_spanish: no tenga en cuenta
  alternatives_spanish:
  - no cuente
  - no registre
  lexicon: reckon
  rationale: '''No tenga en cuenta'' comunica bien la idea contable/judicial de no imputar, sin añadir terminología técnica no atestiguada en el español del pasaje.'
- source_word: multitude of your sins
  english_pob_choice: the multitude of your sins
  chosen_spanish: la multitud de sus pecados
  alternatives_spanish:
  - la gran cantidad de sus pecados
  - la multitud de sus faltas
  lexicon: sins
  rationale: Se conserva la imagen cuantitativa del original y del POB inglés. 'Pecados' es el equivalente natural para el campo semántico de 'sins'.
theological_decisions:
- issue: Relational restoration versus generic mercy
  english_pob_reading: be reconciled to you
  chosen_spanish_reading: se reconcilie con ustedes
  alternative_spanish_readings:
  - tenga misericordia de ustedes
  - les muestre favor
  rationale: La revisión inglesa descartó la equivalencia genérica 'have mercy on you' en favor de una relación restaurada. La redacción española sigue esa decisión y preserva la tensión entre favor divino y reconciliación relacional.
  doctrine_reference: 2 Baruch 84:10; revisión lexical del POB (2026-04-28)
translation_notes:
  revision_awareness: El texto inglés del POB fue revisado de 'have mercy on you' a 'be reconciled to you' tras la evaluación del Syriac ethpael de r'h; la versión española adopta la lectura revisada y conserva la alternativa más antigua en nota.
  spanish_consistency_notes:
  - Se mantiene 'Poderoso' para 'the Mighty One', coherente con el tono reverencial del POB en pasajes donde el título divino es descriptivo.
  - Se conserva la segunda persona plural de tratamiento formal ('ustedes') para concordar con el español bíblico contemporáneo y con el plural implícito del inglés.
  - No se introduce 'Cristo', 'Señor' ni otros equivalentes tradicionales no presentes en el fuente.
  - La puntuación reproduce el encadenamiento exhortativo del original con coordinación clara en español.
