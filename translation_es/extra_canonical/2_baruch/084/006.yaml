review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del inglés POB y no introduce cambios teológicos: exhortación posterior al sufrimiento, condición de escuchar las palabras pronunciadas y promesa de recibir del epíteto divino lo reservado. La única desalineación significativa está en el doblete final: el inglés auditado dice ‘kept ready and stored up’, donde el primer miembro incluye la idea de preparación/listitud, pero el español ‘guardado y almacenado’ pierde ese matiz y duplica casi solo la noción de almacenamiento.'
  spanish_quality_summary: El español es claro, natural y digno. ‘Así también yo les digo’ funciona, aunque algo más fluido sería ‘Así también les digo yo’. ‘Después de su sufrimiento’ y ‘si escuchan estas palabras que les han sido dichas’ son plenamente comprensibles. El ajuste principal es léxico en la cláusula final para reflejar mejor la preparación previa de lo prometido.
  glossary_alignment: No hay conflicto con las pautas terminológicas del proyecto. ‘el Poderoso’ preserva bien el epíteto divino. No aparecen términos controlados como Yahvé, Mesías, esclavo, etc. La revisión propuesta solo mejora la precisión de ‘kept ready’.
  issues:
  - severity: medium
    issue: ‘guardado y almacenado’ no representa adecuadamente ‘kept ready and stored up’
    rationale: El primer verbo inglés expresa que algo fue mantenido/preparado/listo, no meramente guardado. En español conviene un doblete como ‘preparado y reservado’ o ‘dispuesto y guardado’ para preservar ambos componentes semánticos.
  - severity: low
    issue: Ligera pesadez sintáctica en ‘Así también yo les digo’
    rationale: No es incorrecto, pero ‘Así también les digo yo’ o ‘Así también les digo’ suena más natural en español sin alterar el sentido.
  revised_spanish_text: 'Así también les digo: después de su sufrimiento, si escuchan estas palabras que les han sido dichas, recibirán del Poderoso lo que ha sido preparado y reservado para ustedes.'
  revision_rationale: Se ajusta la cláusula final para reflejar la doble idea de preparación y reserva presente en ‘kept ready and stored up’. Además, se suaviza levemente el orden sintáctico inicial y se integra mejor la frase temporal en español, sin cambiar el contenido.
