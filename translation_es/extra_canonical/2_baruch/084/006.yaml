translation:
  language: es
  text: 'Así también les digo: después de su sufrimiento, si escuchan estas palabras que les han sido dichas, recibirán del Poderoso lo que ha sido preparado y reservado para ustedes.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: after your suffering
  english_pob_choice: after your suffering
  chosen_spanish: después de su sufrimiento
  alternatives_spanish:
  - tras su sufrimiento
  - después de vuestra aflicción
  lexicon: Syriac temporal phrase corresponding to post-suffering address
  rationale: Conserva la relación temporal directa sin añadir interpretaciones como ‘pruebas’ o ‘tribulaciones’. ‘Sufrimiento’ mantiene la amplitud semántica del inglés POB y es natural en español bíblico moderno.
- source_word: listen to these words
  english_pob_choice: if you listen to these words
  chosen_spanish: si escuchan estas palabras
  alternatives_spanish:
  - si oyen estas palabras
  - si prestan atención a estas palabras
  lexicon: auditory/heeding verb phrase
  rationale: ‘Escuchar’ puede implicar atención y obediencia, que encaja mejor que un mero oír. Mantiene la condición verbal del original sin expandirla a ‘obedecer’, que sería más interpretativo.
- source_word: the Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Todopoderoso
  lexicon: divine epithet
  rationale: ‘Poderoso’ refleja el título divino sin sustituirlo por una fórmula litúrgica más cargada como ‘Todopoderoso’, que podría estrechar el matiz del epíteto.
- source_word: what has been kept ready and stored up
  english_pob_choice: what has been kept ready and stored up
  chosen_spanish: lo que ha sido guardado y almacenado
  alternatives_spanish:
  - lo que ha sido preparado y reservado
  - lo que se ha mantenido listo y acumulado
  lexicon: storage/preparation doublet
  rationale: Reproduce la doble idea de preparación y reserva/depósito. ‘Guardado y almacenado’ conserva la redundancia enfática del original sin suavizarla.
theological_decisions:
- issue: Reward promised after suffering conditioned on hearing the words
  english_pob_reading: if you listen to these words that have been spoken to you, you will receive from the Mighty One what has been kept ready and stored up for you
  chosen_spanish_reading: si escuchan estas palabras que les han sido dichas, recibirán del Poderoso lo que ha sido guardado y almacenado para ustedes
  alternative_spanish_readings:
  - si obedecen estas palabras...
  - si atienden a estas palabras...
  rationale: La frase mantiene la estructura condicional y la promesa de recompensa sin convertir ‘escuchar’ en un mandato moral más explícito de lo que el texto evidencia. La recompensa sigue dependiendo de la recepción atenta de las palabras pronunciadas.
  doctrine_reference: Perseverancia y recompensa escatológica en literatura judía tardía; no se introduce formulación doctrinal cristiana posterior.
translation_notes:
  revision_awareness: No applied revisions in the English audit trail; the English text was marked unchanged after review, and the Spanish draft follows that stable reading closely while preserving the source’s condition-and-reward structure.
  spanish_consistency_notes:
  - Se usa ‘Poderoso’ para el epíteto divino, coherente con un registro bíblico pero sin reemplazarlo por un título litúrgico diferente.
  - Se mantiene ‘escuchen’ en vez de ‘obedezcan’ para no agregar una intensificación no requerida por el source.
  - ‘Guardado y almacenado’ conserva la duplicación semítica de reserva/preparación sin estilizarla en exceso.
