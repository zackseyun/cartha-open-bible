    rationale: El texto actual usa un imperativo singular discursivo dirigido a un público plural, algo plenamente natural en español bíblico moderno. No requiere cambio.
  - severity: low
    issue: «Pondré delante de ustedes» es ligeramente más literal que «les expondré»
    rationale: La formulación actual sigue bien la imagen del inglés auditado y sigue siendo idiomática en español, así que no hace falta reparación.
