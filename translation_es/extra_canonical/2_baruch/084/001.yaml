translation:
  language: es
  text: Mira, mientras aún estoy vivo, les he dado a conocer estas cosas, porque dije que debían aprender lo que es bueno; pues el Poderoso[a] me mandó instruirlos, y antes de morir pondré delante de ustedes algunas de las ordenanzas de su juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Poderoso» traduce el título divino del siriaco, siguiendo el valor retórico que el inglés POB preserva con “the Mighty One”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܚܝܠܬܐ
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - Dios
  lexicon: Payne Smith
  rationale: Sigo el título divino marcado del original y del audit trail inglés. «El Poderoso» conserva el tono epíteto/título sin nivelarlo a un nombre genérico ni sustituirlo por la fórmula eclesiástica «el Señor».
- source_word: ܢܡܘܣܐ
  english_pob_choice: law
  chosen_spanish: lo que es bueno / las ordenanzas de su juicio
  alternatives_spanish:
  - la ley
  - la instrucción
  - la Torá
  lexicon: Payne Smith
  rationale: 'En esta frase concreta el sentido práctico es exhortativo y judicial: primero «lo que es bueno» para ܫܦܝܪ̈ܬܐ, y luego «las ordenanzas de su juicio» para ܦܘܩ̈ܕܢܘܗܝ. Evito imponer «la ley» como única solución en toda la línea para no aplanar el matiz del pasaje.'
- source_word: ܦܘܩ̈ܕܢܘܗܝ
  english_pob_choice: ordinances
  chosen_spanish: ordenanzas
  alternatives_spanish:
  - mandamientos
  - preceptos
  lexicon: Payne Smith
  rationale: «Ordenanzas» reproduce bien el matiz formal/judicial del inglés POB «ordinances» en un contexto de juicio, y distingue esta cláusula del lenguaje más general de mandamiento.
- source_word: ܫܦܝܪ̈ܬܐ
  english_pob_choice: what is good
  chosen_spanish: lo que es bueno
  alternatives_spanish:
  - cosas buenas
  - lo excelente
  - lo que es conveniente
  lexicon: Payne Smith
  rationale: La expresión tiene valor moral y de conveniencia. «Lo que es bueno» es natural en español y mantiene la amplitud ética sin volverla ornamental o filosófica.
- source_word: ܒܥܠܕܒܒܝ / ܒܥܠܕܒܒܝ
  english_pob_choice: my enemy / my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  - los que me oponen
  lexicon: Payne Smith
  rationale: Aunque este verso no despliega esa raíz en la forma final seleccionada para el español, el expediente usa lenguaje de oposición personal y forense. Donde aparece el contraste judicial en la tradición del capítulo, «enemigos» es el equivalente más directo y auditable.
theological_decisions:
- issue: Título divino en contexto de mandato profético
  english_pob_reading: The Mighty One commanded me to instruct you.
  chosen_spanish_reading: el Poderoso me mandó instruirlos.
  alternative_spanish_readings:
  - Dios me mandó instruirlos.
  - el Señor me mandó instruirlos.
  rationale: Mantengo el epíteto divino distintivo del siriaco y del inglés auditado. Así se conserva la textura teológica del pasaje, donde la autoridad del mensaje proviene del título solemne y no de una designación más neutral.
  doctrine_reference: Divine naming and reverential title preservation; source-specific rhetoric in 2 Baruch.
- issue: Marco de juicio y obediencia
  english_pob_reading: before I die I will set before you some of the ordinances of his judgment.
  chosen_spanish_reading: antes de morir pondré delante de ustedes algunas de las ordenanzas de su juicio.
  alternative_spanish_readings:
  - antes de morir les presentaré algunas leyes de su juicio.
  - antes de morir les expondré algunas sentencias de su juicio.
  rationale: «Ordenanzas de su juicio» conserva el marco jurídico-covenantal del original y del inglés POB. Evita reducir el contenido a simple moralidad o a una sentencia abstracta.
  doctrine_reference: Covenantal-law frame in 2 Baruch; judicial instruction as prophetic mediation.
translation_notes:
  revision_awareness: El inglés POB fue revisado recientemente y quedó sin cambios; además, la concordancia cruzada fue alta. Por eso el español sigue de cerca las decisiones ya auditadas, pero adapta la sintaxis para que suene natural en español y no dependa mecánicamente del inglés.
  spanish_consistency_notes:
  - Se conserva «Poderoso» como título divino consistente con el expediente POB.
  - Se usa «ordenanzas» para el matiz jurídico de ܦܘܩ̈ܕܢܘܗܝ y «lo que es bueno» para ܫܦܝܪ̈ܬܐ.
  - El registro es bíblico y contemporáneo, evitando tanto arcaísmos rígidos como paráfrasis expansivas.
