translation:
  language: es
  text: Transmitan esta carta y las tradiciones de la ley a sus hijos después de ustedes, así como sus padres se las transmitieron a ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: letter
  english_pob_choice: this letter
  chosen_spanish: esta carta
  alternatives_spanish:
  - esta epístola
  - este escrito
  lexicon: carta
  rationale: El inglés POB entiende el término como un documento escrito concreto. «Carta» es natural en español y mantiene la referencia física e inmediata sin añadir connotaciones eclesiásticas de «epístola».
- source_word: traditions of the law
  english_pob_choice: the traditions of the law
  chosen_spanish: las tradiciones de la ley
  alternatives_spanish:
  - las tradiciones de la Ley
  - las tradiciones legales
  lexicon: tradición
  rationale: Se conserva el sintagma casi de manera literal porque el testimonio fuente distingue una transmisión normativa concreta. «Ley» con mayúscula sería posible, pero aquí el texto habla de la ley como corpus transmitido, y la minúscula evita sobrerrepresentar un término técnico no explicitado en el pasaje.
- source_word: hand on
  english_pob_choice: handed them on
  chosen_spanish: entregad ... os las entregaron
  alternatives_spanish:
  - pasad ... os las pasaron
  - transmitid ... os las transmitieron
  lexicon: entregar
  rationale: «Entregar» reproduce bien la idea de pasar algo de una generación a otra y conserva la concreción del acto de transmisión. En español funciona tanto para la carta como para las tradiciones.
- source_word: after you
  english_pob_choice: after you
  chosen_spanish: después de vosotros
  alternatives_spanish:
  - tras vosotros
  - a la generación siguiente
  lexicon: después de
  rationale: La frase conserva el orden temporal y genealógico del original. «Después de vosotros» suena algo más directo y bíblico que una paráfrasis generacional.
theological_decisions:
- issue: Transmisión de la ley y continuidad generacional
  english_pob_reading: The command stresses handing on the written letter and the traditions of the law to descendants, as received from the fathers.
  chosen_spanish_reading: El mandato subraya la transmisión fiel de un escrito y de las tradiciones de la ley a los hijos, en continuidad con los padres.
  alternative_spanish_readings:
  - El mandato enfatiza la preservación de la carta y la ley para los hijos.
  - El texto llama a mantener y transmitir la tradición legal recibida.
  rationale: La redacción española mantiene el peso de la transmisión recibida sin suavizar la obligación ni convertirla en una exhortación genérica. También conserva la tensión entre documento escrito y tradición normativa, que es central para el pasaje.
  doctrine_reference: Deuteronomio 6:6-9; 2 Timoteo 2:2
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ningún cambio de revisión; por tanto, la versión española sigue de cerca el sentido confirmado por el control bilingüe sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se usó tratamiento plural reverente coherente con «vuestros padres / vosotros» en un marco exhortativo comunitario.
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton ni una cita explícita del nombre divino en este versículo.
  - «Tradiciones de la ley» se mantuvo sin normalizar a una formulación más eclesiástica para respetar la concreción del original.
