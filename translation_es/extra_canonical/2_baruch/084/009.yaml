review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del inglés POB: un mandato de transmitir la carta y las tradiciones de la ley a los hijos, en paralelo con la transmisión recibida de los padres. Sin embargo, «entregad»/«entregaron» prioriza la idea de dar o poner en manos más que la de transmitir de generación en generación, que es central en «hand on».'
  spanish_quality_summary: El español es comprensible, pero «vuestros... vosotros» suena peninsular y no encaja con el objetivo de español neutral latinoamericano. Además, la repetición «os las entregaron a vosotros» es pesada. «Transmitan... les transmitieron» resulta más natural, más fiel al matiz y más ampliamente legible.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. La decisión clave es léxica: para la idea de tradición recibida y pasada a descendientes, «transmitir» alinea mejor con la racionalidad documentada que «entregar». «Ley» en minúscula es aceptable aquí.'
  issues:
  - severity: medium
    issue: «Entregad/entregaron» debilita el matiz de transmisión tradicional
    rationale: El contexto compara lo que los padres hicieron con lo que esta generación debe hacer con sus hijos. «Transmitir» refleja mejor la continuidad intergeneracional que «entregar».
  - severity: medium
    issue: Uso de «vosotros/vuestros/os» no corresponde al estilo meta neutral latinoamericano
    rationale: El proyecto pide español neutral latinoamericano o ampliamente legible en iglesia. La segunda persona plural peninsular introduce una marca regional innecesaria.
  - severity: low
    issue: Redundancia en «os las entregaron a vosotros»
    rationale: La repetición pronominal suena poco natural en español moderno y puede simplificarse sin pérdida de sentido.
  revised_spanish_text: Transmitan esta carta y las tradiciones de la ley a sus hijos después de ustedes, así como sus padres se las transmitieron a ustedes.
  revision_rationale: Se ajusta «hand on» a «transmitan/se las transmitieron» para preservar mejor la idea de transmisión generacional. También se reemplaza la segunda persona plural peninsular por formas neutrales latinoamericanas y se elimina una redundancia pronominal, manteniendo el contenido del original.
