translation:
  language: es
  text: 'Recuerda cómo Moisés una vez llamó al cielo y a la tierra como testigos contra ustedes y dijo: «Si transgreden[a] la ley, serán dispersados; pero si la guardan, serán guardados».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quebrantan la ley».
    reason: lexical_alternative
lexical_decisions:
- source_word: called heaven and earth as witnesses
  english_pob_choice: called heaven and earth as witnesses
  chosen_spanish: llamó al cielo y a la tierra como testigos
  alternatives_spanish:
  - invocó al cielo y a la tierra como testigos
  - llamó al cielo y a la tierra para que testificaran
  lexicon: Syriac idiom for witness invocation; Spanish 'como testigos' preserves forensic sense without overparaphrase.
  rationale: La imagen es jurídica y testimonial; 'como testigos' conserva el valor formal del testimonio sin añadir elementos no explicitados por la fuente.
- source_word: transgress the law
  english_pob_choice: transgress the law
  chosen_spanish: transgreden[a] la ley
  alternatives_spanish:
  - quebrantan la ley
  - violentan la ley
  lexicon: transgress = transgredir/break; law = ley.
  rationale: '''Transgredir la ley'' reproduce con dignidad el matiz de violación normativa. Se ancla la nota porque en español también existe la alternativa más idiomática ''quebrantar la ley''.'
- source_word: will be scattered
  english_pob_choice: you will be scattered
  chosen_spanish: serán dispersados
  alternatives_spanish:
  - serán esparcidos
  lexicon: passive scattering judgment formula in biblical Spanish.
  rationale: '''Dispersados'' conserva la fuerza del juicio de exilio y resulta claro en español bíblico contemporáneo.'
- source_word: will be kept
  english_pob_choice: you will be kept
  chosen_spanish: serán conservados
  alternatives_spanish:
  - serán guardados
  lexicon: kept = preserved/kept safe; passive divine safeguarding.
  rationale: '''Conservados'' comunica preservación y custodia divina de manera natural en español. ''Guardados'' es posible, pero puede sonar más marcadamente tradicional.'
theological_decisions:
- issue: Covenant judgment and preservation parallel
  english_pob_reading: If you transgress the law, you will be scattered; but if you keep it, you will be kept.
  chosen_spanish_reading: Si transgreden la ley, serán dispersados; pero si la guardan, serán conservados.
  alternative_spanish_readings:
  - Si quebrantan la ley, serán dispersados; pero si la obedecen, serán preservados.
  rationale: La construcción mantiene el paralelismo condicional de juicio y preservación sin suavizar la amenaza ni la promesa. 'Guardar la ley' conserva el eco bíblico de fidelidad obediente.
  doctrine_reference: Covenant blessing and curse formula; Deuteronomic covenant pattern.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió solo la frase idiomática 'trespass the law' a 'transgress the law'; la versión española adopta directamente un equivalente natural ('transgreden la ley') y no necesita reflejar una tensión textual adicional.
  spanish_consistency_notes:
  - Se mantiene 'ley' para νόμος/lexical law-language según el contexto jurídico-covenantal.
  - Se conserva el paralelismo pasivo 'serán ...' para ambas cláusulas, como en la fuente y en la POB inglesa.
  - '''Recuerda'' traduce adecuadamente el imperativo exhortativo de memoria retrospectiva del pasaje.'
