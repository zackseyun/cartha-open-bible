  text: También les seguía diciendo otras cosas, cuando estaban juntos en el desierto como doce tribus.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “He also kept saying”
  english_pob_choice: He also kept saying
  chosen_spanish: Él también seguía diciendo
  alternatives_spanish:
  - Él también seguía hablando
  - Él también continuaba diciendo
  lexicon: syriac repetitive/imperfective narrative verb
  rationale: El imperfecto español expresa continuidad o repetición, preservando el valor iterativo del original y del inglés POB sin volverlo estático.
- source_word: “other things”
  english_pob_choice: other things
  chosen_spanish: otras cosas
  alternatives_spanish:
  - otras palabras
  - otras enseñanzas
  lexicon: general discourse noun
  rationale: La expresión amplia 'otras cosas' refleja la indeterminación del original y coincide con la amplitud semántica del inglés POB.
- source_word: “to you”
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - a ti
  lexicon: 2nd person plural address
  rationale: Se usa plural de trato neutral para reproducir el destinatario colectivo del pasaje, ya marcado por 'doce tribus'.
- source_word: “when you were together”
  english_pob_choice: when you were together
  chosen_spanish: cuando estaban juntos
  alternatives_spanish:
  - cuando se encontraban juntos
  - mientras estaban reunidos
  lexicon: state of being together / assembled
  rationale: '''Estaban juntos'' comunica convivencia o reunión sin introducir de forma más fuerte una asamblea formal que el contexto inmediato no exige.'
- source_word: “in the wilderness”
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en el desierto/camino inhóspito
  lexicon: wilderness/desert
  rationale: '''Desierto'' es la opción bíblica clara y natural en español para el entorno de peregrinación; evita un calco técnico innecesario.'
- source_word: “as twelve tribes”
  english_pob_choice: as twelve tribes
  chosen_spanish: como doce tribus
  alternatives_spanish:
  - en cuanto doce tribus
  - como las doce tribus
  lexicon: comparative identity phrase
  rationale: Se conserva la comparación/identidad colectiva con 'como', manteniendo la brevedad del original y el sentido de Israel organizado tribalmente.
theological_decisions:
- issue: Referencia a Israel como comunidad tribal en el desierto
  english_pob_reading: you were together in the wilderness as twelve tribes
  chosen_spanish_reading: cuando estaban juntos en el desierto como doce tribus
  alternative_spanish_readings:
  - cuando estaban reunidos en el desierto como doce tribus
  - cuando vivían juntos en el desierto como doce tribus
  rationale: La redacción mantiene el marco histórico-teológico de la peregrinación de Israel y la organización en doce tribus, sin añadir elementos no presentes en el texto.
  doctrine_reference: Historial de Israel en el desierto; organización tribal de las doce tribus de Israel
