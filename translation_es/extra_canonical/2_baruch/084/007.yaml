  rationale: Se ajusta la sintaxis para sonar más natural en español documental-jurídico («sirva de testigo»), se armoniza la referencia al destinatario con un probable plural contextual («ustedes»), y se elimina un pronombre innecesario. El sentido y las decisiones léxicas principales del POB se conservan.
