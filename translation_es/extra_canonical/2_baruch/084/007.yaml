translation:
  language: es
  text: Que esta carta sirva también de testigo entre mí y ustedes, para que recuerden los mandamientos del Poderoso, y para que me sirva de vindicación delante de aquel que me envió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “the Mighty One”
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Omnipotente
  lexicon: אֱלָהָא / אלוהים (divine epithet)
  rationale: La expresión del POB inglés usa un epíteto reverencial sin fijarlo como nombre propio. «El Poderoso» conserva esa fuerza y suena natural en español, sin reemplazar indebidamente el matiz por un título eclesiástico tradicional.
- source_word: “vindication”
  english_pob_choice: vindication
  chosen_spanish: vindicación
  alternatives_spanish:
  - justificación
  - defensa
  lexicon: דִּין / זַכּוּת (legal-forensic sense)
  rationale: «Vindicación» mantiene el matiz forense de prueba pública o reivindicación legal que el inglés del POB preserva. «Justificación» podría sonar demasiado teológica en español y «defensa» debilita el resultado jurídico.
- source_word: “witness”
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testimonio
  - señal
  lexicon: ܣܗܕܐ / ܣܗܕܘܬܐ (legal witness testimony)
  rationale: «Testigo» reproduce la imagen personal o documental de algo que da fe entre dos partes. «Testimonio» sería también posible, pero aquí la construcción pide un término nominal directo.
theological_decisions:
- issue: La carta como testigo entre dos partes
  english_pob_reading: Let this letter also be a witness between me and you
  chosen_spanish_reading: Que esta carta sea también testigo entre tú y yo
  alternative_spanish_readings:
  - Que esta carta sea también un testimonio entre nosotros
  - Que esta carta sirva también de testigo entre tú y yo
  rationale: Se conserva la función jurídica-relacional de la carta como garante memorial entre las partes, sin convertirla en mera «evidencia» moderna ni suavizar el lenguaje de pacto/compromiso implícito.
  doctrine_reference: Uso bíblico de testigo como garante de memoria y responsabilidad (cf. Deuteronomio 31:26 en función análoga)
- issue: Referencia al remitente divino
  english_pob_reading: before him who sent me
  chosen_spanish_reading: delante de aquel que me envió
  alternative_spanish_readings:
  - ante quien me envió
  - delante del que me envió
  rationale: Se mantiene la referencia personal al enviado y al que lo envía, sin explicitar más de lo que el texto ofrece. «Delante de» conserva el registro solemne del POB y la relación de rendición de cuentas.
  doctrine_reference: Envío profético y rendición de cuentas ante el remitente (tema bíblico general)
translation_notes:
  revision_awareness: La versión inglesa más reciente fue confirmada como sin cambios tras el pasaje de revisión; además, el control cruzado indicó alto acuerdo. Por eso el español se formula directamente sobre el sentido estable del POB inglés y del original siríaco, sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se usa «Poderoso» para el epíteto divino, coherente con la terminología reverencial del proyecto.
  - Se mantiene «vindicación» en sentido forense, en lugar de reinterpretar la frase como simple «defensa».
  - 'La sintaxis conserva la relación causal-final del original: una carta-testigo que ayuda a recordar y a reivindicar al hablante ante su remitente.'
