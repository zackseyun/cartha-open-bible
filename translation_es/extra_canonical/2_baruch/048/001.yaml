translation:
  language: es
  text: 'Y aconteció después del séptimo día, que oré delante del Poderoso[a] y dije:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Título divino frecuente en 2 Baruc, que resalta el poder soberano de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܘܗܘܐ
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue así
  lexicon: CAL
  rationale: La fórmula narrativa introduce una nueva escena; «aconteció» conserva el tono formal y bíblico sin sonar tan arcaico como «y aconteció» en algunas tradiciones, y refleja bien la transición del arameo/siríaco.
- source_word: ܡܢ ܒܬܪ ܝܘܡܐ ܫܒܝܥܝܐ
  english_pob_choice: after the seventh day
  chosen_spanish: después del séptimo día
  alternatives_spanish:
  - al cabo del séptimo día
  - tras el séptimo día
  lexicon: CAL
  rationale: La preposición temporal expresa de manera directa el orden cronológico del original. «Después del séptimo día» es claro y fiel, y mantiene el sentido secuencial del relato.
- source_word: ܚܝܠܬܢܐ
  english_pob_choice: Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Omnipotente
  lexicon: CAL
  rationale: El título divino subraya poder y soberanía. En español, «el Poderoso» comunica esa fuerza titulativa con naturalidad. Se evita «SEÑOR» porque el original no usa el Tetragrámaton ni un equivalente que obligue a esa convención.
- source_word: ܨ̇ܠܝܬ
  english_pob_choice: I prayed
  chosen_spanish: oré
  alternatives_spanish:
  - recé
  - supliqué
  lexicon: CAL
  rationale: El verbo indica oración dirigida a Dios; «oré» es la forma más directa, sobria y natural en español bíblico contemporáneo.
- source_word: ܘܐܡ̇ܪܬ
  english_pob_choice: and said
  chosen_spanish: y dije
  alternatives_spanish:
  - y hablé
  - y declaré
  lexicon: CAL
  rationale: La secuencia formula una introducción de discurso en primera persona. «Y dije» preserva la sencillez del original y el encabalgamiento narrativo.
theological_decisions:
- issue: Título divino ܚܝܠܬܢܐ
  english_pob_reading: Capitalized 'Mighty One' to reflect its usage as a proper divine title in the text.
  chosen_spanish_reading: «el Poderoso» como título divino capitalizado implícitamente por el contexto.
  alternative_spanish_readings:
  - «el Poderoso» entendido solo como adjetivo
  - «el Fuerte»
  rationale: El texto presenta un apelativo divino establecido. En español conviene conservar su carácter titulativo sin sustituirlo por una designación litúrgica ajena al original. La mayúscula interna no se usa con el artículo en español, pero el contexto marca su función de nombre/título de Dios.
  doctrine_reference: Theological title in 2 Baruch; divine omnipotence
- issue: Oración delante de Dios
  english_pob_reading: I prayed before the Mighty One
  chosen_spanish_reading: «oré delante del Poderoso»
  alternative_spanish_readings:
  - «oré ante el Poderoso»
  - «oré en presencia del Poderoso»
  rationale: «Delante de» mantiene la relación espacial/ritual del original sin añadir interpretación. Se conserva la dimensión de comparecencia reverente ante Dios.
  doctrine_reference: Prayer before God as reverent audience
translation_notes:
  revision_awareness: 'Se siguió la corrección de alcance: esta unidad contiene estrictamente 2 Baruc 48:1 y no debe incluir el resto del capítulo. La redacción española se limitó al solo versículo 1, conforme al aviso de recorte por error de límites versiculares.'
  spanish_consistency_notes:
  - Se mantuvo «Poderoso» para ܚܝܠܬܢܐ en coherencia con la decisión inglesa «Mighty One», evitando «SEÑOR» como sustitución no respaldada por el original.
  - La fórmula narrativa «Y aconteció» conserva el registro bíblico sin copiar mecánicamente el inglés.
  - No se añadió contenido interpretativo más allá del versículo 1; el texto termina en «dije:» como en el original.
