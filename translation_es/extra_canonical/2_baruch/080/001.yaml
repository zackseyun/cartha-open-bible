translation:
  language: es
  text: 'Sabiendo primero lo que iba a suceder, que Nabucodonosor, rey de Babilonia, se propuso en su corazón[a]... Pero sabíamos que ningún mandato saldría en vano de su boca, ni de otro modo que como él lo había dispuesto de antemano. Porque lo que había sido determinado de antemano fue mostrado abiertamente. Y también me fue revelado que los ángeles estaban actuando contra la ciudad: sacudieron sus muros, y abatieron el muro poderoso con sus sólidas esquinas de hierro. Pero en aquel tiempo escondieron los vasos sagrados, para que no fueran vistos por los enemigos.


    Y cuando hubieron hecho estas cosas, entonces entregaron a los enemigos el muro derribado, la casa saqueada, el templo incendiado y al pueblo que había sido vencido y era llevado cautivo, para que los enemigos no se jactaran y dijeran: «Hemos rodeado aun la casa del Altísimo, y en batalla la hemos derribado».


    También ataron a tus hermanos y los llevaron a Babilonia, y allí los hicieron habitar. Pero nosotros y nuestra descendencia fuimos dejados aquí, pocos y pequeños. Esta es la aflicción del pueblo acerca de la cual te escribí. Pues ciertamente sabes que la humillación de Sion ha pesado mucho sobre ti, porque tu conocimiento de ella era mayor que el del pueblo, ya que tú eras de los que servían allí, mientras nosotros ayudábamos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se lo había propuesto en su corazón».'
    reason: Alternative nuance for the idiom of inward resolve.
lexical_decisions:
- source_word: ܡܠܐܟ̈ܐ
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: Payne Smith
  rationale: En este contexto apocalíptico los agentes que actúan contra la ciudad son seres celestiales, no simples enviados humanos; por eso «ángeles» conserva la fuerza teológica del texto y sigue la decisión del POB inglés.
- source_word: ܫܘܪ̈ܝܗ̇ / ܫܘܪܝܐ ܕܒܪܝܬܐ
  english_pob_choice: its walls … the mighty wall
  chosen_spanish: sus muros … el muro poderoso
  alternatives_spanish:
  - fortificaciones
  - murallas
  - baluartes
  lexicon: Payne Smith
  rationale: El siríaco se refiere a las defensas de la ciudad; «muros» es el equivalente claro y natural, y «muro poderoso» conserva la intensificación del pasaje dañado.
- source_word: ܡܐ ܛܒܝ̈ܢ
  english_pob_choice: the holy vessels
  chosen_spanish: los vasos santos
  alternatives_spanish:
  - los bienes preciosos
  - las cosas buenas
  lexicon: Payne Smith
  rationale: Aunque literalmente puede sonar como «cosas buenas», el contexto del templo apunta a los objetos sagrados del santuario. «Vasos santos» mantiene la referencia cultual sin suavizarla.
- source_word: ܐܫܠܡܘ
  english_pob_choice: they handed over
  chosen_spanish: entregaron
  alternatives_spanish:
  - los entregaron
  - los entregaron en manos de
  lexicon: Payne Smith
  rationale: El verbo expresa ceder algo al poder de otro; «entregaron» preserva el sentido de dar algo en manos enemigas sin añadir matices ajenos.
- source_word: ܚܘܪܐ
  english_pob_choice: the plundered house
  chosen_spanish: la casa saqueada
  alternatives_spanish:
  - la casa despojada
  - la casa asolada
  lexicon: Payne Smith
  rationale: La línea es textualmente áspera, pero el contexto de ruina y despojo exige una expresión que refleje violencia y pérdida; «saqueada» es la opción más directa y fiel.
- source_word: ܡܟܝܟ
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - abatimiento
  - bajeza
  lexicon: Payne Smith
  rationale: El cierre del capítulo habla de Sion puesta en vergüenza y rebajada públicamente; «humillación» conserva el componente de deshonra social y emocional.
theological_decisions:
- issue: Quién actúa en la caída de la ciudad
  english_pob_reading: The city falls under divine judgment, with angelic agents acting before enemy triumph.
  chosen_spanish_reading: La ciudad cae bajo juicio divino, y los ángeles actúan antes del triunfo enemigo.
  alternative_spanish_readings:
  - La ciudad fue destruida solo por los babilonios.
  - La acción angélica es solo metafórica.
  rationale: El siríaco presenta la ruina de Sion como un proceso ordenado por Dios y ejecutado por agentes celestiales antes de que los enemigos reciban la ciudad. La traducción conserva esa secuencia para no borrar la mediación divina.
  doctrine_reference: Providencia divina y juicio; mediación angélica en la narrativa apocalíptica
- issue: Por qué se esconden los vasos del templo
  english_pob_reading: The sanctuary objects are concealed so the enemy cannot claim mastery over what belongs to the Most High.
  chosen_spanish_reading: Los vasos santos se esconden para que el enemigo no pueda verlos ni jactarse de haber vencido al Altísimo.
  alternative_spanish_readings:
  - Se esconden solo para evitar el saqueo.
  - Se trata simplemente de bienes valiosos.
  rationale: 'La lógica narrativa es teológica: el enemigo no debe poder alardear como si hubiera conquistado por la fuerza lo que pertenece al Altísimo. La traducción mantiene ese motivo explícito.'
  doctrine_reference: Santidad del templo; soberanía del Altísimo
translation_notes:
  revision_awareness: La revisión inglesa detectó que una formulación previa añadía contenido ausente del siríaco. Esta versión evita introducir la cláusula interpretativa «para venir contra la ciudad» y se ciñe al texto fuente suministrado, manteniendo la secuencia apocalíptica atestiguada por el corpus siríaco controlado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no figura en este versículo.
  - «Ángeles» se usa de manera consistente con la lectura teológica del POB inglés para ܡܠܐܟ̈ܐ.
  - «Vasos santos» preserva el registro cultual y no se sustituye por un término más genérico como «bienes» o «cosas».
  - Se evita la paráfrasis expansiva y se conserva la tensión textual del inicio, marcada por la redacción fragmentaria del siríaco base.
