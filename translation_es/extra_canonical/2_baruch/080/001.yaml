    También ataron a tus hermanos y los llevaron a Babilonia, y allí los hicieron habitar. Pero nosotros y nuestra descendencia fuimos dejados aquí, pocos y pequeños. Esta es la aflicción del pueblo acerca de la cual te escribí. Pues ciertamente sabes que la humillación de Sion ha pesado mucho sobre ti, porque tu conocimiento de ella era mayor que el del pueblo, ya que ustedes eran los que servían allí, mientras nosotros ayudábamos.'
