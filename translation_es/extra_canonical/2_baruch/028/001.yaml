translation:
  language: es
  text: Por tanto, quien entienda será sabio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܡܢܝܢܗ
  english_pob_choice: reckoning
  chosen_spanish: el que entiende
  alternatives_spanish:
  - el entendido
  - el que hace el cómputo
  lexicon: Smith
  rationale: Aunque el contexto inmediato en el testimonio inglés deja una frase sapiencial breve, el siríaco apunta a la idea de comprensión/aprehensión. En español, 'el que entiende' conserva la fuerza gnómica sin introducir una abstracción innecesaria como 'cómputo'.
- source_word: ܚܟܝܡ
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - sabedor
  lexicon: Payne Smith
  rationale: '''Sabio'' es el equivalente natural y digno en español para una sentencia sapiencial. ''Prudente'' estrecha demasiado el campo semántico y ''sabedor'' suena poco idiomático.'
- source_word: ܗܘܐ / futuro sentencioso
  english_pob_choice: shall then be
  chosen_spanish: entonces será
  alternatives_spanish:
  - será entonces
  - llegará a ser
  lexicon: Payne Smith
  rationale: La secuencia temporal sentencia-condición se mantiene mejor con 'entonces será'. Evita inflar el texto con explicaciones y conserva el valor proverbial del enunciado.
theological_decisions:
- issue: Relación entre comprensión humana y sabiduría en una sentencia apocalíptica breve
  english_pob_reading: Therefore, whoever understands shall then be wise.
  chosen_spanish_reading: Por tanto, el que entiende, entonces será sabio.
  alternative_spanish_readings:
  - Por tanto, el entendido será sabio.
  - Así que quien comprenda será sabio.
  rationale: La frase presenta una conclusión sapiencial, no una doctrina desarrollada. 'El que entiende' mantiene la condición de discernimiento implícita en el siríaco sin convertirla en un lema moral más libre. La traducción conserva el vínculo entre comprensión y sabiduría, tal como lo hace el inglés POB.
  doctrine_reference: sabiduría/apreciación discerniente en literatura sapiencial y apocalíptica
translation_notes:
  revision_awareness: 'El paquete de auditoría inglés mostró una corrección mayor: el borrador anterior había traducido erróneamente material de 2 Baruc 27:1-10. Para 2 Baruc 28:1, el texto fuente siríaco disponible en este expediente es una sentencia breve y fragmentaria; por eso la draft española se limita a la proposición que puede sustentarse con seguridad, sin importar contenido de la sección anterior.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no hay un tetragrámaton explícito en este versículo.
  - Se mantuvo un registro sobrio y sapiencial, acorde con el tono de la línea fuente.
  - No se añadieron notas al pie porque no hay una alternativa textual significativa que deba anclarse en este verso breve.
