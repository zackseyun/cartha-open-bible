lexical_decisions:
- source_word: ܘܥܢܐ
  english_pob_choice: And he answered
  chosen_spanish: Y él me respondió
  alternatives_spanish:
  - Y él contestó
  - Entonces me respondió
  lexicon: Payne Smith
  rationale: Se conserva la fórmula narrativa de respuesta de manera natural en español; «respondió» mantiene el valor directo del siriaco sin intensificar el tono.
- source_word: ܘܐܡܪ ܠܝ
  english_pob_choice: said to me
  chosen_spanish: 'y dijo: «…»'
  alternatives_spanish:
  - 'y me dijo: «…»'
  - 'y habló conmigo: «…»'
  lexicon: Payne Smith
  rationale: El destino del verbo de habla se expresa con un giro idiomático y bíblico en español; la relación discursiva con el interlocutor queda clara por el contexto inmediato.
- source_word: ܡܛܠ ܗܢܐ
  english_pob_choice: Because of this
  chosen_spanish: A causa de esto
  alternatives_spanish:
  - Por esta razón
  - Por esto
  lexicon: Payne Smith
  rationale: La causalidad explícita se conserva con una expresión natural y sobria; «a causa de esto» reproduce bien el enlace explicativo.
- source_word: ܒܗܘ ܙܒܢܐ
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: Payne Smith
  rationale: Se mantiene el matiz temporal formal y un poco solemne del registro apocalíptico, sin reducirlo a un simple adverbio discursivo.
- source_word: ܐܡܝܪ
  english_pob_choice: it was said
  chosen_spanish: fue dicho
  alternatives_spanish:
  - se dijo
  - fue hablado
  lexicon: Payne Smith
  rationale: El pasivo impersonal preserva la vaguedad del siriaco y evita especificar un hablante que el fragmento no identifica.
theological_decisions:
- issue: Attribution of the opening reply
  english_pob_reading: The reply is rendered as a direct continuation of the revealed dialogue without specifying more than the Syriac states.
  chosen_spanish_reading: La frase se traduce como continuación directa del diálogo sin añadir un sujeto explícito distinto del que marca el texto.
  alternative_spanish_readings:
  - Expandirlo interpretativamente como pronunciamiento divino.
  - Parafrasearlo como explicación general.
  rationale: El tramo conservado solo presenta la fórmula de respuesta y el inicio de la explicación; por fidelidad textual no se introduce una atribución más precisa que la del siriaco preservado.
  doctrine_reference: Principio de sobriedad textual en pasajes fragmentarios; no añadir contenido no atestiguado.
translation_notes:
  revision_awareness: Se siguió el tramo inicial conservado del siriaco de 2 Baruc 19:1 y la decisión auditada en inglés de mantener una apertura pasiva y no especificada para ܐܡܝܪ, evitando ampliar el enunciado más allá del fragmento disponible.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma habitual del proyecto solo donde corresponda; aquí el versículo no contiene el Tetragrámaton.
  - Se mantuvo un registro bíblico sobrio y contemporáneo, evitando calcos duros salvo en la fórmula narrativa necesaria.
  - No se añadieron notas porque el fragmento no presenta variantes textuales o ambigüedades que requieran marca en el texto español.
