- issue: Referencia a la revelación del tabernáculo a Moisés en Sinaí
  english_pob_reading: And again I also showed it to Moses on Mount Sinai, when I showed him the likeness of the tabernacle and all its vessels.
  chosen_spanish_reading: Y otra vez se lo mostré también a Moisés en el monte Sinaí, cuando le mostré la semejanza del tabernáculo y todos sus utensilios.
