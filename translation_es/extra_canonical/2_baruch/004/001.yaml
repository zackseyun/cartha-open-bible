translation:
  language: es
  text: 'Y Yahvé me dijo: «Esta ciudad será entregada por un tiempo, y el pueblo será llevado cautivo, pero el mundo no será olvidado.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܡܪܝܐ
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: POB project default / Yahweh naming convention
  rationale: El texto siriaco usa el nombre divino, y el proyecto POB pide reflejarlo como «Yahvé» en español, en vez de ocultarlo con una equivalencia genérica.
- source_word: ܡܫܬܠܡܐ
  english_pob_choice: will be delivered up
  chosen_spanish: será entregada
  alternatives_spanish:
  - será entregada en manos de otros
  - será puesta en manos de sus enemigos
  lexicon: Payne Smith
  rationale: «Entregada» conserva el valor jurídico-apocalíptico de una ciudad cedida al juicio, sin volverla una mera destrucción física.
- source_word: ܡܬܕܒܪ ܫܒܝܐ
  english_pob_choice: will be led away into captivity
  chosen_spanish: será llevado cautivo
  alternatives_spanish:
  - será conducido al cautiverio
  - será llevado al exilio
  lexicon: Payne Smith
  rationale: La construcción siriaca es concreta y activa; «llevado cautivo» reproduce el movimiento de deportación mejor que una paráfrasis abstracta.
- source_word: ܥܠܡܐ ܠܐ ܡܬܬܢܫܐ
  english_pob_choice: the world will not be forgotten
  chosen_spanish: el mundo no será olvidado
  alternatives_spanish:
  - la era no será olvidada
  - el mundo no será abandonado al olvido
  lexicon: Payne Smith
  rationale: «Olvidado» conserva la imagen del original y mantiene la respuesta a la preocupación cósmica del contexto sin expandirla innecesariamente.
- source_word: ܡܕܝܢܬܐ
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - Jerusalén
  - Sion
  lexicon: Payne Smith
  rationale: Se mantiene «ciudad» para no imponer la identificación en la línea principal cuando el contexto la desarrolla por contraste.
theological_decisions:
- issue: Identidad de la ciudad
  english_pob_reading: The passage distinguishes the presently visible Jerusalem from a city prepared beforehand by God and later to be revealed.
  chosen_spanish_reading: El pasaje habla de una ciudad visible y presente sin nombrarla, manteniendo la distinción respecto de la realidad escatológica aludida en el contexto inmediato.
  alternative_spanish_readings:
  - Se trata directamente de Jerusalén
  - La línea habla solo de la reconstrucción histórica tras el exilio
  rationale: El siriaco nombra «esta ciudad» y no fuerza la identificación inmediata con Jerusalén en la cláusula inicial; por fidelidad al texto, la distinción se deja para el contexto cercano.
  doctrine_reference: motivo de la ciudad preparada / Jerusalén celestial
- issue: Alcance del juicio divino
  english_pob_reading: Jerusalem’s fall and the people’s captivity are temporary acts of judgment, not the undoing of creation or covenant history.
  chosen_spanish_reading: La entrega de la ciudad y el cautiverio del pueblo son temporales, y no significan que el mundo quede olvidado.
  alternative_spanish_readings:
  - La destrucción implica abandono cósmico total
  - El exilio es final e irrevocable
  rationale: «Por un tiempo» y «no será olvidado» preservan el límite temporal y la misericordia implícita del pasaje, sin suavizar el juicio anunciado.
  doctrine_reference: juicio divino con memoria de la creación
translation_notes:
  revision_awareness: 'Se siguió la última revisión auditada: v.2 corrigió la importación de lenguaje ajeno al siriaco; v.3 se ajustó para mantener la idea de una ciudad ahora construida en medio de ustedes en el contexto extendido del pasaje. En este recorte, solo el v.1 se traduce, así que se conservan las decisiones léxicas centrales sin añadir material no incluido en el versículo recibido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para ܡܪܝܐ según la norma del proyecto.
  - 'Se mantiene el orden informativo: anuncio de entrega de la ciudad, cautiverio del pueblo, y negación de olvido del mundo.'
  - Se evita introducir «Jerusalén» en el texto principal porque el verso hebreo/siriaco disponible habla de «esta ciudad».
