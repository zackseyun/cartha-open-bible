translation:
  language: es
  text: Y después de estas cosas, lo mostré a mi siervo Abraham de noche, entre las piezas del sacrificio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: 𐡀𐡁𐡃𐡀 / ‘abda
  english_pob_choice: my servant Abraham
  chosen_spanish: mi siervo Abraham
  alternatives_spanish:
  - mi esclavo Abraham
  lexicon: δοῦλος / ‘abda
  rationale: El contexto patriarcal y honorífico favorece «siervo» en español, como en la revisión inglesa. «Esclavo» conserva fuerza léxica, pero aquí en español suena más duro y menos idiomático para Abraham.
- source_word: at night
  english_pob_choice: at night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  lexicon: νυκτός / 'night' temporal adverb
  rationale: «De noche» es una equivalencia natural y fiel al valor temporal del original, sin desplazar el sentido hacia un momento más específico de lo que permite el texto.
- source_word: between the pieces of the sacrifice
  english_pob_choice: between the pieces of the sacrifice
  chosen_spanish: entre las partes del sacrificio
  alternatives_spanish:
  - entre los pedazos del sacrificio
  - entre las piezas del sacrificio
  lexicon: sacrifice-cut pieces covenant idiom
  rationale: Se conserva la imagen sacrificial y pactal sin suavizarla. «Partes» mantiene una referencia amplia y digna, compatible con el lenguaje bíblico y con la formulación inglesa auditada.
theological_decisions:
- issue: Presentación revelada a Abraham en contexto de pacto
  english_pob_reading: I showed it to my servant Abraham at night, between the pieces of the sacrifice.
  chosen_spanish_reading: lo mostré a mi siervo Abraham de noche, entre las partes del sacrificio
  alternative_spanish_readings:
  - lo mostré a mi esclavo Abraham de noche, entre las partes del sacrificio
  rationale: No se altera la escena pactal ni el sujeto divino implícito de la revelación. Se preserva el registro de alianza y la dignidad del patriarca mediante «siervo».
  doctrine_reference: Génesis 15:10-18; uso bíblico de «siervo» para patriarcas y profetas
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde «my slave Abraham» a «my servant Abraham» por criterio honorífico y contextual; además, «by night» se suavizó a «at night». La traducción española sigue esa revisión y evita reintroducir la ambigüedad o dureza de «esclavo».
  spanish_consistency_notes:
  - Mantengo «siervo» para ‘abda en este contexto patriarcal, conforme a la revisión inglesa.
  - Conservo la imagen de pacto con «entre las partes del sacrificio» sin explicitar más de lo que el texto permite.
  - Uso «de noche» para reflejar el valor temporal de la expresión sin añadir matices no atestiguados.
