translation:
  language: es
  text: Pero cuando transgredió el mandamiento, le fue quitado de él, así como el Paraíso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Así como” conserva la comparación breve del inglés POB; no se amplía a una explicación interpretativa.
