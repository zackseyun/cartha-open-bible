lexical_decisions:
- source_word: transgressed the commandment
  english_pob_choice: transgressed the commandment
  chosen_spanish: transgredió el mandamiento
  alternatives_spanish:
  - quebrantó el mandamiento
  - desobedeció el mandamiento
  lexicon: transgredir / mandamiento
  rationale: El inglés POB conserva la fuerza jurídica y moral de “transgressed”; en español “transgredió” mantiene ese matiz más formal que “desobedeció”, y “mandamiento” corresponde con claridad al precepto.
- source_word: it was taken from him
  english_pob_choice: it was taken from him
  chosen_spanish: le fue quitado de él
  alternatives_spanish:
  - le fue arrebatado
  - fue quitado de él
  lexicon: quitar / arrebatar
  rationale: La pasiva con dativo expresa bien que algo le fue removido. “Quitado” refleja la decisión del inglés POB sin añadir intensidad no documentada; “le fue quitado de él” mantiene la referencia al poseedor sin forzar una reexpresión más idiomática que pudiera perder precisión.
- source_word: Paradise
  english_pob_choice: Paradise
  chosen_spanish: el Paraíso
  alternatives_spanish:
  - Paraíso
  lexicon: Paraíso
  rationale: Se conserva el término técnico tradicional con artículo para fluidez en español. El inglés POB no introduce aclaración adicional, así que no se paraphrasea.
theological_decisions:
- issue: Pérdida del Paraíso por la transgresión
  english_pob_reading: it was taken from him, just as Paradise was
  chosen_spanish_reading: le fue quitado de él, así como el Paraíso
  alternative_spanish_readings:
  - le fue arrebatado, así como el Paraíso
  - le fue quitado, así como el Paraíso
  rationale: La construcción mantiene la comparación entre la pérdida de lo concedido a Adán y la pérdida del Paraíso, sin explicar más allá del texto. No se suaviza la relación causal ni se añade agente explícito.
  doctrine_reference: Narrativa de Génesis 3; motivo de expulsión/pérdida del jardín en literatura judía del Segundo Templo
translation_notes:
  revision_awareness: 'Se sigue la forma final del inglés POB revisado: “taken from him” y la eliminación de cualquier redundancia equivalente a “also” después de Paradise. La versión española evita añadir “también” o una expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y directo.
  - Se evita reemplazar el lenguaje de transgresión por una paráfrasis más suave.
  - El pronombre y la pasiva reproducen la pérdida sin introducir un sujeto agente no expresado en el original.
