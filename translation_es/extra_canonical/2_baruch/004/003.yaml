translation:
  language: es
  text: Porque no es aquello que ahora se edifica en medio de ustedes; es aquello que será revelado conmigo[a], lo cual fue preparado de antemano aquí desde el tiempo en que resolví hacer el Paraíso, y lo mostré a Adán antes de que pecara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «revelado, lo cual».
    reason: alternative_reading
lexical_decisions:
- source_word: now built in your midst
  english_pob_choice: that which is now built in your midst
  chosen_spanish: aquello que ahora se edifica en medio de ustedes
  alternatives_spanish:
  - lo que ahora se construye entre ustedes
  - lo que ahora se levanta en medio de ustedes
  lexicon: none
  rationale: «Se edifica» conserva la idea de construcción en proceso sin forzar un matiz técnico. «En medio de ustedes» refleja el plural y la localización comunitaria de «in your midst» de manera natural en español.
- source_word: revealed with me
  english_pob_choice: revealed with me
  chosen_spanish: será revelado conmigo
  alternatives_spanish:
  - será revelado junto conmigo
  - será revelado con respecto a mí
  lexicon: none
  rationale: La preposición con valor de compañía debe conservarse porque el arreglo revisado del inglés subraya que la realidad está «with me». «Conmigo» es la forma más natural y fiel en español.
- source_word: prepared beforehand here
  english_pob_choice: prepared beforehand here
  chosen_spanish: fue preparado de antemano aquí
  alternatives_spanish:
  - fue preparado antes aquí
  - estaba preparado de antemano aquí
  lexicon: none
  rationale: «De antemano» expresa preparación previa sin añadir interpretación. «Aquí» mantiene la localización celeste o divina del adverbio del texto fuente.
- source_word: Paradise
  english_pob_choice: Paradise
  chosen_spanish: el Paraíso
  alternatives_spanish:
  - el jardín del Paraíso
  - el Jardín
  lexicon: none
  rationale: «Paraíso» es el equivalente directo y ampliamente inteligible en español; conserva el término técnico y la referencia intertextual sin paraphrasear.
- source_word: Adam before he sinned
  english_pob_choice: Adam before he sinned
  chosen_spanish: Adán antes de que pecara
  alternatives_spanish:
  - Adán antes de pecar
  - Adán antes de su pecado
  lexicon: none
  rationale: «Pecara» preserva el aspecto subordinado temporal y mantiene una formulación idiomática en español. No se explicita más de lo que el fuente dice.
theological_decisions:
- issue: La frase «revelado conmigo» conserva una relación de presencia asociada a Dios y evita diluir el matiz revisado por el auditor.
  english_pob_reading: revealed with me
  chosen_spanish_reading: será revelado conmigo
  alternative_spanish_readings:
  - será revelado junto conmigo
  - será revelado ante mí
  rationale: 'La revisión inglesa corrigió una omisión importante: el texto no dice solo que será revelado, sino que lo será «conmigo». En español, «conmigo» mantiene esa cercanía relacional sin convertirla en una explicación doctrinal ajena al verso.'
  doctrine_reference: Presencia divina y preexistencia del Paraíso/ciudad celestial según 2 Baruch 4:3.
translation_notes:
  revision_awareness: La versión inglesa revisada añadió y fijó el matiz de «with me» en la cláusula de revelación; la presente traducción lo conserva explícitamente con «conmigo» y ancla la nota alternativa en el mismo segmento.
  spanish_consistency_notes:
  - Se usó «Paraíso» con mayúscula para corresponder al término técnico del texto fuente.
  - Se evitó sustituir «Dios» o introducir «Señor» porque el versículo no contiene ese lexema explícitamente.
  - La puntuación separa claramente la oposición entre lo que se construye ahora y lo que será revelado conmigo.
