- source_word: On the palms of my hands
  english_pob_choice: On the palms of my hands
  chosen_spanish: En las palmas de mis manos
  alternatives_spanish:
  - Sobre las palmas de mis manos
  - En las palmas de mis manos he
  lexicon: palm
  rationale: «Palmas de mis manos» reproduce con claridad la imagen corporal y conserva el eco de Isaías 49:16 que el Syriac cita de manera directa.
- source_word: engraved
  english_pob_choice: engraved
  chosen_spanish: te he grabado
  alternatives_spanish:
  - te he inscrito
  - te he grabado en ellas
  lexicon: engrave
  rationale: «He grabado» comunica la acción de marcar de forma permanente. Se evita «inscrito» por sonar más técnico y menos imagético en español, aunque sigue siendo una alternativa posible.
theological_decisions:
- issue: La cita implícita de Isaías 49:16 y su tono de posesión/memoria divina
  english_pob_reading: On the palms of my hands I have engraved you
  chosen_spanish_reading: En las palmas de mis manos te he grabado
  alternative_spanish_readings:
  - Te he inscrito en las palmas de mis manos
  - Te llevo grabado en las palmas de mis manos
  rationale: 'La formulación mantiene la fuerza bíblica de la imagen: Dios no solo recuerda, sino que marca a su pueblo de manera indeleble. No se suaviza la metáfora, porque el texto fuente y la revisión auditada confirman la cita directa.'
  doctrine_reference: Isaías 49:16; tema de la memoria y elección divina
translation_notes:
  revision_awareness: 'La revisión auditada corrigió una lectura previa errónea que había sustituido la cita de Isaías por otra frase ajena. El texto español sigue la lectura confirmada por el Syriac: ''On the palms of my hands I have engraved you''.'
  spanish_consistency_notes:
  - Se usa «Dije» en estilo de cita directa implícita sin añadir expansión interpretativa.
  - No se introduce «Señor» ni otra sustitución para el nombre divino, porque este verso no lo contiene explícitamente.
  - Se conserva el orden retórico de la pregunta para reflejar el hebreo/siríaco subyacente y la traducción inglesa auditada.
