translation:
  language: es
  text: Por tanto, hagan duelo por Sion y giman por Jerusalén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܐܦ / ܐܠܐ ...
  english_pob_choice: Therefore, mourn ... and sigh ...
  chosen_spanish: Por tanto, hagan duelo ... y giman ...
  alternatives_spanish:
  - Así que, lamenten ... y suspiren ...
  - Por eso, lloren ... y suspiren ...
  lexicon: Payne Smith
  rationale: El Syriaco introduce una consecuencia exhortativa; «por tanto» conserva esa conexión lógica. «Hagan duelo» reproduce con más fuerza ritual y pública el sentido de lamento, mientras «giman» mantiene la segunda imagen de pesar sin volverla meramente emocional.
- source_word: ܨܗܝܘܢ
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: uso bíblico castellano estándar
  rationale: En español bíblico, «Sion» es la forma más natural y reconocible para la topografía teológica del texto, sin alterar la referencia.
- source_word: ܐܘܪܫܠܡ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: uso bíblico castellano estándar
  rationale: Se mantiene el nombre propio consagrado en español para asegurar claridad y fluidez, sin perder el paralelismo poético del hebreo/siríaco.
theological_decisions:
- issue: Lamento profético por las ciudades santas
  english_pob_reading: Therefore, mourn for Zion, and sigh for Jerusalem.
  chosen_spanish_reading: Por tanto, hagan duelo por Sion y giman por Jerusalén.
  alternative_spanish_readings:
  - Lamenten por Sion y suspiren por Jerusalén.
  - Hagan duelo por Sion y lloren por Jerusalén.
  rationale: La línea es una exhortación de duelo profético. «Hagan duelo» y «giman» conservan tanto la intensidad emocional como la dimensión pública/comunitaria del mandato, sin suavizarlo a una mera tristeza interior.
  doctrine_reference: Lamento profético / Sion y Jerusalén como símbolos del pueblo y de la ciudad santa
translation_notes:
  revision_awareness: La fuente siríaca dada para este registro está claramente corrupta y corresponde al tramo inicial del capítulo/epístola anterior, mientras que el testimonio auditado en inglés para 2 Baruch 79:1 ofrece la lectura objetivo concreta. Por eso el español sigue la traducción auditada del versículo, no la secuencia OCR extensa del bucket siríaco.
  spanish_consistency_notes:
  - Se usa «Sion» de forma consistente para la topografía teológica, y «Jerusalén» como nombre propio español estándar.
  - Se evita introducir vocabulario eclesiástico no presente en el verso.
  - El tono es exhortativo y profético, no narrativo.
