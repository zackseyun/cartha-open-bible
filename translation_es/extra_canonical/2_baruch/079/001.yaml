  footnotes:
  - marker: a
    text: 'Or ''These are the words of the letter that Baruch son of Neriah sent to the nine and a half tribes beyond the Euphrates; and these are the things written in it:\n\nThus says Baruch son of Neriah to the brothers who were taken captive: Peace and mercy be with you. I remember, my brothers, the love of him who created us, who loved us from the beginning and has not utterly hated us; rather, he has disciplined us. And truly I know that now all of us, the twelve tribes, are bound in one bond, because we were born from one father.\n\nFor this reason I was all the more careful to leave you the words of this letter before I die, so that you may be comforted concerning the evils that have come upon you, and may also grieve concerning the evil that has come upon your brothers, and again may declare his judgment righteous, which he decreed against you, that you should be carried away captive. For what you have suffered is not beyond measure compared with what you have done, so that in later
      times you may be found worthy of your fathers.''.'
