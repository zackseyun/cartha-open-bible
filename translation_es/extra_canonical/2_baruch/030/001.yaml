translation:
  language: es
  text: 'Y sucederá después de estas cosas: cuando se cumpla el tiempo de la venida del Mesías[a] y él regrese en gloria, entonces todos los que duermen con esperanza en él se levantarán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «la llegada del Mesías»; se prefiere «venida» por su mejor ajuste al tono apocalíptico.
    reason: alternative_reading
lexical_decisions:
- source_word: ܡܐܬܝܬܗ ܕܡܫܝܚܐ
  english_pob_choice: the coming of the Messiah
  chosen_spanish: la venida del Mesías
  alternatives_spanish:
  - la llegada del Mesías
  - la aparición del Mesías
  - el advenimiento del Mesías
  lexicon: Smith
  rationale: La expresión designa la llegada escatológica del Mesías. 'Venida' conserva el registro apocalíptico y evita imponer el término cristológico 'Cristo', que el POB inglés reservó deliberadamente.
- source_word: ܢܬܦܣܩ
  english_pob_choice: is fulfilled
  chosen_spanish: se cumpla
  alternatives_spanish:
  - sea completado
  - llegue a su fin
  - sea consumado
  lexicon: Smith
  rationale: 'El contexto es temporal: el cumplimiento del plazo fijado, no una conclusión violenta. ''Se cumpla'' refleja bien la idea de cumplimiento del tiempo en español natural.'
- source_word: ܕܒܚܝܐ ܕܡܫܝܚܐ
  english_pob_choice: in hope of him
  chosen_spanish: con esperanza en él
  alternatives_spanish:
  - en esperanza de él
  - esperando en él
  - con esperanza de él
  lexicon: Smith
  rationale: La sintaxis española exige una formulación más natural que la calca literal. 'Con esperanza en él' conserva la orientación de la esperanza hacia el Mesías y mantiene el matiz de confianza escatológica.
- source_word: ܢܦܩܘܢ / ܢܚܙܘܢ / ܢܚܝܐ
  english_pob_choice: will rise
  chosen_spanish: se levantarán
  alternatives_spanish:
  - resucitarán
  - se alzarán
  lexicon: Smith
  rationale: Aunque el contexto claramente apunta a resurrección, 'se levantarán' mantiene el verbo de movimiento ascendente implícito en el texto y preserva la imaginería sin explicitar más de lo que el enunciado inmediato dice.
theological_decisions:
- issue: Término mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  - Ungido
  rationale: Se conserva 'Mesías' para respetar el registro judío apocalíptico del siriaco ܡܫܝܚܐ y no introducir una formulación litúrgica cristiana no requerida por la fuente.
  doctrine_reference: Preservar el marco apocalíptico judío del texto fuente sin sobrecargarlo con terminología posterior.
- issue: Lenguaje de resurrección
  english_pob_reading: those who sleep in hope of him will rise
  chosen_spanish_reading: todos los que duermen con esperanza en él se levantarán
  alternative_spanish_readings:
  - todos los que han muerto con esperanza en él resucitarán
  - los que duermen esperando en él despertarán
  rationale: Se mantiene la metáfora del sueño y la esperanza dirigida al Mesías. 'Se levantarán' conserva el movimiento verbal sin convertir la línea en una explicación doctrinal más amplia que el texto.
  doctrine_reference: Preservar la imagen apocalíptica y la tensión entre sueño, esperanza y levantamiento.
translation_notes:
  revision_awareness: La sección fuente disponible para este expediente corresponde solo al inicio de 2 Baruc 30:1. El inglés auditado muestra que la versión completa del versículo en el corpus POB continúa con varias cláusulas sobre urnas, almas y su reunión, pero el paquete de fuente siríaca proporcionado aquí contiene únicamente la frase inicial hasta la mención de la venida del Mesías y el despertar de los que duermen en esperanza. Por integridad textual, el español se limita a esa porción atestiguada.
  spanish_consistency_notes:
  - Se usa 'Y sucederá después de estas cosas' para reproducir la apertura apocalíptica estándar sin volverla demasiado bíblica en sentido de tradición específica.
  - '''Mesías'' se mantiene sin alternarlo con ''Cristo'' para conservar consistencia con el registro judío del texto.'
  - '''se levantarán'' armoniza con el valor verbal del pasaje y evita sobretraducir a una formulación doctrinal más cerrada.'
  - La nota al pie solo marca una alternativa real de traducción y no introduce contenido ausente de la fuente.
