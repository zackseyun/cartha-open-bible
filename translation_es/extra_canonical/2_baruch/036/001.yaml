translation:
  language: es
  text: 'Cuando hube dicho estas cosas, me dormí allí, y en la noche vi una visión. Y he aquí, un bosque de árboles plantados en la llanura, y montañas altas y escarpadas lo rodeaban; y aquel bosque cubría una gran extensión. Y he aquí, frente a él brotó una vid, y de debajo de ella salió un manantial[a] apaciblemente[b]. Entonces aquel manantial fue hacia el bosque y se hinchó en olas poderosas, y aquellas olas sumergieron aquel bosque, y de repente arrancaron de raíz la mayor parte de él y derribaron todas las montañas a su alrededor. Y la altura del bosque fue abatida, y las cumbres de las montañas fueron rebajadas, y aquel manantial cobró mucha fuerza, de modo que no quedó nada de aquel gran bosque, sino un solo cedro. Y cuando hubo derribado y destruido y arrancado de raíz la mayor parte de aquel bosque, de modo que no quedó nada de él y ya no podía reconocerse su lugar, entonces aquella vid vino con el manantial en calma y con gran quietud, y llegó a un lugar no lejos de aquel cedro,
    y le trajeron el cedro que había sido derribado. Y vi, y he aquí, la vid abrió su boca y dijo al cedro: “¿No eres tú aquel cedro que quedó del bosque de maldad, por medio del cual la maldad siguió obrando todos aquellos años, mientras no había bondad? Y siempre tomabas lo que no era tuyo, y de lo que era tuyo nunca te compadecías; y a los que estaban lejos los sometiste a tu poder, y a los que se acercaban los retuviste en las trampas de tu maldad; y siempre te alzabas como quien no podía ser arrancado de raíz. Pero ahora tu tiempo se ha apresurado, y ha llegado tu hora. Así que vete también, oh cedro, tras el bosque que fue antes de ti, y conviértete en polvo con él, y mézclense juntas tus cenizas. Y acuéstate en tristeza, y descansa en tormento hasta que llegue tu último tiempo, cuando volverás otra vez y serás atormentado aún más.”'
  philosophy: optimal-equivalence
  footnotes:
