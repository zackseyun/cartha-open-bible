  english_pob_reading: The main text leaves the symbols uninterpreted within the vision.
  chosen_spanish_reading: El texto principal conserva la visión sin identificar todavía de forma explícita a la vid y al manantial.
  alternative_spanish_readings:
  - La vid y el manantial representan ya aquí figuras mesiánicas explícitas.
