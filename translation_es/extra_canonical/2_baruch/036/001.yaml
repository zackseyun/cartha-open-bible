  lexicon: Payne Smith
  rationale: El término español 'bosque' reproduce bien la imagen apocalíptica de una masa grande de árboles; 'selva' sería demasiado tropical y 'arboleda' demasiado pequeña o delicada.
- source_word: ܓܦܢ
  english_pob_choice: vine
  chosen_spanish: vid
  alternatives_spanish:
  - vid de uvas
  - parra
  lexicon: Payne Smith
  rationale: '''Vid'' es el equivalente bíblico natural en español y mantiene la carga simbólica sin añadir explicaciones.'
- source_word: ܡܒܘܥܐ
  english_pob_choice: fountain
  chosen_spanish: manantial
  alternatives_spanish:
  - fuente
  - naciente
  lexicon: Payne Smith
  rationale: Aunque el inglés POB usa 'fountain' por su registro elevado, en español 'manantial' comunica mejor el origen vivo del agua y evita la idea de una fuente ornamental.
- source_word: ܐܪܙܐ
  english_pob_choice: cedar
  chosen_spanish: cedro
  alternatives_spanish:
  - cedro del Líbano
  - árbol de cedro
  lexicon: Payne Smith
  rationale: '''Cedro'' es el término bíblico establecido en español y conserva el símbolo sin sobreespecificarlo.'
- source_word: ܒܫܠܡܐ / peaceful-coming imagery
  english_pob_choice: peacefully / in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con tranquilidad
  lexicon: Payne Smith
  rationale: '''En paz'' mantiene la oposición narrativa entre la salida serena del agua y su posterior fuerza destructora, con una formulación natural en español.'
