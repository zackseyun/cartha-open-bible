  - severity: low
    issue: '''prevaleció grandemente'' es una formulación pesada'
    rationale: No es incorrecta, pero 'cobró mucha fuerza' o 'prevaleció con gran fuerza' suena más natural y conserva el énfasis.
  - severity: medium
    issue: '''lo que era tuyo nunca lo trataste con compasión'' resulta semánticamente extraño'
    rationale: En español se trata con compasión a personas, no a posesiones. El contexto del inglés apunta a no mostrar misericordia con lo propio o con los cercanos/súbditos; una formulación más natural preserva mejor la acusación ética sin cambiar el sentido.
  - severity: low
    issue: '''trajeron a él el cedro'' y ''te levantabas a ti mismo'' suenan calcados'
    rationale: Pueden naturalizarse como 'le trajeron el cedro' y 'siempre te alzabas' sin pérdida semántica.
