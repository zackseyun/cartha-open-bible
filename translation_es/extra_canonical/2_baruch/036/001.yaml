  - '''Bosque'' representa la magnitud colectiva de ܥܒ̈ܐ con un registro natural en español.'
  - Se evita 'SEÑOR' o vocabulario litúrgico ajeno, porque este pasaje no contiene el Tetragrámaton ni referencias directas a κύριος.
