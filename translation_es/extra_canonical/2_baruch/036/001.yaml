revisions:
- from: 'Cuando había dicho estas cosas, me dormí allí, y en la noche vi una visión. Y he aquí, un bosque de árboles plantados en la llanura, y montañas altas y escarpadas lo rodeaban; y aquel bosque cubría una gran extensión. Y he aquí, frente a él brotó una vid, y de debajo de ella salió un manantial[a] en paz[b]. Entonces aquel manantial fue hacia el bosque y se hinchó en olas poderosas, y aquellas olas sumergieron aquel bosque, y de repente arrancaron de raíz la mayor parte de él y derribaron todas las montañas alrededor de él. Y la altura del bosque fue abatida, y las cumbres de las montañas fueron rebajadas, y aquel manantial prevaleció grandemente, de modo que no quedó nada de aquel gran bosque, sino un solo cedro. Y cuando hubo derribado y destruido y arrancado de raíz la mayor parte de aquel bosque, de modo que no quedó nada de él y ya no podía reconocerse su lugar, entonces aquella vid vino con el manantial en paz y con gran quietud, y llegó a un lugar no lejos de aquel cedro,
    y trajeron a él el cedro que había sido derribado. Y vi, y he aquí, la vid abrió su boca y dijo al cedro: “¿No eres tú aquel cedro que quedó del bosque de maldad, por medio del cual siguió obrando la maldad todos aquellos años, mientras no había bondad? Y siempre tomabas lo que no era tuyo, y lo que era tuyo nunca lo trataste con compasión; y a los que estaban lejos los sometiste a tu poder, y a los que se acercaban los retuviste en las trampas de tu maldad; y siempre te levantabas a ti mismo como uno que no podía ser arrancado de raíz. Pero ahora tu tiempo se ha apresurado, y ha llegado tu hora. Así que vete también, oh cedro, después del bosque que fue antes de ti, y conviértete en polvo con él, y sean mezcladas juntas tus cenizas. Y acuéstate en la tristeza, y descansa en tormento hasta que llegue tu último tiempo, cuando volverás otra vez y serás atormentado aún más.”'
