translation:
  language: es
  text: Y mi pueblo será disciplinado, y llegará el tiempo en que buscarán la prosperidad de sus tiempos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y llegará el tiempo, y buscarán».'
    reason: Preserva la alternativa documentada en la auditoría inglesa sobre la coordinación siríaca original.
lexical_decisions:
- source_word: ܢܬܪܕܘܢ / chastened
  english_pob_choice: will be chastened
  chosen_spanish: será disciplinado
  alternatives_spanish:
  - será corregido
  - será castigado
  - será amonestado
  lexicon: chastened
  rationale: El inglés POB usa una forma que puede abarcar corrección disciplinaria más que castigo retributivo. En español, ‘será disciplinado’ conserva esa idea de corrección formativa sin forzar un matiz excesivamente penal.
- source_word: w- / and the time will come when
  english_pob_choice: and the time will come when
  chosen_spanish: y llegará el tiempo cuando
  alternatives_spanish:
  - y vendrá el tiempo en que
  - y el tiempo vendrá cuando
  - y llegará el momento en que
  lexicon: time-coming temporal clause
  rationale: La revisión inglesa ya resolvió el enlace siríaco con ‘when’. En español, ‘llegará el tiempo cuando’ mantiene la progresión temporal natural y refleja la cláusula de tiempo sin añadir contenido no atestiguado.
- source_word: seek the prosperity of their times
  english_pob_choice: they will seek the prosperity of their times
  chosen_spanish: buscarán la prosperidad de sus tiempos
  alternatives_spanish:
  - buscarán el bienestar de sus tiempos
  - buscarán la paz de su tiempo
  - buscarán la prosperidad de ese tiempo
  lexicon: prosperity
  rationale: ‘Prosperity’ se rinde de modo directo como ‘prosperidad’, que conserva el alcance amplio de bienestar/florecimiento. ‘De sus tiempos’ sigue de cerca el posesivo plural del inglés POB y mantiene la referencia a sus épocas o circunstancias.
theological_decisions:
- issue: Sentido de la disciplina divina sobre el pueblo
  english_pob_reading: My people will be chastened
  chosen_spanish_reading: Mi pueblo será disciplinado
  alternative_spanish_readings:
  - Mi pueblo será castigado
  - Mi pueblo será corregido
  rationale: La formulación evita endurecer el juicio hasta ‘castigado’ y preserva la tensión entre corrección y juicio que sugiere el inglés POB.
  doctrine_reference: Disciplina divina / juicio correctivo
- issue: Relación entre el tiempo venidero y la búsqueda
  english_pob_reading: the time will come when they will seek
  chosen_spanish_reading: llegará el tiempo cuando buscarán
  alternative_spanish_readings:
  - vendrá el tiempo en que buscarán
  - llegará el tiempo y buscarán
  rationale: Se mantiene la relación temporal explícita que la revisión inglesa aclaró, sin perder el nexo profético.
  doctrine_reference: Sintaxis profética temporal
translation_notes:
  revision_awareness: La versión inglesa fue revisada para clarificar el enlace temporal siríaco, cambiando la secuencia repetida ‘and ... and’ por ‘and ... when’. La traducción española refleja esa resolución con una cláusula temporal explícita, sin volver a una coordinación ambigua.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’/‘Mesías’ no aplicable aquí; no se introduce terminología eclesiástica ajena al texto.
  - ‘Prosperidad’ se mantiene como término amplio y no se reduce a ‘paz’ o ‘bienestar’ para no estrechar el alcance léxico del original.
  - La puntuación usa coma antes de la cláusula temporal para facilitar lectura en español y respetar la secuencia profética.
