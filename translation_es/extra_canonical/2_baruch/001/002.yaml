translation:
  language: es
  text: «Has visto todo lo que este pueblo me ha hecho; el mal que han hecho estas dos tribus que quedan es mayor que el de las diez tribus que fueron llevadas cautivas».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: this people
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - este pueblo
  lexicon: pueblo
  rationale: El inglés POB conserva la referencia colectiva concreta; en español, «pueblo» mantiene ese valor comunitario y suena natural en registro bíblico. «Gente» sería más general y menos exacto para el sujeto étnico-político implícito.
- source_word: the evil
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - el mal
  - las maldades
  lexicon: mal
  rationale: La revisión inglesa cambió de plural a singular para reflejar mejor la construcción comparativa. En español, «el mal» conserva esa singularidad y evita introducir una pluralidad no sustentada por el texto.
- source_word: these two tribes that remain
  english_pob_choice: these two tribes that remain
  chosen_spanish: estas dos tribus que quedan
  alternatives_spanish:
  - estas dos tribus que permanecen
  - estas dos tribus restantes
  lexicon: tribu
  rationale: «Que quedan» transmite el matiz de remanente sin añadir interpretación. «Permanecen» y «restantes» son posibles, pero menos directos para el flujo narrativo.
- source_word: greater than that of
  english_pob_choice: is greater than that of
  chosen_spanish: es mayor que el de
  alternatives_spanish:
  - es mayor que el de
  - supera al de
  lexicon: comparative construction
  rationale: La estructura española «es mayor que el de» reproduce la comparación completa marcada por la revisión inglesa y mantiene la referencia al mal de las diez tribus como término de comparación.
- source_word: the ten tribes that were taken captive
  english_pob_choice: the ten tribes that were taken captive
  chosen_spanish: las diez tribus que fueron llevadas cautivas
  alternatives_spanish:
  - las diez tribus que fueron llevadas cautivas
  - las diez tribus que fueron cautivas
  lexicon: captive
  rationale: «Fueron llevadas cautivas» conserva la pasiva y el sentido de deportación/cautiverio sin suavizar la fuerza histórica del verbo.
theological_decisions:
- issue: Comparación moral entre dos grupos de Israel
  english_pob_reading: the evil of the two remaining tribes is greater than that of the ten captive tribes
  chosen_spanish_reading: el mal de estas dos tribus que quedan es mayor que el de las diez tribus que fueron llevadas cautivas
  alternative_spanish_readings:
  - el mal de estas dos tribus que quedan es mayor que el de las diez tribus cautivas
  - la maldad de estas dos tribus restantes supera la de las diez tribus llevadas cautivas
  rationale: 'La formulación española mantiene la acusación comparativa sin intensificarla ni suavizarla. Se conserva la tensión moral del texto: las tribus restantes no quedan eximidas por permanecer en la tierra, sino que son juzgadas como más culpables en esta instancia.'
  doctrine_reference: Juicio moral y responsabilidad del pueblo del pacto; cf. patrones proféticos de acusación nacional en la Escritura.
translation_notes:
  revision_awareness: La versión inglesa fue revisada para completar la comparación («is greater than that of»), unificar «evil» en singular y sustituir el guion por punto y coma. El español refleja esa estructura comparativa completa con una sola cláusula coordinada por punto y coma.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - «Cautivas» conserva el matiz de deportación/ser llevadas al cautiverio.
  - El registro procura ser bíblico y claro, sin recurrir a arcaísmos innecesarios.
