base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_baruch/001/001.yaml
  text: In the twenty-fifth year of Jeconiah king of Judah, the word of the Lord came to Baruch son of Neriah, saying, / and He said to him,
  footnotes:
  - marker: a
    text: Or 'came upon'.
    reason: previous_rendering
  - marker: b
    text: Or 'and said to him,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:45:45Z'
    unchanged: false
    changes_summary: 'Adjusted several phrases for closer Syriac alignment: ''against me'' to ''to me,'' ''which remain'' to ''that remain,'' ''carried away captive'' to ''taken captive,'' removed unnecessary ''he'' before ''said,'' refined verse 3 wording to reflect the tribes'' active role, changed ''shall be taken away'' to ''will be removed,'' and replaced interpretive ''prove useful to the nations'' with the more literal ''remain among the nations.'''
translation:
  language: es
  text: En el vigésimo quinto año de Jeconías, rey de Judá, la palabra de Yahvé vino a Baruc hijo de Nerías, diciendo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y le dijo».'
    reason: alternative_rendering
lexical_decisions:
- source_word: ܟܬܒܐ ܕܓܠܝܢܐ
  english_pob_choice: revelation / apocalypse
  chosen_spanish: revelación
  alternatives_spanish:
  - apocalipsis
  - manifestación
  lexicon: none
  rationale: Aunque este verso funciona como encabezado del libro, en este registro la idea central es la de una revelación; «revelación» es claro y no sobrecarga con un tecnicismo.
- source_word: ܡܪܝܐ
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: none
  rationale: El proyecto exige representar el nombre divino con «Yahvé» en el texto principal cuando el siríaco refleja el nombre divino.
- source_word: ܗܘܐ ܦܬܓܡܗ ... ܥܠ
  english_pob_choice: the word of the Lord came to
  chosen_spanish: la palabra de Yahvé vino a
  alternatives_spanish:
  - la palabra de Yahvé llegó a
  - vino sobre
  lexicon: none
  rationale: Se conserva la fórmula profética con «vino a», que es natural en español y corresponde a la lectura corregida del audit trail, evitando mecanizar «sobre».
- source_word: ܒܪܘܟ ܒܪ ܢܪܝܐ
  english_pob_choice: Baruch son of Neriah
  chosen_spanish: Baruc hijo de Nerías
  alternatives_spanish:
  - Baruc, hijo de Nerías
  lexicon: none
  rationale: «Hijo de» comunica la relación genealógica de modo directo y bíblico en español; «Baruc» y «Nerías» siguen la forma estándar de transliteración castellana.
- source_word: ܐܡܪ ܠܗ
  english_pob_choice: and He said to him / saying
  chosen_spanish: diciendo, / y le dijo
  alternatives_spanish:
  - y le habló,
  - 'diciendo: / y le dijo'
  lexicon: none
  rationale: 'Se preserva la tensión sintáctica del original y la revisión inglesa: la cláusula final puede leerse como participación de la fórmula profética, sin imponer una sola solución en el cuerpo del texto.'
theological_decisions:
- issue: Nombre divino en una fórmula profética
  english_pob_reading: the word of the Lord came to...
  chosen_spanish_reading: la palabra de Yahvé vino a...
  alternative_spanish_readings:
  - la palabra del Señor vino a...
  rationale: La política del proyecto pide no ocultar el nombre divino cuando el original lo sustenta. Aquí la fórmula profética se traduce con «Yahvé» para mantener transparencia textual.
  doctrine_reference: Transparencia del Tetragrámaton en traducción bíblica
- issue: Sujeto verbal en la cláusula final
  english_pob_reading: saying, / and He said to him
  chosen_spanish_reading: diciendo, / y le dijo
  alternative_spanish_readings:
  - y dijo a él
  - diciendo
  rationale: El siríaco permite una continuidad formulaica algo elíptica; el español debe mantenerla sin forzar una sintaxis demasiado pesada. Por eso se deja la doble posibilidad en la puntuación y la coordinación.
  doctrine_reference: Coherencia sintáctica y respeto al estilo profético
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «came upon» a «came to» y de «and said to him» a «saying, / and He said to him». La redacción española adopta la fórmula profética natural «vino a» y conserva la clausura con una solución de puntuación abierta, para no perder la variante auditada del remate.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «Señor» por consistencia con el estándar del proyecto.
  - «Baruc» y «Nerías» siguen grafía española común y mantienen identificación bíblica clara.
  - La puntuación con barra oblicua marca la transición sintáctica del original sin añadir contenido interpretativo.
