translation:
  language: es
  text: Porque las tribus anteriores fueron obligadas por sus reyes a pecar, pero estas dos tribus ellas mismas desearon pecar y obligaron a sus reyes a pecar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܐܬܐܢܣܘ
  english_pob_choice: were compelled
  chosen_spanish: fueron obligadas
  alternatives_spanish:
  - fueron compelidas
  - fueron forzadas
  lexicon: compel / oblige
  rationale: El contraste del pasivo externo se expresa con naturalidad en español con «fueron obligadas», que conserva la idea de coacción ejercida por los reyes sin sonar arcaico.
- source_word: ܨܒܐ (eṣṭabyaw)
  english_pob_choice: desired
  chosen_spanish: desearon
  alternatives_spanish:
  - quisieron
  - optaron por
  - quisieron pecar
  lexicon: desire / will / choose
  rationale: La revisión del inglés POB fijó «desired» para reflejar mejor la volición interna del verbo siríaco; en español, «desearon» preserva ese matiz de querer/voluntad sin perder la conexión con el acto de pecar.
- source_word: to sin
  english_pob_choice: to sin
  chosen_spanish: pecar
  alternatives_spanish:
  - cometer pecado
  - hacer el mal
  lexicon: sin
  rationale: «Pecar» es la forma directa y bíblicamente transparente para el infinitivo subyacente, y mantiene la repetición enfática del pasaje.
theological_decisions:
- issue: Contraste entre coacción externa y voluntad interna
  english_pob_reading: the former tribes were compelled by their kings to sin, but these two tribes themselves desired to sin and compelled their kings to sin
  chosen_spanish_reading: las tribus anteriores fueron obligadas por sus reyes a pecar, pero estas dos tribus desearon pecar y obligaron a sus reyes a pecar
  alternative_spanish_readings:
  - las tribus anteriores fueron forzadas por sus reyes a pecar, pero estas dos tribus quisieron pecar y forzaron a sus reyes a pecar
  rationale: 'La redacción española conserva la tensión moral del texto: primero, pecado impuesto desde fuera; después, pecado deseado desde dentro y luego impuesto a la autoridad. No se suaviza la responsabilidad de las dos tribus.'
  doctrine_reference: Responsabilidad moral humana y agencia en el pecado; no se atenúa la culpa individual o colectiva.
translation_notes:
  revision_awareness: Se incorporó la revisión que añadió explícitamente «a pecar» después de «desearon» en el inglés POB para evitar ambigüedad y reflejar el infinitivo implícito del siríaco. La traducción española ya lo expresa de forma explícita, por lo que no requiere nota adicional.
  spanish_consistency_notes:
  - Se mantuvo la repetición de «pecar» para reflejar el paralelismo del original y la revisión auditada del inglés POB.
  - Se eligió «desearon» en lugar de «fueron urgidas» o «se esforzaron» para conservar la decisión léxica documentada en la auditoría.
  - «Tribus anteriores» traduce de manera natural former tribes sin introducir una localización histórica no explicitada en el versículo.
