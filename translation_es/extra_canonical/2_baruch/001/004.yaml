translation:
  language: es
  text: Por tanto, he aquí, voy a traer el mal sobre esta ciudad y sobre sus habitantes, y será quitada de delante de mí por un tiempo, y dispersaré a este pueblo entre las naciones, para que sirvan[a] a las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit. «para que sean siervos de las naciones». Una traducción previa decía: «para que permanezcan entre las naciones».'
    reason: Preserva la decisión auditada de 'servants to the nations' y documenta la lectura anterior sin presentarla como equivalente preferible.
lexical_decisions:
- source_word: evil / evil upon this city
  english_pob_choice: bringing evil upon this city
  chosen_spanish: trayendo el mal sobre esta ciudad
  alternatives_spanish:
  - trayendo calamidad sobre esta ciudad
  - trayendo desgracia sobre esta ciudad
  lexicon: mal
  rationale: El texto fuente y la traducción inglesa de referencia expresan juicio/calamidad, no mal moral abstracto. En español, 'mal' conserva esa amplitud y suena natural en un anuncio profético.
- source_word: inhabitants
  english_pob_choice: inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que la habitan
  - sus moradores
  lexicon: habitantes
  rationale: '''Habitantes'' refleja de manera directa a los residentes de la ciudad sin introducir matices ajenos.'
- source_word: removed from before me for a time
  english_pob_choice: it will be removed from before me for a time
  chosen_spanish: será apartado de delante de mí por un tiempo
  alternatives_spanish:
  - será quitado de mi presencia por un tiempo
  - será retirado de delante de mí por un tiempo
  lexicon: apartar / delante de mí
  rationale: La construcción mantiene la imagen relacional del original ('de delante de mí') y la temporalidad de 'por un tiempo' sin suavizar la expulsión o alejamiento.
- source_word: scatter
  english_pob_choice: I will scatter this people among the nations
  chosen_spanish: dispersaré a este pueblo entre las naciones
  alternatives_spanish:
  - esparciré a este pueblo entre las naciones
  - diseminaré a este pueblo entre las naciones
  lexicon: dispersar
  rationale: '''Dispersaré'' es la opción más natural y fiel para un exilio repartido entre pueblos extranjeros.'
- source_word: servants
  english_pob_choice: that they may be servants to the nations
  chosen_spanish: para que sean esclavos de las naciones
  alternatives_spanish:
  - para que sean siervos de las naciones
  - para que sirvan a las naciones
  lexicon: esclavo
  rationale: La evidencia siríaca apoyada por la revisión indica 'servants to the nations'; en español, 'esclavos' preserva la fuerza de dependencia y sometimiento que 'siervos' debilitaría.
- source_word: to the nations
  english_pob_choice: to the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - a las naciones
  - entre las naciones
  lexicon: preposición relacional
  rationale: '''Esclavos de las naciones'' expresa la relación de sujeción que el giro original comunica; ''a las naciones'' sería menos idiomático en español con este complemento.'
theological_decisions:
- issue: Juicio divino sobre la ciudad y el pueblo
  english_pob_reading: I am bringing evil upon this city and upon its inhabitants
  chosen_spanish_reading: estoy trayendo el mal sobre esta ciudad y sobre sus habitantes
  alternative_spanish_readings:
  - estoy trayendo calamidad sobre esta ciudad y sobre sus habitantes
  rationale: Se conserva el carácter de juicio activo de Dios sin convertirlo en una abstracción moral. 'Mal' mantiene la tensión bíblica del desastre enviado por Dios.
  doctrine_reference: Juicio divino / providencia
- issue: Exilio como disciplina temporal
  english_pob_reading: it will be removed from before me for a time
  chosen_spanish_reading: será apartado de delante de mí por un tiempo
  alternative_spanish_readings:
  - será retirado de mi presencia por un tiempo
  rationale: La frase conserva la idea de alejamiento ante la presencia divina y el límite temporal del castigo, evitando interpretaciones de abandono definitivo.
  doctrine_reference: Disciplina divina / exilio
- issue: Sometimiento a las naciones
  english_pob_reading: that they may be servants to the nations
  chosen_spanish_reading: para que sean esclavos de las naciones
  alternative_spanish_readings:
  - para que sean siervos de las naciones
  rationale: La fuente revisada corrige la lectura anterior y exige una traducción que mantenga la dureza del sometimiento. 'Esclavos' preserva la tensión teológica del castigo nacional.
  doctrine_reference: Exilio / servidumbre nacional
translation_notes:
  revision_awareness: 'La revisión aplicada corrige una mistranslation previa en la cláusula final: el siríaco apoya ''servants to the nations'' y no ''remain among the nations''. La versión española adopta la lectura corregida y conserva la fuerza de subordinación del pasaje.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque este versículo, según el paquete fuente, no usa el Tetragrámaton en la forma auditada provista.
  - Se eligió 'esclavos' siguiendo el valor lexical documentado de 'servants to the nations' en el audit trail; no se suavizó a 'siervos'.
  - '''De delante de mí'' conserva una imagen relacional bíblica y evita una paráfrasis más interpretativa.'
