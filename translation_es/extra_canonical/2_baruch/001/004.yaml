    text: 'Lit. «para que sean siervos de las naciones». Una traducción previa decía: «para que permanezcan entre las naciones».'
    reason: Preserva la decisión auditada de 'servants to the nations' y documenta la lectura anterior sin presentarla como equivalente preferible.
  revision_rationale: Se ajusta la cláusula final para reflejar con más precisión la decisión fuente-auditada ('servants to the nations') sin intensificarla a 'esclavos'. También se mejora la naturalidad y concordancia de la oración media, y se corrige la función de la nota al pie para que documente la lectura previa en vez de sugerir una alternativa textual equiparable.
