  text: 'But you, Baruch, set your heart on what has been said to you, and understand the things shown to you, for much eternal consolation is yours.

    For from now on you will not again see the evil things that are now happening.

    Therefore go and command my people, and do not stir them up, because after these things, in the times to come, many days of affection will come. And I will make known to you and speak in your understanding.'
