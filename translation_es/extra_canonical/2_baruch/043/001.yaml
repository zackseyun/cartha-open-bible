revisions:
- from: 'Pero tú, Baruc, fija tu corazón en lo que se te ha dicho, y comprende las cosas que se te han mostrado, porque mucha consolación eterna[a] es tuya.


    Porque desde ahora no volverás a ver las cosas malas que ahora suceden.


    Por tanto, ve y manda a mi pueblo, y no los inquietes, porque después de estas cosas, en los tiempos venideros, vendrán muchos días de afecto[b]. Y yo te lo haré saber y hablaré a tu entendimiento.'
  to: 'Pero tú, Baruc, pon tu corazón en lo que se te ha dicho, y comprende las cosas que se te han mostrado, porque mucha consolación eterna[a] es tuya.


    Porque desde ahora no volverás a ver las cosas malas que ahora suceden.


    Por tanto, ve y manda a mi pueblo, y no lo agites, porque después de estas cosas, en los tiempos venideros, vendrán muchos días de favor[b]. Y yo te lo haré saber y hablaré a tu entendimiento.'
  rationale: 'Se ajustó el español para mejorar su naturalidad y evitar matices engañosos sin apartarse del sentido del siríaco ni del expediente inglés: «pon tu corazón» por mayor idiomaticidad, «no lo agites» para reflejar mejor la idea de no perturbar o incitar al pueblo, y «días de favor» en lugar de «días de afecto» para una lectura eclesial más clara, manteniendo nota sobre la dificultad textual.'
