translation:
  language: es
  text: 'Pero tú, Baruc, pon tu corazón en lo que se te ha dicho, y comprende las cosas que se te han mostrado, porque mucha consolación eterna[a] es tuya.


    Porque desde ahora no volverás a ver las cosas malas que ahora suceden.


    Por tanto, ve y manda a mi pueblo, y no lo agites, porque después de estas cosas, en los tiempos venideros, vendrán muchos días de favor[b]. Y yo te lo haré saber y hablaré a tu entendimiento.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «consolación eterna» conserva el matiz durativo y escatológico del siríaco; también podría traducirse «consuelo eterno».
    reason: lexical_alternative
  - marker: b
    text: La expresión siríaca es difícil; «favor» intenta preservar la ambigüedad entre benevolencia, cariño y trato favorable sin fijar una sola interpretación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܒܪܘܫ ܐܬܩܢ ܠܒܟ
  english_pob_choice: set your heart
  chosen_spanish: fija tu corazón
  alternatives_spanish:
  - pon tu corazón
  - dirige tu corazón
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: El giro es exhortativo e idiomático; en español, «fijar el corazón» conserva la imagen concreta y transmite bien la idea de atención interior y firmeza.
- source_word: ܠܒܟ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu ánimo
  - tu interior
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: En este contexto el corazón es la sede de la disposición interior, no solo del sentimiento; «corazón» mantiene la metáfora semítica sin sobreexplicarla.
- source_word: ܒܘܝܐܐ ܣܓܝܐܐ
  english_pob_choice: much consolation
  chosen_spanish: mucha consolación
  alternatives_spanish:
  - gran consolación
  - muchos consuelos
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: El término siríaco apunta a consuelo/consolación real. En español, el singular colectivo «consolación» suena natural y preserva el sentido pastoral y escatológico.
- source_word: ܕܒܠܥܕܡ
  english_pob_choice: eternal
  chosen_spanish: eterna
  alternatives_spanish:
  - perpetua
  - sin fin
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: La duración es permanente; «eterna» corresponde al tono apocalíptico y a la lectura consolidada del pasaje.
- source_word: ܚܙܐ
  english_pob_choice: see
  chosen_spanish: verás
  alternatives_spanish:
  - contemplarás
  - mirarás
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: El verbo es literal y no requiere ampliación. «No volverás a ver» reproduce la negativa a seguir presenciando el mal presente.
- source_word: ܒܝ̈ܫܘܬܗܘܢ / ܒܝ̈ܫܐ
  english_pob_choice: the evil things that are now happening
  chosen_spanish: las cosas malas que ahora suceden
  alternatives_spanish:
  - los males que ahora ocurren
  - las maldades que ahora pasan
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: La forma siríaca habla de males concretos, en curso. «Cosas malas» evita imponer una abstracción moral demasiado técnica y mantiene la referencia a acontecimientos.
- source_word: ܦܩܕ
  english_pob_choice: command
  chosen_spanish: manda
  alternatives_spanish:
  - ordena
  - encarga
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: Es un mandato directo. «Manda» suena natural en español bíblico y conserva la autoridad del encargo.
- source_word: ܥܡܝ
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: La referencia es al pueblo de Dios; «mi pueblo» es la equivalencia directa y la más fiel al vínculo posesivo del original.
- source_word: ܠܐ ܬܙܝܥܘܢ
  english_pob_choice: do not stir them up
  chosen_spanish: no los inquietes
  alternatives_spanish:
  - no los agites
  - no los perturbes
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: El verbo tiene el matiz de mover, agitar o excitar. En español, «inquietar» conserva la idea de perturbación sin sonar excesivamente físico o modernizado.
- source_word: ܒܚܒܒܐ / ܦܘܫܩܗ
  english_pob_choice: many days of affection
  chosen_spanish: muchos días de afecto
  alternatives_spanish:
  - muchos días de cariño
  - muchos días de favor
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: La expresión es textual y algo difícil; «afecto» mantiene una ambigüedad útil entre cariño, favor y benevolencia sin forzar una paráfrasis interpretativa.
- source_word: ܐܡܠܠ ܒܡ̈ܕܥܝܟܘܢ
  english_pob_choice: speak in your understanding
  chosen_spanish: hablaré a tu entendimiento
  alternatives_spanish:
  - hablaré a tu mente
  - hablaré a tu inteligencia
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: La frase apunta al ámbito interior de comprensión. «Entendimiento» es natural en español bíblico y conserva la dimensión cognitiva sin reducirla a mero intelecto.
theological_decisions:
- issue: Cómo traducir la consolación prometida a Baruc
  english_pob_reading: The promise is rendered as enduring eschatological comfort rather than mere emotional reassurance.
  chosen_spanish_reading: La promesa se expresa como consolación eterna, con peso escatológico y no solo afectivo.
  alternative_spanish_readings:
  - consuelo eterno
  - abundante consolación
  rationale: El contexto no promete solo alivio psicológico, sino una esperanza duradera ligada al horizonte futuro del libro. «Consolación eterna» mantiene ese alcance.
  doctrine_reference: Escatología de consolación y perseverancia en el sufrimiento
- issue: Cómo entender la orden de no inquietar al pueblo
  english_pob_reading: Baruch is told not to stir them up, because future times of affection are coming.
  chosen_spanish_reading: Baruc debe evitar perturbar al pueblo mientras se anuncia un tiempo venidero de afecto/benevolencia.
  alternative_spanish_readings:
  - no los agites
  - no los perturbes
  rationale: El siríaco conserva una tensión semántica difícil; no conviene domesticarlas con una lectura única. «No los inquietes» guarda el sentido de no alterar su estado y deja abierta la carga favorable de la frase siguiente.
  doctrine_reference: Exhortación profética y disciplina pastoral
- issue: Cómo reflejar la frase final sobre el entendimiento de Baruc
  english_pob_reading: And I will make known to you and speak in your understanding.
  chosen_spanish_reading: Dios seguirá revelando y hablando en el interior comprensivo de Baruc.
  alternative_spanish_readings:
  - hablaré a tu mente
  - hablaré a tu inteligencia
  rationale: La expresión no requiere espiritualizarse indebidamente ni rebajarla a mero razonamiento; «entendimiento» preserva la comunicación reveladora en el ámbito interior.
  doctrine_reference: Revelación profética y discernimiento
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: evita las líneas no sustentadas sobre partir del lugar, pasar de regiones visibles o ayunar siete días, y se ciñe al sentido revisado del siríaco: Baruc debe fijar su corazón, comprender lo mostrado, no volver a ver los males presentes, ir a mandar al pueblo y recibir revelación ulterior.'
  spanish_consistency_notes:
  - Se usa «Baruc» como forma hispana normal del nombre propio.
  - Se mantiene «mi pueblo» para conservar la referencia posesiva divina del original.
  - Se evita «SEÑOR» o sustitución reverente del nombre divino porque este versículo no lo introduce explícitamente.
  - Se conserva el paralelismo entre «lo que se te ha dicho» y «las cosas que se te han mostrado» sin expandir el texto.
  - Se mantiene el final abierto de la frase sobre el entendimiento, sin convertirlo en una explicación doctrinal más amplia de lo que el siríaco permite.
