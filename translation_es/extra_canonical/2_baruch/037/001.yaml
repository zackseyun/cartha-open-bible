translation:
  language: es
  text: Y después de estas cosas vi que el cedro ardía, y el bosque que estaba alrededor de él, y la vid crecía, y la llanura alrededor de él estaba llena de flores que no se marchitan. Y desperté y me levanté.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܡܢ ܒܬܪ ܗܠܝܢ / after these things
  english_pob_choice: And after these things
  chosen_spanish: Y después de estas cosas
  alternatives_spanish:
  - Y luego de esto
  - Y tras estas cosas
  lexicon: Payne Smith
  rationale: Mantiene la secuencia narrativa sin añadir interpretación. La fórmula temporal es directa y funciona bien en español bíblico moderno.
- source_word: ܚܙܝܬ / I saw
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - contemplé
  lexicon: Payne Smith
  rationale: ‘Vi’ es la forma más natural y fiel para la visión profética; no fuerza una solemnidad innecesaria.
- source_word: ܐܪܙܐ / cedar
  english_pob_choice: the cedar
  chosen_spanish: el cedro
  alternatives_spanish:
  - el cedro del Líbano
  - el árbol de cedro
  lexicon: Payne Smith
  rationale: ‘Cedro’ conserva la imagen simbólica específica y evita ampliar el referente sin base textual.
- source_word: ܕܡܝܢ ܕܒܘܪ̈ܐ / burning
  english_pob_choice: was burning
  chosen_spanish: ardía
  alternatives_spanish:
  - estaba ardiendo
  - se quemaba
  lexicon: Payne Smith
  rationale: ‘Ardía’ expresa el estado visual del objeto en la visión de forma natural y compacta.
- source_word: ܥܒܐ / forest
  english_pob_choice: forest
  chosen_spanish: bosque
  alternatives_spanish:
  - selva
  - arboleda
  lexicon: Payne Smith
  rationale: ‘Bosque’ es el equivalente neutro y claro; mantiene el elemento colectivo de la imagen sin rusticidad excesiva.
- source_word: ܥܠ / around it
  english_pob_choice: around it
  chosen_spanish: alrededor de él
  alternatives_spanish:
  - en torno a él
  - a su alrededor
  lexicon: Payne Smith
  rationale: Conserva la relación espacial reiterada del pasaje. Uso ‘él’ por concordancia con ‘cedro’.
- source_word: ܒܪܬܐ / vine
  english_pob_choice: the vine
  chosen_spanish: la vid
  alternatives_spanish:
  - la parra
  - la viña
  lexicon: Payne Smith
  rationale: ‘Vid’ es la planta concreta y tradicionalmente apta para esta figura visionaria; evita la ambigüedad de ‘viña’.
- source_word: ܡܬܡܠܝܐ ܦܪܚ̈ܬܐ / was full of unfading flowers
  english_pob_choice: was full of unfading flowers
  chosen_spanish: estaba llena de flores que no se marchitan
  alternatives_spanish:
  - estaba llena de flores imperecederas
  - rebosaba de flores que no se agostan
  lexicon: Payne Smith
  rationale: ‘Que no se marchitan’ comunica bien el matiz de permanencia sin volverlo demasiado literario ni ambiguo.
- source_word: ܐܬܥܝܪܬ / I awoke
  english_pob_choice: And I awoke
  chosen_spanish: Y desperté
  alternatives_spanish:
  - Y me desperté
  - Entonces desperté
  lexicon: Payne Smith
  rationale: Refleja el cierre de la visión con naturalidad. En español, el pronombre puede omitirse sin pérdida de sentido.
- source_word: ܩܡܬ / arose
  english_pob_choice: and arose
  chosen_spanish: y me levanté
  alternatives_spanish:
  - y me puse en pie
  - y me incorporé
  lexicon: Payne Smith
  rationale: ‘Me levanté’ reproduce el gesto posterior al despertar de modo claro y sobrio.
theological_decisions:
- issue: Identificación de la figura de la vid en este versículo
  english_pob_reading: The speaker remains 'the vine' in the chapter’s English rendering.
  chosen_spanish_reading: la vid permanece como la figura visible de la visión
  alternative_spanish_readings:
  - el Mesías
  - Cristo
  rationale: En este versículo no se adelanta la interpretación de la figura; se conserva la secuencia visionaria tal como está en el texto fuente y en el audit trail inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: 'Final de la visión: despertar y levantarse'
  english_pob_reading: And I awoke and arose.
  chosen_spanish_reading: Y desperté y me levanté.
  alternative_spanish_readings:
  - Y desperté y me puse en pie
  rationale: El cierre describe la salida de la visión, no un acto litúrgico ni una carga simbólica adicional. La formulación se mantiene literal y funcional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: 'El audit trail inglés advierte una corrección mayor: la traducción previa incorporaba 2 Baruc 36:10–11 (el discurso de la vid al cedro), pero el hebreo/siríaco de 37:1 comienza con la fórmula de transición ''Después de estas cosas vi...''. Esta versión sigue la lectura revisada y se limita al contenido de 37:1.'
  spanish_consistency_notes:
  - Se conserva ‘cedro’ y ‘vid’ como figuras distintas y no se fusionan con explicaciones posteriores.
  - 'Se mantiene el orden narrativo del versículo: visión del cedro ardiendo, bosque alrededor, crecimiento de la vid, llanura llena de flores, despertar.'
  - No se introducen términos eclesiásticos tradicionales que no estén sustentados por el texto fuente.
  - La sintaxis sigue el patrón de visión profética sin calcos excesivamente semíticos.
