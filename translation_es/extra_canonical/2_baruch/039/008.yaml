translation:
  language: es
  text: 'Y cuando sea revelado, arrancará de raíz la multitud de su ejército. Y en cuanto al alto cedro que viste, que quedó de aquel bosque, y las palabras que la vid habló con él, que oíste[a]—esto es el significado:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse como: «que oíste—esto es el significado:»; la cláusula final forma parte del cierre interpretativo del texto.'
    reason: alternative_reading
lexical_decisions:
- source_word: ܟܕ ܢܬܓܠܐ / 'when it is revealed'
  english_pob_choice: when it is revealed
  chosen_spanish: cuando sea revelado
  alternatives_spanish:
  - cuando se revele
  - cuando se manifieste
  lexicon: revelar / manifestar
  rationale: La pasiva impersonal conserva la referencia a una revelación escatológica sin añadir un sujeto inexistente en el texto. 'Sea revelado' mantiene un registro digno y cercano al original.
- source_word: '''uproot the multitude of its host'''
  english_pob_choice: it will uproot the multitude of its host
  chosen_spanish: arrancará de raíz la multitud de su ejército
  alternatives_spanish:
  - desarraigará la multitud de su ejército
  - arrancará la multitud de sus tropas
  lexicon: arrancar de raíz / multitud / ejército
  rationale: '''Arrancará de raíz'' preserva la imagen violenta y vegetal del original, en paralelo al contexto del cedro y la vid. ''Ejército'' refleja el grupo numeroso/hueste del inglés POB sin suavizarlo demasiado con ''tropas''.'
- source_word: '''tall cedar'''
  english_pob_choice: the tall cedar
  chosen_spanish: el alto cedro
  alternatives_spanish:
  - el cedro alto
  - el gran cedro
  lexicon: cedro / alto
  rationale: Se conserva el orden natural en español con 'alto cedro' para mantener brevedad y la imagen del árbol elevado.
- source_word: '''left from that forest'''
  english_pob_choice: left from that forest
  chosen_spanish: que quedó de aquel bosque
  alternatives_spanish:
  - que permaneció de aquel bosque
  - que fue dejado de aquel bosque
  lexicon: quedar / bosque
  rationale: '''Quedó de aquel bosque'' expresa supervivencia/residuo más naturalmente que un calco literal, y mantiene la idea de remanente.'
- source_word: '''the words that the vine spoke with it'''
  english_pob_choice: the words that the vine spoke with it
  chosen_spanish: las palabras que la vid habló con él
  alternatives_spanish:
  - las palabras que la vid le dijo
  - las palabras que la vid pronunció ante él
  lexicon: vid / hablar con
  rationale: '''Habló con él'' conserva la personificación de la vid y la relación directa del original. ''Le dijo'' suaviza demasiado la imagen; ''pronunció'' pierde el matiz de diálogo.'
- source_word: '''which you heard'''
  english_pob_choice: which you heard
  chosen_spanish: que oíste
  alternatives_spanish:
  - que escuchaste
  - que oíste[a]
  lexicon: oír / escuchar
  rationale: '''Oíste'' es la forma más directa y fiel al dato sensorial. Se mantiene la posibilidad de lectura alternativa del corte sintáctico en nota.'
- source_word: '''this is the meaning'''
  english_pob_choice: this is the meaning
  chosen_spanish: esto es el significado
  alternatives_spanish:
  - esta es la interpretación
  - esto es la explicación
  lexicon: significado / significado-interpretación
  rationale: El cierre interpretativo del siríaco introduce explícitamente la explicación. 'Significado' es neutro y publicable; 'interpretación' podría intensificar más de lo que el texto exige.
theological_decisions:
- issue: Interpretive conclusion at the end of the verse
  english_pob_reading: 'this is the meaning:'
  chosen_spanish_reading: 'esto es el significado:'
  alternative_spanish_readings:
  - 'esta es la interpretación:'
  - 'esto es la explicación:'
  rationale: El siríaco concluye con una fórmula explícita de interpretación. Mantenerla en español evita perder la transición hermenéutica que estructura la sección.
  doctrine_reference: Hermenéutica textual; fidelidad discursiva al género apocalíptico-interpretativo.
translation_notes:
  revision_awareness: Se incorporó la clausula final interpretativa explícita ('this is the meaning:') siguiendo la revisión más reciente, para no perder el giro hermenéutico presente en el siríaco. La nota de lectura alternativa conserva la posibilidad de segmentación sintáctica del tramo final sin eliminar el cierre interpretativo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el original lo requiera; este versículo no lo contiene.
  - Se preserva el registro apocalíptico con verbos concretos e imagen vegetal ('arrancará de raíz').
  - Se usa 'vid' y 'cedro' de forma consistente con la imaginería del pasaje.
  - La puntuación con raya larga antes del cierre interpretativo refleja la transición explicativa del original y la revisión auditada.
