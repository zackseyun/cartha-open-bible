lexical_decisions:
- source_word: ܘܥܢܐ ܘܐܡܪ ܠܝ
  english_pob_choice: And he answered and said to me
  chosen_spanish: Y respondió y me dijo
  alternatives_spanish:
  - Y contestó y me dijo
  - Y me respondió, diciendo
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: Conserva la fórmula narrativa de respuesta directa sin recargar el español. «Respondió» mantiene el paralelismo semítico de la construcción verbal doble.
- source_word: ܒܪܡ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: El conector adversativo introduce la explicación frente a la pregunta o expectativa previa. «Pero» es natural en español y fiel al giro del texto.
- source_word: ܦܘܫܩܗ
  english_pob_choice: interpretation
  chosen_spanish: interpretación
  alternatives_spanish:
  - explicación
  - sentido
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: El sustantivo designa el desentrañamiento del sueño/visión. «Interpretación» es preciso y conserva el registro exegético del pasaje.
- source_word: ܚܙܘܐ
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - sueño
  - apocalipsis
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: El contexto es una revelación visionaria. «Visión» es el equivalente más directo y evita estrechar el sentido a un sueño ordinario.
- source_word: ܚܙܝܬ
  english_pob_choice: you saw
  chosen_spanish: viste
  alternatives_spanish:
  - has visto
  - habías visto
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: Mantiene la referencia directa al acto de ver en el mismo nivel temporal que el texto fuente, con un español claro y bíblico.
theological_decisions:
- issue: Modo de introducir la explicación de la visión
  english_pob_reading: But this is the interpretation of the vision that you saw.
  chosen_spanish_reading: Pero esta es la interpretación de la visión que viste.
  alternative_spanish_readings:
  - Pero este es el sentido de la visión que viste.
  - Sin embargo, esta es la interpretación de la visión que viste.
  rationale: El siríaco presenta una declaración explicativa simple. No conviene añadir interpretación doctrinal ni identificar personajes o imperios en el texto base; la frase debe permanecer como anuncio de explicación apocalíptica.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: El pasaje es un versículo de apertura de explicación visionaria; se ha seguido la lectura estable del control en inglés POB sin añadir ampliaciones interpretativas ni notas textuales, ya que no hay variantes decisivas en este segmento.
  spanish_consistency_notes:
  - Se mantuvo «visión» y no «sueño» para conservar el registro apocalíptico del pasaje.
  - Se evitó «Cristo» y cualquier terminología cristológica, porque este versículo solo introduce la explicación de la visión.
  - La puntuación y el orden de cláusulas buscan sonar naturales en español sin perder la cadencia bíblica del original.
