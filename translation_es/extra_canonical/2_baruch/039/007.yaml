translation:
  language: es
  text: Y sucederá que, cuando se acerque el tiempo de su consumación para caer[a], entonces será revelado el reinado de mi Mesías, que es como la fuente y como la vid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se acerque el tiempo de su consumación».'
    reason: alternative_reading
lexical_decisions:
- source_word: ܙܒܢܐ ܕܫܘܠܡܗ / time of its completion
  english_pob_choice: the time of its completion
  chosen_spanish: el tiempo de su cumplimiento
  alternatives_spanish:
  - el tiempo en que se complete
  - el tiempo de su consumación
  lexicon: completion / fulfillment
  rationale: «Cumplimiento» conserva la idea de término o consumación del proceso, y en español natural mantiene la fuerza escatológica del pasaje sin volverlo pesado. Encaja con el matiz de una etapa que llega a su fin.
- source_word: ܕܬܦܠ / for it to fall
  english_pob_choice: for it to fall
  chosen_spanish: para que caiga
  alternatives_spanish:
  - para caer
  - para que se derrumbe
  lexicon: fall / collapse
  rationale: El texto siríaco añade explícitamente la caída del reino; «caiga» conserva la imagen verbal directa y puede referirse tanto a caer como a derrumbarse en sentido histórico-político.
- source_word: ܡܠܟܘܬܐ / reign
  english_pob_choice: reign
  chosen_spanish: el reinado
  alternatives_spanish:
  - el reino
  - la realeza
  lexicon: reign / kingship
  rationale: «Reinado» reproduce mejor la idea de ejercicio de gobierno que «reino» como territorio. Es la opción más fiel al valor verbal-dinámico del término en este contexto.
- source_word: ܡܫܝܚܝ / my Messiah
  english_pob_choice: my Messiah
  chosen_spanish: mi Mesías
  alternatives_spanish:
  - mi Cristo
  lexicon: Messiah / anointed one
  rationale: Se mantiene «Mesías» como término titular, según el criterio del proyecto. «Mi» conserva la posesión directa del original y la relación especial del hablante con la figura anunciada.
- source_word: ܢܗܪܐ / fountain
  english_pob_choice: fountain
  chosen_spanish: la fuente
  alternatives_spanish:
  - el manantial
  - la fontana
  lexicon: fountain / spring
  rationale: «Fuente» es transparente y suficientemente amplia para abarcar la imagen de origen vivificante. «Manantial» sería posible, pero «fuente» conecta mejor con el paralelismo poético.
- source_word: ܓܦܢܐ / vine
  english_pob_choice: vine
  chosen_spanish: la vid
  alternatives_spanish:
  - la parra
  lexicon: vine
  rationale: «Vid» es la correspondencia bíblica más estable y comunica la metáfora agrícola sin ambigüedad. Además conserva el paralelismo con «fuente» en una forma breve y solemne.
theological_decisions:
- issue: Nombrar al Mesías con título en español
  english_pob_reading: my Messiah
  chosen_spanish_reading: mi Mesías
  alternative_spanish_readings:
  - mi Cristo
  rationale: El POB en inglés usa «Messiah» como título. En español, «Mesías» evita confundir el título con el nombre litúrgico «Cristo» y preserva el color semítico del original.
  doctrine_reference: Cristología / expectativa mesiánica
- issue: Mantener la caída del cuarto reino como parte del sentido del verso
  english_pob_reading: when the time of its completion draws near for it to fall
  chosen_spanish_reading: cuando se acerque el tiempo de su cumplimiento para que caiga
  alternative_spanish_readings:
  - cuando se acerque el tiempo de su cumplimiento para derrumbarse
  rationale: La revisión auditada mostró que el siríaco contiene una cláusula explícita de caída. La traducción española la conserva para no borrar la tensión histórica y escatológica del texto.
  doctrine_reference: Escatología / juicio sobre los reinos
- issue: Reproducir la imagen poética doble de origen y fertilidad
  english_pob_reading: which is like the fountain and like the vine
  chosen_spanish_reading: el cual es como la fuente y como la vid
  alternative_spanish_readings:
  - que es como la fuente y como la vid
  rationale: Se mantiene el paralelismo comparativo. «Como la fuente y como la vid» preserva la imagen sin explicarla en exceso ni volverla interpretativa.
  doctrine_reference: Imaginería profética
translation_notes:
  revision_awareness: 'La revisión aplicada corrigió una omisión importante: el siríaco incluye la idea de que el cuarto reino «caiga»; por eso la frase española conserva explícitamente «para que caiga». No se adoptaron cambios posteriores porque el último pase de revisión indicó que no hacía falta modificar el texto base.'
  spanish_consistency_notes:
  - Se usa «Mesías» de forma consistente con el criterio del proyecto para el título mesiánico.
  - Se mantiene «Y sucederá que» como inicio formal y profético, adecuado para un texto apocalíptico.
  - «Reinado» se eligió para evitar que «reino» desplace el foco desde la acción soberana hacia el territorio.
