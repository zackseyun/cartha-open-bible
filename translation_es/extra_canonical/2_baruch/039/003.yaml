translation:
  language: es
  text: Y este reino que una vez destruyó a Sión será destruido, y quedará sometido al que venga después de él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “this kingdom”
  english_pob_choice: this kingdom
  chosen_spanish: este reino
  alternatives_spanish:
  - este poder
  - este imperio
  lexicon: reino
  rationale: El arameo/siríaco del pasaje apunta a una entidad política soberana; “reino” reproduce bien la referencia del inglés POB y conserva el matiz de dominio político sin imponer una concreción extra.
- source_word: “once destroyed Zion”
  english_pob_choice: once destroyed Zion
  chosen_spanish: que una vez destruyó a Sión
  alternatives_spanish:
  - que antes destruyó a Sión
  - que destruyó antaño a Sión
  lexicon: destruir
  rationale: “Una vez” mantiene la idea temporal de acción pasada ya cumplida, como en el inglés POB, sin intensificarla innecesariamente. “Sión” se conserva como nombre propio bíblico.
- source_word: “will be destroyed”
  english_pob_choice: will be destroyed
  chosen_spanish: será destruido
  alternatives_spanish:
  - será arrasado
  - será abatido
  lexicon: destruir
  rationale: La pasiva refleja el mismo futuro pasivo del inglés POB y preserva la retribución histórica del anuncio. “Destruido” es el equivalente directo más neutro y transparente.
- source_word: “it will be subjected”
  english_pob_choice: it will be subjected
  chosen_spanish: quedará sometido
  alternatives_spanish:
  - será sometido
  - será sujeto
  lexicon: someter
  rationale: “Quedará sometido” comunica resultado y estado final, ajustándose bien al sentido profético del inglés sin volverlo mecánico. “Sometido” conserva la relación de subordinación política.
- source_word: “the one that comes after it”
  english_pob_choice: the one that comes after it
  chosen_spanish: al que venga después de él
  alternatives_spanish:
  - al que le suceda
  - al siguiente
  lexicon: venir después de
  rationale: La expresión mantiene la sucesión de reinos sin identificarla de manera interpretativa. “Venga” conserva el valor prospectivo del original y del inglés POB.
theological_decisions:
- issue: Retribución histórica del reino opresor
  english_pob_reading: the kingdom that once destroyed Zion will be destroyed
  chosen_spanish_reading: este reino que una vez destruyó a Sión será destruido
  alternative_spanish_readings:
  - este reino que destruyó a Sión será destruido
  - el reino que antes destruyó a Sión será destruido
  rationale: 'El texto presenta una correspondencia de juicio: el poder que devastó Sión también será destruido. La formulación española conserva esa reciprocidad sin añadir explicaciones escatológicas externas.'
  doctrine_reference: Justicia retributiva en literatura apocalíptica; cf. principio de retribución histórica del pasaje
translation_notes:
  revision_awareness: La versión inglesa auditada fue marcada como sin cambios necesarios tras revisión cruzada de alta concordancia; esta propuesta sigue esa lectura sin introducir variantes textuales ni expansiones interpretativas.
  spanish_consistency_notes:
  - Se usa ‘Sión’ con mayúscula como topónimo bíblico estándar.
  - Se mantiene ‘reino’ para la entidad política, no ‘imperio’, por fidelidad al alcance del original y del inglés POB.
  - No se introduce ‘SEÑOR’ ni otras sustituciones teológicas no presentes en el versículo.
  - 'La sintaxis española conserva la progresión temporal y pasiva del inglés: destrucción pasada, destrucción futura, y sometimiento posterior.'
