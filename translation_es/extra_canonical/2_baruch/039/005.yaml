  glossary_alignment: No hay términos del glosario base especialmente conflictivos en este versículo. 'Reino', 'tiempos', 'cedros del Líbano' y la imagen de autoexaltación están bien resueltos. 'En su puño' es idiomático y conserva la fuerza de 'in its grasp'.
