translation:
  language: es
  text: Y después de estas cosas se levantará un cuarto reino, cuyo poder será más duro y peor que el de los anteriores. Gobernará durante muchos tiempos, como los bosques de la llanura, y tendrá los tiempos en su puño y se elevará más que los cedros del Líbano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: quarter kingdom / fourth kingdom
  english_pob_choice: a fourth kingdom
  chosen_spanish: un cuarto reino
  alternatives_spanish:
  - un cuarto imperio
  - un cuarto dominio
  lexicon: reino
  rationale: El inglés POB usa "kingdom"; en español "reino" reproduce el paralelismo sin introducir una lectura más política o eclesiástica que el texto no exige.
- source_word: power / harsher and worse
  english_pob_choice: whose power will be harsher and worse
  chosen_spanish: cuyo poder será más duro y peor
  alternatives_spanish:
  - cuyo poder será más severo y peor
  - cuyo poder será más áspero y peor
  lexicon: poder
  rationale: '"Más duro" conserva la fuerza cualitativa de un poder opresivo o áspero sin precisar en exceso. "Peor" mantiene la comparación degradante del texto fuente.'
- source_word: rule
  english_pob_choice: It will rule
  chosen_spanish: Gobernará
  alternatives_spanish:
  - Reinará
  - Dominará
  lexicon: gobernar
  rationale: '"Gobernará" es natural en español y mantiene la idea de ejercer dominio sin cargar de matiz litúrgico a "reinará" ni de dureza interpretativa a "dominará".'
- source_word: for many times
  english_pob_choice: for many times
  chosen_spanish: durante muchos tiempos
  alternatives_spanish:
  - por muchos tiempos
  - por largo tiempo
  lexicon: tiempos
  rationale: Se conserva la expresión temporal inusual del testigo inglés y del trasfondo semítico. "Tiempos" evita reducir el plural a una mera duración abstracta cuando el pasaje parece tratar los periodos de manera casi personificada.
- source_word: forests of the plain
  english_pob_choice: like the forests of the plain
  chosen_spanish: como los bosques de la llanura
  alternatives_spanish:
  - como los bosques del llano
  - como los árboles de la llanura
  lexicon: bosques
  rationale: La imagen se mantiene literalmente para no perder el símil comparativo. "Llanura" es transparente y de registro bíblico adecuado.
- source_word: hold the times in its grasp
  english_pob_choice: it will hold the times in its grasp
  chosen_spanish: tendrá los tiempos en su puño
  alternatives_spanish:
  - tendrá los tiempos en su mano
  - asirán los tiempos
  lexicon: puño
  rationale: '"En su puño" conserva la metáfora de aprehensión y control con fuerza idiomática en español. Comunica más claramente la imagen de dominio que una traducción demasiado neutra.'
- source_word: lift itself up
  english_pob_choice: lift itself up
  chosen_spanish: se elevará
  alternatives_spanish:
  - se enaltecerá
  - se alzará
  lexicon: elevarse
  rationale: '"Se elevará" reproduce la autoexaltación del original con un verbo claro y digno; evita una reinterpretación moralizante que el texto no explicita.'
- source_word: cedars of Lebanon
  english_pob_choice: cedars of Lebanon
  chosen_spanish: los cedros del Líbano
  alternatives_spanish:
  - los cedros del Lebanon
  - los cedros del país del Líbano
  lexicon: cedros del Líbano
  rationale: Se mantiene el topónimo tradicional y plenamente inteligible en español, con la forma estándar "Líbano".
theological_decisions:
- issue: Descripción de la secuencia de reinos y su comparación jerárquica
  english_pob_reading: A fourth kingdom will arise, harsher and worse than those before it; it will rule and exalt itself above the cedars of Lebanon.
  chosen_spanish_reading: Se presenta como un cuarto reino posterior, superior en dureza y maldad a los anteriores, con dominio temporal y autoexaltación.
  alternative_spanish_readings:
  - un cuarto reino con poder más severo que los anteriores
  - un cuarto imperio con autoridad más cruel que la de los previos
  rationale: No se suaviza ni se espiritualiza la oposición entre el nuevo reino y los anteriores. La redacción preserva el carácter comparativo y de ascenso arrogante que el inglés POB refleja a partir del source syríaco.
  doctrine_reference: Apocalíptica judía tardía; lectura descriptiva de imperios sucesivos sin armonización doctrinal añadida
translation_notes:
  revision_awareness: La versión inglesa revisada permanece sin cambios en el audit trail, con acuerdo alto en la revisión cruzada; por ello la draft española sigue de cerca la sintaxis y las imágenes del testigo base, sin introducir notas de variante textual.
  spanish_consistency_notes:
  - Se mantiene "reino" como equivalente principal de kingdom en esta unidad.
  - Se evita "SEÑOR" o terminología de sustitución porque no aparece un nombre divino en el verso.
  - '"Tiempos" se conserva en plural para reflejar el giro apocalíptico del pasaje.'
  - El registro busca ser bíblico y legible en español neutro, sin arcaísmos innecesarios.
