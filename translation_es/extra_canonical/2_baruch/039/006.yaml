translation:
  language: es
  text: Y la verdad[a] se ocultará en ella, y todos los que están manchados por la iniquidad huirán a ella, así como las bestias malas huyen y se meten[b] en el bosque.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y la seguridad será establecida en ella».
    reason: previous_rendering
  - marker: b
    text: O «las bestias salvajes huyen y las cosas que se arrastran».
    reason: previous_rendering
lexical_decisions:
- source_word: truth / šrārā
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la fidelidad
  - la rectitud
  lexicon: šrārā
  rationale: El contexto contrasta con la iniquidad del miembro siguiente; por eso «la verdad» conserva el valor moral y veritativo que refleja el POB inglés y la lectura siríaca revisada.
- source_word: will hide itself / netṭašē
  english_pob_choice: will hide itself
  chosen_spanish: se ocultará
  alternatives_spanish:
  - se esconderá
  - quedará escondida
  lexicon: ṭšā
  rationale: El verbo siríaco, según la revisión, expresa ocultamiento/reflexivo y no establecimiento; en español «se ocultará» reproduce bien ese sentido.
- source_word: those who are stained with iniquity
  english_pob_choice: those who are stained with iniquity
  chosen_spanish: los que están manchados por la iniquidad
  alternatives_spanish:
  - los que están contaminados por la iniquidad
  - los que están marcados por la iniquidad
  lexicon: ṭmā / impurity imagery
  rationale: «Manchados» mantiene la imagen moral de contaminación o suciedad, en paralelo con el contraste entre verdad e iniquidad.
- source_word: evil beasts flee and creep
  english_pob_choice: evil beasts flee and creep
  chosen_spanish: las bestias malas huyen y se internan
  alternatives_spanish:
  - las bestias malas huyen y se arrastran
  - las bestias feroces huyen y reptan
  lexicon: ḥaywātā bīšātā / ʿārqān / rāḥšān
  rationale: La revisión muestra que el sujeto son las bestias malas, que realizan ambas acciones; «se internan» expresa en español el movimiento de entrar/hundirse en el bosque sin convertir el verbo en un sustantivo.
- source_word: forest
  english_pob_choice: forest
  chosen_spanish: bosque
  alternatives_spanish:
  - selva
  - monte
  lexicon: forest imagery
  rationale: «Bosque» es la equivalencia más directa y neutral en español para el escenario del escondite.
theological_decisions:
- issue: Truth hidden in the locus described rather than security established
  english_pob_reading: And truth will hide itself in it
  chosen_spanish_reading: Y la verdad se ocultará en ella
  alternative_spanish_readings:
  - Y la seguridad se establecerá en ella
  - Y la verdad se establecerá en ella
  rationale: La revisión textual corrigió una lectura previa de «seguridad» a «verdad» y de «establecida» a «ocultará»; el español debe reflejar esa corrección sin suavizarla.
  doctrine_reference: Textual criticism / lexical control of Syriac
translation_notes:
  revision_awareness: 'La revisión más reciente confirmó que no hubo cambios adicionales respecto del estado ya corregido: la cláusula inicial debe leerse con «verdad» y el verbo con sentido de ocultamiento; además, la segunda cláusula toma como sujeto a las bestias malas que huyen y se internan en el bosque. Por ello no se conservan notas de variante previas.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal con dos miembros coordinados: «se ocultará» / «huirán».'
  - Se evitó introducir terminología eclesiástica ajena al pasaje; «iniquidad» conserva el registro bíblico-jurídico del original.
  - No se usaron notas al pie porque el texto español ya incorpora la lectura revisada sin ambigüedad residual.
