review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la revisión principal del siríaco: «la verdad» para šrārā y «se ocultará» para netṭašē, y también mantiene correctamente que las bestias son el sujeto de ambos verbos. Sin embargo, omite las alternativas preservadas en el rastro POB inglés, y «se internan en el bosque» debilita el matiz de movimiento rastrero/arrimado implícito en el segundo verbo mejor que una opción como «se meten».'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. La única mejora importante es ajustar el símil final para no sonar interpretativo («se internan») y añadir las notas necesarias para reflejar las alternativas textuales/documentadas del POB inglés.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «La verdad», «iniquidad» y «bosque» son adecuados. La decisión más delicada es el segundo verbo del símil: conviene una formulación más cercana al movimiento de esconderse/arrastrarse hacia dentro, sin convertirlo en sustantivo.'
  issues:
  - severity: medium
    issue: Faltan las notas documentadas del POB inglés
    rationale: 'El expediente inglés conserva dos alternativas significativas: «Y la seguridad será establecida en ella» y «las bestias salvajes huyen y las cosas que se arrastran». El revisor español debe preservarlas en notas, con marcadores anclados en el texto.'
  - severity: medium
    issue: «Se internan en el bosque» es algo más interpretativo que el original
    rationale: Aunque evita el error nominal de «cosas que se arrastran», «se internan» enfatiza adentrarse en el bosque más que el valor verbal paralelo de huir + moverse arrastrándose/metiéndose. «Se meten en el bosque» conserva mejor el movimiento hacia refugio y suena natural en español.
