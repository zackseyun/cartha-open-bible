translation:
  language: es
  text: Y también esa, después de un tiempo, será destruida; y se levantará otra, una tercera; y también ella reinará en su tiempo y será destruida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “another” / “a third”
  english_pob_choice: another, a third
  chosen_spanish: otra, una tercera
  alternatives_spanish:
  - otra, la tercera
  - una tercera [sin artículo]
  lexicon: demonstrative/ordinal sequence
  rationale: 'Conservo la progresión del original: primero ‘otra’ y luego ‘una tercera’. En español, el artículo en ‘una tercera’ preserva la sucesión escalonada y suena natural sin perder la enumeración.'
- source_word: “will arise”
  english_pob_choice: will arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - surgirá
  - aparecerá
  lexicon: verb of rising/coming into power
  rationale: ‘Se levantará’ conserva bien la idea de surgir o entrar en escena con fuerza, y encaja con el paralelo de reinos que aparecen y luego caen.
- source_word: “will rule”
  english_pob_choice: will rule
  chosen_spanish: reinará
  alternatives_spanish:
  - gobernará
  - dominará
  lexicon: royal rule
  rationale: ‘Reinará’ expresa con precisión el gobierno monárquico implícito en la serie de reinos y mantiene la cadencia del pasaje.
- source_word: “destroyed”
  english_pob_choice: will be destroyed
  chosen_spanish: será destruida
  alternatives_spanish:
  - será abatida
  - será aniquilada
  lexicon: passive destruction
  rationale: El pasivo ‘será destruida’ sigue de cerca el sentido del Syriac y del inglés POB, sin intensificar más allá de lo que el texto exige.
theological_decisions:
- issue: Secuencia de poderes/reinos sucesivos con caducidad divina
  english_pob_reading: And that one too, after a time, will be destroyed, and another will arise, a third; and it too will rule in its time and will be destroyed.
  chosen_spanish_reading: Y también esa, después de un tiempo, será destruida; y se levantará otra, una tercera; y también ella reinará en su tiempo y será destruida.
  alternative_spanish_readings:
  - Y también esa, con el tiempo, será destruida; y surgirá otra, una tercera; y también ella gobernará en su tiempo y será destruida.
  rationale: Mantengo la lectura de una serie histórica de poderes que aparecen, ejercen dominio por un tiempo asignado y luego son destruidos. No añado interpretaciones sobre identidad específica de esos poderes, porque el verso solo establece la sucesión y la temporalidad.
  doctrine_reference: Providencia divina sobre reinos e imperios; caducidad de los poderes temporales.
translation_notes:
  revision_awareness: El texto inglés POB y el control de revisión no muestran cambios pendientes; por eso la versión española sigue de cerca la lectura base, sin notas textuales ni alternativas obligatorias.
  spanish_consistency_notes:
  - He usado ‘será destruida’ para mantener el pasivo del original y la terminología uniforme del pasaje.
  - He evitado ‘Cristo’, ‘SEÑOR’ o vocabulario confesional no presente en el verso.
  - La deixis ‘esa’ refleja el retome anafórico de un reino/poder previamente mencionado en el contexto inmediato.
