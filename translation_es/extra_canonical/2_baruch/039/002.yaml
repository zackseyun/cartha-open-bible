translation:
  language: es
  text: En cuanto al gran bosque que viste, con los montes altos y escarpados que lo rodeaban, esta es la interpretación:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esta es la palabra».'
    reason: alternative_reading
lexical_decisions:
- source_word: meltā
  english_pob_choice: this is the interpretation
  chosen_spanish: esta es la interpretación
  alternatives_spanish:
  - esta es la palabra
  - este es el sentido
  lexicon: Syriac melta
  rationale: Aunque literalmente puede ser 'palabra', en el contexto de explicar una visión la fuerza es interpretativa; 'interpretación' mantiene la equivalencia óptima y evita sonar demasiado literal en español.
- source_word: rabbā ḥeštā
  english_pob_choice: the great forest
  chosen_spanish: el gran bosque
  alternatives_spanish:
  - el bosque grande
  - la gran selva
  lexicon: Syriac lexeme for forest/woodland
  rationale: '''Bosque'' es el equivalente natural y digno en español; ''gran'' conserva el adjetivo de tamaño/intensidad sin añadir énfasis no justificado.'
- source_word: ṭūrē rāmē waqšyē
  english_pob_choice: the lofty and rugged mountains
  chosen_spanish: los montes altos y escarpados
  alternatives_spanish:
  - los montes elevados y ásperos
  - las montañas altas y escarpadas
  lexicon: Syriac mountain descriptors
  rationale: '''Montes'' funciona bien en registro bíblico y permite el plural del original; ''altos y escarpados'' comunica la altura y aspereza física sin sobretraducción.'
theological_decisions:
- issue: Final explanatory clause for the vision
  english_pob_reading: this is the interpretation
  chosen_spanish_reading: esta es la interpretación
  alternative_spanish_readings:
  - esta es la palabra
  - este es el sentido
  rationale: La revisión textual descartó la lectura inventada de 'un reino que surgirá en aquellos días' y afirmó que el cierre del versículo expresa explicación/interpretación de la visión, no una identidad histórica futura explícita.
  doctrine_reference: Principio de suficiencia textual y control contra interpolación interpretativa
translation_notes:
  revision_awareness: 'La traducción incorpora las revisiones auditadas: se excluyó la lectura errónea ''this is a kingdom that will arise in those days'' y se siguió la adjudicación posterior que entiende meltā en sentido explicativo (''interpretación'').'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó un registro bíblico sobrio y moderno, evitando calcos demasiado rígidos.
  - La nota al pie está anclada correctamente en '[a]' junto a 'interpretación'.
