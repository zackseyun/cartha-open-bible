  text: También las naciones vendrán a honrarlo, pero no tan plenamente como antes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: nations
  english_pob_choice: The nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: —
  rationale: El referente es colectivo y étnico-político; «las naciones» conserva la amplitud del plural y el tono bíblico sin añadir matices ajenos.
- source_word: honor
  english_pob_choice: honor
  chosen_spanish: honrar
  alternatives_spanish:
  - rendir honor a
  - venerar
  lexicon: —
  rationale: «Honrar» reproduce bien el acto de reconocer valor o dignidad sin cargarlo con connotaciones cultuales más específicas que el contexto no exige.
- source_word: it
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - a ella
  - a esto
  lexicon: —
  rationale: El pronombre neutro «lo» permite mantener la referencia sin forzar en español el género del antecedente, que no se especifica en la cláusula inglesa.
- source_word: as fully as before
  english_pob_choice: not as fully as before
  chosen_spanish: no tan plenamente como antes
  alternatives_spanish:
  - no con la misma plenitud que antes
  - no tan completamente como antes
  lexicon: —
  rationale: «Plenamente» conserva la idea de plenitud/completitud del original inglés y su contraste temporal «como antes» expresa la disminución relativa sin exagerarla.
theological_decisions:
- issue: El alcance de la restauración respecto de las naciones
  english_pob_reading: The nations also will come to honor it, but not as fully as before.
  chosen_spanish_reading: También las naciones vendrán a honrarlo, pero no tan plenamente como antes.
  alternative_spanish_readings:
  - También las naciones vendrán a honrarlo, aunque no con la misma plenitud que antes.
  - Las naciones también vendrán a darle honor, pero no tan completamente como antes.
  rationale: La frase preserva la tensión de una honra real pero disminuida en comparación con un estado previo. No se suaviza la restricción de «no tan plenamente como antes», porque forma parte del contraste del texto.
  doctrine_reference: Restauración escatológica / honor de las naciones
