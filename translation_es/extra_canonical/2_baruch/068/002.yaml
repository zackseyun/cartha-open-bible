- source_word: a time will come
  english_pob_choice: a time will come
  chosen_spanish: vendrá un tiempo
  alternatives_spanish:
  - llegará un tiempo
  - habrá un tiempo
  lexicon: no aplica
  rationale: '''Vendrá un tiempo'' reproduce bien el giro profético y suena natural en español bíblico contemporáneo.'
- source_word: your people
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - vuestro pueblo
  - tu nación
  lexicon: no aplica
  rationale: La segunda persona singular concuerda con el contexto inmediato; 'pueblo' mantiene el sentido colectivo.
- source_word: will fall into such distress
  english_pob_choice: will fall into such distress
  chosen_spanish: caerá en una angustia tal
  alternatives_spanish:
  - caerá en tal aflicción
  - será presa de tanta angustia
  lexicon: no aplica
  rationale: '''Caer en'' conserva la imagen de entrar en una situación adversa; ''angustia'' comunica la gravedad existencial del término sin forzar un tecnicismo.'
- source_word: they will all be in danger of perishing together
  english_pob_choice: they will all be in danger of perishing together
  chosen_spanish: todos correrán peligro de perecer juntos
  alternatives_spanish:
  - todos estarán en peligro de perecer juntos
  - todos peligrarán de morir juntos
  lexicon: no aplica
  rationale: '''Correr peligro de perecer'' es una equivalencia idiomática clara y fiel; ''perecer juntos'' conserva la idea de ruina colectiva.'
theological_decisions:
- issue: Destino colectivo de juicio/ruina sin especificar causalidad
  english_pob_reading: the verse states a coming distress in which the people are all in danger of perishing together
  chosen_spanish_reading: un tiempo futuro de angustia colectiva en el que todo el pueblo peligrará de perecer junto
  alternative_spanish_readings:
  - un tiempo de castigo
  - una calamidad nacional
  rationale: No se explicita la causa ni se introduce lenguaje de castigo que el verso no menciona; se mantiene la formulación de amenaza colectiva tal como aparece en el texto base.
