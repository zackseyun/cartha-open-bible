translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios; no hay notas ni variantes textuales señaladas en el audit trail. La redacción española sigue ese estado estable sin introducir alternativas innecesarias.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - No se usa 'aflicción' como única opción porque 'angustia' preserva mejor la intensidad y la experiencia humana del término.
  - '''perecer juntos'' conserva el cierre colectivo del enunciado sin ampliar el sentido.'
