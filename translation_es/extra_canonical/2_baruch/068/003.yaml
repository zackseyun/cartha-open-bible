translation:
  language: es
  text: Sin embargo, serán salvados, y sus enemigos caerán delante de ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: bram / nevertheless
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Con todo
  - Pero
  lexicon: adversative connector
  rationale: El adverbio adversativo expresa bien la concesión del original siriaco y mantiene el tono narrativo-profético sin sobrecargarlo. 'Sin embargo' es claro y natural en español bíblico contemporáneo.
- source_word: nehwon / they will be saved
  english_pob_choice: they will be saved
  chosen_spanish: serán salvados
  alternatives_spanish:
  - serán librados
  - serán rescatados
  - obtendrán salvación
  lexicon: pasivo verbal de salvación
  rationale: El pasivo conserva la forma del evento futuro recibido por el sujeto. 'Salvar' es suficientemente amplio para la liberación escatológica del contexto; 'serán salvados' sigue de cerca el valor verbal sin introducir una paráfrasis teológica.
- source_word: enemy fall before them
  english_pob_choice: their enemies will fall before them
  chosen_spanish: sus enemigos caerán delante de ellos
  alternatives_spanish:
  - sus enemigos caerán ante ellos
  - sus enemigos caerán a sus pies
  lexicon: caída bélica / sometimiento
  rationale: '''Caerán delante de ellos'' reproduce la imagen de derrota frente a los salvados. ''Delante de'' es más literal que ''ante'' y evita la connotación de adoración o humillación ritual que podría sugerir ''a sus pies''.'
theological_decisions:
- issue: Tipo de salvación en contexto apocalíptico
  english_pob_reading: they will be saved
  chosen_spanish_reading: serán salvados
  alternative_spanish_readings:
  - serán librados
  - obtendrán salvación
  rationale: La frase admite tanto liberación histórica como salvación escatológica. Se conserva la ambigüedad útil del original sin especificar más de lo que el verso dice. 'Serán salvados' deja abierta la tensión entre rescate y salvación plena.
  doctrine_reference: Soteriology / deliverance in apocalyptic judgment
- issue: Relación entre salvación y derrota de los enemigos
  english_pob_reading: their enemies will fall before them
  chosen_spanish_reading: sus enemigos caerán delante de ellos
  alternative_spanish_readings:
  - sus enemigos serán derribados ante ellos
  - sus enemigos caerán ante ellos
  rationale: El verso presenta victoria de los justos junto con la caída de sus enemigos. 'Caerán delante de ellos' mantiene esa correlación sin convertirla en una explicación moral o militar más amplia de la que el texto ofrece.
  doctrine_reference: Eschatological vindication / divine judgment
translation_notes:
  revision_awareness: 'La revisión más reciente marcó como errónea la lectura que trasladaba a este versículo la frase de 2 Baruch 68:6 sobre la caída de muchas naciones. El texto correcto para 68:3 vuelve al sentido previo recuperado en el audit trail: salvación de ellos y caída de sus enemigos delante de ellos. Esta traducción sigue esa corrección y evita importar material de otro versículo.'
  spanish_consistency_notes:
  - Se mantiene 'salvados' en lugar de 'librados' para conservar la amplitud semántica del pasivo del original.
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino en el texto suministrado.
  - El registro es sobrio y bíblico, con puntuación moderna y sin arcaísmos innecesarios.
