translation:
  language: es
  text: Y en ese tiempo, después de un breve intervalo, Sion será reedificada, sus ofrendas serán restauradas y los sacerdotes volverán a su ministerio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: w-b-hw zbn'
  english_pob_choice: And at that time
  chosen_spanish: Y en ese tiempo
  alternatives_spanish:
  - Y entonces
  - Y en aquel tiempo
  lexicon: temporal deixis
  rationale: El audit trail en inglés corrigió 'And then' a 'And at that time' para reflejar con más precisión el valor temporal demostrativo del siriaco. 'En ese tiempo' conserva esa deíxis temporal sin introducir una secuencia más libre de lo que pide el fuente.
- source_word: short interval
  english_pob_choice: after a short interval
  chosen_spanish: después de un breve intervalo
  alternatives_spanish:
  - tras poco tiempo
  - después de poco tiempo
  lexicon: time expression
  rationale: '''Breve intervalo'' mantiene el sentido de una pausa corta y suena natural en español formal, sin ampliar ni intensificar el lapso.'
- source_word: Zion will be rebuilt
  english_pob_choice: Zion will be rebuilt
  chosen_spanish: Sion será reconstruida
  alternatives_spanish:
  - Sion será reedificada
  - Sion será edificada de nuevo
  lexicon: proper noun + passive construction
  rationale: '''Sion'' se conserva como nombre bíblico reconocido. ''Reconstruida'' expresa bien la idea de restauración material implícita en el pasivo inglés y en el probable siriaco.'
- source_word: its offerings restored
  english_pob_choice: its offerings restored
  chosen_spanish: sus ofrendas serán restauradas
  alternatives_spanish:
  - sus ofrendas serán restituidas
  - sus sacrificios serán restaurados
  lexicon: cultic vocabulary
  rationale: '''Ofrendas'' traduce de manera amplia y comprensible el lenguaje cultual sin imponer un término más estrecho. ''Restauradas'' mantiene el paralelismo con la reconstrucción de Sion y la idea de reanudación del culto.'
- source_word: priests
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los sacerdotes
  lexicon: religious office
  rationale: '''Sacerdotes'' es la equivalencia directa y estándar para el oficio cultual. No se necesita aclaración adicional en este verso breve.'
- source_word: to their ministry
  english_pob_choice: to their ministry
  chosen_spanish: a su ministerio
  alternatives_spanish:
  - a su servicio
  - a su labor ministerial
  lexicon: ministerial service
  rationale: '''Ministerio'' conserva el sustantivo de oficio/servicio empleado por la tradición de traducción bíblica y encaja con el retorno de los sacerdotes a sus funciones.'
theological_decisions:
- issue: Restauración de Sion y del culto
  english_pob_reading: Zion will be rebuilt, its offerings restored, and the priests will return to their ministry.
  chosen_spanish_reading: Sion será reconstruida, sus ofrendas serán restauradas, y los sacerdotes volverán a su ministerio.
  alternative_spanish_readings:
  - Sion será reedificada, sus sacrificios serán restituidos, y los sacerdotes volverán a su servicio.
  - Sion será reconstruida, y el culto será restablecido, con los sacerdotes retomando su servicio.
  rationale: 'La frase conserva los tres elementos del original sin suavizar la dimensión cultual: reconstrucción de Sion, restablecimiento de las ofrendas y retorno de los sacerdotes. ''Ofrendas'' evita cerrar prematuramente el sentido a un solo tipo de sacrificio si el siriaco es más general, pero mantiene la referencia al culto.'
  doctrine_reference: Restauración escatológica del culto en Sion
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la marca temporal de 'And then' a 'And at that time'; por eso el español refleja una deixis temporal específica con 'en ese tiempo' y no una mera secuencia narrativa.
  spanish_consistency_notes:
  - Se mantiene 'Sion' con mayúscula como topónimo bíblico.
  - Se usa futuro simple para todas las acciones principales, preservando la paralelidad del verso.
  - No se introducen notas al pie porque no hay variantes textuales o alternativas decisivas que requieran anclaje en esta línea.
