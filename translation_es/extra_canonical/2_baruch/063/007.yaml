translation:
  language: es
  text: Y salió y destruyó la multitud de ellos; solo el número de los jefes era de ciento ochenta y cinco mil, y cada uno tenía el mismo número.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: third-person masculine singular verb referring to the angel sent by the Mighty One
  english_pob_choice: And he went out and destroyed
  chosen_spanish: Y salió y destruyó
  alternatives_spanish:
  - Y él salió y destruyó
  - Y salió y aniquiló
  lexicon: salir; destruir
  rationale: La revisión auditada corrige la primera persona; el sujeto implícito es el mensajero/ángel mencionado en el contexto, por lo que el español conserva el sujeto tácito natural con verbo en tercera persona. 'Destruyó' mantiene la fuerza del acto sin añadir intensificación no documentada.
- source_word: their multitude
  english_pob_choice: their multitude
  chosen_spanish: su multitud
  alternatives_spanish:
  - la multitud de ellos
  - su gran multitud
  lexicon: multitud
  rationale: '''Multitud'' reproduce el sustantivo de masa colectiva sin cambiar el registro. ''Su multitud'' es breve y natural en español, y mantiene el referente plural poseído por los enemigos.'
- source_word: the number of the chiefs alone
  english_pob_choice: the number of the chiefs alone
  chosen_spanish: el número de los jefes solamente
  alternatives_spanish:
  - solo el número de los jefes
  - el número de los jefes únicamente
  lexicon: número; jefes; solamente
  rationale: '''Jefes'' traduce de forma directa el rango/caudillaje indicado por el contexto. ''Solamente'' conserva la restricción enfática del original, sin exagerar el cálculo.'
- source_word: one hundred and eighty-five thousand
  english_pob_choice: one hundred and eighty-five thousand
  chosen_spanish: ciento ochenta y cinco mil
  alternatives_spanish:
  - '185.000'
  - ciento ochenta y cinco mil
  lexicon: número cardinal
  rationale: Se conserva la cifra exacta en forma escrita, estándar en un texto bíblico en español. No se altera la cantidad ni se la interpreta.
- source_word: and each one of them had the like number
  english_pob_choice: and each one of them had the like number
  chosen_spanish: y cada uno de ellos tenía el mismo número
  alternatives_spanish:
  - y cada uno de ellos tenía igual número
  - y cada uno de ellos tenía la misma cantidad
  lexicon: cada uno; mismo número
  rationale: '''El mismo número'' expresa la repetición de la medida señalada por el original y evita una paráfrasis como ''igual cantidad'', que suavizaría el paralelismo numérico.'
theological_decisions:
- issue: Sujeto del verbo de acción
  english_pob_reading: And he went out and destroyed
  chosen_spanish_reading: Y salió y destruyó
  alternative_spanish_readings:
  - Y él salió y destruyó
  - Y salí y destruí
  rationale: La lectura corregida sigue el plural narrativo contextual con sujeto masculino singular implícito, probablemente el ángel enviado. No se introduce primera persona, porque eso contradice la revisión fuente-grounded.
  doctrine_reference: Fidelidad textual y coherencia narrativa
- issue: Representación de la fuerza destructiva
  english_pob_reading: destroyed their multitude
  chosen_spanish_reading: destruyó su multitud
  alternative_spanish_readings:
  - acabó con su multitud
  - aniquiló su multitud
  rationale: '''Destruyó'' conserva el sentido fuerte sin añadir una carga de exterminio que no sea exigida por el texto. Se evita tanto atenuar como intensificar indebidamente.'
  doctrine_reference: Precisión semántica y modestia traductológica
translation_notes:
  revision_awareness: El contexto auditado corrige una traducción previa errónea de primera persona a tercera persona. La presente redacción refleja la forma verbal siríaca revisada y evita añadir notas no ancladas en el texto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo donde el texto lo requiera explícitamente; aquí no aparece.
  - '''Jefes'' se usa consistentemente para chiefs/heads en este versículo.'
  - No se usa 'Cristo' ni terminología litúrgica ajena al pasaje.
  - La cifra se escribe en palabras para registro bíblico natural en español.
