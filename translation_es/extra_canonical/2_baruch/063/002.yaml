lexical_decisions:
- source_word: Sennacherib
  english_pob_choice: Sennacherib
  chosen_spanish: Senaquerib
  alternatives_spanish:
  - Sennáquerib
  - Senaquerib
  lexicon: nombre propio histórico
  rationale: Se adopta la forma española tradicional y reconocible del nombre propio asirio, sin alterar la referencia histórica.
- source_word: for destruction
  english_pob_choice: for destruction
  chosen_spanish: a la destrucción
  alternatives_spanish:
  - para destrucción
  - para ser destruido
  lexicon: lexema de finalidad/resultado
  rationale: La construcción española más natural para expresar el impulso orientado al daño es 'a la destrucción', manteniendo el sentido de finalidad o tendencia destructiva sin añadir un sujeto pasivo explícito no presente en el giro original.
- source_word: his wrath was inflamed
  english_pob_choice: his wrath was inflamed
  chosen_spanish: su ira se encendió
  alternatives_spanish:
  - su ira fue inflamada
  - su furor se encendió
  lexicon: imagen verbal de ira
  rationale: Se preserva la metáfora de fuego/encendido con un verbo idiomático en español. 'Se encendió' transmite bien el aumento de la cólera sin mecanizar el pasivo.
- source_word: to destroy
  english_pob_choice: so as to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - con intención de destruir
  - hasta destruir
  lexicon: infinitivo de finalidad
  rationale: Mantiene la finalidad explícita del texto fuente con una formulación clara y fiel en español.
- source_word: the multitude of the nations
  english_pob_choice: the multitude of the nations
  chosen_spanish: la multitud de las naciones
  alternatives_spanish:
  - la muchedumbre de las naciones
  - la multitud de los pueblos
  lexicon: término colectivo
  rationale: Se conserva la expresión colectiva amplia del original. 'Naciones' reproduce el alcance étnico-político del pasaje, y 'multitud' mantiene la idea de gran número.
theological_decisions:
- issue: Aggressor/agent description of divine judgment context
  english_pob_reading: For when Sennacherib was stirred up for destruction, and his wrath was inflamed so as to destroy, together with the multitude of the nations that were with him,
  chosen_spanish_reading: Porque cuando Senaquerib fue incitado a la destrucción, y su ira se encendió para destruir, junto con la multitud de las naciones que estaban con él,
  alternative_spanish_readings:
  - Porque cuando Senaquerib fue movido para destrucción...
  - Porque cuando Senaquerib fue excitado para destruir...
  rationale: El versículo describe la disposición violenta de Senaquerib dentro de un marco narrativo de juicio. La traducción conserva la causalidad y la intensidad sin introducir interpretaciones doctrinales ajenas al texto.
  doctrine_reference: Providencia y juicio divino en narrativa histórica
- issue: Collective scope of 'nations'
  english_pob_reading: the multitude of the nations
  chosen_spanish_reading: la multitud de las naciones
  alternative_spanish_readings:
  - la multitud de los pueblos
  - la muchedumbre de las naciones
  rationale: '''Naciones'' conserva el sentido colectivo internacional del pasaje sin reducirlo a ''pueblos'' ni espiritualizarlo. Se mantiene la amplitud del juicio narrado.'
  doctrine_reference: Lenguaje colectivo en texto histórico-profético
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni decisiones léxicas registradas; la versión española sigue de cerca el sentido establecido, con una adaptación idiomática mínima para el flujo natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Senaquerib' como forma española estable del nombre propio.
  - Se evita 'SEÑOR' o términos de máscara porque el versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - Se conserva el paralelismo sintáctico de dos miembros unidos por 'y'.
