lexical_decisions:
- source_word: Sennacherib
  english_pob_choice: Sennacherib
  chosen_spanish: Sennáquerib
  alternatives_spanish:
  - Senaquerib
  - Sennacherib
  lexicon: nombre propio histórico
  rationale: Se conserva el nombre propio con una forma castellana reconocible y tradicional en contextos bíblicos, sin alterar la referencia histórica.
- source_word: prepared to destroy us
  english_pob_choice: is prepared to destroy us
  chosen_spanish: está preparado para destruirnos
  alternatives_spanish:
  - se dispone a destruirnos
  - está listo para destruirnos
  lexicon: preparación/amenaza
  rationale: '''Está preparado para'' transmite la inminencia y disposición hostil del original sin añadir matices ajenos.'
- source_word: be exalted and lifted up
  english_pob_choice: will be exalted and lifted up
  chosen_spanish: será exaltado y levantado
  alternatives_spanish:
  - será engrandecido y enaltecido
  - será encumbrado y levantado
  lexicon: duplicación semítica de elevación
  rationale: Se mantiene la duplicación con dos verbos cercanos en español para reflejar la intensificación del original, sin suavizarla.
- source_word: when he destroys Zion
  english_pob_choice: when he destroys Zion
  chosen_spanish: cuando destruya a Sion
  alternatives_spanish:
  - cuando destruya Sion
  - al destruir a Sion
  lexicon: conjunción temporal
  rationale: '''Cuando'' sigue la revisión auditada que corrige el valor temporal del conector, y el subjuntivo en español expresa adecuadamente una acción futura vista como evento esperado.'
- source_word: Zion
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Sión
  lexicon: topónimo bíblico
  rationale: Se usa 'Sion' como forma bíblica clara y natural en español, manteniendo la identificación del lugar.
theological_decisions:
- issue: Arrogant self-exaltation tied to Zion's destruction
  english_pob_reading: he will be exalted and lifted up when he destroys Zion
  chosen_spanish_reading: será exaltado y levantado cuando destruya a Sion
  alternative_spanish_readings:
  - será engrandecido cuando destruya a Sion
  - se ensalzará y se alzará cuando destruya a Sion
  rationale: La formulación conserva que la exaltación del agresor está ligada al acto de destruir a Sion, sin convertirlo en una victoria genérica ni atenuar la ironía del pasaje.
  doctrine_reference: Arrogancia humana frente al juicio divino; no doctrinalmente técnico, pero sí retóricamente relevante en el texto apocalíptico.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que corrige la lectura de 'if he destroys' a 'when he destroys' por valor temporal del conector, y se evitó duplicar la fórmula introducida con 'And he said' porque pertenece a la versificación previa.
  spanish_consistency_notes:
  - Se prefirió 'Sion' en vez de 'Zion' por consistencia bíblica en español.
  - Se evitó 'Señor' u otras sustituciones teológicas ajenas al contenido del versículo.
  - La puntuación mantiene comillas angulares propias del español y una sola oración equivalente al original.
