  to: y cuando el rey Ezequías oyó lo que el rey de Asiria estaba maquinando —que vendría a prenderlo, destruir a su pueblo, a las dos tribus y media que quedaban, y aun derribar Sion— entonces Ezequías confió en sus obras, esperó en su justicia y habló con el Poderoso.
