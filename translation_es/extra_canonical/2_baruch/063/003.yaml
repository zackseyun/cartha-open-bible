translation:
  language: es
  text: y cuando el rey Ezequías oyó lo que el rey de Asiria estaba maquinando —que vendría a prenderlo, destruir a su pueblo, a las dos tribus y media que quedaban, y aun derribar Sion— entonces Ezequías confió en sus obras, esperó en su justicia y habló con el Poderoso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: king
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - rey soberano
  - monarca
  lexicon: N/A
  rationale: «Rey» es la correspondencia directa, natural y suficientemente solemne en español para el cargo de Hezekías y del rey de Asiria.
- source_word: was devising
  english_pob_choice: was devising
  chosen_spanish: estaba maquinando
  alternatives_spanish:
  - estaba planeando
  - estaba tramando
  lexicon: N/A
  rationale: El valor de intención hostil se comunica mejor con «maquinando»; mantiene el matiz de un plan dañino sin volverlo demasiado interpretativo.
- source_word: to come, seize him, destroy his people
  english_pob_choice: to come, seize him, destroy his people
  chosen_spanish: venir, apoderarse de él, destruir a su pueblo
  alternatives_spanish:
  - venir, capturarlo, destruir a su pueblo
  - venir, prenderlo, destruir a su pueblo
  lexicon: N/A
  rationale: «Apoderarse de él» conserva el sentido de capturarlo con fuerza y queda fiel al movimiento acumulativo del original.
- source_word: the two and a half tribes that remained
  english_pob_choice: the two and a half tribes that remained
  chosen_spanish: las dos tribus y media que quedaban
  alternatives_spanish:
  - las dos tribus y media restantes
  lexicon: N/A
  rationale: La expresión numérica tradicional se conserva con claridad; «que quedaban» reproduce el matiz de remanencia.
- source_word: overthrow Zion
  english_pob_choice: overthrow Zion
  chosen_spanish: derribar Sion
  alternatives_spanish:
  - derrocar Sion
  - arrasar Sion
  lexicon: N/A
  rationale: «Derribar» mantiene una imagen de abatimiento/derribo sin añadir el peso político específico de «derrocar» ni la destrucción total de «arrasar».
- source_word: trusted in his works
  english_pob_choice: trusted in his works
  chosen_spanish: confió en sus obras
  alternatives_spanish:
  - se apoyó en sus obras
  - puso su confianza en sus obras
  lexicon: N/A
  rationale: 'Se preserva la tensión doctrinal de la fuente: la confianza está puesta en las obras mismas, no en un mérito genérico expresado de otra forma.'
- source_word: hoped in his righteousness
  english_pob_choice: hoped in his righteousness
  chosen_spanish: esperó en su justicia
  alternatives_spanish:
  - confió en su justicia
  - esperó en su rectitud
  lexicon: N/A
  rationale: «Justicia» mantiene el campo semántico de rectitud/justicia sin reducirlo. «Esperó en» conserva la construcción de apoyo confiado del original.
- source_word: the Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Todopoderoso
  lexicon: N/A
  rationale: «El Poderoso» reproduce el título reverencial sin desplazarlo hacia un nombre divino más doctrinalmente cargado; es natural en español y conserva la mayúscula solemne.
theological_decisions:
- issue: Confianza en obras y justicia
  english_pob_reading: then Hezekiah trusted in his works, hoped in his righteousness
  chosen_spanish_reading: entonces Ezequías confió en sus obras, esperó en su justicia
  alternative_spanish_readings:
  - entonces Ezequías se apoyó en sus obras y confió en su justicia
  - entonces Ezequías puso su confianza en sus obras y en su justicia
  rationale: 'La redacción española conserva la afirmación fuerte y potencialmente problemática del texto: Ezequías coloca su confianza en obras y justicia. No se suaviza hacia una formulación más devocional que atenúe la tensión del pasaje.'
  doctrine_reference: Soteriología / tensión entre obras y confianza; fidelidad al énfasis narrativo del texto fuente.
- issue: Designación divina
  english_pob_reading: spoke with the Mighty One
  chosen_spanish_reading: habló con el Poderoso
  alternative_spanish_readings:
  - habló con el Todopoderoso
  - habló con el Fuerte
  rationale: Se preserva el título reverencial sin sustituirlo por una fórmula eclesiástica tradicional no atestiguada en este contexto. «El Poderoso» mantiene el carácter de epíteto divino genérico.
  doctrine_reference: Teología del nombre/título divino; preservación de la designación del original.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente eliminó un to redundante antes de «overthrow Zion» para mayor fluidez. La redacción española sigue directamente ese orden de cláusulas sin añadir preposiciones innecesarias, manteniendo el encadenamiento verbal del original y la progresión narrativa: oír → saber del plan → confiar/esperar/hablar.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton en el proyecto, pero aquí el original auditado emplea «the Mighty One», por lo que no corresponde introducirlo.
  - Se preserva «obras» y «justicia» para no diluir la tensión lexical y teológica del pasaje.
  - «Sion» se escribe con mayúscula como topónimo bíblico establecido en español.
