translation:
  language: es
  text: Y todos los que estaban en la tierra santa se alegraron, y el nombre del Poderoso fue glorificado, de modo que se habló de él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: holy land
  english_pob_choice: the holy land
  chosen_spanish: la tierra santa
  alternatives_spanish:
  - la tierra consagrada
  - la tierra sagrada
  lexicon: holy
  rationale: La expresión se refiere a la tierra santa en sentido religioso-geográfico; «tierra santa» es natural en español y conserva la referencia establecida por el inglés POB sin introducir una paráfrasis mayor.
- source_word: Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Todopoderoso
  - el Fuerte
  lexicon: mighty
  rationale: El inglés POB capitaliza y trata la expresión como designación divina. «El Poderoso» conserva el valor titular y evita sustituirlo por una formulación más tradicional que podría desplazar el matiz del original.
- source_word: was glorified
  english_pob_choice: was glorified
  chosen_spanish: fue glorificado
  alternatives_spanish:
  - recibió gloria
  - fue exaltado
  lexicon: glorify
  rationale: «Fue glorificado» reproduce con claridad la pasiva y el acto de atribuir gloria al nombre divino, sin suavizar el verbo ni convertirlo en una mera idea de honor general.
- source_word: so that it was spoken of
  english_pob_choice: so that it was spoken of
  chosen_spanish: de modo que se habló de él
  alternatives_spanish:
  - de modo que fue mencionado
  - así que se difundió su nombre
  lexicon: speak
  rationale: La frase inglesa es impersonal y algo abierta; «se habló de él» conserva esa ambigüedad y el efecto resultante de difusión o mención pública sin añadir contenido no atestiguado.
theological_decisions:
- issue: Designación divina para «the Mighty One»
  english_pob_reading: A divine title is preserved as "the Mighty One" rather than reduced to a generic adjective.
  chosen_spanish_reading: Se mantiene como «el Poderoso» en función titular.
  alternative_spanish_readings:
  - el Todopoderoso
  - el Fuerte
  rationale: La lectura inglesa trata la expresión como un título reverente. En español, «el Poderoso» conserva esa función nominal y la referencia a Dios sin imponer una equivalencia litúrgica que el texto no exige.
  doctrine_reference: Divine titles / reverential designation
- issue: Glorification of the divine name
  english_pob_reading: The name of the Mighty One was glorified.
  chosen_spanish_reading: El nombre del Poderoso fue glorificado.
  alternative_spanish_readings:
  - el nombre de Dios fue glorificado
  - su nombre fue glorificado
  rationale: Se preserva la referencia explícita al nombre divino, que es central en el inglés POB. No se sustituye por una forma más general, para no borrar la tensión entre nombre y persona divina.
  doctrine_reference: Divine name / doxology
translation_notes:
  revision_awareness: La versión inglesa vigente fue revisada y confirmada como sin cambios necesarios; el control cruzado indicó alta concordancia. El español se alinea con esa lectura estable sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento reverente de la designación divina con artículo: «el Poderoso».'
  - Se conserva la estructura causal-final de la clausula inglesa («de modo que se habló de él») sin añadir sujeto explícito.
  - «Tierra santa» se usa en minúscula por ser un sintagma común en español, no un nombre propio aquí.
