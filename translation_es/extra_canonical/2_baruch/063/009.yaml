  - Zion
  lexicon: N/A
  rationale: El topónimo bíblico se vierte con la forma española asentada «Sión», que conserva el referente geográfico y teológico del texto sin introducir una paráfrasis.
- source_word: Jerusalem / ܐܘܪܫܠܡ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: N/A
  rationale: Se usa la forma española usual «Jerusalén», clara y reconocible para lectores en español, manteniendo la referencia directa del original.
- source_word: was saved / ܐܬܚܝܬ ...
  english_pob_choice: was saved
  chosen_spanish: fue salvada
  alternatives_spanish:
  - fue rescatada
  - fue salvada
  lexicon: N/A
  rationale: «Fue salvada» reproduce el valor pasivo de liberación/salvación del original y conserva el paralelismo con las dos cláusulas siguientes.
- source_word: was delivered / ܐܬܦܨܝܬ ...
  english_pob_choice: was delivered
  chosen_spanish: fue liberada
  alternatives_spanish:
  - fue entregada
  - fue rescatada
  lexicon: N/A
  rationale: «Fue liberada» expresa bien la liberación del peligro o la aflicción, sin borrar la fuerza pasiva del verbo ni volverlo más interpretativo de lo necesario.
- source_word: released from distress / ܘܐܫܬܪܝ ... ܡܢ ܥܩܬܐ
  english_pob_choice: was released from distress
  chosen_spanish: fue librado de la angustia
  alternatives_spanish:
  - fue liberado de la angustia
  - quedó libre de la angustia
  lexicon: N/A
  rationale: El binomio «librado de la angustia» comunica la salida de la aflicción de modo natural en español y preserva la idea de rescate desde una situación de presión o tribulación.
theological_decisions:
- issue: Triple liberación de Sión, Jerusalén e Israel
  english_pob_reading: And Zion was saved, and Jerusalem was delivered, and Israel also was released from distress.
  chosen_spanish_reading: Y Sión fue salvada, y Jerusalén fue liberada, y también Israel fue librado de la angustia.
  alternative_spanish_readings:
  - Y Sión fue salvada, y Jerusalén fue rescatada, y también Israel fue librado de la angustia.
  - Y Sión fue salva, y Jerusalén fue liberada, y también Israel fue librado de la angustia.
  rationale: Se conserva la repetición coordinada de tres actos divinos de liberación, sin suavizar la progresión retórica del versículo. «Salvada», «liberada» y «librado» mantienen la fuerza pasiva del texto y la amplitud del rescate, que abarca ciudad y pueblo.
  doctrine_reference: Liberación escatológica/restauración de Sión e Israel en 2 Baruc; no se introduce un matiz doctrinal ajeno al enunciado.
translation_notes:
  revision_awareness: El texto fuente y la traducción inglesa POB fueron revisados en el pase más reciente sin cambios, con acuerdo alto en la verificación cruzada; por ello no se introducen notas textuales adicionales ni alternativas obligatorias en esta línea.
  spanish_consistency_notes:
  - 'Se mantiene la capitalización tradicional de los nombres propios bíblicos: Sión, Jerusalén e Israel.'
  - Se conserva el paralelismo verbal en voz pasiva para reflejar el carácter de intervención divina del original.
  - No se usa «SEÑOR» ni terminología cristológica, pues el versículo no los contiene.
