translation:
  language: es
  text: 'Y las octavas aguas luminosas que viste: estas son la integridad y la rectitud de Ezequías, rey de Judá, y el favor benigno que vino sobre él.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܡ̈ܝܐ ܢܘܗܪ̈ܐ
  english_pob_choice: bright waters
  chosen_spanish: aguas luminosas
  alternatives_spanish:
  - aguas brillantes
  - aguas de luz
  lexicon: Payne Smith
  rationale: «Luminosas» conserva la imagen visual del símbolo acuático sin sonar tan adjetivalmente físico como «brillantes» en español. Mantiene el paralelo con las aguas favorables/opuestas del capítulo.
- source_word: ܬܪܝܨܘܬܐ / ܬܩܢܘܬܐ (control-backed sense)
  english_pob_choice: integrity and uprightness
  chosen_spanish: integridad y rectitud
  alternatives_spanish:
  - rectitud e integridad
  - rectitud y justicia
  lexicon: Payne Smith
  rationale: La dupla inglesa traduce dos cualidades éticas cercanas; en español «integridad y rectitud» resulta natural y conserva el énfasis moral doble sin diluirse en una sola idea.
- source_word: ܛܝܒܘܬܐ
  english_pob_choice: gracious favor
  chosen_spanish: favor benigno
  alternatives_spanish:
  - gracia
  - benevolencia
  lexicon: Payne Smith
  rationale: Aquí el rasgo es el favor que llega sobre Ezequías. «Favor benigno» mantiene la idea de benevolencia concedida, sin convertirlo en un término doctrinal más técnico que el contexto inmediato.
- source_word: ܡܠܟܐ ܕܝܗܘܕ
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: Payne Smith
  rationale: Es la equivalencia directa y natural en español; no requiere explicación adicional.
theological_decisions:
- issue: Cómo representar la relación entre la virtud de Ezequías y el favor que desciende sobre él
  english_pob_reading: Hezekiah is described both by his own integrity and by God’s gracious favor coming upon him.
  chosen_spanish_reading: Ezequías es descrito por su integridad y rectitud, y además por el favor benigno que vino sobre él.
  alternative_spanish_readings:
  - Ezequías es descrito solo por su rectitud moral.
  - La frase se refiere únicamente a la bondad de Dios en abstracto.
  rationale: La fuente distingue entre cualidades de Ezequías y un beneficio adicional que viene sobre él. El español conserva ambas cosas, sin fusionarlas ni reducir la segunda a una abstracción.
  doctrine_reference: Lectura histórico-gramatical del texto apocalíptico; distinción entre virtud humana y acción benévola divina.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del paquete fuente siríaco y del control auditado en inglés; el cierre coincide con la lectura de alta concordancia y no requiere notas variantes en esta unidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto solo cuando el texto lo exija; en este versículo no aparece el nombre divino.
  - Se usó un registro sobrio y bíblico en español, evitando calcos innecesarios.
  - «Ezequías» y «Judá» siguen las formas usuales en español bíblico.
  - No se introdujo terminología eclesiástica no sustentada por la fuente.
