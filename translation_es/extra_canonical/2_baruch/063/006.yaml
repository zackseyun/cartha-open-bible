translation:
  language: es
  text: Y entonces el Poderoso mandó a Ramiel, su ángel que habla contigo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܚܰܝܠܬܳܢܳܐ / Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Todopoderoso
  lexicon: Source epithet for divine power
  rationale: «Poderoso» conserva el valor de epíteto divino y suena natural en español. «Todopoderoso» sería posible, pero introduce una explicitación que el breve sintagma del original no exige necesariamente; «Fuerte» resulta menos idiomático como título.
- source_word: ܐܰܡܪ / commanded
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden a
  lexicon: Imperative divine action
  rationale: «Mandó» comunica una orden directa sin sobrecargar el registro. «Ordenó» también es válido, pero «mandó» sigue de cerca el tono breve y narrativo del original.
- source_word: Ramiel
  english_pob_choice: Ramiel
  chosen_spanish: Ramiel
  alternatives_spanish:
  - Ramiél
  lexicon: Proper name
  rationale: Se conserva el nombre propio sin adaptar la forma, siguiendo la práctica de mantener nombres angelológicos tal como aparecen en la tradición fuente.
- source_word: his angel
  english_pob_choice: his angel
  chosen_spanish: su ángel
  alternatives_spanish:
  - su mensajero angelical
  - su ángel
  lexicon: Angelology / possession
  rationale: «Su ángel» reproduce de manera directa la relación posesiva del original y mantiene la sencillez del enunciado. No hace falta expandirlo a una perífrasis explicativa.
- source_word: who speaks with you
  english_pob_choice: who speaks with you
  chosen_spanish: que habla contigo
  alternatives_spanish:
  - que te habla
  - que conversa contigo
  lexicon: Relative clause of address
  rationale: «Habla contigo» mantiene la idea de comunicación directa y respeta el matiz relacional del original. «Te habla» sería más idiomático en algunos contextos, pero «contigo» conserva la referencia explícita al interlocutor.
theological_decisions:
- issue: Cómo verter el título divino "the Mighty One"
  english_pob_reading: Divine epithet rendered as a title, not a generic adjective
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
  - el Todopoderoso
  - el Fuerte
  rationale: La elección conserva la función titulativa y evita sustituirla por una fórmula eclesiástica más tradicional que podría desplazar el matiz del original. No se introduce «SEÑOR» porque el fuente dado no requiere ese reemplazo.
  doctrine_reference: Divine epithets in apocalyptic narration
- issue: Identidad y función de Ramiel
  english_pob_reading: Ramiel is identified as an angel who speaks with the addressee
  chosen_spanish_reading: Ramiel, su ángel que habla contigo
  alternative_spanish_readings:
  - Ramiel, su ángel que te habla
  - Ramiel, el ángel que habla contigo
  rationale: Se mantiene la relación funcional del ángel sin añadir interpretaciones doctrinales sobre rango o naturaleza. El texto simplemente lo identifica como el ángel que habla con el destinatario.
  doctrine_reference: Angelology in 2 Baruch
translation_notes:
  revision_awareness: The English POB text is already marked high-agreement with no revisions needed; the Spanish draft follows the same concise reading and does not introduce textual expansion.
  spanish_consistency_notes:
  - Se conserva un registro sobrio y narrativo, adecuado para prosa apocalíptica.
  - Se evita el calco excesivo y se mantiene la naturalidad del español sin alterar la brevedad del enunciado.
  - No se usan títulos eclesiásticos añadidos ni se sustituye el nombre angelológico por una glosa.
