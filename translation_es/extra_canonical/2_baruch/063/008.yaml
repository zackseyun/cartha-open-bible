translation:
  language: es
  text: Y en aquel tiempo quemé sus cuerpos por dentro, pero preservé sus vestidos y sus armas por fuera, para que se vieran las maravillas todavía mayores del Poderoso, y para que su nombre fuera pronunciado por toda la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: burned their bodies from within
  english_pob_choice: I burned their bodies from within
  chosen_spanish: quemé sus cuerpos desde dentro
  alternatives_spanish:
  - quemé sus cuerpos por dentro
  - consumí sus cuerpos desde dentro
  lexicon: burn/inside; body
  rationale: El inglés auditado preserva la imagen de una combustión interior; "desde dentro" mantiene la fuerza espacial sin introducir una explicación adicional. "Quemé" es la forma natural y fiel para el verbo de acción sin suavizar el juicio del texto.
- source_word: preserved their garments and their weapons outwardly
  english_pob_choice: I preserved their garments and their weapons outwardly
  chosen_spanish: preservé sus vestidos y sus armas por fuera
  alternatives_spanish:
  - guardé sus vestidos y sus armas externamente
  - conservé sus vestidos y sus armas al exterior
  lexicon: preserve/outwardly; garments/weapons
  rationale: '"Preservé" corresponde bien a la conservación intencional. "Vestidos" es una opción digna y clara para prendas; "por fuera" conserva el contraste interior/exterior que el inglés destaca, sin convertirlo en una paráfrasis abstracta.'
- source_word: the Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Omnipotente
  - el Fuerte
  lexicon: divine epithet
  rationale: El epíteto divino del inglés se traduce de manera directa y sobria como "el Poderoso", que mantiene la mayestática referencia sin añadir carga doctrinal ajena.
- source_word: his name might be spoken throughout the whole earth
  english_pob_choice: his name might be spoken throughout the whole earth
  chosen_spanish: su nombre fuera proclamado por toda la tierra
  alternatives_spanish:
  - su nombre fuera hablado por toda la tierra
  - su nombre se mencionara por toda la tierra
  lexicon: speak/name/proclaim; earth
  rationale: '"Proclamado" hace explícita en español la finalidad pública del verbo "spoken" en este contexto, que no es mera vocalización sino difusión universal. "Por toda la tierra" reproduce la amplitud total de "throughout the whole earth".'
theological_decisions:
- issue: Divine epithet for the Mighty One
  english_pob_reading: the Mighty One
  chosen_spanish_reading: el Poderoso
  alternative_spanish_readings:
  - el Omnipotente
  - el Fuerte
  rationale: El texto no usa el Tetragrámaton sino un epíteto de poder. Mantenerlo como "el Poderoso" respeta la designación sin sustituirla por una fórmula litúrgica más cargada que el original inmediato.
  doctrine_reference: Divine epithets in apocalyptic narrative; no doctrinal expansion beyond the source
- issue: Purpose clause linking the miracle and the spread of the name
  english_pob_reading: so that the still greater wonders of the Mighty One might be seen, and that his name might be spoken throughout the whole earth
  chosen_spanish_reading: para que se vieran las maravillas todavía mayores del Poderoso, y para que su nombre fuera proclamado por toda la tierra
  alternative_spanish_readings:
  - para que se contemplaran...
  - para que se conocieran...
  rationale: 'La construcción final tiene doble propósito: revelación de maravillas y difusión del nombre. "Se vieran" y "fuera proclamado" conservan esa finalidad sin convertir el segundo miembro en un mero recuerdo interno.'
  doctrine_reference: Public testimony to divine wonders in apocalyptic literature
translation_notes:
  revision_awareness: El pasaje inglés auditado fue mantenido sin revisiones; la versión española sigue de cerca la misma segmentación y las mismas decisiones léxicas, sin introducir notas textuales porque el paquete no reporta variantes ni tensiones documentadas en esta unidad.
  spanish_consistency_notes:
  - Se conserva la voz en primera persona singular como en el inglés auditado.
  - No se usa "SEÑOR" para el epíteto divino porque el fuente inmediata no es el Tetragrámaton.
  - '"Poderoso" se mantiene consistente con el epíteto del original sin ampliar a un título distinto.'
  - La pareja interior/exterior se conserva con "desde dentro" / "por fuera" para mantener el contraste retórico del versículo.
