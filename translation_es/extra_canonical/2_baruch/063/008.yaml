review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del inglés auditado: combustión interior de los cuerpos, preservación exterior de vestidos y armas, propósito de manifestar maravillas mayores y difusión universal del nombre. Sin embargo, en la última cláusula introduce un matiz algo más fuerte y específico con "proclamado" frente a "spoken", y omite "whole" al decir solo "toda la tierra" si se entiende suficientemente, aunque puede reforzarse mejor con "toda la tierra" sin problema. La estructura final se preserva adecuadamente.'
  spanish_quality_summary: El español es claro y digno. "Quemé sus cuerpos desde dentro" y "preservé sus vestidos y sus armas por fuera" son naturales, aunque "por dentro / por fuera" suena algo más idiomático como pareja. El principal ajuste recomendable es bajar "proclamado" a una opción más cercana al original y más sobria, como "fuera pronunciado" o "se hablara de su nombre"; la primera conserva mejor la pasiva del inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. "el Poderoso" refleja bien el epíteto divino. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión de "vestidos" es aceptable, aunque "ropas" también sería posible; no requiere cambio.
  issues:
  - severity: medium
    issue: '"fuera proclamado" intensifica el verbo respecto de "might be spoken"'
    rationale: El inglés auditado eligió "spoken", no "proclaimed". En español, "proclamado" añade un matiz de anuncio formal o pregón público que puede ir más allá del testimonio verbal general del original.
  - severity: low
    issue: La pareja espacial puede sonar más idiomática como "por dentro / por fuera"
    rationale: El borrador usa "desde dentro" y "por fuera". No es incorrecto, pero emparejar ambas expresiones mejora la fluidez sin alterar el sentido.
