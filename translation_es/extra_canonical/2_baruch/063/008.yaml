  revision_rationale: Se ajusta "proclamado" a "pronunciado" para seguir más de cerca el valor de "spoken" en el inglés auditado, evitando una intensificación no exigida por la evidencia. También se armoniza el contraste espacial con "por dentro / por fuera" para mayor naturalidad en español.
