  text: Entonces te mostraré el juicio de mi poder y mis caminos, que son inescrutables.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܕܝܢܐ / "judgment"
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - fallo
  - juicio
  lexicon: N/A
  rationale: «Juicio» conserva el valor forense y declarativo del término sin forzar un tecnicismo más estrecho como «sentencia», y encaja con el paralelismo de «mis caminos».
- source_word: ܚܝܠܝ / "my might"
  english_pob_choice: my might
  chosen_spanish: mi poder
  alternatives_spanish:
  - mi fuerza
  - mi potencia
  - mi poder
  lexicon: N/A
  rationale: «Poder» reproduce bien la idea de capacidad efectiva y mantiene el tono elevado del pasaje; «fuerza» podría sonar más físico de lo que exige el contexto.
- source_word: ܐܘܪ̈ܚܝ / "my ways"
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mis obras
  - mis senderos
  - mis caminos
  lexicon: N/A
  rationale: «Caminos» es la opción más natural y fiel para el uso figurado de modos de actuar o proceder divino.
- source_word: ܕܠܐ ܡܬܒܨܝܢ / "which are past searching out"
  english_pob_choice: which are past searching out
  chosen_spanish: que son inescrutables
  alternatives_spanish:
  - que no pueden ser investigados
  - que no se pueden sondear
  - que son inescrutables
  lexicon: N/A
  rationale: «Inescrutables» condensa con precisión la idea de imposibilidad de sondeo o investigación exhaustiva y es idiomático en español bíblico contemporáneo.
theological_decisions:
- issue: La frase final expresa la inaccesibilidad del obrar y del juicio divinos.
  english_pob_reading: which are past searching out
  chosen_spanish_reading: que son inescrutables
  alternative_spanish_readings:
  - que no pueden ser investigados
  - que están más allá de toda investigación
  rationale: 'La formulación mantiene la tensión teológica de la trascendencia divina sin suavizarla: no se trata solo de dificultad humana, sino de exceder la búsqueda exhaustiva.'
  doctrine_reference: Teología de la trascendencia divina
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido del texto fuente y es consistente con la traducción inglesa auditada: ''Then I will show you the judgment of my might and my ways, which are past searching out.'' No se introdujeron cambios textuales ni variantes adicionales.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo sintáctico entre «el juicio de mi poder» y «mis caminos».
  - Se evitó capitalizar o sustituir términos con carga teológica no presente en el verso.
  - La elección de «inescrutables» preserva un registro bíblico natural sin añadir glosa interpretativa.
