translation:
  language: es
  text: Por eso ahora he apartado a Sion, para visitar al mundo más rápidamente en su tiempo señalado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “have now taken Zion away” (Syriac control text underlying the English POB “taken Zion away”)
  english_pob_choice: taken Zion away
  chosen_spanish: he quitado de en medio a Sion
  alternatives_spanish:
  - he apartado a Sion
  - he alejado a Sion
  - he removido a Sion
  lexicon: Sion
  rationale: La imagen no es simplemente “llevarse” una ciudad, sino retirarla de la escena para el propósito divino del contexto. “Quitar de en medio” comunica mejor la separación y el desplazamiento implícitos sin añadir contenido ajeno.
- source_word: world
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - tierra
  - la humanidad
  lexicon: mundo
  rationale: “Mundo” mantiene el alcance amplio y general del inglés y se adapta bien al registro bíblico en español. “Tierra” restringiría el sentido; “humanidad” interpretaría en exceso.
- source_word: appointed time
  english_pob_choice: appointed time
  chosen_spanish: tiempo señalado
  alternatives_spanish:
  - tiempo fijado
  - tiempo determinado
  - momento señalado
  lexicon: tiempo señalado
  rationale: La expresión conserva la idea de un tiempo establecido previamente por Dios. “Señalado” es natural en español bíblico y preserva la noción de designación sin volverla técnica.
theological_decisions:
- issue: Finalidad divina en la remoción de Sion
  english_pob_reading: so that I may visit the world more swiftly in its appointed time
  chosen_spanish_reading: para poder visitar al mundo más rápidamente en su tiempo señalado
  alternative_spanish_readings:
  - para que pueda visitar al mundo con mayor rapidez en su tiempo fijado
  - a fin de visitar al mundo más pronto en el tiempo señalado
  rationale: 'Se conserva la relación de propósito (“para poder”) y la agencia divina implícita en la visita/juzgamiento del mundo. No se suaviza la tensión: Sion es retirada con una finalidad escatológica concreta.'
  doctrine_reference: 2 Baruc 20:2; juicio divino y tiempo escatológico señalado
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios; la traducción española sigue el mismo sentido óptimo sin introducir notas textuales porque no se documentan variantes ni tensiones léxicas adicionales en el paquete proporcionado.
  spanish_consistency_notes:
  - Se mantiene “Sion” sin artículo para seguir el uso bíblico común en español y porque el inglés POB emplea el topónimo como entidad singular.
  - Se usa “visitar” en sentido bíblico de intervención divina, no de mera visita social.
  - No se introduce “SEÑOR” ni “Cristo” porque el versículo no los contiene.
