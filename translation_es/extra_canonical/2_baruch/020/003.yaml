translation:
  language: es
  text: Y ahora, por eso, retén en tu corazón todo lo que te mando, y séllalo en las cámaras interiores de tu mente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: And now, therefore
  english_pob_choice: And now, therefore
  chosen_spanish: Y ahora, por tanto
  alternatives_spanish:
  - Y ahora, entonces
  - Y ahora, pues
  lexicon: connective/illative sequence
  rationale: El siríaco expresa una transición temporal con fuerza ilativa; 'por tanto' conserva mejor el valor de consecuencia que un simple 'ahora'. 'Y ahora, por tanto' mantiene ambos matices sin sonar rígido en español.
- source_word: hold fast
  english_pob_choice: hold fast
  chosen_spanish: retén
  alternatives_spanish:
  - guarda firmemente
  - aférrate a
  lexicon: imperative retention
  rationale: '''Retén'' comunica de forma breve y fiel la idea de mantener firme en el interior, sin añadir una imagen más interpretativa que la del mandato original.'
- source_word: in your heart
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - en tu interior
  - en lo profundo de tu corazón
  lexicon: heart as inner self
  rationale: '''Corazón'' conserva en español el centro interior de memoria, voluntad y afecto, que corresponde al sentido semítico de la expresión.'
- source_word: all that I command you
  english_pob_choice: all that I command you
  chosen_spanish: todo lo que te mando
  alternatives_spanish:
  - todo lo que te ordeno
  - todo cuanto te mando
  lexicon: command/imperative
  rationale: '''Mando'' corresponde bien al carácter imperativo del original y evita suavizar el tono de autoridad. ''Todo lo que'' preserva la totalidad de la instrucción.'
- source_word: seal it
  english_pob_choice: seal it
  chosen_spanish: séllalo
  alternatives_spanish:
  - guárdalo sellado
  - ponle sello
  lexicon: seal metaphor
  rationale: Se conserva la metáfora de sellar como fijar y asegurar algo íntimamente, sin convertirla en una paráfrasis explicativa.
- source_word: inner chambers of your mind
  english_pob_choice: inner chambers of your mind
  chosen_spanish: las cámaras interiores de tu mente
  alternatives_spanish:
  - las habitaciones interiores de tu mente
  - los recovecos de tu mente
  lexicon: inner chambers metaphor
  rationale: '''Cámaras interiores'' reproduce la imagen espacial del texto fuente con dignidad literaria. ''Mente'' expresa aquí el ámbito interior de pensamiento y deliberación, compatible con el paralelo semítico entre corazón y mente.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente restablece 'And now, therefore' para reflejar la fuerza ilativa y temporal del siríaco. La versión española sigue esa decisión con 'Y ahora, por tanto', sin necesidad de nota textual adicional porque la misma secuencia puede leerse naturalmente en español.
  spanish_consistency_notes:
  - Se mantiene la distinción funcional entre 'corazón' y 'mente' para no fusionar indebidamente dos imágenes interiores distintas del original.
  - Se evita 'alma' porque el texto fuente y la auditoría inglesa apuntan a interioridad mental y moral, no a un término técnico para el alma.
  - No se añadió nota al pie porque no hay lectura alternativa que deba anclarse en el texto español para este versículo.
