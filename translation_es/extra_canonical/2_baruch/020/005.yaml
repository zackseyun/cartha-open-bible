translation:
  language: es
  text: Ve, pues, santifícate por siete días; no comas pan, no bebas agua, y no hables con nadie.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sanctify yourself
  english_pob_choice: sanctify yourself
  chosen_spanish: santifícate
  alternatives_spanish:
  - conságrate
  - purifícate
  lexicon: Syriac semantic equivalent for ritual self-separation
  rationale: El mandato en inglés expresa una acción de apartarse ritualmente; en español, «santifícate» conserva bien la fuerza imperativa y el matiz de separación consagrada sin añadir una explicación externa. «Conságrate» y «purifícate» son posibles, pero «santifícate» sigue más de cerca el campo religioso del contexto.
- source_word: for seven days
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - por espacio de siete días
  lexicon: Temporal duration phrase
  rationale: «Por siete días» es natural y fiel a la duración continua requerida. «Durante siete días» también es válido, pero la forma elegida mantiene la concisión del original.
- source_word: eat no bread
  english_pob_choice: eat no bread
  chosen_spanish: no comas pan
  alternatives_spanish:
  - no comas ningún pan
  - no comas alimento
  lexicon: Bread as a metonym for food
  rationale: Se conserva «pan» porque el texto inglés usa bread y el gesto de abstinencia está expresado con un alimento básico concreto. No se generaliza a «alimento» para no suavizar la imagen.
- source_word: drink no water
  english_pob_choice: drink no water
  chosen_spanish: no bebas agua
  alternatives_spanish:
  - no tomes agua
  - no bebas ningún agua
  lexicon: Water as direct object of abstinence
  rationale: «No bebas agua» reproduce con claridad la prohibición paralela. «Tomes» sería más coloquial; «bebas» mantiene el tono formal y bíblico.
- source_word: speak with no one
  english_pob_choice: speak with no one
  chosen_spanish: no hables con nadie
  alternatives_spanish:
  - no converses con nadie
  - no hables con persona alguna
  lexicon: Social isolation instruction
  rationale: La negación absoluta queda bien expresada con «con nadie». «Converses» estrecha demasiado el verbo; «persona alguna» suena más literario y menos natural.
theological_decisions:
- issue: Ritual self-sanctification and fasting as preparation
  english_pob_reading: 'The verse is read as a sequence of commands for consecrated withdrawal: sanctify yourself, fast from bread and water, and avoid speech with others.'
  chosen_spanish_reading: 'El verso se entiende como una serie de mandatos de apartamiento ritual: santifícate, ayuna de pan y agua, y no hables con nadie.'
  alternative_spanish_readings:
  - purifícate como preparación
  - sepárate ritualmente
  rationale: La formulación española conserva la secuencia imperativa y el carácter de retiro ritual sin introducir explicaciones doctrinales no presentes en el texto. «Ayuna» no aparece explícitamente, pero la abstinencia de pan y agua lo implica; por eso se mantiene la estructura concreta de la prohibición.
  doctrine_reference: Ascetical preparation / ritual purity in Second Temple and related Jewish apocalyptic contexts
translation_notes:
  revision_awareness: The English POB text was unchanged after latest revision and cross-check summary shows high agreement (1.0). No English footnotes or revisions needed to be reflected, so the Spanish draft follows the stable audit trail closely without adding speculative variants.
