translation:
  language: es
  text: Después, ven a este lugar, y allí me apareceré y hablaré contigo acerca de cosas verdaderas,[a] y te instruiré acerca del orden de los tiempos, porque he aquí,[b] vienen y no tardarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hablaré contigo de cosas verdaderas».
    reason: previous_rendering
  - marker: b
    text: O «pues he aquí».
    reason: lexical_alternative
lexical_decisions:
- source_word: syriac 'ḥar' / equivalent temporal adverb
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Luego
  - Más tarde
  lexicon: adverbio temporal
  rationale: «Después» comunica la secuencia temporal de manera natural en español y mantiene el valor de posterioridad sin añadir matices interpretativos.
- source_word: '''at l-hā ''tā'
  english_pob_choice: come to this place
  chosen_spanish: ven a este lugar
  alternatives_spanish:
  - acude a este lugar
  - ven aquí
  lexicon: verbo de movimiento + deíctico
  rationale: «Ven a este lugar» conserva el mandato y la referencia local concreta del texto, sin suavizar el imperativo.
- source_word: '''ethgallē lāk'
  english_pob_choice: I will appear to you there
  chosen_spanish: me apareceré a ti allí
  alternatives_spanish:
  - me manifestaré a ti allí
  - me mostraré a ti allí
  lexicon: verbo revelatorio
  rationale: «Apareceré» sigue de cerca la idea de manifestación/revelación personal del original y del inglés auditado, conservando el carácter teofánico.
- source_word: mlt' b-šrārā / equivalent
  english_pob_choice: speak with you about true things
  chosen_spanish: hablaré contigo acerca de cosas verdaderas
  alternatives_spanish:
  - hablaré contigo verdad
  - te hablaré con verdad
  lexicon: expresión de contenido de habla
  rationale: La revisión inglesa aclaró que la construcción no es un calco idiomático en inglés; en español, «acerca de cosas verdaderas» preserva el sentido de contenido verdadero sin forzar una frase extraña.
- source_word: tksy d-zbnē
  english_pob_choice: the order of the times
  chosen_spanish: el orden de los tiempos
  alternatives_spanish:
  - el orden de los tiempos y de las épocas
  - la disposición de los tiempos
  lexicon: sintagma nominal
  rationale: «Orden de los tiempos» mantiene la formulación del POB inglés y refleja la idea de una secuencia o disposición temporal determinada.
- source_word: ha
  english_pob_choice: for behold
  chosen_spanish: porque, he aquí
  alternatives_spanish:
  - pues, he aquí
  - porque, mira
  lexicon: partícula discursiva
  rationale: La partícula siríaca deíctica añadida por la revisión se refleja con «he aquí», que conserva la fuerza demostrativa y solemne del original.
- source_word: '''atyin'
  english_pob_choice: they are coming
  chosen_spanish: vienen
  alternatives_spanish:
  - están viniendo
  - están por venir
  lexicon: aspecto verbal
  rationale: «Vienen» expresa proximidad e inminencia con naturalidad en español y evita una perífrasis innecesaria, sin perder el sentido de llegada inminente.
- source_word: lo me'akkbīn
  english_pob_choice: will not delay
  chosen_spanish: no tardarán
  alternatives_spanish:
  - no se demorarán
  - no se retrasarán
  lexicon: negación + demora
  rationale: «No tardarán» es idiomático y reproduce la idea de ausencia de demora de forma clara y solemne.
theological_decisions:
- issue: Manifestación divina y revelación personal
  english_pob_reading: I will appear to you there and speak with you about true things
  chosen_spanish_reading: me apareceré a ti allí y hablaré contigo acerca de cosas verdaderas
  alternative_spanish_readings:
  - me manifestaré a ti allí y hablaré contigo sobre la verdad
  - me mostraré a ti allí y te hablaré verdad
  rationale: El pasaje presenta una promesa de aparición revelatoria de Dios a Baruc. «Me apareceré» mantiene la teofanía sin introducir una formulación más doctrinal que el texto no exige.
  doctrine_reference: teofanía / revelación divina
- issue: Inminencia escatológica
  english_pob_reading: for behold, they are coming and will not delay
  chosen_spanish_reading: porque, he aquí, vienen y no tardarán
  alternative_spanish_readings:
  - porque, he aquí, están viniendo y no se retrasarán
  - pues, he aquí, se acercan y no se demorarán
  rationale: La frase conserva la urgencia profética. «He aquí» preserva la insistencia del original en la inminencia de los tiempos, sin atenuarla en un mero futuro abstracto.
  doctrine_reference: escatología / inminencia profética
translation_notes:
  revision_awareness: 'La redacción inglesa auditada fue revisada para resolver una expresión poco natural («speak true things with you» → «speak with you about true things») y para restituir la partícula enfática «behold». La versión española sigue esas decisiones: mantiene el contenido verdadero del habla sin calco duro, y refleja explícitamente la fuerza deíctica de «he aquí».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el tetragrámaton; en este versículo no aparece.
  - «Espíritu/Espíritu Santo» y otros términos no intervienen aquí.
  - La puntuación sigue el español moderno con pausas acordes al ritmo profético del texto.
