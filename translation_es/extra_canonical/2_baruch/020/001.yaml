translation:
  language: es
  text: Por tanto, he aquí, vienen días en que los tiempos se apresurarán más que los anteriores, y las épocas pasarán con mayor rapidez que las que ya pasaron, y los años transcurrirán más rápido que los años presentes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܙܒ̈ܢܐ
  english_pob_choice: times
  chosen_spanish: tiempos
  alternatives_spanish:
  - edades
  - períodos
  - épocas
  lexicon: Payne Smith
  rationale: Conserva el sentido amplio de períodos ordenados, no de horas o cronología mecánica; en español, 'tiempos' mantiene esa amplitud apocalíptica.
- source_word: ܙܒܢܐ / ܙܒ̈ܢܐ con contraste temporal
  english_pob_choice: times
  chosen_spanish: los tiempos ... los años ... los años presentes
  alternatives_spanish:
  - los períodos ... los años ... los años actuales
  lexicon: Payne Smith
  rationale: El contraste del pasaje es entre períodos escatológicos y el tiempo presente; 'años presentes' reproduce bien la oposición sin volverla demasiado técnica.
- source_word: ܥܒܪܝܢ / speeding up movement imagery
  english_pob_choice: hasten / pass more swiftly / move faster
  chosen_spanish: se apresurarán / pasarán con mayor rapidez / se moverán más rápido
  alternatives_spanish:
  - se acelerarán / pasarán más deprisa / avanzarán más rápido
  lexicon: Payne Smith
  rationale: La triple gradación del texto se conserva con verbos naturales en español y refleja el aumento progresivo de velocidad sin añadir matices ajenos.
theological_decisions:
- issue: 'Escatología temporal: aceleración de los tiempos'
  english_pob_reading: The times, seasons, and years are described as hastening in an ordered eschatological sequence.
  chosen_spanish_reading: Los tiempos, las estaciones y los años se describen como si se aceleraran en una secuencia escatológica ordenada.
  alternative_spanish_readings:
  - Los tiempos se acortarán
  - Las épocas llegarán más pronto
  rationale: El Syriac presenta una imagen de aceleración, no simplemente de acortamiento. 'Se apresurarán' y 'pasarán con mayor rapidez' preservan esa fuerza imagística.
  doctrine_reference: Eschatology / providence over history
translation_notes:
  revision_awareness: El texto español sigue el alcance del versículo 1 únicamente, de acuerdo con la depuración del audit trail. Se ha evitado extenderse a los versículos siguientes y se ha conservado la triple progresión temporal del original.
  spanish_consistency_notes:
  - Se usa 'tiempos' para ܙܒ̈ܢܐ como término amplio y apocalíptico.
  - Se mantiene un paralelismo claro entre 'se apresurarán', 'pasarán con mayor rapidez' y 'se moverán más rápido'.
  - No se introduce 'Mesías', 'SEÑOR' ni otras sustituciones no presentes en este versículo.
  - La puntuación sigue el español moderno con 'Por tanto, he aquí,' para corresponder al arranque inferencial del texto.
