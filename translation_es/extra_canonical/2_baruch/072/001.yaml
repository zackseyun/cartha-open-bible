translation:
  language: es
  text: Pero escucha también de las aguas brillantes[a] que han de venir al final, después de estas aguas oscuras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esas aguas oscuras».'
    reason: Preserva en español la alternativa previa documentada en la auditoría inglesa ('those dark waters') sin contradecir la lectura principal 'estas aguas oscuras'.
lexical_decisions:
- source_word: ܡ̈ܝܐ / waters
  english_pob_choice: bright waters
  chosen_spanish: aguas brillantes
  alternatives_spanish:
  - aguas claras
  - aguas radiantes
  lexicon: Payne Smith
  rationale: ‘Brillantes’ conserva el contraste simbólico con las aguas oscuras y mantiene la carga escatológica sin añadir una imagen ajena al texto.
- source_word: adversative contrast with prior dark waters
  english_pob_choice: these dark waters
  chosen_spanish: estas aguas oscuras
  alternatives_spanish:
  - esas aguas oscuras
  - aquellas aguas oscuras
  lexicon: Payne Smith
  rationale: ‘Estas’ refleja el demostrativo cercano del siríaco para las aguas oscuras inmediatamente precedentes, según la revisión textual documentada.
theological_decisions:
- issue: Cómo expresar el contraste escatológico entre aguas oscuras y brillantes
  english_pob_reading: But hear also about the bright waters that are to come at the end, after these dark waters.
  chosen_spanish_reading: Pero escucha también acerca de las aguas brillantes que han de venir al final, después de estas aguas oscuras.
  alternative_spanish_readings:
  - Pero escucha también acerca de las aguas claras que vendrán al final, después de estas aguas oscuras.
  - Pero escucha también acerca de las aguas radiantes que han de venir al final, después de estas aguas oscuras.
  rationale: La imagen apunta a una reversión esjatológica en contraste con la secuencia previa de aguas oscuras; ‘brillantes’ conserva ese valor simbólico sin diluirlo en una explicación interpretativa.
  doctrine_reference: Preservar el lenguaje apocalíptico sin sobreexplicar su significado teológico.
translation_notes:
  revision_awareness: La revisión más reciente corrigió la demostrativa inglesa a ‘these dark waters’ por ajuste textual del siríaco ܗܠܝܢ; por eso la nota y la traducción usan ‘estas’ y no ‘esas’/‘aquellas’.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con léxico transparente para lectores de iglesia.
  - No se introduce un sujeto implícito inexistente; la frase sigue el imperativo ‘escucha’.
  - El contraste ‘brillantes / oscuras’ conserva el paralelismo del original sin amplificarlo poéticamente.
