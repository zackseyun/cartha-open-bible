translation:
  language: es
  text: Pero todos aquellos que te han gobernado, o te han conocido, todos esos serán entregados a la espada.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: all those who have ruled over you
  english_pob_choice: those who have ruled over you
  chosen_spanish: aquellos que han gobernado sobre ti
  alternatives_spanish:
  - los que te han gobernado
  - quienes han reinado sobre ti
  lexicon: gobernar
  rationale: El verbo español «gobernar» conserva el sentido de ejercer dominio/autoridad sobre otro sin añadir una especificación monárquica que el contexto no exige. «Sobre ti» refleja la relación de dominio del original y del inglés POB.
- source_word: or have known you
  english_pob_choice: or have known you
  chosen_spanish: o te han conocido
  alternatives_spanish:
  - o te han reconocido
  - o han llegado a conocerte
  lexicon: conocer
  rationale: «Conocer» reproduce de forma natural y directa el alcance relacional del original. «Te han conocido» mantiene la simpleza de la lista paralela sin forzar una interpretación más estrecha que la fuente no obliga.
- source_word: shall be delivered to the sword
  english_pob_choice: shall be delivered to the sword
  chosen_spanish: serán entregados a la espada
  alternatives_spanish:
  - serán entregados a la muerte por la espada
  - caerán bajo la espada
  lexicon: entregar
  rationale: «Ser entregados a la espada» conserva la construcción pasiva de destino/jucio presente en el inglés POB y en el trasfondo semítico, con una imagen bélica literal. Se evita suavizarla hacia una mera referencia general a la muerte.
theological_decisions:
- issue: Destino judicial de los opresores
  english_pob_reading: all these shall be delivered to the sword
  chosen_spanish_reading: todos esos serán entregados a la espada
  alternative_spanish_readings:
  - todos esos caerán por la espada
  - todos esos morirán a espada
  rationale: La formulación mantiene el carácter de juicio retributivo y la imagen concreta de la espada como agente de sentencia. «Entregados a la espada» preserva mejor la pasividad del enunciado que una reformulación puramente intransitiva.
  doctrine_reference: Juicio divino retributivo en lenguaje profético-apocalíptico
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés POB quedó confirmado sin ajustes y el acuerdo de control fue alto. La versión española sigue de cerca esa lectura estable, sin expandir ni atenuar el enunciado.
  spanish_consistency_notes:
  - Se mantiene un español moderno y sobrio, evitando arcaísmos innecesarios.
  - Se conserva la repetición enfática de «todos» implícita en el original mediante «todos aquellos... todos esos».
  - No se introducen términos teológicos no presentes en el versículo.
  - La imagen de «la espada» se mantiene literal por su fuerza profética.
