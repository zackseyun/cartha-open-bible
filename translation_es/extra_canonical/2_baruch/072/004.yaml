translation:
  language: es
  text: Todo pueblo[a] que no ha conocido a Israel y no ha pisoteado la descendencia de Jacob[b]—estos son los que vivirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pueblo» preserva el alcance colectivo del siríaco; «nación» sería posible, pero añade un matiz político moderno.
    reason: lexical_alternative
  - marker: b
    text: «Descendencia» traduce la metáfora genealógica de «seed» sin el arcaísmo de «simiente».
    reason: lexical_alternative
lexical_decisions:
- source_word: Every people
  english_pob_choice: Every people
  chosen_spanish: Todo pueblo
  alternatives_spanish:
  - Toda nación
  - Toda gente
  lexicon: עם / ܥܡܐ
  rationale: El contexto contrasta colectividades; en español, «pueblo» conserva mejor la idea de grupo étnico-político que «gente». «Toda nación» podría sonar más moderno, pero introduce un matiz estatal no asegurado por el siríaco.
- source_word: has not known
  english_pob_choice: has not known
  chosen_spanish: no ha conocido
  alternatives_spanish:
  - no ha reconocido
  - no ha llegado a conocer
  lexicon: ידע / ܝܕܥ
  rationale: «Conocer» mantiene la amplitud semítica del verbo sin forzar un sentido meramente intelectual. «Reconocer» sería más interpretativo; «llegar a conocer» suaviza demasiado la negación.
- source_word: Israel
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: ישראל / ܐܝܣܪܐܝܠ
  rationale: Se conserva el nombre propio tal como aparece en la tradición bíblica; añadir «el pueblo de» explicita, pero no es necesario y podría romper la concisión del verso.
- source_word: has not trampled
  english_pob_choice: has not trampled
  chosen_spanish: no ha pisoteado
  alternatives_spanish:
  - no ha aplastado
  - no ha hollado
  lexicon: ܐܪܟ / ܕܪܟ
  rationale: «Pisotear»/«pisotear» expresa con fuerza el acto de humillar y oprimir que el contexto sugiere. «Hollar» es más literario pero menos claro para lectura pública.
- source_word: seed of Jacob
  english_pob_choice: seed of Jacob
  chosen_spanish: descendencia de Jacob
  alternatives_spanish:
  - simiente de Jacob
  - linaje de Jacob
  lexicon: ܙܪܥܐ / זרע
  rationale: «Descendencia» es el equivalente español más natural y fiel para la metáfora genealógica. «Simiente» conservaría mayor literalidad, pero suena arcaico o sexualizado en español moderno.
- source_word: these are the ones that shall live
  english_pob_choice: these are the ones that shall live
  chosen_spanish: —estos son los que vivirán
  alternatives_spanish:
  - —estos son los que vivirán
  - —ellos son los que vivirán
  lexicon: ܗܢܘܢ ܕܢܚܘܢ
  rationale: La construcción enfática se mantiene con una cópula explicativa en español. «Vivirán» conserva el valor escatológico/general del futuro sin añadir explícitamente «eternamente», que no está en la formulación dada.
theological_decisions:
- issue: Identidad del sujeto colectivo que vive
  english_pob_reading: Every people that has not known Israel and has not trampled the seed of Jacob—these are the ones that shall live.
  chosen_spanish_reading: Todo pueblo que no ha conocido a Israel y no ha pisoteado la descendencia de Jacob—estos son los que vivirán.
  alternative_spanish_readings:
  - Toda nación que no ha conocido a Israel y no ha pisoteado la descendencia de Jacob—estos son los que vivirán.
  - Todo pueblo que no conoce a Israel y no ha pisoteado la descendencia de Jacob—estos son los que vivirán.
  rationale: 'Se conserva la lectura inclusiva y contrastiva del enunciado: no se trata de una definición doctrinal de salvación universal, sino de un dicho evaluativo dentro del discurso apocalíptico. El presente perfecto en español refleja bien el estatuto resultante del criterio; el futuro final mantiene el cierre sentencioso.'
  doctrine_reference: Apocalíptica judía; juicio/división de pueblos en clave narrativa, no formulación dogmática sistemática
translation_notes:
  revision_awareness: El control auditado indica alta concordancia con el texto fuente y que no se requirieron revisiones en el pase más reciente; por eso la propuesta mantiene de cerca la formulación inglesa POB, pero la apoya en equivalentes españoles naturales y fieles al registro apocalíptico.
  spanish_consistency_notes:
  - Se conserva «Israel» como nombre propio sin glosa, por tratarse de referencia directa al pueblo/nombre bíblico.
  - Se usa «vivirán» como futuro simple, manteniendo la clausula sentenciosa sin añadir matices inexistentes en el fuente.
  - No se introduce «Cristo», «Señor» ni otros términos teológicos ajenos al verso.
