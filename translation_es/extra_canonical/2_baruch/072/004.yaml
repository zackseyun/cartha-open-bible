review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español preserva fielmente el sentido del testimonio fuente según la auditoría inglesa: un colectivo universalizado (''Every people'') calificado por dos negaciones paralelas (''has not known Israel'' / ''has not trampled the seed of Jacob''), seguido de una conclusión enfática (''these are the ones that shall live''). No se detectan añadidos interpretativos sustanciales ni pérdida del contraste apocalíptico.'
  spanish_quality_summary: El español es natural, claro y digno para lectura eclesial amplia. La sintaxis con raya reproduce bien el giro conclusivo. 'Todo pueblo' suena bien en español bíblico moderno; 'no ha conocido' y 'no ha pisoteado' mantienen paralelismo y fuerza verbal. 'Descendencia de Jacob' evita arcaísmo innecesario y sigue siendo comprensible.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los términos clave se manejan bien: ''Israel'', ''Jacob'', y la metáfora genealógica de ''seed'' se vierte aceptablemente como ''descendencia''. Las notas léxicas están bien ancladas y justificadas. Aunque ''simiente'' sería una opción más formalmente literal, la decisión documentada por ''descendencia'' es defendible y más legible en español contemporáneo.'
  issues:
  - severity: low
    issue: La nota sobre 'pueblo' quizá es más necesaria de lo indispensable.
    rationale: No afecta fidelidad ni claridad; simplemente explica una elección ya bastante transparente.
  - severity: low
    issue: La racionalización de 'pisoteado' contiene una duplicación menor ('Pisotear/pisotear').
    rationale: Es un detalle editorial en metadatos, no un problema del texto bíblico español.
