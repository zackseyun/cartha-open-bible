  text: Y esto es así porque, de entre todas las naciones, serán sometidos a tu pueblo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܢܗܘܘܢ ܡܫܥܒܕܝܢ / subjected
  english_pob_choice: they shall be subjected
  chosen_spanish: serán sometidos
  alternatives_spanish:
  - serán sujetos
  - estarán sometidos
  lexicon: someter / sujetar
  rationale: La idea central es de sujeción impuesta por otro pueblo; en español, «serán sometidos» conserva el valor pasivo y el matiz de subordinación política o colectiva sin exagerar más allá del texto.
- source_word: ܡܢ ܟܠܗܝܢ ܐܡܘܬܐ / from among all the nations
  english_pob_choice: from among all the nations
  chosen_spanish: de entre todas las naciones
  alternatives_spanish:
  - de todas las naciones
  - entre todas las naciones
  lexicon: preposición distributiva / selección colectiva
  rationale: «De entre» preserva la idea de extracción o selección desde el conjunto de las naciones, no solo procedencia genérica.
- source_word: ܥܡܟ / your people
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu nación
  lexicon: pueblo
  rationale: «Pueblo» es la equivalencia más natural y fiel para una comunidad pactal o colectiva en este contexto, y mantiene el vínculo posesivo de segunda persona.
theological_decisions:
- issue: Relación de sometimiento de las naciones respecto al pueblo destinatario
  english_pob_reading: they shall be subjected, from among all the nations, to your people
  chosen_spanish_reading: serán sometidos a tu pueblo
  alternative_spanish_readings:
  - quedarán sujetos a tu pueblo
  - serán puestos bajo tu pueblo
  rationale: La formulación conserva la asimetría de dominio/subordinación que el inglés POB deja explícita, sin suavizarla hacia una simple convivencia o adhesión voluntaria.
  doctrine_reference: 2 Baruc 72:5; lectura escatológica de la restauración y preeminencia del pueblo de Dios
