translation:
  language: es
  text: 'Esta es la palabra: después de que hayan venido las señales que antes te fueron dichas, las naciones serán confundidas, y el tiempo de mi Mesías llegará. Él convocará a todas las naciones, y a unas las mantendrá con vida, pero a otras les dará muerte.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: signs
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - marcas
  lexicon: sign ܐܬܘ̈ܬܐ / ܐܬܐ
  rationale: ‘Señales’ comunica mejor en español el sentido de eventos portentosos anunciados de antemano, sin reducirlo a ‘signos’ técnicos o a ‘marcas’.
- source_word: messiah
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: Messiah משיחא / μεσσίας
  rationale: Se mantiene ‘Mesías’ para reflejar el título fuente y la decisión POB de no sustituirlo por la forma litúrgica ‘Cristo’ sin razón contextual.
- source_word: summon
  english_pob_choice: summon
  chosen_spanish: convocará
  alternatives_spanish:
  - llamará
  - reunirá
  lexicon: call / summon ܩܪܐ
  rationale: ‘Convocará’ expresa una llamada formal y pública a todas las naciones, preservando la fuerza judicial/solemne del verbo.
- source_word: keep alive
  english_pob_choice: keep alive
  chosen_spanish: mantendrá con vida
  alternatives_spanish:
  - dejará con vida
  - preservará con vida
  lexicon: keep alive ܐܚܝ
  rationale: Se opta por una construcción natural en español que conserva el sentido activo de preservar la vida, sin añadir una connotación moral o afectiva.
- source_word: put to death
  english_pob_choice: put to death
  chosen_spanish: las hará morir
  alternatives_spanish:
  - las matará
  - les dará muerte
  lexicon: kill / put to death ܡܘܬܐ
  rationale: ‘Las hará morir’ evita una dureza innecesaria y mantiene la agencia divina indicada por el inglés POB, sin reinterpretar el verbo.
theological_decisions:
- issue: Designación mesiánica
  english_pob_reading: time of my Messiah
  chosen_spanish_reading: el tiempo de mi Mesías
  alternative_spanish_readings:
  - el tiempo de mi Cristo
  - el tiempo del Mesías
  rationale: Se conserva el posesivo de primera persona y el título ‘Mesías’, siguiendo la lectura POB y el lenguaje del texto fuente sin cristianizarlo indebidamente.
  doctrine_reference: Mesianismo en literatura apocalíptica judía
- issue: Agencia divina en juicio y preservación
  english_pob_reading: He will keep alive ... but others ... put to death
  chosen_spanish_reading: a unas las mantendrá con vida, pero a otras las hará morir
  alternative_spanish_readings:
  - a unas las preservará con vida, pero a otras las matará
  - a unas les conservará la vida, pero a otras las dará muerte
  rationale: La redacción mantiene el paralelismo y la distribución diferencial del juicio sin suavizar la tensión teológica del texto.
  doctrine_reference: Juicio divino y selección soberana en literatura apocalíptica
translation_notes:
  revision_awareness: La versión inglesa revisada cambió solo la suavización estilística ('that were told' y 'keep alive'), sin alterar el sentido. La draft española sigue ese sentido revisado y evita introducir notas innecesarias, corrigiendo el fallo previo al no usar marcas de nota no ancladas.
  spanish_consistency_notes:
  - ‘Mesías’ se usa de forma consistente con el audit trail en lugar de ‘Cristo’.
  - ‘señales’ y ‘naciones’ mantienen el plural concreto del fuente y del inglés POB.
  - No se añadieron notas al pie para evitar marcadores sin anclaje; el texto queda listo para publicación.
