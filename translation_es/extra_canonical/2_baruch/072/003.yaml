lexical_decisions:
- source_word: those nations
  english_pob_choice: those nations
  chosen_spanish: aquellas naciones
  alternatives_spanish:
  - esas naciones
  - las naciones
  lexicon: nations
  rationale: «Aquellas» conserva la distancia discursiva de «those» y mantiene el tono profético; «naciones» es el equivalente natural en español para el referente colectivo.
- source_word: shall happen
  english_pob_choice: shall happen
  chosen_spanish: sucederán
  alternatives_spanish:
  - acontecerán
  - ocurrirán
  lexicon: happen
  rationale: «Sucederán» expresa futuro de manera clara y solemne sin añadir matices causales que el original no exige.
- source_word: be spared
  english_pob_choice: be spared
  chosen_spanish: serán perdonadas
  alternatives_spanish:
  - serán libradas
  - serán salvadas
  lexicon: spare
  rationale: El verbo de base sugiere libramiento/ser dejado con vida más que perdón moral; sin embargo, como el contexto disponible no aporta un término más específico, se optó por una forma comprensible y sobria. Se preserva la idea de quedar exentas del juicio, aunque el español no reproduce exactamente la ambigüedad entre «spared» y «forgiven».
- source_word: by him
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - de parte de él
  - por su mano
  lexicon: by
  rationale: «Por él» es la forma más directa y natural en español para marcar agente en una construcción pasiva perifrástica.
theological_decisions:
- issue: Referencia del agente implícito en «by him»
  english_pob_reading: Those nations are to be spared by him.
  chosen_spanish_reading: aquellas naciones que serán perdonadas por él
  alternative_spanish_readings:
  - aquellas naciones que serán libradas por él
  - aquellas naciones que serán salvadas por él
  rationale: Se mantiene la referencia personal del agente sin identificarlo explícitamente, siguiendo el texto disponible y evitando introducir una interpretación adicional sobre quién es «él».
  doctrine_reference: No aplica una decisión doctrinal específica; se conserva la ambigüedad del pronombre del source.
