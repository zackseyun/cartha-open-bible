    rationale: «Perdonar» en español se oye primordialmente como absolver una culpa. El contexto inglés habla de naciones que serán spared, es decir, preservadas/dejadas a salvo del juicio o destrucción. El borrador mismo reconoce esta tensión en su rationale léxico.
