  text: And I prayed and said, “Lord, my Lord, you continually give light to those who are guided by understanding. Your law is life, and your wisdom is uprightness. Therefore show me the interpretation of this vision. For you know that my soul has walked in your law, and from my earliest days I have not departed from your wisdom.”
  footnotes:
  - marker: a
    text: Or 'And he answered and said to me, “Why do you ask me? You help those who are guided by understanding in your prayer. My law is life, and my wisdom is uprightness. The mystery between me and you is the interpretation of this vision. For you have seen how your going out in your prayer was persuaded by my law, and from days of old you have not departed from my wisdom.”'.
    reason: previous_rendering
