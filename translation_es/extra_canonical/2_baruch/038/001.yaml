translation:
  language: es
  text: 'Y oré y dije: «Señor, mi Señor[a], tú das luz continuamente a los que son guiados por el entendimiento. Tu ley es vida, y tu sabiduría es rectitud. Por eso muéstrame la interpretación de esta visión. Porque tú sabes que mi alma ha andado en tu ley, y desde mis primeros días no me he apartado de tu sabiduría».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La formulación inicial del pasaje es textualmente inestable en la tradición de trabajo; por eso esta invocación se vierte según la lectura coherente con el contexto inmediato y con el audit trail del POB.
    reason: textual_variant
lexical_decisions:
- source_word: ܕܒܣܘܟܠܐ ܡܬܕܒܪܝܢ
  english_pob_choice: those who are guided by understanding
  chosen_spanish: los que son guiados por el entendimiento
  alternatives_spanish:
  - los que se conducen con entendimiento
  - los que caminan en discernimiento
  lexicon: Payne Smith
  rationale: Conserva el valor de ser guiados/conducidos y mantiene ܣܘܟܠܐ como entendimiento, sin convertirlo en mera inteligencia abstracta.
- source_word: ܢܡܘܣܝ ܚ̈ܝܐ ܗܘ
  english_pob_choice: Your law is life
  chosen_spanish: Tu ley es vida
  alternatives_spanish:
  - Tu ley da vida
  - Tu ley es la vida
  lexicon: Payne Smith
  rationale: 'La cláusula nominal fuerte se preserva con una identificación directa: la ley no solo produce vida, sino que se presenta como vida.'
- source_word: ܚܟܡܬܝ ܬܪܝܨܘܬܐ ܗܝ
  english_pob_choice: your wisdom is uprightness
  chosen_spanish: tu sabiduría es rectitud
  alternatives_spanish:
  - tu sabiduría es justicia
  - tu sabiduría es rectitud moral
  lexicon: Payne Smith
  rationale: ܬܪܝܨܘܬܐ apunta a lo recto/enderezado, y en español 'rectitud' expresa bien la cualidad moral sin cargar demasiado la palabra con un sentido forense.
- source_word: ܦܘܫܩܗ ܕܚܙܘܐ
  english_pob_choice: the interpretation of this vision
  chosen_spanish: la interpretación de esta visión
  alternatives_spanish:
  - la explicación de esta visión
  lexicon: Payne Smith
  rationale: En contexto apocalíptico, 'interpretación' conserva mejor el sentido técnico de desentrañar una visión simbólica.
- source_word: ܠܐ ܐܬܢܣܝܬ
  english_pob_choice: I have not departed
  chosen_spanish: no me he apartado
  alternatives_spanish:
  - no he sido separado
  - no me he alejado
  lexicon: Payne Smith
  rationale: El verbo permite la idea de separación o alejamiento; 'no me he apartado' es idiomático en español y mantiene la fuerza relacional.
- source_word: YHWH / divine name
  english_pob_choice: Lord, my Lord / you
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: Project default for יהוה
  rationale: Aunque el versículo en el audit trail inglés estaba inestable, el contexto de oración directa y el proyecto exige transparentar el Nombre divino como 'Yahvé' en el texto principal.
theological_decisions:
- issue: Relación entre ley y sabiduría como afirmaciones paralelas de revelación divina
  english_pob_reading: My law is life, and my wisdom is uprightness
  chosen_spanish_reading: Tu ley es vida, y tu sabiduría es rectitud
  alternative_spanish_readings:
  - Tu ley da vida, y tu sabiduría es justicia
  - Tu ley es la vida, y tu sabiduría es rectitud
  rationale: 'Se conserva el paralelismo fuerte y la densidad teológica: la ley no es meramente útil, sino vital; la sabiduría expresa el orden recto de Dios.'
  doctrine_reference: Sabiduría y ley en la piedad judía del Segundo Templo; cf. Deuteronomio 30:15-20, Salmo 19:7-11
- issue: Tratamiento del Nombre divino en la invocación inicial
  english_pob_reading: Lord, my Lord, you continually give light...
  chosen_spanish_reading: Yahvé, mi Dios, tú das luz continuamente...
  alternative_spanish_readings:
  - Señor, mi Señor, tú das luz continuamente...
  - Yahvé, Señor mío, tú das luz continuamente...
  rationale: La tradición manuscrita/edición controlada del pasaje es textual y auditivamente inestable en la introducción; el proyecto pide no ocultar el Nombre divino cuando el contexto se dirige a Dios. Se usa una forma reverente pero transparente.
  doctrine_reference: Transparencia del tetragrámaton en el POB; cf. principio editorial del proyecto
- issue: Interpretación de la cláusula final sobre la continuidad de Baruc en la sabiduría
  english_pob_reading: from my earliest days I have not departed from your wisdom
  chosen_spanish_reading: desde mis primeros días no me he apartado de tu sabiduría
  alternative_spanish_readings:
  - desde mis primeros días no me he alejado de tu sabiduría
  - desde antiguo no me he apartado de tu sabiduría
  rationale: La frase preserva el sentido de continuidad desde la juventud/antigüedad sin exagerar una cronología que el texto no precisa con total seguridad.
  doctrine_reference: Fidelidad del justo a la sabiduría revelada
translation_notes:
  revision_awareness: 'El audit trail inglés mostró una oscilación importante entre dos lecturas: una versión previa con ''I prayed and said'' y una revisión que intentó seguir un Syriac OCR corrupto y terminó alterando sujeto, posesivos y contenido. Para el español se siguió la lectura coherente con la revisión crítica del pasaje, manteniendo el tono de oración y la confesión sapiencial sin copiar mecánicamente la redacción inglesa ni las lecturas erróneas del OCR.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por transparencia del Nombre divino en la línea de oración.
  - '''Ley'' y ''sabiduría'' se mantienen en paralelo teológico; no se sustituyen por vocabulario eclesiástico posterior.'
  - '''Rectitud'' se prefiere a ''justicia'' para evitar sobredeterminación forense.'
  - '''No me he apartado'' conserva el matiz relacional del verbo sin volverlo literalista.'
  - La puntuación y el registro buscan ser bíblicos y públicos, no arcaizantes.
