  to: 'Y oré y dije: «Señor, mi Señor[a], tú das luz continuamente a los que son guiados por el entendimiento. Tu ley es vida, y tu sabiduría es rectitud. Por eso muéstrame la interpretación de esta visión. Porque tú sabes que mi alma ha andado en tu ley, y desde mis primeros días no me he apartado de tu sabiduría».'
  rationale: Se reemplaza 'Yahvé, mi Dios' por 'Señor, mi Señor' para ajustarse mejor a la lectura inglesa restaurada y evitar introducir el nombre divino o 'mi Dios' donde la evidencia de este versículo es incierta. También se mueve la nota al lugar exacto de la inestabilidad textual.
