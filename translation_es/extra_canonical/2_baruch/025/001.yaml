base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_baruch/025/001.yaml
  text: 'Then he answered me and said, “You too shall be spared until that time, until the sign that the Mighty One will perform for the inhabitants of the earth at the end of the days. And this will be the sign: bewilderment will seize the inhabitants of the earth, and they will fall into many afflictions; then again into great anguish. And when, because of the abundance of their distress, they say in their thoughts, ‘The Mighty One no longer remembers the earth,’ and they have given up hope, then the time will awaken.”'
  footnotes:
  - marker: a
    text: Or 'Then I answered and said to him, “I too have been shaken because of the dwelling in which I dwell. But the Mighty One has made me know the judgment of the times, and what has happened again after these things. And he said to me, ‘You are not yet at the end. But when you see part of the signs that have happened before, then you will understand that this is the beginning of the anguish that is to come. And they will fall into many sufferings, and they will be in great torments. And when they say in their thoughts, because of their many distresses, “The Mighty One no longer remembers the earth,” then hope will awaken.’'.
    reason: previous_rendering
