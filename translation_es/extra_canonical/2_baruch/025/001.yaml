translation:
  language: es
  text: 'Entonces él me respondió y me dijo: «Tú también serás preservado hasta aquel tiempo, hasta la señal que el Poderoso realizará para los habitantes de la tierra al fin de los días. Y esta será la señal: el desconcierto[a] se apoderará de los habitantes de la tierra, y caerán en muchas aflicciones; luego otra vez en gran angustia. Y cuando, por la abundancia de su aflicción, digan en sus pensamientos: “El Poderoso ya no se acuerda de la tierra”, y hayan perdido la esperanza, entonces el tiempo despertará».


    [a] También puede entenderse como “estupor”, “confusión” o “terror”, según el matiz de la raíz siríaca.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “estupor”, “confusión” o “terror”, según el matiz de la raíz siríaca.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܡܪܝܡܢܐ
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Todopoderoso
  lexicon: Payne Smith
  rationale: En español, “el Poderoso” conserva el título divino solemne del audit trail inglés sin introducir una formulación más eclesiástica que el siríaco no exige. “Todopoderoso” sería posible, pero añade una expansión que el contexto no demanda.
- source_word: ܬܘܩܢܐ
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - indicio
  - señal establecida
  lexicon: Payne Smith
  rationale: El inglés POB opta por “sign” para la función apocalíptica del término. En español, “señal” es la forma más natural y fiel para un marcador escatológico identificador.
- source_word: ܙܘ̈ܥܐ
  english_pob_choice: bewilderment
  chosen_spanish: desconcierto
  alternatives_spanish:
  - estupor
  - confusión
  - terror
  lexicon: Payne Smith
  rationale: “Desconcierto” conserva el sentido de desestabilización súbita que se apodera de los habitantes, sin reducirlo a miedo simple. Mantiene una tensión semántica equivalente a la decisión inglesa, aunque el español requiere una solución algo más idiomática.
- source_word: ܐܘܠܨܢܐ
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - angustias
  - opresiones
  lexicon: Payne Smith
  rationale: “Aflicciones” reproduce bien el peso concreto del sufrimiento creciente y es plenamente publicable en español bíblico contemporáneo. En el contexto, no conviene sustituirlo por un término más técnico o más eclesial sin ventaja semántica.
- source_word: ܡܬܕܟܪ
  english_pob_choice: remembers
  chosen_spanish: se acuerda de
  alternatives_spanish:
  - recuerda
  - tiene presente
  - se fija en
  lexicon: Payne Smith
  rationale: La queja conserva el idioma bíblico de la memoria divina. En español, “se acuerda de” comunica con claridad la misma idea relacional y personal que el inglés POB preserva con “remembers”.
- source_word: ܥܪ
  english_pob_choice: will awaken
  chosen_spanish: despertará
  alternatives_spanish:
  - se despertará
  - se alzará
  - entrará en acción
  lexicon: Payne Smith
  rationale: El final personifica al tiempo como algo que dormía y luego cobra vigor. “Despertará” mantiene esa imagen apocalíptica con naturalidad en español.
theological_decisions:
- issue: Cómo reproducir la queja sobre la aparente ausencia de memoria divina sin suavizarla
  english_pob_reading: The Mighty One no longer remembers the earth.
  chosen_spanish_reading: El Poderoso ya no se acuerda de la tierra.
  alternative_spanish_readings:
  - Dios ya no se acuerda de la tierra
  - El Poderoso ya no toma en cuenta la tierra
  - El Poderoso ya no visita la tierra
  rationale: La línea expresa desesperación humana en términos de memoria divina; suavizarla debilitaría la tensión del pasaje. “Se acuerda de” conserva el impacto y la resonancia bíblica sin cambiar el sentido hacia ‘cuidar’ o ‘visitar’.
  doctrine_reference: Providencia divina y lenguaje bíblico de la memoria de Dios
translation_notes:
  revision_awareness: 'La revisión reciente del audit trail corrigió una versión previa que había desviado gravemente el sentido. Esta entrega sigue la lectura restaurada: Baruc habla de la señal, el desconcierto, las aflicciones, la gran angustia y el despertar final del tiempo, sin introducir añadidos ajenos al siríaco.'
  spanish_consistency_notes:
  - He mantenido “el Poderoso” de forma uniforme para ܡܪܝܡܢܐ, en coherencia con la decisión inglesa “the Mighty One”.
  - He usado “se acuerda de la tierra” para conservar el lenguaje bíblico de memoria divina sin reemplazarlo por una paráfrasis más libre.
  - He evitado “Cristo”, “Señor” o “SEÑOR” como sustitutos automáticos, porque el pasaje no los exige y el proyecto pide transparencia frente al original siríaco.
  - He traducido la secuencia narrativa de forma continua, sin dividirla en versículos artificiales que no aparecen de manera estable en el testimonio fuente.
