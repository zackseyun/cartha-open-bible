translation:
  language: es
  text: 'Porque viste una gran nube que subió del mar y cubrió esta tierra; oye[a] que es el mundo que el Poderoso hizo cuando se propuso hacer la creación. Y aconteció que, cuando salió la palabra de delante de él, el fundamento del mundo quedó en pie, pequeño y hermoso, y fue establecido como estaba destinado a ser.


    Y las aguas negras que viste primero, que descendieron sobre él desde la nube, esta es la transgresión que el primer Adán cometió al principio. Porque cuando pecó, la muerte fue puesta en movimiento, aunque no era su tiempo, y el duelo fue dado a conocer, y los dolores fueron preparados, y el sufrimiento fue creado, y la labor quedó consumada, y la grandeza comenzó a ser abatida.


    Y el último día, que fue mostrado en la forma y tomó la semejanza, sabe que el tiempo será investigado, y la medida de la humanidad será medida[b], y su fuerza será probada. Por tanto, como Adán, mientras aún vivía, oyó de Dios algo de lo que iba a ser, y entendió la liberación de los muertos que había de ser dada, y lo que le había sido mandado por Dios, lo consideró, y concibió cinco pensamientos. Pues se hizo culpable, y también hizo culpables a los ángeles. Y también en aquel tiempo en que fue creado, se le mostró una visión de la vida amarga y de los elementos con fuego. Así Dios reunió en Edén, a semejanza de los que habían sido creados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'escucha'.
    reason: alternative_reading
  - marker: b
    text: O 'será ungida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܫܡܥ
  english_pob_choice: hear this
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oye esto
  lexicon: Payne Smith
  rationale: El imperativo está explícito en el siriaco; en español, 'oye' conserva la fuerza exhortativa sin añadir más de lo que el texto da.
- source_word: ܩܘܝܡܐ ܕܥܠܡܐ
  english_pob_choice: the foundation of the world
  chosen_spanish: el fundamento del mundo
  alternatives_spanish:
  - la fundación del mundo
  - el principio del mundo
  lexicon: Payne Smith
  rationale: La revisión inglesa y el control siriaco favorecen la idea de base/fundamento cósmico; 'fundamento' mantiene la imagen de algo que se alza y queda establecido.
- source_word: ܚܛܗܐ
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - pecado
  - faltа
  lexicon: Payne Smith
  rationale: Se preserva la fuerza de quebrantamiento o cruce de límite que el auditor inglés distinguió de un mero 'pecado' genérico.
- source_word: ܐܬܬܙܝܥ ܡܘܬܐ
  english_pob_choice: death was stirred up
  chosen_spanish: la muerte fue puesta en movimiento
  alternatives_spanish:
  - la muerte fue despertada
  - la muerte fue levantada
  lexicon: Payne Smith
  rationale: '''Puesta en movimiento'' comunica activación sin suavizar el tono apocalíptico; evita reducirlo a simple personificación.'
- source_word: ܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ
  english_pob_choice: greatness began to be brought low
  chosen_spanish: la grandeza comenzó a ser abatida
  alternatives_spanish:
  - la majestad comenzó a ser humillada
  - la grandeza comenzó a ser rebajada
  lexicon: Payne Smith
  rationale: '''Abatida'' reproduce el movimiento descendente y el valor de humillación/declive que la frase sugiere.'
- source_word: ܝܘܡܐ ܐܚܪܝܐ
  english_pob_choice: the last day
  chosen_spanish: el último día
  alternatives_spanish:
  - el tiempo final
  - el último tiempo
  lexicon: Payne Smith
  rationale: El siriaco dice literalmente 'día'; se evita convertirlo en 'tiempo' para no perder la precisión del texto.
- source_word: ܬܬܡܫܚ
  english_pob_choice: will be measured
  chosen_spanish: será medida
  alternatives_spanish:
  - será anointed
  - será calibrada
  lexicon: Greek/Syriac homonym ܡܫܚ
  rationale: En este contexto judicial y paralelo a 'el tiempo será investigado' y 'su fuerza será probada', el verbo significa medir, no ungir.
- source_word: ܡܚܝܒܢܘܗܝ
  english_pob_choice: he made himself guilty / liable
  chosen_spanish: se hizo culpable a sí mismo
  alternatives_spanish:
  - se hizo responsable
  - se hizo acreedor de culpa
  lexicon: Payne Smith
  rationale: Se mantiene la carga de auto-inculpación/auto-responsabilidad que la revisión inglesa dejó explícita.
- source_word: ܐܣܛܘܟܣܐ
  english_pob_choice: the elements
  chosen_spanish: los elementos
  alternatives_spanish:
  - los principios elementales
  - las fuerzas elementales
  lexicon: Greek loanword / Payne Smith
  rationale: El helenismo apunta con naturalidad a 'elementos'; en español es transparente y conserva el trasfondo cosmológico.
- source_word: ܐܕܢ
  english_pob_choice: Eden
  chosen_spanish: Edén
  alternatives_spanish:
  - el Edén
  lexicon: Biblical toponym
  rationale: El topónimo bíblico se normaliza como 'Edén' en español; la preposición mantiene el sentido locativo del cierre.
theological_decisions:
- issue: Presencia explícita del mandato de escuchar
  english_pob_reading: The text says 'hear this' before identifying the world and the Creator's act.
  chosen_spanish_reading: Conservo el imperativo 'oye' porque el siriaco lo exige.
  alternative_spanish_readings:
  - 'lo cubrió esta tierra: es el mundo'
  - 'escucha: es el mundo'
  rationale: La revisión crítica corrigió una omisión previa; el español debe exhibir el mandato para no borrar la estructura retórica del pasaje.
  doctrine_reference: Retoricidad profética/apocalíptica
- issue: Medida versus unción
  english_pob_reading: '''the measure of humanity will be measured'' reflects the homonym in a judicial-apocalyptic setting.'
  chosen_spanish_reading: '''la medida de la humanidad será medida'' mantiene la metáfora de examen y evaluación.'
  alternative_spanish_readings:
  - será ungida
  - será regulada
  rationale: El contexto inmediato trata de examen del tiempo y prueba de la fuerza; traducir 'ungida' introduciría una lectura ajena al pasaje.
  doctrine_reference: Lexicografía contextual y juicio escatológico
- issue: Culpabilidad de Adán y los ángeles
  english_pob_reading: The passage preserves the strong statement that Adam made himself liable and also made the angels liable.
  chosen_spanish_reading: Mantengo 'se hizo culpable a sí mismo, y también hizo culpables a los ángeles' sin suavizar el alcance.
  alternative_spanish_readings:
  - se perjudicó a sí mismo y a los ángeles
  - fue causa de culpa para sí y para los ángeles
  rationale: La tensión teológica del texto es deliberadamente fuerte; el español no debe domesticarla.
  doctrine_reference: Antropología adámica y responsabilidad cósmica
translation_notes:
  revision_awareness: El texto español sigue la última revisión crítica, pero corrige la omisión del imperativo 'oye', preserva 'el último día' frente a 'el tiempo', mantiene 'será medida' para el homónimo de ܡܫܚ, y conserva el cierre con Edén. También evita la paráfrasis interpretativa donde el siriaco es concreto o retóricamente marcado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca explícitamente el nombre divino; aquí el texto usa 'Dios' y 'el Poderoso'.
  - '''transgresión'' se reserva para ܚܛܗܐ en este contexto adámico específico.'
  - '''elementos'' traduce el préstamo griego ܐܣܛܘܟܣܐ de forma consistente con el aparato inglés.'
  - No se introduce 'Mesías' ni vocabulario cristológico ajeno al pasaje.
  - La puntuación conserva la estructura de tres párrafos del audit trail inglés.
