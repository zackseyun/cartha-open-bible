base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_baruch/057/001.yaml
  text: 'For you saw a great cloud that ascended from the sea and went and covered this earth, hear this: that it is the world that the Mighty One made when he planned to make creation. And it happened that, when the word went out from before him, the foundation of the world stood, small and beautiful, and was established as it was destined to be.


    And the black waters that you saw first, which descended upon it from the cloud—this is the transgression that the first Adam committed at first. For when he sinned, death was stirred up, though it was not its time, and grief was made known, and pains were prepared, and suffering was created, and toil was accomplished, and greatness began to be brought low.


    And the last day, which was shown in the form and took the likeness, know that the time will be inquired into, and the measure of humanity will be measured, and its strength will be tested. Therefore, because Adam, while he was, heard from God something of what was to be, and understood the release of the dead that was to be given, and what had been commanded him by God, he considered it, and he devised five thoughts. For he made himself guilty, and he also made the angels guilty. And also at that time when he was created, there was shown to him a vision of the bitter life and of the elements with fire. Thus God gathered in Eden, in the likeness of those that were created.'
  footnotes:
  - marker: a
    text: Or 'covered this earth. This is the world'.
    reason: previous_rendering
  - marker: b
    text: Or 'the measure of humanity will be anointed'.
    reason: previous_rendering
  - marker: c
    text: Or 'And the last time, which was shown in the form and likeness'.
    reason: previous_rendering
