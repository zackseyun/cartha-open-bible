translation:
  language: es
  text: 'Porque como un aliento[a] surge sin intención y desaparece, así es la naturaleza de los hombres: no van por su propia voluntad, y no saben qué les sucederá al final.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Aliento» refleja la imagen concreta del original; también podría entenderse como «soplo» o «respiración», pero se eligió la forma más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: “breath” / Syriac term for breath, vapor, wind-like exhalation
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - respiración
  - soplo
  - viento
  lexicon: רוּחַ / ܢܦܫܐ semantics in comparative Semitic usage (breath/breathing exhalation sense)
  rationale: “Aliento” comunica con naturalidad el sentido de una exhalación breve e inestable, sin imponer “viento” ni “espíritu”; preserva la imagen física del texto.
- source_word: “nature of men”
  english_pob_choice: nature of men
  chosen_spanish: la naturaleza de los hombres
  alternatives_spanish:
  - la condición de los hombres
  - la naturaleza humana
  lexicon: anthropological noun phrase in comparative wisdom discourse
  rationale: Conservo “naturaleza” porque el inglés POB la fijó y porque el contraste con el aliento se mantiene claro; “de los hombres” refleja el plural genérico del original.
- source_word: “they do not go by their own will”
  english_pob_choice: they do not go by their own will
  chosen_spanish: no van según su propia voluntad
  alternatives_spanish:
  - no proceden por su propia voluntad
  - no caminan por su propia voluntad
  lexicon: volitional agency clause
  rationale: “Van según” reproduce bien la idea de conducta/curso de vida sin volverla demasiado literal ni demasiado interpretativa; “propia voluntad” conserva la fuerza del contraste con la dependencia humana.
- source_word: “what will happen to them in the end”
  english_pob_choice: what will happen to them in the end
  chosen_spanish: qué les sucederá al final
  alternatives_spanish:
  - qué les acontecerá al final
  - qué pasará con ellos al final
  lexicon: future event / eschatological outcome phrasing
  rationale: “Sucedérá” es idiomático y suficientemente neutral para el resultado final; “al final” mantiene la temporalidad escatológica sin añadir más contenido.
theological_decisions:
- issue: Anthropological humility and lack of autonomous control
  english_pob_reading: Human beings do not go by their own will and do not know their end.
  chosen_spanish_reading: Los seres humanos no actúan como autosuficientes ni controlan su destino final.
  alternative_spanish_readings:
  - Los hombres no van según su propia voluntad y no saben su fin.
  - La humanidad no se mueve por su propia voluntad y desconoce su final.
  rationale: La formulación española sigue el sentido antropológico del verso sin suavizar la dependencia humana; evita introducir una doctrina adicional y conserva la tensión sobre la limitación humana.
  doctrine_reference: Antropología bíblica / providencia divina
translation_notes:
  revision_awareness: El inglés POB fue revisado de “they go not” a “they do not go” sin cambio semántico. La presente versión española sigue ese sentido con sintaxis natural, sin añadir explicaciones ausentes en el texto base.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, pero con español contemporáneo natural.
  - No se usó “SEÑOR” ni terminología eclesiástica no presente en el verso.
  - La imagen comparativa del aliento se conservó de modo explícito para no diluir la metáfora.
