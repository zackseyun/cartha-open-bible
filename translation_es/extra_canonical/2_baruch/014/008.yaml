translation:
  language: es
  text: ¿O quién puede conocer tu juicio, o sondear la profundidad de tu camino, o calcular el peso de tu senda, o comprender tu consejo, que no puede comprenderse?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: judgment
  english_pob_choice: your judgment
  chosen_spanish: tu juicio
  alternatives_spanish:
  - tu sentencia
  - tu veredicto
  lexicon: juicio
  rationale: ‘Juicio’ conserva la amplitud judicial y evaluativa del término sin estrecharlo a una sola idea procesal.
- source_word: depth
  english_pob_choice: the depth of your way
  chosen_spanish: la profundidad de tu camino
  alternatives_spanish:
  - el abismo de tu camino
  - la hondura de tu senda
  lexicon: profundidad
  rationale: ‘Profundidad’ expresa bien la imagen de insondabilidad; ‘camino’ mantiene el paralelismo con ‘path/way’ del texto fuente.
- source_word: search out
  english_pob_choice: search out
  chosen_spanish: sondear
  alternatives_spanish:
  - buscar a fondo
  - escudriñar
  lexicon: sondear
  rationale: ‘Sondear’ sugiere explorar hasta el fondo y encaja con la metáfora de profundidad, evitando un calco pesado.
- source_word: path
  english_pob_choice: your path
  chosen_spanish: tu senda
  alternatives_spanish:
  - tu camino
  - tu vereda
  lexicon: senda
  rationale: ‘Senda’ ayuda a diferenciar el segundo paralelo de ‘camino’ y preserva el matiz poético del recorrido divino.
- source_word: calculate the weight
  english_pob_choice: calculate the weight of your path
  chosen_spanish: calcular el peso de tu senda
  alternatives_spanish:
  - medir el peso de tu senda
  - pesar tu senda
  lexicon: calcular / peso
  rationale: La imagen de ‘peso’ debe mantenerse literalmente por su fuerza retórica; ‘calcular’ corresponde al acto de estimar o medir ese peso imposible.
- source_word: counsel
  english_pob_choice: your counsel
  chosen_spanish: tu consejo
  alternatives_spanish:
  - tu designio
  - tu propósito
  lexicon: consejo
  rationale: ‘Consejo’ sigue de cerca la opción POB y mantiene la idea de plan deliberado; ‘designio’ sería más interpretativo.
- source_word: cannot be grasped
  english_pob_choice: which cannot be grasped
  chosen_spanish: que no puede ser abarcado
  alternatives_spanish:
  - que no puede comprenderse
  - que es inescrutable
  lexicon: abarcado
  rationale: ‘Abarcado’ conserva la imagen de algo que no puede ser contenido o alcanzado plenamente, sin perder legibilidad en español.
theological_decisions:
- issue: Retaining the rhetorical piling-up of divine incomparability
  english_pob_reading: Or who can learn your judgment, or search out the depth of your way, or calculate the weight of your path, or comprehend your counsel which cannot be grasped?
  chosen_spanish_reading: ¿O quién puede aprender tu juicio, o sondear la profundidad de tu camino, o calcular el peso de tu senda, o comprender tu consejo, que no puede ser abarcado?
  alternative_spanish_readings:
  - ¿O quién puede conocer tu juicio...?
  - ¿O quién puede comprender tu consejo...?
  rationale: 'La estructura de preguntas acumulativas debe conservarse en español porque es el centro retórico del versículo: subraya la inaccesibilidad del actuar y el consejo divinos.'
  doctrine_reference: Divine incomparability / unknowability
- issue: Preserving the source-mandated clauses omitted in an earlier draft
  english_pob_reading: '...or search out the depth of your way, or calculate the weight of your path...'
  chosen_spanish_reading: '...o sondear la profundidad de tu camino, o calcular el peso de tu senda...'
  alternative_spanish_readings:
  - '...o buscar a fondo la profundidad de tu camino, o medir el peso de tu senda...'
  rationale: La revisión auditada indicó que estas dos cláusulas estaban ausentes en una traducción anterior; deben incluirse para respetar el testimonio fuente completo.
  doctrine_reference: Textual completeness / source fidelity
translation_notes:
  revision_awareness: The earlier English draft was revised because it omitted two Syriac clauses ('search out the depth of your way' and 'calculate the weight of your path'). This Spanish draft restores both clauses and avoids the previous footnote anchoring error by not including any footnotes.
  spanish_consistency_notes:
  - Mantengo el paralelismo de cuatro preguntas retóricas con repetición de 'o' para reflejar la acumulación del original.
  - Uso 'camino' y 'senda' como variación poética controlada para conservar el doble paralelismo sin forzar una equivalencia rígida.
  - No introduzco una nota al pie porque el texto español no requiere una alternativa textual explícita en este versículo y así se evita un anclaje ausente.
