    issue: La nota [a] es inútil y engañosa
    rationale: 'Dice «O: “retribución”», pero el texto principal ya usa «retribución». No preserva una variante significativa ni refleja la nota inglesa, que proponía una formulación alternativa de toda la cláusula.'
  - severity: low
    issue: «que fue dicha por ti» es demasiado calcado
    rationale: Es fiel, pero en español suena forzado. Una formulación como «que tú anunciaste» mantiene el valor de ܕܐܡܝܪ ܡܢܟ sin dureza innecesaria.
  revised_spanish_text: 'Entonces respondí y dije: «Mira, me has mostrado el curso de los tiempos, y lo que ha de acontecer después de estas cosas, y me has dicho que la retribución que tú anunciaste vendrá sobre las naciones».[a]'
  revised_footnotes:
