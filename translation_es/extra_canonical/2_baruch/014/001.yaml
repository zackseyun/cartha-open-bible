translation:
  language: es
  text: 'Entonces respondí y dije: «Mira, me has mostrado el curso de los tiempos, y lo que ha de acontecer después de estas cosas, y me has dicho que la retribución que tú anunciaste vendrá sobre las naciones».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y me has hablado de la retribución que ha de venir».'
    reason: Preserva la alternativa de formulación documentada en la auditoría inglesa sin duplicar inútilmente una palabra ya presente.
lexical_decisions:
- source_word: ܐܘܪܚܐ
  english_pob_choice: course
  chosen_spanish: curso
  alternatives_spanish:
  - camino
  - orden
  lexicon: Payne Smith
  rationale: En este contexto apocalíptico no se trata de un camino físico, sino del desenvolvimiento ordenado de los tiempos; «curso» conserva esa idea temporal sin volverla demasiado abstracta.
- source_word: ܦܘܪܥܢܐ
  english_pob_choice: retribution
  chosen_spanish: retribución
  alternatives_spanish:
  - castigo
  - recompensa
  - represalia
  lexicon: Payne Smith
  rationale: El texto mantiene una lógica judicial de retribución divina; «retribución» conserva esa fuerza forense mejor que una palabra más general o más suavizada.
- source_word: ܕܐܡܝܪ ܡܢܟ
  english_pob_choice: which was spoken of by you
  chosen_spanish: que fue dicha por ti
  alternatives_spanish:
  - de la que habías hablado
  - que fue anunciada por ti
  lexicon: Payne Smith
  rationale: La frase debe conservar que la retribución no es una mera inferencia, sino algo previamente dicho por Dios; «fue dicha por ti» reproduce esa referencia sin añadir interpretación.
- source_word: ܥܠ ܥܡܡ̈ܐ
  english_pob_choice: upon the nations
  chosen_spanish: sobre las naciones
  alternatives_spanish:
  - contra las naciones
  - a las naciones
  lexicon: Payne Smith
  rationale: «Sobre las naciones» refleja el movimiento de juicio dirigido hacia ellas; mantiene la imagen de caída o visita judicial que sugiere el original.
theological_decisions:
- issue: Si la frase final debe quedar como una afirmación moral general o como juicio dirigido a las naciones
  english_pob_reading: The retribution which was spoken of by you will come upon the nations.
  chosen_spanish_reading: La retribución, dicha por Dios, vendrá sobre las naciones.
  alternative_spanish_readings:
  - la retribución que se avecina
  - el castigo que vendrá
  rationale: La línea no es solo una observación abstracta sobre consecuencias, sino una afirmación de juicio divino específico sobre las naciones; conviene conservar ese enfoque.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Si «curso de los tiempos» puede reducirse a una simple secuencia temporal
  english_pob_reading: you have shown me the course of the times
  chosen_spanish_reading: me has mostrado el curso de los tiempos
  alternative_spanish_readings:
  - me has mostrado el orden de los tiempos
  - me has mostrado el camino de los tiempos
  rationale: La fórmula apunta al desarrollo providencial de la historia, no solo a cronología; «curso» mantiene esa amplitud sin perder legibilidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: 'Se incorporó la cláusula faltante del control auditado: la retribución fue «dicha por ti» y vendrá «sobre las naciones», evitando la omisión señalada en la revisión anterior.'
  spanish_consistency_notes:
  - Se usa «retribución» de manera consistente con el audit trail inglés y con el tono judicial del pasaje.
  - «Curso de los tiempos» conserva el matiz histórico-apocalíptico sin caer en un calco opaco.
  - La puntuación en español sigue el estilo editorial moderno con comillas angulares adaptadas al contenido citado.
