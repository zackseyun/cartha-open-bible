translation:
  language: es
  text: ¿Y para quiénes se buscaron las buenas obras, y para quiénes se dieron los profetas?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: good works
  english_pob_choice: good works
  chosen_spanish: las buenas obras
  alternatives_spanish:
  - el bien
  - la labor del bien
  - las obras buenas
  lexicon: good works
  rationale: La expresión inglesa ya interpreta el giro siríaco de forma natural. En español, “las buenas obras” conserva el sentido de obras de rectitud o bienhacer sin introducir una paráfrasis excesiva.
- source_word: were sought
  english_pob_choice: were sought
  chosen_spanish: se buscaron
  alternatives_spanish:
  - fueron buscadas
  - se procuraron
  - se pidieron
  lexicon: seek
  rationale: Para mantener la voz pasiva/resultativa del original y del inglés auditado, “se buscaron” transmite bien la idea de que fueron objeto de búsqueda o procuración.
- source_word: the prophets
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas de Yahvé
  - los mensajeros
  lexicon: prophets
  rationale: Se conserva el término profético estándar sin ampliarlo, porque el texto no exige una glosa adicional en la línea principal.
- source_word: were given
  english_pob_choice: were given
  chosen_spanish: fueron dados
  alternatives_spanish:
  - fueron concedidos
  - fueron entregados
  - fueron enviados
  lexicon: give
  rationale: “Dados” reproduce con fidelidad la pasiva del inglés auditado y deja abierta la posible idea de concesión o envío sin forzarla en el texto principal.
theological_decisions:
- issue: Relación entre “buenas obras” y el don de los profetas como bienes divinamente provistos
  english_pob_reading: and for whom were good works sought, and for whom were the prophets given?
  chosen_spanish_reading: ¿Y para quiénes se buscaron las buenas obras, y para quiénes fueron dados los profetas?
  alternative_spanish_readings:
  - ¿Y para quiénes se procuraron las buenas obras, y para quiénes fueron concedidos los profetas?
  - ¿Y para quiénes se buscó el bien, y para quiénes fueron dados los profetas?
  rationale: El versículo presenta dos dones o provisiones ligadas a determinados destinatarios. La versión española conserva esa correlación sin convertirla en una explicación doctrinal adicional ni suavizar la tensión implícita del texto.
  doctrine_reference: Providencia y elección en literatura apocalíptica judía
- issue: Ambigüedad del pasivo en ‘were sought’ aplicado a ‘good works’
  english_pob_reading: good works were sought
  chosen_spanish_reading: se buscaron las buenas obras
  alternative_spanish_readings:
  - fueron buscadas las buenas obras
  - las buenas obras fueron buscadas
  rationale: El pasivo se expresa en español con una construcción impersonal natural, evitando el giro rígido que sonaría menos idiomático y sin perder el matiz de búsqueda o procuración.
  doctrine_reference: Sintaxis pasiva e impersonal en español bíblico
translation_notes:
  revision_awareness: La revisión inglesa más reciente reordenó la pregunta para mayor naturalidad y mantuvo 'good works were sought' junto con 'the prophets were given'. La traducción española sigue ese estado final del inglés auditado, pero se apoya directamente en el valor siríaco subyacente para 'buscar/procurar' y 'dar/conceder', sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa ‘buenas obras’ de forma consistente con la elección inglesa revisada y con el registro bíblico actual del español.
  - Se mantiene la interrogación doble para reflejar la estructura del versículo.
  - No se introducen términos eclesiásticos tradicionales que el texto no requiera.
