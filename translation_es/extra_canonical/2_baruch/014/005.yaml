lexical_decisions:
- source_word: vanity of the dead
  english_pob_choice: the vanity of the dead
  chosen_spanish: la vanidad de los muertos
  alternatives_spanish:
  - la vanidad de los difuntos
  - la vaciedad de los muertos
  - la vanidad de la muerte
  lexicon: vanidad; muertos
  rationale: El texto siríaco revisado exige conservar el sustantivo de futility/emptiness (sriquwtha), no omitirlo. En español, 'vanidad' comunica bien la idea de vaciedad o futilidad, y 'muertos' mantiene el genitivo asociado al grupo referido por el original.
- source_word: desired you
  english_pob_choice: desired you
  chosen_spanish: te desearon
  alternatives_spanish:
  - te anhelaron
  - te buscaron con deseo
  lexicon: desear
  rationale: '''Desear'' reproduce la orientación afectiva del verbo sin añadir una interpretación más fuerte como ''anhelar'' si no es necesaria. El pronombre directo ''te'' mantiene la relación personal del original.'
- source_word: small and passing
  english_pob_choice: what is small and passing
  chosen_spanish: lo que es pequeño y pasajero
  alternatives_spanish:
  - lo que es breve y pasajero
  - las cosas pequeñas y pasajeras
  - lo insignificante y transitorio
  lexicon: pequeño; pasajero
  rationale: '''Pequeño y pasajero'' conserva la doble cualidad de insignificancia/menor importancia y temporalidad. ''Lo que es'' ayuda a representar el valor sustantivado del segmento sin forzar una paráfrasis.'
theological_decisions:
- issue: La lectura correcta incluye 'vanidad de los muertos' y no 'buscar a los muertos'.
  english_pob_reading: The English audit revision corrects the earlier omission of 'vanity', noting the Syriac reading 'sriquwtha d-mithe'.
  chosen_spanish_reading: la vanidad de los muertos
  alternative_spanish_readings:
  - buscar a los muertos
  - la vaciedad de los muertos
  rationale: Se sigue la revisión auditada que corrige la omisión. Aunque 'buscar a los muertos' sería una lectura posible si faltara el sustantivo, el paquete de revisión indica que eso altera el sentido; por eso el español conserva la noción de vaciedad/futilidad.
  doctrine_reference: Fidelity to source lexical content; no doctrinal alteration.
translation_notes:
  revision_awareness: 'La revisión auditada corrigió una omisión importante: el siríaco no dice simplemente ''buscar a los muertos'', sino ''la vanidad de los muertos''. La redacción española sigue esa corrección y evita la lectura descartada por el control textual.'
  spanish_consistency_notes:
  - Se mantiene el tono bíblico sobrio y publicable, sin calcar el inglés más allá de lo necesario.
  - '''Yahvé'' no aparece porque este versículo no contiene el tetragrama ni un equivalente directo en el material provisto.'
  - La nota al pie está anclada exactamente en 'muertos[a]' para cumplir la validación y ofrecer una alternativa lexical breve.
