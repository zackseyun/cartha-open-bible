translation:
  language: es
  text: Pero los justos pueden esperar con razón el fin, y parten de esta morada sin temor, porque tienen contigo una reserva de obras reservadas en tesorerías.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: righteous
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los piadosos
  lexicon: δικαιοι / צדיקים (conceptual equivalent in source context)
  rationale: «Justos» conserva la fuerza moral y judicial del contraste con los impíos, y es el equivalente más natural en español para el grupo sustantivado del original y del inglés POB.
- source_word: hope for the end
  english_pob_choice: may rightly hope for the end
  chosen_spanish: pueden esperar con razón el fin
  alternatives_spanish:
  - pueden aguardar justamente el fin
  - pueden tener esperanza en el fin
  lexicon: ἐλπίζειν + τέλος
  rationale: «Esperar con razón» reproduce la legitimidad de la esperanza y evita convertir el pasaje en una simple expectativa temporal. «El fin» mantiene la referencia escatológica sin añadir interpretación.
- source_word: without fear
  english_pob_choice: without fear
  chosen_spanish: sin temor
  alternatives_spanish:
  - sin miedo
  - sin pavor
  lexicon: ἀφόβως
  rationale: «Sin temor» es sobrio, bíblico y natural en español, y conserva el matiz de ausencia de miedo ante la muerte o la partida.
- source_word: store of works kept in treasuries
  english_pob_choice: a store of works kept in treasuries
  chosen_spanish: un depósito de obras guardadas en tesoros
  alternatives_spanish:
  - un tesoro de obras guardadas en tesoros
  - un almacén de obras guardadas en tesoros
  lexicon: θησαυροί / ἔργα
  rationale: «Depósito» refleja la idea de algo acumulado y reservado, mientras que «guardadas en tesoros» conserva la imagen concreta de almacenamiento. Se evita suavizar «works» como algo meramente abstracto; «obras» mantiene el valor retributivo del texto.
theological_decisions:
- issue: Relación entre esperanza de los justos y su salida de esta vida
  english_pob_reading: the righteous may rightly hope for the end, and they depart from this dwelling without fear
  chosen_spanish_reading: los justos pueden esperar con razón el fin, y salen de esta morada sin temor
  alternative_spanish_readings:
  - los justos pueden esperar justamente el fin, y parten de esta morada sin temor
  - los justos tienen una esperanza legítima del fin, y salen de esta morada sin temor
  rationale: El versículo presenta una muerte confiada para los justos, no una negación del juicio. «Salen de esta morada» conserva el lenguaje de la vida presente como residencia temporal sin introducir una interpretación doctrinal ajena al texto.
  doctrine_reference: Escatología y antropología de la muerte en literatura judía apocalíptica
- issue: Naturaleza del 'store of works' reservado con Dios
  english_pob_reading: they have with you a store of works kept in treasuries
  chosen_spanish_reading: tienen contigo un depósito de obras guardadas en tesoros
  alternative_spanish_readings:
  - tienen contigo un tesoro de obras guardadas en tesoros
  - tienen contigo obras guardadas en tesoros
  rationale: Se mantiene la idea de recompensas/obras reservadas delante de Dios sin eliminar la tensión entre mérito y gracia que el texto apocalíptico sugiere. «Contigo» preserva la relación directa con Dios como custodio.
  doctrine_reference: Retribución divina y almacenamiento celestial de obras en apocalíptica judía
translation_notes:
  revision_awareness: La traducción sigue el acuerdo de alta coincidencia del control textual y no introduce cambios respecto del inglés POB, pero adapta «may rightly hope» a un español idiomático que conserve el matiz de legitimidad. No se detectaron variantes textuales que exigieran nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino en la forma disponible del texto control.
  - «Los justos» se usa de manera sustantivada para conservar el contraste colectivo del original.
  - «Morada» conserva la metáfora del lugar de estancia terrenal sin recargarla con glosas interpretativas.
  - No se añadió puntuación explicativa ni notas al pie porque el inglés POB no preservó alternativas ni tensiones textuales explícitas en este versículo.
