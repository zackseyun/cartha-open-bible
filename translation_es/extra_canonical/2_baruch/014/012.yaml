review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del siríaco según la pista inglesa: contrasta a los justos con la partida confiada de esta vida y la reserva de sus obras ante Dios. Sin embargo, «salen de esta morada» suena demasiado físico para el contexto de muerte/partida, y «guardadas en tesoros» es menos natural en español que una formulación con «tesorerías» o «reservadas».'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor de naturalidad y precisión idiomática. «Parten de esta morada» encaja mejor con el contexto funerario/escatológico que «salen». También conviene evitar la repetición algo extraña de «depósito ... en tesoros» con una imagen más idiomática.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Los justos», «sin temor» y «obras» están bien. La revisión propuesta mantiene la imaginería de almacenamiento celestial sin introducir paráfrasis doctrinal.
  issues:
  - severity: medium
    issue: «salen de esta morada» resulta demasiado literal y físicamente espacial
    rationale: En este contexto, el inglés «they depart from this dwelling» describe la partida de la vida presente. En español bíblico natural, «parten de esta morada» comunica mejor la muerte o salida de esta vida sin sonar prosaico.
  - severity: medium
    issue: «guardadas en tesoros» es poco idiomático
    rationale: La combinación suena forzada en español porque «tesoros» nombra el contenido valioso más que el lugar de resguardo. «Reservadas en tesorerías» preserva mejor la metáfora de depósitos celestiales/almacenamiento.
  revised_spanish_text: Pero los justos pueden esperar con razón el fin, y parten de esta morada sin temor, porque tienen contigo una reserva de obras reservadas en tesorerías.
  revision_rationale: 'Se hicieron dos ajustes menores para fidelidad y naturalidad: «parten» en lugar de «salen» para reflejar mejor la partida de esta vida, y «reserva ... en tesorerías» para expresar de forma más idiomática la imagen de obras custodiadas por Dios.'
