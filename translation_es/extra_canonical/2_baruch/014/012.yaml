- from: Pero los justos pueden esperar con razón el fin, y salen de esta morada sin temor, porque tienen contigo un depósito de obras guardadas en tesoros.
  to: Pero los justos pueden esperar con razón el fin, y parten de esta morada sin temor, porque tienen contigo una reserva de obras reservadas en tesorerías.
