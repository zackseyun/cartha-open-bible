translation:
  language: es
  text: Por eso salen de este mundo sin miedo, y con confianza y alegría esperan recibir el mundo que tú les prometiste…
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: without fear
  english_pob_choice: without fear
  chosen_spanish: sin miedo
  alternatives_spanish:
  - sin temor
  - sin pavor
  lexicon: fear
  rationale: «Sin miedo» comunica de forma natural la ausencia de temor y conserva la fuerza simple del original sin cargarlo de registro arcaico.
- source_word: with trust and gladness
  english_pob_choice: with trust and gladness
  chosen_spanish: con confianza y alegría
  alternatives_spanish:
  - con fe y alegría
  - con confianza y gozo
  lexicon: trust / gladness
  rationale: El inglés auditado usa dos sustantivos coordinados; en español, «confianza» mantiene el valor de confianza segura y «alegría» expresa bien gladness sin forzar un calco. «Gozo» sería posible, pero «alegría» es más directo y legible aquí.
- source_word: they wait to receive
  english_pob_choice: they wait to receive
  chosen_spanish: esperan recibir
  alternatives_spanish:
  - aguardan recibir
  - esperan para recibir
  lexicon: wait / receive
  rationale: «Esperan recibir» conserva la espera activa y el infinitivo de propósito/resultante de manera natural en español.
- source_word: the world
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - este mundo
  - el siglo
  lexicon: world
  rationale: El texto distingue entre «este mundo» que dejan y «el mundo» prometido; se mantiene esa oposición sin introducir un término técnico no atestiguado por el contexto inmediato.
- source_word: you promised them
  english_pob_choice: you promised them
  chosen_spanish: tú les prometiste
  alternatives_spanish:
  - les prometiste
  - que les prometiste
  lexicon: promise
  rationale: Se conserva la referencia directa a Dios en segunda persona, coherente con el discurso del pasaje y con el valor relacional de la promesa.
theological_decisions:
- issue: Destinación del contraste entre “este mundo” y “el mundo prometido”
  english_pob_reading: they leave this world ... receive the world that you promised them
  chosen_spanish_reading: salen de este mundo ... esperan recibir el mundo que tú les prometiste
  alternative_spanish_readings:
  - dejan este siglo ... reciben el siglo prometido
  - abandonan este mundo ... esperan heredar el mundo prometido
  rationale: No se introduce «heredar» porque el texto auditado dice «receive»; tampoco se sustituye por «siglo» sin necesidad, ya que el par mundial/escatológico se entiende bien en español con «este mundo» y «el mundo».
  doctrine_reference: Esperanza escatológica; recepción de la promesa divina
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditado, que aclaró la coordinación como «with trust and gladness». En español se resolvió de manera equivalente con «con confianza y alegría», evitando la ambigüedad de un adverbio mal interpretado.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
  - No se añadió nota al pie porque no hay ambigüedad textual que requiera alternativa marcada en el verso español.
  - 'Se preservó la secuencia semántica del original: salida sin miedo, espera confiada y recepción de la promesa.'
