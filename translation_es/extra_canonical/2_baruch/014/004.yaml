translation:
  language: es
  text: 'Pero hablaré delante de ti: ¿Qué más ganaron los que te conocieron y no anduvieron en vanidad como el resto de las naciones?'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: But I will speak before you
  english_pob_choice: But I will speak before you
  chosen_spanish: Pero hablaré delante de ti
  alternatives_spanish:
  - Mas hablaré delante de ti
  - Pero hablaré ante ti
  lexicon: שָׁכֵם / ἐναντίον idiomatic speech
  rationale: Conserva la idea de hablar en presencia de Dios con un giro natural en español; "delante de ti" mantiene la solemnidad sin sonar forzado.
- source_word: What more have those who knew you ... gained?
  english_pob_choice: What more have those who knew you ... gained?
  chosen_spanish: ¿Qué más ganaron los que te conocieron ...?
  alternatives_spanish:
  - ¿Qué más obtuvieron los que te conocieron ...?
  - ¿Qué ventaja tuvieron los que te conocieron ...?
  lexicon: gain / profit wording
  rationale: '"Ganaron" reproduce bien la pregunta por provecho o ventaja sin añadir interpretaciones; mantiene la fuerza retórica del interrogante.'
- source_word: did not walk in vanity
  english_pob_choice: did not walk in vanity
  chosen_spanish: no anduvieron en vanidad
  alternatives_spanish:
  - no caminaron en vanidad
  - no vivieron en vanidad
  lexicon: הלך + שָׁוְא / vanity as emptiness-idolatry
  rationale: '"Anduvieron" conserva el hebraísmo-semítico de conducta continua; "vanidad" refleja la futilidad o vacío moral del término sin domesticarlo.'
- source_word: like the rest of the nations
  english_pob_choice: like the rest of the nations
  chosen_spanish: como el resto de las naciones
  alternatives_spanish:
  - como los demás de las naciones
  - como el resto
  lexicon: comparative of nations
  rationale: Se retiene explícitamente "de las naciones" porque el audit trail muestra que esa precisión fue restaurada por revisión y forma parte del contraste entre los justos y los gentiles.
theological_decisions:
- issue: Contraste entre quienes conocen a Dios y las naciones
  english_pob_reading: those who knew you ... like the rest of the nations
  chosen_spanish_reading: los que te conocieron ... como el resto de las naciones
  alternative_spanish_readings:
  - los que te conocieron ... como los demás
  - los que te conocieron ... como el resto
  rationale: La versión española conserva el contraste explícito entre el pueblo que conoce a Dios y las naciones; omitirlo debilitaría la tensión teológica documentada en la revisión.
  doctrine_reference: distinción pactual / contraste entre Israel y las naciones en la literatura judía del Segundo Templo
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés: se preserva el orden interrogativo natural, el cierre con signo de interrogación y la precisión de ''de las naciones'' en el contraste final. No se adopta la lectura abreviada ''como el resto'' porque el expediente de revisión señala que esa formulación perdía un matiz textual importante.'
  spanish_consistency_notes:
  - Se mantiene 'vanidad' como equivalente de vacío/futilidad moral, no como simple ostentación.
  - Se usa 'delante de ti' para la fórmula reverencial de habla ante Dios.
  - Se conserva el plural 'naciones' para reflejar la oposición comunitaria presente en el texto y en el audit trail.
