translation:
  language: es
  text: ¿O quién entre los mortales puede encontrar[a] el comienzo y el fin de tu sabiduría?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "puede rastrear".
    reason: previous_rendering
lexical_decisions:
- source_word: can find
  english_pob_choice: can find
  chosen_spanish: puede encontrar
  alternatives_spanish:
  - puede descubrir
  - puede rastrear
  lexicon: find
  rationale: El aval inglés revisó 'can trace' a 'can find' por ajuste al sentido léxico siríaco; en español, 'encontrar' comunica adecuadamente 'descubrir/ubicar' el alcance imposible de la sabiduría divina sin añadir una imagen no presente en el texto.
- source_word: mortals
  english_pob_choice: mortals
  chosen_spanish: los mortales
  alternatives_spanish:
  - los hombres
  - los seres humanos
  lexicon: mortals
  rationale: '''Mortales'' conserva el contraste antropológico del original y mantiene el tono poético de la pregunta retórica; ''seres humanos'' sería más explicativo, pero menos terso.'
- source_word: wisdom
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - entendimiento
  lexicon: wisdom
  rationale: '''Sabiduría'' es el equivalente directo y natural en español para el atributo divino descrito en el verso, sin debilitar su densidad teológica.'
theological_decisions:
- issue: Inaccesibilidad de la sabiduría divina al conocimiento humano
  english_pob_reading: Or who among mortals can find the beginning and the end of your wisdom?
  chosen_spanish_reading: ¿O quién entre los mortales puede encontrar el comienzo y el fin de tu sabiduría?
  alternative_spanish_readings:
  - ¿O quién entre los mortales puede descubrir el comienzo y el fin de tu sabiduría?
  - ¿O quién entre los mortales puede rastrear el comienzo y el fin de tu sabiduría?
  rationale: 'La formulación preserva la pregunta retórica y la imposibilidad implícita: la sabiduría de Dios no es abarcable desde la condición humana. ''Encontrar'' mantiene la lectura revisada del inglés y no introduce una interpretación doctrinal nueva.'
  doctrine_reference: Job 11:7–9; Romanos 11:33
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que cambió 'can trace' por 'can find' por mayor cercanía al verbo siríaco de 'hallar/encontrar'. La versión española mantiene esa decisión y evita volver a una imagen más interpretativa.
  spanish_consistency_notes:
  - Se conserva el tono interrogativo y poético de la POB.
  - No se emplea 'SEÑOR' ni otras sustituciones no requeridas, porque el verso habla de 'tu sabiduría' y no de un término divino nominal.
  - '''Mortales'' y ''sabiduría'' mantienen un registro bíblico claro y contemporáneo en español.'
