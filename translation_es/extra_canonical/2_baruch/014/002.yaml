    issue: 'Cláusula final poco natural: «a quienes puedan dirigirse estas palabras»'
    rationale: Aunque inteligible, esta formulación suena forzada en español bíblico natural y puede sugerir una construcción reflexiva extraña. «A quienes se les puedan decir estas palabras» preserva mejor la pasiva/impersonal y la noción de destinatarios.
  - severity: low
    issue: Uso de «sólo» con tilde
    rationale: La RAE moderna prefiere «solo» sin tilde salvo ambigüedad. No afecta la fidelidad, pero la actualización estilística mejora la consistencia.
