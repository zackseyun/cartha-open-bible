translation:
  language: es
  text: Y ahora sé que muchos han pecado y han vivido, y solo unos pocos quedarán en aquellos tiempos, a quienes se les puedan decir estas palabras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: And now I know
  english_pob_choice: And now I know
  chosen_spanish: Y ahora sé
  alternatives_spanish:
  - Y ahora conozco
  - Y ahora entiendo
  lexicon: ידע / know
  rationale: El hebreo/siríaco expresa una afirmación de conocimiento directa. «Sé» conserva la fuerza simple y declarativa del original y sigue la corrección del POB inglés frente a la lectura errónea anterior.
- source_word: many have sinned and lived
  english_pob_choice: many have sinned and lived
  chosen_spanish: muchos han pecado y han vivido
  alternatives_spanish:
  - muchos que han pecado han vivido
  - muchos pecaron y vivieron
  lexicon: חטא / sin; חי / live
  rationale: La coordinación verbal se mantiene sin añadir inferencias. «Han vivido» conserva el hecho de que han continuado con vida, no sólo que vivieron en el pasado, y refleja el paralelismo del inglés revisado.
- source_word: only a few
  english_pob_choice: only a few
  chosen_spanish: sólo unos pocos
  alternatives_spanish:
  - sólo algunos
  - unos pocos
  lexicon: מעט / few
  rationale: «Sólo unos pocos» reproduce la restricción cuantitativa de manera natural en español y conserva el contraste con «muchos».
- source_word: will remain in those times
  english_pob_choice: will remain in those times
  chosen_spanish: quedarán en aquellos tiempos
  alternatives_spanish:
  - permanecerán en aquellos tiempos
  - subsistirán en aquellos tiempos
  lexicon: remaining/remain
  rationale: «Quedarán» es idiomático y expresa supervivencia o permanencia en el tiempo futuro sin exagerar el matiz. «En aquellos tiempos» conserva la deixis temporal del texto.
- source_word: to whom these words may be spoken
  english_pob_choice: to whom these words may be spoken
  chosen_spanish: a quienes puedan dirigirse estas palabras
  alternatives_spanish:
  - a quienes puedan hablarse estas palabras
  - a quienes se les puedan decir estas palabras
  lexicon: speak/utter; passive construction
  rationale: La construcción impersonal/pasiva se vierte con naturalidad en español mediante «puedan dirigirse estas palabras». Mantiene la idea de destinatarios aptos para recibir la palabra sin forzar una pasiva poco natural.
theological_decisions:
- issue: Preservation of the contrast between many survivors of sin and the small remnant who will receive the message
  english_pob_reading: many have sinned and lived, and only a few will remain in those times to whom these words may be spoken
  chosen_spanish_reading: muchos han pecado y han vivido, y sólo unos pocos quedarán en aquellos tiempos a quienes puedan dirigirse estas palabras
  alternative_spanish_readings:
  - muchos han pecado y han sobrevivido, y sólo unos pocos quedarán...
  - muchos han pecado y siguen vivos, y sólo unos pocos quedarán...
  rationale: El pasaje no sólo enumera cantidades; establece una tensión apocalíptica entre la multitud que ha pecado pero continúa con vida y el pequeño resto que quedará para oír estas palabras. «Han vivido» conserva la neutralidad del inglés POB y evita intensificar innecesariamente hacia «sobrevivido» o «siguen vivos».
  doctrine_reference: Tema bíblico del resto/remanente y juicio escatológico; sin implicar una doctrina sistemática específica más allá del sentido del pasaje.
translation_notes:
  revision_awareness: La revisión más reciente corrigió una lectura anterior errónea («Yet I said in my thoughts») a «And now I know», y una puntuación defectuosa que afectaba la cláusula «many». La versión española sigue esa lectura revisada y traduce la estructura como declaración directa e indirecta normal, sin conservar la confusión de la versión anterior.
  spanish_consistency_notes:
  - Se usa «Yahvé» sólo cuando aparezca el nombre divino; este versículo no contiene el Tetragrámaton.
  - Se conserva un registro bíblico sobrio y moderno, evitando arcaísmos como «mas» o «quedarán en esos tiempos» si resultan menos naturales.
  - «Sólo» se escribe con tilde según el uso tradicional; si se aplica la ortografía académica actual, podría escribirse «solo», pero aquí se mantiene para desambiguación de lectura en texto bíblico.
