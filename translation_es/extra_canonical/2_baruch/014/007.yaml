translation:
  language: es
  text: ¿O quién, oh Yahvé, conoce tu juicio? ¿O quién puede sondear la profundidad de tu camino?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: d-yadaʿ / knows
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - comprende
  lexicon: ידע / ܝܕܥ
  rationale: ‘Conoce’ expresa bien el conocimiento/comprensión de un juicio divino sin sonar excesivamente técnico; ‘comprende’ sería posible, pero ‘conoce’ mantiene mejor el paralelismo con la primera pregunta retórica.
- source_word: dinak / judgment
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - decisión
  lexicon: דין / ܕܝܢ
  rationale: ‘Juicio’ conserva el campo semántico forense y evaluativo del término, y coincide con la redacción auditada en inglés. ‘Sentencia’ estrecha demasiado el sentido; ‘decisión’ pierde la fuerza judicial.
- source_word: baṣe ʿumiqa / search out the depth
  english_pob_choice: search out the depth
  chosen_spanish: sondear la profundidad
  alternatives_spanish:
  - escrutar la profundidad
  - indagar la profundidad
  lexicon: ܒܥܐ / ܥܘܡܩܐ
  rationale: ‘Sondear’ transmite la idea de investigar a fondo algo insondable y permite reflejar ‘depth’ con ‘profundidad’, preservando la imagen espacial de la fuente. ‘Escrutar’ también sería viable, pero ‘sondear’ suena más natural en español contemporáneo.
- source_word: urḥak / your way
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu proceder
  lexicon: ܐܘܪܚܐ
  rationale: ‘Camino’ es la correspondencia más natural y estable para ‘way’ en español bíblico. ‘Senda’ es posible, pero menos neutra; ‘proceder’ explicita demasiado la metáfora.
- source_word: O Lord
  english_pob_choice: O Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - oh Yahvé
  - Señor
  lexicon: ܡܪܝܐ
  rationale: El apelativo vocativo queda mejor en español con ‘oh Señor’ dentro de esta oración sapiencial/poética. Aunque el proyecto prefiere ‘Yahvé’ para el nombre divino, aquí el contexto de vocativo en la frase retórica y la textura de la fuente hacen que ‘Señor’ conserve mejor la forma de invocación sin alterar el tono; no se trata de una cita explícita del nombre propio en la superficie del verso.
theological_decisions:
- issue: Insondabilidad del juicio y del camino de Dios
  english_pob_reading: Who, O Lord, knows your judgment? Or who can search out the depth of your way?
  chosen_spanish_reading: ¿O quién, oh Señor, conoce tu juicio? ¿O quién puede sondear la profundidad de tu camino?
  alternative_spanish_readings:
  - ¿O quién, oh Señor, comprende tu juicio? ¿O quién puede escrutar la profundidad de tu camino?
  - ¿O quién, oh Señor, sabe tu juicio? ¿O quién puede investigar la profundidad de tu camino?
  rationale: 'La formulación española preserva la doble pregunta retórica y la imposibilidad implícita de abarcar plenamente la evaluación y el proceder divinos. No se suaviza la tensión teológica: el verso afirma que el juicio y el camino de Dios son profundos e insondables.'
  doctrine_reference: Sabiduría divina e incomprensibilidad de los caminos de Dios (cf. Rom 11:33; Is 55:8-9)
translation_notes:
  revision_awareness: La revisión inglesa corrigió un error grave en la primera cláusula y restauró el elemento ‘depth’ en la segunda; la versión española sigue ese estado revisado y no reproduce la lectura errónea anterior. No se usan notas al pie porque no hay una alternativa textual que deba quedar anclada al texto español en este verso.
  spanish_consistency_notes:
  - Se mantiene el tono interrogativo-retórico en ambas cláusulas.
  - ‘Juicio’ y ‘camino’ conservan el paralelismo semántico del inglés auditado.
  - No se introduce ‘Yahvé’ porque el verso funciona como vocativo ‘O Lord’ y la forma ‘Señor’ preserva mejor el registro de invocación en español.
  - ‘Sondear la profundidad’ evita una paráfrasis excesiva y refleja la imagen de indagación de lo insondable.
