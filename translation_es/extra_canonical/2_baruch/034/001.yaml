  yaml_path: translation/extra_canonical/2_baruch/034/001.yaml
  text: Then I lifted up my eyes and wept, and I said at that time, “Far be it from me that I should be silent toward you or forget you. But only as far as the house of the tombs of my fathers, in affliction and in the distress of lamentation cry aloud, so that I may not be forgotten before you and afterward. And these things I have declared to you for your remembrance.”
  footnotes:
  - marker: a
    text: Or 'Have pity on me, that I may be silent toward you or forget you no longer.'.
    reason: previous_rendering
