    issue: Uso de «Sino solo» en vez de «Pero solo»
    rationale: «Sino» requiere contraste correctivo directo con una negación previa; aquí la construcción adversativa natural en español es «Pero solo...». El texto actual suena incorrecto y entorpece la lectura.
  - severity: low
    issue: La cláusula exhortativa necesita puntuación más natural
    rationale: Una coma antes de «clamen en alta voz» ayuda a reflejar la densidad sintáctica del siríaco sin alterar el sentido ni introducir paráfrasis.
