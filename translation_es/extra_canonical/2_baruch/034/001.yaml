translation:
  language: es
  text: 'Entonces alcé mis ojos y lloré, y dije en aquel tiempo: «Lejos esté de mí callarme ante ustedes o olvidarlos. Pero solo hasta la casa de los sepulcros de mis padres, en aflicción y en la angustia del lamento, clamen en alta voz,[a] para que no sea olvidado delante de ustedes y después. Y estas cosas se las he declarado para su recuerdo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cláusula siríaca es sintácticamente densa; por eso puede leerse también como una exhortación continua: «en aflicción y en la angustia del lamento, clamen en alta voz».'
    reason: spanish_style_note
lexical_decisions:
- source_word: ܚܣ ܠܝ
  english_pob_choice: Far be it from me
  chosen_spanish: Lejos esté de mí
  alternatives_spanish:
  - ¡Líbreme Dios de ello!
  - No me lo permitas
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: La expresión es una fórmula idiomática de fuerte rechazo; en español, «Lejos esté de mí» conserva el tono solemne y la fuerza retórica sin convertirlo en una petición de misericordia ni en una simple negativa.
- source_word: ܕܐܫܬܘܩܘܟܘܢ
  english_pob_choice: that I should be silent toward you
  chosen_spanish: callarme ante ustedes
  alternatives_spanish:
  - que dejara de hablarles
  - que guardara silencio respecto de ustedes
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: El verbo apunta a «estar en silencio». «Ante ustedes» comunica bien la relación interpersonal implícita sin añadir una idea de abandono que el texto no exige.
- source_word: ܠܒܝܬ ܩܘ̣ܒܘܪ ܩܘ̈ܒ̣ܪܐ ܕܐܒܗܝ
  english_pob_choice: the house of the tombs of my fathers
  chosen_spanish: la casa de los sepulcros de mis padres
  alternatives_spanish:
  - la casa de las tumbas de mis padres
  - el lugar de sepultura de mis padres
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: Conservo la imagen funeraria doble y concreta del siríaco. «Sepulcros» permite una fórmula castellana natural sin borrar el contraste entre casa/tumbas.
- source_word: ܡܢ ܚܒܠܬܐ ܒܥܝܩܘܬ ܝܠܠܐ ܨܘܝܘ
  english_pob_choice: in affliction and in the distress of lamentation cry aloud
  chosen_spanish: en aflicción y en la angustia del lamento clamen en alta voz
  alternatives_spanish:
  - en aflicción y en la angustia del lamento griten
  - clamen con lamento en la aflicción y la angustia
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: La acumulación de términos de dolor y el imperativo de clamor quedan reflejados sin suavizar el pasaje. «Clamen en alta voz» conserva el valor exhortativo/performativo del verbo.
- source_word: ܥܘܗܕܢܘܢ
  english_pob_choice: remembrance
  chosen_spanish: recuerdo
  alternatives_spanish:
  - memoria
  - rememoración
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: En este contexto, «recuerdo» suena natural en español y mantiene la idea de memorial/rememoración sin imponer una terminología litúrgica.
theological_decisions:
- issue: Alcance del mandato de lamentación y la relación con el olvido
  english_pob_reading: so that I may not be forgotten before you and afterward
  chosen_spanish_reading: para que no sea olvidado delante de ustedes y después
  alternative_spanish_readings:
  - para no ser olvidado ante ustedes y después
  - para que no me olviden delante de ustedes ni después
  rationale: No hay base para convertirlo en una idea distinta; se conserva el peso del doble horizonte temporal («delante de ustedes y después»), que parece abarcar la relación inmediata y la posterior con los destinatarios.
  doctrine_reference: Memoria/olvido en lenguaje de lamentación y súplica; no doctrinal en sentido técnico, pero sí literario-teológico en el marco del libro.
- issue: Referencia del destinatario plural y la expresión interpersonal
  english_pob_reading: toward you
  chosen_spanish_reading: ante ustedes
  alternative_spanish_readings:
  - con ustedes
  - respecto de ustedes
  rationale: El plural se mantiene según el texto y el contexto. «Ante ustedes» conserva la orientación relacional del siríaco sin forzar una fórmula eclesiástica.
  doctrine_reference: Pragmática del discurso directo en literatura de súplica; sin carga doctrinal específica.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail, que corrigió una redacción anterior por haber importado material ajeno al versículo. También toma en cuenta la corrección explícita del valor idiomático de ܚܣ ܠܝ como «Far be it from me», evitando la lectura errónea de «have pity on me». Se preserva además la traducción integral de ܡܢ ܚܒܠܬܐ como «en aflicción», para no omitir un matiz señalado en la revisión doctrinal/consistencia.
  spanish_consistency_notes:
  - He mantenido un registro sobrio y bíblico, evitando «cementerio» o «inhumar» porque la imagen del texto es más concreta y funeraria.
  - He usado «ustedes» para reflejar el plural del destinatario en el contexto de la versión española contemporánea.
  - No he sustituido «recuerdo» por un término litúrgico como «memorial», porque el contexto inmediato habla de rememoración y no de rito.
