lexical_decisions:
- source_word: holy festivals
  english_pob_choice: the holy festivals
  chosen_spanish: las santas fiestas
  alternatives_spanish:
  - las fiestas santas
  - las festividades santas
  lexicon: santas / fiestas
  rationale: Mantiene la referencia a festividades sagradas sin añadir contenido extra; 'fiestas' es el equivalente natural para 'festivals' en este contexto religioso.
- source_word: were celebrated / were fulfilled
  english_pob_choice: were celebrated
  chosen_spanish: fueron celebradas
  alternatives_spanish:
  - fueron cumplidas
  - fueron observadas
  lexicon: celebrar
  rationale: Sigue la revisión inglesa que evitó 'fulfilled' por sonar poco natural en inglés; en español 'celebradas' conserva el sentido de observancia festiva sin borrar la posible lectura alternativa documentada.
- source_word: with goodness
  english_pob_choice: with goodness
  chosen_spanish: con bondad
  alternatives_spanish:
  - con bien
  - con benevolencia
  lexicon: bondad
  rationale: '''Bondad'' reproduce de forma directa la cualidad moral/benigna indicada por el inglés y sugiere una celebración gozosa y favorable.'
- source_word: with much joy
  english_pob_choice: with much joy
  chosen_spanish: con mucha alegría
  alternatives_spanish:
  - con gran gozo
  - con mucho júbilo
  lexicon: alegría
  rationale: '''Alegría'' es natural en español bíblico actual y conserva bien la intensidad de ''much''.'
theological_decisions:
- issue: Sentido de 'fulfilled' vs. 'celebrated' en festividades sagradas
  english_pob_reading: The English POB adopts 'celebrated' in the main text but preserves an alternate note 'were fulfilled'.
  chosen_spanish_reading: fueron celebradas
  alternative_spanish_readings:
  - fueron cumplidas
  - fueron observadas
  rationale: En español, 'celebradas' comunica mejor la acción propia de las fiestas religiosas sin imponer una lectura interpretativa excesiva. La alternativa 'cumplidas' se reconoce como posibilidad léxica, pero suena más técnica y menos idiomática aquí.
  doctrine_reference: Ninguna doctrina específica; decisión de registro y equivalencia léxica.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'were fulfilled' por 'were celebrated' por razones de naturalidad; la presente redacción sigue esa decisión y conserva en nota la alternativa léxica documentada.
  spanish_consistency_notes:
  - Se usa 'santas' para holy y 'fiestas' para festivals, manteniendo el tono litúrgico sin arcaísmos innecesarios.
  - '''Celebradas'' evita un calco rígido de ''fulfilled'' y encaja con el español bíblico contemporáneo.'
  - La nota a conserva la tensión léxica entre 'celebradas' y 'cumplidas' sin reintroducir un giro ajeno al texto principal.
