lexical_decisions:
- source_word: wisdom
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sapiencia
  - sabiduría
  lexicon: standard
  rationale: «Sabiduría» es el equivalente natural y fiel para wisdom en español bíblico contemporáneo, sin añadir matices filosóficos innecesarios.
- source_word: heard
  english_pob_choice: was heard
  chosen_spanish: fue oída
  alternatives_spanish:
  - se oyó
  - fue escuchada
  lexicon: standard
  rationale: La pasiva «fue oída» conserva la voz receptiva del original y mantiene un tono bíblico claro; «se oyó» suena más impersonal, y «fue escuchada» puede sugerir una agencia menos directa.
- source_word: assembly
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - reunión
  - asamblea
  lexicon: standard
  rationale: «Asamblea» reproduce el sentido colectivo y formal de assembly con buena inteligibilidad en español eclesial.
- source_word: riches
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - abundancia
  - riquezas
  lexicon: standard
  rationale: «Riquezas» conserva la metáfora de abundancia valiosa sin neutralizarla en una mera cantidad abstracta.
- source_word: understanding
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - inteligencia
  - entendimiento
  lexicon: standard
  rationale: «Entendimiento» es el término más cercano y natural en español para la facultad de comprender; mantiene el paralelismo con «sabiduría».
- source_word: were magnified
  english_pob_choice: were magnified
  chosen_spanish: fueron engrandecidas
  alternatives_spanish:
  - fueron magnificadas
  - fueron engrandecidas
  lexicon: standard
  rationale: «Fueron engrandecidas» conserva la idea de aumento/exaltación de manera idiomática en español, evitando un calco técnico de «magnificadas» que suena menos natural.
- source_word: congregations
  english_pob_choice: congregations
  chosen_spanish: congregaciones
  alternatives_spanish:
  - congregaciones
  - reuniones
  lexicon: standard
  rationale: «Congregaciones» preserva el plural colectivo y el registro eclesial del verso, y corresponde bien al paralelismo con «asamblea».
theological_decisions:
- issue: Personificación/acción de la sabiduría y del entendimiento
  english_pob_reading: Wisdom and the riches of understanding are described as being heard and magnified in communal gatherings.
  chosen_spanish_reading: La sabiduría y las riquezas del entendimiento aparecen personificadas como realidades que resuenan y se exaltan en la comunidad.
  alternative_spanish_readings:
  - La sabiduría fue oída en la asamblea, y las riquezas del entendimiento fueron engrandecidas en las congregaciones.
  - La sabiduría se escuchó en la asamblea, y las riquezas del entendimiento se engrandecieron en las congregaciones.
  rationale: La formulación española conserva la personificación implícita del verso sin explicitarla demasiado en el texto principal; el lenguaje pasivo respeta la construcción del original y la lectura POB en inglés.
  doctrine_reference: Sabiduría personificada en literatura sapiencial; lectura poética no dogmática.
translation_notes:
  revision_awareness: El texto fuente y la versión inglesa POB concuerdan plenamente; no hay revisiones aplicadas ni variantes textuales relevantes en el audit trail. Se mantiene la equivalencia óptima del inglés POB con ajuste de naturalidad en español, sin introducir explicaciones ausentes del verso.
  spanish_consistency_notes:
  - Se mantiene «sabiduría» y «entendimiento» como términos técnicos coherentes con el registro sapiencial.
  - Se conserva el plural «congregaciones» para reflejar el paralelismo del inglés POB y del original siríaco según el audit trail.
  - No se emplea «Cristo», «SEÑOR» ni otros términos no pertinentes al verso.
