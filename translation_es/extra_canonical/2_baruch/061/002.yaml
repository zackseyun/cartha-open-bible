translation:
  language: es
  text: Y en aquel tiempo tuvo lugar la edificación de Sion, y la dedicación del santuario, y se derramó mucha sangre de las naciones que entonces pecaron, y muchas ofrendas fueron ofrecidas entonces en la dedicación del santuario.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: there came / took place
  english_pob_choice: there came
  chosen_spanish: se edificó / se dedicó / se derramó / se ofrecieron
  alternatives_spanish:
  - tuvo lugar
  - aconteció
  - llegó
  lexicon: N/A
  rationale: El hebreo/siríaco subyacente presenta una fórmula verbal que el inglés POB vacila entre una lectura más literal ('there came') y una más natural ('took place'). En español, una sola equivalencia literal sería áspera; por eso se distribuye la idea en verbos pasivos naturales que expresan la ocurrencia de los hechos sin perder el valor eventivo.
- source_word: building of Zion
  english_pob_choice: the building of Zion
  chosen_spanish: se edificó Sion
  alternatives_spanish:
  - la edificación de Sion
  - se construyó Sion
  lexicon: N/A
  rationale: '''Edificar'' conserva el sentido de construcción/levantamiento y suena más bíblico y natural que un calco nominal pesado. Se evita ''construcción'' para no endurecer la frase.'
- source_word: dedication of the sanctuary
  english_pob_choice: dedication of the sanctuary
  chosen_spanish: se dedicó el santuario
  alternatives_spanish:
  - la dedicación del santuario
  - se consagró el santuario
  lexicon: N/A
  rationale: '''Dedicar'' reproduce el acto cultual de poner aparte el santuario. ''Consagrar'' es posible, pero ''dedicar'' sigue de cerca la terminología del POB inglés y mantiene claridad.'
- source_word: blood of the nations who sinned then was shed
  english_pob_choice: much blood of the nations who sinned then was shed
  chosen_spanish: se derramó mucha sangre de las naciones que entonces pecaron
  alternatives_spanish:
  - fue derramada mucha sangre de las naciones que entonces pecaron
  - se derramó mucha sangre de las naciones que pecaron entonces
  lexicon: N/A
  rationale: '''Derramar sangre'' es la expresión idiomática y conserva el pasivo de resultado del original. ''Que entonces pecaron'' mantiene la relación temporal sin sobreinterpretar el sintagma.'
- source_word: offerings were offered
  english_pob_choice: many offerings were offered
  chosen_spanish: muchas ofrendas se ofrecieron
  alternatives_spanish:
  - se ofrecieron muchas ofrendas
  - muchas ofrendas fueron ofrecidas
  lexicon: N/A
  rationale: '''Ofrendas'' es el término cultual natural en español. La construcción reflexiva/pasiva evita un giro demasiado literal y mantiene la repetición enfática del acto sacrificial.'
theological_decisions:
- issue: Cómo renderizar la secuencia cultual y bélica sin suavizarla
  english_pob_reading: The verse links the building of Zion and the dedication of the sanctuary with bloodshed among the nations and many offerings at the dedication.
  chosen_spanish_reading: La traducción conserva juntos el levantamiento de Sion, la dedicación del santuario, el derramamiento de sangre y las ofrendas, sin atenuar la relación entre juicio y culto.
  alternative_spanish_readings:
  - Separar en dos oraciones para suavizar el contraste
  - Reforzar el juicio con un término más interpretativo
  rationale: El texto fuente une catástrofe/juicio y culto en una sola cadena narrativa. La versión española mantiene esa tensión sin explicarla ni moralizarla.
  doctrine_reference: Narrativa apocalíptica de juicio y restauración; no se introduce interpretación doctrinal ajena al texto.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión del inglés que alterna entre una lectura más literal ('there came') y una más natural ('took place'). En español se evitó depender de una sola calca verbal, optando por una formulación eventiva natural que conserva el valor del original y resuelve la aspereza señalada por la revisión.
  spanish_consistency_notes:
  - Se usa 'Sion' para mantener la forma bíblica habitual en español y la terminología del registro POB.
  - Se usa 'santuario' en lugar de 'templo' porque el texto habla del santuario y la dedicación cultual.
  - Se evita 'SEÑOR' u otras sustituciones porque este versículo no contiene el Tetragrámaton ni una alusión directa al nombre divino.
  - Se mantiene 'ofrendas' para el lenguaje sacrificial, sin expandirlo a 'sacrificios' dado que el inglés POB habla de 'offerings'.
