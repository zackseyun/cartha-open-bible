lexical_decisions:
- source_word: ܡ̈ܝܐ ܢܗܝܪ̈ܐ
  english_pob_choice: bright waters
  chosen_spanish: aguas brillantes
  alternatives_spanish:
  - aguas claras
  - aguas luminosas
  lexicon: Payne Smith
  rationale: «Brillantes» conserva el contraste simbólico con las aguas oscuras y refleja bien el valor visionario del término sin añadir interpretación innecesaria.
- source_word: ܫܘܪܝܐ
  english_pob_choice: this is the time
  chosen_spanish: este es el tiempo
  alternatives_spanish:
  - este es el momento
  - éste es el tiempo
  lexicon: Payne Smith
  rationale: El siríaco usa una formulación singular de identificación. En español, «este es el tiempo» comunica con naturalidad la equivalencia y evita la rigidez de una traducción más literal.
- source_word: ܡܐܬܝܬܗ ܕܡܫܝܚܐ
  english_pob_choice: the time of the Messiah's coming
  chosen_spanish: la venida del Mesías
  alternatives_spanish:
  - la llegada del Mesías
  - la venida de Cristo
  lexicon: Payne Smith
  rationale: Aunque en este versículo el POB inglés identifica la referencia histórica con David y Salomón, el trasfondo terminológico sigue siendo mesiánico en el capítulo. «Mesías» mantiene el título de fuente sin sustituirlo por un nombre litúrgico más fijo.
theological_decisions:
- issue: Relación entre la imagen de las aguas brillantes y la referencia histórica a David y Salomón
  english_pob_reading: This is the time in which David and Solomon were born.
  chosen_spanish_reading: Este es el tiempo en que nacieron David y Salomón.
  alternative_spanish_readings:
  - este es el tiempo de David y Salomón
  - este es el período de David y Salomón
  rationale: El audit trail inglés decide por una lectura histórica-typológica, no por una afirmación directamente mesiánica en este punto. Por eso la traducción conserva el referente histórico explícito de David y Salomón y mantiene el carácter interpretativo de la visión.
  doctrine_reference: 2 Baruch 61:1 within the chapter’s symbolic-historical sequence
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que corrigió la concordancia a «this is the time». El español se alineó con esa decisión, manteniendo además el paralelismo visionario del siríaco y la identificación histórica del contexto.
  spanish_consistency_notes:
  - Se prefirió «aguas brillantes» para conservar la imagen contrapuesta a las aguas oscuras del contexto inmediato.
  - «Tiempo» se mantuvo como sustantivo principal para reflejar la fórmula de identificación del texto.
  - Se usó «Mesías» como término de título, coherente con la terminología POB y con el trasfondo del capítulo.
