translation:
  language: es
  text: Y se vio entonces que los juicios[a] de los gobernantes no tenían engaño, y la justicia de los mandamientos del Poderoso se cumplió en verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el juicio de los gobernantes fue»
    reason: Preserva la variante singular registrada en la nota del POB en inglés y hace visible la decisión de mantener el plural del siríaco.
lexical_decisions:
- source_word: dīnē
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - juicios
  - sentencias
  - decisiones judiciales
  lexicon: judgment/decision; plural noun
  rationale: El siríaco es plural y el audit trail corrigió la lectura singular; por eso se mantiene el plural en español. «Juicios» conserva el valor judicial sin endurecerlo más de lo que exige el contexto.
- source_word: rulers
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - gobernantes
  - príncipes
  - jefes
  lexicon: ruler/governor
  rationale: «Gobernantes» es natural en español y reproduce el sentido de autoridad política sin añadir un matiz monárquico que el original no obliga.
- source_word: without deceit
  english_pob_choice: without deceit
  chosen_spanish: sin engaño
  alternatives_spanish:
  - sin engaño
  - sin fraude
  - sin falsedad
  lexicon: deceit/fraud/falsehood
  rationale: «Sin engaño» sigue de cerca la fuerza moral del giro y es más transparente que una paráfrasis abstracta.
- source_word: righteousness
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - justicia
  - rectitud
  lexicon: δικαιοσύνη / cognate semantic field
  rationale: 'Aquí el término se entiende en sentido ético-normativo: la fidelidad correcta de los mandamientos. «Justicia» mantiene la carga legal/covenantal que el contexto sugiere.'
- source_word: commandments
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandamientos
  - preceptos
  - mandatos
  lexicon: commandment/precept
  rationale: «Mandamientos» es el equivalente más estable en español bíblico y conserva el peso normativo del original.
- source_word: Mighty One
  english_pob_choice: the Mighty One
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Poderoso
  - el Fuerte
  - el Omnipotente
  lexicon: epithet for God
  rationale: El título divino se vierte como epiteto reverente y descriptivo. «El Poderoso» evita introducir un término doctrinal más cargado que el del original.
theological_decisions:
- issue: Pluralidad de los juicios
  english_pob_reading: And the judgments of the rulers were then seen...
  chosen_spanish_reading: Y los juicios de los gobernantes fueron entonces vistos...
  alternative_spanish_readings:
  - Y el juicio de los gobernantes fue entonces visto...
  rationale: Se conserva la pluralidad corregida por la revisión del audit trail, porque refleja mejor la sintaxis y el contenido del siríaco.
  doctrine_reference: No doctrinal; fidelidad morfosintáctica al original.
- issue: Relación entre justicia y verdad
  english_pob_reading: '...and the righteousness of the commandments of the Mighty One was accomplished in truth.'
  chosen_spanish_reading: '...y la justicia de los mandamientos del Poderoso se cumplió en verdad.'
  alternative_spanish_readings:
  - '...y la rectitud de los mandamientos del Poderoso se cumplió en verdad.'
  - '...y la justicia de los mandamientos del Poderoso se realizó en verdad.'
  rationale: «Se cumplió en verdad» conserva la idea de realización efectiva y veraz sin sobrerrepresentar el verbo. La frase mantiene la afirmación teológica de que los mandamientos del Poderoso resultan plenamente justos en la realidad.
  doctrine_reference: Ética bíblica; fidelidad divina y legitimidad de los mandamientos.
translation_notes:
  revision_awareness: 'El audit trail confirma una corrección previa importante: el sujeto es plural («judgments of the rulers were»), no singular. La redacción española ya incorpora esa revisión y no requiere nota textual adicional.'
  spanish_consistency_notes:
  - Se preserva «el Poderoso» para el epíteto divino, en armonía con el inglés POB.
  - Se evita «Señor» como máscara del nombre divino porque el versículo no lo exige y el término fuente es un título descriptivo.
  - La elección de «justicia» frente a «rectitud» mantiene el registro bíblico y legal del pasaje, pero no se descarta «rectitud» como alternativa semánticamente cercana.
