  to: 'Pero no permitan que sus ayunos sean con los hipócritas, porque ayunan el segundo día de la semana y el quinto; pero ustedes ayunen el cuarto día y en la Preparación. Y no oren como los hipócritas, sino como mandó el Señor en su evangelio, oren así:


    Padre nuestro que estás en el cielo,


    santificado sea tu nombre,


    venga tu reino,


    hágase tu voluntad,


    así en el cielo como en la tierra.


    Danos hoy nuestro pan para el día[a],


    y perdónanos nuestra deuda,


    como también nosotros perdonamos a nuestros deudores,


    y no nos metas en la prueba,


    sino líbranos del Maligno[b];


    porque tuyo es el poder y la gloria por los siglos.


    Oren así tres veces al día.'
  rationale: Se revisa para alinear el texto principal con la decisión documentada del POB sobre τοῦ πονηροῦ («el Maligno» en el texto, alternativa impersonal en nota) y para normalizar el registro a un español más neutral latinoamericano mediante formas de mandato con «ustedes». Los demás elementos sustanciales del borrador se conservan.
