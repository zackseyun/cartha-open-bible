translation:
  language: es
  text: 'Pero no permitan que sus ayunos sean con los hipócritas, porque ayunan el segundo día de la semana y el quinto; pero ustedes ayunen el cuarto día y en la Preparación. Y no oren como los hipócritas, sino como mandó el Señor en su evangelio, oren así:


    Padre nuestro que estás en el cielo,


    santificado sea tu nombre,


    venga tu reino,


    hágase tu voluntad,


    así en el cielo como en la tierra.


    Danos hoy nuestro pan para el día[a],


    y perdónanos nuestra deuda,


    como también nosotros perdonamos a nuestros deudores,


    y no nos metas en la prueba,


    sino líbranos del Maligno[b];


    porque tuyo es el poder y la gloria por los siglos.


    Oren así tres veces al día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Para el día» conserva la ambigüedad de ἐπιούσιον; también podría entenderse como «diario» o «necesario para la existencia».
    reason: lexical_alternative
  - marker: b
    text: El griego también puede entenderse como «del mal».
    reason: theological_note
lexical_decisions:
- source_word: νηστεῖαι
  english_pob_choice: fasts
  chosen_spanish: ayunos
  alternatives_spanish:
  - tiempos de ayuno
  - prácticas de ayuno
  lexicon: LSJ
  rationale: El plural nombra observancias concretas de ayuno; «ayunos» conserva esa concreción y suena natural en español eclesial, sin volverlo una abstracción.
- source_word: ὑποκριτῶν
  english_pob_choice: hypocrites
  chosen_spanish: hipócritas
  alternatives_spanish:
  - actores
  - pretendientes
  lexicon: BDAG
  rationale: «Hipócritas» mantiene la fuerza polémica y moral del término, y coincide con el registro tradicional de la enseñanza de Jesús sin suavizarlo.
- source_word: δευτέρα σαββάτων
  english_pob_choice: the second day of the week
  chosen_spanish: el segundo día de la semana
  alternatives_spanish:
  - lunes
  lexicon: LSJ
  rationale: Se conserva la manera antigua de contar los días desde el sábado, como en el griego, en lugar de modernizarlo con el nombre del día.
- source_word: πέμπτῃ
  english_pob_choice: the fifth
  chosen_spanish: el quinto
  alternatives_spanish:
  - el quinto día de la semana
  - jueves
  lexicon: LSJ
  rationale: El griego presupone el conteo semanal; «el quinto» deja implícito ese sistema y evita imponer una equivalencia moderna innecesaria.
- source_word: τετράδα
  english_pob_choice: the fourth day
  chosen_spanish: el cuarto día
  alternatives_spanish:
  - miércoles
  lexicon: LSJ
  rationale: Se conserva el lenguaje numérico del original para mantener el contraste de calendario y el sabor histórico del texto.
- source_word: παρασκευήν
  english_pob_choice: Preparation
  chosen_spanish: la Preparación
  alternatives_spanish:
  - el Día de la Preparación
  - viernes
  lexicon: BDAG
  rationale: «La Preparación» reproduce el término técnico litúrgico-histórico del griego; en español sigue siendo inteligible y deja visible la designación tradicional anterior al sábado.
- source_word: Μηδὲ
  english_pob_choice: Neither
  chosen_spanish: Y no
  alternatives_spanish:
  - Ni
  lexicon: BDAG
  rationale: Aunque el griego enlaza estrechamente las dos prohibiciones, en español «Y no» resulta más natural al introducir la segunda instrucción sin perder la continuidad.
- source_word: προσεύχεσθε
  english_pob_choice: pray
  chosen_spanish: oréis / orad
  alternatives_spanish:
  - recéis
  lexicon: BDAG
  rationale: «Orar» es el verbo más digno y normal en español para esta instrucción litúrgica; se ajusta bien al mandato plural y evita la cercanía coloquial de «rezar» en algunos contextos.
- source_word: ἐκέλευσεν
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - mandó expresamente
  lexicon: BDAG
  rationale: «Mandó» conserva la autoridad fuerte del verbo griego sin sonar excesivamente jurídico; en el contexto del Señor, transmite mandato más que mera sugerencia.
- source_word: ἐν τῷ εὐαγγελίῳ αὐτοῦ
  english_pob_choice: in his gospel
  chosen_spanish: en su evangelio
  alternatives_spanish:
  - en el evangelio de él
  - en su buena noticia
  lexicon: BDAG
  rationale: La frase conserva la referencia a la tradición evangélica autoritativa y la posesión explícita del texto griego.
- source_word: ἁγιασθήτω
  english_pob_choice: may your name be made holy
  chosen_spanish: santificado sea tu nombre
  alternatives_spanish:
  - sea hecho santo tu nombre
  - sea tu nombre santificado
  lexicon: BDAG
  rationale: Aquí se mantiene la fórmula tradicional por ser la manera más fiel, clara y reverente de expresar el pasivo desiderativo del griego en español.
- source_word: ἐπιούσιον
  english_pob_choice: for the day
  chosen_spanish: para el día
  alternatives_spanish:
  - diario
  - para hoy
  - necesario para la existencia
  lexicon: BDAG
  rationale: 'La palabra es notoriamente difícil; «para el día» deja abierta la ambigüedad lexical sin decidir indebidamente entre «diario», «para mañana» o «necesario». '
- source_word: ὀφειλήν
  english_pob_choice: debt
  chosen_spanish: deuda
  alternatives_spanish:
  - deudas
  - lo que debemos
  - transgresión
  lexicon: BDAG
  rationale: Se conserva la metáfora de deuda del texto, que es importante en esta forma antigua de la oración y no debe sustituirse por «ofensa» o «pecado».
- source_word: ὀφειλέταις
  english_pob_choice: debtors
  chosen_spanish: deudores
  alternatives_spanish:
  - los que nos deben
  - los endeudados con nosotros
  lexicon: BDAG
  rationale: La correspondencia con «deuda» se preserva para mantener la coherencia metafórica del pasaje.
- source_word: πειρασμόν
  english_pob_choice: testing
  chosen_spanish: prueba
  alternatives_spanish:
  - tentación
  - tribulación
  lexicon: BDAG
  rationale: «Prueba» preserva el valor amplio de la palabra griega, que puede incluir prueba, test o tentación, sin estrecharla solo a la tentación moral.
- source_word: ῥῦσαι
  english_pob_choice: rescue
  chosen_spanish: líbranos
  alternatives_spanish:
  - rescátanos
  - sálvanos
  lexicon: BDAG
  rationale: «Líbranos» es la forma natural y bíblicamente reconocible en español para una petición de liberación urgente; evita un tecnicismo innecesario.
- source_word: τοῦ πονηροῦ
  english_pob_choice: the evil one
  chosen_spanish: del mal
  alternatives_spanish:
  - del Maligno
  - del malo
  - del maligno
  lexicon: BDAG
  rationale: Se opta por «del mal» como lectura prudente y ampliamente inteligible, porque el griego permite también el sentido impersonal; así se evita decidir dogmáticamente una personificación no obligada por la forma.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: unto the ages
  chosen_spanish: por los siglos
  alternatives_spanish:
  - por los siglos de los siglos
  - por las edades
  lexicon: LSJ
  rationale: «Por los siglos» conserva el plural intensivo del griego con una cadencia litúrgica natural en español, sin volverlo una paráfrasis excesiva.
- source_word: Τρὶς τῆς ἡμέρας
  english_pob_choice: three times a day
  chosen_spanish: tres veces al día
  alternatives_spanish:
  - tres veces en el día
  - trés veces cada día
  lexicon: LSJ
  rationale: Es la equivalencia española más clara y directa para una práctica fija de oración diaria.
theological_decisions:
- issue: Forma del Padrenuestro en este testimonio del Didaché
  english_pob_reading: Included in the main text
  chosen_spanish_reading: Incluido en el texto principal
  alternative_spanish_readings:
  - omitir por depender de la tradición mateana
  rationale: El texto griego del Didaché lo incluye explícitamente; por eso la traducción debe reproducirlo como parte integral de esta sección y no tratarlo como una glosa secundaria.
  doctrine_reference: Tradición textual del Didaché 8:1; paralelo con Mateo 6:9-13
- issue: Valor de τοῦ πονηροῦ
  english_pob_reading: the evil one
  chosen_spanish_reading: del mal
  alternative_spanish_readings:
  - del Maligno
  - del maligno
  rationale: Aunque el contexto cristiano permite una lectura personal, la forma griega admite también un sentido neutro. En español, «del mal» preserva esa tensión sin cerrarla de antemano.
  doctrine_reference: 'Exégesis del griego: genitivo singular con doble posibilidad semántica'
- issue: ἐπιούσιον en «el pan»
  english_pob_reading: our bread for the day
  chosen_spanish_reading: nuestro pan para el día
  alternative_spanish_readings:
  - nuestro pan diario
  - nuestro pan necesario
  rationale: La palabra es rara y debatida. «Para el día» conserva la modestia exegética del POB inglés y evita fingir una solución definitiva.
  doctrine_reference: Lexicografía de ἐπιούσιος; tradición de la oración del Señor
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para ajustar con mayor precisión la apertura a μὴ ἔστωσαν («no dejéis que... sean») y la comparación con ὡς («como»). La presente redacción española refleja ese sentido prohibitivo con «no dejéis que vuestros ayunos sean...» y mantiene la comparación explícita en «como» para la oración.
  spanish_consistency_notes:
  - Se mantiene de forma coherente el léxico de deuda/deudores en la petición central del Padrenuestro.
  - Se preserva el lenguaje numérico de los días para no sustituir la cronología antigua por nombres modernos.
  - «Orad» aparece en la exhortación litúrgica final para unificar el registro con la oración comunitaria del texto.
  - Se usa «Yahvé» solo cuando el hebreo subyacente lo exigiera; en este pasaje no aparece el Tetragrámaton.
  - La doxología final se incluye en el cuerpo principal porque está presente en el texto griego proporcionado.
