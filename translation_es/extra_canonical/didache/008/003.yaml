lexical_decisions:
- source_word: Τρὶς τῆς ἡμέρας
  english_pob_choice: three times a day
  chosen_spanish: tres veces al día
  alternatives_spanish:
  - tres veces por día
  - tres veces cada día
  lexicon: τρίς; ἡμέρα
  rationale: La expresión griega indica frecuencia diaria; «tres veces al día» reproduce de manera natural y precisa la duración/frecuencia sin añadir matices ajenos.
- source_word: προσεύχεσθε
  english_pob_choice: Pray
  chosen_spanish: Oren
  alternatives_spanish:
  - Recen
  - Rueguen
  lexicon: προσεύχομαι
  rationale: Se mantiene el sentido general de dirigir oración a Dios. «Oren» es el equivalente más neutral y ampliamente inteligible en español contemporáneo.
- source_word: οὕτω
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de este modo
  lexicon: οὕτως
  rationale: «De esta manera» conserva el valor adverbial de modo que aparece en el texto, sin volverlo más explícito de lo que la frase exige.
theological_decisions:
- issue: Forma prescriptiva de la instrucción
  english_pob_reading: Pray in this way three times a day.
  chosen_spanish_reading: Oren de esta manera tres veces al día.
  alternative_spanish_readings:
  - Oren así tres veces al día.
  - Recen de esta manera tres veces al día.
  rationale: El griego presenta una instrucción normativa de modo y frecuencia. La traducción conserva ese carácter exhortativo sin intensificarlo ni suavizarlo.
  doctrine_reference: Didaché 8:3; instrucción disciplinar sobre práctica devocional
translation_notes:
  revision_awareness: El pasaje coincide plenamente con la traducción inglesa POB y con la revisión más reciente, que no requirió cambios. La versión española sigue de cerca el valor imperativo, el adverbio de modo y la frecuencia diaria del griego, sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se usa «Oren» en vez de una forma más eclesiástica o litúrgica para conservar neutralidad y naturalidad en español.
  - No se introduce terminología cristológica o trinitaria porque el versículo no la contiene explícitamente.
  - La secuencia «de esta manera tres veces al día» refleja el orden y la sencillez del original griego.
