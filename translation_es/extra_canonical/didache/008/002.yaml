source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Μηδὲ προσεύχεσθε ὡς οἱ ὑποκριταί, ἀλλʼ ὡς ἐκέλευσεν ὁ Κύριος ἐν τῷ εὐαγγελίῳ αὐτοῦ, οὕτω προσεύχεσθε· Πάτερ ἡμῶν ὁ ἐν τῷ οὐρανῷ, ἁγιασθήτω τὸ ὄνομά σου, ἐλθέτω ἡ βασιλεία σου, γενηθήτω τὸ θέλημά σου ὡς ἐν οὐρανῷ καὶ ἐπὶ γῆς· τὸν ἄρτον ἡμῶν τὸν ἐπιούσιον δὸς ἡμῖν σήμερον καὶ ἄφες ἡμῖν τὴν ὀφειλὴν ἡμῶν ὡς καὶ ἡμεῖς ἀφίεμεν τοῖς ὀφειλέταις ἡμῶν, καὶ μὴ εἰσενέγκῃς ἡμᾶς εἰς πειρασμόν, ἀλλὰ ῥῦσαι ἡμᾶς ἀπὸ τοῦ πονηροῦ· ὅτι σοῦ ἐστιν ἡ δύναμις καὶ ἡ δόξα εἰς τοὺς αἰῶνας.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/008/002.yaml
  text: 'Do not pray like the hypocrites[a], but as the Lord commanded in his gospel, pray in this way:


    Our Father in heaven,

    may your name be made holy,

    may your kingdom come,

    may your will be done,

    as in heaven, so also on earth.

    Give us today our bread for the day,

    and forgive us our debt,

    as we also forgive our debtors,

    and do not bring us into testing,

    but rescue us from the evil one;

    for yours is the power and the glory unto the ages.'
  footnotes:
  - marker: a
    text: Or 'Neither pray as the hypocrites'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:44Z'
    unchanged: false
    changes_summary: Changed the opening from 'Nor pray like the hypocrites' to 'Do not pray like the hypocrites' for natural and accurate English matching the prohibition Μηδὲ προσεύχεσθε. No other changes needed.
translation:
  language: es
  text: 'Y no oren como los hipócritas[a], sino como el Señor mandó en su evangelio, oren de esta manera:


    Padre nuestro que estás en el cielo,


    santificado sea tu nombre,


    venga tu reino,


    hágase tu voluntad,


    como en el cielo, así también en la tierra.


    Danos hoy nuestro pan para el día,


    y perdona nuestra deuda,


    como también nosotros perdonamos a nuestros deudores,


    y no nos metas en la prueba,


    sino líbranos del maligno;


    porque tuyo es el poder y la gloria por los siglos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tampoco oren como los hipócritas»; o «No recen como los hipócritas».'
    reason: Preserva el matiz coordinante de Μηδὲ y mantiene la alternativa verbal española previamente considerada.
lexical_decisions:
- source_word: Μηδὲ προσεύχεσθε ὡς οἱ ὑποκριταί
  english_pob_choice: Do not pray like the hypocrites
  chosen_spanish: No oren como los hipócritas
  alternatives_spanish:
  - Y no oren como los hipócritas
  - No recen como los hipócritas
  lexicon: Μηδὲ / προσεύχεσθε / ὑποκριταί
  rationale: El negativo coordinante se vierte naturalmente con «No» en español, sin perder el valor prohibitivo. «Oren» mantiene el sentido de προσεύχεσθε; «recen» es posible, pero «oren» es más general y más congruente con el registro bíblico del pasaje. «Como los hipócritas» reproduce ὡς + acusativo plural con claridad idiomática.
- source_word: ἐκέλευσεν ὁ Κύριος ἐν τῷ εὐαγγελίῳ αὐτοῦ
  english_pob_choice: as the Lord commanded in his gospel
  chosen_spanish: como el Señor mandó en su evangelio
  alternatives_spanish:
  - como el Señor ordenó en su evangelio
  - como el Señor lo mandó en su evangelio
  lexicon: Κύριος / εὐαγγέλιον
  rationale: «Mandó» refleja bien ἐκέλευσεν sin cargar el español con una formulación más dura que el griego. Se conserva «su evangelio» porque el posesivo está en el texto y no se debe neutralizar.
- source_word: ὁ ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: que estás en el cielo
  alternatives_spanish:
  - que estás en los cielos
  - que habitas en el cielo
  lexicon: οὐρανός
  rationale: La forma fija del Padrenuestro en español suele decir «que estás en el cielo»; aquí comunica bien la referencia locativa de ὁ ἐν τῷ οὐρανῷ sin volverse artificial. «En los cielos» también sería posible, pero «en el cielo» es más transparente y natural en este contexto litúrgico.
- source_word: ἁγιασθήτω τὸ ὄνομά σου
  english_pob_choice: may your name be made holy
  chosen_spanish: santificado sea tu nombre
  alternatives_spanish:
  - sea santificado tu nombre
  - que tu nombre sea santificado
  lexicon: ἁγιάζω / ὄνομα
  rationale: Se conserva la fórmula tradicional del Padrenuestro, que expresa con precisión la pasiva de deseo. «Santificado» mantiene la idea de ser hecho santo; no es una paráfrasis, sino una equivalencia establecida en español eclesial.
- source_word: ἡ βασιλεία σου
  english_pob_choice: your kingdom
  chosen_spanish: tu reino
  alternatives_spanish:
  - tu reinado
  - tu soberanía
  lexicon: βασιλεία
  rationale: «Reino» es la equivalencia natural y más fiel en español para βασιλεία en esta oración, conservando la fuerza bíblica del término sin introducir una abstracción innecesaria.
- source_word: γενηθήτω τὸ θέλημά σου
  english_pob_choice: may your will be done
  chosen_spanish: hágase tu voluntad
  alternatives_spanish:
  - que se haga tu voluntad
  - sea hecha tu voluntad
  lexicon: θέλημα
  rationale: «Hágase» reproduce de modo natural el jussivo pasivo del griego y mantiene el registro oracional del texto.
- source_word: ὡς ἐν οὐρανῷ καὶ ἐπὶ γῆς
  english_pob_choice: as in heaven, so also on earth
  chosen_spanish: como en el cielo, así también en la tierra
  alternatives_spanish:
  - así como en el cielo, también en la tierra
  - como en el cielo y en la tierra
  lexicon: οὐρανός / γῆ
  rationale: «Así también» conserva la correlación comparativa de ὡς ... καὶ, sin necesidad de una calca más dura. «Tierra» mantiene el contraste cósmico del pasaje.
- source_word: τὸν ἄρτον ἡμῶν τὸν ἐπιούσιον
  english_pob_choice: our bread for the day
  chosen_spanish: nuestro pan para el día
  alternatives_spanish:
  - nuestro pan cotidiano
  - nuestro pan de cada día
  lexicon: ἄρτος / ἐπιούσιος
  rationale: Se preserva la ambigüedad histórica de ἐπιούσιος sin inventar un significado más preciso de lo que el texto permite. «Para el día» refleja el matiz temporal del inglés POB y evita imponer de manera cerrada una sola interpretación. La opción tradicional «de cada día» es comprensible, pero puede sonar más interpretativa.
- source_word: ἄφες ἡμῖν τὴν ὀφειλὴν ἡμῶν
  english_pob_choice: forgive us our debt
  chosen_spanish: perdona nuestra deuda
  alternatives_spanish:
  - perdona nuestras deudas
  - condónanos nuestra deuda
  lexicon: ὀφειλή / ἀφίημι
  rationale: Se conserva el singular «deuda» como en el inglés POB, reflejando el uso del término en la oración transmitida aquí. «Condónanos» sería comprensible, pero «perdona» es más amplio y fiel al registro del pasaje.
- source_word: ὡς καὶ ἡμεῖς ἀφίεμεν τοῖς ὀφειλέταις ἡμῶν
  english_pob_choice: as we also forgive our debtors
  chosen_spanish: como también nosotros perdonamos a nuestros deudores
  alternatives_spanish:
  - así como también nosotros perdonamos a nuestros deudores
  - como también nosotros perdonamos a los que nos deben
  lexicon: ἀφίημι / ὀφειλέτης
  rationale: «Perdonamos a nuestros deudores» conserva el paralelismo con «deuda» y mantiene el vínculo verbal y conceptual del griego. La alternativa explicativa «los que nos deben» aclara el sentido, pero pierde la forma sustantiva del texto.
- source_word: μὴ εἰσενέγκῃς ἡμᾶς εἰς πειρασμόν
  english_pob_choice: do not bring us into testing
  chosen_spanish: no nos metas en la prueba
  alternatives_spanish:
  - no nos pongas en la prueba
  - no nos lleves a la prueba
  lexicon: πειρασμός / εἰσφέρω
  rationale: «Prueba» refleja el amplio campo semántico de πειρασμός y evita fijarlo exclusivamente como «tentación». «Metas» es una forma natural de expresar εἰσενέγκῃς sin alejarse del movimiento dirigido del verbo.
- source_word: ἀλλὰ ῥῦσαι ἡμᾶς ἀπὸ τοῦ πονηροῦ
  english_pob_choice: but rescue us from the evil one
  chosen_spanish: sino líbranos del maligno
  alternatives_spanish:
  - sino rescatarnos del maligno
  - sino líbranos del mal
  lexicon: ῥύομαι / πονηρός
  rationale: Se conserva la lectura personalizada de τοῦ πονηροῦ como «el maligno», siguiendo el sentido elegido por el inglés POB. «Del mal» también es posible, pero borra la tensión entre una referencia personal y una abstracta.
- source_word: ἡ δύναμις καὶ ἡ δόξα εἰς τοὺς αἰῶνας
  english_pob_choice: the power and the glory unto the ages
  chosen_spanish: el poder y la gloria por los siglos
  alternatives_spanish:
  - el poder y la gloria por los siglos de los siglos
  - el poder y la gloria para siempre
  lexicon: δύναμις / δόξα / αἰών
  rationale: «Por los siglos» reproduce el plural intensivo de εἰς τοὺς αἰῶνας con solemnidad sobria. «Para siempre» sería válido, pero pierde el matiz plural característico del griego.
theological_decisions:
- issue: Referencia al nombre divino en la fórmula del Padrenuestro
  english_pob_reading: the Lord commanded in his gospel
  chosen_spanish_reading: el Señor mandó en su evangelio
  alternative_spanish_readings:
  - el Señor ordenó en su evangelio
  - el Señor mandó en el evangelio de él
  rationale: El texto griego dice ὁ Κύριος sin explicitar aquí el nombre divino; por eso se conserva «el Señor» y no se introduce «Yahvé» en esta cláusula. La mención es una referencia al mandato del Señor transmitido en el evangelio, no una cita directa del tetragrámaton.
  doctrine_reference: Cristología y transmisión del dicho de Jesús en tradición eclesial primitiva
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que corrigió el arranque de 'Neither pray like the hypocrites' a 'Do not pray like the hypocrites' por naturalidad y exactitud. En español, la prohibición se expresó directamente con «No oren», sin arrastrar un coordinante negativo ambiguo. También se siguió la forma revisada natural de ὡς οἱ ὑποκριταί como «como los hipócritas».
  spanish_consistency_notes:
  - Se mantuvo el registro litúrgico clásico en la oración central del Padrenuestro, pero sin sustituir innecesariamente los términos del audit trail.
  - Se evitó traducir 'testing' como 'tentación' para no borrar la amplitud semántica de πειρασμός.
  - Se conservó 'el maligno' para respetar la lectura personal del griego y la decisión inglesa auditada.
  - La nota al pie solo ofrece una alternativa léxica real y no duplica contenido ya presente en el texto principal.
