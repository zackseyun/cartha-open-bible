base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/007/002.yaml
  text: But if you do not have living water, baptize in other water; and if you cannot in cold, then in warm.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:38Z'
