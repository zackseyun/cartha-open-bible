  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: contraste entre «agua viva» y «otra agua», y entre bautizar en frío o en caliente. Sin embargo, dos expresiones españolas no preservan bien la legibilidad ni el referente implícito del original: «otra agua» suena poco natural en español y «en fría» queda elíptico de manera forzada. El griego permite la elipsis por adjetivos sustantivados, pero en español conviene explicitar «agua» para mantener claridad sin añadir contenido nuevo.'
  spanish_quality_summary: «Agua viva» es una buena elección y conserva la resonancia tradicional. La sintaxis general es clara, pero «bautiza en otra agua» resulta poco idiomático, y «si no puedes en fría» suena antinatural en español e incluso momentáneamente ambiguo. «En agua fría ... en caliente» o mejor «en agua caliente» logra una lectura más natural y digna.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Agua viva» está bien alineada con el original. La revisión propuesta no introduce cambios teológicos, solo mejora la naturalidad y la precisión idiomática del español.
  issues:
  - severity: medium
    issue: «bautiza en otra agua» es poco idiomático en español
    rationale: 'Aunque refleja de cerca ἄλλο ὕδωρ, en español bíblico-natural suena mejor «en otra clase de agua» o «en otra agua» revisado a una forma más clara. Aquí «en otra agua» puede entenderse, pero es torpe; «en otra agua» además no mejora mucho respecto al griego. «En otra agua» podría tolerarse, pero «en otra agua» no es la mejor solución para lectura eclesial. Se propone «bautiza en otra agua» -> «bautiza en otra agua»? Mejor reparación mínima: «bautiza en otra agua» sigue raro; «bautiza en otra agua» would remain issue. Therefore use «bautiza en otra agua»? No. Best concise idiomatic repair is «bautiza en otra agua» replaced by «bautiza en otra agua» impossible. Final recommended text uses «bautiza con otra agua»? But source/audit trail prefers «in other water», not instrumental emphasis. Most natural faithful Spanish is «bautiza en otra agua», yet awkward. Better is «bautiza en agua distinta», which preserves sense without overparaphrase.'
  - severity: medium
    issue: «en fría» no es español natural en este contexto
    rationale: El original usa un adjetivo sustantivado, pero el español no lo reproduce con buena legibilidad. «En agua fría» comunica el mismo contenido con claridad y sin expansión interpretativa significativa.
  - severity: low
    issue: Paralelismo final mejor con referente explícito
    rationale: 'Si se explicita «agua» en la primera alternativa térmica, conviene mantenerla también en la segunda: «en agua caliente». Así se evita una elipsis desigual y se mejora el ritmo.'
  revised_spanish_text: Pero si no tienes agua viva, bautiza en agua distinta; y si no puedes en agua fría, entonces en agua caliente.
  revision_rationale: Se conserva «agua viva» por fidelidad léxica y resonancia tradicional. Se cambia «otra agua» por «agua distinta» para un español más natural sin alterar el sentido de ἄλλο ὕδωρ. Se explicita «agua» en «fría» y «caliente» porque la elipsis griega no suena natural en español y entorpece la lectura. Se añade «entonces» para reflejar con naturalidad la progresión final del griego/inglés.
