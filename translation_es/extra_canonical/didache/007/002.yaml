    changes_summary: Changed 'into other water' to 'in other water' for more natural and accurate English with βάπτισον εἰς ἄλλο ὕδωρ in this context; left the rest unchanged.
translation:
  language: es
  text: Pero si no tienes agua viva, bautiza en agua distinta; y si no puedes en agua fría, entonces en agua caliente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔχῃς ὕδωρ ζῶν
  english_pob_choice: do not have living water
  chosen_spanish: no tienes agua viva
  alternatives_spanish:
  - no tienes agua corriente
  - no tienes agua viva
  lexicon: ὕδωρ ζῶν
  rationale: «Agua viva» reproduce de forma natural el modismo griego y conserva el sentido de agua disponible y fresca/corriente sin forzar una explicación interpretativa. «Agua corriente» explicita el posible sentido físico, pero pierde la resonancia literal del texto.
- source_word: εἰς ἄλλο ὕδωρ βάπτισον
  english_pob_choice: baptize in other water
  chosen_spanish: bautiza en otra agua
  alternatives_spanish:
  - bautiza en agua distinta
  - bautiza en otro tipo de agua
  lexicon: βάπτισον εἰς ἄλλο ὕδωρ
  rationale: Sigo la revisión inglesa que evita «into» y uso «en» como equivalente idiomático de la inmersión/realización del bautismo en ese medio. «Otra agua» mantiene la formulación simple y cercana al griego sin añadir una paráfrasis explicativa.
- source_word: ἐν ψυχρῷ
  english_pob_choice: in cold
  chosen_spanish: en fría
  alternatives_spanish:
  - con agua fría
  - en agua fría
  lexicon: ἐν ψυχρῷ
  rationale: El griego usa un adjetivo sustantivado, literalmente «en lo frío»; en español, «en fría» conserva la brevedad y la oposición paralela con «en caliente». «En agua fría» aclara el referente, pero introduce una expansión que el texto no expresa.
- source_word: ἐν θερμῷ
  english_pob_choice: in warm
  chosen_spanish: en caliente
  alternatives_spanish:
  - en tibia
  - en templada
  lexicon: ἐν θερμῷ
  rationale: «Caliente» mantiene la antítesis directa con «fría» y refleja el contraste elemental del original. «Tibia» o «templada» suavizan el contraste, pero no están exigidas por el texto.
translation_notes:
  revision_awareness: La base inglesa fue revisada de «into other water» a «in other water» por mayor naturalidad y precisión frente a εἰς ἄλλο ὕδωρ. La versión española sigue esa decisión con «en otra agua», evitando un calco preposicional que sonaría menos natural en español y sin introducir explicaciones no presentes en el griego.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo breve del original: condición sobre «agua viva», mandato de bautizar en «otra agua» y segunda alternativa climática.'
  - No se introduce terminología eclesiástica adicional ni se sustituye el verbo «bautizar» por una paráfrasis.
  - Se preserva la repetición simple de preposiciones y adjetivos para reflejar el estilo sentencioso del texto.
