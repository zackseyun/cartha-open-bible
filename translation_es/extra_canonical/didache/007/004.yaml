id: DID.7.4
reference: Didache 7:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Πρὸ δὲ τοῦ βαπτίσματος προνηστευσάτω ὁ βαπτίζων καὶ ὁ βαπτιζόμενος καὶ εἴ τινες ἄλλοι δύνανται· κελεύσεις δὲ νηστεῦσαι τὸν βαπτιζόμενον πρὸ μιᾶς ἢ δύο.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/007/004.yaml
  text: But before the baptism, let the one baptizing and the one being baptized fast beforehand, and any others who are able; and you shall command the one being baptized to fast one or two days beforehand.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:40Z'
    unchanged: false
    changes_summary: Moved 'beforehand' in the final clause to avoid redundancy and improve natural English while preserving προνηστευσάτω/νηστεῦσαι and πρὸ μιᾶς ἢ δύο as 'one or two days beforehand.'
translation:
  language: es
  text: Pero antes del bautismo, que ayunen de antemano el que bautiza y el que es bautizado, y otros que puedan; y mandarás que el que es bautizado ayune uno o dos días antes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πρὸ δὲ τοῦ βαπτίσματος
  english_pob_choice: But before the baptism
  chosen_spanish: Pero antes del bautismo
  alternatives_spanish:
  - Pero antes de bautizar
  - Y antes del bautismo
  lexicon: πρό + genitivo; βάπτισμα
  rationale: Conserva la referencia temporal directa del griego y mantiene el sustantivo 'bautismo' como evento, no como acción verbal, igual que en el inglés POB.
- source_word: προνηστευσάτω
  english_pob_choice: let ... fast beforehand
  chosen_spanish: ayunen previamente
  alternatives_spanish:
  - ayune previamente
  - se abstengan de comer previamente
  lexicon: προνηστεύω
  rationale: El verbo expresa ayuno previo; 'previamente' reproduce el valor de πρό sin añadir una duplicación innecesaria de 'antes' en español.
- source_word: ὁ βαπτίζων καὶ ὁ βαπτιζόμενος
  english_pob_choice: the one baptizing and the one being baptized
  chosen_spanish: el que bautiza y el que es bautizado
  alternatives_spanish:
  - el bautizante y el bautizado
  - quien bautiza y quien es bautizado
  lexicon: βαπτίζω
  rationale: '''El que...'' conserva la construcción participial y su claridad en español. Evita términos más eclesiásticos que no están en el griego.'
- source_word: καὶ εἴ τινες ἄλλοι δύνανται
  english_pob_choice: and any others who are able
  chosen_spanish: y cualquier otro que pueda hacerlo
  alternatives_spanish:
  - y otros que puedan
  - y cualesquiera otros que tengan capacidad
  lexicon: ἄλλος; δύναμαι
  rationale: '''Cualquier otro que pueda hacerlo'' transmite la generalidad de εἴ τινες ἄλλοι δύνανται y evita especificar más de lo que el texto dice.'
- source_word: κελεύσεις
  english_pob_choice: you shall command
  chosen_spanish: mandarás
  alternatives_spanish:
  - ordenarás
  - les mandarás
  lexicon: κελεύω
  rationale: '''Mandarás'' refleja el imperativo/mandato con naturalidad en español y mantiene la fuerza directiva del griego.'
- source_word: νηστεῦσαι
  english_pob_choice: to fast
  chosen_spanish: ayune
  alternatives_spanish:
  - haga ayuno
  - se abstenga de comer
  lexicon: νηστεύω
  rationale: En esta cláusula infinitival, el subjuntivo exhortativo en español comunica la obligación de manera fluida sin alterar el sentido.
- source_word: πρὸ μιᾶς ἢ δύο
  english_pob_choice: one or two days beforehand
  chosen_spanish: uno o dos días antes
  alternatives_spanish:
  - con uno o dos días de anticipación
  - un día o dos antes
  lexicon: πρό + numeral; ἡμέρα subentendida
  rationale: La revisión inglesa trasladó 'beforehand' al final para evitar redundancia; en español 'uno o dos días antes' reproduce de forma natural el lapso temporal sin duplicar la idea de anterioridad.
theological_decisions:
- issue: Obligación del ayuno previo al bautismo
  english_pob_reading: let ... fast beforehand; you shall command ... to fast one or two days beforehand
  chosen_spanish_reading: ayunen previamente...; y mandarás que... ayune uno o dos días antes
  alternative_spanish_readings:
  - dejen de comer antes
  - se preparen con ayuno antes
  rationale: El texto prescribe ayuno previo como práctica obligatoria o al menos mandatada en este pasaje. Se conserva esa fuerza normativa sin suavizarla en una mera recomendación.
  doctrine_reference: Didaché 7:4; disciplina bautismal primitiva
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que movió 'beforehand' a la cláusula final para evitar redundancia. En español se resolvió con 'ayunen previamente' y 'uno o dos días antes' para mantener naturalidad y precisión temporal sin duplicar el marcador de anterioridad.
  spanish_consistency_notes:
  - Se prefirió 'bautismo' y 'bautizado' por consistencia terminológica con el texto fuente y el POB inglés.
  - No se añadió léxico sacramental no presente en el griego.
  - Se mantuvo un registro sobrio y normativo acorde con una instrucción litúrgica breve.
