revisions:
- from: Pero antes del bautismo, ayunen previamente el que bautiza y el que es bautizado, y cualquier otro que pueda hacerlo; y mandarás que el que es bautizado ayune uno o dos días antes.
  to: Pero antes del bautismo, que ayunen de antemano el que bautiza y el que es bautizado, y otros que puedan; y mandarás que el que es bautizado ayune uno o dos días antes.
  rationale: Se ajusta el plural indefinido de εἴ τινες ἄλλοι δύνανται con 'otros que puedan' y se mejora la naturalidad de προνηστευσάτω con 'que ayunen de antemano', manteniendo la fuerza exhortativa y el sentido temporal del original. No se requieren notas.
