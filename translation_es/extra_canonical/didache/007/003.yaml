- from: Pero si no tienes ambos[a], derrama agua sobre la cabeza tres veces, en el nombre del Padre, y del Hijo, y del Espíritu Santo.
  to: Pero si no tienes ninguno de los dos[a], derrama agua sobre la cabeza tres veces en el nombre del Padre y del Hijo y del Espíritu Santo.
  rationale: Se corrige la cláusula condicional para que el español exprese con claridad e idiomaticidad el sentido contextual de ἀμφότερα bajo negación. Se elimina la puntuación innecesaria en la fórmula trinitaria, conservando su cadencia y definitud. Se reemplaza la nota por una alternativa útil y fiel.
