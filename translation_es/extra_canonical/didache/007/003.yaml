review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: condición negativa, acción de verter agua sobre la cabeza tres veces, y fórmula bautismal trinitaria. Sin embargo, Ἐὰν δὲ ἀμφότερα μὴ ἔχῃς no queda bien representado por «si no tienes ambos», que en español sugiere ‘no poseer los dos juntos’ y puede incluir el caso de tener uno de ellos, mientras que aquí el sentido contextual es ‘si no tienes ninguno de los dos / si no tienes una u otra de estas dos opciones previas’.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «no tienes ambos» suena poco natural y semánticamente impreciso. También sobran las comas en «del Padre, y del Hijo, y del Espíritu Santo»; en español corriente y litúrgico la coordinación fluye mejor sin esas comas. «Derrama» es aceptable, aunque «vierte» también sería posible; no exige cambio.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto. «Espíritu Santo» está bien capitalizado por contexto. La fórmula «en el nombre del Padre y del Hijo y del Espíritu Santo» preserva correctamente la definitud documentada en la auditoría inglesa. La nota actual no ayuda: «O ‘de ambos’ o ‘de ninguno de los dos’» no expresa bien la alternativa semántica relevante en español.'
  issues:
  - severity: high
    issue: «si no tienes ambos» para Ἐὰν δὲ ἀμφότερα μὴ ἔχῃς
    rationale: Es un giro poco idiomático y puede malinterpretarse. En este contexto de dos medios de bautismo previamente mencionados, el español natural y fiel es «si no tienes ninguno de los dos» o «si no tienes lo uno ni lo otro».
  - severity: medium
    issue: Comas en la fórmula trinitaria
    rationale: '«del Padre, y del Hijo, y del Espíritu Santo» suena puntuado de forma antinatural en español. La repetición de «del» puede mantenerse sin comas: «del Padre y del Hijo y del Espíritu Santo».'
  - severity: medium
    issue: Nota al pie mal formulada
    rationale: 'La nota «O ‘de ambos’ o ‘de ninguno de los dos’» no aclara la cuestión real. Si se conserva nota, debe reflejar una alternativa española pertinente, por ejemplo «O: ‘si no tienes lo uno ni lo otro’».'
  revised_spanish_text: Pero si no tienes ninguno de los dos[a], derrama agua sobre la cabeza tres veces en el nombre del Padre y del Hijo y del Espíritu Santo.
  revised_footnotes:
