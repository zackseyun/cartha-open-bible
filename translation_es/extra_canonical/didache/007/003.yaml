base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/007/003.yaml
  text: But if you do not have either[a], pour water on the head three times in the name of the Father and of the Son and of the Holy Spirit.
  footnotes:
  - marker: a
    text: Or 'of Father and Son and Holy Spirit'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:39Z'
    unchanged: false
    changes_summary: Replaced 'have neither' with 'do not have either' for more natural English after the conditional, and changed 'into the name' to 'in the name' for idiomatic and contextually accurate rendering.
translation:
  language: es
  text: Pero si no tienes ninguno de los dos[a], derrama agua sobre la cabeza tres veces en el nombre del Padre y del Hijo y del Espíritu Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si no tienes lo uno ni lo otro».'
    reason: Alternativa española natural para expresar la referencia a dos opciones previamente mencionadas.
lexical_decisions:
- source_word: Ἐὰν δὲ ἀμφότερα μὴ ἔχῃς
  english_pob_choice: But if you do not have either
  chosen_spanish: Pero si no tienes ambos
  alternatives_spanish:
  - Pero si no tienes ninguno de los dos
  - Pero si no tienes lo uno ni lo otro
  lexicon: ἔχω
  rationale: El griego usa ἀμφότερα, literalmente ‘ambos’, con negación condicional. En español, ‘no tienes ambos’ es fiel pero algo rígido; sin embargo conserva mejor la relación con dos elementos previamente entendidos que ‘no tienes ninguno de los dos’, que suena más interpretativo.
- source_word: ἔκχεον
  english_pob_choice: pour
  chosen_spanish: derrama
  alternatives_spanish:
  - vierte
  - échala
  lexicon: ἐκχέω
  rationale: ‘Derrama’ transmite la acción de verter agua con naturalidad en español y conserva el sentido de flujo abundante del verbo griego.
- source_word: εἰς τὴν κεφαλὴν
  english_pob_choice: on the head
  chosen_spanish: sobre la cabeza
  alternatives_spanish:
  - en la cabeza
  - encima de la cabeza
  lexicon: κεφαλή
  rationale: ‘Sobre la cabeza’ es idiomático y preserva la imagen física del acto ritual mejor que un calco más áspero.
- source_word: τρὶς
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - en tres ocasiones
  lexicon: τρίς
  rationale: La equivalencia directa es clara y natural en español.
- source_word: εἰς ὄνομα
  english_pob_choice: in the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - invocando el nombre de
  - bajo el nombre de
  lexicon: ὄνομα
  rationale: Se conserva la fórmula ritual establecida por el griego y corroborada por la revisión inglesa, que prefirió 'in the name' frente a una versión más literal o menos idiomática.
- source_word: Πατρὸς καὶ Υἱοῦ καὶ ἁγίου Πνεύματος
  english_pob_choice: of the Father and of the Son and of the Holy Spirit
  chosen_spanish: del Padre, y del Hijo, y del Espíritu Santo
  alternatives_spanish:
  - del Padre, del Hijo y del Espíritu Santo
  - del Padre y del Hijo y del Espíritu Santo
  lexicon: πατήρ / υἱός / πνεῦμα
  rationale: Se mantiene la referencia trinitaria y la cadencia litúrgica. En español, la repetición de 'del' reproduce con claridad la serie genitiva sin añadir ni quitar contenido.
theological_decisions:
- issue: Forma de la fórmula bautismal trinitaria
  english_pob_reading: in the name of the Father and of the Son and of the Holy Spirit
  chosen_spanish_reading: en el nombre del Padre, y del Hijo, y del Espíritu Santo
  alternative_spanish_readings:
  - en el nombre del Padre, del Hijo y del Espíritu Santo
  - en el nombre del Padre y del Hijo y del Espíritu Santo
  rationale: El texto griego contiene una fórmula sacramental explícita. Se traduce de manera plenamente afirmativa y litúrgicamente reconocible, sin suavizar la secuencia trinitaria ni introducir una paráfrasis doctrinal.
  doctrine_reference: Mateo 28:19; fórmula trinitaria baptismal
- issue: Artículo definido implícito en la serie genitiva
  english_pob_reading: of the Father and of the Son and of the Holy Spirit
  chosen_spanish_reading: del Padre, y del Hijo, y del Espíritu Santo
  alternative_spanish_readings:
  - de Padre y de Hijo y de Espíritu Santo
  - del Padre y del Hijo y del Espíritu Santo
  rationale: Aunque el griego carece de artículo explícito en la cadena genitiva, el referente es claramente definido. El español exige artículos definidos para expresar esa misma definitud sin volver la frase artificialmente telegráfica.
  doctrine_reference: Gramática griega en construcciones preposicionales y genitivas
translation_notes:
  revision_awareness: Se siguió el texto griego normalizado de Didaché 7:3, con el contexto auditado de la versión inglesa POB. La revisión inglesa reciente aclaró la naturalidad de la condición ('do not have either') y la fórmula 'in the name'; en español se conservó esa claridad sin perder la literalidad de ἀμφότερα ni la cadencia ritual de la fórmula trinitaria.
  spanish_consistency_notes:
  - Se usó ‘Espíritu Santo’ con mayúsculas por tratarse de la tercera persona trinitaria.
  - Se mantuvo ‘en el nombre’ para reflejar la fórmula sacramental estable.
  - Se evitó ‘SEÑOR’ o equivalentes de sustitución, ya que el texto no contiene κύριος ni יהוה.
