translation:
  language: es
  text: 'Ahora bien, en cuanto al bautismo, bauticen de esta manera: habiendo dicho antes todas estas cosas, bauticen en el nombre[a] del Padre y del Hijo y del Espíritu Santo en agua viva. Pero si no tienes agua viva, bautiza en otra agua; y si no puedes en agua fría, entonces en agua caliente. Pero si no tienes ninguna de las dos, derrama agua sobre la cabeza tres veces en el nombre del Padre y del Hijo y del Espíritu Santo. Pero antes del bautismo, que ayunen previamente el que bautiza y el que es bautizado, y cualesquiera otros que puedan; y ordenarás al que es bautizado que ayune previamente uno o dos días.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La fórmula griega usa εἰς τὸ ὄνομα, literalmente «hacia/dentro del nombre». En español se vierte de manera natural como «en el nombre», pero el griego puede sugerir también un matiz de incorporación o entrada en relación con el nombre.
    reason: lexical_theological_clarification
lexical_decisions:
- source_word: βαπτίσματος / βαπτίσατε / βάπτισον
  english_pob_choice: baptism / baptize
  chosen_spanish: bautismo / bauticen / bautiza
  alternatives_spanish:
  - sumersión / sumerjan / sumerge
  - lavamiento / laven
  lexicon: BDAG
  rationale: Conservo el término ritual establecido para no diluir la instrucción eclesial a una mera ablución. El imperativo plural en español refleja el tono normativo del pasaje.
- source_word: ταῦτα πάντα προειπόντες
  english_pob_choice: Having first proclaimed all these things
  chosen_spanish: habiendo dicho antes todas estas cosas
  alternatives_spanish:
  - habiendo proclamado antes todas estas cosas
  - después de enseñar antes todas estas cosas
  lexicon: LSJ
  rationale: La frase griega indica una acción previa al rito; en español, 'habiendo dicho antes' conserva la secuencia sin exagerar el matiz de proclamación cuando el contexto inmediato es instrucción preparatoria.
- source_word: εἰς τὸ ὄνομα
  english_pob_choice: into the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - hacia el nombre
  - dentro del nombre
  lexicon: BDAG
  rationale: Aunque el inglés POB conserva 'into', en español 'en el nombre' es la fórmula más natural y fiel al uso litúrgico, sin forzar una construcción poco idiomática. La preposición mantiene la fórmula bautismal reconocible.
- source_word: ἐν ὕδατι ζῶντι
  english_pob_choice: in living water
  chosen_spanish: en agua viva
  alternatives_spanish:
  - en agua corriente
  - en agua fresca
  lexicon: LSJ
  rationale: '''Agua viva'' preserva la ambigüedad entre agua corriente y resonancia simbólica. Evita cerrar el sentido a una sola explicación práctica.'
- source_word: ἔκχεον
  english_pob_choice: pour
  chosen_spanish: derrama
  alternatives_spanish:
  - vierte
  - echa
  lexicon: BDAG
  rationale: '''Derrama'' reproduce bien el imperativo de verter agua sobre la cabeza en el caso de necesidad, con un registro claro y natural en español.'
- source_word: Πρὸ δὲ τοῦ βαπτίσματος προνηστευσάτω
  english_pob_choice: before the baptism, let ... fast beforehand
  chosen_spanish: Antes del bautismo, ayunen previamente
  alternatives_spanish:
  - antes del bautismo, ayune previamente
  - antes del bautismo, ayunen en preparación
  lexicon: LSJ
  rationale: Mantengo la fuerza preparatoria de προνηστεύω y el valor normativo del verbo en plural castellano, que aquí funciona como instrucción general.
- source_word: ὁ βαπτίζων καὶ ὁ βαπτιζόμενος
  english_pob_choice: the one baptizing and the one being baptized
  chosen_spanish: el que bautiza y el que es bautizado
  alternatives_spanish:
  - el bautizador y el bautizado
  - el que bautiza y el bautizando
  lexicon: BDAG
  rationale: La construcción con relativo es más natural en español y conserva la distinción de los participios presentes sin introducir terminología más técnica que la del texto.
- source_word: κελεύσεις
  english_pob_choice: you shall command
  chosen_spanish: tú ordenarás
  alternatives_spanish:
  - tú mandarás
  - deberás ordenar
  lexicon: BDAG
  rationale: '''Ordenarás'' conserva la fuerza de mandato de κελεύω. El sujeto explícito ''tú'' refleja el futuro con valor imperatival del original.'
- source_word: πρὸ μιᾶς ἢ δύο
  english_pob_choice: beforehand for one or two days
  chosen_spanish: uno o dos días
  alternatives_spanish:
  - por uno o dos días
  - durante uno o dos días
  lexicon: LSJ
  rationale: La elipsis griega apunta al período inmediatamente anterior al bautismo; en español, el contexto ya hace claro que se trata de uno o dos días de ayuno previos.
theological_decisions:
- issue: εἰς τὸ ὄνομα en la fórmula bautismal
  english_pob_reading: into the name
  chosen_spanish_reading: en el nombre
  alternative_spanish_readings:
  - hacia el nombre
  - dentro del nombre
  rationale: La decisión busca fidelidad y legibilidad en español. Aunque la preposición griega puede sugerir incorporación, la fórmula litúrgica española más estable es 'en el nombre', que no elimina la fuerza ritual del pasaje.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
- issue: Sentido de ὕδωρ ζῶν
  english_pob_reading: living water
  chosen_spanish_reading: agua viva
  alternative_spanish_readings:
  - agua corriente
  - agua fresca
  rationale: '''Agua viva'' mantiene el doble valor práctico y simbólico del griego. No conviene reducirlo a una simple indicación técnica de agua en movimiento.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Modo de bautismo en la sección
  english_pob_reading: Main text preserves both immersion-compatible language and the explicit allowance of pouring
  chosen_spanish_reading: El texto principal conserva tanto el lenguaje compatible con inmersión como la autorización explícita de derramar agua
  alternative_spanish_readings:
  - traducir de modo que sugiera solo inmersión
  - traducir de modo que sugiera solo aspersión
  rationale: El pasaje regula varias opciones sin polemizar por un solo modo. La traducción debe mantener esa amplitud y no imponer una controversia sacramental posterior.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological tension.'
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente en el tramo sobre agua fría: ''en agua fría'' y ''en caliente'' expresan el contraste explícito del griego, y la fórmula trinitaria final mantiene la repetición de ''del Padre y del Hijo y del Espíritu Santo'' con artículos en español por claridad y consistencia.'
  spanish_consistency_notes:
  - Uso 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - '''Espíritu Santo'' se capitaliza por tratarse de la referencia divina del fórmulario bautismal.'
  - Conservo 'bautismo/bautiza' en vez de reemplazarlo por un término más general.
  - No cierro el sentido de 'agua viva' a un solo modo material, para preservar la tensión del original.
  - La segunda fórmula trinitaria se armoniza con la primera sin alterar el contenido.
