  to: 'Ahora bien, en cuanto al bautismo, bauticen de esta manera: habiendo dicho antes todas estas cosas, bauticen en el nombre[a] del Padre y del Hijo y del Espíritu Santo en agua viva. Pero si no tienes agua viva, bautiza en otra agua; y si no puedes en agua fría, entonces en agua caliente. Pero si no tienes ninguna de las dos, derrama agua sobre la cabeza tres veces en el nombre del Padre y del Hijo y del Espíritu Santo. Pero antes del bautismo, que ayunen previamente el que bautiza y el que es bautizado, y cualesquiera otros que puedan; y ordenarás al que es bautizado que ayune previamente uno o dos días.'
