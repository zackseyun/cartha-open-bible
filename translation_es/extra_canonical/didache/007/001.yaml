review_pass:
  verdict: revise
  source_alignment_summary: El borrador español conserva bien la estructura general del griego y mantiene términos clave como «bautismo», «agua viva» y la alternativa de derramar agua tres veces. Sin embargo, suaviza una decisión fuente-teológica importante al traducir εἰς τὸ ὄνομα como «en el nombre» en vez de preservar al menos de forma señalada la fuerza de «hacia/dentro de/en unión con» que el inglés POB quiso mantener con «into the name». Además, «ayunen previamente el que bautiza y el que es bautizado» no refleja bien el singular exhortativo προνηστευσάτω ni suena natural en español.
  spanish_quality_summary: 'El texto es generalmente claro y eclesialmente legible, pero tiene dos problemas de naturalidad: 1) la mezcla de plural («bauticen») con singular («si no tienes… bautiza…») sigue el griego pero en español puede mantenerse; 2) la frase «ayunen previamente el que bautiza y el que es bautizado» es gramaticalmente forzada. «En caliente» también suena algo elíptico; «en agua caliente» es más claro. Conviene ajustar el tramo del ayuno y mejorar la nota sobre «el nombre» para no contradecir la filosofía del POB.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto en «Espíritu Santo», «Dios» no aplica aquí, y mantiene «bautismo/bautizar». La principal desviación es doctrinal-lexical: εἰς τὸ ὄνομα fue deliberadamente preservado en inglés como «into the name», pero la nota española justifica normalizarlo a la fórmula litúrgica tradicional, lo que reduce la tensión semántica que el proyecto busca conservar. En español no es necesario imponer un calco torpe, pero sí conviene señalar en nota el matiz de incorporación del griego.'
  issues:
  - severity: medium
    issue: La nota sobre «en el nombre» neutraliza demasiado εἰς τὸ ὄνομα.
    rationale: El audit trail inglés documenta explícitamente que debe preservarse la tensión de εἰς, evitando conformar el texto a la tradición litúrgica sin aviso. En español puede quedarse «en el nombre» por naturalidad, pero la nota debe explicar el matiz incorporativo del griego, no justificar su desaparición.
  - severity: medium
    issue: «Ayunen previamente el que bautiza y el que es bautizado» es poco natural y no refleja bien la sintaxis exhortativa.
    rationale: 'Προνηστευσάτω es singular de tercera persona con sentido exhortativo: «que ayunen de antemano…». La formulación actual suena incorrecta en español e interrumpe la legibilidad.'
  - severity: low
    issue: «Entonces en caliente» es menos claro que «entonces en agua caliente».
    rationale: La revisión inglesa añadió «water» para completitud y claridad. En español, repetir «agua» mejora la fluidez sin apartarse del griego.
  revised_spanish_text: 'Ahora bien, en cuanto al bautismo, bauticen de esta manera: habiendo dicho antes todas estas cosas, bauticen en el nombre[a] del Padre y del Hijo y del Espíritu Santo en agua viva. Pero si no tienes agua viva, bautiza en otra agua; y si no puedes en agua fría, entonces en agua caliente. Pero si no tienes ninguna de las dos, derrama agua sobre la cabeza tres veces en el nombre del Padre y del Hijo y del Espíritu Santo. Pero antes del bautismo, que ayunen previamente el que bautiza y el que es bautizado, y cualesquiera otros que puedan; y ordenarás al que es bautizado que ayune previamente uno o dos días.'
  revised_footnotes:
  - marker: a
    text: La fórmula griega usa εἰς τὸ ὄνομα, literalmente «hacia/dentro del nombre». En español se vierte de manera natural como «en el nombre», pero el griego puede sugerir también un matiz de incorporación o entrada en relación con el nombre.
    reason: lexical_theological_clarification
  revision_rationale: Se conserva la lectura principal del borrador, pero se corrige la nota para respetar la decisión documentada del POB sobre εἰς τὸ ὄνομα. También se repara el tramo del ayuno para que sea idiomático y fiel al valor exhortativo del griego, y se añade «agua» en «agua caliente» por claridad.
