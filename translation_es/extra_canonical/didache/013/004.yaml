  glossary_alignment: No hay términos del glosario mayor en juego salvo «profeta», que debe mantenerse como «profeta». La elección «a los pobres» alinea bien con τοῖς πτωχοῖς. Se preserva correctamente la decisión del POB de no suplir un objeto directo.
