base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/013/004.yaml
  text: But if you do not have a prophet, give to the poor.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:27Z'
    unchanged: false
    changes_summary: Removed "it" because no direct object is present in the Greek; the verse simply says, "give to the poor."
translation:
  language: es
  text: Pero si no tienen un profeta, den a los pobres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προφήτην
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - un profeta inspirado
  - un portavoz profético
  lexicon: προφήτης
  rationale: Conservo el término directo «profeta», que corresponde bien al sustantivo griego y mantiene la referencia a una persona con función profética sin añadir matices no presentes en el texto.
- source_word: δότε
  english_pob_choice: give
  chosen_spanish: den
  alternatives_spanish:
  - dénten
  - entreguen
  - den como ofrenda
  lexicon: δίδωμι
  rationale: «Den» reproduce el mandato plural y es idiomático en español. «Entreguen» sería más formal pero menos natural; «den como ofrenda» añade un contenido que el griego no expresa.
- source_word: τοῖς πτωχοῖς
  english_pob_choice: to the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los necesitados
  - a los indigentes
  lexicon: πτωχός
  rationale: «Pobres» es la equivalencia más directa. «Necesitados» suaviza el término y «indigentes» suena más sociológico que textual.
theological_decisions:
- issue: Destino de la acción de dar en ausencia de profeta
  english_pob_reading: give to the poor
  chosen_spanish_reading: den a los pobres
  alternative_spanish_readings:
  - den algo a los pobres
  - hagan una donación a los pobres
  rationale: 'Mantengo la ausencia de objeto directo explícito, tal como corrigió el texto inglés según el griego. El mandato queda abierto y simple: dar a los pobres, sin especificar el objeto dado.'
  doctrine_reference: Fidelidad al texto griego de Didaché 13:4 y a la revisión auditada del POB.
translation_notes:
  revision_awareness: La revisión inglesa eliminó «it» porque el griego no contiene objeto directo; por eso el español tampoco introduce ninguno. La frase queda ceñida al mandato simple del original.
  spanish_consistency_notes:
  - Se usa «profeta» en sentido directo, sin mayúsculas, porque el griego no requiere un título honorífico especial.
  - Se conserva el plural imperativo «den» para reflejar el mandato comunitario.
  - No se añade objeto directo ni complemento interpretativo, en consonancia con la revisión auditada del texto inglés.
