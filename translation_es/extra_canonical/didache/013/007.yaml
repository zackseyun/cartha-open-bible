  text: ἀργυρίου δὲ καὶ ἱματισμοῦ καὶ παντὸς κτήματος λαβὼν τὴν ἀπαρχὴν ὡς ἂν σοὶ δοξῇ, δὸς κατὰ τὴν ἐντολήν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/013/007.yaml
  text: And of money and clothing and every possession[a], having taken the firstfruit, as it seems good to you, give according to the commandment.
  footnotes:
  - marker: a
    text: Or 'silver'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:30Z'
    unchanged: false
    changes_summary: Adjusted the participle for completeness ('having taken'), corrected 'firstfruit,b' to 'firstfruit,' and removed the unnecessary object 'it' after 'give' since it is not explicit in the Greek.
translation:
  language: es
  text: Y de dinero[a], ropa y toda posesión, habiendo tomado la primicia, según te parezca, da conforme al mandamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: plata.'
    reason: Preserva la alternativa léxica literal de ἀργύριον documentada en el POB inglés, aunque aquí 'dinero' expresa mejor el sentido contextual.
lexical_decisions:
- source_word: ἀργυρίου
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - moneda
  lexicon: ἀργύριον
  rationale: El contexto lista bienes para dar en ofrenda o distribución, así que en español 'dinero' expresa mejor la función práctica que 'plata', aunque esta siga siendo una opción literal. No se usa 'SEÑOR' ni un eufemismo similar porque aquí no hay término divino.
- source_word: ἱματισμοῦ
  english_pob_choice: clothing
  chosen_spanish: vestido
  alternatives_spanish:
  - ropa
  - vestimenta
  lexicon: ἱματισμός
  rationale: '''Vestido'' conserva el sentido de prenda o indumentaria en un registro claro y breve. ''Ropa'' sería más coloquial; ''vestimenta'' más abstracto.'
- source_word: παντὸς κτήματος
  english_pob_choice: every possession
  chosen_spanish: toda posesión
  alternatives_spanish:
  - todo bien
  - todo lo que posees
  lexicon: κτῆμα
  rationale: '''Toda posesión'' mantiene el alcance general del griego sin añadir una paráfrasis. ''Todo bien'' suena más interpretativo; ''todo lo que posees'' explicita demasiado.'
- source_word: λαβὼν τὴν ἀπαρχὴν
  english_pob_choice: having taken the firstfruit
  chosen_spanish: habiendo tomado la primicia
  alternatives_spanish:
  - tomando la primicia
  - después de tomar la primicia
  lexicon: ἀπαρχή
  rationale: Se conserva el participio con un gerundio compuesto natural en español. 'Primicia' es el término bíblico habitual y mantiene la imagen cultual de la ofrenda inicial.
- source_word: ὡς ἂν σοὶ δοξῇ
  english_pob_choice: as it seems good to you
  chosen_spanish: según te parezca
  alternatives_spanish:
  - como te parezca bien
  - como te parezca conveniente
  lexicon: δοκέω
  rationale: La expresión transmite decisión prudencial personal, no mera opinión superficial. 'Según te parezca' es natural y fiel al matiz condicional.
- source_word: δὸς κατὰ τὴν ἐντολήν
  english_pob_choice: give according to the commandment
  chosen_spanish: da conforme al mandamiento
  alternatives_spanish:
  - da según el mandamiento
  - da de acuerdo con el mandamiento
  lexicon: ἐντολή
  rationale: '''Conforme al mandamiento'' conserva la referencia normativa del singular sin forzar a especificar cuál mandamiento es. Se mantiene la sobriedad del griego y del POB inglés.'
theological_decisions:
- issue: Naturaleza de la instrucción final
  english_pob_reading: according to the commandment
  chosen_spanish_reading: conforme al mandamiento
  alternative_spanish_readings:
  - según el mandamiento
  - conforme al precepto
  rationale: El texto griego no identifica explícitamente cuál mandamiento se presupone; por eso la traducción evita concretarlo. 'Mandamiento' conserva la forma singular y abierta del original.
  doctrine_reference: No aplica; observación de ambigüedad textual/instruccional sin expansión doctrinal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió ἀργυρίου de 'silver' a 'money' y la que ajustó el participio a 'having taken', además de eliminar el objeto implícito de 'give'. La versión española refleja esas decisiones con 'dinero' y 'habiendo tomado', sin añadir pronombres u objetos inexistentes en el griego.
  spanish_consistency_notes:
  - Se evitó traducir ἀργύριον como 'plata' en el texto principal por coherencia con la revisión auditada que favorece 'money'.
  - Se mantuvo un registro sobrio y eclesial, pero sin introducir terminología tradicional no sustentada por la fuente.
  - No se usaron notas al pie porque no hay una ambigüedad textual adicional que deba marcarse en español.
