- from: Y de dinero, y de vestido, y de toda posesión, habiendo tomado la primicia, según te parezca, da conforme al mandamiento.
  to: Y de dinero[a], ropa y toda posesión, habiendo tomado la primicia, según te parezca, da conforme al mandamiento.
