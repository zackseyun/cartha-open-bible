    issue: Se pierde el énfasis de καὶ αὐτός.
    rationale: El griego y el inglés POB subrayan que el maestro 'también él mismo' es digno. El borrador reduce esto a 'también es digno', que comunica adición pero no el matiz enfático personal.
  revised_spanish_text: Asimismo, un maestro verdadero también él mismo es digno, como el trabajador, de su alimento.
  revision_rationale: Se añadió 'él mismo' para reflejar con mayor fidelidad καὶ αὐτός y el inglés POB 'also himself', manteniendo un español todavía comprensible y sobrio. No se requieren notas al pie.
