base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/013/002.yaml
  text: Likewise a true teacher is also himself worthy, like the worker, of his food.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:27Z'
    unchanged: false
    changes_summary: Adjusted word order from 'himself also' to the more natural English 'also himself' while preserving the source emphasis and meaning.
translation:
  language: es
  text: Asimismo, un maestro verdadero también él mismo es digno, como el trabajador, de su alimento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὡσαύτως
  english_pob_choice: Likewise
  chosen_spanish: Asimismo
  alternatives_spanish:
  - Igualmente
  - De igual manera
  lexicon: ὡσαύτως
  rationale: Conserva la relación de correspondencia con la línea anterior sin sonar rígido; «asimismo» es natural en español y mantiene el valor aditivo/comparativo.
- source_word: διδάσκαλος ἀληθινός
  english_pob_choice: a true teacher
  chosen_spanish: un maestro verdadero
  alternatives_spanish:
  - un maestro auténtico
  - un verdadero maestro
  lexicon: διδάσκαλος
  rationale: «Maestro» comunica bien la función de enseñar en español; «verdadero» refleja ἀληθινός como genuino o real, sin introducir un matiz doctrinal no presente en el texto.
- source_word: ἐστιν ἄξιος καὶ αὐτός
  english_pob_choice: is also himself worthy
  chosen_spanish: también es digno
  alternatives_spanish:
  - también él mismo es digno
  - es digno también
  lexicon: ἄξιος
  rationale: El griego enfatiza que el maestro comparte la misma dignidad de sostén que el trabajador. En español, «también es digno» transmite el sentido sin forzar una repetición reflexiva innecesaria; «también él mismo» podría sonar pesado.
- source_word: ὥσπερ ὁ ἐργάτης
  english_pob_choice: like the worker
  chosen_spanish: como el trabajador
  alternatives_spanish:
  - igual que el trabajador
  - como el obrero
  lexicon: ἐργάτης
  rationale: «Trabajador» preserva la referencia genérica a quien trabaja por su sustento. «Obrero» sería posible, pero puede sonar más restringido o moderno; aquí el paralelismo general es más importante.
- source_word: τῆς τροφῆς αὐτοῦ
  english_pob_choice: of his food
  chosen_spanish: de su alimento
  alternatives_spanish:
  - de su comida
  - de su sustento
  lexicon: τροφή
  rationale: «Alimento» conserva el sentido básico de comida/nutrición y mantiene el paralelo con el deber de sostén. «Sustento» explicita la implicación, pero se aleja un poco del término literal; por eso se mantiene la forma más cercana al griego.
theological_decisions:
- issue: Derecho del maestro a recibir sostén
  english_pob_reading: a true teacher is also himself worthy, like the worker, of his food
  chosen_spanish_reading: un maestro verdadero también es digno, como el trabajador, de su alimento
  alternative_spanish_readings:
  - un maestro verdadero también merece, como el trabajador, su alimento
  - un maestro verdadero también es digno de su sustento, como el trabajador
  rationale: 'El texto establece una comparación normativa entre el maestro y el trabajador: ambos tienen derecho al sustento. «Es digno de su alimento» mantiene la formulación sobria y la equivalencia con el griego, sin convertirla en una explicación más amplia de justicia salarial.'
  doctrine_reference: Principio ético de sostén para quienes enseñan o trabajan; cf. 1 Corintios 9:14 como paralelo temático
translation_notes:
  revision_awareness: La redacción inglesa más reciente solo ajustó el orden de palabras ('also himself' -> 'also himself' en posición natural) sin cambiar el sentido. La versión española refleja ese mismo énfasis de manera idiomática, sin añadir o perder contenido.
  spanish_consistency_notes:
  - Se usa «maestro» para διδάσκαλος por ser la forma más clara y natural en español eclesial general.
  - Se mantiene «alimento» para τῆς τροφῆς, evitando una paráfrasis a «sustento» que sería interpretativa.
  - No se introduce una nota textual porque no hay variantes ni tensiones textuales documentadas en el paquete fuente.
  - La construcción «también es digno» reproduce el énfasis de καὶ αὐτός de forma fluida en español.
