  text: Ὡσαύτως κεράμιον οἴνου ἢ ἐλαίου ἀνοίξας, τὴν ἀπαρχὴν λαβὼν δὸς τοῖς προφήταις·
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/013/006.yaml
  text: Likewise, when you open a jar of wine or oil, take the firstfruits and give them to the prophets.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:29Z'
    unchanged: false
    changes_summary: Adjusted 'firstfruit' to plural 'firstfruits' to better reflect τὴν ἀπαρχὴν in idiomatic formal English, and added 'them' for natural English object reference.
translation:
  language: es
  text: Asimismo, cuando abras un jarro de vino o de aceite, toma las primicias y dáselas a los profetas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὡσαύτως
  english_pob_choice: Likewise
  chosen_spanish: Así mismo
  alternatives_spanish:
  - Igualmente
  - Del mismo modo
  lexicon: ὡσαύτως
  rationale: Expresa la conexión aditiva con la instrucción anterior de manera natural en español, sin perder el valor de correspondencia de la fórmula.
- source_word: κεράμιον
  english_pob_choice: jar
  chosen_spanish: jarro
  alternatives_spanish:
  - jarra
  - vasija
  - recipiente
  lexicon: κεράμιον
  rationale: El término griego designa un recipiente de barro; 'jarro' comunica bien la forma funcional en español, con un registro sencillo y digno.
- source_word: οἴνου ἢ ἐλαίου
  english_pob_choice: of wine or oil
  chosen_spanish: de vino o de aceite
  alternatives_spanish:
  - de vino o aceite
  - de vino y aceite
  lexicon: οἶνος / ἔλαιον
  rationale: Mantiene la disyunción del griego ('o'), y conserva los dos productos sin añadir especificación no presente en el texto.
- source_word: ἀνοίξας
  english_pob_choice: when you open
  chosen_spanish: cuando abras
  alternatives_spanish:
  - al abrir
  - cuando abres
  lexicon: ἀνοίγω
  rationale: Conserva la acción circunstancial en segunda persona singular, natural en español y fiel al participio aoristo.
- source_word: τὴν ἀπαρχὴν
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - la primicia
  - los primeros frutos
  lexicon: ἀπαρχή
  rationale: '''Primicias'' es el equivalente bíblico tradicional y preciso en español; el plural concuerda con la revisión inglesa que corrigió ''firstfruit'' a ''firstfruits'' y evita reducir el valor colectivo del término.'
- source_word: τοῖς προφήταις
  english_pob_choice: to the prophets
  chosen_spanish: a los profetas
  alternatives_spanish:
  - para los profetas
  - a los profetas del Señor
  lexicon: προφήτης
  rationale: Mantiene el dativo de destinatario como destino de la ofrenda, sin introducir una expansión interpretativa.
theological_decisions:
- issue: Sentido cultual de 'las primicias' como ofrenda
  english_pob_reading: take the firstfruits and give them to the prophets
  chosen_spanish_reading: toma las primicias y dáselas a los profetas
  alternative_spanish_readings:
  - toma la primicia y dásela a los profetas
  - toma los primeros frutos y dáselos a los profetas
  rationale: La forma plural 'primicias' preserva el valor colectivo/cultual del gesto y refleja mejor la revisión inglesa que corrigió el singular. En español, la expresión sugiere una porción consagrada, no solo 'primer fruto' en sentido agrícola.
  doctrine_reference: Prácticas de ofrenda y consagración en contexto comunitario
- issue: Relación de instrucciones prácticas en la Didaché
  english_pob_reading: Likewise
  chosen_spanish_reading: Así mismo
  alternative_spanish_readings:
  - Igualmente
  - Del mismo modo
  rationale: No introduce interpretación doctrinal; simplemente enlaza esta regla con las anteriores, manteniendo el carácter instructivo del pasaje.
  doctrine_reference: Coherencia textual e instrucción moral-litúrgica
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó 'firstfruit' a 'firstfruits' y añadió 'them' para naturalidad. La versión española refleja ese mismo ajuste con 'las primicias' y el pronombre enclítico 'dáselas', evitando el singular y conservando la referencia colectiva del término griego.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y claro, sin arcaísmos innecesarios.
  - No se añadió 'Señor' ni otras expansiones no presentes en el griego.
  - 'La estructura verbal conserva la secuencia condicional/temporal del original: ''cuando abras... toma... y dáselas''.'
