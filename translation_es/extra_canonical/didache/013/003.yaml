source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Πᾶσαν οὖν ἀπαρχὴν γεννημάτων ληνοῦ καὶ ἅλωνος, βοῶν τε καὶ προβάτων λαβὼν δώσεις τοῖς προφήταις· αὐτοὶ γάρ εἰσιν οἱ ἀρχιερεῖς ὑμῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/013/003.yaml
  text: Therefore, taking every firstfruit of the produce of the winepress and threshing floor, and of cattle and sheep, you shall give it to the prophets, for they are your high priests.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:28Z'
    unchanged: false
    changes_summary: Added 'the' before 'winepress' for more natural English and clearer linkage to 'threshing floor'; otherwise retained the draft.
translation:
  language: es
  text: Por tanto, al tomar toda primicia del producto del lagar y de la era, y del ganado y de las ovejas, se la darás a los profetas, porque ellos son sus sumos sacerdotes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πᾶσαν οὖν ἀπαρχὴν
  english_pob_choice: every firstfruit
  chosen_spanish: toda primicia
  alternatives_spanish:
  - toda primera ofrenda
  - toda ofrenda de primicias
  lexicon: ἀπαρχή
  rationale: «Primicia» conserva el valor cultual de la ofrenda inicial/primer producto, y «toda» refleja el alcance total de πᾶσαν sin añadir una pluralidad que el griego no exige.
- source_word: γεννημάτων
  english_pob_choice: produce
  chosen_spanish: producción
  alternatives_spanish:
  - producto
  - cosecha
  lexicon: γεννήματα
  rationale: El término abarca los frutos o productos generados; «producción» permite abarcar tanto cultivos como otros rendimientos sin restringirlo solo a granos o frutos.
- source_word: ληνοῦ καὶ ἅλωνος
  english_pob_choice: of the winepress and threshing floor
  chosen_spanish: del lagar y de la era
  alternatives_spanish:
  - del lagar y de la trilla
  - del lagar y del piso de trillar
  lexicon: ληνός / ἅλων
  rationale: Se conserva la imagen agrícola concreta. «Era» es el término castellano más natural para ἅλωνος y mantiene el paralelo con «lagar».
- source_word: βοῶν τε καὶ προβάτων
  english_pob_choice: of cattle and sheep
  chosen_spanish: de vacas y ovejas
  alternatives_spanish:
  - de ganado y ovejas
  - de bueyes y ovejas
  lexicon: βοῦς / πρόβατον
  rationale: «Vacas» y «ovejas» sigue la oposición doméstica y es idiomático en español; «bueyes» sería más literal para βοῶν en algunos contextos, pero aquí el sentido general de ganado mayor se comunica con claridad.
- source_word: τοῖς προφήταις
  english_pob_choice: to the prophets
  chosen_spanish: a los profetas
  alternatives_spanish:
  - a los profetas
  lexicon: προφήτης
  rationale: Se mantiene «profetas» como en el texto fuente; no se introduce una equivalencia institucional diferente.
theological_decisions:
- issue: αὐτοὶ γάρ εἰσιν οἱ ἀρχιερεῖς ὑμῶν
  english_pob_reading: for they are your high priests
  chosen_spanish_reading: porque ellos son vuestros sumos sacerdotes
  alternative_spanish_readings:
  - porque ellos son vuestros altos sacerdotes
  - porque ellos son vuestros grandes sacerdotes
  rationale: «Sumos sacerdotes» conserva el título cultual jerárquico del griego ἀρχιερεῖς. Aunque el contexto de la Didaché aplica el lenguaje sacerdotal a los profetas, la traducción no suaviza la afirmación para no borrar la tensión terminológica del texto.
  doctrine_reference: Didaché 13:3; uso cultual de ἀρχιερεύς en el judaísmo y su aplicación a los profetas en la comunidad didáctica
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Hitchcock & Brown 1884 (OCR normalizado) y toma como referencia la auditoría inglesa POB, incorporando la pequeña corrección de estilo observada allí («the winepress»). En español no se requirió una nota adicional, porque la estructura griega y la versión inglesa coinciden de manera alta y no presentan variantes textuales relevantes en este versículo.
  spanish_consistency_notes:
  - Se mantiene el registro formal y eclesial sin recurrir a fórmulas litúrgicas ajenas al griego.
  - «Lagar» y «era» sostienen la imaginería agrícola concreta sin volverla genérica.
  - No se introduce «Cristo» ni «SEÑOR», porque el versículo no contiene esos términos.
  - Se conserva la designación sacerdotal en su fuerza máxima («sumos sacerdotes») para reflejar la afirmación del texto.
