review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y la POB inglesa en casi todos los puntos clave: «establecerse entre ustedes» refleja bien καθῆσαι πρὸς ὑμᾶς; «alimento» conserva la concreción de τροφή; «primicia» mantiene el valor cultual de ἀπαρχή; y «porque ellos son sus sumos sacerdotes» preserva correctamente la afirmación fuerte de ἀρχιερεῖς. También mantiene adecuadamente la secuencia de bienes: lagar, era, bueyes, ovejas, pan, vino, aceite, plata, ropa y posesiones. La principal desviación está en el tratamiento de los imperativos singular/plural: el griego alterna entre plural («darán») y singular («si haces pan… toma… da»; «abriendo… toma… da»; «como te parezca»), mientras el español uniforma todo en plural. Eso suaviza un rasgo formal del texto. Además, «jarro» es comprensible, pero «vasija» suena más natural y más fiel al recipiente cerámico genérico de κεράμιον en registro bíblico.'
  spanish_quality_summary: 'El español es claro, eclesialmente legible y en general natural. Sin embargo, conviene ajustar la concordancia pronominal para reflejar mejor el cambio de número del original, y mejorar un par de detalles estilísticos: «vasija» encaja mejor que «jarro» en un tono digno y amplio; y la colocación de la nota [a] funciona mejor pegada a «pan» sin coma. Fuera de eso, la redacción es sólida y no suena acartonada.'
  glossary_alignment: 'La terminología está bien alineada con las decisiones POB: «sumos sacerdotes» para ἀρχιερεῖς, «primicia» para ἀπαρχή, «alimento» para τροφή, «establecerse entre ustedes» para la residencia durativa, y «conforme al mandamiento» para κατὰ τὴν ἐντολήν. No hay conflicto con las pautas de Yahvé/Mesías/etc. El único ajuste terminológico recomendado es «vasija» por κεράμιον, por mayor neutralidad y fidelidad contextual.'
  issues:
  - severity: medium
    issue: Se pierde la alternancia singular/plural de los mandatos en la segunda mitad del versículo.
    rationale: El griego pasa de instrucciones en plural a una serie en singular («si haces pan… toma… da», «como te parezca»). El borrador español homogeneiza todo en plural («si hacen… tomen… denla… les parezca»), lo que reduce un rasgo formal del original y de la POB inglesa.
  - severity: low
    issue: «Jarro» es menos adecuado que «vasija» para κεράμιον en este registro.
    rationale: Aunque «jarro» no es incorrecto, puede sugerir un recipiente más específico o coloquial. «Vasija» mantiene mejor la idea de recipiente cerámico doméstico en un español bíblico-natural.
  - severity: low
    issue: La puntuación del anclaje de la nota [a] puede mejorarse.
    rationale: «Si hacen pan,[a]» es comprensible, pero «Si haces pan[a]» integra mejor la nota en la palabra pertinente y evita una coma innecesaria.
