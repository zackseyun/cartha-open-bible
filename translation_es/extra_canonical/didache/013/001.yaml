revisions:
- from: Pero todo profeta verdadero que quiera establecerse entre ustedes es digno de su alimento. Asimismo, un maestro verdadero también es digno, como el trabajador, de su alimento. Por tanto, tomando toda primicia de los productos del lagar y de la era, y de bueyes y ovejas, se la darán a los profetas, porque ellos son sus sumos sacerdotes. Pero si no tienen un profeta, denla a los pobres. Si hacen pan,[a] tomen la primicia y denla conforme al mandamiento. Asimismo, cuando abran un jarro de vino o de aceite, tomen la primicia y denla a los profetas. Y de plata, de ropa y de toda posesión, tomen la primicia[b], como les parezca bien, y denla conforme al mandamiento.
  to: Pero todo profeta verdadero que quiera establecerse entre ustedes es digno de su alimento. Asimismo, un maestro verdadero también es digno, como el trabajador, de su alimento. Por tanto, tomando toda primicia de los productos del lagar y de la era, y de bueyes y ovejas, se la darán a los profetas, porque ellos son sus sumos sacerdotes. Pero si no tienen un profeta, denla a los pobres. Si haces pan[a], toma la primicia y dala conforme al mandamiento. Asimismo, cuando abras una vasija de vino o de aceite, toma la primicia y dala a los profetas. Y de plata, de ropa y de toda posesión, toma la primicia[b], como te parezca bien, y dala conforme al mandamiento.
