translation:
  language: es
  text: Pero todo profeta verdadero que quiera establecerse entre ustedes es digno de su alimento. Asimismo, un maestro verdadero también es digno, como el trabajador, de su alimento. Por tanto, tomando toda primicia de los productos del lagar y de la era, y de bueyes y ovejas, se la darán a los profetas, porque ellos son sus sumos sacerdotes. Pero si no tienen un profeta, denla a los pobres. Si haces pan[a], toma la primicia y dala conforme al mandamiento. Asimismo, cuando abras una vasija de vino o de aceite, toma la primicia y dala a los profetas. Y de plata, de ropa y de toda posesión, toma la primicia[b], como te parezca bien, y dala conforme al mandamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega es irregular en la forma transmitida; el sentido sigue con mayor probabilidad la idea de preparar o hacer pan.
    reason: source_note
  - marker: b
    text: 'La primicia se extiende aquí de modo más amplio: no solo a productos agrícolas, sino también a plata, ropa y toda posesión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθῆσαι πρὸς ὑμᾶς
  english_pob_choice: to settle among you
  chosen_spanish: establecerse entre ustedes
  alternatives_spanish:
  - quedarse con ustedes
  - residir entre ustedes
  lexicon: LSJ
  rationale: La idea no es solo una visita breve, sino una permanencia dentro de la comunidad. «Establecerse entre ustedes» conserva ese sentido durativo de residencia y suena natural en español.
- source_word: τροφῆς
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - sustento
  - nourrición
  lexicon: BDAG
  rationale: En este contexto de primicias y provisión material, «alimento» mantiene el sentido corporal y práctico sin volverlo abstracto. Evita además que suene demasiado coloquial.
- source_word: ἀπαρχὴν
  english_pob_choice: firstfruit
  chosen_spanish: primicia
  alternatives_spanish:
  - primicias
  - primera parte
  - primer fruto
  lexicon: BDAG
  rationale: «Primicia» reproduce bien el valor cultual y bíblico del término, y funciona naturalmente en español eclesial. Aunque el singular griego se repite, en español el singular puede sonar más técnico y fiel al uso ritual.
- source_word: γεννημάτων
  english_pob_choice: produce
  chosen_spanish: productos
  alternatives_spanish:
  - frutos
  - cosechas
  - rendimiento
  lexicon: LSJ
  rationale: El término abarca lo producido por la tierra. «Productos» es amplio y comprensible en español, y permite incluir el paralelo con lagar y era sin restringir demasiado el campo semántico.
- source_word: ἀρχιερεῖς
  english_pob_choice: high priests
  chosen_spanish: sumos sacerdotes
  alternatives_spanish:
  - sumos pontífices
  - jefes de los sacerdotes
  - pontífices
  lexicon: BDAG
  rationale: «Sumos sacerdotes» preserva la intensidad del título y la analogía cultual fuerte del Didaché. «Sacerdotes» a secas debilitaría esa identificación explícita.
- source_word: Ἐὰν σιτιαυτοῖς
  english_pob_choice: If you make bread
  chosen_spanish: Si hacen pan
  alternatives_spanish:
  - Si preparan pan
  - Si cuecen pan
  - Si elaboran pan
  lexicon: LSJ
  rationale: La forma OCR es irregular, pero la lectura contextual apunta a la preparación de pan. «Si hacen pan» conserva la idea concreta y refleja la solución textual adoptada por la POB inglesa.
- source_word: κεράμιον
  english_pob_choice: jar
  chosen_spanish: jarro
  alternatives_spanish:
  - jarra
  - vasija
  - recipiente
  lexicon: BDAG
  rationale: «Jarro» es concreto y natural para un recipiente doméstico de vino u aceite. Mantiene la imagen cotidiana sin sonar artificial.
- source_word: κτήματος
  english_pob_choice: possession
  chosen_spanish: posesión
  alternatives_spanish:
  - propiedad
  - bien
  - pertenencia
  lexicon: BDAG
  rationale: El término es amplio y colectivo. «Posesión» reproduce esa amplitud mejor que una traducción más restringida como «propiedad».
- source_word: ὡς ἂν σοὶ δοξῇ
  english_pob_choice: as it seems good to you
  chosen_spanish: como les parezca bien
  alternatives_spanish:
  - como mejor les parezca
  - como les parezca conveniente
  - según les parezca
  lexicon: BDAG
  rationale: La frase otorga discreción en la cantidad o manera de dar. «Como les parezca bien» es fiel, idiomático y conserva el matiz de libertad evaluativa.
- source_word: κατὰ τὴν ἐντολήν
  english_pob_choice: according to the commandment
  chosen_spanish: conforme al mandamiento
  alternatives_spanish:
  - según el mandamiento
  - de acuerdo con el mandamiento
  - como está mandado
  lexicon: BDAG
  rationale: «Mandamiento» conserva el tono formal y normativo del texto. «Conforme al mandamiento» suena más natural en español que una repetición rígida de «según».
theological_decisions:
- issue: Estatus de los profetas como 'sumos sacerdotes'
  english_pob_reading: Retain the direct statement 'for they are your high priests' in the main text.
  chosen_spanish_reading: Conservar la afirmación directa «porque ellos son sus sumos sacerdotes».
  alternative_spanish_readings:
  - porque sirven como sus sacerdotes
  - porque son como sus sumos sacerdotes
  rationale: El griego identifica sin rodeos a los profetas con ese título cultual. Mantener la formulación fuerte evita suavizar la imagen eclesial y sacrificial del pasaje.
  doctrine_reference: Eclesiología, ministerio
- issue: Soporte material para ministros residentes
  english_pob_reading: Render τροφή concretely as 'food' while allowing the context to imply livelihood.
  chosen_spanish_reading: Traducir τροφή de forma concreta como «alimento», dejando que el contexto implique el sustento.
  alternative_spanish_readings:
  - sustento
  - mantenimiento
  rationale: El capítulo habla de primicias, pan, vino, aceite, plata, ropa y bienes; por eso conviene conservar una referencia concreta. «Alimento» mantiene la base material y no diluye el trasfondo económico.
  doctrine_reference: Eclesiología, mayordomía
translation_notes:
  revision_awareness: La base inglesa ya había resuelto el pasaje difícil Ἐὰν σιτιαυτοῖς como «If you make bread», siguiendo una lectura contextual más probable que la OCR normalizada. También se mantuvo sin suavizar la identificación de los profetas como «your high priests», y se conservó la repetición de ἀπαρχή/firstfruit como término cultual consistente. La presente versión española sigue esas decisiones, ajustándolas a un español natural y eclesial sin perder el perfil técnico del texto.
  spanish_consistency_notes:
  - Se mantuvo «primicia» de manera uniforme para ἀπαρχή a lo largo de toda la sección.
  - «Alimento» se usa de forma consistente para τροφή, evitando alternar con «sustento» en el cuerpo principal.
  - 'Se preservó la distinción entre bienes agrícolas, domésticos y patrimoniales: productos, pan, vino, aceite, plata, ropa y posesión.'
  - La segunda cláusula de primicias se deja sin glosa en el texto principal, pero se aclara en la nota b la extensión material del término.
  - Se evitó sustituir «sumos sacerdotes» por un equivalente menos fuerte, para no atenuar la analogía cultual del original.
