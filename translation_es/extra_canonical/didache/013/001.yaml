  text: Πᾶς δὲ προφήτης ἀληθινός, θέλων καθῆσαι πρὸς ὑμᾶς, ἄξιός ἐστι τῆς τροφῆς αὐτοῦ. Ὡσαύτως διδάσκαλος ἀληθινός ἐστιν ἄξιος καὶ αὐτός, ὥσπερ ὁ ἐργάτης, τῆς τροφῆς αὐτοῦ. Πᾶσαν οὖν ἀπαρχὴν γεννημάτων ληνοῦ καὶ ἅλωνος, βοῶν τε καὶ προβάτων λαβὼν δώσεις τοῖς προφήταις· αὐτοὶ γάρ εἰσιν οἱ ἀρχιερεῖς ὑμῶν. Ἐὰν δὲ μὴ ἔχητε προφήτην, δότε τοῖς πτωχοῖς. Ἐὰν σιτιαυτοῖς, τὴν ἀπαρχὴν λαβὼν δὸς κατὰ τὴν ἐντολήν. Ὡσαύτως κεράμιον οἴνου ἢ ἐλαίου ἀνοίξας, τὴν ἀπαρχὴν λαβὼν δὸς τοῖς προφήταις· ἀργυρίου δὲ καὶ ἱματισμοῦ καὶ παντὸς κτήματος λαβὼν τὴν ἀπαρχὴν ὡς ἂν σοὶ δοξῇ, δὸς κατὰ τὴν ἐντολήν.
  language: Greek
  pages:
  - 38
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number noise and page segmentation were cleaned, but the translation must stay anchored in the Greek wording.
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/013/001.yaml
  text: But every true prophet who wishes to settle among you is worthy of his food. Likewise a true teacher is himself also worthy, like the worker, of his food. Therefore, taking every firstfruit of the produce of the winepress and threshing floor, and of cattle and sheep, you shall give it to the prophets, for they are your high priests. But if you do not have a prophet, give it to the poor. If you make bread,a take the firstfruit and give it according to the commandment. Likewise, when you open a jar of wine or oil, take the firstfruit and give it to the prophets. And of silver and clothing and every possession, take the firstfruit,b as it seems good to you, and give it according to the commandment.
