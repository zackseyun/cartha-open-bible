  text: Ἐὰν σιτιαυτοῖς, τὴν ἀπαρχὴν λαβὼν δὸς κατὰ τὴν ἐντολήν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/013/005.yaml
  text: If you prepare food[a], take the firstfruits and give according to the commandment.
  footnotes:
  - marker: a
    text: Or 'If you make bread,a take the firstfruit'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:28Z'
    unchanged: false
    changes_summary: Replaced 'make bread' with 'prepare food' to reflect σιτιαυτοῖς more accurately; changed 'firstfruit' to plural 'firstfruits' for natural English; removed unnecessary 'it' for a more direct rendering.
translation:
  language: es
  text: Si preparas alimentos[a], toma las primicias y da conforme al mandamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si haces pan, toma la primicia».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐὰν σιτιαυτοῖς
  english_pob_choice: If you prepare food
  chosen_spanish: Si preparas alimentos
  alternatives_spanish:
  - Si haces pan
  - Si preparas comida
  lexicon: σῖτος / σιτία
  rationale: El griego apunta a la preparación de alimentos en general, no solo a pan. «Alimentos» conserva el alcance amplio y sigue la revisión inglesa que corrigió «make bread» por «prepare food».
- source_word: τὴν ἀπαρχὴν
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - la primicia
  - las primeras ofrendas
  lexicon: ἀπαρχή
  rationale: «Primicias» es el equivalente español más natural y fiel para la ofrenda de los primeros frutos, manteniendo el valor cultual del término.
- source_word: δὸς κατὰ τὴν ἐντολήν
  english_pob_choice: give according to the commandment
  chosen_spanish: da conforme al mandamiento
  alternatives_spanish:
  - da según el mandamiento
  - ofrece conforme al mandamiento
  lexicon: ἐντολή
  rationale: «Conforme al mandamiento» reproduce con sobriedad la norma implícita; «da» conserva la brevedad imperativa del griego.
theological_decisions:
- issue: Regla ritual sobre primicias en un contexto de preparación de alimentos
  english_pob_reading: take the firstfruits and give according to the commandment
  chosen_spanish_reading: toma las primicias y da conforme al mandamiento
  alternative_spanish_readings:
  - ofrece las primicias y da conforme al mandamiento
  - toma la primicia y da conforme al mandamiento
  rationale: Se mantiene el carácter prescriptivo y ritual del dicho, sin suavizarlo a una simple recomendación. «Mandamiento» conserva la referencia a una norma recibida, tal como refleja la traducción inglesa.
  doctrine_reference: Práctica cultual / ofrenda de primicias en tradición bíblica
translation_notes:
  revision_awareness: La versión inglesa reciente corrigió una lectura más estrecha («make bread») a una más amplia («prepare food»), y eliminó un marcador de nota errante. La redacción española sigue esa revisión, manteniendo el alcance general de σιτιαυτοῖς y el plural natural de «primicias».
  spanish_consistency_notes:
  - Se prefirió «primicias» en plural para reflejar el valor colectivo de ἀπαρχή en este contexto y para sonar natural en español.
  - Se evitó «Señor» o «ofrenda» porque el griego aquí no los exige; la frase conserva el mandato de forma directa.
  - La nota ofrece la alternativa tradicional centrada en pan, ya que la tradición interpretativa puede leer el verbo de ese modo, pero el texto base favorece una referencia más general a alimentos.
