source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Μὴ γίνου πρὸς μὲν τὸ λαβεῖν ἐκτείνων τὰς χεῖρας, πρὸς δὲ τὸ δοῦναι συσπῶν·
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/004/005.yaml
  text: Do not be one who stretches out his hands to receive[a], but draws them in to avoid giving.
  footnotes:
  - marker: a
    text: Or 'Do not be one who stretches out his hands to receive, but to give, draws them in.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:21Z'
    unchanged: false
    changes_summary: 'Added ''avoid'' to reflect the contrast implied by συσπῶν in context: drawing the hands in with respect to giving, i.e., withholding rather than merely drawing them in.'
translation:
  language: es
  text: No seas de los que extienden las manos para recibir[a], pero las encogen para no dar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No seas de los que extienden las manos para recibir, sino para dar, las encogen».'
    reason: alternative_reading
lexical_decisions:
- source_word: Μὴ γίνου
  english_pob_choice: Do not be one who...
  chosen_spanish: No seas de los que...
  alternatives_spanish:
  - No llegues a ser de los que...
  - No te hagas de los que...
  lexicon: μή + γίνομαι
  rationale: La construcción griega exhorta a no llegar a ser cierto tipo de persona; en español, 'No seas de los que' conserva el tono admonitorio breve y oral del texto didáctico sin forzar un calco.
- source_word: πρὸς μὲν τὸ λαβεῖν
  english_pob_choice: stretches out his hands to receive
  chosen_spanish: extienden las manos para recibir
  alternatives_spanish:
  - alargan las manos para recibir
  - tienden las manos para recibir
  lexicon: πρός + infinitivo; λαμβάνω
  rationale: '''Extender las manos'' reproduce bien la imagen corporal de la disposición a tomar; ''recibir'' mantiene el valor de λαβεῖν y su contraste con dar.'
- source_word: τὰς χεῖρας
  english_pob_choice: his hands
  chosen_spanish: las manos
  alternatives_spanish:
  - sus manos
  - las manos de uno
  lexicon: χείρ
  rationale: Se omite el posesivo porque en español resulta natural y no añade contenido; el sentido genérico queda claro por el contexto exhortativo.
- source_word: πρὸς δὲ τὸ δοῦναι συσπῶν
  english_pob_choice: but draws them in to avoid giving
  chosen_spanish: pero las encogen para no dar
  alternatives_spanish:
  - pero las retraen para no dar
  - pero las recogen para no dar
  lexicon: συσπάω
  rationale: 'συσπῶν expresa la idea de retraer o encoger; ''encogen'' es idiomático en español y conserva la oposición ética del texto: retraer las manos con respecto al dar, es decir, negarse a dar.'
theological_decisions:
- issue: Tensión moral entre recibir y dar
  english_pob_reading: Do not be one who stretches out his hands to receive, but draws them in to avoid giving.
  chosen_spanish_reading: No seas de los que extienden las manos para recibir, pero las encogen para no dar.
  alternative_spanish_readings:
  - No seas de los que extienden las manos para recibir, pero las encogen para dar.
  - No seas de los que extienden las manos para recibir, pero las retraen para no dar.
  rationale: La revisión inglesa subraya que el gesto no es solo retraerse, sino hacerlo 'para evitar dar'. En español, 'para no dar' preserva esa intención negativa sin añadir explicaciones; la forma evita suavizar la censura ética del dicho.
  doctrine_reference: Ética cristiana de la generosidad y la hospitalidad en la enseñanza moral temprana
translation_notes:
  revision_awareness: La revisión inglesa más reciente aclaró que συσπῶν no significa simplemente 'draws them in to give', sino 'draws them in to avoid giving'. Por eso el español adopta una formulación explícita de negación ('para no dar') que conserva el contraste moral y la cadencia breve del original.
  spanish_consistency_notes:
  - Se mantiene 'dar/recibir' como contraste central.
  - Se evita 'siervo' u otra terminología ajena; el texto es proverbial y moral, no técnico.
  - La nota alternativa refleja la inversión posible del complemento verbal en la frase griega, sin imponerla en el texto principal.
