review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general del griego: confesión en la asamblea, prohibición de acercarse a la oración con mala disposición moral, y la fórmula conclusiva sobre el camino de la vida. También respeta la revisión inglesa al no introducir posesivo en «oración». Sin embargo, «conciencia mala» suena poco natural en español y no expresa tan bien como el original la idea de una conciencia moralmente culpable; «mala conciencia» preserva mejor el sentido y la legibilidad.'
  spanish_quality_summary: 'El texto es claro y fiel en conjunto. «En la asamblea», «confesarás tus transgresiones» y «Este es el camino de la vida» son adecuados y dignos. La principal mejora necesaria es idiomática: en español eclesial y general se dice naturalmente «con mala conciencia», no «con una conciencia mala».'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Asamblea» para ἐκκλησία está bien justificado en este contexto. «Transgresiones» conserva la fuerza de παράπτωμα. «Oración» sin posesivo sigue correctamente la auditoría inglesa. La única decisión léxica a ajustar es συνείδησις / πονηρός: «mala conciencia» es la mejor equivalencia española para «with an evil conscience» aquí.'
  issues:
