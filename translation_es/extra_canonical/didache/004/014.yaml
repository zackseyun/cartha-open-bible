source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Ἐν ἐκκλησίᾳ ἐξομολογήσῃ τὰ παραπτώματά σου, καὶ οὐ προσελεύσῃ ἐπὶ προσευχήν σου ἐν συνειδήσει πονηρᾷ. Αὕτη ἐστὶν ἡ ὁδὸς τῆς ζωῆς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/004/014.yaml
  text: In the assembly you shall confess your transgressions, and you shall not come to prayer with an evil conscience. This is the way of life.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:24Z'
    unchanged: false
    changes_summary: Removed 'your' before 'prayer' because the Greek has simply 'to prayer,' not 'to your prayer.'
translation:
  language: es
  text: En la asamblea confesarás tus transgresiones, y no te acercarás a la oración con mala conciencia. Este es el camino de la vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐν ἐκκλησίᾳ
  english_pob_choice: In the assembly
  chosen_spanish: En la asamblea
  alternatives_spanish:
  - En la congregación
  - En la iglesia
  lexicon: ἐκκλησία
  rationale: «Asamblea» conserva el sentido básico de reunión convocada, sin imponer todavía el matiz institucional de «iglesia». Es la equivalencia más directa y transparente para este contexto.
- source_word: ἐξομολογήσῃ
  english_pob_choice: you shall confess
  chosen_spanish: confesarás
  alternatives_spanish:
  - harás confesión de
  - reconocerás
  lexicon: ἐξομολογέομαι
  rationale: «Confesarás» expresa bien el acto de admitir o declarar culpablemente las faltas. Mantiene el valor verbal fuerte del griego y suena natural en español.
- source_word: τὰ παραπτώματά σου
  english_pob_choice: your transgressions
  chosen_spanish: tus transgresiones
  alternatives_spanish:
  - tus faltas
  - tus ofensas
  lexicon: παράπτωμα
  rationale: «Transgresiones» refleja el carácter de desviación o caída en culpa presente en el término griego y coincide con la elección inglesa de «transgressions».
- source_word: οὐ προσελεύσῃ ἐπὶ προσευχήν σου
  english_pob_choice: you shall not come to prayer
  chosen_spanish: no te acercarás a la oración
  alternatives_spanish:
  - no te presentarás a la oración
  - no irás a orar
  lexicon: προσελεύσομαι / προσευχή
  rationale: La revisión inglesa eliminó «your» porque el griego dice simplemente «a oración», no «a tu oración». En español, «a la oración» preserva esa sobriedad y evita añadir un posesivo inexistente.
- source_word: ἐν συνειδήσει πονηρᾷ
  english_pob_choice: with an evil conscience
  chosen_spanish: con una conciencia mala
  alternatives_spanish:
  - con una conciencia malvada
  - con mala conciencia
  lexicon: συνείδησις / πονηρός
  rationale: «Conciencia mala» mantiene la idea moral del griego y de la traducción inglesa. Se evita cargarlo con un tono más abstracto o técnico de lo necesario.
- source_word: Αὕτη ἐστὶν ἡ ὁδὸς τῆς ζωῆς
  english_pob_choice: This is the way of life
  chosen_spanish: Este es el camino de la vida
  alternatives_spanish:
  - Esta es la senda de la vida
  - Este es el camino de vida
  lexicon: ὁδός / ζωή
  rationale: «Camino de la vida» reproduce con naturalidad la imagen final y corresponde a la formulación inglesa. «Camino» es el equivalente más estable para ὁδός aquí.
theological_decisions:
- issue: Confesión pública en la asamblea
  english_pob_reading: In the assembly you shall confess your transgressions
  chosen_spanish_reading: En la asamblea confesarás tus transgresiones
  alternative_spanish_readings:
  - En la congregación confesarás tus transgresiones
  - En la iglesia confesarás tus transgresiones
  rationale: El texto presenta la confesión como práctica comunitaria, no meramente privada. «Asamblea» conserva mejor esa dimensión sin sobreinterpretar la institución.
  doctrine_reference: Práctica comunitaria de confesión y disciplina eclesial en la literatura cristiana primitiva.
- issue: Conciencia moral al orar
  english_pob_reading: you shall not come to prayer with an evil conscience
  chosen_spanish_reading: y no te acercarás a la oración con una conciencia mala
  alternative_spanish_readings:
  - y no te acercarás a la oración con mala conciencia
  - y no te presentarás a la oración con una conciencia malvada
  rationale: 'La frase conserva la tensión moral del original: la oración requiere integridad interior. «Conciencia mala» refleja sin suavizar el juicio ético.'
  doctrine_reference: Pureza interior y rectitud de conciencia en la oración.
- issue: La fórmula conclusiva sobre el camino
  english_pob_reading: This is the way of life
  chosen_spanish_reading: Este es el camino de la vida
  alternative_spanish_readings:
  - Esta es la senda de la vida
  rationale: La clausula funciona como evaluación sapiencial final. «Camino de la vida» preserva la fórmula tradicional de instrucción moral sin convertirla en interpretación doctrinal adicional.
  doctrine_reference: Lenguaje sapiencial sobre el camino de vida en la enseñanza cristiana primitiva.
translation_notes:
  revision_awareness: The English audit trail includes a revision removing 'your' before 'prayer' because the Greek has simply 'to prayer,' not 'to your prayer.' The Spanish draft follows that correction by using 'a la oración' without a possessive, while remaining close to the Greek syntax and the English POB result.
  spanish_consistency_notes:
  - Se mantuvo «asamblea» para ἐκκλησία por coherencia con un registro histórico-literario y no confesionalmente institucional.
  - Se evitó el posesivo antes de «oración» para respetar la revisión auditada del inglés y la ausencia de posesivo en el griego.
  - «Conciencia mala» se conservó como equivalente directo de la valoración moral del original, sin reemplazarla por una paráfrasis más idiomática que suavice el contraste.
