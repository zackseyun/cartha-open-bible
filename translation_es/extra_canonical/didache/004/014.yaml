    rationale: Aunque formalmente posible, suena forzado y menos natural que «con mala conciencia». La expresión fija «mala conciencia» comunica mejor una conciencia culpable o moralmente indebida, que es lo que pide ἐν συνειδήσει πονηρᾷ en este contexto.
  revised_spanish_text: En la asamblea confesarás tus transgresiones, y no te acercarás a la oración con mala conciencia. Este es el camino de la vida.
  revision_rationale: 'Se hace una sola corrección estilístico-semántica: «con una conciencia mala» se cambia a «con mala conciencia» para lograr español natural y mantener con mayor precisión la fuerza moral de ἐν συνειδήσει πονηρᾷ. El resto del versículo ya es fiel al griego y a la auditoría inglesa.'
