- from: Hijo mío, recuerda de noche y de día al que te habla la palabra de Dios, y honrarás a ese hombre como al Señor; porque donde se habla de la autoridad señorial, allí está el Señor. Y buscarás cada día los rostros de los santos, para que encuentres descanso en sus palabras. No harás cisma, sino que reconciliarás a los que riñen. Juzgarás con justicia; no harás acepción de personas al reprender las transgresiones. No serás de doble ánimo acerca de si será o no será. No seas de los que extienden las manos para recibir, pero las recogen para dar. Si tienes algo, por medio de tus manos darás un rescate por tus pecados. No vacilarás al dar, ni murmurarás mientras das; porque sabrás quién es el buen recompensador de la paga. No te apartarás del necesitado, sino que compartirás todas las cosas con tu hermano, y no dirás que son tuyas; porque si compartís lo inmortal, ¡cuánto más las cosas mortales! No apartarás tu mano de tu hijo ni de tu hija, sino que desde la juventud les enseñarás el
    temor de Dios. No mandarás a tu esclavo ni a tu esclava con amargura—ellos que esperan en el mismo Dios—para que no dejen de temer al Dios que está sobre ambos; porque él no viene a llamar según la apariencia exterior, sino a los que el Espíritu ha preparado. Pero ustedes, esclavos, sométanse a sus amos como a un patrón de Dios, con reverencia y temor. Aborrecerás toda hipocresía y todo lo que no agrada al Señor. Nunca abandonarás los mandamientos del Señor, sino que guardarás lo que recibiste, sin añadir ni quitar. En la asamblea confesarás tus transgresiones, y no te acercarás a tu oración con una mala conciencia. Este es el camino de la vida.
  to: Hijo mío, recuerda de noche y de día al que te habla la palabra de Dios, y lo honrarás como al Señor; porque donde se habla del señorío, allí está el Señor. Y buscarás cada día los rostros de los santos, para que encuentres descanso en sus palabras. No harás cisma, sino que reconciliarás a los que riñen. Juzgarás con justicia; no harás acepción de personas al reprender transgresiones. No serás de doble ánimo acerca de si será o no. No seas de los que extienden las manos para recibir, pero las recogen para dar. Si tienes algo, por medio de tus manos darás un rescate por tus pecados. No vacilarás en dar, ni murmurarás al dar; porque sabrás quién es el buen recompensador del salario. No te apartarás del necesitado, sino que compartirás todas las cosas con tu hermano, y no dirás que son tuyas; porque si son copartícipes en lo inmortal, ¡cuánto más en las cosas mortales! No apartarás tu mano de tu hijo ni de tu hija, sino que desde su juventud les enseñarás el temor de Dios. No mandarás
    a tu esclavo ni a tu esclava con amargura —ellos que esperan en el mismo Dios—, no sea que lleguen a no temer al Dios que está sobre ambos; porque él no viene a llamar según la apariencia exterior, sino a aquellos a quienes el Espíritu ha preparado. Pero ustedes, esclavos, sométanse a sus amos como a una figura de Dios, con reverencia y temor. Aborrecerás toda hipocresía y todo lo que no agrada al Señor. Nunca abandonarás los mandamientos del Señor, sino que guardarás lo que recibiste, sin añadir ni quitar. En la asamblea confesarás tus transgresiones, y no te acercarás a tu oración con mala conciencia. Este es el camino de la vida.
