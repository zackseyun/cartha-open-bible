translation:
  language: es
  text: Hijo mío, recuerda de noche y de día al que te habla la palabra de Dios, y lo honrarás como al Señor; porque donde se habla del señorío, allí está el Señor. Y buscarás cada día los rostros de los santos, para que encuentres descanso en sus palabras. No harás cisma, sino que reconciliarás a los que riñen. Juzgarás con justicia; no harás acepción de personas al reprender transgresiones. No serás de doble ánimo acerca de si será o no. No seas de los que extienden las manos para recibir, pero las recogen para dar. Si tienes algo, por medio de tus manos darás un rescate por tus pecados. No vacilarás en dar, ni murmurarás al dar; porque sabrás quién es el buen recompensador del salario. No te apartarás del necesitado, sino que compartirás todas las cosas con tu hermano, y no dirás que son tuyas; porque si son copartícipes en lo inmortal, ¡cuánto más en las cosas mortales! No apartarás tu mano de tu hijo ni de tu hija, sino que desde su juventud les enseñarás el temor de Dios. No mandarás
    a tu esclavo ni a tu esclava con amargura —ellos que esperan en el mismo Dios—, no sea que lleguen a no temer al Dios que está sobre ambos; porque él no viene a llamar según la apariencia exterior, sino a aquellos a quienes el Espíritu ha preparado. Pero ustedes, esclavos, sométanse a sus amos como a una figura de Dios, con reverencia y temor. Aborrecerás toda hipocresía y todo lo que no agrada al Señor. Nunca abandonarás los mandamientos del Señor, sino que guardarás lo que recibiste, sin añadir ni quitar. En la asamblea confesarás tus transgresiones, y no te acercarás a tu oración con mala conciencia. Este es el camino de la vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τέκνον μου
  english_pob_choice: My child
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Hijo mío, querido
  lexicon: BDAG
  rationale: Conserva el tono afectuoso e instructivo del vocativo. En español, «Hijo mío» suena natural y mantiene la relación catequética; «Mi hijo» sería posible, pero aquí el orden vocativo resulta más fluido.
- source_word: τοῦ λαλούντός σοι τὸν λόγον τοῦ Θεοῦ
  english_pob_choice: the one who speaks to you the word of God
  chosen_spanish: al que te habla la palabra de Dios
  alternatives_spanish:
  - al que te habla la palabra de Dios
  - al que te anuncia la palabra de Dios
  lexicon: BDAG
  rationale: «Habla» preserva el acto presente de comunicación; «anuncia» estrecharía innecesariamente el sentido. Se mantiene el enfoque en la palabra de Dios como contenido directo.
- source_word: ἡ κυριότης
  english_pob_choice: lordship
  chosen_spanish: la autoridad señorial
  alternatives_spanish:
  - el señorío
  - la soberanía
  - la autoridad del Señor
  lexicon: LSJ
  rationale: «Autoridad señorial» conserva el abstracto y permite el juego con Κύριος sin convertir la frase en una mera paráfrasis. «Señorío» sería posible, pero aquí «autoridad señorial» resulta más transparente en español contemporáneo.
- source_word: μνησθήσῃ νυκτὸς καὶ ἡμέρας
  english_pob_choice: remember night and day
  chosen_spanish: recuerda de noche y de día
  alternatives_spanish:
  - recuerda noche y día
  - ten presente de noche y de día
  lexicon: BDAG
  rationale: Expresa la continuidad temporal con naturalidad en español y conserva el paralelismo idiomático.
- source_word: Ἐκζητήσεις δὲ καθ’ ἡμέραν τὰ πρόσωπα τῶν ἁγίων
  english_pob_choice: you shall seek out day by day the faces of the saints
  chosen_spanish: buscarás cada día los rostros de los santos
  alternatives_spanish:
  - buscarás cada día los rostros de los santos
  - buscarás día a día la presencia de los santos
  lexicon: BDAG
  rationale: Se conserva «rostros» para mantener el valor concreto de πρόσωπα y la imagen de buscar el trato personal. «Presencia» suavizaría la metáfora y perdería parte de la literalidad.
- source_word: ἵνα ἐπαναπαῇ τοῖς λόγοις αὐτῶν
  english_pob_choice: so that you may find rest in their words
  chosen_spanish: para que encuentres descanso en sus palabras
  alternatives_spanish:
  - para que descanses en sus palabras
  - para que halles reposo en sus palabras
  lexicon: BDAG
  rationale: «Encuentres descanso» reproduce el matiz de reposo/apaciguamiento sin sonar arcaico. Mantiene la relación entre la compañía de los santos y el alivio de sus palabras.
- source_word: Οὐ ποιήσεις σχίσμα
  english_pob_choice: You shall not make a schism
  chosen_spanish: No harás cisma
  alternatives_spanish:
  - No harás división
  - No provocarás un cisma
  lexicon: BDAG
  rationale: «Cisma» preserva el término técnico y eclesial sin diluir la fuerza de σχίσμα. En este contexto es la opción más reconocible y precisa.
- source_word: κρινεῖς δικαίως
  english_pob_choice: You shall judge justly
  chosen_spanish: Juzgarás con justicia
  alternatives_spanish:
  - Juzgarás justamente
  - Juzgarás rectamente
  lexicon: BDAG
  rationale: «Con justicia» mantiene la forma jurídica y ética del griego, y suena más natural que un adverbio calcado.
- source_word: οὐ λήψῃ πρόσωπον
  english_pob_choice: you shall not show partiality
  chosen_spanish: no harás acepción de personas
  alternatives_spanish:
  - no mostrarás favoritismo
  - no mirarás el rostro
  lexicon: BDAG
  rationale: «Acepción de personas» es la expresión española tradicional y fiel al modismo semítico-griego de no tomar el rostro/partido por alguien. Se conserva el valor judicial del giro.
- source_word: Οὐ διψυχήσεις
  english_pob_choice: You shall not be double-minded
  chosen_spanish: No serás de doble ánimo
  alternatives_spanish:
  - No dudarás
  - No tendrás doble pensamiento
  lexicon: BDAG
  rationale: «Doble ánimo» comunica la división interior sin perder la ambivalencia moral de διψυχία. Se evita reducirlo a simple duda intelectual.
- source_word: πρὸς μὲν τὸ λαβεῖν ἐκτείνων τὰς χεῖρας, πρὸς δὲ τὸ δοῦναι συσπῶν
  english_pob_choice: one who stretches out his hands to receive, but draws them in to give
  chosen_spanish: de los que extienden las manos para recibir, pero las recogen para dar
  alternatives_spanish:
  - de los que extienden las manos para recibir, pero las encogen para dar
  - de los que tienden las manos para tomar, pero las retraen para dar
  lexicon: LSJ
  rationale: Conserva el contraste de movimientos opuestos del griego y mantiene la imagen corporal. «Recogen» es natural en español y expresa la contracción implicada por συσπῶν.
- source_word: λύτρωσιν ἁμαρτιῶν σου
  english_pob_choice: a ransom for your sins
  chosen_spanish: un rescate por tus pecados
  alternatives_spanish:
  - un rescate por tus pecados
  - una redención por tus pecados
  - un rescate para tus pecados
  lexicon: BDAG
  rationale: «Rescate» reproduce el valor de λύτρωσις en un registro comprensible y sin suavizar la fuerza penitencial/almsgiving del dicho. «Redención» podría sonar más doctrinal y menos concreto.
- source_word: μήποτε οὐ μὴ φοβηθήσονται τὸν ἐπ᾽ ἀμφοτέροις Θεόν
  english_pob_choice: lest they should fail to fear the God who is over both
  chosen_spanish: para que no dejen de temer al Dios que está sobre ambos
  alternatives_spanish:
  - para que no dejen de temer al Dios que está sobre ambos
  - no sea que no teman al Dios que está sobre ambos
  lexicon: BDAG
  rationale: La cláusula expresa finalidad negativa y riesgo moral. «Dejen de temer» evita una doble negación torpe en español y conserva la advertencia.
- source_word: οὐ γὰρ ἔρχεται κατὰ πρόσωπον καλέσαι
  english_pob_choice: for he does not come to call according to outward appearance
  chosen_spanish: porque él no viene a llamar según la apariencia exterior
  alternatives_spanish:
  - porque él no viene a llamar según el rostro exterior
  - porque no llama por apariencias
  lexicon: BDAG
  rationale: «Según la apariencia exterior» traduce κατὰ πρόσωπον con naturalidad y sin perder el contraste entre lo visible y el criterio divino.
- source_word: ἀλλ᾽ ἐφ᾽ οὓς τὸ πνεῦμα ἡτοίμασεν
  english_pob_choice: but those whom the Spirit has prepared
  chosen_spanish: sino a los que el Espíritu ha preparado
  alternatives_spanish:
  - sino a los que el Espíritu ha preparado
  - sino a quienes el Espíritu preparó
  lexicon: BDAG
  rationale: «El Espíritu» mantiene la referencia personal y, por contexto, puede leerse en sentido santo sin añadirlo explícitamente. La frase conserva la iniciativa divina.
- source_word: Ὑμεῖς δὲ οἱ δοῦλοι
  english_pob_choice: But you slaves
  chosen_spanish: Pero ustedes, esclavos
  alternatives_spanish:
  - Pero ustedes, esclavos
  - Y ustedes, esclavos
  lexicon: BDAG
  rationale: Se conserva «esclavos» por la fuerza léxica de δοῦλοι y por consistencia con el texto fuente. «Siervos» atenuaría el sentido social concreto.
- source_word: ὑποτάγησεθε τοῖς κυρίοις ὑμῶν
  english_pob_choice: shall be subject to your masters
  chosen_spanish: sométanse a sus amos
  alternatives_spanish:
  - sométanse a sus amos
  - estén sujetos a sus señores
  lexicon: BDAG
  rationale: «Amos» es el correlato español más directo y socialmente claro para κυρίοις en este contexto. Mantiene la relación de subordinación sin suavizarla.
- source_word: ὡς τύπῳ Θεοῦ
  english_pob_choice: as to a pattern of God
  chosen_spanish: como a un patrón de Dios
  alternatives_spanish:
  - como a un patrón de Dios
  - como a un modelo de Dios
  - como a una figura de Dios
  lexicon: BDAG
  rationale: «Patrón» conserva la idea de τύπος como modelo/figura representativa, evitando identificar al amo con Dios. «Modelo» es posible, pero «patrón» preserva mejor el matiz normativo.
- source_word: ἐν αἰσχύνῃ καὶ φόβῳ
  english_pob_choice: in reverence and fear
  chosen_spanish: con reverencia y temor
  alternatives_spanish:
  - con reverencia y temor
  - en modestia y temor
  - con pudor y temor
  lexicon: BDAG
  rationale: «Reverencia» refleja bien el matiz positivo de αἰσχύνη en este contexto, sin la connotación moderna de vergüenza humillante.
- source_word: ἐν ἐκκλησίᾳ
  english_pob_choice: in the assembly
  chosen_spanish: En la asamblea
  alternatives_spanish:
  - En la asamblea
  - En la congregación
  - En la iglesia
  lexicon: BDAG
  rationale: «Asamblea» conserva el sentido de reunión comunitaria y evita cargar el término con una institución posterior. Es la opción más auditivamente cercana al griego.
theological_decisions:
- issue: Honor to the one speaking the word of God and the Lord-language that follows
  english_pob_reading: The teacher is to be honored in relation to the Lord's authority, not identified absolutely with the Lord.
  chosen_spanish_reading: El que habla la palabra de Dios recibe honra en relación con la autoridad del Señor, no como una identificación absoluta con él.
  alternative_spanish_readings:
  - Debe honrarse al maestro simplemente como al Señor.
  - La frase podría leerse como una identificación más fuerte del maestro con el Señor.
  rationale: 'Se conserva la tensión del griego y del audit trail: la honra es fuerte, pero la cláusula explicativa apunta a autoridad representativa y no exige una identificación ontológica total.'
  doctrine_reference: Primacía del texto original; preservar la tensión teológica
- issue: Almsgiving as 'a ransom for your sins'
  english_pob_reading: The text is rendered straightforwardly without softening; it reflects early Christian penitential/almsgiving language.
  chosen_spanish_reading: Se mantiene la expresión como un dicho fuerte sobre limosna y pecados, sin convertirla en una formulación doctrinal posterior.
  alternative_spanish_readings:
  - un rescate de tus pecados
  - una expiación por tus pecados
  rationale: «Rescate» conserva el golpe verbal de λύτρωσις y deja visible la relación entre dar y remisión/limpieza sin resolverla sistemáticamente.
  doctrine_reference: Preservar la tensión teológica; no sobredefinir la soteriología
- issue: Slaves and masters as social exhortation
  english_pob_reading: The phrase is translated representationally ('as to a pattern of God'), not as divinizing masters.
  chosen_spanish_reading: La instrucción a esclavos y amos se entiende como exhortación social y moral, no como divinización del amo.
  alternative_spanish_readings:
  - sométanse a sus amos como a Dios
  - sométanse a sus amos como a imagen de Dios
  rationale: La elección «patrón de Dios» permite ver la analogía sin dar al amo un estatus divino. Así se respeta el límite del tipo/patrón.
  doctrine_reference: Primacía del sentido lexical de τύπος; prudencia doctrinal
translation_notes:
  revision_awareness: 'This draft follows the latest English revision choices in the audit trail: it preserves the clarified receive/give contrast, the ''outward appearance'' reading of κατὰ πρόσωπον, the strong negative purpose in the slave warning, and the representative force of τύπος. Spanish renderings were adjusted for natural syntax while keeping the lexical tensions explicit.'
  spanish_consistency_notes:
  - Se mantiene 'esclavo/esclava' para δοῦλος/παιδίσκη y 'amos' para κυρίοις, por consistencia léxica con la fuerza social del texto.
  - Se usa 'Señor' para Κύριος y 'Dios' para Θεός; no se sustituye por un masking de mayúsculas.
  - '''Asamblea'' se mantiene para ἐκκλησία para evitar institucionalizar indebidamente el término.'
  - '''Hipocresía'', ''justicia'', ''temor de Dios'' y ''conciencia'' siguen el registro bíblico en español sin arcaísmos innecesarios.'
  - No se añadieron notas a pie porque no surgió una alternativa española indispensable que requiriera anclaje textual en esta versión.
