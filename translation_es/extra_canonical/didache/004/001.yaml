  source_alignment_summary: 'El borrador sigue de cerca el griego y el audit trail inglés en la mayor parte del versículo: conserva bien la exhortación catequética, el contraste recibir/dar, «rescate por tus pecados», «esclavo/esclava», «asamblea» y la idea representacional de τύπος. Sin embargo, hay varias decisiones que no preservan del todo el sentido documentado: «como al Señor» suena más identificatorio que el inglés auditado «as the Lord» entendido representacionalmente y además añade «ese hombre» sin base textual; «autoridad señorial» debilita el juego léxico mejor que «señorío»; «para que no dejen de temer» desplaza el matiz de riesgo de no llegar a temer («fail to fear») hacia uno de cesación; y «patrón de Dios» en español se oye principalmente como ‘jefe’, no como ‘modelo/tipo’, por lo que oscurece τύπος.'
  spanish_quality_summary: 'El español es generalmente claro y eclesialmente legible, pero mezcla tratamientos («honrarás», «compartís», «ustedes, esclavos, sométanse») y eso afecta la naturalidad y coherencia. Hay también algunas formulaciones algo rígidas o poco felices: «ese hombre» es innecesario, «autoridad señorial» suena forzado, y «patrón de Dios» resulta equívoco en español contemporáneo. Conviene unificar a segunda persona singular, más acorde con el resto del pasaje, y pulir algunos giros para mantener fidelidad y buena lectura.'
  glossary_alignment: 'Cumple bien con varios criterios del proyecto: θεός -> «Dios», πνεῦμα -> «Espíritu», δοῦλος -> «esclavo», ἐκκλησία -> «asamblea». No hay conflicto con Yahvé/Mesías en este texto. La principal desalineación léxica está en τύπος, donde «patrón» no refleja adecuadamente la rationale inglesa; «figura» o «modelo representativo» funcionan mejor en español. También «señorío» alinea mejor con κυριότης que «autoridad señorial».'
