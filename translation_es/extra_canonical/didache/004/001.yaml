base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/004/001.yaml
  text: My child, remember night and day the one who speaks to you the word of God, and you shall honor him as the Lord; for where lordship is spoken of, there the Lord is. And you shall seek out day by day the faces of the saints, so that you may find rest in their words. You shall not make a schism, but you shall reconcile those who are fighting. You shall judge justly; you shall not show partiality when reproving transgressions. You shall not be double-minded about whether it will be or not. Do not be one who stretches out his hands to receive, but draws them in to give. If you have anything, through your hands you shall give a ransom for your sins. You shall not hesitate to give, nor grumble while giving; for you will know who is the good repayer of the reward. You shall not turn away from the one in need, but you shall share all things with your brother, and you shall not say they are your own; for if you are sharers in what is immortal, how much more in mortal things? You shall not
    take your hand away from your son or from your daughter, but from youth you shall teach them the fear of God. You shall not command your slave or your female slave in your bitterness—they who hope in the same God—lest they should fail to fear the God who is over both; for he does not come to call according to outward appearance, but those whom the Spirit has prepared. But you slaves shall be subject to your masters as to a pattern of God, in reverence and fear. You shall hate all hypocrisy and everything that is not pleasing to the Lord. You shall never forsake the commandments of the Lord, but you shall keep what you received, neither adding nor taking away. In the assembly you shall confess your transgressions, and you shall not come to your prayer with an evil conscience. This is the way of life.
