translation:
  language: es
  text: Aborrecerás toda hipocresía y todo lo que no sea agradable al Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μισήσεις
  english_pob_choice: You shall hate
  chosen_spanish: Aborrecerás
  alternatives_spanish:
  - Odiarás
  - Despreciarás
  lexicon: μισέω
  rationale: El futuro imperativo de obligación se expresa bien con «aborrecerás», que conserva fuerza moral y evita en español una aspereza innecesaria de «odiarás»; sigue la intensidad del griego y del inglés POB sin suavizarla.
- source_word: πᾶσαν ὑπόκρισιν
  english_pob_choice: all hypocrisy
  chosen_spanish: toda hipocresía
  alternatives_spanish:
  - toda simulación
  - toda falsedad
  lexicon: ὑπόκρισις
  rationale: «Hipocresía» es el equivalente natural y fiel en español para ὑπόκρισις. «Simulación» o «falsedad» captan parte del sentido, pero pierden el término más directo y reconocido en este contexto ético.
- source_word: πᾶν ὃ μὴ ἀρεστὸν τῷ Κυρίῳ
  english_pob_choice: everything that is not pleasing to the Lord
  chosen_spanish: todo lo que no sea agradable al Señor
  alternatives_spanish:
  - todo lo que no agrade al Señor
  - todo lo que no sea del agrado del Señor
  lexicon: ἀρεστός / Κύριος
  rationale: «Agradable» reproduce bien el sentido de ἀρεστόν como aquello que agrada o resulta aceptable. Se mantiene «Señor» porque el texto griego usa Κυρίῳ; en la tradición bíblica española esto comunica con claridad la referencia reverente sin introducir una nota interpretativa adicional en el cuerpo del texto.
theological_decisions:
- issue: Mandato moral en forma de futuro exhortativo
  english_pob_reading: You shall hate...
  chosen_spanish_reading: Aborrecerás...
  alternative_spanish_readings:
  - Debes aborrecer...
  - Has de aborrecer...
  rationale: El griego usa una forma de mandato con valor exhortativo; el futuro español transmite adecuadamente obligación y firmeza. Se evita convertirlo en simple consejo.
  doctrine_reference: Ética exhortativa en literatura cristiana primitiva; paralelos de instrucción moral imperativa.
- issue: Referencia a «el Señor»
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Jesucristo
  rationale: El griego dice τῷ Κυρίῳ sin especificar nombre propio. En este pasaje ético del Didaché, la forma reverente «el Señor» es la traducción directa y más sobria; no hay base suficiente en este versículo para sustituirla por un nombre propio en el texto principal.
  doctrine_reference: Uso reverencial de κύριος en textos cristianos primitivos; prudencia exegética ante la ambigüedad referencial.
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios y el cotejo externo reporta alta concordancia; por tanto, este borrador sigue de cerca la lectura establecida por el POB inglés, ajustándola al español con equivalencia óptima y sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantiene la terminología ética sobria y directa.
  - No se introduce «Cristo» ni «Yahvé» porque el original aquí no lo exige.
  - «Señor» conserva la reverencia y la ambigüedad controlada del griego Κυρίῳ.
