source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Οὐ ποιήσεις σχίσμα, εἰρηνεύσεις δὲ μαχομένους· κρινεῖς δικαίως, οὐ λήψῃ πρόσωπον ἐλέγξαι ἐπὶ παραπτώμασιν.
