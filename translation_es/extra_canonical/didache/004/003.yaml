base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/004/003.yaml
  text: You shall not cause division[a], but you shall reconcile those who are fighting. You shall judge justly; you shall not show partiality in reproving transgressions.
  footnotes:
  - marker: a
    text: Or 'make a schism'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:20Z'
    unchanged: false
    changes_summary: Adjusted 'when reproving transgressions' to 'in reproving transgressions' for a more natural rendering of the infinitive phrase while preserving the sense.
translation:
  language: es
  text: No causarás división[a], sino que reconciliarás a los que están peleando. Juzgarás con justicia; no mostrarás parcialidad al reprender las faltas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacer un cisma'.
    reason: alternative_literal_rendering_preserved_from_audit_trail
lexical_decisions:
- source_word: Οὐ ποιήσεις σχίσμα
  english_pob_choice: You shall not cause division
  chosen_spanish: No causarás división
  alternatives_spanish:
  - No harás un cisma
  - No provocarás una división
  lexicon: σχίσμα
  rationale: ‘División’ comunica en español el sentido comunitario de σχίσμα en el contexto de la Didaché sin importar el matiz eclesiástico tardío que ‘cisma’ puede sugerir. Se evita un calco rígido y se conserva la fuerza prohibitiva.
- source_word: εἰρηνεύσεις δὲ μαχομένους
  english_pob_choice: but you shall reconcile those who are fighting
  chosen_spanish: sino que reconciliarás a los que están peleando
  alternatives_spanish:
  - sino que harás las paces entre los que pelean
  - sino que pondrás en paz a los que están peleando
  lexicon: εἰρηνεύω / μαχομένους
  rationale: ‘Reconciliarás’ expresa bien la acción de restaurar paz entre personas en conflicto. ‘Los que están peleando’ mantiene el participio presente y el carácter concreto del enfrentamiento.
- source_word: κρινεῖς δικαίως
  english_pob_choice: You shall judge justly
  chosen_spanish: Juzgarás con justicia
  alternatives_spanish:
  - Juzgarás justamente
  - Juzgarás rectamente
  lexicon: δικαίως
  rationale: ‘Con justicia’ conserva la fuerza adverbial y el tono bíblico-natural en español, manteniendo el valor ético/jurídico de δικαίως.
- source_word: οὐ λήψῃ πρόσωπον
  english_pob_choice: you shall not show partiality
  chosen_spanish: no mostrarás parcialidad
  alternatives_spanish:
  - no harás acepción de personas
  - no favorecerás a nadie
  lexicon: πρόσωπον / λήψῃ πρόσωπον
  rationale: La expresión idiomática griega se vierte con una formulación clara y actual. ‘Parcialidad’ comunica el sentido de favoritismo judicial sin imponer una fórmula tradicional menos transparente.
- source_word: ἐλέγξαι ἐπὶ παραπτώμασιν
  english_pob_choice: in reproving transgressions
  chosen_spanish: al reprender las transgresiones
  alternatives_spanish:
  - al corregir las faltas
  - en la reprensión de las faltas
  lexicon: ἐλέγχω / παράπτωμα
  rationale: ‘Reprender’ mantiene el valor correctivo de ἐλέγχω; ‘transgresiones’ refleja la gravedad moral de παράπτωμα. ‘Al’ expresa con naturalidad la relación circunstancial del infinitivo.
theological_decisions:
- issue: σχίσμα en comunidad cristiana primitiva
  english_pob_reading: cause division
  chosen_spanish_reading: causar división
  alternative_spanish_readings:
  - hacer un cisma
  - provocar facciones
  rationale: En la Didaché, σχίσμα alude a ruptura o facción dentro de la comunidad, no necesariamente al tecnicismo eclesiástico posterior. ‘División’ conserva el sentido original sin cargar el término con desarrollos históricos posteriores.
  doctrine_reference: Unidad y paz comunitaria en la ética cristiana primitiva
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail en la segunda cláusula final, usando ‘al reprender las transgresiones’ en lugar de una estructura temporal más pesada, y adopta ‘causar división’ en línea con la adjudicación lexical que desaconseja ‘cisma’ como término principal.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo imperativo futuro típico del registro exhortativo: ‘No causarás… reconciliarás… juzgarás… no mostrarás…’.'
  - Se usa ‘transgresiones’ para conservar una referencia moral más fuerte que ‘faltas’, coherente con el tono del griego.
  - La nota al pie se ancla únicamente en ‘división’ porque ahí existe la alternativa lexical documentada por el audit trail.
