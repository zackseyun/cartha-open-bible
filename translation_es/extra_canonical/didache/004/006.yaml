review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva todos los elementos básicos del griego: condición abierta (ἐὰν ἔχῃς), futuro exhortativo (δώσεις), imagen instrumental de las manos (διὰ τῶν χειρῶν σου), y λύτρωσιν ἁμαρτιῶν σου como «rescate por tus pecados». Sin embargo, «por tus manos» suena poco natural y ambiguo en español; «por medio de tus manos» comunica mejor el sentido instrumental de διά + genitivo sin perder la imagen concreta.'
  spanish_quality_summary: La redacción actual es comprensible, pero «darás por tus manos» resulta rígida y algo extraña en español eclesial contemporáneo. Una reparación mínima mejora naturalidad y legibilidad sin apartarse del original ni del rastro inglés auditado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Rescate» alinea bien con λύτρωσις = «ransom». «Pecados» es correcto para ἁμαρτιῶν. No se activan términos de glosario sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
