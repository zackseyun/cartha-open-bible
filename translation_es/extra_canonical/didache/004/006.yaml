translation:
  language: es
  text: Si tienes algo, darás por medio de tus manos un rescate por tus pecados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐὰν ἔχῃς
  english_pob_choice: If you have anything
  chosen_spanish: Si tienes algo
  alternatives_spanish:
  - Si posees algo
  - Si tienes algo que dar
  lexicon: ἐάν + subjuntive; ἔχω
  rationale: La condición simple se expresa de forma natural en español con «Si tienes algo», conservando el carácter abierto e indefinido de la frase griega sin añadir matices.
- source_word: διὰ τῶν χειρῶν σου
  english_pob_choice: through your hands
  chosen_spanish: por tus manos
  alternatives_spanish:
  - a través de tus manos
  - mediante tus manos
  lexicon: διά + genitivo; χείρ
  rationale: «Por tus manos» mantiene la imagen instrumental del griego y la redacción auditada en inglés, con una forma española fluida y reverente.
- source_word: δώσεις
  english_pob_choice: you shall give
  chosen_spanish: darás
  alternatives_spanish:
  - darás tú
  - deberás dar
  lexicon: δίδωμι
  rationale: El futuro simple español comunica bien la fuerza exhortativa/prescriptiva del futuro griego sin volverlo más pesado que el original.
- source_word: λύτρωσιν
  english_pob_choice: a ransom
  chosen_spanish: un rescate
  alternatives_spanish:
  - una redención
  - un rescate de liberación
  lexicon: λύτρωσις
  rationale: «Rescate» reproduce el valor de liberación mediante pago que el inglés POB fijó con «ransom», evitando suavizarlo a un término demasiado general.
- source_word: ἁμαρτιῶν σου
  english_pob_choice: for your sins
  chosen_spanish: por tus pecados
  alternatives_spanish:
  - por tus faltas
  - por tus pecados
  lexicon: ἁμαρτία
  rationale: «Pecados» es la correspondencia directa y más natural en español para ἁμαρτίαι, manteniendo el sentido moral y religioso del original.
theological_decisions:
- issue: Naturaleza de la ofrenda como rescate por los pecados
  english_pob_reading: a ransom for your sins
  chosen_spanish_reading: un rescate por tus pecados
  alternative_spanish_readings:
  - una redención por tus pecados
  - un pago por tus pecados
  rationale: El griego habla de λύτρωσις con genitivo de los pecados, y el inglés POB conserva la imagen de rescate. En español, «rescate» preserva la tensión expiatoria/penitencial sin resolverla prematuramente hacia una formulación doctrinal más técnica.
  doctrine_reference: Didaché 4:6; léxico de λύτρωσις y ἁμαρτία
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que reordenó la frase a una sintaxis más natural sin cambiar los elementos del griego; el español sigue esa misma naturalidad: condición + verbo + instrumento + objeto.'
  spanish_consistency_notes:
  - Se mantuvo «rescate» para λύτρωσις, coherente con el «ransom» auditado en inglés.
  - No se introdujo terminología eclesiástica ajena al griego; la frase conserva su sobriedad proverbial/exhortativa.
  - La secuencia «por tus manos» evita sobreinterpretar el valor de διά como causal o locativo.
