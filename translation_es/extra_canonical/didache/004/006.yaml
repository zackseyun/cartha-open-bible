    issue: La frase «darás por tus manos» es poco idiomática en español.
    rationale: Aunque intenta reflejar literalmente διὰ τῶν χειρῶν σου, en español suena forzada y puede entenderse como localización o agencia extraña. «Por medio de tus manos» preserva mejor la función instrumental y la claridad.
  revised_spanish_text: Si tienes algo, darás por medio de tus manos un rescate por tus pecados.
  revision_rationale: 'Se hizo una única corrección estilístico-semántica: reemplazar «por tus manos» por «por medio de tus manos» para representar con mayor naturalidad el sentido instrumental de διὰ τῶν χειρῶν σου en español, manteniendo intactos todos los demás elementos del original y de la auditoría inglesa.'
