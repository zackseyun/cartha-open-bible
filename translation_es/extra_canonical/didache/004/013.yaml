translation:
  language: es
  text: Nunca abandones los mandamientos del Señor, sino guarda lo que recibiste, ni añadiendo ni quitando.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐ μὴ ἐγκαταλίπῃς
  english_pob_choice: You shall never forsake
  chosen_spanish: Nunca abandones
  alternatives_spanish:
  - Jamás dejes
  - No abandonarás
  lexicon: ἐγκαταλείπω
  rationale: La negación enfática con οὐ μή expresa prohibición fuerte o certeza negativa; en español, «Nunca abandones» conserva bien el tono exhortativo y absoluto sin sonar artificial. «Forsake» aquí pide un verbo de deserción/abandono, no solo «dejar».
- source_word: ἐντολάς Κυρίου
  english_pob_choice: the commandments of the Lord
  chosen_spanish: los mandamientos del Señor
  alternatives_spanish:
  - los mandamientos de Yahvé
  - las órdenes del Señor
  lexicon: ἐντολή / Κύριος
  rationale: «Mandamientos» corresponde de forma directa a ἐντολάς. Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí el griego dice Κυρίου en una formulación sentenciosa y la referencia al «Señor» queda fiel al texto recibido y al eco catequético de la frase.
- source_word: φυλάξεις
  english_pob_choice: you shall keep
  chosen_spanish: guarda
  alternatives_spanish:
  - guardarás
  - observarás
  lexicon: φυλάσσω
  rationale: El verbo tiene sentido de guardar, observar o custodiar. En español, «guarda» en imperativo encaja con la fuerza exhortativa del contexto y con el paralelo del verso.
- source_word: ἃ παρέλαβες
  english_pob_choice: what you received
  chosen_spanish: lo que recibiste
  alternatives_spanish:
  - lo que has recibido
  - lo que te fue entregado
  lexicon: παραλαμβάνω
  rationale: «Recibiste» mantiene la referencia a la tradición o instrucción transmitida sin añadir matices que el griego no exige. «Lo que» conserva el neutro relativo ἃ.
- source_word: μήτε προστιθεὶς μήτε ἀφαιρῶν
  english_pob_choice: neither adding nor taking away
  chosen_spanish: sin añadir ni quitar nada
  alternatives_spanish:
  - ni añadiendo ni quitando
  - sin agregar ni eliminar nada
  lexicon: προστίθημι / ἀφαιρέω
  rationale: 'La construcción participial expresa modo: no hacer ni una cosa ni la otra. «Sin añadir ni quitar nada» fluye naturalmente en español y conserva la prohibición de alterar el contenido recibido.'
theological_decisions:
- issue: Autoridad y preservación de la instrucción recibida
  english_pob_reading: You shall never forsake the commandments of the Lord, but you shall keep what you received, neither adding nor taking away.
  chosen_spanish_reading: Nunca abandones los mandamientos del Señor, sino guarda lo que recibiste, sin añadir ni quitar nada.
  alternative_spanish_readings:
  - No abandonarás los mandamientos del Señor, sino que guardarás lo que recibiste, sin añadir ni quitar nada.
  - Nunca dejarás los mandamientos del Señor, sino conservarás lo que recibiste, sin añadir ni quitar nada.
  rationale: 'La formulación mantiene el peso normativo del enunciado: fidelidad a los mandamientos y a lo recibido, con una prohibición explícita de alterar la tradición. No se atenúa la exigencia con lenguaje más general como «seguir» o «mantener», porque el griego insiste en guardar sin modificación.'
  doctrine_reference: Didache 4:13; cf. Deuteronomio 4:2; Apocalipsis 22:18–19
translation_notes:
  revision_awareness: La revisión más reciente informó alto acuerdo y ningún cambio necesario; esta versión española sigue de cerca el sentido del griego normalizado y la traducción inglesa auditada sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se conserva el registro exhortativo y normativo del pasaje.
  - Se evita introducir «Yahvé» donde el griego usa Κυρίου en una fórmula establecida; «Señor» es aquí la correspondencia directa más transparente.
  - «Sin añadir ni quitar nada» mantiene la simetría del griego y su advertencia contra la alteración del contenido recibido.
