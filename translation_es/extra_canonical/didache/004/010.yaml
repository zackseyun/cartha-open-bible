source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Οὐκ ἐπιτάξεις δούλῳ σου ἢ παιδίσκῃ, τοῖς ἐπὶ τὸν αὐτὸν Θεὸν ἐλπίζουσιν, ἐν πικρίᾳ σου, μήποτε οὐ μὴ φοβηθήσονται τὸν ἐπ᾽ ἀμφοτέροις Θεόν· οὐ γὰρ ἔρχεται κατὰ πρόσωπον καλέσαι, ἀλλ᾽ ἐφ᾽ οὓς τὸ πνεῦμα ἡτοίμασεν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/004/010.yaml
  text: You shall not[a], in your bitterness, command your slave or female slave who hope in the same God, lest they should fail to fear the God who is over both; for he does not come to call according to outward standing, but upon those whom the Spirit has prepared.
  footnotes:
  - marker: a
    text: Or 'You shall not command your slave or your female slave in your bitterness—they who hope in the same God—'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:24Z'
    unchanged: false
    changes_summary: Inserted the missing space after the comma before 'lest.' No other changes needed; the draft is accurate and complete.
translation:
  language: es
  text: No mandarás[a], en tu amargura, a tu esclavo ni a tu esclava que esperan en el mismo Dios, no sea que dejen de temer al Dios que está sobre ambos; porque no viene a llamar según la apariencia exterior, sino a aquellos a quienes el Espíritu ha preparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "No mandarás a tu esclavo ni a tu esclava en tu amargura —que esperan en el mismo Dios—".'
    reason: alternative_wording_preserving_previous_rendering
lexical_decisions:
- source_word: δοῦλῳ σου ἢ παιδίσκῃ
  english_pob_choice: your slave or female slave
  chosen_spanish: tu esclavo[a] ni a tu esclava
  alternatives_spanish:
  - tu siervo o tu sierva
  - tu esclavo o tu esclava
  lexicon: δοῦλος; παιδίσκη
  rationale: POB eligió 'slave' para conservar la fuerza léxica; en español, 'esclavo' mantiene esa dureza mejor que 'siervo'. 'ni... ni...' fluye naturalmente con la prohibición en español y conserva la coordinación negativa del mandato.
- source_word: τοῖς ἐπὶ τὸν αὐτὸν Θεὸν ἐλπίζουσιν
  english_pob_choice: who hope in the same God
  chosen_spanish: a los que esperan en el mismo Dios
  alternatives_spanish:
  - que esperan en el mismo Dios
  - los cuales esperan en el mismo Dios
  lexicon: ἐλπίζουσιν; Θεός
  rationale: '''Esperan'' comunica la confianza estable expresada por ἐλπίζουσιν mejor que una formulación más abstracta. ''En el mismo Dios'' sigue de cerca el griego y preserva la idea de comunidad de fe compartida.'
- source_word: ἐν πικρίᾳ σου
  english_pob_choice: in your bitterness
  chosen_spanish: en tu amargura
  alternatives_spanish:
  - en tu amargura interior
  - con amargura
  lexicon: πικρία
  rationale: '''Amargura'' es el equivalente natural y fiel para πικρία. Se mantiene el enlace adverbial al verbo, como en la revisión inglesa, para evitar una construcción extraña en español.'
- source_word: τὸν ἐπ᾽ ἀμφοτέροις Θεόν
  english_pob_choice: the God who is over both
  chosen_spanish: al Dios que está sobre ambos
  alternatives_spanish:
  - al Dios que está sobre los dos
  - al Dios de ambos
  lexicon: ἐπ᾽ ἀμφοτέροις; Θεός
  rationale: '''Está sobre ambos'' preserva la relación de superioridad/gobierno implícita en ἐπ᾽ ἀμφοτέροις, sin suavizarla a un posesivo (''de ambos'') que perdería ese matiz.'
- source_word: κατὰ πρόσωπον καλέσαι
  english_pob_choice: to call according to outward standing
  chosen_spanish: llamar según la apariencia exterior
  alternatives_spanish:
  - llamar por la apariencia externa
  - llamar según el rostro
  lexicon: κατὰ πρόσωπον
  rationale: La POB tomó la expresión como referencia a estatus/apariencia externa; 'apariencia exterior' es una forma natural en español que conserva ese sentido sin introducir 'estatus' explícitamente, que sería interpretativo.
- source_word: ἐφ᾽ οὓς τὸ πνεῦμα ἡτοίμασεν
  english_pob_choice: upon those whom the Spirit has prepared
  chosen_spanish: sobre aquellos a quienes el Espíritu ha preparado
  alternatives_spanish:
  - sobre los que el Espíritu ha preparado
  - a quienes el Espíritu ha preparado
  lexicon: πνεῦμα; ἑτοιμάζω
  rationale: '''Espíritu'' se capitaliza aquí por la referencia al agente divino, siguiendo el sentido de la frase inglesa. ''Ha preparado'' conserva el perfectivo del griego y evita una paráfrasis más amplia.'
theological_decisions:
- issue: La referencia a 'el mismo Dios' y 'el Dios que está sobre ambos'
  english_pob_reading: same God / the God who is over both
  chosen_spanish_reading: el mismo Dios / el Dios que está sobre ambos
  alternative_spanish_readings:
  - el mismo Dios / el Dios de ambos
  - el mismo Dios / el Dios que gobierna a ambos
  rationale: 'Se conserva la duplicación para mantener la progresión del texto: los esclavos comparten la misma esperanza en Dios, y Dios está por encima de ambos. Traducir ''de ambos'' o ''que gobierna a ambos'' sería posible, pero perdería o reexpresaría el matiz relacional y jerárquico del griego.'
  doctrine_reference: Providencia y señorío de Dios sobre toda la comunidad
- issue: '''El Espíritu'' como agente preparador'
  english_pob_reading: the Spirit has prepared
  chosen_spanish_reading: el Espíritu ha preparado
  alternative_spanish_readings:
  - espíritu ha preparado
  - el espíritu ha preparado
  rationale: La mayúscula marca la lectura personal/divina que la POB adopta. En el contexto, no se trata de un mero 'espíritu' impersonal, sino del agente que prepara a quienes son llamados.
  doctrine_reference: Pneumatología; acción preparadora del Espíritu
translation_notes:
  revision_awareness: 'Se ha seguido la revisión inglesa más reciente, que corrigió únicamente la colocación de la expresión ''in your bitterness'' para que modifique con naturalidad el verbo. En español se adopta esa misma relación sintáctica: ''en tu amargura'' modifica ''ordenarás''. No se requieren más ajustes respecto del sentido del original griego.'
  spanish_consistency_notes:
  - Se usa 'esclavo' por consistencia con la decisión léxica de la POB para δοῦλος.
  - Se mantiene 'Mesías/Cristo' fuera de este versículo; no aplica aquí.
  - Se capitaliza 'Espíritu' por el agente divino identificado en la frase final.
  - La coordinación negativa 'ni... ni...' ayuda a evitar una literalidad poco natural sin perder la prohibición.
  - '''Apariencia exterior'' refleja la lectura de κατὰ πρόσωπον sin introducir una explicación interpretativa más amplia.'
