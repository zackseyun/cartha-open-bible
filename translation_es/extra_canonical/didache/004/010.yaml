revisions:
- from: No ordenarás a tu esclavo[a] ni a tu esclava, en tu amargura, a los que esperan en el mismo Dios, no sea que dejen de temer al Dios que está sobre ambos; porque no viene a llamar según la apariencia exterior, sino sobre aquellos a quienes el Espíritu ha preparado.
  to: No mandarás[a], en tu amargura, a tu esclavo ni a tu esclava que esperan en el mismo Dios, no sea que dejen de temer al Dios que está sobre ambos; porque no viene a llamar según la apariencia exterior, sino a aquellos a quienes el Espíritu ha preparado.
  rationale: Se reordena la frase para que 'que esperan en el mismo Dios' modifique con claridad a 'tu esclavo ni a tu esclava', conforme al griego y a la auditoría inglesa. Se cambia 'ordenarás' por 'mandarás' para lograr español natural en este contexto imperativo sin debilitar el sentido. También se ajusta 'sino sobre aquellos...' a 'sino a aquellos...' por idiomaticidad española.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:59:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva la mayoría del sentido del griego y sigue bien varias decisiones de la POB inglesa: δοῦλος/παιδίσκη como ''esclavo/esclava'', ἐν πικρίᾳ σου como ''en tu amargura'', y ''el Dios que está sobre ambos''. Sin embargo, la sintaxis española actual desalineó el modificador ''a los que esperan en el mismo Dios'': quedó colgando después de ''en tu amargura'' y ya no modifica claramente a ''tu esclavo ni a tu esclava'' como en el griego y en la revisión inglesa. Además, ''ordenarás ... a los que esperan'' suena gramaticalmente defectuoso en español.'
  spanish_quality_summary: La redacción actual es poco natural y confusa en español por la colocación de complementos. También 'sobre aquellos a quienes el Espíritu ha preparado' calca demasiado el inglés/griego tras 'llamar' y suena menos idiomático; 'a aquellos' es más natural aquí sin pérdida de sentido. El resto del registro es claro y digno.
  glossary_alignment: 'Buena alineación terminológica general: ''Dios'', ''Espíritu'', ''esclavo/esclava'' respetan los lineamientos del proyecto. No hay conflicto con términos teológicos clave. La principal necesidad es sintáctica, no terminológica.'
  issues:
  - severity: high
    issue: El relativo/complemento 'a los que esperan en el mismo Dios' está mal anclado.
    rationale: En el griego τοῖς ... ἐλπίζουσιν modifica a 'esclavo o esclava'. En el español dado, después de 'en tu amargura' parece complemento de 'ordenarás' o queda colgante, produciendo una oración incorrecta y oscureciendo el sentido.
  - severity: medium
    issue: La construcción 'No ordenarás a tu esclavo ... a los que esperan...' es gramaticalmente anómala.
    rationale: 'En español, ''ordenar a alguien'' suele requerir un infinitivo o una proposición; aquí el sentido real es ''mandar/tratar imperiosamente''. La solución más fiel y natural es reordenar: ''No mandarás, en tu amargura, a tu esclavo ni a tu esclava que esperan...''.'
  - severity: low
    issue: '''sino sobre aquellos a quienes el Espíritu ha preparado'' suena calcado y poco idiomático.'
    rationale: Tras 'llamar', en español 'llamar a aquellos...' fluye mejor. El matiz de ἐφ᾽ οὓς no exige mantener 'sobre' si eso entorpece la naturalidad.
  revised_spanish_text: No mandarás[a], en tu amargura, a tu esclavo ni a tu esclava que esperan en el mismo Dios, no sea que dejen de temer al Dios que está sobre ambos; porque no viene a llamar según la apariencia exterior, sino a aquellos a quienes el Espíritu ha preparado.
  revised_footnotes:
  - marker: a
    text: 'O: "No mandarás a tu esclavo ni a tu esclava en tu amargura —que esperan en el mismo Dios—".'
    reason: alternative_wording_preserving_previous_rendering
  revision_rationale: Se reordena la frase para que 'que esperan en el mismo Dios' modifique con claridad a 'tu esclavo ni a tu esclava', conforme al griego y a la auditoría inglesa. Se cambia 'ordenarás' por 'mandarás' para lograr español natural en este contexto imperativo sin debilitar el sentido. También se ajusta 'sino sobre aquellos...' a 'sino a aquellos...' por idiomaticidad española.
