translation:
  language: es
  text: Pero ustedes, los esclavos, sométanse a sus amos como a un representante de Dios[a], con vergüenza y temor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como a un patrón de Dios'.
    reason: alternativa_lexica_documentada
lexical_decisions:
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: δοῦλος
  rationale: El original griego usa δοῦλοι, y la traducción inglesa POB mantiene la fuerza lexical de 'slaves'. En español, 'esclavos' preserva esa carga semántica y evita suavizar el término a 'siervos', que sería más interpretativo.
- source_word: ὑποτάγησεθε
  english_pob_choice: shall be subject
  chosen_spanish: estén sujetos
  alternatives_spanish:
  - sujétense
  - sean sometidos
  lexicon: ὑποτάσσω
  rationale: La forma pasiva/imperativa en contexto exhortativo se expresa naturalmente en español con 'estén sujetos', que conserva la idea de subordinación estable sin introducir una voz demasiado dura o menos clara.
- source_word: κυρίοις
  english_pob_choice: masters
  chosen_spanish: amos
  alternatives_spanish:
  - señores
  - dueños
  lexicon: κύριος
  rationale: Aunque κύριος puede abarcar 'señor', aquí el contexto de esclavos y amos pide 'amos', que reproduce la relación social concreta del pasaje y evita una elevación innecesaria del término.
- source_word: τύπῳ Θεοῦ
  english_pob_choice: a representative of God
  chosen_spanish: a un representante de Dios
  alternatives_spanish:
  - a un modelo de Dios
  - como un tipo de Dios
  lexicon: τύπος
  rationale: Sigo la revisión inglesa que adjudicó 'representative' como mejor ajuste para τύπος en este contexto personal. 'Representante' comunica la función de quien encarna una autoridad delegada, mientras que 'modelo' o 'patrón' resultan más abstractos en español.
- source_word: αἰσχύνῃ
  english_pob_choice: reverence/fear context with shame nuance in English source text
  chosen_spanish: con vergüenza
  alternatives_spanish:
  - con pudor
  - con recato
  lexicon: αἰσχύνη
  rationale: El griego incluye αἰσχύνη, literalmente 'vergüenza', y no conviene borrarlo. Aunque suene más fuerte que una paráfrasis devocional, mantiene la tensión lexical documentada; el binomio con 'temor' conserva el tono admonitorio.
- source_word: φόβῳ
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - reverencia
  lexicon: φόβος
  rationale: '''Temor'' es la opción más sobria y fiel para φόβος en este contexto. ''Reverencia'' podría atenuar el sentido de temor real que el texto conserva junto a αἰσχύνη.'
theological_decisions:
- issue: Relación de subordinación entre esclavos y amos
  english_pob_reading: But you slaves shall be subject to your masters
  chosen_spanish_reading: Pero ustedes, los esclavos, estén sujetos a sus amos
  alternative_spanish_readings:
  - Pero ustedes, los siervos, sométanse a sus señores
  - Pero ustedes, los esclavos, sométanse a sus dueños
  rationale: La formulación conserva la exigencia ética del texto sin suavizar la relación social descrita por el griego. No se sustituye 'esclavos' por 'siervos' porque eso rebajaría una tensión social y lexical presente en la fuente.
  doctrine_reference: Ética exhortativa en literatura cristiana primitiva; preservación del léxico social del texto fuente.
- issue: Sentido de τύπος aplicado a Dios
  english_pob_reading: as to a representative of God
  chosen_spanish_reading: como a un representante de Dios
  alternative_spanish_readings:
  - como a un modelo de Dios
  - como a un patrón de Dios
  rationale: La revisión inglesa señala que τύπος aquí no funciona mejor como 'pattern'. En español, 'representante' comunica mejor la idea de una figura que actúa en lugar de la autoridad divina, sin convertir el término en una abstracción.
  doctrine_reference: Exégesis lexical de τύπος en contexto relacional; BDAG s.v. τύπος, acepción 6 citada para este versículo.
- issue: Conservación de 'vergüenza y temor'
  english_pob_reading: in reverence and fear
  chosen_spanish_reading: con vergüenza y temor
  alternative_spanish_readings:
  - con reverencia y temor
  - con pudor y temor
  rationale: Aunque la inglesa previa intentó una lectura más interpretativa, el griego conserva αἰσχύνη y φόβος. El español debe mantener ambos elementos para no borrar la tensión ética y afectiva del original.
  doctrine_reference: Fidelidad lexical al binomio αἰσχύνη καὶ φόβος.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'pattern of God' por 'representative of God' por razones lexicales bien fundamentadas en τύπος; la presente traducción española sigue esa decisión y no reintroduce 'patrón' como lectura principal. No hay cambios posteriores relevantes en el pasaje según el historial.
  spanish_consistency_notes:
  - Se mantiene el registro formal y eclesial sin recurrir a 'SEÑOR' para κύριος cuando el contexto social exige 'amos'.
  - Se conserva la fuerza de 'esclavos' para δοῦλοι en coherencia con la política POB documentada.
  - 'La nota a pie de página se ancla en ''representante de Dios'' porque existe una alternativa léxica real en español: ''modelo de Dios''.'
