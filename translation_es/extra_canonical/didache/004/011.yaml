  - severity: medium
    issue: Nota alternativa 'modelo de Dios' no coincide bien con la alternativa auditada
    rationale: La pista inglesa preserva 'pattern of God'; en español, 'modelo de Dios' desplaza el matiz hacia una abstracción moderna. 'Patrón de Dios' es más cercano formalmente, aunque siga siendo difícil, y funciona mejor como nota de alternativa literal/tradicional.
  revised_spanish_text: Pero ustedes, los esclavos, sométanse a sus amos como a un representante de Dios[a], con vergüenza y temor.
  revised_footnotes:
