translation:
  language: es
  text: No apartarás tu mano de tu hijo ni de tu hija, sino que desde la niñez les enseñarás el temor de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐκ ἀρεῖς τὴν χεῖρά σου ἀπὸ τοῦ υἱοῦ σου ἢ ἀπὸ τῆς θυγατρός σου
  english_pob_choice: You shall not take your hand away from your son or from your daughter
  chosen_spanish: No apartarás tu mano de tu hijo ni de tu hija
  alternatives_spanish:
  - No retirarás tu mano de tu hijo ni de tu hija
  - No quitarás tu mano de tu hijo ni de tu hija
  lexicon: ἀρέω / αἴρω; χείρ; υἱός; θυγάτηρ
  rationale: Conservo la imagen idiomática de la ‘mano’ y el valor exhortativo/jurídico del futuro prohibitivo en español con ‘No apartarás’. ‘Apartar la mano’ comunica bien la idea de retirar cuidado o apoyo sin volverla más abstracta de lo que permite el griego.
- source_word: ἀπὸ νεότητος
  english_pob_choice: from youth
  chosen_spanish: desde la niñez
  alternatives_spanish:
  - desde la juventud
  - desde joven edad
  lexicon: νεότης
  rationale: ‘Niñez’ expresa con mayor naturalidad en español la etapa inicial de formación que el texto pide para la instrucción temprana. ‘Juventud’ puede sonar más tardío y menos preciso en este contexto pedagógico.
- source_word: διδάξεις τὸν φόβον τοῦ Θεοῦ
  english_pob_choice: you shall teach them the fear of God
  chosen_spanish: les enseñarás el temor de Dios
  alternatives_spanish:
  - les enseñarás el temor de Dios
  - les instruirás en el temor de Dios
  lexicon: διδάσκω; φόβος τοῦ Θεοῦ
  rationale: Mantengo ‘temor de Dios’ porque el sintagma es directo y tradicionalmente inteligible en español, sin suavizar el peso reverente del griego. ‘Les enseñarás’ conserva el sentido básico de formación continua implícito en διδάξεις.
theological_decisions:
- issue: 'El alcance de la prohibición: cuidado parental persistente frente a abandono'
  english_pob_reading: You shall not take your hand away from your son or from your daughter
  chosen_spanish_reading: No apartarás tu mano de tu hijo ni de tu hija
  alternative_spanish_readings:
  - No retirarás tu mano de tu hijo ni de tu hija
  - No abandonarás a tu hijo ni a tu hija
  rationale: La metáfora de la mano sugiere retener apoyo y atención; no conviene reducirla a ‘abandonar’ porque perdería la imagen concreta del original. La formulación elegida mantiene la fuerza ética y la imagen corporal.
  doctrine_reference: Formación cristiana en el hogar; deber de instrucción temprana de los hijos en la piedad.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; el texto inglés auditado se mantuvo estable con alta concordancia. Esta versión española sigue de cerca ese sentido sin añadir glosas ni tensiones no presentes en el griego.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para Θεοῦ conforme a la terminología POB.
  - Se conserva un registro bíblico sobrio y claro, sin introducir ‘Señor’ ni ‘Cristo’ porque no aparecen en el versículo.
  - ‘Temor de Dios’ se preserva como fórmula reverente y semánticamente fiel, sin convertirla en mero ‘respeto’.
