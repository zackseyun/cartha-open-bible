source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Οὐ διστάσεις δοῦναι οὐδὲ διδοὺς γογγύσεις· γνώσῃ γὰρ τίς ἐστιν ὁ τοῦ μισθοῦ καλὸς ἀνταποδότης.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/004/007.yaml
  text: You shall not hesitate to give, nor grumble while giving; for you will know who is the good giver of the reward.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:21Z'
    unchanged: false
    changes_summary: Changed 'repayer' to 'giver' to reflect the more natural and likely intended sense of the line in English, while preserving the structure and meaning of the verse.
translation:
  language: es
  text: No vaciles en dar, ni murmures mientras das; porque sabrás quién es el buen recompensador.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐ διστάσεις
  english_pob_choice: You shall not hesitate
  chosen_spanish: No vaciles
  alternatives_spanish:
  - No dudes
  - No titubees
  lexicon: διστάζω
  rationale: «Vacilar» comunica con naturalidad la idea de dudar o titubear al dar, sin volverlo más interpretativo de lo que permite el griego.
- source_word: δοῦναι
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - entregar
  - conceder
  lexicon: δίδωμι
  rationale: El infinitivo simple «dar» es la forma más directa y fiel al acto indicado por el griego.
- source_word: γογγύσεις
  english_pob_choice: grumble while giving
  chosen_spanish: murmures mientras das
  alternatives_spanish:
  - te quejes mientras das
  - refunfuñes mientras das
  lexicon: γογγύζω
  rationale: «Murmurar» conserva el matiz de queja baja o descontenta que expresa el verbo griego, manteniendo el paralelo con el acto de dar.
- source_word: τοῦ μισθοῦ
  english_pob_choice: the reward
  chosen_spanish: la recompensa
  alternatives_spanish:
  - el salario
  - el pago
  lexicon: μισθός
  rationale: Aquí el contexto apunta a la recompensa recibida; «recompensa» es la opción más clara en español y preserva la fuerza retributiva del término.
- source_word: καλὸς ἀνταποδότης
  english_pob_choice: the good giver of the reward
  chosen_spanish: el buen dador de la recompensa
  alternatives_spanish:
  - el buen remunerador
  - el buen retribuidor
  lexicon: ἀνταποδότης
  rationale: La revisión inglesa prefirió «giver» sobre «repayer»; en español, «dador» mantiene esa lectura más natural, evitando un giro demasiado técnico o jurídico.
theological_decisions:
- issue: Identidad de quien recompensa
  english_pob_reading: who is the good giver of the reward
  chosen_spanish_reading: quién es el buen dador de la recompensa
  alternative_spanish_readings:
  - quién es el buen retribuidor
  - quién es el que da la recompensa
  rationale: 'Se conserva la ambigüedad sobria del dicho: no se explicita más de lo que el griego y la revisión inglesa sostienen, pero se entiende a Dios como el agente implícito de la recompensa.'
  doctrine_reference: Prov 11:25; Heb 11:6
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'repayer' a 'giver' para reflejar mejor el sentido natural del final de la línea. La versión española sigue esa decisión con «dador» y evita un término más mecánico como «retribuidor».
  spanish_consistency_notes:
  - Se mantiene el imperativo prohibitivo en segunda persona singular plural implícita ('No vaciles', 'murmures') como equivalente natural del griego.
  - No se introduce 'SEÑOR' ni 'Cristo' porque el texto no los contiene; la referencia a Dios queda implícita en el refrán.
