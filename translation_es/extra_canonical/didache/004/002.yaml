  text: Ἐκζητήσεις δὲ καθ’ ἡμέραν τὰ πρόσωπα τῶν ἁγίων, ἵνα ἐπαναπαῇ τοῖς λόγοις αὐτῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/004/002.yaml
  text: And you shall seek out day by day the presence of the saints, so that you may find rest in their words.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:19Z'
    unchanged: false
    changes_summary: Changed 'faces' to 'presence' for more natural English while preserving the sense of seeking out the holy ones personally; left the rest unchanged.
translation:
  language: es
  text: Y buscarás cada día la presencia de los santos, para que halles descanso en sus palabras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐκζητήσεις
  english_pob_choice: you shall seek out
  chosen_spanish: buscarás
  alternatives_spanish:
  - indagarás
  - buscarás con empeño
  lexicon: ἐκζητέω
  rationale: El griego expresa una búsqueda diligente o intencional. En español, «buscarás» comunica bien la acción sin forzar una perífrasis demasiado pesada; el contexto de «cada día» ya aporta insistencia.
- source_word: τὰ πρόσωπα τῶν ἁγίων
  english_pob_choice: the presence of the saints
  chosen_spanish: la presencia de los santos
  alternatives_spanish:
  - los rostros de los santos
  - el semblante de los santos
  lexicon: πρόσωπον
  rationale: Aunque πρόσωπον puede significar «rostro», el audit trail inglés ya decidió «presence» para evitar una literalidad extraña. En español, «presencia» conserva naturalmente la idea de buscar a los santos personalmente, sin reducirla a rasgos faciales.
- source_word: καθ’ ἡμέραν
  english_pob_choice: day by day
  chosen_spanish: cada día
  alternatives_spanish:
  - día tras día
  - día por día
  lexicon: καθ’ ἡμέραν
  rationale: «Cada día» es la forma más natural y directa en español para expresar la continuidad diaria del original y del inglés POB.
- source_word: τοῖς λόγοις αὐτῶν
  english_pob_choice: in their words
  chosen_spanish: en sus palabras
  alternatives_spanish:
  - en sus dichos
  - en sus enseñanzas
  lexicon: λόγος
  rationale: «Palabras» mantiene el sentido inmediato del griego y del inglés POB. No se amplía a «enseñanzas» porque el texto no lo exige explícitamente.
theological_decisions:
- issue: Sentido de «los santos»
  english_pob_reading: the saints
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los creyentes
  - los fieles
  rationale: Se conserva «los santos» porque refleja el lenguaje del texto y mantiene la referencia comunitaria de los consagrados a Dios, sin sustituirla por un término más interpretativo.
  doctrine_reference: Uso bíblico de «santos» para el pueblo apartado para Dios.
- issue: Relación entre buscar a los santos y hallar descanso en sus palabras
  english_pob_reading: so that you may find rest in their words
  chosen_spanish_reading: para que halles descanso en sus palabras
  alternative_spanish_readings:
  - para que encuentres descanso en sus palabras
  - para que recibas descanso de sus palabras
  rationale: «Halles descanso» conserva el matiz de resultado buscado por la forma verbal del griego y suena natural en español. Se evita explicitar una mediación doctrinal que el texto no formula.
  doctrine_reference: Sabiduría y edificación recibidas mediante la comunión y la enseñanza de los santos.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que sustituyó «faces» por «presence» para reflejar mejor el valor de πρόσωπα sin caer en una traducción demasiado corporal. La versión española sigue esa decisión con «presencia», manteniendo la búsqueda personal de los santos y el énfasis relacional del pasaje.
  spanish_consistency_notes:
  - Se evitó «rostros» porque en español sonaría más concreto de lo que el audit trail inglés decidió preservar.
  - Se mantuvo el registro bíblico sobrio y comprensible, sin añadir interpretaciones devocionales ajenas al texto.
  - «Santos» se deja sin mayúsculas por tratarse de un sustantivo común en español bíblico, salvo contexto editorial distinto.
