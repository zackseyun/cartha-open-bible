  text: Οὐκ ἀποστραφήσῃ τὸν ἐνδεόμενον, συγκοινωνήσεις δὲ πάντα τῷ ἀδελφῷ σου καὶ οὐκ ἐρεῖς ἴδια εἶναι· εἰ γὰρ ἐν τῷ ἀθανάτῳ κοινωνοί ἐστε, πόσῳ μᾶλλον ἐν τοῖς θνητοῖς;
