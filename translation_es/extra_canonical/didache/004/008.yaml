review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego en la mayor parte del versículo: no rechazar al necesitado, compartir con el hermano, no reclamar los bienes como exclusivamente propios, y el argumento a fortiori entre lo inmortal y lo mortal. Sin embargo, la cláusula final en español, «cuánto más de lo mortal», no refleja con suficiente fidelidad la preposición ἐν ni suena plenamente natural en español. El sentido del griego y del inglés auditado se preserva mejor con «cuánto más en las cosas mortales» o similar.'
  spanish_quality_summary: El español es claro y digno en general. «No apartarás al necesitado» es aceptable aunque algo menos idiomático que «No rechazarás al necesitado»; aun así, puede defenderse por su cercanía al objeto directo del griego. El principal problema de legibilidad está en «cuánto más de lo mortal», que resulta forzado en español y requiere reparación.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas. Conviene ajustar solo la expresión final para mantener la fuerza de κοινωνοί / ἐν ... ἐν ... y un español natural.
  issues:
  - severity: medium
    issue: La frase final «cuánto más de lo mortal» es poco natural y no representa bien ἐν τοῖς θνητοῖς.
    rationale: 'El griego usa ἐν con plural neutro sustantivado: «en las cosas mortales» o «en lo mortal». «De lo mortal» cambia la relación y suena incompleto en español.'
  - severity: low
    issue: La nota al pie intenta compensar una formulación principal deficiente.
    rationale: La alternativa explicativa de la nota reconoce de hecho la mejor lectura. Es preferible corregir el texto principal y simplificar la nota, o eliminarla si ya no hace falta.
  revised_spanish_text: No apartarás al necesitado; antes compartirás todas las cosas con tu hermano, y no dirás que son tuyas; porque si sois partícipes de lo inmortal, cuánto más en las cosas mortales.
  revision_rationale: Se corrige únicamente la cláusula final para reflejar con mayor fidelidad el ἐν τοῖς θνητοῖς del griego y mejorar la naturalidad del español. Con esa reparación, no hace falta nota al pie.
  requires_gpt54_adjudication: false
  applied_revision: true
