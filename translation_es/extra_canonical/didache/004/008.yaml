base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/004/008.yaml
  text: You shall not turn away the one in need, but you shall share all things with your brother, and you shall not say they are your own; for if you are sharers in what is immortal, how much more in mortal things?
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:23Z'
    unchanged: false
    changes_summary: Changed 'turn away from the one in need' to 'turn away the one in need' for closer alignment with ἀποστραφήσῃ taking a direct object. No other changes needed.
translation:
  language: es
  text: No apartarás al necesitado; antes compartirás todas las cosas con tu hermano, y no dirás que son tuyas; porque si sois partícipes de lo inmortal, cuánto más en las cosas mortales.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Οὐκ ἀποστραφήσῃ τὸν ἐνδεόμενον
  english_pob_choice: You shall not turn away the one in need
  chosen_spanish: No apartarás al necesitado
  alternatives_spanish:
  - No rechazarás al necesitado
  - No te apartarás del necesitado
  lexicon: ἀποστρέφω; ἐνδεής
  rationale: 'El griego toma un objeto directo: la idea es no rechazar/alejar al necesitado, no simplemente no mirar hacia él. ''Apartar'' conserva la fuerza de desviar o desentenderse sin añadir más que el texto.'
- source_word: συγκοινωνήσεις δὲ πάντα τῷ ἀδελφῷ σου
  english_pob_choice: but you shall share all things with your brother
  chosen_spanish: antes compartirás todas las cosas con tu hermano
  alternatives_spanish:
  - sino que compartirás todo con tu hermano
  - y compartirás todas las cosas con tu hermano
  lexicon: συγκοινωνέω; πᾶς
  rationale: '''Compartirás'' expresa la participación conjunta del verbo; ''todas las cosas'' preserva el alcance absoluto de πάντα. ''Antes'' refleja el contraste exhortativo del δέ en español natural.'
- source_word: οὐκ ἐρεῖς ἴδια εἶναι
  english_pob_choice: and you shall not say they are your own
  chosen_spanish: y no dirás que son tuyas
  alternatives_spanish:
  - 'y no dirás: ‘son tuyas’'
  - y no dirás que te pertenecen
  lexicon: λέγω; ἴδιος
  rationale: '''Son tuyas'' comunica de modo idiomático la negación de posesión propia. Se evita ''te pertenecen'' para no suavizar el matiz de propiedad personal que el griego niega.'
- source_word: ἐν τῷ ἀθανάτῳ κοινωνοί ἐστε
  english_pob_choice: if you are sharers in what is immortal
  chosen_spanish: si sois partícipes de lo inmortal
  alternatives_spanish:
  - si sois compañeros en lo inmortal
  - si participáis de lo inmortal
  lexicon: κοινωνός; ἀθάνατος
  rationale: '''Partícipes'' conserva la idea de participación/comunión común. ''Lo inmortal'' sigue el sustantivo neutro del griego y evita convertirlo en una sustancia o ser específico.'
- source_word: ἐν τοῖς θνητοῖς
  english_pob_choice: in mortal things
  chosen_spanish: de lo mortal
  alternatives_spanish:
  - en las cosas mortales
  - en lo mortal
  lexicon: θνητός
  rationale: En español, la construcción comparativa 'cuánto más de lo mortal' resulta más fluida y mantiene el contraste entre la esfera inmortal y la mortal, sin perder el valor general del plural neutro.
theological_decisions:
- issue: Contraste entre participación en lo inmortal y obligación en lo mortal
  english_pob_reading: if you are sharers in what is immortal, how much more in mortal things?
  chosen_spanish_reading: si sois partícipes de lo inmortal, cuánto más de lo mortal
  alternative_spanish_readings:
  - si participáis de lo inmortal, cuánto más en las cosas mortales
  - si sois compartidores de lo inmortal, cuánto más en lo mortal
  rationale: 'La sentencia apela a una lógica de mayor a menor: quienes comparten la realidad imperecedera deben hacerlo con mayor razón en bienes temporales. La formulación española conserva ese razonamiento sin sobreexplicar.'
  doctrine_reference: Argumento a fortiori; comunión de bienes entre creyentes
- issue: Referencia a propiedad privada frente a comunión fraterna
  english_pob_reading: you shall not say they are your own
  chosen_spanish_reading: no dirás que son tuyas
  alternative_spanish_readings:
  - no dirás que te pertenecen
  - 'no dirás: ‘son míos’'
  rationale: El texto no abole de forma abstracta toda noción de posesión, sino que prohíbe reclamar exclusividad sobre los bienes frente al hermano. La traducción mantiene esa tensión sin resolverla en exceso.
  doctrine_reference: Ética comunitaria de la Didaché
translation_notes:
  revision_awareness: Se atendió la revisión auditada que precisó ἀποστραφήσῃ como objeto directo ('no apartarás al necesitado'). No se adoptó un giro reflexivo ('apartarte de') porque el griego y el control de revisión favorecen la lectura transitiva. No se añadieron notas no ancladas; la única nota queda marcada en el texto con [a].
  spanish_consistency_notes:
  - Se mantuvo «partícipes» para κοινωνοί por coherencia con lenguaje bíblico y por su valor de participación compartida.
  - Se prefirió «Yahvé» solo cuando el texto base lo requiera; aquí no aparece el nombre divino.
  - No se usó «SEÑOR» ni «Cristo» porque el pasaje no contiene esos términos.
  - Se evitó «siervo» para δοῦλος porque no aparece en este versículo.
  - La puntuación sigue el paralelismo exhortativo del original y conserva el contraste final a fortiori.
