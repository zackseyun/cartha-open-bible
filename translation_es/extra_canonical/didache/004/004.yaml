lexical_decisions:
- source_word: Οὐ διψυχήσεις
  english_pob_choice: You shall not be double-minded
  chosen_spanish: No seas de doble ánimo
  alternatives_spanish:
  - No dudes
  - No vaciles
  - No seas inconstante
  lexicon: διψυχέω
  rationale: El verbo griego expresa la idea de vacilar entre dos disposiciones o quedar dividido interiormente. En español, «de doble ánimo» conserva bien la imagen conceptual y la tensión lexical sin reducirla solo a «dudar», que fue la solución de una revisión anterior pero pierde el matiz de división interior.
- source_word: πότερον
  english_pob_choice: whether
  chosen_spanish: si
  alternatives_spanish:
  - ya sea que
  - si es que
  lexicon: πότερον
  rationale: La partícula introduce una pregunta indirecta disyuntiva. «Si» es la forma más natural en español para reproducir la subordinación interrogativa sin añadir peso innecesario.
- source_word: ἔσται
  english_pob_choice: it will be
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - existirá
  lexicon: εἰμί
  rationale: El futuro copulativo se transmite de manera directa con «será». Mantiene la sencillez del original y funciona bien en español dentro de la cláusula interrogativa.
theological_decisions:
- issue: La exhortación ética contra la duplicidad interior
  english_pob_reading: You shall not be double-minded whether it will be or not.
  chosen_spanish_reading: No seas de doble ánimo, si será o no será.
  alternative_spanish_readings:
  - No dudes si será o no será.
  - No vaciles sobre si será o no será.
  rationale: El texto no trata una doctrina explícita, sino una amonestación moral contra la indecisión o división interior. «De doble ánimo» conserva mejor que «dudar» la fuerza de la crítica a una disposición interior dividida, que es precisamente el punto del griego y de la tradición léxica asociada a διψυχέω.
  doctrine_reference: Ética cristiana primitiva; integridad del corazón
translation_notes:
  revision_awareness: La revisión automática osciló entre «dudar» y «ser de doble ánimo»; la decisión final en español sigue la lectura más cercana al valor lexical de διψυχέω, pero la nota conserva la alternativa interpretativa que aclaraba la sintaxis de la cláusula.
  spanish_consistency_notes:
  - «Doble ánimo» mantiene coherencia con el lenguaje cristiano primitivo de la duplicidad interior, sin reemplazarlo por una paráfrasis más explicativa.
  - Se evitó «SEÑOR» u otra sustitución teológica porque el verso no contiene el nombre divino ni una cita directa de κύριος.
  - La estructura «si será o no será» reproduce la pregunta indirecta breve del griego de forma natural en español.
