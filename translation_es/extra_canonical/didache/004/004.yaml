review_pass:
  verdict: revise
  source_alignment_summary: El griego Οὐ διψυχήσεις, πότερον ἔσται ἢ οὔ exhorta contra la vacilación o división interior ante la cuestión de si algo será o no. La propuesta española acierta al conservar «de doble ánimo» para reflejar διψυχέω mejor que un simple «dudar». Sin embargo, la coma y la cláusula «si será o no será» suenan forzadas en español y debilitan la relación sintáctica del complemento interrogativo con el verbo.
  spanish_quality_summary: «No seas de doble ánimo» es digno y comprensible, pero «si será o no será» queda poco natural en español moderno. La construcción mejora claramente con «sobre si será o no», que expresa con naturalidad la interrogativa indirecta y evita la repetición innecesaria de «será».
  glossary_alignment: No hay términos del glosario principal en juego. La decisión léxica clave es διψυχέω, y «de doble ánimo» está alineado con la racionalidad documentada del POB. La nota alternativa con «No dudes...» puede conservarse como variante más idiomática pero menos literal.
  issues:
  - severity: medium
    issue: 'Construcción sintáctica poco natural en español: «si será o no será».'
    rationale: Aunque calca de cerca el inglés y el griego, en español suena rígido y algo extraño. «Sobre si será o no» o «acerca de si será o no» comunica mejor la interrogativa indirecta.
  - severity: low
    issue: La coma tras «de doble ánimo[a]» no ayuda en español.
    rationale: El complemento depende del predicado verbal; sin pausa fuerte fluye mejor y refleja mejor la unidad de la exhortación.
  revised_spanish_text: No seas de doble ánimo[a] sobre si será o no.
  revised_footnotes:
