  revision_rationale: Se reemplaza «la palabra dicha» por «esto es lo que fue dicho» para reflejar mejor ἡ ῥηθεῖσα en español natural y conforme al sentido auditado final. Se corrige la nota al pie para que preserve una alternativa real, no una repetición del texto. Se ajusta «ofrecedme» a «ofrézcanme» por neutralidad latinoamericana sin pérdida de fuerza cultual.
