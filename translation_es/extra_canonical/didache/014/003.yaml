source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: αὕτη γάρ ἐστιν ἡ ῥηθεῖσα ὑπὸ Κυρίου· Ἐν παντὶ τόπῳ καὶ χρόνῳ προσφέρειν μοι θυσίαν καθαράν· ὅτι βασιλεὺς μέγας εἰμί, λέγει Κύριος, καὶ τὸ ὄνομά μου θαυμαστὸν ἐν τοῖς ἔθνεσι.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/014/003.yaml
  text: 'For this is what was spoken by the Lord: “In every place and time offer me a pure sacrifice[a], because I am a great King,” says the Lord, “and my name is marvelous among the nations.”'
  footnotes:
  - marker: a
    text: Or 'For this is what was spoken by the Lord:'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:01Z'
    unchanged: false
    changes_summary: Replaced 'the sacrifice spoken of by the Lord' with 'what was spoken by the Lord' to reflect the Greek more accurately; ἡ ῥηθεῖσα refers to the saying spoken, not the sacrifice itself.
translation:
  language: es
  text: 'Porque esto es lo que fue dicho por el Señor[a]: «En todo lugar y en todo tiempo, ofrézcanme un sacrificio puro, porque yo soy un gran Rey —dice el Señor—, y mi nombre es admirable entre las naciones».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque esto es lo dicho por el Señor:»'
    reason: alternative_rendering_of_ἡ_ῥηθεῖσα
lexical_decisions:
- source_word: ἡ ῥηθεῖσα / ῥηθεῖσα
  english_pob_choice: what was spoken
  chosen_spanish: la palabra dicha
  alternatives_spanish:
  - lo dicho
  - lo que fue dicho
  - lo proclamado
  lexicon: ῥηθεῖσα
  rationale: El griego femenino retoma el antecedente implícito de «la ofrenda/sacrificio» mediante la expresión formulada; en español, «la palabra dicha» conserva la referencia a un dicho profético sin convertir erróneamente la frase en una descripción del sacrificio como objeto del habla.
- source_word: προσφέρειν μοι θυσίαν καθαράν
  english_pob_choice: offer me a pure sacrifice
  chosen_spanish: ofrecedme un sacrificio puro
  alternatives_spanish:
  - ofrecerme un sacrificio puro
  - presentadme un sacrificio puro
  - brindadme un sacrificio puro
  lexicon: προσφέρειν ... θυσίαν καθαράν
  rationale: «Ofrecedme» mantiene el valor cultual de προσφέρειν y conserva el eco litúrgico del texto, mientras «sacrificio puro» reproduce θυσίαν καθαράν con lenguaje natural y fiel al registro bíblico.
- source_word: βασιλεὺς μέγας εἰμί
  english_pob_choice: I am a great King
  chosen_spanish: yo soy un gran Rey
  alternatives_spanish:
  - soy un gran Rey
  - yo soy Rey grande
  - yo soy un Rey grande
  lexicon: βασιλεὺς μέγας
  rationale: Se mantiene el orden y la fuerza declarativa del original. «Gran Rey» es la formulación más directa y reverente en español, sin diluir el título real.
- source_word: τὸ ὄνομά μου θαυμαστὸν
  english_pob_choice: my name is marvelous
  chosen_spanish: mi nombre es admirable
  alternatives_spanish:
  - mi nombre es maravilloso
  - mi nombre es admirable y maravilloso
  - mi nombre es digno de admiración
  lexicon: θαυμαστόν
  rationale: «Admirable» preserva la cualidad de algo digno de asombro o reverencia y evita una resonancia excesivamente emotiva de «maravilloso» en español moderno.
- source_word: ἐν τοῖς ἔθνεσι
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones
  lexicon: ἔθνεσι
  rationale: «Entre las naciones» mantiene la correspondencia intertextual con el lenguaje profético del AT y el alcance universal del texto.
theological_decisions:
- issue: Identificación de la cita como profecía aplicada al sacrificio cristiano
  english_pob_reading: For this is what was spoken by the Lord
  chosen_spanish_reading: Porque esta es la palabra dicha por el Señor
  alternative_spanish_readings:
  - Porque esto es lo que fue dicho por el Señor
  - Porque este es el sacrificio del que habló el Señor
  rationale: La revisión inglesa reciente distinguió correctamente que ἡ ῥηθεῖσα alude a la palabra dicha, no al sacrificio mismo. En español se conserva esa relación sin borrar el argumento de continuidad profética del pasaje.
  doctrine_reference: Didaché 14:1-3; referencia a Malaquías 1:11 en la recepción cristiana primitiva
- issue: Conservación del lenguaje sacrificial
  english_pob_reading: offer me a pure sacrifice
  chosen_spanish_reading: ofrecedme un sacrificio puro
  alternative_spanish_readings:
  - presentadme un sacrificio puro
  - ofrecedme una ofrenda pura
  rationale: El texto del capítulo usa θυσία con fuerza sacrificial; traducirlo como «ofrenda» o suavizarlo demasiado perdería la conexión teológica del pasaje con el culto y con la argumentación de la Didaché.
  doctrine_reference: Didaché 14:1-3; Mal 1:11; tipología sacrificial del culto cristiano primitivo
- issue: Nombre divino y fórmula profética
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice Yahvé
  - dice el Señor Yahvé
  rationale: Aunque el proyecto general prefiere «Yahvé» para יהוה, en esta cita del lxx/recepción griega la fórmula repetida «λέγει Κύριος» funciona como marcador profético de cita. Mantener «dice el Señor» evita crear una mezcla artificial dentro de una cita textual ya fijada por la tradición citacional del pasaje.
  doctrine_reference: Didaché 14:3; forma citacional de texto profético griego
- issue: Universalidad de la alabanza divina
  english_pob_reading: my name is marvelous among the nations
  chosen_spanish_reading: mi nombre es admirable entre las naciones
  alternative_spanish_readings:
  - mi nombre es maravilloso entre las naciones
  - mi nombre será admirado entre las naciones
  rationale: La elección conserva el presente de afirmación del original y el matiz de asombro/reverencia, sin introducir un futuro ni una pasivización no presentes en el griego.
  doctrine_reference: Mal 1:11 en su recepción; universalidad del culto a Dios
translation_notes:
  revision_awareness: Se tomó en cuenta la última revisión inglesa que corrigió la relación gramatical de αὕτη / ἡ ῥηθεῖσα con ἡ θυσία, pero también la posterior aclaración de que ῥηθεῖσα se refiere a la palabra dicha. Por eso el español evita tanto convertir la frase en una referencia impersonal genérica como hacer que el sacrificio mismo sea 'lo dicho'.
  spanish_consistency_notes:
  - Se conserva el registro litúrgico-profético del pasaje con vocabulario sacrificial explícito.
  - No se usa «SEÑOR» en mayúsculas como máscara; se traduce la fórmula citacional griega de modo natural en español.
  - 'La frase final mantiene el paralelismo del original: mandato cultual, declaración real y afirmación universal sobre el nombre divino.'
