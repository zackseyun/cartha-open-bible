translation:
  language: es
  text: 'Pero en el día del Señor, cuando se hayan reunido, partan el pan y den gracias, después de confesar primero sus transgresiones, para que su sacrificio sea puro. Pero nadie que tenga una disputa con su compañero venga a reunirse con ustedes hasta que se reconcilien, para que su sacrificio no sea contaminado. Porque esto es lo que fue dicho por el Señor: “En todo lugar y tiempo ofrézcanme un sacrificio puro, porque yo soy un gran Rey”, dice el Señor, “y mi nombre es admirable entre las naciones”.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Κατὰ κυριακὴν δὲ Κυρίου
  english_pob_choice: on the Lord’s day
  chosen_spanish: en el día del Señor
  alternatives_spanish:
  - el día del Señor
  - en el día del Señor propio
  lexicon: LSJ
  rationale: La duplicación de κυριακή / Κυρίου sugiere un énfasis litúrgico en el día perteneciente al Señor. En español, la forma natural y fiel es “en el día del Señor”; conserva el sentido sin forzar una explicación extraña.
- source_word: συναχθέντες
  english_pob_choice: after you have gathered together
  chosen_spanish: cuando se hayan reunido
  alternatives_spanish:
  - después de haberse reunido
  - habiéndose reunido
  lexicon: BDAG
  rationale: El participio aoristo antecede a los imperativos y marca la reunión previa de la comunidad. “Cuando se hayan reunido” expresa bien la secuencia y suena natural en español.
- source_word: κλάσατε ἄρτον
  english_pob_choice: break bread
  chosen_spanish: partan el pan
  alternatives_spanish:
  - partan el pan juntos
  - rompan el pan
  lexicon: BDAG
  rationale: “Partan el pan” conserva el valor litúrgico y comunitario de la expresión sin añadir un tecnicismo eucarístico que el griego inmediato no explicita.
- source_word: εὐχαριστήσατε
  english_pob_choice: give thanks
  chosen_spanish: den gracias
  alternatives_spanish:
  - ofrezcan gracias
  - hagan acción de gracias
  lexicon: BDAG
  rationale: El verbo significa literalmente dar gracias. En español, “den gracias” es claro, sobrio y compatible con el trasfondo eucarístico sin convertirlo en término técnico.
- source_word: προεξομολογησάμενοι
  english_pob_choice: after first confessing
  chosen_spanish: después de confesar primero
  alternatives_spanish:
  - después de haber confesado antes
  - tras confesar previamente
  lexicon: LSJ
  rationale: El compuesto señala confesión previa y abierta. “Después de confesar primero” conserva la prioridad temporal y la fuerza penitencial del contexto.
- source_word: τὰ παραπτώματα ὑμῶν
  english_pob_choice: your transgressions
  chosen_spanish: sus transgresiones
  alternatives_spanish:
  - sus ofensas
  - sus faltas
  - sus pecados
  lexicon: BDAG
  rationale: “Transgresiones” mantiene el peso moral de παραπτώματα y evita suavizarlo demasiado. También conserva mejor la formalidad del texto ritual.
- source_word: θυσία
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  lexicon: BDAG
  rationale: El texto insiste en el lenguaje sacrificial y luego lo refuerza con la cita profética. “Sacrificio” preserva esa tensión teológica sin reducirla a “ofrenda”.
- source_word: ἔχων τὴν ἀμφιβολίαν
  english_pob_choice: who has a dispute
  chosen_spanish: que tenga una disputa
  alternatives_spanish:
  - que esté en desacuerdo
  - que tenga una querella
  - que tenga una controversia
  lexicon: LSJ
  rationale: Aunque el sentido literal de la raíz puede sugerir duda o vacilación, aquí el contexto interpersonal exige un conflicto relacional. “Disputa” recoge bien ese matiz.
- source_word: μετὰ τοῦ ἑταίρου αὐτοῦ
  english_pob_choice: with his companion
  chosen_spanish: con su compañero
  alternatives_spanish:
  - con su compañero de comunidad
  - con su asociado
  lexicon: LSJ
  rationale: ἑταῖρος designa un compañero o asociado. “Compañero” es fiel y evita introducir “hermano”, que el griego no usa aquí.
- source_word: μὴ συνελθέτω ὑμῖν
  english_pob_choice: let no one ... come together with you
  chosen_spanish: no venga a reunirse con ustedes
  alternatives_spanish:
  - no se una a su asamblea
  - no se reúna con ustedes
  lexicon: BDAG
  rationale: La prohibición apunta a la participación en la asamblea común. “Venga a reunirse con ustedes” mantiene el valor comunitario del verbo.
- source_word: διαλλαγῶσιν
  english_pob_choice: they are reconciled
  chosen_spanish: se reconcilien
  alternatives_spanish:
  - hagan las paces
  - se restauren
  lexicon: BDAG
  rationale: La forma pasiva/subjuntiva indica reconciliación como resultado esperado. “Se reconcilien” es la expresión más natural y exacta en español.
- source_word: κοινωθῇ
  english_pob_choice: be defiled
  chosen_spanish: sea profanado
  alternatives_spanish:
  - sea contaminado
  - sea hecho común
  lexicon: BDAG
  rationale: En este contexto cultual, κοινόω contrasta con καθαρά y apunta a pérdida de pureza sacra. “Profanado” comunica esa alteración del carácter santo del sacrificio.
- source_word: ἡ ῥηθεῖσα ὑπὸ Κυρίου
  english_pob_choice: what was spoken by the Lord
  chosen_spanish: lo que fue dicho por el Señor
  alternatives_spanish:
  - lo que dijo el Señor
  - lo pronunciado por el Señor
  lexicon: BDAG
  rationale: La fórmula introduce una cita con estilo formal. “Lo que fue dicho por el Señor” reproduce bien la relación de cita y deja visible la autoridad del hablante.
- source_word: Ἐν παντὶ τόπῳ καὶ χρόνῳ
  english_pob_choice: In every place and time
  chosen_spanish: En todo lugar y tiempo
  alternatives_spanish:
  - En cada lugar y en cada tiempo
  - En todo lugar y en todo tiempo
  lexicon: LSJ
  rationale: La expresión griega es universal. “En todo lugar y tiempo” conserva esa amplitud con una forma idiomática y elegante en español.
- source_word: προσφέρειν μοι θυσίαν καθαράν
  english_pob_choice: offer me a pure sacrifice
  chosen_spanish: ofrézcanme un sacrificio puro
  alternatives_spanish:
  - presenten para mí un sacrificio puro
  - ofrezcan para mí un sacrificio puro
  lexicon: BDAG
  rationale: Aunque el infinitivo en cita puede entenderse como mandato, el español necesita una forma finita. “Ofrézcanme” comunica con claridad la fuerza exhortativa del pasaje.
- source_word: βασιλεὺς μέγας
  english_pob_choice: a great King
  chosen_spanish: un gran Rey
  alternatives_spanish:
  - un Rey grande
  - el gran Rey
  lexicon: BDAG
  rationale: El artículo indefinido del griego se refleja naturalmente con “un gran Rey”. Mantiene el tono solemne y la amplitud de la afirmación.
- source_word: θαυμαστὸν ἐν τοῖς ἔθνεσι
  english_pob_choice: marvelous among the nations
  chosen_spanish: admirable entre las naciones
  alternatives_spanish:
  - maravilloso entre las naciones
  - admirable entre los pueblos
  lexicon: LSJ
  rationale: “Admirable” conserva la idea de ser objeto de asombro y reconocimiento. “Naciones” mantiene el alcance universal del texto citado.
theological_decisions:
- issue: Cómo reflejar la expresión κυριακὴν ... Κυρίου sin borrarla en una fórmula eclesial posterior
  english_pob_reading: Rendered as 'the Lord’s day'
  chosen_spanish_reading: en el día del Señor
  alternative_spanish_readings:
  - en el Día del Señor
  - el día del Señor
  rationale: La frase griega es ligeramente enfática y litúrgica. “En el día del Señor” es natural en español y preserva la referencia comunitaria sin introducir una interpretación más técnica de la necesaria.
  doctrine_reference: Preserve source-level ambiguity where the text is idiomatic and liturgical.
- issue: Si θυσία debe suavizarse como 'ofrenda' o mantenerse como lenguaje sacrificial
  english_pob_reading: Retained 'sacrifice' in the main text without reduction
  chosen_spanish_reading: sacrificio
  alternative_spanish_readings:
  - ofrenda
  - ofrenda sacrificial
  rationale: El pasaje repite el lenguaje de θυσία y lo conecta con una cita profética sobre una ofrenda pura. Mantener “sacrificio” conserva la tensión teológica del texto y evita resolverla prematuramente.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa revisada simplificó 'the Lord’s own day' a 'the Lord’s day' por considerarlo más natural y suficientemente literal. La redacción española sigue esa línea, eligiendo una forma directa y idiomática. También se mantuvo el lenguaje sacrificial sin atenuarlo, en continuidad con la última decisión editorial.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para Κυρίου en la referencia al día del culto y en la cita, conforme al audit trail inglés.
  - Se evita 'Cristo' porque el texto no usa Χριστός.
  - Se usa 'transgresiones' en lugar de 'pecados' para conservar el matiz moral de παραπτώματα.
  - Se prefiere 'sacrificio' frente a 'ofrenda' por la fuerte repetición cultual del pasaje.
  - La cita final conserva 'naciones' para reflejar el alcance universal de ἔθνη.
