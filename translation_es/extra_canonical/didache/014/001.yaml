  to: 'Pero en el día del Señor, cuando se hayan reunido, partan el pan y den gracias, después de confesar primero sus transgresiones, para que su sacrificio sea puro. Pero nadie que tenga una disputa con su compañero venga a reunirse con ustedes hasta que se reconcilien, para que su sacrificio no sea contaminado. Porque esto es lo que fue dicho por el Señor: “En todo lugar y tiempo ofrézcanme un sacrificio puro, porque yo soy un gran Rey”, dice el Señor, “y mi nombre es admirable entre las naciones”.'
