review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro de auditoría inglés en la mayoría de las decisiones clave: conserva ‘sacrificio’ para θυσία, mantiene la secuencia de συναχθέντες / προεξομολογησάμενοι, traduce bien la disputa interpersonal de ἀμφιβολία y preserva el alcance universal de la cita final. Sin embargo, hay dos problemas que conviene corregir: (1) ‘profanado’ para κοινωθῇ desplaza el contraste principal καθαρά / κοινωθῇ desde pureza/impureza hacia santidad/profanación; ‘sea contaminado’ o mejor ‘sea impurificado/contaminado’ refleja mejor el contexto y el inglés auditado ‘defiled’. (2) ‘ofrezcanme’ requiere tilde: ‘ofrézcanme’.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. La sintaxis fluye bien y evita calcos torpes. Aun así, ‘después de confesar primero’ suena algo rígido; ‘después de haber confesado primero’ o ‘después de confesar primero’ ambos son posibles, pero no obliga cambio. La corrección necesaria es ortográfica en ‘ofrézcanme’ y estilístico-semántica en ‘profanado’.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ‘Señor’ aquí refleja Κυρίου y no exige ‘Yahvé’, dado que el texto fuente es griego y cita ‘λέγει Κύριος’; ‘sacrificio’ está bien mantenido; ‘compañero’ respeta ἑταῖρος; ‘naciones’ corresponde bien a ἔθνεσι. No hay conflictos mayores de glosario.'
  issues:
  - severity: medium
    issue: κοινωθῇ traducido como ‘sea profanado’
    rationale: Aunque ‘profanado’ es posible en contexto cultual, el contraste explícito con καθαρά (‘puro’) favorece una traducción de impureza/contaminación más que de profanación. El inglés auditado eligió ‘be defiled’. En español, ‘sea contaminado’ o ‘sea manchado’ preserva mejor el eje pureza-impureza.
  - severity: low
    issue: 'Error ortográfico: ‘ofrezcanme’'
    rationale: La forma enclítica correcta es ‘ofrézcanme’. Debe corregirse en el texto principal.
  revised_spanish_text: 'Pero en el día del Señor, cuando se hayan reunido, partan el pan y den gracias, después de confesar primero sus transgresiones, para que su sacrificio sea puro. Pero nadie que tenga una disputa con su compañero venga a reunirse con ustedes hasta que se reconcilien, para que su sacrificio no sea contaminado. Porque esto es lo que fue dicho por el Señor: “En todo lugar y tiempo ofrézcanme un sacrificio puro, porque yo soy un gran Rey”, dice el Señor, “y mi nombre es admirable entre las naciones”.'
  revision_rationale: Se corrige la ortografía de ‘ofrézcanme’ y se ajusta κοινωθῇ de ‘profanado’ a ‘contaminado’ para reflejar mejor el contraste de pureza ritual con καθαρά y la decisión auditada inglesa ‘be defiled’, sin alterar la estructura ni la teología del pasaje.
