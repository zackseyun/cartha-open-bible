  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y del inglés POB: excluir de la reunión a quien tiene una disputa hasta la reconciliación, para evitar que el sacrificio quede ritualmente afectado. Las decisiones principales («disputa», «compañero», «se reúna», «se reconcilien») son fieles. Sin embargo, la nota [a] no responde a una ambigüedad del origen ni a una necesidad exegética; es solo una variante de registro, y según la disciplina del proyecto no debe incluirse si no hay anclaje semántico relevante.'
  spanish_quality_summary: El español es claro, natural y digno. «Pero que nadie...» funciona bien, aunque la nota de estilo sobre «ustedes/vosotros» estorba innecesariamente. La frase final «para que su sacrificio no sea profanado» es buena y cultualmente adecuada. Conviene dejar el texto limpio, sin nota regional.
  glossary_alignment: No hay términos del glosario principal en juego que entren en conflicto. La elección «profanado» para κοινωθῇ es defendible y mantiene la carga cultual mejor que alternativas más planas. «Compañero» para ἑταίρου y «disputa» para ἀμφιβολίαν están bien alineados con el contexto.
  issues:
  - severity: medium
    issue: Nota al pie [a] innecesaria y no motivada por el texto fuente
    rationale: La nota «O “con vosotros”» trata solo una preferencia regional de segunda persona plural. El proyecto pide preservar alternativas significativas del origen o evitar ambigüedades reales en español, no registrar variantes estilísticas sin relevancia exegética.
  revised_spanish_text: Pero que nadie que tenga una disputa con su compañero se reúna con ustedes, hasta que se reconcilien, para que su sacrificio no sea profanado.
  revised_footnotes: []
  revision_rationale: Se elimina la nota [a] porque no corresponde a una ambigüedad del texto griego ni a una decisión léxica o teológica significativa; solo introduce una variante regional de estilo. El resto del texto puede mantenerse tal como está, pues es fiel, claro y adecuado.
