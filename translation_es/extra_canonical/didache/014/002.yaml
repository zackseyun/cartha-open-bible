  text: Πᾶς δὲ ἔχων τὴν ἀμφιβολίαν μετὰ τοῦ ἑταίρου αὐτοῦ μὴ συνελθέτω ὑμῖν, ἕως οὗ διαλλαγῶσιν, ἵνα μὴ κοινωθῇ ἡ θυσία ὑμῶν·
