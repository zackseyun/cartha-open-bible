base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/014/002.yaml
  text: But let no one who has a dispute with his companion come together with you until they are reconciled, so that your sacrifice may not be defiled.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:00Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Pero que nadie que tenga una disputa con su compañero se reúna con ustedes, hasta que se reconcilien, para que su sacrificio no sea profanado.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Πᾶς δὲ ἔχων τὴν ἀμφιβολίαν
  english_pob_choice: who has a dispute
  chosen_spanish: que tenga una disputa
  alternatives_spanish:
  - que tenga una contienda
  - que tenga un pleito
  lexicon: ἀμφιβολία
  rationale: El término griego expresa una disputa, desacuerdo o controversia; «disputa» conserva bien ese sentido en español sin cargarlo excesivamente hacia un pleito jurídico.
- source_word: μετὰ τοῦ ἑταίρου αὐτοῦ
  english_pob_choice: with his companion
  chosen_spanish: con su compañero
  alternatives_spanish:
  - con su asociado
  - con su prójimo
  lexicon: ἑταίρος
  rationale: «Compañero» refleja la relación cercana o asociada que indica ἑταίρος y coincide con el sentido del inglés POB.
- source_word: μὴ συνελθέτω ὑμῖν
  english_pob_choice: come together with you
  chosen_spanish: se reúna con ustedes
  alternatives_spanish:
  - venga a reunirse con ustedes
  - se junte con ustedes
  lexicon: συνέρχομαι
  rationale: La construcción aquí prohíbe participar de la asamblea; «se reúna con ustedes» comunica con naturalidad el sentido congregacional del verbo.
- source_word: ἕως οὗ διαλλαγῶσιν
  english_pob_choice: until they are reconciled
  chosen_spanish: hasta que se reconcilien
  alternatives_spanish:
  - hasta que se hagan las paces
  - hasta que sean reconciliados
  lexicon: διαλλάσσω
  rationale: «Reconciliarse» preserva el valor relacional del verbo en voz pasiva/medio-pasiva sin forzar una explicación interpretativa adicional.
- source_word: ἵνα μὴ κοινωθῇ ἡ θυσία ὑμῶν
  english_pob_choice: so that your sacrifice may not be defiled
  chosen_spanish: para que su sacrificio no sea profanado
  alternatives_spanish:
  - para que su sacrificio no sea contaminado
  - para que su sacrificio no quede impuro
  lexicon: κοινόω
  rationale: Aunque el inglés POB usa «defiled», el griego κοινωθῇ comunica la idea de quedar común/ritualmente profanado o contaminado; «profanado» mantiene mejor esa carga cultual en español.
theological_decisions:
- issue: Estado cultual de la ofrenda/comunión comunitaria
  english_pob_reading: your sacrifice may not be defiled
  chosen_spanish_reading: para que su sacrificio no sea profanado
  alternative_spanish_readings:
  - para que su sacrificio no sea contaminado
  - para que su sacrificio no quede impuro
  rationale: La frase apunta a una contaminación cultual derivada de la falta de reconciliación. «Profanado» conserva la seriedad ritual del efecto sin convertirlo en una glosa doctrinal.
  doctrine_reference: Pureza cultual y reconciliación fraterna en el contexto eclesial temprano
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo externo fue de alta concordancia; por eso esta versión sigue de cerca el sentido del griego normalizado y del POB inglés, con una sola afinación léxica en κοινωθῇ para reflejar mejor la connotación ritual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva un registro congregacional sobrio y moderno, evitando arcaísmos innecesarios.
  - «Ustedes» sigue la norma de neutralidad latinoamericana; la nota recoge la variante «vosotros» si la edición local la prefiere.
