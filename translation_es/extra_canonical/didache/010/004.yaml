base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/010/004.yaml
  text: Before all things we give thanks to you because you are mighty; to you be the glory forever.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:51Z'
    unchanged: false
    changes_summary: Revised 'Above all' to 'Before all things' for closer lexical alignment with Πρὸ πάντων; retained the rest with minor smoothing.
translation:
  language: es
  text: Antes de todas las cosas te damos gracias, porque eres poderoso; a ti sea la gloria por siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πρὸ πάντων
  english_pob_choice: Before all things
  chosen_spanish: Antes de todas las cosas
  alternatives_spanish:
  - Antes que todo
  - Por encima de todo
  lexicon: Πρὸ + πᾶς
  rationale: La revisión inglesa favorece el valor temporal/ordenal de Πρὸ πάντων, no el superlativo de prioridad abstracta. En español, 'Antes de todas las cosas' conserva esa secuencia con naturalidad litúrgica.
- source_word: εὐχαριστοῦμέν
  english_pob_choice: we give thanks
  chosen_spanish: te damos gracias
  alternatives_spanish:
  - te agradecemos
  - damos gracias
  lexicon: εὐχαριστέω
  rationale: El verbo expresa acción de gratitud; 'te damos gracias' mantiene el sentido directo y la relación personal del dativo 'σοι'.
- source_word: δυνατός εἶ
  english_pob_choice: you are mighty
  chosen_spanish: eres poderoso
  alternatives_spanish:
  - eres fuerte
  - eres capaz
  lexicon: δυνατός
  rationale: '''Poderoso'' comunica adecuadamente la idea de poder/fortaleza divina en registro reverente, sin reducirlo a mera capacidad.'
- source_word: ἡ δόξα
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - la alabanza
  lexicon: δόξα
  rationale: '''Gloria'' es la correspondencia normal y conserva el peso doxológico del griego.'
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - por los siglos
  - eternamente
  lexicon: εἰς + αἰῶνας
  rationale: '''Por siempre'' ofrece una fórmula natural y fiel en español; mantiene la extensión durativa de la expresión griega sin sonar arcaica.'
theological_decisions:
- issue: Doxología dirigida a Dios en segunda persona
  english_pob_reading: to you be the glory forever
  chosen_spanish_reading: a ti sea la gloria por siempre
  alternative_spanish_readings:
  - para ti sea la gloria por siempre
  - tuya sea la gloria por siempre
  rationale: El dativo griego expresa dirección/atribución de la gloria a Dios. 'A ti sea la gloria' conserva la forma doxológica clásica y la referencia personal explícita.
  doctrine_reference: Doxología y atribución de gloria a Dios
- issue: Evaluación divina como poder/might
  english_pob_reading: because you are mighty
  chosen_spanish_reading: porque eres poderoso
  alternative_spanish_readings:
  - porque eres fuerte
  - porque tienes poder
  rationale: '''Poderoso'' mantiene el predicado divino del texto sin añadir matices ajenos; evita debilitar la afirmación a mera posesión de poder.'
  doctrine_reference: Atributos divinos
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'Above all' por 'Before all things' para alinearse mejor con Πρὸ πάντων; la redacción española adopta directamente ese valor temporal/ordenal. No hay notas textuales ni variantes en el testimonio dado, y la frase final sigue la doxología sencilla del griego normalizado.
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito por el pronombre de segunda persona, conforme a la oración dirigida a la divinidad.
  - Se usa un registro litúrgico sobrio y comprensible, evitando calcos excesivos.
  - No se introduce 'Señor' ni 'Cristo' porque no aparecen en el texto fuente.
