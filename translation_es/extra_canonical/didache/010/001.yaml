review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro POB en la estructura general, la progresión litúrgica y la mayoría de las decisiones léxicas clave. Sin embargo, presenta un desajuste importante en παῖς: la auditoría inglesa eligió ''servant'' por su posible resonancia isaiana, mientras que el español usa ''esclavo'', que en este contexto para Jesús introduce una dureza semántica no pedida por la fuente ni por la decisión teológica documentada. También hay un pequeño exceso interpretativo en la nota correspondiente. El resto de las decisiones —''hiciste morar'', ''Soberano Todopoderoso'', ''para disfrute'', ''Acuérdate'', ''perfeccionarla'', ''hijo de David'', ''Maranata''— son generalmente fieles. La cláusula sobre la iglesia santificada está suficientemente alineada con el griego, aunque puede pulirse para mayor naturalidad española.'
  spanish_quality_summary: El español es claro, digno y en general bien legible para una audiencia eclesial amplia. No obstante, 'tu esclavo' aplicado a Jesús suena impropio y teológicamente áspero en español moderno eclesial, donde además pierde la intención del inglés auditado. 'Nos concediste bondadosamente' es comprensible, pero algo pesado; 'nos concediste por gracia' o 'nos diste generosamente' sería más natural, aunque no es imprescindible. La frase 'a la que fue santificada para tu reino' funciona, pero una formulación como 'la santificada para tu reino' o 'la que ha sido santificada para tu reino' fluye mejor. En conjunto, requiere reparación menor, no reescritura total.
  glossary_alignment: No hay conflicto con los términos globales principales (no aparece Yahvé ni Mesías como tal). El punto crítico es que el proyecto distingue δοῦλος→'esclavo' cuando el inglés POB eligió 'slave'; aquí el término fuente es παῖς y la decisión inglesa documentada fue 'servant', por lo que en español debe alinearse con 'siervo' o 'servidor' según registro. 'Señor' para Κύριε, 'Espiritual' para πνευματικήν, y 'gracia' para χάρις están bien alineados.
  issues:
  - severity: high
    issue: παῖς aplicado a Jesús fue traducido como 'esclavo'
    rationale: La fuente permite 'siervo/servidor' o 'hijo/niño', y la auditoría inglesa escogió 'servant' por resonancia del Siervo. 'Esclavo' no preserva bien esa decisión y en español cristiano aplicado a Jesús resulta innecesariamente chocante y potencialmente engañoso.
  - severity: medium
    issue: La nota [a] justifica 'esclavo' con una fuerza léxica que no corresponde a la decisión auditada
    rationale: La nota afirma que se conserva 'esclavo' para mantener posible resonancia servil, pero el rationale inglés no apunta a esclavitud sino al campo semántico de 'servant/child' y al eco del Siervo del Señor.
  - severity: low
    issue: '''a la que fue santificada para tu reino'' es algo rígido'
    rationale: Es fiel en lo básico, pero suena menos natural que 'la que ha sido santificada para tu reino' o 'la santificada para tu reino', sin pérdida de precisión.
  - severity: low
    issue: '''nos concediste bondadosamente'' es algo pesado'
    rationale: Comunica la idea de χαρίζομαι, pero la colocación adverbial no suena tan natural como otras opciones más fluidas en español litúrgico.
  revised_spanish_text: 'Pero después de haber sido saciados, den gracias así:


    Te damos gracias, Padre santo,


    por tu santo nombre,


    que hiciste morar en nuestros corazones,


    y por el conocimiento, la fe y la inmortalidad


    que nos hiciste conocer por medio de Jesús, tu siervo[a];


    a ti la gloria por los siglos.


    Tú, Soberano Todopoderoso,


    creaste todas las cosas por causa de tu nombre,


    y diste a los seres humanos comida y bebida para disfrute,


    para que te dieran gracias;


    pero a nosotros nos concediste bondadosamente[b] alimento y bebida espirituales

    y vida eterna por medio de tu siervo[a].


    Sobre todo, te damos gracias porque eres poderoso;


    a ti la gloria por los siglos.


    Acuérdate, Señor, de tu iglesia:


    para librarla de todo mal


    y perfeccionarla en tu amor;


    y reúnela de los cuatro vientos,


    la que ha sido santificada para tu reino,


    que preparaste para ella.


    Porque tuya es la fuerza y la gloria por los siglos.


    Venga la gracia,


    y pase este mundo.


    Hosanna al hijo de David[c].


    Si alguno es santo, que venga;


    si alguno no lo es, que se arrepienta.


    Maranata[d]. Amén.


    Pero permitan que los profetas den gracias cuanto deseen.'
  revised_footnotes:
  - marker: a
    text: La fuente griega usa παῖς, término que puede significar “hijo/niño” o “siervo”. Aquí se traduce “siervo” para conservar la posible resonancia del Siervo del Señor, sin imponer un sentido meramente filial.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega puede entenderse como “graciosamente” o “con favor”. Se optó por una formulación que haga audible la gratuidad del don.
    reason: lexical_alternative
  - marker: c
    text: El texto griego ofrecido lee “hijo de David”. Algunos testigos manuscritos transmiten otra lectura, “Dios de David”.
    reason: textual_variant
  - marker: d
    text: Arameo litúrgico tradicional; el sentido probable es “¡Ven, Señor!” o “¡El Señor ha venido!”.
    reason: source_note
  revision_rationale: Se revisa principalmente παῖς→'siervo' para ajustarse a la fuente y a la decisión teológica/lexical auditada en inglés, evitando la sobreinterpretación de 'esclavo' aplicada a Jesús. También se pule la cláusula de la iglesia santificada para mayor naturalidad española sin alterar el sentido. Se conservan las demás decisiones fuertes del borrador porque son fieles y legibles.
