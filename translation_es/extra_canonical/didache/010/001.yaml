  rationale: Se revisa principalmente παῖς→'siervo' para ajustarse a la fuente y a la decisión teológica/lexical auditada en inglés, evitando la sobreinterpretación de 'esclavo' aplicada a Jesús. También se pule la cláusula de la iglesia santificada para mayor naturalidad española sin alterar el sentido. Se conservan las demás decisiones fuertes del borrador porque son fieles y legibles.
