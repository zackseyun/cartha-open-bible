translation:
  language: es
  text: 'Pero después de haber sido saciados, den gracias así:


    Te damos gracias, Padre santo,


    por tu santo nombre,


    que hiciste morar en nuestros corazones,


    y por el conocimiento, la fe y la inmortalidad


    que nos hiciste conocer por medio de Jesús, tu siervo[a];


    a ti la gloria por los siglos.


    Tú, Soberano Todopoderoso,


    creaste todas las cosas por causa de tu nombre,


    y diste a los seres humanos comida y bebida para disfrute,


    para que te dieran gracias;


    pero a nosotros nos concediste bondadosamente[b] alimento y bebida espirituales

    y vida eterna por medio de tu siervo[a].


    Sobre todo, te damos gracias porque eres poderoso;


    a ti la gloria por los siglos.


    Acuérdate, Señor, de tu iglesia:


    para librarla de todo mal


    y perfeccionarla en tu amor;


    y reúnela de los cuatro vientos,


    la que ha sido santificada para tu reino,


    que preparaste para ella.


    Porque tuya es la fuerza y la gloria por los siglos.


    Venga la gracia,


    y pase este mundo.


    Hosanna al hijo de David[c].


    Si alguno es santo, que venga;


    si alguno no lo es, que se arrepienta.


    Maranata[d]. Amén.


    Pero permitan que los profetas den gracias cuanto deseen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La fuente griega usa παῖς, término que puede significar “hijo/niño” o “siervo”. Aquí se traduce “siervo” para conservar la posible resonancia del Siervo del Señor, sin imponer un sentido meramente filial.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega puede entenderse como “graciosamente” o “con favor”. Se optó por una formulación que haga audible la gratuidad del don.
    reason: lexical_alternative
  - marker: c
    text: El texto griego ofrecido lee “hijo de David”. Algunos testigos manuscritos transmiten otra lectura, “Dios de David”.
    reason: textual_variant
  - marker: d
    text: Arameo litúrgico tradicional; el sentido probable es “¡Ven, Señor!” o “¡El Señor ha venido!”.
    reason: source_note
lexical_decisions:
- source_word: ἐμπλησθῆναι
  english_pob_choice: being filled
  chosen_spanish: haber sido saciados
  alternatives_spanish:
  - después de haber comido hasta quedar satisfechos
  - después de haberse llenado
  lexicon: BDAG, ἐμπίμπλημι
  rationale: El contexto es una acción posterior a la comida. En español, "haber sido saciados" conserva el sentido concreto de saciedad sin volverlo demasiado coloquial, y mantiene la relación con el estado posterior a la mesa.
- source_word: εὐχαριστήσατε / εὐχαριστοῦμέν σοι
  english_pob_choice: give thanks / we give thanks
  chosen_spanish: den gracias / te damos gracias
  alternatives_spanish:
  - agradezcan / agradecemos
  - den acciones de gracias / te ofrecemos acción de gracias
  lexicon: BDAG, εὐχαριστέω
  rationale: '"Dar gracias" es el equivalente natural y litúrgico en español. Mantiene el acto de gratitud sin introducir una formulación más técnica que la del griego.'
- source_word: κατεσκήνωσας
  english_pob_choice: you caused to dwell
  chosen_spanish: hiciste morar
  alternatives_spanish:
  - hiciste habitar
  - plantaste tu tienda
  lexicon: BDAG, κατασκηνόω
  rationale: El verbo sugiere hacer habitar o establecer residencia. "Hiciste morar" preserva la acción divina de establecer el nombre de Dios en el interior de los creyentes, sin cargar el texto con una imagen demasiado marcada de tabernáculo.
- source_word: παίδος
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG, παῖς
  rationale: La POB inglesa documenta la tensión παις = child/servant y elige "servant" por su posible resonancia con el Siervo. En español, "esclavo" conserva mejor la fuerza lexical de δοῦλος/παῖς como dependencia radical, aunque suene más fuerte; se evita "siervo" por atenuar indebidamente el término. La ambigüedad devocional queda abierta en la nota del término usado en la fuente.
- source_word: δέσποτα παντοκράτορ
  english_pob_choice: Almighty Master
  chosen_spanish: Soberano Todopoderoso
  alternatives_spanish:
  - Señor Todopoderoso
  - Dueño Todopoderoso
  lexicon: BDAG, δεσπότης; BDAG, παντοκράτωρ
  rationale: '"Soberano" transmite la fuerza de δεσπότης mejor que "Señor", y "Todopoderoso" expresa παντοκράτωρ con dignidad litúrgica. La combinación evita confundir este vocativo con κύριε más adelante.'
- source_word: ἕνεκεν τοῦ ὀνόματός σου
  english_pob_choice: for the sake of your name
  chosen_spanish: por causa de tu nombre
  alternatives_spanish:
  - por el bien de tu nombre
  - por amor de tu nombre
  lexicon: BDAG, ἕνεκεν
  rationale: '"Por causa de tu nombre" es una construcción española clara y fiel, con resonancia bíblica. Conserva la motivación teológica del nombre como fundamento de la creación.'
- source_word: εἰς ἀπόλαυσιν
  english_pob_choice: for enjoyment
  chosen_spanish: para disfrute
  alternatives_spanish:
  - para gozo
  - para deleite
  lexicon: BDAG, ἀπόλαυσις
  rationale: '"Para disfrute" refleja el uso normal y no problemático de comida y bebida creadas para ser gozadas. Es breve y natural en español.'
- source_word: ἐχαρίσω
  english_pob_choice: you graciously gave
  chosen_spanish: nos concediste bondadosamente
  alternatives_spanish:
  - nos diste por gracia
  - nos otorgaste gratuitamente
  lexicon: BDAG, χαρίζομαι
  rationale: El verbo subraya un don gratuito y favorable. "Concediste bondadosamente" deja oír la gratuidad de la acción divina sin restringirla a un matiz estrictamente técnico.
- source_word: πνευματικὴν τροφὴν καὶ ποτὸν
  english_pob_choice: spiritual food and drink
  chosen_spanish: alimento y bebida espirituales
  alternatives_spanish:
  - comida y bebida espirituales
  - nourishment and drink spiritual
  lexicon: BDAG, πνευματικός; τροφή; ποτόν
  rationale: Se conserva la amplitud del lenguaje sacramental/nutricio sin precisar doctrinalmente si se trata exclusivamente de la Eucaristía. "Alimento y bebida espirituales" es natural en español y mantiene la tensión interpretativa.
- source_word: Μνήσθητι
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: BDAG, μιμνῄσκομαι
  rationale: En oración, el imperativo pide una acción de fidelidad divina, no solo memoria mental. "Acuérdate" mantiene el tono bíblico y devocional en español.
- source_word: τελειῶσαι
  english_pob_choice: to perfect
  chosen_spanish: perfeccionarla
  alternatives_spanish:
  - completarla
  - llevarla a la madurez
  lexicon: BDAG, τελειόω
  rationale: '"Perfeccionar" conserva el sentido de llevar a plenitud, con registro litúrgico apropiado. En este contexto de amor, el verbo no debe debilitarse a un simple "terminar".'
- source_word: τὴν ἁγιασθεῖσαν
  english_pob_choice: the one sanctified
  chosen_spanish: la que fue santificada
  alternatives_spanish:
  - la santificada
  - la que ha sido hecha santa
  lexicon: BDAG, ἁγιάζω
  rationale: La forma española debe concordar con "iglesia" y evitar la dureza de un calco. "La que fue santificada" preserva la pasiva y el estado resultante.
- source_word: τῷ υἱῷ Δαβίδ
  english_pob_choice: to the son of David
  chosen_spanish: al hijo de David
  alternatives_spanish:
  - al hijo de David, el Mesías
  - a David su hijo
  lexicon: BDAG, υἱός
  rationale: Se sigue el texto emendado del griego dado. En español, "hijo de David" es la forma transparente para el título mesiánico y conserva su resonancia bíblica.
- source_word: μαρανᾰθά
  english_pob_choice: Maranatha
  chosen_spanish: Maranata
  alternatives_spanish:
  - ¡Maranata!
  - Marana tha
  lexicon: BDAG, μαραναθά
  rationale: Se translitera como forma litúrgica estable en español, manteniendo el carácter arameo y la ambigüedad interpretativa en el cuerpo del texto.
- source_word: ὅσα θέλουσιν
  english_pob_choice: as much as they desire
  chosen_spanish: cuanto deseen
  alternatives_spanish:
  - todo lo que quieran
  - según deseen
  lexicon: BDAG, ὅσος
  rationale: '"Cuanto deseen" conserva la amplitud de la autorización sin restringirla a una cantidad fija ni a una opción limitada.'
theological_decisions:
- issue: παῖς aplicado a Jesús
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: La fuente griega permite la tensión entre "hijo/niño" y "siervo". La POB inglesa ya decidió por "servant" para conservar el eco del Siervo. En español, "esclavo" hace audible la dependencia y la entrega total sin resolver la tensión hacia un tono más suave; la nota lexical explica la decisión para no borrar el matiz.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve theological tension rather than resolve it'
- issue: Alimento y bebida espirituales
  english_pob_reading: Retain the broad phrase without narrowing it to the Eucharist alone
  chosen_spanish_reading: alimento y bebida espirituales
  alternative_spanish_readings:
  - alimento y bebida eucarísticos
  - nourishment espiritual
  rationale: El contexto es claramente eucarístico, pero el griego no obliga a reducir la frase solo a ese sacramento. La traducción conserva la amplitud del lenguaje y deja abierta la interpretación litúrgica.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
- issue: Variante textual en el clamor final
  english_pob_reading: Follow the emended source text ('son of David') but footnote the manuscript reading.
  chosen_spanish_reading: hijo de David
  alternative_spanish_readings:
  - Dios de David
  rationale: Se sigue el texto fuente proporcionado. La lectura manuscrita alternativa es teológicamente significativa, pero la edición base aquí exige transparencia respecto del texto emendado y nota de variante cuando corresponda.
  doctrine_reference: 'DOCTRINE.md: textual transparency'
- issue: Maranatha
  english_pob_reading: Transliterate in main text with explanatory footnote
  chosen_spanish_reading: Maranata
  alternative_spanish_readings:
  - Nuestro Señor, ven
  - El Señor ha venido
  rationale: La transliteración preserva el carácter litúrgico y antiguo de la exclamación aramea. Dado que su segmentación exacta es debatida, la nota ofrece el sentido probable sin cerrar la discusión.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés POB en el orden y la segmentación del pasaje, especialmente en la cláusula de la iglesia: “reúnela de los cuatro vientos” y “la que fue santificada para tu reino”. También adopta la más reciente preferencia por "people" en la línea de la creación y mantiene la forma emendada "hijo de David" con nota de variante textual.'
  spanish_consistency_notes:
  - Se usa "esclavo" de manera consistente para traducir παῖς en este registro litúrgico, con nota explicativa para preservar la tensión lexical.
  - '"Yahvé" no aparece en este pasaje; por tanto no se introduce ninguna sustitución por "SEÑOR" para el nombre divino.'
  - Se conserva la alternancia entre "Padre santo", "Soberano Todopoderoso" y "Señor" para reflejar los distintos vocativos del griego.
  - La puntuación y los cortes de línea siguen el tono de plegaria y la estructura del original sin añadir paráfrasis devocionales.
