  text: Μετὰ δὲ τὸ ἐμπλησθῆναι οὕτως εὐχαριστήσατε· Εὐχαριστοῦμέν σοι, Πάτερ ἅγιε, ὑπὲρ τοῦ ἁγίου ὀνόματός σου, οὗ κατεσκήνωσας ἐν ταῖς καρδίαις ἡμῶν, καὶ ὑπὲρ τῆς γνώσεως καὶ πίστεως καὶ ἀθανασίας, ἧς ἐγνώρισας ἡμῖν διὰ Ἰησοῦ τοῦ παιδός σου· σοὶ ἡ δόξα εἰς τοὺς αἰῶνας. Σὺ, δέσποτα παντοκράτορ, ἔκτισας τὰ πάντα ἕνεκεν τοῦ ὀνόματός σου, τροφήν τε καὶ ποτὸν ἔδωκας τοῖς ἀνθρώποις εἰς ἀπόλαυσιν ἵνα σοι εὐχαριστήσωσιν, ἡμῖν δὲ ἐχαρίσω πνευματικὴν τροφὴν καὶ ποτὸν καὶ ζωὴν αἰώνιον διὰ τοῦ παιδός σου. Πρὸ πάντων εὐχαριστοῦμέν σοι ὅτι δυνατός εἶ· σοὶ ἡ δόξα εἰς τοὺς αἰῶνας. Μνήσθητι, Κύριε, τῆς ἐκκλησίας σου τοῦ ῥύσασθαι αὐτὴν ἀπὸ παντὸς πονηροῦ καὶ τελειῶσαι αὐτὴν ἐν τῇ ἀγάπῃ σου, καὶ σύναξον αὐτὴν ἀπὸ τῶν τεσσάρων ἀνέμων, τὴν ἁγιασθεῖσαν εἰς τὴν σὴν Βασιλείαν, ἣν ἡτοίμασας αὐτῇ· ὅτι σοῦ ἐστιν ἡ δύναμις καὶ ἡ δόξα εἰς τοὺς αἰῶνας. Ἐλθέτω χάρις καὶ παρελθέτω ὁ κόσμος οὗτος. Ὡσαννὰ τῷ υἱῷ Δαβίδ. Εἴ τις ἅγιός ἐστιν, ἐρχέσθω· εἴ τις οὐκ ἔστι, μετανοείτω· μαρανᾰθά. Ἀμήν. Τοῖς δὲ προφήταις ἐπιτρέπετε
    εὐχαριστεῖν ὅσα θέλουσιν.
