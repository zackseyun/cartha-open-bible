source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Εὐχαριστοῦμέν σοι, Πάτερ ἅγιε, ὑπὲρ τοῦ ἁγίου ὀνόματός σου, οὗ κατεσκήνωσας ἐν ταῖς καρδίαις ἡμῶν, καὶ ὑπὲρ τῆς γνώσεως καὶ πίστεως καὶ ἀθανασίας, ἧς ἐγνώρισας ἡμῖν διὰ Ἰησοῦ τοῦ παιδός σου· σοὶ ἡ δόξα εἰς τοὺς αἰῶνας.
