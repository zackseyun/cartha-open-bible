base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/010/002.yaml
  text: 'We give thanks to you, Holy Father,

    for your holy name,

    which you caused to dwell in our hearts,

    and for the knowledge and faith and immortality

    which you made known to us through Jesus your servant;

    to you be the glory forever.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:49Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Te damos gracias a ti, Padre santo,

    por tu santo nombre,

    el cual hiciste habitar en nuestros corazones,

    y por el conocimiento, la fe y la inmortalidad

    que nos diste a conocer por medio de Jesús, tu siervo;

    a ti sea la gloria por los siglos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εὐχαριστοῦμέν σοι
  english_pob_choice: We give thanks to you
  chosen_spanish: Te damos gracias
  alternatives_spanish:
  - Damos gracias a ti
  - Te agradecemos
  lexicon: εὐχαριστέω
  rationale: La fórmula expresa acción de gracias directa y solemne; en español, 'Te damos gracias' conserva el sentido litúrgico sin sonar forzado.
- source_word: Πάτερ ἅγιε
  english_pob_choice: Holy Father
  chosen_spanish: Padre santo
  alternatives_spanish:
  - Santo Padre
  - Padre Santo
  lexicon: πατήρ / ἅγιος
  rationale: '''Padre santo'' reproduce el orden y evita la posible lectura eclesiástica fija de ''Santo Padre'', que en español suele designar al papa.'
- source_word: τοῦ ἁγίου ὀνόματός σου
  english_pob_choice: your holy name
  chosen_spanish: tu santo nombre
  alternatives_spanish:
  - tu nombre santo
  - el santo nombre tuyo
  lexicon: ὄνομα
  rationale: La construcción 'tu santo nombre' es natural en español y conserva el énfasis en la santidad del nombre divino.
- source_word: κατεσκήνωσας ἐν ταῖς καρδίαις ἡμῶν
  english_pob_choice: you caused to dwell in our hearts
  chosen_spanish: hiciste habitar en nuestros corazones
  alternatives_spanish:
  - pusiste a morar en nuestros corazones
  - has establecido tu morada en nuestros corazones
  lexicon: κατασκηνόω
  rationale: '''Hiciste habitar'' refleja de manera clara la idea de hacer morar o establecer residencia, sin añadir una imagen más desarrollada que el griego no obliga a explicitar.'
- source_word: γνώσεως καὶ πίστεως καὶ ἀθανασίας
  english_pob_choice: the knowledge and faith and immortality
  chosen_spanish: el conocimiento, la fe y la inmortalidad
  alternatives_spanish:
  - el conocimiento, la fidelidad y la inmortalidad
  - el saber, la fe y la inmortalidad
  lexicon: γνῶσις / πίστις / ἀθανασία
  rationale: Se conserva la tríada nominal de la fuente. 'Conocimiento' y 'fe' siguen la lectura inglesa auditada; 'inmortalidad' es la equivalencia directa y transparente.
- source_word: διὰ Ἰησοῦ τοῦ παιδός σου
  english_pob_choice: through Jesus your servant
  chosen_spanish: por medio de Jesús, tu siervo
  alternatives_spanish:
  - por Jesús, tu siervo
  - por medio de Jesús, tu servidor
  lexicon: παῖς
  rationale: El griego παις puede significar 'hijo' o 'siervo'. La POB inglesa eligió 'servant'; en español 'siervo' mantiene esa decisión léxica con mayor fuerza que 'servidor' y evita introducir 'hijo' sin base en esta línea.
- source_word: σοὶ ἡ δόξα εἰς τοὺς αἰῶνας
  english_pob_choice: to you be the glory forever
  chosen_spanish: a ti sea la gloria por los siglos
  alternatives_spanish:
  - tuyo sea el honor para siempre
  - a ti sea la gloria por siempre
  lexicon: δόξα / εἰς τοὺς αἰῶνας
  rationale: '''Por los siglos'' conserva el valor idiomático de duración indefinida de la expresión griega y mantiene un registro litúrgico adecuado.'
theological_decisions:
- issue: Título vocativo para Dios
  english_pob_reading: Holy Father
  chosen_spanish_reading: Padre santo
  alternative_spanish_readings:
  - Santo Padre
  - Padre Santo
  rationale: Se evita 'Santo Padre' porque en español tiene un uso eclesiástico convencional que puede desviar la referencia. 'Padre santo' conserva el vocativo y la santidad sin esa carga.
  doctrine_reference: Juan 17:11, 17:25
- issue: Sentido de παις aplicado a Jesús
  english_pob_reading: Jesus your servant
  chosen_spanish_reading: Jesús, tu siervo
  alternative_spanish_readings:
  - Jesús, tu hijo
  - Jesús, tu servidor
  rationale: La POB inglesa siguió 'servant', y el español 'siervo' preserva esa lectura sin forzar una cristología distinta. No se introduce 'hijo' porque el texto griego por sí solo permite la ambigüedad y la tradición de la Didaché puede reflejar el eco del Siervo.
  doctrine_reference: Hechos 3:13, 3:26; Isaías 52:13
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: ''No changes needed.'' El borrador español sigue de cerca la traducción inglesa auditada y el griego normalizado, sin introducir lecturas adicionales.'
  spanish_consistency_notes:
  - Se usa 'Padre santo' de forma consistente para evitar el título eclesiástico 'Santo Padre'.
  - Se mantiene 'Jesús' como forma fija del nombre propio, y 'siervo' para reflejar la decisión inglesa auditada sobre παις.
  - Se conserva un registro litúrgico sobrio y transparente, con puntuación española estándar.
