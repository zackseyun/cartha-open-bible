source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Σὺ, δέσποτα παντοκράτορ, ἔκτισας τὰ πάντα ἕνεκεν τοῦ ὀνόματός σου, τροφήν τε καὶ ποτὸν ἔδωκας τοῖς ἀνθρώποις εἰς ἀπόλαυσιν ἵνα σοι εὐχαριστήσωσιν, ἡμῖν δὲ ἐχαρίσω πνευματικὴν τροφὴν καὶ ποτὸν καὶ ζωὴν αἰώνιον διὰ τοῦ παιδός σου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/010/003.yaml
  text: 'You, almighty Master,

    created all things for the sake of your name,

    and gave food and drink to people for enjoyment,

    so that they might give thanks to you;

    but to us you graciously gave spiritual food and drink

    and eternal life through your servant.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:51Z'
    unchanged: false
    changes_summary: Adjusted word order to more natural English ('almighty Master'), changed 'men' to 'people' for generic ἀνθρώποις, and retained the rest with minor smoothing. No source content added or omitted.
translation:
  language: es
  text: 'Tú, Soberano todopoderoso,


    creaste todas las cosas por causa de tu nombre,


    y diste alimento y bebida a las personas para su gozo,


    para que te dieran gracias;


    pero a nosotros nos diste por gracia alimento y bebida espirituales


    y vida eterna por medio de tu siervo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Siervo» conserva la lectura del audit trail inglés; παῖς puede significar también «hijo» o «niño», pero aquí no se fija esa opción porque el griego y el contexto inmediato permiten más de una posibilidad.
    reason: alternative_reading
lexical_decisions:
- source_word: δέσποτα παντοκράτορ
  english_pob_choice: almighty Master
  chosen_spanish: soberano Todopoderoso
  alternatives_spanish:
  - Señor Todopoderoso
  - Maestro todopoderoso
  - Dueño todopoderoso
  lexicon: δέσποτα; παντοκράτωρ
  rationale: δέσποτα expresa autoridad soberana, no solo “maestro”; en español, “soberano” conserva el matiz de dominio, y “Todopoderoso” reproduce παντοκράτωρ con una fórmula reverente y natural. Se evita “Señor” como traducción automática cuando el griego no usa κύριος.
- source_word: ἔκτισας τὰ πάντα
  english_pob_choice: created all things
  chosen_spanish: creaste todas las cosas
  alternatives_spanish:
  - creaste todo
  - formaste todas las cosas
  lexicon: κτίζω
  rationale: “Todas las cosas” mantiene la amplitud de τὰ πάντα sin estrecharla. “Creaste” refleja κτίζω de forma directa y clara en español.
- source_word: ἕνεκεν τοῦ ὀνόματός σου
  english_pob_choice: for the sake of your name
  chosen_spanish: por causa de tu nombre
  alternatives_spanish:
  - por amor de tu nombre
  - a causa de tu nombre
  lexicon: ἕνεκεν + ὄνομα
  rationale: “Por causa de tu nombre” preserva la motivación o finalidad expresada por ἕνεκεν con estilo natural en español. Mantiene el valor reverencial de “nombre” sin añadir explicaciones.
- source_word: ἀπόλαυσιν
  english_pob_choice: enjoyment
  chosen_spanish: gozo
  alternatives_spanish:
  - disfrute
  - placer
  lexicon: ἀπόλαυσις
  rationale: El contexto contrasta el alimento ordinario dado a la humanidad con el don espiritual para los creyentes. “Gozo” comunica recepción benigna y alegre sin cargar la frase con un matiz hedonista que “placer” podría introducir.
- source_word: εὐχαριστήσωσιν
  english_pob_choice: give thanks
  chosen_spanish: te dieran gracias
  alternatives_spanish:
  - te agradecieran
  - expresaran gratitud a ti
  lexicon: εὐχαριστέω
  rationale: “Dar gracias” es la equivalencia más estable para εὐχαριστέω en español bíblico contemporáneo. Se conserva el dativo implícito con “te”.
- source_word: ἐχαρίσω
  english_pob_choice: you graciously gave
  chosen_spanish: nos concediste graciosamente
  alternatives_spanish:
  - nos diste por gracia
  - nos otorgaste gratuitamente
  lexicon: χαρίζομαι
  rationale: χαρίζομαι contiene la idea de otorgar con gracia o generosamente. “Concediste graciosamente” conserva la raíz de χάρις y mantiene el contraste con la provisión general dada a “las personas”.
- source_word: πνευματικὴν τροφὴν καὶ ποτὸν
  english_pob_choice: spiritual food and drink
  chosen_spanish: alimento y bebida espirituales
  alternatives_spanish:
  - alimento espiritual y bebida espiritual
  - comida y bebida espirituales
  lexicon: πνευματικός; τροφή; ποτόν
  rationale: Se preserva el paralelismo con “alimento y bebida” del texto griego. El adjetivo plural “espirituales” concuerda con ambos sustantivos en español y evita una traducción rígida que duplicaría el adjetivo.
- source_word: διὰ τοῦ παιδός σου
  english_pob_choice: through your servant
  chosen_spanish: por medio de tu siervo
  alternatives_spanish:
  - por medio de tu niño
  - por medio de tu hijo
  - a través de tu siervo
  lexicon: παῖς
  rationale: παῖς admite “siervo” o “hijo/niño” según contexto. Aquí el inglés POB eligió “servant”, y el contexto litúrgico de la oración favorece una referencia reverente al agente de mediación; “siervo” conserva la ambigüedad sin imponer una cristologización que el texto base no explicita.
theological_decisions:
- issue: Traducción de δεσπότα παντοκράτωρ sin reemplazarla por el habitual “Señor”
  english_pob_reading: almighty Master
  chosen_spanish_reading: soberano Todopoderoso
  alternative_spanish_readings:
  - Señor Todopoderoso
  - Maestro todopoderoso
  rationale: El griego usa una vocación de dominio y poder, no simplemente un título devocional genérico. “Soberano Todopoderoso” mantiene la combinación de autoridad y omnipotencia y evita ocultar el tono directo de la invocación.
  doctrine_reference: Dios como soberano creador y señorío divino en oración litúrgica
- issue: Sentido de παιδός σου al final de la oración
  english_pob_reading: through your servant
  chosen_spanish_reading: por medio de tu siervo
  alternative_spanish_readings:
  - por medio de tu hijo
  - por medio de tu niño
  rationale: 'παῖς es semánticamente tenso: puede significar “siervo” o, en ciertos contextos, “hijo/niño”. Dado el audit trail en inglés y la ausencia de una necesidad textual explícita de fijarlo cristológicamente en esta línea, “siervo” conserva la opción más sobria y deja abierta la ambigüedad documentada.'
  doctrine_reference: Cristología implícita y ambigüedad léxica de παῖς
- issue: Alcance de ἀνθρώποις como referencia genérica
  english_pob_reading: to people
  chosen_spanish_reading: a las personas
  alternative_spanish_readings:
  - a los hombres
  - a la gente
  rationale: El revision pass del inglés corrigió “men” a “people” para reflejar el genérico de ἀνθρώποις. “Las personas” reproduce ese alcance sin masculinizar el referente ni perder la generalidad.
  doctrine_reference: Universalidad de la provisión común de Dios
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente en dos puntos relevantes: el ajuste a lenguaje genérico para ἀνθρώποις (“personas”) y la ordenación más natural del vocativo (“soberano Todopoderoso” para reflejar la inversión natural del español). No se introdujo contenido ausente del griego; tampoco se borró la tensión de παῖς, que permanece documentada en nota.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé únicamente cuando el texto fuente lo exigiera; aquí no aparece el tetragrámaton, así que se conservó el lenguaje de oración dirigido a Dios sin introducirlo.
  - Se eligió “alimento y bebida espirituales” para conservar el paralelismo del original y la terminación adjetival plural acorde con ambos sustantivos.
  - “Por causa de tu nombre” conserva el motivo teleológico/reverencial sin sobreexplicarlo.
  - No se usó “Cristo” ni terminología eclesiástica posterior, porque el texto no la requiere y la audición griega no la impone.
