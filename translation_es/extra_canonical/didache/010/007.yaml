base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/010/007.yaml
  text: But permit the prophets to give thanks as they desire.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:53Z'
    unchanged: false
    changes_summary: Simplified 'as much as they desire' to 'as they desire' for closer alignment with ὅσα θέλουσιν and more natural English.
translation:
  language: es
  text: Pero permitan a los profetas dar gracias como deseen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τοῖς δὲ προφήταις
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - a los profetas
  - para los profetas
  lexicon: προφήτης
  rationale: Se conserva el término técnico «profetas» para el mismo oficio carismático; el dativo se expresa naturalmente en español con «a» tras «permitan».
- source_word: ἐπιτρέπετε
  english_pob_choice: permit
  chosen_spanish: permitan
  alternatives_spanish:
  - dejen
  - autoricen
  lexicon: ἐπιτρέπω
  rationale: «Permitan» reproduce bien la concesión o autorización implícita en el imperativo plural, con un registro claro y eclesialmente inteligible.
- source_word: εὐχαριστεῖν
  english_pob_choice: to give thanks
  chosen_spanish: dar gracias
  alternatives_spanish:
  - agradecer
  - hacer acción de gracias
  lexicon: εὐχαριστέω
  rationale: La expresión estable «dar gracias» comunica el sentido verbal litúrgico de εὐχαριστεῖν sin sobrecargar el texto.
- source_word: ὅσα θέλουσιν
  english_pob_choice: as they desire
  chosen_spanish: como deseen
  alternatives_spanish:
  - lo que deseen
  - según deseen
  lexicon: ὅσος + θέλω
  rationale: «Como deseen» refleja de manera natural la amplitud de ὅσα θέλουσιν y conserva la libertad concedida, sin añadir la idea de medida o cantidad.
theological_decisions:
- issue: Libertad concedida a los profetas en la acción de gracias
  english_pob_reading: permit the prophets to give thanks as they desire
  chosen_spanish_reading: permitan a los profetas dar gracias como deseen
  alternative_spanish_readings:
  - dejen que los profetas den gracias como quieran
  - autoricen a los profetas a dar gracias según deseen
  rationale: El texto regula una práctica litúrgica con permiso explícito; la traducción debe conservar esa libertad concedida sin convertirla en mandato ni en restricción.
  doctrine_reference: Didaché 10:7; disciplina litúrgica de la comunidad
translation_notes:
  revision_awareness: El inglés auditado pasó de «as much as they desire» a «as they desire» para ajustarse mejor a ὅσα θέλουσιν; la versión española sigue esa simplificación con «como deseen», evitando cuantificación innecesaria.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de «profetas» como término técnico sin glosa adicional.
  - Se usa «dar gracias» por su valor idiomático y litúrgico, coherente con el griego εὐχαριστεῖν.
  - No se introduce mayúscula en «profetas» porque aquí no funciona como título divino ni nombre propio.
