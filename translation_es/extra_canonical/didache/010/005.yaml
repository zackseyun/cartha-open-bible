id: DID.10.5
reference: Didache 10:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Μνήσθητι, Κύριε, τῆς ἐκκλησίας σου τοῦ ῥύσασθαι αὐτὴν ἀπὸ παντὸς πονηροῦ καὶ τελειῶσαι αὐτὴν ἐν τῇ ἀγάπῃ σου, καὶ σύναξον αὐτὴν ἀπὸ τῶν τεσσάρων ἀνέμων, τὴν ἁγιασθεῖσαν εἰς τὴν σὴν Βασιλείαν, ἣν ἡτοίμασας αὐτῇ· ὅτι σοῦ ἐστιν ἡ δύναμις καὶ ἡ δόξα εἰς τοὺς αἰῶνας.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/010/005.yaml
  text: Remember[a], Lord, your church, to deliver it from every evil and to perfect it in your love; and gather it from the four winds, the one sanctified for your kingdom, which you prepared for it. For yours is the power and the glory forever.
  footnotes:
  - marker: a
    text: Or 'and gather it, the sanctified one,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:54Z'
    unchanged: false
    changes_summary: Smoothed punctuation to reflect the Greek flow, removed the interpretive addition 'church' after 'the sanctified,' and revised the phrase order to preserve that the church is 'the one sanctified' and is gathered from the four winds. Kept 'perfect' and 'deliver' as accurate renderings.
translation:
  language: es
  text: Recuerda, Señor, a tu iglesia, para librarla de todo mal y perfeccionarla en tu amor; y reúnela[a] de los cuatro vientos, la santificada para tu reino, que le preparaste. Porque tuya es la potestad y la gloria por los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reúnela, la santificada».'
    reason: alternative_reading
lexical_decisions:
- source_word: Μνήσθητι
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Ten presente
  lexicon: μνήσκομαι / μιμνῄσκομαι
  rationale: En una oración dirigida a Dios, ‘Recuerda’ conserva el imperativo reverente del griego y el valor litúrgico del POB inglés sin sonar tan coloquial como ‘Acuérdate’.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: κύριος
  rationale: ‘Señor’ es la equivalencia natural y reverente en español para el vocativo dirigido a Dios, manteniendo la fórmula orante de la fuente.
- source_word: ἐκκλησία
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  - congregación
  lexicon: ἐκκλησία
  rationale: ‘Iglesia’ es la forma estable en español para este referente eclesial; ‘asamblea’ o ‘congregación’ desplazarían el registro litúrgico del texto.
- source_word: ῥύσασθαι
  english_pob_choice: to deliver
  chosen_spanish: librarla
  alternatives_spanish:
  - rescatarla
  - salvarla
  lexicon: ῥύομαι
  rationale: ‘Librar’ conserva la idea de sacar de un peligro o mal y corresponde bien al POB inglés ‘deliver’ sin introducir connotaciones soteriológicas excesivas.
- source_word: τελειῶσαι
  english_pob_choice: to perfect
  chosen_spanish: perfeccionarla
  alternatives_spanish:
  - completarla
  - hacerla perfecta
  lexicon: τελειόω
  rationale: ‘Perfeccionarla’ mantiene el sentido de llevar a plenitud o madurez, en continuidad con el inglés POB y con el campo semántico de τελειόω.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor de alianza
  - caridad
  lexicon: ἀγάπη
  rationale: ‘Amor’ traduce de forma natural ἀγάπη en este contexto litúrgico; ‘caridad’ sería más tradicional pero menos directo en español actual.
- source_word: σύναξον
  english_pob_choice: gather
  chosen_spanish: reúnes[a]la
  alternatives_spanish:
  - reúnela
  - congrégala
  lexicon: συνάγω
  rationale: Se adopta ‘reúnes’ por el ajuste estilístico de la oración amplia en español, pero la función del verbo es la de ‘reunir’. La forma enclítica ‘la’ expresa el objeto directo femenino de ἐκκλησία. La nota a recoge la alternativa estructural del griego (‘y reúne, la santificada’), preservada en el audit trail inglés.
- source_word: ἀπὸ τῶν τεσσάρων ἀνέμων
  english_pob_choice: from the four winds
  chosen_spanish: de los cuatro vientos
  alternatives_spanish:
  - desde los cuatro vientos
  - de los cuatro puntos cardinales
  lexicon: ἄνεμος
  rationale: ‘De los cuatro vientos’ sigue de cerca la imagen bíblica y apocalíptica del griego. ‘Puntos cardinales’ explicaría la imagen, pero la debilitaría.
- source_word: Βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - monarquía
  lexicon: βασιλεία
  rationale: ‘Reino’ es la traducción más directa y ampliamente inteligible para βασιλεία en un contexto bíblico-litúrgico.
- source_word: δύναμις
  english_pob_choice: power
  chosen_spanish: potestad
  alternatives_spanish:
  - poder
  - fuerza
  lexicon: δύναμις
  rationale: Se usa ‘potestad’ para preservar el registro doxológico tradicional sin sustituir la afirmación por un término meramente físico como ‘fuerza’. Aunque ‘poder’ es posible, ‘potestad’ mantiene mejor la cadencia litúrgica del cierre.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honra
  - esplendor
  lexicon: δόξα
  rationale: ‘Gloria’ es la equivalencia estándar y la más adecuada en la fórmula doxológica final.
theological_decisions:
- issue: Apposición de ‘la santificada’ respecto de la iglesia
  english_pob_reading: the one sanctified for your kingdom
  chosen_spanish_reading: la santificada para tu reino
  alternative_spanish_readings:
  - la iglesia santificada
  - la santificada iglesia
  rationale: El griego usa un participio sustantivado femenino en aposición a la iglesia. En español conviene mantener la misma relación sin añadir ‘iglesia’ dos veces ni convertirlo en una persona individual. ‘La santificada para tu reino’ conserva la ambigüedad gramatical y el vínculo con ἐκκλησία.
  doctrine_reference: Ecclesiology; sanctification language in liturgical prayer
- issue: Gloria doxológica final
  english_pob_reading: For yours is the power and the glory forever.
  chosen_spanish_reading: Porque tuya es la potestad y la gloria por los siglos.
  alternative_spanish_readings:
  - Porque tuyos son el poder y la gloria por siempre
  - Porque tuyo es el poder y la gloria para siempre
  rationale: La fórmula final se mantiene como doxología; ‘por los siglos’ refleja el plural temporal del griego y el tono litúrgico. ‘Potestad’ se eligió por su valor reverente, aunque ‘poder’ también sería defendible.
  doctrine_reference: Doxology; divine sovereignty
- issue: Referencia a Yahvé vs. κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aunque el proyecto normalmente prefiere ‘Yahvé’ para el nombre divino, aquí el texto griego de la Didaché usa Κύριε como vocativo directo en una oración litúrgica sin señal inequívoca de un Tetragrámaton subyacente en el propio pasaje. En español, ‘Señor’ reproduce mejor la forma estable de invocación litúrgica y la textura del original griego.
  doctrine_reference: Divine name rendering; liturgical Greek vocative
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: eliminó la adición interpretativa ‘church’ junto a ‘the sanctified’ y ajustó el orden para conservar que la iglesia es ‘la santificada’ y que es reunida desde los cuatro vientos. La redacción española sigue ese mismo criterio, evitando insertar un sustantivo adicional tras ‘la santificada’ y manteniendo la secuencia orante del griego.'
  spanish_consistency_notes:
  - Se mantuvo un registro litúrgico y bíblico claro, sin calcos innecesarios.
  - ‘Iglesia’ se usa para ἐκκλησία, y no se sustituyó por ‘asamblea’ para no debilitar la formulación eclesial tradicional.
  - La nota [a] se coloca en el verbo de reunión porque allí reside la alternativa estructural preservada por el audit trail inglés.
  - ‘Potestad’ se escogió por coherencia doxológica; si se prefiriera mayor literalidad semántica, ‘poder’ sería la alternativa inmediata.
  - Se conservó ‘por los siglos’ para reflejar el alcance temporal del cierre y evitar una paráfrasis más expansiva.
